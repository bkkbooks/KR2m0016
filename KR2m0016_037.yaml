body:
  text: 職官州郡下京尹京兆尹守附左馮翊右扶風河南尹留唐制西都東都北都各置牧一人尹一人通判府務牧缺則尹行其事其鳯翔成都河中江陵興元興徳府亦各置尹一人掌宣徳化歲廵屬縣觀風俗録囚恤鰥寡親王典州則歲以上佐廵縣少尹二人掌貳府州之事歲終則更次入計其屬司録參軍事二人録事四人功曹倉曹戸曹田曹兵曹法曹士曹參軍事各二人參軍事六人文學一人醫學博士一人宋開封府牧尹不常置權知府一人以待制以上充掌尹正畿甸之事以教法導民而勸課之中都獄訟皆受而聽焉小事則専决大事則禀奏其屬有判官推官四人日視推鞫分事以治而佐其長領南司者一人督察使院非刑獄訟訴則主行以司錄參軍一人折戸婚之訟而通書六曹之案牒功曹倉曹戸曹兵曹法曹士曹參軍各一人視其官曹分職涖事左右軍廵使判官各二人分掌京城爭鬬及推鞫之事左右廂公事幹當官四人掌檢覆推問開封典司轂下自太祖建隆以來為要劇之任至神宗熈寧間增給吏禄禁其受賕省衙前役以寛民力釐折獄訟歸於廂官而治事視前日省去十四哲宗元祐元年詔府界捕盗官吏𨽻本府與都大提舉司同管轄而掌其賞罰置新城内左右二廂三年以罷大理寺獄置軍廵院判官一人四年罷新置二廂六年王巖叟言左右㕔推官公事詞状初無通治明文請事繋朝省及奏請通治外餘並據號分治紹聖六年知府事錢勰言自祖宗以來並分左右㕔置推官各一人近年止除推官一人元祐中並令分治請依故事分左右㕔各除推官一人作兩㕔共治職事又言熈寧中置舊城左右廂元豐初増置於新城内四年罷増置兩廂請復置從之尋又詔開封府所薦推官並召對取㫖徽宗崇寧三年蔡京奏乞罷權知府置牧一人尹一人少尹二人分左右二府之政治牧以皇子領之尹以文臣充在六曹尚書之下侍郎之上少尹在左右司郎官之下列曹郎官之上以士戸儀兵刑工為六曹次序司錄二人六曹各二人參軍事八人易胥吏之稱略依唐六典制度又請移開封府治所於舊尚書省從之五年詔開封府屬官並依舊員額大觀元年李孝夀乞増置府學博士一人從之二年詔皇子領牧禄令如執政官又仁宗慶厯中賈昌朝言漢唐都雍置三輔内翼京師朝廷都汴而近今諸郡皆屬他道制度不稱王畿請析京東之曹州京西陳許滑鄭皆𨽻開封府以四十二縣為東畿帝從之髙宗建炎三年詔改杭州為臨安府其守臣帶安撫使置知府通判簽書節度判官㕔公事節度推官觀察推官觀察判官録事㕘軍左右司理㕘軍司戸參軍司法㕘軍各一人本府掌畿甸之事籍其户口均其賦役頒其禁令城内外分左右南北廂各置廂官以聽民之訟訴孝宗乾道七年皇太子領尹事廢臨安府通判簽判職官置少尹一人日受民詞以白太子間日率僚屬詣宫禀事置判官二人推官三人九年皇太子解尹事臨安府知通簽判推判官依舊置孝宗時張枃以直徽猷閣改知臨安府都城浩穰姦盜聚慝杓畫分地以警捕夜戸不閉光宗時再為府尹内侍毛伯益冒西河茭地為亭外戚有殺其僕者獄具夤緣宣諭求免枃執奏論如律孝宗觀湖枃以彈壓伏謁道左孝宗止輦問勞賜以酒炙枃天分高爽吏材敏給所至以治辦稱南渡以來論尹京者以枃為首遼南面官五京留守司兼府尹聖宗統和元年見上京留守行臨潢尹事吳王稍又有某府少尹太平四年見臨潢少尹鄭宏節金大興府尹一人掌宣風導俗肅清所部總判府事兼領本路兵馬都總管府事置同知少尹總管判官府判各一人推官二人世宗大定初唐古安禮為大興尹上曰京師好訛言府中姦吏為民患卿雖年少有治才去其宿弊毋為因仍又章宗時承暉知大興府事豪民與人爭種稻水利不直厚賂元妃兄左宣徽使李仁惠仁惠使人屬承暉右之承暉即杖豪民而遣之曰可以此報宣徽矣又宣宗貞祐時胥鼎知大興府以在京貧民缺食者衆宜立法賑救乃奏曰京師官民有能贍給貧人者宜計所贍遷官陞職以勸奬之遂定權宜鬻恩例格入粟草各有數全活甚衆元大都路都總管府達嚕噶齊二人都總管一人副達嚕噶齊二人同知二人治中二人判官二人推官二人經歴二人知事二人提控案牘四人照磨兼管勾一人國初為燕京路總管大興府世祖中統五年稱中都路至元九年改號大都二十一年始置大都路總管府置都達嚕噶齊都總管等官二十七年改為都總管府領府一州十有一凡本府官吏唯達嚕噶齊一人及總管推官専治路政其餘皆分任供需之事故又號曰供需府焉成宗大徳中姚天福拜大都路總管兼大興府尹畿甸大治後之尹京者以天福為稱首明順天府尹一人府丞一人治中一人通判六人推官一人儒學教授訓導各一人經歴知事照磨檢校各一人府尹掌京府之政令宣化和人勸農問俗均貢賦節征徭謹祭祀閱實戸口糾治豪强隱恤窮困疏理獄訟務知百姓之疾苦天子耕耤行三推禮則奉青箱播種於後府丞為之貳兼理學校治中參理府事以佐尹丞通判分理糧儲馬政軍匠薪炭河渠堤涂之事推官理刑名察屬吏順天府即舊北平府太祖洪武二年置北平行省九年改為北平布政司皆以北平為㑹府成祖永樂初改為順天府十年陞為府尹設官如應天府王賢為順天府尹嘗以柴炭為民病言於大司空石璞曰京民勞疲極矣今採運夫役與真保諸郡等無乃不可乎石黙然為逓減之又惜薪中貴縱其下非法凌府屬叱跪於庭賢聞趨至欲縳其人以聞主者固謝乃已景帝景泰間再疏乞休上曰卿年七十禮當致仕然京畿冗繁非爾不治英宗復辟之初顧謂近臣曰府尹如賢者何可得哉南京應天府府尹一人府丞一人治中一人通判二人推官一人經歴知事照磨檢校各一人儒學教授一人訓導六人自洪武三年改應天府知府為府尹秩正三品賜銀印左馮翊右扶風漢時之官職同京兆漢以後皆不置河南尹唐自元宗開元元年改京兆河南府長史復為尹通判府務牧缺則行其事十一年太原府亦置尹及少尹互載前京兆尹篇内宋河南應天府亦有牧尹少尹其屬官大略與開封府同留守唐自太宗伐高麗置京城留守其後車駕不在京都則置留守以右金吾大將軍為副留守開元以後以三都尹為留守少尹為副留守謂之三都留守宋天子廵守親征則命親主或大臣總留守事建隆元年親征澤潞以樞宻使吳廷祚為東京留守其西南北京留守各一人以知府兼之西京河南南京應天北京大名留守掌宫鑰及京城脩葺彈壓之事畿内錢穀兵民之政皆屬焉南渡初其東京北京並置留守以開封大名知府兼又以掌兵官為副留守其後河南已復南京西京置留守紹興四年高宗將親征以參知政事孟庾為行宫留守遼南面官五京留守司皆兼府尹互見京兆尹篇中其某京皆有留守副留守知某京留守事聖宗開泰二年蕭惠知東京留守事同知某京留守事同簽某京留守事太平四年耶律頁為中京同知六年蕭廸里同簽南京留守事某京留守判官世宗天禄中室昉為南京留守判官某京留守推官開泰元年見中京留守推官李可舉金車駕廵幸則大興府置留守同知少尹判官等官其諸京留守司留守一人帶本府尹兼本路兵馬都總管同知留守事一人帶同知本府尹兼本路兵馬都總管副留守一人帶本府少尹兼本路兵馬副都總管留守判官一人都總管判官一人推官一人元大都留守司留守五人同知二人副留守二人判官二人掌守衛宫闕都城調度本路供億諸務兼理營繕内府諸邸諸宫原廟上方車服殿廡供帳内苑花木及行幸湯沐宴游之所門禁關鑰啓閉之事其上都留守司兼本路都總管府品秩職掌如大都留守司而兼治民事車駕還大都則領上都諸倉庫之事置留守六人同知二人副留守二人判官二人國初置開平府中統四年改上都路總管府至元三年又給留守司印十九年併為上都留守司至明則廵狩親征皆命東宫監國以大臣為留守故留守亦不常置非如前代以京尹充居留之職也其所置留守司正留守一人副留守一人指揮同知二人専掌中都興都守禦防䕶之事洪武二年詔以臨濠為中都置留守衛指揮使司𨽻鳯陽行都督府十四年始置中都留守司統鳯陽等八衛防䕶皇陵設留守一人左右副留守各一人世宗嘉靖十八年改荆州左衛為顯陵衛置興都留守司統顯陵承天二衛防䕶顯陵設官如中都焉郡太守唐自天寶以後改州為郡刺史為太守肅宗至徳二載十二月敇近日所改百司額及郡名官名一切依故事罷郡為州改太守為刺史上州中州下州各置一人品秩有差戸四萬以上為上州秩從三品戸二萬五千以上為中州秩正四品上戸不滿二萬者為下州正四品下憲宗元和中陸亘為兖州守對延英具陳節度使分兵屯屬州刺史不能制故易亂帝因詔屯士得𨽻刺史又白居易遷杭州始築堤捍錢塘潮衝洩其水溉田千頃復浚李泌六井民頼以汲又崔郾守鄂州治尚撫綏經月不笞一人及鎮郢則用法嚴峻一毫不貸又薛珏入為司農卿時詔舉堪任刺史縣令者且百人延問民間疾苦屬吏得失取尤通達者什二宰相欲校以文辭珏曰求良吏不可責以文學宜以上愛人之本為心也宰相多其計所用皆稱職又李吉甫為相建言州刺史不得擅見本道使罷諸道歳終廵勾以絶苛斂吉甫連蹇外遷十餘年䆒知閭里疾苦常病方鎮强恣至是為帝從容言使屬郡刺史自為政則風化可成帝然之出郎吏十餘人為刺史又元和三年詔刺史於宣政門謝訖遣之任舊制凡命都督刺史皆臨軒冊命後雖無冊命而牧守覆命便殿召對賜衣服時河南尹裴復求速之任李吉甫為奏請遂有是命非舊制也宋初革五季之患召諸鎮節度㑹於京師賜第以留之分命朝臣出守列郡號權知軍州事軍謂兵州謂民政其後文武官參為知州軍事其二品以上及帶中書樞宻院宣徽使職事稱判某府州軍監諸府置知府事一人州軍監亦如之掌總理郡政宣布條教導民以善而紏其姦慝歲時勸課農桑旌别孝弟其賦役錢榖獄訟之事兵民之政皆總焉其河南應天大名府則兼留守司公事太原延安府慶渭熈秦各州則兼經略安撫使馬歩軍都總管定州真定府瀛州大名府京兆府則兼安撫使馬歩軍都總管瀘潭廣桂雄各州則兼安撫使兵馬鈐轄潁昌府青鄆許鄧各州則兼安撫使兵馬廵檢其餘大藩府或沿邊州郡或當一道衝要者並帶兵馬鈐轄廵檢或帶沿邊安撫提轄兵甲沿邊溪洞都廵檢餘州軍則别其地望之髙下與職務之繁簡而置之分曹以理之而總其綱要凡屬縣之事皆統焉高宗建炎初詔河北京東西路除帥司外舊差文臣知州去處許通差武臣一次又要郡文臣一員帶本路兵馬都監武臣一員充副鈐轄次要郡文臣一員帶本路兵馬都監武臣一員充副都監紹興三年詔守臣罷帶路分鈐轄都監後帝又以守令皆帶勸農公事多不奉職自今有治效顯著者可令中書省籍記姓名特加擢用初除授見闕及自外罷任赴闕並令引見上殿孝宗乾道二年令非曽任守臣不得為郎定諸郡合文武臣通差去處並依舊制張詠知益州時李順搆亂王繼恩上官正總兵攻討援師不進詠以言激正勉其親行仍盛為供帳餞之酒酣舉爵屬軍校曰汝曹䝉國厚恩無以塞責此行當直抵冦壘平蕩醜類若老師曠日即此地為爾死所矣正由是决行深入克捷又劉敞徙知鄆州鄆比易守政不治市邑攘奪公行敞决獄訟明賞罰境内肅然有客行夀張道中遺一囊錢人莫敢取以告里長里長為守視客還取得之又有暮遺物市中者旦往訪之猶在又蔡襄以樞宻直學士知福州郡士周希孟陳列陳襄鄭穆以行義著襄備禮招延訓諸生經學知泉州距州二十里萬安渡絶海而濟往來畏其險襄立石為梁其長三百六十丈民至今頼之又王大寳知連州代還言連英循惠新恩六州居民纔數百非懋遷之地月輸免行錢宜蠲減高宗詔大臣曰守臣上殿令陳民事遂得知田里疾苦所陳五六得一可行其利亦不細矣又馬亮以工部侍郎徙知杭州先是江濤大溢調兵築堤而工未就詔問所以捍江之䇿亮裒詔禱伍員祠下明日潮為之却出横沙數里堤遂成又趙抃加龍圖閣直學士出為外守為政善因俗施設猛寛不同於成都尤為世所稱道神宗每詔郡守必以抃為言又种世衡知環州畨部有牛家族努額者素倔彊未嘗出謁郡守聞世衡至遽郊迎世衡與約明日當至其帳往勞部落是夕大雪深三尺左右曰地險不可往世衡曰吾方結諸𦍑以信不可失期遂縁險而進努額方卧帳中謂世衡必不能進世衡蹵而起之努額大驚曰前此未有官至吾部者公乃不疑我耶率其族羅拜聴命其後百餘帳皆自歸莫敢貳又真徳秀進徽猷閣待制復知泉州迎者塞路深邨百歲老人亦扶杖而出城中歡聲動地徳秀涖任以後凡决訟自卯至申未巳或勸其嗇養精神徳秀曰無力惠民唯有政平訟理自當勉耳又蔣元振知亷州清苦勵節家屬悉寄住潭州在任啜粥飲水自奉甚薄為政簡易民甚愛之又王十朋守泉初至任㑹七邑宰勸酒厯告以愛民之意出詩示之曰九重天子愛民深令尹宜懐惻隱心今日黄堂一杯酒使君端為庶民斟又陸九淵知荆門軍其境内官吏之貪亷民俗之習尚善惡皆素知之郡以為神逾年政行令脩民俗為變諸司交薦丞相周必大嘗稱荆門之政以為躬行之效焉又陳希亮代還執政以為大理少卿希亮願得一郡以自效乃以知宿州州跨汴為橋水與橋爭常壊舟希亮始作飛橋無柱以便往來詔賜縑以褒之仍下其法自畿甸以至泗州皆為飛橋又神宗召趙抃知諫院帝曰聞卿匹馬入蜀以一琴一鶴自隨為政簡易亦如是乎又歐陽修在滁州自號醉翁晚更號六一居士凡歴數郡不見治迹不求聲譽寛簡而不擾故所至民便之或問為政寛簡而不弛廢何也曰以縱為寛以略為簡則政事弛廢而民受其弊吾所謂寛者不為苛急簡者不為煩碎耳又曾鞏為知州務去民疾苦急奸盗而寛貧弱曰為害者不去則吾民不寧齊俗悍强喜攻刼至是豪宗大姓斂手不敢動冦攘屏迹州即肅清又孫甫知鄧州有惠政慶歴中范仲淹洎甫相繼守郡皆號良吏遼南面官黄龍府有知黄龍府事興宗重熈十三年見知黄龍府事耶律烏魯斯興中府有知興中府事道宗咸雍元年有知興中府事楊績其某州亦有州刺史蕭文知易州兼西南安撫使高陽土沃民富吏其邑者每黷於貨民甚苦之文至悉去舊弊務農桑崇禮教民皆化之時大旱百姓憂甚文禱之輙雨屬縣又蝗反躬自責蝗盡飛去遺者亦不食苖散在草莽為烏鵲所食霪雨不止復禱而霽是嵗大熟金諸總管府則府尹兼領都總管其諸府非總管府則置尹一人諸防禦州則置防禦使一人諸州則置州刺史一人其掌皆同府尹翟永固以尚書左丞罷為真定尹尚書省奏固自執政出為尹其繖蓋當用何制度上曰用執政制度遂著為令元至元初置諸路總管府二十年定十萬戸之上者為上路十萬戸之下者為下路當衝要者雖不及十萬戸亦為上路置達嚕噶齊一人總管一人兼管勸農事江北則兼諸軍鄂囉秩各有差上路逹嚕噶齊總管皆正三品下路皆從三品其散府秩正四品則置逹嚕噶齊一人知府或府尹一人領勸農鄂囉其諸州亦有達嚕噶齊州尹順帝至正時朝廷慎選守令參知政事魏中立言於帝當今欲得賢守無如韓鏞者乃特署鏞名授饒州路總管饒俗尚鬼有覺山廟者自昔為妖以禍福人為盗賊者事之尤至將為必卜之鏞至即撒其祠宇沈土偶人於江人初大駭已而歎服又董文用出為衛輝路總管十六年受代歸里茅茨數椽僅蔽風雨讀書賦詩怡然燕居人皆服其亷潔明改諸路為府每府置知府一人自宣宗宣徳以後統計天下府凡一百五十有九掌一府之政宣風化平獄訟均賦役以教養百姓每三歲察屬吏之賢否上下其考以達於省上吏部凡朝賀弔祭視布政司直𨽻府則專達宣德初以雄劇十郡慎選良牧尚書胡濙舉况鍾典蘇郡請賜敇以行鍾始以吏起家洞灼郡弊涖任後吏胥抱牘請署欲以嘗鍾鍾黙然若無能為者既三日復請署鍾乃歴舉前牒中之故為出入隱竄顛倒者立撲殺之僚屬震慄因并舉僚屬之貪虐庸懦者立黜之置善惡二簿察民善惡籍其名以示勸懲民咸感化凡奏減正賦田糧及停徴渰没舊欠糧草共數百萬辨明誣入軍籍者千八百餘家蘇人語減三分糧當一代軍民到於今受其賜述職日上錫宴賜詩英宗正統五年九載滿去郡民赴闕乞留者百萬餘人遂再遣還任終於官又何文淵為温州守入為少司冦特薦侍御劉謙代已治郡九年善政甚多嘗語人曰守與令雖官階不同皆職民牧赫赫為威民不近也察察為明民罔容也平易近民守令之道也人以為名言又郁山為溫州守時元輔張孚敬雖歸上眷猶厚部使以下望風争趨山獨處之以禮孚敬建寶綸樓大治第宅又廣求基地强買不休山自往止之曰夫居第當遺之子孫公今移易幾何家匝垣已里餘矣而意猶未足殆非所以善後計也且公居朝嘗喜稱伊傳周召之為相奈何所以處家者顧出蕭何李沆下哉張怒作色山不顧而出自後地不再廣其直𨽻州各州置知州一人明制有直𨽻州有屬縣視府其品秩雖與散州同而職實知府也計天下州凡二百三十有四總論郡佐郡丞司别駕司長史司司馬司録事㕘軍功倉戸兵司法士司士正㕘軍事博中通守經學博士督醫五官掾郵郡尉唐制諸州郡有别駕長史錄事參軍事司功司倉司戸司田司兵司法司士各參軍事市令丞文學醫學博士等官其上州中州下州皆同宋諸州郡有通判及幕職官諸曹官教授等官太祖建隆四年詔知府公事並須長史通判簽議連書方許行下其諸曹官與唐制略同遼南面官黄龍府興中府皆有同知判官博士助教等官金諸總管府諸府諸州皆有同知判官推官等官元諸路諸府諸州皆有同知治中判官推官等官明各府皆有同知通判推官各直𨽻州皆有同知判官皆無定員視其事之煩簡以為差郡丞唐不置有别駕長史元宗天寶以後諸郡皆廢别駕下郡置長史一人肅宗上元二年諸州復置别駕徳宗時復省元和長慶之際兩河用兵禆將有功者補東宫王府官久次當進及受代居京師者常數十人訴宰相以求官文宗時宰臣韋處厚建議復置兩輔六雄十望十𦂳州别駕宋諸州皆置通判卞衮通判宣州太宗淳化間上命采庻僚之亷幹者給御書印紙課最仍賜實俸以旌異之衮與焉又李肅之通判澶州時北使將過郡而樓堞壊圮肅之謂郡守曰吾州為景德破敵之地當示雄强今保障若是且奈何遂鳩工搆城屋凡千區規制一新人皆服其幹濟又王十朋擢紹興府簽判既至咸以書生易之十朋裁决如神吏姦不行又陳堯佐通判潮州修孔子廟作韓吏部祠以風示潮人又周敦頤為合州判官事不經手吏不敢决雖下之民亦不肯從又張忠恕通判杭州能撥煩理劇拳拳以體國為心大郡置二人餘置一人貳郡政凡兵民錢糓戸口賦役獄訟聴斷之事可否裁决與守臣通簽書施行所部官有善否及職事修廢得刺舉以聞南渡後設官如舊入則貳政出則按縣既而諸州通判有兩員處减一人凡軍監之小者不置遼南面官黄龍府興中府皆有同知判官金諸總管府皆有同知都總管掌通判府事兵馬副都總管所掌與同知同總管判官掌紀綱總府衆務府判與總管判官同又有推官其職掌亦同諸府亦有府判推官掌紀綱衆務諸州有同知通判州事有判官簽判防刺州事元諸路總管府有同知治中判官各一人推官二人専治刑獄諸散府有同知判官推官各一人諸州亦有同知判官明知府亦有同知景泰間彭鏡初遷大理同知所隷多土官舊俗謁見有儀䕃襲有饋鏡初一切峻却之滇民尚鬼鏡初所至必毁滛祠海上有獵神頗著靈異鏡初奉上臺命竟往毁之方航海浪高於屋從者膽落獨無所怖已至風止水靜卒毁而還又施奎調南安同知刑威不用専尚徳化不踰年人吏洽和民悉感其德惠通判宣德間戴浩為東昌通判兼徴租陶河之役九載秩滿民歌曰戴别駕公實為我儂亷慎忘躬能使年豐又譚讓改衢州通判政務尚嚴厲夜有人書廨壁者曰虎豹在山雷行於天人宜自度不可犯譚譚顧視笑曰為政不能使民無犯而使不可犯耶更治簡緩民愈稱順又劉容通判黄州單車赴任布袍蔬食不殊寒士風亷平之譽孚於上下黠吏悍卒相戒斂戢分掌清軍廵捕管糧治農水利屯田牧馬等事無常職各府所掌不同延安延綏同知又兼牧民其邉府同知有增至六七員者洪武三年設各府推官理刑名贊計典其各直隸州亦有同知判官司馬唐置一人宋遼金元明皆無錄事參軍唐置一人宋制録事參軍掌州院庻務糾諸曹稽違宋以後皆不置司功參軍唐上州中州置一人下州不置宋遼金元明皆無司倉參軍唐置一人宋有戸曹參軍掌戸籍賦稅倉庫受納即唐之司倉參軍也金諸府以府判分判吏戸禮案事元明皆以同知通判分掌其事司戸參軍唐上州置二人中州下州各置一人宋遼金元明皆無司兵參軍唐上州中州置一人下州不置宋遼皆無金諸總管府以總管判官分判兵案事諸府以推官判兵刑工案事元明皆無司法參軍唐上州置二人中州下州各置一人宋亦有之掌議法斷刑又置司理參軍掌獄訟勘鞫之事明以推官理之司士參軍唐上州中州置一人下州不置唐以後歴代皆無參軍事唐上州置四人中州下州逓減一人唐以後皆無經學博士唐置一人宋仁宗景祐四年詔藩鎮始立學他州勿聽慶厯四年詔諸路州軍監各令立學置教授以經術行義訓導諸生而掌其課試之事胡瑗教授蘇湖間弟子以千計時尚詞賦獨湖學以經義及時務故有經義齋治事齋經義齋者擇疏通有器局者居之治事齋者人各治一事又兼一事如邊防水利之類故天下謂湖學多秀彦其出而筮仕往往取高第及為政多適於用又胡安國除荆南教授正身律物凡所訓説務明忠孝之大端又廖徳明為潯州教授為學者講明心性之要手植三栢於學潯士愛敬之如甘棠遼南面官黄龍府興中府皆有博士助教等官金諸府皆有教授元諸總管府諸府諸州有儒學教授學正學録等官又有䝉古學教授明諸府有教授一人訓導四人胡儼為華亭教諭時年尚少能抗師道訓勵諸生敦行檢講說經史寒暑不輟又魏驥為松江府學訓導汲汲成就人士諸生讀書學宫或親往勞問諸生益感激自奮滿九載諸生楊珙等詣闕乞留諸州學正一人訓導三人學正掌教誨所屬生員訓導佐之醫學博士唐置一人宋遼金皆不置元諸路總管府有醫學教授一人恵民藥局提領一人明各府有醫學正科一人各州有典科一人置於洪武十七年設官不給禄中正通守五官掾督郵郡尉唐時已無宋遼金元明皆無縣令唐制各縣令一人掌宣導風化察冤滯聼獄訟凡民田收授縣令給之每歲季冬行鄉飲酒禮籍帳傳驛食庫盗賊隄道雖有専官皆通知之其品秩各有差長安萬年洛南洛陽太原晉陽六縣謂之京縣正五品上京兆河南太原所管諸縣謂之畿縣正六品下諸州上縣從六品上諸州中縣正七品上諸州中下縣從七品上諸州下縣從七品下代宗大歴中詔以郎官宰畿輔韋夏卿授奉天令課為第一改長安令又韓愈為監察御史上疏論宫市貶陽山令有愛在民民生子多以其姓字之又裴行立遷衛尉少卿口陳願治民試一縣令自效除河東令寛猛皆當宋建隆元年令天下諸縣除赤畿外有望𦂳上中下掌總治民政勸課農桑平决獄訟有徳澤禁令則宣布於治境凡戸口賦役錢榖賑濟給納之事皆掌之若京朝幕官則為知縣事有戍兵則兼兵馬都監或監押高宗建炎初多差武臣紹興中詔専用文臣然沿邊溪洞處仍許武臣指射邑大事煩則堂除冦凖知巴東縣其治一以恩信為主後知成安縣每期令賦役唯令具鄉里姓名掲縣門而百姓争赴之無稽違者又蘓頌知江寧縣時建業承李氏後稅賦圖籍一皆無藝每發斂高下出吏手頌因治訊他事互問民間鄰里丁産識其詳及定戸産民或自知不悉以告頌警之曰汝有某丁某産何不言民駭懼皆不敢隱遂剗剔夙蠧成賦一邑簡而易行諸令皆視以為法又范純仁為襄邑令有牧地衛士牧馬踐民稼純仁捕一人杖之牧地初不𨽻縣主者怒曰天子宿衛令敢爾耶白其事於上劾治甚急純仁言養兵出於稅𤱔若使暴民田而不得問稅將安出詔釋之且聽牧地𨽻縣凡牧地隸縣自純仁始又周敦頤知南昌縣南昌人曰是能辨分寧獄者吾屬得所訴矣盖以敦頤初為分寧主簿有獄久不决敦頤至一訊立辨邑人驚服故也其時富家大姓黠吏惡少惴惴焉唯恐得罪一時善政最多又程顥遷晉城令凡民以事至縣者必告以孝弟忠信鄉必有校暇時親至召父老與語兒童所讀書親為正句讀擇子弟之秀者聚而教之鄉民為社㑹為立科條旌别善惡有勸有恥在縣三歲民愛之如父母又趙方知青陽縣告其守史彌逺云催科不擾是催科中撫字刑罰無差是刑罰中教化又陳良翰知遂安縣俗號强梗吏治尚嚴良翰獨撫以寛催科不下文符但揭示名物民競樂輸聽訟咸得其情或問何術良翰曰無術但公此心如虚堂懸鏡耳又葉顒知上虞縣凡徭役令民自推排貨力甲乙不以付吏民忻然皆以實應催租各盡其數與民約使自持戸租至庭親視人咸便之又李南公調楚江令郡猾吏恃守以陵縣不輸負租南公捕繫之守怒通判為謝曰能按郡吏健令也卒寘諸法又董文炳以父任為藁城令同列皆父時人輕文炳年少吏亦不之憚文炳嚴於聽斷以恩濟威未幾同列束手下之吏抱案求署字不敢仰視里人亦大化服又李衡知厯陽縣専以誠意化民夏秋二稅以期日牓縣門鄉無吏迹而自輸送催課先他邑辦完又陳希亮以殿中丞徙知鄠縣巫覡歲斂民財祭鬼謂之春齋否則有火灾希亮禁之民不敢犯火亦不作毁滛祠數百區勒巫為農者七十餘家遼南面官縣皆有令金縣各有令品秩有差大興宛平為赤縣從六品次赤縣又曰劇縣正七品諸縣從七品凡縣二萬五千戸以上為次赤為劇二萬戸以上為次劇在諸京倚郭者曰京縣自京縣而下以萬戸以上為上三千戸以上為中不滿三千戸為下中元諸縣置逹嚕噶齊一人尹一人品秩各有差至元三年合併江北州縣六千戸以上為上縣二千以上為中縣不及二千者為下縣二十年又定江淮以南三萬戸以上為上縣秩從六品一萬戸以上為中縣秩正七品一萬戸以下為下縣秩從七品吕思誠受蓨縣尹差民戸為三等每春行田樹育勤敏者賞以農器地無遺力印識文簿令社長藏之季月報縣不孝弟不事生産者悉出之罰其輸作胥吏至社者何人用飲食若干多者責償其直又歐陽元調蕪湖縣尹縣多疑獄久不决元察其情皆為平反貢賦徴發必及時民樂趨事又干文傳歴長洲烏程兩縣尹所至俱為善政長洲為文傳鄉邑徙榻公署無事未嘗輙出而親舊莫敢通私謁明各縣置知縣一人掌一縣之政秩皆正七品唯順天府之宛平大興秩正六品洪武元年徴天下賢才為府州縣職敕命厚賜以勵其亷恥又敇諭之至於再三十七年定府州縣條例八事頒示天下永為遵守是時天下州府縣官亷能正直者必遣行人齎敇往勞増秩賜金仁宣之際猶然英憲而下日罕自後益重内輕外此風絶矣計天下縣凡一千一百七十有一范希正舉賢良方正拜曹邑令九載考滿民懐其惠争持金帛贈遺皆不納有里長陳彬伺希正獨居懐金潛入投於地疾趨而出時無吏卒無能追及明旦出召彬彬不至乃召其父至庭諭之曰大丈夫不為昭昭信節不為冥冥墮行命領其子所遺金去其父赧愧領金而去又御史盛顒以言石亨出知束鹿邑豪士聞其來相戒曰是嘗劾石總兵者其人不可犯也顒至變搏擊而為拊循吏畏而民安之不復用刑罰有爭訟者諭之以理輙聽受不復辨鄰邑訟多年不决者各來詣顒訴折以片言必心服而去時人有清如水明如鏡之謡又徐九思令句容生平不嗜肉惟啜菜佐脫粟又嘗圖一青菜於堂曰民不可有此色士不可無此味又徐甫為武平令邑當閩越之界山冦蟠結時擾城邑吏無寧廨他吏得此輙不欲往甫拜命欣然擕一僕兼程就道至則拊循其民歲餘逺近化之即藪澤諸冦亦皆傾心向化又以計擒他盗藪澤一空臺使者奏其績為一時縣令之最總論縣佐丞主簿尉五百附唐制各縣有丞主簿尉等官員數品秩各有差宋如唐制遼金亦如之元諸縣或置或兼視其縣之繁簡别置典史或二人或一人明亦有丞簿無尉各置典史與元同丞唐制京縣二人畿縣上縣中縣中下縣下縣皆一人貳知縣事宋初不置仁宗天聖中因蘓耆請開封兩縣始各置丞一人於有出身幕職令録内選充神宗熙寧四年諸路州軍繁劇縣令戸二萬以上者増置丞一人徽宗大觀中仇愈調髙宻丞俗尚嚚訟愈攝縣事剖决如神事無淹夕又劉清之調萬安縣丞時江右大祲郡檄視旱徒歩阡陌親與民接凡所蠲除悉得其實請均境内之地為八俾有粟者分賑其鄉官為主之規畫防閑使大家得錢細民得米兩適其便民甚頼之建炎元年詔縣丞係嘉祐以前員缺并萬戸處存留一員餘並罷寧宗嘉定後小邑不置丞以簿兼遼南面官各縣皆有丞金亦各縣置一人掌貳縣事元惟上縣置丞一人中縣下縣皆不置明亦各縣置丞一人洪武初周再由進士為新化縣丞在官以亷謹聞騐民貧富及丁稅多寡第為上中下籍記之遇有賦役隨輕重使之故民不擾而事易集由是流民歸者益衆以課最陞考功主事既而縣民詣闕乞令再任上命復以為縣丞仍令吏部宴賞而遣之又劉亨為武進縣丞有治行惠帝建文三年賜璽書又劉幹為長洲縣丞每出勸農周行塍壠呼老畯問疾苦慈孺之色溢於顔面所至民歡迎曰父母來矣又陶魯為新㑹丞方弱冠時廣有猺賊流刦盡雷亷髙肇之境魯率民守城築寨堡中立以捍東西冦之衝築輔城以衛城浚外溝以輔衛城布鐡蒺藜植刺以衛溝立寨分兵相援邑之勢如腹心相聨絡賊至不得犯父老曰吾等保妻子長子孫皆陶丞之功也分掌糧馬廵捕之事主簿唐於京縣置二人餘俱一人宋真宗咸平四年王欽若言川陜縣五千戸以上請並置主簿其餘仍以尉兼從之自後川蜀及江南諸縣各増置主簿南渡後置簿掌出納官物銷注簿書遼南面官各縣皆有主簿世宗天禄五年詔縣主簿政事省差注金各縣皆有主簿一人掌同縣丞元各縣皆有簿一人明亦置一人與縣丞分掌糧馬廵捕之事尉唐制京縣六人畿縣上縣俱二人中縣中下縣下縣皆一人分判衆曹收率課調宋建隆三年每縣置尉一人後開封祥符増置一人掌閲習弓手戢姦禁暴南渡後沿邊諸縣間以武臣為尉遼南面官各縣皆有尉金赤縣置四人各縣皆置一人元各縣亦有之主捕盗之事别有典史或二人或一人明無尉有典史一人典文移出納五百本為執楚導引之人各代皆不特置唐以後皆無此職名鄉官鄉官自宋迄明皆不置止為職役鎮戌關市官唐制上鎮將一人鎮副二人中鎮將一人鎮副一人下鎮將一人鎮副一人上戍主一人戍副一人中戍主一人下戍主一人掌捍防守禦上關令一人丞二人中關令一人丞一人下關令一人掌禁末游察姦慝宋有鎮砦官無定員遼南面邊防官有安撫使司招安使廵檢使金有諸知鎮知城知堡知寨潼關關使兼譏察官掌關禁譏察姦偽及管鑰啓閉副譏察掌任使之事其居庸關紫荆關通㑹關㑹安及他關皆設使大慶關管勾河橋官兼譏察事一人掌解繫浮橋濟渡兼管譏察姦偽同管勾一人孟津渡譏察一人副譏察一人掌譏察姦偽又有提舉秦藍兩關提舉同提舉提舉三門集津南北岸㳂淮譏察使其諸邊將正將一人副將一人部將一人掌廵守邊境元各處置托克托和斯正一人副一人掌辨使臣奸偽明洪武二年以廣西地接猺獞始於關隘衝要之處設廵檢司以警奸盗後遂増置各處十三年二月特賜敇諭尋改為雜職按杜佑通典云關令古官戍主普宋之顯職鎮將後周之通班以唐所置卑賤與隋制同故舉隋而已今考金之各關使譏察官提舉官及諸知鎮知城知堡知寨并各邊將皆六七八品官元之托克托和斯為從五品明之廵檢為從九品均非顯職惟遼之安撫招安廵檢諸使則莫能知其品秩也致仕官唐制致仕之官五品以上及解官充侍者各給半禄宋凡文武朝官内職引年辭疾者多増秩從其請或加恩其子孫太祖乾德元年太子太師致仕侯益來預郊祀帝優待之因詔曰羣臣列位自有通規舊徳來朝所宜加禮且表優賢之意用敦尚齒之風自今一品致仕官曾帶平章政事者每遇朝㑹宜綴中書門下班二年令藩鎮帶平章政事求休致者亦如之真宗咸平五年詔文武官年七十一以上求退者許致仕景徳元年三月詔凡升朝官遇慶恩父在者授致仕官仁宗景祐三年詔致仕官如大兩省大卿監正刺史閤門使以上歲時賜羊酒米麫令所在長吏常加存問侍御史司馬池言文武官年七十以上不自請致仕者許御史臺糾劾以聞神宗元豐三年詔自今致仕官遇誕節及大禮許綴舊班徽宗政和中提督廣東學事孫璘言諸州致仕官居鄉者乞許令赴貢士宴從之明唯宰臣致仕在籍或遣行人賜敕諭存問或賜白金綵幣然終明之世亦不過數人而已欽定續通典卷三十七
