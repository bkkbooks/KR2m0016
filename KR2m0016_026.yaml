  - {type: page-break, offset: 0, content: '', id: KR2m0016_WYG_026-1a, image: WYG0639/WYG0639-0381a.png}
body:
  text: 職官尚書上尚書省並總論尚書尚書省事無不總所以領紀綱熙庶績百寮所統屬王命所出納也唐制尚書省典領百官管屬吏户禮兵刑工六部尚書庶務皆會決焉凡上之逮下其制有六一曰制二曰敕三曰册天子用之四曰令皇太子用之五曰教親王公主用之六曰符省下於州州下於縣縣下於鄉下之達上其制有六一曰表二曰狀三曰箋四曰啓五曰辭六曰牒諸司相質其制有三一曰關二曰刺三曰移凡授內外百官之事皆印其發日為程一曰受二曰報諸州計奏達京師以事大小多少為之節凡符移關牒必遣於都省乃下天下大事不決者皆上尚書省凡制敕計奏之數省符宣告之節以嵗終為斷尚書令一人左右僕射左右丞各一人肅宗至德以後其職常闕左右郎中員外郎各一人都事六人主事六人至宋而列於門下中書兩省之後有法式事上門下省審覆其權較前代已輕矣宋制尚書省掌施行制命舉省內綱紀程式受付六曹文書聽內外辭欣奏御史失職考百官庶府之治否以詔廢置賞罰曰吏部曰戶部曰禮部曰兵部曰工部曰刑部皆𨽻焉凡天下之務六曹所不能與奪者總決之應取裁者隨所𨽻送中書省樞密院事有成法則六曹準式具鈔令僕射丞檢察簽書送門下省畫聞審察吏部文武官注擬及封爵承襲賜勳定賞之事朝廷有疑事則集百官議其可否凡更改申明敕令格式一司條法則議定以奏覆太常考功諡議亦如之季終具賞罰勸懲事付進奏院頒行於天下大祭祀則警戒執事官設官九令左右僕射左右丞左右司郎中員外郎各一人神宗元豐四年詔尚書都省及六曹各輪郎官一員宿直五年詔得旨行下並用劄子哲宗紹聖元年詔在京官司所受傳宣內降隨事申尚書省或樞密院覆奏二月詔尚書省彈奏六察御史糾不當者理宗寶祐元年罷尚書省以呈白房代之遼南面官尚書省有尚書令左右僕射左右丞左右司郎中員外郎等官金尚書省總領六部尚書為端揆首席自正隆元年罷中書門下兩省政務專歸尚書省職隆權重幾同於古之尚書省矣設官十五尚書令一員左右丞相二員平章政事二員參知政事二員左右司郎中二員左右司員外郎二員都事四員其官屬有尚書省祗候郎君架閣庫管勾同管勾堂食公使酒庫使副使直省局局長副局長管勾尚書省樂工等官又設行臺尚書省凡官品皆下中臺一等始自太宗天會元年封劉豫為蜀王置行臺尚書省於汴以後大名路撫州北京婆速路上京益都陜西河北東平平陽邳州京兆衛州鞏昌閺鄉京東路陜州京東山東路鄧州徐州陳州皆置行省焉因事設官官不必備元尚書省罷而復置置而旋罷自世祖至元七年罷制國用使遂立尚書省以阿合馬麥术丁等為之舊制銓選各官吏部按資品呈尚書省由尚書省咨中書省然後聞奏是時不由部擬不關白中書以尚書省奏定條畫頒天下尋併入中書省二十四年仍立尚書省以僧格特穆爾為平章等官詔天下除行省與中書議行餘並聽尚書省從便以聞向宣敕尚由中書至是併歸尚書省其權至重二十八年罷之成宗大德十一年詔復立尚書省分理財用仍令自舉官屬政務皆從宜處置併敕尚書省事務繁重諸司有才識明達者併從尚書省選任樞密院御史臺及諸有司毋輒奏用是時中書省與樞密院皆無權職焉仁宗即位即罷之明不置尚書省設四部屬中書省分掌錢榖禮儀刑名營造之事太祖洪武元年始置六部設尚書侍郎郎中員外郎主事仍𨽻中書省是時政事皆由中書省出尚書待申覆於中書省十三年革中書省盡分其政於六部而尚書之權始重孝武兩朝機務悉掌於內閣尚書漸輕至世宗以後部臣竟聽命於內閣矣自成祖永樂元年以北平為北京置北京行部尚書二人侍郎四人其屬置六曹清吏司後又分置六部各稱行在某部十八年定都北京罷行部及六曹以六部官屬移之北不稱行在其留南京者加南京字仁宗洪熙元年復置各部官屬於南京去南京字而以在北京加行在字仍置行部宣宗宣德三年復罷行部英宗正統六年於北京去行在字於南京仍加南京字遂為定制南京部臣政權不屬職事髙簡為人臣養望之地非古之行尚書省也録尚書録尚書自隋已無宋遼金元明皆無之尚書令唐自太宗為秦王時曽任尚書令髙宗龍朔後即廢此職至代宗廣德二年以郭子儀勳業隆髙進拜尚書令懇辭不聽詔趣詣省視事並敕射生五百騎執戟寵衛子儀確讓奏言太宗嘗踐此官故纍聖曠不置員皇太子為雍王定關東乃得授詎可猥私老臣隳大典且用兵以來僭賞者多至身兼數官冒進無恥今作法審官之時從老臣始帝不獲已許之具以所讓付史官自是之後終無拜此官者宋制尚書令掌佐天子議大政奉所出命令而行之其屬有六曹凡庶務皆會而決之凡官府之紀綱程式無不總焉大事三省統議則同執政官合班小事尚書省獨議則同僕射丞分班論奏若事由中書門下而有失當應奏者亦如之與三師三公侍中中書令俱以册拜自建隆以來不除惟親王元佐元儼以使相兼領不與政事徽宗政和二年詔尚書令太宗皇帝曽任今宰相之官已多不須置然是時説者謂為令者唐太宗宋太宗未嘗任此係時相蔡京不學之過宣和七年詔復置令亦虛設其名無有置者南渡後並省不置遼尚書省有尚書令景宗保寧中以蕭思溫為尚書令金尚書令為最尊之官總領紀綱儀刑端揆統屬六部尚書金印駝紐世宗大定九年除拜李石為尚書令詔曰太后兄弟惟卿一人故命領尚書事軍國大事涉於利害議其可否細務不煩卿也是時尚書令不輕授張浩以舊官完顔守道以功徒單克寧以顧命他罕有授者元尚書省置罷不常其置省時設丞相二人平章二人參政二人武宗至大二年立尚書省詔太子兼尚書令飭百官有司振紀綱重名器夙夜以赴事功至四年即罷不設尚書省無尚書令僕射左右丞左右司郎中員外郎附左右僕射唐制各一人掌統理六官為令之二令闕則總省事劾御史糾不當者德宗興元以後率以左右僕射為宰相貞元三年以左僕射張延賞同中書門下平章事九年以右僕射賈耽同中書門下平章事文宗太和元年以左僕射王播同中書門下平章事開成四年以右僕射李德裕同中書門下平章事武宗會昌二年以右僕射李紳同中書門下平章事懿宗咸通二年以左僕射杜悰同中書門下平章事昭宗天復三年以右僕射裴樞同中書門下平章事宋制左右僕射掌佐天子議大政二令之職與三省長官皆為宰相之任大祭祀則掌百官之警戒視滌濯告潔贊玉幣爵坫之事自官制行不置侍中中書令以左僕射兼門下侍郎右僕射兼中書侍郎行侍中中書令職事哲宗元祐中范純仁為右僕射務以博大開上意忠厚革士風又司馬光為左僕射既而詔免朝覲許乘肩輿三日一入省每過闕廷衛士皆以手加額又李沆為右僕射日取四方水旱盜賊之事奏之王旦以為細事不足煩帝聽沆曰人主少年當使知四方艱難不然恐留意聲色也達者服其逺見政和中詔曰昔我神考訓迪厥官有司不能奉承仰惟前代以僕臣之賤充宰相之任可改左僕射為太宰右僕射為少宰欽宗靖康元年詔依元豐舊制復為左右僕射南渡後置左右丞相省僕射不置遼尚書省置左右僕射大祖神册三年以韓知古為左僕射太宗會同元年以烈束為右僕射太祖初以康默記為左尚書金尚書省不設僕射置左丞相右丞相各一員平章政事二員即為丞相掌輔天子平章萬機佐尚書令統領庶政職與古之僕射同元置尚書省時有丞相平章參政等官無僕射之職明亦無僕射之官左右丞唐制各一人掌辨六官之儀劾御史舉不當者左丞總吏戶禮三部右丞總兵刑工三部貞元九年盧邁以尚書右丞同中書門下平章事太和四年宋申錫以尚書右丞同中書門下平章事宋制左右丞掌參議大政通治省事以二令僕射之職僕射輪日當筆遇假故則以丞權當筆知印大祭祀酌獻薦饌進熟則受爵酒以授僕射舊班六曹尚書下官制行升其秩為執政元豐五年詔左右僕射丞合治省事南渡後復置參知政事省左右丞不置遼尚書省置左丞右丞金尚書省置左丞右丞各一員參知政事二員為執政官為宰相之二佐治省事元至元二十四年立尚書省置左右丞各一人二十八年即罷至大二年復立尚書省置左右丞各一人四年即罷後不復置明不設尚書省無左右丞左右司郎中左右司員外郎唐制各一人為丞之二初置驛百人乘傳送符至德後廢宋制尚書省有左右司郎中左右司員外郎各一人所掌見宰相官屬髙宗建炎三年詔減左右司郎官二員四年仍置四員遼尚書省置左右司郎中左右司員外郎金尚書省左右司郎中各一員左右司員外郎各一員所掌詳宰相官屬元尚書省廢置不常官屬少見其中書省有左司郎中二員員外郎二員右司郎中二員員外郎二員所掌詳宰相官屬明置中書省時有左右司郎中左右司員外郎洪武十三年罷中書省後即不置厯代尚書唐承隋制分為吏部戶部禮部兵部刑部工部為六部每部尚書一人共六人皆屬於尚書省玄宗天寶十一載改吏部曰文部兵部曰武部刑部曰司憲至德二載復舊宋承唐制分吏部戶部禮部兵部刑部工部為六部每部尚書一人共六人元豐以前皆以他官判部事官制行始令每部尚書一人各掌其事元祐時六曹皆置權尚書以處未應資格之人南渡後六部長二互置惟吏部尚書不省亦惟吏部官階獨崇於别部焉吏部以金紫光祿大夫换授戶禮兵刑工以銀青光祿大夫换授遼南面官六部各有尚書員數不可考按遼史百官志紀六部職名總目祗載開泰元年見吏部尚書劉績他部俱不詳載是時六部為南面之官其職分皆倣唐制大約六部皆置尚書而史僅載某部尚書某人以實之者殆修遼史時已無可考也金制吏部户部禮部兵部刑部工部為六部各置尚書一人共六人元制吏部户部禮部兵部刑部工部為六部每部置尚書三人共十八人較前代為獨多自中統逮至元中增損不一中統元年以吏戶禮為左三部置尚書二人兵刑工為右三部置尚書二人至元元年以吏禮自為一部置尚書三人分立戶部置尚書三人以兵刑自為一部置尚書四人分立工部置尚書四人五年又合為吏禮部尚書仍二人分立戶部尚書一人合兵刑部置尚書二人其工部如舊十三年分置吏部置尚書七人戶部增尚書一人别立禮部置尚書一人别立兵部置尚書一人刑部置尚書一人工部置尚書二人十九年裁吏部尚書二人二十八年定六部尚書員額各二人繼即加增一人自後每部各置三人遂為定制以後不易明制分吏部戶部禮部兵部刑部工部為六部各部置尚書一人景帝景泰中吏部嘗設二尚書至英宗天順初復罷其一别立總督倉場户部尚書一人宣德中始命官專理糧儲不治部事其後或用尚書或用侍郎具户部尚書篇提督團營兵部尚書一人景泰中始設是官其後廢置具兵部尚書篇或置或罷沿革不一南京仍置吏部戶部禮部兵部刑部工部六部每部尚書一人兵部尚書帶參贊機務銜事權不屬職位髙簡惟六部中最重吏部以其表率百寮進退庶官銓衡重地其禮數殊異無與並者成祖永樂初選翰林官入直內閣其後大學士楊士竒等加至三孤兼尚書銜其品敘總列吏部尚書蹇義夏原吉下孝宗𢎞治六年內宴大學士邱濬遂以太子太保禮部尚書居太子太保吏部尚書王恕之上自後由侍郎詹事入閣者班皆在六部尚書上矣厯代郎官唐制尚書省郎中二人員外郎二人六