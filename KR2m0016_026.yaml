柄悉歸於兵部故省罷之今補載於三省之後尚書之前以其位同宰相而秩崇於尚書也樞密使知院事同知院事簽樞密副使都簽書院事同書院事承旨副都承旨客檢詳官斷計議官編修官省使事官樞密院唐代宗永泰元年始置設內樞密使以宦者為之職掌內外表奏凡帝有所處分則宣付中書門下施行而已僖宗時楊復恭欲奪宰相權乃於堂狀後貼黃指揮公事自是樞密使始重梁改為崇政院以敬詳為使自後始不用宦者後唐莊宗同光元年復改崇政院為樞密院時以宰臣郭崇韜為使又制院使一人權侔宰相晉髙祖天福元年復置樞密院以桑維翰知樞密院四年罷之出帝開運元年復置周亦置樞密院世宗顯德六年以范質王溥參知院事宋置樞密院掌軍國機務兵防邊備戎馬之政令出納密命以佐邦治凡侍衛諸班直內外禁兵招募閲試選補屯戍賞罰之事皆掌之除授內侍省官及武選官將領路分都監緣邊都巡檢使以上大事則稟奏其付授者用宣小事則擬進其付授者用劄先具所得旨關門下省應給告者關中書省命詞樞密使無定員率以宰臣兼之熙寧中陳升之三至樞府神宗欲稍異其禮乃以為知院事官制行定置知院一人宋初曹彬為樞密使位兼將相不以等威自異遇士大夫於途必引車避之又王顯授樞密使帝謂之曰卿世家本儒遭亂失學今典朕機務無暇博覽羣書能熟軍戒三篇亦可免於面墻矣因取是書賜之仁宗慶厯中杜衍為樞密使范仲淹出衍門下時為參知政事數爭事上前衍無慍色而仲淹亦敬服之又龎籍為樞密使以近世繕兵之弊多而國用困竭於是大加簡閲揀放為民者六萬餘人減其衣糧之半者二萬人邊儲由是稍蘇焉又文彥博為樞密使時以陳升之為宰相詔彥博朝廷重臣其令升之位彥博下以稱遇賢之意彥博曰國朝樞密無位宰相上者臣忝知禮義不敢紊朝廷大典固辭乃止又周必大拜樞密使上諸軍升差籍時點召一二察能否主帥悚激無敢容私創諸軍典試法其在外解發而親閲之池州李忠孝自言正將二人不能開弓乞罷軍帝曰此樞密使措置之效也建炎元年置御營司以宰相為使四年罷以其事歸樞密院機速房仍以宰臣兼樞密使遼北樞密院掌兵機武銓羣牧之政有北院樞密使南樞密院掌文銓部屬丁賦之政同吏部亦有樞密使南面官樞密院有樞密使太宗大同元年以李嵩為樞密使金樞密院有樞密使一人掌武備機密之事章宗泰和六年嘗改為元帥府後復為樞密院元樞密院掌天下兵甲機密之務不置樞密使以知院領之又有行樞密院有大征伐則置專為一方一事而設官無定員中統四年置西川成都行樞密院設官二員至元十年又於重慶别置行樞密院設官一員十三年并為一院尋復分東川行院十六年罷兩川行院二十八年復立四川行院於成都江南行樞密院山東行院揚州嶽州行院松江行院江西行院江淮行院俱於至元二十八年罷歸行省甘肅行院至大四年置後遂罷河南行院泰定帝致和元年置文宗天厯元年罷二年置嶺北行樞密院掌邊廷軍務故不罷明初亦置行樞密院後罷之改為大都督府尋又改為五軍都督府五軍都督府係武職應列在武官卷中故不載其官知院事宋置神宗熙寧時以陳升之三至樞府時文彥博吕公弼為使韓維邵允為副使乃以升之為知院事自後知院與副使並置元豐官制行乃定知院二人為制遼北面官有知北院樞密使事知北院樞密院事南樞密院亦有知南院樞密使事知南院樞密院事南面官有知樞密使事知樞密院事金無知院事元知院事即樞密使至元二十八年始置知院一人大德十年增置二人至大三年置七人仁宗延祐四年以分鎮北邊增置一人五年定知院員額為六人同知院事宋始置為樞密使知院事之二元豐官制行定同知院事為二人時向敏中同知樞密院事值西北用兵敏中明敏有才略遇事敏速凡二邊道路斥堠走集之所莫不周知乾道中劉珙同知樞密院珙以職操兵柄於諸將之能否不可不周知乃自諸管軍統職官下至禆佐日召數人與語得其才用所宜輒筆記之以待選用又葉顒同知樞密院事武臣梁俊彥請稅沙田蘆場帝以問顒對曰沙田乃江濱地田隨沙漲出沒不常蘆場非臣所知也且辛巳軍興蘆場田租並復今沙田又不勝其擾矣帝曰誠如卿言是日詔沙田蘆場並罷稅遼北面官北樞密院有同知北院樞密使事南樞密院亦有同知南院樞密使事南面官樞密院有同知樞密院事聖宗太平六年以耶律迷離已同知樞密院事金無同知樞密院事元至元七年置同知樞密院事一人二十八年又以中書平章商量院事大德十年增至五人至大三年定同知為二人罷議事平章延祐時增同知為四人遂為定額時康里托克托同知樞密院事微伯爾率諸王同附詔特設宴於大廷托克托即席陳西北諸藩始終離合之由去逆效順之義詞旨明暢聽者悅服樞密副使宋初置為樞密使知院事之二元豐五年罷之韓琦為樞密副使兩府合班奏事琦必盡言雖屬中書琦亦對上陳其實同列多不悅帝獨識之曰韓琦剛直又歐陽修為樞密副使考天下兵數及三路屯戍多少地里逺近更為圖籍凡邊防闕屯戍者必加增補又吕公著拜樞密副使初自河陽入朝士民相慶既受命出殿門武夫衛卒皆歡忭咨歎遼北面官北樞密院有北院樞密副使知北院樞密副使事南樞密院有南院樞密副使知南院樞密副使事南面官樞密院有樞密副使知樞密副使事興宗重熙十二年以楊晳知樞密院副使事金樞密副使一人泰和四年增一人後即罷元中統四年置樞密副使二員成宗大德十年增至五人武宗至大三年減至二人後遂為定制簽書院事宋初以直學士為簽書院事元豐官制行罷之元祐初復置仍以直學士充胡松年簽書樞密院事首奏八事立規模以定中興之基振紀綱以尊朝廷之勢馭將帥使知畏撫士卒使知勸收豫奪之柄察毁譽之言無以小疵棄人才無以虛文廢實學遼北面官北樞密院有簽書北樞密院事南樞密院有簽書南樞密院事南面官有樞密直學士聖宗統和二年郭嘏為樞密直學士金置簽書樞密院事一人元中統四年置簽書樞密事一人大德十年增至五人至大三年減至一人延祐四年定以二人為額同簽書院事宋英宗治平末始置以殿前都虞侯郭逵為之後以逵改除宣徽南院使知鄆州即不復置政和六年以內侍童貫帶同簽樞密院銜宣撫陜西河東北三路後又改為權領樞密院髙宗紹興後仍為同簽並為端明殿學士恩數特依執政或以武臣為之亦異典也遼北南面樞密院皆無同簽書之官金同簽樞密院事一人大定十七年增一人尋罷章宗明昌初復增一人尋又罷三年九月復增一人元大德十年設同簽三人至大三年減為一人延祐四年復增一人都承旨宋置掌承宣旨命通領院務初用院吏熙寧五年以同修起居注曽孝寬兼之參用儒臣自孝寬始元豐四年以客省使張誠一為都承旨用武臣自誠一始其後文武臣並用焉遼北面官北樞密院有北院都承旨南樞密院亦有南院都承旨南面官樞密院有都承旨聖宗開泰元年以韓紹芳為樞密院都承旨金無都承旨元置院判二人參議二人亦不置都承旨副都承旨宋置掌二都承旨文武臣並除遼北面官北樞密院有北院副承旨南樞密院有南院副承旨南面官樞密院有副承旨重熙中以楊遵最為副承旨金元皆無檢詳官宋熙寧四年始置稽察文移檢正公事元豐初定以三人官制行罷之建炎三年復置二人紹興二年減一人遼無檢詳官其北面官北樞密院有北南樞密院點檢中丞司事總知中丞司事左右中丞同知中丞司事侍御等官南院亦如之南面官樞密院有吏兵戶􅈦四房丞旨金置經厯一人都事一人掌受事付事檢勾稽失省署文牘兼知宿直之事即宋檢詳之職元置經厯二人都事四人職掌與金同計議官宋初置建炎四年罷御營使司併歸樞密院為機速房隨司減罷屬官别置幹辦官四人詔並改為計議官紹興十一年罷之遼金皆不設編修官宋初置無定員多以本院官兼之熙寧紹聖之間隨事而置紹興初乃定置二人遼不設金置知法二人掌檢斷各司取法之事職與編修官略同元亦不設客省使元置大使二人副使二人屬樞密院斷事官元置掌處決軍府之獄訟至元元年始置斷事官二人八年增置二人十九年又增一人二十年又增一人大德十年又增四人仁宗皇慶元年省罷二人後定置八人所屬經厯一人𨽻樞密院欽定續通典卷二十六
