body:
  text: 刑决斷唐五代宋遼金元明唐徳宗時維揚有富室子父亡事繼母不謹一日上夀母賜之觴子覆於地地墳因號於衆曰母將酖我訴之州刺史杜亞曰酒何從來曰長婦執爵而致亞曰爾婦執爵毒由婦起何故誣母乃分别鞫之實子婦計誣其母遂伏法憲宗元和中吕元膺鎮岳陽出行見有喪轝駐道左男子五人衰服從元膺曰逺葬則侈近葬則省此姦也令搜其棺中皆兵刃曰欲謀過江掠貨假喪使渡者不疑耳劾之更同黨數十已集彼岸並擒付法後唐明宗天成三年滑州掌書記孟昇匿母憂大理寺斷流敕曰孟昇身被儒冠職居賓幕比資籌盡以贊綱維而乃都昧操修但貪榮禄匿母喪而不舉為人子以何堪凟汚時風敗傷名教五刑是重十惡難寛其賜自盡觀察使觀察判官録事參軍失其糾察各有殿罰四年蔡州西平縣令李商為百姓告陳不公大理寺斷止贖銅以官當罪敕㫖李商招愆俱在案欵大理定罪備引格條然亦事有所未圖理有所未盡古者立法意在惜人喪亂已來人鮮㢘恥朕一臨寰海思革前非毎當用刑惟期不濫李商不務養民專謀潤己初聞告不公之事件决彼狀頭又為奪有主之莊田撻其本户國家給州縣篆印止為行遣公文而乃將印厯下鄉從人户取物據茲行事何以當官今王饒所告李商並招實罪宜奪厯任官重杖一頓處死元論人王饒四人並宜釋放仍令所在長吏徧示官屬長興二年國子勒停官張崇逺受賂補人法寺定罪為無禄者減死一等又引四月二十六日恩赦俾從釋放帝問崇逺本官乆無錢料今有春冬逐月糧乃下詔曰設禄任能立法懲惡苟有違犯須舉憲刑崇逺流外授官監中守職雖官不請於俸禄而職見請於依糧贓罪既彰死刑難貸宜决重杖一頓處死澤州沁水縣令李照主簿樂鈞兩相鬬毆及追至本州不肯交割牌印大理刑部斷罪准律當徒及罰銅並該今年四月二十六日恩宥敕㫖同官相毆據法當徒大理備陳格律合議矜寛但照鈞等處令佐之資縱屠沽之行既罵且鬬自晝經宵加以抗拒使符執留縣印全乖事體大紊紀綱若謂偶在敕前合從敕限豈可遣茲兇輩親我疲民免刑已是優宏復職實非允當其照鈞等並勒停見任四年獲嘉縣令盧嵩以户民闗延韜不伏責問喧悖令從人曳撲致死大理寺斷准格配流天徳敕㫖盧嵩容易宰邑造次怒人不恕法以行刑遂尋時而致死原情則本非故殺據律則當處極刑但究彼根繇以縁公事罪雖甚重理稍可疑峻行則慮致民驕輕恕則恐滋吏酷永從逺竄特貸餘生聊以慰往者之魂兼可戒為官之厲嵩宜配蔚州長流百姓逢赦不在放歸之限宋太祖開寶五年峽州言民范義超周顯徳中以私怨殺同里人常古真家十二口古真小子留留脱走得免至是長大擒義超訴於官有司引赦當原帝曰豈有殺一家十二口而可以赦論即命斬之太宗太平興國九年鳯翔司理楊酀許州司理張睿並坐掠治平人及亡命卒致死大理處酀等公罪刑部覆以私罪詔曰法寺以酀等本非用情宜從公過議法刑部以其擅行掠治合以私罪定刑雖所執不同亦未為乖當國家方重惜人命欽恤刑章豈忍無辜之人死於酷吏之手宜如部議著為令張詠知崇陽縣一日吏自庫中出見其鬢旁巾下有一錢詰之庫中錢也詠命杖之吏勃然曰一錢何足道乃杖我耶爾能杖我不能斬我也詠援筆判云一日一錢千日千錢繩鋸木斷水滴石穿自仗劒下階斬其首申府自劾後知益州有僧行止不明有司執以白詠詠判牒曰勘殺人賊既而按問果一民也與僧行於野殺僧取其祠部戒牒及衣遂自披剃為僧寮屬問何以知之詠曰吾見其額上猶有繫巾痕也民間訛言有白頭翁午後食人男女郡縣譊譊至暮路無行人詠謂其屬曰汝歸縣去但訪市肆中為鄉里患者必大言其事即立證解來明日果得之乃倡為訛言者戮之於市民遂帖然李順黨與有殺耕牛避罪亡匿詠許其首身拘其母十日不出釋之復拘其妻一夕而來詠斷云禁母十日留妻一宵倚門之望何疎結髮之情何厚舊為惡黨今又逃亡許令首身却猶觀望就市斬之於是首身者踵至真宗咸平二年以工部侍郎出知杭州有與其姊壻訟家財者壻言婦翁疾篤子纔三嵗令壻主其貲遺書言異日分財即以十之三與子七與壻願如約詠曰汝婦翁智人也時以子幼故以此屬汝不然子死汝手矣命以七給其子餘三與壻皆泣謝而去韓億知洋州有富民李甲喪兄而迫嫁其嫂又誣姪為他姓子而並其資産嫂訟之十餘嵗吏受賂不得直億按舊牘獨未嘗證以乳醫遂密致乳醫以騐决衆皆詘服張齊賢復相日戚里有以分財不均互相爭訴既入宫自理於上前更十餘斷不服齊賢請自治帝許之召訟者曰若非以彼得分多若獨少乎皆曰然命具欵乃召兩吏趨歸其家甲家入乙舍乙家入甲舍貲財皆按堵如故先分書交易之訟者乃止仁宗至和中王疇為開封判官宦者李允良疑人毒死其叔父訴請發棺騐視疇獨曰騐而無實是無故暴人屍安知非允良有姦既而窮治果引伏與叔家有怨故詭訴也梁適為審刑院詳議官梓州妖人依鬼神以詛殺人獄具以不傷讞適曰殺人以刃或可拒而詛可拒乎卒論死張逸知益州華陽騶長殺人誣道旁行者縣吏受財獄既具乃使殺人者守囚逸曰囚色寃守者氣不直豈守者殺人乎囚始敢言而守者果服立誅之趙抃為武安軍節度推官有偽造印者吏以為當死抃曰造在赦前而用在赦後赦前不用赦後不造法皆不死遂以疑讞之卒竟免神宗元豐中青州民王贇父為人毆死贇幼未能復讐幾冠刺讐斷支首祭父墓自首論當斬帝以殺讐祭父又自歸罪其情可矜詔貸死刺配鄰州宋律復讐無明文先是仁宗時單州民劉玉父為王徳毆死徳經赦玉私殺徳以復父讐帝義之决杖編管宣州民葉元有同居兄亂其妻縊殺之又殺兄子强其父與嫂為約契不訟鄰里發其事州為上請帝曰罪人已死姦亂之事特出元口不足以定罪下民無知固宜哀矜然以妻子之愛既㒺其父又殺其兄戕其姪逆理敗倫宜以毆兄至死論程顥為鄠縣主簿有民借其兄之宅居者發地藏錢兄之子訴曰父所藏也令難其證顥曰此易辯耳問兄子曰而父所藏錢幾年矣曰四十年矣而叔借宅居㡬何時矣曰二十年矣即遣吏取錢十千視之謂借屋者曰今官所鑄錢不五六年即徧天下此錢皆爾未借居時所鑄何也其人不敢爭光宗紹熙初陸九淵知荆門軍民有訴人殺其子者九淵曰不至是及追究其子果無恙有訴竊取而不知主名九淵出二人姓名使捕至訊之伏辜盡得所竊物還訴者且宥其罪使自新因語吏以某所某人為暴翌日有訴遇奪掠者即其人也乃加追治吏大驚寧宗朝黄榦通判安豐軍淮西帥司􅊾榦鞫和州獄獄故以疑未决榦釋囚桎梏飲食之委曲審問無所得一夜夢井中有人明日呼囚詰之曰汝殺人投之於井我悉知之矣胡為欺我囚遂驚服果於廢井得屍遼景宗保寧三年呉王稍為奴所告有司請鞫帝曰朕知其誣若按問恐餘人效之命斬以徇聖宗統和時有達巴噶者竊薊州王令謙家財復手刃傷主幸不死有司止擬杖罪又訥黙庫犯竊盜者十有三次皆以情不可恕命棄市近侍瑠格諤斯庫嘗從齊王妻而逃以赦後㑹千秋節自首詔諸近侍䕶衛集視而腰斬之由是國無倖民吏多奉職人重犯法金太宗時趙元同知薊州事有殺賊人横道官吏環視莫知所為路人耕夫聚觀甚衆元忽指田中釋耒而來者曰此賊也叱左右縛之一訊而伏僚吏問其故元曰偶得於眉睫問耳熙宗天眷間洪洞令劉徽柔明敏善聽斷縣人揚逺者投牒於縣以夜雨屋壞壓其姪死號訴哀切徽柔熟視而笑曰汝利姪財而殺之乃誣雨耶叱付獄其人立伏曰公神明也不敢延死遂寘於法世宗大定初彰國軍節度使大懷貞嘗以私忌飯僧中一僧舉止異常懷貞問曰汝何許人也曰山西人也復問嘗為盜殺人否曰無之後三日詰盜果引僧皆服其明斷二年率賓軍士珠勒呼等誣完顔黙音子色克寄書其父謀反並以書上之帝覽曰此誣也止訊告者果引伏遂誅之二十三年尚書省奏益都民范徳年七十六為劉祐毆殺法當死以親老無侍請帝曰范徳與祐父母年相若即當如父母視之竟至毆殺難從末減可論如法元太宗三年燕南諸路㢘訪使博囉哈雅充㫁事官有民誤毆人死吏論以重法其子號泣請代博囉哈雅戒吏使擒於市懼則殺之擒之果不懼乃曰誤毆人死情有可宥子而能孝義無可誅遂並釋之使出銀以資埋葬且呼死者家諭之其人悦從世祖至元十四年張雄飛為荆湖北道宣慰使有告常徳富民十餘家與徳山寺僧將為亂衆議以兵討之雄飛曰告者必其讐也且新附之民當以靜鎮之兵不可遽用苟有他吾自任其責遂止徐察之果如所言二十二年籍河東按察使阿哈瑪特家其奴張繖扎爾等罪當死謬言阿哈瑪特家貲多隠寄遂鈎考捕繫連及無辜京師騷動帝頗疑之命丞相安圖集六部長貳官詢問其事吏部尚書布呼密曰是奴為阿哈瑪特心腹爪牙死有餘罪為此言者葢欲苟延嵗月儌幸不死爾豈可復受其誑嫁禍善良耶急誅此徒則怨謗自息丞相以其言入奏帝悟命布呼密鞫之具得其實繖札爾等伏誅其捕繫者盡釋成宗大徳中宗王兄弟二人守邊兄隂有異志弟諫不聽即上馬馳去兄遣奴挾弓矢追之弟發矢斃其奴兄訴囚其弟獄當死刑部尚書王約慮囚曰兄之奴即弟之奴況殺之有故立釋之京民王氏仕江南而歿有遺腹子其女育之年十六乃訴其姊匿貲若干有司責之急約視牘曰無父之子育之成人且不絶王氏祀姊之恩居多誠利其貲寧育之至今日耶改前議而斥之又民柴氏初無子養張氏子為後既而得子張出為僧柴之子又歿僧乃訟家産詔約鞫之約詰之曰汝出家既分承汝師衣鉢又何為得柴氏業乎僧不能答遂歸柴氏應後者仁宗時虞槃為湘鄉州判官有巫妄稱神降告其人曰某方火即火又曰明日某方火民以火告者槃晝夜赴救寢食盡廢縣長吏已下皆迎巫至其家厚禮之又曰將有大水且兵至州大家且盡室逃槃得刼火卒一人訊之盡得巫黨所為坐捕盜司召巫至鞫之無敢施鞭箠者槃謂卒曰此將為大亂安有神乎急治之盡得黨與數十人羅絡内外果將為變乃斷巫並其黨悉如法丹徒縣民有二弟共殺其姊者獄乆不决浙西㢘訪使俾烏程令干文傳鞫之既得其情其母乞貸二子命以終養文傳謂二人所承有輕重以首從論則為首者當死司從其議明太祖洪武元年民父以誣逮其子訴於刑部法司坐以越訴帝曰子訴父枉出於至情不可罪有子犯法父賄求免者詔諭相類具詳讞篇五年楊卓為廣東行省員外郎田家婦獨行山中遇伐木卒欲亂之婦不從被殺官拷同役卒二十人皆引服卓曰卒人衆必善惡異也可盡抵罪乎列二十人庭下熟視久之指兩人曰殺人者汝也兩卒大驚伏罪十七年左都御史詹徽奏民毆孕婦至死者律當絞其子乞代大理卿鄒俊議曰子代父死情可矜然死婦係二人之命犯人當二死之條與其存犯法之人孰若全無辜之子詔從俊議時有告謀反者勘問不實刑部言當抵罪帝以問秦裕伯對曰元時若此者罪止杖一百葢以開來告之路也帝曰姦徒不抵善人被誣者多矣自今告謀反不實者抵罪成祖時葉宗人為錢塘令嘗視事有蛇升階若有所訴宗人曰爾有寃乎吾為爾理蛇即出遣吏尾之入餅肆爐下發之得僵屍葢肆主殺而瘞之也遂伏法宣宗朝顧佐為右都御史臺綱肅然或告其不理寃訴帝曰此必重囚教之命法司㑹鞫果千戸臧清殺無罪三人當死使人誣佐帝曰不誅清則佐法不行磔清於市憲宗成化時華亭縣有民母再醮生一子母死二子爭葬質之官知縣某判其狀曰生前再醮終無戀子之心死後歸墳難見先夫之面令後子收葬穆宗隆慶中張淳為永康令有巨盜盧十八剽庫金十餘年不獲御史以屬淳淳刻期三月必得盜而請御史月下數十檄及檄累下淳陽笑曰盜遁久矣安從捕寢不行吏某婦與十八通吏頗為耳目聞淳言以告十八十八意自安淳乃令他役詐告吏負金繫吏獄密召吏責以通盜死罪復教之請以婦代繋而已出營貲以償十八聞亟往視婦因醉而擒之及報御史僅兩月耳久之以治行第一赴召去永甫就車顧其下曰某盜已來去此數里可為我縛來如言跡之盜正濯足於河繫至盜服辜永人駭其事謂有神告淳曰此盜捕之急則遁今聞吾去乃歸耳以理卜何神之有神宗時右副都御史王世貞撫治鄖陽有姦僧偽稱樂平王次子奉髙皇帝御容金牒行游天下世貞曰宗藩不得出城而譸張如此必偽也捕訊之服辜考訊附唐五代宋遼金元明唐代宗大厯四年詔曰如聞州縣官比來率恣行麤杖不依格令致囚殞斃深可哀傷頻有處分仍聞乖越今後非灼然蠧害不得輒加非理所司嚴加糾察以聞徳宗貞元六年南郊順宗即位制及憲宗元和二年穆宗長慶四年制書並同按古文淵鑑是詔凡兩載一為寶應元年一為大厯四年冊府元龜載為大厯四年大赦常衮集並同考肅宗在位止七年今按詔文云朕主三靈之重托羣后之上夕惕若厲不敢荒寧内訪卿士外咨方岳日不暇給八年於茲代宗于寶應元年即位中厯廣徳二永秦一並大厯四年乃符八年之數當從後為正徳宗建中三年敕諸色貶流人及左降官身死並許親屬收瘞其造蠱毒移鄉人不在此限憲宗元和四年詔自後在京諸司應决死囚者不承正敕並不在行决之限如事跡兇險須速决遣並特敕處分者宜令一度覆奏又敕刑部大理寺决斷罪囚過為淹延是長姦倖今後大理寺檢斷不得過二十日部覆不得過十日如刑部覆有異同寺司重勘不得過十五日省司量覆不得過七日如有牒外州府節目及于京城内勘本推即日以報牒到後計日數被勘司却報不得過五日仍令刑部具遣牒及報牒月日牒報都省及分察使各准敕文勾舉糺訪穆宗長慶元年因御史中丞牛僧孺言立决獄程限大事大理寺限三十五日詳斷畢申刑部限三十日聞奏中事各減五日小事各減十日一狀所犯十人已上所斷罪二十件已上為大所犯六人已上所斷罪十件已上為中所犯五人已下所斷罪十件已上為小其或所抵罪狀與所結刑名並同者雖人數甚多亦同一人之例違者罪有差敬宗即位制諸州府縣官吏應行鞭捶本罪不致死者假以賊情致令殞斃宜委御史臺及出身郎官御史等切加察訪具事繇奏聞文宗太和四年詔自今有特决囚不令覆奏者有司亦須准故事覆奏八年敕天下州府應犯輕罪人除情狀巨蠧法所難原者其他過誤罪愆及尋常公事違法並宜准貞觀四年四月十七日制處分不得鞭背太宗制具杜佑原書開成四年敕御史臺京兆府决囚差御史監决臨時引問囚徒如不稱寃方許行决河南府亦准此諸州應有死囚仍委長官差官監决後唐莊宗同光二年敕見禁囚徒據罪輕重限十日内决遣申奏三年大理寺奏决死刑請不俟秋分詔曰刑以秋分雖闗惻隠罪多連累翻慮淹延若或十人之中止於一人抵死豈可以輕附重禁錮逾時言念哀矜又難全廢其諸司囚徒罪無輕重各宜委本司據罪詳斷分别處决具刑制篇明宗天成二年大理寺奏凡决極刑合三覆奏近年全不守此或蒙赦宥已被刑誅乞敕在京犯極刑者令决前决日各一覆奏有㓙逆犯軍令者亦許臨時一覆奏從之晉少帝開運三年左拾遺竇儼奏近者外地率肆淫刑不遵成憲或以長釘貫篸人手足或以短刀臠割人肌膚乃至累朝半生半死寃聲上達和氣有傷乞嚴加禁斷奉敕宜依宋太祖建隆三年詔強盜持杖但不傷人者止計贓論罪獲盜非狀騐明白未得掠治其當訊者先具白長吏得判乃訊有司擅掠囚者論為私罪太宗太平興國六年詔自今繫囚如證佐明白而捍拒不伏合訊掠者集官屬同問勿令胥吏拷决復建三限之制大事四十日中事二十日小事十日不他逮捕而易决者毋過三日須證逮致稽緩者奏聞違限准官書稽程律論又限大理寺勘决天下案牘大事二十五日中事小事視諸州縣審刑院詳覆大事小事視大理減十日小事減五日仁宗天聖中定制凡上具獄大理寺詳㫁大事期三十日中事小事如淳化制其不待期滿而斷者謂之急按凡集㫁急按法官與議者並疏姓名有失則坐之哲宗時部寺定制凡斷獄每二十緡以上為大事十緡已上為中事不及十緡為小事大事以十二日中事九日小事四日為限若在京八路大事十日中事五日小事三日臺察及刑部舉劾約法狀並十日三省樞密院再送各減半有故量展不得過五日凡公案期限大事以三十五日中事二十五日小事十日在京八路大事以三十日中事半之小事三之一臺察及刑部并三十日毎十日斷用七日議用三日徽宗政和四年立聚問審録之限死囚五日流罪三日杖笞一日孝宗淳熙中詔徒已上罪人入禁三月者提刑司類申刑部置籍立限以督之其後又詔中書置禁奏取㑹籍大臣按閲以察刑寺稽違理宗端平元年詔諸道申奏獄案凡未㫁及已斷未下者於都司刑部大理寺各委官立限催督稽考其經由去處嚴立程限月申御史臺滯按宋代用刑寛厚而自哲宗已前嚴立限程責覈淹亦頗得明慎不留之意南渡而降三尺縦弛至有十餘年不决之獄雖屢詔申督有司抗玩不行亦寖失祖宗之遺意矣至道三年令諸州决死刑有號呼不伏及親屬稱寃者具以白長吏再移司推鞫真宗景徳四年毁諸道官司非法訊囚之具徽宗政和七年詔定制品官犯罪三問不承乃奏請追攝若情理重害而拒隠者方許枷訊今有司廢法不原輕重與常人考訊無異將使人有輕視爵禄之心可申明條令如故又詔宗室犯罪有司承例奏請不候三問未承即加訊問去衣受杖傷膚敗體非所以篤親親也自今有犯除涉情理重害别被處分外餘止以衆證為定仍取伏辯無得輒加捶拷若罪至徒已上方許依條置勘其合廷訊者並送大宗正司重和元年河北西路提㸃刑獄虞奕言州縣虐吏輒借杖為溜筒用鐵鉗項以竹實沙而貫之非理慘酷詔悉禁止犯者以違制論髙宗建炎時大理寺卿王衣奏請分别伏辯先是有司愆戾付寺劾之至三問取伏狀被劾者懼對莫敢辯衣言伏與辯二事也若一切取伏是以威迫之不使自直非法意也乞三問未承者聽辯從之著令諸獄具當職官依式檢校枷以乾木為之輕重長短刻識其上笞杖不得留節目亦不得釘飾及加筋膠之類仍用官給火印州縣獄犴不得輒為非法之具違者論如律紹興十二年御史臺㸃檢錢塘仁和縣獄具錢塘大杖一多五錢半仁和枷一多一斤一輕半斤枷杖輕重定式具刑制篇詔縣官各降一官孝宗時臣僚言杖笞之制輕重大小著令具存凡訊囚合用荆子一次不得過三十共不得過二百此法意也今州縣不用荆子而用籐條或用雙荆合而為一鞭股箠足至三五百刑罰寃濫願戒有司申嚴行下凡守令及掌行刑獄官並依法製杖具刑制篇又言民命莫重於大辟聚録之法官吏聚于一堂依句宣讀無得隱瞞令囚自通重情以合其欵按法意葢不止於只讀成案而已當稽參自通重情以合其欵之文今獄吏憚於平反摘紙疾讀離絶其文嘈囋其語故為不可曉解之音造次而畢呼囚書字茫然引去指日聽刑殊輕人命請敕内外於聚録時委長吏詳加㸃騐具刑制篇又言在律鞫獄者皆須依所告狀鞫若於本狀外别求他罪者以故入論比來中外之獄每於狀外推求牽罣乞申明禁止詔皆從之時二廣州軍畏憲司㸃檢送勘之苦重囚多斃於獄詔提刑司詳覆公事若小節不完不須追逮獄吏委本州究實保明遇有死者必根究其所以致死理宗淳祐十一年詔戒兩淮都統司主兵者不許輕用脊棍以傷人命景定四年詔刑部下諸路憲司所部州縣不許慘酷箠楚並毁除非法獄具違者重置於罰遼制拷訊之具有粗細杖及鞭烙法粗杖之數二十細杖之數三自三十至於六十鞭烙之數凡烙三十者鞭三百烙五十者鞭五百被告諸事應伏而不伏者以此訊之聖宗統和十二年改死囚尸市三日之限一宿即聽收瘞時耶律隆運為北府宰相奏諸鞫獄官吏多因請託曲加寛宥或妾行搒掠乞加禁止從之金國舊制杖罪至百則臀背分受海陵時以脊近心腹禁止雖主决奴婢亦以違制論大定九年復舊尋又罷之世宗大定十七年謂宰相曰比聞大理寺斷獄雖無疑者亦經旬月何耶參知政事伊喇道曰在法决死囚不過七日徒刑五日杖罪三日帝曰法有程限而輒違之是官吏弛慢也詔自今勿得留滯章宗承安四年鑄銅杖式頒行天下泰和元年復因尚書省奏杖式輕細詔量用大杖具刑制篇帝復慮枷杖多不如法平章政事守貞曰枷杖尺寸有制提刑兩月一巡察必不敢違法也初令諸死囚及除名罪所委官相去二百里外並犯徒已下逮及二十人已上者並令就讞刑部員外郎完顔綱言自是制行如上京最近之地往還不下三二千里若北京留守司則動經數月愈致稽留未便詔復從舊令委官追取鞫之元世祖至元十一年禁宋鞭背黥而及非法濫刑二十八年頒行新格定制諸蒙古人居官犯法論罪既定必擇䝉古官斷之刑杖亦如之諸四集賽及諸王駙馬蒙古色目之人犯姦盜詐偽從大宗正府治之諸有司事闗蒙古軍者與管軍官約㑹問諸管軍官鄂囉官及鹽運司打捕鷹坊軍匠各投下管領諸色人等但犯強竊盜賊偽造寶鈔畧賣人口發塜放火犯姦及諸死罪並從有司歸問其鬬訟婚田良賤錢債財産宗從繼絶及科差不公自相告言者從本管理問若事闗民戸者從有司約㑹歸問並從有司追逮三約不至者有司就便歸斷諸州縣鄰境軍民相闗詞訟元告就被論官司歸斷不在約㑹之例斷不當理許赴上司陳訴罪及元斷官吏諸僧道儒人有爭有司勿問止令三家所掌㑹問諸哈達大師止令掌教念經囘囘人應有刑名戸㛰錢糧詞訟並從有司問之諸僧人但犯姦盜詐偽致傷人命及諸重罪有司歸問其自相爭告從各寺院住持本管頭目歸問若僧俗相爭田土與有司約㑹約㑹不至有司就便歸問諸有司非法用刑者重禁之已殺之人輒臠割其肉而去者禁之違者加以重罪諸鞫獄不能正其心和其氣感之以誠動之以情推之以理輒施以大披挂及王侍郎繩索並法外慘酷之刑者悉禁止之諸鞫問罪囚除朝省委問大獄外不得夤夜問事㢘訪司察之諸處斷重囚雖叛逆必令臺憲審録而後斬於市曹諸内外囚禁從各路正官及監察御史㢘訪司以時審錄輕者㫁遣重者結案其有寃滯就糾察之諸正䝉古人除犯死罪監禁依常法有司毋得拷掠仍日給飲食犯真姦盜者解束帶佩囊散收餘犯輕重者以理對證有司勿執拘之逃逸者監收諸審囚官強愎自用輒將䝉古人刺字者杖七十七除名將已刺字去之諸為盜並從有司歸問各投下輒擅斷遣者坐罪諸奏决天下囚值上怒勿輒奏上欲有所誅必遲囘一二日乃覆奏諸有司因公依理决罰邂逅身死者不坐諸職官輒以微故乗怒不取招詞斷决人邂逅致死又誘苦主焚瘞其屍者笞五十七解職别叙記過諸鞫獄輒以私怨暴怒去衣鞭背者禁之諸鞫問囚徒重事須加拷訊者長貳僚佐㑹議立案然後行之違者重加其罪諸有司承告被盜輒將影跡人非理枉勘身死却獲正賊者正問官笞五十七解職期年後降先職一等叙首領官及承吏各笞五十七罷役不叙均徴燒埋銀給苦主諸有司受財故縱正賊誣執非罪非法拷訊連逮妻子銜寃赴獄事未曉白身已就死正官杖一百七除名佐官八十七降二等雜職叙仍均徴燒埋銀諸監臨挾讐違法枉斷所監臨職官者抵罪不叙諸有司故入人罪未决及囚自死者以所入罪減一等論入人全罪以全罪論若未决放仍以減等論諸故出人之罪應全科者亦如之諸失入人罪者減三等失出人罪者減五等未决放者又減一等並記過諸失出人死罪者笞五十七解職期年後降先品一等叙記過正犯人追禁結案盜賊條載諸杖罪已下府州追勘明白即聽斷决徒罪總管府决配仍申合干上司照騐流罪已上須牒㢘訪司官審覆無寃方得結案依例待報其徒伴有未獲追㑹有不完者如覆審既定贓騐明白理無可疑亦聽依上歸結明制法官治囚皆有成法提人勘事必齎精微批文京外官五品以上有犯必奏聞請㫖不得擅勾問罪在八議者實封以聞軍官犯罪都督府請㫖諸司事涉軍官及呈告軍官不法者俱密以實封奏毋得擅勾問民間獄訟非通政司轉達於部刑部不得聽理凡内外問刑官惟死罪及竊盜重犯始用拷訊餘止鞭撲常刑酷吏輒用挺棍夾棍腦篐烙鐵及一封書䑕彈箏攔馬棍燕兒飛或灌鼻釘指用徑寸嬾杆不去棱節竹片或鞭脊背兩踝致傷已上者俱奏請罪至充軍凡决囚毎嵗朝審畢法司以死罪請㫖刑科三覆奏得㫖行刑在外者奏决單於冬至前㑹審决之京師每嵗决囚後圖諸囚罪狀於錦衣衛之外垣令人觀省停刑之月自立春已後至春分已前停刑之日初一初八十四十五十八二十三二十四二十八二十九三十凡十日太祖洪武三年令臣民有罪法當死者三覆五奏毋輒行刑打斷罪囚自二十六年已前刑部令主事㕔㑹御史五軍斷事司大理寺五城兵馬指揮使官至二十九年並差錦衣衛官其後惟主事㑹御史將笞杖罪於打斷㕔决訖附卷奉㫖者次日覆命成祖永樂元年定制各省死囚百人已上者差御史審决十七年令在外諸司死罪咸送京師審錄三覆奏然後行刑英宗正統元年令重囚三覆奏畢仍請駕帖付錦衣衛監刑官領校尉詣法司取囚赴市又制臨决囚有訴寃者直登聞鼓給事中取狀封進仍批校尉手馳赴市曹暫停刑禮部尚書胡濙等議評事尹弼所言刑部都察院於調問罪囚多不詳鞫苐逼其引伏如原詞請革其弊則負枉者得盡其情帝是其議因諭法司囚不伏辯敢抑徇原訊者必罪無赦六年評事馬豫上言臣奉敕審刑竊見各處捉獲強盜多因讐人指攀拷掠成獄不待詳報死傷者甚多今後宜勿聽妄指果有贓証御史按察司㑹審方許論决若未審録有傷死者毋得准例升賞憲宗成化十一年定制凡盜賊贓仗未真人命死傷未經勘騐輒將重刑致死獄中者審勘有無故失明白不分軍民職官俱視酷刑事例為民是年山西巡撫何喬新劾奏遲延獄詞僉事尚敬劉源因言凡二司不决斷詞訟者半年之上悉宜奏請執問詔以所奏通行天下時六品已下官有罪巡按御史輒令府官提問陜西巡撫項忠言非祖制甚乖律意奏請今後當聞於朝命御史按察司提問為是乃下部議從之孝宗𢎞治三年申明凡律該决不待時重犯鞫問明白曽經大理寺詳允奏奉欽依處决者各該部院並該科即便覆奏㑹官處决不必監至秋後十三年定歲差審决重囚官俱以霜降後至限期復命十八年南刑部奏决不待時者三人大理寺已審允下法司議謂在京重囚間有决不待時者審允奏請至刑科三覆奏或蒙恩仍監候㑹審南京無覆奏例乞俟秋後審竟類奏定奪如有巨憝難依常例者更具奏處决著為令詔可舊例獄囚已審録應决斷者限三日應起發者限十日逾限計日以笞因淹滯至死者罪徒嘉靖六年給事中周瑯言比者獄吏苛刻罪無輕重輒加幽繫案無新故動引嵗時姦吏悍卒往往倚獄為市乞申明舊律帝嘉納之具雜議篇七年定議重囚有寃家屬於臨决前一日撾鼓翼日午前下過午行刑不覆奏神宗時刑部尚書孫丕揚言打斷相騐令御史三六九日遵例㑹同餘日止㑹寺官以速决遣徒流已上部寺詳鞫笞杖小罪聽堂部處分具雜議篇命如議行欽定續通典卷一百十四
