body:
  text: 州郡金大名府路路河東北路路鳯翔鄜延路河東南路臨京兆府慶原路洮路大名府路宋北京魏郡府一領刺郡三縣二十鎮二十二金貞祐二年十月置行尚書省大名府上天雄軍案府志云金貞祐二年改武安軍金史未詳謹附識舊有散府先置統軍司天德二年罷以其所轄民户分𨽻旁近總管府正隆二年升為總管府附近十二明安皆𨽻焉兼漕河事領縣十鎮十三舊有栁林候固二鎮大名倚鎮一元城鎮二安定安賢魏縣冠氏鎮四普通清水博寧桑橋南樂案宋史地理志南樂朝城二縣並以崇寧四年改屬澶州金時蓋自澶州還屬大名耳金史未詳謹附識鎮一南樂館陶鎮一館陶夏津鎮一孫生朝城鎮一韓張清平鎮一清平莘鎮一馬橋恩州中刺史宋清河郡軍事治清河今治厯亭領縣四鎮六厯亭倚鎮四漳南新安樂舊安樂王杲武城鎮一武城清河臨清鎮一曹仁濮州下刺史宋濮陽郡領縣二鎮三鄄城倚鎮二臨濮雷澤皆舊縣貞元二年為鎮范鎮一定安開州中刺史宋開德府澶淵郡鎮寧軍節度降為澶州金皇統四年復更今名領縣四鎮一濮陽倚清豐觀城鎮一武鄉長垣本𨽻南京泰和八年以限河不便來屬河東北路宋河東路金天會六年析河東為南北路各置兵馬都總管府一領節鎮三刺郡九縣三十九鎮四十堡十寨八太原府上武勇軍宋太原郡河東軍節度金初依舊為次府復名并州太原郡河東軍總管府置轉運司領縣十一鎮八陽曲倚西案山西通志云大定間割榆次之北鄉屬焉金史未詳謹附識鎮五陽曲百井赤塘關天門關陵井驛太谷案山西通志云興定四年於清源置晉州以太谷𨽻焉金史未詳謹附識平晉貞祐四年廢興定元年復置鎮二晉寧晉祠清源徐溝本清源縣之徐溝鎮大定二十九年升詳案山西通志云興定四年改𨽻晉州金史未謹附識榆次祈案山西通志云貞祐中以尚書左丞胥鼎議於縣東國柏鎮置􅀈州縣屬焉州尋廢興定中𨽻晉州金史未詳謹附識鎮一團柏文水交城盂興定中升為州聽綘州元帥府節制置刺史尋復壽陽興定二年嘗割𨽻平定州晉州興定四年以壽陽縣西張寨置欣州下刺史舊定襄郡軍領縣二鎮四秀容鎮四欣口雲內徙合石嶺定襄平定州中刺史本宋平定軍金大定二年升為州興定二年為防禦十一月復降為刺郡領縣二鎮三平定倚鎮二承天東百井樂平興定四年升為臯州鎮一净陽汾州上宋西河郡軍事金天會六年置汾陽軍節度使後又置河東南北路提刑司領縣五鎮二西河鎮一郭柵孝義介休鎮一洪山平遙靈石貞祐三年割𨽻霍州四年復來屬石州上舊昌化軍刺史興定五年復𨽻晉陽從郭文振之請也領縣六鎮四離石倚鎮一石窟方山貞祐四年徙治於積翠山孟門宋𨽻晉寧軍金明昌六年復鎮二吳保天澤溫泉貞祐四年改𨽻汾州臨泉宋𨽻晉寧軍臨案元史地理志金名水縣謹附識鎮一克眀寧鄉舊名平夷明昌六年更葭州下刺史本晉寧軍貞元元年𨽻汾州大定二十二年升為晉寧州二十四年更今名在黃河西興定二年以河東殘破改𨽻延安府案元一統志云葭州金初為夏人所踐皇統三年復立軍治後為州領通秦彌川太和建寧吳堡凡五縣考五縣多宋時堡寨疑金末並升為縣謹附識領寨八堡九神泉寨永祚堡烏龍寨康定堡寧河寨寧河堡太和寨神木寨通秦寨彌川寨護川堡強川堡清川堡通秦寨通秦堡晉安堡吳堡寨已上皆在黃河西臨西夏界代州中宋鴈門郡防禦金天㑹六年置震武軍節度使貞祐二年僑置西面經略司尋罷領縣五鎮十三鴈門倚鎮三鴈門西陘胡谷崞鎮一樓板五臺貞祐四年升為臺州鎮二興􅀢石觜廣武貞祐三年來屬繁畤貞祐三年升為堅州鎮七茹越大石義興麻谷瓶形梅回寶興隩州下本宋火山軍金大定二十二年升為火山州後更今名興定二年改𨽻嵐州四年以殘破徙治於黃河灘許父寨領縣一鎮一河曲貞元元年置鎮一鄴鎮寧化州下刺史本寧化軍大定二十二年升為州領縣一鎮一寧化鎮一窟谷嵐州下宋樓煩郡軍事金天會六年置鎮西節度使領縣三鎮四宜芳鎮一飛鳶合河案元史地理志合河金升興州𨽻太原路謹附識鎮三合河津乳浪鹽院渡樓煩岢嵐州下刺史本宋岢嵐軍金大定二十二年為州貞祐三年升為防禦四年升為節鎮尋復為防禦領縣一堡一嵐谷堡一寒光保德州下刺史本宋保德軍金大定二十二年升為州元光元年升為防禦領縣一保德大定十一年置管州下刺史本宋憲州靜樂郡金天德三年更興定三年升為防禦領縣一靜樂河東南路府二節鎮三防禦一刺郡六縣六十九鎮三十關六平陽府上宋平陽郡建雄軍節度本晉州初為次府置建雄軍節度使金天會六年升總管府置轉運司興定二年以殘破降為散府領縣十鎮一臨汾天會六年定臨汾為次赤餘並次畿置丞簿尉各一襄陵倚鎮一故關洪洞趙城霍邑貞祐三年升為霍州以趙城汾西靈石𨽻焉興定元年升為節鎮軍曰鎮定汾西嶽陽浮山舊名神山大定七年更為浮山興定四年更名忠孝和川冀氏隰州上刺史宋大寧郡團練舊大寧郡軍刺史金天㑹六年改為南隰州以與北京隰州重也天德三年去南字領縣六關四隰川倚仵城興定五年升以隰川之仵城鎮置蒲興定五年升為蒲州以大寧𨽻焉大寧關一馬門關永和關一永和關石樓按通志云金為鎮西州謹附識關二永寧上平陶吉州下宋置團練舊名慈州金天德三年改為耿州置成郡軍明昌元更今名領縣二吉鄉鄉寧河中府散上宋河東郡舊置護國軍節度使金天㑹六年降為蒲州置防禦使天德元年升為河中府仍舊護國軍節度使大定五年置陜西元帥府領縣七鎮四河東倚鎮二永樂合河滎河貞祐三年升為榮州以河津萬泉𨽻焉鎮一北郎虞鄉萬泉鎮一胡壁臨晉河津猗氏絳州上宋置絳郡防禦金天㑹六年置絳陽軍節度使興定二年升為晉安府總管河東南路兵馬三年置河東南路轉運司領縣八鎮五關一正平倚劇鎮一澤掌曲沃劇鎮二柴村九王稷山翼城興定四年升為翼州以垣曲縣𨽻焉元光二年升為節鎮軍曰翼安太平垣曲鎮一臯落關一行臺絳鎮一繪交平水興定四年徙置汾河之西從平陽公胡天祚之請也解州上刺史宋慶成軍防禦金初置解梁郡軍後廢為刺郡貞祐三年復升為節鎮軍名寶昌興定四年徙治平陸縣領縣六鎮四解倚平陸鎮一張店芮城宋𨽻陜州夏案宋史地理志夏縣屬陜州當是金時改屬金史未詳謹附識鎮一曹張安邑聞喜鎮二東鎮劉莊澤州上刺史宋髙平郡金天㑹六年以與北京澤州同加南字天德三年復去南字貞祐四年𨽻潞州昭義軍後又改𨽻孟州元光二年升為節鎮軍曰忠昌領縣六鎮二晉城倚鎮二周村巴公舊又有星軺鎮端氏陵川陽城元光二年升為􅀈州髙平沁水潞州上宋隆德府上黨郡昭德軍節度使金天㑹六年節度使兼潞南遼沁觀察處置使領縣八鎮四上黨倚鎮一八義壺關屯留鎮一寺底長子鎮一橫水潞城襄垣鎮一禠亭黎城涉貞祐三年升為崇州以黎城縣𨽻焉四年以殘破復為縣興定五年復升為州遼州中刺史本宋樂平縣刺史金天㑹六年以與東京遼州同加南字天德三年復去南字領縣四鎮一關一遼山倚鎮一平城舊縣也貞元間廢為鎮屬遼山縣及廢舊芹泉鎮關一黃澤榆社和順儀城舊為平城縣貞元二年廢入遼山為鎮貞祐四年復升為縣更今名沁州中錦山郡宋威勝軍金天㑹六年升為州元光二年升為節鎮軍曰義勝領縣四鎮一銅鞮倚武鄉鎮一南關沁源元光二年升為穀州綿上懷州上宋河內郡防禦金天㑹六年以與臨潢府懷州同加南字仍舊置沁南軍節度使天德三年去南字皇統三年置黃沁河堤都大管勾司大定五年置行元帥府興定五年置招撫司領縣四鎮六河內倚鎮四武德柏鄉萬善清化修武鎮一承恩山陽興定四年以修武縣重泉村為山陽縣𨽻輝州武陟鎮一宋郭孟州上宋濟源郡節度金天㑹六年降河陽府為孟州置防禦守盟津宣宗朝置經略司案續輿地考云大定中為河水所害北去故城十五里築城徙治焉故城謂之下孟州新城謂之上孟州謹附識領縣四鎮二河陽倚鎮二穀羅流河王屋濟源溫京兆府路宋為永興軍路金皇統二年省併陕西六路為四曰京兆曰慶原曰熙秦曰鄜延府一領節鎮一防禦一刺郡四縣三十六鎮三十七京兆府上宋京兆郡永興軍節度金皇統二年置總管府天德二年置陕西路統軍司陕西東路轉運司領縣十二鎮十舊又有中橋臨涇二鎮從廢長安倚鎮一子午咸寧倚本萬年後更名泰和四年廢尋復年案清類天文分野之書云咸寧縣大定二十一改名金史未詳謹附識鎮二鳴犢乾祐興平涇陽臨潼鎮一零口藍田雲陽鎮一孟店髙陵鎮二毗沙渭城終南宋清平軍鎮一甘河櫟陽鎮一栗邑鄠鎮一秦渡咸陽商州下刺史宋上洛郡軍事金貞祐四年升為防禦尋𨽻陕州興定二年復來屬元光二年改𨽻河南路領縣二鎮二舊又有西市黃川青雪三鎮後廢上洛鎮二商洛澧陽皆舊為縣貞元二年廢為鎮洛南虢州下刺史宋虢郡軍事金貞祐二年割為陜州支郡以備潼關領縣三鎮五虢略鎮三靖逺王城朱陽盧氏鎮二社管灤州舊為縣貞元二年廢為鎮朱陽海陵時嘗廢後復置乾州中刺史宋嘗改為醴州金天德三年復領縣四鎮三奉天鎮一薛祿醴泉鎮一甘北武亭本武功大定二十九年以嫌顯宗諱史鎮一長寧好畤同州中宋馮翊郡定國軍節度治馮翊後改安國軍節度使領縣六鎮九馮翊倚鎮二沙苑并藍朝邑鎮四朝邑新市延祥汙谷白水郃陽鎮一夏陽澄城韓城貞祐三年升為禎州以郃陽縣𨽻焉鎮二寺前良輔耀州上刺史宋華原郡感德軍節度金皇統二年降為軍事後為刺史州領縣四鎮二華原同官鎮一黃堡美原案富平縣志云金省富平入美原縣金史未詳謹附識三原鎮一龍橋華州中宋華隂郡鎮潼軍節度治鄭金初因之後置節度使皇統二年降為防禦使貞祐三年升為節鎮軍曰金安以商州為支郡領縣五鎮六鄭倚鎮一赤水華隂鎮二關西敷水下邽鎮二素化新市蒲城鎮一荆姚渭南鳯翔路宋秦鳯路治秦州府二防禦二刺郡二縣三十三城一堡四寨十六鎮十六鳯翔府中宗扶風郡鳯翔軍節度金皇統二年升為府軍名天興大定十九年更軍名為鳯翔大定二十七年升總管府領縣九鎮四舊有橫水驛店雀橫麻務長清五鎮後廢鳯翔倚舊名天興縣大定十九年更字案鳯翔縣志云金大定中以天興縣與慶衍殿音相同改為鳯翔謹附識寶雞鎮一武城虢鎮一陽平郿盩厔貞祐四年升為恆州以郿縣𨽻焉扶風金初作扶興𨽻案雍大紀云貞祐元年京兆府鎮一岐陽岐山鎮一馬蹟普潤麟遊德順州上刺史宋德順軍金初𨽻熙秦路皇統二年升為州大定二十七年來屬貞祐四年升為防禦尋升為節鎮軍曰隴安領縣六寨四堡一舊有上接鎮通安寨王家城牧龍城同家堡後廢隴平倚水洛本中安堡城堡一中安威戎本威戎堡城隆德本隆德寨通邊本通邊寨寨三靜邊舊為縣得勝寧安治平本治平寨寨一懷逺平凉府散中宋渭州隴西郡平凉軍節度舊為軍後置陜西西路轉運司陜西東西路提刑司金大定二十六年來屬領縣五鎮五寨一平凉倚潘源崇信鎮一西赤城華亭化平本名安化大定七年更鎮四安化安國白巖河耀武寨一瓦亭鎮戎州下刺史本鎮戎軍大定二十二年為州二十七年來屬領縣二堡三寨八東山本東山寨三川本三水寨堡三彭陽乾興開逺寨八天聖飛泉熙寧靈平通峽蕩羌九羊張義秦州下宋天水郡雄武軍節度後置秦鳯路金初置