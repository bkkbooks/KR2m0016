body:
  text: 州郡明河南陜西河南元以河北地直𨽻中書省河南地置河南江北行中書省治汴梁路明洪武元年五月置中書分省治開封府二年四月改分省為河南等處行中書省三年十二月置河南都衛八年十月改都衛為都指揮使司九年六月改行中書省為承宣布政使司領府八直𨽻州一屬州十一縣九十六開封府元汴梁路屬河南江北行省明洪武元年五月為開封府八月建北京十一年京罷領州四縣三十祥符倚東為開封縣元時同治郭內明洪武中省陳留杞通許太康尉氏洧川鄢陵扶溝中牟陽武原武東南有安城縣明洪武初置正統中廢封丘延津蘭陽儀封故屬雎州明洪武十年五月改屬南陽府後來屬新鄭故屬均州穆宗降慶五年改屬陳州明洪武初以州治宛丘縣省入領縣四商水明洪武初廢四年七月復置西華項城東北有故城今治本南頓縣之殄冦鎮也宣德三年遷沈丘故屬潁州明洪武初廢𢎞治十年改乳香臺巡檢司置來屬北有南頓縣洪武初廢許州明洪武初以州治長社縣省入領縣四臨潁襄城郾城長葛禹州元曰均州明洪武初以州治陽翟縣省入萬厯三年四月避諱改曰禹州領縣一密鄭州明洪武初以州治管城縣省入領縣四滎陽滎澤元直𨽻汴梁路明洪武中改屬河隂汜水河南府元河南府路屬河南江北行中書省明洪武元年為府領州一縣十三洛陽倚偃師鞏孟津宜陽永寧新安澠池元屬陜州明洪武中改屬登封嵩元嵩州屬南陽府明洪武二年四月降為縣來屬盧氏元屬嵩州明洪武元年四月屬南陽府三年三月屬陜州萬厯初改屬府陜州元屬河南府路明洪武元年四月改屬南陽府以州治陜縣省入領縣二靈寶閿鄉歸德府元直𨽻河南江北行省明洪武元年五月降為州屬開封府嘉靖二十四年六月升為府領州一縣八商丘倚元曰睢陽明洪武初省嘉靖二十四年六月復置更名寧陵鹿邑元屬亳州明洪武中改屬夏邑元曰下邑明洪武初更名永城明洪武元年五月屬開封府十一月來屬虞城元屬濟寧路明洪武二年來屬睢州元屬汴梁路明洪武初屬開封府以州治襄邑縣省入十年五月降為縣十三年十一月復升為州嘉靖二十四年六月來屬領縣二考城元末省明洪武四年八月復置屬開封府十年五月復省十三年十一月復置屬州柘城元末省明洪武四年八月復置屬開卦府十年五月省入寧陵縣十三年十一月復置屬州汝寧府元直𨽻河南江北行省明洪武初因之領州二縣十二汝陽倚明洪武初縣廢四年七月復置真陽元屬息州明洪武四年省入汝陽縣𢎞治十八年十二月仍置縣上蔡明洪武初廢四年五月復置新蔡元屬息州後廢明洪武四年五月復置改屬西平確山明洪武十年五月省入汝陽縣十三年十一月復置成化十一年九月改屬信陽州𢎞治二年八月仍屬府遂平信陽州元為信陽縣屬信陽州後廢明洪武元年十月置信陽州於此屬河南分省四年二月屬中都臨濠府七年八月改屬十年五月降為縣成化十一年九月復升為州領縣一羅山元信陽州治後州縣俱廢明洪武元年十月置州於舊信陽縣復置羅山縣屬焉十年五月直𨽻汝寧府成化十一年九月還屬州光州明洪武初以州治定城縣省入四年二月改屬中都臨濠府十三年仍來屬領縣四光山固始息元息川明洪武四年二月屬中都臨濠府尋降為縣屬潁州七年仍來屬商城成化十一年四月析固始縣地置南陽府元直𨽻河南江北行省明洪武初因之領州二縣十一南陽倚鎮平明洪武十年五月省入南陽縣十三年十一月復置唐明洪武三年以故比陽縣地置泌陽元為唐州治明洪武二年省入州十三年十一月州廢復置縣桐柏本唐縣之桐柏鎮巡檢司成化十二年十二月改置縣南召成化十三年十二月以南陽縣南召堡置鄧州元治穰縣明洪武二年二月縣廢十三年十一月復置縣十四年五月復省入州領縣三內鄉新野淅州成化六年析內鄉縣地置裕州明洪武初以州治方城縣省入領縣二舞陽葉懷慶府元懷慶路直𨽻中書省明洪武元年十月為府屬河南分省領縣六河內倚濟源元屬孟州明洪武十年五月改屬府修武武陟孟元孟州明洪武初以州治河陽縣省入十年五月降為縣溫元屬孟州明洪武十年五月改屬府衛輝府元衛輝路直𨽻中書省明洪武元年八月為府十月屬河南分省領縣六汲倚胙城明洪武十年五月省入汲縣十三年十一月復置新鄉獲嘉明洪武十年五月省入新鄉縣十三年十一月復置淇元淇州後廢明洪武元年九月復置十二月降為縣輝元輝州後廢明洪武元年九月復置十二月降為縣彰德府元彰德路直𨽻中書省明洪武元年閏七月為府十月屬河南分省領州一縣六安陽倚元末縣廢明洪武元年九月復置臨漳元末廢明洪武元年九月復置湯隂元末廢明洪武元年九月復置林元林州後廢明洪武元年九月復置二年四月降為縣磁州元治滏陽縣屬廣平路後州縣俱廢明洪武元年十一月復置州屬廣平府二年四月來屬領縣二武安元末廢明洪武元年十一月復置涉元屬真定路後廢明洪武元年十一月復置屬真定府二年四月來屬汝州元屬南陽府明洪武初以州治梁縣省入成化十二年九月直𨽻布政司領縣四魯山郟寶豐成化十一年四月析汝州地置伊陽成化十二年十二月以汝州之伊故縣置析嵩及魯山二縣地益之陜西元置陜西等處行中書省治奉元路又置甘肅等處行中書省治甘州路明洪武二年四月置陜西等處行中書省治西安府三年十二月置西安都衛與行中書省同治八年十月改都衛為陜西都指揮使司九年六月改行中書省為承宣布政使司領府八屬州二十一縣九十有五西安府元奉元路屬陜西行省明洪武二年三月改為西安府領州六縣三十一長安倚咸寧倚咸陽涇陽興平臨潼渭南舊屬華州嘉靖三十八年十一月改屬府藍田鄠盩厔髙陵富平舊屬耀州萬厯三十六年改屬府三原舊屬耀州𢎞治三年十一月改屬府醴泉舊屬乾州嘉靖三十八年十一月改屬府華州領縣二華隂蒲城商州明洪武七年五月降為縣成化十三年三月仍為州領縣四商南成化十三年三月以商縣之層峯驛置雒南元曰洛南屬商州明洪武七年五月改屬華州成化十三年三月復來屬天啓初改洛為雒山陽本商縣之豐陽巡檢司成化十二年十二月改為縣鎮安景泰三年以咸寧縣野猪坪置屬府成化十三年三月改屬州同州領縣五朝邑舊屬蒲州明洪武九年八月來屬郃陽韓城澄城白水耀州領縣一同官乾州領縣二武功永壽邠州元直𨽻陜西行省明洪武中來屬以州治新平縣省入領縣三淳化三水成化十三年九月析淳化縣地置長武萬厯十一年三月以邠州宜祿鎮置鳯翔府元屬陜西行省明洪武二年三月因之領州一縣七鳯翔岐山寶雞扶風郿元屬奉元路明洪武二年來屬麟遊汧陽舊屬隴州嘉靖三十八年十一月改屬府隴州元屬鞏昌總帥府延祐四年十一月省州治汧源縣入州明洪武二年來屬漢中府元興元路屬陜西行省明洪武三年五月為府六月改名漢中府領州一縣八南鄭倚褒城明洪武十年六月省入南鄭縣後復置城固洋元洋州明洪武三年降為縣十年六月省入西鄉後復置西鄉鳯元鳯州明洪武七年七月降為縣沔元沔州屬四川廣元路明洪武三年改屬漢中府省州治鐸水縣入州七年七月降為縣十年六月省入略陽後復置成化二十一年六月屬寧羌州嘉靖三十八年十一月仍屬府西南有大安縣洪武初廢寧羌州本寧羌衛明洪武三十年九月以沔縣之大安地置成化二十一年六月置州屬府領縣一略陽元屬沔州明洪武三年屬府成化二十一年六月改屬延安府元延安路屬陜西行省明洪武二年五月為府領州三縣十六膚施倚安塞甘泉安定保安宜川延川延長青澗舊屬綏德州嘉靖四十一年改屬府鄜州領縣三洛川中部宜君綏德州明洪武十年五月省入府後復置領縣一米脂葭州明洪武七年十一月降為縣屬綏德州十三年十一月復升為州屬府領縣三吳堡元屬州明洪武七年十一月改屬綏德尋省十三年十一月復置還屬神木明洪武初省十三年十一月復置府谷明洪武初省十三年十一月復置慶陽府元屬鞏昌總帥府明洪武二年五月直𨽻行省領州一縣四安化倚元省明洪武中復置合水環元環州屬鞏昌總帥府明洪武初降為縣來屬真寧舊屬寧州萬厯二十九年改屬府寧州元屬鞏昌總帥府明洪武中來屬平凉府元屬鞏昌總帥府明洪武三年五月直𨽻行省領州三縣七平凉倚崇信華亭鎮原元鎮原州屬鞏昌總帥府明洪武初降為縣來屬隆德舊屬靖寧州嘉靖三十八年十一月改屬府涇州元直𨽻陜西行省明洪武三年以州治涇川縣省入來屬領縣一靈臺靜寧州元屬鞏昌總帥府明洪武中來屬領縣一莊浪元莊浪州直𨽻陜西行省明洪武三年屬鳯翔府八年三月降為縣來屬固原州本固原守禦千戶所景泰三年以故原州城置成化四年升為衛𢎞治十五年置州屬府南有開成州元直𨽻陜西行省治開成縣明洪武二年省州以縣屬平凉府成化三年廢縣又東南有廣安州元屬開成州明洪武二年省西北有西安守禦千戶所成化五年以舊西安州置鞏昌府元屬鞏昌總帥府明洪武二年四月直𨽻行省領州三縣十四隴西倚安定元定西州屬鞏昌總帥府至正十二年三月改名安定州明洪武十年降為縣屬府㑹寧元㑹州屬鞏昌總帥府至正十二年三月改為㑹寧州明洪武十年降為縣屬府通渭漳寧逺伏羌西和元西和州屬鞏昌總帥府明洪武十年降為縣屬府成元成州屬鞏昌總帥府明洪武十年降為縣屬府秦州元屬鞏昌總帥府明洪武二年屬府省州治成紀縣入州領縣三秦安清水禮元禮店文州軍民元帥府屬吐蕃宣慰司明洪武四年十一月置禮店千戶所十一年屬岷州衛十五年改屬秦州衛成化九年十二月置禮縣於所城屬州階州元屬鞏昌總帥府明洪武四年降為縣屬府十年六月復為州領縣一文元文州至元九年十月置屬吐蕃宣慰司明洪武四年降為縣屬府十年六月改屬州二十三年三月省成化九年十二月復置仍屬州徽州元屬鞏昌總帥府明洪武十年六月降為縣屬府後復升為州領縣一兩當明洪武十年六月省入徽縣後復置屬州臨洮府元臨洮府屬鞏昌總帥府泰定元年九月改為臨洮路明洪武二年九月仍為府領州二縣三狄道倚渭源蘭州元屬鞏昌總帥府明洪武二年九月降為縣來屬成化十三年九月復為州領縣一金元金州屬鞏昌總帥府明洪武二年九月降為縣屬府成化十三年改屬州河州元河州路屬吐蕃宣慰司明洪武四年正月置河州衛屬西安都衛六年正月置河州府屬陜西行中書省七年七月置西安行都衛於此領河州朵甘斯烏斯藏三衛八年十月改行都衛為陜西行都指揮使司九年十二月行都指揮使司廢衛屬陜西都指揮使司十年分衛為左右十二年七月府廢改左衛於洮州升右衛為軍民指揮使司成化九年十二月置州屬府改軍民指揮使司為衛西北有積石州元屬吐蕃宣慰司明洪武四年正月改置積石州千戶所西南有貴德州元屬吐蕃宣慰司明洪武八年正月改置歸德守禦千戶所又南有寧河縣東北有安鄉縣元俱屬河州路明洪武三年廢六年復置十二年復廢靈州元屬寧夏府路明洪武三年罷𢎞治十三年九月復置直𨽻布政司興安州元金州屬興元路萬厯十一年八月更名二十三年直𨽻布政司領縣六平利元末省明洪武三年置屬四川大寧州五年二月來屬十年六月復省後復置石泉元末省明洪武三年置屬四川大寧州五年二月來屬嘉靖三十八年十一月改屬漢中府萬厯十一年還屬州洵陽元末省明洪武三年復置五年二月來屬漢隂元末省明洪武三年復置十年六月省入石泉縣後復置屬州嘉靖三十八年十一月改屬漢中府萬厯十一年還屬州白河成化十二年十二月以洵陽縣白河堡置屬湖廣鄖陽府十三年九月來屬紫陽正德七年十一月以金州紫陽堡置初治紫陽灘之左嘉靖三十五年遷於灘右洮州衛元洮州屬吐蕃宣慰司明洪武四年正月置洮州軍民千戶所屬河州衛十二年二月升為洮州衛軍民指揮使司屬陜西都司岷州衛元岷州以舊祐川縣地置屬吐蕃宣慰司明洪武四年正月置岷州千戶所屬河州衛十一年七月升為衛屬陜西都司十五年四月升軍民指揮使司嘉靖二十四年又置州改軍民指揮使為衛四十年閏五月州廢仍置軍民指揮使司東北有鐵州元屬吐蕃宣慰司明洪武四年正月置鐵城千戶所屬河州衛後廢領所一西固城守禦軍民千戶所本西固城千戶所明洪武七年三月置屬鞏昌府十五年四月改置來屬榆林衛成化六年三月以榆林川置寧夏衛元寧夏府路屬甘州行省明洪武三年為府五年府廢二十六年七月置衛二十八年四月罷永樂元年正月復置領千戶所四靈州守禦千戶所明洪武十六年十月置𢎞治十三年九月復置靈州於所城興武守禦千戶所正德元年以興武營置韋州守禦千戶所𢎞治十年以故韋州置平虜千戶所嘉靖三十年以平虜城置寧夏前衛在寧夏城內明洪武十七年置寧夏左屯衛寧夏右屯衛亦俱在寧夏城內明洪武二十五年二月置後廢三十五年十二月復置寧夏後衛本花馬池守禦千戶所成化十五年置正德元年改衛寧夏中衛元應理州屬寧夏府路明洪武三年州廢永樂元年正月置衛東南有鳴沙州元屬寧夏府路明洪武初廢靖虜衛正統二年以故㑹州地置屬陜西都司陜西行都指揮使司元甘肅等處行中書省治甘州路明洪武五年十一月置甘肅衛二十五年罷二十六年陜西行都指揮使司自莊浪徙置於此領衛十二守禦千戶所四甘州左衛倚元甘州路明洪武初廢二十三年十二月置甘州左衛二十七年十一月罷二十八年六月復置甘州右衛甘州中衛俱明洪武二十五年三月置甘州前衛甘州後衛俱明洪武二十九年置以上四衛俱與甘州左衛同城肅州衛元肅州路屬甘肅行省明洪武二十七年十一月置衛山丹衛元山丹州直𨽻甘肅行省明洪武初廢二十三年九月置衛屬陜西都司後來屬永昌衛元永昌路屬甘肅行省至正三年七月改永昌等處宣慰司明洪武初廢十五年三月置衛屬陜西都司後來屬涼州衛元西涼州屬永昌路明洪武九年十月置衛屬陜西都司後來屬鎮番衛本臨河衛明洪武中以小河灘城置三十年正月更名建文中罷永樂元年六月復置莊浪衛明洪武五年十一月以永昌地置十二年正月置陜西行都指揮使司於衛城二十六年行都司徙於甘州建文中改衛為守禦千戶所尋復改所為衛屬陜西都司後來屬西寧衛元西寧州直𨽻甘肅行省明洪武初廢六年正月置衛宣德七年十一月升軍民指揮使司屬陜西都司後來屬碾伯守禦千戶所本碾北地明洪武十一年三月置莊浪分衛七月改置碾北衛後廢而徙西寧衛右于戶所於此成化中更名沙州衛元沙州路屬甘肅行省明洪武初廢永樂元年置衛正統間廢鎮夷守禦千戶所明洪武三十年以甘州衛地置建文二年罷永樂元年復置古浪守禦千戶所正統三年六月以莊浪衛地置髙臺守禦千戶所景泰七年以甘州衛之髙臺站置欽定續通典卷一百四十二
