body:
  text: 刑雜議四明武宗正德元年掌大理寺工部尚書楊守隨言每嵗熱審事例行於北京而不行於南京五年一審録事例詳於在京而略於在外今宜通行南京凡審囚三法司皆會審其在外請亦依此例庶事無偏弊刑合公論詔可二年閣臣李東陽言決囚三五覆奏自唐太宗以後歷代遵行我太祖著為定制每法司決囚必待刑科三覆奏後批出行刑昨刑科初覆奏本未發仍望批一是字少待三覆本內方批處決不過遲數日之期可以存百年之典五年東陽等又因風霾上言頃以久旱風霾兩降綸音連坐者釋放枷號者饒免盜犯再審徒流減等中外傳播歡聲動地幸覩聖心開悟輒有一二干瀆如王府逃校窩主鄰佑連纍者亦乞釋放傾使假銀偽造印信舉放私債乞照本律問罪餘皆放免充軍正犯己故無子婦人一應家屬乞免遣死罪重訴三次者乞免加罪婦人無夫者乞免配邉軍凡犯罪家産除重罪外乞免沒官法司錦衣衛見監罪囚乞照熱審事例奏奪南京見監輕重罪犯乞照在京恩例文武官罰米實係家貧者乞再限三月仍免加倍上納各處獲盜數多不無寃抑乞令研審務見贓仗失主勿使妄拿希圖升職免罪再正德年間問罪條例近給事中屈銓奏準頒行乞令法司議定上裁帝曰卿等所言有禆治道當悉行之按東陽等條奏內惟已故軍犯無子免遣婦人及一應家屬等四條準行具刑制篇餘皆未從十三年九月刑部斷囚有子糾他人劫其父及弟劫其兄者循舊例以同居卑幼將引他人為盜及私擅用財擬罪止杖徒大理寺劉玉因奏律以弼教此係人倫之變即使律文未載亦當權輕重以正法援比附以上請如前擬是置倫理於不論盜賊日肆而莫禁矣於是改擬重刑仍著為令具刑制篇是年十月帝如宣府大學士楊廷和等言祖制行刑之日許各犯家屬訴寃於登聞鼓下直鼓給事中封進或暫停刑者特遣校尉批豫留之今冬至將近又當處決之時該科三覆奏本送下擬票臨刑之時有鳴鼓訴寃狀應與辦理者何以遽得明旨伏望振旅還京凡此重務悉遵舊制而行疏入不報十四年御史李節義參奏指揮時鐸逼拷平人為盜見監王天祐等審釋閻隆等五人瘦死坐以徒罪復職刑科給事中張漢卿因奏言情重律輕於法似為寬縱并乞榜示中外凡撫按懲治務將呈詳候審之囚不分己未結正通行開報已死者亦須查勘有無寃抑及病死根因若情有偏枉故入至死如時鐸者照例重治疏入不報世宗嘉靖元年給事中劉濟等以姦黨廖鵬父子及王欽陶杰等頗有內援懼帝意不決乃言往嵗三覆奏畢待駕帖則已日午登聞鼓下仍受訴詞得報且及未申時再請行刑時已過酉大非刑人於市與衆棄之之意請自今決囚在未前畢事從之按明實録嘉靖二年御史陳逅言慎刑之道在初審不在臨刑正統年間有批豫留人事例以至富囚多圖僥幸夤緣請託萬一姦黨乘藉昏黑意外求生雖罪監臨亦損國威請今後決囚前期一日該科覆奏畢即給駕帖取囚赴市限未刻前畢事如有鳴鼓訴寃許覆奏前封進奏後毋得輒受違者坐罪此奏與劉濟略同所謂姦黨蓋仍指廖鵬輩而是年鵬等復以內援緩刑給事中陳時明御史謝汝儀與濟等先後疏爭俱不報二年刑科給事中劉濟言國家置三法司專理刑獄或主鞫問或主評審權臣不得以恩怨為出入天子不得以喜怒為重輕其後又有錦衣衛鎮撫司專理詔獄法久漸弊而三法司幾於虛設陛下升潛盡革舊弊而邇來漸為私移大乖初意如劉最之私討應付黃國用之私出紙牌顔如環之私用違禁包袱俱係小失而緝執于宦寺之門鍛鍊於武夫之手裁決於內降之旨若李洪陳宣罪至殺人降級而已以最等視之奚啻天淵而顧一律罪之其何以示天下得旨奪俸一月三年七月廷杖羣臣爭大禮者四年秋林俊疏論曰古者撻人於朝與衆辱之而已非必欲爛其體膚而致之死也亦非所以待士大夫也成化時臣及見廷撻三五臣容厚綿底衣以重氊疊褁猶床褥數月淤血始消正德時逆瑾用事始啓去衣之端重非國體所宜釀有末年諫止南巡撻死之慘幸遇新詔收恤士氣始回不謂又偶有此臣又見成化𢎞治間詔獄諸旨惟叛逆妖言強盜好生打著問喇唬殺人打著問其餘常犯送錦衣衛鎮撫司問鎮撫奏送法司擬罪中間情重始有來説之旨部寺覆奏始有降調之旨今一概打問無復低昻恐舊典失查非祖宗仁厚之意是年九月御史吳廷舉言應天諸府稅糧逋負過多請申明律例通行遵守於是法司議徴收限期律有明條條例不過推廣律意因事立法耳如違限一年律稱遷徙今以故法不行則有比流減半準徒二年之例又恐準徒無以懲惡則有無故不納秋糧發附近邉衛充軍之例如官吏受財律以枉法論今以枉法準徒五年不足以禁贓汚則有滿貫充軍之例律稱提調管糧官處絞今概擬絞則太重準徒則非制故又分職守等第定為住俸降級之例大抵法在必行刑不輕用諸挾勢姦弊宜如所請行之然東南災傷民困宜及時徴催勿致臨期酷逼違法科斂者罪之如律例從之六年給事中周琅言律令所載凡逮繫囚犯老病必散收輕重以類分枷杻薦席必以時飭涼漿暖匣必以時備無家者給之衣服有疾者豫之醫藥淹禁有科疏決有詔此祖宗良法美意宜敕臣下同為奉行凡逮繫日月并已竟未竟死亡者各載文册申報長吏較其結竟之遲速病故之多寡以為功罪而黜陟之帝深然其言且命中外有用法深刻致戕民命者即斥為民雖才守可觀不得推薦是年侍郎張璁等議覆桂萼所奏謂祖宗設立刑部都察院大理寺謂之法司所以糾官邪平獄訟也設立東厰及錦衣衛所以緝盜賊詰姦宄也夫職業之廢謂之曠官職掌之奪謂之侵官今後凡貪官寃獄仍責法司其有徇情曲法乃聽厰衛覺察盜賊姦宄仍責厰衛必送法司擬罪詔如議行七年給事中蔡經言國家內設法司外設撫按按察等官皆為陛下奉三尺法者故內外有犯責之推鞫在諸臣者亦足以辦之矣今陛下時差官校逮察此屬假勢作威淫刑黷貨譬則虎狼蛇虺咸被毒噬願自今罷勿遣刑部尚書胡世寧請從其議帝納之是年詹事霍韜上疏曰天下軍衛一體也錦衣衛獨稱親軍備禁近也錦衣復掌刑獄不亦甚乎天下刑獄付三法司足矣錦衣衛復橫攬之越介胄之職侵刀筆之權不亦甚乎光武崇髙節名節之士滿東都以扶漢鼎宋祖敦廉恥刑罰不加衣冠忠義之徒爭死沒世今江西事變死者四人足驗今之喪廉恥蔑節義者衆也顧不係所養乎夫士大夫有罪下之刑曹辱矣顧使官校當衆執之脫衣冠以就鎖梏屈體貌以聽武夫朝列清班暮幽犴狴剛氣由此澌滅盡矣使有重罪或廢或誅可也乃解下拘攣便披冕服而武夫悍卒指之曰某也吾得辱之矣小人無所忌憚君子遂致易行豪傑所以多山林之思變故所以鮮節概之士也是年吏部尚書桂萼言捕盜之官有司多羅織平民軍職多妄報首級並宜究治自後凡以妄殺報功者依故殺抵罪且內外贓官所以纍經罷黜而不畏者以所犯贓非枉法雖盈千百貫而罪止罰作也宜更為令下所司議行是年巡撫王應鵬言正德間新增問刑條例四十四欵深中情法宜會官編入不從惟詔偽造印信及竊盜三犯者不得用可矜例刑部尚書胡世寧又請編斷獄新例命止依律文及𢎞治條例行不必編集八年刑部覆詹事霍韜疏言官以贓敗及故禁故勘平人致死者律當斬絞後人惡其厲已於贓罪得贖刑而致人死者置之不問以致贓暴之吏得肆帝是其言詔今後官吏犯枉法贓酷刑致死人命及故禁故勘者論如律是年尚書許瓚言大明律內一欵凡竊盜已行但得財者以一主為重併贓論罪又凡恐嚇取人財物及詐欺誆賺局騙人財物但計贓凖竊盜論又監臨主守常人盜倉庫錢糧俱併贓論罪又知強盜後分贓計所分贓凖竊盜為從論夫併贓者謂合衆賊通算論罪計贓者謂止計各人入已之贓論罪凖者謂與真犯有間律文之權衡非不明也乃司法者多不諳律意頓乖輕重或應計贓者論以併贓又不以一主為重是凖竊盜論反重於真犯數倍安得謂之有間是幾於濫矣又如知監守常人盜倉庫後分贓者緣無主律止坐不應罪名夫竊盜罪止杖徒分其贓猶以盜論盜倉庫錢糧重者抵死分其贓顧反從輕科此幾於縱矣今宜申明律旨計贓者止計入已之贓論併贓者須從一主為論知監守常人盜倉庫分贓者當以知盜後分贓律坐之庶輕重適中不失制律本意帝令法司參詳律例議聞是年刑部議如親屬費用收寄財物不過因其所無而偶用之其情本輕至於相盜則利其所有而侵盜之其情本重今情之重者雖無服得減凡盜一等而情之輕者即有服反概擬於凡人之律人情律意胥失其平請以親屬費用受寄者止擬不應杖罪附入會典帝命再議是年御史朱廷聲言條例所稱喇唬名色除平素凶惡之人犯該前罪照例開發其餘鬭爭等項常事悉依本律斷擬不許妄引前例濫及無辜得旨允行九年三法司議律書所載盜賊二十八條有得財不得財之辨殺人者二十條有成傷輕重保辜限期之分犯姦者十條犯盜法者十二條有捕獲見發之别事例臚分至為明晰而刑曹不察往往茍且成獄當責其如例詳鞫舉得其實然後坐之十一年刑部議覆兵部尚書汪鋐應詔言刑獄之當恤者有五問官明知寃抑而習於因循狃於成案阻於嫌疑溺於私意竟不為白一也罪犯稱寃不服法當調問不已至於再三而竟執原詞牢不可破二也獄具移付廷評或招詞不得其情而駁或以罪不合律而駁駁之愈煩而執之愈固以致禁囚彌年三也原問既當而廷評較論隻字之間往復無已囚無出期四也法司偷惰不自理獄輒付兵馬勘報顛倒出入五也宜申飭省改從之是年刑科給事中王瑄等言頃者審録重囚原案未讀囚詞未終輒已引去而當筆者手不停披且百五十餘人造次而畢殊非慎獄之意乞自今廷審稍展其期令原問衙門各以獄詞朗然宣示使多官雜議務服其心如有疑似亟與分辨帝從之特命會審諸臣盡心詳慎是年刑部尚書王時中疏言近來官司泥執成案偏護已私應減死者或隂斃於法應更訊者或禁繫以終嵗宜令各按臣禁戢有枉法殺人必窮治其罪又在外司理之臣以刻核為威明多縱刑煅煉深文故入宜自今申飭凡罪無正條而犯不應死者不得比附致死違者參治帝從其議十五年有以手足毆人傷重延至辜限外死者刑部議鬭毆殺人論絞大理寺執嘉靖四年例謂當以毆傷論笞部臣言律定辜限而問刑條例又謂鬭毆殺人情實事實者雖延致限外仍擬死罪奏請定奪臣部擬上每奉宸斷多發充軍蓋雖不執前科亦僅未減之耳毆傷情實至限外死即以笞斷是乃僥幸凶人也且如以凶器傷人雖平復例亦充軍豈有實毆人致死偶死限外遂不當一凶器傷人之罪乎矧四年例已報罷請諭中外仍如條例便詔如部議二十年當五年差官審録之期刑科給事中龍遂乞敕所司移文所遣官凡一應重囚務虛心研審必得情真有可辨理釋放發遣審豁者皆速與施行若果有寃枉而初為審辨官所辨出者原勘原問官仍置不論如所辨官明知寃抑故不與辨或忌原問而誣入後為他官所辨出原問經審官皆宜追論若本無寃枉而徇私曲縱者亦宜重譴從之二十二年有偽造察院文書畫押刑部依盜用印信律杖而流之大理寺以律情不合駁之詔法司會議尚書聞淵等因事按律議列四欵一文書以印為重押字次之今後盜用印信即無押字俱坐以前律若止犯押字不必概用前律一律詐為各衙門文書條下在內不及通政司大理寺在外不及鹽運司今後有詐為三衙門文書仍同其餘衙門科斷一六部各司軍衛各所律所不載今後有詐為前項衙門文書套畫押字盜用印信及空紙用印者亦當以其餘衙門律罪之一凡衙門漸次添設及因事特遣者原無刻定印章故臨時請給關防今後如有詐為關防俱比各衙門印信擬罪凡盜用棄毁偽造悉與同科詔從之二十六年給事中查秉彞言律科罰二十兩以上者送部降用非專為守令言也今有罪贖至百兩以上者有無故勸民出粟者甚至有給散人家産者又有從輕發落重拆工價者宜明律令慎罰贖以懲贓濫詔從之二十八年帝以有司妄引條例故入人罪命會官備查各年問刑事例定議以請於是刑部尚書喻茂堅言自𢎞治間定例垂五十年乞敕臣等會同三法司申明問刑條例及嘉靖元年後欽定事例永為遵守𢎞治十三年以後嘉靖元年以前事例雖奉詔革除顧有因事條陳擬議精當可採者亦宜詳檢會茂堅去官詔尚書顧應祥等定議進呈刋布增至二百四十九條詔有任情妄引者重治二十九年給事中俞鸞言比者邉事孔棘軍伍空虛與其投生人於必死之地不若少寬其法因而用之夫今之充軍罪犯條附近之外不過曰邉衛曰邉逺曰極邉而已南北地理不過曰本省隔省再隔省而已以罪之輕重權地之逺近邉衛可以本省擬配邉逺可以隔省擬配極邉可以再隔省擬配如內省無邉方者可以隔省附近邉方擬配邉衛其邉逺極邉亦可依類遞配庶解者易至逃者易勾而有司亦便於遵守部覆從之按嘉靖初更定罪人充軍之制南人發南北人發北逺不過三千里其情重者發極邉既而有司奉行不善逺軍不習水土逃死過半其押解人亦有坐纍以死者鸞為此奏固通知時務之言也三十七年刑部尚書鄭曉等言故事在京官民詞訟俱赴通政司告送法司問斷各衙門有應問者參送法司不得自決比來事權不一諸司各自受詞不復參送甚有私抵贖以為利者且其間拘禁箠楚或妄以意見出入顛倒法令臣竊憫之請申明會典條例令各衙門通行遵守庶政體歸一所罰亦不至乾沒疏入得旨自今詞訟一照舊例各衙門不得干預按嘉靖實録時南京上元縣有越獄之變南京尚書馮嶽亦言近來五城兩縣繫獄甚多皆因各衙門濫受詞訟不送法司讞決故淹禁日久至於生變請盡録繫囚隨輕重決遣之而嚴有司侵官亂法之禁曉因覆其奏以請報可又按明史刑法志時順天巡按鄭存仁檄州縣凡法司有所追取不得輒發曉考故事因言刑部追取人州縣不得却存仁違制宜罪存仁亦執自下而上之律論曉欺罔乃命在外者屬有司在京者屬刑部然自曉去後民間詞訟五城御史輒受之不復遵舊制云是年禮科給事中李得春議罪囚係奉旨貰減者吏不得復坐以他事酷刑久繫獄情真者不許浮辭奏辨開幸免之門死獄重囚非正官不得問理如有轉委佐二或以賄成或以勢奪以故出入人罪論極刑自斃於獄與矜疑瘦死者均之失刑今後有經奏請無枉故延不決及情可矜疑不為伸理者各宜罪之詔如議行三十九年給事中侯廷柱奏言一南京刑部各司官有擅受民詞不由通政司及各衙門參送者有獄成徑自發遣不關白本堂者又有已經大理寺評允而改變情節者夫兩京一體三尺法當與共之請嚴禁一斷獄慎於初情尸傷憑之檢驗近者專委之各城兵馬以致吏書仵作相比為姦宜令覆核一聽斷宜速今一人繫獄動至破家在歇家有保領之例在守門有門禁之擾在皂卒有杖頭之錢在庫役有掌匱之號此其弊端皆由於聽斷不速宜懲一戒百詔皆允行四十四年刑科給事中沈寅奏言一詳慎審録之典每嵗霜降會官朝審造次而畢今後宜令一一唱名讀招參情覆案得其情真有詞及可矜可疑之實宣示所批方行引去一申議恤刑之差部臣奉詔慮囚有所平反而有司故為阻撓皆由事權太輕或不得其人故耳自今宜慎揀而專任之非復命不得升遷地方官有不用命者聽其參奏詔從之穆宗隆慶元年八月南京刑工二部以徒犯錢金等援恩詔乞赦各持論不合移刑部議刑部侍郎樊深等議曰臣謹按令凡徒犯已至配所者例不許放還祇因市板訛謬流傳不一故工部執以為可許刑部執以為不可許以法言之則刑部當是無可疑者苐徒流著役之人雖律令俱稱不宥然恩詔云已發覺未發覺已結正未結正者罪無大小咸赦除之徒流著配之人獨非已結正者乎遵行明詔而又膠柱乎律令奉揚殊典而又掣肘於常法宜乎其執滯不通也况上稽洪武近及嘉靖年間赦書往往於此輩有開釋者亦未聞謂其與律令背馳且徒流之罪例許折贖此輩獨以無力故就胥靡今偽印發冢諸死罪不應折贖者既蒙寬宥而此輩獨以已至配所反不得一沾殊恩恐非所以昭平允疏上詔徒流人已至配所者特許放還三年三月大理寺左少卿王諍言今問刑官每違背律例獨任意見或曰難以照常發落或曰合此某事擬罪自創一例略無顧忌臣請以近事一二證之一律文所謂凡奉制書有所施行而違者杖一百本指制誥而言今則操軍違限守衛官軍不入直開場賭博概用此律臣嘗駁之則執稱律例皆制書也然則律例皆不必用獨用制書有違一句足矣一律文犯姦條下所謂買休賣休和娶人妻者本指用財買求其夫使之休賣其妻而因以娶之者言也故律應離異歸宗財禮入官至若夫婦不合者律應離異婦人犯姦者律應嫁賣則後夫憑媒用財娶以為妻者原非姦情律所不禁矣今則概引買休賣休和娶之律悉令離異財禮入官臣嘗駁之則又執稱買休賣休和娶人妻原不係姦情然則律何為載於犯姦條下也一律文所謂不應得為而為者笞四十重者杖入十蓋為律文該載不盡者方用此律也若所犯明有正條自當依本條科斷今人所犯有手足毆人成傷者應笞三十以他物成傷者應笞四十此其罪名之當得者也今之議罪則曰某除毆人成傷輕罪不坐外合依不應得為而為之事理重者律杖八十夫既除毆人輕罪不坐則無罪可坐矣而又坐以不應得為臣不知其所謂不應得為者何事也人命至重憲典昭然恐不宜附會偏執如此奏上令刑部都察院公議以聞按穆宗實録先是諍與刑部尚書毛愷屢以議獄不合故疏中及之愷不能平執奏部擬皆是又謂買休賣休乃本夫賣無罪之妻為義絶本婦從嫁賣之命為失節買休人娶有夫之婦為苟婚故彼此俱罪本婦歸宗也若犯姦自有正律不當傅此京操班軍違限乃題準事例非制書有違而何事變無窮律文有限則有不應得為而為之律蓋成法也事有情重律輕者則難以照常發落罪有律無正條者則比附律條奏請亦成法也而曰自創一例略無顧忌何耶於是議久不決都察院左都御史王廷刑科左給事中陳行健等皆以諍議為是帝乃令更議買休賣休律而戒愷等今後問擬評駁務協心詳審以副朝廷欽恤之意十二月刑科都給事中舒化等言近者以部院政事屬厰衛嚴訪百官惴惴莫知所措夫祖宗設厰衛以捕盜賊防姦細非以察百官也駕馭百官乃天子之權而奏核諸司責在臺諫厰衛不得與是以各司其事政無牽制今以暗訪之權歸諸厰衛萬一人非正直事出寃誣由此以開羅織之門神陷穽之術網及忠良殃貽善類是非顛倒陛下將安從乎且陛下既委之厰衛厰衛必託之番校此輩貪殘何所不至人心憂危衆目睚眥非盛世所宜有也幸追寢成命以一政體安人心御史劉思賢等亦以為言帝俱付所司知之四年七月刑部尚書葛守禮等言我國家稽古制律例為五刑笞杖徒流各有等則即罪大惡極衆所共棄者猶問以刑部評以大理朝審以多官及至臨刑又三覆五奏若不得已而後加刑焉其重民命如此陛下登極之初大布恩赦與民更生以至停刑有旨熱審有貸其所以憫念黎元者甚厚而在外有司無以奉承休德凡有訊鞫不論輕重動用酷刑有問一事未竟而已斃一二命到任甫期年而拷死數十人者輕視人命有若草菅如汾州知州齊宗堯三年致死五十人榮河知縣吳朝一年致死十七人甚可駭也請行各處撫按官戒諭有司如有仍前慘刻用刑者照例降級為民有故勘故禁故入平人致死者依律抵死容隱者事發并治且律條具在義例昭然而各官素未講讀既不知以律自治又安能以律治人宜依講讀律令條敕下監司以實舉行未仕如辦事進士各衙門堂官督令熟讀講解仍不時考校務使通曉舉人監生待選於吏部者每遇考選摘取律文數條令其覆誦解釋以定銓選次第帝是其言令行撫按官嚴加體訪有仍前酷刑者劾治之如或姑息容隱聽法司該科一併參奏五年二月工部以薊州遵化縣雜造局炒鐵囚徒在厰者百六十餘人既耗囚糧而瘦死相望議欲如正德間例嵗以百人為率滿則暫止配發刑部言在京贖例以工役為至輕以炒鐵為至重今以百名為率則外此雖情重者無所懲矣按律有做工擺站瞭哨發充儀從煎鹽炒鐵各條例自今請斟酌併行情輕者仍擬工役情重者自炒鹽百名之外屬軍衛則發沿邉墩臺瞭哨屬有司則發衝要擺站庶令不至輕縱而姦惡知警詔從其議十月總理河道右副都御史潘季馴言徐邳每嵗河決之由河流衝射居十之四而居民盜決居十之六皆以法輕易犯故也請著令自徐邳上下為河流所經行處凡有貪水利避水患盜決故決河防者一如山東河南例俱發充軍仍增入條例中刑部覆從其議按穆宗實録先是問刑條例有盜決故決河防之律在河南山東者俱問發充軍而南直𨽻徐邳一帶罪止徒配故季馴上此議六年正月刑科都給事中胡檟等言律文矜疑二字雖並言至於求情定罪則二字難於並用蓋所謂矜者如或發於情之所不容已或出於勢之不得不然或迫於相激或陷於無知一旦至抵罪此其情有可矜也所謂疑者或曖昧不明或始終互異貼律則不協比例則未合擬以罪名終難歸結此其罪之有可疑也二字文雖聨絡而其意義甚不相蒙今各省恤刑章奏類云情可矜疑概用無别殊失律義請令刑部申飭諸臣參酌律令剖析情罪如有可矜者則曰情實可矜如有可疑者則曰罪實可疑如將矜疑並用必曰情罪實可矜疑庶於律義為不失而獄情亦允當刑部覆奏從之刑科給事中朱南雍言傷和致災無如寃獄無罪濫及固寃也有罪幸免而俾被殺者銜寃亦寃也是在有司與恤刑者慎之耳今有官類以嚴酷為風力遂使無辜遭戮恤刑官每以多出為稱職反使大憝漏網是皆足以上干天和致生災沴自今宜申飭有司官慎重刑名毋輒輕入恤刑官詳審獄情毋得輕出庶生死無憾刑部覆奏報可神宗萬厯二年九月刑科給事中鄭嶽言律有決不待時秋後處決二欵如有拏獲響馬及大夥強盜百人以上干係城池衙門贓證明白即時奏請審決不必概候決單從之七年十月總督兩廣侍郎劉堯誨上言邇來盜賊繁興皆繇官針不飭上下相效賄賂公行查問刑條例凡衛所職官賣放正軍包攬月糧至二十石以上者罷職發邉衛守禦凡沿邉地方總副參遊守備都司衛守官員但有科斂及扣減入已贓私至二百兩以上者發邉衛永逺充軍四百兩以上者斬首示衆宜一體通行沿海地方以後總參等官有犯此贓數者俱照例究處兵部覆奏允其議十五年十月都察院左都御史吳時來等申明律例六條一律稱庶人之家不許存養奴婢蓋謂功臣之家方給賞奴婢庶民當自服勤勞故不得存養有犯者皆稱雇工人初未言及搢紳之家也且雇工人多有不同擬罪自當有間至若搢紳之家固不得上比功臣亦不可下同黎庶存養家人勢所不免合令法司酌議無論官民之家有立劵用直工作有年限者皆以雇工人論有受直微少工作止計月日者仍以凡人論若財買十五以下恩養已久十六以上配有室家者照例同子孫論或恩養未久不曽配合者在庶人之家仍以雇工人論在搢紳之家比照奴婢律論一律稱偽造諸衙門印信者斬惟銅鐵私鑄者是已若削木磨石團泥鎔蠟等項描畫印文用刀雕刻其文雖印其形質非印也不可以謂之偽造故例又起描模充軍之條以後偽造印信人犯必須獲有銅鐵印信方坐以斬其木石泥蠟止引描模之例若再犯擬斬其行使止一次而贓不滿徒者準竊盜論如再犯引例三犯引律如此則姦偽懲而用刑適中矣一律稱竊盜三犯者絞以曽經刺字為坐但贓有多寡即擬有輕重問刑條例內載英宗皇帝旨今後竊盜初犯再犯赦後又犯者準三犯論還將所犯赦前赦後開奏明白定奪請以後凡遇竊盜三犯俱在赦前俱在赦後者依律論絞或赦前一次赦後二次或赦前三次赦後一次者皆得酌情擬斷奏請定奪審録官附入矜疑辨問疏內并與改遣一強盜明火執仗肆行劫殺創首者在前接踵者在後按贓擬辟決不待時但就擒論罪之時有人贓并獲者有獲後得贓者有贓費無存者其中豈無羅織仇攀妄收抵罪者以後務加意參詳贓迹未確續緝報攀名姓未真者不得遽戮仍行問刑衙門或贓證未明遽難懸斷者俱問擬秋後斬罪一律稱同謀共毆人以致命傷重下手者論絞原謀餘人各得其罪其有兩三人共毆一人各成重傷難定下手及係造謀主令之人遇有在監禁斃者即以論抵今恤刑官遇有在家病故且在數年之後即云某人之死亦可抵某人之命將見監下手之人擬從矜宥是以病亡之軀而抵毆死之命殊屬縱濫以後毋得凖抵將見監者幸免庶生與死兩無憾也一在京惡逆與強盜真犯雖遇停刑之年亦不時處決乃凶惡至於殺父即時凌遲猶有餘憾而在外此類反得遷延嵗月是謂失刑臣看福建有揭羅生兄弟謀殺其父發道送寺擬可單奏逮查之故事當待類奏無單奏例夫單奏急詞也類奏緩詞也如此獄在外數年方轉詳到院道寺羈遲輒復年餘使其在獄尚可正刑典如或瘐死將何以快神人之憤哉請今後在外凡有此者御史單詳到院院寺單奏決單一到即時處決其已死者下府州縣戮其尸庶典刑以正而可以懼天下之賊子矣旨下部寺酌議俱從之惟偽造印文者不問何物成造皆斬報可十九年八月刑部尚書孫丕揚等言折獄欲速而待拆之民常苦於遲由文移牽制故耳議斷案既成部寺各立長單本部送審挂號次日即送大理大理審允挂號次日即還本部參差各自究處庶事體一而風弊消至於打斷相驗例會御史而罪人以速結為願獄魂以早出為安三六九日照例會同餘日止會寺官以速發落徒流而上部寺審鞫不厭其詳笞杖小過聽即處分不為縱也命如議行二十一年六月刑部題犯法愚民何處不有而寃民亦何處不有若非每嵗清理必待五年差官寃抑難免合無照兩京矜疑事例嵗酌一行請於巡按每嵗審録外再立澄清囹圄之法師兩京會審之規為按撫會疏之例方春時和每嵗聽兩直𨽻十三省各撫按官會行所屬問刑衙門各審部內輕重囚犯按察司居省會即審省會之囚守巡道有分土即審各道之囚皆親身巡行不得調審州縣為諸囚纍亦不得委審守令除情真罪當照舊監候外中有死罪矜疑軍徒杖笞情可原宥者許各詳撫按會疏以請疏期勿過夏月輕罪徑自發落重罪仍聽部覆務使嵗嵗力行處處清審庶天下郡縣無一不清之囹圄從之二十三年十月浙江道試御史李宗延請改議嵗清大略謂每嵗罪犯內有熱審外有嵗清熱審會集多官衆議僉同嵗清只一道臣似屬率易且春為嵗清冬為處決中為審録上解者三又屬勞擾乞敕刑部咨行各省直撫按官罷嵗清而比照熱審事例每五月六月流徒笞杖各減二等應枷號者暫免二月其充軍死罪情可矜疑入官給主贓多監久者按臣會審明確未奉單者徑自發落已奉單者差終題豁則熱審之恩遍於天下矣刑部覆請從之二十七年閏四月都察院左都御史溫純等疏請申飭憲綱一恤刑獄國家設三法司又使御史巡視五城為都城內外民雜訟繁欲輕重得其平也然有宜重而得其輕者如以人命付兵馬司是也此輩智暗識短即利啖勢惕皆可使之輕重其情宜專遣刑部司屬覆檢或分委順天府推知鞫訊此重獄之當議者又有宜輕而重者如以笞杖與重辟同評是也夫郡縣笞杖得自裁決民甚便之大司冦秩至隆重一笞杖而不能自裁何其輕也廷尉天下之平平其重者耳一笞杖而必經評允又何其瑣也臣等以為笞杖徒罪宜自司呈堂發落免送寺可也此輕刑之當議者宜與刑部大理寺再議請旨施行一禁酷濫今後御史出巡先須以身率下毋得擅用慘刑凡有司等官有用酷刑殘虐無辜者查實重參縱庇者考察日以不職論議上留中欽定續通典卷一百十二
