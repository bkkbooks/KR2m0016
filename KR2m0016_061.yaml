body:
  text: 禮嘉君臣玉佩劍綬璽印宋遼金元明宋天子凡大祭祀大朝會服衮冕及通天冠絳紗袍皆執圭神宗元豐二年詳定所言周禮祭天地宗廟朝日夕月則執鎮圭唐六典凡祭祀則搢大圭執鎮圭若大朝會止進爵開寶通禮始著元會執圭淳化上夀進酒又令內侍奉圭於周制唐禮皆不合其元會受朝賀請不執圭從之哲宗元祐元年禮部言元豐新禮皇帝祀天搢大圭其制圓首前詘於禮未合欲放西魏隋唐玉笏之制方而不折上下皆博三寸長尺二寸其厚以鎮圭為約從之革帶玉鉤䚢大帶素帶朱裏紕其外上朱下緑紐約用組鹿盧玉具劍大珠鏢首鏢首初用玉太祖建隆元年改用珠白玉雙佩佩有衡有琚瑀有衝牙繫於革帶衡下垂三帶貫以蠙珠次則中有金獸面兩旁夾以雙璜又次設琚瑀下則衝牙居中央兩旁有玉滴子行則擊牙而有聲此徽宗政和議禮局所上制也元組雙大綬六采元黃赤白縹緑純元質長二丈四尺五百首廣一尺小雙綬長二尺六寸色同大綬而首半之間施三玉環皇太子執桓圭革帶塗金銀鉤䚢大帶素帶不朱裏亦紕以朱緑紐約用組朱組雙大綬四采赤白縹緑純朱質長一丈八寸三百二十首廣九寸小雙綬長二尺六寸色同大綬而首半之間施二玉環諸臣祭服九旒冕玉裝劍佩革帶暈錦綬二玉環政和之事革帶以金塗銀玉佩以金塗銀裝冕無額花者師子錦綬二銀環餘同上政和之制紅錦綬金塗銀革帶七旒冕銀裝劍佩革帶餘同九旒冕政和之制同上五旒冕銅裝劍佩革帶餘同七旒冕政和之制皂綾綬銅環金塗銅革帶佩六品以下無劍佩綬御史博士則皂綾綬銅裝劍佩笏文散五品以上皆用象九品以上皆用木武臣內職並用象千牛衣緑亦用象廷賜緋緑者皆給之魚袋以金為魚形公服則繫於前而垂於後以明貴賤大宗雍熙元年南郊後內出魚袋以賜近臣由是內外升朝官皆佩魚凡服紫者飾以金服緋者賜以銀廷賜紫則給金塗銀者賜緋亦有特給者京官幕職州縣官賜紫緋者亦佩親王武官內職將校皆不佩真中大中祥符六年詔技術官未升朝賜紫緋不得佩魚太祖受禪即受周廣順中所造二寶一曰皇帝承天受命之寶一曰皇帝神寶又製大宋受命之寶至太宗又别製承天受命之寶是後諸帝嗣服皆自為一寶以皇帝恭膺天命之寶為文凡上尊號有司製玉寶則以所上尊號為文寶用玉篆文廣四寸九分厚一寸二分填以金盤龍鈕係以暈錦大綬赤小綬連玉環玉檢高七寸廣二寸四分厚四分玉斗方二寸四分厚一寸二分皆飾以紅錦金裝裹以紅綿加紅羅泥金夾帊納于小盝盝以金裝內設金床暈錦褥飾以雜色玻璃碧石珊瑚金精石瑪瑙又盝二重皆裝以金覆以紅羅繡帊載以腰輿及行馬並飾以金又有香爐寶子香匙灰匙火箸燭臺燭刀皆以金為之所謂緣寶法物也别有三印一曰天下合同之印中書奏覆狀流內銓厯任三代狀用之二曰御前之印樞密院宣命及諸司奏狀內用之三曰書詔之印翰林詔敕用之皆鑄以金又以鍮石各鑄其一太宗雍熙三年並改為寶别鑄以金舊六印皆毁之真宗東封作天下同文之寶以印玉䃭大小同御前之寶仁宗慶厯八年刻皇帝欽崇國祀之寶皇祐五年作鎮國神寶哲宗紹聖三年咸陽縣民段義得古玉印上之詔禮部御史臺以下參驗翰林學士承旨蔡京等奏按所獻玉璽色緑如藍溫潤而澤其文曰受命于天既夀承昌其背螭鈕五盤其玉乃藍田之色其篆與李斯小篆體合其為秦璽可知陛下嗣守大寶而神寶自出天之所畀烏可忽哉於是差官奏告天地宗廟齋戒御大慶殿受寶羣臣上夀稱賀徽宗崇寧五年作鎮國寶方四寸有竒螭鈕方盤上圓下方文倣李斯蟲魚篆大觀元年又黜紹聖所得傳國璽自作受命寶方四寸有竒琢以白玉篆以蟲魚合天子皇帝六璽為八寶尚書省奏請鎮國受命寶唯封禪則用之皇帝之寶答鄰國書用之皇帝行寶降御札用之皇帝信寶賜鄰國書及物用之天子之寶答外國書用之天子行寶封册用之天子信寶舉大兵用之二年詔受命寶加鎮國二字政和七年得于闐大玉又製一寶赤螭鈕文曰範圍天地幽贊神明保合太和萬夀無疆號曰定命寶篆以蟲魚製作之工幾於秦璽合前八寶為九詔九寶以定命寶為首其後諸寶俱失惟大宋受命之寶與定命寶獨存髙宗建炎初始作金寶三一曰皇帝欽崇國祀之寶祭祀祠表用之二曰天下合同之寶降付中書門下省用之三曰書詔之寶發號施令用之紹興元年又作玉寶一文曰大宋受命中興之寶又得舊寶二厯世寶之凡上太上皇尊號册后太子皆用焉十六年又作八寶一曰護國神寶以承天福延萬億永無極九字為文二曰受命寶以受命子天既夀永昌為文三曰天子之寶四曰天子信寶五曰天子行寶六曰皇帝之寶七曰皇帝信寶八曰皇帝行寶藏之御府大朝會則陳之上册寶尊號册后太子大禮設鹵簿亦如之寶之制用玉尺度鈕鼻大小綬玉環檢如舊制太宗至道元年製皇太子受册金寶方二寸厚五寸係以朱組大綬連玉環金斗金檢長五寸濶二寸厚二分裹以紅綿加紅羅泥金帊納于小盝盝以金裝內設金牀又盝二重皆覆以紅羅銷金帊盝及腰輿行馬皆銀裝金塗他法物皆銀為之鈒花塗金中興寶龜鈕金塗銀檢及寶斗黝漆盝三重並錦托裏外以金塗銀百花鳳葉子五明裝鑰以金鎖載以黝漆腰輿行馬諸臣之印沿唐制用銅諸王及中書門下印方二寸一分樞密宣徽三司尚書省諸司印方二寸唯尚書省印不塗金餘皆塗金節度使印方一寸九分塗金餘印並方一寸八分唯觀察使塗金諸王節度觀察使州府軍監縣印皆有銅牌長七寸五分諸王廣一寸九分餘廣一寸八分諸王節度觀察使牌塗以金刻文云牌出印入印出牌入其奉使出入或本局無印者皆給奉使印真宗景德初别鑄兩京奉使印又有朱記以給京城及外處職司及諸軍將校等其制長一寸七分廣一寸六分中興仍舊制唯三省樞密院用銀印六部以下用銅印諸路監司州縣亦如之寺監惟長二給焉屬則從其長若倉庫關涉財用司存或給之監司州縣長官曰印僚屬曰記又下無記者止令本道給以木朱記文大方寸或銜命出境者以奉使印給之復命則納于有司後以朝命出州縣者亦如之遼祭山儀皇帝紅帶縣魚三山紅垂飾犀玉刀錯朝服垂飾犀玉帶錯公服玉束帶其漢服衮服革帶大帶劍佩綬其朝服革帶劍佩綬皇太子親王及羣臣皆同七品以下去劍佩綬其公服皇帝九環帶皇太子革帶金鉤䚢紛鞶囊一品以下五品以上帶鉤䚢紛鞶囊六品以下去紛鞶囊常服皇帝九環帶五品以上牙笏金玉帶文官佩手巾算袋刀子礪石金魚袋武官䩞鞢七事佩刀刀子磨石契苾真噦厥針筒大石袋六品以下木笏銀帶魚袋八品九品鍮石帶太宗會同九年伐晉末帝表上傳國寶一金印三三印其文未詳開泰十年馳驛取石晉所上玉璽於中京天祚保大二年遺傳國璽於桑乾河玉印大宗破晉北歸得於汴宫藏隨駕庫穆宗應厯二年詔用太宗舊寶共御前寶金鑄文曰御前之寶以印臣僚宣命詔書寶文曰書詔之寶凡書詔批答用之契丹寶受契丹册儀符寶郎捧寶置御坐東皇太子寶未詳其制重熙九年册皇太子儀中書令授皇太子寶凡諸臣之印吏部印文曰吏部之印銀鑄以印文官制誥兵部印文曰兵部之印銀鑄以印軍職制誥其契丹樞密院契丹諸行軍部署漢人樞密院中書省漢人諸行宫都部署印並銀鑄文不過六字以上以銀硃為色南北王以下內外百司印並銅鑄以丹黃為色諸稅務以赤石為色碩翁寬印以碩翁寬為印紐碩翁寬鷙鳥之總名以為印紐取疾速之義行軍詔賜將帥用之道宗賜耶律仁先鷹紐印即此金天子有鎮圭大圭熙宗皇統九年禮部下太常書鎮圭式大禮使據三禮以進用之世宗太定十一年太常寺言今鎮圭已依古制惟無大圭今御府有故宋白玉圭無上閷終葵首長尺有二寸雖非先王之法蓋後世玉難得隨宜故也擬以御府所藏行禮就用大綬以赤黃黑白緑縹六采織紅羅托裏小綬三色同大綬銷金黃羅綬頭上間施三玉環皆刻雲龍大綬五百首小綬半之緋白大帶銷金黃羅帶頭鈿窠二十四紅羅勒帛青羅抹帶玉佩二白玉上中下璜各一半月各二皆刻雲龍玉滴子各二皆以真珠穿製金箆鉤獸面水葉環釘涼帶一紅羅裏鏤金上有玉鵝七䤩尾束各一金攀龍口以玳瑁板釘襯腳皇太子桓圭長九寸廣三寸厚半寸用白玉若屋之桓楹為二稜瑜玉雙佩四采織成大綬間施玉環三太子入朝起居及與宴則朝服紫袍上加玉帶雙魚袋視事及見師少賔客則小帽皂衫玉束帶臣下朝服正一品佩劍緋白羅大帶天下樂暈錦玉環綬一玉珠佩二金塗銀革帶二品不佩劍雜花暈錦玉環綬餘並同正四品白獅錦銀環綬珠佩銀革帶御史中丞則青荷蓮綬餘並同正五品金雕錦銅環綬銀珠佩餘並同正六品七品黃獅錦銅環綬珠佩銅束帶餘並同大定二十七年監察御史青綬其公服皇太子玉帶佩玉雙魚袋親王玉帶佩玉魚一品玉帶佩金魚二品笏頭毬文金帶佩金魚三品四品荔枝或御仙花金帶並佩金魚五品服紫者紅鞓烏犀帶佩金魚服緋者紅鞓烏犀帶佩銀魚服緑者並皂鞓烏犀帶武官一品二品佩帶同三品四品金帶五品至七品紅鞓烏犀帶皆不佩魚八品以下並皂鞓烏犀帶司天大醫內侍教坊服同文武官惟不佩魚其常服束帶曰吐鶻玉為上金次之犀象骨角又次之銙周鞓小者間置於前大者施於後左右有雙䤩尾納方束中其刻琢多如春水秋山之飾左佩牌右佩刀刀貴鑌柄尚雞舌木黃黑相半有黑雙距者為上或三事五事寶飾以醬瓣樺謂樺皮斑文色殷紫如醬中豆瓣也􅝑口飾以鮫按大金國志金自太子至四品官皆用象簡五品以下用象笏金史中不載附識之以資考核云太宗天會六年始詔給諸司印海陵王正隆元年以內外官印新舊名及階品不一有用遼宋舊印及契丹字者遂定制更鑄三師三公親王尚書令並金印方二寸重八十兩駝紐一字玉印方一寸七分半金鍍銀重四十兩鍍金二字諸郡王印方一寸六分半金鍍銀重三十五兩鍍金三字國公無印一品印方一寸六分半金鍍銀重三十五兩鍍金三字二品印方一寸六分金鍍銅重二十六兩東宫三師宰執與郡王同三品印方一寸五分半銅重二十四兩四品印方一寸五分銅重二十兩五品印方一寸四分銅重二十兩六品印一寸三分銅重十六兩七品印一寸二分銅重十六兩八品印一寸一分半銅重十四兩九品印一寸一分銅重十四兩凡朱記方一寸銅重十四兩章宗泰和元年安國軍節度使髙有鄰言本州所掌印三曰安國軍節度使之印曰邢州觀察使印吏户禮案用之曰邢州之印兵刑工案用之名實不正乞改鑄宰臣奏節度使専行之事自當用節度使印觀察使亦如之其六曹提典所軍兵民訟則當用本州印著為定制上從之八年勑殿前都點檢司依總管府例鑄印以金木水火土五字為號本司差人則給之元天子鎮圭制以玉長尺有二寸有袋副之玉佩珩一琚一瑀一衝牙一璜二衝牙以繫璜珩下有銀獸面塗以黃金雙璜夾之次又有衡下有衝牙旁别施雙滴以鳴用玉大帶以緋白二色羅合縫為之玉環綬制以納竒實上有三小玉環下有青絲織網皇太子衮服玉佩大綬諸臣祭服三獻官及司徒大禮使有紅組金綬紳象笏銀束帶玉佩助奠以下諸執事官有織金綬紳銅束帶銅佩金荔枝帶烏角帶象笏銀杏木笏社稷祭服有藍織錦銅環綬紳紅織錦銅環綬紳紅織錦玉環綬紳黃綾帶佩銅珩璜玉珩璜藍素紵絲銀帶銅帶鍍金銅荔枝帶角帶象笏木笏銅束帶宣聖廟祭服有絨錦綬紳藍結帶銅佩曲享祭服有象牙笏木笏玉佩銅佩藍鞓帶紅鞓帶烏角帶黃鞓帶烏角偏帶大紅金綬結帶黃羅大帶紅羅綬帶黃絹大帶凡百官公服偏帶一品以玉或花或素二品以花犀三品四品以黃金為荔枝五品以下以烏犀並八􅙧鞓用朱革笏制以牙上圓下方或以銀杏木天子八寶曰受命寶曰傳國寶曰天子之寶曰皇帝之寶曰天子行寶曰皇帝行寶曰天子信寶曰皇帝信寶寶輿紅銷金衣龍頭竿結綬盝用銷金蒙覆襯復案諸臣之印皆掌於吏部刻印銷印皆掌於鑄印局惟中書令右左丞相大宗正府扎爾古齊用銀印明太祖洪武元年定天子衮服白羅大帶紅裏玉革帶玉佩大綬六采赤黃黑白縹緑小綬三色同大綬間施三玉環二十六年更定革帶佩玉長三尺三寸大帶緣上以朱錦下以緑錦大綬六采織成純元質五百首餘如舊制成祖永樂三年定玉圭長一尺二寸剡其上刻山四以象四鎮之山以黃綺約其下别以囊韜之金龍文玉佩二各用玉珩一瑀一琚一衝牙一璜二瑀下垂玉花一玉滴二瑑飾雲龍文描金自珩而下繫組五貫以珠玉行則衝牙二滴與璜相觸有聲金鈎二有二大綬六采纁質三小綬色同大綬間施三玉環龍文皆織成通天冠絳紗袍革帶佩綬與衮服同皮辨服白玉佩革帶玉鈎䚢武辨服佩綬革帶如常制玉圭視鎮圭差小剡上方下有篆文曰討罪安民常服束帶間用金琥珀透犀永樂三年更定翼善冠帶用玉皇太子衮服洪武二十六年定圭長九寸九分革帶金鈎䚢玉佩綬五采赤白元縹緑織成純赤質三百二十首小綬三色同間施三玉環大帶白表朱裏上緣以紅下緣以緑永樂三年更定其制玉佩二各用玉珩一瑀一琚一衝牙一璜二瑀下垂玉花一玉滴二瑑雲龍文描金自珩而下繫組五貫以玉珠上有金鈎小綬四采赤白縹緑以副之纁質大帶素表朱裏在腰及垂皆有綼上綼以朱下綼以緑紐約用青組大綬四采赤白縹緑纁質小綬三采間施二玉環龍文皆織成絳紗袍玉佩如冕服但無雲龍文有小綬四采以副之大帶大綬皆如冕服常服玉帶親王與東宫同唯玉圭長九寸二分五釐親王世子洪武二十六年定衮服革帶佩白玉元組綬紫質三采紫黃赤織成間施三白玉環圭長九寸永樂三年更定並與親王同郡王圭長九寸餘與親王世子同郡王長子朝服大紅素羅白素紗二色夾帶玉朝帶丹礬紅花錦錦雞綬玉佩象笏公服玉革帶常服玉束帶鎮國將軍與郡王長子同輔國將軍帶用犀奉國將軍帶用金鈒花鎮國中尉帶用素金佩用藥玉輔國中尉帶用銀鈒花綬用盤雕奉國中尉帶用素銀綬用練鵲文武官朝服公侯伯及一品革帶與佩俱玉綬用黃緑赤紫織成雲鳳四色花錦下結青絲網玉綬環二二品革帶綬環犀餘同一品三品革帶金佩玉綬用黃緑赤紫織成雲鶴花錦下結青絲網金綬環二四品革帶金佩藥玉餘同三品五品革帶銀鈒花佩藥玉綬用黃緑赤紫織成盤雕花錦下結青絲網銀鍍金綬環一品至五品笏俱象牙六品七品革帶銀佩藥玉綬用黃緑赤織成練鵲三色花錦下結青絲網銀綬環二八品九品革帶烏角佩藥玉綬用黃緑織成鸂鶒二色花錦下結青絲網銅綬環二六品至九品笏俱槐木世宗嘉靖八年更定朝服之制綬各從品級花樣革帶之後佩綬繫而掩之其環亦各從品級用玉犀金銀銅不以織於綬大帶表裏俱素惟兩耳及下垂緣緑以青組約之革帶俱如舊式佩玉一如詩傳之制去雙滴及二珩其三品以上玉四品以下藥玉俱如舊式公服腰帶洪武二十六年定一品用玉或花或素二品犀三品四品金荔枝五品以下烏角鞓用青革仍垂撻尾於下笏依朝服公侯駙馬伯與一品同其常服洪武三年定束帶一品玉二品花犀三品金鈒花四品素金五品銀鈒花六品七品素銀八品九品烏角公侯駙馬伯與一品同明初寶璽十七其大者曰皇帝奉天之寶曰皇帝之寶曰皇帝行寶曰皇帝信寶曰天子之寶曰天子行寶曰天子信寶曰制誥之寶曰敇命之寶曰廣運之寶曰皇帝尊親之寶曰皇帝親親之寶曰敬天勤民之寶又有御前之寶表章經史之寶及欽文之璽丹符出驗四方成祖又製皇帝親親之寶皇帝奉天之寶誥命之寶敇命之寶孝宗宏治十三年鄠縣民毛志學於泥河濵得玉璽其文曰受命于天既夀永昌色白微青螭紐陜西巡撫熊翀以為秦璽復出遣人獻之禮部尚書傅瀚言秦璽久亡且受命以德不以璽帝從其言却而不用世宗嘉靖十八年新製七寶曰奉天承運大明天子寶大明受命之寶巡狩天下之寶垂訓之寶命德之寶討罪安民之寶敇正萬民之寶與國初寶璽共為御寶二十四尚寶司掌之皇太子寶用金龜紐篆書親王亦金寶龜紐依周尺方五寸二分厚一寸五分親王世子亦金寶郡王鍍金銀印洪武初鑄中外諸司印信正一品銀印三臺方三寸四分厚一寸六部都察院並在外各都司俱正二品銀印二臺方三寸二分厚八分其餘正從二品官銀印二臺方三寸一分厚七分唯衍聖公以正二品三臺銀印則景泰三年賜也順天應天二府俱正三品銀印方二寸九分厚六分五釐其餘正從三品官俱銅印方二寸七分厚六分唯太僕光祿寺並在外鹽運司俱從三品銅印方減一分厚減五釐四品銅印方二寸五分厚五分五品銅印方二寸四分厚四分五釐惟在外各州從五品銅印方減一分厚減五釐六品銅印方二寸二分厚三分五釐七品銅印方二寸一分厚三分八品銅印方二寸厚二分五釐九品銅印方一寸九分厚二分二釐未入流者銅條記濶一寸三分長二寸五分厚二分一釐以上俱直紐九疊篆文初雜職亦方印至洪武十三年始改條記凡百官唯文淵閣銀印直紐方一寸七分厚六分玉箸篆文誠重之也武臣受重寄者征西鎮朔平蠻諸將軍銀印虎紐方三寸三分厚九分栁葉篆文洪武中嘗用上公佩將軍印後以公侯伯及都督充總兵官名曰挂印將軍有事征伐則命總兵佩印以往旋師則上所佩印於朝此外唯漕運總兵印同將軍其在外鎮守總兵參將挂印則洪熙元年始也有文臣挂將軍印者王驥以兵部尚書征湖貴苗挂征蠻將軍印王越以左都御史守大同挂征西將軍印其他文武大臣有領敇而權重者或給以銅關防直紐廣一寸九分五釐長二寸九分厚三分九疊篆文雖宰相行邊與部曹無異唯正德時張永征安化王用金鑄嘉靖中顧鼎臣居守用牙鏤關防皆特賜也初太祖重御史之職分河南等十三道每道鑄二印文曰繩愆糾繆守院御史掌其一其一藏內府有事則受以出復命則納之洪武二十三年都御史袁泰言各道印篆相類乃命改製某道監察御史其奉差者則曰巡按某處監察御史銅印直紐有眼方一寸五分厚三分八疊篆文欽定續通典卷六十一
