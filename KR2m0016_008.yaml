body:
  text: 食貨賦稅上唐五代宋唐憲宗時分天下之賦以為三一曰上供二曰送使三曰留州宰相裴垍又令諸道節度觀察調費取於所治州不足則取於屬州而屬州送使之餘與其上供者皆輸度支後討淮西判度支楊於陵坐饋運不繼貶以司農卿皇甫鏄代之由是益為刻剝司農卿王遂京兆尹李翛號能聚斂乃以為宣歙浙西觀察使豫之富饒之地以辦財賦鹽鐵使王播言劉晏領使時自按租庸然後知州縣錢榖利病虛實乃以副使程異巡江淮核州府上供錢榖至江淮得錢百八十五萬貫穆宗即位姑息戎臣武卒多非時賞賜饋運不能給帛粟未至而諸軍或強奪於道蓋自建中定兩稅而物輕錢重民以為患至是四十年當時為絹二匹半者今為八匹大率加三倍豪家大商積錢以逐輕重故農人日困末業日增帝亦以貨輕錢重民困而用不充詔有司議革其弊而議者多請重挾銅之律户部尚書楊於陵奏王者制錢以權百貨貿遷有無通變不倦使物無甚貴甚賤其術非他在上而已何則上之所重人必從之古者權之於上今索之於下昔散之四方今藏之公府昔廣鑄以資用今減爐以廢功開元中天下鑄錢七十餘爐嵗盈百萬今才十數爐嵗僅十五萬而已大厯以前淄青太原魏博雜鉛鐵以通時用嶺南雜以金銀丹砂象齒今一用錢貨故錢不足宜使天下兩稅𣙜酒鹽利上供及留州送使錢悉輸以布帛榖粟則人寬於所求然後出內府之所積收市門里之滯廣山鑄之數限邊裔之出禁私家之積則貨日重而錢日輕矣宰相善其議由是兩稅留州皆易以布帛絲纊租庸課調不計錢而納布帛唯鹽酒本以榷率計錢與兩稅異不可去錢太和九年以天下回殘錢置常平義倉本錢嵗增市之非遇水旱不增者判官罰俸書下考文宗嘗召監倉御史崔虞問太倉粟數對以二百五十萬石帝曰今嵗用廣而蓄少奈何乃詔出使郎官御史督察州縣壅遏錢榖者時豪民侵噬産業不移户州縣不敢徭役而征稅皆出下貧至於依富為奴客役罰峻於州縣長吏嵗輒遣吏巡覆田稅民苦其擾宣宗以後四方兵興役重賦繁公私俱困竭矣初乾元末天下上計百六十九州户百九十三萬一百三十四不課者百七十萬四千五百九十二口千六百九十九萬三百八十六不課者千四百六十一萬九千五百八十七減天寶户五百九十八萬二千五百八十四口三千五百九十二萬八千七百二十三元和中供嵗賦者浙西浙東宣歙淮南江西鄂嶽福建湖南八道户百四十四萬比天寶開元四之一兵食於官者八十三萬加天寶三之一通以二户養一兵京西北河北以屯兵廣無上供至長慶中户三百三十五萬而兵九十萬率三户以奉一兵至武宗即位户二百一十一萬四千九百六十會昌末户增至四百九十五萬五千一百五十一宣宗既復河湟天下兩稅榷酒茶鹽錢嵗入九百二十二萬緡嵗之常用率少三百餘萬有司逺取後年乃濟及羣盜起諸鎮不復上計云後唐莊宗同光三年敕城內店宅園囿比來無稅頃因偽命遂有配徴後來以所徴物色添助軍裝衣賜將令通濟宜示矜蠲今據緊慢去處於見輸稅絲每兩作三等酌量納錢其絲仍與除放吏部尚書李琪上疏謂救人瘼者以重斂為病源料兵食者以惠能為軍政伏惟深留宸鑒如以六軍方闕未可輕徭兩稅之餘猶須重斂則但不以折納為事一切以本色輸官又不以紐配為名止以正稅加納天下幸甚敕本朝徴科唯配有兩稅至於折納本不施為宜依李琪所論應逐嵗合納錢物斛斗鹽錢等宜令租庸司指揮並準元徴本色輸納明宗天成四年户部奏三京鄴都諸道州府逐年所徴夏秋稅租兼折徴諸般錢榖等徴條流所有各處節候早晚以差等作期納足長興三年三司奏請諸道上供稅物充兵士衣賜不足其天下所納斛斗及錢除支贍外請依時折納綾羅絹帛從之晉髙祖天福四年敕應諸道節度刺史不得擅加賦役及於縣邑别立監徴所納田租委人户自量自槩周世宗顯德三年敕應天下今後公私織造到絹帛紬布綾羅錦綺及諸色匹帛其幅尺斤兩並須合向來制度不得輕弱假偽妄冒取價又敕舊制織絁絹布綾羅錦綺紗縠等幅其幅濶俱有準制來年所納官絹斤兩不得差誤宋制嵗賦之類有五公田之賦凡田之在官賦民耕而收其租者民田之賦百姓各得専之者城郭之賦宅稅地稅之類丁口之賦百姓嵗輸身丁錢米雜變之賦牛革蠶鹽之類太祖建隆四年令諸州受民租籍不得稱分毫合籥銖釐絲忽錢必成文絹帛成尺粟成升絲緡成兩薪蒿成束金銀成錢開寶三年詔諸州府兩稅所科物非土地所宜者不得抑配八年詔今後民輸稅紬絹不滿匹者許計丈尺納價錢毋得以三户五户聚合成匹送納煩擾真宗大中祥符元年以連嵗豐稔邊儲有備河北諸路賦稅並聽於本州軍輸納二年頒幕職州縣招徠户口旌賞條制九年詔諸路支移稅賦勿至兩次仍許以粟麥蕎菽互相折輸凡嵗賦穀以石計錢以緡計帛以匹計金銀絲緡以兩計藁秸薪蒸以圍計他物各以數計至道末總七千八十九萬三千自唐以來民計田輸賦外增取他物復折為賦謂之雜變亦謂之沿納名品煩細其類不一官司嵗附帳籍並緣侵擾民以為患仁宗明道中詔三司以類併合於是悉除諸名品併為一物夏秋稅苐分粗細二色百姓便之諌官王素奏天下田賦輕重不等請均定歐陽修亦言祕書丞孫琳嘗往洺州肥鄉縣與大理寺丞郭咨以千步方田法括定民田願詔二人者任之三司亦以為然且請擇諸州之尤不均者均之於是遣郭咨往蔡州括一縣得田二萬六千九百三十餘頃均其賦於民後以州縣多逃田未可盡括遂罷初湖廣閩浙因舊制嵗斂丁身錢米大中祥符間詔除丁錢而米輸如故既而漸次蠲免自郭咨均稅之法罷論者謂朝廷徒恤一時之勞而失經逺之意至皇祐中天下墾田視景德增四十一萬七千餘頃而稅榖乃減七十一萬八千餘石田賦不均故其弊滋甚後田京知滄州均無棣田蔡挺知博州均聊城高唐田嵗增賦榖帛無棣總一千一百五十二聊城高唐總萬四千八百四十七乃復詔均定遣官分行諸路祕書丞髙本在遣中獨以為不可才均數郡田而止神宗元豐二年詔諸路支移折稅並具所行月日上之中書權發三司户部判官李琮根究逃絶稅役江浙所得逃户凡四十萬一千三百有竒為書上之明年除琮淮南轉運副使兩路凡得逃絶詭名挾佃簿籍不載并闕丁凡四十七萬五千九百有竒正稅并積負凡九十二萬二千二百貫石匹兩有竒然每遇水旱輒輕弛賦租或蠲放倚閣賦輸逺方不均皆遣使按之陜西轉運使吕大忠令農户支移斗輸腳錢十八御史劾之乃定制均輕重之等以稅賦户籍在第一等第二等者支移三百里三等四等者二百里五等一百里不願支移而願輸道里腳價者亦酌度分為三等以從其便徽宗崇寧二年諸路嵗稔遂行增價折納之法民以榖菽物帛輸積負零稅者聽之又詔天下租賦科撥價折當先富後貧自近及逺乃者漕臣失職有不均之弊其定為令支移本以便邊餉內郡罕用折變之法視嵗豐稔以定物之低昻俾官吏毋得私其輕重又詔比聞慢吏廢期凡輸官之物違期促限蠶者未絲農者未穫追胥旁午民無所措自今前期督輸者加一等坐之致民逃徙者論更加等政和以後天下户口類多不實於是立法比較鈎考嵗終會其數按籍櫽括脫漏又詔諸路凡奏户口令提刑司及提舉常平司參考保奏終莫能拯其弊故租稅亦不得而均是時國用不給凡府畿之外南暨襄唐西及澠池北踰大河民田有溢於初劵者輒使輸公田錢宣和初州縣主吏催科失職逋租數廣令轉運司察守二勤惰聽專達於內侍省浙西荒田天荒草田葑茭蕩湖濼退灘等皆計籍召佃立租以供應奉置局命官有措置水利農田之名部使者且自督御前租課高宗紹興元年五月詔民力久困州縣因緣為姦今頒式諸路凡因軍期不得已而貸於民者並許計所用之多寡量物力之輕重依式開具使民通知凡稅額減去大觀三分之一十五年户部議準法輸官物用四鈔户鈔付民執慿縣鈔關縣司銷簿監鈔納官掌之住鈔倉庫藏之所以防冒偽備毁失也繼而兩浙州縣合輸綿納稅絹茶絹雜錢米六色皆以市價折錢却别科米麥有畞輸四五斗者京西括田租加於舊湖南有土户錢折絁錢醋息錢麵引錢名色不一荆南户口十萬冦亂以來幾無人迹議者希朝廷意謂流民已復可使嵗輸十二積逋至二十餘萬緡民力重困右承議郎魯沖上書論郡邑之弊以臣前任宜興一縣言之漕計合收其名甚繁有丁鹽坊場課利錢租地錢租絲租紵錢每嵗不過一萬五千餘緡其發納之數有大軍錢上供錢糴本錢造船錢軍器物料錢天申節銀絹錢之類嵗支不啻三萬四千餘緡又有見任寄居官請奉過往官兵批劵州郡督索拖欠略無虛日今之為令者茍以寬恤為意而拙於催科旋踵以不職罷何暇承流宣化哉吏部侍郎許興古言今銓曹有知縣令二百餘闕無願就者正緣財賦督迫所以畏避如此若蠲民積欠謹擇守臣則吏稱民安矣詔如所奏行而兩浙江東西積逋悉蠲焉孝宗淳熙五年詔曰比年以來五榖豐登蠶絲盈箱嘉與海內共享阜康之樂尚念耕夫蠶婦終嵗勤動價錢不足以償其勞郡邑兩稅除折帛折變自有常制當輸正色者毋以重價強之折錢臨安府刻石遍賜諸路光宗紹熙元年臣僚言古者賦租出於民之所有不強其所無今之為絹者一倍折而為錢再倍折而為銀銀愈貴錢愈艱得榖愈不可售使民賤糶而貴折則大熟之嵗反為民害願詔州郡凡多取而多折者重置於罰民有糶不售者令常平就糴異時嵗歉平價以糶度於民無傷於國有補詔從之祕書監楊萬里奏輸粟於民謂之苗舊以一斛輸一斛今以二斛輸一斛矣輸帛於官謂之稅舊以正絹為稅絹今正絹外有和買矣舊和買官給其直或以錢或以鹽今皆無之又以絹估直而倍折其錢矣舊稅畞一錢輸免役一錢今嵗增其額不知所止矣既一倍其粟數倍其帛又數倍其錢而又有月樁錢版帳錢不知幾倍於祖宗之舊又幾倍於漢唐之制乎此猶東南之賦可知也至於蜀賦之額外無名者不可得而知也陛下欲薄賦斂當節用度用節而後財可積財積而後國可足國足而後賦可減賦減而後民可富民富而後邦可寧也二年乃詔郡守縣令毋得科斂先期競務辦集理宗嘉熙二年臣僚言陛下自登大寶蠲賦之詔無嵗無之而百姓未霑實惠蓋民輸率先期歸於吏胥攬户乃遇詔下則所放者吏胥之物所倚閣者攬户之錢是以寬恤之詔雖頒然民未霑惠嘗觀漢史恤民之詔多減明年田租今宜倣漢故事如遇朝廷行大惠則以今年下詔明年減租示民先知減數則吏難為欺民慶實賜矣從之淳祐八年監察御史崇政殿説書陳求魯奏本朝仁政有餘而王制未備今之兩稅本大厯之弊法也常賦猶足困民況預借乎以百畞之家計之罄其永業豈足支數年之借操縱出於權宜官吏得以簸弄公私俱困臣愚謂今日救弊之策其大端有四焉宜採夏侯太初併省州縣之議俾縣令得以直達於朝廷用宋元嘉六年為斷之法俾縣令得以究心於撫字法藝祖出朝紳為令之典以重其權遵光武擢卓茂為三公之意以激其氣然後為之正其經界裁其橫斂則預借可革民亦獲利矣議者以為切於當時之弊然宋自南渡以後川蜀之賦最重科斂繁多有諸路常平司坊場錢激賞絹竒零絹估錢布估錢常平積年本息對糴米及他酒鹽諸名色錢大抵於常賦外嵗增錢二千六十八萬緡而茶不預焉軍儲稍充蜀民始困後雖屢經蠲減而其弊不去天下諸郡每年常貢京畿路