body:
  text: 食貨水利田唐宋遼金元明唐代宗大厯五年朗州刺史韋夏卿治槎陂溉田千餘頃十二年昇州句容令王昕因絳巖湖周五百里為塘立二斗門以節旱暵開田萬頃十三年勅毀白渠支流碾磑以溉田徳宗貞元二年明州刺史任侗修鄮縣仲夏堰溉田數千頃又漢州刺史盧士程於雒縣立堤堰溉田四百頃憲宗元和三年福州長樂令李茸於舊海堤築立十斗門以禦潮旱則瀦水雨則洩水遂成良田又江南西道觀察使韋舟築堤扞江長十二里竇以疏漲凡為陂塘五百九十八所灌田萬二千頃穆宗長慶初朗州刺史温造開後鄉渠百里溉田二千頃號古史渠後遷節度河陽復懐州古秦渠枋口樞以溉田濟源温河内武陟四縣田五千頃宋太祖開寳八年知瓊州李易上言州南五里有度靈塘開修渠堰溉水田三百餘頃居民賴之太宗至道元年正月度支判官梁鼎陳堯叟上鄭白渠利害按舊史鄭渠本引涇水自仲山西抵瓠口並北山東注洛三百餘里溉田四萬頃畝収一鍾白渠亦引涇水起谷口入濼陽注渭水長二百餘里溉田四千五百頃兩渠溉田凡四萬四千五百頃今所存者不及二千頃皆近代改修渠堰浸隳舊防由是灌溉之利絶少於古鄭渠難為興工今請遣使先詣三白渠行視復修舊迹於是詔大理寺丞皇甫選光禄寺丞何亮乘傳經度選等使還言周覽鄭渠之制用功最大並仲山而東鑿斷岡阜首尾三百餘里連亘山足堙廢已久其始涇河平淺直入渠口暨年代浸逺涇河陡深水勢漸下與渠口相懸水不能至實難致力其三白渠溉涇陽櫟陽髙陵雲陽三原富平六縣田三千八百五十餘頃此渠衣食之源也望令増築堤堰以固䕶之舊設節水斗門一百七十有六皆壊請悉繕完渠口舊有六石門謂之洪門今亦隤圮若復議興置則其功甚大且欲就近度其岸勢别開渠口以通水道嵗令渠官行視岸之缺薄水之淤填即時浚治嚴豪民盜水之禁涇河中舊有石堰廢壊已久其後止造木堰梢樁出於縁渠之民水潦時漂流散失秋復率民葺之數歛重困自今溉田既畢命水工拆堰木置於岸側可充二三嵗修堰之用所役縁渠之民計田出丁凡調萬三千人疏渠造堰各獲其利固不憚其勞也選能吏司其事置署於涇陽縣側以時行視往復甚便真宗景徳三年鹽鐵副使林特度支副使馬景盛陳關中河渠之利請遣官行視鄭白渠興修古制乃詔太常博士尚賔乘傳經度率丁夫治之賔言鄭渠久廢不可復今自介公廟迴白渠洪口直東南合舊渠以畎涇河灌富平櫟陽髙陵等縣經久可以不竭工既畢而水利饒足民獲數倍大中祥符七年涇原都鈐轄曹瑋言渭北有古池連帶山麓今濬為渠令民導以溉田詔嘉奬之天禧四年淮南勸農使王貫之導海州石闥堰水入漣水軍溉民田亦賜詔嘉奬神宗即位志在富國故以勸農為先仁宗景祐初遣尚書職方員外郎沈厚載出懐衛磁相邢洺鎮趙等州教民種水田神宗熙寧元年詔諸路監司比嵗所在陂塘堙没瀕江圩垾浸壊沃壤不得耕宜訪其可興者勸民興之具所増田畝税賦以聞二年權三司使吳充言前宜城令朱紘治平間修復木渠不費公家束薪斗粟而民樂趨之渠成溉田六千餘頃詔遷紘大理寺丞知比陽縣或云紘之木渠繞山渡溪以行水數勤民而終無功是後置三司條例司具農田利害條約詔頒諸路凡有能知土地所宜種植之法及修復陂湖河港或原無陂塘圩垾堤堰溝洫而可以創修或水利可及泉而為人所擅有或田去河港不逺為地界所隔可以均濟流通者縣有廢田曠土可糾合興修大川溝瀆淺塞荒穢合行濬導及陂塘堰埭可以取水灌溉若廢壊可興治者各述所見編為圖籍上之有司其土田迫大川數經水害或地勢汙下雨潦所鍾要在修築圩垾堤防之類以障水澇或疏導溝洫畎澮以泄積水縣不能辦州為遣官事闗數州具奏取㫖民修水利許貸常平錢糓給用初條例司奏遣劉彛等八人行天下相視農田水利又下諸路轉運司各條上利害又詔諸路各置相度農田水利官至是以條約頒焉秘書丞侯叔獻言汴岸沃壤千里而夾河公私廢田略計二萬餘頃多用牧馬計馬而牧不過用地之半則是萬有餘頃常為不耕之地觀其地勢利於行水欲於汴河兩岸置斗門泄其餘水分為支渠及京索河并三十六陂以灌溉田詔叔獻提舉開封府界常平使行之以著作佐郎楊汲同提舉叔獻又引汴水淤田而祥符中牟之民大被水患都水監或以為非四年前知襄州光禄卿史炤言開修古淳河一百六十里灌田六千六百餘頃修治陂堰民已獲利慮州縣遽欲増税詔三司應興修水利墾開荒梗毋増税五年程昉奏引漳洺河淤地凡二千四百餘頃帝曰灌溉之利農事大本但陕西河東民素不習此茍享其利後必樂趨三白渠為利尤大有舊迹可用力修治凡疏積水須自下流開導則畎澮易治書所渭濬畎澮距川是也其時人人爭言水利提舉京西常平倉陳世修乞於唐州引淮水入東西邵渠灌注九子等十五陂溉田二百里提舉陕西常平沈披乞復京兆府武功縣古迹六門堰於石渠南二百步傍為土洞以木為門回改河流溉田三百四十里大抵迂闊少效六年程昉言得共城縣舊河漕若疏導入三渡河可灌西垙稻田從之五月詔諸創置水磑碾碓妨灌溉民田者以違制論命贊善大夫蔡朦修永興軍白渠七年程昉言滄州増修西流河堤引黄河水淤田種稻増灌塘泊并深州開引滹沱水淤田及開回胡盧河并回滹沱河下尾又金州西城縣民葛徳出私財修長樂堰引水灌溉鄉户土田授本州司士參軍又詔司農寺具所興農田水利次第八年發京東常平米募饑民修水利又管轄京東淤田李孝寛言礬山漲水甚濁乞開四斗門引以淤田權罷漕運再旬從之深州静安令任迫乞俟來年刈麥畢全放滹沱胡盧兩河又引永静軍雙陸口河水淤溉南北岸田二萬七千餘頃河北安撫使沈披請治保州東南沿邊陸地為水田皆從之又右班殿直幹當修内司楊琰言開封陳留咸平三縣種稻乞於陳留界舊汴河下口因新舊二堤之間修築水塘用碎甓作虛堤五步以取汴河清水入塘灌溉從之又江寧府上元縣主簿韓安厚引水溉田二千七百餘頃遷光禄寺丞太原府草澤史守一修晉祠水利溉田六百餘頃又知河中府陸經奏管下淤官私田約二千餘頃下司農覆實九年程師孟言河東多土山高下旁有川谷每春夏大雨衆水合流濁如黄河礬山水俗謂之天河水可以淤田絳州正平縣南董村旁有馬璧谷水嘗誘民置地開渠淤瘠田五百餘頃其餘州縣有天河水及泉源處亦開渠築堰凡九州二十六縣新舊之田皆為沃壤前畢功纘成水利圖經二巻今已十餘年聞南董村田畝舊直三兩千収榖五七斗自灌淤後其直三倍所収至三兩石今臣權領都水淤田竊見累嵗淤京東西鹹鹵之地盡成膏腴為利極大尚慮河東猶有荒廢之田可引大河淤溉者於是遣都水監丞耿琬淤河東路田十年師孟琬引河水淤京東西沿汴田九千餘頃又前權提㸃開封府界劉淑奏淤田八千七百餘頃三人皆減磨勘年以賞之元豐元年都大提舉淤田司言京東西淤官司瘠地五千八百餘頃乞差使臣管幹許之又詔闢廢田興水利建立堤防修貼圩垾之類民力不給者許貸常平倉糓哲宗元祐中知杭州蘇軾奏杭之為州本江海故地水泉鹹苦居民零落自唐李泌始引湖水作六井然後民足於水井邑日富百萬生聚待此而食今湖狹水淺六井盡壊若二十年後盡為葑田按臨安西湖源出於武林泉錢氏有國始置撩湖兵士専一開濬至宋稍廢不治水涸草生漸成田則舉城之人復飲鹹水勢必耗散又放水溉田瀕湖千頃可無凶嵗今雖不及千頃而下湖數十里間茭菱糓米所獲不貲請募民開治禁自今不得侵佔種植及臠葑為界以新舊菱蕩課利錢送錢塘縣収掌謂之開湖司公使庫以備逐年雇人開葑撩淺後湖既開因積葑草為堤相去數里横跨南北兩山夾道植栁林榜曰蘇公堤行人便之因為軾立祠堤上髙宗紹興元年詔宣州太平州守臣修圩三年定州縣圩田租額充軍儲建康府永豐圩租米嵗以三萬石為額圩四至相去皆五六十里有田九百五十餘頃五年明州守臣李光奏明越陂湖専溉農田自慶厯中始有盜湖為田者三司使切責漕臣嚴立法禁宣和以後廢湖為田自是有水旱之患乞行廢罷盡復為湖其江東西圩田蘇秀圍田令監司守令條上詔逐路轉運使相度聞奏十六年知袁州張成已言江西良田多占山岡望委守令講陂塘灌溉之利其後比部員外郎李詠言淮西髙原處舊有陂塘請給錢米以時修濬知江陰軍蔣及祖亦言濬治本軍五缷溝以洩水修復横河支渠以溉旱乃並詔諸路常平司行之孝宗乾道七年修興元府山河堰委御前諸軍統制吳珙經理發卒萬人助役盡修大堰濬大小渠六十五凡溉南鄭襃城田二十三萬餘畝是時詔漕臣王炎開浙西勢家新圍田草蕩荷蕩菱蕩及陂湖溪港岸際旋築塍畦圍裹耕種者所至守令同共措置淳熙八年襄陽府守臣郭杲言本府有水渠在中廬縣界擁漹水東流四十五里入宜城縣後溪南都太守王寵嘗鑿之以引蠻水謂之木里溝可溉田六千餘頃嵗久堙没乞行修治寧宗慶元二年襄陽守臣程九萬言募工修作鄧城永豐堰為農田灌溉之利是時户部尚書袁説友等言浙西圍田相望皆千百畝陂塘漊瀆悉為田疇有水則無地可瀦有旱則無水可戽不嚴禁之後將益甚嘉泰元年以大理司直留佑賢宗正寺主簿李澄措置凡官民圍褁者盡開之又令知縣並以㸃檢圍田事入銜遼太宗㑹同初詔以烏爾古之地水草豐美命諤尔昆錫林居之益以海勒水之善地為農田金章宗明昌五年言事者謂郡縣有河者可開渠引以溉田詔下州郡中都路言安肅定興二縣可引河溉田四十餘畝詔命行之其時傅慎微權陜西諸路轉運使復修三白龍首等渠以溉田募民屯種盧庸為定平令治舊堰引涇水溉田民賴其利六年定制縣官任内有能興水利田及百頃以上者陞本等首注除穆昆所管屯田能創増三十頃以上賞銀絹二十兩疋其租税止從陸田承安二年敇放白蓮潭東牐水與百姓溉田三年命勿毀高梁河閘從民灌溉泰和三年遣官行視中都田禾水澤分數八年詔諸路按察司規畫水田部官謂水田之利甚大沿河通作渠如平陽掘井種田俱可灌溉比年邳沂近河布種豆麥無水則鑿井灌之計六百餘頃比之陸田所収數倍以此較之他境無不可行者遂令轉運司因出計㸃就令審察若諸路按察使因勸農之便按問開河或掘井如何為便規畫具申以俟興作宣宗貞祐三年諭尚書省嵗旱議弛諸處碾磑以其水溉民田又禁隨朝職官奪民碾磑以自營利四年言事者程淵言碭山諸縣陂湖水至則畦為稻田水退種麥則所収倍於陸地宜募人佃之官取三之一嵗可得十萬石詔從之興定五年南陽令李國瑞創開水田二百餘頃詔陞職二等仍録其最狀徧諭諸道其冬議興水田省奏漢召信臣於南陽灌溉三萬頃魏賈逵堰汝水為新陂通運二百餘里人謂之賈侯渠鄧艾修淮陽百尺二渠通淮潁大冶諸陂於潁之南穿渠三百餘里溉田二萬頃今河南郡縣多古所開水田之地収獲多於陸地數倍勑令分治户部按行州郡有可開者誘民赴功其租止依陸田不復添徴仍以官賞給之陜西除三白渠設官外亦宜視例施行元光元年正月遣户部郎中楊大有詣京東西南三路開水田元太宗十二年梁泰奏請修成渠堰比之旱地其収數倍所得糧米可以供軍遂令泰充宣差規措三白渠使郭時中副之置河渠司於雲陽縣世宗中統元年懐孟路旱總管譚澄令民鑿塘造渠引沁水以溉田教之種植地無遺利二年王允中等奉詔開沁河渠計六百七十七里經濟源河内河陽温武陟五縣渠成甚益於民名曰廣濟溉田四百六十餘所三年左丞張守謙薦郭守敬習水利帝召見守敬陳水利言順徳灃河東至古任城失其故道没民田千三百餘頃此水開修成河其田即可耕種又磁相東北滏漳二水合流處引水由滏陽邯鄲洺州永年鷄澤合入灃河可灌田三千餘頃又懐孟沁河雖澆灌猶有漏堰餘水東與丹河餘水相合引東流至武陟縣北合入御河可灌田二千餘頃又黄河自孟州西開引少分一渠經由新舊孟州中間順河古岸下至温縣南復入於河其間亦有可灌田二千餘頃乃授守敬提舉諸路河渠時王允中亦請開邢洺等處漳滏灃河達泉以溉民田遂皆從之至元二年郭守敬以河渠副使從張文謙行省西夏視古渠之在中興者一名唐來長四百里一名漢延長二百五十里他州正渠十皆長二百里支渠大小六十自兵興後皆廢壊淤淺守敬更立牐堰皆復其舊灌田九萬餘頃七年二月立司農司専管農桑水利仍分布勸農官及知水利者巡行郡邑九年詔諸路開濬水利又𠡠巴圖軍於哈哩納之地開渠耕田是時帝加意農田十餘年中屢興水利於是導任河復民田三千餘頃導肥河入於酅淤陂盡為良田又發肅州等處軍民鑿渠溉田浚竒􅚕以溉衮諾爾黄土山民田又開安山渠鑿通州至都河改引渾水溉田其時能興水利之臣西夏行省郎中董文用疏唐來漢延秦家等渠墾中興西涼甘肅𤓰沙等州之土為水田平陽路總管鄭鼎導汾水溉民田千餘頃荆南行省㢘希憲決江陵城外蓄水得良田數萬畝長葛令趙志以地卑濕使為水田旱則決瀵水灌之清苑令耶律伯堅毀勢家水磑以溉民田事聞省部著為定制大理等處巡行勸農使張立道以昆明池環五百餘里夏潦暴至必冒城郭役丁夫二千人治之洩其水得良田萬餘頃衛輝守王昌齡因清水出輝縣入衛河創浚溝澮溉田數百餘頃三十一年即成宗元貞元年平章特爾格奏太湖澱山湖世祖時嘗役民夫二十萬疏掘今諸河日受兩潮漸致沙漲乞即以澱山湖田糧二萬石就募民夫四千調軍夫四千依舊宋例屯守立都水防田使司修治河渠圍田從之成宗大徳二年立浙西都水庸田司専主水利置浙西平江湖渠閘堰凡七十八所武宗至大初江浙行省言去嵗水旱為災百姓艱食農作將興各處田圍髙下不等陂塘圍岸髙渠宜依法修治遇旱則車水灌救遇潦則洩水通流修浚之際田主出糧佃户出力係官圍田無力修浚者官為借貸収成日如數還官其抛荒積水田租額無人承佃者勸諭富戸自備工本修築塍圍聴令佃種抛荒官田止納原租初年免徴三年後依民田輸税其圍岸體式以水為平田與水為平者第一等圍岸高七尺五寸底濶一寸面濶五尺田高一尺為第二等圍岸高六尺五寸底濶九尺靣濶四尺五寸田高三尺為第三等圍岸高五尺五寸底濶八尺面濶四尺田高三尺為第四等圍岸髙四尺五寸底濶七尺面濶三尺五寸田髙四尺者為第五等止添備水圍岸高三尺底濶六尺面濶三尺若迫近諸湖之處自願増高者聴時哈喇哈斯行省和林浚古渠溉田數千頃三年陕西行臺御史王承徳言涇陽洪口展修石渠為萬世之利由是㑹集奉元路三原涇陽臨潼高陵諸縣洎涇陽渭南櫟陽諸屯官及耆老議如準所言展修石渠八十五步計四百二十五尺深二丈廣一丈五尺計用石十二萬七千五百尺官給糧食用具丁夫就役使水之家顧匠傭直使水户均出陕西省議計所用錢糧不及二年之費可謂一勞永逸委屯田府達嚕噶齊珠拉濟督工二百四十二日畢工英宗至治元年陜西屯田府言洪口渠自秦漢至唐宋年例八月差使水户自涇陽縣西仲山下截河作洪堰改涇水入白渠下至涇陽縣北白公斗分為三限北限入三原櫟陽雲陽中限入高陵南限入涇陽澆灌官民田約七萬餘畝三年省臣奏委官體究呉江松江還言宜開浚者常熟七處上海十四處其通海大江舊有河港聫絡官民田土藉以灌溉者亦須疏通以利耕種至泰定帝元年乃浚滌之並立牐以節水勢三年立都水庸田使司於松江掌江南河渠水利文宗大厯二年因屯田總管兼管河渠司事郭嘉議言奉元洪口渠應令涇陽近限水利户添差修築三年懐孟路同知阿哈瑪特言天久亢旱夏麥枯槁秋糓種不入土民匱於食近因訪聞耆老咸稱舟水澆溉近山田土居民深得其利有沁水亦可溉田中統間嘗開廣濟渠設官提調遇旱則官為斟酌騐工多寡分水灌濟源河内河陽温武陟五縣民田三千餘頃後因豪家截河起堰立碾磨壅遏水勢又經霖雨害渠河渠司尋亦革罷今五十餘年舊蹟可考若將舊渠開濬禁安磨碾設立牐堰旱則放牐澆田澇則閉牐退水公私俱利從之順帝至正十二年立都水庸田使司於汴梁掌種植稻田事十三年右丞相托克托言京畿近水地利召江南人耕種嵗可収粟麥百萬餘石不須海運而京師足食於是立分司農司以左丞鳥克遜良棟右丞烏蘭哈達兼大司農卿托克托領大司農事西自西山南至保定河間北至澶順州東至遷民鎮凡係官地及各處屯田悉從分司農司引水立法佃種給鈔五百萬錠以供工價牛具農器糓種之用又以武衛所管鹽臺屯田荒閑之地及各衙門係官田地宗仁衛屯田禮部所轄掌薪司地土並付分司農司播種又取勘徐州汝寧南陽鄧州等處荒田并户絶籍没入官者立司牧署掌分司農司耕牛中書省又議於江浙淮東召募能種水田及修築圍堰之人各一千名為農師教民播種從之是嵗大稔十五年詔凡有水田處設大司農司招集人夫有警乘機進討無事栽植耕種凡置保定河間武清景薊四處二十年陜西行省左丞相特哩特穆尔遣都事楊欽修治涇渠凡溉農田四萬五千餘頃明太祖立國之初以元帥康茂才為都水營田使諭之曰比因喪亂隄防頽圮民廢耕耨故設營田司以修築隄防専掌水利春作方興慮旱澇不時其分巡各處務在蓄洩得宜毋負付任之意遂詔所在有司民以水利條上者即陳奏洪武元年修和州銅城堰閘周迴二百餘里四年修興安靈渠為陡渠者三十六其渠水發海陽山秦時鑿溉田萬頃馬援葺之後圮至是始復八年命耿炳文濬涇陽洪渠堰溉涇陽三原醴泉高陵臨潼田二百餘里九年修彭州都江堰十七年決荆州嶽山壩以溉民田二十四年濬定海鄞二縣東錢湖灌田數萬頃二十七年特諭工部陂塘湖堰可蓄洩以備旱澇者皆因其地勢修治之乃分遣國子生及人材徧詣天下督修水利至明年冬郡邑交泰凡開塘堰四萬九百八十七處三十一年洪渠堰圮命耿炳文修治之復濬渠十萬三千餘丈成祖永樂元年命夏原吉治蘇松嘉興水患濬華亭上海運鹽河金山衛閘及漕涇分水港原吉言浙西諸郡蘇松最居下流嘉湖常頗高環以太湖綿亘五百里納杭湖宣歙溪澗之水散注澱山諸湖以入三泖頃為浦港湮塞漲溢害稼拯治之法在濬吳淞諸浦按吳淞江袤二百餘里廣一百五十餘丈西接太湖東通海前代嘗疏之然當潮汐之衝旋疏旋塞自吳江長橋抵下界浦百二十餘里水流雖通寔多窄淺從浦抵上海南倉浦口百三十餘里潮汐淤塞已成平陸灧沙遊泥難以施工嘉定劉家港即古婁江徑入海常熟白茒港徑入海皆廣川急流宜疏吳淞南北兩岸安亭等浦引太湖諸水入劉家白茒二港使其勢分松㳋大黄浦及遇吳淞要道今下流壅塞難濬旁有范家濵至南倉浦口徑達海宜濬深濶上接大黄浦達泖湖之水庶㡬復禹貢三江入海之舊水道既通乃相地勢各置石閘以時啟閉每嵗水涸宜修圩岸以防暴流則水患可息帝命發民開濬原吉晝夜徒步以身先之明年九月畢功農田大利二年復興安分水塘興安有江源出海陽山江中横築石埭上叠石如鱗以防衝溢自嚴震直撒石増埭水迫無所洩衝塘岸盡趨北渠南渠淺澁民失利至是修復如舊又諭工部安徽蘇松浙江江西湖廣凡湖泊卑下圩岸傾頽亟督有司治之夏原吉復奉命治水蘇松盡通舊河港又濬蘇州千墩等處二萬九千餘丈松江大黄浦等處萬二千丈以通太湖下流五年又築高要銀岡金山等潰堤溉田五百餘頃九年濬濰縣干丹河定襄故渠六十三里引滹沱河水灌田六百餘頃又麗水縣民言縣有通濟渠截松陽遂昌諸溪水入焉上中下三源流四十八𣲖溉田二千餘頃上源民洩水自利下源流絶沙壅渠塞請修堤堰如舊部議從之十三年吳江縣丞李昇言蘇松水患太湖為急宜洩其下流若常熟白茒諸港崑山千墩等河長洲十八都港汊吳縣無錫近湖河道皆宜循其故迹濬而深之仍修蔡涇等閘候潮來往以時啟閘則泛溢可免而民獲耕種之利從之十七年蕭山民言境内河渠四十五里溉田萬頃比年淤塞乞疏濬仍置閘錢清小江壩東庶旱澇無憂山東新城民言縣東鄭黄溝源出淄川下流壅沮滛潦妨農陳家莊南有乾河上與溝接下通烏江乞濬治並從之二十一年修嘉定抵松江潮圮圩岸五千餘丈又文水縣民言文谷山常稔渠分引文谷河流袤三十餘里灌田今河潰洩水應請修葺從之宣宗宣徳二年浙江歸安知縣華嵩言涇陽洪渠堰溉五縣田八千四百餘頃洪武時長興侯耿炳文前後修濬未久堰壊永樂間老人徐齡言於朝遣官修築㑹營造不果乞専命大臣起軍夫協修從之三年臨海民言胡巉諸閘瀦水灌田近年閘壊而金鼇大浦湖淶舉嶼等河遂皆壅阻乞為開築帝曰水利急務使民自訴於朝此守令不得人爾命工部即敇郡縣秋収起工仍詔天下凡水利宜興者有司即舉行毋緩視時巡按江西御史許勝言南昌瑞河兩岸低窪多良田洪武間修築水不為患比年水溢岸圮二十餘處豐城安沙繩灣圩岸三千六百餘丈永樂間水衝改修三十餘丈近者久雨江漲堤壊乞敇有司募夫修理中書舍人陸伯倫言常熟七浦塘東西百里灌常熟崑山田嵗租二十餘萬石乞聽民自濬之皆詔可四年潛江民言蚌湖陽湖皆臨襄河水漲岸決害荆州三衛荆門江陵諸州縣官民屯田無筭乞令軍民築治從之福清民言先賢里官民田百餘頃堤障海水堤壊已久田盡荒蕪永樂中命修治迄今未舉民不得耕帝責有司亟治而諭尚書吳中嚴飭郡邑陂池堤堰及時修濬慢者治以罪六年巡撫侍郎周忱言溧水永豐圩周圍八十餘里環以丹陽石臼諸湖舊築埂壩通陟門石塔農甚利之今頽敗請葺治教諭唐敏言常熟耿涇塘南接梅里通昆承湖北達大江洪武中濬以溉田今壅阻請疏導並從之七年修眉州新津通濟堰堰水出彭山分十六渠溉田二萬五千餘畝英宗正統三年疏泰興順徳鄉三渠引湖溉田寧夏巡撫都御史金濓言鎮有五渠資以行溉今明沙州七星漢伯石灰三渠久塞請用夫四萬疏濬溉蕪田千三百餘頃從之五年令天下有司秋成時修築圩岸疏浚陂塘以便農作仍具數繳報俟考滿以慿黜陟九年浚無錫谷里諸河東南接蘇州苑山湖塘北通揚子江西接新興河引水灌田又開海陽縣隆津等溝引長溪水溉田十三年以雲南鄧川州民田與大理屯田接壤湖畔積水壅沙禾苗揜没命州衛軍民疏治十四年浚和州姥鎮河張家溝并建閘以溉降福等七十餘圩及南京諸衛屯田時范衷知夀昌縣闢荒田二千六百餘畝興水利三百四十六區景帝景泰四年雲南總兵官沐璘言城東有水南流源發邵甸㑹九十九泉為一抵松花壩分為二支一繞金馬山麓入滇池一從黒窯村流至雲澤橋亦入滇池舊於下流築堰溉軍民田數十萬頃霖潦無所洩請令受利之家自造石閘啟閉以時報可五年疏靈寳黎園莊渠通鴻瀘澗溉田萬頃七年尚書孫原貞言杭州西湖為勢豪侵佔湖水淺狹閘石毀壊今民田無灌溉資乞敇有司興濬築禁侵占以便軍民從之英宗天順二年修彭縣萬工堰灌田千餘頃五年僉事李觀言涇水出涇陽仲山谷道高陵至櫟陽入渭袤二百餘里漢開渠溉田宋元俱設官主之今雖有瓠口鄭白二渠而堤堰摧決溝洫壅瀦民弗䝉利乃命有司濬之都御史項忠又言瓠口鄭白二渠宣徳間遣官修鑿畝収三四石無何復塞渠旁之田遇旱為赤地昨請於涇水上源龍潭左側疏濬訖舊渠口尋以詔例停止今宜畢其役邳州知州孟琳言榆行諸社并臨沂河久雨岸崩二十八處低田盡渰乞興修築並從之憲宗成化十年廷臣㑹議江浦北城圩古溝北通滁河浦子口城東黒水泉古溝南入大江二溝相望岡壠中截宜鑿通成河旱引澇洩從之十二年巡按御史許進言河西十五衛東起莊浪西抵肅州綿亘㡬二千里所資水利多奪於勢豪宜設官専理詔屯田僉事兼之十八年濬雲南東西二溝自松華壩黒龍潭抵西南栁壩南村灌田數萬頃二十年修嘉興等六府海田堤岸特遣京堂官往督之時張瑄為廣東布政使修陂塘圩岸四千六百雍泰知吳縣太湖漲没田千頃作堤為民利稱雍公堤孝宗𢎞治七年濬南京天潮二河備軍衛屯田水利特命侍郎徐貫與都御史何鑑經理浙西水利巡撫都御史王珣請於靈州金積河口開渠灌田給軍民佃種從之武宗正徳十五年御史成英言應天等衛屯田在江北滁和六合者地勢低屢為水敗從金城港抵濁河達烏江三十餘里因舊迹濬之則水勢洩而屯田利詔可世宗嘉靖二十四年吕光洵按吳奏蘇松水利五事一曰廣疏濬以備瀦洩開吳淞江等處洩澱山之水以達於海濬白茒等處之水以注於江導田間之水悉入小浦使流者皆有所歸瀦者皆有所洩則下流之地治而澇無所憂矣乃濬艾祁通波以溉青浦濬顧浦吳塘以溉嘉定濬大瓦等浦以溉崑山之東濬許浦等塘以溉常熟之北濬臧村等港以溉金壇濬澡港等河以溉武進凡隴岡支河堙塞不治者皆濬之深廣使復其舊則上流之地亦治而旱無所憂矣一曰修圩岸以固横流向來民間足食有餘力治圩岸田益完美近皆空乏無暇修繕故田圩漸壊嵗多水災合敇所在官司耑治圩岸岸高則田自固雖有霖澇不能為害一曰復板閘以防淤塞一曰量緩急以處工費一曰重委任以責成功詔悉如所議二十六年給事中陳斐請仿江田水田法開江北溝洫以袪水患益嵗収報可三十八年總督尚書楊博請開宣大荒田水利從之是時有司能以水利益民者亷州府知府張岳督民墾棄地教以桔橰運水紹興知府湯紹恩因山陰㑹稽蕭山三邑之水滙三江口入海潮汐日至良田盡為巨浸乃遂建閘三十有八築石堤四百餘丈刻水則石間以時啟閉自是數百里無水患徐九思治張秋河道漕河與鹽河近而不相接漕水溢則泛濫為田患九思議築減水橋於沙灣俾二水相通漕水溢則有所洩而不侵田少則有所限而不至於涸工成遂為永利龎嵩為應天治中江寧縣葛仙永豐二鄉頻遭水患居民止存七户嵩為治隄築防得田三千六百畝立惠民莊四召貧民佃之瞿晟知廣平府鑿長渠三百里引水為四閘得田數十萬畝神宗萬厯十三年以尚寳司少卿徐貞明兼御史領墾田使貞明為給事中嘗請興西北水利如南人圩田之制引水成田工部覆議畿輔諸郡邑以上流十五河之水洩於猫兒一灣海口又極束隘故所在横流必多開支河挑濬海口而後水勢可平疏濬可施然役大費繁而今以民勞財匱方務省事請罷其議乃已後貞明謫官著潞水客譚一書論水利當興者十四條時巡撫張國彦副使顧養謙方開水利於薊永有效於是給事中王敬民薦貞明特召還賜敇勘水利貞明乃先治京東州邑如密雲燕樂莊平峪水峪寺龍家務莊三河塘㑹莊順慶屯地薊州城北黄厓營城西白馬泉鎮國莊城東馬伸橋夾林河而下别山舖夾陰流河而下至於陰流遵化平安城夾運河而下沙河舖西城南鐵厰湧珠湖以下韭菜溝上素河下素河百餘里豐潤之南則大寨刺榆坨史家河大王莊東則榛子鎮西則鴉紅橋夾河五十餘里玉田青莊塢後湖莊三里屯及大泉小泉至於瀕海之地自水道沽關黒巖子墩至開平衛南宋家營東西百餘里南北百八十里墾田三萬九千餘畝至真定將治滹沱近堧地御史王之棟言滹沱非人力可治徒耗財擾民帝是其言將罪諸建議者申時行言墾田興利謂之害民議甚舛顧為此説者其故有二北方民游惰好閒憚於力作水田有耕耨之勞胼胝之苦不便一也貴勢有力家侵占甚多不待耕作坐収蘆葦薪芻之利若開墾成田歸於業户𨽻於有司則已利盡失不便二也然以國家大計較之不便者小而便者大惟在斟酌地勢體察人情沙鹻不必盡開黍麥無煩改作應用夫役必官募之不拂人情不失地利乃謀國長策耳於是貞明得無罪而水田終罷三十年保定都御史汪應蛟言易水可溉金臺滹水可溉恒山溏水可溉中山滏水可溉襄國漳水可溉鄴下而瀛海當衆河下流故號河中視江南澤國不異至於山下之泉地中之水所在皆有宜各設壩建閘通渠築堤高者自灌下用車汲用南方水田法六郡之内得水田數萬頃畿民從此饒永無旱澇之患不幸濵河有梗亦可改折於南取糴於北此國家無窮利也報可應蛟乃於天津葛沽何家圈雙溝白塘令防海軍丁屯種人授田四畝共種五千餘畝水稻二千畝収多因上言墾地七千頃嵗可得糓二百餘萬石是時有司能興水利者陳邦瞻為河南布政使開水田千頃陳㓜學為中牟令縣有大澤積水占膏腴田二十餘里㓜學疏為河者五十七為渠者百三十九俱引入小清河民獲大利大莊諸里多水為築堤十三道障之真定知府郭勉濬大鳴小鳴泉四十餘穴溉田千頃邢臺達活野狐二泉流為牛尾河百泉流為澧河建二十一閘二堤灌田五百餘頃熹宗天啟元年御史左光斗用應蛟策復天津屯田令通判盧觀象管理屯田水利明年巡按御史張慎言自枝河而西静海興濟之間萬頃沃壤河之東尚有鹽水沽等處為膏腴之田惜皆蕪廢今觀象開宼家口以南田三千餘畝溝洫蘆塘之法種植疏濬之方皆具而有法人何憚而不為大抵開種之法有五一官種謂牛種器具耕作雇募皆出於官而官亦盡収其田之入也一佃種謂民願墾而無力其牛種器具仰給於官待納稼之時官十而取其四也一民種佃之有力者自認開墾若干迨開荒既熟較數嵗之中以為常十一而取是也一軍種即令海防營軍種葛沽之田人耕四畝収二石縁有行月糧故収租重也一屯種祖宗衛軍有屯田或五十畝或百畝軍為屯種者嵗入十七於官即以所入為官軍嵗支之用國法兵農之善制也四法已行惟屯種則今日兵與軍分而屯僅存其名當選各衛之屯餘墾津門之沃土如官種行之章下所司命太僕卿董應舉管天津至山海屯田規畫數年開田十八萬畝積榖無算莊烈帝崇禎二年兵部侍郎申用懋言永平濼河諸水逶迤寛衍可疏渠以防旱潦山坡隙地便栽種宜令有司相地察源為民興利從之欽定續通典巻四
