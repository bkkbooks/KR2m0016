body:
  text: 州郡金南京路路河北東路路河北西路山東東山東西南京路金初曰汴京貞元元年更號南京府三領節鎮三防禦八刺郡八縣一百八鎮九十八開封府上留守司留守帶本府尹兼本路兵馬都總管天德二年罷行臺尚書省置轉運司提刑司尋置統軍司領縣十五鎮十五開封東附郭鎮一延嘉祥符西附郭鎮三陳橋八角郭橋陽武通許宋名咸平金大定二十九年以與咸平府重更名泰康鎮一崔橋中牟鎮四嗣田陽武萬勝白沙杞宋雍丘縣杞國也金正隆後更今名鎮一圍城鄢陵鎮一馬棚橋尉氏鎮二朱家曲宋樓扶溝鎮二建雄義店舊有赤倉頭陳留延津貞祐三年升為延州升按河南通志貞祐三年為延州尋廢州復置縣謹附識洧川貞祐二年置惠民倉興定二年以尉氏縣之宋樓鎮升長垣封邱睢州下刺史宋拱州保慶軍金初猶稱拱州天德三年更名領縣三鎮一襄邑鎮一重華考城宋𨽻南京金正隆前𨽻曹州復來屬柘城歸徳府㪚中宣武軍故宋州宋南京應天府河南郡歸徳軍金初置宣武軍領縣六鎮四睢陽宋名宋城金承安五年更名鎮一葛驛寜陵大定二十二年徙於汴河堤南古城下邑按續輿地考金改下邑為夏邑省志亦云當作夏邑為是謹附識鎮一會亭虞城榖熟鎮二營城洛場楚邱金初𨽻曹州海陵後來屬興定元年以限河不便改𨽻單州單州中刺史宋碭郡金貞祐四年升為防禦興定五年置招撫司以安集河北遺黎領縣四單父成武魚臺碭山興定元年以限河不便改𨽻歸徳府壽州下刺史宋𨽻壽春府金貞元元年來屬泰和六年升為防禦領縣二鎮一下蔡䝉城宋𨽻亳州金初來屬鎮一䝉館陜州下防禦使宋陜郡保平軍節度金皇統二年降為防禦貞祐二年升為節鎮領縣四鎮七陜倚鎮一石壕靈寳鎮二乾壕闗束湖城鎮二三門集津閿鄉鎮二張店故鎮舊又有曹張鎮恐誤鄧州武勝軍節度使宋南陽郡嘗置𣙜埸領縣三按元史地理志金舊領穰城南陽内鄉浙川順陽五縣據續輿地考云金省浙川縣入内鄉河南通志云金省順陽縣為鎮盖元志誤也謹附識鎮六穰城倚鎮四順陽新野穰東板橋南陽按元史地理志云金升南陽縣為申州續與地考云金初置陽管縣後始置鎮平縣屬申州金史皆不載謹附識鎮一張村内鄉鎮一峽口唐州中刺史宋淮安郡嘗置𣙜場領縣四鎮四泌陽倚鎮一明陽比陽鎮一羊棚湖陽貞祐元年廢鎮一羅集桐栢大定十年始置正官興定五年廢鎮一許封大定二十八年命規措界壕于唐鄧間裕州本方城縣泰和八年升置以方城縣為倚郭割汝州葉縣許州舞陽𨽻焉領縣三鎮四方城倚鎮一平臺葉本𨽻汝州泰和八年來屬鎮一臨墳舞陽本𨽻許州泰和八年來屬鎮二吳城北舞河南府㪚中宋西京河南府雒陽郡初置德昌軍金興定元年升為中京府曰金昌領縣九正隆郡志有壽安縣紀録皆無鎮四洛陽倚志按宋史地理志河南府治河南縣河南通云金正隆二年省河南入洛陽謹附識鎮一龍門沔池按元史地理志云金升為韶州謹附識登封孟津貞祐三年升為淘州十二月復為縣鎮一長泉舊有河清鎮後廢芝田宋名永安金貞元元年更名新安偃師鎮一緱氏宜陽按河南通志云金改夀安縣為宜陽縣謹附識鞏鎮一洛口嵩州中刺史舊名順州天徳三年更名領縣四按元史地理志云金領伊陽福昌二縣與金史異謹附識鎮四伊陽宋𨽻河南府鎮一鳴臯舊有伊鎮後廢永寜宋𨽻河南府金正隆六年以前寄治於府後即鎮為縣鎮一府店福昌宋𨽻河南府鎮二韓城三鄉長水宋𨽻河南府汝州上刺史宋臨汝郡陸海軍節度金初為刺郡貞祐三年八月升為防禦領縣四鎮二梁郟城宋𨽻許州按宋史地理志改汝州郟城縣為郟縣𨽻許州盖金復為郟城縣來𨽻謹附識鎮一黄道魯山寳豐鎮一汝南許州下昌武軍節度使宋潁昌府許昌郡忠武軍領縣五鎮七長社倚鎮二許由椹澗郾城鎮二駝口新寨長葛臨潁鎮二合流繁城襄城本𨽻汝州泰和七年來屬鎮一潁橋鈞州中刺史舊陽翟縣偽齊升為潁順軍金大定二十二年升為州仍名潁順二十四年更今名領縣二鎮一陽翟倚新鄭宋𨽻鄭州鎮一郭店亳州上防禦使宋譙郡集慶軍𨽻揚州金貞祐三年升為節鎮軍名集慶領縣五鎮五舊有福寜馬頭二鎮鎮一雙溝鹿邑鎮一鄲城衛真鎮一谷陽城父酇鎮一酇陽永城興定五年升為永州以下邑碭山酇縣𨽻焉鎮一保安陳州下防禦使宋淮寜府淮陽郡鎮安軍領縣五鎮二宛丘項城南頓鎮一殄冦商水本激水宋避宣祖諱改西華鎮一長平蔡州中防禦使宋汝南郡淮康軍金泰和八年升為節度軍曰鎮南嘗置𣙜場領縣六鎮二汝陽鎮一保城遂平上蔡西平確山鎮一毛宗平輿息州本新息縣泰和八年升為息州以新息為倚郭割真陽褒信新蔡𨽻焉為蔡州支郡領縣四鎮一新息倚鎮一王務真陽本𨽻蔡州泰和八年來屬褒信本𨽻蔡州泰和八年來屬新蔡本𨽻蔡州泰和八年來屬鄭州中防禦使宋滎陽郡奉寧軍節度領縣七鎮三管城倚貞祐四年更名故市滎陽宻鎮二大騩鏁水河隂原武鎮一陳橋汜水滎澤潁州下防禦使宋順昌府汝隂郡嘗置𣙜場金正隆四年罷𣙜場領縣四鎮十一舊有萬善鎮後廢汝隂倚潁上元光二年改𨽻壽州鎮十永寜漕口王家市櫟頭永清椒陂正陽江陂界溝斤溝泰和沈丘鎮一永安宿州中防禦使宋符離郡保静軍節度𨽻揚州金初𨽻山東西路大定六年來屬貞祐三年升為節鎮軍曰保静領縣四鎮八舊有荆山鎮符離倚鎮三曲溝符離黄團臨涣鎮三栁子鄲澤桐墟靈璧宋元祐元年置鎮一西固蘄鎮一静安泗州中防禦使宋臨淮郡金正隆四年正月罷鳯翔府唐鄧潁蔡鞏洮等州并膠西縣諸𣙜場但置𣙜場於泗州先𨽻山東西路大定六年來屬領縣四鎮六淮平舊盱眙縣明昌六年以宋有盱眙軍故更虹鎮二千仙通海臨淮鎮四安河吳城青陽翟家灣睢寜興定二年以宿遷縣之古城置又有淮濱興定二年以桃園置元光二年廢河北東路天會七年析河北為東西路各置本路兵馬都總管府一節鎮二防禦一刺郡五縣三十鎮三十八河間府中總管府瀛海軍宋河間郡瀛海軍金天會七年置總管府正隆間升為次府置瀛州瀛海軍節度使兼總管置轉運司後復置總管府河北東西大名等路提刑司領縣二鎮三河間倚鎮三䇿城永寜北林肅寜蠡州下刺史宋永寜軍金天會七年升為寜州博野郡軍天德三年更為蠡州領縣一鎮一博野倚鎮一新橋莫州下刺史宋文安郡軍防禦治任丘金貞祐二年降為鄚亭縣領縣一鎮一任丘鎮一長豐獻州下刺史本樂壽縣天會七年升為壽州天德三年更今名領縣二鎮十樂壽倚交河大定七年以石家圈置鎮十景城南大樹劉觧槐家参軍貫河北望夾灘䇿河沙渦冀州上宋信都郡金天會七年仍舊置安武軍節度使領縣五鎮六信都倚鎮一來逺後廢南宫鎮三唐陽後増寜化七公二鎮衡水武邑鎮一觀津後廢棗強鎮一廣川後廢深州上刺史宋饒陽郡防禦金初為刺郡領縣五鎮一静安倚鎮一下博束鹿武強饒陽安平清州中宋乾寧郡軍金天會七年以守邊置防禦領縣三鎮一會川本名乾寧貞元元年更名鎮一范橋興濟本𨽻滄州大定六年來屬靖海明昌四年以清州窩子口置滄州上横海軍按元史地理志作臨海軍謹附識節度使宋景城郡金貞元二年來屬領縣五鎮十一清池鎮五長蘆新饒安舊饒安乾符郭疃舊有郭橋後廢無棣鎮一分水鹽山鎮四海豐海潤後増利豐撲頭二鎮南皮鎮一馬明樂陵舊有㑹寧河永利東中三鎮後廢景州上刺史宋永静軍同下州治東光金初升為景州貞元二年來屬大安間避章廟諱更為觀州領縣六鎮四東光倚鎮一建橋阜城將陵呉橋按續輿地考云金於將陵縣之吳川鎮置縣金史未詳謹附識蓚宋𨽻冀州寜津按續輿地考云本保安鎮金置寜津縣金史未詳謹附識鎮三西保安廣平會津河北西路天會七年析為西路府三節鎮二防禦二刺郡五縣六十一鎮三十三具定府上總管府成德軍宋常山郡鎮州成德軍節度金正隆間依舊次府置本路兵馬都總管府轉運司領縣九鎮三真定倚槀城平山欒城獲鹿興定三年升為鎮寜州權河北西路以經略使武仙駐馬行唐鎮二嘉祐北鎮舊有行臺新年二鎮後廢阜平明昌四年以北鎮置靈壽鎮一慈谷元氏威州下刺史天會七年以井陘縣升置陘山郡軍後為刺史領縣一井陘沃州上刺史宋徽宗升為慶源府趙郡慶源軍治平棘金天會七年改為趙州天德三年更為沃州葢取水沃火之義軍曰趙郡軍後廢軍領縣七鎮一平棘倚臨城高邑贊皇寜晉鎮一奉城栢鄉隆平邢州上安國軍節度使宋信德府鉅鹿郡安國軍節度金天會七年降為邢州仍置安國軍節度領縣八鎮四邢臺唐山按宋史地理志無唐山縣據方輿紀要云本栢人縣唐元宗天寳初改為堯山縣宋因之金改為唐山金史未詳謹附識内丘平鄉鎮一道武任鎮一新店沙河鎮一綦村南和鉅鹿鎮一團城洺州上防禦使宋廣平郡治永年金天會七年以守邊置防禦領縣九鎮四永年鎮一西臨洺廣平本魏縣金大定七年更宗城按宋志宗城縣屬大名府當是金時改屬洺州金史未詳謹附識新安成安肥鄉鎮一新安雞澤曲周鎮二平恩白家灘洺水按方輿紀要云宋初置洺水縣尋廢金復置金史未詳謹附識彰德府㪚下宋相州鄴郡彰德軍節度治安陽金天會七年仍置彰德軍節度明昌三年升為府以軍為名領縣五鎮五安陽倚鎮三天祐永和豐樂林慮舊林慮鎮貞祐三年升為林州置元帥府興定三年升為節鎮以安陽縣水治村為輔巖縣𨽻焉湯隂鎮一鶴璧臨漳鎮一鄴鎮輔巖本水治村興定三年置磁州中刺史宋滏陽郡金初置滏陽郡軍領縣三鎮八滏陽鎮四臺城觀城昭德後廢二祖増臨水鎮武安鎮一固鎮邯鄲鎮三大趙北陽邑城士民須知惟有邯山鎮中山府宋府金天會七年降為定州博陵郡定武軍節度使後復為府領縣七鎮二安喜倚新樂無極永平貞祐二年升為完州平按續輿地考云北平縣宋升北平軍金更永縣金史未詳謹附識慶都按方輿紀要本望都縣金改為慶都縣金史未詳謹附識曲陽劇鎮一龍泉唐鎮一軍城祁州中刺史宋蒲隂郡金初置蒲隂郡軍領縣三蒲隂鼓城深澤濬州中防禦使宋大邳郡通利軍又改平川軍金天會七年以邉境置防禦使皇統八年嫌與宗雋音同更為通州天德三年復領縣二鎮二黎陽衞鎮二衛橋淇門衛州下河平軍節度使宋汲郡金天會七年置防禦使明昌三年升為河平軍節度治汲縣以滑州為支郡大定二十六年以避河患徙於共城二十八年復舊治貞祐三年徙治於宜村新城以胙城為倚郭領縣五鎮二汲新鄉蘇門本共城大定二十九年改為河平避顯宗諱也明昌三年又改今名貞祐三年升為輝州興定四年置山陽縣𨽻焉鎮一早生獲嘉鎮一大寜胙城本𨽻南京海陵時割𨽻滑州泰和七年復𨽻南京八年以限河來屬貞祐三年為衛州倚郭增置主簿興定四年以修武縣重泉村置縣來𨽻滑州下刺史宋靈河郡武成軍本南京屬郡金大定六年割𨽻大名府領縣二鎮二白馬鎮二衛内武城内黄本𨽻大名府大定六年來屬山東東路為京東東路治益都府二節鎮二防禦二刺郡七縣五十三鎮八十三益都府上總管府宋鎮海軍金初仍舊置軍置南青州節度使後升為總管府置轉運司大定八年置山東東西路統軍司領縣七鎮三益都臨胊穆陵貞祐四年升臨朐之穆陵置壽光鎮一廣陵有鹽場博興鎮二博昌淳化臨淄樂安按山東通志云今改千乗縣為樂安縣謹附識鎮四新鎮高家港清河王家濰州中刺史領縣三鎮一北海倚鎮一固底昌邑昌樂濵州中刺史宋軍事領縣四鎮十渤海鎮五豐國寜海濵海蒲臺安平利津明昌三年以永和鎮升置蒲臺按宋朝事實云省蒲臺縣入渤海縣當是金時復置謹附識鎮二安定合波霑化本名招安明昌六年更鎮三永豐永阜永利沂州上防禦使宋琅邪郡領縣二鎮三臨沂劇鎮三長任向城利城費宻州宋為宻州高宻郡安化軍節度領縣四鎮七諸城劇鎮三普慶信陽草橋安丘鎮一李文高宻膠西鎮三張倉梁鄉陳村海州中刺史領縣五鎮四朐山贛榆本懐仁大定七年更鎮二荻水臨洪東海漣水本漣水軍皇統二年降為縣來屬鎮二太平金城州按金志海領縣五而所列止有朐山贛榆東海漣水四縣考宋元二史地理志海州並有沭陽縣續輿地考云金海州領胊山贛榆東海漣水沭陽五縣葢金志脱去沭陽字也謹附識莒州中刺史本城陽軍大定二十二年升為城陽州二十四年更今名領縣三鎮二莒日照按山東通志哲宗元祐二年置日照鎮屬宻州金升為縣來屬謹附識鎮一濤洛沂水鎮一沂安舊有扶溝洛鎮二鎮後廢棣州上防禦使宋安樂郡領縣三鎮九厭次鎮五清河歸化達多永利脂角陽信鎮二欽風西界商河鎮二歸仁官口濟南府㪚上宋齊州濟南郡初置興德軍節度使後置尹置山東東西路提刑司領縣七鎮二十九歴城鎮六盤水中宫老僧口上洛口王舎人店遑墻臨邑鎮三新鎮安肅新市齊河按山東通志云宋于禹城縣之耿濟鎮改置齊河鎮金大定八年升鎮為齊河縣謹附識鎮三晏城劉宏新孫耿章丘鎮四普濟延安臨濟明水禹城鎮三新安仁水寨黎濟寨長清劇鎮六赤荘莒鎮李家莊歸德豐濟隂河濟陽按山東通志云金天會七年始割章丘之標竿鎮及臨邑之故著縣置濟陽縣謹附識鎮四回河曲提舊孫耿仁豐淄州中刺史宋淄川郡軍領縣四鎮六淄川倚鎮三金嶺張店顔袖店長山鄒平鎮三淄鄉介東孫家嶺舊有崖店鎮後廢按山東通志云金明昌中於鄒平之巖口置齊東鎮又云哀宗天興二年以唐青城鎮為青城縣尋廢謹附識高苑萊州上定海軍節度使宋東萊郡領縣五鎮一掖倚萊陽鎮一衡村舊有海倉西由移風三鎮即墨膠水招逺按山東通志云金天㑹中於掖縣之羅峯鎮置招逺縣謹附識登州中刺史宋東牟郡領縣四鎮二蓬萊福山按山東通志云金于唐兩山鎮置福山縣謹附識鎮一孫大川黄鎮一馬亭棲霞按山東通志云金明昌中始於陽疃鎮置棲霞縣謹附識寜海州上刺史本寜海軍大定二十二年升為州按山東通志云金明昌中于牟平縣置寧海軍後改軍為州謹附識領縣二鎮二牟平鎮一湯泉文登劇鎮一温水山東西路府一領節鎮二防禦二刺郡五縣三十七鎮四十八東平府上天平軍節度使宋東平郡舊鄆州後以府尹兼總管置轉運司領縣六鎮十九須城東阿鎮五景德木仁闗山銅城陽劉陽糓鎮二樂安定水汶上本名中都貞元元年更為汶陽泰和八年更今名鎮一柴城壽張大定七年河水壊城遷竹口鎮十九年復舊治鎮一竹口平隂鎮十但歡安寜寜鄉翔鸞固留滑口廣里石横澄空傅家岸濟州中刺史宋濟陽郡舊治鉅野金天德二年徙治任城縣分鉅野之民𨽻嘉祥鄆城金鄉三縣領縣四鎮二任城倚鎮一魯橋金鄉鎮一昌邑嘉祥舊有合來山口二鎮後廢按山東通志云金皇統中析鉅野山口鎮置嘉祥縣謹附識鄆城大定六年徙治盤溝村以避河决徐州下武寜軍節度使宋彭城郡金貞祐三年改棣河南路領縣三鎮五彭城倚鎮三吕梁利國下唐又有厥堌鎮元光二年升為永固縣蕭鎮二白土安民舊有晉城雙溝二鎮豐邳州中刺史宋淮陽軍金貞祐三年改𨽻河南路領縣三下邳蘭陵本承縣明昌六年更名貞祐四年徙治上婁村按山東通志云金明昌初改唐承縣為蘭陵縣興定中置嶧州治此謹附識宿遷元光二年廢滕州上刺史宋滕陽軍金大定二十二年升為滕陽州二十四年更今名貞祐三年為兖州支郡領縣三鎮一滕舊名滕陽大定二十四年更沛鎮一陶陽鄒宋棣泰寜軍博州上防禦使宋博平郡領縣五鎮十一聊城倚鎮二王館武水堂邑鎮二回河侯固博平鎮一博平茌平按東昌府志云唐省茌平入聊城縣宋因之金天㑹中復置謹附識鎮二廣平興利高唐鎮四固河齊城靈城夾灘兖州中泰定軍節度使宋襲慶府魯郡舊名泰寜軍金大定十九年更領縣四嵫陽本瑕丘曲阜宋名仙源云按山東通志金天會中復名曲阜謹附識泗水寜陽舊名龔縣大定二十九年以避顯宗諱改泰安州上刺史本泰安軍大定二十二年升領縣三鎮二奉符倚鎮二太平静封萊蕪新泰德州上防禦使宋平原郡軍領縣三鎮七安德鎮四磁博嚮化盤河德安平原鎮一水務德平鎮二懷仁孔家鎮曹州中刺史宋興仁府濟隂郡彰信軍本𨽻南京金泰和八年來屬大定八年城為河所没遷州治於古乗氏縣領縣三鎮一濟隂倚鎮一濮水定陶本宋廣濟軍神宗熙寜間廢為定陶縣東明初避南京後避河患徙河北寃句故地後以故縣為蘭陽儀封有舊東明城按元史地理志汴梁路有蘭陽儀封二縣河南通志蘭陽縣注云金析東明六鄉為縣取其首鄉曰蘭陽以為名儀封縣注云漢為東昏縣地後魏為孝陽縣北齊廢金復置改曰儀封縣與金史以故縣為蘭陽儀封之説正合是曹州所領當增入蘭陽儀封為五縣謹附識欽定續通典卷一百三十二
