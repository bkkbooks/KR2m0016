body:
  text: 食貨屯田上唐五代宋遼金唐德宗建中初宰相楊炎請置屯田於豐州發關輔民鑿陵陽渠以增溉京兆尹嚴郢嘗從事朔方知其利害以為不便疏奏不報郢又奏五城舊屯其數至廣以開渠之糧貸諸城約以冬輸又以開渠功直布帛先給田者據估轉榖如此則關輔免調發五城田闢比之浚渠利十倍也時楊炎方用事郢議不用憲宗元和中振武軍饑宰相李絳請開營田可省度支漕運及絶和糴欺隱憲宗稱善乃以韓重華為振武京西營田和糴水運使起代北墾田三百頃出贓罪吏九百餘人以耒耜耕牛假種糧使償所負粟二歲大熟因募人為十五屯每屯百三十人耕百頃就髙為堡東起振武西逾雲州極於中受降城凡六百餘里列柵二十墾田三千八百餘里歲收粟三十萬石省度支錢二千餘萬緡重華入朝奏請益開田五千頃法用人七千可以盡給五城㑹李絳已罷後宰相持其議而止至憲宗末天下營田皆雇民或借庸以耕又以瘠地易上地民間苦之穆宗即位詔還所易地而耕以官兵耕官田者給三之一以終身靈武邠寧土廣肥而民不知耕文宗太和末王起奏立營田後党項大擾河西邠寧節度使畢諴亦募士開營田歲收三十萬斛省度支錢數百萬緡貞觀開元後邊土西舉髙昌龜兹焉耆小勃律北抵薛延陀故地縁邊數十州戍重兵營田及地租不足以供軍於是始有和糴周太祖廣順三年敇悉罷戸部營田務以其民隸州縣其田廬牛農器並賜見佃者為永業自唐末中原宿兵所在皆置營田以耕曠土其後又募高貲戸使輸課佃之戸部别置官司總領不𨽻州縣或丁多無役或容庇奸盗州縣不能詰梁太祖擊淮南掠得牛以千萬計給東南諸州農民使歲輸租自是歴數十年牛死而租不除民甚苦之帝素知其弊㑹閤門使知青州張凝請罷營田務李榖亦以為言遂敇罷之宋太宗端拱二年六宅使何承矩請於順安砦西引易河築堤為屯田及承矩知雄州又言宜因積潦蓄為陂塘大作稻田以足食㑹滄州臨津令閩人黄懋上書言閩地唯種水田縁山導泉倍費功力今河北州軍多陂塘引水溉田省功易效三五年間公私必大獲其利詔承矩按視還奏如懋言遂以承矩為制置河北沿邊屯田使懋為大理寺丞充判官發諸州鎮兵一萬八千人給其役凡雄莫霸州平戎順安等軍興堰六百里置斗門引淀水灌溉初年種稻值霜不成懋以晩稻九月熟北霜早而地氣遲江東早稻七月即熟取其種課令種之是歲八月稻熟初承矩建議沮之者頗衆武臣習攻戰亦恥於營葺既種稻不成羣議愈甚事幾為罷至是承矩載稻穂數車遣吏送闕下議者乃息又度支判官陳堯叟等言漢魏晉唐於陳許鄧潁暨蔡宿亳至於壽春用水利墾田陳迹具在請選官大開屯田以通水利發江淮下軍散卒及募民充役給官錢市牛置耕具導溝瀆築防堰每屯十人給一牛治田五十畝雖古制一夫百畝今且墾其半俟久而古制可復也畝約收三斛歲可收十五萬斛七州之間置二十屯可得三百萬斛因而益之數年可使倉廩充實省江淮漕運帝覧奏嘉之遣大理寺丞皇甫選光禄丞何亮乗傳按視經度真宗咸平中大理丞王宗旦請募民耕潁州陂塘荒地凡千五百頃部民應募者三百餘戸詔令未出租稅免其徭役然無助於功利而汝州舊有路南務内園兵人種稻至是命京朝官專掌募民二百餘自備耕牛立團長墾地六百頃導汝水灌溉歲收二萬三千石又知襄州耿望請於舊地括荒田置營田上中下三務調夫五百築堤堰仍集鄰州兵每務一百人荆湖市牛七百分給之是歲種稻三百餘頃四年陜西轉運使劉綜亦言宜於古原州建鎮戎軍置屯田今本軍一歲支給芻糧四十餘萬石束約費茶鹽五十餘萬倘更令逺民輸送其費益多請於軍城四面立屯田務開田五百頃置下軍二千人牛八百頭耕種又於軍城前後及北至水峽口各置堡砦分居其人無寇則耕寇來則戰就命知軍為屯田制置使自擇使臣充四砦監押每砦五百人充屯戌從之既而原渭州亦開方田戎人内屬者皆依之得安其居是時兵費浸廣言屯營田者輙詔邊臣經度行之順安軍兵馬都監馬濟請於靖戎軍東壅鮑河開渠入順安威虜二軍置水陸營田於其側命莫州部署石普䕶其役知保州趙彬奏决雞距泉自州西至蒲城縣分徐河水南流注運渠廣置水陸屯田詔駐治都監王昭遜共成之自是定州亦置屯田五年罷襄州營田下務六年耿望又請於唐州赭陽陂置務如襄州歲種七十餘頃方城縣令佐掌之調夫耘耨景德二年令縁邊有屯營田州軍長吏並兼制置諸營田屯田事舊兼使者如故大中祥符九年改定保州順安軍營田務為屯田務凡九州軍皆遣官監務置吏屬淮南兩浙舊皆有屯田後多賦民而收其租第存其名在河北者雖有其實而嵗入無幾利在蓄水以限戎馬而已天禧末諸州屯田總四千二百餘頃河北歲收二萬九千四百餘石而保州最多逾其半焉繼右正言田况言鎮戎原渭地方數百里舊皆民田今無復農事可即其地大興營田以其兵之不習戰者分耕五百人為一堡三兩堡置一營田官領之播種以時農隙則習武事䟽奏不用後乃命三司戸部副使夏安期等議並置邊屯田迄不能成神宗熈寧三年著作佐郎王韶言渭原城而下至秦州成紀旁河五六百里良田不耕者無慮萬頃治千頃可得三十萬斛因知秦州李師中等奏韶妄指實無其地降韶官其後韓鎮知秦州乃言實有古渭砦地空地四千餘頃遂復韶故官從其所請行之明年河北屯田司奏豐歲屯田入不償費於是詔罷縁邊水陸屯田務募民租佃收其兵為州廂軍時陜西多曠土未耕屯戍不可撤逺方有輸送之勤知延州趙卨請募民耕以紓朝廷憂詔下其事經略安撫使郭逵言懐寧砦所得地百里以務弓箭手無閒田卨又言之遂括地得萬五千餘頃募漢蕃兵幾五千人為八指揮詔遷卨官賜金帛而熈州王韶又請以河州蕃部近城川地招弓箭手以山坡地招蕃兵弓箭手每砦五指揮以二百五十人為額人給地一頃蕃官二頃大蕃官三頃七年以熈河多良田詔委提㸃秦鳯路刑獄鄭民憲興營田許奏辟官屬以集事樞宻使吳充上疏曰今之屯田誠未易行古者一夫百畆又受田十畆為公田莫若因弓箭手倣古助田法行之熈河四州田無慮萬五千頃十分取一以為公田大約中歲畆一石則公田所得十五萬石官無屯營牛具廩給之費借用衆力而民不勞大荒不收而官無所損省轉輸平糴價如是者其便有六而提㸃刑獄鄭民憲言祖宗時屯營田皆置務屯田以兵營田以民固有異制然襄州營田既調夫矣又取鄰州之兵是營田不獨以民也邊州營田不限兵民皆取給用是屯田不獨以兵也至於招弓箭手不盡之地復以募民則兵民㕘錯固無異也而前後施行或侵占民田或差借耨夫或諸郡括牛或兵民雜耕或諸州廂軍不習耕種不能習水土頗致煩擾至於歲之所入不償其費遂又報罷惟因弓箭手為助田法一夫受田百畝别以十畝為公田俾之自備種糧功力歲畝收一石水旱三分除一官無廩給之費民有耕鑿之利若可以為便然弓箭手招至者未安其業而種糧無所仰給又責其借力於公田慮人心易揺乞候稍稔推行九年詔熈河弓箭手耕種不及之田經略安撫司㸃廂軍耕之官置牛具農器人一頃歲終㕘較弓箭手廂軍所種優劣為賞罰弓箭手逃地并營田召佃租課許就近於本城砦輸納仍免折變支移元豐二年改定州屯田司為水利司及章惇築元州亦為屯田務其後遂罷之募民租佃役兵各還所𨽻五年詔提舉熈河等路弓箭手營田蕃部共為一司𨽻涇原制置司提舉熈河營田康識言新復土地乞命官分畫疆界選知田廂軍人給一頃耕之餘悉給弓箭手人加一頃有馬者又加五十畝每五十畝為一營四保砦見缺農作廂軍許於秦鳯涇原熈河三路選募廂軍及馬逓舖卒願行者人給装錢二千詔皆從之知太原府吕惠卿嘗上營田疏曰今葭蘆米脂裏外良田不啻一二萬頃夏人名為真珠山七寳山言其多出禾粟也若耕其半則兩路新砦其費已不盡資内地况能盡闢之乎前此所不敢進耕者外無捍衛也今於葭蘆米脂相去一百二十里間各建一砦又其間置小堡舖相望則延州之義合白草與石州之吳堡尅明以南諸城砦千里邊面皆為内地而河外之州荒閒之地皆可墾闢以贍軍用凡昔為夏人所侵及蘇安靖棄之以為兩不耕者皆可為法耕之於是就糴河外而使河内之民被支移者量出脚乗之直革百年逺輸貴糴以免困公之弊財力稍豐又通葭蘆之道於靈州之神木其通堡砦亦如葭蘆米脂之法而横山膏腴之地皆為吾有矣七年恵卿雇五縣耕牛發將兵外䕶而耕新疆葭蘆吳堡間膏腴地號木𤓰原者凡得地五百餘頃麟府豐州地七百三十頃弓箭手與民之無力及異時兩不耕者又九百六十頃恵卿自謂所得極厚可助邊計乞推之陜西八年樞宻院奏去年耕種木𤓰原凡用將兵人馬之費所收禾粟蕎麥不償所費因詔止恵卿其河東進築堡砦自麟石鄜延南北近三百里及涇原環慶熈河蘭㑹新復城砦地土悉募廂軍配卒耕種免役已而營田司使言諸路募發廂軍皆不嫻耕作遂各遣還其州高宗紹興元年知荆南府解潛奏辟宗綱樊賔措置屯田詔除宗綱充荆南府歸峽州荆門公安軍鎮撫使司措置五州營田官樊賔副之渡江後營田盖始於此其後荆州軍食仰給省縣官之半焉三年懐安府復州漢陽軍鎮撫使陳規倣古屯田凡軍士相險隘立堡砦且守且耕耕必給費斂復給糧依助田法餘並入官凡民水田畝賦稅米一斗陸田豆麥夏秋各五升滿二年無欠給為永業兵民各處一方流民歸業寖衆亦置堡砦屯聚之凡屯田事營田司兼之營田事府縣兼之廷臣因規奏推廣謂一夫受田百畝古制也今荒田甚多當聽百姓請射其有闕耕牛者宜用人耕之法以二人曵一犁凡受田五人為甲别給蔬地五畝為廬舎場圃兵屯以大使臣主之民屯以縣令主以歲課多少為殿最下諸鎮推行之詔江東西宣撫使韓世忠措置建康營田如陜西弓箭手法世忠言沿江荒田大半有主難如陜西例乞募民承佃都督府奏如世忠議仍蠲三年租滿五年田主無自陳者給佃者為永業詔湖北浙西江西皆如之其徭役科配並免五年詔淮南川陜荆襄屯田六年都督張俊奏改江淮屯田為營田凡官田逃田並拘籍以五頃為一莊募民承佃其法五家為保共佃一莊以一人為長每莊給牛五具耒耜及種副之别給十畝為蔬圃貸錢七十千分五年償命樊賔王弗行之尋命五大將劉光世韓世忠張俊岳飛吳玠及江淮荆襄利路師悉領營田使遷賔司農少卿提舉江淮營田置司建康弗屯田員外郎副之官給牛種撫存流移一歲中收榖三十萬石有竒殿中侍御史石公揆監中嶽李寀及王弗皆言營田之害張俊亦覺其擾請罷司以監司領之於是詔帥臣兼領營田九月以川陜宣撫吳玠治廢堰營田六十莊計田八百五十四頃歲收一十五萬石以助軍儲賜詔奨諭二十二年督視湖北京西軍馬汪澈言荆湖兩年屯守襄漢糧餉浩瀚襄陽古有二渠長渠溉田七千頃水渠溉田三千頃兵後堙廢今先築堰開渠募邊民或兵之老弱耕之其耕牛耒耜種糧令湖北京西轉運使措置既省餽運又可安集流亡從之孝宗隆興元年臣僚言州縣營田之費其説有十曰擇官必審募人必廣穿渠必深鄉亭必修器用必備田處必利食用必充耕具必足定稅必輕賞罰必行且欲立賞格以募人及住廣西馬綱三年以市牛㑹有訴襄陽屯田之擾者上欲罷之工部尚書張闡言今日荆襄屯田之害以其無耕田之民而課之游民游民不足而强之百姓於是百姓舎已熟田而耕官生田或逺百里徴呼以來或名雙丁而役其强壮老稚無食一方騷然罷之誠是也然自去歲以來置耕牛農器修長水二渠費已十餘萬一旦舉而棄之則荆襄之地終不可耕也比見兩淮歸正之民動以萬計官不能給食則老弱饑死强者轉而之他若使就耕荆襄之田非唯可免流離抑使中原之民聞之知朝廷有以處我率皆襁負而至矣異時墾闢既廣取其餘以輸官實為兩便詔除見耕者依舊餘令虞仲文同王珏措置二年江淮都督府㕘贊陳俊卿言欲以不披帶人擇官荒田標旗立砦多買牛犁縱種其中官不收租人自樂從數年之後墾田多則榖必賤所在有屯則村落無盗賊之憂軍食既足則饋餉無轉運之勞此誠經久守淮之策詔從之乾道五年四川宣撫使鄭剛中撥軍耕種以歳收租米對减成都路對糴米一十二萬石贍軍然兵民雜處村疃為擾百端又數百里差民保甲教耕有二三年不代者民甚苦之知興元府晁公武欲以三年所收最高一年為額等第均數召佃放兵及保甲以䕶邊從之八月詔鎮江都統司及武鋒軍三處屯田兵並拘收入隊教閲六年罷和揚州屯田八年復罷廬州兵屯田淳熈十年鄂州江陵府駐劄副都統制郭杲言棗易屯田興置二十餘年未能大有益於邊計非田有不良葢人力有所未至今邊陲無事正宜修舉為實邊之計本司有荒熟地七百五十頃乞降錢三萬緡收買耕牛農具便可施功如將來更有餘力可括荒田接續開墾從之光宗紹熈元年知和州劉煒以剰田募民充萬弩手分耕寧宗嘉定三年國子監司業劉爚接伴金使於盱眙軍還言兩淮之利藩蔽江南干戈盗賊之後宜加經理必於招集流散之中就為足食足兵之計淮東地平博膏腴有陂澤水泉之利而荒蕪實多其民勁悍勇敢習邊鄙戰鬬之事而安集者誠能經畫郊野招集散亡約頃畝以授田使無廣占抛荒之患列溝洫以儲水且備戎馬馳突之虞為之具田器貸種糧相其險易聚為室廬使相保䕶聨以什伍教以擊刺使相糾率或鄉為一團里為一隊平居則耕有警則守有餘力則戰帝嘉納之七年以京西屯田募人耕種十三年四川宣撫使安丙總領任處厚言紹興十五年諸州共墾田二千六百五十餘頃夏秋輸租米一十四萬一千餘石餉所屯將兵罷民和糴為利可謂博矣乾道四年以從屯兵歸軍教閱而營田付諸州募佃遂致租利䧟失驕將豪民乗時占據其弊不可概舉今豪强移徙田土荒閒正當拘種之秋合自總領所與宣撫使措置其逃絶之田關内外亦多有之為數不貲其利不在營田之下乞併括之十五年詔江淮荆襄四川制置監司條畫營田來上十七年復命淮東西湖北路轉運司提督營屯田理宗端平元年命王旻守隨州王安國守棗陽蔣成守光化楊恢守均並益兵飭備經理唐鄧屯田又以臣僚言屯五萬人於淮之北且田且守置屯田判官一員經紀其事暇則教以騎射初弛田租三年又三年則取其半知大寧監邵潛言昔鄭剛中營於蜀之關隘雜兵民屯田歲收粟二十餘萬石是後屯田之利既廢糧運之費益增宜詔帥臣縱兵民耕之所收之粟計直以償之則總所無轉輸之苦邊關有儲峙之豐戰有餘勇守有餘備矣從之嘉熈四年孟珙為宣撫四川兼屯田大使軍無宿儲遂大興屯田調夫築堰募農給種首秭歸尾漢口為屯二十為荘百七十為頃十八萬八千二百八十上屯田始末與所减劵食之數降詔奨諭又令流民於邊江七十里内分田以耕遇警則用以守江於邊城三五十里内亦分田以耕遇警則用以守城在砦者則耕四野之田而用以守砦田在官者免其租在民者則以所收十之三歸其主俟三年事定則各還原業淳祐十二年詔襄樊已復措置屯田修渠堰寳祐三年詔撥封椿庫十八界㑹十萬銀二千兩付李夢康措置襄陽屯田又詔沿邊耕屯課入登羡管屯田官推賞荆襄兩淮及山砦如之度宗咸淳元年詔曰淮蜀荆襄之民所種屯田既困重額又困苛取流離之餘口體不充及遇水旱收租不及而催輸急於星火民何以堪其日前舊欠並除之復催者以違制論遼太宗㑹同五年詔以契丹分屯南邊聖宗統和十二年賜南京統軍司貧户耕牛耶律昭言西北諸郡每當農時一夫偵候一夫治公田二夫給糺官之役大率四丁無一室處芻牧之事仰給妻孥一遭冦掠貧窮之室春夏賑恤吏多雜以糠粃重以掊克不過數月又復告困且畜牧者富國之本有司防其隱没聚之一所不得各就水草便地兼以逋亡戍卒隨時補調不習風土故日積月損馴至耗竭為今之計莫若賑窮薄賦給以牛種使遂耕穫置游兵以防盗掠頒俘獲以助伏臘散畜牧以就善地期以數年富强可望時皆以為切論太平七年詔諸屯田在官斛粟不得擅貸在屯者力耕公田不輸賦税興宗重熈十三年詔選南北府兵富者援山西路餘屯田於天徳軍道宗大安初年西蕃多叛上欲為守禦計命耶律唐古督耕稼以給西軍唐古率衆田臚胊河側歳登上熟移屯鎮州凡十四稔積粟數十萬斛每斗不過數錢金太祖收國元年敗遼軍於阿婁岡獲其耕具數千給賜諸軍天輔五年二月分諸路明安穆昆之民萬戸屯㤗州賜耕牛五十其時伐遼取㤗州徙遼降人居之命千戸穆昆宗雄按視泰州地戸宗雄包其土來奏曰其土如此可種植也由是徙萬家屯田泰州以博勒和為都統太宗天㑹九年詔新徙戍邊戸乏耕牛者給以官牛别委官勸督田作其續遷戍戸在中路者姑止之即其地種藝俟畢穫而行及來春農時至戌所熈宗天眷初年以既取江南慮中原士民懐貳始創屯田軍凡女真奚契丹之人皆自本部徙居中州與百姓雜處計其戸口授以官田使自播種春夏量給其衣遇出師始給錢米凡屯田之所自燕南至淮隴之北俱有之皆築壘於村落間世宗大定三年以正隆兵興農桑失業明安穆昆屯田多不如法遣戸部侍郎魏子平等分道勸農二十一年以山東路所括民田分給女真屯田人戸又時以黄河移故道梁山濼水退地甚廣遣使安置屯田民時帝意不欲明安穆昆人戸與民戸雜居凡山東兩路屯田與民田互相犬牙者皆以官田對易御史中丞張九思言屯田明安人戸為盗徴償家貧輙賣屯地凡家貧不能徴償者止令事主以其地招佃收其租入估價與徴償相當即以其地還之臨洮尹完顔讓亦論屯田貧人徴償賣田乞用九思議詔可二十二年以山東屯田戸鄰于邊鄙命聚之一處俾恊力耕種章宗明昌元年勅當軍人所授田止令自種力不足者方許承佃亦止隨所産納租其有自願折錢輸納者從民所願不願承佃者毋强又勅隨處係官閑地百姓已請佃者仍舊未佃者付明安穆昆屯田承安二年差戸部郎中李敬義往臨潢等路規畫農事舊令軍人所授之地不得租賃於人違者苗付地主五年中都山東河北屯駐軍人地土不贍官田多為民所冐佔主兵者言比歲征伐軍多敗衂盡由屯田地寡不免饑寒故無鬬志願括民田之冐稅者分給之則士氣自倍朝議已定平章政事張萬公獨上書言其不可者五大略以為軍旅之後瘡痍未復百姓拊摩之不暇何可重擾一也通檢未久田有定籍括之必不能盡適足増猾吏之弊長告訐之風二也浮費侈用不可勝計推之以養軍可斂不及民而無待於奪民之田三也兵士失於選擇强弱不别而使同田共食振勵者無以盡其力疲劣者得以容其奸四也奪民而與軍得軍心而失天下心其禍有不可勝言者五也必不得已乞以冐地之已括者召民蒔之以所入贍軍則軍有坐獲之利而民無被奪之患矣書奏不報命樞宻使宗浩禮部尚書賈鉉佩金符行省山東等路括地給軍凡得地三十餘萬給軍順天軍節度使張行簡上言比者括官田給軍既一定矣有告欲别給者輙從其告至今未已名曰官田實取之民以與之臣所管已撥深澤縣地三百餘頃復告水占沙鹻者三之一若悉從之何地可定臣謂當限以月日不許再告為便下尚書省議奏請如實有水占河塌不可耕種按視覆同然後改撥若沙鹻瘠薄當凖已撥為定制曰可泰和四年定制所撥地止十里内者自種之每丁四十畝續進丁同此餘者許令便宜租賃及兩和分種違者錢業還主五年二月帝又聞六路括地時其間屯田軍戸多冐民増口以請官地及包取民田而民有空輸稅賦虚抱物力者應詔陳言人多論之遣官分清追照案憑尚書省奏遣官徒滋訟言乃令虚抱稅石已輸送入官者於稅内續扣之宣宗貞祐三年以時方南遷徙河北軍戸於河南議所以處之者宰臣言當指官田及牧地分畀之已為民田者則俟秋穫後仍日給米一升折以分鈔大常丞舒穆嚕世勣曰荒田牧地耕闢費力奪民素墾則民失所帝欲從宰臣議侍御史劉元規復上言帝乃罷之後因北方侵及河南盡起諸路軍戸南來共圖保守復議得軍糧之術或益賦或與軍田二者孰便㕘政髙汝礪言河南官民地相半又多全佃官地之家一旦奪之何以自活小民易動難安一時避賦遂有捨田之言及與人又復悔悔則忿心生矣如山東撥地時腴地盡入富家瘠者乃付貧户無益於軍而民有損惟當倍益官租以給軍食復以係官荒田牧地量數與之令其自耕則民不失業官不厲民矣從之又言河北軍戸徙居河南者幾萬口疑當作百萬口或係史之誤人日給粟一升歳費三百六十萬石半以給直猶支三百萬疑當作二百萬河南租地計二十四萬頃嵗租計一百五十六萬乞於經費之外倍徴以給之帝命右司諫馮開等五人分行諸郡就授以荒官田及牧地可耕者人三十畝至十一月又以括荒田及牧馬地給軍事命汝礪總之汝礪還奏今頃畝之數較之舊籍甚少復多瘠惡不可耕又僻逺之處必徙居以就之彼皆不能自耕必以與人又當取租於數百里之外况今農田且不能盡闢豈有餘力以耕叢薄交固草根紏結之荒地哉詢諸軍戸皆欲得半糧猶足自養得田不能耕復罷其廩將何所頼臣知初籍地之時未嘗按閱其實所以不如其數不得其處也若復考計州縣必各妄承風㫖追呼䆒訐以應命不足其數則妄指民田以充之所在又騷然矣今民之賦役三倍平時飛輓轉輸日不暇給而復為此舉將何堪之且軍户蹔遷行有還期何為以此病民病民而軍獲利猶不可為况無所利乎遂詔罷給田但半給糧半給實直焉四年復遣官括河南牧馬地既籍其數帝命省院議所以給軍者宰臣言今軍户當給糧者四十四萬八千餘口計當口占六畝有竒繼來者不與焉相去數百里者豈能以六畝之故逺來兼月支口糧不可遽罷臣等竊謂軍戸願佃者即當計口給之其餘僻逺不願者宜凖近制係官荒地許軍民耕闢例令軍民得占蒔之院官言牧馬地少且久荒難耕軍戸復乏農器不給之則彼自支糧外更無從得食非蓄銳待敵之計給之則未能遽减其糧若得遲以歳月俟頗成倫次亦漸可以省官廩今奪於有力者即以授之其無力者恐無以耕乞令司縣官勸率民者借牛破荒至來春然後給之司縣官能率民户以助耕而無騷動者量加官賞庶幾有所激勸宰臣又言若如所言則司縣官貪慕官賞必將抑配以擾民况民家之牛量地而畜之比年以來農功甫畢併力轉輸猶恐不及豈有暇耕他人之田唯如前奏為便詔再議之乃議民有能開牧馬地及官荒地作熟田者以半給之為永業半給軍戸奏可省臣又奏自古用兵且耕且戰是以兵食交足今諸帥分兵不啻百萬一充軍伍咸仰於官至於婦子居家安坐待哺盖不能屯田為經久之計也願下明詔令諸帥府各以其軍耕耨亦以逸待勞之策詔從之興定二年帝諭樞宻院曰中京商虢諸州軍人願耕屯田比已括地授之聞徐宿軍獨不願受意謂予田必絶其廩給也朕肯爾耶其以朕意曉之因命諸軍徧授屯田邳州行省侯摯言東平以東屢經殘燬邳海之間貧民失業者甚衆日食野菜無所依倚恐因而嘯聚以益敵乞募邊為兵自十月給糧使充戍役至二月罷之人授地三十畝貸之種粒而騐其收穫量數取之逮秋復𨽻兵伍且戰且耕公私交利亦望被俘之民易於招集也至三年籍邳海等州義軍及脅從歸國而充軍者人給地三十畝有力五十畝仍蠲差稅日支糧二升四年移刺不言軍戸自徙河南數歳尚未給用兼以移徙不常莫得安居故貧者甚衆請括諸屯處官田人給三十畝仍不移屯他所如此則軍戸可以得所官糧可以漸省宰臣奏前此亦有言授地者樞宻院謂俟事緩而行之今河南罹水災流亡者衆所種麥不及五萬頃殆减往年大半歳入不能足若撥授之為永業俟有穫即罷其家糧亦省費之一端也從之五年京南行三司舒穆嚕斡魯言京南東西三路屯軍老幼四十萬口歲費糧百四十餘萬石皆坐食民租甚非善計宜括逋户舊耕田南京一路舊墾田三十九萬八千五百餘頃内官田民耕者九萬九千頃有竒今饑民流離者大半東西南路計亦如之朝廷雖招使復業民恐既復之後生計未定而賦歛隨之往往匿而不出若分給軍户人三十畝使之自耕或召人佃種可數歲之後蓄積漸饒官糧可罷令省臣議之仍不果行欽定續通典卷五
