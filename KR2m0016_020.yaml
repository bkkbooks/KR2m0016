body:
  text: 選舉雜議論上唐代宗寶應二年禮部侍郎楊綰言進士科起隋大業中是時猶試䇿而已髙宗朝劉思立為考功郎又奏進士加雜文明經加帖故為進士者皆誦當代之詩文而不通經史明經者但記帖括又投牒自舉非古先哲王仄席待賢之意請依古制令縣令察孝亷其有孝義廉恥之行而通經者薦之于州州試其所通之學送于省自縣至省皆勿自投牒其到狀保辨識牒皆停而所習取大義聽通諸家之學每經問義十條問畢對䇿三道皆通為上第吏部官之經義通八䇿通二為中第與出身下第罷歸論語孝經孟子兼為一經其明經進士及道舉並停詔議之給事中李栖筠尚書左丞賈至等議曰三代之選士任賢皆取實行故能風俗淳一運祚長逺秦坑儒士二代而亡漢興監其然尊儒術尚名節雖王莽竊位强臣擅權弱主外立母后專政而亦能終彼四百豈非學行之效耶魏晉以來專尚浮侈德義不修故子孫速顛享國不永也今綰所請實為正論然自晉室之禍南北分裂人多僑處必欲復古鄉舉里選竊恐未盡請兼廣學校以明訓誘雖京師州縣皆立小學兵革之後生徒流離儒臣師氏祿廩無向請增博士員厚其廩稍選通儒碩生閒居其職十道大郡置太學館遣博士出外兼領郡官以教生徒保桑梓者鄉里舉焉在流寓者庠序推焉朝而行之夕見其利而衆論以為舉進士久矣廢之恐其失業乃詔明經進士與孝廉兼行廣德元年綰復上貢舉條目曰孝廉舉人取精通一經每經問義二十條試䇿三道每日問一道經義䇿全通為上第付吏部便與官義通七策通二為中第與出身下第者罷之習論語孝經孟子此三者為一經其試如上先取在家有孝義廉恥謙恭之行好學不倦通經義并堪對䇿者縣令徵于鄉里送名于州刺史與曹官對試以其通者送省隨朝集使以十月二十五日到省又冦難之故衣冠多去故鄉許所在州縣舉所諳知者秀才舉人準舊格試方略䇿五條望人之精通五經每經準孝廉例問義二十條對䇿五條每日試一道全通為上第送中書門下超與處分經通七䇿通四為中第送吏部與官下者罷之凡舉人自縣至州不得自陳牒比來到狀保辨識牒等請並停明法舉人付刑部考試疏入帝問翰林學士或以進士明經行來頗久不可頓令改業遂敕與舊制兼行德宗始任楊炎盧杞引植私黨排陷忠良後懲艾其失凡條用庶官必反覆參詰乃下及陸贄秉政請臺閣長官得自薦其屬帝初許之或言諸司所舉皆親䣊招賂遺無實才贄乃上狀略曰知人之難聖哲所病聽其言則未保其行求其行則或遺其才校勞考則巧僞繁興而貞方之人罕進徇聲華則趨競彌長而沈退之士莫升孔子云視其所以觀其所由察其所安人焉廋哉夫欲觀視而察之固非一朝一夕之所能也是以前代有鄉里選舉之法長吏辟舉之制所以明厯試廣旁求敦行能息馳騖也昔周以伯冏為太僕命之曰慎簡乃寮罔以巧言令色便辟側媚其惟吉士是古之王朝但命其大官而大官得自揀寮屬之明驗也漢朝務求多士其選不惟公府辟召而已又有父任兄任皆得為郎選任之初雜居三署臺省有闕即補用之是古之郎官皆以任舉充選此其明驗也魏晉以後暨于國初採擇庶官多由部選惟髙位重職乃由宰相考庶官之有成效者請而命焉故晉代山濤為吏部尚書中外品員多所啓授宋朝以蔡廓為吏部尚書先使人謂宰相徐羡之曰若得行吏部之職則拜不然則否羡之答曰黃散已下悉委廓猶憤恚以為失職遂不之官是黃門散騎侍郎皆由吏部選授不必朝廷列位盡合揀在台司此其明驗也國朝之制庶官五品以上制敕命之六品以下則並旨授制敕所命者蓋宰相商議奏可而除拜之也㫖授者蓋吏部銓材授職然後上言詔旨但畫聞以從之而不可否者也開元中吏部注擬選人奏置循資格限自起居遺補及御史等官猶並列于選曹銓綜之例著在格令至今不刋未聞常參之官悉委宰臣選擇此又近事之明驗也其後舊典失序幸臣專朝捨僉議而重已權廢公舉而行私惠是使周行庶品茍不出時宰之意者則莫致焉任衆之道益微進善之途漸隘近者每須任使常苦乏人臨事選求動淹旬朔姑務應用難盡當才豈不以薦舉凌遲人物衰少居常則求精太過有急則備位不充欲令庶績咸熙固亦難矣臣待罪宰相懷竊位之懼乏知人之明自揣庸愚終難上報惟廣求才之路使賢者各以彚征啓至公之門令職司皆得自達爰初受命即以上陳求賢審官粗立綱制凡百司之長兼副二等官及兩省供奉之職并因察舉勞效須加奬任者並宰臣叙擬以聞其餘臺省屬僚請委長官選擇指陳才實以狀上聞一經薦揚終身保任各于除書之內具標舉授之由示衆以公明彰得失得賢則進考增秩失實則奪俸贖金亟得則褒升亟失則黜免非止搜揚下位亦可閲試大官前志所謂達觀其所舉即此義也自䝉允許即以宣行南宫舉人才至十數或非臺府舊吏則是使府佐僚纍經薦延多歷仕任議其資望既不愧于班行考其行能又未聞于闕敗而議者遽以騰口上煩聖聰陛下勤求理道務徇物情因謂薦舉非冝復委宰臣揀擇其為崇任輔弼博採輿詞可謂聖德之盛者也然于委任責成之道聽言考實之方間邪存誠猶恐有闕所謂委任責成者將立其事先擇其人既得其人慎謀其始既謀其始詳慮其終終始之間事必前定有疑則勿果于用既用則勿復有疑待終其謀乃考其事事愆于素者革其弊而黜其人事協于初者賞其人而成其美使受賞者無所與讓見黜者莫得為辭夫如是則茍無其才孰敢當任茍當其任必得竭才此古之聖王委任責成無為而理之道也所謂聽言考實者虗受廣納宏接下之規明目達聰廣濟人之道欲知事之得失不可不聽之于言欲辨言之真虛不可不考之于實言事之得者勿即謂是必原其所得之由言事之失者勿即謂非必窮其所失之理稱人之善者必詳徴行善之跡論人之惡者必明辨為惡之端凡聽其言皆考其實既得其實又察以情既盡其情復稽于衆衆議情實必參相得然後信其說奬其誠如或矯誣亦置明罰夫如是則言者不壅聽者不勞無浮妄亂教之談無陰邪傷善之說無輕信見欺之失無潛陷不辨之寃此古之聖王聽言考實不出户而知天下之方也陛下既納臣言而用之旋聞橫議而止之于臣謀不責成于橫議不考實此乃謀失者得以辭其罪議曲者得以肆其誣率是以行觸類而長固無必定之計亦無必實之言計不定則理道難成言不實則小人得志國家所病恆必由之昔齊桓將啓霸圖問管仲以害霸之事管仲對曰得賢不能任害霸也任賢不能固害霸也固始而不能終害霸也與賢人謀事而與小人議之害霸也所謂小人者不必悉懷險詖故覆邦家蓋以其意性憸邪趣向狹促以沮議為出衆以自異為不羣趨近利而昧逺圖效小信而傷大道故論語曰言必信行必果硜硜然小人哉夫以能信于言能果于行惟以硜硜淺近不克宏通宣尼猶謂其小人管仲尚憂其害霸况又有言行難保而恣其非心者乎此皆任不責成言不考實之弊也聖㫖以為外議云諸司所舉皆有情故兼受賄賂不得實才者臣請陛下當使所言之人詳陳所犯之狀某人受賄某舉有情陛下然後以事質于臣臣復以事質于舉主若便首伏則據罪抵刑如或有詞則付法閲實謬舉者必行其罰誣善者亦反其辜自然憲典克明邪慝不作懲一沮百理之善經何必貸其姦贓不加辨詰私其公議不出主名使無辜見疑有罪獲縱枉直同貫人何賴焉聖主又以官長舉人法非穩便令人並自㨂擇不可信任諸司者伏以宰輔常職不過數人人之所知固有限極必不能遍諳多士備閲羣才若令悉命羣官理須展轉詢訪是則變公舉為私薦易明􅏡以暗投倘如議者之言所舉多有情故舉于君上且未絶私薦于宰臣安肯無詐失人之弊必又甚焉所以承前命官罕有不涉私謗雖則秉鈞不一或自行情亦由私訪所親轉為所賣其弊非逺聖鑒明知今又將徇浮言專任宰臣除吏宰臣不遍諳識踵前須訪于人若訪于親朋則是悔其覆車不易前轍之失也若訪于朝列則是求其私薦必不如公舉之愈也二者利害惟陛下更詳擇焉恐不如委任長官謹揀寮屬所揀既少所求亦精得賢有鑒識之名失實當暗謬之責人之常性莫不愛身况于臺省長官皆是當朝髙選孰肯徇私妄舉以傷名取責者乎所謂臺省長官即僕射尚書左右丞侍郎及侍御史大夫中丞是也陛下比擇輔相多亦不出其中今之宰相則往日臺省長官也令之臺省長官乃將來之宰相也但是職名暫異固非行業頓殊豈有為長官之時則不能舉一二屬吏居宰臣之位則可擇千百具寮物議悠悠其惑斯甚聖人制事必度物宜無求備于一人無責人于不逮尊者領其要卑者任其詳是以人主擇輔臣輔臣擇庶長庶長擇佐僚所任愈崇故所擇愈少所試漸下故所舉漸輕進不失倫選不失類以類則詳知實行有倫則杜絶僥求將務得人無易于此是故選自卑逺始升于朝者各委長吏任舉之則下無遺賢矣置于周行既任以事者于是宰臣序進之則朝無曠職矣才德兼茂歷試不渝者然後人主倚任之則海內無遺士矣夫求才貴廣考課貴精求廣在于各舉所知長吏之薦擇是也考精在于按名責實宰臣之進序是也求不廣則下位罕進下位罕進則用常乏人用常乏人則懼曠庶職懼曠庶職則茍取備員是以考課之法不暇精也考不精則能否無别能否無别則砥厲漸衰砥厲漸衰則職業不舉職業不舉則品格浸微是以賢能之功不克彰也皆失于不廣求人之道而務選士之精不思考課之行而望得人之美是以望得彌失務精益粗塞源浚流未見其可臣欲詳徵舊說伏恐聽覽為煩粗舉一端以明其理往者則天太后踐阼臨朝欲收人心尤務拔擢宏委任之意開汲引之門進用不疑求訪無倦非但人得薦士亦得自舉其才所薦必行所舉輒試其于選士之道豈不傷于容易哉然而課責既嚴進退皆速不肖者旋黜才能者驟升是以當代謂知人之明纍朝賴多士之用此乃近于求才貴廣考課貴精之效也陛下誕膺寶厯思致理平雖好賢之心有踰前哲而得人之盛未逮往時蓋由鑒賞獨任于聖聰搜擇頗難于公舉但速登延之路罕施揀核之方遂使先進者漸益凋訛後來者不相接續施一令則謗沮互起用一人則瘡痏立成此乃失于選才太精制法不一之患也則天舉用之法傷易而得人陛下慎揀之規太精而失士是知雖易于舉用而不易于茍容則所易者適足廣得人之資不為害也不精于法制而務精于選才則所精者適足梗進賢之途不為利也人之才行自昔罕全茍有所長必有所短若録長補短則天下無不用之人責短捨長則天下無不棄之士加以情有憎愛趣有異同假使聖如伊周賢如楊墨求諸物議孰免譏嫌昔子貢問于孔子曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之蓋以小人君子意必相反其在小人之惡君子亦如君子之惡小人將察其情在審其聽聽君子則小人道廢聽小人則君子道消今陛下慎選宰臣必以為重于庶品精擇長吏必以為愈于末流及至宰臣獻規長吏薦士陛下則但納橫議不稽始謀是乃任以重者輕其言待以輕者重其事且又不辨所毀之虛實不校所議之短長人之多言何所不至是將使人無所措其手足豈獨選任之道失其端而已乎按馬端臨曰唐選舉之法州府所升者試之禮部禮部所升者試之吏部其法截然且禮部所升之士其中吏部之選十不及一可謂難矣然觀御史韋正伯所劾奏貞元七年冬京兆府踰濫解送之人已授官總六十六人則似未經禮部者徑入吏部又㑹要稱太和元年中書門下奏凡未有出身未有官如有文學祇合于禮部應舉有出身有官方合于吏部赴科目選近年以來格文差互多有白身及散官并稱鄉貢者並赴科目選及注擬之時即妄論資次曽無格例有司不知所守則知唐中葉以後法度大段隳廢紊亂矣又曰唐取人之法禮部則試以文學故曰策曰大義曰詩賦吏部則試以政事故曰身曰言曰書曰判四者之中判為尤切蓋臨政治民必通曉事情諳練法律明辨是非發擲隱伏皆可以此覘之今主司之命題則取諸僻書曲學傲以所不知而出其所不備選人之試判則務為駢四儷六引援必故事而組織皆浮詞然則雖名曰判而與禮部所試詩賦雜文無以異殊不切于從政而吏部所試為贅疣矣至于五代所謂試判遂有一詞莫措傳寫定本或只書未詳亦可應舉蓋判詞雖工亦本無益及其末流上下皆以具文視之耳洪邁曰唐世科舉之柄顓付之主司仍不糊名又有交朋之厚者為之薦達謂之通榜故其取人也畏于譏議多公而審亦或脅于權勢或撓于親故或纍于子弟皆常情所不能免者若賢者臨之則不然未引試之前其去取髙下固已定于胸中矣韓愈與祠部陸員外書曰執事之與司貢士者相知誠深矣彼之所望于執事執事之所以待乎彼者可謂至而無間矣彼之職在乎得人執事之志在乎進賢如得其人而授之所謂兩得愈之知者有侯喜侯雲長劉述古韋羣玉托言作韋紓此四子皆可以當首薦而極論者期于有成而後止可也沈杞張苰登科記作𢎞尉遲汾李紳張後餘李翊皆出羣之才與之足以收人望而得才實主司廣求焉則以告之可也往者陸相公司貢士愈時幸在得中貞元八年陸贄知舉賈稜等二十二人登第愈與焉所與及第者皆赫然有聲原其所以亦繇梁補闕肅王郎中礎佐之梁舉八人無有失者其餘則王皆與謀焉陸相待王與梁如此不疑也至今以為美談此書在集中不注嵗月按托言貞元十八年權德輿主文陸傪員外通榜韓愈薦十人于傪德輿凡三榜共放六人餘不出五年內皆捷以登科記考之貞元十八年德輿以中書舍人知舉放進士二十三人尉遲汾侯雲長韋紓沈杞李翊登第十九年以禮部侍郎放二十人侯喜登第永貞元年放二十九人劉述古登第通三榜共七十二人而韓所薦者預其七元和元年崔邠放李紳三年放張後餘張𢎞皆與托言合又曰銓選以身言書判擇人既以書為藝故唐人無不工楷法以判為貴故無不習熟而判語必駢儷今所傳龍筋鳳髓判及白樂天集甲乙判是也自朝廷至縣邑莫不皆然非讀書善文不可也宰臣每啓擬一事亦必偶數十語今鄭畋敕語堂判猶存世俗喜道瑣細遺事參以滑稽目為花判其實乃如此非若今人握筆据案只署一字亦可國初尚有唐餘波久而革去之但體貌豐偉用以取人未為至論後唐明宗時禮部貢院新立條件一九經五經明經呈帖經之時試官書通不後有不及格者唱落後請置筆硯將所納貼由分明却令自看或是試官錯書通不當與改正如懷疑者許請本經面前撿對如實是錯誤即更于帖上書名而退一五科常年駮榜出多稱屈塞今並明書所對經書墨義云第幾道不第幾道粗第幾道通任將本經書疏照證如考官錯書不粗請别狀陳訴再加考較如實錯誤妄陳文狀當行嚴斷一舉人有抱屈落第者許將狀披訴貢院當與重試如貢院不理即詣御史臺論訴御史臺受狀并引本身勘問所論事件或知貢舉官及考試官已下取受貨賂升擢親情屈塞藝能應副囑託及不依格去留請行朝典一懷挾書策舊例禁止自後入省門搜得者不計多少扶出殿將來一舉上鋪後搜得者扶出殿兩舉一遙口授人回授試處及抄義題帖書時諸般相救準例扶出殿三舉一藝業未精準格落下及見駮榜妄扇屈聲擬為將來基址及誣陷别人帖對數多者並當收禁牒送御史臺請勘如知貢舉官及考試官徇私屈塞請行朝典虛妄者痛行科斷牒行本道重處色役永不得舉同保人連坐各殿三舉晉髙祖天福五年禮部侍郎張允奏曰前代未設諸科始以明經俾升髙第自有九經五經之後及三禮三傳已來孝亷之科遂因循而不廢縉紳之士亦緘默而無言以至相承未能改作每嵗明經一科少至五百已上多及一千有餘舉人如是繁多試官豈能精當況此等多不究義惟攻帖書文理既不甚通名第豈可妄與且當年登科者不少相連起選者甚多州縣之間必無貢闕輦轂之下須有稽留怨嗟自此而興謗讟因兹而起但令廣場大啓諸科並有明經者悉包于九經五經之中無出于三禮三傳之內若無釐革恐未便冝其明經一科伏請停廢又奏國家懸科待士貴務搜揚責實求才須除訛濫童子每當就試止在念書背經則雖似精詳對卷則不能讀誦及名成貢院身返故鄉但刻日以取官更無心而習業濫蠲徭役虛占官名其童子一科亦請停廢敕明經童子宏詞拔萃明算道舉百篇等科並停漢秦薦條格一諸道奏薦州縣官使相每年許薦五人舊許三人不帶使相藩侯每年許薦三人舊許二人防禦團練使每年許二人舊許一人只奏巡屬員闕不得薦于他處州府不得薦新罷任過格人所薦人厯任文書隨表送中書門下未有官者當别比擬應諸道見任州縣官申奏考滿後未有替人本道或藉其幹能且令勾當准長興三年五月節文一諸道應奏薦州縣官員未有正官者只許奏授初官不得奏為令録准長興四年五月節文一應諸道藩鎮防禦團練使舊奏薦并前項州縣等官准敕許奏薦見在幕中攝職及見攝管內州縣官據合奏人數皆正所攝不許橫薦及不得薦外管前資州縣官准長興四年八月節文一諸州防禦團練刺史奏薦攝試官充判官及推官巡官者今後宜加選擇或未任官職及無出身者不在奏舉之限准天福四年七月節文一諸道藩鎮防禦團練刺史如本幕有闕合奏薦除授者不得橫薦前資州縣官及諸色職員欽定續通典卷二十
