body:
  text: 禮吉諸侯大夫士家廟庶人祭寢附明唐宋元臣等謹案宗廟猶云祖廟自天子以至大夫士皆得通稱故杜佑通典此條亦稱宗廟苐制隨時改唐宋以來羣下之廟見於史傳者或稱私廟或稱家廟無敢僭擬稱宗兹據宋史志羣臣家廟之文改宗為家庶以昭别嫌之義云唐徳宗貞元十三年敕贈太傅馬燧祔廟宜令所司供少牢仍給鹵簿憲宗元和七年太子少傅判太常卿事鄭餘慶建立私廟將祔四代神主廟有二夫人疑於祔配請禮院詳定太學博士韋公肅議曰古者一娶九女自秦漢以下不行此禮遂有再娶之説前娶後繼並是正嫡則偕祔之義於禮無嫌案晉温嶠相繼有三妻疑並為夫人以問太學博士陳舒議以妻雖前没榮辱隨夫既生娶以正禮没不可貶自後諸儒咸用舒議且嫡繼於古則有殊制於今則無異等今王公再娶無非禮聘所以祔祀之議不得不同至於卿士之家寢祭亦二妻位同几席豈廟享之禮而有異乎厯數禮文參諸故事二夫人並祔於禮為宜武宗㑹昌五年詔京城不許羣臣作私廟但准古禮即所居立廟宣宗大中五年太常禮院議奏崔龜從請立私廟伏以事亡如存典禮攸重今百官悉在京師若不許於京内置廟則烝嘗之禮難復躬親若悉令於居處置廟又縁近北諸坊便於朝謁百官第宅布列坊中其間雜以居人棟宇悉皆連接今廣開則鄰無隙地廢廟則禮闕敬親若依㑹昌五年敕文盡勒於所居置廟恐十數年間私廟漸逼於官墻齊民必苦於吞併臣具詳本末請夾天門街左右諸坊不得立私廟其餘外圍逺坊任取舊廟及擇空間地建立廟宇並請准開元禮及曲臺禮為定制其享獻之禮除依古禮用少牢特牲饋食外有設時新及今時熟饌者並聼仍請永為定式敕㫖依奏宋仁宗慶歴元年南郊赦書中外文武官並許依舊式立家廟功臣不限品數賜㦸至和二年宰臣宋庠請詳定家廟制度下兩制禮官議定正一品平章事以上立四廟樞密使知樞密院事參知政事樞密副使同知樞密院事簽書院事見任前任同宣徽使尚書節度使東宫少保以上皆立三廟餘官祭於寢凡得立廟者使嫡子襲爵主祭其爵世降一等死即不得作主祔廟别祭於寢自當立廟者即祔其主其子孫承代不計廟祭寢祭並以世數疏數遷祧始得立廟者不祧以比始封有不祧者通祭四廟五廟廟因衆子立而嫡長子在則祭以嫡長子主之嫡長子死即不傳其子而傳立廟者之子凡立廟聼於京師或所居州縣其在京師者不得於裏城及南郊御路之側仍别議襲爵之制既以有廟者之子孫或官㣲不可以承祭而朝廷又難盡推襲爵之恩事竟不行嘉祐三年禮部尚書同中書門下平章事文彦博言伏覩禮官詳定私廟制度平章事以上許立四廟臣欲於河南府營創私廟乞降敕指揮從之徽宗大觀二年議禮局議執政以上祭四廟餘通祭三廟古無祭四世者又侍從官以至士庻通祭三世無等差多寡之别豈禮意乎請文臣執政官武臣節度使以上祭五世文武升朝官祭三世餘祭二世應有私第者立廟於門内之左如狹隘聼於私第之側力所不及仍許隨宜又言王制諸侯五廟二昭二穆與太祖之廟而五所謂太祖者盖始封之祖不必五世非臣下所可通稱今髙祖以上一祖未有名稱欲乞稱五世祖其家廟祭器正一品毎室籩豆各十有二簠簋各四壺尊罍鉶鼎爼篚各二尊罍加勺羃各一爵各一諸室共用胙爼罍洗一從一品籩豆簠簋降殺以兩正二品籩豆各八簠簋各二餘皆如正一品之數詔禮制局制造仍取㫖給賜孝宗淳熙五年權戸部尚書韓彦古請以臨安前洋街賜第建父世忠家廟就賜舍宇房緍以給嵗時祭祀之用輔臣論世忠廟器中書舍人陳騤以禮難行駁之上問本朝羣臣廟制如何賜器如何時趙雄等奏仁宗雖因赦論建廟未暇行也唯文彦博曾酌唐制為之未嘗賜器政和始命禮制局範銅以賜宰臣上曰漢唐而下既未有賜器祭者唯器與名不可以假人命禮官考厯代及本朝之制八年十月中書舍人崔敦詩謂中興廟器改用竹木省去雕文然一啟其端援者必衆謂宜詳講必傳古義乃恊今宜禮賜圭瓚然後為鬯盖諸侯嗣位不敢專祭待命於天子必賜以圭瓚者祭祀交神唯灌為重舉其重以賜之餘得自用臣謂銅為祭器可以𫝊逺今以竹木為之壞而不易則墜上之賜易而自制則棄君之命宜略倣古制命有司鑄爵勺各一賜之餘令祀官定當用之式繢圖以畀俾以竹木自制從之元英宗至治初右丞相拜珠得立五廟同堂異室明太祖洪武六年春詔定公侯以下家廟禮儀時禮部官議奏凡公侯品官别立祠堂三間於所居之東以祀髙曽祖考併祔位如祠堂未備奉主於中堂享祭二品以上羊一豕一五品以上羊一五品以下豕一皆分四體熟而薦之不能具牲者設饌享之所用器皿隨官品第稱家有無祭之前二日主祭者聞於上免朝參凡祭四仲之月擇吉日或春秋分冬夏至亦可世宗嘉靖十五年夏言疏請依宋儒程頤之議詔令天下臣民冬至祭始祖立春祭先祖但不許立廟以踰分庶上廣錫類之孝下無禘祫之嫌又禮官疏請官自三品以上為五廟以下皆四廟為五廟者倣唐制五間九架兩旁隔板為五室中祔五世祖旁四室祔髙曾祖禰為四廟者三間五架中為一室祔髙曾左右二室祔祖禰若當祀始祖先祖則如宋朱子所云臨祭時作紙牌祭訖焚之然三品以上雖得為五廟若上無應立廟之祖不得為世祀不遷之祖惟以第五世之祖奉為五世只名曰五世祖必待世窮數盡則以今之得立廟者為世祀之祖世祀而不遷焉其牲牢爼豆等物一依官品制可天子皇后及諸侯大夫士神主藏主室及題版制附唐宋金元明臣等謹案杜佑通典神主題版析為數條大約引據漢魏諸儒雜議分配各條以便省覽其實等差隆殺之間比類參稽彌資訂證今詳考唐宋以來正史所載兼及先儒所定成式合為一條其移主立尸等議皆後代所無謹從闕焉唐宣宗大中三年十二月追尊順宗憲宗諡號禮院奏廟中神主已題舊號請改造及重題左司郎中楊發等議以謂古者已祔之主無改造之文加諡追尊始於則天太后攝政之後然猶不改主易書今宜以新諡寳册告於陵廟時宰臣覆議以為士族之廟皆就易書乃就舊主易書新諡焉宋神宗元豐三年禮文所言古者宗廟為石室以藏主謂之宗祏夫婦一體同几共牢一室之中有左主右主之别正廟之主各藏廟室西壁之中遷廟之主藏於太祖太室北壁之中其埳去地六尺一寸今太廟藏主之室帝后異處遷主仍藏西夾室於禮未合請新廟成並遵古制從之髙宗紹興十六年太常寺言在京廟制毎室東設戸西設牖西墻祏室藏祖宗帝后神主今行在太廟未曾安設祏室宜體倣舊制殿東西作兩夾室其兩夾室止設戸十一室即依廟制設戸牖其殿南北深七丈每室於西壁從北以南一丈二尺作厚墻隨宜安設祏室其西夾室亦合設祏室藏順祖室神主詔從之金宣宗貞祐四年禮官言遷廟事主用栗依唐制皇統九年所定也祏室旁及上下皆石門東向以木為闔室中帝主居左前設曲几后主居右設直几元世祖至元三年命太保劉秉中考古制定神主髙一尺二寸頂圓徑二寸八分四廂合剡一寸一分上下四方穿中央通孔徑九分以光漆題尊諡於背上匱跌底盖但方底自下而上盖從上而下底齊趺方一尺厚三寸皆凖元祐古尺圖主及匱趺皆栗木匱趺並用𤣥漆設祏室以安奉帝主用曲几后主用直几十二年五月檢討張謙呈昔者因修太廟奉遷金牌位於饌募殿設以金椅其栗主却與舊主牌位各貯箱内安置金椅下禮有非宜今擬合以金牌位遷於八室内其祏室栗主宜用綵輿遷納舊主并牌位安置於箱為宜武宗至大二年將加諡太祖睿宗擇日請諡於天改製金表神主題冩尊諡廟號自是主皆範金作之如金表之製案虞主用桑吉主用栗禮有明文元初考定神主用栗最為得禮武宗改為範金戾古已甚泰定帝初盗入太廟竊仁宗及荘懿慈聖皇后金主其亦有以招之也夫明制作主用栗取法於時日月辰趺方四寸象嵗之四時髙尺有二寸象十二月身博三十分象月之日厚十二分象日之辰剡上五分為圓首首之下勒前為額而判之一居前二居後前四分後八分陷中以書爵姓名行合之植於趺竅其旁以通中如身厚三之一圓徑四分居二分之上粉塗其前以書屬稱旁題主祀之名加賜易世則筆滌而更之外改中不改案主之制不見於經何休謂主狀正方穿中央逹四方天子長尺二寸諸侯長一尺衛仲次又謂右主八寸左主七寸廣厚三寸右主父也左主母也漢舊儀后主長七寸圍九寸帝主長九寸其制不可考宋程顥考定其制朱子家禮遵用之明時品官家廟儀式一本家禮此條載㑹典中今據輯入時享薦新附金唐元五代遼明宋唐𤣥宗開元六年有司撰享太廟儀注祭之日車駕發宫中帝謂宋璟蘇頲曰祭必先齋所以齊心也宜於廟所設齋宫先期赴行宫齋宿質明行事庻合於禮又儀注自大次至殿前施行褥帝不許但履地而行十五年敕享宗廟差丞相尚書嗣王郡王攝三公行事若人數不足通取諸司三品以上長官二十五年敕太廟五享之日應攝三公令中書門下及丞相師傅尚書御史大夫嗣王郡王擇徳望髙者通攝諸司不在差限二十七年敕太廟五享宜於宗子及嗣郡王中擇有徳望者令攝三公行事其異姓官更不湏差攝天寳三載詔頃四時廟享兩京同日自今以後宜各别擇日告享五載詔享太廟毎室加常食一牙盤九載制承前宗廟皆稱告享自今毎親告享宗廟為廟享有司行事為薦享諸事告宗廟並改為奏徳宗貞元九年太常博士韋彤裴堪議謹案禮經前代故事宗廟無朔望祭食之儀惟寢園有之國家貞觀開元修定禮文皆遵舊典至天寳時始别令尚食朔望進食於太廟自太廟以下毎室奠饗當時祀官王璵不本禮意妄推縁生之義毎用宴私之饌此則可薦於寢宫而不可凟於太廟也又礿祠嘗烝聖人之中制今太廟毎嵗五享祭不為數若令牲牢爼豆之司更備膳羞盤盂之饌朔日月半將以為常為數既甚黷亦隨之宜遵開元之則省天寳權宜之制帝以此禮經先帝所定未遽改移憲宗元和十四年太常丞王涇疏請去太廟上食事亦不行梁太祖開平三年正月十月並享於太廟後唐莊宗同光元年四月立七廟於太原二年正月神主至自太原案唐建太㣲宫於洛京後唐莊宗本紀載同光元年十一月甲子如洛京二年正月神主至自太原當屬自太原至洛京朝獻太㣲宫也朝獻於太㣲宫享於太廟明宗長興元年二月享於太廟周太祖廣順三年十二月享於太廟宋太祖乾徳元年十一月帝以親郊齋於崇元殿翼日服通天冠絳紗袍執鎮圭乘玉輅鹵簿前導赴太廟宿齋翼日未明三刻服衮冕行享禮於四室自是毎郊祀前一日朝享太廟六年判太常卿和峴上言唐天寳中詔享太廟祭料外毎室加常食一牙盤將來享廟宜遵此制時帝親享太廟見所陳籩豆簠簋問此何物左右以禮器對帝曰吾祖宗寜識此亟命撤去進常膳如平生既而曰古禮不可廢也命復設之於是和峴請如唐故事别設牙盤食太宗太平興國六年十二月太常禮院言今月二十三日臘享太廟縁孟冬已行時享冬至又嘗親祀慮成煩數請罷臘日薦享之禮從之雍熙二年狩於近郊以所獲獻太廟著為令端拱二年詔以八月親享太廟有司詳定儀注旋以彗孛停止淳化三年正月詔仲春開氷獻羔祭韭十月太常禮院言今年冬至親祀南郊前期朝享太廟及奏告宣祖太祖室常例遇親祀設朔望兩祭又行奏告之禮煩則不恭又十一月二十日朝享去臘享日月相隔未為煩數欲望權停是月朔望之祭其臘享如常儀從之真宗景徳三年十一月狩近郊以親獲兎付有司薦新大中祥符元年十一月癸未帝齋於長春殿翼日甲申奉太祖太宗尊諡册寳授攝太尉王旦持節奉册升輅鸞駕親詣太廟酌奠六室嗣後上祖宗尊諡册寳皆親行朝享八年兼宗正卿趙安仁言太廟朔望上食品味望自今委御厨取親享廟日所上牙盤例參以四時珍膳選上局食手十人赴廟造饌詔所上食味委宫闈令監造訖安仁省視之天禧三年十一月己巳謁景靈宫庚午享太廟先是咸平二年奉安太宗聖容於啟聖院帝拜而慟四年謁啟聖院太宗神御殿普安院元徳皇后聖容至是始謁景靈宫嗣後景靈宫朝享嵗必親行而太廟皆令有司攝事云仁宗明道二年正月皇太后服衮衣儀天冠享太廟皇太妃亞獻皇后終獻命宰臣撰謝太廟記檢討宋祁言皇太后謁廟非後世法乃止景祐三年宗正丞趙良規言通禮著薦新凡五十餘物今太廟祭享之外唯薦氷其餘薦新之禮皆寢不行宜以品物時新所司送宗正令尚食簡擇滋味與新物相宜者配以薦之於是禮官宗正條定逐室時薦以京都新物略依時訓恊用典章凡二十八種卜日薦獻如開寳通禮皇祐二年九月以大饗明堂具大駕鹵簿赴景靈宫行薦享禮畢齋於太廟翼日詣七廟行朝享禮降神樂作帝密諭樂卿令備音節禮儀使請憩小次帝拱立益莊神宗熙寧五年詔太廟時享以宗室使相以上攝事元豐元年宗正寺奏據太常寺報選日薦新藷藇栗黄今三物久粥於市而廟猶未薦頗違禮意盖節序有蚤宴品物有後先自當變通安能齊一又唐開元禮薦新不出神主今兩朝薦新及朔望上食並出神主請下禮官參定所宜於是刋定凡新物及時出者即日登獻不卜日不出主八年太常寺請罷太廟朔望薦食從之哲宗元祐七年從禮官吕希純議復用牙盤食更其名曰薦羞希純又請帝后各奠一爵后爵謂之副爵亦如其議徽宗大觀四年定太廟簠簋籩豆之儀盡依周制髙宗建炎二年十一月帝幸揚州詣壽寧寺朝享時太廟神主奉於壽寜寺三年帝在杭州太廟祭享皆差官攝事以禮器未備權用酒脯行禮時奉安太廟神主於温州紹興五年始謁太廟時詔建太廟於臨安孝宗隆興二年朝享太廟禮部言牲牢禮料酒齊等物並如五享行之十六年光宗受禪親享太廟遼太宗天顯元年十一月壬戌即皇帝位癸亥謁太祖廟嗣後毎嵗有事於太廟或薦新或告謁必親享焉逮穆宗景宗聖宗皆遵行勿替道宗清寧元年十一月壬申有事於太宗穆宗廟戊寅冬至有事於太祖景宗興宗廟不受羣臣賀金熙宗天眷元年四月朝享於天元殿十一月以康宗以上畫像工畢奠獻於天元殿三年九月親享太祖廟海陵天徳二年命有司議薦新依典禮合用時物令太常寺卿行禮正隆二年初定太廟時享牲牢禮儀世宗大定三年十月大享於太廟有司言毎嵗太廟五享若復薦新似渉繁數擬遇時享之月以所薦物附於籩豆薦之制可九年十月詔宗廟之祭以鹿代牛著為令十年正月有司謂自周以來下逮唐宋祫享無不用牛者唐開元禮時享毎室一太牢天寳六年始減牛數太廟毎享用一犢宋政和五禮新儀時享太廟親祠用牛有司行事則不用又開寳二年詔昊天上帝皇地祇用犢餘皆以羊豕代之合二羊五豕足代一犢今三年一祫乃為親祀其禮至重毎室一犢恐難省減遂命時享與祭社稷如舊若親祀宗廟則共用一犢有司行事則不用十一年尚書省奏唐禮四時各以孟月享太廟嵗終又臘享凡五祀若依海陵時止二享非天子禮宜嵗五享從之享日並出神主前廊序列昭穆以太子為亞獻親王為終獻二十六年以内外祖廟不同定擬太廟毎嵗五享山陵朔望忌辰及節底祭奠並依前代典故章宗泰和二年五月初薦新於太廟宣宗興定二年七月以旱災享太廟元祖宗祭享之禮割牲奠馬湩以䝉古巫祝致辭盖國俗也國俗舊禮毎嵗太廟四祭用司禋監官一員名䝉古巫祝當省牲時法服同三獻官升殿詣室户告腯還至牲所以國語呼累朝帝后名諱而告之明旦三獻禮畢獻官御史太常卿博士復升殿分詣各室䝉古博囉齊跪割牲太僕卿以朱漆盂奉馬乳酌奠巫祝以國語告神訖太祝奉祝幣詣燎位獻官以下復版位再拜禮畢飲凡大祭祀尤貴馬湩将有事勅太僕司挏馬官奉尚者革囊盛送其馬牲既與三牲同登於爼而割奠之祭品與籩豆俱設将奠牲盤酹馬湩則䝉古太祝升詣第一座呼帝后神諱以致祭年月日數牲齊品物致其祝語以次詣列室皆如之禮畢則以割奠之餘撤於南櫺星門外名曰抛撒茶飯盖以國禮行事尤其所重也世祖中統元年七月設神位於中書省用登歌樂遣筆且齊致祭筆且齊譯典書記者十二月始制祭享太廟祭器法服三年十二月享太廟即中書省備三獻官大禮使司徒攝祀事禮畢神主復藏瑞像殿四年三月詔建太廟於燕京十一月仍寓祀事於中書省以親王等攝事至元二年九月以將有事於太廟取大樂工於東平預習禮儀命滌養犧牲冬十月享於太廟六年十二月始作佛事於太廟時命國師僧薦佛事始造木質金表牌位十有六設大榻金椅奉安祏室前帝位於右后位於左題號其靣籠以銷金絳紗其制如櫝此為太廟薦佛事之始後以為常七年十月敕來年太廟牲牢勿用豢豕以野豕代之時果勿市取之内園十年九月敕自今秋獵鹿豕先薦太廟十五年十月享於太廟常饌外益野豕鹿羊蒲萄酒十七年十二月大都重建太廟成自舊廟奉神主於祏室遂行大享之禮二十五年冬享制送白馬一二十九年始命毎月薦新及春秋圍獵始獲之物成宗大徳九年始定郊廟親享禮文武宗至大二年十二月始親享太廟仁宗延祐七年二月英宗即位四月有事於太廟告即位十月時享太廟詔太常院臣曰朕將以四時躬祀太室宜與羣臣集議其禮此追逺報本之道毋以朕勞於對越而有所損其悉遵典禮十一月以親祀太廟禮成御大明殿受朝賀英宗至治元年正月帝服衮冕享太廟以左丞相拜珠亞獻知樞密院事科綽巴終獻禮成坐大次謂羣臣曰朕纉承祖宗丕緒夙夜祗慄無以報稱嵗惟四祀使人代之不能致如在之誠實所未安自今以始嵗必親祀以終朕身二年正月始備法駕設黄麾大仗帝服通天冠絳紗袍親享太廟二月以新作廟正殿命權止夏秋二祭三年泰定帝即位太常院臣言世祖以來太廟嵗止一享先帝始復古制請裁擇之帝曰祭祀大事也朕何敢簡其禮仍命一嵗四祭泰定帝致和元年御史鄒惟亨言時享太廟三獻官舊皆勲戚大臣近以戸部尚書為亞獻人既疏逺禮難嚴肅請仍舊制以省臺樞密宿衛重臣為之文宗天歴元年禮官請時享之禮改用仲月順帝元統二年罷夏秋時享至元六年六月監察御史言嘗聞五行傳曰簡宗廟廢祭祀則水不潤下近年雨澤愆期四方多旱而嵗減祀事變更成憲原其所致恐有感召古者宗廟四時之祭皆天子親祀莫敢使有司攝也盖天子之職莫大於禮禮莫大於孝孝莫大於祭伏自陛下即位於今七年未嘗躬詣太廟似為闕典時帝在上都臺臣以聞有㫖俟到大都親祭九月中書省奏以十月初四日皇帝親祀太廟制可明太祖洪武元年二月定宗廟之祭毎嵗四孟月及嵗除凡五享皆親祀以為常又定月朔薦新儀物其禮皆天子躬行未幾以屬太常二年改定時享之制春以清明夏以端午秋以中元冬以冬至嵗除如舊太廟毎室初用幣一至是從禮臣議改用白繒二又詔凡時物先薦宗廟然後進御三年禮部尚書崔亮言孟月者四時之首因時變致孝思故備三牲黍稷品物以祭至仲季之月不過薦新而已既行郊祀則廟享難舉宜從舊制其清明等節各備時物以薦從之亮又言周禮大宗伯以肆獻祼享先王灌以鬱鬯今宗廟之祭宜作圭瓉舉灌禮是年冬享用家人禮次年始行灌禮時又定獻新之儀四方别進新物在月薦外者太常卿與内使監官常服獻於太廟不行禮九年新建太廟凡時享孟春擇上旬日三時用朔日嵗除如舊二十一年定時享儀更前制迎神飲福禮畢各四拜二十五年定時享若國有䘮事樂偹而不作二十六年詳定時享禮儀英宗正統三年正月享太廟禮部言故事先三日太常寺奏祭祀御正殿受奏是日宣宗皇帝忌辰例不鳴鐘鼓苐視事西角門帝以祭祀重事仍宜升殿天順六年以皇太后䘮閣臣請改孟冬時享於除服後從之憲宗成化四年以慈懿太后䘮禮部請改孟秋享廟於初七日不從世宗嘉靖三年定太廟和羔准依福胙脯豚胉例另用一牛不許牲上取辦其牲體分為六塊一首一背四肢不許零碎九年正月行特享禮初太祖立四親廟徳懿熙仁同宫異廟各南向孟春特享於羣廟三時及嵗除合祭於徳祖廟序用昭穆後改建太廟同堂異室亦各南向四孟及嵗除俱祭於中室中設徳祖帝后神座南向左懿祖右熙祖東西向仁祖次懿祖凡神座俱不奉神主止設衣冠禮畢藏之遂罷特享禮至英宗升祔九室悉備憲宗將祔用禮官議祧懿祖孝宗祔祧熙祖武宗祔祧仁祖惟徳祖不祧時享則太祖太宗以下俱東西向至是帝諭張孚敬曰朕欲自今春享奉太祖居中太宗以下各俱一室行特享禮三時仍聚羣廟於太祖之室昭穆相向行時祫禮季冬中旬並享太廟親王功臣配食兩廡以存太祖當代之制嵗暮節祭行於奉先殿世廟止行四時之祭嵗暮祭於崇先殿庻祭義明而萬世可行也乃命祠官於殿内設幃幄如九廟奉太祖居中南向羣宗遞遷就室皆南向各奠獻讀祝三餘如舊於是退徳祖於祧廟不復預時享矣十一年大學士張孚敬言太廟祭祀但設衣冠今改行出主誠合古禮但徧詣羣廟躬自啟納不免過勞請太祖神主躬自安設羣廟帝后神主則以命内外捧主諸臣從之十五年秋罷中元節内殿之祭著為令十七年九月尊皇考廟睿宗祔享太廟躋武宗上改太宗廟號為成祖定享祫禮凡立春特享親祭太祖遣大臣八人分獻諸帝内臣八人分獻諸后立夏時祫各出主於太廟太祖南向成祖西向序七宗之上餘東西相向秋冬時祫如夏禮季冬中旬大祫出四祖太祖成祖七宗主於太廟祭畢各歸主於其寢二十四年重建太廟成復定享祫止設衣冠不出神主孟春仍於上旬擇日三時仍用孟月朔日俱合享神宗萬厯十九年夏四月享太廟是後廟祀皆遣代臣等謹案國之大事莫先於祀宗廟時享尤祀事之大者非躬親行之無以致其孝敬之誠焉由唐以來毎嵗四孟月及季冬太廟五享制為定典而自開元時遣官攝祭後乃相沿成習至宋之世終三百年未一親行甚至禘祫大禮亦命有司攝事惟郊祀時先期朝享乃親行之外此景靈神御時復駕臨仍後代之失乖先王之典雖復考正禮文詳定儀注抑亦末矣慶厯中御史蔡禀言今寺觀車駕一嵗再臨未嘗薦獻宗廟非奉先教民意元豐中太常丞吕升卿言禮重享帝不聞於致齋先享宗廟今郊時宜罷享廟别修太廟躬祀之制嵗五大享親臨其一則祀天享親兩得其當其言可謂深切惜當時皆不能行也禘祫唐五代宋金明唐初以景皇帝為太祖而世近在三昭三穆之内禘祫乃虛東向之位太祖與羣廟並列昭穆代宗即位祔𤣥宗肅宗而遷獻祖懿祖於夾室於是太祖居第一室禘祫得正東向之位而獻懿不合食徳宗建中二年太常愽士陳京請立獻祖懿祖别廟敕下尚書省集議於是禮儀使顔真卿引普蔡謨議請以獻祖居東向自懿祖太祖以下左右為昭穆自是議者紛然至貞元十九年將行禘祭陳京復奏禘祭大合祖宗必尊太祖位正昭穆請詔百官議左僕射姚南仲等請奉獻懿主祔徳明興聖廟鴻臚卿王權因獻議曰周人祖文王宗武王故詩清廟章曰祀文王也不言太王王季則太王王季而上皆祔后稷故清廟得祀文王也太王王季之尊私禮也祔后稷廟不以私奪公也古者先王遷廟主以昭穆合藏於祖廟獻懿主宜祔興聖廟則太祖東向得其尊獻懿主歸得其所時言祔興聖廟者什七八帝尚猶豫至是羣臣稍顯言二祖本追崇非開國受命之主又權援据詩禮明白遂定遷二祖於興聖廟詔増廣興聖二室凡禘祫一享自建中初陳京獻議逾二十年景皇帝始正位東向諸儒乃無後言文宗開成四年宰臣楊嗣復奏今年當禘祭臣案讓皇帝本封寧王𤣥宗親兄𤣥宗感其能讓帝位贈以鴻名復為置廟享獻禘祫與九廟同至肅宗時杜鴻漸奏停時享而禘祫尚存今𤣥宗肅宗已歸夾室而讓皇帝猶禘祫不闕於禮未安詔下有司詳議議者以讓皇帝追尊位號恩出一時别立廟祠不渉正統當時杜鴻漸議禘祫之月時一祭者以時近恩深未可頓忘今睿宗𤣥宗既已祧去則讓皇帝之廟不宜獨存請從廢罷後唐明宗長興二年四月禘享太廟後周太祖顯徳五年六月禘於太廟先是言事者以宗廟無祧室不當行禘祫國子司業聶崇義上言前代宗廟追尊未毁皆有禘祫援故事九條以證從之宋宗廟之制三年一祫以孟冬五年一禘以孟夏真宗咸平二年大常禮院言今年冬祭畫日以十月六日薦享太廟案禮三年一祫以孟冬又疑義云三年䘮畢遭禘則禘遭祫則祫請改孟冬薦享為祫享仁宗天聖元年四月遣官禘享太廟遂以薦享為禘享八年太常禮院言自天聖六年夏行禘享之禮至此年十月請以孟冬薦享為祫享嘉祐四年三月御札曰惟祫享之義著禮經之文大祭先王合食祖廟追孝奉先莫斯為重兹享之廢歴年居多有司所行出於假攝禮之將墜朕深惜之卜以孟冬備兹法駕欵於太室親薦嘉籩所有合行諸般恩賞依南郊例施行楊復曰當時建明此議實必出於富弼弼言國朝三嵗親郊祀獨於宗廟秖遣大臣攝行望詔有司講求祫祭大禮所有降赦推恩並用南郊故事夫聖王事親如事天其以祫祭之禮比於南郊誠哉是言也然南郊推恩肆赦本非古典乃人主一時之優恩其後遂以為故事今孟冬祫享冬至南郊二禮並行恩難再降於是祫享行而南郊權罷是雖有以盡宗廟事親之文而又失南郊祀天之禮此豈聖主之本心然哉夫三年一祫固宗廟祀典之大者其實亦常禮也常禮則非異事也何欲矯其輕而遂至於過重不可繼哉十月帝親詣太廟行祫享禮以宰臣富弼為大禮使韓琦為禮儀使樞密使宋庠為儀仗使參知政事曾公亮為橋道頓遞使樞密副使程戡為鹵簿使同判宗正寺趙良規請正太祖東向位禮官不敢决觀文殿學士王舉正等議曰太祫之禮所以合昭穆辨尊卑必以受命之祖居東向之位本朝以太祖為受命之君然僖祖以降四廟在上故毎遇大祫止列昭穆而虛東向宜如舊便禮官張洞韓維言國朝毎遇禘祫奉别廟四后之主合食太廟臣謂毎室既有定配則餘后不當參列義當革正學士孫抃等議春秋傳曰大祫者何合祭也未毁廟之主皆升合食於太祖國朝事宗廟百有餘年大中祥符中已曾定議他時有司攝事四后皆預今甫欲親祫而四后見黜不亦疑於以禮之煩故耶宗廟之禮至尊至重茍未能盡祖宗之意則莫若守舊禮學士歐陽修等曰古宗廟之制皆一帝一后後世有以子貴者始著並祔之文其不當祔者則有别廟之祭本朝禘祫乃以别廟之后列於配后之下非惟於古無文於今有四不可淑徳太宗元配列元徳之下章懷真宗元配列章懿之下一也升祔之后統以帝樂别廟之后以本室樂章自隨二也升祔之后同牢而祭牲器祝册亦統於帝别廟諸后乃從専享三也升祔之后聯席而坐别廟之后位乃相絶四也章獻章懿在奉慈廟毎遇禘祫本廟致享最為得禮若四后各祭於廟則其尊自申而於禮無失以為行之已乆重於改作則是失禮之舉無復是正也請從禮官詔四后祫享依舊湏大禮畢别加討論英宗治平元年有司凖畫日孟冬薦享改為祫祭案春秋閔公䘮未除而行吉禘三𫝊譏之真宗以咸平二年六月䘮除至十月乃祫祭仁宗天聖元年在諒隂有司誤通天禧舊禘之數在再期内案行禘祭以理推之是二年冬應祫而誤禘於元年夏故四十九年間九禘八祫例皆太速事失於始則嵗月相乘不得而正今在大祥内禮未應祫明年未禫亦未應禘至六月即吉十月合行祫祭乞依舊時享庻合典禮二年翰林學士王珪等議云同知太常禮院吕夏卿狀古者新君踐阼之三年先君之䘮二十七月為禫祭然後新主祔廟特行禘祭自此五年再行禘祫䘮除必有禘祫者為再大祭之本也今當祫祭縁陛下未終三年之制納有司之説十月依舊時享然享廟祫祭其禮不同故事郊享之年遇祫未嘗權罷唯罷臘祭是則孟享與祫享嘗併行之矣其禘祫年數乞一依太常禮院請今年十月行祫祭明年四月行禘祭仍如夏卿議權罷今年臘享神宗熙寧八年有司言僖祖已尊為太廟始祖孟夏禘祭當正東向之位自順祖而下昭穆各以南北為序自今禘祫著為定禮元豐四年按四年史志作元年今據馬氏通考輯詳定郊廟禮文所言禘祫之義存於周禮春秋而不著其名行禮之年經皆無文惟公羊傳曰五年而再盛祭禮緯曰三年一祫五年一禘而又分為二説鄭氏謂前三後二則禘後四十二月而祫祫後十八月而禘徐邈謂前二後三則二祭相去各三十月以二説考之惟鄭氏曰魯禮三年䘮畢祫於太廟明年禘於羣廟自後五年而再盛祭一祫一禘實為有據本朝慶厯初用徐邈説毎三十月一祭熙寧八年既禘而祫此有司之失也請今十八月而禘禘四十二月而祫庶舉事不煩事神不凟太常禮院言本朝自慶厯以來皆三十月而一祭至熙寧五年後始不通計遂至八年禘祫併在一嵗昨元豐三年四月已行禘禮今年若依舊例十月祫享即復踵前失請依慶厯以來之制通計年數皆三十月而祭詔如見行典禮詳定所又言古者祼獻饋食禴祠烝嘗並為先王之享未嘗廢一時之祭故孔頴逹正義以為天子夏為大祭之禘不廢時祭之礿秋為大祭之祫不廢時祭之嘗本朝沿襲故常乆未釐正請毎禘祫之月仍行時享以嚴天子備禮丕崇祖宗之義其郊禮親祠凖此從之五年帝謂宰臣曰禘者所以審諦祖之所自出故禮不王不禘秦漢以來譜牒不明莫知祖之所自出則禘禮可廢也宰臣蔡確等以為聖訓得禘之本意非諸儒所及乃詔罷禘祭至南渡後亦有祫而無禘徽宗大觀四年議禮局言古者祫祭朝踐之時設始祖之位於戸西南靣昭在東穆在西相向而坐薦籩豆脯醢王北靣而事之此堂上之位也徙饌之後設席於室在戸内西方東靣為始祖位次北方南靣布昭席次南方北靣布穆席餘各以次序此室中之位也考漢舊儀宗廟三年大祫諸帝以昭穆坐於髙廟髙祖南靣則自漢以前堂上之位未嘗廢也元始以後初去此禮專設室中東向之位普宋隋唐所謂始祖位者皆不過室中耳以儀禮考之大夫士無薦腥朝踐之事故惟饋食於室至天子之祭則堂事室事皆舉堂上位廢而天子北靣事神之禮缺矣伏請毎行大祫堂上設南面之位室中設東面之位始祖南靣則昭穆東西相向始祖東面則昭穆南北相向以應古義詔依所議髙宗建炎二年祫享於洪州紹興二年祫享於温州時儀文草創奉遷祖宗及祧廟神主别廟神主各設幄合食於太廟始祖東面昭穆以次南北相向五年吏部員外郎董棻言宗廟之祭禘祫為重仰惟太祖皇帝受天明命混一區宇是宜郊祀以配天宗祀以配上帝祫享以居東向之尊𫝊千萬世而不易者也國初稽前代追崇之典止及四世故於祫享用魏晉故事虛東向之位至仁宗嘉祐時嘗詔有司詳議太祖東向用昭正統暨熙寧初僖祖以世當祧禮官韓維等據經有請援證明白適王安石用事奮其臆説乃尊僖祖為始祖肇居東向神宗皇帝初未為然再三訪問故馮京奏謂士大夫皆以太祖不得東向為恨安石復肆言以折之迨元祐初翼祖既祧至於崇寧當祧宣祖適蔡京用事一遵安石之術乃請建九廟至今太祖尚居第四室毎遇祫祭處昭穆之列識者恨焉又言漢魏之制太祖而上毁廟之主皆不合食唐以景帝始制故規規然援后稷為比而獻懿乃在其先是以前後議論紛然迨後廟制既定始尊神堯為太祖以獻懿而上毀廟之主藏於徳明興聖之廟遇祫即廟而享焉以全太祖之尊盖合於漢不以太公居合食之列魏晉武宣而上皆不合食之義當時剛勁如顔真卿儒宗如韓愈雖各有依據皆不能易陳京之説以其當理故也太常寺丞王普奏曰僖祖非始封之君而尊為始祖太祖實創業之主而列於昭穆其失自熙寧始宣祖當遷而不遷翼祖既遷而復祔其失自崇寧始此皆出於一時用事之臣私意臆説非天下之公論臣竊惟太祖始受天命追崇四廟以致孝享行之當時可也至於今日世逺親盡迭毀之禮古今所同所當推尊者太祖而已董棻所奏深得禮意而其言尚有未盡盖前日之失其甚大者有二曰太祖之名不正大禘之禮不行是也今日之議其可疑者有四曰奉安之所祭享之期七世之數感生之配是也臣愚欲乞考騐古今定七廟之禮成一王之制自僖祖至宣祖親盡之廟當遷自太宗至哲宗昭穆之數已備宜奉太祖神主第一室永為廟之始祖每嵗告朔薦新止於七廟至三年大祫則太祖正東向之位太宗仁宗神宗南向為昭真宗英宗哲宗北向為穆五年一禘則迎宣祖神主享於太廟而以太祖配焉庻合於禮經而無復前日之失矣乃若可疑者臣竊謂四祖神主其奉安之所宜倣唐禮祔於景靈宫天興殿方今廵幸或寓於天慶觀聖祖殿其祭享之期四祖神主祔於天興大祫之嵗亦當就行享禮既以全太祖之尊又以極追逺之孝至禮云天子七廟三昭三穆與太祖之廟而七則太祖之廟固不以世數為限惟我宣祖雖為陛下七世祖已在三昭三穆之外則其禮當毀考之前代無可疑者願詔有司定七廟之禮正太祖之位庶幾先王舊典不廢墜於我朝使天下後世無得而議詔侍從臺諫禮官赴尚書省集議時諸臣議者皆謂太祖開基創業為本朝太祖正東向之位萬世不祧理無可疑廖剛謂四祖神主當遷之别宫祫祭則即而享之五年一禘則當禘僖祖任中先謂祫祭既正太祖東向之位則大禘之禮僖祖實統系之所自出太祖暫詘而以世次叙位在理為當晏原復謂正太祖東向之位以遵祫享之正禮四祖則参酌漢制别為祠所而異其祭享議上不果行自是遇祫享設幄僖祖仍舊東向順祖而下以昭穆為序孝宗乾道三年禮部太常寺言孟冬祫享其别廟懿節皇后神主依禮例祔於神宗室祖姑之下安穆皇后安恭皇后神主例祔於徽宗室祖姑之下詔禮官等参擬定申尚書省李燾等擬以懿節皇后神座設於神宗幄内欽慈皇后之右少却安穆安恭二后神座設於徽宗幄内顯仁皇后之左皆少却其籩豆鼎爼并祝詞等别設並如舊制仍候酌獻祖宗位畢方詣三后位詔從之時太常少卿林栗言祫享之禮古人不以别廟祔姑而祔於祖姑以别嫌也案曲臺禮别廟神主祔於祖姑之下有三人則祔於親者既祔於祖姑又各祔於親者之下明共一幄同享一位之薦若别設幄次當在舅姑之下豈得上祔於祖姑乎今懿節皇后祔於神宗幄祖姑之下别設幄次在哲宗徽宗之上此其不可一也神宗與三后共享一位犧牲粢盛之薦徽宗與三后亦然而懿節祔神宗幄獨享其一安穆安恭祔徽宗幄共享其二此其不可二也且祔之為言附也禮無不順祔豐而尊殺祔伸而尊屈將得為順乎竊謂别廟神主祔於祖姑之下宜執婦禮不當别設幄次及籩豆鼎爼并别致祝詞但於本幄祖姑之下添入别廟祔享某皇后某氏於禮為稱淳熈元年詔議祫享東向之位吏部侍郎趙粹中言乃者紹興五年董棻建議乞正藝祖東向之尊時臣叔父渙任將作監丞因陛對奏陳甚力光堯皇帝深以為然即擢董棻為侍從叔父渙為御史時趙霈為諫議大夫以議不已出倡邪説以害正然亦不敢以太祖東向為非今若稽以六經典禮三代之制度則三年一祫當奉藝祖東向為受命之祖太祖常享則奉藝祖居第一室永為不祧之祖其次奉太宗居第二室永為不祧之宗若僖順翼宣四祖或别建一廟為四祖之廟若欲事省而禮簡或祔景靈宫天興殿或藏太廟西夾室每遇祫享則四祖就夾室之前别設一幄庶合典禮既而衆議不同乃詔有司止遵見行祫享舊制光宗紹熈五年詔别建廟遷僖順翼宣四帝神主始以太祖正太廟東向之位孟冬祫享先詣四祖廟室行禮次詣太廟逐幄行禮金宗廟之制每禘祫出始祖主東向羣主依昭穆南北相向東西序列室戸外之通廊世宗大定三年有司議祫享犧牲品物貞元正隆時方禁獵所用獐鹿兔肉皆以羊代禮殊未備詔從古制十一年尚書省奏禘祫之儀曰禮緯三年一祫五年一禘自大定九年已行祫禮當於祫後十八月孟夏行禘禮詔以三年冬祫五年夏禘為常禮享日並出神主前廊序列昭穆應圖功臣配享廟廷各配所事之廟以位次為序以太子為亞獻親王為終獻或並用親王或以大尉為亞獻光祿卿為終獻其月則停時享二十九年章宗即位禮官言自大定二十七年十月祫享至今年正月世宗升遐故四月不行禘禮故事三年䘮畢遇祫則祫遇禘則禘宜於辛亥嵗為大祥三月禫祭踰月即吉則四月一日為初吉適當孟夏禘祭之時可為親祠詔從之及期以孝懿皇后崩而止五月禮官言世宗升祔已三年尚未合食於祖宗乞依故事於明昌四年四月一日釋心䘮親禘於太廟從之宣宗貞祐二年有司奏請權止今年禘祭按元史祭祀志不詳禘祫之禮而親祀禘祫樂章自入門升殿以迄迎神送神諸典則見於禮樂志者甚詳疑當時禮文散佚是以史志未備或擬定樂章而祀典未舉今姑從其闕而附識於此明太祖洪武元年以嵗除日祫享太廟德祖皇考妣居中南向懿祖熈祖仁祖皇考妣東西向七年御史荅禄與權請舉禘祭下羣臣議禮部太常寺翰林院議以為虞夏商周四代其始祖所自出可得而推故禘禮行焉自漢唐以來世系莫考當時所謂禘者不過合已祧之主序昭穆而祭之迺古之大祫非禘也今國家追尊四廟而始祖所自出者未有所考禘祭之禮似難遽行遂寢孝宗𢎞治元年憲宗升祔用禮官議祧懿祖乃建祧廟於寢後殿嵗暮奉祧主至太廟行祫祭禮先期遣官祭告太廟又遣官祭告懿祖於祧廟俱用祝文酒果祭畢太常寺設懿祖神座於正殿西向居熙祖上祭如儀世宗嘉靖十年帝以禘祫義詢大學士張璁令與夏言議言撰禘義一篇略言我祖宗之有天下固以德祖為始祖百六十年來居中南向享太廟嵗時之祭今陛下定大祫之祭又以德祖統羣廟之主若使主禘之祭仍尊徳祖夫既身為太祖之始祖矣而又為始祖之所自出恐無是理朱子亦曰禘自始祖之廟推所自出之帝設虚位以祀之而以始祖配夫三代以下必欲如虞夏商周之禘黄帝帝嚳則既無所考若強求其人如李唐之祖聃又非孝子慈孫之所忍為臣以為宜設初祖虗位而以大祖配蓋太祖初有天下寔始祖也帝深然之㑹中允廖道南言朱氏為顓頊裔請以太祖寔錄為據禘顓頊復詔禮部㑹議諸臣咸謂稱虛位者茫昩無據尊顓頊者世逺難稽廟制既定高皇帝為始祖當禘徳祖為正帝意主虛位令再議夏言復論禘徳祖有四可疑且今所定太祖為太廟中之始祖非王者立始祖廟之始祖乃設虚位以禘皇初祖神牌令中書官書曰皇初祖帝祖位至曰設太廟殿中祭畢燎之南向奉太祖配西向禮臣因言大祫既嵗舉大禘請三嵗一行帝定丙辛年舉行敕禮部具儀擇日四月禮部上大禘儀注前期告廟致齊三日備香帛牲醴如時享儀錦衣衛設儀衛太常卿奉皇初祖神牌太祖神位於太廟正殿安設至日行禮如大祀圜丘儀其年冬帝諭禮官曰太祖以恩隆德祖今日當以義尊太祖祫祭奉四祖同太祖皆南向庶見太廟為特尊太祖之意夏言奏禮合羣廟之主祭於太祖之廟是為大祫亦以尊太祖也太廟太祖之廟不當與昭穆同序太祖太廟之祖不可與子孫並列自今大祫宜奉徳祖居中懿熈仁三祖及太祖東西序皆南向列聖左右序東西向如故不惟我太祖列羣聖之上足以伸皇上之心而懿熙仁三祖得全其尊尤足以體太祖之心帝稱善焉十五年定大祫儀前期太常寺奏請欽定捧主官及齋戒省牲如常儀正祭日帝至廟㦸門東帷幕具祭服出自㦸門左入率捧主官至祧廟及寢殿出主捧主官請各廟主至太廟門外候五祖主至闢殿門入帝安徳祖主捧主官各安懿祖以下主帝至御拜位如常儀懿祖而下上香奠帛獻爵俱捧主官代二十年禮官議嵗暮大祫當陳祧主而景神殿隘請暫祭四廟於後寢用連几陳籩豆以便周旋詔可欽定續通典卷五十二
