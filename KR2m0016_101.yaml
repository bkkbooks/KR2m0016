body:
  text: 兵行軍下營審擇其地唐太宗討髙麗營州都督張儉畏不敢深入李道宗請以百騎往曰臣請二十日行留十日覽觀山川得還見天子因傍南山入賊地相易險度營陣便處將還㑹髙麗兵斷路更走間道謁帝如期五代時謝彦章為梁騎將與賀瓌行視郊外瓌指一地語彦章曰此地岡阜隆起其中坦然營柵之地也已而晉兵栅之瓌疑彦章隂以告晉益惡之宋宗澤於京城四壁各置使以領招集之兵又據形勢立堅壁二十四所於城外沿河鱗次為珠砦以聨結兩河諸路人馬又吴璘按行諸屯預治黄河戰地先以數百騎嘗敵敵鳴鼔鋭士自空壁出突璘軍璘軍先得治地無不一當十敵大敗遁入壁又詔孟珙收復荆襄珙謂必得郢然後可以通饋饟得荆門然後可以出竒兵於是歸州屯三千人鼎澧辰沅靖各屯五千人郴桂各千人以保江西元薩竒蘇布哈追金主至歸徳欲薄城背水而營史天澤曰此豈駐兵之地乎彼若來犯則進退失據矣不聽果全軍覆没又達實巴圖爾攻襄陽相視形勢内列八翼包絡襄城外置八營軍峴山楚山以截其援自以中軍四千據虎頭山以瞰城中鄉導唐代宗時吐蕃與諸雜羌戎㓂陷西山柘静等州詔嚴武収復武遣崔旰統兵西山賊城周圍皆石礫攻具無所設惟東南隅環丈之地壤土可穴諜知之以告旰晝夜穿地道以攻之再宿而拔其城因拓地數百里下城寨數四番衆相語曰崔旰神兵也將更前進以糧盡還五代初梁以葛從周為兖州刺史將兵在外時劉鄩為王師範守登州使入貢油鬻兖城中悉視城中虚實出入之所油者得羅城下水竇可入鄩以歩兵五百從水竇襲破之宋郭逵知澧州得北溪蠻親信厚待之用以為鄉導盡平諸隘遂破其所居桃花州蠻彭仕羲棄城走衆悉降又种世衡守青澗有僧王光信者習知番部山川道路世衡出兵嘗使為鄉導數有功又韓世忠破方臘窮追至睦州青溪峒賊深據岩屋為三窟諸將繼至莫知所入世忠潛行溪谷問野婦得逕即挺身仗戈直前度險數里𢷬其穴格殺數十人擒臘以出又孟珙討唐鄧行省武仙仙愛將劉儀降珙問仙虚實儀陳仙所據九砦石穴山以馬蹬沙窩岵山三砦蔽其前三砦不破石穴未易圖也若先破離金砦則王子山砦亦破岵山沙窩孤立三帥成擒矣珙翼日遣兵向離金執黑旗入砦分據巷道縱火掩殺是夜壯士楊青𢷬王子山砦入帳斬其帥首一時諸砦俱破金太宗天㑹間伊喇成隸達賚下為行軍明安與宋人戰於楚泗之間成以所部先登大破宋軍劉麟約㑹天長軍議進止成與𤓰爾佳察罕鼐俱為達賚前鋒得宋生口為鄉導遂達天長睿宗嘉之又宋蔡靖遣郭藥師帥師與金人戰於白河兵敗而還藥師遂帥所部兵劫靖及轉運使吕頤浩以降斡里雅布既得藥師益知宋虚實因以為鄉導懸軍深入矣元太祖距居庸關百里召徹伯爾問計對曰從此而北黑樹林中有間道騎行可一人臣向嘗過之若勒兵銜枚以出終夕可至太祖乃令徹伯爾輕騎前導日暮入谷黎明諸軍已在平地疾趨南口金鼔之聲若自天下又襄陽軍乏食劉斌知青陵多積糓前阻大澤水深不可渉陳可取狀衆難之斌叱曰彼恃險不我虞取可必也帥騎兵百人夜發所獲敵人使道之前行汙澤中五十餘里遇敵斌捨馬揮槊突敵敗之得糧數千斛又張宏範破宋廣州由潮陽港發舶入海至甲子門獲宋斥堠劉清顧凱乃知宋廣王所在遂次崖山明徐達分布士馬規取河北克臨清獲李寳臣等用為嚮導又檄諸將率馬歩舟師夾河進元伊蘇帥衆禦海口望風大潰又王守仁既諭降土番盧蘇王受即因其兵攻斷藤峽其中諸猺上連八寨下通仙臺花相諸峒連絡數十餘巢盤亘三百里守仁使盧蘇等為鄉導以土兵分道深入大破之又王守仁攻横水左溪賊至賊巢三十里駐兵夜募鄉兵善登山者四百人各執旗懐銃砲由間道入險分布近巢左右極髙山頂伏覘賊度我兵至險舉砲應之又先遣壯士縁崖奪險盡獲其滚木壘石亡何守仁進攻賊正據險迎敵忽聞近巢砲聲烟焰蔽天起乃急麾兵逼之賊大驚潰遂乗勝破之又林俊巡撫四川值賊首藍廷瑞廖惠等攻破諸郡邑俊以官兵不諳地勢乃召各處土兵協力勦之殺溺死者六千餘人廖惠被擒廷瑞奔投鄢本恕越陜西漢中三十六盤至大巴山俊復遣兵追及敗之擒廷瑞本恕漢㓂以寧下營斥堠并防捍及分布陣五代梁謝彦章為葛從周養子從周授之兵法以千錢置大盤中為行陣偏伍之狀示以出入進退之節彦章盡得之後為將居軍中常儒服或臨敵御衆肅然有將帥之威左右馳驟疾若風雨晉人望其行陣齊整相謂曰謝彦章必在此也宋真宗景徳初契丹㓂河朔車駕親征大將李繼隆為駕前排陣使赴澶州陳兵北城澶淵城壁不足守無敵栅戰格之具繼隆計度州之三靣距大河毁車為營先命士卒掘重濠塹埋鹿角數十里以大軍數千乗重疊環之歩騎處其中敵數萬來犯急攻其營禦之遁去又神宗熙寧七年十月帝以新安結隊法并賞罰格及置陣形勢等遣近侍李憲付鄜延帥趙卨俾講求推及諸路於是卨奏曰伏詳置陣之法以結隊為先今聖制雖與古同而用法尤為精宻此盖陛下天錫勇智不待學而後能也然而議者云四十五人而一長不若五人而一長之宻夫有五人而一長即五十人而十長也推之於百千萬則為長多而統制不一也至如周制五人為伍屬之比長五伍為兩屬之閭胥四兩為卒屬之族師五卒為旅屬之黨正五旅為帥屬之州長五帥為軍屬之命卿此猶今之軍制百人為都五都為營五營為軍十軍為廂四廂都指揮而下各有節級有員品亦昔之比長閭胥族師黨正之任也况八陣之法久失其傳聖制煥然一新稽之前聞若合符節盖法制一定易以致人臣有所見不敢不聞又八年帝諭近臣曰黄帝始置八陣法敗蚩尤於涿鹿諸葛亮造八陣圖於魚復平沙之上壘石為八行晉桓温見之曰常山蛇勢此即九軍陣法也至隋韓擒虎深明其法以授其甥李靖靖以時遭久亂將帥通曉者頗多故造六化以變九軍之法使世人不能曉之大抵八陣即九軍九軍者方陣也六花陣即七軍七軍者圓陣也盖陣以圓為體方陣者内圓而外方圓陣則内外俱圓矣故以方圓物驗之則方以八包一圓以六包一此九軍六花陣之大體也六軍者左右虞候軍各一為二虞候軍左右廂各二為四廂軍與中軍共為七軍八陣者加前後二軍共為九軍開國以來置殿前馬步軍三帥即中軍前後軍帥之别名而馬歩軍都虞候是為二虞候軍天武捧日龍神衛四廂是為四廂軍也中軍帥縂制九軍即殿前都虞候專總中軍之事務是其名實與古九軍及六花陣相符而不少差也今論兵者俱以唐李筌太白隂經中陣圖為法失之逺矣今可約李靖法為九軍營陣之制然李筌之圖乃營法非陣也朕採古之法酌今之宜曰營曰陣本出於一法而已止曰營行曰陣在竒正言之則營為正陣為竒也又郭逵慷慨喜兵學神宗嘗訪八陣遺法對曰兵無常形特竒正相生之一法耳因為帝論其詳在延安使以教兵久不就逵擇諸校習金鼓屯營者六十四人使人教一隊頃刻而成尤善用偏裨每至所部令人自言所能暇日閱按之故臨陣皆盡其技又岳飛隸留守宗澤戰開徳曹州皆有功澤大竒之曰爾勇智才藝古良將不能過然好野戰非萬全計因授以陣圖飛曰陣而後戰兵法之常運用之妙存乎一心澤是其言又吴璘兵法云布陣之法以歩軍為陣心左右翼以馬軍距馬步兩肋之間至帖撥增損則係乎臨機耳又吴璘疊陣法毎陣以長槍居前坐不得起次最强弓次强弩跪膝以俟次神臂弓約賊相搏至百歩内則神臂先發七十歩强弓並發次陣如之凡陣以縱馬為限鐵鈎相連俟其傷則更代之遇更代則以鼓為節騎兩翼蔽於前陣成而騎退謂之疊陣此即古來伍法也戰士心定則能持滿敵雖鋭不能當也金布薩忠義赫舎哩志寧追鄂斡於梟嶺西陷泉明日敵軍三萬騎渉水而東大軍先據南岡左翼軍自岡為陣迤邐而北歩軍繼之右翼軍繼歩軍北引而東作偃月陣歩軍居中騎兵據其兩端使敵不見首尾是日大霧晦㝠既陣霧開少頃晴霽敵見左翼據南岡不敢擊擊右翼軍烏延察喇力戰敵稍却志寧與𤓰爾佳清臣烏林阿拉薩道剌合戰敵大敗又珠嘉塔爾琿因元兵入陜西上章曰宋人與我為讐敵頃以力屈自保非其本心今陜西被兵河南出師轉戰連年不絶兵死於陣民疲於役國力竭矣夀泗一帶南接旰楚紅襖賊李全巢穴也萬一宋人諜知與全乗虚而入腹背受敵非計之得也臣已令所部沿邊警斥以備非常宜勅夀泗帥臣謹斥堠嚴烽燧常若敵至此兵法所謂無恃其不來恃吾有以待之之道也帝是而行之元阿爾哈雅曰汴在南北之交使西人得至此則江南三省之道不通於畿甸軍旅應接何日息乎夫事有緩急輕重今重莫如足兵急莫如足食吾徴湖廣之平陽保定兩翼軍與吾省之鄧新翼廬州沂郯砲弩手諸軍以備虎牢裕州哈喇婁鄧州孫萬户兩軍以備武闗荆子口以屬郡之兵及蒙古兩都萬户左右兩衛諸部丁壯之可入軍者給馬乗貲裝立行伍以次備諸隘芍陂等屯兵本自襄鄧都軍來田者還其軍益以民之丁壯使守襄陽白土峽州諸隘别遣塔海以備自蜀至者以汴汝荆襄兩淮之馬給之府庫不足則命郡縣假諸殷富之家安豐等郡之粟遡黄河運至於陜糴諸汴汝近郡者則運諸滎陽以達於虎牢吾與諸軍各奮忠義以從王事宜無不濟者衆曰唯命即日部分行事又湖南猺獠竊發朝廷命招諭之達實特穆爾謂㓂情不可料請置三分省一治静江一治沅靖一治柳桂以左右丞參政分兵鎮其地罷靖州路總管府改立靖州軍民安撫司設萬户府監以戍兵又布延特穆爾既敗賊於丁家洲分遣萬户普賢努屯陽陵王建中屯白面渡魯爾討無為州而自率鎮撫布哈萬户明安駐池口以遏上流為之節度又元主以伊濟為淮西宣慰副使守安慶集有司議屯田守戰䇿環境築堡砦選精甲外捍而耕稼於中浚湟增陴外環以大防深塹三重南引江水注之環植木為柵城上四面起飛樓表裏完固俄陞都元帥時羣盜環布四外伊濟居其中左提右挈屹為江淮一保障又山東賊分道犯京師察罕特穆爾奉詔屯兵涿州即留兵戍清湫義谷屯潼闗塞南山口以備他盜而自將鋭卒赴召又察罕特穆爾定河南以兵分鎮闗陜荆襄河洛江淮而重兵太行營壘旌旗相望數千里日修車船繕兵甲務農積穀訓練士卒謀大舉以復山東明徐達遣指揮華雲龍經理故都城垣右丞薛顯参政傅友徳平章曹良臣都督顧時率驍騎偵邏隘口楊鎮撫以舟師鎮直沽太祖稱大將軍有體者以此達數出邊鎮北平北人畏達威名不敢復犯邊達但戒守者繕城戍簡士馬謹烽堠毋得邀功啟釁十餘嵗兵民熙熙有太平色又成祖行營不為塹壘但分布隊伍列陣為門敵不敢犯故將士至營即得休息自便暇則射獵周覽地勢得禽轍頒人樂為用南軍所至掘塹作壘為營通夕不得休既成復行虚敝人力故臨戰輒先疲困又都指揮使安敬為偏將黷而怯都督蔣貴都御史曹翼追敵魚兒海而安敬詭辭阻軍翼言狀帝宻勑王驥行邊㑹諸將方就坐忽揖敬下曰汝奈何逗撓誤大計命斬敬謂貴曰公亦當死且責狀以報諸將股栗驥分兵畫地自莊浪西南抵黄河東北抵寜夏屬都督李安自凉州北抵鎮畨南抵古浪東南抵板井屬都督趙安自甘州東過山丹抵永昌北抵臙脂堡西抵深溝壘屬任禮自肅州東接深溝稍東北抵鎮夷西抵嘉峪北抵天倉屬蔣貴約以小至則各守大至則并力拒敵由是軍伍整肅敵騎逺避又余子俊經理榆林東起清水營之紫城砦西至寧夏花馬池延袤二千里每二三里則為敵臺崖砦連比不絶又於中空地築短牆横一斜二如黻月形以為偵敵避箭之所凡為堡十二崖砦八百餘墩九十有五自是要害既據内地益安榆林遂為雄鎮又余子俊總督宣大建議以萬人為一軍用戰車五百餘輛行則縱以為陣止則横以為營車空缺處用鹿角柞補塞内藏戰士糧草器械與賊對壘賊用弓矢不過百歩我用槍炮可及三四百歩賊散掠則出兵防遏日暮則擊其惰歸前項車營尤便䇿應又楊一清撫靈川時有笑其演營習陣者一清曰古人行必謹哨探止必修戰備無事常如有事時隄防有事常如無事時鎮静武侯李靖均未嘗廢營陣茍世無武穆豈可恃野戰為能哉又俞大猷從李良欽學擊劍盡其術益悟常山蛇勢以為兵法數起五猶一身五體雖將百萬之師可使合為一人也臣等謹案古者伍法數家大畧小列之為五人大列之二十五人参列之七十五人五其數得三百七十五人三百為正六十人為竒後世多因穰苴五人為伍十五為隊大將握竒之數皆以中軍内丁代之然則伍隊雖厯世而未改也楊儀從容結陣馬昊分隊立長戚繼光偏伍什兩總是一法王驥畫界分疆不過因地而推用之耳先據要地及水草唐史敬奉形甚短小若不能勝衣至於野外馳逐能擒奔馬自執鞍勒隨鞍躍上然後羈帶矛矢在手前無強敵僮使僅二百人每以自隨臨入敵輒分其隊為四五隨逐水草每數日各相遇已而皆有獲又張仁愿以朔方軍隣於突厥時黙啜悉衆擊突厥仁愿請乘虛奪取漠南地就河北築三受降城首尾相應以絶南冦之路自是突厥不敢踰山畋牧嵗減鎮兵數萬人省費億計又史思明之亂王師敗績乘勝而西李光弼整衆至洛謂留守韋陟曰賊乘鄴下之勝再犯王畿宜按甲以挫其鋒不利速戰洛城非禦備之所公計若何陟曰加兵陜川退守潼闗據險以待之足挫其鋭矣光弼曰兩軍相敵貴進尺寸之間今委五百里而不顧是張賊勢也若移軍河陽北阻澤潞三城以抗勝即擒之敗則自守表裏相應使賊不敢西侵則猿臂勢也遂移牒留守及河南尹縱居人出城避㓂率軍士運油鐵諸物以為戰守之備未一夜入河陽三城排門守備賊憚光弼威畧頓兵白馬寺南不出百里不敢犯闕又劉昌為涇原營田使受詔築城平凉以扼彈筝峽口昌命從事旬餘而畢又於平涼西别築峿谷堡名曰彰信平涼當四㑹之衝居北地之要分兵援戍遏其要衝築神威軍於青海中龍駒島名神龍城吐畨屏跡不敢近青海又徳宗貞元中楊朝晟奏方渠合道木波皆吐畨要路請城其地以備之又奏前築鹽州凡興師七萬諸軍畨戎盡知之今臣境臨邉若大興兵即戎畨来㓂㓂則戰戰則無暇城矣今請發軍士不十日至塞下未三旬而工畢畨人始知已無奈何帝從之已事軍還吐畨始来數日退又李徳裕訪破敵之䇿於髙文端對曰官軍攻潞州澤州兵約萬五千人賊常分兵大半伏山谷俟官軍攻城疲倦則出捄之官軍必失利請令軍築城遶澤州以遏救兵固鎮寨峻不可攻然寨中無水倘以兵絶水道賊必遁去徳裕以其言告諸將果如所䇿宋潘美知幽州命兼三交都部署以扞北邊三交西北三百里地曰固軍形勢險阻為北邊咽喉美潜師擊之遂㨿其地屯兵積粟以守之自是北方以寧又耿全斌從征太原還遇敵於蒲隂追擊至徐河因據水口要害遷補騎副兵馬使又改雲騎軍使屯瀛州與敵戰所乘馬兩中流矢死凡三易乘戰不却敵為引去又仁宗寳元初趙元昊反狄青為延州指使青既破金湯城畧宥州屠羅密翠香摩諾爾桑羅沁七家口等族燔積聚數萬收其帳二千三百又城橋子谷築招安豐林新砦大郎等堡皆扼賊要害又范仲淹以慶州西北馬舖砦當後橋川口在賊腹中欲城之度賊必爭密遣其子純祐與畨將趙明先據其地引兵隨之諸將莫知所向行至柔逺版築皆具旬日城成即大順城也環慶自此㓂盜益少又种世衡為鄜州判官西邉用兵守備不足世衡建議創青澗城以遏㓂衝朝廷從之夏人屢来爭世衡且戰且築城成復開營田二千頃出官錢以募商賈使通其利城中芻糧錢幣軍需城守之具皆不須外計又劉子羽以潭毒山形斗㧞其上寛平有水為築壘方城金人已至子羽據胡牀坐於壘口諸將泣告請他徙子羽曰子羽今日死於此既而敵疑其誘已遂不敢逼又金歸宋河南陜西地宋詔吴璘帥秦鳯移川口諸軍於陜璘謂胡世將曰金大兵屯河中府止隔大慶一橋耳騎兵疾馳不五日至川口吾軍逺在陕西緩急不可遽集闗隘不葺糧道斷絶此存亡之秋也因抗奏方今大計宜固和好内修守禦所當分兵陕蜀接近仙人闗未可遽廢魚闗倉亦宜積糧從之遼耶律休格敗宋兵於望都時宋將劉廷讓以數萬騎並海而出約與李敬源合兵聲言取燕休格聞之先以兵扼其地㑹太后軍至接戰殺敬源廷讓走瀛州金圖克坦喀齊喀遣統軍都監紐赫以兵七千㑹完顔璋於徳順與宋將吴璘戰璘遣兵據東山堡欲樹柵璋與實訥哷紐赫議曰敵若據東山堡此城亦不可㧞宜急擊之於是璋先據要地實訥哷以兵逼東山堡璘兵恃濠相拒短兵相接璘兵退走實訥呼追擊之又世宗大定時伐宋趨滁州將至清流闗得宋偵者知敵欲三道夜出掩我不備左副元帥赫舎哩志寧問計於襄襄曰今兵少地隘儻不得闗敵至我無所據必先取之曰我與若孰往襄曰元帥國家大臣詎宜輕動襄當為公往取志寧韙之襄率騎二千分二道一由衝路自以千兵間道潜登既近敵始覺襄攻克之據其闗志寧履行戰地顧謂曰克敵於不可勝之地真天下英傑也又世宗詔布薩忠義以丞相縂戎事居南京節制諸將忠義至南京簡閲士卒分屯要害戒諸將嚴守備是時已復泗夀鄧州請隳其城遷其民於宿亳蔡州帝曰三州本吾土也得之則已忠義使將士擇善水草休息且牧馬俟來嵗取淮南初世宗詔諸將由泗夀唐鄧三道進發宋人聞之即自方城葉縣以來田野皆燒夷之使無所芻牧忠義命唐鄧道軍芻牧許汝間元人議攻襄陽遣臾天澤呼喇珠往經畫之至則相要害立城堡以絶聲援為必取之計十年與平章阿珠等進攻樊城拔之襄陽降又阿珠還渡江議兵所向或欲先取蘄黃阿珠曰若赴下流退無所據先取鄂漢雖遲旬日可為萬全計巴延從之又元師伐宋屢㨗巴延與諸將㑹鄂城下議曰鄂襟山帶江江南之要區也兵糧皆備不以一大將撫之上流一動則鄂非我有也乃以兵四萬遣阿爾哈雅戍鄂而與阿珠將大兵以東明楊一清總制三邊以寧夏花馬池東至延綏安邊營西至寧夏黃河邊横城堡地方綿亘四百餘里河套數由内侵乃請修濬墻壁以固邊防増設衞所以壯邊兵又馬昊討彛部賊髙珙普法慧𢷬破之獨青山寨不下昊周行視寨曰此地固髙絶其水道可下也乃遣兵據泉口撤南方圍待之兩日賊渴覘南圍薄夜走追逋萬人執普法慧誅之又馬昊撫蜀時蜀賊廖麻子死餘黨竄東鄉山推喻老人為帥昊請於彭澤曰山險不便騎射深入賊為主或反失便願發步兵五萬據出入要道賊當自餓死也澤從之賊窘果縛老人降又播州楊應龍叛據海龍固李化龍集兵分川貴湖廣八路討之攻拔山峒闗砦據三圓山賊樵汲路絶復破海門龍鳳諸闗賊遁囤上而守鐵鑄關㑹霖雨白日晦𡨕急攻破之賊窘自焚死識水泉隔山取水越山度險附唐徳宗建中時楊朝晟築木波以捍吐畨初軍次方渠無水師徒囂然遽有青蛇乗髙而下視其迹水隨而流朝晟命築防環之遂為渟泉軍人仰飲以足圖其事上聞詔置祠焉宋曹翰從征太原軍中乏水城西十餘里谷中有娘子廟翰往禱之穿渠得水人馬以給又魏勝知海州築砦以守金人急攻絶其水砦中食乾糒殺牛馬飲血勝黙禱而雨驟作又种世衡既請城故寛州然處險無泉議不可守鑿地百有五十尺始至石工徒拱手曰是不可井矣世衡曰過石而下將無泉耶爾其屑而出之凡一畚償百金工復致力過石數重泉果沛發萬人歡呼曰神乎雖敵兵重圍吾無困竭之患矣既而朝廷賜名為青澗城據倉廪五代唐莊宗與劉鄩相持於魏鄩夜潜軍出黄澤闗以襲太原周徳威自幽州以千騎入土門躡之鄩至樂平遇雨不得進而還徳威與鄩俱来爭趨臨清臨清有積粟且晉軍餉道也徳威先馳據之以故莊宗卒能困鄩軍而敗之又郭崇韜伐蜀軍入大㪚闗崇韜以馬箠指山險謂魏王繼岌曰朝廷興師十萬已入此中儻不成功安有歸路今岐下飛輓才及旬日必須先取鳳州收其儲積方濟吾事乃令李嚴康延孝先馳書􅊾以諭偽鳳州節度王承㨗及大軍至承㨗果以城降得軍儲四十萬又下三泉得軍儲三十餘萬自是師無匱乏軍聲大振宋王全斌伐蜀下興州與蜀刺史藍思綰戰敗蜀軍七千人獲軍糧四十餘萬斛進攻石圌魚闗白水二十餘砦敗蜀軍數萬擒招討使韓保正復獲糧三十餘萬斛進克利州得軍糧八十萬斛兵賴以濟無匱乏憂遂以破蜀元明安岱爾善騎射從征淮安因糧於敵未嘗匱乏軍士免負擔之勞咸樂為用又蒙古台治水軍於萬山南岸大軍攻樊分軍為五道䝉古台當其一率五翼軍以進焚南岸舟豎雲梯於北岸登櫃子城奪西南角入城命部將據倉粟功在諸將右又元城正陽餽糧乆不繼托爾珠出兵據險潜取安豐麥以餉軍軍心以安又世祖至元三十年廣西元帥府請募南丹五千戸屯田事上行省哈喇哈斯曰此土著之民誠為便之内足以實空地外足以制交趾之㓂可不煩士卒而饋餉有餘即命度地立為五屯統以屯長給牛種農具與之明英宗陷土木于謙禦敵令九門要地都督孫鏜等分守兵皆出營郭外毋避而示弱郭外民内徙毋令失所而囂通倉積粟令官軍儘給草厰聴取用不盡則焚毋以飽敵欽定續通典卷一百一
