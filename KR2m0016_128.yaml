州紹興四年廢觀州為高峯寨存留木門馬臺平洞黃泥中村等堡寨隆州兑州政和四年置隆州兑州并興隆縣萬松縣宣和三年廢隆州及興隆縣為威逺寨兑州及萬松縣為靖逺寨二州先置思忠安江鳯麟金斗朝天等五寨並廢各𨽻新寨仍並𨽻雍州燕山府路府一州九縣三十宋宣和四年詔山前收復州縣合置監司以燕山府路為名山後别名雲中府路燕山府唐幽州范陽郡盧龍軍節度石晉以賂契丹契丹建為南京又改號燕京金滅契丹以燕京及涿易檀順景薊六州二十四縣來歸宋宣和四年改燕京為燕山府又改郡為廣陽節度曰永清軍領縣十二析津廣平都市賜名廣寧昌平良鄉潞武清安次永清三河香河賜名清化漷隂涿州唐置石晉以賂契丹宋宣和四年收復賜郡名涿水升威行軍節度縣四范陽歸義同安新城賜名威城檀州隋置石晉以賂契丹宋宣和四年收復賜郡名曰橫山升鎮逺軍節度縣二密雲行唐賜名威塞平州隋置後唐時為契丹所陷改遼興府以營灤二州𨽻之宋宣和四年賜郡名漁陽升撫寧軍節度縣三盧龍賜名盧城石城賜名臨闕馬城賜名安城易州唐置宋雍熙四年陷于契丹宣和四年收復賜郡名曰遂武防禦縣三易水淶水容城營州隋置後唐時為契丹所陷宋宣和四年收復賜郡名曰平盧防禦縣一都城賜名鎮山順州唐置石晉以賂契丹宋宣和四年收復賜郡名曰順興團練縣一懷柔薊州唐置石晉以賂契丹宋宣和四年收復賜郡名曰廣川團練縣三漁陽賜名平盧三河玉田景州契丹置宋宣和四年收復賜郡名灤川軍事縣一遵化經州本薊州玉田縣宋宣和六年建為州雲中府路雲中府唐雲州大同軍節度石晉以賂契丹號為西京宋宣和五年始得雲中府武應朔蔚奉聖歸化儒媯等州所謂山後九州也武州唐置石晉以賂契丹宋宣和五年收復六年築固疆堡應州故屬大同軍節度後唐置彰國軍石晉以賂契丹宋宣和五年來降朔州唐置後唐為振武軍石晉以賂契丹宋宣和五年來降蔚州唐置石晉以賂契丹宋宣和五年來降奉聖州唐新州後唐置威塞軍節度石晉以賂契丹契丹改為奉聖州宋宣和五年來降歸化州舊毅州後唐改為武州石晉以賂契丹契丹改為歸化州宋宣和五年來降儒州唐置石晉以賂契丹宋宣和五年來降媯州唐置石晉以賂契丹契丹改為汗州宋宣和五年來降欽定續通典卷一百二十八
