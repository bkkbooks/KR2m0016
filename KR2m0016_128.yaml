body:
  text: 州郡宋福建路夔州路成都府路廣南東路潼川府路廣南西路利州路路燕山府福建路州六軍二縣四十七南渡後升建州為府福建大都督府長樂郡威武軍節度舊領福建路鈐轄建炎三年升帥府縣十二閩望侯官望福清望古田望唐縣有寶興銀場古田金坑永福望有黃洋保德二銀場本案輿地廣記宋朝事實並云永福唐永太縣宋崇寧元年改今名謹附識長溪望有王林銀場及鹽場長樂緊有海壇山鹽場羅源中舊永貞縣閩清中寧德中王審知時置懷安望太平興國五年析閩縣置連江望建寧府上本建州建安郡舊軍事端拱元年升為建寧軍節度紹興三十二年以孝宗舊邸升府縣七建安望漢縣有北苑茶焙龍焙監庫及石舍永興丁地三銀場浦城望有余生蕉溪斤竹三銀場嘉禾望本建陽縣有瞿嶺等四銀場景定元年改今名松溪緊崇安望淳化五年升崇安場為縣政和緊咸平三年升關𨽻鎮為縣政和中改關𨽻為政和縣有天受錫場甌寧望熙寧三年廢元祐四年復安案輿地廣記宋朝事實並云治平三年析建建陽浦城置甌寧縣宋史不載謹附識監一豐國咸平二年置鑄銅錢泉州望清源郡太平興國初改平海軍節度本上郡大觀元年升為望郡縣七晉江望有鹽亭一百六十一南安中同安中有安仁上下馬欄莊坂四鹽埸惠安望太平興國六年析晉江置縣有鹽亭一百二十九案輿地廣記宋朝事實並云淳化五年置縣與宋史異謹附識永春中五代閩桃源縣有倚洋一鐡場安溪下有青陽鐡場德化下有赤水鐡埸南劍州上劍浦郡軍事太平興國四年加南字縣五劍浦緊舊龍津縣南唐改有大演石城二銀埸雷文等五茶焙將樂上大平興國四年自建州來𨽻有石牌安福二銀埸順昌上南唐升永順埸為縣沙中有龍泉銀埸尤溪上有尤溪寶應等九銀埸漳州下漳浦郡軍事縣四龍溪望有吳慣沭犢中柵三鹽埸漳浦望有黃敦鹽埸龍巖望有大濟寶興二銀場長泰望太平興國五年自泉州來𨽻汀州下臨汀郡軍事淳化五年以上杭武平二埸並為縣元符元年析長汀寧化置清流縣縣五長汀望有上寶錫埸歸禾拔口二銀務莒溪鐵務寧化望有龍門新舊二銀坑上杭上有鍾寮金埸天聖二年徙治鍾寮埸東乾道四年徙治郭下武平下清流案清流縣史闕載望緊等字今仍其舊南渡後增縣一蓮城本長汀蓮城堡紹興三年升為縣邵武軍同下州太平興國五年以建州邵武縣建為軍仍以歸化建寧二縣來屬縣四邵武望有黃土等三鹽埸龍須銅埸寶積等三鐵埸光澤望太平興國六年析邵武置縣有太平銀埸新安鐡場泰寧望南唐歸化縣宋元祐元年改為泰寧有螺􅀈金場江源銀埸建寧望有龍門等三銀埸興化軍同下州太平興國四年以泉州遊洋百丈二鎮地置太平軍尋改今名縣三莆田望自泉州與仙遊同來𨽻案輿地廣記云太平興國四年來屬宋史不載謹附識仙遊望興化中太平興國四年析莆田置縣成都府路府一州十二軍二監一縣五十八南渡後府三州十一成都府次府本益州蜀郡劍南西川節度太平興國六年降為州端拱元年復府淳化中降為節度嘉祐中復為府後復節度縣九成都次赤華陽次赤新都次畿郫次畿熙寧五年省犀浦為鎮入焉雙流次畿溫江次畿新繁次畿漢繁縣前蜀改廣都次畿熙寧五年廢陵州以貴平籍二縣為鎮入焉靈泉次畿舊名靈池天聖四年改眉州上通義郡至道二年升為防禦縣四眉山望隋通義縣宋太平興國初改彭山望丹稜望青神緊崇慶府緊本蜀州唐安郡軍事紹興十年以高宗潛藩升崇慶軍節度淳熙四年升府縣四晉源望新津望唐唐安縣宋開寶四年改永康望蜀析青城地置縣江源望本唐安縣宋開寶四年改今名案宋史缺江源縣今據輿地廣記各書增入又按史新津縣注云唐唐安縣宋開寶四年改與此同據輿地考稱新津後周縣當是史文誤載謹附識於此彭州緊濛陽郡軍事縣三九隴望唐縣宋熙寧二年置堋口縣四年省為鎮入焉有鹿角寨堋口木頭二茶埸崇寧望唐唐昌縣宋崇寧元年改濛陽望綿州上巴西郡軍事縣五巴西望彰明望魏城緊羅江緊鹽泉中漢州上德陽郡軍事縣四雒望什邡望綿竹望德陽望嘉定府上本嘉州犍為郡軍事乾德四年廢綏山羅目玉津三縣慶元二年以寧宗潛邸升府開禧元年升嘉慶軍節度縣五龍遊上宣和元年改曰嘉祥後復故熙寧五年省平羌縣入焉洪雅上淳化四年自眉州來𨽻夾江中峩眉中犍為下大中祥符四年移治懲非鎮監一豐逺鑄鐵錢邛州上臨邛郡軍事縣六臨邛望熙寧五年省臨溪縣為鎮入焉併入依政蒲江火井依政望安仁望有延貢寨大邑望有思安寨蒲江上有鹽井監鹽井寨火井中開寶三年移治平樂鎮至道三年復舊監一惠民鑄鐡錢建炎三年罷簡州下陽安郡軍事縣二陽安上平泉中黎州上漢源郡軍事縣一漢源下慶厯六年廢通望入焉舊廢飛越縣有博易務七案輿地廣記宋朝事實並云慶厯年省通津縣與宋史異謹附識領羈縻州五十四羅巖州索古州秦上州合欽州劇川州輒榮州蓬口州柏坡州博盧州明川州胣粗州蓬矢州大渡州米川州木屬州河東州諾筰州甫嵐州昌化州歸化州粟川州叢夏州和良州和都州附木州東川州上貴州滑川州北川州吉川州甫萼州北地州蒼榮州野川州邛陳州貴林州護川州牒琮州浪瀰州郎郭州上欽州時蓬州儼馬州橛查州邛川州護邛州腳川州開望州上蓬州北蓬州剝重州久護州瑶劍州明昌州雅州上盧山郡軍事縣五嚴道中有碉門寨盧山上有靈關寨名山中熙寧五年省百丈縣為鎮入焉元祐二年復榮經中下百丈中下州城內一茶場熙寧九年置領羈縻州四十四當馬州三井州來鋒州名配州鉗泰州𨽻恭州畫重州羅林州籠羊州林波州林燒州龍蓬州敢川州驚川州福眉州木燭州百坡州當品州嚴城州中川州鉗矣州昌磊州鉗并州百頗州會野州富仁州推梅州作重州福林州金林州諾祚州三恭州布嵐州欠馬州羅蓬州論川州讓川州逺南州卑盧州夔龍州輝川州金川州東嘉梁州西嘉梁州茂州上通化郡軍事熙寧九年即汶川縣置威戎軍使以石泉縣𨽻綿州縣一汶山下寨一鎮羌熙寧九年置南渡後增縣一汶川下有博易場領羈縻州十璫州直州時州塗州逺州飛州乾州可州向州居州春祺城本羈縻保州政和四年建為祺州縣曰春祺宣和三年廢為城𨽻茂州壽寧寨本羈縻直州政和六年建夀寧軍八年廢為寨宣和三年廢寨為堡又廢敷文關為敷文堡延寧寨本威戍軍熙寧中建政和六年重築軍城改名延寧宣和三年廢為寨𨽻茂州四年又廢寨及夀寧堡入汶川縣威州下維川郡軍事本維州景祐三年以與濰州聲相亂改今名案輿地廣記諸書並云景祐三年改為威州宋史誤作景德三年今改正縣二保寧下唐薛城縣南唐改通化下天聖元年改金川景祐四年復治平三年省通化軍𨽻縣有博易埸案金川宋史誤作途川今據輿地廣記諸書改正領羈縻州二保州羈州嘉會寨本羈縻霸州政和四年建為亨州縣曰嘉會宣和三年廢州以縣為寨𨽻威州通化軍熙寧中建政和三年重築軍城宣和三年省軍使為監押𨽻威州永康軍同下州本彭州導江縣灌口鎮唐置鎮靜軍宋乾德四年改為永安軍太平興國三年改為永康軍縣二導江望乾德中自彭州來𨽻熙寧五年軍廢復𨽻彭州後復於此置有博易埸青城望乾德中自蜀州來𨽻熙寧五年軍廢還𨽻蜀州不知何年復來𨽻仙井監同下州本陵州至道三年升為團練咸平四年廢建始縣熙寧五年廢為陵井監宣和四年改為仙井監隆興初改為隆州縣二仁夀中井研中下南渡後增縣二貴平中下熙寧五年廢入廣都乾道六年復籍中下廢復同上鎮一大安舊永安鎮崇寧二年改鹽井一石泉軍本綿州石泉縣政和七年建為軍割蜀之永康綿之龍安神泉來𨽻宣和三年降為軍使縣皆還舊𨽻七年復為軍額縣三石泉下神泉上有石關寨龍安上有三盤寨及茶埸宣和元年改龍安曰安昌後復故寶祐後為軍治所案宋朝事實綿州下注云熙寧五年省西昌縣入龍安宋史不載謹附識堡九徽宗重和元年置會同靖安嘉平通津橫望平隴陵霄聳翠連雲潼川府路府二州九軍三監一潼川府緊梓潼郡劍南東川節度本梓州乾德四年改靜戎軍太平興國中改靜安軍重和元年升為潼川府縣十郪有三十四鹽井中江望隋元武縣宋大中祥符五年改有鹽井涪城望有四鎮二十七鹽井射洪緊有鹽井鹽亭緊熙寧五年省永泰縣為鎮入焉有六鹽井通泉上有三鐡冶飛烏中有五鹽井銅山中有銅冶東關中下有四鹽井實案輿地廣記宋朝事並云乾德四年以蜀招葺院置縣宋史不載謹附識永泰中下本尉司南渡後為縣遂寧府都督府遂寧郡武信軍節度本遂州政和五年升為府宣和五年升大藩端平三年兵亂權治蓬溪寨縣五小溪望隋方義縣宋太平興國初改蓬溪望長江緊端平三年以下三縣俱廢青石緊遂寧中唐縣宋熙寧六年省青石縣入焉七年復置順慶府中本果州南充郡團練寶慶三年以理宗初潛之地升為府縣三南充望熙寧六年省流溪縣為鎮入焉紹興二十七年復為縣西充望流溪望資州上資陽郡軍事乾德五年廢月山丹山銀山清溪四縣宣和二年改龍水為資州後復故淳祐三年廢縣四盤石緊有一十八鹽井一鐡冶資陽緊龍水中下內江下有六十六鹽井普州上安嶽郡軍事乾德五年廢崇龕普慈二縣案輿地廣記諸書並云崇龕入安居普慈入樂至宋史不載謹附識寶祐以後并廢州縣三安嶽中下熙寧五年廢普康縣入焉謹案宋朝事實熙寧作乾德與宋史異附識安居中樂至下昌州上昌元郡軍事縣三大足上昌元上咸平四年移治羅市永川上敘州上南溪郡軍事乾德中廢開邉歸順二縣本戎州政和四年改縣四宜賓中唐義賔縣宋太平興國元年改熙寧四年省舊奮入僰道為鎮政和四年改僰道為宜賓南溪中乾德中移治舊奮城有鹽井宣化唐義賓縣宋太平興國元年改熙寧四年改為鎮𨽻僰道宣和元年復以鎮為縣改今名慶符本敘州徼外地政和二年建為祥州置慶符來附二縣宣和三年州廢併來附縣入慶符寨五柔逺樂從清門石門懷逺靖康元年廢柔逺樂從二寨𨽻懷逺羈縻州三十建州照州獻州南州洛州盈州德州為州移州扶德州播浪州筠州武昌州志州啇州馴州浪川州騁州協州切騎州靖州曲江州可陵州品州牱違州碾衛州滈州從州播陵州鉗州瀘州上瀘川郡瀘川軍節度本軍事州宣和中賜軍額縣三瀘川中江安中有寧逺安夷西寧逺南田武寧安逺等寨合江中有遙壩青山安溪小溪帶頭使君六寨大觀三年以安溪寨為縣𨽻純州後廢純州復為寨宣和三年廢遙壩四年復南渡後增縣一納溪皇祐二年納溪復置寨紹定五年升為縣監一南井城三樂共城元豐四年置堡寨四江門寨鎮溪堡梅嶺堡大洲堡九支城大觀二年建純州置九支安溪兩縣及美利城宣和二年廢純州及九支縣為九支城以安溪美利城為寨改慈竹寨為堡武都城大觀三年建滋州置承流仁懷兩縣宣和三年廢州為武都城以仁懷為堡承流縣併入仁懷安逺寨元豐三年置大觀四年廢政和五年復博望寨政和七年置板橋堡政和堡政和六年置綏逺寨前𨽻武都城宣和三年𨽻州領羈縻州十八納州薛州晏州鞏州奉州悅州思峩州長寧州能州淯州浙州定州宋州順州藍州溱州高州姚州長寧軍本羈縻州熙寧中置淯井監𨽻瀘州政和中建為長寧軍寨堡六梅洞寨政和五年置清平寨舊𨽻祥州政和二年建賜名宣和三年廢祥州以寨𨽻軍