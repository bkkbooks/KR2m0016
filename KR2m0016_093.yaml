body:
  text: 兵法制唐貞觀初練兵之制每嵗季冬折衝都尉率五校兵馬之在府者分步隊騎隊左右相距百步各執矟幡刃旗擊鼓則進聞金則却以吹角始以吹角止因縱獵獲各入其人至開元中以仲冬月講武前期所司于都門外除地為場為和門墠地為營坪立表為進退之節至日將士集依方色建旗東西成列吹角三通聽誓於大將軍鼓鳴旗舉士衆趨進東軍鼓而舉青旗為直陳西軍亦鼓而舉白旗為方陳以應之次西軍鼓而舉赤旗為鋭陳東軍亦鼓而舉黑旗為曲陳以應之次東軍鼓而舉黃旗為圓陳西軍亦鼓而舉青旗為直陳以應之次西軍鼓而舉白旗為方陳東軍亦鼓而舉赤旗為鋭陳以應之次東軍鼓而舉黑旗為曲陳西軍亦鼓而舉黃旗為圓陳以應之凡陳遞為主客先舉為客後舉為主五變而畢事步軍畢乃講騎軍進止如之後詔府兵六嵗一簡自彍騎羽林之軍設擇材勇者頗習弩射亦以試士及第者有賞元宗講武驪山以虧失軍客詔斬兵部尚書郭元振坐之纛下宰相跪諌曰元振推戴上皇有大功得免死流新州禮儀使唐紹草軍儀有失斬之諸軍震恐失序惟薛訥解琬軍不動帝召至慰勞又李光弼代郭子儀鎮朔方麾幟仍舊號令一新㑹帥兵東出大將張用濟稍逗遛立斬之諸將畏服用命五代漢將史𢎞肇御衆嚴整將校少不從命即撾殺之士卒犯民田及繫馬于樹者皆斬軍中畏服周世宗與北漢戰右軍樊愛能何徽引騎兵先遁世宗親胃矢石擊敵却之歸即收愛能徽及軍士七十餘人責之曰汝輩非不能戰正欲以朕為竒貨賣與劉崇耳悉斬之將士股栗所至克捷宋初殿前侍衛二司各閲所掌兵健勇者升上軍怯弱者為剩員並詔諸州長吏精練部兵送闕下仍日習之習法以鼓聲為節騎兵五習步兵四習閲陳畢令解鐙以弓弩射營製弓三等自一石至八斗弩四等自二石八斗至二石五斗以次閲習騎兵只射九斗至七斗弓畫的五暈去的二十步引滿發中者視暈數論賞騎兵帶甲射不能發矢者奪所乘馬與本營藝優士卒後又立挽强跖硬射格以春秋大教弓射夏三月祗習短兵咸平中閲侍衛兵二十萬於東武村步騎交屬左右相向都指揮執方旗以節進退使人于兩陳中執旗登候臺應之初舉黃旗諸軍旅拜次舉赤旗則騎進舉青旗則步進旗動鼓作諸軍士皆三挑而後退次舉白旗諸軍復拜遂舉黑旗以振旅軍于左者略右陳右者略左陳而還熙寧五年以蔡挺衙教陳法頒諸路五伍為隊五隊為陳陳橫列騎兵二隊亦五伍列之束草為人射焉中者有賞馬步軍皆前三行槍刀後二行弓弩隊中附虎蹲弩床子弩各一具射與擊刺迭出以鼓為節聞金即退其人馬强者預隱隊中遇有用處則别出為竒南渡後専習制禦鐡騎摧鋒破敵之法習全副執帶出入短樁神臂弓長柄膊刀馬射穿甲施用棍棒每營揀二十人閲習放炮排日就營教閲每軍各置旗號前軍緋旗鳥為號後軍皂旗龜為號左軍青旗蛟為號右軍白旗虎為號中軍黃旗神人為號又别以五色物號制招旗分旗舉招旗則五軍以旗相應合而成陳舉分旗則五軍以旗相應分而成隊左右前却或分藏為伏或分出為竒皆舉旗為號更鳴小金應鼓備瞻望不及者預約伏藏之所緩鳴小金即止急鳴應鼓即竒兵出陳趨戰急鳴小金即伏兵盡出其春秋大校皆依此法乾道四年十月大閲于茅灘教場先期修築將壇至日三衙管軍與各軍統制統領將佐全裝披帶率三司馬步軍兩忠毅軍寨馬軍各執弓槍帶刀斧齊集視黃旗舉中軍鳴角馬步軍簇隊連三鼓馬軍上馬步人撮起旗槍四鼓舉白旗中軍鼓聲應變方陳為備敵之形别髙一鼓步軍四向如遇敵且戰且前馬軍出陳如交鬬再高一鼓各分歸本位五鼓舉黃旗變圓陳如自環固又三鼓舉赤旗變鋭陳魚貫斜列如衝敵再舉青旗變直陳中間節次皆如方陳鳴金收隊重三鼓馬軍上馬步人齪落擊刺中節仍鳴角簇隊步人分東西引拽馬軍交頭隨隊呈試驍鋭大刀繼而進試車炮烟槍各藝訖鳴金收軍先是熙寧中趙卨言大閲陳隊且以萬二千五百人為法旌旗麾幟各隨方色仍依唐李靖結隊之式稍為變動每一大隊合五中隊五十人為之中隊合三小隊九人為之小隊合三人為之皆令自擇其心意相得者又選壯勇善槍者一人為旗頭令自擇如已藝心相得者二人為左右傔自選勇悍者一人為引戰選軍校一人執刀在後為擁隊凡隊內一人用命二人應援小隊用命中隊應援中隊用命大隊應援大隊用命小隊應援如觀望不赴救致有失者本隊委擁軍校次隊委本轄校將審勘所由斬之其不可救與不能救者不坐用法精密後用張誠一李憲等效李靖六花陳法教演七軍曰營曰陳止為營行為陳營則正陳則竒至淳熙間又立槍手射鐵簾賞格槍手以竄刺多少為十二等支銀兩高下有差射鐵簾以步數逺近犒賞緡錢有差又嶽飛討楊么統制任士安不禀前帥令致軍無功鞭之使餌賊曰三日賊不平斬汝乃挑賊併攻伏兵四起擊賊走之孟宗政權棗陽軍初視事一愛僕犯新令立斬之軍民股栗孟珙以元兵至三川下令應出戍主兵官不許失棄寸土權開州梁棟以乏糧還司珙曰是棄城也斬以狥由是諸將禀命惟謹遼制鑄金魚符調發軍馬其捉馬及傳命有銀牌二百軍所舍有逺探欄子馬以夜聽人馬之聲凡舉兵帝率羣臣祭告天地日神分命近臣告太祖以下諸陵及木葉山神乃詔諸道徴兵惟南北奚王東京渤海兵馬燕京統軍兵馬雖奉詔未敢發兵必以聞上遣大將持金魚符合然後行始聞詔攢户丁推户力核籍齊衆以待自十將以上次第㸃集軍馬器仗符至兵馬本司自領使者不得與惟再共㸃軍馬訖又以上聞量兵馬多少再命使充軍主與本司互相監督又請引五方旗鼓然後皇帝親㸃將校選士卒其南伐㸃兵多在幽州北千里鴛鴦泊及行並取居庸關曹王峪白馬口古北口阿達木口松亭關榆關等路將至平州幽州境又遣使分道催發不得久駐恐踐禾稼出兵不過九月還師不過十二月皇帝親征留親王一人在幽州權知軍國大事既入南界分為三路廣信軍雄州權知各一駕必由中道兵馬都統護駕等軍皆從各路軍馬遇縣鎮即時攻擊若大州軍必先料其虛實可攻次第而後進兵至宋北京三路兵皆㑹以議攻取及退亦然三路軍馬前後左右有先鋒逺探欄子馬各十數人在先鋒前後二十餘里全副衣甲夜中每行十里或五里少駐下馬側聽有無人馬之聲有則擒之力不可敵飛報先鋒齊力攻擊如有大軍走報主帥敵中虛實動必知之軍行當道州城防守堅固不可攻擊引兵過之恐敵人出城邀阻乃圍射鼓譟詐為攻擊敵方閉城固守前後無阻引兵進分兵抄截使隨處州城隔絶不通孤立無援所過大小州城至夜恐城中出兵突擊及與鄰州計㑹軍馬甲夜每城以騎兵百人去城門左右百餘步被甲執兵立馬以待兵出力不能加馳還勾集衆兵與戰左右官道斜徑山路河津夜中並遣兵巡守其打草穀家丁各衣甲持兵旋團為隊必先砍伐園林然後運土木填濠塹又於本國州縣起漢人鄉兵萬人隨軍専伐園林填道路御寨及諸營壘惟用桑柘梨栗軍退縱火焚之敵軍既陳料其陳勢小大山川形勢往回道路救援捷徑漕運所出各有以制之然後于陳四靣列騎為隊每隊五七百人十隊為一道十道當一靣各有主帥最先一隊走馬大譟衝突敵陳得利則諸隊齊進若未利引退第二隊繼之退者息馬飲水諸道皆然更退迭進敵陳不動亦不力戰厯二三日待其困憊又令打草穀家丁馬施雙帚因風疾馳揚塵敵陳更互往來敵既飢疲目不相覩可以取勝若陳南獲勝陳北失利主將在中無以知之則以本國四方山川為號聲以相聞得相救應若帝不親征重臣統兵不下十五萬衆三路往還北京㑹兵進以九月退以十二月行事次第皆如之若春以正月秋以九月不命都統止遣騎兵六萬不許深入不攻城池不伐林木但於界外三百里內耗蕩生聚不令種養而已軍入南界步騎車帳不循阡陌三道將領各一人率欄子馬各萬騎支散游奕百十里外更迭覘邏及暮以吹角為號衆即頓舍環繞御帳自近及逺折木稍屈為弓子鋪不設槍營塹柵之備每軍行鼓三伐不問晝夜大衆齊發未遇大敵不乘戰馬俟近敵乘新羈馬蹄有餘力成列不戰退則乘之多伏兵斷糧道冒夜舉火上風曵柴饋餉自賫散而復聚善戰耐寒此兵之所以强也準布達爾罕叛命耶律仁先為西北路招討使許便宜從事仁先嚴斥堠扼敵衝懷柔服從庶事整飭達爾罕來寇仁先擊敗之金用兵之制戈為前行號曰硬軍弓矢在後設而不發非五十步不射弓力不過七斗箭鏃至六七寸形如鑿入輒不可出人攜不滿百隊伍之法五十百千皆有長五長擊柝十長執旗百長挾鼓千長則旗幟金鼓悉備五長戰死四人皆斬十長戰死五長皆斬百長戰死十長皆斬凡為將自執旗人視其所向而趨自主帥至步卒皆自馭無從者國有大事適野環坐畫灰而議自卑者始議畢即漫滅之人不聞聲其密如此將行軍大㑹而飲使人人獻䇿主帥聽而擇焉其合者即為將任其事師還又大㑹問有功高下賞之以金若干舉以示衆或以為薄復增之初盛之時率用騎兵旗幟之外各有字記大小牌子繫馬上為號每五十人分為一隊前二十人全裝重甲持棍槍後三十人輕甲操戈每遇敵必有一二人躍馬而出先覘陳之虛實或向其左右前後結隊而馳擊之百步之內弓矢齊發中者常多勝則整隊而緩追敗則復聚而不散其分合出入應變若神兵之所以强也太祖命舍音都統內外諸軍取遼中京詔曰遼政不綱神人共棄今欲中外一統故命汝率大軍以行討伐爾其慎重兵事擇用善謀賞罰必行糧餉必繼勿擾降服勿縱俘掠見可而進毋淹師期事有從權無煩奏禀舍音遂克中京又烏珠臨敵被白袍乘甲馬以牙兵三千督戰兵皆重鎧甲號鐵浮圖戴鐵兜牟周匝綴長簷三人為伍貫以韋索每進一步即用拒馬擁之人進一步拒馬亦進退不可却又以鐵騎分左右翼號拐子馬皆女直為之號長勝軍専以攻堅戰酣然後用之所向無前屢建竒績明太祖洪武六年命中書省大都督府御史臺六部議教練軍士律騎卒必善馳射槍刀步兵必善弓弩槍步射以十二矢之半逺可到近可中為程逺可到將辨百六十步軍士百二十步近可中五十步彀弩以十二矢之五逺可到蹶張八十步划車六十步槍必進退熟習在京衛所以五千人為率取其一指揮以下官領赴御前驗試餘以次畨試在外都司衛所每衛五千人取五之一千户以下官領赴京驗試餘以次畨試軍士步騎皆善將領各以其能受賞否則軍士給錢六百為道里費將領自指揮使以下所統軍士三分至六分不中者次第奪俸七分以上次第降官至為軍止都指揮軍士四分以上不中奪俸一年六分以上罷職李文忠下錢塘入宿城上秋毫無犯令曰敢擅入民居者斬一卒借民釡立磔以徇又韓雍征廣西猺酋兼程而進一入軍先斬失律指揮李英等四人將士股栗壁壘改觀卒滅大藤諸賊又梁震為大同鎮總兵大同鎮兵素驕悍鎮巡官畏禍每甘言煦之稍不如意即反脣瞪目飛章訛語相搖惑震受命率家丁五百人馳至雲中申明約束曰我無爾凌爾無我叛王法軍令具在我不敢破紀綱誤國家家丁時時向鎮兵語曰爾敢犯主將者恃衆耳兒郎輩無不一以當百五步之內恐爾不得用其衆矣鎮兵由是斂戢雜教令附唐李筌太白隂經曰夫人以心定言定言以出令故須振雄略出徑詞鋭鐵石之心凛風霜之氣發揮號令申明軍法經曰師衆以順為武軍事有死無犯為敬故穰苴斬莊賈魏綘戮楊干而名聞諸侯威震鄰國令之不行不可以稱兵三令而不如法者吏士之罪也申明而不嚴整者將之過也先甲三日懸令于軍門使軍正執木宣于六軍之衆有犯令者使軍正凖令按集軍人而後行刑使六軍皆知之宋制賞格凡臨陳對賊矢石未交先鋒馳入陷陳突衆賊徒因而破敗者為竒功或冦賊堅鋭城池險固山林阻隘道路遙逺及救兵不繼如此之類既制勝克敵難易相逺並不可以常格酬叙委主將臨時録奏旌賞明制令凡交鋒之際突入敵陳透出其背殺敗敵衆者勇敢入陳斬將搴旗者本隊已敗敵衆别隊勝負未决而能救援克敵者受命能任其事出竒破敵成功者皆為竒功齊力進前者首先敗敵者前隊交鋒未决後隊向前殺敗敵衆者皆為頭功凡建立竒功頭功者其親管頭目即為報知妄報者治以重罪行營及下營之時擒獲姦細者升賞准頭功哨馬生擒敵一人賞銀三十兩斬首一級者二十兩欽定續通典卷九十三
