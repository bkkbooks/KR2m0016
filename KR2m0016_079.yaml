body:
  text: 禮凶喪制下葬儀合葬附晉唐宋遼金元明晉葬儀據漢魏故事將葬設吉凶鹵簿皆有鼓吹新禮以禮無吉駕導從之文臣子不冝釋其衰麻以服玄黃除吉駕鹵簿又凶事無樂遏密八音除凶服之鼓吹摯虞以為祥車曠左則今之容車也冝定新禮設吉服導從如舊其凶服鼓吹冝除詔從之南渡後淮南小中正王式繼母前夫終更適式父式父終喪服訖議還前夫家前夫家亦有繼子奉養至終遂合葬於前夫式自云父臨終母求去父許諾於是制出母齊衰期卞壼奏曰就如式父臨終許諾必也正名依禮為無所據若夫有命須顯七出之責當存時棄之無緣以絶義之妻留家制服若式父臨困謬亂使去留自由者此必為相要以非禮則存亡無所得從式冝正之以禮式母於夫生事奉終非為既絶之妻夫亡制服不為無義之婦自云守節非為更嫁離絶之斷在夫沒之後夫之既沒是其從子之日而式以為出母此母以子出也致使存無所容居沒無所托地寄命於他人之門埋尸於無名之家閨門之內犯禮違義開闢未有於父則無追亡之善於母則無孝敬之道存則去留自由亡則合葬路人可謂生事不以禮死葬不以禮者也虧損世教不可以居人倫詮正之任疏奏式遂廢棄終身案合葬前夫此所僅見使死而有知何以見前夫於地下卞壼之持論正矣杜典載唐定安公主薨王同皎子繇請其父合葬夏侯鈷駁之云生存之時已與前夫義絶殂謝之日合從後夫禮葬即此義唐中宗時韋庶人請妃公主命婦以上葬給鼓吹詔可左臺侍御史唐紹言鼓吹本軍容黃帝戰涿鹿以為警衛故曲有靈夔吼雕鶚爭石墜崖壯士怒之類惟功臣詔葬得兼用之男子有四方功所以加寵雖郊祀天地不參設容得接閨閫哉在令五官婚葬無給鼓吹者惟京官五品則假四品蓋班秩在夫若子請置前詔用舊典不省以上杜典不載今輔纂宋太祖乾德六年孟昶薨詔令用本品鹵簿鼓吹儀仗俟導引至城外分半導至西京墳下太宗太平興國七年正月令翰林學士李昉等重定士庶喪葬制度昉等奏議曰唐大歷七年詔喪葬之家送葬祭盤只得於喪家及塋所置祭不得於街衢張設又長慶二年令百姓喪葬祭奠不得以金銀錦繡為飾及陳設音樂葬物稍涉僭越並勒毁除臣等參詳子孫之葬父祖卑幼之葬尊親全尚朴素即有傷孝道其所用錦繡伏請不加禁斷其用音樂及攔街設祭身無官而葬用方相者望嚴禁之其詔葬設祭者不在此限寧宗開禧三年成肅皇后夏氏崩殯於永阜陵正北吏部尚書陸峻言伏睹列聖在御間有諸后上仙緣無山陵可祔是致别葬若上仙在山陵已卜之後無有不從葬者其他諸后葬在山陵之前神靈既安並不遷祔惟元德章懿二后方其葬時名位未正續行追册其成穆皇后孝宗登極即行追册改殯所為攢官典禮已備與元德章懿事體不同所以更不遷祔竊稽典禮祇緣喪有前後勢所當然其於禮意却無隆殺今從葬阜陵為合典故從之司馬光書儀柩行自方相等皆前導主人以下男女哭步從如從柩朝祖之序出門以白幕夾障之尊長乘車馬在其後無服之親又在其後賔客又在其後皆乘車馬無服之親及賔客或先待於墓及祭所出郭不送至墓者皆辭於柩前卑幼亦乘車馬若郭門逺則步從三里所可乘車馬途中遇哀則哭無常準若墓逺經宿以上則每舍設靈座於柩前設酒果脯醢為夕哭之奠夜必有親戚宿其旁守衛之明旦將行朝奠亦如之館舍迫隘則設靈座於柩之旁側隨地之冝掌事者先張靈幄於墓道西設椅桌又設親戚賔客之次男女各異又於羡道之西設婦人幄蔽以簾帷柩將及墓親戚皆下車馬步進靈幄前祝奉祠版箱及魂帛置椅上設酒果脯醢之奠於其前巾之大􅓅至墓道􅓅夫下柩舉之趣壙主人以下哭步從掌事者設席於羡道南􅓅夫置柩於席上北首乃退掌事者陳明器下帳上服苞筲醯醢酒用飯牀於壙東南北上銘旌施於柩上賔客送至墓者皆拜辭先歸至是上下可以具食既食而窆主人拜賔客賔客答拜主人及諸丈夫立於埏道東西向主婦及諸婦人立於埏道西幄內東向皆北上以服之重輕及尊卑長幼為序立哭􅓅夫束棺乃窆諸子輟哭視窆既窆掌事者置上服銘旌於柩上慎勿以金玉珍玩入壙中為亡者之纍主人贈用制幣玄纁束置柩旁再拜稽顙在位者皆哭盡哀既夕禮注丈八尺曰制二制合之束十制五合疏玄纁之率玄居三纁居二或家貧不能備玄纁束則隨家所有之帛為贈幣雖一制可也匠以甎塞壙門在位者皆還次掌事者設志石藏明器下帳苞筲醯醢酒於便房以版塞其門遂實土親戚一人監視之至於成墳遼景宗乾亨五年二月神柩升輼輬車具鹵簿儀衛金纂修雜録圗吉凶二儀鹵簿十三節以備大葬金石例金制諸葬儀一品官石人四事石虎石羊石柱各二事元墓地禁步之圗一品九十步二品八十步三品七十步四品六十步五品五十步六品四十步七品以下二十步庶人九步明制品官葬禮柩車出郭門親賔還者權停柩車乘者皆下哭贊者引親賔以次俱向柩立哭盡哀卑者再拜而退婦人亦如之親賔既還乘車馬如初若墓逺其病不堪步者出郭喪主及諸子亦乘去塋三百步乃下靈車至帷門外回南向遂薦食於靈座前少頃徹之柩車至入凶帷南向祝設几席於柩車之東初至宿次內外皆就柩車所分東西如常立哭遂設酒脯之奠柩車至壙前回南向哭位如在庭之儀掌事者陳明器於壙東南西向北上乃下柩於席丈夫柩東婦人柩西以次憑哭盡哀各退復位內外卑者哭再拜辭訣贊者引喪主以下哭於羡道東西面北上妻及女子子以下哭於羡道西東面北上哭踊無算婦人皆障以行帷掌事者設席於壙內遂下柩於壙內席上北首覆以夷衾持翣者入倚翣於壙內兩廂遂以下帳張於柩東南向米酒脯陳於帳東北食器設於帳前醯醢設於食器南藉以版明器設於壙內之左右掌事者以玄纁授喪主喪主授祝祝奉以置柩旁喪主拜稽顙施銘旌志石於壙內乃掩壙覆土喪主以下稽顙哭盡哀乃祠后土於墓左庶人禮柩未至墓執事者先設靈幄在墓道西南向親賔次在靈幄前十數步婦人幄前靈柩後壙西明器等至靈車至祝奉魂帛就幄座遂設奠而退執事者先布席於壙內柩至脫載置席上北首執事取銘旌去杠置其上喪主男女各就位哭賔客拜辭而歸乃窆喪主兄弟輟哭臨視喪主奉玄纁置柩旁再拜稽顙在位者皆哭盡哀乃實土而漸築之祠后土於墓左至於墳塋之制定自太祖洪武三年一品塋地周圍九十步墳髙一丈八尺二品八十步髙一丈四尺案明會典作一丈六尺三品七十步髙一丈二尺案明會典作一丈四尺以上石獸各六四品四十步案明會典作四品塋地六十步墳髙一丈二尺七品以下二十步髙六尺案明會典五品塋地五十步墳髙一丈六品塋地四十步墳髙八尺七品塋地三十步墳髙六尺明史不言五六品疑有脫誤五年重定功臣沒後封王塋地周圍一百步墳髙二丈圍牆髙一丈石人四文武各二石虎羊馬石望柱各二一品至六品塋地如舊制七品加十步一品墳髙一丈八尺二品至七品遞殺二尺一品墳牆髙九尺二品至四品遞殺一尺五品四尺一品二品石人二文武各一虎羊馬望柱各二三品四品無石人五品無石虎六品以下無當太祖時旴𣅿楊王墳置守户二百一十宿州徐王墳置墳户九十三滁州滁陽王墳亦置墳户虞祭宋明宋神宗元豐二年仁宗慈聖太皇太后崩祕閣校理何洵直言按禮既葬日中還虞於正寢蓋古者之葬近在國城之北故可以平旦而往至日中即虞於寢所謂葬日虞弗忍一日離也後世之葬其地既逺則禮有不能盡如古者今大行太皇太后葬日至第六虞自當行之於外如舊儀其七虞及九虞卒哭謂宜行之於慶夀殿又按春秋公羊傳曰虞主用桑士虞禮曰桑主不文伏請罷題虞主太常言洵直所引士及諸侯之禮况嘉祐治平並虞於集英殿宜如故事又嘉祐治平虞主已不書諡當依所請南宋大喪通儀第一虞至第六虞祭太常卿既行掩攢宫之禮並如遷奠之儀惟不用陪位官掩攢之後總護使以下並易常服黑帶奉迎虞主依例用細仗五百人太常鼓吹一百三十人下兵部太常寺差撥及神主祔廟日同山陵等使並隨還京文武百僚合出城奉迎第七至第九虞祭並皇帝親行禮間日而祭其日有司設牙牀牲牢醴饌行禮前御史臺閣門太常寺先引文武百官詣几筵殿裏外立班定次禮直官引讀文官詣殿上東向立進幣爵酒官詣殿上西向立酌酒官於殿上酒樽之後北向立定次禮直官太常博士引太常卿詣幄前立定皇帝入御幄簾降禮直官太常博士引太常卿當幄前俯伏跪奏稱太常卿臣某言請皇帝行虞祭之禮奏訖俯伏興退復位簾捲前導官導皇帝出幄詣殿上褥位西向立內侍啓虞主櫝於後以羅巾覆之訖奏請皇帝再拜在位官皆再拜內侍進盤匜沃內侍奏請皇帝帨手內侍進爵又奏請皇帝洗爵內侍進巾又奏請皇帝拭爵訖前導官導皇帝詣虞主前奏請皇帝跪三上香進幣爵酒官搢笏跪先進幣次進爵酒又奏請皇帝受幣奠執爵三祭酒於茅苴奠爵訖俯伏興又奏請少立讀祝文官搢笏跪讀祝文訖奏請拜皇帝再拜在位官皆再拜前導官導皇帝還褥位西向立奏請拜皇帝再拜在位官皆再拜訖內侍啓虞主巾捧匱覆虞主訖前導官導皇帝歸御幄簾降禮直官太常博士次引太常卿當幄前俯伏跪奏稱太常卿臣某言禮畢訖俯伏興退復位前導官退陪位行事官以次退文武百僚進名奉慰第八第九虞並如上儀司馬光書儀虞祭主人以下皆沐浴執事者設盥盆帨巾各二酒一瓶注子及盞一蔬果七筯茶酒盞醬楪香爐主人及諸子與有服之親皆入尊長坐哭如反哭位卑幼立哭於靈座前斬衰為一列最在前齊衰以下以次各為一列無服之親又為一列丈夫處左西上婦人處右東上各以昭穆長幼為序皆北向頃之祝止哭者主人降自西階盥手帨手詣靈座前焚香再拜退復位及執事者皆盥手帨手執事者一人升取盞斟酒西向酬之祝帥餘執事者奉饌設於靈座前主人進詣酒注所北向執事者一人取酒盞立於主人之左主人左執盞右執注斟酒授執事者置靈座前主人進詣靈座前執事者取酒盞授主人主人跪酬執事者受盞俯伏興少退立祝執辭出主人之右西向跪讀祝興主人哭再拜退復位哭止主婦亞獻親戚一人或男或女終獻不焚香不讀祝餘皆如初獻之儀畢主人以下皆出祝闔門主人立於門左卑幼丈夫在其後皆西向主婦立於門右卑幼婦人在其後皆東向尊長休於他所如食間祝告啓門三乃啓門主人以下皆入就位祝西向告利成斂祠版韜藉匣之置靈座主人以下皆哭應拜者再拜盡哀止出就次執事者徹饌祝取魂帛帥執事者埋於屏處潔地遇柔日再虞遇剛日三虞朱子家禮虞祭主人以下皆沐浴執事者陳器具饌祝出神主於座主人以下皆入哭降神祝進饌初獻亞獻終獻侑食主人以下皆出祝闔門祝啓門主人以下入哭辭神祝埋魂帛罷朝夕奠遇柔日再虞遇剛日三虞明成祖永樂二十二年文皇帝喪禮葬日初虞柔日再虞剛日三虞後間日一虞至九虞止在途皇太子行禮還京皇帝親行禮按隆慶初自初虞至七虞在途八虞在城外俱護喪官行禮九虞還京皇帝親行禮虞祭內侍陳醴饌拜位於几筵前如常祭儀內導引官導皇帝衰服詣拜位皇太子親王以下衰服各就拜位行四拜禮初獻奠帛獻酒讀祝亞獻終獻贊四拜舉哀興哀止望瘞至於品官葬禮柩既入壙掌事者先歸修虞事或墓逺則但不出是日可也喪主以下既沐浴執事者陳器具僎設