九月二十二日遷坐於沙臺櫕宫十月七日祔神主太宗室三年十月十五日帝詣櫕宫致奠李安易上言曰禮云既虞作主虞者已葬設祭吉也明未葬則未立虞主及神主所以周制但鑿木為懸重以主神靈皇后七月而葬則埋懸重掩元堂凶仗輼輬車龍輴之屬焚於柏城訖始可立虞主吉仗還京備九祭復埋虞主然後立神主升廟堂自曠古至皇朝上奉祖宗陵廟俱行此禮何以今日乃違典章茍且升祔方權櫕妄立神主未大葬輒埋懸重且棺柩未歸園陵則神靈豈入太廟奈柏城未焚凶仗則凶穢唐突祖宗望約孝章近例但於壬地權櫕未立神主升祔凶儀一切祇奉俟丙午年靈駕西去園陵東回祔廟如此則免於顛倒乃詔有司再加詳定判禮院孫何等上言案晉書羊太后崩廢一時之祀天地明堂去樂不作又案禮皇后崩五祀之祭不行既殯而祭所言五祀不行則天地之祭不廢遂議以園陵年月不便須至變禮從冝又緣先準禮文候神主升祔畢方行享祀若俟丙午歲則三年不祭宗廟禮文有闕况明德皇太后德配先朝禮合升祔遂與史館檢討同共參詳以為廟未祔則神靈不至伏恐祭祀難行櫕既畢則梓宫在郊可以葬禮比祔遂案禮云葬者藏也欲人不得而見也既不欲穿壙動土則龍輴攢木題湊蒙槨上四柱如屋以覆盡塗之所合埋重一依近例便可升祔神主安易妄言以凶仗言凶穢目羣官為顛倒指梓宫為棺柩令有司分析園陵凂瀆聖聽誣罔臣下安易又云昔日覩羣官盡公奉二帝諸后並先山陵後祔廟今日覩羣官顛倒奉明德皇太后獨先祔廟後園陵者今詳當時先山陵後祔廟蓋為年月便順别無隂陽拘忌今則年月未便理合從冝未埋重則禮文不備未升祔則廟祭猶闕須從變禮以合聖情兼明德皇太后將赴權櫕而安易所稱柏城未焚凶仗則凶穢唐哭祖宗案檀弓云喪之朝也順死者之孝心也鄭康成注云謂遷柩於廟又云其哀離其室也故至於祖考之廟而後行商朝而殯於祖周朝而遂葬今亦遙辭宗廟而後行豈可以禮經所出目為顛倒吉凶具儀謂之唐突哉又云孝章皇后至道元年崩亦緣有所嫌避未赴園陵出京權櫕之時不立神主入廟直至至道三年西去園陵禮畢然後奉虞主還京易神主祔廟以合典禮今詳當時文籍緣孝章為太宗嫂氏上仙之時止輟五日視朝百官不曽成服與今不同初亦無詔命令住廟享今明德皇太后母儀天下主上孝極曾顔况上仙之初即有遺命權停享祀今案禮文固合如此安易荒唐庸昧妄有援引以大功之親比三年之制欺罔乃至於此本院所議並明稱典故旁考時冝雖曰從權粗亦稽古請依元議施行從之案權攢未葬不冝茍且祔廟安易之言正合古禮而孫何等乃重駁之謬矣司馬光書儀卒哭之來日祔於曾祖考曽祖考曽祖妣皆以主人言之內外夙興掌事者具饌三分雜記曰男子祔於王父則配女子祔於王母則不配注謂若祭王母則不祭王父也有事於尊者可以及卑有事於卑不敢援尊祭饌如一祝辭異不言以某妃配某氏耳如時祭設曽祖考妣坐於影堂南向影堂窄則設座於他所妣則但設祖妣座設死者坐於其東南西向各有椅桌設盥盆帨巾於西階下設承版桌子於西方火爐湯瓶火筯在其東其日夙興設玄酒酒瓶盞注桌子於東方設香桌於中央置香爐注香於其上質明主人以下各服其服哭於靈座前奉曽祖考妣祠版匣置承祠版桌子上出祠版置於座藉以褥次詣靈座奉祠版匣詣影堂主人以下哭從如從柩之序至影堂前止哭祝奉祠版置於座藉以褥主人及諸子倚杖於階下與有服之親尊長卑幼皆立於庭曾祖考妣在焉故尊長不敢坐以服輕重為列丈夫處左西上婦人處右東上左右皆據曽祖考妣言之各以昭穆長幼為序皆北向婢妾在婦人之後位定俱再拜參曽祖考妣其進饌先詣曽祖考妣前設之次詣亡者前設之主人先詣曾祖考妣前北向跪酬酒俯伏興少退立祝奉辭出主人之左東向跪讀曰維某年月日孝曽孫某敢以柔毛嘉薦普淖明齊溲酒適於曽祖考某官不言以某封某氏配若妣祔於祖妣則云適於祖姑某封氏隮祔孫某官妣云隮祔孫婦某封某氏尚饗祝興主人再拜不哭次詣亡者前東向跪酬酒俯伏興少退立祝讀曰維年月日孝子某敢用柔毛嘉薦普淖明齊溲酒哀薦祔事於先考某官妣云先妣某封適祖考某官尚饗祝興降位主人再拜不哭降復位主婦亞獻親賔終獻皆如主人儀祝闔門主人以下出侍立於門左右不哭如食間祝告啓門三及啓門主人以下各就位祝東向告利成主人以下不哭皆再拜辭神祝先納曾祖考妣祠版於匣奉置故處次納亡者祠版於匣奉之還靈座主人以下哭從如來儀金制凡升祔神主用栗具依唐制諸侯用一尺刻諡於背元英宗即位將升祔仁宗皇帝并增置廟室太常禮儀院下博士檢討厯代典故移書禮部中書集議曰古者天子祭七代兄弟同為一代廟室皆有神主增置廟室又議大行皇帝升祔太廟七室皆有神主增室不及依前代典故權於廟內止設幄座南面安奉今相視得第七室近南對室地位東西一丈五尺除設幄座外餘五尺不妨行禮乃結綵為殿置武宗室內權奉神主明文皇帝崩祔饗用卒哭之明日太常寺設醴饌於太廟如時饗儀樂設而不作設儀衛繖扇於午門外內侍進御輦於几筵殿前皇帝衰服四拜舉哀興哀止立於拜位之東西向內侍奉請神主降座升輦詣太廟祔饗至思善門外皇帝易祭服升輅隨至午門外詣御輦前跪太常卿奏請神主降輦皇帝俯伏興捧主由左門入至丹陛上典儀唱太宗文皇帝謁廟至廟前內侍捧主至褥位皇帝於後行八拜禮每廟俱同內侍捧主北向太常卿立壇東西向唱賜坐皇帝搢圭奉神主安於座詣拜位行祭禮如時饗儀太常卿奏請神主還几筵品官祔祭之禮卒哭明日而祔卒哭之祭既徹即陳器具饌於祠堂堂狹即於聽事隨便設亡者祖考妣位於中南向西上設亡者位於其東南西向母喪則不設祖考位置酒瓶玄酒瓶於阼階上火爐湯瓶於西階上具饌如卒哭而三分母喪則兩分祖妣二人以上則以親者厥明設蔬果酒饌質明喪主兄弟皆倚杖於階下入詣靈座前哭盡哀止乃詣祠堂祝軸簾啓櫝奉所祔祖考之主置於座南執事者奉祖妣之主置於座西上喪主以下還詣靈座所哭祝奉主櫝詣祠堂西階上桌子上喪主以下哭從如從柩之次至門止哭祝啓櫝乃出主乃降神祝進饌酌獻先詣祖考妣前祝版云孝孫某謹以潔牲庶羞粢盛醴齊適於某考某官府君隮祔孫某官尚饗皆不哭內喪則云某妣某封某氏隮祔孫婦某封某氏次詣亡者位前祝版云薦祔事於先考某官府君適於某考某官府君尚饗二獻侑食闔門啓門辭神並同卒哭儀禮畢祝奉主各還故處先納祖考妣神主龕中匣之次納亡者神主西階桌子匣之奉而還於靈座出門喪主以下哭從如來儀庶人禮卒哭之明日乃祔其日夙興執事者具器陳饌喪主以下入哭於靈座前乃詣祠堂奉所祔祖考之主置於座內執事者奉祖妣之主置於座還詣靈座所哭祝奉新主以行喪主以下哭從如從柩之次至祠堂門止哭祝出主置於座喪主以下各就位贊者曰再拜在位皆再拜掌饌者以饌升各陳於座前設訖降出贊者引喪主盥手酌酒先詣祖考妣位前祝辭云孝孫某謹以清酌庶品適於某祖之靈隮祔孫某人之靈內喪則云適於某祖妣某人隮祔孫婦某人某氏次詣亡者位前祝辭云薦祔事於先考之靈適於某考之靈尚饗喪主再拜興降出贊者引喪主詣諸座前各再拜乃復位贊者曰再拜在位者皆再拜祝先納祖考妣神主於龕中匣之次納亡者神主匣之奉之反於靈座喪主以下哭從如來儀小祥變宋明宋制十三日小祥外朝以日易月之制行奠祭禮其日儀鑾司設素幄於几筵殿之東陪位官就位立班皇帝服衰服詣幄即御座簾降太常卿當幄前跪奏請皇帝行祭奠之禮簾捲前導官導皇帝出幄詣殿下褥位向西立奏請再拜舉哭皇帝再拜舉哭在位官皆再拜舉哭前導皇帝升殿詣香案前三上香三奠酒俯伏興讀祝文官跪讀祝文訖奏請哭盡哀皇帝哭盡哀在位官皆哭盡哀奏請再拜皇帝再拜在位官皆再拜前導皇帝降階殿下褥位西向立奏請皇帝再拜在位官皆再拜前導皇帝還幄簾降奏禮畢皇帝改服大祥服理宗初真德秀論小祥不當從吉狀伏覩指揮羣臣候過寧宗皇帝小祥並服純吉等某案本朝列聖相承外庭雖用易月之制而宫中實行三年之服逮至阜陵獨出宸斷易月之外衰服如初朝衣朝冠皆以大布惜時臣不能并定臣下執喪儀遂使人主衰服三年於上而羣臣易月公除於下逮紹熙甲寅阜陵上賔羅點等建議乞令羣臣於易月之後不釋衰服朝會治事權用公服黑帶每遇七日及朔望時節朝臨奉慰應於喪禮皆以衰服行事山陵之後期與再期則又服衰服大祥而後除至於燕服亦去紅紫之飾詔從之托胄弄權一切反慶元初制故光宗之喪羣臣復以小祥純吉揆之禮意參之人情有未安者二焉皇帝以躬執三年之喪在宫則苴麻臨朝則淺黃之服黑犀之帶而羣臣遽以無所不佩豈君服斯服之義乎此其未安者一也八月三日實維小祥越七日而遂純吉追念去年是時先皇帝負扆朝羣臣今音容若存仙遊已邈臣子雖號慟泣血未足以泄其哀乃遽即純吉之服忘憂戚之容揆之人情必所不忍此其未安者二也欲望朝廷更下有司考求紹興甲寅已定之例斟酌而行之其八月十日百官純吉指揮望姑賜寢庶幾稍合禮意足以貽示方來司馬光書儀云既練男子去首絰負版辟領衰故朱子家禮據書儀云小祥去首絰負版辟領衰但禮記既練男子除首絰婦人除要𢃄家禮於婦人成服時並無婦人絰帶之文此為踈略故既練亦不言婦人除帶當以禮經為正明品官禮期而小祥喪至此凡十三月不計閠古卜日而祭今止用初忌以從簡易前期一日喪主以下沐浴灑掃滌濯主婦帥衆婦女滌釡鼎具祭饌如卒哭設次陳練服厥明夙興設蔬果酒饌質明祝出主喪主倚杖於門外與期親各服其服而入皆哭盡哀止乃出就次易服復入哭祝止哭乃降神初獻亞獻終獻侑食闔門啓門辭神並同卒哭之儀祝版云日月不居奄及小祥夙興夜處小心畏懼不惰其身哀慕不寧敢用潔牲庶羞粢盛醴齊薦此常事尚享自是止朝夕哭始食菜果庶人禮小祥前期一日喪主及諸子皆沐浴具饌陳器設次陳練服於其所其日夙興祝入整拂几筵以出內外衰服喪主以下倚杖於階東俱出就位哭盡哀贊者引喪主杖就次主婦以下各就次乃陳練服贊者引喪主倚杖如初乃升內外俱升就位哭贊者引喪主盥手奠酒祝進立於靈座右內外止哭祝讀祝文曰維年月朔日辰孤子某敢告於考某人之靈嵗月驚迫奄及小祥攀慕永逺重增荼裂謹以清酌庶羞祇薦常事尚享祝興喪主哭再拜退復位內外哭盡哀喪主以下出杖降自西階就次妻妾女子子還别室自小祥之後止朝夕哭大祥變宋明宋制二十五日大祥外朝以日易月之制行奠祭禮如前祭儀是日皇帝改服禫服髙宗紹興九年正月二十五日徽宗大祥髙宗服白羅袍至禫祭祥服日服素紗軟腳幞頭淺色黃羅袍黑銀帶及紹興三十一年八月太常寺檢會故事言大祥日服素紗軟腳幞頭白羅黑銀𢃄孝宗淳熙十四年十月十一日太常寺檢照大祥日服素紗軟腳折上巾淡黃袍黑銀帶上批淡黃袍改服白袍自後每御延和殿並服大祥之服又不用皂幞頭其折上巾白袍並以布為之宫中則布衫過宫則衰絰而杖明品官禮再期而大祥喪至此凡二十五月亦止用第二忌日祭前期一日沐浴陳器具饌如小祥設次陳禫服以酒果告遷於祠堂告畢改題神主遞遷而西虛東一龕以候新者厥明行事皆如小祥之儀祝版改小祥曰大祥常事曰祥事祝畢奉神主入於祠堂喪主以下哭從如祔之敘至祠堂止哭執事者徹靈座斷杖棄之屏處奉遷主埋於墓側始飲酒食肉而復寢庶人禮大祥前期一日喪主及諸子俱沐浴具饌陳器陳禫服於次乃告遷於祠堂告畢改題神主而遞遷之虛東一龕以俟厥明祝先入拂几筵降出內外於次哭盡哀掌事者設饌於靈座前內外俱就位哭贊者引喪主盥手奠酒祝立於靈座右跪讀祝文曰維年月朔日辰孤子某敢告於考某人之靈日月逾邁奄及大祥攀慕永逺無任荒踣謹以清酌庶羞祇薦祥事尚享祝興喪主哭再拜退復位內外哭盡哀祝奉神主入於祠堂喪主以下哭送掌事者徹靈座斷杖棄之屏處始飲酒食肉而復寢禫變宋明宋制二十七日禫用以日易月之制奠祭是日皇帝釋禫服政和禮品官喪儀禫前一日之夕掌事者先備內外禫服各陳於别所主人及諸子俱沐浴具饌如初其日夙興祝入設几筵於奧主人及諸子妻妾女子子仍祥服內外俱升就位哭盡哀降釋服服禫服復升就位哭設饌如初贊者引主人盥手奠酒如初祝進立於靈座右止哭祝跪讀祝文曰維某年月朔日辰孤子某敢昭告於考某官封諡案庶人禮作敢昭告於考某人之靈尚饗餘如大祥之儀明品官禮大祥之後間一月禫禫者淡淡然平安之意蓋喪至此計二十有七月前一月下旬卜來月三旬中各一日或丁或亥設桌子於祠堂門外置香爐香合㺽珓於其上喪主禫服西向衆兄弟次之子孫在其後重行北上執事者北向東上喪主炷香薰珓命以上旬之日曰某將以來月某日祇薦禫事於先考某官府君即以珓擲於盤以一俯一仰為吉不吉更命中旬之日又不吉則直用下旬之日案司馬光書儀大祥後間一月月中隨便擇一日不用卜喪主乃入祠堂本龕前再拜在位者皆再拜喪主焚香祝執版立於喪主之左跪告曰孝子某將以來月某日祇薦禫事於先考某官府君案庶人禮作敢昭告於考某人之靈卜既得吉敢告喪主再拜降興在位者皆再拜祝闔門退乃前期一日沐浴設神位於靈座故處陳器具饌厥明行事皆如大祥之儀五服成服及變除附宋宋司馬光書儀衰裳之制斬衰用極粗生布為之不緝衣縫向外裳縫向內裳前三幅後四幅每幅作三㡇皆屈兩邉相著空其中負版方一尺八寸此尺寸皆用周尺在背上綴於領下垂放之辟領方四寸置於負版兩旁各攙負版一寸亦綴於領下衰長六寸廣四寸綴於前襟當心衣長過腰足以掩裳上際衽用布三尺五寸留上一尺正方不破旁入六寸乃向下邪裁之一尺五寸去下畔亦六寸橫斷之留下一尺正方以兩正方左右相沓綴於衣兩旁垂之向下狀如燕尾掩裳旁際案朱子家禮同齊衰以布稍粗者為寬袖襴衫大功小功緦麻皆用生白絹為襴衫凡緝者皆向外撚之小祥則除負版及衰大祥後服皂布衫黃幹曰喪服婦人自斬至緦成服皆布總其布之升數象男子冠數始死將斬衰婦人去筓至男子括髮著麻髽之時猶不筓今成服始用箭筓案箭篠竹也以箭篠為筓也箭筓長尺婦人箭筓終喪婦人有除無變也案喪服之制有變有除變者不遽除除者不更變故變有受而除無受五服衰裳制度五代宋後唐始以五服制度著為令宋楊復曰喪服制度惟辟領一節沿襲差誤自通典始案喪服記云衣二尺有二寸蓋指衣身自領至要之長而言之也用布八尺八寸中斷以分左右為四尺四寸者二又取四尺二寸四中摺以分前後為二尺二寸者四此即尋常度衣身之常法也合二尺二寸者四疊為四重從一角當領處四寸下取方裁入四寸乃記所謂適博四寸注疏所謂辟領四寸是也案鄭注云適辟領也則兩物即一物也今記曰適注疏又曰辟領何為而異其名也辟猶開也從一角當領處取方裁開方四寸故曰辟領以此辟領四寸反摺向外加兩肩上以為左右適故曰適乃疏所謂兩相向外各四寸是也辟領四寸既反摺向外加兩肩上以為左右適故後之左右各有四寸虛處當脊而相並謂之闊中前之左右各有四寸虛處當脊而相對亦謂之闊中乃疏所謂闊中八寸是也此則衣身所用布之處與裁之之法也注又云加辟領八寸而又倍之者謂别用布一尺六寸橫闊八寸又縱摺而中分之其下一半裁斷左右兩端各四寸除去不用只留中間八寸以加後之闊中元裁辟領各四寸處而塞其闕當脊相並處此所謂加辟領八寸是也其上一半全一尺六寸不裁以布之中間從項上分左右對摺向前垂下以加於前之闊中與元裁斷處當肩相對處相接以為左右領也夫下一半加於後之闊中者用布八寸而上一半從項而下以加前之闊中者又倍之而為一尺六寸此所謂又倍之者也此則衣領所用之布與裁之之法也古者衣服吉凶異制故衰服領與吉服領不同而其制如此也注又云凡用布一丈四寸者周身八尺八寸衣領一尺六寸合為一丈四寸也此是用布正數又當少寬其布以為針縫之用然此即衣身與衣領之數若負衰帶下及兩衽又在此數之外矣但領必有夾此布何從出乎曰衣領用布闊八寸而長一尺六寸古者布幅闊二尺二寸除衣領用布闊八寸之外更餘闊一尺四寸長一尺六寸可以分作三條施於夾而適足無餘欠也通典以辟領為適本用注疏又自謂喪服記文難曉而用臆説以參之既别用布以為辟領又不言制領所用何布又不計衣身衣領用布之數失之矣但知衣身八尺八寸之外又别用布一尺六寸以為凡用布共一丈四寸則文儀不待辨而自明矣又曰儀禮婦人不殊裳衰如男子衰案斬疏繐大功小功緦裼皆曰衰喪正服也下如深衣無𢃄又無衽夫衰如男子未知備負版辟領之制與否下如深衣未知裳用十二幅與否此雖無文可明但衣身必二尺二寸袂必屬幅裳必上屬於衣裳旁兩幅必相聨屬此所以衣不用帶下尺裳旁不用衽也今考家禮則不用此制婦人用大袖長裙蓋頭男子衰服純用古制而婦人不用古制此則未詳五服制度考宋宋司馬光曰古者既葬練祥禫皆可受服變而從輕今世俗無受服自成服至大祥其衰無變故於既葬别為家居之服是亦受服之意也朱子曰溫公儀凶禮斬衰用古制而功緦又不用古制古者五服皆用麻但布有差等皆有冠絰但功緦之絰小耳今定家禮斬衰衣裳用極粗生布齊衰用次等粗生布杖期又用次等生布不杖期及齊衰三月又用次等生布大功用稍粗熟布小功用稍熟細布緦麻用極熟細布黃幹曰案練再受服經傳雖無明文謂既練而服功衰則記禮者屢言之服問曰三年之喪既練矣期之喪既葬矣則服其功衰雜記曰三年之喪雖功衰不弔又曰有父母之喪尚功衰而祔兄弟之殤則練冠是也案大功之布有三等七升八升九升而降服七升為最重斬衰既練而服功衰是受以大功七升布為衰裳也故喪服斬章賈氏疏云斬衰初服粗至葬後大祥後漸細加飾斬衰裳三升冠六升既葬後以其冠為受衰裳六升冠七升小祥又以其冠為受衰裳七升冠八升女子子嫁反在父之室疏云至小祥受衰七升總八升又案間傳小祥練冠孔氏疏云至小祥以卒哭後冠受其衰而以練易其冠而橫渠張子之説又曰練衣必煆煉大功之布以為衣故言功衰功衰上之衣也以其著衰於上故通謂之功衰必著受服之上稱受者以此得名受蓋以受始喪斬疏之衰而著之變服其意以喪久變輕不欲摧割之心亟忘於內也據橫渠此説謂受以大功之衰則與傳記注疏之説同謂煆鍊大功之布以為上之衣則非特練中衣亦練功衰也又取成服之初衰長六寸博四寸縫於當心者著之於功衰之上是功衰雖漸輕而長六寸博四寸之衰猶在不欲哀心之遽忘也此説則與先儒異今並存之欽定續通典卷七十九
