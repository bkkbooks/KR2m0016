body:
  text: 州郡宋京畿路路京東路京西路河北路河東宋初有州百一十一縣六百三十八按輿地考云宋太祖受周禪凡州府軍監一百三十九縣六百六卜一與宋史異謹附識太祖建隆四年取荆南得州府三江陵府歸峽縣一十七平湖南得州一十五監一潭衡邵郴道永全岳朗奬辰錦溪敘桂陽監縣六十六乾徳三年平蜀得州府四十六益彭眉嘉卭蜀綿漢資簡梓遂黎雅陵戎瀘維茂昌榮果閬渠合龍普利興文巴劍蓬壁夔忠萬集開渝涪黔施達洋興元府縣一百九十八按輿地考作縣二百四十與宋史異謹附識開寶四年平廣南得州六十廣韶潮循封端英連雄恭恵康恩春瀧勤新高潘雷羅辨桂賀昭梧蒙龔象富融宜栁嚴思唐邕澄貴巒横賔欽潯容牢白亷黨繡鬱林藤竇義禺順瓊崖儋萬安振縣二百一十四八年平江南得州一十九軍三昇宣歙池洪潤常鄂筠饒信虔吉袁撫江汀建劍江隂雄逺建昌縣一百八太宗太平興國三年陳洪進獻地得州二漳泉縣十四錢俶入朝得州十三軍一杭蘇越湖衢婺台明温秀睦福處衣錦縣八十六四年平太原得州十軍一幷汾嵐憲忻代遼沁降石寳興縣四十按輿地考作縣四十一與宋史異謹附識七年按宋史本紀李繼捧獻地係太平興國七年事志作五年誤謹改正李繼捧來朝得州四夏銀綏宥雍熙元年復以四州授繼捧自後不復領職方按陜西路有綏徳軍即綏州熙寧三年收復𨽻延州元符二年改為軍又有銀州銀川城俱詳見史志是綏州銀州復領職方所不領者夏州宥州耳註未晰載謹附識縣入是時天下既一未入職方氏者惟燕雲十六州至道三年分天下為十五路仁宗天聖析為十八神宗元豐又析為二十三曰京東東西曰京西南北曰河北東西曰永興曰秦鳳曰河東曰淮南東西曰兩浙曰江南東西曰荆湖南北曰成都梓利夔曰福建曰廣南東西徽宗崇寧四年復置京畿路大觀元年别置黔南路三年幷黔南入廣西以廣西黔南為名四年仍舊為廣南西路宣和四年又置燕山府及雲中府路天下分路二十六大約繇建隆初訖英宗治平末州郡沿革無大增損神宗熙寧以來始務闢土而种諤取綏州韓絳取銀州王韶取熙河章惇取懿洽謝景温取徽誠熊本取南平郭逵取廣源最後李憲取蘭州沈括取葭蘆米脂浮圖安疆等砦迨哲宗元祐後以葭蘆等四砦給賜夏人而分畫久不能定紹聖遂罷分畫督諸路各乘勢攻討進築凡陜西河東建州一安西軍二晉寧綏徳闗三龍平㑹寧金城城九安西平夏威戎興平定邊威羌金湯白豹㑹川砦二十八平羌平戎殄羌暖泉米脂克戎安疆横山綏遠寧羌靈平高平西平新泉盪羌通峽天都臨羌定戎龕谷大和通秦寜河彌川寜遠神泉烏龍砦按註内僅列二十七於數不合疑有脫誤堡十開光通塞石門通㑹大和通泰寧河彌川寧川三交又取青唐鄯邈川湟寧塞廓龍支宗哥等城徽宗建中靖國時悉還吐蕃故壤崇寧中變前議蔡京任童貫王厚更取湟鄯廓三州二十餘壘陶節夫鍾傳邢恕胡宗囘曽孝序之徒又相與鑿空駕虛馳騖於元符封域之表訖於重和復立靖夏涇原制戎鄜延制羌西寧三城蓋自崇寧以來益梓夔黔廣西荆湖南北迭相視效斥大土宇靡有寧嵗凡所建州軍闗城砦堡紛然莫可勝紀厥後建燕山雲中兩路粗閱三嵗禍變旋作職方所紀漫不可考高宗南渡駐蹕吳㑹中原陜右盡入於金東畫長淮西割商秦之半以散闗為界其所存者兩浙兩淮江東西湖南北西蜀福建廣東廣西十五路而已今據宋史元豐所定幷京畿為二十四路首之以京師終之以燕雲而宋之土宇大畧著見矣京畿路仁宗皇祐五年以京東之曹州京西之陳許鄭滑州為輔郡𨽻畿内幷開封府合四十二縣置京畿路至和二年詔京畿毋領輔郡崇寧四年又於京畿四面置四輔郡潁昌府為南輔鄭州為西輔澶州為北輔建拱州於開封襄邑縣為東輔並屬京畿大觀四年罷四輔廢拱州復以襄邑縣𨽻開封府政和四年襄邑縣復置拱州並以潁昌府鄭州開徳府復為東南西北輔宣和二年罷四輔潁昌府鄭州開徳府各還舊𨽻拱州𨽻京東西路舊開封府界依舊為京畿開封府宋因周之舊為都曰東京縣十六開封赤祥符赤東魏浚儀縣宋真宗大中祥符三年改尉氏畿陳留畿雍邱畿封邱畿中牟畿陽武畿延津畿舊酸棗縣政和七年改長垣畿隋匡城縣宋建隆元年改為鶴邱後又改東明畿本東昏鎮乾徳元年置隆按太平寰宇記東明鎮在東昏城之東建四年於本鎮置縣仍以東明為名與宋史異謹附識扶溝畿鄢陵畿考城畿崇寧四年與太康同𨽻拱州大觀四年廢拱州二縣復來𨽻太康畿宣和二年復𨽻拱州六年仍𨽻京畿咸平畿舊通許鎮𨽻陳留真宗咸平五年置縣京東路至道三年以應天兖徐曹青鄆密齊濟沂登萊單濮濰淄淮陽軍廣濟軍清平軍宣化軍萊蕪監利國監為京東路熙寧七年分為東西兩路以青淄濰萊登密沂徐州淮陽軍為東路鄆兖齊濮曹濟單州南京為西路元豐元年割京西路齊州屬東路割東路徐州屬西路元祐元年京東東路京東西路並為京東路京西南路京西北路並為京西路其後仍分為兩路東路府一州七軍一縣三十八青州望北海郡按輿地廣記北海郡政和元年改識為齊郡宋史不載疑係脫畧謹附鎮海軍節度建隆三年以北海縣置軍太宗淳化五年改軍名仁宗慶厯三年初置京東東路安撫使縣六益都望夀光望臨朐望博興上千乘上臨淄上密州上高密郡按宋史闕郡名今據王存元豐九域志増入防禦開寶五年升為安化軍後降防禦六年復為節度縣五諸城望安邱望唐輔唐縣梁改安邱縣晉改膠西縣宋開寶四年復今名莒望高密上膠西元祐三年以板橋鎮為膠西縣兼臨海軍使註按膠西縣宋史註望𦂳等字謹仍其舊後凡闕者倣此濟南府上濟南郡興徳軍節度按李攸宋朝事實治平二年升為興徳軍節度宋史脫去升建年分謹附識本齊州按齊州宋史誤作濟州考濟州自屬西路此當作齊州今據輿地廣記元豐九域志諸書改正先屬京東路咸平四年廢臨濟縣元豐元年割屬京東東路政和六年升為府縣五厯城𦂳禹城𦂳章邱中真宗景徳三年以章邱縣置清平軍熙寧二年廢軍即縣沼置軍使按宋朝事實咸平四年省臨濟縣入章邱宋史不載謹附識長清中至道二年徙城于刺榆臨邑中建隆元年河決公乘渡口壤城三年移治孫耿鎮政和元年升為望沂州上琅琊郡防禦縣五臨沂望承望沂水望費望新泰中登州上東牟郡防禦縣四蓬萊望文登中黄望牟平𦂳有乳山閻家口二砦萊州中東萊郡防禦縣四掖望萊陽望膠水望即墨中濰州上團練建隆三年以青州北海縣建為北海軍乾徳二年升為州按輿地廣記政和元年曰北海郡宋史未詳謹附識縣三北海望昌邑望本隋都昌縣後廢宋建隆三年置與按宋朝事實建隆三年析北海縣地置昌邑縣宋史異謹附識昌樂𦂳本唐營邱縣後廢宋乾徳中復置安仁縣後又改淄州上淄州郡軍事縣四淄川望長山中鄒平中下景徳元年移治濟陽廢縣高苑下景徳三年以縣置宣化軍熙寧三年廢軍為縣𨽻州即縣治置軍使淮陽軍同下州太平興國七年以徐州下邳縣建為軍幷以宿遷縣來屬縣二下邳望宿遷中西路府四州五軍一縣四十三應天府河南郡歸徳軍節度本唐宋州宋至道中為京東路景徳三年升為應天府大中祥符七年建為南京熙寧五年分屬西路按宋志京東路稱熙寧七年分鄆兖齊濮曹濟單州南京為西路此云大中祥符七年建為南京熙寧五年分屬西路前作熙寧七年此作五年彼此互異謹附識縣六寧陵畿與楚邱同𨽻拱州大觀四年復來𨽻政和四年又撥𨽻拱州宣和六年復來𨽻宋城赤榖熟畿下邑畿楚邱畿虞城畿襲慶府魯郡泰寧軍節度按輿地廣記唐泰寧軍周降為防禦宋建隆元年復泰寧軍宋史未詳謹附識本兖州大中祥符元年升為大都督政和入年升為府縣七瑕上大觀四年以瑕邱縣為瑕縣奉符上本漢乾封縣宋開寶五年移治岱岳鎮大中祥符元年改封按漢乾封縣據輿地廣記當云漢博縣唐高宗乾元年更名乾封縣泗水上龔上大觀四年以龔邱縣為龔縣仙源中魏曲阜縣宋大中祥符五年改按方輿紀要云漢置魯縣晉為魯郡治宋及後魏因之隋文帝開皇三年改縣日汶陽十六年又改曰曲阜則是曲阜之名隋始有之注云魏曲阜縣魏字疑誤謹附識萊蕪中鄒下煕寧五年省為鎮入仙源元豐七年復監一萊蕪主鐵冶徐州大都督彭城郡武寧軍節度本屬京東路元豐元年割屬京東西路縣五彭城望沛望蕭望滕𦂳豐𦂳監二寶豐元豐六年置鑄銅錢八年廢利國主鐵冶興仁府輔濟隂郡彰信軍節度本曹州建中靖國元年改賜軍額曰興仁崇寧元年升為府大觀二年以拱州為東輔升督府政和元年罷督府復為輔郡縣四濟隂望宛亭望元祐元年改寃句縣為宛亭史按輿地廣記大觀二年改為宛亭縣與宋異謹附識乘氏緊南華上東平府東平郡天平軍節度本鄆州慶厯三年初置京東西路安撫使大觀元年升大都督府政和四年移安撫使於應天府宣和元年改為東平府縣六須城望陽榖望景徳三年徙孟店中都緊夀張上東阿緊平隂上監一東平宣和三年置政和三年罷濟州上濟陽郡防禦縣四鉅野望任城望金鄉望鄆城望單州上碭郡建隆元年升為團練縣四單父望碭山望成武𦂳魚臺上濮州上濮陽郡團練縣四鄄城望雷澤𦂳臨濮上范上拱州保慶軍節度本開封府襄邑縣崇寧四年建為州賜軍額為東輔以開封之考城太康南京之寧陵楚邱柘城來𨽻大觀四年廢拱州復為襄邑縣還隷開封政和四年復為州又復為輔郡宣和二年罷輔郡仍𨽻京東西路以襄邑太康寧陵為屬縣六年又以寧陵歸南京太康歸開封復割柘城來屬縣二襄邑按此似亦畿縣史失注柘城畿廣濟軍本漢定陶縣唐為鎮𨽻曹州按本漢定陶縣以下據輿地考増入宋太平興國二年建為軍四年割曹澶濮濟四州地復置縣𨽻焉熙寜四年廢軍以縣𨽻曹州元祐元年復為軍縣一定陶上京西路舊分南北兩路後併為一路熙寜五年復分南北兩路南路府一州十軍一縣三十一襄陽府望襄陽郡山南東道節度本襄州宣和元年升為府縣五襄陽𦂳鄧城望榖城𦂳宜城中下中廬中下隋義清縣宋太平興國元年改紹輿五年省入南漳鄧州望南陽郡武勝軍節度舊為上郡政和二年升為望郡建隆初廢臨瀬縣按宋朝事實建隆初廢臨瀨縣入穰縣宋史未詳謹附識縣五穰上南陽中下䖍厯四年廢方城縣為鎮入焉元豐元年改為縣𨽻唐州内鄉中下淅川中下㨿按淅川縣宋史失載今輿地廣記増入順陽中下太平興國六年升順陽鎮為縣隨州上漢東郡崇信軍節度乾徳五年升為崇義軍節度太平興國元年改今名縣三隨上熙寧元年廢光化縣為鎮入焉唐城中下棗陽中下金州上安康郡乾徳五年改昭化軍節度按宋朝事實改節度下有復為防禦四字謹附識縣五西城下洵陽中乾徳四年廢渚陽縣入焉按渚陽當作淯陽漢隂中石泉下平利下熈寧六年省為鎮入西城元祐復房州下房陵郡保康軍節度開寶中廢上庸永清二縣按元豐九域志廢上庸永清二縣併歸竹山宋史未詳謹附載雍熈三年升為軍縣二房陵上竹山下均州上武當郡武當軍節度本防禦乾徳六年移入上州防禦宣和元年賜軍額縣二武當上鄖鄉上廣按輿地記乾徳六年廢豐利縣入鄖鄉宋史不載謹附識郢州上富水郡防禦縣二長壽上京山下唐州上淮安郡建隆元年升為團練開寶五年廢平氏縣縣五泌陽中下湖陽中下有銀埸比陽中下桐栢下方城