body:
  text: 禮吉郊天明明太祖洪武元年始建圜丘定郊社宗廟禮嵗必親祀先是中書省臣李善長等奉敕撰進郊祀議略言王者事天明事地察故冬至報天夏至報地所以順隂陽之義也祭天于南郊之圜丘祭地于北郊之方澤所以順隂陽之位也自秦立四畤以祀白青黃赤四帝漢髙祖復增北畤兼祀黑帝至武帝有雍五畤及渭陽五帝甘泉太乙之祀而昊天上帝之祭則未嘗舉行魏晉以後宗鄭元者以為天有六名嵗凡九祭宗王肅者以為天體唯一安得有六一嵗二祭安得有九雖因革不同大扺多參二家之説元始間王莽奏罷甘泉泰畤復長安南北郊以正月上辛若丁天子親合祀天地于南郊由漢歷唐千餘年間皆因之合祭宋元豐中議罷合祭紹聖政和間或分或合髙宗南渡以後唯用合祭之禮元成宗始合祭天地五方帝已而立南郊専祀天泰定中又合祭文宗至順以後唯祀昊天上帝今當遵古制分祭天地于南北郊冬至祀昊天上帝于圜丘以大明夜明星辰太嵗從祀太祖從其議建圜丘于鍾山之陽壇二成上成廣七丈髙八尺一寸四出陛各九級正南廣九尺五寸東西北廣八尺一寸下成周圍墻面縱橫皆廣五丈髙視上成陛皆九級正南廣一丈二尺五寸東西北殺五寸五分甃甎欄楯皆以琉璃為之壝去壇十五丈髙八尺一寸四面靈星門南三門東西北各一外垣去壝十五丈門制同神庫五楹在外垣北南向厨房五楹在外壇東北西向庫房五楹南向宰牲房三楹天池一又在外庫房之北執事齋舍在壇外垣之東南坊二在外門外橫甬道之東西燎壇在內壝外東南丙地髙九尺廣七尺開上南出戶神位正壇第一成昊天上帝南向第二成東大明星辰次之西夜明太嵗次之神版長二尺五寸以栗木為之祝版依唐制長一尺一分廣八寸厚二分用楸梓木為之時議郊車上曰以玉飾車考之古禮唯祀天用之若常乘之車只宜用孔子所謂殷輅然祀天之際玉輅或未備木輅亦未為不可參政張昶對曰木輅戎輅也不可以祀天上曰孔子斟酌四代禮樂實為萬世之法乘木輅何損于祭祀况祀事在誠敬不在儀文也是年始有事于郊丘有司議配祀太祖謙讓不許二年八月禮部尚書崔亮奏宋祥符九年議南郊壇祀天或值雨雪則就太尉齋所望祭元經世大典載社稷壇壝外垣之內北垣之下亦嘗建屋七間南望二壇以備風雨曰望祀堂即望祭殿也請依此制上從之是年翰林學士朱升等奉敕撰齋戒文大祀七日前四日戒後三日齋上曰凡祭祀天地社稷宗廟山川等神為天下祈福宜下令百官齋戒若自有所禱不關民事者不下令又以致齋七日五日為期太久人心易怠止臨祭齋戒三日務致精専又從禮部尚書崔亮奏大祀前七日陪祀官詣中書省受誓戒各揚其職不共其事國有常刑十一月祀上帝于圜丘以皇考仁祖淳皇帝配時崔亮言禮運曰禮行于郊則百神受職今宜增天下神祇壇于圜丘之東方澤之西又言郊特牲器用陶匏周禮疏外祀用瓦今祭祀用瓷與古意合而盤盂之屬與古尚異宜皆易以瓷惟籩用竹從之亮又奏考古省牲之儀逺神壇二百步從之時仁祖已配南北郊而郊祀禮成後復詣太廟恭謝亮言宜罷惟先祭三日詣太廟以配享告詔可帝欲增郊壇從祀之神亮執奏漢唐煩瀆不宜取法乃止帝問郊祀天地拜位正中而百官朝參則班列東西何故對曰天子祭天升自午陛北向答陽之義也祭社升自子陛南向答隂之義也若羣臣朝參當避君上之尊故升降皆由邜陛朝班分列東西以避馳道其郊祀儀物神位配帝位板並黃質金字從祀風雲雷雨並赤質金字其神席上帝用龍椅龍案上施錦座褥配位同從祀位置于案不設席其祭器上帝籩豆各十二簠簋各二登一爵三壇上太尊二著尊一犧尊一山罍一皆有勺有幂壇下太尊一山罍二有幂配帝位同從祀籩豆各十簠簋各二登一東西各設著尊二犧尊二其禮神之玉用蒼璧幣正配位以蒼大明以紅夜明星辰太嵗皆以白牲上帝及配帝各蒼犢一大明夜明星辰太嵗各純色犢一酒齊正配位大尊實泛齊醴齊著尊實盎齊犧尊實醍齊山罍實昔酒在壇上太尊實沈齊山罍實事酒清酒在壇下從祀著尊實醴齊盎齊犧尊實事酒籩豆之實正配位籩實以形鹽藁魚棗栗榛菱芡鹿脯黑餅白餅糗餌粉粢豆實以韭葅醓醢菁葅鹿醢芹葅兔醢筍葅魚醢脾析葅豚拍􅓞食糝食從祀籩豆各十籩減糗餌粉粢豆減􅓞食糝食其祭服奉祀侍祠官正從一品七梁冠國公丞相貂蟬二品六梁冠三品五梁冠四品四梁五品三梁六品七品二梁八品九品一梁臺官加獬豸梁數各如其品通服青羅衣其壽革帶則有差笏以象及木其褥位拜褥用緋不用黃道褥版位皇帝方一尺二寸厚三寸紅質青字皇太子位方九寸厚二寸紅質青字陪祀官位並黑字白質三年二月太常少卿陳昧言按周禮天府孟冬祀司民司祿而獻民數榖數則受而藏之蓋民食皆命于天故民數有拜受之禮今圜丘郊祀宜以戶口錢穀之籍陳于臺下禮畢藏于內府以見拜受民數穀數于天之義從之五月建齋宫于圜丘之西前後皆為殿左右各小殿為庖湢之所繚以都垣垣內外為將士宿衛之所外環以渠前為櫺星門為橋三左右及後門各一橋帝以郊祭之牲與羣祀牲同牢芻牧不足以别祀天之敬乃因其舊地改作而加繪飾中三間以養郊祀牲左三間以養后土牲右三間以養太廟社稷牲餘屋以養山川百神之牲凡大祀犧牲前一月帝躬視滌養繼命羣臣更日往視嵗以為常犧牲所建于神樂觀之南又諭禮部尚書陶凱曰人心操舍無常必有所警而後無所放乃命禮部鑄銅人一髙尺有五寸手執牙簡大祀則書致齋三日中祀則書致齋二日太常司進置于齋所是嵗圜丘壇增風雲雷雨從祀四年正月建郊壇于中都先是詔以臨濠府為中都築新城門十有二立圜丘于洪武門外方澤于左甲第門外後皆廢時翰林學士陶安奏古者天子五冕祭天地社稷諸神各有所用請製之上以五冕禮太繁令祭天地宗廟則服衮冕社稷等祀則服通天冠絳紗袍餘不用三月改築圜丘上成面廣四丈五尺髙二尺五寸下成每面廣一丈六尺五寸髙四尺九寸上下二成通徑七丈八尺壇至內壝墻四靣各九丈八尺五寸內壝墻至外壝墻南十三丈九尺四寸北十一丈東西各十一丈七尺是年太常寺引周禮及唐制與祭官擬用武官四品文官五品以上從之後定郊祀六科都給事中皆與陪祀餘祭不與又定凡南北郊先期賜陪祀執事官明衣布樂舞生各給新衣制陪祀官入壇牙牌凡天子親祀則佩以入其制有二圓者與祭官佩之方者執事人佩之俱藏內府遇祭則給無者不得入壇五年命諸司各置木牌刻文其上曰國有常憲神有鑒焉祭祀則設之又從陶凱奏凡親祀皇太子宫中居守親王戎服侍從皇太子親王雖不陪祀一體齋戒六年復定齋戒儀凡祭天地正祭前五日午後沐浴更衣處外室次早百官于奉天門觀誓戒牌次曰告仁祖廟退處齋宫致齋三日七年更定內壝之內東西各三壇星辰二壇分設于東西其次東則太嵗五嶽西則風雲雷雨五鎮內壝之外東西各二壇東四海西四瀆次天下神祇壇東西分設凡大祀前期四日太常卿至天下神祇壇奠告中書丞相詣京師城隍廟發咨次日皇帝詣仁祖廟請配享祭祀日期欽天監選擇太常寺預于十二月朔至奉天殿具奏蓋古卜法不存而擇支干之吉以代卜也又定大祀拜禮始迎神四拜飲福受胙四拜送神四拜共十二拜而畢又以舊儀太常司奏中嚴外辦及盥洗升壇飲福受胙各致贊詞又凡祀俱設爵洗位滌爵拭爵初升壇再拜祭酒唱賜福胙之類俱為煩瀆悉去之又以古人祭用香燭所以導逹隂陽以接神明無上香之禮命凡祭祀罷上香上又謂學士詹同曰大祀終獻方行分獻禮未當同乃與學士宋濓議以上初獻奠玉帛將畢分獻官即行初獻禮亞獻終獻皆如之十年秋命作大祀殿于南郊太祖感齋居隂雨覽京房災異之説謂分祭天地情有未安十一月冬至以殿工未成乃合祀于奉天殿親製祝文意謂人君事天地猶父母不宜異處遂定每嵗合祀于孟春為永制即圜丘舊制而以屋覆之名曰大祀殿凡十二楹中石臺設昊天上帝皇地祇座每嵗正月中旬擇日合祭具冕服行禮殿東西廣三十二楹正南大祀門六楹接以步廊與殿廡通殿後天庫六楹瓦皆黃琉璃厨庫在殿東北宰牲亭井在厨東北皆以步廊通殿兩廡繚以圍墻南石門三洞以逹大祀門謂之內壇外周垣九里三十步石門三洞南為甬道三中神道左御道右黃道道兩傍稍低為從官之道齋宫在外垣內西南東向其後殿瓦易青琉璃敕太常曰古人祀天于南郊蓋以義起耳故曰南郊祀天以其陽生之月北郊祭地以其隂生之月至隂祭之于陽月于理可疑且掃地而祭其來甚逺蓋言祀地尚實而不尚華後世執古而不變遂使天地之享反不如人之享若使人之享亦執古而不變則當汙尊而壞飲茹毛而飲血巢居而穴處也以今言之世果可行乎斯必不然也今命太常每嵗合祭天地于春首正三陽交泰之時人事之始也十二年正月始合祀天地于南郊大祀殿太祖親作大祀文并歌九章命魏國公徐達等分獻從祀諸神祀畢敕中書省臣胡惟庸等曰凡有國者必以祀事為先祀事之禮起于古先聖王其周旋上下進退奠獻莫不有儀然儀必貴誠而人心難測至誠者少不誠者多暫誠者或有之若措禮設儀文飾太過使禮煩人倦而神厭弗享非禮也朕周旋祀禮十有一年見其儀太煩乃以義起更其儀式合祀社稷既祀神乃歡洽今十二年春始合天地大祀而上下胥悅若有肸蠁答于朕心爾中書下翰林令儒臣紀其事以彰上帝神祇之昭格是年建神樂觀于郊壇之西設提點知觀教習樂舞生二十一年三月增修南郊壇位丹墀內疊石為臺四大明壇在東夜明壇在西星辰壇東西各一內壝外石臺凡二十東十壇北嶽北鎮東嶽東鎮東海太嵗帝王山川神祇四瀆西十壇北海西嶽西鎮西海中嶽中鎮風雲雷雨南嶽南鎮南海臺髙三尺有竒周以石欄陟降為磴道臺之上琢石為山形鑿龕以置神位壇後樹以松柏外壝東南鑿池凡二十區冬月藏氷以供夏秋祭祀之用是年定大祀殿祭品祭器正殿昊天上帝南向犢一登一籩十二豆十二簠簋各二玉用蒼璧一帛一蒼色織成郊祀制帛四字皇地祇南向犢一登一籩十二豆十二簠簋各二玉用黃琮一帛一黃色郊祀制帛仁祖配位在東西向犢一登一籩十二豆十二簠簋各二玉用蒼璧一帛一蒼色郊祀制帛共設酒尊六爵九篚三于殿東南西向祝文案一于殿西洪熙以後改奉太祖太宗並配正殿增一壇加犢一酒尊二爵三帛篚一丹墀四壇大明夜明各犢一登一籩十豆十簠簋各二帛一紅色禮神制帛下同酒尊三爵三篚一星辰二壇各犢一羊三豕三登一鉶二籩豆各十簠簋各二酒盞三十帛一白色酒尊三爵三篚一壝外二十壇各犢一羊一豕一登一鉶二籩豆各十簠簋各二酒盞十帝王山川四瀆風雲雷雨神祇壇酒盞各三十中嶽壇附鍾山加酒盞十永樂以後北嶽壇增附天壽山加酒盞十酒尊三爵三篚一帛一五嶽五鎮四海各如其方色太嵗神祇白色山川帛二風雲雷雨帛四帝王帛十六俱白色四瀆帛四黑色中徽加帛一永樂以後北嶽亦加帛一惠帝建文初以太祖配南郊罷仁祖配享成祖遷都北京永樂十八年建郊壇于正陽門南之左中為大祀殿十二楹中四楹飾以金餘施三采正中作石臺設昊天上帝皇地祇神座正南為大祀門繚以周垣周九里三十步規制禮儀悉如南京惟增祀天壽山于北嶽壇十九年正月命皇太子詣壇奉安昊天上帝后土皇地祇神主仁宗洪熙元年敕曰太祖受命上天肇興皇業太宗中興宗社再奠寰區聖德神功咸配天地朕崇敬祖考永惟一心今年正月十五日大祀天地神祇奉皇祖皇考配神仍著典章垂範萬世世宗嘉靖六年正月大祀先期禮官以宴請帝曰郊祀慶成次日設宴乃祖宗朝故典蓋以上帝監歆君臣歡會其禮不可廢可也今四方災異非常方欲上下同加修省恐多費勞民可暫免一年以見朕奉天恤民之意惟四夷使臣賜宴如故九年世宗既定明倫大典益覃思制作之事郊廟百神咸欲斟酌古法釐正舊章乃問大學士張璁書稱燔柴祭天又曰類于上帝孝經曰郊祀后稷以配天宗祀文王于明堂以配上帝以形體主宰之異言也朱子謂祭之于壇謂之天祭之屋下謂之帝今大祀有殿是屋下之祭帝耳未見有祭天之禮也况上帝皇地祗合祭一處亦非専祭上帝璁言國初遵古禮分祭天地後又合祀説者謂大祀殿下壇上屋屋即明堂壇即圜丘列聖相承亦孔子從周之意帝復諭璁二至分祀萬代不易之理今大祀殿擬周明堂或近矣以為即圜丘實無謂也璁乃備𫐠周禮及宋陳襄蘇軾劉安世程頤所議分合異同以對且言祖制已定無敢輕議帝鋭欲定郊制卜之奉先殿太祖前不吉乃問大學士翟鑾具述因革以對復問禮部尚書李時時請少需日月博選儒臣議復古制帝復卜之太祖不吉議且寢會給事中夏言請舉親蠶禮帝以古者天子親耕南郊皇后親蠶北郊適與所議郊祀相表裏因令璁諭言陳郊議言乃上疏言國家合祀天地及太祖太宗之並配諸壇之從祀舉行不于長至而于孟春俱不應古典宜令羣臣博考詩書禮經所載郊祀之文及漢宋諸儒匡衡劉安世朱熹等之定論以及太祖國初分祀之舊制陛下稱制而裁定之此中興大業也禮科給事中王汝梅等詆言非是帝切責之乃敕禮部令羣臣各陳所見且言汝梅等舉召誥中郊用二牛謂明言合祭天地夫用二牛者一帝一配位非天地各一牛也又或謂天地合祀乃人之事父母之道擬之夫婦同牢此等言論褻慢已甚又或謂郊為祀天社稷為祭地古無北郊夫社乃祭五土之祗猶言五方帝耳非皇地祇也社之名不同自天子以下皆得隨所在而祭之故禮有親地之説非謂祭社即方澤祭地也璁因録上郊祀考議一册時詹事霍韜深非郊議且言分祀之説惟見周禮莽賊偽書不足引據于是言復上疏言周禮一書于祭祀為詳大宗伯以祀天神則有禋祀實柴槱燎之禮以祀地祇則有血祭薶沈疈辜之禮大司樂冬至日地上圜丘之制則曰禮天神夏至日澤中方丘之制則曰禮地祇天地分祀由來久矣故宋儒葉時之言曰郊丘分合之説當以周禮為定今議者既以大社為祭地則南郊自不當祭皇地祇何又以分祭為不可也合祭之説實自莽始漢之前皆主分祭而漢之後亦間有之宋元豐一議元祐再議紹興三議皆主合祭而卒不可移者以郊賚之費每傾府藏故省約安簡便耳亦未嘗以分祭為非禮也今之議者往往以太祖之制為嫌為懼然知合祭乃太祖之定制為不可改而不知分祭固太祖之初制為可復知大祀文乃太祖之明訓為不可背而不知存心録固太祖之著典為可遵且皆太祖之制也從其禮之是者而已敬天法祖無二道也周禮一書朱子以為周公輔導成王垂法後世用意最深切何可誣以莽之偽為耶且合祭以后配地實自莽始既偽為是書何不削去圜丘方丘之制天地神祇之祭而自為一説耶于是禮部集上羣臣所議郊禮奏曰主分祭者都御史汪鋐等八十二人主分祭而以慎重成憲及時未可為言者大學士張璁等八十四人主分祭而以山川壇為方丘者尚書李瓚等二十六人主合祭而不以分祭為非者尚書方獻夫等二百六人無可否者英國公張崙等一百九十八人臣等祇奉敕諭折衷衆論分祀之義合于古禮但壇壝一建工役浩繁禮屋祭曰帝夫既稱昊天上帝則當屋祭宜仍于大祀殿専祀上帝改山川壇為地壇以専祀皇地祇既無創建之勞行禮亦便帝復諭當遵皇祖舊制露祭于壇分南北郊以二至日行禮言乃奏曰南郊合祀循襲已久朱子所謂五千六百年無人整理而陛下獨破千古之謬一旦舉行誠可謂建諸天地而不悖者也已而命戶禮工三部偕言等詣南郊相擇南天門外有自然之丘僉謂舊丘地位偏東不宜襲用禮臣欲于具服殿少南為圜丘言復奏曰圜丘祀天宜即髙敞以展對越之敬大祀殿享帝宜即清閟以盡昭事之誠二祭時義不同則壇殿相去亦宜有所區别乞于具服殿稍南為大祀殿而圜丘更移于前體勢峻極可與大祀殿等制曰可于是作圜丘是年十月工成明年夏北郊及東西郊亦以次告成而分祀之制遂定禮臣言圜丘之制大明集禮壇上成濶五丈存心録則第一層壇濶七丈集禮二成濶七丈存心録則第二層壇靣周圍俱濶二丈五尺蓋集禮之二成即存心録之一層存心録之二層即集禮之一成矣臣等無所適從惟皇上裁定詔圜丘第一層徑濶五丈九尺髙九尺二層徑十丈五尺禮志作九丈三層徑二十二丈禮志作二二丈俱髙八尺一寸地面四方漸墊起五丈又定祭時上帝南向太祖西向俱一成上其從祀四壇東大明西夜明次東二十八宿五星周天星辰次西風雲雷雨俱二成各成面磚用一九七五陽數及周圍欄板柱子皆青色琉璃四出陛陛各九級白石為之內壝圓墻九十七丈七尺五寸髙八尺一寸厚二尺七寸五分櫺星石門五正南三東西北各一外壝方墻二百有四丈八尺五寸髙七尺一寸厚二尺七寸櫺星門如前又外圍方墻為門四南曰昭亨東曰泰元西曰廣利北曰成貞內櫺星門南門外東南砌緑磁燎爐傍毛血池西南望燈臺長竿懸大燈外櫺星門南門外左設具服臺東門外建神庫神厨祭器庫宰牲亭北門外正北建泰神殿後改為皇穹宇藏上帝太祖之神版翼以兩廡藏從祀之神版又西為鑾駕庫又西為犧牲所少北為神樂觀成貞門外為齋宫迤西為壇門壇北舊天地壇即大祀殿也給事中夏言又疏言太祖太宗並配父子同列稽之經旨未能無疑臣謂周人郊祀后稷以配天太祖足當之宗祀文王于明堂以配上帝太宗足當之禮臣集議以為二祖配享百有餘年不宜一旦輕改帝降敕諭欲于二至日奉太祖配南北郊嵗首奉太宗配上帝于大祀殿大學士張璁翟鑾等言二祖分配于義未協且録仁宗所撰敕諭及告廟文以進帝復命集議于東閣皆以為太廟之祠列聖昭穆相向無嫌並列况太祖太宗功德並隆圜丘大祀殿所祀均之為天則配天之祖不宜闕一臣等竊議南北郊及大祀殿每祭皆宜二祖並配帝終以並配非禮諭閣臣講求璁等言古者郊與明堂異地故可分配今圜丘大祀殿同兆南郊冬至禮行于報而太宗不與孟春禮行于祈而太祖不與心實有所不安帝復報曰萬物本乎天人本乎祖天惟一天祖亦惟一祖故大報天之祀止當以髙皇帝配文皇帝功德豈不可配天但開天立極本髙帝肇之耳如周之王業武王實成之而配天止以后稷配上帝止以文王當時未聞爭辨功德也因命寢其議已而夏言復疏言虞夏殷周之郊惟配一祖後儒穿鑿分郊丘為二及誤解大易配考孝經嚴父之義以致唐宋變古乃有二祖並侑三帝並配之事望斷自宸𠂻依前敕旨帝報曰禮臣前引太廟不嫌一堂夫配帝與享先不同此説無當仍命申議大學士張璁乃言郊祀之議聖見已決獨臣不忍無言皇上信以分配之説盡古禮乎大祀殿非明堂之位孟春祈穀又非季秋大享之禮則未免有失于古也皇上信以並配之説非今宜乎太祖百有餘年之神座豈忍言撤文皇百有餘年配天之報豈忍言廢則又未免有失于今也竊以天地分祀宜從古禮彰我皇上善繼善述之孝祖宗並配宜從今制彰我皇上不愆不忘之心疏入帝乃責璁前後變志非忠愛之道于是禮臣復上議南北郊雖曰祖制實今日新創請如聖諭奉太祖獨配至大祀殿則太祖所創今乃不得侑享于中竊恐太宗之心有所未安宜仍奉二祖並配則既復古禮又存祖制禮意人情兩不為失疏入諭璁曰二至祀典自今日始當奉太祖獨配孟春特名祈穀實存祖制當如仁宗之舊可委曲依朕意行之璁對皇上議郊祀大典本乎至當可行之道今議以圜丘方澤皆以太祖配以為皇上新制以大祀殿祀上帝以二祖配以為祖宗舊制皆一時遷就之説非至當不易之論夫冬至報天之禮重孟春祈穀之禮輕天與帝一也大祀殿既可以二聖並配圜丘何獨不可用新制舊制之説臣之所不解也臣竊惟斯禮之議本因天地不可並祭嫌于龎雜若祖宗並配原無可議既有大祀殿又建圜丘同兆南郊益非禮制夫禮時為大古今異宜非可一律蓋古圜丘因丘陵為之非積土而壇方澤因陂澤為之非掘地而坎今儀文大備屋而祀之掃地之儀安可復用或謂屋祭為帝壇祭為天臣觀思文之詩祭后稷配天而歌者也一詩之中天帝並稱我將之詩祭文王配帝而歌者也一詩之中止稱天而不稱帝則天之與帝原自無異臣惟今日郊祀之義有簡易可行之道足可繼承者因南郊大祀殿以祀昊天上帝配以二祖冬至大報天可也孟春祈穀可也萬一雨雪屆期亦可備而成禮北郊建壇以祀皇地祇亦以二祖配之夫天地分祀三代之彛典也不可龎雜故臣將順皇上為之祖宗者一代之祖宗功德俱隆並配天地當代之定制也孝子慈孫不可輕有議擬故臣不敢將順皇上為之蓋宜于古而古宜于今而今惟求心之安而已帝意終不可奪乃下禮部申議且責之曰祖宗並配在禮為黷但朕所定祈穀原因曲全祖制與明堂舉事不同依擬奉二祖並侑二至之祀奉皇祖獨配禮儀俱從儉詳擬以聞時定南郊陳設上帝南向犢一蒼玉一郊祀制帛十二俱青色登簠簋各二籩十二豆十二蒼玉爵三酒尊三青漆團龍篚一祝案一配帝西向犢一奉先制帛一白色登一簠簋各二籩十二豆十二蒼玉爵三酒尊三雲龍篚一從祀四壇俱在壇之二成大明在東西向犢一登一禮神制帛一赤色簠簋各二籩十豆十酒盞二十青瓷爵三酒尊三篚一夜明在西東向陳設同禮神制帛一白色星辰在東西向北上犢一羊一豕一登一鉶一實以和羮簠簋各二籩十豆十酒盞三十帛十青色一赤色一黃色一白色六黑色一青瓷爵三酒尊三篚一雲雨風雷在西東向北上陳設同帛四青色一白色一黃色一黑色一十一年冬至尚書言前此有事南郊風寒莫備乃采禮書天子祀天張大次小次之説請作黃氊御幄為小次每大祭所司以隨值風雪則設于圜丘下帝就幄中對越而陟降奠獻以太常執事官代之命著為令十三年二月詔更圜丘為天壇方澤為地壇禮部尚書夏言言圜丘方澤本法象定名未可遽易苐稱圜丘壇省牲則于名義未協今後冬至大報啓蟄祈穀祀天夏至祭地祝文宜仍稱圜丘方澤其省牲及諸公事有事壇所稱天壇地壇從之十七年冬撤大祀殿十一月更上昊天上帝泰號曰皇天上帝改泰神殿曰皇穹宇二十四年又即故大祀殿之址建大享殿詳見明堂篇穆宗隆慶元年禮部會議罷祈穀及明堂大享禮圜丘方澤分祀已久宜照例于冬至夏至日親祭仍奉太祖髙皇帝配禮部又言郊廟社稷諸祭太常寺先期具奏行禮止奏日不奏時以故陪祀諸臣失期者衆請以後並奏時日從之神宗萬厯三年十一月內閣臣張居正進郊禮圖册曰國初建圜丘于鍾山之陽以冬至祀天建方丘于鍾山之隂以夏至祀地洪武二年始奉仁祖淳皇帝西向配享十年春始定合祀之制仍奉仁祖配享三十二年更奉太祖髙皇帝配享永樂十八年北京天地壇成每嵗仍合祀如儀南京壇有事則遣官祭告洪熙元年奉太祖髙皇帝太宗文皇帝同配享嘉靖九年初建圜丘于大祀殿之南建方澤于安定門外俱止奉太祖一位配享而罷太宗之配其大祀殿則以孟春上辛日行祈榖祭奉太祖太宗同配享十年又改以啓蟄日行祈穀禮于圜丘仍止奉太祖一位配享十七年秋九月詔舉明堂大享禮于大內之元極寶殿奉睿宗獻皇帝配享元極殿即舊欽安殿十八年春行祈穀禮于元極寶殿不奉配二十四年拆大祀殿改建大享殿命禮部嵗用季秋奏請卜吉行大享禮隨又命仍暫行于元極寶殿隆慶元年詔罷祈穀大享二祭而天地則分祀如世宗所更定云謹案天地分祀至洪武十年聖祖乃定為合祀之制每嵗正月上辛日行禮于南郊大祀殿列聖遵行百六十餘年至世宗皇帝始案周禮古文復分建南北郊俱壇而不屋南郊以冬至北郊以夏至行禮而二至之外復有孟春祈穀季秋大享嵗凡四焉隆慶改元詔廷臣議郊祀之禮時議者並請罷祈穀大享復合祀天地于南郊先帝深維三年無改之義獨以祈穀大享在大內行禮不便從禮官議罷之而分祀姑仍其舊蓋亦有待云爾夫禮因時宜本乎人情者也髙皇帝初制郊禮分祀十年矣而竟定于合享者良以古今異宜適時為順故舉以嵗首人之始也卜以春初時之和也嵗惟一出事之節也為屋而祭行之便也百六十餘年列聖相承莫之或易者豈非以其至當允協經久而可守乎今以冬至極寒而祼獻于星露之下夏至盛暑而駿奔于炎歊之中一嵗之間六飛再駕以時以義斯為戾矣且成祖文皇帝再造宇宙功同開創配享百餘年一朝而罷之于人情亦大有不安者故世宗雖分建圜方之制而世宗以後竟不親行雖肇舉大享之禮而嵗時禋祀止于內殿是斯禮之在當時已窒礙而難行矣况後世乎臣等愚昧竊以為宜遵髙皇之定制率循列聖之攸行嵗惟一舉合祀之禮而奉二祖並配斯于時義允協于人情為順顧郊禋禮重今且未敢輕議謹稽新舊規制禮儀而略述其槩以俟聖明從容裁斷焉上從之案居正以萬厯三年進新舊禮圖欲改合祀然四年七年五月俱嘗祀地北郊固未嘗改為合祀故神宗熹宗莊烈帝三紀始終皆書祀天特祭地之禮不行耳欽定續通典卷四十七
