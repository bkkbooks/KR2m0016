  text: 欽定四庫全書欽定續通典卷一百五十
  hash: sha256:60474a7e66cbe4fe6cd174542e52c70c6ca0a76ef931f70f54c0027a396beff7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0016_WYG_150-1a, image: WYG0641/WYG0641-0707a.png}
body:
  text: 邊防邊防北序略臣等謹按杜氏邊防典北方凡四十一部其見於新舊唐書者惟契丹奚室韋鐵勒數部而已蓋塞北之地多逐水草而居自古稱為行國故其疆域之分併於考證較難大約漢之胸奴及烏桓鮮卑至元魏為蠕蠕隋唐為突厥唐末為契丹而其餘諸國則皆其所屬之小部落也宋史外國傳止載東西南三方明史於北邊亦但有韃靼一傳蓋遼之得國本先於宋迤北之地皆非宋有元則起自沙漠撫定中原逮明有天下而元之後裔仍據有漠北終明之世不相統屬今仍明史之名録而載之間亦採遼金時入貢諸部列著於篇正北韃靼韃靼即蒙古故元後也明初元順帝殂於應昌其子阿裕實哩達喇嗣立徙於和寧傳其次子特古斯特穆爾駐捕魚兒海於太祖洪武二十一年為明將藍玉所敗走至圖拉河為其下伊蘇岱爾所弒部落多潰其族諤尼實哩收散亡居和寧之西復為明都督劉真等所破自特古斯特穆爾後五傳至衮特穆爾皆被殺逺族果勒齊篡位稱汗始去國號稱韃靼其下以非順帝裔不附酋長阿嚕台等殺果勒齊而迎元後布尼雅實哩立以為汗成祖永樂六年以書諭之不報命淇國公邱福統五將軍出塞擊之師殱焉八年帝親征布尼雅實哩懼欲與阿嚕台俱西阿嚕台不從君臣始各自為部布尼雅實哩西奔明師追敗之於鄂嫩河還師遇阿嚕台復破之十年布尼雅實哩為衛喇特瑪哈穆特所殺時阿嚕台強盛數與衛喇特相攻元裔益微其後阿嚕台為衛喇特所蹙內附封為和寧王仁宗洪熙時阿嚕台數敗於衛喇時乃率其屬東走烏梁海駐牧遼塞宣宗宣德中阿嚕台為元裔托克托布哈所襲孳畜略盡未幾為衛喇特瑪哈穆特之子托歡所殺而立托克托布哈為汗以阿嚕台之衆屬之托歡自為丞相托歡之子額森嗣益桀驁自雄托克托布哈不能制後疑其主托克托布哈與中國通攻殺之額森自為汗尋亦為其下所殺部中共立托克托布哈之子號小王子是時韃靼諸部多互相雄長其後元裔數傳至博齊嗣為小王子徙帳東方為察哈爾而諸部之在西北邊者甚衆若濟農諳達之屬其衆益強時為邊患與明相終始云朵顔泰寧福餘朵顔泰寧福餘即杜典庫莫奚其地為烏梁海唐時號厙莫奚後服屬契丹元為大寧路北境明太祖洪武初相率內附遂置大寧都司營州諸衛封皇子權為寧王鎮焉數為韃靼所抄二十二年詔以烏梁海之地置三衛指揮使司各領其衆以為聲援自大寧前抵喜峯口近宣府曰朵顔自錦義厯廣寧至遼河曰泰寧自黃泥窪踰瀋陽鐵嶺接開原曰福餘惟朵顔地最險而強成祖從燕起靖難兵患寧王躡其後因厚賂三衛以説之來師行寧王錢諸郊三衛一呼盡起西擁寧王入關從戰有功成祖既立徙寧王南昌徙都司於保定而盡割大寧地畀三衛以償前勞英宗正統以後竄處迤北與衛喇特時出擾邊朝廷命將擊破之其後叛服不常鬼國鬼國元世祖至元十七年三月詔討之命以蒙古軍及哈喇章軍西州約羅萬嘉努軍阿爾哈雅軍數道並進尋復招諭之至九月其國主阿恰降自後叛服不常珠巴克珠巴克遼太宗天顯十二年來貢至聖宗開泰時諸部皆叛興宗重熙時復來貢又有迪里五國遼時皆來貢烏爾古烏爾古為遼太祖所征服太宗天顯時來貢穆宗應厯十五年烏爾古叛掠居民財物遣林牙蕭斡討之聖宗統和以後叛服不一後服屬於金契丹附近諸國契丹在隋唐之世已載杜典其後事迹備詳遼史兹取胡嶠所記録其附近諸國部落契丹西北至烏庫哩其人長大最勇鄰國不敢侵又其西嘉噶爾又其北單于突厥又北黑車子又北牛蹄突厥其地尤寒又北狗國手摶猛獸語類犬嘷契丹嘗選良馬二十匹遣十人齎糧北行窮其所見其人自黑車子厯牛蹄國以北行一年經四十三城居人多以木皮為屋其語言無譯者不知其國山川部族名號其地氣遇平地則溫和山林則寒冽至三十三城得一人能鐵甸語其言頗可解云地名頶利烏于邪堰自此以北曠阻不能達其人乃還此北荒之極也鐵甸鐵甸在契丹東其族野居皮帳而人剛勇地少草木水鹹濁色澄久而後可飲東北渤海渤海本號靺鞨其貴族姓大氏唐武后時髙麗别種大祚榮有衆四十萬人據挹婁臣於唐至中宗時置呼爾罕州以祚榮為都督封渤海郡王其後世遂號渤海梁太祖開平元年國王大諲撰遣使者來訖周世宗顯德常來朝貢宋太祖太平興國四年其酋帥大鸞河率小校李勛等十六人部族二百騎來降六年賜渤海王詔助兵攻契丹遼太祖建國攻渤海拔呼爾罕城俘其王大諲撰以為東丹王國立太子托雲為人皇王以主之神册四年葺遼陽故城以渤海漢戶建東平郡為防禦州天顯三年遷東丹國民居之哈斯罕哈斯罕遼聖宗開泰元年其王哈爾吉來朝八年其特哩衮額布根宰相薩喇來貢後屢遣使入貢太平五年乞建旗鼓許之天祚時東面行軍副統瑪格等攻之敗績哈斯罕始與遼絶後服屬於金富珠哩富珠哩遼聖宗統和二十二年偕烏舍等部來貢開泰七年三月命嵗貢貂皮興宗重熙十七年耶律義先等伐富珠哩酋托多羅十八年二月執托多羅以獻始與遼絶烏舍烏舍遼聖宗統和十三年七月以兵侵鐵驪遣奚王和碩鼐等討之十月烏舍歸欵詔諭之十四年烏舍烏哲圖以地逺乞嵗時免進鷹馬貂皮詔生辰正旦貢如舊天祚時不復至金太祖時烏舍楚古爾蘇來降鐵驪鐵驪其人雜處山林無君長遼太祖天顯元年鐵驪來貢聖宗開泰元年鐵驪納蘇等送烏舍百餘户至賔州賜絲絹乞賜佛像儒書詔賜護國仁王佛像一易詩書春秋禮記各一部興宗重熙十六年鐵驪實勒們來朝以始入貢加右監門衛大將軍自是無嵗不貢天祚帝乾統時鐵驪貢遂絶金太祖時鐵驪王和哩布以所部降博囉滿達博囉滿達在遼時與鐵驪烏舍富珠哩哈斯罕等皆為屬國軍聖宗太平五年以博囉滿達部多烏舍户詔索之七年遣使來貢後入貢不絶興宗重熙十年詔其部歸哈斯罕户之沒入者使復業定安定安本馬韓之種為契丹所破其酋帥糾合餘衆保於西鄙自稱定安國宋太祖開寶三年遣使朝貢太宗太平興國中太宗方經營逺略詔其國令張犄角之勢其國亦欲倚王師以抒宿忿表末云必欲報敵不敢違命乃答以詔書令發兵同伐契丹端拱中獻方物淳化中上表後不復聞室韋室韋契丹别種散處川谷逐水草其言語則靺鞨也其部族不一唐時皆入貢遼太祖時黑車子室韋以八部降尋復叛討破之太宗會同元年嘗進白麃又貢名馬穆宗應厯十五年黃室韋與大黃室韋小黃室韋俱叛聖宗統和以後復降順欽定續通典卷一百五十
