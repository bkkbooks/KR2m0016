body:
  text: 禮凶未踰年天子崩議元明元泰定帝致和元年三月崩懐王即位七月暴崩從葬諸帝陵是月皇太子即位十二月知樞宻院事臣額布勒等議請上尊諡曰翼獻景孝皇帝廟號明宗文宗至順三年八月崩十月鄜王即位十一月崩葬起輦谷順帝至元四年三月上諡曰冲聖嗣孝皇帝廟號寧宗按元史順帝紀太常禮儀院禮部官定議寧宗皇帝尊諡廟號在至元二年十二月而寧宗紀作四年三月元史之前後互異如此明神宗萬厯四十八年七月崩八月丙午朔太子即位九月己丑崩熹宗即位從廷臣議上尊諡廟號光宗葬慶陵臣等謹案杜典作未踰年天子崩諸侯薨議其所載止北鄉侯一條北鄉侯是未踰年天子非諸侯也諸侯自唐以來不見史冊明顧鼎臣等言今之公卿即古之諸侯夏言駁之云世無諸侯久矣古之諸侯建邦啓土世有其國今之所謂公卿者能以君道自處乎故凡杜氏所載諸侯禮槩不續纂藩王入繼大統為先君服議宋宋嘉祐八年三月晦日仁宗崩英宗立喪服制度並用定陵故事禮院言故事大祥變除服制以四月二十九日祥至五月二十九日禫六月二十九日禫除至七月一日從吉已䝉降敕謹案禮學王肅以二十五月為畢喪而鄭康成以二十七月通典用其說又加至二十七月終則是二十八月畢喪而二十九月始吉盖失之也元聖中更定五服年月敕斷以二十七月今士庶所同遵用夫三年之喪自天子達不宜有異請以四月二十九日為大祥五月擇日而為禫六月一日而從吉於是大祥日不御前後殿開封府停决大辟及禁屠至四月五日待制觀察以上及宗室管軍官日一奠二十八日而羣臣俱入奠二十九日禫除羣臣皆奉慰焉時宰相韓𤦺言濮安懿王徳盛位隆所宜尊禮陛下受命先朝躬承聖統顧以大義後其私親請下有司議濮安懿王及譙國太夫人王氏襄國太夫人韓氏仙遊縣君任氏合行典禮詳處其當以時施行詔須大祥後議二年四月詔議崇奉濮王典禮以聞翰林學士王珪等相顧不敢先天章閣待制司馬光獨奮筆立議議成王珪即敕吏以光手槀為案其議曰臣等謹案儀禮喪服為人後者按雷氏云此文當云為人後者為所後之父闕此五字者以其所後之父或早卒又或後祖父或後曽髙祖故闕之也𫝊曰何以三年也受重者必以尊服服之按受重謂繼宗祀尊服為斬衰為所後者之祖父母妻妻之父母昆弟昆弟之子若子若子者皆如親子也又為人後者為其父母𫝊曰何以期也不二斬也持重於大宗者降其小宗又為人後者為其昆弟𫝊曰何以大功也為人後者辟其昆弟也以此觀之為人後者不敢顧私親聖人制禮尊無二上若恭愛之心分施於彼則不専一於此故也是以秦漢以來帝王有自旁支入繼大統或推尊父母以為帝后皆見非當時取譏後世臣等不敢引以為聖朝法前代之入繼者多宫車晏駕之後援立之䇿或出母后或出近臣非如仁宗皇帝年齡未衰深惟宗廟之重祇承天地之意於宗室衆多之中簡拔聖明授以大業陛下身為先帝之子然後繼體承祧光有天下濮安懿王雖於陛下有天性之親顧復之恩然陛下所以負扆端冕富有四海子子孫孫萬世相承者皆先帝之徳也臣等愚淺不達古今竊謂今日所以崇奉濮安懿王典禮宜準先朝封贈期親尊屬故事髙官大國極其尊榮襄國太夫人仙遊縣君亦改封大國太夫人考之古今實為宜稱議上中書奏王珪等議未見詳定濮王當稱何親珪等議濮王於仁宗為兄皇帝宜稱皇伯而不名如楚王涇王故事中書又奏案儀禮為人後者為其父母服及案令文五服年月敕並云為人後者為其所後父母斬衰三年為其父母齊衰期即出繼之子於所繼所生父母皆稱父母又漢宣帝光武皆稱其父為皇考今珪等議皇伯於典禮未見明據請下尚書省集議從之按東都事畧歐陽修著濮議引喪服記以為為人後者為其父母服降三年為期而不没其父母之名以見服可降而名不可没也今議者欲以為人後之故使一旦反視父母若未嘗生我者其絶之也甚矣與中書議同臺誎皆是王珪太后聞之内出手書切責韓琦等不當議稱皇考上命權宜罷議令有司博求典故以聞范鎮時判太常率禮官上言漢宣帝於昭帝為孫光武於平帝為祖則其父容可稱皇考然議者猶或非之謂其以小宗而合大宗之統也今陛下既考仁宗又考濮王則其失又非漢宣光武比也凡稱帝稱皇稱皇考立寢廟論昭穆皆非是侍御史知雜事吕誨言臣竊原敕意直欲加濮安懿王為皇考與仁廟同稱如是則尊有二上服有二斬律禮之文皆相戾臣恭以陛下龍躍藩邸入繼大統南面尊臨皆先帝之徳也方勤孝養上奉慈顔猶懼其不足矧復顧私恩别親疎而忘大義哉人言不已誠有累於聖躬欲解天下之疑莫若發睿斷特以手詔自中而下以王珪等前議為定追封濮安懿王大國諸夫人典禮稱是慰厭人心於體為順皆留中不下司馬光又言聖人舉事與衆同欲故能下叶人心上順天意洪範曰三人占從二人言盖國有大疑則決之於衆自上世而然矣伏見向者詔諸臣議濮安懿王合行典禮翰林學士王珪等二十餘人皆以為宜準先朝封贈期親尊屬故事凡兩次會議無一人異辭盖欲奉濮王以禮輔陛下以義也而政府之意獨欲尊濮王為皇考巧飾詞説誤惑聖徳不顧先王之大典蔑棄天下之公議使憲室疎屬皆已受奉贈而崇濮王之禮未能知二議是非臣更為陛下别白言之政府言儀禮令文五服年月敕皆云為人後者為其父母即出繼之子於所生皆稱父母臣案禮法必須指事立文使人曉解今欲言為人後者為其父母之服若不謂之父母不知如何立文此乃政府欺罔天下之人謂其皆不識文理也又言漢宣帝光武皆稱其父為皇考臣案宣帝承昭帝之後以孫繼祖故尊其父為皇考而不敢尊其祖為皇考以其昭穆同故也光武起布衣誅王莽親冒矢石以得天下名為中興其實創業雖自立七廟猶非大過况但稱皇考其謙損甚矣今陛下親為仁宗之子𫝊曰國無二君家無二尊若復尊濮王為皇考則置仁宗於何地乎誨前後十一奏乞依王珪等奏定濮王崇奉典禮不報杜典但載繼兄弟統制服議今補纂繼大統為先君服議天子為繼兄弟統制服議唐宋金明唐陳貞節蘇獻等議曰按禮論晉太常賀循議云禮兄弟不相為後也故殷之盤庚不序陽甲而上繼於先君漢之光武按唐志如此或作武宣非不嗣於孝成而承於元帝又曰晉惠帝無後懐帝承絶懐帝自繼於世祖而不繼於惠帝此盖禮之常例也宋真宗咸平元年判太常禮院李宗訥等言太祖宜稱皇伯后宜稱皇伯妣事下尚書省議戸部尚書張齊賢等言王制天子七廟謂三昭三穆與太祖之廟而七前代或有兄弟繼及亦移昭穆之列是以漢書為人後者為之子所以尊本祖而重正統也又云天子絶期喪安得宗廟中有伯氏之稱乎其唐及五代有所稱者盖禮官之失非正典也請自今有事於太廟則太祖并諸祖室稱孝孫孝曽孫嗣皇帝太宗室稱孝子嗣皇帝劉敞為兄後議云天子諸侯或傳之諸兄或𫝊之諸弟既已受國家天下則所𫝊者雖非子亦猶子道也𫝊之者雖非其父亦猶父之道也以天下國家為重矣春秋僖公實閔公之兄閔公遭弑僖不書即位明臣子一體也公孫嬰齊卒春秋謂之仲嬰齊以謂為人後者為之子當下從子例不得復顧兄弟之親稱公孫也儒者或疑禮無後兄弟之文遂以春秋書仲嬰齊為不與子為父孫非也子為父孫誠非禮之正有不得已者春秋正其為臣子一體而已故實公孫嬰齊而謂之仲嬰齊若春秋本不聴其為後者則當書曰公孫嬰齊卒學者問之曰此仲嬰齊曷為謂之公孫嬰齊不與為兄後也乃可矣夫春秋家猶重之况國乎國猶重之况天下乎故凡繼其君雖兄弟必使子之繼其大宗雖兄弟必使子之如繼其君繼其大宗而不使子是教不子而輕其所托也此文公所以受逆祀之貶也自漢世以來其議尤衆皆曰兄弟不相為後不當以昭穆格之妄也若不以昭穆格之則天下受之誰乎凡人君以兄弟為後者必非有子者也引而為嗣臣子一體矣而當嗣者反以兄弟之故不繼所受國而繼先君則是所受國者竟莫有嗣之者也不可一矣生則以臣子事之死則以兄弟治之忘生悖死不可二矣已實受之後君不受之先君今當自繼先君者不惟棄後君命已之命且廢先君命兄之命不可三矣天下國家則歸之已而父子之禮則恥不為不可四矣推生嗣死獨可悖哉按禮為人後者為之子本不指兄弟相後而言所謂大宗無子則立支子是也若兄弟相繼雖亦為嗣統究不同於以姪繼伯叔但當持三年之服而不得竟以兄為父劉敞之議據三𫝊閔僖相繼以立言考杜預范甯孔頴達諸說皆謂僖本閔兄而曽為之臣故不可以逆祀非謂僖即當為閔之子其祖禰之説雖見於公穀而左傳本無此文也盖不可紊者國繞之序而不可改者天倫之名弟可以繼兄不可以禰兄設如劉氏之說弟繼兄統即為兄之子則商時陽甲至小乙兄弟四人相承陽甲當為小乙之曽祖考矣有是理乎宋真宗為太祖之從子而張齊賢欲稱孝孫是禰太宗而祖太祖矣真宗既以太祖為祖則太宗當以太祖為父太宗之享太祖稱曰孝弟已二十餘年至真宗而追改之於理亦為不順當日從宋湜言祭太祖祝文並稱孝子殆為得其中云哲宗元符三年正月崩徽宗即位按宋史本紀哲宗係神宗第六子徽宗係神宗第十一子太常寺言太宗皇帝上繼太祖兄弟相及雖行易月之制實斬衰三年以重君臣之義公除已後庶事相稱具載國史今皇帝嗣位哲宗實承神考之世已用開寳故事為哲宗服衰重今神主已祔百官之服並用純吉皇帝服御宜如太平興國二年故事禮部言太平興國中宰臣薛居正表稱公除以來庶事相稱獨命徹樂誠未得宜公除後除不舉樂外釋衰從吉事理甚明今皇帝常服素紗展脚幞頭淡黄衫黒犀帶請下有司裁制宰臣請從禮官議乃詔候周期服吉時詔不由門下徑付有司給事中龔原言喪制乃朝廷大事今行不由門下是廢法也臣為君服斬衰三年古未嘗改且陛下前此議服禮官持兩可之論陛下既察見其姦其服遂正今乃不得已從之臣竊為陛下惜開寳時并汾未下兵革未弭祖宗櫛風沐雨之不暇其服制權宜一時非故事也原坐黜知南康軍於是詔依元降服喪三年之制其元符三年九月自小祥從吉指揮改正髙宗紹興三十一年金國使至以欽宗訃聞按宋史本紀欽宗係髙宗之兄詔朕當持斬衰三年之服以申哀慕權禮部侍郎金安節等請依典故以日易月自五月二十二日立重安奉几筵至六月十七日大祥所有衰服權留以待梓宫之還從之金大定二十九年有司言世宗與熙宗為兄弟不相為後明武宗正徳十六年二月禮部尚書毛澄等言兹者大行皇帝大喪成服已畢伏望皇上以宗廟社稷為重少節哀情於西角門視事文武百官行奉慰禮上曰朕哀痛方切未忍遽離喪次其以二十七日視朝具儀來聞於是澄等具上儀注曰本月二十七日早上服衰服御西角門視朝文武百官素服烏紗帽黒角帶皂靴行奉慰禮二十八日以後上仍衰服御西角門視朝五月十八日遵依遺詔二十七日服制已滿自十九日以後合照孝宗敬皇帝服制上釋衰服易素翼善冠麻布袍腰絰御西角門視事俱不鳴鐘鼓文武百官仍素服烏紗帽黑角帶皂靴朝參至百日後變服如常候梓宫發引之時另行奏請上從之按世宗於武宗為兄弟而服用二十七日之制是既服三年之服矣繼乃恩禮漸衰則議禮之後也天子不降服及降服議周晉宋周制喪服為祖父母期為曽祖父母齊衰三月賈公彦曰天子七月而葬諸侯五月葬為之齊衰者皆三月藏其服至葬更服之葬後乃除按此則天子諸侯不降服其曽祖父母也祖父母不降可知又曰大功章曰適婦注云適子之婦𫝊曰何以大功也不降其適也既無所指斥明闗之天子諸侯也晉摯虞議天子無服殤之義絶期故也以上杜典不載今補纂宋太祖開寳元年皇姝燕國大長公主髙氏卒禮官言皇帝為公主髙氏降服大功仁宗天聖二年五月申國大長公主卒禮官言皇帝降服大功朱子語類期之喪天子諸侯絶大夫降然諸侯大夫尊同則亦不絶不降姊妹嫁諸侯者則亦不絶不降此皆貴貴之義楊信齋云天子諸侯絶旁期尊同則不降正統之期不降於衆子絶而無服天子為皇后父母服議皇后為父母祖父母服附周後魏宋明周制喪服為妻之父母緦子夏𫝊曰何以緦從服也宋庾蔚之云嫡子為妻子父母服則天子諸侯亦服妻之父母可知也按小記云世子不降妻之父母初不言天子諸侯也庾蔚之因世子而推及天子諸侯未為確論後魏孝靜帝武定五年正月齊獻武王即髙歡薨時秘凶問六日孝靜皇帝舉哀於太極東堂服齊衰三月按妻之父母當服緦麻三月兹乃隆以齊衰三月是明畏其勢而為此過情之禮也以上杜典不載今補纂宋制皇帝臨皇后父母喪出宫服常服至所臨處變服素服中宫為祖父母成服儀訃至命太史擇日成服前一日有司於主人第正寢東設皇后次周以簾帷又設内外命婦次於中門内外其日皇后服常服乗肩輿侍衛如常儀至主人第次前降輿尚儀前引詣坐俟時至皇后釋常服服素服訖尚儀詣次前俛伏跪奏具官臣某姓名言請皇后為祖父某官薨成服祖母曰祖妣某夫人某氏餘喪各随所稱奏訖俛伏興又躬奏請舉哭十五舉音又躬奏請哭止皇后哭止贊者引内命婦詣次前奉慰次引外命婦牋慰訖皇后釋素服服常服乗肩輿還内如常儀明制凡中宫父母祖父母薨未成服前内使監令尚服製皇后齊衰及應從臨命婦孝服俟喪家成服之日尚服奉齊衰進於皇后服訖侍女扶引皇后哭詣靈前從臨命婦亦服孝服立哭於其後按宋政和禮中宫遇祖父母喪服常服至主人第俟成服時至始服素服逮哭止奉慰以後仍服常服還内明集禮但云中宫為父母祖父母成服日至喪家服齊衰則自宫中詣喪家及成服後還宫時仍當服常服如宋制也杜典冇皇后為父母服而祖父母無之今採宋政和禮明集禮補纂天子為庶祖母持重服議五代明晉出帝天命三年七月太皇太后劉氏崩歐陽史髙祖天福七年尊太妃劉氏為皇太后髙祖之庶母也遺誥服紀園陵毋用后禮皇帝不得廢軍國機務既而禮官奏準令式為祖父母齊縗周又準喪葬令皇帝本服周者三哭而止請準後唐同光三年皇太妃北京薨莊宗於洛京西内發哀素服不視事三日從之歐陽史皇祖母劉氏崩輟視朝三日注云髙祖時尊為皇太后矣其崩也喪葬不用后禮見恩禮之薄不書曰皇太后者於帝為庶祖母也曰崩正其名也明世宗嘉靖元年十一月夀安皇太后崩憲宗之妃興獻王之生母也世宗服喪二十七日而除按自漢以後天子由支庶登大位者莫不尊其所生同之於適没則服以三年若没於其孫之世則其孫以父之所尊也莫不奉以太皇太后之禮而亦服以三年此後世之常禮也天子為母黨服議南北朝宋魏宋宋文帝元嘉三年殷景仁為中領軍太祖所生章太后早亡上奉太后所生蘇氏甚謹六年蘇氏卒車駕親往臨哭下詔曰朕夙罹偏罰情事兼常每思有以光隆懿戚少申罔極之懐而禮文遺逸取正無所鑑之前代用否又殊故懐疑累年在心未遂蘇夫人奄至傾殂情理莫寄追思逺恨與事而深日月有期將卜窀穸便欲粗依春秋以貴之義式遵二漢推恩之典但動藉史筆𫝊之後昆稱心而行或容未允可其詳論以求其中執筆永懐益増感塞景仁議曰至徳之感靈氣厥祥文母俔天實熙皇祚主上聿遵先典號極徽崇以貴之義禮盡於此蘇夫人階縁戚屬情以事深寒泉之思實感聖懐明詔爰發詢求厥中謹尋漢氏推恩加爵於時承秦之弊儒術蔑如自君作故罔或前典懼非盛明所宜軌蹈晉監二代朝政之所因君舉必書哲王之所慎體至公者懸爵賞於無私奉天統者每屈情以申制所以孚作王國貽則後昆臣豫䝉博逮謹露庸短帝從之按魏明宋文皆欲為外祖母制服而廷臣執議不從盖皆據天子絶期之義也乃杜典載譙周庾蔚之以為當服者特據諸侯適子為外祖父母妻父母行服而推類言之耳不知諸侯適子無君國子民之責其行服固宜天子而欲等之於諸侯之子儗非其倫矣且天子於五服之旁親皆不服則外戚無服可知也乃以為母族之正統而不降此果何所本乎情固宜從厚而禮又貴乎得中則殷景仁之議未可謂非也魏胡國珍女生肅宗即靈太后也神龜元年四月國珍薨肅宗服小功服舉哀於太極東臺以上杜典不載今補纂宋章穆太后母楚國太夫人吴氏薨太常禮院言皇帝為外祖母本服小功詳開寳通禮即有舉哀成服之文又縁近儀大功以上方成服今請皇太后擇日就本宫掛服雍王以下為外祖母給假其後太后適母韓國太夫人薨亦用此制焉天子弔大臣服議宋明宋制皇帝臨宗戚貴臣等喪出宫服常服至所臨處變服素服天聖喪葬令皇帝臨臣之喪一品服錫衰三品以上緦衰四品以下疑衰按周禮司服王為三公錫衰為諸侯緦衰為大夫士疑衰鄭司農云錫麻之滑易者十五升去其半冇事其布無事其縷緦亦十五升去其半有事其縷無事其布疑衰十四升衰鄭康成云疑之言擬也擬於吉皇從兄節度使樂安郡王惟正薨詔禮官議服奏言天子為羣臣二品宗室大功以上為服據惟正本小功親本官三品禮不當掛服特詔擇日掛服皇帝皇太后並素服按期功以下天子絶服宋制為二品宗室大功親以上為服已為過當至惟正本小功親本官三品而特為之服尤不足為據矣明制凡大臣訃奏太史監擇皇帝臨喪日期拱衛司設大次於喪家大門外設御座於正㕔中其日鑾駕至大次降輅升輿入易素服百官皆易服皇帝降輿詣靈座前哭百官皆哭太常卿奏止哭三上香三祭酒出至正㕔御座主喪以下詣㕔下拜位再拜承制官詣喪主前云有制喪主以下皆跪宣制訖皆再拜退立於㕔西太常卿奏禮畢皇帝升輿出就大次易服天子為大臣及諸親舉哀議五代明宋遼金周世宗顯徳二年樞宻使鄭仁誨薨其日世宗車駕幸其私第贊禮者引喪主哭於大門内望見乗輿止哭再拜引喪主立於庭皇帝至幕殿改服素服就臨升殿南間喪主内外再拜皇帝哭十五舉音喪主内外皆哭皇帝詣祭所三奠酒喪主以下再拜皇帝退止哭從官進名奉慰皇帝改常服還内及五年王朴薨世宗臨喪更不具儀晉髙祖天福五年四月曹州防禦使石暉卒帝之從弟也禮官奏天子為五服之内親本服周者三哭而止從之宋真宗時太尉兼侍中王旦薨上臨哭輟視朝三日發哀於苑中仁宗時忠武軍節度使王徳用薨詔輟視朝三日發哀於苑中其臨喪故事車駕將至所幸之第贊禮者引喪主哭於大門内望見乗輿止哭再拜立於庭皇帝至幕殿改素服就臨喪主内外再拜皇帝哭十五舉音喪主内外皆哭皇帝詣祭所三奠酒喪主以下再拜皇帝退止哭從官進名奉慰皇帝改常服還内按朱子語類本朝於大臣之喪待之甚哀賀孫舉哲宗哀臨温公事曰温公固是如此至於嘗為執政已告老而死祖宗亦必為之親臨罷樂遼興宗重熙十二年蕭孝忠薨帝素服哭臨赦死囚數人為孝忠薦福葬日親臨賜官戸守冢金熙宗皇統元年五月梁宋國王宗幹薨庚戌上親臨百官奏戌亥不宜哭泣上曰君臣之義骨肉之親豈可避之遂哭之慟六月紀王宗强薨上親臨如宗幹喪世宗大定六年布薩忠義薨上親臨哭之慟輟朝奠祭賻銀千五百兩重綵絹各五十世宗將幸西京復臨奠命參知政事唐古安禮䕶喪事凡葬祭從優厚官為給之十二年赫舍哩志寧薨上輟朝臨其喪行哭而入哀動左右將葬上致祭見陳甲柩前復慟哭之賻銀千五百兩重綵五十端絹五百匹葬事祠堂皆從官給宣宗興定五年越王永功薨上親奠於殯所明制乗輿為王公大臣舉哀凡王公薨訃報太常司告示百官拱衛司前期於西華門内壬地設御幄南向陳御座於正中上置素褥侍儀司設訃者位於御幄前之南設文武官陪哭位於幄前東西相向奉慰位於訃者位之北北向設贊禮二人位於訃者拜位之北東西相向引訃者二人位於贊禮之南東西相向引文武官四人於文武官之北東西相向其日拱衛司儀仗於奉天門奉迎車駕引禮引文武官素服由西華門入就陪哭位引訃者亦由西華門入立位於西南侍儀版奏外辦皇帝素服乗輿詣幄儀仗分列於幄前之左右和聲郎陳樂於御幄之南設而不作太常卿於幄西跪奏某官來訃某年某月某日臣某官以某疾薨請舉哀皇帝哭十五聲文武官在位者皆哭其哭音隨上為節太常卿跪奏請止哭皇帝止哭百官在位者皆止哭按明史禮志洪武二年開平王常遇春卒訃至禮官請如宋太宗為趙普舉哀故事遂定制公主服所生議宋宋文帝元嘉二十三年七月白衣領御史中丞何承天奏曰尚書剌海鹽公主所生母蔣美人喪海鹽公主先離婚今應成服撰儀參詳宜下二學禮官博士議公主所服輕重太學博士顧雅議今既咸用士禮便宜同齊衰削杖布帶踈履期禮畢心喪三年博士周野王議又云今諸王公主咸用士禮譙王衡陽王為所生太妃皆居重服則公主情禮宜亦家中期服為允其博士庾邃之顔測殷明王淵之四人同雅議何惔王羅雲二人同野王議臺按今之諸王雖行士禮是施於旁親及自已以下至於為帝王所厭猶一依古典又永初三年九月符修儀亡廣徳三主以餘尊所厭猶服大功海鹽公主體自宸極當上厭至尊豈得遂服臺據經𫝊正文并引事例依源責失而博士顧雅周野王等悍不肯從方稱自有宋以來皇子蕃王皆無厭降同之士禮著於故事緦功之服不廢於末戚顧獨貶於所生是申其所輕奪其所重豈縁情之謂臺伏尋聖朝受終於晉凡所施行莫不上稽禮文兼用晉事又太元中晉恭帝時為皇子服其所生陳氏練冠縓縁此則前代施行故事謹依禮文者也又廣徳三公主為所生母符修儀服大功此先君餘尊之所廢者也元嘉十三年第七皇子不服曹媫妤止於麻衣此厭乎至尊者也博士既不據古又不依今背違施行而多作浮辭自衛乃云五帝之時三王之季又言長子去斬衰除禫杖皆是古禮今世博士雖復引此諸條無救於失又詰臺云蕃國得遂其私情此意出何經記臣按南譙衡陽太妃並受朝命為國小君是以二王得遂其服豈可為美人比例尋蕃王得遂者聖朝之所許也皇子公主不得申者由有厭而然也臺登重更責失制不得過十日而復不詶答既被催攝二三日甫輸怙辭雖理屈事窮猶聞義恥服臣聞喪紀有制禮之大經降殺攸宜國家舊典古之諸侯衆子猶以尊厭況在王室而欲同之士庶此之僻謬不俟言而顯太常統寺曽不研却所謂同乎失者亦未得之宜加裁正宏明國典謹按太學博士顧雅國子助教周野王博士王羅雲顔測殷明何惔王淵之前博士遷員外散騎侍郎庾邃之等咸䝉抽飾備位前疑既不謹守舊文又不審據前準遂上背經典下違故事率意妄作自造禮章太常臣敬叔位居宗伯問禮所司騰述往反了無硏却混同兹失亦宜及咎請以見事並免今所居官解野王領國子助教雅野王初立議乖舛中執捍愆失未違十日之限雖起一事合成三愆羅雲掌押捍失三人加禁錮五年詔敬叔白衣領職餘如奏杜典不載今補纂欽定續通典卷七十五
