body:
  text: 兵避鋭五代梁遣王景仁擊趙晉遣周德威救之景仁所將皆梁精兵晉軍望之色動德威告莊宗曰梁兵鋭未可與爭宜少退以待之莊宗未決已而獲梁諜者知梁軍果將渡河莊宗如其策乃退軍鄗邑誘破梁軍周太祖因劉旻攻晉州遣王峻為行營都部署將兵討之别遣陳思讓康延釗自烏嶺出絳州與峻㑹峻至陜州留不進太祖遣使者翟守素馳至陜州諭峻欲親征峻屏左右謂守素曰晉州城堅不可近而劉旻兵鋭亦未可當臣所以留此者非怯也蓋有待爾守素馳還具道峻言是時太祖已下詔西幸聞峻語乃止不行元趙天錫以元帥左都監兼冠氏令宋將彭義斌據大名冠氏元帥李全降之人心頗搖天錫令衆姑少避其鋒以圖後舉乃帥將佐往依大將博里哈軍未幾破義斌於真定堅壁持久候隙破之唐李光弼以朔方兵五千救常山常山圑結兵執賊將史思義降時史思明攻饒陽李光弼問計於思義答曰今軍行疲勞逢敵不支不如按軍入守料勝而出賊兵方鋭持重圖之為萬全光弼善之㑹饒陽賊五千至九門思明恃有援解鞍休士光弼諜知之提輕兵斂旗鼓伺賊方飯襲殺之且盡思明懼引去五代時晉攻魏魏人求救於梁太祖遣侯言救魏言築壘於洹水太祖怒言不出戰遣葛從周代言從周至軍益閉壘不出而鑿三暗門以待晉兵攻之從周以精兵自暗門出擊敗晉軍金太祖收國初遼主自將七十萬至特們駙馬蕭特默等將騎五萬步四十萬至沃稜濼帝自將禦之行次約羅會諸將議皆曰遼兵號七十萬其鋒未易當吾軍逺來人馬疲乏宜駐於此深溝髙壘以待帝從之遣都古嚕訥尼楚赫鎮逹嚕古帝以騎兵親候遼軍獲督餉者知遼主以卓努叛西還二日矣是日帝還至舒吉濼有光見于矛端諸將曰今遼主既還可乘其怠追擊之帝曰誠欲追敵約齎以往無事餫饋若破敵何求不得衆皆奮躍追及遼主於呼卜塔岡遼兵大潰金師馳之橫出其中遼師敗績元順帝至正時徽饒賊冦於潛以董摶霄參知政事將兵討破之遂復其縣治既而賊兵大至焚倚郭廬舍摶霄按軍不動左右請出兵摶霄曰未也遣人執白旗登山望賊約曰賊以我為怯必少懈伺其有間則麾所執旗又伏兵城外皆授以火炮復約曰見旗動炮即發已而旗動炮發兵乃盡出斬首數千級堅壁挫鋭唐劉蘭為夏州都督府司馬貞觀初梁師都以突厥兵頓於城下蘭偃旗卧鼓不與爭鋒賊疑不敢迫夜引去蘭追擊破之宋魏勝守海州金兵逼關勝登關門張樂飲酒犒軍士令固守勿出戰金攻之踰時乃少遣士出慿險隘擊之金知不可攻將轉而渡河襲關後勝斂兵入城金軍徑趨關更欲過砂堰圜城為營勝先已據堰備之金軍不得過元李璮隂結宋人以益都叛據濟南詔親王噶必齊總兵討之賊勢甚盛繼命史天澤往天澤聞璮入濟南笑曰豕突入苙無能為也至則進說於噶必齊曰璮多譎而兵不精不宜力角當以嵗月斃之乃深溝高壘絶其奔軼凡四月城中食盡軍潰出降不戰挫鋭五代初楊行密取楚州孫儒率衆攻之行密將田頵劉威等遇之輒敗行密欲走銅官其客戴友規曰儒來氣鋭而兵多蓋其鋒不可當而可以挫其衆不可敵而可久以敝之若避而走是就擒也劉威亦曰背城堅柵可以不戰疲之行密以為然久之儒兵飢又大疫行密悉兵擊之儒敗被擒宋馮讚知梓州時劍外初平讚視事才數日僞軍校上官進嘯聚士卒三千餘衆劫村民數萬人夜攻州城讚曰賊埀夜奄至此烏合之衆以箠梃相撻擊必無固志可持重以鎮之待旦自潰矣躬自率衆巡城密令促其更籌未夜分擊五鼓賊悉遁去因追之擒進斬於市郡境以安元刷從太祖征奈曼敵率鋭兵鼓而進刷按兵屹不動敵止俄復鼓而進刷亦不動敵卒疑畏不敢前又鞏昌部長和托叛民大擾汪惟正謂將吏曰和托今若猘犬方肆狂齧茍一戰不利則城邑為墟當勝以不戰乃發兵踵之賊欲戰不得休則撓之若是者兩月知其糧盡勢蹙曰可矣與戰屢捷敵飢以持久敝之唐河間王孝恭討輔公祏賊將馮惠亮等據險邀戰孝恭堅壁不出遣竒兵絶糧道賊飢夜薄營孝恭卧不動明日使羸兵扣賊壘挑之别令將盧祖尚選精騎以待俄而兵却賊追北且囂遇祖尚軍薄戰遂大敗公祏窮棄丹陽走擒之江南平五代漢隱帝遣樞密使郭威討李守貞威用馮道計謀以遲久困之乃與諸將分為三栅發五縣丁夫築連壘以護三柵守貞出兵壞連壘威輒補其所壞守貞輒出爭之每出必有亡失如此逾年守貞城中兵食俱盡殺人而食威曰可矣乃為期日督兵四面攻而破之守貞自焚死宋韓世忠敗金人於大儀時逹喇屯泗州烏珠屯竹孰鎮為世忠所扼㑹雨雪金饋道不通野無所掠殺馬而食番漢軍皆怨烏珠夜引軍還餘衆棄輜重遁因敵飢乘其敝而取之唐邱行恭於大業末聚兵萬人保郿城百姓多附之時原州賊圍扶風太守竇璡堅守經數月賊食盡無所掠衆稍散歸行恭行恭因遣諭諸賊共迎義軍乃自率五百人負米麥持牛酒詣賊營賊帥長揖行恭斬之謂其衆曰若皆豪傑也何為事賊衆皆俯伏曰願改事公行恭率其衆迎謁太宗於渭北因敵三鼓致衰敗之元張宏範率千人戍萬山既城與將士校射東門宋師奄至咸謂衆寡不敵宜入守宏範戒曰退者斬遣李庭當其前他將攻其後親率二百騎為長陳令曰聞鼓則進未鼓勿動宋步騎相間突陳宏範軍不動再進再却宏範曰彼氣衰矣鼓之前後奮擊宋師奔潰致敵力疲夾攻敗之唐郭子儀李光弼敗賊將史思明於沙河遂趨常陽祿山聞思明敗益以精兵子儀堅壁自固賊來則守賊去則追晝掦其兵夜襲其幕賊人不得休息數日子儀謂光弼曰賊怠矣可以戰戰於嘉山斬馘四萬級宋畢再遇守六合金將赫舍哩攻之不克乃益增兵至環城亘三十里再遇令臨門作樂以示閒暇而間出竒兵擊之敵晝夜不得休乃引退再遇料其且復來乃自提兵奪城東野新橋出敵之背金人遂遁去遼太宗伐晉晉兵駐澶淵其前軍髙行周在戚城乃命趙延夀延昭以數萬騎出行周右帝以精兵出其左戰至暮帝復以徑騎突其中軍晉軍不能戰會有諜者言晉軍東面數少沿河城柵不固乃急擊其東偏衆皆奔潰縱兵追及遂大敗之又統和時宋將曹彬米信取涿州陷固安耶律休格擊走之月餘復至休格以輕兵薄之伺蓐食擊其離伍單出者且戰且却南軍自救不暇結方陳塹地兩邊而行軍渴乏井漉淖而飲凡四日始逹於涿㑹太后軍至冒雨而遁太后以鋭卒追及之彬信力窮環糧軍自衛休格圍之彬信以數騎亡歸餘衆悉潰金章宗泰和六年宋將皇甫斌分路侵蔡阻溱水不敢進於是平章布薩揆遣完顔薩布及布色鄂諾完顔逹希布等以騎七千往擊之㑹溱水漲宋兵扼橋以拒薩布等謀潛師夜出逹希布以騎涉水出其右鄂諾出其左薩布度其軍渡乃率副統阿嚕岱以精兵直趨橋宋兵不能遏比明大潰鄂諾以兵斷真陽路諸軍追擊至陳澤斬首二萬級元托壘攻鄧州不下遂將而北金將哈逹等知托壘已北合步騎十五萬躡其後托壘按兵遣其將呼圖克等誘之且旦暮命軍中曰毋令彼得休息宜夜鼓譟以擾之太宗時亦渡河遣親王扣肯布哈等將萬餘騎來會遂奮擊大破之追奔數十里明李文忠援大同次馬邑敗元遊兵進至白楊門天雨雪已駐營文忠令移前五里阻水自固元兵乘夜來劫文忠堅壁不動質明敵大至以二營委之殊死戰度敵疲乃出精兵左右擊大破之追至蒙克倉而還陳久疲致敗五代梁晉戰胡栁晉軍敗莊宗欲收兵還臨濮李嗣昭曰梁軍已勝旦暮思歸吾若收軍使彼休息整而復出何以當之宜以精騎撓之因其勞乏可以勝也王建及亦曰敵衆晡晚大半思歸擊此疲敗之卒易如拉朽時日已暮建及大呼入陳李嗣昭繼之梁軍大敗周世宗既敗北漢兵于髙平乘勝而進圍城之役諸將議不一故久無成功世宗欲解去而未决聞史彥超戰死遽班師倉卒之際亡失甚衆出其不意唐張巡守雍邱令狐潮引賊衆四萬至城下巡曰賊兵精鋭且知城中虛實有輕我心今出其不意擊之彼必驚潰賊勢少折然後城可守也乃分千人乘城以數隊開門突出巡身先士卒直衝賊陳人馬辟易賊遂退又李晟為鳯翔節度使以吐蕃侵軼遣將王佖夜襲賊營率驍勇三千入汧陽城戒之曰賊大衆當過城下慎無擊其首尾首尾雖敗其中軍力全若合勢攻汝必受其弊但俟其前軍已過見五方旗虎豹衣則其中軍也突其不意可建竒功佖如言出擊之賊衆果敗又李訴將攻吳房諸將曰今日往亡訴曰吾兵少不足戰宜出其不意彼以往亡不吾虞可擊也遂往克其外城而還五代初義成軍亂遂安師儒師儒奔梁太祖遣朱珍以兵趨滑州道遇大雪珍趣兵疾馳一夕至城下遂乘其城義成軍以為方雪不意梁兵來不為備遂下之又秦宗權遣盧瑭張晊等攻梁是時梁兵尚少數為宗權所困太祖乃拜珍淄州刺吏募兵於淄青得兵萬餘以歸太祖喜曰賊方息兵養勇度吾兵少而未知珍來謂吾不過堅守而已宜出其不意擊之乃出擊敗晊等宗權由此敗亡又唐莊宗初襲位會梁兵攻潞州築夾寨聞晉王李克用已死以為援兵不能復來遂歸洛陽停斥候莊宗與諸將謀曰敵所憚者先王耳聞吾新立以為童子未間軍旅必有驕怠之心若簡精兵倍道趨之出其不意破之必矣乃大閲士卒發大原軍伏兵三垂岡詰旦大霧進兵直抵夾寨梁軍不意晉兵之至將士尚未起軍中驚擾晉兵燒寨鼓譟而入梁兵大潰失亡將校士卒以萬計又李繼韜以潞州叛降梁莊宗有憂色召李嗣源帳中謂曰繼韜以上黨降梁而梁方急攻澤州吾出不意攻其鄆州以斷梁右臂可乎嗣源對曰夾河之兵久矣茍非出竒則大計不决臣請獨當之乃以步騎五千涉濟至鄆州鄆人無備遂襲破之又明宗以康福帥靈武靈武深入敵境為帥者多遇害明宗乃令將軍牛知柔以兵衛福行至方渠吐蕃果出邀福福以兵擊走之至青岡峽遇雪福登山望見川谷中煙火有吐蕃數千帳不覺福之至福分其兵為三道出其不意襲之吐蕃大駭棄車帳而走追擊敗之晉彰國軍節度使張彥澤與契丹戰於陽城為契丹所圍而軍中無水鑿井輒壞又天大風契丹順風掦塵奮擊甚鋭軍中大懼彥澤以聞諸將諸將皆曰今敵乘上風而吾居其下宜待風回乃可戰彥澤以為然諸將皆去偏將藥元福獨留謂彥澤曰今軍中飢渴已甚若待風回吾屬為俘矣且逆風而戰敵人謂我必不能所謂出其不意彥澤即拔拒馬力戰契丹奔北二十餘里追至衛村又大敗之宋韓世忠平閩寇旋師永嘉若將休息者忽由處信徑至豫章連營江濵數十里羣賊不虞其至大震驚遣人招之賊首曹成以其衆降得戰士八萬又宗澤既敗金人于衛南渡更䇿其乘敗來襲乃暮徙其軍金人夜至得空營益驚憚澤不敢復出兵澤出其不意遣兵過大河襲擊敗之金固英以本部破宋五萬人遂奪新叉口宗弼留兵守之是夜大雪道路皆冰和尚原宋兵勢重不可徑取宗弼用固英䇿入自傍近髙山叢薄翳薈間出其不意遂取和尚原元穆呼哩攻真定遣史天祥諭武仙降之乃引兵屯邢西遙水山下仙兄貴以萬人壁於山上負固不下天祥携完顔呼遜濟哈軍百人由鳥道扳援而上盡掩捕之仙驚曰公若有羽翼者不然何其能也遂下邢磁相三州又巴延統兵船由淪河入江攻宋陽邏堡三日不克乃密令阿珠夜以鐵騎三千泛舟直趨上流為搗虛之計分遣阿爾哈雅等先以步騎攻堡夏貴來援阿珠出其不意率軍泝流西上四十里泊青山磯冒雪趨沙洲載馬後隨登岸擒其守將髙邦顯遣報巴延巴延急揮諸將破堡宋兵大潰又張宏範襲宋以其弟宏正為先鋒攻三江寨寨據隘乘髙不可近因連兵向之寨中持滿以待宏範下令下馬治朝食若將持久者持滿者疑不敢動而他寨不虞也忽麾軍連拔數寨回搗三江盡拔之又何伯祥從察罕伐宋屢捷諸軍入宋境察罕自他道遽還諸軍倉皇失措伯祥曰此必為敵所遏不若出其不意而遂深入其地彼不我測乃可出也遂帥兵突戰直抵司空寨疏布營壘陵髙伐木為攻取勢既夜命為五營營火十炬伏精鋭於營側險要之地天明令士卒速行而鳴鼓其後宋兵果來追伏發驚潰追擊大破之又李彀攻成都由廣元出葭萌度木瓜坡蜀人聞彀至潛伏以待彀諜知之令衆銜枚疾進出其不意賊兵敗走長驅至成都破之明湯和傅友德伐蜀太祖諭友德蜀人必悉精鋭東守瞿塘北阻金牛以抗我師若出其意外直搗階文門户既隳腹心自潰兵貴神速但患不勇耳友德奉命遂克成都又吳禎從湯和討方國珍乘潮入曹娥江毁壩通道出不意直抵軍廄國珍遁入海追及之盤嶼合戰敗之盡獲其戰艦士卒輜重國珍降擊其不備唐髙祖武德時吐谷渾寇邊遣柴紹討之敵乘高射紹矢下如雨紹遣人彈琵琶二女子對舞敵怪之相與聚觀紹察其無備潛遣精騎出敵陳後擊之敵衆大潰又張巡守睢陽賊尹子琦圍之不能克乃濟師巡夜鳴鼓嚴隊若將出賊申警俄息鼓賊覘城上兵休乃弛備巡使南霽雲等開門徑抵子琦所斬將拔旗有番將被甲引千騎麾幟乘城招巡巡隂縋勇士隍中持鈎陌刀强弩約曰聞鼓而奮敵恃衆不備城上譟伏發擒之弩注矢外向救兵不能前俄而縋士復登陴賊皆愕眙乃按甲不出五代唐莊宗遣李嗣源襲鄆州髙行周為前軍㑹日暮隂雨人無進志行周曰此天贊也彼必無備是夜涉河至城下鄆人不知李從珂先登啓關納外兵旦拔牙城又魏王繼岌伐蜀蜀道阻險議者謂宜緩師待變而進招討使郭崇韜以決於都統判官李愚愚曰王衍荒怠亂國之政民人厭之乘其倉卒擊其無備其利在速不可緩也崇韜以為然所至迎降遂滅蜀周李謙溥知隰州并人來圍其城議者皆請速救楊廷璋曰隰州壁壘甚固敵人奄至未能為攻城具當出竒以破之乃募敢死士七百人許以重賞使人與謙溥潛為之期既至則果不為備遂與城中相應銜枚夜擊并人驚潰逐北數十里斬首萬級獲鎧甲萬計宋王德討信州賊王念經次饒州㑹賊劉文舜圍城德引兵赴之文舜降謂諸校曰念經聞吾宿留必不為備倍道而趨一鼓擒之遼末帝乾統元年以蕭多喇久練邉事為西北路招討使北凖布尼都格爾率鄰部來侵多喇逆擊追奔數十里乘尼都格爾無備以輕騎襲之獲馬五千匹牛羊稱是金布薩忠義以平章政事兼都元帥討契丹師將發敵聲言乞降圖克坦克寧曰敵初困蹙且無降意所以揚言者是欲緩吾師期也不若攻其未備敵若挫衄則其降必速如其不降乘其怠而急擊之可一戰而定也忠義以為然乃與克寧出中路遂敗之元史樞從憲宗伐宋師次苦竹崖前阻絶澗深數百尺宋人恃險而不備帝使樞偵之樞率健卒數十縋而下得所致師處以聞帝趣樞急取之宋人懼乃降又憲宗西征丞相史天澤選諸道兵之驍勇者為先鋒命李進為總把道由陳倉入興元度米倉關其地荒塞不通進伐木開道七百餘里至定逺七星關其關上下皆築連堡宋以五百人守之巴渠江水環堡東流天澤命進往關說降之不從進潛視間道歸白天澤曰彼可取也是夜二鼓天澤遣進率勇士七十人掩其不備攻之脫門樞而入者二十人守門者覺拔刀拒之懸門俄閉諸軍不得入進與二十人力戰殺傷三十人後兵走上堡進乃毁懸門納諸軍追至上堡殺傷益衆宋兵不能敵棄走進遂得其堡守之關路以通明成祖聞耿炳文率衆三十萬至真定乃躬擐甲胄帥師至鄚州令衆秣馬蓐食渡白溝河謂今夕中秋彼必不備飲酒為樂此可破也夜半至雄縣破其城斬守將楊松又王守仁既討破橫水賊謝志山浰頭賊池仲容遣弟仲安來歸守仁佯許之而隂集兵以待遂下令散兵㑹嵗首大張燈樂仲容信且疑守仁賜以節物誘入謝仲容率九十三人營教埸而自以數人入謁守仁呵之曰若皆吾民屯於外疑我乎悉引入祥符宫厚飲食之賊大喜過望益自安守仁留仲容觀燈時正月三日大享伏甲士於門諸賊入以次悉擒戮之自將抵賊巢破上中下三浰斬馘二千有竒浰頭平又劉顯總四川兵攻把都蠻於凌霄峰賊黨阿二方三等上九絲山顯計蠻中九日必醉飲乘夜冒雨攀蘿腰絙扳挽而上兵入蠻帳二賊驚起拒鬬互擊蹈藉投崖者無算二賊奔逸攻其不整唐伊慎刺蘄州充江南西道節度都知兵馬建中末德宗在梁洋鹽鐵使包佶以金幣泝江進獻次蘄口時李希烈已屠汴州遣將杜少誠將兵寇蘄黃以絶江道慎兵遇於永安戍列樹三栅相去才數里偃旗卧鼓於中柵少誠至分兵圍之軍伍未定中柵聲鼓三柵悉兵以擊賊軍大亂少誠脫身免江路遂通宋太祖征太原時節度使何繼筠把石嶺關契丹來援繼筠率數千騎禦之敵至乘其未成列遽麾兵擊之敵衆大潰追奔數十里又嶽飛從劉浩解東京圍與敵相持于滑南領百騎習兵河上敵猝至飛麾其徒曰敵雖衆未知吾虛實當及其未定擊之乃獨馳迎敵斬其梟將遂大敗之金鄂勒博從宗望伐宋師自大名濟河鄂勒博屯于洺州之境時宋兵來攻鄂勒博乘夜以騎二百潜出其後反擊敗之居數日敵復來蘇統制以兵二萬先至鄂勒博乘其未集以三百騎出戰大敗其衆生擒蘇統制殺之又羅索等追遼主至白水濼遂與棟摩攻破西京時夏人救遼兵次天德羅索使塔納布克丹以騎二百為候兵夏人敗之額圖琿復以二百騎往遇伏兵亦敗時久雨諸將欲且休息羅索曰彼再破吾騎兵我若不復往彼將以我怯即來攻我矣乃選千騎往將至野登高望之夏人恃衆而不整方濟水為陳羅索分軍為二迭出迭入進退轉戰三十里過宜水烏嚕軍亦至合擊敗之元滿濟勒台討叛王海都都勒斡既與之遇方約戰行伍未定單騎突入陳中往復數四敵兵大擾一戰遂大捷又大德中叛王圖們烏魯斯等犯邊崇古嚕迎敵于庫克之地及其未陳直前搏之敵不敢支追之踰金山乃還又隆興之分寧叛行省檄石安琬討之賊背山而陳安琬引兵出陳後賊驚潰退而距守安琬揮兵直抵壘門賊掦言曰願少整行伍而戰死且不憾安琬佯許之賊果出陳安琬突陳而入大呼曰吾止誅賊首庸卒非我敵也手刃賊背生擒之明張輔討安南追賊於富良江賊悉衆拒戰聨舟十餘里橫亘江中而用小船載木立柵以拒官軍輔乘柵未備督將士力戰賊不能支黎季􅬚父子遁走諸僞將相俱赴軍門降安南平先設備而勝唐高崇文統神䇿軍討劉闢崇文在長武城練卒五千人常若寇至及中使至卯時宣命辰時出師兵仗軍需無不備具後擒闢送京師宋趙方每令諸將飲酒勿至醉治兵待寇常使日日可戰故淮蜀沿邊雖屢遭金兵而京西一境獨全又孟珙制置夔路元兵謀大舉臨江珙䇿必道施黔以逹湖湘請粟十萬分兵屯峽歸松滋為聲援元兵自隨臨江珙密遣將拒敵更遣兵屯施州元師數十萬入蜀珙增置營寨分布戰艦條上流備禦元人知有備不果入遼太祖時埒克之亂欲乘我不備為掩襲計紿降太祖將納之命魯庫耶律雲嚴號令勒士卒控轡以防其變逆黨知有備懼而遁金熙宗天眷二年宋將嶽飛以兵十萬圍邳州甚急城中兵才千餘守將懼遣人求救于鎮國上將軍璸都璸都曰為我語守將我嘗至下邳城中西南隅有塹深丈餘可速實之守將如其教填之嶽飛果自此穴地以入知有備遂止璸都舉兵以為聲援飛乃退又明昌時珠卜復叛丞相襄出屯北京㑹羣牧契丹德夀托蘇等據信州叛衆號數十萬逺近震駭襄閒暇如平日人心乃安初襄之出鎮也至石門鎮密謂僚屬曰北部犯塞奚足慮第恐姦人乘隙而動北京近地軍少當預為之備即遣官發上京等軍六千至是果得其用又宣宗興定四年夏人攻鞏州持嘉喀齊喀遣兵擊走之生擒夏將劉逹爾嘉允等訊知夏大將尼舒鼎鄂特明二人謀以為鞏帥府所在鞏既下則臨洮積石河洮諸城不攻自破故先及鞏且構宋統制程信等將兵四萬來攻喀齊喀聞之飭兵嚴備俄而兵果至喀齊喀督兵搏戰却之殺數千人攻益急將士殊死戰殺傷者以萬計夏人焚其攻具拔柵而去喀齊喀已先伏甲要地邀之復率衆躡其後斬首甚衆元世祖中統三年李璮叛據濟南史樞從史天澤往討之城西南有大澗亘歷山樞一軍獨當其險夾澗而城豎木柵于澗中淫雨暴漲木柵盡壞樞曰賊乘吾隙俟夜必出命作葦炬數百置城上逮三鼓賊果至飛炬擲之風怒火烈弓弩齊發賊衆大潰又張柔伐宋壁於黃州西北隅有乘舟出者柔曰此偵伺我者也夜必襲吾不備乃分軍為三以待之二鼓時宋師果至柔遮擊之俘數百人溺死者不可勝計又成宗大德二年秋諸王將帥共議防邊咸曰敵往嵗不冬出且可休兵於境庫爾濟蘇曰不然今秋候騎來者甚少所謂鷙鳥將擊必匿其形備不可緩也衆不以為然庫爾濟蘇獨嚴兵以待之是冬敵兵果大至三戰三克又劉福通陷汴梁號召羣盜察罕特穆爾北塞太行南守鞏洛自將中軍軍沔池㑹叛將周全棄覃懷入汴梁合兵攻洛陽察罕特穆爾下令嚴守備别以竒兵出宜陽而自將精騎發新安來援賊至城下見堅壁不可動退去因追至虎牢塞成臯諸險而還明湯和守常州凡十年防禦周密寇來輒破走之與吳良守江隂耿炳文守長興氣勢聨絡屹為東藩保障又楊鋭守備安慶先是林俊䇿宸濠必反密謀於同知林有祿修濬城池鋭䇿其必攻皖預設鈎距於江側禁勿泄至是宸濠起兵果至船皆為鈎距所破鋭與郡官張文錦林有祿嬰城固守濠至城下鋭令軍士大罵之宸濠怒悉力攻城不克乃令潘僉事家人持書諭降鋭手斬以狥賊氣遂衰又安南叛人入寇剽掠欽亷等州諸司議募陸兵俞大猷曰賊由海來當以海舟破之若専備於陛賊舍此擊彼我不勝其備賊不勝其擊彼逸我勞非計也乃多集海舟遂破之於永安萬寧安南函賊首以降欽定續通典卷九十九
