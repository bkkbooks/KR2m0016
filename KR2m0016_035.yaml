body:
  text: 職官王侯總敘封建起於黃唐郡縣創自秦漢師古者欲復封建宜今者必置郡縣唐臣杜佑作王侯總敘雖備陳其利病而終之曰莫可究詳曹冏陸機著論謂必宜法古魏徴李百藥上疏又力排其議夫救分離之難莫若建諸侯削尾大之勢莫若置守宰而今昔異時欲行古道勢莫能遵故自唐以迄宋遼金元皆無封建至明初封皇子為諸王置藩府於各直省雖非如三代之分茅胙土得専生殺而護衛甲士為數甚夥其不能謹守藩條者每足滋生民之擾是以惠帝始立方欲因事削除致有靖難之師且成祖既併取寧藩徙之南昌傳世未幾宸濠踵而生變徒貽國患古法之不可復泥又其明驗然五等之號歷代不廢品秩之差前後各殊史傳所載及各朝會典典章集禮所傳班班可考爰列敘於左歷代王侯封爵公主并官屬附唐制爵九等一曰王食邑萬戶正一品二曰嗣王郡王食邑五千戶從一品三曰國公食邑三千戶從一品四曰開國郡公食邑二千戶正二品五曰開國縣公食邑千五百戶從二品六曰開國縣侯食邑千戶從三品七曰開國縣伯食邑七百户正四品上八曰開國縣子食邑五百户正五品上九曰開國縣男食邑三百戶從五品上皇兄弟皇子皆封國為親王皇太子子為郡王親王之子承嫡者為嗣王諸子為郡公以恩進者封郡王襲郡王嗣王者封國公凡名山大川及畿內諸縣皆不以封至郡公有餘爵聽回授子孫其國公皆特封凡封户三丁以上為率嵗租三之一入於朝廷食實封者得真户分食諸州其王府傳一人咨議參軍事一人友一人侍讀無定員文宗開成元年改諸王侍讀曰奉諸王侍讀宣宗大中初復舊文學一人東西閣祭酒各一人長史一人司馬一人掾一人屬一人主簿一人記室參軍事二人録事參軍事一人録事一人功倉戶兵騎法士等七曹參軍事各一人參軍事二人行參軍事四人典籖二人自典籖以上為府官郡王嗣王不置長史親事府典軍二人副典軍二人校尉五人旅帥隊正隊副自旅帥以下視親事多少乃置帳內府典軍二人副典軍二人自校尉以下員品如親事府親王國令一人大農一人尉一人按杜佑通典作大農二人尉二人兹據新唐志丞一人學官長丞各一人食官長丞各一人廄牧長丞各二人典府長丞各二人皇姑為大長公主正一品姊為長公主女為公主皆視一品皇太子女為郡主從一品親王女為縣主從二品凡王公十五以上預朝集宗親女婦諸王長女月參凡公主邑司令一人丞一人主簿一人録事一人宋爵一十二等王嗣王郡王國公郡公開國公開國郡公開國縣公開國侯開國伯開國子開國男皇子兄弟封國謂之親王親王之子承嫡者為嗣王宗室近親承襲特旨者封郡王遇恩及宗室祖宗後承襲及特旨者封國公餘宗室近親並封郡公食邑沿唐制王食五千戶郡王國公三千戶特加者無定數其開國公侯伯子男皆隨食邑二千户以上封公一千戶以上封侯七百戶以上封伯五百戶以上封子三百戶以上封男分國三等大國二十七次國二十小國百二十見任前任宰相食邑實封共萬戶王為正一品嗣王郡王國公為從一品開國郡公為正二品開國縣公為從二品開國侯為從三品開國伯為正四品開國子為正五品開國男為從五品太祖開寶六年詔晉王位望俱崇親賢莫並宜位在宰相之上太宗太平興國八年楚王廣平郡王出閣令宰相立親王之上真宗景德中皇姪武信軍節度使惟吉加同平章事時駙馬都尉石保吉先為使相史館引唐制宗室在同品官上遂升唯吉焉凡親王府有傳長史司馬咨議參軍友記室參軍王府教授小學教授傳及長史司馬有其官而未嘗除太平興國八年諸王出閣楚王府置咨議參軍二人翊善一人陳王府置咨議翊善各一人後又置記室及諸王府侍講一人並以常參官充其後多不置咨議翊善記室或止一員真宗大中祥符九年仁宗初封夀春郡王置友二員亦以常參官充天禧二年進封升王友遷咨議仍置記室一人皇姪皇孫侍教南北伴讀無定數凡公主亦分大長公主長公主公主郡主縣主皆不置官屬遼之封爵唯有國王郡王國公三等率以漆水栁城混同蘭陵國名則屢進屢改有加至二國者其初宗室與勳戚無異道宗太康五年十一月詔唯王子封一字王餘並削降其爵號大約採唐宋之制其王府北面官有親王祇應司王子院有王子太師王子太保王子司徒王子司空王子班郎君南靣官王傅府有王傅興宗重熙十五年蕭惟信為燕趙王傅親王內史府有內史道宗太康三年見內史吳嘉努長史參軍諸王文學館有諸王教授重熙中姚景行為燕趙國王教授諸王伴讀聖宗太平八年長沙郡王宗允等奏選諸王伴讀金封爵正從一品曰郡王曰國公正從二品曰郡公正從三品曰郡侯正從四品曰郡伯舊曰縣伯章宗承安二年更正五品曰縣子從五品曰縣男凡封王者食邑萬戶實封一千戶郡王五千戶實封五百戶國公三千戶實封三百戶郡公二千户實封二百户郡侯一千戶實封一百戶郡伯七百戶縣子五百戶縣男三百戶凡封王大國之號二十次國三十小國三十封王之郡號十封公主之縣號三十其王府官有傅府尉長史司馬文學記室參軍元爵八等王正一品郡王從一品國公正二品郡公從二品郡侯正三品郡伯正四品亦有從四品縣子正五品縣男從五品其初宗室駙馬通稱諸王制度簡朴位號無稱惟視印章以為輕重後始有國邑之名其制封一字王者金印獸紐兩字王者金印螭紐次有金印駝紐金鍍銀印駝紐金鍍銀印龜紐有止用銀印龜紐各分等級有同姓無國邑而稱王者但曰宗王諸王傳官庫春布哈太子至齊王位下凡四十五王每位下各設王傅傅尉司馬三員傅尉庫春布哈額布根鄂蘭烏克三王有之自此以下皆稱府尉别於王傅之下司馬之上而三員並設又多寡不同或少至一員或多至三員者齊王則又獨設王傅一員明太祖洪武三年詔立長子標為皇太子封第二子椿為秦王次棡晉王棣燕王櫹吳王楨楚王槫齊王樟潭王杞趙王檀魯王姪孫守謙靖江王皆授以册寶設置相傅官屬及諸禮儀八年定諸王宗人祿米每嵗親王五萬石靖江王二萬石郡王六千石郡王諸子年十五人賜田六十頃為永業除其租九年定王府官制又定諸王及公主嵗供之等十七年更定册寶親王俱授以金册金寶皇太子之次嫡子及庶子年十嵗皆封郡王授以塗金銀册銀印親王嫡長子年十嵗立為王世子授以塗金銀册銀印次子及庶子年十嵗皆封郡王册印亦如之郡王次子授鎮國次孫輔國次曽孫奉國皆將軍凡三等次元孫鎮國次五世孫輔國次六世孫奉國皆中尉凡三等其王府官屬長史司左右長史各一人其屬典簿一人審理所審理正一人副一人典膳所典膳正一人副一人奉祠所奉祠正一人副一人典樂一人典寶所典寶正一人副一人紀善所紀善二人良醫所良醫正一人副一人典儀所典儀正一人副一人伴讀四人教授無定員引禮舍人三人倉大使副使各一人郡王府教授一人典膳一人鎮國將軍教授一人神宗萬歷間周府設宗正一人後各府亦漸置郡王府增設教授一人凡王府護衛指揮使司設官如京衛其王府儀衛司儀衛正一人儀衛副二人典仗六人儀衛掌侍衛儀仗護衛掌防禦非常護衛王邸有征調則聽命於朝凡功臣外戚封爵三等曰公侯伯皆有流有世功臣則給鐵劵嵗祿以功為差已封而又有功仍爵或進爵增祿其才而賢者則出司戎政具三都尉篇否則食祿奉朝請而已年幼而嗣爵者咸入國子監讀書世宗嘉靖八年定外戚封爵毋許世襲其有世襲一二代者出特恩駙馬亦有封侯者若恩親侯李貞永春侯王寧京山侯崔元以恩澤封侯非制也公主亦有大長公主長公主凡尚主者並曰駙馬都尉其尚郡主縣主郡君縣君鄉君者並曰儀賓洪武七年公主府設家令一人司丞一人録事一人二十三年改家令司為中使司以內使為之欽定續通典卷三十五
