body:
  text: 州郡明山東山西山東元直𨽻中書省又分置山東東西道宣慰使司治益都路屬焉明洪武元年四月置山東等處行中書省治濟南府三年十二月置青州都衛治青州府八年十月改都衛為山東都指揮使司九年六月改行中書省為承宣布政使司領府六屬州十五縣八十九濟南府元濟南路屬山東東西道宣慰司明太祖吳元年為府領州四縣二十六厯城倚章丘鄒平淄川元般陽路治此屬山東東西道宣慰司明太祖吳元年改路為淄川州縣仍為附郭二年七月州廢來屬長山元屬般陽路明洪武二年七月來屬新城元屬般陽路明洪武二年七月來屬七年十二月省入長山髙苑二縣後復置齊河元屬德州明洪武二年七月改屬府齊東元屬河間路明洪武初來屬濟陽禹城元屬曹州明洪武二十年來屬臨邑元屬河間路明洪武初來屬長清元屬泰安州明洪武二年七月改屬府肥城元屬濟寧路明洪武二年七月來屬青城元屬河間路明洪武二年省人鄒平齊東二縣十三年十一月復置來屬陵元德州治安德縣直𨽻中書省明洪武元年省安德縣八州七年七月移州於故陵縣十三年十一月復置陵縣泰安州元直𨽻中書省明洪武初來屬以州治奉符縣省入領縣二新泰萊蕪明洪武初改屬濟南府二年仍來屬德州元屬河間路陵州明洪武元年降為陵縣屬濟寧府二年七月改屬德州七年七月省陵縣移德州治焉領縣二德平平原武定州元棣州治厭次洪縣屬濟南路明武初州縣俱廢六年六月復置州改名樂安宣德元年八月改為武定州領縣四陽信元屬棣州海豐明洪武六年六月析樂安州南地置屬濵州後來屬北有無棣縣元屬棣州明洪武初省樂陵舊屬滄州明洪武元年改屬濟寧府二年來屬商河濵州明洪武初以州治渤海縣省入領縣三利津霑化蒲臺元屬般陽路明洪武七年二月來屬兗州府元兖州屬濟南路明洪武十八年升為兖州府領州四縣二十三滋陽倚元曰滋陽明洪武初省入州十八年復置成化間改為滋陽曲阜寧陽鄒元屬滕州明洪武二年七月改屬泗水滕元滕州治滕縣屬益都路明洪武二年七月州廢縣屬濟寧府十八年來屬嶧元嶧州屬益都路明洪武二年降為縣屬濟寧府後來屬金鄉元屬濟寧路明洪武十八年來屬魚臺元屬濟州明洪武元年屬徐州二年七月屬濟寧府十八年來屬單元單州屬濟寧路明洪武元年省州治單父縣入州二年七月仍降州為縣屬濟寧府十八年來屬城武元屬曹州明洪武四年屬濟寧府十八年來屬濟寧州元任城縣為濟州治至正八年罷濟州徙濟寧路治此明太祖吳元年為濟寧府十八年降為州以州治任城縣省入領縣三嘉祥元屬單州明洪武二年來屬巨野元為濟寧路治至正八年徙路治任城縣以縣屬焉鄆城東平州元東平路直𨽻中書省明太祖吳元年為府七年十一月降為州屬濟寧府以州治須城縣省入十八年改屬領縣五汶上東阿明洪武八年徙治故榖城縣平隂陽榖夀張明洪武三年省入須城陽榖二縣十三年十一月復置屬濟寧府後來屬曹州正統十年十二月以曹縣之黃河北舊土城置領縣二曹元曹州治濟隂縣直𨽻中書省明洪武元年省濟隂縣入州四年降為縣屬濟寧府正統十年十二月置州以縣屬焉東南有楚丘縣元屬曹州明洪武初省定陶元屬曹州明洪武元年屬濟寧府十年五月省入城武縣十三年十一月復置仍屬濟寧府正統十年十二月來屬沂州元屬益都路後省州治臨沂縣入州明洪武元年屬濟寧府五年屬濟南府七年十二月屬青州府十八年來屬領縣二郯城明洪武初置費東昌府元東昌路直𨽻中書省明洪武初為府領州三縣十五聊城倚堂邑博平明洪武三年三月省尋復置茌平莘清平元屬德州明洪武元年屬恩州二年七月屬髙唐州三年三月省尋復置改屬冠元冠州直𨽻中書省明洪武三年降為縣來屬臨青州元臨清縣屬濮州明洪武二年七月改屬𢎞治二年升為州領縣二丘元直𨽻東昌路明𢎞治二年改屬館陶元屬濮州明洪武二年七月屬東昌府三年三月省尋復置仍屬東昌府𢎞治二年改屬髙唐州元直𨽻中書省明洪武初以州治髙唐縣省入來屬領縣三恩元恩州直𨽻中書省明洪武二年降為縣來屬夏津明洪武三年三月省尋復置武城濮州元直𨽻中書省明洪武二年以州治鄄城縣省入來屬領縣三范明洪武三年三月省尋復置觀城明洪武三年三月省尋復置朝城明洪武三年三月省尋復置青州府元益都路屬山東東西道宣慰司明太祖吳元年為青州府領州一縣十三益都倚臨淄博興元博興州明洪武二年降為縣髙苑樂安夀光昌樂元屬濰州尋省後復置仍屬濰州明洪武初改屬臨朐安丘元屬密州明洪武二年七月州廢屬府諸城元為密州治屬益都路明洪武二年七月州廢屬府䝉城元屬莒州明洪武二年七月改屬府莒州元屬益都路明洪武初以州治莒縣省入領縣二沂水日照萊州府元萊州屬般陽路明洪武元年升為府六年降為州九年五月復升為府領州二縣五掖倚平度州元膠水縣明洪武二十二年正月改置領縣二濰元濰州屬益都路明洪武元年以州治北海縣省入九年屬萊州府十年五月降為縣二十二年正月改屬州昌邑元屬濰州明洪武十年五月省入濰縣二十二年正月復置來屬膠州元屬益都路明洪武初以州治膠西縣省入九年來屬領縣二髙密元屬膠州明洪武元年屬青州府九年五月屬萊州府尋復屬州即墨元屬膠州明洪武初屬青州府九年五月屬萊州府十年五月仍屬州登州府元登州屬般陽路明洪武元年屬萊州府六年直𨽻山東行省九年五月升為府領州一縣七蓬萊倚明洪武初廢九年五月復置黃福山棲霞招逺元屬萊州明洪武九年五月來屬萊陽元屬萊州明