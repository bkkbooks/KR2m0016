body:
  text: 州郡臣等謹案杜佑作州郡典以後世郡國推而上之附於古之九州因以考厯代郡縣沿革之故誠可為稽古之助宋馬端臨撰輿地考亦仿此例惟杜書以九州為綱以其時之州郡為目由唐而上逆溯之以會於唐虞馬書以九州為綱以朝代為目由唐虞以降順推之以逮於宋此其所以異也本館續修二書止於明代其輿地考自可依例序輯若此書標目竟用有明州郡實義無所取又九州之名始三代以前分合可考秦置郡縣隴西内史屬雍而郡以南入梁鉅鹿上谷屬冀而郡以東入兖齊郡屬兖而南境入青南郡屬荆而北境入豫三川南陽碭皆屬豫而三川之北入冀南陽之東入荆碭之東北入兖其餘諸郡莫不彼此參互犬牙相錯漢武帝置十三州部平帝復襲九州之名而徐之臨淮其南侵揚兖之泰山其南侵徐牂牁梁分而東北侵荆西河冀分而西南侵雍漢中分屬梁豫江夏分屬荆揚𢎞農一郡實為雍揚豫三州之域晉魏以下更置彌繁愈分愈離殊難牽合杜氏限於體例遂致一郡之地析載數州而厯代土疆轉難詳核至如蟠木交阯古登圖籍而杜氏以州無所屬别為化外揆之大一統之義亦未允協今稍變其體例以代相屬自五代迄明謹為續輯云五代梁唐之盛時以天下為十道洎其衰也置軍節度號為方鎮兵驕則逐帥將强則叛上而其勢以分僖昭以来日益割裂當是時天下别為十一南有吳浙荆湖閩漢西有岐蜀北有燕晉而朱氏僅有七十八州以為梁莊宗滅梁臣岐破蜀合一百二十三州以為唐石氏入立獻十有六州於契丹合一百九州以為晉劉氏代晉合一百六州以為漢郭氏代漢合一百一十八州以為周此中國五代之大畧可記其沿革焉其餘外屬者閩最先亡而存者七國自江以下二十一州為南唐自劍以南及山南西道四十六州為蜀自湖南北十州為楚自浙東西十三州為吳越自嶺南北四十七州為南漢自太原以北十州為東漢而荆歸峡三州為南平合中國所有二百六十八州而軍不在焉又自唐有方鎮而史官不録地理之書後世因習以軍目地而沒其州名且置軍者徒以虛名升建為州府之重此不可以不書也其外屬於閩與七國與契丹諸州則隨其時而附於五代云唐自黄巢肆虐羣雄逞凶四方擅命者南有吳浙荆湖閩漢西有岐蜀北有燕晉朱温據汴遂成簒弑僭號曰梁西至涇渭南逾江漢北瀕河東際海有州凡七十八案朱梁盡得河南境内諸州亦兼有闗内河東河北山南之境然鎮冀易定兩鎮仍各有其地魏博阮得而旋失朔方定難諸鎮亦僅同羈屬所云七十八州非實有其地也謹附識汴唐汴州宣武軍節度梁太祖開平元年受唐禪都此升為開封府建名東都以開封浚儀為赤縣尉氏封邱雍邱陳留為畿縣三年以滑州之酸棗長垣鄭州之中牟陽武宋州之襄邑曺州之考城更名戴邑許州之扶溝鄢陵陳州之太康九縣来屬仍俱升為畿縣按以九縣来屬五代史職方考以為開平元年考冊府元龜開平三年勅東都云自升州作府建邑為都未廣邦畿頗虧國體其滑州酸棗長垣等九縣並割屬開封府仍升為畿縣王溥五代會要亦作三年今並據之洛唐東都置河南府梁開平元年建名西都雍唐上都置京兆府昭宗遷洛廢為佑國軍節度梁開平元年改京兆府為大安府長安縣為大安縣萬年縣為大年縣仍置佑國軍三年改永平軍按職方考但云改京兆府為大安府不載縣名沿革今據五代㑹要兖泰寧軍節度沂密開平二年改輔唐縣為安邱縣按五代史宻州膠西故曰輔唐梁改曰安邱不言何年今據五代㑹要青平盧軍節度淄齊棣登萊徐武寧軍節度宿鄆天平軍節度曹濮宋唐屬宣武軍節度德宗興元初宣武軍移治汴州梁開平元年以汴州為東都因徙宣武軍於此割濮鄆潁三州𨽻之四年以輝州楚邱縣還屬按職方考無割濮鄆潁三州之文楚邱還屬亦不言何年今並據五代會要亳開平四年升為防禦按此據馬端臨輿地考輝唐昭宗光化二年朱全忠以宋州之碭山虞城單父曹州之成武表置輝州徙治單父三年置崇徳軍按職方考云屬縣置徙傳記不同今領單父碭山成武魚䑓四縣後又云楚邱故屬單州梁割𨽻宋州新唐書注又有虞城縣是所領四縣乃就宋地理言之而五代時不僅此也又輿地考及樂史太平寰宇記並云後唐以兖州魚䑓来屬則魚䑓縣梁時尚屬兖州也今據新唐書注而並識其異同於此潁陳蔡許唐忠武軍節度梁開平二年改匡國軍按開平二年據五代㑹要汝開平四年升為防禦按此據樂史太平寰宇記鄭防禦按此據輿地考滑唐義成軍節度以避梁王父諱改曰宣義按梁太祖父名誠因諱改義成為宣義考梁本紀唐大順元年以梁王兼宣義軍節度則諱改軍額在唐昭宗時故猶稱梁王又按當時州縣軍額多有以犯嫌名改者然如河陽三城軍及韓城澄城等縣亦未盡改謹於初見處附識之襄唐山南東道節度唐梁之際改忠義軍後以延州為忠義軍復曰山南東道均房鄧唐屬山南東道節度梁開平三年破趙匡凝分鄧州置宣化軍節度割泌隨復郢四州𨽻之復置淅川縣按職方考無四州割𨽻之文今據五代㑹要又歐陽忞輿地廣記云五代時復置淅川縣屬鄧州河南通志亦云梁於故淅川縣地置淅水縣後唐晉漢周因之是縣固梁置而淅水淅川未知孰是謹附識隨改唐城縣為漢東縣郢泌唐唐州昭宣帝天祐三年朱全忠徙治泌陽表更名復太祖乾化二年以監利縣入江陵按乾化二年據五代會要安開平元年改應城縣為應陽縣置宣威軍按改應陽縣據太平寰宇記申蒲䕶國軍節度以同州郃陽澄城韓城三縣来屬按五代㑹要後唐同光三年河中府奏韓城郃陽澄城三縣偽梁割屬當府其澄城縣今請却𨽻同州韓城郃陽縣且屬當府從之寰宇記輿地考並云梁以韓城郃陽澄城屬河中府今據之又按新唐書注韓城縣天祐二年更名韓原疑梁初即復舊名謹附識孟河陽三城軍節度懐晉唐屬䕶國軍節度梁開平四年置定昌軍節度割絳沁二州𨽻之末帝貞明三年改曰建寧按職方考無絳沁割𨽻之文今據五代㑹要絳陕唐保義軍節度梁開平二年改鎮國軍按開平二年據五代㑹要虢華唐鎮國軍節度梁改感化軍商同唐匡國軍節度梁改忠武軍以京兆府同官奉先二縣来屬按職方考無奉先縣五代㑹要云開平三年以京兆之同官奉先屬同州輿地考亦云以同官奉先屬同州而不言何年新唐書同州奉先縣注云天祐三年来屬疑為開平元年所割亦如職方考於磁州云梁改惠州新唐書以為天祐三年也又按職方考云美原縣故屬同州李茂貞置鼎州而治之梁改為裕州考新舊唐書美原縣並屬京兆府無割屬同州之文輿地考於同州亦云後唐廢裕州以美原来屬是美原在梁時實屬京兆後唐始割屬同州也謹附識崇岐本華原縣唐末屬李茂貞建為耀州置義勝軍梁末帝時茂貞養子温韜以州降梁詔改耀州為崇州義勝軍曰静勝軍邠岐静難軍節度寧岐慶岐唐末李茂貞建安定軍節度梁改武静軍按職方考不載慶州軍名沿革今據寰宇記及輿地考衍岐鄜岐保大軍節度坊岐唐末李茂貞以鄜城縣置翟州梁開平三年改曰禧州改縣為昭化縣按職方考不載鄜城縣沿革五代㑹要云開平三年改鄜城縣為昭化寰宇記云李茂貞建為翟州開平三年改曰禧州又改縣曰昭化今並據之丹岐延岐唐屬保大軍節度梁置忠義軍夏定難軍節度銀綏宥靈朔方軍節度鹽魏唐故曰大名府置天雄軍節度梁因之博改高唐縣為魚邱縣按此據寰宇記貝衞澶相貞明元年以平盧軍節度使賀德倫為天雄軍節度使分其相澶衛州為昭德軍改永定縣為長平縣天雄軍亂遂入於晉按職方考於相州下云故屬天雄軍節度梁末帝分置昭德軍考梁本紀云分其相澶衞州為昭德軍當是昭德軍治相而兼領澶衞今從本紀改永定縣據寰宇記邢唐屬昭義軍節度昭義所統澤潞邢洺磁五州唐末孟方立為昭義軍節度使徙其軍額於此而澤潞二州入於晉方立但有邢洺磁三州故唐末有兩昭義軍梁晉之争或入於梁或入於晉開平二年以邢洺磁三州為保義軍洺磁改曰惠州按新唐書注天祐三年以慈磁聲一更名鎮唐成徳軍節度梁改曰武順又改行唐縣為彰武縣按改彰武縣據王圻續輿地考冀深趙易祁定義成軍節度開平三年改唐縣為中山縣按此據續輿地考附外屬州謹按五代外屬諸州沿革職方考不載今謹據十國春秋寰宇記及各省志書修入岐鳳翔隴涇彰義原渭武乾李茂貞置治奉天縣後為威信軍以上入岐秦岐雄武蜀天雄成階鳳蜀武興以上入岐蜀滄梁乾化二年改為順化軍景徳莫瀛幽盧龍涿檀薊順營平蔚朔振武雲大同應新媯儒武忻代雁門改唐林縣為白鹿縣嵐石憲麟府并河東汾慈隰澤潞昭義梁末帝龍德三年改為匡義軍以李繼韜歸順故也管沁遼唐儀州梁開平三年以兖州管内有沂州其儀州復為遼州以上入後唐揚唐淮南節度楊吴改為江都府楚泗滁和光黄舒蘄廬夀忠正改盛唐縣為灊山縣海濠潤常宣寧國歙鄂武昌唐𤣥宗天寳中鄂州置唐年縣吴順義七年改為崇陽南唐復為唐年其地唐末已屬楊吳而朱梁於郡國志尚存其空名改為臨夏縣昇升為金陵府池饒信江洪鎮南梁時改豐城縣為呉臯縣撫袁吉䖍以上入吳建王審知改唐延平縣為延平鎮汀漳泉福武威梁乾化元年升梅溪場為閩清縣又改福唐縣為永昌縣以上入閩杭鎮海錢鏐奏改臨安縣為錦衣軍尋改為安國縣又改新城縣為新登縣唐山縣為金昌縣以湖州武康蘓州嘉興二縣来屬又於嘉興置開元府割華亭海鹽二縣屬焉又割錢塘鹽官各半置錢江縣割富春二鄉入錢江又改富陽曰富春縣越鎮東蘓梁開平三年錢鏐奏置吳江縣湖梁改長城縣為長興縣温静海錢鏐奏改樂成縣為樂清縣台德化錢鏐奏改樂安縣為永安縣又改唐興縣為天台縣明開平三年錢鏐奏置望海縣又改鄮縣為鄞縣處錢鏐奏改松陽縣為長松縣元瓘奏改白龍縣衢錢鏐奏改信安縣為西安縣須江縣為江山縣龍邱縣為龍游縣婺錢鏐奏改浦陽縣為浦江縣復武成縣為武義縣以上入吴越荆荆南梁以監利縣来屬入南平金武雄歸峡益成都漢彭梁開平二年改永昌縣為歸化縣蜀析青城地置永康縣緜眉嘉劍梓劍南東川遂武信果閬普陵資榮簡卭黎雅永平維茂文龍黔武泰施夔鎮江忠萬興利昭武開通涪渝瀘合昌巴蓬集壁渠梁置潾山縣戎梁山南西道洋武定以上入蜀潭武安衡澧朗武平岳道永邵辰融郴連昭宜桂静江梁開平元年復慕化縣為歸化縣賀梧䝉嚴富栁梁置龍城縣象以上入楚容寧逺邕建武端康封劉巖改封川縣為封興縣廢開建縣併入封興恩春新高梁改茂名縣為越裳縣竇雷化韶藤白㢘欽廣清海梁乾化中改州為興王府改南海縣為咸寧常康二縣横賔潯循劉巖析循州置正州改羅陽縣為博羅領歸善博羅海封河源四縣徙循州治雷鄉領雷鄉齊昌二縣鬱林瓊省儋州之富羅縣併入臨高義倫二縣来屬崖省瓊州之曽口顔羅二縣併入澄邁来屬儋萬安省富雲博遼二縣羅潘勤瀧改鎮南縣為嶺南縣辨梁改為勲州尋復舊以上入南漢欽定續通典卷一百二十一
