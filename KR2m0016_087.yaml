body:
  text: 樂三十二律宋陳祥道禮書太師掌六律六同以合隂陽之聲陽聲黃鍾太蔟姑洗㽔賔夷則無射隂聲大吕應鍾南吕函鍾小吕夾鍾蓋日月所會在天而右轉斗柄所建在地而左旋轉旋雖殊而交錯互見如表裏然故子合於丑寅合於亥辰合於酉午合於未申合於己戍合於卯故大司樂奏黃鍾歌大吕以祀天神奏太蔟歌應鍾以祭地祇奏姑洗歌南吕以祀四望奏㽔賔歌函鍾以祭山川奏夷則歌小吕以享先妣奏無射歌夾鍾以享先祖皆即其所合者用之也唐之祭社下歌太蔟上歌黃鍾趙慎言曰太蔟陽也位在寅應鍾隂也位在亥故斗建亥則日月會於寅斗建寅則日月會於亥是知聖人之制取合於隂陽歌奏之儀用符於交會陳㿩樂書陽六為律隂六為吕律與吕異合而言之吕亦謂之律此禮運所以有五聲六律十二管之説也蔡元定律吕新書律吕本原黃鍾篇曰長九寸空圍九分積八百一十分按天地之數始於一終於十其一三五七九為陽九者陽之成也其二四六八十為隂十者隂之成也黃鍾者陽聲之始陽氣之動也故其數九分寸之數具於聲氣之元不可得而見及斷竹為管吹之而聲和候之而氣應而後數始形焉均其長得九寸審其圍得九分積其實得八百一十分長九寸圍九分積八百一十分是為律本度量衡權於是而受法十一律由是而損益焉其證辨曰律長則聲濁而氣先至律短則聲濁而氣後至極長極短則不成聲而氣不應今欲求聲氣之中而莫適為準莫若且多截竹以擬黃鍾之管或極其短或極其長長短之內每差一分而為一管皆即以其長權為九寸而度其圍徑如黃鍾之法焉更迭以吹則中聲可得淺深以列則中氣可驗茍聲和氣應則黃鍾之為黃鍾者信矣黃鍾者信則十一律與度量權衡者得矣後世不知出此而惟尺之求晉氏而下多求之金石梁隋以來又參之秬黍至王朴専恃纍黍金石亦不復考夫金石真偽固難盡信而秬黍長短大小不同尤不可恃古人謂子穀秬黍中者實其籥是先得黃鍾而後度之以黍以見周徑之度以生度量權衡之數而已非律生於黍也百世之下欲求百世之前之律者亦求之聲氣之元而毋必之於秬黍斯得之矣理宗紹定間薑夔言登歌當與奏樂相合周官歌奏取隂陽相合之義歌者登歌徹歌是也奏者金奏下管是也奏六律主乎陽歌六吕主乎隂聲不同而德相合也自唐以來始失之故趙慎言曰祭祀有下奏太蔟上歌黃鍾俱是陽律既違禮經抑乖會合今太常樂曲奏夾鍾者奏陽歌隂其合宜歌無射乃或歌大吕奏函鍾者奏隂歌陽其合宜歌㽔賔乃或歌應鍾奏黃鍾者奏陽歌隂其合宜歌大吕乃雜歌夷則夾鍾仲吕無射矣茍欲合天人之和此所當改五聲八音名義宋陳祥道禮書萬物盈於天地之間而若堅若脆若徑若韌若實若虛若沉若浮莫過於金石土革絲木匏竹而天下之音具存矣可以和神人可以作動物非深於樂者其能究此乎蓋樂器重者從細輕者從大大不踰宫細不踰羽大細之中則角而已金重者也故尚羽瓦絲輕者也故尚宫石輕於金而重於瓦絲故尚角匏竹無細大之從故尚議革木無清濁之變故一聲此八音之所以直八卦而遂八風也蓋主朔易者坎也故其音革而風廣莫為果蓏者艮也故其音匏而風融震為竹故其音竹而風明庶巽為木故其音木而風清明兑為金故其音金而風閶闔乾為玉故其音石而風不周瓦土器也故坤音瓦而風涼蠶火精也故離音絲而風景以方言之金石則土類也西凝之方也故三者在西匏竹則木類也東生之方也故三者在東絲成於夏故在南革成於冬故在北小胥之序八音先之以金石土中之以革絲後之以匏竹木蓋西者聲之方虛者聲之本故音始於西而終於東西則先金石而後土者隂逆推其所始也東則先匏竹而後木者陽順序其所生也革絲居南北之正而先革而後絲亦先虛之意與理宗紹定三年薑夔進大樂議於朝言紹興大樂多用大晟所造有編鐘鎛鐘景鐘有特磬玉磬編磬三鐘三磬未必相應塤有大小簫箎笛有長短笙竽之簧有厚薄未必能合度琴瑟絃有緩急燥濕軫有旋復柱有進退未必能合調總衆音而言之金欲應石石欲應絲絲欲應竹竹欲應匏匏欲應土而四金之音又欲應黃鍾不知其果應否樂曲知以七律為一調而未知合度之義知以一律配一字而未知永言之旨黃鍾奏而聲或林鍾林鍾奏而聲或太蔟七音之協四聲各有自然之理今以平入配重濁以上去配輕清奏之多不諧協八音之中琴瑟尤難琴必每調而改絃瑟必每調而退柱上下相生其理至妙知之者鮮又琴瑟聲微每見蔽於鐘磬鼓蕭之聲匏竹土聲長而金石常不能以相待往往考擊失宜消息未盡至於歌詩則一句而鐘四擊一字而竽一吹未協古人稿木貫珠之意况樂工茍焉占籍擊鐘磬者不知聲吹匏竹者不知穴操琴瑟者不知絃同奏則動手不均迭奏則發聲不屬比年人事不和天時多忒由大樂未有以格神人召和氣也宋史音樂志宫聲沉粗大而下為君聲合口通音謂之宫其聲雄洪商聲徑凝明達上而下歸於中為臣聲開口吐聲謂之商將將倉倉然角聲長而通徹中平而正為民聲聲出齒間謂之角喔喔確確然徵聲抑揚流利從下而上歸於中為事聲齒合而唇啓謂之徵倚倚嚱嚱然羽聲喓喓而逺徹細小而髙為物聲齒開唇聚謂之羽詡雨酗芋然明世宗嘉靖間廖道南奏禮曰五聲六律十二管旋相為宫孟子亦曰不以六律不能正五音五音也者天地自然之聲也在天為五星之精在地為五行之氣在人為五臟之聲出於脾合口而通之謂之宫出於肺閉口而吐之謂之商出於肝而張口湧吻謂之角出於心而齒合吻開謂之徵出於胃而齒開吻聚謂之羽宫土行也君象也其性信其味甘其色黃其事思其位戊巳其數八十有一其聲重以舒猶夫牛之鳴􅐎也而主合也商金行也臣象也其性義其味辛其色白其事言其位庚辛其數七十有二其聲明以敏猶夫羊之離羣也而主張也角木行也民象也其性仁其味酸其色青其事貌其位甲乙其數六十有四其聲防以約猶夫雉之登木也而主湧也徵火行也事象也其性禮其味苦其色赤其事視其位丙丁其數五十有四其聲泛以疾猶夫豕之負駭也而主分也羽水行也物象也其性智其味鹹其色黑其事聽其位壬癸其數四十有八其聲散以虛猶夫馬之鳴野也而主吐也宫數八十有一下生為徵徵數五十有四上生為商商數七十有二下生為羽羽數四十有八上生為角角數六十有四五色成文而不亂八風從律而不姦百度得數而有常史記曰宫動脾而和正聖商動肺而和正義角動肝而和正仁徵動心而和正禮羽動腎而和正智聞宫音使人溫舒而廣大聞商音使人方正而好義聞角音使人惻隱而愛人聞徵音使人樂善而好施聞羽音使人整齊而好禮聲音之道與政通矣伏願敕下所司延訪通樂之儒遴選典樂之官務重其任而不泛視以為常務久其任而不更易以為數凡協律郎必擇其行誼端謹音律間熟者不許虛應故事而卑汚冗濫得以列其間凡樂舞生必擇其年貌精壯禮節間熟者不許濫收庸品而瑣屑齷齪得以容其迹庶乎教之豫而有本習之久而自化而古樂可復矣五聲十二律旋相為宫周世宗顯德六年正月樞密使王朴上疏云黃帝吹九寸之管得黃鍾之聲為樂之端也半之清聲也倍之緩聲也三分其一次損益之相生之聲也十二變而復黃鐘聲之總數也乃命之曰十二律旋迭為均均有七調合八十四調播之於八音著之於歌頌宗周而上率繇斯道自秦而下旋宫聲廢洎東漢雖有太子丞鮑鄴興之亦人亡而息無嗣續之者漢至隋垂十代凡數百年所存者黃鍾之宫一調而已十二律中惟用七聲其餘五律謂啞鐘蓋不用故也唐太宗用祖孝孫張文收考正雅樂而旋宫八十四調復見於時在懸之器方無啞者安史之亂京都為墟器之與工十不存一所用歌奏漸多紕繆逮乎黃巢之餘工器都盡購募不獲文記亦亡集官酌詳終不知其制度時有太常博士殷盈孫按周官考工記之文鑄鏄鐘十二編鐘二百四十處士蕭承訓較定石磬今之在懸者是也雖有樂器之狀殊無相應之和逮乎偽梁後唐厯晉與漢皆享國不逺未暇及於禮樂至於十二鏄鐘不問聲律宫商但循環而擊編鐘編磬徒懸而已絲竹匏土僅有七聲作黃鍾之宫一調亦不和備其餘八十三調於是乎泯絶樂之缺壞無甚於今陛下命中書舍人竇儼參詳太常樂事不踰月調品八音粗加和會以臣曾學律厯宣示古今樂録令臣討論臣雖不敏敢不奉詔遂依唐法以秬黍較定尺度長九寸虛徑三分為黃鍾之管與見在黃鍾之聲相應以上下相生之法推之得十二律管以為衆管互吹用聲不便乃作律準十三絃宣聲長九尺張絃各如黃鍾之聲以第八絃六尺設柱為林鍾第三絃八尺設柱為太蔟第十絃五尺三寸四分設柱為南吕第五絃七尺一寸三分設柱為姑洗第十二絃四尺七寸五分設柱為應鍾第七絃六尺三寸三分設柱為㽔賔第二絃八尺四寸四分設柱為大吕第九絃五尺六寸三分設柱為夷則第四絃七尺五寸一分設柱為夾鍾第十一絃五尺一分設柱為無射第六絃六尺六寸八分設柱為中吕第十三絃四尺五寸設柱為黃鍾之清聲十二聲中旋用七聲為均均之主者宫也徵商羽角變宫變徵次焉發其均主之聲歸乎本音之律七聲迭應而不亂乃成其調均有七調聲有十二均有八十四調歌奏之曲繇之出焉旋宫之聲久絶一日而補出臣獨見恐未詳悉望下中書門下集百官及內外知音者較其得失然後依調制曲八十四調曲有數百今見存者九曲而已皆謂之黃鍾之宫聲其餘六曲錯雜諸調蓋傳習之誤也唐初雖有旋宫之樂至於用曲多與禮文相違既不敢用唐為則臣又懵學獨力未能備究古今亦望集多聞知禮樂者上本古典下順常道定其義理於何月行何禮合用何調何曲聲數長短幾變成議定而制曲方可久長行用所補雅樂旋宫八十四調並所定尺所吹黃鍾管所作律準謹並上進疏奏帝稱善因命百官議而行之宋神宗元豐五年開封布衣葉防上書論樂器律曲不應古法范鎮言國朝三大祀樂譜並依周禮然其説有黃鍾為角黃鍾之角黃鍾為角者夷則為宫黃鍾之角者姑洗為角十二律之於五聲皆如此率而世俗之説乃去之字謂太蔟曰黃鍾商姑洗曰黃鍾角林鍾曰黃鍾徵南吕曰黃鍾羽今葉防但通世俗之説而不見周禮正文所以稱均有差也蔡元定律吕新書變律篇曰黃鍾十七萬四千七百六十二小分四百八十六全八寸七分八釐一毫六絲二忽不用半四寸三分八釐五毫三絲一忽林鍾十一萬六千五百八小分三百二十四全五寸八分二釐四毫一絲一忽三初半二寸八分五釐六毫五絲六初太蔟十五萬五千三百四十四小分四百三十二全七寸八分二毫四絲四忽七初不用半三寸八分四釐五毫六絲六忽八初南吕十萬三千五百六十三小分四十五全五寸二分三釐一毫六絲一初六秒半二寸五分六釐七絲四忽五初三秒姑洗十三萬八千八十四小分六十全七寸一釐二毫二絲二初二秒不用半三寸四分五釐一毫一絲一初一秒應鍾九萬二千五十六小分四十全四寸六分七毫四絲三忽一初四秒餘算半二寸三分三毫六絲六忽六秒強不用按十二律各自為宫以生五聲二變其黃鍾林鍾太蔟南吕姑洗應鍾六律則能具足至㽔賔大吕夷則夾鍾無射中吕六律則取黃鍾林鍾太蔟南吕姑洗應鍾六律之聲少下不和故有變律變律者其聲近正而少髙於正律也然仲吕之實一十三萬一千七十二以三分之不盡二算既不可行當有以通之律當變者有六故置一而六三之得七百二十九以七百二十九因仲吕之實十三萬一千七十二為九千五百五十五萬一千四百八十八三分益一再生黃鍾林鍾太蔟南吕姑洗應鍾六律又以七百二十九歸之以從十二律之數紀其餘分以為忽秒然後洪纎髙下不相奪倫至應鍾之實六千七百一十萬八千八百六十四以三分之又不盡一算數又不可行此變律之所以止於六也變律非正律故不為宫也其證辨曰宫羽之間有變宫角徵之間有變徵此亦出於自然左氏所謂七音漢前志所謂七始是也然五聲正聲聲故以起調畢曲為諸聲之綱至二變聲則不比於正音但可濟其不及而已然冇五聲而無二變亦不可以成樂也八十四聲篇曰黃鍾不為他律役所用七聲皆正律無空積忽微自林鍾而下則有半聲大吕太蔟一半聲夾鍾姑洗二半聲㽔賓林鍾四半聲夷則南吕五半聲無射應鍾為六半聲中吕為十二律之窮三半聲也自㽔賔而下則有變律㽔賔一變律大吕二變律夷則三變律夾鍾四變律無射五變律仲吕六變律也皆有空積忽微不得其正故黃鍾獨為聲氣之元雖十二律八十四聲皆黃鍾所生然黃鍾一均所謂純粹中之純粹者也八十四聲正律六十三變律二十一六十三者九七之數也二十一者三七之數也其證辨曰漢前志黃鍾為宫則太蔟姑洗林鍾南吕皆以正聲應無有忽微不復與他律為役者同心一統之義也非黃鍾而他律雖當其月自宫者則其和應之律有空積忽微不得其正此黃鍾至尊無與並也按黃鍾為十二律之首他律無大於黃鍾故其正聲不為他律役其半聲當為四寸五分而前乃云無者以十七萬七千一百四十七之數不可分又三分損益上下相生之所不及故亦無所用也至於大吕之變宫夾鍾之羽仲吕之徵㽔賔之變徴夷則之角無射之商自用變律半聲非復黃鍾矣此其所以最尊而為君之象然亦非人之所能為乃數之自然他律雖欲役之而不可得也此一節最為律吕旋宫用聲之綱領古人言之已詳惟杜佑通典再生黃鍾之法為得之而他人皆不及也六十調篇曰十二律旋相為宫各有七聲合八十四聲宫聲十二商聲十二角聲十二徵聲十二羽聲十二凡六十聲為六十調其變宫十二在羽聲之後宫聲之前變徵十二在角聲之後徵聲之前宫徵皆不成凡二十四聲不可為調黃鍾宫至夾鍾羽並用黃鍾起調黃鍾畢曲大吕宫至姑洗羽並用大吕起調大吕畢曲太蔟宫至仲吕羽並用太蔟起調太蔟畢曲夾鍾宫至㽔賔羽並用夾鍾起調夾鍾畢曲姑洗宫至林鍾羽並用姑洗起調姑洗畢曲仲吕宫至夷則羽並用仲吕起調仲吕畢曲蕤賔宫至南吕羽並用蕤賔起調蕤賔畢曲林鍾宫至無射羽並用林鍾起調林鍾畢曲夷則宫至應鍾羽並用夷則起調夷則畢曲南吕宫至黃鍾羽並用南吕起調南吕畢曲無射宫至大吕羽並用無射起調無射畢曲應鍾宫至太蔟羽並用應鍾起調應鍾畢曲是為六十調六十調即十二律也十二律即一黃鍾也黃鍾生十二律十二律生五聲二變五聲各有紀綱以成六十調六十調皆黃鍾損益之變也宫商角三十六調老陽也其徵羽二十四調老隂也調成而隂陽備也或曰日辰之數由天五地六錯綜而生律吕之數由黃鍾九寸損益而生二者不同至數之成則日有六甲辰有五子為六十日律吕有六律五聲為六十調若合符節何也曰即所謂調成而隂陽備也夫理必有對待數之自然也以天五地六合隂與陽言之則六甲五子究於六十其三十六為陽二十四為隂以黃鍾九寸紀陽不紀隂言之則六律五聲究於六十亦三十六為陽二十四為隂蓋一陽之中又自有隂陽也非知天地之化育者不能與於此其證辨曰禮運五聲六律十二管還相為宫孔氏疏曰黃鍾為第一宫至仲吕為第十二宫各有七聲凡六十聲按聲者所以起調畢曲為諸聲之綱領禮運所謂還相為宫所以始於黃鍾終於南吕也後世以變宫變徴參而為八十四調其亦不考矣理宗紹定間薑夔言古樂祇用十二宫周六樂奏六律歌六吕惟十二宫也王大食三侑注云朔日月半隨月用律亦十二宫也十二管各備五聲合六十聲五聲成一調故十二調古人於十二宫又特重黃鍾一宫而已齊景公作徵招角招之樂師涓師曠有清商清角清徴之操漢魏以來燕樂或用之雅樂未聞有以商角徵羽為調者惟迎氣有五引而已隋書云梁陳雅樂並用宫聲是也若鄭譯之八十四調出於蘇祇婆之琵琶大食小食般涉者胡語伊州石州甘州婆羅門者胡曲緑腰誕黃龍新水調者華聲而用胡樂之節奏惟瀛府獻仙音謂之法曲即唐之法部也凡有催衮者皆胡曲耳法曲無是也且其名八十四調者其實則有黃鍾太蔟夾鍾仲吕林鍾夷則無射七律之宫商羽而已於其中又缺太蔟之宫商羽焉國朝大樂諸曲多襲唐舊竊謂以十二宫為雅樂周制可舉以八十四調為宴樂胡部不可雜郊廟用樂咸當以宫為曲五聲十二律相生法宋陳祥道禮書曰先王因天地隂陽之氣而辨十有二辰因十有二辰而生十有二律統之以三故黃鍾統天林鍾統地太蔟統人所以象三才生之以八故黃鍾生林鍾林鍾生太蔟太蔟生南吕之類所以象八風律生吕為同位所以象夫婦吕生律為異位所以象子母六上所以象天地之六氣五下所以象天地之五行其長短有度其多寡有數其損益有宜始於黃鍾終於仲吕黃鍾太蔟姑洗損陽以生隂林鍾南吕應鍾益隂以生陽㽔賔夷則無射又益陽以生隂大吕夾鍾仲吕又損隂以生陽何則黃鍾太蔟姑洗陽之陽也林鍾南吕應鍾隂之隂也陽之陽隂之隂則陽息隂消之時故陽常下生而有餘隂常上生而不足㽔賔夷則無射隂之陽也大吕夾鍾仲吕陽之隂也隂之陽陽之隂則陽消隂息之時故陽常上生而不足隂常下生而有餘然則子午以左皆上生子午以右皆下生矣鄭康成以黃鍾三律為下生㽔賔三律為上生其説是也班固則類以律為下生吕為上生誤矣朱子答廖子晦書凡十二律各以本律為宫而生四律如黃鍾為宫則太蔟為商姑洗為羽林鍾為徵南吕為角是黃鍾一均之聲也若林鍾為宫則南吕為商應鍾為角太蔟為徵姑洗為羽是林鍾一均之聲也各就其宫以起四聲而後六十律之聲備非以黃鍾定為宫太蔟定為商姑洗定為羽林鍾定為徵南吕定為角也但黃大太夾姑中㽔林夷南無應為十二律長短之次宫商角徵羽為五聲長短之次黃鍾一均上生下生長短皆順故得各用其全律之正聲自林鍾之宫而生太蔟之徵則林鍾六寸而太蔟八寸徵反長於宫而聲失其序矣故以十二律而言雖當為林鍾上生太蔟而以五聲而言則當為宫下生徵而得太蔟半律四寸之管其聲方順又自太蔟半律四寸之徵而生南吕五寸有竒之商則於律雖本為下生而於聲反為上生矣自南吕五寸有竒之商而生姑洗七寸有竒之羽則於律雖本為上生而於聲則又當用其半而為下生矣自姑洗半律三寸有竒之羽而生應鍾四寸有竒之角則於律雖為下生而於聲反為上生矣其餘十律皆然孔疏蓋知此法但言之不詳耳半律杜佑通典謂之子聲者是也此是古法但後人失之而惟存黃鍾大吕太蔟夾鍾四律有四清聲即此半聲是也變宫變徵始見於國語注中及後漢樂志乃十二律之本聲自宫而下六變七變而得之者非清聲也如黃鍾為宫則第六變得應鍾為變宫第七變得㽔賔為變徵如林鍾為宫則第六變得㽔賔為變宫第七變得大吕為變徵是也十二律皆有二變一律之內通前五聲合為七均祖孝孫王朴之樂皆同所以有八十四調者蓋每律各添此二聲而得之也蔡元定律吕新書律生五聲篇曰宫聲八十一商聲七十二角聲六十四徵聲五十四羽聲四十八按黃鍾之數九九八十一是為五聲之本三分損一以下生徵徵三分益一以上生商商三分損一以下生羽羽三分益一以上生角至角聲之數六十四以三分之不盡一算數不可行此聲之數所以止於五也或曰此黃鍾一均五聲之數他律不然曰置本律之實以九九因之三分損益以為五聲再以本律之實約之則宫固八十一商亦七十二角亦六十四徵亦五十四羽亦四十八矣其證辨曰漢志易曰參天兩地而倚數天之數止於一終於二十五其義紀之以三故置一得三又二十五分之六凡二十五置終天之數得八十一以天地五位之合終於十者乘之為八百一十分應厯一統千五百三十九嵗之章數黃鍾之實也繇此之義起十二律之周徑地之數始於二終於三十其義紀之以兩故置一得二凡三十置終地之數得六十以地中六數乘之為三百六十分當期之日林鍾之實也人者繼天順地序氣成物統八卦調八風理八政正八節諧八音舞八風監八方被八荒以終天地之功故八八六十四其義極天地之變以天地五位之合終於十者乘之為六百四十分以應六十四卦太蔟之實也按漢志以黃鍾林鍾太蔟三律之長自相乘又因之以十也黃鍾長九寸九九八十一又以十因之為八百一十林鍾長六寸六六三十六又以十因之為三百六十太蔟長八寸八八六十四又以十因之為六百四十黃鍾應厯一統林鍾當期之日太蔟應六十四卦皆倚數配合為説而已獨黃鍾云繇此之義起十二律之周徑蓋黃鍾十其廣之分以為長十一其長之分以為廣故空圍九分積八百一十分其數與此相合長九寸積八百一十分則其周徑可以數起矣即胡安定所謂徑三分四釐六毫圍十分二釐八毫者是也孟康不察乃謂凡律圍徑不同各以圍乘長而得此數者蓋未之考也黃鍾之實篇曰子一黃鍾之律丑三為絲法寅九為寸數卯二十七為毫法辰八十一為分數已二百四十三為釐法午七百二十九為釐數未二千一百八十七為分法申六千五百六十一為毫數酉一萬九千六百八十三為寸法戌五萬九千四十九為絲數亥一十七萬七千一百四十七黃鍾之實按黃鍾九寸以二分為損益故以三厯十二辰得一十七萬七千一百四十七為黃鍾之實其十二辰所得之數在子寅辰午申戌六陽辰為黃鍾寸分釐毫絲之數在亥酉未巳卯丑六隂辰為黃鍾寸分釐毫絲之法其寸分釐毫絲之法皆用九數故九絲為毫九毫為釐九釐為分九分為寸為黃鍾蓋黃鍾之實一十七萬七千一百四十七之數以三約之為絲者五萬九千四十九以二十七約之為毫者六千五百六十一以二百四十三約之為釐者七百二十九以二千一百八十七約之為分者八十一以一萬九千六百八十三約之為寸者九由是三分損益以生十一律焉或曰徑圍之分以十為法而相生之分釐毫絲以九為法何也曰以十為法者天地之全數也以九為法者因三分損益而立也全數者即十而取九相生者約十而為九即十而取九者體之所以立約十而為九者用之所以行體者所以定中聲用者所以生十一律也其證辨曰程子曰黃鍾之聲亦不難定自世有知音者將上下聲考之既得正便將黍以實其管看管實得幾粒然後推而定法可也古法律管當實千二百粒黍今羊頭黍不相應則將數等驗之看如何大小者方應其數然後為正昔胡先生定樂取羊頭山黍用三等篩子篩之取中等者特未定也又曰以律管定尺乃是以天地之氣為準非秬黍之比也秬黍積數在先王時惟此適與度量合故可用今時則不同黃鍾生十一律篇曰子一分一為九寸丑三分二一為三寸寅九分八一為一寸卯二十七分十六三為一寸一為三分辰八十一分六十四九為一寸一為一分已二百四十三分一百二十八二十七為一寸三為一分一為三釐午七百二十九分五百一十二八十一為一寸九為一分一為一釐未二千一百八十七分一千二十四二百四十三為一寸二十七為一分三為一釐一為三毫申六千五百六十一分四千九十六七百二十九為一寸八十一為一分九為一釐一為一毫酉一萬九千六百八十三分八千一百九十二二千一百八十七為一寸二百四十三為一分二十七為一釐三為一毫一為三絲戌五萬九千四十九分三萬二千七百六十八六千五百六十一為一寸七百二十九為一分八十一為一釐九為一毫一為一絲亥一十七萬七千一百四十七分六萬五千五百三十六一萬九千六百八十三為一寸二千一百八十七為一分二百四十三為一釐二十七為一毫三為一絲一為三忽按黃鍾生十一律子寅辰午申戌六陽辰皆下生丑卯巳未酉亥六隂辰皆上生其上以三厯十二辰者皆黃鍾之全數其下隂數以倍者三分本律而損其一也陽數以四者三分本律而增其一也六陽辰當位自得六隂辰則居其衝其林鍾南吕應鍾三吕在隂無所增損其大吕夾鍾仲吕三吕在陽則用倍數方與十二月之氣相應蓋隂之從陽自然之理也其證辨曰按吕氏淮南子與司馬氏律書漢前志不同雖大吕夾鍾仲吕用倍數則一然吕氏淮南不過以數之多寡為生之上下律吕隂陽錯亂而無倫非其本法也元熊朋來律論黃鍾流行諸律本無間斷也算法之起殆因管音有短長此算家因律以命術非強律以命算也猶之方田焉田生五榖豈知我為圭箕弧環律置五聲豈知我為正變倍半皆算家命之耳故古之言鐘律者以耳齊其聲後人不能假數以正其度所以古樂之不可復與厯代製造唐文宗太和八年十月宣太常寺準雲韶樂舊用人數令於本寺閲習進來者至開成元年十月教成三年武德司奉宣索雲韶樂縣圖二軸進之昭宗以文德元年即位將親謁郊廟先是廣明初黃巢干紀樂工淪散金奏幾亡至是有司請造樂懸詢於舊工莫知制度時太常博士殷盈孫按周官考工記究其欒銑于鼓鉦舞甬之法用算法乘除鏄鐘之輕重髙徑乃定懸下編鐘正黃鍾九寸五分下至登歌倍應鍾三寸三分半凡四十八等口項之量徑衡之圍悉為圖進遣金工依法鑄之凡二百四十口修奉使宰臣張濬求知聲者處士蕭承訓樂工陳敬言太樂令李從周令先較定石磬合而擊拊之八音克諧觀者聳聽宋仁宗景祐元年八月判太常寺燕肅等上言大樂制器嵗久金石不調願以周王朴所造律準考按修治并閲樂工罷其不能者乃命直史館宋祁內侍李隨同肅等典其事又命集賢校理李照預焉於是帝御觀文殿取律準閲視親篆之以屬太常明年二月肅等上考定樂器并見工人帝御延福宫臨閲奏郊廟五十一曲因問照樂音髙命詳陳之照言朴準視古樂髙五律視教坊樂髙二律蓋五代之亂雅樂廢壞朴創意造準不合古法又編鐘鏄磬無大小輕重厚薄長短之差銅錫不精聲韻失美大者陵小者抑非中度之器也昔軒轅氏命伶倫截竹為律後令神瞽協其中聲然後聲應鳳鳴而管之參差亦如鳳翅其樂傳之亘古不刋之法也願聽臣依神瞽律法試鑄編鐘一虡可使度量權衡協和乃詔於錫慶院鑄之既成奏御照遂建議請改制大樂取京縣秬黍纍尺成律鑄鐘審之其聲猶髙更用太府布帛尺為法乃下太常制四律别詔潞州取羊頭山秬黍上送於官照乃自為律管之法并引集賢校理聶冠卿為檢討雅樂制度故實官凡所改制皆關中書門下詳定以聞别詔翰林侍讀學士馮元同祁冠卿照討論樂理為一代之典五月照鑄銅為籥合升斗四物以興鐘鎛聲量之法籥之率六百三十黍為黃鍾之容合三倍於籥升十二倍於合斗十倍於升乃改造諸器以定其法俄又以鎛之容受差大更增六籥為合十合為升十升為斗銘曰樂斗數月潞州上秬黍照等擇大黍縱纍之檢考長短尺成與大府尺合法乃定初照等改造金石所用負程凡七百十四攻金之工百五十三攻木之工二百十六攻皮之工四十九刮摩之工九十一摶埴之工十六設色之工百八十九起五月止九月成金石具七縣至於鼓吹及十二案悉修飭之令冠卿等纂景祐大樂圖二十篇以載鎔金鑢石之法厯世八音諸器異同之狀新舊律管之差是月與新樂并獻於崇政殿詔中書門下樞密院大臣預觀焉自董監而下至工徒凡七百餘人進秩賞賜各有差其年十一月有事南郊悉以新樂并聖製及諸臣樂章用之先是左司諌姚仲孫言照所製樂多詭異至如煉白石以為磬範中金以作鐘又欲以三辰五靈為樂器之飾臣愚竊有所疑自祖宗考正大樂薦之郊廟垂七十年一旦黜廢而用新器臣竊以為不可御史曹修睦亦為言帝既許照制器且欲究其術之是非故不聽焉景祐三年馮元等上新修景祐廣樂記八十一卷詔翰林學士丁度知制誥胥偃直史館髙若訥直集賢院韓琦取鄧保信阮逸胡瑗等鍾律詳定得失可否以聞九月阮逸言臣等所造鐘磬皆本於馮元宋祁其分方定律又出於胡瑗算術而臣獨執周禮嘉量聲中黃鍾之法及國語鈞鐘絃準之制皆抑而不用臣前蒙召對言王朴律髙而李照鐘下竊覩御製樂髓新經厯代度量衡篇言隋書依漢志黍尺制管或不容千二百或不啻九寸之長此則明班志以後厯代無有符合者惟蔡雍銅籥本得於周禮遺範雍自知音所以只傳銅籥積成嘉量則是聲中黃鍾而律本定矣謂管有大小長短者蓋嘉量既成即以量聲定尺明矣今議者但爭漢志黍尺無準之法殊不知鐘有鈞石量衡之制况周禮國語姬代聖經翻謂無憑孰為稽古有唐張文收定樂亦鑄銅甌此足驗周之嘉量以聲定律明矣臣所以獨執周禮鑄嘉量者以其方尺深尺則度可見也其容一釜則量可見也其重鈞則衡可見也聲中黃鍾之宫則律可見也既律度量衡如此符合則制管歌聲其中必矣臣昧死欲乞將臣見鑄成銅甌再限半月內更鑄嘉量以其聲中黃鍾之宫乃取李照新鐘就加修整務合周制鐘量法度文字已編寫次未敢具進詔送度等并定以聞十月度等言據鄧保信黍尺二其一稱用上黨秬黍圓者一黍之長纍百成尺與蔡雍合臣等檢詳前代造尺皆以一黍之廣為分惟後魏公孫崇以一黍之長為寸法太常劉芳以秬黍中者一黍之廣即為一分中尉元正以一黍之廣度黍二縫以取一分三家競不能決而蔡雍銅籥本志中亦不明言用黍長廣纍尺合鄧保信黃鍾管內秬黍二百粒以黍長為分再纍至尺二條比保信元尺一長五黍一長七黍又律管黃鍾籥一枚容秬黍千二百粒以元尺比量分寸略同復將實籥秬黍再纍者校之即又不同其籥合升斗亦皆類此又阮逸胡瑗鍾律法黍尺其一稱用上黨羊頭山秬黍中者纍廣求尺制黃鍾之聲臣等以其大黍百粒纍廣成尺復將管內二百粒以黍廣為分再纍至二尺比逸等元尺一短七黍一短三黍蓋逸等元尺並用一等大黍其實管之黍大小不均遂致差異又其銅律管十二枚臣等據楚衍等圍九方分之法與逸等元尺及所實籥秬黍再纍成尺者校之又各不同又所製銅稱二量亦皆類此臣等看詳其鐘磬各一架雖合典故而黍尺一差難以定奪又言太祖皇帝嘗詔和峴等用景表尺典修金石七十年間薦之郊廟稽合唐制以示貽謀則可且依景表舊尺俟天下有妙達鍾律之學者俾考正之以從周漢之制其阮逸胡瑗鄧保信并李照所用太府寺等尺及阮逸狀進周禮度量法其説疏舛不可依用五年五月右司諌韓琦言臣前奉詔詳定鍾律嘗覽景祐廣樂記覩照所造樂不依古法皆率己意别為律度朝廷因而施用識者非之今將親祀南郊不可重以違古之樂上薦天地宗廟竊聞太常舊樂見有存者郊廟大禮請復用之詔資政殿大學士宋綬三司使晏殊同兩制官詳定以聞七月綬等言李照新樂比舊樂下三律衆論以為無所考據願如琦請郊廟復用和峴所定舊樂鐘磬不經鐫磨者猶存三縣竒七虡郊廟殿廷可以更用皇祐三年十二月召兩府及侍臣觀新樂於紫宸殿凡鏄鐘十二黃鍾髙二尺二寸半廣一尺二寸鼓六鉦四舞六甬衡并旋蟲髙八寸四分遂徑一寸二分深一寸一釐篆帶每面縱者四橫者四枚景挾鼓與舞四處各有九每面共三十六兩欒間一尺四寸容九斗九升五合重一百六斤大吕以下十一鐘並與黃鍾同制而兩欒間遞減至應鍾容九斗三升五合而其重加至應鍾重一百四十八斤並中新律本律特磬十二黃鍾大吕股長二尺博一尺股三尺博六寸九分寸之六絃三尺七寸五分太蔟以下股長尺八寸博九寸鼓二尺七寸博六寸絃三尺三寸七分半其聲各中本律黃鍾厚二寸一分大吕以下遞加其厚至應鍾厚三寸五分詔以其圖送中書議者以為周禮大鐘十分其鼓間以其一為之厚小鐘十分其鉦間以其一為之厚則是大鐘宜厚小鐘宜薄今大鐘重一百六斤小鐘乃重一百四十八斤則小鐘厚非也又磬氏為磬倨句一矩有半博為一股為二鼓為三三分其股博去其一以為股博三分其股博以其一為之厚今磬無博厚無長短亦非也五年四月知制誥王洙奏黃鍾為宫最尊者但聲有尊卑耳不必在其形體也言鐘磬依律數為大小之制者經典無正文惟鄭康成立意言之亦自云假設之法孔穎達作疏因而述之據厯代史籍亦無鐘磬依數大小之説其康成穎達等即非身曾制作樂器至如言磬前長三律二尺七寸後長二律一尺八寸是磬有大小者據此以黃鍾為律臣曾依此法造黃鍾特磬者止得林鍾律聲若隨律長短為鐘大小之制則黃鍾長二尺二寸半減至應鍾則形制大少比黃鍾才四分之一又九月十月以無射應鍾為宫即黃鍾大吕反為商聲宫小而商大是君弱臣強之象今參酌其鏄鐘特磬制度欲且各依律數算定長短大小容受之數仍以皇祐中黍尺為法鑄大吕應鍾磬各一即見形制聲韻所歸奏可五月翰林學士承旨王拱辰言奉詔詳定大樂比臣至局鐘磬已成竊緣律有長短磬有大小黃鍾九寸最長其氣陽其象土其正聲為宫為諸律之首蓋君德之象不可並也今十二鐘磬一以黃鍾為率與古為異臣等亦嘗詢逸瑗等皆言依律大小則聲不能諧故臣竊有疑請下詳定大樂所更稽古義參定之是月知諌院李兑言曩者紫宸殿閲太常新樂議者以鐘之形制未中律度遂斥而不用復詔近臣詳定竊聞崇文院聚議而王拱辰欲更前史之義王洙不從議論喧嘖夫樂之道廣大微妙非知音入神豈可輕議西漢去聖尚近有制氏世典大樂但能紀其鏗鏘而不能言其義况今又千餘年而欲求三代之音不亦難乎且阮逸罪廢之人安能通神明述作之義務為異説欲規恩賞朝廷制樂數年當國財匱乏之時煩費甚廣器既成矣又欲改為雖命兩府大臣監議然未能裁定其當請以新成鐘磬與祖宗舊樂參校其聲但取諧和近雅者合用之六月帝御紫宸殿奏太常新定大安之樂召輔臣至省府館閣預觀焉賜詳定官器幣有差八月詔南郊姑用舊樂其新定大安之樂常祀及朝會用之翰林學士胡宿上言曰自古無並用二樂之理今舊樂髙新樂下相去一律難並用且新樂未施郊廟先用之朝會非先王薦上帝配祖考之意帝以為然九月御崇政殿召近臣宗室臺諌省府推判官觀新樂并新作晉鼓乃以瑗為大理寺丞逸復尚書屯田員外郎保信領榮州防禦使入內東頭供奉官賈宣吉為內殿承制並以制鍾律成特遷之至和二年潭州上瀏陽縣所得古鐘送太常初李照斥王朴樂音髙乃作新樂下其聲太常歌工病其太濁歌不成聲私賂鑄工使減銅齊而聲稍清歌乃協然照卒莫之辨又朴所制編鐘皆側垂照瑗皆非之及照將鑄鐘給銅於鑄瀉務得古編鐘一工人不敢毀乃藏於太常鐘不知何代所作其銘云粵朕皇祖寶和鐘粵斯萬年子子孫孫永寶用叩其聲與朴鐘夷則清聲合而其形側垂瑗後改鑄正其鈕使下垂叩之弇鬱而不揚無射鐘又長甬而震掉聲不和哲宗元祐三年范鎮樂成上其所製樂章三鑄律十二編鐘十二鎛鐘衡一尺一斛一響石為編磬十二特磬一簫笛塤箎巢笙和笙各二并書及圖法帝與太皇太后御延和殿詔執政侍從臺閣講讀官皆往觀焉賜鎮詔曰朕惟春秋之後禮樂先亡秦漢以來韶武僅在散樂工於河海之上往而不還聘先生於齊魯之間有莫能致魏晉以下曹鄶無譏間有作者猶存典型然銖黍之一差或工商之易位惟我四朝之老獨知五降之非審聲知音以律生尺覽詩書之來上閲簨簴之在廷君臣同觀父老太息方詔學士大夫論其法工師有司考其聲上追先帝移風易俗之心下慰老臣愛君憂國之志究觀所作嘉歎不忘髙宗紹興十六年命禮局造鏄鐘四十有八編磬一百八十七特磬四十八及添製編鐘等命軍器所造建鼓八雷鼓二晉鼓一雷鼗二柷敔各四尋製金鐘玉磬二架初元豐本虞廷鳴球及晉賀循采玉造磬之義命榮咨道肇造玉磬元祐親祠明堂一用之久藏樂府至政和加以磨礲俾協音律并造金鐘專用於明堂蓋堂上之樂歌鐘居左歌磬居右金玉稟氣於乾純精至貴故鐘必以金磬必以玉始備金聲玉振之全此中興所以繼作也於是帝諭輔臣以鐘磬音律其餘皆和惟黃鍾大吕猶未應律宜熟加考究詔禮官以鑄造鏄鐘更須詳審令聲和而律應乃可奉祀命太常先期按閲仍用皇祐進呈雅樂禮例皇帝御射殿召宰執侍從臺諌寺監館閣及武臣刺史以上閲視新造景鐘及禮器皇帝即御座撞景鐘用正旦朝會三曲奏宫架之樂其製造官推恩有差添置景鐘樂正一鏄鐘樂工十有二特磬樂工亦如之次降下古制銅錞一增造其二古銅鐃一增造其六改造登歌夷則律玉磬降到長笛二十有四並付太常寺掌之専俟大禮施用明太祖初克金陵置太常司掌祭祀禮樂之事凡樂四等曰九奏曰八奏曰七奏曰六奏舞二曰文舞曰武舞樂器不徙陵園之祭無樂又置教坊司掌宴會大樂設大使副使和聲郎左右韶舞左右司樂皆以樂工為之後改和聲郎為奉鑾孝宗𢎞治十四年九月重鑄朝鐘時內官監太監李興工部尚書曾鑑奉命改鑄既成計費白金十餘萬兩興鑑皆受賞匠官傅玖等各升職加俸有差未三月而鐘璺工科都給事中馬子聰等劾之命興鑑等罰俸一月傅玖等所升職事俸糧冠帶俱奪之明吕懷劉濂韓邦竒黃佐王邦直之徒著書甚備職不與典樂託之空言而已張鶚雖因知樂得官候氣終屬渺茫不能準以定律𢎞治中莆人李教授文利著律吕元聲獨宗吕覽黃鍾三寸九分之説世宗初年御史范永鑾上其書其説與古背馳不可用嘉靖十七年遼州同知李文察進所著樂書四種禮官謂於樂理樂書多前人所未發者乃授文察為太常典以奬勸之而其所云按人聲以考定五音者不能行也神宗時鄭世子載堉著律吕精義律學新説樂舞全譜共若干卷不宗黃鍾九寸不用三分損益不拘隔八相生不取圍徑皆同具表進獻未及施行欽定續通典卷八十七
