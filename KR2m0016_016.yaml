body:
  text: 食貨平準均輸唐德宗時趙贊請置常平官兼儲布帛於兩都江陵成都揚汴蘇洪置常平輕重本錢積米粟布帛絲麻貴則下價而出之賤則加估而收之并𣙜商賈錢以贍常平本錢帝從之後唐明宗天成元年詔省司及諸府置稅茶場院自湖南至京六七處納稅以至商旅不通及州使置雜稅務交下煩碎宜定合稅物色名目商旅即許收稅不得邀難二年敕應三京諸道州府商旅等多不係屬州府皆是省司差置場官特議改更貴除繁屑自今以後諸商稅並委逐處州府撲斷依省司常年定額勾當辦集冀除生事之端不爽豐財之理漢髙祖乾祐元年詔軍國之費務在豐財關市之征資于行旅所宜優假俾遂流通應天下商旅往來所在並須饒借不得妄有邀勒周太祖廣順元年李筠乞除放黃澤關商稅課利從之宋制調絹紬布絲綿以供軍須又就所産折科和市東京置榷貨務所收平羅小綾以供服用真宗大中祥符三年河北轉運使李士衡言本路所給軍士之帛請令官司預給帛錢俾民及時輸送則民亦獲利而官亦足用從之仍令優豫其直自是諸路亦如之或蠶事不登則許以大小麥折納按吳曽能改齊漫録宋代預買紬絹謂之和買又按僧文瑩玉壺清話及王闢澠水燕談皆載祥符初王旭知潁州時大飢出府錢十萬緡與民約曰來年蠶熟每貫輸一縑謂之和買自爾為例後李士衡行之陜西民以為便遂行于天下即前代平準之遺制也又制官所須物多有司下諸州從風土所宜及民産厚薄而率買謂之科率神宗熙寧二年立均輸市易之制其時制置三司條例言今天下財用無餘典領之官拘于弊法內外不相知盈虛不相補諸路上供本有常數豐年便道可以多致而不能贏儉年物貴難以供億而不敢不足逺方有倍蓰之輸中都有半價之鬻徒使富商大賈乘公私之急以擅輕重斂散之權今發運使實總六路之賦而其職以制置茶鹽礬酒稅為事軍儲國用多所仰給宜假以錢貨資其用度周知六路財賦之有無而移用之凡糴買稅斂上供之物皆徙貴就賤用近易逺令預知中都帑藏年支見在之定數所當供辦者得以從便變易蓄買以待上令稍收輕重斂散之權歸之公上而制其有無以便轉輸庶幾國用可足民財不匱詔令本司具條例以聞以發運使薛向領均輸平準事時議慮其為擾多以為非向既董其事乃請置官設屬帝依其奏乃辟置劉忱衛琪孫圭張穆之陳倩為屬又請有司具六路所當上供之數中都所用及所儲度支之數凡當計置幾何皆預降付司從之權開封府推官蘇軾言均輸立法之初其説尚淺徒言徙貴就賤用近易逺然而廣置官屬多出緡錢豪商大賈皆疑而不敢動以為雖不明言販買然既已許之變易變易既行而不與商賈爭利未之聞也夫商賈之事曲折難行其買也先期而與錢其賣也後期而取直多方相濟委曲相通倍稱之息由此而得今官買是物必先設官置吏簿書廪祿所用必多非良不售非賄不行是以官買之價比民必貴及其賣也弊復如前商賈之利何緣而得縱使其間薄有所獲而征商之額所損必多諫官李常亦極論之後有魏繼宗者自稱草澤上言京師百貨所居市無常價貴賤相傾富能奪貧能與始可以通天下之利乃下詔曰天下商旅物貨至京多為兼并之家所困宜出內藏庫錢帛選官于京師置市易務中書奏市易務監官二提舉官一勾當公事官一許召在京諸行鋪牙人充然至後均輸之制究不能行市易雖行之而究無利也其時置市易司者秦鳯市易司則制于古渭城兩浙市易司則置于杭州夔路市易司則置于黔州其他則成都廣州鄆州皆置司設官焉遼太祖神册三年置羊城于炭山之北以通市易太宗置南京城北有市東平郡城中置看樓分南北市聖宗統和三年詔禁行在市易布帛不中尺度者七年詔以南北府市場人少通易州市耶律隆運又請平諸郡商賈價從之金宣宗興定三年議行均輸又敕和市邊城軍輸毋至抑配貧民元世祖中統四年詔立燕京平準庫以均平物價至元二年立諸路平準庫十三年立市易庫于諸路凡十有一掌市易幣帛諸物又敕上都和顧和買並依大都明太祖洪武二年令凡內外軍民官司並不得指以和顧和買擾害于民如果官司缺用之物照依時值對物兩平收買英宗正統二年令買辦物料該部委官一員會同府縣委官拘集該行鋪户估計時價關出官錢仍委御史一員會同給與鋪户收買送納穆宗隆慶四年户部條議恤商事宜言物價與時低昂而錢糧因時辦納若先期估計則貴賤無憑或倉場逺近所用多寡遙度懸斷豈盡合宜此後九門鹽法委官與十三司掌印官及巡青科道估價務在隨時定其價值其內庫鹽局召買物料亦倣此互市臣等謹按互市之制其來尚矣自漢初與南越通關市後漢通交易于烏桓北單于鮮卑北魏立互市于南陲隨唐通貿易于西北然第用以通有無廣懋遷而已立制未備史志不詳故杜典未之載也宋遼金疆宇分錯敵國所産各居其有物滯而不流人艱于所匱于是特重互市之法和則許之戰則絶之既以通貨兼用善鄰所立𣙜場皆設場官嚴厲禁廣屋宇以易二國之所無而權其稅入亦有資于國用焉今别立一門敘于平準均輸之後而明代互市之制亦略見于篇宋初與南唐通市太祖乾德二年不許商旅涉江于建安漢陽蘄口置三榷署開寶三年徙建安榷署于揚州及江南平𣙜署仍舊置專掌茶貨四年置市舶司于廣州以知州兼使通判兼判官太宗太平興國二年令鎮易雄霸滄州各置榷務命常參官與內侍同掌輦香藥犀象及茶與遼交市後有范陽之師乃罷端拱元年復詔許互市淳化二年令雄霸州靜戎軍代州鴈門寨置榷署如舊制尋復罷真宗咸平五年契丹求復置署朝議以其翻覆不許知雄州何承矩繼請乃聽置于雄州六年罷景德初復通好請商賈即新城貿易詔北商齎物貨至境上則許之二年令雄霸州安肅軍置三𣙜場北商趨他路者勿與為市遣都官員外郎孔揆等乘傳詣三𣙜場與轉運使劉綜并所在長吏平互市物價稍優其直豫之又于廣信軍置場皆廷臣專掌通判兼領焉三年詔民以書籍赴沿邊榷場博易者非九經書疏悉禁之凡官鬻物如舊髙宗紹興十二年盱眙軍置榷場官監與北商博易淮西京西陜西榷場亦如之遼聖宗統和二十三年置𣙜場于振武軍興宗重熙八年禁朔州易羊于宋道宗咸雍五年禁朔州路羊馬入宋金太祖時于西北招討司之燕子城北羊城置榷場以易畜牧熙宗皇統元年夏國請置榷場許之後許宋人之請各置榷場于內界以通互市興兵則罷通好則復置焉元世祖中統元年置互市于漣水軍至元十三年定江南凡鄰海諸郡舶貨其貨嘉者以十分取一粗者以十五分取一明成祖永樂間設馬市三一在開原南關以待海西一在開原城東五里一在廣寧皆以待朵顔三衛定直四等既而城東廣寧市皆廢惟開原南關馬市獨存大同馬市始英宗正統三年巡撫盧睿請令軍民平價市駝馬遣官指揮李原等通譯語禁市兵器銅鐵帝從之憲宗成化十四年陳鉞撫遼東復開三衛馬市繼令入市開原廣寧等處世宗嘉靖三十年以總兵仇鸞言詔于宣府大同開馬市命侍郎史道總理之後召道還然諸部嗜馬市利未敢公言大舉而邊臣亦多畏懾以互市啖之穆宗隆慶四年宣大互市復開神宗萬厯二十二年又開遼東義州木市二十六年從巡撫張思忠奏罷之遂并罷馬市其後總兵李成梁力請復而薊遼總督萬世德亦疏于朝三十九年復開馬木二市後以為常平糶常平義倉社倉附臣等謹案杜典食貨門終之以輕重蓋取管子輕重斂散之義而具列平糶常平義倉諸細目因敘述自管子始故以輕重為名今續纂所載即以平糶常平義倉為目而不復以輕重標名循其實也至宋始有社倉之名亦附見焉唐德宗貞元四年詔京兆府于時價外加估和糴差清強官先給價直然後貯納憲宗即位之初有司以豐年請畿內和糴當時府縣督限甚緊白居易時為畿尉上疏曰和糴之事以臣所觀有害無利何者凡曰和糴則官出錢民出榖兩和商量然後交易今則督限蹙迫甚于賦稅何名和糴今若令有司出錢開場自糴比時價稍有優饒利之誘人人必情願必不得已則不如折糴折糴者折青苗稅錢使納斗斛免令賤糶别納見錢在于農人亦真為利矣憲宗元和元年正月制嵗時有豐歉榖價有重輕將備水旱之虞在權聚斂之術應天下州府每年所稅地丁數內宜十分取二分均充常平倉仍各逐穩便收貯以時糶糴至元和六年制京畿舊榖已盡粟麥未登宜以常平義倉粟貸借百姓十三年户部侍郎孟簡奏天下州府常平義倉等斗斛請準舊例減估出糶但以石數奏申有司更不收管州縣得專以利百姓從之敬宗寶厯元年以兩京河西大稔委度支和糴以備災沴文宗開成元年户部奏諸州府所置常平義倉復請今後通公私田畝别納粟一升添貯義倉斂之至輕事必通濟行之既久自至盈充從之後唐莊宗同光三年敕自春以來水潦為患物價騰踴宜令京西諸道州府凡閉糶斛斗不得輒有稅率及經過水陸關坊鎮縣妄有邀難明宗天成二年中書舍人張文寶上言今嵗時雨不愆秋苗倍熟應大熟處望下敕收糴以備歉嵗長興元年右司郎中盧導奏請置常平義倉以備凶嵗周太祖廣順元年敕天災流行分野代有茍或閉糴豈是愛人宜令江淮渡口鎮鋪不得止淮南人糴易宋太祖乾德元年詔曰多事之後義倉廢寢偶或小歉失于預備宜令諸州于所屬縣各置義倉自今官所收二稅石别稅一斗貯之遇歉則給與民太宗端拱二年置折中倉許商人輸粟令執劵抵江淮給其茶鹽此其通輕重之時宜也詳載鹽鐵門淳化五年令諸州置惠民倉如榖稍貴即減價糶與貧民按此即常平倉之制特異其名耳真宗景德三年詔于京東京西河北河東陜西淮南江南兩浙各置常平倉逐州量留上供錢付司農司係帳三司不問出入令轉運使併本州委幕職一人專其事每夏秋加錢收糴遇貴減價出糶凡收糴比市價量增出糶稍為減價神宗熙寧二年制置三司條例司請以常平倉斗斛可通融轉運司依陜西青苗錢例願預給者聽之令隨稅納半為夏料半為秋料內有願請本色或依時價納錢者皆許從便如遇災歉許展至次料豐熟日納非惟足以待荒歉之患民既受貸則兼併之家不得乘新陳不接以邀倍息又常平廣惠之物收藏積滯必待荒歉物貴然後出糶所及不過城市遊手之人今通一路有無貴發賤斂以廣蓄積使農人得以趨時赴事而兼并不得乘其急凡以利民而公家無所利亦先王散惠興利以為耕斂補助之意也欲量諸路錢榖多少分遣官提舉仍先自河北京東淮南三路施行有緒乃推之諸路從之諸路各置提舉一人以朝官為之管勾一人以京官為之右諌議大夫司馬光言常平倉者乃三代聖王之遺法榖賤不傷農榖貴不傷民民賴其食而官收其利法之善者無過于此比來所以隳廢者由官吏不得其人非法之失也今聞條例司盡以常平倉錢為青苗錢又以其榖換轉運司錢是欲盡壞常平專行青苗也國家每遇凶歉供軍倉自不能足用固無羡餘以濟飢民所賴者只有常平倉錢榖耳今一旦盡散之若有豐年將以何錢平糴若有荒歉將以何榖賙贍乎後帝以諸路旱災常平司未能振濟諭輔臣曰天下常平倉若以一半散錢取息一半減價糶賣使二者如權衡之相依不得偏重民必受賜自是詔諸路州縣據已支錢榖通數常留一半外方得給散高宗建炎二年臣僚言常平和糴州縣視為具文以新易舊法也間有損失而未嘗問不許借貸法也間有悉充他用而實無所儲乃詔委官遍行按視紹興二十八年趙令詪言州縣義倉米積欠陳腐乞出糶及水旱災荒不拘檢放及七分便許賑濟沈該奏在法義倉止許賑濟若出糶恐失初意乃令量糶三之一樁收價錢次年收糴撥還孝宗淳熙八年浙東提舉朱熹言乾道四年間建民艱食熹請于府得常平米六百石請本鄉土居朝奉郎劉如愚共任賑貸夏受粟于倉冬則加息以償自後逐年斂散或遇少歉即蠲其息之半大飢則盡蠲之行之既久得息米造成倉厫以為社倉不復收息雖遇荒歉人不闕食其後真德秀帥長沙倣其制行之于是各州縣亦間有行之者皆以熹之已行者為式然南渡以後行和糴科糴之法寧宗嘉定時為尤甚陳耆卿奏曰臣聞豐歉在天而制其豐歉者在人制豐歉之法莫如和糴和糴將以利民也而民或為害其故何哉夫有粟者之欲錢猶有錢者之欲粟也彼既欲之則唯恐和糴之不行耳而乃以為害者非其不識事情蓋由民與民為市此其所樂也民與官為市此其所畏也畏官而復虐于官故寧閉户以失利毋傾囷以賈害何則市之價增官之價減一害也市無斛面而官有斛面二害也市以一人操槩量無他用焉而官之監臨者多誅求無厭三害也市先得錢而官先槩粟有趨候之苦有錢陌不足之弊四害也四害不去則荒歉未得其利而豐年已受其擾故朝廷降度牒以收糴此意甚溥苐恐所在州縣未能戢其吏姦萬一如前之害則其關係邦本不輕度宗咸淳元年詔豐儲倉撥公田米付平糴倉遇米貴平價出糶監察御史趙俯孫上言今日急務莫過于平糴方粒食翔踴未知所留市井之間見楮而無米推原其由實富家大姓所至閉廩所以糴價愈高而楮價隂減陛下念小民艱食為之發常平義倉然為數有限安得人人而濟陛下宜嚴課官吏使楮價不因之而輕物價不因之而重後臣僚又言州縣交量科糴之弊乞行令下江西湖南運司各仰遵守已降指揮遴選諸郡清強正佐幕職等官往鄰郡和糴勿令右選及權豪貪謬人充仍牒本路州軍守倅毋使淹滯過者從御史臺覺察聞奏糶糴散斂之法宋制特詳和糴昉于唐而宋元豐初于河東路十三州行之結糴行于熙寧八年所糴多散官寄糴行于元豐二年于內郡權輕重俵糴行于熙寧八年其法省嵗漕費權河北入中之價均糴行于政和元年其法以人户田土分上下等均敷數多數少博糴行于熙寧七年其法以常平及省倉餘糧聽民秋成博糴兌糴行于熙寧九年其法于麥熟州郡及時兑糶括糴行于元符元年其法諭民毋得與公爭糴括索蓄家量存所用盡糴入官蓋宋代糴法為軍餉邊儲一大事熙豐而後立法既繁其名目亦不一云遼聖宗統和十三年令郡縣置義倉秋熟社民隨所獲出粟儲倉社司籍其數遇荒歉發以賑民後東京咸信蘇復辰海同銀烏遂春泰等五十餘城內沿邊諸州各有和糴倉依舊法出舊易新許民自願假貸收息所儲甚多雖纍兵興未嘗乏用道宗泰康時耶律孟簡以中京飢減價糶粟以賑民金世宗大定十四年定常平倉之制詔中外行之其法尋廢至章宗明昌元年御史請復設敕省臣詳議大定舊制豐年則增市價十之二以糴荒歉則減市價十之一以出令諸處官兵三年食外可充三月免糴其不及者俟豐年糴之并令提刑司各路計司兼領之郡縣吏沮格者糾之能推行者加擢用三年敕常平倉往往有名無實况逺縣人民豈肯跋涉以就州府糶糴可各縣置倉命州府縣官兼提控管勾遂定制縣距州六十里內就州倉六十里外特置郡縣吏受代所糴粟無壞一月內同管勾交割給由豐稔而收糴不及一分者本等內降提刑司體察直申尚書省至日斟酌黜陟又敕置常平倉之地令州府官提舉之縣官兼督其事以所糴多寡約量升降為制又敕華州下邽縣置武定殖倉京兆櫟陽縣置粟邑鎮倉許州武陽縣置北舞渡倉各設倉場都監一人領之其和糴和糶之法則皇統二年燕西東京河東河北山東汴京等秋熟詔有司增價和糴其後屢詔行之宣宗貞祐三年帝聞近京郡縣多糴于京師榖價翔踴令尚書省集户部講議所開封府轉運使議所以制之者户部及講議所言以五斗出城者可闌糴其半轉運使謂宜悉禁其出上從開封府議謂寶劵初行民甚重之但以河北陜西諸路所支既多人遂輕之商賈爭收至京以市金銀金銀昻榖亦隨之若令寶劵路各殊制則不可復至河南河南金銀賤而榖自輕若閉京城粟不出則外亦自守不復至京穀當益貴宣諭郡縣小民無妄增價官為定制務從其便後上封事者有言近來艱食雖由調度征斂之煩亦兼并之家有以奪之也熟收則乘賤多糴困急則貸人私立質劵名為無利而實數倍飢民唯恐不得莫敢較者故農工甫畢官賦未償而積已空矣此富者益富而貧者益貧也國朝立法舉財物者月利不過三分積久至倍則止今或不期月而息三倍願明敕有司舉行舊法豐熟之日增價和糴則在公有益而私無損矣乃詔宰臣行之哀宗天興二年蔡州加設四隅和糴官元初設義倉于鄉社又置常平于路府世祖至元六年乃立增糴減糶之制以和糴糧及諸河倉所撥糧貯焉二十三年又以鐵課糴糧充焉義倉亦于至元六年更立其法其制社置一倉以社長主之豐稔則納粟荒歉則就給遇水災飢歉皆發義倉賑之其和糴和糶之法則中統二年置和糴于開平以户部郎中宋紹祖為提舉和糴官以後屢行其法于各路府按和糴之名有二曰市糴糧鹽折草率皆增其直而市于民于是兵不乏食馬不乏芻而民亦不困其為法蓋亦善矣苐行之既久官吏之需求百出價值之髙下懸殊名雖和而實強也市糴糧之法每年酌量行之其鹽折草之法成宗大德八年定其則例每年以河間鹽令有司于五月預給京師郡縣之民至秋成各驗鹽數輸草以給京師秣馬之用每鹽二斤折草一束重一十斤嵗用草八百萬束折鹽四萬引云明太祖時州縣東西南北設預備倉四以賑荒歉即前代常平之制成祖永樂中置天津及通州左衛倉且設北京三十七衛倉益令天下府縣多設倉儲預備倉之在四鄉者移置城內逮會通河成始設倉于徐州淮安德州臨清并天津凡五倉以資轉運英宗正統四年大學士楊士竒上言堯湯之世不免水旱堯湯之民不聞困瘠者有備故也太祖篤意養民備荒有制天下郡縣悉出官鈔糴榖貯倉以時散斂厯久弊滋豪猾侵漁榖盡倉毁風憲官不行舉正守令漫不究心事雖若緩所繫甚切請擇遣京官亷幹者往督有司凡豐稔州縣各出庫銀平糴儲以備荒具實奏聞郡縣官以此舉廢為殿最風憲巡厯各務稽考有欺蔽怠廢者具奏罰之庶幾官有備荒之積民無旱潦之虞仁政所施無切于此詔户部急行之乃制侵盜之罰納穀一千五百石者敕奬為義民免其徭役孝宗𢎞治三年限州縣十里以下積萬五千石二十里積二萬石衛千户所萬五千石百户所三百石考滿之日稽其多寡以為殿最不及三分者奪俸六分以上降調初預備倉皆設倉官至是革之令州縣官及管糧倉官領其事嘉靖初諭德顧鼎臣言成𢎞時每年以存留餘米入預備倉緩急有偹今秋糧僅足兑運預備無粒米一遇災傷輒奏留他糧及勸富民借榖以應故事乞急復預備倉糧以裕民帝乃令有司設法多積米榖仍倣古常平法春賑貧民秋成還官不取其息府積萬石州四五千石縣二三千石為率既又定十里以下萬五千石纍而上之八百里以下至十九萬石其後積粟盡平糶以濟貧民儲積漸減穆宗隆慶時劇郡無過六千石小邑止千石久之數益減科罰亦益輕神宗萬厯中上州郡至三千石止而小邑或僅百石有司沿為具文屢下詔申飭率以虗數欺罔而已𢎞治中江西巡撫林俊嘗請建常平及社倉世宗嘉靖八年乃令各撫按設社倉令民二三十家為一社擇家殷實而有行義者一人為社首處事公平者為社正能書算者一人為社副每朔望會集别户上中下出米四斗至一斗有差斗加耗五合上户主其事年飢上户不足者量貸稔嵗還倉中下户酌量賑給不還倉有司造册送撫按嵗一察核倉虛罰社首出一嵗之米其法頗善其和糴和糶之制惟成化十八年南京荒歉米貴南京户部議減糶倉米以濟民候秋成平糴還倉欽定續通典卷十六
