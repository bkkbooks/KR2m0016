body:
  text: 兵間諜唐郭元振為武衛參軍會吐蕃乞和其大將論欽陵請罷四鎮兵元振言吐蕃倦徭戍久矣咸願和解以欽陵欲裂四鎮專制其國故未歸欵陛下誠能嵗發和親使而欽陵不從則其下必怨斯離間之漸也如其計後吐蕃君臣相猜攜卒誅欽陵又李晟邏得朱泚將姚令言等諜者令釋縛飯飲之遣還敕曰為我謝令言等善為賊守勿不忠於泚乃引兵叩都門賊不敢出宋太祖忌江南林仁肇威名賂其侍者竊取仁肇畫像懸别室引江南使者觀之問何人使者曰林仁肇也曰仁肇將來降先持此為信又指空館曰將以此賜仁肇使者歸白江南主江南主不知其間鴆殺仁肇又曹瑋馭軍嚴明尤善用間周知敵動靜時李繼遷叛徙瑋知鎮戎軍繼遷虐用其民瑋知其下多怨即移書諸部諭以朝廷恩信以離諸羌由是康諾爾等族請內附渭州有告戍卒叛入夏國者瑋方對客奕棋不聽言者不已遽曰吾使之往也未幾夏人斬叛者投其首境上又种世衡居青澗城時夏元昊方強其貴人伊勒綱朗淩裕勒且兄弟有材謀親信用事邊臣欲以謀間之鄜延經略使龎籍兩為保安軍守劉拯書賂番部博綽以逹伊勒兄弟而涇原路王沿葛懷敏亦遣人持書及金寶以遺裕勒且會綱朗凌令朗默特實竒默囊等三人詣世衡請降世衡知其詐曰與其殺之不若因以為間留使監商稅出入騎從甚寵有僧王光信者趫勇善騎射習知番部山川道路世衡出兵常使為鄉導數蕩族帳奏以為三班借職改名嵩世衡為蠟書遣嵩遺綱朗凌言朗默特等已至朝廷知王有向漢心命為夏州節度使奉錢月萬緡旌節已至趣其歸附以棗綴畫龜喻其早歸之意綱朗凌得書大懼自所治執嵩歸元昊元昊疑綱朗凌二已不遣還所治且錮嵩穽中使其臣李文貴以綱朗凌㫖報世衡且言不逹所遺書意或許通和願賜一言世衡以白籍時朝廷已欲招撫籍召文貴至諭以國家開納意縱使還報元昊得報出嵩禮之甚厚使與文貴偕來自是繼遣使者請降稱臣如舊世衡聞伊勒兄弟誅為文越境祭之一云綱朗凌號伊勒王裕勒且號天都王世衡既以計誅伊勒欲并間天都因設祭境上書祭文於版述一將相結有意本朝悼其垂成而失其文雜紙幣中伺敵至急爇之以歸版字不可遽滅敵得之以獻元昊天都亦以此得罪元昊既失心腹之將悔恨無及乃定和議又嶽飛知劉豫結尼雅滿而烏珠惡劉豫可以間而動會軍中得烏珠諜者飛陽責之曰汝非吾軍中人張斌乎前遣汝至齊誘致四太子何竟不報今齊使至爾乃來不亦緩乎諜冀緩死即詭服乃作蠟書若與豫誘四太子狀謂諜曰姑貸汝圖後效刲股納書戒勿泄諜歸以書示烏珠果疑豫馳白其主廢之金世祖既平和諾克薩逹富珠哩部布呼猶保薩阿宗村招之不出布呼之屬曰舒嚕舒嚕之母嫁於圖們部逹爾罕貝勒而為之妾逹爾罕與族兄弟瑪賽音貝勒俱事世祖世祖欲間舒嚕於布呼謂逹爾罕曰汝之事我不如瑪賽音之堅固也蓋謂舒嚕母子一彼焉一此焉以此撼舒嚕舒嚕聞之遂殺布呼而降又赫舍哩志寧討鄂斡大敗之鄂斡入於奚中志寧獲敗將碩和卓釋弗殺許以官賞縱之歸約以捕鄂斡自效碩和卓既去見鄂斡祕不言見獲事乃反間奚人於鄂斡曰陷泉失利奚人有二志不可不察當是時鄂斡屢敗其下亦各有心碩和卓乃與賊帥實圖根執鄂斡降又完顔霆改大名路提控取玉田三河香河三縣徙屯濱棣淄留副將孫江守滄州江降於王楫而將兵圍觀州霆乃詐作書與孫江約同取滄州者王楫得其書果疑孫江與霆有謀召江還殺之霆乃定觀州而還明太祖駐建康陳友諒率兵六十萬順流攻取又遣使約張士誠同入冦太祖慮二人謀合為害益難支乃因康茂才與友諒舊知遣為間紿僞降約為內應招之速來紿告以虛實使分兵三道以弱其勢遂令閽者至友諒軍友諒得書甚喜問曰康公何在閽者曰見守江東木橋乃與酒食遣還謂曰吾至呼老康為驗閽者還以告乃命李善長亟撤江東橋易以鐵石友諒率舟師至太祖命馮勝常遇春伏於石灰山側徐逹於南門外楊璟於大勝港張德勝朱虎將艨艟出龍江關外自總大軍於獅子山友諒以舟不得進徑衝江東橋見大石驚呼老康無應之者即遣兵登岸立栅太祖下令諸軍拔栅爭戰伏兵起大破之友諒走還又徐逹攻平江不下時莫天佑為張士誠守無錫更相脣齒其將楊茂善泅數從水中為偵逹獲茂釋而厚賞之使往來為間因盡得其虛實遂破之又王守仁勘事福建路經南贑值宸濠叛亂乃與縣令顧泌約知府伍文定等起兵討賊恐濠直趨南京遣諜四出投檄言京師湖廣廣東西江浙等處各發兵數十萬以疑濠使其遲出逺近聞風有備又密致書與賊心腹李士實劉養正及閔念四吳十三若有約內應者濠得致書人及密書遂疑士實等士實勸濠舍安慶直趨南京否則徑出蘄黃趨京師濠不聽以至於敗又沈希儀為右江栁慶參將駐栁州時象州武宣融縣猺反詔討之希儀謂圖勝算莫如得賊情得賊情莫如用諜間使官府人為之則賊生疑於是隂求得與猺通販易者數十人釋其罪而厚撫之使詗賊賊動靜希儀無不知之雖肘腋親近絶不得聞人皆以為神希儀初至令熟猺得出入城中無所禁因厚賞其黠者使為諜後漸令猺婦人見其妻賚以酒食繒布其夫常以賊情告者則隂厚之諸猺婦利賞爭勸其夫輸賊情或自入府言之以故賊益無所匿形多易靣為熟猺自是栁城四旁數百里無敢攘敓者不信敵間附唐李希烈反遷曹王臯鎮江西至豫章大集將吏得裨校伊愼擢為大將治戰艦裒兵二萬以士二千五百委慎等教之初愼嘗從希烈平襄州至是希烈懼為臯用乃遺慎七屬甲詐為慎書行間焉德宗遣中使即軍中斬之臯乃抗疏論雪上章未報會賊兵泝江來冦臯乃召慎勉之令戰斬首數千朝廷始信其不二臣等謹案用間之法我以間往敵亦以間來惟我不信間而後可以用間杜典無此目謹倣其例增附於此行師先在量力不可窮兵唐李光弼討史思明時魚朝恩屢上賊可滅狀詔諭光弼光弼固言賊方鋭未可輕動僕固懷恩媢光弼功隂佐朝恩陳掃除計使者來督戰不得已出師北邙令附山阻險而陳懷恩不從賊據髙原委物佯北官軍爭獲之伏發大潰宋趙范趙葵欲乘時撫定中原建守河據關收復三京之議朝臣多以為未可獨鄭清之力主其說乃命趙范移司黃州刻日進兵喬行簡時在告上疏曰臣不憂師出之無功而憂事力之不可繼有功而至於不可繼則其憂始深矣夫規恢進取必須選將練兵豐財足食今將乏卒寡財匱食竭臣恐北方未可圖而南方已先騷動矣不聽詔全子才合淮西兵萬人赴汴趙葵以淮西兵五萬人取泗州由泗趨汴㑹子才軍命楊誼等將兵入洛陽誼至洛東三十里遇敵伏兵大潰葵等亦棄汴而歸遼太祖天贊二年皇子輝庫濟為大元帥圖魯卜為副既克平州進軍燕趙攻下曲陽北平至易州易人來拒踰濠而陳李景章出降言城中人無鬬志大元帥將修攻具圖魯卜諫曰我師逺來人馬疲憊勢不可久留乃止軍還大元帥以其謀聞太祖大恱賜賚優渥金太祖伐遼克臨潢府至沃赫河宗幹諫曰地逺時暑士疲馬乏若深入敵境糧運不繼恐有後艱帝從之遂班師又布薩忠義移軍壓淮境遣赫舍哩志寧率偏師渡淮取旴𣅿濠廬和滁等州宋人懼而世宗意天下厭苦兵革思與百姓休息詔忠義度宜以行忠義使右監軍宗叙入奏將近暑月乞俟秋凉進發詔許之又布薩揆伐宋下真州宋遣陳璧來告和揆以乞辭未誠徒欲緩師卻之宋人不獲請成乃決巨勝成公雷塘渚積水以為阻盡焚其廬舍儲積過江遁去揆以方春地濕不可久留且欲休養士馬振旅而還元阿巴齊從皇子鎮南王征交址至思明州賊阻險拒守阿巴齊選精鋭與賊戰於女兒關斬馘萬計餘兵棄關走於是大軍深入進至交州陳日煊空其城而遁阿巴齊曰賊棄巢穴而匿山海者意待吾之敝而乘之耳將士多北人春夏之交瘴癘交作賊弗就擒吾不能持久矣今出兵分定其地招降納附勿縱士卒侵掠急捕日煊此策之善者也臨敵易將五代梁王彥章將軍攻晉之夾寨南城假凝副之彥章血戰功獨多假凝有異志隂與梁之要臣趙巖張漢傑交通匿彥章捷書而獨進段凝所奏末帝初疑其事已而使者至軍獨賜勞凝而不及彥章軍士皆失色及楊劉之敗凝乃誣奏彥章使酒輕敵以至於敗趙巖等從中毁之遂罷彥章以凝為招討使凝尋帥精兵數萬降唐金宣宗貞祐三年詔諸道按察司講究防秋盧庸陳便宜有曰掌軍之官不宜臨時易代臨敵易將乃兵家所忌將非其人屢代何益時論韙之元舒穆嚕額森從穆呼哩取東京時金人新易東京留守將至額森諜知之即與數騎邀而致之懷其所受誥命至東京謂守門者曰我新留守也入據府中問吏列兵於城何為交以邊備對額森曰吾自朝廷來中外晏然奈何欲陳兵以動搖人心乎即命撤守備曰冦至在我是夜下令易置將佐部伍三日穆呼哩至入東京不費一矢又順帝至正十三年張士誠據髙郵叛右丞相托克托總大軍出討數敗士誠圍高郵隳其外城城且下順帝信讒解托克托兵柄削官爵以他將代之士誠乘間奮擊元兵潰去由是復振明世宗嘉靖時倭冦猖獗東南命張經總督江南江北浙江山東福建湖廣諸軍討之便宜行事時倭二萬餘據柘林川沙窪其黨方踵至經日選將練兵為搗巢計以江浙山東兵屢敗欲俟所徴兩廣狼土兵至用之乃遣總兵官俞大猷遊擊鄒繼芳參將湯克寬分屯金山衛閔港乍浦犄賊三面以待永順保靖兵之集會侍郎趙文華以祭海至與浙江巡按胡宗憲比屢趨經進兵經曰賊狡且衆待永保兵至夾攻庶萬全文華遂密疏經糜餉殃民畏賊失機帝怒即下詔逮經以蘇松巡撫周珫代之方文華之拜疏也永保兵已至其日即有石塘灣之捷至五月朔倭突嘉興經遣參將盧鏜督保靖兵以大猷督永順兵由泖湖趨平望以克寬引舟師由中路擊之合戰於王江涇斬賊首一千九百餘級焚溺死者甚衆給事中李用敬等言王師大捷倭奪氣不宜易帥帝不聽卒論經死珫涖任無所展布賊復熾狼土兵亦不奉珫節制大肆焚掠於是東南民既苦倭復苦兵矣軍政不一必敗唐初劉黑闥引突厥冦河北淮陽王道元授山東道行軍總管師次下博與賊軍遇道元帥騎先登命副將史萬寶督軍繼進萬寶與之不協及道元深入而擁兵不進謂所親曰吾奉手詔言淮陽小兒雖名為將而軍之進止皆委於吾今其輕鋭越泥濘交戰吾軍若動必陷泥濘莫如結陳以待之雖不利王而利國也道元遂為賊所擒又蘇定方從大將軍程知節征賀魯至鷹娑川突厥引二萬騎來拒總管蘇海政與戰未决既而突厥别部鼠尼施等又領二萬餘騎續至定方正歇馬隔一小嶺去知節十里許望見塵起率五百騎馳往擊之敵衆大潰追奔二十里副總管王文度害其功謂知節曰雖云破賊官軍亦有死傷今當結為方陳輜重並納腹中四面布隊人馬披甲敵來即戰自保萬全又矯制收軍不許深入終日跨馬披甲結陳由是馬癯卒勞無鬬志定方謂知節曰本來討賊今乃坐守何功之立哉且公為大將閫外之事不許自專别遣軍副專其號令理必不然須囚繫文度飛表奏之知節不從師竟無功五代周世宗南征徙下蔡浮橋於渦口為鎮淮軍築二城以夾淮時南唐元帥李景逹遣朱元等屯紫金山築甬道以餉夀州周師連破紫金諸寨景逹雖為元帥而兵事皆决於陳覺覺與元素有隙以元李守貞客反覆難信南唐主李景遣大將楊守忠代元且召之元憤怒叛降於周諸軍皆潰景逹以舟兵奔還金陵宋潘美與契丹耶律色珍戰於飛狐敗績議引兵護雲應寰朔吏民內徙時色珍乘勝入寰州兵勢甚盛美副將楊業欲避其鋒但領兵出大石路直入石碣谷護軍王侁等以為畏懦欲從雁門北川中往業不可侁曰君侯素號無敵今逗撓不戰得非有他志乎業曰業非避死蓋時有未利徒殺士卒而功不立今君責業以不死當為諸公先將行指陳家谷口曰諸君幸於此張步兵強弩以相援也業轉戰當至此可夾擊之不然無遺類矣美乃與侁帥麾下陳於谷口業進與色珍戰大敗退趨狼牙村侁自寅至已不得業報使人登多羅臺望之無所見以為契丹敗走欲爭其功即領兵離谷口美不能制乃緣交河西南而進行二十里聞業敗即麾兵却走業且戰且行至谷口望見無人拊膺大慟再率麾下力戰身被數十創士卒殆盡遂被擒於是雲應朔諸城皆復陷又李顯忠克復宿州與别將邵宏淵不相能金布薩率步騎十萬來攻晨薄城列大陳顯忠謂宏淵併力夾擊宏淵按兵不動顯忠獨以所部力戰俄而敵大至顯忠用克敵弓射却之宏淵謂衆曰當此盛夏搖扇於清涼猶不堪况烈日中被甲苦戰乎人心遂搖無鬬志顯忠移軍入城統制張訓通等以顯忠宏淵不協各遁去金人乘虛復來攻城顯忠竭力捍禦敵始退宏淵又言金添生兵二十萬來儻我兵不返恐變生不測顯忠知宏淵無固志勢不可孤立遂夜引還元噶扎爾受命參議陜西行樞密院事比入奏曰關陜要地軍務非輕阿道伊埒國之元臣陛下方委任之伏慮臨時議論不協必誤大計儻有異同臣請得以上聞帝可其奏明李景隆與郭英吳傑合兵伐燕燕王帥諸將進駐固安謂邱福等曰李九江等皆匹夫無能為惟恃其衆耳然衆豈可恃也人衆易亂擊前則後不知擊左則右不應將帥不專政令不一甲兵糧餉適足為吾資耳爾等但秣馬厲兵以待既而戰於白溝河景隆等果大敗軍無政令敗宋李綱為兩路宣撫使練士卒修器甲期兵集大舉而朝廷降詔罷所起兵綱上疏言秋髙馬肥敵必深入宗社安危殆未可知防秋兵盡集尚恐不足今河北河東日告危急未有一人一騎以副其求奈何甫集之兵又皆散遣且以軍法勒諸路起兵而以寸紙罷之臣恐後時有所號召無復應者矣疏上不報金哀宗天興時聞元兵至以㸃檢瓜爾佳薩哈為總帥率步兵三萬巡河渡命內族長樂監其軍行至封邱而還朝廷置而不問於是薩滿愛實上言曰薩哈統兵三萬本欲乘元兵逺至喘息未定而擊之出京才十里不逄一人一騎已畏縮不敢進設遇元兵其肯用命乎乞斬二人以肅軍政不報明張玉因耿炳文帥師北向往覘其營還報成祖曰炳文軍無紀律其上有敗氣無能為遂詔問諸將所嚮衆莫對玉曰當徑趨真定彼雖衆新集志未齊一我軍乘勝可一鼓破之成祖曰玉言正合吾意吾倚玉一人足辦矣推誠唐張儉刺朔州屬李靖既平突厥有思結部者窮歸於儉儉受而安集之其在磧北者親屬私相過省儉不禁示羈縻而已及儉徙勝州後將謂其將叛遽以奏聞朝廷議發兵進討仍起儉為使就觀動靜儉單騎入其部落召諸首領慰諭推腹心咸匍匐歸命又郭子儀鎮河中時僕固懷恩率吐蕃回紇等三十萬衆掠涇邠躪鳯翔入醴泉奉天京師大震召子儀屯涇陽軍才萬人比到敵騎圍已合乃使李國臣拒其東魏楚玉當其南陳回光當其西朱元琮當其北子儀率甲騎二千出沒左右前後回紇見而問曰此誰也報曰郭令公驚曰令公存乎懷恩言天可汗已棄四海令公亦謝世故我從以來今令公存天可汗存乎報曰皇帝萬夀回紇悟曰懷恩欺我子儀又使諭之曰公等頃嵗逺涉萬里剪除凶逆恢復二京我與若休戚同之今乃葉舊好助叛臣何其愚也且懷恩背主棄親於公等何有回紇曰本謂公亡不然何以至此今誠存我得見乎子儀將出左右諫曰敵人之心不可信也請毋往子儀曰敵衆數十倍吾將示以至誠左右又請以騎五百從不聽即傳呼曰令公來敵皆持滿待子儀以數十騎免胄徐出而勞之曰安乎公等久同忠義何至於是回紇皆捨兵下馬齊拜曰果吾父也子儀召其首領各飲之酒與之佳錦歡好如初又曹王臯遷湖南觀察使前使辛京杲貪虐有部將王國良者戍武岡賴其富即劾以死國良懼遂散財聚衆據縣以叛斂諸道兵討之再嵗不能下臯至遣使遺國良書曰觀將軍非敢大逆者蓋逃讒抗死爾將軍遇我何不速降我固為京杲誣者幸蒙雪何忍以兵加將軍哉以為不然我以陳術破將軍陳以攻法屠將軍城非將軍所度也國良得書喜且畏因請降然內尚首鼠臯即日單騎稱使者造國良壘國良延使者入臯遂大呼軍中曰有識曹王者乎乃我也來受國良降國良安在一軍愕眙不敢動適有識者走至傳呼曰是國良匍匐叩頭請罪臯執手約為昆弟盡焚攻守具散其兵令赴農桑有詔赦之賜名惟新又馬燧討李懷光於長春宫懷光將徐庭光以兵六千守宫城禦備甚嚴燧度長春不下則懷光自固久攻所傷必多乃挺身至城下呼庭光庭光素憚燧威名拜於城上燧度庭光心已屈乃徐曰我來自朝廷可西面受命庭光復拜燧曰公等皆朔方將士祿山以來首建大勳四十餘年功伐最髙奈何棄祖父之勳力背君上為滅族之計耶從吾言非止免禍富貴可圖也賊衆俱不對燧又曰爾以吾為欺邪今相去不逺數步爾當射我乃披襟示之庭光感泣俯伏軍士亦泣下乃率衆出降燧以數騎徑入城處之不疑莫不畏服五代唐李茂貞為鳯翔節度性至寬有部將符昭者人或告其謀變茂貞親至其家去爪牙熟寢經宿而還上下遂服之宋宗澤尹開封威望素著會巨冦王善擁衆七十萬車萬乘欲據京城澤馳至其營泣曰朝廷危難乃汝立功之秋不可失也善感泣曰敢不效力遂解甲降又魏勝知海州治軍旅獲金諜者犒以酒食厚賂遣還有自北方來歸者與之同卧起共飲食示以不疑周其窶乏使之感激自是山東河北歸附者衆得金人虛實悉以上聞金蕭仲恭使宋且還宋人意仲恭耶律伊都皆有亡國之戚而伊都為金監軍有兵權可誘而用之乃以蠟丸書令仲恭致之伊都使為內應仲恭素忠信無反覆志但恐宋人留不遣遂陽許還見宗望即以蠟丸書獻之宗望察仲恭無他薄罰之於是再舉伐宋又楊仲武遷同知臨洮尹臨洮地接西羌與瑪爾布雜居邊將貪暴瑪爾布苦之遂相率為冦仲武乃從數騎入其營諭之曰此皆將校侵漁汝等以至此爾今懲治此輩不復擾害汝也并以禍福曉之羌人喜悅冦掠遂息後瑪爾布復掠熙河主帥使人諭之不肯去曰楊總管來我乃解去熙河具奏詔復遣仲武當是時瑪爾布謂仲武不能復來及仲武至與其酋帥相見責以負約對曰邊將苦我我之來求訴於上官耳今幸見公願終不復犯塞乃舉酒酹天折箭為誓仲武因以卮酒飲之曰當更為汝請若復背約必用兵矣羌人羅拜而去元安扎爾討平涇州師還原州降民棄老幼夜亡走衆曰此必反也宜誅之以警其餘安扎爾曰此輩懼吾驅之北徙耳遣人諭之曰汝等若走以軍法治罪父母妻子併誅矣汝歸保無他於是州民皆復歸豪民陳茍集數千人潛匿新寨諸洞衆議以火攻之安扎爾曰招諭不出攻之未晚遂偕數騎抵寨縱馬解弓矢召茍遙語折矢與為誓茍即相呼羅拜謝更生之恩皆降又賽音諤德齊鎮四川宋將咱萬夀擁強兵守嘉定與賽音諤德齊軍對壘一以誠意待之不為侵掠萬夀心服未幾賽音諤德齊召還萬夀請置酒為好左右皆難之賽音諤德齊竟往不疑酒至左右復言未可飲賽音諤德齊笑曰若等何見之小耶咱將軍能毒我其能盡毒我朝之人乎萬夀嘆服又呼遜為河南等路宣慰司同知以河南多強盜往往羣聚山林劫殺行路官軍收捕失利乃以招安自任遣土豪傳檄諭之未幾賊二人來歸呼遜賜之冠巾且諭之曰汝昔為賊今既自歸即良民矣悉放還令遍諭其黨數日後招集其為首者十輩來身各長七尺餘羅拜庭下呼遜命吏籍其姓名為民時召而飲食之皆得其歡心羣盜聞之相繼欵附明太祖擒陳兆先悉降其衆釋兆先而用之擇其驍兵五百人置麾下五百人者多懷疑懼太祖覺其意是夕令入宿衛環帝而寢悉屏舊人於外獨留馮國用一人侍卧榻傍太祖解甲酣寢逹旦疑懼者始安又處州冦葉宗留等憑恃險阻乘間時出官軍討之又復逺遁屯師日久計無所施陶成乃從僕𨽻四五人徑抵賊巢諭以禍福言辭懇惻宗留等悚動悔罪率衆出降示信唐蘇定方既擊破賀魯至怛篤城有敵人降附副總管王文度曰師還而降且為賊不如殺之取其資定方曰此乃自作賊耳何以稱伐叛哉及分財定方一無所取後俘都曼請於帝曰臣向喻陛下意許以不死帝曰朕為卿全信宥之葱嶺以西遂平宋种世衡知環州番部有努鄂者素倔強未嘗出謁郡守聞世衡至遽郊迎世衡與約明日當至其帳往勞部落是夕大雪深三尺左右曰地險不可往世衡曰吾方結諸羌以信不可失期遂緣險而進努鄂方卧帳中謂世衡必不能至世衡蹴之起努鄂大驚曰前此未嘗有官至吾部者公乃不疑我耶率其族羅拜聽命金宗望率兵討張覺覺敗奔宋宗望使以詔書宣諭城中張敦固等出降使使與敦固俱入城收兵仗城中人殺使者立敦固為都統乘城拒守敦固以兵八千分四隊出戰大敗宗望再三開諭敦固等曰屢嘗拒戰不敢遽降宗望許其望闕遙拜敦固乃開其一門宗望使棟摩奏其事遂下詔赦南京官民大小罪皆釋之官職如舊元史天祥獲金將完顔和斯穆呼哩欲殺之天祥曰殺一人無損於敵適驅天下之人為吾敵也且其降時嘗許以不死今殺之無以取信於後不若用之乃以為千户又鍾明亮以循州叛帝命管如德統兵討之諸將欲直搗其巢穴如德曰嘻今田野之氓疲於轉輸介胄之士病於暴露重困斯民而自為功吾不為也於是遣使諭以禍福明亮感如德誠信即擁十餘騎詣贛州石城縣降平章政事鄂囉齊怒其跋扈不臣欲以事殺明亮如德聞之曰皇元仁厚未嘗殺降明亮叛人何足惜所重者信不可失耳示義唐侯君集伐髙昌率兵至栁谷候騎言其國王文泰尅日將葬諸將請襲之君集曰不可天子以高昌驕慢無禮使吾恭行天罰今襲人於墟墓之間非問罪之師也於是鼓行而前又李晟既克京師勒兵屯於含元殿號令諸軍曰長安士庶多陷賊庭若小有震驚則非伐罪弔民之義也晟與公等各有家室離别數年今已成功相見非晚五日內不得輒通家信違命者斬乃遣京兆尹李齊運告諭百姓居人安堵秋毫無所犯尚可孤軍人有擅取賊馬者晟立斬之莫敢仰視士庶無不感悅又裴度為節度招撫使平淮西蔡人大悅初吳元濟禁偶語於道夜不然燭人或以酒食相過從者以軍法論度乃約法惟盜鬬殺外餘盡除其往來者不復以晝夜為限度以蔡卒為牙兵或以為反側之徒其心未安不可自去其備度笑而答曰吾受命為帥元惡就擒蔡人即吾人也父老無不感泣宋曹彬圍江南城將下忽稱疾不視事諸將來問疾彬曰余之疾非藥石所能愈唯諸君誠心自誓克城之日不妄殺一人則自愈矣諸將許之明日城陷一無所殺李煜詣軍門降待以賔禮封府庫籍圖書金帛以歸於朝秋毫無犯江南遂安又至道中交址酋長黎桓不順海賊頻年剽劫朝廷加恩於桓以轉運使陳堯叟為國信使初將命交址者必獲贈遺數千緡桓所賦斂往往斷民手足堯叟知之遂召桓子授以朝命却其私覿又桓界先有亡命來奔者鎮將多匿不遣堯叟悉捕亡命歸之且戒勿加酷法交址感恩併捕海賊為謝金熙宗皇統元年毛碩知拱州宋將張俊據亳州而柘城酒監房人傑叛以應俊碩發兵討之至柘城躬叩城門呼耆老以諭意縣人縳人傑以降碩徑入縣署召百姓慰安之衆皆感悅元世祖以宋張世傑據台州而閩中亦為宋守敕董文炳進兵文炳所過禁士馬無敢履踐田麥曰在倉者吾既食之在野者汝又踐之新邑之民何以續命是以南人感之不忍以兵相向次台州世傑遁諸將先俘州民文炳下令曰台人首效順於我我不暇有故世傑據之其民何罪敢有不縱所俘者以軍法論得免者數萬口至溫州未下令曰毋取子女毋掠民有衆曰諾其守將火城中逃文炳亟命滅火追擒其將數其殘民之罪斬以徇逾嶺閩人扶老來迎漳泉建寧邵武諸郡皆降又蘿槃甸叛賽音鄂德齊往征之有憂色從者問故賽音諤德齊曰吾非憂出征也憂汝曹冒鋒鏑不幸以無辜而死又憂汝曹劫掠平民使不聊生及民叛則又從而征之耳師次蘿槃城三日不降諸將請攻之賽音諤德齊不可遣使以理諭之蘿槃主曰謹奉命越三日又不降諸將奮勇請進兵賽音諤德齊又不可俄而將卒有乘城進攻者賽音諤德齊怒遽鳴金止之召萬戶叱責之曰天子命我安撫雲南未嘗命以殺戮也無主將命而擅攻於軍法當誅命左右縳之諸將叩首請俟城下之日從事蘿槃主聞之曰平章仁義如此吾拒命不祥乃舉國出降將卒亦釋不誅由是西南諸夷翕然欵附明太祖以諸將破和陽多暴橫殺人城中民夫婦不相保乃諭之曰諸軍自滁來多虜人妻女使人夫婦離散軍無紀律何以安衆凡軍中所得婦女悉還之於是民家室得完逺近悅服又太祖欲取鎮江慮諸將濫殺乃命徐逹為大將諭之曰爾等當體吾心戒輯士卒城下之日毋焚掠毋殺戮有犯令者處以軍法縱之者罰無赦逹頓首奉命師至鎮江元平章鼎鼎遁去即克其城兵不血刃號令嚴肅秋毫無犯又陳友諒引兵襲金陵敗潰奔還尋遣其將張定邊陷安慶府太祖乃下令諸將曰陳友諒賊殺其主僭稱大號侵我太平犯我建康今又以兵陷我安慶觀其所為不滅不已爾等其厲士卒以從徐達曰師直為壯今我直而彼曲焉有不克劉基曰取威制敵以成王業在此時也遂督諸帥率舟師乘風遡流而上克安慶長驅向江州又大破之友諒奔武昌其僞相胡廷瑞等皆來降欽定續通典卷九十五
