body:
  text: 職官臣等謹案杜佑作職官典上溯黃農下迄唐代歷朝官制之沿革件繫條分分二十二卷首敘官制要略曰三公曰三省尚書曰御史共六卷曰諸卿曰武官曰東宫官曰王侯封爵曰州郡曰文武散官曰祿秩曰秩品共十六卷自長二以至隸屬階品命數以次詳載竊以唐之職官杜典略備自天寶以後無大改革所有增置不過十數條而已至五代官制紊雜廢置不常歐陽修作史序云亂世分離文字殘缺故無職官志今考其帝紀列傳并參以㑹要及冊府元龜等書敘及官職者宰輔諸卿而外無可紀述宋初官無定員員無專職三省二十六曹四司類有他官主判迄於元豐肇新官制罷去空名咸遵職守銜名員額類承唐制而加以詳備建炎中率多省併然或廢或復猶不盡更初制也遼初建國事簡職專神冊六年詔正班爵因習聞河北藩鎮受唐官名故太師太保司徒司空樞密使之名施於部族其伊勒希巴多囉倫穆騰特哩衮林牙裕悅之類則從其初號也既得燕代十六州乃用唐制立三省六部臺院寺監諸衛東宫之官名曰南面官以治漢人金自景祖始建官屬其官皆踵遼之舊類多國語天㑹四年建尚書省遂有三省之制至熙宗始頒官制及改易官格除拜內外官始以勳封食邑入銜而後其制定自省而下為院為臺為府為司為寺為監為局為署為所各統所屬以修其職事員簡而不濫職定而不移終金之世未嘗稍改元自世祖即位命劉秉忠許衡酌古今之宜定內外之官總政務者中書省秉兵柄者樞密院司黜陟者御史臺在內者有寺監衛府在外者有行省行臺宣慰廉訪諸司及路府州縣官而一代之制始備若其因事而置事已則罷與夫異教雜流世襲之屬名類實繁雖正史亦略而不載至正兵興增設之官不循舊制平章有添設之號樞密有行院之稱紀律紊而官益濫矣明制沿漢唐之舊而加損益自洪武十三年罷丞相不設析中書省之政歸於六部以尚書任天下之事侍郎二之糾劾責之都察院章奏達之通政司平反參之大理寺亦漢九卿之遺意也始置大學士特備顧問鮮所參決洪熙宣德中加至公孤遂為宰相位次冠六卿矣其餘司寺監苑咸設專官以率其屬外官則以總督巡撫總領其綱紀而巡按糾察之立法之初庶績咸理至於建都北平而南省猶設官屬朝廷猥以是為儲才臣子遂因之而養望終明之世不廢亦一代之制也是書一遵杜佑體例取其有關沿革及制度之大者分門纂輯其政蹟可紀及立言行事足備考核者間為詮注以存掌故自唐肅宗至德以後官制有所更定者則標舉而類敘之無所更改則仍依杜佑舊文纂集遼金元明四朝其職掌同而銜名稍異仍依其職司所繫按類遞詳間有增補一二者亦依次附敘並著於篇至於宦官削去秩品仍纂録內侍省官職於治亂得失之由尤資考鏡恭奉聖諭特於本篇下敬詳焉第一歷代官制要略第二三公總敘四輔二大附太師太傅太保太宰太尉司徒司空大司馬總敘三師三公以下官屬第三宰相并官屬門下省侍中侍郎大給事中居散騎常侍拾諫議夫起補闕遺典儀城門郎符寶郎宏文館校書中書省中書令侍郎學舍人史通事舍人集賢士官主書第四尚書上尚書省并總論尚書録尚書尚書令僕射左右丞中左右司郎員外郎附歷代尚書歷代郎官歷代都事主事令史行臺省樞密院知院事同知院事同樞密副使書院事簽書院事簽都承㫖客副都承㫖事檢詳官官省使斷官計議官編修第五尚書下吏部尚書侍郎外郎中司員外郎員郎勳郎中司封郎中員外郎考功郎中員外郎主事附户部尚書侍郎外郎中金員外郎員郎部郎中度支郎中員外郎倉部郎中員外郎主事附禮部尚書侍郎外郎中膳員外郎員郎部郎中祠部郎中員外郎主客郎中員外郎主事附兵部尚書侍郎外郎中駕員外郎員郎部郎中職方郎中員外郎庫部郎中員外郎主事附刑部尚書侍郎外郎中比員外郎員郎部郎中都官郎中員外郎司門郎中員外郎主事附工部尚書侍郎外郎中虞員外郎員郎部郎中屯田郎中員外郎水部郎中員外郎主事附第六御史臺御史大夫中丞御史侍御史御殿中侍監察侍史主簿典事檢法經歷都事附第七諸卿上總論諸卿少卿附太常卿丞律主簿兩博士社太祝太奉禮郎鼓協郎京郊署樂署吹署公太醫院太廟署太卜署廩犧署汾祠署光祿卿丞署主簿署大官署掌醢珍羞署良醖衛尉卿丞署主簿司武庫署左武器署公車馬令右都候守宫宗正卿丞署主簿崇元署諸陵署太廟太僕卿丞署主簿署乘黃署署典廄署車府諸牧典牧大理卿正監丞主簿獄丞司直評事第八諸卿鴻臚卿丞主簿典客署司儀署司農卿丞署主簿署上林署監太倉署監鈎盾䆃官苑總諸倉司竹監農溫泉湯監官諸屯監典中郎將等搜粟都尉等官太府卿丞署主簿平諸市署藏常署平準署左右祕書監丞郎祕書郎校校書郎附正字史著作佐郎書正字太局令丞殿中監丞局尚食局局尚藥局局尚衣局舍尚乘尚輦奉御尚直長第九諸卿下內侍省內侍寺內常侍庭內給事闈內謁者監內伯掖局宫局奚官局內僕局內府局少府監少監織染丞冶主簿掌等署中尚左尚右尚暴室等丞將作監丞署主簿署左校署主右校署中校東園章令甄官國子監祭酒教司業學丞廣主簿四國子博士助太文門律學書學算學等博士軍器監丞主簿甲坊署弩坊署都水使者丞主簿舟楫署河渠署第十武官上將軍總敘左右衛并親衛左右驍衛左右武衛左右威衛左右領軍衛左右金吾衛左右監門衛左右千牛衛左右羽林衛左右龍武軍左右神武等軍附第十一武官下大將軍并官屬車騎將軍衛將軍前後左右將軍四征將軍四鎮將軍四安將軍四平將軍雜號將軍監軍軍師祭酒附理曹掾屬三署郎官敘中郎將