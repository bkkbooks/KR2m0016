body:
  text: 刑舞紊唐五代宋遼金元明唐宣宗大中四年詔法司使法或持巧詐分律兩端遂成其罪姦吏得計黎庶何安今後應書罪定刑宜令直指其事不得舞文妄有援引長吏嚴加覺察漢蘇逢吉與李嵩爭田宅嵩子弟數出怨言逢吉誘人告嵩謀反嵩自誣服與家僮二十人謀因髙祖山陵為亂獄上中書逢吉改二十人為五十人遂族嵩家宋神宗熙寧時復設大理獄欲以懲革囚繫淹滯俾獄事有所統以諫議大夫崔台符為卿楊汲為少卿時中官石得一以皇城偵邏為獄士大夫小有連逮輒捕繫雖命婦亦不免追攝台符等迎伺其意傅㑹煆鍊無不誣服人皆惕息數年間斃文法者且萬人及台符等得罪獄亦尋廢蘇軾知湖州表謝御史李定舒亶何正言托其表語並謀孽所為詩以為訕謗朝政逮付臺獄欲置之死煆鍊久之不决帝憐之以黃州團練副使安置王安石創行新法百姓愁苦㑹大旱河東河州陜西流民大入京師鄭俠監安上門繪圖以獻且奏曰旱由安石去安石天必雨帝稍為裁抑安石遂力求去薦吕惠卿以代已俠又數上書力詆惠卿惠卿大怒言於帝以為謗訕送汀州編管既行帝問惠卿俠小臣何由知禁中事及大臣奏對之言惠卿奏曰此皆馮京手録使王安國持示導之使言耳惠卿與京同列議多不合又以諂事安石為安國所嫉屢諷其兄不悟惠卿銜之故并中之遣舒亶追還俠并京安國逮赴詔獄京與俠實未相識亦無使安國傳道省中語凡所論乃鄰居內殿崇班楊永芳所告也獄成俠改配英州京罷政安國放歸田里八年沂州民朱唐告前餘姚主簿李逢東都事略作李進謀反提㸃刑獄王庭筠言其無跡但謗讟朝政語涉指斥及妄說休咎請編配帝疑之遣御史臺推直官蹇周輔劾治中書以庭筠所奏不當并劾之庭筠懼自縊死逢辭連宗室秀州團練使世居醫官劉育河中府觀察推官徐革等詔捕繫臺獄命中丞鄧綰同知諫院范百祿與御史徐禧雜治獄具賜世居死逢育革並凌遲處死將作監主簿張靖武進士郝士宣皆腰斬司天監學生秦彪百姓李士寧杖脊並湖南編管士寧者挾術出入貴人門常見世居母康以仁宗御製詩獻百祿謂世居不軌皆士寧熒惑所致推問不服禧奏士寧贈詩實仁宗御製今獄官以為反因臣不敢同初士寧嘗與王安石善時吕惠卿參知政事欲自得政忌安石復相故諷百祿等引士寧意欲周內有所誣衊㑹安石再召僅論士寧徒罪而奏禧故出之以媚大臣詔詳劾理曲者以聞百祿坐報上不實落職開封鞫相州民殺人獄事連判官陳安民安民屬宰相吳充之壻文及甫求援於充之子安持知諫院蔡確言事關大臣非開封可了遂移御史臺時獄起皇城卒事多不讐中丞鄧潤甫御史上官均按之與府獄同王圭奏遣確詣臺參治確煆鍊為獄潤甫均不能制密奏確慘掠諸囚確伺知之即劾二人庇有罪且詐使吏為使者慮問囚稱寃輒苦辱之帝頗疑其濫連遣諫官及內侍審直皆怖畏言不寃由是潤甫均皆罷而確得中丞哲宗紹聖間章惇蔡卞用事既再追貶吕公著司馬光及謫吕大防等嶺外意猶未快仍用黃履疏髙士京狀追貶王圭皆誣以圖危上躬其言寖及宣仁帝頗惑之最後起同文館獄將悉誅元祐舊臣時太府寺主簿蔡渭奏臣叔父碩嘗於邢恕處見文及甫元祐中所寄恕書具述姦臣大逆不道之謀及甫彥博子也必知姦狀詔翰林承㫖蔡京吏部侍郎安惇同究問初及甫在喪與恕書自謂畢禫當求外入朝之計未可必聞已逆為機穽以榛塞其塗又謂司馬昭之心路人共知又云濟之以粉昆朋類錯立欲以眇躬為甘心快意之地及甫嘗語蔡碩謂司馬昭指劉摯粉昆指韓忠彥俗稱駙馬都尉為粉侯忠彥弟嘉彥尚主也眇躬則及甫自謂及甫除都司曽為摯論列又摯嘗論彥博不可除三省長官故止為平章軍國重事及彥博致仕及甫自權侍郎以修撰守郡母喪除恐不得京職遂為躁忿詆毁之辭及置對為京惇所脅乃以昭比摯如舊而眇躬謂指上躬粉昆謂指王巖叟面如傅粉故曰粉梁燾字况之以况為兄故曰昆斥摯將謀廢立不利於上京惇言事涉不順及甫止聞其父言無他證佐乃别差中書舍人蹇序辰與內侍一員同往將大有所羅織以快誅戮㑹星變帝怒稍息然京惇極力煆鍊不少置既而摯燾同時死於嶺南貶所人皆疑之元祐初嘗置訴理所申理寃濫元符元年中丞安惇言神宗勵精圖治明審庶獄而陛下未親政時姦臣置訴理所凡得罪熙豐之間者咸為奏雪歸怨先朝收恩私室乞取公案看詳從初加罪之意復依原斷施行時章惇猶豫未應蔡卞即以相公二心之言迫之惇懼即日置局命蹇序辰同安惇看詳由是以伸雪復改正重得罪者八百三十家謹按御批通鑑輯覽曰此固羣小搆陷所致亦由諸正人迫不及待當宣仁聽政時急反熙豐之政使奸徒得以籍口若稍知審顧白之哲宗而後行或俟親政後次第申理則小人何所騰其簧鼓恭繹聖訓可以為君子者法戒矣徽宗崇寧四年蔡京復第元祐諸臣罪狀分兩等以司馬光為首指為元祐姦黨請於徽宗而刋諸石置文德殿門又自書為豐碑頒之天下皆禁錮其子孫永不敘録五年彗星見乃仆石除禁焉自京用事患言者議已凡施行條件京密擬進而丐帝親書以降謂之御筆手詔事無巨細皆託而行至有不類上札者羣下亦莫敢言又詔御筆斷罪不許詣尚書省陳訴違者以違御筆論又定令凡應承受御筆官府稽滯一時杖一百一日徒二年二日加一等罪止流三千里三日以大不恭論由是吏因緣為姦舞文出沒不可究詰時有司斷獄往往引例破法大理迎合觀望屈法用情犯多幸免至號法寺為休和所故事法寺斷絶必宣付史館獄空降詔奬諭或加秩賜章服官吏希求恩賞治獄者務令獄空輒不受詞又寄囚他所致多遁逸斷理者務作斷絶鹵莽用刑有以婦人配𨽻千里者都曹翁彥深言淮東十一州軍政和六年七年殺人之獄一百三十二人而坐死者才十有二人夫此百二十人皆大辟也州縣奏而免之可謂仁矣而被殺者受無辜之虐銜不報之寃獨不足恤乎朝廷見嵗斷大辟之少謂幾刑措是乃慕虛名而忘實惠官吏冒賞市恩姦弊萬態讞狀徑上不由憲司一作奏案無敢異議其就戮者大抵皆貪民耳疏上僅詔御史臺察奏而已髙宗播遷圖籍散失凡所施行多出百官省記御史劉一正言法令具在姦吏猶得而舞之今一切用其所省記欺蔽何所不至建炎三年始命取嘉祐條法與政和𠡠令對修而用之紹興元年書成號紹興𠡠令格式具刑制篇初神宗謂律令不足以周盡事情凡邦國沿革之政與人之為惡入於罪戾而律所不載者一斷以𠡠更其目曰𠡠令格式而律存乎𠡠之外故時輕時重無一是之歸自元祐變熙寧之法紹聖復熙寧之制以後衝前以新改舊各自為書而刑制愈紊及是乃有是詔未幾秦檜専政率用都堂批狀指揮行事雜入吏部續降條冊之中修書官諂附畏忌不敢刪削至與成法並立十一年樞密使張俊使人誣告張憲收嶽飛文字謀為變檜以飛夙梗和議必欲殺之以獄事付諫議大夫万俟卨卨誣飛嘗自言已與太祖皆三十嵗建節為指斥乘輿又受詔不救淮西罪賜死獄中誅其子雲及憲於市有訟飛寃者皆决杖流竄廣西帥胡舜陟與轉運使吕源有隙源奏舜陟贓汚僣擬又以書抵檜言舜陟訕笑朝政檜素惡舜陟遣大理官往治之舜陟不服斃於獄自飛舜陟死檜權勢愈熾動興大獄脅制天下賢士大夫死徙相繼又置察事卒數百遊市間聞言其姦者即送大理獄殺之大開告訐之門以除異已者令殿中侍御史徐嘉右正言張扶論趙汾張初交結事先捕汾下大理獄拷掠無完膚令自誣與張浚李光胡寅謀大逆株連五十三人凡檜所惡者皆豫獄上而檜已病不能書事乃寢當是時法官濫用奏裁之例諸路州軍勘到大辟雖刑法相當者類以為可憫多獲貸配耿延年提㸃江東刑獄有南康婦人謀殺其夫佐狀明白延年曲貸其命纍勘官翻以失入被罪贛州將兵逃至外邑殺村民於深林民兄知之畏申官之纍遂焚其尸不報後事發以殺時無證尸不經驗奏裁刑寺輒定為斷配給事中陳由義右正言凌哲先後建議帝慮情理可矜之人一例不奏苐令刑部坐條行下馴至乾道法令雖具吏一切以例從事法當然而無例則事皆泥而不行甚至隱例以壞法賄賂既行方為具例乾道二年詔曰獄重事也用法一傾則民無所措手足比年以來治獄之吏巧持多端隨意輕重之朕甚患焉其自今革玩習之弊明審克之公使姦不容情罰必當罪用迪於刑之中勉之哉寧宗朝太學博士詐應龍上言法之弊易見例之弊難知例者或出曠特之恩或出於權宜之計或迫於勢要而創或徇於親故而開今有司舍法用例非不知三尺之皆違也執而不用必至於拂人情甚且召衆怨遂使胥吏得以執其柄而容其私請詔庶司搜求已用之例公同參酌擇其輕重不戾於法者勒為成書凡有陳乞據此施行遼道宗太康時北院樞密使耶律伊遜等用事既誣害宣懿皇后太子濬有憂色伊遜常不自安乃與其徒隂謀搆陷令護衛太保耶律扎拉告知樞密院事蕭蘇色等八人謀廢立詔案無跡不治伊遜復教牌印郎君蕭武都溫自首臣嘗豫蘇色等謀恐事發連坐因籍姓名以告帝信之幽太子於别室以耶律雅克鞫案太子具陳枉狀曰吾為儲副尚復何求公當為我辨之雅克乃伊遜黨易其辭為欵伏帝大怒廢太子為庶人徙上京伊遜尋遣人弒於囚所并其妃殺之以滅口大安三年續增條制成咸雍六年詔修凡數經增校貝刑制篇節目繁瑣法官不能遍習吏得因緣為姦民莫知避五年詔曰法者所以示民信而致國治簡易如天地不忒如四時使民可避而不可犯比命有司纂修刑法不能明體朕意多作條目以罔民於罪朕甚不取自今仍用舊法金熙宗朝參酌隋唐遼宋律令以為皇統制頒行中外海陵虐法率意變易有續降制書與皇統制並行或同罪異罰或輕重不倫或共條重出或書文贅意是非淆亂莫知適從姦吏因得夤緣舞法世宗大定十九年始命大理正伊喇慥等更定焉宣宗貞祐四年參知政事李革奏有司各以情見引用斷例牽合傅㑹實啓幸門凡斷例敕條特㫖奏斷不為永格者不許引用悉準律文以杜紊亂報聞哀宗即位詔曰國家已有定制有司往往以情破法使人枉遭刑憲今後有本條而不遵者以故入人罪罪之元時南北異制蒙古毆打漢人勿許還報其因爭及乘醉毆死漢人者止斷罰出征蒙古人犯罪有司不得拷掠禁繫偏徇袒庇頗乖公允又事類繁瑣挾情之吏舞弄文法出入比附往往用譎行私纍朝姦臣秉政更迭起大獄焉世祖至元二十四年復置尚書省以僧格與特穆爾為平章正事時行新鈔僧格嘗檢核中書省事凡校出虧缺鈔四千七百七十錠昏鈔一千三百四十五錠平章敏珠爾丹自服參政楊居寬微自辨析僧格即令左右拳其面於是參議貝降已下凡鈎考違惰耗失等事及參議王巨濟嘗言新鈔不便者各欵伏事聞帝令丞相安圖與僧格共議且諭毋令敏珠爾丹等他日得以脅問誣服為辭而僧格等傳致周內又劾參政郭佑尸位不言佑與居寬竟論棄市其後臺吏王良弼前江寧縣達嚕噶齊吳德有後言僧格聞之俱以非議朝政捕問殺之籍沒其家二十五年劉宣為江浙行臺御史中丞時行省丞相蒙古台悍戾縱恣嘗慮臺臣糾言其罪而尤忌宣隂以事羅織宣之子繫揚州獄又令建康酒務淘金等官及録事司官以罪免者誣告行臺沮壞錢糧以聞於朝必欲置宣死地朝廷遣官二員置獄於行省鞫問宣及御史六人俱就逮既登舟行省以軍船列兵衛迫之至則分異各處不使往來宣不堪其辱自剄舟中行省白於朝以為宣知罪重自殺前後搆成斯獄者郎中張斯立也仁宗皇慶元年特們德爾既再入相怙勢貪虐凶穢滋甚平章蕭拜珠中丞楊多爾濟思糾正其罪富民張弼殺人繫獄特們德爾使家奴脅留守賀巴延令出之巴延持不可而多爾濟已亷得丞相所受弼賄有顯徴乃與拜珠巴延共奏之內外監察御史凡四十餘人亦交劾其蠧政害民之罪仁宗震怒有詔逮問特們德爾匿興聖近侍家有司不得捕帝恐傷太后意乃僅罷其政及仁宗崩乘間復據相位英宗尚在諒暗遂矯太后詔召拜珠多爾濟至徽政院與院使實勒們等雜問之責以前違太后㫖之罪又引同時為御史者二人證成其獄即起入奏稱㫖執二人戮於市並誣殺巴延時中丞趙世延亦豫彈劾至治初已出為四川行省平章政事特們德爾鋭意報復誘世延從弟索約爾哈呼誣告世延罪逮之置對俾其黨巧詆成獄㑹有㫖赦原勿復問特們德爾更以他事白帝繫之刑曹逼令自裁世延不為動居囚再嵗左丞相拜珠屢於帝前言其亡辜乃得出順帝時綽斯戩復為丞相㣘皇太子㫖搆成大獄誣婁達實曼濟阿南達實哩沙克嘉實哩額森呼圖克及托歡等不軌執托歡煆鍊其獄連逮不已帝知其無辜欲釋其事特命大赦而綽斯戩增入條畫內獨不赦前獄惟婁達實亡去曼濟阿南達實哩等遂皆貶死明初詔內外風憲官以講讀律令一條考校有司其不能曉晰者罰有差庶幾人知律意因循日久視為具文由此姦吏骩法多任意輕重以濟其私至厰衛用事文致寃濫殺人尤慘而不麗於法刑章大壞矣英宗北狩兵部尚書于謙始終不主和議帝雖以是得還意常銜之而徐有貞石亨張軏及內侍曹吉祥等皆素憾謙景泰八年正月壬午英宗復辟宣諭朝臣畢即執謙與大學士王文下獄誣以與黃􅎫搆邪議更立東宫又與太監王誠舒良張永王勤等謀迎立襄王世子亨等主其議嗾言官上之都御史蕭惟禎定讞坐以謀逆處極刑文不勝誣辨之疾謙笑曰此亨等意耳辨何益奏上帝猶豫曰于謙實有功亨進曰不殺謙此舉為無名帝意遂決詔棄謙市籍其家家屬戍邊未幾帝寵任錦衣指揮僉事逯杲勢張甚遣校尉偵事四方所至急賄無賄者輒執送鎮撫理刑門達煆鍊成獄逮一人數大家立破指揮使李斌嘗搆殺𢎞農衛千戶陳安為安家所訴下巡按御史邢宥覆讞石亨屬宥薄斌罪至是校尉言斌素藏妖書謂其弟健當有大位欲隂結外畨為石亨報讐杲以聞下錦衣獄達坐斌謀反帝兩命廷臣㑹訊畏杲不敢平反斌兄弟置極刑坐死者二十八人及杲死達踵其所為益布旗校四方告訐者日盛中外重足立帝益以為能達心害大學士李賢寵又數規已嘗譛於帝及治都指揮袁彬之獄誣彬受石亨曹欽賄用官木為私第索內官督工者甎瓦奪人子女為妾諸罪名軍匠楊塤不平擊登聞鼓為彬訟寃語侵逹詔并下達治乃拷掠塤教以引賢塤即謬曰此李學士導我也達大喜立奏聞請法司㑹鞫塤午門外帝遣中官裴當監視達欲執賢並訊經當沮乃止及訊塤曰吾小人何由見李學士此門錦衣教我達色沮不能言彬亦厯數達納賄狀法司畏達不敢聞坐彬絞輸贖塤斬帝命彬贖畢調南京錦衣而禁錮塤孝宗𢎞治十七年以張天祥事逮巡邊御史王獻臣等天祥者遼東人都指揮簽事斌孫也斌以罪廢天祥入粟得祖官有泰寧衛部十餘騎射傷海西貢使天祥出摩囉關掩殺他衛三十八人以歸指為射貢使者巡撫張鼐等奏捷獻臣疑之方移牒校勘㑹斌婦弟指揮張茂及子欽與天祥有隙詐為前屯衛文書呈獻臣具言劫營事獻臣即以聞未報而獻臣被徴帝命大理丞吳一貫錦衣指揮楊玉㑹新按臣余濓勘之盡得其實斌等皆論死天祥斃於獄天祥叔父洪屢訟寃帝密令東厰亷其事還奏所勘皆誣帝信之欲盡反前獄召閣臣劉健等出東厰揭帖示之命盡逮一貫等健等言東厰揭帖不可行於外既退復爭之帝再召見責健等健對曰獄經法司讞皆公卿士大夫言足信帝曰法司斷獄不當身且不保言足信乎謝遷曰事當從衆若一二人言安可信健等又言衆證逺不可悉逮帝曰此大獄逮千人何恤健等再四爭執見帝聲色厲終不敢深言東厰非一貫等既至帝親御午門鞫之欲抵一貫死廷臣力救乃與濓獻臣等貶謫有差茂父子論死而斌免洪反得論功武宗正德初劉瑾勢愈熾毛舉官僚細故散布校尉逺近偵伺遣使察核邊倉都御史周南張鼐馬中錫湯全劉憲布政已下官孫祿冒政方矩華福金獻民劉遜郭緒張翼郎中劉繹王藎等並以赦前事下獄追補邊粟憲至瘐死又察鹽課杖巡鹽御史王潤逮前運使寧舉楊竒等察內甲字庫謫尚書王佐以下百七十二人復創罰米法嘗忤瑾者皆擲發輸邊故尚書雍泰都御史楊一清侍郎張縉給事中趙士賢等數十人悉破家死者繫其妻子二年三月瑾召羣臣跪金水橋南宣示奸黨自大學士劉健以下數十人皆海內號忠直者是年夏御道有匿名書詆瑾所行事瑾矯㫖召百官跪奉天門下瑾立門左詰責日暮收五品以下官盡下獄明日大學士李東陽申救乃釋之而主事何釴順天推官周臣進士陸伸己暍死瑾故急賂繼以其黨張綵言舉發御史歐陽雲等十餘人所致賄乃遣科道十四人分路盤察所遣人率阿瑾意専務摶擊劾尚書顧佐已下數十人而給事中安奎潘希曽御史趙時中阮吉張彧劉子厲以無重劾下獄奎彧枷且死東陽疏救始釋為民希曽等亦皆杖斥又矯㫖籍故都御史錢鉞禮部侍郎黃景尚書秦鋐家五年㑹審重囚減死者二人時寃濫滿獄東陽等因風霾以為言特許寬恤而刑官懼觸瑾怒所上止此世宗初兵部侍郎張璁以議禮積怒廷臣日謀報復嘉靖五年山西巡撫馬録治反賊李福達獄詞連武定侯郭勛法司讞如録議璁讒於帝謂廷臣以議禮故陷勛帝果疑諸臣朋比乃命璁及桂萼方獻夫署三法司覆讞盡反其獄傾諸異已者大臣顔頥夀已下咸被搒掠戍録而坐罪者四十餘人璁等謂平反有功請帝編欽明大獄録頒示天下二十四年夏言再相每以氣陵嚴嵩嵩銜之次骨㑹河套議起言欲倚曽銑以成大功主之甚力帝初令擬㫖褒銑未幾入嵩譛謂套必不可復遂怒不可解二十七年正月削言官復遣官逮銑責科道官不言悉杖於廷然猶無意殺銑言也咸寧侯仇鸞鎮甘肅時以阻撓為銑所劾逮問嵩故雅親鸞知銑所善同邑蘇綱者言繼妻父也綱與銑言嘗交關傳語乃代鸞獄中草疏誣銑掩敗不奏尅軍餉巨萬遣子淳屬所親蘇綱賂當途其言絶無左驗而帝深入其說立下淳綱詔獄遣官校逮言言抵通州聞銑所坐大驚墮車曰吾死矣再疏訟寃不省及銑至當以交結近侍律斬妻子流二千里即日行刑銑既死言亦坐斬而鸞出獄其後兵部員外郎楊繼盛劾嵩十大罪五奸中有召問裕景二王語嵩喜謂可指此為罪密搆於帝帝怒下繼盛詔獄杖之百繫三載而張經李天寵獄起嵩揣帝意必殺二人比秋審附繼盛名疏尾並奏得報遂棄西市又錦衣衛經厯沈鍊疏劾嵩十大罪帝怒搒之數十謫佃保安宣大總督楊順巡按御史路楷皆嵩黨也嵩子世蕃屬圖之許厚報兩人日夜謀所以中鍊者㑹捕得蔚州妖人閻浩等以白蓮教惑衆出入漠北漏泄邊情詞所連甚廣遂竄鍊名其中誣浩等師事鍊具獄上嵩父子大喜覆如其奏斬鍊宣府市戍子襄極邊廕順一子錦衣千戶順以為賞薄恐嵩意未愜復取鍊子衮褒杖殺之熹宗天啓元年再起熊廷弼為經略與撫臣王化貞樞臣張鶴鳴齟齬旋成大隙廣寧之失罪由化貞而以門户曲殺廷弼方廷弼之繫獄也令汪文言賄內廷四萬金祈緩既而背之忠賢大恨適邏者獲市人蔣應暘謂與廷弼子出入禁獄隂謀叵測忠賢愈欲殺廷弼其黨門克新郭興治等希指趣之遂以五年八月棄市傳首九邊忠賢既盡逐吏部尚書趙南星等左副都御史楊漣劾其二十四大罪僉都御史左光斗預其謀忠賢銜次骨必欲殺二人既削籍乃再興汪文言獄是年其黨徐大化劾漣光斗黨同伐異招權納賄命逮文言下獄許顯純嚴鞫之使引漣等納廷弼賄文言至死不承顯純乃自為獄詞坐漣光斗贓各二萬下詔獄其年七月遂於夜中斃之給事中魏大中太僕少卿周朝瑞御史袁化中陜西副使顧大章刑部侍郎王之宷皆以忤忠賢竄名文言獄中枕籍死於獄其後如蘇松巡撫周起元以劾其黨織造中官李實諭德繆昌期以送去國諸臣吏部員外郎周順昌以與魏大中㛰御史周宗建黃尊素李應升工部郎中萬燝俱以彈擊忠賢及其黨郭鞏魏廣微崔呈秀輩忠賢矯旨削籍逮問緹騎四出琅璫旁午瘐死囹圄者接踵自古縉紳之禍莫酷於此欽定續通典卷一百十九
