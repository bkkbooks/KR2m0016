body:
  text: 食貨錢幣下元明元初倣唐宋金之法有行用鈔其制無文籍可考太宗時有于元者奏行交鈔耶律楚材曰金章宗時初行交鈔與錢通行有司以岀鈔為利收鈔為諱謂之老鈔至以萬貫惟易一餅民力困竭國用匱乏當為鑒戒今印造交鈔宜不過萬錠從之憲宗時立交鈔提舉司印鈔以佐國用世祖中統元年造交鈔以絲為本每銀五十兩易絲鈔一千兩諸物之直並從絲例又造中統元寳鈔其文以十計者四曰一十文二十文三十文五十文以百計者三曰一百文二百文五百文以貫計者二曰一貫文二貫文每一貫同交鈔一兩兩貫同白銀一兩又以文綾織為中統銀貨其等有五曰一兩二兩三兩五兩十兩每一兩同白銀一兩而銀貨盖未及行云是時新鈔行銀鈔不用真定以太后命用銀鈔交通燕趙以及唐鄧之間數計八千餘中統新鈔將行銀鈔之價頓虧公私囂然不知措手宣撫司劉肅言救之之法有三舊鈔不行下損民財上廢天子仁孝之名依舊行用一也新舊兼用二也必欲令行新鈔直須如數收換庶幾小民不致虗損三也省議嘉之從其第三䇿遂降鈔五十萬貫三年勅私市金銀應支錢物止以鈔為准四年詔立燕京平凖庫均平物價通利鈔法五年給平凖庫鈔一萬二千鋌以為鈔本至元三年以楊湜為諸路交鈔都提舉上鈔法便宜事謂平準行用庫白金出入有偷盗之弊請以五十兩鑄為鋌文以元寳用之便時有賈胡恃制國用使阿合馬欲貿交鈔本私平準之利以増嵗課為辭帝以問馬亨亨對曰交鈔可以權萬貨者法使然也法者主上之柄今使一賈擅之將何以令天下事遂寢十二年議以中統鈔易宋交㑹禁私造銅器又添造釐鈔其例有三曰二文三文五文初鈔印用木為板十三年鑄銅易之是年平宋回至揚州丞相巴延令搜檢將士行李所得撒花銀子銷鑄作錠每重五十兩銀鋌上字號揚州元寳後朝廷亦自鑄十四年鑄重四十九兩十五年鑄重四十八兩又置宣慰司於濟寧路掌印造交鈔供給江南軍儲置行户部於大名府掌印造交鈔通江南貿易雲南行省言雲南貿易與中州不同鈔法實所未諳莫若以交㑹􅖝子公私通行庶為民便從之十四年禁江南行用銅錢罷濟寧大名印鈔局十五年以釐鈔不便於民復命罷印十七年江淮等處頒行鈔法廢宋銅錢并括江淮銅及銅錢銅器中書省臣議流通錢法凡賞宜多給幣帛課程宜多收鈔制曰可二十一年勅中書省整治鈔法定金銀價及私自回易官吏奉行不䖍者罪之二十二年右丞盧世榮整治鈔法言天下嵗課鈔九十三萬二千六百錠之外臣更經畫不取於民裁抑權勢所侵可増三百萬錠初未行下而中外已非議臣請與臺院靣議上前行之帝以為不必如此卿但言之世榮奏古有𣙜酤之法今宜立四品提舉司以領天下之課嵗可得鈔千四百四十錠自王文統誅後鈔法虚弊為今之計莫若依漢唐故事括銅鑄至元錢及製綾劵與鈔參行因以所織銀劵上之上曰便益之事當速行之又増壊鈔倒换工墨費每貫二分為三分至元二年例用三十文三年減為二十文至是復増大德二年定昬鈔為二十五様二十三年中書傳㫖議更鈔用錢同知江西宣慰司事劉宣獻議曰原交鈔所起漢唐以來皆未嘗有宋紹興初軍餉不繼造此以誘商旅為沿邊糴買之計比銅錢易於擎齎民甚便之稍有滯礙即用見錢尚存古人子母相權之意日増月益其法侵弊欲求目前速效未見良䇿新鈔必欲創造權用舊鈔只是改换名目無金銀作本稱提軍國支用不復抑損三數年後亦如元寳矣宋金之弊足為殷鑒鑄造銅錢又當詳究秦漢隋唐宋利病著在史冊不待縷陳國朝廢錢已久一旦用之功費不貲非為逺計大抵利民權物其要自不要用始若欲濟邱壑之用非惟鑄造不敷抑亦不久自弊矣二十四年以征遼東所得銀鑄遼陽元寳是年以元寳交鈔行之既久物重鈔輕遂改造至元寳鈔自二貫至五文凡十有一等與中統鈔通行每一貫文當中統鈔五貫文依中統之初隨路設立官庫貿易金銀平準鈔法每花銀一兩入庫其價至元鈔二貫出庫二貫五分赤金一兩入庫二十貫岀庫二十貫五百文偽造鈔者論如例告者賞鈔五錠仍以犯人家産給之時衆欲計至元鈔二百貫贜滿者死趙孟頫曰始造中統時以銀為本虚實相權今二十餘年間輕重相去至數十倍故中統為至元又二十年後至元鈔必復如中統矣若計鈔抵法疑於太重或詰之曰今朝廷用鈔故犯法者以鈔計贓汝以為非欲阻格至元鈔耶孟頫曰頫奉詔與議不敢不言今中統鈔虛故改至元鈔謂至元鈔終無虚時寧有是理二十五年桑哥言中統鈔行垂三十年省官皆不知其數今已更用至元鈔宜差官分道置局鉤考中統鈔本詔燬中統鈔板二十六年桑哥又言初改至元鈔欲盡收中統鈔故令天下鹽課以中統至元鈔相半輸官今中統鈔尚未可急歛宜令稅賦並輸至元鈔商販有中統鈔料聽易至元鈔以行然後中統鈔可盡從之至元間許楫為徽州路總管時新舊楮幣並行以新易銀或患數夥楫極言部内民貧不堪宰臣嘉其誠懇視他郡銀減十八成宗大德九年以鈔萬錠給雲南行省命與􅖝參用其􅖝非岀本土者同偽鈔論按雲南􅖝以一為莊四莊為錢四錢為苗四苗為槖十一年庫爾巴雅爾請更用銀鈔銅錢中書集議以為不便而止武宗至大二年樂實言鈔法大壊請更之圖新鈔式以進塔思不花言此大事請與老臣更議不從乃更造銀鈔頒行之詔曰昔世祖始造中統交鈔以便民用嵗久法隳更造至元寳鈔今二十三年物重鈔輕不能無弊乃循舊典造至大銀鈔自二兩至二釐定為一十三等每一兩准至元鈔五貫白銀一兩赤金一錢隨路立平準行用庫買賣金銀倒换紙鈔或民間絲綿布帛赴庫回易依估給價設常平倉豐年收糴遇歉減價岀糶以遏沸踴金銀私相買賣及海舶興販金銀銅錢絲綿布帛下海者並禁之中統鈔到日百日盡數赴庫倒換茶鹽酒醋商稅諸色課程至大銀鈔與至元鈔一體收受如收至大銀鈔以一當五三年尚書省言以銀鈔為母至元鈔為子宜與銅錢通行大都立資國院山東河東遼陽江淮湖廣四川立泉貨監六産銅之地設提舉司十九鑄錢曰至大通寳每一文準至大銀鈔一釐又鑄大元通寳每一文準至大通寳錢十文歴代銅錢悉依古例與至大通用其當五當三折二並以舊數用之尋以銀鈔與銅錢兼行品目煩碎恐民未悟或有相妨令省臣議之尚書省言昔至元鈔初行即以中統鈔本供億及毁其板今既行至大銀鈔乞以至元鈔輸萬億庫銷毁其板止以至大鈔與銅錢相權通行為便從之四年時仁宗已即位罷至大錢鈔詔曰我世祖皇帝參酌古今立中統至元鈔法天下流行公私䝉利五十年於茲矣比者尚書省不究利病率意變更既創至大銀鈔又鑄大元至大銅錢鈔以倍數太多輕重失宜錢以鼓鑄弗給新舊資用曽未再期其弊滋甚爰咨廷議允協輿言皆願變通以復舊制其罷資國院及各處泉貨監提舉司買賣銅器聽民自便應尚書省已𤼵各處鈔本及至大銅錢截日封貯民間行使者赴行用庫倒换仁宗時復下詔鼓鑄尋罷後遂專用至元中統鈔文宗天厯元年監察御史言户部鈔法嵗㑹其數易故以新期於流通不岀其數邇者倒剌河以上都經費不足命有司刻板印鈔二事既定宜急收毁從之二年更鑄鈔法仍毁其刻者順帝至正十年丞相脫脫欲更鈔法乃集省臺兩院共議之先是左司郎中武祺以鈔法不行請如舊凡合支名目於總庫轉支從之至是與吏部尚書偰哲篤請以鈔一貫文省權銅錢一千文鈔為母而錢為子國子祭酒吕思誠言中統至元自有母子豈有以故紙為母而立銅為子者乎又錢鈔用法以虚换實也今歴年錢與至正錢中統至元鈔交鈔分為五項慮下民藏其實而棄其虗恐不為國家利且至元偽鈔人猶識之交鈔人未之識偽將滋多若錢鈔兼行輕重不論何者為母何者為子脫脫不從遂定更鈔之議以中統交鈔一貫文省權銅錢一千文準至元鈔二貫仍鑄至元通寳鈔與歴代銅錢並用以實鈔法至元鈔通行如故令民間通用行之未久物價騰踴至逾十倍十六年禁銷毁販賣銅錢十七年京師立便民六庫倒易昬鈔十八年以陜西軍旅事劇供費艱難遂分户部寳鈔等官就陜西置局印造寳鈔明太祖初置寳源局於應天鑄大中通寳錢與歴代錢兼行以四百文為一貫及平陳友諒命江西行省置貨泉局頒大中通寳錢大小五等錢式即位頒洪武通寳錢其制凡五等曰當十當五當三當二當一當十錢重一兩餘逓降至重一錢止各行省皆設寳泉局與寳源局並鑄而嚴私鑄之禁洪武四年改鑄大中洪武通寳大錢為小錢初寳源局錢鑄京字於背後多不鑄民間無京字者不行故改鑄小錢以便之尋令私鑄錢作廢銅送官償以錢七年帝以有司責民出銅民毁器皿輸官頗以為苦而商賈沿元之舊習用鈔多不便用錢乃設寳鈔提舉司八年令造大明寳鈔令民間通行以桑穰為料其制方髙一尺廣六寸質青色外為横文花欄横題其額曰大明通行寳鈔其内上兩旁復為篆文八字曰大明寳鈔天下通行中圖錢貫十串為一貫其下云中書省奏準印造大明寳鈔與銅錢通行使用偽造者斬告捕者賞銀二十五兩仍給犯人財産若五百文則畫錢文為五串餘如其制而逓減之其等凡六曰一貫曰五百文四百文三百文二百文一百文每鈔一貫準錢千文銀一兩四貫準黄金一兩禁民間不得以金銀貨物交易違者罪之以金銀易鈔者聽遂罷寳源寳泉局十年復設寳泉局鑄小錢與鈔兼行百文以下止用錢商稅兼收錢鈔錢三鈔七十三年令所在置行用庫許軍民商賈以昬鈔納庫易新鈔量收工墨直十五年置户部寳鈔廣源庫廣惠庫入則廣源掌之出則廣惠掌之二十二年詔更定錢式生銅一斤鑄小錢百六十折二錢半之當三至當十準是為差更造小鈔自十文至五十文二十四年諭𣙜稅官吏凡鈔有字貫可辨者不問爛損即收受解京抑勒與偽充者罪之二十五年設寳鈔行用庫於東市凡三庫各給鈔三萬錠為鈔本倒收舊鈔送内府令大明寳鈔與歴代錢兼行鈔一貫準錢千文提舉司於三月内印造十月内止所造鈔送内府充賞賚二十六年罷行用庫又罷寳泉局時兩浙江西閩廣民重錢輕鈔有以錢六十文折鈔一貫者由是物價翔貴而錢法益壊不行二十七年令軍民商賈所有銅錢有司收歸官依數換鈔不許行使三十年乃更申交易用金銀之禁成祖初犯者以姦惡論二年詔犯者免死惟置造首飾器皿不在禁例户部尚書夏原吉請更鈔板篆文為永樂帝命仍其舊永樂二年都御史陳瑛言比嵗鈔法不通皆縁朝廷出鈔太多收歛無法以致物重鈔輕莫若暫行户口食鹽法天下人民不下千萬户官軍不下二百萬家誠令計口納鈔食鹽可收五千餘萬錠帝令户部㑹羣臣議大口月食鹽一斤納鈔一貫小口半之從其議設北京寳鈔提舉司稅糧課程贓罰俱折收鈔其直視洪武初減十之九後又令鹽官納舊鈔支鹽發南京抽分場積薪龍江提舉司竹木鬻之軍民收其鈔應天嵗辦蘆柴徴鈔十之八九年令差官於浙江江西廣東福建四布政司鑄永樂通寳錢仁宗洪熙元年以鈔不行詢夏原吉原吉言鈔多則輕少則重民間鈔不行縁散多歛少宜為法歛之請肆市門攤諸稅度量輕重加其課程鈔入官官取昬軟者悉燬之自今官鈔宜少岀民間得鈔難則自然重矣乃下令曰所増門攤課程鈔法通即復舊金銀布帛交易者亦暫禁止是時民卒輕鈔宣宗宣德初米一石用鈔五十貫乃弛布帛米麥交易之禁凡以金銀交易及匿貨増直者罰鈔府縣衛所倉糧積至十五年以上者鹽糧悉收鈔秋糧亦折鈔三分門攤課鈔増五倍塌房店舍月納鈔五百貫果園驘車並令納鈔俟鈔法通止又禁交易用銀一錢者罰鈔千貫贓吏受銀一兩者追鈔萬貫更追免罪鈔如之九年令南京工部并浙江等布政司鑄宣德通寳錢英宗正統初收賦有米麥折銀之令遂減諸納鈔者而以米銀錢當鈔弛用銀之禁朝野率皆用銀其小者乃用錢惟折官俸用鈔鈔壅不行代宗景泰四年令民間將銅錢折鈔阻壊鈔法者論如律天順四年令民間除假錢錫錢外凡歴代并洪武永樂宣德銅錢及折二當三依數准使憲宗成化三年令内外課程俱錢鈔中半兼收如應納一貫者止納鈔一貫不在兼收之例十七年令京師内外止許行歴代及洪武永樂宣德舊錢每錢八文折銀一分八十文折銀一錢不得以私造新錢攙入阻壊錢法孝宗𢎞治元年詔稅課司順天山東河南户口食鹽俱收鈔各鈔關錢鈔兼收其後改折用銀洪武永樂宣德錢積不用詔發之令與歴代錢兼用户部請鼓鑄乃復開局鑄錢凡納贖收稅歴代錢制錢各收其半無制錢即收舊錢二以當一時制錢七百當銀一兩其後私錢盛行楮鈔壅滯大學士邱濬言臣按金銀之屬細分之則耗布帛之屬片析之則廢惟鑄銅為錢物多則予之以多物少則予之以少惟所用而得焉且金銀岀於天幣帛成於人錢也者合天人以成其器銅天生者也而成錢則人為之矣自古論錢法者惟南齊孔顗所謂不惜銅不愛工二語者萬世不易之良法也體質厚而肉好適均製作工而輪廊周正本多而工費雖驅之使鑄彼亦不為矣况冐禁而盗為之哉然自太府圜法以來以銅為泉或為半兩或為榆莢或為八銖或為四銖惟漢之五銖為得其中五銖之後或為赤仄或為當千或為鵝眼綖繯或為荷葉惟唐之開元為得其中二者之外或以一當三以一當十以一當百然皆行之不久而遽變惟其質製如開元者則至今通行焉惜古鑄之存世者無幾凡市肆流行而通使者皆盗鑄之偽物耳銷古為今廢真售偽滔滔者然莫如之何為今之計莫若拘盗鑄之徒以為工收新造之錢以為銅本孔顗此說别為一種新錢以新天下之耳目革天下之宿弊利天下之人民每錢以十分為重中間錢文必以古篆或用年號别製佳名其靣上加識以楷書二字上皇下明輪廓之旁周廻鑿以花紋每文計用銅十五分又令天下輸舊錢於官以易新錢所得舊錢週以細紋如新錢製式然後散之天下仍詔非此二様錢勿用則錢法流通而公私俱便矣又曰本朝制銅錢寳鈔相兼行使然錢之弊在於偽鈔之弊在於多請稽古三幣之法以銀為上幣錢為中幣鈔為下幣以中下二幣為公私通用之具而一準上幣以權之焉盖自國初以來有銀禁恐其或閡錢鈔也而錢之用不岀於閩廣宣德正統以後錢始用於西北自天順成化以來鈔之用益㣲矣必欲如寳鈔屬鏹之刑每一貫準錢一千銀一兩以復初製之舊必不可也今莫若銀與錢鈔相權而行每銀一分易錢十文新製之鈔每貫易錢十文四角完全未中折者每貫易錢五文中折者三文昏爛而有一貫字者一文通詔天下以為定制而嚴立擅自加減之罪則銀與錢鈔交易之數一定而永不易矣十六年鑄𢎞治通寳每文重錢二分武宗正德初司鑰庫太監龎􅀈言自𢎞治間𣙜關折銀入承運庫錢鈔缺乏支放不給請遵成化舊制錢鈔兼收從之三年以太倉積錢給官俸十分為率錢一銀九又從太監張永言𤼵天財庫及户部布政司庫錢關給徴收每七十文徴銀一錢且申私鑄之禁七年令稅課俱收舊錢與國朝銅錢相兼行用世宗嘉靖四年令宣課分司收稅鈔一貫折銀三釐錢七文折銀一分是時鈔久不行錢亦大壅六年大鑄嘉靖錢每文重一錢三分且補鑄累朝未鑄者南京吏部司務朱希臯奏稱户工二部請開納銀入監開礦煎銀不若採銅鑄錢下户部議尚書梁材奏曰兩京見有寳源局設官鑄錢良法羙意固未嘗費至於嚴禁偽錢使歴代好錢與制錢法兼行使具在律令及岀榜禁約至再至三并天下户口食鹽每月進納本色錢鈔俱用制錢及歴代好錢送廣恵庫交收聽候光禄太常二寺開領貿易疏通錢法具在但法久弊生盗鑄輙起緝捕一懈偽錢四行若不痛加嚴治何以屏息姦頑及查嘉靖制錢尚有一萬四千五百七十九萬九千三百六十文未曽補鑄通合議處欲候命下户部移咨兩京工部將未鑄嘉靖制錢一萬四千五百七十九萬九千三百六十文工部監造九千七百一十九萬九千五百七十三文南京工部監造四千八百五十九萬九千七百八十七文俱送太倉銀庫交收以備給商等項支用及咨都察院并天下巡按御史申明禁約不拘洪武永樂宣德𢎞治嘉靖通寳及歴代制錢相兼行使每好錢七十文准銀一錢皮混低錢以二折一若有藏蓄私鑄小錢許赴所在官司首岀照依鉛錫時價動支官銀給領仍免其罪違者論如律從之十九年以鑄錢所得不償所費暫行停止三十二年令照新式鑄洪武至正德紀元九號錢每號一百萬錠每錠五千文嘉靖錢一千萬錠内工部六分南京工部四分若分鑄稅課抽分諸厰専收嘉靖錢民患錢少乃𤼵内庫新舊錢八千一百萬文折給俸糧又令通行歴代錢有銷新舊錢及以銅造像製器者罪比盗鑄先是民間行濫惡錢率以三四十錢當銀一分後益雜鉛錫薄劣無形製至以六七十文當銀一分後楮夾其中不可辨用給事中李用敬言以制錢與前代雜錢相兼行上品者俱七文當銀一分視錢髙下為三等下者二十一文當銀一分私造濫惡錢悉禁不行時小錢行久民頗不便四十三年以私鑄盛行錢法阻滯大學士徐階奏連日錢法雖稱已通然其實僅通十分之五臣等訪求弊源非民之梗法實局鑄造制錢之不如法有以致之也盖制錢之解自南京者其背或以金塗之謂之金背或以火熏其背使黑謂之火漆其雲南所解及寳源局先年所鑄純用銅錫不攙以鉛每錢一文重一錢二分錢邊皆鏇其色黄羙其質堅重其邊圓整謂之鏇邊近年局中所鑄革去車鏇止用鑄剉二匠工匠又侵盗銅料色雜質輕其邊剉磨麄糙謂之一條棍鏇邊工料重大不利私鑄一條棍者工費輕省私鑄盛行且一條棍與私鑄之錢相似而難辨民間不肯行使并將金背等項亦皆不行前日依法禁治而無藉之徒乘機以假錢脇制接受於是民間閉門罷市官司只得令使金背等錢而於一條棍等從其便夫錢曰金背火漆鏇邊一條棍盖四名矣然其實寳源局所鑄一條棍之數多而南京所解金背之數少故今所通僅得十分之五也臣竊謂一條棍既已不能强民行使若寳源局仍鑄不已有五害焉户工二部每年以二萬八千有用之銀投諸無用之地一也中奸猾之計開私鑄之門二也朝廷以此賞中外之人彼賞者得錢而無用三也官府給與民商有虧抑之怨四也錢法因之阻滯禁治之令不行虧損國體五也不若令工部停止寳源之鑄造而令户部以南京雲南所解及稅課司所收金背等錢每年輳一千萬文送司鑰庫備賞賜之用部中合給錢者則以鑄錢之銀代給則銀不虚費錢不乏用奸弊革而私鑄止矣從之四十四年寳源局鑄嘉靖錢行於市後因鏇邊勞費以鑢盪代之而鑄工競用鉛錫以便剉奸徒盗鑄并金背亦不售後部議止勿鑄公費惟用白銀先是御史何廷鈓請許民用小錢以六十文當銀一分又嘉靖錢七文洪武諸錢十文前代錢三十文當銀一分然濫惡小錢雖奉㫖間行竟不復用而民間競鑄嘉靖通寳錢與官錢並行焉後給事中殷正茂請採雲南銅鑄錢工本銀三十九萬可得錢六萬五千萬文直銀九十三萬餘兩足以稍助國家之急數年巡按王諍言宣課司收稅以七文當一分奸民乘機阻撓錢多則惡濫相欺錢少則増值望利自今準折聽民便不必定文數而課稅及官俸俱用銀乃罷雲南鑄錢于是階陳五害帝乃鞫治工匠侵料減工罪而停鼔鑄自後嵗課徴銀而不徴錢民間止冇制錢不用古錢而私鑄者多穆宗隆慶初錢法不行兵部侍郎譚綸言欲富民必重粟帛而賤銀欲賤銀必置錢法以濟銀之不足今錢惟布於下而不以輸上故其權在市井請令民得以錢輸官則錢法自通於是課稅銀三兩以下復收錢時錢八文折銀一分髙拱再相言錢法朝議夕更迄無成説小民恐今日得錢而明日不用是以愈更愈亂請勿多為制亂人耳目帝深然之錢法復通時寳鈔不用垂百餘年惟俸錢支鈔如故四年始議新鑄隆慶錢給京官俸是時巡撫山西都御史靳學顔上書議鑄錢曰臣聞人之所由生衣食為大王者利用厚生必先乎此此出於天時地利人力相待而共成三才之用者也有此三才即有此布帛五糓増虧相乘有無相貿而非有水旱之災兵革之奪癘疫之妨以一嵗之功而供一年之用也今民愁居懾處司計者日夜憂煩遑遑以匱乏為慮者豈布帛五糓之不足哉謂銀不足耳夫銀者寒不可衣饑不可食不過貿遷以通衣食之用爾而銅錢亦貿遷以通用與銀異質而通神者猶雲南不用錢而用海巴三者不同而致用一焉今獨奈何用銀而廢錢惟時天下用錢者曾不什一而錢法久矣其不舉矣錢益廢則銀益獨行銀獨行則豪右之藏益深而銀益貴銀貴則貨益賤而折色之辨益難而豪右者又乘其賤而收之時則貴而糶之銀之積在豪右者愈厚而銀之行於天下者愈少再踰數年臣不知其又何如也則錢法不行之故爾計者又欲開礦夫礦不可開開無益也一禁而不可弛弛則亂矣臣試根極錢説而司計者擇焉臣聞錢者泉也如水之行地中不得一日廢者從成周漢唐宋以來史籍可覩未有用銀廢錢如今日之甚者也而用錢之多鑄錢之盛者尤莫如宋故宋太祖欲集錢至五百萬而贖山後諸郡於遼靖康中趙良嗣奉使嵗加稅銀一百萬餘金其平時賂契丹寧夏也嵗幣率有常額其外國亦用錢可知又宋之饒州處州江寧等處皆其鼔鑄之地今江南人家嘗有發地得窖錢者則無南北皆用錢可知其餘書史所嘗言幾百萬無慮鉅萬累鉅萬之説率多以錢計今去宋不逺故所用錢多宋之物夫用錢則民生日裕鑄錢則國用益饒惟人主得為之故曰聖人之大寳曰位因位而制權因權而制用故又曰錢者權也一代之興則制之一主之立則制之改元則制之軍國不足則制之此經國足用之一大政也奈何廢而不舉臣竊聞江南富室有積銀至數十萬兩者今皇上天府之積亦不過百萬兩以上若使銀獨行而錢遂廢焉是不過數十里富室之積足相擬矣皇上試一舉其權而振之則彼富室者知勇豪俊者將奔走於吾權之不暇彼敢冐萬死而盗鑄一文者哉故曰權也權者立之無形而達之無窮用之則天下求我而有餘不用則日擾擾焉求天下而不足為騐甚明也且夫富貴其權一也皇上今岀數寸之符移片紙之檄以匹夫而拜將相焉又能使同姓王異姓侯焉於公帑未有損也此馭貴之權若是乎其易也若乃今日與人以千金焉明日與人以萬金焉曽不踰年而太倉告匱矣夫何馭富之權若是乎其不侔與誠以有權而不用與無權等爾昔漢文帝寵鄧通也曰吾能富之賜以蜀山之銅而鄧氏之錢滿天下呉王濞擅鑄山之利而輙稱兵與漢廷抗夫以竊一日之權尚足以得民而抗漢况以萬乗而自振其權可勝用哉今之為計者謂錢法之難有二一曰利不酬本所費多而所得鮮矣臣愚以為此取效於旦夕計本利於岀入盖民間之算非天府之算也夫天府之算以山海之産為材以億兆之力為工以修潔英達之士為役果何本而何利哉此所謂本猶不免用銀之説爾臣所謂本盖無形之權是已何則鑄錢之須一曰銅料一曰炭一曰轉致一曰人工夫此四者在民間之計銀一分而得錢四分誠不酬五矣自臣愚計之皆可不用銀而取辦者誠將天下出産銅料之處贖軍徒以下之罪而定其則以收銅於西山産煤之窯以法司有罪之人而准其罪以納炭其運炭則請岀府庫見有之錢或於京城或於近縣或於營軍如係官身則量給以工食如係民户則平給以脚價如是而患無材與夫轉致之難臣不信也至於人工取之見役而皆足則又不煩銀兩而可辦也臣不知工部及寳源局額匠役若干見今坐食否耶即以營軍九萬人論之抽用其一二千人足矣而謂妨訓練耶今京城之内鍜金刺繡聲技力作之徒與夫靠衙門而衣食者孰非營軍奚啻二千也而未嘗患其妨凡此皆不用銀而可以成務固無本利之足較矣其二曰民不願行强之恐物情之沸騰也臣愚以為歴代無不可之至稱為錢神我朝又用之祇見其利不聞其病正德嘉靖以前猶盛行之盖五六百而值一兩今七八十嵗人固多尚可一召而訊也獨至於今屢行而屢廢甫行而輒輟焉何哉臣竊詳之錢比鈔異於小民無不利也獨所不便者奸豪耳一曰盗不便一曰官為奸弊不便一曰商賈持挾不便一曰豪家盖藏不便此數不便者與小民無與也臣竊聞往時但一行錢法則輙張告示戒厰衛不先於賣菜之傭則責之以荷擔之役愚而相煽既閉匿觀望之不免而奸豪右族依托城社者又從旁簧鼔之以濟其不便之私一日而下令二日而閉匿不三四日而中阻矣務大計者宜若是之易動哉臣聞施恩澤者自無告始行法令者自貴近始豈惟貴近自朝廷始可也請自今以後追抵贖者除折榖外而責之以納錢上事例者除二分納銀外而一分以納錢存留户口則兼收錢榖商稅課程則純用收錢此謂自朝廷始又因而賜予之費宗室之禄百官之俸則銀錢兼支又因而驛逓應付雇夫雇馬則惟錢是用又因而軍旅之餉則分其主客量其逺近或以代花布或以充折色此謂自貴近始矣此數者有岀有入而民間無底滯之患誠以上下交㑹血脈流通故也輕斂輕散官府有餘積之藏誠以正賦之銀既以無減於常額而一切之費又取辦於一權故也此權不可通之於天下以啟盗權之釁請於寳源局或西倉専設侍郎或即用左右侍郎一員督於上以十三司員外或主事分理十三省事於下以科道各一員監之銅料工材各有攸掌各省歛散悉照分司先以區書條議計定而行而又輕重適均無駭於俗仍唐宋以來舊錢兼之或上施下或下納上著之以必行之令遲之以嵗月之效久之而本末兼利公私循環可以輟鼓鑄之勞而罷工作之使也昔我祖宗先制鈔時下令甚嚴有以金銀貨物交易者輙没給告者然不徒責之下也後又令各處稅糧課程贓罪俱折收鈔此固血脈流通之意所謂泉也而法以佐之所謂權也神宗萬厯四年命户工二部准嘉靖錢式鑄萬厯通寳錢金背及火漆錢一文重一錢二分五釐又鑄鏇邊錢一文重一錢三分頒行天下俸糧兼給銀錢後神宗宫費稍侈令工部鑄錢給用大學士張居正疏曰按工部議製錢二萬錠該錢一萬萬文用工本銀十四萬九千兩大半太倉銀庫此奉㫖鑄錢之大略也臣等伏見先朝鑄造制錢原以通幣使民鑄成之後諒進少許呈様非所以進供上用者也萬厯二年鑄造之初亦止進様錢一千萬文其後以一半通用已非進幣便民之本意今若以賞用闕錢徑行鑄造通用則是以外府之儲取充内庫大失舊制矣且京師民間嘉靖錢最多自鑄萬厯錢後愚民訛為止行新錢不行舊錢甚以為苦今若廣鑄新錢則嘉靖舊錢必至阻滯不行於民甚為不便又與原奉聖㫖與嘉靖隆慶等錢兼行之意相背伏望暫停鑄造從之六年定嘉靖隆慶萬厯制錢每金背八文準銀一分火漆鏇邊各十文準銀一分洪武等錢與古錢十二文準銀一分十年詔暫停各處錢局俟錢法疏通聽鼓鑄十三年鑄萬厯通寳錢十五萬錠南京工部分鑄六萬錠十四年湖廣撫臣奏武荆衡三局所鑄各限一式民間俱不通用武局者不能行之荆州衡局者不能行之武昌請今後不得妄分新舊揀擇彼此按萬厯中雲南巡按郭庭梧言國初京師有寳源局各省有寳泉局至嘉靖間省局停廢滇中産銅不行鼓鑄而反以重價購海􅚔非利也遂開局鑄錢尋命十三布政司皆開局以五銖錢為準用四火黄銅鑄金背二火黄銅鑄火漆盖以費多利少私鑄自息也久之户部言錢之輕重不常輕則歛重則散故無壅閼匱乏之患初鑄時金背十文折銀一分今萬厯金背五文嘉靖金背四文折銀一分火漆鏇邊亦如之僅踰十年而輕重不啻相半宜發庫貯以平其直從之熹宗天啟元年鑄泰昌錢兵部尚書王象乾請鑄當十當百當千三等大錢略倣白金三品之制後有言大錢之弊者詔停鑄莊烈帝崇禎三年御史饒京言鑄錢開局本通行天下今苦於無息旋開旋罷各局所鑄之息不盡歸朝廷復苦無鑄本盖以買銅而非採銅也乞遵洪武初及永樂九年嘉靖六年例遣官各省鑄錢採銅於産銅之地倣銀礦法十取其三銅山之利朝廷擅之小民所採仍予以直從之已而荆州主事朱大受専督鑄錢定錢式每文重一錢每千直銀一兩南都錢輕薄乃定每文重八分初嘉靖錢最重隆萬錢加重半銖自啟禎新鑄出舊錢悉棄置然日以惡薄末年勅鑄當五錢竟未及行史臣曰明制歴代錢與制錢通行自神宗初從僉都御史龎尚鵬議古錢止許行民間輸稅贖罪俱用制錢啟禎時廣鑄錢始括古錢以充廢銅民間市易亦擯不用矣莊烈帝初即位御平臺召對給事中黄承昊疏有銷古錢之語大學士劉鴻訓言北方皆用古錢若驟廢之於民不便帝以為然既而以御史王爕言收銷舊錢但行新錢於是古錢銷毁頓盡盖自隋時盡銷古錢至是凡再見之鈔法自𢎞正間廢天啟時給事中惠世揚復請造行崇禎末有蔣臣者申其説擢為户部司務倪元璐方掌部事力主之然終不可行而止欽定續通典卷十三
