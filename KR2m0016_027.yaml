body:
  text: 職官尚書下吏部尚書侍郎郎郎中勳員外即員司封即中功員外司郎中外郎考郎中員外郎主事附唐肅宗至德二載仍改文部曰吏部尚書一人侍郎二人為尚書之二掌文選勳封考課之政以三銓之法官天下之材以身言書判德行才用勞效較其優劣而定其留放為之注擬其屬有四曰吏部曰司封曰司勳曰考功各有郎中員外郎掌其事自肅代兵興官員冗濫銓注日淆德宗建中時太常寺協律郎沈既濟建言近世爵祿失之者久請五品以上及羣司長官宰臣進叙吏部得參議焉六品以下或僚佐之屬聽州府辟用則銓擇之法委於四方結奏之成歸於吏部使接名僞命之徒菲才薄行之人下詔之日隨聲而廢通大數十去八九矣帝善其言而不能用是時吏部數嵗一集選人文簿紛雜吏得因緣為姦士至蹉跌或十年不得官而闕員亦纍嵗不補陸贄為相乃懲其弊命吏部內外員三分之計闕集人嵗以為常郎中二人掌文官階品朝集祿賜給其告身假使一人選補流外官員外郎二人一人判南曹皆為尚書侍郎之二司封郎中一人員外郎一人掌封命朝會賜豫之級司勳郎中一人員外郎二人掌官吏勳級考功郎中一人員外郎一人掌文武百官功過善惡之考法及其行狀若死而傳於史官諡於太常則以其行狀質其當否其欲銘於碑者則㑹百官宜述者以聞報其家宋制吏部尚書一人掌文武官吏選試擬注資任遷叙䕃補考課之政封爵䇿勳賞罰殿最之法尚書共掌二選曰尚書左選曰尚書右選文臣京朝官以上及職任非中書省除授者左選掌之武臣升朝官以上及職任非樞密院除授者右選掌之太道至道二年置判部事二人以帶職或無職京朝官充哲宗元祐初置權尚書序在試尚書之下時吏部資望重於他部說在厯代尚書篇孝宗乾道九年葉顒權吏部尚書召對便殿賜坐賜茶帝因言吏部條例朕置一通在禁中卿當以何者為先對曰以公忠為先又蘇頌前後掌天官四選每選人改官關升磨勘吏故為稽滯頌敕吏云某官緣官事當㑹某處合用某例時稱其明允侍郎一人為尚書之二侍郎共掌二選曰侍郎左選曰侍郎右選自初任至幕職州縣官左選掌之自副尉以上至從義郎右選掌之元祐初置權侍郎如未厯給事中中書舍人及待制以上者帶權字祿賜比諫議大夫郎中四人員外郎四人分尚左尚右侍左侍右參掌選事而分治之舊主判二人以朝官充元豐官制行置郎中員外郎凡郎官並用知府資序以上人充未及者為員外郎髙宗建炎四年詔權攝添差郎官吏部郎官掌選事其職不輕授初神宗熙寧中劉述為侍御史十一年不奏課帝知具久次授吏部郎中胡銓亦以奏對稱㫖遷尚書左郎司封郎中一人員外郎一人掌官封叙贈承襲之事凡三師三公以下至升朝官褒贈祖考母妻親王郡王內外命婦以下保任宗屬封爵諸親皆因其位叙而為之等凡宗室當賜名訓具鈔擬官凡庶姓孔柴氏折氏之後應承襲者辨其嫡庶舊制司封判事一人初以無職事朝官充凡封爵之制一出於中書本司但掌定諡先期戒本部赴集而已元豐官制行始置郎中員外郎實行本司事司勳郎中一人員外郎一人掌勳賞之事孝宗隆興元年省併以司封郎中兼領淳熙元年復以司農寺丞范仲苞兼司勳未幾改除復省考功郎中一人員外郎一人掌文武官選叙磨勘資任考課之政令凡命官隨所𨽻遷以其職事具法於歷給之於其屬州若司嵗書其功過應升遷授者驗歷按法而叙進之有負殿則正其罪罰以七事考監司以四善三最考守令凡應諡者覆太常所定行狀報尚書省集議以聞哲宗紹聖四年河東提刑司徐君平奏乞凡將集議前三日持考功狀遍示當議之官使先紬繹而後集於都堂以詢之庶幾有所見者得以自申以稱朝廷博謀盡下之意詔從之舊制判司事一人以帶職朝官或無職事朝官充元豐官制行置郎中員外郎實行本司事遼北面官有南樞密院掌文銓視吏部而部族丁賦之政亦與焉南面官吏部有尚書侍郎郎中員外郎金吏部尚書一人掌文武選授勳封考課出給制誥之政以才行勞效比仕者之能否以行止文册貼黃簿制各闕之機要正七品以上以名上省聽制授從七品以下每至季月則循資格而擬注自八品以上則奏以下則否侍郎一人為尚書之二郎中二人一人掌文武選流外遷用官吏差使行止名簿封爵制誥一人掌勳級酬賞承襲用䕃循遷致仕考課議諡之事員外郎分判曹務及參議事所掌與郎中同凡內外官之政績所歷之資考更代之期去就之故秩滿皆備陳於解由據以定能否又撮解由之要於銓擬時讀之謂之銓頭又會歷任銓頭而書於行止簿以資考功過章宗泰和四年定考課法凖唐令作四善十七最之制而遷叙之元吏部尚書三人掌天下官吏選授之政令凡職官銓綜之典吏員調補之格勳封爵邑之制考課殿最之法悉以任之世祖中統元年以吏戶禮為左三部尚書二人至元元年以吏禮自為一部尚書三人三年復為左三部五年又合為吏禮部尚書仍二人七年始專立吏部尚書一人八年仍為吏禮部尚書一人十三年又專立吏部尚書增至七人十九年減為二人二十八年增尚書為三人遂為定制皇慶延祐中由進士入官者僅百之一由吏致位顯要者常十之九泰定帝欲以中書參議傳巖起為吏部尚書御史韓鏞上言吏部掌天下銓衡巖起於法不可用詔從之侍郎二人為尚書之二中統元年設左三部侍郎二人至元元年以吏禮自為一部侍郎仍二人五年又合為吏禮部侍郎一人七年專立吏部侍郎一人八年仍合為吏禮部侍郎一人十三年專立吏部侍郎三人十九年定侍郎為一人遂為永制郎中二人員外郎二人中統元年設左三部郎中四人員外郎六人五年合為吏禮部郎中員外郎各一人七年專置吏部郎中二人員外郎二人十三年員外郎置四人十九年裁置郎中一人員外郎二人二十三年定郎中員外郎各二人遂為永制考功郎中一人員外郎一人元初無是職順帝至正元年巴延等奏請置吏部考功郎官詔從之明吏部尚書一人掌天下官吏選授勳封考課之政令以甄别人才贊天子治蓋古冢宰之職洪武元年始設六部部設尚書𨽻中書省六年部設尚書二人十三年罷中書省倣周官六卿之制升六部秩各設尚書一人而吏部視五部為特重明制吏部表率百僚進退庶官銓衡重地不輕制授信任特專宣宗宣德中蹇義為吏部尚書有除官不得善地訴其不公者帝皆斥之王翺為吏部尚書嚴考察公銓注抑奔競杜請寄一時任使並稱得人上進退大臣時召翺面詢可否憲宗成化中李裕拜冢宰裕感上知遇精白思報每大選先二日於後堂設一木榻上書皇天鑒之與二侍郎傍坐文選司官前立以缺員與選人一一第資格可否注牘至期引奏填榜更無舛錯故庶官皆得其人孝宗𢎞治中召王恕拜吏部尚書言官謂恕老而賢不當勞以繁劇宜用之內閣備顧問帝曰朕用蹇義王直故事官恕吏部謀議無所不聽從何必內閣恕在吏部訪海內之士隨器薦用馬文升遷冢宰明年當大計帝面諭之曰天下覲吏畢集卿其用心採訪以彰默陟文升頓首日陛下圖治若此宗社福也敢不仰承乃令中貴人掖之下階自是汰不職者二千餘人世宗嘉靖中唐龍為吏部尚書兼論資望殊勞異能疏逺必用中才不得越次以進有所用舍聚同僚共謀衆議合然後署疏以請侍郎二人為尚書之二惠帝建文中改六部尚書為正一品設左右侍中位侍郎上永樂時悉復舊制吏部侍郎為重任嘉靖時侍郎缺出廷臣以應補者上帝不用諭欲得老成持法者以南京兵部侍郎歐陽鐸上乃用之鐸佐吏部不携家曰吾敢家此官哉文選郎中一人員外郎一人洪武二十九年置文選郎官即前代之吏部郎中也掌官吏班秩遷升改調之事以贊尚書凡選法有六咸登資簿釐其流品平其銓注而序遷之主事一人職掌與郎中員外郎同按各部郎官終明之世增省選不一兹特載其初設者明制郎職任最重英宗天順中黃孔昭為都水員外郎郎署無故例不得改調以孔昭賢特奏改文選郎中孔昭持法最慎汲汲以人才為慮凡詢訪有所得必書於册往往隨地量才各得其用嘉靖中屠楷歷文選郎中几職官繁簡人才賢不肖咸書之於册以髙下其任先節行論後才藝抑奔競奬亷能每注選因才授職權勢請託抗不從侍郎霍韜見其自任始不能平久而益信且服之及出部遺以所服寓傳衣之意侍郎張邦竒署部事楷久任當遷邦竒奏留之曰四十年來無此文選云驗封郎中一人員外郎一人主事一人驗封即古司封之職掌封爵襲䕃褒贈吏算之事稽勳郎中一人員外郎一人主事一人稽勳即古司勳之職掌勳級名籍喪養之事考功郎中一人員外郎一人主事一人掌官吏考課之事南京吏部尚書一人自成祖初建北京分置六部及定都後以京官屬移之北仁宗洪熙元年復置六部官屬於南京其時或稱行在以別南京或去行在字加南京字以别北京說在尚書省篇右侍郎一人侍郎自𢎞治後始專設右神宗萬歷三年俱革十一年復設熹宗天啓中每部添設侍郎一人莊烈帝又除之文選郎中一人主事一人驗封郎中一人稽勳郎中一人考功郎中一人主事一人凡南京官六年考察考功掌之不由北吏部户部尚書侍郎郎即中部員外即員度支郎中部員外金郎中外郎倉郎中員外郎主事附唐制户部尚書一人掌天下土地人民錢榖之政賦貢之差以佐邦治元宗間元以後賦法漸壞代宗廣德中始以畝定稅斂以夏秋德宗建中時楊炎作兩稅法置兩稅司以總之復遣黜陟使按比諸道已改貞觀時租庸調之法矣侍郎二人為尚書之二郎中二人員外郎二人掌户口土田賦役貢獻蠲免優復婚姻繼嗣之事以男女之黃小中丁老為之帳籍以永業口分園宅均其土田以租庸調斂其物以九等定天下之戶以佐尚書侍郎自憲宗元和以後兵興悉厚斂以饋餉令諸道節度觀察調費取於所治州不足則取於所屬州而屬州送使之餘因其上供者皆輸户部至會昌咸通末而制度日更矣度支郎中一人員外郎一人掌天下租賦物産豐約之宜水陸道途之利嵗計而支調之以近及逺與中書門下議定乃奏至德時率以諸行郎官分判錢穀會昌二年著令以本行郎官分判錢榖時以財賦之任最重故李紳以中書侍郎同門下平章事判度支鄭肅盧商皆以中書侍郎同門下平章事判度支自此以後判度支悉歸宰臣焉金部郎中一人員外郎一人掌天下庫藏出納權衡度量之數建中時罷鹽鐡等使天下錢榖皆歸金部中書門下揀兩司郎官準格式調掌元和時復制置鹽鐡諸使倉部郎中一人員外郎一人掌天下庫儲出納租稅祿糧倉廩之事以木契百合諸司出給之數以義倉常平倉備凶年平穀價宋户部尚書一人掌軍國用度以周知其出入盈虛之數凡州縣廢置户口登耗則稽其版籍若貢賦征稅斂散移用則會其數而頒其政令焉太祖建隆時以天下財計歸之三司本部無職掌止置判部事一人以兩制以上充元豐官制行始並歸户部建炎兵興嘗以知樞密院張慤提領措置户部財用後遷中書侍郎仍兼之五年復以參知政事孟庾提領措置後罷專委户部孝宗淳熙十年詔左藏南庫撥𨽻户部自罷三司後寺監兼理財用元祐元年司馬光奏言户部尚書宜兼領左右曹而舊散在五曹寺監者宜並歸户部則利權歸一乃詔尚書省立法李常為户部尚書作元祐會稽録三十卷韓忠彥為户部尚書因會稽録初成入狹而用廣因言斂財節用遂栽冗費置屬於户部侍郎二人為尚書之二建炎時止除長二各一員