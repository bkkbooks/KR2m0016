body:
  text: 刑守正唐五代宋遼金元明唐肅宗至德二年將軍王去榮以私怨殺本縣令當死帝以其善用炮敕免死以白衣於陕郡效力中書舍人賈至持詔不即行上表言去榮無狀殺本縣令而議者謂陕郡初復非其人不可守然則他無去榮者何以亦能堅守乎若以能用炮石即免誅死今諸軍技藝絶倫者其徒實繁必恃其能所在犯法又將何以止之太子太師韋見素等亦以為於律殺本縣令列於十惡而陛下寬之王法不行人倫道屈臣等奉詔不知所從願陛下守貞觀之法按去榮犯法律有應坐之條乃肅宗以炮石微長置凶惡於不問僅豫禠奪竟免刑誅未始非召亂啓奸之漸賈至韋見素等執法論情所言平允雖未見從而議不可沒故特載之德宗時郭子儀壻太僕卿趙縱為奴告下御史劾治奴留內侍省宰相張鎰言貞觀時有奴告主反者太宗曰謀反理不獨成當有他人覺發何藉奴告乃著令奴告主者斬由是賤不得干貴下不得凌上教本修而悖亂不作頃者長安令李濟以奴得罪萬年令霍晏因婢坐譴遂使輿臺下類主反畏之悖慢成風漸不可長建中元年詔書奴婢告主非謀叛者同自首法今縱事非叛逆而奴留禁中縱獨下獄情所不厭帝納之貶縱官奴杖死竇參為大理司直婺州刺史鄧珽坐贓八十貫珽與執政有舊以㑹赦欲免徴贓詔百僚雜議多希執政㫖參獨堅執珽竟伏法徴贓杜亞為東都留守盜劫輸絹于洛城北亞惡大將令狐運適運與其部下畋北郊亞意其為盜執訊之連繫者四十餘人亞將逞其宿怒且以得賊為功上表指明運盜之狀帝信而不疑宰臣以獄大宜審奏請覆治命侍御史李元素就鞫亞迎路以獄成告元素驗之五日盡釋其囚而還亞大驚且怒親追送馬上責之元素不答亞遂上疏誣搆元素及復命言未畢帝怒曰出俟命曰臣未盡詞帝又曰且去曰臣一出不得復見陛下乞容盡詞帝意稍緩乃備述運寃狀帝始悟後數月果得真盜京兆尹李充有美政裴延齡惡之誣劾充比陸贄數遺金帛當抵罪又乾沒京兆錢六十八萬緡請付比部鉤校時郎中崔元翰怨贄揣延齡指逮繫榜掠甚急內以險文刑部侍郎奚陟持平無所上下且言京兆錢給縣館傳餘以度支符用度略盡充既免元翰不得意以恚死憲宗朝江西觀察使裴堪奏䖍州刺史李將順贓狀朝廷不覆按遽貶將順道州司戶尚書左丞吕元膺封還詔書奏曰縱堪辭足信亦不可為天下法請發御史按問宰臣不能奪宣徽五坊小使方秋閲鷹狗所過撓官司厚得餉謝乃去下邽令裴寰不為禮因搆寰出醜言送詔獄當大不恭宰相武元衡婉辭諍帝怒未置御史中丞裴度見延英帝恚曰寰誠無罪杖小使小使無罪且杖寰度曰責若此固宜苐寰為令惜陛下百姓安可罪帝色霽乃釋寰神䇿軍自興元後日驕恣府縣不能制軍吏李昱貸富人錢八百萬三嵗不肯歸京兆尹許孟容遣吏捕詰與之期使償曰不如期且死一軍盡驚訴於朝詔以昱付軍治之再遣使皆不聽奏曰不奉詔臣當誅然臣職司輦轂當為陛下抑豪强錢未盡輸昱不可得帝嘉其守正許之京師豪右大震浮屠鍳虛者自貞元中關通賂遺倚宦豎為姦㑹坐于頔杜黃裳家事逮捕下獄御史中丞薛存誠窮劾之得贓數十萬當以大辟權近更保救於帝有詔釋之存誠不聽明日詔使詣臺諭曰朕須此囚面詰非赦也存誠奏曰獄已具陛下必欲召赦之請先殺臣乃可不然臣不敢奉詔鍳虛卒抵死穆宗長慶中裴潾為刑部郎中有前率府倉曹曲元衡杖殺百姓柏公成母法官以公成母死在辜外元衡以父䕃當贖罪徴銅公成私受元衡資貨母死不聞公府理官亦以經恩免罪潾議曰典刑者公柄也在官得施於部屬之內元衡身非在官公成母非部屬而擅慿威力橫此殘虐豈合拘於常典公成取貨於讐利母之死悖逆天性尤所必誅奏上敕元衡杖六十配流公成論死宿州刺史李直臣坐贓當死賂中人為之援解御史中丞牛僧孺堅執不回帝面諭之曰直臣事雖愆失然有經度才可委之邉任朕欲貸其死何如僧孺曰凡人不才止於持祿取容耳帝王之法束縳姦雄正為才多者祿山朱泚以才過人濁亂天下況直臣小才何為屈法哉上嘉納之文宗太和五年鄭注搆宗申錫獄捕逮倉卒事由內出無可證驗右散騎常侍崔元亮率諌官叩延英苦諍反覆數百言帝未諭元亮置笏在陛曰孟軻有言衆人皆曰殺之未可也卿大夫皆曰殺之未可也天下皆曰殺之然後察之乃置於法今殺一凡庶當稽典律況欲誅宰相乎臣為陛下惜天下法不為申錫言也俯伏流涕㑹大理卿王正雅與京兆尹崔琯亦上疏言宜得告事者考驗其辭狀以聞注等憚之由是獄稍解六年濮州掾崔元武受吏贓又率屬邑奉錢增私馬估售官叠二罪計絹百二十匹大理斷三犯以重者論抵入私馬為重止削三官刑部覆訊當流未决天平節度使殷侑奏三犯不同坐所重準律枉法十五匹已上絞頻犯者纍科元武犯皆枉法當死詔如部議元武决杖流賀州帝嘉侑守法進刑部尚書武宗㑹昌中澤潞平朝議以劉從諌妻裴氏為裴問之妹欲原之初從諌死稹叛裴以酒食㑹潞州將校妻子泣告以固逆謀法司請從重典刑部侍郎劉三復復奏曰從諌包藏禍心蹟狀顯著人臣叛逆合有三族之誅阿裴已不得免於極法又況從諌死後主張狂謀罪狀非一稹年幼小逆節未深裴為母氏宜誘說忠孝之道開陳禍福之原而乃激厲凶黨膠固叛心廣招將校之妻儼開酒食之晏號哭以激衆意贈解以結羣情遂使叛黨稽不捨之誅孽童延必死之命以至周嵗方就刑誅此阿裴之罪也雖以裴問之功或希減罪而國家有法難議從輕夫管叔周公親弟也有罪則除以周公之賢尚不赦兄弟之罪況裴問功效安能破朝廷之法耶據阿裴廢臣妾之道懷逆亂之謀裴問如周公之功尚合行周公之戮况於朝典固在不疑阿裴乞準法從之宣宗大中中韋澳為京兆尹帝舅鄭光主墅吏豪肆積年不輸官賦澳逮繫之他日帝問其故澳具道姦狀且言必置之法帝曰可貸否對曰陛下自內署擢臣尹京邑安可使畫一法獨行於貧下乎帝入白太后曰是不可犯后為輸租乃免後唐明宗時汴州倉吏七十二人定贓應死分戮於三市史彥弼為汴州牙校舊將之子石敬瑭之戚屬王建立奏希免死帝曰王法無親豈可私徇乃皆就戮吕琦為駕部員外郎兼侍御史知雜事河陽主藏吏盜所監物下軍巡獄獄吏尹訓納賂反其獄其家訴於朝下御史臺按驗得訓贓狀奏攝訓赴臺訓為安重誨所庇不與琦請不已訓懼自殺獄乃辨䝉活者甚衆晉開運初張仁願再為大理卿開州刺史王徹犯贓朝廷以徹功臣子欲宥之仁願纍執奏不移竟伏法宋太祖朝馬仁瑀為瀛州防禦使兄之子因醉誤殺平民繫獄當死民家自言非有憾也過誤爾願以過失傷論仁瑀曰我為長吏而兄子殺人此乃恃吾勢橫恣耳非過失也豈可以己之親而亂國法哉卒論如律淳化中張詠知銀臺封駮司張永德為并州帥有小校犯法笞之至死詔按其罪詠封還詔書且言陛下方委永德邉任若以一部校故摧辱主帥臣恐下陵上自此始太宗不從未幾果有營卒脅訴軍校者詠復引前事為言太宗乃改容勞之澶淵之役諸將臨敵退衄真宗已詔貸罪議者以為敗軍之將當誅帝惑以問殿前都指揮使髙瓊對曰罪誠當誅然陛下去嵗已釋其罪今復行之非信也又方屯諸路非時代易臣恐衆心疑懼乃止違制之法向無故失率坐徒二年王曽知審刑院請分故失非親被制書者止以失論帝不悅曰如是不復有違制者曽曰如陛下言亦無復有失者矣自是違制遂分景德中榮王宫火延前殿有言非天災請置獄劾火事當坐死者百餘人宰相王旦獨請見曰始失火時陛下以罪已詔天下而臣等皆上章待罪今反歸咎於人何以示信且火雖有跡寧知非天譴耶帝從之當坐者皆免王質知廬州日有盜殺其徒而并其財者獲之置於法大理駮曰法當原質謂盜殺其徒而自首者原之所以疑壞其黨而開其自新若殺而不首既獲而又原則公行為盜而苐殺一人既得兼其財又可以贖罪不獲則肆為盜獲則引以自原如此盜不可止非法意也疏三上貶監靈仙宫仁宗時近臣有罪多不下吏劾實不付有司議法諌官王贄言情有輕重理分故失而一切出於聖斷前後差異有傷政體刑法之官安所用哉請自今悉付有司正以法詔可沈德妃之弟惟恭樂安郡主之壻張承衍同管勾㑹靈觀觀燔黜惟恭蔡州承衍汝州妃主交為言乞留京師帝曰已行之命為貴戚所回則法徒設矣命趣行周敦頥為南安司理參軍有囚法不當死而轉運使欲深治之敦頥爭不勝投其告身以去曰如此尚可仕乎殺人以媚人吾不為也轉運使感悟囚卒不死神宗以韓晋卿為大理正晉卿自仁宗朝已典訟臬時朝廷有疑議輒下公卿雜議開封民爭鶉殺人王安石以為盜拒捕鬬而死殺之無罪晉卿曰是鬬殺也登州婦人謀殺夫郡守許遵執為按問安石復主之晉卿曰當死事久不决爭論盈廷終持之不肯變故事大理開封斷獄得請實蔽罪其後任情棄法法益不用哲宗時開封少尹虞奕言廷尉持天下平京師諸夏本法且不行何以示萬國請自今非情法實不相當毋得輒請從之髙宗紹興初張九成為鎮東軍僉判民冒鹺禁提刑張宗臣欲逮捕數十人九成爭之宗臣曰此事左相封來九成曰主上屢下恤刑之詔公不體聖意而觀望宰相耶宗臣怒九成即投􅊾歸孝宗時李浩知台州豪民鄭憲以資給事權門囊槖為姦事覺械繫之死獄中盡籍其家徙其妻孥權貴人教其家訟寃且誣浩以買妾事言者用是擠之疏方上權參政劉珙越次奏曰李浩為郡獲罪豪民為其所誣臣考其本末甚白帝顧曰守臣不畏彊禦豈易得耶且問章安在珙袖出之遂留中不下大理觀望猶欲還憲所沒資帝批其後曰台州所斷至甚允當鄭憲家資永不給還流徙如故明年大理奏結他獄帝顧輔臣曰棘寺官須得剛正如李浩者為之已而卿缺曰無以易浩遂除之程回知隆興府進賢縣省符下知平江府王佐决陳長年輒私賣田其從子訴有司十有八年母魚氏年七十坐獄廷辨按法追正令候母死服闋日理為已分令天下郡縣視此為法回為議曰天下之人孰無母慈子若孫宜定省溫清不宜有私財也在律别籍者有禁異財者有禁當報牒之初縣令杖而遣之使聽命於其母可矣何稽滯遍訴有司而達於登聞院乎春秋榖梁傳注曰臣無訟君之道為衛侯鄭與元咺發論也夫諸侯之於命大夫猶若此子孫之於母乃使坐獄以對吏愛其親者聞之不覺泣涕之橫集也按令文分材産謂祖父母父母服闋已前所有者然則母在子孫不得有私財借使其母一朝盡費其子孫亦不得違教令也既使歸於其母其日前所費乃卑幼輒用尊長物法須五年尊長告乃為理何至豫期母死又開他日爭訟之端也抑亦安知不令之子孫不死於母之前乎守令者民之師帥政教之所由出誠宜正守令不職之愆與子孫不孝之罪以敬天下之為人母者寧宗時董槐為廣德軍録事參軍民有誣富人李桷私鑄兵結豪傑以應李全者郡捕繫之獄槐察其枉以白守守曰為反者解說族矣槐曰吏明知獄有枉而擠諸死地以傅於法顧法豈謂諸被告者無論枉不枉皆可殺乎不聽頃之守以憂去槐攝通判州事歎曰桷誠枉今不為出之生無繇矣乃為翻其辭明其不反書上卒脫桷獄遼天祚初窮治耶律伊遜黨有司不以為意御史中丞耶律舍哩上書曰恩賞明則賢者勸刑罰當則姦人消二者既舉天下不勞而治伊遜竊權肆惡不勝名狀蔽先帝之明誣陷順聖搆害忠讜敗國罔上自古所無賴廟社之休陛下獲纂成業積年之寃一旦洗雪正陛下英斷克成孝道之秋如蕭德勒台實伊遜之黨耶律赫嚕亦不為早辨賴陛下之明遂正其事臣見陛下多疑故有司顧望不切推問伊遜在先帝朝權寵無比先帝若以順考為實則伊遜為功臣陛下安得立耶先帝黜逐嬖后詔陛下在左右是亦悔前非也陛下詎可忘父讐不報寬逆黨不誅今靈骨未獲而求之不切傳曰聖人之德無加於孝昔唐德宗因亂失母思慕悲傷孝道益著周公誅飛亷惡來天下大悅願陛下下明詔求順考之瘞所盡收逆黨以正邦憲快四方忠義之心昭國家賞罰之用然後致治之道可得而舉矣伊遜誣搆昭懷太子事具詳舞紊篇按舍哩本傳云書奏不報聞者莫不歎惋總論又云舍哩之書幸出於伊遜既敗之後獲行其說一人之事一篇之中而互異如此今按天祚本紀乾統元年十月上昭懷太子諡曰大孝順聖皇帝廟號順宗明年四月詔誅伊遜黨徙其子孫於邉發伊遜德勒台之墓剖棺戮尸二事相去才及半年舍哩上書月日雖不可考書中既稱順考其距誅戮逆黨之時當亦不逺不應初不報而旋即從之也本傳自相齟齬似從後論為正且終遼之世臣下疏奏伉直無如此書者故備載云金世宗大定初嘗命左衛將軍達巴訪求良弓達巴多自取及護衛入直者多以己意更代護衛羅索以告命㸃撿司按鞫達巴妹入宫為巴哩達巴因內侍僧爾謂巴哩曰我無罪問事者迫我誣服耳巴哩以聞命杖僧爾百出達巴為隴州防禦使四年上謂宰相曰權勢之家親識訴訟請屬官吏往往屈法伸情宜一切禁止九年髙德基為刑部尚書有犯罪當死者宰相欲從末減德基曰法無二門失出猶失入也不從及奏帝是刑部議因召諸尚書諭之曰朕即位已來以政事與宰相爭執是非者德基一人而已自今部上省三議不合即具以聞十五年唐古部族節度使伊喇摩多之子殺其妻而逃帝命追捕及既獲皇姑梁國公主請赦之帝曰公主婦人不識典法罪尚可容摩多請託至此豈可貸宥并罪之二十五年后族有犯罪者尚書省引入議奏帝曰法者公天下持平之器若親者犯而從減是使之恃此而橫恣也昔漢文誅薄昭有足取者前二十年時后族濟州節度使烏凌阿綽嘗犯大辟朕未嘗宥今乃宥之是開後世輕重出入之門也宰臣曰古所以議親尊天子别庶人也帝曰外家自異於宗室漢外戚權太重致移國祚朕所以令諸王公主有權也夫有功於國議勳可也至若議賢既曰賢矣肯犯法乎脫或緣坐則固當減請也二十六年遂奏定太子妃大功以上親及與皇家無服者及賢而犯私罪者皆不入議帝曰法有倫而不倫者其改定之帝又謂宰臣曰親軍雖不識字亦令依例出職若涉贓賄必痛繩之太尉左丞相克寧曰依法則可帝曰朕於女直人未嘗不知優恤然涉於贓罪雖朕子弟亦不能恕太尉之意欲姑息女直人耳知大興府事赫舍哩執中坐贓命吏部侍郎李仲略鞫之罪當削解權要競言太重帝意頗惑仲略奏曰教化之行自近者始京師四方之則也郡縣守令無慮數百此而不懲何以勵後況執中凶殘狠愎慢上虐下豈可宥之帝曰卿言是也將陵主簿髙德溫大收稅戶米逮御史獄具二法上帝怒責御史大夫張汝霖曰朕以卿為公正故登用之德溫有人在宫掖故朕頗詳其事朕肯以宫掖之私撓法耶不謂卿等顧徇如是賈少冲以刑部郎中攝右司員外郎嘗執奏刑名甚堅既退帝謂侍臣曰少沖居下位乃有守如此大懷貞為興中尹有錦州富民蕭鶴壽塗中殺人匿於府少尹家有司捕不得懷貞以計取之卒置於法越王永功於章宗時判大宗正與應州僧善僧將訴事於彰國軍節度使伊喇呼喇求永功手書與呼喇為地呼喇得書奏之帝謂宰臣曰永功以書請託事雖細微不可不懲凡人小過不治遂致大咎有犯必懲庶幾能改是亦教也皆曰陛下用法無私臣下敢不敬畏於是永功解職宣宗興定時伊爾必斯為右副元帥備潼關次澠池兵潰伊爾必斯變易姓名與其妻之妹赫舍哩氏及僕婢三人亡匿柘城縣民舍既而赫舍哩氏為其姑所捕執伊爾必斯妻子亦在京師有司請窮治蹤跡詔令自出特赦死伊爾必斯乃使其子上書請圖後效御史中丞完顔伯嘉奏曰古之為將者進不忘死退不避罪伊爾必斯膺國重寄握兵數萬未陳而潰委棄虎符既不克援枹鼓以死敵又不能負斧鑕而請罪逃命竄伏猥居里巷挾匿婦人為此醜行聖恩寬大曲貸其死自當奔走闕庭惶恐待命乃安坐要君略無忌憚跡其情罪實不容誅此而不懲朝綱廢矣乞尸諸市以戒為臣之不忠者按法莫重於失律罪莫大於無君伊爾必斯喪師亡命醜穢悖慢雖梟磔不足以蔽辜乃宣宗是伯嘉之奏終以先有赦令僅豫除名亦失政刑之甚矣哀宗正大二年內族旺嘉努故殺鮮于主簿權貴多救之帝曰英王朕兄也敢妄撻一人乎朕為人主敢以無罪戮一人乎國家衰弱之際生靈幾何而族子恃勢殺一主簿吾民無主矣即命斬之劉肅為尚書省令史時盜內藏官羅及珠盜不時得逮繫貨珠牙儈及藏吏誣服者十一人刑部議皆置極刑肅執之曰盜無正贓殺之寃帝怒有近侍夜見肅具道其旨肅曰辨析寃獄我職也惜一已而戕十一人之命可乎明日詣省辨愈力右司郎中張天綱曰吾為汝具奏辨析之帝悟囚得不死元世祖在潜邸時分地在關陕奏以亷希憲商挺宣撫陕西以趙良弼參議司事阿勒達爾當國憚世祖英武讒於憲宗即命為陕西行省左丞相劉太平參知政事鈎校京兆錢榖鍛錬羣獄死者二十餘人衆皆股栗良弼力陳大義詞氣懇款二人卒不能誣故宣撫司一無所坐按亷希憲傳又載阿勒達爾等撿核所部用酷吏分任其事大開告訐希憲曰宣撫司事由已出有罪固當獨任僚屬何與故事竟卒無獲罪者中統三年趙炳為刑部尚書兼中書省斷事官時有攜妓登龍舟者即按之以法未幾其人死其子犯蹕訴寃詔讓之炳曰臣執法尊君職當為也帝怒命之出既而謂侍臣曰炳用法太峻然非徇情者王磐為真定順德等路宣慰使邢水縣達嚕噶齊䝉古岱貪暴不法縣民苦之有趙清者發其罪既具伏矣適初置監司其妻懼無以滅口召家人飲酒至醉以利啖之使夜殺清清逃獲免乃盡殺其父母妻子清訴諸官權要蔽䝉古岱不為理又欲反其獄磐竟奏置諸法籍其家以半給清郡有西域大賈稱貸取息有不時償者輒置獄於家拘繫搒掠且恃勢干官府直來坐㕔事指麾自若磐大怒叱左右捽下箠之數十時府治寓城上即擠諸城下幾死郡人稱快按亷希憲傳西域人自稱駙馬繫富民誣其祖父嘗貸息錢希憲令械繫之其事相類故不重載至元初奸臣阿哈瑪特領左右部専總材賦㑹其黨相攻擊帝命中書推覆衆畏其權莫敢問平章政事亷希憲窮治其事以狀聞杖阿哈瑪特罷所領歸有司帝諭希憲曰吏廢法而貪久矣自卿等為政朕無此憂言者訟宰相史天澤親黨布列中外威權日甚詔罷天澤政事待鞫希憲謂天澤無肆橫不臣狀力爭於帝前帝良久曰卿且退朕思之明召希憲諭曰昨思之天澤無對訟者事遂解又有訟四川帥竒徹者帝敕中書急遣使誅之明日希憲覆奏帝怒曰尚爾遲回耶對曰竒徹大帥以一小人言被誅民心必駭收繫至京師與訟者廷對然後明其罪於天下為宜詔遣使者按問事竟無實竒徹得免參議樞密院事費正寅素憸狡有告其罪者詔丞相錫津與侍御史張雄飛雜治之請託交至雄飛獨無所顧盡發其罪狀并其黨與皆伏誅嗣左遷同知京兆總管府事宗室公主有家奴逃渭南民間為贅壻主適過臨潼識之械其奴并奴妻及妻之父母盡沒其家資雄飛與主爭辨詞色俱厲主不得已悉還而遣之但挾其奴以去入為兵部尚書平章阿哈瑪特在制國用司時與伊瑪都鼎有隙至是羅織其罪同僚爭相附㑹雄飛不可曰所犯在制國用司時平章獨不預耶衆無以答秦長卿劉仲澤亦以忤阿哈瑪特皆下吏欲殺之雄飛持之甚力阿哈瑪特使人啖之曰誠能殺此三人當以參政相處雄飛曰殺無罪以求大官吾不為也阿哈瑪特怒出為澧州安撫澧有巨商二人犯匿稅及毆人事僚佐受賂欲寬其罪雄飛繩之急或曰此細事何執之堅雄飛曰吾非治匿稅毆人者欲改宋弊政懲不畏法者爾是時四方多盜詔犯者皆殺無赦所在繫囚滿獄因符寶郎董文忠言乃革其令具刑制篇或告漢人毆傷國人及太尉監屬盧甲盜剪官布帝怒命殺以懲衆文忠言今刑曹於囚罪當死者已有服辭猶必詳讞是豈可因人一言遽加重典宜付有司閲實以俟後命乃遣文忠及近臣圖們分核之皆得其誣狀帝因責侍臣曰方朕怒時卿曹皆不敢言非文忠開悟朕心則殺二無辜之人必取議中外矣詔悉原免并賜文忠金尊以旌其直二十年江淮行省宣慰使郗顯李兼訴平章蒙古台不法有詔弗問仍以顯等付䝉古台鞫之繫於獄必抵以死行臺監察御史申屠致逺慮囚浙西知其寃將縱之䝉古台脅之以勢致逺不為動親脫顯等械俾從軍自贖僧格當國治書侍御史陳天祥使湖廣劾平章約蘇穆爾僧格摘其疏中語誣以不道奏遣使往鞫臺中咸憚往致逺慨然請行比至纍章極論其誣僧格方促定天祥罪閲致逺章乃氣沮有小吏誣告漕臣劉獻盜倉粟僧格方事聚斂衆阿其意鍛鍊誣服刑部尚書理智理威曰刑部天下之平今輦轂之下漕臣以寃死何以正四方乎即以實聞以是忤僧格出為江東道宣慰使二十四年分中書為尚書省僧格引用黨與鈎考天下錢糧凡阿哈瑪特時積年負逋舉以中書失徴奏誅二參政行省乘風督責尤峻主無所償則責及親戚或逮繫鄰黨械禁搒掠民不勝苦自裁及死獄中者以百數中外騷動廷臣顧忌皆莫敢言利用監徹爾具陳僧格姦貪誤國害民狀辭語激烈帝怒謂其毁詆大臣失禮體命左右批其頰徹爾辨愈力於是帝大悟誅僧格枉繫者始得釋其黨人納蘇拉鼎等既誅帝以實都長於理財欲釋不殺平章政事布呼密力爭之不從日中凡七奏卒誅之圖圖爾哈求欽察之為人奴者增益其軍而多取編民中書僉省王遇驗其籍改正之圖圖爾哈遂奏遇有不臣語帝怒欲斬之布呼密諌曰始令以欽察之人奴為兵未聞以編民也萬一他衛皆倣此戶口耗矣若誅遇後人安肯為陛下盡職乎帝意解遇得不死成宗即位聽斷明果多采布呼密之言西僧為佛事請釋罪人祈福謂之圖魯木豪民犯法者皆賂之以求免有殺主殺夫者西僧請被以帝后御服乘黃犢出宫門釋之云可得福布呼密曰人倫者王政之本風化之基豈可容其亂法如是帝責丞相曰朕戒汝無使布呼密知今聞其言朕甚愧之有奴告主者主被誅詔即以其主所居官與之布呼密曰若此必大壞天下之風俗使人情愈薄無復上下之分矣帝悟為追廢前命大德七年左丞相達爾罕言僧人修佛事畢必釋重囚有殺人及妻妾殺夫者悉皆指名釋之生者苟免死者負寃於福何有帝嘉納之十一年詔行世祖時條格中書省臣言法者譬之權衡不可偏重世祖已有定制自元貞已來以作佛事之故放釋有罪失於太寬故有司無所遵守今請凡內外犯法之人悉歸有司依法裁决制可仁宗延祐時雲南行省右丞賽音濟勒威有罪國師綽斯嘉旺札勒奏請釋之帝斥之曰僧人宜誦佛書官事豈當預耶不聽又參議中書省事竒實堅坐鬻官刑部以法當杖太后命笞之英宗為皇太子奏曰不可法者天下之公徇私而輕重之非示天下以公也卒正其罪皇姊大長公主僧格喇實作佛事釋全寧府重囚二十七人敕案問全寧守臣阿從不法仍追所釋囚還獄巴爾斯濟蘇下獄帝謂左右曰法者祖宗所制非朕所得私巴爾斯濟蘇雖事朕日久今既有罪當論如法文宗至順二年約爾珠為江西等處行中書省平章事有誣告富民負永寧王官帑錢八百餘錠者中書遣使諸路徴之使至江西約爾珠曰事涉誣罔不可奏命僚佐重違宰臣意約爾珠曰民惟邦本傷本以斂怨亦非宰相福也令使者以此意復命時雅克特穆爾為丞相聞其言感悟命刑部詰治得誣罔狀罪誣告者若干人宰相以奏帝嘉之順帝至元四年有婦宋娥者與鄰人通鄰人謂娥將殺而夫娥曰張子文行且殺之明日夫果死跡盜數日娥始以張子文告其姑五府官以為非共殺且既經赦宥宜釋之御史扎實曰張子文以為娥固許之矣且娥夫死及旬乃始言之是娥與張同謀度不能終隱故發之也豈赦可釋哉樞密判官曰平反活人隂德也御史勿執常法扎實曰是謂故出人罪非平反也且公欲種隂德於生者奈死者何乃獨上議刑部卒正娥罪五年歸𤾉僉河南亷訪司事行部西京以法繩趙王府官屬之貪暴者王三遣使請暘為不動九年臺臣議贓吏遭喪不許歸葬須竟其獄都事成遵曰惡人固可怒然與人倫孰重國家方以孝治天下寧失罪人不可使天下有無親之吏議遂寢明太祖洪武初御史中丞劉基謂宋元寬縱今宜肅紀綱令御史紏劾無所避時帝幸汴梁宿衛官侍有過者皆啓皇太子置之法中書省都事李彬坐貪縱抵罪左丞相李善長素昵之請緩其獄基不聽馳奏報可方祈雨即斬之八年鳯陽宫殿成帝坐殿中若有人持兵鬬殿脊者善長奏諸工匠用厭鎮法帝將盡殺之工部尚書薛祥為分别交替不在工者並鐵石匠皆不預活者千數營謹身殿有司列中匠為上匠帝怒其罔命棄市祥在側爭曰奏對不實竟殺人恐非法得旨用腐刑祥復徐奏曰腐廢久矣莫若杖而使工帝然之九年詔官吏有罪者笞已上悉屯謫鳯陽至萬數陕西按察司僉事韓宜可疏爭之曰刑以禁淫慝一民軌宜論其情之輕重事之公私罪之大小今悉令謫屯此小人之幸君子殆矣乞分别以協衆心帝嘉納之英宗正統中法司因旱恤刑有王綱者惡逆當辟或憫其少欲緩之吏部左侍郎魏驥持不可曰此婦人之仁天道不時正此故也獄决而雨孝宗𢎞治末年刑部尚書閔圭讞重獄忤㫖久不下帝與兵部尚書劉大夏語及之對曰人臣執法效忠圭所為無足異帝曰且道自古君臣曽有此事否對曰臣幼讀孟子見瞽瞍殺人臯陶執之之語圭所執未可深責也帝頷之明日疏下遂如擬世宗即位七月因日精門災疏理寃抑命再問緩死者三十八人而廖鵬王瓛齊佐等與焉給事中李復禮等言鵬等皆江彬錢寧之黨王法所必誅乃令禁之如故嘉靖初革錦衣傳奉官十六汰旗校十五復諭緝事官校惟察不軌妖言人命强盜重事他詞訟及在外州縣事毋得預未幾中官葛景等奸利事覺為言官所糾詔下司禮監察訊刑部尚書林俊言內臣犯法法司不得訊是宫府異體也乞下法司公訊以昭平明之治中官崔文家人李陽鳯索匠師宋珏賄不獲嗾文杖之幾死下刑部治未决而中㫖移鎮撫司俊留不遣力爭不納明日又奏帝怒責陳狀俊言祖宗以刑獄付法司以緝獲姦盜付鎮撫訊鞫既得猶必付法司擬罪未有奪取未定之囚反付推問者文先朝漏姦罪不容誅兹復干內降臣不忍朝廷百五十年紀綱為此輩壞亂帝憚其言直乃不問中官黃錦誣劾髙唐判官金坡詔逮之連五百餘人御史馬録言祖宗內設法司外設撫按百餘年刑清政平先帝時劉瑾錢寧輩蠱惑聖聰動輒遣錦衣官校尉致天下洶洶陛下方勤新政不虞復有髙唐之命給事中許復禮等亦以為言獄得少解王世貞為刑部郎中奸人閻姓者犯法匿錦衣都督陸炳家世貞搜得之炳介嚴嵩以請不許穆宗隆慶初年任用宦官㫖多從中下刑科給事中舒化言法者天下之公大小罪犯宜悉付法司不當則臣等論劾若竟自敕行則喜怒未必當而法司與臣等俱虛設帝是其言路楷楊順以搆殺沈錬論死具舞紊篇大學士髙拱欲庇楷謂順首禍順死楷可勿坐化取獄牘示拱曰獄故無錬名有之自楷始楷誠罪首拱又議宥方士王金等罪化言此遺詔即欲勿罪宜何辭由是忤拱神宗即位冬月詔停刑者三矣五年九月司禮太監孫得勝復傳㫖大昏期近命閣臣於三覆奏本擬㫖免行刑大學士張居正言祖宗舊制凡犯死罪鞫問既明依律棄市嘉靖末年世宗皇帝因災醮始有暫免不决之令或間從御筆所勾量行取决此特近年姑息之弊非舊制也臣等詳閲諸囚罪狀皆滅絶天理敗傷彛倫今獨見犯罪者身被誅戮之可憫而不知彼所戕害者皆含寃蓄憤於幽冥之中使不一雪其痛怨恨之氣上干天和所傷必多若不行刑年復一年充滿囹圄既費關防又乖國典其於政體又大謬也給事中嚴用和等亦以為言詔許之崇禎間姜埰熊開元下獄莊烈帝諭掌衛駱養性潜殺之養性泄上語且言二臣當死宜付所司書其罪使天下明知若隂使臣殺之天下後世謂陛下何如主㑹大臣多為埰等言乃得長繫欽定續通典卷一百十五
