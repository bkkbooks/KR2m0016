body:
  text: 兵佯敗引退取之五代初淮南節度髙駢為畢師鐸所攻楊行密率兵數千赴之行至天長師鐸已囚駢行密不得入屯於蜀岡師鐸率衆數萬出擊行密行密佯敗棄營走師鐸兵飢乘勝爭入營收軍實行密反兵擊之師鐸大敗唐周德威身為大將常與士卒馳騁矢石之間梁軍圍太原募生致周陽五者德威小字陽五為刺史有騎將陳章者乘白馬被朱甲以自異請致之德威因戒其部兵曰見白馬朱甲者佯走以避之兩軍皆陳已微服雜卒伍中陳章出戰兵始交德威兵退走章奮矟追之德威伺章已過揮鎚擊墮馬遂生擒之金完顔璋將兵二萬救德順宋將吳璘據城北險要為營璋亦䇿營與璘相望可三里許兩軍遇於城東凡五接戰璘軍敗走璋追至城下璘軍已據城北岡阜與其城上兵相應以弩夾射璋軍璋軍佯却城中出兵來追璋反斾與戰大敗之元阿珠奉命略淮東抵揚州宋都統姜才領步騎二萬來攻敵軍夾河為陳阿珠麾騎士渡河擊之戰數合堅不能却衆軍佯北才逐之遂奮而回擊萬矢雨集才軍不能支擒其副將張林斬首萬八千級又大德中羅和反詔劉國傑討之師出播州與賊戰不利乃令軍士人持一盾布釘其上既戰即棄盾佯却賊追之奮不能止遇盾皆仆國傑鼓譟趨之賊大敗明徐達帥兵取中原至山東界首克沂州進取青州遇元將伊蘇兵乃命傳友德率騎與戰佯北伊蘇來追達麾後軍前進俘斬甚衆伊蘇遁遂下青州臣等謹案杜典此下有僞稱敗怠敵取之條考僞敗與佯敗無甚差别今不復分析引退設伏取之唐髙祖武德初劉武周將黃子英往來雀鼠谷髙祖令武衛將軍姜寶誼擊之子英數以輕兵挑戰寶誼兵才接子英輕遁如此者三寶誼悉兵逐之伏發軍大敗寶誼被擒又郭子儀圍衛州安慶緒分其衆為三軍將戰子儀選善射士三千伏壁內戒曰須吾却賊必乘壘若等譟而射既戰僞遁賊薄營伏發注射賊震駭而奔斬首四萬級執安慶和收衛州五代周世宗伐江南大將張永德請行師至夀春劉仁贍堅壁不下永德出疲兵居前誘之伏精兵於便地每戰佯不利北退三十里伏兵悉起前後夾攻大敗之仁贍僅免宋髙宗紹興初權京西南路副總管李忠反陷金州諸關王彥與戰不利退屯秦郊令將士盡伏山谷間焚積聚僞若遁者秦郊距郡城二十里路坦夷募敢死士易麾幟設竒以待閲再宿賊至秦郊逆戰大敗之遼太宗自將援石敬瑭㑹唐將髙行周符彥卿以兵來拒遂勒兵陳於太原及戰佯却行周彥卿追之為伏兵所斷首尾不相救大敗之棄仗如山斬首數萬級又耶律色珍聞宋將楊繼業出兵令蕭達林伏兵於路明旦繼業兵至色珍擁衆為戰勢繼業麾幟而前色珍佯退伏兵發色珍進攻繼業敗走金珠嘉辰嘉伐宋時宋兵二千屯髙栁橋其寨兩城環之以水辰嘉先令水軍徑渡攻之大軍繼進夷其寨而還遇宋兵數千於梅景村辰嘉伏兵林間以步卒誘致之伏發宋兵潰追奔十餘里生擒其將阮世安等五人獲器仗甚衆又赫舍哩約赫德圍盱眙宋人閉門堅守不敢出以騎兵分掠境內而時遣羸卒薄城誘之宋人出騎數百來拒約赫德麾兵佯北伏發擊之斬首二百宋人復出步騎八千來援又擊敗之元王義從穆呼哩取巨鹿洺州二城還軍至廣陽西九門遇金監軍納蘭率冀州節度使柴茂等將兵萬餘北行王義伏兵桑林先以百騎挑之納蘭迎戰因稍却誘之近桑林伏起金兵大亂奔還又石應天取綏德金行省完顔哈達出兵三萬陳於城東䝉古布哈以騎三千覘之馳報曰彼見吾兵少有輕敵心明日合戰當佯敗可以伏兵取勝也從之夜半以大軍銜枚齊進伏於城東十五里兩谷間明日䝉古布哈進兵望見金兵即棄鼓旗走金兵果追之伏發鼓聲震天地萬矢齊下金兵大敗明太祖因元兵圍六合率師救之設伏澗側令耿再成佯敗誘之渡澗伏發城中亦鼓譟出夾擊之元兵大敗去滁城以全又郭英隨徐達率兵進抵河西務英首與元兵戰大捷翌日大霧英令千人伏道傍率精騎三千直抵城下元將率敢死士萬餘張兩翼出戰良久英佯敗敵乘勝來追伏兵起截其軍為二斬首數千級聲言退誘敵破之五代梁遣楊師厚攻王師範屯於臨朐師範以兵迫之師厚陽為却不敢出間遣人陽言曰梁兵少方乞兵於鳳翔今糧且絶當還軍師範以為然乃遣弟師魯悉兵攻之師厚拒而不戰師魯兵却師厚追擊大敗之師範請降唐莊宗與梁將劉鄩相拒於魏數以徑兵壓鄩營鄩不肯出莊宗謂諸將曰劉鄩學六韜喜以機變用兵本欲示弱以襲我今其見迫必求速戰乃聲言歸太原命符存審守魏陽為西歸而潜兵貝州鄩果報末帝曰晉王西歸魏無備可擊乃以兵萬人攻魏城東莊宗自貝州返趨擊之鄩忽見晉軍驚曰晉王在此邪兵稍却追至故元城莊宗與符存審為兩方陳夾之鄩為圓陳以禦晉人兵再合鄩大敗南奔引退設伏潛兵襲其營五代初秦宗權遣張晊攻汴梁王聞晊來登封禪寺後岡望晊兵過遣朱珍躡之戒曰晊見吾兵必止望其止當速返毋與之鬬也已而晊見珍在後果止珍即馳還王令珍引兵蔽大林而自率精騎出其東伏大冢間晊止而食食畢拔旗幟馳擊珍珍兵小却王引伏兵橫出斷晊軍為三而擊之晊大敗脫身走周世宗遣王景向訓攻秦鳳州數為蜀將王環所敗周兵糧道頗艱孟昶遣兵出堂倉抵黃花谷以爭糧道景訓先知其來命張建雄以兵當谷口别遣將以徑卒出其後伏堂倉以待其歸蜀兵前遇建雄戰不勝退走堂倉伏發盡殪之由是蜀兵守諸城堡皆潰金章宗泰和時宋程松遣將曲昌世襲方山原自率兵數萬分道襲和尚原西山寨龍門等關遂據之富察貞遣費摩阿里及完顔布倫以兵千人伏方山原下别遣鄂屯薩哈瑪勒及珠赫哈達將壯士五百取間道潛登出宋兵上自髙而下宋兵大駭伏兵合擊遂破之貞乃分遣諸將率兵千人取和尚原西山寨自以兵七百由中路取龍門等關元安扎爾攻西和州宋將彊俊領衆數萬堅壁清野以老元師安扎爾率死士罵城下挑戰俊怒悉衆出陳安扎爾佯走俊追之因以竒兵奪其城伏兵要其歸轉戰數十里斬首數千級擒俊餘衆退保仇池進擊拔之設伏引敵鬭襲其營五代初梁太祖與秦宗權將張晊相拒於汴使張歸霸以弓手五百人伏湟中太祖以騎數百為遊兵過晊柵晊出兵追之歸霸發伏殺晊兵千人奪馬數十匹宋邱嶽知真州䝉古率衆攻城嶽以强弩射其帥斃之敵少却嶽曰敵兵十倍於我不可以力勝乃為二伏設炮石以待之敵至伏發殺其驍將敵衆大擾又遣勇士襲其營焚其廬帳敵惶駭遂引去明王守仁討橫水賊謝志山駐南康去橫水三十里先遣四百人伏賊巢左右進軍逼之賊方迎戰兩山舉幟賊驚謂官軍已盡犂其巢遂潰乘勝克橫水設伏引敵鬭敗之附元順帝至正末劉福通陷汴梁察罕特穆爾大發秦晉諸軍㑹汴城下奪其外城察罕自將鐵騎屯杏花營諸將環城而壘城中屢出戰輒敗遂嬰城以守乃夜伏兵城南旦日遣苗軍跳梁者略城而東敵傾城出追伏兵鼓譟起邀擊敗之明額森破紫荆關直入窺京師石亨議堅壁以老之于謙曰是益張其勢也亟擐甲營於德勝門額森見兵盛而嚴以騎來嘗謙乃設伏於空舍使數騎誘之敵以萬騎來薄伏發敗之臣等謹案襲其營是往襲其營也敗之是敵來而敗之也事雖稍異而敗敵之䇿同杜典無此目謹倣此例增附於此示退乘懈掩襲五代梁將葛從周圍朱瑾於兖州瑾閉壁不出從周詐言救兵至陽避之髙吳夜半潛還城下瑾謂從周已去乃出兵收外壕從周掩擊之殺千餘人敵退追奔五代初楊行密將王景仁救王師範既敗梁兵引還梁兵急追之景仁度不可走遣禆將李䖍裕以衆一旅設伏於山下以待之留軍不行解鞍而寢虔裕疾呼曰追兵至矣宜速走吾以死遏之景仁曰吾亦戰於此也䖍裕三請景仁乃行而䖍裕卒戰死梁兵以故不能及而景仁乃全軍而歸梁軍以不能及而不勝周世宗攻楚州率戰士持火炬以爇其城樓克之帝計其敗卒必將南遁因親領衛士及驍騎數百於南城逐之又殺數千人楚州遂平金太祖自將精兵襲遼主於大魚濼普嘉努宗望率兵四千為前鋒晝夜兼行馬多乏追及遼主於石輦驛軍士至者才千人遼軍餘二萬五千方治營壘普嘉弩與諸將議伊都曰我軍未集人馬疲劇未可戰宗望曰今追及遼主而不亟戰日入而遁則無及遂戰短兵接遼兵圍之數重士皆殊死戰遂敗遼兵元世祖至元末宗王明埒特穆爾挾海都叛巴延討破之明埒特穆爾挺身走命蘇克特們德爾等追之巴延引軍夜還卒遇伏兵巴延堅壁不動黎明遂引去巴延輕騎追擊之㑹蘇克特們德爾等兵亦至乃夾擊之斬俘甚衆又博羅歡既敗納延兵其黨塔布岱以兵來拒㑹久雨軍乏食諸將欲退博羅歡曰今兩陳相對豈容先動俄塔布岱引兵退博羅歡以其師乘之轉戰二日大破之明初張士誠寇建德李文忠為帥欲擊之劉基曰三日後必走走而尾之可盡擒也及三日敵僞設旌旗聲鼓如故至其所皆空壁所留盡老弱追而薄之東陽悉獲其衆縱敵退於歸路設伏取之唐李泌因吳法超叛引步騎四千過陜乃隂遣將士伏太原倉隘令曰賊隊過東伏大呼擊之西伏亦大呼應之勿遮道勿留行常讓以半道又遣唐英岸夜出陳澗北燕子楚趣長水明日淮西兵入隘兩伏發殺賊頗衆進遇英岸子楚邀擊大敗之賊所餘僅四十七人宋西夏元吳冦渭州薄懷逺城韓琦亟趨鎮戎軍盡出其兵又募勇士萬八千人命環慶副總管任福將之涇原都監桑懌為先鋒福將行琦令福併兵自懷逺城趨德勝寨至羊牧隆城出敵之後諸寨相拒約四十里度勢未可戰即據險置伏要其歸路戒之再三且曰苟違節制有功亦斬福引輕騎數千趨懷逺敵棄馬羊槖駝佯北懌引騎追之福踵其後諜傳敵兵少福等頗易之與懌合軍屯好水川遇夏軍循川行出六盤山下距羊牧隆城五里結陳諸將方知墮敵計勢不可留遂前格戰夏兵四合福與懌俱戰死又宗澤為東京留守知開封府時金帥烏珠自鄭抵白沙去汴京密邇都人震恐僚屬入問計宗澤笑曰何事張皇劉衍等在外必能禦敵乃選精鋭數千使繞出敵後伏其歸路金人方與衍戰伏兵起前後夾攻之金人果敗遼太祖追埒克至布濟克河先遣室韋及吐渾酋長巴拉達里庫等分兵伏其歸路别遣將進擊之埒克率兵逆戰相拒至晡衆乃潰追至柴河遂自焚其車乘廬帳而去前遇巴拉達里庫等伏發合擊大敗之埒克奔潰金李師夔主奉聖州事賊焦望天尹智穆率兵數千來寇師夔以兵臨之設伏歸路使人間望天於智穆智穆果疑望天先引去智穆勢孤亦還遇伏而敗遂執斬之是後賊衆不敢入境誘敵進於歸路設伏取之附金師攻宋時楊存中為淮北宣撫使屯泗州金密令人告以敵騎數百屯柳子鎮矣存中自將五百騎夜襲之黎明不見敵而還金以精兵伏歸路存中知之遂橫奔而潰臣等謹案縱敵退而取之是將退而縱之退也誘敵進而取之是未進而誘之進也設伏於歸路之法同而縱與誘之計異杜典無此目謹倣其例增附於此兵機務速唐太宗貞觀中李靖為西海道行軍總管討吐谷渾侯君集副之師次鄯州君集言於靖曰大軍已至賊尚未走險宜簡精鋭長驅疾進彼不我虞必有大利若此䇿不行遁走山谷討之實難靖然其計乃簡精鋭輕齎深入追及其衆於庫山破之又史朝義乘邙山之捷進略申光等十三州李光弼聞之就道監軍使以兵少請保揚州光弼曰朝廷以安危寄我賊安知吾衆寡若出其不意當自潰遂疾驅入徐州使田神功擊敗賊於宋州五代梁牛存節慮朱瑾召吳兵攻徐宿謀曰淮兵必不先攻宿然宿溝壘素固可以禦敵乃夜以兵急趨徐州比傅徐城下瑾兵方至望其塵起驚曰梁兵已來何其速也不能攻而去又王晏球為龍驤四軍都指揮使時捉生軍將李霸戍楊劉乘夜作亂自水門入縱火大譟以長竿縛布沃油仰燒建國門晏球聞亂不俟命率龍驤五百騎擊之賊勢稍却末帝登樓見之呼曰此非吾龍驤軍邪晏球奏曰亂者李霸一部爾陛下嚴守宫城而責臣破賊遲明盡殺之又唐取梁鄆州召王彥章為招討使禦之問破敵之期彥章曰三日左右皆失笑彥章馳兩日至滑州置酒大㑹隂遣人具舟於楊村命甲士六百人持巨斧載冶者具韛炭乘流而下彥章㑹飲酒半佯起更衣引精兵沿河趨德勝舟兵舉鎖燒斷之以巨斧斬浮橋而彥章急擊南城浮橋斷南城遂破蓋三日矣唐莊宗時梁將劉鄩攻同州河中節度使朱友謙請師於唐莊宗遣符存審等往援師集河中朝至夕渡時汴人不意王師速至劉鄩曰師行次舍倍道兼程計共行途未能及此存審聞之笑曰兵法有出竒無窮者兵若自天而墜劉鄩善將何其昧哉又康延孝征蜀與蜀王衍戰三泉衍敗走斷吉柏江浮橋延孝造舟以渡進取綿州衍復斷綿江浮橋延孝謂招撫使李嚴曰吾逺軍千里入人之國利在速戰乘衍破膽之時但得百騎過鹿頭關彼將迎降不暇若修繕橋梁必留數日使衍得閉關為備則勝負未可知也因與嚴乘馬渡江軍士隨之濟者千餘人遂入鹿頭關下漢州後軍始至衍弟宗弼果以蜀降又明宗行幸汴州至滎陽朱守殷反范延光曰守殷反迹始見若緩之使得為計則城堅而難近故乘人之未備者莫若急攻臣請騎兵五百馳至城下以神速駭之乃以騎兵五百自暮疾馳至半夜行二百里戰於城下遲明明宗亦馳至汴兵望見天子乘輿乃開門而延光先入猶巷戰殺傷甚衆守殷死汴州平宋太祖建隆初李筠起兵樞密使吳延祚白太祖曰潞城巖險且有太行之阻彼若保之未可以嵗月破筠素輕鋭若速舉兵擊之彼必出關但離巢穴即成擒矣帝從其言遂親征次滎陽西京留守向拱勸帝濟河踰太行乘其未集誅之儻稽浹旬彼衆愈滋攻之難為力矣趙普亦曰兵尚拙速不貴巧遲倍道兼行掩其未備可一戰而克也若使堅壁固守老我師徒饋運險難勝負難决矣帝納之帝至澤州召控鶴指揮使馬全義問計䇿全義請并力急攻且曰緩之恐生變帝命諸軍奮擊親帥衛兵繼之克其城又曹瑋用兵多竒計出入神運不可測一日張樂飲僚吏忽失瑋所在徐出視事賊首已擲庭下矣常稱疾砭艾卧閣內㑹寇至則奮起裹創被甲跨馬賊望見皆遁去又髙宗紹興初金人窺蜀時吳玠在河池金將薩里哈自商於直搗上洋趨洋漢守臣劉子羽告急玠自河池日夜馳三百里以黃柑遺敵曰大軍逺來聊用止渴薩里哈大驚以杖擊地曰爾來何速也又金人入合肥王德請守淮以保江遂渡采石張俊督軍繼之德曰明旦當㑹食厯陽已而夜拔和州敵退保昭關又擊走之追至柘臯與金人夾河而軍諸將皆集張俊後至統制田師中欲待之德曰事當機㑹復何待徑上馬烏珠以鐵騎十萬夾道而陳德曰敵右陳堅當先擊之有敵將被甲躍馬始出德引弓一發而斃乘勢大呼令萬兵持長斧如牆而進敵大敗又孟宗政以棗陽圍急乃引兵午發峴首遲明即抵棗陽馳突如神金人大駭宵遁遼景宗保寧初宋圍太原以耶律烏哲率兵往援至白馬嶺遣徑卒夜出間道疾馳駐太原西鳴鼓舉火宋兵以為大軍至懼而宵遁金章宗明昌時詔完顔安國等趨多泉子進討北方乃命支軍出東道丞相襄由西道而東軍至龍駒河為珠卜所圍三日不得出求援甚急或請俟諸軍集乃發襄曰我軍被圍數日馳救之猶恐不及豈可後時即鳴鼓夜發或請先遣人報圍中使知援至襄曰所遣者儻為敵得使知我兵寡而糧在後則吾事敗矣乃益疾馳遲明距敵近衆請少憩襄曰吾所以乘夜疾馳者欲掩其不備爾緩則不及嚮晨壓敵突擊之圍中將士亦鼓譟出戰敵大敗皆奔額勒哲河遣安國追躡之衆散走元納延叛隂遣使來結額布根舒埒赫為都指使圖圖爾哈所執盡得其情㑹有言額布根叛者衆欲先聞於朝然後發兵圖圖爾哈曰兵貴神速若彼果叛我軍出其不意可即圖之否則與約而還即日啓行疾驅七晝夜渡圖喇河戰於博恰嶺大敗之額布根僅以身免明太祖因陳友諒降將吳宏兵使取撫州撫帥鄧克明欲拒宏而畏饒州守鄧愈强乃遣人詐獻地以緩師愈詗得之即率徑兵間道夜馳二百里黎明下其三門克明單騎走旁邑自度不免以分省及撫州四路縣印詣愈降遂定撫州又燕王將張玉既破李景隆兵諜報景隆收潰卒號百萬且至玉進計曰兵貴神速請急往白溝河以逸待之可勝也乃悉師而往至白溝三日而景隆來戰玉以麾下馳之挫其鋒大軍乘而破之又楊榮因漢王髙煦反首勸宣宗親征夏原吉亦曰往事可鑒不可失也且兵事貴速宜卷甲韜戈以往一鼓而平之所謂先人有奪人之志宣宗遂意决躬率諸軍啓行不數日抵樂安城中駭潰遂械髙煦以歸又郭登為總兵官景泰初偵知額森自順聖川入營沙窩諸將以敵衆我寡請旋師回城登曰我軍去城已百里若一退避敵以鐵騎來追縱欲自全得乎敢言退者斬遂連夜進兵直薄敵營登奮勇先登呼聲震山谷大破其衆追至栲栳山斬二百餘級掩襲唐契苾何力從征吐谷渾何力欲襲之薛萬均不可何力曰敵無城郭逐水草為生若不襲其不虞便恐鳥驚魚散一失機㑹後可傾其巢穴耶乃自選驍兵千餘騎直入突倫川襲破吐谷渾牙帳斬首數千級獲駝馬牛羊二十餘萬吐谷渾主脫身免又吐蕃寇臨洮次大來谷王晙率所部二千人卷甲倍程與臨洮軍合勢以拒之吐蕃將坌達延又率兵繼至晙乃出竒兵七百人衣之番服夜襲之相去五里置鼓角令前者遇冦大呼後者擊鼓以應之敵衆懼疑有伏兵自相殺傷死者萬計又王君􅎢為河西隴右節度使判凉州都督事開元時吐蕃大將悉諾邏入寇攻甘州焚燒市里君􅎢候其兵疲整士馬以掩其後㑹大雪敵兵凍死者甚衆遂取積石軍西路而還五代初秦宗權稱帝遣其將秦賢盧瑭張晊攻汴賢軍板橋晊軍北郊瑭軍萬勝環汴為三十六柵梁王遣將朱珍擊賢於板橋拔其四柵又擊瑭於萬勝瑭敗投水死宗權聞瑭等敗乃自將精兵數千柵北郊㑹兖州朱瑾鄆州朱宣來赴援王置酒軍中中席王陽起如厠以輕兵出北門襲晊而樂聲不輟晊不意兵之至也兖鄆之兵又從而合擊遂大敗之斬首二萬餘級宗權與晊夜走宋太宗端拱中遣李繼隆發鎮定軍萬餘護運契丹將耶律休格率精鋭將邀於路適尹繼倫巡邊與相值休格不顧竟趨大軍繼倫謂其麾下曰敵南出而捷還則乘勝驅我北則泄怒致死我無遺類矣今但卷甲銜枚以躡之彼鋭氣前驅不虞我之至勝足以自樹敗亦不失為忠義衆皆思奮繼倫令軍中俟夜人持短兵敵方陳於前繼倫從後掩擊遂驚潰又狄青討儂智髙至廣南合孫沔余靖之兵進次賔州時智髙還守雍州青懼崑崙關險厄為所據乃按兵不動下令賔州具五日糧休士卒值上元節令大張燈燭首夜宴將佐次夜宴從軍官三夜饗軍校首夜樂飲徹曉次夜二鼓青忽稱病暫起如內久之使人諭孫沔令暫主席行酒少服藥乃出數使勸勞座客至曉客未敢退忽有馳報者云夜時三鼓元帥已奪崑崙矣是夜大風雨青率兵度崑崙關既度喜曰賊不知守此無能為也已近雍州賊方覺逆戰於歸仁鋪青使步卒居前匿騎兵於後青登髙執五色旗麾騎兵為左右翼出其後斷敵軍為三旋而擊之敵衆披靡遂大敗智髙焚城遁去元世祖至元時髙麗人金通精據珍島以叛屢討不下以史樞為鳳州經略使樞至謂衆曰敵勢方張未易力勝况炎暑海氣蒸鬱弓力弛弱猝不可用宜分軍為三多張旗幟以疑之吾與諸軍潛師搗其穴破之必矣與戰大破之其地悉平明徐達率師至太原元庫庫營於城西郭英慿髙望曰彼兵多而不整營大而無備請以夜劫其營常遇春亦曰我騎兵雖集步卒未至不可與戰請夜劫營當彼衆亂主將可縛也達從其計先遣五十騎伏城東以火炮為期至夜郭英潛入其營舉炮伏起應之鼓譟相接敵大潰自相殺戮庫庫遁去遂克太原得士馬各四十萬又藍玉襲元主特古斯特穆爾于捕魚兒海用定逺侯王弼謀戒諸軍穴地而㸑毋使見烟火乘夜至海南敵營在海東北八十餘里玉令弼為前鋒疾馳襲其營敵不虞軍至大驚迎戰敗之元主遁餘衆潰降又張輔征交址敵於多邦城旁築土城髙峻城下築重壕壕內密置竹刺壕外坎地以陷人馬輔下令期夜襲城以舉火鳴角為號夜四鼓都督黃中銜枚舁攻具越重壕薄城下以雲梯附城牙將蔡福先登將士繼之火炬齊明銅角競響敵驚散遂入城甘言厚幣乘懈襲之唐初突厥頡利合兵十萬寇涇州太宗自率六騎幸渭上與頡利隔水語責以負約頡利請和詔許之誓盟於便橋之上突厥引兵退蕭瑀曰突厥未和之時諸軍爭欲戰陛下不許而敵自退其䇿安在帝曰突厥衆多而不整君臣之志惟賄是求故卷甲韜戈啖以金帛彼既得所欲志必驕惰然後養威俟釁一舉可滅也將欲取之必姑與之此之謂也瑀謝不及又李懷光有叛志欲併諸軍時李晟與李建徽陽惠元皆聮屯恐見脅適有使至晟所晟遂僞稱有詔徙屯即結陳趨東渭橋未幾懷光併建徽惠元兵惠元死之晟提孤軍橫當寇鋒恐二盜合以軋之乃卑辭厚幣致誠於懷光使不為忌後諸路軍皆受晟節度乃移書顯讓之懷光不聽走遁河中五代初山南盜孫喜以衆千人襲均州刺史吕煜不能禦時馮行襲為州校乃隂選勇士伏江南獨乘小舟逆喜告曰州人聞公至皆欲歸矣然知公兵多民懼虜掠恐其驚擾請留兵江北獨與腹心數人從行願為前導以慰安州民事可立定喜以為然乃留兵江北獨與行襲度江軍吏前謁行襲擊喜仆地斬之伏兵發盡殺從行者餘兵在江北聞喜死皆潰欽定續通典卷九十八
