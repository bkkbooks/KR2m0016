body:
  text: 邊防邊防南序略臣等謹案杜氏邊防典南方凡五十六部諸蠻獠之散居溪峒者於楚蜀嶺粤滇黔諸境為多唐宋各有土州以示羈縻元明増置土官土吏使自統攝而叛服不常誅賞互用往往勞師動衆若南詔蠻在唐宋時自成一國宋時若儂氏之亂明時若大藤峽田州之役皆蔓延經年久而後定則以控馭之道未盡善也至於海南諸國稱名互異如赤土之後為暹羅林邑之後為環王又為占城頓遜之後為滿剌加訶陵之後為闍婆又為爪哇干陀利之後為三佛齊又為舊港槃槃之後為柯枝狼牙修之後為錫蘭山名雖殊而實則同又當按時代為臚列者矣他若馬八兒諸國之始通於元彭亨柔佛諸國之始通於明並摭其風土叙次於篇正南盤瓠種盤瓠種自三國後種落皆布在諸郡縣隋置辰州以處蠻唐置溪州錦州叙州巫州皆是也唐季蠻酋分據其地自署刺史晉髙祖天福中馬希範襲父業有湖南溪州刺史彭自然等以溪錦等州歸馬氏立銅柱為界宋太祖建隆四年慕容延釗平湖湘知溪州彭允林刺史田洪贇等列狀歸順詔復其官太宗太平興國八年溪錦叙巫四州蠻相率詣辰州願比内郡民輸租賦詔不許自後首領入貢不絶真宗咸平中施州蠻與溪州蠻嵗輸粟易鹽邊粟有三年之積神宗熙寧初峽州洞酋刻剥無度蠻衆願内附屬辰州遂以章惇察訪湖北經制蠻事於是南江舒氏北江彭氏等蠻相繼納土元初置沿溪洞招討使司西原蠻西原蠻居廣容之南邕桂之西有甯氏者相承為豪又有黄氏居黄橙洞其地西接南詔唐元宗天寳初黄氏强與韋氏周氏儂氏相唇齒為㓂據十餘州韋氏周氏恥不肯附黄氏攻之逐於海濵肅宗至徳初首領黄乾曜等與諸洞蠻叛乾元初討平之俄復叛文宗太和中討平洞穴其後儂洞最强結南詔為助宋時儂氏世為廣源州首領及智髙僭號始命狄青平之南詔南詔本烏蠻别種姓蒙氏蠻謂王為詔其先渠帥有六自號六詔曰䝉巂詔越析詔浪穹詔邆睒詔施浪詔䝉舍詔兵力相埒各自雄長䝉舍詔在諸部南故稱南詔唐元宗開元初皮邏閤立二十六年詔封越國公賜名歸義時五詔微歸義獨强乃厚以利啖劍南節度使王昱求合六詔為一制可又以破洱蠻功冊為雲南王歸義死閤羅鳯立襲王後與雲南太守張䖍陀隙舉兵反代宗大厯十四年其孫異牟尋立於徳宗貞元中復内附唐末蒙氏後絶東川節度使楊于貞據之晉髙祖天福二年段思平逐楊氏而有其國改號大理宋神宗熙寧九年遣使貢金裝碧玕山氊罽刀劍等物後不常來徽宗政和五年復通貢元滅之而有其地設大理府明時比於中州列郡文面濮赤口濮黑僰濮三濮在雲南徼外千五百餘里唐髙宗龍朔初遣使朝貢驃驃國在雲南徼外其王自號突羅朱青甓為圓城有十二門四隅作浮圖俗奉佛法以金銀為錢形如半月號登伽佗無膏油以蠟雜香代炷唐徳宗貞元中其王雍羌聞南詔歸附遣使獻歌曲因遣弟舒難陀詣劍南西川節度使韋臯獻其國樂臯譜次其聲進諸朝詔授舒難陀太僕卿緬緬國古朱波地在雲南西南徼外其人有城郭屋廬以居有象馬以乗舟筏以濟文字進上者用金葉寫之次用紙有大城五宋寧宗時緬甸進白象元世祖至元十九年擊緬克其江頭城及太公城成宗大徳元年封的立普哇拿阿廸提牙為王賜之銀印子信合八的為世子賜以虎符後即其蒲甘城置邦牙等處宣慰使司明太祖洪武二十七年置緬中宣慰使司成祖永樂元年置緬甸宣慰使司於是緬有二宣慰使宣宗宣徳二年以莽得剌為宣慰使而𬗟中宣慰之名不復見世宗嘉靖初孟養酋思倫擊破𬗟殺宣慰莽紀嵗分據其地緬訴於朝不報莽紀嵗子瑞體攻孟養及迤西諸蠻并欲入㓂既覘知有備又慮他蠻襲其後乃遁歸俄瑞體死子應裏嗣神宗萬厯十一年㓂順寧游擊劉綎等擊破之二十二年廵撫陳用賔設八闗戌守自此不犯邉界安南安南古交趾也在中國西南與雲南徼外接界倚富良江為天險江水自𬗟甸滇南兩道流入漢置九郡交趾居其一焉土膏腴氣候熱穀嵗二稔人性獷悍唐分嶺南為東西二道安南隸之髙祖武徳中號交州總管府調露元和郡縣志作永徽元年改安南都䕶府隸嶺南道肅宗至徳二載曰鎮南都䕶府代宗大歴中復為安南梁末帝貞明中土豪曲承美専有其地送欵於末帝授節鉞時劉隱擅命嶺表併有之後部内大亂宋初丁部領繼其父公著安撫境内上表貢方物封為交趾郡王屢遣使來貢其子丁璉繼之璉卒其臣黎桓幽璉之㓜弟璿自統其衆遣使來修職貢真宗御極封桓南平王三傳為大校李公藴所篡遣使奉貢用桓故事封之子孫世襲受封修貢八傳至昊旵無子其壻陳日煚遂有其國理宗淳祐二年詔授安南國王元世祖兵抵安南入其國日焸竄海島師旋乃還國傳子光昺納欵中統二年封為安南國王其後叛服不常仁宗延祐以後始疆場寧謐貢獻不絶明太祖洪武初陳日煃遣使來朝貢方物封賜有加二十一年帝以其頻煩且貢物侈命仍三年一貢建文帝建文元年其國相黎季犛簒立遂盡殺陳氏宗族成祖永樂時命征夷將軍張輔等大破之訪求陳氏子孫耆老千餘詣軍門言陳氏已滅無可繼者安南本中國地乞仍入職方同内郡詔改安南為交趾設郡縣後黎利等復叛宣宗宣徳二年遣使撫諭并盡撤軍民北還六年命黎利權署安南國事英宗正統元年封黎利子麟為安南國王世宗嘉靖十八年安南莫登庸令其黨偽為黎廣禪詔簒其位逮莫氏漸衰黎氏復興互相搆兵終明世兩姓分據不能歸於一南掌南掌古越裳地居安南暹羅之間明成祖永樂初酋長刁線歹始入貢方物其俗佩雕爪為飾故呼為撾家性獷悍身及眉目皆刺花相傳酋長三等大曰招木弄次曰招木牛又次曰招木花産犀牛海貝象及木香訶子乳香暹羅暹羅本扶南之别種後分為暹與羅斛二國暹土瘠不宜稼羅斛地平衍種多穫暹仰給焉元成宗元貞元年暹國進金字表欲朝廷遣使至其國比其表至已先遣使葢彼未之知也賜來使素金符佩之追前詔使同往其後羅斛强併有暹地遂稱暹羅斛國明太祖洪武四年其王參烈昭毘牙遣使奉表來貢十年賜之印文曰暹羅國王之印自是其國遵朝命始稱暹羅比年一貢或一年兩貢至英宗正統後或數年一貢其國崇信釋教氣候不正或寒或熱地卑濕人皆樓居男女椎結貢有象象牙孔雀六足龜寶石珊瑚檀速諸香胡椒豆䓻之類彭亨彭亨在暹羅之西氣候常温米粟饒足煮海為鹽釀椰漿為酒上下親狎無冦賊俗尚巫覡明太祖洪武十一年彭亨王麻哈剌惹荅饒遣使賫表來朝成祖永樂九年其王巴剌宻瑣剌達羅息泥復遣使至十年十四年兩遣鄭和報之所貢有象牙片腦乳香蘇木胡椒之屬丹眉流丹眉流在廣州西南俗皆板屋跣足衣布以白紵纒首其王所居廣袤五里無城郭出則乗象車亦有小駟四時炎熱無霜雪土産犀象紫草蘇木諸藥宋真宗咸平四年國王多須機遣使打吉馬等九人來貢召見崇徳殿賜以冠帶服物及還又賜多須機詔書以敦奨之占城即杜典林邑占城在中國之南東至海西至雲南南至真臘其國有百餘村村落户三五百或至七百亦有縣鎮之名四時皆似夏草木常青民以漁為業不解朔望但以月生為初月晦為盡不置閏分晝夜為十更非日不起非夜分不卧見月則飲酒歌舞為樂唐時或稱占婆其王所居曰占城髙宗永徽至元宗天寶凡三入貢肅宗至徳後更號環王迄周宋遂以占城為號宋太祖建隆二年其王遣使來朝表章書於貝多葉以香木函盛之後屢貢方物孝宗淳熙四年占城王以舟師襲真臘國都寧宗慶元以後真臘大舉破占城立真臘人為王占城遂為真臘屬國矣元世祖至元十六年遣使諭占城十七年占城國王遣使奉表貢方物十九年即其地立省以安撫之既而占城王子専國負固弗服萬户何子志等被執遣兵征之卒不能定明太祖洪武時其王遣使來朝尋命使齎詔封為占城國王又遣使往祭其山川頒科舉詔於其國後占城與安南國屢搆兵中朝遣使諭解之世宗嘉靖二十二年貢使訴安南侵擾道阻難歸乞遣官䕶送還國從之賔童龍賔童龍與占城接壤或言如來入舎衛國乞食即其地氣候草木人物風土類占城滿刺加即杜典頓遜滿刺加在占城南有山出泉流為溪土人淘沙取錫煎成塊曰斗錫氣候朝熱暮寒男女椎結身體黝黑間有白者則異種也俗淳厚市道頗平明成祖永樂元年遣中官尹慶使滿刺加宣示威徳及招徠意其酋大喜遣使至京因封為滿刺加國王後率其妻子陪臣相繼來朝宴賚極厚武宗正徳末佛郎機奪其地改名麻六甲其所貢物有瑪瑙珊瑚犀角象牙薔薇露蘇合油沈速香阿魏之屬阿魯阿魯亦名亞魯近滿刺加順風三日夜可至田瘠少收成藝甘蕉椰子為食明成祖永樂九年阿魯王遣使來朝十七年其王子復遣使來朝十九年二十一年再入貢𤓰哇即杜典訶陵𤓰哇即古闍婆國亦號訶陵近占城行二十晝夜可至為東南諸蕃之衝水有八節澗乃𤓰哇咽喉其建國始於漢宣帝元康元年地廣人稠性兇悍男女無少長皆佩刀稍忤輒相賊其甲兵為諸番之最字類瑣里氣候常似夏稻嵗二稔唐太宗貞觀中遣使入貢太宗以璽詔優答髙宗上元間國人推女子為王號悉莫威令整肅道不拾遺代宗大厯中訶陵使者三至憲宗元和文宗太和懿宗咸通時皆來朝貢宋太宗淳化三年闍婆國王遣使來朝徽宗大觀中復貢元時改名𤓰哇世祖至元二十九年詔出師征𤓰哇值𤓰哇方與鄰國葛郎搆難即納降於元誘元兵共攻破葛郎復反攻元兵元兵失傷甚衆明太祖洪武二年遣使以即位詔諭𤓰哇三年又以平定沙漠頒詔於其國其王遣使奉金葉表來朝自是率毎嵗一至其國自元末分東西二王成祖永樂四年東王為西王所滅宣宗宣徳七年入貢者乃西王也其國有新村最饒富中華及諸番商舶輻輳其地寶貨填溢永樂時其村主自遣使表貢方物重迦羅重迦羅𤓰哇隣國也髙山竒秀内有一石洞前後三門可容萬人田穀氣候與𤓰哇畧同國無酋長推年長者主之日羅夏治碟里日羅夏治與碟里俱近𤓰哇俗尚釋教明成祖永樂三年各遣使附𤓰哇使臣入貢碟里俗淳物産甚薄日羅夏治止産蘇木胡椒丁機宜丁機宜𤓰哇屬國也幅員甚狹僅千餘家時被柔佛侵擾後以厚幣求婚稍獲寧處其國以木為城酋所居旁列鐘鼓樓出入乘象以十月為嵗首民俗類𤓰哇物産悉如柔佛酒禁甚嚴有常税大家皆不飲惟細民無籍者飲之其曹偶咸非笑焉蘇吉丹蘇吉丹亦𤓰哇屬國後訛為思吉港國在山中止數聚落其水潏舟不可泊有地名饒洞者形勢平衍商舶皆就此貿易柔佛柔佛一名烏木礁林近丁機宜明神宗萬厯間其酋好搆兵鄰國丁機宜與彭亨屢被其患國中覆茅為屋列木為城環以池無事則通商於外有事則召募為兵地不産穀常易米於鄰壤俗好持齋見星方食節序以四月為嵗首喪用火𦵏所産有犀象玳瑁片腦没藥錫蠟之屬真臘真臘在占城南其縣鎮風俗同占城一嵗數稔以十月為嵗首閏悉用九月俗尚釋教民俗饒富男女椎結唐神龍後分為二北多山阜者號陸真臘南饒陂澤者號水真臘水真臘地八百里王居婆羅提拔城陸真臘或曰文單曰婆鏤地七里元宗開元天寶時王子率其屬來朝拜果毅都尉代宗大厯中副王及妻來朝獻象憲宗元和中水真臘亦遣使入貢後復合為一宋徽宗政和六年遣使鳩摩僧歌等來貢賜以朝服僧歌請服所賜詔從之仍以其事付史館寧宗慶元中滅占城而併其地更立真臘人為之王明太祖洪武三年遣使齎詔撫諭真臘四年其國遣使奉表朝貢成祖永樂中數被占城侵擾帝勅占城王罷兵修好景帝景泰後其使不常至投和投和在真臘南設官屬無賦税民以多少自輸唐太宗貞觀中遣使以黄金函奉表并獻方物婆利婆利在占城東南地有大洲多馬産火珠大者如鷄卵圜光照數尺日中以艾藉珠輒火出其國法殺人及盗截其手姦者鏁其足期年而止祭祀必以月晦盤貯酒殽浮之流水每十一月必設大祭三佛齊即杜典干陀利三佛齊與占城為隣居真臘闍婆之間所管有十五州氣候多熱少寒土産紅藤紫礦沈香㯽榔椰子之屬無麥有米豆鵝鴨鷄魚頗類中土城周數十里用椰葉覆屋不輸租賦其王號詹卑其國居人多蒲姓庶民皆水居編筏築室係之於樁欲徙則拔樁去之唐昭宗天祐元年貢方物授其使都番長蒲訶嘌為寧逺將軍宋太祖建隆元年其王遣使來朝自是迄髙宗紹興孝宗淳熙間恒通貢明太祖洪武三年遣使詔諭三佛齊其王遣使奉金葉表隨入貢八年嗣子表貢請命勅封為王三十年𤓰哇據其國改名舊港亦不能盡有其地華人往往寓焉其地為諸番要㑹俗習水戰隣國多畏之蘇禄蘇禄近勃泥闍婆明太祖洪武初發兵侵勃泥大獲其人畜以闍婆授兵至乃還其國分東王西王峒王而以東王為尊成祖永樂十五年三王子來朝進金縷表文獻珍珠寶石等物因並封為國王賜印誥襲衣冠帶及鞍物儀仗噐物居二十七日三王辭歸其東王次徳州卒於館帝遣官賜祭命有司營𦵏勒碑墓道諡曰恭定乃遣使齎勅封其長子為蘇禄國王十八年東王之母遣使來朝貢大珠神宗萬厯時佛郎機屢攻之城據山險不能下其地少粟麥民率食魚蝦螺蛤短髮纒皂縵煮海為鹽釀蔗為酒氣候常暑産竹布玳瑁諸物勃泥勃泥本闍婆屬國也所管有十四州以板為城城中居者萬餘人其王所居屋覆以貝多葉民舍覆以草在王左右者為大人俗以十二月七日為嵗節地熱多風雨無麥有麻稻及魚羊無蠶絲用吉貝花織成布宋太宗太平興國二年遣使進表貢方物神宗元豐五年復遣使入貢明太祖洪武四年遣使奉金銀箋來朝成祖永樂三年詔封勃泥國王賜印符誥命六年王率妃及子弟妹陪臣凡百五十餘人來朝貢珍物賜宴奉天門乞封其國之後山為一方鎮御製碑文賜之九年嗣王復偕其母來朝至仁宗洪熙元年四入貢嗣後貢使雖稀商人往來不絶層檀層檀在海南宋神宗熙寧七年始入貢海道便風行百六十日經勿廵古林三佛齊國乃至廣州人語音如大食元豐六年使者再至神宗念其絶逺賜賚有加巴喇西巴喇西在南海去中國絶逺明武宗正徳六年遣使臣來朝進金葉表貢祖母緑珊瑚樹等物嘉其逺來賜賚有加瞻博瞻博或曰瞻婆北距兢伽河多野象唐髙宗顯慶中與婆岸干支弗舎跋若磨臘四國並遣使入貢修羅分修羅分地近真臘有君長以木為城有勝兵二萬其風俗與歌羅舎分甘畢相類甘畢在南海上王名旃陀越摩歌羅舎分在南海南唐時三國皆貢方物室利佛逝室利佛逝一曰尸利佛誓過軍徒弄山二千里至其國有城十二地産金永砂龍腦唐髙宗咸亨至文宗開成間數遣使來朝名篾名篾所屬有州三十以十二月為嵗首賦二十取一唐髙宗龍朔初遣使來貢單單單單與名篾相近亦有州縣其王近行乗車逺乗象唐髙宗乾封總章時來獻方物注輦注輦去中國最逺自古未嘗相通宋真宗大中祥符八年其國王羅茶羅乍始遣使奉表來貢自天禧至仁宗明道神宗熙寧時皆遣使奉方物入貢其國城有七重所統有三十一部落産真珠象牙珊瑚㯽榔豆䓻之屬地宜竹饒花果穀有麥稻及黑緑豆馬八兒諸國馬八兒與俱藍國接壤比餘國最大元世祖至元間璽書招諭諸番占城與馬八兒俱奉表稱藩而俱藍諸國未下尋遣廣東招討使楊廷璧招降俱藍國王王即遣使入貢俱藍既下餘國曰須門那曰僧急里曰南無力曰馬蘭丹曰那旺曰丁呵兒曰來來曰急蘭亦䚟皆遣使入貢方物西南渝州蠻即杜典板楯蠻南平蠻渝州蠻其地西南接烏蠻昆明哥蠻大小部族數十居之宋英宗治平中熟夷李光吉梁秀等據其地各有衆數千以威勢脅誘漢户神宗熙寧三年進兵討平之以賔化砦為隆化縣𨽻涪州建榮懿扶歡兩砦其外居銅佛埧者𨽻渝州南川縣地皆膏腴自光吉等平他部族據有之因命其土人王才進充廵檢委之控扼才進死部族無所統數出㓂邊詔熊本討平之建為南平軍以渝州南川涪州隆化𨽻焉兩爨兩爨蠻自曲州靖州西南至龍和城者謂之西爨白蠻自彌鹿升麻二川南至歩頭者謂之東爨烏蠻西爨所産多駿馬犀象唐太宗貞觀時開青蛉弄棟為縣東爨居安寧城首領葢聘為西爨歸王所襲殺部落各分散東謝東謝蠻在西爨之南其南距守宫獠西連夷子地宜五穀衆處山汲流以飲無賦税見貴人則執鞭而拜賞有功者以牛馬銅皷犯小罪則杖大罪殺之盜物者倍償㛰姻以牛酒為聘㑹聚擊銅皷吹角坐必蹲踞唐太宗貞觀時酋長謝元深入朝中書侍郎顔師古奏言昔周武王時逺國入欵周史書其事為王㑹篇今萬國來朝冠服實可圖寫請撰為王㑹圖從之以其地為應州即拜元深為刺史又有南謝首領謝疆來朝以其地為莊州授疆為刺史䍧牱䍧牱國在昆明東九百里無城郭土鬰熱多霖雨稻粟再熟無徭役刻木為契風俗物産與東謝同唐文宗開成元年其酋阿佩内屬武宗㑹昌中封其别帥為羅殿王世襲爵其後又封别帥為滇王皆䍧牱蠻也宋真宗景徳元年詔西南䍧牱諸國進奉使親至朝廷者令廣南西路發兵援之勿抑其意先是龍光進等來朝上矜其道逺人馬多斃因詔宜州自今可就賜恩物至是懇請詣闕從之充州充州蠻即䍧牱别部唐文宗天寳中以充州酋長趙珍裔為黔州都督屢敗南詔閤羅鳯䕶五溪十餘年部落以安徳宗貞元憲宗元和以訖文宗開成朝貢不絶夜郎夜郎國唐置羈縻諸州費珍莊琰播郎夷牂等州皆是也宋太宗太平興國五年其酋龍瓊琚遣其子並諸州蠻以方物名馬來貢乃令作本國歌舞一人吹瓢笙數十輩連袂宛轉而舞以足頓地為節其曲名曰水曲部族數十獨龍氏方氏張氏石氏羅氏五姓最著號五姓蠻其後又有程氏韋氏皆比附五姓故號西南七蕃云昆彌昆彌國亦稱昆明其土歊濕宜秔稻俗逐水草蓄牧夏處髙山冬入深谷唐髙宗咸亨三年其十四姓率户二萬内附析其地為殷州總州敦州以安輯之殷州居戎州西北總州居西南敦州居南逺不過五百餘里近三百里其後又置盤麻等四十一州皆以首領為刺史松外諸蠻松外諸蠻部族不一唐太宗貞觀中巂州都督劉伯英疏言松外諸蠻率暫附亟叛請擊之西洱河天竺道可通也居數嵗太宗以將軍梁建方發蜀十二州兵進討酋帥雙舎拒戰敗走殺獲甚衆諸蠻震駭走保山谷建方諭降者七十餘部户十萬九千署首領䝉和為縣令餘衆感悦西洱河蠻亦納欵軍門吐蕃吐蕃本西𦍑屬或曰南涼秃髮利鹿孤之後國多霆電風雹盛夏如中國春時山谷常氷地有寒癘聯毳帳以居手捧酒漿以飲稼有麥豆獸多牛馬犬羊天鼠之皮可為裘無文字俗重鬼喜浮屠法逐水草無常所其鎧胄精良唐太宗貞觀八年始遣使來朝後請婚許之漸習華風遣子弟入國學習詩書肅宗至徳後因安史之亂攻䧟河西隴右之地代宗永泰大厯間再遣使來聘宣宗大中三年吐蕃恐熱為亂唐節度使康季榮等次第收復原泰安樂等三州及石門等七闗唐末其國漸衰弱種類分散無復統一宋太祖建隆二年靈武五部以駝馬來貢真宗大中祥符八年嘉勒斯賚遣使來貢請討西夏以自効仁宗寶元元年詔使擊西夏嘉勒斯賚死地遂分惟棟戩最强獨有河北之地遣使奉貢常與官軍㑹擊西夏自後嗣者俱授官爵貢奉不絶神宗熙寧哲宗元符徽宗崇寧間三用師於其國遂建熙河一道置郡縣遼聖宗統和中來貢元世祖中統時郡縣其地設官分職以吐蕃僧帕克斯巴為大寳法王帝師領之嗣者數世明太祖洪武六年大將軍徐達征西番既拔河州於是河州以西朶甘烏斯藏等部悉歸令故有官者皆至京授職朶甘朶甘在四川徼外唐吐蕃地南與烏斯藏隣元置宣慰詔討等官分統其衆明太祖洪武初遣使招撫遂來朝宴賚遣還繼改為行都指揮使司並賜銀印復增置招討司千户等官自是修貢惟謹英宗正統初諸番相率朝貢者八百二十九寨悉賜賚遣歸長河西魚通寧逺長河西魚通寧逺在四川徼外地通烏斯藏唐為吐蕃元置安撫司明太祖洪武時長河西土官遣使來朝貢方物宴賚遣還置長河西魚通寧逺宣慰司以其酋為宣慰使自是修貢不絶董卜韓胡董卜韓胡在四川威州之西明成祖永樂九年酋長南葛遣使奉表入朝貢方物置宣慰司景帝景泰三年進秩都指揮使其隣雜谷三年一貢惟董卜許比年一貢所𨽻别思寨及加渴瓦寺俱通貢烏斯藏大寳法王烏斯藏在四川西徼外其地多僧無城郭佛書甚多元世祖尊帕克斯巴為大寳法王錫玉印累入朝貢其徒嗣者咸稱國師明太祖洪武初遣使招諭烏斯藏攝帝師遣使朝貢六年自入朝七年遣使來朝請封號賜以玉印成祖永樂元年遣使往徴其僧哈里瑪入朝封為大寳法王六年辭歸自是頻年入貢孝宗宏治武宗正徳間或一年兩貢神宗萬厯年間有自稱活佛者求通貢許之此僧有異術即大寳法王及闡化諸王皆奉之諸番王徒擁虛位而已大乘法王大乘法王亦烏斯藏僧明成祖永樂十年來朝受封仁宗洪熙宣宗宣徳間並來貢憲宗成化四年其王旺布遣使來貢孝宗宏治元年其王桑節斡遣使來貢武宗正徳十年請襲封世宗嘉靖十五年偕輔教諸王來貢嗣後奉貢不絶大慈法王大慈法王亦烏斯藏僧明成祖永樂十二年入朝禮亞大乘法王賜之印誥嗣後時來朝貢宣宗宣徳九年入朝封大慈法王闡化王闡化王亦烏斯藏僧明太祖洪武五年封僧嘉木楊沙克嘉為灌頂國師以撫諭朶甘諸部明年其僧遣酋奉表入貢自是三年一貢成祖永樂四年封為闡化王十一年命楊三保復使其地令與贊善䕶教闡教三王共修驛站自是道路畢通其後入貢益頻特遣賜綵幣世宗嘉靖三年偕輔教王及大小三十六番請入貢穆宗隆慶三年定令三年一貢其後貢奉不替贊善王贊善王者靈藏僧也其地在四川徼外視烏斯藏稍近明成祖永樂四年其僧珠卜巴勒遣使入貢命為灌頂國師明年封贊善王自永樂迄英宗正統貢無定期憲宗成化元年始定三嵗一貢之例嗣是屢請封襲世宗嘉靖後猶入貢如制䕶教王䕶教王者納木喀巴勒藏布衮確克僧也明成祖永樂四年遣使入貢授灌頂國師明年封䕶教王賜印誥遂頻嵗入貢仁宗洪熙宣宗宣徳中並入貢後無嗣其爵遂絶闡教王闡教王者巴勒恭噶僧也明成祖永樂元年其國師端珠卜入貢四年又貢十一年加號大國師又封其僧琳沁巴勒濟特為闡教王賜印誥綵幣後比年一貢迄世宗嘉靖時修貢不輟輔教王輔教王者斯達克藏僧也地逺於烏斯藏明成祖永樂十一年封其僧納木喀埒克巴為輔教王通貢使賜予與諸法王等孝宗宏治十二年輔教等四王及長河西宣慰司並附入貢嗣後奉貢不絶西天阿難功徳國西天阿難功徳國西方番國也明太祖洪武七年王卜哈魯遣其講主來朝貢方物賜文綺及布帛諸物後不復至又有和林國師多爾濟辰類錫喇卜藏布亦遣其講主獻銅佛舍利及元所授玉印圖書等命宴賚遣還明年國師入朝和林非西番其國師則番僧與功徳國同時來貢後亦不復至尼八刺國地湧塔國尼八刺國在諸藏之西其王皆僧也明太祖洪武十七年命僧智光往其國并使其隣境地湧塔國王馬達納羅摩遣使入朝貢金塔名馬方物賜以誥勅綵幣二十三年再貢成祖永樂七年遣使來貢以銀幣賜其嗣王沙葛新的及地湧塔王可般明年來貢封為尼八刺國王賜印十六年來貢命使往報之所經罕諸靈藏巴勒恭噶烏斯藏及野藍卜納皆有賜宣宗宣徳二年又遣使賜其王與地湧塔王自後貢使不復至又有速覩嵩者亦西方之國永樂三年遣使往招以道逺不至麻葉甕麻葉甕在西南海中自占城靈山放舟順風十晝夜至交欄山其西南即麻葉甕山峻地平田膏腴收穫倍他國煮海為鹽釀蔗為酒男女椎結衣長衫圍之以布俗尚節義婦䘮夫𠢐靣剃髮終身不改嫁産玳瑁木棉黄蠟㯽榔花布之屬又有葛布及速兒米囊二國明成祖永樂三年遣使賚璽書賜物招諭與麻葉甕俱未朝貢陀洹陀洹一曰耨陀洹在占城西南海中自交州行九十日乃至王姓察失利名婆那國無蠶桑有稻麥麻豆畜有白象牛羊猪俗喜樓居謂為干欄以白㲲朝霞布為衣南毗南毗國在大海之西南自三佛齊便風月餘可至國多風王出先期遣兵百餘人持水灑地以防颶風播揚精飲食鼎以百計日一易之俗喜戰鬭習刀矟善射鑿白銀為錢土産真珠諸色番布其國最逺番舶罕利蘇門答刺蘇門答刺在滿刺加之西或言即漢條枝唐波斯大食二國地與花面國相接俗頗淳地瘠無麥有禾一嵗二稔所産瑪瑙水晶沈速香胡椒蘇木之屬四方商賈輻輳其氣候朝如夏暮如秋夏有瘴氣明太祖洪武中國王遣使奉金葉表入貢成祖永樂中其王與花面王戰中矢死子弱不能復讐其妻號於衆曰能復此讐者我以為夫共國事有漁翁聞之率衆殺花靣王其妻遂從之稱為老王既而王子年長率部衆殺老王而自立老王弟蘇幹刺逃山中連年率衆侵擾王子遣使來訴命中官鄭和率兵往捕蘇幹剌歸獻闕下國乃寧王子感恩貢方物自後朝貢不絶按明洪武十六年有須文達那國王殊旦麻勒兀達肦遣使來朝貢馬布兠羅緜等物及薔薇水沈連諸番賜王大統厯錡鈔及使臣襲衣或言須文達那即蘇門答剌明洪武時所更然亦無確據今從明史之例附見於此覽邦覽邦在西南海中明太祖洪武九年其王遣使奉表來貢永樂宣徳中嘗附隣國朝貢其地多沙礫麻麥之外無他種山無峯巒水亦淺濁俗好佛勤祭祀澹巴澹巴在西南海中明太祖洪武十年其王遣使上表貢方物其國石城瓦屋土衍水清草木暢茂畜産甚夥男女勤耕織市有貿易野無㓂盜稱樂土焉百花百花在西南海中明太祖洪武十一年其王遣使奉金葉表貢方物其國中氣候恒燠無霜雪多竒花異卉民富饒尚釋教那孤兒那孤兒在蘇門答刺之西壤相接地狹止千餘家男子皆以墨刺靣為花獸形故又名花靣國俗淳田足稻禾自耕而食無㓂盜明永樂中鄭和使其國其酋長常入貢方物黎伐黎伐在那孤兒之西西接南㴾利南大山北大海𨽻蘇門答刺聲音風俗與之同明成祖永樂中常隨使臣入貢南㴾利南㴾利與蘇門答刺相近明成祖永樂十年附其使臣入貢俗樸實地少穀多魚蝦其西北海中有山甚髙大名㡌山西來洋船俱望此山為凖宣宗宣徳五年使鄭和遍賜諸國南利亦與焉柯枝柯枝或言即古槃槃國與狼牙修接唐太宗貞觀中槃槃國再遣使貢方物髙宗永徽中獻五色鸚鵡後不復聞明成祖永樂元年遣使賫詔撫諭其國九年柯枝王可亦里遣使入貢請賜印誥封其國中之山十年遣鄭和賫印賜王並撰碑文勒石山上自後間嵗入貢其國俗頗淳氣候常熱夏多雨田瘠少收諸穀皆産獨無麥小葛蘭大葛蘭小葛蘭與柯枝接小國也明成祖永樂五年遣使附蘇門答刺入貢俗淳土薄收穫少仰給榜葛剌奉釋教婚喪諸禮多與錫蘭山同又有大葛蘭者風俗物産多類小葛蘭錫蘭山錫蘭山或言即古狼牙修明成祖永樂六年鄭和使西洋過其地王發兵刼和塞歸路和攻拔其城生擒王及妻子頭目獻俘於朝釋之命擇其族之賢者詔封為王遂屢入貢宣宗宣徳英宗正統天順年間數遣使來貢欽定續通典卷一百四十八
