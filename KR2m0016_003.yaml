body:
  text: 食貨田制下元明元世祖時趙天麟上策曰井田之法六尺為步步百為畝畝百為夫夫三為屋屋三為井井方一里凡九百畝其中為公田八家皆私百畝同養公田井百為成成方十里成百為同同方百里同百為畿畿方千里臣嘗計方千里之地提封百萬井山川城市等除百分提封之三十六外定六十四萬井為私田五萬一千二百萬畝其井中區除宅居二十畝之餘為公田五千二十萬畝又乘除粟稻等子粒之多寡每畝嵗只率一石五斗而計之則私田子粒可得七萬六千八百萬石公田子粒七千六百八十萬石其鰥寡孤獨無告者須先賑惠焉上下相睦貧富相均此隆周所以旁作穆穆迓衡而孟子所以不憚區區告人也自嬴秦變法之後富者田連阡陌而貧者無置錐之地越至於今迫於豪富官貴而不能復聖朝東西南北地境無窮國家用費之資僅足下民愁嘆之聲未絶且古者方千里之地得公田子粒七千六百八十萬石今能得之乎臣知其斷不能也方今之務莫如興復井田尚恐驟然騷動宜限田以漸復之望陛下一新田制凡宗室王公之家限田幾百頃凡無族官民之家限田幾十頃凡限外退田者賜其家長以空名告身每田幾頃官階一級不使之居實職也凡限田之外蔽欺田畝者坐以重罪凡限外之田有佃户者就令佃户為主凡未嘗墾闢者令無田之民占而闢之且全免第一年租稅次年減半第三年依例科徴凡占田不可過限凡無田之民不欲占田者聽凡以後有賣田者買田亦不可過限也私田既定乃定公田公田之法凡九等一品者二十頃二品者十八頃三品者十五頃四品者十二頃其以下俱以二頃為差至九品但二頃而已庶乎民獲恆産官足養亷行之五十年之後井田可以興復矣至元三年定隨路府州縣官員職田上路達嚕噶齊一十六頃總管同同知八頃治中六頃府判五頃下路達嚕噶齊一十四頃總管同同知七頃府判五頃散府達嚕噶齊一十頃知府同同知六頃府判四頃上州達嚕噶齊一十頃州尹同同知五頃州判四頃中州達嚕噶齊八頃知州同同知四頃州判三頃下州達嚕噶齊六頃知州同州判三頃警巡院達嚕噶齊五頃警使同警副四頃警判三頃録事司達嚕噶齊三頃録事同録判二頃縣達嚕噶齊四頃縣尹同縣丞三頃主簿二頃縣尉主簿兼尉並同經歷四頃又定按察司職田各道按察使一十六頃副使八頃僉事六頃七年立司農司頒農桑之制十四條其最善者縣邑所屬村疃凡五十家立一社擇髙年曉農事者一人為之長增至百家者别設長一員不及五十家者與近村合為一社地逺人稀不能相合各自為社者聽其合為社者仍擇數村之中立社長官司長以教督農桑為事凡種田者立牌橛於田側書某社某人於其上社長以時㸃視勸誡不率教者籍其姓名以授提㸃官責之其有不敬父兄及凶惡者亦然仍大書其所犯於門俟其改過自新乃毁如終嵗不改罰其代充本社夫役社中有疾病凶喪之家不能耕種者衆為合力助之一社之中災病多者兩社助之凡為長者復其身郡縣官不得以社長與科差事農桑之術以旱暵為先凡河渠之利委本處正官一員以時濬治或民力不足者提舉河渠官相其輕重官為導之地髙水不能上者命造水車貧不能造者官具林木給之俟秋成之後驗使水之家俾均輸其直田無水者鑿井井深不能得水者聽種區田其有水田者不必區種仍以區田之法散諸農民種植之制每丁嵗種桑棗二十株土性不宜者聽種榆栁等其數亦如之種雜果者每丁十株皆以生成為數願多種者聽其無地及有疾者不與所在官司申報不實者罪之仍令各社布種苜蓿以防饑年凡荒閒之地悉以付民先給貧者次及餘户每年十月令州縣正官一員巡視境內設法除蝗十二年江陵行省亷希憲以宋引水扞敵是以城闉之外濟水彌望因引還江流遂得陸地數百萬畝招諭富民隨力耕種約以三年後減半收租貧民趨之曽未期年已成沃壤二十一年定江南行省及諸司職田比腹裏減半上路達嚕噶齊八頃總管同同知四頃治中三頃府判二頃五十畝下路達嚕噶齊七頃總管同同知三頃五十畝府判二頃五十畝經歷二頃知事一頃提控案牘同散府達嚕噶齊六頃知府同同知三頃府判二頃提控案牘一頃上州達嚕噶齊五頃知州同同知二頃州判同提控案牘一頃中州達嚕噶齊四頃知州同同知二頃州判一頃五十畝都目五十畝下州達嚕噶齊三頃知州同同知二頃州判一頃五十畝上縣達嚕噶齊二頃縣尹同縣丞一頃五十畝主簿一頃縣尉同中縣同上無縣丞下縣達嚕噶齊一頃五十畝縣尹同主簿兼尉一頃録事司達嚕噶齊一頃五十畝録事同録判一頃司獄一頃巡檢同按察使八頃副使四頃僉事三頃經歷二頃知事一頃運司官運使八頃同知四頃運副三頃運判同經歷二頃知事二頃提控案牘同鹽司官鹽使二頃鹽副二頃鹽判一頃各場正同管勾各一頃成宗大德二年凡在官之地許民佃種輸租七年浙省平章政事徹爾以松江填淤民不可稻因導水入海民得良田若干萬頃武宗至大二年苗好謙獻種蒔之法其說分農民為三等上户地一十畝中户五畝下户三畝或一畝皆築垣牆圍之以時收採桑椹依法種植武宗善而行之三年申命大司農總挈天下農政修明勸課之令除牧養之地其餘聽民秋耕秋耕者掩陽氣于地中蝗蝻遺種皆為日所曝死次年所種必盛於常禾也仁宗延祐元年平章章閭言經理大事世祖已嘗行之但其間欺𨼆尚多未能盡實以熟田為荒地者有之懼差而析户者有之富民買貧民田而仍其舊名輸稅者亦有之由是嵗入不增小民告病若行經理之法俾有田之家及各位下寺觀學校財賦等田一切從實自守庶幾稅入無𨼆差徭亦均於是遣官經理然期限猝迫富民黠吏並緣為姦以無為有虛具於籍者往往有之明年命河南自實田自延祐五年為始每畝止科其半按河南省總計官民荒熟田一百一十八萬七百六十九頃江西省官民荒熟田四十七萬四千六百九十三頃江浙省官民荒熟田九十九萬五千八十一頃英宗至治三年張圭上疏曰天下官田嵗入所以贍衛士給戍卒自至元三十一年以後纍朝以是田分賜諸王公主駙馬及百官宦者寺觀之屬遂令中書酬直海漕虛耗國儲其受田之家各任土著姦吏贓官催甲斗級巧名多取又且驅迫驛傳徴求餼廪折辱州縣償補逋負至倉之日變鬻以歸官司交忿農民窘竄臣等議惟諸王公主駙馬寺觀如所與公主僧格勒及普安三寺之制輸之公廪計月直折支以鈔令有司兼領輸之省部給之大都其所賜百官及宦者之田悉拘還官著為令時不能從文宗天厯中詔諸路農民請佃荒田者與免租賦三年作已業者一年自首冒佃及諸佃黃河退灘地者不在免例順帝至正二年六月命江浙撥賜僧道田還官徴糧以備軍儲四年六月立松江等處稻田提領所時賜托克托松江田故也十三年正月命烏蘭哈達烏克遜良楨兼大司農卿給司農分司印西自西山南至保定河間北至檀順州東至還民鎮凡係官地及元管各處屯田悉從分司農司立法佃種合用工價牛具農器榖種召募農夫諸費給鈔五百萬錠以供其用三月以各衙門在官田地并宗仁等衛屯田地土並付司農分司播種四月以禮部所轄掌薪司并地土給付司農分司又詔取勘徐州汝寧南陽鄧州等處荒田并户絶籍沒入官者立司牧署掌司農分司耕牛又立玉田屯署十四年二月詔河南淮南兩省並立義兵萬户府建清河大夀元忠國寺以江浙廢寺田歸之十六年三月臺臣言係官牧馬草地俱為權豪所占今後除規運總管府見種外餘盡取勘令大司農召募耕墾嵗收租課以資國用從之十九年三月置大都督兵農司仍置分司十道專督屯糧以博囉特穆爾領之所在侵奪民田不勝其擾明土田之制凡二等曰官田曰民田初官田皆宋元時入官田地厥後有還官田沒官田斷入官田學田皇莊牧馬草場城壖苜蓿地牲地園陵墳地公占隙地諸王公主勳戚大臣內監寺觀賜乞莊田百官職田邊臣養亷田軍民商屯田通謂之官田其餘為民田太祖即位遣使核浙西田畝又以中原田多荒蕪命省臣議計民授田令各處田土兵燹之後他人開墾成熟者聽為已業業主已還有司于附近莊田撥補又令復業人民丁少而舊田多者不得依前占護丁多而舊田少者於附近荒田驗丁撥補設司農司開置河南臨濠之田驗其丁力計畝給之不得兼并北方近城地多不治召民耕人給十五畝蔬地二畝免租三年每嵗中書省奏天下墾田數官給牛及農具者乃收其稅凡民田五畝至十畝者栽桑麻木棉各半畝十畝以上倍之民有犯法應籍沒者田土令拘入官洪武三年徙蘇州松江嘉興湖州杭州民無業者田臨濠給資糧牛種復三年五年詔流民復業者各就丁力耕種毋以舊田為限十年賜百官公田勳臣公侯丞相以下莊田多者百頃親王莊田千頃又賜公侯暨武臣公田又賜百官公田以其租入充祿指揮沒于陳者皆賜公田二十四年給公侯嵗祿歸賜田於官二十年命國子生武淳等分行州縣隨糧定區區設糧長四人量度田畝方圎次以字號悉書主名及田之丈尺編類為冊狀如魚鱗號曰魚鱗圗冊先是詔天下編黃冊以户為主詳其舊管新收開除實在之數為四柱式而魚鱗圗以土田為主諸原坂墳衍下隰沃瘠沙鹵之别畢具魚鱗冊為經土田之訟質焉黃冊為緯賦役之法定焉凡質賣田土備書稅糧科則官為籍記之毋令産去稅存以為民害二十一年徙澤潞民無業者墾河南北田賜鈔備農具二十四年令公侯大官以及民人不問何處惟犂到熟田方許為主但是荒田俱係在官之數若有餘力聽其再開其山場水陸田地亦照原撥賜則例為主不許過分占為己有又令山東概管農民務見丁著役限定田畝著令耕種敢有荒蕪田地流移者論如律二十六年核天下土田總八百五十萬七千六百二十三頃凡田以近郭為上地迤逺為中地下地五尺為步步二百四十為畝畝百為頃仍元里社之制河北諸州縣土著者以社分里甲遷民分屯之地以屯分里甲社民先占畝廣屯民新占畝狹故屯地謂之小畝社地謂之廣畝時又令開墾荒蕪官田俱照民田起科二十八年詔河南山東桑棗及二十七年後新墾田毋徴稅按宣德間墾荒田永不起科及汙下斥鹵無糧者皆核入賦額數溢于舊有司乃以大畝當小畝以符舊額有數畝當一畝者步尺參差不一人得以意贏縮土地不均未有如北方者貴州田無頃畝尺籍悉徴之土官而諸處土田日久頗淆亂與黃冊不符成祖永樂元年發流罪以下墾北京田英宗正統三年詔各處凡有入額納糧田地不堪耕種另自開墾補數者有司勘實不許重復起科五年令北直隸府州縣將富豪軍民人等包耕田地除原納糧田地外其餘均撥貧民及衝塌田地人户耕照例起科其貧民典當田宅年久無錢取贖及富豪軍民占種逃民田地待復業之日照舊斷還原主十三年令各處寺觀僧道除洪武年間置買田土其有續置者悉令各州縣有司查照散還於民若廢弛寺觀遺下田莊令各該府州縣踏勘悉撥與招還無業及丁多田少之民每户男子二十畝三丁以下者三十畝若係官田照依減輕則例每畝改科正糧一斗俱為官田如有户絶仍撥給貧民不許私自典賣景泰帝二年令各處寺觀量存六十畝為業其餘撥與小民佃種納糧英宗天順二年敕皇親公侯伯文武大臣不許强占官民田地事發坐以重罪八年時憲宗已即位以順義縣安樂里板橋村太監曹吉祥抄沒地一處撥為宫中莊田皇莊之名由此始憲宗成化五年彭韶疏言奉命㑹勘真定府土地按真定在堯舜時為冀州之域其賦第一等或雜出第二等說者以為如周官田一易再易之類蓋以其地有間一嵗一收者有間二嵗一收者所以賦有不同則是未嘗逐畝定賦而一畝必兼數畝之地明矣我太祖皇帝於洪武二十八年户部官奉㫖百姓供給煩勞已有年矣山東河南民人除額入田地照舊徴科新開荒地不問多少永不起科有力者聽其自種宣德六年本部官又奏北京八府供給尤多欽䝉宣宗皇帝准令照例是祖宗之心即堯舜之心也以此真定所屬武强等縣新開地土向不起科至天順二年太監韓諒奏討武强縣踏勘得無糧地五百一頃三十五畝䝉英宗皇帝欽撥一百頃與韓諒外有四百餘頃仍舊與民耕種不曽科糧是英宗皇帝之心即祖宗之心也後因廣寧侯家人劉聰等纍年攪擾民間方將前地并韓諒還官地減輕起科誠出無奈今指揮同知周彧等又奏前地有司不能明白敷奏再量出無糧地七十餘頃蓋其地間有多餘故也然地雖間有勢難盡量臣等不敢欺蔽請陳其實頃者親詣本縣見其地有髙阜者有低窪者有平坦磽薄者天時不同地利亦異且如亢旱則低處得遇而髙處全無水潦則髙處或可而低處不熟沿河者流徙不常鹹薄者數年一收截長補短取彼益此必須數畝之地僅得一畝之入是以堯舜行錯法於前我祖宗許開種於後良為此也即今彼處人民追賠馬匹起運糧草砍柴人夫京班皂隸等項一年約有數班差役以致丁丁皆授役之人嵗嵗無空閒之日所深賴者顧戀地業盡力耕種以取給朝夕而已今若一畝只量與一畝餘皆奪為閒地則仰事俯育且無所資其餘糧差何暇復計臣知其非死則徙耳自古立國皆重根本今真定近在畿內理宜加厚此臣等所謂不可盡量者也而戚里功臣之家錦衣美食與國咸休但能存心忠厚自然富貴兩全奚待與民爭艱食之利哉況聖朝卜世無疆法當垂後土地有限而求者務多亦恐終不能有所應付也伏望特憫其祖宗開墾艱難其子孫衣食所托量加寬恤庶幾民間知有生生之樂六年從原傑奏凡軍民有告訐不起科者不聽又題准各王府及功臣之家賜田土佃户照原定則例將該納子粒每畝徴銀三分送赴本管州縣上納令各該人員關領不得自行收受二十一年令遼東地方軍人有開墾拋荒土地不係屯田分上中下三等起科孝宗𢎞治二年令順天等六府入官田地俱撥與附近無田小民耕種起科每名不過三十畝三年禁宗室勳戚奏請田土及受人投獻實在田土總計四百二十三萬八千五十八頃內官田五十九萬八千四百五十六頃民田三百六十萬九千六百一頃武宗正德十六年差夏言樊繼祖張希尹等往順天等府查勘各項莊田地土共二十萬九百一十九頃又外係先年侵占民者共二萬二百二十九頃各給主遂罷皇莊及宫莊等而宦戚輩復中撓之帝命核先年頃畝數以聞改稱官地不復名皇莊又定凡公主國公莊田世逺存什三嘉靖三十九年遣御史奪𨼆冒莊田萬六千餘頃穆宗復定世次遞減之限勳臣五世限田二百頃戚畹七百頃至七十頃有差初世宗時承天六莊二湖地八千三百餘頃領以中官又聽校舍兼并增八百八十頃分為十二莊至是始領之有司兼并者還民宗室買田不輸役者沒官皇親田俱令有司徴之賜額有定徴收有制民害少衰神宗賚豫過侈福王分封括河南山東湖廣田為皇莊至四萬頃羣臣力爭乃減半王府官丈地徵稅旁午於道時復更定勳戚莊田世次遞減法視舊制稍寬其後應議減者輒奉詔姑留不能革也是年核馬房地土頃畝設立碓開挑濠塹呈部照驗世宗嘉靖初因給事中底藴奏正德以來無籍之徒揑稱湖蕩等項無人之地投獻勢要奏建皇莊命刑部尚書林俊查勘俊疏言竊查皇莊及皇親功臣各莊田所占各府州縣地自正德十一年以前已有三百八十餘處每處地土動計數千百頃中間侵占混奪之弊積襲已非一朝為厲之階實起於姦人欲盡規地利以媚朝廷究其流弊則壞于勢家盡奪民産以肥私室其在宫闈者則中官禁卒旁午肆出而郡縣恣其騷擾其在勳戚者則豪奴悍僕肆行威斷而官府莫敢誰何節經差官查勘終於患害不除蓋由私人貴戚慿藉寵靈猾少姦徒盤據窟穴是以積垢宿蠧莫可爬梳合勢朋計動行沮撓此實纍朝弊政至于先朝而極畿輔軍民剝膚摧髓之害莫有甚于此者也兹者伏荷皇上至仁體物軫念民窮故因言官建議亟䝉俞允之音繼因該部執奏特降諄切之㫖既將管莊人員盡數取回復禁皇親功臣不許自行收受厲階禍本一旦剗除中外人心不勝歡慶但先經該部具題節行撫按衙門去後續因差科道等官止令前去㑹同本處巡按御史而於巡撫衙門顧未之及臣等愚昧以為鋤擊豪强則於巡按之體為切至于檢核田土則於巡撫之職為宜必須彼此㑹同方於事體穩便且順天等八府雖云近在畿甸然地方遼濶周延千里故撫按付以四人分理今皇莊並各項莊田所占之地幾遍八府以正德十一年以前所有計之無慮九萬餘頃至于近年以來嵗增日益踰鄉跨邑無處無之且先年祇因一二處奏辦告爭朝廷差官亦不過一二處踏勘尚有經年閲月方得事竣今舉列郡皇莊之多百年積習之弊一旦付臣等清理是宜舉措之間要必先有次第訪得各該撫按官員見今巡歷各在一方相去隔逺卒難期㑹請查照該部原議先行撫按衙門遵照先令即奉欽依事理一面委官分頭親詣各處皇莊逐一查出四至段落并原額頃畝數目及審有無侵占等弊開具略節聽候臣等領敕親詣各該地方備出告諭嚴加督責密行體訪中間或權豪勢要沮壞行事或侵奪𨼆占積久難明或姦猾刁徒乘機詆詐或貪官枉法欺弊或冗官玩法稽行俱聽臣等㑹按施行疏上敕順天等八府畿內重地朝廷纍有優恤禁例近姦猾無籍之徒妄以軍民田地指作空閒投獻奏改皇莊以致失業朕深惻然兹特命爾與山西道監察御史樊繼祖等㑹同撫按親詣覆勘給主召佃凡有益國家有利軍民者悉聽㑹同議處施行俊又疏曰伏讀詔書內一欵京通二倉水次倉皇城各門京城九門各房倉場各皇莊凡正德中額外增置者內城司禮監照洪武初年例查奏取回又禮科給事中底藴奏為應詔查處皇莊事奉㫖該部查覆本部議依轉行查勘既而兵部又稱差管皇莊內臣官校數多移咨勘報臣等益加駭愕竊惟太祖以應天等處為興王之地特將夏稅不時全免太宗建都北平恪守成憲列聖相承益隆無替正德以來無籍之徒輒取畿內逋田投獻近幸奏為皇莊況管莊內臣又慿城狐社鼠之勢而收租官校即係設謀投獻之人橫征巧取莫敢誰何而皇親駙馬功臣人等莊田散布其間乘機侵奪往往有之幸賴陛下聖明入繼大統即有前項裁革管莊內臣之詔甚盛心矣旬月之間乃復許皇莊責令私人管理不意惟新之初有此厲民之漸伏望陛下垂念畿輔根本收回成命又查勘事宜重大必須差科道部屬假以事權公同查勘庶幾克濟奉㫖姦猾之徒侵奪民田朕在藩邸已知其弊便寫敕遣官查勘給主管莊人員盡數撤回務使積弊盡革欽此臣等遵敕請以順天等府州縣㑹同前巡撫順天等府地方都察院右副都御史李昆今接管右副都御史孟春并巡撫保定等府地方都察院右副都御史周季鳳前巡撫直隸監察御史王琳宋鉞今接管監察御史郭楠選官親詣各處召集地鄰里老等嚴加查勘旋據順天等府經歷司以委官治中王槐等所查勘各州縣原額莊田并投獻侵占額外地土各頃畝數目及取具業主召佃人户退認供給領狀造冊呈繳臣等覆勘訖竊臣等奉命以來按行八府閲歷三時仰希明恩俯詢民瘼凡成化𢎞治及正德年間皇莊及皇親功臣莊田凡屬姦民投獻勢要侵占者盡數查出給主召佃還官歸民一切遵㫖施行所據查勘順天等府地方各項莊田地土計二十萬九百一十九頃二十八畝退斷侵占過民地計二萬二百二十九頃二十八畝閭閻歡欣鼓舞歌頌但臣等區區尚有進於是者臣聞古者四民各有常職而農者十居八九故衣食足而民無困洪惟我太祖立國之初檢核天下官民田土收種俱有定額乃令山東河南額外荒田任民開墾永不起科至我宣宗皇帝又令北直隸地方比聖祖山東河南例民間新開荒田不問多寡永不起科至正統六年則令北直隸開墾荒田從輕起科實于祖宗之法略有背戾至景皇帝尋亦追復洪武舊例不許額外丈量起科至今所當遵行蓋緣北方地土平夷廣衍中間大半㵼鹵瘠薄之地葭葦沮洳之場且地形率多窪下一遇驟雨即成淹沒不必淫潦之久輒有害稼之虞祖宗有見於此曲為體恤是以北人雖有水潦災傷猶得隨處耕墾不致坐窘衣食夫何近年權幸親昵之臣妄聽姦民投獻輒自違例奏討由是公私莊田踰鄉跨邑小民恆産嵗剝月削至于本等原額徴糧養馬産鹽入站之地一例奪據權勢橫行何所控訴産業既失糧稅究存徭役苦於並充糧草困於重出饑寒流轉靡所底止以致强者起為盜賊弱者轉死溝壑其巧黠者則或投充勢家莊頭家人名目資其勢力轉擾良民或匿入海户陵户勇士校尉等籍脫差徭以重困敦本之人凡所以蹙民命竭民膏者百孔千瘡不能枚舉臣等伏查各宫莊田祖宗以來未之有也惟天順八年以順義縣安樂里板橋村太監吉祥抄沒地一處撥為宫中莊田其地原額一十頃一十三畝初吉祥占過軍地二十四頃八十七畝共三十五頃立莊今次查勘又占過民地四十頃見在共七十五頃此則宫闈莊田之始而數十年間侵占之數過於原額已十倍也舉此一處其他可知至成化年間惟增寶坻縣王浦營莊田一處原係㑹州衛草場當時止增豐潤新城雄縣莊田三處至𢎞治十八年十月乃孝廟升遐之後先帝踐阼之初一月之間建立皇莊七處曰大興縣十里鋪皇莊曰大王莊皇莊曰深溝兒皇莊曰髙密店皇莊曰石㜑營皇莊曰六里屯皇莊曰土城皇莊自此之後設立漸多而皇莊之名始著其在昌平州則有蘇家口皇莊在三河縣則有白塔皇莊在真定府寧晉縣則有鋪頭村皇莊大劉村皇莊在平隂縣則有大灰窑皇莊在新河縣則有仙汪莊皇莊在南宫縣則有南莊村皇莊此皆正德元年之新設也又東安縣則有南葛里皇莊寶坻縣則有李子沽皇莊通州則有神樹皇莊武清縣則有灰蝸口皇莊王慶陀皇莊靜海縣則有四當口皇莊此皆正德二年之所設也至正德四年則立大興縣三里河皇莊二處正德五年則立六里屯皇莊一處正德七年則立武清縣尹兒灣大直沽皇莊二處正德八年則立昌平州樓子村皇莊靜海縣衛河兩岸皇莊青縣孫兒莊皇莊保定府安州騸馬廟皇莊清苑縣閻莊社皇莊正德九年則又立安肅縣龍化社皇莊數年之間設立皇莊如此之夥共計占地三萬七千五百九十五頃四十六畝皇莊既立則有管理之太監有奏帶之旗校有跟隨之名下每處動至三四十人其初管莊人員出入及裝運租稅並自備車輛夫馬不干有司正德以來權姦用事於是有符驗之請關文之給經過州縣有廪餼之供有車輛之取有夫馬之索其分外生事巧取財物又有言不能盡者及抵所轄莊田處所擅作威福肆行武斷其甚不靖者則起蓋房屋駕控橋梁擅立關隘出給票帖私刻關防凡民間撑駕舟車放牧牛馬採捕魚蝦螺蚌莞蒲之利靡不括取而相鄰地土展轉移築封堆包打界至見畝徴銀本土豪猾之民投為莊頭撥置生事幫助為虐多方括尅獲利不資輸宫闈者曽無十之一二而私入囊槖者蓋不啻什八九矣是以小民脂膏吮削無餘丁壯逃竄户口消耗里分減併糧差愈難卒致輦轂之下生理寡遂閭閻之間貧苦刻骨道路嗟怨邑里蕭條此弊不革將見數十年後人民離散土地日蹙盜賊蜂起姦雄藉口不知朝廷何以為國此可為太息流涕者也幸遇皇上天縱仁智入繼大統曩在潛邸已知其弊即位之初首下明詔管莊人員盡數革回乃者復採廷議委臣等以查勘前項地土草萊之人始得披雲霧而睹青天脫水火而就袵席矣臣等勘報文冊將在京附郭大興縣地方各宫莊田原不係占奪民田不滿數十頃者請一切改為各宫親蠶厰公桑園等項名額以備宫中蠶事其餘一應莊田逺在各府州縣動以千百頃計者臣願陛下一切弛以利民或勒歸户部造入版籍令民照舊輸納以為在官地土不必更屬宫闈如宫中常年供用不能頓缺敢乞令户部每嵗進納上供銀兩若干分進各宫以充支用則光明正大何必虛受莊田之名而貽小民之害哉至于皇親功臣欽賞莊田查得洪武初年公侯駙馬伯祿米皆給官田令量原定官糧私租之數依主佃分數收取至洪武二十五年皆給祿米賜田還官竊惟洪武初年天下甫定干戈之後土地有餘彼時受封者又皆佐命元臣比今之戚畹恩澤封拜萬萬不同然而給祿之後原賜土田急令還官誠以土地乃農業所資國家之本夫古之有田祿者各食其田之所出以為世祿今既官給之祿奈何又與之田是重出則過制矣然功臣之中勛勞大者至今仍有莊田不過數家管業已定侵占亦少惟近年皇親侯伯慿藉寵昵奏討無厭害民奪業甚失人心今臣等仰遵敕㫖退給伏望陛下敕部自功臣家外將纍朝皇親侯伯受賜莊田據臣等勘報文冊通融數目多寡定為中制量給養贍其過多者一切裁損以還之官臣等又查勘過各項田土數目並是退給侵牟開豁荒鹹核實之數比與先年妄報投獻奏討原數不同乞敕部一以新冊為定移出所給執照以便徴收其山東河南奉例開墾之地亦有姦猾之徒投獻王府勢與畿甸之弊大抵相類請敕下凡皇莊及各皇親莊田處分既訖一併出榜頒示天下其有違例投獻奪至百頃以上者處以極刑則法重而民不敢犯恩溥而民得安生矣六年令各處板荒積荒拋荒田地不拘本府别府軍民匠竈儘力耕墾給與由帖永逺管業七年題准今後應賞地土隨品級定制凡逺遺莊田别其世之親疏量為裁革至于戚畹開墾置買不行報官納糧者照功臣律例一體追斷八年霍韜奉命修㑹典言自洪武迄𢎞治百四十年矣天下額田已減强半而湖廣河南廣東失額尤多非撥給於王府則欺𨼆於猾民廣東無藩府非欺𨼆即委棄於冦賊矣司國計者可不究心是時桂萼郭宏化唐龍簡霄先後疏請核實田畝而顧鼎臣請履畝丈量丈量之議由此起江西安福河南裕州首行之而法未詳具人多疑憚其後福建諸州縣為經緯二冊其法頗詳然率以地為主田多者猶得上下其手又令各撫按官查有荒廢寺觀無僧行住持及遺下田産無人管業者照彼中時價召人承買改名入冊辦納糧差又令陜西拋荒田土最多州縣分為三等第一等召募墾種量免稅三年第二等許諸人承種三年之後方納輕糧每石照例減納五斗第三等召民自種不徴稅糧拋荒不及三分有附近及本里本甲本户人丁堪以均派帶種者勸諭自相資借牛種及貧無力者官為借給責令開墾不必勘報又令西安等府田土果係拋荒無人承種者即召人耕種官給牛具種子不徴稅糧若有水崩沙厭不堪耕種者即與除豁九年查順天六府所屬通州大興等六十七州縣勳戚內臣寺觀莊田共四百一十九處計地四萬四千一百二十五頃四畝十一年令薊州永平沿邊關營拋荒山場地畝係有糧原為民業者附近軍餘承佃任納民糧其冊籍不載并原係附近官山官地撥給附近正軍耕種量收輕稅作為屯田餘地其建昌等營裁革鎮守守備內臣遺下田土房屋係占奪者給還原主當辦糧差係官山官地分給貧軍耕種量收稅價以充各邊賞勞修理公用十三年題准各處但有拋荒堪種之地聽招流移小民或附近軍民耕種照例免稅三年官給牛具種子不許科擾如地主見其開種成熟復業爭種者許赴官告明量撥三分之一給主二分仍聽開荒之人承種各照畝納糧十年之上方行均分敢有恃强奪占者官司問罪又裁汰陜西鎮守太監其養亷地一百五十四頃令原佃軍民承種附入實徴冊十四年以通州曬米厰地四頃召佃為修理公廨之用十五年以陜西中護衛外地九頃拋荒田二十五頃召佃以備軍儲二十一年以總兵官東紅花等莊田三頃革任太監所遺荒田二頃副總兵遊擊將軍各一頃皆軍餘開墾屯田聽軍人佃種至各邊將官能于邊外自開地者任其開墾耕種不在此例二十二年令陜西查勘朝邑縣地方潼關以西鳳翔以東黃河退灘堪以耕種地二百九十一頃八十三畝令居民照舊耕種收入實徴冊自本年為始每畝起科三升二十四年詔流民復業與牛種開墾閒田者給復十年二十九年令凡公主國公下莊田世逺者以十分為率內儘一處撥給三分其餘七分盡數追出還官徴銀解部以補宫莊備邊之需若爵級已革除補足宫莊額數外餘剩地畝照例徴銀解部濟邊或量留五分給與的親承繼人員管業以備護墳香火之用其餘五分還官寺觀太監下自買營造丘隴奏免糧差地不及三頃者容令照舊若至三頃之外量免其養馬均徭差役每畝督辦納子粒解部穆宗隆慶元年御史董堯封奏查出蘇松常鎮四府投詭田一百九十九萬五千四百七十畝花分田三百三十一萬五千五百六十畝因條上便宜事一議丈量二定糧冊三均糧役四明優免五平均徭役六裁供億七申法守八嚴責成户部覆丈量均賦私兑恐煩擾難行優免雖有定例但吳中起科甚重若止論糧石均為不均宜視田畝之數為差其餘悉如議報可二年題准以後奏請莊田乞欽定數目撥給其年逺勳戚行屯田御史自封爵之日為始傳派五世親服已盡者止留莊田百頃或支派已絶並爵級已革盡數追奪還官又題准元勳後裔傳派五世者原議百頃之外今再留一百頃如係勳戚相半者再留五十頃神宗萬厯二年召人墾種甘州荒地俟六年量徴四年詔鳳陽淮安力舉營田六年張居正以田賦失額小户多存虛糧致里甲賠纍從言官疏詔令二直隸十三布政司府州縣通行丈量限三年之內竣事居正用開方法以徑圍乘除畸零截補於是豪猾不得欺𨼆里甲免賠纍而小民無虛糧總計田七百一萬二千九百七十六頃視𢎞治時贏三百萬頃然居正尚綜核頗以溢額為功有司爭改小弓以求田多或掊克見田以充虗額北直隸湖廣大同宣府遂先後按溢額田增賦時詔江北諸府民年十五以上無田者官給牛一頭田五十畝開墾三年後起科又詔蘇州諸府開墾荒田七年核兩畿山東陜西勳戚田十一年議陜西延寧二鎮丈出荒田不在屯田舊額內者俱聽軍民隨便領種永不起科各邊但有屯餘荒地可墾者視此十九年詔定戚臣莊田二十六年正月大學士沈一貫奏山東一省六府地廣民稀宜令巡撫得自選亷幹官員將該省荒蕪地土逐一查核頃畝的數多方招致能耕之民如江西福建浙江山西及徽寧等處不問逺近凡願入籍者悉許報名擇便官為之正疆定界置署安插辨其衍汰原隰之宜以生五榖六畜之利其新籍之民則為之編户排年為里為甲循阡履畝勸耕勸織禁絶苛暴罷免追呼止奢僭以養淳朴之性興禮讓以厚親睦之俗以錢穀為市使姦民無所覬覦貪吏無所漁獵或有聽其寄學應舉量增解額以作興之聽其試武科充吏役納粟授官以榮進之毋籍為兵以駭其心毋重其課以竭其財有恩造于新附而無侵損於土著務令相安相信相生相養既有餘力又為之淘濬溝渠內接漕流以輕其車馬負擔之力使四方輻輳其間則商賈紛來魚鹽四出而其利益廣不數年可稱天府詔可二十八年詔查僧道廢絶山田南直隸寺院俱優免詔謂畿輔重地焚修香火概免清查欽定續通典卷三
