body:
  text: 州郡明雲南貴州雲南元置雲南等處行中書省治中慶路明洪武十五年二月癸丑平雲南置雲南都指揮使司乙卯置雲南等處承宣布政使司同治雲南府領府五十八州七十五縣五十五蠻部六後領府十九禦夷府二州四十禦夷州三縣三十宣慰司八宣撫司四安撫司五長官司三十三禦夷長官司二雲南府元中慶路明洪武十五年正月改為雲南府領州四縣九昆明倚富民宜良羅次舊屬安寧州𢎞治十三年八月改屬府晉寧州領縣二歸化呈貢安寧州領縣一祿豐昆陽州領縣二三泊易門嵩明州明洪武十五年三月改曰嵩盟成化十八年復故西有邵甸縣明洪武十五年三月屬州尋廢東南有楊林縣成化十七年十月廢曲靖府元曲靖路明洪武十五年三月為府二十七年四月升為軍民府領州四縣二南寧倚東南有元越州治明洪武二十八年正月廢亦佐元屬羅雄州明永樂初改屬府霑益州南有交水縣東南有羅山縣東北有石梁縣元皆屬州明洪武十五年皆廢陸涼州西有芳華縣南有河納縣元皆屬州明永樂初皆廢馬龍州西南有通泉縣元屬州明永樂初廢南有馬龍縣元屬州明洪武十五年廢羅平州舊羅雄州萬厯十五年四月更名尋甸府元仁德府明洪武十六年十月辛未升為仁德軍民府丁丑改尋甸軍民府成化十二年改為尋甸府北有為美縣西有歸厚縣元屬府明洪武十五年三月因之尋廢臨安府元臨安路明洪武十五年正月為府領州六縣五長官司九建水州倚元時府在州北明洪武中移府治此西有寧逺州萬厯十四年析建水州置四十八年廢石屏州元曰石坪明洪武十五年三月改曰石平後改今名阿迷州元阿寧萬户明洪武十五年三月置州寧州東有西沙縣元屬州後省明洪武十五年三月復置仍屬州尋復省通海元屬寧州明洪武十五年三月改屬府河西嶍峨元屬寧州明洪武十五年二月改屬府䝉自新平萬厯十九年置新化州本焉龍他郎甸長官司明洪武十七年四月置直𨽻布政司𢎞治八年改為新化州萬厯十九年來屬寧逺州元至治三年二月置直𨽻雲南行省明洪武十五年來屬宣德九年與安南納樓茶甸長官司本納樓千戶所明洪武十五年置屬和泥府十七年四月改置教化三部長官司元强現三部明洪武中改置王弄山長官司元王弄山大小二部明洪武中改置虧容甸長官司元鐡容甸屬元江路明洪武中改置來屬溪處甸長官司元溪處甸軍民副萬戶屬元江路明洪武中改置來屬思他甸長官司元和泥路明洪武十五年三月為府領納樓千户所伴溪七溪阿撒三蠻部十七年廢後改置左能寨長官司本思他甸寨明洪武中改置落恐甸長官司元伴溪落恐部軍民萬户明洪武中改置安南長官司元捨資千户後改安南道防送軍千户明洪武十五年三月仍曰捨資千戶所尋改置長官司正德六年省入䝉自縣天啓二年復置澄江府元澄江路明洪武十五年三月為府領州二縣三河陽倚江川陽宗新興州北有普舍縣南有研和縣元俱屬州明洪武十五年三月因之尋廢路南州東南有邑市縣舊屬州𢎞治三年九月廢廣西府元廣西路明洪武十五年三月為府領州三師宗州彌勒州維摩州元天德四年二月置廣南府元廣南西路宣撫司明洪武十五年十一月改置廣南府領州一富州元至元十三年置屬廣南西路明洪武十五年改屬府西南有安寧州東北有羅佐州俱元至元十三年置屬廣南西路明洪武十五年因之後俱廢元江軍民府元元江路明洪武十五年三月為府永樂初升軍民府領州二奉化州倚本因逺羅必甸長官司明洪武十八年四月置嘉靖中改州恭順州本他郎寨長官司嘉靖中改州楚雄府元威楚開南路明洪武十五年三月改為楚雄府領州二縣五楚雄倚元曰威楚明洪武十五年二月更名廣通元屬南安州明洪武十五年因之後改屬府定逺定邊元至元十二年置屬鎮南州明洪武中改屬􅑇嘉南安州鎮南州姚安軍民府元姚安路明洪武十五年三月為府二十七年四月升軍民府領州一縣一姚州倚元屬大理路明洪武十五年三月來屬大姚元屬姚州明洪武十五年三月因之後改屬府武定府元武定路明洪武十五年三月為府尋升軍民府萬厯中罷稱軍民領州二縣一和曲州倚舊城在南本州治隆慶三年十二月徙州為府附郭東有南甸縣元路治明洪武十五年三月改屬州成化二十年仍屬府正德元年十月省元謀祿勸州北有易籠縣元屬州明洪武十七年省東有石舊縣本屬州天啓元年七月省景東府元至順二年二月置明洪武十五年閏二月因之三月降為州屬楚雄府十七年正月仍升為府北有開南州元屬威楚開南路明洪武十五年三月屬楚雄府尋省鎮沅府本鎮沅州明洪武三十五年十二月置永樂四年四月升為府領長官司一祿谷寨長官司永樂十年四月以祿平寨置大理府元大理路明洪武十五年三月為府領州四縣三長官司一太和倚趙州明洪武十五年三月改名趙喜州尋復領縣一雲南元雲南州明洪武十五年三月改為縣屬府十七年改屬州鄧川州領縣一浪穹西南有鳯羽縣明洪武十五年三月置屬鄧川州尋省賓川州𢎞治六年四月析趙州及太和雲南二縣地置雲龍州元雲龍甸軍民府至元末置明洪武十七年改為州來屬正統間屬䝉化府後仍來屬十二關長官司元十二關防送千户所明洪武中改置鶴慶軍民府元鶴慶路明洪武十五年三月為府三十年十一月升軍民府東南有木按州又有副州元俱屬府明洪武十五年俱廢領州二劒川州元劒川縣明洪武十五年三月因之十七年正月升為州順州元屬麗江路明洪武十五年三月屬北勝府尋來屬麗江軍民府元麗江路宣撫司明洪武十五年三月為府三十年十一月升軍民府領州四通安州倚寶山州蘭州元屬麗江路明洪武十五年三月屬麗江府尋屬鶴慶府後仍來屬巨津州西北有臨江縣元屬州明洪武十五年三月因之𢎞治後廢永寧府元屬麗江永寧州路明洪武十五年三月屬北勝府十七年屬鶴慶府二十九年改屬瀾滄衛永樂四年四月升為府領長官司四刺次和長官司革甸長官司香羅甸長官司瓦魯之長官司四司俱永樂四年四月置北勝州元北勝府屬麗江路明洪武十五年三月屬布政司尋降為州屬鶴慶府二十九年改屬瀾滄衛正統七年九月直𨽻布政司𢎞治九年徙治瀾滄衛城瀾滄衛舊在州南本瀾滄衛軍民指揮使司明洪武二十八年九月置屬司𢎞治九年徙州來同治尋罷軍民司北為衛北有蒗蕖州元屬麗江路明洪武十五年三月屬北勝府尋屬鶴慶軍民府二十九年改屬瀾滄衛天啓中廢永昌軍民府元永昌府屬大理路明洪武十五年三月屬布政司十八年二月兼置金齒衛屬都司二十三年十二月省府升衛為金齒軍民指揮使司嘉靖元年十月罷軍民司止為衛復置永昌軍民府領州一縣二安撫司四長官司三保山倚本金齒千戶所明洪武中置永樂元年九月乂置永昌府守禦千户所俱屬金齒軍民司嘉靖三年三月改二所為保山縣北又有潞江州宣德八年六月置直𨽻布政司正統二年五月廢永平元屬永昌府明洪武二十三年屬金齒軍民司嘉靖元年仍屬府騰越州元騰衝府屬大理路明洪武十五年三月屬布政司尋廢永樂元年九月置騰衝守禦千戶所屬金齒軍民司宣德六年八月直𨽻都司正統十年三月升所為騰衝軍民指揮使司嘉靖三年十月置騰越州屬府十年十二月罷司為騰衝衛西南有騰衝土州宣德五年六月置屬金齒軍民司後直𨽻布政司正統三年五月仍屬金齒軍民司尋廢潞江安撫司元柔逺路明洪武十五年三月為府後廢屬麓川平𬗟司永樂元年正月析置潞江長官司直𨽻都司十六年六月升安撫司宣德元年六月改𨽻布政司正統三年六月屬金齒軍民司嘉靖元年十月屬府鎮道安撫司楊塘安撫司二司地雋屬西畨與麗江府接界俱永樂四年正月置屬金齒軍民司嘉靖元年屬府瓦甸安撫司本瓦甸長官司宣德二年置屬金齒軍民司九年二月直𨽻都司正統三年五月仍屬金齒軍民司五年十一月升為安撫司嘉靖元年屬府鳯溪長官司明洪武二十三年十一月置屬金齒軍民司嘉靖元年改屬府施甸長官司元石甸長官司明洪武十七年五月更名屬府二十三年屬金齒軍民司嘉靖元年仍屬府茶山長官司永樂五年析孟養地置屬金齒軍民司嘉靖初屬府蒙化府元䝉化州屬大理路明洪武十五年三月因之正統十三年六月升為府順寧府元泰定四年十一月置明洪武十五年三月庚戌因之己未降為州屬大理府十七年正月仍升為府南有寶通州又有慶甸縣元俱與府同置明洪武十五年省領州一雲州本大侯長官司永樂元年正月析麓川平𬗟地置直𨽻都司宣德三年五月升為大侯禦夷州直𨽻布政司萬厯二十五年更名來屬領長官司一孟𬗟長官司宣德五年六月以景東府之孟𬗟孟梳地置屬景東府後直𨽻布政司萬厯二十五年來屬車里軍民宣慰使司元車里路泰定二年七月置即大徹里明洪武十五年閏二月為軍民府十九年十一月改軍民宣慰使司永樂中廢宣德六年復置東有元耿凁路至正七年正月置又有耿當孟弄二州亦元末置明洪武十五年俱省入車里𬗟甸軍民宣慰使司本𬗟中宣慰司明洪武二十七年六月置尋廢永樂元年十月復置更名元後至元四年十二月置邦牙宣慰司於蒲甘𬗟王城至正二年六月廢至元二十六年置太公路於太公城明洪武十五年三月為府後廢領長官司一東倘長官司宣德八年九月置木邦軍民宣慰使司元木邦路至順元年三月置明洪武十五年三月為府後廢三十五年十二月復置永樂二年六月改軍民宣慰使司北有䝉憐路䝉來路俱元置明洪武十五年三月俱為府後俱廢八百大甸軍民宣慰使司元入百等處宣慰使司明洪武二十四年六月改置又有䝉慶宣慰司元泰定四年置至正二年四月罷明洪武十五年三月復置府後廢又有孟絹路元元統元年置屬八百宣慰司明洪武十五年三月為府後廢又有木按孟傑二路俱元置明洪武十五年三月俱為府後俱廢孟養軍民宣慰使司元雲逺路明洪武十五年三月為府十七年改為孟養府後廢三十五年十二月復置永樂二年六月改軍民宣慰使司正統十三年廢萬厯十三年改置長官司老撾軍民宣慰使司永樂二年四月置南甸宣撫司元至元二十六年置南甸路明洪武十五年三月為府後廢屬騰衝守禦千戶所永樂十二年正月置州直𨽻布政司正統三年五月改屬金齒軍民指揮使司九年六月升宣撫司仍直𨽻布政司千崖宣撫司元鎮西路明洪武十五年三月為府後廢屬麓川平𬗟司永樂元年正月析置千崖長官司直𨽻都司後屬金齒軍民指揮使司宣德五年六月復屬都司正統三年五月復屬金齒軍民指揮使司九年六月升宣撫司直𨽻布政司西北有南睒元置明洪武中廢隴州宣撫司本麓川平緬軍民宣慰使司正統六年廢九年九月改置治隴把元平𬗟路在隴把東北明洪武十五年閏三月置平𬗟宣慰使司三月又改路為府未幾府廢十七年八月丙子升司為平𬗟軍民宣慰使司甲午改麓川平𬗟軍民宣慰使司省麓川路入焉元麓川路在隴把南明洪武十五年三月為府未幾府廢十七年八月為麓川平𬗟軍民宣慰司治所正統中司廢曰平麓城亦曰孟卯城萬厯十二年置宣撫同知於此乂西南有通西軍民總管府元至元二十六年置明洪武十五年三月為府後廢孟定禦夷府元孟定路至元三十一年四月置明洪武十五年三月為府東南有謀粘