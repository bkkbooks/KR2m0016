body:
  text: 食貨賦稅下遼金元明遼賦稅之制自太祖任韓延徽始制國用太宗籍五京户丁以定賦稅聖宗太平七年詔諸在屯者力耕公田不輸稅賦此公田制也十五年募民耕灤河曠地十年始納租此在官間田制也又詔山前後未納稅户並於密雲燕樂兩縣占田置業入稅此私田制也各部大臣從上征伐俘掠人户自置郛郭為頭下軍州凡市井之賦即歸之此頭下軍州賦制也其餘若南京嵗納三司鹽鐵錢折絹大同嵗納三司稅錢折粟又開逺軍民嵗輸稅向例斗粟折五錢耶律穆濟守郡時表請折六錢各隨地異宜當時稱為利民之政焉金制官地輸租私田輸稅其輸租之制不傳大率分田之等為九而差次之夏稅畝取三合秋稅畝取五升又納秸一束每束計十有五斤夏稅六月至八月止秋稅十月至十二月止分為初中末三限州三百里以外者紓其期一月屯田户佃官地者有司移明安穆昆督之章宗泰和五年改秋稅以十一月為初限中都西京北京上京遼東臨潢陜西地寒稼穡遲熟夏稅以七月為初限凡輸送粟麥在三百里外者石減五升以上每三百里遞減五升粟折秸百稱者百里內減三稱二百里減五稱不及三百里減八稱三百里及輸本色稿草各減十稱計民田園邸舍車乘牧畜種植之資藏鏹之數徴錢有差謂之物力錢遇差科必按版籍先及富者勢均則以丁多寡定甲乙其或不可分析者率以次户濟之宣宗興定四年鎮南軍節度使溫特赫思敬上書言今民輸稅其法大抵有三上户輸逺倉中户次之下户最近然近者不下百里逺者數百里計道路之費倍於所輸而雨雪有稽違之責遇賊有死傷之患不若止輸本郡令有司檢算倉之所積稱屯兵之數使就食之若有不足則增斂於民民計所斂不及道里之費將欣然從之矣此外又有牛頭稅即牛具稅明安穆昆部女直户輸之稅也其制每耒牛三頭為一具限民口二十五受田四頃四畝有竒嵗輸粟不過一石官民占田無過四十具太宗天會三年以嵗稔官無儲積無以備飢饉詔令一耒賦粟一石每穆昆别為一廪貯之四年詔內地諸路每牛一具賦粟五斗為定制世宗大定元年詔諸明安不經遷移者徴牛具稅粟即命穆昆監其倉有虧損則坐之二十三年以版籍嵗久貧富不同明安穆昆又皆年少不練時事一旦軍興按籍徴之必有不均之患乃令驗實推排閲其户口畜産之數尚書省詳定入奏元之取民大率以唐為法其取於內郡者曰丁稅曰地稅此倣唐之租庸調也取於江南者曰秋稅曰夏稅此倣唐之兩稅也丁稅地稅之法自太宗始行之初每户科粟二石後又以兵食不足增為四石至丙申年乃定科徴之法令諸路驗民户成丁之數每丁嵗科粟一石驅丁五升新户半之老幼不與其間有耕種者或驗其牛具之數或驗其土地之等徴焉丁稅少而地稅多者納地租地稅少而丁稅多者納丁稅工匠僧道驗地官吏商賈驗丁虛配不實者罪之仍命嵗書其數於册由課稅所申省以聞世祖申明舊制於是輸納之期收受之式關防之禁會計之法莫不備焉中統二年命逺倉之糧止於沿河近倉輸納每石帶收腳價中統鈔三錢或民户赴河倉輸納者每石折輸輕賫中統鈔七錢五年詔僧道儒人等凡種田者白地每畝輸稅三升水地每畝五升軍站户除地四頃免稅餘悉徵之至元三年詔窵户種田他所者其丁稅於附籍之郡驗丁其地稅於種田之所驗地漫散之户逃於河南等路者依見居民户細稅八年又定西夏中興路西寧州烏梁海三處之稅其數與前僧道同十七年遂命户部大定諸例全科户丁稅每丁粟三石驅丁粟一石每畝粟三升減半科户丁稅每丁粟一石新收交參户第一年五斗第三年一石二斗五升第四年一石五斗第五年一石七斗五升第六年入丁稅協濟户丁稅每丁粟一石地稅每畝粟三升隨路近倉輸粟如在逺倉每粟一石折納輕賫鈔二兩富户輸逺倉下户輸近倉每石帶納鼠耗三升分例四升凡糧到倉以時收受其輸納之期分為三限初限十月中限十一月末限十二月成宗大德六年申明稅糧條例復定上都河間輸納之期上都初限以次年五月中限六月末限七月河間初限九月中限十月末限十一月至於秋稅夏稅之法惟行於江南初世祖平宋時除江東浙西其餘獨徵秋稅而已至元十九年用姚元之請命江南稅糧依宋舊例折輸綿絹雜物尋又令輸米三之一餘並折鈔以七百萬為率嵗得羡鈔十四萬錠其輸米者止用宋斗斛蓋以宋一石當七斗故也二十八年又命江淮寺觀田宋時舊有者免租續置者輸稅至成宗元貞二年始定徵江南夏稅之制於是秋稅止命輸租夏稅則輸木棉布絹絲綿等物其所輸視糧之數每糧一石者輸鈔自三貫以至一貫五百文有差輸三貫者若江浙省婺州等路江南省龍興等路輸一貫者若福建省泉州等五路輸一貫五百文者若江浙省紹興路福建省漳州等五路皆因其地利之宜人民之衆酌其中數而取之其折輸之物各隨時估之髙下以為值獨湖廣則異於是初阿爾哈雅克湖廣時罷宋夏稅依中原例改科門攤每户一貫二錢視夏稅約增鈔五萬餘錠大德三年改門攤為夏稅而併徵之每石計三貫四錢有贏視江浙江西為差重云其在官之田許民佃種若江北兩淮等處荒間之地令佃種至第三年輸租後又以地廣人稀更寬令第四年始輸凡係官田則夏稅皆不科泰定之初又有所謂助役糧者其法命江南民户有田一頃以上者於所輸稅外每頃量出助役之費具書於册里正以次掌之嵗收其入凡寺觀田除宋舊額其餘亦驗其多寡令出助役焉天下嵗入糧數腹裏二百二十七萬一千四百四十九石江浙省四百四十九萬四千七百八十三石江西省一百十五萬七千四百四十八石湖廣省八十四萬三千七百八十七石遼陽省七萬二千六十六石河南省二百五十九萬一千二百六十九石四川省十一萬六千五百七十四石陜西省二十二萬九千二十三石甘肅省六萬五百八十六石雲南省二十七萬七千七百十九石其江浙等三省夏稅以天厯元年鈔數計之江浙省五萬七千八百三十錠四十貫江西省五萬二千八百九十五錠十一貫湖廣省一萬九千三百七十八錠二貫此外復有科差之法其名有二曰絲料曰包銀各驗其户之上下而科焉絲料之法太宗丙申年始行之每二户出絲一斤并隨路絲線顔色輸於官包銀之法憲宗乙卯年始定每包銀四兩一半輸銀其半折收絲絹等物至世祖中統元年立十路宣撫司定户籍科差條例然户各不一有元管户交參户漏籍户協濟户於諸户之中又有絲銀全科户減半科户止納絲户止納鈔户外又有攤絲户有儲伊蘇岱爾所管納絲户復業户并漸成丁户户既不等數亦不同至絲料包銀之外又有俸鈔之科其法亦以户之髙下為等全科户輸一兩減半户輸五錢於是以合科之數作門攤分為三限輸納如有被災之地聽輸他物折焉其物各以時估為則凡儒士及軍站僧道等户皆不與二年復定科差之期絲料限八月包銀初限八月中限十月末限十二月三年又命絲料限無過七月包銀限無過九月及平江南其制益廣至元二十八年以至元新格定科差法諸差稅皆司縣正官監視人吏置局均科諸夫役皆先富強後貧弱其貧富等者先丁多之户後丁少之户成宗大德六年又定絲料限八月包銀俸鈔限九月布限十月大率因世祖之舊而增損之云科差總數以中統四年計之絲七十一萬二千一百七十一斤鈔五萬六千一百五十八錠其後逐年遞增逮及至元四年絲一百九萬六千四百八十九斤鈔七萬八千一百二十六錠天厯元年包銀差發總數凡鈔九百八十九錠􅖝一百十三萬三千一百十九索絲一百九萬八千八百四十三斤絹三十五萬五百三十匹綿七萬二千十五斤布二十五萬一千二百二十三匹明制賦役之法一以黃册為凖册有丁有田丁有役田有租曰夏稅曰秋糧凡二等夏稅無過八月秋糧無過明年二月丁曰成丁曰未成丁凡二等役曰里甲曰均徭曰雜泛凡三等以户計曰甲役以丁計曰徭役上命非時曰雜役皆有力役有雇役兩稅洪武時夏稅曰米麥曰錢鈔曰絹秋糧曰米曰錢鈔曰絹𢎞治時會計之數夏稅曰大小米麥曰麥荍曰絲綿并荒絲曰稅絲曰絲綿折絹曰稅絲折絹曰本色絲曰農桑絲折絹曰農桑零絲曰人丁絲折絹曰改科絹曰棉花折布曰苧布曰土苧曰紅花曰麻布曰鈔曰租鈔曰稅鈔曰原額小絹曰幣帛絹曰本色絹曰絹曰折色絲秋糧曰米曰租鈔曰賃鈔曰山租鈔曰租絲曰租絹曰租粗麻布曰課程棉布曰租苧布曰牛租米穀曰地畝棉花絨曰棗子易米曰棗株課米曰課程苧麻折米曰棉布曰魚課米曰改科絲折米萬厯時小有所增損大略以米麥為主而絲絹與鈔次之夏稅之米唯江西湖廣廣東廣西麥荍唯貴州農桑絲遍天下唯不及川廣雲貴餘各視其地産此明代賦役制之大概也太祖初立國即下令凡民田五畝至十畝者裁桑麻木棉各半畝十畝以上倍之麻畝徵八兩木棉畝四兩裁桑以四年起科不種桑出絹一匹不種麻及木棉出麻布棉布各一匹此農桑絲絹所由起也洪武九年天下稅糧令民以銀鈔錢絹代輸銀一兩錢千文鈔十貫皆折輸米一石小麥則減直十之二棉貯一匹折米六斗麥七斗麻布一匹折米四斗麥五升絲絹等各以輕重為損益願輸米者聽十七年雲南以金銀貝布漆丹砂水銀代秋租於是謂米麥為本色而諸折納稅糧者謂之折色越二年又令户部侍郎楊靖會計天下倉儲存糧二年外並收折色唯以北方諸布政司需糧餉邊仍使輸粟三十年諭户部自二十八年以前天下逋租咸許任土所産折收米絹棉花及金銀等物著為令於是户部定鈔一錠折米一石金一兩十石銀一兩二石絹一匹石有二斗棉布一匹一石苧布一匹七斗棉花一斤二斗帝曰折收逋賦蓋欲蘇民困也今賦重若此將愈困民金銀每兩折米加一倍鈔止二貫五百文折一石餘從所議成祖永樂中既得交趾以絹漆蘇木翠羽紙扇沉速安息諸香代租賦廣東瓊州黎人肇慶徭人內附輸賦比內地天下本色稅糧三千餘萬石絲鈔等二千餘萬計是時米粟自輸京師數百萬石外府縣倉廪蓄積豐滿嵗貢銀三十萬兩有竒而民間交易用銀仍有厲禁英宗正統元年副都御史周銓言行在各官俸支米南京道逺用度甚多輒以米易貨貴買賤售十不及一朝廷虗糜廪祿各官不得實惠請於南畿浙江江西湖廣不通舟楫地折收布絹白金解京充俸江西巡撫趙新亦以為言户部尚書黃福復條以請帝以問行在户部尚書胡濙濙對以太祖嘗折納稅糧於陜西浙江民以為便遂倣其制米麥一石折銀二錢五分南畿浙江江南湖廣福建廣東廣西米麥共四百餘萬石折銀百萬餘兩輸內承運庫謂之金花銀其後概行於天下自起運兑軍外糧四石收銀一兩解京以為永例諸方賦稅折銀而倉廪之積漸少矣明初官民田賦凡官田畝稅五升三合民田減二升重租田八升五合五勺沒官田一斗二升唯蘇松嘉湖籍諸豪族及富民田以為官田按私租簿為稅額而司農卿楊憲又以浙西地膏腴增其賦畝加二倍故浙西官民田視他方倍蓰畝稅有二三石者洪武十三年命户部裁其額畝科七斗五升至四斗四升者減十之二四斗三升至三斗六升者俱止徴三斗五升其以下者仍舊惠帝建文二年詔曰江浙賦獨重而蘇松凖私租起科特以懲一時頑民豈可為定則以重困一方宜悉與減免畝不得過一斗成祖革建文政浙西之賦復重宣宗即位廣西布政使周幹巡視蘇常嘉湖諸府民多逃亡詢之耆老皆云重賦所致如吳江崑山民田租舊畝五升小民佃種富民田畝輸私租一石復困事故輸官輒如私租例盡取之十分取八民猶不堪况盡取乎請將沒官田及公侯還官田租俱視彼處官田起科畝稅六斗宣德四年令江南府縣官督察各屬糧屯按明洪武四年令天下有司度民田以萬石為凖設糧長一名専督其鄉賦稅凡有倚恃富豪交結有司承攬軍需買辦移用米糧假以風濤漂流為詞重復追徵者重加究治又令推升郎中員外及御史長史等六員為各部侍郎分往浙江江南湖廣河南山東山西等布政司并南北直𨽻府州縣督收稅糧五年二月詔舊額官田租畝一斗至四斗者各減十之二四斗一升至一石以上者減十之三著為令於是江南巡撫周忱等曲計減蘇糧七十餘萬他府以為差正統元年令蘇松浙江等處官田凖民田起科糧四斗一升至一石以上者減作三斗二斗一升以上至四斗者減作二斗一斗一升至二斗者減作一斗景帝景泰十三年奏準兩京農桑夏稅絹匹不及五十匹以上者俱送該府掌印官看驗又令各司府州縣夏稅農桑絹匹務織造緊密厚重雙經雙緯淨織鈔尺長三丈二尺濶二尺每五十匹作一束印封糧長大户人等赴部交納天順時令鎮守浙江尚書孫原貞等定杭嘉湖則例以起科重者徵米宜少起科輕者徵米宜多乃定官田畝科一石以下民田七斗以下者每石嵗徵平米一石三斗民田四斗以下者每石嵗徵平米一石五斗官田二斗以下民田二斗七升以下者每石嵗徴平米一石七斗官田八升以下民田七升以下者每石嵗徵平米二石二斗凡重者輕之輕者重之欲使科則適均而畝科一石之稅未嘗減云世宗嘉靖二年御史黎貫言國初夏秋二稅麥四百七十餘萬石今少九萬米二千四百七十餘萬石今少二百五十餘萬而宗室之蕃官吏之冗內官之衆軍士之增悉取給其中賦稅則日損支用則日加請核祖宗賦額及經費多寡之數一一區畫於是户部議令天下官吏考滿遷秩必嚴核任內租稅徴解足數方許給由交代仍乞朝廷躬行節儉帝納之既而諭德顧鼎臣條上錢糧積弊四事一曰察理田糧舊額請責州縣官於農隙時令里甲等倣洪武正統間魚鱗風旗之式編造圖册細列原額田糧字墟則號條段坍荒成熟步口之數官為覆勘分别界址履畝檢踏丈量具開墾改正豁除之數刋刻成書收貯官庫給散里中永為稽考一曰催徵嵗辦錢糧成𢎞以前里甲催徵糧户上納糧長收斛州縣監收糧長不敢多收斛面糧户不敢雜以水榖粳粃兌糧官軍不敢阻難多索近者有司不復比較經催里甲負糧人户但立限追比糧長令下鄉追徵豪強者則大斛倍收多方索取孱弱者為勢豪所凌不免變産補納至或舊役侵欠責償新簽且往時每區糧長不過正副二名近多至十人以上其實收掌管糧之數少而科斂打點使用年例之數多州縣一年之間輒破中人百家之産害莫大焉宜令户部議定事例轉行所司審編糧長務遵舊規又其二則遣官綜理及復預備倉法也時議雖不行切中時弊至十八年鼎臣為大學士復言蘇松常鎮嘉湖杭七府供輸甲天下而里胥豪右蠧弊特甚宜將欺隱及坍荒田土一一檢核改正於是應天巡撫歐陽鐸檢荒田二千餘頃計租十一萬石有竒以所欺隱田糧六萬餘石補之餘請豁免時嘉興知府趙瀛建議田不分官民稅不分等則一切以三斗起徵鐸乃與蘇州知府王儀盡括官民田裒益之履畝清丈定為等則所造經賦册以八事定稅糧曰元額稽始曰事故除虛曰分項别異曰歸總正實曰坐派起運曰運餘撥存曰存餘考積曰徵一定額又以八事考里甲曰丁田曰慶賀曰祭祀曰鄉飲曰科賀曰恤政曰公費曰備用以三事定均徭曰銀差曰力差曰馬差著為例徴一者總徴銀米之凡而計畝均輸之其科則最重與最輕者稍以耗損益推移重者不能盡損唯遞減耗米派輕賫折除之隂豫以輕輕者不能加益為徵本色遞增耗米加乘之隂豫以重時豪右多梗其議鼎臣獨以為善顧其時上不能損賦額長民者私以已意變通田是官田不至偏重而民田之賦愈加矣時又有綱銀一串鈴諸法綱銀者舉民間應役嵗用丁四糧六總徵之易知而不繁猶網之有綱也一串鈴則課收分解法也自是民間輸納止收本色及折色銀矣穆宗隆慶元年十月巡按御史董堯封奏查出蘇松常鎮四府投詭田一百九十九萬五千四百七十畝花分田三百三十一萬五千五百六十畝因條上便宜事一議丈量二定糧册三均糧役四明優免五平均徭六裁供億七申法守八嚴責成户部覆丈量均賦私兌恐煩擾難行優免雖有定例但吳中起科甚重若止論糧石似為不均宜視田畝之數為差其餘悉如議報可户部又覆應天撫臣林潤奏復糧額議改折二事謂各省糧額俱以夏稅秋糧馬草為正賦差徭編增為雜派唯是蘇松諸郡不分正雜而混徵之名曰平米其中如馬役料價義役原非户部之加增如輕賫腳米户口鹽鈔亦非額糧之正數雜派漸多常賦遂纍誠有如潤所言者宜令逐項清查舊額所徴之數通行造册送部以慿裁減至於兩京各衙門俸銀改折之議則當斟酌輕重事難盡從蓋南京水陸四道米榖饒裕便於改折若一概施之北地亦或未便請將南京各衙門官吏人等月糧及嘉靖四十年以前積欠京儲盡行改折每石七錢在北者量折十分之二每石一兩米貴仍復本色從之四年巡撫保定朱大器條陳田賦五弊言祖宗時糧有定額當全徴也近年務為姑息遂謂完及八分者官得轉遷是即無災祲輒自蠲二分矣即二分之數而類計之一郡千計十郡萬計積而上之可知也弊一糧有定數當完解也近年創為截解之法官吏藉已完者以邀虛聲姦民視後納者以為得計所解者少所負者多兼以糧長之侵欺吏胥之漁獵其弊不可勝窮弊二國家存留糧係宗藩所在則抵補祿米無宗藩則數多餘羡今之官府率以不急視之勾管無専官嵗會無定法秖以為姦民之利而已弊三官必任事而後食祿軍必在伍而後支餉此定制也今官有遷代軍有逃亡而俸廪未聞扣減則必有侵冒者矣弊四屯田在邊鄙則多拋荒在腹裏則多欺隱地與糧俱失舊額久矣議者不察乃為兑支之説夫官為收支其權猶在上也若聽其私兑則地之埋沒數之虛報者曷從稽考弊五以上五弊皆今日所當釐正者部覆詔如議六年南京河南道御史陳堂奏言國制十年大造黃册凡户口田賦事役新舊登耗之數無不備載所以重國本而存故實也今沿襲弊套取應虛文姦吏得以那移豪強因之影射其弊不可勝窮蓋有司徴錢錢編徭役者為一册名曰白册而此解後湖之黃册又一册也有司但以白册為重其於黃册唯付之里胥任其增減凡錢糧之完欠差役之重輕户口之消長名實相懸曾不得其倣佛即解至後湖而清查者以為不謬於舊册斯已矣竊謂欲理圖籍必専責成必嚴綜核夫書算豪猾類非守令之法所能制也頃蘇松常鎮添設督糧通政一員請賜之敕責令兼理黃册事務凡人丁事産悉照白册攢造其欺隱脫漏者如例問遣駁回者依限完報田至十萬畝以上者倣古限田之法量為裁抑如勢要阻撓有司阿縱聽撫按官參奏庶册籍清而賦役可均部覆詔如議然自嘉靖以後國用不足屢行加派後乃行一條鞭法一條鞭法者總括一州縣之賦役量地計丁丁糧畢輸於官一嵗之役官為僉募力差則計其工食之用量為增減銀差則計其交納之用加以增耗凡額辦派辦京庫嵗需與存留供億諸用度以及土貢方物悉併為一條皆計畝徴銀折辦於官故謂之一條鞭立法頗為簡便其天下每年常貢按明初有土貢方物中葉以後悉計畝徵銀折辦於官其所貢者唯茶藥野味及南京起運雜物而已南直𨽻宜興縣貢茶一百斤廬州府六安州貢茶三百斤廣德州貢茶七十五斤建平縣貢茶二十五斤浙江湖州府長興縣貢茶三十五斤紹興府嵊縣貢茶八斤會稽縣貢茶三十二斤溫州府永嘉縣貢茶一十斤樂清縣貢茶一十斤杭州府臨安縣貢茶二十斤富陽縣貢茶二十斤寧波府慈溪縣貢茶二百六十斤處州府麗水縣貢茶二十斤金華縣貢茶二十二斤衢州府龍逰等縣貢茶共二十斤台州府臨海等縣貢茶一十五斤嚴州府建德縣貢茶五斤淳安縣貢茶五斤遂安縣貢茶三斤夀昌縣貢茶三斤桐廬縣貢茶二斤分水縣貢茶一斤江西南昌府貢茶七十五斤南康府貢茶二十五斤贑州府貢茶一十一斤袁州府貢茶一十八斤臨江府貢茶四十七斤九江府貢茶一百二十斤瑞州府貢茶三十斤建昌府貢茶二十三斤撫州府貢茶二十四斤吉安府貢茶一十八斤廣信府貢茶二十二斤饒州府貢茶二十七斤南安府南康縣貢茶一十斤湖廣武昌府貢茶六十斤嶽州府湘隂縣貢茶六十斤寶慶府邵陽縣貢茶二十斤武岡州貢茶二十四斤新化縣貢茶十八斤長沙府安化縣貢茶二十二斤寧鄉縣貢茶二十斤益陽縣貢茶二十斤福建建寧府建安縣貢茶一千三百五十四斤內探春二十一斤先春六百四十三斤次春二百六十二斤紫笋二百二十七斤薦新二百一斤崇安縣貢茶九百九十一斤內探春三十三斤先春三百八十斤次春一百五十斤薦新四百二十八斤又寧國府宣城縣貢木瓜三千三百枚廣西思明府貢消毒藥五百三十四味四川成都府貢藥材七味又南京每年起運各物司禮監制帛一起筆料一起鮮梅四十扛或三十五扛枇杷四十扛或三十五扛楊梅四十扛或三十五扛尚膳監笋四十五扛鰣魚二起各四十四扛守備處鮮橄欖等五十五扛鮮茶十二扛木樨十二扛石榴柿子四十五扛甘橘甘蔗五十扛尚膳監天鵝等二十六扛醃菜薹等一百三十二罈筍一百一十罈乾鰣魚等物一百二十罈紫蘇糕等物二百四十八罈木樨花煎等物一百五罈鷀鳩等物十五扛司苑局荸薺七十扛苗薑一百擔薑種芋頭等物八十扛十樣果一百四十扛魚藕六十五扛內府供用庫香稻五十扛苗薑等物一百五十五扛十樣果一百一十五扛御馬監苜蓿種四十扛又各直省辦貢野味一萬四千五百一十四隻活鹿二百六十七隻活天鵝三百二十隻雜皮二十四萬七百六十一張翎毛二千二百七十六萬六千五百五十根欽定續通典卷九
