front:
  text: 欽定四庫全書史部十三欽定續通典總目政書類一通制之屬
  hash: sha256:4041fdc850f2754c00941a4463a9111eef07fe08779a6be235a46f0cd2e5c9bc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0016_WYG_000-1a, image: WYG0639/WYG0639-0001a.png}
body:
  text: 食貨凡一十六卷卷一至卷十六選舉凡六卷卷十七至卷二十二職官凡二十二卷卷二十三至卷四十四禮凡四十卷卷四十五至卷八十四樂凡七卷卷八十五至卷九十一兵凡十五卷卷九十二至卷一百六刑凡十四巻巻一百七至卷一百二十州郡凡二十六卷巻一百二十一至卷一百四十六邊防凡四卷卷一百四十七至卷一百五十止臣等謹案欽定續通典一百四十四卷乾隆三十二年奉勅撰杜佑通典終於天寶之末是書所續自唐肅宗至徳元年訖明崇禎末年凡選舉六卷職官二十二卷禮四十一卷樂七卷兵十二卷刑十六卷州郡十八卷邊防四卷食貨十八卷篇目一仍杜氏之舊惟杜氏以兵制附刑後今則兵刑各為一篇稍有不同考古者虞廷九官有士而無司馬凡蠻夷冦賊一隸於士魯語臧文仲稱大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑚笮薄刑用鞭朴則兵刑可以為一又左傳紀少昊以祝鳩為司馬爽鳩為司冦而秋官夏官周禮亦分兩職則可為二以事迹多寡卷帙繁簡酌為門目之分合其宏㫖仍不異也至於編纂之例唐代年祀稍逺舊典多亡五代及遼文獻靡徵史書太畧則旁搜圖籍以求詳明代見聞最近雜記實錄宋金及元著作本多遺編亦夥則嚴核異同以傳信總期於既精既博不濫不遺按宋史藝文志有宋白續通典二百卷今其書已亡陳振孫書錄解題載其咸平三年奉詔四年九月書成起唐至徳初迄周顯徳末又載王欽若言杜佑通典上下數千載為二百巻而其中四十巻為開元禮今之所載二百餘年亦如前書卷數時論非其重複兹編仰禀聖裁酌乎繁簡之中而九百七十八年内典制之源流政治之得失條分件繁綱舉目張誠所謂記事提要纂言鉤元較諸杜氏原書實有過之無不及宋白所續更區區不足道矣乾隆四十八年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀職名三通館總裁經筵日講起居注官大學士兼翰林院掌院學士臣嵇璜經筵講官吏部尚書臣劉墉經筵講官户部右侍郎臣曹文埴纂修兼總校官日講起居注官翰林院侍讀臣曹仁虎翰林院侍講臣莊承籛詹事府右春坊右贊善臣陳昌齊翰林院編修臣祝徳麟翰林院編修臣陳嗣龍翰林院編修臣黄瀛元翰林院檢討臣王坦修翰林院編修臣吴錫麒纂修兼校對官翰林院編修臣勵守謙翰林院編修臣秦泉翰林院編修臣吴典翰林院編修臣周厚轅翰林院編修臣李潢翰林院編修臣蘇青鰲翰林院編修臣余集翰林院編修革職留任臣汪鏞翰林院編修臣王春煦翰林院編修臣翟槐翰林院編修臣徐如㴻翰林院編修臣許烺翰林院編修臣何循翰林院編修臣周瓊翰林院編修臣蔡廷衡翰林院編修臣孫希旦翰林院修撰臣汪如洋翰林院編修臣程昌期武英殿纂修翰林院編修臣陸伯焜翰林院編修臣甘立猷翰林院編修臣劉汝謩翰林院檢討臣徐準翰林院編修臣陳萬青翰林院編修臣祝堃文淵閣檢閱内閣中書臣顧宗泰武英殿纂修翰林院庶吉士臣吴璥翰林院庶吉士臣陳廷慶翰林院庶吉士臣俞廷掄翰林院庶吉士臣歐陽健翰林院庶吉士臣萬承風武英殿纂修翰林院庶吉士臣曾燠翰林院庶吉士臣屈為鼎滿纂修官理藩院主事臣巴達爾呼候補筆帖式臣齡椿内閣中書臣嵩年候補筆帖式臣嵩年提調官内閣侍讀臣索寧安文淵閣校理武英殿提調翰林院檢討臣彭元珫收掌官刑部主事臣伊敏翰林院筆帖式臣庫䝉額凡例十四則一杜佑作通典之後至宋時嘗命宋白續修而其書已不傳今續通典循杜氏之例仍分為八門自各代正史之外如唐六典唐㑹要五代㑹要冊府元龜太平御覽山堂考索契丹國志大金國志元典章明集禮明㑹典諸書皆参酌引用以期無舛無漏一通典所纂止於天寳之末今續纂自唐肅宗至徳以後迄於明季按年編次至五代兵争典章未備諸門細目中有一代所全闕者則仍從畧若五代史止有司天職方二考餘俱闕如其有可考者仍從㑹要册府元龜等書搜輯補載一通典自紀事而外凡古今名賢議論有闗典要者靡不甄收今從其例凡唐宋元明人文集奏議及唐文粹文苑英華宋文鑑元文類厯代名臣奏議明經世編各書擇其立論精確可資考核者依類采入一杜氏首列食貨典以食乃民之司命也有土斯有財故列田制水利田屯田諸目有人斯有土故列鄉黨版籍戸口諸目而賦稅錢幣漕運鹽鐵各條又皆所以經理乎食者也顧厯代沿革不同杜典諸細目内如土斷之法起於晉南渡後算緡之法起於漢孝武時而後世史志巾罕有其目則在所從删至於茶課至唐末而始興則類載於雜稅之後互市至宋遼金元明而特重則類載於平準均輸之後其餘諸典之或併或増或刪各隨時代所有以期徴實一杜氏選舉典列於食貨之後職官之前所謂欲行富教在乎設職官欲設職官在乎得人才也後世選舉之法不一其途大約設科以取士分銓以授官率行之不變杜典於厯代制之下復綴雜議論三卷盖利弊得失之故必博采議論庶可見之施行今亦倣其例若宋司馬光歐陽修吕大臨真徳秀葉適之徒其所敷陳皆可為選舉之衡鏡元趙天麟之太平金鏡䇿明王鏊之制科議歸有光之三途並用議並能切中事宜今亦各摭其要叙次於篇一杜氏職官典其前巻先叙官制之要畧以下復分門臚列凡内外文武諸職各繫以沿革顧厯代設官之制其稱名各異職掌各殊五代史無職官志其時廢置不常自宰輔諸職而下無可紀述宋時官制已與唐異遼之官號多用國語金則有省有院有臺有寺監諸職元又從而損益之明革中書省復大加更定今仍以通典所列官名為目而以厯代或有或無或名雖異而實則同分叙於下庶幾有條不紊至於明代宦官執政國柄下移爵以公侯䕃及弟姪實為紊亂名器之尤考内監給事宫闈本不應與命官朝士相齒卷中宦官諸品秩謹遵聖諭從刪以彰建官之體且以示炯戒焉一杜氏禮典凡一百巻於諸典中為最詳以帝王制作之大莫過於禮也惟是風㑹遞遷代有所尚其因革損益亦惟禮為最繁杜氏原門曰吉禮曰嘉禮曰賔禮曰軍禮曰凶禮復采公私論述條次於各目之後以為禮議大約吉禮莫重於郊廟前代之主凡遇大祀多命有司攝行雖復考定儀文終無當於誠敬之本嘉禮莫重於冠婚朝賀至于冕服采章本屬不相沿襲如遼金元之輕改衣冠蔑棄舊制卒至國勢浸微聖訓昭彰垂戒萬禩其所闕正匪淺鮮他若賓禮本指天子諸侯之朝覲㑹同後世封建不行賔禮亦畧則取累朝接見蕃國之儀入之軍禮自田獵大射而外天子親征之典代不恒舉故杜氏於出師儀制之下惟載各代揚兵講武之事今仍以閲兵之禮叙於卷内凶禮自國恤而下杜氏雜載羣議最為詳贍今亦擇其有闗喪制者依類増入一杜氏樂典于厯代沿革之下復載十二律五聲八音名義諸目夫樂之聲容節奏固因代而殊若十二律五聲八音則亘古不易者也惟是聲音之道至為微𣺌非有夙解神悟者未易遽得中聲宋大儒若司馬光范鎮朱子蔡元定之流皆留心樂律明則韓邦竒黄佐輩並著有成書毎多託諸空言而手定一代之樂者或不盡洞悉律元之人今仍依杜典原目而節采諸家之説以備參考一杜氏以大刑用甲兵故列兵制于刑典之前其所分諸目由叙兵收衆以至氣候雜占多至一百四十餘條所謂兵以竒勝因機而𤼵凡有合於兵法者悉條之為目不厭其詳也今所叙列自唐季迄明凡英君良將戰陣之事蹟以及兵家之議論亦分類入之以合原書之體一杜氏刑典於刑制之外備列雜議及寛恕峻酷諸目其自序又謂善用則治不善用則亂不在乎寛與峻者盖世輕世重惟視乎人之所用也自唐而降刑制互有重輕説者謂宋自仁宗以後法制不立浸至柔弱又有過寛之弊明之律令頗為簡當而厰衛之興毒流海内則用法與用人兩失之今總其得失具著於篇一杜氏州郡典統以禹九州顧自州郡既興而禹蹟益難深考往往有一郡之地而錯出於兩州者且杜典既以禹九州為綱而於九州之外仍别為古南越郡府一巻己未免自亂其例宋遼金元迄明或分為路或分為道或分為省各成一代之制若仍分屬於九州未免紛紜割裂欲徇上古建州之名而轉失後世分土之實今稍變其例即以代為綱一杜氏邊防典分東西南北四裔顧邊外之地通阻不常或同是國而名已遞更或同是地而境已兼併故杜典所載諸部毎有見於前史而後史即無聞者遼金與元起自塞外東北諸部皆其境土而宋則白溝以北即屬邊防明則邊墻以外儼成敵國此又形勢之不同非可執一以論也今並依時代據實編載一續通典皆載唐以下五朝事蹟但史書所載或有是非失當若綱目續編之發明廣義於遼金元三朝時事其議論尤多私謬兹謹遵通鑑輯覽御批以昭定論一遼金元人名地名官名對音舊多譌誤兹悉遵欽定遼史索倫語解金史滿洲語解元史䝉古語解另為譯正
