body:
  text: 食貨田制中南宋遼金南宋高宗時中書舍人洪遵上言限田之制本於抑兼并恤編户寬力役可謂盡善然州縣猾吏因緣為姦至於墓地蔬圃例皆紐計中下之家惟恐頃畝溢格至有貨鬻墳山以避徭役者甚非立法利民之本意而奉行之官不能體國漫弗加省望聖慈命户部行下令品官之家止限見在田産山林園圃墳塋地段並行豁除仍以逐縣為率依新制各計頃畝不通一州之數庶幾田制稍寬不致重擾建炎元年命有司招誘農民歸業者振貸之蠲欠租免耕牛稅三年廣州州學教授林勳獻本政書十三篇大略謂國朝兵農之政大抵因唐末之故今農貧而多失職兵驕而不可用是以飢民竄卒類為盜賊宜倣古井田之制使民一夫占田五十畝其羡田之家毋得市田其無田與遊惰末作者皆使為農以耕田之羡雜紐錢榖以為什一之稅本朝二稅之數視唐增至七倍今本政之制每十六夫為一井提封百里為三千四百井率稅米五萬一千斛錢萬二千緡每井賦二兵一馬率為兵六千八百人馬三千四百匹歲取五之一以為五番之額以給征役無事則又分為四番以直官府以給守衛是民凡三十五年而役始一遍也悉上則歲食米萬九千餘斛錢三千六百餘緍無事則減四分之三皆以一同之租稅供之匹婦之貢絹三尺綿一兩百里之縣歲收絹四千餘匹綿二千四百斤非蠶鄉則布六尺麻二兩所收視綿絹倍之行之十年則民之口算官之酒酤與凡茶鹽香礬之𣙜皆可弛以豫民其説甚備又詔天下官田令民依鄉例自陳輸租紹興元年以軍興用度不足詔盡鬻諸路官田初閩以福建八郡之田分三等膏腴者給僧寺道院中下者給土著流寓自劉夔為福州始貿易取資逮張守帥閩上倚以拊循凋瘵存上等四十餘剎以待高僧餘悉令民請買歲入七八萬緡以助軍衣餘寬百姓雜科民皆便之是時帝懼職田不均詔諸路提刑司依法標撥官多田少即於鄰近州縣通融須管數足又詔將空間之田為他司官屬所占者撥以足之仍先自簿尉始其有無職田選人并親民小使民每員月支茶湯錢一十貫文內雖有職田每月不及十貫者皆與補足所以厚其養亷之利懼其病民則委通判縣令核實除其不可力耕之田損其已定過多之額若其頃畝多寡具有成式知藩府二十頃發運轉運使及知節鎮一十五頃知餘州及廣濟永康諸軍并路分鈐轄十頃發運轉運判官及通判藩府八頃知餘軍及發運司幹辦公事七頃通判餘州及軍滿萬户縣令六頃藩府判官録事參軍及同巡檢都大巡河提點馬鹽四頃節度掌書記及軍監都監三頃五十畝軍監判官及監堰滿五千户縣丞滿萬户簿尉并三頃餘州及不滿五千户縣丞二頃五十畝不滿五千户縣簿尉及監堰二頃三年户部言人户拋棄田産已詔三年外許人請射十年內雖已請射及撥充職田者並聽理認歸業官司占田不還許越訴如孤幼兒女及親屬依例合得財産之人委守令面問來歷取索契照勾勒耆保鄰佐照證得實即時給付或偽冒指占者論如律從之五年詔諸官田比鄰田租召人請買佃人願買者聽佃及三十年以上者減價十之二六年詔諸路總領諭民投買户絶入官及江漲河田海退泥田七年以賊徒田充官莊其沒官田依舊出買十二年左司員外郎李椿年言經界不正十害一侵耕失稅二推割不行三衙門及坊場户虛供抵當四鄉司走弄稅名五詭名寄産六兵火後稅籍不失爭訟日起七倚閣不實八州縣隱賦多公私俱困九豪猾户自陳詭籍不實十逃田稅偏重人無肯售經界正則害可轉為利且言平江歲入二十萬不及昔之一半望考按核實自平江始然後施之天下則經界正而仁政行矣上謂宰執曰椿年之論頗有條理秦檜曰其説簡易可行程克俊曰比年百姓避役止緣經界不正行之乃公私之利翌日甲午以椿年為兩浙運副專委措置經界椿年條畫來上請先往平江諸縣俟其就緒即往諸州要在均平為民除害更不增稅額如水鄉秋收後妄稱廢田者許人告陂塘塍埂之壞於水者官借錢以修之縣令丞之才短者聽易置圖寫墟畝選官按覆令各户各鄉造砧基簿仍示民以賞罰開諭禁防靡不周盡吏取財者論如法又詔人户田産多有契書而今來不上砧基簿者皆沒官用椿年請也十四年椿年權户部侍郎仍舊措置經界十二月椿年以母憂罷兩浙運副王鐵權户部侍郎措置經界十五年詔户部及所遣官委曲措置務使賦稅均而無擾又因興國軍守臣宋時言詔諸州縣違期歸業者其田佃及官賣者即以官田之所耕者給還十七年李椿年再權户部侍郎專一措置經界言已打量及用砧基簿計四十縣乞結絶其餘未打量及不曽用砧基簿止令給甲縣分欲展期一月許人户首實昨已起新稅依額理納俟打量寬剩畝角即行均減更不增添稅額仍令都內人各書實狀遇有兩爭即對換産稅詔可十九年冬十一月經界之事始畢初朝廷以淮東西京西湖北四路被邊姑仍其舊又漳汀泉三州未畢行二十年詔凡沒官田域空田户絶房廊及田并撥𨽻常平司轉運提刑茶鹽司沒入田亦如之又詔瓊州萬安昌化吉陽軍海外土産瘠薄已免經界又瀘南帥臣馮楫抗疏論不便於是瀘敘州長寧軍並免渠果州廣安軍既行亦復罷自餘諸路州縣皆次第有成是年詔敕令所刪定官鄭克行四川經界法克頗峻責州縣所謂有莊田者雖蔬果桑柘莫不有征而卭蜀民田至什稅其伍二十年詔兩淮沃壤宜榖置力田科募民就耕以廣官莊知資州楊師錫言有司奉行失當田畝不分腴瘠市居文尺隙田亦充稅産於是降詔曰椿年乞行經界去民十害今聞寖失本意凡便民者依已行害民者與追正二十六年王之望上書言蜀中經界利害甚悉明年以之望提點刑獄畢經界事三月户部言蜀地狹人夥而京西淮南膏腴官田尚多許人承佃官貸牛種時通判安豐軍王時升言淮南土皆膏腴然地未盡闢民不加多者緣豪強虛占良田而無遍耕之力流民襁員而至而無開耕之地凡荒間田許人剗佃户部議期以二年未墾者即如所請京西路如之湯鵬舉言離軍添差之人授以江淮湖南方田人一頃為世業二十一年以大理寺主簿丁仲京言凡學田為勢家侵佃者命提學官覺察又命撥僧寺常住絶産以贍學户部議併撥無敕額庵院田詔可二十六年以諸路賣官田錢七分上供三分充常平司糴本初盡鬻官田議者恐佃人失業未賣者失租侍御史葉義問言今盡鬻其田立為正稅田既歸民稅又歸官不獨絶欺隱之弊又可均力役之法浙中刑獄使者邵大受亦乞承買官田者免物力二年至十年於是詔所在常平役官户絶田已佃未佃添租未添租並拘賣二十八年詔户部員外郎莫濛同浙西江東淮南漕臣視諸路河田蘆場先是言者謂江淮間河田蘆場為人冒占歲失官課至多故有是命已而言者極言纍民未便詔止為勢家詭名冒占其三等以下户勿例根括詔浙西江東河田蘆場官户十頃民户二十頃以上並增租隸提領官田所尋罷之乾道間復梁俊彥等措置括得河田蘆場二百八十餘萬畝孝宗隆興元年詔凡百姓逃棄田宅出二十年無人歸認者依户絶法乾道四年知鄂州李椿奏江南荒田甚多請佃者開墾未幾便征稅度田追呼不任其擾旋即逃去今欲召人請射免稅三年後為世業光宗時知漳州朱熹條奏經界狀略曰臣自早年即為縣吏實在泉漳兩郡之間中歲為農又得備諳田畝之事竊見經界一事最為民間莫大之利其紹興年中已推行處至今圖籍尚存獨泉漳汀州不曽推行細民業去産存苦不勝言而州縣坐失常賦勢將何底然而豪家大姓猾吏姦民皆所不便向議輒為浮言所沮甚至以汀州盜賊藉口不知往歲汀州纍次盜賊正以不曽經界貧民失業更被追擾無所告訴是以輕於從亂今者議臣之請且欲先行泉漳次及臨汀既免一州盜賊過計之憂又慰兩郡貧民延頸之望誠不易之良策也一推行經界在於推擇官吏乞朝廷先令監司一員專主其事使擇一郡守察其屬縣或不能則擇於其佐又不能則擇於他官一州不足則取於一路見任不足則取於得替待缺之中果得其人則事克濟而民無擾矣一經界之法打量一事最費功力而紐折算計之法又人所難曉者紹興中户部行下打量攢算格式印本乞特詔户部根檢謄録點對行事一圖帳之法始於一保大則山川道路小則人户田宅必要東西相連南北相照以至頃畝之濶狹水土之高低亦須當衆共定各得其實其十保合為一都則其圖帳但取山水之連接與逐保之大界總數而已不必更開人户田宅也其諸都合為一縣則其圖帳亦如保之於都而已不必更為諸保之别也如此則其圖帳之費亦當少減若朝廷矜三郡之民不忍使更煩費則莫若令役户只作草圖草帳而官為買紙雇工以造正圖正帳費就兩司上供錢內截撥應副也如此則大利可成而民亦不至於甚病矣龍巖縣劉璧申經界之行惟里之正長其役最為煩重疆理畎畝分别土色均攤稅賦其在當時動經歲役出入阡陌妨廢家務固已不勝其勞一有廣狹失度肥磽失宜輕重失當則詞訴並興而督責又隨至矣然有産則有役適當重難使出心力以應役使亦無可奈何彼皆鄉民安知經界書算則必召募書人以代此役而書人必嘗為胥吏之桀點者莫不乘時要求高價執役之人急於期限不免隨索則酬而又簿書圖帳所用紙札亦復不資竊謂經界之在今日不可不行行之亦不患無成若里正里長書人紙札之費有以處之則可舉行若坐視其殫力耗財如曩日恐非仁政之意也竊詳此意與臣所奏大抵略同一紹興經界打量既畢隨畝均産而其産錢不許過鄉此蓋以算數太廣難以均敷而防其或有走弄失陷之弊也若使諸鄉産錢租額素來均平則此法善矣若隨鄉已有輕重人户徒然攢算不免有害多利少之歎乞特許産錢過鄉通縣均紐庶幾百里之內輕重齊同實為利便一本州民間田有産田有官田有職田有學田有常平租課田名色不一而其所納租稅輕重亦各不同年來産田之稅既已不均而諸色之田散漫參錯尤難檢計姦民滑吏並緣為姦實佃者或申逃閣無田者反遭俵寄至於職田俵寄不足則或撥到諸色官錢以充之其弊不可遍舉今莫若將見在田土打量步畝一槩均産每田一畝隨入等高下定計産錢幾文而總合一州諸色租稅錢米之數以産錢為母定等則一例均敷每産一文納米若干錢若干米只一倉受納錢亦一庫交收却以到官之數照元分數分隸若干為省計若干為職田若干為學糧若干為常平逐旋撥入諸色倉庫除逐年二稅造簿之外每遇辰戌丑未之年逐縣更令諸鄉各造一簿開具本鄉所管田數四至步畝等第各注某人管業有典賣則云某年典賣某人又造合鄉都簿一扇類聚諸簿通結逐户田若干畝錢産若干文其有田業散在諸鄉者併就煙㸑地分開排總結並隨秋科稅簿送州印押下縣知佐通行收掌人户遇有交易將契書及兩家砧基照鄉縣簿對行批鑿則版圖一定而民業有經矣或者尚疑如此則本州産田納稅本輕而今當反重官田納租本重而今當反輕施行之後爭競必多須俟打量了畢灼見多寡實數方可定議説似有理乞聖照并與行下一本州荒廢寺院田産頗多目今並無僧行住持田土為人侵占逐年失陷稅賦不少乞特降指揮許令本州出榜召人實封請買不惟一時田業有歸民益富實亦免向後官司稅賦因循失陷而又合於韓愈所謂人其人廬其居之遺意誠厚下足民攘斥異教不可失之機會也先是漳泉二州被命相度而泉州操兩可之説朝廷疑焉著作郎黃艾輪對又言之且云今日以天下之大公卿百官之家商量一經界纍年不成大於此者若之何上乃諭輔臣令先行於漳州明年春詔漕臣陳公亮同熹協力奉行南方地暖農務既興非其時也熹猶冀嗣歲可行益加講究條畫既備遍榜郡縣細民知其不擾而利於已莫不鼓舞而貴家豪右占田隱稅侵漁貧弱者胥為異論以搖之至有進狀言不便者前詔遂格閲兩月熹請去尋命持湖南使者節猶以經界不行自劾議者惜之寧宗開禧元年夔路轉運判官范蓀言本路施黔等州荒逺綿亘山谷地曠人稀其占田多者須人耕墾富豪之家誘客户舉室遷去乞將皇祐官莊客户逃移之法校定凡為客户者許役其身毋及其家屬凡典賣田宅聽其離業毋就租以充客户凡貸錢止憑文約交還毋抑勒以為地客凡客户身故其妻改嫁者聽其自便女聽其自嫁庶使深山寂谷之民得安生理嘉定間知婺州趙㦛夫行經界於其州整有倫序後守魏文豹行之益力於是向之上户析為貧下之戶實田隱為逃絶之田者粲然可考凡給甲册户産簿丁口簿魚鱗圖類姓簿二十三萬九千有竒創庫遷以藏之歷三年而後上其事於朝八年詔職田蠲放如民田違者坐之理宗淳祐二年敕自今凡民有契劵界至分明所在州縣屯官隨即歸還六年殿中侍御史謝方叔言豪強兼并之患至今而極非限民名田有所不可是亦救世道之微權也今百姓膏腴皆歸貴勢之家租米有及百萬石者小民百畝之田頻年差充保役則獻其産於巨室以規免役小民田日減而保役不休大官田日增而保役不及可不嚴立經制以為之防乎去年諌官嘗以限田為稅朝廷付之悠悠不知國用邊餉皆仰和糴然權勢多田之家和糴不容以加之保役不容以及之乞諭臣僚論奏使經制以定兼并以塞從之景定四年賈似道以國計困於造楮富民困於和糴思有以變法而未得其説知臨安府劉良貴浙西轉運使吳勢獻買公田之䇿似道乃命殿中侍御史陳堯道曹孝慶上疏請將官户田産逾限之數抽三分之一以充公田帝從之詔買公田置買官田所以劉良貴提領臨安府通判陳訔為檢閲副之良貴請下都省嚴立賞罰究歸併之弊帝曰求免和糴無如買逾限之田為良法然東作方興權俟秋成續議施行當始於浙西諸路視之為則似道乃上疏條陳其制帝悉從之由是浙西六郡買田三百五十餘萬畝每鄉置官以一所民為官耕者曰官佃為官督者曰莊官莊官以富饒者充應兩歲一更每租一石明減二斗不許多收既而言者歷言其弊甚至民本無田而以歸併抑買自經分置莊官催租騷擾至度宗咸淳四年始罷莊官而令諸郡公租以三千石為一莊聽民於分司承佃不許盜易至德祐始盡除之而宋祚訖矣度宗咸淳元年監察御史趙順孫言經界將以便民雖窮閻下户之所深願而未必豪家大姓之所甚樂今之所謂推排非昔之所謂自實推排者委之鄉都則徑捷而易行自實者責之於人户則散漫而難集嘉定以來之經界時至近也官有正籍鄉都有副籍為鄉都者不過按成牘而更業主之姓名若夫紹興之經界其時既逺而籍之存者寡矣因其鱗差櫛比而求焉由一而至百至千至萬稽其畝步訂其主佃亦莫如鄉都之便朱熹所以主經界而闢自實者正謂此也州縣能守朝廷鄉都任責之令又隨諸州之便宜而為之區處當必人情悉孚不令而行矣從之三年司農卿季鏞言經界之法必多差官吏悉集都保遍走阡陌盡量步畝審定等色紐折計等姦弊轉生若推排之法不過以縣統都以都統保選任才富公平者定田畝稅色載之圖册凡民有定産産有定稅稅有定籍吳門紹興及湖南一路俱已告成竊惟東南諸郡皆奉行惟謹其或田畝未實則令鄉局釐正之圖册未備則令縣局程督之監司郡守遞相稽察如周官日成月要以綜核之於是詔諸路施行史臣論曰南渡後水田之利富於中原故水利大興而諸籍沒田募民耕者皆仍私租舊額每失之重輸納之際公私事例逈殊私租額重而納輕承佃猶可公租額重而納重則佃不堪命州縣胥吏與倉庫百執事之人皆得為侵漁之道於耕者也季世金人乍和乍戰戰則軍需浩繁和則歲幣重大國用常苦不繼於是因民苦官租之重命有司括賣官田以給用其初弛其力役以誘之其終不免於抑配此官田之弊也嘉定以後又有所謂安邊所田乃籍沒權幸而圍田湖田之在官者皆隸焉收其租以助歲幣至其將亡又限民名田買其限外所有謂之公田初議欲省和糴以紓民力而其弊極多其租尤重宋亡遺患猶不息也遼太宗會同三年詔於諧里河臚朐河之近地給賜南院鄂津圖嚕伊遜巴勒北院烏納哈喇錫林人為農田聖宗統和中蕭達林為西北路招討使以準布部落伺隙而動欲增戌兵又恐餽餉不給問於耶律昭昭以書答曰竊聞治得其要則仇敵為一家失其術則部曲為行路夫西北諸部每當農時一夫為偵候一夫治公田二夫給糾官之役大率四丁無一室處芻收之事仰給妻奴一遭冦掠貧窮立至春夏賑恤吏多雜以粳粃重以掊克不過數月又復告困且商牧者富國之本有司防其隱沒聚之一所不得各就水草便地兼以逋亡戍卒隨時補調不習風土故日瘠月損馴至耗竭為今之計若賑窮薄賦給以牛種使遂耕穫置遊兵以防盜掠頒俘獲以助伏臘散商牧以就便地期以數年富強可望然後練簡精兵以備行伍何守之不固何動而不克哉七年詔括民田又詔燕樂密雲二縣荒地許民耕種免賦役十三年詔昌平懷柔等縣諸人請業荒地十五年詔諸道勸民種樹又詔品部曠地令民耕種又募民耕灤州荒地免其租賦金之田制量田以營造尺五尺為步濶一步長二百四十步為畝百畝為頃民田業各從其便賣質與人無禁但令隨地輸租而已凡桑棗民户以多植為勤少者必植其地十之三明安穆昆户少者必課種其地十之一除枯補新使之不缺凡講射荒地者以最下第五等減半定租八年始徵之作已業者以第七等減半為稅七年始徵之自首冒此鄰地者輸官租三分之二佃黃河退灘者次年納租海陵天德二年定制凡職田畝取粟三斗草一稱倉場隨月俸支正三品三十頃從三品二十一頃正四品十七頃從四品十四頃正五品十三頃從五品七頃正六品從六品六頃正七品從七品五頃正八品四頃從八品三頃正九品從九品二頃諸防刺以上女真契丹司吏譯史通事不問千里內外公田三頃諸親王受任朝官兼外官者職田從職金制二品而下無職田三品而下在京者亦無職田正隆元年遣刑部尚書赫舍哩羅索等分行大興府山東真定府拘括荒間牧地及官民占射逃絶户地戌兵占佃官地外路官本業外增置土田及大興府平州路僧尼道士女冠等地益以授所遷之明安穆昆户且令民請射而官得其租也世宗大定十一年正月上謂宰臣曰往歲清暑山西近路禾稼甚廣殊無商牧之地因命五百里外乃得耕種今聞民皆去之他所甚可矜憫其令依舊耕種先是十年禁侵耕圍場地十七年邢州男子趙迪簡言隨路不附籍官田及河灘皆為豪強所占而貧民土瘠稅重乞遣官拘籍冒佃者定立稅課復量減人户稅數庶得輕重均平詔付有司將行而止復以近都明安穆昆所給官地率皆薄瘠豪民租佃官田歲久往往冒為已業令拘籍之又謂省臣曰官地非民誰種然女真人户自鄉土三四千里移來盡得薄地若不拘刷良田給之久必貧乏其遣官察之時省臣言官地所以人多蔽區由盜耕罪輕乃更條約立限令人自陳過限則告者有賞十九年帝謂宰臣曰亡遼時所撥與本朝地畝民或指射為無主地租地及新開荒為已業者可以拘括其間播種歲久若遽奪之恐民失業因詔括地官張九思戒之復謂宰臣曰朕聞括地事所行極不當如皇后莊太子務之類止以名稱便為官地百姓所執􅑀驗一切不問其相鄰冒占官地復有幸免者能使軍户稍給民不失業乃朕之心也二十年以行幸道隘詔沿路頓舍側近官地勿租與民耕種又詔山東路撥地一百四十頃大定初又於中都路賜田百頃命拘山東之地入官又諭有司曰白石門至野狐嶺其間淀濼多為民耕植者而官民雜畜往來無牧放之所可差官括元荒地及冒佃之數二十一年帝謂宰臣曰山東大名等路明安穆昆之民往往驕縱不親稼穡盡令漢人蒔種取租已禁買奴婢委閲實户數計口給地必令自耕力不足者方許佃於人時言者謂豪強之家多占奪田者有一家一口至三十頃以致小民無田可耕因令占官地十頃以上者皆括籍入官均賜貧民又以山東路所括民田民分給女真屯田人户餘地還民又尚書省奏山東所刷地數上曰此雖民地然無明據括為官地亦無不可黃河已移故道梁山濼水退民嘗恣意種之後遣使安置屯田民懼徵租逃者甚衆因免徵赦罪别以官地給之二十二年省臣張仲愈等謂民初無得地之由撫定後未嘗輸稅妄通為已業者刷之上謂太刻但令明安穆昆人户隨宜分處計其丁壯牛具合得土田實數給之不足則以前所刷地二萬餘頃補之二十三年奏明安穆昆户墾田一百六十九萬三百八十頃有竒牛具三萬四千七百七十一在都宗室將軍司墾田二千六百八十三頃七十六畝牛具三百四德呼勒唐古二部墾田萬六千二十四頃一十七畝牛具五千六十六二十七年隨處官豪之家多侵占官地轉與他人種佃規取課利命有司拘刷見數以與貧難無地者每丁授五十畝庶不致失所餘佃不盡者方許豪家驗丁租佃二十九年擬再立限令貧民請佃官地緣今已過期計已數足其占而有餘者若容告訴恐滋姦弊況續告漏遺地敕旨已革今限外告者宜却之止付元佃兼平陽一路地狹人稠官地當盡數拘籍驗丁以給貧民上曰限外指告多佃官地者却之當矣如無主不願承佃方許諸人告請其平陽路宜計丁限田如一家三丁巳業止三十畝則更許存所佃官地一頃二十畝餘者拘籍給付貧民可也又從言官請招他路流民量給間田耕河南曠地願作官地者免稅八年願為巳業者免稅三年並不許貿易章宗明昌元年六月以明安穆昆户不務栽植桑果令每十畝中栽一畝仍下各路栽之三年議行區種法四年敕令農田百畝以上如瀕河易得水之地須區種三十餘畝多種者聽無水之地則從民便承安元年四月初行區種法男年十五以上六十以下有土田者丁種一畝丁多者五畝止二年二月九路提刑馬百祿奏地肥瘠不同乞不限畝數制可泰和四年令所在長官及按察司隨宜勸諭亦竟不能行是年定制軍人所撥地止十里內自種種數每丁四十畝續進丁同此餘者許令便宜租賃及兩和分種違者錢業還主時六路括地其間屯田軍户多冒名增口以請官地及包取民田而民有空輸稅賦虛抱物力者應命於稅內每歲續刻之八年户部尚書高汝礪以舊制人户請佃荒地者納租之時多巧避匿由元限太逺請佃之初無人保識請自今請佃者可免三年作已業者免一年以鄰首保識為長制宣宗貞祐三年宰臣以既徙河北軍户於河南請以官田及牧地分界之已為民佃者處之劉元規曰括地之議聞者無不駭愕向者河北山東已為此舉民之塋墓井竈悉為軍有若復行之大失衆心荒田不可耕徒有得地之名而無享利之實縱得熟土不能親耕而復令民佃之所得無幾而使紛紛交病哉遂罷之時北方侵及河南由是盡起諸路軍户南來保守軍糧無出衆議益賦或與軍田二者不知所擇汝礪言河南官民地相半又多全佃官地之家一旦奪之何以自活如山東撥地時腴地盡入勢家瘠者乃付貧户無益於軍而民有損惟當倍益官租以給軍食復以係官荒田牧地量數與之令其自耕為便從之其後軍户日給不足應授以荒官田及牧地可耕者人三十畝汝礪既總括荒田旋又奏頃畝之數甚少軍户復不能自耕必以與人取租數百里外請罷給但半給種半實直焉四年省院又議軍户願佃者計口給之其餘僻逺不願者宜準近制係官荒地許軍民耕闢亦未能遽減其種遲以歲月俟成倫次漸可以省官廪耳後乃定擬民有能開牧馬地及官荒地作熟田者以半給之為永業半給軍户興定三年尚書右丞侯摯言河南軍民田總一百九十七萬頃見耕種者九十六萬餘頃合上中下十一取之歲得九百六十萬石自可優給歲支民不疲而軍用足詔有司議行之四年伊喇布言軍户自徙於河南尚未給田移徙不常貧者甚衆請括諸屯處官田人給三十畝仍不移屯他所宰臣議先撥授之為永業俟有獲即罷其家種從之五年京南行三司舒穆嚕斡魯言京南東西三路屯軍四十萬口歲費種一百四十餘萬石皆坐食民租宜括逋户舊耕田南京一路舊墾田三十九萬八千餘頃內官田民耕者九萬九千頃飢民流離猝難復業不若分給軍户人三十畝使之自耕或召人佃種令省臣議更不能行欽定續通典卷二
