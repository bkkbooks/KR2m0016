body:
  text: 兵料敵制勝唐髙祖遣李密出關長史張竇徳言其必叛乃敕密更受節度密曰無故召還恐無生理遂斬使者入桃林縣驅掠徒衆直趨南山乘險而東使人馳告故將伊川刺史張善相令以兵應接而聲言向洛行軍總管盛彦師聞之率衆躡熊耳山南據要道令其衆夾路而伏諭之曰俟賊半渡一時俱發或曰聞宻欲向洛而公入山何也彦師曰密聲言向洛實欲出不意走襄城就張善相耳若賊入谷我後追之山路險隘一夫殿後必不能制今吾得先入谷擒之必矣密果南出半渡彦師擊斬之傳首長安又太宗征髙麗至元莬髙麗大駭城邑皆閉車駕次安市髙麗北部傉薩髙延夀帥兵十五萬來援上謂諸將曰今為延夀䇿有三引兵直前連城為壘據險食粟掠吾牛馬攻之不可猝下欲歸則泥潦為阻坐困吾軍上䇿也拔城中之衆與之宵遁中䇿也不度智能來與吾戰下䇿也卿曹觀之彼必出下䇿成擒在吾目中矣後延夀果敗舉衆䧏又唐休璟在邊遇吐蕃大將麯莽布支率騎數萬冦凉州休璟以兵數千臨髙望之見賊旗鎧鮮明謂麾下曰莽布支新將兵欲以示武耳然其下皆貴臣子弟不習戰請為君破之乃披甲先登六戰皆克又李光弼圍安太清於懷州因史思明來救壁野水渡比暮還軍留雍希顥守曰賊將髙暉李日越萬人敵也必令劫我爾留此賊至勿與戰若降與偕來是日思明果召日越曰光弼野次爾以鐵騎五百夜取之不然無歸日越至壘問曰太尉在乎曰去矣曰兵幾何曰千人曰將為誰曰雍希顥日越謂其下曰我受命云何今獲希顥歸不免死遂請降希顥與俱至光弼厚待之表授大將髙暉亦降或問公降二將何易也光弼曰思明再敗聞我野次彼固易之命將來襲必許以死希顥無名不足以為功日越懼死不降何待髙暉材出日越之右降者見遇貳者得不思奮乎嗣由地道攻城俘安太清以獻又李晟討朱泚之亂引兵叩都門㑹諸將圖所向衆對先㧞外城然後清宫晟曰外城有里閈之隘若設伏格戰居人囂潰非計也賊重兵精甲聚苑中今直擊之是披其心腹將圖走不暇諸將曰善乃自東渭橋移壁光泰門以薄都城連溝柵而賊將張庭芝李希倩求戰晟顧曰賊不出是吾憂也今乃冒死來天誘之矣勒呉詵等縱兵鏖擊晟以精騎鼔譟而從大破之乘勝入光泰門再戰賊却走又楊朝晟為邠寧節度使請城方渠合道木波以遏吐蕃要路詔問須兵幾何對曰邠寧兵足以城之帝曰嚮城鹽州用兵七萬今三城尤逼敵境何易邪對曰今發本鎮兵不旬日至出其不意而城之敵謂吾衆不減七萬不敢輕來不過三旬吾城已畢敵雖至城旁草盡不能久留敵退則運芻糧實之此萬全䇿也若大集諸道兵踰月始至敵亦集衆來與我爭戰何暇築城哉帝從之朝晟分軍為三各築一城三旬三城成朝晟軍還至馬嶺吐蕃始出追之相距數日而去朝晟遂城馬嶺而還開地三百里皆如其䇿五代梁攻鄆州朱瑾來救梁諸將或勸太祖縱瑾入鄆耗其食堅壁勿戰此可以俱弊太祖曰瑾來必與時溥俱不若遣霍存邀之存伏兵蕭縣已而瑾果與溥俱出迷離存發伏擊之遂敗瑾等於石佛山晉兵圍張文禮于鎮州久不下而定州王都引契丹來侵契丹至新樂晉人皆恐欲解圍去莊宗未决郭崇韜曰契丹之來非救文禮為王都以利誘之耳且晉新破梁軍宜乘已振之勢不可遽自退怯莊宗然之果敗契丹又莊宗既定魏州梁將劉鄩軍於洹水時張源徳據貝州魏人請先擊貝州然後東出師循地滄海莊宗曰貝州魏之邊郡壁壘完堅源徳託附劉鄩勢難卒解徳州西接貝州與滄帥共為首尾昨偵其無備可以輕騎取之若在彼駐軍二賊自然勢解各保孤城然後進擊於是遣騎軍晝夜兼行襲徳州郡將不意師至踰垣而遁遂克其城又莊宗聞梁人欲大舉數道入冦深以為憂召諸將㑹議郭崇韜對曰臣嘗細詢康延孝以河南之事度已料彼日夜思之成敗之機决在今歲梁今悉以精兵授段凝决河自固恃此不復為備凝非將材不足畏降者皆言大梁無兵陛下若留兵守魏固保楊劉自以精兵與鄆州合勢長驅入汴偽主授首則諸將自降矣莊宗意乃决濟河至鄆州中夜進軍以李嗣源為前鋒遇梁兵連破之擒王彦章莊宗謂諸將曰段凝猶在河上何向而可諸將以為東方諸鎮兵皆在段凝麾下所餘空城耳以天威臨之無不下者若先廣地東傅於海然後觀釁而動可以萬全康延孝固請亟取大梁嗣源曰今彦章就擒段凝必未之知就使有人走告之疑信之間尚須三日設若知吾所向即發救兵直路則阻决河須自白馬南渡舟檝亦難猝辦此去大梁至近無險信宿可至段凝未離河上友貞已為吾擒矣延孝之言是也莊宗從之遂滅梁周太祖因劉旻攻晉州遣王峻將兵討之峻軍出自綘州前鋒報過蒙阬峻喜謂其屬曰䝉阬晉綘之險也旻不分兵扼之使吾過此可以知其必敗也峻軍去晉州一舎旻聞周兵大至即解去宋太祖謀伐蜀遣王全斌由鳳州劉光儀由歸州進光儀將行太祖示以地圖指鎻江曰我軍至此泝流而上慎勿以舟師爭勝當先以步騎陸行出其不意擊之俟其勢却即以戰櫂夾攻取之必矣及師至夔距鎻江三十里舎舟前進先奪浮梁復牽舟而上蜀監軍武守謙領麾下與光儀騎將張廷翰戰敗遂入寧江城守將髙彦儔自焚死又曹彬潘美諸將北伐陛辭太宗謂曰潘美但先趨雲應卿等以十萬衆聲言取幽州且持重緩行不得貪利敵聞我兵至必悉衆救范陽不暇援山後矣後彬違詔致敗又景徳時劉永規知宜州在郡嚴酷衆咸怨焉澄海軍校陳進率所部害永䂓擁判官盧成鈞為謀主嬰城拒命詔東上閤門使曹利用等發兵討之初奏至真宗謂王旦等曰司天屢言當有兵方憂逺地牧守不得其人今果有是當遣使翦除旦言利用精於方畧悉心王事此賊不過保其家屬據城拒守或掠城中貲以趨山林如此不足為慮若選募驍勇立謀主直趨廣州彼其智識必不及此猶慮為人誘教爾及聞賊分據柳州洛容縣帝曰此不能離窟穴枉自棄耳不久遂平又王韶以龍圖閣待制知熙州入朝㑹轄戩敗景思立於踏白城圍河州甚急韶自京師還至興平聞之乃日夜馳至熙州熙方守城命撤之選兵得二萬議所向諸將欲趨河州韶曰賊所以圍城者恃有外援也今知救至必設伏待戰且新勝氣鋭未可與爭當出其不意以攻其所恃此所謂扼吭𢷬虚形格勢禁則自為解者也乃直叩定羌城破結和爾族斷夏國通路進臨寧河分命偏將入南山轄戩知援絶拔柵去又章楶知慶州時朝廷戢兵戒邊吏勿妄動楶言夏人嗜利畏威不有懲艾邊不得休息宜稍取其疆土如古削地之制以固吾圉然後諸路出兵擇據要害不一再舉勢將自蹙矣遂乘便出討以致其師夏果入圍環州楶諜知之遣驍將伏兵洪徳城夏師過之鼓譟而出斬獲甚衆又孟珙少時從父宗政在襄金人攻襄珙料其必窺樊城乃獻䇿宗政由羅家渡濟河宗政然之翼日諸軍臨渡布陣金人果至渡伏發大敗之又趙范趙葵擊李全於揚州全敗走范葵議所向葵曰出東門范曰西出嘗不利賊必見易因其所易而圖之必勝乃悉精鋭數千而西取官軍素為賊所易者張其旗幟以誑之全望見喜直前突鬭范麾兵並進葵親搏戰諸軍爭奮賊始疑非前日軍欲走入土城李虎軍已塞其甕門全窘從數十騎北走追及刺殺之遼耶律烏魯斯與晉將杜重威戰於望都被圍衆言陣薄處可出烏魯斯曰恐彼有他備竟引兵衝堅而出迴視衆所指處皆大塹也其料敵多此類金太祖將舉兵伐遼問都古嚕納曰遼名為大國其實空虚主驕而士怯戰陣無勇可取也吾欲舉兵仗義而西君以為何如都古嚕納曰以主公英武士衆樂為用遼主荒於畋獵政令無常易與也太祖從之卒滅遼又薩里哈因宋呉玠擁重兵據涇州涇原以西多應之欲退守京兆俟河南河東軍古英曰我退守呉玠必取鳳翔京兆同華據潼關吾屬無類矣不如速戰我軍陣涇之南原宋兵必自西原來古英與希卜蘇各以選騎五百摧其兩翼元帥當其中擊之可以得志監軍巴爾斯曰二子當其左右巴爾斯願當其中元帥據岡阜多張旗幟為疑兵可以得志薩里哈從之呉玠兵果自西原來古英希卜蘇擊其左右自旦至午呉玠左右軍少退巴爾斯當其前衝擊之遂敗玠軍自此蜀人不敢復出關陜遂定元太祖諭諸將曰金精兵在潼關南據連山北限大河難以遽破若假道於宋宋金世讎必能許我則下兵唐鄧直𢷬大梁金急必徵兵潼關然以數萬之衆千里赴援人馬疲弊雖至弗能戰破之必矣又郭侃從宗王實喇烏克西征至宻實勒㑹日暮已休復驅兵起祇留數病卒西行十餘里頓軍令軍中銜枚轉箭敵不知也潛兵夜來襲殺病卒克鼐蘇勒坦大驚曰東天將軍神人也遂䧏後世祖即位侃上疏陳平宋之䇿其畧曰宋據東南以呉越為家其要地則荆襄而已今日之計當先取襄陽既克襄陽彼揚廬諸城彈丸地耳置之勿顧而直趨臨安疾雷不及掩耳江淮巴蜀不攻自平後皆如其䇿又中統元年哈喇布哈琿塔哈據六盤山以兵應額呼布格商挺謂亷希憲曰為六盤有三䇿悉鋭而東直𢷬京兆上䇿也聚兵六盤觀釁而動中䇿也重裝北歸以應和林下䇿也希憲曰彼將何從挺曰必出下䇿已而果然於是令巴沁汪良臣發兵禦之六盤之兵既北而阿勒達爾自和林引兵南來與哈喇布哈琿塔哈遇於甘州哈喇布哈以語不合引其兵北去阿勒達爾遂與琿塔哈合軍而南時諸王哈丹率騎兵與巴沁汪良臣兵合乃分為三道以拒之大戰於甘州東殺阿勒達爾琿塔哈事聞帝大悦曰商孟卿古之良將也明劉基初見太祖太祖問征取計基曰士誠自守奴不足慮友諒劫主脅下名號不正地據上流其心無日忘我宜先圖之陳氏滅張氏勢孤一舉可定然後北向中原王業可成也太祖大恱㑹友諒䧟太平謀東下勢甚張諸將或議䧏或議奔據鍾山太祖召基入内基奮曰主降及奔者可斬也太祖曰計安出基曰賊驕矣待其深入伏兵邀取之易耳天道後舉者勝取威制勝以成王業在此舉矣太祖用其䇿誘友諒至大破之又常遇春因陳友諒來援安慶料其必攻池州乃伏鋭士於九華山敵果來攻伏起擒斬萬餘人又張士誠攻新城李文忠帥朱亮祖等馳救去新城十里而軍胡徳濟使人告賊勢方盛宜少駐以俟大軍文忠曰兵在謀不在衆乃下令曰彼衆而驕吾少而鋭以鋭遇驕何憂不克彼軍輜山積此天以富汝曹也勉之乃分左右軍文忠橫槊引鐵騎數千乘髙馳下大軍繼之敵遂大潰又沐春嗣父英爵鎮雲南洪武時平越巂蠻立瀾滄衛阿資復叛與何福討之春曰此賊積年逋誅者以與諸土酋姻婭輾轉亡匿今悉發諸酋從軍縻繫之而多設營堡制其出入賊必授首遂趨越州分道逼其城伏精兵道左以羸卒誘賊縱擊大敗之遂擒阿資敵十五形帥十過附宋許洞虎鈐經曰猛而輕死者可伏而挑之也智而遲者可逼之也機事疾速而不精者可誘也機緩而精者可抗也自功者可間其下也信人者可詐也不信人者可離也剛愎自用者可乘也親愛人者可侮也貪者可賂也鄙者可奪也亷者可汚也清者可辱也畏鬼神者可驚也懦而好用人者可欺也將有是十五者擊之無疑也士卒使用無時者可擊也士馬秣食無時者可擊也結營之地無出入之便者可擊也臨陣喧譁約之不止者可擊也營柵無泉源溪澗者可擊也動而不能避日耗月刑者可擊也諸將爭功者可擊也謀臣放逐者可擊也吏士怨怒者可擊也傳呼不應節者可擊也是十者但候而擊之無疑焉察而後動唐兵圍洛陽掘塹築壘而守之城中乏食竇建徳悉衆來援太宗集將佐議之郭孝恪曰世充窮蹙垂將面縛建徳逺來助之此天意欲兩亡之也若據守虎牢以軍汜水伺間而動破之必矣五代時南唐李金全將兵救河中軍於沂州之境方與諸將㑹食候騎白有漢兵數百在澗北皆羸弱請掩之金全令曰敢言過澗者斬及暮漢伏兵四起金鼓聞十餘里金全曰曏可與之戰乎於是退保海州宋韓世忠征劉忠與賊對壘奕碁張飲堅壁不動衆莫測一夕馳騎穿賊營候者呵問即以賊軍號隨聲應之周覽以出喜曰此天賜也遂伏精兵於白面山與諸將㧞營而進賊兵方迎戰所伏兵已馳入中軍奪望樓植旗蓋傳呼如雷賊驚潰因斬忠金太祖天輔時遼耶律伊都降金金以為監軍久不遷常怏怏伊都有叛心遣使約燕京統軍誥里反誥里亦契丹人時金西監軍烏舎自雲中來燕㣲聞其事而未信回行數百里因獵居庸之東遥見二騎馳逓交相遇於道立馬久談烏舎疑之命數騎追一人至詰曰爾何人也曰伊都使者以軍事詣燕京統軍司誥里烏舎曰爾等適立馬話及何事曰問候烏舎曰非也問候之語無許久又曰話别烏舎曰亦非也話别之語無許久又曰叙家事烏舎曰家事固非立馬叙又曰叙往事烏舎曰往事亦非立馬叙馳者詞窮面顫且戰慄不已烏舎察其言色兼素疑伊都誥里皆契丹反覆無定因以詐折之曰我知汝二人宻議反者近有人宻告伊都誥里反期於今日各有使至我故來此伺果得爾軰夫何隠焉其人謂烏舎果知不敢隠伊都之叛由是敗元阿珠沉幾有智畧入覲與參政阿爾哈雅奏請伐宋帝命相臣議久不决阿珠進曰臣久在行間備見宋兵弱於往昔失今不取時不再來帝即可其奏詔益兵十萬與丞相巴延參政阿爾哈雅等同伐宋又汪良臣將兵攻嘉定昝萬夀堅守不出良臣度有伏兵先大搜山谷果得而殺之乃進壘薄城萬夀悉軍出戰大破之萬夀乞降明王守仁討橫水賊始仍故事招安之因給以牛種俾力耕自新所遣使與繪者俱盡圖其山谷險易猝以秋髙進兵食其所穫賊不及備大破之驗虚聲知無實五代漢髙祖天福十二年四月漢髙祖於晉少帝開運四年二月即位仍稱天福十二年收復承天軍軍太原東都土門所衝也乃留步卒一千戍之備其不虞時契丹還衆每驚潰敵乃焚其井邑一日之中狼烟百餘舉髙祖曰此必敵之將退張虚勢也乃遣親將葉仁魯領步騎三千趣之㑹敵黨發掘掠取不意軍至敗之斬級獲馬各千餘而還金阿蘇叛奔遼太祖遣實古納尼楚赫往索阿蘇實古納等還具言遼主驕肆廢弛之狀於是議伐遼遼統軍司聞始為備命統軍蕭托卜嘉調諸軍於寧江州太祖使富卦喇復索阿蘇實觀其形勢富卦喇還言遼兵多不知其數太祖曰彼初調兵豈能遽集如此復遣呼實布往還言惟四院統軍司與寧江州軍及渤海八百人耳太祖曰果如吾言謂諸將佐曰遼人知我將舉兵集諸路軍備我我必先發制之無為人制衆皆曰善乃舉兵伐遼又宗望伐宋渡江敗宋兵於江上遣璸都等以兵追宋主宋主入㑹稽若為堅守計有兵數千列陣於郭東竹葦間諸將欲擊之璸都曰此詐也不若急攻城不然將由他門逸去諸將猶豫未决而宋主果於他門以單舟入海不獲而還元阿珠既築壘斷襄陽糧道宋將夏貴范文虎復相繼來援又分兵出入東岸林谷間阿珠謂諸將曰此張虚形不可與戰宜整舟師備新堡諸將從之明曰宋兵果趨新堡大破之敵降審察唐突厥阿史徳温傅反與阿史那伏念合詔裴行儉總諸軍討之伏念宻送降欵請自効行儉不泄其事而宻表以聞數日有烟塵漲天而至斥堠惶駭來白行儉召三軍謂曰此伏念執温傅來降非他也然受降如受敵但須嚴備更遣單使仍前勞之少間伏念果率屬縛温傅來軍門請罪盡平突厥餘黨宋夏州李繼遷遁斤澤都巡檢曹光實選精騎襲之繼遷僅以身免獲其母妻於是繼遷復結婚於豪酋轉徙伏匿浸以强盛使人紿光實曰我數奔北勢窘不能自存矣公許我降乎因陳舅甥之禮期某日於葭蘆川降光實信之且欲擅其功故不與人謀至期繼遷設伏止領十數人近城迎光實從百騎赴之繼遷前導北行至其地忽舉手揮鞭伏兵盡起光實被害又元昊遣髙延徳還延州與范仲淹約和仲淹自為書遺元昊反覆戒諭令去帝號盡臣節以報累朝厚待之恩韓琦聞之曰無約而請和者謀也命諸將戒嚴而自行邊至髙平元昊果遣衆冦渭州薄懷逺城琦乃趨鎮戎軍盡出其兵以禦之遼韓匡嗣耶律沙伐宋以報圍城之役耶律休格率本部兵從匡嗣等戰於滿城翌日將復戰宋人請降匡嗣信之休格曰彼衆整而鋭必不肯屈乃誘我耳宜嚴兵以待匡嗣不聽休格引兵憑髙而視須臾南兵大至鼓譟疾馳匡嗣倉卒不知所為士卒棄旗鼓而走遂敗績休格整兵進擊敵乃却元郭侃征西屢捷至大房其將珠蘇爾致書請降左右以為信然易之侃曰軍機多詐不可信也若中彼計恥莫大焉乃嚴陣以待珠蘇爾果以兵來邀侃與戰大破之巴爾蘇勒坦降下其城一百八十五又李恒圍隆興宋轉運使劉槃請降恒察其詐宻為之備槃果以鋭兵突至恒擊敗之殺獲殆盡乃降又星節為湖廣行省平章政事值汝潁妖賊起㑹僚屬議之或曰有鄭萬户老將也宜起而用之星節乃命募土兵完城池修器械嚴巡警悉以其事屬鄭賊聞之遣其黨二千人來約降星節與鄭謀曰此詐也然降而卻之則不可受而審之可也果得其情乃殲之械其渠魁數十人以待命適有㫖召星節為大司農同僚受賊賂乃誣鄭罪而釋其所械者明日賊大至内外響應城遂陷又伊蘇擒婁特穆爾布哈賊黨程思忠等乞降於參政撤淩特穆爾為請命於朝詔許之命伊蘇退師伊蘇度賊必以計怠我師乃嚴備以偵之程思忠果棄城遁去亟追至瑞州殺獲萬計賊遂東走明鄧愈駐兵于臨江之平塘時鄧克明據撫州遣使通欵而實無獻城之意愈知其情捲甲夜趨比旦入城克明單騎遁臣等謹案元劉元振為成都經畧使宋瀘州守將劉整宻送欵求降元振往受之諸將皆曰劉整無故而降不可信也元振曰宋權臣當國賞罰無章有功者往往以計除之是以將士離心且整本非南人而居瀘南重地事勢與李全何異此舉無可疑者遂行其父哈瑪爾戒之曰劉整宋之名將瀘乃蜀之重地今整遽以瀘降情偽不可知汝無為一身慮事成則為國家利不成則當效死乃其分也元振至瀘整開門出迎元振棄衆而先下馬與整相見示以不疑明日請入城元振釋戎服從數騎與整聯轡而入飲燕至醉整心服焉元振還宋瀘州主帥俞興率兵圍瀘州晝夜急攻城幾陷左右勸元振曰事勢如此宜思變通整本非吾人與俱死無益也元振曰人以誠歸我既受其降豈可以急而棄之且瀘之得失關國家利害吾有死而已乃犒將士募善游者賫蠟書至成都求援又權造金牌分賞有功未幾援至元振與整出城合擊興兵大敗之興退走據此實與杜典之意互相為用夫敵情多詐受降者固不可不審察以燭其幾然使過於疑則又無以服䧏者之心而收實效觀劉元振之處劉整可謂信義交至而劉整亦卒無叛意要惟能審察而後能不疑此又臨敵者所當知也謹附識於此欽定續通典卷九十四
