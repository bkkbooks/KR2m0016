body:
  text: 禮嘉鹵簿旌旗附五代宋遼金臣等謹按杜佑通典述嘉禮分旌旗鹵簿為兩門雖本之開元禮然旌旗原屬於鹵簿事無二用若分門别載勢不免互見複出體例未為完善考宋綬鹵簿圖記車輅之等人物之列器用之宜旌麾之制連類為圗次第明晰而鄭居中等所撰政和五禮新儀亦以鹵簿旌旗合載並加精審焉今參考宋遼金元明五朝史志詳述鹵簿即以旌旗附載於後庶㡬義類貫通不致轇轕其一朝後先更制者仍每條分註以偹參考云梁太祖開平二年十一月南郊禮儀使奏皇帝赴南郊法駕鹵簿自清逰以下諸衛将軍平巾幘緋兩襠大口袴錦縢金帶刀弓箭佽飛執旗人引駕三衛並武弁緋兩襠大口袴供奉官並武弁服色各一人歩從餘文武官及導駕士絳衣平巾幘餘並戎服近侍導駕官引車從本縣令州府御史大夫即朝服各乗輅車前導其引駕官員不總備車輅自中書令侍中以下則公服内諸司使並常服按五代鹵簿新舊五代史及通考皆失載今據五代會要南郊禮補輯宋鹵簿四等曰大駕曰法駕曰鸞駕曰黄麾仗大駕之儀極盛郊祀耤田薦獻玉清景靈宫用之法駕减三分之一泰山汾隂明堂用之鸞駕又减半謁陵封祀朝謁太清奏告玉清宫用之黄麾仗又减於鸞駕親征御樓省方還京六廟上册用之太祖建隆四年将郊祀大禮使范質與鹵簿使張昭儀仗使劉温叟同詳定大駕鹵簿之制禮儀使陶榖建議金吾及諸衛将軍導駕及押仗舊服紫衣請依開元禮各服本色繡袍舊執仗軍士悉衣五色畫衣隨人數給之以五行相生之色為次黑衣先之青衣次之赤黄白又次之乾德三年蜀平命左拾遺孫逢吉收蜀中法物其不中度者悉毁之是嵗太祖親閲鹵簿四年始改畫衣為繡衣至開寳三年成謂之繡衣鹵簿其後郊祀皆用之太宗至道中令有司以絹畫為圗凡三幅中幅車輅六引及導駕官外兩幅儀衛藏秘閣凡仗内自行事官排列職掌并捧日奉宸散手天武外歩騎一萬九千一百九十八人真宗咸平五年詔南郊儀仗引駕官不得多帶從人大中祥符元年改小駕為鸞駕仁宗時宋綬定鹵簿為圗記凡大駕用二萬六十一人皇祐二年将享明堂鹵簿使奏法駕减大駕三分之一詔禮官與兵部考正用萬有一千八十八人嘉祐二年祫享用禮儀使奏南郊仗金吾上将軍六統軍左右千牛皆服紫繡戎服珂佩騎而前節度使亦衣袴褶導駕如舊例是月禮官奏南郊還禮當乗金輅而或詔乗大輦宜著為令常以大輦從神宗元豐元年更定大駕儀仗鹵簿仗仗下官一百四十六人執仗押引從軍員職掌諸軍諸司二萬二千二百二十一人徽宗政和四年禮制局言鹵簿六引儀仗信幡承以䨇龍惟乗輿器用並飾以龍今六引内係羣臣鹵簿而旗物通畫交龍非便釐正之政和七年兵部尚書蒋猷請取天聖鹵簿圗記更加考正髙宗紹興十二年檢會舊儀始備黄麾仗慶册親饗皆用焉孝宗隆興二年令有司條奏其可省者次年郊祀用六千八百八十九人明堂用三千三百十九人乾道六年郊祀備五輅大安輦六象人數如舊自後無所改革云臣等謹按宋史至道政和紹興皆有鹵簿之制至道初得唐長興南郊鹵簿字圗規模草創制多濶畧南渡後禮儀失墜務為簡省其見於國史㑹要諸書者較承平時未及其半獨政和所定則自元豐以来置立詳定禮文所議禮局考訂精審其文最詳故具載之其法駕鹵簿與宣和沿革之制及小駕屬車並附見焉政和大駕鹵簿象六分左右次六引開封令開封牧大司樂少傅御史大夫兵部尚書各用本部鹵簿次金吾纛矟左右皁纛各六執托各一人糸斥一人押衙四人並騎犦矟八執各一人本衛上将軍将軍各四人本衛大将軍二人並騎犦矟四夾大将軍執各一人夾二人並騎各法駕犦矟减二本衛上将軍將軍减三人次朱雀旗隊並騎金吾衛折衝都尉一人引隊犦矟二夾都尉執旗一人引夾各二人凡仗内引夾執人數凖此弩四弓矢十六矟二十左右金吾衛果毅都尉二人押隊法駕弩减二弓矢减六矟减八宣和引隊改天武都指揮使押隊改天武指揮使次龍旗隊大将軍一人檢校騎引旗十二人並騎風伯雨師雷公電母旗各一五星旗五左右攝提旗二北斗旗一䕶旗十二人副竿二執人並騎减法駕引旗䕶旗人各四宣和檢校改左右衛大将軍雷公電母旗去公母二字次指南車記里鼓車各一駕馬各四駕士各三十人白鷺車鸞旗車崇徳車皮軒車各一駕士各十八人法駕無白鷺崇徳宣和有青旌青雀鳴鳶飛鴻虎皮貔貅六車在記里鼓之下崇徳之前减白鷺鸞旗皮軒三車駕士之數如前次金吾引駕騎本衛果毅都尉二人儀刀弩弓矢矟各八法駕儀刀弩弓矢矟各减二宣和改都尉為神勇都指揮使次大晟府前部鼓吹令二人府史四人按通考作府史二人管轄指揮使二人掆鼓金鉦各十二帥兵官八人領大鼓一百二十帥兵官二十人領長鳴一百二十帥兵官六人領鐃鼓十二帥兵官四人領歌工拱宸管簫笳各二十四大横吹一百二十帥兵官十人領節鼓二笛簫觱篥笳桃皮觱篥各二十四掆鼓金鉦各十二帥兵官四人領小鼓中鳴各一百二十帥兵官八人領羽葆鼓十二帥兵官四人領歌工拱宸管簫笳各二十四法駕前後掆鼓金鉦各减四大鼓减四十長鳴减四十鐃鼓减四拱宸管後簫笳各減八大横吹减四十節鼓後笛簫觱篥笳桃皮觱篥各减八小鼓中鳴各减四十羽葆鼓减四最後簫笳各减八帥兵官共減十八人次太史相風行漏等與太史令及令史各一人並騎相風烏輿一輿士四人交龍鉦鼓各一輿士各六人司辰典事各一人並騎漏刻生四人鼓樓鐘樓行漏輿各一輿士各一百人太史正一人清道二人十二神輿一輿士十四人輿法駕行漏輿一輿士各四十人神一輿士多大駕二人宣和鼓鐘樓並改為輿太史正前有捧日副指揮使二人捧日節級十人神輿輿士増十次持鈒前隊左右武衛果毅都尉二人引隊左右武衛校尉二人絳引旛一糸斥二人左右有金節十二執人並騎䍐罼各一朱雀幢導盖青龍白虎幢各一义三執人並騎隊長一人鈒㦸二百八十人左右武衛将軍二人檢校左右武衛校尉四人押隊法駕金節减四鈒㦸减七十二宣和引隊改驍騎都指揮使武衛校尉改驍騎軍使増朱雀幢後之义一去龍虎幢後之义三檢校改用左右驍騎将軍次黄麾幡一執一人騎糸斥二人法駕前有殿中侍御史二員次六軍儀仗左右神武軍左右羽林軍左右龍武軍各有統軍二人都頭二人羽林又有節級二人押仗本軍旗各一排闌旗各二十吏兵力士旗各五掩尾天馬旗二羽林有赤豹黄熊旗龍武有龍君虎君旗各一白柯槍五十哥舒棒十鐙仗八法駕神武軍减排䦨旗十羽林龍武軍各减四吏兵力士旗减一宣和統軍改将軍神武軍旗改熊虎排闌旗改平列哥舒棒改戈㦸鐙仗改矛㦸羽林隊無節級黄熊改黄羆龍武旗改熊虎次引駕旗天王旗二排仗通直官二人押旗十二辰旗各一法駕同次龍墀旗天下太平旗一排仗大将二人夾騎五方龍旗各一金鸞金鳳旗各一獅子旗二君王萬嵗旗一日月旗各一法駕减鸞鳳獅子旗次御馬二十四控馬每匹天武二人御馬直二人為十二重法駕减八為八重宣和御馬直改為習馭次中道隊大将軍一人檢校法駕同宣和大将軍改左右驍衛大将軍次日月合璧旗一苣文旗二五星連珠旗一祥雲旗二長夀幢二宣和苣文改慶雲祥雲改祥光次金吾牙門旗四監門校尉六人次金吾細仗青龍白虎旗各一五嶽神旗五方神旗五方龍旗五方鳳旗各五以上執各一人糸斥各三人校法駕五方龍鳳旗各减二宣和改尉為使臣五嶽神旗去神字次八寳鎮國神寳皇帝之寳皇帝行寳皇帝信寳在左受命寳天子之寳天子行寳天子信寳在右為四重香案八各以二列於寳輿之前碧襴二十四人符寳郎行於碧襴之間法駕减碧襴八人宣和増引寳職掌二人香案職掌六人援衛𫝊喝親從一百人奉寳輦官每寳二十八人節級一人奉寳一十二人舁香案行馬執燭籠各四人持席褥油衣共三人香案寳輿各九燭籠二十六碧襴之數同前次方繖二大雉尾扇四夾執繖扇各一人以下准此法駕同次金吾四色官六人押仗二人法駕减押仗次金甲二人宣和改銅甲次太僕寺進馬四人並騎次引駕千牛衛上将軍一人千牛八人中郎将二人並乗珂馬千牛二人並騎宣和引駕改千牛衛大将軍中郎将改為捧日都虞候次長史二人並騎宣和無次金吾引駕官四人並騎次導駕官執政以上從六人待制諌議防禦使以上五人監察御史刺史諸衛将軍以上四人次繖扇輿輦大繖二中雉尾扇四夾腰輿一小雉尾扇四夾應奉一人十将将虞候節級二人長行十六人排列官二人中雉尾扇十二華葢二執各一人香鐙一執擎八人小輿一應奉人逍遥平輦下長行二十四人逍遥子一應奉人十将将虞候節級共九人長行二十六人平輦一應奉人員七人餘同上尾法駕排列官後中雉尾扇减四宣和去小雉扇四腰輿一管押人員二人都将四人僉押小輿排列官二人小輿一奉輿二十四人都將九人逍遥子改為逍遥輦奉輦一十六人平輦一奉輦人同上後有上輦奉御二人騎小輿前又有大路一駕馬六太僕卿御駕士一百二十人次駕前東第五班開道旗一皁纛十二引駕六十二人鈞容直三百人引駕回作樂五方色龍旗五門旗四十御龍四直歩執門旗六十天武駕頭下一十二人茶酒班執從物十一人御龍直仗劔六人天武把行門八人麇旗一殿前班擊鞭十人簇輦龍旗八日月麟鳳旗四青白赤黒龍旗各一御龍直四十人踏路馬二夾輅大将軍二人進輅職掌二人部押二人教馬官二人法駕同宣和無鈞容直開道旗内増押班一人殿侍二人皁纛旗十二殿侍十二人引駕二人長行六十人五方色吉字旗殿侍三人管押十人門旗殿侍二人管押四十人又八門旗六十御龍直一十二人骨朶直十二人御龍弓箭直弩直各十八人御龍直仗劔六人執麋旗殿侍二人管押龍旗二人都知副都知各一人執骨朶殿侍十六人内大将軍改為千牛衛大将軍朝服歩從将軍二人朝服陪乗掌輦四人皇帝乗玉輅駕青馬六駕士一百二十八人扶駕八人骨朶直一百三十四人行門三十五人分左右陪乗将軍二人法駕同宣和駕士増為二百三十四人次奉宸隊御龍直左廂骨朶子直右廂弓箭直弩直御龍四直並以逐班直所管人數列為五重天武骨朶大劔三百一十人次駕後東第五班大黄龍旗一鈞容直三十一人扇筤下天武二十人茶酒班簇輦三十一人招箭班三十三人法駕同宣和止用黄龍旗餘並無次副玉輦一駕青馬六駕士四十人法駕無宣和駕士一百人内人員二人次大輦一掌輦四人應奉人員十二人十将将虞候節級共十人長行三百五十五人尚輦奉御二人殿中少監供奉職官二人令史四人書令史四人法駕同宣和増奉輦為九十人次太僕御馬二十四為十二重法駕减八為八重宣和無太僕次持鈒後隊左右武衛旅帥二人法駕同宣和改為神勇都指揮使次重輪旗二大繖二大雉尾扇四小雉尾扇朱團扇各十二華葢二义二睥睨矟十二御刀六真武幢一义一絳麾二細矟十二法駕小雉尾扁朱團扇睥睨矟各減四華盖减一御刀减二宣和真武幢改為元武幢次左右金吾衛果毅都尉二人並騎總領大角一百二十法駕减四十宣和改都尉為驍騎都指揮使次大晟府後部鼓吹丞二人典事四人管轄指揮使一人羽葆鼓十二帥兵官四人領歌工拱宸管簫笳各二十四帥兵官二人領鐃鼓十二帥兵官四人領歌工簫笳各二十四小横吹一百二十帥兵官