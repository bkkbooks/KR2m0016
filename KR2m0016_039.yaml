四十八貫有奇米四石少監奉三十九貫有奇米三石監丞以下遞減之司天監提㸃奉五十九貫有奇米六石司天監奉五十三貫有奇米五石監丞以下各官遞減之回回司天監少監奉四十二貫米四石五斗餘皆同都水監都水卿奉五十三貫米六石少監奉三十九貫有奇米三石五斗監丞以下遞減之大都路達嚕噶齊及總管奉一百三十貫副達嚕噶齊一百二十貫同知及治中八十貫判官五十五貫推官五十貫經歴以下遞減之外官行省左丞相二百貫平章政事一百六十六貫有奇右左丞同參知政事一百三十三貫有奇郎中以下及一切首領官依其品秩遞減之宣慰司腹裏宣慰使奉中統鈔五百八十貫有奇同知五百貫副使四百十六貫經歴以下遞減之行省宣慰使奉至元鈔八十七貫有奇同知四十九貫副使四十二貫經歴以下遞減之亷訪司亷訪使奉中統鈔八十貫副使四十五貫僉事三十貫經歴以下遞減之鹽運司腹裏運使奉一百二十貫同知五十貫副使三十五貫判官三十貫經歴以下遞減之行省運使八十貫同知五十貫運副四十貫判官三十貫經歴以下遞減之上路達嚕噶齊及總管奉八十貫同知四十貫治中三十貫判官二十貫推官十九貫經歴以下遞減之下路達嚕噶齊及總管奉七十貫同知三十五貫判官二十貫推官十九貫經歴以下遞減之散府達嚕噶齊及知府奉六十貫同知三十貫判官推官十八貫知事以下遞減之上州達嚕噶齊及州尹奉五十貫同知二十五貫判官十八貫知事以下遞減之中州下州達嚕噶齊及州尹以次減十貫其下各減三四五貫不等上縣達嚕噶齊及縣尹奉二十貫中縣減二貫下縣減三貫縣丞以下遞減之中下縣無丞有典史皆一十五貫其諸署諸局各官名目甚繁奉數不能悉載明太祖洪武十三年重定内外文武官嵗給半奉鈔之制正從一二三四品官自千石至三百石每階遞減百石皆給奉鈔三百貫正五品二百二十石從減五十石鈔皆一百五十貫正六品百二十石從減十石鈔皆九十貫正從七品視從六品遞減十石鈔皆六十貫正八品七十五石從減五石鈔皆四十五貫正從九品視從八品遞減五石鈔皆三十貫勒之石至二十五年更定百官禄正一品月奉米八十七石從一品至正三品遞減十三石至三十五石從三品二十六石至四品二十四石從四品二十一石正五品十六石從五品十四石正六品十石從六品八石正七品至從九品遞減五斗至五石而止自後遂為永制幹力白直仗身庶僕親事帳内執衣防閤邑士士力門夫等唐以後歴代皆無其役或有有制而異其名者惟宋之待臣下最優奉養獨厚有隨身傔人任宰相執政及使相至正任刺史以上者有隨身餘止有人宰相并文臣充樞密使同中書門下平章事及樞密使七十人樞密使帶使相侍中樞密使節度使同中書門下平章事已上及帶宣徽使並前兩府除節度使及節度使移鎮樞密使副知院事帶節度使一百人參知政事文臣充樞密副使知院事同知院事及宣徽使不帶節度使僉書樞密院事節度觀察留後知樞密院事并充樞密副使同知樞密院事並帶宣徽使僉書樞密院事三司使門下侍郎中書侍郎尚書左右丞五十人檢校太保僉書樞密院事三十五人權三司使三十人權發遣公事十五人副使判官判三司五人副使判官權并權發遣同觀文殿大學士二十人觀文殿學士資政殿大學士十人資政端明翰林侍讀侍講龍圖天章學士樞密直學士保和宣和延康殿學士寶文顯謨徽猷閣學士七人玉清昭應宫景靈宫會靈觀三副使十人判官五人節度使留後改承宣使觀察使五十人管軍同皇族節度使同中書門下平章事并散節度使帶王爵及節度觀察留後帶郡王五十人觀察使二十人兩省都知押班帶諸司使領節度觀察留後五十人兩省都知押班并横行領觀察使十五人防禦使三十人管軍同皇族并遙領二十人兩省都知押班帶諸司使并諸衛大將軍及横行遙領十五人團練使三十人管軍及軍班除充者同其餘除授者二十人皇族充及帶領十五人兩省都知押班帶諸司使並横行遙領者十人刺史二十人軍班除充者同其餘除授并管軍十人皇族充者十五人兩省都知押班帶諸司使五人横行遙領全分者五人減定者不給内客省使二十人樞密都承㫖十人副都承㫖副承㫖諸房副承㫖中書堂後官提㸃五房公事七人逐房副承㫖五人中書堂後官至樞密院主事以上各二人録事令使寄班小底一人凡隨身則給衣糧傔人則給餐錢其殿閣學士又有茶酒日給五升及一升不等節度副使以下各給厨料六斗麴一石二斗其内臣自宰相至中書提㸃五房又給薪蒿炭鹽外臣不給炭又給馬芻粟及紙外官不給其内外官又給公用錢京師分月給嵗給月給者自三百千至十千不等嵗給者惟尚書都省銀臺司審刑院提舉諸司庫務司不限年月用盡則續給自五千至百千凡十三等外官刺史千五百貫至五百貫凡三等遞増至節度使兼使相有至二萬貫者金諸司都監皆給食直自六十貫至十貫不等其馳驛及長行馬職官日給一品三貫文二品二貫文三品一貫五百文四品一貫二百文五品一貫文六品八百文七品六百文八品九品四百文致仕官禄宋太宗淳化元年五月詔致仕官有曽歴外職任者給半奉以他物充仁宗景祐三年詔曰致仕舊皆給半奉而未嘗為顯官者或貧不能自給非所以遇高年養亷恥也其大兩省大卿監正刺史閤門使以上致仕官自今給半奉如分司官例徽宗大觀二年詔致仕官年八十以上應給半奉者以緡錢充金熙宗皇統元年二月詔諸官職俱至三品而致仕者禄奉傔人各給其半明宰臣致仕者間或遣行人存問賜白金數十兩然皆出自特恩一朝如徐階輩數人而已非常制也職田公廨田宋真宗咸平中令館閣檢閲故事申定職田之制以官莊及逺年逃亡田充悉免租税田戸以浮客充所得課租均分如鄉原例州縣長吏給十之五其兩京大藩府四十頃次藩鎮三十五頃防禦團練州三十頃中上刺史州三十頃下州及軍監十五頃邊逺小州上縣十頃中縣八頃下縣七頃轉運使副十頃兵馬都監押砦主釐務官録事參軍判司等比通判幕職之數而均給之仁宗慶歴中又申定其數凡大藩長吏二十頃通判八頃判官五頃幕職官四頃凡節鎮長吏十五頃通判七頃判官四頃幕職官三頃五十畝凡防團以下州軍長吏十頃通判六頃判官三頃五十畝幕職官三頃其餘軍監長吏七頃判官幕官並同防團以下州軍凡縣令萬户以上六頃五千户以上五頃不滿五千戸四頃凡簿尉萬户以上三頃五千戸以上二頃五十畝不滿五千户二頃録事參軍比本判官曹官比倚郭簿尉發運制置轉運使副武臣總管比節鎮長吏發運制置判官比大藩府通判安撫都監路分都監比節鎮通判大藩府都監比本府判官黄汴河許汝石塘河都大催綱比節鎮判官節鎮以下至軍監諸路走馬承受并砦主都同巡檢提舉捉賊提㸃馬監大都巡河不得過節鎮判官在州監當及催綱撥發巡捉私茶鹽賊盗駐泊捉賊不得過簿尉熙寧以後復加詳定無大損益金制二品已上無職田三品而下在京者亦無職田外官正三品公田三十頃統軍使招討使副使公田二十五頃從三品公田二十一頃正四品副統軍職田十七頃餘官公田十五頃從四品公田十四頃正五品刺史知軍鹽使公田十三頃餘官職田十頃從五品公田七頃正六品公田六頃從七品統軍司知事諸鎮軍都指揮使諸招討使勘事官諸縣令諸警巡副京兆府竹監管勾五品鹽使司判諸部圖埓同提舉上京皇城司同提舉南京京城所黄河都巡河官諸河税𣙜場使職田五頃會安闗使諸知鎮城堡寨職田四頃正八品市令諸録事諸防禦判赤縣丞尉崇福索多巡河官諸酒税使醋使𣙜場副諸都巡檢職田四頃按察司知事大興府知事招討使知事諸副都巡檢諸節鎮以上司獄諸副將職田二頃從八品諸州軍判官諸京縣丞諸次劇縣丞諸三品鹽使判官漕運使管勾永豐廣備庫副使左右别貯院木場使諸黙濟格諸額勒金職田三頃正九品諸警巡院判官諸縣丞諸酒税副使職田三頃市丞諸司候諸主簿諸録判諸縣尉散巡河官黄河埽物料場官諸鹽場管勾左右别貯院木場副使永豐廣備庫判諸都將隊將諸州軍司獄職田二頃從九品諸教授司候判官職田二頃天徳二年省臣奏職官公田嵗入有數前此百姓各隨公宇就輸而吏或多取以傷民宜送之官倉均定其數與月奉隨給然田之多寡不均有無不一或亦隨其一時之權宜而定者也元世祖至元三年定隨路府州縣官員職田上路達嚕噶齊及總管十六頃同知八頃治中六頃府判五頃下路達嚕噶齊及總管十四頃同知七頃府判五頃散府達嚕噶齊及知府十頃同知六頃府判四頃上州達嚕噶齊及州尹十頃同知五頃州判四頃中州達嚕噶齊及知州八頃同知四頃州判三頃下州達嚕噶齊及知州六頃州判三頃警巡院達嚕噶齊及警使五頃警副四頃警判三頃録事司達嚕噶齊及録事三頃録判二頃縣達嚕噶齊及縣尹四頃縣丞三頃主簿二頃縣尉主簿兼尉並同經歴四頃十四年定各道按察使十六頃副使八頃僉事六頃至二十一年定江南行省及諸司職田比腹裏減半如上路達嚕噶齊及總管十六頃皆八頃餘各官悉依此制増運司官運使八頃同知四頃運副及運判三頃經歴及知事提控案牘二頃鹽司官鹽使及鹽副二頃鹽判一頃各場正同管勾一頃明初諸王公主勲戚及内監寺觀皆有賜乞莊田百官皆有職田皆謂官田英宗正統元年令蘇松浙江等處官田凖民田起科欽定續通典卷三十九
