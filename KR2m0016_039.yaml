body:
  text: 職官禄秩幹力衣白直閣仗身士庶僕力親事夫帳内執防邑士門等並附唐制禄秩之數至徳以前已詳載杜佑通典至徳宗建中三年復減百官料錢以助軍李泌為相又増百官及畿内官月俸復置手力資課嵗給錢六十一萬六千餘緡文官千八百九十二員外官八百九十六員左右衛十將軍以下又有六雜給一曰糧米二曰鹽三曰私馬四曰手力五曰隨身六曰春冬服私馬則有芻豆手力則有資錢隨身則有糧米鹽春冬服則有布絹絁紬綿射生神策軍大將軍以下増以鞋比大厯以前制禄又厚矣後唐明宗天成中百官奉錢皆折估自五月給漢隠帝乾祐中仍後唐制加其估直周世宗顯徳五年詔凡諸色俸户並勒歸州縣宋禄粟之制宰相叅知政事樞密使同中書門下平章事樞密使副使知院事同知院事及宣徽使簽書樞密院事節度觀察留後知樞密院事及充樞密副使同知樞密院事并帶宣徽使簽書檢校太保簽書及三司使中書門下侍郎尚書左右丞太尉月各一百石樞密使帶使相節度使同中書門下平章事以上及帶宣徽使并前兩府除節度使樞密使副知院事帶節度使月各二百石三公三少一百五十石權三司使公事七十石權發遣使三十五石内客省使二十五石節度使一百五十石管軍同知皇族節度使同中書門下平章留事并散節度使及帶王爵者並一百石後後改承宣使觀察防禦使一百石管軍并兩省都知押班諸衛大將軍横行遙領者同惟皇族遙領防禦使七十石團練使七十石管軍并皇族及軍班除充者同其餘正任並五十石若皇族並兩省都知押班諸衛大將軍將軍横行遙領者同刺史五十石皇族並軍班除充者同其餘正任並管軍三十石兩省都知押班通侍大夫遙領者二十五石諸衛大將軍將軍遙領者十石横行遙領者全分二十五石減定十石捧日天武左右廂都指揮使龍衛神衛右廂都指揮使帶遙郡團練使五十石殿前諸班直都虞候龍衛神衛及諸軍都指揮使帶遙郡刺史二十五石凡一石給六斗米麥各半管軍支六分米四分麥赤令七石丞四石京府司録五石諸曹參軍四石至三石有二等畿縣知縣六石至三石有四等主簿尉米麥三石至二石有二等諸州録事五石至三石有三等司理司法四石至三石有二等司戸三石二石有二等諸縣令五石至三石有三等惟河南洛縣令隨戸口支簿尉三石二石有二等西京軍巡判官四石軍監判官防團推官二石司天監丞四石主簿靈臺郎保章正二石以上並給米麥入内内侍省供奉官至打牧祗應四石至一石五斗不一以上並給粳米祇候殿頭至後苑散内品三石雲韶部内品一石以上並給月糧惟雲韶内品給細色内侍省供奉官至黄門三石至一石五斗不一以上並給粳米黄門内品至入内小黄門二石至一石不等寄班小底四石以上並給月糧惟入内小黄門給細色殿頭内侍入内高班各一石米麥各半神宗熙寧二年中書門下言天下選人奉薄多少不一不足以勸亷吏欲月増米麥料錢縣令録事參軍三百七十六員舊請米麥三石者並増至四石司理司法司户主簿縣尉二千五百十三員舊請米麥二石者並増至三石防團軍事推官軍監判官一百七十二員舊請米二石者並増至三石每月通増米三千七十餘石從之其禄奉匹帛宰相樞密使月三百千春冬服各綾二十匹絹三十匹各綿百兩樞密使帶使相以下樞密使副知院帶節度使以上四百干參知政事以下三司使以上二百千春冬各綾十匹春絹十匹冬二十匹綿五十兩自宰相而下春冬加羅一匹節度觀察留後以下簽書樞密院事以上三百千綾絹羅綿同參知政事各殿閣大學士直學士學士三師三公百二十千綾絹諸物遞減東宫三師僕射九十千東宫三少御史大夫尚書六十千門下中書侍郎以下御史中丞以上五十千太子賓客四十五千左右散騎常侍六十千給事中以下詹事以上四十五千諫議四十千權三司使并權發遣公事副使五十千以上綾綿等物各以次減左右諭徳至郎中三十五千左右庶子以下赤令以上各三十千丞十五千少詹事二十九千左右正言以下大理正以上各二十千太子率更以下殿中省五尚奉御以上各十八千以上綾綿等物亦各因其品秩而差等之司天十五千正十三千秘書郎至大理寺丞各十四千諸寺監丞十二千大理評事十千太祝奉禮八千司天監丞主簿各五千靈臺郎三千保章正二千以上各有綾絹等物惟靈臺郎冬隨衣錢三千節度使四百千節度觀察留後三百千觀察使二百千防禦使三百千團練使百五十千以上春冬各給綾絹羅綿等物各隨其職事為差等六軍統軍百千諸衛上將軍六十千左右金吾衛大將軍三十五千諸衛大將軍二十五千將軍二十千率府率副率中郎將十三千以上春冬亦各有綾綿等物内客省使六十千客省使三十七千延福宫及昭宣閤門各使俱二十七千皇城以下諸司使二十五千客省及皇城以下諸司副使二十千内殿承制十七千崇班十四千供奉官十千侍禁七千殿直五千三班奉職借職四千下茶酒班殿侍一千下班殿侍七百以上各有春冬綾絹綿不給羅皇親任諸衛大將軍領刺史八千据宋志原文當有脱字謹闕疑將軍刺史六十千將軍三十千率府率二十千副率十五千其春冬綾絹外加給羅其入内内侍省及内侍省有職事黄門月給錢自二十五千至五百三百不等亦有絹綿等物不給綾各省院堂後官主書令史亦月給錢帛其各省院寺監正任權試各官多一分給錢二分給物外任亦然其在廣東川陜者並給見錢元豐官制行又加増減然亦無大損益其武臣奉給在内自殿前司都指揮使下至各班各直各軍逐分為等以次差降奉錢多者三十千少者一千禄粟多者十五石少者二石侍衛馬軍歩軍司都虞候下至六軍諸衛官士奉錢自二十千遞降至三百粟自五石至二石各有差在外諸道州府廂軍自馬步軍都指揮使至牢城副都頭月給奉錢自十五千至五百凡十有二等其嵗給春冬服絹油絹而外各加綿布錢有差太祖乾徳四年詔曰州縣官奉皆給他物頗聞貨鬻不充其直責以亷隅斯亦難矣至有賦于㕓肆重増煩擾漢乾祐中置州縣奉户除二税外蠲其他役周顯徳中始革其制自今宜遂處置囬易料錢户每本官所受物凡一千分納兩戸恣其貿易户輸錢五百蠲役之令悉如漢詔所賦官物令諸州計度充一嵗所給之數與蠶鹽同時並給之其萬戸縣令五萬户州録事兩京司録舊月奉錢二萬者給四十戸率是為差簿尉及戸法掾舊月奉六千者增一千如其所增之數給與奉戸是嵗令西川官全給實錢開寶三年令西川州縣官常奉外别給鐵錢五千四年十二月詔節度防團副使權知州事節度掌書記自朝廷除授及判别㕔公事者亦如之副使非知州掌書記奏受而不釐務者悉如故給以折色太宗太平興國元年詔曰耕織之家農桑為本奉戸月輸緡錢蠢兹庶民不易營置罷天下奉戸其本官奉錢並給以官物令貨鬻及七分仍依顯徳五年十二月詔増給米麥二年二月詔諸道所給幕職州縣官奉頗聞官佑價高不能充七分之數宜令三分給一分見錢二分折色令通判面估定官物不得虧損其價又令西川諸州幕職官奉外更給錢五千雍熙三年文武官折支奉錢舊以二分者自今並給以實價端拱元年詔曰州郡從事之職皆參贊謀畫助宣條教而州縣之任並飭躬蒞政以綏吾民廩禄之制宜從優異庶幾豐泰責之亷隅除川陜嶺南已給見錢外其諸州府幕職州縣官料錢舊三分之二給以他物自今半給緡錢半給他物淳化三年十一月令京東西河北河東陜西幕職州縣官料錢當給他物者每千給錢七百至道二年詔先是京官滿三十月罷給自今續給之真宗即位以三司估百官奉給折支直率增數倍詔有司重定率優其數咸平元年六月詔文武羣臣有分奉他所而身殁未聞訃已給者例追索可憫自今川陜廣南福建一季餘處兩月悉蠲之三年九月詔羣臣月奉折支物無收其算五年七月増川陜路朝官使臣等月給奉支景徳四年九月帝以承平日久賦斂至薄軍國用度之外未嘗廣費自奉且以庶官食貧勸事遂詔自今掌事文武官月奉給折支京師每錢一千給實錢六百在外四百願給他物者聴大中祥符五年詔文武官並増奉自乾興以後更革為多至嘉祐始著禄令元豐一新官制職事官職錢視嘉祐為優崇寧而後較元豐制禄復倍増矣遼禄秩無考金百官奉給正一品三師錢粟三百貫石麴米麥各五十稱石春秋衣羅綾各五十匹絹各二百匹綿千兩三公錢粟二百五十貫石麴米麥各四十稱石春秋衣羅綾各四十匹絹各一百五十匹綿七百兩親王尚書令錢粟二百二十貫石麴米麥各三十五稱石春秋衣羅綾各三十五匹絹各一百二十匹綿六百兩熙宗皇統二年定制皇兄弟及子封一字王者為親王給二品奉餘宗室封一字王者以三品奉給之海陵天徳二年以三師宰臣以下有以一官而兼數職者又有親王食其禄而復領他事者前此並給以奉今宜從一高其兼職之奉並不重給至世宗大定二十六年詔有一官而兼數職其兼職得罪亦不能免而無廩給可乎遂以職務煩簡定為分數給兼職之奉從一品左右丞相都元帥樞密使郡王開府儀同三司錢粟二百貫石麴米麥各三十稱石羅綾各三十匹絹各一百匹綿五百兩平章政事錢粟一百九十貫石麴米麥各二十八稱石羅綾各二十五匹絹各九十五匹綿四百五十兩大宗正錢粟一百八十貫石麴米麥各二十五稱石羅綾同上絹各九十匹綿四百兩正二品東宫三師副元帥左右丞錢粟一百五十貫石麴米麥各二十二稱石羅綾各二十二匹絹各八十匹綿三百五十兩從二品錢粟一百四十貫石麴米麥各二十稱石羅綾各二十匹絹各七十五匹綿三百兩同判大宗正錢粟一百二十貫石麴米麥各十八稱石羅綾各十八匹絹各七十匹綿二百五十兩正三品錢粟七十貫石麴米麥各十六稱石羅綾各十二匹絹各五十五匹綿二百兩外官錢粟一百貫麴米麥各十五稱石絹各四十匹綿二百兩統軍使招討使副使錢粟八十貫石麴米麥十三稱石絹各三十五匹綿一百六十兩都運府尹錢粟七十貫石麴米麥十二稱石絹各三十匹綿百四十兩從三品錢粟六十貫石麴米麥各十四稱石羅綾各十匹絹各五十匹綿一百八十兩外官錢粟六十貫石麴米麥各十稱石絹各二十五匹綿一百二十兩正四品錢粟四十五貫石麴米麥各十二稱石羅綾各八匹絹各四十匹綿一百五十兩外官錢粟四十五貫石副統軍錢粟五十貫石麴米麥各八稱石絹二十二匹二十疋綿八十兩七十兩有差從四品錢粟四十貫石麴米麥各十稱石羅綾各六匹絹各三十匹綿一百三十兩外官錢粟四十貫石麴米麥各七稱石絹各十八匹綿六十兩明安錢粟四十八貫石烏爾古使同大定二十年詔明安穆昆奉給令運使折支銀絹省臣議若估粟折支各路運司儲積多寡不均宜令依舊支請牛頭税粟如遇凶年盡貸與民其奉則于錢多路府支放錢少則支銀絹亦未晚也從之正五品錢粟三十五貫石麴米麥各八稱石羅綾各五匹絹各二十五匹綿一百兩外官刺史知軍鹽使錢粟三十五貫石麴米麥各六稱石絹各十七匹綿各五十五兩餘官錢粟三十貫石麴米麥六稱石從五品官羅綾各五匹絹各二十匹綿八十兩外官錢粟二十五貫石麴米麥各四稱石絹各十匹綿四十兩穆昆錢粟二十貫石正六品錢粟二十五貫石麥五石絹各十七匹綿七十兩外官與從六品皆錢粟二十貫石麴米麥三稱石絹各八匹綿三十兩從六品錢