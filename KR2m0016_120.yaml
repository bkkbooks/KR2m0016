body:
  text: 刑峻酷唐五代宋遼金元明唐肅宗初監察御史敬羽兇暴不能忍嘗作巨枷號􅬷尾榆囚人多死又仆囚於地以門牡轢其腹謂之肉餺飥掘地實棘蒙以席瀕坎鞫囚不服則擠之坎人多濫死有康謙者以賈富嘗納金於楊國忠授安南都䕶領山南東路驛事吏誣其通史朝義羽鞫之謙鬚長三尺明日脫盡膝踝皆碎人視之驚以為鬼乃殺之寳應初斥為道州刺史詔追殺之羽聞使者至將逃吏械之臨死袖中出牒數畨乃吏相告訐語咤曰不及推死矣治州者宜無寢徳宗時韓滉為兩浙觀察使嘗禁部内宰殺耕牛婺州傍縣有犯其令誅及鄰伍死者數百人又遣推覆官分察境内情涉疑似必寘極法誅戮殘忍一判即勦數十人月無虚日雖令行禁止而寃濫相尋李實為京兆尹恃寵強愎不顧文法貞元二十年闗中大饑實匿災不報百姓至撤屋賣苖麥以供賦優人成之端因戲作語為秦民難苦之狀實怒坐以誹謗朝政立誅殺之明年詔蠲畿内逋租實違詔徴歛窮民大擾官吏多遭笞罰追呼掊克聚錢三十萬貫胥吏有絲毫乞丐者固死無犯者且曰死亦不屈每杖殺之京師無貴賤莫不切齒順宗在諒闇逾月實斃人於府者十數事聞貶為通州長史制出市人皆袖瓦石將碎其首乃間道而遁憲宗元和十一年桞公綽拜京兆尹方赴府有神策校乗馬不避者即時搒死帝怒其専殺公綽曰此非獨試臣乃輕陛下法帝曰既死不以聞可乎公綽曰臣不當奏在市死職金吾在坊死職左右巡使帝乃解御批恭繹輯覽曰躍馬衝導罪之細者京兆雖以肅清輦轂通鑑為任豈可因衝已導而遽斃軍將公綽此舉非惟草菅人命亦且弁髦王章或猶以為風厲真不知政衡者聖論誅其専擅之罪至為允當其心并非峻酷所能賅而其事則殘忍故附輯於此漢髙祖時四方盜賊多朝廷患之特重其法分遣使者捕逐中書侍郎蘇逢吉草詔凡盜所居本家及隣保皆族誅或謂逢吉曰為盜族誅已非王法况隣保乎逢吉恡以為是不得已但省去族誅字於是鄆州捕賊使者張令柔盡殺平隂縣十七村民衛州刺史葉仁魯聞部有盜自率兵捕之時村民十數共逐盜入於山中盜皆散走仁魯後至見民捕盜者以為賊悉擒之斷其脚筋暴之山麓宛轉呼號累日而死聞者不勝其寃而逢吉以仁魯為能由是天下因盜殺人滋濫逢吉為人貪詐無行喜為殺戮髙祖初鎮河東嘗以生日遣逢吉疏理獄囚以祈福謂之靜獄逢吉入獄囚無輕重曲直盡殺以報曰獄靜矣有庶兄自外來未白逢吉而見其諸子逢吉怒託以他事告於髙祖杖殺之其慘忍如此時侍衛都指揮使史𢎞肇性尤殘刻河中鳳翔永興三鎮連叛人情洶懼流言以相驚恐𢎞肇出兵警察務行殺戮罪無大小皆死時太白晝見民仰觀者輒腰斬於市市有醉者忤一軍卒軍卒誣其訛言遂棄市凡民抵罪吏以白𢎞肇但伸三指示之即腰斬又為斷舌決口斮筋折足之刑偹極慘毒周世宗用法過嚴往往傷於慘刻翰林醫官馬道元進狀訢夀州界被賊殺其子獲正賊見在宿州本州不為勘斷帝大怒遣竇儀乗驛往按獄成坐族死者二十四家宋州巡檢供奉官竹奉璘捕盜不獲左羽林大將軍孟漢卿監納取耗刑部員外郎陳渥檢田失實濟州馬軍都指揮使康儼治橋道不謹内供奉官孫延希督修永福殿而役夫有就瓦中噉飯者宻州防禦副使侯希進不奉使者命檢視夏苖左藏庫使符令光造軍士複𥜗不辦楚州防禦使張順隠落稅錢皆抵極刑時論寃之南漢劉龑性苛酷為刀鋸支解刳剔之刑每視殺人則不勝其喜不覺朶頥垂涎呀呷人以為真蛟蜃也宋太宗時開封民王元吉為後母所誣繫左軍巡獄獄卒縶縳搒治極其慘毒謂之鼠彈箏及事白帝命即以其罪罪之真宗朝京東兩浙轉運時孫何性卞急頗事苛察日有捶楚官屬罹譴罰者甚衆從者依憑其威妄為寒暑所至騷然州縣吏患之乃求古碑字磨滅紙本掲之館中何至則細讀辨識文字以爪搔髮垢而嗅之遂往往至日暮不復省錄文案而去韓縝知秦州指使傅勍夜被酒悮隨入州宅縝令軍校以鐡裹杖捶死勍妻持血衣撾登聞鼔院以訴落職分司南京秦人語曰寧逢乳虎莫逢玉汝玉汝縝字也蔡確於元豐間為御史中丞太學虞蕃訟學官確深探其獄連引朝士自翰林學士許將已下皆逮捕械繫令獄卒與同寢處飲食旋溷共為一室設大盆於前凡羮飯餅胾舉投其中以杓混擾分飼若犬豕久繫不問及問則無事不承矣確遂劾叅知政事元綘有所屬請神宗出綘知毫州而以確代其位哲宗紹聖中董必提舉湖南常平時相章惇方置衆君子於罪孔平仲在衡州以倉粟腐惡乘饑嵗稍損價發之必即劾其戾常平法置鞫長沙以承惇意無辜繫訊多死者平仲坐徙韶州惇與蔡卞將大誅流人遣必往廣西察訪帝既止不治必所至猶以慘刻按脅立威為五書歸奏寧宗時有吴淵者厯官江浙間政尚嚴酷好興羅織之獄所至籍入豪横世有蜈蚣之謡理宗用刑寛恤而法吏舞姦不勝其弊每歲冬夏詔提刑行郡決囚提刑憚行悉委倅貳倅貳復委幕屬所委之人類皆肆行威福以要餽遺監司郡守下及州縣莫不恣行横暴意所欲殺輒殺之呼喝吏卒嚴限日期監勒招承催促結欵而又擅置獄具非法殘民或斷薪為杖掊擊手足名曰掉柴或木索并施夾兩脰名曰夾幫或纒繩於首加以木楔名曰腦篐或反縳跪地短䜿堅木交辮兩股令獄卒跳躍於上謂之超棍法無拘鎻之條時州縣一時彈壓盜賊姦暴罪不至配者故拘鎻之或一月兩月或一季半年俾之省愆竟無限放亦不支口食淹滯囚繫死而後己又以己私摧折手足拘鎻尉砦亦有豪強賂吏羅織平民而囚殺之甚至户婚詞訟亦皆收禁有飲食不充飢餓而死者有無力請求吏卒凌虐而死者有為兩詞賂遺苦楚而死者懼其發覺先以病申名曰監醫實則已死至度宗時雖累詔切責禁止終莫能勝焉遼穆宗嗜酒及獵不恤政事五坊掌獸近侍奉膳掌酒人等以獐鹿野豕鶻雉之屬亡失傷斃及私歸逃亡在告踰期召不時至或以奏對小不如意或以飲食細故或因犯者遷怒無辜輒加炮烙鐵梳之刑時或手刃刺人斷手足爛肩股折腰脛劃口碎齒鋸灼梟磔棄屍於野往往築封以為京觀應厯十年以後時為長夜彌月之飲醉中誅戮愈横監雉詳衮夀格寧古等斃雉而亡獲之將誅殿前都檢㸃耶律伊勒哈諫曰法不當死不聴殺而支解之以屍付伊勒哈曰收汝故人命有司取鹿人之在繫者六十五人斬所犯重者四十四人餘悉痛杖之道宗太康中耶律伊遜窮治蕭蘇色等獄恐上疑引數人庭詰各令荷重校以繩繫其頸皆昏憒不能出氣惟求速死伊遜反奏曰别無異辭遂戮耶律薩喇等三十五人又殺蘇色等諸子其幼稚及婦女奴婢資産悉籍沒以分賜舊臣時方暑屍不得瘞以至腐臭乾統以來賞罰無章叛亡相繼天祚大恐益務繩以嚴酷初太祖因治諸弟逆黨權宜立法設為投崖砲擲釘割臠解之刑至是復興焉金初法制簡易天㑹已來漸用吏議以杖折徒累及二百州縣立威甚者置刃於杖虐於肉刑熈宗皇統已後酗酒妄殺后妃宗室大臣率無故被戮九年五月以天變肆赦翰林學士張鈞草詔叅知政事蕭肄摘其語以為誹謗帝大怒命衛士拽鈞下殿搒之數百不死手劍𠢐其口而醢之時有鄭建充者為平凉尹性剛暴常畜猘犬十數奴婢有罪既笞己復嗾犬齧之骨肉都盡海陵猜忌殘忍以篡弑得國即位之初殺太傅領三省事宗本等百二十餘人又以詐書殺行臺左丞相薩里罕等皆夷其族以魏王威泰之孫呼爾察好修􅎖族之自是已後翦滅宗室鈎棘傅㑹無歲不有誅戮宣宗喜刑罰大臣已下往往被笞楚至用刀杖决殺言者及果勒齊用事威刑自恣定制有司犯姦贓的决㣲過亦然風紀臣失糾亦决考滿校其受決多寡以為殿最南遷之後習以成風雖士大夫亦為所移如右丞圖克坦思忠好用麻椎擊人號麻椎相公運使李特立號半截劍言其短小鋒利也刑部郎中馮璧號馮劊雷淵為御史至蔡州得姦豪杖殺五百人號曰雷半千又有完顔瑪克沁楚皆以酷聞元初未有法守百司斷獄襲用金律頗傷嚴刻世祖刋定至元新格頒行英宗又損益之為大元通制漸近平恕初憲宗時斷事官伊囉斡齊與布扎爾總天下財賦於燕視事一日殺二十八人其一人盜馬者既杖而釋之矣適有獻刀環者遂追還所杖之人手試刀斬之世祖至元中湖廣行省平章政事約蘇穆爾貪縱淫虐誅求無厭或妄言初歸附時州縣長吏及吏胥富人比屋歛銀將輸之官銀已具而事終止約蘇穆爾即下令責民自實使者旁午隨地置獄株連蔓引偹極慘酷民以拷掠瘐死者載道明太祖開國之初懲元季貪冒重繩贓吏其法至剥皮囊草諭刑部凡官吏有犯宥罪復職書過榜其門使自省不悛論如律洪武十八年大誥三篇成所列凌遲梟示種誅者無慮千百棄市已下萬數貴溪儒士夏伯啓叔姪斷指不仕蘇州人才姚潤王謨被徴不至皆誅而籍其家寰中士夫不為君用之科所由設也其三編稍寛容然所記進士監生罪名自一犯至四犯者猶三百六十四人幸不死還職率戴斬罪治事其推原中外貪墨所起以六曹為罪魁郭桓為誅首郭桓者户部侍郎也帝疑北平二司官吏李彧趙全徳等與桓為姦利自六部左右侍郎以下皆死贓七百萬詞連直省諸官吏繫死者數萬人覈贓所寄借徧天下民間中人之家大抵皆破時咸歸謗御史余敏丁廷舉或以為言帝乃手詔列桓等罪而論右審刑吳庸等極刑以厭天下心先是空印事發誅殺已過當其後胡惟庸藍玉兩獄株連死者且四萬他如僉都御史嚴徳珉以辭官黥戍蘇州知府魏觀以上梁文腰斬馮勝傅友徳俱開國功臣並以無罪賜死議者病其險刻時吏部尚書詹徽性殘忍用刑慘厲常侍懿文太子録囚太子屢欲有所出徽輒文附重法太子為白帝帝先入徽言曰徽執者法也太子因言立國以仁厚為本帝曰汝欲自為帝耶太子懼因感疾卒成祖靖難後悉指忠臣為奸黨甚者加族誅妻女發浣衣局教坊司親黨謫戍者至隆萬間猶勾伍不絶御史大夫景清以早朝懐刃事覺磔死族之籍其鄉轉相攀染謂之𤓰蔓抄村里為墟抗拒者既盡被殺戮又懼人竊議之疾誹謗特甚任用陳瑛吕震紀綱輩専以羅織為事於是蕭議周新解縉等多無罪死武宗時磔流賊趙璲等於市剥為魁者六人皮法司奏祖訓有禁不聴尋以皮製鞍鐙帝每騎乗之世宗性猜忌寃濫相尋雖間命寛恤而意主苛刻中年益惡言者中外相戒無敢觸忌諱兵科給事中楊元繩以謗毁𤣥修死西市御史楊爵疏詆符瑞詞過切直下詔獄搒掠血肉狼籍闗以五木死一夕復甦所司請送法司擬罪不許命嚴錮之主事周天佐御史浦鋐以救爵先後箠死獄中工部員外郎劉魁給事中周怡皆以言事同繫厯五年不釋既而有神降於乩感其言出之未踰月尚書熊浹疏言乩仙之妄帝怒復令東厰追執之比三人同繫鎮撫獄桎梏加嚴飲食屢絶且令伺其言動五日一奏聞謂之監帖莊烈帝承神宗廢弛熹宗昏亂之後銳意綜理用刑頗急十一年南通政徐石麟疏救鄭三俊因言皇上御極以來諸臣麗丹書者㡬千圜扉為滿使情法盡協猶屬可憐况怵惕於威嚴之下者有將順而無挽回有揣摩而無補救株連蔓引九死一生豈聖人惟刑之恤之意哉十四年大學士范復粹疏請清獄言獄中文武纍臣至百四十有竒大可痛皆不報刑法有創之自明不衷古制者廷杖東西厰錦衣衛鎮撫司獄是已洪武時永嘉侯朱亮祖父子工部尚書夏祥皆斃杖下宣徳三年怒御史嚴皚方鼎何傑等久不朝叅命枷以徇自此言官有荷校者至正統中王振擅權尚書劉中敷侍郎吴璽陳瑺祭酒李時勉率受廷杖成化十五年汪直誣陷侍郎馬文昇都御史牟俸等詔以科道李俊王濬等五六人容隠廷杖人二十正徳十四年以諫止南巡廷杖修撰舒芬等百四十六人死者十一人金吾衛都指揮僉事張英自刃以諫衛士奪刃得不死亦杖殺之嘉靖三年羣臣爭大禮廷杖翰林學士豐熈等百三十四人死者至十六人中年刑法益峻受廷杖者愈多宣大總督翟鵬薊州巡撫朱方以撤防早宣大總督郭宗臯大同巡撫陳燿以敵入大同刑部侍郎彭黯左都御史屠僑大理卿沈良才以議丁汝䕫獄緩戎政侍郎蔣應奎左通政唐國相以子弟冒功皆逮杖之方燿斃於杖下而黯僑良才杖畢趣治事公卿之辱前此未有又因正旦朝賀怒給事中張思靜等皆朝服予杖天下莫不駭然四十餘年間杖殺朝士倍蓯前代萬厯六年以爭閣臣張居正奪情杖編修吴中行等五人其後主事盧洪春給事中孟養浩王徳完軰咸以建言被杖多者至一百自十二年至三十四年内外官杖戍為民者共百四十人天啓時太監王體乾奉勑大審重笞戚畹李承恩以恱魏忠賢於是萬燝吴裕中斃於杖下臺省力爭不得閣臣葉向髙言數十年不行之敝政三見於旬日萬萬不可再行忠賢乃罷廷杖而以所欲殺者悉下鎮撫司士大夫益無噍類矣南京行杖始於成化十八年南御史李珊等以歲祲請賑帝摘其疏中訛字令錦衣衛詣南京午門前人杖二十守偹太監監之至正徳間南御史李熈劾貪吏觸怒劉瑾矯㫖杖三十時南京禁衛久不行刑選卒習數日乃杖之㡬斃東厰之設始於成祖立厰於東安門北令嬖倖者提督之緝訪謀逆妖言大姦惡等至憲宗時尚銘領東厰又别設西厰以汪直督之所領緹騎倍東厰自京師及天下旁午偵事雖王府不免直復任錦衣百户韋瑛為心腹屢興大獄建寧衛指揮楊昱故少師榮曽孫也與父泰為仇家所告逃入京匿姊夫董璵所璵為請瑛陽諾而馳報直直即捕昱璵考訊三琵之琵者錦衣酷刑也骨節皆寸解絶而復甦昱不勝苦妄言寄金於其叔父兵部主事士偉家直不復奏請捕士偉下獄並掠其妻孥獄具昱死獄中泰論斬直中廢復用先後凡六年寃死者相屬㑹直數出邊監軍大學士萬安奏罷西厰於是尚銘専用事未㡬亦黜正徳元年復設西厰以命谷大用邱聚領東厰皆劉瑾黨也兩厰爭用事瑾又改惜薪司外薪厰為辦事厰榮府舊倉地為内辦事厰自領之京師謂之内行厰雖東西厰皆在伺察中加酷烈焉凡瑾所逮捕一家犯隣里皆坐或瞰河居者以河外居民坐之且創例罪無輕重皆決杖永逺戍邊或加項發遣枷重至百五十斤不數日輒死尚寳卿顧璿副使姚祥工部郎張瑋御史王時中輩並不免瀕死而後謫戍御史柴文顯汪澄以㣲罪至凌遲官吏軍民非法死者數千瑾誅西厰内行厰俱革獨東厰如故張銳領之與衛使錢寧並以緝事恣羅織至嘉靖二年苪景賢領厰事任千户陶淳多所誣陷萬厯初馮保以司禮兼厰事建厰東上北門之北曰内厰而以初建者為外厰天啓時魏忠賢以秉筆領厰事用衛使田爾耕鎮撫許顯純之徒専以酷虐鉗中外而厰衛之毒極矣凡中官掌司禮監印者其屬稱之曰宗主而督東厰者曰督主東厰之屬無専官掌刑千戸一理刑百戸一亦謂之貼刑皆衛官其𨽻役悉取給於衛最輕黠儇巧者乃撥充之役長曰檔頭帽上銳衣青素􅹑褶繫小條白皮鞾専主伺察其下畨子數人為幹事京師亡命誆財挟讐視幹事者為窟穴得一隂事由之以宻白於檔頭檔頭視其事大小先予之金事曰起數金曰買起數既得事帥畨子至所犯家左右坐曰打樁畨子即突入執訊之無有左證符諜賄如數徑去少不如意搒治之名曰亁醡酒亦曰搬罾兒痛楚十倍官刑且授意使牽有力者有力者予之多金即無事或靳不予予不足即上聞下鎮撫司獄立死每月旦厰役數百人掣簽庭中分瞰官府其視中府諸處㑹審大獄北鎮撫司考訊重犯者曰聴記他官府及各城門訪緝者曰坐記某官行某事某城門得某奸胥吏疏白坐記者上之厰曰打事件至東華門雖夤夜投隙中以入即屏人達至尊以故事無大小天子皆得聞之有四人夜飲宻室一人酒酣嫚罵魏忠賢其三人噤不敢出聲罵未訖畨子攝四人至忠賢所即磔罵者而勞三人金莊烈帝即位忠賢伏誅而王體乾王承祚鄭之恵李承芳曹化淳王徳化王之心王化民齊本正等相繼領厰事告宻之風未嘗息也徳化及東厰理刑吳道正等偵閣臣薛國觀隂事國觀由此死崇禎十五年御史楊仁愿疏請寛東厰事件復切言緹騎不當遣帝雖戒諭厰衛而倚毗益甚至國亡乃已錦衣衛即古詔獄太祖時天下重罪逮至京者收繫獄中數更大獄多使斷治所誅殺甚多然其後悉焚刑具申明禁令具寛恕篇成祖寵幸紀綱令治錦衣親兵復典詔獄綱遂用其黨莊敬袁江王兼李春等縁借作奸數百千端乆之族綱而錦衣典詔獄如故終明之世遂廢洪武詔不用矣英宗初王振用指揮馬順毒流天下天順復辟指揮門達鎮撫逮杲怙寵羅織達遣旗校四出杲又立程督並以獲多為主千户黄麟之廣西執御史吳禎至索獄具二百餘副天下朝覲官陷罪者甚衆杲死達兼治鎮撫司搆指揮使袁彬繫訊之五毒更下僅免具舞紊篇朝官楊璡李觀輩皆鋃鐺就逮盖自紀綱誅其徒稍戢至正統時復張天順之末禍益熾朝野相顧惴惴不自保正徳中旗校王邦竒貪饕搏噬有若虎狼其捕奸盜也或以一人而牽十餘人或以一家而連數十家鍜鍊獄詞付之司㓂謂之鑄銅板其緝妖言也或用畨役四出搜愚民詭異之書或購奸僧潛行誘愚民彌勒之教然後從而掩之無有解脫謂之種妖言數十年内死者填獄生者寃號不可勝記鎮撫司分南北北司専理詔獄建設具職官典初衛獄附衛治至門達掌問刑又於城西設獄舍拘繫狼籍正徳時衛使石文義與張綵表裏作威時稱為劉瑾左右翼祖制凡朝㑹厰衛率屬及校尉五百名列侍奉天門下紏儀失儀者即褫衣冠執下鎮撫司獄杖之乃免迨萬厯中始罷其制時告訐之風稍衰故大臣被録者寡然建言及忤礦稅璫者輒下詔獄刑科給事中楊應文言監司守令及齊民被逮者百五十餘人雖已打問未送法司獄禁森嚴水火不入疫癘之氣充斥囹圄衛使駱思恭亦言熱審歲舉俱在小滿前今二年不行鎮撫司監犯且二百多抛瓦聲寃鎮撫司陸逵亦言獄囚怨恨有持刀斷指者俱不報魏忠賢起楊左之獄具舞紊篇許顯純輩定爰書坐贓比較立限嚴督之五日一追比明史刑法志云兩日為一限兹據左光斗傳輸金不中程者受全刑曰械曰鐐曰棍曰桚曰夾棍五毒偹具呼謈聲沸天血肉潰爛宛轉求死不得顯純叱咤自若一夕令諸囚分舍宿於是獄卒曰今夕當有壁挺者壁挺獄中言死也明日漣死光斗等次第皆鎻項拉死自劉瑾創立枷錦衣獄常用之神宗時御史朱應轂具言其慘請除之不聴至忠賢益為大枷又設斷脊墮指剥皮剜舌之刑盖厰禍至忠賢而極矣莊烈帝疑羣下王徳化掌東厰以慘刻輔之孟明掌衛印時有縱舍然觀望厰意不敢違而鎮撫梁清宏喬可用朋比為惡凡搢紳之門必有數人往來蹤跡故常晏起早闔毋敢偶語旗校過門如被大盜官為囊槖均分其利京城中奸細潛入傭夫販子隂為流賊所遣無一舉發而髙門富家跼蹐無寧居其徒黠者恣行請託稍拂其意飛誣立搆摘竿牘片字株連至數十人秕政淪胥刑章顛覆於斯為極云欽定續通典卷一百二十
