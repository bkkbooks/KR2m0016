body:
  text: 禮吉大雩唐五代宋遼金元明唐肅宗乾元二年以久旱徙東西二市祭風伯雨師修雩祀壇為泥土龍望祭名山大川徳宗貞元元年五月分命朝臣禱羣神以祈雨憲宗元和十二年四月帝以自春以來時雨未降正陽之月可雩祀遂幸興慶宫祈雨梁太祖開平二年二月以久無時雨命庶官遍祀羣聖近鎮按古法祈禳後唐莊宗同光元年有司上言孟夏雩祀請奉太宗配從之晉少帝天福八年五月以所在旱蝗命宰臣等分詣寺觀禱雨尋遣供奉官詣嵩山投龍祈雨宋制孟夏雩祀昊天上帝為大祀太祖建隆二年夏旱翰林學士王著請令近臣按舊禮告天地宗廟社稷及望告嶽鎮海瀆於北郊以祈甘澤詔用其禮惟不設配坐及名山大川雨足報賽如禮開寶九年幸西京以四月有事南郊躬行大雩之禮太宗雍熙四年正月禮儀使蘇易簡言太祖皇帝光啟丕圖恭臨大寶以聖授聖傳於無窮欲望將來雩祀以太祖崇配奏可至道三年十一月有司言孟夏雩祀請奉太宗配詔可按是年三月真宗已即位故以太宗配享真宗咸平二年旱詔有司祠雷師雨師内出李邕祈雨法其法以甲乙日擇東方地作壇取土造青龍長吏齋三日詣龍所汲流水設香案茗菓餈餌率羣吏鄉老日再至祝酹不得用音樂巫覡雨足送龍水中餘四方皆如之飾以方色大凡日干及建壇取土之里數器之大小及龍之修廣皆以五行成數焉詔頒諸路按宋志有祈有報祈用酒脯醢郊廟社稷或用少牢其報如常祀或親禱諸寺觀或再幸或撤樂減膳進蔬饌或分遣官告天地大廟社稷嶽鎮海瀆或望祭于南北郊或五龍堂城隍廟九龍堂浚溝廟諸祠如子張子夏信陵君段木扁鵲張儀吳起單雄信等廟亦祀之或啟建道場于諸寺觀或遣内臣分詣州郡如河中之后土廟太寧宫毫之太清明道宫兖之會真景靈宫太極觀鳯翔之太平宫舒州之靈仙觀江州之太平觀泗州之延祥觀皆函香本祀驛往禱之凡旱蝗水潦無雪皆禜禱焉景徳三年詔有司詳定諸祠祭事有司言今年四月五日雩祀昊天上帝十三日立夏祀赤帝按月令立夏之日天子迎夏于南郊注云迎夏為祀赤帝於南郊又云是月也大雩注云春秋傳曰龍見而雩謂建巳之月陽氣盛而常旱萬物待雨而長故祭天以祈雨龍星謂角亢也立夏後昏見東方又案五禮精義云自周以來嵗星差度今以龍見或在五月以祈甘雨於時已晩但四月上旬十日今則唯用改朔不待時節祭于立夏之前違兹舊禮之意茍或龍見於仲夏之時雩祀於季春之節相去遼濶于理未周欲請自今並於立夏後卜日如立夏在三月則待改朔庶節氣協于純陽典禮符于舊史奏可是年五月旱又以畫龍祈雨法付有司刋行其法擇潭洞或湫濼林木深邃之所以庚辛壬癸日刺史守令帥耆老齋㓗先以酒脯告社令訖築方壇三級髙二丈濶一丈三尺壇外二十步界以白繩壇上植竹枝張畫龍其圖以縑素上畫黑魚左顧環以元黿十星中為白龍吐雲黑色下畫水波有龜左顧吐黑氣如綫和金銀朱丹飾龍形又設皂旛刎鵞頸血置盤中栁枝洒水龍上俟雨足三日祭以豭豕取畫龍投水中大中祥符二年旱遣司天少監史序祀元㝠五星于北郊除地為壇望祭已而雨足遣官報謝及社稷初學士院不設配位及是問禮官言祭必有配報如常祀當設配坐又諸常祠天齊五龍用牛祀奥祀城隍用羊一八籩八豆舊制不祈四海帝曰百谷之長潤澤及物安可闕禮特命祭之仁宗慶厯中大雩之儀皆用犢羊豕各一神宗熙寧十年四月以夏旱内出蜥蜴祈雨法其法捕蜥蜴數十納甕中漬之以雜木業擇童男十二嵗以下十嵗以上者二十八人分兩畨衣青衣以青飾面及手足人持栁枝霑水洒散晝夜環繞誦咒曰蜥蜴蜥蜴興雲吐霧令雨滂沱放汝歸去元豐四年詳定郊廟奉祀禮文所言近詔宗祀明堂配以上帝其餘從祀羣神悉罷今大雩猶循舊制羣神從祀恐與詔㫖相戾請孟夏大雩惟祀上帝以太宗皇帝配餘從祀羣神悉罷又請改築雩壇於國南以嚴祀事祈用少牢並從之五年始建雩壇禮部言雩壇當立于圜丘之左已地髙一丈廣輪四丈周十二丈四出陛為三壝各二十五步周垣四門一如郊壇之制從之髙宗紹興八年以時雨愆候令臨安府迎天竺觀音赴法慧寺建道場如法祈求其後率以為常或差官就天竺祈禱按髙宗南渡天竺山亦在境内山川能興雲雨之列但髙宗以後或迎觀音入城或就山祈禱亦與雖非祀典祈求有應皆一體祈禱之言有合紹興後孟夏雩祀上帝在城西惠照院望祭齊宫行禮其後又於圓壇行禮孝宗時因雨澤愆期太常朱時敏言通典載雩禮用舞僮歌雲漢晉蔡謨議謂雲漢之詩興于宣王歌之者取其修徳禳災以和陰陽之義乞用舞童六十四人衣元衣歌雲漢之詩詔亟從之按唐開元祈雨雩壇謂之特祀不以樂薦孝宗淳熙十四年七月太常寺言亢陽為沴檢㸃國朝典禮凡京都旱則祈嶽鎮海瀆及諸山川能興雲雨者於北郊望告又祈宗廟社稷及雩祀上帝皇地祇八月得雨禮官謂有祈必有報上曰既是天地宗廟社稷宫觀亦不容已王淮等奏報謝只是酒脯上曰如何無牲牢淮等奏國朝典禮祈用酒脯謝如常祀但紹興以來並只是酒脯唯雩祀用牲然雩無報謝之理遼制嵗旱行色克色哩禮儀以祈雨前期置百柱天棚及期皇帝致奠於先帝御容乃射栁皇帝再射親王宰執以次各一射中栁者質誌栁者冠服誌栁者植栁為記之人葢擇親王或宰執為之質謂質當也取誌栁者之冠服為質不中者以冠服質之質於誌栁者不勝者進飲於勝者然後各歸其冠服又翼日植栁天棚之東南巫以酒醴黍稷薦植栁祝之皇帝皇后祭東方畢子弟射栁皇族國舅羣臣與禮者賜物有差既三日雨則賜多囉倫穆騰四匹衣四襲否則以水沃之穆宗應厯十二年五月以旱命左右以水相沃頃之果雨金世宗大定四年五月乙未詔禮部尚書王競禱雨於北嶽以定州長貳官充亞終獻又卜日於都門北郊望祀嶽鎮海瀆有司行事用酒脯醢後七日不雨祈太社太稷又七日祈宗廟不雨仍從嶽鎮海瀆如初祈其設神座實尊罍如常儀其尊罍用瓢齊擇甘瓢去蒂以為尊祝版惟五嶽宗廟社稷御署餘則否後十日不雨乃徙市禁屠宰殺斷繖扇造土龍以祈雨足報祀送龍水中元無雩禮遇水旱或遣官行事或命西僧致禱泰定中泰定三年三月乙巳朔帝以不雨自責命審決重囚遣使分祀五嶽四瀆名山大川及京城寺觀文宗天厯二年三月壬申以去冬無雪今春不雨命中書及百司官分禱山川羣祀明初凡水旱災傷或躬禱或露告於宫中或於奉天殿陛或遣官祭告郊廟陵寢及社稷山川無常儀太祖洪武二年以春久不雨祈告諸神祇中設風雲雷雨嶽鎮海瀆凡五壇東設鍾山兩淮江西兩廣海南北山東燕南燕薊山川旗纛諸神凡七壇西設江東兩浙福建湖廣荆襄河南北河東華州山川京都城隍凡六壇中五壇奠帛初獻帝親行禮兩廡命官分獻每壇牲用犢羊豕各一幣則太嵗風雲雷雨用白餘各隨其方色籩豆簠簋視社稷登一實以大羮鉶二實以和羮儀同常祀三年五月旱六月帝親禱于山川壇越五日雨宣宗宣徳三年四月旱遣成國公朱勇祭大小青龍之神孝宗𢎞治十七年五月畿内山東久旱遣官祭告天夀山分命各巡撫祭告北嶽北鎮東嶽東鎮東海世宗嘉靖八年帝諭禮部去冬少雪當春雨不降朕當親祭南郊社稷山川尚書方獻夫等具上儀注二月親禱南郊山川同日社稷用次日不降道冠服淺色羣臣同文五品武四品以上于大祀門外館官于南天門外就班陪祀是秋帝欲親祀山川諸神禮部尚書李時言舊例山川等祭中夜行禮先一日出郊齋宿祭畢清晨回鑾兩日畢事禮太重宜比先農壇例昧爽行禮因具儀以進制可祭服用皮弁迎神送神各兩拜九年帝欲於奉天殿丹陛上行大雩禮夏言請築雩壇每嵗孟春祈穀後雨暘時若則雩祭遣官攝行如雨澤愆期則躬行禱祝乃建崇雩壇於圜丘壇外泰元門之東為制一成嵗旱則禱奉太祖配十二年夏言等言古者大雩之祀命樂正習盛樂舞皇舞葢假聲容之和以宣陰陽之氣請於三獻禮成之後九奏樂止之時樂奏雲門之舞仍命儒臣括雲漢詩詞制雲門一曲使文武舞士並舞而合歌之且請増鼔吹數畨教舞童百人青衣執羽繞壇歌雲門之曲而舞曲凡九成因上其儀視祈榖禮帝從之十七年四月大雩時將躬禱郊壇帝諭禮部禱雨乃修省事不用全儀亦不奉祖配乃定青衣上香進帛三獻八拜成禮百官陪拜祭用酒果脯醢牛一以熟薦前一日戌刻詣郊壇中夕行禮神宗萬厯十三年上親禱郊壇却輦歩行其歩禱儀前期一日預告于奉先殿太常寺進祝版上親填御名太常寺預設酒果脯醢香帛于圜丘牛一熟薦設上拜位於壇壝及期上具青衣青服至昭亨門導引官導上至櫺星門外幕次少憩禮部太常寺奏詣壇位行初獻禮内贊奏獻帛爵訖奏請讀祝位奏跪繼而行亞獻三獻禮上還仍詣奉先殿參謁如常儀大享明堂唐後唐宋明唐初季秋大享于圜丘行事武后稱制始毁東都之乾元殿為明堂以正月朔行大享禮明皇開元中以武后所造明堂有乖體制毁去上層易以真瓦仍為乾元殿自是終唐之世季秋大享皆寓圜丘代宗永泰二年禮儀使杜鴻漸奏季秋大享明堂祀昊天上帝請以肅宗配制可憲宗元和元年以順宗配十五年穆宗即位以憲宗配後唐莊宗同光元年有司上言季秋大享明堂請奉太祖配從之宋初因唐舊制季秋大享昊天上帝率以有司攝事太宗雍熙元年以太祖配淳化四年以宣祖配真宗時以太祖配仁宗即位以真宗配皇祐二年二月十八日乙亥上謂輔臣曰孝莫大於嚴父嚴父莫大於配天今冬至日當親祀圜丘欲以季秋有事於明堂行饗帝饗親之禮以極孝恭然前代諸儒議論皆異將安適從先是宋庠建議請季秋享明堂是嵗當郊而日至在晦庠引建隆故事宜有所避因請季秋大享文彦博奏曰臣等檢討舊典昊天上帝一嵗四祭皆於南郊惟日至圜丘率三嵗一親祀開寶中藝祖幸西京以四月庚子有事於南郊行大雩禮淳化四年至至道二年太宗皆以正月上辛躬行祈榖之祀唯季秋大享缺而未舉真宗祥符初議行此禮以有事岱宗故未遑合宫之事將上帝祖宗之意以俟陛下三月一日戊子朔御札曰事天事地邦國之善經享帝享親聖王之盛節緬稽先憲祇事穹祇祈榖于春祭雩以夏迨升禋於景至嘗親展於國容惟明堂布政之方尊嚴父配天之禮雖崇精享未即躬行言念及兹心焉載惕今取今年九月二十七日辛亥百事於明堂其今年冬至親祀南郊宜即輟罷恩賞依南郊例至日御宣徳門行禮己丑詔以大慶殿為明堂先是禮官議王者郊用辛葢取齋戒自新之義又通禮祀明堂亦用辛遂下司天擇日得辛亥戊戌詔羣臣毋得請上尊號於時宰相文彦博為大禮使宋庠為禮儀使王貽永為儀仗使龎籍為鹵簿使髙若訥為橋道頓遞使己亥詔輿輿服裁簡丙辰判太常禮儀事宋祁上明堂通議二十篇四月丁巳朔禮院言周禮夏世室鄭𤣥云堂上有五室象五行木室於東北火東南金西南水西北土中央崔靈恩亦如之請如崔鄭之説設五室于大慶殿又舊禮五帝位為縵室今旁帷上幕宜用青繒朱裏四户八牖赤綴戸白綴牖宜飾以朱白繒從之乙丑詔曰祖宗親郊合祭天地祖宗並配百神從祀今祀明堂正當親郊之期而禮官所定祭天不及地祇配坐不及祖宗未合三朝之制且移郊為大享葢亦為民祈福宜合祭皇地祇奉太祖太宗真宗並配而五帝神州亦親獻之日月河海諸神悉如圜丘從祀之數禮官議諸神位未決帝諭文彦博等曰郊壇第一龕者在堂第二第三龕設于左右夾廡及龍墀上在壝内外者列於堂東西廂及後廡以象壇壝之制太常禮院言昨赴大慶殿詳度陳列天地以下神位今參比郊壇壝兆上下位叙如左殿上五室内太室中北昊天上帝位皇地祇在左皆南面太祖太宗真宗位在東西向黄帝在太室中西南北面人帝在左少退青帝赤帝白帝黒帝各從本室人帝在左少退神州地祇日月北極天皇大帝並設於五室之間其位少退五帝神州日月北極天皇大帝郊壇為第一龕位五官勾芒以下設於明堂廷中少東南别為露幄五緯十二次紫㣲垣内官五方嶽鎮海瀆嵗星元枵鈎星以下七十二位于東西夾廡下版設於郊壇為第二龕位二十八舎黄道内天官角宿攝提五方山林川澤以下一百七十九位於丹墀龍墀道東西版設于郊壇為第三龕位黄道外天官及衆星五方墳衍原隰以下四百九十六位並東西廡周環殿後版設以北為上於郊壇為内壝之内外位倣古明堂之制又稍與壇壝位叙相類及令修内司貟少府司天監量廣深丈尺約陳列祭器不至併隘如得允當望下司天監繪圖以進因謂彦博等曰禮非天降地出縁人情耳禮官習拘儒之舊𫝊捨三聖之成法朕甚不取彦博曰惟聖明能達禮之情適禮之變翌日奏五帝神州命官分獻上曰朕于大祀豈敢憚勞甲午禮院上明堂五室制度圖五月丁亥朔作明堂禮神玉及燔玉初上謂輔臣曰前代禮神有祭玉燔玉今獨有燔玉無乃於祀典缺乎文彦博對曰唐太和中太常卿王起以當時祀事止有燔玉因請造璧琮等九器止用珉葢唐以來禮神之玉已不復備上曰朕奉天地祖宗盡物盡志豈於玉寶有所愛乎其冇司備製之時沙州適貢玉乃擇其良者製為琮璧等九器其黝璜尤粹祭玉始備乙酉御製明堂樂曲及二舞名六月己巳鹵簿使言用法駕鹵簿減大駕三分之一九月丁亥御崇政殿閲試雅樂五日詔乗新玉輅庚子御篆大慶殿榜明堂二字飛白明堂之門四字祠已藏宗正寺戊申齋於文徳殿閣輔臣宗室夕於齋次百官致齋明堂先是積雨彌旬上度禱方午而霽至夜月星明朗己酉上服通天絳紗具法駕乗玉輅薦享景靈宫禮畢謁太廟庚戌祼獻七室質明還文徳殿次辛亥未明三刻服鞾袍乗小輦至大次侍中奏嚴辦衮冕執圭禮儀使太常卿奉導入明堂中門至版位樂舞乃作大階升詣天地一祖二宗坐奠玉帛每詣神坐行禮畢鞠躬却行須盡褥位方改歩移嚮又令侍臣徧諭獻官及進徹俎豆悉安徐謹嚴質明禮畢還大次解嚴改服乗輦御紫宸殿百僚稱賀仁宗嘉祐七年七月詔復有事於明堂有司言皇祐參用南郊百神之位不應祭法宜如隋唐舊制設昊天上帝五方帝位以真宗配而五人帝五官神從祀皆罷又前一日親享太廟當時嘗停孟冬之薦詳考典禮宗廟時祭未有因嚴配而輟者今明堂去孟冬日尚逺請復薦廟前者祖宗並侑今用典禮獨配前者地祇神州並享今以配天而罷是皆變于禮中之大者也開元開寶二禮五帝無親獻儀舊禮先詣昊天上帝五帝並行分獻以侍臣奠幣皇帝再拜次詣真宗神坐于禮為允而帝欲盡恭於祀事五方帝位並親獻焉英宗治平元年禮院奏乞與兩制同議仁宗皇帝配侑明堂錢公輔等奏曰三代之法郊以祭天而明堂以祭五帝郊之祭以始封之祖有聖人之功者配焉明堂之祭以剏業繼體之君有聖人之徳者配焉故孝經曰昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝臣竊謂聖宋崛起非有始封之祖也則創業之君是為太祖矣太祖則周之后稷配祭于郊者也太宗則周之文王配祭於明堂者也此二配至重萬世不遷之法也真宗則周之武王宗乎廟而不祧者也雖有配天之功而無配天之祭未聞成王以嚴父之故廢文王配天之祭而移于武王也仁宗則周之成王也雖有配天之功而無配天之祭亦未聞康王以嚴父之故廢文王配天之祭而移於成王也下至兩漢去聖甚逺明堂配祭東漢為得在西漢時則孝武始營明堂而以髙帝配之其後又以景帝配之孝武之後無明焉在東漢時則孝明始建明堂而以光武配其後孝章孝安之後無聞焉當始配之代適符嚴父之説及時異事遷而章安二帝亦弗之變此最為近古而合乎禮者也唐中宗時以髙宗配在明皇時以睿宗配永泰時以肅宗配禮官杜鴻漸王涯輩皆不能推明經訓務合古初反雷同其説以惑時主延及於今牢不可破願陛下深詔有司博謀羣賢循宗周之典禮替有唐之曲學於是詔臺諌及講讀官與兩制再詳定以聞觀文殿學士孫抃等曰易稱先王作樂崇徳薦之上帝以配祖考葢祖考並可配天符于孝經之説不可謂必嚴其父也祖考並可配郊與明堂而不同位不可謂嚴祖嚴父其義一也雖周家不聞廢文配而移於武廢武配而移于成然易之配考孝經之嚴父歴代循守不為無説魏明帝祀文帝于明堂以配上帝史官謂是時二漢之制具存則魏所損益可知亦不可謂章安之後配祭無𫝊遂以為未嘗嚴父也唐至本朝講求不為少所以不敢異者舎周孔之言無所本也今以為我將之詩祀文王于明堂而歌者安知非孔子刪詩存周全盛之頌被于管絃者獨取之也仁宗繼體守成置天下于泰安者四十二年功徳可謂極矣今祔廟之始抑而不得配帝其非所以宣章嚴父之大孝諫官司馬光吕誨曰孝子之心孰不欲尊其父聖人制禮以為之極不敢踰也詩曰思文后稷克配彼天又我將祀文王于明堂下此皆不見于經前漢以髙祖配天後漢以光武配明堂以是觀之自非建邦啟土造有區夏者皆無配天之文故雖周之成康漢之文景明章徳業非不美也然而不敢推以配天避祖宗也孔子以周公有聖人之徳成太平之業制禮作樂而文王適其父故引以證聖人之徳莫大于孝以答曽子非謂凡有天下者皆當尊其父以配天然後為孝也近代祀明堂者皆以其父配上帝此乃誤釋孝經之義而違先王之禮也景祐中禮院官議以太祖為帝者之祖比周之后稷太宗真宗為帝者之宗比周之文武然則祀真宗於明堂以配上帝亦未失古禮仁宗雖豐功美徳洽于四海而不在二祧之位議者乃欲舎真宗而以仁宗配恐於祭法不合詔從抃議以仁宗配享明堂焉御史趙鼎請遞遷真宗配雩祭太宗配祈穀神州用唐故事學士王珪等以為天地大祭有七皆始封受命剏業之君配神作主明堂用古嚴父之道配以近考故在真宗時以太宗配在仁宗時以真宗配今則以仁宗配仁宗始罷太宗明堂之配太宗先以配雩祀祈穀及神州之祭本非遞遷今明堂既用嚴父之道則真宗配天之祭于禮當罷不當復分雩祭之配也時詔近臣議仁宗配祭故事冬夏至祀昊天上帝皇地祇以太祖配正月丄辛祈穀孟夏雩祀孟冬祀神州地祇以太宗配正月上辛祀感生帝以宣祖配季秋大享明堂祀昊天上帝以真宗配而學士王珪等與禮官上議以為季秋大饗宜以仁宗配為嚴父之道知制誥錢公輔獨謂仁宗不當配帝給事中王疇以為珪等議遺真宗不得配公輔議遺宣祖真宗仁宗俱不得配于禮意未安乃請依王珪等議奉仁宗配饗明堂以符大易配考之説孝經嚴父之禮奉遷真宗配孟夏雩祀以仿唐貞觀顯慶故事太宗依舊配正月上辛祈穀孟冬祀神州地祇餘依本朝故事如此則列聖並侑對越昊穹厚澤流光聖裕萬祀必如公輔之議則陷四聖為失禮導陛下為不孝違經戻古莫此為甚因此公輔不説廷以疇論事有補帝與執政大臣皆器而朝異之四年七月詔明堂已即位詔明堂以英宗配神宗熙寧四年親祀明堂帝親獻昊天上帝英宗皇帝及五方帝其五人帝五官神位命官分獻元豐三年詳定禮文所言祀帝南郊以天道事之則雖配帝用犢禮所謂帝牛不吉以為稷牛是也享帝明堂以人道事之則雖天帝用大牢詩所謂我將我享維羊維牛是也自梁明堂用特牛隋唐因之非所謂以人道享上帝之意也皇祐大享用犢七以薦上帝配帝五方帝羊豕各五以薦五人帝熙寧禮院議上帝配帝用犢與羊豕各一五帝五人帝用犢與羊豕各五皆未應禮今明堂親祀上帝配帝五方帝五人帝請用牛豕各一太常禮院言今嵗明堂尚在慈聖光獻皇后三年之内請如熙寧元年南郊故事惟祀事用樂鹵簿鼓吹宫架皆備而不作警場止鳴金鉦鼓角而已自是凡國有故皆用此制六月詔曰歴代以來合宫所配雜以先儒六天之説朕甚不取將來祀英宗皇帝於明堂以配上帝餘從祀羣神悉罷知太常禮院趙君錫等議案周官掌次職曰王大旅上帝則張氊案祀五帝則張大次小次又司服職曰祀昊天上帝則服大裘而冕祀五帝亦如之明上帝與五帝異則孝經所謂宗祀文王以配上帝者非可兼五帝也自鄭氏之學興乃有六天之説而事非經見晉泰始初論者始以為非遂於明堂惟設昊天上帝一坐而已唐顯慶禮亦然請如詔祀英宗於明堂惟配上帝以稱嚴父之意又請以莞席代槀桔蒲越以玉爵代匏爵其豆登簋俎尊罍並用宗廟之器並從之六年詳定禮文所言本朝親祠明堂習儀於大慶殿近于凟伏請明堂習儀于尚書省以逺神為恭哲宗元祐元年九月親享明堂以神宗配六年太常博士趙叡言本朝親享之禮自明道以來即大慶殿以為明堂至於有司攝事之所乃尚寓於圜丘竊見南郊齋宫有望祭殿請就行禮從之元符元年尚書左丞蔡卞言每嵗大享明堂即南郊望祭殿行禮制度隘窄未足以仰稱嚴事之意今新作南郊齋宫端誠殿實天子潔齋奉祀及見羣臣之所髙明邃深可以享神即此行禮于義為合初元豐禮官以明堂寓大慶路寢别請建立以盡嚴奉而未暇講求至蔡京為相始以庫部員外郎姚舜仁明堂圖議上詔依所定營建明年正月以彗出東方罷徽宗大觀元年大享猶寓大慶殿政和五年文獻通考作三年秋八月詔以秘書省地為明堂又詔明堂之制朕取考工互見之文得其制作之本益夏后氏世室之度兼商人四阿重屋之制從周人度以九尺之筵上圓象天下方法地四戸以合四序八牕以應八節五室以象五行十二堂以聽十二朔九階四阿每室四戸夾以八牕享帝嚴父聽朔布政于一堂之上於古皆合其制大備宜令明堂使司遵圖建立於是内出圖式宣示於崇政殿命蔡京為明堂使開局興工日役萬人京言三代之制修廣不相襲世每近制每廣今若以二筵為大室方一丈八尺則室中設版位禮器已不可容理當増廣今從周制以九尺之筵為度太室修四筵三丈六尺廣五筵四丈五尺共為九筵木火金水四室各修三筵益四五三丈一尺五寸廣四筵三丈六尺共七筵益四尺五寸十二堂古無修廣之數今亦度以九尺之筵明堂元堂各修四筵廣五筵左右个各修廣四筵青陽總章各修廣四筵左右个各修四筵廣三筵益四五四阿各四筵堂柱外基各一筵堂總一十九筵一十七丈一尺廣二十四筵筵十十八丈九尺蔡攸言明堂五門諸廊結瓦古無制度漢唐或葢以茅或葢以瓦或以木為瓦以夾紵漆之今酌古之制適今之宜葢以素瓦而用琉璃縁裏及頂葢鴟尾綴飾上施銅雲龍其地則隨所向甃以五色之石欄楯柱端以銅為文鹿或辟邪象明堂設飾雜以五色而各以其方所尚之色八窻八柱則以青黄緑相間堂室柱門欄楯並塗以朱堂階為三級級崇三尺共為一筵庭樹松梓檜門不設㦸殿角皆垂鈴詔以元堂犯聖祖諱取平在朔易之義改為平朔門亦如之仍改敷祐門曰左敷佑左承天門曰右敷佑右承天門曰平秩更衣大次曰齋明殿七年四月明堂成有司請頌常視朝聽朔詔明堂專以配帝嚴父餘悉移于大慶文徳殿羣臣五表陳請乃從之禮制局言祀天神于冬至祀地祇于夏至乃有常日無所事卜季秋享帝以先王配則有常月而未有常日禮不卜常祀而卜其日所謂卜日者卜其辛爾葢月有上辛次辛請以吉辛為正又禮制局列上明堂七議一曰古者朔必告廟示不敢專請視朝聽朔必先奏告以見繼述之意二曰古者天子負扆南向以朝諸侯聽朔則各隨其方請自今御明堂正南向之位布政則隨月而御堂其閏月則居門焉三曰禮記月令天子居青陽總章每月異禮請稽月令十二堂之制修定時令使有司奉而行之四曰月令以季秋之月為來嵗受朔日請以每嵗十月于明堂受新厯退而頒之郡國五曰古者天子負扆公侯伯子男蠻夷戎狄四塞之國各以内外尊卑為位請自今元正冬至及朝㑹並御明堂遼使依賓禮蕃國各隨其方立于四門之外六曰古者以明堂為布政之宫自今若有御札手詔並請先于明堂宣示然後榜之廟堂頒之天下七曰赦書徳音舊制宣於文徳殿自今請非御樓肆赦並請于明堂宣讀九月詔頒朔布政自十月為始其月皇帝御明堂平朔左个頒天運政治及八年戊戌嵗運厯數于天下百官常服立明堂下乗輿自内出出負扆坐于明堂大晟樂作百官朝於堂下大臣陞階進呈所頒布時令左右丞二員跪請付外施行宰相承制可之左右丞乃下授頒政官頒政官受而讀之訖出閤門奏禮畢皇帝降御座百官乃退自是以為常髙宗紹興元年合祭天地于明堂奉太祖太宗配禮畢不受賀文武百官拜表稱賀如儀四年九月有事於明堂合祭天地以太祖太宗配兼祀百神按是時依禮部新儀一遵皇祐詔書仍以明堂大禮為稱於常御殿設位行禮先時有司請議郊祀明堂祫享之宜禮部侍郎陳與義議曰謹按皇祐詔書國朝自祖宗以來三嵗一郊今祀明堂正當三嵗親郊之期而禮官所定配坐不及祖宗宜並配以稱朕恭事祖宗之意葢太祖則周之后稷當配祭於郊者也太宗則周之文王當配祭于明堂者也郊當祭太祖而以當郊之嵗舉明堂之禮則不可以遺太祖而不祭稽之神理本之人情則皇祐詔書之本意可以為萬世不刋之典詔從之葢中興郊祀明堂合祭天地並配祖宗之禮參考推明至與義之議而始定七年九月辛巳合祭天地于明堂時徽宗升遐上躬行三年之喪禮部太常寺言景徳熙豐南郊故事皆在諒陰中當時親郊行禮除郊廟景靈宫合用樂外所有鹵簿鼓吹及樓前宫架諸軍音樂皆備而不作其逐處警場止鳴金鉦鼓角乞依累朝故事行太常博士孫邦乞自受誓戒日皇帝暨百僚禁衛等權易吉服至禮成還内仍舊中書舎人傅崧卿援嚴父之文欲陞徽宗配享詔令侍從臺諫禮官同議禮部侍郎陳公輔言道君皇帝神靈方在几筵豈可遽預配祭之禮吏部尚書孫近等議引司馬光之説曰近世祀明堂者皆以其父配此乃誤認孝經之意而違先王之禮不可以為法况梓宫未還几筵未除山陵未卜而遽議配侑之事乎臣等伏請今年明堂大禮權依紹興元年詔書請俟削平僭亂恢復大業然後定郊祀明堂之議一從成周庶不失禮經之正詔從之十年九月復行明堂禮太常定儀注自誓戒致齋至飲福燎瘞是嵗始用大樂三十一年九月大享明堂罷合祭奉徽宗配孝宗乾道五年太常少卿林栗乞四祭並即圜壇禮部侍郎鄭聞謂明堂堂從屋祭不當在壇有司攝事當于望祭殿行禮從之中興後昊天上帝四祀春祈夏雩秋享冬報其二在南郊圜壇其二在城西恵照院望祭齋宫紹興十九年八月葺恵照望祭殿建齋宫于其西凡十有一區淳熙六年九月大享明堂合祭天地復奉太祖太宗配先時詔今嵗得明堂大禮令禮部太常寺詳議宰執進呈禮寺議狀竊觀黄帝拜祀上帝于明堂唐虞祀五帝於五府歴時既久其詳莫得而聞至禮記始載明堂位一篇言天子負斧依南向而立内之公侯伯子男外之蠻夷戎狄以序而立故曰明堂也者明諸侯之尊卑也孟子亦曰明堂者王者之堂也周禮大司樂有冬至圜丘之樂夏至方丘之樂宗廟九變之樂三者皆大祭祀唯不及明堂豈非明堂者布政㑹朝之地周成王時嘗於此歌我將之頌宗祀其祖文王乎後暨漢堂雖有沿革至于祀帝而配以祖宗多由義起未始執一本朝仁宗皇祐中破諸儒異同之論即大慶殿行親享之禮並侑祖宗從以百神前期朝獻景靈宫享太廟一如郊祀之制太上皇帝中興斟酌家法舉行皇祐之制於紹興之初亦在殿庭合祭天地並配祖宗葢得聖經之遺意且國家大祀有四春祈榖夏雩祀秋明堂冬郊祀是也陛下即位以來固嘗一講祈榖四躬冬祀唯合宫雩壇之禮猶未親行今若據已行典禮及用神宗時名儒李覯明堂嚴祖説并治平中吕誨司馬光錢公輔等集議近嵗李燾奏劄所陳特舉秋享於義為允上曰明堂合祭天地並侑祖宗從祀百神並依南郊禮例可依詳議事理施行十六年光宗既受禪閏王月禮官言冬祀配以太祖而春夏秋皆配以太宗祖有功宗有徳故推以配上帝髙宗身濟大業紹開中興揖遜之美超越千古功徳茂盛為宋髙宗秋享明堂宜奉以升侑又謂我將祀文王實在成王之時錢公輔司馬光吕誨皆以為嚴祖今以髙宗配於周制為合于是髙宗始配上帝寧宗嘉定八年九月合祭天地于明堂呉泳繳進明堂御劄狀曰臣嘗出入禮經讀郊特牲謂祭有祈有報有由辟焉讀周官太祝謂祝有祈福祥有求永貞有弭灾兵馬所謂肇禋于郊宗祀于明堂者不但曰報而已葢海内乂安兵革不興年至于屢豐則鋪張揚厲而主報疆埸多事水旱間作民未有寧宇則禬禳祠禱而主祈此皆成周之令典國家列聖以來成法所不能廢也粤自近嵗詞臣所撰赦詔類多頌美形容之詞而少愛人惻怛之意矧今兵祲未解民食孔艱陛下畏威一念如對上帝毖祀一忱若保赤子所宜因此時力致祈天永命之請臣用是輒援仁祖髙宗兩朝故實載之御劄所有將來合降赦書更宜推廣此意深自貶損明示四方庶㡬可以迓續天命感動人心仰昭陛下寅畏懷保之實矣理宗淳祐三年用樞宻都承㫖韓詳言明堂以太祖太宗寧宗並侑寶祐五年三月詔以髙宗皇帝克紹大業光復我家宜倣有夏之祀少康法元和之尊光武於是明堂大享以一祖三宗並配度宗咸淳五年祀明堂奉理宗升侑起居舎人髙斯得進郊天故事疏曰臣聞人主事天之道唯質與忱而已大路越席掃地不壇器用陶匏牲用繭栗皆尚質也立澤聽誓皮弁聽報齋明盛服三宿七戒皆致忱也外盡乎質内盡乎忱則天之親徳享道也宜矣秦漢之後文縟而掩其質故弛而泊其忱千乗萬騎以為華寳鼎天馬以為飾而事天之本廢之牡㓝靈旗以禱兵方士秘術以求福而事天之心蕩矣欲以感動天地逆釐三神不亦難乎陛下穆卜季秋中辛以行暘館之祀今有日矣自乾淳以來毎遇郊禋必詔冇司自事天儀物及諸軍賞給之外凡車服伏衛聲明文物之具莫不裁約而歸于儉錫賚推恩亦减承平之半或三之一可謂尚質之至矣至于前期齋殿致其精明以對越在天者尤極其嚴行事之際避黄道而不履虚小次而不御可謂至忱之極矣是以神天顧歆或積雨而頓霽或微恙而立瘳以樂成熙事此則陛下之家法也厥今四郊多壘財力單匱逺不逮乾淳之時臣願陛下于阜陵節約之外損之又損庶幾曰祀曰戎二者兼得乃若以忱事天又其大本記曰齋者防其邪物絶其嗜慾言不敢散其志也今距齊宿之期雖曰尚賒然臣願陛下以聖人久禱為心兢兢業業已如上帝臨汝神在其上之時則積此精神用于一日天人相與如響應聲天神之不降地祇之不格風雨之不節寒暑之時臣不信也明初無明堂之制世宗嘉靖十七年六月致仕揚州府同知豐坊上䟽言孝莫大于嚴父嚴父莫大于配天請復古禮建明堂加尊皇考獻皇帝廟號稱宗以配上帝下禮部㑹議尚書嚴嵩等言若以功徳論則太宗再造家邦功符太祖當配以太宗若以親親論則獻皇帝陛下之所自出陛下之功徳即皇考之功徳當配以獻皇帝至稱宗之説則臣等不敢妄議帝降㫖明堂秋報大禮於奉先殿行其配帝務求畫一之説皇考稱宗何為不可再㑹議以聞於是户部左侍郎唐胄抗疏言三代之禮莫備于周孝經曰郊祀社稷以配天宗祀文王於明堂以配上帝又曰嚴父莫大於配天則周公其人也説者謂周公有聖人之徳制作禮樂而文王適其父故引以證聖人之孝答曽子問而已非謂有天下者必皆以父配天然後為孝不然周公輔成王踐阼其禮葢為成王而制於周公為嚴父於成王則為嚴祖矣然周公歸政之後未聞成王以嚴父之故廢文王配天之祭而移於武王也後世祖明堂者皆配以父此乃誤孝經之義而違先王之禮今禮臣不能辨嚴父之非不舉文武成康之盛而乃濫引漢唐宋不足法之事為言謂之何哉帝怒下胄詔獄嵩乃再㑹廷臣先議配帝之禮言考季秋成物之指嚴父配天之文宜奉獻皇帝配帝侑食因請奉文皇帝配祀於孟春祈榖帝從獻皇帝配帝之請而却文皇議不行已乃設為臣下奏對之詞作明堂或問以示輔臣大畧言文皇逺祖不應嚴父之義宜以父配稱宗雖無定説尊親崇上義所當行既稱宗則當祔廟豈有太廟中四親不具之禮帝既排正議崇私親心念太宗永無配享無以謝廷臣乃定獻皇配帝稱宗而改稱太宗號曰成祖時未建明堂迫季秋遂大享上帝於元極寶殿奉睿宗獻皇帝配殿在宫右乾隅舊名欽安殿禮成禮部請帝陞殿百官表賀如郊祀慶成儀帝以大享初舉命賜宴羣臣於謹身殿已而以足疾不御殿令羣臣勿賀並罷宴令光祿寺分給是年定大享禮上帝位犢一玉用蒼璧一帛十二青色登一簠簋各二籩十二豆十二玉爵三酒尊三篚一祝案一配帝位同惟不用玉祭儀與祈穀同二十一年敇諭禮部季秋大享明堂成周重典與郊祀並行曩以享地未定特祭於元極寶殿朕誠未盡南郊舊殿原為大祀之所昨嵗已令有司撤之朕自作制象立為殿恭薦名曰泰亨用昭寅奉上帝之意乃定嵗以秋季大享上帝奉皇考睿宗配享行禮如南郊陳設如祈榖二十四年禮部尚書費宷以泰亨殿工將竣請帝定殿門名門曰泰亨殿曰皇乾及殿成而大享仍於元極寶殿遣官行禮嵗以為常穆宗隆慶元年禮臣言我朝大享之禮自皇考舉行追崇睿宗以昭嚴父配天之孝自皇上視之則睿宗為皇祖非周人宗祀文王于明堂之義于是帝從其請罷大享禮仍改元極殿殿為欽安殿臣等謹案明堂之禮遼金元俱未舉行明初亦未議及世宗嘉靖中豐坊首剏嚴父配天之説迎合上意由是特舉斯禮追隆所生元極既配之後明年幸承天享帝于龍飛殿亦奉獻皇帝配其後自定規制更建泰享殿三年而後成然大享之禮終未舉行内殿殷薦亦止遣官攝事葢帝之排羣議崇私親雖矯强于一時終有惄然不自安者故禮臣敦請屢諭緩行非僅躭奉元修憚乗輿之一出也古聖所云名不正言不順而事不成者詎不信哉欽定續通典巻四十八
