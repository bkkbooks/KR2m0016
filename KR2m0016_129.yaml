body:
  text: 州郡遼上京道東京道遼國其先曰契丹本鮮卑之地世居遼澤南控黄龍北帯潢水冷陘屏右遼河塹左當元魏時有地數百里至唐達呼哩氏蠶食扶餘室韋奚靺鞨之區地方二千餘里唐太宗貞觀三年以其地置元州尋置松漠都督府建八部為州各置刺史徳濟部曰峭落州赫伯部曰弹汗州都呼部曰無逢州芳阿部曰羽陵州圖勒彬部曰日連州芮奚部曰徒河州卓津部曰萬丹州富部曰匹黎赤山二州以達呼哩氏庫克為使持節十州軍事迨於五代契丹約尼氏益強闢地東西三千里遼太祖以徳哷勒部之衆代約尼氏起臨潢建皇都更約尼氏八部曰達爾結部伊斯琿部舍琿部諾爾威部丕勒摩部訥古濟部濟勒錦部實衮部屬縣四十有一每部設刺史縣置令又西兼突厥東并渤海得城邑之居百有三太宗援立石晉取燕雲十六州以皇都為上京升幽州為南京改南京為東京聖宗城中京興宗升雲州為西京於是五京備焉又以征伐俘户建州襟要之地多因舊居名之加以私奴置投下州總京五府六州軍城百五十有六縣二百有九部族五十有二屬國六十東至於海西至金山暨於流沙北至臚朐河南至白溝幅員萬里上京道上京臨潢府本漢遼東郡西安平之地新莽曰北安平案漢書遼東郡統襄平新昌無慮望平房候城遼隊遼陽險瀆居就髙顯安市武次平郭西安平文番汗沓氏等縣遼志多無可考謹附識遼太祖取天梯必魯等三山之勢於葦甸射金齪箭以識之謂之龍眉宫神册三年城之名曰皇都天顯十三年更名上京府曰臨潢案本紀天顯無十三年十三年即太宗㑹同元年也本紀書此在㑹同元年謹附識轄軍府州城二十五領縣十臨潢遼太祖天贊初南攻燕薊以所俘人户散居潢水之北縣臨潢水故名長泰本渤海國長平縣民遼太祖伐大諲譔先得是邑遷其人於京西北定覇本扶餘府強師縣民遼太祖下扶餘遷其人於京西聖宗統和八年以諸宫提轄司人户置𨽻長寧宫保和本渤海富利縣民遼太祖破龍州遷居京南聖宗統和八年以諸宫提轄司人户置𨽻彰愍宫潞本幽州潞縣民天贊元年太祖破薊州掠縣民布於京東𨽻崇徳宫易俗本遼東渤海民聖宗太平九年大延琳之叛圍守經年乃降盡遷於京北置縣居遷遼本遼東諸縣大延琳叛擇其謀勇者置之左右後以城降戮之徙其家屬於京東北故名渤海本東京人因叛徙置興仁聖宗開泰二年置宣化本遼東神化縣民太祖破鴨渌府盡徙其民居京之南統和八年以諸宫提轄司人户置𨽻彰愍宫祖州天成案本記天成作天城葢誤軍上節度本遼右八部實黙里地太祖秋獵多於此始置西樓後因建城號祖州以祖考所生地故名𨽻𢎞義宫領縣二城一長覇本龍州長平縣民遷於此咸寧本長寧縣破遼陽遷其民置越王城太祖伯父裕悦王舒嚕西伐党項吐渾俘其民放牧於此因建城在州東南二十里懷州奉陵軍上節度本唐歸誠州遼太宗行帳放牧於此天贊中從太祖破扶餘城下龍泉府俘其人築寨居之㑹同中掠燕薊所俘亦置此太宗崩塟西山曰懷陵大同元年世宗置州以奉焉𨽻永興宫領縣二扶餘本龍泉府太祖遷渤海扶餘縣降户於此世宗置縣顯理本顯理府人太祖伐渤海俘其王大諲譔遷民於此世宗置縣慶州元寧軍上節度本太保山黒河之地穆宗建城號黒河州統和八年州廢聖宗秋畋愛其竒秀建號慶州興宗景福元年𨽻興聖宫領縣三元徳本黒山黒河之地興宗景福元年括落帳人户從便居之孝安富義本義州太宗遷渤海義州民於此興宗重熈元年降義豐縣後更名𨽻𢎞義宫泰州徳昌軍節度本契丹二十部族放牧之地因黒鼠族屢犯通化州民不能禦遂移東南六百里來建城居之以近本族𨽻延慶宫兵事屬東北統軍司領縣二樂康倚郭興國本山前之民因罪配遞至此興宗置縣長春州韶陽軍下節度本鴨子河春獵之地重熈八年置𨽻延慶宫兵事屬東北統軍司領縣一長春本混同江地燕薊犯罪者流配於此烏州靜安軍刺史本烏丸之地遼北大王布拉占為牧建城後官收𨽻興聖宫領縣一愛民布拉王從軍南征俘漢民置於此永州永昌軍觀察承天皇太后所建太祖於此置南樓景宗乾亨三年置州於皇子哈巴墓側東潢河南土河二水合流故號永州冬月牙帳多駐此謂之東巴納𨽻彰愍宫領縣三長寧本顯徳府縣名太祖平渤海遷其民於此義豐本鐵利府義州遼兵破之遷其民於南樓之西北仍名義州重熈元年廢州改今縣又嘗改富義縣屬㤗州始末不可具考今兩存之於案富義縣屬慶州遼史此作泰州葢誤慈仁太宗以皇子濟色古爾亡置慈州墳西重熈元年州廢改今縣儀坤州啟聖軍節度本契丹右大部地回鶻諾果蘇居之至四世孫翁科烏里生應天皇后舒嚕氏適太祖太祖開拓四方平渤海后有力焉俘掠有伎藝者多歸帳下謂之舒新以所生之地置州𨽻長寧宫領縣一廣義本回鶻部牧地應天皇后以四征所俘居之因建縣統和八年以諸宫提轄司人户置來逺縣十三年併入龍化州興國軍下節度本漢北安平縣地契丹始祖竒善汗居此稱龍庭太祖於此建東樓唐昭宗天復二年太祖為徳哷勒部額爾竒木破代北遷其民建城居之太宗升節度𨽻彰愍宫兵事屬北路女直兵馬司刺史州一未詳領縣一龍化太祖以東征南掠所俘建城置邑降聖州開國軍下刺史本大部落東樓之地太祖春月行帳多駐此應天皇后夢神人金冠素服執兵仗異獸十二隨之中有黒兎躍入后懷因而有娠生太宗穆宗建州先屬延昌宫後𨽻彰愍宫領縣一永安本龍原府慶州縣名太祖平渤海破懷州之永安遷其人置寨於此建縣饒州匡義軍中節度本唐饒樂府地貞觀中置松漠府遼太祖完葺故壘建州𨽻延慶宫領縣三長樂本遼城縣名太祖伐渤海遷其民建縣居之臨河本永豐縣人太宗分兵伐渤海遷於潢水之曲安民太宗以渤海諸邑所俘雜置徽州宣徳軍節度景宗女秦晉大長公主以所賜媵臣户置在宜州北二百里北至上京七百里成州長慶軍節度聖宗女晉國長公主以所賜媵臣户置在宜州北一百六十里北至上京七百四十里懿州廣順軍節度聖宗女燕國長公主以所賜媵臣户置在顯州東北三百里西北至上京八百里渭州髙陽軍節度駙馬都尉蕭昌裔尚秦國王隆慶女韓國長公主以所賜媵臣户置在顯州東北二百五十里西北至上京七百五十里遼制皇子嫡生者其女與帝女同壕州本遼東西安平縣故地國舅宰相南征俘掠漢民居之因置州在顯州東北二百二十里西北至上京七百二十里原州本遼東北安平縣故地國舅金徳俘掠漢民居之因置州在顯州東北三百里西北至上京八百里福州本遼東北安平縣故地國舅蕭寧南征俘掠漢民居之因置州在原州北二十里西北至上京七百八十里横州故遼陽縣地國舅蕭克忠部下牧人居之因置州在遼州西北九十里西北至上京七百二十里鳯州本藁離國故地渤海之安寧郡境南王府五帳分地在韓州北二百里西北至上京九百里遂州本髙州地南王府五帳放牧於此在檀州西二百里西北至上京一千里豐州本遼澤大部落約尼氏賽音牧地北至上京三百五十里順州本遼隊縣地横帳南王府俘掠燕薊順州之民建城居之在顯州東北一百二十里西北至上京九百里閭州羅古王牧地近醫巫閭山在遼州西一百三十里西北至上京九百五十里松山州本遼澤大部落横帳布庫王牧地北至上京一百七十里豫州横帳陳王牧地南至上京三百里寧州本達呼哩氏克特山横帳固寧王放牧地在豫州東八十里西南至上京三百五十里案自徽州以下至此俱投下軍州遼制投下軍州皆諸王外戚大臣及諸部從征俘掠或置生口各團集建州縣以居之横帳諸王國舅公主許創立州城自餘不得建城郭朝廷賜州縣額其節度使朝廷命之刺史以下皆以本主部曲充焉官位九品之下及井邑商賈之家征税各歸投下惟酒税課納上京鹽鐵司又案遼志此下尚有靜州鎭州維州防州河董城靜遼城皮被河城招州搭懶主城皆遼國西北界防邊城因屯戍而立務據形勝不資丁賦今附識東京道東京遼陽府本朝鮮之地後為渤海大氏所有號中京顯徳府遼太祖建國攻渤海俘其王大諲譔以為東丹王國立太子托雲為人皇王以主之神册四年葺遼陽故城以渤海漢户建東平郡為防禦州天顯三年遷東丹國民居之升為南京十三年改為東京府曰遼陽轄州府軍城八十七領縣九遼陽本渤海國金徳縣地漢浿水縣髙麗改為勾麗縣渤海為常樂縣仙鄉本漢遼隊縣渤海為永豐縣鶴野本漢居就縣地渤海為鷄山縣析木本漢望平縣地渤海為花山縣不案後銅州析木縣注云初𨽻東京後来屬則此處應仍載析木縣今仍其舊而附識於此紫蒙本漢鏤芳縣地後佛寧國置東平府領紫䝉縣後徙遼城并入黄嶺縣渤海復為紫蒙縣作案鏤芳縣漢書地理志鏤方謹附識興遼本漢平郭縣地渤海改為長寧縣唐憲宗元和中渤海王大仁秀南定新羅北畧諸部開置郡邑遂定今名肅慎以渤海户置歸仁順化開州鎭國軍節度本濊貊地髙麗為慶州渤海為東京龍原府都督慶鹽穆賀四州事故縣六曰龍原永安烏山壁谷熊山白楊皆廢壘石為城周圍二十里遼太祖平渤海徙其民於大部落城遂廢聖宗伐新羅周覽城基復加完葺開泰三年遷雙韓二州千餘户實之號開封開逺軍節度更名鎭國軍𨽻東京留守兵事屬東京統軍司領州三縣一開逺本栅城地髙麗為龍原縣渤海因之遼初廢聖宗東討復置鹽州本渤海龍河郡故縣四海陽接海格州龍河皆廢穆州保和軍刺史本渤海會農郡故縣四㑹農水岐順化美皆廢領縣一㑹農按穆州下既載㑹農廢縣又云領縣一㑹農應是仍舊縣名而復置耳遼史未晰謹附識賀州刺史本渤海吉理郡故縣四洪賀送誠吉理石山皆廢定州保寧軍髙麗置州按因盛京通志定州髙麗置渤海之屬定理府遼史未晰謹附識統和十三年升軍𨽻東京留守司領縣一定東髙麗所置遼徙遼西民居之保州宣義軍節度髙麗置州聖宗以髙麗王詢擅立問罪不服開泰三年取其保定二州統和末髙麗降於此置𣙜埸𨽻東京統軍司領州軍二縣一來逺髙麗所置遼初徙遼西諸縣民實之又徙奚漢兵七百防戍焉宣州定逺軍刺史開泰三年徙漢户置懷化軍下刺史開泰三年置辰州奉國軍節度本髙麗葢牟城渤海改為葢州又改辰州以辰韓得名遼徙其民於祖州初曰長平軍𨽻東京留守司領縣一建安盧州元徳軍刺史本渤海杉盧郡故縣五山陽杉盧漢陽白巖霜巖皆廢兵事屬南女直湯河司領縣一熊岳案遼志此下有來逺城亦為防戍而設今附識鐵州建武軍刺史本漢安市縣髙麗為安市城渤海置州故縣四位城河端蒼山龍珍皆廢領縣一湯池興州中興軍節度本漢海宜縣地案海冝縣漢書地理志作海溟謹附識渤海置州故縣三盛吉蒜山鐵山皆廢湯州本漢襄平縣地故縣五靈峯常豐白石均谷嘉利皆廢崇州隆安軍刺史本漢長岑縣地渤海置州故縣三崇山溈水綠城皆廢領縣一崇信海州南海軍節度本沃沮國地髙麗為沙卑城渤海號南京南海府都督沃晴椒三州故縣六沃沮鷲巖龍山濱海昇平靈泉皆廢遼太平中大延琳叛南海城堅守經嵗不下别部酋長皆被擒乃降因徙其民於上京置遷遼縣移澤州民來實之領州二縣一臨溟耀州刺史本渤海椒州故縣五椒山貂嶺澌泉尖山巖淵皆廢領縣一巖淵按耀州下既載巖淵廢縣又云領縣一巖淵應是仍舊縣名而復置耳遼史未晰謹附識嬪州柔逺軍刺史本渤海晴州故縣五天晴