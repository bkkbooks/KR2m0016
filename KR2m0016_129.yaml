遷民本渤海永寧縣併豐水扶羅置永平渤海置益州觀察領縣一靜逺安逺州懷義軍刺史威州武寧軍刺史清州建寧軍刺史雍州刺史案遼志龍州賓州誤為一條今訂正湖州興利軍刺史渤海置兵事𨽻東京統軍司領縣一長慶案唐書渤海以肅慎故地為上京曰龍泉府領龍湖渤三州遼廢葢自遼太祖以龍州為黄龍府遂廢龍泉府而以湖渤二州屬東京也遼史未晰謹附識渤州清化軍刺史渤海置兵事𨽻東京統軍司領縣一貢珍渤海置郢州彰聖軍刺史渤海置兵事𨽻北女直兵馬司領縣一延慶銅州廣利軍刺史渤海置兵事𨽻北兵馬司領縣一析木本漢望平縣地渤海為花山縣初𨽻東京後來屬涑州刺史渤海置兵事𨽻南兵馬司按唐書渤海傳涑州以其近涑沫江葢即粟木水故名謹附識率賓府刺史故率賓國地按唐書渤海傳渤海於古率賓國地置率賓府領華益建三州謹附識定理府刺史故挹婁國地案國盛京通志定理府故挹婁地唐時渤海大氏建府領瀋定二州遼因之謹附識鐵利府刺史故鐵利國地安定府長嶺府鎭海府防禦兵事𨽻南女直湯河司領縣一平南冀州防禦聖宗建升永安軍東州以渤海户置尚州以渤海户置吉州福昌軍刺史麓州下刺史渤海置荆州刺史懿州寧昌軍節度太平三年越國公主以媵臣户置初曰慶懿軍更曰廣順軍𨽻上京道宗清寧七年宣懿皇后進入改今名領縣二寧昌本平陽縣順安媵州昌永軍刺史順化城嚮義軍下刺史開泰三年以漢户置兵事𨽻東京統軍司寧州觀察統和二十九年伐髙麗以渤海降户置兵事𨽻東京統軍司領縣一新安衍州安廣軍防禦以漢户置初刺史後升軍兵事屬東京統軍司領縣一宜豐案領盛京通志遼置衍州安廣軍冝豐一縣屬遼陽府遼史未詳謹附識連州徳昌軍刺史以漢户置兵事屬東京統軍司領縣一安民歸州觀察太祖平渤海以降户置後廢統和二十九年伐髙麗以所俘渤海户復置兵事屬南女直湯河司領縣一歸勝穌州安復軍節度本髙麗南蘇遼興宗置州兵事屬南女直湯河司領縣二來蘇懷化復州懷徳軍節度遼興宗置兵事屬南女直湯河司領縣二永寧徳勝肅州信陵軍刺史重熈十年州民亡入女直取之復置兵事𨽻北女直兵馬司領縣一清安安州刺史兵事𨽻北女直兵馬司榮州率州荷州源州渤海州寧江州混同軍觀察清寧中置初防禦後升兵事屬東北統軍司領縣一混同河州徳化軍置軍器坊祥州瑞聖軍節度興宗以鐵驪户置兵事𨽻黄龍府都部署司領縣一懷徳欽定續通典卷一百二十九
