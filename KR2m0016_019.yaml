  - {type: page-break, offset: 0, content: '', id: KR2m0016_WYG_019-1a, image: WYG0639/WYG0639-0259a.png}
body:
  text: 選舉三歷代制下明考績附明代取士規制與元略同而專取宋朱子所定四書及易書詩春秋禮記命題其文略仿宋經義然代古人語氣為之體尚排偶謂之八股通謂之制義直𨽻就京府各省就布政司試曰鄉試中式者為舉人以之試禮部曰會試又中式則天子策試於廷曰廷試亦曰殿試分一二三甲為次一甲止三人曰狀元授修撰榜眼探花授編修俱賜進士及第二甲三甲若干人賜進士同進士出身俱得考選庶吉士子午卯酉年鄉試辰戌丑未年會試鄉試以八月會試以二月皆初九日為第一場又三日為第二場又三日為第三場廷試以三月朔舉子則國子生及府州縣學生員之學成者儒士未仕官未入流者其文行由有司申舉應之太祖初下金陵辟儒士范祖幹葉儀克婺州召儒士許元胡翰等日講經史治道克處州徴耆儒宋濂劉基章溢葉琛至建康創禮賢館處之甲辰三月敕中書省有能上書陳言敷宣治道武略出衆者參軍及都督府具以閒或不能文章許詣闕面陳其事於是州縣嵗舉賢才及武勇謀略通曉天文之士間及兼通書律者洪武元年遣文元吉詹同等分行天下訪求賢才三年詔曰漢唐及宋取士各有定制然貴文學而不求德藝前元待士甚優而權要每納奔競之人夤緣阿附輒竊仕祿其懷材抱道者恥與並進自今年八月始特設科舉務取經明行修博通古今名實相稱者朕將親策於廷第其髙下而官之使中外文臣皆由科舉而進非科舉者毋得與官於是舉鄉試初場試經義二道限五百字以上四書義一道二場論一道俱限三百字以上三場策一道限一千字以上中式後十日復以騎射書算律五事試之各省貢額有差直𨽻百人河南山東山西陜西北平福建江西浙江湖廣皆四十人廣西廣東皆二十五人其才多或不及者不拘額數髙麗安南占城國士子許於本國鄉試貢赴京師明年會試中式百二十人帝親策試於奉天殿時以天下初定令各行省連試三年且官多缺員舉人俱免會試得赴選至四年乃定三年一舉六年旋令罷去而設聰明正直賢良方正孝弟力田儒士孝廉秀才人才耆民諸科目以德行為本文藝次之有司察遣京師不次擢用至十五年復設科舉十七年禮部以定式頒行初場試四書義三道每道二百字以上經義四道每道三百字以上未能者許各減一道四書主朱子集注易主程傳朱子本義書主蔡氏傳及古注疏詩主朱子集傳春秋主左氏公羊榖梁及胡安國張洽傳禮記主古注疏永樂間頒四書五經大全廢注疏春秋亦不用張洽傳禮記専用陳澔集說二場試論一道三百字以上判五道詔誥表內科一道三場試經史時務策五道俱三百字以上未能者許減二道凡舉子卷首備書姓名年甲籍貫三代本經前期在內赴應天府在外赴各布政司置簿登記卷縫皆用鈐印卷尾署印卷官姓名及長條印記試之蚤入場每人以軍一人守之禁講問代冒至昏納卷未畢者給燭三條燭盡不成者扶出其納卷赴受卷所類送彌封所以字號編記送謄録所謄録畢送對讀所凡所官皆謂之外簾官對讀畢送內簾主者同考官校閲監試官不得干預凡舉子用墨筆謂之墨卷謄録用硃謂之硃卷至主考復用墨筆鄉會試同先是吳伯宗嘗以廷試第一授禮部員外郎至十八年擢一甲丁顯等為修撰二甲馬京等為編修吳文為檢討而其餘皆觀政於諸司其在翰林承敇監等衙門者曰庶吉士其在六部都察院通政司大理寺等衙門者仍稱進士進士有庶吉士及觀政進士之名自此始也時科舉薦舉並用中外大臣下至倉庫司局諸雜流皆得舉文學才幹之士其被薦至者令又轉薦又嘗諭禮部徴經明行修練達時務之士年六十以上者置翰林備顧問至成祖永樂二年既授一甲三名翰林官復於第二甲擇文學優等者五十人及善書湯流等十人俱為翰林院庶吉士而吉士遂専屬翰林翰林無不由科舉者矣尋復命學士解縉等選曽棨以下二十八人就學文淵閣庶吉士周忱自陳年少願學乃增為二十九人司禮監月給筆墨紙光祿寺給朝暮饌禮部月給膏燭鈔人三錠工部擇近第宅居之帝時至館召試五日一休沐必使內臣隨行且給校尉騶從其後開科或不選所選亦無定額永樂十三年選六十二人宣德二年止邢恭一人以其在翰林院習四夷譯書久也孝宗時大學士徐溥言自永樂二年以來選取庶吉士無定制今後請每科選用令新進士録平日所作論策詩賦序記等文呈之禮部送翰林考訂擇其詞藻文理可取者按號行取禮部以糊名卷偕閣臣出題考試於東閣試卷與所投之文相稱即收預選每科所選不過二十人每選所留不過三五輩將來成就必有足賴者乃詔內間同禮吏二部考選以為永例然自嘉靖癸未至萬厯庚辰中間有九科不選萬厯甲戌張居正以子下第故不選崇禎甲戌丁丑亦不選凡與選者謂之館選以翰詹官髙資深者一人課之謂之教習三年學成優者留翰林為編修檢討次者出為給事御史謂之散館又是時內閣七人非翰林者居半纂修亦諸色參用天順二年李賢奏纂修専選進士由是非進士不入翰林非翰林不入內閣三年北直𨽻於順天府鄉試十三年二月行在禮部會試天下貢士三月策士於北京於國子監立題名石洪武二十一年始立石於應天府太學至是皆在北京十四年命貴州士子附雲南鄉試雲南鄉試始於六年至是貴州亦附焉嘉靖十四年巡按御史王杏癸貴州去雲南道里艱險士子附試不便乃就本省開科時會試有副榜仁宗洪熙元年定鄉試取士額南京國子監及南直𨽻共八十名北京國子監及北直𨽻共五十名江西五十名浙江福建各四十五名湖廣廣東各四十名河南四川各三十五名陜西山西山東各三十名廣西二十名雲南交址各十名宣德四年增雲南五名七年定順天八十名正統二年令不拘額五年定順天仍八十名應天百名浙江福建皆六十名江西六十五名河南廣東皆五十名湖廣五十五名山東四川皆四十五名陜西山西皆四十名廣西三十名雲南二十名六年增順天二十名景泰元年又令不拘額數四年南北直𨽻各增三十五名浙江江西福建河南湖廣山東各增三十名廣東四川陜西山西廣西各增二十五名雲南增十名成化三年又增雲南十名十年增五名𢎞治七年增雲貴共五名嘉靖十四年定雲南四十名貴州二十五名十九年增湖廣至九十名萬厯十三年增雲南五名交址初定十名尋以棄其地止會試令不過百名其後增損不一皆臨時取㫖初會試取士無定額少至三十二名多至四百七十二名又不分南北自洪武丁丑考官劉三吾白信蹈所取宋琮等五十二人皆南士三月廷試擢陳䢿為第一帝怒所取之偏命侍讀張信等覆閲䢿亦與焉帝猶怒不已親自閲卷取任伯安等六十一人六月復廷試以韓克忠為第一皆北士也然訖永樂間未嘗分地而取至仁宗始命楊士竒等定取士之額南人十六北人十四後又令南北各退五卷為中卷南取五十五卷北取三十五卷中取十卷仍百人為率景泰初禮部請取士不分南北户給事中李侃等謂北人拙於文辭向制分南北卷不可改禮部言鄉舉里選之法不可行矣取士若不以文考官焉據且北方中土人才所生以古言之大聖如周孔大賢如顔曽思孟皆非南人以今言之如靖逺伯王驥左都御史王翺王文皆永樂間不分南北所取士今豈可預謂北無其人乃從禮部請五年從給事中徐廷章言復分南北中卷南卷應天及蘇松諸府浙江江西福建湖廣廣東北卷順天山東山西河南陜西中卷四川廣西雲南貴州及鳳陽廬州二府滁徐和三州也神宗萬厯十一年申定鄉試遣官之制初鄉試主考二人兩京用翰林同考四人用教職而各省則先期於儒官內聘明經公正者為之景泰二年命在京在外鄉試同考官五經用五人三年命布按二司同巡按御史推舉見任教官年五十以下三十以上文學廉謹者聘充考官於是教官主試遂為成例其後聘取或非其人監臨官又往往侵奪其職掌世宗嘉靖七年用兵部侍郎張璁言各省皆遣京官或進士每省二人馳往主試兩京房考亦各加科部官一員閲兩科旋罷二十五年從給事中萬虞愷言各省鄉試精聘教官不足則聘外省推官知縣益之四十三年又命兩京同考用京官進士易書詩各二人春秋禮記各一人其餘仍參用教官至萬厯四年復議兩京同考教官衰老者遣回北京取足於觀政進士及候補甲科南京於附近知縣推官內選取至是詔定科場事宜禮部復舉張璁之說言彼時因主考與監臨官禮節小嫌故行之兩科而止今宜仍遣廷臣由是浙江江西福建湖廣皆用編修檢討他省用部科官而同考亦多用甲科教職僅取一二而已會試主考二人同考八人洪武十八年命臨期具奏於翰林內用主考二人并同考三人餘用教職景泰五年從尚書胡濙請俱用翰林部曹其後主考率以閣臣為正翰詹一人副之熹宗天啓二年命大學士何宗彥朱國祚主會試嗣後主會試皆用二輔臣以為常同考自景泰後亦漸增至武宗正德六年用翰林十一人科部各二人分詩經房五易書各四春秋禮記各二至是以易卷多減書之一以增於易十四年書卷復多乃增翰林一人以補書之缺四十四年詩易各增一房共為二十房翰林十二人科部各四人至明季不變舊制宗室無就試者萬厯二十三年鄭世子載堉請宗室得儒服就試視才器使始詔奉國中尉以下入試輔國以上爵尊不得與繼而禮臣言封爵科目原自兩途彼既願從科目入仕應照士子出身資格銓除從之惟不得除京朝官然制屢定未果行至三十三年誕育元孫頒詔復及後熹宗天啓二年會試始開宗科朱慎䤰成進士從主考何宗彥朱國祚請即授中書舍人莊烈帝崇禎四年朱統飾成進士初選庶吉士至歷科事變𢎞治十二年大學士李東陽少詹事程敏政主會試給事中華昶劾敏政鬻題與舉人唐寅徐泰乃命東陽獨主給事中林廷玉復劾之敏政坐謫官寅泰斥遣嘉靖十六年禮臣嚴嵩摘應天廣東試録序語激帝怒應天主考及廣東巡按御史俱逮問二十二年帝手批山東試録序譏訕御史葉經及布政使以下皆得罪亦嵩所中也萬厯三十八年會試御史孫居相劾同考官庶子湯賔尹與各房互換闈卷皆以私韓敬故時吏部方考察因置賔尹敬察典四十四年會試吳江沈同和第一同和素不能文文出第六名同里趙鳴陽手事發並論戍天啓二年中允錢謙益主浙江試所取錢千秋卷七篇俱用大結有以關節訐者謙益亦自檢舉千秋論戍崇禎初謙益以禮部侍郎與推閣臣而尚書溫體仁摘千秋事訐攻謙益謙益由此罷終明世不復起事跡較異者永樂七年己丑會試中九十五人皇太子以帝北征令送太學至九年廷試天順七年試日舉場火死者九十餘人俱贈進士出身改期八月會試次年三月廷試時英宗以大喪未踰嵗御西角門策之正德十五年以南巡未及廷試次年世宗即位亦御西角門策之嘉靖八年帝親閲廷試卷批奬一甲羅洪先楊名歐陽德二甲唐順之陳束任瀚六人大學士楊一清等遂選順之等二十人為庶吉士疏其名上請教習忽降諭云吉士之制不必選留唐順之等一切除授吏禮二部翰林院會議以聞尚書方獻夫遂謂順之等不必留并限翰林官員數而故事幾廢逮十一年壬辰巳罷館選至九月復舉焉崇禎七年舉人顔茂猷文兼五經作二十三藝知貢舉林釬以聞詔送內簾既副榜矣命特賜進士以其名刻於試録第一名之前武科自洪武二十年立武學並令武臣子弟於各直省應試三嵗武舉六嵗會試天順八年令文武官舉通兵法謀勇出衆者各省撫按三司直𨽻巡按御史考中後兵部同總兵官於帥府試策略教場試弓馬答策二道騎中二矢步中二矢以上為合式中半者次之成化十四年詔武科鄉會悉視文科例至𢎞治六年定武舉六嵗一行先策略後弓馬不中者不許騎射十七年復令三年一舉正德三年兵部議上武舉條格每文舉鄉試之年預行兩京十三省布政司有究韜略精武藝者報所在官司軍衛送都司有司送布政司從撫按同三司分場考試無三司者從撫按考試兩京亦送巡撫考試中式者以次年四月初九十二十五日會試兵部第一場校騎射人發九矢須中三矢以上二場校步射亦發九矢須中一矢以上俱於京營將臺前較閲及期或風雨不便騎射則移期於文舉場試三場答策二道論一道凡試卷皆彌封謄録書中馬步箭若干送內簾詳配等第其策論弓馬俱優為上等次弓馬稍次者次弓馬既優論策文藻不及者俱列中等餘並黜落以俟後舉其榜張兵部前次日引見畢於中府賜會武宴嘉靖元年定各省應武舉者巡按御史於十月考試兩京武學於兵部選取俱送兵部次年四月會試以翰林二員為考試官給事中部曹四員為同考官後又倣文闈南北卷例分邊方腹裏每十名邊六腹四以為常萬厯之季科臣請設將材武科初場試馬步箭及鎗刀劍㦸擊刺等法二場試營陳地雷火藥戰車等法三場各就其兵法天文地理所知者言之報可而未行崇禎四年以時方需才命殿試傳臚悉如文例乃賜王來聘等及第有差武舉殿試自此始也其任官則文歸吏部武歸兵部吏部凡四司文選掌銓選考功掌考察其職尤要選人有三途曰進士曰舉人貢生官生監生儒士曰吏員承差知印書算篆書譯字通事諸雜流初授者曰聽選升任者曰升遷其法每年吏部六考六選凡引選六類選六逺方選二聽選考定升降者雙月大選改授改降丁憂候補者單月急選其㨂選三嵗一舉行凡升遷必滿者若員缺應補不待滿者曰推升內閣大學士吏部尚書由廷推或奉特㫖侍郎以下及祭酒吏部會同三品以上廷推太常卿以下部推通參以下吏部於宏政門會選詹事由內閣各衙門由各掌印在外官惟督撫廷推九卿共之吏部主之布按員缺三品以上官會舉監司則序遷其防邊兵備率由選擇保舉付以敕書其在外府州縣之正佐在內大小九卿之屬員皆常選官選授遷除一切由吏部太祖洪武中仕進多由薦舉耆儒鮑恂余詮全思誠張長年等起家為文華殿大學士儒士王本杜斆趙民望吳源特置為四輔官兼太子賔客賢良郭有道秀才范敏曾泰稅户人才鄭沂儒士趙翥為尚書儒士張子源張宗德為侍郎耆儒劉堉關賢為副都御史明經張文通阮仲志為僉都御史人才赫從道為大理少卿孝廉李德為府尹儒士吳顒為祭酒賢良欒世英徐景升李延中儒士張璲王廉為布政使孝弟李好誠聶士舉賢良蔣安素薛正言張端文學宋亮為參政儒士鄭孔麟王德常黃桐生賢良余應舉馬衛許安范孟宗何德宗孫仲賢王福王清聰明張大亨金思存為參議其以漸而躋貴顯者又無算也吏部奏薦舉當除官者至三千七百餘人少亦至一千九百餘人南人官北北人官南其後祇令避本省學官不避仁宗洪熙元年吏部尚書蹇義言布按二司及府州縣官以承流宣化撫字為職必須銓選精嚴薦舉有法方可得人請令在內文職七品以上在外五品以上及州縣正官各舉所知賢能廉幹堪任牧民及風憲者一人吏部考驗酌用其所保非才或授職後闒冗卑汚連坐舉主乃定制凡遇布按二司知府缺令三品以上京官保舉其後以知府多由資格不稱任宣宗宣德六年復命大臣薦舉英宗正統元年詔京官三品以上舉堪任御史者四品及侍從言官舉堪任知縣者各一人二年大學士楊士竒言宣德七年以前藩臬二司及府州縣正官惟吏部所舉權衡獨擅聞見不廣未盡得人乃敕大臣保舉得人遂多間有一二非才蓋緣舉主審察不至或徇私不公所致昔唐太宗命在京三品以上舉郡守縣令遂致斗米三錢之效近來有等京官無人舉保造為謗語欲隳良法伏望仍遵先帝敕㫖行其所舉之人籍記舉主後有犯贓必正舉主之罪詔從之十二年給事中余忭復言方面郡守有缺吏部當奏諸上裁尚書王直等以方面郡守由保舉升用者多稱職未可擅更詔從直等言而仍採忭疏許言官指劾自宣德三年況鍾趙豫等以薦擢守蘇松諸府賜敕行事十年用郭濟姚文等為知府亦如之其所奏保者郎中員外御史及司務行人寺副皆與不依常調也部曹及御史由堂上官薦引類能其官帝又慮諸臣以連坐故畏不舉嘗語大學士楊溥全才甚難一言之薦亦豈能保其終身欲得賢才當厚教養時吏治稱極盛焉英宗遵行舊典然日久生弊所舉或僚屬門下親舊私比方面官方正謝莊等由保舉得罪而無人保舉之御史知府往往九年不遷景泰三年詔罷職文官無贓犯而才學可用者聽在京四品以上在外撫按方面及府州縣正官薦用孝宗𢎞治六年詔各撫按及布按二司遇府州縣官才行俱優者無分舉貢吏員出身一體保舉五品以上果有才德出衆者開報吏部奏請定奪初太祖嘗御奉天門選官且諭毋拘資格選人或即授侍郎進士監生與辟薦者互用給事御史亦初授升遷各半永宣後漸循資格而臺省尚多初授至是資格始拘舉貢雖與進士並稱正途而軒輊逈異故有是詔嘉靖四十四年詔各撫按於所屬中不論舉貢進士但有賢能一體保舉隆慶三年掌吏部大學士髙拱言國初進士舉人並用乃後進士偏重而舉人甚輕至於今極矣宜破拘攣之見以開功名之路凡自授官以後惟考政績不必問其出身吏部自行體訪茍係賢能即一體升取各撫按官一體保薦毋有輕重詔嘉納之然勢已積重不能復返世宗嘉靖四十四年吏部尚書嚴訥請令本年朝覲官各舉所屬府佐以下治行卓異者如國初馮堅以典史擢都御史王興宗以直㕔擢布政司故事超擢一二以鼓其志從之穆宗隆慶四年令於諸部寺屬及南京科道各省藩臬中有志行共推者遇京堂缺每嵗間擢數人從大學士陳以勤請也神宗萬厯二十二年吏部尚書孫丕揚患中人請託乃行掣籖法初選人常用拈􅍐尚書李戴擬行此法報可至是始行凡大選急選聽選人自掣一時誦為至公而銓政自此一變明制給事中御史謂之科道洪武至天順成化間進士舉貢監生皆得選補其選擢者推官知縣而外或由學官其後監生及新科進士皆不得與或庶吉士改授或取內外科目出身三年考滿者內則兩京五部主事中行評博國子監博士助教等外則推官知縣自推知入者謂之行取其有特薦則俸雖未滿亦得與焉嘉靖萬厯間嘗令部曹不許改科道復亦間行之京官惟進士得與考選推知行取則舉貢皆與天下守令進士十三舉貢十七推知行取則進士十九舉貢才十一又率有臺無省多南少北嘉靖間嘗令監生與選旋罷不行其考選之例優者授給事中次者御史又次者以部曹用雖臨時考試而先期有訪單出於九卿臺省諸臣之手往往據以為髙下崇禎二年考選畢吏部以中書二人訪單互異上請帝責以推諉不悟訪單之非也武臣除授內則中左右前後五府留守司外則各都司各衛所及三宣六慰流官八等都督及同知僉事都指揮使同知僉事正副留守世官九等指揮使及同知僉事衛所鎮撫正副千户百户試百户直省都指揮使二十一留守司二衛九十一守禦屯田羣牧千户所二百十一及苗蠻土司皆聽兵部武選司選凡大選曰色目曰狀貌曰才行曰封贈曰襲䕃其途有四曰世職曰武舉曰行伍曰納級任子之制明初文武官自正從一品至正七品子孫許廕一人其廕由正從五品以至流外之上中下三等以次遞降大槩與元制同而旁廕降等及補試之法亦略如之武官爵至六品其職死者襲老疾者替世久而絶以旁支繼之凡襲職子弟年二十者比試初試不中受職署事食半俸二年再試中者食全俸仍不中者謫為軍永樂以後在京三品以上滿考著績方得請廕遇國家有大典禮如登極奉徵號冊后建儲併皇子生屢有加恩亦率皆勳戚及政府大臣得之而陳亡克敵及卒於王事者或以功廕或以難廕例皆録用其子孫終明之世不變也孝宗時廕子未仕亡殁許其補廕若應得廕子恩而身故許其子孫自陳其有子而願廕其兄弟子者聽後又漸減其制焉正德八年定制補廕只許一人已補而又故者毋得再補萬厯十一年詔凡廕子未仕而故年逺親盡者毋得補廕隆慶五年詔凡以廕入監後中科目者仍令補廕又先由録廕國子生後以軍功改授錦衣衛千百户者許以嫡次子孫補之蓋明時文武二廕文廕如國子生中書舍人尚寶丞光祿丞通政知事大理評事之類大抵文臣三品以上子孫為之武廕則勳戚之家與閫帥及文臣有軍功者其廕如錦衣各衛千百户指揮僉事同知及都指揮僉事之類或世襲或一世二世皆酌其功之小大請㫖裁定無常制若夫貂璫子弟濫膺勳爵是則明之亂政不足述也考績唐自肅宗後考課混淆內外悉考中上德宗貞元五年趙宗儒領考功事入中上者才五十人六年以刺史縣令弊在數更令以四考為限七年令縣令四考無替者俟五考又諸司朝官須據每年功過行能比類格文以定升降凡考第不得槩申中上憲宗元和二年中書門下奏請京常參官五品以上前資見任俱量定考數於中書置具員簿以序內外庶官應諸州刺史次赤府少尹次赤令諸陵令五府司馬及東宫官除左右庶子王府官四品已下並請五考其臺官先定月數令丞侍御史滿十三月殿中侍御史滿十八月監察御史依前二十五月與轉三省官並三考外餘官並四考外其文武官四品以下並三考量改尚書省四品已上餘文武官三品已上不限此例有進改臨時奏聽進止其權知官至兩考與正授未經正授不得用權知官資改轉其緣官闕需人及緣事須移者不在常格敘遷之限諸道及諸使副使行軍司馬判官參謀掌書記支使推官巡官等有敕充職掌帶檢校五品以上官及臺省官三考與改轉餘官四考十五年正月穆宗即位考功員外郎李渤請考宰相蕭俯段文昌崔植翰林學士杜元穎等中下李絳張惟素李益等諫幸驪山鄭覃等陳畋游宜考上下會渤墜馬請急馮宿判考功以三品上為清望官嵗進名聽內考舊事非有司所得與渤議遂廢宣宗大中五年吏部奏刺史縣令凡尋常賦稅判斷户口差科及修整廨館開通道路之類不合計課惟開田招户辨獄雪寃及新制置之事任其録由申上又近年刺史自録課績申省務衒者張皇其事謙退者緘默不言今請並委本道觀察使定考録申又州府申官人覆得冤獄書殊考者其元推官多不懲殿或當書下考至時又不提舉今請書殊考日並書元推官下考如以為屈任經廉使及臺省陳論其官人殿犯官長斷於書考日與下考如至時不舉本判官當書下考省司校其所犯如與令式相符便申奏候敕並各牒州府又諸州府申奏每書兩考三考前課績以冀褒升省司檢勘不精便有僥幸今後不得更申前績又諸州府所申考解皆不指言善最或漫稱考秩或廣說門資今後如有此色請令降其考第從前應得考之人並給考牒為據又近年考牒或一人而數處請給或數年後方請今後得殊考及上考人省司於敕下後便據人數給與後唐明宗初兩班考績皆以恪勤匪懈清慎明著為辭祠部郎中王承辨請明書考課以示勸懲而卒未果行時內外文武臣寮每嵗有司定考將相俱用御筆黜陟下中書門下商行廢帝清泰二年定令録參軍一年依限征科了絶者加階二年與試銜三年與服色攝令三年內總及限豫真本判官一年加階二年改試銜三年轉官本曹官省限內征了與試銜轉官諸節級三年內總了賞三十千晉髙祖天福二年敕朝臣中以才特除外任秩滿無遺闕者將來擬官之時在外一任同在朝一任升進其就便自求外職及非特任者不在此限出帝時以經費尚多公私重困令諸州帳籍錢榖徴科一季一奏兩年賦稅及限聽三周年為滿三年皆得辦事即與遷陟如或才到任所課績不前亦即罷替漢隱帝乾祐二年令諸州府長吏隨户勸蒔桑棗小户十本至二十本中户三十四十大户五十至一百受代時批於厯子省司據為考課又以外州解由虛增農户稅額無添蓋有拆居耕種各立户名或是避稅逃移併未歸業今後解由內將本處添出户口與合徴稅賦開坐周以前皆以三十月為三考至世宗顯德五年敕自後授官並以三周年為限閏月不在其內尚書考功奏言當司所書校內外六品以下赴選官員考第今後以一周年校成一考三考滿後未有替人在任更一年與成四考次日俱不在計限逐年須具到任月日自前課績第二考不得叠計其末考須具得替年月日比類升降諸司諸色流內出身人逐年於六月初一日後投狀所司省司據狀却牒本司簡勘九月前較奏須畢有公事出外及在職功過俱須牒報考功不得有妨逐年書較宋太祖置審官院考課中外職事受代京朝官引對磨勘蓋復序進之制其後稍立法文臣五年武臣七年曽犯贓罪則文臣七年武臣十年治平三年九月詔待制以上六嵗至諌議大夫止京朝官四嵗至前行郎中止少卿監以七十員為額於是始有止法元豐四年中書擬定磨勘轉官諫議大夫待制以上自通直郎至大中大夫三年大中大夫以上進士八年餘十年承務郎以上至朝請大夫進士八年餘十年崇寧四年改朝請大夫至中散大夫七年中大夫非兩制不得轉大中大夫紹興四年修立承務以上四年即轉奉直朝議中散中奉中大夫者七年紹興八年添入中大夫諸朝議奉直大夫并特恩人以八十員為額餘如舊法武臣大使臣修武郎至武德大夫五年武功大夫七年轉遙郡刺史以後十年至遙郡防禦使止而止法尤為嚴密矣進納人至從義郎止吏職非泛補授至訓武郎止樞密院人亦至訓武郎止三省人至朝請大夫止已出官不得轉中大夫內侍至武功郎止駙馬都尉至承宣使止而醫官不過和安大夫太史局不過春官大夫橫行非戰功不得除授至選人七階以考第資歷無過犯或有勞績者遞遷謂之循資若磨勘應格自令録以上及六考者皆改著作佐郎無出身及十考者改大理寺丞其有功賞者減一考若未該磨勘循格至支使及八考者有出身人改太子中允餘改太子中舍其四色判官及九考以上者改祕書丞無出身人止殿中丞十二考以上改太常博士仁宗時以考第改官者猥多遂詔用帥守通判監司保舉以嵗改百員為額元豐稍鐫改官之額觀察判官以上改奉議郎無出身人改通直郎掌書記改通直郎支使以下一例改宣德郎初文武常參官各以曹務閒劇為月限考滿即遷太祖謂非循名責實之道會監門衛將軍魏仁滌等以治市征有羡詔並增秩因罷嵗月敘遷之制非有勞者勿進秩建隆三年定州縣官損户口一分以上者降考令尉任內無盜者書上考後又令廨舍倉庫損壞者殿一選完葺而不煩民力者減一選太宗即位詔諸道漕臣廉訪官吏能否為三等臨事簡慢為下職務粗治為中治狀尤異為上端拱三年令户部侍郎王沔等磨勘京朝官吏部侍郎張宏等磨勘幕職州縣官樞密院都承㫖趙鎔等磨勘三班唐制以考功郎中專主考課宋初特重其事嘗命清望官兼任之至是典益重焉明年立審官院考課院以翰林學士錢若水樞密直學士劉昌言同知審官院事判流內銓翰林學士蘇易簡虞部員外郎知制誥王旦同知考課院事真宗景德四年始令京朝官及三年磨勘後方得遷官仁宗時凡選人遷京官引對當與者帝必省察當否嘗令選人私罪如衙謝弗至對揚失儀皆弗聽磨勘慶厯三年自朝官至郎中少卿須清望官五人保任乃得遷范仲淹等請之後言者以適長奔競乃止至和初承平日久職業因循賈黯判流內銓稍以風義整救推官桑澤官益州三年不知文死代還當遷投牒自陳人莫肯為作文書澤始發喪以不得家問為解喪除求勘黯謂三年不與其父通即非匿喪猶之不孝澤遂廢歸不齒晉州推官李亢初以資進有私罪引去匿所得官以白衣應舉及第積十嵗當勘乃自首初事黯以罔冒坐罷之至英宗治平二年黯復言磨勘選人未引對者至二百五十餘人皆由薦吏嵗限定員濫舉充數明年乃詔嵗舉京官以三分率之一分復以蔡抗言罷知雜御史觀察使以上嵗得舉官法先是自發運使至知州歸考課院専以監司所第為據至考監司則總其甄别部吏副以採訪才行為課悉書中等無所髙下神宗即位凡職皆課凡課責實監司所上守臣不占等者展年降資其治狀優異者增秩賜金帛以璽書奬勵若監司以上則命御史中丞侍御史考校又詔考課縣令以斷獄平允賦入不擾均役止盜勸課農桑賑恤饑窮導修水利户籍增衍整治簿書為最而參用德義清謹公平勤恪為善參定上中下等能否尤殊絶者别立優劣二等嵗上其狀以昭賞罰其入優劣者賞罰尤峻髙宗南遷禮部員外郎舒清國言諸道郡縣頃罹兵燬請以户口增否别考守令知通考縣令監司考知州分上中下三等每等又分上中下會考功較優劣孝宗興隆初著對用之令凡恩例減磨勘者須對一年實歷乾道二年廷臣言國朝盛時以審官院考京朝官考課院考幕職州縣官皆中書或兩制臣僚校其能否以施賞罰熙寧中始罷之自此州縣之吏不復知有殿最雖有批書徒為文具若身為侍從並批書俱亡矣望遵故事監司郡守朝辭日别給御前厯子如薦賢才幾人若為治錢榖若為理獄訟興某利除某害每考令當職官吏從實批書代還詔執事考核其風績有聞者增秩無狀者罰之寧宗時以郡國按刺多徇私情乃倣舊制於御史臺别立考課一司以刺舉多者為中無刺舉為下嵗終各以能否之實上聞以昭升黜度宗咸淳三年酌核舊制凡文武官公勤廉恪又職事修舉為上公勤廉恪有一長為中既無廉聲又多謬政為下御史臺總帥閫監司監司總守倅守倅總州縣屬官戎司及屯司軍大壘則總之制司無制司則併各郡總管鈐轄並總於帥司或以逐路所部州縣分𨽻轉運提舉提刑三司守倅月一考州縣屬官監司會所𨽻守倅制司㑹戎司軍壘遵照舊制互用文移會其兵甲獄訟金榖之數及各司屬官書擬公事拘𣙜錢物招軍備器之數次月置冊各申御史臺至半年類考三年定為三等中者無所賞罰上者或轉官或減磨勘下者降官展磨勘遼聖宗統和九年詔諸道察貪酷十二年詔州縣長吏有才能無過者減一資考太平六年詔南北諸部廉察州縣及錫林美稜之官不治者罷之又詔大小職官有貪殘虐民者立罷之終身不録其不廉直雖處重任即代之能清勤自勵者在卑位亦聽薦拔興宗時詔東京留守察官吏廉幹清强者以聞又詔諸職事官以禮受代及以罪去者置籍金制凡內外官所歷資考及更代之期去就之故秩滿備陳於解由吏部據定能否又撮解由之要於銓擬讀之謂之銓頭又會歷任銓頭書於行止簿其簿以姓為類書各人所歷資考功過其犯公私罪贓汙者謂之犯選格以廉察升者為廉升東北沿邊州郡升者為邊升其常調制正七品兩任升六品六品三任升從五品從五品兩任升正五品正五品三任升刺史凡內外官皆以三十月為考隨朝官以三十月為任升職一等章宗時定制正七品已上皆兩任而後升明昌四年以前制有職官已帶三品者不許告遷乃定制已帶三品散官實歷五十月從有司照勘格前進官一階格後為始再算宣宗貞祐三年詔河北山東等路及平涼慶陽臨洮府涇邠秦鞏德順諸州經兵四品以下職事官並以二十月為滿興定元年制鄜坊丹州四品以下州縣官視環慶例自熙宗天春三年令溫都思忠廉問諸路得廉吏杜遵晦以下百二十四人各進一階罷貪吏張軫以下二十一人皇統以後常遣朝官廉察官吏章宗泰和元年十月命監察御史分四路巡行每路女直漢人各一人同往宣宗貞祐二年臣僚請依大定舊制以監察御史及審録官分詣諸道考核庶幾使人自勵興定初以縣令或非材監察御史一過不能備知遂令每嵗遣御史巡察仍别選官巡訪以行黜陟之政并定監察御史失察法哀宗至大元年設司農司自卿而下迭出巡察吏治凡職官廉能及汙濫不職各第三等黜陟廉能官第一等進官一階升一等其次約量注授汙濫官第一等殿三年降二等次二年又次一年皆降一等明安穆昆廉能者第一等遷兩官其次遷一官汙濫者第一等決杖百罷去擇其兄弟代之次杖八十又次杖七十皆令復職佛寧決則罷去永不補差凡功酬虧永之制諸提㸃院務官三十月遷一官周嵗為滿取無虧月日用之大定四年定制一任內虧一分以上降五人二分以上降十人三分以上降十五人若有增羡則依此升遷其升降不盡之數於後任充折二十一年以舊例監當官責決並得赴調而不顧廉恥者不以刑罰為畏乃命虧永及一酬以上依格追官殿一年外虧永不及酬者亦殿一年二十九年罷年遷之法更定制比永課增及一酬遷一官兩酬遷兩官如虧課則削亦如之各兩官止又罷使司小都監與使副一體論增虧及餘前升降不盡之數後任充折之制泰和元年制犯選虧永者右職漢人至宣武將軍從五品女直至廣威將軍正五品方注縣令又女直至武義從六漢人諸色人至武略從六皆注諸司兩除一差至明威方注丞簿宣宗貞祐三年制虧永犯選者遷至宣武注諸司至懷逺從四下方注丞薄至安逺從四上注下令初世宗嘗諭宰臣曰今天下州縣闕員朕欲不限資歷何以遍知其能欲遣使廉問又慮擾民而未得其真若辟舉法久則生弊不如選人暗察明廉如其相同始與升黜又諭曰凡在官若不為隨朝職任便不能離常調宜驗入仕名項或廉等第用之若不稱職即與外除又諭隨朝之官自計歷一考則得某職兩考則得某職第務因循碌碌而已自今外路官公勤者始與內除茍簡者不須滿任即以本品出之至明昌三年上以老病不任職及不堪親民者舊由隨路提刑司察實即改除他路他路覆察若實勿復注親民之職因問考課法可行否尚書右丞劉瑋曰考課之法綜核名實今提刑司體察廉能贓濫以行賞罰亦其意也若别議設法恐涉太煩又問唐時何如瑋對以四善二十七最泰和中遂酌唐制定為四善十七最頒行之四善曰德義有聞曰清慎明著曰公平可稱曰勤恪匪懈十七最曰禮樂興行肅清所部為政教之最曰賦役均平田野加闢為牧民之最曰決斷不渝豫奪當理為判事之最曰鈐束吏卒姦盜不滋為督領之最曰按簿分明評擬均當為檢校之最以上謂縣令丞簿警巡使副録事司候判官曰詳讞合宜咨執當理為幕職之最曰盜賊消弭使人安靜為巡捕之最曰明於出納物無損失為倉庫之最曰訓導有方生徒充業為學官之最曰檢察有方行旅無滯為關津之最曰提防堅固備禦無虞為河防之最曰出納明敏數無濫失為監督之最曰禁察禁囚慎重無怨為獄官之最曰物價得實姦濫不行為市司之最謂市令曰戎器完肅扞守有方為邊防之最謂正副隊將鎮防官曰議獄得情處斷公平為法官之最曰差役均平盜賊止息為軍職之最謂都軍軍轄凡縣令以下三最以上有四善或三善者為上升一等三最以上有二善者為中減兩資歷三最以上有一善為下減一資歷節度判官防禦判官軍判以下一最而四善或三善為上減一資歷一最而二善為中升為榜首一最而一善為下升本等首宣宗興定元年以六事考舉縣令一田野闢二户口增三賦役平四盜賊息五軍民和六詞訟簡六事俱備為上等升職一等兼四事者中等減二資歷其次為下等減一資歷否則罷降平常者依本格元初中原略定事多草創東平行臺所統五十餘城州縣官或自將校或起民伍多昧從政甚以掊克聚斂為能太祖乃命宋子貞為右司郎中仿前代觀察采訪之制立糾察官吏程式黜貪惰奬廉勤至元元年令官吏員數計月日以考殿最凡理算論日月遷轉憑散官內任以三十月為滿外任以三嵗為滿錢榖典守以二嵗為滿而理考通以三十月為則內任官率一考升一等十五月進一階京官率一考視外任減一資外任官或一考進一階或兩考升一等或三考升二等四品則內外考通理前任少則後任足之或前任多則後任纍之一考及二十七月兩考及五十四月三考及八十一月以上遇升則借升而補以後任十年以三十月遷轉太速六十月太遲乃定三嵗一遷十九年定職官回降之制江淮官已受宣敕資品例升二等遷去者依舊於江淮任用考滿者並免回降不及考者例存一等有出身未入流品受宣者任回三品擬同六品四品同七品五品同正八品受敕者六品同從八品七品八品同九品九品同提領案牘巡檢無出身及白身人受宣者三品同七品四品同八品五品同正九品受敕者六品同從九品七品八品同提領案牘巡檢九品擬院務監當官已上有資品人員再於接連福建兩廣溪洞州郡任用擬升一等兩廣福建别議升轉是嵗又定內外官三年為考滿任滿始許遷敘二十八年更定隨朝以三十月為滿在外以三周嵗為滿錢榖官以得代為滿吏員以九十月日出職是嵗改提刑按察司為肅政廉訪司每道仍設官八員除二使留司以總制一道餘六人分臨所部凡民事錢榖官吏奸弊一切委之俟嵗終省臺遣官考其政效武宗至大二年令州縣正官以九年為任三年令考功印厯給親民長吏嵗終監治官驗其行蹟書而上之廉訪御史臺尚書吏部考校以為升黜先是至元十九年集賢直學士程巨夫奏國朝建御史臺有考課之目而未得其要乞照前朝體例應諸道府州司縣下至曹掾等各給出身印紙厯子一卷書本人姓名出身於其前俾各處長吏聨銜狀保書其歷任月日功過於後秩滿有司詳視而差其殿最則賢否一覽而知是秋始頒行之仁宗皇慶元年臺臣言比年廉訪司多不悉心奉職宜令監察御史檢核名實黜升之制可時御史中丞郝天挺言國初論最在內須三十月在外須三周嵗比者省院臺部之臣久者一二嵗少者三五月甚有旬日遷易者奔走往來之不暇何暇宣布參理乞今惟大臣可急闕選授其餘內外大小官屬必候任滿考績方許選調庶免朝除夕改啓幸長奸之弊從之文宗天厯二年中書省臣言比年朝官多不久於其職或數月改遷於典制不類且治績無從考驗請如舊制敕除風憲官外其餘朝官不許二十月內選調明制有考滿考察考滿者論一身所歷之俸有上中下三等曰稱職曰平常曰不稱職三年給田曰初考六年曰再考九年曰通考依職掌事例考核升降諸部寺所屬初止署職必考滿始實授外官率遞考以待核凡府以十五萬石以上州七萬石以上縣三萬石以上或親臨王府都布按三司并有軍馬守禦路當驛道邊方衝要供給處為繁其田糧不及僻靜處為簡繁簡或不相當則許互調謂之調繁調簡在京諸司俱從繁例太祖洪武十四年制在京六部五品以下聽本衙門正官察驗行能勤怠其四品以上及一切近侍官與御史并太醫院欽天監王府官不在常選者任滿黜陟取自上裁十六年凡京官考核俱由其長開具送部核考其直𨽻有司首領官及屬官亦從本司正官考核任滿從監察御史核考各布政司首領官俱從按察司考核其茶馬鹽馬鹽運鹽課提舉司軍職首領官俱從布政司考核仍送按察司覆考其布政司四品以上按察司鹽運司五品以上任滿黜陟取自上裁內外入流並雜職官九年任滿給由赴吏部考核依例黜陟有殊勳異能超邁等倫者取自上裁又以事之繁簡與歷官之殿最參核等第以為升降考察者通天下內外官計之其目有八曰貪曰酷曰浮躁曰不及曰老曰病曰罷曰不謹京官自四品以上自陳候上裁外五品以下分致仕老病降調浮躁不及閒住罷不謹為民貪酷有差具冊奏請謂之京察初五品以下官十年一考孝宗𢎞治十四年從南京吏部尚書林瀚言六年一察察以己亥嵗大臣既自陳定去留而居官有遺行者給事御史得糾劾謂之拾遺所攻擊無獲免者後至嘉靖十七年始禁之外官凡州縣以月計上之府府上下其考以嵗計上之布政司至三嵗撫按通核所屬官事狀造冊報送麗以八法亦以致仕降調間住為民為差謂之大計計處者不復敘用定為永制自洪武五年敕考課有司必書農桑學校之績六年二月令御史臺御史及各道按察司察舉有司官有無過犯奏報黜陟考察之始也十年七月遣御史巡按州縣設巡按之始也十一年三月命吏部課朝覲官殿最朝覲考核之始也入覲官吏部第為三等稱職而無過者為上賜坐而宴有過而稱職者為中宴而不坐有過而不稱職者為下不預宴序立於門宴者出然後退至十八年帝令稱職者升平常者復職不稱職者降貪汙者付法司罪之闒茸者免為民成祖永樂二年九月命自今御史巡行察吏毋得托拾人言賢否皆具實蹟以聞仁宗即位以御史巡察外官奉命者不能無私諭吏部尚書嚴加戒飭並命考察布按二司官不職者降為縣官憲宗朝吏科給事中王瑞等言三載黜陟朝廷所以勵庶官之典今天下諸司除土官外無慮九千餘處諸司官除隂陽醫僧道外無慮千萬餘員吏部於各官之賢否在布按二司則據撫按揭帖在諸司則參布按等官揭帖上之詢訪雖出公心下之奏報多任私意或假公市恩或乘機償怨毁譽失真賢否失實其他弊端不一而足乞諭吏部榜示各官凡揭帖所報失實者連坐或有當黜而留者許本處撫按論奏有當黜而妄訴者亦罪之命俱如所言武宗正德十四年以吏部侍郎張綵請不時考察京官時六年京察之令已久然有以初即位而考察有以災異而考察至考察科道則或以輔臣去位而及其黨者惟嘉靖三十五年輔臣李本掌吏部以尚書李默治獄故悉取部寺九卿自尚書至尚寶丞及六科十三道分别去留蓋帝以星變欲除舊布新而嚴嵩以此伸恩怨也吏部嘗上言舊制在外有司官員九年考滿稱職者給與應得誥敕至正統十四年凡外官曽經撫按官保舉政績果有卓異不拘三六年考滿先與應得誥敕旌異蓋九年封贈所以待常流三六年先得旌異所以優異等國家之制未為不備但舊例薦舉官員必須轉行巡按御史核實方與奏請文移往返動經嵗月以致恩典稽遲人不知勸夫在外官員職在臨民比之京官勤勞數倍顯揚之願人情所同第近年保舉每病冗濫請今後撫按官薦舉所屬應旌異官員務遵正統間例將本人任內卓異政績明白開奏不許濫及通候各官考滿到部察訪相同即與比照京官事理按月類題免其再行移核穆宗隆慶四年掌吏部事大學士髙拱言數十年來考察澄汰之數大較不相上下以是襲為故常其數既足雖有不肖姑置弗論其數不足雖無其人强索以充其稱為不肖者又多苛求隱細茍應故事而大奸大惡或有所不問又考察半嵗前撫按論劾俱不題覆夫為不善者方其未露猶或有僥幸之心少存顧忌若其既露明知必去則將無所不至矣而乃留之半嵗民何以堪自今撫按官凡有糾劾疏既具即革任聽處疏下即覆其去者如考察例不得復用其留者檄到乃覆至考察懲汰必大奸惡一切隱細勿論斥去不肖從其多寡惟求至當毋襲故常又言外官才力不及者不徒曰調用而必曰酌量調用原無定議然部院考察與撫院論劾概以不及則銓補之日無所適從尚得遷就其間自今方面有司有才不宜於地者當移其地不易其官署曰調簡僻有官不稱其才者雖易其官當仍其品署曰調簡散亦有操守未壞性氣稍偏尚有他長可録年勞當敘者署曰降級或才力不宜有司文學猶堪造士者署曰改教四者皆麗不及之條者也至於先以調簡再考不及者即從罷斥置罷軟之下詔俱從之明於察典最重其責貪官尤深故每遇恩詔凡冠帶閒住致仕為民復冠帶者必曰不係朝覲考察嘉靖元年下詔乃除此語𢎞正以來士大夫廉恥自重以掛察典為終身之玷萬厯時閣臣有所徇庇間留一二以撓察典至三十九年二月御史徐兆魁以顧憲成貽葉向髙孫丕揚書盛稱鳳陽巡撫李三才廉直遂劾東林黨人隂持計典時尚書孫丕揚既劾罷御史金明時主事秦聚奎而侍郎王圖復考罷祭酒湯賔尹宣城人諭德顧天埈崑山人其黨力攻圖圖遂引去黨局既成互相報復至國亡乃已武臣考察軍政自成化二年定五年一行之制以現任掌印帶俸差操及初襲官一體考核十三年令兩京通考以為常五府大臣及錦衣衛堂上官自陳候㫖直省總兵官如之在內五府所屬並直省衛所官悉由巡視官及部官注送在外都司衛所官由撫按造冊繳部副參以下千户以上由都布按三司察注送府咨部考舉題奏錦永衛管戎務者倍加嚴考南北鎮撫咨之各衛所及地方守禦并各都司𨽻巡撫者例同惟管漕運者不與考欽定續通典卷十九
