body:
  text: 禮凶五服年月降殺杜典分為五卷今於原書已載及唐以後與古制同者槩不録録杜典所載古制未備及後世增入者合為一卷斬衰三年唐宋元明唐律為人後者為所後父孫為祖後承重婦為舅其夫為祖後者妻亦從服皆斬衰宋政和禮婦為舅與唐律同夫為祖曽髙祖後者其妻從服亦如之元典章為人後者為所後父與唐律同明會典孝慈録同子為父母為人後者為所後父母女在室為父母女嫁反在室為父母嫡孫為祖父母承重及曾髙祖父母承重者同父故適孫為祖承重服若父祖俱亡而子孫為曾髙祖後者同婦為舅姑為人後者為所後祖父母承重庶子為所生母子為繼母為慈母為養母夫為人後則妻從服庶子之妻為夫之所生母俱斬衰孫為祖持重議宋元宋神宗時知太常禮院蘇頌議承重法疏略曰古者貴賤不同禮諸侯大夫世有爵祿故有大宗小宗主祭傳重之義則喪服從而異制匹士庶人亦何預焉何以言之喪服傳曰父為長子何以三年也正體於上又乃將所傳重也鄭康成曰重其當先祖之正體又以其將代已為宗廟主也而經不言長孫為祖者蓋有爵土則父殁次當傳已其承重可知也近代仕不世爵宗廟因而不立尊卑亦無所統其長子孫與衆子孫無以異也生而情禮則一死而喪服獨異恐非先王制禮之本意也而世俗之倫乃以三年之喪為承重故謂當服者為承重而不知為承大宗之重也嘗聞慶厯中朝廷欲議臣僚應任子者長子長孫差優與官餘皆降等此亦近古立宗之法也然不果行慶厯末石中立卒未幾庶子從簡又卒嫡孫祖仁先服期不知後服禮官以謂宜别制斬衰嘉祐中劉輝祖母卒自言幼孤鞠於祖母雖有諸父亦乞解官行服禮官議輝長孫當承重臣謂祖仁官丞郎列近職世荷賞延是有重可承者也輝乃庶官世又非顯若云鞠於祖母報以三年可也有諸父在而令承長孫重非也故熙寧八年六月詔書嫡子死無衆子者然後嫡孫承重襲封爵者雖有衆子猶承重此明宗子傳重正合古禮而未議無封爵者及庶人所以承重之意故學禮者猶以為未盡也傳曰都邑之士則知尊禰大夫及學士則知尊祖故諸侯及其太祖天子及其始祖之所自出由是言之尊卑之禮有隆殺之異而喪服從而為之制也明矣今服祖重者而無所以為重之義又無大夫庶人之别是尊卑一統而貴賤同體也乞詔禮官博士參議禮律若以無封爵者無傳重之義即别立服制如在禮合承重亦參酌古今收族主祭之禮立為宗子繼祖有以異於衆子孫之法及庶人與士大夫不當同用一律頒布天下使人知尊祖不違禮教則州郡用法斷於不疑也建炎以來朝野雜記髙宗之喪孝宗為三年服及孝宗之喪有司請於易月之外用漆紗淺黃之制蓋循紹興以前之舊朱文公後入不以為然奏言今已往之失不及追改惟有將來啓欑發引禮當復用初喪之服則其變除之節尚有可議望明詔禮官稽考禮律預行指定其官吏軍民方喪之服亦宜稍為之制勿使肆為華靡其後詔中外百官皆以涼衫視事蓋用此也方文公上議時門人有疑者文公未有以折之後讀禮記正義喪服小記為祖後者條因自識於本議之末其略云凖五服年月格斬衰三年嫡孫為祖謂承重者法意甚明而禮經無文但傳云父殁而為祖後者服斬然而不見本經未詳何據但小記云祖父殁而為祖母後者三年可以旁照至為祖後者條下疏中所引鄭志乃有諸侯父有廢疾不任國政不任喪事之問而鄭答以天子諸侯之服皆斬之文方見父在而承國於祖服向來入此文字時無文字可檢又無朋友可問故大約且以禮律言之亦有疑父在不當承重者時無明白證驗但以禮律人情大意答之心常不安歸來稽考始見此説方得無疑元典章本宗五服之圖孫為祖父母齊衰不杖期若嫡孫承祖同父母斬衰齊衰三年適孫亡無後次孫為祖承重議宋宋神宗熙寧八年詔禮官立法自今承重者適子死無諸子即適孫承重無適孫適孫同母弟承重適孫承重在喪而亡次孫代之議宋宋仁宗皇祐元年博士宋敏求議承祖父重服曰自開元禮以前嫡孫卒則次孫承重或謂已服期不當接服斬而更為重制按儀禮子嫁反在父之室為父三年鄭康成注謂遭喪而出者始服齊衰期出而虞則以三年之喪杜佑通儒引其義附前問答之次况徐邈范宣之説已為司馬操駁之是服可再制明矣齊衰三年五代宋金宋政和禮家禮子為母不分父存殁俱齊衰三年如唐律開元禮明會典改為母斬衰三年後唐明宗長興中太常卿劉嶽奉敕刪定鄭餘慶書儀定婦為姑齊衰三年宋太祖乾德三年從僕射魏仁浦等奏依後唐之制婦為姑齊衰三年開寶禮養母謂養同宗及三嵗以下遺棄之子者與親母同按養母之服不見於經蓋古無異姓相養之理有之自宋開寶禮始載入齊衰三年章元典章因之明孝慈録加為斬衰三年神宗熙寧七年命官參酌舊例定為新式父母及繼母慈母己所生母並三年按母及繼母慈母之服自唐定為齊衰三年不分父存殁五代及宋皆因之而不改何待神宗之更定乎至於生母之服周世大夫士之庶子父卒皆服齊衰三年與子為母同唐開元禮及宋初俱因之亦不待神宗之更定大要當時不過申明故事而紀事者不審舊章原自如此遂誤以為新式爾金章宗時霍王從彛母早死溫妃舒穆嚕氏養之明昌六年溫妃薨帝問從彛喪服諫議大夫張暐奏慈母服齊衰三年桐杖布冠禮也從彛近親至尊壓降與臣下不同乞於未葬以前服白布衣絹巾既葬止用素服終制朝會從吉帝從其奏後妻子為前母服議晉晉初吳國朱某娶妻陳氏生子東伯入晉晉賜妻某氏生子綏伯太康中某已亡綏伯將母以歸邦族兄弟交愛敬之道二母篤先後之序雍雍人無間言及其終也二子交相為服君子以為賢安豐太守程諒先已有妻後又娶遂立二適前妻亡後妻子勳疑所服中書令張華造甲乙之問曰甲娶乙為妻後又娶丙居家如二適無有貴賤之差乙亡丙之子當何服本實並列適庶不殊雖二適非正此失在先人人子何得専制析其親也若為庶母服又不成為庶進退不知所從太傳鄭沖議曰甲失禮於家二適並在誠非人子所得正則乙丙之子並當三年禮疑從重車騎賈充侍中少傳任愷議略與鄭同太尉荀顗議曰春秋並后匹適古之明典也今不可以犯禮並立二妻不别尊卑而遂其失也故當斷之以禮先至為適後至為庶丙子宜以適母服乙乙子宜以庶母事丙杜典不載今補纂為髙曾祖母及祖母持重服議宋明宋仁宗天聖四年大理評事杜杞言祖母潁川郡君鍾沒並無服重子婦餘孤孫七人臣最居長今已服斬衰即未審解官與否禮院言按禮喪服小記曰祖父卒而後為祖母後者三年正義曰此論適孫承重之服祖父卒者謂適孫無父而為祖後祖父已卒今遭祖母喪故云為祖母後也父卒為母故三年若祖父卒時父已先亡亦為祖父三年若祖卒時父在已雖為祖期今父殁祖母亡時已亦為祖母三年也又按令文為祖後者父卒為祖斬祖父殁適孫為祖母承重者齊衰三年並解官合依禮令二程全書州從事有既孤而遭祖母喪者身為適孫未果承重先生為推典法意告之甚悉其人從之至今遂為定令而天下搢紳始習為常朱子語類祖在父亡祖母死亦承重家禮適孫父卒為祖母若髙曾祖母承重皆齊衰三年明制適孫為祖父母承重及曾髙祖父母承重者改為斬衰三年父卒母嫁復還及庶子為嫡母繼母改嫁服議臣等謹按杜典載喪服父卒繼母嫁從為之服報並注鄭王諸説疏以從為之服為句從鄭康成義也後儒於從字絶句用王肅説也以義斷之當以王説為正蓋繼母本非屬毛離裏之親又改嫁與父絶族乃令前妻之子之自居其室者亦皆舍其宗廟祭祀而為之服此於情為不稱而揆之理亦未順唯從繼母而嫁者則為之服以其有撫育之恩故也此不别其為父後與否者以從乎繼母而嫁必有幼弱不能自存者也受恩既同持服豈得而異故無分乎適庶也從母嫁則繼父同居者尚有服況繼母乎況親母乎傳云貴終貴繼母之嫁而能終撫字之恩也鄭以嘗為母子言非也父在為出母服議元元典章八母服圖父在而母離棄被出者齊衰杖期父卒為嫁母服議宋金元明宋仁宗景祐二年禮官宋祁言前祠部員外郎集賢校理郭􅍬幼孤母邊氏更嫁有子按歷代名臣奏議母邊氏適士人王渙生四子􅍬無伯叔兄弟獨承郭氏之祭今邊氏不幸訃聞􅍬解官行服臣深用為疑按五服制度敕齊衰杖期降服之條曰父卒母嫁及出妻之子為母其左方注曰謂不為父後者若為父後者則為嫁母無服按歷代名臣奏議有云今詳邊氏嫁則從夫已安於王室死則同穴永非於郭偶􅍬既為父後則宜歸重本宗雖欲懷有慈之愛推無絶之義亦不得為已嫁之母亢父而盡其禮也此數語宋史禮志未載詔議之以下劉夔等議歷代名臣奏議中不載今從宋史禮志備載侍御史劉夔曰按天聖六年敕開元五服制度開寶正禮並載齊衰降服條例雖與祁言不異然假寧令諸喪斬衰三年並解官齊衰杖期及為人後者為其父母若庶子為後為其母亦解官申心喪母出及嫁為父後者雖不服亦申心喪注云皆為生已者律疏云心喪者為妾子及出妻之子合降其服二十五月內為心喪載詳格令子為嫁母雖為父後者不服亦當申心喪又稱居心喪者釋服從吉及忘哀作樂冒哀求仕者並同父母正服今龍圖閣學士王博文御史中丞杜衍嘗為出嫁母解官行喪若使生為母子沒為路人則必虧損名教上玷孝治且杖期降服之制本出開元禮文逮乎天寶降敕俾終三年然則當時已悟失禮晉袁凖謂為父後猶服嫁母據外祖異族猶廢祭行服知父後應服嫁母劉智釋疑云雖為父後猶為嫁母齊衰譙周云非父所絶為之服周可也昔孔鯉之妻為子思之母鯉卒而嫁於衛故檀弓曰子思之母死栁若謂子思曰子聖人之後也四方於子乎觀禮子盍慎諸子思曰吾何慎哉喪之禮如子云子聖人之後即父後也石苞問淳于睿為父後者不為出母服嫁母猶出母也或者以為嫁與出不異不達禮意雖執從重之義而以廢祭見譏君為詳正睿引子思之義為答且言聖人之後服嫁母明矣􅍬之行服是不為過詔兩制御史臺禮院再議曰按儀禮父卒繼母嫁為之服期謂非生己者故父卒改嫁降不為己母唐上元元年敕父在為母尚許服三年今母嫁既是父終得申本服唐紹義曰為父後者為母嫁杖周不為父後者請不降服至天寶六載敕五服之紀所宜企及三年之數以報免懷其嫁母亡宜終三年又唐八坐議吉凶加減禮云凡父卒親母嫁齊衰杖期為父後者亦不服不以私親廢祭祀惟素服居堊室心喪三年免役解官母亦心服之母子無絶道也按通禮五服制度父卒母嫁及出妻之子為母及為祖後祖在為祖母雖周除仍心喪三年侍講學士馮元言儀禮禮記正義古之正禮開寶通禮五服年月敕國朝見行典制為父後者為出母無服惟通禮義纂引唐天寶六年制出母嫁母並終服三年又引劉智釋疑雖為父後猶為出母嫁母齊衰卒哭乃除蓋天寶之制言諸子為出母嫁母故云並終服三年劉智言為父後者為出母嫁母故云猶為齊衰卒哭乃除各有所謂固無疑也況天聖五服年月敕父卒母嫁及出妻之子為母降杖期則天寶之制已不可行又但言母出及嫁為父後者雖不服亦申心喪即不言解官若專用禮經則是全無服式若俯同諸子杖期又於條制相戾請凡子為父後無人可奉祭祀者依通禮義纂劉智釋疑服齊衰卒哭乃除踰月乃祭仍申心喪則與儀禮禮記正義通典通禮五服年月敕為父後為出母嫁母無服之言不逺如諸子非為父後者為出母嫁母依五服年月敕降服齊衰杖期亦解官申心喪則與通禮五服制度言雖周除仍心喪三年及刑統言出妻之子合降其服皆二十五月內為心喪其義一也郭􅍬應得子為父後之條緣其解官行服已過期年難於追改後當依此施行詔自今並聽解官以申心喪按范文正公年譜公生二嵗而孤母夫人謝氏再適朱氏天聖四年丁母夫人憂六年服除是為嫁母服三年喪也蓋喪服云父卒繼母嫁從為之服報王肅以從字絶句從母嫁則繼母尚有服況公以二嵗從親母乎此禮以義起故當世無議之者金世宗大定八年二月甲午朔制子為改嫁母服喪三年元典章八母服圖父亡母改嫁適人齊衰杖期明太祖洪武二十三年進士王希曾言其母任氏之喪以改嫁服止期年願終三年之制帝命禮部議之尚書李原名奏曰不喪出母古之制也希曾之母既已失節難渝定制詔從之齊衰不杖周宋明宋開寶禮為父所生庶母政和禮嫁母出母為其子繼母嫁為前夫之子從已者明會典父母為適長子及衆子妾為家長父母齊衰三月宋宋沈括曰喪服但有曾祖齊衰三月曾孫緦麻三月而無髙祖玄孫服先儒皆謂同曾祖曾孫故不言可推而知或曰經之所不言則不服皆不然也曾重也由祖而上者皆曾祖也由孫而下者皆曾孫也茍有相逮者則必為之服喪三月朱子語類沈存中沈括字存中説喪服中曾祖齊衰服曾祖以上皆謂之曽祖恐是如此如此則皆合有齊衰三月服看來髙祖死豈有不為服之理須合行齊衰三月也存中又云髙祖齊衰三月不特四世祖為然自四世以上凡逮事皆當服衰麻三月髙祖蓋通稱爾大功殤服九月七月臣等謹按儀禮有三殤之服漢晉迄元皆相沿不廢朱子為家禮則略之而贅其例於末云凡為殤服者降一等明初編集禮及令皆仍古制至改制孝慈録盡去殤服不載又按禮無七月之服惟殤有之殤之中又惟中殤有之蓋長殤降一等下殤降二等中殤則無定其在大功之殤則中從上而降一等在小功之殤則中從下而降二等降二等者固與小功之服同其降一等者不可即與大功之服同故特設七月以處之誠先王盡愛盡倫之善制也大功成人九月臣等謹按宋政和禮司馬光書儀朱子家禮明集禮會典多與唐律同惟元典章為嫡孫婦緦麻而為衆孫婦大功此議禮者之誤也為衆子婦宋元宋黃幹曰魏徴以兄弟子之婦同於衆子婦先師朱文公曰禮經嚴適故儀禮適婦大功庶婦小功此固無可疑者但兄弟子之婦則正經無文而舊制為之大功乃更重於衆子之婦雖以報服使然然於親疏輕重之間亦可謂不倫矣故魏公因太宗之問而正之然不敢易其報服大功之重而但升適婦為期乃正得嚴適之義升庶婦為大功亦未害於降殺之差也元典章為嫡婦杖期為衆婦大功小功殤服五月周喪服從父昆弟之長殤傳曰問者曰中殤何以不見也大功之殤中從上小功之殤中從下按成人當服大功者其中殤與長殤同成人當服小功者其中殤與下殤同凡不見於經者皆當以此例求之杜典不載今補纂小功成人服五月唐宋唐律為舅為從母顯慶禮為甥杜典不載今補纂宋政和禮女適人者為其兄弟姪之為人後者為人後者為其從父兄弟嫂叔服唐五代宋元明唐顔師古嫂叔服議原夫服紀之制異統同歸或本恩情或申教義所以慎終追逺敦風厲俗輕重各順其適名實不可相違喪過乎哀易象之明訓按文苑英華易象作承象誤其易寧戚聖道之遺旨所議兩條實為舛駁特降絲綍俾革遺謬歷代之所不寤儒者於是未詳超然逺覽獨照深致竊以舊館脫驂尚云出涕鄰里有殯且輟巷歌況乎昆弟之妻嚴親是奉夫之昆弟資業本同遂乃均諸百姓絶於五服當其喪沒闔門縞素已獨晏然元黃莫改靜言至理殊非宏通無益關防實開偷薄相為制服孰謂非宜在昔子思仲尼之胄為位哭嫂事著禮文哭既施位明其慘怛茍避凶服豈曰稱情愚謂昆弟之妻服當五月夫之昆弟咸亦如之則親疏中節名數有倫帷簿之制更嚴內外之序增睦與魏徴等議同杜典不載今從唐會要纂入後唐末帝清泰三年刑部侍郎權判太常卿馬縞按册府元龜作户部侍郎言衰麻喪紀所以别親疏辨嫌疑禮叔嫂無服推而逺之也唐太宗時有司議為兄之妻服小功五月今有司給假為大功九月非是廢帝下其議太常博士段顒議嫂服給假以大功者令文也令與禮異者非一而喪服之不同者五禮姨舅皆服小功令皆大功妻父母壻外甥皆服緦令皆小功禮令之不可同如此右贊善大夫趙咸又議曰喪與其易也寧戚儀禮五服或以名加或因尊制推恩引義各有所當據禮為兄之子妻服小功是輕重失倫也以名則兄子之妻疏因尊則嫂非卑嫂服大功其來已久令國之典不可減也按册府元龜諸博士駁云律令國之大經馬縞知禮院時不曾論定今遽上疏駁令式罪人也司封郎中曹琛請下其議并以禮令之違者定議詔尚書省集百官議左僕射劉昫等議曰伏以嫂叔服小功五月開元禮會要同其式令於喪服無正文而嫂服給大功假乃假寧附令而敕無年月臣等集議嫂叔服并諸服紀請以開元禮為定下太常具五服制度附於令從之宋仁宗天聖五年侍講學士孫奭言伏見禮院及刑法司外州執守服制詞旨俚淺如外祖卑於舅姨大功加於嫂叔顛倒謬妄難可遽言臣於開寶正禮録出五服年月并見行喪服制度編附假寧令請下兩制禮院詳定從之程氏遺書云問嫂叔古無服今有之何也曰古之所以無服者只為無屬其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也今上有父有母下有子有婦叔父伯父父之屬也故叔母伯母之服與叔父伯父同兄弟之子子之屬也故兄弟之子之婦服與兄弟之子同若兄弟則己之屬也難以妻道屬其嫂此叔嫂所以無服之義今之有服亦是豈有同居之親而無服者又問既是同居之親古却無服豈有兄弟之妻死而已恝然無事乎曰古者雖無服若哀戚之心自在且如鄰里之喪尚不相舂不巷歌匍匐救之況至戚乎又云嫂叔無服先王之權後聖有作雖復制服可矣張子全書云韓退之以少孤養於嫂故為嫂服加等大抵族屬之喪不可有加若為嫂養便以有恩而加服則是待兄之恩至薄大抵無母不養於嫂更無處可養若為族屬之親有恩而加等則待已無恩者可不服乎哉昔有士人少養於嫂生事之如母死自處以齊衰或告之非先王之禮聞而遂除之惟持心喪遂不復應舉人以為得體朱子語類云問嫂叔無服而程先生云後聖有作須為制服答曰看推而逺之便是合有服但安排不得故推而逺之若有鞠養恩義心自住不得如何無服真卿曰當如同爨緦今法從小功元典章本宗五服之圖兄弟妻小功明制敘服曰小功五月者為兄弟之妻婦人為夫之兄弟曰緦麻三月者為同堂兄弟之妻婦人為夫之同堂兄弟緦麻成人服三月宋明宋政和禮為兄弟之曾孫為夫兄弟之曾孫為同堂兄弟之孫為夫同堂兄弟之孫女適人者為兄弟之孫為夫之兄弟之孫女適人者女適人者為從祖祖母為從祖祖姑為從祖姑明制以庶子為父後者為其母改入斬衰生母條以士為庶母改入杖期庶母條其嫁女為同堂姊妹之出嫁者增入緦麻三月按杜典載有緦麻殤服一條儀禮云為庶孫之中殤而鄭康成謂當為下殤馬融謂冇中則冇下王肅謂大夫為孫服皆無確據自唐以後亦無議及此者兹故不録舅之妻及堂姨舅唐宋元臣等謹按杜典載開元制及裴耀卿張九齡等奏而韋縚原奏崔沔等衆議未載今從舊唐書禮儀志備敘并録宋黃幹儀禮經傳續解以備詳考唐玄宗開元二十三年下制曰服紀之制或有所未通宜令禮官學士詳議聞奏太常卿韋縚奏曰謹按儀禮喪服舅緦麻三月從母小功五月傳曰何以小功以名加也堂姨舅舅母恩所不及外祖父母小功五月傳曰何以小功以尊加也舅緦麻三月並是情親而服屬疏者也外祖正尊同於從母之服姨舅一等服則輕重有殊堂姨舅親即未疏恩絶不相為服親舅母來承外族同爨之禮不如竊以古意猶有所未暢者也且為外祖小功此則正尊情甚親而服屬疏者也請加至大功九月姨舅同儕親既無别服宜齊等請為舅加小功五月堂姨舅疏降一等親舅母從服之例先無制服之文並望加至袒免臣聞禮以飾情服從義制或有沿革損益可明事體既大理資詳審望付尚書省集衆官吏詳議務從折衷永為典則於是太子賓客崔沔建議曰竊聞大道既隱天下為家聖人因之然後制禮禮教之設本為正家家道正而天下定矣正家之道不可以二總一定議理歸本宗父以尊崇母以厭降豈忘愛敬宜在倫序是以內有齊斬外服皆緦麻尊名所加不過一等此先王不易之道也前聖所志後賢所傳其來久矣貞觀修禮按文苑英華作往修新禮今從唐志及會要時改舊章漸廣渭陽之恩不遵洙泗之典及𢎞道之後唐元之間按唐會要作唐隆之間歷代名臣奏議刪此句今從唐志及文苑英華國命再移於外族矣禮亡徴兆儻或斯見天人之際可不誡哉開元初補闕盧履冰嘗進狀論喪服輕重敕令僉議於時羣議紛拏各安積習太常禮部奏依舊定陛下運稽古之思發獨斷之明至開元八年特降别敕一依古禮事符故實人知向方式固宗盟社稷之福更圖異議竊所未詳願守八年明旨以為萬代程法職方郎中韋述議曰天生萬物惟人最靈所以尊尊親親别生分類存則盡其愛敬殁則盡其哀戚緣情而制服考事而立言往聖討論亦已勤矣上自髙祖下至玄孫以及其身謂之九族由近而及逺稱情而立文差其輕重遂為五服雖則或以義降或以名加教有所從理不踰等百王不易三代可知日月同懸咸所仰也自微言既絶大義復乖雖文質有遷而必遵此制謹按儀禮喪服傳曰外親之服皆緦麻鄭康成謂外親異姓正服不過緦麻外祖父母小功五月以尊加也從母小功五月以名加也舅甥外孫中外昆弟依本服緦麻三月若以匹敵外祖則祖也舅則伯叔父之别也姨舅伯叔則父母之恩不殊而獨殺於外氏聖人之心良有以也且家無二尊喪無二斬人之所本不可二也特重於大宗者降其小宗為人後者減其父母之服女子出嫁殺其本家之喪蓋所存者逺所抑者私也今若外祖及舅更加服一等堂舅及姨列於服紀之內則中外之制相去幾何廢禮徇情所務者末古之制作者知人情之易搖恐失禮之將漸别其同異輕重相懸欲使後來之人永不相雜微旨所在豈徒然哉且五服有上殺之義必循源本方及條流伯叔父母本服大功九月從父昆弟亦大功九月並以上出於祖其服不得過於祖也族祖祖父母族祖父母族祖昆弟皆緦麻三月以其出於髙祖其服不得過於髙祖也堂舅姨既出於外曾祖若為之制服則外曾祖父母及外伯叔祖父母亦宜制服矣外祖加至大功九月則外曾祖合至小功外髙祖合至緦麻若舉此而舍彼事則不均棄親而録疏理則不順推而廣之是與本族無異矣聖人豈薄其骨肉背其恩愛情之親者服制乃輕然本於公者薄於私存其大者略其細義有所斷不得不然茍可加也亦可減也往聖可得而非則禮經可得而隳矣先王之制謂之彞倫奉以周旋猶恐失墜一紊其敘庸可正乎且舊章淪胥為日已久矣所存者無幾又欲棄之雖曰未達不知其可請依儀禮喪服為定禮部員外郎楊仲昌議曰謹按儀禮曰外服皆緦又曰外祖父母以尊加從母以名加並為小功五月其為舅緦鄭文貞公魏徴已議同從母例加至小功五月迄今之所加豈異前旨雖文貞賢也而周孔聖也以賢改聖後聖何從堂舅堂姨舅母並升為袒免則何以祖述禮經乎如以外祖父母加至大功則豈無加報於外孫乎如外孫為報服大功則本宗庶孫何同等而相淺乎儻必如是深所不便竊恐內外乖序親疏奪倫情之所沿何所不至理必然也昔子路有姊之喪而不除孔子問之子路對曰吾寡兄弟而不忍也子曰先王制禮行道之人皆不忍也子路聞而除之此則聖人因言以立訓援事抑情之明例也禮不云乎無輕議禮明其播於天地並彼日月賢者由之安敢小有損益也況夫喪服之紀先王大猷奉以周旋以匡人道一辭寧措千載是遵涉於異端豈曰宏教伏望各依正禮以厚儒風太常所謂增加愚見以為不可又户部郎中楊百成左監門録事參軍劉秩並同是議與沔等略同宋黃幹曰本朝乾德三年左僕射魏仁浦等奏云唐明皇增舅母服緦麻又堂姨舅服袒免迄今遵行遂為定制及按今服制令與溫公書儀等書並不見有舅母服緦麻及堂姨舅袒免之文按舅母之服唐朝既制於前宋初復遵於後而服制令諸書不載者蓋前此禮院及刑法司所執姨舅嫂叔皆加至大功婦翁女壻皆加至小功至天聖時學士孫奭請兩制詳定因并舅母服而削之也夫舅母無服雖本古禮然檀弓有同爨服緦之言明皇既定之為制則後世因而仍之於禮亦無害元典章外族服圖母兄弟妻小功母姊妹小功而不及堂姨舅欽定續通典卷八十
