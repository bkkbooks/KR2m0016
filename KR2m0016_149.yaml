body:
  text: 邊防邊防西序畧臣等謹案杜氏邊防典西方凡七十五國惟于闐龜兹髙昌回鶻諸國名見於宋史至明代于闐尚各自為國其餘若樓蘭且末姑墨温宿諸國自漢以後即無聞焉葢絶域之外互相兼併若唐之突厥宋之吐蕃明之衞喇特皆曾據有其地也自聖朝平定西域以來天山南北盡入版圗今苐就前史所載諸國事蹟之有可考者臚具于篇若夫海外之國路隔重洋自明永樂時遣鄭和等屢以金幣招徠西洋古里諸國相率踵至其後復有意大里亞國人利瑪竇等泛海逺來留居中土始有大西洋之稱今亦依次列載焉正西沙州沙州本漢敦煌郡距玉門陽闗不逺後魏始置沙州唐因之後没於吐蕃宋入於西夏元為沙州路明成祖永樂二年酋長昆濟楞敏珠爾率衆來歸命置沙州衞授為指揮使英宗正統中甘肅鎮將任禮收其全部入塞居甘州沙州遂空先是太宗置哈密沙州赤斤罕東西衞於嘉峪闗外屏蔽西陲至是沙州先廢而諸衞亦漸不能自立赤斤䝉古赤斤蒙古漢敦煌郡地唐屬𤓰州廣徳後没於吐蕃宋時為西夏所據元時為𤓰州地明成祖永樂二年詔建赤斤䝉古千户所以塔爾尼為千户賜誥印尋升衞武宗正徳間土魯番犯肅州赤斤當其衝每遭蹂躪乃徙部衆於肅州其城遂空罕東罕東在赤斤䝉古南嘉峪闗西南漢敦煌郡地明太祖洪武三十年酋索諾木喇實遣使入貢詔置罕東衞授指揮僉事成祖永樂後數入貢武宗正徳中土魯番犯肅州遂棄城内徙又其部人安扎與種類不相能率其衆逃居沙州境部落日繁宣宗宣徳七年命其子為指揮使憲宗成化中奏請自為一衞朝廷從之置為罕東左衞武宗正徳十一年土魯番以兵脅之不克自立相率内徙安定安定本名薩里輝和爾東近罕東北邇沙州南接西番元封宗室布延特穆爾為寧王鎮之明太祖洪武七年遣使朝貢改封安定王十年王為其部沙喇所弑王子巴咱爾實哩復讐誅沙喇尋又為沙喇部將所殺其衆遂衰二十九年復立安定衞授其酋官以安部衆成祖永樂間安定王孫雅布達勒來朝自陳家難詔仍令襲爵武宗正徳時䝉古縱掠隣境安定部衆從此殘亡阿端阿端在薩里輝和爾之地明太祖洪武八年置衞後為多爾濟巴勒所破其衞遂廢成祖永樂間酋長舒蘇呼爾察來朝請復置衞即授為指揮僉事洪熙時察遜酋薩竒蘇脅阿端指揮蘇爾丹邀刼朝使蘇爾丹懼而逺竄宣宗宣徳中赦其子珠扎干復率所部還居本土迄英宗正統朝數入貢後不知所終察遜察遜在肅州西南漢西羌唐吐蕃也元設察遜達蘭元帥府明太祖洪武時酋長入貢命設察遜衞官其人為指揮武宗正徳七年蒙古酋阿爾托蘇額布勒竄居青海察遜為所蹂躪部族竄徙其衞遂亡哈瑪爾哈瑪爾地近甘肅元諸王諤尼實哩居之明太祖洪武十三年濮英請略地開哈瑪爾之路諤尼實哩懼遣使來朝貢時西域來貢者多為哈瑪爾所遏命劉真等討之攻破其城諤尼實哩率家屬遁去二十五年遣使貢馬騾請罪納之哈密哈密東去嘉峪關千餘里漢伊吾廬地唐為伊州五代時號胡盧磧宋入於回紇元末以威武王果哈實哩鎮之尋改為肅王明成祖永樂二年改封其弟恩克特穆爾為忠順王尋設哈密衞以其頭目為指揮千百户等官英宗正統中其王達斡實哩為衞喇特酋額森所脅服武宗正徳時土魯番奪哈密據之屢入寇世宗嘉靖中依廷議置哈密不問而其地遂為土魯番所有迄穆宗隆慶後猶有入貢者然非忠順王苗裔矣按元史諸王表不載果哈實哩封王事明成祖實錄載李至剛等議奏恩克特穆爾之兄果哈實哩初封威武王改封肅王其弟應仍襲王爵並見西域傳土魯番土魯番即古髙昌唐太宗貞觀中以其地為西州元宗時陷没乃復為國其地頗有回鶻居之故亦謂之西州回鶻宋太祖建隆三年西州回鶻阿多等四十二人以方物來貢乾徳三年西州回鶻遣僧法淵獻佛牙琉璃器琥珀盞太宗太平興國六年其王始稱西州外生師子王阿爾薩蘭汗遣都督蘇黙昆來貢太宗遣供奉官王延徳等使髙昌及還敘其行程具詳宋史元太祖平西域置達嚕噶齊監治之明初號土魯番成祖永樂十三年吏部員外郎陳誠使西域土魯番遣使隨入貢授都督都指揮等官仁宗洪熙元年其酋音濟徹爾復率部落來朝宣宗宣徳三年其子復來朝初其地介諸部間甚微弱後火州柳城皆為所併國日強西域頗為擾然自成化迄萬厯朝貢不絶火州火州地多山青紅若火故名地宜五榖畜産明成祖永樂中其酋長遣使朝貢柳城柳城與火州密邇土宜穄麥豆麻有小葡萄甘而無核名瑣瑣葡萄氣候常和男子椎結其語音類輝和爾明成祖永樂中常遣使入貢凡中朝遣使及其酋長入貢多與火州及土魯番偕後土魯番強柳城及火州並為所滅衞喇特衞喇特䝉古部落也在韃靼之西土魯番之北元亡其強臣䝉克特穆爾據之後其衆分而為三其渠曰瑪哈穆特曰太平曰巴圗博囉而瑪哈穆特尤雄於部内數與韃靼酋長阿嚕台相讐明成祖永樂時阿嚕台既受封為和寧王瑪哈穆特等亦内附乃封瑪哈穆特為順寧王太平為賢義王巴圗博囉為安樂王賜以印誥自是嵗一入貢後衞喇特漸驕擁兵將入犯帝乃親征破其衆於和拉和實衮追至圗拉河而還瑪哈穆特復修貢職其子托歡嗣封順寧王於宣宗宣徳年間襲殺阿嚕台欲自稱汗而衆不附乃求元後托克托布哈立之自為丞相居漠北凡蒙古諸部俱屬焉托歡死額森嗣稱太師衆益強托克托布哈不能制英宗正統時額森脅諸番大舉入冦明師覆於土木既而額森弑其主自立以其次子為太師東自烏梁海西至赤斤哈密皆受約束額森入貢自稱田盛大汗帝詔稱為衞喇特汗景帝景泰中阿拉知院攻額森殺之額森諸子退歸衞喇特不復雜居漠北世宗嘉靖以後為哈密土魯番所隔其承襲代次無可考龜兹龜兹其土宜麻麥秔稻葡萄出黄金善歌樂喜浮圗法唐置安西都䕶府武后時言事者請棄之不許宋自仁宗天聖至景祐入貢者五最後賜以佛經一藏神宗熙寧哲宗紹聖間屢遣使入貢其國主自稱師子王或稱西州龜兹或稱龜兹回鶻于闐于闐自唐安史亂後不復通中國晉髙祖天福中其王李聖天遣使來貢髙祖遣供奉官張匡鄴持節冊為大寶于闐國王宋太祖建隆二年聖天遣使貢圭一以玉為柙其使言國城東有白玉河西有綠玉河次西有烏玉河源出崑崙山每嵗秋國人取玉於河謂之撈玉後朝貢屢至遼聖宗統和開泰間俱入貢金時遣瑪拉噶薩木丹等貢玉璞明成祖永樂間屢遣使入貢神宗萬厯時亦間入貢西域諸國蔥嶺以南撒瑪爾罕最大其北則于闐最大桑麻禾黍宛然中土行賈諸番能致富庶吐渾吐渾本號吐谷渾案遼史太宗本紀稱來貢者有吐谷渾吐渾百官志北面屬國官有吐谷渾國王府吐渾國王府然五代史傳内所稱吐渾白承福事即遼史吐谷渾事葢本為一國故傳首云吐渾本號吐谷渾今從之或曰乞伏乾歸之苗裔唐肅宗至徳中為吐蕃所攻部族分散其内附者唐處之河西其大姓有慕容拓䟦赫連等族懿宗咸通時赫連鐸拜大同軍節度使為晉王所破後唐莊宗同光時有白承福者依中山北石門為柵莊宗為置寧朔奉化兩府以承福為都督賜姓名為李紹魯晉髙祖立割雁門以北入於契丹於是吐渾為契丹役屬苦其苛暴安重榮鎮成徳有異志陰遣人招吐渾入塞承福自五臺山入處中國契丹大怒遣使者責誚髙祖髙祖遣供奉官張澄率兵搜索忻代等州山谷中驅出之然晉亦苦契丹思得吐渾為緩急之用陰遣劉知逺鎮太原慰撫之後出帝與契丹絶盟拜承福大同軍節度使契丹與晉相距於河承福以兵從出帝禦之是嵗大熱吐渾多疾死乃遣承福歸劉知逺侵之承福謀出塞知逺殺承福及其大姓獲牛馬貲財鉅萬計其餘衆以别部王義宗主之遼太祖天贊三年攻拔其城自天顯至聖宗統和嵗通貢興宗重熙時以吐渾多鬻馬於夏詔沿邊塞防之自後無聞党項党項西羌别種或曰即古析支也地三千餘里有棟宇不耕稼地寒五月草生八月霜降無文字候草木記嵗唐太宗貞觀至髙宗上元間其國人内附散居西北邊憲宗元和以後頗相率為盜武宗㑹昌初武宗置三使以統之在邠寧鄜延者為一使在鹽夏長澤者為一使在靈武麟勝者為一使自後唐莊宗同光以後大姓之疆者各自來朝貢宋太祖建隆二年圗黙勒來朝授為代州刺史開寳元年首領屈遇率十二部歸順嗣是相率來貢遼太祖神冊元年太祖親征党項等部平之二年党項來貢自後叛服不常大食大食自唐元宗開元初遣使來貢其南有都盤等六國天寶六載皆遣使入朝並封為王宋太祖乾徳四年僧行勤游西域因賜王書以招懷之開寳元年遣使來朝貢後屢貢方物遼太祖天贊三年來貢聖宗時遣使進象及方物為其子察克請婚以王子班郎君胡思聖女噶老為公主嫁之拂菻拂菻或言即古大秦國也東南與波斯接其俗無瓦𢷬白石為末塗屋上其堅密光潤如玉石唐太宗貞觀時遣使獻方物後大食強盛拂菻每嵗輸金帛屬之元宗開元時復來朝貢宋神宗元豐四年其王遣大首領來獻鞍馬刀劎真珠哲宗元祐六年其使兩至元末其國人尼古爾入市中國及明太祖洪武四年太祖召見命齎詔書還諭其主復命使臣布拉等齎敇書綵幣招諭之乃遣使入貢後不復至波斯波斯地近拂菻氣常歊熱人知耕種畜牧産珊瑚唐髙宗龍朔間以疾陵城為波斯都督府拜其王為都督俄為大食所破其國漸微元宗開元天寶間遣使者十輩獻瑪瑙杯等物遼太祖天贊二年來貢撒瑪爾罕撒瑪爾罕或云即漢罽賓隋為漕國唐復名罽賓髙宗顯慶三年以其地為修鮮都督府中宗神龍初即拜其王督諸軍事元宗開元七年遣使獻天文書及秘方竒藥後其王以年老請以子布琳哲伯嗣許之天寶四載復冊其子本布凖襲王肅宗乾元初使者入貢元太祖平西域盡以諸王駙馬為之君長易前代國名以䝉古語遂名罽賓為撒瑪爾罕元末為之主者駙馬特穆爾也明太祖洪武中太祖欲通西域屢遣使招諭而遐方君長未有至者二十年撒瑪爾罕王特穆爾首遣回回瑪拉噶富實等來朝貢自是頻嵗貢馬駝成祖永樂迄神宗萬厯或比年或間嵗或三年輒入貢皆有賞給其國東西三千餘里地寛平土壤膏腴王所居城廣十餘里民居稠密西南諸番之貨皆聚於此號為富饒俗禁酒人物秀美工巧過於哈喇而風俗土産多與之同哈魯布達實克附哈魯近撒瑪爾罕世為婚姻其地山川草木禽獸多黑明宣宗宣徳七年始遣使來朝貢方物景帝景泰四年偕隣境三十一部來貢馬駝及玉石等物憲宗成化十九年與沙喇思撒瑪爾罕來貢又有布達實克景泰間嘗入貢至是亦遣使與哈魯偕至達爾瑪達爾瑪服屬撒瑪爾罕地不滿百里人不滿萬家無城郭上下皆居板屋刑止箠撲明成祖永樂中遣使朝貢賜文綺茶藥諸物實喇哈雅實喇哈雅西去撒瑪爾罕五百餘里城居小岡上西北臨河南近山西有大沙洲地生臭草髙尺許枝葉如葢煮其液成膏即阿魏也又有小草叢生秋深露凝食之如蜜煮為糖番名達郎古賓明成祖永樂間李達陳誠使其地其酋即遣使奉貢宣宗宣徳七年命中官李貴齎敇諭其酋賜金織文綺綵幣塔什罕塔什罕西去撒瑪爾罕七百餘里多園林饒果木土宜五榖民居稠密明李達陳誠李貴先後奉使至焉薩蘭薩蘭西去撒瑪爾罕千餘里在塔什罕之東有城郭四面平曠居人繁庶五榖茂植亦饒果木元太祖時都元帥薛塔喇海從征薩蘭諸國以礟立功即此地也明李達陳誠李貴之徒亦齎物賜之克實克實在撒瑪爾罕西南城周十餘里四面水田東南近山中有園林頗宏麗元特穆爾駙馬居也又西三百里大山屹立中有石峽出峽口有石門色似鐵路通東西番人號為鐵門關設兵守之元太祖駐此遇一角獸能人言以問耶律楚材對曰此瑞獸名角端能言四方語好生惡殺帝為班師葢其地近東印度矣特爾黙特爾黙在撒瑪爾罕西南去哈喇二千餘里有新舊二城相去十餘里其酋長居新城居民僅數百家畜牧蕃息明李達陳誠嘗使其地布哈爾布哈爾在撒瑪爾罕西七百里節序常温宜五榖桑麻多絲綿布帛亦饒六畜明成祖永樂十三年陳誠自西域還所經哈喇等凡十七國悉詳其山川人物風俗為使西域記以獻宣宗宣徳七年命李達撫諭西域布哈爾皆與焉養夷養夷在撒瑪爾罕薩蘭及伊里巴拉䝉古諸部落間數相侵掠無寧居以故人民亡散止戍卒百餘人居孤城明成祖永樂間陳誠至其地沙喇斯沙喇斯近撒瑪爾罕明成祖永樂中遣使偕哈喇等八國入貢命李達等偕其使往勞之自後每偕他國來悉與厚賜至世宗嘉靖三年與旁近三十部俱至從使者所乞量與蟒衣膝襴磁器布帛納蘇察罕納蘇察罕東去沙喇斯數日程皆舟行城東平原饒水草宜畜牧馬有數種小者髙不過三尺俗重僧所至必供飲食然好氣健鬬明成祖永樂中嘗遣使朝貢哈喇哈喇一名黑魯在撒瑪爾罕西南去嘉峪闗絶逺其國在西域最強大王所居城方十餘里壘石為屋平方若髙臺虛敞數十間牕牖門扉繪以金碧地鋪氊罽不祭祖宗鬼神惟重拜天之禮俗尚侈靡土産白鹽金銀銅鐵之屬多育蠶善為紈綺果木榖獸甚繁元駙馬特穆爾既君撒瑪爾罕又遣其子薩哈勒據哈喇明成祖永樂七年來朝貢因其使臣遣使詔諭之諸國使並至序哈喇于首自是貢使常至英宗正統三年仍貢馬及玉石其旁温圗琿等國並隸焉温圗琿温圗琿西南去哈喇千餘里東北去撒瑪爾罕亦如之土産膏腴民物繁庶明自成祖永樂八年至十四年偕哈喇通貢巴達克山巴達克山在温圗琿東北城周十餘里地廣無險阻民俗富饒明成祖永樂六年命李達賜其酋敇書綵幣諭以往來通商之意十八年遣使來貢命陳誠郭敬往報之英宗天順時復入貢愛達罕愛達罕明成祖永樂十一年與哈喇並貢十四年魯安等使哈喇諸國復便道賜其酋長文綺然地小不能常貢喀什噶爾喀什噶爾明成祖永樂六年李達等齎敕招之即奉命十一年遣使入朝貢方物宣宗宣徳時亦來貢自後貢使不常至伊斯帕罕伊斯帕罕地近愛達罕明成祖永樂中遣使貢獅豹西馬宣宗宣徳六年憲宗成化十九年並來貢呼喇濟呼喇濟四圍皆山鮮草木水流曲折亦無魚蝦城僅里許悉土屋酋所居亦卑陋俗尚佛明成祖永樂十四年遣使朝貢命所經地皆禮待孝宗宏治五年其地回回布魯完等由海道貢玻璃瑪瑙諸物不納賜道里費遣還竒爾瑪勒竒爾瑪勒西南傍海東北林莽深密多猛獸毒蟲交易用鐵錢明成祖永樂中遣使貢獸皮鳥羽罽褐白松虎兒白松虎兒舊名速麻里兒相傳有白虎出松林中不傷人亦不食他獸旬日後不復見國人異之曰此西方白虎所降精也因改國名其地無大山亦鮮林木無毒蟲猛獸之害然物産甚薄明永樂中來貢敏珠爾敏珠爾明成祖永樂中來貢其國地廣多髙山日中為市諸貨駢集日落日落明成祖永樂中遣使來貢孝宗宏治元年復貢使臣奏求紵絲夏布磁器予之黙色爾黙色爾亦名密思兒明成祖永樂中遣使朝貢英宗正統六年復來其地極逺後不復至都爾蘇都爾蘇周不百里城近山俗佞佛土宜穄麥産牛羊馬駝有布縷毛褐明宣宗宣徳六年入貢勞賜之以地小不能常貢薩哈勒薩哈勒山川環抱饒畜産人性淳直恥鬭好佛明成祖永樂中遣使七十七人來貢羅密羅密去中國絶逺明世宗嘉靖三年遣使入貢二十二年復偕天方諸國貢良馬及方物二十七年三十三年並入貢坤城坤城西域回回之種明宣宗宣徳五年使臣來朝貢馬駝後常貢阿蘇阿蘇與天方相近幅員甚廣城倚山面川南流入海寒暄適中俗敬佛畏神好施惡鬭明成祖永樂中其酋遣使貢馬及方物宴賚如制以地逺不能常貢英宗天順七年命都指揮白全等使其國天方天方古筠冲地亦名天堂又曰黙伽四時皆春土沃稻饒男子削髮以布纒頭婦人編髮盤頭相傳回回設教之祖曰瑪哈穆特者首於此地行教死即塟焉墓頂常有光後人遵其教不衰有禮拜寺寺分四方其層次髙下如塔狀毎見月初生其王及臣民咸拜天號呼稱揚以為禮明宣宗宣徳七年國王遣臣沙瓛貢方物世宗嘉靖間偕撒瑪爾罕土魯番諸國貢馬及方物後五六年一貢迄神宗萬厯中不絶黙徳訥黙徳訥回回祖國也地近天方有城池宫室田園市肆俗重殺不食豕肉常以白布纒頭相傳其初國王瑪哈黙特生而神靈臣服西域諸國諸國尊為派罕帕爾猶華言天使也明宣宗宣徳間其酋長遣使偕天方使臣來貢榜葛刺榜葛刺為五印度之一唐時有五天竺又名五印度髙宗乾封二年五天竺並來朝元宗開元時中天竺遣使三至南天竺一至獻五色能言鳥北天竺一至周太祖廣順三年西天竺僧薩滿多等十六族來貢名馬宋太祖乾徳二年滄州僧道圓自西域還太祖召問所厯風俗山川道里一一能記開寳後天竺僧持梵夾來獻者不絶榜葛刺者即東印度也明成祖永樂中遣使朝貢英宗正統三年又表貢其國地大物阜聚貨通商繁華類中國四時氣候常如夏土沃一嵗二稔俗淳龎有文字男女勤於耕織其王敬天朝拜迎詔其貢物亦繁沼納樸兒沼納樸兒在榜葛刺西或言即中印度古所稱佛國也明成祖永樂十年遣使者齎敇撫諭其國賜王額布勒金絨錦金織文綺綵帛等物十八年又敇諭賜之綵幣然其王以去中國絶逺朝貢不至又有迪里國近沼納樸兒永樂十年遣使招諭賜賚之祖法兒祖法兒東南大海西北重山天時常若八九月五榖蔬果諸畜咸備人體頎碩俗尚回回教多建禮拜寺土産馬駝乳香沈香等物明成祖永樂中遣使朝貢宣徳中又至木骨都束木骨都束明成祖永樂十四年遣使與不刺哇麻林諸國奉表朝貢命鄭和齎敇及幣往報之二十一年貢使又至宣宗宣徳五年和復往頒詔諭其國濱海地曠磽瘠少收嵗常旱不産木亦如忽魯謨斯疊石為屋及用魚腊以飼牛羊馬駝云不刺哇不刺哇與木骨都束接壤明成祖永樂十四年至二十一年凡四入貢並與木骨都束偕鄭和亦兩使其國傍海而居地廣斥鹵不可耕尃捕魚為食少草木亦疊石為屋以居竹步竹步亦與木骨都束接壤風土畧同明成祖永樂中嘗入貢阿丹阿丹在古里之西明成祖永樂中遣使奉表貢方物凡四至宣宗宣徳五年命鄭和齎敇宣諭八年復入貢或言唐髙宗永徽年間有丹丹國貢方物即其地也刺撒刺撒明成祖永樂十四年遣使來貢命鄭和報之凡三貢皆與阿丹不刺哇諸國偕後不復至其國傍海氣候常熱田瘠少收風俗悉與竹步諸國同麻林麻林去中國極逺明成祖永樂十三年遣使與諸番貢麒麟天馬神鹿等物帝御奉天門受之十四年又貢方物忽魯謨斯忽魯謨斯西洋大國也在古里西北明成祖永樂十二年遣陪臣奉金葉表貢馬及方物自是凡四貢鄭和亦再使至其國宣宗宣徳八年貢使至英宗正統元年附𤓰哇舟還國嗣後遂絶其國居西海之極有霜無雪多露少雨土瘠寡榖麥人多白晳豐偉㕓肆百物具備惟禁酒牛羊馬駝皆噉魚腊不産草木疊石為屋有三四層者溜山溜山明成祖永樂十四年其王遣使來貢自後三貢並與忽魯謨斯諸國偕宣宗宣徳五年鄭和使其國後不復至其國居海中倚山聚居氣候常熱土薄榖少婚喪諸禮多類忽魯謨斯又有國曰比刺曰孫刺鄭和亦常齎敇往以去中華絶逺貢使不至南巫里南巫里明成祖永樂九年遣使與急蘭丹加異勒諸國偕來貢物十四年再貢加異勒加異勒明成祖永樂九年其酋長葛卜者麻遣使奉表貢方物賜宴及幣鈔鄭和再使其國後凡三入貢宣宗宣徳八年又偕阿丹等十一國來貢甘巴里甘巴里明成祖永樂十二年遣使來朝貢方物十九年再貢遣鄭和報之宣宗宣徳八年其王兠哇刺札遣使來貢英宗正統元年附𤓰哇舟還國急蘭丹急蘭丹明成祖永樂九年其王遣使朝貢十二年命鄭和齎敇奬之沙里灣泥沙里灣泥明成祖永樂十四年遣使來獻方物命鄭和齎幣賜之千里達失刺比千里達失刺比明成祖永樂十六年並遣使來朝貢方物其使俱賜之冠帯綵幣其王有加賜古里班卒古里班卒明成祖永樂中嘗入貢其土瘠榖少物産亦薄刺泥刺泥明成祖永樂元年其國中回回哈只馬哈等來貢方物其外若夏刺比若竒刺泥若窟察泥若捨刺齊若彭加那若八可意若烏沙刺踢若坎巴若呵哇若打回永樂中俱嘗遣使朝貢其風土物産無可稽白葛達黑葛達白葛達明宣宗宣徳元年遣使入貢其使臣言遭風破舟貢物盡失乞恩貸之賜之冠𢃄俾歸見國主庶幾免責許之使附隣國貢舟還國宴賜悉如禮其國土地瘠薄崇釋教又有黑葛達亦以宣徳時來貢國小民貧尚佛畏刑二國俱以鐵鑄錢西洋古里西洋古里地最大與僧迦密邇西洋諸番之㑹也去中國甚逺西瀕大海其人淳厚行者讓道路不拾遺喜事浮屠半崇回教富家多植椰子樹至數千其他蔬果畜産多類中國明成祖永樂時遣使朝貢賜印誥及文綺是時諸番使臣充斥於庭以古里大國特序其使者於首嗣是屢偕諸國入貢西洋瑣里瑣里附西洋瑣里明太祖洪武二年命使臣劉叔勉以即位詔諭其國三年平定沙漠復遣使臣頒詔其王别里提遣使奉金葉表獻方物賜文綺紗羅諸物甚厚成祖永樂中復遣使偕古里阿丹等十五國來貢土産胡椒附載與民市又有瑣里國近西洋瑣里而差小洪武三年命使臣齎詔撫諭其國五年王卜納的遣使朝貢並獻其國土地山川圗意大里亞意大里亞國居大西洋中自古不通中國明神宗萬厯時其國人利瑪竇至京師為萬國全圗言天下有五大洲其説荒渺莫考利瑪竇至中官馬堂以其方物進獻帝嘉其逺來假館授餐給賜優厚利瑪竇遂留不去其人奉天主耶穌教自是充斥中土好異者咸尚之其所言風俗物産亦多夸大不足具述西北伊里巴拉伊里巴拉在肅州西北三千餘里地極寒深山窮谷六月亦飛雪或曰即古焉耆或曰即古龜兹元名其地為伯實巴里世祖設宣慰司尋改為帥府其後以諸王鎮之明太祖洪武二十四年國王哈達拉和卓遣使貢馬賜其王綵幣十表裏其使者皆有賜成祖永樂四年貢璞玉十六年布色弑其從兄王諾果沙扎該自立為王徙其部落西去更號伊里巴拉宣宗宣徳後屢入貢準布準布不詳其始遼時嵗來朝貢聖宗常置準布等部節度使天祚時尚來貢突厥突厥唐末為諸部所侵部族散微五代之際常來朝貢遼時朝貢無常有事則助軍號屬國軍回鶻回鶻即杜典回紇匈奴之别裔本名回紇唐憲宗元和中訛為回鶻五代時常來朝貢宋太祖建隆二年景瓊汗遣使朝獻後屢貢方物徽宗宣和中因入貢散而之陜西諸州貿易留久不歸朝廷恐其為邊害詔禁止之遼太祖天顯十二年九月回鶻遣使來貢十月遣使賀永寧節太宗㑹同四年特賜旌旗弓劎衣馬七年回鶻遣使請婚不許黠戛斯黠戛斯即杜典結骨古堅昆國亦曰居勿其君曰阿熱遂姓阿熱氏駐牙青山唐肅宗乾元中為回紇所破其部衆漸微至遼嘗遣使入貢沙陀沙陀有大磧名沙陀故以為號其衆趫悍善鬭唐時號沙陀軍遼太祖神冊元年討降之欽定續通典卷一百四十九
