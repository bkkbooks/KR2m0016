  text: 州郡明四川江西四川元置四川等處行中書省治成都路又置羅羅蒙慶等處宣慰司治建昌路屬雲南行中書省明洪武四年七月置四川等處行中書省九月置成都都衛與行中書省同治八年十月改都衛為四川都指揮使司領招討司一宣慰司二安撫司五長官司二十二及諸衛所九年六月改行中書省為承宣布政使司領府十三直𨽻州六宣撫司一安撫使一屬州十五縣百十一長官司十六成都府元成都路明洪武四年為府領州六縣二十五成都倚華陽倚雙流明洪武十年五月省入華陽縣十三年十一月復置郫溫江新繁明洪武十年五月省入成都縣十三年十一月復置新都彭元彭州明洪武十年五月降為縣東有故濛陽縣元屬彭州明洪武十年五月省崇寧元屬彭州明洪武四年屬府十年五月省入灌縣十三年十一月復置灌元灌州明洪武中降為縣金堂明洪武十年五月省入新都縣十三年十一月復置仁壽井研明洪武六年十二月置十年五月省入仁夀縣十三年十一月復置資明玉珍置資州明洪武初降為縣內江明洪武中置安元安州明洪武中降為縣簡州明洪武六年降為縣正德八年又升為州領縣一資陽明洪武六年十二月置屬府十年五月省入簡縣成化元年七月復置仍屬府正德中改屬州崇慶州元治晉原縣明洪武中省縣入州西北有永康縣東南有江源縣明玉珍復置洪武初省領縣一新津漢州明玉珍復置雒縣為州治明洪武四年省縣入州領縣三什邡明洪武十年五月省入綿竹縣十三年十一月復置綿竹德陽明洪武十年五月省入漢州十三年十一月復置綿州元屬潼川府明洪武三年來屬十年五月降為縣十三年十一月復為州領縣二羅江明洪武六年十二月省入綿州十三年十一月復置彰明明洪武十年五月省入綿縣十三年十一月復置茂州元治汶山縣屬陜西行省吐蕃宣慰司明洪武中省縣入州十六年復置縣後復省領縣一汶川威州元以州治保寧縣省入明玉珍復置縣明洪武二十年五月復省縣入州東有通化縣洪武三年省領縣一保明洪武六年分保寧縣地置保寧府元屬廣元路明洪武四年直𨽻行省領州二縣八閬中倚蒼溪明洪武十年五月省入閬中縣十三年十一月復置南部明洪武十年五月省入閩中縣十三年十一月復置廣元元廣元路治綿谷縣明洪武四年改為府九年四月降為州來屬以綿谷縣省入十三年十一月復置綿谷縣二十二年六月降州為縣復省綿谷縣入焉昭化元屬廣元路明洪武十年五月省入廣元州十三年十一月復置屬府劒州元屬廣元路明洪武六年以州治普安縣省入來屬九年省十三年十一月復置領縣一梓潼巴州元屬廣元路明洪武九年四月以州治化城縣省入又改州為縣來屬正德九年復為州東有曽口縣元屬州後廢領縣二通江舊屬府正德九年改屬州南江正德十一年置順慶府元順慶路明洪武中為府領州二縣八南充倚西充明洪武十年五月省入南充縣十三年十一月復置蓬州元屬順慶路明洪武中以州治相如縣省入領縣二營山明洪武十年五月省入蓬州十三年十一月復置儀隴明洪武十年五月省入蓬州十三年十一月復置廣安州元廣安府屬順慶路明洪武四年降為州來屬十年五月以州治渠江縣省入領縣四嶽池渠元渠州屬順慶路至元二十六年五月省州治流江縣入焉明洪武九年四月降為縣鄰水成化元年七月置大竹元屬渠州明洪武九年來屬夔州府元夔州路屬四川南道宣慰司明洪武四年為府九年四月降為州屬重慶府十年五月直𨽻布政司十三年十一月復為府領州一縣十二奉節倚明洪武九年四月省十三年十一月復置巫山大昌明洪武十三年十一月置大寧元大寧州明洪武九年降為縣雲陽元雲陽州明洪武六年十二月降為縣萬元萬州明洪武六年十二月降為縣西有武寧縣明洪武四年省開元開州明洪武六年八月置九月降為縣梁山元梁山州治梁山縣明洪武六年十二月省州存縣十年五月改屬忠州後來屬新寧元屬逹州明洪武三年改屬重慶府十年五月省入梁山縣十三年十一月復置來屬建始元屬施州明洪武中來屬達州元治通川縣明洪武九年四月降為縣省通川縣入焉正德九年復升為州領縣二東鄉成化元年七月置太平正德十年析東鄉縣地置重慶府元重慶府屬四川南道宣慰司明洪武中為府領州三縣十七巴倚江津壁山成化十九年三月析巴縣地置永川明洪武六年十二月置榮昌明洪武六年十二月置西北有昌寧縣明玉珍置洪武七年省大足明玉珍置屬合州明洪武四年改屬府安居成化十七年九月析銅梁遂寧二縣地置綦江元綦江長官司屬播州明玉珍改為縣明洪武中來屬南川明洪武十年五月省入綦江縣十三年十一月復置長壽明洪武六年九月置屬涪州尋改屬府黔江元屬紹慶府明洪武五年十二月省入彭水縣十一年九月置黔江守禦千戶所十四年九月復置縣來屬合州元治石照縣明玉珍省縣入焉領縣二銅梁定逺忠州元治臨江縣明洪武中以縣省入領縣二酆都元曰豐都明洪武十年五月省入涪州十三年十一月復置曰酆都東南有南賓縣洪武中省墊江明玉珍置屬州涪州領縣二武隆元曰武龍明洪武十年五月省入彭水縣十三年十一月復置曰武隆彭水元紹慶府治此屬四川南道宣慰司明洪武四年府廢改屬重慶府洪武十年五月來屬遵義軍民府元播州宣慰司屬湖廣行省明洪武五年正月改屬四川十五年二月改屬貴州都司二十七年四月改屬四川布政司萬厯二十九年四月改置遵義軍民府領州一縣四遵義倚元播州總管明洪武五年正月改為播州長官司萬厯二十九年四月改縣桐梓萬厯二十九年四月以舊夜郎縣望