割靈壁入宿州以五河縣來屬二十一年併淮平入臨淮二十七年廢臨淮府以盱眙天長二縣隸焉領五縣臨淮下虹下五河下初隸臨淮府十七年來屬按宋史地理志度宗咸淳七年於泗州五河口置淮安軍領五河縣當是元初廢軍為縣謹附識旴𣅿上宋昭信軍元至元十三年行招信軍安撫司事領旴𣅿天長招信五河四縣明年升昭信路總管府十五年改為臨淮府十七年以五河縣在淮之北改屬泗州二十年併招信入旴𣅿二十七年廢臨淮府為旴𣅿縣天長中安東州下高郵府唐縣宋升為軍元至元十四年升為高郵路總管府領録事司及高郵興化二縣二十年廢安宜府為寳應縣來屬又併録事司改高郵路為府屬揚州路今隸宣慰司領縣三高郵上興化中寳應上舊為實應軍至元十六年為安宜府二十年廢府為縣來屬本府荆湖北道宣慰司山南江北道肅政亷訪司中興路上宋為荆南府元至元十三年改上路總管府設録事司文宗天厯二年以潜藩改為中興路領縣七江陵上公安中石首中松滋中枝江下潜江中監利中宋末兵亂民散收附後始復舊峽州路下本峽州宋隸荆湖北路後徙治江南元至元十三年歸附十七年升為峽州路領縣四夷陵中宋末隨州遷治不常歸附後復歸江北舊治宜都下長陽下逺安下安陸府唐郢州宋隸京西路元至元十三年歸附十五年升為安陸府領縣二長夀中京山中兵亂移治漢濱至元十二年還舊治沔陽府本復州宋理宗端平間移州治於沔陽鎮元至元十三年歸附改為復州路十五年升為沔陽府領縣二玉沙中倚郭景陵中兵亂徙治無常歸附後還舊治荆門州下唐為縣宋升為軍理宗端平間移治當陽縣元至元十三年歸附十四年升為府十五年遷府治於古城降為州領縣二長林上當陽中徳安府唐安州宋為徳安府咸淳間徙治漢陽元至元十三年還舊治隸湖北道宣慰司十八年罷宣慰司直隸鄂州行省為散府後割以來屬領縣四州一州領二縣安陸下孝感下應城中雲夢下隨州下宋為崇信軍又為棗陽軍後因兵亂遷徙無常元至元十二年歸附十三年即黄仙洞為州治領二縣隨下應山下欽定續通典卷一百三十五
