body:
  text: 州郡元遼陽等處行中書省為路七府一屬州十二屬縣十􅑫存其名而無城邑者不在此數本省計站一百二十處遼陽路上金遼陽府領遼陽鶴野二縣按金史地理志遼陽府領遼陽鶴野宜豐石城凡四縣元志云二縣其宜豐石城不知何時併省謹附識後復改為東京宜豐澄復蓋瀋貴徳州廣寧府來逺軍並屬焉元初廢貴徳澄復州來逺軍以廣寜府博索府懿州蓋州作四路直隸省至元六年置東京總管府降廣寧為散府隸之十五年割廣寧仍自行路事直𨽻省十七年又以博索府懿州蓋州來屬二十四年始立行省二十五年改東京為遼陽路後廢博索府為巡檢司領縣一州二遼陽下倚郭至元六年以鶴野縣警巡院入焉蓋州下初為蓋州路至元六年併為東京支郡併熊岳陽池案陽池金史地理志作湯池謹附識二縣入建安縣八年又併建安縣入本州懿州下初為懿州路至元六年為東京支郡所領豪州及同昌靈山二縣省入順安縣後入本州案金史地理志泰和四年以同昌隸義州不知何時復來屬謹附識廣寧府路下金為廣寧府元封布爾古特為廣寧王舊立廣寧行帥府事後以地逺遷治臨潢立總管府至元六年以户口單寡降為東京路總管府屬郡十五年復分為路行總管府事領縣二閭陽下初立千户所至元十五年以户口繁夥復立行千户所後復為陽縣望平至元六年省鍾秀縣入焉十五年為望平軍民千户所後復為縣肇州按哈喇巴圖爾傳至元三十年世祖謂哈喇巴圖爾曰納延故地曰阿巴拉呼者産魚吾今立城而以元蘇爾罕哈努森竒爾濟蘇三部人居之名其城曰肇州汝往為宣慰使既至定市里安民居得魚九尾皆千斤來獻又成宗紀元貞元年立肇州屯田萬户府以遼陽行省左丞阿薩爾領其事而大元一統志與經世大典皆不載此州不知其所屬所領之詳今以廣寧為納延分地故附注於廣寜府之下納延布爾古特之孫也山北遼東道肅政亷訪司大寧路上金北京路大定府元初為北京路總管府領興中府及義瑞興高錦利惠川建和十州中統三年割興州及松山縣屬上都路至元五年併和州入利州為永和鄉七年興中府降為州仍隸北京改北京為大寧二十五年改為武平路後復為大寧初置警巡院至元二年改置録事司領縣七州九大定下中統二年省長興入焉龍山下初屬大定府至元四年屬利州後復來屬富庶下至元三年省入興中府後復置和衆下金源下惠和下武平下義州下興中州下元初因舊為興中府後省至元七年又降府為州瑞州下高州下錦州下利州下惠州下川州下建州下東寜路本高句驪平壤城元至元六年李延齡等以府州縣鎮六十城來歸八年為東寜府十三年升東寧路總管府設録事司割静州義州麟州威逺鎮隸博索府餘城堙廢不設司存今姑存舊名土山縣中和縣鐡化鎮都䕶府自唐之季地入高麗置府州縣鎮六十餘城此為都䕶府雖仍唐舊名而無都䕶府之實至元六年李延齡等以其地來歸後城治廢毁僅存其名定逺府郭州撫州黄州領安岳三和龍岡咸從江西五縣長命一鎮靈州慈州嘉州順州殷州宿州徳州領江東永清通海順化四縣寧逺柔逺安戎三鎮昌州鐵州領戎一鎮泰州价州朔州宣州領寧朔蓆島二鎮成州領樹徳一鎮熙州孟州領三登一縣椒島椵島寜得三鎮延州領陽巖一鎮雲州瀋陽路金為瀋州昭徳軍又更顯徳軍後皆燬於兵火元初平遼東高麗國麟州神騎都領洪福源率西京都䕶龜州四十餘城來降各立鎮守司設官以撫其民後高麗復叛洪福源引衆來歸授高麗軍民萬户徙降民散居遼陽瀋州初創城郭置司存僑治遼陽故城中統二年改為安撫高麗軍民總管府及高麗舉國内附四年又以質子淳為安撫高麗軍民總管分領二千餘户理瀋州成宗元貞二年併兩司為瀋州等路安撫高麗軍民總管府仍治遼陽故城開元路金之舊土也號上京㑹寧府金末其將富森鄂諾據遼東元師伐之生禽鄂諾師至開元率賓東土悉平開元之名始見於此初立開元南京二萬户府治黄龍府至元四年更遼東路總管府二十三年改為開元路領咸平府後割咸平為散府俱隸遼東道宣慰司咸平府金領平郭安東新興慶雲清安歸仁六縣按金史地理志咸平府領平郭銅山新興慶雲清安榮安歸仁玉山凡八縣與元志異謹附識元初因之海蘭府碩達勒達等路元初設軍民萬户府五撫鎮北邊一曰屯一曰和囉噶一曰鄂多里一曰托果琳一曰布固江各有司存分領混同江南北之地河南江北等處行中書省為路十二府七州一屬州三十四屬縣一百八十二本省陸站一百六處水站九十處河南江北道肅政亷訪司汴梁路上金為南京舊領歸徳府延許裕唐陳亳鄧汝潁徐邳嵩宿申鄭鈞雎蔡息盧氏行襄樊二十州元至元八年令歸徳自為一府割亳徐邳宿四川隸之升申州為南陽府割裕唐汝鄧嵩盧氏行襄樊隸之九年廢延州以所領延津陽武二縣屬南京路統蔡息鄭鈞許陳雎潁八州開封祥符倚郭而屬邑十有五舊有警巡院十四年改録事司二十五年改為汴梁路三十年升蔡州為汝寧府屬行省割息潁二州以隸焉領縣十七州五州領二十一縣開封下倚郭祥符下倚郭中牟下原武下舊以此縣隸延州元初隸開封府後復為延州縣如舊至元九年州廢來屬按金史地理志原武縣屬鄭州本志後鄭州注亦云元初領管城滎陽汜水河陰原武新鄭密滎澤八縣及司候司後割新鄭密屬鈞州滎澤原武隸開封府則原武寶自鄭州來隸志云舊以此縣隸延州蓋誤謹附識鄢陵中滎澤下舊隸鄭州至元二年來屬封丘中金世宗大定中河水湮没遷治新城元初新城又為河水所壞乃因故城遺址稍加完葺而遷治焉扶溝下陽武下舊隸延州至元九年州廢來屬把中元初河決城之北靣為水所圯遂為大河之道乃於故城北二里河水北岸築新城置縣繼又修故城號南把縣延津下舊為延州隸河南路至元九年州廢以縣來屬蘭陽下載按金史地理志曹州東明縣因避河患徙治後以故縣為蘭陽儀封是蘭陽原隸曹州應係元初改屬謹附識通許下尉氏下太康下洧川下陳留下鄭州下元初領管城滎陽汜水河陰原武新鄭密滎澤八縣及司候司後割新鄭密屬鈞州滎澤原武隸開封府併司候司入管城領四縣管城下倚郭滎陽下氾水下河陰下許州下金為昌武軍元初復為許州領五縣長社下長葛下郾城下襄城下臨潁下陳州下元初領宛丘南頓項城商水西華清水六縣至元二年南頓項城清水皆廢後復置南頓項城領五縣宛丘西華商水至元二年省南頓項城入焉後復置南頓項城鈞州下元至元二年割鄭州密縣來屬領三縣陽翟下新鄭下密下雎州下領四縣襄邑下倚郭考城下儀封下河按金史地理志載曹州東明縣因避患徙治後以故縣為蘭陽儀封是儀封原隸曹州應係元初改屬謹附識柘城下河南府路金為中京金昌府元初為河南府舊領洛陽宜陽永寧登封鞏偃師孟津新安黽池九縣後割黽池隸陜州設録事司領縣八州一州領四縣洛陽宜陽下永寧下屬按金史地理志永寧縣屬嵩州當是元初改又下嵩州注云元初以福昌隸河南而此無福昌縣疑有訛誤謹附識登封下鞏下孟津下新安偃師下陜州下領四縣陜下靈寳下至元三年省入陜縣八年廢虢州為虢畧隸陜州併虢畧治靈寶以虢畧為巡檢司併朱陽縣入焉閿鄉下至元二年省湖城縣入焉黽池下金升為韶州置黽池司候司元至元三年省司候司八年省韶州復為縣隸河南府路後割以來屬南陽府舊南陽縣金升為申州元至元八年升為南陽府以唐鄧裕嵩汝五州隸焉二十五年改屬汴梁路後直隸行省領縣二州五州領十一縣南陽下倚郭鎮平下按王鴻緒明史槀鎮平縣本漢安衆縣後廢為穰縣北鄉地元置縣謹附識鄧州下金屬南京開封府舊領穰縣南陽内鄉淅川順陽五縣按金史地理志無淅川順陽二縣惟穰縣有順陽鎮内鄉縣有淅水疑金末分二縣地置縣謹附識元初以淅川順陽省入内鄉舊設録事司至元二年併入穰縣領三縣穰下倚郭内鄉下至元二年以順陽來屬新野下漢按明史槀新野縣唐省入穰縣元復置謹附識唐州下舊唐州金改裕州按金史地理志云唐州中刺史無改為裕州之文元志疑誤謹附識元初復為唐州至元三年廢湖陽比陽桐栢三縣領一縣泌陽倚郭嵩州下金領伊陽福昌二縣按金史地理志嵩州領伊陽永寜福昌等縣永寜縣注云宋隸河南府海陵正隆六年以前寄治於府後即鎮為縣本志以永寧屬河南於此云領伊陽福昌二縣疑有訛誤謹附識元初以福昌隸河南至元三年省伊陽入州領一縣盧氏下至元二年隸南京路八年屬南陽府十一年來屬汝州下元至元三年廢郟城寳豐二縣入梁縣後復置郟縣領三縣梁下魯山下郟下裕州下唐初置北澧州又改魯州後廢為縣屬唐州金升為裕州舊領方城舞陽葉縣元初即葉縣行隨州事就置昆陽縣為屬邑至元三年罷州併昆陽舞陽二縣入葉縣後復置舞陽領三縣方城下倚郭葉下舞陽下汝寧府唐蔡州上蔡西平確山遂平平輿為屬邑元至元七年省遂平平輿入汝陽隸汴梁路三十年河南江北行省平章巴延言蔡州去汴梁地逺凡事稽誤宜升散府遂升汝寧府直隸行省以息潁信陽光四州隸焉復置遂平縣領縣五州四州領十縣汝陽下元初廢後置蔡州治此仍復置縣上蔡下西平下確山下遂平下元初省入汝陽後復置頴州下金領汝陰泰和沈邱潁上四縣元至元二年省四縣及録事司入州後復領三縣太和下宋案明史槀太和縣以汝陰縣之百尺鎮地置萬夀縣尋改曰泰和洪武初改泰為太元志作太字當係傳寫之訛謹附識沈邱下潁上下息州下金領新息新蔡真陽褒信四縣元中統三年以李璮叛廢州四年復置至元三年以四縣併入州後復領二縣新蔡下真陽下光州下宋光山軍元至元十二年歸附屬蘄黄宣慰司二十二年同蘄黄等州直隸行省三十年隸汝寧府領三縣定城固始下宋末兵亂徙治無常元至元十一年復舊治光山下兵亂地荒至元十二年復立舊治信陽州下宋信陽軍元至元十四年改立信陽府領羅山信陽二縣十五年改為信陽州二十年以羅山縣當驛置要衝徙州治此而移縣治於西南號曰羅山新縣領二縣羅山倚郭信陽歸徳府宋南京應天府金為歸徳府金亡宋復取之舊領宋城寧陵下邑虞城榖熟碭山六縣元初與亳之酇縣同時歸附置京東行省未幾罷至元元年以虞城碭山二縣在枯黄河北割屬濟寧府又併榖熟入雎陽酇縣入永州降永州為永城縣與寧陵下邑隸本府八年以宿亳徐邳並隸焉設知府治中府判各一員直隸行省領縣四州四州領八縣雎陽下倚郭唐曰来城亦曰雎陽金曰雎陽宋曰宋城元仍曰雎陽永城下下邑下寧陵下徐州下宋武寧軍金屬山東西路金亡宋復之元初歸附至元二年降為下州舊領彭城蕭永固三縣按金史地理志無永固縣据方輿紀要蕭縣有永固廢縣注云元置後廢為鎮謹附識及録事司至是永固併入蕭縣彭城并録事司併入州領一縣蕭下至元二年併入徐州十二年復立宿州中宋保静軍金置防禦使金亡宋復之元初隸歸徳府領臨渙蘄靈壁符離四縣并司候司至元二年以四縣一司併入州四年以靈壁入泗州十七年復來屬領一縣靈壁下邳州下宋置淮陽軍金復為邳州金亡宋暫有之元初以民少併三縣入州至元八年以州屬歸徳府十二年復置雎寧宿遷兩縣屬淮安十五年還來屬領三縣下邳下州治所宿遷下雎寧下有按金史地理志邳州蘭陵縣無雎寧縣考明史槀云雎寜