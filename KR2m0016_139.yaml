body:
  text: 州郡元湖廣等處行中書省為路三十州三十府三安撫司十五軍三屬府三屬州十七屬縣一百五十管畨民總管一本省陸站一百處水站七十三處江南湖北道肅政亷訪司武昌路上宋為荆湖北路元至元十一年權州事張晏然以成降自是湖北州郡悉下是年立荆湖等路行中書省并本道安撫司十三年設録事司十四年立湖北宣慰司改安撫司為鄂州路總管府并鄂州行省入潭州行省十八年遷潭州行省於鄂州移宣慰司於潭州十九年隨省處例罷宣慰司本路𨽻行省大德五年以鄂州首來歸附又世祖親征之地改武昌路領縣七江夏中倚郭咸寧下嘉魚下蒲圻中崇陽中通城中武昌下宋升夀昌軍以其為江西衝要地也元因之至元十四年升散府治本縣後革府以縣屬本路嶽州路上宋為嶽陽軍元至元十二年歸附十三年立嶽州路總管府設録事司領縣三州一巴陵上倚郭臨湘中華容中平江州下元貞元年升平江縣為州常德路上宋常德府元至元十二年置常德府安撫司十四年改為總管府設録事司領縣一州二州領一縣武陵上桃源州中元貞元年升桃源縣為州龍陽州下元貞元年升龍陽縣為州領一縣沅江下本屬朗州後來屬澧州路上宋為澧州元至元十二年立安撫司十四年改澧州路總管府設録事司領縣三州二澧陽上倚郭石門上安鄉下慈利州中元貞元年升慈利縣為州柿溪州辰州路下宋為辰州元改辰州路領縣四沅陵中辰溪下盧溪下敘浦下沅州路下宋為鎮逺州按宋史地理志無以沅州為鎮逺州之文疑宋志或有訛脫謹附識元至元十二年立沅州安撫司十四年改沅州路總管府領縣三盧陽下黔陽下麻陽下興國路下宋為興國軍元至元十四年升興國路總管府舊𨽻江西三十年自江西割𨽻湖廣設録事司領縣三永興下倚郭大冶下通山下漢陽府宋為漢陽軍咸淳十年郡守孟琦以城來歸元至元十四年升漢陽府領縣二漢陽至元二十二年升中縣漢川下歸州下宋為歸州德祐初歸附元至元十二年立安撫司十四年改歸州路總管府十六年降為州領縣三秭歸下倚郭巴東下興山靖州路下宋為靖州元至元十二年立安撫司明年改靖州路總管府領縣三永平下會同下通道下湖南道宣慰司嶺北湖南道肅政亷訪司天臨路上宋為潭州元至元十三年立安撫司十四年立行省改潭州路總管府十八年遷行省於鄂州徙湖南道宣慰司治潭州天厯二年以潛邸所幸改天臨路設録事司領縣五州七長沙上倚郭善化倚郭衡山上寧鄉上安化下醴陵州中元貞元年升醴陵縣為州瀏陽州中元貞元年升瀏陽縣為州攸州中元貞元年升攸縣為州湘鄉州下元貞元年升湘鄉縣為州湘潭州中元貞元年升湘潭縣為州益陽州中元貞元年升安化縣為益陽州湘隂州下元貞元年升湘陰縣為州衡州路上宋為衡州元至元十三年置安撫司十四年改衡州路總管府十五年置湖南宣慰司以衡州為治所十八年移司於潭衡州𨽻焉設録事司領縣三衡陽上倚郭安仁下櫺道州路下宋為道州元至元十三年置安撫司十四年改道州路為總管府設録事司領縣四營道中倚郭寧逺中江華中永明中永州路下宋為永州元至元十三年置安撫司十四年改永州路總管府設録事司領縣三零陵上倚郭東安上祈陽中郴州路下宋為郴州元至元十三年置安撫司十四年改郴州路總管府設事事司領縣六郴陽中倚郭舊為敦化縣至元十三年改今名宜章中永興中興寧下桂陽下桂東下全州路下宋為全州元至元十三年置安撫司十四年改全州路總管府設録事司領縣二清湘上倚郭灌陽下寶慶路下宋為寶慶府元至元十二年立安撫司十四年改寶慶路總管府設録事司領縣二邵陽上倚郭新化中武岡路下宋為武岡軍元至元十三年置安撫司十四年升武岡路總管府設録事司領縣三武岡上倚郭新寧下綏寧下桂陽路下宋為桂陽軍元至元十二年置安撫司十四年升桂陽路總管府設録事司領縣三平陽上臨武中藍山下茶陵州下宋為茶陵軍復為縣元至元十九年升為州耒陽州下至元十九年升耒陽縣為州常寧州下至元十九年升常寧縣為州廣西兩江道宣慰使司都元帥府嶺南廣西道肅政亷訪司靜江路上宋為靜江軍元至元十三年立廣西道宣撫司十四年改宣慰司十五年為靜江路總管府元貞元年併左右兩江宣慰司都元帥府為廣西兩江道宣慰司都元帥府仍分司雍州設録事司領縣十臨桂上倚郭興安下靈川下理定下義寧下修仁下荔浦下陽朔下永福下古下南寧路下宋為雍州元至元十三年立安撫司十六年改為雍州路總管府兼左右兩江溪洞鎮撫泰定元年改為南寧路設録事司領縣二宣化下武緣下梧州路下宋為梧州元至元十四年置安撫司十六年改梧州路總管府領縣一蒼梧下潯州路下宋為潯州元至元十三年置安撫司十六年改潯州路總管府領縣二桂平下平南下栁州路下宋為栁州元至元十三年置安撫司十六年改栁州路總管府領縣三栁城下倚郭馬平下洛容下慶逺南丹溪洞等處軍民安撫司宋為慶逺府元至元十三年置安撫司十六年改慶逺路總管府大德元年立慶逺南丹溪洞等處軍民安撫司領縣五宜山下欣城下天河下思恩下河池下平樂府宋為昭州元改為平樂府領縣四平樂下倚郭恭城下立山下龍平下鬱林州下宋為鬱林州元至元十四年仍行州事領縣三南流下興業下博白下容州下宋為容州寧逺軍元至元十三年改安撫司十六年改容州路總管府領縣三普寧下北流下陸川下象州下宋為象州元至元十三年立安撫司十五年改象州路總管府領縣三陽夀下來賓下武仙下賓州下宋為賓州元至元十三年置安撫司十六年改下路總管府領縣三嶺方下倚郭上林下遷江下橫州下宋為橫州元至元十四年立安撫司十六年改總管府領縣二寧浦下倚郭永淳下融州下宋為融州清逺軍元至元十四年置安撫司十六年改融州路總管府二十二年改散州領縣二融水下懷逺下藤州下宋為藤州元至元十三年仍行州事領縣二鐔津下岑溪下賀州下宋為賀州元至元十三年仍行州事領縣四臨賀下倚郭富川下桂嶺下懷集下宋屬廣州至元十五年以𨽻本州貴州下宋為貴州元至元十四年領鬱林縣大德九年省縣止行州事思明路大平路田州路軍民總管府來安路軍民總管府鎮安路以上並闕思案以上五路元志注並闕今考明史地理志明府志云元為思明路上思州忠州上下石西州西平州祿州思明州江州思陵州慿祥州注並云元屬思明路太平府注云元為太平路永康州太平州思城州全茗州鎮逺州龍英州結安州結倫州都結州茗盈州左州養利州注並云元屬太平路田州注云元為田州路歸德州思恩軍民府泗城州果化州向武州都康州注並云元屬田州路鎮安府注云元為鎮安路上映州注云元屬鎮安路又田州注云西有廢來安路謹附識海北海南道宣慰司海北海南道肅政亷訪司至元三十年立雷州路下宋為雷州元至元十五年歸附置安撫司十七年為海北海南道宣慰司治所改安撫司為總管府𨽻宣慰司領縣三海康中徐聞下遂溪下化州路下宋為化州元至元十五年立安撫司十七年改總管府領縣三石龍下吳川下石城下高州路下宋為高州元至元十五年置安撫司十七年改總管府領縣三電白下茂名下信宜下欽州路下宋為欽州元至元十五年置安撫司十七年改總管府領縣二安逺下靈山下亷州路下宋為亷州元至元十七年設總管府領縣二合浦下倚郭石康下乾寧軍民安撫司宋為瓊州置瓊管安撫都監元至元十五年𨽻海北海南道宣慰司天厯二年以潛邸所幸改乾寧軍民安撫司領縣七瓊山下倚郭澄邁下臨高下文昌下樂會下會同下二按明史地理志云元至元十九年置謹附識定安下置按明史地理志元至元二十九年天厯二年升為南建州謹附識南寧軍至元十五年𨽻海北海南道宣慰司領縣三宜倫下昌化下感恩下萬安軍至元十五年𨽻海北海南道宣慰司領縣二萬安下倚郭陵水下吉陽軍至元收附後𨽻海北海南道宣慰司領縣一寧逺下附西南諸畨八畨順元蠻夷官羅畨遏蠻軍安撫司平程畨武勝軍安撫司金石畨太軍安撫司卧龍畨南寧州安撫司木小龍畨靜蠻軍安撫司龍畨應天府安撫司瓜犵狫蠻夷軍民長官大韋畨蠻夷長官靜洪畨永盛軍安撫司蠻方畨河中府安撫司盧畨海軍安撫司盧畨夷軍民長官定逺府領桑章龍必化小羅四州山下思同州領朝宗上轎新安麻峽甕蓬小羅章龍烏華山都雲博羅十一縣管番民總管自小程番以下各設蠻夷軍民長官小程番中嶆百納等處底窩紫紅等處甕眼納八等處獨塔等處客當刻地等處天臺等處梯下黨兀等處處勇都硃硃古瓨等處獨大小化等處佐洛甲洛屯等低當低界等處石寨百眼等處羅來州賴那厯州州重州州阿孟州州上龍州州峽江州等羅州桑白北島羅那龍里寨等六寨等處帶帖犵狫等處雲本當三寨等處齊處羡塘夾等處都桑林獨立等處山六洞柔逹等處軍竹古弄等處等中都雲棺水等處等金竹府都雲民府萬平處南寧丹竹處焦陳蒙處李稍李殿等處等陽安等處溪等都鎮平溪處平月八千蠻處恭李崖等陽並等處軍盧山等處乖西民府順元等路軍民安撫司雍真乖西葛蠻等處真等處曽竹等處葛蠻雍龍平寨江骨龍等處坡底寨等處等處磨雷波等處茶山百納等處山納埧紫漕泥等處青逺地等處處木窩普沖普得等處樓武當等處等骨龍龍里清江水雍眼等處養龍坑宿徵高橋青塘鴨水等處州落邦札佐等處頭平遲安德等處水六廣等處貴等處施溪樣朵泥等處東市北洞思州軍民安撫司鎮逺府寨楠木洞平古州八萬洞橋偏橋中野雞德勝寨偏四甲等處卑思印江等處等石千等處溪曉愛瀘洞赤溪等處帶洞大小田處黃道省溪埧場等處等處金容金逺等處葛章葛商等處臺蓬若洞住溪等處平頭著可通達等處洪安溶江芝子平等處俄亮寨薑楊溪公等處沿河洞龍泉平洞祐溪萬水特麻勇恩勒大山蘇葛辨等處羅五寨銅人等處山銅人大小江等處明洞烏龍干等處西大洞等處秃羅德浦口州高丹州福州州永州州乃州州鑾州鳯程州芝三旺地忠天文合州山州曹安習州滴等洞苑羅等團麥荔枝材安化上中下蠻溪洛卜寨著士衙迪洞會施容等處洞感化州等處客契鋤洞洞驢遲來化州團等處臘惹洞樂勞巖中古州墩洞上里坪李等洞洪州泊張家洞沿邊溪洞宣慰使司播州軍民安撫使黃平府處平溪上塘羅駱家等處水車等石粉羅家永安等處六洞柔逺等處思錫樂平等處煙白泥等處洞南平綦江等處珍川寧等處水等處溱涪洞等處處洞天觀等處倒葛浪洞等處江寨埧埡黎焦溪等小姑單張柞等處烏等處舊州草堂等處寨恭溪杳洞埧草橫坡水囤等處寨平伐月石等處塘下平地寨勞寨勇上塞坦秀崟奔河平莫等林種密沿祐溪處新添葛蠻安撫司南渭州杯落葛谷鵝羅椿等處地昔不梁駱密約等處乾溪吳等處處噥聳古平等處處甕城都桑等處平普樂重墺等落同當等處都鎮馬乃等平族等處獨祿月三陂地蓬等處田小葛龍洛邦到駱豆虎等處羅和麥倣大小陂帶等處都雲洞洪安劑等處谷谷霞寨都剌客寨必郎寨底寨谷郎寨吾狂寨犵狫寨割利寨處平伐等安剌速寨思樓寨寨落暮寨縣梅求望懷寨桑州郎永縣平里寨鎖州寨甘長思母求雙隆仲各丹等處家蠻歸仁犵雍郎客都等處蒙木當利栖雍門狫等處樂賴囊吉等處獨婁木等處光華山谷津等處安青均望懷甘長不列娘等處州者者寨化思雲等洞北遐洞茅難思風北郡都變等處潘樂盈等處誠州富盈等處必際縣赤畬洞上黎平團羅章特等處村福水州吾允州等處順欽村六硬頭三寨等處顔水厯洞等處東隆圖推寨橘叩寨等黃頂寨魏金竹等處雍格慢等處賴客蘆寨地省寨平白崖門客當樂蒙囊大化木瓜等處除嘉州穰分州頂平珠等洛河洛腦等處寧溪甕麥孤得同處甕包三陂青控州記南平大山骨等處獨山州處木洞十瓢洞蠻窖洞橋百佐等九九寨當山齊朱谷列等處楊坪楊安等處虎列谷當等處棣甫都城等處真滁杜珂等處楊友百也客等處處阿落傳等寨洛蒙楚咸公洞龍木邉三寨貓犵剌等黑土石賓洛益輪沿蠻割和寨王都谷浪寨處王大寨丹只蛙寨種黃平下寨羅林拱章秀拱江等密秀張林拱幫西剖盆焦杉木筲等各郎西堂恭溪望成崖嶺等處桑孤把溪篤住處草等處上桑直下直米坪州令其平尾等處保靖特團等處征東等處行中書省領府二司一勸課使五大德三年立征東行省未幾罷至治元年復立瀋陽等路高麗軍民總管府征東招討司各道勸課司慶尚州道忠東界交州道海全羅州道清州道西道耽羅軍民總管府大德五年立欽定續通典卷一百三十九
