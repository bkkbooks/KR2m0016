body:
  text: 邊防臣等謹案杜佑作邊防典具列四裔諸國極之萬里之遙重洋之隔皆得以邊防統之者誠以地雖遼逺而綏柔駕馭之道不可不明所謂來則禦之去則備之兢兢以持盈知足為要諒哉其言之已自唐以降各部分併不常背服不一強弱異形通阻異勢諸史所載事迹頗繁若唐之突厥吐蕃宋之西夏明之倭人兵事相尋動輒數十百年所關於邊防者固非淺鮮我聖朝撫御環瀛版圖式廓皇上德威逺布綏定遐方若杜氏所列之挹婁靺鞨諸部今為黑龍江寧古塔地杜氏所列之烏桓鮮卑諸部今為內扎薩克地杜氏所列之卭都筰都冉駹諸部今為金川境內地杜氏所列之車師龜兹于闐諸部今為天山南北路地非可復以邊防目之而當明以前則固自為風氣非疆宇所能及也兹謹就史册志乘所載國俗土風依四正四隅方位類次於篇至於諸國之名有互見於諸史者有前史所載而後史即無聞者故杜氏通典以國為綱就一國之中其紀事按照時代接敘不另提綱今亦依杜氏之例仍以國為綱焉第一邊防東正東朝鮮日濊人本耽羅邪古新羅波邪長多尼嘉婆羅馮施蘭東南雞籠山貓琉球沙三嶼呐吕宋合里瑶嗶嘽居古麻剌朗洛佛郎機文郎馬神和蘭美第二邊防南正南盤瓠種赤西原蠻黑南詔面濮口濮僰濮文驃緬域安南童南掌滿暹羅占賓龍刺加彭亨阿魯丹眉流瓜哇重迦羅佛日羅夏治投碟里婆丁機宜佛蘇吉丹柔真臘和利三齊蘇祿室勃泥逝層檀蔑巴喇西分利佛名單單瞻博注輦修羅馬八兒諸國西南淪州蠻郎兩㸑彌東謝外牂牱吐兖州夜昆松諸蠻蕃斯朵甘寶長河西魚通寧逺藏大法王大乘法王董卜韓胡闡烏大慈法王化王天贊善王德護教王八闡教王地輔教王西阿難功國尼刺國湧塔國麻葉甕百陀洹那南毗淡巴花孤兒蘇門答剌渤覽邦柯黎伐南利枝蘭小葛蘭山大葛錫蘭第三邊防西正西沙州阿赤斤蒙古定端察遜罕東爾安哈馬哈密于土魯番渾火州項栁城食衛喇特兹闐吐黨大拂菻龜波斯塔撤瑪爾罕蘭哈魯實逹爾瑪默實喇哈雅什罕薩克特爾布哈爾琿養夷達沙喇斯愛納蘇察罕什哈喇巴克山達罕喀噶爾溫圖伊斯帕罕珠爾呼喇濟默竒爾瑪勒爾白松虎兒勒敏日洛色爾都蘇薩哈羅密沼坤城兒阿蘇法天方木默德訥刺納朴祖兒骨都束榜葛不刺哇溜竹步南阿丹山巫里刺撒勒麻林巴忽魯謨斯加異甘里急蘭丹卒沙里灣泥葛千里達葛失剌比洋古里班剌泥白達黑達西古里西洋瑣里意大里亞西北伊里巴拉戞凖布沙突厥回鶻黠斯陀第四邊防北正北韃靼鬼國朵顔克泰寧爾福餘契珠巴烏古丹附近諸國鐵甸東北渤海鐵哈斯罕囉富珠哩定烏舍驪博滿達安室韋邊防東序略臣等謹按杜氏邊防典東方凡二十國閩越自漢以降已置為郡縣百濟新羅濊貊遞為朝鮮所併惟朝鮮日本琉球諸史遞各有傳他若耽羅納貢於元吕宋佛郎機等通使於明皆杜氏所未經臚載又如髙麗有史有鑑日本有東鑑琉球有中山世鑑圖足與正史相參稽者並可搜葺以為訂證之一助至於朝鮮諸國山川土俗已見杜典者不復贅録扶桑文身諸國南北史後無聞者不更纂敘祗期徵信焉爾洪惟我朝發祥東土自逺祖定三姓之亂居俄漠惠之野俄多里城國號滿洲是為我大清開基之始逮肇祖原皇帝始居呼闌哈達山下之赫圖阿喇地方締造興京用基王業至太祖髙皇帝誕膺天眷創樹鴻圖遂定都於瀋陽太宗文皇帝營造宫闕號曰盛京於是全遼之地悉歸撫定蓋東方居生物之位實符出震之義自開闢以來扶輿鍾育以待首出之聖人其詳具見欽定滿洲源流考兹不復恭載謹於序略之內識緣起云正東朝鮮自唐迄元皆曰髙麗明始復朝鮮之號朝鮮東跨海距新羅南亦跨海距百濟西北度遼水與營州接北靺鞨俗知文字喜讀書士女服尚白地産銅銀及龍鬚席白硾紙狼尾筆唐髙宗總章初李績平髙麗擒其王髙藏歸髙氏君長遂絶武后聖厯中以髙藏子德武為安東都督後復稍自立國憲宗元和末遣使者獻樂工後唐莊宗同光元年遣廣評侍郎韓申一春部少卿朴巖來其後有王建代主其國遷都於松嶽明宗長興三年權知國事王建遣使者來乃拜建為元菟州都督充大義軍使封髙麗國王建以平壤為西京王氏三世終五代屢來朝貢宋太祖建隆三年髙麗國王昭遣廣評侍郎李興祐等來朝貢錫以制書昭卒其子胄襲於太宗時遣國人金行成入就學行成擢進士第纍官至殿中丞後通判安州太平興國七年胄卒其弟治襲雍熙元年遣使來貢又遣本國學生崔罕王彬詣國子監肄業端拱二年詔賜監板九經三年賜崔罕王彬等及第遣歸後受制於契丹朝貢中絶髙麗調兵守六城契丹大舉伐之真宗大中祥符七年復遣使來貢神宗熙寧中屢遣使言欲逺契丹乞改途由明州詣闕從之哲宗元祐四年遣使持二金塔為兩宫夀蘇軾奏却之七年復遣使獻黃帝針經請市書甚衆仍用蘇軾奏弗許然卒市册府元龜以歸至孝宗隆興後使命乃絶遼太祖神册間髙麗遣使進寶劒聖宗統和十年以東京留守蕭恆德伐髙麗十一年王治遣朴良柔奉表請罪因遣使册治為王治傳子誦二十八年髙麗西京留守康肇弒其主誦擅立誦從兄詢遼伐髙麗肇拒戰被執先是詢上表請朝至開泰元年稱病不能朝四年命耶律世良蕭虛烈伐之八年復會兵進討詢乃降金滅遼髙麗遣使通好於金太祖收國二年來賀伐遼之捷且請保州太祖曰爾自取之太宗天會四年髙麗遣使奉表稱藩優詔答之仍賜保州地嗣後髙麗使賀正旦及天清節萬夀節史不絶書元太祖十一年契丹人祿格等竄據髙麗江東城元遣兵征之國人洪大宣詣軍降共討滅祿格太宗三年以髙麗殺使者命徹爾台征其國國人洪福源迎降其主王㬚請和許之遂設官分鎮所取之地而還明年㬚盡殺所置達嚕噶齊七十二人以叛復遣兵征之㬚遣使上表謝過自後叛服不常世祖至元七年其西京內屬改置東寧路總管府盡慈悲嶺為界以孟克圖為安撫使率兵戍其西境其後遣使奉表嵗修職貢明太祖洪武元年遣使賜王顓璽書二年顓表賀貢方物且請封詔賜金印誥文封為髙麗國王顓復遣成惟德等上表謝賜以六經四書通鑑七年顓為權相李仁人所弒而立寵臣辛肫之子禑禑傳子昌二十二年李成桂廢之復立王氏裔定昌國院君瑶二十五年瑶出居原州成桂主國事更名旦遣使請改國號命仍古號曰朝鮮自是王氏始絶成祖永樂元年朝鮮請冕服書籍許之宣宗宣德八年朝鮮請遣子弟入學不許神宗萬厯二十年為日本關白平秀吉所侵掠朝鮮王李昖奔平壤城已復走義州八道幾盡沒遣使求援中國乃以宋應昌為經略李如松為提督分布諸將攻戰終莫能勝至二十六年平秀吉死諸倭撤兵去而其國始安濊濊居朝鮮之東户二萬俗常用四月節祭天晝夜飲酒歌舞遼太祖天顯元年濊貊來貢聖宗開泰三年以其地為開州鎮國軍耽羅耽羅髙麗屬國也元世祖既臣服髙麗以耽羅為吕宋日本衝要乃遣將平之即其地立耽羅國招討司後改為軍民安撫司其貢賦嵗進毛施布百匹後髙麗以為言遂復𨽻髙麗新羅新羅國其王姓金氏所居曰金城官有宰相侍中司農卿太府令其俗元日相慶拜日月神男子褐袴婦長襦見人跪以手踞地為恭市皆婦女貿販唐髙宗上元中分取百濟地遂抵髙麗南境元宗開元中其王金興光數入朝獻果下馬朝霞紬魚牙紬海豹皮又遣子弟入太學興光卒元宗命邢璹弔祭曰新羅號君子國知詩書以卿惇儒故持節往宜衍經誼使知大國之盛自是嵗朝獻會昌後不復至後唐莊宗同光元年其王金朴英遣使者來朝貢四年權知國事金溥遣使來晉以後不復至遼太祖九年新羅遣使貢方物天贊四年復來貢聖宗統和中設朝天館於大定府以待之長人長人國在新羅之東長身猙獰不火食噬禽獸或搏人以食其國連山數十里有峽固以鐵闔號關門新羅常屯弩士數千守之日本日本古倭國唐髙宗咸亨初改名日本地環海惟東北限大山有五畿七道三島其城池附山城築四座每城周三四里巖石髙聳限以大河內大樓閣九層粧黃金下隔小房百餘間夜則東西遊臥令人不知其處氣候溫暖草木冬青土地膏腴水多陸少俗以捕魚為業元宗開元天寶間相繼來朝肅宗上元中新羅梗海道乃繇明州越州朝貢德宗建中元年使者真人興能獻方物真人蓋因官而氏者也興能善書其紙似繭而澤人莫識貞元末遣使者朝其所携學子及浮屠等願留肄業閲二十餘年使者來請肄業者還國詔可宋太宗雍熙元年日本國僧奝然與其徒浮海而至獻銅器十餘事並本國職員考年代紀各一卷奝然善𨽻書而不通華言問其風土但書以對云國中有五經及佛經白居易集並得自中國土宜五榖而少麥交易用錢文曰乾文大寶畜有水牛驢羊多犀象産絲蠶及織絹樂有國中髙麗二部東嶴州出黃金西别島出白銀以為貢賦國王以王為姓傳襲至今六十四世文武僚吏皆世官太宗閲其書撫之甚厚賜紫衣館於太平興國寺二年隨台州寧海商人船歸其國是後連貢方物而來者皆僧也元世祖至元八年命少中大夫祕書監趙良弼使日本日本始遣彌四郎入朝帝宴勞遣之後以致書不報命范文虎等帥舟師十萬征之至五龍山遭暴風軍盡沒後屢招不至終元世不相通明太祖洪武四年日本國王良懷遣使奉表稱臣貢方物後復遣王子來入國學帝善待之特授觀察使永樂元年貢使至上王源道義表及貢物四年封其國中山為夀安鎮國之山御製碑文立其上五年六年頻入貢嗣後雖屢遣使入貢然海寇亦不絶穆宗隆慶後倭酋關白平秀吉者益治兵征服旁近諸小國遣其帥清正等率舟師逼釡山屢次入犯及其國內亂乃止邪古波邪多尼邪古波邪多尼三小國在日本之東海嶼中北距新羅西北距百濟西南直越州産絲絮婆羅婆羅又名文菜東洋盡處也其地負山面海崇釋教禁食豕肉有禮拜寺每祭用犧唐髙宗時婆羅國入貢明成祖永樂三年遣使者齎璽書綵幣撫諭其王四年其國東西二王並遣使奉表朝貢神宗萬厯時為婆羅國王者乃閩人也或言鄭和使婆羅有閩人從之留居焉其後人竟據有其國王有金印一篆文作獸形民間嫁娶必請此印印背上以為榮後佛郎機舉兵來擊王率國人走山谷中放藥水流出毒殺佛郎機人因得返國馮嘉施蘭馮嘉施蘭東洋小國明成祖永樂四年八月其酋嘉馬銀等來朝貢方物賜鈔幣有差六年八年復來朝貢東南雞籠山雞籠山在彭湖嶼東北故名北港又名東畨去泉山甚邇地多大山澤叢篁深菁夾以溪流溪流入海水淡故其外名淡水洋無君長有十五社社多者千人少或五六百人無徭賦以子女多者為雄聽其號令雖居海中畏海不善操舟罕與鄰國往來俗尚勇暇即習走日可數百里足皮厚數分履荆棘如平地所産竹大至數拱長十丈以竹搆屋覆之以茅聚族而居明成祖永樂中鄭和遍至東西洋靡不獻琛恐後獨此畨逺避不至世宗嘉靖末雞籠山人遭倭焚掠避居山後嗣有紅毛畨至此因事耕鑿設闤闠稱臺灣焉明末給事中何楷陳靖海之策大率以臺灣為姦民之窟欲逐去紅毛時不能用琉球宋史作流求元史作琉求琉球在東南海中與漳泉興福四州界相值舟行數日可至每嵗稻再熟花常開燕以七月來不巢人屋鷹以白露日至物産硫磺胡椒等物其王每視朝羣臣搓手膜拜移時方起其俗凡有宴會肴饌各盤貯而不相共飲酒則止以一杯相傳宋孝宗淳熙時其王舜天依日本書制字母四十七名依魯花略仿切音三十六字母意元世祖至元二十八年海船副萬户楊祥請以六千軍往降之給金符賫詔以行出海洋遽掠一山軍小挫未至琉球引還成宗元貞三年福建省平章政事髙興上言琉球可圖狀遣省都鎮撫張浩等襲之擒生口百三十餘人抗命如故其國至元末分為三曰中山曰山南曰山北其王皆以尚為姓而中山最強明太祖洪武五年命行人楊載詔諭之中山王察度遂遣使入貢賜賚有加許陪臣子弟入國學肄業於是山南王承察度山北王帕尼芝亦相繼臣服成祖永樂中琉球中山山南山北三王屢入貢子弟俱入國學肄業其嗣王立俱遣使册封之十三年以後山北王不復遣使宣宗宣德四年後山南王亦不復至云為中山王所併中山王屢世朝貢不絶三嶼三嶼近琉球元世祖至元三十年欲選人招誘之平章政事巴延等言此國之民不及二百户去年軍船入琉球過其國國人餉以糧館我將校無他志也乞不遣使帝從之吕宋吕宋居東南海中在臺灣鳯山沙馬﨑之東南俗少爭訟出入佩刀自衛國有機易山産金銀明太祖洪武五年遣使入貢成祖永樂三年遣官齎詔撫諭其國八年復來貢自後久不至神宗萬厯四年官軍追海寇至其國國人助討有功復朝貢時佛郎機強與吕宋互市久之築室其地竟乘其無備襲殺其王而據其國名仍吕宋實佛郎機也合貓里合貓里海中小國近吕宋又名貓里務其國多山山外大海饒魚鮮人知耕稼商船往來漸成富壤華人入其國不敢欺凌市法最平明成祖永樂三年遣使朝貢沙瑶呐嗶嘽沙瑶與呐嗶嘽連壤呐嗶嘽在海畔沙瑶稍紆入山隈皆與吕宋近男女蓄髮垂髻以板為城豎木覆茅為室崇釋教多建禮拜寺物産甚薄後佛郎機據吕宋多侵奪鄰近惟二國號令不能及古麻剌朗古麻剌朗東南海中小國明成祖永樂十五年遣中官張謙賫敕撫諭賜之䋐綿紵絲紗其王幹刺義亦奔敦率妻子陪臣隨謙來朝貢方物禮之如蘇祿國賜以印詔冠帶金錢文綺明年還至福建遘疾卒賜諡康靖命其子苾刺嗣為王賜鈔幣率衆歸文郎馬神文郎馬神處東南海中以木為城其半倚山民多縳木水上築室以居男女用五色布纒頭腹背多袒初用蕉葉為食器後與華人市漸用磁器其俗惡淫姦者論死鄰境有買哇柔者性凶狠商人畏之夜必嚴更以待所産有孔雀鸚鵡沙金降香藤席等物美洛居美洛居俗訛為米六合居東海中頗稱饒富酋出威儀甚備所部合掌伏道旁男子削髮女椎結地有香山雨後香墮沿流滿地居民拾取不竭其酋委積充棟以待商船之售明神宗萬厯時紅毛番與佛郎機交爭美洛居地每嵗搆兵人不堪命華人流寓者説二國令各罷兵分國中萬老髙山為界山以北屬紅毛番南屬佛郎機始稍休息而美洛居竟為兩國所分佛郎機佛郎機近美洛居又稱干系臘國時恃強陵轢諸國無所不往所産多犀象珠貝衣服華潔貴者冠賤者笠初奉佛教復奉天主教俗不立契約有事指天為誓不相負明武宗正德十三年佛郎機請封詔拒之世宗嘉靖二年佛郎機入寇官軍擊走之先是其别將都盧以巨炮利兵橫行海上官軍擊擒之獲二舟得其炮即名為佛郎機副使汪鋐進之朝用以守墩臺城堡火炮之有佛郎機自此始和蘭和蘭又名紅毛番地近佛郎機所恃惟巨舟大炮舟長三十丈廣六丈厚二尺餘樹五桅桅下置二丈巨鐵炮發之可洞裂石城震十里世所稱紅夷炮即其製其柁後置照海鏡大徑數尺能照數百里其人悉奉天主教所産有金銀琥珀瑪瑙玻璃諸物其國甚富明神宗萬厯二十九年和蘭駕大艦薄香山旋引去三十二年駕艦抵澎湖熹宗天啓四年巡撫南居益發兵攻破和蘭澎湖之警以息欽定續通典卷一百四十七
