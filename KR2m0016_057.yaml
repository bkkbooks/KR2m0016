body:
  text: 禮嘉天子納后妃冊后附宋遼金元明宋制自太祖建隆元年立琅邪郡夫人王氏為皇后命所司擇日備禮冊命自後凡制書云冊命者多不行冊禮后妃皆寫冊命告身以金花龍鳳羅紙金塗褾袋有司進入學士院草制宣於正殿近侍牧守宗室皆修貢禮羣臣拜表稱賀又詣內東門奉箋賀皇后真宗冊德妃劉氏為皇后不欲令藩臣貢賀不降制於外廷止命學士草詞付中書仁宗冊皇后曹氏其冊制如皇太子玉用珉玉五十簡匣依冊之長短寶用金方一寸五分髙一寸其文曰皇后之寶盤螭紐綬并緣冊寶法物依約舊制為之匣盝並朱漆金塗銀其禮與通禮異不立仗不設縣前一日守宫設次於朝堂設冊寶使副次於東門外命婦次於受冊寶殿前外設皇后受冊寶位於殿庭階下北向奉禮設冊寶使位於內東門外副使內侍位於其南差退東向北上冊寶案位於使前南向又設內給事位於北面南向其日百官常服早入次禮直官通事舍人先引中書令侍中門下侍郎中書侍郎及奉冊寶官執事人綘衣介幘詣垂拱殿門就次以俟冊降禮直官通事舍人分引宰臣樞密冊寶使副百官詣文德殿立班東西相向內侍二員自內承㫖降皇后冊寶出垂拱殿奉册寶官俱搢笏率執事人禮直官𨗳中書侍郎押冊中書令後從門下侍郎押寶侍中後從由東上閣門出至文德殿庭權置禮直官通事舍人引使副就位次引侍中於使前西向稱有制典儀曰再拜贊者承𫝊使副在位官皆再拜宣曰贈尚書令冀王曹彬孫女冊為皇后命公等持節展禮使副再拜侍中還位門下侍郎帥主節者詣使東北主節以節授門下侍郎門下侍郎執節授冊使冊使跪受興付主節幡隨節立於使左次引中書令侍中詣冊寶東北西向立中書侍郎引冊案立於中書令右中書令取冊授冊寶使冊寶使跪受興置於案中書令中書侍郎退復班門下侍郎引寶案於侍中之右取寶授冊寶使如上儀退復位典儀贊拜訖禮直官通事舍人引使副押冊寶持節者前𨗳奉冊寶官奉舁授衛如式以次出朝堂門詣內東門附內臣入進內臣引內外命婦入就位內侍詣閣請皇后服褘衣冊寶至使副俱東向內給事前北向跪稱冊寶使李迪副使王隨奉制授皇后冊寶其冊文曰天地定位隂陽相成人道貫之以綱大倫后德配之以熙內治聖人有以端其本也故造舟之迎言乎備詩人有以善其化也故周南之風著乎始粵朕冲昧祗若丕構深唯負荷之重輔佐攸艱用簡納賢明協於神人之望咨爾贈尚書令冀王配饗太祖廟廷曹彬孫女唯乃祖克有武力勤勞王家保勳不伐饗厥終慶教流後昆熏然慈和善祥慿積生此邦媛其漸漬醇醲發聞馨香所從來逺矣起居祖習不待􅈺姆氏之訓風容矩度自為宗黨之憲長秋曠位隂教未序咨求訓範統正六列宗公鼎臣誦言於朝願即嘉時聿修典禮朕以春秋之義必娶大國摯疇之家乃稱福耦謀及奉筮聘以榖圭惟吉之從有命既集今遣使工部尚書同平章事李迪副使户部侍郎參知政事王隨持節册命爾為皇后欽哉夫唯肅恭可以侍上夫唯謙裕可以接下泰而能約則驕弗至動而慎思則悔弗萌𢡟乃后德修乃媛職奉承宗廟儀刑家國永綏無疆之祚不其韙歟俯伏興退復位內給事入詣受冊寶殿門皇后前跪奏訖內侍進詣使前西南跪受冊寶以授內謁者監使退復位內謁者監主當內臣持冊寶入內東門內侍從之以次入詣殿庭內侍贊引皇后降立庭中北向位內侍跪取冊次內侍跪取寶立皇后右少前西向內侍二員進立皇后左少前東向內侍稱有制內侍贊皇后再拜內侍捧冊進授皇后皇后受以授內侍次內侍奉寶亦然復贊再拜訖𨗳皇后升坐內臣引內外命婦稱賀如常儀禮畢內侍導皇后降坐內臣還閣內外命婦朝退皇后易常服謝皇帝皇太后用常禮百官詣東上閣門表賀哲宗元祐五年八月太皇太后詔以皇帝納后令翰林學士御史中丞兩省與太常禮官檢詳古今六禮沿革參考通禮典故具為成式羣臣又議勘昏御史中丞鄭雍等請不用隂陽之說吕大防亦言不可太后納之六年八月三省樞密院言六禮命使納采問名納吉納成請期差執政官攝太尉充使侍從官或判宗正官攝宗正卿充副使以舊尚書省為皇后行第納采問名同日次日納吉納成告期納成用穀圭為贄不用雁請期依開寶禮改為告期親迎命使奉迎納采前擇日告天地宗廟皇帝臨軒發册同日先遣册禮使副次遣奉迎使令文武百官詣行第班迎又言據開元禮納采問名合用一使納吉納成各别遣使今未委三禮共遣一使或各遣使又合依發册例立仗詔各遣使文德殿發制依發册例立仗七年正月詔尚書左丞蘇頌撰册文并書學士院上六禮詞語其納采制文略曰太皇太后曰咨某官封姓名渾元資始肇經人倫爰及夫婦以奉天地宗廟社稷謀於公卿咸以為宜率由舊典今遣使持節太尉某宗正卿某以禮納采問名制曰兩儀合德萬物之統以聽內治必資令族重宣舊典今遣使持節某官以禮問名納吉制曰人謀龜筮同符元吉恭順典禮今使某官以禮納吉納成制曰咨某官某之女孝友恭儉實維母儀宜奉宗廟永承天祚以黝纁榖圭六馬以章典禮今使某官以禮納成告期制曰謀於公卿大筮元龜罔冇不臧吉日唯某月某甲子可迎率遵典禮今遣某官以禮告期奉迎制曰禮之大體欽順重正其期維吉典圖是若今遣某官以禮奉迎三月禮部太常寺上納后儀注發六禮制書太皇太后御崇慶殿內外命婦立班行禮畢內給事中出殿門置六禮制書案上出內東門禮直官通事舍人引由宣祐門至文德殿後門入權置案於西閣門命使納采問名文德殿宰臣親王執政官宗室百僚大小使臣易朝服樂備而不作班定內給事奉制書案置橫街北稍東西向北上禮直官通事舍人引門下中書侍郎次引使副就橫街南承制位北向東上內給事詣使者東北靣稱太皇太后有制典儀曰再拜在位官皆再拜宣制曰皇帝納后命公等持節行禮典儀曰再拜使副皆再拜授制訖典儀曰再拜在位官皆再拜禮直官通事舍人太常博士引使副從制案出載於油絡網犢車出宣德鼓鼓吹備而不作至皇后行第大門外令使二人對奉制案立主人立大門內儐者立主人之左北靣進受命出曰敢請事使者曰某奉制納采儐者入告主人曰某之女若而人既䝉制訪臣某不敢辭儐者出告入引主人出大門外再拜使者先入使者曰太皇太后制再拜宣制書畢主人再拜受訖主人進表訖再拜使者出問名同上儀使者曰將加卜筮奉制問名主人曰臣某之女若而人既䝉制命臣某不敢辭命使納吉納成告期並同命使納采問名儀納吉使者曰加請卜筮占曰從制使某納吉主人曰臣某之女若而人龜筮云吉臣預有焉臣某請奉典制告期使者曰某奉制告期主人曰臣某謹奉典制以上納吉納成告期請見授制接表並如納采儀臨軒命使册后及奉迎於文德殿百官朝服皇帝常服乘輦至殿後閣侍中奏中嚴外辦乃服通天冠絳紗袍乘輦出自西房降輦即御座兩省官及待制權侍郎觀察使以上分東西入殿門各就位東西相向立奉寶制御坐前奉宣后册由東上閣門至文德殿庭橫行典儀曰拜在位官皆再拜使副受册宣制曰册某氏為皇后命公等持節展禮典儀曰拜使副再拜受册寶訖典儀贊百官再拜宣制曰太皇太后制命公等持節奉迎皇后典儀贊使副再拜受節又贊百官再拜侍中奏禮畢解嚴百官再拜出皇帝常服還內册寶至皇后行第如納采儀使者曰某奉制授皇后備物典册皇后受册寶內外命婦序立如儀主人以書奉使者奉迎百官常服班宣德門外行第儐者請使者曰某奉制以禮迎儐者入告主人曰臣某謹奉典制儐者出告入引主人出大門外再拜使者先入曰有制主人再拜使者宣制畢主人再拜受制答表又再拜姆導皇后尚宅前引升堂出立房外典儀贊使副再拜使者曰令月吉日某等承制以禮奉迎內侍受以入使副退主人以書授使者奉於司言受以奏聞皇后降立堂下再拜訖升堂主人升自東階西向曰戒之戒之夙夜無違命主人退母進西階上東向施襟結帨曰勉之戒之夙夜無違命皇后升輿至中門升車出大門使副及羣臣前引將至宣德門百官宗室班迎再拜訖分班皇后入門鳴鐘鼓班迎官退乃降車入次升輿入端禮門文德殿東上閣門文德殿後門入至內東門內降輿司輿前導詣福寧殿門大次以俟晡後皇后車入宣德門侍中版奏請中嚴內侍轉奏皇帝服通天冠絳紗袍御福寧殿尚宫引皇后出次詣殿庭之東西向立尚儀跪奏外辦請皇帝降坐禮迎尚宫前引詣庭中之西東靣揖皇后以入導升西階入室各就榻前立尚食跪奏具皇帝揖皇后皆坐尚食進饌食三飯尚食進酒受爵飲尚食以饌從再飲如初三飲用巹如再飲尚儀跪奏禮畢俱興尚宫請皇帝御常服尚寢請皇后釋禮服入幄次日以禮朝見太皇太后皇太后參皇太妃如宫中之儀詔從之四月太皇太后手書曰皇帝年長中宫未建歷選諸臣之家以故侍衛親軍馬軍都虞候贈太尉孟元孫女為皇后制詔六禮尚書左僕射兼門下侍郎吕大防攝太尉充奉迎使同知樞密院事韓忠彥攝司徒副之尚書左丞蘇頌攝太尉充發册使簽書樞密院事王巖叟攝司徒副之尚書左丞蘇轍攝太尉充告期使皇叔祖同知大宗正事宗景攝大宗正卿副之皇伯祖判大宗正事髙密郡王宗晟攝太尉充納成使翰林學士范百祿攝宗正卿副之吏部尚書王存攝太尉充納吉使權戶部尚書劉奉世攝宗正卿副之翰林學士梁燾攝太尉充納采問名使御史中丞鄭雍攝宗正卿副之五月甲午行納采問名禮丁酉行納吉納成告期禮戍戍帝御文德殿發册及命使奉迎皇后己亥百官表賀於東上閣門次詣內東門賀太皇太后又上箋賀皇后上箋賀皇太妃皇后擇日詣景靈宫行廟見禮徽宗大觀四年册貴妃鄭氏為皇后議禮局重定儀注臨軒册使皇帝御文德殿服通天冠絳紗袍百官朝服陳黃麾細仗依古用宫架册使出殿門依近儀不乘輅權以穆清殿為受冊殿其日皇后服褘衣其奉冊寶授皇后皆用內侍受冊訖皇后上表謝皇帝內外命婦立班稱賀羣臣入殿賀皇帝於內東門上箋賀皇后其禮儀注乞依進馬條令施行其㑹羣臣及皇后㑹外命婦儀注並依開元開寶禮受冊之日陳宫架用女工升降行止並依樂節而别定樂名樂章皇后上表乞免受冊排黃麾仗及乘重翟車陳宫架鹵簿等而於延福宫受册其朝謁景靈宫亦止依近例云髙宗紹興十三年閏四月册貴妃吳氏為皇后前期於文德殿內設東西房東西閣凡香案宫架册寶幄次舉麾位押案位權置册寶褥位受制承制宣制位贊者位奉册寶位舉册舉寶官位及文武官僚應行事官執事官位皆儀鸞司太常典儀分設之以俟臨軒發册其日質明皇帝服通天冠絳紗袍出西閣協律郎舉麾奏乾安之樂皇帝降輦即御坐樂止册使副以下應在位官皆再拜侍中宣制曰册貴妃吳氏為皇后命公等持節展禮册使副再拜參知政事以節授冊使册使跪受以授掌節者中書令以册授册使侍中以寶授副使並權置於案册使副以下應在位官皆再拜册使押册副使押寶持節者前導正案之樂作出文德殿門樂止至穆清殿門外幄次權置以俟皇后首飾禕衣出閣協律郎舉麾坤安之樂作皇后至殿上中間南向立定樂止册使副就內給事前東向跪稱册使副姓某奉制授皇后備禮典册內給事入詣皇后前北向奏訖册使舉册授內侍內侍轉授內謁者監副使舉寶授內侍內侍授內謁者監掌節者以節授掌節內侍持節前導册寶并案進行入詣殿庭册寶初入門宜安之樂作