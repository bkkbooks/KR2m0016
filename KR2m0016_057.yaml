命婦行見皇后禮天子册妃嬪夫人宋金明宋內命婦有貴妃淑妃德妃賢妃大儀貴儀淑儀淑容順儀順容婉儀婉容昭儀昭容昭媛修儀修容修媛充儀充容充媛媫妤美人才人貴人其官誥貴儀淑儀淑容順儀順容婉儀婉容用遍地銷金龍五色羅紙張韜帶兩靣銷金雲鳯褾紅絲網子金樣鈒花塗帉錔滴粉縷金花鳯子中犀軸媫妤才人貴人美人用遍地銷金鳯子五色羅紙張韜帶銷金盤鳯褾紅絲網子金塗銀帉䤾滴粉金雲鳯玳瑁軸金內命婦元妃貴妃淑妃德妃賢妃為正一品昭儀昭容昭媛修儀修容修媛充儀充容充媛曰九嬪正二品媫妤正三品美人正四品才人正五品各九人曰二十七婦寶林正六品御女正七品采女正八品各二十七人曰八十一御妻明太祖洪武三年定前期一日禮部官奉册印入置於謹身殿御座之前其日質明文武百官朝服序立於奉天殿丹墀之兩旁使副入就奉天殿橫街南北靣立承制官奉節官奉册印官皆入詣謹身殿俟內臣𫝊㫖訖出自橫街南宣制妃服花叉翟衣出閣自本位宫中册印至內使監令率內執事奉以入妃降詣庭中拜受畢妃升階就位內命婦諸親以次賀內使監令引妃謝皇帝皇后成祖永樂七年續定上御華蓋殿具皮辨服𫝊制執事官舉節册案由御道東出黃蓋遮送至奉天門用鼓樂迎至右順門內官捧入節册將至皇妃具禮服宫人各執扇衛從出迎於宫門外是日上率詣奉天殿行謁告禮畢皇妃詣上前行八拜禮回宫妃升座長公主公主親王妃及六尚等女官四品以上命婦俱行四拜禮皇妃坐受憲宗成化二十二年册貴妃有寶先贊授册後贊授寶德妃無寶止贊授册謁告奉先殿畢先詣皇太后前行禮世宗嘉靖十一年帝册九嬪禮官上儀注先日所司陳設儀仗如朔望儀至期皇帝具衮冕告太廟世廟訖易皮辨服御華蓋殿百官公服入行禮正副使朝服承制舉節册至九嬪宫九嬪迎於宫門外隨至拜位女官宣册九嬪受册先後八拜送節出宫門復命九嬪隨具服候皇后率詣奉先殿謁告還詣皇帝皇后前恩俱如册妃禮唯圭用次玉穀文銀册少減於皇貴妃五分之一二十年册德妃張氏以妃將就室而帝方靜攝不𫝊制不謁告內殿餘並如舊欽定續通典卷五十七
