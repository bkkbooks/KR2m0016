body:
  text: 禮凶卒哭後諱及七廟諱字議唐五代唐僖宗咸通十二年七月侍御史李谿以進狀内字與廟諱音同罰一季俸復執奏曰臣案禮記不諱嫌名又職制律諸犯廟諱嫌名不坐注云若禹與雨謂聲同而字異也今若受罰是違典律乃免之晉髙祖天福三年二月中書門下奏禮經云禮不諱嫌名二名不偏諱注云嫌名謂聲音相近若禹與雨丘與區也二名不偏諱孔子之母名徴在言在不稱徴言徴不稱在此古禮也唐太宗𤣥宗二名皆諱人姓與國音聲相近是嫌名者亦改姓氏與古禮有異若廟諱平字即不諱餘側若諱側字即不諱平聲所諱字正文及偏旁皆闕㸃畫望令依今式施行勅二名及嫌名依唐故事上書犯帝諱議宋宋胡安國疏曰臣昨列職經筵専以春秋進讀縁正文有淵聖御名方奏劄未及進禀得罪去國後聞禮官建議乞以他字易之定讀為威其經𫝊本字即不改易臣今奉旨纂修于經𫝊本字既有詔令可遵其援引他經子史有犯淵聖御名者亦許依本字書寫或當遷避有所疑惑臣聞古者不以名為諱周人以諡易名于是有諱禮然臨文不諱二名不偏諱載在禮律孔子作春秋當恭王與哀公之世匄乃恭王之名夷即三世之穆定即哀公之考午即皇考之廟諱而筆削之際並無逥避春秋為尊君父而作書法如此其義可知自漢以来此義不行有易人之名以徹為通者易人之姓以荘為嚴者易甲乙之紀以丙為景者易郡縣之號以還淳為清溪者又其甚則父名晉肅而子不敢應進士舉者忌諱既繁名實愈亂恭惟陛下天縱聰明既尊春秋之書以宣聖徳宜用春秋之法以斷政事臣所纂修繕寫進本援引他經子史之類欲乞應犯廟諱不可遷避者依太常博士王晳所奏並依監本空闕㸃畫于淵聖御名亦不改易本字覆以黄紙庶㡬名實不亂上遵春秋之法以明恭順之實山川與廟諱同應改變議宋宋真宗時凡恒之字為常改千文嶽宗恒岱為泰岱北岳恒山為常山誄議周漢晉梁周禮春官大祝作六辭以通上下親疏逺近六曰誄注誄謂積累生時徳行以錫之命主為其辭太史遣之日讀誄注遣謂祖廟之庭大奠將行時也曽子問賤不誄貴幼不誄長禮也唯天子稱天以誄之諸侯相誄非禮也檀弓魯哀公誄孔丘曰天不遺耆老莫相予位焉嗚呼哀哉尼父注尼父因其字以為之諡後漢大司馬吳漢薨光武詔諸儒誄之晉郄超死之日貴賤操筆為誄者四十餘人梁劉勰曰詳夫誄之為制盖選言録行𫝊體而頌文榮始而哀終論其人也曖乎若可覿道其哀也悽焉如可傷此其㫖也以上杜典不載今補纂臣等謹案誄者哀死而述其行之辭如哀公誄孔子之類非必有諡也鄭氏注禮毎解誄為諡而陳氏集説仍之誤矣文心雕龍所言乃後世誄文之體其于賤不誄貴幼不誄長諸侯不相為誄之禮自漢以来胥失之喪禮雜制臣等謹案杜典末卷雜引禮經以補典中所未及今依其次服義則取先儒經説服制則据書儀家禮凡令甲所申與俗禮之宜因宜革者悉取前人論議以備典實而以居喪讀禮終焉毎條貫以標目乃雜著之體例以便觀覽服術有六元元吳澄曰服術謂古先聖人制服之道其一親親之服承上文人道之親親下治子孫者而言子至親也故適長子斬衰三年同于父衆子齊衰期同于祖子之下其親者孫故適孫齊衰期亦同于祖衆孫則大功九月孫之下其親曽𤣥並緦麻三月此親親之下殺也其二尊尊之服承上文人道之尊尊上治祖禰者而言父至尊也故斬衰三年其父之重無以加父之上其尊者祖故齊衰期祖之上其尊曽髙並齊衰三月此尊尊之上殺也其三名服其四出入之服承上文人道之男女有别别之以禮義者而言入者彼女来配此男母者配父之名其尊齊于至尊之父故服三年之衰與父同但齊其斬而已妻者配己之名其親比于至親之子故服期年之齊衰與子同又加之以杖也而妻之于夫則比于至尊之父故服三年之斬衰移其所天之父以天其夫也婦者配子之名故服大功九月小功五月伯母叔母其名同于父之配視己尊一等故服齊衰期昆弟之子之婦其名同于子之配視己卑一等故服小功五月唯兄弟之妻其名不可同于己之配為其與己同等故無服出者此女往配彼男故姑姊妹女子子在室齊衰期出嫁則降大功九月入者雖已出嫁或被出或無子而復歸本宗則仍服在室未嫁之本服也其五長幼之服承上文人道之長長旁治昆弟者而言長者謂昆幼者謂弟昆弟相為服齊衰期也同祖者從昆弟則服大功九月同曽祖者再從昆弟則服小功五月同髙祖者族昆弟則服緦麻三月此長幼之旁殺也由長而上則有旁尊之殺父之親昆弟為從父則服齊衰期父之從昆弟為再從父則服小功五月父之族昆弟為族父則服緦麻三月祖之親昆弟為從祖則服小功五月祖之従昆弟為族祖及曽祖之親昆弟為族曽祖並服緦麻三月由幼而下則有㫄卑之殺子之従昆弟為親昆弟之子則服齊衰期子之再從昆弟為従昆弟之子則服小功五月子之族昆弟為再從昆弟之子則服緦麻三月孫之再從昆弟為親昆弟之孫則服小功五月孫之族昆弟為從昆弟之孫及曽孫之族昆弟為親昆弟之曽孫並服緦麻三月以上喪服之五術本乎人道之四親皆為親之服也非親而服者不在此數其六従服謂非己之正服従于人而服也故殿于五術之後從服有六元元呉澄曰從服之目有六屬從者屬謂親屬以親屬故為其黨服妻從夫服夫家旁尊旁卑之親子従母服母黨之親也徒從者徒空也謂彼非親屬空為其黨服子為母之君母庶子為君母之親妾為女君之黨也從有服而無服者其夫為其昆弟有服妻従夫而為夫之兄弟則無服公子之妻為其父母有服夫從妻而公子為君所厭為妻之父母則無服也從無服而有服者其夫為兄嫂弟婦無服妻從夫而娣姒婦相為小功則有服也公子被君厭為母之父母姊妹無服妻従夫而為公子之外祖父母及從母皆緦則有服也従重而輕者姑雖出嫁猶為姪服大功九月為重其子從母而為内兄弟服緦則輕妻為其父母服期為重夫從妻而服外舅姑緦則輕也從輕而重者公子為君所厭為其母練冠為輕妻從夫而為公子之母服期則重也絶族無移服宋宋張子曰君子之澤五世而斬小人之澤五世而斬澤斬于五世則恩可知矣故四從六世為絶族而從旁及之服特親者各以親踈屬之也服不及于六世而婚姻乃百世不通者仁之所施有宗而義之所别不可已也然所謂絶非特此也喪服出妻之子為母期則為外祖父母無服𫝊曰絶族無施服親者屬也謂妻于夫家與族齒其出也與族絶族絶則為外祖父母無服此所謂無施服然夫妻則配合有絶族子母並親無絶道故為出母期謂親者屬禮記作移喪服𫝊作施盖古通用也上殺下殺旁殺宋宋馬晞孟曰親親以三為五以五為九而不言七者以其上而髙曽者皆為逺祖也下而曽𤣥者皆為逺孫也凡喪服之道以近為親是故上殺者有緦麻而無功衰以其相逺也旁殺之親有大功有小功者以其相近也近者至于親親而不尊逺者至于尊尊而不親惟其親而不尊故九月五月之喪功衰而已惟其尊而不親故雖齊衰亦有三月也親疏嫌疑同異宋宋吕大臨曰伯母叔母疏衰踊不絶地姑姊妹之大功踊絶于地為祖父母齊衰期為曽祖父母齊衰三月此所以定親疏也嫂叔不通問嫂叔無服君沐粱大夫沐稷士沐稻燕不以公卿為賓以大夫為賓此所以決嫌疑也己之子與兄弟之子異矣引而進之同服齊衰期天子至于庶人貴賤異矣而父母之喪衰疏之服飦粥之食無貴賤一也大夫為世父母叔父母衆子昆弟昆弟之子降服大功尊同則不降此所以别同異也五服十制四疑明明吕坤曰喪禮先王所制以制放逸忘哀之情故謂之制制以三年為重故適長子不在適長孫承祖之重謂之承重五服者三年一年九月五月三月五等之衣服也十制者斬衰三年齊衰三年齊衰杖期齊衰不杖期齊衰五月齊衰三月大功九月小功五月緦麻三月袒免在次十等之制度也齊衰與斬衰布麻有麄細五齊衰布麻無麄細袒免雖極輕亦先王禮制但不成服故不可入五服爾疑服有四正義加降正服禮稱情也義服情從禮也加服禮從情也三者皆隆降服禮裁情也降服非君子之所忍服所降以明禮稱所本以明情三年重喪也降為期稱重期期降大功稱期功小功降緦稱功緦仁之至義之盡也故曰加服不稱本服降服不忘本服厚道也冠制宋宋政和禮斬衰通屈繩為武齊衰以降以布為武緦麻澡治其布為武皆垂其下為纓其冠以布為三辟襵前後屈而出于武其外厭而縫之為外縪其内厭而縫之為内縪大功以上辟襵向右小功以下辟襵向左司馬氏書儀冠比衰布稍細廣三寸跨頂前後以紙糊為材上裹以布為三㡇皆向右縱縫之兩頭皆在武下向外反屈之縫于武用麻繩一條從額上約之至頂後交過前各至耳于武上綴之各垂于頤下結之齊衰以布稍細者為布四脚其制如幅巾前綴二大脚後綴二小脚以覆髻自額前向頂後以大脚繫之大暑則屈後小脚于髻前繋之謂之幞頭大功以生白絹為四脚大祥後服垂脚黲紗幞頭朱子家禮冠制斬衰同齊衰冠並如斬衰次等粗生布為之大功用稍熟布以上辟積積縫皆向右小功用稍熟細布緦麻用極細熟布以上辟積縫向左陳師道曰司馬温公云仁宗崩有司用乾興故事羣臣布四脚加冠時莫識其制以幅巾幕首破其後為四脚其後鄭􅐧夫讀續事始云三代黔首以皁絹裹髪周武帝裁為四脚名幞頭馬周請重繋前脚盖布四脚脚皆後垂如周制遇暑則繋其前脚如唐制英宗崩宋次道誤為布幞頭有司遂用民間幕喪之服以今漆紗幞頭去其鐵脚而布裹之前繋後垂而不可加冠壊之而冠幞頭之失自次道始也余謂四脚加冠今士大夫喪冠是也大布之冠古也四脚今也于禮為繁矣筓總制宋明宋司馬光書儀斬衰婦人用極粗生布為頭􅔮惡竹筓布盖頭齊衰婦人露髻以生白絹為頭􅔮盖頭大功亦如之朱子家禮斬衰婦人用極麄生布為盖頭不緝布頭􅔮竹釵齊衰婦人盖頭布總竹釵大功小功緦制俱同布之精粗有異明吕柟曰婦人麻布大袖圓領長衫者何衰之變也禮婦人言衰不言裳衰之長可以掩裳秦人以長衫為背子故長衫者衰之變也麻布盖頭者何布總之變也自有書儀以来未之有改也丘文荘曰唐羃䍦之變也家禮布頭􅔮竹釵者何曰箭筓之變也奚不絰乎既盖頭奚絰也故有腰絰無首絰白䍦盖頭宋王淮之議也絰𢃄制宋明宋政和禮首絰之制斬衰以苴麻為首絰大九寸左本在下齊衰以牡麻為首絰大七寸二分右本在上大功以牡麻為絰以繩為纓中殤無纓其大五寸七分小功成人以牡麻為絰小功殤服以繰麻為絰皆大四寸六分緦麻以繰麻為首絰其大三寸七分大功以上麻皆有本小功以下麻絰皆斷本要絰絞帯之制五分首絰殺一以為要絰五分要絰殺一以為絞帯斬衰以麻齊衰以下絰帯以麻絞帯以布麻有苴有牡有繰有不繰有有本有絶本者皆如首絰之等司馬光書儀斬衰以有子麻紐為首絰其大一扼左本在下五分去一以為要絰兩股相交兩頭結之各存麻本散垂三尺其交結處兩㫄各綴細白絹帯繫之使不脱又以細繩帯繋扵其上子為母布帯婦為姑以無子麻為絰齊衰布帯大功小功緦麻皆繫黒鞓角帯朱子家禮斬衰首絰以有子麻為之其圍九寸麻本在左從額前向右圍之從頂過後以其末加于本上又以繩為纓以固之如冠之制要絰大七寸有餘兩股相交兩頭結之各存麻本散垂三尺其交結處兩旁各綴細繩繋之絞帯用有子麻繩一條大半要絰中屈之為兩股各一尺餘乃合之其大如絰圍要從左過後至前乃以其右端穿兩股間而反挿于右在絰之下齊衰首絰以無子麻為之大七寸餘本在右末繋本下布纓要絰大五寸餘絞帯以布為之而屈其右端明丘濬家禮補斬衰婦人要絰用有子麻為之制如男子繋于大袖之上未成服不散垂齊衰婦人要絰制如男子用無子麻為之濬曰家禮婦人服制皆本書儀自大袖以下俱非古制今特補入腰帯一事者盖禮男子重乎首絰婦人重乎腰帯存其一之最重者使後人或因此以復古也杖制宋宋政和禮為父杖竹而苴為母杖桐而削其大皆如要絰其長皆齊心司馬光書儀為父竹杖本在下為母削桐上圓下方亦本在下家禮凡婦人不杖楊復曰案家禮書儀婦人皆不杖與問喪喪大記喪服小記不同恨未得質正屨制宋宋司馬光書儀斬哀着麄麻屨婦人同齊衰麻屨婦人白屨楊復曰儀禮菅屨菅屨草屨也家禮菅亦麄麻為之恐當從儀禮為正又曰婦人屨絰𫝊無明文惟周禮屨人云命婦有散屨注云散屨去飾又云祭祀而有散屨者惟大祥時案儀禮大功以上散屨喪不用樂宋明宋太宗太平興國七年正月學士李昉等奏議曰案唐長慶三年令百姓喪葬不得陳設音樂臣等參詳喪用音樂望嚴禁之九年詔曰訪聞喪葬之家有舉樂及令章者盖聞鄰里之内喪不相舂苴麻之旁食未甞飽此聖王教孝之道治世不刋之言何乃匪人親罹釁酷或則舉奠之際歌吹為娛靈柩之前令章為戲甚傷風教實紊人倫今後有犯此者並以不孝論明来知徳曰樂者樂也先王所以飾喜也樂必發于聲音以其喜也禮斬衰之喪唯而不對齊衰之喪對而不言大功之喪言而不議小功之喪議而不及樂故鄰有喪舂不相者謂其喧閙而樂也有小功之喪者且議論而不及樂事况父母之喪可以喧閙而用金鼔之樂乎且聞樂不樂聖有明訓居喪用樂律有大法今不遵聖人之教違祖宗之法而甘為十惡大罪之人乎此鼓樂所當革也喪不宴客元元仁宗延祐元年七月江南道監察御史王奉訓呈近年以来江南風俗日薄父母之喪小歛未畢茹葷飲酒略無顧忌至于送殯管絃歌舞導引循柩焚葬之際張筵排宴不醉不已泣血未乾享樂如此昊天之報其安在哉興言及此誠可哀憫宜下有司嚴加禁治從之喪不嫁娶宋明宋哲宗元祐八年蘇軾奏曰臣伏見元祐五年秋頒條貫諸民庶之家祖父母父母老疾無人供侍子孫居喪者聴尊長自陳驗實昏娶右臣伏以人子居父母喪不得嫁娶人倫之正王道之本孟子論禮色之輕重不以所重徇所輕喪三年為二十五月使嫁娶有二十五月之遲此色之輕者也釋喪而昏㑹鄰于禽犢此禮之重者也先王之政亦有適時從宜者矣然不立居喪嫁娶之法者所􅊣大也近世始立女居父母及夫喪而貧乏不能自存並聴百日外嫁娶之法既已􅊣禮傷教矣然猶或可以從權而冒行者以女弱不能自立恐有流落不虞之患也今又使男子為之此何義也哉男年至于可娶雖無兼侍亦足以養父母矣今使之釋喪而昏娶是誠使民以色廢禮耳豈不過甚矣哉春秋禮經記禮之變必曰自某人始使秉直筆者書曰男子居父母喪得娶妻自元祐始豈不為當世之病乎臣謹案此法本因卭州官吏妄有啟請當時法官有失考論便為立法臣備位秩宗前日又因邇英進讀論及此事不敢不奏伏望削去上條稍正禮俗明世宗嘉靖時鎮國中尉多炘生母象氏卒宗老援壓適之説呈巡按凖期年服闋成昏多炘堅執終喪啟于樂安王王批庶子于生母之喪壓適之説苐以服色黲淡不敢行悲哀也今多炘終喪而後成昏可以厚人倫敦化源宜依所請巡撫胡松具題敕遣官奨諭匿喪不舉五代後唐眀宗天成二年中書門下條奏據長定格選人中有隠憂者遲五選伏以人倫之貴孝道為先既有負于尊親定不公于州縣有傷風教須峻條章今後諸色官員内有隠憂冒榮者勘實不虗終身不齒所有入仕已来告敕並付所司焚燬從之釋服從吉唐唐吕諲丁母憂起復肅宗上元元年加同中書門下三品賜門㦸既立于第門或謂諲曰吉慶之事不宜凶服受之諲遂權釋衰麻當中而拜人皆笑其失禮停喪不葬五代宋元明周太祖廣順三年十一月敕應内外文武臣僚幕職州縣官舉選人等今後有父母未經營葬其主家之長不得輒求仕進所由司亦不得申舉其合赴舉選者葬事禮畢敕所由于家状内具言不得調冒所司覺察紏舉犯者必行典法如是不加覺察罪在糾察之司宋哲宗元祐中詔御史臺臣僚父母無故十年不葬即依條彈奏及令吏部候限滿檢察尚有不葬父母即未得與闗升磨勘如失檢察亦許彈奏元仁宗延祐五年五月福建㢘訪使趙奉訓牒竊見江南民俗率多逺喪稽𦵏習以成風是省察宣眀者有所未至耳盖甞聞之惟送死可以當大事而喪具稱家有無所以使貧富之𦵏咸遂人鬼之道俱安也今閩中停喪不𦵏動經一二十年有一家累至三四柩者問之則曰年月未利卜地未得貧乏不能勝喪案禮諸侯大夫士葬皆有月數是古者不擇年月矣古之𦵏者皆于國都之北兆域有常處是不擇地矣經曰喪與其易也寜戚苟能盡其哀痛之情稱家有無貧而薄𦵏何􅊣扵禮且下貧之户不即營葬輒作佛事欲為死者妄徼㝠福使移飯僧之費以為葬資固不患不勝喪也宜限以月日使依期埋葬以厚人倫之道以長孝愛之風其于教化豈小補哉眀制凡有喪之家必須依禮定限安葬若惑于風水及託故停柩在家律以暴露之罪神像明眀劉世節曰祭祀用尸其義精深尸不能行而易以木主畫像二者猶有用尸之義宋儒謂影像與祖考無干専用木主不知數寸之木與祖何相干也古人木主之設盖以祭祀用尸皆使子弟為之髙曽祖考無以分别故用主以識之今不用尸而用主正如今之鄉飲主賔介僎之帖獨有帖而無人也吕坤曰程伊川不取影堂曰若多一莖鬚便是别人不知木主何以似吾親邪古有鑄金刻木琢石塑土以像親者皆出于思慕之極無聊不得已之情亦何病于禮乎孝子慈孫于木主影帳兩存之可也不必于有不必于無亦可也臣等謹案神像之設雖非古禮然親沒之後音容日逺所𫝊雖不盡肖而十分中有六七相似則聲音笑貌猶宛然在目不愈于日逺日忘乎且非獨親見之子孫可以繋其孝思也捋𫝊之曽𤣥猶得見髙曽之儀範而動其追逺之誠其視數寸之木主不更覺洋洋如在邪禮貴從宜不可以非古而去之也墓祭宋明宋朱子家禮儀節三月上旬擇日前一日齋戒如家祭之儀具饌厥眀灑掃主人帥執事者詣墓所布席陳饌陳于墓前如家祭之儀參神降神初獻亞獻終獻辭神乃徹祝文維某年嵗次月朔日辰孝子某或孫曽𤣥敢昭告于某親某官府君之墓嵗序流易雨露既濡瞻掃封塋不勝感慕謹以潔牲醴齊祇薦嵗事尚饗遂祭后土布席陳饌如前儀祝文維年月日某官姓名敢昭告于土地之神某躬修嵗事扵某親某官府君之墓惟時保佑實賴神休敢以酒饌敬申奠獻明吕坤曰墓祭非古而東郭墦間古亦有祭者且世逺族多同域而𦵏非祭則死者無以聨疎生者無以合食苟于人情近也何必古禮從簡約宋宋朱子語録曰喪禮太繁今只存大概使人知其意義必不可盡行如始喪一段若欲盡行則必無哀戚哭泣之情哀苦荒迷之際何有心情一一如古禮之繁細委曲邪古有相禮者導孝子為之况依今世俗之禮亦未為失但使哀戚之情得盡耳有虞氏瓦棺而葬夏后氏堲周必無周人之繁文也古人壙中置物甚多禮文之意大備則防患之意反不足只當防慮久逺毋使土親膚而已其他禮文皆可略也又如古者棺不釘不用漆粘而今灰漆如此堅密猶有蟻子能入何况不用釘漆乎孔子從先進已厭周之文矣聖賢者作不必盡守古禮必裁酌從今之宜而為之也問喪禮制度節目朱子曰恐儀禮也難行如朝夕奠與𦵏時事尚可未殯以前安得一一如此仔細含飯一節教人從那裡轉那裡安頓一一各有定所須是有相者方得孔子曰行夏之時乗殷之輅已厭周文之煩矣聖人復起亦但隨今風俗立一限制須從寛簡今若考得仔細一一如古固好如考不得亦只隨俗不礙理者行之又曰今人吉服皆已變古獨喪服必欲從古恐不相稱禮時為大衣冠本以便身古人亦未必一一有義况隨時増减名物愈繁須是酌古之制去其重複使之簡易然後可行又曰古禮難行為古人有做未到處古者以皮束棺豈能固設熬黍稷于棺傍以惑蚍蜉可見少智今棺用漆要三日便殯亦難居喪讀禮宋宋陳祥道曰非喪而讀喪禮則非人子之情居喪而不讀喪禮不失之過則失之不及未𦵏而讀祭禮則非孝子之情既葬而不讀祭禮不失之黷則失之怠未除而讀樂章則哀不足喪復常而不讀樂章則樂必崩閔子子夏援琴而哀樂異孔子皆以為君子則喪復常讀樂章先王之中制也欽定續通典卷八十四
