body:
  text: 樂清樂晉魏有相和大曲清商三調曰平曰清曰瑟見宋書樂志沈約云𫝊自漢世今不聞矣瑟又訛為側世俗之樂猶得其緒餘焉始有正宫中吕宫南吕宫黄鍾宫各有羽商變宫為十六調唐太宗始增大吕髙宫髙宗增中吕道調夷則仙吕共二十八調以商名宫即清商調也夾鍾名中吕宫林鍾名南吕宫無射名黄鍾宫惟正宫不然葢統於黄鍾故也然宫洪羽殺商角頗分正宫古黄鍾也中吕調夾鍾羽也正宫中吕相為出入但正宫聲洪中吕則殺商調與仙吕亦相出入但仙吕聲髙商調低緩相應謂之犯度曲謂之節歸宿謂之煞五行之聲所司為正犯黄鍾宫為無射應彼為宫也所欹為旁犯越調黄鍾應無射為商也所叶為偏犯中吕宫應彼為羽也所下為側犯越角南宫應黄鍾為羽也餘倣此八犯歌曰宫商角羽宫商羽三出逆八七歸祖商宫角角羽商宫四出逆八八歸宗羽角宫商復再動三四五六逆八用又四犯歌曰宫角羽商商羽角宫羽角宫商其運調也以羽角宫商為平上去入七羽調首中吕次正平髙平終黄鍾大吕羽七角調首越角次大食角終於林鍾南吕變宫七宫調首正宫次髙宫中吕宫終於夷則無射之宫七商調首越調次大食調髙大食調終於夷則無射之商凡聲將轉字將闋則用拍板節之緩急不合聲律謂之失板其尾聲歸宿本調惟雙調歇拍煞鴛鴦煞不復歸宿所謂往而不反也有折掣反丁等聲折者上生四位掣者下隔一宫反者宫閏相頂丁者上下相同文竒煞訣曰土五金水八木六火煞慿輪丁兩厮頂折掣四相生惟以夾鍾清聲為律本不論正聲則與雅樂相亂矣今以頭管考之夾鍾清收四聲為𦂳五居九孔之首為宫次六字為羽次凡字為商次工字為閏閏為角其正角聲變聲徵聲皆不收黄鍾居子㽔賔為變而居午變亦為宫與雅樂七音全不同矣正聲三調黄鍾為調以統四聲則其聲優遊平中今乃髙至𦂳五夾清低至上一姑洗卑則過節髙則流蕩甚至佚出均外此所以為靡靡之樂也春華用夾鍾唐元宗擊羯鼓自製曲曰春光好四顧栁杏皆已微折乃夾鍾宫也時當正月以二月律催花秋月用南吕開元中西凉節度使楊敬述進黄鍾商婆羅門曲凡十二遍而終天寳七載七月上夢遊月宫改用六么葢般渉調黄鍾羽也更號其曲曰霓裳羽衣云時貴妃有寵葢太簇以律娶妻為南吕今棄商用羽子婦同宫召亂兆於樂矣召川示用林鍾天寳中上在東都夢凌波池中龍女製凌波曲鼓之其一林鍾宫時號水調宫其一南吕商時號水調義取林鍾水土之母而生南吕水音也世𫝊歌此調能致鬼神云樂清平用黄鍾天寳中賞水芍藥宣翰林李白令進清平調三章皆七言絶句也蓋古樂取聲律髙下合為三曰清調平調側調明皇不樂側調止用黄鍾宫黄鍾商歌之蓋義取君臣也祝壽考用姑洗武后烏歌萬嵗樂用太簇商又西河長命女用林鍾羽時號平調今俗呼髙平調二曲皆姑洗也取夀星龍角哀隕絶用中吕明皇入蜀雨中閒鈴聲作雨霖鈴曲用雙調何滿子乃滄州歌者姓名臨刑進此曲贖罪竟不免死亦用雙調乃夾鍾之中吕商也律窮於中吕又屬商義取秋殺紀臣功用無射北齊蘭陵王破周師有入陳曲今越調蘭陵王三叚二十四拍乃其遺聲也唐明皇自潞州還京師夜半舉兵平韋氏之亂製夜半樂還京樂二曲皆用無射商黄鍾越調動物類用太簇楊栁枝曲七言四句毎句下各增三字一句為和聲用黄鍾商歌之蓋正月春律也天寳中南海進荔枝作荔枝香曲用大石歇指二調太簇生林鍾之商為南吕義取水木也羯鼓音屬太簇一均明皇與宋璟皆善之永泰中西川節度杜鴻漸登閣奏此山下羣羊皆舞他如鳯將雛則宫商相應以象父子鳯求凰則宫徵相合以象夫婦烏夜啼主角調以烏聲角也别鶴怨主羽調以鶴聲羽也春草晨鷄亦無不可被管絃者虞美人曲有二中吕宫則夾鍾宫也其一屬中吕調乃黄鍾為羽也有草應拍而舞曰虞美人草沈括以為吴音即此宋太平興國中伶官蔚茂多侍大宴聞雞唱崔瀚問之曰此可被管絃乎茂多即法其聲製曲曰雞呌子夫世俗之樂其去古也逺矣然猶感物通靈若此然則雅樂當何如也坐立部伎坐立部伎唐末已亡惟景雲樂舞僅存山堂考索曰元宗時樂分為二部堂下立奏謂之立部伎堂上坐奏謂之坐部伎太常閱坐部不可教者隸立部又不可教者乃習雅樂君臣共為荒樂當時流俗多𫝊其事以為盛其後巨盜起陷兩京自此天下用兵不息獨其餘聲遺曲人間聞者為之悲凉感動蓋其事適足以為戒而不可考法也宋中興四朝樂志叙曰國朝初得江南樂已汰其坐部不用遼樂志曰雅樂有七音大樂亦有七聲謂之七旦取四旦二十八調為大樂其法不用黍律以琵琶絃叶之皆從濁至清迭更其聲下益濁上益清七七四十九調餘二十一調失其𫝊葢出九部樂之龜兹部云遼國大樂可考者惟景雲四部樂舞而已其坐立部樂並亡四方樂唐東夷樂有髙麗百濟北狄樂有鮮卑吐谷渾部落稽南蠻樂有扶南天竺南詔驃國西戎樂有高昌龜兹疏勒康國安國凡十四國而八國之伎列於十部樂天寳以後工人亡散音伎多闕徳宗貞元中南詔異牟尋遣使詣劍南節度使韋臯欲獻夷中歌曲臯乃作南詔奉聖樂以進徳宗閱于麟徳殿以授太常工人後又有驃國王遣其弟獻國樂至成都韋臯復譜次其聲又圖其舞容樂器以獻宋仁宗元豐六年有米脂砦降戎樂工四十二人奏樂於崇政殿大晟樂書曰前此宫架之外列熊羆案所奏皆四夷樂也豈容淆雜大樂乃奏罷之然古鞮鞻氏掌四夷樂靺師旄人各有所掌以承祭祀以供宴享先王之所不廢也遼太宗㑹同三年端午日百僚及諸國使稱賀宴飲命回鶻燉煌二使作本國舞散樂唐時有天竺伎能自斷手足刺膓胃髙宗惡其驚俗詔不令入中國睿宗時婆羅門國獻人倒行以足舞仰植銛刀俯身就鋒歴臉下復植于背觱篥者立腹上終曲而不傷又伏伸其手二人躡之周旋百轉開元初猶與四夷樂同列文宗時有妓女石火胡挈養女五人纔八九嵗于百尺竿上張弓弦五條令五女各居一條之上衣五色衣執㦸持戈舞破陣樂曲火胡立于十重朱畫牀子上令諸女迭蹈以至半空手中皆執五綵小幟牀子大者始一尺餘俄而手足齊舉謂之踏渾脱歌呼抑揚若履平地文宗惡其太險傷人不復作宋百戱有踏毬蹴毬踏蹻藏挾雜旋弄鎗鋺瓶齪劍踏索尋橦筋斗拗腰透劍門飛彈丸之類皆隸左右軍遼主生辰宴及曲宴宋國使樂皆用雜劇角觝冊后儀呈百戲角觝戲馬以為樂元會則以散樂角觝終之金有散樂元日聖誕稱賀曲宴外國使則教坊奏之其樂器名曲不𫝊章宗明昌二年禁伶人不得以歴代帝王為戲及稱萬嵗元駕前承應有雜戲飛竿走索踼弄藏􅞢等伎明孝宗𢎞治初親耕耤田教坊司以雜劇承應武宗正徳三年令移文各省選樂工有精通藝業者送京供應自是所隸益復猥雜筋斗百戲之類日盛于禁掖既而河間等府奉詔送樂户至京給與口糧工部仍相地為之居室時樂工既得幸時時言外郡樂工不宜獨逸請移文天下取精于諸伎者送教坊於是有司遣官押送乗𫝊續食者又數百人前代雜樂燕樂自周以來用之唐貞觀增隋九部為十部以張文收所製歌名燕樂而被之管絃厥後至坐伎部琵琶曲盛流於時宋初置教坊得江南樂已汰其坐部不用自後因舊曲創新聲轉加流麗政和間詔以大晟雅樂施於燕饗御殿按試補徵角二調播之教坊頒之天下然當時樂府奏言樂之諸宫調多不正皆俚俗所𫝊及命劉昺輯燕樂新書亦惟以八十四調為宗非復雅音紹興中始省教坊樂凡燕禮屏坐伎乾道時間用雜攢以充教坊之號取具臨時不用女樂頒示子孫守之以為宋法蔡元定嘗為燕樂一書證俗失以存古義今采其畧附於下黄鍾用合字大吕太簇用四字夾鍾姑洗用一字夷則南吕用工字無射應鍾用凡字各以上下分為清濁其中吕㽔賔林鍾不可以上下分中吕用上字㽔賔用勾字林鍾用尺字其黄鍾清用六字大吕太簇夾鍾清各用五字而以上下𦂳别之𦂳五者夾鍾清聲俗樂以為宫此其取律寸律數用字紀聲之畧也一宫二商三角四變為宫五徵六羽七閏為角五聲之號與雅樂同惟變徵以於十二律中隂陽易位故謂之變變宫以七聲所不及取閏餘之義故謂之閏四變居宫聲之對故為宫俗樂以閏為正聲以閏加變故閏為角而實非正角此其七聲髙下之畧也聲由陽來陽生於子終於午燕樂以夾鍾收四聲曰宫曰商曰羽曰閏閏為角其正角聲變聲徵聲皆不收而獨用夾鍾為律本此其夾鍾收四聲之畧也宮聲七調曰正宫曰髙宫曰中吕宫曰道宫曰南吕宫曰僊吕宫曰黄鍾宫皆生於黄鍾商聲七調曰大食調曰髙大食調曰雙調曰小食調曰歇指調曰商調曰越調皆生於太簇羽聲七調曰般渉調曰髙般渉調曰中吕調曰正平調曰南吕調曰僊吕調曰黄鍾調皆生於南吕角聲七調曰大食角曰髙大食角曰雙角曰小食角曰歇指角曰商角曰越角皆生於應鍾此其四聲二十八調之畧也竊考元定言燕樂大要其律本出夾鍾以十二律兼四清為十六聲而夾鐘為最清此所謂靡靡之聲也觀其律本則其樂可知變宫變徵既非正聲而以變徵為宫以變宫為角反紊亂正聲若此夾鍾宫謂之中吕宫林鍾宫謂之南吕宫者燕樂聲髙實以夾鍾為黄鍾也所收二十八調本萬寶常所謂非治世之音俗又於七角調各加一聲流蕩忘反而祖調亦不復存矣聲之感人如風偃草宜風俗之日衰也宋初循唐舊制教坊本隸宣徽院有使副使判官都色長色長髙班大小都知天聖間以内侍二人為鈐轄嘉祐中詔樂工每色額止二人教頭止三人有闕即填異時或𫝊詔增置許有司論奏使副嵗閱雜劇把色人分三等遇三殿應奉人闕即以次補諸部應奉及二十年年五十已上許補廟令或鎮將官制行以隸太常寺同天節寶慈慶壽宫生辰皇子公主生凡國之慶事皆進歌樂詞熙寧九年教坊副使花日新言樂聲髙歌者難繼方響部器不中度絲竹從之宜去噍殺之急歸嘽緩之易請下一律改造方響以為樂凖絲竹悉從其聲則音律諧協以𨗳中和之氣詔從之政和四年正月禮部奏教坊春或用商聲孟或用季律甚失四時之序乞以大晟府十二月所定聲律令教坊閱習仍令秘書省撰詞髙宗建炎初省教坊紹興十四年復置凡樂工四百六十人以内侍充鈐轄紹興末復省孝宗隆興二年天申節將用樂上壽上曰一嵗之間只兩宫誕日外餘無所用不知作何名色大臣皆言臨時㸃集不必置教坊上曰善乾道後北使每嵗兩至亦用樂但呼市人使之不置教坊止令修内司先兩旬教習舊例用樂人三百人百戲軍百人百禽鳴二人小兒隊七十一人女童隊百三十七人築毬軍三十二人起立門行人三十二人旗鼓四十人以上並臨安府差相撲等子二十一人御前中佐司差命罷小兒及女童隊餘用之又有雲韶部者黄門樂也開寶中平嶺表擇廣州内臣之聰警者得八十人令於教坊習樂藝賜名簫韶部雍熙初改曰雲韶每上元觀燈上已端午觀水嬉皆命作樂於宫中遇南至元正清明春秋分社之節親王内中宴射則亦用之奏大曲十三一曰中吕宫萬年歡二曰黄鍾宫中和樂三曰南吕宫普天獻壽此曲亦太宗所製四曰正宫梁州五曰林鍾商汎清波六曰雙調大定樂七曰小石調喜新春八曰越調胡渭州九曰大食調清平樂十曰般渉調長壽仙十一曰髙平調罷金鉦十二曰中吕調緑腰十三曰仙吕調綵雲歸樂用琵琶筝笙觱栗笛方響仗鼓羯鼔大鼓拍板雜劇用傀儡後不復補又有鈞容直亦軍樂也太平興國三年詔籍軍中之善樂者命曰引龍直毎巡省遊幸則騎𨗳車駕而奏樂若御樓觀燈賜酺則載第一山車端拱二年又選捧日天武拱聖軍曉暢音律者增多其數以中使監視藩臣以樂工上貢者亦隸之淳化四年改名鈞容直取鈞天之義初用樂工同雲韶部大中祥符五年因鼓工温用之請增龜兹部如教坊其奉天書及四宫觀皆用之有指揮使一人都知二人副都知二人押班三人應奉文字一人監領内侍二人嘉祐元年係籍三百八十三人六年增置四百三十四人詔以為額闕即補之七年詔隸班及二十四年年五十以上者聴補軍職隸軍頭司其樂舊奏十六調凡三十六大曲鼓笛二十一曲并他曲甚衆嘉祐二年監領内侍言鈞容直與教坊樂並奏聲不諧詔罷鈞容舊十六調取教坊十七調肄習之雖間有損益然其大曲曲破并急慢諸曲與教坊頗同矣紹興中鈞容直舊管四百人楊存中請復收補權以舊管之半為額尋聞其召募騷擾降詔止之及其以應奉有勞進呈推賞又申諭止於支賜一次庶杜其日後希望紹興三十年復詔鈞容班可蠲省令殿司比擬一等班直收頓内老弱癃疾者放停教坊所嘗援祖宗舊典㸃選入教雖暫從其請紹興三十一年有詔教坊即日蠲罷各令自便又有東西班樂亦太平興國中選東西班習樂者樂器獨用銀字觱栗小笛小笙每騎從車駕而奏樂或巡方則夜奏於行宫殿庭凡諸軍皆有善樂者毎車駕親祀回則衣緋緑衣自青城至朱雀門列於御道之左右奏樂迎奉其聲相屬聞十數里或軍宴設亦奏之又清衛軍習樂者令鈞容直教之内侍主其事園苑賜㑹及舘待契丹使人又有親從親事樂及開封府衙前樂園苑又分用諸軍樂諸州皆有衙前樂遼於雅樂大樂散樂之外復有國樂元夕皇帝燕飲用國樂七月十三日皇帝出行宫三十里卓帳十四日設宴應從諸軍隨各部落動樂十五日中元大宴用漢樂春飛放杏堝皇帝射獲頭鵝薦廟宴飲樂工數十人執小樂器侑酒金有本國舊音世宗大定九年十一月皇太子生日上宴于東宫命奏新聲謂大臣曰朕製此曲名君臣樂今天下無事與卿等共之不亦樂乎辭律不𫝊十三年四月上御睿思殿命歌者歌女直詞顧謂皇太子曰朕思先朝所行之事未嘗暫忘故時聽此詞亦欲令汝輩知女直醇質之風至於文字語言或不通曉是忘本也二十五年四月幸上京宴宗室于皇武殿飲酒樂于時宗室婦女起舞進酒畢羣臣故老起舞上曰吾來故鄉數月矣今迴期已近未嘗有一人歌本曲者汝曹來前吾為汝歌乃命宗室子序坐殿下者皆上殿靣聴上歌曲道祖宗創業艱難及所以繼述之意上既自歌至慨想祖宗音容如覩之語悲感不復能成聲歌畢泣下數行右丞相元忠暨羣臣宗戚捧觴上壽皆稱萬嵗于是諸老人更歌本曲如私家相會暢然歡洽上復續調歌曲留坐一更極歡而罷元太祖初年以河西髙智耀言徵用西夏舊樂鼓吹樂本軍樂也説者謂列于殿廷者為鼓吹從行者為騎吹魏晉而下莫不沿尚始有鼓吹之名宋因之有導引曲六州曲十二時曲國初以來奏大樂則鼓吹備而不作同名為樂而用實異徽宗政和七年議禮局言古者鐃歌鼓吹曲各異其名以紀功烈今所設鼓吹惟備警衛而已未有鐃歌之曲非所以彰休徳揚偉績也乞詔儒臣討論撰述因事命名審協聲律播之鼓吹俾工師習之凡王師大獻則令鼓吹具奏以聳羣聴從之紹定姜䕫言鼓吹曲以歌功徳我朝太祖太宗平僭偽一區宇真宗一戎衣而却契丹仁宗海􅉼春育徳如堯舜髙宗再造大功上儷祖宗願詔文學之臣追述功業之盛作為歌詩使知樂者協以音律領之太常以播于天下䕫乃自作聖宋鐃歌曲宋受命曰上帝命平上黨曰河之表定維揚曰淮海清取湖南曰沅之上得荆州曰皇威揚取蜀曰蜀土邃取廣南曰時雨霈下江南曰望鍾山吴越獻國曰大哉仁漳泉獻土曰謳歌歸克河東曰伐功繼征澶淵曰帝臨墉美仁治曰維四葉歌中興曰炎精復凡十有四篇上於尚書省遼之鼓吹樂有前後二部又有横吹亦軍樂與鼓吹分部而同焉皆屬鼓吹令金初用遼故物其後雜用宋儀海陵遷燕及大定十一年鹵簿皆分鼓吹為四節其他行幸惟用兩部而已自金以後無可考欽定續通典卷九十
