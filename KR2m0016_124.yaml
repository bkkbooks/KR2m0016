  text: 欽定四庫全書欽定續通典卷一百二十四
  hash: sha256:f75be8f6d03189c0d7967a02ffe0235feac734abf7361b775d16832469dc1760
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0016_WYG_124-1a, image: WYG0641/WYG0641-0424a.png}
body:
  text: 州郡五代漢晉髙祖天福六年以劉知逺為北京留守河東節度使自出帝立與契丹絶盟及契丹入汴知逺稱晉天福十二年以號令四方逺近爭應之契丹留其臣蕭翰守大梁遂北去時潞州及晉陜皆來附知逺遣師從晉陜而東蕭翰遁去河南遂定契丹適有內變晉之舊境悉歸於漢有州一百有六按職方考云一百六州而譜內乃一百十州考後蜀世家契丹滅晉漢髙祖起於太原中國多故雄武軍節度使何建以秦成階三州附於蜀昶因遣孫漢韶攻下鳳州於是悉有衍故地是秦成階鳯四州漢初即入蜀而職方考誤以為漢有也今據刪正謹附識汴東京洛西京雍隱帝乾祐元年改為永興軍節度其京兆府仍舊二年改商州乾元縣為乾祐縣來屬復把縣為雍邱縣按乾祐元年二年據五代會要及寰宇記兖沂密防禦按此據輿地考青天福十二年復為平盧軍節度按此據五代會要淄齊棣登萊徐宿鄆曹天福十二年廢威信軍降為刺史按降為刺史據五代會要濮宋亳單潁防禦按此據輿地考陳天福十二年廢鎮安軍降為刺史按降為刺史據五代會要蔡防禦按此據輿地考許汝鄭滑襄天福十二年復為山南東道節度按此據五代會要均房金天福十二年降為防禦按此據五代會要鄧乾祐元年以避廟諱改臨湍縣為臨瀨縣按乾祐元年據五代會要隨復漢東縣為唐城縣郢唐復泌州為唐州按此據寰宇記復安天福十二年復置安逺軍節度按天福十二年據五代會要申蒲孟懷晉絳陜虢華商同耀解乾祐元年九月置割河中之聞喜安邑二縣為屬而治解邠寧慶衍威鄜坊丹延夏銀綏宥靈鹽岐隴涇原渭武乾魏乾祐元年復為大名府以廣晉縣為大名縣仍曰鄴都博改齊城縣為髙唐縣按此據方輿紀要貝衛澶乾祐元年移就德勝寨按此據寰宇記相邢洺磁鎮天福十二年復為成德軍節度真定府以趙州之元氏欒城二縣來屬復永昌縣為行唐縣按屬縣改縣據五代會要及寰宇記冀深趙易祁定復博陵縣為唐縣按此據寰宇記滄景德欣代嵐石憲麟府天祐十二年升永安軍節度乾祐三年降為團練按此據五代會要及輿地考并天福十二年髙祖即位於太原宫以太原為北京按此據本紀及册府元龜汾慈隰澤潞沁遼附外屬州瀛莫幽涿檀薊順營平蔚朔雲應新媯儒武寰以上入契丹揚楚泗滁和光黃舒蘄廬夀海泰濠潤常宣歙鄂升池饒信江洪撫袁吉南唐保大八年割廬陵水東十一鄉置吉水縣虔建復以鏞州為將樂縣昭武縣為邵武縣汀劍漢乾祐元年以建州永順場置順昌縣來𨽻又取福州之尤溪縣來𨽻漳留從效泉留從效乾祐二年升為清源軍以上入南唐福杭越蘇湖溫台明處衢婺睦秀以上入吳越荆歸峽以上入南平秦成階鳳益漢彭蜀綿眉嘉劍梓遂果閬普陵資榮簡邛黎雅維茂文龍黔施夔忠萬興利開通涪渝瀘合昌巴蓬集壁渠戎梁洋按秦成階鳳四州據後蜀世家以上入蜀潭漢乾祐三年馬希範置龍喜縣衡澧朗嶽道永邵全辰以上入楚融郴連昭宜桂賀梧蒙嚴富柳象容雍端康封恩春新髙竇雷化韶藤白亷欽廣橫賔潯循鬱林英雄瓊崖儋萬安羅潘勤瀧辨以上入南漢欽定續通典卷一百二十四
