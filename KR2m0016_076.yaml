body:
  text: 禮凶臣民為太皇太后皇太后服議五代宋明臣等謹案太皇太后皇太后崩杜典見於大喪初崩及山陵制其於臣民之服未甚詳悉茲特另著於篇後唐莊宗同光三年貞簡皇太后遺令中書門下翰林學士在朝文武百官內諸司使及諸道節度觀察防禦使刺史監軍及前資官并寮佐官吏士庶僧道百姓並準本朝故事降服施行勿使過制其月太常禮院奏按故事中書門下翰林學士在朝文武官內諸司使供奉官以下從成服三日每日赴長夀宫朝臨自後不臨其服以日易月十三日除每至月朔月望小祥大祥釋服日未除服者縗服臨已除服者則素服不臨並赴長夀宫先拜靈訖移班近東進名奉慰又奏準故事文武前資官及六品以下未升朝官並士庶等各於本家素服一臨禁衛諸軍使已下各於本軍廳事素服一臨僧尼道士各於本寺觀一臨外命婦各於本家素服朝臨三日諸道節度觀察防禦團練刺史及僚佐等聞哀後當日成服三日改黲十三日除從之宋太祖建隆二年六月二日皇太后杜氏崩於滋德殿三日百官入臨明日大斂欑於滋德宫百官成服中書門下文武百僚諸軍副兵馬使以上並服布斜巾四腳直領襴衫外命婦帕頭帔裙衫神宗元豐二年太皇太后崩慈聖光獻曹皇后英宗即位册為皇太后神宗即位尊為太皇太后是日文武百官入宫宰臣王圭升西階宣遺誥已內外舉哭盡哀而出哲宗元祐八年太皇太后崩宣仁聖烈髙皇后神宗即位尊為皇太后哲宗即位尊為太皇太后遺誥皇帝成服三日聽政羣臣十三日諸州長吏以下三日而除釋服之後勿禁作樂髙宗紹興元年皇太后崩昭慈聖獻孟皇后元祐七年册為皇后元符末號元祐皇后髙宗立尊為元祐太后尋以所居宫稱隆祐太后太常寺言遇皇帝視事日宰相奏事去杖小祥日奏事去冠餘官奏事皇帝聽政未釋服前其引班若行弔臨之禮即服喪絰如遇內殿引班奏事及從駕常服黑帶士庶以下服軍人百姓白衫紙帽婦人素縵不花叉三日止士庶婚嫁服除外不禁文武臣寮之家至山陵祔廟畢並許嫁娶不用花綵仍禁樂定制皇太后崩服齊衰服中書門下省樞密使副尚書翰林學士節度使金吾衛上將軍文武官二品以上布頭冠布斜巾四腳大袖襴衫裙袴腰絰桐木杖絹襯衫文武五品以上並職事官監察御史以上內客省宣政昭宣使知閣門事及入內都知押班布頭冠幞頭大袖襴衫裙袴腰絰自餘文武百官三省樞密院書令史以上及御史臺閣門太常寺引班祇應人布襴衫腰絰百日皇帝於几筵前行燒香禮諸路庶民禁樂并屠宰一日宰臣率百官入臨奉慰明英宗正統七年誠孝太皇太后崩誠孝張皇后洪武中册為燕世子妃仁宗立册為皇后宣宗即位上尊號曰皇太后英宗即位加上太皇太后禮部議奏事宜在京文武官聞喪素服烏紗帽黑角帶自明日始至第三日每旦詣思善門外哭退於本衙門齋宿不飲酒食肉第四日具斬衰服至思善門外朝夕哭臨三日各十五舉哀止凡入朝及在外衙門視事用布裹紗帽黑角帶素服腰絰麻鞋退即服衰服通前二十七日而除一品至四品命婦麻布大袖圓領長衫蓋頭清晨由西華門入至思善門外哭臨三日悉去金銀首飾仍素服通前二十七日而除軍民素服婦人素服不妝飾俱以聞喪日為始二十七日而除在外文武官員人等遺誥到日素服烏紗帽黑角帶行四拜禮跪聽宣讀訖舉哀再行四拜禮畢各置斬衰服於衙門內望闕設香案朝夕哭臨三日各十五舉聲止其命婦聞喪素服舉哀三日各十五舉聲以上素服俱自聞喪之日通計二十七日而除軍民男女止素服十三日臣民為天子服議唐宋明臣等謹案古天子與諸侯實各治其國禮惟諸侯為天子服大夫之朝於天子者有服故杜典載諸侯及公卿大夫諸侯之大夫為天子服議言諸侯之大夫則侯國士庶不與矣古之諸侯略如後世之封疆大吏古諸侯之臣略如後世之郡邑守長乃古者自諸侯以下有斬衰繐衰之分而漢以後之外吏與庶民率皆三日而釋服儀禮庶人為國君齊衰三月注云天子畿內之民服天子亦如之則畿外之民不服矣漢以後庶民之服遍於天下其時分封諸侯王雖參錯郡縣之問而天子之聲靈逮於遐荒已非各君其國者比矣蓋古今異勢服亦隨之而遞變吏則由重而減輕民則推近以及逺此一統之所以異於封建也類而推之古諸侯之夫人為天子齊衰不杖期諸侯之子嫌不敢服士之子賤不制服大夫之子則與士俱服斬衰多與後世之制不同自唐以下特立臣民為天子服一條而去其諸侯及公卿大夫諸侯之大夫為天子服二目以見古今之異禮也唐代宗崩廷臣議羣臣喪服常衮以為禮臣為君斬衰三年漢文權制猶三十六日玄宗以來始服二十七日古者卿大夫從君而服羣臣當從皇帝二十七日而除其天下吏人三日釋服以遵遺詔崔祐甫以為遺詔無朝臣庶人之别但言天下人吏敕到後出臨三日皆釋服則朝野中外何非天下凡百執事誰非吏職皆應三日釋服相與力爭聲色陵厲衮不能堪乃奏祐甫率情變禮貶之案舊唐書崔祐甫傳衮排祐甫原出私心而其論喪禮則是蓋服制自三十六日降為二十七日又欲易之以三日祐甫之議非矣宋制有三等中書門下樞密使副尚書翰林學士節度使金吾上將軍文武二品以上布梁冠直領大袖衫布裙袴腰絰竹杖或布幞頭襴衫布斜巾絹襯服文武五品以上並職事官監察御史以上內客省宣政昭宣知閣門事殿前都知押班布梁冠直領大袖衫裙袴腰絰或幞頭襴衫腰絰入局治事並不易服宰執奏事去杖小祥去冠餘官奏事如之大祥素紗軟腳折上巾黲公服白鞓錫帶禫除畢去黲服常服仍黑帶皂鞍韉祔廟畢始純吉服宗室出則常服居則衰麻以終制軍人百姓白衫紙帽婦人素縵不花叉三日止士庶婚嫁服除外不禁文武臣僚之家至山陵祔廟畢並許婚嫁不用花綵仍禁樂寧宗居光宗之憂復令百官以日易月禫除畢服紫衫皂帶以治事從禮部侍郎陳宗召請也諸路監司州軍縣鎮長吏以下服布四腳直領布襴衫麻腰絰朝晡臨三日除內外命婦當入臨者布裙衫帔首絰絹襯衫帕首士庶於本家素服三日而除案朱子議曰至尊之服始三日用古冠服上衣下裳以後用今制四腳幞頭等自京官以上是一等服京官以下是一等服士人又一等服庶人又一等服如此等級分明乃善明洪武三十一年太祖崩禮部議奏事宜在京五府六部等衙門官員聞喪次日各易素服烏紗帽黑角帶赴內府聽宣遺詔畢於本衙門齋宿素服朝晡詣几筵哭仍各置孝服至第四日成服朝晡哭臨至葬畢而止仍自成服日為始服孝服二十七日而除其命婦亦於第四日各具孝服由西華門入哭臨不許戴金銀首飾在外大小文武官員人等詔書到日素服烏紗帽黑角帶跪聽宣詔訖舉哀各置孝服至第四日成服為始每旦設香案哭臨三日而除永樂二十二年成祖崩禮部議奏在京文武官初聞喪素服烏紗帽黑角帶明日晨詣思善門外哭退各置斬衰服於本衙門歇宿不飲酒食肉第四日成服具衰服詣思善門外哭臨三日又朝臨十日按仁宗及宣宗實録俱朝臨七日各十五舉聲成服日為始服衰服二十七日聽選辦事等官服衰服監生吏典僧道人等素服以成服為始皆赴順天府朝闕設香案朝夕哭臨三日又朝臨十日按仁宗及宣宗實録俱朝臨七日各十五舉聲仍各素服二十七日而除文武官命婦按仁宗及宣宗實録俱云文武官員一品至四品命婦聞喪第四日各服麻布大袖圓領長衫麻布蓋頭清晨由西華門入哭臨三日去金銀首飾素服二十七日軍民素服婦人素服不妝飾俱二十七日在外俱以聞喪日為始令到文武官員素服烏紗帽黑角帶行四拜禮跪聽宣詔訖舉哀再行四拜禮畢各置斬衰服於本衙門宿歇不飲酒食肉第四日成服每旦設香案朝夕哭臨三日又朝臨十日按仁宗及宣宗實録俱朝臨七日各十五舉哀餘與在京文武官儀注同文武官命婦聞喪素服舉哀三日各十五舉聲去金銀首飾素服二十七日而除軍民男女皆素服一十三日皇太后皇后以下為天子服議宋明宋太宗之喪太常禮院上言皇太后皇后內外命婦布裙衫帔帕頭首絰絹襯服六宫內人無帔皇帝皇后諸王公主諸縣主諸王夫人六宫內人並左被髮皇太后全被髮孝宗崩太皇太后有旨皇帝以疾聽在內成服太皇太后代皇帝行禮明太祖崩將葬之夕設辭奠帝后太子以下皆衰服以序致祭洪熙元年仁宗崩皇太子還自南京至良鄉宫中始發喪自皇后以下皆被髮哭嘉靖四十五年肅皇帝崩禮部議發喪皇貴妃等妃殿下妃皇孫涇簡王妃等妃景恭王妃寧安公主舉哀各歸喪次成服日皇貴妃殿下妃皇孫及各王妃公主皆成服各設祭一壇六尚及宫人各隨祭禮畢各歸喪次宗室童子為天子服宋宋制太上皇帝喪未冠者依皇孫服制案白虎通童子諸侯不朝而來奔喪者何明臣子於其君父非有老少也亦因喪質無盤旋之禮但盡悲哀而已皇后為親屬舉哀議五代宋晉髙祖天福七年三月皇后為妹契丹樞密使趙延夀妻燕國長公主卒於幽州舉哀於外次宋孝宗乾道三年孝明皇后姊太原郡君王氏卒中書門下據太常禮院狀準禮例皇后合出就故新德軍節度使王饒第發哀成服文武百僚詣其第進名奉慰從之皇后親為皇后服議宋宋寧宗慶元六年恭淑皇后上仙太常寺言韓俟係皇后兄合服大功九月俟之子照典故合解官持服三年從之臣民為皇后服議宋明宋真宗章穆皇后郭氏景德四年四月十五日崩羣臣三日釋服諸道州府官吏訃到日舉哀成服三日而除明太祖洪武十五年髙皇后崩禮臣議定喪禮聞喪次日文武百官素服行奉慰禮在京文武百官於聞喪之四日清晨素服詣右順門外具喪服入臨臨畢素服行奉慰禮第二日第三日禮同文官一品至五品武官一品至三品命婦於聞喪之四日清晨素服至乾清宫具喪服入臨行禮不許用金珠銀翠首飾及施脂粉喪服用麻布蓋頭麻布衫麻布長裙麻布鞋在京文武百官及聽除等官人給布一匹自製喪服皆服斬衰自成服為始二十七日而除仍素服至百日始服淺淡顔色衣服在外文武官喪服服制與在京官同聞訃日於公廳成服三日而除命婦喪服與京官命婦同亦三日而除軍民男女皆素服三日成祖永樂五年定文皇后喪禮文武百官自次日為始各就公署齋宿至二十七日止文武四品以上命婦成服日為始喪服詣思善門內哭臨三日而止聽選辦事等官各喪服監生吏典僧道耆老各素服自成服日為始赴應天府舉哀三日案杜典諸侯及公卿妻為皇后服後世文武百官命婦遵行此義杜典蕃國臣為皇后服後世在外文武官亦遵行此義而杜典言臣而不及民後世又加詳焉故備録之皇太子為皇后不終三年服議唐明唐德宗貞元初昭德皇后崩中外服除皇太子諸王將服三年詔太常議太子服博士暢當與張薦等曰子為母齊衰三年蓋通喪也太子為皇后服古無文晉元皇后崩亦疑太子服杜預議古天子三年喪既葬除服魏亦以既葬為節皇太子與國為體若不變除則東宫臣僕亦以衰麻出入殿省太子遂以卒哭除服貞觀十年六月文德皇后崩十一月而葬太子喪服之節國史不書至明年正月以晉王為并州都督既命官當已除矣今皇太子宜如魏晉制既葬而虞虞而卒哭卒哭而除心喪三年宰相劉滋等請三十日除入謁則服黑黲還宫衰麻右補闕穆質上疏曰三年之喪漢文帝以宗廟社稷之重自貶乃以日易月太子人臣也不得如人君之制母喪宜無厭降父在為母期古禮也國朝服之三年臣謂三年則太重惟行古為得禮德宗遣內常侍馬欽敘謂質曰太子有撫軍監國問安侍膳之事有司以三十日除既葬釋服以黑衰終是何疑邪質又奏曰太子於陛下子道也臣道也君臣以義則撫軍監國有權奪父子問安侍膳固無服衰之嫌古未有服衰而廢者舒王以下服三年將不得問安侍膳耶詔宰臣與有司更議太常卿鄭叔則草奏既葬卒哭十一月小祥十三月大祥十五月禫內謁則黑服從之及董晉代叔則為太常卿帝曰皇太子服期繇諫官初非朕意暢當等請循魏晉故事至論也案父在為母古禮原止期服至唐始增為三年穆宗請依古服期雖已違朝制然猶曰古禮可依也乃暢當輩堅守杜預之説欲卒哭而除已為非禮之極而宰相猶以為過重然則母喪竟可不服乎厥後德宗雖從太常之議終以暢當説為善誤矣明太祖洪武十六年八月孝慈皇后小祥皇太子服熟布練冠九􅙭去首絰負版辟領衰見上及百官則素服烏紗帽烏犀帶及成祖永樂六年七月仁孝皇后小祥皇太子服亦如之案明太祖太宗實録馬徐兩皇后初崩禮官所上儀注俱不載太子服制會典亦然至小祥則言去負版辟領衰則初喪衰服可知矣皇太子為所生母服議臣等謹案杜典載晉廢帝海西公太和中太子所生陳淑媛薨晉書禮志孝武帝太元十五年淑媛陳氏卒皇太子所出也海西公無太子當從晉志作太元中為是徐邈議當依公子為母練冠麻衣既葬除之殷仲堪以為當依庶子為後服所生母緦皇子服乃練冠耳夫徐邈所引公子為母條乃禮泛言諸侯之庶子非指為後者言也若主為後者立論當以殷仲堪之説為長且禮言庶子為後者為其母自必存亡同之豈可專謂父亡之後乎雖既葬而除與緦麻三月其服之輕重無甚異然一在五服之內一在五服之外其禮自有間矣況古諸侯之妾視大夫三月而葬則既葬而除者尚有三月之服後世皇家之葬或一月或二三月甚者或止數日則既葬而除者多不及三月之期矣而可乎徐邈之論雖詳終不若仲堪之核也皇太子為庶母服議明明太祖洪武七年九月孫貴妃薨十一月一日孝慈録成太祖既裁定喪禮太子當服齊衰杖期案開元禮政和禮書儀家禮俱為庶母緦麻三月即明令與集禮亦皆曰為庶母緦而孝慈録加為杖期會典同太子曰在禮惟士為庶母服緦大夫以上為庶母則無服又公子為其母練冠麻衣既葬除之蓋諸侯絶期以下無服諸侯之庶子雖為其母亦厭於適母不得申其私故權為此制也然則諸侯之世子不為庶母服也明矣今陛下貴為天子臣忝居適長幸得備位儲副而為庶母服期非所以敬宗廟明正體重繼世也上必欲太子服之桂彥良持衰服之太子不得已乃服以拜謝明史貴妃無子太祖命吳王橚主喪事服慈母服斬衰三年皇太子及諸王皆齊衰杖期或曰太子即孫妃所出也故特為之加服云閻若璩曰成穆貴妃薨上命吳王為之子則似無所出者且果生懿文豈有命之杖期而如此執禮不少為感動者乎古按懿文太子所執雖亦古制然新禮既行即不宜泥以違父命必如桂彥良所諫當緣君父之情不可執小禮以虧大孝斯得之也諸王出後為本生父母議明明武宗正德八年十一月丁酉初淮寧王世子見濂卒無子康王老請以次子清江王見澱攝府事逮康王薨見澱尋卒其長子祐棨襲為淮王已而見濂得追封淮安王其妃王氏為王妃時制册稱安王為祐棨伯父故其常祭祝號安王稱王伯清江王稱王考且安王妃王氏仍居世子府宫而本生母趙氏入居永夀官輔導官謂其非宜言於王王奏其生在安王卒後未嘗為嗣欲加重其私親事下禮部移江西守臣令輔導官勘覆乃謂安王伯父之稱本諸制詞惟稱清江王為王考於義未協案禮諸侯之子為天子後者禰於所後之天子而不得禰於所生之諸侯别子之子為諸侯後者禰於所後之諸侯而不得禰於所生之别子其不為人後者子為天子而父非天子則必追尊之詔已播於天下乃可禰其父為天子子為諸侯而父非諸侯則必追封之請已允於天子乃敢禰其父為諸侯今之親王即古之諸侯也今之郡王即古之别子也親王所主祭之皇考則諸侯之禰廟也淮王既不後於其伯則非為人後者欲乞以清江王追封入廟與安王同為三世之穆似兩得之但今未得請王乃以親王之爵主祭郡王之廟祝號稱為王考是即子為諸侯而父非諸侯請未允於天子而輒稱父為諸侯又生母趙氏未得追封遽稱國母先居永夀宫此則其非據者於是禮部尚書劉春謂安王雖未封而卒今已追封為王祐棨雖生於安王卒後今既入繼親王則實承安王後矣皆朝廷之命非無所承也又更欲追封其所生之父則安王封諡之命將安委乎徒欲顧其私親而不知繼嗣之重事體殊戾況安王既追封入廟為三世之穆清江王又欲進封則一代二穆豈禮哉祝號稱呼不可以制册為據惟當以所後為稱其清江王祀事宜令次子祐揆主之淮王無與也所居宫則安王妃遷入永夀宫清江王妃退居清江府斯禮典法令皆得矣詔以其援據甚明從之十一月甲子初交成榮惠王薨無嗣姪表杋襲爵得追封本生父奇滽為王至是管府事鎮國將軍奇洢請加封奇滽之女太平郡君為縣主下禮部議尚書劉春言加封事例施於世次應襲王爵而未得者若世次不應襲其子雖進襲王爵惟以繼嗣為重不得加封至於子女尤所弗論所以正統緒定名分也交成王表杋以姪繼伯追封其父已為過分乃又欲加封其女不可許其請申論各王府今後有旁支進襲王爵者不得奏請加封父母及其父母所生之子女違者罪坐輔導官上是之九年八月壬寅先是鄭康王祐枔薨無嗣詔以其從弟祐檡襲封為鄭王蓋簡王之孫而東垣端惠王之子也嘗為其父奏請追封入廟凡三上疏禮部屢覆鄭王以旁支入繼親王不得顧其私親詔如議至是復以為請下禮部議以鄭王懇疏雖出於孝然非以禮事其親者執議如初詔曰既於禮有悖其已之為皇太子服議宋明宋孝宗乾道二年莊文太子薨太子名愭孝宗適長子乾道元年立為太子賢孝上皇與帝皆愛之設素幄於太子宫正廳之東皇帝自內常服至幄俟時至易服皂幞頭白羅衫黑銀帶絲鞋就幄發哀是日皇后服素詣宫隨時發哀如宫中之禮合赴陪位官並常服吉帶入麗正門詣宫幕次俟時至常服黑帶立班俟發哀畢易吉服退自發哀至釋服日皇帝不視事權禁行在音樂仍命諸寺院聲鐘成服日皇帝服期次粗布幞頭襴衫腰絰絹襯衫白羅鞋以日易月十三日而除案父為長子三年不獨儀禮為然唐開元宋政和諸禮莫不皆然乃禮文則如彼而制服則如此世咸謂長子服期由明太祖始改不知前代已不行三年矣皇后服次粗布蓋頭長衫裙帔絹襯服白羅鞋六宫人不從服皇太子妃及本宫人並斬衰三年文武百官成服一日而除其文武合赴官及御史臺閣門太常寺引班祇應人並服布幞頭襴衫腰繫布帶本宫官僚並服齊衰三日服臨七日而除釋衰服後藏其服至葬日服葬畢而除寧宗嘉定十三年景獻太子薨太子名詢燕懿王後藝祖十一世孫也寧宗養於宫中賜名曮立為皇太子更名懤又更名詢其發哀制服並如莊文太子之禮明太祖洪武二十五年懿文皇太子薨太子名標髙帝長子命禮部議喪禮侍郎張智等議曰喪禮父為長子服齊衰期年又云期之喪逹乎大夫今斟酌其宜皇帝當以日易月服齊衰十二日祭畢釋之世宗嘉靖二十八年莊敬太子薨禮部尚書徐階上議曰案查景泰四年成化八年及嘉靖十二年雖節有皇太子喪儀但俱在下殤奉旨禮從簡殺今皇太子册立已踰十年近又已成冠禮所有先年簡殺儀文未敢援據為例臣等謹案本朝喪服之制父為長子服期又案儀禮臣為君長子齊衰不杖期傳曰何以期也從服也言從君而服也臣等謹參酌古今事宜自十七日至十九日皇上服淺淡服色二十日易素服凡十二日而除文武百官聞喪素服烏紗帽黑角帶於本衙門宿歇至二十日早具齊衰服不杖赴思善門舉哀行四拜禮二十二日百官素服烏紗帽黑角帶詣西角門行奉慰禮退易布裹紗帽絰帶麻履本衙門辦事通十二日而除奏入上曰天子絶期況十五嵗之外方出三殤朕服非禮止輟朝十日百官如制成服無詣門哭臨之禮為太子妃服議明明懿文太子常妃薨太祖素服輟朝三日中宫素服哀臨皇太子服齊衰葬畢焚於墓所常服還內皇孫服斬衰置靈座旁遇祭奠則服之諸王公主服如制神宗時皇太子才人王氏薨命視皇太子妃郭氏例輟朝五日不鳴鐘鼓帝服淺淡色衣百官青素服黑角帶朝參皇長孫主饋奠為皇子服議宋宋仁宗慶厯三年集賢校理余靖奏曰臣伏見隂陽尅擇官狀申皇子故鄂王殮被服並取今月初四日又見每年正月五日紫宸殿開宴管領契丹賀正人使恐有司循故事申舉以遼使為重依例作樂開宴臣敢先事言之故鄂王雖在襁褓是為無服之殤已賜爵命當同成人之例今日服之明日宴樂情何以安且臣寮之家遭此喪尚當給假況萬乘之主不得申其私恩深可痛也昔周景王以子喪既葬而與宴春秋譏之以為失禮古者卿佐之喪雖有祭祀尚猶廢樂況在親父子乎為公主服議唐宋明唐太宗貞觀時豫章公主薨魏徴上奏曰自豫章公主薨逝陛下久著素服羣情悚栗咸不自寧臣聞古之王者絶於期服此乃前書典禮列代舊章陛下發上聖之慈深下流之慟素服以來遂經旬月悼往之義足為加隆伏願割無已之痛從先王之禮改御常服以副羣下之心臣濫蒙重任不敢寢默帝從之案天子於公主本無服唐太宗素服經月則踰於禮制矣故魏徴諫正列在名臣奏議內杜典未載今補纂并舉宋史禮志明會典列敘於後唐書豫章公主為太宗第六女宋太祖開寶六年皇妹燕國大長公主薨禮官言皇帝為已出適之公主降服大功請輟朝三日詔特輟五日仁宗天聖二年申國大長公主卒禮官言皇帝降服大功請輟朝一日詔特輟五日堂欑掩壙亦各輟一日明制公主喪聞上輟朝一日各王孝服花冠等件內府內官監等衙門成造其七七百日周年二周年除服御祭各一壇為諸王服議宋明臣等謹案杜典於為太子妃服議下附諸王妃而於諸王闕如今補纂宋禮院例册齊衰期大功各輟視朝三日小功緦麻輟視朝一日咸平六年皇弟兖王元傑薨景德二年皇弟雍王元份薨禮官言皇帝為兖王雍王並齊衰期請輟三日詔特輟五日堂欑啓欑發引掩壙日又各輟一日天聖五年齊王元佐薨禮官言本服齊衰期不視事三日詔特輟五日朝參明太祖洪武二十八年秦王樉薨詔定喪禮禮部尚書任亨泰言考宋制宜輟朝五日今遇時享請暫輟一日皇帝及親王以下至郡主及靖江王宫眷服制皆與魯王喪禮同皇太子服齊衰期亦以日易月十二日而除素服期年從之定制親王喪輟朝三日禮部奏遣官掌行喪葬禮翰林院撰祭文諡册文壙志文工部造銘旌遣官造墳欽天監官卜葬其服制王妃世子衆子及郡王郡主下至宫人斬衰三年封內文武官齊衰三日哭臨五日而除在城軍民素服五日郡王衆子郡君為兄及伯叔父齊衰期年郡王妃小功為諸王妃服議宋明宋制皇帝臨諸王妃喪出宫服常服至所臨處變服素服明太祖洪武九年五月晉王妃謝氏薨命議喪服之制侍講學士宋濂等議曰按唐制皇帝為皇妃等舉哀宋制皇帝為皇親舉哀今參酌唐宋之制皇帝及中宫服大功東宫公主親王等皆服小功晉王服齊衰期靖江王妃小功王妃服緦麻輟朝三日既成服皇帝素服入喪次十五舉音百官奉慰皇帝出次釋服服常服制曰可其後王妃喪視此案明會典凡世子妃世孫妃喪禮俱與郡王妃同為皇子殤服議宋宋仁宗康定二年皇子夀國公昕薨年二嵗禮官言已有爵命宜同成人遂發哀成服神宗熙寧十年永國公薨係無服之殤詔特舉哀成服欽定續通典卷七十六
