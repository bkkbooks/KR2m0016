body:
  text: 禮吉功臣配享唐五代宋遼金元明唐𤣥宗時定開元禮祫禘以功臣配享按貞觀禮禘及時享功臣皆不配享馬氏通考以禘祭配享為非舊典則亦以貞觀禮為當矣配位在各帝廟庭太階之東少南西面以北為上後唐明宗長興二年詔以故昭義節度使李嗣昭故幽州節度使周德威故汴州節度使符存審配享莊宗廟庭宋初禘祫皆以功臣配享有司先事設幄次布褥位於廟庭東門內道南當所配室西向設位版籩豆各二簠簋爼各一知廟卿奠爵再拜神宗熙寧末詔太常禮院講求親祠太廟不及功臣禮例元豐三年詳定所言謹按書盤庚曰兹豫大享於先王爾祖其從與享之周禮司勳凡有功者祭於大蒸然則書之所謂大享即禮之所謂大蒸也蒸冬祭也謂之大者物成衆多之時其祭比三時為大也方是時百物皆報焉祭有功宜矣禮記祭統衛孔悝之鼎銘曰勤大命施於蒸彛後世蒸祭不及功臣既不合禮而禘祫及之事不經見梁初誤禘功臣何佟之以為夏物未成而禘功臣為非典禮唐韋挺亦云今禘祫以功臣配享而冬蒸不及與經不合蓋因仍之誤也伏請每遇冬蒸以功臣配享其禘祫配享罷之詔凡冬享禘祫及親祠功臣並配享又從太常禮院請配享功臣以見贈官書版位孝宗乾道五年九月太常少卿林栗等言欽宗皇帝廟庭尚虛配享當時遭值艱難淪胥莫救罕可稱述而以身殉國名節暴著不無其人雖生前官品不應配享之科事變非常難拘定制乞特詔集議吏部尚書汪應辰奏當時死事之臣皆有次第褒贈若今配享欽廟典故所無如創行之又當訪究本末差次輕重有所取舍尤不可輕易竊謂配享功臣若依唐制各廟既無其人則當缺之乃罷集議欽宗廟遂無配享遼興宗重熙二十一年八月太尉烏哲薨詔配享聖宗廟金海陵天德二年二月太廟祫享有司擬上配享功臣世宗大定八年上命圖功臣於太祖廟有司第祖宗佐命之臣勳績之大小官資之崇卑以次上聞十一年尚書省奏禘祫之儀功臣配廟庭各配所事之廟以位次為序享日並出神主前廊序列昭穆元世祖至元三年太廟成丞相安圖巴延言祖宗世數尊諡廟號功臣配享等事皆宜以時定英宗初博士言今冬祭即蒸也天子親祼太室功臣宜配享事弗果行明太祖洪武二年孟春享太廟設青布幃六於太廟庭中內列功臣配位每座籩豆簠簋各二羊豕體各一遣官分獻讀祝三年定配享功臣春夏於仁祖廟西廡秋冬於德祖廟西廡設位東向遂罷幃次之設更定三獻禮皇帝初獻時獻官即分詣行禮不拜四年太祖謂中書省臣太廟之祭以功臣配列廡間今既定太廟合祭禮朕以祖宗具在使功臣故舊沒者得少依神靈以同享祀不獨朝廷宗廟盛典亦以寓朕不忘功臣之心於是禮官議凡合祭時為黃布幄殿中祖考神位旁設兩壁以享親王及功臣令大臣分獻制可已而命去布幄惠帝建文時禮部侍郎宋禮言功臣自有雞籠山廟請罷太廟配享帝以先帝所定不從且令候太廟享畢别遣官即其廟祭之世宗嘉靖二十四年進諸配位於新太廟西壁罷分獻神宗萬厯十四年太常卿裴應章言廟中列后在上異姓之臣禮當别嫌且至尊拜俯於下諸臣之靈亦必不安命改復西廡遣官分獻按明世惟太祖成祖廟有配享功臣餘皆無之又二祖配享之臣半皆武臣惟劉基姚廣孝為文臣後廣孝以僧故移祀大興隆寺文臣配享惟基一人而已嘉靖時禮官夏言奏禮有功宗之祀漢祭功臣於廟庭魏祀尚書令荀攸於太祖廟唐髙祖至憲宗廟或七八人或三四人宋太祖至光宗亦然如魏徴李沆司馬光皆文臣不必皆武功也守成諸君亦各有輿享者不必皆創業也我朝二祖開國靖難固有功臣仁宗以後無事武功其間相與輔贊治平豈無有魏徴李沆輩者今侑享二祖十七人惟基廣孝二人文臣耳自後六廟缺焉無聞乞下廷議考求六朝文武大臣有功在當時澤在後世者請上裁定進侑廟庭其言頗為平允而帝弗之察惜哉天子七祀宋金元明宋制七祀春祀司命及戶夏祀竈季夏祀中霤秋祀門及厲冬祀行為小祀用羊一豕一不飲福神宗熙寧八年詔置太廟司命戶竈中霤門厲行七祀版位元豐三年太常禮院請禘享遍祭七祀詔從之四年詳定郊廟奉祀所請立春祭戶於廟室户外之西祭司命於廟門之西制脾於爼立夏祭竈於廟門之東制肺於爼季夏土王日祭中霤於廟庭之中制心於爼立秋祭門及厲於廟門外之西制肝於爼立冬祭行於廟門外之西制腎於爼皆用特牲更不隨時享分祭有司攝事以太廟令攝禮官服必元冕獻必薦熟親祀及臘享即依舊禮遍祭從之徽宗政和時議禮局上五禮新儀太廟七祀四時分祭如元豐儀臘享祫享則遍祭設位於殿下橫街之北道東西向北上金七祀隨時享春戶司命夏竈中霤秋門厲冬行鋪設祭器入實酒饌俟終獻將升獻獻官行禮并讀祝文章宗承安四年六月祭中霤按金史禮志時享條下云設七祀司命戶二位不言春祭後載夏竈中霤秋門厲冬行而不及春祀史文脫漏今依前後改訂輯入元制七祀神位附祭於廟庭中街之東西向其分為四時之祭並與宋同唯中霤則附於七月之祭特祭則遍設之每位籩豆各二簠簋各一尊二爼二明太祖洪武二年尚書崔亮奏周官天子五祀曰門曰戶人之所出中霤人之所居竈與井人之所養故杜佑曰天子諸侯必立五祀所以報德也今擬周官五祀止於嵗終臘享通祀於廟門外從之八年禮部奏五祀之禮周漢唐宋不一今擬孟春祀戶設壇皇宫門左司門主之孟夏祀竈設壇御厨光祿寺官主之季夏祀中霤設壇乾清宫丹墀內官主之孟秋祀門設壇午門左司門主之孟冬祀井設壇宫內大庖井前光祿寺官主之四孟以有事太廟日季夏以土王日牲用少牢制可後定中霤於奉天殿外文樓前又嵗暮合祭五祀於太廟西廡下太常寺官行禮成祖永樂間改定四孟祭戶竈門井於四立日中霤於季夏土王後戊日皆遣內臣祭各少牢一嵗暮太常少卿合祀於太廟丹墀西東向用少牢五按明祭五祀而不及行厲洪武三年定制京都别設泰厲壇於𤣥武湖中嵗以清明及十月朔日遣官致祭前期七日檄京都城隍届期設城隍位於壇上無祀鬼神位於壇下之東西羊三豕三飯米三石其各府州縣並設壇於城北一年二祭如京師後定郡邑厲鄉厲每嵗以清明七月十五日十月朔日凡三祭此倣祭法泰厲國厲族厲而變通之亦合於五祀者也喪廢祭議宋元明宋髙宗紹興七年帝祀明堂於建康時有徽宗之喪先是太常少卿吳表臣乞於大祀前二日朝獻景靈宫前一日朝享太廟及是援熙寧元年故事謂是時英宗喪未除不廢景靈宫太廟之禮請如故事翰林學士朱震以為不然謂王制喪三年不祭唯天地社稷得越紼行事監察御史趙渙言升祔以後宗廟常祭皆不當廢而當喪享廟亦有顯據左氏𫝊曰蒸嘗禘於廟曽子問曰已葬而祭此不當廢也詩頌成王即位諸侯來助祭春秋文公四年十一月成風薨六年十月猶朝于廟此顯據也疏奏詔侍從臺諌議吏部尚書孫近等言謹按春秋三十三年𫝊凡君薨卒哭而祔祔而作主特祀於寢蒸嘗禘於廟杜預謂新主既特祀於寢則宗廟四時常祀自當如舊又按景德三年明德皇后之喪改易而服除真宗遂享太廟合祭天地於圜丘熙寧元年神宗居諒暗復用景德故事躬行郊廟之禮則是考古及今居喪得見宗廟將來明堂大禮已在以日易月服除之後前一日皇帝合詣太廟朝享從之禮部太常寺言將來明堂大禮依已降㫖前一日朝享太廟檢㸃景德熙豐南郊故事皆在諒暗之中當時親行郊禮除郊廟景靈宫合用樂外所有鹵簿鼓吹及樓前宫架諸軍音樂皆備而不作其逐處巡警埸止鳴金鉦鼓角而已今臣僚欲議罷宗祀奏樂受胙故事即無去奏樂受胙之文兼祖宗故事三載大饗明堂蓋亦為民祈福奏樂受胙合依祖宗纍朝已行故事從之元英宗至治二年八月太皇太后崩太常院官奏國哀以日易月旬有二日外乃舉祀事有司以十月戊辰有事於太廟取聖裁制曰太廟禮不可廢迎香去樂可也明穆宗隆慶元年孟夏時享以世宗几筵未撤遵正德元年例先一日帝常服祭告几筵祗請諸廟享祀其後時享祫祭在大祥內者皆如之祭遷日及攝事議劉宋宋臣等謹按杜佑通典天子七祀下載雜議數條以資議禮者之考鏡其間如庶子攝祭等皆後代所無或從續輯或有附見他處者如兄弟不合繼位昭穆議見之天子宗廟門內不必更為纂集今仿其大略補所未備如此條遷日攝事亦足為一朝典故其他體例有量為變通者大率類此云宋世祖大明三年十一月有司奏四時廟祀吉日已定遇雨及舉哀舊停親奉以有司行事乞下禮官博議於禮得遷日與否博士江長議禮記祭統君之祭也有故則使人而君不失其儀鄭𤣥云君雖不親祭禮無闕君德不損愚以為有故則必使人者明無遷移之文茍有司充事謂不宜改日太常丞陸澄議案周禮宗伯之職若王不與祭祀則攝位鄭𤣥曰王有故行其祭事也臣以為此謂在致齊祭事盡備神不可瀆齊不可久而王有他故則使有司攝焉晉太始七年四月世祖將親祠於太廟庚戊車駕夕牲辛亥雨有司行事此雖非人故蓋亦天硋也求之古禮未乖周制按禮記孔子答曽子當祭而日蝕太廟火如牲至未殺則廢然則祭非無可廢之道也但權所為之輕重耳日蝕廟火變之甚者故乃牲至尚猶可廢推此而降可以理尋今散齊之內未及致齊而有輕哀甚雨日時展事可以延敬不愆義情無傷正典改擇令日唯入致齊及日月逼晚者乃使有司行事耳又前代司空顧和啓南郊車駕已出遇雨宜遷日更郊事見施用郊之與廟其敬可均至日猶遷况散齊耶殿中郎殷淡議曽子問日蝕太廟火牲未殺則廢縱有故則使人清廟敬重郊禋禮大故廟焚日蝕許以可遷輕哀微故事不合改是以鼷鼠食牛改卜非禮晉世祖有司行事顧司空之改郊月既不見其當時之宜此不足為凖愚謂日蝕廟火天譴之變乃可遷日至於舉哀小故不宜改辰衆議不同參議既有理據且晉氏遷郊宋初遷祠並有成凖謂孟月散齊之中遇雨及舉哀宜擇吉更遷無定限數唯入致齊及侵仲月節者使有司行事詔可宋哲宗紹聖三年十月帝詣天興諸殿朝獻翼日大雨詔差已致齊官分獻熙文七殿自是雨雪用為例云上陵拜掃及諸上食附金明唐五代宋遼唐代宗大厯十四年時德宗已即位禮儀使顔真卿奏元陵請朔望節祭日薦如故事泰陵惟嵗冬至寒食伏臘社一祭而罷日薦制可憲宗元和二年宰臣建言禮有著定後世狥一時之慕過於煩并故陵廟有薦新而節有遣使請嵗太廟以時享朔望上食諸陵以朔望奠親陵以朝晡奠其餘享及忌日告陵皆停穆宗長慶元年吏部奏公卿拜陵通取尚書省及四品以上清望官中書省及諸司五品以上清望官及京兆少尹充從之後唐莊宗同光三年寒食望祭於西郊潞王清泰三年車駕北幸路當徽陵乃至陵所朝謁晉髙祖天福八年時出帝即位次年寒食望祭顯陵漢髙祖乾祐三年時隱帝即位之三年寒食望祭於南園周太祖廣順元年二月寒食望祭於蒲池二年三月寒食望祭於郊顯德元年時世宗已即位車駕征太原回拜嵩陵至陵所哀泣感左右祭奠而退宋初春秋命宗正卿朝拜安陵太祖乾德三年始令宫人詣陵上冬服嵗以為常開寶九年太祖幸西京過鞏縣謁安陵奠獻太宗雍熙二年宗正少卿趙安易言昨朝拜安陵永昌陵有司止設酒脯香以未明行事不設燭燎又先赴永昌陵後赴安陵及帝后二位不遍拜頗愆於禮事下有司議曰按開元禮春秋二仲月司徒司空巡陵不設牲牢之祀今請如宗廟薦享少加減除不設登鉶牙槃食及太常登歌餘悉如大祠先赴安陵次永昌陵次孝明孝惠懿德淑德皇后陵真宗景德三年帝將朝諸陵太常禮院言唐貞觀中太宗朝獻陵至小次素服乘馬檢㑹今年正月車駕朝拜明德櫕宫止服素白衣當時皇帝在大祥之內今既服除望止服淡黃袍餘如唐制詔特服素白衣四年正月車駕次鞏縣齊於永安宫素服乘馬至安陵步入司馬門行奠獻禮諸陵亦然又詣下宫凡上宫用牲牢祝册有司奉事下宫備膳羞內臣執事百官陪位又詣元德太后陵奠獻别於陵西南設幄殿祭如下宫禮畢遍詣孝明等七后陵遂單騎從內臣巡視陵闕辰後暫詣幄次更衣復詣諸陵奉辭有司以朝拜無辭禮帝不忍故復往省視大中祥符四年命禮官定春秋二仲遣官朝陵儀注以祭服行事専差宗正卿一員朝拜三陵别遣官二員分拜諸陵其後添差陵廟行禮官四員選京朝官宗姓者充翰林學士錢惟寅言春秋朝陵載於舊式公卿親往蓋表至恭唐顯慶中始詔三公行事天寶以後亦遣公卿巡謁蓋取朝廷大臣不必須同國姓後參用太常寺正卿晉開運中亦命禮部侍郎近年以來止遣宗正等官人輕位卑實虧舊制望自今於丞郎諸司三品內遣官闕則差兩省諌舍以上所兾仰副追孝之心以成稽古之美仁宗景祐初滄州觀察使守節言寒食節例遣宗室拜陵而十月令內司賔往非所以致恭乃詔宗室正刺史以上一員朝拜神宗熙寧中詔文臣自兩省武臣閣門使以上經過陵下並許朝拜又詔臣僚朝拜諸陵除見任嘗任執政官許進湯餘止奠獻薦新不特拜髙宗紹興三年禮部太常寺言春秋二仲薦獻諸陵乞於行在法惠寺設位望祭行禮從之遼制孟冬朔拜陵有司設酒饌於山陵皇帝皇后駕至多囉倫穆騰奏儀辦閣門使贊皇帝皇后詣位四拜訖巫贊祝燔胙及時服酹酒薦牲大臣命婦以次燔胙四拜皇帝皇后率羣臣命婦循諸陵各三匝還宫金海陵天德四年正月朝謁世祖太祖太宗德宗陵世宗大定二年正月如大房山享獻山陵三年十二月臘獵於近郊以所獲薦山陵奉以為常八年命涿州刺史兼提㸃山陵每以朔望致祭朔則用素望則用肉仍以明年正月為首章宗泰和三年諸親王公主每嵗寒食十月朔聽謁興裕二陵明太祖洪武元年三月遣官祭仁祖陵二年定熙祖陵每嵗冬至正旦以三太牢致祭并望祭德祖懿祖二陵清明中元孟冬及月朔望以三太牢本署官行禮仁祖陵每嵗冬至正旦以太牢俱署官行禮朔望以少牢中都留守司官行禮成祖永樂後太祖陵每嵗聖旦正旦孟冬忌辰酒果行香清明中元冬至太牢致祭特遣勳舊大臣一員行禮南京各衙門文武官俱陪祭英宗正統十年謁三陵命百官具淺色衣服如洪武永樂制世宗嘉靖十四年帝諭禮部尚書夏言清明節既遣官上陵內殿復祭似涉煩復言因言我朝以清明中元冬至凡三上陵但中元俗節事本不經冬至既行大報配天之禮則陵事為輕可罷冬至上陵而移中元於霜降惟清明如舊蓋清明禮行於春所謂雨露既濡君子履之有怵惕之心者也霜降禮行於秋所謂霜露既降君子履之有悽愴之心者也二節既遣官上陵則內殿之祭可省遂著為令穆宗隆慶二年春詣天夀山祭長陵質明帝服青袍乘板輿至長陵門外降輿入至拜位上香四拜獻帛爵訖復位亞獻終獻令執爵者代隨詣永陵行禮是日遣官分祭六陵神宗萬厯間謁長永昭三陵禮亦如之太學唐五代宋遼金元明唐憲宗元和二年定生員額西京國子館生八十人太學七十人四門三百人廣文六十人律館二十人書算館各十人東都國子館十人太學十五人四門五十人廣文十人律館十人書館三人算館二人武帝㑹昌五年公卿百官子弟及京畿內士人寄客修明經進士業者並𨽻名太學外州寄士人並𨽻名所在官學後唐明宗天成三年正月中書門下奏伏以祭酒之資厯朝所貴爰從近代不重此官况屬聖明方勤庶政須宏雅道以振時風望令宰臣一員兼判國子祭酒敕令宰臣崔協兼判八月協奏請國子每年祗置監生二百員候解送至十月滿數為定太學書生不得因此便取公牒輒免本戶差役又每年於二百人數內不繫時節有投名者先令學官考試其學業深淺方議收補姓名敕依宋初國子監因周舊制增置學舍以應䕃子孫𨽻學受業太祖開寶八年國子監上言生徒舊數七十人奉詔分習五經然繫籍者或久不至而在京進士諸科常赴講習肄業請以補監生之闕從之仁宗慶厯三年立四門學以士庶子弟為生員又額置太學內舍生二百人神宗熙寧元年增置一百人尋詔以九百人為額四年建講書堂及諸生齊舍掌事者直廬又增置直講十員分生員為三等始入學為外舍額定七百人外舍升內舍員二百內舍升上舍員百各執一經從所講官受學元豐二年頒學令太學置八十齊齊各五楹容三十人外舍生二千人內舍三百人上舍百人月一私試嵗一公試增學正為五人學録十人學録參以學生為之又學制所言國子監以國子名而實未嘗教習國子乃詔許清要官親戚入監為國子生聽讀額二百人髙宗紹興十三年始建太學置祭酒司業各一員博士三員正録各一員上舍生三十員內舍生百員外舍生五百七十員尋又增至千員自外舍有月校而公試入等曰內舍自內舍有月校而舍試入等曰上舍凡升上舍者皆直赴廷對遼上京國子監太祖置祭酒司業監丞主簿等官聖宗統和十三年九月以南京太學生員浸多特賜水磑莊一區道宗清寧元年十二月詔設學養士頒五經𫝊疏置博士助教各一員按遼五京各有學其規制無可考姑從遼史本紀及百官志輯入金海陵天德三年始置國子監定詞賦經義生百人小學生百人以宗室及外戚皇后大功以上親諸功臣及三品以上官兄弟子孫年十五以上者入學不及十五者入小學世宗大定間定五品以上官兄弟子孫百五十人曽得府薦及終場人二百五十人凡四百人為太學生三月一私試作䇿論詩賦又有女直國子學習本國語言元太宗六年以馮志常為國子學總教命侍臣子弟十八人入學世祖至元七年命侍臣子弟十有一人入學二十四年立國子學設博士通掌學事分教三齊生員設助教同掌學事専守一齊正録申明規矩其生員之數定二百人成宗大德八年定國子生䝉古色目漢人三嵗各貢一人十年定䝉古色目漢人生員一百人三年各貢二人武宗至大四年定生員額三百人立國子學試貢法䝉古授官六品色目正七品漢人從七品仁宗延祐二年增置生員百人陪堂生二十人用集賢學士趙孟俯禮部尚書元明善等所議貢試之法更定之一曰升齊等第六齊東西相向上兩齊左曰時習右曰日新中兩齊左曰據德右曰志道下兩齊左曰遊藝右曰依仁每季考其所習以次遞升二曰私試規矩私試孟月試經疑一道仲月試經義一道季月試䇿問表章詔誥內科一道辭理俱優為上等凖一分理優辭平為中等凖半分每嵗通計積至八分以上者充髙等生員以四十名為額內䝉古色目各十名漢人二十名三曰黜罰科條應私試積分生員不事課業違戻規矩初犯罰一分再犯罰二分三犯除名應已補髙等生員違戾規矩初犯殿試一年再犯除名泰定帝泰定三年更積分為貢舉並依世祖舊制明太祖洪武元年設國子學令品官子弟及民俊秀通文義者並充學生後改學為監設祭酒司業等官分六堂以館諸生曰率性曰修道曰誠心曰正義曰崇志曰廣業成祖永樂元年設北京國子監十八年遷都乃以京師國子監為南京國子監六堂諸生仿元制行積分法命司業二員分為左右各提調三堂宣宗宣德八年命禮部尚書胡濙與大學士楊士竒等選副榜舉人入監孝宗𢎞治中准南京祭酒章懋奏請行選貢之法令提學考選諸生學行兼優年力富强者充貢世宗嘉靖元年令公侯伯未經任事年三十以下者送監讀書尋令已任者亦送監其例監之始自景泰初以邊事孔棘其後或嵗荒或邊警或大興工作率援例行之矣郡縣學後魏明唐五代宋遼金元臣等謹按杜佑通典太學後載諸侯立學一條而所輯祗後漢東普一二事殊未該備且自漢以來封建久廢安得所謂侯國之學哉今裒集郡縣立學自六朝以訖元明凡規制沿革之可考證者具著於篇而條教試補諸目則仍從大略云後魏顯祖天安初立鄉學郡置博士二人助教二人學生六十人後令大郡立博士二人助教四人學生百人次郡立博士二人助教四人學生八十人中郡博士一人助教二人學生六十人下郡立博士一人助教一人學生四十人唐髙祖武德七年詔諸州縣及鄉並令置學有明一經以上者有司試䇿加階𤣥宗開元二十六年正月敇古者鄉有序黨有孰將以宏長儒教誘進學徒化民成俗率由於是其天下州縣每鄉之內里别各置一學仍擇師資令其教授後唐明宗天成三年宰臣兼判國子祭酒崔協奏請頒下諸道州府各置官學如有鄉黨備諳文行可舉者録其事實申監司方與解送但一身就業不得影庇門戶宋仁宗即位命藩輔皆得立學慶厯四年詔曰儒者通天地人之理明古今治亂之原可謂博矣然學者不得騁其說而有司務先聲病章句以拘牽之則吾豪雋竒偉之士何以奮焉士以純明朴茂之美而無斆學養成之法使與不肖並進則夫懿德敏行何以見焉此取士之甚敝而學者自以為患夫遇人以薄者不可責其厚也今朕建學興善以尊子大夫之行更制革敝以盡學者之才有司其務嚴訓導精察舉以稱朕意學者其進德修業無失其時其令州若縣皆立學本道使者選部屬官為教授員不足取於鄉里宿學有道業者由是州郡奉詔興學而士有所勸神宗熙寧四年詔置京東西河東北陜西五路學以陸佃等為諸州學官仍令中書採訪逐路有經術行誼者各三五人雖未仕亦給簿尉俸使權教授他路州軍命近日選薦京朝官有學行可為人師者堂除逐路官令兼所任州教授州給田十頃為學糧仍置小學教授哲宗元符二年初令諸州行三舍法考選升補悉如太學髙宗紹興三年詔淮西路州縣教授並行減罷令逐州有出身官兼攝遼黃龍府興中府俱設府學西京上京東京諸道各立州學金世宗大定十六年置府學十七處共千人以嘗與廷試及宗室皇家袒免以上親并得解舉人為之後增州學遂加以五品以上官曽任隨朝六品官之兄弟子孫餘官之兄弟子孫經府薦者同境內舉人試補三之一凡試補學生以提舉學校官主之二十九年戶部尚書鄧儼等議計州府户口增養士之數於大定舊制京府十七處千人之外置節鎮防禦刺史州學六十處增養千人各設教授一員府學二十四學生九百五人節鎮學三十九六百十五人防禦州學二十一二百三十五人凡千八百人元世祖中統二年始命置諸路學校官凡諸生進業者嚴加訓誨務使成材以偹選用至元十九年命雲南諸路皆建學明太祖洪武二年上諭中書省臣曰治國以教化為先教化以學校為本京師雖有太學而天下學校未興宜令郡縣皆立學校延師儒授生徒講論聖道使人日漸月化以復先王之舊於是大建學校府設教授州設學正縣設教諭各一俱設訓導府四州三縣二生員之數府學四十人州縣以次减十後又命增廣不拘額數宣宗宣德中定增廣之額尋又於額外增取附於諸生之末謂之附學生員凡初入學者止謂之附學而廪膳增廣以嵗科試等第髙者充補焉釋奠唐五代宋遼金元明唐代宗永泰二年二月上丁釋奠於國學賜宰臣百官飱錢八月丁亥國子監釋奠復用牲牢肅宗上元二年詔諸祠獻熟至是從魚朝恩請復用舊制宰相常參官軍將盡㑹於講堂京兆府置食講論觀軍容使魚朝恩說易又於講論堂畫周易鏡圖德宗貞元二年二月丁卯有司釋奠於文宣王廟自宰臣以下畢集於國學學官升講座陳五經大㫖先聖之道九年季冬貢舉人謁先師日與親享廟同有司言上丁釋奠與大祠同即用中丁乃更用日謁於學十五年膳部郎中歸崇敬奏每年春秋釋奠祝版御署訖北面而揖其禮太重按大戴禮師尚父授武王丹書東面受之請參酌輕重庶得其中後唐明宗長興元年尚書比部員外郎知制誥崔棁奏臣伏見開元五年敕每年貢舉人見訖宜引就國子監謁先聖先師學者謂之開講質疑義所司設食其日清晨按五代㑹要作其日清資官與通考互異五品已上併朝集使並往觀禮永為常式自經多故其禮久廢請再舉行從之三年國子博士蔡同文奏伏見每年春秋二仲月上丁釋奠於文宣王以兖公顔子配座以閔子騫等為十哲排祭奠其有七十二賢圖形於四壁靣前皆無酒脯自今後乞准本朝舊規四壁畫像前各設一豆一爵中書帖太常禮院詳檢郊祀録文宣王從祀諸座每位設籩二豆二簠簋各一爵一無一豆一爵之儀自此每釋奠宜准郊祀録各陳脯醢等物以祭宋太祖建隆中凡三幸國子監謁文宣王廟開寶通禮諸州釋奠並刺史致齊三日從祭之官齊於公館祭日刺史為初獻上佐為亞獻博士為終獻真宗大中祥符三年判國子監孫奭言上丁釋奠舊禮以祭酒司業博士充三獻官新禮以三公行事近嵗止命獻官兩員臨時通攝未副崇祀向學之意望自今備差太尉太常光祿卿以充三獻是年六月命崇文院刋釋奠儀注及祭器圖頒之諸路太常禮院定州縣釋奠器數先聖先師每座酒尊一尊加勺羃置于坫籩豆各八簠簋各二爼三罍一冼一篚一巾共二燭二從祀諸座各籩二豆二簠簋各一爼一燭一爵一仁宗景祐元年詔釋奠用登歌慶厯四年五月帝幸國子監謁孔子有司言舊儀止肅揖帝特再拜神宗熙寧五年國子監言舊例遇貢舉嵗禮部貢院集諸州府所貢第一人謁奠先聖如春秋釋奠儀按春秋自有釋奠禮請罷貢舉人謁奠從之哲宗元祐六年幸太學先詣至聖文宣王殿行釋奠禮一獻再拜徽宗大觀初大司成强淵明言考之禮經士始入學有釋菜之儀請自今每嵗貢士始入辟雍並以元日釋菜于先聖其儀獻官一員以丞或博士分奠官八員以博士正録大祝一員以正録前釋菜一日應祀官赴學各宿其次至日詣文宣王殿常服行禮貢士初入學者陪位於庭他亦略倣釋奠之儀髙宗紹興十年用王普請以釋奠文宣王為大祀加籩豆十二其禮如社稷又在京為大祀州縣為中祀孝宗乾道八年宰臣請討論上丁釋奠及太子入學之儀帝曰文王世子篇載此甚詳令有司討論以聞光宗紹熙元年知漳州朱熹條上釋奠禮儀數事後不果行理宗景定二年詔皇太子謁孔子於太學手詔略曰虎門齒胄太子事也此禮廢久矣如釋奠舍菜之事我朝未嘗廢也然尊師敬道又不可拘舊制令太子謁拜焉度宗咸淳三年正月戊申帝詣太學行舍菜禮禮部尚書陳宗禮國子祭酒陳宜中進讀中庸越日宗禮宜中各進一秩宜中賜紫章服諸齊長諭及起居學生推恩有差遼太祖神册三年詔建孔子廟命皇太子春秋釋奠四年秋八月謁孔子廟道宗清寧六年中京置國子監命以時祭先聖先師金熙宗皇統元年二月上親祭孔子廟北面再拜世宗大定十四年禮官參酌唐開元禮定擬釋奠儀數文宣王兖國公鄒國公每位籩豆各十犧尊一象尊一簠簋各二爼二祝版各一皆設案從祀先賢先儒每位籩一豆一爵一兩廡各設象尊二尊皆有坫章宗承安二年春上親祀以親王攝亞獻終獻皇族陪祀文武羣臣助奠其諸州釋奠並遵唐儀元太祖置宣聖廟于燕京世祖中統二年六月詔宣聖廟及管內書院有司嵗時致祭月朔釋奠八月丁酉命開平守臣釋奠于宣聖廟至元十年三月中書省命春秋釋奠執事官各公服如其品陪位諸儒襴衫唐巾行禮成宗大德六年詔建文宣王廟于京師十年八月丁巳行釋奠禮牲用太牢樂用登歌製法服三襲武宗至大二年正月定制大成至聖文宣王春秋二丁釋奠用太牢明太祖洪武元年二月丁未以太牢祀先師孔子於國學又定制每嵗春秋上丁皇帝降香遣官祀於國學以丞相初獻翰林學士亞獻國子祭酒終獻四年禮部奏定儀物改初制籩豆之八為十又令進士釋褐詣國學行釋菜禮十五年太學落成帝親詣釋奠詔天下通祀孔子并頒釋奠儀注凡府州縣學籩豆以八器物牲牢皆殺於國學三獻禮同十哲兩廡一獻其祭各以正官行之十七年敕每月朔望祭酒以下行釋菜禮郡縣長以下詣學行香成祖永樂四年三月朔帝幸學釋奠於先師孔子十九年北京國子監既定其南監春祭命祭酒行禮稱皇帝謹遣憲宗成化十二年從祭酒周洪謨言增樂舞為八佾籩豆各十二二十二年二月朔當釋菜值上丁令以次日釋菜孝宗𢎞治九年增樂舞為七十二人如天子之制武宗正德元年三月釋奠於先師孔子世宗嘉靖九年令南京國子監遵國初舊制十籩十豆天下各學八籩八豆樂舞止六佾十年以釐正祀典服皮辨謁廟用特奠帛行釋奠禮迎神送神各再拜樂三奏文舞六佾祀先代帝王名臣附唐宋金元明唐𤣥宗天寶九載立周武王漠髙祖廟于京城代宗大厯五年鄜坊節度使上言坊州軒轅皇帝陵闕請置廟四時列於祀典昭宗乾寧四年建漢昭烈帝廟于涿州西南樓桑村宋太祖乾德元年詔厯代帝王國有常享五代亂離百司廢墜匱神乏祀闕孰甚焉按祀令先代帝王每三年一享以仲春之月牲用太牢祀官以本州長官有故以上佐行事官造祭器送諸陵廟又詔先代帝王載在祀典或廟貌猶在久廢牲牢或陵墓雖存不禁樵採其太昊炎帝黃帝髙辛唐堯虞舜夏禹成湯周文王武王漢髙帝光武唐髙祖太宗各置守陵五戶嵗春秋祠以太牢商中宗太戊髙宗武丁周成王康王漢文帝宣帝魏太祖晉武帝後周太祖隋髙祖各置三户嵗一享以太牢秦始皇帝漢景帝武帝明帝章帝魏文帝後魏孝文帝唐𤣥宗肅宗憲宗宣宗梁太祖後唐莊宗明宗晉髙祖各置守陵兩戶三年一祭以太牢其餘諸陵禁樵採開寶三年詔有司詳定前代功臣烈士勳業優劣第為三等孫臏等各置守塜三户趙簡子等各兩户悉蠲其役慕容德等禁樵採按明臣丘濬曰宋開寶時有司所品第前代功臣烈士皆據其有塜墓存者爾厯代勳德之名固不止此且其所品第者乃一人之見非萬世公論也兹據馬氏通考輯具大略其姓氏不復備載真宗大中祥符元年加諡太公望昭烈武成王建廟青州周公旦追諡文憲王建廟兖州春秋委本州長吏致祭四年祀汾陰駐蹕河中府遣官致祭緣路帝王祠廟並加葺治令衡州葺神農廟六年詔諸州有黃帝祠廟並加崇葺神宗元豐四年承議郎吳處厚言程嬰公孫杵臼保全趙孤乞加封爵詔河東河北漕臣訪其祠墓並追封侯爵立祠墓側載之祀典哲宗元祐六年詔相州商王河亶甲冡沂州顔真卿墓並載祀典髙宗紹興元年命祠禹于越州及祠越王勾踐以范蠡配十一年從中書舍人朱翌言晉韓厥與程嬰公孫杵臼並享春秋之祀立祚德廟致祭後並改封公爵升為中祀孝宗淳熙十四年詔衡州葺炎帝陵廟金制前代帝王三年一祭以仲春之月祭伏羲於陳州神農於亳州軒轅於坊州少昊於兖州顓頊於開州髙辛於歸德府陶唐於平陽府虞舜夏禹成湯於河中府周文王武王於京兆府章宗泰和三年尚書省奏太常寺言開元禮祭帝嚳堯舜禹湯文武漢祖祝版請御署開寶禮羲軒顓頊帝嚳陶唐女媧成湯文武請御署自漢髙祖以下不署敕命依期降祝版而不請署元世祖中統四年建帝堯廟於平陽至元元年龍門禹廟成命侍臣持香致敬有祝文十二年立伏羲女媧舜湯等廟於河中解州洪洞趙城十五年修㑹川縣盤古皇祠祀之二十四年敕春秋二仲丙日祀帝堯廟成宗元貞元年初命郡縣通祀三皇如宣聖釋奠禮太皥氏以勾芒配炎帝氏以祝融配軒轅氏以風后力牧配軒轅臣俞跗以下十人從祀兩廡有司春秋行事泰定帝致和元年太常議祀舜禹廟合依堯祠故事每嵗春秋仲月上旬卜日有司蠲潔致祭官給祭物文宗天厯二年以岐陽周公廟為書院設學官春秋釋奠周文憲王如孔子廟儀至順元年命湯隂縣北故羑里城周文王廟有司奉祠如故事明太祖洪武三年遣使訪先代陵寢仍命各行省具圖以進凡七十有九禮官考其功德昭著者凡三十有六各製衮冕函香幣遣祕書監丞陶誼等往修祀禮親製祝文遣之六年帝以五帝三王及漢唐宋創業之君俱宜於京師立廟致祭遂建厯代帝王廟於欽天山之陽為正殿五室中一室三皇東一室五帝西一室夏禹啇湯周文王又東一室周武王漢光武唐太宗又西一室漢髙祖唐髙祖宋太祖元世祖每嵗春秋仲月上旬甲日致祭已而以周文王終守臣服唐髙祖由太宗得天下遂寢其祀增祀隋髙祖未幾復罷九年遣官省厯代帝王陵寢禁芻牧置守陵户三嵗一𫝊制遣道士奉香詣諸陵令有司致祭二十一年令每嵗郊祀附祭厯代帝王於大祀殿仍以嵗八月中旬擇日遣官祭於本廟其春祭停之又定每三年遣祭各陵之嵗則停廟祭是年詔以厯代名臣從祀於東西廡定風后力牧臯陶䕫龍伯夷伯益伊尹傅說周公旦召公奭太公望召虎方叔張良蕭何曹參陳平周勃鄧禹馮異諸葛亮房𤣥齡杜如晦李靖郭子儀李晟曹彬潘美韓世忠嶽飛張浚穆呼哩博勒呼博勒珠齊拉衮巴延凡三十七人成祖遷都帝王廟遣南京太常寺官行禮世宗嘉靖九年罷厯代帝王南郊從祀建厯代帝王廟於都城西嵗以仲春秋致祭并罷南京廟祭十年春二月廟未成躬祭厯代帝王於文華殿凡五壇丹陛東西名臣四壇禮部尚書李時言舊儀有賜福胙之文賜者自上而下之義惟郊廟社稷宜用厯代帝王止宜云答詔可二十四年以禮科陳棐言罷元世祖陵廟之祀及從祀穆呼哩等復遷唐太宗與宋太祖同室凡十五帝從祀名臣三十二人老君祠宋元明臣等謹按杜佑通典載老君祠附以莊列等稱為先賢此時代所尚義固應爾然揆之古今通誼竊以為過至宋鄭樵撰述通志仍而弗改尤為失之今仿杜氏體例纂集宋以來老君祠附以莊列諸人其先賢名目則謹從刪削云宋真宗大中祥符七年正月帝如亳州謁老子於太清宫奉上太上老君混元上德皇帝加號册寶夜漏上五刻天書扶侍使奉天書赴太清宫二鼓帝乘玉輅駐大次三鼓奉天書升殿行朝謁之禮相王元偓為亞獻榮王元儼為終獻帝還大次太尉奉冊寶於玉匱纒以金繩封以金泥印以受命之寶納於醮壇石匱將作監加石蓋其上羣臣稱賀於大次元順帝至元三年加封文始尹真人為無上太初博文文始真君徐甲為垂元感聖慈化德御真君庚桑子洞靈感化超蹈混然真君文子通𤣥光暢升元敏誘真君列子冲虛至德遁世逰樂真君莊子南華至極雄文宏道真君明世宗嘉靖時於西苑建大髙元殿奉玉皇及三清像欽定續通典卷五十三
