body:
  text: 禮凶臣等謹按杜佑述凶禮典援經𫝊以徵史事而必推言其變視諸禮較為詳備後世考凶禮者咸取資焉第自唐初議禮諸臣置國恤於不論遂致儀文散佚杜典縱廣為摭拾仍不能無遺漏也考儀禮十七篇喪服之外但有士喪禮自士而上禮節闕然大小戴禮記間載一二亦始末不具周官惟載諸司職掌而無以考行禮之次第然漢儒已取喪服𫝊别為之注六朝諸儒遂有専以喪服名家者豈不以慎終之典自非講求於平日則無以致誠信於臨時哉兹續纂凶禮凡唐以前服制為杜典失載者採以補之其原書所載條目有後世所不經見者則從其闕至於歴代史志舊五代史不載凶禮遼志僅存其畧金元禮志亦約舉未備惟宋史獨詳而明史亦分類編次今取紀傳雜志並原書之有闗喪制者按代排纂先儒所議隨事命題亦依例附録庶可與杜典互相証明焉大喪初崩及山陵制唐元五代明宋遼金唐徳宗貞元二十一年正月二十三日癸巳崩按是年八月改元永貞故司馬光資治通鑑作永貞元年二十四日宣遺詔按資治通鑑永貞元年正月癸已倉卒召翰林學士鄭絪衞次公等至金鑾殿草遺詔宦官或曰禁中議所立尚未定次公曰太子雖有疾地居冢適中外屬心必不得已猶應立廣陵王不然必大亂絪等從而和之議始定皇太子衰服見百寮二十六日即位太極殿按前漢書有自崩至𦵏不及旬日者嗣君即位多在既𦵏之後至東漢則𦵏期漸遲於是始制令以大行柩前即位而歴代遵之以檢校司空平章事杜佑攝冢宰兼䕶山陵使中丞武元衡為副使宗正卿李紓為案行山陵使刑部侍郎鄭雲逵為鹵簿使庚子百僚請聴政不許二月癸夘朝百寮於紫宸門佑前進跪曰陛下居憂過禮羣臣懼焉願得覩聖顔左右乃為皇帝舉帽百寮皆再拜後唐莊宗同光三年七月貞簡皇太后太祖皇后曹氏諡貞簡遺令曰皇帝以萬幾至重八表所尊勿衣粗衰勿居諒闇三年之制以日易月過三日便親朝政釋服後未御八音勿廢羣祀勿斷屠宰勿禁晏㳺園陵喪制皆從簡省故申遺令奉而行之其月太常禮院奏案故事中書門下翰林學士在朝文武百官内諸司使供奉官以下從成服三日每日赴長壽宫朝臨自後不臨其服以日易月十三日除至小祥合釋服每至月朔月望小祥大祥釋服日未除服者衰服臨已除服者則素服不臨並赴長壽宫先拜靈訖移班近東進名奉慰從之長興四年十一月戊戌明宗崩於雍和殿秘其喪六日時召宋王于鄴十二月癸夘朔發喪於西宫按五代㑹要左僕射平章事李愚撰哀册文吏部尚書平章事劉尚撰諡册文愍帝即位於柩前愍帝即宋王按五代㑹要云自魏府入纘皇統羣臣見於東階復於喪位丙午成服於西宫馮道為大行皇帝山陵使戸部尚書韓彦惲為副中書舎人王延為判官禮部尚書王權為禮儀使兵部尚書李麟為鹵簿使御史中丞龍敏為儀仗使左僕射權判河南府盧質為橋道頓遞使按晉漢周三代嗣君即位於柩前皆與唐同其山陵諸使亦同惟晉漢皆無橋道頓遞使疑當時不置或舊史實録闕書歐陽修五代史因之宋太祖建隆二年六月皇太后杜氏崩於滋徳殿按昭憲杜太后歸於宣祖生太祖太宗太祖即位尊為皇太后三日百官入臨明日百姓成服羣臣服布斜巾四脚直領襴衫外命婦帕頭帔裙衫九日帝見百官於紫宸門太常禮院言皇后長公主皇弟合隨皇帝二十七日禫除畢服吉心喪終制從之開寶九年十月太祖崩遺詔以日易月皇帝三日而聴政十三日小祥二十七日大祥諸道州府臨三日釋服羣臣叙班殿庭宰臣宣制發哀畢太宗即位號哭見羣臣羣臣服布斜巾四脚直領布襴腰絰鄭康成士喪禮注麻在首在要皆曰絰絰之言實也明孝子有忠實之心要絰象大帶朱子曰兩頭長垂下命婦布帕首裙帔皇弟皇子文武二品以上加布冠斜巾帽首絰士喪禮注首絰象緇布冠之缺項大袖裙袴竹杖士民縞素婦人素縵諸軍就屯營三日哭羣臣屢請聴政始御長春殿羣臣喪服就列帝去杖絰服斜巾垂㡌捲簾視事是月卜𦵏以翰林學士杜彥圭為山陵按行使齊王廷美為山陵使兼橋道頓遞又有禮儀鹵簿儀仗使皆以侍官為之太宗至道三年三月崩真宗散髮號擗奉遺詔即位萬嵗殿之東楹制永熙陵皇堂深百尺方廣八十尺陵臺方二百五十尺大駕鹵簿用玉輅一革車五外用九千四百六十八人有司定散髪之禮按文獻通考初有司言皇帝當聴政更不散髪帝曰豈有居父之喪不盡禮乎朕已散髪矣皇帝皇后諸王公主縣主諸王夫人六宫内人並左被髪皇太后全被髪帝服布斜巾四脚大袖裙袴帽竹杖腰絰首絰直領布襴衫白綾襯服諸王皇親以下如之加布頭冠絹襯服皇太后皇后内外命婦布裙衫帔帕頭首絰絹襯服宫人無帔文武二品以上布斜巾四脚頭冠大袖襴衫裙袴腰絰竹杖絹襯服自餘百官並布幞頭襴衫腰絰兩省五品御史臺尚書省四品諸司三品以上見任前任防禦團練刺史等布頭冠幞頭大袖襴衫裙袴腰絰諸軍庶民白衫紙帽婦人素縵不花釵三日哭而止山陵前朔望不視事真宗景徳四年四月章穆皇后崩初諡莊穆後改章穆皇帝七日釋服後改用十三日按真宗在襄邸太宗為聘之真宗嗣位立為皇后崩上深嗟悼禮官奏七日釋服時詔增至十三日羣臣三日釋服諸道州府官吏訃到日舉哀成服三日而除司天監詳定園陵帝令棺椁等事無得鐫花様務令堅固乾興元年二月十九日真宗崩仁宗即位二十一日羣臣入臨見帝於東序閤門使宣口勅曰先皇帝奄棄萬國凡在臣寮畢同號慕及中外將校並加存撫羣臣拜舞稱萬嵗復哭盡哀退以宰相為山陵使餘如舊制六月參知政事王曽言奉詔按視山陵定皇堂之制深八十一尺上方百四十尺宰相請以前後所降天書置陵中十月𦵏永定陵仁宗明道二年三月章獻皇太后崩於寶慈殿遷座於皇儀殿宣遺詔按文獻通考太常寺言章獻明肅皇太后遺詔十三日令在京百官除服羣臣哭臨見帝於殿之東廂奉慰司天監詳定山陵制度皇堂深五十七尺神牆髙七尺五寸四面各長六十五歩乳臺髙一尺九尺至南神門四十五歩鵲臺髙二丈三尺至乳臺四十五歩嘉祐八年三月仁宗崩英宗立喪服制度及修永昭陵按宋文鑑仁宗皇帝哀冊文云皇帝崩於福寧殿旋殯于殿之西階粤十月六日遷座於永昭陵禮也並用定陵故事英宗治平四年正月崩遺詔山陵務從省約神宗立喪禮如舊制按名臣琬琰之章程頤代父上書請奉遺詔凡百規模盡依魏文之制范鎮奏上宫下宫及兆域之數願一以安陵為祖神宗元豐八年三月崩哲宗立七月請諡於南郊九月讀諡寶册於福寧殿十月𦵏永裕陵哲宗元符三年正月崩徽宗立詔山陵制度並如元豐髙宗紹興五年四月徽宗崩於五國城七年正月問安使何蘚等還以聞帝號慟擗踊終日不食宰臣張浚等力請始進糜粥成服於几筵殿三十一年五月金國使至以欽宗訃聞詔朕當持斬衰三年之服以申哀慕禮臣請依典故以日易月從之南宋國恤喪禮自聴遺詔始是日皇帝服白羅袍黒銀帶絲鞋白羅軟折上巾皇太后初喪皇帝服素紗軟幞頭白羅衫黑銀帶太皇太后太上皇后初喪日並同文武百寮並服常服黒帶去金玉飾入詣殿下立班定禮聴宣遺詔讀遺詔同並舉哀一十五音再拜立班首稍前躬身奉慰几奉慰冇皇太后並先慰皇太后故事未成服以前文武百僚諸司長吏以上及近臣列校每日朝晡臨皇太后崩朝晡臨至成服後三日止餘並同皇后崩發哀次日入臨成服後三日而止餘並同大斂成服日奉尸斂於棺謂之大斂皇帝服布斜巾四脚裙袴冠帽竹杖皇太后喪用桐木杖腰絰首絰直領大袖布襴衫白絹襯衫皇太后喪用白綾襯衫小祥日改用布四脚直領布襴衫腰布袴按北宋諸帝喪儀畧見宋史禮志南宋以後則闕文獻通考載有國恤儀其上篇與宋史文同盖通考作於前宋史撰於後故志文多本之其下篇多載南宋帝后喪紀而隨事類序不分前後兹特舉南宋大喪通儀著於篇遼太祖天顯元年七月次扶餘府崩八月奉梓宫西還耀庫濟奔赴行在人皇王倍即義宗繼至九月梓宫至皇都殯于子城西北太宗大同元年四月崩于欒城世宗嗣位發哀成服按舊五代史歐陽史通鑑契丹國志俱作五月嗣位唯遼史世宗紀作四月景宗乾亨四年九月次焦山崩十二月奉大行皇帝梓宫于菆塗殿按周禮賈公彦疏菆叢也謂用木菆棺而四面塗之故名菆塗聖宗太平十一年六月崩興宗哭臨於菆塗殿大行之夕四鼓終皇帝率羣臣三致奠奉柩出殿之西北門就輼輬車藉以素裀巫者祓除之興宗重熙二十四年崩道宗親擇地以𦵏道宗壽隆七年崩有司奉喪服天祚皇帝問禮於總知翰林院事耶律固始服斬衰及至𦵏靈柩就轝皇帝免喪服歩引至長福岡是夕皇帝入陵寢授遺物於皇族外戚及諸大臣按歐陽修五代史謂遼祖明殿若中土陵寢之制其國君殂𦵏於其墓側起殿置官屬職司嵗時奉表如事生置明殿學士一人掌荅書詔每國有大慶弔學士以先君之命為書以賜金太宗天㑹十三年正月崩於明徳宫熙宗即位於柩前按天㑹十年宗翰宗輔希尹與宗幹議曰儲位久虚今不早定恐授非其人合拉太宗嫡孫當立相與請於太宗下詔定為儲副合拉即熙宗哀宗正大八年九月明惠皇太后崩宣宗后王氏哀宗尊為皇太后遺命園陵制度務從儉約按金太祖天輔七年八月戊申崩于部堵濼西行宫太宗以九月丙辰即皇帝位盖太宗為太祖母弟九月乙夘已𦵏太祖于宫城西諸臣固請正位不許迨諸弟以赭袍被體寘璽于懐而後即位其去八月戊申已九日其餘章宗以皇太孫衛紹王以藩封哀宗以皇太子俱即位於柩前皆與熙宗即位典禮無殊故不分載元國俗舊禮凡帝后有疾危殆度不可愈移居外氊帳房有不諱則就殯殮其中𦵏後每日用羊二次燒飯以為祭至四十九日而後已其帳房即以賜近臣凡宫車晏駕棺用香楠木中分為二刳肖人形其廣狹長短僅足容身太祖崩𦵏起輦谷谷在漢北不加築為陵諸帝皆從𦵏於此明太祖洪武三十一年崩遺詔天下臣民令到出三日皆釋服嫁娶飲酒皆無禁毋發民哭臨宫殿中當臨者皆以旦晡各十五舉哀禮畢當給喪事及哭臨者皆毋跣絰帶毋過三寸無布車兵器禮部定議京官聞喪次日素服赴内府聴遺詔於本署齋宿朝晡詣几筵哭越三日成服朝晡哭臨至𦵏乃止自成服日始二十七日除諸王世子王妃郡主内使宫人俱斬衰二十七月除孝陵設神宫監并孝陵衛及祠祭署成祖永樂二十二年遺詔喪服禮儀一遵太祖皇帝遺制禮部議奏宫中自皇太子以下成服日為始服斬衰二十七月而除親王世子郡王及王妃世子妃郡王妃公主郡主以下聞喪皆哭盡哀第四日成服斬衰二十七月而除凡王視事素服烏紗帽黑角帶退服衰服仁宗崩詔營獻陵帝召尚書蹇義夏原吉曰國家以四海之富𦵏親豈宜惜費然古聖帝明王皆從儉制况皇考遺詔天下所共知宜遵先志於是建寢殿五楹左右廡神㕑各五楹門樓三楹其制較長陵逺殺英宗正統七年誠孝皇太后崩仁宗誠孝張皇后宣宗即位上尊號曰皇太后英宗即位加上太皇太后遺誥喪服以日易月二十七日而除哭臨三日即止君臣皆同皇帝成服三日後即聴政天地宗廟社稷及百神之祀皆勿停宗室諸王但遣官進香不必送喪在外大小文武衙門並免進香臣民之家勿禁音樂嫁娶英宗崩遺詔不得以宫妃殉𦵏總論喪期唐五代宋金元明唐代宗大厯十四年崩徳宗即位下詔曰朕聞禮貴縁情因心展孝髙宗得說其代予言今朝有股肱濟為舟楫出納惟允足以保邦况荼蓼在懷日時猶淺欲遂權奪抑就公除攀號痛心實所未忍朕將從禫服以終喪制百弼卿士宜悉哀懐禮儀使禮部尚書顔真卿奏曰哀號在疚開闢所無誠懇尚違庶僚增懼伏見百辟並已釋除事既合權禮無獨異不可以吉凶兼制臣子殊儀伏乞奉顧命之文節因心之孝順時即吉屈已臨朝則萬姓心安四方事集又下詔欲以素服練巾聴政曰昔髙宗諒隂三年舜為堯禹為舜亦服喪三年故禮曰三年之喪自天子達是知罔極之恩昊天難報朕䖍奉遺詔又迫於羣議將欲從吉未忍割哀其百僚宜以今月十七日釋服朕以素服練巾銜哀聴政凡百在位知朕意焉禮儀使又奏曰臣伏守遺詔禮從易月祥禫變除儀注皆備若陛下未忍即吉更服練巾則遺詔不得奉行羣僚無以覲見伏乞俯順人望仰遵先㫖實大孝不虧萬方幸甚後唐貞簡皇太后遺令皇帝三年之制以日易月過三日便親朝政皇后諸妃及諸王公主服齊衰以日易月十三日除長興四年明宗崩于雍和殿宋王從厚自鄴都至是日發哀百僚縞素就位中書侍郎平章事劉昫宣遺制宋王從厚于柩前即位服紀以日易月一如舊制漢乾祐元年正月髙祖崩二月辛巳内降大行皇帝遺制云周王承祐可于柩前即皇帝位服紀日月一依舊制周宣懿皇后按周家人𫝊符氏初世宗納為繼室後冊為皇后崩議者以方用兵請殺喪禮於是百官朝臨於西宫三日而釋服帝亦七日而釋世宗崩遺制服紀日月一依舊制宋乾興元年二月十九日真宗崩仁宗即位二十四日大斂成服三月一日小祥帝行奠釋衰服羣臣入臨退赴内東門進名奉慰自是每七日皆臨至四十九日止十三日大祥帝釋服服黲按馬端臨曰時上雖用以日易月之制改服臨朝而宫中實行三年之喪元豐八年三月五日神宗崩十三日大斂帝成服十七日小祥四月一日禫除按此日成服至除服僅十九日秘書省范祖禹言國朝自祖宗以來外廷雖用易月之制而宫中實行三年之喪且易月之制前世所以難改者以人君自不為服也今君上之服已如古典而臣下之禮猶依漢制是以大行在殯而百官有司皆已復其故常文獻通考但云是以百官有司皆已復其故常今依歴代名臣奏議補正豈人之性如此其薄哉由上不為之制禮也今羣臣易月人主實行三年之喪故十二日而小祥期而又小祥二十四日大祥再期而又大祥既以日為之又以月為之此禮之無據者也再期而大祥中月而禫禫者祭之名也非服之色也今乃為之黲服三日然後禫此禮之不經者也既除服至𦵏而又服之盖見梓宫不可以無服也文獻通考宋史禮志俱云盖不可以無服也文義未明今依歴代名臣奏議補正祔廟後即吉纔八月矣而遽純吉無所不佩此又禮之無漸者也詔禮官詳議以聞其後禮部尚書韓忠彥等言朝廷典禮時世異宜不必循古若先王之制不可盡用則當以祖宗故事為法今言者欲令羣臣服喪三年民間禁樂如之雖過山陵不去衰服庶協古之制縁先王恤典節文甚多必欲循古又非特如臣僚所言故事而已今既不能盡用則當循祖宗故事及先帝遺制從之孝宗淳熙十四年十月八日髙宗崩孝宗號慟擗踊踰二日不進膳尋諭宰執王淮欲不用易月之制如晉武魏孝文實行三年之喪自不妨聴政淮等奏通鑑載晉武帝雖有此意後來只是宫中深衣練冠帝曰當時羣臣不能將順其美司馬光所以譏之後來武帝竟欲行之謂皇太后之喪淮曰記得亦不能行按文獻通考及宋史禮志俱作王淮奏對而周宻癸辛雜志作周必大語與周必大思陵録合帝曰自我作古何害淮曰御殿之時人主衰絰羣臣吉服可乎帝曰自有等降乃出内批朕當衰服三年羣臣自行易月之令其合行儀制令有司討論詔百官於以日易月之内衰服治事二十日丁亥小祥帝未改服王淮等乞俯從禮制帝流涕曰大恩難報情所未忍二十一日車駕還宫帝衰絰御輦設素仗軍民見者往往感泣詔自今五日一詣梓宫前焚香帝欲衰服素幄引輔臣及班次而禮官奏謂苴蔴三年難行於外庭奏入不出十一月戊戌朔禮官顔師魯尤袤等奏乞大祥禮畢按宋史禮志不云大祥今從文獻通考補正改服小祥之服去杖絰禫祭禮畢改服素紗軟脚折上巾淡黄袍黑銀帶神主祔廟畢改服幞頭黒鞓犀帶遇過宫燒香則於宫中衰絰行禮二十五月而除帝批淡黄袍改服白袍二日己亥大祥四日辛丑禫祭禮畢五日壬寅百官請聴政不允八日三上表引康誥被冕服出應門等語為證九日詔可十五年三月二十日丙戌神主祔廟是日詔曰朕昨降指揮欲衰絰三年縁羣臣屢請御殿易服故以布素視事雖有俟過祔廟勉從所請之詔稽諸典禮心實未安行之終制乃為近古宜體至意勿復有請於是徑行三年之喪焉金世宗大定二十九年章宗即位禮官言自大定二十七年十月祫享至今年正月世宗升遐故四月不行禘禮按公羊傳閔公二年吉禘於莊公言吉者未可以吉謂未三年也注禘祫從先君數朝聘從今君數三年喪畢遇禘則禘遇祫則祫故事宜於辛亥嵗為大祥三月禫祭踰月即吉則四月一日為初吉適當孟夏禘祭之時可為親祠詔從之及期以孝懿皇后崩而止五月禮官言世宗升祔已三年尚未合食於祖宗若來冬遂行祫禮皇帝見居心喪喪中之吉春秋譏其速恐冬祫未可行乞依故事三年喪畢祫則祫禘則禘於明昌四年四月一日釋心喪行禘禮上從之按金史凶禮雖闕而章宗時禮官所奏於喪禮有闗故録之元英宗至治二年九月丙辰按元史祭祀志誤作八月丙辰今從本紀改正太皇太后崩諡昭獻元聖太常院官奏國哀以日易月旬有二日外乃舉祀事按元史本紀十月戊辰享太廟以國哀迎香去樂明成祖永樂二十二年崩禮部尚書兼太常卿吕震奏太行遺命喪服一如髙皇帝倣漢制以日易月今已踰二十七日按漢文帝三十六日釋服唐明皇肅宗之喪乃降三十六日為二十七日後之議禮者以二十七日為以日易月之漢制皆沿應氏之失也請上釋衰服服烏紗冠素服黑角帶臨朝仁宗不聴命六部都察院詳議以聞震與六部都察院奏上宜服素衣冠黑角帶羣臣從君服仁宗曰梓宫在殯朕何忍遽易自是臨朝素冠麻衣麻絰朝退仍衰服成化二十三年戊辰憲宗純皇帝之喪至是已百日上以梓宫在殯仍不釋服視事百官素服朝𠫭如舊丙子監察御史曹璘上疏請梓宫發引之日上衰絰杖履至大明門外率百官拜哭而别仍率宫中行三年之喪時潘府請力排羣議斷自聖心定為三年之喪詔禮官博士𠫭考載籍使喪不廢禮朝不廢政合於古不戾於今行於上可通於下則大本以立大經以正從之奔大喪奔山陵附周漢宋遼元明周書康王之誥太保率西方諸侯入應門左畢公率東方諸侯入應門右胡氏安國曰此奔成王之喪也諸侯為天子服斬衰當以所聞前後而奔喪安得以為修服于國而可乎春秋諸侯于天王崩而行郊禮受與國之朝聘修禮於他國皆特書以致貶胡氏安國汪氏克寛髙氏閌諸儒論之甚嚴此諸侯為天子奔喪制服之舊制也漢昭帝元平元年崩大將軍霍光徴昌邑王賀典喪至霸上大鴻臚郊迎騶奉乘輿車王使僕壽成御郎中令龔遂參乘旦至廣明東都門遂曰禮奔喪望見國都哭此長安東郭門也白虎通曰禮曰王者崩諸侯悉奔喪何臣子悲哀慟怛莫不欲觀君父之棺柩盡悲哀者也又為天子守蕃不可頓空也故分為三部有始死先奔者有得中來盡其哀者有得㑹喪奉送君者七月之間諸侯有在京師親供臣子之事者有號泣悲哀奔走道路者有居其國哭痛思慕竭盡所供以助喪事者是四海之内臣下若喪考妣之義也以上杜典不載今補纂宋太祖開寶九年崩遺詔諸道節度防禦團練使刺史知州等不得輒離任赴闕遼義宗按遼史宗室𫝊義宗名倍太祖長子神冊元年立為皇太子留治東土即東丹國太祖訃至即日奔赴山陵知皇太后本意欲立徳光讓以大位元太祖崩於薩里川哈喇圖之行宫時率師伐金遺命以太宗嗣位太祖定西域太宗攻城畧地之功居多時太宗不在左右及訃至始自和博之地來㑹喪乃遵遺詔即位於和林和林本唐回鶻地自太祖定河北即建都於此為㑹同之所後改和寧路明太祖遺詔諸王聞喪各於本國哭臨不必赴京中外管軍戍守官員毋得擅離信地許遣人至京洪熙元年仁宗崩皇太子還自南京至良鄉宫中始發喪宣遺詔文武官常服於午門外四拜宣畢舉哀復四拜易素服迎皇太子於盧溝橋橋南設幕次香案皇太子至常服詣次四拜聴宣遺詔復四拜哭盡哀易素服至長安右門下馬步哭至宫門外釋冠服被髪詣梓宫前五拜三叩首哭盡哀就喪次國有大喪受他國弔慰服議宋遼宋真宗之喪契丹遣殿前都㸃檢崇義軍節度使耶律賽音翰林學士工部侍郎知制誥馬貽謀充大行皇帝祭奠使副左林牙右金吾衛上將軍蕭日新利州觀察使馮延林充太皇后弔慰使副右金吾衛上將軍耶律寧引進使姚居信充皇帝弔慰使副所司預於滋福殿設大行皇帝神御座又於稍東設御座祭奠弔慰使副各素服由西上閤門入陳禮物於庭中書門下樞宻院並立於殿下再拜訖升殿分東西立禮直官閤門舎人贊引耶律賽音等詣神御座前階下俟殿上簾捲使副等並舉哭殿上皆哭再拜訖引升殿西階詣神御座前上香奠茶酒貽謀跪讀祭文畢降階復位又舉哭再拜訖稍東立俟皇太后升座簾外侍立舎人引慰弔祭奠使副朝見殿上舉哭左右皆哭弔慰使副蕭日新等升殿進書訖降座俟皇帝升座舎人引弔慰祭奠使副朝見皇帝舉哭左右皆哭弔慰使副耶律寧等升殿進書訖賜賽音等襲衣冠帶器幣鞍馬隨行實里牙校等衣服銀帶器幣有差淳熙十五年二月宰執進呈禮官閤門國信所定弔慰使副徳壽宫宰執以下皆用常服周必大奏昨顯仁時北使副至已是祔廟故用常服今大行太上皇帝在殯陛下方縗絰受弔臣等亦難冠裳侍立况啓殯發引服如初喪固未除也上曰宰執侍從當如大祥服四脚幞頭縗絰去杖正得中矣遼道宗崩天祚皇帝問禮於耶律固宋國遣使弔及致祭歸賵皇帝喪服御游仙之北别殿使入門皇帝哭使者詣柩前上香讀祭文訖又哭有司讀遺詔慟哭使者出少頃復入陳賻賵於柩前皇帝入臨哭退更衣杜典原書無受弔服議今因宋遼事纂入君遣使弔他國君宋遼金宋仁宗天聖九月七月契丹使來告其主隆緒之喪遣使祭奠弔慰至和元年九月契丹主宗真殂遣使祭奠弔慰孝宗淳熙十六年三月金遣王元徳等來告哀遣諸葛廷瑞沈揆等往弔祭遼太宗天顯九年閏月戊午唐遣使告哀即遣弟弔祭㑹同五年八月遣天城軍節度使蕭拜石弔祭於晉聖宗太平十年宋真宗崩薛貽廓報哀入境幽州急遞先聞帝不俟貽廓至闕集大臣舉哀詔沿邊州軍不得作樂興宗重熙十七年夏國王李元昊薨遣永興宫使耶律鈕斡哩等慰奠道宗清寧九年宋仁宗崩遣使祭大行於皇儀殿遂見宋嗣帝英宗於東廟金世宗大定二十八年正月遣宣徽使富察克忠為宋弔祭使二月宋遣使獻先帝遺留物宋使朝辭以所獻物中玉器五玻璃器二十及弓劒之屬使還遺宋曰此皆爾前主珍玩之物所宜寶藏以無忘追慕今受之義有不忍歸告爾主使知朕意也章宗承安五年十月宋遣使來告孝宗哀以工部尚書烏庫哩誼等為弔祭使十一月宋復遣使來告光宗哀以河南路統軍使充等為弔祭使泰和四年正月髙麗嗣子韺遣使來告其父晫哀四月遣西上閤門使張偁等為髙麗勅祭使東上閤門使石慤等為慰問并起復横賜使欽定續通典卷七十四
