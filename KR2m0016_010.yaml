body:
  text: 食貨户口丁中五代宋遼金元明臣等謹按杜典户口丁中各自為目而丁中仍雜以户口未能條分縷析今依通考之例合户口丁中為一凡正史所載以及他書之可以援據者備為捃托詳列於左又按丁中之制自唐後惟宋金明可考五代及遼元則未詳云五代亂亡相繼疆土分裂中原户口之數梁唐晉漢紀載莫詳梁開平二年尚書令户部奏請詔天下州府準舊章申送户口帳籍從之唐天成三年殿中監李延範奏請指揮諸道州府每逃户歸業後委州司各與公慿二年內放免兩稅差科如有違者許州論訴勘責若州縣官招得五百户以上乞等第奬酬從之周廣順三年敕天下州府及縣除赤縣畿縣次赤次畿外其餘三千户以上為望縣二千户以上為緊縣一千户以上為上縣五百户以上為中縣不滿五百户為中下縣户部奏據今年諸州府所管縣户數目合定為望縣六十四緊縣七十上縣一百二十四中縣六十五下縣九十七顯德六年總簡户二百三十萬九千八百一十二此周之户數略可考見者也宋太祖建隆元年户九十六萬七千三百五十三乾德元年令諸州嵗奏男夫二十為丁六十為老是年平荆南得户十四萬二千三百平湖南得户九萬七千三百八十八三年平蜀得户五十三萬四千三十九開寶四年平廣南得户十七萬二百六十三八年平江南得户六十五萬五千六十五九年天下主客户三百九萬五百四太宗太平興國三年陳洪進錢俶獻閩浙諸州之地四年平太原又得户七十三萬七千八百七十八是時天下既一疆理幾復漢唐之舊而户數不及其半歷百餘年招徠降附休養生息至神宗元豐三年天下總四京一十八路按元豐間又析為二十三後復置京畿路合二十四路户主客一千四百八十五萬二千六百八十四口主客三千三百三十萬三千八百八十九丁主客一千七百八十四萬六千八百七十三徽宗崇寧元年計天下增至户二千一萬九千五十口四千三百八十二萬七百六十九視漢唐盛時蓋有加焉政和三年詳定九域圖志蔡攸等言天下户口數類多不實且以河北二州言之德州主客户五萬二千五百九十九而口才六萬九千三百八十五霸州主客户二萬二千四百七十七而口才三萬四千七百一十六通二州之數率三户四口則户版刻隱可知乞詔有司申嚴法令務在核實又淮南轉運副使徐閎中言九域志在元豐間主客户共一千六百餘萬大觀初已二千九十一萬乞詔諸路應奏户口嵗終再令提刑提舉司參考同保從之按馬氏通考云古今户口之盛無如崇寧大觀之間然觀當時諸人所言則版籍殊欠核實所載似難憑據謹附識髙宗南渡中原陜右盡入於金所存止十五路紹興八年尚書劉大中奏自中原陷沒東南之民死於兵火疫癘水旱以至為兵為緇黃及去為盜賊餘民之存者十無二三姦臣虐用其民誅求過數丁鹽紬絹最為疾苦愚民寧殺子而不願輸生女者又多不舉乞守令滿日以生齒增減為殿最又詔諸州縣鄉村五等坊郭七等以下户及無等第貧乏之家生男女不能養贍者於常平錢內人攴四貫仍委守令勸諭父老曉譬禍福若奉行如法所活數多監司保明推賞至寧宗嘉定十六年諸路主客户一千二百六十七萬八百一口二千八百三十二萬八十五較之崇寧蓋已減半理宗以後國勢日蹙景定五年户部獻今年民數僅户五百六十九萬六千九百八十九口一千三百二萬六千五百三十二而宋旋以亡此宋代户口盛衰之數大略如此也遼時户口之數不甚可考據地理志所載五京道民户僅得五千餘萬諸州縣不可計者尚多按遼史營衛兵衛志載有宫衛之户曰正户曰蕃漢轉户共二十萬三千丁四十萬八千又有五京鄉丁其可考見者約一百一十萬七千三百為鄉兵并附録如此太祖初年以兵四十萬攻下河東河北九郡獲其生口九萬五千伐女直獲其户三百先是德祖俘奚七千户徙饒樂之清河至是創實喇部分十三縣五年討東西奚盡有錫欣之衆東際海南暨白檀西踰松漠北抵潢水凡五部咸入版籍神册元年親征突厥吐渾黨項小番沙陀諸部俘户一萬五千六百四年修遼陽故城以漢民渤海户實之十月破烏爾古部俘獲生口一萬四千二百五年擒天德節度使宋瑶徙其民於隂州六年分兵掠檀順安逺三河良鄉望都潞滿城遂城俘其民徙內地十二月晉新州防禦使王郁率其衆來降徙其衆於潢水之南又徙檀順民於東平瀋州天贊三年五月徙薊州民實遼州地天顯三年詔遣耶律羽之徙東丹民實東平其民或亡入新羅女直因詔困乏不能遷者許上國富民給贍而𨽻屬之四年二月閲約尼氏户籍太宗會同九年吐谷渾獻生口千户大同元年四月俘晉主重貴歸順七十六處得户一百九萬百一十八時籍上京户丁以定賦稅聖宗統和元年南京統軍使耶律善補招宋邊七十餘村來附又招亡入宋者得千餘户歸國詔令慰撫八年七月詔東京路併省州縣以其民分𨽻他郡九年七月通括户口十三年四月詔諸道民户應歷以來脅從為部曲者仍籍州縣十四年三月詔安集朔州流民十五年正月徙梁門遂城泰州北平民於內地三月通括宫分人户開泰二年四月詔從上京請以韓斌所括贍國達掄河奉豪等州户二萬五千四百有竒置長霸興仁保和等十縣四年四月以耶律世良所獲于厥衆并達勒達所獲實默里部民城臚胊河上居之八年五月遷寧州渤海户於遼土二河之間道宗咸雍時遣使括三京隱户不得以耶律引吉代之得三千餘户馬人望為三司度攴判官會檢括户口末兩旬而畢同知留守蕭保先怪而問之人望曰民户若括之無遺他日必長厚斂之弊大率十得六七足矣保先謝曰君慮逺吾不及也太康九年六月詔諸檢括脫户罪至死者原之大安三年以民多流亡除安泊逃户徵償法天祚帝天慶三年籍諸道户徙大牢古山圍場地居民于别土八年六月通祺雙遼四州之民八百餘户降於金是時蕭博和哩等十五人各率户降於金劉宏亦以懿州户三千降金而遼不能國矣金制户有數等有課役户不課役户本户雜户正户監户官户按有物力者為課役户無者為不課役户女直為本户漢人及契丹為雜户明安之奴婢免為良者止隸本部為正户沒入官良人𨽻宫籍監者為監戶沒入官奴婢𨽻太府監者為官户奴婢户二稅户金承遼制多以良民賜諸寺分其稅一半輸官一半輸寺故名二稅户男女二嵗以下為黃十五以下為小十六為中十七為丁六十為老無夫為寡妻妾諸廢篤疾不為丁凡户口計帳三年一籍自正月初州縣以里正主首明安穆昆則以寨使詣編户家責手實具男女老幼年與姓名生者增之死者除之正月二十日以實數報縣二月二十日申州以十日內達上司無逺近皆以四月二十日到部呈省凡漢人渤海不得充明安穆昆户太祖收國元年六月遼通祺雙遼等州八百餘户來歸命分置諸部擇膏腴地處之太宗天會元年十一月徙遷潤來隰四州之民於瀋州後海陵南侵遣使籍諸路明安部族及契丹奚人不限丁數悉僉之凡二十四萬又僉中都南都中原渤海丁壯年二十以上五十以下者皆籍之凡二十七萬雖親老丁多求一子留侍亦不聽世宗大定三年詔流民未復業者增限招誘十七年五月省奏咸平府路一千六百餘户自陳皆長白山錫欣察遜河女直人遼時移居於此號移典部今乞釐正詔從之二十一年六月徙銀山側民于臨潢又命避役之户舉家逃於他所者元貫及所寓司縣官同罪為定制二十三年奏明安穆昆户口之數明安二百二穆昆一千八百七十八户六十一萬五千六百二十四口六百一十五萬八千六百三十六內正口四百八十一萬二千六百六十九奴婢口一百三十四萬五千九百六十七在都宗室將軍司户一百七十口二萬八千七百九十內正口九百八十一奴婢口二萬七千八百八德哷勒唐古二部五乣户五千五百八十五口十三萬七千五百四十四內正口十萬九千四百六十三奴婢口一萬八千八十一先是大定初舉國户才三百餘萬至二十七年户六百七十八萬九千四百四十九口四千四百七十萬五千八十六章宗明昌元年奏舉國户六百九十三萬九千口四千五百四十四萬七千九百六年奏舉國內女直契丹漢户七百二十二萬三千四百口四千八百四十九萬四百泰和七年奏舉國內户七百六十八萬四千四百三十八口四千五百八十一萬六千七十九此金版籍之極盛也衛紹王時軍旅不息宣宗南遷所在凋敝户口日耗軍費日急賦斂皆仰給於河南民不堪命率棄田廬相繼亡去雖屢諭招撫卒無還者自是户口之數不復可紀元代幅員既廣户口殷繁計其盛時雖漢唐之世有不逮焉初太宗併金得中原州郡七年下詔籍民自燕京順天等三十六路户八十七萬三千七百八十一口四百七十五萬四千九百七十五憲宗二年籍漢地民户增二十餘萬世祖中統二年計天下户一百四十一萬八千四百九十九三年天下户一百四十七萬六千一百一十六四年天下户一百五十七萬九千一百十至元元年天下户一百五十八萬八千一百九十五二年天下户一百五十九萬七千六百一三年天下户一百六十萬九千九百三四年天下户一百六十四萬四千三十五年天下户一百六十五萬三百八十六六年天下户一百六十八萬四千一百五十七七年天下户一百九十二萬九千四百四十九八年天下户一百九十四萬六千二百七十九年天下户一百九十五萬五千八百八十十年天下户一百九十六萬二千七百九十五十一年天下户一百七十六萬七千八百九十八十二年天下户四百七十六萬四千零十三年平宋全有版圖二十七年籍天下户一千六百八十四萬八百有竒於是南北之户總書於策者一千三百一十九萬六千二百有六口五千八百八十三萬四千七百一十有一而山澤溪洞之民不與焉文宗至順元年户部錢糧户數一千三百四十萬六百九十九視前世又增二十萬有竒矣明制户凡三等曰民曰軍曰匠民有儒有醫有隂陽軍有校尉有力士弓鋪兵匠有厨役裁縫馬船之類瀕海有鹽竈寺有僧觀有道士畢以其業著於籍丁有二等曰成丁曰未成丁民始生籍其名曰不成丁年十六曰成丁成丁而役六十而免其人户避徭役者曰逃户年飢或避兵他徙者曰流民有故而出僑於外者曰附籍朝廷所移者曰移徙凡逃户督令還本籍復業賜復一年老弱不願歸者令在所著籍授田輸賦凡流民令勘籍編甲互保屬在所甲長管轄之設撫民佐二官歸本者勞徠安輯給牛種口糧憲宗成化初荆襄寇亂流民百萬湖廣巡撫項忠楊璿下令逐之死者無算祭酒周洪謨著流民説引東晉僑置郡縣之法使近者附籍逺者設州縣以撫之都御史李賔上其説於是帝命招撫流民十二萬户給間田置鄖陽府立上津等縣統治之河南巡撫張瑄亦請輯西北流民並從其請凡附籍者英宗正統時令老疾致仕事故官家屬離本籍千里者許收附不及千里者發還代宗景泰中令民籍者收附軍匠竈役冒民籍者發還其移徙者明初嘗徙蘇松嘉湖杭民之無田者四千餘户往耕臨濠給牛種車糧以資遣之三年不征其稅徐達平沙漠徙北平山後民三萬五千八百餘户散處諸府衛籍為軍者給衣糧民給田又以沙漠遺民三萬二千八百餘户屯田北平置屯二百五十四開地一千三百四十三頃復徙江南民十四萬於鳳陽户部郎中劉九臯言古狹鄉之民聽遷之寬鄉欲地無遺利人無失業也太祖採其議遷山西澤潞民於河北後屢徙浙西及山西民於滁和北平山東河南又徙登萊青民於東昌兖州徙直𨽻浙江民二萬户於京師充倉腳夫成祖時核太原平陽澤潞遼沁汾丁多田少及無田之家分其丁口以實北平自是以後移徙者鮮矣又太祖初懲元季餘弊豪強侮貧弱立法多右貧抑富嘗命户部籍浙江等九布政司應天十八府州富民一萬四千三百餘户徙其家以實京師謂之富户成祖時復選應天浙江富民三千户充北京宛大二縣廂長按明制在城曰坊近城曰廂鄉都曰里附籍京師仍應本籍徭役供給日久貧乏逃竄輒選其本籍殷實户僉補宣宗宣德間定制逃者發邊充軍官司鄉里隱匿者俱坐罪孝宗𢎞治五年始免解在逃富户每户徴銀三兩與廂民助役世宗嘉靖中減為二兩以充邊餉太祖立法之意本倣漢徙富民實關中之制其後事久弊生遂為厲階今按歷朝户口之數增減不一其可考者洪武二十六年天下户一千六百五萬二千八百六十口六千五十四萬五千八百十二𢎞治四年户九百十一萬三千四百四十六口五千三百二十八萬一千一百五十八萬厯六年户一千六十二萬一千四百三十六口六千六十九萬二千八百五十六此明代户口之大略也欽定續通典卷十
