body:
  text: 州郡元雲南諸路行中書省為路三十七府二屬府三屬州五十四屬縣四十七其餘甸寨軍民等府不在此數馬站七十四處水站四處比案雲南至元始𨽻版州郡沿革悉照元志詳注他處特繁緣宋志所不載故也雲南諸路道肅政亷訪司大德三年罷雲南行御史臺立肅政亷訪司中慶路上唐姚州閣羅鳯叛取姚州其子鳯伽異增築城曰柘東六世孫劵豐祐改曰善闡歷五代迄宗羇縻而已案明史稿雲南府本滇國地漢置益州郡隋為昆州後廢唐復置尋為南詔䝉氏所據五代時大理段氏為善闡府謹附識元世祖征大理凡收府八善闡其一也郡四部三十有七其地東至普安路之橫山西至緬地之江頭城凡三千九百里而逺南至臨安路之鹿滄江北至羅羅斯之大渡河凡四千里而近憲宗五年立萬户府至元七年改為路八年分大理國三十七部為南北中三路路設逹嚕噶齊并總管十三年立雲南行中書省初置郡縣遂改善闡為中慶路設録事司領縣三州四州領八縣昆明中倚郭唐置元憲宗四年分其地立千戶二至元十二年改善州領昆明縣二十一年州革縣如故案明史槀昆明本漢滇池縣地謹附識富民下至元四年立黎灢千戶十二年即黎灢立縣案明史稿富民本唐西寧州地謹附識宜良下唐匡州即其地蠻酋羅氏於此立城居之名曰羅裒龍元憲宗六年立太池千户𨽻嵩明萬户至元十三年升宜良州治太池縣二十一年州罷為縣後廢太池來屬嵩明州下州在中慶東北治沙札卧城烏蠻車氏所築白蠻名為嵩明昔漢人居之後烏白蠻強盛漢人徙去盟誓於此因號嵩盟漢人嘗立長州築金城阿葛二城䝉氏興改長州為嵩盟部案明史稿云唐時南詔置長城郡宋時大理改嵩盟郡謹附識段氏因之元憲宗六年立嵩明萬户至元十二年復改長州十五年升嵩明府二十二年降為州領二縣楊林下在州東南治楊林城乃雜蠻枳氏車氏斗氏麼氏四種所居之地城東門內有石如羊形故又作羊唐有羊林部落即此地元憲宗七年立羊林千戶至元十二年改為縣卲甸下在州西治白邑村無城郭車蠻斗蠻舊城名為束甸以束為卲憲宗七年立卲甸千戶至元十二年改為縣晉寧州下唐晉寧縣䝉氏段氏皆為陽城堡部元憲宗七年立陽城堡萬戶至元十二年改晉寧州領二縣呈貢下西臨滇澤之濱在路之南州之北其間相去六十里有故城曰呈貢世為些莫強宗部蠻所居元憲宗六年立呈貢千戶至元十二年割詔營切龍呈貢雌甸塔羅和羅忽六城及烏納山立呈貢一縣歸化下在州東北呈貢縣南西濱滇澤地名大吳龍昔吳氏所居後為些莫徒蠻所有世𨽻善闡憲宗六年分𨽻呈貢千户至元十二年割大吳龍安江安􅀈立歸化縣昆陽州下在滇池南僰獹雜蠻所居有城曰巨橋案明史稿昆陽州注云唐置河東等州沒於南詔大理築巨橋城謹附識今為州治閣羅鳯叛唐令曲嚩蠻居之段氏興𨽻善闡元憲宗併羅畐等十二城立巨橋萬户至元十三年改昆陽州領二縣三泊下至元十三年於那龍城立縣易門下在州之西治市坪村世為烏蠻所居段氏時髙智升治善闡奄而有之至元四年立洟門千户十二年改為縣安寧州下唐初置安寧縣𨽻昆州案明史槀本滇國螳螂川地漢益州連然縣謹附識閣羅鳯叛唐後烏白蠻遷居蒙氏終善闡酋孫氏為安寧城主及袁氏髙氏互有其地元憲宗七年𨽻陽城萬戶至元三年立安寧千户十二年改安寧州領二縣祿豐下在州西治白村其地瘴熱非大酋所居惟烏雜蠻居之遷徙不常至元十三年割安寧千户之碌琫化泥驥琮籠三處立祿豐縣因江中有石如甑俗名碌琫譯謂碌為石琫為甑訛為今名羅次下在州北治壓磨吕白村本烏蠻羅部地險俗悍至元十二年因羅部立羅次州𨽻中慶路二十四年改州為縣二十七年𨽻安寧州威楚開南等路下為雜蠻耕牧之地蠻名俄碌歷代無郡邑後爨酋威楚築城俄碌睒居之唐時䝉舍詔閣羅鳯合六詔為一侵俄碌取和子城今鎮南州是也後閣羅鳯叛於本境立郡縣諸爨盡附蒙氏立二都督六節度銀生節度即今路也及段氏興銀生𨽻姚州又名當筯驗及髙升泰執大理國柄封其侄子明量於威楚築外城號德江城傳至其裔長夀元憲宗三年征大理平之六年立威楚萬戶至元八年改威楚路置總管府領縣二州四州領一縣威楚下倚郭至元十五年升威州仍立富民淨樂二縣二十一年降州為威楚縣革二縣為鄉來屬定逺下在路北地名目直睒雜蠻居之諸葛亮征南中經此睒後號為牟州唐䝉氏遣爨蠻酋擡蕚鎮牟州築城曰耐籠至髙氏専大理國政命雲南些英徒酋夷羡徙民二百戶於黃蓬穽其檯蕚故城𨽻髙氏元憲宗四年立牟州千户黃蓬穽為百戶至元十二年改為定逺州黃蓬穽為南寧縣後革縣為鄉改州為縣𨽻本路鎮南州下州在路北昔朴落蠻所居川名缺舍中有城曰雞和至唐時䝉氏併六詔征東蠻取和子雞和二城置石鼓縣又於沙却置俗富郡沙却即今州治至段氏封髙明量為楚公缺舍沙却皆𨽻之元憲宗三年其酋內附七年立缺舍千戶石鼓百户至元二十二年改缺舍千户為鎮南州立定邊石鼓二縣二十四年革二縣為鄉仍𨽻本州南安州下州在路東南昔黑爨蠻祖瓦晟吳居之不𨽻他部至髙氏封威楚方𨽻焉元憲宗立摩芻千戶𨽻威楚萬戶至元十二年改千戶為南安州𨽻本路領一縣廣通下縣在州之北舊名路睒雜蠻居之南詔閣羅鳯曽立路睒縣至段氏封髙明量於威楚其後宜州酋些莫徒裔易裒等附之至髙長夀遂處於路瞍易裒去舊堡二十里山上築城白龍戲新柵憲宗七年長夀內附立路睒千户至元十二年改為廣通縣𨽻南安州開南州下州在路西南其川分十二甸昔朴和泥二蠻所居也至䝉氏興立銀生府後為金齒白蠻所陷移府治於威楚開南遂為生蠻所據自南詔至段氏皆為徼外荒僻之地元中統三年平之以所部𨽻威楚萬户至元十二年改為開南州威逺州下州在開南州西南其川有六昔朴和泥二蠻所居至䝉氏興開威楚為郡而州境始通其後金齒白蠻酋阿只步等奪其地元中統三年征之悉降至元十二年立開南州及威逺州𨽻威楚路武定路軍民府下唐𨽻姚州在滇北昔獹鹿等蠻居之至段氏使烏蠻阿􅝮治納洟胒共龍城於共甸又築城名曰易龍其裔孫法瓦浸盛以其逺祖羅婺為部名元憲宗四年內附七年立為萬户𨽻威楚至元八年併仁德于矢入本部為北路十二年割出二部改本路為武定領州二州領四縣和曲州下州在路西南蠻名叵簉甸僰􅢱諸種蠻所居元憲宗六年改叵簉甸曰和曲至元二十六年升為州領二縣南甸下路治本縣蠻曰瀼甸又稱洟陬籠至元二十六年改為縣元謀下舊名環州元治五甸至元十六年改為縣祿勸州下州在路東北甸名洪農碌劵雜蠻居之至元二十六年立祿勸州領二縣易籠下易籠者城名在州北地名倍場縣境有二水蠻語謂洟為水籠為城因此為名昔羅婺部大酋居之為羣酋會集之所至元二十六年立縣石舊下縣在州東有四甸曰掌鳩曰法塊曰抹捻曰曲蔽掌鳩甸有溪繞其三面凡數十渡故名今訛名石舊至元二十六年立縣鶴慶路軍民府下府治在麗江路東南大理路東北蠻名其地曰鶴川樣共昔𨽻越析詔漢唐未建城邑唐元宗開元末閣羅鳯合六詔為一稱南詔徒治羊苴城地近龍尾鶴柘今府即其地也文宗太和中䝉勸封祐於樣共立謀統郡蒙氏後經數姓如故元憲宗三年內附為鶴州七年立二千戶仍稱謀統𨽻大理上萬户至元十一年罷謀統千戶復為鶴州二十年為燕王分地𨽻行省二十三年升為鶴慶府領一縣劍川下縣治在劍川湖西亦名羅魯城舊案唐史南詔有六節度劍川其二也初䝉氏未合六詔時有浪穹詔與南詔戰不勝遂保劍川更稱浪劍德宗貞元中南詔擊破之奪劍共諸川地其酋徒居劍睒西北四百里號劍羌蒙氏終至段氏改劍川為義督瞼元憲宗四年內附七年立義督千户至元十一年罷千戶立劍川縣雲逺路軍民總管府元貞二年置徹里軍民總管府大德中置大德中雲南省言大徹里地與八百媳婦犬牙相錯勢均力敵今大徹里胡念已降小徹里復控扼地利每多相殺掠胡念日與相拒不得離遣其弟胡倫入朝指畫地形乞别立徹里軍民宣撫司擇通習蠻夷情狀者為之帥招其來附以為進取之地乃立徹里軍民總管府廣南西路宣撫司闕麗江路軍民宣撫司漢越巂郡西徼地昔麼蠻些蠻居之遂為越析詔二部皆烏蠻種居鐵橋唐德宗貞元中其地歸南詔元憲宗三年征大理從金沙濟江麼些負固不服四年春平之立察罕章管民官至元八年立宣慰司十三年改為麗江路立軍民總管府二十二年府罷於通安巨津之間立宣撫司領府一州七州領一縣北勝府在麗江之東唐南詔時鐵橋西北有施蠻者貞元中為異牟尋所破遷其種居之號劍羌名其地曰成偈睒案明史稿云唐時南詔始開其地名北方睒及麼些諸蠻居之號成偈睒互有異同謹附識又改名善巨郡䝉氏終段氏時髙智升使其孫髙大惠鎮此郡案明史稿云段氏改成紀鎮謹附識後𨽻大理元憲宗三年其酋髙俊內附至元十五年立為施州十七年改為北勝州二十年升為府順州在麗江之東俗名牛睒昔順蠻種居劍川共唐貞元間南詔異牟尋破之徙居鐵橋大婆小婆三探覽等川其酋成斗族漸盛自為一部遷於牛睒至十三世孫自瞪猶𨽻大理元憲宗三年內附至元十五年改牛睒為順州蒗蕖州治羅共睒在麗江之東北勝永寧南北之間羅落麼些三種蠻世居之至元九年內附十六年改羅共睒為蒗蕖州永寧州昔名樓頭睒接吐蕃東徼地名答藍麼些蠻祖泥月烏逐出吐蕃遂居此睒世屬大理元憲宗三年其三十一世孫和字內附至元十六年改為州通安州治在麗江之東雪山之下昔名三睒僕繲蠻所居其後麼些蠻葉古乍奪而有之世𨽻大理元憲宗三年其二十三世孫麥良內附中統四年以麥良為察罕章管民官至元九年其子麥兀襲父職十四年改三睒為通安州蘭州在蘭滄水之東漢明帝永平中始通博南山道渡蘭滄水置博南縣唐為盧鹿蠻部至段氏時置蘭溪郡𨽻大理元憲宗四年內附𨽻察罕章管民官至元十二年改蘭州寶山州在雪山之東案明史稿寶山州本漢邪龍縣地謹附識昔麼些蠻居之其先自樓頭徙居此二十餘世元世祖征大理自卞頭濟江由羅邦至羅寺圍大匱等塞其酋內附名其寨曰察罕呼魯罕至元十四年以大匱七處立寶山縣十六年升為州巨津州昔名羅波九睒北接三川鐵橋西鄰吐蕃麼些大酋世居之元憲宗三年內附至元十四年於九睒立巨津州蓋以鐵橋自昔為南詔吐蕃交會之大津渡故名領一縣臨西下縣在州之西北舊名羅裒間居民皆麼些二種蠻至元十四年立大理州縣於羅裒間立臨西縣以西臨吐蕃境故也東川路下至元二十八年立茫部路軍民總管府下領州二益良州下強州下孟傑路自東川路以下闕元泰定帝泰定三年八百媳婦蠻請官守置木安孟傑二府之地普安路下治在盤町山陽巴盤江東古夜郎地秦為黔中地兩漢𨽻牂牁郡蜀𨽻興古郡隋立牂州唐置西平州後改興古郡為盤州蒙氏叛唐其地為南詔東鄙東爨烏蠻七部落居之其後爨酋阿宋逐諸蠻據其地號于矢部世為酋長元憲宗七年其酋內附命為于矢萬户至元十三年改普安路總管府明年更立招討司十六年改為宣撫司二十二年罷司為路曲靖等路宣慰司軍民萬戶府曲靖二州在漢為夜郎味縣地蜀分置興古郡隋初為恭州協州唐置南寧州東西爨分烏白蠻二種自曲靖州西南昆川距龍和城通謂之西爨白蠻自彌鹿升麻二川南至步頭通謂之東爨烏蠻太宗貞觀中以西爨歸王為南寧都督襲殺東爨首領蓋聘南詔閣羅鳯以兵脅西爨徙之至龍和皆殘於兵東爨烏蠻復振徙居西爨故地世與南詔為婚居故曲靖州元宗天寶末征南詔進次曲靖州大敗其地遂沒於蠻元憲宗六年立磨彌部萬戶至元八年改為中路十三年改曲靖路總管府二十年以𨽻皇太子二十五年升宣撫司領縣一州五州領六縣南寧下倚郭唐以西爨歸王為南寧州都督治石城及閣羅鳯叛州廢䝉氏改石城郡至段氏烏蠻磨彌部酋據五城元憲宗三年內附六年立千户𨽻磨彌部萬戶至元十三年升南寧州二十二年革為縣陸涼州下即漢牂牁郡之平夷縣案明史稿云晉於漢之平夷縣置平夷郡唐屬盤州謹附識南詔叛後落溫部蠻世居之元憲宗三年內附立落溫千户屬落蒙萬户至元十三年改為陸涼州領二縣芳華下河納下治蔡村越州下在路之南其州名魯望普麼部蠻世居之元憲宗四年內附六年立千戶𨽻末迷萬戶至元十二年改越州𨽻曲靖路羅雄州下與溪洞蠻獠接壤歷代未嘗置郡其地為塔敝納夷甸俗傳盤瓠六男其一曰䝉由邱後裔有羅雄者居此甸至其孫普恐名其部曰羅雄元憲宗四年內附七年𨽻普麼千戶至元十三年割夜苴部為羅雄州𨽻曲靖路馬龍州下地名曰撒匡昔僰刺居之盤瓠裔納垢逐舊蠻而有其地至羅苴內附於本部立千戶元至元十三年改為州即舊馬龍城也領一縣通泉下在州西南與嵩明州楊林縣接壤納垢之孫易陬分居其地元初為易龍百户𨽻馬龍千戶至元十三年改名通泉縣𨽻馬龍州霑益州下在本路之東北據南盤江北盤江之間唐初置州案明史稿云霑益州漢宛溫縣地屬牂牁郡唐初置西平州改盤州謹附識天寶末沒於蠻為僰刺二種所居後唐彌部奪之元初其孫普垢􅝮內附憲宗七年以本部𨽻曲靖磨彌萬户府至元十三年改霑益州領三縣交水下治易陬龍城其先磨彌部酋䝉提居之後大理國髙護軍逐其子孫據之憲宗五年內附至元十三年即其城立縣石梁下係磨彌部又名伍勒郎其酋世為巫居石梁原山至元十三年為縣羅山下亦名落䝉山乃磨彌部東境澄江路下治在滇池東南唐屬牂州𨽻黔州都督府開元中降為羈縻州其地曰羅伽甸初麼些蠻居之後為僰蠻所奪南詔䝉氏為河陽郡至段氏麼些蠻之裔復居此甸號羅伽部元憲宗四年內附六年以羅伽部為萬戶至元三年改萬戶為中路十六年升為澄江路領縣三州二州領三縣河陽下內附後為千戶至元十六年為河陽州二十六年降為縣江川下在澄江路南星雲湖之北䝉氏叛唐使白蠻居之至段氏些麼徒蠻之裔居此城更名步雄部其後弄景內附即本部為千户元至元十三年改千戶為江川州二十年降為縣陽宗下在本路西北明湖之南昔麼些蠻居之號曰強宗部其酋盧舍內附立本部千戶至元十三年改為縣新興州下漢新興縣唐初𨽻牂州後南詔叛降為羈縻州案明史稿云漢青蛉弄棟二縣地梁沒於西爨唐羈縻求州謹附識蒙氏為溫富州段氏時麼些蠻分居其地內附後立為千戶元至元十三年改新興州案明史稿云元置部傍千户所改休納縣又置新興州尋省縣入州謹附識𨽻澄江路領二縣普舍下在州西北昔有強宗部蠻之裔長曰部傍據普具龍城次曰普舍據普札龍城二城之西有白城漢人所築二酋屢爭其地莫能定後普舍孫苴􅝮內附立本部為千戶至元十三年改千戶為普舍縣治普札龍城𨽻新興州研和下麼些徒蠻步雄居之其孫龍鐘內附立百戶至元十三年改為縣路南州下州在本路之東木名路甸有城曰撒吕黑爨之裔落䝉所築子孫世居之因名落䝉部元憲宗朝內附即本部立萬戶至元七年併落蒙羅伽末迷三萬戶為中路十三年分中路為二路改羅伽為澄江路案前澄江路注云憲宗六年以羅伽部為萬户至元三年改萬户為中路十六年升為澄江路與此處年分不合考雲南通志至元十三年賽音諤德齊以改定雲南諸路名號來上凡為路三十七澄江之升當在此時前作十六年蓋誤謹附識落蒙為路南州𨽻澄江路領一縣邑市下至元十三年即邑市彌歪二城立邑市縣彌沙等五城立彌沙縣二十四年併彌沙入本縣𨽻路南州普定路本普里部歸附後改普定府大德七年改為路仁德府昔僰刺蠻居之其部曰仲札溢源後烏蠻之裔新丁奪而有之至四世孫因其祖名新丁以為部號語訛為仁地案明史稿云南詔為尋甸部謹附識元憲宗五年內附明年立本部為仁地萬户至元初復叛四年降之仍為萬戶十三年改萬戶為仁德府領縣二為美下縣治在府北地夕溢浦適侣瞍甸即仁地故部至元二十四年置縣歸厚下縣治在府西地名易浪湳龍舊𨽻仁地部至元二十四年分立二縣曰倘俸曰為美二十五年改倘俸曰歸厚羅羅蒙慶等處宣慰司都元帥府建昌路下本古越巂地唐初設中都府案唐書地理志作中都督府元志蓋誤治越巂肅宗至德中沒于吐蕃貞元中復之懿宗時䝉詔立城曰建昌府以烏白二蠻實之其後諸酋爭強不能相下分地為四推段興為長其裔浸強遂併諸酋自為府主大理不能制傳至阿宗娶落蘭部建蒂女沙智元憲宗朝建蒂內附以其壻阿宗守建昌至元十二年析其地置總管府五州二十三建昌其一路也設羅羅宣慰司以總之本路領縣一州九州領縣一中縣治在住頭回甸蓋越巂之東境也所居烏蠻自别為沙麻部以酋長所立處為中州至元十年內附十四年仍為中州二十二年降為縣𨽻建昌路建安州下即總府所治建蒂既平分建昌府為萬戶二又置千戶二至元十五年割建鄉城十四村又建蒂四村立寶安州十七年改本千戶為建安州二十六年革寶安州以其鄉村來屬永寧州下在建昌之東郭唐時南詔立建昌郡領建安永寧二州元至元九年西平王平建蒂十六年分建昌為二州在城曰建安東郭曰永寧俱𨽻建昌路瀘州下州在路西昔名沙城瞼即諸葛武侯擒孟獲之地段氏立城名洟籠𨽻建昌元憲宗時建蒂內附復叛至元九年平之十五年改洟籠為瀘州禮州下州在路西北所治日籠麼城南詔末諸蠻相侵奪至段氏興併有其地裔孫阿宗內附復叛元至元九年平之設千戶十五年改為禮州領一縣瀘沽縣在州北昔羅落蠻所居至䝉氏霸諸部以烏蠻酋守此城後漸盛自號曰落蘭部或稱羅落其裔蒲德遣其姪建蒂內附建蒂繼叛殺蒲德自為酋長併有諸部至元九年平之設千戶十三年升萬户十五年改縣里州下唐𨽻巂州都督䝉詔時落蘭部小酋阿都之裔居此因名阿都部元憲宗時其酋納空隨建蒂內附中統三年叛至元十年其子耶吻效順𨽻烏蒙十八年設千户二十二年同烏蠻叛奔羅羅斯二十三年升軍民總管府二十六年府罷為州𨽻建昌路闊州下州治密納甸昔仲由䝉之裔孫名科居此因以名為部號後訛為闊至三十七世孫僰羅內附至元九年設千户二十六年改為州卭部州下州在路東北大渡河之南越巂之東北唐立卭部縣後沒于蠻至宋嵗貢名馬土物封其酋為卭都玉今其地稱為卭部川治烏弄城昔麼些蠻居之後仲由䝉之裔奪其地元憲宗時內附中統五年立卭部川安撫招討使𨽻成都元帥府至元十年割屬羅羅斯宣慰司二十一年改為州隆州下州在路之西南與漢卭部縣接境案漢書地理志越巂郡有卭都縣元志作卭部蓋誤唐㑹川縣之西北䝉氏改㑹川為會同邏立五瞼本州為邊府瞼其後瞼主楊大蘭於瞼北塏上立城分派而居名曰大隆城即今州治也元至元十三年內附十四年設千戶十七年改隆州姜州下姜者蠻名也烏蠻仲牟由之裔阿壇絳始居閟畔部其孫阿羅仕大理國主髙泰是時會川有城曰龍納羅落蠻世居焉阿羅􅝘髙氏之勢攻拔之遂以祖名曰絳部元憲宗時隨閟畔內附因𨽻焉至元八年為落蘭部酋建蒂所破九年平之遂𨽻會川後屬建昌十五年改為姜州二十七年復屬閟畔部後又屬建昌德昌路軍民府下漢卭都縣地唐沒於南詔路在建昌西南所居蠻號屈部元至元九年內附十二年立定昌路以本部為昌州二十三年罷定昌路併入德昌路治本州葛魯城領州四昌州下路治本州初烏蠻阿屈之裔寖強用祖名為屈部其孫烏則至元九年內附十二年改本部為州兼領普濟威龍𨽻定昌路二十三年罷定昌路併𨽻德昌德州下在路之北其地今名吾越甸城曰亦苴龍所居蠻苴郎以逺祖名部曰赬綖憲宗時內附至元十二年立千户十三年改為德州𨽻德平路二十三年改𨽻德昌威龍州下州在路西南本名巴翠部領小部三一曰沙媧普宗二曰鳥雞泥祖三曰媧諾龍菖蒲皆獹魯蠻種也至元十五年合三部立威龍州𨽻德昌普濟州下州在路西北本名玗甸昔為荒僻之地獹魯蠻世居之後屬屈部至元九年隨屈部內附十五年於玗甸立定昌路案前德昌路注云至元十二年立定昌路此處作十五年疑誤二十三年路革改𨽻德昌會川路下路在逮昌南唐移卭部於此其地當征蠻之要衝諸酋聽會之所故名天寶末沒於南詔立會川都督府又號清寧郡至段氏仍為會川府元至元九年內附十四年立會川路治武安州領州五武安州下蠻稱龍泥城至元十四年立管民千戶十七年改為武安州黎溪州下蠻云黎彄訛為今名初烏蠻與漢人雜處及南詔閣羅鳯叛徙白蠻守之䝉氏終羅羅逐去白蠻段氏興令羅羅蠻乞夷據其地至元九年其裔阿夷內附改其部為黎溪州永昌州下在路北治故歸依城即古會川也唐天寶末沒於南詔置會川都督至䝉氏改會同府置五瞼徙張王李趙楊周髙段何蘇龔尹十二姓於此以趙氏為府主居今州城趙氏弱王氏據之及段氏與髙氏專政逐王氏以其子髙政治會川元憲宗三年征大理髙氏逃去九年故酋王氏孫阿龍率衆內附至元八年以其男阿禾領會川十四年改管民千户十七年立永昌州𨽻㑹川路㑹理州下州在㑹川路東南唐時南詔屬會川節度地名昔陀有蠻名阿壇絳亦仲由䝉之遺種其裔羅於則得昔陀地居之取祖名曰絳部後強盛盡有四州之地號䝉歪元憲宗八年其孫亦蘆內附𨽻閟畔萬户至元四年屬落蘭部十三年改𨽻會川十五年置會理州仍𨽻㑹川路二十七年復屬閟畔部麻龍州下麻龍者城名也地名棹羅能烏蠻䝉次次之裔祖居閟畔東川後普恐遷苖卧龍其孫阿麻內附至元五年為建蒂所併十二年屬㑹川十四年立管民千戶𨽻會川路十七年立為州二十七年割屬閟畔部柏興府漢為定笮縣𨽻越巂郡唐立昆明縣天寶末沒於吐蕃後復屬南詔改香城郡元至元十年其鹽井摩沙酋羅羅將􅢱鹿茹庫內附十四年立鹽井管民千户十七年改為閏鹽州以􅢱鹿部為普樂州俱𨽻德平路二十七年併普樂閏鹽二州為閏鹽縣立柏興府𨽻羅羅宣慰司領縣二閏鹽下倚郭以縣境有鹽井故名金下縣在府北漢越巂郡北境與吐蕃接元至元十五年立為金州後降為縣以縣境斛僰和山出金故名臨安廣西元江等處宣慰司兼管軍萬戶府臨安路下唐𨽻牂州按明史槀云古句町國漢句町縣屬牂牁郡唐羈縻牂州地謹附識天寶末沒於南詔䝉氏立都督府二其一曰通海郡段氏改為秀山郡阿僰部蠻居之元憲宗六年內附以本部為萬户至元八年改為南路十三年又改為臨安路領縣二千户一州三州領二縣河西下縣在把麓湖之南又名其地曰休臘昔莊蹻王其地唐初于姚州之南置西宗州領三縣河西其一也天寶後沒於蠻為步雄部後阿僰蠻易渠奪而居之元憲宗六年內附七年即阿蠻部立萬户休臘𨽻之至元十三年始為河西州𨽻臨安路二十六年降為縣䝉自下縣界南鄰交趾西近建水州縣境有山名自則漢語訛為䝉自上有故城白蠻所築即今縣治下臨巴甸南詔時以趙氏鎮守至段氏阿僰蠻居之元憲宗六年內附繼叛七年平之立千戶𨽻阿僰萬户至元十三年改阿僰萬户為臨安路以本千户為縣捨資千户䝉自縣之東阿僰蠻所居地昔名褒古又曰部嫋踵甸傳至裔孫捨資因以為名內附後𨽻䝉自千户至元十三年改䝉自為縣其地近交趾遂以捨資為安南道防送軍千戶𨽻臨安路建水州下在本路之南治故建水城唐元和間䝉氏所築又稱步頭亦云巴甸每夏秋溪水漲溢如海蠻謂海為惠大為􅝮故名惠􅝮漢語曰建水歷趙楊李段數姓皆仍舊名些麼徒蠻所居內附後元立千户𨽻阿僰萬戶至元十三年改建水州𨽻臨安路石平州下平按雲南通志石平州當作坪謹附識在路之西南阿僰蠻據之得石坪聚為居邑名曰石坪至元七年改邑為州𨽻臨安路寧州下在本路之東唐置黎州案明史稿云唐分南寧州地置西寧州於此後改黎州謹附識天寶末沒于蠻地號浪曠蠻語謂旱龍也步雄部蠻些麼徒據之後屬爨蠻酋阿幾以浪曠割與寧酋豆圭元憲宗四年寧酋內附至元十三年改為寧州𨽻臨安路舊領三縣通海嶍峨西沙西沙在州東寧部蠻世居之其裔孫西沙築城於此因名西沙籠憲宗四年其酋普提內附就居此城為萬戶至元十三年立為西沙縣二十六年以𨽻寧州至治二年併入州領二縣通海下倚郭元初立通海千户𨽻善萬户至元十三年改通海縣𨽻寧海府二十七年府革直𨽻臨安路今割𨽻寧州嶍峨下縣在河西縣之西舊屬滇國昔嶍猊蠻居之後阿僰酋逐嶍猊據其地至其孫阿次內附以其部立千戶至元十三年改為州領卭洲平甸二縣二十六年降為縣并二縣為鄉𨽻臨安路今割𨽻寧州廣西路下東爨烏蠻彌鹿等部所居唐為羈縻州𨽻黔州都督府後師宗彌勒二部寖盛蒙氏段氏莫能制元憲宗七年二部內附𨽻落䝉萬戶至元十二年籍二部為軍立廣西路十八年復為民領州二師宗州下在路之東南昔爨蠻逐獠僰等居之其後師宗據匿弄甸故名師宗部至元十二年立為千户十八年復為民二十七年改為州彌勒州下在路南昔些麼徒蠻之裔彌勒得郭甸巴甸部籠而居之故名其部曰彌勒至元十二年為千户十八年復為民二十七年改為州元江路下古西南夷地阿僰諸部蠻自昔據之案明史稿云元江唐時南詔屬銀生節度􅑫白蠻十姓戌之後和泥據之居羅槃甸宋時為麼些徒蠻阿僰諸部所有謹附識元憲宗四年內附七年復叛率諸部築城以拒命至元十三年遙立元江府以羈縻之二十五年命雲南王討平之割羅槃馬籠步日思麼羅丑羅陀步騰步竭台威台陽設栖你陀十二部於威逺立元江路步日部在本路之西䝉氏立比甸徙白蠻鎮之名步日瞼馬籠部因馬籠山立寨在本路之北所居蠻阿僰元初立為千户屬寧州萬户至元十三年改𨽻元江萬戶二十五年屬元江路大理金齒等處宣慰司都元帥府大理路軍民總管府上本漢楪榆縣地案漢書楪榆作葉榆謹附識唐於昆明之㺯棟州案漢書梇棟作弄棟謹附識置姚州都督府治楪榆洱河蠻案明史稿云漢為益州永昌二郡地蜀漢屬雲南郡晉屬寧州唐羈縻匡州地謹附識後䝉舍詔皮羅閣逐河蠻取大和城至閣羅鳯號大䝉國雲南先有六詔至是請於朝求合為一從之蒙舍在其南故稱南詔徙治太和城至異牟尋又遷於喜郡史城又徙居羊苴乖城即今府治改號大禮國其後鄭趙楊三姓互相篡奪至石晉時段思平更號大理國元憲宗三年收附六年立上下二萬户至元七年併二萬戶為大理路設録事司領縣一府二州五府領一縣州領二縣太和倚郭憲宗七年於城內外立上中下三千户至元二十六年即中千戶立録事司上下二千户立縣元案明史稿云本漢葉榆隋時洱河蠻居此置太和城收大理國地置理州及河東縣尋省州改縣曰太和謹附識永昌府唐時蒙氏據其地歷段氏髙氏皆為永昌府案明史稿古哀牢國地漢置不韋縣屬益州郡東漢屬永昌郡唐屬姚州後入於蠻謹附識元憲宗七年分永昌之永平立千戶至元十一年立永昌州十五年升為府𨽻大理路領一縣永平下縣在府東鹿滄江之東即漢博平縣唐蒙氏改勝鄉郡屬永昌元至元十一年改永平縣案後漢書永昌郡有博南縣永平中置疑博平縣係博南縣之訛謹附識騰衝府在永昌之西即越睒地唐置羈縻郡䝉氏九世孫異牟尋取越睒逐諸蠻有其地為軟化府其後白蠻徙居之改騰衝府元憲宗三年酋髙救內附至元十一年改藤越州又立藤越縣十四年改騰衝府二十五年罷州縣府如故鄧川州下在本路北蠻有六詔邆睒其一也唐置邆川州治大釐蒙氏襲而奪之後改德原城𨽻大理段氏因之元憲宗三年內附七年立德原千户𨽻大理上萬户至元十一年改德原城為鄧川州領一縣浪穹下本名彌茨乃浪穹詔所居之地唐初其王鐸羅望與南詔戰不勝保劍川更稱浪劍貞元中南詔破之以浪穹施浪邆睒總三浪為浪穹州元憲宗七年內附立浪穹千户𨽻大理上萬户至元十一年降為縣𨽻鄧川州蒙化州下本䝉舍城唐置陽瓜州天寶間鳯伽異為州刺史段氏為開南縣元憲宗七年以䝉舍立千戶屬大理上萬戶至元十一年立䝉化州十四年升為路二十年降為州復𨽻大理路趙州下昔為羅落蠻所居地䝉氏立國有十瞼趙州瞼其一也蠻為瞼若州皮羅閣置趙郡閣羅鳯改為州段氏改天水郡元憲宗七年立趙瞼千户𨽻大理下萬戶至元十一年改為州又於白崖瞼立建寧縣𨽻本州即古勃弄地二十五年縣革入州𨽻大理路姚州下唐於弄棟川置姚州都督府天寶間閣羅鳯叛取姚州附吐蕃終段氏為姚州案明史稿云南詔置弄棟府大理段氏改曰姚府謹附識元憲宗三年內附七年立統矢千户大姚堡千戶至元十一年罷統矢立姚州𨽻大理路領一縣大姚下唐置西濮州後更名髳州南接姚州統縣四一曰青蛉即此地夷名大姚堡與弄棟川相接元憲宗七年立千户𨽻大理下萬户至元十一年罷千户立大姚縣𨽻姚州雲南州下唐以漢雲南縣置郡䝉氏至段氏並為雲南州元憲宗七年立千戶案雲南通志唐初置雲南州貞觀中改匡州又於州東南置鏡州䝉氏為雲南瞼改品甸縣宋段氏復為雲南州元立品甸千戶史志未詳謹附識𨽻大理下萬戶至元十一年立雲南州䝉憐路軍民府至元二十七年從雲南行省請以䝉憐甸為䝉憐路軍民總管府䝉萊甸為䝉萊路軍民總管府其餘闕䝉萊路軍民府闕金齒等處宣撫司其地在大理西南蘭滄江界其東與緬地接其西土蠻凡八種曰金齒曰白夷曰僰曰峨昌曰驃曰繲曰渠羅曰比蘇元憲宗四年平定大理繼征白夷等蠻中統初金齒白夷諸酋各遣子弟朝貢二年立安撫司以統之至元八年分金齒白夷為東西兩路安撫司十二年改西路為建寧路東路為鎮康路十五年改安撫為宣撫立六路總管府二十三年罷兩路宣撫司併入大理金齒等處宣撫司柔逺路在大理之西永昌之南其地曰潞江曰普坪瞼曰申瞼僰寨曰烏摩坪僰蠻即通典所謂黑爨也中統初僰酋阿八思入朝至元十三年與茫施鎮康鎮西平緬麓川俱立為路𨽻宣撫司茫施路在柔逺路之南瀘江之西其地曰怒謀曰大枯睒曰小枯睒即唐史所謂茫施蠻也中統內附至元十三年立為路𨽻宣撫司鎮康路在柔逺路之南蘭江之西其地曰石睒亦黑僰所居中統初內附至元十三年立為路𨽻宣撫司鎮西路在柔逺路正西東隔麓川其地曰于賴睒曰渠瀾睒白夷蠻居之中統初內附至元十三年立為路𨽻宣撫司平緬路北近柔逺路其地曰驃睒曰羅必四莊曰小沙摩弄曰驃睒頭白夷居之中統初內附至元十三年立為路𨽻宣撫司麓川路在茫施路東其地曰大布茫曰睒頭附賽曰睒中彈吉曰睒尾福祿培皆白夷所居中統初內附至元十三年立為路𨽻宣撫司南睒在鎮西路西北其地有阿賽睒午鎮睒白夷峨昌所居元初內附至元十五年𨽻宣撫司附各甸寨軍民府烏撒烏䝉宣慰司在本部巴的甸烏撒者蠻名也其部在中慶東北七百五十里舊名巴凡兀姑今曰巴的甸自昔烏雜蠻居之今所轄部六曰烏撒部阿頭部易溪部易娘部烏蒙部畔部其東西又有茫布阿晟二部後烏蠻之裔折怒始强大盡得其地因取遠祖烏撒為部名元憲宗征大理纍招不降至元十年始附十三年立烏撒路十五年為軍民總管府二十一年改軍民宣撫司二十四年升烏撒烏䝉宣慰司木連路軍民府以下闕䝉光路軍民府木邦路軍民府案續輿地考云舊名孟都一名孟邦元至元二十六年立木邦路軍民總管府謹附識孟定路軍民府案續輿地考云舊名景麻元至元二十六年改孟定路軍民總管府謹附識謀粘路軍民府案方輿紀要孟定府有廢謀粘路元至元中置謹附識南甸軍民府案續輿地考云舊名南宋元至元中立軍民總管府謹附識六難路甸軍民府陋麻和管民官雲龍甸軍民府案續輿地考云舊雲龍甸元至元末立軍民總管府謹附識縹甸軍民府二十四寨逹嚕噶齊孟隆路軍民府木朵路軍民總管府至元三十年以金齒木朵甸户口增置立下路總管府其為長者給兩珠虎符金齒孟定各甸軍民官孟愛等甸軍民府至元二十一年金齒新附孟愛甸酋長遣其子來朝即其地立軍民總管府䝉兀路通西軍民總管府大德元年蒙陽甸酋領緬吉納欵遣其弟阿不剌等赴闕進方物且請嵗貢銀千兩及置郡縣驛傳逐立通西軍民府木來軍民府至元二十九年雲南省言新附金齒適當䝉古圖魯默色出征軍馬之衝資其芻糧擬立為木來路中書省奏置散府以巴拜為逹嚕噶齊用其土人馬列知府事欽定續通典卷一百三十七
