body:
  text: 州郡明明太祖奮起淮右首定金陵西克湖湘東兼吳㑹然後遣將北伐并山東收河南進取幽燕分軍四出芟除秦晉訖於嶺表最後削平巴蜀收復滇南禹跡所奄盡入版圖洪武初建都江表革元中書省以京畿應天諸府直𨽻京師後乃盡革行中書省置十三布政使司分領天下府州縣及羈縻諸司又置十五都指揮使司以領衛所番漢諸軍其邊境海疆則增置行都指揮使司而於京師建五軍都督府俾外都指揮使司各以其方附焉成祖定都北京乃以北平為直𨽻又增設貴州交趾二布政使司仁宣之際南交屢叛旋復棄之外徼終明之世為直𨽻者二曰京師曰南京為布政使司者十三曰山東曰山西曰河南曰陜西曰四川曰湖廣曰浙江曰江西曰福建曰廣東曰廣西曰雲南曰貴州其分統之府百有四十州百九十有三縣千一百三十有八羈縻之府十有九州四十有七縣六東起遼海西至嘉峪南至瓊崖北抵雲朔東西萬餘里南北萬里其聲教所訖嵗時納贄而非命吏置籍候尉羈屬者不在此數京師元直𨽻中書省明太祖洪武元年四月分屬河南山東兩行中書省二年三月置北平等處行中書省九年六月改行中書省為承宣布政使司成祖永樂元年正月建北京於順天府稱為行在十九年遷都北京罷布政使司為直𨽻英宗正統六年八月罷稱行在定為京師統府八直𨽻州二屬州十七縣一百一十六順天府元大都路直𨽻中書省明洪武元年八月改為北平府十月屬山東行省二年三月改屬北平三年四月建燕王府永樂元年正月升為北京改府為順天府領州五縣二十二大興倚宛平倚良鄉固安元固安州明洪武元年十二月降為縣永清東安元東安州明洪武元年十二月降為縣香河元屬漷州明洪武十年二月省入州十三年二月復置改屬府通州洪武初以州治潞縣省入領縣四三河武清元屬漷州明洪武十二年宋屬漷元漷州明洪武十四年二月降為縣來屬寶坻元直𨽻大都路明洪武十年二月來屬霸州洪武初以州治益津縣省入領縣三文安大城保定洪武七年九月省入霸州十三年十一月復置涿州洪武初以州治范陽縣省入領縣一房山昌平州元昌平縣直𨽻大都路明武宗正德元年七月升為州旋罷八年復升為州領縣三順義元順州明洪武九年十二月改為順義際屬府正德元年七月來屬懷柔洪武元年十二月分密雲昌平二縣地置屬府正德元年七月來屬密雲元檀州後置縣為州治明洪武元年十一月省縣入州十二月復置縣省州入焉屬府正德元年七月來屬薊州洪武初以州治漁陽縣省入領縣四玉田豐潤遵化平谷洪武十年二月省入三河縣十三年十一月復置保定府元保定路直𨽻中書省明洪武元年九月為府十月屬河南分省二年三月來屬領州三縣十七清苑倚滿城洪武十年五月省入慶都縣十三年十一月復置安肅元安肅州明洪武二年七月降為縣西有遂州元屬保定路明洪武初降為縣八年二月省定興元屬易州明洪武六年五月改屬府新城元屬雄州明洪武初屬北平府六年五月改屬雄元雄州明洪武二年七月省州治歸信縣入焉七年四月降為縣容城元屬雄州明洪武七年四月省入州十三年十一月復置來屬唐慶都博野元直𨽻保定路明洪武元年改屬祁州六年五月還屬蠡元蠡州屬真定路明洪武二年七月來屬八年正月降為縣完元完州明洪武二年七月降為縣祁州洪武二年七月以州治蒲隂縣省入領縣二深澤束鹿安州洪武二年七月以州治葛城縣省入七年降為縣十三年十一月復升為州領縣二髙陽元屬安州明洪武六年五月改屬府尋屬蠡州八年正月省入蠡縣十三年十一月復置還屬新安元直𨽻保定路明洪武七年七月省人安州十三年十一月復置來屬易州洪武初以州治易縣省入領縣一淶水河間府元河間路直𨽻中書省明洪武元年十月為府屬河南分省二年三月來屬領州二縣十六河間倚獻元獻州明洪武初省州治樂夀縣入焉八年四月降為縣阜城元屬景州明洪武七年改屬府肅寧任丘元屬莫州明洪武七年改屬府北有莫州元治莫亭縣屬河間路洪武七年七月州縣俱省交河元屬獻州明洪武八年四月改屬府十年五月省入獻縣十三年十一月復置青元清州明洪武初以州治㑹川縣省入八年四月降為縣尋改清為青興濟元屬清州明洪武初省十三年復置屬府靜海元曰靖海屬清州明洪武初更名八年四月改屬北平府十年五月來屬寧津景州洪武初以州治蓚縣省入領縣三吳橋東光洪武七年七月省入阜城縣十三年十一月復置故城滄州洪武初以州治清池縣省入領縣三南皮鹽山慶雲洪武六年六月析山東樂安州北地置來屬真定府元真定路直𨽻中書省明洪武元年十月為府屬河南分省二年正月屬山東三月來屬領州五縣二十七真定倚井陘元屬廣平路威州明洪武二年來屬獲鹿元氏靈夀藁城欒城無極元屬中山府明洪武初廢四年七月復置屬定州七年四月改屬府平山阜平行唐元屬保定路明洪武二年屬定州正統十三年十月直𨽻真定府定州元中山府明洪武二年正月改曰定州三年以州治安喜縣省入領縣二新樂曲陽元屬保定路明洪武二年來屬冀州洪武二年以州治信都縣省入領縣四南宫新河棗强武邑晉州洪武二年以州治鼓城縣省入領縣三安平饒陽武强趙州洪武元年以州治平棘縣省入領縣六柏鄉隆平洪武六年九月省入柏鄉縣十三年十一月復置髙邑臨城贊皇寧晉深州洪武二年以州治靜安縣省入領縣一衡水順德府元順德路直𨽻中書省明洪武元年為府十月屬河南分省二年三月來屬領縣九邢臺倚沙河南和任內丘唐山平鄉巨鹿廣宗洪武十年六月省入平鄉巨鹿二縣十三年十一月復置廣