body:
  text: 職官秩品五明明官品正一品宗人府宗人令左右宗正左右宗人太師太傅太保中軍左軍右軍前軍後軍五都督府左右都督按明之武職唯五府都督位尊而任重在内則掌各衛之軍政在外則充將軍總兵洪武永樂時㕘將遊擊把總亦率以都督充之故總兵副總兵㕘將遊擊將軍守備把總無品級無定員獨鎮一方無所統轄中葉而後五府皆為恩廕寄禄之官官無定額而命職亦不若洪武時之鄭重矣特進榮禄大夫文散武散勲官並同特進光禄大夫左右柱國勲文武同子按自元以前各朝封爵皆有王公侯伯男列於一品至四五品不等至明則異姓爵唯公侯伯三等且皆不列於秩品之内而駙馬都尉則位在伯上衍聖公則又秩居二品袍帶誥命朝班居一品從一品少師少傅少保太子太師太子太傅太子太保中軍左軍右軍前軍後軍五都督府都督同知榮禄大夫文散武散勲官並同光禄大夫柱國勲文武同正二品太子少師太子少傅太子少保吏部戸部禮部兵部刑部工部尚書都察院左右都御史衍聖公中軍左軍右軍前軍後軍五都督府都督僉事留守司正留守都指揮使司都指揮使龍虎山正一真人資善大夫文散資政大夫資徳大夫驃騎將軍武散金吾將軍龍虎將軍正治上卿文勲上䕶軍武勲文按明制武散官正從一品與散官同其武勲亦與文勲官同考元以前各代勲皆為武職分為文武唯明制也從二品承宣左右布政使司左右布政使都指揮同知中奉大夫文散通奉大夫正奉大夫鎮國將軍武散定國將軍奉國將軍正治卿文勲䕶軍武勲正三品太子賓客按太子賓客唯洪武元年文原吉范顯祖常任之以其時帝親征太子監國故也自後無是官矣吏部户部禮部兵部刑部工部左右侍郎都察院左右副都御史通政使司通政使大理寺卿詹事府詹事太常寺卿順天府府尹應天府府尹提刑按察使司按察使京衛指揮使司指揮使留守司副留守都指揮僉事嘉議大夫文散通議大夫正議大夫昭勇將軍武散昭毅將軍昭武將軍資治尹文勲上輕車都尉武勲從三品光禄寺卿太僕寺卿行太僕寺卿苑馬寺卿承宣布政司左右㕘政都轉運鹽使司都轉運使京衛指揮同知留守司指揮同知宣慰使司宣慰使亞中大夫文散中大夫大中大夫懷逺將軍武散定逺將軍安逺將軍資治少尹文勲輕車都尉武勲正四品左右僉都御史左右通政謄黄右通政大理寺左右少卿詹事府少詹事太常寺少卿太僕寺少卿鴻臚寺卿順天府府丞應天府府丞行太僕寺少卿苑馬寺少卿按察使副使各府知府京衛指揮僉事宣慰司同知中順大夫文散中憲大夫中議大夫明威將軍武散宣威將軍廣威將軍贊治尹文勲上騎都尉武勲臣等謹按明初設宦官十二監太監秩正四品見明㑹典迨至中葉凡鎮守出征督餉坐營等事悉委任之於是賜以印記體同元輔爵以公侯蔭及弟姪名器濫而祖制紊威福專而國事壞跡其覆轍甚於漢唐考中官給事宫闈本非班聫有職掌命官可比今内侍省設官分職仍按歴代史志纂入以見寵任宦䜿者必致國是日非而内官秩品恭承聖訓指示削去明代諸銜俾知閽寺微賤不得與朝士齒臣等仰體聖意自唐已下各朝概從刪省庶體例歸於畫一且以昭萬世之炯戒云從四品國子監祭酒布政使左右㕘議都轉運鹽使司同知宣撫司宣撫使宣慰司副使朝列大夫文散朝議大夫朝請大夫宣武將軍武散顯武將軍信武將軍贊治少尹文勲騎都尉武勲正五品中極殿大學士建極殿大學士文華殿大學士武英殿大學士文淵閣大學士東閣大學士吏部戸部禮部兵部刑部工部郎中宗人府經歴通政司左右㕘議大理寺左右寺丞詹事府通事舍人左右春坊大學士左右春坊庶子翰林院學士光禄寺少卿尚寶司卿欽天監監正太醫院院使上林苑監左右監正順天府治中應天府治中按察使僉事各府同知王府左右長史王府儀衛司儀衛正千戸所正千戸宣慰司僉事宣撫司同知奉議大夫文散奉政大夫武徳將軍武散武節將軍修正庶尹文勲驍騎尉武勲從五品吏部戸部禮部兵部刑部工部員外郎詹事府左右諭徳司經局洗馬翰林院侍讀學士侍講學士鴻臚寺左右少卿尚寶司少卿都轉運鹽副使鹽課提舉司提舉遼東煎鹽提舉司秩正七品市舶提舉司提舉各州知州五軍都督府經歴京衛鎮撫司鎮撫王府儀衛副千戸所副千户宣撫司副使安撫司安撫使招討司招討使奉訓大夫文散奉直大夫武略將軍武散武毅將軍協正庶尹文勲飛騎尉武勲正六品吏部户部禮部兵部刑部工部主事都察院經歴大理寺左右寺正詹事府丞左右中允翰林院侍讀侍講國子監司業太常寺寺丞太僕寺寺丞行太僕寺寺丞尚寶司司丞欽天監監副五官正太醫院院判上林苑監左右監副中東西南北五城兵馬司指揮司指揮順天府通判宛平大興二縣知縣應天府通判上元江寧二縣知縣僧録司左右善世道録司左右正神樂觀提㸃王府審理正行太僕寺丞苑馬寺寺丞各府通判王府典仗都指揮司經厯留守司經厯百户所百户宣撫司僉事安撫司同知招討司副招討長官司長官承直郎文散承徳郎昭信校尉武散承信校尉雲騎尉武勲從六品大理寺寺副詹事府左右贊善左右司直郎翰林院修撰光禄寺寺丞署正鴻臚寺左右寺丞順天府推官應天府推官僧録司左右闡教道録司左右演法布政使經歴理問都轉運鹽判官鹽課提舉司同提舉遼東同提舉秩正八品市舶提舉司副提舉各州同知千户所鎮撫安撫司副使承務郎文散儒林郎宣徳郎吏材幹出身忠顯校尉武散忠武校尉武騎尉武勲正七品工部營繕所所正監察御史都察院都事通政司經歴大理寺評事翰林院編修太常寺典簿博士吏户禮兵刑工六科都