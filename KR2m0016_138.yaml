body:
  text: 州郡元江浙等處行中書省為路三十府一州二屬州二十六屬縣一百四十三本省陸站一百八十處水站八十二處江南浙西道肅政亷訪司杭州路上宋為臨安府元至元十三年平江南立兩浙都督府又改為安撫司十五年改為杭州路總管府二十一年自揚州遷江淮行省來治於杭改曰江浙行省置左右録事司按元世祖本紀至元二十八年改江淮行省為江浙等處行中書省治杭州與志互異謹附識領縣八州一錢塘上仁和上與錢塘分治城下餘杭中臨安中新城中富陽中於潛中昌化中海寧州中元元貞元年升鹽官縣為鹽官州天厯二年改海寧州湖州路上唐為湖州宋改安吉州元至元十三年升湖州路設録事司領縣五州一烏程上歸安上與烏程皆為倚郭安吉中德清中武康中長興州中元貞元年升長興縣為州嘉興路上宋為嘉禾郡又升嘉興府元改為路設録事司領縣一州二嘉興上倚郭海鹽州中元貞元年升海鹽縣為州崇德州中元貞元年升崇德縣為州平江路上宋為平江府元至元十三年升平江路設録事司領縣二州四吳上長洲上與吳縣並為倚郭崑山州中元貞元年升崑山縣為州常熟州中元貞元年升常熟縣為州吳江州中元貞元年升吳江縣為州嘉定州中元貞元年升嘉定縣為州常州路上本常州至元十四年升為路設録事司領縣二州二晉陵中倚郭武進中倚郭宜興州中宋宜興縣元至元十五年升宜興府二十年仍為縣二十一年復升為府仍置宜興縣以𨽻之元貞元年府縣俱廢止立宜興州無錫州中元貞元年升無錫縣為州鎮江路下宋為鎮江府元至元十三年升為鎮江路設録事司領縣三丹徒中倚郭丹陽中金壇中建德路上宋為建德府元至元十三年改建德府安撫司十四年改建德路設録事司領縣六建德中倚郭淳安中遂安下桐廬中分水中壽昌中松江府宋為華亭縣屬秀州元至元十四年升為華亭府十五年改松江府仍置華亭縣以𨽻之領縣二華亭上倚郭上海上本華亭縣地至元二十七年以戶口繁多置上海縣屬松江府江隂州上宋為江隂軍元至元十二年依舊置軍行安撫司事十四年升為江隂路總管府後降為江隂州按宋史地理志江隂軍領江隂一縣當是元時省併謹附識浙東道宣慰司都元帥府元治婺州大德六年移治慶元慶元路上宋為慶元府元至元十三年改置宣慰司十四年改為慶元路總管府設録事司領縣四州二鄞上倚郭象山中慈溪中定海中奉化州下元貞元年升奉化縣為州昌國州下至元十四年升昌國縣為州仍置昌國縣以𨽻之後止立昌國州衢州路上宋為衢州元至元十三年改衢州路總管府設録事司領縣五西安中倚郭龍游上江山下理按宋史地志禮賢縣注云本江山縣南渡後改續輿地考云元復禮賢為江山縣謹附識常山下宋改信安今復舊名開化中浙東海右道肅政亷訪司婺州路上宋為婺州保寧軍元至元十三年改婺州路設録事司領縣六州一金華上倚郭東陽上義烏上永康中武義中浦江中蘭溪州下元貞元年升蘭溪縣為州紹興路上宋為紹興府元至元十三年改紹興路設録事司領縣六州二山隂上會稽中與山隂俱倚郭上虞上蕭山中嵊上新昌中餘姚州下元貞元年升餘姚縣為州諸暨州下元貞元年升諸暨縣為州按浙江通志云至正十九年改諸暨州為諸全州二十六年仍為諸暨縣謹附識溫州路上宋為瑞安府元至元十三年置溫州路設録事司領縣二州二永嘉上倚郭樂清下瑞安州下元貞元年升瑞安縣為州平陽州下元貞元年升平陽縣為州台州路上宋為台州元至元十三年置安撫司十四年改台州路總管府設録事司領縣四州一臨海上倚郭仙居上寧海上天台中黃巖州下元貞元年升黃巖縣為州處州路上宋為處州元至元十三年立處州路總管府設録事司領縣七麗水中倚郭龍泉中松陽中遂昌中青田中縉雲中慶元中江東建康道肅政亷訪司寧國路上宋為寧國府元至元十四年升寧國路總管府設録事司領縣六宣城上倚郭南陵中涇中寧國中旌德中太平中徽州路上宋為徽州元至元十四年升徽州路設録事司領縣五州一歙上倚郭休寧中祈門中黟下績溪中婺源州下元貞元年升婺源縣為州饒州路上宋饒州元至元十四年升饒州路總管府設録事司領縣三州三鄱陽上倚郭德興上安仁中餘干州中元貞元年升餘干縣為州浮梁州中元貞元年升浮梁縣為州樂平州中元貞元年升樂平縣為州江南諸道行御史臺集慶路上宋為建康府元至元十二年歸附十四年升建康路初立行御史臺於揚州既而徙杭州又徙江州又還杭州二十三年自杭州徙治建康天厯二年以文宗潛邸改建康路為集慶路設録事司領縣三州二上元中倚郭江寧中倚郭句容中溧水州中元貞元年升溧水縣為州溧陽州中至元十六年升溧陽縣為溧陽路二十七年復降為縣後復升為州太平路下宋為太平州元至元十四年升為太平路設録事司領縣三當塗中倚郭蕪湖中繁昌下池州路下宋為池州元至元十四年升為路設録事司領縣六貴池下倚郭即秋浦縣吳改為貴池青陽下建德下銅陵下石埭中東流下信州路上宋為信州元至元十四年升為路設録事司領縣五上饒上倚郭玉山中弋陽中貴溪中永豐中廣德路下宋為廣德軍元至元十四年升為路設録事司領縣二廣德中倚郭建平中鉛山州中宋鉛山縣元至元二十九年割上饒之乾元永樂二鄉弋陽之新政善政二鄉來屬升為鉛山州直𨽻行省福建道宣慰使司都元帥府大德元年立福建閩海道肅政亷訪司福建路上宋為福建路元至元十五年為福州路十八年遷泉州行省於本州十九年復還泉州二十年仍遷本州二十二年併入杭州設録事司領縣九州二州領二縣閩中倚郭侯官中倚郭懷安中古田上閩清中長樂中連江中羅源中永福中福清州下元貞元年升福清縣為州福寧州上元升長溪縣為福寧州領二縣按福建通志升州在至元二十三年謹附識寧德中福安中建寧路下宋為建寧軍元至元二十六年升為路設録事司領縣七建安中甌寧中與建安俱倚郭浦城中建陽中宋按史地理志嘉禾縣注云本建陽縣理宗景定元年改當是元初復舊名建陽謹附識崇安中松溪下政和下泉州路上宋為平海軍元至元十四年立行宣慰司兼行征南元帥府事十五年改宣慰司為行中書省升泉州路總管府十八年遷行省於福州路十九年復還泉州二十年仍遷福州路按福建通志云大德二年改為泉寧府謹附識設録事司領縣七晉江中倚郭南安中惠安下同安下永春下安溪下德化下興化路下宋置太平軍又改興化軍元至元十四年升興化路設録事司領縣三莆田中宋置興化軍遷治莆田元至元十三年割左右二廂屬録事司縣如故仙遊下興化下軍治元在此後移於莆田此縣為屬邑邵武路下宋邵武軍元至元十三年為邵武路設録事司領縣四邵武中倚郭光澤中泰寧中建寧中延平路下宋為南劍州元至元十五年升南劍路後改延平路按福建通志云大德六年改為延平路謹附識設録事司領縣五南平中倚郭大按宋史地理志無南平縣據福建通志云元德間改劍浦縣為南平縣謹附識尤溪中沙中順昌中將樂中汀州路下宋為汀州𨽻福建路元至元十五年升為汀州路設録事司領縣六長汀中倚郭寧化中清流下建按福通志云宋哲宗元符元年置清流縣理宗紹定中廢元復置謹附識連城下云按福建通志元改蓮城為連城謹附識上杭下武平下漳州路下宋為漳州元至元十六年升漳州路設録事司領縣五龍溪下倚郭漳浦下龍巖下長泰下南靖下本南勝改今名置按福建通志云至治中析龍溪漳浦龍巖識三縣地南勝縣順帝至正十六年改為南靖謹附江西等處行中書省為路一十八州九屬州一十三屬縣七十八本省馬站八十五處水站六十九處江西湖東道肅政亷訪司龍興路上宋為龍興府元至元十三年設行都元帥府及安撫司仍領南昌新建豐城進賢奉新靖安分寧武寧八縣置録事司十四年改元帥府為江西道宣慰司本路為總管府立行中書省十五年立江西湖東道提刑按察司移省於贛州十六年復還隆興十七年併入福建行省止立宣慰司十九年復立罷宣慰司𨽻皇太子位二十一年改龍興府為龍興路領縣六州二南昌上倚郭至元二十年割録事司所領城外二廂東南兩關來屬新建上倚郭進賢中奉新中靖安中武寧中至元二十三年置寧州縣為倚郭大德八年於分寧置寧州武寧直𨽻本路富州上本豐城縣宋屬隆興府元至元十九年𨽻皇太子位二十三年升為富州寧州中本分寧縣至元二十三年於武寧縣置寧州武寧為倚郭縣大德八年割武寧直𨽻本路遂徙州治於分寧吉安路上宋為吉州元至元十四年升吉州路總管府置録事司元貞元年改吉州為吉安路領縣五州四廬陵上倚郭永豐上萬安中龍泉中永寧下至順間分永新州立按名勝志云永寧縣本永新州之勝業鄉元至順初守土官以鄉去州城道險而遙民罷征役乞别置縣從之謹附識吉水州中元貞元年升吉水縣為州安福州中元貞元年升安福縣為州太和州下元貞元年升太和縣為州永新州下元貞元年升永新縣為州瑞州路上宋為瑞州元至元十四年升瑞州路設録事司領縣二州一高安上倚郭上高中新昌州下元貞元年升新昌縣為州袁州路上宋為袁州元至元十三年置安撫司十四年改總管府設録事司𨽻湖南行省十九年升路𨽻江西行省領縣三州一宜春上倚郭分宜上萬載中萍鄉州中元貞元年升萍鄉縣為州臨江路上宋臨江軍𨽻江南西道元至元十三年𨽻江西行都元帥府十四年改臨江路總管府設録事司領縣一州二清江上宋即縣治置臨江軍元至元十四年升軍為路而縣為倚郭新淦州中元貞元年升新淦縣為州新喻州中元貞元年升新喻縣為州撫州路上宋為撫州元至元十四年升撫州路總管府設録事司領縣五臨川上崇仁上金溪上宜黃中樂安中江州路上宋為定海軍元至元十二年置江東西宣撫司十三年改為江西大都督府𨽻揚州行省十四年罷都督府升江州路𨽻龍興行都元帥府後置行中書省江州直𨽻焉十六年𨽻黃蘄等路宣慰司二十二年復𨽻行省設録事司領縣五德化中唐潯陽縣瑞昌中彭澤中湖口中德安中南康路下宋為南康軍元至元十四年升南康路𨽻江淮行省二十二年割屬江西設録事司領縣二州一星子下南康治所都昌上建昌州下元貞元年升建昌縣為州贛州路上宋為贛州元至元十四年升贛州路總管府十五年設録事司𨽻江西省領縣五州二州領三縣贛上州治所興國中信豐下雩都下石城下寧都州下大德元年升寧都縣為州按寰宇通志云元升寧都為州以石城屬之領二縣龍南下至元二十四年併入信豐縣至大三年復置安逺下至元二十四年省入會昌縣至大三年復置會昌州下大德元年升會昌縣為州領一縣瑞金下舊屬䖍州大德元年來屬建昌路下宋為建昌軍元至元十四年改建昌路總管府置録事司領縣三南城上新城中廣昌中南安路下宋為南安軍元至元十四年改南安路總管府割大庾縣在城四坊設録事司十六年廢録事司領縣三大庾中倚郭南康中上猶下南康為上猶宋改南安元至元十六年改永清後復為上猶年按江西通志云元至元五年改永清六復舊名與元志異謹附識南豐州下至元十九年升南豐縣為州直𨽻行省廣東宣慰使司都元帥府海北廣東道肅政亷訪司廣州路上宋為廣州升帥府元至元十三年內