body:
  text: 禮凶祖先亡父後卒而祖母亡服議北魏宋魏世宗永平四年冬十二月員外將軍兼尚書都令史陳終徳有祖母之喪欲服齊衰三年以無世爵之重不可陵諸父若下同衆孫恐違後祖之義請求詳正國子博士孫景邕劉懐義封軌髙綽太學博士袁昇四門博士陽寧居等議適孫後祖持重三年不為品庶生二終徳宜先諸父太常卿劉芳議案喪服乃士之正禮含有天子諸侯卿大夫之事其中時復下同庶人者皆别標顯至如𫝊重自士以上古者卿士咸多世位又士以上乃有宗廟世儒多云適孫𫝊重下通庶人以為差謬何以明之禮稽命徴曰天子之元士二廟諸侯之上士亦二廟中下士一廟一廟者祖禰共廟祭法又云庶人無廟既如此分明豈得通於庶人也𫝊重者主宗廟非謂庶人祭於寢也兼累世承適方得為適子適孫不爾者不得繼祖也又鄭𤣥别變除云為五世長子服斬也魏晉以來不復行此禮矣案喪服經無適孫為祖持重三年正文唯有為長子三年適孫期𫝊及注因説適孫𫝊重之義今世既不復為適子服斬卑位之適孫不陵諸叔而持重則可知也且準終徳資階方之於古未登下士庶人在官復無斯禮考之舊典騐之今世則兹範罕行且諸叔見存喪主有寄宜依諸孫服期為允景邕等又議云喪服雖以士為主而必下包庶人何以論之自大夫以下每條標列逮於庶人含而不述比同士制起後疑也唯有庶人為國君此則明義服之輕重不渉於孫祖且受國於曾祖廢疾之祖父亦無重可𫝊而猶三年不必由世重也夫霜感露濡異識咸感承重主嗣寧甄寢廟適孫之制固不同殊又古自卿以下皆不殊承襲末代僣妄不可以語通典是以春秋譏世卿王制稱大夫不世此明訓也喪服經雖無適孫為祖三年正文而有祖為適孫者豈祖以適服已已與庶孫同為祖服期於義可乎服祖三年此則近世未嘗變也準古士官不過二百石已上終徳即古之朝士也假令終徳未班朝次茍曰志仁必也斯遂况乃官厯士流當訓章之運而以庶叔之嫌替其適重之位未是成人之善也景邕等又議晉太康中令史殷遂以父祥不及所繼求還為祖母三年時政以禮無代父追服之父亦無不許三年之制此即晉世之成規也尚書邢巒奏依芳議詔曰適孫為祖母禮令有據士人通行何勞芳致疑請也可如國子所議杜典不載今補纂宋神宗熙寧時知廬州孫覺以適孫解官持祖母服覺叔父在有司以新令乃改知潤州元豐三年太常丞劉次莊言祖母亡有適曾孫次莊為適孫同母弟在法未有庶孫承重之文詔下禮官立法自今承重者適子死無諸子即適孫承重無適孫適孫同母弟承重無母弟庶孫長者承重曾孫以下凖此其𫝊襲封爵自依禮令祖與父先後䘮亡服議明明王廷相䘮服説祖父之䘮將練而父亡何如曰持重於祖兼主於父禮也練祥禫祭服其除服卒事反父服父䘮未終而祖没何如曰適孫為父後者承重禮也父雖練也猶服其承服其除父之䘮也服其除服卒事反承服生不及祖父母不税服議梁北魏宋梁袁昻父顗敗没時昻年五嵗乳媪攜抱匿於廬山會赦得出猶徙晉安至元徽中聴還時年十五𦵏父訖更制服廬於墓次魏楊引三嵗䘮父為叔所養母年九十三卒引年七十五哀毀過禮三年服畢恨不識父追服斬衰食粥粗服誓終身命以上杜典不載今續纂宋胡旦為祠部郎中服母䘮既除乃言父卒時嘗詔奪哀從事請追行服三年小功不税服議唐宋唐韓愈曰曾子稱小功不税則是逺兄弟終無服也鄭𤣥注云以情責情今之士人遂引此不追服小功小功服最多親則叔父之下殤與適孫之下殤與昆弟之下殤尊則外祖父母常服則從祖祖父母禮治人情其不可不服也明矣古之人行役不踰時各相與處一國其不追服雖不可猶至少今之人男出仕女出嫁或千里之外家貧訃告不及時則是不服小功者恒多而服小功者恒鮮矣君子之於骨肉死則悲哀而為之服者豈牽於外哉聞其死則悲哀豈有間于新故死哉今特以訃告不及時聞死出其月數則不服其可乎愈常怪之近出弔人見其顏色慼慼類有喪者而其服則吉問之則云小功不税者也禮文殘缺師道不𫝊不識禮之所謂不税果不追服乎無乃别有所指而𫝊注者失其宗乎宋劉敞曰韓子常弔於人見其貌戚意哀而服則吉問之曰小功不税也是以韓子疑之而作小功不税之書夫為服者至親之恩以期斷其殺至於大功兄弟之恩以小功止其殺止於緦外親之服以緦窮其殺止於袒免聖人之制禮豈茍言情哉亦著於文而已矣大功税小功不税其文止於是也兄弟之服不過小功外親之服不過緦其情止於是也因其情而為之文親疎之殺見矣故禮大功以上不謂之兄弟兄弟有加而大功無加者親親也有加者報之也親親者税不親親者不税是亦其情也且禮専為情乎亦為文乎如専為情也則至親不可以期斷小功不可以不税如其文也則至親之期斷小功之不税一也夫曾子韓子隆於情而不及文失禮之指而疑其説雖然韓子疑之是也彼人之為非也何以言之小功雖不税亦不吉服而已矣記曰聞逺兄弟之喪既除喪而后聞之則免袒哭之成踊夫若是奚其吉哉故曰彼人之為非也韓子疑之是也小功不税禮也然則免袒成踊則已矣乎猶有加焉曰我未之聞也雖然降而無服者麻不税是亦降而無服也哀之以其麻哭之以其情逾月然後已其亦愈乎吉也庶祖母慈祖母服議齊梁齊安陸王子敬所生早亡帝命貴妃范氏養之而子及婦服制禮無明文永明中尚書令王儉議孫為慈孫婦為慈婦姑為慈姑宜制期年服從之梁武帝天監七年安成太妃陳氏薨舎人周捨議曰賀彦先稱慈母之子不服慈母之黨婦又不從夫而服慈姑小功服無從故也庾蔚之云非徒子不從母而服其黨孫又不從父而服其慈由斯以言慈祖母無服明矣杜典不載今補纂臣等謹案古者士為庶母緦麻三月大夫以上無服庶祖母之制服古今未聞明制加庶母杖期而不及於庶祖母亦以恩為無可加也斯則為袒免可耳又按先儒云婦人不服慈姑婦從夫尚於慈姑無服而况於孫乎然虞喜云慈祖母雖賤若其父先亡己養於祖以祖母之服服之固可也是知亡於禮者之禮在人之動也中耳父母乖離知死亡及不死亡服議晉宋晉元帝大興二年司徒荀組云二親陷没㓂難萬無一冀者宜使依王法隨例行喪庾蔚之云二親如陷没㓂難存亡未可知者宜盡尋求之理尋求之理絶三年之外便宜昏宦𦙍嗣不可絶王政不可廢故也猶宜以哀素自居不豫吉慶之事待中壽而服之也若境内賊亂清平肆𤯝之後尋覔無蹤跡者便宜制服康帝時有遭亂與父母乖離議者或以進仕理王事婚姻繼百世於禮非嫌司徒西曹謝尚議曰典禮之興皆因循情理開通𢎞勝如運有屯夷要當斷之以大義夫無後之罪三千所不過今婚姻將以繼百世崇宗緒此固不可塞也然至於天屬生離之哀父子乖絶之痛痛之深者莫深於兹夫以一體之小患猶或忘思慮損聴察况於抱傷心之巨痛懐忉怛之至戚方寸既亂豈能綜理時務哉有心之人决不冒榮茍進冒榮苟進之儔必非所求之㫖徒開偷薄之門而長流弊之路或有執志丘園守心不革者猶當崇其操業以𢎞風尚而况含難履慼之人勉之以榮貴耶李𦙍字宣伯遼東襄平人祖敏漢河内太守去官還鄉里遼東太守公孫度欲强用之敏乗輕舟浮滄海莫知所終𦙍父信追求積年浮海出塞竟無所見遂情若居喪而不聘娶後有鄰居故人與其父同年者亡因行喪制服燕國徐邈云不孝莫大於無後勸使娶妻既生𦙍遂絶房室恒如居喪禮不堪其憂數年而卒𦙍既孤有識之後亦以喪禮自居又以祖不知存亡設木主以事之由是以孝聞按信始不娶既制喪乃娶生子仍心喪三年可謂仁至義盡者矣宋崔懐順清河東武城人父邪利魯郡太守元嘉中為魏所獲懐順與妻房氏篤愛聞父見擄即日遣妻布衣蔬食如居喪禮嵗時北向流淚其從叔模為滎陽太守亦入魏模子雖居處改節不廢昏宦大明中冀州刺史崔元孫使魏魏人問曰崔邪利模力屈歸命二家子姪出處不同義將安在元孫曰王尊驅驥王陽回車欲令忠孝並𢎞臣子兩遂杜典不載今補纂為姑姊妹女子子無主後者服議宋宋敖繼公曰為姑姊妹女子子出適者降為大功今以其無主乃加於降服一等而為之期其姑姊妹於昆弟姪亦不容不以其所加者服之云報者服期之義生於已而不在彼故也女子子適人者為父母自當期固不必言報矣然父母為己加一等而已於父母不復加者其亦婦人不能貳斬也雷次宗曰或問女子子出適者不得為無主服周斯則然矣敢問兩無主得互相反服否答曰經云姑姊妹報名反服不由己身人今哀已不可無報若兩俱無主義無先服則無報安得互相為周昏有期而夫死服議宋宋真宗大中祥符八年廣平公徳彞聘王顯孫女將大歸而徳彞卒疑其禮制禮官言案曾子問曰娶女有日而女死如之何孔子曰壻齊衰而弔既𦵏而除之夫死亦如之注云謂無期三年之恩也女服斬衰喪遇閏月議隋宋隋文帝開皇初太常卿牛𢎞撰儀禮百卷上之定制三年及期喪不數遇閏大功以下數之以閏月亡者祥及忌日皆以閏所附之月為正開元禮同補杜典不載今纂宋張子全書大功以下算閏月期以上以期斷不算閏月三年之喪禫祥閏月亦算之臣等謹案喪遇閏月六朝諸儒之論如王彪之譙王恬載謐郗諳庾蔚之輩最為折中吳商諸人皆似是而非也至范寗謂前閏亡者取後閏之日為忌尤屬謬妄盖以月計者數閏嵗計者没閏若牛𢎞所定可謂經通而無弊者矣忌日議唐宋金明唐祝欽明為禮部尚書知政事以匿忌日為御史中丞蕭至忠所劾貶申州刺史徳宗貞元八年將作監元旦當攝太尉享昭徳皇后廟以私忌日不受誓誡為御史劾奏詔尚書省與禮官法官集議右丞盧邁奏狀曰臣案禮大夫士將奉祭於公既視濯而父母死猶奉祭也又案唐禮散齋有大功喪致齋有周喪及齋中疾病即還家皆無忌日不受誓誡之文雖假寧令忌日給假一日春秋不以家事辭王事旦不宜以忌日辭攝祭由是坐罰俸宋開寳敕文應常参官及内殿起居職官等自今刺史郎中將軍以下遇私忌請準式假一日忌前之夕聴還私第葉夢得曰元豐編勅修假寧令於父母私忌假下添入逮事祖父母者準此舊法祖父母私忌不為假立此法者謂生而祖父母没則不假存則為假然不當言逮事盖誤用禮之文也案禮逮事父母則諱王父母不逮事父母則不諱王父母鄭氏以逮為及識當是冇知之稱今以逮事為及見誤矣法初行安厚卿為樞密適祖母忌祖母没時厚卿纔三嵗疑而以問禮部郎官何洵直洵直雖知法官之誤因欲遷就其説引子生三月而父名之以為天時一變為有識欲以三月為限斷過矣今士大夫凡生而祖父母存者皆告假從立法者之意也張子全書忌日變服為曾祖祖皆布冠而素帶麻衣為曾祖祖之妣皆素冠布帶麻衣為父布冠帶麻衣麻履為母素冠布帶麻衣麻履為伯叔父皆素冠帶麻衣為伯叔母麻衣素帶為兄麻衣素帶為弟姪易褐不肉為庶母及嫂亦不肉案唐人忌日服黲朱子語類忌日服白生絹衫帶黲巾無等差朱子家禮忌日儀前一日齋戒設位陳器具饌止一位一桌厥明夙興設蔬果酒饌並如祭禰之儀質明主人以下變服詣祠堂奉神主出就正寢参神降神進饌初獻亞獻終獻侑食闔門唘門辭神納主徹是日不飲酒不食肉不聴樂黲布素服素帶以居夕寢於外金章宗明昌元年制内外官并諸局承應人遇祖父母父母忌日並給假一日明張文嘉齊家寳要忌祭儀節質明主人以下素服詣祠堂考妣前焚香跪告曰今以某官某考逺諱之辰敢請神主出就正寢恭伸追慕儀節同時祭用贊唱去飲福受胙祝文云嵗序流易諱日復臨追逺感時昊天罔極如祖考妣以上則改昊天罔極為不勝永慕謹以清酌庶羞用伸奠獻謹奉顯妣孺人某氏配食尚享若妣忌則用伸奠獻下云敬奉以配顯考某府君尚享案妣不曰祔食而曰配食盖夫婦得合食也考妣於讀祝後加舉哀哀止祖考妣近故者亦然忌日變服髙曾祖考妣衣用青素祖考妣𤣥冠白衣考妣白冠白衣臣等謹案凡祭皆吉服而忌用縞素凡祭皆飲福而忌獨舉哀夫縞素舉哀非所以施之祭也故此祭宜與祥禫同類列於喪禮之末國忌日議唐五代宋遼金明唐六典凡國忌日兩京定大觀寺各二散齋諸道士女道士及僧尼皆集於齋所京文武五品已上與朝請七品已上皆集行香以退若外州亦各定一觀一寺以散齋州縣官行香應設齋者盖八十有一州焉謂四輔五府六雄十望曹濮兖齊豫徐陳青亳仙凉秦瀛貝邢恒冀定趙滄徳深博易相梁襄澤安緜梓遂眉卭果彭蜀漢潤越常蘇杭婺衢湖宣洪潭廣桂隴邠涇等州是也其道士女道士僧尼行道散齋皆給香油炭料若官設齋道佛各施物三十五段供修理道佛寫一切經道士女道士僧尼各施錢十二文五品已上女及孫女出嫁者官齋行道皆聴不預若私家設齋道士女道士僧尼兼請不得過四十九人凡逺忌日雖不廢務然非軍務急切亦不舉事餘如常式文宗太和七年二月勅準令國忌日唯禁飲酒舉樂至於科罰人吏都無明文但縁其日不合釐務官曹即不得決斷刑獄大小笞責在禮律固無所妨起今後縱有此類臺府更不舉奏案均王傳王堪男損國忌日于私第決責下人為御史臺所奏遂下此勅後唐明宗天成三年又八月九日勑今後每遇大忌宜設僧道齋一百人列聖忌日齋僧道共五十人不視朝不舉樂止刑罰斷屠宰依舊晉髙祖天福五年正月御史竇貞固奏每遇國忌行香宰臣跪爐百官依常位立班行香之後齋僧百人永為定制宋忌日禮據唐初始著罷樂廢務及行香修齋之文其後又朔望停朝令天下上州皆凖式行香天祐初始令百官詣閤奉慰宋循其制唯宣祖昭憲皇后為大忌前一日不坐慰羣臣詣西上閤門奉慰移班奉慰皇太后退赴佛寺行香凡大忌中書悉集小忌差官一員赴寺如車駕巡幸道遇忌日皆不進名奉慰留守自於寺院行香仍不得在拜表之所天下州府軍監亦如之案畢仲荀燕聞録曰國忌行香起於後魏江左齊梁間每然香薫手或以香未散行謂之行香又唐㑹要謂髙宗時李義府為太子設齋詔五品以上行香不空三藏為神堯以下忌辰行香太祖建隆二年宣祖忌日時明憲乾徳二年改諡昭憲太后在殯羣臣止詣閤奉慰而罷行香真宗崩元徳明徳皇后忌日在禫制内乃停進名行香凡奉慰宰相樞宻使各帥百官内職共進名節度使留後觀察使各進名忌日前後各禁刑三日如天慶節釋放以下情輕者復斷屠宰不視事前後各三日禁樂各五日其後以嵗月漸逺禁刑不視事各二日禁樂各三日章獻明肅太后忌辰前後二日不視事一日禁屠宰各三日禁樂詔應太忌日行香臣僚並素食案王栐燕翼貽謀録云國忌行香本非舊制真宗大中祥符二年詔曰宣祖昭武皇帝昭憲皇后自今忌前一日不坐殿羣臣進名奉慰寺觀行香禁屠廢務著于令自後太祖太宗忌日亦援此例累朝因之政和新儀羣臣進名奉慰其日質明文武朝参官入詣朝堂就次御史臺先引殿中侍御史一員入就位次西上閤門御史臺分引朝参官及諸軍將校次禮直官引三公以下在西上閤門南階下每等重行異位並北向東上知西上閤門官於班前西向立搢笏執名紙躬三公以下文武百僚俱再拜俟閤門官執笏置名紙笏上入西上閤門訖退羣臣奉慰詣景靈宫每等重行異位並北向東上禮直官揖班首以下再拜訖引班首自東階升殿舎人接引同升詣香案前搢笏上香跪奠茶訖執笏興降階復位又再拜次引班首以下分左右搢笏行香宰相執政官分左右行香訖執笏俱復位次引班首升殿詣香案前俯伏跪搢笏執爐俟讀疏畢執笏俯伏興降階復位又再拜退南渡後制忌日如在以日易月服制之内並依禮例權停孝宗淳熙元年十一月詔文武百僚詣景靈宫國忌立班行香如有稱疾托故不赴者御史臺彈奏案宋禮志景靈宫神御殿之一也以奉先朝御容元豐五年作景靈宮十一殿而在京宫觀神御皆迎入禁中夢梁録曰紹興間臣僚奏復景靈宫以奉祖宗衣冠之㳺詔從之咸淳間度廟親灑扁目自聖祖至理廟凡十六殿自元天聖后至楊太后凡十五殿岳珂云今世國忌日百僚行香在京則雙忌賜假隻忌視事坐曹如故外郡皆如平日笞決無禁遼忌辰儀先一日奏忌辰牓子預寫名紙大紙一幅用陰靣後三行書文武百僚宰臣某以下謹詣西上閤門進名奉慰至日應拜大小臣僚並皂衣皂鞓帶四鼓至時於幕次前在京於僧寺班齊依位望闕序立直日舎人跪右執名紙在前班首以下皆再拜引退名紙於宣徽使付内侍奏聞興宗重熙十一年宣獻皇后忌日上與皇太后素服飯僧於延夀憫忠三學三寺金熙宗皇統元年七月癸夘以景宣皇帝忌辰命尚食徹肉明成祖永樂元年禮官奏五月初十日太祖髙皇帝忌辰自初八至初十日不鳴鐘鼓不行賞罰不舉音樂禁屠宰文武官自初八日服淺淡衣黑角帶侍朝至日早赴孝陵行禮八月初十日孝慈髙皇后忌辰禮亦如之宣宗勅諭禮部忌日悉輟朝参嵗為定例用申永慕之誠宣徳三年令凡遇忌辰通政司兵馬司免引囚奏事忌日祭奠議金明金初太祖忌辰皇帝至褥位立再拜稍東西向詣香案前又再拜上香訖復位又再拜進食奠茶辭神皆再拜而退二十一年五月十二日睿宗忌辰有司更定禮儀前一日宣徽院設御幄於天興殿門外稍西至日質明皇太子親王百官具公服於衍慶宫門外立班奉迎皇帝乗馬至衍慶宫門外下馬二宣徽使前導歩入宫門稍東皇帝乗輦繖扇侍衛如常儀至天興殿門外稍西皇帝降輦入幄次簾降典贊儀引皇太子閤門引親王宰執四品以上官由偏門入至於殿庭左右分班立定二宣徽使導皇帝由天興門正門入自東階升殿詣褥位立定皇太子以下官合班五品以下班於殿門外宣徽使奏請皇帝先再拜請詣侍神位立俟有司置香案酒桌訖請詣褥位又再拜三上香奠酒復位再拜皇太子以下皆陪位再奏請詣稍東侍神位立典贊儀引皇太子升殿赴褥位先兩拜奠酒再兩拜降復褥位次閤門引終獻官趙王上殿行禮宣徽使奏請皇帝詣褥位再兩拜皇太子以下官皆再拜禮畢百官依前分班立皇帝出殿門外入幄次簾降更衣引皇太子以下官出宫門外立班皇帝乗輦至宫門稍東降輦歩出宫門外上馬還宫導從侍衛如來儀皇太子以下官俟車駕行然後退案金禮志天徳四年於燕京所建原廟名其宫曰衍慶殿曰聖武門曰崇聖奉安列祖神御世宗大定五年奉㫖太祖忌辰衍慶宫薦享止用素食諸京凡御容所在皆同又朔望皆行朝拜禮六年有司奏太祖皇帝忌辰車駕親奠百官陪拜今車駕巡幸合以宰臣為班首率百官詣衍慶宫行禮從之十六年奉㫖世祖太宗忌辰一體奉奠十八年八月太祖忌辰世祖太宗同在一處致祭有司言厯代無一聖忌辰列聖與祭之典擬議間勅太子一位行禮并就祭功臣二十六年以内外祖廟不同定擬太廟每嵗五享山陵朔望忌辰及節辰祭奠並依前代典故外衍慶宫自來車駕行幸遇祖宗忌辰百官行禮并諸京祖廟節辰忌辰朔望拜奠合依舊以盡崇奉之意從之明制凡值帝后忌辰皆遣官於陵上致祭止用香燭酒果無帛祝文維年月日孝子皇帝御名謹遣某官敢昭告於皇考或皇妣諡號皆備書某皇帝或某皇后尊靈曰惟我皇考或皇妣諱日之辰瞻望徳恩不勝哀感謹用祭奠伏惟尚饗或髙曾祖考妣則𤣥曾孫惟所用臣等謹案唐宋忌日百官於寺觀行香誦經設齋以為追薦雖屬孝思頗非典禮不若金代於衍慶宫親奠百官陪拜能酌古禮而修其制也明國忌遣官上陵親祭内殿即奉先殿無行香齋薦之禮皆唐宋所不及忌日祭祀停樂議唐宋唐文宗開成四年正月太常寺奏今月二十二日祀先農於東郊其日與穆宗皇帝忌日同太和七年十二月八日季冬蜡祭百神與敬宗皇帝忌日同準其年十二月六日勅近廟忌辰奏樂非便季冬蜡祭又不可移變禮從宜古有明據宜令其日懸而不樂庶叶典經今月二十二日祀先農欲準先敕懸而不樂從之宋太祖乾徳二年禘於太廟其日惠明皇后忌有司言唐開成四年正月二十二日祀先農與穆宗忌同日太和七年十二月八日蜡百神與敬宗忌同日詔以近廟忌辰作樂非便宜令懸而不作竊以農蜡之祭猶避廟忌而不作樂况僖祖同廟連室而在諱辰詎可輒陳金石之奏伏望依禮懸而不作忌日易服議宋金明宋髙宗紹興元年二月太常少卿蘇遲等以徽宗欽宗留北有朔望遥拜之禮乃言凡遇祖宗帝后忌前一日並忌日皇帝自内先服紅袍遥拜訖易服行禮從之金章宗明昌元年世宗忌辰祭諸王陪位服黲素去金玉之飾明㑹典凡遇各廟忌辰上服淺淡服御奉天門視事不鳴鐘鼓百官各服淺淡服黑角帶朝参其謝恩見辭官具公服如常儀孝宗𢎞治十四年令遇忌辰朝参官不許服紵絲紗羅恭仁康定景皇帝恭讓章皇后忌辰如遇節令服青緑花樣宣宗章皇帝忌辰如遇奏祭祀許服紅世宗嘉靖元年奏準正月初三日宣宗章皇帝忌辰二月十九日恭仁康定景皇帝忌辰十一月初五日恭讓章皇后忌辰許穿青紵絲穆宗隆慶元年題準凡遇忌辰文武百官不問内外班行謝恩見辭俱淺淡服色烏紗帽黑角帶不許用公服神宗萬厯四年題準凡郊廟奏祭祀日遇有忌辰則移前一日如致齋日内遇忌辰上具常服百官具青緑錦繡其正祭日遇忌者如祭在日間除臨時照常具祭服行禮本日祭前祭後與致齋遇忌同如夜分祭畢是日上仍淺淡服色百官青衣角帶辦事忌日不廢軍務議唐唐太宗貞觀十九年太宗親征髙麗以五月五日行既至遼陽屬髙祖忌日八座奏言臣等謹案禮云君子有終身之憂而無一朝之患此所謂星迴嵗改親没同辰思其居處不為樂事今陛下親御六軍已登㓂境庶務繁擁伏待剖决可以尊先聖之常經畧近代之一志望請所有軍機要切百司依式聞奏手詔答曰今既戎旅大事不可失在機速所以仰順古風俯從今請立春遇忌日議宋宋髙宗紹興十三年正月御史臺言本月十三日欽聖憲肅皇后忌其日立春凖令諸臣僚及將校立春日賜幡勝遇稱賀等拜表忌辰奉慰退即戴欲乞候十三日忌辰行香退即行戴揷從之慶節遇忌日議明明世宗嘉靖二年八月丁未萬夀聖節先是再遇聖節皆以先帝喪殺禮又直髙皇后忌辰移之先一日至是禮官言大喪既除宜盡從吉典先忌祭而後受朝亦不妨同日上可其同日之請猶以孝惠皇太后制未闋不忍純吉仍暫免習儀宣表及雞唱山呼之禮是日帝親祀奉先殿奉慈殿孝惠皇太后几筵殿畢出御奉天殿受賀免文武百官及四夷使臣宴賞忌日輟經筵議明明世宗嘉靖元年五月仁宗昭皇帝忌辰遣官祭獻陵先是給事中安磐等奏稱是日適值經筵衣緋賜宴輟講則廢學如儀則忘孝請移經筵前一日帝下其議禮部覆言經筵禮儀期日累朝未之有改考之祭義曰君子有終身之喪忌日之謂也此専指父母而言祖父以上禮經未載伏聞孝宗在位遇憲宗忌辰仍御經筵凡侍班等官俱衣青緑花様賜宴宜倣此行帝特㫖暫免祧廟廢忌日議唐宋唐文宗太和十五年五月太常禮院奏睿宗神主祧遷其六月二十日忌并昭成皇后十一月二日忌準禮合廢從之宋髙宗紹興三十二年正月禮部太常寺言已降㫖欽宗祔廟翼祖當遷於正月九日告遷翼祖皇帝簡穆皇后神主奉藏於夾室所有以後翼祖皇帝忌及簡穆皇后忌欲乞依禮不諱不忌詔恭依忌月舉樂議唐宋唐睿宗祥月太常奏朔望弛朝尚食進蔬且止樂餘日御便殿具供奉狀中書門下官得侍他非奏事毋謁前忌與晦三日後三日皆不聴事忌晦之明日百官叩側門通慰後遂為常至憲宗元和九年正月修撰太學博士韋公肅上疏曰準禮無忌月禁樂今太常及教坊以正月是國家忌月停習郊廟享宴之音中外士庶咸罷慶樂伏尋經典竊恐乖宜臣謹案禮記有忌日不樂無忌月之文漢魏以降代襲斯㫖唯晉穆帝將納后以康帝忌月下議禮官荀訥王洽曹耽王彪之並當時知禮者皆稱有忌日無忌月若有忌月即有忌時忌嵗並無禮據時從其議伏以前禁在二十五月之中今既逾逺禮湏改革又記曰禫月從樂明王制禮漸去其情不應以追逺而立禮反重也今太常停習郊廟之樂是反重而慢神有司禁中外之音是無故而去樂詳其前典情理不倫考其沿襲又無所據倘陛下正因循之越度法經典之明文得禮之儀𫝊於史冊天下幸甚詔𫝊中書門下令召太常卿禮官等學官詳議可否中書門下奏曰忌日太常寺及教坊悉停閱習中外士庶亦皆禁斷準禮及歴代典故並無忌月禁樂請依常教習者敕宜依其士庶之家亦宜準此宋真宗咸平中有司將設春宴金明池習水戲開瓊林苑縦都人遊賞帝以是月太宗忌月命詳定故事以聞史館檢討杜鎬等引晉荀訥唐王方慶韋公肅言禮無忌月禁樂當時悉從所議伏以忌日不樂嘗載禮經忌月徹懸實無典故况前代鴻儒議論足據其春宴及池苑並合舉樂欽定續通典卷八十二
