body:
  text: 兵示弱唐太宗曰守示以不足敵必來攻是敵不知其所攻也攻示以有餘敵必自守是敵不知其所守也又魏博田悅兵圍邢州身攻臨洺築重城絶內外緩邢將李洪臨洺將張伾固守詔馬燧與李抱真李晟合軍救之燧出􅛒口未過險移書抵悅示好悅以燧畏已大喜既次邯鄲悅使至燧皆斬之遣兵破其支軍又袁滋討吳元濟至唐州元濟圍其新興柵滋卑辭以請之元濟由是不復以滋為意朝廷知之貶滋撫州刺史以李訴代之訴至唐州知士卒憚戰謂之曰天子知訴柔弱故使拊循爾曹至於戰攻進取非吾事也衆信而安之訴親行視士卒不事威嚴或以軍政不肅為言訴曰吾非不知也袁尚書専以恩惠懷賊賊易之聞吾至必增備吾故示之以不肅彼必以吾為弱而懈惰然後可圖也淮西人輕訴不為備訴遂謀襲蔡州五代梁朱友謙以河中同州降晉梁遣劉鄩攻同州友謙求救乃遣符存審與李嗣昭救之河中兵少而弱梁人素易之且不虞晉軍之速至也存審選精騎二百雜河中兵出擊鄩壘陽敗而走鄩兵追之晉騎反擊獲其騎兵五十梁人知其晉軍也皆大驚然河中糧少而新降人心頗持兩端晉軍屯朝邑諸將皆欲速戰存審曰使梁軍知吾利於速戰則將夾渭而營斷我餉道以持久困我則我進退不可敗之道也不若按兵示弱伺隙出竒可以取勝嗣昭從之居旬日望氣者言有黑氣狀如鬭雞存審曰可以一戰矣乃進軍擊鄩大敗之宋苖傅劉正彥反韓世忠率兵討之至秀州稱病不行治器械傅等始懼初傅正彥聞世忠來檄其兵屯江隂世忠以好語報之且言所部零殘欲赴行在傅等大喜許之時世忠妻梁氏及子亮為傅所質防守嚴密於是朱勝非紿傅遣之梁氏疾驅出城㑹世忠於秀州世忠知其謀進兵益急擒賊伏誅明李文忠搗應昌令士卒各持二十日糧兼程進與敵遇力戰走之追至瀚海敵至益衆乃據險為營示以單弱敵疑有伏遁去示怯五代梁太祖遣子友寧攻青州王師範乞兵於楊行密行密遣其將王茂章以步騎七千救之茂章與友寧戰大敗之遂斬友寧以其首報行密是時梁太祖方攻鄆州聞友寧死以兵二十萬倍道而至茂章閉壘示怯伺梁兵怠毁柵而出驅馳疾戰戰酣退坐召諸將飲酒已而復戰太祖登髙望見之得青州降人問飲酒者為誰曰王茂章也太祖歎曰使吾得此人為將天下不足平也宋狄青在涇原常以寡當衆預戒軍中盡捨弓弩皆執短兵密令軍中聞鉦一聲則止再聲鉦則嚴陳而陽却鉦聲止則大呼而突之士卒皆如其教才遇敵未接戰遽聲鉦士卒皆止再聲皆却敵大笑相謂曰孰謂狄天使勇鉦聲止忽前突之敵兵大亂相蹂踐死者不可勝計又張俊討李成時成圍江州未解成黨馬進在筠州俊急趨豫章既入城喜曰我已得洪州破賊決矣及進犯洪州連營西山俊斂兵若無人者金鼓不動令將士登城者斬居月餘進以大書牒索戰俊以細書狀報之賊以俊為怯故懈俊密遣嶽飛楊沂中由上流絶生米渡出賊不意追奔七十里又與賊戰令陳思恭從山後馳擊夾攻破之元巴延久居北邊時有譖其與海都通好者詔以御史大夫伊實特穆爾代之未至㑹海都兵復至巴延遣人請伊實特穆爾曰公姑止待吾翦此寇而來未晚也巴延與海都兵交且戰且却凡七日諸將以為怯憤曰果懼戰何不授軍於大夫巴延曰海都懸軍涉吾地邀之則遁誘其深入一戰可擒也諸軍必欲速戰若失海都誰任其咎諸將曰請任之即還軍擊敗之海都果脫去示緩唐賊史思明既襲降許叔冀乘勝西向李光弼敦陳徐行趨河陽身以五百騎殿賊游騎至石橋諸將曰並城而北乎當石橋而進乎弼曰當石橋而進令甲士夜持炬徐引部曲重堅賊不敢逼已而賊來攻光弼與戰中灘西斬千級執五千人又郭子儀屯奉天僕固懷恩誘吐蕃回紇入冦衆請擊之子儀曰客深入利速戰彼下素德我緩之當自攜二因下令敢言戰者斬堅壁待之敵果遁去五代唐王晏球攻定州王都久不克明宗數遣人促其破賊晏球以為未可急攻其偏將朱宏昭張䖍釗等宣言曰晏球怯耳乃驅兵以進兵果敗殺傷三千餘人由是諸將不敢復言攻晏球乃休飬士卒食其三州之賦悉以俸祿所入具牛酒日與諸將髙㑹久之都城中食盡先出其民萬餘人數謀決圍以走不果都將馬讓能以城降都自焚死遼埒克黨善蘇庫劫西樓按遼有四樓在上京者曰西樓木葉山曰南樓龍化州曰東樓唐州曰北樓嵗時遊獵常在四樓間太祖至土河秣馬休兵若不為意諸將請急追之帝曰俟其逺遁人各懷土懷土既切其心必離我軍乘之破之必矣金宗弼再取河南宋李興據河南府李成引軍入孟津興率衆薄城鼓譟請戰成不應日下昃興士卒倦且飢成開門急擊大破之興走漢南成遂取洛陽嵩汝等河南平元世祖中統初國寶討阿勒達爾叛將和托時和托據吐蕃之達實嶺衆欲速戰國寶曰此窮冦也宜少緩以計破之遂以精兵襲其後和托欲西走國寶據險要之挑戰則斂兵自固相持兩月潛兵出其不意擒殺之明威寧伯王越與保國公朱永巡邊猝遇敵主客不當永欲走越止之列陳以自固敵疑未敢前薄暮令騎皆下馬銜枚魚貫而行毋反顧自率騎殿從山後走五十里抵城敵不覺明日謂永曰我一動敵躡擊無噍類矣結陳示暇形惑之也聲言擊東其實擊西唐曹王臯為江南西道節度使時李希烈反賊樹堡栅於蔡山臯度峻險不可攻乃聲言西取蘄州理戰艦分兵傍南涯與舟師泝江而上賊以老弱守柵引軍循江隨戰艦南北與臯兵相直去蔡山三百里賊亦隨之乃令徒兵悉登舟順流東下不一日拔蔡山賊還兵救柵間一日方至大破之因取蘄州降其將李良復至黃州斬首千餘級軍益振五代初淮南節度使髙駢死淮南亂楚州刺史劉瓉奔梁梁王納之時欲攻徐州時溥乃遣朱珍將兵數千以東聲言送瓉還楚溥聞珍以兵來果出兵拒之珍戰于吳康大敗之取其豐蕭二縣别遣龎師古攻徐州又晉軍與梁將劉鄩對壘于莘晉軍數挑戰鄩閉壁不出晉王留符存審于莘聲言西歸鄩閒晉王且去即引兵擊魏攻城東王行至貝州返擊鄩大敗之追至于故元城又敗之鄩走黎陽宋王韶既破羌衆㑹轄戩度洮為之援餘黨復集韶乃命别將趨竹牛嶺虛張軍聲而潛師越武勝遇轄戩等與戰破之遂改武勝為鎮洮軍金宗弼復取河南徐文破宋將李寶于濮陽孟邦傑于登封宋蔣知軍據河陽文遲明至其城下使别將攻城東北自將精鋭潛師襲南門城中悉衆救東北文乃自南門斬關入城宋軍潰去追擊敗之元巴延伐宋宋淮西制置使夏貴等以戰艦萬艘分據要害兵不得進千户馬福建言淪河口可通沙蕪入江巴延使覘沙蕪口夏貴亦以精兵守之乃圍漢陽軍聲言由漢口渡江貴果移兵援漢陽大軍次漢口諸將自漢口開壩引船入淪河先遣萬户阿老罕以兵拒沙蕪口逼近武磯巡視陽羅城堡徑趨沙蕪遂入大江明傅友德與湯和分道伐蜀和以舟師攻瞿塘友德以步騎出秦隴疾馳至陕集諸軍聲言出金牛而潛兵趨陳倉攀援巖谷晝夜行抵階州敗蜀將丁世珍克其城度白龍江橋破五里關遂拔文州又成祖將取滄州乃下令東征將士頗不樂張玉朱能為言成祖密諭之曰德州城壁堅定州城粗備皆難猝下獨滄州土城隤圮日久天寒地且凍修城不易乘其未備攻之必克兵貴神密佯言東征者使彼懈不備耳乃以夜三更起程直抵滄州城下守將徐凱始覺衆股栗不能甲遂麾兵四面急攻拔之示形在彼而攻於此唐李訴謀襲蔡時賊將李祐有膽略守興橋柵嘗侮易官軍訴召其將史用誠誡之曰今祐以衆穫麥於張柴爾可三百騎伏傍林中又使搖旗於前示將焚麥者祐素易我軍必輕而來逐爾以輕騎搏獲之用誠如其言果擒祐而還又髙仁厚為行軍司馬將兵三千討韓秀升屈行從召耆老詢以山川蹊徑及賊寨所據喜曰賊精兵盡在舟中使老弱守寨而資糧皆在寨中此所謂重戰輕防其敗必矣乃揚兵江上為欲涉之狀賊晝夜禦備遣兵挑戰仁厚不應潛遣勇士千人攻焚其寨賊救之不及資糧蕩盡仁厚遣兵於要路邀擊且招之賊衆執秀升行從以降五代梁王彥章與唐相持于楊劉是時唐已得鄆州郭崇韜曰彥章圍我於此其志在取鄆州耳臣願得兵數千據河下流築壘於必爭之地以應鄆為名彥章必來爭既分其兵乃可圖也然版築之事難以卒就陛下日以精兵挑戰使梁兵不得東十日壘成矣崇韜與毛彰將數千人夜行渡河築壘於博州東晝夜督役六日壘成彥章果引兵來攻天熱卒疲不克還趨楊劉莊宗迎擊遂敗之宋种師道知渭州督諸道兵城席葦土賦工敵至堅壁葫蘆河師道陳於河滸若將決戰者隂遣偏將曲充徑出橫嶺揚言援兵至敵方駭顧楊可世潛軍衝其後姚平仲以精甲衷擊之敵大潰卒城而還又畢再遇與陳孝慶取泗州尅日進兵金人聞之閉𣙜埸塞城門為備再遇曰敵已知吾濟師之日矣兵以竒勝當先一日出其不意孝慶從之乃進兵薄泗州泗有東西二城再遇令陳戈旗舟楫於石囤下如欲攻西城者乃自以麾下兵從陡山徑趨東城南角先登金人潰守將北遁兩城遂定金太宗天㑹初烏塔噶叛太宗命阿里罕次子晏督扈從諸軍往討之至混同江諭將士曰今叛衆依山谷地勢險阻林木深密吾騎卒不得成列未可以嵗月破也乃具舟楫艤江令諸軍據髙山連木為柵示以持久計且言俟大軍畢集而發乃潛以舟師浮江而下直搗其營遂大破之據險之衆不戰而潰月餘一境皆定又赫舍哩志寧以精兵萬人發自睢陽趨宿州宋將李顯忠聞志寧軍止萬人甚易之志寧將至宿州仍令從軍盡執旗幟駐州西為疑兵三明安兵駐州南志寧自以大軍駐州東南扼其歸路顯忠望見州西兵旌旗蔽野果謂大軍在州西而謂東南兵少不足慮先擊之以步騎數萬皆執盾背城為陳外以行馬捍之使别將將兵三千出自東門欲自陳後攻志寧軍萬户布勒察擊敗之右翼萬户􅏨爾佳清臣為前行撤毁行馬短兵接戰顯忠軍亂諸將乘之追殺至城下又布薩揆總大軍南伐分兵為九路進揆以行省兵三萬出潁夀至淮宋人旅拒于水南揆密遣人測淮水惟八疊灘可涉即遣鄂屯驤揚兵下蔡以示欲渡宋帥何汝礪姚公佐悉鋭師屯花靨以備揆乃遣右翼都統完顔薩布先鋒都統納喇巴哩潛渡八疊駐南岸揆麾大軍直壓其陳敵不虞我兵卒至皆潰走自相蹂踐死於水者不可勝計進奪潁口下安豐軍遂攻合肥取滁州盡獲其軍實元張宏範既克宋三江寨至漳州軍東門命别將攻南門西門遂乘虛破其北門克之明徐達從太祖討陳友諒率舟師順流而上直抵安慶先陳陸兵以疑友諒潛令俞通海等以精兵搗其水寨友諒軍不及支遂大破之又沐英從傅友德征雲南師至白石江元梁王遣兵十萬拒戰友德欲渡江英整諸軍若將渡者而以竒兵潛從下流濟繞出陳後元兵驚擾英急麾軍渡江以善泅者先之長刀斫其軍軍却師畢濟鏖戰良久復縱鐵騎遂大敗之示無備設伏取之唐黃巢陷東都鳳翔節度使鄭畋遣兵戍京師賊將王璠率衆三萬來攻畋使行軍司馬唐宏夫設伏以待璠內輕畋儒柔縱萬騎鼓而前畋以鋭卒數千當賊疏陳賊不測衆寡陳未整伏發衆皆囂日暮軍四合鏖戰龍尾坡殺賊二萬級多獲鎧仗璠遁去元張宏範討李璮於濟南璮出軍突諸將營獨不向宏範宏範築長壘內伏甲士而外為壕開東門以待之夜令士卒浚壕益深廣璮不知也明日擁飛橋來攻未及岸軍陷壕中得跨壕而上者突入壘門遇伏兵皆死示强唐武后垂拱初突厥犯邊命黑齒常之率兵拒之至兩井忽遇敵衆三千方擐甲常之見其囂領二百餘騎身當先鋒直衝之敵皆棄甲而散比暮賊衆大至常之令伐木營中然火如烽燧時東南忽有大風起敵疑救至夜遁又吐蕃陷瓜州以張守圭為瓜州刺史領餘衆修築州城板堞初立敵暴至城下城中人相顧失色守圭曰彼衆我寡又創痍之後不可以矢石相持須以權道制之乃於城上置酒作樂以㑹將士敵疑有備不敢攻而退守圭縱兵擊敗之於是修復廨宇收合流亡皆復舊業又永王璘拒命肅宗遣啖廷瑶招諭之時河南招討判官李銑以廣陵步卒三千同出於瓜步廣張旗幟耀乎江津璘登陴望之竟日始有懼色其夕銑令多燒火人執兩炬以疑之隔江望者兼水中之影一皆為二璘軍人以火應之璘懼以為官軍悉濟矣遂宵遁又東川留後髙仁厚討叛將楊師立賊黨鄭君雄張士安堅壁不出仁厚曰攻之則彼利我傷圍之則彼困我逸遂列十二寨圍之夜二鼓君雄等出徑兵掩擊城北寨副使楊茂言不能禦帥衆棄寨走其旁數寨亦走東川人併兵南攻中軍仁厚聞之大開寨門自帥士卒為兩翼伏道左右賊至見門開不敢入還去仁厚發伏兵擊之東川兵大奔追至城下斬獲甚衆而還五代梁太祖攻濮州已破濮人積草焚之梁兵不得入是時梁將王重師方病金瘡卧帳中諸將彊之重師遽起悉取軍中氊毯沃以水䝉之火上率精卒以短兵突入梁兵隨之皆入遂取濮州唐與梁軍戰潘張軍敗而潰莊宗得三四騎馳去梁兵數百追及攢矟圍之唐將元行欽望其旗而識之馳一騎奮劔斷其二矛斬首一級梁兵解去又萇從簡以功遷步軍都指揮使莊宗與梁軍對陳梁軍有執大旗出入陳間者莊宗登髙邱望見之歎曰彼猛士誰能為我取之者從簡因前請往莊宗惜之不許從簡潛率數騎馳入梁軍奪其旗而還軍中皆鼓噪莊宗壯之晉皇甫遇與契丹戰至榆林為敵所圍遇乘馬中鏑而斃遇有僕杜知敏以馬授遇遇得馬復戰久之稍解顧杜知敏已被獲遇謂慕容彥超曰知敏義士也豈可失之遂與彥超躍馬入陳取之而還敵壯之俄而生軍復合遇不能解時安審琦已至安陽河謂首將張從恩曰皇甫遇等未至必為敵騎所圍若不急救則成擒矣從恩曰敵勢甚盛無以枝梧將軍獨往何益審琦曰成敗命也設若不濟則與之俱死若失此二將將何面目以見天子遂率鐵騎北渡赴之敵見塵起謂救軍併至乃引去遇與彥超中數槍得還時諸軍歎曰此三人皆猛將也宋曹彬伐江南朱令贇自湖口入援衆號十五萬順流而下將焚采石浮梁彬聞之遣戰櫂都部署王明密令人樹長木於洲渚間若帆檣之狀令贇望見疑有伏逗撓不敢進又真宗時冦準為相值契丹大舉入邊王欽若陳堯叟請出幸以避之獨準力勸帝親征帝至澶州見契丹兵盛衆請駐蹕準曰陛下不過河則人心益危況王超李繼隆石保吉等各分兵扼其吭背四方援兵日至何疑而不進髙瓊亦固請帝乃渡河逺近望見御蓋皆踴躍呼萬嵗敵人氣奪又王德用判定州兼三路都部署德用時教士卒習戰頃之士勇皆可用契丹遣人來覘或請捕之德用曰彼得其實以告是服人之兵以不戰也明日大閲於郊下令具糗糧聽吾鼓視吾旗所向覘者歸告敵謂漢兵將大至和議益決又儂智髙反以孫沔為廣南安撫使沔請發騎兵求武庫精兵五千梁適折沔曰毋張皇沔曰前日惟無備故至此今乃欲示鎮靜邪夫實備不至而貌為鎮靜危亡之道也乃與兵七百人沔憂賊度嶺而北乃檄湖南江西曰大兵且至其繕治營壘多具燕犒賊疑不敢北侵又种師道將至洛陽聞斡里雅布屯京城下或止勿行曰敵勢方鋭願少駐汜水以謀萬全師道曰吾兵少若遲回不進形見情露祗取辱焉今鼓行而前彼安能測我虛實都人知吾來士氣自振何憂敵哉揭榜沿道言种少保領西兵百萬來遂抵城西趨汴水南徑逼敵營金人懼徙寨稍北又王德討賊李成以百騎覘賊至上蔡驛口橋賊疑為誘騎擁衆欲西德麾騎大呼曰王師大至矣賊駭遁追殺甚衆又魏勝取海州郡守髙文富遣兵來捕勝迎擊走之追至城下衆驚傳水陸悉有兵城中大恐文富閉門守驅民上城禦之勝今城外多張旗幟舉烟火為疑兵繼遣勇鋭者登城樓餘自城門入莫有禦者遼景宗乾亨元年宋既下河東乘勝侵燕耶律學古受詔往援始至京宋敗耶律希達蕭托郭等勢益張圍城三周穴城而進城中民懷二心學古以計安反側隨宜備禦晝夜不少懈適有敵三百餘人夜登城學古戰却之㑹援軍至圍遂解學古開門列陳四面鳴鼓居民大呼聲震天地旋有髙梁之捷二年伐宋㑹宋將潘美率兵分道來侵學古以軍少虛張旗幟雜丁黃按禮男幼為黃四嵗為小十六為中二十一為丁軍中雜幼弱以疑敵也為疑兵是夜適獨虎峪舉烽火遣人偵視見敵俘掠村野擊之悉獲所掠物擒其將領又耶律都沁侵宋分總羸師以從及戰取緋帛被介胄以自標顯馳突出入敵陳格殺甚衆金薩滿阿里值遼人來攻貝勒和色哩城阿里率百餘騎救之遼兵數萬阿里兵少乃令軍士裂衣多為旗幟出山谷間遼兵望見遁去又龎迪知懷德軍兼沿邊安撫使夏人合兵五萬薄懷德城迪開門待之夏人不敢入因以數千騎分門突出遂破之斬首五百級元齊榮顯與宋兵戰次五河口抵大堤榮顯偕數騎前行覘敵值邏騎數十從者將退榮顯曰彼衆我寡若示以怯必為所乘援弓䇿馬射殺兩人而還又至元時納延叛車駕親征察球爾扈從遇納延駐兵萬餘察球爾兵不滿三千衆有懼色察球爾夜令軍士多裂裳帛為旗幟斷馬尾為旄掩映林木張設疑兵納延兵大驚以為官兵大至遂降明李文忠為浙東行省左丞時張士誠急攻諸全守將謝再興告急遣胡德濟往援再興復請益兵文忠兵少無以應㑹太祖使邵榮討處州亂卒文忠乃揚言徐右丞邵平章將大軍尅日進吳軍聞之懼謀夜遁德濟與再興夜半開門突擊大破之又傅友德征蜀蜀將吳友仁謀復漢中兵大至守臣告急友德以精騎攻斗山寨令人持十炬列山上蜀兵驚遁又平安兵圍北平甚急劉江請往救與成祖約曰臣出北平以炮響為號一炮則決圍二炮則入城若三炮不聞則臣必戰死臣決圍之後宜令後軍帶十炮俟三炮既響為殿者常放炮不絶聲則逺近皆謂大軍繼至平安必駭走矣江遂進兵與安戰悉如其䇿大敗平安又成祖師至瓜洲盛庸以海艘迎戰列兵沿江上下二百里皆大驚愕師漸近岸庸等整師以禦成祖麾諸將鼓譟先登以精騎數百衝庸軍南師大潰乃令來降海舟懸黃幟往來江中鎮江城中望見驚曰海舟皆已降吾將何為其守將章俊遂率衆來降又王信守備荆襄劉千斤反信以房縣險進據之民兵不滿千人賊四千餘衆突至圍城主帥逗遛不進拒四十餘日信選死士出城五六里舉火炮賊以為援兵至驚走追敗之又胡宗憲既說降倭冦汪直遣諭巨賊徐海謂不早降新總督用兵如神後悔何及海因要請中國貨物以遣他酋宗憲佯諾之輒以銀幣厚遺諜者而隂令營中盛兵容故縱敵瞰之明日復遣人來待之如初海于是歸心于宗憲矣敵軍攻城久不下師老取之宋趙范統軍攻唐鄧時金人在蘄黃孟宗政惑之范曰撤襄陽之備以救蘄黃則唐鄧之師必躡吾後且蘄黃之師正鋭曷若先搗唐鄧以示有餘唐鄧應我不暇則吾圍不守而自固敵在蘄黃師日以老然後回師蹙之則勝敵而無後患矣遼蕭思溫為南京留守㑹周師來侵圍馮母鎮勢甚張思溫請益兵帝報曰敵來則與統軍司併兵拒之敵去則務農作勿勞士馬㑹敵入東城我軍退渡滹沱而屯思溫勒兵徐行周軍數日不動思溫與諸將議曰敵衆而鋭戰不利則有後患不如頓兵以老其師躡而擊之可以必勝諸將從之周師引退金章宗泰和六年宋將李爽圍夀州田俊邁陷蘄縣平章政事布薩揆遣安國軍節度副使納喇巴哩與穆延薩克達以精騎三千戍宿州俊邁果率步騎二萬來襲郭倬李汝翼以衆五萬繼至遂圍城攻之甚力城中叢射敵不能逼㑹淫雨潦溢敵露處勞倦巴哩遣騎二百潛出敵後突擊之敵亂薩克達率騎蹂之殺傷數千人敵復聞援軍將至遂夜遁巴哩薩克達躡其後黎明合擊大破之獲田俊邁元王義拔東鹿金將武仙以兵四萬來攻諭軍士曰束鹿兵少無糧城無樓櫓一日可拔也因盡鋭攻擊義隨機應拒積三十日不能下義召將佐曰今城守雖有餘然縣無援兵糧食將盡豈可坐而待斃椎牛饗士率精鋭三千銜枚夜出直搗仙營仙軍亂乘暗攻之殺數千人仙率餘衆遁還明傅友德取雲南兵已抵烏撒將城之工甫集蠻大至友德故持重不戰以老之士踴躍思奮乃前為陳蠻麇集友德鼓士奮擊大破其衆蠻遁欽定續通典卷九十七
