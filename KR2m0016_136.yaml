body:
  text: 州郡元陜西諸道行御史臺陜西等處行中書省為路四府五州二十七屬州十二屬縣八十八本省陸站八十處水站一處奉元路上宋分陜西秦鳯熙河涇原環慶鄜延為六路金併陜西為四路元中統三年立陜西四川行省治京兆至元初併雲陽縣入涇陽櫟陽縣入臨潼終南縣入盩厔十六年改京兆為安西路總管府二十三年四川置行省改此省為陜西等處行中書省大德元年移雲南行臺於此為陜西行臺皇慶元年改安西為奉元路設録事司領縣十一州五州領十五縣咸寧下長安下咸陽下入按續輿地考咸陽縣元省興平尋復置謹附識興平下臨潼下藍田下涇陽下至元二年併入髙陵縣三年復立髙陵下鄠下盩厔下郿下舊為郿州添置柿林縣至元元年省郿州為郿縣廢柿林同州下唐為同州宋為定國軍金因之元仍為同州按同州志云至元六年省馮翊縣入同州謹附識領五縣朝邑下白水下郃陽下以按金史地理志貞祐四年郃陽隸禎州明一統志云郃陽縣元初隸禎州後仍舊謹附識澄城下韓城下唐宋為郃城縣金曰禎州元至元元年州廢二年再立六年州又廢止設縣華州下舊華州金金安軍元復為華州按陜西通志云元省鄭縣入州謹附識領三縣華隂下蒲城下隂按華縣志蒲城縣元中統初省至元二年復置謹附識渭南下縣按渭南志元省下邽入渭南謹附識耀州下宋為感義軍又改感德軍又為耀州如故金因之元至元元年併華原縣入州又併美原入富平領三縣三原下富平下同官下乾州下至元元年併奉天縣入州五年復置奉天省好畤入焉又割永夀來屬後又改奉天為醴泉領三縣醴泉下武功下武按續輿地考功縣金改為武亭縣元復舊謹附識永夀下宋金屬邠州元至元十五年徙縣治于麻亭商州下領一縣洛南下延安路下宋為延安府金為鄜延路元改延安路領縣八州三州領八縣膚施下甘泉下二按元一統志云至元年併臨真縣入甘泉謹附識宜川下元初置司候司至元六年省入宜川縣按元一統志云至元六年併丹州入宜川陜西通志云元省門山縣入宜川謹附識延長下延川下安定下本宋舊堡元初升為安定縣至元元年析置丹頭縣四年併丹頭入本縣安塞下本金舊堡元初升為縣按安塞縣志云元省敷政縣入安塞謹附識保安下金為保安州元至元六年降為縣鄜州下舊領洛交洛川鄜城直羅四縣至元四年併鄜城入洛川又併洛交直羅入州六年廢坊州以中部宜君二縣來屬領三縣洛川下中部下宜君下綏德州下唐綏州宋為綏德軍金為州領八縣元初併嗣武入米脂綏平入懷寧至元四年併定戎入米脂懷寧入青澗又併義合綏德入本州領二縣青澗下米脂下葭州下宋為晉寧軍金改為葭州元至元六年併通秦彌川葭蘆入州併太和入神木建寧入府谷領三縣神木下元初創立雲州於古麟州之神木寨至元六年廢州為縣吳堡下元按元一統志云吳堡縣元至元年省二年復置謹附識府谷下後唐為府州元初建州治至元六年廢為縣興元路下宋為興元府元立興元路總管府久之以鳯金洋三州隸焉宋時領南鄭西縣褒城亷水城固五縣後廢亷水入南鄭元初割出西縣屬沔州以洋州西鄉縣來屬領縣四州三南鄭下城固下褒城下西鄉下續按輿地考云西鄉縣宋端平中廢元復置謹附識鳯州下宋為團練州元至元五年以在郭梁泉縣併入州隸興元路洋州下至元二年省興道真符二縣入州金州下宋為金房開達四州路元為散州按續輿地考云平利洵陽漢隂石泉元併省入金州謹附識陜西漢中道肅政亷訪司鳯翔府元初割平涼府秦隴德順西寧鎮寧州隸鞏昌路廢恆州以所領盩厔縣隸安西府路尋立鳯翔路總管府至元九年更為散府領縣五鳯翔下扶風下岐山下寶雞下虢按明一統志云元省縣入寶雞謹附識麟游下元按明一統志云廢普潤縣入麟游謹附識邠州下領縣二新平下淳化下至元七年併三水入本縣涇州下宋為彰化軍舊領保定長武靈臺良原四縣金改保定縣為涇川元初以隸都元帥府立總司轄邠州後屬鞏昌都總帥府或隸平涼府陜西省所隸不一今直隸省領縣二涇川下涇州治此即保定靈臺下至元七年併歸涇川十一年復立以良原併入而長武仍併於涇川開成州下本原州金為鎮戎州元初仍為原州至元十年皇子安西王分治秦蜀遂立開成府仍視上都號為上路至治三年降為州領縣一州一開成廣安州本鎮戎地金升為縣隸鎮戎州經亂荒廢元至元十年安西王封守西土既立開成路遂改為廣安縣募民居止未幾戶口繁夥十五年升為州仍隸本路莊浪州下沿革闕大德八年二月降莊浪路為州鞏昌等處總帥府鞏昌府宋鞏州金為鞏昌府元初改鞏昌路便宜都總帥府統鞏昌平涼臨洮慶陽隆慶五府及秦隴㑹環金德順徽金洋安西河洮岷利巴沔龍大安褒涇邠寧定西鎮原階成西和蘭二十七州又於成州行金洋州事至元五年割安西州屬圖沙瑪路總管府六年以河州屬吐蕃宣慰司都元帥府七年併洮州入安西州八年割岷州屬圖沙瑪路十三年立鞏昌路總管府十四年復行便宜都總帥府事其年割隆慶府利巴大安褒沔龍等州隸廣元路二十一年又以涇邠二州隸陜西漢中道宣慰司而帥府所統者鞏昌平涼臨洮慶陽府凡四秦隴寧定西鎮原階成西和蘭㑹環金德順徽金洋州凡十有五設録事司領縣五隴西下寧逺下地按金史理志鞏州安西縣有寧逺寨當是元時升為縣謹附識伏羌下本舊寨至元十三年升縣通渭下鄣下宋名鹽川寨金為鎮元至元十七年置今縣平涼府元初併潘原縣入平涼化平入華亭隸鞏昌帥府領縣三平涼下崇信下華亭下臨洮府至元十三年復以渭源堡升為縣領縣二狄道下渭源下慶陽府金為慶源路元初改為慶陽散府至元七年併安化彭原入焉領縣一合水下秦州中舊領六縣元至元七年併雞川隴城入秦安冶坊入清水領縣三成紀中清水中秦安下隴州中宋金置防禦使舊領四縣元至元七年省吳山隴安入汧源十三年罷防禦使為散郡領縣二汧源中按仁宗本紀云延祐四年併汧源縣入隴州謹附識汧陽下寧州下至元七年併襄樂安定定平入州領縣一真寧下定西州下宋置定西城金改定西縣復升為州仍置安西縣倚郭通西二塞並置縣來屬元至元三年併三縣入本州按四川通志云元因地震改為安定州謹附識鎮原州下本原州元改鎮原州以鎮戎州之東山三川二縣來屬至元七年例併州縣遂以臨涇彭陽及東山三川四縣入本州西和州下舊領縣三大潭祐川軍興久廢惟有長道一縣元至元七年亦併入本州環州下金隸慶陽府元初為散郡舊領通逺一縣至元七年併入本州金州下本蘭州龕谷寨金升寨為縣以龕谷為金州治所元至元七年併縣入州靜寧州下宋德順軍金升為州元初併治平永洛按永洛宋金史志並作水洛元志蓋誤謹附識入隴干後復省隴干改為靜寧州領縣一隆德下蘭州下元初領阿千一縣及司候司至元七年併司縣入本州㑹州下宋置敷文縣金置保川縣陷于河西僑治州西南百里㑹川城名新㑹州元初棄新㑹州遷於所隸西寧縣至元七年併縣入州徽州下元兵入蜀鳯州二縣首降以鳯州仍治梁泉别置南鳯州治於河池後又升永寧鄉為縣與兩當同為屬邑至元元年改為徽州七年併河池永寧二縣入州領縣一兩當下階州下舊領福津將利二縣至元七年併入本州成州下舊領同谷栗亭二縣元初以田世顯挈成都府歸附令遷於栗亭行栗亭管民司事不隸成州割天水縣來屬至元七年併同谷天水二縣入州金洋州本隸興元路元初有雷李二將挈民户歸附令遷至成州自行金洋州事土蕃等處宣慰司都元帥府至元九年於土蕃西界立寧河站河州路下領縣三定羌下寧河下安鄉下雅州下憲宗攻破雅州石泉守將趙順以城降領縣五石山下瀘山下百丈下榮經下嚴道下黎州下領縣一漢源下洮州下領縣一可當下貴德州下茂州下領縣二文山下汶川下圖沙瑪路岷州下鐵州下碉門魚通黎雅長河西寧等處宣撫司至元二年授雅州碉門安撫使髙保四虎符髙保四言碉門舊有城邑中統初為宋人所廢衆依山為柵去碉門半舍欲復戍故城便於守佃敕秦蜀行省彼中緩急卿等相度須得其宜城如可復當助成之三年諭四川行樞家院遣人於碉門巖州西南沿邊丁寧告諭官吏軍民有願來歸者方便接納用意存恤百姓貧者賑之願徙近襄城邑者以屋舍給之禮店文州䝉古漢軍民元帥府自河州以下至此多闕其餘如朵甘斯烏斯藏積石州之類尚多載籍疏略莫能詳録也四川等處行中書省為路九府三屬府二屬州三十六軍一屬縣八十一蠻夷種落不在其數本省陸站四十八處水站八十四處鹽場十二處俱鹽井所出井凡九十五眼在成都夔府重慶叙南嘉定順慶廣元潼川紹慶等路所管州縣萬山之間西蜀四川道亷訪司成都路上宋為益州路又為成都府路元初撫定立總管府設録事司至元十三年領成都嘉定崇慶三府眉卭隆黎雅威茂簡漢彭綿十一州後嘉定自為一路以眉黎卭隸之二十年又割黎雅屬吐蕃招討司降崇慶為州隆州併入仁夀縣隸本府領縣九州七州領十一縣成都下唐宋為成都府治所元至元十三年以本縣元管大城內西北隅併入録事司華陽下新都下郫下溫江下雙流下都按四川通志元省廣縣入雙流謹附識新繁下仁夀下唐為陵州宋為隆州元至元二十年以州地荒民散併為仁夀縣隸成都府路金堂下宋屬懷安軍元初升為懷州而縣屬如故至元二十年併州入金堂縣隸成都府路彭州下年按四川通志元至元十三省九隴縣入州謹附識領二縣濛陽下崇寧下漢州下唐為德陽郡又為漢州自唐至宋苦於兵革民不聊生元中統元年復立漢州按四川通志元省雒縣入州謹附識領三縣什邡下德陽下至元八年升為德州十三年仍為縣隸成都路十八年復來屬綿竹下至元十三年以户少併入州後復置安州下唐置石泉縣宋升為軍元中統五年升為安州領一縣石泉下灌州下宋為永康軍後廢為灌口寨元初復立灌州至元十三年以導江青城二縣户少省入州崇慶州下宋為崇慶軍元至元十二年立總管府二十年改為崇慶州併江原縣入州領二縣晉原下新津下威州下唐維州宋改威州領保寧通化二縣元至元十九年併保寧入州領一縣通化下簡州下至元二十年併附郭陽安縣入州二十二年併成都府所屬靈泉縣來隸而本州有平泉以地荒竟廢之嘉定府路下宋為嘉定府元至元十三年立總管府設録事司舊領龍游夾江峨眉犍為洪雅五縣二十年併洪雅入夾江領縣四州二州領三縣龍游下夾江下峨眉下犍為下眉州下至元十四年隸嘉定路領二縣彭山下青神下卭州至元十四年立安撫司兼行州事二十一年併臨卭依政蒲江三縣入州領一縣大邑下廣元路下宋為利州路端平後地荒民散元憲宗三年立利州治設都元帥府至元十四年罷帥府改為廣元路領縣二府一州四府領三縣州領七縣綿谷下昭化下元初併葮萌入焉保寧府下唐隆州又改閬州又為閬中郡後唐為保寧軍元初立東川路元帥府至元十三年升保寧府二十年罷元帥府改保寧路初領新得小寧二州後併入閬中縣又併奉國入蒼溪縣新井新政西水總入南部縣仍改為府隸廣元路領三縣閬中下倚郭蒼溪下南部下劒州下宋為普安軍又為隆慶府元至元二十年改劒州領二縣普安下至元二十年併普城劒門入焉梓潼下龍州下本龍州元憲宗時宋守將王知府以城降至元二十二年併江油清川二縣入焉巴州下宋領化城難江恩陽曽口上通江下通江六縣元至元二十年併難江恩陽二縣入化城上下通江二縣入曽口按四川通志至正四年復置通江縣謹附識領二縣化城下曽口下沔州下至元十四年隸廣元路二十年廢褒州止設鐸水縣遷沔州而治焉領三縣鐸水下倚郭大安下本大安州至元二十年降為縣以來屬入按元一統志併三泉縣大安縣謹附識略陽下至元二十年併長舉及西縣入焉順慶路下宋為順慶府元中統元年立征南都元帥府至元四年置東川路統軍司後改東川府十五年復為順慶二十年升為路設録事司領縣二府一州二府領二縣州領五縣南充下至元二十年併漢初入焉西充下至元二十年併流溪舊縣入焉廣安府宋為廣安軍又改寧西軍元至元十五年廢寧西軍二十年升為廣安府舊領渠江嶽池和溪新明四縣後併和溪新明入嶽池領二縣渠江下倚郭嶽池下蓬州下元初立宣撫都元帥府後罷至元二十年立蓬州路總管府後復為蓬州領三縣相如至元二十年以金城寨入焉營山下至元二十年併良山入焉儀隴下至元二十年併蓬池伏虞入焉渠州下宋屬潼川府元至元十一年立渠州安撫司二十年罷安撫司以渠州為散郡領二縣流江下大竹下至元二十年併鄰山鄰水入焉潼川府宋為靜戎軍又改安靜軍又升潼川府兵後地荒元初復立府治至元二十年併涪城及録事司入郪縣通泉入射洪東關入鹽亭銅山入中江領縣四州二郪下倚郭中江下射洪下鹽亭下遂寧州下宋為遂寧府元至元十九年併遂寧青石二縣入小溪長江入蓬溪後復改為州領二縣小溪下蓬溪下綿州下元初隸成都路至元二十年併魏城入本州改隸潼川府領二縣彰明下羅江下永寧路下闕領州一筠連州下闕至元十七年樞密院言四川行省參政行諸蠻夷部宣慰司濟遜言先是奉㫖以高州筠連州騰川縣隸安撫郭漢傑立站今漢傑已併蠻洞五十六有㫖濟遜所陳卿等與中書議臣等以為宜遣使行視之帝曰此五十六洞如舊隸高州筠達則與郭漢傑立站否則還之濟遜領一縣騰川下四川南道宣慰司至元十六年立重慶路上宋為重慶府元至元十六年立重慶路總管府二十一年升為上路割忠涪二州為屬郡二十二年又割盧合來屬省壁山入巴縣廢南平軍入南川縣為屬邑置録事司領縣三州四州領十縣巴下倚郭江津下至元十六年賜四川行省參政濟遜田民百八十戶於江津縣南川下至按四川通志元元十一年廢南平軍及隆化縣改置南川縣謹附識瀘州下宋為瀘川軍元至元二十年併瀘川縣入焉二十二年隸重慶路領三縣江安下納溪下合江下忠州下唐為忠州宋為咸淳府元仍為忠州領三縣臨江下南賔下豐都下元按四川通志至元中併墊江縣入豐都謹附識合州下元至元十五年宋安撫使王立以城降二十年為散郡併録事司赤水入石照縣二十二年改為州按四川通志元併昌州及所領永川昌元大足入合州謹附識隸重慶路領三縣銅梁下元初併巴川入焉定逺下本宋地名女菁平元至元四年便宜都總帥部兵創為武勝軍後為定逺州二十四年降為縣石照下涪州下至元二十年併涪陵樂溫二縣入焉領一縣武龍下紹慶府下宋為紹慶府元至元二十年仍置府領二縣彭水下黔江下懷德府領州四闕來寧州下柔逺州下酉陽州下服州下夔州路下宋為帥府元至元十五年立夔州路總管府以施雲安萬大寧四州隸焉二十二年又以開達梁山三州來屬設録事司領縣二州七州領五縣奉節下巫山下施州下舊領清江建始二縣至元二十二年併清江入州領縣一建始下達州下至元十五年隸四川東道宣慰司二十二年改隸夔州路領二縣通川下新寧下梁山州下宋為梁山軍元至元二十年升為州領一縣梁山下萬州下宋為浦州元至元二十年以南浦為萬州領一縣武寧雲陽州下宋置安義縣元至元十五年立雲安軍二十年升雲陽州併雲陽縣入焉大寧州下舊大昌縣宋置監元至元二十年升為州併大昌縣入焉開州下叙南等處蠻夷宣撫司叙州路本戎州宋為上州屬東川路後易名叙州咸淳中城登髙山為治所元至元十二年郭漢傑挈城歸附十三年立安撫司未幾毁山城復徙治三江口罷安撫司立叙州十八年復升為路隸諸部蠻夷宣撫司領縣四州二宜賔下慶符下南溪下宣化下富順州下宋富義監後改富順縣元至元十二年改立富順監安撫司二十年罷安撫司升富順州髙州下唐開拓邊地於本部置髙州宋設長寧軍十州族姓俱效順元至元十五年雲南行省遣官招諭內附十七年知州郭安復行州事蠻人散居村囤無縣邑鄉鎮馬湖路下漢唐以下名馬湖部宋時蠻主屯湖內元至元十三年內附立總管府遷於夷部溪口瀕馬湖之南岸創府治其民散居山箐無縣邑鄉鎮領軍一州一長寧軍宋長寧軍立安寧縣元至元十二年郡守黃立挈城效順二十二年設録事司後與安寧縣俱省入本軍戎州下本夜郎國西南蠻種唐時置晏州元至元十三年濟遜為蠻夷部宣撫司遣官招諭十七年本部官得蘭紐來見授以大壩都總管二十二年升為戎州附蠻夷種落上羅計長官司領蠻地羅計羅星古夜郎境為西南種族前代置之化外宋設長寧軍十州族姓俱效順各命之官其後分姓他居遂有上下羅計之分元至元十三年蠻夷部宣撫濟遜引本部夷酋得賴阿當歸順十五年授為得賴阿當千户十八年黎州同知李竒以武略將軍來充羅星長官二十二年夷人叛誘訹上羅星夷行樞密院討平之其民人散居村箐無縣邑鄉鎮下羅計長官司領蠻地近烏蠻與叙州長寧軍相接均為西南夷族與上羅計同至元十二年長寧知軍率先內附十三年濟遜引本部夷酉得顔箇詣行樞密院降奏充下羅計蠻夷千户二十二年諸蠻皆叛惟本部無異志四十六囤蠻夷千户所領豕蛾夷地在夢符向南抵定州古夜郎之屬唐羈縻定州之支江縣也元至元十三年收附於慶符縣僑置千户所領四十六囤黃水口上下落骨山落牟許滿吳落麼落財得麼落賢落騰息奴得屯莫面得落搔麼梅麼幸上松麼㑹麼惡盧落魂落昧下村斛落島宿麼得享色落燕搔落得麼了麼騰許麼九落屯右得麼得晏得落能騰山落寡落水落寡具麼淵曰彯昧上村落得擂許麼賴扇焰騰郎姦周頭郎賣落炎得落女上愛答洛愛愛答速麼得阿頭下辛得辛得婁落鷗秦加大散等洞以下各設蠻夷官秦加大散等洞隴斜崖冒朱等洞堤紂皮等洞洞石耶洞兀散毛洞白彭家洞處黑土石等處市備樂化都剌布享羅等洪望冊德等族水大江九姓羅氏西鹿朝阿永蠻部至元二十一年酋長阿泥入覲自言阿永鄰境烏䝉等蠻悉隸皇大子位願依例附屬詔從其請以阿永蠻隸宫府有師壁洞安宣撫司永順等處軍民安撫司阿者洞以下各設蠻夷官阿者洞壩謝甲洞洞上安下阿渠必下役洞藏等處驢虛洞處錢滿等處寨水洞下曲等寨冒酌宜等雍邦等崖筍等寨朱洞沙麻峽柘歌等寨洞新附嵬羅金井溪等處宙窄新容米洞甘肅等處行中書省為路七州二屬州五本省馬站六處河西隴北道肅政亷訪司甘州路上唐為甘州又為張掖郡宋初為西夏所據改鎮夷郡又立宣化府元初仍稱甘州至元元年置甘肅路總管府八年改甘州路總管府十八年立行中書省以控制河西諸郡永昌路下宋初為西涼府真宗景德中陷入西夏元初仍為西涼府至元十五年以永昌王宫殿所在立永昌路降西涼府為州隸焉領州一西涼州下肅州路下唐為肅州又為酒泉郡宋初為西夏所據元太祖二十一年西征攻肅州下之至元七年置肅州路總管府沙州路下唐為沙州又為燉煌郡宋仍為沙州仁宗景祐初西夏陷瓜沙肅三州盡得河西故地金因之元太祖二十二年破其城以隸八都大王至元十四年復立州十七年升為沙州路總管府瓜州隸焉沙州去肅州千五百里內附貧民欲乞糧沙州必須白之肅州然後給與朝廷以其不便故升沙州為路領州一瓜州下唐改為晉昌郡復為瓜州宋初陷於西夏夏亡州廢元至元十四年復立二十八年徙居民於肅州但名存而已額齊訥路下漢西海郡居延故城夏國嘗立威福軍元太祖二十一年內附至元二十三年立總管府寧夏府路下唐末有拓跋思恭者鎮夏州世有銀夏綏宥靜五州之地宋真宗天禧間傳至其孫德明城懷逺鎮為興州以居之後升興慶府又改中興府元至元二十五年置寧夏路總管府至元八年立西夏中興等路行中書省元貞元年革寧夏路行中書省併其事於甘肅行省領州三靈州下唐靈武郡宋初陷於夏國改為翔慶軍鳴沙州下隋鳴沙縣宋沒於夏國仍舊名元初立鳴沙州應理州下與蘭州接境東阻大河西據沙山考之圖志乃唐靈武郡城其州地未詳建立之始元初仍立州山丹州下唐為刪丹縣宋初為夏國所有置甘肅軍元初為阿濟格大王分地至元六年行山丹城事刪訛為山二十二年升為州隸甘肅行省西寧州下唐置鄯州理湟水縣肅宗上元間沒於土蕃號青唐城宋改為西寧州元初為章吉駙馬分地至元二十三年立西寧州烏拉海路太祖四年由黑水城北烏拉海西關口入河西獲西夏將高令公克烏拉海城欽定續通典卷一百三十六
