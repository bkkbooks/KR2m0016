body:
  text: 食貨錢幣上唐五代宋唐肅宗上元元年詔曰因時立制頃議新錢且是從權知非經久如聞官爐之外私鑄頗多吞併小錢踰濫成弊扺罪雖衆禁姦未絶況物價益起人心不安事藉變通期於折衷其重稜五十價錢宜減作三十文行用其開元舊時錢宜一當十文行用其乾元十當錢宜依前行用仍令中京及畿縣內依此處分諸州待進止尋敕重稜五十價錢先令畿內減至三十價行其天下諸州並宜準此又詔應典貼莊宅店鋪田地碾磑等先為實錢典貼者令還以實錢贖先以虛錢典貼者令虛錢贖其餘交關並依前用給賞價錢由是錢有虛實之稱寶應元年時代宗已即位改行乾元錢一以當三乾元重稜小錢亦以一當二重稜大錢一以當三尋又改行乾元大小錢並以一當一其私鑄重稜大錢不在行用之限人甚便之其後破錢鑄器不復出矣時諸道鹽鐵轉運使劉晏以江嶺粗賤之貨積之江淮易銅鉛薪炭廣鑄錢嵗得十餘萬緡輸京師及荆揚二州代宗大歷四年關內道鑄錢等使户部侍郎第五琦請於絳州汾陽銅原兩監增置五爐鑄錢許之七年禁天下新鑄造銅器唯鏡得鑄其器舊者不得貨鬻德宗建中元年户部侍郎韓洄上言江淮錢監嵗共鑄錢四萬五千貫輸於京師度工用轉送之費每貫計錢二千是本倍利也今商州有紅崖冶出銅益多又有洛源監久廢不理請增工鑿山以取銅興洛源錢監置十爐鑄之嵗計出錢七萬二千貫度工用轉送之費貫計錢九百則利浮本也其江淮七監請皆停罷又天下銅鐵之冶是曰山澤之利當歸於王者非諸侯方嶽所宜有今諸道節度都團練使皆占之非宜也請總𨽻鹽鐵使皆從之二年諸道鹽鐵使包佶奏江淮百姓近日市肆交易錢多粗惡揀擇納官者三分才有二分餘並鉛錫銅蕩不敷斤兩致使絹價騰貴惡錢漸多訪聞諸州山野地窖皆有私錢轉相貿易姦濫漸深今後委本道觀察使明立賞罰切加禁斷貞元初禁錢出駱谷散關九年張滂奏諸州府公私諸色鑄造銅器雜物等伏以國家錢少損失多門興販之徒潛將銷鑄錢一千為銅六斤造寫器物則斤直六百餘其利既厚銷鑄遂多江淮之間錢實減耗伏請準從前敕文除鑄錢外一切禁斷又禁陌內欠錢時商賈至京委錢諸道進奏院及諸道諸使以輕裝趨四方合劵乃取之號飛錢元和四年禁之後民有滯藏物價浸輕判度支盧坦請許於户部度支鹽鐵三司飛錢每千錢增給百錢然商人無至者又禁賣劒銅器天下有銅山任人採取其銅官買除鑄鏡外不得鑄造十年敕鑄造銅器不須禁止其每斤買賣價直不得過一百六十文如有銷錢為銅者以盜鑄錢罪論十四年鹽鐵使李若初奏諸道州府多以近日泉貨數少繒帛價輕禁止見錢不令出界致使課利有闕商賈不通請指揮見錢任其往來勿使禁止從之憲宗元和元年以錢少禁用銅器二年禁鉛錫錢三年鹽鐵使李巽以郴州平陽銅坑二百八十餘井以兩爐日鑄錢二十貫一年鑄成七千貫有益于人從之時天下嵗鑄錢十三萬五千緡又詔曰泉貨之法義在通流若錢有所壅貨當益賤故藏錢者得乘人之急居貨者必損已之資今欲著錢令以出滯藏加鼓鑄以資流布使商旅知禁農桑獲安義切救時情非欲利若革之無漸恐人或相驚應天下商賈先蓄見錢者委所在長吏令收市貨物官中不得輒有程限逼迫商人任其貨易以求便利計周嵗之後此法遍行朕當别立新規設蓄錢之禁所以先有告示許其方圓意其他時行法不貸又天下有銀之山必有銅礦銅者可資于鼓鑄銀者無益于生人權一重輕使務專一其天下自五嶺以北見採銀坑並宜禁斷採銀一兩者流他州官吏論罪按韓愈錢重物輕狀云五嶺買賣一以銀元微之錢貨議狀自嶺以南以金銀為貨幣其時天下惟用錢白金尚未通行也四年京師用錢緡少二十文陌內欠錢及有鉛錫錢者捕之敕五嶺以北所有銀坑依前任百姓開採禁見錢出嶺六年詔貿易錢十緡以上參用布帛河東節度使王鍔奏請于當管蔚州界加置爐鑄銅錢廢管內錫錢許之仍令加至五爐七年詔令度支量支錢三萬貫充蔚州鑄錢本復詔曰錢重物輕為弊頗甚詳求適變將以便人所貴緡貨通行里閭寬息宜令百寮各隨所見作利害狀以聞八年以內庫錢五十萬貫令兩市收市布帛每端匹估加十之一時兵興七道經費屈竭皇甫鎛建議內外用錢每緡墊二十外復抽五十送度支以贍軍十二年復給京兆府錢五十萬緡市布帛而富家錢過五千貫者死王公重貶沒入于官以五之一賞告者京師區肆所積皆方鎮錢少亦五十萬緡乃爭市第宅然富賈倚左右神策軍官錢為名府縣不敢劾問民間墊陌有至七十者鉛錫錢益多十四年敕時用錢每貫除二十文足陌內欠錢有鉛錫者宜令京兆府枷項收禁穆宗即位京師鬻金銀十兩亦墊一兩糴米鹽百錢墊七八長慶元年以所在用錢墊陌不一詔從俗所宜內外給用每貫一例除墊八十以九百二十文成貫不得更有加除及陌內欠少户部尚書楊於陵曰王者制錢以權百貨貿遷有無變通不倦使物無甚貴甚賤其術非他在上而已何則上之所重人必從之古者權之于上今索之于下昔散之四方今藏之公府昔廣鑄以資用今減爐以廢功昔行之於中原今泄之於邊裔又有閭井送終之唅商賈貸舉之積江湖壓覆之耗則錢焉得不重貨焉得不輕開元中天下鑄錢七十餘爐嵗盈百萬今才十數爐嵗入十五萬而已大歷以前淄青太原魏博雜鉛鐵以通時用嶺南雜以金銀丹砂象齒今一用泉貨故宜不足今宜天下兩稅𣙜酒鹽利上供及留州送使錢悉輸以布帛榖粟則人寬于所求然後出內府之積收市㕓之滯廣山鑄之數限邊裔之出禁私家之積則貨日重而錢日輕矣敬宗寶歷元年河南尹王起請銷錢為佛像者以盜鑄錢論制可文宗太和三年中書門下奏元和四年敕應有鉛錫錢並令納官如有人糾得一錢賞百錢當時敕條貴在峻切今詳事實必不可行宜立節文令可遵守臣等商量自今已後有用鉛錫錢交易者一貫已下州府常行杖決脊杖二十十貫已下決六十徒三年過十貫已上集衆決殺其受鉛錫錢交易者亦準此處分其所用鉛錫錢並納官其能糾告者每一貫賞錢五十不滿一貫者準此詔可之四年詔積錢以七千緡為率除合貯數外一萬緡至十萬緡者期以一年出之十萬至二十萬者以二年凡交易百緡以上者匹帛米粟居半河南府揚州江陵府以都會之劇約束如京師未幾皆罷五年鹽鐵使奏湖南管內諸州連接嶺南山洞深邃百姓依模監司錢樣競鑄造到脆惡姦錢轉將賤價博易與好錢相和行用其江西鄂嶽桂管鑄濫錢並請委本道觀察條疏禁絶詔從之八年河東錫錢復起鹽鐵使王涯置飛狐鑄錢院于蔚州天下嵗鑄錢不及十萬緡時文宗病幣輕錢重詔方鎮縱榖交易時雖禁銅為器而江淮嶺南列肆鬻之鑄千錢為器售利數倍宰相李珏請加爐鑄于是禁銅器官一切為市之天下銅坑五十嵗采銅二十六萬六千斤武宗會昌六年二月敕緣諸道鼓鑄佛像鐘磬等新錢已有次第須令舊錢流布絹帛價稍增文武百寮俸料宜起三月一日並給見錢其一半先給虗估匹段對估價支給敕比緣錢重幣輕生人坐困今加鼓鑄必在流行通變救時莫切于此京城及諸道起今年十月以後公私行用並取新錢其舊錢權停三數年如有違犯同用鉛錫惡錢例科斷其舊錢並納官事竟不行復廢浮屠法永平監官李郁彥請以銅像鐘磬爐鐸皆歸巡院州縣銅益多矣復許諸道皆得置錢坊淮南節度使李紳請天下以州名鑄錢京師為京錢大小徑寸如開元通寶交易禁用舊錢會宣宗即位盡革會昌之政新錢復鑄為像昭宗末京師用錢八百五十為貫每陌才八十五河南府以八十為陌哀帝天祐二年敕每貫抽除外以八百五十文為貫每陌八十五文聞坊市多以八十為陌更有除折今後委河南指揮市肆交易並須以八十五文為陌後唐莊宗同光二年詔曰錢者古之泉布蓋取其流行天下布散人間無積滯則交易通多貯藏則士農困故西漢興改幣之制立告緡之條所以權蓄賈而妨大姦也宜令所司不得令富室分外收貯見錢又工人銷鑄為銅器兼沿邊州鎮設法鈐轄勿令商人搬載出境知唐州駢晏平奏市肆間點檢錢帛內有錫蠟小錢揀得不少皆是江南綱商挾帶而來詔曰泉布之幣雜以鉛錫惟是江湖之外盜鑄尤多市肆之間公行無畏因是綱商挾帶舟楫往來换易好錢藏貯富室實為蠧弊須有條流宜令京城諸道于坊市行使錢內點檢雜惡鉛錫並宜禁斷沿江州縣每有舟船到岸嚴加覺察若私載往來並宜收納明宗天成元年敕諸道州府及諸城門所出見錢如五百以上不得放出至行使銅錢不得挾帶蠟錢如違其所使錢不限多少並納入官仍科深罪二年度支奏三京諸道買賣見錢舊有條流每陌八十文近市肆人户皆將短陌轉换長錢若不條約轉啓幸門請指揮買賣並須使八十陌錢從之時銅器貴市人多銷錢為器及以鐵蠟鉛錫錢夾用廢帝時屢禁之終不能行晉髙祖天福三年詔曰國家所資泉貨為重令三京鄴都諸道州府曉示無問公私應有銅者並許鑄錢仍以天福元寶為文左環讀之委鹽鐵使鑄樣頒下諸道令每一錢重二銖四參十錢重一兩仍禁以鉛鐵鑄造雜亂銅錢凡久廢銅冶處許百姓取便開鍊官中不取課利除鑄錢外不得接便别鑄銅器尋以逐處銅闕難依先定銖兩令天下有銅欲鑄錢者取便酌量輕重鑄造不得入錫并鐵及缺漏不堪久逺用使四年敕今後祇官鑄錢私下禁復建泉罏于欒州為石豹冶漢隱帝時三司使王章征利剝下緡錢出入原以八十為陌章每出錢陌必減其三始使七十七陌錢時膳部郎中羅周允上言曰錢刀之貨古今通行從古自來鑄造不息長無積聚蓋被銷鎔若不峻設隄防何以絶其姦宄臣請敕三京鄴都諸道州府凡器物服玩民間百物舊有銅者今後禁斷不得用銅諸郡邑州府鄽市已成銅器及腰帶幞頭線及門户飾許敕出後一月並令納官官中約定銅價支給候諸處納畢請在京置罏鑄錢俾銅盡為錢以濟軍用除錢外只令鑄鏡其餘並不得用銅疏奏不報周太祖廣順元年敕銅法今後官中更不禁斷一任興販所有一色即不得瀉破為銅器貨賣如有犯者有人糾告所犯人不計多少斤兩並處死其地方所由節級徒三年鄰保人杖七十其告事人給與賞錢一百貫世宗顯德二年敕國家之利泉貨為先近朝以來久絶鑄造至于私下不禁銷鎔嵗月漸深姦弊尤甚今採銅興冶立監鑄錢冀便公私宜行條制起今後除朝廷法物及火珠鈴鐸其餘一切禁斷應兩京諸道所有銅器限敕到五十日內並須毁折送官所納到銅據斤兩給價如出限及有隱藏五斤以上處死一兩至五斤罪各有差初以髙麗地産銅銀遣尚書水部員外郎韓彥卿以帛數千匹市銅于髙麗以鑄錢六年其王髙昭遣使者貢黃銅五萬斤南唐元宗既失江北困于用兵鍾謨請鑄大錢以一當十曰永通泉貨未幾廢時韓熙載又鑄鐵錢以一當十宋之錢法有銅鐵二等而折二折三當五折十則隨時立制因地定規時西川湖南福建皆用鐵錢與銅錢兼行江南舊用鐵錢十當銅錢一太祖初鑄錢文曰宋通元寶凡諸州輕小惡錢及鐵鑞錢悉禁之自平廣南朝廷聽權用舊錢勿過本路之境其私鑄者皆棄市江南錢不得至江北蜀平聽仍用鐵錢乾德四年令所在悉用七十七百為貫重四斤半以上初輸官錢用八十或八十五為百然諸州私用隨俗至有以四十八為百至是始定開寶四年詔雅州百丈縣置監冶鑄鐵錢嵗鑄九千餘貫增十罏禁銅錢入兩川太平興國初復令兼行銅錢一當鐵錢十九年升州言嵗鑄三十萬緡命通判杜見素經度采銅時復取唐飛錢故事許民入錢京師于諸州便換其法商人入錢左藏庫先經三司投牒乃輸于庫開寶三年置便錢務令商人入錢詣務陳牒即輦至左藏庫給以劵仍敕諸州凡商人賫券至當日給付違者科罰至道末商人入便錢一百七十餘萬貫天禧末增一百一十三萬貫至是乃復增定加饒之數每百緡河東京西加饒三千在京餘路四千太宗即位改元太平興國更鑄太平通寶錢二年樊若水言江南舊用鐵錢于民非便宜于升鄂饒等州産銅之地大鑄銅錢銅錢既不渡江益以新錢則民間錢愈多鐵錢自當不用悉鎔鑄為農器什物以給江北流民之歸附者除銅錢渡江之禁從之四年聽銅錢入蜀而鐵錢不出境令民輸租及𣙜利鐵錢十納銅錢一時銅錢已竭民甚苦之商賈爭以銅錢入川界與民互市銅錢一得鐵錢十四五年轉運副使張諤言川峽鐵錢十直銅錢一輸租即十取二舊用鐵錢千易銅錢四百自平蜀沈倫等悉取銅錢上供及增鑄鐵錢易民銅錢益買金銀裝發頗失裁制物價滋長鐵錢彌賤請市畨人銅斤鐵錢千可大獲銅鑄錢民租當輸錢者許且輸銀絹候銅錢多即漸令輸詔令市銅斤給錢五百餘皆從之然銅卒難得而轉運副使聶詠轉運判官范祥皆言民樂輸銅錢請嵗遍增一分後十嵗則全取銅錢詔如所請祥等以俸所得銅錢市與民厚取其直于是增及三分民益為苦坐罪者甚衆知益州辛仲甫具言其弊帝使吳承勳馳傳審度因集諸縣令佐皆言不便尋令川峽輸租𣙜利勿復徴銅錢詠祥等皆坐罪免西北戎人多賫貨帛于秦階州易銅錢出塞銷鑄為器詔吏民闌出銅錢百已上論罪至五貫以上送闕下饒州永平監用唐開元錢料鑄錢最善轉運使張齊賢即詣闕面陳八年詔增市鉛錫炭價于是得銅八十一萬斤鉛二十六萬斤錫十六萬斤嵗鑄錢三十萬貫天聖間嵗鑄百餘萬貫慶厯間至三百萬熙寧六年後嵗鑄銅鐵錢六百餘萬貫時奚嶼請于建州鑄大鐵錢文曰太平通寶尋罷之雍熙初令江南諸州貯庫雜錢每貫及四斤半者送闕下不及者銷毁時復禁用惡錢京城居民蓄銅器者限兩月送官端拱元年詔察民私鑄及銷鎔好錢作薄惡者並棄市輒以新惡錢與蠻人博易者抵罪江北諸州用錢非甚薄惡者新舊大小兼用江南仍用舊大錢淳化間鑄淳化元寶錢自後改元更鑄皆曰元寶又令川峽路改鑄一當十大錢御書錢式諸州舊貯小鐵錢悉輦送官從趙安易請也未幾罷仍以銅錢一當鐵錢十四年詔每貫及前詔斤數有官監字號者皆許用不分新舊五年令荆南嶺南民輸稅須大錢民以小錢二或三易大錢一官屬以俸錢易于民以規利詔禁之令民輸納但常所通行錢至道二年池州新置錢監賜名永豐真宗咸平初又申新小錢之禁令官置場盡市之二年宰臣張齊賢請置監廣鑄命虞部郎馮亮等按視至建州置豐國監江州置廣寧監凡鑄錢用銅三斤十兩鉛一斤八兩錫八兩得錢千重五斤唯建州增銅五兩減鉛如其數三年凡鑄一百二十五萬四年詔犯銅滿五十斤以上取裁餘從第減舊禁犯銅七斤以上者處死多蒙減斷因詔景德中嵗鑄一百八十三萬貫大中祥符間銅坑多不發時鐵錢有三監邛州曰惠民嘉州曰豐逺興州曰濟衆大錢貫十二斤十兩嘉邛二州所鑄錢貫二十五斤八兩銅錢一當小鐵錢十兼用盜多鎔鐵為器每二十五斤鬻之直二千七年從凌䇿請詔減景德之制嵗鑄總二十一萬貫四方由此錢重而貨輕時張詠鎮蜀患蜀人鐵錢重不便貿易設質劑之法一交一緡以三年為一界而換之六十五年為二十二界謂之交子交會之法蓋取于唐之飛錢富民十六户主之後富民資稍衰不能償所負爭訟不息仁宗時轉運使薛田張若谷請置益州交子務以𣙜其出入私造者禁之帝從其議界以百二十五萬六千三百四十緡為額景祐初度支判官許申建議以藥化鐵與銅雜鑄輕重如銅錢法銅三分鐵六分費省而利厚詔命申鑄萬緡工人苦鐵之流澀而多不就逾月才得萬錢申知言無效乃求為江東轉運使欲行其法于江州朝廷從之詔申即江州鑄百萬緡卒無成功寶元間命錢以皇宋通寶為文慶厯以後復冠以年號是時軍興陜西移用不足用知商州皮仲容議采洛南縣江崖山虢州青水冶青銅置阜民朱陽二監以鑄錢既而陜西都轉運使張奎知永興軍范雍請鑄大銅錢與小錢兼行大錢一當小錢十奎等又請因晉州積鐵鑄小錢及奎徙河東又鑄大鐵錢以一當十以助關中軍費未幾三司奏罷河東鑄大錢鐵錢而陜西復采儀州竹尖嶺黃銅置博濟監鑄大錢因敕江南鑄大銅錢而江池饒儀虢州又鑄小鐵錢悉輦至關中數州錢雜行大約小銅錢三可鑄當十大銅錢一以致民間盜鑄者衆錢文大亂公私患之于是奎復奏晉澤石三州及威勝軍日鑄小鐵錢獨留用河東河東鐵錢既行盜鑄獲利十六錢輕貨重其患如陜西言者皆以為不便知并州鄭戩請以河東鐵錢二當銅錢一行之一年又以三當一或以五當一罷官罏日鑄且行舊錢知澤州李昭遘亦言河東民燒石灰家有槖冶之具盜鑄者莫可詰而契丹亦鑄鐵錢以易并邊銅錢朝廷遣魚周詢歐陽修分察兩路錢利害至慶厯末遂命學士張方平宋祁御史中丞楊察與三司雜議時葉清臣復為三司使與方平先上陜西錢議曰關中用大錢本以縣官取利太多致姦人盜鑄其用日輕比年以來皆虛髙物估始增直于下終取償于上縣官雖有折當之虛名乃罹虧損之實害救弊不先自損則法未易行請以江南儀商等州大銅錢一當小銅錢三又言姦人所以不鑄小銅錢者以鑄大銅錢得厚利而官不能必禁若鑄大銅錢無利又將鑄小鐵錢以亂法請以小鐵錢三當銅錢一既而河東小鐵錢如陜西亦以三當一且罷官所置罏朝廷皆用其言自是姦人稍無利猶未能絶濫錢皇祐中詔商州罷鑄青黃銅錢又令陜西大銅錢大鐵錢皆以一當二盜鑄乃止然令數變兵民耗于用類多咨怨久之始定時興元府西縣增置濟逺監尋廢而韶州天興銅大發嵗采二十五萬斤詔即州置永通監饒池江建韶五州鑄錢百四十六萬緡嘉邛興三州鑄大鐵錢二十七萬緡至和二年韶州岑水場銅發詔漕司益鑄錢嘉祐四年詔停鑄十年以休民力至是獨興州鑄錢三萬英宗治平四年置惠州阜民監神宗熙寧初立偽造交子罪賞如官印文書法二年以河東運鐵錢勞費乃詔置交子務于潞州尋致鹽礬不售有害入中糧草遂罷之三年陜西興置鑄錢監市岑水場銅鉛增鑄百萬緡四年令行交子于陜西而罷永興軍鹽鈔場陜西轉運副使皮公弼奏自行當二錢銅費相當盜鑄衰息請以舊銅鉛盡鑄詔聽之自是折二錢遂行于天下五年交子二十二界將易而後界給用已多詔更造二十五界百二十五萬以償二十三界之數交子之有兩界自此始時交子給多而錢不足致價大賤既而竟無實錢法不可行于是罷陜西交子法六年又詔京西淮南兩浙江西荆湖各置鑄錢監一又于興國軍睦衡舒鄂惠州置十監通舊六監為十六監時諸路大率務于增額惠州永通阜民舊額八十萬至七年增三十萬及折二凡五十萬衛州黎陽監嵗增折二五萬緡西京阜財監嵗增十萬緡興州濟衆監嵗增七萬二千餘緡陜西銅錢監三嵗各增五萬緡又于陸徐梧萬皆置監秦鳳等路即鳳翔府斜谷置監至是法弊私錢雜用不能禁詔在官惡錢不堪用者别為模以鑄八年于商虢洛南增置三監耀鄜又權置二監合通永興華河中共為監九以給改鑄令候改鑄罷并其工作歸永興等四監專鑄大錢知太原韓絳請倣陜西令本重模精以息私鑄之弊元豐元年興州濟衆監增鑄并舊為七萬二千餘緡二年通逺軍監改鑄銅錢自是而後西師大舉邊用匱闕同渭秦隴等州監并廢置而又自弛錢禁民之銷毁與夫闌出境外者為多張方平嘗極諫曰禁銅造幣盜鑄者抵罪至死示不與天下共其利也故諸監所鑄錢悉入于王府嵗出其竒羡給之三司方流布于天下然自太祖平江南江池饒建置罏嵗鼓鑄至百萬緡積百年所入宜乎貫朽于中藏充足于民間矣比年公私上下並苦乏錢百貨不通人情窘迫謂之錢荒不知嵗所鑄錢今將安在夫鑄錢禁銅之法舊矣令敕具載而自熙寧七年頒行新敕刪去舊條削除錢禁以此邊關重車而出海舶飽載而回聞沿邊州軍錢出外界但每貫收稅錢而已錢本中國寶貨今乃與四海共用又自廢罷銅禁民間銷毁無復可辦銷鎔十錢得精銅一兩造作器用獲利五倍如此則逐州置罏每罏增數是猶畎澮之益而供尾閭之泄也三年計諸路鑄錢總二十七監鑄銅鐵錢五百九十四萬九千二百三十四貫銅錢十七監鑄五百六萬鐵錢九監鑄八十八萬九千二百三十四貫鐵錢惟成都梓州利州夔州四路行使其餘開封府管十三路俱行使銅錢八年復申錢幣闌出之禁時哲宗已即位敕罷徐州寶豐鼓鑄及凡增置鑄錢監罷者十四陜西行鐵錢至陜府以東即銅錢地民以鐵錢換易有輕重不等之患哲宗元祐二年置河中府龍門韓城錢監八年命公私給納貿易並專用鐵錢而官帑銅錢以時計置運致內郡商旅願于陜西內郡入銅錢給據請于别路者聽罷二廣鑄折二錢時鐵錢寖輕以銅錢千易鐵錢二千五百熙豐間銅鐵錢嘗並行銅錢千易鐵錢千五百未有輕重之弊因定鈎致折二銅錢之法欲復舊止行于本路議者謂關東諸路既已通行奪彼豫此理亦非便且陜右所用折二鐵錢止當一小銅錢即折二銅錢盡歸陜西猝難鈎致且與鐵錢一等慮鐵錢轉更加輕乃令折二銅錢寬所行地聽行于陜西及河東晉絳等州餘路則禁仍限二年無更用尋詔更鑄小銅錢紹聖二年施州置廣積監時交子界率增造以給陜西沿邊之用少者數十萬緡多則百萬而成都之用乂請印造故每嵗無定數元符二年詔陜西悉禁銅錢在民間者盡送官取就京西置監徽宗嗣位議者謂鐵錢重滯難以齎逺而銅錢積貯州縣反無所用乃詔銅鐵錢聽民間通行而銅錢止用糴買時鐵錢多而銅錢少有請鑄銅錢者陜西轉運副使孫傑有請罷鑄鐵錢者轉運判官都貺會蔡京當政令陜西鑄當十錢及夾錫錢許天啓推行其法當十錢除陜西四川河東係鐵錢地方不得行使外諸路並行之如有私鑄即以一文計小錢十定罪夾錫錢以一折銅錢二既而河東轉運使洪中孚言二敵以中國錢鐵為兵器請鑄夾錫當三當十錢通行于天下會蔡京罷相乃止又令陜西及江池饒建州以嵗所鑄小平錢增料改鑄當五大銅錢以聖宗通寶為文既而并令舒睦衡鄂錢監用陜西式鑄折十錢是時諸州所積折二錢甚多法不許轉運京師發運司請以官帑所有折二錢改鑄折十錢崇寧三年罷鑄小平錢及折五錢置監于京城復徐州寶豐衛州黎陽監並改鑄折二錢為折十折二期一嵗勿用大嚴私鑄之令民間所用鍮石器物並官造鬻之又令二廣于産鐵處鑄小鐵錢止行于兩路于潯州置鐵錢監依陜西料鑄當二錢時令京西北路通行交子四年令諸路用錢引惟閩浙湖廣不行罷在京并永興軍交子務又立錢綱驗樣法崇寧監以所鑄當十錢來上緡重銅九斤七兩有竒鉛半之錫居三之一詔頒式于諸路令赤仄及烏背書畫分明時尚書省言東南諸路盜鑄當十錢者多令福建廣南毋行用第鑄以上供及給他路行使其本路别鑄小平錢又命荆湖南北江南東西兩浙並以折十錢為折五舊折二錢仍舊乃以江為界淮南重寶錢亦作當五用五年盜鑄尤甚小平錢益少命以折五折十為上供小平錢留本路錢監嵗課以八分鑄小平錢二分鑄當十錢又詔福建淮南等處以折二錢改鑄折十復罷鑄當十二分之令盡鑄小平錢荆湖江南兩浙淮南重寶錢作當三在京畿及熙河等處作當五旋復詔當十錢仍舊兩浙作當三江南淮南荆湖作當五尋詔當十錢止行于京師陜西河東河北俄畿內并用之餘路悉禁期以一季送官償以小錢私錢亦限一季自致計銅直增二分償以小錢尋令外路每一私錢計小平錢三以小錢易于官在京以四小平錢易之隱匿者論如法又詔鄭州西京亦聽用折十錢尚書省言錢引本以代鹽鈔而諸路行之不通欲權罷印製在官者如舊法更印改解鹽鈔民間者許貿易漸赴買鈔所如鈔法分數計給從之大觀元年復主用折十錢京畿置錢監専鑄之衡鄂舒暨廣南皆鑄夾錫錢時蔡京復相轉運使宋喬年鑄烏背漉銅錢進詔以漉銅式頒諸路并頒大觀新修錢法于天下又置真州鑄錢監以本路不依式錢及當二錢用舊式改鑄當十錢改四川交子務為錢引務更界年新交子一當舊者四故更張之以四十三界引準書放數時用兵湟廓西寧籍其法以助邊費較天聖一界逾二十倍而價愈損二年詔永興軍更置務納換陜西河東引令江池饒建州錢監自來嵗以鑄當十五分鑄小平錢復申私鑄之法三年申當十錢行使之令益以京東京西行使而河北並邊州縣鎮寨四𣙜場及登萊密州緣海縣鎮等皆禁復以兩浙鑄夾錫錢擾民詔東南皆罷鑄時蔡京復罷相又詔錢引四十一界至四十二界毋收易四年假四川提舉司封樁錢五十萬緡為成都務本又詔鼓鑄當十錢多慮法隨以弊其止鑄舊額小平錢時利州路錢輕貨重提刑司言欲將折二大鐵錢以一折一雖稍減錢數錢必稍重詔許陜西鐵錢仍舊入蜀其河北河東京東皆罷鑄夾錫錢産銅郡縣改鑄小平錢政和元年詔官私當十錢可並作當三以為定制時御府之用日廣東南錢額不敷宣和以後尤甚乃令饒贑錢監鑄小平錢尋又令江池饒錢監盡以小平錢改鑄當二錢以紓用度二年復鑄夾錫錢如故廣西湖北淮東如之且令諸路以銅錢監復改鑄夾錫遂以政和錢頒式焉未幾以夾錫錢不以何路所鑄並許通行陜西用政和通寶舊大鐵錢與夾錫錢雜慮流轉諸路四年詔無更行用致令諸監改鑄夾錫錢鄭居中劉正夫為相奏禁淮南諸路夾錫錢并罷各監各監鑄造止用舊法鼓鑄重和元年權罷京西鑄夾錫錢繼以關中糴買用復命鼓鑄專給關中行欽宗靖康元年令川引並如舊即成都府務納換以置務成都便利嵗久至諸州則有料次相雜之弊欽定續通典卷十一
