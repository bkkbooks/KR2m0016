乗黒質兩箱軬裝前有曲欄金銅鉓上施紫通幰絡帶門簾皆繡雲鶴紫絲網帉錔每乘駕二牛駕士十人五車宋宋制鹵簿有青旌車赤質曲壁中載青旌以絳帛為之畫青鳥於其上鳴鳶車赤質曲壁中載鳴鳶旌以絳帛為之畫鳴鳶於其上飛鴻車赤質曲壁中載飛鴻旌以絳帛為之畫飛鴻於其上虎皮車赤質曲壁中載虎皮旌以絳帛為之縁以赤畫虎皮於上貔貅車赤質曲壁旌以絳帛為之縁以赤畫貔貅於上其轅皆一宣和元年禮制局言舊鹵簿記有白鷺鸞旗皮軒三車其制非古按曲禮有青旌鳴鳶飛鴻虎皮貔貅萬乘一出五車必載所以警衆也今欲改五車相次於中道繼之以崇徳車於是為備五車涼車宋遼宋制涼車赤質金塗銀裝龍鳳五采明金織以紅黄藤油壁緋絲絛龍頭梅紅羅褥銀螭頭穗毬雲朶踏頭蓮花坐雁鈎火珠門沓􅘫鉞頻伽大小鐶駕以槖駝省方在道及校獵迴乘之遼制涼車省方罷獵用之赤質金塗銀裝五采龍鳯織藤油壁緋絛蓮座駕以槖駝欽定續通典卷六十二
