body:
  text: 禮嘉天子五輅宋遼金元明宋初五輅多仍唐舊其玉輅自唐顯慶中傳之至宋曰顯慶輅親郊則乗之制作精巧行止安重後載大常與闟㦸分左右以均輕重世之良工莫能為其制箱上置平盤黄屋四柱皆油畫刻鏤左青龍右白虎龜文金鳳翅雜花龍鳳金塗銀裝間以玉飾頂輪三層各施銀耀葉輪衣小帶絡帶並青羅繡雲龍周綴䋿帶羅文銀佩穗毬小鈴平盤上布黃褥四角勾闌設圓鑑翟羽虚匱内貼銀鏤香罨軾匱銀龍二銜香嚢銀香爐香寶錦帶下有障塵青畫輪轅銀轂乗葉三轅銀龍頭横木上有銀鳳十二左建青旂十有二旒皆繡升龍右載闟㦸繡黻文並青繡綢杠又設青繡門簾銀飾梯一柘义二銀錔頭銅裝行馬青繒裹輓索駕六青馬馬冇金面挿鵰羽鞶纓攀胸鈴拂青繡屜錦包尾又誕馬二在輅前飾同駕馬餘輅及副輅皆有之駕士六十四人金輅色以赤駕六赤馬建大旂駕士六十四人象輅色以淺黄駕六赭白馬建大赤駕士四十人革輅色以黄駕六騧馬建大白駕士四十人木輅色以黒駕六黑騮馬建大麾駕士四十人自金輅而下其制皆同玉輅惟無玉飾徽宗政和三年議禮局更上皇帝車輅之制詔頒行玉輅箱上平盤黄屋以下皆如舊頂輪三層内一層素輪頂上施金塗銀山花葉及翟羽青絲繡雲龍絡帶二周綴雜色䋿帶八銅佩八銀穗毬二平盤上布紅羅繡雲龍褥曲几扶几上下設銀螭首二十四四角勾闌設圓鑑一十六青羅繡寶相花帶火珠二十八香匱設香爐紅羅繡寶相花帶香嚢香寶銀結綬二紅羅繡雲龍結綬一紅錦織龍鳳門簾一青畫輪轅銀轂乗葉軾匱横轅前轅並飾以金塗銀螭首横轅上施銀立鳯一十二左建大常十有二旒右載闟㦸繡黻文杠袴一以青繡杠首飾以銀螭首金塗銅鈸青犛牛尾拂青繒裹索駕青馬六馬有銅面挿鵰羽鞶纓攀胸鈴拂青線織屜紅錦包尾又踏路馬二在輅前飾同駕馬凡大祭祀乗之金輅以下並以次列其後若大朝㑹册命皇太子諸王大臣則設五輅於大慶殿庭為充庭之儀金輅赤質以金飾諸末建大旂餘同玉輅駕赤馬六凡玉輅之飾以青者金輅以緋象輅淺黄質金塗銅裝以象飾諸末建大赤餘同玉輅駕赭白六凡玉輅之飾以青者象輅以銀褐革輅黄質鞔之以革建大白餘同玉輅駕騧馬六凡玉輅之飾以青者革輅以黃木輅黒質漆之建大麾餘同玉輅駕黑騮六凡玉輅之飾以青者木輅以皂凡玉輅用金塗銀裝者象輅革輅木輅及五副輅並金塗銅裝尋詔玉輅青質輪輈絡帶其色如之四柱平盤虚匱則用赤增葢弓之數為二十八左右建旂常並青大常繡日月五星二十八宿旂上則繡以雲龍朱杠青縚鈴垂十有二就流蘇及佩各增十二之數樊纓飾以五采之罽衡式之上又加鸞和輅之諸末耀葉螭頭雲龍垂牙鎚脚花版結綬羅紋雜佩羽臺葱臺麻爐香寳壓貼牌字皆飾以玉自後而升式匱不去既成高二丈七寸五分濶一丈五尺時禮制局言玉輅馬纓十二而無采不應古制欲以五采罽飾樊纓十有二就輅衡軾並無和鸞乞添置盖弓二十有二乞増為二十八以應星又司常注云九旗之帛皆用絳禮記月令天子乗大輅載黃旂今玉輅旂用青帛有升龍而無交龍又無三辰皆非古制如依成周以所尚之色則用赤依月令兼四代之制則用黃仍分縿旒之制又畫三辰於上又左傳言錫鸞和鈴鈴在旂首今旂首無鈴乞增置又車葢周以流蘓及佩各八無所法象欲各增為十二以應天數又輅之諸末飾玉為稱而羅紋雜佩乃用塗金乞改為玉又車箱兩轓有金塗龜文及鵾翅左龍右虎乃後代之制欲改用蟉龍加玉為飾又大常當車之後則自後登車冇妨曲禮言僕展軨效駕奮衣由右上則君亦當自右由前而入今玉輅前有式匱不應古制恐當更革又禮記言車得其式周官輿人三分其隧一在前二在後以置其式今玉輅無式于是復詔定其制四年詔金象革木四輅並依新修玉輅制度旂常並建各與輅一色除去闟㦸改車箱兩轓龜文鵾翅左龍右虎之飾並用蟉龍增葢弓博山流蘇等數軾衡加和鸞以合于古金輅朱質飾以金塗銀左右建大常大旂及輪衣絡帶等色皆以黄龍旂九斿如周官金輅建大常之制駕馬以騧飾樊纓五采九就象輅朱質凡制度裝綴名物並同金輅飾以象及金塗銀銅鍮石左右建大常大赤輪衣絡帶等色皆以紅大赤繡鳥隼七斿如周官象輅建大赤之制駕馬以赤飾樊纓七就革輅朱質凡制度裝綴名物並同金輅飾以金塗銅鍮石左右建大常大白及輪衣絡帶等色皆以淺黄大白繡熊虎六斿如周官革輅建大白之制駕馬以赭白飾樊纓五就木輅朱質凡度制裝綴名物並同金輅飾以金塗鍮石左右建大常大麾及輪衣絡帶等色皆以皂大麾繡龜蛇四斿如周官木輅建大麾之制駕馬以烏飾樊纓三就駕馬各六玉輅駕士六十四人餘皆四十人高宗紹興時復制五輅高宗渡江儀仗鹵簿悉燬於兵紹興十二年工部尚書莫將户部侍郎張澄等以天禧宣和鹵簿考究制度及故内侍工匠省記指説参酌制度是年九月玉輅成明年遂作金象革木四輅玉輅青色飾以玉通高十九尺輪高六十三寸輻徑三十九寸軸長十五尺三寸頂上剡為輪三層象天圜也外施青玉博山八十一一名耀葉鏤以金塗龍文覆以青羅曰輪衣綴垂玉佩間以五色垂犛尾曰流蘇頂四角分垂青羅曰絡帶表裏繡雲龍遇雨則油黄繒覆之輅之中四柱象地方也前柱卷龍平槃上布錦褥前有横軾後垂錦軟簾登車則自後卷簾梯級以登四面周以闌而闕其中以備登降執綏官先自右升立於右柱下以備顧問闌柱頭有玉蹲龍軾前有牌鏤曰玉輅以玉篆之上有玉龍二中設御坐純以黄香木為之取其黄中之正色也下有塗金蹲龍十六在平槃四圍下又有拓角雲龍金彩飾之前後左右各二前有轅木三鱗體昻首龍形轅木上束兩横竿在前者名曰鳯轅馬負之以行次曰推轅班直推之以助馬力横於轅後名曰壓轅以人壓於後欲取其平車輪三歳一易心用榆圜數尺圈以鐵以防折裂横貫大木以為軸夾以兩輪輪皆彩畫此輅下飾也左建大常右建龍旂挿於輅後兩柱之金環前駕青馬六馬有鏤錫鞶纓金鈴紅旄繡屜金包騣錦包尾青繒裹索引之駕士二百三十二人誕馬十二人左右索百二十八人入轅馬十二人龍頭子二人前後抱轅各六人推竿四人捧輪四人拓义四人浄席四人前攔人員一人後攔人員一人前攔馬八人後攔馬八人踏道人員二人踏道二十人小拓又四人小梯子二人燭臺二人香匙翦子二人左右索人員二人又有呵喝人員二人教馬官二人捧輪將軍四人千牛衛將軍二人推輪軸官健八人抱大常龍旂官六人職掌五人専知官一人守分一人庫子八人裝柱工匠二人諸工匠十五人葢覆儀鸞司十一人監官三員金輅黄色飾以金塗銀博山輪衣絡帶轅輻軸並以黄建大旂九斿駕黄馬六象輅朱色飾以象及金塗銅博山輪衣絡帶並以朱建大赤七斿駕赤馬六革輅淺黄白色飾以金塗銅博山輪衣絡帶並以淺黄白建大白六斿駕黄白馬六木輅黒色飾以金塗銅博山輪衣絡帶並以黒建大麾四斿駕黒馬六自金輅以下制並如玉輅而高減五寸駕士並一百五十四人五輅駕士服色平巾幘青絹抹額纈絹對花鳯袍緋纈絹對花寛袖襖羅抹絹袴襪麻鞵其色從其輅大輅徽宗政和六年徐秉哲言南北郊皇帝乗玉輅以赴齋宮自齋宮赴壇正當祀天祭地乃乗大輦疑非禮意下禮制局討論禮制局請造大輅如玉輅之制唯不飾以玉所駕之馬其數如之唯鞶纓一就以稱尚質之義仍建大旂十有二旒龍章日月以恊象天之義至禮畢還宮則乗大輦於禮無嫌從之遼國輿皇帝所乗畧見於臘儀祭山儀而史不詳其制太宗㑹同元年晉使馮道等備車輅法物上皇帝皇太后尊號冊禮自此有天子車服五輅太平中行漢冊禮乗黄令陳車輅尚輦奉御陳輿輦唐輦輅盡在遼廷矣其玉輅祀天祭地享宗廟朝賀納后用之青質玉飾黄屋左纛十二鑾在衡二鈴在軾龍輈左建旂十二斿皆畫升龍長曳地駕蒼龍金㚇鏤錫鞶纓十二就金輅饗射祀還飲至用之赤質金飾餘如玉輅色從其質駕赤騮象輅行道用之黃質象飾餘如金輅駕黃騮革輅巡狩武事用之白質革鞔駕白翰木輅田獵用之黒質漆飾駕黒駱金象輅黃質以象飾諸末輪衣以銀褐建大赤餘同玉輅革輅黃質鞔之以革金塗銀裝輪衣以黃建大白餘同玉輅木輅黒質漆之輪衣以皂建大麾餘同玉輅世宗大定十一年將冇事于南郊大常寺檢宋南郊鹵簿當用玉輅金輅象輅革輅木輅耕根車明逺車指南車記里鼓車崇徳車皮軒車進賢車黄鉞車白鷺車鸞旗車豹尾車軺車羊車各一革車五屬車十二除見有車輅外闕象革木輅耕根明逺皮軒進賢白鷺羊車大輦各一革車三屬車四按五禮新儀玉輅以青金輅以緋象輅以銀褐革輅以黃木輅以皂葢其物有合隨輅之色者有當用别色者如玉輅用青絲繡雲龍絡帶青羅繡寳相花帶青畫輪轅青氂牛尾此隨輅之色者也若象革木輅則當用緋用銀褐用黃及皂若至尊乘御步武所及非若餘物但為美觀其踏牀倚背踏道之褥皆用紅錦座褥及行馬透壁輭簾並用銀褐黄青羅錦三色又大輦宋陶榖創意這之至祥符中以其太重減七百餘斤可見當時亦無定制各以意從長斟酌造之其制金玉恪闕可見者象輅革輅木輅耕根皮軒進賢明逺白鷺羊車革車大輦凡十有一元五輅玉輅青質金裝青緑藻井栲栳輪葢外施金裝雕木雲龍内盤碾玉福海圓龍一頂上匝以金塗鍮石耀葉八十一上圍九者二中圍九者三下圍九者四頂輪衣三重上二重青繡雲龍瑞草下一重無文輪衣内黃屋一黃素紵絲􅅹水下周垂朱絲結網青紵絲繡小帶四十八帶頭綴金塗小銅鈴青紵絲繡絡帶二頂輪平素面夾用青紵絲葢四周垂流蘇八飾以五色茸線結網五重金塗銅鈸五金塗木珠二十有五又撃玉雜佩八珩璜衝瑀全金塗鍮石鉤掛十六黄絨貫頂天心直下十字繩二各長三丈葢下立朱漆柱四柱下直平盤虚櫃中櫺三十下外桄一漆繪犀象鸚鵡錦雉孔雀隔窠嵌裝花板櫃周朱漆勾闌雲拱地霞葉百七十有九下垂牙䕶泥虗板并朱漆畫瑞草勾闌上玉行龍十碾玉蹲龍十孔雀羽臺九水精面火珠七金圈焰銅照八輿下周垂朱絲結網飾以金塗鍮石鐸三百綵畫鍮石梅萼嵌網眼中輿之長轅三界轅勾心各三上下龍頭六前轅引手玉螭頭三並繋以蹲龍後轅方罨頭三桄頭十六絟以蹲龍三轅頭衡一兩端玉龍頭二上列金塗銅鳯十二含以金塗銅鈴輿之軸一輪二軸之挲羅二明轄蹲龍絟並青漆輪之輻各二十四轂首壓貼金塗銅轂葉八十一金塗鍮石擎耳戀攀四櫃之前朱漆金裝雲龍輅牌一牌字以玉裝綴輅之箱四壁雕鎪漆畫填心隔窠龜文華板上層左畫青龍右畫白虎前畫朱雀後畫元武輅之前額玉行龍二奉一水精珠後額如之前兩柱青茸鈴索五貼金鸞和大響銅鈴十金塗鍮石雙魚五下朱漆軾櫃一櫃上金香毬金香寳金香合銀灰盤各一並黄絲綬帶輅之後朱漆後轛一金塗曲戍黄紵絲銷金雲龍門簾一緋紵絲繡雲龍帶二輅之中金塗鍮石較碾玉龍椅一靠背上金塗圈焰玉明珠一左建大常旂十有二斿青羅繡日月五星升龍右建闒㦸一九斿青羅繡雲龍中央黄羅繡青黒黼文兩旗綢杠並青羅旗首金塗鍮石龍頭二金塗銅鈴二金塗鍮石鈸青纓緌十二重金塗木珠流蘇十二重龍椅上方坐一緑褥一皆錦銷金黄羅夾帕一方輿地褥二勾闌内褥八皆用雜錦綺青漆金塗鍮石鉸葉踏道一小褥五重青漆雕木塗金龍頭行馬一小青漆梯一青漆