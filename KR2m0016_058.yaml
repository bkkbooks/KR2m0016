body:
  text: 禮嘉皇太子納妃皇子諸王附宋遼明宋徽宗政和五年三月詔選皇太子妃六年六月詔選少傳恩平郡王朱伯材女為皇太子妃令所司備禮册命帝服通天冠絳紗袍御文德殿發册先是議禮局上五禮新儀皇太子納妃乘金輅親迎皇太子三奏辭乘輅及臨軒册命詔免乘輅而發册如禮焉其諸王聘禮賜女家白金萬兩敵門即古之納采用羊二十口酒二十壺綵四十匹定禮羊酒綵各加十茗百斤頭􅔮巾縀綾絹三十匹黃金叉釧四雙條脫一副直珠琥珀瓔珞真珠翠毛玉叉朵各二副銷金生色衣各一襲金塗銀合二錦繡綾羅三百匹果盤花粉花羃眠羊卧鹿花餅銀勝小色金銀錢等物納財用金器百兩綵千匹錢五十萬錦綺綾羅絹各三百匹銷金繡畫衣十襲真珠翠毛玉叉朵各三副函書一架纒束帛押馬函馬二十匹羊五十口酒五十壺繫羊酒紅絹百匹花粉花羃果盤銀勝等物親迎用塗金銀裝肩輿一行障坐障各一方團掌扇四引障花十樹生色燭籠十髙髻叉插并童子八人騎分左右導扇輿其宗室子聘禮賜女家白金五千兩其敵門定禮納財親迎禮皆減半逺屬族卑者又減之政和三年四月議禮局上皇子納夫人儀采擇使者曰奉制某王之儷屬子懿淑謹之重之使某行采擇之禮儐者入告主人曰臣某之子顓愚不足以備采擇恭承制命臣某不敢辭問名使者曰某王之儷采擇既諧將加官占奉制問名儐者入告主人曰制以臣某之子可以奉侍某王臣某不敢辭告吉使者曰官占既吉奉制以告儐者入告主人曰臣某之子愚弗克堪占貺之吉臣與有幸臣某謹奉典制告成使者曰官占之吉嘉耦既定制使某以儀物告成儐者入告主人曰奉制賜臣以重禮臣某謹奉典制告期使者曰涓辰之良某月某日吉制使某告期儐者入告主人曰臣某謹奉典制前期太史局擇日奏告景靈宫賜告前一日主人設使者次如常儀又設告箱之次於中門外北向隨闕所向設香案於寢庭其日大昕使者公服至主人出迎於大門外北向再拜使者不答拜謁者引使者入門而左主人入門而右舉告箱者同入主人立香案左使者在右舉告箱者以告置於香案女相者引夫人出面闕立使者稱有制女相者贊再拜使者曰賜某國夫人告又贊再拜退使者出皇帝醮戒於所御之殿皇子乘象輅親迎夫人朝見盥饋皇帝皇后饗夫人如儀其諸王以納采賔曰某官以伉儷之重施於某王某王率循彞典以某將事敢請納采儐者入告主人曰某之子弗嫻於姆訓維是腵修棗栗之饋未知所以告虔也某聽命於廟敢不拜嘉問名賔曰合二姓之好必稽諸龜筮敢請問名儐者入告主人曰某王恭謹重正昏禮將以加諸卜某敢不以告納吉賔曰某王承嘉命稽諸卜筮龜筮協從使某以告儐者入告主人曰某王不忘寒素欲施德於某未教之女而卜以告吉其曷敢辭納成賔曰某官以伉儷之重施於某王某王率循彞典有不腆之幣以某將事敢請納成儐者入告主人曰某王順彞典申之以備物某敢不重拜嘉請期賔曰某王謹重嘉禮將卜諸近日使某請期儐者入告主人再辭儐者出告賔曰某既不獲受命於某官某王得吉卜曰某日敢不以告主人曰謹奉命以從親迎前一日主人設賔次如常儀其日大昕壻之父服其服告於祖廟子將行父醮之於聽事贊者設父位中間南向設子位父位之西近南東向父即坐子公服升自西階進立位前贊者注酒於盞西向授子子再拜跪受贊者又設饌父位前子舉酒興即坐飲食訖降再拜進於父位前命之曰躬迎嘉耦釐爾內治子再拜曰敢不奉命又再拜降出詣女家主人服其服告於祖廟如請期之儀賔將至主人設神位於寢户外之西設醴女位於户內南向具酒饋賔至贊者引就次女盛服於房中就位南向立姆位於右從者陪其後父公服升自東階立於寢户外之東西向內贊者設酒饌女就位坐飲食訖降再拜內贊者徹酒饌主人降之東階東南西面贊者引賔出次立於門西東面儐者進受命出請事賔曰某受命於父以兹嘉禮躬聽成命儐者入告主人曰某固願從命儐者出告訖入引主人迎賔大門外之東西面揖賔賔報揖主人入門而右賔入門而左執雁者從入陳雁於庭主人升立於東階上西面賔升西階進當寢户前北面再拜降出主人不降送賔初入門母出立於寢門外之西南面賔拜訖姆引女出於母左父命之曰往之女家以順為正無忘肅恭母戒之曰必恭必戒無違舅姑之命庶母申之曰爾誠聽於訓言毋作父母羞女出門壻先還第其同牢廟見見舅姑諸禮皆如儀凡宗室婚姻英宗治平中宗正司奏宗室女舅姑夫族未立儀制皆當創法詔壻家有二世食祿即許娶宗室女未仕者與判司簿尉已仕者隨資序推恩即壻别祖女别房舊為婚姻而於今卑尊不順者皆許壻之三代鄉貫生月人材書劄止令婚主問驗以告宗正寺大宗正司寺司詳視如條保明所進財皆賜壻家令止於本官納財媒妁使令之人非理求丐許告宗室女事舅姑及見夫之族親皆如臣庶之家其後又令宗室女再嫁者祖父有二代任殿直若州縣官以上即許婚姻神宗熙寧十年又詔應袒免以上親不得與雜類之家婚嫁若父母居化外及見居沿邉兩屬之人其子孫亦不許為婚緦麻以上親不得與諸司胥吏出職納粟得官及進納伎術工商雜類惡逆之家子孫通婚應婚嫁者委主婚宗室擇三代有任州縣官或殿直以上者列姓名家世州里嵗數奏上宗正司驗實召保付內侍省宣繫聽期而行嫁女則令其壻召保其冒妄成婚者以違制論主婚宗室與保同坐不以赦降自首者減罪告者有賞非袒免者依庶姓法宗室離婚委宗正司審察若如律有可出之實或不相安方聽若無故捃拾者劾奏如許聽離追完賜豫物給還嫁資再娶者不給賜非袒免以上親與夫聽離再娶者委宗正司審核其恩澤已追奪而乞與後夫者降一等尋詔宗室女毋得與嘗娶人結婚再適者不用此法遼道宗太平八年六月權北院大王耶律鄭留奏今嵗十一月皇太子納妃諸族備會親之帳詔以豪盛者三十户給其費明皇太子納妃儀太祖洪武元年定制凡行禮皆遣使持節如皇帝大婚儀納采問名制曰奉制納某氏女為皇太子妃命卿等行納采問名禮至妃第儐者出詣使者前曰敢請事使者曰儲宫納配屬於令懷邦有常典使某行納采之禮儐者入告主婚者曰臣某之子昧於壼儀不足以備采擇恭承制命臣某不敢辭儐者出告使者入陳禮物於庭宣制曰某奉詔采擇奠雁禮畢使者出儐者復詣使者前曰敢請事使者曰儲宫之配采擇既詣將加卜筮奉制問名儐者入告主婚者曰制以臣某之女可以奉侍儲宫臣某不敢辭儐者出告使者復入陳禮奠雁如儀宣制曰臣某奉詔問名將謀諸卜筮主婚者曰臣某第幾女某氏出次納吉儐者請事如前使者曰謀諸卜筮其占協從制使某告吉儐者入告主婚者曰臣某之子蠢愚懼弗克堪卜筮之吉惟臣之幸臣謹奉典制儐者出告使者入陳禮奠雁如儀宣制曰奉制告吉又次納徴儐者出告使者入陳玉帛禮物不奠雁宣制曰某奉制告成又次請期辭曰詢於龜筮某月某日吉制使某告期主婚者曰敢不承命陳禮奠雁如儀又次告廟遣使持節授册寶儀注悉見前又次醮戒皇帝服通天冠絳紗袍御奉天殿百官侍立引進導皇太子至丹陛四拜入殿東門就席位東向立司爵以饌進皇太子跪搢圭受盞祭酒司饌以饌進跪受亦如之興就席坐飲食訖導詣御座前跪皇帝命之曰往迎爾相承我宗事朂思以敬皇太子曰臣某謹奉制旨俯伏興出至丹陛四拜畢皇帝還宫皇太子出又次親迎前一日有司設皇太子次於妃氏大門外南向東宫官次於南東西相向至日質明東宫官具朝服陳鹵簿鼓吹於東宫門外皇太子冕服乘輿出侍衛導從如儀至宫門降輿升輅東宫官皆從至妃第回轅南向降輅升輿至次降輿入就次東宫官皆就次先是皇太子將至主婚者設會宴女至期妃服褕翟花叉出就閣南面立傅姆立於左右主婚者具朝服立於西階之下引進導皇太子出次立於大門之東西向儐者朝服出立於門東曰敢請事引進跪啓訖皇太子曰某奉制親迎引進受命興承傳於儐者儐者入告導主婚者出迎於大門之西東向再拜皇太子答拜引進導皇太子入門而左執雁者從儐者導主婚者入門而右皇太子升東階進立於閣門户前北向立主婚者升西階立於西東向引進者啓奠雁執雁者以雁進皇太子受雁以授主婚者主婚者跪受興以授左右退立於西皇太子再拜降自東階出至次以俟主婚者不降送初皇太子入門妃母出立於閣門外奠雁位之西南向皇太子拜訖宫人傅姆導妃出立於母左主婚者命之曰戒之戒之夙夜恪勤毋或違命母命之曰勉之勉之爾父有訓往承惟欽庶母申之曰恭聽父母之言宫人傳姆擎執導從妃乘輿出門降輿乘鳳轎皇太子揭簾訖遂升輅侍從如來儀至東宫門外降輅乘輿至閣降輿入俟於內殿門外之東西面司閨導妃詣內殿門外之西東面皇太子揖妃入行合巹禮如中宫儀又次朝見其日妃詣內殿陛下候皇帝升座司閨導妃入北面立再拜自西階升宫人奉棗栗盤進至御座前授妃妃奠於御前退復位再拜禮畢詣皇后前奉腵修盤如上儀又次醴妃次盥饋次謁廟次羣臣命婦朝賀皆如儀四年册開平王常遇春女為皇太子妃禮部上儀注太祖覽之曰贄禮不用笄但用金盤翟車用鳯轎雁以玉為之古禮有親迎執綏御輪今用轎則揭簾是矣其合巹依古制用匏妃朝見入宫中乘小車以帷幕蔽之謁廟則皇太子俱往禮成後三日乃宴羣臣命婦著為令憲宗成化三十二年更定婚禮凡節册等案俱由奉天左門出皇太子親迎由東長安門出親迎日妃服燕居服隨父母家廟行禮執事者具酒饌妃飲食訖妃父母坐堂上妃詣前四拜父命之曰爾往大內夙夜勤慎孝敬無違母命之曰爾父有訓爾當奉承合巹前於皇太子內殿各設拜位皇太子揖妃入就位再拜妃四拜然後各升座廟見後百官朝賀致詞曰某官臣某等不勝欣忭之至謹當慶賀帝賜宴如正旦儀命婦詣太后皇后前亦賜宴致詞曰皇太子嘉聘禮成益綿景福餘大率如洪武儀公主下降儀宗室附宋遼元明臣等謹按杜佑禮典載婚禮自天子至皇太子諸王納后納妃之儀靡不詳備至公主下降之儀載在開元禮中而禮典則僅載唐世公主出降拜舅姑一詔或唐以前未有定制故歟按公主貴敵諸王宜有殊典今考宋遼元明其載於正史及會典者以代類敘次於皇太子諸王之後以補杜氏之闕云宋制公主下降初被選尚者即拜駙馬都尉賜玉帶襲衣銀鞍勒馬采羅百匹謂之繫親又賜辦財銀萬兩進財之數倍於親王聘禮出降賜申第餘如諸王夫人之制掌扇加四引障花燭籠各加十皆行舅姑之禮諸親遞加賜賚其縣主繫親以金帶賜辦財銀五千兩納財賜賚大率三分減其二宗室女特封郡君者又差降焉仁宗嘉祐初禮官言禮閣新儀公主出降前一日行五禮古者納婚始用行卜告以夫家采擇之意謂之納采問女之名歸卜太廟吉以告女家謂之問名納吉今選尚一出朝廷不待納采公主封爵已行誕告不待問名若納成則既有進財請期則有司擇日宜稍依五禮之名存其物數俾知婚姻之事重而夫婦之際嚴如此亦不忘古禮之義也時兖國公主下嫁李瑋詔賜出降日令夫家主婚者具合用雁幣玉馬等物陳於內東門外以授內謁者進入內侍掌事者受唯馬不入神宗即位詔以昔傳先帝恭聞德音以舊制士大夫之子有尚帝女者輒皆升行以避舅姑之尊豈可以富貴之故屈人倫長幼之序宜詔有司革之以勵風俗於是著為令仍命陳國長公主行舅姑之禮駙馬都尉王使約更不升行公主見舅姑行禮自此始舊例長公主凡有表章不稱妾禮院謂男子婦人凡於所尊稱臣若妾義實相對又宗室伯叔近臣悉皆稱臣即公主理宜稱妾况家人之禮難施於朝廷請自大長公主而下凡上箋表各據國封稱妾從王師約之請也唐國公主下降太常寺言按令公主出降申中書省請皇后帥宫闈掌事人送至第外命婦從今請如令詔出降日婉儀帥宫闈掌事者送至第外命婦免從徽宗改公主為姬下詔曰在熙寧初有詔釐改公主郡主縣主名稱當時羣臣不克奉承近命有司稽考前世周稱王姬見於詩雅姬雖周姓考古立制宜莫如周可改公主為帝姬郡主為宗姬縣主為族姬其稱大長者為大長帝姬仍以美名二字易其國號內兩國者以四字其出降日壻家具五禮修表如上儀太史局擇日告廟親迎前一日所司於內東門外量地之宜西向設壻次其壻父醮子如上儀乃命之曰往迎肅雍以昭惠宗祐子再拜曰祗率嚴命又再拜降出乘馬至東華門內下馬禮直官引就次有司陳帝姬鹵簿儀仗於內東門外候將升翟車引壻出次於內東門外鞠躬西向掌事者執雁內謁者奉雁以進俟帝姬升車壻再拜先還第同牢其日初昏掌事者設巾洗各二於東階東南一於室北水在洗東尊於室中實四爵兩巹於篚壻至本第下馬以俟帝姬至降車贊者引壻揖之以及寢門又揖導之升階入室盥洗掌事布對位又揖帝姬皆即坐受盞三飲俱興再拜贊者徹酒見舅姑夙興帝姬著花叉服褕翟以俟見贊者設舅姑位於堂上舅位於東姑位於西各服其服就位女相者引帝姬升自東階詣舅姑前再拜贊者以棗栗授帝姬奉置舅位前舅即坐贊者進徹以東帝姬退復位又再拜女相者引詣姑位前再拜贊者以服修授帝姬奉制姑位前姑即位贊者亦徹以東帝姬退復位又再拜次醴婦盥饋饗婦如儀遼公主下嫁儀選公主諸父一人為婚主凡當奧者媒者致詞之儀自納幣至禮成大略如納后儀擇吉旦媒者趣尚主之家詣宫俟皇帝皇后御便殿率其族入見進酒訖命皇族與尚主之族相偶飲翼日尚主之家以公主及壻率其族入見致安於皇帝皇后獻贐送者禮物訖朝辭賜公主青幰車一螭頭蓋部皆飾以銀駕駝送終車一車樓純錦銀􅀈懸鐸後垂大氈駕牛載羊一謂之祭羊賜其壻朝服四時襲衣鞍馬凡所須無不備選皇族一人送至其家凡親王女封公主者婚儀倣此以親踈為差降元制凡駙馬尚公主率封王爵其宗王之女皆稱公主明制凡公主出降行納采問名禮壻家備禮物表文於家庭望闕再拜掌婚者奉至內東門詣內使前曰朝恩貺室於某官某之子某習先人之禮使臣某請納采以表跪授內使內使跪受奉進內殿執雁及禮物者從入內使出掌婚者曰將加卜筮使臣某問名進表如初內使出曰有制掌婚者跪內使宣曰皇帝第幾女封某公主掌婚者俯伏興入就次賜宴出納吉儀與納采同掌婚者致詞曰加諸卜筮占曰從吉謹使臣某敢告納徴壻家具元纁玉帛乘馬表文如儀掌婚者致詞曰朝恩貺室於某官某之子某有先人之禮請臣某以束帛乘馬納徴請期辭曰某命臣某謹請吉日親迎日壻公服告廟曰國恩貺室於某日親迎敢告將行父醮於廳隨意致戒壻再拜至內東門內內使延入次執雁及奉禮物者各陳於庭其日公主禮服辭奉先殿詣帝后前四拜受爵帝后隨意訓誡受命訖又四拜降階內命婦送至內殿門外公主升輦至內東門降輦壻揭簾公主升轎壻出次立執雁者以雁跪授壻壻受雁跪進於內使內使跪受以授左右壻再拜先出乘馬還公主鹵簿車輅後發公侯百官命婦送至府壻先候於門公主至壻揭簾公主降同詣祠堂壻東公主西皆再拜進爵讀祝又再拜出詣寢室壻公主同向再拜各就坐壻東公主西進饌合巹如儀復相向再拜明日見舅姑舅姑坐於東西向公主立於西東向行四拜禮舅姑答二拜第十日駙馬朝見謝恩行五拜禮初洪武九年太祖以太師李善長子祺為駙馬都尉尚臨安公主先期告奉先殿下嫁前二日命使册公主册後次日謁奉先殿又定駙馬受誥儀吏部官奉誥命置龍亭至太師府駙馬朝服拜受次日善長及駙馬謝恩後十日始定婚期二十六年稍更儀注然儀注雖存其拜姑舅及公主駙馬相向拜之禮終明之世實未嘗行也明年又更定公主郡主封號婚儀及駙馬儀賔品秩孝宗𢎞治二年册封仁和長公主重定婚儀入府公主駙馬同拜天地行八拜禮堂內設公主座於東西向駙馬東向座餘如前儀世宗嘉靖二年工科給事中安磐等言駙馬見公主行四拜禮公主受二拜雖貴賤本殊而夫婦分定於禮不安不聽莊烈帝崇禎元年教習駙馬主事陳鍾盛言臣教習駙馬鞏永固駙馬黎明於府門外月臺四拜云至三月後則上堂上門上影壁行禮如前始視膳於公主前公主飲食於上駙馬侍立於旁過此方議成婚駙馬饋果肴稱臣公主答禮書賜皆大失禮夫既合巹則儼然夫婦安有跪拜數月稱臣侍膳然後成婚者會典再行四拜於合巹之前明合巹後無拜禮也以天子館甥下同隸役豈所以尊朝廷帝是其言令永固即擇日成婚明制凡選駙馬禮部榜諭在京官員軍民子弟年十四至十六容貌齊整行止端莊有家教者報名司禮內臣於諸王館會選不中則博訪於畿內山東河內選中三人欽定一人餘二人送本處儒學充廩生自宣德時駙馬始有教習用學官為之正統以後令駙馬赴監習禮讀書嘉靖六年始定主事一人專在駙馬府教習大夫士婚禮宋遼明宋品官婚禮納采問名納吉納成請期親迎同牢廟見見舅姑姑醴婦盥饋饗婦送者並如諸王以下婚四品以下不用盥饋饗婦禮士與庶人同其無雁者三舍生聽用羊假九品服遼太宗會同三年十二月詔契丹人授漢官者從漢儀聽與漢人婚姻明太祖洪武五年詔曰古之婚禮結兩姓之歡以重人倫近世以來專論聘財習染奢侈其儀制頒行務從節儉以厚風俗其時品節詳明皆有限制凡品官婚娶或為子聘婦皆使媒氏通書女氏許之擇吉納采主婚者設席至日具祝版告廟訖賔至女氏第主婚者公服出迎揖賔及媒氏入雁及禮物陳於廳賔左主右媒氏立於賔南皆再拜賔詣主人曰某官以伉儷之重施於某某率循典禮謹使某納采主婚者曰某子弗􅈺姆訓既辱采擇敢不拜嘉賔主西南相向坐徹雁受禮訖復陳雁及問名禮物賔興詣主婚者曰某官慎重婚禮將加卜筮請問名主婚者進曰某第幾女妻某氏出或以紅羅或以銷金紙書女之第行年嵗賔辭主婚者請禮從者禮畢送賔至門外納吉如納采儀賔致詞曰某官承嘉命稽諸卜筮龜筮協從使某告吉主婚者曰某未教之女既以吉告某何敢辭納徴如納吉儀加元纁束帛函書不用雁賔致詞曰某官以伉儷之重加惠某官率循典禮有不腆之幣敢請納徴主婚者曰某官貺某以重禮某敢不拜受賔以函書授主婚者主婚者亦答以函書請期亦如納吉儀親迎日壻父告於禰廟壻北面再拜立父命之曰躬迎嘉偶釐爾內治壻進曰敢不承命再拜媒氏導壻之女家其日女氏主壻者告廟訖醴女如家人禮壻至門下馬就大門外之次女從者請女盛服就寢門內南向坐壻出次主婚者出迎於門外揖而入主婚者入門而右壻入門而左執雁者從至寢户前北面立主婚者立於户東西向壻再拜奠雁出就次主婚者不降送壻既出女父母南向坐保母導女四拜父命之曰往之女家以順為正無忘肅恭母命之曰必恭必戒毋違舅姑之命庶母申之曰爾忱聽於訓言毋作父母羞保姆及侍女翼女出門升車儀衛導前送者乘車後壻先還以俟婦車至門出迎於門內揖婦入及寢門壻先升階婦從升入室壻盥於室之東南婦從者執巾進水以沃之婦盥手於室之西北盥畢各就座壻東婦西舉食案進酒進饌酒食訖復進如初侍女以巹注酒進於壻婦前各飲畢皆興立於座南東西相向皆再拜壻婦入室易服壻從者餕婦之餘婦從者餕壻之餘明日見宗廟設壻父拜位於東階下壻於其後主婦拜位於西階下婦於其後諸親各以序分立其日夙興壻父以下各就位再拜贊禮引婦至庭中北面立壻父升自東階詣神位前跪三上香三祭酒讀祝興立於西婦四拜退復位壻父降自西階就拜位壻父以下皆再拜禮畢次見舅姑其日婦立堂下伺舅姑即座就位四拜保姆引婦升自西階至舅前侍女奉棗栗授婦婦進訖降階四拜詣姑前進腵修如前儀次舅姑醴婦如家人禮次盥饋其日婦家備饌至壻家舅姑即座婦四拜升自西階至舅前從者舉食案以饌授婦婦進饌執事者加匕筯進饌於姑亦如之食訖徹饌婦降階就位四拜禮畢舅姑再醴婦如前庶人婚禮宋金明臣等謹按杜佑通典婚禮載至大夫士而止而於庶民則闕焉今考宋明諸史知制有等殺有不容越分者謹列敘於左以存各朝之制度云宋制庶人婚禮并問名於納采并請期於納成其無雁奠者或以雉及雞鶩代其詞稱吾子親迎質明掌事者設禰位廳事東間南向壻之父服其服北面再拜祝曰某子某年若干禮宜有室聘某氏第幾女以某日親迎敢告子將行父坐廳事南向子服其服服皂衫衣折上巾立父位西小南東向贊者注酒於盞授子子再拜跪受贊者又以饌設位前子舉酒興即坐飲食訖降再拜進立父位前命之曰釐爾內治往求爾匹子再拜曰敢不奉命又再拜降出初婚掌事者設酒饌室中置二盞於槃壻服其服如前服至女家贊者引就次掌事者設禰位主人受禮如請期之儀主人謂女父女盛服立房中父升階立房外之東西向非南向者各隨其所向父立於門外之左餘倣此贊者注酒於盞授女女再拜受盞贊者又以饌設於位前女即坐飲食訖降再拜父降立東階下賔出次賔謂壻主人迎於門揖賔入賔報揖從入主人升東階西面賔升西階進當房户前北面掌事陳雁於階賔曰某受命於父以兹嘉禮躬聽成命主人曰某固願從命賔再拜降出主人不降送初女出父戒之曰往之女家無忘肅恭母戒之曰夙夜以思無有違命諸母申之曰無違爾父母之訓女出壻先還俟於門外婦至贊者引就北面立壻南面揖以入至於室掌事者設對位室中壻婦皆即坐贊者注酒於盞授壻及婦壻及婦受盞飲訖設饌再拜贊者徹酒饌見祖禰見舅姑禮婦饗送如儀金章宗明昌元年十月制民庶聘財為三等上百貫次五十貫次二十貫承安五年十二月詔官籍監户百姓自願以女為昏者聽泰和六年十一月詔屯田軍户與所居民為婚姻者聽明太祖洪武元年定制依朱子家禮無問名納吉止納采納幣請期下令禁指腹割衫襟為親者凡庶人娶婦男年十六女年十四以上並聽婚娶常服或假九品服婦服花叉大袖其納采納幣請期略倣品官之儀有媒無賔詞亦稍異親迎前一日女氏使人陳設於壻之寢室俗謂之鋪房至若告祠醮戒奠雁合巹並如品官儀見祖禰舅姑舅姑醴婦亦略相率欽定續通典卷五十八
