body:
  text: 禮吉方丘神州后土附唐宋遼金元明唐𤣥宗天寳五載詔尊莫大於天地禮莫崇於祖宗嚴配昭升豈宜異數今蒸嘗之獻既著於常式南北之郊未展於時享自今已後毎載四時孟月擇吉祭昊天上帝其皇地祗合祭令宰臣行禮代宗大厯十二年秋八月增修北郊壇齋宫文宗太和三年六月太常寺奏北郊祀皇地祗壇先闕齋宫請准祠例置一所可之宋初方丘在宫城北十四里以夏至祭皇地祗别為壇於北郊以孟冬祭神州地祗其南郊親祀昊天上帝則併設皇地祗之位太祖建隆以來迭奉四祖崇配太宗太平興國以後但以宣祖太祖更配真宗時以太宗配方丘宣祖配神州地祗景徳三年以太常寺言神州壇迫隘徙於方丘之西四年正月以朝陵遣工部尚書王化基詣汾隂后土祠漢武帝所立脽上祠致祭用大祀禮大中祥符三年八月朔詔明年春有事於汾隂以陳堯叟為經度制置使詣脽上築壇如方丘之制四年正月備鑾駕出京師二月詣脽壇如封禪禮仁宗景祐二年詔有司孟冬祭神州地祗遣内臣降香慶厯時夏至祭皇地祗用犢羊豕各一後加羊豕各五神宗元豐四年詔親祀北郊並如南郊之儀有故以上公攝事六年禮部太常寺上親祀儀並如南郊其攝事惟改舞名及不備官其爼頭樂器圭弊之數並如親祀元祐後分祭合祭詳見郊天徽宗崇寧元年禮部尚書黄裳言南郊壇十二龕從享星位具載其名至於北郊第以岳鎮海瀆山林川澤丘陵墳衍原隰之目别以四方寘於成壝而不列其名今講行大禮宜詔禮官考其名位二年禮部員外郎陳暘奏五行之帝既從享於南郊第一成則五行之神亦當從祀於北郊第一成崑崙神州宜列從祀之位又地莫尊於大祗而五岳帝次之欲陞之第一成並從之政和三年詔禮制局議方壇制度是嵗新壇成初元豐三年詔改北郊圓壇為方丘六年命禮部太常定北郊壇制紹聖間詔禮部再為詳定至是禮制局言方壇舊制三成第一成髙三尺第二成第三成皆髙二尺五寸上廣八丈下廣十有六丈夫圓壇既則象於乾方壇當效法於坤今議方壇定為再成一成廣三十六丈再成廣二十四丈毎成崇十有八尺積三十六尺其廣與崇皆得六六之數以坤用六故也為四陛陛為級一百四十有四為再壝壝二十有四步成與壝俱再皆應坤地之數四年夏五月夏至親祭地於方澤配以太祖其行事並如郊祀儀是後七年至宣和二年五年親祀者凡四髙宗紹興元年禮部太常寺討論夏至日祭皇地祗以太祖配正配二位毎位設尊爵籩豆各一實以酒脯鹿臡以獻官一員行禮立冬祭神州地祗以太宗配於天慶觀望祭二年太常少卿程瑀言皇地祗當一依祀天儀式又言國朝祀皇地祗設位於壇之北方南向政和四年禮局議設於南方北向今北面望祭北向為難且於經典無據請仍南向並從之遼祀木葉山不建郊丘以國俗行事詳見郊天金海陵天徳以後始有南北郊之制北郊方丘在通元門外當闕之亥地方壇三成成為子午夘酉四正陛方壝三周四面三門夏至日祭攝官行三獻禮元世祖時毎嵗遣使代祀后土至元五年建后土祠於大寧宫十三年又立后土祠於平陽之監湯按元史世祖紀作臨汾今據王圻續通考輯成宗大徳九年禮官博士奏冬至圜丘惟祀昊天上帝其方丘祭地之禮續議以聞制曰可武宗至大二年尚書省臣及太常禮官言郊祀者國之大禮今南郊之禮已行而北郊之禮未舉明年夏至祀北郊請以世祖配制可三年中書禮部移太常禮儀院擬定北郊從祀禮儀博士李之紹蔣汝礪疏曰案方丘之禮夏以五月啇以六月周以夏至其丘在國之北禮神之玊以黄琮牲用黄犢幣用黄繒配以后稷其方丘之制厯代不同然無出於三成之式今擬取坤數用六之義於都城北六里壬方擇地中為方壇三成四陛外為三壝仍依古制自外壝之外治令稍下以應澤中之義宫室牆圍器皿色並用黄其神州地祗以下從祀自漢以來制度不一至唐始因隋制以岳鎮海瀆山林川澤丘陵墳衍原隰各從其方從祀今盍參配舉行仁宗延祐元年太常寺臣請立北郊帝謙讓未遑北郊之議遂輟泰定帝泰定四年特加皇地祗黄犢一將祀之夕勅送新臘鹿二其犧牲品物香酒皆參用國禮而豐約不同明初建方丘於太平門外鐘山之隂壇二成成皆四出陛陛八級太祖洪武二年夏至祀方丘皇地祗南向奉仁祖配以岳鎮海瀆從祀其儀惟迎神後瘞毛血祭畢奉牲帛祝饌而埋之與郊天異餘並同圜丘三年帝親祀方丘增祀天下山川之神於壇兆皇地祗玊用黄琮帛用黄色配位用白牲用黄犢配位用純犢籩豆之實以下同圜丘四年改築方丘初建方丘二成上成髙六尺廣六尺四出陛南一丈東西北八尺下成四靣各廣二丈四尺髙六尺四出陛南一文二尺東西北一丈壝去壇十五丈髙六尺外垣四面各六十四丈至是改築上成髙三尺九寸廣二丈九尺四寸下成毎面廣丈五尺五寸髙三尺八寸通徑七丈四寸壇至内壝牆四面皆八丈九尺五寸内壝牆至外壝牆四靣各八丈二尺十年定合祭天地於南郊詳見郊天成祖永樂十八年北京大祀殿成合祀天地制如南京世宗嘉靖九年建方澤於安定門外壇制二成繚以垣牆毎嵗夏至祭地以太祖配神宗萬厯三年張居正進郊祀圖册請復合祭天地於大祀殿以二祖配從之社稷五代宋金元明周太祖廣順三年九月太常禮院奏社稷制度社壇廣五丈髙五尺五色土築之稷壇如社壇之制社壇石主長五尺方二尺剡其上方其下半根在上中四垣華飾毎神門屋三間一門門二十四㦸四隅連飾罘罳如廟之制中可樹槐凖禮左宗廟右社稷在國城内請下所司修奉從之宋制嵗以春秋二仲月及臘日祭太社太稷為大祀州縣則春秋二祭刺史縣令初獻上佐縣丞亞獻州博士縣簿尉終獻牲用少牢太祖壇廣五丈髙五尺五色土為之稷壇在西如其制社以石為主形如鐘長五尺方二尺剡其上培其半四面宫垣飾以方色面各一屋三門毎門二十四㦸四隅連飾罘罳如廟制中植以槐其壇三分宫之一在南無屋仁宗慶厯間定牲牢籩豆之數祭社稷用羊豕各二正配位籩豆十二山罍簠簋爼二祈報象尊一報用兩圭有邸祈不用玊神宗元豐三年詳定禮文所言社稷祝版牲幣饌物請並瘞於坎不設燔燎又言周禮大宗伯以血祭祭社稷社為隂祀血者幽隂之物是以類求神之意今社稷不用血祭違背經典請祭以埋血為始又古者祭社君南向於北墉下所以答隂也今社稷壝内不設北墉而有司攝事乃設東向之位於禮非是請設北墉以備親祀南向答隂之位其有司攝事則立北墉下少西又王制天子社稷皆太牢諸侯社稷皆少牢今太社太稷用少牢不應禮請加角握二牛先是州縣社主不以石禮部以為社稷不屋而壇當受霜露風雨以達天地之氣故用石主取其堅久請令州縣社主用石尺寸廣長半太社之制遂下太常修入祀儀七年詔諸州社稷於壇側建齋㕔三楹以備望祭哲宗元祐中從博士孫諤言祭太社太稷皆設登歌樂髙宗紹興元年以春秋二仲及臘前祭太社太稷於天慶觀以酒脯一獻明年望祭於臨安天寧觀八年改祀於惠照齋宫始用羊豕皆四籩豆皆十有二備三獻如祀天地之儀十三年二月製社稷祭器十四年詔築壇壝於觀橋之東置太社令一員孝宗淳熙四年命臨安守臣立望祭殿及庖室齋廬儀視神州設太社太稷位於壇之南方北向后土氏勾芒氏后稷氏位其西東向金熙宗皇統三年五月初立社稷海陵貞元元年有司奏建社稷壇於上京世宗大定七年建壇於中都社壇之制外四周為垣南向開一神門門三間内又四周為垣東西南北各開一神門門三間各列二十四㦸連飾罘罳無屋於中稍南為壇令三方廣濶一級四陛以五色土各飾其方中央覆以黄土其髙廣主石與宋同壇南栽栗以表之近西為稷壇制如社壇無石主四壝門各五間兩塾三門門列十二㦸壝有角樓樓之面皆隨方色飾之有望祭堂三楹堂下齋舎二十楹南北相向外門止一間不施鴟尾祭用春秋二仲上戊日樂用登歌禮三獻遣官行事其州縣祭享一如唐宋舊儀元世祖至元七年十二月詔嵗祀太社太稷十一年八月頒諸路立社稷壇壝儀式二十年二月定以春秋仲月上戊日祭社稷三十年正月用御史中丞崔彧言於和義門内少南得地四十畆為壝垣近南為二壇壇南五尺社東稷西相去約五丈社壇用青赤白黒四色依方位築之中間實以常土上以黄土覆之依方面以五色泥飾之四面當中各設一陛道其廣一丈亦各依方色稷壇如社壇之制惟土不用五色純用黄土壇皆北向立北墉於社壇之北以塼為之飾以黄泥瘞坎二於稷壇之北少西深足容物二壇周圍壝垣以塼為之髙五丈廣三十丈四隅連飾内壝垣櫺星門四所外垣櫺星門二所毎所門三列㦸二十有四外壝内北垣下屋七間為望祀堂以備風雨社主用白石制如宋金稷不用主樹松於二壇之南各一以后土氏配社后稷氏配稷玊幣社稷皆黝圭一繅藉瘞玊一以黝石代之正配位皆𤣥幣一牲用黝牛一其角握副羊豕各四祭日以春秋二仲月上戊三十一年成宗即位八月戊子初祀社稷用堂上樂元貞二年冬下太常復議州縣置壇於城西南方廣視太社太稷殺其半牲用羊豕無樂餘與太社太稷同三獻官以州縣長貳為之仁宗延祐六年改祀社稷於中戊明太祖洪武元年建社稷壇於宫城西南太社在東太稷在西壇皆北向壇髙五尺濶五丈四出陛五級二壇同一壝嵗以春秋二仲上戊親祀以勾龍后稷配行三獻禮正位用玊兩邸幣用黒色牲用犢羊豕各一配位並同惟不用玊又頒制於天下郡邑壇皆建於城西北左社右稷規制殺於太社太稷之半毎嵗春秋二仲月上戊日長官行三獻禮餘官陪祭三年於太社太稷壇北建祭殿五間以備風雨四年定王國社稷之制立於王國宫門之右壇方三丈五尺髙三尺五寸四出陛其制上不同於太社下異郡邑之制十年上以太社太稷分祭配祀皆因前代制欲更建之為一代之典遂下禮部議尚書張籌厯引禮經及漢唐以來之制請改建於午門之右社稷共為一壇合祭設木主而丹漆之祭則設於壇上祭畢收藏仍用石主埋壇中先是社主用石仿唐宋之制髙五尺濶二尺上微尖立於社壇半埋土中近南北向稷不用主罷勾龍與棄配位奉仁祖配以成一代之典以明社尊而親之義上善其奏遂定合祭之禮十月新建社稷壇成升為大祀按勾龍后稷配享厯代相同籌奏議内援引禮文亦無祖宗配食之據乃罷勾龍后稷而以仁祖配殊為創典揆之禮建國神位右社稷而左宗廟之文其背戾也甚矣十一年春祭社稷行新定儀迎神飲福送神凡十二拜餘如舊禮臣言太社太稷既同壇合祭王國各府州縣亦宜同壇稱國社國稷之神不設配位詔可十三年九月復定制兩壇一壝如初式惠帝建文元年祀社稷奉太祖配撤仁祖位成祖永樂十九年建北京社稷壇壇制祀禮一如其舊仁宗洪熙元年二月祭社稷奉太祖太宗並配命禮部永為定式世宗嘉靖九年改正社稷配位仍以勾龍后稷配十年立帝社帝稷壇於西苑豳風亭西初親耕禮成以給事中王璣言欲推衍耕耤之道禮部議西苑地寛宜令農夫墾藝其中上以春秋臨幸觀省收其所入輸之神倉帝可其議命建土榖壇於豳風亭西至是改為帝社帝稷以仲春秋次戊日上躬行祈報禮如次戊在望後則以上已日壇趾髙六尺方廣二丈五尺繚以土垣神位以木為之穆宗隆慶元年禮部言帝社稷之名自古所無嫌於煩數宜罷從之按漢書郊祀志有太社太稷又别立官社臣瓚注所為王社是也自魏晉至唐皆有帝社其制相沿已久嘉靖時帝社稷之名不為無據隆慶禮臣謂自古所無未免失考以為煩數而罷之則可矣山川唐五代宋遼金元明唐肅宗至徳二年勅改汧陽郡吳山為西嶽増秩以祈靈助上元二年改封華山為太山按時并改華陽縣為太隂縣葢本白虎通西方太隂用事萬物生華之義且以别於少華山故改封華為太云文宗開成二年勅封終南山為廣惠公凖四鎮例以本府都督刺史充獻官毎年以季夏土王日祭之僖宗乾寧五年勅封少華山為佑順侯昭宗天祐二年勅封洞庭湖君為利渉侯青草湖君為安流侯梁太祖開平三年八月詔令中書侍郎平章事于兢往東嶽祭告後唐愍帝應順元年詔三京諸道州府界内名山大川祠廟有益於民者以時精䖍祭祀潞王清泰元年詔封吳嶽成徳公為靈應王其享祀官屬凖舊儀並視五嶽晉髙祖天福二年五月勅青草湖安流侯進封廣利公洞庭湖利渉侯進封靈濟公十月命使祀五嶽四瀆詔下各州府量事修崇所有近廟山林仍禁樵採出帝開運三年二月詔令復祭中嶽差河南少尹行禮周太祖廣順二年親征兖州遣翰林學士祭東嶽廟世宗顯徳四年止祭沂山其諸鎮不祭七年就差登州刺史張順祭海宋初沿舊制祭東嶽於兖州西嶽於華州北嶽於定州中嶽於河南府太祖乾徳元年湖南平四月遣使祭南嶽六年從有司奏祭南嶽於衡州東鎮沂山於沂州南鎮㑹稽山於越州西鎮吳山於隴州中鎮霍山於晉州東海於萊州南海於廣州西海河瀆並於河中府北海濟瀆並於孟州淮瀆於唐州江瀆於成都府其北鎮醫巫閭在營州界未行祭享開寳四年廣南平遣使使祀南海除去劉鋹所封偽號及宫名易以一品服五年詔嶽瀆并東海南海廟各以本縣令兼廟令尉兼廟丞専掌祀事常加案視六年遣使奉衣冠劍履送西鎮吳嶽廟太宗太平興國八年河决滑州遣樞宻直學士張齊賢詣白馬津以一太牢沈祀加璧自是凡河决溢修塞皆致祭淳化二年秘書監李至請遵舊制就五郊迎氣日祭各方嶽鎮海瀆於所𨽻之州長吏以次為獻官北鎮就北嶽廟望祭真宗景徳三年令澶州置河瀆廟春秋致祭太中祥符元年封禪禮畢詔加號泰山為仁聖天齊王又封泰山通泉廟為靈派侯亭山廟為廣禪侯嶧山廟為靈巖侯十一月車駕至澶州幸河瀆廟進號顯聖靈源公四年祀汾隂命官祭西海及汾河車駕至潼闗遣官祭西嶽及河瀆並用太牢備三獻禮已復親謁華隂西嶽廟羣臣陪位廟垣内外列黄麾仗遣官分奠廟内諸神加號嶽神為順聖金天王還至河中親謁奠河瀆廟及西海望祭壇五月加上東嶽曰天齊仁聖帝南嶽曰司天昭聖帝西嶽曰金天順聖帝北嶽曰安天元聖帝中嶽曰中天崇聖帝其玊冊如宗廟諡冊又加上五嶽帝后號東曰淑明南曰景明西曰肅明北曰靖明中曰正明又改唐州上源桐柏廟為淮瀆長源公仁宗康定元年增封東海為淵聖廣徳王南海為洪聖廣利王西海為通聖廣潤王北海為冲聖廣澤王江瀆為廣源王河瀆為靈源王淮瀆為長源王濟瀆為清源王皇祐五年益封南海洪聖廣利昭順王按文獻通考作慶厯二年益封今㨿宋史禮志輯神宗元豐三年集賢校理陳侗言案周禮小宗伯之職兆五帝於四郊四望四類亦如之鄭氏注四望謂五嶽四瀆也今四郊無四望壇請依禮建之下詳定禮文所議請兆岱山沂山東海大淮於東郊衡山㑹稽山南海大江嵩山霍山大海於南郊華山吳山西海大河於西郊常山醫巫閭山北海大濟於北郊毎方嶽鎮則共為一壇海瀆則共為一坎以五時迎氣日祭之皆用血祭瘞埋有事則禱之又以四方山川各附於本方嶽鎮海瀆之下别為一壇一坎水旱則禱之其北郊從祀及諸州縣就祭如故詔毎方嶽瀆共為一壇餘從之八年益封西鎮吳山為成徳王徽宗政和三年禮局定嶽鎮海瀆壇各髙五尺周四十歩四出陛兩壝毎壝二十五歩壇飾衣方色祭嶽鎮海瀆設位南向以西為上山川從祀西向以北為上是年詔四鎮並為王沂山東安王㑹稽山永濟王醫巫閭廣寧王霍山應靈王髙宗紹興七年修嶽鎮海瀆之祀嵗以四立日及季夏土王日設祭如祭五方帝禮孝宗乾道五年太常少卿林栗言國家駐驆東南東海南海實在封域之内南海廣利王廟時降御書祝文令廣州行禮紹興七年加封至八字王爵東海之利以萊州隔絶不曾令沿海官司致其時享不知通泰明越温台泉福皆東海分界元豐初嘗建廟於明州定海縣乞依廣州祭南海禮遣官下明州行禮併請加封八字王爵詔可遼尊木葉山為鎮嵗時臨幸致祭兼及遼河之神國俗毎嵗冬至屠白羊白馬白鴈各取血和酒天子望黒山黒山在境北猶中國之岱宗云毎嵗是日五京進紙造人馬萬餘事祭山而焚之太祖天贊三年八月登阿勒坦音徳爾山以麃鹿祭穆宗應厯十二年六月祀木葉山及潢河十四年七月以酒脯祀黒山聖宗統和七年二月遣巫覡祭名山大川十三年詔修山澤祠宇以時祀之金世宗大定四年禮官言嶽鎮海瀆當以五郊迎氣日祭之詔依典禮以四立土王日就本廟致祭其在他界者遥祀立春祭東嶽於泰安州東鎮於益都府東海於萊州東瀆於唐州立夏望祭南嶽南鎮於河南府南海南瀆於萊州季夏土王日祭中嶽於河南府中鎮於平陽府立秋祭西嶽於華州西鎮於隴州望祭西海西瀆於河中府立冬祭北嶽於定州北鎮於廣寧府望祭北海北瀆於孟州其封爵並仍唐宋之舊時有言前代都長安及汴洛以太華等山為五嶽今既都燕當别議五嶽名太常寺言或取嵩髙疏周都豐鎬以吳嶽為西嶽范拱以為非是議畧曰軒轅居上谷在恒山之西舜居蒲阪在華山之北以此言之未嘗據所都而改嶽祀也後遂不改十二年有司言長白山在興王之地理合尊崇奉勅㫖封興國靈應王即其北山地建廟宇十五年奉定長白山封册儀物冠九旒服九章玊圭玊冊函香幣祝冊遣使副各一員詣㑹寧府行禮自是毎嵗降香命有司春秋二仲擇日致祭十九年有司言盧溝河水勢泛决乞官為封册神號禮部難之已而特封為安平侯建廟二十一年冊封山陵地大房山神為保陵公冕八旒服七章圭冊香幣使副持節行禮並如冊長白山之儀二十五年封混同江神為興國應聖公致祭如長白山儀冊禮如保陵公故事二十七年加號鄭州河陰縣聖后為昭應順濟聖后章宗明昌四年冊長白山神為開天宏道聖帝六年八月冊封静寧山神為鎮安公瑪達哈山神為瑞聖公嵗春秋二仲命有司擇日致祭十二月詔加五鎮四瀆王爵㑹稽山永興王江瀆㑹源王餘與宋同元嶽鎮海瀆代祀自世祖中統二年始凡十有九處分五道後乃以東嶽東海東鎮北鎮為東道中嶽淮瀆濟瀆北海南嶽南海南鎮為南道北嶽西嶽后土河瀆中鎮西海西鎮江瀆為西道既又以驛騎迂逺復為五道道遣使二人集賢院奏遣漢官翰林院奏遣䝉古官出璽書給驛以行至元三年定嵗祀嶽鎮海瀆之制正月東嶽鎮海瀆土王日祀泰山於泰安州沂山於益都府界立春日祀東海於萊州界大淮於唐州界三疑當作四月南嶽鎮海瀆土王日遥祭㑹稽山於河南府界立夏日遥祭南海大江於萊州界遥祭衡山於河南府界六月中嶽鎮土王日祀嵩山於河南府界霍山於平陽府界七月西嶽鎮海瀆土王日祀華山於華州界吳山於隴縣界立秋日遥祭西海大河於河中府界十月北嶽鎮海瀆土王日祀恒山於曲陽縣界醫巫閭山於遼陽廣寧縣界立冬日遥祭北海於登州界濟瀆於濟源縣祀官以所在守土官為之既有江南乃罷遥祭四年正月勅封昔木土山為武定山其神為武定公泉為靈淵其神曰靈淵侯十六年五月進封桑乾河神洪濟公為顯應洪濟公二十一年閏五月加封衛輝路小清河神曰洪濟威惠王二十八年二月加上東嶽為齊天大生仁聖帝南嶽司天大化昭聖帝西嶽金天大利順聖帝北嶽安天大貞元聖帝中嶽中天大寧崇聖帝加封江瀆廣源順濟王河瀆靈源宏濟王淮瀆長源博濟王濟瀆清源善濟王東海廣徳靈㑹王南海廣利靈孚王西海廣潤靈通王北海廣澤靈祐王詔遣重臣代祀漢人選名儒及道士習祀事者其禮物毎處嵗祀銀香盒一重二十五兩五嶽組金幡二鈔五百貫四瀆織金幡二四海五鎮銷金幡二鈔並二百五十貫皇帝登寳位遣官致祭降香幡盒如前禮惟加銀五十兩他有禱禮亦如之成宗元貞二年三月加封東鎮為元徳東安王南鎮昭徳順應王西鎮成徳永靖王北鎮貞徳廣寧王中鎮崇徳應靈王勅有司嵗時與嶽瀆同祀著為令式泰定帝泰定三年七月遣使祀海神天妃作天妃宫於海津鎮文宗天厯二年十月加封天妃為䕶國庇民廣濟福惠明著天妃順帝至正十年加封河瀆神為靈源神佑宏濟王仍重建河瀆及西海神廟明初建山川壇於天地壇之西正殿七間祭太嵗風雲雷雨嶽鎮海瀆鍾山之神東西廡各十五間祭京畿山川四季月將及都城隍之神皆躬自行禮定祭日毎嵗以清明霜降後又改定驚蟄秋分後三日遣官致祭太祖洪武三年詔依古制凡嶽鎮海瀆並去其前代所封名號止以山水本名稱其神泰山則曰東嶽泰山之神餘倣此七年詔令春秋仲月上旬擇日祭山川壇先是天下山川祔祭嶽瀆壇安南髙麗占城諸國山川並列各省山川之後八年禮部尚書牛掠言京都既罷祭天下山川其外國山川非天子所當親祀禮臣請附祭各省從之廣西附祭安南占城真臘暹羅鎖里廣東附祭三佛齊𤓰哇福建附祭日本琉球渤泥遼東附祭髙麗陜西附祭甘肅朶甘烏思藏九年復定壇制凡十三壇正殿太嵗風雲雷雨五嶽五鎮四海四瀆鍾山七壇東西廡各三壇東京畿山川夏冬二季月將西春秋二季月將京都城隍十年定正殿七壇帝親行禮東西廡遣功臣分獻二十一年増修大祀殿諸神壇壝乃勅十三壇諸神並停春季毎嵗八月中旬擇日祭之命禮部更定山川壇儀與社稷同成祖永樂時北京建山川壇於正陽門南之右悉如南京舊制惟正殿鍾山之右增祀天夀山神世宗嘉靖八年凡親祀山川等神皆用皮弁服行禮以别於郊廟十一年改山川壇為天地神祗壇天神壇在左南向雲雨風雷凡四壇地祗壇在右北向五嶽五鎮五陵山四海四瀆凡五壇從祀京畿山川西向天下山川東向以辰戍丑未年仲秋皇帝親祭餘年遣大臣攝祭其太嵗月將城隍别祀之穆宗隆慶元年禮臣言天神地祗已從祀南北郊其仲秋神祗之祭不宜復舉令罷之耤田唐宋元明唐肅宗乾元二年春正月行耤田禮先期至先農壇因閲耒耜有雕刻文飾命徹之詔有司依農用常式即别改造翌日致祭神農氏以后稷配享冕而朱紘躬秉耒耜九推禮官奏天子合三推今過禮帝曰朕以身率下自當過之恨不能終千畆耳既而佇立久之觀公卿諸侯王公以下耕畢憲宗元和五年詔以來嵗正月耤田太常修撰韋公肅言耤田禮久廢有司無可考乃據禮經參採開元乾元故事草具其儀未及舉行而罷宋太宗雍熙四年詔以來年正月擇日有事於東郊行耤田禮所司詳定儀注依南郊置五使除耕地朝陽門七里外為先農壇髙九尺四出陛周四十歩飾以青二壝壝内立觀耕臺及御耕位其青城設於千畆之外用竹木為青箱無葢兩端設襻飾以青中分九隔隔盛一種覆以青帊穜稑之種用黍稷秫稻粱大小豆大小麥御耒耜二具並盛以青縚凖唐乾元故事不加雕飾其祭先農用純色犢一如郊祀例進胙餘並權用大祀之制大禮使李昉請乗玊輅載耒耜於耕根車鹵簿使賈黄中等言用象輅載耒耜以重其事五年正月乙亥親享神農以后稷配備三獻遂行三推之禮畢事解嚴還行宫百官稱賀御乾元門大赦改元端拱文武遞進官有差二月七日宴羣臣於大明殿行勞酒禮真宗景徳四年判太常禮院孫奭言來年畫日正月一日享先農九日上辛祈榖祀上帝春秋傳曰啓蟄而郊郊而後耕月令曰天子以元日祈榖於上帝乃擇元辰躬耕帝籍先儒皆云元日謂上辛元辰謂郊後吉亥請改用上辛後亥日享先農用符禮文仁宗明道元年詔以來年二月丁未行耤田禮而罷冬至親郊遣官奏告天地宗廟諸陵景靈宫州都就告嶽瀆宫廟其禮如端拱之制而損益之禮成遣官奏謝如告禮神宗元豐二年詔於京城東南度地千畆為耤田置令一員徙先農壇於中神倉於東南取卒之知田事者為耤田兵乃以郊社令辛公佑兼令公佑請因舊鏺麥殿規地為田引蔡河水灌其中并種果蔬冬則藏氷凡一嵗祠祭之用取具焉先薦獻而後進御有餘則貿錢以給雜費輸其餘於内藏庫著為令又權管幹耤田王存等議以南郊鏺麥殿前地及玊津園東南菱地并民田共千一百畆充耤田外以百畆建先農壇兆開阡陌溝洫置神倉齋宫并耕作人牛廬舎之屬繪圖以進已而殿成詔以思文為名徽宗政和元年有司議享先農為中祀命有司攝事帝止行耕耤之禮罷命五使及稱賀肆赦之類太史局擇日不必専用吉亥耕耤所乗改用耕根車罷乗玊輅尋復以耕耤為大祀依四孟朝享例行禮髙宗紹興七年五月命禮官舉先農之祀以立春後亥日行一獻禮十四年十一月詔以來年春祗祓青壇躬三推之禮命臨安府守臣度城南之田得五百七十畆有竒建思文殿觀耕臺及表親耕之田又詔母建殿宇設幕殿席屋如南郊事畢撤去庻不擾民十五年按禮志作十六年今據文獻通考輯親耕耤田並如舊制光宗紹熙五年太社令陳峴奏先農壇蕪廢不治請下臨安府守臣葺築以嚴祀從之元世祖至元七年六月立耤田大都東南郊九年二月始祭先農如祭社之儀武宗至大三年四月從大司農請建先農壇博士議壇式與社稷同不設外壝是嵗命祀先農如社稷禮樂用登歌日用仲春上丁後或用上辛或甲日行三獻禮畢以次詣耕地所耕訖而退明太祖洪武元年諭廷臣以來春舉行耤田禮禮官議耕耤之日皇帝躬祀先農禮畢躬耕耤田以仲春擇日行事從之二年建先農壇於南郊在耤田北親祭以后稷配器物祀儀與社稷同祀畢行耕耤禮御耒耜二具韜以青絹御耕牛四被以青衣禮畢還大次應天府尹及上元江寧兩縣令率庻人終畆是日宴勞百官耆老於壇所二十一年更定祭先農儀遣應天府官致祭不設配位祭畢猶親耕耤田成祖永樂中建壇北京如南京制在太嵗壇西南每嵗仲春上戊順天府尹致祭後凡遇登極之初行耕耤禮則親祭孝宗𢎞治元年定耕耤儀前期百官致齋順天府官以耒耜及穜稑種進呈内官仍捧出授之由午門左出置綵輿鼓樂送至耤田所至期帝祭先農畢太常卿引至耕耤位南向立三公以下各就位户部尚書北向跪進耒耜順天府官北向跪進鞭帝秉耒三推三反訖户部尚書跪受耒耜順天府官跪受鞭太常卿奏請復位府尹挾青箱以種子播而覆之帝御外門南向坐觀耕畢帝還具服殿升座府尹率兩縣令耆老人行禮畢引上中下農夫各十人執農器朝見令其終畆百官行慶賀禮賜酒饌三品以上丹陛上東西坐四品以下臺下坐並宴勞耆老於壇旁晏畢還宫鼓吹振作農夫人賜布一疋世宗嘉靖十年更定耕耤儀先二日順天府尹以耒耜穜稑種置綵輿至耕耤所並罷百官慶賀後又議造耕根車載耒耜府尹於祭日進呈畢以耒耜載車内前玊輅行其御門觀耕地位卑下議置觀耕臺一詔皆可先蠶宋元明宋真宗景徳三年從王欽若請詔有司檢討故事以聞禮院言按開寳通禮季春吉已享先蠶於公桑前享五日諸與享官散齋三日致齋二日享日未明五刻設先蠶氏神座於壇上北方南向尚宫初獻尚儀亞獻尚食終獻女相引三獻之禮女祝讀文飲福受胙如常儀又按唐㑹要皇帝遣有司享先蠶如先農禮乃詔自今依先農例遣官攝祭禮院又言周禮蠶於北郊以純隂也漢蠶於東郊以春桑生請築壇東郊從桑生之義壇髙五尺方二丈四陛陛各五尺一壝二十五步祀禮如中祀仁宗慶厯時用羊豕各一攝事獻官太尉太常光禄卿不用樂神宗元豐四年詳定禮文所言季春吉巳享先蠶氏唐月令注以先蠶為天駟按先蠶之義與先農先牧先炊同當是始蠶之人故開元禮享先蠶為瘞塪於壇之壬地無燔柴之儀明不祀天駟星也今請就北郊為壇以享始蠶之人不設燎壇但瘞埋以祭餘如故事徽宗政和時禮局言禮天子必有公桑蠶室今請倣古制於先蠶壇側築蠶室度地為宫四面為牆髙仞有三尺上被棘中起蠶室二十七别搆殿一區為親蠶之所倣漢制置繭館立織室飬蠶於薄度所用之數為桑林築採桑壇於先蠶壇南相距二十歩方三丈髙五尺四陛置蠶官令丞以供郊廟之祭服又周官内宰詔后帥内外命婦蠶於北郊鄭氏謂婦人以純隂為尊則蠶為隂事可知開元禮享先蠶幣以黒葢以隂祀之禮祀之也今請用黒幣以合至隂之義詔從其議命親蠶殿以無斁為名又詔親蠶所供不獨衮服凡施於祭祀者皆用之宣和元年三月皇后親蠶即延福宫行禮命有司享先蠶氏於本壇其儀屆期内命婦妃嬪以下詣殿庭起居訖皇后首飾鞠衣乗龍飾肩輿出内東門至左昇龍門降輿升獻翟車出宣徳東偏門至親蠶所内侍導詣壇行禮尚功詣採桑位前奉鈎以進皇后受鈎採桑司製奉箱以受桑皇后採桑三條止内外命婦依次採桑訖内侍奏請歸殿後閣解嚴六年復行親蠶之禮髙宗紹興七年從黄積厚請以季春吉巳日享先蠶視風師之儀十五年太常王湛言請按政和禮建親蠶殿蠶室繭館請皇后就禁中行親蠶之禮詔送禮部下太常寺討論不果行元武宗至大三年從大司農請建先蠶壇博士議壇式與社稷同趙天麟奏述古公桑之製勸中宫倣古親蠶然祀事未舉其禮儀無可考云明初先蠶未列祀典世宗嘉靖時都給事中夏言請改各官莊田為親蠶厰公桑園令有司種桑柘以備宫中蠶事九年復疏言耕蠶之禮不宜偏廢帝乃勅禮部具儀以聞大學士張璁等請於安定門外建先蠶壇帝親定其制壇方二丈六尺疊二級髙二尺六寸四出陛東西北俱樹桑柘内設蠶宫令署採桑臺髙一尺四寸方十倍三出陛鑾駕庫五間後葢織堂三月皇后親蠶於北郊祭先蠶氏儀與宋政和禮同四月蠶事告成行治繭禮選蠶婦善繅絲及織者各一人卜日皇后出宫導從如常儀至織堂内命婦一人行三盆手禮布於織婦以終其事蠶宫令送尚衣織染監局造服其祀先蠶止用樂不用舞樂女生冠服俱用黒十年改築先蠶壇於西苑仁夀宫側毁北郊蠶壇四月皇后行親蠶禮於西苑十六年詔罷之仍命進蠶具如常嵗遣女官祭先蠶四十一年並罷所司奏請欽定續通典卷五十
