body:
  text: 刑贖刑虞唐周代漢宋後漢五遼晉金南北朝元明隋臣等謹按自古帝王不得已而用刑其明慎欽恤者莫如虞舜舜典曰金作贖刑列於鞭撲之次肆赦之前金非加人之物贖而仍言刑者出金之與受撲俱世人所患故得指其所出以為刑名周穆王作吕刑五刑之屬三千墨辟而上至於大辟刑疑則赦從罰定以鍰鋝輕重之差使與罰各相當繼言罰懲非死人極於病蓋財者人之所甚欲奪其欲以病之俾不為惡即虞書命刑之義馬端臨謂唐虞之時刑清律簡是以止及鞭撲而五刑無贖法比及於周條律紛繁若盡從而刑之何莫非投機觸罟者穆王哀之而五刑各以贖論大約其情可矜其法可議蓋哀恤之意居多非利其貨也詳繹二篇文義舜典主於誤吕刑主於疑後世論贖率不外此而死罪非實犯多亦有許贖者至於輸納之品孔安國傳於舜典謂為黃金於吕刑謂為黃鐵虞不言成數而周制有等差古者金銀銅鐵總號為金孔頴達正義謂其實皆銅也漢及後魏皆用黃金漢納金特少其斤兩令與銅相埒舊說太半兩為鈞十鈞為鍰鍰重六兩太半兩死罪千鍰當出四百一十六斤六兩太半兩銅與金贖死罪金三斤為價相依倣其後納粟納縑亦不一後魏以金難得合金一兩收絹十匹唐時復古死罪贖銅一百二十斤於古稱為三百六十斤然較漢已為輕減元宗詔許準折納錢而犯者益便逮至金元或以牛馬雜物明初専用鈔𢎞治中鈔法既壞乃許折銀錢準算周官八議之法後世定律率遵用之至明洪武六年工部尚書王肅坐法當笞太祖謂六卿貴重不宜以細故辱命以俸贖後羣臣罣誤準以俸贖始此此厯代輸贖之大略也杜佑著刑典獨不及贖刑一門未免闕略今采自有虞迄於明代以補其罅漏仍倣馬氏通考之例列於赦宥篇之前庶幾有合於尚書之義云虞舜金作贖刑周官職金掌受士之金罰貨罰入於司兵給治兵及工直也貨泉貝也疏言斷獄訟者有疑即使出贖既言金罰又言貨罰者出罰之家時或無金即出貨以當金直故兩言之穆王吕刑墨辟疑赦其罰百鍰閲實其罪劓辟疑赦其罰惟倍閲實其罪剕辟疑赦其罰倍差閲實其罪宫辟疑赦其罰六百鍰閲實其罪大辟疑赦其罰千鍰閲實其罪疑謂虛實之證等是非之理均或事涉疑似旁無證見或雖有證見事非疑似如此之類言皆為疑罪此既罪疑而取贖疑罪不定恐受贖參差故五罰之下皆言閲實其罪恐其不相當故也鍰六兩也鄭及爾雅同說文云六鋝也鋝十一銖二十五分銖之十三也馬同賈逵說俗儒以鋝重六兩周官劍重九埒俗儒近是倍百為二百鍰倍差謂倍之又半為五百鍰傳言五百鍰馬云倍二百為四百差者又加四百之三分之一凡五百三十三鍰三分鍰之一也人犯輕刑者多犯重刑者少又以鍰數以倍相加序五刑先輕後重取事之宜經厯陳罰之鍰數傳言五刑疑各入罰不降相因疏云以其所犯疑不能决故使贖之次刑非其所犯故不令死疑入宫宫疑入是古之制也漢惠帝元年令民有罪得買爵三十級以免死罪應劭曰一級直錢二千凡為六萬若令贖罪入三十匹縑矣師古曰令出買爵之錢以贖罪孝文時納鼂錯之說募民入粟塞下得以除罪武帝天漢四年征胸奴大司農陳藏錢經用賦稅既竭不足以奉戰士乃令死罪入贖錢五十萬減死一等宣帝地節三年西羌反遣後將軍征之京兆尹張敞言國兵在外吏民並給轉輸田事頗廢來春民食必乏縣官榖度不足以振之願令各諸有罪非盜受財殺人及犯法不得赦者皆得以差入榖此八郡贖罪八郡者隴西已北安定已西務益致榖以豫備百姓之急事下有司少府蕭望之等議如此則富者得生貧者獨死是貧富異刑而法不一也不可於是天子復下議兩府丞相御史以難問敞敞言令罪人出財減罪其名賢於煩擾良民橫興賦斂又諸盜及殺人犯不道者百姓所疾苦也皆不得贖首匿見知縱所不當得為之屬議者或頗言其法可蠲除今因此令贖其便明甚望之終以為不便丞相魏相御史大夫丙吉亦以為西羌且破轉輸略足相給遂不施敞議後漢光武建武二十九年令天下罪囚殊死已下及徒各減本罪一等其餘贖罪輸作有差明帝即位詔罪囚中二千石下至黃綬貶秩贖論者悉皆復秩還贖又詔天下亡命殊死已下聽得贖論死罪入縑二十匹右趾至髠鉗城旦舂十匹全城旦舂至司寇作三匹其未發覺詔書到日先自告者半入贖永平八年詔犯罪亡命者贖罪各有差十五年詔亡命殊死已下贖死罪縑四十匹右趾及髠城旦舂十匹全城旦至司寇五匹餘如即位初制十八年詔贖死罪減縑十匹章帝建初七年詔又減縑十匹如永平初年故事右趾髠鉗已下各有差和帝永元六年廷尉陳寵言今律令贖罪已下二千六百八十一溢於甫刑者七十九事宜令三公廷尉平定律令應經合義者并大辟耐罪贖罪為三千悉刪除其餘條使與禮相應議未及施而寵免後遂寢順帝漢安二年令罪囚殊死已下出縑贖各有差其不能入贖者遣詣臨光縣居作二嵗桓帝建和三年詔死罪亡命已下贖各有差靈帝建寧元年令天下繫囚未决入縑贖各有差三年及熹平六年光和三年中平四年俱有此令晉新律意善功惡以金贖之金等不過四兩梁武帝即位詔曰金作贖刑有聞自昔入縑以免施於中代民悅法行莫尚乎此可依周漢舊典有罪入贖其科凡在官身犯罰金鞭撲杖督之罪悉入贖停罰其臺省令史士卒欲贖者聽之其制刑為十五等之差棄市已上為死罪大罪梟其首其次棄市刑二嵗已上為耐罪言各隨技能而任使之也有髠鉗五嵗刑笞二百收贖絹男子六十匹又有四嵗刑男子四十八匹又有三嵗刑男子三十六匹又有二嵗刑男子二十四匹罰金一兩已上為贖罪贖死者金二斤男子十六匹贖髠鉗五嵗刑笞二百者金一斤十二兩男子十四匹贖四嵗刑者金一斤八兩男子十二匹贖三嵗刑者金一斤四兩男子十匹贖二嵗刑者金一斤男子八匹罰金十二兩者男子六匹罰金八兩者男子四匹罰金四兩者男子二匹罰金二兩者男子一匹罰金一兩者男子二丈女子各半之五刑不簡正於五罰五罰不服正於五過以贖論故為此十五等之差將吏已上及女子應有罰者以罰金代之天監三年詔以金作權典宜在蠲息於是除贖罪之科大同十一年復開罪身皆聽入贖陳存贖罪之律其三嵗刑若有官准當二年餘一年贖若公坐過誤罰金其二嵗刑有官者贖論一嵗刑無官亦贖論元魏起自朔方其初刑法甚峻死罪至多後乃令當死者其家獻金馬以贖北齊律贖罪舊有金皆代以中絹死百匹流九十二匹刑五嵗七十八匹四嵗六十四匹三嵗五十匹二嵗三十六匹各通鞭笞論一嵗無笞則通鞭二十四匹鞭杖每十贖絹一匹至鞭百則絹十匹無絹之鄉皆准絹收錢自贖笞十已上至死又為十五等之差當加減次如正决法合贖者謂流內官及爵秩比視老小閹癡并過失之屬犯罰絹一匹及杖十已上皆名為罪人後周制其贖杖刑五金一兩至五兩贖鞭刑五金六兩至十兩贖徒刑五一年金十二兩二年十五兩三年一斤二兩四年一斤五兩五年一斤八兩贖流刑一斤十二兩俱役六年不以逺近為差等贖死罪金二斤婦人當笞者聽以贖論應贖金者鞭杖十收中絹一匹流徒者依限嵗收絹十二匹死罪者一百匹其贖刑死罪五旬流刑四旬徒刑三旬鞭刑二旬杖刑一旬限外不輸者歸於法貧者請而免之隋制官品第九已上犯罪者聽贖應贖者皆以銅代絹贖銅一斤為一負負十為殿笞十者銅一斤加至杖百則十斤徒一年贖銅二十斤每等加銅十斤三年則六十斤矣流一千里贖銅八十斤每等則加銅十斤三千里則百斤矣絞斬二死刑皆贖銅百二十斤煬帝即位以髙祖禁網深刻每加減降時斗稱皆小舊二倍其贖銅亦加二倍為差其實不異開皇舊制唐律贖銅之數及以官當罪之法大略悉準隋制以官當徒者五品以上犯罪者一官當徒二年九品以上一官當徒一年若犯公罪者各加一年以官當流者三流同皆比徒四年仍各解見任除名者比徒三年免官者比徒二年免所居官者比徒一年九品已上官若官品得減者之祖父母父母妻子孫犯流罪已下聽贖七品五品已上官親屬流罪已下得減一等軍民年七十已上十五已下及廢疾犯流罪已下者準此𤣥宗天寶六載敕節文其贖銅如情願納錢每斤一百二十文若缺負官物應徴正贓及贖物無財以備官役折庸其物雖多限三年一人一日折絹四匹若㑹恩其物合免者停役憲宗元和三年詔今後應坐贓及他罪當贖者諸道委觀察判官一人専勾當及時申報如蔽匿不申者節級科貶如罪不繫奏官長量情處置者其贓但準前申送御史臺充本色給用仍差御史一人専知贓贖不得以贓罰為名如罪名未正妄罰其財亦委觀察判官勾當差定後先具名奏聞僖宗乾符三年敕應殘疾篤疾犯徒流罪或是連纍即許徴贖如身犯罪不在免限其年十五已下者準律文處分晉髙祖天福六年尚書刑部員外郎李象奏請今後凡是散官不計髙低若犯罪不得當贖亦不得上請詳定院覆奏應內外文武官有品官者自依品官法無品官有散試官者應內外帶職廷臣賓從有功將校等並請同九品官例其京都軍巡使及諸道州府衙前職員內外雜任鎮將等並請準律不得上請當贖其巡司馬步司判官雖有曽厯品官者亦請同流外職準律杖罪已下依决罰例徒罪已上仍依當贖法宋制最慎贖刑非入議者幾不得與刑統名例律有用官䕃減贖之條太祖乾德四年通考作開寶四年以大理正髙繼申言具雜議篇詔犯罪身無官須祖父曽任本朝官及仕前代三品已上官有功惠及民者乃得請又定流內品官任流外職準律文徒罪已上依當贖法諸司受勒留官及歸司人犯徒流等罪公罪許贖私罪以决罰論太宗淳化四年通考作端拱三年詔諸州民犯薄罪或入金贖長吏得以任情而輕重之自今並决杖遣之不以贖論婦人犯杖已下非故為量輕重笞罰或贖銅釋之仁宗議立贖法詔曰先王用法簡約使人知禁而易從後代設茶酒鹽稅之禁奪民厚利刑用滋章今之編敕皆出律外又數改更官吏且不能曉百姓安得聞之一陷於理情雖可哀法不得贖豈禮樂之化未行而専用刑罪之弊與漢文帝使天下人入粟於邊以受爵免罪幾於刑措其議科條非著於律者或冒利犯禁奢侈違令或過誤可憫别為贖法鄉民以榖麥市人以錢帛使人重榖麥免刑罰則農桑自勸富壽可期矣詔下論者以為富人得贖而貧者不能免非朝廷用法之意不果行至和初詔前代帝王後嘗仕本朝官不及七品者祖父母父母妻子流罪已下聽贖雖不仕而嘗被賜豫者有罪非巨蠧亦如之隨州司理參軍李抃父毆人死抃上所授官以贖父罪帝哀而許之君子以為失刑神宗熙寧四年前單州碭山尉王存立言嘉祐中同學究出身為尉嘗納官贖父配𨽻罪願同舉人例得免丁徭詔復賜出身仍與注官時中書言刑名未安者五條其四令州縣考察士民有能孝悌力田為衆所知者給帖付身偶有犯令情輕可恕者特議贖罰其不悛者科决後竟不行遼制品官公事誤犯民年七十已上十五已下犯罪者聽以贖論贖銅之數杖一百者輸錢千太祖七年于厥掠生口者俾贖其罪放歸本部興宗重熙元年詔執事官公罪聽贖私罪各從本法金國舊俗凡親屬犯罪欲以牛馬雜物贖者從之或重罪亦聽自贖然恐無辨於齊民則劓刵以為别世宗大定八年制品官犯賭博法贓不滿五十貫者其决杖聽贖再犯者不聽且曰杖者所以罰小人也既為職官當先廉恥既無廉恥何以贖為時焦旭攝左警巡事以杖親軍百夫長有司論當杖决帝曰旭親民吏也若因杖有官人復行杖之何以行事其令收贖章宗泰和元年新律成贖銅皆倍於舊宣宗時完顔伯嘉知歸德府上言乞雜犯死罪已下許納粟贖免宰臣奏伯嘉前在代州嘗行之蓋一時之權不可為常法遂寢元制諸職官犯夜及牧民官公罪之輕者許罰贖又諸年老七十已上年幼十五已下不任杖責及癃篤殘疾有妨科决者贖世祖至元二年諸王塔齊爾使臣庫庫楚至北京花道驛手殺驛吏郝用及郭和尚有㫖徴鈔十錠給其主以贖死二十一年以哈扎爾齊依舊揚州鹽運使嵗市鹽八十萬石以贖過明贖法有二有律得收贖者有例得納贖者律贖無敢損益而納贖之例則因時權宜先後互異其端實自開國時啓之律凡文武官以公事犯笞罪者官照等收贖錢吏每季類决之各還職役不附過杖已上記所犯罪名每嵗類送吏兵二部候九年滿考通記所犯次數黜陟之吏典亦備銓選降叙至於私罪其文官及吏典犯笞四十已下者附過還職而不贖笞五十者調用軍官杖已上皆的决文官及吏杖罪並罷職不叙至嚴也然自洪武中年已三下令准贖及雜犯死罪已下矣三十年命部院議定贖罪事例凡內外官吏犯笞杖者記過徒流遷徙者俸贖之三犯罪之如律自是律與例互有異同及頒行大明律御製序雜犯死罪徒流遷徙等刑悉視今定贖罪條例科斷於是例遂輔律而行永樂四年十一月法司進月繫囚數凡數百人大辟僅十之一成祖諭曰此等既非死罪而久繫不决天氣沍寒必有聽其寃死者凡雜犯死罪已下約二百悉准贖發遣仁宗初即位諭都察院言輸罰工作之令行有財者悉幸免宜一論如律久之其法復弛英宗正統間侍講劉球言輸罪非古自公罪許贖外宜悉依律時不能從其後循太祖之例益推廣之凡官吏公私雜犯准徒已下俱聽運炭納米等項贖罪其軍官軍人照例免徒流者例贖亦如之矣贖罪之法明初嘗納銅成化間嘗納馬後皆不行不具載惟納鈔納錢納銀常並行焉而以初制納鈔為本故律贖者曰收贖律鈔納贖者曰贖罪例鈔永樂十一年令除公罪依例紀録收贖及死罪情重者依律處治其情輕者斬罪八千貫絞罪及榜例死罪六千貫流徒杖笞納鈔有差無力者發天壽山種樹宣宗宣德二年定笞杖罪囚每十贖鈔二十貫徒流罪名每徒一等折杖二十三流並折杖百四十其所罰鈔悉如笞杖所定無力者發天壽山種樹死罪終身徒流各按年限杖五百株笞一百株景帝景泰元年令問擬笞杖罪囚有力者納鈔笞十二百貫每十以二百貫遞加至笞五十為千貫杖六十千八百貫每十以三百貫遞加至杖百為三千貫其官吏贓物亦視今例折鈔英宗天順五年今罪囚納鈔每笞十鈔二百貫餘四笞遞加百五十貫至杖六十增為千四百五十貫餘杖各遞加二百貫憲宗成化二年令婦人犯法贖罪孝宗𢎞治十四年定折收銀錢之制例難的决人犯并婦人有力者每杖百應鈔二千二百五十貫折銀一兩每十以二百貫遞減至杖六十為銀六錢笞五十應減為鈔八百貫折銀五錢每十以百五十貫遞減至笞二十為銀二錢笞十應鈔二百貫折銀一錢如收銅錢每銀一兩折錢七百文其依律贖鈔除過失殺人外亦視此數折收武宗正德二年定錢鈔兼收之制如杖一百應鈔二千二百五十貫者收鈔千一百二十五貫錢三百五十文世宗嘉靖七年巡撫湖廣都御史朱廷聲言收贖與贖罪有異在京與在外不同鈔貫止聚於都下錢法不行於南方故事審有力及命婦軍職正妻及例難的决者有贖罪例鈔老幼廢疾及婦人餘罪有收贖律鈔贖罪例鈔錢鈔兼收如笞一十收鈔一百貫錢三十五文其鈔二百貫折銀一錢杖一百收鈔千一百二十五貫錢三百五十文其鈔二千二百五十貫折銀一兩今收贖律鈔笞一十止贖鈔六百文比例鈔折銀不及一釐杖一百贖鈔六貫折銀不及一分似為太輕蓋律鈔與例鈔貫既不同則折銀亦當有異請更定為則凡收贖者每鈔一貫折銀一分二釐五毫如笞一十贖鈔六百文則折銀七釐五毫以罪重輕遞加折收贖帝從其奏令中外問刑諸司皆以此例從事按廷聲此奏謂律鈔輕例鈔重然律鈔本非輕也祖制每鈔一文當銀一釐所謂笞一十折鈔六百文定銀七釐五毫者即當時之銀六錢也所謂杖一百折鈔六貫銀七分五釐者即當時之銀六兩也以銀六錢比例鈔折銀不及一釐以銀一兩比例鈔折銀不及一分而欲以此懲犯罪者之心宜其勢有所不行矣特以祖宗律文不可改也於是不得已定為七釐五毫七分五釐之制而其實所定之數猶不足以當所贖者之罪然後例之變通生焉考洪武朝官吏軍民犯罪聽贖者大抵罰役之令居多如發鳯陽屯種滁州種苜蓿代農民力役運米輸邊贖罪之類俱不用鈔納也律之所載笞若干鈔若干文杖若干鈔若干貫者特垂一代之法爾然按三十年詔令罪囚運米贖罪死罪百石徒流遞減其力不及者死罪自備米三十石徒流十五石俱運納甘州威虜就彼充軍計其米價腳價之費與鈔數差不相逺其定為贖鈔之等第固不輕於後來之例矣然罪無一定而鈔法之久日變日輕此定律時所不及料也即以永樂十一年令斬罪情輕者贖鈔八千貫絞及榜例死罪六千貫之詔言之八千貫者律之八千兩也六千貫者律之六千兩也下至杖罪千貫笞罪五百貫亦一千兩五百兩也雖革除之際用法特苛豈有死罪納至八千兩笞杖罪納至一千兩五百兩而尚可行者則知鈔法之弊在永樂初年已不啻輕十倍於洪武時矣宣德時申交易用銀之禁冀通鈔法至𢎞治而鈔竟不可用遂開准鈔折銀之例及嘉靖新定條例詳見下文俱以有力稍有力二科贖罪有力米五斗准律之納鈔六百文也稍有力工價三錢准律之做工一月也是則後之例鈔才足比於初之律鈔耳而况老幼廢疾諸在律贖者之銀七釐五毫准鈔六百文銀七分五釐准鈔六貫凡所謂律贖者以比於初之律鈔其輕重相去尤甚懸絶乎是時重修條例奏定贖例在京則做工每笞一十做工一月折銀三錢至徒五年折銀十八兩運囚糧每笞一十米五斗折銀二錢五分至徒五年五十石折銀二十五兩運灰每笞一十一千二百斤折銀一兩二錢六分至徒五年六萬斤折銀六十三兩運甎每笞一十七十箇折銀九錢一分至徒五年三千箇折銀三十九兩運水和炭五等每笞一千二百斤折銀四錢至徒五年八千五百斤折銀十七兩運灰最重運炭最輕此諸罪初皆令親自赴役事完寧家無納贖之例其後法令益寬聽其折納而估算事力亦略相當在外則有力稍有力二等初有頗有力次有力各等因御史言而革其有力視在京運囚糧每米五斗納榖一石初折銀上庫後納榖上倉稍有力視在京做工年月為折贖婦人審有力與命婦軍職正妻及例難的决之人贖罪應錢鈔兼收者笞杖每一十折收銀一錢其老幼廢疾婦人及天文生餘罪收贖者每笞一十應鈔六百文折收銀七釐五毫於是輕重適均天下便之至萬厯十三年復申明焉遂為定制明法充軍之例最嚴有終身有永逺永逺者罰及子孫皆以實犯死罪減等者充之嘉靖間有請開贖軍例者世宗曰律聽贖者徒杖以下小罪耳死罪矜疑乃減從謫發不可贖御史周時亮復請廣贖例部議審有力者銀十兩得贖三年已上徒一年稍有力者半之而贖軍之議卒罷御史胡宗憲言南方之人不任兵革其發充邊軍者宜令納銀自贖部議以為然因擬納例以上帝曰豈可預設此例以待犯罪之人復不允凡律贖若天文生習業已成能専其事犯徒及流者决杖一百餘罪收贖婦人犯徒流者决杖一百餘罪收贖如杖六十徒一年全贖鈔應十二貫除决杖准訖六貫餘鈔六貫折銀七分五釐他倣此其决杖一百審有力又納例鈔二千二百五十貫應收錢三百五十文鈔一千一百二十五貫凡年七十已上十五已下及廢疾犯流已下收贖八十已上十嵗已下及篤疾盜及傷人者亦收贖凡犯罪時未老疾事發時老疾者依老疾論犯罪時幼小事發時長大者依幼小論並得收贖如六十九已下犯罪年七十事發或無疾時犯罪廢疾後事發得依老疾收贖他或七十九已下犯死罪八十事發或廢疾時犯罪篤疾時事發得入上請八十九犯死罪九十事發得勿論不在收贖之例若在徒年限內老疾亦如之如犯杖六十徒一年一月之後老疾合計全贖鈔十二貫除已杖六十准三貫六百文剩徒一年應八貫四百文計算每徒一月贖鈔七百文已役一月准贖七百文外未贖十一月應收贖七貫七百文餘倣此即老幼廢疾收贖惟雜犯五年仍科之蓋在明初真犯死罪不可以徒論也其誣告例告二事已上輕實重虛或告一事誣輕為重者已論决全抵剩罪未論决笞杖收贖徒流杖一百餘罪亦聽收贖如告人笞三十內止一十實已决全抵剩二十之罪未决收贖一貫二百文如告人杖六十內止二十實已决全抵剩四十之罪未决收贖二貫四百文如告人杖六十徒一年內止杖五十實已决全抵剩杖一十徒一年之罪未决徒一年折杖六十併杖共七十收贖四貫二百文如告人杖一百流二千里內止杖六十徒一年實已决以總徒四年論全抵剩杖四十徒三年之罪未决以連徒折杖流加一等論共計杖二百二十除告實杖六十徒一年折杖六十剩杖一百贖鈔六貫若計剩罪過杖一百已上須决杖一百訖餘罪方聽收贖又過失傷人准鬬毆傷人罪依律收贖至死者准雜犯斬絞收贖鈔四十二貫內鈔八分應三十三貫六百文銅錢二分應八千四百文給付其家已徒五年再犯徒收贖鈔三十六貫若犯徒流存留飬親者止杖一百餘罪收贖其法實杖一百不准折贖然後計徒流年限一視老幼例贖之此律自英宗時詔有司行之後為制天文生婦女犯徒流决杖一百餘罪收贖者雖罪止杖六十徒一年亦决杖一百律所謂應加杖者是也皆先依本律議其所犯徒流之罪以誥減之至臨决時某係天文生某係婦人依律决杖一百餘收贖所决之杖並須一百者包五徒之數也然與誣告收贖剩杖不同蓋收贖餘徒者决杖而贖徒收贖剩杖者折流歸徒折徒歸杖而照數收贖之其法各别也其婦人犯徒流成化八年定例除姦盜不孝與樂婦外若審有力并决杖亦得以納鈔贖罪例每杖十折銀一錢為率至杖一百折銀一兩止凡律所謂收贖者贖餘罪也其例得贖罪者贖决杖一百也徒杖兩項分科之除婦人餘囚徒流皆决杖不贖惟𢎞治十三年許樂戶徒杖笞罪亦不的决此律鈔之大凡也例鈔自嘉靖二十九年定例凡軍民諸色人役及舍餘審有力者與文武官吏監生生員冠帶官知印承差隂陽生醫生老人舍人不分笞杖徒流雜犯死罪俱令運灰運炭運甎納米納料等項贖罪此上係不虧行止者若官吏人等例應革去職役此係行止有虧者與軍民人等審無力者笞杖罪的决徒流雜犯死罪各做工擺站哨瞭發充儀從情重者煎鹽炒鐵死罪五年流罪四年徒按年限其在京軍丁人等無差占者與例難的決之人笞杖亦令做工時新例犯姦盜受贓為行止有虧之人概不許贖罪惟軍官革職者俱運炭納米等項發落不用五刑條例的决實配之文所以寬武夫重責文吏也於是在京惟行做工運囚糧等五項在外惟行有力稍有力二項法令益徑省矣大抵贖例有二一罰役一納鈔而例復三變罰役者後多折工值納鈔鈔法既壞變為納銀納米然運灰運炭運石運甎運碎甎之名尚存也至萬厯中年中外通行有力稍有力二科在京諸例并不見施行而法更歸一所謂通變而無失於古之意者此也初令罪人得以力役贖罪死罪拘役終身徒流按年限笞杖計日月或修造或屯種或煎鹽炒鐵滿日踈放踈放者引赴御橋叩頭畢送應天府給引寧家合充軍者發付陕西司按籍編發後皆折納工價惟赴橋如舊宣德初詔官吏軍民自死罪至笞四十分十等納米贖罪納者贓罪得不死徒流以下復用不納者久繫不釋其法最弊有司復奉行不善拘繫滿獄二年御史鄭道寧言納米贖罪朝廷寬典乃軍儲倉拘繫罪人無米輸納自去年二月至今死者九十六人刑部郎中俞士吉因奏囚無米者請追納於原籍匠仍輸作軍仍備操若非軍匠則追還所𨽻州縣遣之詔如其請伏讀御批通鑑輯覽曰金作贖刑古人欽恤之義苟情有可矜而罪非不赦許其納米弛罪亦未始不可今不問其願與否而强之使從令無力者轉受無窮之纍則是為利起見而非為仁行權矣蓋明律頗嚴凡朝廷有所矜恤限於律而不得伸者一寓之於贖例所以濟法之太重也又國家得時藉其入以佐緩急而實邊足儲賑荒宫府頒給諸大費往往取給於贓贖二者故贖法比厯代特詳云欽定續通典卷一百十六
