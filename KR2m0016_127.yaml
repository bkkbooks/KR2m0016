年没蠻之明文而紀要諸書亦無馬氏及髙氏據有之始末不知湖南全境歸朝之後何以四州不能據守為蠻所侵抑或在髙氏時本已為蠻所占歸朝之日虚列版圖史志荒逺䕼稽無從詳晰姑存疑義謹附識於此熙寧七年收復以潭陽縣地置盧陽縣以辰州麻陽招諭二縣𨽻州八年廢招諭縣入麻陽元豐三年併鎮江砦人户入黔江城為黔陽縣五年升舊渠陽砦為縣元祐六年省為砦崇寧二年復為縣縣四盧陽下有奬州西縣八洲長宜逈溪鎮江龍門懷化八舖麻陽下有錦州砦龔溪龍家竹砦虚踵齊天义溪六舖龔溪砦熙寧六年賜名其後為舖未詳黔陽下有竹砦烟溪無狀木州洪江五舖渠陽下砦八熙寧間復硤中騰雲鶴綉勝五州富錦圓三州六年以硤州新城為安江砦富州新城為鎮江砦七年廢慢水砦龍家堡以辰州龍門鎮安二砦𨽻州尋廢為舖宣和元年復置銅安砦元豐三年置托口砦四年以古誠州貫保新堡為貫保砦奉愛豐山新保為豐山新堡小由長渡村堡為小由砦安江有洪江銅安二舖托口有竹灘一舖元豐八年罷貫保元豐三年置六年𨽻誠州元祐六年廢崇寧二年復置渠陽元祐三年以渠陽軍改來𨽻竹灘洪江並元祐五年置𨽻黔陽若溪崇寧三年置便溪崇寧三年以奬州改靖州下軍事熙寧九年收復唐溪洞誠州元豐四年仍建為誠州五年沅州貫保砦改為縣總治本砦并托口小由豐山四堡砦户口以渠陽縣為名𨽻州六年移托口小由兩砦却屬沅州析邵州蒔竹縣𨽻州移渠陽為州治七年小由砦復𨽻州尋廢小由砦豐山堡元祐二年廢為渠陽軍三年廢軍為砦屬沅州元祐五年復以渠陽砦為誠州崇寧二年改今名大觀元年為望郡縣三水平下本渠陽縣崇寧二年改名紹興八年移入州會同下本三江縣崇寧二年改通道下本羅䝉縣崇寧二年改砦四狼江收溪貫保羅䝉元豐六年置收溪復以沅州貫保來𨽻七年置羅䝉元祐三年廢收溪羅䝉崇寜二年又置若水豐山二砦堡五石家滻村多星大由天村元豐四年置石家滻村六年置多星七年置大由天村元祐三年廢多星大由天村崇寧三年復置又置羊鎮堡木砦堡大觀二年又置飛山堡政和三年又置零溪堡八年置通平堡荆門軍開寳五年長林當陽二縣自江陵來𨽻熙寧六年廢軍以縣屬江陵府元祐三年復按隆平集開寳五年以荆門鎮為荆門軍宋史未詳謹附識縣二長林次畿當陽次畿紹興十四年廢入長林十六年復漢陽軍同下州熙寧四年廢為縣以漢川縣為鎮屬鄂州元祐元年復置紹興五年又廢為縣七年復為軍縣二漢陽𦂳漢川下太平興國二年自徳安來𨽻紹興五年廢七年復按輿地廣記唐武徳四年析漢陽置汊川縣屬沔州州廢屬鄂州五代周屬安州宋太平興國二年改曰漢川縣屬漢陽軍宋史未詳謹附識夀昌軍下本鄂州武昌縣嘉定十五年升夀昌軍使續升軍按方輿勝覽云嘉定十五年升為軍使以與鄂州節鎮之名相類因玉寳夀昌文錫名夀昌軍宋史不載謹附識縣一武昌上以武昌山為名南渡後為江州治所後復故南路州七軍一監一縣三十九南渡後増茶陵軍按南路州軍監共領縣三十七此云三十九誤南渡後升邵州為寳慶府置茶陵軍升桂陽軍増興寧桂東臨武酃四縣共府一州六軍三縣四十一潭州上長沙郡武安軍節度乾徳元年降為防禦端拱元年復為軍舊領荆湖南路安撫使大觀元年升為帥府建炎元年復為總管安撫司紹興元年兼東路兵馬鈐轄二年復為安撫司縣十二長沙望開寳中廢長豐縣入焉衡山望淳化四年以衡州衡山岳州湘陰並來𨽻有黄簳銀場安化望熙寧六年置改七星砦為鎮入焉廢首溪砦元祐三年置博易場宋按宋朝事實熙寧六年以益陽縣置安化縣史未詳謹附識醴陵𦂳攸上湘鄉中湘潭中益陽中屬按方輿記要益陽縣宋初鼎州尋還屬宋史未詳謹附識瀏陽中有永興及舊溪銀埸湘陰中乾徳三年自鼎州𨽻岳州俄而來𨽻寧鄉中沙按輿地廣記太平興國二年析長縣置寧鄉縣宋史未詳謹附識善化元符元年以長沙縣五鄉湘潭縣兩鄉為善化縣仍按善化縣史闕望𦂳等字今其舊衡州上衡陽郡軍事縣五衡陽𦂳有熙寧錢監耒陽中常寧中下熙寧六年廢常寧縣奬中砦有茭源銀場安仁中下乾徳二年升安仁場為縣按隆平集作乾徳三年與宋史異謹附識茶陵南渡後升為茶陵軍道州中江華郡軍事乾徳三年廢大厯縣按宋朝事實云廢大厯入永明宋史未詳謹附識紹興元年𨽻荆湖東路二年復縣四營道𦂳熙寧五年省永明縣為鎮入焉元祐元年復宋按輿地廣記營道縣唐元宗天寳元年改為宏道縣建隆三年復舊名宋史未詳謹附識江華𦂳有黄富鐵場華按隆平集建隆四年以潭州江縣𨽻道州宋史未詳謹附識寧逺𦂳唐延唐縣宋乾徳三年改永明上永州中零陵郡軍事縣三零陵望祁陽中東安中雍熙元年升東安場為縣有東安砦郴州中桂陽郡軍事紹興初改𨽻荆湖東路二年仍來屬縣四郴𦂳有新塘浦溪二銀坑桂陽中唐義昌縣後唐改郴義宋太平興國初又改有延夀銀坑宣章中唐義章縣宋太平興國初改永興中舊髙亭縣熙寧六年改南渡後増縣二興寧嘉定二年析郴縣資興程水二鄉置資興縣後改今名按二年輿地考作四年謹附識桂東本郴縣地嘉定四年析桂陽之零陵宜城二郷置今縣於上猶砦寳慶府本邵州邵陽郡軍事大觀九年升為望郡寳慶元年以理宗潛藩升為府淳祐六年升寳慶軍節度縣二邵陽望新化望熙寧五年收復梅山以其地置縣有惜溪柘溪藤溪深溪雲溪五砦金州下軍事紹興元年聴廣西路經畧安撫司節制縣二清湘望有香烟禄塘長烏羊洑峽石磨石獲源七砦灌陽中有洮水灌水吉寧砦茶陵軍紹興九年升縣為軍仍𨽻衡州嘉定四年析康樂雲陽常平三鄉置酃縣按方輿勝覽云中興以來湖南路安撫提刑奏升軍額知縣曰茶陵軍使兼知茶陵縣事仍𨽻衡州領縣一茶陵考方輿勝覽序云作於嘉熙己亥係理宗嘉熙三年嘉定乃寧宗年號自嘉定四年下逮嘉熙己亥相距二十九年若嘉定四年已置酃縣不應方輿勝覽中尚稱茶陵舊名恐嘉定四年係宋史之訛謹附識亦嘗𨽻衡州縣一酃下因酃湖為名桂陽軍同下州本桂陽監紹興元年𨽻荆湖東路二年復三年升軍按方輿勝覽作紹興二十二年據載乞升軍額奏狀云内轄三縣外撫五峒若三年則臨武縣尚未増置不得云三縣明係升軍在増縣之後增縣既在紹興十一年則升軍自當以二十二年為是宋史當有訛脱謹附識縣二平陽上隋縣晉廢宋天禧三年置有大富等九銀坑按隋縣當作唐縣藍山中景徳三年自郴州來𨽻識按三年輿地考作元年謹附南唐後増縣一臨武中自石晉廢宋紹興十一年復武岡軍崇寧五年以邵州武岡縣升為軍縣三武岡中有山塘一砦熙寧八年廢白沙砦置闗硤武陽城步三砦元祐四年置赤木砦紹聖元年置神山砦崇寧二年置通峽大觀元年置峽口砦綏寧中本邵州蒔竹縣地熙寧九年廢崇寧九年復紹興十一年移治武陽砦二十五年還舊後廢臨岡來入臨岡本蒔竹縣元豐四年以溪洞徽州為縣𨽻邵州六年置臨口砦崇寧五年改砦為縣𨽻武岡軍南渡後廢臨岡増新寧下漢夷地宋紹興二十五年於水頭江北立今縣欽定續通典卷一百二十七
