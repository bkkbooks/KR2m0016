body:
  text: 州郡宋陜西路路兩浙路西淮南東路南淮南西路北江南東江南路荆湖路荆湖路陜西路慶厯元年分陜西沿邊為秦鳳涇原環慶鄜延四路熙寧五年陜西又分永興建熙河并前四路為六路共三十四州軍按王應麟地理通釋康定二年分陜西為四路秦鳯涇原環慶鄜延熙寧五年陜西又分永興建熙河并前四路為六路宋史俱混入熙河當有錯誤永興軍路府二州十五軍一縣八十三其後延州慶州改為府又増銀州醴州及定邊綏徳清平慶成四軍凡府四州十五軍五縣九十按永興軍路脫去丹州及鄜州所領四縣得州十四縣七十八今増入丹州及鄜州四縣則州十五縣八十二加後増置清平軍定邊軍各一縣醴州五縣共縣八十九内醴泉武功二縣重見實得縣八十七宋史有誤京兆府京兆郡永興軍節度本次府大觀元年升大都督府舊領永興軍路安撫使宣和二年詔稱京兆府縣十三長安次赤樊川次赤舊萬年縣宣和七年改鄠次畿藍田次畿咸陽次畿涇陽次畿櫟陽次畿髙陽次畿作按髙陽當髙陵興平次畿臨潼次畿唐昭徳縣宋大中祥符改應按昭徳當作昭醴泉次畿武功次畿政和八年同醴泉撥入醴州乾祐次畿監二熙寧四年置鑄銅錢八年置鑄鐵錢河中府次府河東郡䕶國軍節度按宋朝事實太平興國七年改䕶國軍節度宋史未詳謹附識舊兼提舉解州慶成軍兵馬巡檢事縣七河東次赤熙寧三年省西河縣六年省永樂縣為鎮入焉臨晉次畿猗氏次畿虞鄉次畿萬泉次畿龍門次畿元祐二年置鑄錢監二榮河次畿舊𨽻慶成軍熙寧元年廢以榮河𨽻府即縣治置軍使慶成軍大中祥符中以榮河為慶成軍尋廢解州中防禦縣三解中聞喜望安邑𦂳陜州大都督府陜郡太平興國初改保平軍節度舊兼提舉商虢州兵馬巡檢事縣七陜中熙寕六年省硤石縣為石壕鎮入焉平陸上夏上靈寳上熙寧四年省湖城縣入焉芮城中下湖城中下元豐元年復置縣閿鄉中下太平興國三年自虢州與湖城縣同來𨽻監二熙寧三年置鑄銅錢八年置鑄鐵錢商州望上洛郡軍事縣五上洛中商洛中下洛南中下豐陽中上津中下虢州雄虢郡軍事縣四盧氏中熙寕二年以西京伊陽縣欒川治隸焉虢畧中唐宏農縣宋建隆初改常農至道三年改今名熙寜四年省玉城縣為鎮入焉朱陽中乾徳六年廢入常農太平興國七年復置欒川元祐二年以樂川治為鎮崇寧三年改為縣同州望馮翊郡定國軍節度按宋朝事實太平興國七年升定國軍節度宋史未詳謹附識縣六馮翊𦂳澄城𦂳朝邑𦂳郃陽上熙寧四年省夏陽縣為鎮入焉白水中韓城中元祐二年置鑄錢監監一沙苑華州望華陰郡建隆初為鎮國軍節度按輿地廣記云後唐改鎮國軍與宋史異謹附識皇祐五年改鎮潼軍節度縣五鄭上下邽望蒲城望唐奉先縣宋開寳四年改建隆中自京兆隸同州真宗天禧四年自同州來𨽻華陰𦂳渭南上熙寧六年省為鎮入鄭元豐元年復為縣舊自京兆府來𨽻監二熙寧四年置鑄銅錢八年置鑄鐵錢耀州𦂳華原郡開寳五年為感義軍節度太平興國初改感徳軍縣六華原上富平望三原望雲陽上同官上美原中清平軍本鳳翔府盩厔縣清平鎮大觀元年升為軍後置終南縣𨽻京兆府清平軍使兼知終南縣縣一終南按終南縣史失望𦂳等字今仍其舊延安府中都督府延安郡彰武軍節度本延州元祐四年升為府舊置鄜延路經畧安撫使統延鄜丹坊州保安軍後増置綏徳軍銀州銀州尋廢縣七膚施中熙寧五年省豐林縣為鎮金明縣為砦並入焉有金明龍安二砦安塞一堡元豐四年又收復塞門砦宣和二年改龍安曰徳安砦延川中熙寜八年省延水縣為鎮入焉有丹頭綏平懷寧順安白草永平六砦安定黒水三堡及永寧闗元豐四年收復置浮圖義合米脂三砦七年以米脂義合浮圖懷寧順安綏平六城砦𨽻綏徳城元符二年廢順安白草丹頭三砦延長中門山中臨真中敷政中有招安萬安二砦元符二年廢招安砦為驛甘泉中下城二治平四年收復綏州熙寧中改為綏徳城四年置羅鄂特城撫寧賓草二堡尋廢元豐五年置永樂城賜名銀川砦尋廢青澗城元符三年𨽻綏徳城綏徳城元符二年改為軍監一熙寧八年置鑄鐵錢塞門砦延州北蕃部舊砦至道後與蘆闗石堡安逺砦俱廢元豐四年收復仍𨽻延州施縣平羌砦地本克胡山砦紹聖四年賜名威戎城地本昇平塔紹聖四年賜名平戎砦地本杏子河東山紹聖四年賜名開光堡紹聖四年修築元符元年賜名二年𨽻綏徳城殄羌砦地名納木寧山元符元年進築賜名威羌砦地名白洛觜元符元年進築賜名御謀城崇寧三年進築賜名石堡砦崇寧三年進築賜名威徳軍五年復為砦初嘗置城至道後廢之制戎城政和八年賜鄜延路天降山新城改今名新砦蘆移堡屈丁堡萬安堡丹頭堡青石崖堡科爾羅堡鄜州上洛交郡保大軍節度縣四洛交𦂳熙寧七年省三川縣入焉洛川上鄜城上直羅中下丹按宋史失去鄜州所領各縣及州沿革而以丹州之宜川縣屬之鄜州考輿地考鄜州屬永興軍路建炎三年入金領洛交洛川三川直羅鄜城五縣輿地廣記領縣四無三川云熙寜七年省入洛交據金史地理志亦作四縣洛交縣下云鎮一三水三水猶之三川也熙寧併省此為明證輿地考失注耳今據増正丹州上咸寧郡軍事按輿地廣記上丹州唐天寳元年曰咸寧郡金史地理志云宋咸寧軍事今據増入縣一宜川上後魏義川縣宋太平興國中改名以鄜州廢咸寜縣入焉熙寧三年省汾川縣七年省雲巖縣為鎮八年析同州韓城縣新封鄉並入焉坊州上中部郡軍事縣二中部𦂳宜君中熙寧元年省昇平縣為鎮入焉有礬塲保安軍同下州永按輿地廣記太平興國二年以延州安鎮置軍宋史未詳謹附識砦二徳靖順寧按輿地廣記徳靖砦天禧四年初建子城天聖元年改為徳靖砦順寧砦慶厯四年置宋史未詳謹附識堡一園林金湯城舊金湯砦在徳靖砦西南元符二年進築威徳軍保安軍之北兩界上有洑流名藏底河夏人近是築城為要害必争之地政和七年知慶州姚古克之綏徳軍唐綏州宋熙寧三年收復按本紀熙寧二年十月丙申城綏州此作三年疑誤廢為城𨽻延州元豐七年以延州米脂義合浮圖懷寧順安綏平六城砦𨽻綏徳城元符二年改為軍暖泉砦元符二年進築賜名米脂砦本西夏砦元豐四年收復為米脂城後復為砦𨽻延州延州縣七年改𨽻綏徳城元祐四年給賜夏人元符元年收復仍賜舊名開光堡紹聖四年修築元符元年賜名二年自延安府來屬義合砦本夏人砦元豐四年收復𨽻延州延川縣七年改𨽻綏徳城懷寧砦延州延川縣舊砦克戎城本西人細浮圖砦元豐四年收復𨽻延州延川縣七年改𨽻綏徳城元祐四年給賜夏人紹聖四年收復賜名臨夏城地名羅揚果嶺元符元年築城賜今名綏平砦延州延川縣舊砦元符二年割𨽻青澗城延州舊城永寧闗延州延川縣舊闗白草砦延州延川縣舊砦元符二年廢後復置順安砦延州延川縣舊砦元符二年廢後復置嗣武砦舊羅揚城屬延州元豐四年置尋廢崇寧三年修復賜名龍泉砦宣和二年改名通泉尋復故清邊砦鎮邊砦龍安砦本屬延安府膚施縣不詳何年來屬海末堡海末至柏林十六堡黒水安定安塞本延安舊堡窟兒堡大厥堡花佛嶺堡臨川堡定逺堡馬欄堡中山堡黑水堡安定堡佛堂堡唐推堡雙林堡安塞堡浮圖堡柏林堡銀州銀川郡五代以來為西夏所有宋元豐四年收復五年即永樂小川築新城賜名銀川砦崇寧四年為銀州五年廢為銀川城慶陽府中安化郡慶陽軍節度本慶州建隆元年升團練乾徳元年復為軍事政和七年升為節度賜軍額曰慶陽宣和七年改為府舊置環慶路經畧安撫使統慶環邠寧乾凡五州其後廢乾州置定邊軍已而復置醴州凡統三州按三字當是五字之訛一軍縣三安化中有大順一城府城東谷柔逺人順四砦元豐四年廢府城砦金村堡平戎鎮五年收復礓詐砦賜名安疆砦元祐元年復平戎鎮按輿地廣記唐肅宗至徳元載改安化為順化宋乾徳二年復曰安化省同川縣入焉宋史未詳謹附識合水望熙寧四年始置省華池樂蟠二縣為鎮七年改華池鎮為華池砦有東華池西華池二砦荔原一堡彭原熙寧二年自寧州來𨽻仍按彭原縣史缺望𦂳等字今其舊安疆砦本西人礓詐砦元豐五年收復賜名元祐四年給賜夏人紹聖四年收復又𨽻定邊軍横山砦地名錫卜察伊特元符元年進築賜名通塞堡元符元年進築定邊城元符二年修築後别為定邊軍白豹城舊屬西界元符二年修復賜舊名别見定邊軍綏逺砦地本駱駝巷元符二年進築賜名按綏逺砦亦見定邊軍寧羌砦地本萌門三岔元符元年進築賜名鎮安城政和六年進築麥川堡本名麥經嶺政和六年賜名係環慶路未詳屬何州軍姑附於此威寧堡本名衡家堡政和六年賜名係環慶路未詳屬何州軍姑附於此矜戎堡府城砦元豐二年廢不知何年修復金村堡同上勝羌堡定戎堡威邊砦懷威堡環州下軍事舊降為通逺軍淳化五年復為州縣一通逺上有烏崙肅逺洪徳永和平逺定邊堡安塞八砦按宋朝事實天聖四年改方渠縣為通逺縣宋史未詳謹附識興平城地名灰家觜元符元年築賜名清平闗地名之字平元符二年建築賜名安邊城地名徐丁臺崇寧五年築賜名羅溝堡未灰臺至綏逺砦中路地名火羅溝及阿原烽政和三年建築賜名阿原堡地名見羅溝堡政和三年賜名朱臺堡本朱灰臺政和三年建築賜名安邊砦大拔砦元豐二年廢不知何年修復方渠砦流井堡歸徳堡木𤓰堡麝香堡通歸堡恵丁堡邠州𦂳新平郡静難軍節度縣五新平望宜禄望三水上定平𦂳熙寧五年𨽻寧州政和七年自寧州來隸淳化中淳化四年升耀州雲陽黎國鎮為縣熙寧八年置鑄錢監元豐三年廢宣和元年自耀州來𨽻按黎國鎮隆平集作黎園鎮宋朝事實作梨園鎮互有異同謹附識寧州望彭原郡興寧軍節度本軍事州宣和元年賜軍額縣三定安𦂳襄樂上真寧下醴州本京兆府奉天縣舊置乾州熙寧五年廢政和七年復為州更名醴八年割屬環慶路縣五奉天次畿永夀下乾徳三年自邠州來𨽻熙寧五年廢乾州永夀及麻亭常寧二砦俱𨽻邠州政和八年復來𨽻武功醴泉二縣本屬京兆府政和八年三月割屬好畤本屬鳳翔府政和八年三月割屬定邊軍元符二年環慶路進築定邊城後改為軍縣一定邊政和六年置白豹城元符二年進築賜舊名已見慶陽府東谷砦舊砦已見慶陽府安化縣綏逺砦地名駱駝巷元符二年進築賜名按綏逺砦已見慶陽府神堂堡大觀二年進築賜名觀化堡通化堡九陽堡雞觜砦按慶陽府安疆砦注云又𨽻定邊軍此不列安疆砦疑有脫誤秦鳳路府一州十二軍三縣二十八其後増積石震武懷徳三軍西寧樂廓西安洮㑹六州又改通逺軍為鞏州凡府一州十九軍五縣四十八按秦鳳路府州軍元領縣四十三後増置會州敷文䡗州永寜寧逺三縣共領縣四十六宋史誤秦州下府天水郡雄武軍節度舊置秦鳳路經畧安撫使統秦隴階成鳳五州通逺軍其後割通逺軍屬熙河縣四成紀上有渭水三陽上蝸牛下蝸牛堡子伏歸小三陽照川上門四顧平戎赤崖湫西青逺近湫定西小定西下硤注鹿原上硤圓川伏羌得勝榆林大像菜園探長新水谷舊水谷檉林丙龍石人舖駞項永寧鹽泉小永寜冷水泉雙泉新土舊土三十九堡隴城中有静戎永固定平長山白榆林郭馬安塞七堡清水中有弓門鐵窟斫鞍堡子小弓門坐交得鐵治坊橋子李子古道永安四顧威塞􅔋穰鎮邊和戎安逺挾