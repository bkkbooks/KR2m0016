front:
  text: 欽定四庫全書欽定續通典卷一百二十三
  hash: sha256:8e8d0dbbaef82c8732628be9508e8e3ed9d467e13ea1937ffc86820d44667357
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0016_WYG_123-1a, image: WYG0641/WYG0641-0418a.png}
body:
  text: 州郡五代晉石敬瑭初為後唐河東節度使廢帝清泰三年移鎮鄆州拒命詔討之敬瑭求援於契丹契丹冊立敬瑭國號晉盡得後唐故地以燕雲十六州入於契丹後得蜀金州又增置威州有州一百有九汴髙祖天福三年升為東京復置開封府以開封浚儀為赤縣餘為畿縣復以酸棗中牟襄邑鄢陵太康五縣來屬並升為畿縣按分縣為赤畿據五代㑹要及冊府元龜洛天福三年改為西京雍天福三年廢唐西京為晉昌軍節度改雍邱縣為把縣兖沂密天福七年以避國諱改輔唐縣為膠西縣按天福七年據五代㑹要青出帝開運元年降為防禦與登萊淄並屬京以楊光逺叛命初平故也按此據五代㑹要淄齊棣登萊徐宿鄆曹故屬宣武軍節度開運二年置威信軍濮宋亳防禦按此據輿地考單潁陳天福六年升為防禦開運二年置鎮安軍節度按此據寰宇記及五代㑹要蔡許汝鄭滑以衛州黎陽縣來屬按輿地考云以衛南縣屬澶州以衛州黎陽縣來屬職方考無衛南改屬之文於黎陽縣云故屬滑州晉割𨽻衛州新舊唐書黎陽縣並屬衛州寰宇記云通利軍本黎陽縣地唐屬衛州晉天福中割𨽻滑州疑職方考有誤今據改正襄天福七年降為防禦直屬京所管均房二州割𨽻鄧州以安從進叛命初平故也按此據五代㑹要均房金故屬山南東道節度唐末置戎昭軍已而廢之遂入於蜀晉天福四年置懷德軍尋罷按年天據福五四代㑹要鄧隨復唐城縣為漢東縣郢唐復為泌州按此據輿地考復天福五年升為防禦改竟陵縣為景陵縣按防禦據輿地考及寰宇記安天福五年罷安逺軍為防禦所管新州割𨽻許州以李金全叛命故也按此據五代㑹要申蒲孟懷晉絳陜虢華商同耀邠寧慶衍威天福四年置割靈州之方渠寧州之木波烏嶺三鎮為屬而治方渠𨽻靈武按𨽻靈武據五代㑹要鄜坊丹延夏銀綏宥靈鹽岐隴涇原渭天福五年以涇州平涼縣來屬按此據寰宇記武秦成階鳳乾魏天福二年改興唐府為廣晉府復興唐縣為元城縣三年復升為鄴都以廣晉元城兩縣為赤縣其餘屬縣為畿縣按復縣升縣據五代㑹要博改堂邑縣為河清縣尋復舊改高唐縣為齊城縣按此據方輿紀要貝天福三年置永清軍節度以博冀二州𨽻之按𨽻二州據五代㑹要衛澶故屬天雄軍節度天福三年升為防禦移理所於德勝軍九年建鎮寧軍節度以廣晉府之臨清濮州之濮陽二縣來屬又於頓邱縣置德清軍按升防禦屬二縣據五代㑹要及輿地考又輿地考於滑州下云以衛南縣屬澶州而他書無可互證未敢增入謹附識相天福三年置彰德軍節度以澶衛二州𨽻之按此據五代㑹要洺邢磁鎮天福七年改為恆州順德軍節度改行唐縣為永昌縣以冀州堂陽縣來屬按改州縣名割屬堂陽據五代㑹要及寰宇記冀深趙易祁定改唐縣為博陵縣按此據寰宇記滄景德天福五年移就長河縣為理所按此據輿地廣記欣代改白鹿縣為廣武縣按此據方輿紀要嵐石憲麟府按職方考晉置永安軍漢罷之周復考五代㑹要漢髙祖天福十二年升為永安軍節度𨼆帝乾祐三年降團練周世宗顯德元年復舊軍額而輿地考亦云晉髙祖賂契丹以雲中河西之地契丹欲遷西河之民以實遼東人心大擾折從阮因保險厄之少帝絶契丹詔析從阮出師從阮乃深入拔十餘寨漢時從阮歸命升府州為永安軍周顯德元年復建府州為節度仍以永安為額是永安軍之置實在漢初職方考疑誤謹附識并天福六年以沁遼二州還𨽻按此據五代㑹要汾慈隰澤潞天福五年復為昭義軍節度割沁遼二州𨽻之按此據五代㑹要沁遼天福三年改置昭義軍節度於此兼領沁州四年廢按此據方輿紀要附外屬州瀛莫契丹於清苑縣置泰州晉開運元年克復泰州二年以滿城縣路當衝要宜立郡庭其泰州宜移理於滿城其舊泰州復為清苑縣滿城所置泰州尋廢幽契丹改為燕山府建為燕京以轄檀順景薊涿易六郡號為燕京路涿檀薊順營平契丹改為興遼府以營灤二州𨽻之號為平州路蔚朔雲契丹號為西京應新契丹改為奉聖州媯契丹改為可汗州儒武契丹改為歸化州寰以上入契丹揚南唐於天長縣置建州武軍於六合縣置雄楚按資治通鑑周顯德三年獲南唐漣州刺史秦進崇注唐蓋置州於漣水考唐志漣州太宗貞觀初廢是唐省而南唐復置也謹附識泗滁南唐改永陽縣為來安縣和光黃舒蘄廬南唐置昭順軍夀清淮晉天福中改盛唐縣為來化縣尋復舊海泰南唐升元元年升東都海陵縣為州割鹽城泰興如臯興化為屬又改吳揚子縣為永正縣來𨽻濠南唐保大元年升為定逺軍潤常南唐於江隂縣置江隂軍宣歙鄂天福初改唐年縣為臨江縣又升鮎魚場為嘉魚縣升永安場為永安縣按宋史地理志興國軍大冶縣注云南唐縣自鄂州來𨽻是南唐鄂州有大冶縣也謹附識升升元中改為江寧府保大初僑置和州於當塗謂之新和州尋改為雄逺軍又改廣德縣為廣德制置司復置蕪湖繁昌二縣又以池州義安舊縣置銅陵縣來屬池升元二年升為康化軍饒南唐置永平軍信升元四年於弋陽上饒二縣析五鄉以為場保大中升為鉛山縣江升元三年升赤烏場為瑞昌縣保大中以彭澤二鄉析置湖口縣改潯陽縣為德化縣又升廣東流場為東流縣洪升元中升靖安場為縣仍析建昌奉新武寧三縣地以益焉又升潚灘鎮為清江縣不𨽻州撫袁吉保大元年析泰泉和縣四鄉置龍場後升為縣䖍劍保大三年於建州延平津置劍州改劍州之龍津縣為劍浦縣及汀州之沙縣來隸三按職方考於州下注李景置字今據南唐書增修汀建晉天福中王置鎮安軍旋改為鎮武軍以將樂縣置鏞州改邵武縣為昭武縣南唐保大三年升為永安軍節度漳留從效南唐保大四年僞刺史董思安以其父名章改名南州泉留從效晉天福三年改桃源縣為永春縣八年以唐武安場置長泰縣以上入南唐福晉天福初閩改福清縣為南台縣以長樂縣為安昌縣後復舊開運二年閩為東都四年入於吳越杭天福中改唐山縣為橫山縣後復舊越天福五年析剡縣十三鄉為新昌縣改剡縣為贍縣蘇湖溫天福四年升為靜海軍節度從錢元瓘請也台天福七年改唐興縣為台興縣明處衢婺天福四年升為武信軍節度睦秀本蘇州嘉興縣地天福四年錢元瓘奏置秀州仍割嘉興海鹽華亭三縣並置崇德縣屬焉以上入吳越荆歸峽以上入南平益漢晉天福初改金堂縣曰漢城縣後復故彭晉天福初改永昌縣為彭山縣後復故蜀綿眉嘉劍梓遂果閬普陵資榮簡卭黎雅維茂文龍黔施夔忠萬興利開通涪渝瀘合昌巴蓬集壁渠戎梁洋以上入後蜀潭衡晉省臨武縣澧朗嶽道永邵全馬希範置以潭州之湘州縣為湘縣又割灌陽縣為屬而治濟湘辰融郴連昭宜桂以全義縣置溥州晉天福八年析靈川縣地為義寧鎮後升為縣馬氏奏置賀梧䝉嚴富柳象以上入楚容雍晉天福七年以避諱改為誠州謹按晉髙祖父名紹雍蓋避其嫌名也附識端康封恩春新高竇雷化韶藤白亷欽廣橫賔潯循鬱林英雄瓊崖儋萬安羅潘勤瀧辨以上入南漢欽定續通典卷一百二十三
