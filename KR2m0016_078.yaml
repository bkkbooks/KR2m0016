body:
  text: 禮凶喪制中大斂宋元明宋品官喪大斂禮以小斂之明日按次日小斂三日大斂乃禮經之常夷槃設氷用以備暑所謂秋凉而止者是也然士不用氷已難與卿大夫同例而炎方盛夏又有地鮮蔵氷者則陳龍正所稱三日而殯當暑宜先之説正所以通禮經之變耳夙興陳衣於東序十稱朝服公服各一稱餘皆常服不足者隨所有西領南上内喪則具花釵饌於堂東階下如初掘殯坎於西階之上棺入内外哭止升棺於殯所灰炭枕席之屬皆預設於棺内升訖内外皆哭熬黍稷六箱皆加魚腊燭俟於饌東贊者徹小斂之饌降出乃適新饌所斂者盥訖與執服者以斂衣入内外皆少退立哭斂者斂訖覆以夷衾卒斂開帷主人以下憑哭如初退復位諸親以次憑哭斂者四人舉牀男女從奉尸斂於棺乃加蓋覆以夷衾内外皆復位如初庶人大斂禮以小斂之明日夙興陳衣三稱於東序西領南上饌於堂東階下掘殯坎於西階之上棺入内外哭止升棺於殯所升訖内外皆哭熬黍稷二箱加魚腊燭俟於饌東贊者徹小斂之饌降出乃適新饌所斂者盥訖與執服者以斂衣入内外皆少退立哭斂者斂訖覆以夷衾卒斂開帷主人以下慿哭斂者四人舉牀男女從奉尸斂於棺乃加蓋覆以夷衾内外皆復位如初元武宗至大元年十二月涂全周呈甞觀聖經有曰𦵏也者蔵也蔵也者欲人之勿得見也衣足以飾身棺周於衣槨周於棺土周於椁又觀漢史則曰仲尼孝子延陵慈父其𦵏骨肉皆微薄矣非茍為儉誠便於體徳彌厚者𦵏彌薄知愈深者𦵏愈㣲切見江南流俗以侈靡為孝凡有喪𦵏大其棺椁厚其衣衾有将寳鈔藉尸斂𦵏習以成風非惟甚失古制於法似有未應今後喪𦵏之家除衣衾棺椁依禮舉𦵏外不許輙用金銀寳玉器玩裝斂違者以不孝坐罪以望無起盜心少全孝道惜生者有用之資免死者無益之禍奉㫖盡行禁斷明品官喪大斂之禮以小斂之明日夙興陳衣於東序饌於堂東階下如小斂之儀舉棺以入置於堂中少西侍者先置衾於棺中與子孫婦女俱盥手掩首結絞共舉尸納於棺中實生時所落髪齒及所剪爪於棺角又揣其空缺處卷衣塞之務令充實不揺動以衾先掩足次掩首次掩左次掩右令棺平滿喪主主婦憑哭盡哀乃召匠匠加葢下釘徹牀覆柩以衣庶人喪禮略同大斂奠宋明宋司馬光書儀大斂祝帥執事者盥手舉新饌自阼階升置於靈座前祝焚香洗盞斟酒奠之卑㓜再拜哭皆如小斂奠之儀士喪禮卒塗乃奠設於奥注自是不復奠於尸既夕禮燕養饋羞湯沐之饋如生日注孝子不忍一日廢其事親之禮於下室曰設之如生也開元禮奠於室之西南隅六品以下設於靈座前席上殯於外者施葢訖設大斂之奠於殯東既殯設靈座於下室西間東向施牀几案屏幛服飾以時上膳羞及湯沐皆如平生下室者謂燕寢無下室則設靈座於殯東聽按古者室中牖在西户在東故設神席於西南隅東面得其宜也今士大夫家既不可殯於聽事則正室之外别無燕寝又朝夕之奠何常不用飯而更設靈座於下室西間東向两處饋奠甚無謂也又靈座若在殯而奠於殯東亦非禮也今但設奠於靈座前庶從簡易朱子家禮大斂設靈牀於柩東乃設奠如小斂之儀明品官喪大斂畢設靈牀於柩東贊者以饌升入室西向奠於席前内外皆就位哭如初喪主以下各歸喪次庶人禮大斂畢設靈牀於柩東乃奠喪主以下各歸喪次殯設熬附宋明宋品官喪掘殯坎於西階之上棺入内外哭止升棺於殯所設熬首足各一箱以木覆棺上乃塗卒塗乃設帟於殯上祝取銘置於殯贊者盥手以饌升入室西面設於殯前降出下帷内外皆就位哭如初既殯設靈座於下室西間東向施牀案屏幛服飾以時上飲膳及湯沐如平生大功以下異門者各歸其家庶人禮設熬榖首足各一箱以木覆棺上乃塗卒塗乃設帟贊者以饌入設於殯前降出下帷内外皆就位哭如初既殯設靈座於殯東施牀案屏幛服飾以時上飲食及湯沐如平生大功以下異門者各歸其家明王廷相答趙生家禮疑問問有若喪次之居殯側之居二者不知居孰為宜三日而斂斂而即殯殯於堂中少西蓋疾病遷居正寢已在堂中記曰尸未設飾故帷堂觀此則喪次與殯側一而已矣自喪者言之謂之喪次自死者言之謂之殯側將𦵏筮宅卜日附宋明臣等謹案開元禮有卜宅卜曰之儀而政和禮無之但云墓兆塟日皆前期擇之不知其所擇者用何法也若用龜蓍必備詳其儀如開元禮矣今但曰擇之而不載其儀則用地師之術可知也葢唐之世相地擇日之書雖已行於時而儒臣之議禮猶知依仿古人至宋則并此虚文而亡之矣司馬光書儀古意尚存謹備録於右宋司馬光書儀卜宅兆塟日開元禮五品以上卜六品以下筮今若不曉卜筮止用杯珓可也若𦵏於祖塋則更不卜筮既殯以謀𦵏事檀弓曰既殯旬而布材與明器今但殯畢則可以謀塟事既擇地得數處執事者掘兆四隅外其壤掘中南其壤按将為壙之地掘其四隅與中央略以識之而已以神之從違未可必也涖卜或命筮者擇逺親或賔客為之及祝執事者皆吉冠素服雜記大夫卜宅與𦵏日有司麻衣布衰布帶因喪屨緇布冠不蕤占者皮弁如筮則史練冠長衣以筮占者朝服注曰麻衣至緇布冠非純凶也皮弁則純吉之尤者也長衣練冠純凶服也朝服純吉服也今從簡易依開元禮皆非純吉亦非純凶素服者但徹去華采珠玉之飾而已執事者布卜筮席於兆南北向主人既朝哭適兆所立於席南當中壤北向免首絰按免首絰除首絰也以對神不可純凶故去絰而不用與袒免之免不同左擁之涖卜筮者立於主人之右北向卜筮者東向執龜筴進南面受命於主人涖卜者從旁命之曰孤子姓名為父某官為母則稱哀子為母某封度茲幽宅無有後艱卜筮者許諾右旋就席北面坐述命士喪禮不述命士禮略也開元禮則既受命而申言之指中封而卜筮中封中央壤也占既得吉則執龜筴東向進告於涖卜筮者及主人曰從主人絰哭若不從更卜筮他所如初儀兆既得吉執事者於其中壤及四隅各立一標當南門立两標祝帥執事者入設后土氏神位於中壤之左南向古無此開元禮有之置倚卓盥盆帨架盞注脯醢不能如此只常食两三味皆如常日祭神之儀但不用紙錢告者與執事者皆入卜者不入序立於神位東南重行西向北上立定倶再拜告者盥手洗盞斟酒進跪酹於神座前俯伏興少退北向立搢笏執詞進於神座之右東面跪念之曰維年月朔日子某官姓名敢昭告於后土氏之神今為某官姓名主人也營建宅兆神其保佑俾無後艱謹以清酌脯醢祗薦於神尚饗訖興復位告者再拜出祝及執事者皆西向再拜徹饌出主人歸殯前北面哭卜筮𦵏日於三月之初若墓逺則卜筮於未三月之前命曰某月日主人先與賔議定可𦵏日三日謂可以辦具及於事便者必用三日備不吉也執事者布卜筮席於殯門外闑西北向主人既朝哭與衆主人謂亡者諸子出立於殯門外之東壁下西向南上闔東扉主婦立於其内主人進立於門南北向免首絰右擁之涖卜筮者立主人東北西向卜筮者執龜筴東向進受命於涖卜筮者命之曰孤子某将以今月某日先卜逺日不吉再卜近日卜𦵏其父某官考降無有近悔考上也降下也言卜此日塟魂神上下無得近於咎悔者乎按近悔如雨不克塟之類筮宅為乆逺之計故慮有後艱卜日乃目前之事故期無近悔卜筮者許諾右旋就席西向坐述命卜筮不吉則又興受命述命再卜占既得吉興告於涖卜者及主人曰某日從主人絰與衆主人皆哭又使人告於主婦主婦亦哭主人與衆主人入至殯前北向哭遂使人告於親戚僚友應㑹塟者若孫為祖後則涖卜筮者命之曰孤孫某卜𦵏某祖某官夫曰乃夫某卜筮其妻某氏兄弟官及他親為䘮主者各随其所稱曰某親某卜𦵏某親某明㑹典品官禮三月而𦵏前期擇地之可塟者葢地有美惡地之美者則其神靈必安其子孫必盛地之惡者則反是所謂美者土色之光潤草木之茂盛他日不為道路不為城郭不為溝池不為貴勢所奪不為耕犂所及即所謂美地也古人所謂卜其宅兆者正此意而非若後世隂陽家禍福之説也既得地喪主帥執事者於所得地掘兆四隅外其壌掘中南其壤各立一標當南門立兩標庶人禮三月而𦵏擇地之可𦵏者土色光潤草木茂盛之處即為羙地又須慎五患使他日不為道路不為城郭不為溝池不為貴勢所奪不為耕犂所及乃可世人多徇俗師隂陽之説既擇年月日時又擇山水形勢以為子孫貧賤富貴夀夭賢愚盡繫於此至有終身不𦵏者悖禮傷義無過於此既得地乃擇日開塋域啓殯朝廟宋宋司馬光書儀啓殯之日執事者遷靈座及椸於旁側為将啓殯也祝凶服無服者則去華盛之飾執功布止哭者北向立於柩前抗聲三告曰謹以吉辰啓殯既告内外皆哭盡哀止既夕禮商祝袒免執功布入升自西階盡階不升堂聲三啓三命哭開元禮祝三聲噫嘻今恐驚俗故但用其辭婦人退避於他所為役者将入主人及衆主人輯杖立視唘殯祝取銘旌置靈座之側役者入徹殯塗及墼埽地潔之祝以功布拂去棺上塵覆以裌衾既夕禮祝取銘置於重今以魂帛代重故置於靈座側役者出婦人出就位立哭執事者復設椸及靈座於故處乃徹宿奠置新奠如常日朝夕奠之儀朝祖按儀禮記有朝襧一莭禮畢乃適祖今但言朝祖者祖襧共廟舉祖以包禰也役者入婦人退避主人立視如啓殯役者舉柩詣影堂前祝以箱奉魂帛在前執事者奉奠及倚桌次之銘旌次之柩次之未明則柩前後皆用二燭照之主人以下皆從哭男子由右婦人由左重服在前輕服在後各以昭穆長㓜為序侍者在末無服之親男居男之右女居女之左不與主人主婦並行婦人皆葢頭為有役者在前故也役者出則去葢頭至影堂前置柩於席北首吕氏家􅚘按書儀置柩于席北首不唯於事不便亦於理不合據儀禮既夕禮遷於祖正柩於两間用夷牀是則古禮朝祖置柩於牀不於席也今世俗置柩用凳亦夷牀之遺意役者出祝帥執事者設靈座及奠於柩西東向若影堂前迫隘則置靈座及奠於旁近從地之冝主人以下就位位在柩之左右前後如在殯宫立哭盡哀止役者入婦人避位祝奉魂帛導柩右旋主人以下哭從如前詣聽事置席上南首設靈座及奠於柩前南向餘如朝祖主人以下就位坐於柩側藉以薦席如在殯宫乃代哭如未殯之前吕氏家􅚘按儀禮啓殯夙興設盥於祖廟門外陳鼎皆如殯東方之饌亦如之是陳鼎及饌皆在廟而不在殯所也遷於祖正柩於两楹間質明乃奠如初升降自西階是行奠禮在朝廟之時而不在啓殯之時也然啓殯動柩畧無奠祭似於人情未盡故書儀從開元禮設唘奠而朝祖之時不設遷祖奠今從書儀朱子家禮發引前一日因朝奠以遷柩告設饌如朝奠祝斟酒訖北靣跪告曰今以吉辰遷柩敢告俯伏興主人以下哭盡哀再拜葢古有啟殯之奠今既不塗殯則其禮無所施又不可全無節文故為此禮也奉柩朝於祖又語類問朝祖時有遷祖奠恐在祖廟之前祖無奠而亡者難獨享否曰不須如此理會禮説有奠處便是合有奠無奠處便合無奠更何用疑按儀禮注疏之説分朝禰與朝祖為二日敖氏則謂同在一日朝禰日並無别事何須歴終日之乆覺敖説為長薦車馬明器及飾棺五代宋元明五代喪葬之制三品以上輀車用開轍車油幰絲絡網兩廂畫龍虎庶人喪車用合轍車工商諸色人吏無官者諸人無職掌者無合轍車三品以上明器九十事四神十二時在内不得過二尺五寸餘五品以上明器六十事四神十二時在内九品以上明器四十事四神十二時在内不得過一尺餘同光三年敕斷轝用錦繡祗使常式素車不定人數使素紫白絹帶額遮幃轝上使白粉埽木珠節子上使白絲五品六品升朝官使二十人舁轝車竿高七尺長一丈三尺濶五尺以白絹全幅為帶額婦人以紫絹為帶額並畫雲氣周迴遮蔽上安白粉埽木珠節子二十道七品八品升朝官使一十六人舁轝車竿髙七尺長一丈三尺濶五尺以白絹全幅為帶額婦人以紫絹全幅為帶額周迴遮蔽上安白粉埽木珠節子二十道六品至九品不升朝官使一十六人舁轝車竿高六尺長一丈一尺濶四尺以白絹全幅為𢃄額婦人以紫絹為帶額周迴遮蔽上安白粉埽木為珠節子一十六道周太祖廣順元年葬故樞密使楊邠等輴車魂車儀椁車買道車誌石車各一宋太常因革禮諸輀車三品以上油幰朱絲絡網施襈兩廂畫龍幰竿諸末垂六流蘇七品以上油幰施襈兩廂畫雲氣垂四流蘇九品以下無流蘇司馬光書儀明器刻木為車馬僕從侍女各執奉養之物象平生而小多少之數依官品下帳為牀帳茵席倚桌之類皆象平生所用而小也既夕禮苞二注所以裹奠羊豕之肉檀弓曰國君七个遣車七乗雜記曰遣車視牢具或問曽子曰君子既食則裹其餘乎曽子曰大享既饗卷三牲之爼歸於賓館父母而賓客之所以為哀也晉賀循用脯一篋以代所苞牲體今遣奠既無牲體又生肉經宿則臭敗不若用循禮得事之宜然遣奠之時亦當設脯既奠苞以蒲篋或箱或竹掩耳或席簟之類包之可也既夕禮筲三黍稷麥今但以竹器或小罌貯五穀各五升可也既夕禮罋三醯醢屑鄭注屑薑桂之屑也今但以小罋二貯醯醢按朱子曰苞筲罋以盛羊豕五穀酒醯醢雖古人不忍死其親之意然實非冇用之物且脯肉腐敗生蟲聚蟻尤為非便雖不用可也元順帝至元七年十二月尚書刑部奉尚書省札付該准中書省咨十一月十八日奏民間喪葬多有無益破費畧舉一節紙房方相等近年起置有毎家費鈔一兩定鈔底至甚無益其餘似此多端奉㫖紙房子無疑禁了其餘商量行都省議得除紙錢外據紙糊房子金錢人馬并綵帛衣服帳幙等物欽依聖㫖盡行禁斷咨請照驗施行定喪事體例棺上貼畫靈馬走唱孝車前承應合用的依體例行明喪葬之制太祖洪武五年定牆翣公侯六三品以上四五品以上二明器公侯九十事一品二品八十事三品四品七十事五品六十事六品七品三十事八品九品二十事引者引車之紼也披者以纁為之繫於輀車四柱在旁執之以備傾覆者也五品以下二引二披左右各二鐸羽旛竿長九尺五品以上一人執之以引柩六品以下不用功布品官用之長三尺方相四品以上四目七品以上兩目八品以下不用柳車上用竹格以綵結之旁施帷幔四角垂流蘇按設柩在旁為牆牆冇帷在上為桞初洪武二年敇葬開平王常遇春於鍾山之隂給明器九十事納之墓中鉦二鼓四紅旗拂子各二紅羅葢鞍籠各一弓二箭三竈釡火爐各一俱以木為之水罐甲頭盔臺盞杓壺瓶酒甕唾壺水盆香爐各一燭臺二香盒香匙各一香筯二香匙筯瓶茶鍾茶盞各一筯二匙二匙筯瓶一椀二楪十二橐二俱以錫造金裹之班劍牙仗各一金裹立𤓰骨朶㦸響節各二交椅脚踏馬杌各一誕馬六槍劍斧弩食桌牀屏風柱杖箱交牀香桌各一櫈二俱以木為之樂工十六執儀仗二十四控士六女使十青龍白虎朱雀元武神四門神二武士十并以木造各高一尺雜物翣六璧一筐笥楎椸衿鞶各一笣二筲二糧漿瓶二油瓶一紗厨煖帳各一束帛青三叚纁二叚毎叚長一丈八尺後定制公侯九十事者准此行之餘以次減殺祖奠宋明宋司馬光書儀祖奠執事者具祖奠酒饌如殷奠其日晡時祖禮用日昃謂日過中時今宜比夕奠差早用捕時可也主人以下卑㓜皆立哭祝帥執事者設酒饌於靈前祝奠訖退北面跪告曰永遷之禮靈辰不留謹奉柩車式遵祖道俯伏興餘如朝夕奠儀主人以下復位坐代哭以至於發引按儀禮既夕禮稱奠者有四葬前一日柩遷於祖質明乃奠如初所謂遷祖奠也日側乃載布席乃奠如初所謂祖奠也賓賵者將命兄弟賵奠可也者所謂冇服之親奠也葬日厥明陳鼎饌乃奠者所謂大遣奠也則是葬前一日先遷祖奠次祖奠次乃有服親之奠書儀親賓奠乃在祖奠之前似未合古明品官禮啟之夕發引祝帥執饌者設祖奠於柩東祝以酒奠訖詣饌南北面跪曰永遷之禮靈辰不留謹奉旋車式遵祖道尚饗少頃徹之庶人禮日晡時設祖奠祝斟酒訖北面跪告曰永遷之禮靈辰不留今奉柩車式遵祖道俯伏興厥明輿夫納大輿於中庭執事者徹祖奠祝北靣跪告曰今遷柩就輿敢告遂遷靈座置旁側賵賻五代宋明後唐明宗長興元年勅太常禮院例凡賻匹帛言段不言端匹毎二丈為段四丈為匹五丈為端近日三司支遣多毎段全支端匹此後凡支賻贈匹帛祗言合支多少段庫司臨時併計丈尺給付不得剰有支破二年中書門下復奏尚書都官員外郎知制誥張昭逺丁母憂伏以大臣枕凷有弔祭之恩羣寮寢苫無慰問之例髙下之位君臣之事無偏况為卿士者甚多有父母者極少固於孝道上軫聖懷張昭逺望量與恩賜自此朝臣或有丁憂亦乞頒賚其狀尋已印出今具官員等第所定支給數目文班左右常侍諫議給事舍人諸部尚書太子賓客諸寺大卿御史中丞國子祭酒詹事左右丞諸部侍郎絹三十匹布二十匹粟米各二十五石起居補闕拾遺侍御史殿中監察御史左右庶子諸寺少卿國子監司業河南少尹左右諭徳諸部郎中員外郎太常博士絹二十匹布一十五匹粟麥各一十五石國子博士五經博士兩縣令著作郎太常宗正殿中丞諸局奉御大理寺太子中允洗馬左右贊善太子中舍司天五官正絹布各一十五匹粟麥各一十石左右諸衛大將軍左右諸衛將軍絹二十匹布一十五匹粟麥各一十五石左右率府副帥絹布各一十五匹粟麥一十石奉勅宜依其張昭逺所支絹布粟麥仍依所定官資領給宋制賻贈凡近臣及帯職事官薨非詔葬者如有喪訃及遷葬皆賜賻贈鴻臚寺與入内内侍省以舊例取㫖其嘗踐兩府或任近侍者多増其數絹自五百匹至五十匹錢自五十萬至五萬又賜羊酒有差其優者仍給米麥香燭自中書樞密而下至兩省五品三司三館職事内職軍校并執事禁近者亡歿及父母近親喪皆有贈賜宗室期功袒免乳母殤子及女出適者各有常數其特恩加賜者各以輕重為隆殺焉太祖建隆元年十月詔有死於矢石者人給絹三匹仍復其家三年長吏存撫之仁宗慶歴二年詔陣亡軍校無子孫者賜其家錢指擇使七萬副指揮使六萬軍使都頭副兵馬使副都頭五萬神宗熙寜七年參酌舊制著為新式諸臣喪兩人以上各該支賜孝贈只就數多者給官與職各該賻贈者從多給諸兩府使相宣徽使并前任宰臣問疾或澆奠已賜不願勅葬者并宗室不經澆奠支賜雖不係勅葬並支賻贈餘但經問疾或澆奠支賜或勅葬者更不支賻贈前兩府如澆奠只支賻贈仍加絹一百布一百羊酒米麫各一十諸支賜孝贈在京羊毎口支錢一貫以折第二等絹毎匹折錢一貫三百文餘支本色在外米支白秔米麫毎石支小麥五斗酒支細色餘依價錢諸文臣卿監以上武臣元係諸司使以上分司致仕身亡者其賻贈並依見任官三分中給二政和五禮新儀品官喪儀若遣使致賻使者至立於大門外之西東面從者以箱奉𤣥纁束帛立於使者之側贊者入告主人立哭贊者引使者入立于門内之西東靣從者以箱授使者主人哭止使者奉箱少進東靣日某封某官使某賻主人哭再拜使者又少進坐委之興復位掌事者進坐舉之興以東使者出主人拜送庶人喪儀與此畧同明太祖洪武二十六年定優給例凡陣亡失陷傷故渰沒者全支邊逺守禦出征并出海運糧病故者減半一品米六十石麻布六十匹二品米五十石麻布五十匹三品四品米四十石麻布四十匹五品六品米三十石麻布三十匹凡公侯不分病故陣亡止給麻布一百匹嘉靖六年定凡在京文武官員及夫人病故者止與應得祭葬其齋糧麻布一體裁革遣奠宋明宋開寳九年十月太祖崩明年四月十三日祖奠徹設次明徳門外行遣奠禮司馬光書儀祖奠厥明執事者具遣奠如殷奠轝夫納大轝於聽事前中庭執事者徹祖奠祝奉遷靈座置旁祝北面告曰今遷柩就輿敢告婦人避位召轝夫遷柩乃載載謂升柩于轝也以新絙左右束柩於轝乃以横木楔柩足兩旁使不動揺男子從柩哭降視載婦人猶哭於帷中載畢祝帥執事遷靈座於柩前南向乃設遣奠惟婦人不在餘如朝夕奠之儀執事者徹所奠脯置舁牀上執事者徹遣奠若柩自他所將歸葬鄉里則但設酒果或酺醢朝哭而行至葬日之朝乃行遣奠禮祝奉魂帛升靈舁焚香婦人蓋頭出帷降階立哭有守家不送塟者哭於柩前盡哀而歸卑幼則再拜辭楊復曰喪奠之禮有三變始死奠於尸東小斂奠亦如之既殯奠於奥設席東面朝夕奠朔月奠薦新奠亦如之啟殯入廟席設於柩西奠設如初如初者如室中之神席東面也朝祖奠亦如之降奠及祖奠遣奠皆如之但設於柩東為異明品官禮柩動旌次之纛次之喪主以下從哭於柩後婦人次之遂升柩就輿内外哭位如初在庭之儀乃設遣奠於柩車前如祖奠之儀祝奠酒訖少頃徹饌祝奉魂帛置靈車上别以箱盛主置帛後靈車動從者如常庶人禮召役夫遷柩就輿喪主從柩哭視載婦人哭於帷中載畢祝帥執事者遷靈座於柩前南向乃設遣奠奠畢執事者徹奠器行序宋元明宋朱子家禮柩行方相等前導如陳器之序明邱濬補儀節云先方相次明器牀次銘旌次靈車次大轝夾以功布及翣今世俗送葬有食案從俗用之亦可元始祖至元二十一年九月行御史臺咨據陜西漢東道按察司申所轄城郭内值喪之家往往盡皆使用祗候人等掌打茶褐傘葢儀仗等物送殯權勢之家官為差撥士庶之戸用錢僱倩詳此一端實違國家置備儀從之禮擬合禁斷呈奉中書札付送禮部議得若品官遇有婚喪止依品職合得儀從送迎外禁斷無官百姓人等不得僭越似為中禮都省准呈施行武宗至大三年禁止用樂出殯明品官禮靈車動從者如常靈車後方相車次誌石車次明器輿次下帳輿次米輿次酒脯輿次食輿次銘旌次纛次鐸次挽歌次柩車喪主及諸子俱絰杖衰服徒跣哭從餘各依服精麤為序庶人禮柩行明器銘旌等前導喪主以下男女哭步從尊長次之無服之親又次之賓客又次之挽歌五代宋元明後唐明宗長興二年詔五品六品常㕘官喪轝舁者二十人挽歌八人七品常㕘官挽歌六人晉髙祖天福十二年葬故魏王周太祖廣順元年葬故樞密使楊邠侍衛使史宏肇三使司王章例並用一品禮挽歌三十六人宋詔葬禮院例三品以上挽歌者四行十六人五品六品挽歌八人七品八品挽歌六人九品挽歌四人白練幘白練褠衣皆執鐸綍竝鞵襪元喪事例靈馬走唱即挽歌之遺明品官儀靈車動纛鐸之後次以挽歌欽定續通典卷七十八
