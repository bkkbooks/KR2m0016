廢置不常明無丞唐置二人掌判寺事宋無遼南面官太子家令寺有丞金亦有家丞掌同家令元亦置家丞二人又設府正司府丞廢置不常明無主簿唐置一人宋無遼亦有之金無元家令司有典簿二人照磨一人府正司同明無食官署唐置食官署令一人掌飲食酒醴凡四時供送設食皆顓焉供六品以下元日冬至食於家令厨者宋遼金皆無元儲膳司卿四人少卿二人丞二人主事二人照磨一人掌皇太子飲膳之事明無典倉署唐置令一人丞二人掌九榖醯醢庶羞器皿燈燭凡園圃樹藝皆受令焉宋遼皆無金置司倉副掌倉廪出納薪炭等事元明皆無司藏署唐置令一人丞二人掌庫藏財貨出納營繕宋遼皆無金置司藏副掌庫藏財貨出入之事元典用監卿四人太監二人少監二人經厯知事照磨各一人掌供須文成藏珍三庫內府供給縀匹寶貨等物明無太子率更令丞主簿唐置率更寺令一人掌宗族次序禮樂刑罰及漏刻之政太子釋奠講學齒胄則總其儀出入乘軺車為導居家令之次宋無遼南面官太子率更寺有太子率更令金元明皆不設丞唐置一人宋無遼亦有之金元明皆無主簿唐置一人宋無遼亦有之金元明皆無太子僕丞主簿廄牧署唐制僕寺僕一人掌車輿乘騎儀仗喪葬太子出則率廄牧令進路親馭宋無遼南面官太子僕寺有太子僕金有僕正副僕掌車馬廄牧弓箭鞍轡器物等事元置資武庫提㸃大使各一人掌軍器冀用庫提㸃大使各一人掌鞍轡明無丞唐置一人宋無遼金亦有之元明皆無主簿唐置一人宋無遼亦有之金元明皆無廄牧署唐置令一人丞二人掌車馬間廄牧畜凡羣牧𨽻東宫者皆受其職事宋遼金皆無元典牧署卿二人太監二人少監二人丞二人經厯知事各一人掌孳畜之事明無左右衛率府副率以下官屬唐制太子左右率府率各一人掌兵仗儀衛凡諸曹及三府外府皆𨽻焉元日冬至皇太子朝宫臣諸方使則率衛府之屬為衛每月三府三衛及五府超乘番上者配以職宋太子左右衛亦有率府率遼南面官亦有太子左右衛率府金左右衛率府掌周衛導從儀仗元武宗至大元年撥江南行省萬户府精鋭漢軍為東宫衛軍立衛率府設官十一員仁宗延祐四年始改為中翊府又改為御臨親軍指揮使又以御臨非古典改為羽林六年復𨽻東宫仍為左衛率府定置率使三人其屬有鎮撫所鎮撫行軍弩軍屯田各千戶所達嚕噶齊千户副千戶百户彈壓各員又有䝉古字儒學陰陽各教授其右衛率置率使二人𨽻屬亦減於左屬樞密院不𨽻儲政院明洪武初亦有左右率府使同知左右率府事皆以勳舊大臣兼領其職後罷副率唐置二人長史一人唐置各率府長史以下胄曺以下職掌皆同宋左右衛皆有副率其各率府皆無官屬元左右衛率府皆有副使明洪武初亦有左右率府副使皆以勳舊大臣兼領其職後罷録事參軍唐各置一人唐後歷代皆無倉曹參軍唐各置一人歷代皆無兵曹參軍唐各置一人歷代皆無胄曹參軍唐各置一人歷代皆無親府勳府翊府唐各置中郎將一人左右郎將各一人兵曹參軍事一人唐以後歷代皆無左右司禦府唐制太子左右司禦率府率各一人副率各二人其屬官皆與左右衛率府同宋亦有左右司禦率府率副率官存而無職司遼南面官亦有太子左右司禦率府金元明皆無左右清道率府唐制太子左右清道率府率各一人副率各二人掌晝夜巡警其官屬與左右衛率府同省騎曹宋亦有左右清道率府率副率太宗至道元年東宫置左清道率府率副率兼左春坊謁者主贊引真宗即位而省真宗天禧二年又以左清道率郭承慶兼左右春坊謁者仁宗即位復省遼南面官亦有太子左右清道率府金元明皆無左右監門率府唐制太子左右監門率府率各一人副率各二人掌儲門禁衛長史録事兵曹與左右衛率府同倉曹胄曹參軍事各一人兼領宋亦有左右監門率府率副率南渡後以為環衛官遼南面官亦有太子左右監門率府金亦有左右監門掌門衛禁鑰元明皆無左右內率府唐制太子左右內率府率各一人副率各二人掌千牛供奉之事長史録事兵曹與左右衛率府同倉曹胄曹參軍事各一人兼領宋亦有左右內率府率府率官存而無職司遼南面官亦有太子左右內率府金元明皆無太子旅賁中郎將唐髙宗永徽三年太子名忠改諸率府中郎將為旅賁郎郎將為翊軍郎太子廢復舊以後厯代皆無太孫官屬附唐至武后天授二年始置皇孫府官宋孝宗淳熙七年皇孫英國公始就傅詔置皇太子宫小學教授一人十二年詔建魏惠憲王府置小學教授二人以館職兼充掌訓皇孫既長趨朝謁則不以小學名而講習如故元世祖至元二十六年皇孫出鎮懷孟帝為選老成練達舊臣護之乃以屬王倚陛辭帝目之良久謂侍臣曰倚修潔人也左右皇孫得人矣及行營幕所在軍政肅然明成祖永樂十三年為皇太孫特選幼軍置府軍前衛設官屬指揮使五人指揮同知十人指揮僉事二十人衛鎮撫十人經歷五人欽定續通典卷三十四
