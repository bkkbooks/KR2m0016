body:
  text: 職官東宫官唐制東宫官置諸坊局皆因隋制詳見杜佑通典東宫官總叙宋東宫官或以他官兼或置或省其制不常有太子太師太傅太保少師少傅少保太子賔客太子詹事左右庶子左右諭德太子侍讀侍講侍讀侍講皆前代所無太子中舍人舍人資善堂翊善贊讀直講說書皇太子宫小學教授資善堂小學教授翊善贊讀直講皆舊制說書而下南渡後增置其左右春坊有主管左右春坊事一人以內臣兼同主管左右春坊事二人以武臣兼承受官一人以內侍充遼北面官皇太子特哩衮司有皇太子特哩衮又有皇太子祇應司南面官東宫官有太子太師太𫝊太保少師少傅少保太子賓客太子詹事少詹事丞主簿太子司直其左右春坊多因唐宋之制金海陵天德四年置宫師府三師三少詹事院詹事三寺十率府皆𨽻焉無左右春坊庶子有左右諭德贊善元世祖至元十元年立詹事院備左右輔翼皇太子之任置左右詹事各一人副詹事詹事丞院判各二人吏屬六十有二人别置宫臣賓客二人左右諭德贊善各一人校書郎二人中庶子中允各一人三十一年改為徽政院成宗大德九年復為詹事院尋罷十一年更置詹事院以後復廢置不一文宗天厯元年改為儲慶使司二年復為詹事院未幾改為儲政院院使六人同知二人僉院二人同僉二人院判二人至順帝至正六年立皇太子宫傅府九年立端本堂為皇太子學宫置諭德一人贊善二人文學二人正字二人司經二人十三年冊立皇太子增置賔客二人中庶子中允各一人未幾復立詹事院罷宫傅府置詹事三人同知詹事二人副詹事二人丞二人首領官四人中議長史各二人管勾照磨掾史之屬員數有差明太祖洪武初置大本堂充古今圗籍其中召四方名儒訓導皇太子親王諸儒専經面授分畨夜直已而太子居文華堂諸儒迭班侍從又選才俊之士入充伴讀時時賜宴賦詩商𣙜今古評論文學是時東宫官屬自太子三少賓客外則有左右詹事同知詹事院事副詹事詹事丞左右率府使同知左右率府事左右率府副使諭德贊善大夫皆以勳舊大臣兼領其職又有文學中舍正字侍正洗馬庶子及贊讀等官十五年更定左右春坊官各置庶子諭德中允贊善司直郎又各設大學士尋定司經局官設洗馬校書正字二十二年以官聫無統始置詹事院二十五年改院為府凡坊局皆各有印而事總於詹事府二十九年增設左右春坊清紀郎司諌通事舍人惠帝建文中增少卿寺丞各一人賓客二人又置資德院資德一人資善二人其屬贊讀贊書著作郎各二人掌典籍一人成祖復舊制英宗初命大學士提調講讀官然明時詹事府多由他官兼掌天順以前或尚書侍郎都御史憲宗成化以後率以禮部尚書侍郎由翰林出身者兼掌之其協理者無常員春坊大學士自景帝景泰間倪謙劉定之而後僅楊廷和一任之後不復設其司直司讀清紀郎亦不常置唯世宗嘉靖十八年以陸深為詹事崔詵為少詹事王教羅洪先華察等為諭德贊善洗馬皇甫涍唐順之等為司直司諌皆天下名儒自明初宋濓諸人後宫僚莫盛於此嗣是出閣講讀每㸃别員本府坊局僅為翰林官遷轉之階而已其南京詹事府止設主簿一人太子六傅三太三少唐制太子太師太傅太保各一人掌輔導太子少師少傅少保各一人掌曉三師德行以諭皇太子奉皇太子以觀三師之道德自太師以下唯其人不必備泰和初趙宗儒進太子太傅文宗召訪政理對曰堯舜之化慈儉而已願陛下守之帝納其言又盧鈞守太子太師帝元日大饗含元殿鈞年八十升降如儀音吐洪暢舉朝咨歎宋太子太師太傅太保太子少師少傅少保皆不常設仁宗升儲置三少各一人參政李昉兼掌賔客及升首相遂進少傅此宰相兼官僚之始也丁謂兼少師馮拯兼少傅曹利用兼少保時丁謂馮拯曹利用皆為太子少傅謂請師傅等十日一赴資善堂賔客以下隻日互陪侍講學上從之是時實為東宫官餘多以前宰執為致仕官若太子太師太傅太保以待宰相官未至僕射者及樞密使致仕亦隨本官髙下除授太子少師少傅少保以待前執政唯少師非經顧命不除若因遷轉則遞進一官至太師即遷司空真宗天禧末皇太子同聽政乃以首相兼少師自後神宗欽宗孝宗光宗在東宫皆不置寧宗開禧後建置不常多以時宰兼之遼南面官有太子太師太宗大同元年見太子太師李嵩太子太傅世宗天祿五年見太子太傅趙瑩太子太保大同元年見太子太保趙瑩太子少師聖宗太平十一年見太子少師蕭從順太子少傅興宗重熙中耶律哈里為太子少傅太子少保大同元年見太子少保馮玉金亦有太子太師太傅太保少師少傅少保掌保護東宫導以德義石琚於世宗時拜左丞兼太子少師嘗請命太子習知故事或譖之曰琚希恩東宫世宗察其無他以此言告之琚對曰臣本孤身䝉陛下拔擢備位執政兼師保之任臣愚以為太子天下本當使知民事遂言及之耳因請解少師元東宫三師三少不恆有明太子太師太傅太保掌以道德輔導太子而謹護翼之太子少師少傅少保掌奉太子以觀三公之道德而教諭焉無定員無専授洪武元年太祖有事親征慮太子監國别設宫僚或生嫌隙乃以朝臣兼宫職李善長兼太子太師徐達兼太子少傅常遇春兼太子少保三年禮部尚書陶凱請選人専任東宫官罷兼領庶於輔導有所責成帝諭以江充之事可為明鑑立法兼領非無謂也由是東宫師傅止為兼官加官及贈官唯永樂間成祖幸北京以姚廣孝専為太子少師留輔太子自是以後終明世皆為虛銜於太子輔導之職無與也太子賔客唐制太子賔客四人掌侍從規諌贊相禮儀宋仁宗至道元年建儲初置賔客二人以他官兼真宗天禧四年參政任中正樞副錢惟演參政王曽並兼太子賔客執政兼東宫官始此南渡後不置寧宗開禧三年景憲太子立始以執政兼賔客後復省理宗景定元年度宗升儲以朱熠皮龍榮沈炎並兼賔客遼南面官太子賔客院有太子賔客金無此官元武宗至大元年仁宗在藩邸開宫師府姚燧年已七十遣正字吕誠如漢四皓故事起燧為太子賔客明太子賔客與三師三少俱為東宫大臣無定員無専授洪武元年太祖有事親征太子監國以治書侍御史文元吉范顯祖兼太子賔客十三年九月置四輔官以王本杜祐龔斆為春官杜斆趙民望吳源為夏官皆兼太子賔客太子詹事丞主簿司直唐制詹事府詹事一人少詹事一人掌統三寺十率府之政少詹事為之二宋自仁宗升儲置詹事二人神宗欽宗升儲並置二人皆以他官兼登位後省孝宗乾道元年莊文太子立置詹事二人踰月詔太子詹事遇東宫講讀日並往陪侍七年光宗正儲位以敷文閣直學士王十朋敷文閣待制陳良翰為太子詹事不兼他官非常制也理宗景定元年度宗升儲以楊棟兼詹事遼南面官太子詹事院有太子詹事少詹事金詹事院有太子詹事少詹事掌總統東宫內外庶務世宗大定初顯宗為皇太子選東宫官屬張浩薦楊伯雄遂起為少詹事後進左諫議大夫翰林直學士會太子詹事闕宰相復舉伯雄上曰伯雄不可一日去朕左右而東宫亦須輔導遂以太子詹事兼諌議伯雄知無不言匡救甚多後宫僚有詭隨者人必稱楊詹事以愧之元世祖至元時立詹事院置左右詹事各一人副詹事各二人時完顔澤以大臣子選為裕宗王府僚屬及裕宗為皇太子署詹事長入參謀議出掌環衛小心慎密太子甚重之又王約為太子副詹事仁宗以詹事院諸事循軌大喜嘗字而不名諭羣臣曰事未經王彥博議者勿啓又謂中丞托迪曰在詹事而不求賜豫者唯彥博與汝二人耳以後廢置不常至文宗天厯中改為儲政院置院使六人同知二人僉院二人同僉二人院判二人順帝至正中復立詹事院增置同知詹事二人掌輔翼皇太子之任明詹事府詹事一人少詹事二人詹事掌統府坊局之政事以輔導太子少詹事佐之凡入侍太子與坊局翰林官畨直進講尚書春秋資治通鑑大學衍義貞觀政要諸書前期纂輯成章進御然後赴文華殿講讀講讀畢率其僚屬以朝廷所處分軍國重事及撫諭諸畨恩義陳說於太子凡朝賀必先奏朝廷乃具啓本以進其所屬府僚暨坊局官與翰林職互相兼試士修書皆與焉孝宗時張元禎以太常卿兼翰林學士仍侍經筵日講掌詹事府事上疏勸經筵宜講太極圖西銘東宫兼講孝經小學孝宗欣然嘉納亟索太極圖以觀曰天生斯人以開朕也又吳寬為詹事府詹事孝宗在東宫學少閒寬率僚屬上疏曰竊唯東宫講學自寒暑風雨朔望令節外一嵗之中不過數月一日之內不過數刻况其間又多閒歇人生八嵗出就外傅居宿於外誠欲離近習親正人也庶民且然況有天下者乎借曰習讀於內終不若出就外傅親近儒臣講明正道所得為多乎丞唐置二人掌判府事知文武官簿假使凡敕令尚書省二坊符牒下東宫諸司者皆發焉宋無遼南面官太子詹事院有詹事丞金亦無之元至元時詹事院有詹事丞二人明詹事府亦有府丞二人主簿唐制一人宋無遼南面官太子詹事院有詹事主簿金亦無之元儲政院有照磨二人管勾二人明詹事府主簿㕔主簿一人南京詹事府主簿一人司直唐置二人掌糾劾官僚及率府之兵皇太子朝則分知東西班監國則詹事庶子為三司使司直一人與司議郎舍人分日受理啓狀太子出則分察鹵簿之內宋無遼南面官太子司直司有太子司直金元皆無明春坊有左司直郎二人左清紀郎一人右春坊亦如之俱不常設掌彈劾宫僚糾舉職事文華殿講讀畢諸臣班退有獨留奏事及私謁者則共糾之太子庶子中允人司議郎事舍諭德中舍人崇舍人學通贊善文館士洗馬藥藏文學內直校書典設正字等典膳宫門郎唐制左春坊左庶子二人掌侍從贊相駮正啓奏總司經典膳藥藏內直典設宫門六局皇太子出則版奏外辦中嚴入則解嚴右春坊右庶子二人掌侍從獻納啓奏德宗時趙宗儒罷相為太子右庶子屏居慎靜奉朝請而已遷吏部侍郎帝召見勞曰知卿杜門六年故有此拜宋左右庶子不常設蓋以儲闈之建隨宜制官以備僚寀多以他官兼領仁宗出閣帝選僚佐謂宰臣曰翊善記室府屬也王皆受拜今王尚少宜以張士遜為友令王答拜於是以户部郎中直昭文館為夀春王友遷諫議大夫兼太子右庶子改左庶子士遜言詣資善堂升階列拜而皇太子總跪受宜詔皇太子坐受之帝不許又邵元為頴王府翊善及東宫建為右庶子又髙宗以普安郡王為皇子進封建王詔建王府置直講贊讀各一人史浩兼直講一日講周禮言膳夫掌膳羞之事嵗終則㑹唯王及后世子之膳不㑹至酒正講掌飲酒之事嵗終則㑹唯王及后之酒不㑹而世子不與焉以是知世子膳羞可以不㑹世子飲酒不可以無節也王作而謝曰敢不佩斯訓及建王為皇太子浩除起居郎兼太子右庶子又梁周翰字元褒真宗在儲宫知其名徴為左庶子因令取其所為文章周翰悉纂以獻遼南面官左春坊有太子左庶子右春坊有太子右庶子金無此官元世祖至元時置詹事院有中庶子一人至正時宫傅府同眀左右春坊有大學士及庶子各一人大學士掌太子上奏請下啓箋及講讀之事皆審慎而監省之庶子等各奉其職以從成祖永樂時周述進左春坊右諭德兼侍讀從皇太子居守南都上諭之曰汝素厚重尤資匡弼太子雖聰明純謹然智或未逮行或過中必須盡言庶稱朕意仁廟居守中外無失政德澤洽於人心述力為多宣德中升左庶子世宗嘉靖間童承叙為講官上御文華殿承叙進講周書立政篇極陳王業艱難周公夾