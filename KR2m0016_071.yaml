body:
  text: 禮賔三恪二王後五代宋金元明臣等謹案三恪二王後之說經無正文鄭康成據樂記武王克商封黃帝堯舜夏殷之後謂杞宋為二王後祝薊陳為三恪杜預據左傳以備三恪之文謂周封夏殷二王後又封舜後并之為三恪兩說不同崔靈恩三禮義宗主鄭氏說而杜佑非之謂尊賢不過二代黃帝堯舜自以功德崇深特封其後非古今通法故纍朝皆以三代為三恪其說近是然推古制禮之意蓋以虞夏由於受禪湯武起自藩臣於勝國子孫禮宜優異且嵗首迭用三正樂懸具陳六代文質損益不可偏廢故必兼存三統以備一王之制自封建改為郡縣革命之事已異古初自不必更沿三恪之舊而魏晉以降猶相承不改者則以既假禪讓之故事不得不修備恪之空文然名雖託於賔王實則同於幽禁揆諸古昔隆禮先代之指相去絶逺若宋承周禪惟立周後不及前代且舍郭氏而立柴宗議者多訾其失元之瀛國公明之崇禮侯雖加封爵而未聞世及恩亦浸薄洪惟我太祖太宗肇基東土功德綿長及明莊烈之末流冦作難神器不守我世祖章皇帝命將専征殱除巨憝撫一中外𫝊祚萬世昔人謂三代以下惟漢與明崛起編户較之晉隋唐宋為得其正然漢髙帝明太祖雖未臣事於秦與元猶在食毛踐土之列揆之大義不無間然我朝於明本為敵國至明季國祚已移中原無主然後王師翦除流賊且為明之臣民雪不共之恥初非取天下於明也是則推得統之正不惟逺逾唐宋抑且度越漢明豈於明之後裔猶當有賔禮待之之義然猶追念前代恩禮頻加逮我世宗憲皇帝御極之初仰承聖祖仁皇帝成命訪求明裔爵之通侯世世罔替我皇上肇錫嘉名寵以延恩侯之號俾與五等諸藩並荷榮封而永苗裔蓋禮以義起逈非三恪作賔之文所可同年而語矣爰因叙賔禮而并析其義云梁太祖開平二年以唐宗室子鴻臚卿李嵸封萊國公為二王後時中書門下奏萊國公李嵸合於西都選地建立三廟以備四仲祠祭每祭仍令度支供給祭料從之是時禮儀使又奏唐朝以魏元氏子孫封韓國公為三恪以周宇文氏子孫封介國公隋楊氏子孫封酅國公為二王後今國家受禪封唐李氏宗室子李嵸為萊國公今請以介國公為三恪酅國公萊國公為二王後從之晉髙祖天福二年敕周以杞宋封夏殷之後為二王後兼封舜之後為三恪唐以周隋之後封公為二王後又封魏之後為三恪宜於唐朝宗屬中取一人封公世襲兼隋之酅國公為二王後以後周介國公備三恪主祀及赴大朝㑹委所司具典禮申奏其唐朝宗屬中舊在朝及諸道為官者各據資厯考限滿日從品秩序選已有出身仍令參選四年敕以郇國三千戶封唐許王李從益為郇國公奉唐之祀服色旌旗一依舊制以西京至德宫為廟牲幣器用祭服悉從官給按梁晉皆以唐及隋為二王後通周後為三恪漢髙祖天福十二年夏五月甲午以邭國公李從益知南朝軍國事宋太祖建隆元年正月詔曰封二王之後備三恪之賔所以示子𫝊孫興滅繼絶夏商之居把宋周隋之啓介酅古先哲王實用兹道矧豫涼德厯試前朝雖周德下衰勉從於禪讓而虞賔在位豈忘於蒸嘗其封周帝為鄭王以奉周嗣正朔服色一如舊制又詔曰朕唯眇躬逮事周室謳歌獄訟雖歸新造之邦廟貌園陵豈忘舊君之禮其周朝嵩慶二陵及六廟宜令有司以時差官朝拜祭饗永為定式仍命周宗正卿郭玘行禮仁宗天聖六年録故虢州防禦使柴貴子肅為三班奉職七年録故太子少傅柴守禮孫詠為三班奉職其後又録柴氏之後曰熙曰愈曰若拙曰上善並為三班奉職曰餘慶曰誠為州長史助教曰貽廓等十一人復其身仍各賜錢一萬又録世宗曽孫揆柔及貴曽孫日宣守禮曽孫若訥皆為三班奉職嘉祐四年著作郎何鬲言舜受堯禹受舜之天下而封丹朱商均以為國賔周漢以降以及於唐莫不崇奉先代延及苗裔本朝受周天下而近代之盛莫如唐自梁以下皆不足以崇襲臣願考求唐周之裔以備二王之後授以爵命封縣立廟世世承襲永為國賔事下太常議曰古者立二王後不唯繼絶兼取其明德可法五代草創載祀不永文章制度一無可考上取唐室世數已逺於經不合惟周則我受禪之所自義不可廢宜訪求子孫如孔子後衍聖公授一京官爵以公號使専奉廟嵗時存問賜之粟帛牲器祭服每遇時祀並從官給其廟宇亦加嚴飭如此則上不失繼絶之義度之於今亦簡而易行從之四月詔曰先王推紹天之序尚尊賢之義褒其後嗣賔以殊禮豈非聖人稽古報功之大典哉國家受命之元繼周而王雖民靈欣戴厯數允集而虞賔將遜德美丕顯頃者推命本始褒及支庶每遇南郊許奏白身一名充班行恩則厚矣而義未稱將上采姚姒之舊略循周漢之典詳其世嫡優以公爵異其仕進之路申以田土之錫俾廟寢有奉饗祀不輟庶幾乎春秋通三統厚先代之制矣宜令有司取柴氏譜系於諸房中推最長一人令嵗時親奉周室祀事如白身即與京主簿如為班行者即比類換文資仍封崇義公與河南府鄭州合入差遣給公田十頃専管勾陵廟應緣祭饗禮料所須皆從官給如至知州資序即别與差遣却取以次近親令襲爵授官永為定式八月太常禮院定到內殿崇班相州兵馬都監柴詠於柴氏諸族最長詔換殿中丞封崇義公簽書奉寧節度判官事以奉周祀又以六廟在西京而嵗時祭饗無器服之數令有司以三品服一四品服二及所當用祭器給之神宗熙寧四年西京留守司御史臺司馬光言崇義公柴詠祭祀不以儀式周本郭姓世宗后姪為郭氏後今存周後則宜封郭氏子孫以奉周祀帝閲奏問王安石安石曰宋受天下於世宗柴氏也帝曰為人後者為之子安石曰為人後於異姓非禮也雖受天下於郭氏豈可以天下之故而易其姓氏所出帝然之五年正月柴詠致仕詠長子早亡嫡孫夷簡當襲太常禮院言夷簡有過合以次子西頭供奉官若訥承襲詔以若訥為衛尉寺丞襲封崇義公簽書河南府判官㕔公事徽宗政和八年詔曰昔我藝祖受禪於周嘉祐中擇柴氏旁支一名封崇義公議者謂不當封周然禪國者周而三恪之封不及禮蓋未盡除崇義公依舊外擇柴氏最長見在者以其祖父為周恭帝後以其後世世為宣義郎監周陵廟與知縣請給以示繼絶之仁為國二恪永為定制按世宗與恭帝後為二恪是郭氏子孫終未見録也司馬光之言惜乎未行髙宗紹興五年詔周世宗元孫柴叔夏為右承奉郎襲封崇義公奉周後二十六年叔夏升知州資序别與差遣以子國器襲封令居衢州朝廷有大祀則入侍祠如故事其柴大有柴安宅亦各補官理宗淳祐九年春正月詔周世宗八世孫柴彥頴補承務郎襲封崇義公按時又求隋唐及朱氏李氏石氏劉氏郭氏之後及吳越荆南湖南蜀漢諸國之子孫皆命以官使守其祀金太宗天㑹三年八月遼主延禧入見降封海濵王六年八月以宋二庶人入見封其父昏德公子重昏侯熙宗皇統元年二月改封海濵王耶律延禧為豫王昏德公趙佶為天水郡王及齊劉豫為三恪重昏侯趙桓為天水郡公十二月天水郡公趙桓乞本品俸詔賙濟之三年八月詔給天水郡王孫及天水郡公壻俸祿元世祖至元十三年夏五月布延以宋主㬎至上都制授㬎開府儀同三司檢校大司徒封瀛國公明太祖洪武元年詔封元皇孫邁達哩巴拉為崇禮侯七年九月上謂廷臣曰草木無心遇春而茂遇秋而零落氣之所感猶知榮悴况於人乎崇禮侯邁達哩巴拉南來已五載今已長成豈無父母鄉土之思宜遣之還於是厚禮而歸之天子朝位五代宋遼金元明後唐明宗天成元年五月詔每月朔望日賜百官廊下餐按唐室升平日常參官每日退朝賜食謂之廊餐自乾符亂離之後祇遇月旦入閣日賜食上初即位命百官五日一起居御史中丞李琪以為非故事請罷之唯每月朔望日入閣賜食至是宣㫖朔望入閣外依舊五日一起居遂為定式又按葉夢得曰唐以宣政殿為前殿謂之正衙即古之內朝也以紫宸殿為便殿謂之上閣即古之燕朝也而外别有含元殿古者天子三朝外朝內朝燕朝外朝在王宫庫門外有非常之事以詢萬民於宫中內朝在路門外燕朝在路門內蓋內朝以見羣臣或謂之路朝燕朝以聼政猶今之奏事或謂之燕寢鄭氏小宗伯注以漢司徒府有天子以下大㑹殿為周之外朝而蕭何造未央宫言前殿則宜有後殿大㑹殿設於司徒府則為外朝而宫中冇前後則為內朝燕朝蓋去周猶未逺也唐含元殿宜如漢之大㑹殿宣政紫宸乃前後殿其沿習有自來矣方其盛時宣政蓋常朝日見羣臣遇朔望陵寢薦食然後御紫宸旋𫝊宣喚仗入閣宰相押之由閣門進百官隨之入謂之喚仗入閣紫宸殿言閣猶古之言寢此御朝之常制也中世亂離宣政不復御正衙立仗之禮遂廢惟以隻日常朝御紫宸而不設仗敬宗始復修之因以朔望陳仗紫宸以為盛禮亦謂之入閣誤矣又曰唐正衙日見羣臣百官皆在謂之常參喚仗入閣百官亦隨以入則唐制天子未嘗不日見百官也其後不御正衙紫宸所見惟大臣及內諸司百官俟朝於正衙者𫝊聞不坐即退則百官無復見天子矣敬宗再舉入閣禮之後百官復存朔望兩朝至五代又廢故後唐明宗始詔羣臣每五日一隨宰相入見謂之起居時李琪為中丞以為非禮請復朔望入閣之禮明宗曰五日起居吾思見羣臣不可罷朔望入閣可復遂以五日羣臣一入見中興便殿為起居朔望天子一出御文明前殿為入閣訖宋因五代之制文武官每日赴文明殿正衙常參宰相一人押班五日起居即崇德長春二殿中書門下為班首其長春殿常朝則內侍省都知押班率內供奉官以下并寄班等先起居次閣門使次三班使臣節度觀察防禦團練刺史等子弟充供奉官侍禁殿直有㫖令預內朝起居者次內殿當直諸班殿前指揮使左右班都虞侯以下內殿直散直散指揮散都頭金槍班等次長入祇候東西班殿侍次御前忠佐次殿前都指揮使率軍校至副指揮使次駙馬都尉任刺史以上者綴本班次諸王府僚次殿前司諸軍使都頭次皇親將軍以下至直殿次行門指揮使率行門起居以上並內侍贊謁如𫝊宣前殿不坐即宰相與樞密使文明殿學士三司使翰林樞密直學士中書舍人三司副使知起居注皇城內監庫藏朝官諸司使副內殿崇班供奉官侍禁殿直翰林醫官待詔等同班入中書舍人乾德後始令赴內朝三司判官太平興國前赴內殿其後罷之止隨百官五日起居中書舍人知起居注遇五日起居之時亦各赴外朝次親王次侍衛親軍馬步軍都指揮使率軍校至副指揮使次使相次節度使次統軍次兩使留後觀察使次防禦團練使刺史次侍衛馬軍步軍使都頭起居畢見謝班入如御崇德殿即樞密使以下先就班俟升坐諸司使副以下至殿直分東西對立餘皆北向長春殿皆北向宰相參知政事最後入以上並閣門贊謁日止再拜朔望及三日假即樞密使以下皆舞蹈國初近侍執事之臣皆赴晚朝後罷之凡早朝宰相樞密宣徽使起居畢同升殿問聖體宰相奏事樞密宣徽使退候宰相對畢樞密使復入奏事次三司開封府審刑院遇百官起居即樞密宣徽使侍立俟左右巡使出即退其崇德殿三司使文明樞密直學士內客省使仍侍立舊三司使奏事副使判官同對其後止副使司之大中祥符九年詔自今有大事許判官同上之及羣臣以次升殿大兩省以上領務京師者有公事許即請對自餘受使出入要切者欲面議奏事則先聼進止其見謝辭官以次入於庭出使間散及未升朝官或止拜於殿門外自祕書監上將軍觀察使內客省使以上得拜殿前階上及升殿止拜御座前餘皆庭中也凡見者先之謝次之辭又次之其班次先宰相次親王次樞密副使參知政事次內職內臣次使三司學士兩省御史臺文武班節使以下次將軍校次雜班惟宰相親王使相赴崇德殿即宣徽使通喚餘皆側立候通再拜舞蹈致詞辭即不舞蹈見即將相升殿問聖體其賜分物酒食及牧進奉物皆舞蹈稱謝凡收進奉物皆入謝幕職州縣官謝辭即判銓官引對兼於殿門外宣辭戒勵凡國有大慶瑞出師勝捷樞密使率內職軍校入賀致詞閣門使宣答訖當侍立者升殿次百官入宰相致詞宣徽使宣答賜酒即預坐官後入作樂送酒如曲燕之儀凡視朝退進食訖易服御崇政殿或承明殿先羣臣告謝自諌舍知雜御史以上及帶三司官王府僚屬厯官醫官刺史以上上將軍并發運使轉運使并許焉自非宣制並捧官告敕叙謝其貴近者或賜坐賜茶餘或改章服即謝訖易服又告詡再拜次軍頭引見司奏事於殿陛下次三班審官院流內銓刑部及諸司引見官吏後詔審官院引對京朝官奏課不得過三人差遣不得過五人三使部選人差遣各不得過十人如假日起居辭見畢即移御座臨軒視事既退復有羣司奏或閲器物之式謂之後殿再坐太祖建隆二年八月朔上御崇元殿行入閣儀置待制候對官賜廊下食按入閣唐制起於天寶明皇以無為守成詔晏朝喚仗百官從容至閣門入蓋唐前含元殿非正至大朝㑹不御次宣政殿謂之正衙每坐朝必立仗於正衙或御紫宸殿即喚正衙仗自宣政殿兩門入是謂東西上閣門故謂之入閣其後遂為常朝之儀五代以來既廢正衙立仗而入閣亦希闊不講至是復行之然御前殿非唐舊矣崇元殿即大慶殿前殿也待制候對者亦唐制也每正衙待制官兩員正衙退後又令六品以下於延英候對皆所以備顧問其後每入閣即有待制次對官後唐天成中廢至是復行之廊下食起唐貞觀其後常參官每日朝退賜食謂之廊餐唐末浸廢但於入閣起居日賜食今循其制神宗熙寧三年知制誥宋敏求等言文德殿入閣儀制考之國朝㑹要與今儀制所載頗或異同按今文德殿唐宣政殿也紫宸殿唐紫宸殿也然祖宗朝皆嘗御文德殿入閣唐制常設仗衛於宣政殿或遇上坐紫宸即喚仗入閣如此則當御紫宸殿入閣方協舊制請下兩制及太常禮院詳定詔學士院議翰林學士承㫖王圭等言按入閣者乃唐隻日紫宸殿受常朝之儀也唐宣政殿即今文德殿唐紫宸殿今紫宸殿也唐制天子坐朝必立仗於正衙若止御紫宸即喚正衙仗自宣政殿東西閣門入故為入閣五代以來遂廢正衙立仗之制今閣門所載入閣儀者止是唐常朝之儀非為盛禮不可遵行從之自是入閣之禮遂罷之敏求又言本朝以來惟入閣乃御文德殿視朝今既不用入閣儀即文德殿遂闕視朝之禮請下兩制及太常禮院約唐制御宣政殿裁定朔望御殿儀以備正衙視朝之制詔學士院詳定儀注學士韓維等以入閣圖增損裁定上議曰朔日不值假前五日閣門關諸司排辦前一日有司供帳於文德殿其日左右金吾將軍常押本衛仗判殿中省官押細仗先入殿庭東西對列文武官等分東西序立諸軍將校分入北向立朝堂引贊官引彈奏御史二員入殿門踏道當下殿北向立次催文武班分入並東西相向對立諸軍將校即於殿庭北向立班其班次並御史臺祇應皇帝服靴袍垂拱殿坐鳴鞭內侍閣門管軍依朔望常例起居次引樞密宣徽使三司使副樞密直學士內客省使以下至醫官待詔及修起居注官二員並大起居皇帝乘輦至文德殿後閣門奏班齊皇帝自後閣出殿上索扇升榻鳴鞭扇開簾捲儀鑾使焚香喝文武官就位四拜起居雞人唱時舍人於彈奏御史班前西向喝大起居御史由文武班後至對立位次引左右金吾將軍合班於宣制石南大起居班首出班躬奏軍國內外平安歸位再拜各歸東西押仗位通喝舍人於宣制石南北向對立舍人退於西階次揖宰臣親王以下躬奏文武百僚宰臣某姓名以下起居分引宰臣以下橫行諸軍將校仍舊立閣門使喝大起居舍人引宰臣至儀石北俯伏跪致詞祝月訖其詞曰文武百僚宰臣全銜臣某姓名等言孟春之吉伏惟皇帝陛下膺受時祉與天無窮臣等無任歡呼舞蹈之至歸位五拜閣門使揖中書由東階升殿樞密使帶平章事以上由西階升殿侍立並依圖給事中一員以知門下封駁事官充歸左省位立轉對立於給事中之南如罷轉對官每遇御史臺前期牒請文官二員並依轉對官例先於閣門投進奏狀吏部侍郎及刑法官立於轉對官之南兵部侍郎於右省班南與吏部侍郎東西相向立定搢笏各出班籍置笏上吏部兵部侍郎以知審官東西院官充刑法官以知審刑大理寺官充親王使相以下分班出引轉對官於宣制石南宣徽使殿上承㫖宣答如儀次吏部兵部侍郎及刑法官對揖出見謝辭班自從别儀次彈奏御史無彈奏對揖出如有彈奏並如儀引給事中至宣制石南揖躬奏殿中無事喝祗候揖西出次引修起居注官次立排立供奉官以下各合班於宣制石南躬喝祗候揖分班出喝文武官等門外祗候出索扇垂簾皇帝降座鳴鞭舍人當殿承㫖放仗四色官􅣠鞾急趨至宣制石南稱奉敕放仗金吾將軍并判殿中省官對拜訖隨仗出親王使相節度使至刺史學士臺省官文武百僚諸將軍校等並序班朝堂謝賜茶酒皇帝御垂拱殿座中書樞密及請對官奏事不引見謝辭班後殿座臨時取㫖其日遇有德音制書御札仍候退御垂拱殿座制箱出外應正衙見謝辭文武臣僚並依御史臺儀制喚班依序分入於文武班後以北為首分東西相向重行異位依見謝辭班序位餘押班臣僚於班稍前押班候刑法官對揖出分引近前揖躬舍人當殿宣班引轉對班見謝辭並如紫宸殿儀樞密使不帶平章事參知政事至同簽書樞密院事宣徽使並立於宣制石稍北宰臣親王樞密帶平章事使相繫押班者立於儀石南餘官並立於宣制石南并合贊喝閣門使引並如儀贊喝訖係中書樞密並揖升殿謝辭揖西出其合問聖體者並如儀餘官分班出彈奏御史候見謝辭班絶對揖出其朝見如謝都城門外御筵及詔赴闕謝茶藥撫問之類不可合班者各依别班中謝對賜酒食等並門賜其係正衙見門謝辭亦門外唱放應正衙見謝辭臣僚前一日於閣門投詣正衙榜子閣門下奏目又投正衙狀於御史臺四方館應朔日或得㫖罷文德殿視朝止御紫宸殿起居其已上奏目正衙見謝辭班並放免依官品隨赴紫宸殿引或值改依常朝文德殿自有百官班日並如舊儀應外國蕃客見辭候喚班先引赴殿庭東邊依本國職次重行異位立候見謝辭班絶西向躬舍人當殿通班轉於宣制石南北向立贊喝如儀西出其酒食分物並門賜如有進奉候彈奏御史出入進奉入惟御馬及檐牀自殿西偏門入東偏門出其進奉出入文武官起居舍人通某國進奉宣徽使喝進奉出節次如紫宸殿儀式候進奉出給事中奏殿中無事出其後殿再座合引出者從别儀其日賜茶酒宰臣樞密於閣子親王於本㕔使相宣徽使觀文殿大學士至寶文閣直學士兩省官待制三司副使文武百官皇親使相以下至率府副率及四廂都指揮使以下至副都頭並於朝堂如朝堂位次不足即於朝堂門外序次管軍節度使至四廂都指揮使節度使兩使留後至刺史並於客省㕔詔依所定徽宗政和三年九月引進使李端慤言近朔望御文德殿視朝初寒盛暑數煩清蹕而紫宸之朝嵗中罕御請朔日御文德既望坐紫宸庶幾正衙內殿朝儀並舉從之十一月侍御史知雜事滿中行言文德正衙之制尚存常朝之虛名襲橫行之謬例有司失於申請未能釐正兩省臺官文武百官赴文德殿東西相向對立宰臣一員押班聞𫝊不坐則再拜而退謂之常朝遇休假并三日以上應內殿起居官畢集謂之橫行自宰臣親王以下應見謝辭者皆先赴文德殿謂之過正衙然在京釐務之官例以别敕免參宰臣押班近年已罷而武班諸衛本朝又不常置故今之赴常朝者獨御史臺官與審官待次階官而已今垂拱內殿宰臣以下既已日參而文德常朝仍復不廢舛謬倒置莫此為甚至於橫行參假與夫見謝辭官先過正衙雖沿唐之故事然必俟天子御殿之日行之可也髙宗紹興十二年臣僚又奏乞明詔有司講求祖宗故實常朝視朝正衙便殿朝㑹之儀舉而行之以隆帝業用稱萬邦百辟尊君之心天下幸甚詔令禮部太常寺閣門同共討論尋討論在京月朔日文德殿視朝紫宸殿日參望參垂拱殿日參四參假日崇政殿坐聖節垂拱殿上壽今乞先次宰臣率百僚拜表奏請皇帝御正殿視朝若降指揮許允其合行事務續令逐處條具申請詔從之十一月三日權禮部侍郎王賞等言契勘朝㑹之制正旦冬至及慶賀受朝係御大慶殿其文德紫宸垂拱殿禮制不同月朔視朝則御文德殿謂之前殿正衙仍設黃麾半仗其餘紫宸垂拱皆係側殿不設儀仗今來已降指揮依臣僚所請乞降朝會之儀緣元正在近大慶殿之禮事務至多欲乞先舉行文德殿視朝之制其朝㑹合服朝服并設樂上壽間飲三周設祥瑞表案等并乞候來年冬至前别行取㫖詔依從之遼穆宗即位詔朝㑹依嗣聖皇帝故事用漢儀常朝起居儀昧爽臣僚朝服入朝各依幕次內侍奏班齊先引京官班於三門外當直舍人放起居再拜各祇候依次兩府以下文武官於丹墀內面殿立侍班諸司并供奉官於東西道外相向立定當直閣使副贊放起居再拜各祇候退還幕次公服帝升殿坐兩府并京官丹墀內聲喏各祇候教坊司同北班起居畢奏事燕京就嘉寧殿西京就同文殿朝服以幞頭袍笏公服以紫衫帽正座儀皇帝升殿座警聲絶契丹漢人殿前班畢各依位侍立次教坊班畢捲退京官班入拜畢揖於右橫街西依位班立次武班入拜畢依位立文班入拜畢依位立北班入起居畢於左橫街東序班立次兩府班入鞠躬通宰臣某官以下起居拜畢引上殿奏事已上六班起居並七拜內有不帶節度使班首止通名亦七拜捲班與常朝同直院有㫖入文班留守司三司統軍司制置使謂之京官都部署司宫使副都丞以下令史北面主事以下隨駕諸司為武官館閣大理寺堂後以下御史臺隨駕閒員令史司天臺翰林醫官院為文官金熙宗天眷二年詔詳定常朝及朔望儀准前代制以朔日六日十一日十五日二十一日二十六日為六參日後又定制以朔望日為朝參餘日為常朝凡朔望朝參日百官卯時至幕次皇帝辰刻視朝供御弩手繖子直於殿門外分兩面排立司辰入殿報時畢皇帝御殿坐鳴鞭閣門報班齊執擎儀物內侍分降殿階兩旁面南立宿衛官自都㸃檢至左右親衛祇應官自宣徽閣門祇候先兩拜班首少離位奏聖躬萬福兩拜弩手􅓫子先於殿門外東西向排立俟奏聖躬萬福時即就位北面山呼聲喏起居畢即相向對立擎御傘直立左班內侍上都㸃檢以次升殿副㸃檢在少南東西相向立左右衛在殿下東西相向立閣門乃引親王班贊班首名以下再拜訖班首少離位奏聖躬萬福歸位再拜畢先退次引文武百僚班首以下應合朝參官并府運六品以上官皆左入至丹墀之東西向鞠躬畢閣門通唱復引至丹墀閣門贊班首名以下起居舞蹈五拜又再拜畢領省宰執升殿奏事殿中侍御史對立於左右衛將軍之北少前修起居東西對立於殿欄子內副階下餘退右出初帝就坐置寶匣於殿階之上東南角後定制師傅起居畢御案始東入置定捧案內侍東西分下侍殿隅直日主寶捧寶當殿叩欄奏封前符寶郎及當監印郎中各一員監當主分令史用印訖主寶吏封受主寶俟奏事畢進封訖內侍徹案若常朝則親王班退引七品以下職事官分左右班入丹墀再拜班首稍前起居畢復位再拜宰執升殿餘官分班退世宗大定二年命臺臣定朝參禮五品以上職官趨朝朝服入局治事則展皂自來朝參除殿前班外若遇朔望自七品以上職事官皆赴其餘朝日五品以上職事官得赴六品以下止於本局司治事如左右司員外郎侍御記注院等官職雖不係五品亦赴朝參若拜詔則但有職事及七品以上散官皆赴朝參吏員令譯使通事撿法各於本局待官員朝退赴局簽押文字不得於宫內署押七品以下流外職遇朝日亦不合入宫如左右司都事有須合奏事乃聽入宫七品以上職事官如遇使客朝辭見日依朔望日皆赴若元日聖節拜詔車駕出獵迎送詣祖廟燒飯但有職事并七品以上散官皆赴凡親王宗室已命官者年十六以上皆隨班赴起居五年右諌議大夫伊喇子敬言明安穆昆不得與州鎮官隨班入見非軍民一體之意上是其言責宣徽院令隨班入見凡班首遇朝參有故不赴以次押班凡五品以上及侍御史尚書諸司郎中太常丞翰林修撰起居注殿中侍御史補闕拾遺赴召或假一月以上若除官出使之類皆通班入見辭謝除官於殿門外見謝班皆舞蹈七拜辭班四拜門見謝辭並再拜元世祖中統元年監察御史魏初上疏曰臣聞君猶天也臣猶地也尊卑之禮不可不肅方今內有太常有史官有起居注以議典禮記言動外有髙麗安南使者入貢以觀中國之儀昨聞錫燕大臣威儀弗謹非所以尊朝廷正上下疏入帝欣納之至元初尚未遑興建宫闕凡遇稱賀則臣庶皆集帳前無尊卑貴賤之辨執法官厭其喧雜揮杖擊逐之去而復來者數次翰林承㫖王磐時兼太常卿慮將貽笑外國奏請立朝儀遂如其言至元六年太保劉秉忠大司農博爾歡奉詔命趙秉溫史杠訪前代知禮儀者肄習朝儀既而秉忠奏曰一人習之雖知之莫能行也得㫖許用十人遂徴儒生周鐸劉允中尚文嶽忱關思義侯祐賢蕭琬徐汝嘉從亡金故老烏庫哩居貞完顔復昭完顔從愈葛從亮于伯儀及國子祭酒許衡太常卿徐世隆稽諸古典參以時宜沿情定制而肄習之百日而畢秉忠及翰林太常奏曰今朝儀既定請備執禮員有㫖命丞相安圖大司農博爾歡擇䝉古宿衛士可習容止者二百餘人肄之期月至七年二月奏以丙子觀禮前期一日布綿蕞於金帳殿前帝及皇后臨觀於露階禮文悉無遺失是月立侍儀司先是劉秉忠等奏請建官典朝儀帝命與尚書省論定以聞至是以呼圖克濟蘇額森鼐為左右侍儀奉御趙秉溫為禮部侍郎兼侍儀司事周鐸劉允中為左右侍儀使尚文嶽忱為左右直侍儀事關思義侯祐賢為左右侍儀副使蕭琬徐汝嘉為僉左右侍儀事烏庫哩居貞為承奉班都知完顔復昭為引進副使葛從亮為侍儀署令于伯儀為尚衣局大使八年夏四月侍儀司奏請制內外仗如厯代故事從之秋七月內外仗成遇八月帝生日號曰聖夀聖節用朝儀自此始九年定受宣敕官禮儀二十一年右丞相率百官奉玉册玉寶上尊號曰憲天體道仁文義武大光孝皇帝諸王百官朝賀如朔旦儀順帝元統二年十月正內外官朝㑹儀班次一依品從蘇天爵奏曰朝覲㑹同國家大體班制儀式不可不肅夫九品分官所以著尊卑之序四方述職所以同逺近之風蓋位序尊嚴則觀望隆重朝廷典憲莫大於斯邇年以來朝儀雖設版位品秩率越班行均為衣紫從五與正五雜居共曰服緋七品與六品齊列下至八品九品莫不皆然夫既踰越班制遂致行立不端因忘肅敬之心殊失朝儀之禮今後朝賀行禮聼讀詔赦先儘省部院臺正從二品衙門次諸司局院各驗職事散官叙列正從班次濟濟相讓與與而行如有踰越品秩差亂位叙者同失儀論以懲不恪庶幾貴賤有章儀式不紊上尊朝廷之典禮下聳中外之觀瞻又馬祖常曰百官朝見奏事古有朝儀今國家有天下百年典章文物悉宜燦然光於前代况欽遇列聖文明之主如科舉取士吏員降等之類屢復古制唯朝儀之典不講而行使後世無以鑒觀則於國家太平禮樂之盛實為闕遺且夫羣臣奏對之際御史執簡史官執筆縉紳佩玊儼然左右則雖有懷奸利乞官賞者亦不敢公出諸口如䝉聞奏命中書省㑹集文翰衙門官員究講參酌古今之宜或三日二日一常朝則治道昭明生民之福也明太祖洪武三年定朔望朝儀凡朔望日上皮辨服御奉天殿百官公服於丹墀東西對立俟引班引合班北面立再拜班首詣前同百官鞠躬唱某官臣某起居贊禮唱聖躬萬福班首平身復位同百官皆再拜引班引百官分班仍對立省府臺部官諸衙門有事奏者由西階升殿奏事畢降自西階引班引百官以次出如無事奏則侍儀由西階升殿跪奏如之俟侍儀降階引班導百官出按洪武初凡早朝文官自左掖門入武官自右掖門入如華蓋殿朝至鹿頂外東西序立鳴鞭訖守衛官至鹿頂內行禮訖就侍立位各衙門官以次行禮訖有事奏者入奏無事奏者四品以上及應升殿者入殿內侍立五品以下官出至鹿頂外列班北向立候鳴鞭以次出如奉天殿俱朝於華蓋殿行禮奏事畢五品以下官詣丹墀依品級列班重行北向立四品以上及翰林院官給事中監察御史等官于中左中右門伺候鳴鞭各詣殿內序立候退朝捲班以次出如先於奉天殿朝後却奏事者文武官於丹墀內依品級重行北向立候鳴鞭行禮訖四品以上及翰林院官給事中監察御史等官升殿侍立五品以下仍前序立候謝恩見辭人員行禮訖鳴鞭捲班退有事奏者於奉天門或華蓋殿進奏無事奏者以次出十四年定凡朔望日文武百官各具朝服俟鼓三嚴公侯一品二品官入東西角門俟其餘三品以下先於丹墀內班橫行序立鐘三鳴公侯一品二品以次入班序立鐘鳴畢儀禮司奏外辦導駕官導上位升御座鳴鞭訖鳴贊唱班齊通贊詣中道班首臣某等起居聖躬萬福畢百官行五拜禮儀禮司奏禮畢而退十七年令百官凡遇朔望免行起居禮後更定朔望日上御奉天殿百官各具公服行禮常朝官序立於丹墀東西相向謝恩見辭官序立於奉天門外北向候上升座鳴鞭鴻臚寺贊排班樂作常朝官行一拜三叩頭禮畢樂止復班鴻臚寺奏謝恩見辭於奉天門外行五拜三叩頭禮畢鳴鞭駕興二十二年令奉天殿常朝五府六部都察院通政司大理寺錦衣衛等官於殿內侍立奏事止於華蓋殿二十四年定侍班官員凡文武官除分詣文華殿啓事外如遇升殿各用履鞋照依品級侍班有違越失儀者從監察御史儀禮司糾劾東班則六部堂上官各部堂掌印官都察院堂上官十三道掌印御史通政司大理寺太常寺太儀寺應天府翰林院春坊光祿寺欽天監尚寶司太醫院五軍斷事官及京縣官西班則五軍都督及首領官錦衣衛指揮各衙堂印指揮給事中中書舍人是年令禮部置百官朝班序牌大書品級列丹墀左右木柵之上文武百官照品序立侍班令朝參將軍先入近侍官員次之公侯駙馬伯又次之五府六部又次之應天府及在京雜職官員又次之二十六年令公侯序於文武班首次駙馬次伯自一品而下各照品級文東武西依次序立風憲糾儀官居下朝北紀事官居文武第一班之後稍近上便於觀聼不許攙越如有奏事須要從班末行至御前跪奏不許於班內橫過奏畢即便入班序立成祖永樂初令內閣官員侍朝立在金臺東錦衣衛在西後移下貼御道東西對立至景帝景泰三年令師保兼官品同者立班以衙門為次景泰初定凡午朝上御左順門先期內官設御座於左順門之北設案稍南文武執事奏事等項官員俱於左掖門內伺候駕出視朝各官照班次序立內閣并五府六部奏事官六科侍班官俱於案西序立侍班御史二員序班二員序軍四員俱於案南面北立鴻臚寺鳴贊一員於案東向西立錦衣衛鴻臚寺堂上官於奏事官班以次面東立管將軍官并侍衛官立於將軍之西五府六部等衙門官照依衙門次第出班奏事通政司官照依常例引入奏事三法司官遇有奏事俱隨班其常日答應內刑部大理寺郎中等官各一員答應都察院侍班御史答應其餘衙門官有事者分管答應鴻臚寺官贊奏事畢徹案各官退各衙門如有機密重事許赴御前具奏英宗天順三年奏准凡方面官入朝遞降京官一班序立憲宗成化十四年令朝參官員遇鼓起時俱於左右掖門外拱候東西班次照依衙門品級序其進士各照辦事衙門次序立於見任官後凡糾舉失儀洪武初令百官有未嫺禮儀新任及諸武臣聽侍儀司官每日於午門外演習御史二員監視有不如儀者糾舉百官入朝失儀者亦糾舉如律世宗嘉靖九年令常朝官叩頭畢內閣官於東陛錦衣衛官於西陛各以次升立於寶座之東西錦衣衛官在司禮監官之南遇有欽差官及外國人等領敕翰林院詹事府左右春坊司經局堂上官輪流一人捧敕立於內閣官之後稍上候領敕官面辭捧敕官下立於御前候承㫖訖由左陛而下循御道邊行授與領敕官仍回至本班立神宗萬厯三年題准常朝該日記注起居史官四員列於東班各科給事中之上稍前以便觀聼四年議准五府都督官常朝班次不當入候伯班仍照殿班立於錦衣衛官之後稍上待錦衣衛堂上官詣金臺邉北司官於臺下各侍立仍與南北司無執事官同班而序於其上十一年令於金水橋邊增設序班三員北向站立俟東西兩班站定各於班末熟視有回顧耳語咳嗽吐唾者即時糾舉其京堂四品以上翰林院學士及領敕官俱不面糾十二年議令吉服朝參日期除祭祀齊戒不面糾外其餘照常糾儀又令參將見朝在京營者照京官儀不贊跪在外者照外官儀贊跪失儀俱面糾天子上公及諸侯卿大夫士等贄臣等謹案杜典載天子以下執贄儀物上溯虞典五玊之文下及周記圭幣之制經𫝊所載三代典章約略可見兩漢以降封建之制不行玉帛冠裳非復五等來賔之義顧三公卿監以下聨班分等約以公侯卿士之遺法漢儀魏典往往得其一二焉第儀物不詳制度莫究所自漢氏之公卿執贄僅見於正會禮文援引所及未竟其言其稍可考者獨曹魏青龍二年髙堂隆請時制略擬周官尚存典則故杜典缺漢而著魏制自後茫然無可托拾矣今按唐宋元明史志若㑹要典禮諸篇凡朝儀覲典皆無執贄明文不可强為附益故著其說如右仍存其篇目以備考鏡信節宋遼金元明臣等謹案杜典信節篇全録周官掌節之文而以漢代銅虎符及符印使節諸名附注其下亦倣鄭注引漢制釋經之例也自周以後缺而不載今驗史志舊文若符璽制度當歸輿服徴發期㑹多屬兵家其賔禮使節之條雖偶見旁文而不詳體制杜氏之刋落不載有以哉惟趙宋而後國信往來鄰國之文頗著今約採其有補於賔禮者附著於後宋神宗熙寧四年詔中外奉使除文臣兩省武臣橫行已上不以職務緊慢餘官如使外國接送伴體量安撫制勘之類給奉使印餘給銅記以奉使朱記為名先是臣僚差使不以官序髙下職務慢緊例給奉使印而令式節文非劇司者記故密院有請也九年禮部言政和令奉使官第二等以上給印餘給記差出者遇替移事故元借印記隨所在寄納本部嵗終檢舉拘收而寄納州縣占留給借無以防之乃詔有司立法應州縣寄納禮部印記非奉朝㫖不許擅行給借遼制有木契正面為陽背面為隂閣門喚仗則用之朝賀之禮宣徽使請陽面木契下殿至於殿門以契授西上閣門使云授契行勘勘契官聲喏跪受契舉手勘契同俯伏興鞠躬奏內外勘契同閣門使云准敕勘契行勘勘契官執隂面木契聲喏平身立少退近後引聲云軍將門仗官齊聲喏勘契官云內出喚仗木契一隻准敕付左右金吾仗行勘勘契官云合不合門仗官云合凡再勘契官云同不同門仗云同亦再勘契官近前鞠躬奏勘官左金吾引駕仗勾畫都知某官某對御勘同平身少退近後右手舉契云其契謹付閣門使進入閣門使引聲喏門仗官下聲喏勘契官跪以契授閣門使上殿納契宣徽使授契閣門使下殿奉敕喚仗其木箭之制內箭為雄外箭為雌皇帝行幸則用之還宫勘箭官執雌箭東上閣門使執雄箭如勘契之儀金穆宗之世諸部長各刻信牌交互馳驛訊事擾人太祖定議自非穆宗之命擅制牌號者置重法自是號令始一收國二年九月始制金牌後又有銀牌木牌之制蓋金牌以授萬戶銀牌以授明安木牌則穆昆佛寧所佩者也元世祖中統三年賜䕫州行省楊大淵金符十銀符十九賞麾下將士别給海青符二事有急速馳以上聞至元十五年追江南工匠官虎符八月中書省臣言近有㫖追諸路管民官所授金虎符其江南路臣宜仍所授從之閏十一月羅施鬼國西南番王並內附詔各為其地安撫使佩虎符十二月都掌蠻夷及其屬內附詔以其長為安撫使賜虎符餘授宣敕金銀符有差十九年敕出使人還不即以所給符上與有司不即收者皆罪之二十三年給金齒國使臣圓符二十八年南丹州莫國麟入覲授國麟安撫使三珠虎符成宗大德四年賜雲南王緬國十五驛驛給圓符四驛劵二十明太祖洪武十五年製使節黃色三簷寶蓋長二尺黃紗袋籠之又置丹漆架一以節置其上使者受命則載以行使歸則持之以復命二十三年詔考定使節之制禮部奏漢光武時以竹為節柄長八尺其毛三重而黃公紹韻㑹注漢節柄長三尺毛三重以旄牛為之詔從三尺之制欽定續通典卷七十一
