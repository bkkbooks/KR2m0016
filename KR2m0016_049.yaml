body:
  text: 禮吉朝日夕月唐宋遼金元明唐𤣥宗天寶三載三月戊寅詔曰祭之為典以陳至敬名或不正是相奪倫日月照臨下土式瞻既超言象之外宜極尊嚴之禮立為中祀頗紊大猷自今已後升為大祀仍以四時致祭庶昭報之誠格於上下欽崇之稱合于典則按開元禮日月列中祀祭以二分朝夕至是俱改宋真宗天禧初太常禮院以監察御史王博文言詳定凖禮春分朝日於東郊秋分夕月於西郊國語大采朝日少采夕月又曰春朝朝日秋夕夕月唐栁宗元論云夕之名者朝拜之隅也古者旦見曰朝暮見曰夕按禮秋分夕月蓋其時晝夜平分大陽當午而隂魄已生遂行夕拜之祭以祀日未前十刻大官令率宰人割牲未後三刻行禮蓋是古禮以夕行朝祭之儀又按禮云從子至已為陽從午至亥為隂參詳典禮合於未後三刻行禮仁宗慶厯三年定朝日夕月之圭皆五寸其祭品羊豕各二籩豆十二簠簋俎二皇祐五年定朝日壇舊髙七尺東西六步一尺五寸增為八尺廣四丈如唐郊祀録夕月壇與隋唐制度不合從舊則壇小如唐則坎深今定坎深三尺廣四丈壇髙一尺廣二丈四方為陛降入坎中然後升壇壇皆二壝壝二十五步增大明夜明壇山罍二籩豆十二神宗元豐六年禮部言熙寧祀儀朝日壇廣四丈夕月壇廣二丈以唐王涇郊祀録考之夕月壇方廣四丈今止二丈蓋禮儀之誤請依制度改造夜明壇從之髙宗紹興三年司封員外郎鄭士彥言春分朝日秋分夕月祀典未舉望詔禮官講求從之其後於城外惠照院望祭位版日書曰大明月書曰夜明玉用圭璧大明幣用赤夜明幣用白禮如祀感生帝遼太祖天贊三年九月拜日於蹛林穆宗應厯二年日南至始用舊制行拜日禮聖宗統和元年十二月千齡節拜日月按遼史拜日儀皇帝升露臺設褥向日再拜上香應拜臣僚殿左右階陪位再拜皇帝升座奏榜訖時相以下通名再拜奏聖躬萬福又再拜金初朝日用本國禮太宗天㑹四年正月始朝日於乾元殿按金制朝日壇曰大明在施仁門外之東北當闕之卯地門壝之制皆同方丘夕月壇曰夜明在彰義門外之西北當闕酉地掘地汙之為壇其中春分朝日於東郊秋分夕月於西郊朝日玉用青璧夕月用白璧幣皆如玉之色牲各用羊一豕一有司攝三獻司徒行事熙宗天眷二年定朔望朝日儀皆就殿南向再拜世宗大定二年以無典故罷十五年言者謂今正旦并萬春節宜令有司定拜日之禮有司援據漢唐春分朝日升煙奠玉如圜丘之儀又按唐開元禮南向設大明神位天子北向皆無南向拜日之制今已奉敕以月朔拜日宜遵古制殿前東向拜詔姑從南向十八年上拜日於仁政殿始行東向之禮如常儀章宗明昌五年初定日月常祀宣宗貞祐後每月吉拜日以為常元世祖至元二十五年正月祭日於司天臺按司天臺為測日觀星之地非交神明之所蓋未嘗特設壇坎故祭於此明太祖洪武三年禮部言古者祀日月之禮有六按明史載原疏文歷引周禮禮記等書經注舛訛與本文不合今從刪輯其因郊而祀之非正祀也類禜而祀之與覲諸侯而禮之非常祀也唯春分朝之於東門外秋分夕之於西門外者祀之正與常也蓋天地至尊故用其始而祭以二至日月次天地春分陽氣方永秋分隂氣方長故祭以二分為得隂陽之義自秦祭八神六曰月主七曰日主雍又有日月廟漢郊太乙朝日夕月改周法常以郊泰畤質明出行宫東向揖日西向揖月又於殿下東西拜日月宣帝於成山祠日萊山祠月魏明帝始朝日東郊夕月西郊唐以二分日朝日夕月於國城東西宋人因之升為大祀元郊壇以日月從祀其二分朝日夕月皇慶中建議立而未行今當稽古正祭之禮各設壇專祀朝日壇宜築於城東門外夕月壇宜築於城西門外朝日以春分夕月以秋分星辰則祔祭於月壇從之其祀儀與社稷同其壇制朝日壇髙八尺方廣四丈夕月壇髙六尺方廣四丈俱兩壝每壝二十五步燎壇方八尺髙一丈開上南出户方三尺神位版以松柏為之長二尺五寸濶五寸趺髙五寸朱漆金字祭器並設太尊二著尊二山罍二在壇上東南隅北面象尊二壺尊二山罍二在壇下籩豆各十簠簋各四玉幣玉並用圭璧五寸幣大明用赤夜明星辰並用白牲大明用赤犢夜明用白犢星辰用純色犢酒齊太尊實醴齊著尊實盎齊山罍實清酒其明水元酒各實于上尊籩豆之實籩實以石鹽乾魚乾棗栗黃榛子仁菱仁芡仁鹿脯白餅黑餅豆實以韭葅醯醢菁葅鹿醢芹葅醢筍葅魚醢脾析葅豚胉祭服服衮冕四年正月詔定親祀朝日夕月服兖冕陪祭官各服本品梁冠祭服九月乙亥詔親祀日月齊三日降香齊一日著為令二十一年三月增修南郊壇壝於大祀殿丹墀內疊石為臺四東西相向以為日月星辰四壇從祀其朝日夕月禜星之祭悉罷之世宗嘉靖九年帝謂大報天而主日配以月大明壇當與夜明壇異且日月照臨其功甚大太嵗等神嵗有二祭而日月星辰止一從祭義所不安大學士張璁亦以為缺典遂定春秋分之祭如舊儀朝日壇於甲丙戊庚壬年親祭餘遣文大臣攝之夕月壇於丑辰未戍年親祭餘遣武大臣攝之朝日無從祀夕月以五星二十八宿周天星辰共一壇南向祔焉春祭時以寅迎日出也秋祭時以亥迎月出也祭品用犢一羊一豕一登一鉶一簠簋各二籩十豆十玉爵三夕月金爵三酒尊三紅瓷夕月白瓷酒盞三十紅瑪瑙玉一夕月白璧一帛一紅色夕月白色篚一祝案一夕月有從位一壇南向籩十豆十帛十青紅黃𤣥各一白六祝版朝日紅楮版朱書夕月白楮版墨書上親填於文華殿如遇遣官之嵗則中書官代填是年用夏言議改建四郊兆日於東郊兆月於西郊朝日壇在朝陽門外二里許西向為制一成方廣五丈髙五尺九寸壇面甎用紅色琉璃按王圻續通考作青琉璃四出陛九級圓壝墻七十五丈髙八尺一寸厚二尺三寸櫺星門六正西三東南北各一西門外為燎爐瘞池西南為具服殿東北為神庫神厨宰牲亭燈庫鐘樓北為遣官房外圍墻前方後圓西北各三門曰天門北天門外西北有石坊曰禮神街西天門外迤南為陪祀齊宿房護壇地一百畝夕月壇在阜城門外南二里許東向為制一成方廣四丈髙四尺六寸壇面甎白色琉璃四出陛六級方壝墻二十四丈髙八尺厚二尺二寸八分櫺星門六正東三南北西各一東門外為瘞池東北為具服殿南門外為神庫西南為宰牲亭神厨祭器庫北門外為鐘樓遣官房外圍方墻東北各三門曰天門東天門外北有石坊亦曰禮神街護壇地三十六畝十年禮部上朝日夕月儀朝日迎神四拜飲福受胙兩拜送神四拜先是朝日儀自迎神至送神皆再拜夕月儀同夕月迎神飲福受胙送神皆再拜餘並如舊儀是年夕月壇以鐵爐置於坎上焚燎不必造燎壇以稱祭月於坎之義穆宗隆慶三年禮部上朝日儀言正祭遇風雨則設小次於壇前駕就小次行禮其升降奠儀俱以太常寺執事官代制曰可大䄍宋宋初以有司言用木德木生火宜以火德王遂以戍日為臘太祖建隆三年十二月戊戌臘有司畫日以前七日辛卯䄍太常博士和峴奏議曰䄍始於伊耆後歷三代及漢其名雖改而臘與䄍其實一也唐貞觀間以前寅日䄍百神卯日祭社宫辰日饗宗廟開元定禮三祭皆於臘辰以應土德聖朝臘用戌而以辛卯日䄍禮官之失也事下有司請凖唐禮䄍百神祀社稷享宗廟皆同用臘日從之䄍百神壇髙四尺東西七步二尺南北六步四尺仁宗天聖三年禮官陳詁言䄍祭一百九十二位而祝文所載一百八十二位無五方田畯五方郵表畷一十位請增入慶厯用羊豕各二大明夜明壇增山罍為二籩豆十二皇祐定壇髙八尺廣四丈嘉祐加羊豕各五神宗元豐六年詳定禮文所言記曰八䄍以記四方年不順成八䄍不通歷代䄍祭獨在南郊惟周隋有四郊之兆又月令以䄍與息民為二祭故隋唐息民祭在䄍之後日請䄍祭四郊各為一壇有不順成之方則不修報其息民仍在䄍後從之徽宗政和三年禮局上新儀臘前一日䄍百神四方䄍壇廣四丈髙八尺四出陛兩壝每壝二十五步東方設大明位西方設夜明位以神農后稷氏配配位以北為上南北壇設神農氏位以后稷氏配五星二十八宿十二辰五官五嶽五鎮四海四瀆及五方山林川澤丘陵墳衍原隰井泉田畯蒼龍朱鳥麒麟白虎𤣥武五水庸五坊五虎五鱗五羽五介五毛五郵表畷五裸五猫五昆蟲各依其方設位中方鎮星后土田畯設於南方䄍壇酉階之西中方嶽鎮以下設於南方䄍壇午階之西伊耆氏設於北方䄍壇卯階之南其位次於星辰髙宗紹興中有司檢㑹五禮新儀以臘前一日䄍東方西方百神為大祀禮料視感生帝南方北方百神為中祀禮料視嶽鎮海瀆孝宗乾道四年太常少卿王瀹請於四郊各為一壇以祀其方之神如政和之制其後南䄍於圜壇望祭殿行禮北䄍於餘杭門外精進寺行禮元明䄍祭不行明邱濬曰大䄍之祭三代已有之夏曰嘉平殷曰清祀而在周則曰大䄍焉本朝於古祀典所當舉者未嘗或廢惟於䄍祭闕焉蓋此祭也與藉田相為始終當夫東作方興之始既舉藉田之禮以祀先農於春而以帥先農民以興其務本之心則夫百穀告成之後載舉大䄍之禮以報先嗇於冬而以勞來農民以報其勤動之苦是故舉先王莫大之禮是亦廣聖君莫大之恩也陸東䄍議云按八䄍神祠制也相沿以春秋仲月戌日致祭考之典禮於義未當禮曰䄍索也嵗十二月合聚萬物而索享之蓋終嵗勞農是日飲樂以享君恩也亦曰臘也漢應劭曰周曰大䄍漢改曰臘漢火行衰於戌故此日臘也由是觀之䄍之祭當以十二月漢戌魏丑日則不一王肅謂丑之明日便寅則丑之義為長議立春於除前則用立春前丑日立春於來嵗則用下旬丑日庶祭義協而祀事專矣靈星宋明宋諸星祠有靈星之祭仁宗慶厯以立秋後辰日祀靈星為小祀其壇東西丈三尺南北丈二尺皇祐定如唐制壇周八步四尺其享禮籩八豆八在神位前左右重三行俎二在籩豆外簠簋一在二俎間象尊二在壇上東南隅北向西上徽宗政和新儀立秋後辰日祀靈星如舊制明太祖洪武元年太常寺奏漢髙帝命郡國立靈星祠唐制立秋後辰日祀靈星今擬如唐制為壇於城南從之二年禮部尚書崔亮奏八月望日祀靈星遣官行禮三年罷之風師雨師及諸星等祠唐元五代明宋遼金唐德宗貞元二年詔問風師雨師祝版署訖合拜否太常寺奏本是小祀准禮無至尊親祭之文今雖請御署檢詳經據並無拜禮詔曰風師雨師為中祀有烈祖成命况在風雨至切蒼生今禮雖無文朕當屈己再拜以申子育萬民之意仍永為常式三年徙風師壇於滻水東憲宗元和十五年太常奏來年正月三日皇帝有事於南郊同日立春後丑日宜祀風師按遍祭之儀百神咸秩風師既是星神禮當厭降如非遇郊祀其特祭如常儀梁太祖乾化二年五月詔委中書省各差官祈風師雨師後唐莊宗同光二年九月置水於城門以禳熒惑宋制以立春後丑日祀風師立夏後申日祀雨師真宗咸平二年旱詔有司祀雷師雨師景德三年知樞密院事王欽若請祀壽星詔有司詳定請以秋分日饗壽星及角亢七宿用靈星小祀禮其壇制亦如之大中祥符初澤州請立風伯雨師廟令禮官考儀式頒之有司言唐制諸郡置風伯壇於社壇東雨師壇於社壇西各稍北數十步卑下於社壇祀用羊一籩豆各八簠簋各二奏可仁宗康定元年十二月詔南京祠大火時南京鴻慶宫災集賢校理胡宿請祠大火禮官議國家有天下之號實本於宋五運之次又感火德宜因興王之地商邱之舊為壇北祀大火以閼伯配建辰建戌出內之月內降祝版留同長吏奉祭行事乃上壇制髙五尺廣二丈四出陛一壝壝祀用羊豕一器器凖中祀慶厯四年靈臺郎王大明言按占書主河江淮濟溝渠溉灌之事十九星汴口祭河瀆七位而不及星司天監詳定亢池北河南河土司空皆不主江淮濟箕計奎三星顓主津瀆請與東井天津天江咸池積水天淵天潢水位水府四瀆九坎天船王良羅堰等十七星在天河內者當祠二月詔汴口祭河兼祠十七星神宗元豐詳定局言周禮兆五帝於四郊四類亦如之鄭氏曰日月星辰運行無常以氣類為之位兆日於東郊兆月與風師於西郊兆司中司命於南郊兆雨師於北郊各以氣類祭之謂之四類漢儀縣邑常以丙戌日祠風伯於戍地以己丑日祀雨師於丑地亦從其類也熙寧祀儀兆風師於國城東北兆雨師於國城西北司中司命於國城西北亥地則是各從其星位而不以氣類也請稽舊禮兆風師於西郊祠以立春後丑日兆雨師於北郊祠以立夏後申日兆司中司命司祿於南郊祠以立冬後亥日其壇兆則各從其氣類其祭辰則各從其星位仍依熙寧儀以雷師從雨師之位以司民從司中司命司祿之位又言國朝秋分享壽星於南郊於壇上設壽星一位南向壇下卯階之南設角亢氐房心尾箕七位東向按爾雅壽星角亢也說者曰數起角亢列宿之長故曰壽星非此秋分所享之壽星也晉天文志老人一星在弧南一曰南極見則治平主壽昌常以秋分候之南郊後漢於南郊立老人星廟以仲秋祀之則壽星謂老人星矣請依後漢於壇上設壽星一位祀老人星其壇下東方七宿位不宜復設從之徽宗建中靖國元年建陽德觀以祀熒惑既又建熒惑壇于南郊赤帝壇壝外令有司以時致祭增用圭璧以閼伯配俱南向五方火精神等為從祀政和三年禮局定風師壇廣二十三步雨師雷師壇廣十五步皆髙三尺四陛並一壝二十五步其雨雷壇同壝又請祀風師雨師司中司命用樂仍製樂章以為降神之節祭以少牢仍用體解並從之南渡後壽星風師雨師雷師諸祠並仍舊制髙宗紹興三年太常寺言應天府祀大火今道路未通宜於行在春秋設位七年五月命舉熒惑壽星之祀遼聖宗統和二年四月辛卯祭風伯道宗清寧元年皇帝射栁訖詣風師壇再拜金章宗明昌五年為壇於景風門外東南闕之巽地嵗以立春後丑日祀風師牲幣進熟又為壇於端禮門外西南闕之坤地嵗以立夏後申日祀雨師羊豕各一儀並如中祀是日祭雷師於位下禮同小祀一獻羊一無豕並令有司攝之元世祖至元初敕二分二至及聖誕節日祭星於司天臺七年大司農請於立春後丑日祭風師於東北郊立夏後申日祭雷雨師於西南郊延祐五年始立壇壝其儀注闕二十六年十二月命回回司天臺祭熒惑元祀儀皆禮官所擬而定於中書日星始祭於司天臺而回回司天臺遂以禜星為職事成宗初即位五月壬子祭太陽太嵗火土等星於司天臺庚申祭紫微星於雲仙臺仁宗即位禜五星於司天臺明太祖洪武初以太嵗風雷雨師從祀圜丘增雲師於風師之次其司中司命司民司祿壽星依唐制分日而祀二年以太嵗風雲雷雨諸天神合為一壇又從禮部尚書崔亮奏每嵗聖壽日祭壽星同日祭司中司命司民司祿皆遣官行禮三年罷壽星等祀從禮部議於城南諸神享祭壇正南向增九間以聖壽節前三日於此祭周天星辰四年帝躬祀周天星辰正殿共十壇中設周天星辰位儀如朝日六年命天下祀風雲雷雨之神世宗嘉靖十一年釐正祀典改叙雲雨風雷祭期每嵗仲春秋上旬擇日行事並同社稷儀注太一九宫貴神附唐五代宋金元臣等謹按漢書郊祀志神君最貴者曰太一其佐曰太禁司命之屬皆從之宋馬貴與謂太一莫知其何神天官書言中宫天極星其一明者太一常居則其為星象也明矣武帝惑於方士之說具太一祠壇在五帝之上諂瀆不倫至唐始祀九宫貴神其後别置太一神壇宋時祀十神太一又别建九宫貴神壇壝所謂九宫者太一天一招搖軒轅咸池青龍太隂天符攝提是也十神者五福君基大遊小遊天一臣基直符民基四神地一是也其說鮮有經據大抵出於星厯五行之家繆悠支離難可訂證然自唐暨元遞相附㑹祀典所載非復司中司命等祠可比而同考杜佑通典朝日夕月後别列禋六宗一條其禮迄於後魏而止自唐以還罕有述者固宜缺而弗書而諸星祠內隋代祀天一太一杜典本無專條然唐宋九宫十神之典已升為大祀不當復在風伯雨師之列今謹稽諸正史類紀其異同沿革之故以備議禮者之參考亦以見違經訓崇淫祀之無當於禮意云唐肅宗乾元二年初置太一神壇於圜丘東命宰相王璵攝行祠事二年親祀九宫貴神先是明皇天寶三載術士蘇加慶上言請於朝日壇東置九宫貴神壇其壇三成成三尺四陛其上依位置九壇壇尺五寸東南曰招搖正東曰軒轅東北曰太隂正南曰天一中央曰天符正北曰太一西南曰攝提正西曰咸池西北曰青龍五為中數戴九履一左三右七二四為上六八為下符於遁甲以四孟曰祭禮次昊天上帝而在太清宫太廟上用牲牢璧幣類於天地神祇明皇親祀之如有司行事即宰相為之初九宫神位四時改位乾元以後不易位文宗太和二年監察御史舒元輿奏臣伏見祀九宫貴神祝版陛下親署御名稱臣王者父天母地兄日姊月此九神於天地猶子男於日月猶侯伯也陛下尊為天子豈可稱臣於天之子男耶詔都省議皆如元輿言乃降為中祀祝版稱皇帝不署名武宗㑹昌元年中書門下奏九宫貴神司水旱兵荒纍年水旱愆侯恐是有司禱請誠敬稍虧請自今以後用大祀之禮御署祝版以社稷為凖敕依梁太祖乾化二年五月詔委中書省各差官祈九宫貴神宋太宗太平興國八年詔作太一宫於都城南雍熙元年八月親祀太一宫真宗咸平四年從直祕閣杜鎬請二仲祭九宫貴神為大祀仁宗天聖六年作西太一宫景祐二年學士承㫖章得象等定司天監生于淵等所請祀九宫太一依逐年飛移位次之法按郗良遇九宫法有飛棊立成圖每嵗一移主九州災福事請依唐禮遇祭九宫之時遣司天監官一員詣祠所隨每年貴神飛棊之方以定祭位仍自天聖己巳入歷太一在一宫嵗進一位飛棊巡行周而復始詔可神宗熙寧四年司天中官正周琮言五福太一自國朝雍熙元年甲寅嵗入東南巽宫修東太一宫天聖七年己巳嵗入西南坤位修西太一宫今五福太一移入中都請稽詳故事崇建祠宇迎之京師詔建中太一宫於集禧觀元豐六年太常博士何洵直言祀九宫貴神祝版宜依㑹昌故事及開寶通禮書御名而不稱臣又貴神九位共用二少牢於腥熟之俎骨體不備謂宜每位一牢凡九少牢詔下太常修入祀儀哲宗元祐七年監察御史安鼎言十神太一九宫太一與漢所祀太一共是一神今祀十神用素饌而九宫並薦羊豕似非禮意詔禮官詳定言十神九宫各有所主即非一神故自唐訖今九宫皆用牲牢别無祠壇用素食禮遂依舊制徽宗政和三年禮局上五禮新儀立春日祀東太一宫立夏季夏土旺日祀中太一宫立秋日祀西太一宫立冬日祀中太一宫髙宗紹興間詔擇地建太一宫太常寺主簿林大鼐言十神太一九宫太一皆天之貴神國朝分而為二並為大祀比新太一宫而九宫貴神尚寓屋而不壇乃詔臨安府於國城之東建九宫貴神壇壝其儀如祀上帝金宣宗興定元年七月以久旱祀九宫貴神於東郊元成宗大德元年建五福太一壇以道流主之文宗至順元年以立冬祀五福十神太一真君二年正月敕每嵗四祭五福太一星二月建五福太一宫於京城乾隅欽定續通典卷四十九
