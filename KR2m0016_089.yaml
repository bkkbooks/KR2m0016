body:
  text: 樂歌唐叚安節樂府雜録歌者樂之聲也故絲不如竹竹不如肉迥居諸樂之上善歌者必先調其氣氤氲自臍出至喉乃噫其詞即分抗墜之音既得其術即可致遏雲響石之妙也天寳中内人許永新善歌一日賜大酺於勤政樓萬衆喧嘩高力士奏請永新出樓歌一曲永新承㫖直奏㬅聲廣場寂寂若無一人喜者聞之氣勇愁者聞之腸絶李肇國史補李衮善歌名動京師崔昭入朝密載而至乃廣宴賔客請第一部樂及京師名倡以為盛㑹昭言表弟欲登末坐衮乃敝衣而出滿坐嗤笑少頃命酒衮喉轉一聲樂人皆大驚曰李八郎也羅拜之馮贄記事珠曰絳樹一聲能歌兩曲二人細聴各聞一曲一字不亂人疑其一聲在鼻咸通中伶人李可及善音律尤能轉喉為新聲音辭曲折聴者忘倦京師屠沽少年效之謂之拍彈張淏雲谷雜記宋太祖潛耀日嘗與一道士遊姓名無定自曰混沌又曰真無善歌能引其喉於杳㝠之間作清㣲之聲時或一二句從天風飄下周密齊東野語思陵朝有菊夫人者善歌舞妙音律為僲韶院之冠宫中號為菊部頭明宋新吴歌記曰唐初之詩以入唱為高自宋代以調興而歌詩之法廢金元以北九宫興而歌調之法廢元以後以南曲興而北曲廢譬之於禮諸體猶羊而歌音猶告朔也廢告朔而供羊不可謂禮廢古音而存體不可謂樂雜歌曲得至寳唐時長安有富家子落魄不事生計嘗與國樂遊處一旦家産蕩盡偶一老嫗持舊錦褥貨鬻乃以半千獲之尋有波斯見大驚謂之曰何處得此是氷蠶絲所織若暑月陳於座可致一室清涼即酬千萬富家子得之還與國樂追歡不經年復盡樂人惜之遂製此曲春鶯囀高宗曉音律晨坐聞鶯聲命樂工明達寫之遂有此曲道調子懿王命樂工敬納吹觱栗初弄道調上謂是曲誤拍之敬納乃隨拍撰成曲子春光好元宗所製也嘗遇二月宿雨初晴景物明麗小殿内庭栁杏將吐覩而歎曰對此景物豈得不與他判斷之乎因臨軒縱擊此曲神思自得及顧栁杏皆已發拆上笑謂嬪御曰此事不喚我作天工可乎嬪御皆呼萬嵗秋風高亦𤣥宗所製曲也毎至秋空逈徹纎翳不起即奏之必逺風徐來庭葉隨下荔枝香亦𤣥宗所製曲也帝幸驪山楊貴妃生日命小讌張樂長生殿因奏新曲未有名㑹南方進荔枝因名曰荔枝香一斛珠梅妃所作也妃居上陽東宫明皇封珍珠一斛宻賜妃妃不受以詩付使者曰為我進御前也上覽詩悵然不樂令樂府以新聲度之號一斛珠曲名始此謫仙怨明皇幸蜀登高望秦川謂髙力士曰吾聴張九齡言不至此遣使祭之吹笛為此曲舞山香汝陽王璡妙達音㫖毎隨遊幸嘗帶牙絹帽打曲上自摘紅槿花置之帽簷二物皆極滑久之方安奏此一曲終而花不墜落上大喜賜金器一厨于蒍于元徳秀所作也元宗幸東都三百里内刺史縣令俱以聲樂至都下為歡徳秀時為魯山令惟選樂工數十人連袂而歌于蒍于上聞之曰此賢人之言也乃深奬之陽闗曲王維所作也每句皆再唱而第一句不疊白居易詩相逢且莫推辭去聴唱陽闗第四聲謂勸君更盡一杯酒也播皇猷宣宗時製歌者髙冠方履褒衣博帶趨走俯仰皆中䂓矩蔥嶺西亦宣宗時製士女蹋歌為隊其詞言蔥嶺之民樂河湟故地歸唐也蜀道易陸暢所作也韋臯鎮蜀暢感其遇作蜀道易其首句曰蜀道易易於履平地南康大喜贈羅八百疋萬斯年㑹昌初宰相李徳裕命樂工製楊栁枝白居易閒居洛邑時作後入教坊望江南始自李徳裕鎮淛日為亡妓謝秋娘所撰本名謝秋娘後改此名亦曰夢江南白居易因為二篇文叙子長慶中俗講僧文叙善吟經其聲宛轉感動里人樂工黄米飯狀其念四聲觀世音菩薩乃撰此曲瑤臺第一層陳后山詩話武才人出壽宫色冠後庭裕陵得之㑹教坊獻新聲為詩作詞號瑤臺第一層還鄉歌吴越王錢鏐遊衣錦軍作詞曰三節還鄉兮挂錦衣父老逺來相追隨牛斗無孛人無期吴越一王駟馬歸陌上花吴越王錢鏐妃毎嵗春必歸臨安玉以書遺妃曰陌上花開可緩緩歸矣吴人用其語為曲含思宛轉凄然動人但詞多鄙野蘇軾為易三詩醉翁引宋歐陽修謫守滁州山川秀絶公刻石為記以遺州令既去十年太常博士沈遵往遊其地以琴寫其聲為醉翁引有曲無詞廬山道人崔閑請蘇軾補之御街行唐白樂天有花非花霧非霧夜半來天明去來如春夢不多時去似朝雲無覔處宋張子野衍之為御街行一闋醉蓬萊宋栁永所作也永字耆卿累舉不第仁宗召見之㑹老人星見入内都知史姓者愛其才乞命永撰詞以頌休祥永作醉蓬萊詞以進削浪沙遼四裔樂有大曲小曲此乃小曲之一也江水曲金天興間元兵攻汴急右丞舒嚕嘗命作此曲使城上之人静夜唱之白翎雀元教坊大曲也其鳥生於烏桓朔漠之間雌雄和鳴自得其樂世皇因命伶人碩徳閶製曲以名之鸚鵡曲元薩都拉所作也序云有以繡枕見貺上繡楊妃有鸚鵡髙力士二宫女侍立皆寸許其布置得體想像可愛故作鸚鵡曲以答云烏鹽角始教坊家人市鹽得一曲譜於角子中翻之遂名洪武初勅中書省令天下郡縣舉素志髙潔博古通今之士禮送至京同製樂章有起臨濠開太平削羣雄平幽都龍池宴定封賞大一統守承平等曲命協音律者歌之舞宋隊舞之制其名各十小兒隊凡七十二人一曰柘枝隊衣五色繡羅寛袍戴花帽繫銀帶二曰劍器隊衣五色繡羅襦裏交脚幞頭紅羅繡抺額帶器仗三曰婆羅門隊紫羅僧衣緋掛子執錫環拄杖四曰醉鬍騰隊衣紅錦襦繫銀􅀈􅀈戴氊帽五曰諢臣萬嵗樂隊衣紫緋緑羅寛暈衫裹簇花幞頭六曰兒童感聖樂隊衣青羅生色衫繫勒帛總兩角七曰玉兎渾脱隊四色繡羅襦繫銀帶冠玉兎冠八曰異域朝天隊衣錦襖繫銀束帶冠夷冠執寳盤九曰兒童解紅隊衣紫緋繡襦繫銀帶冠花砌鳯冠綬帶十曰射雕回鶻隊衣盤雕錦襦繫銀􅀈鞢射雕盤女弟子隊凡一百五十三人一曰菩薩蠻隊衣緋生色窄砌衣冠卷雲冠二曰感化樂隊衣青羅生色通衣背梳髻繫綬帶三曰抛毬樂隊衣四色繡羅寛衫繫銀帶奉繡毬四曰佳人剪牡丹隊衣紅生色砌衣戴金冠剪牡丹花五曰拂霓裳隊衣紅僊砌衣碧霞帔戴僊冠紅繡抺額六曰採蓮隊衣紅羅生色綽子繫暈裙戴雲鬟髻乗綵船執蓮花七曰鳯迎樂隊衣紅僊砌衣戴雲鬟鳯髻八曰菩薩獻香花隊衣生色窄砌衣戴寳冠執香花盤九曰綵雲僊隊衣黄生色道衣紫霞帔冠僊冠執旌節鶴扇十曰竹毬樂隊衣四色窄繡羅襦繫銀帶裹順風脚簇花幞頭執毬杖大抵若此而復從宜變易太祖乾徳四年和峴言郊廟殿庭通用文徳武功之舞然其綴兆未稱武功文徳之形容又依古義以揖讓得天下者先奏文舞以征伐得天下者先奏武舞陛下以推讓受禪宜先奏文舞請改殿廷所用文舞為元徳升聞之舞其舞人約唐太宗舞圖用一百二十八人以倍八佾之數分為八行皆著履執拂服袴褶冠進賢冠引舞二人執五采纛其舞狀文容變數聊更增改又陛下以神武平一宇内即次奏武舞請改為天下大定之舞人數行列悉同文舞其人皆被金甲持㦸引舞二人執五采旗其舞六變一變象六師初舉二變象上黨克平三變象淮揚底定四變象荆湖歸復五變象卭蜀納欵六變象兵還振旅仍别撰舞曲樂章而文徳武功二舞請於郊廟仍舊通用景祐二年九月翰林學士承㫖章得象等言宋祁所上大樂義其論武舞所執九器禮經但舉其凡而不著言其用後先故旅進輩作而無終始之别且鼗者所謂導舞也鐸者所謂通鼓也錞者所謂和鼓也鐃者所謂止鼓也相者所謂輔樂也雅者所謂陔歩也寧有導舞方始而參以止鼓止鼓既揺而亂以通鐸臣謂當舞入之時左執干右執戚離為八列别使上人執旌最前鼗鐸以發之錞以和之左執相以輔之右執雅以節之及舞之將成也則鳴鐃以退行列築雅以陔歩武鼗錞相皆止而不作如此則庶協舞儀請如祁所論其冬禮官言春秋隱公五年考仲子之宫初獻六羽何休范寗等咸謂不言佾者明佾則干舞在其中婦人無武事獨奏文樂也江左宋建平王宏皆據以為説故章皇后廟獨用文舞至唐垂拱以來中宫之縣既用鎛鐘其後相承故儀坤等廟獻武舞備鐘石之樂尢為失禮前詔議奉慈之樂有司援舊典已用特磬代鎛鐘取隂教尚柔以静為體今樂去大鐘而舞進干盾頗戾經㫖請止用文徳之舞奏可治平二年九月禮官李育上言南郊太廟二舞郎總六十八文舞罷舍羽籥執干戚就為武舞臣謹按舊典文武二舞各用八佾凡祀圜丘祀宗廟大樂令率工人以入就位文舞入陳于架北武舞立于架南又文舞出武舞入有迎送之曲名曰舒和亦曰同和凡三十一章止用一曲是進退同時行綴先定歩武容體各應樂節夫至徳升聞之舞象揖讓天下大定之舞象征代柔毅舒急不侔而所法所習皆異不當中易也竊惟天神皆降地祇皆出八音克諧祖考來格天子親執珪幣相維辟公嚴恭寅畏可謂極矣而舞者紛然縱横于下進退取舎蹙迫如是豈明有徳象有功之誼哉國家三年而躬一郊同殿而享入室而舞者闕如名曰二舞實一舞也且如大朝會所以宴臣下而舞者備其數郊廟所以事天地祖考而舞者減其半殊未為稱事有近而不可邇禮有䌓而不可省所繫者大而有司之職不敢廢也伏請南郊太廟文武二舞各用六十四人以備帝王之禮樂以明祖宗之功徳奏可元祐四年十二月始命大樂正葉防撰朝㑹二舞儀武舞曰威加四海之舞第一變舞人去南表三歩總干而立聴舉樂三鼓前行三歩及表而蹲再鼓皆舞進一歩正立再鼓皆持干荷戈相顧作猛賁趫速之狀再鼓皆轉身向裏以干戈相擊刺足不動再鼓皆回身向外擊刺如前再鼓皆正立舉手蹲再鼓皆舞進一歩轉靣相向立干戈各置腰再鼓各前進以左足在前右足在後左手執干當前右手執戈在腰為進旅再鼓各相擊刺再鼓各退身復位整其干為退旅再鼓皆正立蹲再鼓皆舞進一歩正立再鼓皆轉靣相向秉干持戈坐作再鼓各相擊刺再鼓皆起收其干戈為克捷之象再鼓皆正立遇節樂則蹲第二變聴舉樂依前蹲再鼓皆舞進一歩正立再鼓皆正而作猛賁趫速之狀再鼓皆轉身向裏相擊刺足不動再鼓各轉身向外擊刺如前再鼓皆正立蹲再鼓皆舞進一歩陳其干戈左右相顧為猛賁趫速之狀再鼓皆併入行以八為四再鼓皆兩兩對相擊刺再鼓皆回易行列左在右右在左再鼓皆舉手蹲再鼓皆舞進一歩正立再鼓各分左右再鼓各揚其干戈再鼓交相擊刺再鼓皆總干正立遇節樂則蹲第三變聴舉樂則蹲再鼓皆舞進一歩轉而相向再鼓整干戈以象登臺講武再鼓皆擊刺于東南再鼓皆按盾舉戈東南嚮而望以象漳泉奉土再鼓皆擊刺於正南再鼓皆按盾舉戈南嚮而望以象杭越来朝再鼓皆舞進一歩正立再鼓皆擊刺於西北再鼓皆按盾舉戈西北嚮而望以象克殄并汾再鼓皆擊刺于正西再鼓皆按盾舉戈西嚮而望以象肅清銀夏再鼓皆舞進一歩正跪右膝至地左足㣲起再鼓皆置干戈于地各拱其手象其不用再鼓皆左右舞蹈象以文止武之意再鼓皆就拜收其干戈起而躬立再鼓皆舞退鼓盡即止以象兵還振旅文舞曰化成天下之舞第一變舞人立南表之南聴舉樂則蹲再鼓皆舞進一歩正立再鼓皆稍前而正揖合手自下而上再鼓皆左顧左揖再鼓皆右顧右揖再鼓皆開手蹲再鼓皆舞進一歩正立再鼓皆稍却身初辭合手自上而下再鼓皆右顧以右手在前左手推後為再辭再鼓皆左顧以左手在前右手推出為固辭再鼓皆合手蹲再鼓皆舞進一歩正立再鼓皆俛身相顧初謙合手當胸再鼓皆右側身左垂手為再謙再鼓皆左