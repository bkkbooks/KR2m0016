body:
  text: 職官諸卿中鴻臚寺丞附主簿班典客署司儀署鳴贊序唐鴻臚寺卿一人少卿二人凡四國君長以番望高下為簿朝見凡大臣喪葬則本寺官贊相之示以禮制肅宗至德初西域朝貢及安西北庭校吏嵗集京師者數千人隴右既陷不得歸皆仰給鴻臚禮賓月四萬緡凡四十年養子孫如編民至德宗建中時擢王鍔為鴻臚少卿遂悉以隸名王以下幾及四千人其所畜馬二千皆停給宋初置判寺事一人以朝官以上充官制行置卿一人少卿一人卿掌四方朝貢宴勞給賜送迎之事及國之凶儀中都祠廟道釋籍帳除附之禁令少卿為之二高宗建炎後罷鴻臚寺併入禮部真宗景德中戚綸判鴻臚寺綸以三公尚書九列之任唐末以來有司漸繁綱目不一宜采通禮六典令式比類沿革著為大典時論稱之遼北面官有客省局使副使等官南面官客省有都客省興宗重熙十年以回鶻崇格為都客省客省使太宗會同五年以耶律華格為客省使左客省使穆宗應厯中以蕭和斯為左客省使右客省使客省副使等官南面官鴻臚寺亦置卿少卿金不設鴻臚寺有客省使副使掌接伴人使見辭之事引進使副使掌進外方人使貢獻禮物事內承奉班押班掌總率本班承奉之事御院通進四員掌諸貢獻禮物及薦享編位次序屬宣徽院元不設鴻臚寺有侍儀司會同館屬禮部廩給司屬通政院其侍儀司掌外國朝覲之禮世祖至元八年始置左右侍儀奉御二人禮部侍郎知侍儀事一人引進使知侍儀事一人左右侍儀使二人左右直侍儀使二人左右侍儀副使二人左右侍儀僉事二人引進副使侍儀令各一人以後增損不一英宗至治元年定置侍儀司四人引進使知侍儀事二人通事舍人十六人侍儀舍人十四人會同館領館事一人大使一人副使二人掌接伴引見諸畨蠻及洞官之來朝貢者成宗元貞元年以禮部尚書領館事遂為定制廩給司提領一人司令一人司丞一人掌諸王諸畨各省四方邊逺使客飲食供帳等事明初置侍儀司太祖洪武四年定侍儀使引進使品秩俱為七品以下官十三年改使為司正分左右司副各一人二十二年增設左右司丞四人三十年改為鴻臚寺卿一人左右少卿各一人掌朝會賓客吉凶儀禮之事英宗復辟後擢楊宣為鴻臚少卿凡朝廷宴饗朝賀大禮皆出職掌宣修幹美髯奏對明暢日見寵遇憲宗立升鴻臚卿時荆襄叛冦劉千斤伏誅戎帥械繫餘黨多誤陷于辜者宣亟上章論救大要欲重人命謹天戒詞甚婉切有詔法曹詳鞫竟得矜宥又施純升鴻臚寺卿純習禮度每旦侍朝為磬折狀甚恭特蒙寵眷擢禮部侍郎未幾升尚書加太子太保純長身偉然表出羣類不十數年驟登峻秩前此未有也南京鴻臚寺卿一人世宗嘉靖間胡森為南京鴻臚寺卿以局間事省減去直役談説理學講明國是丞唐置三人宋置二人明左右寺丞各一人主簿唐置一人宋因之明亦置一人典客署唐置令一人丞三人掌二王後及四方歸化在藩者朝貢送迎皆預焉宋置往來國信所掌大遼使介交聘之事都亭西驛及管幹所掌河西番部貢奉之事禮賓院掌回鶻吐蕃黨項女貞等國朝貢館設及互市驛語之事懷逺驛掌南番交州西番龜兹大食于闐甘沙宗格等國貢奉之事皆唐典客署之職建炎後廢鴻臚寺並歸禮部遼金元無典客署明司賓署署丞一人典外國朝貢之使辨其等而教其拜跪儀節司儀署唐置令一人丞一人掌凶禮喪葬之具宋以後皆不置明司儀署署丞一人掌吉凶禮之事鳴贊明置四人掌贊儀禮凡內贊通贊對贊接贊傳贊咸職之序班明置五十人掌侍班齊班糾儀及傳贊司農卿丞䆃主簿官署上林署苑總監太倉署諸倉監鈎盾署司竹監溫泉湯監將諸屯監典農中郎等官騪粟都尉等官唐司農寺卿一人少卿二人掌倉儲委積之事憲宗元和中郭釗纍官司農卿時帝寢疾宦豎或妄議廢立者穆宗問計于釗答曰殿下為太子當朝夕視膳何外慮乎時稱得元舅體文宗太和中杜中立以駙馬都尉遷司農卿繩吏急反為中傷左徙慶王傅久之復拜司農卿入奏帝曰卿用法深信乎對曰轂下有司養名不肯苛事如司農尤叢劇陛下無信流言假臣數月當諸弊肅清帝許之向例度支度六宫餐錢移司農司農季一出付吏大吏盡舉所給于人權其子母以給之既不以時黃門來督責慢罵杜中立為司農卿取錢納帑舍率五日一出吏不得為姦後遂以為法宋初司農寺置判寺事二人以兩制朝官以上充神宗熙寧二年置制置條例司立常平斂散法遣諸路提舉官推行之三年詔制置司均天下之財以常平新法付司農寺而農田水利免役保甲等法悉自司農講行以太子中允吕惠卿判司農寺改同判寺胡宗愈為兼判官制行寺監不治外事司農事舊職務悉歸户部右曹置卿一人少卿二人卿掌倉儲委積之政令總苑囿庫務之事而謹其出納天子有事親耕則奉耒耜少卿為之二建炎三年罷司農寺以事務併隸倉部紹興四年復置寺仍置卿少卿時新法行鬻河渡坊場司農併斥賣天下祠廟宋閼伯微子廟皆為賈區張方平上言宋王業所基閼伯封于商邱以主大火微子為始封之君是二祠者亦不得免乎帝震怒批牘尾曰慢神辱國莫甚于此于是天下祠廟皆得不鬻孝宗隆興中李浩自台州除司農少卿時朝廷和糴米八萬董其事者賤糴濕惡隱尅官錢戶部不敢詰浩白發其姦下有司窮究戶部欲就支稽見數大理附會之浩爭曰非但惠姦且虧軍實上是其言又李椿除司農卿椿會大農嵗用米百七十萬斛而省倉見米僅支一二月歎曰真所謂國非其國矣力請嵗除二百萬斛為一年之蓄遼南面官有司農寺置卿少卿等官金宣宗興定六年置司農司設兼採訪公事大司農一人卿三人少卿三人于陜西河南置行司農司哀宗正大元年又于歸德許州置行司農司各設卿少卿等官凡卿以下各出巡按察官吏臧否而升黜之使節所過姦吏屏息數年之間民政修舉實賴其力元至元七年始置大司農司設官五人凡農桑水利學校飢荒之事悉掌之十四年罷以按察司兼領勸農事十八年改立農政院置官六人二十年又改立務農司置達嚕噶齊一人務農使一人同知二人是年又改為司農寺達嚕噶齊一人司農卿二人二十三年仍改為大司農司成宗大德元年增領大司農寺一人仁宗皇慶二年增大司農一人繼又定置四人大司農卿二人少卿二人至元中張文謙拜大司農卿奏立諸道勸農使巡行勸課請開籍田祭先農先蠶時阿哈瑪特專政議拘民間鐵官鑄農器髙其價以配民文謙于帝前極論罪之又董文用為大司農時欲以民田為屯田文用固執不可乃止順帝至正十三年置分司農司命中書右丞烏蘭哈達左丞烏克遜良楨兼大司農卿給分司農印西自西山南至保定河間北至檀順州東至遷民鎮凡係官地及元管各處屯田悉從分司農司立法募民耕種明初置司農司設卿少卿等官尋即罷洪武三年復置司農司開治所于河南設卿一人少卿一人四年又罷之悉以其所掌歸户部丞唐置六人總判寺事宋熙寧五年置丞四人元豐四年省三人建炎三年罷司農寺不設丞紹興三年復設丞二人凡有合行事務由户部施行熙寧中熊本判司農寺丞帝嘉其績謂廷臣曰熊本不傷財不害民一旦去百年之患深可嘉也又王覿由司農寺主簿轉丞時以司農為要官進用者多由此選覿拜命一日即求外用人服其恬退又葉顒為司農寺丞在朝二年非公事未嘗至丞相府樞密王綸知其恬退而未知其德性一日官誥院失錦令治之顒請寬慢藏之罪于是綸大喜謂其客曰葉寺丞介而通嚴而恕真重器也金置行司農司丞一人元至元二十年置司丞一人皇慶二年改置大司農丞一人明洪武三年置司農丞四人四年罷之主簿唐置二人宋初置六人元豐四年減三人哲宗元祐五年以本寺主簿兼檢法尋皆罷紹興十年復置隆興元年省罷二年詔復舊制金不設元亦不設有經歷一人都事二人明洪武三年設寺有主簿二人四年罷之上林署唐置令二人丞四人掌苑囿園池植果蔬以供朝會祭祀及尚食諸司常料藏氷啓氷之事宋園苑官無常員以三司判官內侍都知諸司使以上充玉津瓊林宜春瑞聖四苑官掌種植蔬蒔以待供進修飭亭宇以偹逰幸宴設金章宗泰和八年置上林署提點及丞直長等官掌諸苑園池沼種植花木果蔬及承奉行幸舟船之事又置都監同監等官掌花木局事皆屬工部不隸司農司元至元二十四年置上林署令一人丞一人直長一人掌宫苑栽植花卉供進蔬果種苜蓿以飼駝馬備煤炭以給營繕又置養種園提領二人花園管勾二人苜蓿園提領三人皆屬大都留守司不隸司農明洪武二十五年議開上林苑度地城南自牛首山接方山西並河涯圖上太祖謂有妨農事乃上成祖永樂五年始置上林苑監設良牧蕃育嘉蔬林衡川衡氷鑑及典察左右前後十屬署仁宗洪熙中併為蕃育嘉蔬二署宣宗宣德十年始定四署置左右監正各一人掌苑囿園池牧蓄樹種之事左右監副各一人左右監丞各一人其良牧蕃育林衡嘉蔬四署各典署一人署丞一人録事一人正德中增設監督內臣九十九人嘉靖元年裁汰八十人並罷蕃育嘉蔬二署典署林衡嘉蔬二署録事太倉署唐置令三人丞五人監事八人掌廩藏之事宋元豐中以京城二十五倉屬司農每倉設監官以京朝官及三班使臣充官吏軍兵祿食及綱運受納封樁支用月具數以報司農紹興後又置豐儲倉置監官一人監門官二人金制府庫倉廩積貯之事以戶部員外郎掌之又太倉使副使掌九穀廩藏出納之事屬太府監不隸司農司元京都二十二倉各倉置監支納一人大使二人副使二人皆屬户部不隸司農寺明永樂中遷都北京置京倉及通州諸倉以户部司員經理之宣德五年始命李昶為户部尚書專督其事遂為定制以後或尚書或侍郎俱不治部事專理糧儲鈎盾署唐置令二人丞四人監事十人供薪炭鵝鴨蒲萑陂池藪澤之物以供祭祀朝會燕饗賓客宋置柴炭庫炭場掌儲薪炭以給宫城及百司之用金章宗明昌三年改勾盾署為典給署有令丞直長等官掌宫中所用薪炭氷燭屬太府監元柴炭局置提領一人大使一人副使一人掌薪炭以供用屬內宰司不隸司農寺又置內正司卿四人少卿二人丞二人掌孶畜內産之儲以供膳服備賜屬中政院亦不隸司農明初以尚書侍郎提督易州山厰掌督御用柴炭之事至嘉靖八年改設主事管理䆃官署唐置令二人丞四人監事十人掌䆃擇米麥及油燭之事宋都麴院掌造麴以供內庫酒醴之用水磨務掌水磑磨麥以供尚食及內外之用金儀鸞局掌御前所用香燭之事官職詳見前元司農司有供膳司置提點一人司令一人丞一人掌供給應需貨買百色生料油戶提領一人大使一人副使一人嵗辦油十萬斤以供內庖又醴源倉提舉一人大使一人副使一人掌受香莎蘇門等酒材糯米鄉貢麴藥以供上醖又尚食局置提點一人大使一人副使一人掌出納油麴諸物皆屬宣徽院不隸司農司明供膳之事皆歸光祿寺不專設官苑總監唐置每宫苑監一人副監一人丞二人主簿二人掌苑內宫館園池禽魚果木之事宋苑囿官無常員詳見上林署金北太一宫同樂園管勾二人掌守宮園繕修之事其各花園置小都監一人各宫苑置使一人元尚供總管府達嚕噶齊一人總管一人同知一人副總管一人判官一人掌守護東涼亭行宫及逰獵供奉之事明苑囿事悉掌于上林苑監諸倉監唐各倉設監一人丞二人掌倉廩儲積出納之事宋鎮江建康諸倉各置監官金諸倉置監支納使副使等官掌倉