為監副後遂不設丞殿中監丞尚尚食局尚藥御尚衣長尚舍輦等奉直尚乘唐置殿中省監一人少監二人掌天子服御之事凡聽朝率屬執繖扇列于左右大朝會祭祀則進爵行幸則侍宋殿中省監一人少監一人掌供奉天子玉食醫藥服御幄帟輿輦舍次之政令遼南面官殿中司隸御史臺有殿中之官開泰元年見殿中高可恆金殿中省之職多領于殿前都點檢司及宣徽院元亦不設殿中省置侍正府侍正十四人同知二人參府二人侍判二人掌內廷近侍之事其屬經歷一人都事一人照磨一人明內廷近侍之事俱屬內侍不専設官不具載丞唐置二人宋置一人遼亦有殿中丞尚食局唐置奉御二人直長五人奉御掌儲供直長為之二進御必辨時禁先嘗之饗百官賔客則與光祿視品秩而供凡諸陵月饗視膳乃獻宋尚食局有典御奉御等官掌膳羞之事遼南面官殿中司所屬亦有尚食局奉御金尚食局屬宣徽院元尚食局亦屬宣徽院俱詳見光祿寺明尚膳監掌于內府尚藥局唐置奉御二人直長二人掌和御藥診視凡藥供御中書門下長官及諸衛上將軍各一人與監奉御涖之藥成醫佐以上先嘗疏本方具嵗月日涖者署奏餌日奉御先嘗殿中監次之宋尚藥有典御奉御等官掌和劑診候之事遼北面官著帳戶司承應實達爾局有湯藥實達爾金尚藥局御藥院屬宣徽院元明御用藥物皆掌于太醫院俱詳見太常寺太醫署尚衣局唐置奉御二人直長四人掌供冕服几案祭祀則奉鎮圭于監而進于天子大朝會設案宋尚衣有典御奉御等官掌衣服冠冕之事遼南面官殿中司有尚衣局奉御金尚衣局有提點使副使都監直長同監等官掌御用衣服冠帶等事屬宣徽院元侍正府有尚衣奉御二人副奉御二人尚冠奉御二人副奉御二人尚鞶奉御二人副奉御二人尚沐奉御二人副奉御二人明尚衣監掌于內侍尚舍局唐置奉御二人直長六人掌殿庭祭祀張設湯沐燈燭汛掃行幸則設三部帳幕有古帳大帳次帳小次帳小帳凡五等各三部其外則蔽以排城大朝會設黼扆施躡席薰爐朔望設幄而已宋尚舍局有典御奉御等官掌次舍幄帟之事遼南面官殿中司有尚舍局奉御金儀鸞局提點等官或以少府監官兼或兼少府監職掌詳衛尉司守宫署元中尚監掌供內府陳設帳房帟幕車輿雨衣之用員額詳衛尉司守宫署明司設監掌于內侍尚乘局唐置奉御二人直長十人掌內外間廏之馬左右六間一曰飛黃二曰吉良三曰龍媒四曰騊駼五曰駃騠六曰天苑凡外牧嵗進良馬印以三花飛鳳之字飛龍廏日以八馬列宫門之外號南衙立仗馬仗下乃退宋殿中省無尚乘寺凡御馬皆掌于太僕寺遼南面官殿中司有尚乘局奉御金尚廏局有提點使副使等官掌御馬調習牧養隸殿前都點檢司元尚乘局專掌御馬詳見太僕寺明御馬監掌于內侍尚輦局唐置奉御二人直長三人尚輦二人掌輿輦繖扇大朝會則陳于庭大祭祀則陳于廟皆繖二翰一扇一百五十有六既事而藏之宋尚輦局有典御奉御等官掌輿輦之事遼南面官殿中司有尚輦局奉御金尚輦局有使副使等官掌承奉輿輦等事有直長職專典輿屬殿前都點檢司元侍正府有尚飾兼尚輦奉御二人副奉御二人明輿輦之事掌于錦衣衛欽定續通典卷三十
