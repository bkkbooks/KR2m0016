front:
  text: 欽定四庫全書欽定續通典卷一百二十五
  hash: sha256:05c5b934d097900af9b389a0dfb48d46ffdd0c594325665ee0b31db8a8997e9a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0016_WYG_125-1a, image: WYG0641/WYG0641-0429c.png}
body:
  text: 州郡五代周漢隱帝乾祐三年以郭威為鄴都留守天雄軍節度使㑹漢主誅僇大臣並及於威威遂舉兵趨汴尋即帝位代漢稱周世宗奮其雄略西克階成南收江北北奠三關有州一百十有八汴東京洛西京省告成縣入登封按省告成縣據方輿紀要雍太祖廣順元年降京兆府同五府長安萬年縣為次赤縣按此據五代㑹要兖廣順二年罷泰寧軍降為防禦以慕容彥超叛命初平故也按此據五代㑹要沂密青淄齊棣登萊徐宿鄆廣順二年以兖州中都縣來屬按此據五代㑹要曹廣順二年升為彰信軍節度以鄆州𨽻之按𨽻鄆州據五代㑹要濮濟廣順二年九月以鄆州巨野縣置割兖州任城中都單州金鄉等縣𨽻之十二月又割鄆州鄆城縣隸之中都縣却𨽻鄆州按此據五代㑹要宋亳單潁廣順二年復為團練按此據寰宇記陳廣順元年升為防禦二年復為鎮安軍節度以潁州𨽻之按升防禦𨽻潁州據五代㑹要蔡升為防禦按此據寰宇記許汝世宗顯德三年廢臨汝縣按此據五代㑹要鄭滑襄顯德六年廢樂鄉縣入宜城按顯德六年據五代㑹要均房金鄧廣順二年以避諱改為武勝軍節度顯德三年廢菊潭向城二縣按此據五代㑹要隨郢唐顯德三年廢慈邱縣按顯德三年據五代㑹要復安顯德元年廢安逺軍降為防禦以沔州漢川縣來屬按降為防禦據五代㑹要申蒲孟懷晉絳陜虢華顯德元年罷鎮國軍降為刺史直屬京三年以雍州渭南縣來屬按此據五代㑹要商以華州洛南縣來屬同廣順二年廢匡國軍降為刺史按此據寰宇記耀顯德二年罷順義軍降為刺史直屬京按此據五代㑹要環廣順二年改威州曰環州顯德四年降為通逺軍邠顯德五年廢衍州為安平縣來屬尋屬寧州按此據五代㑹要及寰宇記寧以邠之安平縣來屬按此據寰宇記慶廢延慶合水二縣解鄜顯德三年廢咸寧縣按顯德三年據五代㑹要及寰宇記坊丹延夏銀綏宥靈鹽岐隴涇原渭顯德五年廢武州為潘原縣來屬按此據五代㑹要秦成階晉末契丹內侵秦成階三州叛入蜀周顯德二年階州歸順按此據寰宇記鳳顯德六年以固鎮置雄勝軍按此據五代㑹要乾魏顯德元年廢鄴都依舊為天雄軍以貝州之永濟宗城徑城相州之內黃咸安洹水博州之清平七縣來屬其大名府額仍列在京兆府之下按此據輿地考及寰宇記博顯德三年廢武水縣入聊城按顯德三年據五代㑹要貝顯德元年降為防禦按此據五代㑹要衛澶相邢洺磁鎮冀以堂陽縣還屬按此據五代㑹要及寰宇記深置靜安軍節度以冀州武强縣來屬按此據寰宇記趙易祁定顯德四年以深州博野縣來屬按此據五代㑹要寰宇記以為六年與此異滄顯德二年廢景州為定逺軍以縣來屬三年廢長蘆乾符二縣入清池五年以無棣縣置保順軍六年併弓髙縣入東光按此據五代㑹要德顯德二年廢景州為定逺軍割其屬安陵縣來屬按此據五代㑹要濵顯德三年置以其濵海為名初五代之際置𣙜貨場於海傍後為贍國軍周因置州割棣州之渤海蒲臺為屬而治渤海瀛莫雄顯德六年克瓦橋關置州治歸義割易州之容城為屬霸顯德六年克孟津關置州治永清割莫州之文安瀛之大城為屬府顯德元年復為永安軍節度按顯德元年據五代㑹要慈顯德三年廢仵城吕鄉二縣隰澤潞揚唐大都督府淮南節度吳改江都府置興化縣南唐以興化屬泰州又升天長縣為軍六合縣為雄州周復故楚吳順化軍節度周顯德五年降為防禦泗唐末為楊行密所據周世宗伐南唐而取之滁和光黃舒蘄廬吳昭順軍節度周世宗克淮南置保信軍按寰宇記作後唐昭順軍當是先屬吳繼屬南唐寰宇記訛為後唐耳夀唐忠正軍節度南唐改曰清淮周世宗平淮南復曰忠正顯德三年降為防禦四年移治潁州下蔡縣仍以為倚郭以舊夀州為夀春縣按降防禦移治改縣據五代㑹要及寰宇記海泰本唐揚州海陵縣南唐置州以揚州之興化楚州之鹽城來屬周為團練按此據輿地考濠通唐海陵之東境南唐置靜海制置院周世宗克淮南升為靜海軍節度後置通州分其地置靜海海門二縣為屬而治靜海附外屬州幽涿檀薊順營平蔚朔雲應新媯儒武寰以上入契丹欣代嵐石憲麟并汾沁遼按宋史地理志平太原得州十軍一無麟州有隆州又有寶興軍與職方考異謹附識以上入東漢潤常宣歙鄂唐沔州廢入鄂州周顯德五年平淮南以漢陽汄川𨽻安州以漢陽縣置漢陽軍仍析漢陽地置漢川縣以屬焉升池饒信江洪南唐交泰二年建為南都南昌府撫袁吉䖍南唐保大十一年析信豐縣置龍南縣析䖍化石城場置石城縣又升上猶場為上猶縣筠保大十年李景分洪州髙安縣置州以清江萬載上高為屬而治髙安建周顯德五年升歸化場為歸化縣又升松源鎮為松源縣汀劍漳留從效泉留從效周顯德二年以唐小溪場置清溪縣二按宋史地理志平江南得州一十九無漳泉州而職方考統二州為二十一州蓋其時二州為留從效所據僅羈屬南唐非能實有其地也謹附識以上入南唐福周廣順元年升為彰武軍杭越蘇湖周顯德六年升為宣德軍溫台明處衢婺睦秀以上入吳越荆歸峽以上入南平益漢彭蜀綿眉嘉劍梓遂果閬普陵資榮簡邛黎雅維茂文龍黔施夔忠萬興利開通涪渝瀘合昌巴蓬集壁渠戎梁洋以上入蜀潭衡澧朗嶽道永邵全辰按宋史地理志平湖南得州十五曰朗職澧潭嶽衡永辰道邵全奬誠錦溪漵得監一曰桂陽方考不載奬誠以下各州疑有遺漏謹附識以上入周行逢融郴連昭宜桂賀梧䝉嚴富柳象容雍端康封恩春新髙竇雷化韶藤白亷劉鋹增置常樂州欽廣橫賔潯循劉鋹升齊昌縣為府鬱林英雄瓊崖儋萬安羅潘勤瀧辨按唐末嶺南道有州七十南漢時惟交武峩籠環瀼巖古愛長歡峯湯十二州沒於安南南漢僭位除增置英雄二州外又析循州置正州析潮州置敬州後又析亷州置常樂州析循州置齊昌府宋史地理志云平廣南得州六十疑南漢所有實不僅四十七州而職方考或有遺漏謹附識以上入南漢欽定續通典卷一百二十五
