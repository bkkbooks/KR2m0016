body:
  text: 食貨𣙜酤唐德宗貞元二年復禁京城畿縣酒天下置肆以酤者每斗𣙜百五十錢憲宗元和六年京兆府奏𣙜酒錢除出正酒户外一切隨兩稅青苗錢據貫均率從之十二年户部奏准敕文如配戶出𣙜酒錢處即不得更置官店𣙜酤其中或恐諸州府先有不配戶出錢者即須𣙜酤請委州府長官據當處錢額約米麴時價收利應額足即止武宗㑹昌六年敕揚州等八道州府置𣙜麴并置官店酤酒代百姓納𣙜酒錢并充資助軍用昭宗世以用度不足易京畿邊鎮麴法并𣙜酒以贍軍鳯翔節度使李茂貞方専其利按兵請入奏利害天子遽罷之梁太祖開平三年敕聽諸道州府百姓自造麴官中不禁後唐明宗天成三年敕三京鄴都諸道州府鄉村人户今後於夏秋田苖上每畝納麴錢一任百姓造麴醖酒供家其錢隨夏秋徴納其京都及諸道州府縣鎮坊界及關城草市內應逐年買官麴酒户便許自造麴醖酒貨賣長興二年放麴錢官中自造麴逐州減舊價一半在城貨賣除在城居人不得私造外鄉村人户或祇供家用一任私造令下人甚便之周世宗顯德四年敕停罷先置賣麴都務鄉村人户今後並許自造米醋及買糟造醋供食仍許於本州縣界酤賣按吳曾能改齊漫録所𣙜苦酒即醋則五代以前不特𣙜酒即醋亦𣙜也宋𣙜酤之制諸州城內皆置務釀酒縣鎮鄉閭或許民釀而定其課若有遺利所在多請官酤三京官造麴聽民納直以取陳滑蔡潁隨郢鄧金房州信陽軍舊皆不𣙜太宗太平興國初京西轉運使程能請𣙜之所在置官吏局署取民租米麥給釀以官錢市薪槱及吏工奉料所獲無幾而主吏規其盈羡及醖齊不良酒多漓薄至量户太小令酤民被其害太宗知其弊淳化五年詔募民自釀輸官錢減常課三之二使其易辦真宗咸平以後其𣙜酤嵗課如麴錢之制附兩稅均率先是募民掌𣙜太宗雍熙二年詔曰有司請罷杭州𣙜酤使豪舉之家坐専其利貧弱之户嵗責所輸本欲惠民乃成侵擾宜仍舊𣙜酒罷納所均錢真宗天禧四年轉運副使方仲荀言本道酒課舊額十四萬貫遺利尚多乃嵗增課九萬八千貫初著作郎張師德使淮南上言鄉村酒户年額少者望並停廢從之乾興初言者謂諸路酒課所增無有藝極非古者禁羣飲教節用之義遂詔鄉村毋得增置酒場仁宗慶厯間三司言陜西用兵尤資𣙜酤之利請較監臨官嵗課增者第賞之繼令蕭定基王琪等商度利害初酒場有課不登州縣多責衙前或伍保輸錢以充其數景祐後數戒止之英宗治平四年手詔蠲京師酒户所負𣙜錢十六萬緡又江南所增酒場强率人酤酒者禁止神宗熙寧三年詔諸郡遇節序毋得以酒相饋初知渭州蔡挺言陜西有醖公使酒交遺至踰二十驛道路煩苦詔禁之至是都官郎中沈行復言知莫州柴貽範饋他州酒至九百餘瓶用兵夫踰一百人故并諸路禁焉四年令式所刪定官周直孺言在京麴院酒户鬻酒虧額原於麴數多則酒亦多多則價賤賤則損利為今之法宜減數增價使酒有限而必售請以百八十萬斤為定額遇閏則增十五萬斤後乃令外居宗室酒止許於舊官院寄醖哲宗紹聖二年左司諫翟思言諸郡釀酒非沿邊郡者請並復熙寧之數詔熙寧五年以前諸郡不釀酒及有公使錢而無酒者所釀並依熙寧編敇數仍令諸郡所減勿逾百石舊不及數者如舊毋得於例外供饋後又以陜西沿邊官監酒務所課不足乃令邊郡非帥府並酌條制定釀酒數諸將并城寨止許於官務寄釀徽宗大觀四年以兩浙轉運之請官監鬻糟錢别立額比較又詔諸郡𣙜酒之地酒米並别遣倉官督之渡江後屈於養兵隨時增課髙宗建炎三年總領四川財賦趙開遂大變酒法自成都始先罷公帑實供給酒即舊坊場設官主之民以米付之於官自釀計斛輸錢明年遍下其法於四路其課增至六百九十餘萬緡凡官糟四百所私店不與焉於是東南酒額亦日加增先是酒有定價每增須上請是後郡縣始自增而價不一紹興七年以户部尚書章誼等言行在置贍軍酒庫後又改為贍軍激賞庫自軍興以來諸帥擅𣙜酤之利紹興末始歸縣官孝宗乾道元年以浙東西犒賞庫六十四隸三衙輸庫於左藏南庫餘錢充隨年贍軍及造軍器之需焉按宋㑹要大郡課多者除錢之外又有絲絹布之類史志不載或以偶行之法也𣙜醋之制徽宗崇寧二年知漣水軍錢景允言建立學舍請以承買醋坊錢給用詔常平司計無害公費如所請仍令他路準行之初元祐臣僚請罷𣙜醋户部謂本無禁文後翟思請以諸郡醋坊日息用餘悉歸常平至是景允有請故令常平計之徽宗大觀四年詔諸郡𣙜酒之地入出酒米並别遣倉官賣醋毋得越郡城五里外凡縣鎮村並禁其息悉歸轉運司舊屬常平者如故遼制酒稅皆赴納上京遼東新附之地不𣙜酤又禁職官不得擅造酒糜穀有事用酒則有司給文始聽金𣙜酤之法多因宋遼之舊太宗天㑹三年始命𣙜官以周嵗為滿十三年熙宗即位詔公私禁酒世宗大定三年詔宗室私釀者從轉運使鞫治省奏中都酒户多逃以故課額愈虧上曰此官不嚴禁私釀所致也命設軍百人隸兵馬司同酒使副合千人巡察雖權要家亦許搜索奴婢犯禁杖其主百並令大興少尹招復酒户二十七年議以天下院務依中都例改收麴課而聽民酤户部遣官詢問遼東來逺軍南京路新息虞城西京路西京酒使司白登縣達喇部族天城縣七處除稅課外願自承課賣酒上曰自昔監官多私官錢若令百姓承辦庶革此弊其試行之章宗承安五年省奏隨處酒稅務所設杓欄人以射糧軍歷過隨朝差役者充大定中罷去其隨朝應役軍人各給添支錢粟酬之今擬將元收杓欄錢以代添支令各院務驗所收之數百分取三隨課代輸以佐國用泰和中令隨處酒務元額上取三分作糟酵錢又判院務賣酒數各有差嚴禁其數外賣焉其醋稅之法自大定初以國用不足設官𣙜之以助經用後府庫充牣罷之明昌五年又設官𣙜之尋又罷承安三年以國用浩大復𣙜之五百貫以上設都監千貫以上設同監元太宗時立酒醋務坊場官𣙜酤辦課仍以各州府司縣長官充提㸃官隸徴收課稅所後又頒酒麴醋貨條禁世祖至元十六年以大都河間山東酒醋商稅等課併鹽運司二十二年詔免農民醋課又用右丞盧世榮等言罷上都醋課其酒課亦改𣙜酤之制令酒户自具工本官司拘買每石輸鈔二十八年詔江西酒醋之課不隸茶運司福建酒醋之課不隸鹽運司皆令有司辦之二十九年丞相旺扎勒言杭州湖廣所辦酒課輕重不均於是減杭州省十分之二令湖廣龍興南京三省分辦成宗大德八年大都酒課提舉司設槽房一百所九年併為三十所武宗至大三年又增為五十四所其纍朝之課程撥賜諸王公主及各寺者凡九所云臣等謹案明史食貨志及明㑹典諸書獨無酒稅蓋𣙜酤之制起於漢至明代始廢云雜稅唐德宗時以國用不給陳京請借富商錢得五百萬緡以户部侍郎趙贊判度支總京師豪人田宅奴婢之估得八十萬緡又取僦匱納質錢又粟麥糶於市者四取其一長安為罷市後又以軍用不給乃稅間架算除陌其間架法屋二架為間或有宅屋多而無他資者出錢動數百緡除陌法公私給與及買賣每緡留數十錢給他物及相貿易者約錢為率算之市牙各給印紙人有買賣即為署記日合算之文宗開成二年武寧軍節度使薛元賞奏泗口稅場應是經過衣冠商客金銀羊馬斛㪷見錢茶鹽綾絹等一物已上並稅今量其雜稅物請停絶敕行之後唐莊宗同光二年勑歷代以後除桑田正稅外只有茶鹽銅鐵出山澤之利有商稅之名其餘諸司並無稅額僞朝已來通言雜稅有形之類無稅不加為弊頗深今則軍需尚重國力未充猶且權宜未能全去仰所司速簡勘天下州府户口正額墾田實數待慿條理以息煩苛三年勑魏府小菉豆稅每畝與減放三升明宗長興二年勑今後諸州府所納稈草每二十束别納加耗一束充場司耗折三年三司使奏諸道上供稅物充兵士衣賜不足其天下兩稅所納斛斗及錢除支贍外請依時估折納綾羅綿絹從之周太祖廣順二年制牛皮法勑約每嵗民間所輸牛皮三分減二計田十頃稅取一皮餘聽賣買惟禁賣於敵國按自兵興以來禁民私賣買牛皮悉令輸官受直唐明宗之世有司止儐以鹽晉天福中并鹽不給漢法犯私牛皮一寸抵死然民間日用實不可無至是李榖建議均於田畝公私便之宋初詔除五代之制太祖建隆元年詔除滄德棣淄齊鄆乾渡三十九處所監稅錢或水漲聽民置渡勿收其算太宗淳化元年詔諸處魚池舊皆省司管係與民爭利非朕素懷自今池塘河湖魚鴨之類任民採取如經市貨賣乃收稅按先是淮南江浙荆湖廣南福建當僭僞之時江湖及池潭陂塘聚魚之處皆納官錢或令人户占賣輸課或官遣吏主持至是乃詔除之神宗元豐二年導洛通汴司言綱船為商人附載有留阻之弊今洛水至汴無湍駛請置堆垜場於泗州賈物至者先付官場官以船運至京稍輸船算從之又因新法既行悉鬻坊場河渡利析秋毫其最甚者若沿汴州縣創增鎖柵以牟稅利如水磨錢侵街廊房錢廟圖錢掏河金錢諸名雜出不可盡紀至南渡後孝宗淳熙八年詔應稅臨安府及諸路官私房僦不限貫陌十分減三光宗紹熙元年夏議者請令監司州郡寬屬縣無名之取以紓民力以東南多月樁等錢故也又有版帳錢軍興後諸邑皆有之浙中猶甚知嶽州劉俁等議減之遼聖宗統和三年耶律隆運為大丞相以南京嵗不登請免百姓農器錢十五年弛東京魚濼之禁末帝乾統三年弛武清縣陂澤之禁金制租稅之外算其田園屋舍車馬牛羊樹藝之數及其藏鏹多寡徴錢曰物力其外又有鋪馬軍需輸庸司吏河夫桑皮故紙等錢及牛具稅太宗天㑹時詔明安穆昆户每牛一具賦粟一石內地諸路五斗海陵貞元元年以都城隙地賜隨朝大小職官及護駕軍各徴錢有差世宗大定二十九年户部言天下河泊已許與民同利其各處設官可罷之章宗明昌元年正月罷坊場免賃房稅元制有額外課其名三十有二如河泊山場房地租門攤課之類各路皆有定額間亦有詔弛減唯竹木課則河南之懷孟陜西之京兆鳯翔皆有在官竹園立司竹監掌之明初因宋元頗繁瑣務簡約其後增置漸多行齎居鬻所過所止各有稅官司有都稅有宣課有司有局有分司有抽分場局有河泊所所收稅務有本色有折色又有門攤課鈔領於有司仁宗洪熙元年增市肆門攤課鈔凡諸鈔關量舟大小修廣而差其額謂之船料神宗萬厯十一年革天下私設無名稅課凡諸課程始收鈔間折收米已而收錢鈔半後乃折收銀而折色本色輪收本色歸內庫折色歸太倉𣙜茶臣等謹案杜典以𣙜茶叙於雜稅之中蓋唐時茶未盛行故也考新舊唐書食貨志及唐㑹要諸書所載𣙜率之法增稅之令不過因事立文雜諸課稅之內而已是茶稅雖始於唐末而實則用茶者尚少故課𣙜無幾焉至宋以後𣙜茶之制日繁而嵗入之課亦漸增謹别為標目附於雜稅之後唐德宗建中元年納户部侍郎趙贊議稅天下茶漆竹木十取一以為常平本錢時軍用廣常賦不足所稅亦隨盡亦莫能充本儲詔罷之貞元九年復稅茶先是諸道鹽鐵使張滂奏去嵗水災詔令減稅今之國用須有供儲伏請於出茶州縣及茶山外商人要路委所由定三等時估每十稅一充所放兩稅其明年以後所得稅錢外貯若諸州遭水旱賦稅不辦以此代之詔可仍委張滂具處置條目每嵗得錢四十萬貫茶之定稅自此始穆宗時鹽鐵使王播增天下茶稅江淮浙東西嶺南福建荆襄播自領之兩川以户部領之文宗時王涯為相徙民茶樹於官場焚其舊積者後令狐楚代為鹽鐵使復令納𣙜加價武宗即位鹽鐵轉運使崔珙又增江淮茶稅諸道置邸以收稅謂之搨地錢宣宗大中初鹽鐵轉運使裴休請委彊幹官吏於出茶山口及各界內布置把捉曉諭招收量加半稅從之宋𣙜茶之制擇要㑹之地如江陵府真州海州漢陽軍無為軍蘄州之蘄口為𣙜貨務六官自為場置吏總之謂之山場采茶之民謂之園户作茶輸租悉官市之其龍鳯石乳白乳之類十二等以充貢及邦國之用民之飲茶者售於官給其日用謂之食茶出境則給劵商賈貿易付錢或金帛於京師𣙜貨務以射六務十三場茶給劵隨所射與之願就東南付錢及金帛者聽計直於茶如京師之例天下茶皆禁唯川陜廣南聽民自買賣禁其出境凡民茶折稅外匿不送官及私販鬻者禁之茶園荒薄采造不充其數者蠲之當以茶代稅而無茶者許輸他物其雍熙後用兵切於餽餉多令商人賦芻粟塞下酌地之逺近而為其直取市價而厚增之授以要劵謂之交引至京師給以緡錢又移文江淮荆湖給以茶太宗端拱二年置折中倉聽商人輸粟京師優其直給茶於江淮淳化三年監察御史薛映祕書丞劉式等請罷諸𣙜務令商人就出茶州軍官場算買詔以三司鹽鐵副使雷有終為諸路茶鹽制置使廢沿江八務大減茶價詔下商人頗以江路回逺非便有司又以損直虧課為言乃復置八務後又以作坊使楊允恭言禁淮南十二州軍鹽官鬻之商人先賦金帛於京師者及揚州折博務者悉償以茶自是茶無滯積其後輸邊粟者持交引詣京師有坐賈置鋪𨽻名𣙜貨務懷交引者湊之若行商則鋪賈為保任詣京師𣙜務給錢南州給茶若非行商則鋪賈自售之轉鬻與茶賈行之既久至交引愈賤官私俱無利真宗景德二年别為定制增減其價天禧時左諫議大夫孫奭言茶法屢改商人不便非示信之道三司言陜西所中芻糧請量增其直乃從其請後以茶法日壞樞密副使張士遜等請行貼射法其法以十三場茶買賣本息併計其數罷官給本錢使商人與園户自相交易一切定為中估而官收其息然必輦茶至官隨商人所指豫之給劵為驗以防利害故有貼射之名若無人貼射則官市之仁宗天聖三年翰林侍講學士孫奭等言十三場茶積而未售者甚多蓋因許商人貼射則善者悉為商人所得其餘積於官者皆粗惡不時故人莫肯售侵奪官利其弊不可不革乃罷貼射法復令官給本錢後復行見錢法初北商持劵至京師舊發交引鋪為之保任并得三司符驗然後給錢以是京師坐賈率多邀求三司吏稽留為奸乃悉罷之令商持劵徑趣𣙜貨務驗實立償其錢其時茶禁甚嚴蓋官既𣙜茶民私蓄盜販皆有禁乃下詔曰古者山澤之利與民共之故民足於下而君裕於上自唐建中時始有茶禁如聞比來為患益甚朕心惻然念此久矣間遣使者往就問而皆歡然願弛其禁俾通商利歷世之弊一旦以除著為經常勿復更制損上益下以休吾民自是唯臘茶禁如舊餘茶肆行天下矣南渡髙宗建炎初於真州印鈔給賣東南鹽茶三年置行在都茶場捕私茶法視捕私鹽孝宗乾道二年户部言商販至淮北𣙜場折博除輸販引錢外更輸通貨儈息錢至蜀茶變制之法最多宋初經理蜀茶者置互市於原渭德順三郡以市夏人之馬熙寧間又置場於熙河南渡以來文黎珍叙南平長寧階和凡八場率皆良馬以互市為利宋代曲示懷逺之意亦以此羈縻之也金制茶皆貿易於宋界𣙜場世宗大定十六年以私販茶者多乃更定香茶格章宗承安三年以茶靡國用而資敵命設官製之以尚書省令史劉成往河南造茶不親嘗其味民言謂溫桑實非茶也還白上上以為不職罷之左諫議大夫賈鉉上書論山東採茶事大概謂茶樹隨山皆有一切邏護已奪民利因揀茶樹執誣小民取其賄賂宜嚴禁止仍令按察司約束上從之四年淄密寧海蔡州各置一坊造新茶依南方例每斤為袋以商旅未能販運命山東河北四路轉運司付各司縣鬻之買引者納錢及折物各從其便泰和四年上謂宰臣曰比令近侍察新茶知山東河北四路悉樁配於人未免强民按察司當閲實以聞并令每袋減價六年尚書省奏茶飲食之餘非必用之物近來上下俱啜農民尤甚市井茶肆相屬商旅多以絲絹易茶所用不下百萬是以有用之物易無用之物也若不禁止恐消財彌甚遂令七品以上官其家方許食茶仍不得賣及饋獻八年言事者以茶乃宋土草芽而易中國絲綿錦絹有益之物不可國家之鹽貨出於鹵水取之不竭可令易茶省臣議所易不廣遂奏令兼以雜物博易宣宗元光二年省臣以國蹙財少乃奏言金幣錢穀世不可一日缺者也茶本出於宋地非飲食之急而自昔商賈以金帛易之泰和間嘗禁止之後以宋人求和乃罷兵興以來復舉行之然邊民又規利越境私易今河南陜西凡五十餘郡郡日食茶率二十袋所用甚大奈何以有用之貨而資敵乎乃制親王公主及現任五品以上官素蓄者存之禁不得賣餽餘者並禁之元之茶課大率因宋之舊而為之制世祖至元五年用運使白賡言𣙜成都茶於京兆鞏昌置局發賣私自採賣者其罪與私鹽法同六年始立西蜀四川鹽𣙜茶場使司掌之十二年既平宋復用左丞吕文煥言𣙜江西茶繼又定長引短引之法以三分取一長引每引計茶一百二十斤短引九十斤皆收其鈔十七年置𣙜茶都轉運使於江州總江淮荆湖福廣之稅遂除長引専用短引稅額遂增十九年以江南茶課官為置局令客買引通引貨賣至二十一年轉運使言各處食茶課程抑配於民非便於是革之三十年又改江南茶法凡管茶提舉司一十六所罷其課每茶商貨茶必令賫引無引者與私茶同引之外又有茶由以給賣零茶者其由以斤數多寡分為十等成宗元貞元年有獻利者言舊法江南茶商至江北者又稅之其在江南買者亦宜更稅如江北之制於是朝議復增江南課是後制雖屢更唯以增課為能文宗天厯二年始罷𣙜司而歸諸州縣焉至順帝元統二年復立𣙜茶運司江浙河南江西湖廣皆置至正二年李宏陳言𣙜茶之制古所未有自唐以來其法始備國朝既於江州設立𣙜茶都轉運使仍於各路出茶之地設立提舉司七處専任散據賣引規辦國課分司所發據引不能隨期又吏貼需求各滿所欲方能給付據引正課之外又多要取以為分司官吏餽贐之資提舉雖以𣙜茶為名不過為運司官吏營辦資財上行下效勢所必至提舉司既見分司官吏所為如是亦復倣效茶户之苦已不可言至如得據在手碾磨方興吏胥踵門催併初限不知茶未發賣何從得課間有充裕之家别行措辦其力薄者無非典鬻家私以應官限皆由運司給引之遲分司苛取之過茶户情實堪憫宜申明舊制運司宜將據引給付提舉司隨時派散無得停留違者從肅政亷訪司糾治命如所言行之明制有官茶有商茶皆貯邊易馬官茶間徴課鈔商茶輸課略如鹽制初太祖令商人於産茶地買茶納錢請引不及引曰畸零别置由貼給之無由引及茶引相離者人得告捕置茶局批驗所稱較茶引不相當即為私茶凡私茶之制與私鹽同洪武初定令凡賣茶之地令宣課司三十取一四年户部言陜西漢中金州石泉漢陰平利西鄉諸縣茶園四十五頃茶八十六萬餘株四川巴茶三百十五頃茶二百三十八萬餘株宜定令每十株官取其一無主茶園令軍士薅采十取其一以易番馬從之於是諸産茶地設茶課司定稅額陜西二萬六千斤有竒四川一百萬斤設茶馬司於秦洮河雅諸州自碉門黎雅抵朵甘烏斯藏行茶之地凡五千餘里山後歸德諸州西方諸部落無不以馬售者後永寧成都筠連皆設茶局川人故以茶易毛布毛纓諸物以償茶課自定課額立倉收貯専用以市馬民不敢私採課額不足民多賠納四川布政司以為言乃聽民採摘與番易貨又詔天全六番司民免其徭役専令蒸烏茶易馬三十年改設秦州茶馬司於西寧敕右軍都督曰近者私茶出境互市者少馬日貴而茶日賤檄秦蜀二府發都司官軍於松潘碉門黎雅河州臨洮及西畨關口外巡禁私茶之出境者成祖永樂以後其制屢更先是洪武末置成都重慶保寧播州茶倉四所令商人納米中茶宣宗宣德中中茶者赴甘州西寧而支鹽於淮浙商人持文憑恣私販官課數年不完英宗正統初都御史羅亨信言其弊乃罷運茶支鹽例令官運如故以京官總理之初以行人巡茶憲宗成化中改用御史至民饑待賑時仍令商人納粟中茶後因開中茶私造莫遏易馬不利遂停中茶之制至都御史楊一清兼理馬政復議開中言召商買茶官貿其三之一茶五六十萬斤可得馬萬匹帝從其請武宗正德元年一清又建議商人不願領價者以半與商令自賣遂著為例永行焉後户部又以全陜災震邊餉告急國用大絀上言先時正額茶易馬之外多開中以佐公家有至五百萬斤者近者御史劉良卿亦開百萬後止開正額八十萬斤并課茶私茶通計僅九十餘萬宜下巡茶御史議召商多中御史楊美益言饑䘲民貧即正額尚多不足安有贏羡今宜守九十萬斤招畨易馬之規凡通內地以息私販增開中以備賑荒悉宜停罷毋使與馬分利户部以帑藏不足請如𢎞治六年例易馬外仍開百萬斤召納邊鎮以備軍餉詔從之後陜西巡按御史畢三才言課茶徴輸本有定額先因茶多餘積園户解納艱難以此改折今商人絶跡五司茶空請令漢中五州縣仍輸本色招商中五百引可得馬萬一千九百餘匹部議西寧河洮岷甘莊浪六茶司共易馬九千六百匹著為令熹宗天啓時增中馬二千四百匹明初嚴禁私販久而奸弊日生洎乎末造商人多給賞由票使得私行畨人上駟盡併於奸商茶司所市者乃其中下也至産茶之地南直隸常廬池徽浙江湖嚴衢紹江西南昌饒州南康九江吉安湖廣武昌荆州長沙寶慶四川成都重慶嘉定䕫瀘商人中引則於應天宜興杭州三批驗所徴茶課則於應天之江東瓜埠蘇常鎮徽廣德及浙江河南廣西貴州皆徴鈔雲南則徴銀其上供茶天下貢額四千有竒凡供茶第按額以供焉欽定續通典卷十五
