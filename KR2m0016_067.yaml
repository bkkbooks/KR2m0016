初寒盛暑數煩清蹕而紫宸朝嵗中罕御請朔日御文徳既望坐紫宸庶幾正衙内殿朝儀並舉從之髙宗紹興十四年九月有司言明年正旦朝㑹請權以文徳殿為大慶殿合設黄麾大仗五千二十七人欲權減三分之一合設八寳座於御座之東西及登歌宫架樂舞諸州諸蕃貢物行在致仕官諸路貢士舉首並令立班詔從之明年正旦御殿受朝賀如儀遼正旦朝賀儀臣僚並諸國使昧爽入朝奏班齊皇帝升殿坐契丹舍人殿上通訖引契丹臣僚東洞門入引漢人臣僚並諸國使西洞門入合班舞蹈五拜鞠躬平身引親王自東階上殿就欄内褥位俛伏跪自通全銜臣某等祝夀訖下殿復位舞蹈五拜鞠躬宣徽使稱有勑班首以下聽制訖再拜鞠躬宣云履新之慶與公等同之舍人贊謝宣諭拜舞蹈五拜贊各祗候分班引出引班首西階上殿奏表目訖教坊起居賀十二拜畢各祗候引契丹漢人臣僚并諸國使東西洞門入合班再拜親王自東階上殿就欄内褥位搢笏執臺琖進酒訖退復褥位置臺琖出笏少前俛伏自通全銜臣某等謹進千萬嵗夀酒與殿下臣僚皆再拜鞠躬俟宣徽使稱有制親王以下再拜如初儀宣云飲公等酒與公等内外同慶舍人贊謝宣諭如初贊各祇候親王搢笏執臺琖殿下臣僚分班皇帝飲酒教坊奏樂殿上下臣僚皆拜呼萬嵗贊各祗候樂止教坊再拜皇帝卒飲親王進受琖復褥位置臺琖下殿復位合班再拜贊各祗候分班引出皇帝起詣皇太后殿臣僚并諸國使兩洞門入班稱賀進酒皆如皇帝之儀畢引出教坊入起居進酒亦如之按冬至朝賀儀畧同正旦唯帝后並升殿坐與正旦異常朝起居儀昧爽臣僚朝服入朝各依幕次内侍奏班齊先引京官班於三門外當直舍人放起居再拜各祗候依次兩府以下文武官於丹墀内面殿立䜿班諸司并供奉官於東西道外相向立定當直閤使副贊放起居再拜各祗候退還幕次公服帝升殿坐兩府并京官丹墀内聲喏各祗候教坊司同北班起居畢奏事金元旦上夀儀皇帝升御座鳴鞭報時畢殿前班小起居各復位立舍人引皇太子并臣僚使客合班入至丹墀舞蹈五拜平立閤使奏諸道表目皇太子以下皆再拜皇太子升殿就褥位搢笏捧盞盤進酒皇帝受置於案皇太子退復褥位轉盤與執事者出笏二閤使齊揖入欄子内拜跪致辭云元正啟祚品物咸新恭惟皇帝陛下與天同休謹上夀巵伏願皇帝陛下萬嵗萬嵗萬萬嵗祝畢拜興復褥位同殿下臣僚皆再拜宣答曰履新上壽與卿等内外同慶詞畢舞蹈五拜齊立皇太子搢笏執盤臣僚分班教坊奏樂皇帝舉酒殿上下侍立臣僚皆再拜皇太子受虚爵退立褥位轉盤盞與執事者出笏左下殿樂止合班在位臣僚皆再拜分引與宴官上殿次引宋國人從至丹墀再拜不出班奏聖躬萬福再拜唱有勅賜酒食又再拜各祗候平立引左廊立次引髙麗夏人如上儀畢分引左右廊立御果牀入進酒皇帝飲則坐宴侍立臣皆再拜進酒官接盞還位坐宴官再拜復坐行酒𫝊宣立飲訖再拜坐次從人再拜坐三盞致語揖臣使從人立誦口號畢坐宴侍立官皆再拜坐次從人再拜坐食入七盞曲將終揖從人立再拜畢引出聞曲時揖臣使起再拜下殿果牀出至丹墀合班謝宴舞蹈五拜引出按金史禮志無冬至受朝賀之禮惟章宗本紀承安元年十一月戊戌有事於南郊大赦改元己亥曹王永升率親王百官賀然此以南郊禮成受賀非冬至受賀也冬㑹之禮終金之世未行朝參常朝儀及朔望儀准前代制以朔日六日十一日十五日二十一日二十六日為六參日後又定制以朔望日為朝參餘日為常朝國初凡朔望常朝日殿下列衛士簾下置甲兵海陵正隆初去甲兵惟存錦衣弩手百人分立兩階世宗大定二年五月命臺臣定朝參禮除殿前班外若遇朔望自七品以上職事官皆赴其餘朝日五品以上職事官皆赴如左右司員外郎侍御史記注院等官職雖不係五品亦赴朝參凡親王宗室已命官者年十六以上皆隨班赴起居元元正受朝儀前期習儀至期大昕侍儀使引導從䕶尉各服其服入奏外辦皇帝出閤陞輦鳴鞭三侍儀使并通事舍人分左右引擎執䕶尉劈正斧中行導至大明殿外劈正斧直正門北向立導從倒卷序立惟扇置於錡侍儀使導駕時引進使同内侍官引宫人擎執導從入至皇后宫庭報外辦皇后出閤陞輦引進使引導至殿東門外引進使分退押直至堊塗之次引導從倒卷出俟兩宫陞座鳴鞭三劈正斧退立於露階東司晨報時雞唱畢尚引引殿前班皆公服分入日精月華門就起居位相向立通班舍人唱左右衛上將軍兼殿前都㸃檢臣某以下起居尚引引至丹墀拜位知班報班齊行三拜禮都㸃檢稍前宣贊報聖躬萬福都㸃檢復位再拜舞蹈三跪左膝三叩頭山呼三復行三拜禮宣贊唱各恭事兩班㸃檢宣徽將軍分左右升殿宿直以下分立殿前俟后妃諸王駙馬以次賀獻禮畢尚引引丞相以下入就起居位如前通班唱文武百僚開府儀同三司録軍國重事監修國史右丞相具官無常臣某以下起居贊拜舞蹈山呼並如前儀侍儀使詣丞相前請進酒雙引升殿前行樂工分左右引登歌者及舞童舞女以次升殿登歌音中本月之律丞相至宇下褥位立侍儀司分左右北向立俟前行色曲將半舞旋列定通贊唱分班樂作侍儀司引丞相入宣徽使隨至御榻前丞相跪宣徽使立於東南曲終丞相祝贊曰溥天率土祈天地之洪福同上皇帝皇后億萬嵗壽宣徽使答曰如所祝丞相俛伏興退詣進酒位尚醖官以觴授丞相丞相搢笏奉觴北面立宣徽使復位前行色曲舞旋至露階丄教坊奏樂樂舞至第四拍丞相進酒皇帝舉觴宣贊唱殿上下侍立臣僚再拜丞相三進酒畢以觴授尚醖官出笏復位樂止通贊合班禮部官押進奏表章禮物至横階下讀表章官等至宇下跪宣表目畢退降第一重階下立俟讀禮物舍人升階至宇下跪讀禮物目如上儀同降至横階隨表章西行至右樓下侍儀仍領禮物東行至左樓下太府受之贊拜山呼如前儀僧道耆老外國蕃客以次賀禮畢大㑹諸王宗親駙馬大臣宴饗殿上丞相等升殿侍宴四品以上賜酒殿上五品以下賜酒於日精月華門下宴畢鳴鞭三侍儀使導駕帝后還寢殿如來儀按元史禮志無賀冬之禮常朝之典亦未及舉每日宰執入延春閤及别殿奏事而已明太祖洪武二十六年定正旦冬至朝㑹儀先日尚寳司設御座於奉天殿及寶案於御座東香案於丹陛南教坊司設中和韶樂於殿内東西北向翌明錦衣衛陳鹵薄儀仗於丹陛及丹墀設明扇於殿内列車輅於丹墀鳴鞭四人左右北向教坊司陳大樂於丹陛東西北向儀禮司設同文玉帛兩案於丹陛東金吾衛設䕶衛官於殿内及丹陛陳甲士於丹墀至午門外錦衣衛設將軍於丹陛至奉天門外陳旗幟於奉天門外俱東西列典牧所陳仗馬犀象於文武樓南東西向司晨郎報時位於内道東近北糾儀御史二位於丹墀北内贊二位於殿内外贊二位於丹墀北𫝊制宣表等官位於殿内俱東西向鼓初嚴百官朝服班午門外次嚴由左右掖門入詣丹墀東西北向立三嚴執事官詣華蓋殿帝具衮冕陞座鐘聲止儀禮司奏執事官行禮贊五拜畢奏請陞殿駕興中和樂作尚寳司捧寳前行導駕官前導扇開簾捲寳置於案樂止鳴鞭報時贊班齊大樂作行四拜禮樂止典儀唱進表樂作給事中二人詣同文案前導引序班舉案由東門入置殿中樂止宣目官跪宣訖展表官取表宣表官至簾前衆官皆跪宣表訖序班舉表案於殿東衆官皆跪代致詞官跪丹陛中致詞云具官臣某兹遇正旦三陽開泰萬物咸新冬至則云律應黄鐘日當長至恭惟皇帝陛下膺乾納祜奉天永昌賀畢衆官皆俯伏興樂作四拜興樂止𫝊制官跪奏𫝊制由東門出至丹陛東向立稱有制贊禮唱跪宣制云履端之慶冬至則云履長之慶與卿等同之贊禮唱俯伏興搢笏三舞蹈山呼百官拱手加額呼萬嵗三出笏俯伏興樂作四拜興樂止侍儀奏禮畢中和樂作鳴鞭駕興尚寳官捧寳導駕官前導至華盖殿樂止百官以次出世宗嘉靖十六年改設蕃國貢方物案於丹陛中道左右定時鼓於文樓上大樂陳奉天門内其常朝御殿儀凡早朝文官自左掖門入武官自右掖門入如華盖殿朝至鹿頂外東西序立鳴鞭訖守衛官至鹿頂内行禮訖就侍立位各衙門官以次行禮訖有事奏者入奏事無事奏者四品以上及應升殿者入殿内侍立五品以下官出至鹿頂外列班北向立候鳴鞭以次出如奉天殿朝俱於華盖殿行禮奏事畢五品以下官詣丹墀依品級列班重行北向立四品以上及翰林院官給事中監察御史等官於中左中右門伺候鳴鞭各詣殿内立候朝退捲班以次出如先於奉天殿朝後却奏事者文武官於丹墀内依品級重行北向立候鳴鞭行禮訖四品以上及翰林院官給事中監察御史等官陞殿侍立五品以下仍前序立候謝恩見辭人員行禮訖鳴鞭捲班退有事奏者於奉天門或華盖殿進奏無事奏者以次出穆宗隆慶元年都給事辛自修等以朝儀乆曠班行不肅請令禮官考議成式禮部禮科㑹議國初定制百官以品序立其後更定又有不拘於品者如内閣官錦衣衛升立寳位之東西翰林學士列於僉都御史之上其他翰林官不論品級叙於京堂之内科道官自為一等列於部屬之先及鴻臚寺尚寳司列於西階三科六道與東班對侍雖若次序參錯然或以顧問糾察或以奉事承㫖莫不有因難以輕改今後常朝悉如此例其餘官員仍依品級崇卑衙門次序為例如有紊越聽糾儀官糾奏從之神宗萬厯三年令常朝日記注起居官四人列於東班給事中上稍前以便觀聽午朝則列於御座西稍南時大學士張居正奏國初設起居注官日侍左右實古者左史記事右史記言之制後定官制乃設翰林院修撰編修檢討等官盖以記載事重設官加詳原非有所罷廢而自職名更定遂失朝夕記注之規以致累朝史文闕畧臣等仰稽成憲凡常朝御皇極門每日輪該記注起居並史官共四人列於東班各給事中之上午朝御㑹極門列於御座西稍南專記言動詔依擬行欽定續通典卷六十七
