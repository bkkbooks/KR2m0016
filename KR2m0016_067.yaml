body:
  text: 禮嘉養老五代宋遼金元明後唐莊宗同光元年四月制曰諸道管内有髙年踰百嵗者便與給復永俾除名自八十至九十者與一子免役州縣不得差徭晉髙祖天福二年四月詔天下百姓有年八十以上者與免一丁差徭仍令逐處簡署上佐官宋制養老於太學皇帝服通天冠絳紗袍乗金輅至太學酌獻文宣王三祭酒再拜歸御幄比車駕初出量時刻遣使迎三老五更於其第老更俱朝服乗安車導從至太學就次國老庶老有司預戒之各服朝服集於其次大樂正帥工人二舞入立於庭東上百官宗室客使學生等以次入就位太常博士贊三老五更出次引國老庶老立於後重行異位禮直官通事舍人引左輔奏請中嚴少頃又奏外辦皇帝出大次侍衛如常儀大樂正令撞黄鐘之鐘右五鐘皆應宫架乾安之樂作皇帝即御座樂止典儀曰再拜在位官皆再拜三老五更杖而入各左右二人夾扶太常博士前引史臣執筆以從老更入門宫架和安之樂作至宫架北北面立東上奉禮郎引羣老隨入位於其後樂止博士進揖三老在前五更在後仍杖夾扶宫架和安之樂作至西階下樂止博士引老更自西階升堂國老庶老立於堂下老更當御座揖羣老亦揖皇帝為興奉禮郎揖國老升博士引老更奉禮郎揖國老以下各於席後立典儀贊各就坐贊者承𫝊宫架尊安之樂作三老五更就坐三公授几九卿正履訖殿中監尚食奉御進珍羞及黍稷等先詣御座前進呈遂設於三老前樂止尚食奉御詣三老座前執醬而饋訖尚醖奉御詣酒尊所取爵酌酒奉於三老次太官良醖令以次進珍羞酒食於五更羣老之前皆食大樂正引工人升登歌奏惠安之樂三終史臣記録三老所論善言善行宫架作申安之樂憲言成福之舞畢文舞退作受成告功之舞畢三老以下降筵博士引老更當御座前奉禮郎引羣老復位俱揖皇帝為興老更降階至堂下宫架和安之樂作出門樂止禮直官通事舍人引左輔前奏禮畢退復位典儀贊拜訖皇帝降座太常卿導還大次百僚以次退車駕還宫三老五更升安車導從還翼日詣闕表謝太宗淳化四年二月召賜京城髙年帛百嵗者一人加賜塗金帶真宗咸平二年十一月賜京城父老衣帛十二月駐蹕澶州賜澶州父老錦袍茶帛大中祥符三年閏二月詔赤縣父老本府宴犒年九十者授攝官賜粟帛終身八十者爵一級遼聖宗統和十六年六月詔婦人年踰九十者賜物太平四年二月詔賜諸宫分耆老食金世宗大定二十五年四月詔㑹寧府百姓年七十以上者補一官九月次希沙河賜百嵗老嫗帛元成宗大徳九年六月詔賜髙年帛八十者一匹九十者二匹親年七十别無侍丁者從近遷除時立皇子徳壽為皇太子順帝至正元年十二月詔民年八十以上者䝉古人賜繒帛二表裏其餘州縣旌以髙年耆徳之名免其家雜役明太祖洪武元年詔民年七十以上者許一丁侍養與免雜泛差役五年詔中外學宫行養老之禮十九年詔所在有司審耆老不係𨽻卒倡優年八十九十鄰里稱善者備其年甲行實具狀奏聞貧無産業者八十以上月給米五斗肉五斤酒三斗九十以上嵗加給帛一匹絮五斤雖有田産僅足自贍者所給酒肉絮帛亦如之其應天鳯陽二府富民年八十以上賜爵里士九十以上賜爵社士皆與縣官平禮並免雜差正官嵗一存問著為令世宗嘉靖中祭酒吕柟據開元禮參定視學養老儀注嵗季春之月擇吉日行養老禮有司先奏定三師三少致仕者用徳行年髙一人為三老次一人為五更三品上下年徳髙卲者為羣老併開具致政之老與其孤姓名事狀以聞前期一日祭先師孔子遣官行禮如丁祭儀又設先老位於廟門前至日黎明鼓徴警衆設六佾駕出宫至太學𫝊制迎三老五更於其第老更俱朝服乗安車導從如常儀擇史官二人充惇史朝服從之其羣老及致政之老則有司先戒之宿於太學以俟駕至太學堂上命官釋奠於先老禮畢太常卿導帝入御幄易冠服出升御座執大圭協律郎跪俯伏舉麾金奏姑洗之均樂止太常卿導三老五更皆杖各二人夾扶惇史執筆以從自西階升堂帝與揖遜欲拜三老五更去杖攝齊皆稽首遜辭帝不果拜乃揖就座老更皆坐三公授几九卿正履進珍羞及黍稷等帝省之遂設於老更前工升歌鹿鳴三終太常卿引帝詣三老座前以大圭授侍臣執醬而饋訖有司以次進珍羞酒食於五更前又設酒食於羣老前太常卿引帝詣酒尊所取爵贊酌酒訖引詣三老座前執爵而酳訖帝即座三老以下皆坐光禄卿進酒上飲酒三老以下坐食飲酒各三爵笙入三終光禄卿進加餚羹飲酒各三爵間歌三終三老乃論父子君臣長㓜之道治政之要五更飲亦如之帝俱虚躬聽受惇史録之乃大合六樂羽舞大韶以雲門咸池合之干舞大武以大夏大濩合之帝興冕而總干三老以下皆興稽首遜辭帝復即座三老以下皆復坐飲酒各三爵樂九變畢太常卿跪奏樂闋致政之老與其孤館於門外者飲食畢皆入侍制命有司曰養爾老㓜毋違朕命三老以下趨出賜三老五更襲衣冠帶牢醴綵帛其餘帛衣米肉三老以下序立於庭皆拜三稽首興分班序立有司奏禮畢駕還宫明日三老率五更以下詣闕表謝按吕柟詳定儀注明世迄不果行異姓為後議宋宋張栻曰原民之生與萬物並於天地之間父天而母地本一而已而於其身莫不有父母之親兄弟之愛以至於宗支之屬釐分縷析血脉貫通分雖殊而本實一此性之所具而天之所為也聖人有作立姓以别其系嚴宗以謹其承亦因夫性之自然理之所不可易者而已茍强離其所系而合於其所不可合是豈性也哉是故神不歆非祀民不祀非族以此防民而春秋之時猶有身為諸侯而立異姓以涖祭祀如鄫子之為者聖人書之曰莒人滅鄫謂其先無血食之理也豈不深切著明哉讀時令唐宋唐徳宗貞元六年制四孟月迎氣之日令所司宣讀時令文宗太和八年六月中書門下奏天寳後盛典乆廢請來年正月依舊禮讀時令命太常撰儀注宋仁宗景祐四年三月詔五月朔行入閣之儀仍讀時令先是詔國朝時令委編修官約唐月令撰定以備宣讀於是賈昌朝等采國朝律厯典禮日度昬曉中星及祠祀配侑諸事當以嵗時施行者改定一篇上之遂詔因入閣行其禮後亦不果行徽宗初建明堂禮制局請御明堂正南向之位布政則隨月而御堂又請以每嵗十月於明堂受新厯退而頒之郡國政和七年詔頒朔布政自十月為始是月一日帝御明堂平朔左个頒天運政治及八年戊辰嵗運厯數於天下自是毎月御明堂布是月之政先是羣臣五上表請負扆聽朝詔勿允至是復再請始從之十一月一日帝御明堂南面以朝百辟退坐於平朔頒政其禮百官朝服立明堂下乗輿自内殿出負斧扆坐大晟樂作百官朝於堂下大臣升階進呈所頒時令左右丞一員跪請付外施行宰相承制可之左右丞乃下授頒政官頒政官受而讀之訖出閤門奏禮畢百官乃退自是以為常宣和元年蔡京言周觀治象於正月之始和以十二月頒告朔於邦國皆不在十月後世以十月者祖秦朔故也今請以季冬頒嵗運於天下詔自今以正月旦進呈宣讀四年二月太常王黼編類明堂頒朔布政與詔書條例氣令應驗凡六十二冊上之欽宗靖康元年罷頒朔布政元正冬至受朝賀朔望朝參及常朝日附元唐明五代宋遼金唐文宗開成元年正月詔以入閤日次對官班退立於東階松樹下須宰臣奏事畢齊至香案前各言本司事左右起居又待次對官奏事畢方出武宗㑹昌二年中書門下奏元日御含元殿百官就列惟宰相及兩省官皆於未索扇前立欄檻内及扇開便侍立於御前三朝大慶萬邦稱賀唯宰相侍臣同介曺武夫竟不拜至尊而退酌於禮意事未得中請御殿日昧爽宰相兩省官對班於香案前俟扇開通事贊宰相兩省官再拜訖升殿侍立從之昭宣帝天祐二年十二月勅漢宣帝中興五日一聽朝厯代通規永為常式近代不循舊儀輟隳制度須守舊規以循定制宜毎月只許一五九日開延英計九度其入閤日仍於延英日一度指揮如有大段公事中書門下具牓子奏請開延英不計日數付所司時又勑宫嬪女職本備内任近年以來稍失儀制宫人出内宣命寀御參隨侍朝乃失舊規須為永制今後每遇延英坐朝日只令小黄門祇候引從宫人不得擅出内門庶循典儀免至紛雜後唐莊宗同光元年十二月中書門下奏毎日常朝百官皆拜獨兩省官不拜准本朝故事朝退於廊下賜食謂之廊飡百僚遂有謝食拜惟兩省官本省有厨不赴廊飡故不拜竊以終日趨朝曽不一拜獨於班列有所異同未為合禮若言官是近臣尤宜肅敬今後逐日常朝除職事官押班不拜外其兩省官與東西兩班並齊拜從之二年正月庚子朔帝衮冕御明堂殿受朝賀太常樂左右金吾仗六軍諸衛如常儀明宗天成元年十一月癸亥日南至帝御文徳殿百僚稱賀三年十月中書奏按貞元四年中書侍郎李泌奏冬至日受朝賀請凖元日從之十一月癸酉冬至帝御崇元殿受朝賀仗衛如式天成元年五月勑本朝舊日趨朝官置待漏院候子城門開便入立班如遇不坐前一日晩便宣來日兩衙不坐其日纔明閤門立班便宣不坐百官各退歸司近年以來雖遇不坐正殿或是延英對宰臣或是内殿親决機務所司不循舊制往往及辰巳之時尚未放班今後若遇不坐日未御内殿前便令閤門使宣不坐放朝退班長興元年二月郊祀畢勑宜放兩日朝叅以百官行事之勞故也五月詔諸州得替防禦團練使刺史並宜於班行比擬如未有員闕可隨常叅官逐日立班晉髙祖天福二年正月甲寅朔帝御文明殿受文武百僚朝賀四年十二月禮官奏嵗正旦王公上壽皇帝舉酒奏元同之樂再飲三飲並奏文同之樂三飲訖羣臣再拜樂奏大同㽔賔之鐘左右皆應是月又奏正旦宫懸歌舞未全且請雜用九部雅樂歌聲坊法曲從之五年冬十一月冬至帝御崇元殿受朝賀始用二舞帝舉觴奏元同之樂登歌奏文同之樂舉食文舞歌昭徳之舞武舞歌成功之舞少帝開運元年十一月吏部侍郎張昭逺奏文武常參官毎日於正衙立班閤門使宣不坐後百僚俱拜舊制惟押班宰相押樓御史通事舍人各縁提舉贊揚所以不隨庶官俱拜自唐天成末議者不悉朝儀遽違舊典請依天成三年以前禮例施行殿中侍御史賈元珪奏通事舍人居贊導之職押樓御史當糾察之司一則示於紀綱一則防於謬誤俾令不拜雅合其宜宰相押班儀型文武統冠羣僚所宜列拜不得比贊導之職糾察之司致乖禮意帝從之周太祖廣順三年正月壬子朔帝御崇元殿羣臣朝賀樂縣仗衛如常儀班退太祖御永福殿羣臣百僚稱觴獻壽舉教坊樂世宗顯徳四年二月詔文武百僚起今後毎遇入閤日宣賜廊飡八月乙夘帝御崇元殿文武百官入閤如儀既罷賜百官廊飡時帝御廣徳殿西樓以觀命中黄門閲視酒饌無不腆宋承前代之制以元日五月朔冬至行大朝㑹之禮太祖建隆二年正月朔始受朝賀於崇元殿按崇元殿宋史作崇文殿今據通考輯服衮冕設宫縣仗衛如儀仗退羣臣諸王太后宫門奉賀帝常服御廣徳殿羣臣上壽用教坊樂五月朔受朝賀於崇元殿帝服通天冠綘紗袍宫懸儀仗如元㑹儀乾徳三年冬至受朝賀於文明殿四年冬至朝元殿受朝畢常服御大明殿羣臣上壽始用雅樂登歌二舞羣臣酒五行而罷太宗淳化三年正月朔命有司約開元禮定上壽儀皆以法服行禮設宫懸萬舞酒三行而罷仁宗天聖四年十二月詔明年正月朔先率百官赴㑹慶殿上皇太后壽畢乃受朝天安殿仍令太常禮院修定儀制五年正月朔曉漏未盡二刻宰臣百官