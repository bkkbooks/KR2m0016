body:
  text: 刑詳讞唐五代宋遼金元明唐代宗寶應三年詔天下刑獄須大理正斷刑部詳覆不得中書門下即便處分憲宗元和時鹽鐡轉運諸院擅繫囚笞掠嚴楚人多死給事中穆質奏請與州縣吏參決自是不寃後唐莊宗令曰議獄恤刑比求寃濫頑民下輩輕侮憲章茍非五聽之通明何辨二門之邪正今後法司疑獄豫自據格令決之此法既行雖親無赦明宗天成時詔天下諸州府官有善推疑獄及曽雪寃濫者具姓名聞奏别加甄奬又戒諸道州府凡有極刑須仔細裁遣時因京師巡檢軍使渾公兒口奏有百姓二人以竹竿習戰鬬之事帝付石敬瑭處置敬瑭殺之次日知是小兒為戲帝乃自咎失刑減常膳十日奪敬瑭俸公兒削職杖流故有是詔晉髙祖天福三年詳定院奏前守洪洞縣主簿盧璨進策云尚書省分職六司天下謂之會府請諸道決獄凡大辟罪人逐季具有無申報刑部仍具録案款事節并判獄官名銜申聞或有案內情繇不圓刑部可行覆勘非惟免有銜寃抑亦勸其立政詔從其請又下詔曰刑獄之難古今所重但關人命實動天心或有寃魂則傷和氣凡有囚徒據推勘到案款一一盡理仔細簡律令合格敕其間或有疑者準令又讞大理寺亦宜申尚書省省寺明有指歸州府然後決遣武行德守洛京時方厲鹽禁有能捉獲一斤已上者必加厚賞不逞之徒往往以私鹽中人嘗有村童負菜入城途中值一尼自河陽來與之偕行去城近尼輒先入既而門司搜閲村童於菜籃中獲鹽數斤遂繫之詣府行德取其鹽視之裹以白絹手帕而香氣襲人驚曰吾視村童弊衣百結何處得薰香帕子必是姦人為之爾因詰以與何人偕行村童具以告行德喜曰吾得之矣此必天女寺尼與門司關通以來求賞也捕訊事果連門司村童得白自是官吏畏服不敢欺京邑肅然吳越錢惟濟治獄明辨知絳州民有條桑者盜奪桑不能得乃自創其臂誣桑主欲殺人久繫不能辨惟濟取盜與之食視之盜以左手舉匕筯惟濟曰以右手創人者上重下輕今汝創特下重正用左手傷右臂非汝自為之耶辭遂服宋太祖建隆三年定大辟詳覆法令諸州録事參軍司法掾同斷獄開寶三年詔諸道州府應大辟罪決訖録其案朱書格律斷辭禁儀月日官典姓名以聞委刑部覆視尋如舊制大理寺詳勘而後覆於刑部又慮刑部大理寺之失别置審刑院讞之按五代用兵以來藩侯跋扈多枉法殺人朝廷務行姑息之政率置不問刑部按覆之制遂廢至是乃下詔著令又按宋史刑法志載是詔亦作建隆三年今從文獻通考太宗嘗躬親聽斷時有開封寡婦劉使婢詣府訴其夫前室子王元吉毒已將死右軍巡推不得實移左軍巡掠治元吉自誣伏俄劉死及府中慮囚移司録司按問以其毒無顯狀纍月未決會元吉妻張擊登聞鼓稱寃帝召問張盡得其狀立遣中使捕元推官吏付御史鞫乃劉有姦狀慙悸成疾懼其子發覺而誣之推官及左右軍巡使等削罰有差醫工詐稱被毒劉母弟欺隱王氏財物及推吏受贓者並流海島太平興國六年詔曰諸州大獄長吏不親鞫胥吏旁緣為姦逮捕證佐滋蔓踰年而獄未具自今長吏每五日一慮囚情得者即決之雍熙元年令諸州十日一慮囚又諭輔臣曰御史臺閣門之前四方綱準之地頗聞臺中鞫獄御史多不躬親垂簾雍容以自尊大求無寃濫豈可得也乃詔御史鞫獄勿得任胥吏尋又詔獄無大小中丞已下皆臨鞫不得專責所司時有開封女子李嘗擊登聞鼓自言無兒息身且病一旦死家業無所付請詔本府隨所欲裁置之李無他親獨父在有司因繫之李又詣登聞訴父被繫狀帝駭曰此事豈當禁繫輦轂之下尚或如此天下至大安得無寃濫乎即日遣殿中侍御史李範等十四人分往江南兩浙四川荆湖嶺南審決刑獄吏之弛怠者劾其罪以聞其明敏無滯者亦以名上三年置刑部詳覆官六員專閲天下所上案牘置御史臺推勘二十人凡諸州有大獄則乘傳就鞫羣臣受詔鞫獄獄既具騎置來上有司斷已復騎置下之州凡上疑獄詳覆之而無疑狀官吏並同違制之坐其應奏疑案亦騎置以聞又因判刑部李昌齡言令大理寺所斷案牘寺官印署送刑部詳覆得當則送寺共奏否則疏駮以聞端拱中敵犯邊郡北面部署言文安大城二縣監軍段重誨等棄城遁請論以軍法帝遣中夜就斬之既行追謂曰此得非所管州軍召之耶往訊之乃決使至果訊得乾寧牒令部送民入居城非擅離所部也乃得釋淳化二年置諸路提點刑獄司凡管內州府十日一報囚帳有疑獄未決即馳傳往視州縣稽留不決按讞不實聽劾治次年尋罷以其事歸轉運司真宗景德三年復設復置審刑院於禁中兼置詳議官六員凡獄上先逹審刑院印訖付寺部斷覆以聞乃下審刑院詳議申覆裁決訖以付中書省當即下之其未允宰相覆奏始命論決至道二年帝聞諸州所斷大辟獄情可疑者懼為有司所駮不敢上其獄乃詔死罪有可疑者具獄申轉運司擇部內詳練格律者令決之須奏者乃奏時向敏中為西京推官有僧暮過村民家求寄止主人不許求寢於門外車箱中許之夜有盜入其家自牆上扶一婦人并囊衣而出僧適見之自忖不為主人所納宿今亡其婦及財及明必執我詣縣官矣因夜亡去走荒草中忽墮眢井則婦人已為盜所殺先納其中矣明日主人搜訪得之井中執以詣縣掠治僧自誣與婦姦誘與俱亡恐為人所得故殺而投之井暮夜失足亦墮井中贓在井傍不知何人持去獄成言府府皆不疑敏中獨疑其無贓引僧詰問數四乃以實對敏中密遣吏訪其賊吏食於村店店嫗問僧獄何如吏紿之曰昨已笞死矣嫗曰今獲賊當何如吏曰已誤決雖獲賊不問也嫗太息曰實村少年某甲所殺也吏就掩捕獲之案問具伏追得其贓一府咸以為神同州富民家小女奴亡不知所之奴父母訟於州命録事鞫之録事嘗貸錢於富民不豫乃劾富民父子三人殺女奴棄水中亡其尸富民不勝搒掠遂誣服獄上州官審覆無異推官錢若水獨疑之留其獄録事語頗侵錢知州亦屢促之俱不應一日若水詣州屏人言曰所以留其獄者密使人訪求女奴今得之矣因密送女奴於知州所知州大驚立呼女奴父母問曰今若見女識之乎曰吾女也安得不識遂出示之父母泣曰是也乃引富民父子破械縱之邵煜為連州録事參軍州將楊全誣部民十三人為劫盜欲置之死煜察其枉不肯書牘白全願劾其實再繫獄按驗得實民由是獲免全坐廢真宗景德三年文獻通考作元年詔諸道州軍斷獄內有宣敕不定刑名止言當行極斷者所在即置大辟頗乖平允自今凡言處斷重斷極斷決配朝典之類未得論決具獄以聞大中祥符二年詔御史臺開封府及在京凡有刑按之處令特置司糾察凡徒已上即時具收禁移報內未盡理及淹延者追取欵詞詳閲駮奏咸平間有三司軍將趙永昌者素凶暴督運江南多為姦贓知饒州韓昌齡亷得其狀乃移轉運使馮亮坐決停職遂撾登聞鼓訟昌齡與亮謗訕朝政仍偽刻印作亮等求解之狀帝察其詐於便殿自臨訊永昌俯首屈伏遂斬之釋亮不問仁宗即位用刑尤慎天聖四年詔曰朕念生齒之繁抵冒者衆法有髙下情有輕重而有司巧避微文一切致之重辟豈稱朕好生之意哉其令天下死罪情理可矜及刑名疑慮者具案以聞有司毋得舉駮其後雖法不應奏吏當坐罪者審刑院貼奏率以恩釋為例名曰貼放吏始無所牽制請讞者多得免死矣刑部分四按大辟居其一月覆大辟不下二百數而詳覆官才一人明道二年令四按分覆大辟有能駮正死罪五人已上嵗滿改官法直官與詳覆官分詳天下旬奏獄包拯知天長縣民有訴牛為盜割其舌去者無主名拯曰誰為知而牛舌者若苐歸殺而鬻之何告為俄而有告私宰者拯笑曰奈何割某家牛舌又告之耶盜大驚伏罪時私宰禁重讐者割牛舌以逞忿計牛主且當宰殺乃復告之也閬州大姓雍子良殺人買里民使出就吏獄具知州朱夀昌得其情引囚訊之囚服如初乃告之曰吾聞子良遺汝錢十萬納汝女為子婦許以女妻汝子有諸囚色動又告之曰汝且死書偽劵抑汝女為婢指十萬為雇直而嫁汝女也奈何囚痛哭以實告收子良付法宣州有殺人囚將抵死判官胡宿訊疑之囚畏箠楚垂首不言辟左右問之曰農夫也旦將之田縣吏縛赴官懵莫知其繇宿大駭亟取獄辭翻閲知婦人與吏私殺其夫而執平民以告也一訊而伏魯有開守金州有蠱毒獄坐死幾十人有開曰欲毒人衷謀之可矣安得若是衆者訊之果誣神宗元豐元年帝以國初廢大理獄為非乃下詔曰大理有獄尚矣今中都官有所劾治皆寓繫開封諸獄囚既猥多難於隔訊盛夏疾疫轉至瘐死或主者異見輒淹嵗時不決朕甚愍焉其復大理獄應三司諸寺監吏犯杖笞不俟追究者聽即決餘悉送大理獄其應奏者並令刑部審刑院詳斷應天下奏按亦上之哲宗元祐三年罷紹聖三年復設時韓晉卿為大理正諸州請讞大辟執政惡其多將劾不應讞者晉卿曰聽斷求所以生之仁恩之至也茍讞而獲譴後不來矣帝然其言六年刑部言舊詳斷官分公案訖主判官論議改正發詳議官覆議有差失問難則書於簡尾送斷官改正主判官審定然後判成自詳斷官歸大理為評事司直議官為丞所斷案草不由長二類多差忒乃定制分評事司直與正為斷司丞與長二為議司凡斷公案正先詳其當否論定則簽印注日移議司覆議有辨難乃具議改正長二更加審定然後判成録奏時元絳以江寧推官攝上元令民有甲與乙被酒相毆擊甲歸卧夜為盜斷足妻稱乙告里長執乙詣縣而甲已死絳敕其妻曰歸治而夫喪乙已伏矣隂使信謹吏迹其後妻望一僧迎笑切切私語絳命取僧縶廡下詰妻姦狀即吐實人問其故絳曰吾見妻哭不哀且與傷者共席而𥜗無血汚是以知之後知永新縣豪子龍聿誘少年周整飲博以技勝之計其資折取上腴田立劵久而整母始知之訟於縣縣索劵為證則母手印存弗受又訟於州於使者擊登聞鼓皆不得直絳至母又來訴絳視劵呼謂聿曰劵年月居印上是必得周母他牘尾印而撰偽劵續之耳聿駭謝即日歸整田楊汲為趙州司法參軍州民曹潯者兄遇之不善兄子亦加侮焉潯持刀逐兄子兄挾之以走潯曰兄勿避自為姪爾既就吏兄子云叔欲紿吾父止而殺之吏當潯謀殺兄汲曰潯呼兄使勿避何謂謀若以意為獄則民無所措手足矣州用其言讞上潯得不死哲宗時陸佃知江寧府句容人盜嫂而殺其兄别誣三人同謀既皆訊服一囚父以寃訴通判已下皆曰彼怖死耳獄已成不可變佃為閲實三人者皆得生高宗紹興二十九年令殺人無證尸不經驗之獄具案奏裁委提刑審問如有可疑及翻異從本司差官重勘案成上本路移他監司審定具案聞奏否則監司再遣官勘之又不伏復奏取旨先是有司建議外路獄三經翻異在千里內者移大理寺刑部以為非祖宗法遂釐正之孝宗究心庶獄每嵗臨軒慮囚率先數日令有司進款案披閲然後決遣法司更定律令必親為訂正紹興法鞫獄官推勘不實故有不當者一案坐之乾道法又恐有移替事故者即至淹延乃令先決罪人不當官吏案後收坐七年所司請更定死罪依紹興法餘依乾道施行從之其後有司以覆勘不同則前官有失入之罪往往雷同前勘帝知其弊十四年詔特免一案推結一次於是小大之獄咸得其情又詔凡本路纍嘗差官鞫勘猶稱寃者惟檄鄰路如尚翻異則奏裁先是諸州翻異之囚既經本州屢勘次檄鄰路或再翻異乃移隔路至有越兩路者官吏旁午於道逮繫者困於追對故有是詔光寧之際劉宰為泰興令鄰邑有租牛縣境者租户於主有連姻因喪會竊券而逃他日主之子征其租則曰牛鬻久矣子纍年訟於官無劵可質官乂以異縣置不問至是訴於宰宰曰失牛十載安得一旦復之乃召二丐者勞而語之故託以他事繫獄鞫之丐者自詭盜牛以賣遣詣其所驗視租户曰吾牛因某氏所租丐者辭益力因出劵視之相持以來盜劵者憮然為歸牛與租富室亡金叉惟二僕婦在置之有司咸以為寃宰命各持一蘆曰非盜叉者詰朝蘆當自若果盜則長於今二寸明旦視之一自若一去其蘆二寸矣即訊之果伏其罪有姑訴婦不飬者二召二婦并姑置一室為餉其婦而不及姑徐伺之一婦每以已饌饋姑姑猶呵之其一反之如是纍日遂得其情理宗淳祐十年諭輔臣曰在法詞訴者須經次第官司其臺部受詞所當參酌兩造豈宜遽憑單詞剖決致使所屬觀望曲直倒置可令御史臺及刑部遵守景定元年詔曰比詔諸刑提司取翻異駮勘之獄從輕斷決而長吏監司多不任責又引奏裁甚者十餘年不決仰提刑司守臣審勘或前勘未盡委有可疑除命官命婦宗婦宗女及合用蔭人奏裁外其餘斷訖以聞官吏特免收坐一次遼太祖初年諸部新附文法未備康默記𨽻麾下一切畨漢相涉事委令折衷默記推析律意論決輕重不差毫釐罹禁網者人人自以為不寃七年詔曰朕自北征已來四方獄訟積滯頗多今休戰息民羣臣其副朕意詳決之無或寃濫乃命北府宰相蕭逹魯等分道疏決而以韓知古領焉穆宗朝諸王多坐反逆知軍國事蕭哈里逹政體每被命按獄多得其情人無寃者聖宗統和中敕諸處刑獄有寃不能申雪者聽詣御史臺陳訴委官覆問往時大理寺獄訟凡關覆奏者以翰林學士給事中政事舍人詳決至是始置少卿及正主之猶慮其未盡嘗親為録囚數遣使分詣諸道審決寃滯如邢抱朴之屬所至平反帝嘗微服出獵識耶律罕巴有長才會南京疑獄久不決命罕巴馳驛審録罕巴量情處理人無寃者興宗重熙十二年詔諸路上重囚遣官詳讞道宗咸雍四年詔左伊勒希巴曰比詔外路死刑聽所在官司即決然恐未能悉其情或有枉者自今雖已款伏仍令附近官司覆問無寃然後決之有寃者即具以聞時御史中丞耶律儼武定軍節度使竇景庸崇德宫使蕭托斯和審決寃獄多稱平允昭懷太子之難窮治黨與多所牽引知雜事御史左企弓辨析其寃免者甚衆出為中京副留守按刑遼陽有獄本輕而入之重者已奏待報企弓釋之以聞金海陵天德中綏德州軍卒數人道過鄜城民家求宿是夜有賊剽掠主人財有司執假宿之卒繫獄搒掠同知保大軍使盧克忠獨察其寃不肯署未幾果得賊假宿之卒遂釋世宗大定初伊喇鄂爾多為利涉軍節度使先是有農民避賊入保郡城以錢三十千寄之鄰家賊平索之鄰人諱不與訴於縣縣官以無契驗却之乃訴於州鄂爾多陽怒械繫之捕其鄰人關以三木詰之曰汝鄰乙坐劫殺人指汝同盜鄰人大懼始自陳有欺錢之隙乃責歸所隱錢而釋之郡人駭服七年左藏庫夜有盜殺都監郭良臣盜金珠求盜不得命點檢司追捕執其可疑者八人鞫之掠三人死五人誣服帝疑之命同知大興府事伊喇道雜治既而親軍百夫長阿勒巴鬻金於市事覺伏誅上聞之曰箠楚之下何求不得奈何鞫獄者不以情求之乎賜死者及未死者錢有差十七年詔朝廷每嵗再遣審録官本以為民伸理寃滯非惟理問重刑凡訴訟案牘皆當閲實是非其疏縱者嚴加懲斷不以贖論十八年曹王永功為大興尹有老嫗與男婦憩道傍婦與所私相從亡去或告嫗曰向見年少婦人自水邊小徑去矣嫗告伍長蹤迹之有男子私殺牛手持血刃望見伍長意其捕已即走避之嫗與伍長以為是殺其婦也捕送縣不勝楚毒遂誣服問尸安在詭曰棄之水中矣求之果獲一尸已半腐縣吏信之即具獄上永功疑之曰婦死幾何日而尸遽半腐哉頃之嫗得其婦於所私者永功曰是男子偶以私宰而執就獄其拷掠亦足以稱其科罰矣遂釋之而去章宗即位立諸路提刑司嘗諭之曰建官立制當寬猛得中凡軍民事相涉者均平決遣今以司獄𨽻提刑司惟期獄犴無寃耳時奏獄而法官有獨出情見者帝曰或言法官不當出情見故論者紛紛不已朕謂情見非出於法外但折𠂻以從法爾平章守貞曰是制自大定二十三年罷之然律有起請之條是古亦許情見矣帝曰科條有限而人情無窮情見亦豈可無也明昌中李完同知廣寧府事遼濵民崔元入城飲不歸其家求之得尸於水中有司執同飲者訊皆誣服提刑司疑其寃以獄畀完完亷得賊乃舟師也同飲者得白遼東契丹判額哩葉嘗殺驛使大理司直有契丹人同名者有司捕繫之獄及孟奎為上京等路提刑判官按囚率賓路讞而出之已而果獲其殺司直者元世祖中統三年詔自今部曲犯重罪鞫問得實必先奏聞然後置諸法十一月遣官審理重刑有旨諭右丞相史天澤曰朕或乘怒有所誅殺卿等宜遲留覆奏行之至元七年户部尚書李德輝録山西河東囚行至懷仁民有魏氏者發得木偶持告其妻挾左道厭勝謀殺已經數獄服詞皆具德輝燭其誣知其有愛妾疑妾所為以搆陷其妻召妾鞫之不移時而服遂杖其夫而當妾罪死人有訟財而失其兄子者德輝曰此叔殺之無疑將竟獄權貴為請者甚衆德輝不應罪狀既明請者乃慙服八年大都運司負課銀五百四十七錠逮繫運使倪某等四人徴之視本路嵗入簿籍實無所負辭久不決尚書户部令史劉正察其寃遍閲吏牘得至元五年李介甫關領課銀文契七紙適合其數驗其字畫皆司庫辛德柔所書也正亷得其實白尚書捕鞫之悉得課銀辛既伏辜而四人者得釋十三年太府監令史盧贄言於監官諸路所貢布長三丈惟平陽加一丈以故諸集賽台爭取平陽布茍截其長者與他郡等則無所爭而以所截者為髹漆宫殿器皿之用甚便監官從之適左右以其事聞帝以詰監官監官倉皇莫知所對歸罪於贄帝命斬之符寶郎耶律希亮遇諸塗贄以寃告希亮命少緩刑具以實入奏詔工部侍郎董文用讞之竟釋贄而召御史大夫塔齊爾等讓之曰此事言官當言而不言向微托果斯不誤誅此人耶二十九年趙孟俯同知濟南路總管府事有元掀兒役於鹽場不勝艱苦因逃去其父求得他人尸告同役者殺之既誣服孟俯疑其寃留不決逾月掀兒自歸郡中稱為神明成宗時王利用為興元路總管有婦毒殺其夫問藥所從來吏教婦指為富商所貨獄上利用曰家富而貨毒藥豈人情哉訊之果服武宗至大間胡長孺為寧海縣主簿有民荷溺器糞田偶觸軍卒衣卒抶傷民且碎器而去竟不知主名民來訴長孺陽怒其誣械於市俾左右潛偵之向抶者過焉戟手稱快執詣所𨽻杖而償其器羣嫗聚浮屠菴誦經為禳祈一嫗失其衣適長孺出鄉嫗訟之長孺以牟麥置羣嫗合掌中命繞佛誦經如初長孺閉目叩齒作集神狀且曰吾使神監之矣盜衣者行數周麥當芽一嫗屢開掌視長孺指縛之還所竊衣一日白事帥府歸吏言有姦事屢問弗服長孺曰此易易爾夜伏吏案下黎明出姦者訊之辭愈堅長孺陽謂令長曰頗聞朝廷有詔盍迎之叱𨽻卒縛姦者東西楹空縣而出庭無一人姦者相謂曰事至此死亦無承行將自解矣語畢案下吏歡而出姦者驚咸叩頭服罪永嘉民有弟質珠步搖於其兄贖焉兄妻愛之紿以亡於盜屢訟不獲直往告長孺長孺曰爾非吾民也叱之去未幾治盜長孺嗾盜誣兄受步搖為贓逮兄赴官力辨訴弗置長孺曰汝家信有是何謂誣耶兄倉皇曰有固有之乃弟所質者趣持至驗之呼其弟曰得非爾家物乎弟曰然遂歸焉仁宗時干文傳為烏程令有富民張甲之妻王無子張納一妾在外生子未晬王誘妾將兒來尋逐妾殺兒焚之文傳聞而發其事得死兒餘骨王厚賄妾之父母買鄰家兒為妾所生詐稱不死文傳令妾抱兒乳之兒啼不就妾之父母吐實乃呼鄰婦至貌見之躍入其懷乳之即飲王遂伏辜文宗至順末江南行臺監察御史蘇天爵慮囚於湖北有常德民盧甲莫乙汪丙同出傭而甲誤墮水死甲有弟為僧欲私甲妻不得訴甲妻與乙通而殺其夫乙不能明誣服擊之死斷其首棄草間尸與杖棄談氏家溝中吏往求果得髑髏然尸與杖皆無有而談誣證曽見一尸為水漂去天爵曰尸與杖縱存今已八年未有不腐者召談詰之則甲未死時目已瞽所云皆妄也天爵語吏曰此乃疑獄况不止三年矣俱釋之明太祖洪武初年刑部奏決重囚帝諭之曰朕嘗命汝等凡有重獄必三覆奏以人命至重恐不得其情則刑法濫及而死者不可復生也故必欲詳審今汝等概以重刑來奏其間固有瀆倫亂法罪不可原者亦有一時迷誤情可矜者若一概言之則輕重不分矣自今凡十惡常赦不原者則云重刑其餘雜犯死罪許聽收贖者毋概言也六年法司言大辟囚三百餘人已覆訊皆實請處決帝令行人特節諭之有寃抑許自陳又召五府六部及六科官諭之曰三百餘人未必人人皆得其實一有不實則死者銜寃爾等可從容審之一日不盡則二日三日便十日亦何害大抵人之實情難得有言語便捷輒駕虗詞掩實情者有訥於言雖懷情實而不能發者須詳悉以聽亦不可以刑迫之十四年命刑部聽兩造之辭議定入奏既奏録所下旨送四輔官諫院官給事中覆核無異然後覆奏行之有疑獄則四輔官封駮之踰年四輔官罷議獄一歸三法司又命法司録囚會翰林院給事中及春坊官會議平允以聞是年始分遣御史録囚十六年帝諭刑部尚書開濟都御史詹徽等曰凡論囚須原情不可深入人罪蓋人命至重常存平恕之心猶恐失之况深文乎昨民有子犯法當死其父行賄求免御史執之并欲論罪朕以父子至親子死而父救之人之至情也故但論其子而赦其父自今凡有論決必再三詳讞覆奏而行母重傷人命十七年諭法司官布政按察司所擬刑名其間人命重獄具奏轉逹刑部都察院參考大理寺詳擬著為令二十二年諭刑部尚書楊靖曰在京獄囚卿等覆奏在京審決猶恐有失在外各官所擬豈能盡當卿等當詳讞然後遣官審決二十六年改定讞審之制先是決獄笞五十者縣決之杖八十者州決之一百者府決之徒已上具獄送行省移駮繁而賄賂行乃命中書省御史臺詳讞改月報為季報以季報之數類為嵗報凡府州縣輕重獄囚依律決斷違枉者御史按察司糾劾至是令布政司及直𨽻府州縣笞杖就決徒流遷徙充軍雜犯死罪解部審録行下具死囚所坐罪名上部詳議如律者大理寺擬覆平允監收候決其情詞不明或失出入者大理寺駮回改正駮至三改擬不當將當該官吏奏問謂之照駮若停疑讞決而囚有翻異則改調隔别衙門問擬二次翻異不服則具奏會九卿鞫之謂之圓審至三四訊不服而後請旨決焉三十年頒行大明律中外決獄悉準之其洪武元年之令有律不載而具於令者法司得援以為證請於上而後行特旨臨時決罪不著為律令者不在此例有司輒引比律致罪有輕重者以故入論罪無正條則引律比附定擬罪名逹部議定奏聞若輒斷決致罪有出入者以故失論是年置政平訟理二幡審諭罪囚諭刑部曰自今惟武臣死罪朕親審之餘俱以所犯奏然後引至承天門外命行人持訟理幡傳旨諭之政平幡具赦宥篇先是帝嘗諭廷臣曰凡有大獄當面訊防搆陷鍛鍊之弊故其時重案多親鞫不委法司及是乃有是諭繼令五軍都督府六部都察院六科通政司詹事府間及駙馬雜聽之録寃者以狀聞無寃者實犯死罪已下悉論如律諸雜犯準贖建文中劉季篪為刑部侍郎民有為盜所引者逮至盜已死乃召盜妻子使識之聽其辭誣也釋之河陽逆旅朱趙二人異室寢趙被殺有司疑朱殺之考掠誣服季篪獨曰是非夙讐且其裝無可利緩其獄竟得殺趙者揚州民家盜夜入殺人遺刀尸傍刀有記識其鄰家也官捕鞫之鄰曰失此刀久矣不勝掠誣服季篪使人懷刀就其里潛察之一童子識曰此吾家物也盜乃得成祖詔法司問囚一依大明律擬議母妄引榜文條例為深文永樂二年御奉天門録囚既多矜宥尚慮有寃抑者復召錦衣衛鴻臚寺等官諭曰囚皆入于獄則雖寃而不求辨初至朕前則畏威而不敢言有此二者刑法豈能皆當爾等更以朕言從容審之果尚有寃抑即來奏聞四年錦衣衛奏民有與外國使人交通者宜執付法司罪之帝詰其實對曰以氊衫市之而交語甚久帝曰釋之錦衣衛執奏帝曰立法以禁姦過輕則民慢用法在體情過重則民急彼小人治生錢物交易議值豈一語可決彼何知國法其釋之既而謂侍臣曰兹事若忽於聽察則愚民以一氊衫獲罪矣七年令大理寺官引法司囚犯赴承天門外行人持節傳旨會同府部通政司六科等官審録如洪武制九年天城衛千户某以罪繫刑部獄指揮某狀通政司云千户母致貨託已賂部官求免已不敢從因併贓首事聞帝命法司問千户與指揮有舊乎對曰無帝曰非故舊而輒干請此非人情命法司訊之乃指揮居近刑部千户之母寓其鄰朝夕餽子食指揮探其家饒紿言已與部官厚可代以賂免母遂致貨旁有欲發其姦者指揮懼遂自首而隱之法司覆奏法當千户之母準與贓律指揮罷職屯種帝曰愛其子以賂求免人之常情且婦人烏知法律其宥之指揮始則欺人取貨終則隱情罔上又汙衊朝臣但罷職耕種何以示懲即解送交趾充軍十七年周新為浙江按察使初入境羣蚋迎馬頭迹得死人榛中身繫小木印新驗印知死者故布商密令廣市布視印文合者捕鞫之盡獲諸盜一日視事旋風吹葉案前葉異他樹詢左右獨一僧寺有之寺去城逺新意僧殺人發樹果見婦人尸鞫實磔僧一商暮歸恐遇劫藏金叢祠石下歸以語其妻旦往求金不得訴於新新召商妻詢之果妻有所私商驟歸所私尚匿妻所聞商語夜取之妻與所私皆論罪魯穆為福建僉事漳州民周允文無子以姪為後晚而妾生子因析産與姪屬以妾子允文死姪言兒非叔子逐去盡奪其資妾訟之穆召縣父老及周宗族密置妾子羣兒中咸指兒類允文遂歸其産仁宗初即位召學士楊士竒楊榮金幼孜至榻前諭之曰比年法司之濫朕豈不知其所擬大逆不道往往出於文致先帝數切戒之故死刑必四五覆奏而法司略不加意甘為酷吏而不愧自今審重囚卿三人必往同讞有寃抑者雖細故必以聞時虞謙為大理卿吕升為少卿仰瞻為丞而謙又薦嚴本為寺正帝方矜慎刑獄謙等亦悉心奏當凡法司及四方所上獄謙等再四參復必求其平嘗語人曰彼無憾斯我無憾矣時斷獄者多以知情故縱及大不敬論罪本爭之曰律自叛逆數條外無故縱之文即不敬情有輕重豈可概入重比謙韙之悉為駮正良鄉民失馬疑其鄰告於丞拷死丞坐決罰不如法當徒而告者坐絞本曰丞罪當告者因疑而訴律以誣告致死是丞與告者各殺一人可乎駮正之莒縣屯卒奪民田民訟於官卒被笞夜盜民驢民搜得之卒反以為誣擒送千户民被禁死法司坐千户徒本曰千户生則死者寃矣遂正其故勘罪蘇州衛卒十餘人夜劫客舟於河西務一卒死懼事覺誣鄰舟解囚人為盜其侣往救見殺皆誣服本疑之曰解人與囚同舟為盜囚必知之按驗果得實遂抵卒罪宣宗宣德元年大理寺駮正猗氏民妻王骨都殺夫之寃帝切責刑官尚書金純等謝罪乃已義勇軍士閻羣兒等九人被誣為盜當斬家人擊登聞鼓訴寃覆按實不為盜命釋羣兒等而切責都御史劉觀直登聞鼓給事中林富奏重囚二十七人以姦盜當決擊鼓訴寃煩瀆不可宥帝曰登聞鼓之設正以逹下情何謂煩瀆自後凡擊鼓訴寃阻抑者罪帝嘗夜讀周官式敬爾由獄以長我王國慨然興歎以為立國基命在於此乃敇三法司朕體上帝好生之心惟刑是恤令爾等詳覆天下重獄而犯者逺在千萬里外需次當決豈能無寃因遣官審録之二年奏重囚帝令多官覆閲之諭曰古者斷獄必訊於三公九卿所以合至公重民命卿等往同覆審母致枉死英國公張輔等還奏訴枉者五六十人重命法司勘實因切戒焉英宗正統元年河南布政使邢旭言今後人命務要正官檢驗強盜要追真贓凶仗申詳會審若有異詞即與辨明違者在內從監察御史在外從按察司究問報可兵部侍郎于謙言在京法司重囚凡遇隆寒盛暑會官審録寃枉者得以辨明可矜者獲蒙寬宥在外重囚豈無寃抑可矜者乞如在京審録庶獄無寃枉命議行二年四川按察使龔燧奏四川強盜繫三司者不下三百而翻異者半之而未獲者倍之其間有搆於虛詞牽於讐怨所徴贓仗率民家常有器械不足據信往往情偽莫白又所犯大抵在永樂宣德時有正犯已死而後獲者無自質理所司嫌於出罪不敢為辨長年淹禁恐傷和氣乞敕廷臣會議或遣重臣四出審録可疑者釋之或編為卒伍戍於邊方其未獲及為已獲所連者俱如詔勿捕帝命行之六年刑部郎中林厚言在京監禁重囚有纍訴寃枉逮人照勘久不獲斷者請敇各衙門類録各犯緊關寃情付諸審録官即與辨理具奏在外見監重囚有嘗經訴寃及申詳三法司以議論不明駮回再詰者請亦録各犯所訴寃情及駮回詞語付諸審獄官令詳讞具奏從之九年山東副使王裕言囚獄當會審而御史及三司官或踰年一會囚多瘦死往者嘗遣御史會按察司詳審釋遣甚衆今莫若罷會審之例而行詳審之法敕遣按察司官一員專審諸獄部持舊制不可廢帝命審例仍舊復加詳審例選按察司官一員與巡按御史同審失出者姑勿問贓私者究如律石璞為江西按察副使善斷獄民娶婦三日歸寧失之婦翁訟壻殺女誣服論死璞禱於神夢神示以麥字璞曰麥者兩人夾一人也比明械囚趣行刑未出一童子窺門屏間捕入則道士徒也叱曰爾師令爾偵事乎童子首實果二道士匿婦稿麥中立捕論如法天順三年令每嵗霜降後三法司同公侯伯會審重囚謂之朝審厯代遂遵行之憲宗成化十四年奏準凡真犯死罪重囚推情取具招辭依律擬罪明白具本連證佐干連人卷俱發大理寺審録如有招情未明擬罪不當稱寃不肯服辨者俱駮回再問若招情明白擬罪合律輸情服辨者本寺將審允緣由奏奉欽依準擬依律處決方回報原問衙門監候照例具奏將犯人引赴承天門會同多官審録其審録之時原問原審并接管官仍帶原卷聽審情真無詞者覆奏處決如遇囚翻異稱寃有辭各官仍親一一照卷陳其始末來厯并原先審問過緣由聽從多官仔細參詳果有可矜可疑或應合再與勘問通行備由奏請定奪十七年定在京大審即於是年遣部寺官分行天下會同巡按御史行事孝宗𢎞治二年令法司每年立秋時將在外監候聽決重囚備查籍貫姓名及在外見監問一應死罪囚犯通行具奏轉行各該巡撫會同有司官從公研審除情真罪當者照例處決寃抑即與辨理情可矜疑徑自具奏定奪著為令十三年詔法司凡厰衛所送從公審究有枉即與辨理勿拘成案世宗嘉靖二十六年題準各該司府州縣遇五年一次本部差官審録將充軍人犯除已經解發著伍外其餘不分曽詳允及雖經定衛尚未起解者逐一開送審録其經審録官辨釋者務要遵照發落不許問官偏抑阻撓神宗朝刑部尚書孫丕揚以獄多滯囚由公移牽制議刑部大理各置籍凡獄上刑部次日即詳讞送大理大理審允即還刑部自是囚無淹繫尋奏請敕天下撫按方春時和令監司按行州縣大録繫囚按察使則録會城囚死罪矜疑及流徒已下可原者撫按以逹於朝期毋過夏月嵗以為常具雜議篇從之欽定續通典卷一百十三
