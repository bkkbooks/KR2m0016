充邉儲謂之開中繼各行省邉境多召商中鹽輸米諸倉以為軍儲計道里逺近自五石至一石有差先後增减則例不一率視時緩急米石髙下中納者利否道逺地險則減而輕後至𢎞治中户部尚書葉淇變法而開中始壞諸淮商悉撤業歸西北商亦多徙家於淮邉地為虛米石值銀五兩邉儲枵然至嘉靖時陕西巡撫楊一清復請召商開中龎尚鵬總理江北鹽屯尋於九邊與總督王崇古區畫屯政然因循日久卒鮮實效四年從中書右丞相徐達請徙山後民一萬七千餘戶屯北平又令於山北口外東勝蔚州安豐雲應等州極邉沙漠之地各設千百户收撫邊民無事則耕有事則戰就以所儲草給之達又以沙漠遺民三萬二千餘戶屯田北平凡置屯二百五十四開田一千三百四十三頃六年太僕丞梁額森特穆爾言寧夏境內及四川西南至船城東北至塔灘相去八百餘里土田膏沃宜招集流民屯田從之是時遣鄧愈湯和諸將屯陕西彰德汝寧北平徙山西真定民屯鳳陽又因海運餉遼有溺死者遂益講屯政天下衛所州縣軍民皆事墾開其移民就寬鄉或召募或罪徙者為民屯皆領之有司軍屯則領之衛所邊地三分守城七分屯種內地二分守城八分屯種每軍受田五十畝為一分給耕牛農具教樹植復租賦遣官勸輸誅侵暴之吏初稅畝一斗後定科則軍田一分正糧十二石貯屯倉聽本軍自支餘糧為本衛所官軍俸糧十九年以雲南既平諸蠻未附命西平侯沐英鎮之英奏雲南土地甚廣而荒蕪居多宜置屯田命軍士開耕以備儲蓄乃諭户部曰屯田可以紓民力立兵食邊方之計莫善於此然邉地久荒榛莽蔽翳用力實難宜緩其歲輸使樂耕作數年之後徴之可也英奉詔自永寧至大理六十里設一堡留軍屯田後景川侯曹震又屯田品甸普定侯陳桓靖寧侯葉升屯田定邉姚安畢節諸衛二十一年敇五軍都督府曰養兵而不病於農者莫若屯田今海宇寧謐邉境無虞若使兵坐食於農農必受敝非長治久安之術其令天下衛所督兵屯種庶幾兵農兼務國用以舒自是歲得糧五百餘萬石二十三年延安侯唐勝宗督貴州屯田二十四年又諭後軍都督沐春曰今塞外清寧已置大寧都司及廣寧諸衛足以守邊而守關軍士已令撤之而山海關猶循故事其七站軍士雖名守關實廢屯田養馬自今一片石等關每處止存軍士十餘人譏察逋逃餘悉令屯田二十五年詔天下衛所軍以十之七屯田宋國公馮勝頴國公傅友德帥開國公常升等分行山西籍民為軍屯田於大同東勝立十六衛建文四年令直𨽻屯田差御史比較各都司屯田巡按御史比較後改增按察使僉事盤查屯田或令各省布按三司提督或令巡按御史提督或令總兵官鎮守提督或差户部郎中巡屯御史隨時更改沿革不一成祖永樂元年命靖安侯王忠往北京整理屯田工部尚書黃福奏陕西所屬行都司所屬屯田多缺耕牛耕具合准北京例官市牛給之耕具於陕西布政司所屬鑄造從之二年定屯田官軍賞罰例歲食米十二石外餘六石為率多者賞鈔缺者罰俸又以田肥瘠不同法宜有别命軍官各種樣田以其歲收之數相考較太原左衛千户陳淮所種樣田每軍餘糧二十三石帝命重賞之寧夏總兵官何福積榖尤多賜敕褒美户部尚書郁新言湖廣諸衛收糧不一種請以米為凖凡粟榖穈黍大麥蕎穄二石稻薥秫二石五斗穇稗三石皆凖米一石小麥麻豆與米等從之著為令又更定屯守之數臨邉險要守多於屯地僻處及輸糧艱難者屯多於守屯兵百名委百戶三百名委千戶五百名以上指揮提督之屯設紅牌列則例於上年六十與殘疾及幼者耕以自食不限於例屯軍以公事妨農務者免徴子粒並禁衛所差撥宣宗宣德中屢核各屯以征戍罷耕及官豪勢要占匿者减餘糧之半迤北來歸就屯之人給車牛農器分遼東各衛屯軍為三等丁牛兼者為上丁牛有一為中俱無為下兵科給事中戴辨言自山海關至薊州守關軍萬人列營二十三所操練之外無他差遣若稍屯種亦可實邉請取勘營所附近荒田斟酌分給且屯且守帝命戶部兵部各遣官與都督陳景先經理兵部黃福言永樂間雖營建北京南討交址北征沙漠資用未嘗乏比國無大費而歲用僅給即不幸有水旱征調將何以濟請設操備營繕軍士十萬人於濟寧以北衛輝真定以東緣河屯種初年自食次年人收五石三年收倍之既省京食口糧六十萬石又省本衛月糧一百二十萬石歲可得二百八十萬石帝善之下户兵二部議部奏緣河屯田實便請先以五萬頃為率發附近居民五萬墾之但山東近年旱饑流徙初復衛卒多力役宜先遣官行視田以俟開墾遂令吏部郎中趙新等經理福總其事既而有言軍民各有常業若復分田役益勞擾事竟不行繼遣侍郎羅汝敬督陕西屯田柴車經理山西屯田分遣御史巡視寧夏甘州屯田水利至七年帝從户部議令他衛軍戍宣府者悉遣還屯種左都督談廣上言臣所守邊一千四百餘里敵人窺伺竊發無時脫有警徴兵數百里外勢豈能及屯種之議臣愚未見其可帝以邉卒戍守有餘但命永樂中調戍者勿遣英宗正統元年發禁軍三萬人屯田畿輔二年免軍田正糧歸倉止徴餘糧六石後又免沿邉開田官軍子粒减各邉屯田子粒有差景帝景泰初邉方多事令兵分為兩畨六日操守六日耕種時學士商輅言邉外田地極廣先因在京功臣等將附近各城堡膏腴之産占作莊田其餘閒田又為鎮守總兵參將等占為已業以致軍士無田可耕夫且耕且守如漢趙充國諸葛亮晉羊祜皆有明效今日守邉之要莫要於此下所司議行憲宗成化初宣府巡撫葉盛買官牛千八百并置農具遣軍屯糧收糧易銀以補官馬耗損邉人稱便自正統後屯政稍弛而屯糧總存三之二其後屯田多為內監軍官占奪法盡壞憲宗之世頗議釐復而視舊所入不能什一矣孝宗𢎞治間屯糧愈輕有畝止三升者而定制各省屯糧又折以銀雖有徴糧違限之罰强占屯田之禁終無大禆十四年户部尚書秦紘總制三邉見固原迤北延袤千里閒田數十萬頃曠野近邉無城堡可依議於花馬池迤西至小鹽池二百里每二十里築一堡堡周四十八丈役軍五百人固原迤北諸處亦各築屯堡募人屯種每頃歲賦米五石可得五十萬石下詔行之武宗正德時遼東屯田較永樂間田贏萬八千餘頃而糧乃縮四萬餘石初永樂時屯田米常溢三之一常操軍十九萬以屯軍四萬供之而受供者又得自耕邉外軍無月糧以是邉餉恆足及是屯軍多逃死常操軍止八萬皆仰給於倉而邉外數擾棄不耕劉瑾擅政遣官分出丈田責逋希瑾意者僞增田數披括慘毒至遼卒脅衆為亂撫之乃定世宗嘉靖時遼東巡撫李承勛招逋逃三千二百人開屯田千五百頃僉都御史劉天和督甘肅屯政請以肅州丁壯及山陕流民於近邉耕牧且推行於諸邉奏當興革者十事田利大興總督宣大兼督河南山東軍務翟鵬浚濠築垣修邉墻三百九十餘里得地一萬四千九百餘頃募軍千五百人人給五十畝省倉儲無算大同巡撫詹榮以近邉𢎞賜諸堡三十一所延亘五百餘里闢治之皆膏腴田可數十萬頃乃奏請召軍佃作復租徭移大同一歲市馬費市牛賦之秋冬則聚而遏寇帝從之時楊一清復請召商開中又請倣古募民實塞下之意招徠隴右關西民以實邉其後周澤王崇古林富陳世輔王畿王朝用唐順之吳桂芳等爭言屯政龎尚鵬總理江北鹽屯尋移九邉與總督王崇古先後區畫屯政甚詳然卒鮮實效給事中管懷理言屯田不興其弊有四疆場戒嚴一也牛種不給二也丁壯亡徙三也田在敵外四也如是而管屯者猶欲按籍增賦非扣月糧即按丁賠補耳屯糧之輕至𢎞正而極嘉靖中漸增穆宗隆慶中復畝收一斗然屯丁逃亡者益多管糧郎中不問屯田有無月糧止半給沿邊屯地或變為斥鹵沙磧糧額不得减屯田御史又於額外增本折屯軍益不堪命時給事中鄭大經言薊屯當量地利而定其則遼屯當改營田而足其額此興復屯政之大較也御史李叔和言遼東屯田半廢近行營田之法撥軍耕種致行伍空虛且歲收田租止備修邊工費而各軍支餉如故有損無益蓋此法止可行於河西人少之處若河東則當廣召種之今授田徴稅悉抵歲餉以省內輸簡回壯勇以實行伍仍特敕官董之如內地屯田之制從之時又給宣大屯田官養亷田宣大開墾田已成業令每十頃內給將官五十畝為養亷之資若副參開種不及百頃守備以下或不及一十頃參論戒飭又詔各邉自墾田永不起科如歲增粟十萬五萬石自墾至百頃千頃者重加升賞神宗萬厯時山東巡撫鄭汝璧請開登州海州北長山諸島田福建巡撫許孚逺墾閩海檀山田成復請開南日山澎湖又言浙江海濵諸山若陳錢金塘補陀玉環南麂皆可經理天津巡撫汪應蛟則請於天津興屯或留中不下或不久輒廢時方征倭寇濟陽衛舍餘李大用等請以萬人自備資糧隨行給事中郝敬上疏曰臣閲李大用等奏畿輔附近濟陽等衛屯牧額兵共四十八萬願以萬人隨行征倭衆軍自貼糧餉臣訪其故自永樂時靖難功成剩精兵四十八萬內一十二萬選入十二團營餘三十六萬給賜屯田牧地種納子粒馬價分置七十八衛於順天所屬州縣俱屬三千營統轄聽調征𠞰今二百餘年生齒繁衍與民混雜有司派以馬户撐船運米等役衆軍脫卸無計昨者寧夏之役各餘丁議自備糧隨行征𠞰求免前差未幾寧夏平議遂寢兹緣倭奴告警重復申奏蓋彼以三十六萬之衆止出萬人是三十六十中抽一人耳以三十六萬衆共餉萬人是三十六家共贍一軍耳又得概免民差圖此便利今東征師可勿復用此惟是遼左空虛宜因羣情為轉移之計即於各衛原籍中十名抽一據三十六萬原數除六萬作耗外可得壯丁三萬人擇亷幹官數員統領赴遼東開種屯田於存留三十萬中各十名幫貼屯田一名牛種廬舍之費令概免前差開墾田成即給本兵為永業大率每兵一名墾田二十五畝內除五畝為官田每畝量收子粒五六升則三萬人可墾田七十五萬畝一歲收官田子粒可八千餘石以備緩急之需因願赴之人心蠲不急之徭役一呼而得勝兵三萬坐收兵食兩利之效備門庭之警扶肘腋之危何憚而久不為此熹宗天啓初巡按張慎言復議天津屯田而御史左光斗命管河通判盧觀象大興水田之利太常少卿董應舉踵而行之光斗更於河間天津設屯學試騎射為武生給田百畝保定巡撫汪應蛟亦請興天津屯田疏言天津葛沽一帶地從來斥鹵不耕種臣謂地無水則鹹得水則潤以閩浙治地之法行之未必不可為稻田今春買牛制器開渠築堤葛沽白塘二處耕種五千餘畝內水稻畝收四五石種薥豆者得水灌溉亦畝收一二石惟旱稻以鹻立槁始信閩浙之法可行於北海而斥鹵可變為膏腴也天津為神京牖户開府設鎮其地益重見在水陸兩營兵四千人歲費餉六萬四千餘兩俱加派民間天津荒田奚啻六七千頃若盡依今法為之開渠以通蓄泄築隄以防水潦每千頃各致榖三十萬石以七千頃計之可得榖二百餘萬石非獨天津之餉取給而省司農之轉饋無不可者且地在三岔河外海潮上溢取以灌溉於河無妨白塘以下地無糧差白塘以上為靜海縣或五畝十畝而折一畝糧差每畝不過一分八釐民願賣則給價不願則給種於民情無拂請以防海官軍用之於海濱墾地每歲開渠築隄可成田數百頃一面召募居民承種數年之後荒田漸闢各軍兵且屯且守民間可省養兵之費重地永資保障之安矣得㫖允行李繼貞巡撫天津亦力於屯務然仍歲旱蝗往往弗克底成效也五年貴州巡按傅宗龍討諸叛苖大破平越毁其寨百七十宗龍乃條上屯守策一曰清衛所原田一曰割逆賊故壤而以衛所之法行之蓋黔不患無田患無人客兵聚散不常不能久駐莫若倣祖制盡舉屯田以授有功因功大小為官髙下自指揮至總小旗畀以應得田為世業禁其私買賣不待招徠户口是實臣所謂以守為屯者如此部議從之莊烈帝崇禎九年總督宣大山西軍務盧象升大興屯政積粟二十餘萬諭九邉皆式之十年陜西巡撫孫傅庭釐正西安三衛屯糧疏言洪武時每軍額地一頃歲徴正糧十二石餘糧十二石盡行收貯屯倉以正糧按月支給本軍以餘糧支給官軍糧俸餉不煩轉輸而倉廩充實兵不煩召募而士卒精强法至善也至永樂二十年奉詔减免餘糧六石然正餘一十八石猶然交倉按支法尚未壞也至正統二年以正糧十二石兊給本軍充餉免納免交止徴餘米六石入倉而屯法大壞矣至後復將餘糧六石改為正糧一併充軍免納而屯糧既不入倉屯地幾為私産莫可究詰矣陜西省下舊四衛因檄行西安府推官王鼎鎮清查除右護衛名𨽻秦府外先將左前後三衛各地查明推情定法按地起課即責辦於見今承種之人每上地一頃徴糧十八石中地量免三石下地又免三石每石折銀七錢總計三衛起課地三千二十七頃零徴銀三萬五千餘兩寬平易從無不翕然相安不呼籲以窘大農不加派以厲孑遺疏上帝褒嘉之欽定續通典卷六
