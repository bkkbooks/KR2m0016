body:
  text: 食貨屯田下元明元太祖時舒穆嚕拜達勒為霸州等路元帥鎮守固安水寨令軍士屯田且耕且戰披荆棘立廬舍數年之間城市悉完為燕京外蔽憲宗初以有宋兵世祖請立經略司於汴以䝉古史天澤等為使授之兵牛敵至則禦敵去則耕乃置屯田萬户於鄧完城以備之三年汪特格修治利州且屯田七月屯田於鳳翔中統二年詔鳳翔府種田户𨽻平陽兵籍毋令出征務耕屯以給軍餉又詔諸道括逃軍還屯田嚴其禁三年始立左衛屯田調樞密院二千人於東安州南永清縣東荒土及本衛元占牧地立屯開耕分置左右手屯田千户所其官屬詳載職官典武官下卷中為軍二千名為田一千三百一十頃六十五畝又置右衛屯田調本衛軍二千人於永清益津等處立屯開耕分置左右手屯田千戶所其屯軍田畝之數與左衛同至元元年以益都武衛軍千人屯田燕京官給牛種二年詔孟州之東黃河之北南至八栁樹枯河徐州等處凡荒閒地土可令阿珠阿嘍罕等所領士卒立屯耕種并摘各萬戶所管漢軍屯田又詔西川山東南京等路戍邉軍屯田四年置中衛屯田於武清香河等縣繼以各屯地界相去百餘里往來耕作不便遷於河西務荒莊楊家口青臺楊家白等處其屯軍之數與左衛同為田一千三十七頃八十二畝六年以攻襄樊軍餉不足發南京河南歸德諸路編民二萬餘户於康鄧申裕等處立屯七年創立髙麗屯田是時東征日本欲積糧餉為進取之計遂以王綧洪茶邱等所管髙麗户二千人及發中衛軍二千人合婆娑府咸平府軍各一千人於王京東寧府鳳州等處一十處置立屯田設經略司以領其事每屯用軍五百人八年僉發己未年隨州鄂州投降人民一千一百七十戶往中興居住繼即編為屯田户凡二千四百丁至二十三年續僉漸丁得三百人為田一千八百頃十一年徙生劵軍屯田和林置陜西屯田總管府以安西王府所管編民二千戶立櫟陽涇陽終南渭南屯田又置寧夏路放良官屯田從安撫司請以招良人民九百四戶編聚屯田為田四百四十二頃五十畝又置敘州宣撫司民屯命西蜀四川經略司起立屯田又置潼州府民屯僉本府編民及義士軍二千二百二十四戶立屯又置䕫路總管府民屯僉本路編民至五千二十七户又置重慶路民屯於江津巴縣瀘州忠州等處僉撥編民二千三百八十七戶并召募共三千五百六十五戶十二年置大理金齒等處宣慰司都元帥府軍民屯命於所轄州縣拘刷漏籍人户得六千六百有六戶立屯田繼又僉本府編民四百户及永昌府編民一千二百七十五户增益之後立大理軍屯於㸑僰軍內撥二百户續僉二百八十一戶又增一百一十九戶總計民屯三千七百四十一户軍屯六百户為田軍民已業二萬二千一百五雙又置曲靖等處宣慰兼管軍萬戶府軍民屯田拘刷所轄州郡諸色漏籍人戶七百四十戶立曲靖路民屯續僉民一千五百戶增入其所耕之田官給一千四百八十雙自備已業田三千雙復立澄江民屯所僉屯戶與曲靖同凡一千二百六十戶後立軍屯於㸑僰軍內僉一百六十九戶復僉一百二十六戶增入又立仁德府民屯所僉屯戶與澄江同凡八十戶給田一百六十雙後立軍屯僉㸑僰軍四十四户續僉五十六戶增入所耕田畝四百雙俱係軍人已業置順慶路民屯僉順慶民三千四百六十八户置立屯田又置成都路民屯僉隂陽人四十户辦納屯種又置鶴慶等路軍民屯田僉鶴慶路編民一百戶立民屯後又僉㸑僰軍一百五十二戶立軍屯軍屯六百八雙民屯四百雙俱已業又置中慶路軍民屯田於所屬州縣內拘刷漏籍人户得四千一百九十七戶官給田一萬七千二十二雙自備已業田二千六百二雙繼立軍屯用㸑僰軍人七百有九户官給田二百三十四雙自備已業田二千六百一雙又置臨安宣慰司兼管軍萬户府軍民屯田於所屬州縣拘刷漏籍人户開耕宣慰司所管民屯三百户田六百雙本路所管民屯二千戶田三千四百雙繼又續立㸑僰軍屯為戶二百八十八田一千一百五十二雙十三年置廣元路民屯從利路元帥言廣元實東西兩川要衝支給浩繁經理係官田畝得九頃六十畝遂以褒州刷到無主人口偶配為十戶立屯開種十五年置威楚提舉司屯田於威楚提舉鹽使司拘刷漏籍人户充民屯本司就領其事為户三十三為田一百六十五雙又置威楚路軍民屯田拘刷本路漏籍人户得一千一百一户內八百六十六户官給無主荒田四千三百三十雙餘戶自備已業田一千一百七十五雙繼立屯軍於本路㸑僰軍內僉三百九十九戶內一十餘戶官給荒田六十雙餘戶自備已業田一千五百三十六雙又置前衛屯田以各省軍人備侍衛者於霸州保定涿州荒間地土屯種分置左右手屯田千戶所屯軍與左衛同為田一千頃又置後衛屯田以永清等處田畝低下遷昌平縣之太平莊屯軍與左衛同為田一千四百二十八頃十六年給千戶瑪尼部下巴圖軍及土渾川軍屯田牛具置淮東淮西屯田打捕總管府募民開耕連海州荒地官給禾種自備牛具所得子粒官得十之四民得十之六仍免屯户徭役為戶一萬一千七百四十三為田一萬五千一百五十三頃三十九畝又置寶坻屯僉大都屬邑編民三百户立屯於大都之寶坻縣為田四百五十頃又置額齊納屯田調歸附軍人於甘州至十八年置武衛屯田發迤南軍人三千名於涿州保定定興等處置立屯田分設廣備萬益等六屯為田一千八百四頃四十五畝以充屯田軍後又遷甘州新附軍二百人往屯額齊納合即渠開種為田九十一頃五十畝又置虎賁親軍都指揮使司屯田因阿爾婁官人言近於瑪納齊圖沁納沁髙州呼蘭達巴等處改置驛傳臣等議可於舊置驛所設立屯田從之後發虎賁親軍二千人入屯又增軍一千凡立三十四屯於上都置司為軍三千人佃户七十九為田四千二百二頃七十九畝是時又置德安等處軍民屯田總管府以各翼取到漢軍及各路拘收手號新附軍分置十屯立屯田萬户府繼又改立總管府為民九千三百七十五名軍五千九百六十五名為田八千八百七十九頃九十六畝又置甘肅管軍萬户府屯田發軍於甘州黑山子滿峪泉水渠鴨子翅等處立屯田為户二千二百九十為田一千一百六十六頃六十四畝又置汀漳屯田以福建調軍糧儲用依腹裏例置立屯田命管軍總管鄭楚等發鎮守士卒年老不堪備征戰者得百有十四人又募南安等縣居民一千八百二十五户立屯耕作十九年置陜西等處萬户府屯田以盩厔南係官荒地發歸附軍立孝子林張馬村軍屯繼以南山把口子巡哨軍人八百戶於盩厔之杏園莊寧州之大昌原屯田又發文州鎮戍新附軍九百人立亞柏鎮軍屯復以燕京戍守新附軍四百六十三戶於德順州之威戎立屯開耕為户孝子林屯三百一户張馬村屯三百一十三户杏園莊屯二百三十三户大昌原屯四百七十四戶亞柏鎮屯九百戶威戎屯四百六十三户為田孝子林二十三頃八十畝張馬村七十三頃八十畝杏園莊一百一十八頃三十畝大昌原一百五十八頃七十九畝亞柏鎮二百六十八頃五十九畝威戎一百六十四頃八十畝又置桂齊延安府屯以拘收贖身放良布哷齊及漏籍户計於延安路特默齊草地屯田為戶二千二十七為田四百八十六頃又置寧夏等處新附軍萬户府屯田發迤南新附軍一千三百八十二戶往寧夏等處屯田又遣塔塔喇千户所管軍人九百五十八户屯田為田一千四百九十八頃三十三畝又置紹慶路民屯於木路未當差民户內僉二十三名置立屯田繼於彭水縣籍管萬州寄戶內僉撥二十户又僉彭水縣未當差民户三十二户增入後以屯户貧乏者多負逋復僉彭水縣編民一十六户補之又置嘉定路民屯僉亡宋編民四户置立屯田繼又撥成都義士軍八户增入二十一年置嶺北行省屯田併和林阿拉克岱元領軍一千人入五條河後又摘六衛漢軍一千名赴青海屯田以五條河漢軍併入青海後又屢增軍戶共為戶四千六百四十八為田六千四百餘頃又置金復州萬户府屯田發新附軍一千二百八十一户於根敦扎卜置立屯田繼又分京師應役新附軍一千人屯田哈斯罕關東荒地後又以伊嚕音特穆爾塔斯哈雅兩萬户新附軍一千三百六十户併入金復州立屯耕作為戶三千六百四十一為田二千五百二十三頃又置芍陂屯田萬户府因江淮行省言安豐之芍陂可溉田萬餘頃乞置三萬人立屯中書省議發軍士二千人行之屯戶共一萬四千八百八名又置䕫府萬户府軍屯從四川行省議除沿邉重地分軍鎮守餘軍一萬人命官於諸處擇膏腴地立屯開耕為户三百五十一人為田五十六頃七十畝凡創立十四屯其成都等路萬户府軍屯於本路崇慶州義興鄉楠木園置立為戶二百八十九人為田四十二頃七十畝河東陕西等路萬户府軍屯置立於灌州之青城陶壩及崇慶州之大柵頭等處為戶一千一百二十八名為田二百八頃七畝廣安等處軍屯置立於成都路崇慶州之七寶壩為户一百五十名為田二十六頃二十五畝保寧萬户府軍屯置立於崇慶州之金馬為户一百六十四名為田七十五頃九十五畝敘州萬户府軍屯置立於灌州之青城為户二百二十一名為田三十八頃六十七畝五路萬户府軍屯置立於成都之大柵鎮孝感鄉及灌州青城縣之懷仁鄉為戶一千一百六十一名為田二百三頃一十七畝興元金州等處萬户府軍屯置立於崇慶州晋源縣之孝感鄉為户三百四十四名為田五十六頃隨路八都萬户府軍民屯置立於灌州青城溫江縣為户八百三十二名為田一百六十二頃五十七畝舊附等軍萬户府軍屯置立於灌州青城縣崇慶州等處為戶一千二名為田一百二十九頃五十畝炮手萬戶軍屯置立於灌州青城縣龍池鄉為戶九十六名為田一十六頃八十畝順慶軍屯置立於晋源縣義興鄉江源縣將軍橋為戶五百六十五名為田九十八頃十七畝平陽軍屯置立於灌州青城崇慶州大柵頭為戶三百九十八名為田六十九頃六十五畝遂寧州軍屯為户二千名為田三百五十頃又置嘉定府萬戶軍屯摘䝉古漢軍及嘉定新附軍三百六十人於崇慶州青城等處屯田為田二頃二十畝二十二年置廣濟署屯田以崔黃口空城屯田歲潦不收遷於青滄等處以尚珍署舊領屯夫二百三十户歸之既又遷濟南河南五百五十户平灤真定保定三路屯夫四百五十户併入共為戶一千二百三為田一萬二千六百頃三十八畝又置豐潤署屯田於大都路薊州之豐潤縣為戶八百三十七為田三百四十九頃二十三年置尚珍署屯田於濟寧路之兖州為户四百五十六為田九千七百一十九頃七十二畝又置洪澤萬戶府屯田初於洪澤南北三屯設萬户府以統之因江淮行省言國家經費錢糧為急今屯田之利無過兩淮况芍陂洪澤皆漢唐舊立屯之地若令江淮新附漢軍屯田可歲得糧百五十餘萬石從之繼罷三屯萬户止立洪澤屯田萬户府以統之其置立處所在淮安路之白水塘黃家疃等處為户一萬五千九百九十四名為田三萬五千三百一十二頃二十一畝二十四年置左右欽察衛屯田發本衛軍一千五百一十二名分置左右手屯田千戶所及欽察屯田千戶所於清州等處屯田後又創立龍翊侍衛復𨽻焉為軍左手千戶所七百五名右手千戶所四百三十七名欽察千戶所八百名為田左手千戶所一百三十七頃五十畝右手千户所二百一十八頃五十畝欽察千戶所三百頃又置永平屯田總管府以北京採取材木百姓三千餘户於灤州立屯設官署以領其