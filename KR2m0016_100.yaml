body:
  text: 兵以逸待勞五代唐莊宗侵梁趨汴州宿胡栁坡遇梁軍問戰於周德威德威曰此去汴州信宿而近梁軍父母妻子皆在其中軍必力爭吾以深入之兵當必死之戰可以計勝難以力圖且吾先至此糧㸑具營柵完以逸待勞王宜按軍無動臣請以騎軍擾之使其營柵不成樵㸑不暇給因其勞而乘之可以勝也不聽卒敗金元帥完顔默音征鄂斡以兵甲士萬三千人分為左右翼至木虎崖盡委輜重齎數日糧輕騎襲之時鄂斡自泰州走齊州有吏乣者來降謂默音曰賊中馬肥健官軍馬疲弱此去賊八十里比遇賊馬已憊賊輜重去此不逺我攻之賊必救其巢穴賊至馬必疲我馬少得息所謂以逸待勞者也默音從之鄂斡果敗明傅友德既敗韓乙度敵尚强且復至乃開城門陳於野使皆卧槍以待聞鼓即起賊李二果盛兵至輕我寡競而囂友德鼓之士騰躍搏賊遂縳李二以獻又都督劉江鎮遼瞭島東南有火光度倭且至犒師秼馬略不為意設伏燒賊船截其歸路約曰旗舉炮鳴伏盡起奮擊倭果翌日登岸江舉旗鳴鼓伏兵兩翼進搏賊大敗諸將問臨敵意思安閒惟飽士馬何也江曰窮冦逺來必飢且勞我以逸待勞以飽待飢兵法也又倭寇陷泉州朝廷責戰益急俞大猷疏曰賊尚萬人入死地能戰若迫城而攻彼實我虛彼逸我勞彼飽我飢一挫而東南事壞矣不若列營以困之彼欲攻柵以遁我實彼虛我逸彼勞我飽彼飢而我得犄角以取之敵以戰為守我以守為攻於是星布兵營畫地鑿溝令東西通而列柵其上賊挑戰不動已竟殱賊師不襲逺五代漢隱帝時李守貞趙思綰王景崇反遣樞密使郭威率禁兵將白文珂等督攻之諸將皆請先擊思綰景崇威計未知所向行至華州節度使扈彥珂謂威曰三叛連衡以守貞為主守貞先敗則思綰景崇可傳聲而破矣若捨近圖逺使守貞出兵於後思綰景崇拒戰於前則漢兵屈矣威以為然遂先擊守貞明郭英從傅友德征雲南兵由永寧路多險阻諸將欲深入郭英曰破敵貴先聲攻取必自近始舍近趨逺非䇿之上也遂以兵攻赤水河路時久雨水暴漲英斬木造筏乘夜濟河比曉敵大驚潰生擒烏撤并阿容等攻克曲靖陸涼越州關索嶺椅子寨餌敵取勝唐髙開道為蔚州總管幽州饑羅藝求賑開道許之藝遣老弱就食皆厚遇之藝悅不為虞更發兵三千車數百馬數千往請粟開道悉留不遣又曲環鎮陳許軍劉昌裔為營田副使環卒上官涗知留後㑹吳少誠引兵薄城有兵馬使安國寧謀以城應賊事泄昌裔密計斬之即召其麾下千餘人人賞縑二匹伏兵要諸巷令持縑者悉斬之無一人得脫賊聞解去又楊行密為將值畢師鐸鄭漢章將兵萬餘人猝至衆驚懼行密安卧帳中曰賊近告我遂積金帛糧米於一寨使老弱守之伏精兵於傍師鐸等至密自將千人衝其陳陽敗走師鐸兵追之入寨大掠伏發盡殱之遼景宗乾亨初宋下河東乘勝襲燕北院大王耶律希達與蕭托郭逆戰敗績退屯清河北耶律色珍取希達等青幟軍於得勝口以誘敵敵果爭赴色珍出其後奮擊敗之以敗軍誘敵亦同餌敵之義元察罕特穆爾謀復汴梁令弱卒立柵外城以餌賊賊出爭之弱卒佯走至城西因突鐵騎縱擊悉擒其衆賊不敢出明時海賊徐海麻葉犯杭胡宗憲馳至嘉興賊來薄城外宗憲取酒百餘罌投以毒載之兩舟選卒慧而猛者假冠服坐舟中佯作餉軍狀載向賊所從道見賊即委舟走賊信不疑爭取酒飲之多死受敵餌取敗附唐王佖為靈鹽節度使先是吐蕃欲成烏蘭橋每於河壖先貯材木朔方府每遣人潜載之委於急流終莫能成蕃人知佖貪而無謀先厚遺之然後并役成橋仍築月城圍守之自是朔方禦冦不暇由佖黷貨邊上以貽患焉臣等謹案餌敵可以取勝受敵餌即可以取敗兵家炯鑒事實相因杜典無此目謹附於此軍勝虜掠被追襲多敗唐李晟與李懷光同討朱泚懷光軍輒虜掠驅牛馬百姓苦之晟軍無所侵犯收復京城告諭於衆百姓安堵如故明傅友德守彭城王保保遣將李二來攻勢甚張友德度多寡不敵詗其衆方肆掠率步騎自吕梁渡直趨擊之單騎奮槊刺其驍將韓乙師乘而進敵大敗抽軍五代梁將劉鄩拒晉以晉兵盡在魏州晉陽必虛欲以竒計取之乃潛引兵自黃澤關西去晉人怪鄩軍數日不出寂無聲迹遣騎覘之無斥候者城中亦無烟火但烏止於壘上時見旗幟循堞往來晉王曰我聞劉鄩用兵一步百計必詐也更使覘之乃縛旗於芻偶之上使驢負之循堞而行得城中嬴老者語之云軍已去二日矣既而有人自鄴至者言鄩兵已趨黃澤晉王始發騎追之又黃文靖佐葛從周入潞㑹晉軍十餘萬俯外垣寨文靖慮孤軍難守乃與從周啓闉出師文靖為殿後命矢刃皆外向持重而還晉人不敢逼宋攻金宿州失利將班師諸軍發靈壁畢再遇獨留未動度軍行三十餘里乃火靈壁諸將問夜不火火今日何也再遇曰夜則照見虛實晝則烟埃莫覩彼已敗不敢迫諸軍乃可安行無虞汝等安知兵易進而難退耶遂還泗州乘敵抽軍襲破之附唐武宗時鎮州奏事官高迪密陳事宜其一以為賊中好為偷兵術潛抽諸處兵聚於一處官軍多就迫逐以致失利官軍須知此情自非來攻慎勿與戰彼淹留不過三日須散歸舊屯如此數四空歸自然喪氣官軍密遣諜者詗知其抽兵之處乘虛襲之無不捷矣臣等謹案抽軍之法所以防追襲也若預知敵情則乘虛更足以取勝謹增附此目益以見抽軍之宜慎云卑辭怠敵取之五代初青州王師範遣將盧洪攻棣州張蟾洪以兵返襲青州師範陽為好辭遣人迎語洪曰吾幼未能任事賴諸將共持之耳不然聽公所為也洪以師範無能為遽還不為備師範伏兵於道語其僕劉鄩曰洪來為我斬之明日洪至師範出迎鄩於坐上斬之伏兵發盡殺其餘兵又晉王李克用因劉守光使人諷鎮定尊已為尚父怒欲伐之諸將皆曰是為惡極矣不若陽為推尊以稔之乃與六節度共奉冊往守光益驕卒為晉所滅稱降及和因懈敗之唐初王君廓聚衆掠夏長平河東丞丁榮拒之且遣使慰召君廓見使謬欲歸首者榮輕之因陳兵登山君廓悉伏兵山谷中榮軍還掩擊破之又李光弼守太原史思明引兵十萬攻之光弼遣人詐為約降而穿地道周賊營中至期遣禆將將數千人出如降狀賊皆屬目俄而營中地陷死者千餘人賊衆驚亂官軍鼓譟乘之俘斬萬計又思明至偃師光弼悉軍趨河陽身以五百騎殿已入城衆二萬軍才十日糧賊頓白馬祠治塹溝築月城以守光弼謂李抱玉曰將軍能為我守南城二日乎抱玉曰過期若何曰棄之抱玉許諾即紿賊曰吾糧盡明日當降賊喜斂兵待期抱玉已繕完即請戰賊忿欺急攻之抱玉出竒兵夾擊賊帥周摯引却五代梁將朱珍攻朱裕於鄆州珍去鄆二十里遣精兵挑之鄆人不出裕詐為降書隂使人召珍約開門為內應珍信之夜率兵叩城裕登陴開門納珍軍已入甕城而垂門發鄆人從城上磔石以投之珍兵皆死珍僅以身免金李師夔遇賊張勝以萬人攻奉聖州城師夔度衆寡不敵乃僞與之和日致饋給勝信之師夔乘其不備使人刺勝殺之以其首徇曰汝輩皆良民脅從至此今元惡已誅可棄兵歸復其所賊衆大驚皆散去兩軍相對取背破之唐初吐谷渾冦邉詔李靖及江夏王道宗討之賊聞兵至走嶂山數千里諸將議息兵道宗固請討李靖然之乃遂帥偏師兼行倍道去大軍十日追及之賊據險苦戰道宗潛遣千餘騎踰山襲其後賊表裏受敵遂奔潰又至德中賊安慶緒遣嚴莊助張通儒拒官軍於陜李嗣業從郭子儀討賊遇於新店先是回紇傍南山設伏按軍北崦以待官軍與賊力戰數合我師初勝而後敗嗣業逐急應接回紇從南山望見官軍敗曵白旗而下徑抵賊背穿賊陳過賊陳西北角先陷嗣業又率精騎前擊表裏齊進賊衆大敗走河北又僕固懷恩領朔方行營節度㑹回紇請和助討史朝義即引兵屯陜州時諸節度兵齊進次黃水賊堅壁自固懷恩陳西原多張旗旝使突騎與回紇稍南出繚賊後舉旗為應破賊壁死者數萬宋曹瑋知秦州嘉勒斯賚入冦瑋迎戰二都谷賊雖衆然器甲殊少在後者皆持白棓毛連瑋知不足畏欲以氣凌之引百騎穿賊陳出其後升高指揮軍中鼓譟夾擊斬首三千明日視林薄間中傷及投崖死者萬計又張俊討李成賊驍將以衆十萬來援夾河而營楊存中謂俊曰彼衆我寡擊當用竒願以騎見屬公以步卒居前俊從之存中夜銜枚渡河出西山馳下擊賊背俊以步兵夾攻俘八千人遼耶律色珍為山西路兵馬都統宋將楊繼業陷山西諸郡色珍至定安遇賀令圖軍擊破之明日至蔚州敵不敢出色珍書帛射城上諭以招慰意隂聞宋軍來救令都監耶律達薩夜伏兵險厄俟敵至而發城守者見救至突出色珍擊其背二軍俱潰追至飛狐遂取蔚州金富察貞敗宋將程松於和尚原進兵至小關松將楊廷據險注射貞不得前令行軍副統費摩阿里為疑兵潜遣明安胡信率甲士五千人繞出其後反擊之宋兵大亂遂斬廷於陳宋兵走二里關又興定初宋人圍海州完顔仲元軍髙橋令提控完顔阿林領騎繞出其後夾擊之宋兵解去元史天澤圍武仙於衛州金將完顔哈達以衆十萬來援戰不利諸將皆北天澤獨以千人繞出其後敗一都尉軍遂與大軍合攻之仙逸去遂復衛州又至正末賊陷大寧伊蘇討之兵次侯家店與賊戰自昏抵曙散而復合伊蘇遣别騎繞出城後賊腹背受敵大敗之明鄧愈從太祖渡江克采石取太平元將陳額森合哈雅兵來戰甫合愈與徐達率竒兵繞出其後大破之獲額森哈雅走遂下建康又徐達與常遇春討張士誠敵大潰薄其城士誠弟士信來援遇春率竒兵入大全港營於東阡却壓其背士信急抽精兵搏戰遇春鼓將士立破之又徐達鎮池州陳友諒來犯太祖命常遇春助之令達設伏九華山下急掩其後友諒至盡鋭攻城城中伐鼓大譟伏盡發內外夾攻遇春率萬人自山下擊斬首萬計又沐英攻雲南大理城大理倚㸃蒼山二關為固英乃令王弼由洱水趨上關自以兵綴下關别遣胡海從間道夜渡河繞出㸃蒼山後緣岸而上立我軍旗幟英士卒望見皆踴躍大呼敵衆驚擾英遂斬關入海亦麾山上軍馳下前後夾攻敵悉潰走又成祖因盛庸軍夾河為營遂帥師東向下令曰吾觀敵陳每以精鋭在前罷弱在後今當以徑師前摧其精鋭中軍去敵五六里嚴陳以待俟我以精騎繞出敵背擊之使前奔中軍乘其氣乏擊之我躡其後乘勢逐北必敗慎勿逆擊彼敗不得前奔則盡力死鬭矣兩軍相對繼遣軍助即勝唐髙祖初率兵擊羣盜至龍門縣有賊毋端兒衆數千人掩至城下時諸軍無備為賊所乘髙祖親率百餘騎橫出助擊之所射應弦而倒賊大潰逐北數十里又羅士信取千金堡太宗令屈突通守之王世充自來攻堡通懼舉烽請救太宗度通力堪自守且緩救以驕世充通舉三烽已急太宗方出援之左右未獲從以兩騎進遇賊將葛彥璋射之擒之於陳後軍亦繼至通軍復振表裏奮擊世充大敗五代晉王李存朂救趙與梁軍相拒鄗邑鎮定兵扼河橋梁兵急擊之存朂望見鎮定兵將敗顧王建及曰橋為梁奪則吾軍危矣建及選騎馳擊梁兵梁兵敗解去宋趙葵既破金兵於蘄州復分軍為二陳趙范將左扈再興將右葵左右䇿應敵亦背山分為二以相當而不先動范曰金人必謀夜戰以幸勝乃預備大鼓令士卒聞鼓聲始動未幾金果進兵范叠鼓麾軍突鬬葵繼之獲其輜重山積金世宗大定二年宋以萬人據夀安縣嵩州刺史舒穆嚕圖喇押軍萬户圖克坦薩布以騎兵三百巡邏遇於縣東請師於富察沃稜沃稜使明安完顔呼沙呼率七百人助之宋兵多圖喇使士卒下馬跪而射之宋兵不能當走入縣城圖喇進逼之宋人棄城去追及於鐵索口復大敗遂復夀安元季文龍章焱等叛據處州趙賁亨帥衆圍之斬首三級焱復合衆二萬來攻陳惡溪南賁亨分兵拒守自將精鋭亂流衝擊屬萬戶呼都克台以援兵繼至擊之自已至亥賊乃退文龍溺死明初陳友諒陷太平進逼龍灣太祖與戰於石灰山未决馮勝率宿衛士直搗其中堅遂大破之兵多力有餘宜分軍相繼唐李盡忠叛詔王孝傑統兵十八萬討之孝傑軍至東峽石谷遇賊道險兵甚衆孝傑率精鋭之士為先鋒且戰且行及出谷布方陳以扞賊後軍總管蘇宏暉畏賊衆棄甲而遁孝傑既無後繼為賊所乘營中潰亂孝傑墮谷而死兵士被殺殆盡五代晉髙祖時安重榮反杜重威逆戰於宗城重榮為偃月陳重威擊之不動重威欲少却以伺之偏將王重允曰兩兵方交退者先敗乃分兵為三重威先以左右隊擊其兩翼戰酣重允以精兵擊其中軍重榮將趙彥之來奔重榮遂大敗走還鎮州閉壁不敢出重威率衆攻破之遼太宗㑹同八年分兵攻晉邢洺磁三州入鄴都境張從恩馬全節安審琦兵悉陳於相州安陽水之南皇甫遇與濮州刺史慕容超將兵千騎來覘遼軍至鄴都遇遼軍數萬且戰且却至榆林店遼軍繼至遇與彥超力戰百餘合遇馬斃步戰審琦引騎兵踰水以救遼軍乃還金宗翰駐軍北安與都統杲議伐遼杲軍出青嶺宗翰軍出瓢嶺期于羊城濼㑹軍宗翰以精兵六千襲遼主聞遼主自五院司來拒戰宗翰倍道兼行一宿而至遼主遁去乃使希尹等追之西京復叛耿守忠以兵五千來救至城東四十里富察烏爾古納先擊之斬首千餘宗翰宗雄宗斡宗峻繼至宗翰率麾下自其中衝擊之使餘兵去馬從旁射之守忠敗走其衆殱焉明廖永忠與蜀將鄒興戰於夔府分軍為前後陳前陳既接乃令後軍兩翼傍出大敗之又常遇春從攻張士誠蘇州圍久士誠欲出城突戰遂謀奔遇春營遇春覺之分兵北濠斷其後遣兵與鬬乃命王弼與决死戰遇春復率衆繼之士誠兵大敗走入城勢益窘我寡敵衆自逺至乘疲敗之五代晉楊光逺反引契丹侵陷貝州博州守周儒亦叛降竇儀言于出帝曰今不以重兵守博州渡使契丹得引北兵東過河與光逺合則河南危矣乃遣李守貞皇甫遇以兵萬人沿河而下儒果引北兵自馬家渡濟河方築壘守貞等急擊之契丹大敗遂與光逺隔絶契丹主聞河上兵敗與晉戰于澶魏之間亦敗遂北去宋曹瑋知鎮戎軍常出與畨戰畨引去瑋偵敵去已逺乃緩驅所掠牛馬輜重而還敵聞瑋逐利行遲師又不整遂還兵來襲將至瑋使諭之曰畨軍逺來必疲我不乘人之怠請憩士馬少選决戰敵方甚疲皆欣然解嚴良久瑋又使諭之曰可相馳矣乃各鼓軍而進大破敵兵因謂其下曰吾知敵已疲故為貪利以誘之比其復來幾行百里矣若乘鋭以戰猶有勝負逺行之人小憩則足痺不能立人氣亦䦨吾以此取之元雅克特穆爾聞特們德爾及額森特穆爾軍陷通州將襲京師急引軍至通州乘其初至擊之敵軍狼狽走渡潞河夾河而軍敵列植黍秸衣以氊衣然火為疑兵夜遁雅克特穆爾率師渡河追之明傅友德伐蜀破階文蜀丞相戴夀帥兵來援時諸將議江水漲欲駐師大溪口友德乃下令曰彼逺來勞困衆方洶洶一戰可克也遂迎擊夀兵拔漢州擒其將梁士達等俘獲甚衆又張溫守蘭州㑹元王保保引兵來襲溫曰彼衆我寡難與為敵但其匆卒逺來未知我虛實乘暮擊之可挫其鋒若復不退則亦可固守以待援乃整兵出戰保保兵却卒完其城挑戰唐郭子儀李光弼率師下井陘拔常山賊將史思明收散卒數萬人踵其後我行亦行我止亦止子儀選驍騎五百更挑戰三日至行唐賊疲乃退我軍乘之又敗於沙河五代梁遣王景仁將魏滑汴宋等兵七萬人擊趙趙王王鎔乞師於晉莊宗自將出贊皇㑹周德威於石橋進距柏鄉五里營於野河北莊宗意在速戰德威曰吾兵少而臨賊營門所恃者一水隔耳使梁得舟筏渡河吾無類矣不如退軍鄗邑誘敵出營擾而勞之可以䇿勝也乃退軍鄗邑德威晨遣三百騎叩梁營挑戰自以徑兵三千繼之景仁怒悉其軍以出與德威轉鬭數十里至於鄗南兩軍皆陳梁軍橫亘六七里汴宋之軍居西魏滑之軍居東德威請俟其將退而擊之至未申時梁軍東偏塵起德威鼓譟而進麾其西偏曰魏滑走矣又麾其東偏曰梁軍走矣梁陳動不可復整乃皆走遂大敗自鄗追至柏鄉景仁以十餘騎僅免漢隱帝遣趙暉討王景崇景崇西招蜀人為助蜀兵至寶雞為暉將藥元福李彥從所敗暉攻鳯翔塹而圍之數以精兵挑戰景崇不出暉乃令千人潜之城南一舍僞為蜀兵旗幟循南山而下聲言蜀救兵至矣須臾塵起景崇以為然乃令數千人潰圍而出以為應暉設伏以待之景崇兵大敗元蘇布特從睿宗經理河南道出牛頭關遇金將哈達帥步騎數十萬待戰睿宗問以方略蘇布特曰城居之人不耐勞苦數挑以勞之戰乃可也師集三峯山金兵圍之數匝㑹風雪大作其士卒僵仆師乘之大捷敵處髙勿攻唐蘇定方征賀魯至曵嘻河賀魯率十姓兵十萬拒戰輕定方兵少舒左右翼包之定方今步卒據高攢矟外向親引徑騎陳北原賊三突步陳不能入定方因其亂擊之賊大奔五代唐李嗣昭攻梁邢洺為梁將葛從周所敗梁兵追之李嗣源從間道至解鞍礪鏃慿髙為陳左右指揮梁兵望之莫測嗣源急呼曰吾取葛公士卒可無動乃馳騎犯之出入奮擊嗣昭繼進梁兵解去元董文蔚從憲宗伐宋入川蜀至釣魚山崖壁巉峭唯一徑可登敵恃險阻未即降帝命攻之文蔚以次往攻激厲士卒挾雲梯冒飛石履﨑嶇以登直抵其寨苦戰頃之兵士被傷乃還敵黨急之則合緩之則離唐髙仁厚討叛將楊師立圍梓州久不下乃為書射城中遺將士曰仁厚不忍城中玉石俱焚為諸君緩師十日使諸君自成其功若十日不送師立首當分見兵為五畨畨分晝夜以攻之於此甚逸於彼必困矣五日不下四面俱進克之必矣諸君圖之數日賊黨鄭君雄大呼於衆曰天子所誅者元惡耳他人無預也大譟突入府中師立自殺五代初楊行密遣劉存攻鄂州焚其城城中兵突圍而出諸將請急擊之存曰擊之復入則城愈固聽其去城可取也是日城破執杜洪斬於廣陵假託安衆唐裴行儉奉詔冊立波斯王且為安撫大食使途經莫賀延磧屬風沙晦暝導者迷將士飢乏行儉命止營致祭令曰井泉非遙衆少安俄而雲收風靜行數百步水草甚豐後來者莫識其處衆皆驚比之二師將軍又髙仙芝討吐蕃破連雲堡留兵守之而進將至坦􅀈嶺直下峭峻四十餘里仙芝恐兵士憚險不下乃潛遣二十騎詐作阿弩越衣服上嶺來迎既至坦􅀈嶺兵士果不肯下曰公驅我何去言未畢仙芝所使二十人來云阿弩越並好心奉迎仙芝佯喜令兵士盡下下嶺三日阿弩越果來迎宋狄青征儂智髙兵出桂林之南道傍有廟人謂其神甚靈青遽為駐節禱之因祝曰勝負無以為據乃取百錢自持之且與神約果大捷則投此期盡錢面也萬衆方聳視已揮手一擲則百錢盡紅矣於是舉軍歡呼青大喜顧左右取百釘來即隨錢疏密布地而釘帖之加以青紗籠復手自封焉曰俟凱旋當謝神取錢其後破崑崙關敗智髙師還如言取錢與幕府士大夫共視之乃兩面錢也金和羅附布鼐布鼐誘烏春兵為亂世祖與遇蘇素海甸世祖曰豫昔有異夢今不可親戰若左軍中有力戰者則大功成矣命肅宗及實喇蘇卜實與之戰大敗之欽定續通典卷一百
