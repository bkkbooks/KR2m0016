body:
  text: 兵撫士唐李晟能與下同甘苦以忠義感發士心終無攜怨且臨下明每治軍必曰某有勞某長於是雖厮養小善必記姓名又馬燧移剌懷州時師旅後嵗大旱田茀不及耕燧務勤教化止橫調將吏有親者必造之厚為禮瘞暴胔止煩苛是秋稆生於境人賴以濟五代周太祖居軍中延見賓客褒衣博帶及臨陳行營幅巾短後與士卒無異所得賜子與諸將會射恣其所取其餘悉以分賜士卒將士皆歡樂又王環每戰身先士卒與衆同甘苦嘗置針藥於座右戰罷索傷者於帳前自傅治之士卒𨽻環者相賀曰吾屬得死所矣故所向有功宋种世衡為將善撫養士卒病者遣一子專視其食飲湯劑人以是樂為用又嶽飛御軍嚴整卒有取民麻一縷以束芻者立斬以徇然遇士卒有疾躬為調藥諸將逺戍遣妻問勞其家死事者哭之而育其孤或以子婚其女李寶自楚來歸韓世忠留之寶痛哭願歸飛世忠嘆服又吳玠素不為威儀除宣撫副使簡易如故常負手步出與軍士立語幕客請曰今大敵不逺安知無刺客萬一或有意外豈不上負朝廷下孤軍民之望哉玠謝曰誠如君言然玠意不在此國家不知玠之不肖使為宣撫玠欲不出恐軍民之寃抑而無告者為門吏所隔無由自達某所以屢出者為此也幕客乃服金延嘉們都從監軍杲招復陜西進至鳯翔齊國初廢諸路多反覆不一杲授們都牌劄令往撫定們都所至多張甲兵從者安之違者討之帖然無復叛者杲甚嘉之又元光時以赫舍哩約赫德為京東便宜總帥兼行戶工部事帝因謂宰臣曰約赫德性剛人皆畏之委之行部無不辦者至於御下亦頗有術提控有呼喇珠者渠厚待之常同器而食其人感奮遂以戰死英王守純曰凡為將帥駕馭人材皆當如此帝曰然元顯宗嘗出征駐金山會大雪擁火坐帳內歡甚顧謂左右曰今日風雪如是吾與卿處猶有寒色彼從士亦人耳腰弓矢荷刃周廬之外其苦可知遂命饔人大為肉糜親嘗而遍賜之又王榮祖攻石城遣健卒賈實穴其城城崩被壓衆謂已死弗顧也榮祖曰士亡身死國安忍棄去發石取之猶生一軍感激樂為效死明郭登為都督守大同時大同兵士戰沒後城門晝閉人心惶懼有勸登棄城去者登不可登雖處危疑而氣益壯弔死問疾親為存恤晝夜籌畫修城繕兵以圖後舉卒完其城明賞罰唐史思明遣賊將周摯攻河陽北城李光弼登城望賊曰彼雖衆亂而囂不足懼也因謂郝廷玉論惟貞曰爾等望吾旗而戰若麾旗緩任爾觀便宜而進退吾旗連麾三至地則萬衆齊入生死以之少退者斬廷玉等䇿馬赴賊有一將援槍刺賊洞馬腹連及數人一將逢賊不戰而退光弼召不戰者斬之賞援槍者絹五百匹令赴戰須臾廷玉奔歸光弼望之驚曰廷玉退吾事危矣命使者取廷玉頭來廷玉見使者曰馬中箭非退也使者馳報光弼令換馬而復廷玉等決死往戰光弼連麾三軍望旗俱進聲動天地一鼓而破之宋仁宗皇祐中儂智髙叛命狄青討之青臨行上言謂古之師還以訊馘告割耳鼻則有之不聞以獲首者秦漢以來方有是事故獲一首賜爵一級因謂之首級然開爭啓幸莫此之甚故軍士爭首級以致相殺又其間多以首級為貨售於無功不戰之人非所以勸願一切寢罷如師有功則差次其勞全軍加賞無功則斟酌其罪全軍加罰庶合上下一心不專自為私計則決勝之道也詔從之又宗澤在磁州以趙世隆為中軍將澤去磁以州事付李侃世隆殺之後與其弟世興將兵二萬歸澤世隆入拜澤詰之曰河北陷沒吾宋法令與上下之分亦陷沒耶令斬之時衆兵露刃於庭世興佩刀侍側左右皆懼澤徐語世興曰汝兄犯法當誅汝能奮志立功足以雪恥矣世興感泣會滑州報至澤謂世興曰試為我取滑州世興欣然受命遂得州以歸金布薩忠義拜平章政事兼右副元帥世宗賜以御府貂裘賓鐵吐鶻弓矢大刀具裝對馬及安山鐵甲金牌詔曰軍中將士有犯連職之外並以軍法從事有功者依格遷賞明王驥受命巡邊至甘肅見莊浪等處守兵俱少𤇺堠不飭翼日大集兵衆於轅門問先年遇敵先退者誰皆曰都指揮安敬命引出斬之徇於衆曰自今遇敵畏縮者視此三軍股栗因簡戍兵勤訓練軍容肅然臣等謹案杜典此下有賞宴不均致敗一條夫賞宴之均所以示犒考唐太宗追宋金剛於雀鼠谷一日八戰皆捷軍中止有一羊與將士分食之又宋太祖於諸鎮臣來朝必賜以飲食錫賚殊異觀賞宴均者之制勝即可知不均之所由敗也故不别為類謹附識於此行賞安衆唐劉仁軌鎮守百濟時百濟再被亂仁軌始命葺復戶版營屯田以經略髙麗先是貞觀永徽中士戰歿者或贈官推授子弟顯慶後討伐恩賞殆絶及破百濟有功者皆不甄敘州縣購募不願行身壯家富者率以賄免所募皆獰劣寒憊無鬭志仁軌具論其弊請加慰賚以鼓士心又表用扶餘隆使綏定餘衆詔可後討髙麗平之分賞取敵宋師征蜀諸將入辭太祖謂曰所破郡縣當傾帑藏為朕賞戰士國家所取惟土疆爾故人皆效命所至成功金太祖襲遼主於鴛鴦濼時奉聖州守委城遁去衆無所屬相與叩門請李師夔主郡事師夔許之乃搜卒治兵都古爾納兵至師夔與其故人沈璋密謀出降曰一城之命懸於此舉即率親信十數輩詰旦出城見伊都與之約曰今已服從願無以兵入城及俘掠境內伊都許諾詔以師夔領節度以璋佐之賜師夔駿馬二俾招未附者許以便宜從事又興定時完顔薩布奉詔出兵河北時河北所在義軍官民堅守堡寨力戰破敵者衆薩布上章言此類忠赤可嘉若不旌酬無以激人心乞朝廷量加官賞萬一敵兵復來將爭先效用矣帝覽奏召樞密官曰朕與卿等亦嘗有此議以不見彼中事勢故一聽帥臣規畫今觀此奏甚稱朕意其令有司遍賞之元初宋人圍諸路軍於成都汪德臣遣將赴之約曰先破敵者奏領此城諸將奮勇圍遂解詔候江南事定如約以城與之行賞招降唐李訴討吳元濟擒驍將丁士良不殺署為捉生將士良請盡死以報德因説訴討吳秀琳秀琳降以為衙將有李憲者亦賊將訴更其名曰忠義而用之於是賊中降者相繼訴聞其有父母者給粟帛而遣之衆皆感泣訴每得降卒必親引問委曲由是賊中險易逺近虛實盡知之因襲蔡宋嶽飛受命招捕楊么飛所部皆西北人不習水戰飛曰兵何常顧用之何如耳先遣使招諭之賊黨黃佐曰嶽節使號令如山若與之敵萬無生理不如往降節使誠信必善遇我遂降飛表授佐武義大夫單騎按其部拊佐背曰子知順逆者果能立功封侯豈足道欲復遣子至湖中視其可乘者擒之可勸者招之如何佐感泣誓以死報佐襲周倫寨殺倫擒其統制陳貴等飛上其功遷武功大夫佐又招楊欽來降飛喜曰楊欽驍悍既降賊腹心潰矣表授欽武義大夫禮遇甚厚乃復遣歸湖中兩日欽説余端劉銑等降飛詭罵欽曰賊不盡降何來也杖之復令入湖是夜掩賊營降其衆數萬金宣宗興定四年權參知政事內族巴薩上言宋境山州宕昌東上拶一帶番族昔嘗歸附分處德順鎮戎之間其後有司不能存恤相繼亡去近聞復有歸心然不招之亦無由自至誠得其衆可以助兵寧謐一方臣以同知通逺軍節度使事烏庫哩長夀及通逺軍節度使溫屯永昌皆本番屬且久鎮邊鄙深得彼心已命遣人招之其所遣及諸來歸者皆當甄奬請預定賞格以待之帝是其言元順帝至正間額琳沁巴勒移江西行省左丞時妖冦由蘄黃陷饒州饒之屬邑安仁與龍興相接境其民皆相挺為亂額琳沁巴勒道出安仁因駐兵招之來者厚加賞賚不從者命哈喇多爾濟等攻散之餘干久為盜區亦聞風順服示惠招降唐憲宗元和中詔諸軍進討李師道魏博節度使田宏正自楊劉濟河獲其將夏侯澄等四十七人帝並釋放之給繒絮遞送軍前驅使如父母在欲還者優遣及澄等至行營賊覘知之潛相傳告由是叛徒皆感朝廷恩繼有降者劉悟遂擒師道傳首京師又髙仁厚討卭州賊阡能未發前一日得諜者仁厚命釋縛因謂之曰髙尚書來所將止五百人無多兵也汝當為我潛語寨中人云尚書欲拯救汝曹尚書來汝曹各投兵迎降當遣復舊業所欲誅者阡能羅渾擎等耳必不橫及百姓也遂遣之仁厚引兵發至雙流阡能聞其將至遣羅渾擎立五寨於雙流之西伏兵千人於野橋箐以邀官軍仁厚詗知引兵圍之下令勿殺遣人釋戎服入賊中告諭如昨日所以語諜者賊大喜爭棄甲投兵請降仁厚悉撫慰書其背使歸語寨中未降者餘衆爭出執渾擎以降仁厚悉命焚五寨及其甲兵明日諸寨知大軍已近爭出執阡能迎官軍歡呼不可止賊寨在他所者分遣諸將往降之逆黨悉平五代周世宗顯德五年征淮南天長軍使易贇令男延夀齎表以其城來降天長縣當九驛之路城小而固南人以其地為雄州世宗之破楚州也獲其守將張彥卿男光祐捨而不誅因令光祐齎璽書以諭贇贇知楚州既下故降宋嶽飛攻賊李成將馬進賊駭亂退走飛使人呼曰不從賊者坐吾不殺汝坐而降者八萬餘人賊大敗又因曹成敗去謂張憲等曰追之則脅從可憫縱之則復聚為盜今遣若等誅其酋而撫其衆慎勿妄殺纍主上保民之仁於是降者二萬進兵追之成出降金宣宗元光二年御史中丞師安石上章言備禦二事其二曰今敵中來歸者頗多宜豐其糧餉厚其接遇度彼果肯為我用則擇有心力者數十人潛往以誘致其餘來者既衆彼必轉相猜二然後徐起而圖之則中興之功不逺矣帝嘉納之元阿爾哈雅攻潭州州守李芾自殺其將劉孝忠以城降諸將欲屠之阿爾哈雅曰是州生齒數百萬口若悉殺之非上諭巴延以曹彬不殺意也其屈法生之復發倉以食飢者遣使徇郴全道桂陽永衡武岡寶慶袁韶南雄諸郡其守臣皆率其民來迎曰聞丞相體皇帝好生之德母殺虜所過秋毫無犯民今復見太平各奉表來降又博囉引兵入齊宋守將李全降諸將皆曰全勢窮出降非心服也今若不誅後必為患博囉曰不然誅一人易耳山東未降者尚多全素得人心殺之不足以立威徒失民望表聞詔博囉便宜處之乃以全為山東淮南楚州行省鄭衍德田世榮副之郡縣聞風欵附山東悉平明太祖既撫定寧越欲遂取浙東諸郡乃謂諸將曰吾師比克建康秋毫無犯故一舉而遂定今新克婺城當厚加撫恤使民樂於歸附則彼未降郡縣亦必聞風而歸矣又胡大海常自稱吾行軍惟知有三事不殺人不虜人婦女不焚人廬舍故其軍一出逺近爭趨附之軍帥志堅必勝唐廣平王收長安李嗣業統前軍陳於香積祠北賊將李歸仁擁精騎薄戰王師注矢逐之走未及營賊大出掩追騎還蹂王師於是亂不能陳嗣業謂郭子儀曰今日不以身餌敵則軍無類矣即肉袒持長刀大呼出陳前殺數十人陳復整步卒二千以陌刀長柯釡堵進所向無前歸仁匿兵營左覘軍勢僕固懷恩引回紇鋭兵擊其伏嗣業出賊背合攻之自日中至昃斬首六萬級賊東走遂平長安又朱泚逼奉天德宗召渾瑊勉諭之賊造雲梁薄城下三千餘人相繼而登城上士卒皆大寒餒又少甲胄瑊但威激誡勵之以飢弱之衆當劇賊之鋒瑊力戰應敵中流矢遽自拔之血流霑足格鬭不已不言瘡痛以激士心既而李懷光大軍至賊解圍去五代梁晉相拒於柏鄉梁龍驤軍以赤白馬為兩陳旗幟鎧仗皆如馬色晉兵望之皆懼莊宗舉鍾以飲嗣源曰卿望梁家赤白馬懼乎雖吾亦怯也嗣源笑曰有其表爾翼日歸吾廄也莊宗大喜曰卿當以氣吞之因舉鐘飲釂奮檛馳騎犯其白馬挾二禆將而還梁兵敗宋欽宗靖康二年宗澤自大名至開德與金人十三戰皆捷以書勸康王檄諸道兵會京城又移書北道總管趙野河東北路宣撫范訥知興仁府曾楙合兵入援三人皆以澤為狂不答澤遂以孤軍進至衛南先驅云前有敵營澤揮衆直前與戰敗之轉戰而東敵益生兵至澤將王孝忠戰死前後皆敵壘澤下令曰今日進退等死不可不死中求生士卒知必死無不一當百金人敗退却數十里金世祖與實圖美交好鄰部不悅遂合兵攻之實圖美使弟阿蘇美率二百人南下拒敵敵兵千人已出其東據髙泉實圖美將五千人迎擊之敵將額勒本者勇士也出挑戰實圖美射中其馬額勒本反射射中實圖美腹實圖美拔箭戰愈力阿蘇美與勇士七人步戰殺額勒本諸部兵遂敗又大定初丞相襄從左副元帥默音以本部兵討契丹戰於肇州之長濼襄先登鏖擊足中流矢裹創以戰氣愈厲七戰皆勝默音握其手曰今日之捷皆公力也敵走渡霧凇河追擊之元蘇布特從諸王巴圖等攻曼濟勒部主齊哩克戰敗於漷寧河諸王以敵尚衆欲要蘇布特還徐圖之蘇布特曰王欲歸自歸我不至圖納河瑪察城不還也乃馳至瑪察城諸王亦至遂攻拔之而還又趙瑨攻相州抵其門死士突出瑨直前擊之流矢中鼻側鏃出腦後拔矢再戰七日破其城明朱能從成祖師駐臨淮諸將以盛暑乏糧又戰小却多請班師能曰自義舉以來克捷多矣豈可因小挫遂自摧阻耶但當為宗社計整兵前進成祖拊髀曰爾言深合我意遂進兵渡淮軍將驕敗唐郭孝恪為西安都護討龜兹破其都城孝恪自留守之龜兹相那利潛引西突厥之衆并其國兵萬餘人來襲孝恪時營於城外有龜兹人來謂孝恪曰那利我之國相人心素歸今亡在野必思為變城中之人頗有異志公宜備之孝恪不以為意那利率兵奄至孝恪始覺乃領部下千餘人將入城城中降人與那利表裏夾擊孝恪自為前鋒力戰而入至其王所居旋復出戰為冦所殺又昭宗時李仁矩為閬州節度董璋反率凶黨以攻其城仁矩召軍校謀守戰利害皆曰璋久圖反計以賂誘士心凶氣方盛未可與戰宜堅以老之儻浹旬之間大軍東至賊必自退仁矩曰蜀兵懦安能當我精甲即驅之出戰兵未交為賊所敗既而城陷仁矩被擒宋太祖伐蜀遣王全斌崔彥進等出鳯州劉光儀曹彬出歸州蜀孟昶遣王昭逺拒之兵始發成都昶遣李昊等餞之昭逺手執鐵如意指揮軍事自比諸葛亮酒酣謂昊曰吾之是行何止克敵當領此二三雕面惡少兒取中原如反掌爾全斌至三泉遇昭逺擊敗之昭逺焚吉柏江浮橋退守劍門敵屢勝驕不備可敗五代梁晉戰於胡栁晉軍敗莊宗欲引兵退保臨濮閻寶曰夫決勝料勢決戰料情情勢既得斷在不疑今梁兵窘蹙其勢可破勝而驕怠其情可知此不可失之時也莊宗謝曰微公幾敗吾事乃整軍復戰遂敗梁兵軍行自表異致敗宋种世衡居西邉黨項犯邉有敏珠爾族首領驍悍最為邉患世衡欲以計擒之聞其好擊鼓乃造一馬持戰鼓以銀裹之極華煥密使諜者陽賣之入敏珠爾族後乃擇驍卒數百人戒之曰凡有負銀鼓隨者併力擒之一日羌酋負鼓而出遂為所擒又趙范趙葵敗李全於揚州議出堡塞西門有堡塞候卒識全槍垂雙梆本又作拂為號以告范范喜謂葵曰此賊勇而輕若果出必成擒矣乃悉精鋭誘致擊敗之鼓裹銀槍垂梆亦同表異之義金宗望等追遼主於石輦驛遼主謂宗望兵少必敗與嬪御皆自髙阜下平地觀戰伊都示諸將曰此遼主麾蓋也若萃而薄之可以得志騎兵馳赴之遼主望見大驚即遁去遼兵遂潰臣等謹案唐朱泚之亂李懷光自河北赴難李晟每將合戰必自表異繡帽前行親自指導懷光見之不悅乃謂晟曰將帥當持重豈宜自表飾以啖賊也晟曰晟久在涇原軍士頗相畏服故欲令先識以奪其心耳又宋韓世忠聞劉豫聚兵淮陽勒衆向敵遣人語之曰錦衣驄馬立陳前者韓相公也或危之世忠曰不如是不足以致敵敵果至殺其導陳者二人遂引去據此則自表異不唯不致敗并可以取勝所謂運用之妙存乎一心也謹附識於此師行衆悲恐敗唐僖宗廣明時黃巢攻汝州欲薄東都田令孜請自將帝幸神䇿軍以飛龍使楊復恭副令孜於是募兵京師得數千人時巢已陷東都帝餞令孜章信門賚遺豐優然衛兵皆長安髙資世籍兩軍得稟賜侈服怒馬以詫權豪初不知戰聞科選皆哭於家隂出資雇販區病坊以備行陳不能持兵觀者寒毛以栗賊進取陜虢神䇿兵過華裹三日糧不能飽無鬭志賊急攻關王師潰聲感人附唐李筌太白隂經曰古人出師必犒以牛酒絲竹哀怨悽愴復安得而用哉故隨筵樂例用大鼓枝鼓腰鼓破陳樂笛拍板舞劍渾脫角抵投石拔拒蹴踘五代周世宗征南唐取泗州周師步騎數萬水陸齊進軍士作檀來之歌聲聞數十里元崇古嚕領征北諸軍帥師踰金山攻巴林之地巴林之南有逹勒琿河其將特哩臺阻水而軍伐木柵岸以自庇士皆下馬跪坐持弓矢以待元軍矢不能擊馬不能進崇古嚕命吹銅角舉軍大呼聲震林野其衆不知所為爭起就馬於是麾師畢渡守則有餘唐吳少誠攻許州上官涗知節度留後欲棄城走判官劉昌裔追止之曰留後既受詔宜以死守城況城中士馬足以破賊但堅壁不戰不過五七日賊勢必衰我以全制之可也涗然之賊日夕攻急堞壞不得修昌裔令造戰棚木柵以代之募壯士破營得突將千人鑿城分出大破之因立戰棚木柵於城上守陴遂安宋魏勝守海州金兵大至環城圍數重勝與統制郭蔚分兵備禦偃旗仆鼓寂若無人金軍驚疑數日不敢攻已乃植雲梯置炮石四面合圍負土填壕勝俟其近城鳴鼓張旗矢石俱發繼以火牛金液凡三晝夜金兵不能近金哀宗天興初元兵圍汴京汴人共推強伸為府簽事領所有軍二千五百人元兵圍之東西北三面多樹大炮伸括衣帛為幟立之城上率士卒赤身而戰以壯士往來救應大呌以憨子軍為號其聲勢與萬衆無異兵器既盡以錢為鏃得元兵一箭截而為四以筒鞭發之又創遏炮用不過數人能發大石於百步外所擊無不中伸奔走四應所至必捷得二駝及所乘馬皆殺之以犒軍士人不過一啖而得者如百金之賜云守拒法附唐張巡守睢陽修守具賊為雲梯勢如半虹置精卒二百於其上推之臨城欲令騰入巡預於城潛鑿三穴候梯將至一穴中出大木末置鐵鈎鈎之使不得退一穴中出一木拄之使不得進一穴中出一木末置鐵籠盛火焚之賊又以鈎車鈎城上柵闔巡以大木置連鎖大鐶拔其鈎而截之賊又造木驢攻城巡鎔金汁灌之賊又以土囊積柴為磴道欲登城巡潛以松明乾蒿投之積十餘日使人順風持火焚之巡之所為皆應機立辦賊服其智乃不復攻宋曾公亮武經總要曰守城之道無恃其不來恃吾有以待之無恃其不攻恃吾有所不可攻故善守者敵不知所攻非獨為城髙池深卒強糧足而已必在乎慮智周密計謀百變或彼不來攻而我守或彼不挑戰而我擊或多方以謀彼師或屢出以疲彼師或彼求鬭而我不出或彼欲去而懼我襲若此者皆古人所以坐而役敵國之道也此雖得禦攻之計然又要先審可守之利害凡守城之道有五敗一曰壯夫寡小弱衆二曰城大而人少三曰糧寡而人衆四曰蓄貨積於外五曰豪強不用命加之外水髙而城內低土脈踈而池隍淺守具未足薪水不供雖有髙城宜棄勿守守有五全一曰城隍修二曰器械具三曰人少粟多四曰上下相親五曰刑嚴賞重加之得大山之下廣川之上髙不近旱而水用足下不近水而溝防省因天時就地利土堅水流險阻可恃兼此形勢守則有餘故兵法曰城有不可攻又曰善守者藏於九地之下皆謂此也凡敵已向城乘城將士皆援立牌以自障城及弩臺上並度視逺近施放矢石火毬火鷂鞭箭敵在城下則拋飛鈎敵若填壕則為火藥鞭箭以射焚其芻藁橋械敵傅城欲上則隨其處下擂木擂石以擊之投飛炬以燒其攻器下火牀及以行罏鎔鐵灑灼敵人揚石灰粳麩眯害其目樓棚踏空版內雜短兵下刺登城者若登者漸多則禦以狼牙鐵拍手漸攀城則以連枷棒擊之銼手斧斷之敵以衝車等進則穿以鐵鐶木鐶放猛火油敵雲梯倚城則引義竿推撞車敵木驢空音孔城則用絞車鐵撞燕尾炬壞之敵飛炮石則張布幔繩遏之敵為地道來攻則為地聽候其來方穿井邀之霹靂火毬煙毬等害之敵附髙穴城則縋遊火箱灼之敵築土堙傍城欲上則穿地道至堙下引取其土敵堙自壞或城內薄城起堙相對盛兵抵禦敵以火攻城則城上應救火之具有托義火鈎火鐮栁灑子栁罐鐵手貓唧筒尋常之所預備者若攻具猛至則為水袋水囊以投沃之一應棚樓器械雖已塗覆亦頻舉麻搭潤護若敵為火車燒城門則下濕沙滅之切勿以水水加則油焰愈熾敵若縱煙向城則列甕缶以醋漿水各實五分人覆面於上其煙不能犯鼻目敵夜圍城則每五十人以一人繫城下置食其前城上聞犬吠則縋火下照舉表加備又於城半腹每十步繫一燈籠又束蘆葦插以松明樺皮可用照敵或攻摧女牆則以木女牆代之或攻壞城門則以刀車塞之又陳規守城録曰凡攻城者有生有死而善守者有生無死今夫百里之城有數敵登之守城之人便自甘心乞命於敵者非攻之善乃守之不善也敵先採濕木編洞屋以生牛皮蓋其上戴之令人運土木填壕以進攻械守城人得計則城內先施炮碎之若要摧毁攻械則須用大炮及石敵人攻城用大炮蓋欲摧毁城樓守城欲用摧毁敵人攻械大炮與小炮逺炮齊用縱敵在城外伐木為對樓雲梯火車等攻械可以炮盡又須先用稍大木造髙一丈長一丈濶一丈一丈上下外直裏斜外密裏疏洞子外密處以大麻繩橫編如竹笆相似以備炮石衆多攻壞女頭即於兩邉連進洞子向前以代女頭則炮石縱大且多亦無損壞間有損者即前抽換如此捍禦炮石亦何能害人已可必得無虞也又築城之制城面上必作女頭牆中間立狗腳木一條每女頭中挂搭箆籬惟可以隔遮弓箭弩於炮石則難以遮隔若改作平頭牆不用箆籬只於近下留品字方眼與女頭相似亦甚濟用又敵人初到城下觀其攻械勢恐難遏宜便於城裏腳下取土深濶裏壕壕外去壕數丈再築重城對舊城門更不作門却於新築城下緣裏壕二三里地新城上開門使人入得大城直行不得須於裏壕垠上新城腳下繞繚二三里地方始入門若此則假使敵善填壕止不過填外壕必不能填裏壕若由門入城須行新城腳下裏壕垠上新城上人直下臨敵何物不可設用敵必不敢入既由正門入城尚不敢豈肯用命打城乎古人云上策莫如自治又事貴制人不貴制於人皆此之謂也明吕坤實政録曰凡城不宜大大則難守城不宜卑卑則易登大者根厚五丈頂濶二丈五尺小者根厚三丈頂濶丈五髙須三丈五尺卑亦不下三丈外峻中陂垜頭髙六尺濶七尺四平方角垜不用眼此眼不能發矢石且窺敵亦無賴此三尺為垜口厚二尺五寸髙與心齊口隘小雖敵上為難而我不能出頭口髙厚雖堅久可恃而我不能下視垜口牆根之下留天井一箇圓徑一尺太大則敵得力太小則我不便直通城下一眼直看城根可落升口圓石可容仰月鏟斷鈎杆推雲梯可使三刺槍可打快槍發箭用噴火噴糞天井之制下圓上方方口橫二丈長二丈有半敵即上城先投井中足不及定手安得施我即殺之矣此眼平日以石推壓但可流水用則開之鑿石更妙守城時以門二扇蓋之防我失腳垜口用鼓腔琉璃磚厚一尺鈎杆滑不可著敵臺方三丈每面六垜口七十步立一臺逺則矢石無力弓箭火槍髙手俱置臺上以便矢石交及鉛箭火藥須備百倍兩敵臺交相射打則兩臺之間雖守垜無人而敵亦不敢登矣城根土堅上留一丈下面即挑池池深三丈口濶十丈底濶三丈城根窄則敵無處容足又池深以助城髙池底每十步鑿一圓井口濶一丈深一丈謂之重淵及泉更好不則外引河水或內引城中雨潦之水常令丈深若土脈不堅城根之外須留三五丈池兩崖多栽盤根宿草以耐崩坍池外不用髙阜之土以防填壕但為品窖以陷敵馬池外一里之內不可栽樹一蔽望敵之眼使敵得以潛伏而我不見一小樹砍倒數株倒倚城上可以緣登又橫軃池中可以涉水城門須有弔橋濶三丈竹弔橋不如作機橋可陷敵馬城門不可安在洞中常宜近外使敵無所容身若原在洞中安門者城門之上以磚砌五星池狀通兩扇門面深二尺濶一尺留五孔大如升髙地一尺敵以火焚門可以下水可以放快槍可以射箭可以擂石城內附牆多留墱道半里一座以便急時往來每墱道須留一門以防敵人登城城上用內攔牆髙與心齊以防進城之敵便於對打欽定續通典卷九十六
