body:
  text: 禮嘉鹵簿旌旗附元明元崇天鹵簿中道頓遞隊象六飾以金裝蓮座香寶鞍韂鞦轡罽勒犛牛尾拂跋塵鉸具導者六人馭者南越軍六人皆弓花角唐帽緋絁銷金䙆衫鍍金束帶烏鞾橫列而前行次駝鼓九飾以鍍金鉸具轡飾罽籠旗鼓纓槍馭者九人服同馭象者中道相次而行次舍人二人四品服騎分左右夾駝而行次青衣二人武辨青絁衫青勒帛青鞾執青杖次清道官四人本品服騎次信幡二執者二人引護者四人武辨黃絁生色寶相花袍黃勒帛黃鞾次騾鼓六飾騾以鍍金鉸具轡罽籠旗鼓纓槍馭者六人服同馭駝者次告止幡二執者二人引護者四人武辨緋絁生色寶相花袍紅勒帛紅鞾次傳教幡二執者二人引護者四人武辨黃絁生色寶相花袍黃勒帛黃鞾並分左右次橋道頓遞使一人本品服騎中道舍人清道官橋道頓遞使從者凡七人錦帽紫䙆衫小銀束帶行縢鞋襪後凡從者之服皆同此纛矟隊金吾將軍二人交角幞頭緋羅繡抹額紫羅繡辟邪裲襠紅錦襯袍錦螣蛇金帶烏鞾橫刀佩符騎分左右次弩而騎者五人錦帽青絁生色寶相花袍銅帶緑雲鞾次矟而騎者五人錦帽緋絁生色寶相花袍銅帶朱雲鞾次纛一執者一人夾者四人護者二人皆錦帽紫絁生色寶相花袍鍍金帶紫雲鞾衛紫絁生色寶相花袍元史無絁字按輿服志儀服色云士卒袍制以絹絁繪寶相花下文押衙四人並與此護者二人之服色同彼文云紫絁生色寶相花袍知此文脫絁字也今補入絁字押纛官二人皆騎本品服次馬鼓四飾如騾鼓馭者四人服同馭騾次佩弓矢而騎者五人服同執弩者押衙四人騎而佩劒錦帽紫絁生色寶相花袍鍍金帶雲頭鞾犦矟者四人騎錦帽緋絁生色寶相花袍銅帶朱鞾如犦矟元史訛犦為䂍按元史輿服志儀仗云犦矟制節頂刻犦牛首有袋上加碧油是䂍以傳寫致誤也今改正控馬八人錦帽紫衫銀帶烏鞾次矟而騎者五人服佩同執弩者金吾將軍押纛官從者四人服同前隊朱雀隊舍人一人四品服騎而前次朱雀旗一執者一人引護者四人錦帽緋羅生色鳯花袍銅帶朱雲鞾皆佩劒而騎護者加弓矢次金吾折衝一人交角幞頭緋羅繡抹額紫羅繡辟邪裲襠紅錦襯袍金帶錦螣蛇烏鞾橫刀佩弓矢而騎按元史輿服志儀衛服色云抹額制以緋羅緋寶相花原作緋絁係傳寫訛文今據彼文改正帥甲騎凡二十有五弩五人次弓五人次矟五人次弓五人次矟五人皆甲騎冠朱畫甲青勒甲絛鍍金環白繡汗胯束帶紅鞾帶弓箭器仗馬皆朱甲具裝珂飾全舍人金吾折衝從者凡二人服同前隊十二旗隊舍人一人四品服騎而前金吾果毅二人交角幞頭緋羅繡抹額紫羅繡辟邪裲襠紅錦襯袍金帶錦螣蛇烏鞾橫刀佩弓矢騎分左右帥引旗騎士五皆錦帽黃緋生色寶相花袍銀帶烏鞾次風伯旗左雨師旗右雷公旗左電母旗右執者四人甲騎冠青畫甲青勒甲絛鍍金環白繡汗胯束帶青雲鞾馬皆青甲珂飾次五星旗五執者五人甲騎冠五色畫甲青勒甲絛鍍金環白繡汗胯束帶五色雲鞾馬甲如其甲之色珂飾次北斗旗一執者一人甲騎冠紫畫甲青勒甲絛鍍金環白繡汗胯束帶紫雲鞾馬甲如其甲之色珂飾左右攝提旗二執者二人甲騎冠朱畫甲青勒甲絛鍍金環白繡汗胯束帶紅雲鞾馬朱甲珂飾執副竿者二人騎錦帽黃絁生色寶相花袍銀帶烏鞾執矟而護者五人騎服同執副竿者舍人金吾果毅從者凡三人服同前隊門旗隊舍人二人四品服監門將軍二人皆交角幞頭緋羅繡抹額紫羅繡獅子裲襠紅錦襯袍金帶烏鞾橫刀佩弓矢騎馬甲珂飾全今按緋羅元史作緋絁誤改正次門旗二執者二人錦帽緋絁生色獅子文袍銅革帶紅雲鞾劒而騎引護者四人服騎同執人而加弓矢騎次監門校尉二人騎服佩同監門將軍分左右行次鸞旗一執者一人引護者四人錦絹五色絁生色瑞鸞花袍束帶五色雲鞾佩劒護人加弓矢皆騎舍人監門將軍監門校尉從者凡六人服同前隊雲和樂雲和署令二人朝服騎分左右引前行凡十有六人戲竹二排簫四簫管二龍笛二板二歌工四皆展角花幞頭紫絁生色雲花袍鍍金帶紫鞾次琵琶二十箏十有六箜篌十有六􅌙十有六方響八頭管二十有八龍笛二十有八已上工百三十有二人皆花幞頭緋絁生色雲花袍鍍金帶朱鞾次杖鼓三十工人花幞頭黃絁生色花襖紅絁生色花袍錦臂鞲鍍金帶烏鞾次板八工人服色同琵琶工人次大鼓二工十人服色同杖鼓工人雲和署令從者二人服同前隊殿中黃麾隊舍人二人四品服殿中侍御史二人本品服皆騎次黃麾一執者一人夾者二人騎武辨緋絁生色寶相花袍紅勒帛紅雲鞾舍人殿中侍御史從者凡四人服同前隊太史鉦鼓隊太史一人本品服騎引交龍掆鼓左金鉦右舁者四人工二人皆武辨緋絁生色寶相花袍紅勒帛紅鞾次司辰郎一人左典事一人右並四品服騎太史司辰郎典事從者三人服同前隊武衛鈒戟隊武衛將軍一人交角幞頭緋羅繡抹額紫羅繡瑞鷹裲襠紅錦襯袍錦螣蛇金帶橫刀騎略按武衛將軍冠服與監門將軍金吾將軍同亦當是烏鞾史文不具領五色繡幡一金節八罕右罼左朱雀青龍白虎幢三橫布導蓋一中道義四武衛果毅二人服佩同武衛將軍鈒二十戟二十徒五十有九人武辨緋絁生色寶相花袍紅勒帛紅鞾武衛將軍武衛果毅從者凡三人服同前隊龍墀旗隊舍人二人四品服中郎將二人服佩同鈒戟隊武衛將軍騎分左右帥騎士凡二十有四人執旗者八人天下太平旗中道中嶽帝旗左中央神旗右次日旗左月旗右次祥雲旗二分左右次皇帝萬歲旗中道執人皆黃絁巾黃絁生色寶相花袍黃勒帛黃雲鞾橫刀引者八人青絁巾青絁生色寶相花袍青勒帛青雲鞾橫刀執弓矢護者八人緋絁巾緋絁生