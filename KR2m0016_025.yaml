  - {type: page-break, offset: 0, content: '', id: KR2m0016_WYG_025-1a, image: WYG0639/WYG0639-0356c.png}
body:
  text: 職官宰相并官屬唐肅宗至德後或以藩鎮領宰相職員數最多是時劍南節度使崔圖朔方節度使郭子儀河東節度使李光弼並同中書門下平章事憲部侍郎房琯河西行軍司馬裴冕文部侍郎韋見素蜀郡守崔渙憲部尚書李麟侍御史張鎬並同中書門下平章事是時朝廷新復百度未修故偹位者衆然為侍中者惟李光弼中書令惟郭子儀而已至代宗時員數較少而時政最急者率以宰相領其官故元載以中書侍郎領句當轉運租庸支度使又兼判元帥行兵司馬杜鴻漸以平章事兼莊宅使復持節山南西道劍南東川西川卭南西山等道副元帥王縉以侍中都統河南淮南淮西山東道行營節度使德宗興元以後宰臣所領之官更多舛雜其時同平章事盧翰加太微宫使劉從一領集賢殿大學士李勉加太清宫使為中書令者惟李晟然又兼鳳翔隴右諸軍涇原四鎮北庭行營兵馬元帥憲宗元和已來宰臣員數漸减然多領鹽鐵及判度支皇甫鎛竇易直裴度李石李紳盧商崔元式周墀崔龜從蕭鄴劉瑑杜悰曹確蕭遘張濬韋貽範獨孤損皆同平章事兼判度支程異王播王涯李固言李石楊嗣復杜悰馬植裴休夏侯孜于琮劉鄴韋貽範皆同平章事兼鹽鐡轉運使僖宗光啓後宰臣易置不常加司徒司空者極乎冗濫制度尤日紊矣梁以中書門下兩侍郎及同中書門下平章事為宰相然是時改樞密院為崇政院命敬翔知院事以備顧問參謀議承上㫖宣於宰相而行之宰相非時奏請皆因以聞是亦相職也後唐以門下侍郎及中書侍郎同中書門下平章事為宰相又置中門使樞密使典領機密權與宰相等晉以中書侍郎同門下平章事為宰相是時宰相每兼樞密使桑維翰李嵩皆同平章事兼樞密使間有特拜中書令及侍中者出帝開運二年以趙瑩為中書令李嵩守侍中漢亦以中書侍郎同中書門下平章事為宰相周亦以中書侍郎同中書門下平章事為宰相亦有拜中書令者太祖廣順元年拜馮道中書令五代時日相征討武臣用事任宰相者多則一二年少或數月廢置不常無可載焉宋初宰相不專任置中書禁中是為政事堂與樞密院對掌大政以同平章事為宰相之職無常員有二人則分日知印以丞郎以上至三師為之其上相為昭文館大學士監修國史其次為集賢院大學士或置三相則昭文館集賢院二學士併監修國史並除因唐以來三大館皆宰相兼故仍其制如范質昭文學士王溥監修國史魏仁浦集賢學士此三相例也參知政事掌副宰相毗大政參庶務太祖乾德二年以樞密直學士薛居正兵部侍郎吕餘慶並本官參知政事先是已命趙普為相欲置之副而難其名稱以問陶穀曰下宰相一等有何官對曰唐有參知機務參知政事故以命之不押班不知印不升政事堂殿廷别設磚位敇尾署銜降宰相月奉雜給之半開寶六年始詔居正餘慶於都堂與宰相同議政事太宗至道元年詔宰相與參政輪班知印同升政事堂押敇齊銜行則並馬自寇準始以後不易神宗時定元豐新制於三省置侍中中書令尚書令以官髙不除人而以尚書令之二左右僕射為宰相左僕射兼門下侍郎以行侍中之職右僕射兼中書侍郎以行中書令之職廢參知政事置門下中書二侍郎尚書左右丞以代之哲宗元祐中以文彥博吕公著平章軍國重事序班在宰臣上所以處老臣碩德特命以寵之也或兩日或五日一朝非朝日不至都堂時待老臣禮遇極優司馬光疾詔免朝覲許乘肩輿三日一入省徽宗政和中改左右僕射為太宰少宰仍兼兩省侍郎靖康中復改為左右僕射髙宗建炎三年吕頥浩請酌三省之制左右僕射並加同中書門下平章事門下中書二侍郎並改為恭知政事廢尚書左右丞從之孝宗乾道八年詔尚書左右僕射可依漢制改為左右丞相詳定敇令所言近承詔㫖改左右僕射為左右丞相令刪去侍中中書尚書令以左右丞相充緣舊左右僕射非三省長官故為從一品今左右丞相係充侍中中書尚書令之位即合為正一品從之丞相官以大中大夫以上充參政以中大夫以上充常除二員或一員寧宗嘉泰三年始除三員故事丞相謁告參預不得進擬惟丞相未除則參預輪日當筆多不踰年少才旬月獨孝宗淳熙初葉衡罷相龔茂良行相事近三年亦創見也及寧宗開禧元年韓托胄拜平章討論典禮乃以平章軍國事為名蓋省重字則所預者廣去同字則所任者專邉事起乃命一日一朝省印亦歸其第宰相不復知印其後賈似道竊位專權尊寵日隆位皆在丞相上其與元祐中之文彥博吕公著同例矣至於親王樞密使留守節度使兼侍郎中書令同平章事者皆謂之使相不預政事不書敇惟宣敇除授者敇尾存其銜而已遼北宰相府有左右宰相掌佐理軍國之大政皇族四帳世預其選南宰相府有左右宰相掌佐理軍國之大政國舅五帳世預其選太祖天顯元年大東丹國置中臺省有左大相右大相左次相右次相其屬部設有某部左宰相某部右宰相位在大王下屬國設有某國左相某國右相位在大王裕悅下命其酋長與遼人區别而用之恩威兼制此皆北面宰相之制聖宗統和二十一年七月召北府宰相蕭塔喇葛宰相漢王貼不及等賜坐論古今至道倣古制也其南面官則於中書省設大丞相左丞相右丞相同中書門下平章事參知政事尚書省有左僕射右僕射其三京宰相府遼有五京上京為皇都朝官京官皆有之四京隨宜制官為制不一西京多邉防官南京中京多財賦官三京謂東京中京南京也有左相右相左平章事右平章事蓋既得燕代後倣唐制也金左丞相右丞相各一員平章政事二員從一品金鍍銀印鍍金三字為宰相左右丞各一員正二品參知政事二員從二品印與郡王及一品官同金制二品官金鍍銅印惟宰相與親王一品同為執政官為宰相之二俱例於尚書省位在尚書令下熙宗時率以宗室王公除拜丞相平章政事或參知政事往往帶元帥銜出則統軍入則佐政禮遇亦極優焉海陵正隆元年罷平章政事時平章政事張暉罷遂不置平章政事官至世宗大定元年始復置以移刺充之世宗即位重任宰臣屢加飭諭大定元年諭宰臣曰進賢退不肖宰臣之職二年又諭宰臣當參民間利害及時事之可否以時陳奏四年諭宰臣奏事當以治國安民為要五年又諭宰臣盡公舉薦六年又諭宰臣當知人才優劣舉實才為國用八年又諭宰臣當輔不逮毋阿順取容十年諭宰臣朕居深宫不知外事卿等當注意大定二十四年制外任官曾為宰執者凡吏牘上省部依親王例免書名二十五年以宰臣年老艱於久立命左右置小榻廊下使少休息章宗明昌元年幸宰臣圖克坦克寧第視疾賜銀一千五百兩絹二千匹詔尚書省曰太傅年髙每趨朝而又赴省恐不易自今旬休外四日一居休庶得調攝常事他相理問惟大事白之可也六年賜宰臣手詔以風俗不淳官令茍且責之承安三年詔有司宰相遇雨可循廊廡出入五年上與宰臣論置相曰圖克坦鎰朕志先定賈鉉如何皆曰知延安府事孫即康可平章政事張萬公亦曰即康及第先鉉一榜上曰至此安問榜次特以賈才可用耳其所以慎擇宰臣者如此泰和元年諭刑部官凡上書人言及宰相者不得申省是時平章政事張萬公乞致仕已三四次矣優詔不許宣宗興定三年以天暑詔宰相四日一奏事又詔宰相執政以下不得召部寺官元之相職較前代獨多曰中書令曰左右丞相曰平章政事曰左右丞曰參政雖分長二皆佐天子出令太祖嘗以相臣為中書令典領百官會決庶務元制中書令位在丞相上往往以皇太子兼領右丞相左丞相各一員統六官率百司居令之次令缺則總省事佐天子理萬幾國初職名未創太宗始置右丞相一員左丞相一員世祖中統元年置丞相一員二年復置右丞相二員左丞相二員至元二年增至五員七年立尚書省置丞相三員八年罷尚書省乃置丞相二員二十四年復立尚書省其中書省丞相二員如故二十九年以尚書省再罷專任一相武宗至大二年復置尚書省丞相二員中書省丞相二員四年尚書省仍歸中書丞相凡二員自後因之不易文宗至順元年專任右相其一或置或不置以上丞相平章政事掌機務二丞相凡軍國重事無不由之世祖中統元年置平章二員二年置平章四員至元七年置尚書省設尚書平章二員八年尚書併入中書平章復設三員二十三年詔清冗職平章汰為二員二十四年復尚書省中書尚書兩省平章各二員二十九年罷尚書省增中書平章為五員而一員為商議省事三十年又增平章為六員成宗元貞元年改商議省事為平章軍國重事武宗至大二年再立尚書省平章三員中書省平章五員四年罷尚書省歸中書平章仍五員文宗至順元年定置四員自後因之以上平章政事右丞左丞副宰相裁成庶務號左右轄世祖中統二年置左右丞各一員三年增為四員至元七年立尚書省中書右丞左丞仍四員八年尚書併入中書左右丞各一員二十三年汰冗職右左丞如故二十四年復立尚書省左右丞各一員而中書省缺員二十八年復罷尚書省三十年設右丞二員而一員為商議省事成宗元貞元年右丞商議省事罷又以昭文大學士與中書省事武宗至大二年復立尚書省右左丞二員中書右左丞五員四年罷尚書右左丞中書右左丞止設四員文宗至順元年定置右丞一員左丞一員以後不復增損以上右左丞參政副宰相以參大政而其職亞於右左丞世祖中統元年始置參政一員二年增為二員至元七年立尚書省參政三員八年尚書省併入中書參政二員二十三年汰冗職參政二員如故二十四年復立尚書省參政二員中書參政二員二十八年罷尚書省參政武宗至大二年復置尚書省參政二員中書參政二員四年併尚書省入中書參政三員文宗至順元年定參政為二員自後亦不復增損焉以上參政至順帝時法度不常紀綱日紊置宰臣輒更祖制元統三年七月中書省奏請自今不置左丞相十月命巴延獨掌台司至元五年十月復加巴延為大丞相六年十月命托克托為右丞相復置左丞相至正七年置議事平章四人十二年二月以賈魯為添設左丞三月以悟良哈台為添設參知政事七月又以杜秉彛為添設參政八月以哈瑪爾為添設右丞十四年九月以吕思誠為添設左丞二十七年八月以樞密知院曼濟為添設第三平章以太尉特哩特穆爾為添設左丞相以添設為銜名亦古所未見也明太祖建官之始皆承前制設中書省置左右相國以李善長為右相國徐達為左相國後命百官禮儀俱尚左改右相國為左相國左相國為右相國尋又改為左右丞相置平章政事左右丞參知政事等官以統領衆職洪武九年汰平章政事參知政事等官十三年正月革去中書省盡罷其官置四輔官位列公侯都督之次尋即汰罷分其權於六部十五年倣宋置華蓋殿武英殿文淵閣東閣諸大學士以禮部尚書邵質為華蓋檢討吳伯宗為武英翰林學士宋訥為文淵典籍吳忱為東閣又置文華殿大學士徴耆儒鮑恂余詮張長年等為之以輔導太子秩皆正五品二十八年敇諭羣臣國家罷丞相設府部院寺以分理庶務立法至為詳善以後嗣君其毋得議置丞相臣下有奏請設立者論以極刑當是時以翰林春坊詳看諸司奏啓兼司平駮大學士特侍左右備顧問而已帝方自操威柄學士鮮所參決惠帝建文中改大學士為學士成祖永樂初年特簡解縉胡廣楊榮等參預機務閣臣自此始預務焉至仁宗以楊士竒楊榮皆東宫舊臣擢士竒為禮部侍郎兼華蓋殿大學士榮為太常卿兼謹身殿大學士賜士