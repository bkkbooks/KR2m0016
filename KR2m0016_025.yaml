宣行大事覆奏小事署而頒之有失封還執奏凡內外所上章疏下分類抄出參署付部駮正其違誤吏科凡吏部引選則掌科同至御前請㫖外官領文憑皆先赴科畫字內外官考察自陳後則與各科具奏紏其不職者户科監光祿寺嵗入金榖甲字等十庫錢鈔雜物與各科兼涖之皆三月而代內外有陳乞田土隱占侵奪者紏之禮科監訂禮部儀制凡大臣曽經紏劾削奪有玷士論者記録之以核贈諡之典兵科凡武臣貼黃誥敕本科一人監視其引選畫憑之制如吏科刑科每嵗二月下旬上前一年南北罪囚之數嵗終類上一嵗蔽獄之數閲十日一上實在罪囚之數皆憑法司移報而奏御焉工科閲試軍器局同御史巡視節慎庫與各科稽查寶源局凡日朝六科輪一人立殿左右珥筆記㫖凡題奏日附科籍五日一送內閣備編纂洪武中卓敬為給事中時制度未備諸王服乘多僭敬奏論之上曰爾言是朕慮不及此永樂時陳諤為給事中彈劾不避權貴常奏事聲洪大聽者竦然帝每見呼為大聲秀才散騎常侍唐制左散騎常侍二人掌規諷過失侍從顧問宋門下省左散騎常侍掌規諫諷諭遼門下省有散騎常侍天祚帝乾統中馬人望除左散騎常侍又别有常侍官金元明皆不設諫議大夫唐置四人掌諫諭得失侍從贊相德宗建中二年以諫議大夫一人為知匭使宋門下省有左諫議大夫左司諌左正言掌規諫諷諭元祐八年詔執政親戚不除諫官遼南面官左諫院有左諫議大夫𨽻門下省金設諫院置左諫議大夫右諫議大夫左司諫右司諫無所𨽻屬元無諫議大夫明洪武十三年設諫院置左右司諫各一人左右正言各二人十五年又置諫議大夫以兵部尚書唐鐸為之尋皆罷起居郎唐制二人掌録天子起居法度秉筆隨宰相入殿直二螭首後唐亦置起居郎天成二年以趙熙為起居郎宋制門下省起居郎一人掌記天子言動御殿則侍立行幸則從大朝會則立於殿下凡朝廷命令赦宥禮樂法度損益因革賞罰勸懲皆書授著作官元祐中王巖叟為起居舍人入侍邇英司馬康講洪範至又用三德帝曰只此三德為更有德巖叟退而疏曰陛下既能審而問之必能體而行之三德者人君之大本臣備職史官敬已書之於冊以示萬世紹興中起居郎洪遵奏言臣幸得以記注陪侍經幄伏聞元祐中起居舍人吕陶常乞侯講讀臣僚再留奏事並許侍立以見講退猶且入侍何由不許奏事乞下經筵所依講讀官例施行於是詔起居郎舍人自今後許依講讀官奏事遼南面官門下省屬有起居舍人知起居注起居郎等官金設記注院無所𨽻屬修起居注掌記言動明昌元年詔毋令諫官兼或以左右衛將軍兼宣宗貞祐三年以左右司首領官兼遂為定制元至元六年始置起居注掌隨朝省臺院諸司凡奏聞之事悉紀録之至十五年改為給事中遂為定制明起居注𨽻翰林院洪武九年置起居注二人秩正七品後即省罷以翰林院史官兼攝之凡國家大政及詔敕王言皆籍而記之以備實録補闕拾遺自唐始置各六人貞元中韋渠牟為右補闕內供奉同列初輕之帝在延英既對宰相多使中貴召渠牟於官次於是同輩始注目矣元和中王源遷左補闕時典禁軍者不循法度源上疏曰臺憲者紀綱之地府縣者責成之所設有罪犯宜歸司存安有北軍勢重於南衙輦下權輕於仗內乞還法司庶守職分帝可其請開成中以魏謨為左補闕帝謂宰相曰太宗得魏徴採拾闕失弼成聖政今我得魏謨於疑似之間必極匡雖不敢希及貞觀之政庶幾處於無過之地命授謨左補闕詔中書善為之詞宣宗大中時右補闕陳嘏左拾遺王譜等上書諫遣中使往羅浮山迎軒轅先生詔答云閲視來章深納誠意宋太宗端拱中改左右補闕為左右司諌左右拾遺為左右正言所掌與諫議大夫同孝宗淳熙十五年兵部侍郎林栗奏言諫諍之官尚有闕員居其位者往往分行御史之職至於針規闕失寂無聞焉願依唐制置拾遺補闕左右各一員專掌諫諍不許紏彈從之以許深父薛象先充其職班在監察御史上尋復省罷遼南面官門下省有左補闕左拾遺二員右補闕右拾遺屬中書省金諫院有左右拾遺左右補闕皆無所𨽻屬元至元六年置左右補闕至十五年改為左右侍儀奉御兼修起居注明建文中罷六科左右給事中增設拾遺補闕至永樂中仍置左右給事中革去拾遺補闕典儀亦起於唐設二人其職領贊唱之節及殿廷版位之次𨽻門下省宋制東西閣門不𨽻門下省東上閣門使西上閣門使各三人副使各二人宣贊舍人十人祇候十有二人掌朝會宴幸供奉贊相禮儀之事使及副使承㫖禀命舍人傳宣贊謁祇候分佐舍人凡文武官自宰臣宗室自親王外國使臣以下朝見謝辭皆掌之視其品秩以為引班叙班之次贊其拜舞之節而紏其違失若慶禮奉表則東上閣門掌之慰禮進名則西上閣門掌之職與典儀同遼亦有東上閣門使副使供奉官西上閣門使副使供奉官皆𨽻門下省金東上閣門使二員副使二員僉事一員掌僉判閣門事西上閣門使二員副使二員僉事一員掌贊導殿庭禮儀閣門祇候二十五人通事舍人二員掌通班贊唱承奏勞問之事𨽻宣徽院元侍儀司掌凡朝會即位冊后建儲奉上尊號及外國朝覲之禮有左右侍儀通事舍人引進使等官𨽻禮部明司儀署丞司賔署丞鳴贊序班等官掌贊百官行禮及序班次皆𨽻鴻臚寺城門郎掌宫殿城門之管鑰即古之衛尉至隋為城門郎唐因之唐制城門郎四人掌京城皇城官殿諸門開闔之節奉管鑰而出納之開則先外後內闔則先內後外啓閉有時不以時則詣闔覆奏宋制置皇城司幹當官七人無所𨽻屬以武功大夫以上及內侍都知押班充掌宫城出入之禁令凡周廬宿衛之事宫門啓閉之節皆𨽻焉每門給銅符二鐵牌一左符留門右符請鑰鐵牌則請鑰