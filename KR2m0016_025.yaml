奏初太祖建隆時為所遷官實不任職復置知制誥及直舍人院主行詞命與學士對掌內外制凡有除拜中書吏赴院納詞頭其大除拜亦有宰相召舍人面授詞頭者若大誥命中書并敇進入從中而下餘則發敇官受而出之元豐六年詔中書省置㸃檢房令舍人通領元祐元年詔舍人各簽諸房文字其命詞則輪日分草九月詔暫時闕官依門下尚書省例送本省官兼權紹聖四年蹇序辰請自今命詞以元行遣文書同檢送兩制舍人從之建炎後同他官兼攝者則稱權舍人資淺者為直舍人院遼南面官中書省有中書舍人院道宗咸雍三年以馬鉉為中書舍人金罷中書省後無中書舍人其時一應制誥詞命皆以翰林學士承㫖及待制為之元中書省無中書舍人明中書舍人屬內閣掌制誥詔令及一切機密文書凡大朝會則侍班東宫令節朝賀則導駕侍班於文華殿冊封宗室則充副使大祀南郊則隨駕而供事員無正二印用年深者掌之洪武七年初設直省舍人十人秩從八品𨽻中書省九年為中書舍人改正七品尋又改從七品十年與給事中皆𨽻承敇監建文中革中書舍人改為侍書入文翰館𨽻翰林院永樂時復舊制尋設中書科署於午門外定設中書舍人二十人其恩廕帶俸者不在額內宣德間內閣置誥敕制敕兩房皆設中書舍人嘉靖二十年選各部主事大理寺評事帶原銜直誥敕制敇兩房四十四年兩房員缺命吏部考選舉人為中書舍人初永樂時命內閣學士典機務詔冊制誥皆屬之而謄付繕正皆中書舍人入辦事竣輒出宣德初始選能書者處於閣之小西房謂之西制敕房而諸學士掌誥敕者居閣東具稿付中書繕進謂之東誥敕房及英宗正統後學士不能視誥敕內閣悉委於中書序班譯字等官於是內閣又有東誥敕房其直文華武英兩殿供御筆札者初為內官職繼以中書分直後亦專舉能書者舍人有兩途由進士部選者得遷科道部屬其直兩殿兩房舍人不必由部選自甲科監生生儒布衣能書者俱可為之不由科甲者初授序班及試中書舍人不得遷科道部屬後雖加銜九列仍帶銜辦事洪武中以宋璲為中書舍人濂次子也工書法真行草篆俱入能品時人稱為威鳳翀霄祥雲捧日又宣嗣宗為中書舍人時宣宗幸內閣以銀錢撒地令諸從官競取嗣宗俟諸臣取畢徐拾一文英宗天順中盧儒博學能文以薦舉授中書舍人嘗在翰林院奉命撰雪賦甚急儒援筆立就一時驚嘆通事舍人之名起於後魏唐時掌通奏引納辭見承㫖宣勞設十六人皆以善辭令者為之𨽻四方館而文屬中書省至宋置客省引進使副使各二員掌國信使見辭宴賜及四方進奉外藩朝覲貢獻之儀受其幣而賔禮之還則頒詔書授以賜豫宰臣以下節物則視其品秩以為等使闕則引進四方館閣門使副互權此即通事舍人之職大觀元年詔客省四方館不𨽻臺察欽宗靖康元年詔客省引進司四方館西為殿庭應奉同𨽻中書省遼南面官通事舍人院有通事舍人統和七年以李琬為通事舍人屬門下省不𨽻中書省金有閣門通事舍人二員掌通班贊唱承奏勞問之事𨽻宣徽院元世宗至元十二年置通事舍人十四員凡大典禮皆掌之三十年減通事舍人七員為侍儀舍人英宗至治元年增置通事舍人六員侍儀舍人四員𨽻禮部明設提督四譯館掌外國來朝貢者通譯其語言文字以國子監生及官民子弟委官教肄充譯字生通事初隸翰林院孝宗宏治七年始增設太常寺卿少卿各一員為提督遂改隸太常寺嘉靖中裁卿止少卿一人集賢殿書院置於唐開元中及至德二年置大學士貞元元年置編録官四年罷大學士八年罷校理置校書四人正字二人元和二年復罷校書正字四年集賢御書院學士直學士皆用五品如開元故事以學士一人年髙者判院事非登朝官者為校理餘皆罷宋為集賢院以宰相一人充大學士以給諫卿監以上充學士以朝官充修撰以京官以上充直院校理皆無常員掌古今經籍圗書國史實録天文厯數之事職事與昭文館同政和五年詔祕書省殿以右文為名改集賢殿修撰為右文殿修撰屬祕書省遼無集賢殿置宣政殿觀書殿昭文館崇文館乾文閣有大學士直學士學士等官金貞祐五年置集賢院設知院哀宗正大元年以吏部郎中馬璘為知集賢院官又有同知集賢院司儀官咨議官皆無常員元集賢院掌提調學校徵求隱逸召集賢良凡國子監元門道教陰陽祭祀占卜祭遁之事悉隸焉至元二十二年置大學士三員學士一員直學士二員典簿一員大德十一年置院使六員武宗至大四年罷之後定制置大學士五員學士二員侍讀侍講學士各二員直學士三員官屬有經厯都事待制修撰管勾承發架閣庫等官中統初與翰林國史同一官署及至元二十二年始特置院時許衡以集賢館大學士兼國子祭酒教國子與䝉古大姓四集賽人員大學士品秩特重焉至元中程巨夫為集賢直學士奉詔求賢於江南巨夫薦趙孟俯等二十餘人皆擢置臺憲及文學之職還朝拜集賢學士又李泂為承制學士既為帝所知遇乃著書曰輔治篇以進帝嘉納之時詔修經世大典泂方卧疾即強起曰此大制作也吾豈可以不預力疾同修書成進奏謁告以歸至正中汪澤民預修遼金宋三史書成遷集賢直學士未兩月即移出告老大學士和尚曰集賢翰林實養老尊賢之地先生何為遽去願少留以副上意澤民謂以布衣叨榮三品志願足矣遂致仕歸明太祖吳元年五月初置禮賢館尋即罷革設翰林院史官古官唐屬中書省元和六年宰相裴垍建議登朝官領史職者為修撰以官髙一人判館事未登朝官皆為直館大中八年廢史館直館二員增修撰四人分掌四季至宋設國史實録院置提舉國史監修國史提舉實録院修國史同修國史史館修撰同修撰實録院修撰同修