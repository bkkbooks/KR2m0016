body:
  text: 職官秩品二宋宋官品正一品太師太𫝊太保左右丞相少師少𫝊少保王爵從一品諸樞宻使太子太師太子太𫝊太子太保開府儀同三司文散特進驃騎大將軍武散嗣王郡王國公爵正二品臣等謹按宋置三省長官為宰相之任如門下有侍中有侍郎中書省有令侍郎尚書省有令有左右僕射熈寕以前皆有拜是職者而史不載其品秩蓋以紹興以後設左右丞相及參知政事三省長官之稱皆省罷故也知樞宻院事同知樞宻院事參知政事太尉金紫光禄大夫文散輔國大將軍武散鎮國大將軍開國郡公爵上柱國勲從二品簽書樞宻院事觀文殿大學士太子少師太子少𫝊太子少保御史大夫吏部户部禮部兵部刑部工部尚書左右金吾衛左右衛各上將軍冀兖青徐掦荆豫梁雍九州牧殿前都指揮使節度使銀青光禄大夫文散開國縣公爵柱國勲正三品觀文殿學士資政保和殿大學士翰林學士承㫖翰林學士資政保和端明殿學士龍圖天章寳文顯謨徽猷敷文閣學士樞宻直學士左右散騎常侍權六曹尚書宣奉大夫文散正奉大夫冠軍大將軍武散懐化大將軍上䕶軍勲從三品龍圖天章寳文顯謨徽猷敷文閣直閣事御史中丞開封尹尚書列曹侍郎諸衛上將軍太子賔客詹事正議大夫文散通奉大夫雲麾將軍武散歸徳將軍開國侯爵䕶軍勲正四品給事中中書舎人太常卿宗正卿秘書監諸衛大將軍殿前副都指揮使承宣使通議大夫文散忠武將軍武散壯武將軍開國伯爵上輕車都尉勲從四品保和殿龍圖天章寳文顯謨徽猷敷文閣待制左右諫議大夫權六曹侍郎七寺卿國子祭酒少府將作監諸衛將軍大中大夫文散宣威將軍武散明威將軍輕車都尉勲正五品馬歩軍都指揮使副都指揮使觀察使諸中大夫文散通侍正侍宣正履正協忠中侍大夫横班散階定逺將軍寧逺將軍開國子爵上騎都尉勲從五品太常宗正少卿秘書少監太子左右庶子樞宻都承㫖殿前馬歩軍都虞候防禦使捧日天武龍神衛四廂都指揮使團練使諸州刺史駙馬都尉中奉大夫文散中散大夫中亮中衛翊衛親衛大夫横班散階遊騎將軍武散遊擊將軍開國男爵騎都尉勲正六品集英殿修撰七寺少卿中書門下省檢正諸房公事尚書左右司郎中國子司業軍器監都水使者太子少詹事左右諭徳樞宻承㫖副承㫖朝議大夫文散奉直大夫拱衛左武右武大夫横班散階昭武校尉武散昭武副尉驍騎尉勲從六品起居郎起居舎人侍御史尚書省左右司員外郎樞宻院檢詳諸房文字右文殿秘閣修撰開封少尹尚書諸司郎中開封府判官推官少府將作軍器少監靈䑓令朝請大夫文散朝散大夫朝奉大夫和安成和成安大夫醫官散階振威校尉武散振威副尉飛騎尉勲正七品殿中侍御史左右司諫尚書諸司員外郎侍講直龍圖天章寳文閣開封府司録參軍事太子侍讀侍講兩赤縣令翰林良醫朝請郎文散朝散郎朝奉郎武功大夫横班散階武徳大夫武顯大夫武節大夫武畧大夫武經大夫武義大夫武翼大夫成全大夫醫官散階平和大夫保安大夫致果校尉武散致果副尉雲騎尉勲從七品左右正言符寳郎監察御史直顯謨徽猷敷文閣太常宗正秘書丞大理正著作郎崇政殿說書翰林醫官閤門宣贊舎人太子中舎人舍人諸率府率親王府翊善贊讀直講判太醫局令翰林醫効醫痊諸承議郎文散正侍郎横班散階宣正郎履正郎協忠郎中侍郎中亮郎中衛郎翊衛郎拱衛郎左武郎右武郎武功郎武徳郎武顯郎武節郎武畧郎武經郎武義郎武翼郎和安郎醫官散階成和郎成安郎成全郎平和郎保安郎翊麾校尉武散翊麾副尉武騎尉勲正八品七寺丞秘書郎太常博士樞宻院計議官編修官敕令所刪定官直秘閣著作佐郎國子監丞諸王宫大小學教授國子博士大理司直評事開封府諸曹參軍事軍廵使判官京府判官京畿縣令兩赤縣丞三京赤縣畿縣令太史局五官正中書門下省録事尚書省都事諸奉議郎文散通直郎訓武郎横班散階修武郎宣節校尉武散宣節副尉從八品御史臺檢法官主簿少府將作軍器都水監丞寺監主簿秘書省校書郎正字太常寺奉禮郎太祝武學律學博士主管太醫局閤門祗候樞宻院逐房副承㫖東西頭供奉官太子諸率府副率親王府記室節度觀察防禦團練軍事監判官節度掌書記觀察支使京府節度觀察防禦團練軍事推官諸州簽判節鎮上中下州録事參軍京府諸曹參軍事軍廵判官京畿縣丞三京赤縣畿縣丞諸州上中下縣令丞兩赤縣主簿尉諸府諸曹節鎮上州諸司參軍事節度副使行軍司馬防禦團練副使太史局丞直長靈䑓郎保章正翰林醫愈醫証醫診醫候三省樞宻院主事守闕主事令史書令史諸宣教郎文散宣義郎承直郎儒林郎文林郎從政郎從事郎修職郎從義郎横班散階秉義郎禦武校尉武散禦武副尉正九品郊社籍田太官令國子太學正録武學諭律學正太醫局丞挈壺正京畿縣主簿尉三京赤縣主簿尉諸州别駕長史司馬樞宻院守闕書令史諸承事郎文散承奉郎忠訓郎横班散階忠翊郎成忠郎保義郎仁勇校尉武散仁勇副尉從九品下州諸司參軍諸州上中下縣主簿尉城砦馬監主簿諸州司士文學助教翰林醫學諸承務郎文散承節郎横班散階承信郎廸功郎陪戎校尉武散陪戎副尉右内外官統計二萬四千員按元豐寄禄格以階易官雜取唐及宋初舊制自開府儀同三司至將仕郎定為二十四階徽宗崇寧初因刑部尚書鄧洵武請又換選人七階大觀初又増宣奉正奉中奉奉直等階政和末又改從政修職廸功而寄禄之格始備自開府至廸功凡三十七階又武選自客省使至閤門副使為横班自皇城至供備庫使為諸司正使副為諸司副使自内殿承制至三班借職為使臣元豐未及更正政和二年乃詔易以新名正使為大夫副使為郎横班十二階使副亦然六年又増置宣正履正協忠翊衛親衛大夫郎凡十階通為横班自太尉至下班祇應凡五十二階又改醫官十四階唯爵則終宋之世無所改革又宋初三省六曹二十四司類皆以他官主判雖有正官非别敕不治本司事元豐定制之後始以本官行本職事然極重資格故有試有權至政和大觀時日漸紛更員既冗濫名且繁雜甚至走馬承受外擁使華黄冠道流亦濫朝品建炎之初參酌潤色然時值艱虞政尚權宜如御營置使國用置使修政置提舉軍馬置都督同都督宣諭使宣撫使總領使經畧安撫使招討使招撫使撫諭使鎮撫使或以宰臣兼之或以樞要充攝因事設官廢置不一故秩品無考云欽定續通典卷四十一
