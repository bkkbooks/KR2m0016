body:
  text: 州郡五代後唐晉發憤仇讐既克燕孽遂翦朱梁改晉稱唐又西并鳯翔南收巴蜀及同光之亂兩川復失東際於海南至淮漢西逾秦隴北盡燕代有州一百二十三按職方考莊宗初起并代取幽滄有州三十五後又取梁魏博等十有六州合五十一州以滅梁岐王稱臣得七州同光破蜀已而復失惟得秦鳯階成四州而營平二州已陷於契丹其增置州一合為一百二十三州今考後唐以同光三年破蜀而孟知祥僣號在長興應順之間是時山南諸州尚未盡入於蜀其僅有秦鳯階成四州蓋石晉時事又考同光二年瓜沙入貢命權知歸義留後曹義金為刺史節度使長興初涼州亦來附四年又置保順軍於洮州兼領鄯州是後唐所有州殆不僅如職方考所稱而已又職方考既云一百二十三州而譜內統營平二州為一百二十五州似當刪去謹附識洛莊宗同光元年為洛京三年復為東都以避廟諱改福昌縣為福慶縣復陽邑縣為告成縣明宗天成中升新安縣為次赤縣以奉莊宗陵按職方考但云唐為洛京考本紀同光三年以洛京為東都五代㑹要三年詳定院奏云近以中興大業以魏州為東京權名東都為洛京今後以洛京為東都又輿地廣記以避諱改福昌縣為福慶又告成縣天祐二年更名陽邑後唐復故㑹要又云天成中升新安縣為次赤縣以奉莊宗陵今並據之雍同光三年廢永平軍額復為西都復大安府為京兆府大安縣為長安縣大年縣為萬年縣以乾州之好畤武功醴泉同州之奉先四縣還屬按職方考不載縣名沿革考寰宇記好畤縣唐昭宗乾寧中割屬威勝軍後唐天成三年還屬京兆武功縣乾寧中割屬威勝軍後唐同光中割屬鳯翔明宗長興元年却還京兆醴泉縣乾寧中割屬威勝軍後唐同光中還屬京兆五代㑹要云奉先縣梁開平三年割𨽻同州後唐同光三年却𨽻京兆府今並據之又按薛居正舊五代史莊宗本紀同光元年詔改永平軍大安府復為西京京兆府謹附識汴同光元年復為宣武軍節度二年改長垣縣為匡城縣復戴邑縣為考城縣按職方考不載復考城縣改長垣縣亦不言何年今並據五代會考兖沂密同光元年復安邱縣為輔唐縣按同光元年據五代㑹要青改博昌縣為博興縣按此據輿地廣記淄齊棣同光三年以滄州陽信縣來屬按此據寰宇記登萊改昌陽縣為萊陽縣按此據輿地廣記徐宿鄆改須昌縣為須城縣按此據輿地廣記曹天成四年升濟隂縣為次赤以奉景宗陵按此據五代㑹要濮宋同光元年改歸德軍節度二年以汴州襄邑縣還屬按襄邑還屬據五代會要亳團練唐天祐二年以避梁王父諱改城父縣為焦夷縣後唐同光元年復舊按此據新唐書及寰宇記單同光二年改輝州為單州以兖州魚臺縣來屬按魚臺來屬據輿地考及寰宇記潁陳同光二年以汴州太康縣還屬按同光二年據五代會要蔡許同光元年復為忠武軍節度二年以汴州鄢陵縣還屬改許昌縣為許田縣按同光元年二年並據五代㑹要改許田縣據輿地廣記汝同光二年以許州之葉襄城二縣來屬按同光二年據五代㑹要鄭同光二年以汴州中牟縣還屬按同光二年據五代㑹要滑同光元年復為義成軍節度二年以汴州酸棗縣還屬改靈昌縣為靈河縣按同光元年二年並據五代㑹要改靈河縣據輿地廣記襄均房鄧同光元年改威勝軍節度按同光元年據五代會要隨復漢東縣為唐城縣郢唐梁改為泌州後唐同光初復舊復安同光元年改安逺軍節度復應陽縣為應城縣改孝昌縣為孝感縣按方輿紀要唐天祐二年改應城縣為應陽縣後唐復舊輿地廣記以避諱改孝昌縣為孝感縣今並據之申蒲孟懷晉同光元年改建雄軍節度按同光元年據五代會要絳同光二年以河中府稷山縣來屬按同光二年據寰宇記陜同光元年復為保義軍節度按同光元年據五代會要虢華同光元年復為鎮國軍節度按同光元年據寰宇記商同復為匡國軍節度廢裕州以美原來屬同光三年以河中府澄城縣還屬天成元年以韓城郃陽二縣還屬按四縣割屬據五代㑹要耀同光元年復為耀州改順義軍節度華原縣屬焉二年降為團練三年以京兆府之富平三原雲陽同州之同官美原五縣來屬按降團練據五代會要富平三原雲陽三縣據輿地考及寰宇記邠寧慶衍鄜同光元年復坊州昭化縣為鄜城縣還屬按此據五代㑹要坊丹延同光元年改彰武軍節度按同光元年據輿地考夏銀綏宥靈鹽岐唐末為李茂貞所據後唐同光初始內附仍為鳯翔軍節度按此據方輿紀要隴復華亭縣置儀州按職方考不載置儀州輿地廣記華亭縣唐憲宗元和三年省入􅊈源後唐復置兼置儀州今據之涇平凉故屬涇州唐末渭州陷吐蕃權於平凉置渭州而廢縣後唐廢帝清泰三年以故平凉之安國耀武兩鎮置平凉縣原臨涇故屬涇州唐末原州陷吐蕃權於臨涇置原州而涇州兼治其民後唐清泰三年來屬渭武秦長興三年復置天水隴城二縣按輿地考以岐州清水來屬考新舊唐書並云清水縣宣宗大中二年權𨽻鳯翔三年來屬五代㑹要長興三年秦州奏見管長道成紀清水三縣外有十一鎮徵科並係鎮將今請以歸化怨水五龍黃土四鎮就歸化鎮復舊置隴城縣赤砂染坊夕陽南冶鐡務五鎮就赤砂鎮復舊置天水縣則清水自大中來屬以後並未有更改通考或傳寫誤也又唐書尚有上邽伏羌二縣㑹要不載其廢時他無可考今並附識成梁改為汶州末帝貞明初地入於蜀後唐同光中復曰成州清泰三年置栗亭縣按改為汶州據寰宇記清泰三年據五代㑹要階唐武州地改置階州後唐長興三年移就故武州為理按此據寰宇記鳯唐屬山南西道節度蜀升為武興軍節度後唐降為防禦按此據寰宇記乾唐末李茂貞置治奉天縣後為威勝軍節度後唐同光中改為刺史屬鳯翔府按職方考不詳乾州沿革今據寰宇記又按新唐書京兆府奉天縣注乾寧二年以奉天縣置乾州及覃王出鎮又以畿內之好畤武功盩厔醴泉𨽻之又鳯翔府盩厔縣注乾寧中𨽻乾州天復元年來屬則乾州自朱梁以來領奉天好畤武功醴泉四縣後唐以好畤武功醴泉還屬京兆是乾州僅領奉天縣也謹附識魏唐大名府天雄軍節度梁因之貞明末軍亂入於晉後唐同光元年莊宗即位於此升為東京改元城縣曰興唐縣貴鄉縣曰廣晉縣都督府曰興唐府以貝州臨清縣來屬又改昌樂縣為南樂縣三年以洛京為東都復改東京為鄴都按職方考伹云後唐建鄴都改興唐府考本紀云同光元年以魏為東京三年改東京為鄴都五代㑹要冊府元龜並云改元城為興唐貴鄉為廣晉輿地考云以貝州臨清來屬輿地廣記云改昌樂縣為南樂今並據之又按五代㑹要長興三年中書門下奏據十道圖舊制以王者所都之地為上本朝都長安遂以關內道為上今宗廟宫闕皆在洛陽請以河南道為上關內道第二河東道第三河北道第四劍南道第五江南道第六淮南道第七山南道第八隴右道第九嶺南道第十又奏案十道圖以關內為上遂以鳯翔為首河中成都江陵興元為次中興初升魏州為興唐府鎮州為真定府皆是創業興王之地請升二府於五府之上合為七府仍以興唐為首真定鳯翔河中成都江陵興元為次並從之謹附識博復魚邱縣為高唐縣按此據寰宇記貝衛澶相梁昭德軍節度後唐莊宗入魏却為屬郡仍𨽻魏州天雄軍復長平縣為永定縣按此據寰宇記邢洺磁復曰磁州以邢洺滋三州為安國軍節度鎮同光元年升為北都尋罷都復為成德軍節度復彰武縣為行唐縣按此據本紀及寰宇記冀復蒲澤縣為唐陽縣按此據寰宇記深趙易祁定滄同光元年復為橫海軍節度按此據五代㑹要景德改平昌縣為德平縣按此據輿地廣記瀛莫幽盧龍軍節度長興三年改北平縣為燕平縣按改燕平縣據五代㑹要涿檀薊順營平唐末劉仁恭以營平二州遺契丹後唐莊宗滅仁恭而取其地既滅梁旋失之按此據輿地考蔚安邊縣唐肅宗至德中改興唐縣梁改隆化縣後唐復曰安邊又析置廣靈縣據此據方輿紀要朔振武軍節度寰本朔州馬邑縣晉王存朂於此置興唐軍天成初改置寰州領寰清縣按此據方輿紀要雲同光二年復為大同軍節度以應州𨽻之按此據五代㑹要應故屬大同軍節度天成四年以潜龍鄉里升州為望州金城雁門為望縣渾源為上縣寰清為次縣置彰國軍以興唐軍為寰州以𨽻之按此據五代㑹要新同光元年置威塞軍節度以媯儒武三州𨽻之按𨽻三州據五代會要媯儒武長興元年改為毅州按此據輿地廣記欣代雁門軍節度嵐石憲麟府唐末河西蕃界之地於此置府谷鎮麟州土人折太山折嗣倫代為鎮將後唐莊宗以代北諸部屢為邊患乃升府谷為縣八年按後唐莊宗即位僅紀同光四年而此云八年或即其初稱唐天祐之八年也因係通考舊文姑仍存之謹附識麟州刺史折嗣倫男從阮招回紇歸國詔以府谷縣建府州按此據輿地考并同光元年建為西京尋改為北都其軍仍曰河東按職方考不載建西京考本紀同光元年以太原為西京十一月以太原為北都今據之汾慈改吉昌縣為吉鄉縣昌寧縣曰鄉寧縣按此據輿地廣記隰澤潞改安義軍節度復潞子縣為潞城按職方考不載復潞城縣方輿紀要云潞城縣天祐二年更名潞子後唐復曰潞城今據之沁遼附外屬州揚楚後唐天成三年升為順化軍節度泗置靜淮軍滁和光黃舒蘄廬壽後唐同光初復灊山縣為盛唐縣海濠潤常宣歙鄂同光初復臨夏縣為唐年縣升池改秋浦縣為貴池縣至德縣為建德縣饒信江升蒲唐場為德安縣洪撫置昭武軍即度袁吉䖍後唐長興二年升昭信軍節度以上入吳建王延翰改延平鎮為永平鎮尋升為龍津縣汀漳泉後唐天成四年以唐大同場置同安縣長興四年以隋桃林場置桃源縣福後唐同光元年復永昌縣為福唐縣長興四年升州為長樂府改福唐縣為福清以羅源場為永貞縣感德場為寧德縣歸化場為德化縣改閩縣為長樂縣旋又改候官縣為閟興縣長樂縣為候官縣清泰二年復舊以上入閩杭後唐同光初復金昌縣為唐山縣越蘇湖溫台同光初復天台縣為唐興縣明處衢婺睦以上入吳越荆歸峽以上入南平金益漢彭後唐同光初復歸化縣為永昌縣蜀綿眉嘉劍梓遂果閬後唐天成四年置保寧軍節度普陵資榮簡邛黎雅維茂文龍黔施夔天成二年改曰寧江軍忠萬興利同光三年改為益州又改益昌縣曰益光縣開通涪渝瀘合昌巴蓬集壁渠戎梁洋以上入後蜀潭衡澧朗嶽道永邵辰融郴改義昌縣為郴義縣連昭宜桂後唐同光初復歸化縣為慕化縣賀梧蒙嚴富柳象以上入楚容雍端康封恩後唐清泰元年升為防禦州春新髙後唐同光初復越裳縣為茂名縣竇雷化韶藤白亷欽廣橫賔潯循鬱林英劉龑割廣州之湞陽置治湞陽雄劉龑割韶州之保昌置治保昌瓊崖儋萬安羅潘勤瀧辨以上入南漢欽定續通典卷一百二十二
