body:
  text: 禮吉郊天宋遼金元哲宗元祐元年禮部言元豐所造大裘雖用黑羊皮乃作短袍樣襲於衮衣之下仍與衮服同冕未合典禮下禮部太常寺共議上官均吳安詩常安民劉唐老龔原姚勔請依元豐新禮丁隲請循祖宗故事王愈請倣唐制朱光庭周秩請以元衣襲裘獨禮部員外郎何洵直在元豐中嘗預詳定以陸佃所議有可疑者八按周禮節服氏掌祭祀朝覲衮冕六人維王之太常郊祀裘冕二人既云衮冕又云裘冕是衮與裘各有冕乃云裘與衮同冕當以裘襲之裘既無冕又襲於衮中裘而表衮何以示裘冕之别哉古人雖質不應以裘為夏服蓋冬用大裘當暑則以同色繒為之記曰郊祭之日王被衮以象天若謂裘上被衮以被為襲則家語亦有被裘象天之文諸儒或言臨燔柴脫冕著大裘或云脫裘服衮蓋裘衮無同冕兼服之理今乃以二服合為一可乎且大裘天子吉服之最上若大圭大路之比是裘之在表者記曰大裘不裼説者曰無别衣以裼之蓋他服之裘褻故表裘不入公門事天以報本復始故露質見素不為表襮而冕亦無旒何必假他衣以藩飾之乎凡裘上有衣謂之裼裼上有衣謂之襲襲者裘上重二衣也大裘本不裼鄭志乃云裘上有元衣與裘同色蓋趙商之徒附會為説不與經合襲之為義本出於重沓非一衣也古者齋祭衣冠齋服降祭服一等祀昊天上帝五帝以裘冕祭則衮冕齋故鄭氏云王齋服衮冕是衮冕者祀天之齋服也唐開元及宋開寶禮始以衮冕為齋服裘冕為祭服兼與張融臨燔柴脫衮服裘之義合請從唐制兼改製大裘以黑繒為之佃復破其説曰夫大裘而冕謂之裘冕非大裘而冕謂之衮冕則裘冕必服衮衮冕不必服裘今特言裘冕者主冬至言之周禮司裘掌為大裘以供王祀天之服則祀地不服大裘以夏日至不可服裘故也今謂大裘當暑以同色繒為之尤不經見兼裼襲一衣而已初無重沓之義被裘而服之則曰襲袒而露裘之美則曰裼所謂大裘不裼則非衮而何玉藻曰禮不盛服不充故大裘不裼則明不裼而襲也充美也鄭氏謂大裘之上有元衣雖不知覆裘以衮然尚知大裘不可徒服必有元衣以覆之玉藻有尸襲之義周禮裘冕注云裘冕者從尸服也夫尸服大裘而襲則王服大裘而襲可知且裘不可以徒服敵被以衮豈借衮以為飾哉今謂祭天用衮冕為齋服裘冕為祭服此乃襲先儒之謬誤後漢顯宗初服日月星辰十二章以祀天地自魏以來皆用衮服則漢魏祭天嘗服衮矣雖無大裘未能盡合於禮固未嘗有表裘而祭者也且裘內服也與袍同袍褻矣而欲襌以祭天以明示質是欲衩衣以見上帝也洵直復欲為大裘之裳纁色而無章飾夫裘安得有裳哉請從先帝所志其後詔如洵直議去黑羊皮而以黑繒制焉五年五月尚書右丞許將言王者父天母地三歲冬至天子親祀遍享宗廟祀天圜丘而夏至方澤之祭乃止遣上公則皇地祇遂永不在親祀之典此大闕禮望博詔儒臣講求典故明正祀典為萬世法詔禮部太常寺及兩省侍從官集議以聞於是翰林學士兼侍讀顧臨等八人請合祭天地如祖宗故事俟將來親行北郊之禮則合祭可罷臨與范祖禹又言天地特祭經有明文然自漢以來千有餘年不能行之宋興一祖六宗皆合祭天地其不合祭者唯元豐六年一郊耳去所易而就所難虛地祇之大祭失今不定後必悔之吏部侍郎范純禮彭汝礪戶部侍郎范子奇禮部侍郎曽肇刑部侍郎王覿豐稷權知開封府韓宗道樞密都承旨劉安世中書舍人孔武仲陳軒太常少卿盛陶宇文昌齡侍御史王畏監察御史董敦逸黃慶基左司諫虞䇿禮部郎中孫路員外郎歐陽棐太常丞韓治博士朱彥宋景年閻本等二十二人皆主北郊之議而武仲又請以孟冬純隂之月詣北郊親祠如神州地祇之祭杜純議請南郊之嵗設望祠位於苑中置爟火夏至命上公攝事每獻舉爟火詔依王欽臣議宜如祖宗故事並祭天地一次汝礪肇復上疏論合祭非是文多不載九月三省上顧臨等議太皇太后曰宜依仁宗皇帝故事吕大防言國朝以來大率三歲一親郊並祭天地宗廟因行赦宥頒賞軍士遂以為常今諸儒獻議欲南郊不設皇地祇位唯祭昊天上帝於祖宗之制未見其可蘇轍曰自熙寧十年神宗皇帝親祀南郊合祭天地今十五年矣皇帝即位又已八年未嘗親見地祇乃朝廷缺典不可不正范百祿言圜丘無祭地之禮記曰有其廢之莫可舉也先帝所廢稽古據經未可輕改大防又言先帝因禮文所建議遂令諸儒議定北郊祭地之禮然未經親行今皇帝臨御之始當親見天地而地祇之位獨不設恐亦未安況本朝祖宗以恩霈四方慶賚將士非三嵗一行則國力有限今日宜為國事勉行權制俟異時議定北郊制度及太廟享禮行之未晚太皇太后以吕大防之言為是而蘇頌鄭雍皆以古者人君嗣位之初必郊見天地今皇帝初郊而不祀地恐未合古乃下詔曰國家郊廟特祀祖宗以來命官攝事則三嵗一親郊先享清廟冬至合祭天地於圜丘元豐間有司援周制以合祭不應古義先帝乃詔定親祠北郊之儀未之及行是嵗郊祀不設皇地祇之位而宗廟之享率如權制朕方修郊見天地之始其冬至日南郊宜依熙寧十年故事設皇地祇位以嚴並況之報厥後躬行方澤之祀則修元豐六年五月之制俟郊禮畢集官詳議典禮以聞八年詔議郊祀禮部尚書蘇軾言議者欲變祖宗之舊圜丘祀天而不祀地不過以謂冬至祀天夏至祀地以類求神也是大不然冬至南郊既祀上帝則天地百神莫不從祀古者秋分夕月西郊亦可謂隂時隂位矣至於從祀上帝則冬至而祀月於南郊議者不以為疑今皇地祇亦從上帝而合祭於圜丘獨以為不可則過矣詩之序曰昊天有成命郊祀天地也此乃合祭天地經之明文而説者乃以比之豐年秋冬報也曰秋冬各報而皆歌豐年則天地各祭而皆歌昊天有成命也是大不然豐年之詩曰豐年多黍多稌亦有髙廩萬億及秭為酒為醴蒸畀祖妣以洽百禮降福孔皆歌於秋可也歌於冬亦可也昊天成命之詩終篇言天而不及地今祭地於北郊獨歌天而不歌地豈有此理哉議者乃謂合祭天地始於王莽臣竊謂禮當論其是非不當以人廢光武皇帝親誅莽者也嘗采用元始合祭故事謹按後漢書郊祀志建武二年初制郊兆於洛陽為圜丘八陛中又為重壇天地位其上皆南向西上此則漢世合祭天地之明驗也議者欲冬至祀天夏至祀地蓋以為用周禮也臣請言周禮與今禮之别古者一歲祀天者三明堂享帝者一四時迎氣者五祭地者二享宗廟者四此十五者皆天子親祭也太祖建隆初郊先享宗廟乃祀天地自真宗以來三歲一郊必先有事於景靈宫享太廟乃祀天地此國朝之禮也周禮親祭如彼其多今禮親祭如此其少蓋古者天子出入儀物不繁用財有節天子所治不過王畿千里唯以齋祭禮樂為政事後世海內為一四方萬里機務之繁億倍於古日力有不能給自秦漢以來天子儀物日以滋多有加無損以至於今非如古之簡易今之所行皆非周禮獨於地祇則曰周禮不當祭於圜丘此何義也哉議者又曰夏至不能行禮則遣官攝祭周禮大宗伯若王不與祭祀則攝位鄭注曰王有故則代行賈公彥曰王有故謂疾及哀慘皆是後世人主不能嵗嵗親祭故命有司行事若親郊之嵗遣官攝事是無故用有故之禮也議者曰省去繁文末節一嵗可以再郊夫古者以親郊為常禮故無繁文今為大禮則繁文有不能省也王者父事天母事地不可偏異事天則備事地則簡是於父母有隆殺也三年一郊傾竭帑藏猶恐不足郊賚之外豈有復加分而與之人情豈不失望議者曰三年一祀天又三年一祀地夫三年已為疏闊若獨祭地而不祭天是因事地而逾疏於事天也議者曰當郊之嵗以十月神州之祭易夏至方澤之祀則可以免方暑舉事之患夫所以議此者為欲舉從周禮今以十月易夏至以神州代方澤豈周禮之經耶議者曰當郊之嵗以夏至祀地於方澤上不親郊天子於禁中望祀書之望秩周禮之四望春秋之三望皆謂山川在四郊者故逺望而祭也今云望祭是為京師不見地乎是時軾建議主合祭從之者五人劉安世主分祭從之者四十人又有為禁中望拜之議者於是詔送下三狀再令詳定安世復言云臣等昨奉詔旨講議大典皆祖周制而或者欲於當郊之嵗以十月神州地祇之祭易夏至方澤之祀可以免盛暑舉事之勞夫神州地祇乃天子建都之所一方之神爾非皇地祇之比也或者又欲於夏至之日上不親郊止設爟火天子望祀於禁中如西漢行宫故事此皆出於臆説違經害義不可施行內有蘇軾一狀以合祭圜丘於禮為得不可復有更改臣等謹按祭祀之禮莫大於天地二儀敵體禮宜均一豈可親祀乃有隆殺古者祭天於冬至國南圜丘祭地於夏至國北方澤求神以類也今議者猥用王莽不經之説至引夫婦同牢私媟之語黷亂天地決不可從議者引周頌昊天有成命以為合祭之證竊詳是詩終篇未嘗有合祭之文所謂郊祀天地乃後儒敘詩者之辭耳蓋成周之世圜丘祭天方澤祭地皆歌此詩以為樂章非謂易北郊之祀使就享南郊也借如其説潛之序曰季冬獻魚春薦鮪也豐年詩之序曰豐年秋冬報也噫嘻序曰春夏祈榖於上帝也如此之類謂一祭耶二祭耶彭汝礪上議曰先王之交於神明也既祭之以禮又求之以類春為陽故以正月迎於東郊秋為隂故以七月迎於西郊使易地迎之樵野猶怪況鬼神乎先皇帝稽古是正何疑何恤而欲更之家人小祀尚慎廢舉天地重大豈容私議又曰合祭之議臣等謂不可者二十二人謂可者八人周禮聖人之言也合祭肇於漢末其言甚不經今委聖言而從不經不可也或曰合祭今世行之莫之改也夫先帝固已改之善矣今欲變之可不可也或曰親祀未能且從合祭可乎曰親祀非不可行以有事而攝焉亦禮也合祭非禮也先是禮部侍郎曽肇上奏乞分祭略曰天地合祭使於承祀神祇無不順之理雖非先王之禮何為而不可蓋以聖人之於祭求之於茫昧不可知之中故必因其方順其時而用其類以致之先王以為求之如此其盡庶幾神之來享也茍為反是則其於格神也難矣論者謂夏月行禮為難欲因南郊併舉此施於人事以求自便也且屈己以從神與屈神以從己二者孰安又曰今世之人家有尊長所居異宫子弟致敬必即其處尚不敢屈致一堂況天子祀地可不如家人之禮哉安世議未上會降旨罷集議詔依元祐七年故事合祭天地紹聖元年五月右正言張商英言元祐諸臣復請合祭之非詔下禮官議御史中丞黃履謂南郊合祭因王莽諂事元后遂躋地位合席同牢逮先帝親郊大臣以宣仁同政復用莽意合祀瀆亂典禮帝詢輔臣章惇曰北郊止可謂之社黃履曰郊者交於神明之義所以天地皆稱郊社者土之神爾大祇不可謂之社乃以履奏下禮部禮部侍郎盛陶大常丞王誼等皆言宜用北郊儀注罷合祭禮已而三省言盛夏祭地必難親行詔兩省臺諫同議曽布錢協范純禮韓宗師王古井亮采常安民李琮虞䇿劉定傳楫黃裳豐稷葉祖洽等言互有是否蔡京林希蔡卞黃履吳安持朝端彥翟思郭知章劉拯黃慶基董敦逸等請罷合祭從之然北郊親祀終帝之世未嘗克舉元符元年左司員外郎曽􅌈言周人以氣臭事神近世易之以香按何佟之議以為南郊明堂用沈香本天之質陽所宜也北郊用上和香以地於人親宜加雜馥今令文北極天皇而下皆用濕香至於衆星之位香不復設恐於義未盡又言先儒以為實柴所祀者無玉槱燎所祀者無幣今衆星皆不用幣蓋出於此考典瑞玉人之官皆曰圭璧以祀日月星辰則實柴所祀非無玉矣槱燎無幣恐或未然於是每陛各設香命衆星各隨其方色用幣徽宗建中靖國元年詔初祀南郊權合祭天地於圜丘起居郎周常等以合祭為非禮曽布主其説乃詔罷合祭按是年仍合祭政和三年詔有司討論壇壝之制禮制局言古所謂地上圜丘澤中方丘皆因地形之自然王者建國或無自然之丘則於郊擇吉土以兆壇位為壇之制當用陽數今定為壇三成一成用九九之數廣八十一丈再成用六九之數廣五十四丈三成用三九之數廣二十七丈每成髙二十七尺三成總八十一尺九九之數也陛級二百一十有六乾之䇿也為三壝壝三十六步亦乾之䇿也成與壝俱三參天地之數也詔從之舊制壇四成一成二十丈再成十五丈三成十丈四成五丈成髙八尺一寸十二陛陛十二級三壝共二十五步又按政和郊制上帝版位長三尺取參天之數厚九寸取乾元用九廣尺二寸取天之備數書以蒼色象天之色南宋髙宗建炎二年築壇於揚州南門內江都縣之東南詔東京官吏奉祭器大樂儀仗法物赴行在所冬至祀昊天上帝以太祖配是年獨祭上帝紹興十二年臣僚言自南巡以來三歲三祀獨於明堂而郊天之禮未舉來嵗乞行大禮詔建壇於臨安府行宫東門之外十三年建圓壇一成廣七丈二成廣十二丈三成廣十七丈四成廣二十二丈一十二陛陛七十二級每成十二綴三壝第一壝去壇二十五步中壝去內壝外壝去中壝各半之燎壇方一丈髙一丈二尺開上南出戶方六尺三出陛在壇南二十步丙地其青城及望祭殿與行事陪祀官宿齋幕次並令絞縳不修蓋中興不建齋宫惟設幕屋以架木葦障上下四旁周以幄帟謂之幕殿及行事又於壇所設大小次外又有望祭殿遇雨則行事於中東都時為瓦屋五間中興後惟設帷屋而已太常少卿程瑀言皇地祇當一依祀天儀式詔從之是年禮部言郊祀大禮合依禮經皇帝服大裘被衮行禮據元豐詳定郊廟禮文何洵直議以黑繒創作大裘如衮惟領袖用黑羔乞如洵直議詔如祖宗故事以羔製之禮部又言關西羊羔係天生黑色今有司涅白羔為之不中禮制不如權以繒代又元祐中有司欲為大裘度用百羔哲宗以為害物遂用黑繒請以太常所言從之遂以衮襲裘冕亦十有二焉按徽宗政和中禮局上大裘青衣纁裏黑羔皮為領褾襈朱裳被以衮服冬至祀昊天上帝服之立冬祀黑帝立冬後祭神州地祇亦如之紹興郊祀神位昊天上帝位皇地祇位於壇上北方南向西上席以藁秸太祖皇帝位太宗皇帝位於壇上東方西向北上席以蒲越天皇大帝五方帝太明夜明北極神州地祇十位於第一龕北斗天一太一帝座五星十二辰河漢等內官五行五嶽神位六十有九於第二龕二十八宿等中官五鎮四海四瀆神位百七十有二於第三龕外官山林川澤邱陵墳衍原隰神位百五十有六於內壝之內衆星神位三百有六十於內壝之外第一龕席以藁秸餘以莞而席皆內向其祭玉昊天上帝以蒼璧皇地祇以黃琮青帝以青圭赤帝以赤璋黃帝以黃琮白帝以白琥黑帝以黝璜神州地祇以兩圭有邸日月以璧五嶽以兩圭有邸皆盛於匣昊天上帝配帝帛皆以蒼皇地祇以黃日月內官以下冬從其方色其祭品正配位籩四行以右為上第一行糗餌在前粉餈次之第二行麷在前蕡白黑形鹽膴鮑魚鱐次之第三行乾棗在前濕棗栗濕桃乾桃濕梅乾䕩榛實又次之第四行菱在前芡栗鹿脯又次之豆四行以左為上第一行酏食在前糝食次之第二行韭菹在前醓醢昌本麋臡菁菹鹿臡茆菹麋臡又次之第三行葵菹在前螺醢脾析蠯醢蜃蚳醢豚拍魚醢又次之第四行芹菹在前兔醢深蒲醓醢菭菹雁醢笋菹魚醢又次之簠實以稻粱粱在稻前簋實以黍稷稷在黍前登實以太羔籩前之俎實以牛腥七體兩髀兩肩兩脅并脊兩髀在兩端兩肩兩脅次之脊在中豆右之俎二為二重以北為上第一重實以牛腥腸胃肺離肺一在上端寸肺三次之腸三胃三又次之第二重實以牛熟腸胃其載如腥若配位即以東為上著尊二一實元酒一實醴齊皇帝酌之壺尊二一實元酒一實盎齊亞終獻酌之太尊二一實泛齊一實醴齊山尊二一實盎齊一實醍齊犧尊二一實沈齊一實事酒象尊二一實昔酒一實清酒並設而不酌凡罍之實皆視其尊從祀諸神第一龕每位籩三行以右為上第一行乾䕩在前乾棗形鹽魚鱐次之第二行鹿脯在前榛實乾桃次之第三行菱在前芡栗次之豆三行以左為上第一行芹菹在前笋菹葵菹菁菹次之第二行韭菹在前魚醢兔醢次之第三行豚拍在前鹿臡醓醢次之簋實以稻粱粱在稻前簋實以黍稷稷在黍前籩前之俎實以羊腥髀一豆前之俎實以承腥髀一登實以太羔爵實以酒其餘諸神位每位左二籩栗在前鹿脯次之右二豆菁菹在前鹿臡次之簠實以稷簋實以黍俎實以羊豕腥肉登實以太羔爵實以酒神州地祇五行五官五嶽又實盤以毛血太尊實以泛齊犧尊實以醴齊壺尊實以沈齊各以一尊實明水概尊實以清酒散尊實以昔酒各以一尊實元酒著尊象尊俱實明水上帝配帝之饌升卯階其餘神位各由其階升孝宗隆興二年詔今嵗冬至日當郊見上帝可令有司除事神儀物諸軍賞給依舊制外其乘輿服御及中外之費並從省約是年孝宗初行大禮上問郊與明堂之費如何户部尚書韓仲通曰郊之費倍於明堂侍郎錢靖禮言不過二十萬若從祖宗故事一切從儉自宜大有減省上以為然乃詔除賞軍事神外並宜省約太常少卿洪適言陛下盛德重華度越古昔初講郊禋之禮宜進胙慈幃並受帝祉乞下有司草具儀注進呈從之初降詔以十一月行事以冬至適在晦日以至道典故改用獻嵗上辛遂改來年元為乾道以正月一日有事南郊禮成進昨於德夀宫以牛腥體肩三臂二臑二導駕官自端成殿簮花從駕至德夀宫上夀飲福稱賀寧宗嘉泰三年祕書省言看詳福州進士張容圖繳進南郊辨駁册內太子庶子之星以謂皇儲未慶理宜加祀並宋星乃國朝受命之符興王之地及感生帝本朝係火德尤宜尊崇乞並特加祀於圜丘容圖所陳數事實關國體辭理可採乞下禮寺施行從之五年臣僚言樂工瞽師聲音之所自出今登歌之樂列於壇上簉於上龕蓋上帝地祇太祖太宗並侑之側也而宫架之樂列於午階之下則百神之所同聽也夫樂莫尚於和平今戛擊摶拊鼓吹八佾之工蓋數百人寠人賤工安能蠲潔此不可不嚴者一也自圜壇之上暨於層龕之相承位列甚衆所謂籩豆簠簋登鉶樽俎之實唯牲牢至期宰擊餘如膴鮑魚鱐與夫兔雁蠯蚳之醢麋鹿之臡皆各司之所豫造也餌餈酏糝黍稷稻粱之食芹笋之菹則皆神厨至期之所造也竊聞豫造者先後遲速或不能指掯已分至有色惡臭惡之慮而先期呈饌之時或浹兩辰所供之物或不可用有司掌之者不過一巡視之而已以至酒齊之設凡有數等京尹之司不過委之右選趨走之人其為醇醨既不可品嘗其不中度者甚多也矧又有最甚者名為供官殆百餘人祭之日凡籩豆簠簋登鉶樽俎之屬滌濯固已鹵莽而夜半設實於器皆其手所敷頓此曹繫籍奉常平時所給微甚籃縷垢穢殆不可近而況執事之夕又復無所止宿半夜而興靧面濯手皆所不及而可令之供祭實乎至若贊引之人亦百餘輩平時亦皆供官之類耳以垢汙之人而蒙之以漫漶之服是皆不可進退於神位儀物之間者也此不可不嚴者二也昔魯人之祭也日不足繼之以燭雖有強力之容肅敬之心皆倦怠矣有司跛倚則為不敬之大今圜丘一龕之位通二龕三龕至壝埒之內外為位者八百分獻之官贊禮之人不能審候壇上疾徐之節但欲速於竣事獻官既多而禮生率常抽差六部寺監帥漕之貼吏為之既不􅈺習於禮而贊引捷給獻官跪拜俯興酌奠皆不及於禮其為怠慢甚矣此不可不嚴者三也臣愚以為郊禋大禮百司所供之物所造之物各有攸司固不可不分任之也而提綱總要當出於一奉常為九卿之長郊禋大禮又奉常所掌臣前所陳登歌宫架之工奉常固自有籍矣其有不足用則未免以寄名者足之今名為色長者當考見絲竹管弦有無斷闕速行修補仍必拘集羣工洗沐浣濯存其衣裝之可者其有不整之人責限令其措辦可也若供官贊引之人垢弊已甚又非樂工之比乞從御史臺行下奉常於一行人點名之外更加逐一檢察合用若干人除其間稍可備數之人自餘垢弊已甚必不可責其自辦者令奉常具申朝廷行下外祇備庫將先來檢計退下漫漶舊弊之物置造衲衣一褐一褲先期發下奉常見名責領色長至期盡去其垢弊之衣而外襲之以法服表裏咸潔可以執事於籩豆簠簋登鉶樽俎之間矣若夫一行合干等人名數猥衆乞下臨安府令先期一夕分就民居止宿夜半而興各靧面濯手整束衣服以趨祭所仍周環壇下約每十數步為置一盥帨俾供官禮生等人必先盥帨而後升壇所逐位鋪設務令極其嚴潔所設神厨雖已差官監造亦必奉常譏察之仍乞下臨安府大禮酒庫専差文官監造而豫造之厨從所司亟撥人員徑過奉常躬親監造可也分獻贊引之人必令詳緩如禮亦從御史臺行下約束夫以郊禋大禮巨費至數百萬而四方之犒費不與焉皆非切於事神也聲音氣臭之用莫嚴於圜丘一處耳此而不嚴則巨費數百萬皆所謂不揣其本而齊其末也其可不亟正之以對越天地祖宗之威靈從之度宗咸淳二年權工部尚書趙汝暨等奏臣等竊惟帝王受命郊見天地不可緩也古者有改元即郊不用前郊三年為計況今適在當郊之嵗既踰大祥之期圜丘之祀豈容不舉於是降札以十一月十七日欵謁南郊適太史院言十六日太隂交蝕遂改來年正月一日南郊行禮太常寺言皇帝既已從吉請依儀用樂其十二月二十九日朝獻景靈宫三十日朝享太廟尚在禫制之內所有迎神奠幣酌獻送神作樂外其盥洗升降行步等樂備而不作是年將舉郊祀時復議以髙宗參配吏部侍郎兼中書門下省檢正洪燾等議以為物無二本事無二初舜之郊嚳商之郊契周郊后稷皆所以推原其始也禮者所以别等差視儀則逺而尊者配於郊近而親者配於明堂明有等也臣等謂宜如紹興故事奉太宗配將來明堂遵用先皇帝彛典以髙宗參侑庶於報本之禮奉先之孝為兩盡其至詔恭依按周密南渡典儀三嵗一郊豫於元日降詔以冬至有事於南郊或用次年元日行事先於五六月內擇日命漕帥及修內司修飾郊壇及絞縳青成齋殿等屋凡數百間悉覆以葦席護以青布並差官兵修築泥路自太廟至泰禋門又自嘉會門至麗正門計九里三百二十步皆以潮沙填築其平如席以便五輅之往來每隊各有歌頭以綵旗為號兩街居民各以綵段錢酒為犒又命象院教象前導朱旗以二金三鼓為節各有幞頭紫衣蠻奴乘之手執短钁旋轉跪起悉如人意又以車五乘壓之以鐵多至萬斤與輅輕重適等以觀疾徐傾側之勢至前一月進呈謂之閃試及駕出前一日縳大綵屋於太廟前置輅其中許都人觀瞻自前一月以來次第按試習儀殆無虗日郊前十日執事陪祀等官並受誓戒於尚書省前三日百官奏請皇帝致齋於大慶殿是日上服通天冠絳紗袍綪結佩升髙座侍中奏請降座就齋室次日車駕詣景靈宫服衮冕行禮禮畢駕回就赴太廟齋殿宿是夕四鼓上服衮冕詣祖宗諸室行朝饗之禮是夜鹵簿儀仗軍兵於御路兩旁分列間以籸盆蕡燭自太廟直至郊壇泰禋門輝映如晝宰執親王貴家巨室列幕櫛比皆不逺千里不憚重費豫定於數月之前而至期猶有為有力所奪者歌舞遊遨工藝百物輻輳爭售通宵駢闐至五更則䂍矟先驅所至皆滅燈火蓋清道祓除之義黎明上御玉輅從以四輅導以訓象千官百司法駕儀仗錦繡雜還蓋十倍孟饗之數聲容文物不可盡述次第出嘉會門至青城宿齋四壁皆三衙諸軍周廬坐甲軍幕旌旗布列前後傳呼唱號列燭互巡往來如織行宫至暮則嚴更警惕鼓角轟振又有衛士十餘隊每隊十餘人互相唱探至三鼓執事陪祀官並入就黃壇排立凡齪燈皆自為志號如捧俎官則畫一人為捧俎之狀用丑時一刻行事至期上服通天冠絳紗袍乘輦至大次禮部侍郎奏中嚴外辦禮儀使奏請皇帝行事上服衮冕步至小次升自午階天步所臨皆藉以黃羅謂之黃道中貴一人以大合貯片腦迎前撒之禮儀使導殿中監進大圭至版位禮直官奏有司謹具請行事時壝壇內外凡數萬衆皆肅然無譁祀訖登門肆赦郊壇天盤至地髙三丈四尺二寸通七十二級分四成上廣七丈共十二階分三十六龕午階闊一丈主上升降由此階其餘各闊五尺圜丘之上止設昊天上帝皇地祇二神位及太祖太宗配天十六龕共祀五帝太一感生北極北斗及分祀衆星三百六十位儀仗用六千八百八十九人自太廟排列至青城玉輅下祇應人共三百二十一人呵唱人員二人教馬二人挾捧輪將軍四人推掄車子官健八人駕士班直二百三十二人千牛衛將軍二員抱太常龍旗官六員職掌五人専知官一名手分一名庫子八人裝挂匠二人諸作工匠十五人蓋覆儀鑾司十一人監官三員金象革木輅每輅下一百五十六人玉輅青飾金輅黃飾象輅紅飾革輅淺色飾墨輅黑飾輅下有人冠服並依輅色玉輅前儀仗騎導騎導官左壁文臣右壁武臣六軍儀仗官兵二千二百二十二人左右諸將軍十三員中道五員左右八員金吾衙仗司孰䂍矟八十人攝將軍八員仗下監門二十六員鼓吹五百八十三人導駕樂人三百三十人大禮後擇日行恭謝禮第一日駕出如四孟儀詣景靈宫天興殿聖祖前行恭謝禮次詣中殿祖宗神御前行禮還齋殿進膳訖引宰臣以下賜茶茶畢還內第二日將至太一宫道士率衆執威儀於萬夀觀前入圍子內迎駕起居作法事前導入太一宫門降輦候班齊詣靈休殿參神次詣五福十神太一次詣申佑殿本命北辰殿通直殿佑聖順福殿太后本命延夀殿南極火德殿禮畢宣宰臣已下合赴坐官並簮花對御賜宴上服幞頭紅上蓋玉束帶不簮花御筵畢百官侍衛吏卒等並賜簮花從駕遼太祖神册元年正月庚寅命有司設壇燔柴告天即皇帝位七年五月癸丑以黑白羊祭天地丙寅以青牛白馬祭天地按遼制凡國有大故及行軍必以黑白羊祭天地或以青牛白馬祭天地用青牛白馬者志其發祥所自不忘本也十一月祠木葉山按祭山儀設天神地祇位於木葉山東向中立君樹前植羣樹以象朝班又偶植二樹以為神門皇帝皇后至額掄安班具禮儀牲用赭白馬元牛赤白羊皆牡僕臣曰旗鼓蘇拉殺牲體割懸之君樹太巫以酒酬牲禮官曰多隆郭默德奏儀辨皇帝服金文金冠白綾袍絳帶懸魚三山絳埀飾犀玉刀錯絡縫烏靴皇后御絳帓絡縫紅袍懸玉佩雙結帕絡縫烏靴皇帝皇后御鞍馬羣臣在南命婦在北服從各部旗幟之色以從又按太祖幸幽州大悲閣遷白衣觀音像建廟木葉山尊為家神於拜山儀過樹之後增詣菩薩堂儀一節然後拜神非約尼和隆郭汗之故也十二月戊子燔柴於蓮花濼按遼制行燔柴禮或一嵗舉行或數嵗一行無定時穆宗應厯二年九月戊午詔以白黑羊元酒祭天嵗以為常興宗朝先有事於菩薩堂及木葉山遼河神然後行拜山儀冠服節文多所變更後因以為常金初因遼舊俗有拜天之禮以重五中元重九日行之重五於鞠場中元於內殿重九於都城外其制刳木為盤如舟狀赤為質畫雲鶴文為架髙五六尺置盤於上薦食物其中聚宗族拜之若至尊則以常武殿築臺為拜天所太宗即位告祀天地設位而祭天德以後始有南北郊之制南郊在豐宜門外當闕之已地圜壇三成成十二陛各案辰位壝牆三匝四面各三門齋宫東北厨庫在南壇壝皆以赤土圬之冬至日合祀昊天上帝皇地祇於圜丘世宗大定十一年始郊命宰臣議配享之禮左丞石琚言案禮記萬物本乎天人本乎祖此所以祖配上帝也蓋配之者侑神作主也自外至者無主不止故推祖考配天尊之也兩漢魏晉以來皆配以一祖至唐髙宗始以髙祖太宗崇配垂拱初又加以髙宗遂有三祖同配之禮至宋亦嘗以三帝配後禮院上議以為對越天地神無二主由是止以太祖配臣謂冬至親郊宜從古禮帝曰唐宋以私親不合古不足為法今止當以太祖配又謂宰臣曰本國拜天之禮甚重今汝等言以古制築壇亦宜我國家絀遼宋主據天下之正郊祀之禮豈可不行乃以八月詔曰國莫大於祀祀莫大於天振古所行舊章咸在仰唯太祖之基命紹我本朝之燕謀奄有萬邦於今五紀因時制作雖增飾於國容推本奉承猶未遑於郊見況天麻滋至而年榖屢豐敢不敷繹曠文明昭大報取陽升之至日將親饗乎圜壇嘉與臣工共圖熙事以今年十一月十七日有事於南郊咨爾有司各揚乃職相子祀事罔或不欽乃於郊見前一日遍見祖宗告以郊祀之事其日備法駕鹵簿躬詣郊壇行禮章宗承安元年將郊禮官言禮神之玉當用真玉燔玉當用次玉昔大定十一年天地之主皆以次玉代之臣等疑其未盡禮貴有恆不能繼者不敢以獻若燔真玉常祀用之恐有時或缺反失禮制若從近代之典及本朝儀禮真玉禮神次玉燔瘞於禮為當近代郊自第二等升天皇大帝北極於第一等前八位舊各有禮玉燔玉而此二位尚無之案周禮典瑞云以圭璧祀日月星辰近代禮九宫貴人大火星位猶用周禮之説其天皇大帝北極二位固宜用禮神之玉及燔玉也帝命俱用真玉省臣又言前時郊天地配位各用一犢五方帝日月神州天皇大帝北極十位皆大祀亦當用犢當時止以羊代第二等以下從祀神位則分刲羊豕以獻竊意天地之祀籩豆尚多者以備隂陽之物鼎俎尚少者以人之烹薦無可以稱其德則貴質而已故天地日月星辰之位皆用一俎前時第一等神位偏用二俎似為不倫今第一等神位亦當各用犢一餘位以羊豕分獻從之二年十一月有事於南郊齋戒用唐制大祀散齋四日致齋三日中祀散齋二日致齋一日天子親祀皆前期七日攝太尉誓亞終獻官親王陪祀皇族於宫省皇族十五以上官雖不及七品者亦助祭受誓又誓百官於尚書省昊天上帝皇地祇神座在壇上北方南向地祇位在東稍却席皆以藁秸太祖配位座在東方西向席以蒲越五方帝日月神州地祇天皇大帝北極神座於壇上第一等席皆藁秸內官五十四座五神五官嶽鎮海瀆二十九座在壇第二等中官一百五十有八座崑崙山林川澤二十一座在壇上第二等外官一百六座邱陵墳衍原隰三十座於內壝之內衆星三百六十座在內壝之外席皆以莞天地配位各左十有二籩右十有二豆俱為三行登三在籩豆間簠二簋二於登前簠在左簋在右俎四毛血豆一各於神座前藉以席天地太尊著尊犧尊山罍象尊壺尊各二山罍各四配位著尊犧尊象尊壺尊各二山罍各四皆有坫左以明水右以元酒第一等皆左八籩右八豆登在籩豆間簠一簋一在登前爵坫一在神座前俎四第二等每座籩二豆二簠一簋一俎一爵坫一第三等內壝內外官內壝外衆星每位籩二豆二簠一簋一俎一爵一第一等每位大尊著尊各二皆有坫第二等每位山尊二第三等每位蜃尊二內壝內外每辰概尊二皆用勺自第二等以下皆用匏爵其玉幣昊天上帝以蒼璧蒼幣皇地祇以黃琮黃幣配位以蒼幣黃帝以黃琮青帝以青圭赤帝以赤璋大明以青圭璧白帝以白琥黑帝以元璜北極以青圭璧天皇大帝以元圭璧神州地祇以元色兩圭有邸五帝之幣各從其方色昊天上帝皇地祇配位每位籩三行以右為上形鹽在前魚鱐糗餌粉餈次之第二行榛實在前乾桃乾䕩乾棗次之第三行乾菱在前乾芡乾栗鹿脯次之豆三行以左為上芹菹在前笋菹葵菹次之第二行韭菹在前菁菹魚醢兔醢次之第三行豚胉在前醓醢飽食糝食鹿臡次之簠黍簋稷登太羔第一等每位籩三行以右為上形鹽在前魚鱐次之第二行乾䕩在前桃棗次之第三行乾芡在前榛實鹿脯次之豆三行以左為上芹菹在前笋菹次之第二行菁菹在前韭菹魚醢次之第三行豚胉在前醓醢鹿臡次之簠黍簋稷登太羔第二第三等每位籩二鹿脯乾棗豆二鹿臡菁菹俎羊一體內壝內內壝外每位籩鹿脯豆鹿臡俎羊一體昊天上帝皇地祇太尊為上實以泛齊著尊次之實以體齊犧尊次之實以盎齊象尊次之實以體齊壺尊次之實以沈齊山罍為下實以三酒配位著尊為上實以泛齊犧尊次之實以醴齊象尊次之實以盎齊壺尊次之實以醍齊山罍為下實以三酒第一等每位太尊實以泛齊著尊實以醴齊第二等山尊實以醍齊第三等及內壝內蜃尊實以泛齊內壝外及衆星概尊實以三酒五年五月敕重五拜天服公裳者拜禮仍舊諸便服者並用女直拜按金之拜制先袖手微俯身稍復却跪在膝左右搖肘若舞蹈狀凡跪搖袖下拂膝上則至左右肩者凡四如此者四跪復以手按右膝單跪左膝而成禮圖言搖手而拜謂之察楚是年五月上諭有司曰女直漢人拜數可以相從者酌中議之禮官奏曰周官九拜一曰稽首拜中至重拜君之禮也乞自今凡公服則用漢拜若便拜則用本俗之拜主事陳松曰本朝拜禮其來久矣乃便服之拜也可令公服則朝拜便服則從本朝拜平章政事張萬公謂拜禮各便所習不須改也司空完顔襄曰今請袵髮皆從本朝之制宜從本皆朝拜禮松言是也上乃命公裳則朝拜諸色人便服則用本朝拜元興朔漠代有拜天之禮衣冠尚質祭器尚純帝后親之宗戚助祭憲宗即位之年秋八月始以冕服拜天於日月山其十二月又用孔元措言合祭昊天后土始大合樂作牌位以太祖睿宗配享嵗甲寅會諸王於庫庫淖爾之西丁巳秋駐蹕於凖淖爾皆祭天於其地世祖中統元年夏四月躬祀天於舊桓州之西北灑馬湩以為禮十二年十二月以受尊號遣使豫告天地下太常檢討唐宋金舊儀於國陽麗正門東南七里建祭臺設昊天上帝皇地祇位二行一獻禮自後國有大典禮皆即南郊告謝焉十三年五月以平宋遣使告天地以國禮行事成宗即位之四月為壇於都城南七里大德六年春三月祭天遣左丞相哈喇哈斯攝事此元代祀天攝事之始命獻官以下諸執事各具公服行禮是時大都未有郊壇大禮用公服自此始時翰林國史院檢閲官袁桷進十議曰天無二日天既不得有二五帝不得謂之天作昊天五帝議祭天嵗或為九或為二作祭天名數議圜丘不見於五經郊不見於周官作圜丘非郊議后土社也作后土即社議三嵗一郊非古也作祭天無間嵗議燔柴見於古經周官以禋祀為大其義各有旨作燔柴泰壇議祭天之牛角繭栗用牲於郊牛二合配而言之增羣祀而合祠非周公之制矣作郊不當立從祀議郊質而尊之義也明堂文而親之義也作郊明堂禮儀異制議郊用辛魯禮也卜不得常為辛作郊非辛日議北郊不見於三禮尊地而遵北郊鄭元之説也作北郊議禮官推其博多采用之九年二月右丞相哈喇哈斯等言天子親祀者三曰天曰祖宗曰社稷今宗廟社稷嵗時攝官行事祭天國之大事也陛下雖未及親祀宜如宗廟社稷遣官攝祭嵗用冬至儀物有司豫備制曰可於是翰林集賢太常禮官皆會中書集議博士疏曰冬至圜丘唯祀昊天上帝至西漢元始間始合祭天地厯東漢至宋十有餘年分祭合祭迄無定論集議曰周禮冬至圜丘禮天夏至方丘禮地時既不同禮樂亦異王莽之制何可法也今當循唐虞三代之典唯祀昊天上帝其方丘祭地之禮續議以聞案周禮壇三成近代增外四成以廣天文從祀之位集議曰依周禮三成之制然周禮疏云每成一尺不見縱廣之度恐壇上狹隘器物難容擬四成制內減去一成以合陽奇之數每成髙八尺一寸以合乾之九九上成縱廣五丈中成十丈下成十五丈四陛陛有十二級外設二壝內壝去壇二十五步外壝去內壝五十四步壝各四門壇設於丙巳之地以就陽位案古者親祀冕無旒服大裘而加衮臣下從祀冠服厯代所尚其制不同集議曰依宗廟見用冠服制度案周禮大司樂云凡孤竹之管雲和之琴瑟雲門之舞冬至日於地上之圜丘奏之若樂六變則天神皆降可得而禮矣集議曰樂者所以動天地感鬼神必訪求深知音律之人審五聲八音以司肄樂夏四月中書復集議博士言舊制神位版用木中書議改用蒼玉金字白玉為座博士曰郊祀尚質合依舊制遂用木主長二尺五寸闊一尺二寸上圓下方丹漆金字木用松柏貯以紅漆匝黃羅帕覆之造畢有司議所以藏議者復謂神主廟則有之今祀於壇對越在上非若他神無所見也所製神主遂不用七月九日博士又言古者祀天器用陶匏席用藁秸自漢甘泉雍畤之祀以迄後漢晉魏南北二朝隋唐其壇壝玉帛禮器儀仗日益繁縟浸失古者尚質之意宋金多循唐制其壇壝禮器考之於經固未能全合其儀法具在當時名儒輩出亦未嘗不援經而定也酌古今而行禮亦宜焉今檢討唐宋金親祀攝行儀注并雅樂節次合從集議太常議曰郊祀之事聖朝自定金宋以來未暇舉行今欲修嚴不能一舉而大備然始議之際亦須酌古今之儀垂則後來請從中書會翰林集賢禮官及明禮之士講明去取以聞中書集議曰合行禮儀非草創所能備唐宋皆有攝行之禮除從祀受胙外一切儀注悉依唐制修之八月太常寺言尊祖配天其禮儀樂章别有常典若俟至日議之恐匆遽有誤於是中書省臣奏曰自古漢人有天下其祖宗皆配天享祭臣等與平章何榮祖議宗廟已依時祭享今郊祀止祭天制曰可是嵗南郊配位遂省是年築郊壇於麗正文明門之南丙位設郊祀署令丞各一員太祝三員奉禮郎二員協律郎一員法物庫官二員時齊履謙攝司天臺舊制享祀司天雖掌時刻無鐘鼓更漏往往至旦始行事履謙白宰執請用鐘鼓更漏俾早宴有節從之武宗至大二年十一月尚書省及太常禮儀院言郊祀國之大禮今南郊之禮已行而未備北郊之禮尚未舉行今年冬至祀天南郊請以太祖配明年夏至祀地北郊請以世祖配制可三年十一月丙申有事於南郊尊太祖皇帝配享昊天上帝五方帝日月星辰從祀英宗至治二年九月有旨議南郊祀事中書平章邁拉御史中丞曹立禮部尚書張野學士蔡文淵袁桷鄧文原太常禮儀院使王緯田天澤博士劉致等會都堂議一曰年分按前代多三年一祀天子即位以及三年當有旨欽依二曰神位周禮大宗伯以禋祀祀昊天上帝注謂昊天上帝冬至圜丘所祀天皇大帝也又曰蒼璧禮天注云此禮天以冬至謂天皇大帝也在北極謂之北辰又曰北辰天皇耀魄寶也又名昊大上帝又名太乙帝君以其尊大故有數名今按晉書天文志中宫勾陳口中一星曰天皇大帝其神耀魄寶周禮所祀天神正言昊天上帝鄭氏以星經推之乃謂即天皇大帝然漢魏以來名號亦從不一漢初曰上帝曰太乙曰皇天上帝魏曰皇皇帝天梁曰天皇大帝唯西晉曰昊天上帝與周禮合唐宋以來壇上既設昊天上帝第一等復有天皇大帝其五天帝與太乙天乙等皆不經見本朝大德九年中書圓議止依周禮祀昊天上帝至大三年圓議五帝從享依前代通祭三曰配位孝經曰孝莫大於嚴父嚴父莫大於配天又曰郊祀后稷以配天此郊之所以有配也漢唐以來莫不皆然至大三年冬十月三日奉旨十一月冬至合祭南郊太祖皇帝配圓議取旨四曰告配禮器曰魯人有事於上帝必先有事於頖宫注告后稷也告之者將以配天也告用牛一宋會要於致齋二日宿廟告配凡遣官犧尊豆籩行一獻禮至大三年十一月二十一日質明行事初獻攝太尉同太常禮儀院官赴太廟奏告圓議取旨五曰大裘冕周禮司裘掌為大裘以共王祀天之服鄭司農云黑羊裘服以祀天示質也辨師掌王之五冕注冕服有六而言五者大裘之冕蓋無旒不聨數也禮記郊特牲曰郊之祭也迎長日之至也祭之日王被衮以象天戴冕璪十有二旒則天數也陸佃曰禮不盛服不充蓋服大裘以衮襲之也謂冬祀服大裘被之以衮開元及開寶通禮鑾駕出宫服衮冕至大次質明改服大裘冕而出次宋會要紹興十三年車駕自廟赴青城服通天冠絳紗袍祀日服大裘衮冕圓議用衮冕六曰匏爵郊特牲曰郊之祭也器用陶匏以象天地之性也注謂陶瓦器匏用酌獻酒開元禮開寶禮皆有匏爵大德九年正配位用匏爵有坫圓議正位用匏配位飲福用玉爵七曰戒誓唐通典引禮經祭前期十日親戒百官及族人太宰總戒羣官唐前祀七日宋會要十日纂要太尉南向司徒亞終獻一品二品從祀北向行事官以次北向禮直官以誓文授之太尉讀今天子親行大禮止令禮直局管勾讀誓文圓議令管勾代太尉讀誓刑部尚書蒞之八曰散齋致齋禮經前期十日唐宋金皆七日國朝親祀太廟七日散齋四日於别殿致齋三日於大明殿圓議依前七日九曰藉神席郊特牲曰莞簟之安而蒲越藁鞂之尚注蒲越藁鞂藉神席也漢舊儀髙帝配天紺席祭天用六綵綺席六重成帝即位丞相衡御史大夫談以為天地尚質宜皆勿修詔從焉唐麟德二年詔曰自處以厚奉天以薄改用裀褥上帝以蒼餘各視其方色宋以褥加席上禮官以為非禮元豐元年奉旨不設國朝大德九年正位藁鞂配位蒲越冒以青繒至大三年加青綾褥青錦方座圓議合依至大三年於席上設褥各依方位十曰犧牲郊特牲曰郊特牲而社稷太牢又曰天地之牛角繭栗秦用騮駒漢文帝五帝共一牲武帝三年一祀用太牢光武採元始故事天地共犢隋上帝配帝蒼犢二唐開元用牛宋正位用蒼犢一配位太牢一國朝大德九年蒼犢二羊豕各九至大三年馬純色肥腯一牲正副一鹿一十八野豬一十八羊一十八圓議依舊儀神位配位用犢外仍用馬其餘並依舊日已行典禮十一曰香鼎大祭有三始煙為歆神始宗廟則􅌊蕭祼鬯所謂臭陽達於牆屋者也後世焚香蓋本乎此而非禮經之正至大三年用陶瓦香鼎五十神座香鼎香合案各一圓議依舊儀十二曰割牲周禮司士凡祭祀率其屬而割牲禮運云腥其俎熟其殽體其犬豕牛羊注云腥其俎謂豚解而腥之為七體也熟其肴謂體解而爓之為二十一體也體其犬豕牛羊謂分别骨肉之貴賤以為衆俎也七體謂眷兩肩兩拍兩髀二十一體謂肩臂臑膊胳正脊脡脊橫眷正脅短脅代脅并腸三胃三拒肺一祭肺三也宋元豐三年詳定禮文所言古者祭祀用牲有豚解有體解豚解則為七以薦腥體解則為二十一以薦熟蓋犬豕牛羊分别骨肉貴賤其解之為體則均也皇朝為牛馬豕鹿並依至大三年割牲用國禮圓議依舊儀十三曰大次小次周禮掌次王旅上帝張氊案設皇邸唐通典前祀三日尚舍直長施大次於外壝東門之內道北南向宋會要前祀三日儀鑾司率其屬設大次於外壝東門之內道北南向小次於午階之東西向曲禮曰踐阼臨祭祀正義曰阼主階也天子祭祀履主階行事故云踐阼宋元豐詳定禮文所言周禮宗廟無設小次之文古者人君臨位於阼階蓋阼階者東階也唯人主得位主階行事今國朝太廟儀注大次小次皆在西蓋國家尚右以西為尊也圓議依祀廟儀注又續具末議一曰禮神玉周禮大宗伯以禋祀祀昊天上帝注禋之言煙也周人尚臭煙氣之臭聞者積柴實牲體焉或有玉帛正義曰或有玉帛或不用玉帛皆不定之詞也按正義本文云或有玉帛則有不用玉帛者因引肆師大祀用玉帛次祀用牲幣小祀用牲玉帛惟昊天上帝具之餘則或有或無是或之為言對中祀以下言之非不定之詞也禮官誤引而增不定之詞一語失其旨矣崔氏云天子自奉玉帛牲體於柴上引詩圭璧既卒是燔牲玉也蓋卒者終也謂禮神既終當藏之也正經即無燔玉明證漢武帝祠太一胙餘皆燔之無玉晉燔牲幣無玉唐宋乃有之顯慶中許敬宗等修舊禮乃云郊天之有四圭猶宗廟之有圭瓚也並事畢收藏不在燔列宋政和禮制局言古者祭祀無不用玉周官典瑞掌玉器之藏蓋事已則藏焉有事則出而復用未嘗有燔瘞之文今後大祀禮神之玉時出而用無得燔瘞從之蓋焚者取其煙氣之臭聞玉既無煙又且無氣祭之日但當奠於神座既卒事則收藏之二曰飲福特牲饋食禮曰尸九飯親嘏主人少牢饋食禮曰尸十一飯尸嘏主人嘏長也大也行禮至此神明已享盛禮俱成故膺受長大之福於祭之末也自漢以來人君一獻才畢而受嘏唐開元禮太尉未升堂而皇帝飲福宋元豐三年改從亞終獻既行禮皇帝飲福受胙國朝至治元年親祀廟儀注亦用一獻畢飲福三曰升禋禋之言煙也升煙所以報陽也祀天之有煙柴猶祭地之瘞血宗廟之祼鬯厯代以來或先燔而後祭或先祭而後燔皆為未允祭之日樂六變而燔牲首牲首亦陽也祭終以爵酒饌物及牲體燎於壇天子望燎柴用柏四曰儀注禮經出於秦火之後殘缺脫漏所存無幾至漢諸儒各執所見後人所宗唯鄭康成王子雍而二家自相矛盾唐開元禮杜佑通典五禮略完至宋開實禮并會要與郊廟奉祀禮文中間講明始備金國大率依唐宋制度聖朝四海一家禮樂之興正在今日況天子親行大禮所用儀注必合講求大德九年中書集議合行禮儀依唐制至治元年已有廟祀儀注宜取大德九年至大三年并今次新儀與唐制參酌增損修之侍儀司編排鹵簿太史院具報星位分獻官員數及行禮並諸執事官合依至大三年儀制亞終獻官取旨是歲太皇太后崩有旨南郊祀事可權止泰定帝泰定四年春正月御史臺臣言自世祖迄英宗咸未親郊唯武宗英宗親享太廟陛下宜躬禮郊廟制曰朕遵世祖舊典其命大臣攝行祀事文宗至順元年以將親郊敕有司繕治南郊齋宫太常博士言按前代典禮親郊前七日百官習儀於郊壇今既與受戒誓相妨合於致齋前一日告示典祭執事者各具公服赴南郊習儀凡與祭執事齋郎樂工舊不設盥洗之位殊非涓潔之道今合於饌殿齊班廳前及齋宿之所隨宜設置盥洗數處俱用鍋釡溫水置盆杓巾帨令人掌管省諭必盥洗然後行事違者治之祭日太常院分官提調神厨監視割烹上下燈燭籸燎已前雖有剪燭提調籸盆等官率皆虛應故事或減刻物料燭燎不明又常見奉禮贊賜胙之後獻官方退所司使服徹俎壇上燈燭不時俱滅因而雜人登壇攘奪不能禁止甚為褻慢今宜禁約省牲之前凡入壝門之人皆服窄紫有官者公服禁治四壝紅門宜令所司添造關木鎖鑰祭畢即令關閉毋使雜人得入其藁鞂匏爵事畢合依大德九年例焚之御史臺臣言祭日宜敕股肱近臣及諸執事人毋飲酒制可十月戊午致齋於大明殿己未遣亞獻官中書右丞相雅克特穆爾終獻官特穆爾布哈告廟請以太祖皇帝配享南郊庚申出次郊宫辛酉帝服大裘衮冕祀昊天上帝於南郊以太祖皇帝配元自世祖混一六合至文宗凡六世而南郊親祀之禮始克舉焉其壇壝在麗正門外丙位凡三百八畝有奇壇三成每成髙八尺一寸上成縱橫五丈中成一丈下成十五丈至大三年冬至以三成不足以容從祀版位以青繩代一成繩二百各長二十五尺以足四成之制四陛午