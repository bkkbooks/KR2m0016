body:
  text: 禮嘉冕宋遼金元明臣等謹案冕制詳於唐然唐人紀當代之事已聞見異辭如禮典所載天子大裘冕廣八寸長一尺六寸新唐書載廣八寸長一尺二寸又禮典載諸臣二品鷩冕七旒三品毳冕五旒四品絺冕四旒五品元冕三旒舊唐書載二品鷩冕七旒三品毳冕五旒四品繡冕四旒五品元冕同繡冕新唐書載二品鷩冕八旒三品毳冕七旒四品絺冕六旒五品元冕五旒記載互異今並誌之以資考核至宋以後則並無鷩冕毳冕絺冕繡冕元冕之制宋天子之服一曰大裘冕神宗元豐四年詳定郊廟定祀禮文所言周禮司表掌為大裘以供王祀天之服司服王祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕而禮記云郊祭之日王被衮以象天戴冕璪十有二旒則天數也王肅據家語以為臨燔柴脱衮冕著大裘則是禮記被衮與周禮大裘郊祀並用二服事不相戾但服之有先後耳是以開寳通禮皇帝服衮冕出赴行宫祀日服衮冕至大次質明改服大裘而冕出次盖衮冕盛服而文之備者故於郊之前期次以至大次既臨燔柴則脱衮冕服裘以明天道至質故被裘以體之今儀注車駕赴青城服通天冠絳紗袍祀之日乃服鞾袍至大次服衮冕臨祭非尚質之義乞並依開寳通禮詔詳定所叅議又言臣等詳大裘之制本以尚質而後世反以尚文故冕之飾大為不經而禮書所載上冇垂旒加飾又異大裘不裼之説今叅考諸説大裘冕無旒廣八寸長一尺六寸前圜後方前低寸二分元表朱裏以繒為之玉筓以朱組為紘玉瑱以元紞垂之為裘以黑羊皮領袖以黒繒纁裳朱紱而無章飾佩白玉元組綬革帶博二寸玉鈎䚢以佩紱屬之素帶朱裏綘純其外上朱下緑白紗中單皂領青縹襈裙朱􅀈赤舄黒納繶純乞下所屬製造其當著奉祠之服乞依梁陸瑋議以黒繒為裘及唐輿服志以黒羔皮為縁詔重詳定光禄寺丞集賢校理陸佃言臣詳冕服冇六周官弁師云掌王之五冕則大裘與衮同冕故禮記云郊之日王被衮以象天又曰服之襲也充美也禮不盛服不充故大裘不裼此明王服大裘以衮衣襲之也先儒或謂周禮祀天地皆服大裘而大裘之冕無旒非是葢古者裘不徒服其上必皆冇衣故曰緇衣羔裘素衣麑裘黄衣狐裘如郊祀徒服大裘則是表裘以祀天地表裘不入公門而乃欲以見天地可乎且先王之服冬裘夏葛以適寒暑未有能易之者也郊祀天地有裘無衮則夏祀赤帝與至日祭地祗亦將被裘乎然則王者冬祀昊天上帝中裘而表衮明矣至於夏祀天神地祗則去裘服衮以順時序周官曰凡四時之祭祀以宜服之明夏不必衣裘也或曰祭天尚質故徒服大裘被衮則非尚質臣以為尚質者明有所尚而已不皆用質也今欲冬至禋祀昊天上帝服裘被衮其餘祀天及配地祗並請服衮去裘各以其宜服之於是詳定所言裘不可徒服禮記云大裘不裼則襲可知所謂大裘之襲者衮也與衮及冕伏請冬祀昊天與黒帝皆服大裘被以衮其餘非冬祀天夏至祭地則皆服衮至六年始依所奏服大裘而加衮冕哲宗元祐元年禮部言元豐所造大裘雖用黒羊皮乃作短袍襲於衮衣之下仍與衮服同冕未合典禮下禮部太常寺共議上官均等請依元豐新禮丁隲請循祖宗故事王悆請倣唐制朱光庭周秩請以元衣襲裘獨何洵直在元豐中嘗預詳定以陸佃所議有可疑者按周禮節服氏掌祭祀朝覲衮冕六人惟王之太常郊祀衮冕二人既去衮冕又云裘冕是衮與裘各冇冕乃云裘與衮各有冕以衮襲之裘既無冕又襲於衮中裘而表衮何以示裘衮之别哉古人雖質不應以裘為夏服葢冬用大裘當暑則以同色繒為之記曰郊祭之日王被衮以象天若謂裘上被衮以被為襲則家語亦有被衮象天之文諸儒或言臨燔柴脱衮冕著大裘或云脱裘服衮盖裘衮無同冕兼服之理今乃以二服合為一可乎且大裘天子吉服之最上若大圭大路之比是裘之在表者記曰大裘不裼説者曰無别衣以裼之盖他服之裘䙝故表裘不入公門事天以報本反始故露質見素不為表暴而冕亦無旒何必假他衣以藻飾之乎凡裘上有衣謂之裼裼上有衣謂之襲襲者裘上重衮也大裘本不裼鄭志乃云裘上有元衣與裘同色盖趙商之徒附㑹為説不與經合襲之為義本出於重㳫非一衣也古者齋祭異冠齋服降祭服一等祀昊天上帝五帝以裘冕祭則衮冕齋故鄭氏云王齋服衮冕是衮冕者王之齋服也唐開元及開寳禮始以衮冕為齋服裘冕為祭服兼與張融臨燔柴脱衮服裘之義合請從唐制兼改製大裘以黒繒為之佃復破其説曰夫大裘而冕謂之裘冕非大裘而冕謂之衮冕則裘冕必服衮衮冕不必服裘今特言裘冕者主冬至言之周禮司裘掌為大裘以供王祀天之服則祀地不服大裘以夏至日不可服裘故也今謂大裘當暑以同色繒為之尤不經見裼襲一衣而已初無重㳫之義被而覆之則曰襲袒而露裘之美則曰裼所謂大裘不裼則非衮而何玉藻曰禮不盛服不充故大裘不裼則明不裼而襲也充美也鄭氏謂大裘之上有元衣雖不知覆裘以衮然尚知大裘不可徒服必有元衣以覆之玉藻有尸襲之義周禮裘冕注云裘冕者從尸服也夫尸服大裘而襲則王服大裘而襲可知且裘不可徒服故被以衮豈借衮以為飾哉今謂祭天用衮冕為齋服裘冕為祭服此乃襲先儒之謬誤後漢顯宗初服日月星辰十二章以祀天地自魏以來皆用衮服則漢魏祭天嘗用矣雖無大裘未能盡合乎禮固未嘗有表裘而祭者也且裘内服也與袍同袍襲矣而欲禪以祭天以明示質是欲衩衣以見上帝也洵直復欲為大裘之裳纁色而無章飾夫裘安得有裳哉請從先帝所志其後詔如洵直議去黒羔皮而以黒繒製焉至紹興以後遂以衮襲裘冕亦十二旒焉二曰衮冕廣一尺二寸長二尺四寸前後十二旒二纊並貫真珠又有翠旒十二碧鳳銜之在珠旒外冕版以龍鱗錦表上綴玉為七星旁施琥珀瓶犀瓶各二十四周綴金絲網鈿以真珠雜寶玉加紫雲白鶴錦裏四柱飾以七寶紅綾裏金飾玉簮導紅絲絛組帶亦謂之平天冠太祖建隆元年太常禮院言具衮冕令式垂白珠十有二旒以組為纓色如其綬黈纊充耳玉簮導二年太子詹事尹拙工部尚書竇儀議謹按周禮弁師掌王之五冕朱裏綖紐五采繅十有二就皆五采玉十有二玉笄朱紘諸侯之繅旒九就珉玉三采其餘如王之事繅旒皆就玉瑱玉笄疏云王不言玉瑱於此言之者王與諸侯互相見為義是以王言元冕朱裏延紐及朱紘明諸侯亦有之諸公言玉瑱明王亦有之詳此經疏之文則是本有充耳今請令君臣衮冕以下並畫充耳以合正文從之乾德元年少府監楊格等上新造皇帝冠冕先是郊祀冠冕多飾以珠玉帝以華而且重故命改製之仁宗景祐二年又以帝后及羣臣冠服多沿唐舊而循用之久則有司寖為繁文以失法度詔入内内侍省御藥院與太常禮儀院詳典故造冠冕蠲減珍華務從簡約俾圖以進由是改製衮冕天版元濶一尺二寸長二尺四寸今製廣八寸長一尺六寸減翠旒并鳳子前後二十四珠旒並合典制天版頂上元織成龍鱗錦為表紫雲白鶴錦為裏今製青羅為表采畫出龍鱗紅羅為裏采畫出紫雲白鶴所冇犀瓶琥珀瓶各二十四今減不用金絲結網之上舊有金絲結龍八今減四亦減絲令細天版四向花墜子素墜子依舊減輕造冠身并天柱元織成龍鱗錦今用青羅綵畫出龍鱗金輪等七寳元真玉碾成今更不用如補空却以雲龍鈿窠分旒玉鈎二今減去之天河帶組帶欵幔帶依舊減輕造納言元用玉製今用青羅采畫出龍鱗錦金棱上棱道依舊用金即減輕製黈纊玉簮至和三年王洙奏天子法服冕旒形度重大華飾稍繁願集禮官參定詔禮院詳典禮上聞而禮院繪圖以進因勅御藥院更造其後冕服稍侈如故英宗治平二年知太常禮院李育奏曰郊廟之祭本尚純質衮冕之飾皆存法象非事繁侈重其玩也冕則以周官為本凡十二旒間以采玉加以紘綖笄瑱之飾東漢至唐史官名儒記前制皆無珠翠犀寶之飾何則鷮羽蚌胎非法服所用琥珀犀缾非至尊所冠龍錦七星已列采章之内紫雲白鶴近出道家之語豈被衮戴璪象天則數之義哉自大裘之廢専用衮冕古朴稍去而法度尚存夫明水太羮不可以衆味和雲門咸池不可以新聲間衮冕之服不可以珍怪累也若魏明之用珊瑚江右之用翡翠侈靡衰播之餘豈足為聖朝道哉且太祖建隆元年少府監所造冕服及二年博士聶崇義所進三禮圖嘗詔尹拙竇儀參校之皆倣虞周漢唐之舊至四年冬服之合祭天地於圜丘用此制也太宗亦嘗用命製於禁中不聞改作及真宗封㤗山禮官請服衮冕帝曰前王服羔裘尚質也今則無羔裘而有衮冕可從近制是豈有意於繁飾哉盖後之有司率意妄増未嘗確議遂相循而用故仁宗嘗詔禮官章得象等詳議之其所減過半然不經之飾重者多去輕者尚存不能盡如詔書之意故至和三年王洙復議去繁飾禮官畫圖以進漸還古禮而有司所造復如景祐之前又按開寶通禮及衣服今冕服皆有定法悉無寶錦之飾臣請復先王之制其與通禮衣服令三禮圖制度不同者宜悉改正詔太常禮院少府參定遂合奏曰古者冕服之用郊廟殊制自唐廢大裘而郊廟之祭一用衮冕然旒章之數止以十二為節亦未聞有餘飾也國朝増以珍異巧縟前所未有臣等以為宜如育言叅酌通禮衣服令三禮圖及景祐三年減定之制一切改造之孔子曰麻冕禮也今也純儉吾従衆純者絲也變麻為絲盖已久矣則冕服之制宜依舊以羅為之冕廣一尺二寸長二尺二寸約以景表尺前圓後方黝上朱下以金飾版側以白玉珠為旒貫之以五綵絲繩前後各有十二旒旒各十二珠相去一寸長二尺朱絲組為纓黈纊充耳金飾玉簮導詔禮儀院再詳以聞而内侍省奏謂景祐中已裁定可因而用也從之元豐六年詳定郊廟禮文所言凡冕版廣八寸長一尺六寸與古制相合更不復議今取少府監造様如以青羅為表紅羅為裏則非弁師所謂元冕朱裏者也上用金稜天版四周金絲結網兩旁用真珠花素墜之類皆不應禮伏請改用朱組為紞玉笄玉填以元綻垂瑱以五采玉貫於五色藻為旒以青赤黄白黒五色備為一玉每一玉長一寸前後二十四旒垂而齊肩以合孔子所謂純儉之義從之政和議禮局更上皇帝冕服之制冕版廣八寸長一尺六寸前髙八寸五分後髙九寸五分青表朱裏前後各有十二旒五采藻十有二就就間相去一寸青碧錦織成天河帶長一丈二尺廣二寸朱絲組帶為纓黈纊充耳金飾玉簮導長一尺二寸中興仍舊制延以羅衣本元表朱裏長尺有六寸前低一寸一分四旁縁以金覆於卷武之上繅以五色絲貫五色玉前後各十二凡用二百八十有八玉笄充耳用黄綿紘以朱組以其一屬於左笄上垂下又屈而屬於右笄繫之而垂其餘皇太子亦有衮冕青羅表緋羅紅綾裏塗金銀鈒花飾犀簮導紅絲組前後白珠九旒二纊貫水精珠太宗至道元年太常禮院言南郊皇太子充亞獻各著祭祀服凖制度衮冕以組為纓色如其綬青纊充耳詔依上制造其諸臣則九旒冕塗金銀花額犀玳瑁簮導親王中書門下祭祀服之無額花者三公奉祀服之七旒冕犀角簮導九卿奉祀服之五旒冕四品五品為獻官服之平冕無旒太祝奉禮服之遼制衮冕金飾垂白珠十二旒以組為纓色如其綬黈纊充耳玉簮導金冕制天版長一尺六寸廣八寸前髙八寸五分後髙九寸五分身圍一尺八寸三分并納言并用青羅為表紅羅為裏周回用金稜天版下有四柱四面珍珠網結子花素墜子前後珠旒共二十四旒各長一尺二寸青碧線織造天河帶