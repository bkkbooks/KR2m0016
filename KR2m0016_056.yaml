豸冠亦為監察御史之服元獬豸冠惟祭社稷服之氈冠遼制臣僚之國服金花為飾或加珠玉翠毛額後垂金花織成夾帶中貯髪一總或紗帽制如烏紗帽無簷不擫雙耳額前綴金花上結紫帶末綴珠翼善冠紗冠元金梁冠明甲騎冠刻期冠遼遼制皇帝翼善冠朔視朝用之紗冠元制祭社稷之服金梁冠元制祭社稷之服甲騎冠元制以皮加黒漆雌黄為縁儀衛之服刻期冠明從宋制為快行親從官之服武弁皮弁元明元制武弁以皮加漆儀衛之服明制皇帝武弁服親征遣將則服之其弁制上鋭色用赤上十二縫中綴五采玉落落如星狀世宗嘉靖八年諭閣臣張璁㑹典記親征類禡之祭皆具武弁服不可不備璁對周禮有韋弁謂以韎韋為弁又以為衣裳國朝視古損益有武皮弁之制今武弁當如皮弁但皮弁以黒紗冒之武弁當以綘紗冒之隨具圖以進帝報曰覽圖有􅔖形但無繫處冠制古象尚尖今皮弁則圓朕惟上鋭取其輕利當如古制又衣裳韠舄皆赤色何謂且佩綬俱無於祭用之可乎璁對自古服冕弁俱用革帶以前繋韍後繋綬韋弁之韠正繋於革帶耳武事尚威烈故色純用赤帝復報璁冠服衣裳韠舄俱加如古増革帶佩綬及圭乃定制弁式如左皮弁明太祖洪武二十六年定皮弁用烏紗冒之前後各十二縫每縫綴五采玉十二以為飾玉簮導紅組纓皇帝朔望視朝降詔降香進表四夷朝貢外官朝覲䇿士𫝊臚皆服之成祖永樂三年定皮弁如舊制惟縫及冠武并貫簮繋纓處皆飾以金玉其皇太子皮弁冒以烏紗前後各九縫每縫綴五采玉九縫及冠武并貫簮繋纓處皆飾以金玉簮朱纓親王世子皮弁用烏紗冒之前後各八縫每縫三采玉八餘制如東宫幘平巾幘空頂幘遼元明遼制一品以下至六品皆冠幘纓簮導凡謁見東宫及餘公事服之平巾幘元制黒漆革為之形如進賢冠之籠巾或以青或以白皆儀衛之服空頂幘明未冠者之服帽烏紗帽子煖帽硬㡌答小帽帽金錦暖帽帽紅金答白金子煖銀鼠煖白藤寳貝㡌帽七寶漆紗帶後簷帽金學士帽帽雨遮陽帽烏紗描曲脚帽錦烏紗小頂帽金鵞帽宋遼金元明宋制烏紗帽天子閒居之服明烏紗帽為文武官常服凡一品二品帽頂帽珠用玉三品至五品帽頂用金帽珠除玉外隨所用六品至九品帽頂用銀帽珠瑪瑙水晶香木硬帽遼制天子小祀之服小帽金制天子常朝之服金錦煖帽元制天子冬則冠之紅錦答子煖帽元制天子冬則冠之白錦答子煖帽元制天子冬則冠之銀䑕煖帽元制天子冬則冠之白藤寶貝帽元制天子夏則冠之七寶漆紗帶後簷帽元制天子夏則冠之學士帽元制如唐巾兩角如匙頭下垂儀衛之服錦帽元制以漆紗後幅兩旁前拱而髙中下後畫連錢錦前額作聚文雨帽明制文官官遇雨戴雨帽公差出外戴帽子入城不許遮陽帽明初士人貢舉入監者許戴之烏紗描金曲脚帽明制内使之官烏紗小頂帽明制内使年十五以下者戴之金鵞冠明制校尉之冠巾皂紗折上巾唐紫皂幅巾巾幅巾方吐鶻巾軟角唐巾巾進士四平定巾軟巾四帶巾宋遼金元明宋制皂紗折上巾天子便坐視事則服之遼制折上頭巾為皇帝常服明烏紗折角向上巾為皇太子服亦名翼善冠親王郡王及世子皆同紫皂幅巾遼制皇帝之公服道宗清寧元年詔非勲戚之後及承應有職事人不帶巾幅巾遼制皇帝田獵服之吐鶻巾金制以皂羅若紗為之上結方頂折垂於後頂之下際兩角各綴方羅徑二尺許方羅之下各附帶長六七寸當横額之下或為一縮襞積貴顯者於方頂上循十字縫飾以珠其中必貫以大者謂之頂珠帶旁各絡珠結綬長半帶垂之軟角唐巾元制宣聖廟祭服唐巾元制如幞頭而㰐其角兩角上曲作雲頭為儀衛之服進士巾明制如烏紗帽頂㣲平展角闊寸餘長五寸許系以垂帶皂紗為之四方平定巾明太祖洪武三年令士人戴四方平定巾二十四年以士子巾服無異吏胥命工部製式以進太祖親視凡三異乃定易以軟巾貢舉入監者不變所服四帶巾明初為庶人之服幞頭交角幞頭縐鳳翅幞頭練控鶴幞頭漆花角幞頭皂紗幞頭省幞頭紗幞頭交脚幞頭宋遼元明宋制幞頭君臣之通服初以藤織草巾子為裏紗為表而塗以漆後惟以漆為堅去其藤裏前為一折平施兩脚以鐡為之遼制五品以上幞頭曰折上巾自五品以下皆曰幞頭交角幞頭元制巾後交折其角儀衛之服鳳翅幞頭元制如唐巾兩角上曲而作雲頭兩旁覆以兩金鳳翅亦儀衛之服控鶴撲頭元制如交角金鏤其額亦儀衛之服花角撲頭元制如控鶴撲頭兩角及額上簇象生雜花亦儀衛之服皂縐紗撲頭長制郡王長子常服練省撲頭明制輔國中尉之常服漆紗幞頭明制文武官公服有二等展角長一尺二寸雜職官幞頭垂帶後復令展角不用垂帶與入流官同交角幞頭明初定執仗之士首服皆鏤金額交角幞頭簮戴宋宋制幞頭簮花謂之簮戴中興郊祀明堂禮畢囘鑾臣僚及扈從並簮花恭謝日亦如之大羅花以紅黄銀紅三色欒枝以雜色羅大絹花以紅銀紅二色羅花以賜百官欒枝卿監以上有之絹花以賜將校以下太上兩宫上夀畢及聖節錫宴進士聞喜宴並如之重戴宋重戴以皂紗為之方而垂簷紫裏兩紫纓組為纓垂而結之頷下葢折上巾又加以帽焉宋初御史臺皆重戴餘官或戴或否後新進士亦帶至釋褐則止太宗淳化二年御史臺言舊儀三院御史臺及出使並重戴事已久廢其御史出臺為省職及在京釐務者請依舊儀從之又詔兩省及尚書省五品以上皆重戴樞密三司使副則否中興後御史兩制知貢舉官新進士上三人許服之鈸笠元元制寶頂金鳳鈸笠珠縁邊鈸笠並為皇帝之服金鳳頂笠亦元制皇帝之服夏服大紅緑藍銀褐棗褐金繡龍五色羅則冠之各隨其服之色欽定續通典卷五十六
