body:
  text: 禮賔臣等謹案杜典述賔禮七篇一曰諸侯朝覲二曰諸侯遣使來聘三曰天子遣使迎勞四曰三恪二王後五曰天子朝位六曰公卿執贄七曰信節皆据經傳舊聞而於史事則畧今續纂其書則其體例有宜於通變者夫三代以前分姓受氏各以君國子民星羅碁布雖凛共主之義而疆界既分風教各别其所以守王章而陳時夏者必頼乎朝覲有時廵行有度誕敷政教兼以通上下之情要以因時勢以制為典禮也自封建罷為郡縣天子統莅四海之内雖在荒陬遐土一如畿甸之間其封疆擁節星軺出使縱有方伯連帥之任實封建時守土食采之臣既已天下一家中國一人自節鉞使相以至州縣令長爵秩攸殊不過比肩以事共主則無所謂諸侯朝覲與夫遣使來聘者矣惟是參其義例有可以類相從如藩國朝聘本兼中外而言唐五季以後每朝外蕃之朝㑹與夫宋遼金元之交際儀文品節可据史書以覈其實定朝宁之位簡縟異文存先代之後豐殺異制以及國信勘契之通逹金符使節之往來義實本於古之信節可据以推廣杜典之義也至於遣使迎勞公卿執贄則後世不復舉其文在杜典已祗能敷叙經言而不能詳述其史事古今異宜所謂禮不相沿也今存其篇目而仍附著其說於後焉天子受諸侯藩國朝宗覲遇宋遼元明臣等謹按杜典諸侯藩國統指中外君長而言邦畿千里所謂中也九州之外所謂外也其自周而後所述乃止中國諸侯其外蕃之禮缺然蓋未嘗有常典也今就累朝交際之儀雖不盡合於古各取其近似者以類相附云宋太祖乾徳三年五月宴近臣及孟昶於大明殿按宋史禮志凡外國君長來朝皆宴於内殿近臣及刺史都虞候以下皆預太宗太平興國二年三月吳越錢俶來朝宴於長春殿親王宰相節度使劉鋹李煜皆預其君長來朝先遣使迎勞於候館使者朝服稱制曰奉制勞某主國主迎於門外與使者俱入升階使者執束帛稱有制國主北面再拜稽首受幣又再拜稽首以土物儐使者再拜受國主送使者出鴻臚引詣朝堂所司奏聞通事舎人承勅宣勞再拜就館翌日遣使戒見日如儀又次日奉見於乾元殿設黄麾仗及宫縣大樂典儀設國主位於縣南道西北向又設其國諸官之位於其後所司迎引國主服其國服至明德門外通事舎人引就位侍中奏中嚴皇帝服通天冠綘紗袍出自西房即御位典儀贊拜國主再拜稽首侍中承制降勞皆再拜稽首勅升坐又再拜稽首至坐俯伏避席侍中承制曰無下拜國主復位次引其國諸官以次入就位再拜並如上儀侍中又承制勞還館通事舎人引國主降復位再拜稽首出其國諸官皆再拜以次出侍中奏禮畢皇帝降坐按宋史禮志太祖太宗朝藩鎮沿五代舊制時或來朝自後非詔命不得擅離治所其入覲及被召使廻客省齋籖賜酒食節度使十日留後七日觀察使五日代還節度使五日留後三日觀察使一日防禦團練刺史並賜生料節度使以私故到闕下及歩軍都虞候以上出使廻者亦賜酒食熟羊徽宗政和中定五禮新儀凡蕃國主來朝其遣使迎勞前一日有司設次於館門之外道西南向其日使者至掌次者引就次蕃主服其國服所司引立於東階下西面凡蕃主行止皆所司先引制使皆謁者前導使者朝服出次立於門西東面從者執束帛立於使者之南蕃主有司出門東西面曰敢請事使者曰奉制勞某主稱其國名有司入告蕃主迎於館門之外東西面再拜使者與蕃主俱入使者升自西階執束帛者從升立於使者之南俱東面蕃主升立東階上西面執束帛者以帛授使者稱有制蕃主將下拜使者曰有後勅蕃主再拜宣勞訖又再拜使者降出蕃主送於館門之外西向再拜使者還蕃國主入其遣使戒見日前一日有司設次於候館門之外道西南向其日使者至掌次者引就次蕃主服其國服降立於東階下西面蕃國諸官立於蕃主之後西面北上使者朝服出次立於門西東面蕃主有司出門東西面曰敢請事使者曰奉制戒某主見日有司入告蕃主迎於館門外之東西面再拜使者與蕃主俱入使者升自西階東面蕃主升自東階西面使者稱有制蕃主再拜宣制曰某日見蕃主又再拜使者降出蕃主送於館門之外西面再拜使者還蕃國主入其陳設殿中監前期帥其屬尚舎張設垂拱大慶殿門之内設御榻於大慶殿當中南向設東西房於御榻之左右稍北設東西閤於殿後之左右殿上前楹施簾設香案於丹墀螭堦間大晟府展宫架之樂於殿庭横街之南設協律郎位於宫架西北俱東向設大司樂押樂位於宫架之前北向儀鸞司設文武百官等次於殿門之外又設蕃國主次於宣徳門外之西蕃國諸官次於其後尚輦陳輿輦於龍墀繖扇於沙墀陳五輅於宫架之南列御馬於龍墀在輿輦之後尚書兵部帥其屬設黄麾仗於殿門之内外張旗幟典儀設文武百官位於殿庭又設蕃主朝見位於宫架之北稍西北向蕃國諸官在其後又設蕃主賜座位於御榻之東稍南設典儀位於丹墀南稍東西向贊者三人在其後餘並如大慶殿元正冬至大朝㑹儀其朝見是日所司引蕃國主及蕃國諸官至宣德門外次各服其國服闢大慶門文武百官等集於次服朝服大樂正帥樂工先入就位協律郎入就舉麾位大司樂入就押樂位典儀帥贊者先入就位並如大慶殿元正冬至大朝㑹之儀凡執事者以次入垂拱殿簾降東上閤門官先引武功大夫以下至保義郎并副承㫖次通事舎人以下六尚局典御内符寳郎次知内侍省以下次管勾六尚局次通侍大夫以下次知客省事以下次樞宻都承㫖以下次之入内内侍省事以下立定皇帝將出宫引知樞宻院事以下入就位如儀東上閤門附内侍進班齊牌皇帝乗輦出殿上少駐簾卷殿上鳴鞭先輦下應奉人行門指揮使禁衛諸班親從並自輦常起居宣輦舎人揖樞宻以下躬赴當殿北向躬通樞宻某官姓名以下大起居訖樞宻知客省事以下至僉書東上閤門官樞宻都承㫖至諸房副承㫖分左右立以俟前導六尚應奉官侍立武功大夫以下易朝服歸侍立餘位並先退管軍目僚窄衣舎人贊四拜起居贊祗候分左右引駕俟輦降東階垂拱殿門外禁衛親班親從自贊四拜起居至大慶殿後管軍目僚易公服執仗於殿階下分東西侍立皇帝降輦入西閤前導官易朝服詣御榻前分左右侍立知樞宻院知客省事以下在東同知簽書樞宻院事樞宻都承㫖至諸房副承㫖在西帶御器械官及侍三閤門舎人以下兩朶殿立不祗應舎人並丹墀東階外立諸軍將校先入内外符寶郎奉寳俱詣閤奉迎次閤門御史臺太常寺四方館分引文武百官殿門外序立並如大慶殿元正冬至大朝㑹之儀内外符寶郎奉寳先出陳於御榻之左右禮直官舎人引左輔版奏中嚴少頃又奏外辦皇帝服通天冠絳紗袍簾卷大樂正令撞黄鐘之鐘右五鐘皆應殿上鳴鞭禁衛諸班親從與輦下應奉人自贊四拜起居皇帝輿御出西閤協律郎跪俯伏舉麾興工鼔柷作乾安之樂樂章俟國王朝日臨時命詞臣撰後准此皇帝出自西方内侍承㫖率協舎各人北向贊起儀將士就位四拜起居皇帝降輿升御榻東上閤門官於榻前班北稍東西向贊殿上侍臣樞宻以下再拜贊拜閤門官贊拜訖北向隨班再拜畢西向贊各祗候皇帝南向坐簾卷内侍又贊扇扇開殿下鳴鞭偃麾戞敔樂止爐煙升禮直官舎人引殿門外班官分東西入宫架作正安之樂俱就位分東西相向序立樂止並如大慶殿元正冬至大朝㑹之儀通事舎人引蕃國主立於大殿殿門南階下稍西蕃國諸官在其後並北向東上若諸蕃俱來朝以國之大小為序次禮直官通事舎人引班者以下横行北向立兩省官學士侍制上將軍以下依舊東西相向立典儀曰再拜贊者承傳在位官皆再拜搢笏舞蹈又再拜班首不離位奏聖躬萬福典儀曰拜贊者承傳在位官皆再拜三公以下分東西相向立通事舎人引蕃國主入就位蕃國諸官末入蕃國主入門正安之樂作蕃國主至位樂止通事舎人通某國蕃臣姓名見典儀曰拜贊者承傳蕃國主再拜舞蹈又再拜蕃國主不離位奏聖躬萬福又再拜左輔承㫖揮諸蕃國主東北稱有制蕃國主再拜宣制訖又再拜左輔廻奏又承㫖降勞令升殿就座蕃國主再拜通事舎人引蕃國主樂作至階樂止東上閤門官接引升至座後贊就坐蕃主俯伏避席將下拜左輔承㫖曰無下拜蕃國主復位再拜訖左輔廻奏又承㫖勞還館通事舎人引蕃國主降自西階樂作出門復位樂止蕃主再拜訖通事舎人引蕃國主出樂作出門樂止初蕃主就位通事舎人引蕃國諸官以次入就位立定典儀曰拜贊者承傳蕃國諸官俱再拜舞蹈又再拜班首不離位奏聖躬萬福又再拜通事舎人承㫖揮降自西階詣蕃國諸官東北稱勅㫖蕃國諸官俱再拜宣㫖訖又再拜通事舎人囘奏又承㫖勞還館蕃國諸官俱再拜至蕃主出通事舎人引蕃國諸官以次出訖左輔進當御座前俯伏跪奏稱左輔具官臣某言禮畢俯伏興羣臣俱降復北向立典儀曰拜贊者承傳在位官皆再拜搢笏舞跪又再拜訖分東西序立内侍承㫖贊扇合簾降鳴鞭大樂正令撞㽔賓之鐘左五鐘皆應協律郎跪俯伏舉麾興工鼔柷作乾安之樂皇帝降座閤門官贊殿上侍臣樞宻以下再拜御輿入自東房還東閣侍衛如來儀内侍又贊扇扇開偃麾戛敔樂止禮直官通事舎人引左輔版奏解嚴文武百官退伏設如舊就位小休樞宻都承㫖以下退如别儀其㑹蕃國主有司排設備大樂令設登歌於殿上二舞入立於酇綴之間並如大慶殿元正冬至朝㑹之儀尚醖設御酒尊酒器於御座之東尚食設御茶牀於御座之西俱稍北有司設羣官酒尊酒器於殿下又設蕃國主座於御榻之東稍南蕃國諸官之位於東西朶殿餘並如大慶殿元正冬至大朝㑹之儀閤門御史臺太常寺引班首以下及蕃國主蕃國諸官各就位分東西相向序立禮直官通事舎人先引左輔版奏中嚴少頃又奏外辦皇帝服通天冠絳紗袍簾卷大樂正令撞黄鍾之鐘右五鐘皆應殿上鳴鞭皇帝御輿出東閤協律郎跪俯伏舉麾興工鼓柷奏乾安之樂皇帝出自東房降輿即御座向南簾卷内侍又贊扇扇開殿下偃麾戞敔樂止爐煙升禮直官通事舎人引班首以下及蕃國主蕃國諸官横行北向兩省學士侍制上將軍以下依舊典儀曰拜贊者承傳在位官皆再拜隨拜三稱萬歲引班首以下及蕃國主蕃國諸官分班東西序立禮直官引殿中監少監升殿詣酒尊所侍進御茶牀次殿侍於横街南酹酒訖引班首以下及蕃國主蕃國諸官横行北向立典儀曰拜贊者承傳在位官皆再拜三稱萬歲禮直官通事舎人太常博士引班首自東階升詣酒尊所北向立殿中監以爵授班首官班首搢笏受爵詣御榻前少東西向立尚醖典御奉御開爵殿中少監酌酒凡進酒皆典御奉御開爵殿中少監酌酒禮直官太常博士東上閤門官引班首升榻詣御座前躬進皇帝執爵班首執盤虚跪興降榻以盤授殿中監班首執笏詣御榻前俯伏跪百僚皆躬奏稱文武百僚具官臣某等詞俟蕃國主朝日特命詞臣撰臣等不勝大慶謹上千萬歲壽俯伏興百僚直身立引退降階復位典儀曰拜贊者承傳在位官皆再拜隨拜三稱萬歲躬身左輔詣御榻前承㫖退西向宣曰舉公等觴典儀曰拜贊者承傳在位官皆再拜隨三稱萬歲引班首以下及蕃國主蕃國諸官分班東西序立禮直官通事舎人太常博士引班首自東階升至殿中監前北向立搢笏接監升榻西向立皇帝舉第一爵宫架作和安之樂止班首受虛爵訖虚跪興降榻以爵授殿中監訖執笏引降階班首以下及蕃國主蕃國諸官復北向立典儀曰再拜贊者承傳在位官皆再拜搢笏