body:
  text: 刑刑制下元明元太祖頒條畫刑獄惟重罪處死其餘雜犯量情笞决太宗六年五月大㑹諸王百僚諭以條令凡當㑹不赴而私宴者斬軍中凡十人置甲長聽其指揮專擅者論罪其甲長以事來宫中即置權攝一人甲外一人二人不得擅自往來違者罪之諸公事非當言而言者拳其耳再犯笞三犯杖四犯論死諸千户越萬户前行者隨以木鏃射之百户甲長諸軍有犯其罪同不遵此法者斥罷凡來㑹用善馬五十匹為一羈守者五人飼羸馬三人守乞烈思三人盜馬一二者即論死諸婦女製質孫燕服不如法及妬者乘以驏牛狥部中論罪即聚財為更娶世祖中統元年禁私商不得越境犯者死二年諭諸王駙馬凡民間詞訟毋得私自决斷皆聽朝廷處置四年詔諸路私造軍器者處死凡民間所有不輸官者與私造同至元二年正月申嚴越界販馬之禁違者處死五月令軍申犯法不得擅自誅戮罪輕斷遣重者聞奏六月敕行院及諸軍將校卒伍須正身應役違者罪之十月詔隨路私商曾入南界者首實免罪充軍五年三月申禁民間兵器犯者驗多寡定罪十二月詔諭四川行省沿邊屯戍軍士逃役者處死禁市烏頭砒霜諸毒藥及不通醫理妄行針炙或為婦人墮胎戕害人命者加等治罪八年敕凡訟而自匿及誣告人罪者以其罪罪之禁用金泰和律元初新格未行猶用金律至是禁之十年五月詔主守失陷官錢者杖而釋之十月敕巴延和爾果斯以史天澤姚樞所定新格參考行之十二年二月禁民間賭博犯者流之北地十月中書省臣議斷死罪詔自後殺人者死罪狀已白不待時行刑奴婢殺主者具五刑論十四年五月申嚴大都酒禁犯者籍其家資散之貧民七月敕犯盜者皆棄市符寶郎董文忠言盜有強竊贓有多寡難以悉置於法帝遽命革之十一月詔僞造寶鈔同情者並處死分用者杖之十五年正月禁官吏軍民賣所娶良家子女及為娼者賣買者兩罪之官沒其直人復為良復敕官吏擅易馬匹私配婦人者沒其家軍官不能撫治軍士及役擾致逃亡者沒其家資之半五月定諸職官犯罪受宣者聞奏受敕者從行臺處之受省札者按察司治之其宣慰司官吏姦邪非法及文移案牘從本道提刑按察司磨刷應有死罪有司勘問明白提刑按察司覆審無寃依例結案類奏待命十六年三月敕中書省凡掾吏文移稽緩一日二日者杖三日者處死八月詔漢軍出征逃者罪死籍其家十一月敕諸路所捕盜初犯贓多者死再犯贓少者從輕治罪十七年十一月詔有罪配役者量其程逺近十八年立登聞鼓院許有寃者撾鼓以聞先是十二年四月諭中書省議立登聞鼓如為人殺其父母兄弟夫婦寃無所訴聽其來擊其或以細事妄擊者論如法至是始立焉十九年九月敕官吏受賄及倉庫官侵盜臺察官知而不糾者驗其輕重罪之中外官吏贓罪輕者杖决重者處死言官緘默與受贓者一體論罪十月耶律鑄言前奉詔殺人者死仍徴燒埋銀五十兩復止徴鈔二錠其事太輕請依䝉古人例犯者沒一女入仇家無女者徴鈔四錠從之又令天下重囚除謀反大逆殺祖父母父母妻殺夫奴殺主並正典刑外餘犯死罪者充日本占城緬國軍二十年正月令自今以匿名書告事重者處死輕者流逺方能發其事者給犯人妻子仍以鈔賞四月申嚴酒禁有私造者財産女子沒官犯人配役尋以歲登開其禁十二月令凡盜為首及同謀者死餘屯田淮上二十一年四月括天下私藏天文圖䜟太乙雷公式七曜厯推背圖苗太監厯有私習及收匿者罪之二十三年四月中書省臣言比奉㫖凡為盜者毋釋竊鈔數貫及佩刀微物與童幼竊物者悉令配役今議一犯者杖釋再犯者依法配役為宜帝曰朕以漢人徇私用金泰和律處事致盜賊滋衆故有是言今後非詳讞者勿輒殺人二十四年詔憲臣有貪婪敗度者付法司增條科罪以懲敗罔二十八年頒行至元新格元刑制名例四條衛禁八條職制三百七條祭令五條學規十三條軍律十二條户婚六十九條食貨三十六條大惡五十一條奸匪五十九條盜賊一百十四條詐僞五十條訴訟二十二條鬭毆四十二條殺傷一百六條禁令一百十一條雜犯十四條捕犯九條恤刑十五條平反四條五刑之制笞刑六自七下遞加十至五十七杖行五自六十七遞加十至一百七徒刑五自一年遞加半年至三年凡徒一年者杖六十七遞加十至一百七流刑三曰遼陽曰湖廣曰迤北死刑二曰斬曰凌遲處死獄具制枷長五尺以上六尺以下濶一尺四寸以上一尺六寸以下死罪重二十五斤徒流二十斤杖罪十五斤皆以乾木為之長濶輕重各刻志其上手杻長一尺六寸以上二尺以下橫三寸厚一寸鎖長八尺以上一丈二尺以下鐐連環重三斤笞大頭徑二分七釐小頭徑一分七釐罪五十七以下用之杖大頭徑三分二釐小頭徑二分二釐罪六十七以下用之訊杖大頭徑四分五釐小頭徑三分五釐長三尺五寸並刋削節目無令筋膠諸物裝釘應决者並决小頭其决笞及杖者臀受考訊者臀若股分受務令均停二十九年二月申禁鞭背法三月中書省御史臺奏定贓罪十三等枉法者五不枉法者八罪入死者以聞制可三十年二月以江南豪右多庇匿盜賊令為首者誅餘徙內縣成宗即位御史臺言先朝决獄隨罪輕重笞杖異施今止用杖乞如舊制不允元貞元年定職官坐贓論斷再犯者加二等倉庫官吏盜所守錢糧一貫以下笞之至十貫杖之二十貫加一等一百二十貫徒一年每三十貫加半年二百四十貫徒三年滿三百貫者死計贓以至元鈔為則二年正月諭諸王公主駙馬非奉㫖毋罪官吏先是中統二年及成宗時屢詔諸王以下毋私决有罪而風猶未格至是復申前禁二月禁軍將擅易侍衛軍䝉古軍以家奴代役者罪之又詔軍卒擅更代及逃歸者死六月御史臺臣言官吏受賂初既辭伏繼以審核而有司徇情致有異辭者乞加等論罪從之十月詔職官坐贓經斷再犯加本罪三等大德元年五月詔強盜姦傷事主者首從悉誅不傷事主止誅為首者從者刺配再犯亦誅六月詔僧道犯姦盜重罪聽有司鞫問二年二月詔僧人犯姦盜詐僞聽有司專决輕者與僧官約斷約不至者罪之七月詔諸王駙馬及諸近侍自今奏事不經中書輒傳㫖付外者罪之三年三月命何榮祖等更定律令四年正月申嚴京師惡少不法之禁犯者黥刺杖七十拘役五年正月令官吏犯贓及盜官錢事覺避罪逃匿者事同獄成雖經原免亦加降黜七月詔禁畏吾兒僧隂陽巫覡道人呪師自今有大祠禱必請而後行違者罪之十一月禁軍士萬户以下毋令私代犯者斷罪有差十二月定強竊盜條格凡盜人孳畜者取一償九然後杖之六年正月詔千户百户等自軍逃歸先事而逃者罪死敗而後逃者杖而罷之沒入其男女七年正月定諸改補鈔罪例為首者杖一百七從者減二等再犯從者罪與首同為首者流復詔凡為匿名書詞語重者誅之輕者流配首告人賞鈔有差籍沒犯人妻子充賞三月定大都南北兵馬司姦盜等罪六十七以下付本路七十七以上付伊克扎爾古齊復定凡子孫或因貧困或信師巫邪說擅發祖父墳墓移棄尸骸貨塋地者與惡逆同罪十一月命依十二章斷僧官罪八年三月詔軍官擅離所部者悉遣還翼違者論如律軍人不告所部私歸者杖而還之十一月詔內郡江南人凡為盜黥三次者謫戍遼陽諸色人及髙麗人俱免黥謫戍湖廣盜禁籞馬者初犯謫戍再犯者死武宗至大元年四月詔凡匿鷹犬者沒家資之半笞三十二年六月皇太子言宣政院先奉㫖毆西畨僧者截其手詈之者斷其舌此法昔所未聞有乖國典僧俗相犯已有明憲乞更其令從之三年十月敕省部官勤恪署事晨集暮散茍或怠弛不必以聞便宜罪之其到任或一再月辭以病者杖罷不敘仁宗皇慶二年十二月命中書更定略賣良人罪例延祐元年十一月詔省部官有晚至早退政務廢弛者視其輕重杖責之如更不悛則罷不敘二年六月敕大辟罪臨刑敢有橫加刲割者以重罪論四年十一月諭諸宿衛入直非有㫖不得上殿闌入禁中者坐罪五年九月敕軍官犯罪行省咨樞密院議擬毋擅决遣英宗至治二年三月禁捕天鵝違者籍其家漳州路推官上言律徒者不杖今杖而又徒非恤刑意宜加徒減杖遂定為令三年二月成大元通制先是仁宗時取格例條畫有關風紀者類集成書號曰風憲宏綱至是復命宰執儒臣取前書而損益之其大綱有三曰詔制曰條格曰斷例凡詔制為條九十四條格為條一千二百五十一斷例為條七百十七頒行天下此據元史刑法志與英宗紀稍異紀中詔制作詔赦又有令類五百七十七條凡二千五百三十九條泰定帝即位詔凡有罪自首者原其罪泰定元年六月禁蒙古流民毋擅離所部違者斬八月敕武官坐罪制授者以聞敕授者從行省處决二年八月敕諸王部曲私入京者罪之九月禁饑民結扁擔社傷人者杖一百著為令四年九月禁僧道買民田違者坐罪沒其直命職官贓汙者流放廣南先是流逺囚徒惟女直髙麗二族流湖廣餘並流奴兒干及青海至是御史言廣海古流放之地請令贓吏處之以示懲戒從之致和元年正月詔百司凡不赴任及擅離職者奪其官避差遣者笞之五月禁流民聚至千人者杖一百文宗天厯元年十月以罪人既籍家資又役妻子非古者罪人不孥之意詔自今凡罪人妻子勿役三年正月令自今臣僚有罪致籍沒者其妻其子他人不得陳乞亦不得沒為官口六月更定遷徙法先是北人徙南南人徙北去家萬里往往道死至是始命應徙者驗所居逺近不過千里在道遇赦皆得放還如不悛再犯徙之本省不毛之地十年無過則量移之所遷人死妻子聽歸土著八月敕自今有以朝賀為名斂鈔入己者依枉法論罪至順元年七月令各宿衛復有容匿漢南髙麗人及奴𨽻濫充者集賽官與其長杖五十七犯者與典給散者皆杖七十七沒家資之半以籍入之半為告者賞仍令監察御史察之九月敕諸人非其本俗敢有弟收其嫂子收庶母者坐罪十月令自今內外官吏家人受財悉依十二章計贓多寡論罪二年六月詔諸官吏在職役或守代未任為人行賕關說即有所取者官如十二章論贓吏罷不敘終其身雖無所取訟起滅由己者罪加常人一等寧宗即位定婦人犯私鹽罪初英宗時王克敬為兩淮鹽運使溫州逮犯鹽者以一婦人至怒曰豈有逮婦人千里外與吏卒雜處者汙教甚矣自今毋得逮婦人建議著為令至是始定其罪順帝元統二年七月詔䝉古色目人犯盜者免刺至元元年六月中書省員外郎陳思謙言強盜但傷事主者皆得死罪而故殺從而加功之人與鬭而殺人者例杖一百七十得不死與私宰牛馬之罪無異是視人與牛馬等也法應加罪因姦殺夫所姦妻妾同罪律有明文今止坐所犯似失推明宜令法曹議著為定制二年八月詔強盜皆死盜牛馬者劓盜驢騾者黥額再犯劓盜羊豕者墨項再犯黥三犯劓劓後再犯法者死盜諸物者照其數估價省院臺五府官三年一審决三年七月詔除人命重事之外凡盜賊諸罪不須候五府官審録有司照例决之四年六月令自今處决重囚五府官斟酌地理逺近預選官分行各道涖其事六年九月詔今後有罪者毋籍其妻女以配人至正五年十一月新修至元條格成六年四月頒行之明太祖初平武昌即議定律吳元年十月令左丞相李善長為律令總裁官參知政事楊憲傅瓛御史中丞劉基翰林學士陶安等二十人為議律官諭之曰法貴簡當使人易曉若條緒繁多或一事兩端可輕可重吏得因緣為姦非良法也十二月書成凡為令一百四十五條吏令二十户令二十四禮令十七兵令十一刑令七十一工令二律二百八十五條吏律十八户律六十三禮律十四兵律三十二刑律一百五十工律八命有司刋布中外又恐民不能盡知法意命大理卿周楨等取所定律令自禮樂制度錢糧選法外凡民間所行事宜類聚成編訓釋其義頒之郡縣名曰律令直解洪武元年八月詔凡决重刑須待秋後毋非時以傷生意十二月置登聞鼓於午門外令監察御史監之凡民間詞訟有司不為申理及寃抑重事不能自達者許擊之御史隨引奏敢阻告者死三年六月詔武臣有犯非奏請不得逮問五年六月定宦官禁令凡內使於宫城內相罵詈者先發理屈笞五十後罵理直者不坐不服本管鈐束而扺罵者杖六十內使罵奉御者杖六十罵門官監官者杖七十內使於宫城內相鬭毆者先鬭理屈杖七十毆傷者加一等後應理直而無傷者笞五十不服本管鈐束而毆之者杖八十毆傷者加一等毆奉御者杖八十毆門官者杖一百傷者各加一等內使人使等有心懷惡逆口出不道之言者凌遲處死知情而蔽之者同罪知其事而不首者斬首者賞銀三百兩作鐡榜誡公侯申明律令凡九條一凡內外指揮千户百户鎮撫等不得私受公侯財物受者杖一百發海南充軍再犯處死公侯與者初再犯免罪附過三犯准免死一次二公侯不得私役官軍違者初再犯免罪附過三犯准免死一次官軍敢輒聽從者杖一百發海南充軍三公侯強占官民山場湖泊茶園蘆蕩及金銀銅鐡錫冶者初再犯免罪附過三犯准免死一次四各衛官軍非出征之時不得輒於公侯門首侍立聽候違者杖一百發烟瘴地充軍五功臣家管莊人等不得倚勢在鄉欺毆人民違者刺面劓鼻家産籍沒入官妻子徙置南寧其餘聽使之人各杖一百及妻子皆發南寧充軍六凡功臣家屯田佃户管莊幹辦奴僕及親屬人等倚勢凌民侵奪財産者並依倚勢欺毆人民律處斷七公侯除賜定儀仗户及佃田人户已有名額報籍在官敢有私托門下隱蔽差徭者斬八凡公侯之家欺壓良善虛錢實契侵奪人田地房屋孳畜者初犯免罪附過再犯住支俸給一半三犯停其祿四犯與庶人同罪九功臣家不得受諸人土田及朦朧投獻物業違者與侵奪田産同科斷六年四月刋律令憲綱頒諸有司八月定親屬相容隱律凡同居大功以上親及外祖父母外孫若孫之婦夫之兄弟及兄弟妻若妾之父母女壻許相容隱或奴婢為主隱者皆勿論其小功以下相容隱減凡人三等若無服之親姑姊妹夫妻之兄弟姑夫妻侄相容隱者減二等謀反惡逆不在此律九月命府州縣輕重囚獄即依律斷决不須轉發果有違枉御史按察司究劾之先是有司决獄笞五十者縣决杖八十者州决一百者府决徒罪以上具獄送行省至是命中書省御史臺定議行之十一月定大明律篇目一準於唐曰衛禁曰職制曰户婚曰廄庫曰擅興曰賊盜曰鬭訟曰詐僞曰雜律曰捕亡曰斷犯曰名例采用舊律二百八十八條續律一百二十八條舊令改律三十六條因事制律三十一條掇唐律以補遺一百二十三條合六百有六條分三十卷明年二月書成八年二月敕刑官自今凡雜犯死罪者免死輸作終身律流罪限年輸作官吏受贓及雜犯死罪當罷職役者發鳳陽屯種民犯流罪者鳳陽輸作一年然後屯種十四年二月詔凡武臣三品以上犯罪奏請得㫖乃鞫之四品以下所司就逮問請㫖裁决若文職有犯干涉武臣三品者亦須奏請毋擅問命刑部更定徒罪煎鹽炒鐡例各照年限並以到配所之日為始發鹽場者每日煎鹽三斤鐡冶者每日炒鐡三斤另項結課三月敕官吏受賕必求通賄之人并罪之徙其家於邊四月敕刑部自今官吏有犯宥罪復職榜示其過於門能改過則除之不悛者論如律十月敕凡户婚田土作奸犯科諸事悉由本屬官司陳告毋得輒赴京師越訴亦不許家居上封事違者罪之又詔有以繁文出入人罪者罪之仍命刑科㑹諸司官定議成式榜示中外十六年正月令徒流笞杖罪囚代農民力役贖罪役十日准笞二十杖一十徒流各計年准之雜犯死罪者罰戍邊三月定詐僞律十七年十月定土官犯罪律選用者依流官律定罪世襲者所司不許擅問先以干證之人推得其實定議奏聞杖以下紀録在職徒流則徙之北平十二月以民間乞養義女自幼撫養有尊卑之分帷薄不修實傷風化比同宗無服之親律加一等杖六十徒一年其女歸宗十八年命刑部録內外職官犯法罪狀明白者揭於申明亭以示懲戒初太祖患民狃元習狥私滅公罪戾日滋乃采輯官民過犯條為大誥是歲書成其目有十曰攬納户曰安保過付曰詭寄田糧曰民人經該不解物曰灑派拋荒田土曰倚法為奸曰空引偷軍曰黥刺在逃曰官吏長解賣囚曰寰中士大夫不為君用其罪至抄劄次年復為續編三編皆頒學宫以課士里置孰師教之囚有大誥者罪減等於時天下有講讀大誥師生來朝者十九萬餘人皆賜鈔遣還其後罪人率援大誥以減等不復論其有無矣二十年正月焚錦衛刑具以繫囚付刑部具寬恕篇二十一年二月敕有司官入流品以上犯罪者皆須奏聞方許逮問五月定雲南官吏軍民犯罪律是歲詔謀逆姦黨及造僞鈔者沒資産丁口其餘止收資産仍以農器耕牛給還之凡應合抄劄者曰姦黨曰謀反大逆曰姦黨惡曰造僞鈔曰殺一家三人曰採生拆割人為首其大誥所定十條後未嘗用也二十二年八月更定大明律先是刑部奏言比年條例增損不一以致斷獄失當請編類頒行俾中外知所遵守遂命翰林院同刑部官取比年所增以類附入改名例律冠於篇首為卷三十為條四百六十名例一卷四十七條吏律二卷曰職制十五條曰公式十八條户律七卷曰户役十五條曰田宅十一條曰婚姻十八條曰倉庫二十四條曰課程十九條曰錢債三條曰市㕓五條禮律二卷曰祭祀六條曰儀制二十條兵律五卷曰官衛十九條曰軍政二十條曰關津七條曰廄牧十一條曰郵驛十八條刑律十一卷曰盜賊二十八條曰人命二十條曰鬭毆二十二條曰罵詈八條曰訴訟十二條曰受贓十一條曰詐僞十二條曰犯姦十條曰雜犯十一條曰捕亡八條曰斷獄二十九條工律二卷曰營造九條曰河防四條為五刑之圖凡二首圖五曰笞曰杖曰徒曰流曰死笞刑五自一十至五十每十為一等加減杖刑五自六十至一百每十為一等加減徒刑五徒一年杖六十一年半杖七十二年杖八十二年半杖九十三年杖一百每杖十及徒半年為一等加減流刑三二千里二千五百里三千里皆杖一百每五百里為一等加減死刑二絞斬五刑之外徒有總徒四年遇例減一年者有准徒五年斬絞雜犯減等者流有安置有遷徙去鄉一千里杖一百准徒二年有口外為民其重者曰充軍初惟邊方屯種後分極邊烟瘴邊逺邊衛沿海附近軍有終身有永逺絞斬之外有凌遲以處大逆不道諸罪者充軍凌遲非五刑之正故圖不列凡徒流再犯者流者於原配處所依工樂户留住法三流並决杖一百拘役三年拘役者流人初止安置今加以居作即唐宋所謂加役流也徒者於原役之所依所犯杖數年限决訖應役毋得過四年次圖七曰笞曰杖曰訊杖曰枷曰杻曰索曰鐐笞大頭徑二分七釐小頭減一分大大頭徑三分二釐小頭減如笞之數笞杖皆以荆條為之皆臀受訊杖大頭徑四分五釐小頭減如笞杖之數亦荆條為之臀腿受笞杖訊皆長三尺五寸枷自十五斤至二十五斤止刻其上為長短輕重之數長五尺五寸頭廣尺五寸杻長尺六寸厚一寸男子死罪者用之索鐡為之以繫輕罪者長一丈鐐鐡連環之以繫足徒者帶以輸作重三斤又為喪服之圖凡八族親有犯視服等差定刑之輕重其因禮起義者養母繼母慈母皆服三年毆殺之與毆殺嫡母同罪兄弟妻皆服小功互容隱者罪得遞減舅姑之服皆斬衰三年毆殺罵詈之者與夫毆殺罵詈之律同姨之子舅之子姑之子皆緦麻是曰表兄弟不得相為婚姻大惡有十曰謀反曰謀大逆曰謀叛曰惡逆曰不道曰大不敬曰不孝曰不睦曰不義曰內亂雖常赦不原貪墨之贓有六曰監守盜曰常人盜曰竊盜曰枉法曰不枉法曰坐贓當議者有八曰議親曰議故曰議功曰議賢曰議能曰議勤曰議貴曰議賓時太孫請更定五條以上太祖覽而善之太孫又請凡與五倫相涉者宜皆屈法以伸情乃命改定七十三條具寬恕篇二十四年七月命刑部凡犯法者不許誣引良善違者所誣雖輕亦坐以重罪二十六年定應充軍者大理寺審訖開付陜西司本部置文簿注姓名年籍鄉貫依南北籍編排甲為二册一進內府一付該管百户充軍如浙江河南山東陜西山西北平福建直𨽻應天廬州鳳陽淮安揚州蘇州松江常州和州滁州徐州人發雲南四川屬衛江西湖廣四川廣東廣西直𨽻太平寧國池州徽州廣德安慶人發北平大寧遼東屬衛有逃故按籍勾補明史刑法制曰初制流罪三等視地逺近邊衛充軍有定所蓋降死一等惟流與充軍為重然名例律稱二死三流各同為一減如二死遇恩赦減一等即流三千里流三等以大誥減一等皆徒五年犯流罪者無不減至徒罪矣故三流常設而不用而充軍之例為獨重律充軍凡四十六條諸司職掌內二十二條則洪武間例皆律所不載者其嘉靖二十九年條例充軍凡二百十三條與萬厯十三年所定大略相似二十八年九月頒皇明祖訓禁用黥刺剕劓閹割之刑臣下敢以請者置重典又皇親惟謀反不赦餘罪宗親㑹議取上裁法司祗許舉奏毋得擅逮三十年五月作大明律誥成命刑官取大誥條目撮其要略附載於律凡榜文禁例悉除之除謀逆及律誥該載外其雜犯大小罪悉依贖罪律論斷編次成書刋布中外自律誥出而大誥所載諸峻令未嘗輕用焉惠帝建文四年時成祖已即位令徒罪囚人充撥國子監膳夫八月定罪人輸作之例笞罪五等每等五日杖罪五等每等十日徒罪准所徒年月加以應杖之數輸役流罪三等俱役四年一百日雜犯死罪工役終身九月定功臣死罪減祿例免三死者初犯減二十之七再犯減十之七三犯盡奪免二死者初犯減十之五再犯盡奪免一死者一犯盡奪又令雜犯死罪及流罪挈家赴北平種田流罪三年死罪五年後録為良民其徒罪令煎鹽杖罪輸役如故仍選徒罪以下罷職官假以職名俾督民耕種三年有成績實授無成仍坐原罪永樂元年二月定誣告法凡誣三四人者杖一百徒三年五六人者杖一百流三千里所誣重者從重論誣十人以上者凌遲梟首家屬遷口外又定凡監生犯公罪依律記過私罪當笞者罰厯刑一年當杖者斷發充吏准吏員資格出身三年三月定文職官及中外旗校軍民人等凡犯重條依律科斷他如私度關津臨事避難私和公事失火犯夜私造斗斛稱尺失囚囑託公事求索取受財物收養畜産不如法居喪嫁娶匿稅諸不應為而為一應詿誤連纍則免决記罪其有不應侵損於人等項及情犯重者臨時奏請六月命官犯杖罪者再犯仍記罪還職停俸三月三犯論如律十二月定制凡徒流發充軍者於長安左右門造守衛官軍飯食漢趙二府牧馬不充軍者充國子監膳夫將軍軍伴土功或於北京為民種田遵化炒鐡或自買船遞運或擺站運鹽笞杖罪止鑄錢准工四年七月申誹謗之禁十月申匿名文書之禁五年五月嚴禁回回多買中國妻妾子女出境者按律處死十年正月令誣告犯徒流等罪者免罪挈妻子徙盧龍山海永平小興州為民種田十六年十二月諭法司凡官吏犯贓者必論如法十八年二月諭甘肅總兵官陜西行都司所屬軍士有犯笞杖徒流遷徙罪者就發本地極邊處瞭守烟墩其為事官以下犯死罪者送京師十九年七月嚴自宫之禁二十二年十一月仁宗已即位命內府守衛官軍懸帶銅牌無牌者依律論罪借者及借與者罪同仁宗洪熙元年十月令凡例犯徒罪以上准工滿日安置别郡死罪如律公罪附過杖罪除坐纍詿誤依律的决還役其受贓及誣取人財考滿丁憂不赴部避役逃亡詐稱疾病者仍依永樂中事例免杖發北京為民十一月詔法司凡軍匠犯竊盜者杖一百常帶鎖鉗赴工宣宗宣德元年五月令貴州土人犯雜死罪役作終身徒流徙杖者依年限役之應笞者役五月應杖者役十月畢日釋放四年令匠役雜犯死罪鎖鐐終身工役徒流笞杖罪論年限工役二月敕自今犯不孝及蒸父妾收兄弟之妻敗倫傷化者在外有司毋擅斷决悉送京師如律鞫治若武官及其子弟犯此者不許復職承襲四月嚴越訴之禁有機密重事許實封進呈若私事論訴必自下而上擅動實封者法司治之并究教誘之人皆坐罪家屬戌邊五月申明原告在逃被告放遣俟獲對理之制六月罷文職官犯贓贖罪例先是官吏犯贓律應死者運磚畢罷為民徒流者官降用吏改撥重厯非犯贓及笞杖者還職役至是俱依律科斷不復引例英宗正統元年正月令自今以婦女殘疾老幼出名告狀坐誣者不准收贖追究壯丁坐罪三年三月詔民訟毋許托拾妻女婦女非犯奸惡殺人及毁罵舅姑不孝等罪毋得提問四年八月敕法司論獄妄援重律者以變亂成法罪之五年三月令囚充𨽻富户逃者捕獲充軍六月令凡內外軍官尅減糧五十石布五十匹棉花一百斤以上者論死罪官充軍立功總小旗充軍守哨五年滿日還役其計贓四十貫以下者論徒流罪官稱為事官立功總小旗充軍守哨流罪四年徒罪照年限滿日各復職役調邊衛差操九月命盜采銀礦為首者處斬從者發戍雲南十月令軍丁力士犯盜者依例戍邊十一月更定受枉法贓充軍例具雜議篇六年七月令免立竊盜牌額先是以竊盜黥刺之刑不足示懲扁其門曰竊盜之家至是罷之八年七月命竊盜已刺遇赦再犯者依常例擬不論赦仍通具前後所犯以聞九年六月命受財教唆揑告平人者充軍十年二月申嚴誣告之禁誣十人以上者軍發邊衛民遷口外十二年令凡以後妻所攜前夫之女為子婦及以所攜前夫之子為壻者並依娶同父異母姊妹律減等科斷十三年六月令凡姦義男婦比姦前夫之女應徒男與婦仍歸本宗強姦者處斬十四年六月令凡生員犯輕罪者充吏其受贓姦盜冒籍科舉挾妓飲酒居喪娶妻妾等罪南北直𨽻發充國子監膳夫各布政司發充鄰近儒學齊夫膳夫滿日原籍為民廩膳仍追廩米景帝景泰元年八月詔為事充軍者悉照宣德十年詔書事例止終本身五年三月令各省遇蠻夷人有犯若係真犯死罪依律處决笞杖罪的决發還本部族流并雜犯死罪照工匠樂户及婦人犯罪例各决杖一百餘罪收贖亦發還本部族收管英宗復辟天順元年四月增修錦衣衛獄憲宗成化元年詔武臣有罪者論如正律後仍舍律用例如舊制四年二月命凡犯賭博者分别輕重為三等治罪六年二月令凡盜在京城關廂行劫者於京城百里外衝要處梟示三月禁放官債凡假姓名誆財物者事發枷號部門三月發烟瘴充軍七年十二月令凡官司於軍民詞訟悉依律問擬擅自科罰者治罪十三年正月始置西厰命太監汪直督錦衣官校百餘人廣刺外事伏讀御批通鑑輯覽曰自永樂設立東厰寄宦官以訪緝之任固已作法於凉至憲宗信任汪直復為特置西厰勢熖益橫其初不過因直舉發覃力明殺人事嘉其摘奸孰知此正若輩先為小忠小信以成其大不忠大不信之故智憲宗墮其術中深相倚毗自此厰衛乘時竊柄日漸恣肆迄於危亡追論禍源憲宗豈得辭作俑之咎耶聖訓煌煌於小人得君之伎倆及人主馭下之大權罔不洞探原本有以昭萬古之炯戒云十四年九月定職官隱匿盜賊罪例一二次不報者停俸三次戴罪俱捕盜如故四次以上奏請降等用十六年九月令凡犯罪充軍病故者例終本身各衛毋得因原問官司移文仍一概按名清勾以户丁抵補十一月以京城多盜敕究舍匿遊民與無籍軍匠罪囚送户工兵三部收役其無籍貫者送兵馬司處畫具雜議篇十七年五月定挾詐得財罪例凡指京官並三司以下官名及以官府使用為詞誆財者俱計贓不分首從悉連屬發邊衛充軍原係邊者發極邊守哨職官有犯依律奏請一體發遣十八年三月罷西厰十九年十月定竊盜三犯罪例凡三犯計贓滿百貫者當絞斬罪雖係雜犯不准常例其不滿貫犯徒流以下罪者雖至三犯原情實輕仍依常例治之孝宗𢎞治三年十二月令自後有奏議條例者法司㑹議斟酌奏請上裁五年七月詔以前後奏准事例分類編集通行中外六年五月令審録錯誤者以失出入論罪其受賄及任己見者以故出入論罪七年三月申明酷刑條例降調邊逺其法外刑人致死者除名為民巡撫等官嚴加防察依法問擬奏聞處治十二月令凡誣告人罪年在七十以上十五以下及廢疾者依律論斷例應充軍瞭哨口外為民者仍依律發遣若年八十以上及篤疾有犯應永戌者以子孫發遣應充軍以下者免之十一年正月民有兄亡妻其嫂者詔以絞罪定擬仍通行中外有犯此類及親屬相姦者如之十二年二月詔凡各州縣預備倉儲虧耗不及百石者從常論罪責償其有侵盜虧折百石之上者從重論罪六月令自後兩廣及雲貴四川犯應遣發者悉改撥本處附近衛所充軍不欲者仍口外為民九月以鎮巡等官於廣寧開原撫順三馬市減價抑勒夷人申明禁約違者捕送巡撫究治計贓二百貫以上者頭目僕從人等發極邊衛充軍職官調别邊各衛遇赦不宥因而激變引釁者從重論又嚴禁分守等官并勢家與海西建州等人聨親抵易貢馬犯者按問治罪遇赦不宥十三年二月詔增修厯年問刑條例經久可用者二百七十九條又嚴私通朝貢人之禁有違例將軍器貨與邉人者問斬私通往來投託買賣及撥置害人透漏事情者俱發邊衛充軍十六年十月詔凡威逼祖父母父母死者依毆父母律斬决不待時十一月令决囚有抱訴鼓狀者於午前封進午後不許重訴十七年二月令有收藏妖書者許半月內首告官司私録者同罪四月令凡軍職犯事被提監故病故未復職者所犯係人命失機及宿娼等事子孫承襲俱照例改調别衛其徒杖等罪不分已結未結免其降調閏四月禁軍民奏訴泛及七八人以上及托入旁事者不得准理仍治其罪又凡強屯民田至五十畝以上者軍改發邊衛民遷口外為民五月嚴勛戚家人倚勢擾民之禁凡生事害人者除真犯死罪外徒以上於所犯地方枷一月發邊衛充軍情重并逃回再犯者枷三月發遣家長故縱及官司畏避者通行參奏又命今後有年七十以上十五以下及有疾人真犯死罪者奏發充軍徒流以下合充軍者本身自犯聽收贖有壯丁主使者罪坐主使之人六月令凡軍民奏訴牽緣别事托拾原問官者立案不行所奏事仍令問結虛詐者擬罪如果原問官枉斷亦罪之八月令天文生犯罪當充軍者果習業已成如例發附近衛充軍仍於欽天監應役其習業未成者仍發邊衛充軍十月令自後凡故殺門殺正犯坐擬斬絞其本非同謀但不勸阻者止問不應杖罪竊盜臨時拒捕雖不得財亦坐以斬十八年二月以南京决囚刑科例不覆奏均俟秋審後類奏定奪如有巨憝難循常例者更具奏處决正德元年復設西厰五年三月令凡軍犯已故無子婦女家屬一應免遣死罪重訴三次者免加罪婦人無夫者免配邉軍凡犯罪家産除重罪外免沒官十年六月詔問刑衙門凡徴收部解官物未入官而有司侵盜者俱照侵盜倉庫例科斷故縱者坐之十三年九月嚴子弟劫父兄者罪例十四年二月廷杖修撰舒芬等具峻酷篇十六年十二月令自今各將領於所轄官軍除臨陳退縮許用軍法外其餘有犯止用常刑違者聽撫按糾舉論罪世宗嘉靖元年令决囚准於未刻前畢事三年十一月詔今後除反逆緣坐外凡減死永遠充軍未遣而死獄者俱免勾補五年九月申明訴冤之例如各犯所訴得實原問官從重究治容情不參奏者一體治罪至民人寃抑止許赴通政司或登聞鼓下投遞有擅入禁門呌訴及托拾辱罵原問官挾制官吏者并主使之人重治之六年七月令天下有罪應充軍者斟酌律例從宜編發逺不過三千里程不過一二月無使軍人走死解户貽纍七年正月罷官校提人之制四月詔自後捕官軍職妄殺報功者依故殺抵罪八年三月詔今後官吏犯枉法贓者追贓入官仍問軍發遣酷刑致死人命雖因公亦照例為民其故禁故勘者論如律十五年七月詔自後有犯辜限外人命者俱遵律例議擬奏請定奪二十年十月詔自後有私以首功相鬻者不分受財與否俱問發充軍二十二年二月令自今犯僞茶五百斤以上者本商與轉賣之人俱謫戍近衛原係近衛者調邊逺主家匿僞茶至千斤以上者亦依前例編發其不及數者比私鹽律四月定僞造文書事例凡盜用印信及詐為各衙門關防者俱依律杖流具雜議篇二十八年增修問刑條例二百四十九條二十九年五月更定充軍之制具雜議篇三十四年二月令凡姦緦麻以上親之妻及妻前夫之女同母異父姊妹者發近衛充軍婦女離異歸宗聽夫嫁賣凡用財冒襲軍職者并保勘官俱罷職揭黃永不得襲若有贓以枉法論凡宗室悖逆祖訓出城越關赴京者奏請降為庶人仍送回軍職犯死罪及充軍者子孫俱不許襲沿邊總兵以下官凡有科斂入已贓至二百兩以上戌邊四百兩以上梟示沿邊沿海冦至不能固守致城陷入衛所掌印官與捕盜官俱比守邊將帥失陷城寨律斬其府州縣降級别用無衛所專城之責者不分邊腹掌印捕盜官俱比牧民官激變良民因而失陷律斬凡搶奪財物至三犯不悛者俱比照竊盜三犯應絞律擬絞奏請定奪凡軍職倚勢役占并受財賣放餘丁至二十名以上致廢防守俱比賣改正軍包納月錢至二十名以上事例罷職戍邊穆宗隆慶三年正月詔買休賣休和娶人妻之條非係姦情不得引用五年四月令以律書家注解折衷定論參以續定事例附條例之後刋本中外六年正月令刑部申飭諸司參酌律令可矜可疑務剖析情罪毋致牽混又申飭問刑官毋得輕入恤刑官毋得輕出具雜議篇神宗萬厯三年五月嚴禁三司首領州縣佐二官貪汚不職除照例追贓問遣外正官不行舉報者倣古連坐法參論罷黜九月申嚴貪酷之律凡守令贓私顯著者追贓押發各邉自行輸納完日回籍為民官吏因受人財及法外用刑增減人重罪至死者坐以死罪五年八月申明捕盜之禁先是命有司隱匿盜情反纍失主者參奏重治至是復申明其禁六年七月令凡捕役冒功仇家攀陷者辨釋治罪十二月以錢法壅滯詔有犯私鑄及倡言阻撓者為首依律論死餘各問罪七年三月令凡侵盜銀四百兩糧八百石者論斬一年完贓改戍過限不完處决仍拘親屬追賠至十一年六月復舊例侵盜者永遠充軍五月詔以廣東珠池之盜比常人盜官物併贓論罪免刺仍分為三等拒捕者不分首從俱遠戍若因而殺傷人為首者斬其未拒捕聚衆二十八以上珠值銀二十兩以上者為首者戍為從者枷號三月人與珠不及數者為首者初犯枷三月若以盜珠為由行劫市船俱依强盜論八月詔以衛所職官賣放正軍包攬月糧至二十石以上者例罷職發邊衛守禦沿邊副總等官科斂扣減贓至二百兩以上者例發邊衛永遠充軍四百兩以上者例斬首示衆自今沿海地方犯者照此究處十二年五月定貪官計贓論罪條例凡贓至五百兩以上者即引枉法例若止因公科斂苐依律以雜犯絞罪准徒十三年四月輯嘉靖三十四年以後詔令及宗藩軍政條例捕盜格漕運議單與刑名相關者律為正文例為附注凡三百八十二條頒行之十四年九月詔軍官軍人犯徒流律並免刺以後文職一體遵行其餘但以盜論及雜犯斬絞准徒者俱盡本法刺字十二月令凡􅌉查坐侵等項准照舊免刺三十七年四月增定失陷從賊罪例凡大小文武官員被賊攻陷城池不即拒敵輒怯死從賊導引焚劫有顯跡者斬秋後處决三十八年六月定軍職犯盜自首降襲事例凡自首免死者應襲之人降一級承襲熹宗天啓三年十二月魏忠賢提督東厰具峻酷篇七年十二月莊烈帝已即位令法司等衙門究治罪人按律用本等刑具永革大枷不得復用莊烈帝崇禎二年三月定逆案時魏忠賢等皆伏誅帝命刑部尚書喬允升等審定奸黨自崔呈秀以下定為六等詔示天下十一年定編遣事宜以千里為附近二千五百里為邊衛三千里外為邊逺其極邊烟瘴以四千里外為率止拘本妻無妻則已不許擅勾親鄰如衰痼老疾准發口外為民欽定續通典卷一百八
