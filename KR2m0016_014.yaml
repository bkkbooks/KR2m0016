body:
  text: 食貨漕運唐至德以後因史朝義分兵出宋州淮運於是阻絶租庸鹽鐵泝漢江而上河南尹劉晏為户部侍郎兼勾當度支轉運鹽鐵鑄錢使以江淮粟帛由襄漢越商於以輸京師代宗出陜州關中空窘於是盛轉輸以給用廣德二年廢勾當度支使以劉晏専領東都河南淮西江南東西轉運租庸轉輸至上都凡漕事皆决於晏晏即鹽利雇傭分吏督之隨江汴河渭所宜故其時轉運船由潤舟陸運至揚子費錢十九晏命囊米而載以舟減錢十五由揚州距河隂斗米費錢百二十晏為歇艎支江船二千艘每船受千斛十船為綱每綱三百人篙工五十人自揚州遣將部送至河隂上三門號上門填闕船斗米減錢九十調巴蜀襄漢麻葈竹條為綯挽舟未十年人人習河險江船不入汴汴船不入河河船不入渭江南之運積揚州汴河之運積河隂河船之運積渭口渭船之運入太倉嵗轉粟至百一十萬石無升斗溺者又分官吏主丹陽湖禁引溉自是河漕不涸大厯時李芄為陳州刺史復開陳頴路以通漕挽八年以關內豐穰減漕十萬石自揚炎為相修晏素隙罷其職以户部郎中崔河圖代之而漕事漸壞德宗貞元初關輔宿兵斗米千錢詔浙江東西至今年入運送上都米七十五萬石更於本道兩稅折納米一百萬石并江西湖南鄂嶽福建等道先支米并委浙江東西節度使韓滉處置船運數內送一百萬石至東渭橋輸納餘賑給河北等諸軍及行營糧料其淮南及夀濠等道先支米洪潭屯米并委淮南節度使杜亞勾當其船運數內送二十萬石至東渭橋餘支充行營糧料天下兩稅錢物並委本道觀察使本州刺史遣官部送上都復陜虢觀察使李泌益鑿集津倉山西徑為運道屬於三門倉治上路以回車又為入渭船方五板輸東渭倉米至凡百三十萬石遂罷南路陸運十五年詔令江淮轉運米宜二百萬石邇來雖有此命而運米不過四十萬石舊例江淮米嵗運抵河隂者數五十萬斛久不盈其數惟李㢲為度支轉運使乃登足數焉至太和初嵗旱河涸掊沙而進米多耗咸陽令韓遼請修秦漢時興城堰自咸陽抵潼關三百里可以罷車挽之勞文宗從其議堰城罷挽車之牛以供農關中實賴其利云梁羅紹威鎮魏博日以臨淄海岱罷兵嵗久儲庾山積唯京師軍民多而食寡願於太行伐木下安陽淇門斫船三百艘置水運自大河入洛口嵗以給宿衛太祖深然之後唐莊宗同光二年敕鄆州差兵二千自黎陽開河以通漕運明宗天成元年四月制曰先緣漕運京師租庸司多借水船今既分兵就食漕運並停其諸河渡水船即付本主時洋州修魏門倉一百間充貯轉運下峽漕米斛斗三司使張延朗奏於洺中預備一二年軍糧除水運外深冬百姓稍間請差運一轉又請諸道運糧百石以實京師詔然之時車駕在汴論者以運糧百萬勞民託近臣奏之帝乃命東地數州運糧十萬石至汴州司勳員外郎夏侯晤上言曰諸道運轉為實輦下軍儲今聞多是輕齎却至京中糴納請下令禁止長興元年鳯州奏開修唐倉湖田路通鳯翔饋運又幽州進新開東南河路圖自王馬口至淤口長一百六十五里可勝漕船千石又三司使奏河水運自洺口至京往年牽船下卸皆用水運衙官今洺岸至倉門稍逺衙官轉運艱難欲於洺河北岸别鑿一灣引船直至倉門下卸其功役欲於諸軍內差借從之周世宗顯德二年詔曰今州戍兵舊制沿江發運務差均鄧兩州人户自備舟船水運糧鹽供饋軍食近聞彼民頗甚勞弊及今有司按本州稅積所納常賦可以嵗給軍儲其水運舟船並宜停廢四年詔疏汴水一派北入於五丈河又東北達於濟由是齊魯舟楫皆至京師六年命侍衛馬軍都指揮使韓令坤自京東疏汴水入於蔡河侍衛步軍都指揮使袁彥浚五丈河以通漕運宋都大梁有四河以通漕運汴河黃河惠民河廣濟河本祖建隆二年給事中范陽劉載往定陶督漕軍丁夫三萬浚五丈渠自都城北厯曹濟及鄆以通東方之漕開寶五年計汴蔡兩河公私船運江淮米數十萬石以給兵食是時京師嵗費有限漕事尚簡至太宗太平興國初兩浙既獻地嵗運米四萬石雇民挽舟吏因緣為奸所在附載錢帛雜物乃擇幹彊之臣在京分掌水陸路發運事以革其弊端拱元年罷京城水陸發運以其事𨽻排岸司及下卸司先是四河所運未有定制太平興國六年汴河嵗運江淮米三百萬石粟一百萬石按李燾續通鑑長編章俊卿山堂考索皆作二百萬石黃河粟五十萬石菽三十萬石惠民河粟四十萬石菽二十萬石廣濟河粟十二萬石凡五百五十萬石非水旱蠲放民租未嘗不及其數至道初汴河運米計五百八十萬石真宗大中祥符初至七百萬石江南淮南兩浙荆湖路租糴於真揚楚泗州置倉受納分調舟船泝流入汴以達京師諸州嵗造運船至道末三千二百七十餘艘按三千二百七十餘艘非止運糧兼緡錢布帛在內天禧末減四百二十一先是諸河漕數嵗久益增景德四年定汴河嵗額六百萬石仁宗天聖四年荆湖江淮州縣和糴上供小民闕食自五年後權減五十萬石慶厯中又減廣濟河嵗漕二十萬石後黃河嵗漕益減才運菽三十萬石嵗創漕船市材木勞費甚廣嘉祐四年罷所運菽減漕船三百艘自是嵗漕三河而已江河上供米舊轉運使以本路綱輸真楚泗州轉船倉按宋史作轉般倉似誤今按通鑑長編山堂考索皆作轉船倉載鹽以歸舟還其郡卒還其家汴州詣轉船倉運米輸京師嵗摺運者四河冬涸舟卒亦還營至春復集名曰放凍卒得畨休逃匿者少汴船不涉江路無風波沉溺之患後發運使權益重六路上供米團綱發船不復委本路獨専其任文移坌并事目繁夥不能檢察撡舟者賕諸吏得詣富饒郡市賤貿貴以趨京師自是江汴之舟混轉無辨籍多空名漕事大弊嘉祐三年以諸路綱不集下詔切責英宗治平初詔復依舊日成例大加振刷漕粟至京師汴河五百七十五萬五千石惠民河二十六萬七千石廣濟河七十四萬石諸路創漕船二千五百四十艘京師稅米支五嵗餘而漕運吏卒上下共為侵盜貿易甚則託風水沉溺以滅迹官物陷折嵗不減二十萬斛神宗熙寧二年薛向為江淮等路發運使始募客舟與官舟分運互相稽察舊弊乃去嵗漕常數既足募商舟運至京師者又二十六萬餘石乃請充明年嵗計之數三司吳充言宜自明年減江淮漕米二百萬石令發運司易輕貨二百萬緡計五年所得無慮緡錢千萬轉儲備邊王安石謂驟變米二百萬石米必陡賤驟致輕貨二百萬貫貨必陡貴當令發運使度米貴州郡折錢變為輕貨儲之河東陜西要便州軍用常平法糶糴為便詔如安石議七年京東路察訪鄧潤甫等言山東沿海州郡地廣豐嵗則榖賤募人為海運山東之粟可轉之河朔以助軍食詔京東河北路轉運司相度後江淮上供榖至京師者三分不及一宣徽南院使張方平言今京師古所謂陳留天下四衝八達之地利漕運而贍師旅國初浚河渠三道以通漕運計各河之數立上供年額近罷廣濟河而惠民河粟又不入太倉衆所賴者汴河議者屢作改更并致汴河日失其舊十二月詔濬廣濟河增置漕舟其後河成嵗漕京東榖六十萬石東南諸路上供雜物舊陸運者增舟水運押汴河江南荆湖綱運七分差三班使臣三分軍大將殿侍又令真楚泗州各造淺底舟百艘分為十綱入汴元豐五年罷廣濟河輦運司及京北排岸司移上供物於淮陽計置入汴立清河輦運司言者謂廣濟安流而上與清河泝流入汴逺近險易不同詔轉運提㸃刑獄比較利害蔣之竒陳祐甫等開龜山運河乃免風濤之患詔各遷兩官餘官減年循資有差八年罷嵗運百萬石赴西京先是常運東南粟入洺下至是户部奏罷之徽宗崇寧三年户部尚書曾孝廣言往年南省真州江岸北至楚州淮堤以堰瀦水不通重船船剝勞費遂於堰旁置轉船倉受逐州所輸更用運河船載之入汴以達京師雖免推舟過堰之勞然侵盜之弊由此而起請將六路上供斛斗依東南輕貨雜運直至京師詔可其奏自是六路郡縣各認嵗額雖湖南北至逺處亦直抵京師號直達綱繼因鹽法已壞回舟無所得舟人逃散法亦大壞政和中談正上言祖宗建立真楚泗州轉船倉一以備中都緩急二以防漕渠阻節三則綱船裝發資次運行更無虛日自其法廢河道日益淺澀遂致中都糧儲不繼淮南三轉船倉不可不復乞自泗州為始次及真楚既有糴本按糴本宋史作瓦木乃傳刻之誤今從文獻通考及名臣奏議改正順流而下不甚勞費俟嵗豐計置儲蓄仍立轉船倉依前法計置至欽宗靖康元年又詔東南六路上供額斛除淮南兩浙依舊直達其江湖四路並措置轉船髙宗建炎元年詔諸路綱米以三分之一輸送行在餘輸京師二年詔二廣湖南北江東西綱運赴江寧府福建兩浙路輸送平江府按宋史輸送平江府句上脫赴江寧府福建兩浙路九字文義不明今據玊海及山堂考索增入京畿淮南京東西河北陜西及川綱輸送行在其二廣湖南北綱運如過兩浙許便輸送平江府福建綱運過江東西亦許乘便輸送江寧府三年又詔糧運輸送建康府至紹興初因地之宜以兩浙之粟供行在以江東之粟餉淮東以江西之粟餉淮西荆湖之粟餉鄂嶽荆南量所用之粟責漕臣將輸而歸其餘於行在三十年定制科撥上供米鄂兵嵗用米四十五萬餘石於全永郴邵道衡潭鄂鼎科撥荆南兵嵗用米九萬六千石於德安荆南澧純潭復荆門漢陽科撥池州兵嵗用米十四萬四千石於吉信南安科撥建康兵嵗用米五十五萬石於洪江池宣太平臨江興國南康廣德科撥行在合用米一百一十二萬石就用兩浙米外於建康太平宣科撥其宣州見屯殿前司牧馬嵗用米并折輸馬料三萬石於本州科撥其諸路轉運司樁發時計內外諸軍嵗費米三百萬斛而四川不與焉遼聖宗太平九年燕地饑户部副使王嘉請造船募習海漕者移遼東粟餉燕後因道險不便而止金世宗大定初劉璣同知漕運司事奏言漕户顧直太髙虛費官物宜酌量裁損若減三之一嵗可省官錢一十五萬餘貫宣宗元光元年六月造舟運陜西糧由大慶關渡以抵湖城哀宗天興元年八月發丁壯五千人運糧以餉喀齊喀喀齊喀時為樞密使將兵應完顔錫林等自汝州急入援故餉之元世祖中統四年詔北京運米五千石赴開平其車牛之費並從官給至元十三年遣瀘州屯田軍四千轉漕重慶丞相巴顔獻海運策江南之糧分為春夏二運當巴顔平江南時嘗命朱清張瑄等以宋庫藏圖籍自崇明州從海道載入京師而運糧則自浙西涉江入淮由黃河逆水至平灤旱站陸運至淇門入御河以達於京後又開濟州泗河自淮至新開河由大清河至利津河入海因海口沙壅又從東河旱站運至臨清入御河又開膠萊河道通海勞費不資卒無成功十九年巴顔追憶海道載宋圖籍之事以為海運可行於是請於朝廷命上海總管羅璧朱清張瑄等造平底海船六十艘運糧四萬六千餘石從海道至京師然創行海洋沿山求澳風信失時明年始至直沽時朝廷尚未知其利是年十二月立京畿江淮都漕運司二仍各置分司以督綱運每嵗令江淮漕運司運糧至平灤京畿漕運司自平灤運至大都二十年又用王積翁議令阿巴齊等廣開新河然新河候潮以入船多損壞民亦苦之而䝉古岱所督海運之舟悉皆至焉於是罷開新河頗事海運立萬户府二以朱清為中萬户張瑄為千户䝉古岱為萬户府達嚕噶齊未幾又分新河軍士水手及船於揚州平灤兩處運糧命三省造船二千艘於濟州河運糧猶未専於海道也濟州役夫萬二千人初江淮嵗漕米百萬石於京師海運十萬膠萊六十萬石而濟之所運三十萬石水淺舟不能達更以百石之舟運用四人故夫數增多二十四年始立行泉府司専掌海運增置萬户府二遂罷東平河運糧二十五年內外分置漕運司二其在外者於河西務置司領接運海道糧事二十八年又用朱清張瑄之請併各府為都漕運萬户府止令清瑄二人掌之其屬有千户百户等官分為各翼以督嵗運先是中統二十九年從郭守敬言開通惠河守敬嘗陳水利十一事其一欲道昌平縣白浮村神仙泉過雙塔榆河引一𤱔玊泉諸水入城滙於積水潭從東折而南入舊河每十里置一閘以時蓄泄帝稱善復置都水監命守敬領之丞相以下皆親撡畚鍤為之倡置閘之處往往於地中得舊時磚木人服其識逾年畢工自是免都民旱運之勞上悅賜名通惠武宗至大四年遣官至江浙議海運事時江東寧國池饒建康等處運糧率令海船從揚子江逆流而上江水湍急又多石磯走沙漲淺糧船俱壞嵗嵗有之又湖廣江西之糧運至真州入海船船大底小亦非江中所宜於是以嘉興松江秋糧并江淮江浙財賦府嵗辦糧悉充海運海漕之利至是益博初海運之道自平江劉家港入海經揚州路通州海門縣黃連沙頭萬里長灘開洋沿山㠗而行抵淮安路鹽城縣歷西海州海寧府東海縣密州膠州界放靈山洋投東北路多淺沙行月餘始抵成山計其水程自上海至楊村馬頭凡一萬三千三百五十里至元二十九年朱清等言其路險惡復開生道自劉家港開洋至撑腳沙轉沙觜至三沙揚子江過匾擔沙大洪又過萬里長灘放大洋至青水洋又經黑水洋至成山過劉島芝罘沙門二島放萊州大洋抵界河口其道差為徑直後千户殷明略又開新道從劉家港入海至崇明州三沙放洋向東行入黑水大洋取成山轉西至劉家島又至登州沙門島放萊州大洋入界河當舟行風信有時自浙西至京師不過旬日而已視前二道較便然風不測船易漂沒亦有船壞而棄其米云明太祖洪武元年命浙江江西及蘇州等九府運糧三百萬石於汴梁已而大將軍徐達令欣崞代堅臺五州運糧大同中書省符下山東行省募水工發萊州洋海倉餉永平衛其後海運餉北平遼東令户部於蘇州太倉儲糧二千萬石以備海運供給遼東其西北邊則浚開封漕河餉陜西自陜西轉餉寧夏河州其西南令川貴納米中鹽以省逺運於時各路皆就近輸得利便矣成祖永樂元年納户部尚書郁新言始用淮船受三百石以上者道淮及沙河抵陳州頴岐口跌坡用淺船可載一百石以上者運至跌坡别以巨舟入黃河抵八栁樹等處車運赴衛河輸北平與海運相參其時海運糧六十五萬一千二百二十石於北京時車駕數臨幸百費仰給不止餉邊也淮海運道凡二十二年海運糧四十八萬四千八百一十石於通州又衛河儧運糧四十五萬二千七百七十六石於北京所謂海陸兼運也自濬㑹通河按㑹通河濬於九年春二月己未命工部尚書宋禮都督周長開㑹通河自濟寧至臨清舊通舟楫先是洪武中河岸衝缺河道淤塞故於河道置八遞運所每所用民丁三千車二百輛嵗久民困其役永樂初屢有言開河便者上重民力未許至是濟寧同知潘叔正言㑹通河道四百五十餘里其淤塞者三之一浚而通之非唯山東之民免轉輸之勞實國家無窮之利也乃命禮等往視禮等極言疏濬之便且言天氣和霽宜及時用工於是遣侍郎金純發山東直𨽻徐州民丁及應天鎮江等府民丁併力開浚民丁皆給糧犒賞蠲他役及今年田租命宋禮總督之功成以汶泗為源河水出寧陽縣泗水出兖州至濟寧而合置閘以分其流南流通於淮而新開河則居其西北流由新開河道東昌入臨清計三百八十五里自濟寧至臨清置十五閘以時啓閉又於寧陽築堽城壩遏汶水盡入漕河禮還京上言㑹通河源於汶泗夏秋霖潦泛溢則馬常泊之流亦入焉汶泗合流至濟寧分為二河一入徐州一入臨清河流深淺舟楫通塞繫乎泊水之消長泊水夏秋有餘冬春不足非經理河源及引别水以益之必有淺澀之患今汶河上流上自寧陽縣已築壩堰使其水盡入新河東平州之東境有沙河一道本汶河支流至十里口通馬常泊比年流沙淤塞河口宜及時開濬况沙河至十里口故道具存不必施工河口當濬者僅三里河身宜築堰者計百八十丈從之功既迄成乃復命都督賈義尚書宋禮以舟師運禮以海船大者千石工窳輒敗乃造淺船五百艘運淮揚徐兖糧百萬以當海運之數按㑹通河既成後令浙江嘉湖杭與直𨽻蘇松常鎮等秋糧除存留并起運南京供內府等項外其餘原坐太倉海運之數盡改撥運淮安倉交收揚州鳯陽淮安三府秋糧內每嵗定撥六十萬石運至徐州倉交收徐州並山東兖州府秋糧內每嵗定撥三十萬石俱令民運赴濟寧倉交收河南山東稅糧令民運至臨清倉交收仍令淺河船於㑹通河以三千隻支淮安糧運至濟寧倉以二千隻支濟寧糧運赴通州倉每嵗通運四次其天津并通州等衛各撥官軍於通州接運至京於是海運不復行矣平江伯陳瑄繼之於各路置倉運以就近官軍而支運之法舉行海陸二運俱廢惟存遮洋船每嵗於河南山東小灘等水次兑糧三十萬石十二輸天津十八由直沽入海輸薊州而已不數年官軍多所調遣道逺數愆期宣宗宣德四年瑄及尚書黃福建議復支運法乃令江西湖廣浙江民運百五十萬石於淮安倉蘇松寧池廬安廣德民運糧二百七十四萬石於徐州倉應天常鎮淮揚鳯太滁和徐民運糧二百二十萬石於臨清倉令官軍接運入京通二倉民糧既就近入倉力大減省乃量地近逺糧多寡抽民船十一或十三五之一以給官軍惟山東河南北直𨽻則徑赴京倉不用支運尋令南陽懷慶汝寧糧運臨清倉開封新德衛輝糧運德州倉其後山東河南皆運德州倉六年瑄言江南民運糧諸倉往返幾一年誤農業令民運至淮安瓜洲兑與衛所官軍運載至北給與路費耗米則軍民兩便是為兑運命羣臣㑹議吏部蹇義等言官軍兑運民糧加耗則例以地逺近為差如有兑運不盡仍令民自運赴諸倉不願兑者亦聽其自運軍既加耗又給輕齎銀為洪閘盤撥之費且得附載他物皆樂從事而民亦多以逺運為艱於是兑運者多而支運益少計運糧之數四百萬石京倉貯十四通倉貯十六英宗正統初計四百五十萬石而兊運者二百八十萬餘石淮徐臨德四倉支運者十之三四耳土木之變復盡留山東直𨽻軍操備蘇松諸府運糧仍屬民景帝景泰六年乃復軍運憲宗成化初以運糧未有定額乃定制四百萬石七年乃有改兊之議時應天巡撫滕昭令運軍赴江南水次交兑加耗外復石增米一斗為渡江費後數年帝乃命淮徐臨德四倉支運七十萬石之米悉改水次交兊由是悉變改兊而官軍長運遂為定制孝宗𢎞治五年户部尚書葉淇言蘇松諸府連嵗荒歉民買漕米每石銀二兩而北直𨽻山東河南嵗供宣大二邉糧料每石亦銀一兩去嵗蘇州兊運已折五十萬石每石銀一兩今請推行於諸府而稍差其直災重者石七錢稍輕者石仍一兩俱解部轉發各邉抵北直𨽻三處嵗供之數而供三處本色以輸京倉則費省而事易集從之自後嵗災輒權宜折銀而折價以六七錢為率無復至一兩者穆宗隆慶中運道艱阻議者欲開膠萊河復海運由淮安清浦口歷新壩馬家壕至海倉口徑抵直沽止循海套不泛大洋疏上遣官勘報以水多沙磧而止神宗萬厯時折銀漸多三十年漕運抵京僅百三十八萬餘石而撫臣議截留漕米以濟河工倉場侍郎趙世卿爭之言太倉入不當出計二年後六軍萬姓將待新漕舉炊倘輸納愆期勢事不可問矣原其初災傷折銀本折漕糧以抵京軍月俸其後更以給邉餉世卿故力爭之自後倉儲漸匱漕政益弛矣臣等謹案漕運之制必視水道所宜以裕民而益國唐都關中置轉輸之倉由江淮汴河以達于渭宋都大梁以四河通漕運皆行水之正道也至元人始重海運其講求海道沿山求澳與夫相風避磧之法可謂備矣今考之元史至元二十八年漂米至二十四萬五千有竒至大三年漂米至二十萬九千有竒而每嵗漂溺以什百千萬計者不與焉原其立法之初本欲省經費而罷牽挽究乃舉倉庾之正供及轉漕之官吏士卒悉棄諸不測之淵利害昭然無俟較量然終元之世不能廢海運者以運渠未濬舍此更無以便漕也自明臣宋禮陳瑄等濬㑹通河以通漕舟後復改為兑運省民間輸挽之勞倉儲正額嵗有常經不同海運之輕為嘗試至天啓以後徐鴻儒李青山相繼為亂有司𠞰治無方運道為梗沈廷揚復議海運終於難行明末綱紀不振即此可見矣鹽鐵唐肅宗乾元二年鹽鐵鑄錢使第五琦立鹽法就山海井竈近利之地置監院游民業鹽者為亭户免雜徭盜鬻者論以法及琦為諸州𣙜鹽鐵使盡𣙜天下鹽斗加時價百錢而出之及劉晏為鹽鐵使復上鹽法輕重之宜出鹽之鄉因舊監置吏亭户糶商人縱其所之江嶺去鹽逺者有常平鹽每商人不至則減價以糶民官收厚利而人不知貴晏又以鹽生霖潦則鹵薄暵旱則土溜墳乃隨時為令遣吏曉導倍於勸農吳越揚楚鹽廪至數千積鹽二萬餘石有漣水湖州越州杭州四場嘉興海陵鹽城新亭臨平蘭亭永嘉太昌侯官富都十監嵗得錢百餘萬緡以當百餘舟之賦晏之始至也鹽利嵗四十萬緡至代宗大厯末六百餘萬緡天下之賦鹽利居半宫闈服御軍鑲百官俸祿皆仰給焉至包佶為汴東水陸運兩稅鹽鐵使屢更其法鹽估益貴商人乘時射利逺鄉貧民困髙估至有淡食者其後軍費日增鹽價浸貴有以榖一斗易鹽一升憲宗元和時鹽鐵使李錡奏減江淮鹽價然錡多専利於巳旋以罪誅仍增所減鹽價至李巽為鹽鐵使始復劉晏之制後唐莊宗同光三年敕應稅鹽錢宜令租庸司指揮並淮元徴本色輸納不得更改折紐之法明宗為監國下教百姓合散蠶鹽每嵗祗二月內一度俵散依夏稅限納錢長興元年制曰應天下府州所徴各稅土地節氣各有早晚訪聞天下州縣官吏於省限前預先徴促致百姓生持送納博買供輸既不利其生民今特議其改革宜令所司更展期限於是户部奏三京鄴都諸道州府逐年所徴鹽麴起徴條流內河南府華耀陜絳鄭孟懷陳齊棣延兖沂徐宿汶申安滑濮澶商襄均房雍許邢鄧雒磁唐隨郢蔡同鄆魏汴潁復曹鄜宋亳蒲等州節候常早其蠶鹽六月五日起徴至八月二十日納足幽定鎮滄晉隰燕密青登淄萊邠寧慶衍等州節侯較晚蠶鹽六月十日起徴八月二十五日納足晉髙祖天福中以百姓犯鹽禁乃以食鹽錢於諸道計户配之作五等令人逐便興販其後鹽貨頓賤乃重置稅周世宗顯德三年敕齊州管內元於秋苗上俵配蠶鹽謂之察頭鹽每一石徴錢三千文苗𤱔雖減於舊時鹽數不少於往日且聞黎庶頗亦艱辛其滄棣濵淄青五州管內祈請蠶鹽每一石徴絹一匹地理相接苦樂頓殊輸輕者量與增添賦重者時宜蠲減庶無偏黨用示均平其齊州所納鹽價錢特與減放一半只徴錢一千五百文其滄棣濵淄青等州每鹽一石舊徴絹一匹起來年後加一匹宋自削平諸國天下鹽利皆歸縣官官鬻通商隨州郡所宜然亦變革不常而尤重私販之禁凡禁𣙜之地官立標識候望以曉民其顆鹽通商之地京西則蔡襄鄧隨唐金房均郢州光化信陽軍陜西則京兆鳯翔府同華耀乾商涇原邠寧儀渭鄜坊丹延環慶秦隴鳯階成州保安鎮戎軍及澶州諸縣之在河北者其末鹽通商之地京東則登萊州河北則大名真定府貝冀相衛邢洺深趙滄磁德博棣祁定保瀛莫雄霸州德清通利永靜乾寧定逺保定廣信安肅永定軍唯益州煮井鹽禁不得出川峽真宗咸平中度支使梁鼎言陜西沿邊解鹽請勿通商官自鬻之詔以鼎為陜西制置使又以內殿崇班杜承睿同制置陜西青白鹽事承睿言鄜延環慶儀渭等州自禁青鹽之後今商人入芻粟運解鹽於邊貨鬻其直與青鹽不至相懸是以民食賊鹽頗知畏法而蕃部青鹽難售今聞運解鹽於邊欲與內地同價邉民必冒法圖利却入蕃界私販青鹽是助寇資而結民怨矣繼又有上疏言其不便者鼎請侯至邊部幹運及乘傳至解池即禁止商販旋運鹽赴邊公私大有煩費而邉民頓無入市物論紛擾於是命判鹽鐵勾院林特知永興軍張詠詳議以為公私非便請復舊商販詔切責鼎罷度支使後定制禁𣙜之地皆官役鄉户衙前及民夫謂之帖頭水陸漕運而通商州軍並邊秦延環慶渭原保安鎮戎德順又募人入中芻粟以鹽償之繼又以禁𣙜之法賦稅反致不給軍官輦運百姓困於轉輸仁宗天聖八年上書者言縣官禁鹽得利微而為害博兩池積鹽為阜其上生木合抱數莫可較宜聽通商平估以售可以寬民力詔翰林學士盛度御史中丞王隨議更其制度因條奏通商五利上之曰方禁商時伐木造船輦運兵民不勝疲勞今去其弊一利也陸運既差帖頭又役軍户貧人懼役連嵗逋逃今悉罷之二利也船運有沉溺之患綱吏侵盜雜以泥沙硝石其味苦惡今皆得食真鹽三利也錢幣國之貨泉欲使流通富家多藏鏹不出民用益蹙今嵗得商人出緡錢六十餘萬助經費四利也嵗減鹽官兵卒畦夫傭作之給五利也十月詔罷三京二十八州軍𣙜法聽商人入錢若金銀其法既定嵗課頓增慶厯中復行禁𣙜之法兵民輦運不勝其苦州郡騷然法又大壞太常博士范祥極言其弊以祥為陜西提㸃刑獄兼制置解鹽事使推行之其法舊禁鹽地一切通商聽鹽入蜀罷九州軍入中芻粟令入實錢償以鹽視入錢州軍逺近及所指東西南鹽第優其直東南鹽又聽入錢授以要劵即池驗劵按數而出盡弛兵民輦運之役又以延慶環渭原保安鎮戎德順地近烏白池奸人私以青白鹽入塞侵利亂法乃募人入中池鹽豫劵優其估還以池鹽償之以所入鹽官自出鬻禁人私售峻青白鹽之禁又令三京及河中河陽陜虢解晉絳濮慶成廣濟官仍鬻鹽須商賈流通乃止行之數年黠商貪賈無所僥幸關中之民得安其業公私便之其後祥緣事罷職以轉運使李恭代之並邊復聽入芻粟以當實錢而虗估之弊滋長劵直亦從而賤嵗損官課無慮百萬三司使張方平及包拯請復用祥乃復以祥總鹽事法又復舊神宗時王安石當國復為官賣民間騷怨安石去位乃罷之後沈希顔復行安石之法侍御史黃降劾之又復舊制通商徽宗宣和三年大改鹽法舊稅鹽並易為鈔鹽凡未賣稅鹽鈔引及已請算或到倉已投暨未投者並赴𣙜貨務改給新法鈔引方許通販南渡以後雖屢改鈔法而日久弊生理宗端平二年都省言淮浙嵗額鹽九十七萬四千餘袋近二三年積虧一百餘袋民食貴鹽公私俱病有㫖三路提舉茶鹽司各置主管文字一員専以興復鹽額收買散鹽為務遼太祖時以所得漢民數多即八部中分古漢城别為一部冶城在炭山南有鹽池之利即後魏滑鹽縣也八部皆取食之及征幽薊還次於和拉濼命取鹽給軍自後濼中鹽益多上下足用太宗㑹同初晉獻十六州地而瀛莫在焉始得河間煮海之利置𣙜鹽院於香河縣於是燕雲迤北暫得滄鹽一時産鹽之地如渤海鎮城海陽豐州陽洛城廣濟湖等處五京計司各以其地領之金地濵海多産鹽上京東北二路食肇州鹽率賔路食海鹽臨潢之北有大鹽濼烏庫哩實壘部有鹽池皆足以食境內之民嘗徴其稅及得中土鹽場倍之故設官立法加詳世宗大定以後定制置山東滄寶坻莒解北京西京七鹽司定軍私煮鹽及盜官鹽之法命明安穆昆巡捕凡部族值饑嵗罷其鹽池稅章宗時諭有司曰比因獵知百姓多有鹽禁獲罪者民何以堪宜從平灤均辦例令民自煎詔百官議之户部尚書鄧儼等謂若令民計口定課民既輸乾辦錢又必别市而食是重費民財而徒增煎販之利且今之鹽價蓋昔日錢幣易得時之所定今昔不同况太平日久户口蕃息食鹽稅課宜有羡增而反無之何哉緣官估髙貧民利私鹽之賤致虧官課爾近已減寶坻山東滄鹽價所售必多自有羡餘乞令平灤乾辦鹽課亦宜減價各路巡鹽弓手不得自専巡捕庶革誣罔之弊禮部尚書李晏亦請減價使公私價同而刑部尚書郭邦傑左諌議大夫圖克坦鎰皆請乾辦宰臣復集議以減價為是其鹽官出巡約所屬同往不同獲者不坐上命寶坻山東滄鹽每斤減價餘從所請又以大理司直伊喇久勝努廣寧推官宋扆議北京遼東鹽司利病復置北京遼東鹽使司承安三年尚書省奏鹽利至大今天下户口蕃息食者倍於前軍儲支引者不甚多况日用不可闕之物豈以價之低昻而有多寡若不隨時取利則失矣於是各鹽司俱酌增其價泰和四年以七鹽司課額七年一定為制每斤增其價後以涿州刺史瓜爾佳博諾言以萊州民所納鹽錢聽輸絲錦銀鈔宣宗貞祐二年户部言陽武延津原武滎澤河隂諸縣饒鹹鹵民私煎不能禁遂詔置場設判官管勾各一員𨽻户部河東南權宣撫副使烏庫哩慶夀言河中乏糧既不能濟而又邀糴以奪之夫鹽乃官物有司陸運至河復以舟達京兆鳯翔以與商人貿易艱得而甚勞而陜西行部每石復邀糴二斗是官物而自糴也夫轉鹽易物本濟河中而陜西復强取之非奪而何乞彼此悉聽民便則公私皆濟上從之興定中以延安行六部員外郎盧進建言綏德之嗣武城義合克戎寨近河地多産鹽請設鹽場管勾一員輸錢以佐軍詔用其言設官鬻鹽給邊用又以李復亨言以河中西岸解鹽舊所易粟麥充關東之運尋命解鹽不得通陜西以北方有警河禁方急也元光二年內族鄂和言民運解鹽有助軍食詔修石墻以固之元制鹽法各路異其制大抵皆因時制宜隨時救弊其大都之鹽順帝元統二年御史臺奏竊覩京畿民居繁盛日用鹽不可闕大德中因商販把握行市民食貴鹽乃置局設官賣之泰定間因所任局官不得其人在上者失於鈐束致有短少之弊於是巨商趨利者營屬當道以局官侵盜為由輒奏罷之復從民販賣無籍之徒私相犯界煎賣獨受其利官課為所侵礙而民食貴鹽益甚貧者多不得食甚不副朝廷恤民之意宜仍舊設局官為發賣省部議如所奏於南北二城置十有五處每局日賣十引設賣鹽官二員以嵗一周為滿責其奉公發賣至正三年監察御史王思誠侯思禮等建言京師自大德七年設官賣鹽法久弊生其起運在船則有侵盜滲溺之患到局則有和雜灰土之弊官鹽起運凡運司所遣之人擅作威福南抵臨清北自通州所至索截河道舟楫往來無不被擾又其舟小而不固滲漏侵盜弊病多端當時設局置官但為民食貴鹽殊不料官賣之弊反不如商販之賤宜將元設監局合准革罷聽從客旅興販奏上如所議行其餘各路行鹽之處如河間山東陜西河東遼陽兩淮兩浙福建廣東廣海四川諸路俱商販而辦其課至嵗額多寡往往隨時酌定或以運司領其事或兼轄於行御史臺及行中書省皆無定制祗以合時宜也明太祖初起即立鹽法置局設官令商人販鬻二十取一以資軍餉既而倍征之尋用胡深言復初制後於産鹽之地次第設官其鹽一引嵗額多隨時酌辦因所産之地制法不同故課亦各有多少解州之鹽風水所結寧夏之鹽刮地得之淮浙之鹽熬波川滇之鹽汲井閩粵之鹽積鹵淮南之鹽煎淮北之鹽曬山東之鹽有煎有曬按畿輔通志明洪武初年長蘆嵗辦鹽引即有正課正統中議准長蘆鹽課量場分逺近為四等召商中賣云然明代鹽法莫善於開中洪武三年山西行省言請令商人於大同倉入米一石太原倉入米一石三斗給淮鹽一小引商人鬻畢即以原引赴所在官司繳之如此則轉運費省而邊儲充帝從之召商輸糧而與之鹽謂之開中其後各行省邊境多召商中鹽以為軍儲鹽法邊計相輔而行四年定中鹽例輸米臨濠開封陳橋襄陽安陸荆州歸州大同太原孟津北平河南府陳州北通州諸倉計道里近逺自五石至一石有差先後增減則例不一率視時緩急米直髙下納者利否道逺地險則減而輕之編置勘合及底簿發各布政司及都司衛所商納糧畢書所納糧及應支鹽數齎赴各轉運提舉司照數支鹽其法頗善成祖即位以北京諸衛糧乏悉停天下中鹽専於京衛開中唯雲南金齒衛楚雄府四川鹽井衛陜西甘州衛開中如故不數年京衛糧米充羡而大軍征安南多費甘肅軍糧不敷百姓疲於轉運逮安南新附餉益難繼於是諸所復召商中鹽他邊地復以次及矣仁宗立以鈔法不通議所以斂之之道户部尚書夏原吉請令有鈔之家中鹽宣宗宣德元年停中鈔例三年夏原吉以北京官吏軍匠糧餉不支條上預備策言中鹽舊例太重商賈少至請更定之乃定每引自二斗五升至一斗五升有差召商納米北京英宗正統三年寧夏總兵官史昭以邊軍缺馬而延慶平凉官吏軍民多飬馬乃奏請納馬中鹽上馬一匹與鹽百引次馬八十引既而定邊諸衛遞增二十引其後河州中納者上馬二十五引中減五引松潘中納者上馬三十五引中減十引久之復如初制中馬之始驗馬乃掣鹽既而納銀於官以市馬銀入布政司宗祿屯糧修邊賑濟展轉支銷銀盡而馬不至而邊儲亦自此告匱矣於是召商中淮浙長蘆鹽以納之令甘肅中鹽者淮鹽十七浙鹽十三淮鹽惟納米麥浙鹽兼收豌豆青稞淮鹽直貴商多趨之故令淮浙兼中然舊例中鹽户部出榜召商無徑奏者富人吕銘等託勢要奏中兩淮存積鹽中㫖允之户部尚書馬昻不能藝正鹽法之壞自此始由是勢豪多攙中商人失利江南北私販愈多課亦漸減憲宗末宦侍竊勢奏討淮浙鹽無算兩淮積久至五百餘萬引商引壅滯户部及巡鹽御史屢有建白終無補益後清理兩淮鹽法侍郎請令商人買餘鹽補官引按餘鹽乃竈户正課外所餘之鹽或係不取正課者且停各邊開中蓋以餘鹽補充正課而鹽法一小變然是後餘鹽盛行正鹽守支日久願中者少餘鹽第領勘合即時支賣願中者多自𢎞治時以餘鹽補正課初以償逋課後令商人納價輸部濟邊至世宗嘉靖時延綏用兵遼左缺餉盡發兩淮餘鹽之引於二邊開中自是餘鹽行又設處置科罰名色於是正鹽未𣲖先估餘鹽商竈俱困給事中管懷理言鹽法之壞其弊有六開中不時米價騰貴召糴之難也勢豪大家専擅利權報中之難也官司科罰吏胥侵索輸納之難也下場俟掣動以數年守支之難也定價太昻息不償本取贏之難也私鹽四出官鹽不行市易之難也有此六難正課壅矣而司計者因設餘鹽以佐之餘鹽利厚商固樂從然不以開邊而以解部雖嵗入巨萬無益軍需嘗考祖宗時商人中鹽納價甚輕而竈户煎鹽工本甚厚今鹽價十倍於前而工本不能十一何以禁私鹽使不行也故欲通鹽法必先處餘鹽欲處餘鹽必多減正價大抵正鹽賤則私販自息定價之後不必解赴太倉俱令開中關支餘鹽以盡收為度正鹽價輕既利於商餘鹽收盡又利於竈未有商竈既利而國課不充者也事下所司户部復以為餘鹽銀仍解部如故而邊餉益虛矣神宗萬厯二十六年以鴻臚寺主簿田應璧奏命中官魯保鬻沒官餘鹽給事中包見捷極陳利害不聽保既視事遂議開存積鹽户部尚書楊俊民言明㫖核沒官鹽而存積非沒官也額外加增必虧正課保奏不可從御史馬從聘亦爭之俱不聽保乃開存積鹽越次超掣壓正鹽不行商民大擾而姦人爭起董璉吳應麒等爭言鹽利山西福建諸稅監皆領鹽課而鹽法更壞至莊烈帝崇禎中給事中黃承昊條上鹽政頗欲有所釐革時兵餉大絀迄不能行鐵課自宋時稍弛無一定稅法孝宗乾道四年謝師稷為福建提刑奏免輸鐵葉錢遼太祖父色勒迪始置鐵冶教鼓鑄太祖併室韋其地産銅鐵其人善作銅鐵器又有哈凖部多鐵部置三冶及征幽薊師還次山麓得銀鐵命置冶後得東平縣本漢襄平縣故地産鐵置採鍊者三百户隨賦供納及征渤海遷其民於遼城建長樂縣民四千户令一千户納鐵又廣州本渤海鐵利府太祖改曰鐵利州亦多鐵置冶興宗重熙二年禁夏國使沿路私市金鐵道宗清寧八年禁南京不得私貨鐵咸雍六年禁鬻生熟鐵於回紇卓木布等界金太祖開國之初稅牛具耕器海陵正隆三年遣使檢視諸路鐵冶章宗泰和時李復亨奏民間銷毁農具以給軍器臣竊以為未便汝州魯山保豐鄧州南皆産鐵募工置治可以獲利且不厲民從之元世祖中統三年諸王塔齊爾請置鐵冶從之六月敕武寧軍嵗輸産鐵又立小峪蘆子武寧軍赤泥泉鐵冶四所至元四年阿哈瑪特請興河南等處鐵冶以漏籍户一萬八千八百附籍四千三百各處起冶嵗課鐵四百八十萬七十斤又以禮部尚書摩和納領已括户三千興煽鐵冶嵗輸鐵一百三萬七十斤就鑄農器二十萬事易粟四萬石輸官河南隨處城邑市鐵之家令仍舊鼓鑄十二年阿哈瑪特等以軍興國用不足議復立都轉運司量增課程元額鼓鑄鐵器官為局賣又立鐵冶總管府從綦公直言設冶場於伯什巴里鼓鑄農器成宗元貞元年又置河東山西鐵冶提舉司武宗至大元年罷順德廣平鐵冶提舉司聽民自便有司稅之如舊後各路所設鐵冶之官或歸中政院或仍以其事𨽻有司或以年饑而免其課皆因時制宜無定制也然設法較各代差詳其鐵之等亦不一有生黃鐵生青鐵青瓜鐵蕳鐵其制鐵法亦有引如鹽例禁私販之條較鹽法稍輕云明太祖洪武六年置江西進賢新喻分宜湖廣興國黃梅山東萊蕪廣東陽山陜西鞏昌山西吉州二太源澤潞各一凡十三所嵗輸鐵七百四十六萬餘斤河南四川亦有鐵冶繼又益以茶陵十五年廣平吏王允道言磁州産鐵元時置官嵗收百餘萬斤請如舊帝以民生甫定復設必重擾杖而流之海外十八年罷各布政司鐵冶既而工部言山西交城産雲子鐵舊貢十萬斤繕治兵器他處無有乃復設已而武昌吉州以次復焉後以工部言復盡開令民得自採鍊每三十分取其二永樂時設四川龍州遼東都司三萬衛鐵冶孝宗𢎞治十七年廣東歸善縣請開鐵冶有司課外索賂因以致亂旋復討平武宗正德十四年廣州置鐵厰以鹽課提舉司領之禁私販如鹽例世宗嘉靖二十四年開建寧延平諸府鐵冶隆萬以後率因舊制未嘗特開恐致擾也欽定續通典卷十四
