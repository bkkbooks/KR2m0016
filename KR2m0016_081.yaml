body:
  text: 禮凶三公諸侯大夫降服議隋唐宋明隋劉炫為散騎尉吏部尚書牛𢎞建議以為禮議侯絶旁期大夫降一等今之上柱國雖不同古諸侯比大夫可也官在第二品宜降旁親一等議者以為然炫駁之曰古之仕者宗一人而已庶子不得進繇是先王重適其宗子有分祿之義族人與宗子雖疏逺猶服齊衰三月良由受其恩也今之仕者位以才升不限適庶與古既異何降之有今之貴者多忽近親若或降之民德之疏自此始矣遂寢其事杜典不載今補纂唐制皇家所絶旁親無服者皇弟皇子為之皆降一等宋王安石降服議先王制服順性命之理而為之節恩之深淺義之逺近皆於此乎權之貴之與賤或降或絶或否蓋在先王之時諸侯大夫各君其父兄欲尊尊之義有所申則宜親親之恩有所屈此其所以降絶之意也自封建之法廢諸侯大夫降絶之禮無所復施士大夫無宗其適孫傳重之屬不可純用周制臣愚以為方今惟諸侯大夫降絶之禮可廢而適子非傳爵者無衆子乃可於適孫承重明世宗嘉靖十三年孟夏享太廟先期命侍郎顧鼎臣霍韜捧主會鼎臣韜皆有期功之服上言臣等考之古禮期服諸侯絶大夫降今之公卿即古之諸侯而猶有期制非禮也若律言緦麻以上皆不與祭者謂其身蒞之者也而百官聞期功之訃不過私家為位及踰月則無容於避矣帝命禮官考議於是尚書夏言奏曰古之諸侯建邦啓土世有其國伯叔兄弟皆其臣也故期可絶今之所謂公卿者在位則為公卿釋位乃為族屬無君道以臣其伯叔兄弟喪服之制人情所由生豈以在位釋位而有隆殺哉夫哀有淺深故服有輕重定之三月以哀不能忘於三月也定之期年以哀不能忘於期年也而祭祀吉禮所以致敬於神明若情未忘哀則不能專誠於祭故不與也今以其身不􅊩喪與夫時之過者皆無可避臣未之前聞禮曰小功緦麻執事不與二臣所服之喪非小功緦麻皆服之重者也太廟捧主又禮之重者也以服之重而與夫禮之重者焉得謂之知禮臣等職司典禮敢不據經守正以嚴瀆踰之防疏入詔鼎臣韜回避以侍郎黃宗明林㭿代之奔喪及除喪而後歸制宋宋政和禮奔喪之禮始聞親喪以哭答使者盡哀問故又哭盡哀服布深衣素冠遂行父母之喪見星而舍若未得奔則成服而後行至家內外哭待於堂上奔喪者入門而左升自西階殯東西面憑哭盡哀少退再拜退於序東披髮復位坐哭又盡哀尊卑撫哭如常訖內外各還次奔喪者乃還如未成服者三日成若至在小斂前與主人俱成服小斂以後自用日數賔弔拜賔如常奔喪者非主人則主人為之拜賔不及殯則先之墓北面近墓哭主人以下待於墓左西面主婦以下於墓右東面皆北上奔喪者哭盡哀再拜於墓東披髮復位哭盡哀贊者告禮畢奔喪者又再拜遂冠而歸入門而左升自西階靈東西向憑靈哭主人以下升哭如常盡哀再拜各還次三日成服司馬光書儀始聞親喪以哭答使者盡哀問故又哭盡哀裂布為四腳白布衫繩帶麻屨遂行日行百里不以夜行惟父母之喪見星而行見星而舍道中哀至則哭避市邑喧繁之處望其州境哭望其縣境哭望其城哭望其家哭入門升自西階至殯前再拜哭盡哀乃就位方去冠及上服被髮扱衽徒跣如始死之儀詣殯東西面坐哭盡哀乃就東方袒括髮又哭盡哀丈夫婦又之待之也皆如朝夕哭位無變也既哭奔喪者復著布四腳布衫拜諸尊長及受諸卑幼拜皆哭盡哀明日後日朝夕哭猶袒括髮至家四日乃成服而朝哭有弔賓至則出見之可也若未得行須應過三日以上者則為位不奠被髮扱衽徒跣皆如始死之儀明日斬衰者袒括髮齊衰以下袒免代哭皆如小斂之儀聞喪後四日成服而朝哭皆如在家之儀道中及至家惟不去冠及上服被髮扱衽徒跣袒括髮其餘皆如未成服之儀入門至殯前北面再拜哭盡哀拜諸尊長又受諸卑幼拜皆哭盡哀弔賓至即出見之若奔喪者不及殯則先之墓望墓而哭至墓北面哭盡哀再拜在家丈夫之待之也即位於墓左婦人墓右皆哭盡哀未成服者去布四腳及布衫袒括髮於墓東南即本位又哭盡哀復著布四腳衫拜尊長及受卑幼拜如上儀遂歸至家入門去布四腳及布衫袒括髮至靈座前北面哭盡哀如未葬之儀已成服者不袒括髮齊衰以下聞喪則為位而哭若奔喪則釋去華盛之服裝辦即行緩速惟所欲既至齊衰望鄉而哭大功望門而哭小功以下至門而哭入門始至殯前北向哭盡哀再拜乃易所服之服即本位又哭盡哀乃見諸尊長及卑幼拜哭如主人儀若不奔喪則齊衰始聞喪三日中朝夕為位會哭四日之朝成服又為位會哭大功以下始聞喪為位會哭成服又為位會哭自是每月朔為位會哭月數既滿次月朔為位會哭遂除服其聞喪至各哭固無常準齊衰以上自有喪以來親戚未常相見者既除服而相見不變服各哭盡哀然後斂拜朱子家禮明會典同士為所生母服議宋明宋真宗大中祥符八年樞密使王欽若言太常博士祕閣校理聶震丁所生母服適母尚在望特免持服禮官言按周制庶子在父之室則為其母不禫晉解遂問蔡謨曰庶子喪所生適母尚存不知制服輕重答云士之妾子服其母與凡人喪母同鍾陵胡淡所生母喪自有適兄承統而適母存疑不得三年問范宣答曰為慈母且猶三年况親所生乎適母雖尊然厭降之制父所不及婦人無專制之事豈得引父為比而屈降支子也南齊禇淵遭庶母郭氏喪葬畢起為中軍將軍後適母吳郡公主薨葬畢今攝職則震當解官行服心喪三年明會典改入斬衰三年臣等謹案齊衰三年首言父卒則為母下即及繼母慈母知妾子之母亦包於為母之中也惟大夫之妾子公子之於母為尊厭降庶子為父後不敢服於私親經表此三者之異則士而下與不為後者之從同不必言也小記云庶子在父之室則為其母不禫是生母之服父在期而父卒三年當與繼母慈母一例而推矣大夫士為慈母服議明明董應舉湛誠慈母如母服議家禮三父八母圖慈母齊衰三年蓋義服也而律亦有為慈母服之説但家禮慈母注云所生母死父令别妾撫育者謂之慈母當服三年而父妾乳哺者謂之乳母只服緦麻迹雖相似而恩有淺深服有輕重今湛誠所丁憂者顧氏乃其父之媵妾有子則當杖期無子則當緦麻總有撫抱之恩亦當先請後服臣等謹案禮有慈母之條非僅謂母死父使他妾乳之也乃父命之為母子故行三年之服觀小記為慈母後之語義自可見家禮於慈母條下謂庶子無母父命他妾之無子者慈已明會典於慈母條下謂母卒父命他妾養己者似與古所謂庶母慈己者無異又何以有三年小功之别乎蓋父之命妾命子正是命之為後小記更有為祖庶母後一語則知慈母如母自與庶母慈己者逈别故曰貴父之命也然雖云如母而記稱不世祭有不得盡同於母者矣繼適母黨服臣等謹案禮有適母無繼嫡母之文蓋自前母之子視之則為繼母自庶子視之則正繼皆為適也故開元禮政和禮家禮孝慈録明會典俱統於庶子為適母之父母兄弟姊妹條內小功五月適母亡則不服妻已亡為妻父母服議五代宋後唐末帝清泰三年太常博士段顒言妻之父母舊服緦麻今給假令式服小功下尚書省集議左僕射劉昫等奏上諸服紀請一依開元禮從之宋朱子家禮及明會典妻亡而别娶亦服妻之親母雖嫁出猶服總論為人後議明明邱濬曰古人大宗無子則以族人之子繼之而不及小宗大明令及律雖許同宗立嗣然皆謂其人生前自立而無死後追立之文聖祖之意蓋以興滅繼絶必前代帝王功臣賢人之後不可不使血食也先王制禮不下庶人今庶人之家若生前將昭穆相應之人自幼鞠養者從其自便既死之後告爭承繼者無非利其財産而已若死者係軍匠籍雖脅之使繼彼肯從哉今宜敕禮官定制若前代名人之後或在今曽有大名顯宦者以宗法為主先求繼禰小宗次繼祖之宗次繼曽祖之宗次繼高祖之宗四宗俱無人然後及疏逺及同姓之人若其人生前或養同宗之子世系雖逺而昭穆不失序不必更求其有鞠育之恩氣雖不純而心已相孚故也又凡為人後承父之命方許出繼已孤之子不許所以然者為人後者為之子既為之子則稱其所生為伯叔不承父命而輒稱己父母為伯叔可乎是貪利而忘親也如此則傳序既明而爭訟亦息矣田汝成立後論曰古稱為父後者非謂諸子皆可以為父後也必適子乃足以當之適子者大宗小宗之統也身為小宗之適則五服之親皆其所統故禮曰適子不得後大宗以支子可也而漢初之詔賜氏為父後者爵一級蓋適子之謂也古稱立後者非謂昆弟無子者人人為之立後也惟大宗乃舉之故禮曰大宗不可絶故族人以支子後大宗非大宗而立後者蓋義舉也於禮未之有聞也古稱為大宗後者非必親昆弟之子也有以從昆弟之子後從世父者矣有以諸孫後祖者矣有以諸曽孫後曽祖者矣有以諸玄孫後高祖者矣故禮曰為人後者斬衰三年不名所後為父者以所後不定難以預著其名也後世宗法不名而適子庶子皆稱父後立後之義不明而同居異居昆弟之無子者皆為立後稱謂之義不明而為人後者伯父叔父皆易為父而以孫後祖以無服之孫後逺祖者禮既不行名亦不著非先王之本旨矣近親無繼官為繼絶議宋宋哲宗元祐時南郊赦文户絶之家近親不為立繼者官為施行徽宗大觀四年詔曰孔子謂興滅繼絶天下之民歸心王安石子雱無嗣有族子棣已嘗用安石孫恩例官可以棣為雱後以稱朕善善之意間代立後議晉宋晉侍中荀顗無子以從孫徽嗣中興初以顗兄玄孫序為顗後封臨淮公杜典不載今補纂宋神宗元豐中國子博士孟開請以姪孫宗顔為孫又王彥林請以弟彥通為叔祖母宋繼絶孫詔皆如所請臣等謹案雷次宗釋儀禮為人後者之文以為不言所後之父者或後祖或後高曽凡諸所後皆備於其中庾純云為人後者三年或為子或為孫若荀太尉養兄孫以為孫是小記所謂為祖後者同三年也杜典載宋庾蔚之謂間代取嗣古未之聞然自夫子之告子遊已謂三代已後各親其親各子其子自非大宗五世親盡則族屬絶茍兄弟之子無當立者舍弟兄之孫弗立其於一氣感召之義何故昭穆相續其常也不得已而立從孫為孫如父子之誼仍不改其昭穆之倫毋亦勢之不得不然歟夫為祖曽祖高祖父母持重妻從服議宋明宋朱子家禮明會典孝慈録無正文惟妻從夫族服圖凡諸承重並從夫服臣等謹案杜典載虞喜之論云玄孫為後其母尚存玄孫之婦猶為庶不得傳重傳重之服理當在姑竊以儀禮喪祭稱主人者皆宗子也稱為主婦者皆宗子之妻也此之謂夫婦親之故父死母為內主者惟子幼未取者耳已取未有不主重者也主重未有不從服者也縱玄孫為後妻主姑存者重在為主虞喜之論未為達禮出後者為本父母服議隋宋隋永寧令李公孝四歲喪母九歲外繼其後父更别娶後妻案父乃本生父也至是而亡河間劉炫以無撫育之恩議不解任劉子翊駁之曰傳云繼母如母典母同也當以配父之尊居母之位齊杖之制皆如親母又為人後者為其父母期報期者自以本生非殊親之與繼也父雖自處旁尊之地於子之情猶須隆其本重是以令云為人後者為其父母並解官申其心喪父卒母嫁為父後者雖不服亦申心喪其繼母嫁不解官此專據嫁者生文耳將知繼母在父之室則制同親母若謂非有撫育之恩同之行路何服之有乎服既有之心喪焉可獨異三省令旨其義甚明今言令許不解何其甚謬且後人者為其父母期未有變隔以親繼親繼既等故知心喪不殊服問云母出則為繼母之黨服豈不以出母族絶推而逺之繼母配父引而親之乎子思曰為伋也妻是為白也母不為伋也妻是不為白也母定知服以名重情因父親所以聖人敦之以孝慈𢎞之以名義是使子以名服同之親母繼以義報等之已生如謂繼母來在子出之後制有淺深者考之經傳未見其文譬出後之人所後者初亡後之者始至此復可以無撫育之恩而不服重乎奏入從子翊之議案明邵寶曰繼母以父重嫁母以父輕出母以父絶以義制恩而服之隆殺從之禮也杜典不載今補纂宋中丞何淡所生父繼室周氏死淡欲服伯母服下太常百官雜議吕祖儉遺書宰相曰禮曰為伋也妻者是為白也母今周氏非中丞父之妻乎將不謂之母而謂之何中丞為風憲首而以不孝令百寮何觀焉案伯母服期所生父繼室亦服期淡欲服伯母服者不肯解官申心喪耳祖儉以不孝刺之得其情矣出後子為本親服議臣等謹案為人後者為本生祖父母服此恆有之事乃禮書及律文並不言及何也以為出後者於本宗概降一等故不必言耶何以於本宗兄弟與出嫁之姊妹本宗之外祖父母又歷歷言之蓋使所後者而為父之親昆弟則祖即吾之祖自不必言若使所後者而為父之從昆弟或再從并五服外之昆弟則依所後之倫序而降將有降為緦麻及無服者矣此疑似難明之際正不可不為辨别據禮文皆云為人後者於本生諸親例降一等故王彪之崔凱之議以為本生祖父母應降服大功但禮無明文當以義起旁殺下殺之服可降而上推則追本所生不得從所後遞殺夫女子出適為其父母服期者三年之喪無二斬也而於祖父母則不降為其上推也此可類舉而互證耳為庶子後為庶祖母承重服議北魏宋明魏廣陵王恭北海王皓疑為所生祖母服期與三年博士執意不同詔羣寮會議按魏書禮志熙平二年十一月乙丑大尉清河王懌表奏二王制服輕重不同乞為定制下禮官議張普惠議曰謹案二王祖母皆受命先朝為二國太妃可謂受命於天子為始封之母矣喪服慈母如母在三年章傳曰貴父命也鄭注云大夫之妾子父在為母大功則士之妾子為母期父卒則皆得申此大夫命其妾子以為母所慈猶曰貴父命為之三年况天子命其子為列國王其所生母為國太妃反自同公子為母練冠之與大功乎輕重顛倒不可之甚者也傳曰始封之君不臣諸父昆弟則當服其親服若魯衛列國相為服期判無疑矣何以明之喪服君為姑姊妹女子子嫁於國君者傳曰何以大功尊同也尊同則得服其親服諸侯之子稱公子公子不得禰先君然則兄弟一體位列諸侯自以尊同得相為服不為還準公子逺厭天王故降有四品君大夫以尊降公子大夫之子以厭降名例不同何可亂也禮大夫之妾子以父命慈已申其三年大妃既受命先帝光昭一國二王胙土茅社顯錫大邦舍尊同之高據附不禰之公子雖許蔡失位亦不是過服問曰有從輕而重公子之妻為其皇姑公子雖厭妻尚獲申况廣陵北海論封則封君之子語妃則命妃之孫承妃纂重逺别先皇更以先后之正統厭其所生之祖適方之皇姑不以遙乎今既許其申服而復限之以期比之慈母不亦爽歟經曰為君之祖父母父母妻長子傳曰何以期父母長子君服斬妻則小君父卒然後為祖後者服斬今祖乃獻文皇帝諸侯不得祖之母為太妃蓋二王三年之證議者近背正經以附非類差之毫毛所失或逺且天子尊則配天莫非臣妾何為命之為國母而不聽其子服其親乎記曰從服者所從亡則已又曰不為君母之黨服則為其母之黨服今所從既亡不以親服服其所生則屬從之服於何所施若以諸王入為公卿便同大夫者則當今之議皆不須以國言也今之諸王自同列國雖不之國别置臣僚玊食一方不得以諸侯言之敢據周禮輒同三年杜典不載今補纂宋仁宗寶元二年度支判官集賢校理薛紳言祖母萬壽縣太君王氏卒是先臣所生母服紀之制罔知所適乞降條制庶知遵守詔送太帝禮院詳定禮官言五服年月敕齊衰三年為祖後者祖卒則為祖母又曰齊衰不杖期為祖父母注云父之所生庶母亦同惟為祖後者不服又案通禮義纂為祖後者父所生庶母亡合三年否記云為祖母也為後三年不言適庶然奉宗廟當以貴賤為差祖庶母不祔於皇姑已受重於祖當為祭主不得申於私恩若受重於代父而養為後可也又曰祖庶母合從何服禮無服祖庶母之文有為祖庶母後者之服晉王廙議曰受命為後則服之無嫌婦人無子託後族人猶為之服况其子孫乎人莫敢卑其祖也且子父沒為母得申三年孫無由獨屈當服之也看詳五服年月敕不載持重之文於義纂即有所據今薛紳不為祖後受重於父合申三年之制史館檢校同知太常禮院王洙言五服年月敕與新定令文及通禮正文內五服制度皆聖朝典法此三處並無為父所生庶母服三年之文惟義纂者是唐世蕭嵩王仲邱等撰集非創修之書未可據以決事且所引兩條皆近世諸儒之説不出於六經臣已别狀奏駁今薛紳為映之孫耀卿為别子始祖紳繼别之後為大宗所守至重非如次庶子等承傳其重者也不可輒服父所生庶母三年之喪以廢始祖之祭也臣謹案禮經所謂重者皆承後之文據義纂稱受重於父亦有二説一者適長子自為正體受重可知二者或適長亡取適或庶次承傳父重亦名為受重也若繼别子之後自為大宗所承至重不得更逺繫祖庶母為之服三年惟其父以生己之故為之三年可也詳義纂所謂受重於父者指適長子亡次子承傳父重者也但其文不同爾詔太常禮院與御史臺詳定聞奏衆官參詳耀卿王氏子紳王氏孫尤親於慈母庶母祖母祖庶母也耀卿既亡紳受重代養當服之也又薛紳頃因籍田覃恩乞將敘封母氏恩澤回授與故父所生母王氏其薛紳官爵未合敘封祖母蓋朝廷以耀卿已亡紳是長孫敦以孝道特許封邑豈可王氏生則輒邀國恩沒則不受重服况紳被王氏鞠育之恩體尊義重合令解官持齊衰三年之服詔從之明臧應奎為南京車駕主事以祖庶母喪求去例不得持重猶服私喪三年以重所自出姚翼家規曰承重者主宗廟之灌鬯也庶孫不為祖後不得加斬於生祖母雖無適孫而庶孫承重亦不概及於生祖母蓋庶子服生母斬衰為其生育之恩與父均也非為其與父共承宗廟也何為而及於生祖母乎至於庶孫繼祖即不得服生祖母則宋庾蔚之之言本朝典法無考只守齊衰不杖期之本服為是臣等謹案承重之服祗於正適概不及庶杜典載庾蔚之之論明矣魏廣陵北海二太妃為始封之君母受命歸國諸侯不敢祖天子則太妃是為二王之祖母故議以持重三年宋薛紳明臧應奎皆以私恩加服禮官不能以義繼也姚氏家規其知禮歟並有父母之喪議宋明宋真宗天禧四年御史臺言文武官辨丁憂者相承服五十四月别無條例下太常禮官議曰案禮喪服小記云父母之喪偕先葬者不虞祔待後事其葬服斬衰注謂同月若同日死也先葬者母也其葬服斬衰者喪之隆哀宜從重也假令父死在前月而同月葬猶服斬衰不葬不變服也言其葬服斬衰則虞祔各以其服矣及練祥皆然卒事反服重雜記云有父之喪如未沒喪而母死其除父之喪也服其除服卒事反喪服注云沒猶終也除服謂祥祭之服卒事既祭反喪服服死者之服晉杜預賀循之議同按杜預賀循議已載杜典臣等參考典故則是隨其先後而除之無通服五十四月之文請依舊禮改正明王廷相曰並有父母之喪如之何曰父已葬而有母之喪則服母之服既虞也反服父之服既練也則服母之服不以輕掩重也其除父之喪也服其除服卒事反服母服母先而父後也亦如之宋纁曰母喪未葬而值父之二祥則不得服祥服以祥祭為吉未葬為凶不忍於凶時行吉禮也居母喪遭父喪者亦然有適母喪而所生母死為服位議宋宋司馬光曰人居適母之喪而所生母卒疑其所以為服案雜記云有三年之練冠則以大功之麻易之又云有父之喪如未沒喪而母死其除父之喪也服其除服卒事反喪服雖諸父昆弟之喪如當母之喪其除諸父昆弟之喪也皆服其除喪之服卒事反喪服是先有喪而重有者皆當别為服也又曽子問曰並有喪如之何何先何後孔子曰其葬也先輕而後重其奠及虞先重而後輕此謂遭同月者也今之律令適繼慈養與母同例皆應服齊衰三年子之於母適庶雖殊情無厚薄固當同服而喪服小記云妾祔於妾祖姑蓋古妾與女君尊卑殊絶設位於他所可也居重喪遭輕喪易服議宋明宋司馬光書儀若重喪未滿而遭輕喪則制輕喪之服而哭之月朔輒為位服而哭之既畢反重服其除之也亦服輕服若除重喪而輕未除則服輕服以終其餘日政和禮家禮同明邵寶喪禮雜記喪有常服而所遭不能無變變之所值服之所難故服有成有受有練有禫其常也有易有包有特有重有兼其變也三日斂而成服期小祥而練除首之絰受以功衰又期而大祥中月而禫當其時服其服所謂常也如此是固庸於論者惟夫斬衰之喪既虞卒哭而遭齊喪則男子有易要絰婦人有易首絰所謂包者男子有仍首絰婦人有仍要絰所謂特者既練遭大功之喪有男婦首要皆麻所謂重麻者有男婦首要皆葛所謂重葛者齊喪虞卒哭遭大功之喪男以功麻易齊帶之葛婦以功麻易齊首之麻而要猶齊葛所謂兼服者有斬葛齊麻前喪既葬後喪初斂男要婦首易而兼服者彼一時也此一時也物以時變新故重輕參伍伸屈而無失乎恩義之中所謂變也又如此夫是之謂難茍類而推之則一人之身周旋五服之內雖日有變不虞也而况其常乎臣等謹案古人先有重喪後遭輕喪其所變易者不過絰帶而已衰與冠固不變也至後世則更新喪之衰而並不言絰帶是有禮之一變也居所後父喪有本親喪服議明明王廷相曰有所後父之喪而本生父母亡如之何曰已殯則服其服而往哭之襲而歸反喪服已葬則俟其殯而歸反喪服其除喪也服其除服卒事反喪服曰不亦輕本生乎曰禮有所重斬不可以離次也欽定續通典卷八十一
