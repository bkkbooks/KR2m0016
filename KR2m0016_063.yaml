body:
  text: 禮嘉皇太后皇后車輅宋金明宋因唐制皇后車六等一曰重翟二曰厭翟三曰翟車四曰安車五曰四望車六曰金根車厭翟車箱上有平盤四角曲欄盤兩壁紗窗龜文金鳯翅前有虛匱香爐香寶緋繡幰衣絡帶門簾三轅鳯首畫梯推竿行馬緋繒裹索駕六馬金銅面纓轡鈴攀緋屜駕士三十人武辨緋繡衫徽宗政和三年議禮局上皇后車輿之制重翟車青質金飾諸末間以五采輪金根朱牙其箱飾以重翟羽四面施雲鳯孔雀刻鏤龜文頂輪上施金立鳯耀葉青羅幰衣一紫羅畫雲龍絡帶二青絲絡網二紫羅畫帷一青羅畫雲龍夾幔二車內設紅褥及坐橫轅上施立鳯八香匱設香爐香寶香匱飾以螭首前後施簾長轅三飾以鳯頭青繒裹索駕青馬六馬有銅面插翟羽鞶纓攀胸鈴拂青屜青包尾若受冊謁景靈宫則乘之厭翟車赤質其箱飾以次翟羽紫幰衣紅絲絡網紅羅畫絡帶夾幔錦帷餘如重翟車駕赤騮四若親蠶則乘之翟車黃質車側飾以翟羽黃幰衣黃絲絡網錦帷絡帶餘如重翟車駕黃騮四安車赤質金飾間以五采刻鏤龜文紫幰衣錦帷絡帶紅絲絡網前後施簾車內設褥及坐長轅三飾以鳯頭駕赤騮四凡駕馬鞶纓之飾並從車質四望車朱質青幰衣餘同安車駕牛三金根車朱質紫幰衣餘同安車駕牛三自重翟車以下備鹵簿則以次陳設臣等謹案遼元皇后之車輅皆不著于史遼之國輿于納后儀見皇后就車于祭山儀見太后乘總纛車而其制亦無考焉金皇后之車六一曰重翟車青質金飾金塗銅鈒花葉段裝釘耀葉二十四明金立鳯一紫羅銷金生色寶相帷一青羅青油幰衣各一朱絲絡網紫羅明金生色雲龍絡帶各二兩箱明金五彩間裝翟羽二金塗䃋石長轅鳯頭三橫轅立鸞八香爐香寶子一副宜男錦帶結朱漆杌子踏床各一扶板扶魚一副紅羅明金衣褥紅羅襯褥一青羅行道褥四青羅明金生色雲鳯夾幔一紅羅明金緣紅竹簾二金塗銅葉斷行馬二朱紅漆金塗銀葉裝釘梯一青羅梯尋儀褥二踏道褥十青絹裹大麻索二油䝉帕一二曰厭翟車赤質倒仙錦帷一紫羅紫油幰衣各一朱絲絡網宜男錦絡帶各二餘同重翟惟行道夾幔尋儀褥羅及裹索等用紅三曰翟車黃質金飾䃋石葉段裝釘宜男錦帷黃羅油幰衣䃋石長轅鳯頭三無橫轅立鸞餘同厭翟而羅色用黃四曰安車赤質倒仙錦帷紫油幰衣朱絲絡網天下樂錦絡帶䃋石長轅鳯頭三無橫轅立鸞及香爐香寶子餘同翟車而色皆用紅五曰四望車朱質宜男錦帷青幰衣轅端螭頭二餘並同安車六曰金根車朱質紫羅紫油幰衣朱絲倒仙錦絡帶各二踏床褥用紅綾衣尋儀褥踏道褥並用綾餘並同安車又有九龍車一高二丈廣一丈一尺長二丈六尺五鳯車四各高一丈八尺長廣如之圓輅車一方輅車一重簷車一各高一丈七尺長一丈八尺廣八尺皆駕馬四駕士各五十人並平巾幘生色青緋黃三色寶相花三銀褐抹帶大口袴案宇文懋昭大金國志金后妃並用殿車其車如五花樓之狀上以錦緣青氊為蓋四圍以簾秋冬亦用氊並用錦緣柱廊月板護泥皆飾以金玉或四輪或兩輪並用朱車之四角后用金鳯妃用金孔雀所載與史差異附識之以資考核云明制皇后輅高一丈一尺三寸有竒平盤前後車􅎉並雁翅四垂如意滴珠板轅長一丈九尺六寸皆紅髹轅用抹金銅鳯頭鳯尾鳯翎葉片裝釘平盤左右垂護泥板每輪輻十有八皆紅髹輞以抹金鈒花銅葉片裝釘車轂用抹金銅鈒蓮花瓣輪盤裝釘軸中纒黃絨駕轅諸索輅亭高五尺八寸有竒紅髹四柱檻座上沈香色描金香草板十二片前左右有門高四尺五寸有竒廣二尺四寸有竒門旁沈香色線金菱花槅各二下絛環板有明栨抹金銅鈒花葉片裝釘後紅髹五山屏風創金鸞鳯雲文屏上紅髹板創金雲文中裝雕木渾貼金鳯一屏後紅髹板俱用抹金銅鈒花葉片裝釘亭底紅髹上施紅花毯紅錦褥席紅髹坐椅一靠背雕木線金五彩裝鳯一上下香草雲板各一紅福夀板一并褥椅中黃織金綺靠坐褥四周有椅裙施黃綺帷幔外用紅簾十二扇前二柱創金上寶相花中鸞鳯雲文下龜文錦輅頂并圓盤高二尺有竒抹金銅立鳯頂帶仰覆蓮座垂攀頂黃線圓絛四盤上紅髹下四周沈香色描金雲文內青地五彩雲文以青飾輅蓋內寶蓋紅髹匡鬭以八頂冒以黃綺頂心及四周繡鳯九并五彩雲文天輪三層紅髹上雕木貼金邊耀葉板七十二片內飾青地雕木五彩雲鸞鳯文三層間繪五彩雲襯板七十二片下四周黃銅裝釘上施黃綺瀝水三層間繡鸞鳯文四垂青綺絡帶繡鸞鳯各一圓盤四角連輅座板用攀頂黃線圓絛四輅亭前後有轉角䦨干各二扇內嵌絛環板皆紅髹計十二柱柱首雕木紅蓮花線金青緑裝蓮花抱柱其踏梯行馬之屬與大馬輦同大馬輦見下篇安車其制高九尺七寸有竒平盤前後車櫺並雁翅板轅二長一丈六尺七寸有竒皆紅髹用抹金銅鳯頭鳯尾鳯翎葉片裝釘平盤左右垂護泥板及輪二貫軸一每輪輻十有八皆紅髹軸中纒黃絨駕轅諸索車亭高四尺四寸紅髹方柱四上裝五彩花板十二片前左右有門高三尺七寸有竒廣二尺二寸有竒門旁紅髹十字槅各二後三山屏風屏後壁板俱紅髹用抹金銅鈒花葉片裝釘亭底紅髹板上施紅花毯紅錦褥四周施黃綺帷幔外用紅簾四扇車蓋用紅髹抹金銅寶珠頂帶蓮座高六寸四角抹金銅鳯頭用攀絛四並紅髹木魚蓋施黃綺瀝水三層銷金鸞鳯文鳯頭下垂紅帉錔其踏梯行馬幰衣與輅同宋皇太子親王車輅皇太孫附宋遼金明宋皇太子車輅之制一曰金輅車二曰軺車三曰四望車太宗至道初真宗為皇太子謁太廟乘金輅常朝則乘馬真宗天禧中仁宗為皇太子亦同此制徽宗政和三年議禮局上皇太子車輅之制金輅赤質金飾諸末重較箱畫苣文鳥獸黃屋伏鹿軾龍輈金鳯一在軾前設障塵朱蓋黃裏輪畫朱牙左建旗九旒右載闟㦸旗首飾金龍頭銜結綬及鈴綏八鸞在衡二領在軾駕赤騮四金鍐方釳插翟尾鏤錫鞶纓九就從祀謁太廟則供之軺車金飾諸末紫油通幰紫油纁朱裏駕馬一四望車金飾諸末青油通幰青油纁朱裏朱絲絡網駕馬一軺車四望車以次列於鹵簿仗內親王乘象輅遼皇太子金輅從祀享正冬大朝納妃用之冊皇太子儀乘黃令陳金輅皇太子升降金輅軺車金飾紫幰朱裏駕一馬五日常朝享宫臣出入行道用之四望車金飾紫油纁通幰駕一馬弔臨用之金世宗大定六年奏皇太子金輅典故制度奉敕詳定輈旗旗首及應用龍者更以麟為飾省去障塵等物上用名件色數依上公以九為節軾前金龍改為伏鹿軾上坐龍改為鳯簾褥用黃羅處改為梅紅其制並與宋皇太子金輅同皇帝輅自頂至地高一丈七尺今減閷四分之一為一丈三尺二寸修廣之閷亦如之明皇太子金輅高一丈二尺二寸有竒廣八尺九寸轅長一丈九尺五寸輅座高三尺二寸有竒平盤滴珠板輪輻輪輞悉同玉輅輅亭高六尺四寸有竒紅髹四柱長五尺四寸檻座上四周線金五彩香草板前左右有門高五尺有竒廣二尺四寸有竒門旁槅各二編紅線絛及明栨皆紅髹後五山屏風青地上雕木貼金龍五間以五彩雲文屏後紅髹板皆抹金銅鈒花葉片裝釘紅髹匡軟座紅絨墜座大索四下垂蓮花墜石上施紅毯紅錦褥席紅髹椅一納板一并褥椅中紅織金綺靠背坐褥四周有椅裙施紅羅帷幔外用青綺緣邊紅簾十二扇椅雕貼金龍彩雲下線金彩雲板一亭內編紅線絛輅頂并圓盤高二尺五寸有竒又鍍金銅寶珠頂帶仰覆蓮座高九寸垂攀頂紅線圓絛四盤上丹漆下內外皆青地繪雲文以青飾輅蓋亭內周圍青斗栱承以丹漆匡寶蓋鬬以八頂冒以紅綺頂心繡雲龍餘繡五采雲文天輪三層皆紅髹上雕木貼金邊耀葉板七十二片內飾青地雕木貼金雲龍文三層間繪五采雲襯板七十二片四周黃銅裝釘上施紅綺瀝水三層每層七十二摺間繡五采雲龍文四角之飾與大輅同第圓絛用紅線輅亭前一字闌干一扇後一字帶轉角闌干一扇左右闌干二扇內嵌丹漆五彩雲板計十四柱柱首制與大輅同亭後建紅旗二以紅羅為之九斿每斿內外繡升龍一左旗腰繡日月北斗竿用抹金銅龍首右旗腰繡黻字竿用抹金銅㦸綴抹金銅鈴二垂紅纓其踏梯行馬之屬與玉輅同親王象輅其高視金輅減六寸其廣減一尺轅長視大輅減一尺輅座高三尺有竒餘飾同金輅輅亭高五尺二寸有竒紅髹四柱檻座上四周紅髹絛環板前左右有門高四尺五寸有竒廣二尺二寸有竒門旁槅各二及明栨後五山屏風皆紅髹用抹金銅鈒花葉片裝釘亭底紅髹施紅花毯紅錦褥席其椅靠坐褥帳幔紅簾之制俱同金輅輅頂并圓盤高二尺四寸有竒用抹金銅寶珠頂餘同金輅天輪三層用紅髹上雕木貼金邊耀葉六十三片內飾青地雕木五彩雲文三層間繪五采雲襯板六十三片四周黃銅裝釘上施紅綺瀝水三層每層八十一摺繡瑞草文前垂青綺絡帶二俱繡升龍五彩雲文圓盤四角連輅座板用攀頂紅線圓絛四并紅髹木魚亭前後闌干同金輅左右亦有闌干內納絛環板皆紅髹計十四柱柱首雕木紅蓮花線金青緑裝蓮花抱柱前闌干內布花毯紅旗二與金輅所樹同竿上祗垂紅纓五其踏梯行馬之屬亦同金輅皇孫車成祖永樂中定皇太孫婚禮儀仗如親王降皇太子一等用象輅郡王無輅公侯大夫等車輅宋金元明宋制親王一品二品奉使及葬並給革輅制同乘輿之副惟改龍飾為螭六引內三品以上乘革車赤質制如進賢車無案駕四赤馬駕士二十五人其緋幰衣絡帶旗㦸綢杠繡文司徒以瑞馬京牧以隼御史大夫以獬豸兵部尚書以虎太常卿以鳯駕士衣亦同縣令乘軺車黑質兩壁紗窗一轅金銅飾紫幰衣絡帶並繡雉銜瑞草駕二馬駕士十八人真宗大中祥符三年知樞密院事王欽若言王公車輅上並用龍裝乞下有司檢定制度詔下太常禮儀院詳定本院言按鹵簿令王公以下象輅以象飾諸末朱班輪八鸞在衡左建旗畫龍一升一降右載闟㦸革輅以革飾諸末左建旃餘同象輅木輅以漆飾之餘同革輅軺車曲壁青幰碧裏諸輅皆朱質朱蓋朱旗旃一品九旒二品八旒三品七旒四品六旒其鞶纓如之神宗元豐三年詳定禮文所言鹵簿記公卿奉引第一開封令乘軺車次開封牧隼旗次太常卿鳯旗次司徒瑞馬旗次御史大夫獬豸旗次兵部尚書虎旗而乘革車考之非是謹按周禮巾車職曰孤乘夏篆卿乘夏縵大夫乘墨車司常職曰孤卿建旃大夫建物請公卿以下奉引先開封令乘墨車建物次開封牧乘墨車建旗太常卿御史大夫兵部尚書乘夏縵司徒乘夏篆並建旃所以參備九旗之制詔從之徽宗時政和議禮局又上王公以下車制象輅以象飾諸末朱班輪八鸞在衡左建旗右載闟㦸駕馬四親王昏則用之革車赤質載闟㦸緋羅繡輪衣簾旗韜杠絡帶駕赤馬四大駕鹵簿六引法駕鹵簿三引開封牧乘之王公一品二品三品備鹵薄皆供革車一乘其輪衣簾旗韜杠絡帶繡文開封牧以隼大司樂以鳯少傅以瑞馬御史大夫以獬豸兵部尚書以虎軺車黑質紫幰衣絡帶並繡雉施紅錦簾香爐香寶結帶駕赤馬二鹵簿內第一引官縣令乘之駕馬皆有銅面插羽鞶纓攀胸鈴拂緋絹屜紅錦包尾六年禮制局言開封牧列職于朝與御史大夫同其在周官則卿大夫之職乃乘墨車可乎成周上公建常九斿侯伯七斿子男五斿大夫車旗亦各視其命之數則卿建旃當六斿大夫建物當四斿至於三斿則上士所建也其開封令宜乘墨車而建物四斿開封牧御史大夫戶部禮部兵部尚書皆卿也宜乘夏縵而建旗六斿其年詳定官蔡攸又言軺車非縣令宜駕革車非公卿宜用鳯馬之繡無所經見闟㦸之設尤為誤謬開封令秩比大夫開封牧古之諸侯其乘皆宜墨車其駕之馬令以三牧以四御史大夫以六尚書卿之任也其駕亦四則所乘之車稱矣司常曰孤卿建旃大夫士建物師都建旗開封令秩視大夫宜建以物開封牧師都之任宜建以旗尚書御史大夫古之卿也宜建以旃從之七年禮制局又言昨討論大駕六引車已經冬祀陳設訖所有駕士衣服尚循舊制宜改正請墨車駕士衣皂夏縵駕士皂質繡五色團花於禮為稱從之金王公以下車制一品轅用銀螭頭涼棚杆子月板並許以銀裝飾三品以上螭頭不得施銀涼棚杆子月板亦聽用銀為飾五品以上轅獅頭六品以下轅雲頭庶人坐車平頭止用一色黑油元制車輿除不得用龍鳯文外一品至三品許用間金裝飾銀螭頭繡帶青幔四品五品用素獅頭繡帶青幔六品至九品用素雲頭素帶青幔庶人車輿黑油齊頭平頂皂幔明太祖洪武元年定品官車輿之飾與元同六年令大臣得用安車後廢不用景帝景泰四年令在京三品以上得乘轎孝宗宏治七年令文武官得乘轎者以四人舁之其五府管事內外鎮守守備及公侯伯都督等無問老少皆不乘轎主妃命婦等車宋遼金明宋皇太子妃有厭翟車駕以三馬內外命婦之車銀裝白藤輿檐內命婦皇親所乘白藤輿檐金銅犢車漆犢車或覆以氊或覆以棕內外命婦通乘遼青幰車二螭頭蓋部皆飾以銀駕用駝公主下嫁以賜之送終車車樓純飾以錦螭頭以銀下懸鐸後垂大氊駕以牛上載一羊謂之祭羊以擬送終之用亦賜公主金章宗明昌元年定妃嬪車同鍍金鳯頭黃結御妻世婦同間金鳯頭梅紅結子明皇妃車曰鳯轎與厯代異名其制青頂上抹金銅珠頂四角抹金銅飛鳯各一垂銀香圓寶蓋并綵結轎身紅髹木匡三面篾織紋簟繪以翟文抹金銅鈒花葉片裝釘紅髹掆飾以抹金銅鳯頭鳯尾青銷金羅緣邊紅簾并看帶內紅交牀并坐踏褥紅銷金羅轎衣一頂用銷金寶珠文瀝水香草文看帶并幃皆鳯文紅油絹雨轎衣一東宫妃車亦曰鳯轎小轎制同皇妃親王妃車亦曰鳯轎小轎制俱同東宫妃唯鳯轎衣用木紅平羅小轎衣二一用礬紅素紵絲一用木紅平羅公主車初沿宋制用厭翟車後定制用鳯轎如親王妃郡王妃郡主俱用翟轎與皇妃鳯轎同第易鳯為翟欽定續通典卷六十三
