body:
  text: 兵按地形知勝負五代梁王景仁將兵擊趙至柏鄉晉王李存朂救之欲速戰周徳威曰鎮定之兵長於守城短於野戰且吾所恃者騎兵利於平原廣野可以馳突今壓壘門騎無所展其足又謂張承業曰今去賊咫尺所限者一水耳彼若造橋以薄我我衆立盡矣請退軍鄗邑以計困之後得梁降人詰之曰方多造浮橋存朂乃從徳威䇿退軍卒敗梁兵宋曹瑋知鎮戎軍瑋以鎮戎據平地便於騎戰非中國之利請自隴山以東循古長城塹以為限又曹瑋嘗上涇原環慶兩道圖盡攻守出入之要帝以示左右曰山川城郭險固舉在是矣因别繪圖賜諸將令按圖計事由是師出有功又岳飛趨襄陽李成盛兵迎戰左臨襄江飛笑曰步兵利險阻騎兵利平曠成左列騎江岸右列步平地雖衆十萬何能為舉鞭指王貴曰爾以長槍步卒擊其騎兵指牛臯曰爾以騎兵擊其步卒合戰馬應槍而斃後騎皆擁入江步卒死者無數成夜遁遂復襄陽又余玠在四川招納豪傑辟冉璡冉璞營賓館以處之且使人密窺其所為兄弟終日對踞以堊畫地為山川城池之形起則漫去既而見玠屛人曰計安西蜀惟徙合州城為上䇿耳玠問其地曰蜀口形勢之地莫若釣魚山倘徙諸此積粟以守之賢於十萬師逺矣玠以聞諸朝授其兄弟官委以築城之事釣魚城成蜀始可守又孟珙在江陵府屬兵八千珙曰金人若向吕堰則八千不為少然須木查騰雲吕堰等砦受節制乃可濟已而劉全雷去危與金人戰於夏家橋小捷有頃金人犯吕堰珙喜曰吾計得矣亟命諸軍追擊吕堰進逼大河退逼山險砦軍四合金人棄輜重走元石天應從穆呼哩征陜右假道西夏自東勝濟河南攻葭州拔之因説穆呼哩曰西戎雖降實未可信此州當金夏之衝居人勇健倉庫豐實加以長河為限脱為敵軍所梗緩急非便宜命將守之多造舟楫以備不虞穆呼哩然之又石天應謁穆呼哩於汾水諭以進取之䇿天應還鎮召諸將謂曰吾累卿等留屯於此今聞河東西皆平川廣野可以駐軍䂓取關陜諸君以為何如或諌曰河中雖用武之地南有潼關西有京兆皆金軍所屯且新附其心未一守之恐貽噬臍之悔天應曰葭州正通鄜延今鄜已平延不孤立若發國書令夏人取之猶掌中物耳且國家之急本在河南此州路險地僻轉餉甚艱河中雖迫於二鎮實用武立功之地北接汾晉西連華同地五千餘里户數十萬若起漕運以通餽餉則闗内可尅期而定關内既定長河以南在吾目中矣遂移軍河中既而金人果潛入中條襲河中天應知之遣驍將呉澤伏兵要路以待又安扎爾言於宗王曰隴州縣方平人心猶貳西漢陽當隴蜀之衝吐蕃利於入寇宜得良將以鎮之宗王曰安反側制寇賊此上䇿也遂分蒙古千户五人𨽻麾下以往又巴延侵宋已破陽羅堡諸將多請先向蘄黄阿珠曰若赴下流退無所據先取鄂漢雖遲旬日萬全計也又元師破樊城外郛其將復閉内城守阿爾哈雅以為襄陽之有樊城猶齒之有脣也宜先攻樊城樊城下則襄陽可不攻而得明常遇春攻張士誠於蘇州久不下遇春架飛樓以覘城中動靜士誠以物盡覆街市了無所覩有善地形者曰此城龜形盤門是首閶門是尾擊其尾首必出矣乃如其言攻之盤門果先開又傅友徳討雲南太祖餞之龍江曰朕覽輿圖詢彼地豪傑而得其扼塞取之計當自永寧先遣驍將將兵向烏撒大軍繼自辰沅入普定分據要害乃進兵曲靖彼所必守地也曲靖下以一軍向烏撒應永寧之師大軍直𢷬雲南彼此牽制破之必矣下雲南必次下大理餘郡邑部落可撫而有也自戰其地則敗金完顔璋攻宋將呉璘於東山堡璘以軍三萬據險作三陣金諸將皆曰呉璘恃險不善野戰我退軍平涼彼必棄險就平地然後可圖也璋曰不然彼恃其衆非特恃險也昔人有言寧棄千軍不棄寸地故退兵不如濟師我退軍平涼彼軍深入吾地固壘以拒我我則如之何於是親率四萬人急擊之璘軍敗走元劉斌攻睢陽軍杏堆距陳州七十里聞陳軍陣於近郊斌帥衆夜擊之陳軍無鬭志遂大敗據險隘唐哥舒翰禦安禄山引兵出潼關遇賊將崔乾祐於靈寶西原乾祐先據險南薄山北阻河狹道七十里翰使王思禮等將精兵十五萬分前後衝之賊佯欲遁官軍不備為所擊敗道隘士卒如束槍槊不得用翰退入關又范希朝為振武節度使有党項室韋交居川阜凌犯為盜日入慝作謂之刮城門居人懼駭鮮有寧日希朝於要害處置堡栅斥堠嚴宻人遂獲安五代唐莊宗與梁軍戰於汴州胡柳坡梁將王彦章等走濮陽餘兵登陂中土山莊宗率騎追至山下梁軍戒嚴不動莊宗謂諸將曰今日之戰得山者勝賊已據山乘髙四望衆人皆有懼心乃率騎先登銀槍步卒繼進敵紛紛而下在土山西結陣數里時已日暮諸軍未齊或請詰朝合戰閻寶曰賊帥奔亡衆心方恐據山而猶委棄結陣更復何為今登高擊下勢如破竹耳遂與王建及急擊大破其軍晉杜重威李守貞攻瀛州不克退及武彊聞契丹來侵惶惑不知所之張彦澤適至言敵可破之狀乃與重威等西趨鎮州彦澤為前鋒至中渡橋已為敵所據彦澤力戰爭橋燒其半敵少却遂夾河而寨宋狄青戰於歸仁張玉先鋒賈逵將左孫節將右既陣青誓曰不待令而舉者斬及節搏賊死山下逵私念兵法先據高者勝乃引軍疾趨山甫登賊至逵擁衆而下揮劍大呼斷賊陣為二玉以先鋒突出陣前而青麾番落騎兵出賊後賊遂大潰逵乃詣青帳前請罪青撫逵背曰違令而勝權也何罪之有又劉光世鎮京口金兵復南光世將退保丹陽王徳請以死捍江諸將恃以自强分軍扼險渡江襲金人收真揚數郡又金人自合肥入遊騎及江張俊議分守南岸王徳曰淮者江之蔽棄淮不守脣亡齒寒敵數千里逺來餉道決不能繼及其未濟急擊之可以奪氣若遲之稍安則淮非吾有矣又魏勝守海州金兵已逼關勝登關門張樂飲酒犒士卒令固守勿出戰金兵攻之踰時乃少遣士出憑險隘擊之金人知不可攻徑趨城東欲過砂堰圜城為營勝先已據堰備之金兵不得過拒戰竟日終不能近又魏勝以海州城西南枕孤山敵至登山瞰城虚實立見故西南受敵最劇遂築重城圍山在内敵至則先據之不能害又張浚破李成賊黨乘勝剿除追至樓子莊賊黨商元據草山挾險設伏浚遣步兵從間道直趨椒山殺伏奪險乘勝追至江州成絶江而遁浚引兵渡江至黃梅與成戰成懲奉新失險之敗據石幢坡憑山以木石投人浚先遣遊卒進退若爭險狀以誑賊而親冒矢石率衆攻險賊衆懼潰又曹友聞因北兵破沔州乃分遣諸將趨鷄冠隘據陽平關復親登嶺指麾諸軍敵兵突至諸將進戰敵退友聞謂總管陳庚及當可曰敵必旋兵攻鷄冠隘急援之既而敵步騎果至庚與當可力戰蹀血十餘里兵乃解去又曹友聞招集忠義得健士五千人制置使李埴命領所部守仙人關且行且戰至峽口據險㑹金人來侵友聞令諸軍乘高擬滿乃身冒矢石為士卒先敵不能進金李英上右副元帥珠赫哷果勒齊書曰中都之有居庸猶秦之崤函蜀之劍門也邇者撤居庸兵我勢遂去今土豪守之朝廷當遣官節制失此不圖忠義之士將轉為他用矣又曰可鎮撫宣徳徳興餘民使之從戎所在自有宿藏足以取給是國家不費斗糧尺帛坐收所失之關隘也居庸咫尺都之北門而不能衛䕶英實恥之果勒齊奏其書即除尚書工部員外郎充宣差都提控居庸等關隘悉𨽻焉元察罕特穆爾分兵屯澤州塞碗子城屯上黨塞吾兒谷屯并州塞井陘口以杜太行諸道賊屢至俱擊却之又劉元禮為潼川漢軍都元帥奏嘉定去都三百六十里其間舊有眉州城請修復以扼嘉定往來之路世祖從之又張𢎞範圍襄陽以其境南接江陵歸峽商販行旅士卒絡繹不絶遂城萬山以斷其西柵灌子灘以絶其東又築一字城通襄陽破樊城外郭截江道斷其援兵遂㧞之塞險則勝否則敗唐髙宗永淳中突厥圍豐州朝廷議棄豐州保靈夏唐休璟疏以為不可㑹吐蕃破焉耆授休璟靈州都督因請復四鎮自後王孝傑拔龜兹諸國城皆由休璟剏始之功也又郭元振為凉州都督州境狹纔四百里邊兵竟至城下元振始於南狹口置和戎城北磧置白亭軍制束要路遂拓地千五百里自是州無邊患又郭子儀以吐蕃方强上書欲於諸道料精卒五萬列屯北邊則制勝可必如河南北江淮大鎮數萬小者數千簡擇趨赴關中勒步隊示金鼔則攻必破守必堅長久之䇿也宋曹瑋知渭州築堡塞外為籠竿城募土兵守之曰異時秦渭有警此必爭之地也又王全斌伐蜀趣劍門謂諸將曰古稱劍門天險願聞取之之䇿有降卒言益光江東越大山數重有狹徑名來蘇蜀人於江右置砦對岸有渡自此出劍關二十里倘此處進兵劍門不足恃也斌即遣禆將史延徳趣來蘇夾攻之自將大軍攻劍門王昭逺趙崇韜遁走獲之遂克劍州又呉玠以和尚原地去蜀逺乃於仙人關右殺金坪剏築一壘移原兵守之遂為抗蜀形勝故金人至輒不得入又劉子羽因張浚富平敗後官屬有請徙治夔州者子羽曰四川全盛敵欲入冦久矣直以川口有鐵山棧道之險未敢遽窺耳今棄之而處夔峽則與關中聲援不相聞進退失計悔將何及今幸敵方四掠宣司當留興州以安蜀人心急遣人呼諸亡將堅壁固壘觀釁而動庶可轉敗為功已而招諸亡將果集分兵悉守關隘金人以有備引去又楊存中以朝議棄和尚原力爭此係隴右之要害敵得之可以睥睨漢川我得之可以下兵秦雍願毋棄又呉璘帥秦鳳時金方歸陜西地議欲盡移川口軍於陜西璘曰金人反覆難信今我移軍陜西蜀口空虚敵若自南山要我陜右軍直𢷬蜀口我不戰自屈矣當且依山為屯控其要害俟其情見力疲漸圖進取又孟宗政為荆鄂都統制以金人逼壕而陣易於馳騁乃於西北壕外瀦水為濘由是金騎不得衝突又曹友聞扼仙人關諜聞北兵合契丹西夏回回吐蕃渤海軍五十餘萬大至乃語弟曹萬曰衆寡不敵豈容浪戰惟當乘髙據險出竒匿伏以待之北兵既入興元欲衝大安趙克呐檄友聞控制大安以保蜀口友聞馳聲報曰沔陽蜀之險要吾重兵在此敵有後顧之憂必不能越此而入蜀又有曹萬王宣首尾應援可保必捷大安地勢平曠無險可守敵騎所長步兵所短衆寡不敵豈可於平地控禦不聽趣友聞進兵乃選精騎夜渡遇雨卒大敗又孟珙攻金蔡州命諸將奪柴潭樓金人爭樓諸軍魚貫而上金人又飾美婦人以相蠱麾下張禧等殺之遂拔柴潭樓蔡人恃潭為固外即汝河潭高於河五六丈城上金字號樓伏巨弩相傳下有龍人不敢近將士疑畏珙召麾下飲再行曰柴潭非天造地設樓上伏弩能及逺而不可射近彼所恃此水耳決而注之涸可立待皆曰隄堅未易鑿珙曰所謂堅者止築兩隄首耳鑿其兩翼可也潭果決實以薪葦遂濟師攻城擒其將斬之明英宗正統中都督王禎始城榆林増三十六營堡盡補陜中伍籍之脱落者及罪謫南戍皆聴還伍以實榆林於是邊有城堡軍士得勤力樹菓蔬并開界石外地使興屯田歲得糧十餘萬石而榆林始稱重鎮東渡河連大同西接寧夏邊人不敢復恣出入又于謙以獨石馬營等八城遇兵殘毁議者欲棄之謙曰棄之則不但宣府懷來難守京師不免動揺乃薦都督孫安授以方畧命參政葉盛贊其軍盛與安率兵度龍門關且戰且守八城復完如舊又張鎣巡撫寧夏先是寧夏城皆土築鎣至始甃以磚復導河流灌溉屯田處置䧏人使不為變邊境藉以無事死地勿攻唐張仁愿初建三受降城不置壅門及格曲戰鬬之具或問曰此邊城禦賊之所不為守備何也仁愿曰兵貴在攻取不宜退守寇若至則當併力出戰迴顧望城猶須斬之何用守備生其退恧之心也其後常元楷為朔方軍總管始築壅門以備冦議者以此重仁愿而輕元楷焉又昭宗時幽州劉仁恭率軍士十萬㓂魏州屠其郡梁將葛從周自邢臺馳入魏州燕軍攻館陶門從周與五百騎出戰謂門者曰前有敵不可返顧命闔其門從周極力死戰大敗燕人五代晉皇甫遇帥滑州契丹率衆屯邯鄲遇與安審琦慕容彦超等禦之將渡漳河敵前鋒大至遇引還轉鬬二十里至鄴南榆林店遇謂審琦等曰彼衆我寡走無生路不如血戰遂自辰及未戰百餘合所傷甚衆宋宗澤進兵衛南度兵寡不深入不能成功揮衆逼敵轉戰而來前後皆敵壘下令曰今日進退等死當從死中求生衆分必死無不一當百斬首數千級大敗之又韓世忠追擊李復至臨淄河兵不滿千分為四隊布鐵蒺藜自塞歸路令曰進則勝退則死走者命後隊剿殺於是衆莫敢反顧與復遇大破之臣等謹按杜氏通典死地勿攻謂敵在死地我逼之彼將致死於我不可犯也若敵來攻我而我適處其困進則勝退則敗是正可藉以激厲士卒以期克敵所謂置之死地而後生也因於死地勿攻之條依類次之總論其地形附宋王韶詣闕上平戎䇿三篇其畧以為西夏可取欲取西夏當先復河湟則夏人有腹背受敵之憂夏人比年攻青唐不能克萬一克之必併兵南向大掠秦渭之間牧馬于蘭㑹斷古渭境盡服南山生羌西築武勝遣兵時掠洮河則隴蜀諸郡當盡驚擾轄戩兄弟其能自保耶今嘉勒氏子孫唯棟戩粗能自立轄戩欺巴鄂特之徒文法所及各不過一二百里其勢豈能與西人抗哉武威之南至於洮河蘭鄯皆故漢郡縣所謂湟中浩亹大小榆枹罕土地肥美宜五種者在焉幸今諸羌𤓰分莫相統一此正可并合而兼撫之時也諸種既服嘉勒氏敢不歸嘉勒氏歸則河西李氏在吾股掌中矣且嘉勒氏子孫轄戩差盛為諸羌所畏若招諭之使居武勝或渭源城使糾合宗黨制其部族習用漢法異時族類雖盛不過一延州李士彬環州慕恩耳為漢有肘腋之助且使夏人無所連結䇿之上也又种世衡為鄜州從事夏人犯延安世衡建言延安東北二百里有故寛州請因其廢壘而興之以當冦衝左可致河東之粟右可固延安之勢北可圖銀夏之舊有是三利朝廷從之又孟珙知江陵府曰陸抗有言荆州國之藩表如有虞非但失一郡當傾國爭之若非増兵八萬併力備禦雖韓白復生無所用其巧今事勢相似彼若以兵綴我上下流急將若之何珙往則彼𢷬吾虚不往誰實捍禦識者是之又上言上流備禦宜周沅之險不如辰靖之險不如沅三州皆當措置而沅尤急江防自秭歸至夀昌亘二千里自公安至峽川灘磧十餘處節節當防兵諱備多乃京湖之憂也又孟珙至江陵修復内隘引沮漳之水俾遶城北入於漢隨其髙下為匱蓄洩三百里間渺然巨浸迄為荆州形勝云金章宗泰和七年陜西宣撫司請増新得關隘戍兵萬人是時宋遣左司郎中王柟禀請歸川陜關隘完顔匡奏曰關隘之事臣初亦惑之今當增戌萬人壁壘之役餽運之勞費用必廣祖宗所以不取者以關隘僅能自保耳非有益於戰也設能入冦縱之平地以鐵騎蹂之無一得脱彼哀祈不已者以前日負固尚且摧慶今遂失之是無一日之安也必謂兵力得之不可還賜則漢上諸郡皆膏腴耕桑之地棗陽光化歸順之民數萬户較之陜右輕重可知獨在陛下決之耳又宣宗興定三年䝉古綱奏曰濟南介山東兩路之間最為衝要被兵日久雖與東平隣接不相統屬緩急不相應乞權𨽻本路且差近於益都詔從之綱奏恩州武城縣艾家凹水濼清河縣澗口河濼其深一丈廣數十里險固可恃因其地形少加浚治足以保禦請遷州民其中多募義軍以實之制可明太祖遣徐達充大將軍北取元都曰吾欲先取山東撤其屛蔽旋掩河南斷其羽翼拔潼關而守之天下形勢入我掌握不待鏖戰牧野而元都下矣鼓行而西雲中九原以逮關隴可席捲也及達攻下徐州賜書勞達曰將軍今何嚮嚮益都則必以兵扼黃河斷其援即不嚮益都西取濟南濟寧二郡亦便兵難遥奪其在將軍又楊一清曰河套周之朔方漢之定襄赫連勃勃統萬城也唐張仁愿築三受降城置烽堠千八百所朔方自此無冦歲省費億計減鎮兵數萬其守皆在河外正統以來浸失其險舍受降而衛東勝已失一面之險又輟東勝就延綏是以一面而遮千餘里之衝遂使河套沃壤淪為敵巢寧夏外險反南備河邊患莫之能解兹欲復守東勝因河為固東接大同西接寧夏使河套二千里之地歸我耕牧用省内運以綏秦民為便從之鎮兵不行勵士決戰唐張巡守睢陽每戰必親臨行陣有退者巡已立其所謂曰我不去此為我决戰士感其誠皆一當百又張巡守雍邱有大將六人官開府特進白巡以勢不敵且上存亡莫知不如降巡陽許諾明日堂上設天子畫像率軍士朝宣諭大義人人盡泣巡引六將斬之士心益勸又安禄山反常山郡盡為賊傷死人蔽野大將李光弼帥本鎮兵來援親酹其屍而哭之為賊幽閉者出之誓平冦難以慰其心衆遂感動又李光弼將戰内刃於鞾曰戰危事吾位三公不可辱於賊萬一不㨗當自刎以謝天子於是西向拜舞三軍感動又李懷光叛李晟恐為所脅偽為有詔令徙屯東渭橋孤軍當冦鋒之間為諸將開陳大義激勵忠節下令曰渭橋斷賊首尾與諸公戮力殺賊建不世竒功以取富貴正在此時士皆奮遂顕責懷光懷光遁河中又李愬授魏博節度時幽鎮復亂田宏正遇害愬聞之素服以令三軍曰魏人所以富庶而能通聖化者由田公也天子以其仁愛使治鎮州且田公出於魏撫師七年一日鎮州不道敢兹殘害以魏無人也若父兄子弟受田公恩者其何以報衆皆大哭願効用焉又婺州守崔義元討妖女陳碩貞兵至下淮戍擒其間諜二十餘人詰朝進擊身先士卒左右以盾蔽箭義元曰刺史尚欲避箭誰肯致死由是士卒戮力斬首數百級五代唐主舉兵擊梁救趙進軍栢鄉五里遣周徳威先以騎兵進薄梁營梁將韓勍等精兵三萬鎧甲皆被繒綺金銀炫耀晉人望之懼形於色徳威謂李存璋曰賊志在不戰欲以甲兵耀威耳遣存璋諭諸軍曰爾見此賊軍否是汴州天武健兒皆屠沽傭販虚有其表徒被精甲十不當一擒獲足以為貨無徒悵望勉而取之可也徳威自率精騎擊其兩偏左馳右決出没數四是日獲百餘人梁兵渡河而退宋韓世忠鎮楚州世忠披草萊立軍府與士卒同力役夫人梁氏親織簿為幄將士有怯戰者世忠遺以巾幗設樂大宴俾婦人籹以恥之故人人奮勵撫集流散通商惠工楚州遂為重鎮又李寶因海州圍急衝風縱舟抵海州敵已雲合圍城寶麾兵登岸以劍畫地令曰此非復吾境力戰與否在汝等因握槊前行遇敵奮擊將士賈勇無不一當十敵出不意亟引去又劉錡攜孥趨順昌金兵至衆以不敵請還時部將許清亦攜孥在軍曰强敵在前進退不可不如努力一戰死中求生議與錡合錡令敢言去者斬沉舟積薪於門戒守者不利即焚家毋辱敵手於是一軍皆奮又張浚與韓世忠討苖傅劉正彦浚大犒將士呼至前抗聲問曰今日之舉孰順孰逆衆皆曰賊逆我順浚曰聞賊以重賞購吾首若浚此舉違天悖人汝等可取浚頭去不然一有退縮悉以軍法從事衆咸感憤願聽命決戰於是令世忠以兵赴闕又劉豫與子猊挾金人入攻張浚劉光世皆張大敵勢張浚謂賊豫以逆犯順不勦除何以為國今日之事有進無退命楊沂中屯濠州時劉麟逼合肥劉光世舍廬州而南淮西洶動浚疾馳至采石令曰有一人渡江者斬光世復駐軍與沂中接劉猊攻沂中沂中大破之猊麟皆拔柵遁又王彦獨保共城西山遣腹心結兩河豪傑圖再舉金購彦急彦慮變夜寢屢遷其部曲覺之刺面作赤心報國誓殺敵人八字以示無他意彦益感勵愛士卒與同甘苦未幾兩河響應受彦約束又呉玠與璘以散卒數千駐原上朝問隔絶人無固志有謀刼玠兄弟北去者玠知之召諸將㰱血盟誓勉以忠義將士皆感泣願盡死力元既平山東滕州尚未下諸將或言炎暑未可進攻博囉曰主上親督大軍平定西域未聞當暑不戰我等安敢自逸乎又太祖與克哷王汗對陣於喀爾沁師少不敵帝命烏嚕一軍先發其將珠巴克台橫鞕馬鬛不應威岱爾奮然曰我猶鑿也諸君斧也鑿匪斧不入我請先入諸君繼之萬一不還有三黃頭兒在唯上命之遂先出陷陣大敗之又上諭雅克特穆爾曰丞相毎戰親冒矢石脱有不虞其若宗社何自今後但凭髙督戰將士之用命不用命者以賞罰之可也對曰臣以身先之為諸將法敢後者軍法從事託之諸將萬一失利悔將何及又阿勒達爾琿塔哈逆命劫六盤府庫西陲騷動汪良臣討之兵至山丹置營按兵不動凡三月俄大舉至耀碑谷兩軍相當良臣慷慨誓諸將曰今日之事係國家安危勝則富貴可保敗則身戮家亡茍能用命則死行間不失忠孝之名衆聞踴躍而前㑹大風揚沙晝晦良臣手刃數十人衆軍繼之賊大潰又劉元禮與宋夏貴大戰蓬溪自寅至未不分勝負劉元禮激厲將士曰此去城百里為敵所乘則城不可得入潼川非復國家有矣丈夫當以死戰取功名時不可失也即持大刀長呼突入陣所向披靡將士感奮無不以一當百大敗之又王慶端戍清口宋兵來攻守將戰死城欲䧟慶端拔刀誓衆裹創力戰城得以全又察罕特穆爾屯中牟淮右賊掠汴以西𢷬中牟營察罕特穆爾以利害諭士卒士卒賈勇決戰㑹大風揚沙自率猛士從中奮起擊賊中堅破之又方國珍懷疑入海以叛台哈布哈自分以死報國詔衆曰吾以書生登顯要誠慮負所學今守海隅賊甫招來又復為變君軰助我擊之其克則汝衆功也不克則我盡死以報國衆皆踴躍願行明詔副將軍李文忠移兵陜西與大將軍合攻慶陽行次太原慶陽已平而敵東攻大同甚急文忠率軍援大同軍吏以為疑文忠按劍曰閫外之事吾得專之敢言不援大同者斬遂出鴈門次馬邑敗其邏騎千擒劉平章進次白楊門擒四大王又額森逼居庸關甚急羅通守關宣府參將楊俊入衛京師告通啟關通仗劍厲聲曰若保居庸足矣下令有一人一騎南行者斬以徇乃止㑹天大寒令老弱汲水灌城冰堅滑不可破七日敵計沮退趨紫荆關又伍文定因宸濠盡發南康九江兵併力挑戰我兵敗乃急令斬先卻者以徇身立銃砲間火焚其鬢鬚不移足士殊死鬬兵復振乃為火攻之具分兵四伏期火發兵合火及宸濠副舟賊衆大潰衆寡勢百相懸勵士攻其師唐李靖擊吐谷渾請薛萬徹同行及至賊境與諸將各率百餘騎先行卒與賊數千相遇萬徹單騎馳擊之無敢當者還謂諸將曰賊易與耳躍馬復進諸將隨之斬數千級人馬流血勇冠三軍又張巡守睢陽賊尹子琦圍之巡語其下曰吾蒙上恩正有死耳但諸君捐驅而賞不直勲以此痛恨聞者感慨乃椎牛大饗悉軍戰賊望兵少大笑巡與許逺親鼓之賊潰追北數十里金王亮率大軍臨采石而别以兵争𤓰洲宋命虞允文往蕪湖趣李顯忠交王權軍且犒師允文至采石權已去顯忠未來敵騎充斥師三五星散解鞍束甲坐道旁皆權敗兵也允文立招諸將勉以忠義曰金帛告命皆在此以待有功衆曰今既有主請死戰諜者言金主祭天與衆盟以明日濟江晨炊玉麟堂先濟者與黄金一兩時敵兵實四十萬馬倍之宋軍纔一萬八千允文命諸將列大陣不動分戈船為五其二並東西岸而行其一駐中流藏精兵待戰其二藏小港備不測部分甫畢敵已大呼亮操小紅旗麾數百艘絶江而來瞬息抵南岸者七十艘直薄宋軍軍小郤允文入陣中撫時俊之背曰汝膽畧聞四方立陣後則兒女子耳俊即揮雙刀出士殊死戰中流官軍亦以海鰌船衝敵舟皆平沉敵半死半戰日暮未退㑹有潰兵自光州至允文授以旗鼓從山後轉出敵疑援兵至始遁又命勁弓尾擊追射大敗之犒將士謂之曰敵今敗明必復來夜半部分諸將分海舟縋上流别遣兵截楊林口次日敵果至因夾擊之復大戰焚其舟三百始遁去遼道宗咸雍九年烏爾古徳哷勒叛都監耶律托迪以兵少不戰屯臚胊河徳哷勒合邊人掠居民蕭伊嚕率精騎四百力戰敗之盡獲其輜重繼聞酋長哈準三千餘騎掠附近部落縱兵躡其後連戰二日斬數千級盡得被掠人畜而還金世祖禦和諾克於北隘甸使蘇卜實取海古勒兄弟兵已而知海古勒兄弟貳於和諾克矣欲併取其衆偵者報曰敵已至將戰世祖戒蘇卜實曰汝先陣於托果干原待吾三揚旗三鳴鼓即棄旗決戰死生惟在今日命不足惜時和諾克薩達甚强世祖軍未戰而懼皆植立無人色世祖揚揚如平常亦無責讓之言但令士卒解甲少憩以水沃面有頃軍勢復振世祖袒袖不被甲以褞袍垂襴䕶前後心韔弓提劍三揚旗三鳴鼓棄旗搏戰身為軍鋒突出敵陣衆從之蘇卜實從後奮擊大敗之又金伐遼攻西京遼兵三萬列營於西京之西副統棟摩以三千擊之棟摩使士卒皆去馬陣於溝塹之間曰以一擊十不致之死地不可使戰也謂衆曰若不勝敵不可以求生於是人皆殊死戰遼兵遂敗元郝和尚巴圖從都元帥塔海征蜀下興元宋將王連以重兵守劍閣乃募敢死士十二人激之以義乘夜破關入蜀悉下取夔府抵大江宋兵三十萬軍於南郝和尚巴圖選驍勇九人乘輕舸先登橫馳陣中既出復入宋兵不能支由是以善戰名明李文忠因呉兵圍胡徳濟於新城即馳兵赴援徳濟以衆寡不敵宜避之文忠曰以衆則我非彼敵以謀則彼非我敵死中求生正在今日乃下令曰賊衆而驕我少而鋭可一戰擒之輜重皆汝等有也明日賊空壁來逆戰文忠戒將士奮擊之自於馬上仰天誓曰朝廷大事在此一舉豈敢愛生以後三軍於是士卒皆奮無不一當百陣既交文忠䇿馬挺身入陷其中堅獨格殺數十人部將王瑛獨當一面引部下健士亦貫陣入敵衆披靡文忠因督衆乘之敵大潰又景泰初敵入境郭登躡之行七十里休兵夜二鼓東西沙窩敵自朔州掠回或言敵衆我寡宜全軍而退登曰軍去城百里一退避人馬疲倦敵以鐵騎來追難以自全即按劍起曰敢言退者斬徑薄敵營奮勇先登諸軍繼進呼聲震山岳遂大破之追奔至栲栳山乘卒初鋭用之唐太宗嘗選精鋭千餘騎為竒兵皆皂衣黒甲分為左右隊隊建大旗令騎將秦叔寶尉遲敬徳翟長孫等分統之毎臨冦太宗躬披黒甲先鋒率之候機而進所向摧靡常以少擊衆賊徒氣懾元之伐宋也宋以戰艦三百餘艘泊黒石峽東以輕舟五十為前鋒北軍之船五十泊峽西相距一里許史天澤號令於衆曰聽吾鼓視吾旗無少怠也頃之聞鼓聲視其旗東指諸軍遂鼓譟而入兵一交宋兵潰走戰艦繼亂順流擊死者不勝計激怒其衆五代梁末帝討友珪之逆偽為詔書發左右龍驤在東都者還洛因激怒之曰天子以懷州屯兵叛追汝等盡阬之諸將皆泣復以言懼之出太祖像示之曰汝能趨洛擒逆賊則轉禍為福矣遂共討友珪誅之明李文忠率兵破昌化恐士卒擄獲充積莫有鬭志因激怒之使盡焚其輜重曰能破敵何患不富貴衆皆奮勵進取欽定續通典卷一百三
