body:
  text: 兵圍敵勿周明劉江伏兵敗倭賊奔櫻桃空堡中官軍環攻之將士欲入堡勦殺江故開西壁以縱之仍分兩翼夾擊擒斬無算諸將問故江曰賊既入堡惟有死鬭我兵多傷縱以出路而後掩撃圍師必闕之法也又彭澤討蜀盜餘黨廖麻子賊大敗逃入菁棘中澤分兵搤出入奪水道度窘開一面縱其出走夾撃之且盡圍帥量無外援緩攻取之唐末朱全忠將率兵西懼王珂在河中為患命張存敬侯言以兵出含山破晉絳二州遣何絪以兵守之絶晉援存敬屯河中珂急求救于晉晉以絪故不得前珂卒為全忠所俘五代周世宗南征圍濠州濠州刺史郭廷謂告于周曰臣不能守一州以抗王師然願請命於唐而後降世宗為之緩攻廷謂遣人請命於李景景許其降乃降元世祖至元初年阿爾哈雅與元帥阿珠劉整取襄陽帝遣諸將命毋攻城但圍之以俟其自降乃築長圍起萬山包百丈楚山盡鹿門以絶之又益都李氊及徐州總管李果克俱叛史天澤薦郭侃召入見世祖問計將安出對曰羣盜竊發猶柙中虎内無資糧外無救援築城環之坐待其困計日可破也帝然之攻城戰具附唐侯君集伐髙昌髙昌嬰城而守先是大軍之發也凡善為攻城器者悉遣從軍君集遂刋木填隍推撞車撞其睥睨抛車飛石撃其城中其所當者無不靡碎城上守陴者不復得立遂拔之五代周世宗親征淮南幸水砦行至淝橋自取石一塊於馬上持之至砦以供飛礟文武從臣過橋者皆齎一石元師至沁達噶城烏蘭哈達病委軍事於阿珠環城立砲以草填塹衆軍始集阿珠所部搏戰城上城遂破又索多攻潮州知府馬發城守嚴備索多塞塹填壕造雲梯鵝車日夜急攻馬發潛遣人焚之二十餘日不能下索多令於衆曰有能先登者拜爵已仕者増秩總管烏蘭噶爾先登諸將繼之戰至夕宋兵潰又史天倪從穆呼哩徇河東至絳州其團樓甃以石牢不可破天倪命穴其旁地虛樓陷遂拔之又武仙復叛據邢何實帥師五千圍之立雲梯先士卒登堞横矟突之城破武仙走又察罕特穆爾圍益都環城列營凡數十大治攻具百道並進賊守益固復掘重塹築長圍遏南洋河以灌城中仍令分守要害収輯流亡郡縣户口再歸職方號令煥然又田豐王士誠復叛庫庫特穆爾討之攻城甚急而守愈堅乃穴地通道以入執其渠魁陳猱頭二百餘人明徐達㑹諸將兵進逼姑蘇四面築長圍困之又架木塔與城中浮屠等築敵樓三層下瞰城中置弓弩火銃於上又設襄陽礟以撃之礟著物皆碎礟風著人皆死城中大恐士誠屢出挑戰皆忽忽無計又郭登為將常以馬少步卒不能追賊乃以已意設為攪地龍飛天網等法鑿為深塹覆以土木人馬行如平地敵入圍中令人發其機自相撃撞頃刻十餘里皆陷又用砲石撃賊一發五百餘步人馬死者數千敵驚以為神云又李賢為兵部侍郎上言敵所以敢輕中國者恃其弓馬之强而已觀今之拒馬木止能拒馬不能拒箭挨牌止能避箭不能拒馬今中國長策當用衛青武剛車法車製四圍箱板内藏人下留銃眼上開小牕長一丈五尺髙六尺五寸前後左右横排槍頭毎車前後占地五步若用車一千輛一面二百五十輛約長四里行止自如中藏軍馬糧草輜重遇敵則可遏其弓馬仍以火砲助之以竒兵翼之庶幾取便克敵絶糧道及輜重宋李繼隆為河西都部署㑹宻詔廢夏州城繼隆入奏以為朔方古雄鎮賊所窺覦存之可依以破敗并請於銀夏山界中増置堡戍以為屬畨障蔽且可斷賊糧道遼太祖天顯初佛徳為南院額爾音木石敬塘破張敬達軍於太原北時佛徳勒兵為援敬達遁敬塘追至晉安寨圍之佛徳領輕騎襲潞州塞其餉道唐諸將懼殺敬達以降又耶律圗勒錦從討石重貴杜重威擁十萬餘衆拒滹沱橋力戰數日不得進圖勒錦曰漢人足力弱而行緩如選輕鋭騎先絶其餉道則事蔑不濟矣帝喜曰國强則其人賢海巨則其魚大於是塞其餉道數出以牽撓其勢重威果出降金圗克坦喀齊喀駐軍水洛城東宋將吳璘分軍守秦州喀齊喀自六盤山至石山頭分兵守之斷其餉道璘乃引歸元夏貴舉淮西諸城來附阿珠諸將曰今宋已亡獨李庭芝未下以外助猶多故也若絶其聲援塞彼糧道尚恐東走通泰逃命江淮乃柵揚州之西北丁村以扼其髙郵寳應之餽運貯粟灣頭堡以備捍禦留屯新城以逼泰州又遣千户巴延徹爾率甲騎三百助灣頭之兵又阿珠過襄陽駐馬虎頭山指漢東白河口曰若築壘於此襄陽糧道可斷也遂築鹿門新城等堡繼又築臺漢水中與夾江堡相應自是宋兵援襄者不能進阿珠抵揚州即造樓櫓戰具於瓜洲漕粟於真州樹柵以斷其糧道明太祖與陳友諒戰鄱陽湖太祖移舟扼上流别出竒兵絶糧道凡旬五日友諒乏食左右多降友諒迫以百艘突犯湖口太祖蹵之自晨至酉友諒中流矢死又成祖以南軍聚徳州資糧皆道徐沛遂遣將李逺等率輕騎六千詣徐沛令易士卒甲胄與南師同使不疑又恐接戰不能辨令人插栁枝於背為識且戒毋多虐百姓逺等由臨青至徐沛敵皆不疑乃縱火焚糧舟數萬艘軍資器械俱盡河水為熱魚鼈皆浮死南軍糧餉遂艱京師大震火攻唐李孝逸魏元忠破徐敬業敬猷於淮隂乃進軍與敬業隔溪相拒前軍為賊所破孝逸懼欲退元忠曰順風荻乾火攻之利固請决戰乃平敬業又髙仁厚討東川韓秀昇以鋭兵負岸而陣使遊兵逼賊乆不戰乃以千卒直薄營火而噪之秀昇率舟師救火仁厚遣人鶩没鑿舟皆沉衆潰執秀昇降又昭宗乾寧中朱全忠領大軍自鄆州東路北次于魚山攻朱瑄方整軍出寨瑄與弟瑾已陣于前須臾東南風大起汴軍旌旗失次甚有懼色時兩軍皆在草茇中全忠因令縱火烟焰亘天乗勝以攻賊陣瑄瑾大敗殺萬餘人衆壅入清河因築京觀於魚山下五代唐康延孝叛董璋往破之延孝入漢州閉城不出漢州無城塹樹竹木為柵璋帥諸軍鼓譟而進四面縱火風烟亘天延孝急引騎出陣又敗與十餘騎奔綿竹追擒之宋總管李寳統舟師救海州追敵至膠西石臼島敵舟已出海口泊唐島相距僅一山時北風盛寳禱于石臼神俄有風自柂樓中來衆感奮待戰敵操舟者皆中原遺民遙見寳船紿敵入舟中使不知救兵猝至㑹風馳舟疾敵大驚舉帆帆皆因風浪捲聚一隅窘束無復行次寶亟命火箭環射中敵舟延燒數百艘斬其帥六人火四晝夜不絶焚溺斬獲無算金布鼐與烏春烏木罕結約烏春舉兵度嶺世祖駐軍温丕村以待之進至蘇素海甸雨軍皆陣將戰世祖命肅宗以左軍戰實喇蘇卜實助之肅宗東緼縱火大風從後起火熾烈時八月野草尚青火盡燎烟焰漲天烏春軍在下風肅宗自上風擊之烏春大敗而城蘇素海甸以據之元時宋兩淮鎮將張世傑孫虎臣以舟師萬艘駐焦山東毎十船為一舫聨以鐵鎖以示必死元將阿珠登石公山望之舳艫連接旌旗蔽江曰可燒而走也遂遣强健善射者千人載以巨艦分兩翼夾射阿珠居中合勢進擊繼以火矢燒其蓬檣烟焰漲天宋兵既碇舟死戰至是欲走不能前軍争赴水死後軍散走追至圌山獲黄白鷂船七百餘艘自是宋人不復能軍矣明太祖與陳友諒鄱陽湖大戰友諒悉巨舟連鎖為陣旌旗樓櫓望之如山明師舟小怯于仰攻多退縮太祖親執旗麾之不前命斬隊長十餘人郭興進曰舟大小不敵非火攻不可太祖命常遇春俞通海等將舟盡扼上流通海分調漁舟載荻葦置火藥其中時東北風起乗風縱火焚其舟數百艘友諒弟友仁友貴等皆焚死又胡宗憲督勦海賊徐海陳東時二賊各擁兵自衛令間説東謂海約官兵將圍東東黨果疑海宗憲叱土司兵夾攻㑹風勢猛烈麾衆各持一炬縱火焚之海窘甚投水死火兵附宋潘美伐劉鋹距廣州百二十里鋹兵十五萬依山谷堅壁以待美因築壘休兵與諸將計曰彼編竹為柵若攻之以火彼必潰亂因以鋭師夾擊之萬全䇿也遂分遣丁夫數千人人持二炬間道造其柵及夜萬炬俱發㑹天大風火勢甚熾鋹衆驚擾美揮兵急擊之鋹衆大敗元大軍伐蜀皇子出大散闗分兵令宗王穆濟等出隂平郡期㑹於成都安扎爾領砲手兵為先鋒破宕昌殘階州火獸附宋趙遹在瀘南討晏州夷卜漏等漏據山為寨壘石樹柵遹軍不能進乃遣思岑土丁伐木縁岸得猱數十頭束麻灌脂於背率衆入賊柵出火燃炬猱熱奔賊舍舍皆竹茅火大發賊驚擾不能相救遂擒漏明福清石竺山多猴千百為羣戚繼光勦倭時屯兵於此毎教軍士放火器狙窺而習之乃命軍士捕數百善養之仍令習火器以為常比賊至伏兵山谷中而令羣狙闖其營賊不虞也少頃火器俱發霹靂震地賊大驚駭伏法殱焉火禽附孫子火墜周亮輔纂孫子作火隊注云臨陣之時火礟火車之外又有火燕焚燒其隊伍使亂因而擊之火盜附五代晉時梁軍破棗强符存審扼下博橋史建瑭率百騎為梁旗幟雜梁芻牧者夜叩梁營斬其守門卒縱火大呼斬擊數十百人梁祖夜拔營去火弩附元郭寳玉從太祖伐西畨次阿穆爾河敵築十餘壘陳船河中俄風濤暴起寳玉令發火弩射其船一時延燒乗勝直前破䕶岸兵五萬臣等謹案杜氏通典火攻之後附以火兵火獸火禽火盜火弩盖即火攻之具杜氏特詳其制後之行軍者往往用之今依次纂入又如金以勑黄紙十六重為筒長二尺許實以柳炭鐵滓磁末硫黄砒霜以繩繫槍端軍士各懸小鐵礶藏火臨陣燒之焰出槍前丈餘藥盡而筒不損謂之火槍又有火砲名震天雷者用鐵礶盛藥以火㸃之所爇圍半里以上火㸃著鐵甲皆透明曽銑在邊置慢砲法砲圓如斗中藏機巧火線至一二時纔發外以五采飾之敵拾得者駭為異物聚觀傳玩者牆擁須臾藥發死傷甚衆又製地雷穴地丈餘許櫃藥於中以石滿覆更覆以沙令與地平伏火於下可以經月擊其發機於地面過者蹴機則火墜藥發石飛墜殺人敵驚以為神此皆火攻之具也今不另分列門類謹附載于此禦火攻附唐末王重師為潁州刺史從梁太祖攻濮州縱兵壊其墉濮人因屯火塞其壊壘烟焰亘空人莫敢越重師方苦金瘡卧軍次諸將勉之乃躍起命將士悉取軍中氈罽投水中擲于火上重師率精鋭持短兵突入諸軍踵之濮州乃陷宋冀州將官李政備守有方紀律嚴明一日金人登城火其門樓政以重賞募死士撲之俄有數千人皆以濕氈裹身躍火而進大呼力戰金人解去城賴以全後政死而城失守又王徳既破邵青諜言青復索戰將用火牛徳笑曰此古法也可一不可再命合軍時萬弩齊發牛皆反奔賊衆盡殱青遂面縛執送行在臣等謹按杜氏通典火攻言我以火攻敵也若敵用火攻尤當思所以禦之通典未及此今謹增入乗風取勝五代晉時契丹來攻杜重威領兵至白團衛村下營敵騎環繞之竒兵出寨後斷糧道是夜東北風大起破屋折木營中掘井輒壊人馬俱渇契丹主令其衆曰晉軍止此耳當盡擒之命鐵鷂軍四面下馬拔鹿角而入奮短兵以擊晉軍又順風縱火揚塵以助其勢至曙風尤甚時晉師居下風弓弩無所施李守貞曰此風助我也彼衆我寡風沙之内莫測多少奪命格鬬强者必勝如俟風止我無噍類矣張彦澤召諸將問計藥元福曰敵謂我不能逆風以戰宜出其不意以擊之此亦兵家詭道也符彦卿曰與其東手就擒曷若以身徇國乃與元福等引精騎出西門擊賊諸將繼之契丹却數百步彦卿謂守貞且曳隊往來乎直前奮擊以勝為度乎守貞曰事勢如此安可回鞚宜長驅取勝耳彦卿等躍馬而去風勢益甚昏晦如夜乃擁萬餘騎横擊契丹呼聲動天地契丹大敗而走金太祖㑹遼都統蕭哈哩副都統托卜嘉於鴨子河將及河遼兵方壊陵道金選壯士十輩擊走之大軍繼進遂登岸甲士三千七百至者纔三之一俄與敵遇於出河店㑹大風起塵埃蔽天乗風勢擊之遼兵潰遂至沃稜濼元星節復池州進據清水灣伺者告賊艦至自上流順風舉帆衆數十倍諸將失色星節曰無傷也風勢甚彼倉猝不得泊但伏横港中偃旗以待俟過而撃之無不勝矣風怒水駛賊奄忽而過乃命舉旗張帆鼓譟而薄之官軍殊死鬬風反為我用大克之又金將李伯祥據趙州穆呼哩遣王義𢷬其城㑹天大風雨義帥壯士挾長梯疾趨夜四鼓四面齊集登城殺守陴者城中亂伯祥挺身走天壇寨一州遂定又巴延伐宋命吕文煥招降郢州守將王虎臣王大用不應日暮風大起巴延命順風掣金汁砲焚其廬舍烟焰張天城破屠之明成祖與盛庸軍遇南兵軍西南北兵軍東北交戰未分勝負忽東北風大作塵起蔽天砂礫擊面人咫尺不相見成祖麾兵乗風大呼縱左右翼横擊之鉦鼔之聲震地南兵大敗追至滹沱河斬溺死者不可勝計降者悉縱遣之又成祖與李景隆大戰于白溝河先為瞿能平安所勝得髙煦帥精騎數千合戰㑹大風起南師陣少動乃以勁騎繞出其後突入馳擊遂斬能於陣安亦敗乗風縱火南師大潰盡棄其輜重以遁斬溺數十萬降者數萬人水攻五代初梁太祖遣丁㑹將兵攻宿州刺史張筠堅守㑹乃率衆於州東築堰壅汴水以浸城筠乃降宿州平大舉南伐命龎師古以徐宿宋滑之師直趣清口楊行密遣朱瑾領兵以拒師古因決水浸軍初師古營清口其地卑下或請就髙為栅師古以非全忠命不聴淮人決水浸之請者告曰淮人決河上流水至矣師古怒其揺衆斬之已而水至軍不能戰遂見殺周李重進伐吳破濠州南闗城世宗自攻濠州王審琦拔其水寨吳人屯戰船數百於城北植巨木於淮水以限周兵帝命水軍攻之拔其水寨焚船七十餘艘斬首二千餘級又收其羊馬城中震恐又周師攻吳夀州吳人大發樓船蔽州而下泊於濠泗周師頗不利吳將林仁肇以水陸軍齊進又以船載薪乗風縱火欲焚周所為浮梁周將張永徳使習水者没其船下擊以鐵鏁急引輕舠擊之吳人船不得進退溺者甚衆奪巨艦數十永徳解金帶賞習水者宋太祖北征王師傅太原命築長堤壅汾水灌其城決晉祠水注城下置寨於城四面逼之太祖幸城北引汾水入隄灌城内又幸城東南命水軍乗小舟載强弩進攻水自城門入而有積草自城中飄出塞之㑹嵗暑雨軍士多疾乃班師其後北漢主決城下水注之臺駘澤水落而城多摧圯契丹使者韓知璠猶在太原歎曰王師之引水浸城也知其一不知其二若知先浸而後涸則并人無類矣金薩滿阿里與髙彪監䕶水運宋以舟師阻亳州河路擊敗之追殺六十餘里獲其將蕭通破漣水水寨賊盡得其大船遂取漣水軍招徠安輯之石州平宋弼再伐宋薩滿阿里已老督造戰船詔賜薩滿阿里錢千萬自結髮從軍大小數十戰尤習舟楫江淮用兵無役不從時人以水星目之元張宏範師次崖山宋軍餘千艘碇于海中建樓櫓其上隠然堅壁也宏範引舟師赴之崖山東西對峙其北水淺舟膠非潮來不可進乃由山之東轉南入大洋始得逼其舟又出竒兵斷其後路燒其宫室明俞通海從征陳友諒戰鄱陽湖建議曰湖水有淺深舟難迴旋不利戰莫若縱之入江先據敵上流迎戰友諒成擒矣後果然又俞大猷言防江必先防海水兵急於陸兵盖倭寇長陸戰今樓船髙大倭船遇之輒摧壓魚爛固我兵所長也善戰者毋以短擊長而以長制短且海戰無他法在知風候齊號令以大勝小以多勝寡耳於是用舟師戰而舟山積嵗不除之賊皆勦水平及水戰具附五代周師征南唐李景初無水戰之具已而屢敗景兵獲水戰卒乃造戰艦數百艘使降卒教之水戰又造齊雲船數百艘世宗至楚州北神堰齊雲船大不能過乃開老鸛河以通之遂至大江景初自恃水戰以周兵非敵且未能至江及見周師列于江次甚盛以為自天而下乃請降金海陵王正隆時營汴京新宫張中彦採運闗中材木青峯山巨木最多而髙深阻絶唐宋以來不能致中彦使構崖駕壑起長橋十數里以車運木若行平地開六盤山水洛之路遂通汴梁明年作河上浮梁復領其役舟之始製匠者未得其法中彦手製小舟纔數寸許不假膠漆而首尾自相鉤帶謂之鼔子卯諸匠無不駭服其智巧如此浮梁巨艦畢功將發旁郡民曳之就水中彦召役夫數十人治地勢順下傾瀉於河取新秫稭宻布於地復以大木限其旁臨晨督衆乗霜滑曳之殊不勞力而致諸水元師逼萬州宋人將舟師數百艘遡流迎戰安扎爾順流率勁兵乘巨筏浮草舟於其間弓弩雨射宋人不能敵敗諸夔門又賈似道都督諸路軍馬十三萬號百萬步軍指揮使孫虎臣為前鋒淮西制置使夏貴以戰艦二千五百艘横亘江中似道將後軍巴延命左右翼萬户率騎兵夾江而進礟聲震百里宋軍陣動貴先遁以扁舟掠似道船呼曰彼衆我寡勢不支矣似道聞之倉皇失措遽鳴金收軍軍潰衆軍大呼曰宋軍敗矣諸軍戰艦居後者阿珠促騎召之挺身登舟手柁衝敵船舳艫相盪乍分乍合阿珠以小旗麾何瑋李庭等並舟深入巴延命步騎左右犄之追殺百五十餘里溺死無算得船二千餘艘及其軍資器仗圖籍符印又張世傑集海艦千餘艘貫以巨索為柵以自固李恒斷其汲路其勢日廹諭降不可乃陣於船尾由北面逆行𢷬其柵索絶世傑戰死明戚繼光編水兵法每一寨係一將領者不拘船之大小多寡均匀分派但係一寨之尊不拘參逰都司把總一例曰主將各量分親船為中中司中軍領之緣將領所職應在衝要故多其數以便督進若主將往中左石各司巡邏監督只將中中隨從便於往來一到彼哨又有該哨相帮即稱重矣永不許抽零司哨之船若主將仍抽取司哨寸板以致司哨寡弱悞事只重罪主將主將中軍船不及各司數者以其常與一司合為一處勢已倍於他哨而船中必擇其第一堅大者為中軍司將勢已厚餘分為中司左司右司每司分二哨共六哨船多則加前司後司又加分二哨共十哨毎哨船隻大小相兼大約十船以下五船以上為一䑸哨官領之兩哨為一司分總領之三司二司則為一部主將領之凡每船上大旗俱用黒布一則便於逺瞭一則合于水性也仍用白布取寨名一字大書加于旗心各照方色製以號帶毎隊長小旗一面各照本船號帶方色凡捕盜專管一船之務無所不理凡入船客兵俱聴管束第一當重其事權俾有專力無掣肘可也舵工專管舵兼防舵門下攻守椗手專管椗正頭前攻守瞭手專管帆檣繩索主將調斗手遇賊則上斗用犂頭鏢下射賊舟神器手專管定發無敵神飛砲掌號手專管接應司哨號令及獨船對敵進止號令守艙門者臨敵牢守艙門平時管一應家伙槓具支銷晝夜出入闗防隊長司一隊内攻守督兵用命賊近專發火桶平時督兵習藝修治軍火器械一號某字船一隻捕盜一名家丁一名舵工二名斗手二名瞭手二名椗手二名守艙門二名掌號一名神器四名此一定不可増減兵八隊毎隊隊長一名兵十名共八十八名或七隊六隊五隊相船相地損益之後各號船皆倣此旗幟方色俱隨本哨敵半涉水擊必勝五代晉髙祖天福二年范延光反遣其牙將孫鋭澶州刺史馮暉以兵二萬距黎陽掠滑衛髙祖以楊光逺為招討使引兵自滑州渡胡梁攻之鋭輕脱無謀時軍士苦大熱皆不為用光逺得其諜者知其謀誘鋭等渡河半濟而擊之兵多溺死鋭暉退走入魏閉壁不復出明胡宗憲勦海賊徐海等㑹賊入紹興大兵遇於江橋僅隔一河乃令土目田九霄邀其前同知曲入繩襲其後賊見兩兵渡河大怖而走宗憲笑曰賊若乗我兵半渡追擊勝負未可量今已投死地無能為也聚衆圍之死者强半又荔浦賊八千餘人渡江東冦沈希儀以五百人待之賊將窺江希儀謀之諸將曰蛟龍灘濶滑石灘狹須奪其濶而致之狹乃可擊於是伐岸竹編篾為縿掲竿為旗使羸卒樹幟燃柴向蛟龍灘以惑之賊疑有備果趨滑石灘希儀預分兵兩岸潛以小艇載勁卒伏葭葦中俟其半渡希儀乗艇順瀧急衝之兩岸伏軍譟而前水陸夾攻賊俱擠墜入淵盡俘之軍行渡水附唐馬燧討田悦悦裒散兵二萬守漳之長橋築月壘扼軍路燧於下流以鐵鏁維車數百絶河載土囊遏水而後渡五代唐李存進為振武軍節度使時晉軍徳勝為南北寨每以舟兵來往頗以為勞而河北無竹石存進欲造浮橋軍使曰河橋須竹笮大艑兩岸石倉鐵牛以為固今無竹木竊慮難成存進曰成算在心必有所立乃課軍造葦笮維大艦數千艘作土山巨木于岸以擊之初軍中以為戲月餘橋成人皆伏其智晉攻梁楊劉晉王李存朂自負蒭以堙塹遂破之後與梁相拒於楊劉梁將謝彦章決河水以隔晉軍晉遂渡水擊彦章破其四寨周世宗幸淮上親領兵破賊砦砦在濠水東北十八里灘上其灘廣袤數里淮水浸而圜之乃濠上之咽喉也先是賊居其地泊舟檝以自固恃其四面水深謂王師必不能濟帝之將行也悉索行在槖駝以往臣寮咸不諭其㫖及至命甲士數百人跨槖駝以濟帝又續領騎軍相繼而渡一鼓而盡殪之獲其戰艦而迴宋時南唐樊若水謀歸宋乃于采石江上乗小舟載絲繩其中維南岸疾抵北岸量江廣狹因詣闕上書言江南可取狀請造浮梁以濟師及宋用兵造舟數十艘乃先試於石牌口移置采石不差尺寸大兵渡江若履平地卒以克㨗金和碩從羅索圍太原宋將种師中以兵十萬來援和碩擊敗之大軍至河無船不得渡羅索遣和碩循水上下和碩率軍三百自孟津而下度其可渡遂引軍以濟大軍於是皆繼之宋將郭京出兵數萬趨羅索營和碩從旁奮擊敵亂遂破之師還破敵於平陸渡得其船以濟又宗望伐宋宗弼從軍取湯隂縣降其卒三千人至御河宋人已焚橋不得渡赫哷蘇以七十騎渉之殺宋焚橋軍五百人宗望遣吳孝民先入汴諭宋人宗弼以三千騎薄汴城宋主出奔選百騎追之弗及獲馬三千而還又宗弼軍自杭州遂取秀州特嘉暉敗宋軍於平江遂取平江阿里率兵先趨鎮江宋韓世忠以舟師扼江口宗弼舟小契丹漢軍沒者二百餘人遂自鎮江泝流西上世忠襲之奪世忠大舟十艘於是宗弼循南岸世忠循北岸且戰且行世忠艨艟大艦數倍宗弼軍出宗弼軍前後數里擊柝之聲自夜達旦世忠以輕舟來挑戰一日數接將至黄天蕩宗弼乃因老鸛河故道開三十里通秦淮一日一夜而成宗弼乃得至江寧達賚使伊拉固自天長趨江寧援宗弼烏凌阿托雲亦以兵來㑹連敗宋兵宗弼發江寧將渡江而北宗弼軍渡自東伊拉固渡自西與世忠戰於江渡世忠分舟師絶江流上下將左右掩擊之世忠舟皆張五緉宗弼選善射者乗輕舟以火箭射世忠舟上五緉著火箭皆自焚烟焰滿江世忠不能軍追北七十里舟軍殱焉世忠僅能自免宗弼渡江北還又赫舍哩志寧以臨海節度使都統右翼軍攻鄂斡鄂斡敗於長濼西走志寧追及於霧􅟶河賊已先渡依岸為陣毁橋岸以為阻志寧與賊夾河為疑兵與萬户𤓰爾佳清臣圖克坦哈魯於下流設渡已渡前有支港岸斗絶其中泥濘乃束柳填藉士卒畢濟行數里得平地將士方食賊奄至據南岡三馳下志寧陣陣堅力戰却之元張榮從太祖征西域至莫蘭河不能涉召問濟河之䇿榮請造舟太祖曰舟卒難成濟師在何時榮請以一月為限乃督工匠造舟百艘遂濟又楊竒札噶師至徐州河不得濟探知賊兵有操舟楫伏澤中帥勁卒數人慿河擊之悉奪舟楫衆遂得渡又楊竒札噶從安扎爾攻歸徳竒扎噶麾諸將縛草作筏渡濠抵城下梯城先登拔之又世祖南伐駐蹕江渚令諸將南渡先達彼岸者舉鋒火為應鄭鼎首達南岸衆軍悉渡又世祖師至嘉陵白水交㑹勢洶急帝問船幾何可濟汪徳臣曰大軍百萬非可延淹當别為方畧即命繫舟為梁一夕而成如履坦途又巴延阿珠伐宋趨郢州遇水濼霖雨水溢無舟不能涉巴延曰吾且飛渡大江而憚此潢潦耶乃召一壯士負甲仗騎而前導麾諸軍畢濟次鹽山又先是襄樊兩城漢水出其間宋植木江中聨以鐵鎖中立浮梁以通援兵樊恃此為固至是巴延師至漢口阿珠以機鋸斷木以斧斷鎖焚其橋襄兵不能援遂拔樊城守將吕文煥懼而出降又舒穆嚕安扎攻蜀叙州守將横截江津不得渡安扎聚軍中牛皮作渾脱及皮船乗之與戰破其軍奪渡口為浮橋以濟明常遇春初從太祖渡江抵采石元兵陣磯上下聨大舟距三丈許莫敢先登遇春至太祖麾之前即捨舟挺戈一躍而上衆披靡遂拔采石禦敵水軍絶下流敗之元武仙遣將盧秀李伯祥帥兵謀襲趙州并取瀝城率戰艦數百艘沿江而下王義具舟楫於紀家莊截下流邀擊之義士卒皆水鄉人善水戰回旋開闔往來如風兩船接則躍登彼舟奮戈疾擊敵莫能當大破之又巴延攻郢州郢在漢水北以石為城宋人又於水南築新郢横鐵繩鎖戰艦宻樹樁木水中下流黄家灣堡亦設守備之具堡之西溝南通藤湖至江僅數里巴延乃遣將攻黄家灣堡拔之諸軍破竹席地盪舟由藤湖入漢江明傅友徳征雲南進兵曲靖元梁王遣達爾瑪拒戰友徳用沐英策勒兵至白石江與相拒揚聲欲渡而分遣將以精卒五千潛從下流掩其背衆亂友徳乃麾軍畢濟悉師薄之副將率鐵騎𢷬其中堅下流之師表裏合擊遂大破之欽定續通典卷一百四
