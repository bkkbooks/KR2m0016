body:
  text: 州郡元元起朔漠併西域平西夏臣髙麗定南詔太宗六年滅金得中原州郡世祖至元十三年平宋全有版圖踵遼金故迹仍都於燕立中書省一統山東西河北之地謂之腹裏行中書省十有一曰嶺北曰遼陽曰河南曰陜西曰四川曰甘肅曰雲南曰江浙曰江西曰湖廣曰征東分鎮藩服路一百八十五府三十三州三百五十九軍四安撫司十五縣一千一百二十七其地北踰隂山西極流沙東盡遼左南越海表東西九千三百二里南北一萬三千三百六十八里中書省統腹裏之地為路二十九州八屬府三屬州九十一屬縣三百四十六各路立站總計一百九十八處大都路金為大興府元太祖十年克燕初為燕京路總管大興府至元元年改中都其大興府仍舊四年始於中都之東北置今城而遷都焉九年改大都十九年置留守司二十一年置大都路總管府初為警巡院三至元四年省其一止設左右二院分領坊市民事領縣六州十州領十六縣大興赤宛平赤與大興分治郭下良鄉下永清下寶坻下至元十六年於縣立屯田所收籽粒赴太倉及醴源倉輸納昌平下涿州下元太宗八年為涿州路世祖中統四年復為涿州領二縣范陽下倚郭房山下金奉先縣元至元二十七年改今名霸州下金置信安軍元仍為霸州領四縣益津下倚郭中統四年省至元二年置文安下大城下保定下至元二年省入益津四年置當按金史地理志保定縣屬雄州是元初來屬謹附識通州下領二縣潞倚郭三河下薊州下金為中都元太祖十年定其地仍為薊州領五縣漁陽下倚郭豐潤下至元二年省入玉田四年以路當衝要復置二十一年立豐潤署領屯田八百三十七戶玉田下遵化下平谷下至元二年省入漁陽十三年復置漷州下遼金為漷隂縣元初屬大興府至元十三年升漷州割大興府之武清香河二邑來屬領二縣香河下武清下順州下金有溫陽縣元廢縣存州按金史地理志順州領溫陽密雲二縣元志不言密雲疑有訛脫謹附識檀州下東安州下本安次縣元初𨽻大興府太宗七年𨽻霸州中統四年升為東安州𨽻大都路固安州下舊為固安縣金𨽻涿州元憲宗九年𨽻霸州又改𨽻大興府中統四年升固安州龍慶州金為縉山縣元至元三年省入懷來縣五年復置本屬上都路宣德府奉聖州仁宗延祐三年以誕生之地割縉山懷來來𨽻大都升縉山為龍慶州領一縣懷來下上都路金平契丹置恆州元初為扎拉爾部烏嚕郡王營幕地憲宗五年命世祖居其地為巨鎮中統元年為開平府五年以闕庭所在加號上都至元二年置留守司五年升上都路總管府十八年升上都留守司兼行本路總管府事置警巡院一領縣一府一州四州領三縣府領三縣二州州領六縣開平上初按續輿地考至元因東陽古城置縣尋省入興州後復置謹附識順寧府金為宣德州元初為宣寧府太宗七年改山東路總管府中統四年改宣德府仍𨽻上都路至元三年以地震改順寧府領三縣二州宣德下倚郭至元二年省本府之録事司并龍門縣並入焉二十八年又割龍門去屬雲州宣平下順聖下舊𨽻𢎞州今來屬保安州下遼奉聖州金為興德府按金史地理志作德興府治德興縣元志誤謹附識元初因之舊領永興縉山懷來礬山四縣至元二年省礬山入永興三年省縉山入懷來仍改為奉聖州𨽻宣德府尋以地震改名保安州五年復置縉山延祐三年以縉山懷來仍𨽻大都領一縣永興下倚郭蔚州下至元二年省州為靈仙縣𨽻𢎞州其年復改為蔚州𨽻宣德府領五縣靈仙下靈邱下宣按金史地理志靈邱縣宗貞祐二年升為成州四年割為代州支郡當是元時復為靈邱來屬元史未詳謹附識飛狐下定安下廣靈下興州下金初為興化軍𨽻北京後為興州元中統三年屬上都路領二縣興安下至元二年置宜興中至元二年置按金史地理志云宜興本興化縣白檀鎮章宗泰和三年升為縣是宜興為金縣元志云至元二年置蓋緑上文興安縣注而誤也謹附識松州下金為松山縣𨽻北京大定府路元中統三年升為松州仍存縣至元二年省縣入州桓州下金置桓州元初廢至元二年復置雲州下契丹置望雲縣金因之元中統四年升縣為雲州治望雲縣至元二年州存縣廢二十八年復升宣德之龍門鎮為望雲縣𨽻雲州領一縣望雲興和路上金置柔逺鎮後升為縣又升撫州屬西京元中統三年以郡為內輔升隆興路總管府建行宫領縣四州一髙源下倚郭中統二年𨽻宣德府三年來屬懷安下元初𨽻宣德府中統三年來屬天成下元初𨽻宣德府中統三年來屬咸寧下元初𨽻宣德府中統三年來屬寶昌州下金置昌州元初𨽻宣德府中統三年𨽻本路置鹽使司延祐六年改寶昌州永平路下金為興平軍元太祖十年改興平府中統元年升平灤路置總管府設録事司成宗大德四年以水患改永平路領縣四州一州領二縣盧龍下倚郭遷安下至元二年省入盧龍縣後復置撫寧下至元二年與海山俱省入昌黎三年復置四年又與海山俱入昌黎七年復置仍省昌黎海山入焉十一年復置昌黎以屬灤州今昌黎屬本路昌黎下至元十一年復置仍併海山入焉詳見撫寧縣灤州下金領義豐馬城石城樂亭四縣元至元二年省義豐入州三年復置先以石城省入樂亭其年改入義豐四年馬城亦省領二縣義豐下倚郭至元二年省入州三年復置樂亭下元初嘗於縣置漠州尋廢復為樂亭縣𨽻灤州德寧路下領縣一德寧下淨州路下領縣一天山下泰寧路下領縣一泰寧下集寧路下領縣一集寧下應昌路下領縣一應昌下全寧路下領縣一全寧下寧昌路下領縣一寧昌下砂井總管府領縣一砂井以上七路一府八縣建置皆闕保定路上金順天軍元太宗十一年升順天路置總管府至元十二年改保定路設録事司領