body:
  text: 禮凶師弟子相為服議唐宋元明唐王義方卒門人員半千何彦先行喪植松柏冡側三年乃去宋胡瑗卒訃至京學士錢公輔與太學生徒百餘人詣興國戒壇院舉哀自陳師喪給假二日張子全書聖人不制師之服師無定體豈可一槩服之故聖人不制其服心喪之可也孔子没弔服加麻亦是服也却不得謂無服也何基卒金履祥議曰為師服者弔服加麻心喪三年古之制也布襴俗服也今之服緦功以上者用之生絹鈎領之衫俗服也今之服緦麻者亦用之服今緦麻之服是不得同喪父無服之重也疑衰古士之弔服也其服亡矣白布深衣古庶人之弔服其制今猶存焉然古之士今之官也今之士其未仕者古之庶人也宜用古庶人之服而以深衣為弔服昔朱子之服門人用細麻深衣而布縁矣然凡布皆麻古以三十升麻為麻冕之布以十五升麻為深衣之布深衣之麻自司馬氏朱氏皆云用極細布則深衣布用苧代麻乆矣其縁則孤子純以素是喪父既除之服也孔門喪夫子若喪父而無服則以喪父服除之服為若喪父無服之服其純用素可也其冠則庶人之弔素委貌失其制矣以白布代之而加素絰於冠可也加麻之絰緦服之絰也今用緦麻而小可也加麻之帶緦麻之帶也今用細苧可也所謂疑衰擬於衰者也元韓擇卒門人為服緦麻者百人明錢徳洪師事王守仁嘉靖丙戊舉進士未廷試而歸戊子北上途中聞守仁之喪往迎至廣信且馳書於其父具陳父生師教願為喪服父許之與同門王畿議服制徳洪以父母在麻衣布絰弗敢加焉畿請服斬衰以從築場廬墓三年而後去朋友相為服議宋宋朱子家禮為朋友緦麻三月語類云朋友麻則弔服而加麻絰爾王柏朋友服議儀禮喪服友朋友麻三字豈非朋友之服乎案鄭康成云朋友雖無親有同道之恩相為服緦之絰帶又曰士以緦麻為喪服其弔服則疑衰疑之為言擬也緦麻之布十五升疑衰十四升即白麻深衣擬於吉服也盖緦麻服之極輕者也他無服矣止有弔服所以擬之注云弔服加麻其師與朋友同既葬除之疏云以白布深衣庶人之常服又尊卑未成服以前服之故庶人得為弔服素冠吉屨無絇其弔服圖云庶人弔服素委貌白布深衣士朋友相為服弔服加麻加麻者即加緦之絰帶是為擬衰或曰深衣吉服也而可為弔服乎僕曰注固云擬於吉服也况非止為弔服親疾病時男女改服注曰庶人深衣又曰子為父斬衰尸既襲衣十五升布深衣扱上袵徒跣交手哭是孝子未成服亦服深衣也或又曰安知深衣為弔服又為麻純乎僕曰純之以采者曰深衣純之以麻者曰麻衣純之以素者曰長衣以采縁之褎長在外則曰中衣又各自有名不可亂也今以深衣為弔服鄉閭亦行之伹未有麻爾是服也勉齋黄氏考之為至詳僕於北山何先生成服日服深衣加絰帶冠加絲武即素委貌覆以白巾見者未嘗不以為怪越數日通齋葉仲成父來弔僕問昔日毅齋之喪門人何服曰初遭喪明朋友以襴樸加布帶其後共考儀禮至葬時方以深衣加絰帶僕於是釋然知無戻於禮也除心喪議宋陳隋唐宋宋文帝元嘉十七年元皇后崩皇太子心喪三年禮心喪者有禫無禫禮無成文世或兩行皇太子心喪畢詔使者博議有司奏喪禮有禫以祥變有漸不宜便除即吉故其間服以纎縞也心喪已經十三月大祥十五月禫變除禮畢餘一期不宜復有禫宣下以為永制詔可孝武大明二年正月有司奏故右光禄大夫王偃喪依格皇后服期心喪三年應再周來二月晦檢元嘉十九年舊事武康公主出適二十五月心制終盡從禮即吉昔國哀再周孝建二年二月其月末諸公主心制終則應從吉於時猶稱心禫素衣二十七月乃除二事不同領曺郎朱膺之議詳尋禮文心喪不應再禫皇代考驗已為定制元嘉季年禍難深酷聖心天至喪紀過哀是以出適公主還同在室即情變禮非革舊章今皇后二月晦宜依元嘉十九年制釋素即吉陳文帝天嘉元年八月尚書儀曺請今月晦皇太后服安吉君禫除儀注沈洙議謂至親期斷加隆故再期而再周之喪斷二十五月但重服不可頓除故變之以纎縞創巨不可便愈故稱之以祥禫禫者淡也所以漸袪其情至如父在為母出適後之子則降降之以期期而除服無復衰麻縁情有本同之義許以心制心制既無杖絰可除不容復改𤣥縵所以宋元嘉立義心喪以二十五月為限今皇后於安吉君心喪之期宜除於再周詔從之隋制齊衰心服以上雖有奪情並終喪不弔不賀不預宴以上杜典不載今續纂唐制父在為母一周除靈三年心喪又嫁母出母妾母本生父母及父卒祖存為祖母皆心喪二十五月並解官宋制同宋呉榮王顥為慈聖光獻太后之服易月當除顥曰身為孫而情文缺然若是可乎請如心喪禮須上禫除即吉詔可臣等謹案賀循喪服要記凡降服既降心喪如常月劉智謂小功以下不税乃無心喪又陳沈洙議元嘉立義心喪以二十五月為限惟王儉古今集記終二十七月為王逡所難何佟之儀注亦用二十五月無復心禫云云是則心禫可廢心喪不可廢也宋服制凡如適孫祖在為祖母為人後者為其所生父母之類皆許解官申心喪三年盖由遵用前代之制自元明此制不行雖不解官而所謂心喪之實固未嘗禁也周喪察舉議宋宋真宗天禧三年正月貢舉人郭􅍬等見崇正殿􅍬冒喪赴舉命典謁詰之即引咎殿三舉時郭􅍬等四千三百人見於崇政殿􅍬以冒緦喪赴舉為同輩所訟帝命興謁詰之引服付御史臺劾問殿三舉保保人並贖金殿一舉四年二月翰林學士承㫖晁逈上言舊制期喪百日内妨試尊長卑㓜同士人病之多入京冒哀就同文試洎中選被人論訴不免坐罪請自今卑㓜期服不妨取解詔從之仁宗天聖七年興化軍進士陳可言臣昨與本軍進士黄價同保臣預解送之後本軍言黄價昨赴舉時有叔為僧喪服未滿臣例當駮放竊思出家制服禮律俱無明文況僧犯大罪並無縁坐犯事還俗勅不得均分父母田園又釋門儀式見父母不拜居父母喪不絰死則法門弟子為之制服其於本族並無服式望下禮官詳議許其赴試太常禮院言檢㑹敇文期周尊長服不得取應又禮為叔父齊衰期外繼者降服大功九月其黄價為叔僧合比外繼降服大功哲宗元祐時程頤看詳學制謂士子遭祖父母喪不得應舉案朱子曰祖父母喪不赴舉法令雖不禁士子宜行之知渡江之後載籍軼亡矣丁憂終制議元明元制諸職官親死不奔喪降先職二等未終喪赴官降一等不丁父母憂者罪與不奔喪同明制今百官聞喪不待報即去官後京官有勘合在外官有引起復有程限奪喪短喪有喪有禁視昔加嚴云太祖洪武初百官聞祖父母伯叔兄弟喪俱得奔赴二十三年四月吏部言祖父母伯叔兄弟皆係期年服若俱令奔喪守制或一人連遭五六期喪或道路數千里則居官日少更易繁數曠職廢事今後除父母及祖父母承重者丁憂外其餘期服制不許奔喪但遣致祭從之英宗正統十二年令内外大小官員丁憂者不許保奏奪情起復世宗嘉靖四十二年周府南陵王睦楧上疏云文職上自九卿下及百僚皆知父母之恩行三年丁憂之制今各王府所選儀賓受封大夫郎官之職係與文職一體相同何父母身終不行丁憂之制豈為人子之道哉伏望敇下禮部自今見爵儀賓凡有父母身故宜照文職事例將半俸停止服滿之日方許開俸疏入下禮部議明年御史林潤等以為言始定儀賓守制穆宗隆慶元年吏部主事郭諌臣請衍聖公終制先是衍聖公凡遇父母之喪不行丁憂即請承襲與軍職同至是諌臣疏謂魯為上世秉禮義之國而孔子又萬世禮義之宗今國家特世封為衍聖公秩以一品者正以聖人後為能守禮以表率天下之人耳不使其子孫守三年之制其何以責天下乞許遵制丁憂一如文臣終制起復從之生員丁父母憂者不許赴鄉試及提學官科嵗二試舉人丁父母憂者不許赴會試其監生及儒士丁憂者亦不許赴試景帝景㤗五年御史黄漙請罷舉人監生由服以廣科目從之由服者二十七月正服之外餘服程限也改葬服議北齊唐宋明北齊王元軌子欲改葬祖及祖母列上未知所服邢子才議曰禮改葬緦麻鄭𤣥注臣為君子為父妻為夫惟三人而已然適孫曾孫承重者曾祖父母祖父母改葬既並三年之服皆應服緦禮文非遺漏是舉其畧耳杜典不載今續纂唐韓愈議經曰改葬緦春秋榖梁傳亦曰改葬之禮緦舉下緬也此皆謂子之於父母其他則皆無服何以識其必然經次五等之服小功以下然後著改葬之制更無輕重之差以此知惟記其最親者其他無服則不記也若主人當服斬衰其餘親各服其服則經亦言之不當惟云緦也𫝊稱舉下緬者緬猶逺也下服之最輕者也以其逺故其服輕也江熙曰禮天子諸侯易服而葬以為交於神明者不可純凶况其緬者乎是故改葬之禮其服雖輕以此而言則亦明矣衛司徒文子改葬共叔問服於子思子思曰禮父母改葬緦既葬而除之不忍無服送至親也非父母無服無服則弔服而加麻此又其著者也文子又曰喪服既除然後乃葬則其服何服子思曰三年之喪未葬服不變除何有焉然則改葬與未葬者有異矣古者諸侯五月而葬大夫三月而葬士踰月無故未有過時而不葬者也過時而不葬謂之不能葬春秋譏之若有故而未葬雖出三年子之服不變此孝子之所以著其情先王之所以必其時之道也雖有其文未有著其人者以知其至少也改葬為山崩水涌毁其墓及葬而禮不備者若文王之葬王季以水嚙其墓魯隠公之葬恵公以有宋師太子少葬故有闕之類是也喪事有進而無退有易以輕服無加以重服殯於堂則謂之殯瘞於野則謂之葬近代已來事與古異或游或仕在千里之外或子㓜妻稚不能自還甚者拘以隂陽畏忌遂葬於其土及其反葬也逺者或至數十年近者亦出三年其吉服而從於事也乆矣又安可取未葬不變服之例而反為之重服與在喪當葬猶宜易以輕服况既逺而反純凶以葬乎若果重服是所謂未可除而除不當重而更重也或曰喪與其易也寧戚雖重服不亦可乎曰不然易之與戚則易固不如戚矣雖然未若合禮之為懿也儉之與奢則儉固易於奢矣雖然未若合禮之為懿也過猶不及其此類之謂乎或曰經稱改葬緦而不著其月數則是三月而後除也子思之對文子則曰既葬而除之今宜如何曰自啟殯至於既葬而三月則除之未三月則服以終三月也案袁孝尼云喪無再服若終月數是再服也魏崔長仁云鄭氏得服緦之㫖謬三月之言曰妻為夫何如曰如子無弔服而加麻何如曰今之弔服猶古之弔服也宋禮志太祖改葬宣祖安陵有司言案儀禮改葬緦注云臣為君子為父妻為夫也必服緦者親見尸柩不可以無服緦三月而除之今請皇帝服緦皇親及文武官䕶送靈駕者亦服緦既葬而除朱子云改葬服緦鄭𤣥謂終三月而除王肅謂事畢而除俱不可攷禮宜從重從鄭可也明集禮改葬之日内外諸親皆至各就次主人服緦麻服諸親皆素服既葬行虞祭畢主人以下出就别次釋緦麻服素服而還臣等謹案改葬緦蓋緦乃主布而言服之輕者非緦必繫之三月也周禮司服凡弔王為諸侯緦衰諸侯及卿大夫亦以緦衰為弔服豈必繋之三月乎此不過改葬時見尸柩之暫服鄭注三月而除之誤矣昌黎韓氏以營葬既畢恰值三月為解亦屬附會載徳云制緦麻具而葬葬而除斯言得之矣改葬反虞議宋明宋政和禮凡有改葬者皆具事目聞於官勘驗得實聴之案明吕坤曰改葬非得已也濱於水則遷櫬於客土則遷必為城郭道路則遷先貧賤後富貴合而窆之則遷凡以為親也非是則否將改葬先於墓所隨地之宜張白布帷幕南向開户其日内外諸親皆至墓所各就便次主人以下及妻妾女子俱緦服周親以下素服丈夫於墓東西向婦人於墓西東向皆北上婦人障以行帷俱立哭盡哀卑者再拜祝立於羨道南北向内外哭止祝三聲噫嘻啟以改葬之故内外又哭盡哀權就别所掌事者開墳訖内外又就位哭如初設席於幕下舉柩出置於席上内外俱從哭於墓所分東西位如常儀祝以功布拭棺掌饌者設饌於柩南主人盥手以琖跪奠酒再拜訖少頃徹奠進柩車於帷門外南向升柩於車遂詣幕所内外俱哭掌事者先設牀於幕下有枕席周設帷如不易棺則不設牀柩車至帷門外丈夫柩東婦人柩西俱立哭掌事者舉柩入設牀柩東舉尸出置於牀南首遂歛如大歛之儀如明衣裳不殯也乃設靈座於吉帷内幕下西廂東向施牀帷屏服飾以時上飲饍及沐如平生也乃葬將引柩告曰以今吉辰用即宅兆不設祖奠無反哭無方相魌頭餘如常葬之儀既葬就吉惟靈座前一虞虞如常儀其祝辭云維年月朔日辰孝子某敢昭告於考某官封謚改遷幽宅禮畢終虞夙夜匪寧啼號罔極謹以清酌庶羞祇薦虞事於考某官封諡尚饗既虞主人以下出就别所釋緦服反素服而還掌饌者徹饌掌事者徹靈座朱子曰改葬須告廟而後告墓以葬葬畢奠而歸又告廟哭而後畢事方穏當行葬更不必出主祭告時却出主於廟明㑹典與宋同臣等謹案晉荀訥以改葬不應反虞故開元政和諸禮皆設靈座於墓所葬畢而虞祭畢而徹無反哭之文觀朱子云又告廟哭而後畢事是仍宜反哭也父母墓毁服議明明王廷相曰父母之墓崩毁或盗發露柩體修之宜何服曰此痛之甚者也可無制服以臨之乎禮無正文以義而起亦可也改葬禮緦其服雖輕而用情甚重修墓更葬其事體均制緦禮也三年而後葬變除議宋宋政和禮凡父母之喪周而葬者則以葬之後月小祥大祥取再周之禮禫亦如之若再周而後葬者則以葬之後月練又後月為大祥祥而即吉無復禫矣其未再周葬則以二十五日練二十六月祥二十七月禫若再周而未葬則俟已葬而後除服久喪不葬服議陳陳高祖永定中有司奏前寧逺將軍建康令沈孝軌門生陳三兒牒稱主人翁靈柩在周主人奉使關内因欲迎喪乆而未返此月晦即是再周主人弟息見在此者為至月未除靈内外即吉為待主人還情理申竟以事諮左丞江徳藻徳藻議曰王衛軍云乆喪不葬唯主人不變其餘親各終月數而除此盖引禮文論在家内有事故未得葬者耳孝軌既在異域雖已迎喪還期無指諸弟若遂不除永絶婚嫁此於人情或為未允中原淪陷已後理有事例宜諮沈常侍洙詳議洙曰禮有變正又有從宜禮小記云乆而不葬者唯主祭者不除其餘以麻終月數者除喪則已注云其餘謂旁親如鄭所解衆子皆應不除王衛軍所引此盖禮之正也但魏氏東闗之役既失亡尸柩葬禮無期時議以為禮無終身之喪故制使除服晉氏喪亂或死於冦庭無由迎殯江左故復申明其制李𦙍之祖王華之父並存亡不測其子制服依時釋衰此並變禮之宜也孝軌雖因奉使便欲迎喪而還期未剋宜依東闗故事在此國内者並應釋除衰麻毁靈祔祭若喪柩得還别行改葬之禮徳藻依洙議奏可杜典不載今補纂招魂葬議唐宋明唐薛収曰招魂葬非古禮也漢魏之術皆妄也葬之為言藏也仁人於其親掩藏歸穴不豐不儉必約於禮焉延陵季子曰魂無不之此言葬形非葬魂矣禁之禮也宋太宗淳化中有言昭成太子嬖妾張氏於都城西佛寺招魂葬其父母僣差踰制帝怒遣昭宣使王繼思驗問明李濓招魂葬答問嘉靖丁酉冬十二月十日汴馬生北赴南宫試渡河走冰壞其舟溺而死求其尸踰月不可得其家請招魂葬焉乃質於李子李子曰史𫝊有之禮家之所不取也吾聞葬也者藏也所以藏其形於地下以安厝也故椁周於棺棺周於身非身無棺非棺無椁茍無其身而招魂葬焉則於義為窒於徳為悖於禮為不物何也亡者不可以假存無者不可以偽有也是故禮經無招魂葬之文漢魏以還或有冒為之者而袁瓌荀組干寶孔衍之徒咸著論以非之可謂通幽明之故知鬼神之情者矣延陵季子曰骨肉復歸於土命也若魂氣則無不之也是故聖人制為殯葬之禮本以掩厥形骸不以安魂為事既葬之日迎神而返於家盖孝子之心不思一日離也若閉靈爽於沈魄之域是為不仁樹松楸於空椁之冡是為不知仁知亡而人之道熄矣豈孝子事其親之心哉曰然則當如之何曰闔宅眷屬宜於遭溺之地備迎神之禮括髪徒跣號呼於塗而迎之以歸祠廟以妥之木主以依之祝辭以告之牲醴爼豆以享之哭泣擗踊以哀之三年而除其服嵗時舉祀如常儀則庶乎其可也禁火葬議宋元明宋太祖建隆三年三月丁亥詔曰王者設棺椁之品建封樹之制所以厚人倫而一風化也近代以來率多火葬甚愆典禮自今宜禁之高宗紹與二十七年監登聞鼓院范同言今民俗有所謂火化者生則奉養之具惟恐不至死則燔爇而棄捐之何獨厚於生而薄於死乎甚者焚而置之水中識者見之動心國朝著令貧無葬地者許以係官之地安葬河東地狹人衆雖至親之喪悉皆焚棄韓琦鎮并州以官錢市田數頃給民安葬至今為美談然則承流宣化使民不畔於禮法正守臣之職也方今火葬之慘日益熾甚事關風化禮宜禁止仍勅守臣措置荒間之地使貧民得以収葬少禆風化之美從之司馬光書儀世人有游宦没於逺方子孫火焚其柩収燼歸葬者夫孝子愛親之肌體故歛而葬之殘毁他人之尸在律猶嚴况子孫而悖謬如北其始蓋出於羌俗行之既乆習以為常見者恬然曾莫之怪豈不哀哉延陵季子適齊其子死葬於嬴博之間曰骨肉復歸於土命也魂氣則無不之也孔子以為合禮必也不能歸葬葬之所在可也不猶愈於焚之哉元順帝至正十五年正月北京路同知高朝列牒伏見北京路百姓父母身死往往置於柴薪之上以火焚之照得古者聖人治喪具棺椁而厚葬之今本路凡人有喪以火焚之實滅人倫有乖喪禮本省詳看送禮部議得四方之民風俗不一若便一體禁約似有未盡參詳比及通行定奪以來除從軍應役并逺方客旅諸色目人許從本俗不須禁約外据土著漢人擬合禁止如遇喪事稱家有無置備棺椁依禮埋葬以革火化之弊若貧民無地葬者聴於官荒地内埋了若無人収葬者官為埋瘞明太祖洪武三年禁止浙江等處水葬火葬中書禮部議以民間死喪必須埋葬如無地官司設為義冡以便安葬並不得火化違者坐以重罪欽定續通典卷八十三
