body:
  text: 欽定四庫全書欽定續通典卷三十二職官武官上將軍總敘唐肅宗至徳以後十六衛及六軍左右龍武左右神武左右神䇿號為六軍大將軍將軍員數無所改置已詳杜佑通典宋左右金吾衛左右衛左右驍衛左右武衛左右屯衛左右衛官軍衛左右監門衛左右千牛衛俱有上將軍大將軍將軍為環衛官無定員名雖沿唐制而别無所領其禁軍皆𨽻三衙殿前司及侍衛馬軍步軍二司為三衙其驃騎輔國鎮國冠軍懐化五大將軍雲麾歸徳忠武壯武宣威明威定逺寧逺遊騎遊擊十將軍皆為武散官遼北面官北大王院詳衮司有北院將軍北院小將軍南大王院有南院將軍南院小將軍近侍詳衮司有近侍將軍近侍小將軍宿直司有宿直將軍宿直小將軍四帳都詳衮司有將軍小將軍錫里司有錫里將軍錫里小將軍約尼糺詳衮司有約尼糺將軍約尼糺小將軍國舅伊蘇濟勒翁帳詳衮司有國舅本族將軍國舅本族小將軍部族詳衮司有部族將軍部族小將軍大詳衮司有將軍小將軍大將軍府有大將軍小將軍將軍小將軍西南路巡察司有西南路巡察將軍其屬國有某國將軍某國小將軍遼制將軍本非崇秩位多在詳衮都監之下惟大將軍府各統所治軍之政令故以大將軍統之而小將軍及將軍小將軍屬焉其南面官各衛亦有大將軍上將軍將軍金制置殿前都㸃檢有左右衛將軍副將軍宿直將軍侍衛將軍其左右屯衛將軍左右領軍衛大將軍千牛將軍殿前侍御衛大將軍専值扈從其龍虎衛金吾衛驃騎衛三上將軍奉國輔國鎮國三上將軍昭武昭毅昭勇安逺定逺懐逺六大將軍廣威宣威明威信武顯武宣武武節武徳武義武略十將軍皆為武臣散官章宗泰和六年伐宋權設平南撫軍上將軍平南冠軍大將軍平南龍驤將軍平南虎威將軍平南盪江將軍軍還即罷元監門大將軍將軍武衛將軍左右衛大將軍將軍金吾大將軍將軍羽林將軍殿前將軍領軍將軍夾輅將軍皆扈從官殿内將軍殿外將軍宿直將軍皆執事官其龍虎衛金吾衛驃騎衛奉國輔國鎮國六上將軍昭武昭勇昭毅安逺定逺懐逺六大將軍廣威宣威明威信武顯武宣武武節武徳武義武略十將軍亦為武臣散官明太祖洪武中命徐逹為大將軍有節鉞其後總兵掛印稱將軍者雲南曰征南將軍大同曰征西前將軍湖廣曰平蠻將軍兩廣曰征蠻將軍遼東曰征東前將軍宣府曰鎮朔將軍甘肅曰平羌將軍寧夏曰征西將軍交趾曰副將軍延綏曰鎮西將軍又各總兵官下有遊擊將軍京營有佐擊將軍其驃騎金吾龍虎鎮國定國奉國昭勇昭毅昭武懐逺定逺安逺明威宣威廣威宣武顯武信武武徳武節武略武毅各將軍皆武臣散階之職無所職掌左右衛并親衛唐制左右衛上將軍各一人大將軍各一人將軍各三人掌宫禁宿衛凡五府三衛及折衝驍騎畨上者受其名簿而配以職皇帝御正殿則守諸門及内廂宿衛仗非上日亦將軍一人押仗將軍缺以中郎將代將軍掌貳上將軍之事宋左右衛亦有上將軍大將軍為環衛官無定員皆命宗室為之亦為武臣之贈典大將軍以下又為武臣責降散官徽宗政和中改武臣官制而環衛如故盖雖有四十八階别無所領故也宋制禁兵分𨽻殿前及侍衛兩司所稱十二衛將軍皆空官無實髙宗時多不除授孝宗隆興中始命學士洪遵等討論典故復置十六衛號環衛官以承宣使領左右衛上將軍在内則兼帶在外則不帶正任為上將軍遥郡為大將軍正親兄弟子孫試充又詔祖宗諸后自明肅至欽慈諸后及后妃嬪御之家各具本宗堪充諸衛官以名銜聞其殿前司有都指揮使副都指揮使都虞候各一人掌殿前諸班直及步騎諸指揮之名籍凡統制訓練畨衛戌守遷補賞罰皆總其政令而有都檢㸃副都檢㸃之名在都指揮之上後不復置入則侍衛殿陛出則扈從乘輿大禮則提㸃編排整肅禁衛鹵簿儀仗掌宿衛之事都指揮使以節度使為之副都指揮使都虞候以刺史以上充資序淺則主管本司公事馬步軍亦如之備則通治闕則互攝其騎軍有殿前指揮使内直散員散指揮散都頭散祗候金鎗班東西班散直鈞容直及捧日以下諸軍指揮步軍有御龍直骨朶子直弓箭直弩直及天武以下諸軍指揮其諸班有都虞候指揮使都軍使都知副都知押班其御龍諸直有四直都虞候本直各有都虞候指揮使副指揮使都頭副都頭十將將虞候騎軍步軍有捧日天武左右四廂都指揮使捧日天武左右廂各有都指揮使每軍有都指揮使都虞候每指揮有指揮使副指揮使每都有軍使副兵馬使十將將虞侯承局押官各以其職𨽻於殿前司渡江後都指揮間虛不除則以主管殿前司一員任其事専掌諸班直禁旅扈衛之事捧日天武四廂𨽻焉宿衛親兵並聽節制其下有統制統領將佐等分任其事初渡江時制多草創各衛之制未備稍稍招集填置三帥資淺者各有主管某司公事之稱又别置御營司擢王淵為都統制其後外州駐劄又有御前諸軍都統制之名又併入神武軍以舊統制統領改充殿前統制統領官淳熙以後四廂之職多虛而殿前職司有權管幹有時暫照管之號愈非乾道以前之比矣其侍衛親軍馬軍及歩軍各有都指揮使副都指揮使都虞候各一人各掌其本軍諸指揮之名籍凡統制訓練畨衛戌守遷補賞罰皆總其政令侍衛扈從及大禮宿衛所掌如殿前司馬軍自寵衛而下有左右四廂都指揮龍衛左右廂各有都指揮使每軍有都指揮使都虞候每指揮有指揮使副指揮使毎都有軍使副兵馬使十將將虞候承局押官各以其職𨽻於馬軍司髙宗建炎已後復置主管侍衛馬軍司一人掌出入扈衛守宿之事步軍自神衛左右四廂而下其設官及職掌與馬軍同建炎後復置主管侍衛步軍司一人所掌與侍衛馬軍司同遼北面官侍衛司掌御帳親衛之事有侍衛太師侍衛太保侍衛司徒侍衛司空侍衛北䕶衛府掌北院䕶衛之事有北䕶衛太師北䕶衛太保北䕶衛司徒總領䕶衛司有總領左右䕶衛左䕶衛司有左䕶衛太保左䕶衛右䕶衛司有右䕶衛太保右䕶衛其南䕶衛司設官亦如之宿衛司専掌宿衛之事有總宿衛事亦曰典宿衛事總知宿衛事同掌宿衛事宿衛官禁衛局有總禁衛事禁衛長宿直司掌輪直官員宿直之事有宿直詳衮宿直都監宿直將軍宿直小將軍宿直官宿直䕶衛皆為北面御帳官南面官有左右衛大將軍聖宗開㤗七年皇子宗簡為右衛大將軍上將軍金殿前左衛將軍副將軍殿前右衛將軍副將軍掌宫禁及行從宿衛警嚴仍總領䕶衛又有左右宿直將軍掌總領親軍皆𨽻殿前都㸃檢司其殿前都㸃檢兼侍衛將軍都指揮使掌行從宿衛闗防門禁督攝隊仗總判司事殿前左副都㸃檢兼侍衛將軍副都指揮使右副都㸃檢同專掌宫掖及行從元世祖至元八年改侍衛為右衛掌宿衛扈從及屯田凡屯田各官詳見諸卿司農寺國有大事則調度之二十年置都指揮使一人副都指揮使一人二十一年置僉事二人成宗大徳十一年已後増省不一後定置都指揮使二人副都指揮使二人僉事二人在衛中衛官職省置略與左衛同前衛後衛置於至元十六年設官與左衛同又置右阿蘇衛親軍都指揮使司掌宿衛城禁置達嚕噶齊一人都指揮使三人副都指揮使二人僉事二人其屬有經歴知事承發架閣照磨等官其左阿蘇衛親軍都指揮使司設官職掌與右阿蘇衛同皆𨽻樞宻院其左右衛大將軍將軍皆為扈從執事之官明京衛指揮使司指揮使一人指揮同知二人指揮僉事四人鎮撫司鎮撫二人其畨直宿衛名親軍者二十有六曰錦衣衛主巡察緝捕理詔獄以都督都指揮領之蓋特異於諸衛馬曰旗手衛曰金吾前衛曰金吾後衛曰羽林左衛曰羽林右衛曰府軍衛曰府軍左衛曰府軍右衛曰府軍前衛曰府軍後衛曰虎賁左衛是為上十二衛太祖洪武中置曰金吾左衛曰金吾右衛曰羽林前衛曰燕山左衛曰燕山右衛曰燕山前衛曰大興左衛曰濟陽衛曰濟州衛曰通州衛是為上十衛成祖永樂中置曰騰驤左衛曰騰驤右衛曰武驤左衛曰武驤右衛宣宗宣徳八年置因畨上宿衛故名親軍不𨽻五都督府其京衛𨽻都督府者三十有三曰留守左衛曰鎮南衛曰驍騎右衛曰龍虎衛曰瀋陽左衛曰瀋陽右衛𨽻左軍都督府曰留守右衛曰虎賁右衛曰武徳衛𨽻右軍都督府曰留守中衛曰神策衛曰應天衛曰和陽衛𨽻中軍都督府曰留守前衛曰龍驤衛曰豹韜衛𨽻前軍都督府曰留守後衛曰鷹揚衛曰興武衛曰大寧中衛曰大寧前衛曰會州衛曰富峪衛曰寛河衛曰神武左衛曰忠義右衛曰忠義前衛曰忠義後衛曰義勇右衛曰義勇前衛曰義勇後衛曰武城中衛曰蔚州左衛𨽻後軍都督府又京衛非親軍而不𨽻都督府者十有五曰武功中衛曰武功左衛曰武功右衛𨽻工部曰永清左衛曰永清右衛曰彭城衛曰長陵衛曰獻陵衛曰景陵衛曰裕陵衛曰茂陵衛曰泰陵衛曰康陵衛曰永陵衛曰昭陵衛長史唐置一人掌判諸曹五府外府廩禄卒伍軍團之名數器械車馬之多少宋遼金元明皆無之錄事叅軍唐置一人掌受諸曹及五府外府之事勾稽抄目印給紙筆宋遼金皆無之元各衛置經歴二人知事二人照磨二人明諸衛亦有經歴知事吏目各一人倉曹叅軍唐置二人掌五府文官勲考假使祿俸公廨田園食料醫藥宋遼金元皆無明諸衛有倉大使副使各一人兵曹叅軍唐置二人宋遼金元明皆無騎曹叅軍唐置一人宋遼金元明皆無冑曹叅軍唐置一人宋遼金元明皆無親衛唐置親衛之府一曰親府勲衛之府二曰勲一府曰勲二府翊衛之府二曰翊一府曰翊二府凡五府每府中郎將一人左右郎將一人兵曹叅軍事各一人凡中郎將掌領校尉旅師親衛勲衛之屬宿衛者而總其府事左右中郎將郎貳焉宋三衛官置郎一人秩比中大夫中郎為之貳文武各一人秩比朝議大夫博士二人主簿一人其親衛府郎十人中郎十人親衛官以后妃嬪御之家有服親及翰林學士并管軍正任觀察使以上子孫為之勲衛府郎十人中郎十人以勲臣之世賢徳之後有服親大中大夫以上及正任團練使遥郡觀察使以上子孫為之翊衛府郎二十人中郎二十人文武各四十人以卿監正任刺史遥郡團練使以上子孫為之凡三衛郎治其府之事率其屬日直於殿陛長在左立起居郎之前貳分左右文東武西立都承㫖之後仗退治事於府博士掌教道校試三衛所習文武之藝親衛立於殿上兩旁勲衛立於朶殿翊衛立於兩階衛士之前遼南面官亦有親衛勲衛翊衛金元親衛翊衛皆扈從之官明不設左右驍衛唐制左右驍衛上將軍各一人大將軍各一人將軍各二人掌同左右衛所置官屬亦與左右衛同宋左右驍衛亦有上將軍大將軍將軍並為環衛官無定員與左右衛將軍同遼南面官亦有左右驍衛大將軍上將軍將軍金元皆無明諸衛詳載左右衛中左右武衛唐制左右武衛上將軍各一人大將軍各一人將軍各二人掌同左右衛所置官屬亦與左右衛同宋左右武衛亦有上將軍大將軍將軍並為環衛官無定員與左右衛將軍同遼南面官亦有左右武衛聖宗統和十二年加王忠左武衛上將軍金無之元武衛親軍置都指揮使司至元二十六年樞宻院以六衛六千人大都屯田三千人近路迤南萬户府一千人總一萬人立武衛設官五員成宗元貞大徳年間累増都指揮使四人武宗至大三年省四人後定置衛官達嚕噶齊一人都指揮使三人副都指揮使二人僉事二人其屬經歴二人知事二人照磨一人屬樞宻院其武衛將軍為扈從執事之官明諸衛詳載左右衛中左右威衛唐制左右威