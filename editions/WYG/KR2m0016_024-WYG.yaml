front:
  text: 欽定四庫全書欽定續通典卷二十四
  hash: sha256:f99874c0d11d5cba3638bec854bcbeb9a61065640f5077c193e9291d3976e959
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0016_WYG_024-1a, image: WYG0639/WYG0639-0349a.png}
body:
  text: 職官臣等謹案杜佑通典官制要略篇宰相已後禄秩已前有三老五更一條而於此卷三公總敘條前復專設三老五更之目卷中所載事蹟略同大約前敘其人後明其禮今考自唐以後此禮不行無可綴輯故於前卷仍存其目而此從刪省衍複也三公總敘四輔二大附唐肅宗至徳後三師不常置多為藩鎮勲臣宰臣優禮之官三公亦不常置五代三公三師不常置多以畀藩鎮及贈官宋以太師太傅太保為三師太尉司徒司空為三公為宰相親王使相加官其特拜者不預政事遼以大裕悦為三公惟有大功徳者始得除授焉其制南面官置三師府有太師太傅太保少師少傅少保三公府有太尉司徒司空金三師有太師太傅太保師範一人儀刑四海三公有太尉司徒司空論道經邦燮理隂陽元三公有太師太傅太保各一人特賜銀印以道燮隂陽經邦國示尊崇也太宗即位始建三公至世祖之世其職常缺僅置太保一員至成宗武宗時三公並建無虚位明三公有太師太傅太保三孤有少師少傅少保掌佐天子經邦宏化其職至重無定員無專授建文永樂間罷公孤官仁宗復設宣宗宣徳三年敕太師英國公張輔少師吏部尚書蹇義少傅兵部尚書華葢殿大學士楊士竒少保兼太子少傅户部尚書夏原吉各輟所領侍左右咨訪政事公孤之官幾於專授自此以後公孤但存虚銜為勲戚文武大臣加官贈官而文臣無生授者惟洪武九年四月増置四輔官告太廟以王本杜祐龔斆為春官杜斆趙民望吳源為夏官兼太子賓客秋冬官缺以本等攝之一月内分司上中下三旬位列公侯都督之次寵任特專後雖改罷其制亦異於前代焉太師太師古官唐昭宗乾寧元年以李克用守太師唐制以太師師範一人儀刑四海其職至重終唐之世拜是官者惟克用一人梁太師不常置末帝龍徳時加韋震太師後唐太師不常置莊宗同光初拜張全義太師明宗天成中贈霍彦威太師晉以太師為贈官出帝開運中贈烏震為太師周亦以太師為贈官世宗顯徳中贈王進為太師宋以太師為異數趙普以開國元勲拜太師文彦博以累朝耆徳拜太師曽公亮除守司空檢校太師神宗元豐三年以曹佾檢校太師徽宗大觀二年蔡京為太師政和二年九月詔以太師太傅太保古三公之官今為三師古無此稱合依三代為三公宣和末蔡京童貫鄭紳皆拜太師光宗紹熙初史浩為太師自後韓侂胄史彌逺賈似道皆至太師焉遼大裕悦如南面之有三公太祖以約尼氏裕悦受禪終遼之世以裕悦得重名者三人耶律赫嚕烏哲仁先謂之三裕悦南面官太師穆宗應厯三年有太師唐古特金三師府置太師一員可考者共十一人烏雅宗强宗賢宗磐宗幹宗弼張浩塔延温屯思忠圖克坦克寧圖克坦恭赫舍哩執中追贈者六人宗傑宗敏宗雄宗望達春圖克坦貞元太師最為尊崇太祖十二年以國王置太師一員自後其職常缺明太師其秩最尊大祖洪武三年授李善長太師宣宗宣徳三年授張輔為太師以後加至太師者朱永張懋張鶴齡徐光祚郭勛朱希忠張居正太傅太傅古官唐太傅不常置至徳以前未有拜是官者文宗太和三年以王智興為太傅九年以李載義守太傅昭宗光化元年以韓建守太傅五代以太傅為贈官梁太祖贈劉捍為太傅後唐明宗長興中贈趙光逄為太傅閔帝應順中贈周知裕為太傅晉高祖天福中贈楊思權為太傅周太祖廣順中贈趙瑩為太傅宋初以王旦為太傅任宰相者二十年徽宗宣和末拜太傅者四人王黼燕王侯越王偲鄆王楷南渡後拜張俊韓世忠為太傅以武臣之有大勲業而特拜焉以後楊沂中吳璘並為太傅遼大裕悦擬太傅南面朝官則太宗㑹同元年命馮道守太傅彌文耶律楊六亦為太傅金三師府置太傅一員其可考者二人宗本蕭仲恭元初三公之位或置或不置太祖本紀有太傅額特明初拜徐達太傅以其開國元勲而特命焉藍玉亦領太傅其後世宗嘉靖二年以張居正拜太傅郭勛由太子太傅加太傅太保太保古官唐太保不常置至徳以前未有是官代宗廣徳元年以僕固懐恩為太保憲宗元和七年杜佑罷宰相後以太保致仕文宗太和四年以平章事李載義守太保僖宗中和三年以建王震守太保光啟三年以宰臣韋昭度為太保梁以太保為贈官末帝貞明中贈馬嗣勲太保後唐太保不常置天成中以趙光逄為太保晉太保不常置開運中以劉煦為太保宋制凡除拜必自司徒遷太保元豐八年以曹佾守太保至宣和末除拜者蔡攸肅王樞儀王㮙紹熙初嗣秀王亦為太保遼大裕悦擬太保南面官太宗㑹同元年劉煦守太保金三師府太保一員可考者五人宗隽宗翰宗固宗昻李石元三公不常置世祖時祇置太保一人明初贈常遇春太保郭勛先加太保朱希忠由太子太傅加太保大同總兵官周尚文亦加太保太宰太宰於殷為六太唐及五代皆無是官至宋徽宗政和中設改左僕射為太宰欽宗靖康元年詔依元豐舊制仍改為左僕射遼金元明無之太尉太尉秦官唐制非有大功者不授是官肅宗至徳二載以廣平郡王俶為太尉上元二年加李光弼太尉代宗廣徳二年加郭子儀太尉大厯八年加田承嗣為太尉徳宗建中二年朱泚為太尉貞元三年以李晟為太尉武宗㑹昌四年以宰臣李徳裕守太尉梁太尉不常置貞明中加牛存節太尉亦為贈官王景仁曽贈太尉後唐以太尉為贈官明宗贈孔循王師範為太尉晉開運中加馮道為太尉閻寳為檢校太尉亦為贈官天福中贈房知温劉審交為太尉宋初制在位久近或已任司空司徒者則拜太尉故太傅王旦司徒吕夷簡各任宰相二十年始得以太尉致仕又文彦博以定䇿功除守太尉大觀元年蔡京為太尉至政和二年九月詔以太尉係秦主兵之任非三公之官罷之乃定為武階之首秩在節度使上秩正一品高宗建炎三年劉光世始以檢校太保除太尉自後或以檢校三少或以節度使不帶檢校皆繼進太尉則進使相竟為除授之序遼南面朝官有太尉太宗天顯元年除授太尉趙思温金三公府置太尉一員秩正一品其可考者五人沃稜梧桐完顔匡裴滿達布薩師恭追贈者二人承暉富察鼎夀元初三公三師之職常缺史載太尉之屬或置或不置或開府或不開府仁宗延祐五年御史上言比年名爵濫冒太尉等官接迹於朝前奉詔裁罷中外莫不忻悦近聞禮部奉㫖鑄太尉等印二十有九誠恐載在史冊貽誚將來請將閥閾貴重勲業昭著者留存一二餘並革去制曰可可見仁宗以後較中統至元時多置矣明制三師三孤内無太尉三公三孤詳見前故生受者既無此職追贈者亦無此銜司徒司徒古官唐司徒不常置代宗廣徳二年以李抱玉為司徒大厯十四年以同平章事李正已為司徒徳宗貞元三年以馬燧為司徒憲宗元和元年以同平章事杜佑為司徒穆宗長慶四年加横海節度使李光顔守司徒文宗太和元年加天平節度使烏重允守司徒武宗㑹昌元年以李徳裕為司徒宣宗大中六年以白敏中檢校司徒懿宗咸通三年以同平章事杜悰為司徒僖宗中和元年以王懌為司徒梁開平中拜趙光逄為司徒周為贈官顯徳中贈盧文紀為司徒宋制授司徒始得遷太保或再加太尉吕夷簡為司徒任宰相二十年熙寧六年文彦博除守司徒元豐三年以曹佾守司徒兼中書令富弼亦守司徒録定䇿功也政和二年九月詔司徒為周六卿之官本非三公宜罷之仍考周制立三孤少師少傅少保亦稱三少為次相之任而司徒之職遂闕焉遼南面官有司徒世宗天禄元年見司徒劃設金三公府置司徒一員可考者一人張通古追贈者一人永慶元初三公或置或不置或開府或不開府考李孟傳言司徒等官自大徳以來封爵繁多宜汰罷從之仁宗時馬祖常言司徒古三公之流近歲如沈宗攝汪元昌亦授此職實為非便其時拜司徒者必多矣明制三公三師内無司徒故生授者無此官追贈者亦無此爵司空司空古官唐司空不常置至徳二載以同平章事郭子儀李光弼為司空寳應元年以李輔國為司空廣徳元年以李抱玊為司空元和三年以于頔守司空十五年以裴度守司空太和九年以同平章事王涯守司空㑹昌二年以同平章事李徳裕為司空大中六年以白敏中守司空咸通六年以福王綰為司空三年以同平章事杜悰守司空僖宗廣明元年榮王㥽守司空乾寧二年以孔緯徐彦若為司空梁司空不常置開平中以趙光逄為司空後唐廢帝清泰時以馮道為司空亦為贈官長興中贈鄭珏為司空晉天福中以劉煦為司空以馮道守司空周司空不常置廣順中以盧文紀為司空宋初制為三公已任司空則拜太尉熙寧二年富弼除守司空三年曽公亮除守司空以兩朝定䇿功也元豐八年王安石守司空哲宗元祐元年吕公著守司空同平章軍國重事徽宗崇寧三年蔡京授司空政和二年九月詔以三師為三公司空為周六卿之官並非三公因裁罷遼南面官有司空聖宗統和三十年有司空邢抱質金三公府有司空一員可考者二人劉筈高楨元初三公不常設李孟傳言司空之職冗濫請裁汰詔可其奏仁宗延祐五年監察御史上言近聞禮部鑄司空等印此軰無功於國家請革去從之是成宗時此職甚多非國初之制明制三師三公内無司空故無生拜者亦無追贈者大司馬大司馬古官五代及宋遼金元明並無之案杜佑通典曰大司馬古官也掌武事自隋無之考周官司馬掌邦政統六師平邦國白虎通曰司馬主兵韋昭辨釋名曰司馬武也大總武事也大司馬掌軍漢官序曰司馬主兵是古之司馬掌國家之兵政有大征伐則主之宋設樞宻院掌軍國機務兵防邊備戎馬之政令出納宻命以佐邦治遼設北樞宻院掌兵機武銓羣牧之政金元皆設樞宻院掌武備機宻其與古之大司馬官名異而職任同明則始建樞宻院繼改為大都督府尋添設五府都督掌軍旅之事有大征伐則掛將軍印以出既事而納之亦即古之大司馬也總敘三師三公以下官屬三師太師太傅太保五代及宋金元明皆同遼大裕悦即是南面官三師府與宋金元明同明以三師為三公三公一太太尉司徒司空五代及宋金元同遼大裕悦即是南面三公府與宋金元同明無三孤少師少傅少保稱三孤惟明有之有實授有加銜宋政和二年九月詔以太師太傅太保古三公之官今為三師古無此稱合依三代為三公為真相之任宰相佐天子總百官平庶政事無不統故其時太傅王旦司徒吕夷簡任宰相二十年富弼除守司空兼侍中平章事曽公亮除守司空大師兼侍中文彦博除守司空兼侍中曹佾檢校太師守司徒兼中書令宋承唐制以同平章事為真宰相即以三師三公為之侍中中書令亦相職也其時三師三公為宰臣之晉秩或褒功徳或奬賢勞特除拜加銜耳宰臣自有本職官屬也三師三公下不特設官屬遼大裕悦無職掌班百寮之上故大裕悦府無官屬南面朝官三師府三公府亦無官屬金三師三公府無官屬元初三公之職常缺至大後史稱或置或不置亦無官屬明三公三孤皆為宰臣加銜或為贈官不置府無官屬欽定續通典卷二十四
