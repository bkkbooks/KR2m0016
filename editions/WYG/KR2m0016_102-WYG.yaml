body:
  text: 兵攻其必救先取根本同唐髙宗龍朔中劉仁願與劉仁軌拔百濟之真峴城詔孫仁師率兵渤海為之援百濟王扶餘豐南引倭賊拒官軍仁師迎擊破之遂與仁願之衆合諸將㑹議或曰加林城水陸之衝請先擊之仁軌曰加林險固急攻則傷損將士固守則曠日遲久不如先攻周留城周留賊之巢穴羣凶所聚除惡務本須拔其源若克周留城則諸城自下於是令仁願及新羅金法敏帥陸軍以進仁軌乃别率杜爽扶餘隆率水軍及糧船自熊津江往白江以㑹陸運同趨周留城四戰皆捷焚其舟四百艘豐脱身走獲其寶劒偽王子扶餘忠志等率士女及倭衆並降百濟諸城皆復歸順又李光弼與郭子儀合擊史思明於嘉山大破之光弼以范陽本安史巢窟當先取之搗其根本㑹潼關失守乃拔軍入井陘又馬燧因安祿山反使賈循守范陽説循曰祿山首亂公盍傾其本根使西不得入闗退亡所據則坐受擒矣此不世功也循不決又朱滔王武俊圍康日知於趙州李晟言以兵趨定州與張孝忠合以圖范陽則武俊等當捨趙帝壯之俾神䇿三將軍莫仁曜等隸之晟自魏引而北武俊果解去又馬燧討田悦軍渡漳水悦知燧食乏深壁不戰燧令齎十日糧進營倉口與悦夾洹而軍日挑戰悦不出隂伏萬人將以掩燧燧令諸軍夜半食先雞鳴時擊鼓吹角趨魏州留百騎持火待軍畢發匿其旁須悦衆渡即焚橋悦黨李納等踰橋乘風縱火而前燧令除榛莽廣百步為場募勇士五千陣而待比悦至火止氣少衰燧縱兵擊之悦敗奔橋橋焚衆多赴水死悦敗遁魏州諸將曰糧少而深入何也燧曰糧少利速戰悦與淄青恒三軍為首尾欲不戰以老我師若分擊左右未可必破悦且來助是腹背受敵也法攻其必救故取魏以動之此致人之術耳五代唐時後蜀孟知祥與東川董璋反合兵攻遂州唐明宗命天雄軍節度使石敬瑭討之唐師攻劒門殺璋守兵三千人遂入劒門璋告急知祥知祥大駭駭已而聞唐軍止劒州不進喜曰使唐急趨東川則遂州解圍吾勢阻而兩川揺矣今其不進吾知其易與爾漢隠帝時李守貞反而趙思綰先以京兆反已而王景崇又以鳳翔反景崇與思綰遣人推守貞為秦王隠帝乃遣樞宻使郭威率禁兵討之諸將皆請先擊思綰景崇威計未知所向行至華州節度使扈彦卿謂威曰三叛連衡以守貞為主守貞先敗則思綰景崇可傳聲而破矣若舍近圖逺使守貞出兵於後思綰景崇拒戰於前則漢兵屈矣威以為然遂先擊守貞宋韓琦在陜西值元昊出冦三川琦欲解其圍即遣將領兵七千聲言巡邊部分諸將夜趣七十里至白豹城平明克之破四十一族焚其積聚元昊回兵救之不及遼太祖天贊三年將伐渤海耶律都沁諫曰陛下先事渤海則西夏必躡吾後請先西討庶無後顧憂太祖從之元李楨表言襄陽乃吳蜀之要衝宋之喉襟得之則可為他日取宋之基本定宗嘉其言又史天澤既復真定繕城壁立樓櫓為不可犯之計以抱犢砦為武仙之巢穴不即剪覆終遺後患急攻下之仙遁走又舒穆嚕額森遼人也聞太祖起朔方首言東京為金開基之地蕩其根本則中原可傳檄而定也又世祖至元十一年朝議淮上諸郡宋之北藩城堅兵精攻之不可猝下徒老我師宜先渡江剪其根本留兵淮甸絶其救援則長江可乘虚而渡也於是以托爾珠為鎮國上將軍攻取安豐諸處皆捷又史天倪略城三關南至於東海所過城邑皆下因進言於穆呼哩曰彼棄幽燕遷都於汴已失䇿矣遼水東西諸郡金之腹心也我若得大寧以扼其喉襟則金必救之雖有遼陽將不能保穆呼哩從之又史天倪徇地山西遂克三關不浹旬定四十餘砦兵至河衛喜曰河衛者夷門之限河衛破則夷門不能守矣明劉基因攻安慶不下請徑拔江州傾其巢穴從之悉師西上陳友諒以為神兵自天而下倉猝不能禦奔武昌遂克江州旋師攻安慶下之又雲南烏撤蠻復叛傅友徳討之太祖諭曰若過闗索嶺慎勿與蠻人戰於嶺上當分兵直搗巢穴以掩襲之使各救其家不能糾合以抗吾師其傍諸土寨即未能下合力攻之必克也又成祖以李景隆聚兵徳州將俟來春大舉當誘之來以敝其衆乃於隆冬帥師進攻大同景隆來援苦寒之地南卒不堪奔命凍餒死者甚衆委棄鎧仗不可勝計又成祖因大同守將房昭引兵駐西水寨欲據險為持久計窺北平下令曰保定北平股肱郡保定失即北平危矣豈可不援遂率精兵三萬邀擊破之又謂諸將曰我圍房昭急真定必來援然摧敗之餘進必不鋭我輕騎往定州彼聞必速來來則據險以待我還兵合擊必敗之援兵敗寨可不攻自下矣又韓雍𠞰兩廣蠻冦或請分軍蹙賊入廣西雍曰二廣地鮮完郡大藤峽為賊根本諸兵不先薄其本乃分兵以趨末分兵勢弱趨末難盡我全師而至南可以攻大藤援髙雷㢘東可以應南韶西可以取栁慶北可以斷陽峒諸路勢若常山蛇首尾互應彼分而拒我聚而攻志曰先人有奪人之心兹行必勝遂行又王守仁起義討宸濠衆議宜逼之安慶江中守仁曰我師越南昌與賊相持於中道南昌兵必絶我糧道以躡其後腹背受敵非利不若先攻南昌叛濠精兵皆出攻安慶南昌僅老弱守禦一鼓易破賊聞巢穴已傾勢必解安慶圍還救首尾牽制易成擒耳果如其䇿又亂民張璉反流陷江閩州縣詔諸道合師討之且言賊棄巢出宜速擊俞大猷謂璉妻子財貨皆在巢若我以大軍迫其巢彼必聚衆自救譬之虎方逐鹿熊據穴而搏其子虎安得不置鹿而還還而蹙之如拉朽矣且三省㑹擊有期豈可以數萬之師從一夫團走哉乃引兵疾走相嵩嶺瞰璉巢賊歸援出擊遂執璉軍師伐國若中路城大兵多須下方過元信州城守求援於索多曰元帥不來信不可守今邵武方聚兵觀釁元帥旦往邵武兵夕至矣索多告於衆曰若邵武不下則腹背受敵豈獨信不可守乎乃遣周萬户等往招降之又張宏略為江西宣慰使饒州盜起犯都昌宏略以為饒在江東與南康只隔一湖冦勢甚大若不滅將為吾境患乃使人直搗其巢穴生縛賊酋磔於市餘黨潰散明徐逹征張士誠常遇春請徑𢷬平江太祖曰賊分兵駐吳興錢塘以自輔我頓兵堅城不克而招二輔之援非計也先攻吳興便徐達悉舟師自太湖趨薄吳興士誠將張天騏等分道出戰達亦分兵應之而遣驍將王國寳以長槍軍扼其歸吳興下又成祖聞李景隆將大兵𢷬北平呼景隆小字曰我在此李九江必不敢來大寧去此不逺移師襲之可無後患景隆聞吾兵向大寧必乘虚𢷬北平我還師破之必矣乃整兵從劉家口徑取大寧撫定城中亡何李景隆兵至成祖悉大寧諸衛兵至鄭村壩上與景隆兵大戰三日抵北平城下張玉直搗其營城中亦鼔譟出中外夾擊大敗之又靖難師起諸將咸欲南張玉曰為我肘腋患者薊也必滅薊而後可以安意南行遂輕兵圍薊破之移兵取遵化必攻其易金察罕取馬紀嶺道攻阿蘇穆宗自將期阿蘇城下㑹軍察罕行次烏布蘇水烏延部色埒貝勒來謁謂察罕曰聞國相將與太師㑹軍阿蘇城下此為深入必取之䇿宜先撫定展楚琿錫馨之路落其黨附奪其民人然後合軍未晚也察罕從之攻屯城請濟師穆宗與之察罕遂攻下屯城而與穆宗來㑹阿蘇城下屯在南阿蘇在北穆宗初遣察罕分道即㑹攻阿蘇聞其用色埒計先取屯城與初議不合頗不然之及遼使來止勿攻阿蘇然後深以先取屯城為功也元博囉歡軍於下邳召將佐謀曰清河城小而固與昭信淮安泗州為掎角猝未易拔海州東海石秋逺在數百里之外必不嚴備吾頓大兵為疑兵以輕騎倍道襲之其守將可擒也師至三城果皆下又巴延攻陽羅堡三日不克謀於阿珠曰彼謂我必拔此堡方能渡江此堡甚堅攻之徒勞汝今夜以鐵騎三千泛舟直趨上流為𢷬虚之計阿珠既敗宋軍巴延大喜遂急攻陽羅堡破之又阿珠師次鹽山得俘民言宋沿江九郡精鋭盡聚郢江東西兩城今舟師出其間騎兵不得䕶岸此危道也不如取黄家灣堡東有河口可由其中拖船入湖轉以下江為便從之明王守仁撫粤方徴湖廣兵夾攻桶岡而横水左溪在其東乃㑹諸將議曰桶岡地險又恃横水左溪為羽翼若進兵則腹背受敵况賊止聞徴兵攻桶岡其横水左溪必觀望未備今出其不意先攻二處破之而移兵桶岡法所謂攻瑕而堅者自瑕也於是分部兩路兵入㑹左溪自率兵𢷬横水俱攻破之賊奔入桶岡㑹楚兵亦至遂克其巢毋貪其易附元巴延伐宋自漢口開壩引船入淪河徑趨沙蕪入江諸將議先取沙蕪南岸戰船巴延曰吾亦知其易取慮汝輩貪小功失大事不若竟渡江收其全功可也臣等謹按杜氏通典攻其必救之後復曰必攻其易夫敵之所易即其所不必救者也其論似不相合細繹杜氏意誠恐執攻其必救之説者頓兵堅城之下或致進退兩難故又示以攻瑕之方至若以無關得失之地而我必貪其易盡力攻之既損軍實或且以分我軍勢知兵者亦復不為也謹増入毋貪其易以補足杜氏之意焉輕易致敗唐哥舒翰出潼闗次靈寶西原與賊將崔乾祐戰賊以數千人先伏險翰浮舟中流以觀軍謂乾祐兵寡易之又視其陣無法促士卒進賊伏兵起遂大敗又郭子儀破史思明於沙河安祿山益出精兵佐思明子儀曰彼恃加兵必易我易我心不固戰則克矣與戰未決戮一部將以徇士殊死鬬遂破之乃晝揚兵夜搗壘賊不得息氣益老思明逃奔博陵又史思明攻河陽使驍將劉龍仙臨城挑戰龍仙健勇自恃舉右足加馬鬛上嫚罵李光弼光弼將白孝徳願獨往取之選五十騎於軍門為繼大軍鼓譟以増氣勢乃挾二矛䇿馬截流而渡龍仙見其獨來甚易之足不降鬛稍近將動孝徳揺手示之若使其不動龍仙不之測乃止孝徳呼曰侍中使余致辭非他也龍仙去十歩與之言䙝罵如初孝徳息馬伺便因瞋目虓喊持矛躍而搏城上鼔譟五十騎繼進龍仙矢不暇發環走堤上孝徳追斬之攜首而歸五代梁王彦章擊破徳勝唐軍東保楊劉彦章圍之莊宗登壘望見彦章為重塹以絶唐軍意輕之笑曰我知其心矣其欲持久以弊我也即引短兵出戰為彦章伏兵所射大敗而歸又梁晉戰胡栁晉軍敗莊宗欲引兵退保臨濮閻寳曰夫決勝料勢決戰料情情勢既得斷在不疑今梁兵窮蹙其勢可破勝而驕怠其情可知此不可失之時也莊宗謝曰微公㡬敗吾事乃整軍復戰遂敗梁兵唐伐蜀班師至利州㑹康延孝叛據漢州張礪言於任圜請伏精兵於後先以嬴師誘之延孝驍將以任圜儒生覩其羸師殊不介意及戰酣圜發精兵擊之遂擒延孝宋太宗命白守榮等䕶送軍糧於靈州詔發車乘分為三輩䕶送仍命田紹斌率兵援接李繼遷知之邀於洛浦河守榮等欲擊之紹斌曰畨戎輕佻勿棄輜重與戰但接轡結陣徐行守榮等忿曰我不受若節度若但率兵來迎耳勿預吾事紹斌因率所部去輜重四五里繼遷望見紹斌旌旗不敢擊守榮欲自邀功遂決戰賊先以羸騎挑戰繼而伏發守榮敗丁夫潰走蹂踐死者無數紹斌振旅徐還所部不失一人至清逺與張延川㑹食見濠中裸而呼之者曰我白守榮也以繩引上解衣遺之又狄青為將党項犯塞時新募萬勝軍未習戰陣遇冦多北青一日盡取萬勝旗付虎翼軍使之出戰冦望其旗易之全軍徑趨為虎翼所破殆無遺類又岳飛討李成賊連營西山乃自為先鋒麾騎從上流潛出賊右突其陣大敗之走筠州復出城布陣十五里飛設伏以岳字幟麾騎二百而前賊易其少薄之伏發敗走又趙葵守揚州敗于李全時正月望城中放燈張樂以示暇全亦張燈平山堂矯情自肆葵與趙范議西出常不利賊必見易因其所易而圖之必勝不如出堡塞西門既而候卒識垂雙拂槍者為全范喜謂葵曰此賊勇而輕若果出必成擒矣乃悉精鋭數千而西取官軍素為賊易者張其旗幟以誘之全望見喜謂金使曰看我掃南軍官軍見賊突鬬而前奮擊賊敗欲走入土城部將李虎軍已塞其甕門全窘走新塘為泥濘所陷碎其屍遼耶律和克使宋還言宋人必取河東合先事以為備韓匡嗣詆之曰寧有是耶已而宋人果取太原乘勢逼燕匡嗣與南府宰相沙特哩衮休格侵宋軍於滿城方陣宋人請降韓匡嗣欲納之休格曰彼軍氣甚鋭疑誘我也可整頓士卒以禦韓匡嗣不聼俄而宋軍鼓譟薄我衆蹙踐塵起漲天韓匡嗣倉卒諭諸將無當其鋒衆既奔遇伏兵扼要路韓匡嗣棄旗鼓遁其衆走易州山獨休格收所棄兵械全軍還又重熙時征夏國蕭惠自河南進戰艦糧船綿亘數百里既入敵境偵候不還鎧甲載於車軍士不得乘馬諸將咸請備不虞惠曰諒祚必自迎車駕何暇及我無故設備徒自弊耳數日我軍未營候者報夏師至惠方詰妄言罪諒祚軍從阪而下惠與麾下不及甲而走追者射惠㡬不免元時宋蜀帥陳陸之貽書請戰聲言有衆百萬有輕我之心皇子為帥集諸將議曰隆之可生擒也屢戰敗之明盛庸與鐵鉉等聞北師將至大犒賞將士誓師簡精鋭背城而陣列火器毒弩以待時北師屢勝見庸軍即鼓譟前薄盡為火器所傷乘敵亂而取之宋岳飛因䖍冦彭友迎戰擒之餘酋退保石洞洞髙環水入止一徑乃列騎山下令皆持滿旦遣死士馳登賊亂棄山而下圍之賊呼丐命遂受其降初奉㫖屠賊於是請誅首惡而赦脅從從之金烏延和囉噶從梁王宗弼復河南將攻陳州遣和囉噶以甲士三十捕偵候人至蔡州西遇兵八十餘戰敗之獲南頓縣令及攻陳州夜將四更忽聞敵開門潰走和囉噶亟領二穆昆軍追及之而明安托克索亦領軍繼至大敗之元丞相巴延伐宋賈居貞以宣撫使議行省事既渡江下鄂漢巴延以大軍東下留丞相阿爾哈雅與居貞分省鎮之居貞曰江陵要地乃宋制閫重兵所屯聞諸將不睦遷徙之民復皆疾疫芻薪乏闕杜門不敢採樵不乘隙先取之迨春水漲恐上流為彼所乘則鄂危矣驛聞從之又汪世顯軍薄成都陳隆之堅壁不出其部曲田顯約夜降隆之覺方驚擾無定䇿世顯遂乘亂急梯城入獲隆之明沐英以雲南兵陣南岸乃分遣一軍泝流潛渡出達爾瑪陣後吹銅角樹旗幟山谷中為疑兵達爾瑪大駭急撤後軍以禦岸上軍心動陣亂英復率衆濟江矢石交發呼聲動天地大戰敗之又景帝景泰時額森兵薄京城石亨令姪彪誘敵至彰儀門敵見彪軍少逼之亨率衆乘之蹂敵大潰亨追之清風店敵將出闗亨使紿云陣中將者假亨名耳敵信之來攻亨率彪奮擊敵始知亨在囂亂相蹂踐亨悉衆乘之大捷敵以所掠羊馬財物盡棄餌我兵乃得遁去分敵勢破之唐徳宗貞元中築鹽州城慮為吐蕃掩襲詔劒南節度使韋臯發兵深入吐蕃以分其軍臯命將董勔張芬出西山及南道破峩和城凡平堡柵五十餘所城之二旬而畢其後贊普北冦靈朔又令臯出兵深入乃命將一出三奇路一出龍溪石門路一趨吐蕃維州城一趨雞棲老翁城一趨故松州一出雅卭黎嶲路一過大渡河入畨界一進攻昆明城自八月出軍齊入至十月破畨兵十六萬生擒六千斬首萬餘級轉戰千里畨軍連敗又李愬攻蔡殘吳房外垣或勸遂下吳房愬曰不可房拔則賊力専不若留之以分其力率擒吳元濟五代時唐定州王都反以王晏球為招討使與宣徽南院使張延朗討之都出不意擊延朗軍延朗大敗收餘兵㑹晏球自望都趨曲陽都乘勝追之晏球先至水次方坐胡牀指麾而都衆掩至晏球與左右十餘人連兵射之都衆稍却而後軍亦至晏球立髙岡號令諸將皆橐弓矢用强兵回顧者斬符彦卿以左軍攻其左髙紆珪以右軍攻其右中軍騎士抱馬項馳入都軍都遂大敗又唐莊宗因梁王彦章擊破徳勝軍遂東保楊劉彦章圍之莊宗問郭崇韜計安出是時唐已得鄆州矣崇韜因曰彦章圍我於此其志在取鄆州也臣願得兵數千據河下流築壘於必争之地以應鄆州為名彦章必來争既分其兵可以圖也然板築之功難卒就陛下自以精兵挑戰使彦章兵不得來十日壘成矣莊宗以為然乃遣崇韜與毛璋將數千人夜行所過驅掠居人毁屋伐木渡河築壘於博州東晝夜督役六日壘成彦章果引兵急攻之時方大暑彦章兵熱死及攻壘不克所失大半還趨楊劉莊宗迎擊遂敗之宋王徳與桑仲戰曰賊衆我寡故分三道以離吾勢法當先破其堅則脆者自走乃遣他將分禦而自以鋭兵相持賊大敗遂梟仲又金烏珠渡河謀攻汴京諸將請先斷河梁嚴兵自固宗澤笑曰去冬金騎直來正坐斷河梁耳乃命部將劉衍趨滑劉達趨鄭以分其勢戒諸將極力保䕶河梁以俟大兵之集金人聞之夜斷河梁去又孟珙圖復荆襄諜知元人於襄樊隋信陽招集軍民布種順陽集船材乃遣張漢英出隋任義出信陽焦進出襄分路撓其勢又度敵必因糧於蔡遣張徳劉整分兵入蔡火其積聚又趙葵守揚州賊李全遣步卒三百餘向城西門乍進乍退以誘葵復驅丁壯増濠面培鹿角趙遣騎將出夾城東西門分三道以進賊望風潰金初烏達治蘇濱水諸部烏色鄂囉佐之定諸部而還久之髙麗殺行人阿固雙寛而築九城於海蘭甸烏色將内外兵海古勒呼納珠富察都古嚕訥佐之髙麗兵數萬來拒烏色分兵為十隊更出迭入遂大破之又托克索破宋兵四千於文水聞宋將黄廸以兵三十萬柵於縣之西山復與耿守忠合兵九千擊之宋制置使姚古率兵至隆州谷托克索與巴爾斯以步騎萬餘禦之种師中兵十萬據榆次尼楚赫乃召托克索使中分其兵而還與和碩等合兵八千擊敗之斬師中於殺熊嶺宋將張灝以兵十萬營於文水近郊復與巴爾斯擊破之又宣宗元光二年紅襖賊冦夀潁剽掠數日而去赫舍哩約赫徳聞之率兵渡淮偵知朱村孝義村有賊各數百分兵攻之連破兩柵及焚其村塢數十還遇宋兵數百陣淮南岸擊殺其半尋有兵千餘自東南來追復大敗之又布薩安貞伐宋出息州軍於七里鎮宋兵據浄居山遣兵擊敗之宋兵保山寺縱火焚寺乘勝追至洪門山宋兵方浚濠立柵安貞軍亟戰奪其柵宋黄統制團兵五千保黄土闗闗絶險素有備堅壁不出安貞遣輕兵分為左右軍潛登别以兵三千直逼闗門翼日左右軍㑹於山巔俯瞰闗内宋人守闗者望之駭愕不能立中軍急攻宋兵潰遂奪黄土闗元安塔哈與丞相巴延合軍克池州師次建康宋鎮江攝守石祖忠遣使乞降揚州守將李廷芝聞之遣兵突圍出擊安塔哈率師救之宋兵望風退走時真泰諸城尚為宋守鎮江地扼襟喉城壁不固安塔哈乃立木柵以障居民又屯兵𤓰洲以分敵勢揚州之援遂絶又汪良臣攻重慶命元帥康實都先驅與宋將朱禩孫兵交良臣塞其歸路引兵横擊之斷敵兵為二敗走趨城不得入盡殺之又巴延伐宋朝議以宋之兵力多聚兩淮聞我欲渡江彼必移師拒守遂命右衛指揮使圖們岱帥輕鋭二萬攻淮安以牽制之明太祖因諸將家屬尚留和州元兵據采石南北道阻不通命常遇春以奇兵分其勢而親以正兵與之合兵交則出奇兵𢷬之且縱火焚其連艦遂大破之又太祖從滁陽王郭子興子興死太祖為大帥與徐達等拒元將曼濟哈雅達别率精兵數千取溧陽溧水二城斷其肘諸軍前薄哈雅軍大破之又沐英攻和林去敵營五十里下令分軍為四一襲其背二掩其左右自引驍騎當其前夜銜枚或左或右而襲敵皆駭惑就擒獲其全部以歸又徐達進征張良臣恐其黨與為聲援乃遣兵抄其出入之路俞通源略其西傅友徳略其東陳徳略其南顧時略其北達帥諸將四面圍其城良臣窘急出兵達擊敗之又吳良守江隂吳將蘇同僉來攻城良曰彼衆我寡當以計破之有頃敵陣於江壖良命弟禎整兵當其南北而以輕兵蹂之敵又攻東門良與王子明馳出擊之生獲其將士五百人殺溺死者甚衆同僉大敗宵遁又張吉在廣西以府江山川盤結林木䝉翳或扼要害或縱斧斤以毁其伏匿之所又以江東西二賊相為犄角而東賊尤悍乃併力攻其東破之西賊亦戢府江以寧又世宗嘉靖時海賊趨台州胡宗憲令番兵分道布截官兵多張旗幟為疑兵以撼賊勢賊四面受敵追至清風嶺俘斬無數臣等謹按以上諸條其中間有自分軍勢以勝敵者雖與杜典分敵勢之例不同然揆諸臨陣之法欲分敵勢未有不自分軍勢者事因比類而及正不必過為區分也審敵勢破之附唐張公謹副李靖經略突厥因言突厥可取之狀曰頡利縱欲肆情窮兇極暴塞地霜早餱糧乏絶若師出塞垣自然有應者太宗深納之果破定襄敗頡利元黄陵岡之役金兵陣河南岸示以死戰穆呼哩曰此不可用長兵當用短兵取勝令騎下馬引滿齊發自下馬督戰果大破之又金人以兵十餘萬保少室山太平寨時方㑹師圍汴李守賢度其帥完顔延夀無守禦之才潛遣輕捷者數十人縁崖蟻附以登殺其守卒遂大縱兵入破之下令無許抄掠悉收餘衆以歸明徐達兵下鳳翔李思齊走臨洮諸將皆以張思道才不如思齊慶陽易於臨洮請先由豳州取慶陽後度隴攻臨洮達曰思道自守者耳城險而兵精卒未易拔也臨洮北界河湟西控羌夷地富而人衆以大兵蹙之思齊不走絶徼則束手降矣思齊降全陜皆為我有遂決䇿度隴克秦州皆如其䇿布陣大勢分易敗五代晉安重榮反杜重威逆戰於宗城重榮為偃月陣重威擊之不動欲少却以伺之偏將王重允曰兩兵方交退者先敗乃分兵為三重威先以左右隊擊其兩翼戰酣重允以精兵擊其中軍重榮將趙彦之來奔遂大敗重榮遼聖宗統和二十八年征髙麗耶律博諾為先鋒至銅州髙麗將康肇分兵為三以抗大軍一營於州西據三水之㑹肇居其中一營近州之山一附城而營博諾率耶律宏古擊破三水營擒肇李元藴等軍望風潰㑹大軍至斬三萬餘級追至開京破敵於西嶺髙麗王詢聞邊城不守遁去惜軍勢五代梁朱全忠破趙匡凝取荆襄遂攻淮南敬翔切諫以為新勝之兵宜持重以養威不聼兵出光州遭大雨㡬不得進攻夀州不克而多亡失力少分軍必敗五代梁康延孝奔唐莊宗屏人問以梁事延孝具言末帝懦弱任用張漢傑段凝等而遣漢傑監王彦章軍有必亡之勢又言梁將大舉分兵伐唐莊宗問何以禦之延孝曰梁兵雖衆分則無餘臣請待其既分以鐵騎五千自鄆趨汴出其不意𢷬其空虚不旬日天下定矣宋仁宗朝契丹來侵詔趙延進與崔翰李繼隆將兵八萬禦之詔賜陣圖分為八隊師至滿城敵騎至延進乘髙望之東西亘野翰等方按圖布陣陣相去百歩延進曰主上委吾等以邊事期於克敵今敵衆若此不如合而擊之可以決勝違令而獲利不猶愈於辱國乎儻有喪敗則延進獨當其責於是改為三陣前後相副士衆皆喜三戰咸捷又宋以金主亮索淮南地議舉兵禦之遣大將成閔為荆湖制置使將禁衛五萬禦襄漢上流虞允文曰兵來不除道敵為虚聲以分我兵成其出淮姦謀耳不聼卒遣閔後聞金主亮徙汴允文語陳康伯閔軍約程在江池宜令到池者駐池到江者駐江若敵兵出上流則荆湖之軍捍於前江池之軍援於後若出淮西則池之軍出巢縣江州軍出無為可為淮西援是一軍而兩用也康伯然其説而閔軍竟屯武昌金主果出淮西造浮梁於淮上自渦口渡淮又楊存中從張俊討李成諸將議欲分道進存中曰賊勢盛我兵分則力弱又諸將位均勢敵非招討督之必不為用俊然之整軍至豫章破賊於玉隆觀賊將率衆十萬來援夾河而營存中謂俊曰彼衆我寡擊之宜用奇願以竒兵見屬公以步兵居前後存中夜銜枚渡筠河出西山馳下擊賊俊夾攻之俘八千人成遁又知安豐軍趙善湘與趙范趙葵出師詔問守禦䇿杜杲上封事曰沿淮旱蝗不任征役中原赤土無糧可因若虚内事外移南就北腹心之地必有可憂及兵敗洛陽人始服其先見欽定續通典卷一百二
