body:
  text: 選舉雜議論下元世祖時亷希憲在中書嘗言國家自開創以来凡納土及始命之臣咸令世守至今将六十年子孫皆奴視部下都邑長吏皆其皂𨽻僮使前古所無宜更張之使考課黜陟始議行遷轉法左史侍御鄂爾根薩里嘗勸帝治天下必用儒術宜招致山林道徳之士以偹任使乃遣使求賢置集賢館待之即以鄂爾根薩里為集賢館學士凡士之應詔者命館榖之飲食供帳車服皆甚盛即弗稱㫖者亦請加賚遣還有官宣徽者欲隂敗其事故盛陳所給廪餼於内前帝過問焉對曰此一士之日給也帝怒曰汝欲使朕見而損之耶十倍此以待天下士猶恐不至况欲損之誰肯来耶東平布衣趙天麟上太平金鏡策略曰今國家選法腹外三年為一考腹内二年半為一考自非負罪之員皆有進而無退臣以為選法宜以賢能為先不宜以日月為上請凡内外官員三年第一考為初考上等加官階二級中階一級下則仍舊階而上中下三等皆復守其本職六年再考如初考而覆守本職九年終考如再考然後黜陟其職凡考法令亷訪司官重其保結考其行實而牒司路以逹於上司銓定階次籍記倚閣凡三考黜陟其事業循常者依累次官階而除之以次第所宜其才徳超異者雖階次甚卑而待之以不次之位如是則居官守禄者既思階次之升超而盡其公道又懼憲職之知覺而滅其邪心庶幾乎選法有以定矣又論考幽明曰國家入仕之門太多考選之方太闕臣謹依經史斷以愚意條陳聖人之九徴及當今所切之二十六美之三十九類與夫三要惟陛下察之所謂九徴者一曰逺使之而觀其忠二曰近使之而觀其敬三曰煩使之而觀其能四曰卒然問焉而觀其智五曰急與之期而觀其信六曰委之以財而觀其仁七曰告之以危而觀其節八曰醉之以酒而觀其則九曰雜之以處而觀其色所謂二十六羙之三十九類者一曰文史之羙三類草制飾詔諄悉詞情也校書正字可為定體也教誨後學材徳多成也二曰禮官之羙三類補衮拾遺将順其羙也朝㑹祭祀儀章丕舉也宣慰風俗雍熈聿致也三曰樂官之羙一類金石宫商條理聲正也四曰知人之羙一類善惡周覽洞曉于心也五曰敬賢之羙一類推轂進士常若不及也六曰考校之羙一類彰善癉惡照文無失也七曰糾察之羙一類弹劾所至不避權豪也八曰亷訪之羙二類亷察官吏儆懼肅清也訪問風俗化成禮義也九曰宿衛之羙一類小心周宻京輦増威也十曰籌計之羙二類幃幄畫計折衝倒戈也排壘整陣臨時合權也十一曰督領之羙三類器械精完士卒閑習也號令嚴明部伍整齊也臨陣耀威身先士伍也十二曰鎮防之羙一類守堅持重冦盜難窺也十三曰屯田之美一類勸勵稼穡勤事多獲也十四曰芻養之羙一類孳畜頭匹茁壮繁滋也十五曰使臣之羙二類喉舌宣納成羙昭光也委幹事務辦濟平允也十六曰决斷之羙三類勾檢考覈瑕隙無隐也要察圎明囚無間言也疑獄得情處置合律也十七曰農桑之羙一類董督樹藝水旱有偹也十八曰董役之羙一類監役合宜丁夫悦事也十九曰闗津之羙一類奸詐不漏行旅不壅也二十曰營造之羙一類練事分公㨗于供奉也二十一曰明利之羙一類出納有常簿籍易照也二十二曰算數之美一類多寡有方了然胸臆也二十三曰僧官之羙一類宏宣釋教守戒精嚴也二十四曰道官之羙一類宏宣道教守徳精嚴也二十五曰醫官之羙二類科品分明舉無不應也開彂後學成材者衆也二十六曰隂陽之羙二類厯法推歩授時無舛也卜筮經循不為詭異也所謂三要者一曰公二曰亷三曰勤徑情服事不邀功利謂之公賄賂在前不以為念謂之亷服勞王室悉心竭力謂之勤請以九徴考左右擕僕以二十六羙之三十九類與夫三要之説明諭選曹及内外百官值三年當考之時凡一羙三要者為上等一美二要者為中等一羙一要及有要無羙有羙無要者皆為下等若羙要並無雖無大罪亦停免之如此則自中及外大小官吏並玉壺之氷秋霜之月凛乎其清皎乎其明矣成宗大徳元年副萬户阿喇卜丹御史中丞崔彧等陳臺憲諸事省臺集議言乞依舊例御史臺不立選其用人則于常調官選之惟監察御史首領官令御史臺自選亷訪司必擇䝉古人為使或闗則以色目世臣子孫為之其次參以色目漢人各省文案行臺差官檢覈宿衛近侍奉特㫖令臺憲擢用者必湏明奏然後任之行臺御史任滿而有效績者或遷内臺或呈中書省遷調亷訪司亦如之其不稱職者省臺擇人代之未歴有司者授以牧民之職經省臺同選者聽御史臺自調中書省或用臺察之人亦宜與御史臺同議各官府憲司官毋得輒入體察制可翰林學士王惲嘗上論政事書一曰議亷司以勵庶官古之善為國者不使人有隋怠不振之氣今州郡之官品流淆雜既無選舉甄别紛紛籍籍聚散于吏部例得一官誰不因循茍且以嵗月養資考而已嘗􅀚漢唐之馭吏也能者増秩賜金公卿缺則補之以表其賢否者放田里而不事事唐則召七品以上官集于闕廷親與訪問究得失而進退之然二者不過爵禄為勸爵禄極則意滿足意滿足則怠心生亦有無如何者故持斧直指採訪黜陟等使嵗相望于道而本朝之舉髙出前代比者亷司初設中外之官􅋺然有改過自新之念行無幾何法禁稍寛使監視者勁挺之氣不息而自歛聽從者姦弊之萌潛滋而復枿夫刑罰崇寛固是國家美政然分别善惡以示勸懲豈得專務寛恤昔金大定間尚書省奏順州軍判崔伯時受贓不枉法准制當削官停職世宗曰受財不至枉法以習知法律故也所謂奸狡習與性成後復任用豈能自悛雖所犯止于追官非奉特㫖無復録用以致犯禁者鮮此先事之明騐也今風俗澆薄遇有所犯茍免無耻法宜人法並任憲綱既立公道大行我之氣既伸彼安得不振我之政既肅彼安敢或私将見風采百倍有登􅄃澄清之望矣一曰議保舉以覈名實方今親民與參佐官莫縣令經歴為重縣令廼百姓師帥師帥賢則徳澤宣參署為一路紀綱紀綱振則政務舉今例出常流安取殊績臣愚以為若行品官保舉法庶得其人其法品量舉主與所保者資歴相應既皆兩可復精加磨勘無謬妄私意然後許令入状相大小之才授繁簡之任限以嵗月如唐制釐務出二百日者是也課其殿最升黜舉主得人者受知賢之賞不職者坐不當之罰其南選尤宜施用此法何則江南比定凡所𨽻附秋毫無犯只以前省調官賄而海放行省注擬尤為濫雜侵漁掊克慘于兵㓙至盜賊竊發指此為名仰頼天恩幸無其事今宜委官分揀以行此法其停革人員不至罷黜者降之邊逺邊逺見職委有聲迹者使之内選亦激勸一法兹葢自漢唐五代迄於金皆遵而行之當時號稱得人然必湏内設審官考功等職専掌其事一曰設科舉以収人材方今名儒碩徳既老且盡後生晚進既無進望例多不學州府鄉縣雖立教官講書㑹課祇皆虚名略無實效臣愚以為不若開設選舉取騐之速也夫進士選歴代號取士正科将相之材皆從此出若限以嵗月而考試之将見士争力學人材輩出可計日而待也論者必曰今以員多闕少見行壅滯若復此舉是愈壅而滯之也臣謂不然葢科舉之設本以覈實學而取多士清仕途而息雜流得全材備大用也豈不愈于學校徒設汗澷而無所成乎一曰試吏員以清政務前代取吏之法條目甚嚴如宰相子辟舉令取充省雜終塲舉人試補臺掾品官子孫吏員班祇閤門等人出身者試補六部令史夫明法令曰令通經史曰史令府州司縣應用一切胥吏多自帖書中来官無取材勢湏及此所習既凡聞見或寡欲望明刑政識大體務清弊革難矣臣愚以為莫若将合嵗貢吏人以吏員法試之中選者仍許上貢補充随朝身役外州府郡見役者從亷司以校法試驗庶幾激之積漸肯學其月請俸給亦合定奪能使得糊其口然後可責以亷何則今亷司専抑吏權察非違少有貪鄙不計養亷即按而治之是縦之竊而責以何盜之為豈理也哉又嘗為貢舉議曰貢舉之法宜先選教官定所明經史為所習科目以州郡大小限其生徒揀俊秀無玷汚者充員數以生徒員數限嵗貢人數期以嵗月使盡修習之道然後州郡官察行考學極其精當貢于禮部經試經義作一塲史試議論作一塲廷試策兼用經史斷以已意以明時務如是則士無不通之經不習之史進退用舍一出于學既復古道且革累世虛文妄舉之弊必収實學通用之效矣武宗至大三年七月給親民長吏考功郎厯令監治官嵗終驗其行蹟書而上之亷訪官御史臺尚書禮部考校以為升黜先是世祖至元十九年集賢直學士程鉅夫奏陳五事朝廷多采之其一立考功厯略曰國朝建御史臺雖有考課之目而未得其要莫可致詰乞照前朝體例應諸道府州司縣下至曹掾等各給出身印紙厯子一卷書本人姓名出身于其前俾各處長吏聨銜給狀保明書其歴任日月及在任功過于後秩滿有司詳視而差其殿最則人之賢否一覽而知考核得實庶無僥倖至是始須行焉元時入官之途畧見于經世大典序録曰國家初得中原損益古今之制度而行之而用人之途不一親近莫若禁衛之臣所謂集賽者然而任使有親踈職事有繁易歴時有久近門第有貴賤才器有大小故其得官也或大而宰輔或小而冗散不可齊也國人之偹宿衛者浸長其屬則以自貴不以外官為逹方天下未定軍旅方興介胄之士莫先焉故攻取有功之士皆世有其軍而官之事在樞府不統于吏部惟簿書期㑹金榖營造之事供給應對習于刀筆者為適用扵當時故自宰相百執事皆由此起而一時號稱人材者亦出于其間而政治繫之矣擇吏之初頗由於儒而所謂儒者姑貴其名而存之爾其由學校為教官顯逹者葢鮮獨國學初以貴近就學而用之無常制其後嵗有貢法而寖失初意其以文學見用于朝廷時有尊異者不皆然也至元以来數欲以科舉取進士議輙中止延祐始置進士科一二年一取不及百人耳世祖置國字以通語言其用人略如儒學之制至于奉上官之任使奔走服役嵗月既久亦皆得官雖細大有殊要皆為正流矣乃宗王之有分地官府而保任之者與夫治酒漿飲食者執樂伎者為弓矢衣甲車廬者治厯數隂陽醫藥者出納財賦者逺人掌其部落者或身終其官或世守其業不得遷他官而恩幸遭遇驟至貴近者有之非有司所得制而陳言獻策納粟捕盜與勲舊之後裔權要之引進皆有其人焉而不常也余闕曰我國初有金宋天下之人惟才是用之無所専主然用儒者為居多也自至元以下始浸用吏雖執政大臣亦以吏為之由是中州小民粗識字能治文書者得入臺閣共筆劄累日積月皆可以致通顯而中州之士見用者遂浸寡况南方之地逺士多不能自至於京師其抱材藴者又徃徃不屑為吏故其見用者尤寡也乃其久也則南北之士亦自町畦以相訾甚若晉之與秦不可與同中國故夫南方之士微矣延祐中仁皇初設科目亦有所不屑而甘自沒溺于山林之間者不可勝道是可惜也汪克寛曰國家興崇文治取士以徳行為首較藝則以經史時務兼之將欲求治道於經術其中選者俱授州縣之官夫古者賔興賢能而升之司徒司馬論定然後官之後世舉之於郡國今選舉之法不必更定也但核薦舉而革冐濫厚敦遣而公遴選棄其小以取其大因其文以觀其心數年之後人才既盛又増中選之額則選舉衆而風化行矣自州縣官以五事考殿最給由銓注則騐之所謂稽撫字稽本末稽亷冐稽聽斷稽禁禦者也然長吏給由而不述其事吏部銓注而不考其績雖風憲糾察而或失其詳五事之偹徃徃未觀其成效非周縣之官未盡出於科舉而政治不本於經術之故歟抑朝廷千里之逺給由或得以詐偽考績者猶未盡其實也陶安曰有虞世賞岐周世禄而不世官者人賢否殊也逮至周官以禮樂徳行掌國子之教然猶考藝進退未嘗悉世其官而必任焉後世廕補法行或曰顯官必公卿子弟為之以㓜習其業熟朝廷臺閣之儀或曰驕驁不通古今無益于民宜明選求賢除任子之令是皆偏見耳及考漢制二千石以上得任子弟擇茂亷者補令丞其法良而未偹今制廕補五品以上受命于朝降自六品省銓掌金穀且第其上中下以嵗月為差至滿始受朝命許典民政葢治民者為國之大端理財者經國之要務將俾因仕知學練世故渉艱難以培其才然後移以治民故不得不自理財始此則古所無也葉子竒曰元世當治平之時臺省要官皆北人為之漢人南人萬中無一二其得為者不過州縣卑秩後有納粟獲功二途富者徃徃以此求進令之初行尚猶與之及後求之者衆亦絶不與又獲功之官非得風憲體覆牒文不輙命官憲使招權非得數千緍不得行遣故有功無錢者徃徃事從中輟皆抱怨望其後盜塞寰區空名宣勑遇微功即填給人已不榮之矣方國珍之初亂也有宣數道𠡠十數道縣以購人立功及有功亦竟不與云王圻曰元舊制銓曹有行正科吏主之日具内外官十名上中書省中書籍以遷擢其後吏怠不為意仕者淹滯有待選十餘年者至正時危素責吏日具五名五日一上中書吏樂易集各思奉職而久滯者獲伸胡粹中曰古之人君患不能知賢才而用之以治天下故設科取士使懐才抱徳敦行者由之以進若漢之鄉舉里選察亷對筞非一途也然人之徳行難知藝能易見徳行者多自晦藝能者多自衒於是乎聽其所言以察其所藴即其所習以審其所尚故唐之明經進士宋之制策詞學非一科也猶以為有徳者必有言有言者不必有徳則又即其言以考其實若稽諸故典而本于經不失乎先聖之㫖則有取焉非但取其言語之工文藻之華而已也元之用人大抵偏于國族勲舊貴㳺子弟故選舉之法久而未行仁宗决意行之由此中華縫掖之士僅得㧞什一於千百若謂科舉遺賢才則可謂妨選法則非也邵逺平曰臧晉叔云元以曲取士設十有二科其説甚為無據自至元入年設國學出筞題試問所對精通者為中選皇慶二年制科舉皆用經書時務為題並無詞曲一項此明証也汪琬曰按輟耕録元反宋金餘習初試論賦其後一以經義為本及考選舉志春秋兩試皆未嘗用論終元之世亦未嘗廢賦不用也或有司校閲稍重經疑經義則有之耳明太祖詔舉孝弟力田之士又令府州縣正官以禮遣孝亷之士至京徃徃待以不次其後遇國家覃恩海内輙以詔書從事有司以孝行上禮部請旌者嵗不下數十人又資格洊重甲科縣令徃徃以卓異被徴梯取臺省遂為成例終明之世以科目取士以資格用人而其弊亦相因而起仁宗洪熈元年四月鄭府審理正俞廷輔言近年賓興之典士率記誦虚文求其實才十無二三或有年纔二十者未嘗學問一旦掛名科目而使之臨政治民職事廢隳民受其弊自今各處鄉試宜令有司先行審訪務得博古通今行止端重年過二十五者許令入試上雖嘉納而未果行至孝宗𢎞治中吏部侍郎王鏊為制科議曰國家設科取士之法先之經義以觀窮理之學次論表以觀其博古之學終策問以觀其時務之學行之百五十年宜得其人超軼前代卒未聞有如古之豪傑者出乎其間而文詞終有愧于古雖人才髙下係于時然亦科目之制為之也三代取士之法姑未暇論唐宋以来科有明經有進士明經即今經義之謂也進士則兼以詩賦當時二科並行而進士得人為盛名臣将相皆是焉出明經雖近正而士之拙者則為之謂之學究詩賦雖近于浮艶然必博取泛觀出入經史百家葢非詩賦之得人而博古之為益于治也至宋王安石為相黜詩賦崇經學科塲以經義論策取士可謂一掃歴代之陋然士専一經白首莫究其餘經史付之度外謂非已事後安石言初意驅學究為進士不意驅進士為學究蓋安石亦自愧悔之矣今科場雖兼策論而百年之間主司所重士子所習惟在經義以為經義既通則策論可無俟乎習夫古之通經者通其義焉耳今也割裂粧綴穿鑿支離以希合主司之求窮年畢力莫可㡳止偶有科目棄如弁髦始欲從事于學而精力竭矣人才之不如古其實由此然則進士之科可無易乎曰科不竢易也經義取士其學正矣所恨者其學稍狹不能盡天下之才耳愚欲于進士之外别立一科如前代制科之類必兼通諸經博洽子史詞賦乃得預焉有官無官皆得應之其甲授翰林次科道次部屬而有官者則遞陞焉如此天下之士皆將奮志于學雖有官者亦翹翹然有興起之心無復専經之陋矣正嘉之間文體日偷楊慎極論其弊曰太祖始制科學詔舉子經義無過三百字不得浮詞異説近時舉子之文冗贅至有千餘言者不根朱程妄自穿鑿破題謂之馬籠頭處處可用也又謂之舞单鎗思一跳而上也起語百餘言謂之夀星頭長而虛空也其中例用存乎存乎謂之謂之此之謂此之謂有見乎有見乎名曰救命索不論與題合否篇萹相襲師以此授徒上以取此士何所㡳止又曰本朝以經學取人士子自一經之外罕所通貫近日稍知務博以譁名然不究本源如五經諸子則割取其碎語而用之謂之蠡測歴代諸史則抄節其碎事而綴之謂之策套其割取抄節之人已不通渉經史章句血脈皆失其真有以漢人為唐人唐事為宋事者有以一人析為二人二事合為一事者嘗見考官程文引制氏論樂而以制氏為致仕仕子墨卷引漢書律厯志先其算命作先算其命近日為書坊刻布轉相差訛士習愈下矣黄尊素曰本朝取士之法大略依倣宋制然其間有不同者而小小節目不與焉今天下取士悉由學校升貢宋則科舉學校絶不相闗每秋試自縣令佐察行義保任之上於州州長貳復審察得實即入試院其士子未嘗繫名學校其後三舍法行是為學校之科舉其不由學校而為科舉者如故也今三年鄉試一省彚所屬郡邑而試之宋則諸州各自為試各自發解與路分無與惟有官鏁㕔應舉者及避嫌逺鄉之人試於轉運使反謂之别頭試今士人一經鄉舉則當㑹試之期徑偕計吏不復取解宋則有恩例始得免解或減一舉而已其下第進士雖曽中省試即今㑹試来科仍復解試中格然後得上省試也今殿試不過名次升降無有黜落宋初于御試特重茍不中格則省試皆虛也所謂特奏名者凡貢士于鄉而屢絀于吏部或御試所不録積前後舉數參其年而差等之遇親策士徑許附試其薦舉者不試于州郡惟試禮部不中亦許赴御試故有免解免省之條今必層累而上更無越次而舉者宋必賜出身然後注官今則一經解牒便可釋褐州縣宋之御試第一人不過僉書判官第六人以下司户簿尉而已今則第一甲三人即為清要官最下者亦不失守令總而論之宋之出身易而入官難今之出身難而入官易出身難故多枉才入官易故多敗類此本朝之人物所以逺不及于宋也至科塲之弊亦略相同有傳義有換卷有易號有卷子出外有謄録滅裂而取解之試有一人而趁數州者有一人而納二二卷者今惟童子試有之解試之所無也然此之為弊也小其率天下而歸大弊者在主司去留止以初塲餘束不觀出題强裂句讀離絶㫖意春秋越年牽合在士子専讀時義一題之文必有坊刻稍換首尾强半雷同雷同之中有得有失不可程凖至使天下盡出於空踈不學不知經史為何物是科舉為敗壊人才之具其轍一也錢曽曰制科以人為重如寳祐四年登科録宋末稱為文天祥榜進士是也明太祖洪武四年十七年開科十八年㑹試循元舊例作經疑至二十一年始定三塲之制三百年来小生爛熟時藝影掠論策刺取利録自通籍以来罕聞仕優則學之大夫是又人以科制為重而非制科以人為重也邱氏濬嘗言士子有登名前列不知史冊名目朝代先後字書偏傍者假令倣唐宋射策决科詩賦取士之法一洗舊習重興儒雅豈非斯文之大幸歟顧炎武曰大明㑹典洪武四十六年定凡舉人出身第一甲第一名從六品第二第三名正七品賜進士及第第二甲從七品賜進士出身第三甲正八品賜同進士出身而一品衙門提控正七品出身二品衙門都吏從七品出身一品二品衙門掾吏典吏二品衙門令史正八品出身其與進士不甚相逺也後乃立格以限其所至而吏員之與科第髙下天淵矣故國初之制謂之三塗並用薦舉一塗也進士監生一塗也吏員一塗也或以科與貢為二塗非也又曰明初三塲之制雖有先後而無重輕乃士子之精力多専于一經略于考古主司閲卷復獲初場所中之卷而不深求其二三場夫昔之所謂三場非下帷十年讀書千卷不能有此三場也今則務于㨗得不過于四書五經之中擬題一二百道竊取他人之文記之入場之日抄謄一過便可僥倖中式而本經之全文有不讀者矣率天下而為欲速成之童子學問由此而衰心術由此而壊宋嘉祐中知諌院歐陽修上言今之舉人以二千人為率請寛其日限先試以策而考之擇其文詞鄙惡者文意顛倒重雜者不識題者不知故實略而不對所問者誤引事跡者雖能成文而理識􅆾誕者雜犯舊格不考式者凡此七等之人先去之計二千人可去五六百以其留者次試以論又如前法而考之又可去其二三百其留而試詩賦者不過千人矣于千人而選五百少而易考不至昏勞考而精當則盡善矣縱使考之不精亦當不至大濫葢其節抄剽盗之人皆以先策論去之矣今縱不能復兩漢取士之法不得已而以言取人則修之論亦似可取葢救今日之弊莫急乎去節抄剽盜之人而七等在所先去則闇劣之徒無所僥倖而至者漸少科場亦自此而清也又曰科場之法欲其難不欲其易使更其法而予之以難則覬倖之人少少覬倖之人則少一營求患得之人而士類可以漸清抑士子之知其難也而攻苦之日多多一攻苦之人則少一羣居終日言不及義之人而士習可漸以正矣太祖初設科舉嚴斥吏胥又詔凡選舉毋録吏卒之徒然嘗與羣臣言初有憲官疾吏徃候之憲官起扶杖而行因以杖授吏吏拱手郤立不受憲官悟其意他日見吏謝之吏曰某為屬吏非公家僮不敢避勞慮傷理體是則吏卒中未嘗無正直之人顧上所以陶鎔成就之者何如爾成祖嘗言刀筆之吏不可使任風紀然如况鍾之守蘇州黄子威之守松江並治行超卓為一時良二千石其他由掾吏顯者如滕懋徳張度胡禎徐輝李友直李信徐晞李質郎本中萬祺俱累官至尚書王鍾劉本道李亨陳寜汪河葉春王春劉敏王詔吴復俱累官至侍郎樂韶鳯累官至祭酒吕本累官至太常卿楊時習汪懋俱累官至大理卿黄政累官僉都御史余節累官御史中丞張苖累官通政使郝郁累官光禄卿平思累官陜西左參政葢其時資格未行選用之途尚廣而不嚴考察連坐之罰憲宗成化十九年大理寺評事申安言旌異之典朝廷所以激􅂆有司今撫按官于亷能者未必旌異旌異者未必亷能乞詔大臣議自今旌異必待三年考滿之後若所舉不公後以姦貪敗者連坐庻幾吏稱其職民安其業至是吏科給事中王瑞等復言三載黜陟朝廷所以勵庻官之典也今天下諸司除土官外無慮九千餘處諸司官除隂陽醫僧道外無慮千萬餘員吏部于各官之能否在布按二司則據撫按掲帖在諸司則參布按等官掲帖上之詢訪雖出於公心下之奏報多任其私意或假公以市恩或乘機以償怨毁譽失真賢否失實其他姦端不一而足乞諭吏部榜示各官凡掲帖所報失實者連坐或有當黜而留者許本處撫按論奏有當黜而妄訴者亦坐之命俱如所言𢎞治三年王恕以考課之法廢格不行甚非政體請今後考滿官俱令給由赴部照例考覈及王瓊為吏部尚書乃言四方之逺一官赴京考滿徃回勞費且誤公務許本處廵撫廵按開報考語令就任復職待朝覲定黜渉于是成法盡壊而政體日偷李夢陽曰今之弊官不久任國初臺省不甚通如御史陞按察僉副或徑陞使使久則入為都副則左右副僉則左右僉如知府久則陞左右布使或參左右使久則入為各部侍郎尚書等如此則法吏敢持䋲糾之權民吏無不更事之嫌今臺省既大相通融而任又弗久也葢官非良久必敗故今之官利數遷太相夤縁求速故私奸易規避大事無了絶途路迎送甚者一官至民不知姓名去矣猶過客也今又為小轉法如知府轉按察副使按察僉事轉參議等或年資未應轉又為更調法如此府調彼府此縣調彼縣此臬調彼臬此省調彼省甚者廵撫都御史亦調法愈巧而官愈廢故曰今弊邱濬曰今日選法文武並用文選主于吏部武選主于兵部兵部之選武臣其始也以功次而用其後也純用任子之法父死子繼無子兄及弟繼之有定格也若夫都指揮以至都督則以才能擢用焉又不専于資格矣文臣入仕之途非一端其大者有三進士也監生也吏員也吏員資格其崇者止于七品用之為佐貳幕職監當筦庫之職非有保薦者不得為州郡正員監生則出自學校之貢選及舉人試進士不第者其肄業太學也循資以出先歴事于府部諸司然後厠其名于選曹循資而考之以定其髙下而授以職也進士初仕亦循其甲第及其不次擢用徃徃越常調焉是又不専在于資格也然而用之既久不能無弊古人用人貴于人法兼用守一定之法而任通變之人使其因資厯之所宜随材器之所能而量加任使非不用資格亦不純用資格不用資格所以待非常之材任要重之職釐煩劇之務用資格所以待才器之小者任資歴之淺者釐職務之冗雜者其立為法一定如此而又得公平之人以掌銓衡随才任授因時制宜而調停消息之人以漸而用而出類之才則不以漸官以次而升而切要之職則不以次非有大功徳大才能及國家猝有非常之變决不㧞卒為將徒歩而至卿相也若夫以百官考課之法屬之吏部内外官皆以三年為一考六年再考九年通考始行黜陟之典是則有虞之制也其以御史考核即漢宣命御史考殿最也書之考語即唐人第其善最也稽其牌册引以奏對即宋人之引對磨勘也王世貞曰三代而後稱治者獨漢然非其才之獨髙也所以用才者簡易而無不盡當是時天子所寄以共事者内不過丞相太尉御史大夫九卿諸將軍外不過守令而已即舉守而言其獄訟軍興錢榖辟召賞罰靡不悉推而付之不以私人察也不以文法牽也第課其治而為之殿最以行吾典耳三公闕于九卿郡守取選焉而不為他曹以顓之也九卿為將軍矣太尉為丞相矣而不為分途以限之也獄吏而通經也武弁而習吏也書生而閑武也故漢之才有過盡而無不盡之累國家于内為三公九卿大約延訪古昔而制于外為獨詳守之上有監司以領之矣而又有中丞以攝之御史以察之即不得自論鬼薪以上賦税雖斗斛弗敢顓也其内軍府得以治兵事而不得與其權兵部得以與其權而不得治其事其大小之相制也若犬牙然其頫首而聽于法也若束縛然故雖擁連城將百萬之衆一赤衣吏以片紙詔而縶其項弗敢動也得意而今日為公卿以掌握國家之命失意而明日為髠鉗短後之衣蹩蹩長安中而弗敢怨也可謂詳于弭亂而略于求治者也故巧如莽戾如卓雄如操不得而盡用其巧與戾與雄也聖如周召不得而盡用其聖也無他法為之束也今其制不可盡變獨有通融酌之而稍為之裁節而已論恩賛輔之職則必遴夫徳行之賢者而不必盡兩制之人新進之士備詞林者必使之補外以習吏州郡冗散之吏有異才者時召入以補其闕撫臣而監司守令非九載弗遷間為之増秩賜金璽書以作其勞者秩滿而為之峻擢以大報其賢者貪墨苛暴誅其甚者而斥其次者至于進取之途毋顓科甲而廣其選毋限文武而通其用使詩書與案牘弓矢比而無低昂焉而後人人自奮礪于事功天下之才庶得以盡其所用也歸有光試吏工部時其長令有光作三途並用議議曰所謂三途者進士也科貢也吏員也國初用人有徴聘有經明行修有人材有賢良方正有材識兼人有楷書有童子諸科其後率多罷廢承平以来専用進士科貢吏員是二者初未嘗廢而邇者欲新天下之吏治于科貢吏員之中稍加不次之擢故有三途並用之説其實前此未嘗不並用也愚以為朝廷欲収用人之實效于科貢吏員所宜加之意者當先清其源葢清其源而後其末流可治也士之與科貢皆出學校皆用試經義論策試進士不中入國子為舉人監生試舉人不中循年資而貢之入國子為嵗貢監生非若漢世賢良孝亷對策與博士弟子判然為二也然進士升于禮部為髙選舉人之下第與嵗貢國家亦不輕以待之故使之學于太學以觀其成茍成矣雖任以進士之官可也今成均教養之法不具獨令以資厯待選而已非復如古之舍法此其科貢之源不清也吏員之在古本與士大夫無别異迨後流品既分遂為異物士人不復肯詘辱于此故本朝資格吏員崇者止于七品多用為掾幕監當筦庫之職非保薦不得為州郡則吏道本不可與儒者並然其始皆自藩憲衛府州縣所署置猶有前代辟舉之遺法而今則自始為吏先責其輸納自提控以下至于吏典但以所輸之貲第其出身之差等此吏員之源未清也夫欲使舉貢之得人在于修太學之法而科貢可用矣欲使椽幕監當筦庫之得人在于遵辟舉之舊而掾幕監當筦庫可用矣然吏者止可以循資如祖宗之制非得與科貢並也愚于科貢猶有説焉㑹試有甲乙榜葢乙榜即亦舉人之中式者特限于欽定之制額故次之乙榜授以教職其實進士無異今特以敗巻置乙榜而與乞恩者槩與教職則教官之選輕矣嵗貢本以州縣之俊如徃年所謂貢選者今不本洪武舊制而專累日月則嵗貢無少俊者可施以成均之教矣愚又怪夫今之未有以清其源而壅其源者又不止也自納粟買馬穵運納級之例日開吏道雜而多端官方所以日繆也而科貢史員皆由此而妨閼矣故欲振飭吏治莫若清其源而無壅之凡此皆于格例之中修其廢壊耳于此二者其源既清于格例已復其常而于其間簡其卓異加不次之擢葢天下竒俊之士少而中庸之士多王者之道先為其法以就天下中庸之士而精神運用獨可於竒俊之士加于其法之外而不為法之所限此其所以能鼔舞一世之人才也或曰子謂吏道不得與儒並先朝如尚書徐晞知府况鍾皆至顯用者何也曰此又不可以吏之途論也葢先朝用人時取之常格之外宋濓一代文章之宗楊士竒三朝輔相之首皆以布衣特起乃遂掌帝制典機密豈謭謭于循途者葢自古中世猶未嘗不事旁招俊又博採聲望側席幽人思遲多士今百餘年寥寥未之見而専以資格進叙今亦頗苦其膠束伏隘而未能曠然也是以思為三途並用之説愚以為非大破因循之論考國家之故事追三代兩漢之髙踪以振作鼔舞一世之人材恐不足以剗累世之宿弊而収用人之實效也神宗萬厯十一年副都御史邱橓陳吏治積弊八事曰京官考滿河南道例書稱職外吏給由撫按官槩與保留以朝廷甄别之典為人臣市交之資此考績之弊一也御史巡方未離國門而宻屬之姓名已盈私牘甫臨所部而請事之竿牘又滿行臺以豸冠持斧之威束手俯眉聽人頤指此請托之弊二也撫按定監司考語必托之有司有司不顧是非侈加善考監司徳且畏之彼此結納上下之分蕩然其考守令也亦如是此訪察之弊三也貪墨成風生民塗炭而所劾罷者大都單寒輭弱之流茍百足之蟲傅翼之虎即贓穢狼籍還登薦剡嚴小吏而寛大吏詳去任而略見任此舉劾之弊四也懲貪之法在提問乃徒有其名㦯隂縱之使去或略逮而不行或批駁以相延或朦朧以幸免即或終竟其事亦必博長厚之名而以盡法自嫌苞苴或累萬金贓止坐之銖黍草菅或數十命罰不傷其毫釐此提問之弊五也薦舉糾劾所以勸儆有司也今薦則先進士而舉監非有慿藉者不與劾則先舉監而進士縱有訾議者罕及晉接差委専計出身之途于是同一官也不敢接席而坐比肩而行助成驕縱之風大䘮賢豪之氣此資格之弊六也州縣佐貳雖卑亦臨民之官必待以禮然後可責以法今也役使譴訶無殊輿𨽻獨任其汚黷害民不屑禁治禮與法兩失之矣學校之職賢才所闗今不問職業而一聽其所為及至考課則曰此寒官也槩與上考若輩知上官不我重也則因而自棄知上官必我憐也又從而日偷此處佐貳教授之弊七也科場取士故有門生座主之稱若廵按舉劾其職也乃劾者不任其怨舉者獨冐其恩尊之為舉主而以門生自居篚筐問遺終身不廢假明揚之典開賄賂之門此饋遺之弊八也有詔稱善𠡠撫按痛懲夙弊不如詔者罪之胡安國曰陸子元嘗言今吏部之職擬古宰相而其黜陟之柄有宰相所不及者如前代人主有所簡㧞或不闗中書祖宗時用人亦徃徃出親擢今凡不由吏部擬上而特㫖遷除者謂之傳奉官必不久而罷人亦耻為之又如有過降黜雖奉特㫖他日尚可復起獨由吏部考察者永不録用其體勢之重古未有也愚以為考察之法未必人人水鏡安知無徇已而私徇人而謬者且單詞類于匿名中傷慘于密告遂使一時萋菲終身禁錮以朝廷黜幽之典為讒人修怨之資立法之弊孰甚于此時選人請托權貴吏部尚書孫丕揚創為掣籖之法以杜其弊一時稱公而識者徃徃非之孫承澤曰丕揚大選掣籖之法于慎行嘗議其非體謂古人見除吏條格却而不視以為一吏足矣奈何衡鑑之地自處于一吏之職而無所秉成亦已陋矣至于人才長短各有所宜員格髙下各有所便地方繁簡各有所合道里逺近各有所凖而以探丸之智為挈瓶之守是掩鏡可以索照而持衡可以懸决也熹宗初趙南星掌吏部疏言掣籖之法自古未有自萬厯年間始用之以示公其初即不能行遂有造籖之弊討缺者無不如意御史翟學程之䟽至以為可笑良亦無􅏜其然荀卿曰探籌取鈎所以為公此假飾以見行法之在人耳而不意天下之果有此事也似宜變之以復祖宗之舊遂停抽籖之法至天啓末復行終明世不復更人因譏銓部為籤部云明制銓政最嚴如户部官不許蘓松浙江人為之以其地多賦税恐飛詭為姦也然弊孔蠧竇皆由吏胥堂司官遷轉不常何姦之有又上自閣部下至驛處倉廵大抵以虚文相酬應京師猶可外吏則愈甚焉官之政事一切付之胥曹而胥曹之所奉者不過已徃之舊牘厯年之陳規上之人既以是責下下之人得不以故事虚文應之一有不應則上之胥曹又乘隙而䋲以法矣故吏治卒以不振萬厯間選六科給事中多未惬人望編修張元楨言當以器識逺大學問該博文章優贍者充之不必拘體貌長大議者以不拘體貌一言有碍遂不果行陸容曰六科繫近侍官兼主奏對不選體貎端厚言語的確者以壮觀班行表儀朝宁但在前居此地者體貎非不端厚而其器識學問文章徃徃過人葢出自精選號為得人如姚䕫葉盛尹旻張寧輩是已以後則専以體貎為主而其所重者反不之計所謂出題考選亦不過借此以掩人耳目虗應故事耳使為吏部者以公天下為心不隂厚鄉里遇缺選其體貎豐偉音吐正當者五倍其數試其奏議弹文數萹每五六人中其優者一人奏上如此而不得人吾未之信也至資選之法孝宗𢎞治時吏部尚書王恕言永樂宣徳正統間天下亦有災傷各邊亦有軍餉當時無捐粟例糧不聞不足軍民不聞困弊比年来一遇災歉輙行捐例則人既己財進身欲其砥厲亷隅為循吏豈可得也帝即命止之王圻嘗考論之曰貲算入官昉于西漢謂任富可不貪也厥後邊費不足輸選成俗雖張釋之黄覇卜式司馬相如咸由是出不以為諱然終西漢之世得人四五而已唐宋以来亦間行之大抵由軍興糧匱非獲已也我朝宣徳以前科貢之途入太學者猶湏精擇戒其庸濫至于景泰始以邊境多虞開生員納粟納馬入監之例然是時多不過八九百人已而吏部尚書王直禮部郎中張綸咸以為言禮部侍郎姚䕫議覆遂尼不行成化初復開納糧納草納馬之例未久而止二十年山陜大饑民相食大臣以救荒無策不得已又令納粟入監限年餘即止時入監者已至六七千人于是令入監者過兩月則放依親有願自偹薪米寄監讀書者聽尋又令納粟監生年二十四以下願坐監者自偹薪米寄監讀書扣年二十五嵗以上方凖食糧収撥二十二年令納銀米監生到監兩月放回原籍収充増廣生員年二十以下者八年二十以上者五年滿日咨取入監復班序撥正徳以後或以賑濟或以防禦或以傳奉開上粟入監之例于是納銀之途益廣矣世宗入繼大統詔嚴止之嘉靖四年又復暫開然須提學官考其能通文義者兩京十三省限不過五千人時各王府典膳引禮等官青衣社學生亦皆得援例入監近年太僕缺馬户部缺邊費乃開例益濫遂至市井恒人皆得借俊秀名目輸粟入監注選銓部者至數萬人厯考先朝雖不獲已而行此例然亦必各提學官試其文理通者而後許之又各地方俱限以名數又年二十五以下者雖寄監不得食糧収撥近時此例俱未申明其間英俊由此而擢名科第表樹勲猷夫豈無人然千百而十一耳欽定續通典卷二十二
