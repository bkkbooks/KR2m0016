罷院立太僕寺又别置尚乘寺以管鞍轡而太僕寺止管阿迪斯馬匹二十五年隸中書省置提調官二人大徳十一年復改太僕院至大四年仍為寺卿二人少卿二人明洪武四年置羣牧監於達勒達錫里營所隨水草利便立官署専司牧養六年更置羣牧監於滁州旋改為太僕寺設卿少卿三十年置行太僕寺於北平後定都北京遂去行字其舊在滁州者改為南京太僕寺遂定制卿一人少卿二人正徳十一年増設少卿一人卿掌牧馬之政令以聽於兵部少卿一人佐寺事一人督營馬一人督畿馬正統中孫緒為太僕卿時大司馬王徳華交結錢寜移文太僕語渉不遜緒以書數之徳華引咎又淮安鳳陽諸郡饑饉馬俱小弱緒察其故即與交兊省費至於萬緡民頼之不破産者千餘家又金弼為太僕少卿慨然以馬政修舉為己任屢奉命督理虧耗自衞使郡守而下悉聼决無不畏法有順聖川者水草甘肥永樂中嘗牧馬蕃息天順初命弼徃視築二城用養天閑之馬増二驛於中道以便徃來詔嘉納之南京太僕寺卿一人少卿二人隆慶中罷少卿一人𢎞治中張謙陞南京太僕寺卿一以正率下剗除積弊禁革貪汚嵗省費甚鉅㝷奏馬政便民四事多見施行又明時馬政之弊南畿苦賦北畿苦養嘉靖中田濡為太僕寺卿奏請以額馬賦十之三其七以金代而輸之北寺即有軍興以便宜召買使兩畿民力有所蘇息上嘉其議行之後二十餘年山東河南相踵以請數省民不困而冏寺有餘藏常輸以給邊皆濡之力也行太僕寺洪武三十年置於山西北平陕西甘肅遼東等處卿一人少卿一人掌各邉衞所營堡之馬政以聼於兵部以時督察三嵗一稽比布按二司不得與有瘠損則聼兵部叅罸永樂四年許令寺官按治所轄衛所鎮撫首領官苑馬寺又置北直𨽻遼東平涼甘肅共四處卿一人少卿一人掌六監二十四苑之馬政而聽於兵部凡苑視廣狹為三等上苑牧馬萬匹中苑七千下苑四千凡馬駒嵗籍其監苑之數上於兵部以聽考課𢎞治十七年都御史楊一清奏行太僕苑馬二寺員缺簡選才望叅政副使𥙷陞卿叅議僉事𥙷陞少卿以振馬政永樂中命楊砥簡閲北京郡縣馬匹陞太僕寺卿明年兼苑馬寺卿砥率僚屬凡孳牧之法與民之利病悉條奏行之馬甚蕃息嘉靖中周仕以髙州守薦為苑馬寺少卿在任三年諸所建置有禆馬政丞唐置四人宋一人元二人明初置四人正統中又増八人共十二人以一人領京衞一人領順徳廣平二府一人領開封衞輝彰徳三府九人分領順天保定真定河間永平大名濟南兖州東昌九府孳牧寄牧各馬匹𢎞治六年罷四人正徳九年復増一人專領寄牧之事嘉靖八年又罷三人共六人分領三年更代而以寄牧者令府州縣兼理隆慶三年又罷三人止設三人以一人提督庫藏兼協理京邉二人分理東西二路馬政南京太僕寺寺丞二人隆慶中罷一人行太僕寺寺丞無定員苑馬寺寺丞無定員主簿唐置二人宋置一人元祐三年罷之元置經歴一人知事一人照磨一人管勾一人明亦置主簿一人南京太僕寺及行太僕寺苑馬寺皆一人乗黄署唐置令一人丞一人掌供車輅及馴馭之法宋車輅院掌乗輿法物鞍轡庫應奉御馬鞍勒遼南靣官太僕寺有乗黄署金尚輦局置使副使掌承奉輿輦等事典輿都轄収支都監同監掌給受之事隸殿前都御檢司元尚乗寺卿四人少卿二人丞二人掌上御鞍轡輿輦等事明御馬監以宦官掌之掌印監督提督太監各一員騰驤四衞各設監官典廐署唐置令二人丞四人掌飼馬牛給養雜畜宋置致遠務掌分養雜畜以供負載遼北靣官有某羣太保某羣侍中某羣敞史總典羣牧部籍使羣牧都林牙羣牧使羣牧副使各路羣牧使司諸處馬牛羣司掌牧牛馬之政令金尚廏局詳見前元尚乗寺兼掌阿迪斯羣牧騸馬驢騾之政眀良牧署典署一人署丞一人録事一人掌牧牛羊豕蕃育並鵝鴨鷄皆籍其牝牡之數而課孳卵焉𨽻上林苑典牧署唐置令三人丞六人掌諸牧雜畜給納及酥酪脯腊之事宋牛羊供應所掌牧大中小祀之牲牷乳酪院掌供造酥酪屬光禄寺元尚舎寺太監二人少監二人監丞二人掌牧養駱駞及供進愛蘭乳酪屬宣徽院眀孳牧所大使一人副使一人掌牧養雜畜屬光禄寺車府署及諸牧監唐以後厯代皆不置大理卿正監丞副主簿寺附獄丞司直評事唐置大理寺卿一人少卿二人掌折獄詳刑凡罪抵流死皆上刑部覆於中書門下建中初蔣沅為大理寺卿時帝幸奉天沅奔赴行在為賊侯騎所拘欲以偽職誘之因絶粒稱病潛竄閭里間京師平首䝉旌擢長慶時王正雅為大理卿會宋申錫事起獄自内出卒無證騐是時王守澄鄭注權勢正盛雖宰相重臣無敢顯言其事者惟正雅與京兆尹崔綰上疏請出造事者付外考騐其事别具状聞由是申錫止於貶官中外翕然推重之又張仁愿為大理卿隰州刺史王澈犯􅂍朝廷以功臣子欲宥之仁愿執奏竟遣伏法議者賞之宋初置判寺一人兼少卿事一人建隆三年以工部尚書竇儀判寺事竇儀判大理寺奉詔重定刑統援引律疏勒格恭酌重輕増為三十卷尤為詳備太祖嘉之凡獄訟之事隨官司決劾本寺不復聽訊但掌斷天下奏獄送審刑院詳訖同署以上於朝元豐時帝以國初廢大理獄非是以問孫洙洙對合㫖遂命官起寺十七日而成至官制行置卿一人少卿二人手詔大理寺近舉墜典俾治獄事宜依推制院及御史臺例不供報糾察司三年詔依舊供報及詔糾察司察訪本寺斷徒以上出入不當者索案㸃檢時向敏中判大理寺有以沒入祖吉贓錢分賜法吏敏中引鍾離意委珠事獨不受又大理寺奏治獄帝顧輔臣曰棘寺當得剛正如李浩者為之已而大理卿闕帝曰無過李浩遂除大理卿故事寺獄空上表賀浩獨不奏紹興中秦檜矯詔下岳飛於大理獄大理卿薛仁輔寺丞李若樸何彦猷皆言其無罪遼聖宗統和十二年南面官置大理寺有提㸃大理寺大理正等官金海陵天徳二年置大理寺卿少卿掌檢斷刑名元世祖至元二十年置大理寺掌領舊州城及畏吾兒之居漢地者有詞訟則聽之二十二年改為大都䕶府置大都䕶四人同知二人副都䕶二人廢大理不置眀大理寺卿一人左右少卿各一人掌審讞平反刑獄之政令正統中王振問楊士竒等吾鄉誰可為大臣者皆薦薛瑄召為大理右少卿士竒以用瑄出振意欲瑄一見振瑄正色曰安有授官公朝而拜私門者耶時人呼瑄為薛夫子後忤王振下獄振老奴伏竈下抱薪而泣人問之曰聞欲殺薛夫子故泣耳振心動乃免天順中王槩遷大理卿出入十年凡兩法司及畿藩讞奏叅錯情法多所平反美時吏諳律例者類多深刻槩獨持平􅁢濟以長南京大理寺卿一人憲宗成化中夏時正為南京大理卿七年嵗大祲巡視江西斥貪墨吏革沉徭理庾賦放無名之税勸民出粟七十萬石賑饑長河洞人叛單車撫定疏時弊二十事當路人不悦遂致仕歸正唐置二人凡丞斷罪不當則以法正之宋亦二人元豐五年刑部奏定凡斷案先上正看詳當否論難改正然後上於長貳遼金皆有之明左右二寺各寺正一人寺副二人各隨其所轄而覆審之情罪允服始呈堂具奏南京大理寺左右寺正各一人丞唐置六人分判寺事宋置推丞四人斷丞六人天聖中石延年為大理丞上書陳十策乞選練兵甲言西夏必叛朝廷不以為然及元昊反帝思其言乃召見乞奉使河東籍兵回稱㫖帝甚喜之紹興二十六年帝以大理寺宜叅用士人乃除河涇楊邦弼為大理丞遼金皆有之明左右寺丞各一人南京右寺丞一人主簿唐置二人宋元豐中始置二人建炎三年省後復金置知法十一人明法二人明置司務二人獄丞唐置二人宋元豐官制行置大理獨丞四人遼金元明皆無司直唐置六人宋因之金置四人明無評事唐置八人宋元豐官制行始命張仲頴等十二人為評事隆興二年詔大理評事以八員為額金置三人掌同司直明置左右寺評事各四人南京大理寺左右評事各三人隆慶三年革左右評事各一人監自唐以後歴代皆無欽定續通典卷二十九
