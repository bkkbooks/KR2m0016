body:
  text: 職官諸卿上總論諸卿少卿附唐制九年與北齊及隋同太常寺光禄寺衞尉寺宗正寺太傼寺大理寺鴻臚寺司農寺太府寺是為九寺置卿各一人少卿或二人或一人太常二人光禄一入衞尉二人宗正二人太僕一人大理二人鴻臚二人司農二人太府二人丞以下各有差詳見各寺宋九年與唐同初各置判寺事一人以朝官以上充元豐正官名乃各置卿一人少卿一人惟大理司農置少卿二人遼南靣官太常光禄後改為崇禄以避太宗諱也衞尉宗正太僕大理鴻臚司農八寺與唐宋同各置卿少卿惟改太府為監置太監少監等官金惟太常寺大理寺設卿少卿等官元太常光禄太僕大理司農五寺與唐宋同各置卿少卿初設太常寺卿一人少卿五人後改為院改置院使同知等官光禄寺卿少卿各一人太僕寺卿少卿各二人大理寺置後即廢司農寺卿少卿各二人其外如掌謁司卿四人少卿四人掌醫監卿四人太卿五人羣牧監卿三人太卿各二人二人武備寺卿四人少卿四人尚乗寺卿四人少卿二人長信寺卿四人少卿二人長秋寺卿五人少卿二人承徽寺卿五人少卿二人長寜寺卿六人少卿二人長慶寺卿六人少卿二人寜徽寺卿六人少卿四人太府監太卿六人中尚監卿八人章佩監卿五人經正監太卿一人秘書監卿四人皆前代之所無其大宗正府之扎爾古齊大司農司之達嚕噶齊同知宣政院宣徽院大禧宗禋院太常禮儀院典瑞院太史院太醫院将作院通政院中政院儲政院之院使同知副使同僉僉院院判等官皆前代之卿職至少府監掌織染技巧之事将作監掌土木工匠之政累朝職掌略同元改少府監為大都留守其官司與将作院所掌互相替易亦一代變制也明太常光禄太僕太理鴻臚五寺各置卿一人少卿二人南京所設亦如之其外如尚寳司行太僕寺太祖洪武三十年置於山西北平陜西甘肅遼東等處苑馬寺亦各置卿少卿一人焉太常寺丞郎主簿京博士署太祝樂奉禮部吹協律兩郊社太署鼓署太醫署署太卜署吏廪犧署太公廟檢討目附汾祠署唐太常寺卿一人少卿二人卿掌禮樂郊廟社稷之事總郊社太樂鼓吹太醫太卜廪犠諸祠廟等署少卿為之貳凡大禮則贊引有司攝事則為亞獻三公行園陵則為副大祭祀省牲器則謁者為之導小祀及公卿嘉禮命謁者贊相凡巡幸出師克獲皆擇日告太廟宋初置判寺無常員以兩制以上充别置太常禮儀院雖隸本寺其實専達有判院同知院四人與禮院事不相兼仁宗康定元年置判寺同判事始並兼禮院事元豐官制行置太常寺卿一人少卿一人掌禮樂郊廟社稷壇壝陵寢之事少卿為之貳祭祀有大祠有小祠其犧牲幣玉酒醴薦獻器服各辨其等掌樂律樂舞樂章以定宫架特架之制祭祀享則分樂而序之凡親祠及四孟月朝獻景靈宫郊祀告享太廟掌贊相禮儀升降之節嵗時朝拜陵寢則視法式辦具以授祠官凡祠事差官卜日齋戒皆檢舉以聞郊祀已頒御札則撰儀以進宫架鼓吹警場率前期按閲即習餘祀及朝㑹宴享上夀封册之儀物亦如之若禮樂有所損益及祀典神祇爵號與封爵繼嗣之事當考定者擬上於禮部哲宗元祐三年詔各寺監互置長貳惟太常寺長貳兼置徽宗宣和三年令本寺因革禮五年一檢舉接續編修孝宗隆興元年以光禄寺並歸太常太祖乾徳中以雅樂聲髙近於哀思不合中和令判太常寺和峴改定峴以王朴律凖較洛陽司天臺影表石尺制律吕音始和暢又賈黄中判太常禮儀院每詳定典禮損益得中仁宗天聖中同禮院王暉言開國以來禮儀沿革文字重複編成六十卷名禮閣新義又英宗治平中修禮書百卷名曰太常因革禮自歐陽修同判太常寺事奏禮院文字散失請差官編修後張洞奏用姚闢蘇洵編纂至是成書又曽肇同知太常禮院肇在職多所釐正上親祀皇地祇於北郊盖自肇發之遼南面官有太常寺卿少卿掌祭祀之事金熈宗皇統三年始置太常寺凡太廟廪犧郊社諸陵大樂等署隸焉設卿一人少卿一人掌禮樂郊廟社稷祠祀之事元設太常禮儀院掌大禮樂祭享宗廟社稷封贈謚號等事凡大廟郊祀廪犧社稷大樂等署隸焉世祖中統元年中都立太常寺止設寺丞一人至元二年翰林兼攝太常寺九年立太常寺設卿一人少卿以下五人十三年以侍衞司省併太常寺至二十年又别置侍儀司十六年又増法物庫子掌公服法服之藏武宗至大元年改陞為院設官十二員四年復為太常寺仁宗延祐元年復改陞院以大司徒領之文宗天厯二年定置院使二人同知二人僉院二人同僉二人院判二人又置大禧宗禋院設院使都典制神御殿事六人同知兼佐儀神御殿事二人副使兼奉贊神御殿事二人僉院兼祇承神御殿事二人同僉兼肅治神御殿事二人院判供應神御殿事二人叅議二人掌朔望嵗時諱忌日辰禋享禮典眀洪武元年置太掌司設卿少卿等官三十年改司為寺卿一人少卿二人掌祭祀禮樂之事總其官屬籍其政令以聽於禮部洪武以後間有以樂舞生累資陞至卿甚或加禮部尚書侍即銜者穆宗隆慶初乃始定制重推科甲出身者為卿凡天神地祇人鬼嵗祭有常先冬十二月朔奏請明年祭日天子御奉天殿受之乃頒於諸司天子親祭則贊相禮儀大臣攝事亦如之凡國有册立册封冠婚營繕征討大喪諸典禮嵗時旱澇大災變則請告宗廟社稷薦新則移光禄寺供其品物祭祀先期請省牲進祝版銅人殿殿奏請齋戒親署御名省牲偕光禄卿惟大祀車駕親省大臣日一省之凡祭滌器爨理香燭玉帛整拂神幄掌燎看燎讀祝奏禮對引司香進俎舉麾陳設收支導引設位典儀通贊奉帛執爵司樽司罍洗凡卿貳皆率屬各供其事洪武二十一年以盧原質為太常少卿事惠帝屢有建白靖難後召見不屈遂殉節焉又廖昇為太常少卿建文元年勅修髙皇實録以昇為副總裁時稱博雅又世宗嘉靖中李開先為太常少卿㑹九廟災上疏自陳竟罷歸孝宗𢎞治七年増設卿少卿各一人提督四譯館事世宗嘉靖中裁卿止設少卿一人用本寺銜名不治寺事所掌詳見中書省通事舍人篇南京太常寺卿一人少卿一人丞唐置二人掌判寺事凡享太廟則修七祝於西門之内宋制丞一人叅領寺事太祖建隆乾徳時以禮官乆次官髙者充元豐官制行始置丞專其職髙宗建炎初併省冗職罷之紹興三年復置隆興元年又以光禄寺併歸太常復罷丞明年又詔依舊制隆興初以李浩為太常丞召對時首論聖學人稱其純正又石待問少以詩賦名累官至太常丞時丁謂畏其直錢易竒其文楊億李諤服其議論范希純為太常丞舊制太廟薦享逐室設常食一牙盤元豐時奏罷之希純奏請復舊制名曰薦羞遼南靣官有太常寺丞金亦置一人佐卿少卿理寺事元中統元年中都立太常寺止設寺丞一人延祐元年改為太常禮儀院置院使等官罷丞不置明置丞二人為卿少卿之貳洪武初張羽舉賢良不出徵起廷對稱㫖擢太常丞兼翰林院同掌文淵閣事十六年帝親藳滁陽王事實命羽撰廟碑當時以大制作推重之主簿唐置二人宋仁宗皇祐中宋祁乞増置一人勾檢在寺文書及掌出納遂除胡瑗為主簿後省罷元豐官制行復置髙宗建炎三年又罷之紹興十年復置是時太常少卿王賞言本寺主簿劉榮强記洽聞又深禮樂所有討論文字欲與共同討論詔從之遼各卿寺有主簿金無之元無主簿設經歴一人都事一人為本寺首領照磨兼管勾承發架閣收掌文書即主簿之職也明置典簿二人仁宗洪熈元年置犧牲所吏目一人典掌文移南京大常寺典簿一人博士唐置四人掌辦五禮按王公三品以上功過善惡為之諡大禮則贊卿導引徳宗貞元中帝親郊時更兵亂禮物殘替博士張薦為叅綴典儀畧如舊章又王彦威淹博古今典禮求為太常散吏卿知其經生𥙷檢討官彦威採隋唐凡禮沿革皆條次彚分號元和新禮上之遂拜博士宋置博士四人掌定五禮儀式有改革則據經審議凡於法應諡者考其行状撰定諡文有祠事則監視儀物掌凡導引之事徽宗大觀元年以太常寺所被㫖及施行典禮事每季輪博士詮次成籍以備討論建炎初併省冗職僅置博士一人紹興九年臣僚奏言元豐正名太常主議論者博士四人乞叅稽舊典添置博士以稱朝廷蒐補闕軼緝熙彌文之意詔添博士一人隆興元年又併省一人建隆中和峴為太常博士從祀南郊峴贊導乗輿進退閒雅太祖謂近侍曰誰氏之子何相禮之明辨乎左右以峴閥閲對尋拜刑部員外郎兼判太常寺又常安民字希古為成都教授上書論治國之本曰勸忠厚勵名節元祐公卿皆薦其才召為太常博士遼南面官有太常寺博士金太常寺博士二人掌檢討典禮章宗眀昌元年更置檢討二人泰和元年置檢閲官一人為博士貳所掌與博士同四年即罷元博士二人虞集為太常博士丞相拜珠方為院使間從集問禮器祭義甚悉集為言先王制作以及古今因革損益之由拜珠歎息深許益信儒者可用又王守誠性好學從鄧文原虞集遊文詞日進泰定中為太常博士續編太常集禮以進又李好文除太常博士時有詔為集禮令各省及各郡縣纂修乆而未成好文白長院請自選僚屬數人仍請出架閣文牘以資采録三年書成名曰太常集禮明博士二人講習禮文請帝填名祝版大禮導贊其儀南京太常寺博士一人太祝唐置六人掌出納神主祭祀則跪讀祝文卿省牲則循牲告充牽以授太官宋太祝一人掌讀册辭授摶黍以嘏告飲福則進爵酌酒受其虚爵遼南面官太常寺有太祝金太祝掌奉祀神主元置十人較前代為獨多眀置贊禮郎九人掌讀祝兼贊導之事嘉靖中増至三十三人後罷二人建文中設太祝一人後罷之南京贊禮郎七人嘉靖中罷一人奉禮郎唐置二人掌君臣版位以奉朝㑹祭祀之禮宗廟則設皇帝位於庭九廟子孫列焉昭穆異位去爵從齒凡樽彛勺冪篚坫簠簋登鉶籩豆皆辨其位凡祭祀朝㑹拜跪之節皆贊導之公卿巡行諸陵則主其威儀皷吹而相其禮宋奉禮郎一人掌奉弊帛授初獻官大禮則設親府版位遼南靣官太常寺有奉禮郎金奉禮郎所掌亦同元亦置二人又有奉禮兼檢討一人品與奉禮郎同明設贊禮郎無奉禮郎協律郎唐置二人掌和律吕又有録事二人禮院修撰檢討官各一人貳其事宋置一人掌律吕以和陰陽之聲正官架特樂樂舞之位大祭祀享燕用樂則執麾以詔作止之節舉麾鼓柷而樂作偃麾戛敔而樂止凡樂掌其序事遼南面官太常寺有協律郎金亦有協律郎職掌與唐宋同元置二人眀隆慶三年罷協律郎等官四十八員神宗萬厯六年復設又設司樂二十人考協雅樂凡舞人韻聲人籍覈其名數而審肄之凡祭先期演樂太和殿兩京郊社署唐置令一人掌五郊社稷明堂之位與奉禮郎設樽罍篚冪而太官令實之立燎壇積柴合朔有變則巡察四門以俟變過則罷宋置郊社令掌巡視四郊及社稷壇壝掌凡掃除之事祭祀則省牲太廟令掌宗廟薦新七祀及功臣從享之禮籍田令掌帝籍耕耨出納之事植五穀蔬果藏冰以待用官闈令掌率其屬以汛洒廟廷几修治潔除之事遼亦有署令署丞等官金有太廟署令一人丞一人及郊社署令一人丞一人掌宗廟社稷祠祀祈禱并㕔舍祭器等物諸陵署提㸃山陵令一人涿州刺史兼丞一人掌守山陵元至元三年置太廟署令二人丞一人掌宗廟行禮兼廪犧署事成宗大徳九年置郊祀署令二人丞一人掌郊社行禮兼廪犧署事大徳元年置社稷署令二人丞一人眀天壇地壇朝日壇夕月壇先農壇帝王廟祈穀殿各陵各祠祭署俱置奉祀一人祀丞二人南