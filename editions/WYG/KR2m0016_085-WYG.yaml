body:
  text: 樂臣等謹案杜佑作樂典以為古者因樂著教將欲閑其邪正其頽非樂無由故其叙樂也上自皇初下終天寳舉夫因革之大凡制作之得失以及鏗鏘綴兆之節殊方下里之音本末燦然聲容畢具而類例所不能賅者又為諸議以補其缺百世而下所謂聞其樂以知其徳者將於是乎在也唐自肅代以後國事倥偬樂文墜缺洎乎五代雖有製造鮮足觀者宋興太祖太宗留心雅樂至皇祐間始定大安之名一代講求聲律家如司馬光周子朱子蔡元定諸人類皆有夙悟神解可垂不朽顧當時不盡見用而所謂播在樂府薦之郊廟者乃出自李照魏漢津者流葢古樂之難復久矣遼金元大都沿漢津之舊至明李文利主三寸九分為黄鍾朱載堉為開方乗除之説則又私心自用去古益逺方之自檜不亦宜乎今去其繆者存其要始唐至徳間迄於明代以續通典之後云第一歴代沿革上第二歴代沿章下第三十二律五聲八音名義五聲十二律旋相為宫五聲十二律相生法歴代製造第四權量金一石二土三革四絲五木六匏七竹八八音之外又有七樂懸第五歌雜歌曲舞雜舞曲第六清樂坐立部伎四方樂散樂前代雜樂第七大祠與忌日同者不去樂議古樂淡且和議律尺議元豐朝㑹樂十議楊傑大樂七失議用正聲廢中聲議大正少三等八條議崇寧之樂可變議黄鍾三寸九分不合於理議琴以第三絃為宫為中和議歴代沿革上唐五代宋唐代宗寳應二年六月太常奏𤣥宗室請奏大運之舞調用太蔟肅宗室請奏惟新之舞調用夷則徳宗即位十一月禮儀使奏代宗室樂用保大之舞貞元二年三月以昭徳皇后廟樂章九首付有司帝令有司議廟舞之號禮官請號坤元之舞從之十四年二月帝自製中和舞又奏九部樂及禁中歌舞伎者十數人布列在廷上御麟徳殿會百寮觀新樂作詩令太子書示百官十九年四月修徳明興聖及獻懿二祖廟遷神主於廟太常寺奏徳明興聖獻祖懿祖廟樂用宫懸詔可憲宗永貞元年十二月有司請徳宗廟室酌獻奏文明之舞用黄鍾宫元和元年有司奏順宗室奏大順之舞中書侍郎平章事段文昌撰樂章穆宗以元和十五年正月即位四月禮儀使奏憲宗皇帝廟樂請用象徳之舞六月祔廟請用當月均調林鍾宫謹按律厯志曰黄鍾太蔟林鍾謂之三正律皆音之君也今祔饗始於六月辛未聲應林鍾之宫制可中書侍郎平章事段文昌進撰樂章敬宗以長慶四年正月即位有司奏穆宗室奏和寧之舞中書侍郎平章事牛僧孺奉勅撰奏樂章文宗以寳厯二年即位有司奏敬宗廟奏大鈞之舞中書侍郎平章事韋處厚撰樂章梁太祖開平元年既受唐禪始建宗廟凡四室每室有登歌酌獻之舞肅宗宣元皇帝室曰來儀之舞烈祖文穆皇帝室曰昭徳之舞二年正月太祖將議郊禋有司撰進樂名舞名樂曰慶和之樂舞曰崇徳之舞皇帝行奏慶順之曲奠玉幣登歌奏慶平之曲迎爼奏慶肅之曲酌獻奏慶熙之曲飲福酒奏慶隆之曲送文舞迎武舞奏慶融之曲亞獻終獻奏慶休之曲太廟迎神舞開平之舞後唐莊宗同光二年正月將有事於南郊光祿大夫簡較尚書左僕射行太常卿充南郊禮儀使李燕進太廟登歌樂章洎舞名其懿祖昭烈皇帝室登歌酌獻曰昭徳之舞獻祖文皇帝室登歌酌獻曰文明之舞太祖武皇帝室登歌酌獻曰應天之舞昭宗皇帝室登歌酌獻曰永平之舞從之明宗天成元年八月太常定莊宗廟堂酌獻舞武成之舞晉髙祖天福五年八月詳定院秦先奉詔正冬二節朝會舊儀廢於離亂之時興自和平之代將期備物全繫用心須議擇人同為定制其正冬朝㑹禮節樂章二舞行列等事宜差太常卿崔棁御史中丞竇貞固刑部侍郎吕錡禮郎侍郎張允與太常等官一一詳定禮從新意道在舊章庶知治世之和漸見移風之善今衆官檢討典禮具述制度按禮云天子以徳為車以樂為御大樂與天地同和大禮與天地同節又曰安上治人莫善於禮移風易俗莫善於樂故樂書議舞曰夫樂在耳曰聲在目曰容聲應乎耳可以聴知容蔵於心難以貌覩故聖人假干戚羽旄以表其容發揚蹈厲以見其意聲和合則大樂備矣又按義鏡問鼓吹十二案合於何所答云周禮鼓人掌六鼓四金漢朝乃有黄門鼓吹崔豹古今註云因張騫使西域得摩訶兠勒一曲李延年增之分為二十八曲梁置鼔吹清商令二人唐又有掆鼔金鉦大鼔長鳴歌簫笳􅅇合為鼔吹十二案大享會則設於懸外此乃是設二舞及鼔吹十二案之繇也今議一從令式排列教習文舞郎六十四人分為八佾每八佾人左手執籥禮云葦籥伊耆氏之樂也周禮有籥師教國子爾雅曰籥如􅅇三孔而短大者七孔謂之簅歴代以來文舞所用凡用籥六十有四右手秉翟周禮所謂羽舞也書云舞干羽於兩階翟山雉羽分析連攢而為之二人執纛前引數於舞人之外舞人冠進賢冠服黄紗袍白紗中單白領褾白練􅜵襠白布大口袴革帶烏皮履白布襪武舞郎六十四人分為八佾左手執干干楯也今之旁牌所以翳身也其色赤中畫獸形故謂之朱干周禮所謂兵舞取其武象用楯六十有四右手執戚戚斧也上飾以玉故謂之玉戚二人執旌前引旌似旗而小絳色畫昇龍二人執鼗鼓二人執鐸周禮有四金之奏其三曰金鐸以通鼓形如大鈴仰而振之金錞二每錞二人舉之一人奏之周禮四金之奏一曰金錞以和鼔鑄銅為之其色元其形圓若椎上大下小髙三尺六寸有六分圓二尺四寸上有伏虎之狀旁有耳獸形䘖環二人執鐃以次之周禮四金之奏二曰金鐃以止鼓如鈴無舌搖柄以鳴之二人掌相在左禮云理亂以相制如小鼔用皮為裏實之以糠撫之以節樂二人掌雅在右禮云訊疾以雅以木為之狀如漆甬而揜口大二圍長五尺六寸以羖皮鞔之旁有二細髹畫賔醉而出以器築地明行不失節武舞人服弁手尚幘金絲布大袖緋絲竹布兩襠甲金飾白練􅜵襠錦騰蛇起梁帶豹文大口布袴烏皮靴工人二十數於舞人之外舞弁朱褠革帶烏皮履白練􅜵襠白布襪殿廷仍加鼔吹十二案義鏡云帝設毡案以毡為床也今請制大床容九人振作歌樂其床為熊羆貙豹騰倚之狀以承之象百獸率舞之意分置於建鼔之外各三案每案羽葆鼓一大鼔一金錞一歌二人簫二人笳二人十二案樂工一百有八人舞助一百三十有二人取年十五以上弱冠已下容止端正者其歌曲名號樂章詞句中書條奏差官修撰從之漢髙祖天福十二年九月權判太常寺張昭奏改唐祖孝孫所定治康之舞為治安之舞凱安之舞為振徳之舞又改貞觀中九功舞為觀象之舞七徳舞為講功之舞其治安振徳二舞請依舊郊廟行用以文舞降神武舞送神其觀象講功二舞請依舊宴㑹行用昔周奏六代之樂即今二舞之類是也其賔祭常用别有九夏之樂即肆夏皇夏等是也梁武帝善音樂改九夏為十二雅前朝祖孝孫改雅為和示不相沿也臣令改為成取韶樂九成之義十二成樂曲名祭天神奏豫和之樂請改為禋成之樂祭地祇奏順和請改為順成祭宗廟奏永和請改為裕成祭天地宗廟登歌奏肅和請改為肅成皇帝臨軒奏太和請改為政成王公出入奏舒和請改為弼成皇帝食舉及飲宴奏休和請改為徳成皇帝受朝皇后入宫奏正和請改為扆成皇太子軒懸出入奏成和請改為允成元日冬至皇禮㑹登歌奏昭和請改為慶成郊廟爼入奏雍和請改為騂成皇帝祭享酌獻讀祝文及飲福受胙奏壽和請改為壽成祖孝孫原定十二和曲開元朝又奏三和遂有十五和之名凡制作禮法動依典故梁置十二雅盖取十二天之成數契八音十二律之變軌益以三和有乖稽古又緣祠祭所用不可盡去臣取其一焉祭孔宣父齊太公廟降神奏宣和請改師雅之樂三公升殿㑹訖下階履行奏祴和請廢同用弼成享先農耕耤田奏豐和請廢同用順成周太祖廣順元年五月太常卿邉蔚上太廟四室奠獻舞詞表謂西漢詔叔孫通重定禮樂始有廟樂及降神納爼登歌薦祼等曲迨至唐朝降神用文舞送神用武舞其餘即奏十二和之樂一曲則别立舞名降及前朝亦徇此制今者將新郊廟嚴配祖宗合更率舞之名仰詠累功之盛請信祖睿和皇帝室酌獻奏肅雍之舞僖祖明憲皇帝室酌獻奏章徳之舞義祖翼順皇帝室酌獻奏善慶之舞慶祖章肅皇帝室酌獻奏觀成之舞又奏改前朝治安為政和之舞振徳為善勝之舞觀象為崇徳之舞講功為象成之舞又議改十二成樂曲為十二順曰昭順曰寧順曰肅順曰感順曰治順曰忠順曰康順曰雍順曰温順曰禮順曰禋順曰福順宋太祖建隆三年二月有司請改一代樂名并太廟四室酌獻迎爼送神樂章詔翰林學士竇儼撰進四月儼上新定二舞十二樂曲名并樂章改周文舞崇徳之舞為文徳之舞武舞象成之舞為武功之舞改樂章十二順為十二安盖取治世之音安以樂之義祭天為髙安祭地為靜安先農耤田同靜安宗廟為理安天地宗廟登歌為嘉安皇帝臨軒為隆安王公出入為正安皇帝食飲為和安皇帝受朝皇后入宫為順安皇太子軒懸出入為良安正冬朝㑹為永安文宣王武成王同永安郊廟爼豆入為豐安祭享酌獻飲福受胙為禧安五月儼上太廟四室舞名并登歌辭禧祖室舞大善之舞奏大善之曲順祖室舞大寧之舞奏大寧之曲翼祖室舞大順之舞奏大順之曲宣祖室舞大慶之舞奏大慶之曲乾徳元年翰林學士承㫖陶榖等奉詔撰定祀感生帝之樂章曲名降神用大安太尉行禮用保安奠玉弊用慶安司徒奉爼用咸安酌獻用崇安飲福用廣安亞獻終獻用文安送神用普安四年和峴言按唐貞觀十四年景雲見河水清張文收採古朱鴈天馬之義作景雲河清歌名燕樂元㑹第二奏者是也伏見今年荆南進甘露京兆東州進嘉禾黄州進紫芝和州進綠毛龜黄州進白兎欲依月律撰神龜甘露紫芝嘉禾玉兎五瑞各一曲每朝㑹登歌首奏之六年峴又言漢朝獲天馬赤鴈神鼎白麟之瑞並為郊歌國朝合州進瑞木成文馴象南方自至秦州獲白烏黄州獲白雀並合播在管絃薦於郊廟詔峴作瑞文馴象玉烏皓雀四瑞樂章以備登歌太宗太平興國二年冬至上壽復用教坊樂淳化三年元日朝賀畢再御朝元殿羣臣上壽復用宫縣二舞登歌五瑞曲自此遂為定制真宗咸平四年太常言樂工習藝匪精每祭享郊廟止奏黄鍾宫一調未嘗隨月轉律望示條約乃命侍讀學士夏侯嶠判寺郭贄同按試擇其曉習月律者悉増月奉自餘權停廩給再俾學習以奬勵之雖頗振綱紀然亦未能精備盖樂工止以年勞次補而不以藝進至有抱其器而不能振作者故難於驟變景徳二年詔翰林學士李宗諤權判太常寺復以龍圖閣待制戚綸同判寺事乃命太常樂鼔吹兩署工校其優劣黜去濫吹者五十餘人宗諤因編次律吕法度樂物名數目曰樂纂又裁定兩署工人試補條式及肄習程課先是惟天地感生帝宗廟用樂親祀用宫縣有司攝事止用登歌自餘大祀未暇備樂至是詔自今諸大祀並宜用樂皆同感生帝六變八變如通禮所載大中祥符元年判太常禮院孫奭上言按禮文饗太廟終獻降階之後武舞止太祝徹豆豐安之樂作一成止然後理安之樂作是謂送神郊祀錄載登歌徹豆一章奏無射羽然則宗廟之樂禮有登歌徹豆今於終獻降階之後即作理安之樂誠恐缺失望依舊禮增用詔判太常寺李宗諤與檢討詳議以聞宗諤等言國初撰樂章有徹豆豐安曲辭樂署因循不作望如奭所請從之時以將行封禪詔改酌獻昊天上帝禧安之樂為封安皇地祇禧安之樂為禪安飲福禧安之樂為祺安别製天書樂章瑞安靈文二曲每親行禮用之又作醴泉神芝慶雲靈鶴瑞木五曲施於朝㑹宴享以紀瑞應五年上製薦獻聖祖文舞曰發祥流慶之舞武舞曰降真觀徳之舞自是玉清昭應宫景靈宫親薦皆備樂用三十六虡景靈宫以庭狹止用二十虡上又取太宗所撰萬國朝天曲曰同和之舞平晉曲曰定功之舞親作樂辭奏於郊廟仁宗景祐二年帝親製樂曲以夾鍾之宫黄鍾之角太蔟之徴姑洗之羽作景安之曲以祀昊天更以髙安祀五帝日月作太安以享景靈宫罷舊真安之曲以黄鍾之宫大吕之角大蔟之徴應鍾之羽作興安以獻宗廟罷舊理安之曲景安興安惟乗輿親行則用之以姑洗之角林鍾之徴黄鍾之宫太蔟之商南吕之羽作祐安之曲以酌獻五帝以林鍾之宫太蔟之角姑洗之徴南吕之羽作寧安之曲以祭地及太社太稷罷舊靜安之曲於時制詔有司以太祖太宗真宗三聖並侑乃以黄鍾之宫作慶安之曲以奠幣彰安之曲以酌獻又詔躬謁奉慈廟章獻皇后之室作逹安之曲以奠瓚厚安以酌獻章懿皇后之室作報安之曲以奠瓚衍安以酌獻皇帝入出作乾安罷舊隆安之曲常祀至日祀圜丘太祖配以黄鍾之宫作定安以奠幣英安以酌獻孟春祀感生帝宣祖配以太蔟之宫作皇安以奠幣肅安以酌獻祈榖祀昊天太祖配作仁安以奠幣紹安以酌獻孟夏雩上帝太祖配以仲吕之宫作獻安以奠幣感安以酌獻夏至祭皇祇地太祖配以蕤賔之宫作恭安以奠幣英安以酌獻季秋大饗明堂真宗配以無射之宫作誠安以奠幣徳安以酌獻孟冬祭神州地祇太宗配以應鍾之宫作化安以奠幣韶安以酌獻又造冲安之曲以七均之為八十四皆作聲譜以授有司冲安之曲獨未施行親製郊廟樂章二十一曲財成頌體告於神明詔宰官吕夷簡等分造樂章參施羣祀又為景祐樂髓新經凡六篇第一釋十二均第二明所主事第三辨音樂第四圖律吕相生并祭天地宗廟用律及陰陽數配第五十二管長短第六代厯度量衡皆本之於陰陽配之於四時建之於日辰通之於鞮竺演之於壬式遁甲之法以授樂府以考正聲以賜羣臣焉皇祐二年五月明堂禮儀使言明堂所用樂皆當隨月用律九月以無射為均五天帝各用本音之樂於是内出明堂樂曲及二舞名迎神曰誠安皇帝升降行止曰儀安昊天上帝皇地祇神州地祇位奠玉幣曰鎮安酌獻曰慶安太祖太宗真宗位奠幣曰信安酌獻曰孝安司徒奉爼曰饎安五帝位奠玉幣曰鎮安酌獻曰精安皇帝飲福曰胙安退文舞迎武舞亞獻終獻皆曰穆安徹豆曰歆安送神曰誠安歸大次曰憇安文舞曰右文化俗武舞曰威功睿徳又出御撰樂章鎮安慶安信安孝安四曲餘詔輔臣分撰庚戌詔御所撰樂曲名與常祀同者更之遂更常所用圜丘雩祭明堂誠安之曲曰宗安祀感生帝慶安之曲曰光安奉慈廟信安之曲曰慈安六月内出御撰明堂樂八曲以君臣民事物配屬五音凡二十聲為一曲用宫變徴變者天地人四時為七音凡三十聲為一曲以子母相生凡二十八聲為一曲皆黄鍾為均又明堂月律五十七聲為二曲皆無射為均又以二十聲二十八聲三十聲為三曲亦無射為均皆自黄鍾宫入無射如合用四十八或五十七聲即依前譜次第成曲其徹聲自同本律及御撰鼓吹警嚴曲合宫歌並肄於太常七月御撰明堂無射宫樂曲譜三皆五十七字五音一曲奉爼用之二變七律一曲飲福用之七律相生一曲退文舞迎武舞及亞獻終獻徹豆用之是月上封事者言明堂酌獻五帝精安之曲並用黄鍾之均聲此乃國朝常祀五時迎氣舊法若於親行大饗即所未安且明堂之位木室在寅火室在已金室在申水室在亥盖木火金水之始也土室在西南盖土王之次也既皆用五行本始所王之次則獻神之樂亦當用五行本始月律各從其音以為曲其精安五曲宜以無射之均太蔟為角獻青帝仲吕為徴獻赤帝林鍾為宫獻黄帝夷則為商獻白帝應鍾為羽獻黒帝詔兩制官同太常議而堯臣等言大饗日迫事難猝更詔俟過大禮詳定以聞於是中書門下集兩制太常官置局於秘閣詳定大樂王堯臣等言天章閣待制趙師民博通今古願同詳定及乞借叅知政事髙若訥所校十五等古尺並從之三年二月詔兩制及禮官叅稽典制以定國朝大樂名中書門下審加詳閲以聞初胡瑗請太祖廟舞用干戚太宗廟兼用干羽真宗用羽籥以象三聖功徳然議者謂國朝七廟之舞名雖不同而干羽並用又廟制與古異及瑗建言止降詔定樂名而已七月堯臣等言按太常天地宗廟四時之祀樂章凡八十九首自景安而下七十五章率以安名曲豈特本道徳政教嘉靖之美亦緣神靈祖考安樂之故臣等謹上議國朝樂宜名大安詔曰朕惟古先格王隨代之樂亦既制作必有稱謂緣名以討義繇義以知徳盖名者徳之所載而行逺垂久之致焉故韶以紹堯夏以承舜濩以救民武以象伐𫝊之不朽用此道也國家舉墜正失典章交備獨斯體大而有司莫敢易言之朕憫然念兹大懼列聖之休未能昭揭於天下之聴是用申敇執事逺求博講而考定其衷今禮官學士迨三有事之臣同寅一辭以大安之議來復且謂藝祖之戡暴亂也安天下之未安其功大二宗之致太平也安天下之既安其徳盛洎朕之承聖烈也安祖宗之仁其仁厚祗覽所議熟復於懷恭唯神徳之造基神功之戢武章聖恢清淨之名冲人䝉成定之業雖因聖之迹各異而靖民之道同歸以之播鐘球文羽籥用諸郊廟告於神明曰大且安誠得其正嘉祐四年九月御製祫享樂舞名僖祖奏大基順祖奏大祚翼祖奏大熙宣祖奏大光太祖奏大統太宗奏大昌真宗奏大治孝恵皇后奏淑安孝章皇后奏靜安淑徳皇后奏柔安章懷皇后奏和安迎神送神奏和安皇帝升降奏肅安奠瓚奏顧安奉爼徹豆奏充安飲福奏僖安亞獻終獻奏祐安退文舞迎武舞奏顯安皇帝歸大次奏定安登樓禮成奏聖安駕回奏采茨文舞曰化成治定武舞曰崇功昭徳帝自製迎神送神樂章詔宰臣富弼等撰大祚至采茨曲詞十八七年八月御製明堂迎神樂章皆肄於太常英宗治平元年六月太常寺奏仁宗配享明堂奠幣歌誠安酌獻歌徳安神宗元豐三年楊傑上十二均圖帝取所上圖考其説乃下范鎮劉几叅定而王朴阮逸之黄鍾乃當李照之太蔟其編鐘編磬雖有黄鍾大吕而全闕四清聲非古制也朴之太蔟夾鍾則聲失之髙歌者莫能追逐平時設而不用聖人作樂以紀中和之聲所以導中和之氣清不可太髙重不可太下必使八音協諧歌者從容而能永其言鎮等因請擇李照編鐘編磬十二叅於律者增以王朴無射應鍾及黄鍾大吕清聲以為黄鍾大吕太蔟夾鍾之四清聲俾衆樂隨之歌工詠之中和之聲庻可以考請下朴二律就太常鐘磬擇其可用者用之其不可修者别製之而太常以為太樂法度舊器乞留朴鐘磬别製新樂以驗議者之術詔以朴樂鐘為清聲毋得銷毁六年春正月御大慶殿初用新樂二月太常言郊廟樂虡若遇雨雪望祭即設於殿上三月禮部言有司攝事昊天舞名請初獻曰帝臨嘉至亞終獻曰神娭鍚羡太廟初獻曰孝熙昭徳亞終獻曰禮洽儲祥詔可九月禮部言周禮凡大祭祀王出入奏王夏明入廟門已用樂矣今既移祼在作樂之前皇帝詣罍洗奏乾安則入門亦當奏乾安庶合古制其入景靈宫及南郊壝門乞如之哲宗元祐三年范鎮樂成樂下太常楊傑著元祐樂議破鎮説曰鎮謂清聲不見於經惟小胥注云鐘磬者編次之十六枚而在一虡謂之堵至唐又有十二清聲其聲愈髙尤為非是國朝舊有四清聲置而弗用至劉几用之與鄭衛無異按編鐘編磬十六其來逺矣豈徒見於周禮小胥之注哉漢成帝時犍為郡於水濵得古磬十六枚帝因陳禮樂雅頌之聲以風化天下其事載於禮樂志不為不詳豈因劉几然後用哉且漢承秦秦未嘗制作禮樂其稱古磬十六者乃二帝三王之遺法也其王朴樂内編鐘編磬以其聲律太髙歌者難逐故四清聲置而弗用及神宗廟下三律則四清聲皆用而諧協矣周禮曰鳬氏為鐘薄厚之所震動清濁之所由出則清聲豈不見於經哉今鎮簫笛塤箎巢笙和笙獻於朝廷簫必十六管是四清聲在於其間矣自古無十二管之簫豈簫韶九成之樂已有鄭衛之聲乎禮部太常亦言鎮樂法自係一家之學難以叅用而樂如舊制徽宗崇寧三年秋七月景鐘成景鐘者黄鍾之所自出也垂則為鐘仰則為鼎鼎之大終於九斛中聲所極製煉玉屑入於銅齊精純之至音諧清越其髙九尺拱以九龍惟天子親郊乃用之立於宫架之中以為君圍於是命翰林學士承㫖張康國為之銘四年七月鑄帝鼐八鼎成八月大司樂劉昺言大朝㑹宫架舊用十二熊羆案金錞簫鼓觱篥等與大樂合奏今所造大樂逺稽古制不應雜以鄭衛詔罷之又依昺改定二舞各九成每三成為一變執籥秉翟揚戈持盾威儀之節以象治功庚寅樂成列於崇政殿有㫖先奏舊樂三闋曲未終帝曰舊樂如泣聲揮止之既奏新樂天顔和豫百寮稱頌九月朔以鼎樂成帝御大慶殿受賀是日初用新樂太尉率百寮奉觴稱壽有數鶴從東北來飛度黄庭回翔鳴唳乃下詔曰禮樂之興百年於此然去聖愈逺遺風弗存迺者得隱逸之士於草茅之賤獲英莖之器於受命之邦適時之宜以身為度鑄鼎以起律因律以制器按協於庭八音克諧昔堯有大章舜有大韶三代之王亦各異名今追千載而成一代之制宜賜新樂之名曰大晟朕將薦郊廟享鬼神和萬邦與天下共之其舊樂勿用先是端州上古銅器有樂鐘驗其欵識乃宋成公時帝以端王繼大統故詔言受命之邦而隱逸之士謂魏漢津也朝廷舊以禮樂掌於太常至是專置大晟府大司樂一員典樂二員並為長貳大樂令一員協律郎四員又有製撰官為制甚備於是禮樂始分為二時蔡攸提舉大晟府不喜佗人預樂有士人田為者善琵琶無行攸乃奏為大晟府典樂遂不用中聲八寸七分琯而但用九寸琯又為一律長尺有八寸曰太聲一律長四寸有半曰少聲是為三黄鍾律矣律與容盛又不翅數倍黄鍾既四寸有半則圜鍾幾不及二寸諸品大小皆隨律盖但以器大者為太小者為少樂成始試之於政事堂執政心知其非然不敢言因用之於明堂布政望鶴愈不至攸弟絛曰宴樂本雜用唐聲調樂器多夷部亦唐律徴角二調其均自隋唐間已亡政和初命大晟府改用大晟律其聲下唐樂已兩律然劉昺止用所謂中聲八寸七分琯為之又作匏笙塤箎皆入夷部至於徴招角招終不得其本均大率皆假之以見徴音以其曲譜頗和美故一時盛行於天下然教坊樂工嫉之如讐其後蔡攸復與教坊用事樂工附會又上唐譜徴角二聲遂再命教坊制曲譜既成亦不見克行而止然政和徴招角招遂𫝊於世矣二年八月罷大晟府製造所并協律官四年十月洪州奏豐城縣民鋤地得古鐘大小九具狀制奇異各有篆文驗之考工記其制正與古合令樂工擊之其聲中律之無射繪圖以聞七年十二月詔革弊事廢諸局於是大晟府及教樂所教坊額外人並罷靖康二年汴京失守凡大樂軒架樂舞圖舜文二琴教坊樂器樂書樂章明堂布政閏月體式景陽鐘并虡九鼎皆亡矣髙宗紹興元年始饗明堂時初駐會稽而渡江舊樂復皆燬散太常卿蘇遲等言國朝大禮作樂依儀合於壇殿上設登歌壇殿下設宫架今親祠登歌樂器尚闕宣和添用籥色未及頒降州郡無從可以創製宜權用望祭禮例止設登歌用樂工四十有七人乃訪舊工以備其事四年再饗國子丞王普言按書舜典命䕫曰詩言志歌永言聲依永律和聲盖古者既作詩從而歌之然後以聲律協和而成曲自歴代至於本朝雅樂皆先製樂章而後成譜崇寧以後乃先製譜後命詞律不相諧協且與俗樂無異乞復用古製又按周禮奏黄鍾歌大吕以祀天神黄鍾堂下之樂大吕堂上之樂也郊祀之禮皇帝版位在午階下故還位之樂當奏黄鍾明堂版位在阼階上則還位當歌大吕今明堂禮不下堂而襲郊祀還位例並奏黄鍾之樂於義未當尋皆如普議又禮部侍郎施坰奏禮經蕃樂出於荒政盖一時以示貶抑昨内外暫止用樂今徽考大事既畢慈寧又已就養其時節上壽理宜舉樂一如舊制禮部尋言太母還宫國家大慶四方來賀自冬至及元正舉行朝賀之禮依前朝故事今設大仗及用樂舞等庶幾明天子之尊舊典不至廢墜有詔俟來年舉行孝宗淳熙六年始舉明堂禋禮命五使按雅樂并嚴更警場於貢院奉詔將樂器依堂上堂下儀制排設五使及應赴官僚從旁立觀按閲仍聴往來察視時大禮使趙雄言前例閲樂至皇帝詣飲福位一曲即五使以下皆立而每閲奠玉帛及酌獻等樂皆坐自如於禮未盡不當襲用前例故有是詔既而禮官討論自紹興以來凡五饗明堂禮畢還輦並未經用樂即無作樂節次可考乃參酌禮例成禮稱賀並用皇祐大饗典故施行其南郊明堂儀注實述紹興成憲又命有司兼酌元豐大觀舊典為後世法程其用樂作止之節粲然可觀前三日太常設登歌樂於壇上稍南北向設宫架於壇内南壝之外立舞表於酇綴之間明堂登歌設於堂上前兩楹間宫架設於庭中前一日設協律郎位二押樂官一太常丞於登歌樂虡北太常卿於宫架北省牲之夕押樂太常卿及丞入行樂架協律郎展視樂器祀之日樂正帥工人二舞以次入皇帝乗輿自青城齋殿出樂正撞景鐘降輿入大次景鐘止明堂不用景鐘服大裘衮冕自正門入協律郎跪俯伏舉麾興工鼓柷宫架乾安之樂作凡升降行止皆奏之明堂奏儀安至午階版位西向立協律郎偃麾戛敔樂止明堂至阼階下樂止禮儀使奏請行事宫架作景安之樂明堂作誠安文舞進左丞相等升詣神位前樂作六成止皇帝執大圭再拜内侍進御􅓢帨宫架樂作帨手畢樂止禮儀使前導升壇宫架樂作至壇下樂止升自午階明堂並升自阼階登歌樂作至壇上樂止登歌嘉安之樂作明堂至堂上作鎮安奠鎮圭奠玉幣於上帝樂止詣皇地祇太祖太宗神位前如上儀禮儀使導還本位登歌樂作降階樂止明堂降自阼階宫架樂作至版位樂止奉爼官入正門宫架豐安之樂作明堂作禧安跪奠爼訖樂止内侍以御􅓢帨進宫架樂作帨手拭爵樂止禮儀使導升壇宫架樂作至午階樂止升自午階登歌樂作至壇上樂止明堂無升壇登歌禧安之樂作明堂作慶安詣神位前三祭酒少立樂止讀冊皇帝再拜每詣神位並如之禮儀使導還版位登歌樂作降階樂止宫架樂作至版位樂止奏請還小次宫架樂作入小次樂止武舞進宫架正安之樂作明堂作穆安舞者立定樂止亞獻升詣酌尊所西向立宫架正安之樂作明堂皇太子為亞獻作穆安三祭酒以次酌獻如上儀樂止終獻亦如之奏請詣飲福位宫架樂作至午階樂止升自午階登歌樂作將至位樂止登歌禧安之樂作明堂作胙安飲福禮畢樂止禮儀使導還版位登歌樂作降階樂止宫架樂作至版位樂止明堂不降階徹豆登歌熙安之樂作明堂作歆安送神宫架景安之樂作一成止明堂作誠安詣望燎望瘞位宫架樂作至位樂止明堂有燎無瘞燎瘞畢還大次宫架乾安之樂作明堂作慰安至大次樂止皇帝乗大輦出大次樂正撞景鐘鼓吹振作降輦還齋殿景鐘止百官宗室班賀於端誠殿奏請聖駕進發軍樂導引至麗正門大樂正令奏采茨之樂入門樂止明堂就賀於紫宸殿不奏采茨光宗受禪崇上壽皇聖帝壽成皇后暨壽聖皇太后尊號壽皇樂用乾安壽聖壽成樂用坤安三殿慶禮在當時侈為盛儀㝷以禮部太常寺言國朝嵗饗上帝太祖肇造王業則配冬饗於圜丘太宗混一區宇則春祈榖夏大雩秋明堂俱配焉髙宗身濟大業功徳茂盛所宜奉侑仰繼祖宗以協先儒嚴祖之義以彰文祖配天之烈乃季秋升侑於明堂奠幣用宗安之樂酌獻用徳安之樂並登歌作大吕宫及加上髙宗徽號奉冊寳以告用顯安之樂寧宗即位孝宗升祔祧僖祖立别廟禮官言僖祖既倣唐興聖立為别廟遇祫則即廟以饗孟冬祫饗日合先詣禧祖廟室行禮其樂舞欲依每嵗别廟五享設樂禮例於僖祖添設登歌樂如僖廟行禮就廟殿依次作登歌其宫架樂則於太廟殿上通作從之嘉定十四年詔山東河北連城慕義奉玉寳來獻其文曰皇帝恭膺天命之寳實惟我祖宗之舊及明年元日上御大慶殿受寳用鼓吹導引備陳宫架大樂奏詩三章一曰恭膺天命二曰舊疆來歸三曰永清四海並奏以太蔟宫理宗享國四十餘年凡禮樂之事式遵舊章未嘗有所改作先是孝宗廟用大倫之樂光宗廟用大和之樂至是寧宗祔廟用大安之樂欽定續通典卷八十五
