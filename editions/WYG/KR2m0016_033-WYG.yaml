body:
  text: 職官武官下大将軍并官屬唐制十六衛皆有大将軍互見十六衛其左右衛左右驍衛左右武衛左右威衛左右領軍衛左右金吾衛左右監門衛左右千牛衛左右羽林軍各大将軍皆正三品左右龍武軍左右神武軍左右神䇿軍各大将軍皆正二品已非漢魏晉宋北齊時之崇秩矣其驃騎輔國鎮軍冠軍懷化歸徳六大将軍為武臣散階無所職掌宋左右金吾衛左右衛左右驍衛左右武衛左右屯衛左右衛官軍衛左右監門衛左右千牛衛各有大将軍互見十六衛在上将軍之下為環衛官無定員皆空官無實故南渡初多不除授孝宗復置十六衛設大将軍等官具左右衛篇其驃騎等五大将軍具總敘篇皆為武臣散階遼北面官将軍本非要職建置較前代獨多唯大将軍府統所治軍之政有大将軍以領之其五押招討司亦有大将軍視各詳衮司之将軍為較重焉南面官各衛俱有大将軍互見十六衛在上将軍之上金殿前侍御衛大将軍僅為儀衛扈從之官其昭武等六大将軍具總叙篇亦為武臣散階并非武階之崇職章宗泰和六年置平南冠軍大将軍暫設即罷元監門及左右衛金吾三大将軍亦係儀衛扈從官其昭武等六大将軍階秩與金同明初命徐達為大将軍授節鉞訖出勒所部建牙鳴鼓角正行列擎節鉞鼓吹前𨗳百官以次送其時大将軍任重職專儀亦極盛他如常遇春等不過稱副将軍焉時徐達為大将軍遣人自軍中請事上勞之曰将軍忠義出於天性雖古豪傑之士不能過今所請事悉欲禀命而行此賢臣事君之道所請事多可行者将軍從宜行之後成國公朱能征安南亦為大将軍凡有大征討率以五府中軍左軍右軍前軍後軍為五府毎府冇左右都督都督同知都督僉事都督及公侯伯充大将軍盖隋以前之大将軍其位或在三司上或次三司下或與大司馬同秩兼理政事故置掾屬唐以後或為環衛官或為武臣散階之官或為儀衛扈從之官不開府無掾屬明徐達雖特拜大将軍禮數雖異然亦統軍馬專征討而已亦不設掾屬車騎将軍車騎将軍唐已無之宋遼金元明皆無前後左右將軍前後左右将軍唐已無之宋遼金元皆無明總兵掛印稱将軍者明制總兵官副總兵參将遊擊将軍守備把總無品級無定員總鎮一方者為鎮守獨鎮一路者為分守各守一城一堡者為守備與主将同守一城者為協守又有提督提調巡視備禦領班備倭等名凡總兵副總兵率以公侯伯都督充之大同曰征西前将軍遼東曰征東前将軍皆外鎮之銜名亦非唐以前之前後左右将軍也四征将軍四征将軍征東征西征南征北號為四征唐已無之宋遼金元皆無之明總兵掛印稱将軍者雲南曰征南将軍太祖洪武中命潁川侯博友徳為征南将軍率三十萬衆征雲南遂城烏撒得七星闗以通畢節又克可渡河於是東川烏䝉芒部諸蠻望風降附又廖永忠充征南将軍率舟師取兩廣永忠自福州遣人諭何真真以廣循恵降破邵宗愚山寨獲宗愚等諸郡相繼降檄諭九真日南朱崖儋耳三十餘城皆納印請吏又顧寰為征南将軍鎮貴州征五開六洞一百三十七寨悉平又沐璘為征南將軍由副指揮陞右都督充總兵官掛將軍印繼沐琮鎮守雲南大同曰征西前将軍寧夏曰征西将軍陳懋佩征西将軍印為總兵鎮守寜夏賜寳鏹白粲牛羊以為戒嚴之費懋至鎮號令一新凡降附者撫綏之務得其歡心又周尚文拜征西将軍鎮守寜夏歴鎮山西延綏俱有戰功鎮大同條上禦敵四十餘事修補牆堡七百里墾田五萬四鎮将軍四鎮将軍鎮東鎮西鎮南鎮北謂之四鎮唐時已無宋遼金元皆無之明掛印總兵官稱将軍者宣府曰鎮朔将軍延綏曰鎮西将軍其稱鎮守而不加将軍銜者鎮守薊州總兵官一人穆宗隆慶二年改為總理練兵事務兼鎮守駐三屯管協守副總兵三人鎮守遼東總兵官一人舊設駐廣寜隆慶元年令冬月移駐河東遼陽適中之地調度防禦應援海州瀋陽協守副總兵一人鎮守保定總兵官一人孝宗𢎞治十八年初設保定副總兵後改為參将武宗正徳九年復為分守副總兵世宗嘉靖二十年改為鎮守三十年改設鎮守總兵官神宗萬厯元年令春秋兩防移駐浮圖峪遇有警移駐紫荆闗以備入援鎮守宣府總兵官一人協守副總兵一人鎮守大同總兵官一人協守副總兵一人鎮守山西總兵官一人嘉靖二十年改設駐寧武闗防秋移駐陽方口防冬移駐偏闗協守副總兵一人鎮守延綏總兵官一人協守副總兵一人鎮守寜夏總兵官一人協守副總兵一人鎮守甘肅總兵官一人協守副總兵一人分守副總兵一人鎮守陜西總兵官一人舊駐㑹城後移駐固原分守副總兵一人鎮守四川總兵官一人隆慶五年添設駐建武所分守副總兵一人鎮守雲南總兵官一人鎮守貴州總兵官一人嘉靖三十二年加提督麻陽等處地方職銜駐銅仁府鎮守湖廣總兵官一人鎮守廣西總兵官一人鎮守廣東總兵官一人舊為征蠻将軍兩廣總兵官嘉靖四十五年分設駐潮州府協守副總兵一人提督狼山副總兵一人鎮守浙江總兵官一人鎮守福建總兵官一人鎮守山東總兵官一人其同為鎮守總兵而不稱将軍者皆非掛印也四安将軍四安將軍安東安西安南安北謂之四安唐時已無宋遼金元明皆無四平将軍四平将軍平東平西平南平北謂之四平唐宋遼皆無金泰和六年伐宋權設平南撫軍上将軍平南冠軍大将軍平南龍驤将軍平南虎威将軍平南盪江将軍軍還即罷元不設明總兵掛印稱将軍者湖廣曰平蠻将軍甘肅曰平羌将軍雜號将軍五押招討遼西南面有五押招討大将軍冠軍龍驤虎威盪江皆金泰和六年所設領軍夾輅殿前殿外皆元時設為儀衛扈從官佐擊遊擊皆明設佐擊唯京營有之遊擊各總兵下皆有大漢扈從之官屬錦衣衛平邊王越為平邊将軍監軍軍師祭酒理曹掾屬附唐開元後監軍之職多以中官為之宋不設遼北面官北院都統軍司有北院統軍都監北院詳衮司有北院都監南院亦如之近侍詳衮司有近侍都監四帳都詳衮司掌四帳軍馬之事有都監其部族節度使司下有某部族都監北面軍官大詳衮司有都監諸部署有兵馬都監諸指揮使有某軍都監北面行軍官行軍都統所有監軍有行軍諸部都監有監戰南面官諸指揮使司下有某軍都監金太宗天㑹二年置都元帥府有元帥左監軍一人元帥右監軍一人左都監一人右都監一人元不設明以監察御史為監軍亦以宦官為監軍不常設無定員軍師祭酒理曹掾屬唐時無宋遼金元明皆無三署郎官叙三署郎官漢時所置唐之各左右翊中郎府悉屬各衛遇将軍缺則以中郎将代其職掌亦為上将軍大将軍将軍之貳大率皆供奉儀衛宿直巡警之事宋各衛中郎将郎将皆為環衛其皇城司亦以副使為中郎将使臣為左右郎将較環衛又稍有職掌若金之殄㓂中郎将殄㓂郎将専掌兵戎之官暫為武臣之階軍罷即廢更非常職自唐以後皆為武官要非前代之三署郎官員額多而率遷他職者可比也中郎将五官中郎将左右中郎将中郎將至唐時皆屬十六衛中無五官中郎将及特設左右中郎将其親衛五府中郎将已附左右衛篇中其左右驍衛左右翊中郎将府中郎将各一人左郎将一人右郎将一人左右武衛左中翊中郎将府中郎将各一人左郎将一人右郎将一人左右威衛左右翊中郎将府中郎将各一人左郎将一人右郎将一人左右領軍衛左右翊中郎将府中郎将各一人左郎将一人右郎将一人左右金吾衛左右翊中郎将府中郎将各一人左郎将一人右郎将一人其中郎将掌領府屬督京城左右六街舖巡警以果毅二人助巡探入閤日中郎将一人升殿受狀衛士六百為大角手六畨閲習吹大角為昏明之節諸營壘候以進退左右監門衛左右翊中郎将府中郎将掌涖宫殿城門皆左入右出中郎将各四人左右千牛衛中郎将府中郎将掌供奉侍衛凡千牛及備身左右以御刀仗升殿供奉者皆上将軍領之中郎将佐其職有口敕通事舍人承傳聲不下聞者中郎将宣告左右羽林軍左右翊中郎将府中郎将一人左右中郎将一人左右郎将一人宋環衛官左右金吾衛有中郎将郎将左右衛有中郎将郎将左右千牛衛有中郎将郎将徽宗政和五年詔皇城司所掌詳載左右金吾衛可剏置親從第五指揮以七百人為額使為将軍副使為中郎将使臣以下為左右郎将金元中郎将郎将為儀衛扈從之官遼明不設虎賁中郎将虎賁中郎将唐時已無宋遼金元明皆無四中郎将四中郎将漢時東西南北各置中郎将唐時已無宋遼金元明皆無雜中郎将唐宋遼皆無金泰和六年伐宋置殄㓂中郎将殄㓂郎将又有内供奉郎将儀衛扈從之官元明皆無折衝府果毅别将等附唐制諸衛折衝都尉府毎府折衝都尉一人左右果毅都尉各一人折衝都尉掌領屬備宿衛師役則總戎具資粮左右果毅都尉掌貳都尉宋不設遼各衛皆有折衝都尉果毅都尉金泰和六年伐宋置殄㓂折衝都尉殄冦果毅都尉又有折衝果毅都尉内果毅都尉折衝都尉皆為儀衛扈從之官元折衝都尉果毅都尉金吾折衝金吾果毅亦皆儀衛扈從之官明不設三都尉奉軍駙馬騎奉朝請附唐制奉車都尉掌馭副車有其名而無其人大陳設則他官攝駙馬都尉無定員皆尚主者為之秩與奉車都尉同五品上騎都尉騎都尉皆為勲官宋無奉車都尉有駙馬都尉其上騎都尉騎都尉為勲官駙馬都尉班在上騎都尉之下與騎都尉同其朝請大夫朝請郎為文散官遼北面官有駙馬都尉府駙馬都尉掌公主帳宅之事無奉車都尉騎都尉金駙馬都尉秩正四品其上騎都尉騎都尉亦為勲官無奉車都尉元尚主者皆稱駙馬都尉封王爵其上騎都尉騎都尉亦為勲官無奉車都尉明亦無奉車都尉其駙馬都尉位在伯上凡尚大長公主長公主公主並曰駙馬都尉惠成之間駙馬都尉有典兵出鎮及掌府部事者惠帝建文時梅殷為鎮守淮安總兵官李坚為左副将軍成祖永樂時李讓掌北京行部事以後沐昕宋琥並守備南京趙輝掌南京左府事其餘唯奉祀孝陵攝行廟祭署宗人府事往往一充其上騎都尉騎都尉並為武臣之勲官凡功臣及外戚之封公侯伯者有流有世其才而賢者充官營總督五軍都督府掌僉書南京守備或出充鎮守總兵官否則食禄奉朝請而已欽定續通典卷三十三
