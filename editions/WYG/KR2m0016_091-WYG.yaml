body:
  text: 樂大祠與忌日同者不去樂議宋宋仁宗嘉祐七年秘閣校理裴煜奏大祠與國忌同者有司援舊制樂備而不作忌日必哀志有所至其不用樂宜也然樂所以降格神祗非以適一己之私也謹按開元中禮部建言忌日享廟應用樂裴寛立議廟尊忌卑則作樂廟卑忌尊則備而不奏中書令張説以寛議為是宗廟如此則天地日月山川社稷之祠用樂明矣臣以為凡大祀天地日月社稷與忌日同者伏請用樂其在廟則如寛之議所冀略輕存重不失其稱下其章禮官議曰傳稱祭天以禋為歆神之始以血為陳饌之始祭地以埋為歆神之始以血為陳饌之始宗廟以灌為歆神之始以腥為陳饌之始然則天地宗廟皆以樂為致神之始故曰大祭有三始謂此也天地之間虗豁而不見其形者陽也鬼神居天地之間不可以人道接也聲屬于陽故樂之音聲號呼召于天地之間庶幾神明聞之因而來格故祭必求諸陽商人之祭先奏樂以求神先求于陽也次灌地求神于陰達于淵泉也周人尚臭四時之祭先灌地以求神先求諸陰也然則天神地祗人鬼之祀不可去樂明矣今七廟連室難分廟忌之尊卑欲依唐制及國朝故事廟祭與忌同日並懸而不作其與别廟諸后忌同者作之若祠天地日月九宫太一及蜡百神並請作樂社稷以下諸祠既卑于廟則樂可不作翰林學士王珪等以為社稷國之所尊其祠日若與别廟諸后忌同者伏請亦不去樂詔可古樂淡且和議宋周子通書曰古者聖王制禮法修教化三綱正九疇叙百姓太和萬物咸若乃作樂以宣八風之氣以平天下之情故樂聲淡而不傷和而不淫入其耳感其心莫不淡且和焉淡則欲心平和則躁心釋優柔平中徳之盛也天下化中治之至也是謂道配天地古之極也後世禮法不修政刑苛紊縱欲敗度下民困苦謂古樂不足聴也代變新聲妖淫愁怨導欲増悲不能自止故有賊君棄父輕生敗倫不可禁者矣嗚呼樂者古以平心今以助欲古以宣化今以長怨不復古禮不變今樂而欲至治者逺矣律尺議宋司馬光與范景仁論樂書曰䝉示房生尺法云生嘗得古本漢書云度起于黄鍾之長以子穀秬黍中者一黍之起積一千二百黍之廣度之九十分黄鍾之長一為一分今文誤脱之起積一千二百黍八字故自前世以來累黍為尺縱置之則太長横置之則太短今新尺横置之則不容容一千二百黍則大其空徑四釐六毫是以樂聲太高又嘗得開元中笛及方響校太常樂下五律教坊樂下三律皆由儒者誤以一黍為一分其法非是不若以一千二百黍實管中隨其短長斷之以為黄鍾九寸之管九十分其長一為一分取三分以度空徑數合則律正矣景仁比來盛稱此論以為先儒用意皆不能到可正積古之謬袪一世之惑光竊思之有所未諭者凡數條敢書布陳幸景仁教之景仁曰房生家有漢書異于今本夫累黍求尺其來久矣生所得書不知傳于何世而相承積謬由古至今更大儒甚衆曽不寤也又其書既云積一千二百黍之廣何必更云一黍之起此四字者將安施設劉子駿班孟堅之書不宜如此冗長也且生欲以黍實中乃求其長何得謂之積一千二百黍之廣孔子稱必也正名乎必若所云則為新尺一丈二尺得無求合其術而更戾乎景仁曰度量權衡皆生于律者也今先累黍為尺而後制律返生于度與黍無乃非古人之意乎光謂不然夫所謂律者果何如哉向使古之律存則龡其聲而知聲度其長而知度審其容而知量校其輕重而知權衡今古律已亡矣非黍無以見度非度無以見律律不生于度與黍將何從生耶夫度量衡所以佐律而存法也古人所謂制四器者以相參校以為三者雖亡茍其一存則三者從可推也又謂後世器或壊亡故載之于書形之于物夫黍者自然之物有常不變者也故于此寓法焉今四器皆亡不取于黍將安取之凡物度其長短則謂之度量其多少則謂之量稱其輕重則謂之權衡然量有虛實衡有低昂皆易差而難精等之不若因度求律之為審也房生今欲先取容一龠者為黄鍾之律是則生于量也量與度皆非律也舍彼用此將何擇焉景仁曰古律法空徑三分圍九分今新律空徑三分四釐六毫此四釐六毫者何從出耶光謂不然夫徑三分圍九分者數家言其大要耳若以密率言之徑七分者圍二十二分也古之為數者患其空積微之太煩則上下率之所為三分者舉成數而言耳四釐六毫不及半分故棄之也又律管至小而黍粒體圓其中豈無負載庣空之處而必責其絲忽不差耶景仁曰生以一千二百黍積實于管中以為九寸取其三分以為空徑此自然之符也光按量法方尺之量所受一斛此用累積黍之法校之則合矣若從生言度法變矣而量法自如則一斛之物豈能滿方尺之量乎景仁曰量權衡皆以千二百黍為法何得度法獨一黍光按黄鍾所生凡有五法一曰備數二曰和聲三曰審度四曰嘉量五曰權衡量與權衡据其容與其重非千二百黍不可至于度法止于一黍為分無用其餘若數與聲則無所事黍矣安在其必以一千二百為之定率也景仁曰生云今樂太高太常黄鍾適當古之仲吕不知生所謂仲吕者果后䕫之仲吕耶開元之仲吕耶若開元之仲吕則安知今之太高非昔之太下耶笛與方響里巷之樂庸工所為豈能盡得律吕之正乃欲取以為法考定雅樂不亦難乎此皆光之所大惑君子之論無固無我惟是之從景仁茍有以解之使瑩然明白則敢不斂衽服義豈欲徒為此諓諓也范鎮答司馬君實論樂書曰昨日辱書以為鎮不當為議狀是房庶尺律法始得書􅌶然而懼曰鎮違羣公之議而下與匹士合不適中宜獲戾于朋友也既讀書乃釋然而喜曰得君實之書然後决知庶之法是而鎮之議為不謬庶之法與鎮之議于今之世用與不用未可知也然得附君實之書𫝊于後世之人質之故終之以喜也君實之疑凡五而條目又十數安敢不盡言解之君實曰漢書傳于世久矣更大儒甚衆庶之家安得善本而有之是必謬為脱文以欺于鎮也是大不然鎮豈可欺哉亦以義理而求之也春秋夏五之闕文禮記玉藻之脱簡後人豈知其闕文與脱簡哉亦以義理而知之也猶鎮之知庶也豈可逆謂其欺而置其義理哉又云一黍之起于劉子駿班孟堅之書為冗長者夫古者有律矣未知其長幾何未知其空徑幾何未知其容受幾何豈可直以千二百黍置其間哉宜起一黍積而至一千二百然後滿故曰一黍之起積一千二百黍之廣其法與文勢皆當然也豈得為冗長乎若如君實之説以尺生律漢書不當先言本起黄鍾之長而後論用黍之法也若爾子駿孟堅之書不為冗長而反為顛倒也又云積一千二百黍之廣是為新尺一丈二尺者君實之意以積為排積之積廣為一黍之廣而然耶夫積者謂積于管中也廣者謂所容之廣也詩云乃積乃倉孟康云空徑之廣是也又云孔子曰必也正名乎者此孔子教子路以正衛之父子君臣之名分豈積與廣之謂也又云古人制律與尺量權衡四器者以相參校以為三者茍亡得其一存則三者從可推也者是已又云黍者自然之物有常而不變者亦是也古人之慮後世其意或當如是然古以律生尺古人之意既知黍之于後世可以為尺豈不知黍之于後世亦可為律而故于其法為相戾乎若如君實之説則是古人知一而不知二也知彼而不知此也又云徑三分圍九分者數家之大要不及半分則棄之也者今三分四釐六毫其圍十分三釐八毫豈得謂不及半分而棄之哉漢書曰律容一龠得八十一寸謂以九分之圍乗九寸之長九九而八十一也今圍分之法既差則新尺與量未必是也如欲知庶之量與尺合姑試騐之乃可又云權衡與量据其容與其重必千二百黍而後可至于尺法止于一黍為分無用其餘若以生于一千二百是生于量也且夫黍之施于權衡則由黄鍾之重施于量則由黄鍾之龠施于尺則由黄鍾之長其實皆一千二百也此皆漢書正文也豈得謂一黍而為尺邪豈得謂尺生于量邪又云庶言太常樂太高黄鍾適當古之仲吕不知仲吕者果后䕫之仲吕耶開元之仲吕耶若開元之仲吕則安知今之太高非昔之太下者此正是不知聲者之論也無復議也又云方響與笛里巷之樂庸工所為不能盡得律吕之正者是徒知古今樂器之名為異而不知其律與聲之同也亦無復議也使得其真黍用庶之法制為律吕無忽微之差乃黄帝之仲吕也豈直后䕫開元之云乎書曰律和聲方舜之時使䕫典樂猶用律而後能和聲今律有四釐六毫之差以為適然而欲以求樂之和以副朝廷制作之意其可得乎其可得乎太史公曰不附青雲之士則不能成名君實欲成其名而知所附矣惟其是而附之則可其不是而附之安可哉諺曰抱橋柱而浴者必不溺君實之議無乃為浴者類乎君實見咨不敢不為此諓諓也徽宗崇寧元年詔宰臣置僚屬講議大政以大樂之制訛謬殘闕太常樂器弊壊琴瑟制度參差不同簫篴之屬樂工自備每大合樂聲韻淆雜而皆失之太高箏筑阮秦晉之樂也乃列于琴瑟之間熊羆按梁隋之制也乃設于宫架之外笙不用匏舞不象成曲不協譜樂工率農夫市賈遇祭祀朝會則追呼于阡陌閭閻之中教習無成瞢不知音議樂之臣以樂經散亡無所據依秦漢之後諸儒自相非議不足取法乃博求知音之士而魏漢津之名達于上焉漢津至是年九十餘矣本剩員兵士自云居西蜀師事唐仙人李良授鼎樂之法皇祐中漢津與房庶以善樂被薦既至黍律已成阮逸始非其説漢津不得伸其所學後逸之樂不用乃退與漢津議指尺作書二篇叙述指法漢津嘗陳于太常樂工憚改作皆不主其説或謂漢津舊嘗執役于范鎮見其制作畧取之蔡京神其説而托于李良二年九月禮部員外郎陳暘上所撰樂書二百卷命禮部尚書何執中㸔詳以謂暘欲考定音律以正中聲願送講議司令知音律者參騐行之暘之論曰漢津論樂用京房二變四清盖五聲十二律樂之正也二變四清樂之蠧也二變以變宫為君四清以黄鍾清為君事以時作固可變也而君不可變太蔟大吕夾鍾或可分也而黄鍾不可分豈古人所謂尊無二上之㫖哉壬辰詔曰朕惟隆禮作樂實治内修外之先務損益述作其敢後乎其令講議司官詳求厯代禮樂沿革酌古今之宜修為典訓以貽永世致安上治民之至徳著移風易俗之美化廼稱朕咨諏之意焉三年正月漢津言曰臣聞黄帝以三寸之器名為咸池其樂曰大卷三三而九乃為黄鍾之律禹效黄帝之法以聲為律以身為度用左手中指三節三寸謂之君指裁為宫聲之管又用第四指三節三寸謂之臣指裁為商聲之管又用第五指三節三寸謂之物指裁為羽聲之管第二指為民為角大指為事為徴民與事君臣治之以物養之故不用為裁管之法得三指合之為九寸即黄鍾之律定矣黄鍾定餘律從而生焉臣今欲請帝中指第四指第五指各三節先鑄九鼎次鑄帝座大鐘次鑄四韻清聲鐘次鑄二十四氣鐘然後均絃裁管為一代之樂制其後十三年帝一日忽夢人言樂成而鳯凰不至乎盖非帝指也帝寤大悔歎謂崇寜初作樂請吾指寸而内侍黄經臣執謂帝指不可示外人但引吾手畧比度之曰此是也盖非人所知今神告朕如此且奈何于是再出中指寸付蔡京密命劉昺試之時昺終匿漢津初説但以其前議為度作一長笛上之帝指寸既長于舊而長笛殆不可易以動人觀聴于是遂止盖京之子絛云朱子曰古樂之亡久矣然秦漢之間去周未逺其器與聲猶有存者故其道雖不行于當世而其為法猶未容有異論也逮于東漢之末以接西晉之初則已寖多説矣厯魏周齊隋唐五季論者愈多而法愈不定爰及我朝功成治定理宜有作建隆皇祐元豐之間盖亦三致意焉而和胡阮李范馬劉楊諸賢之議終不能以相一也而況于崇宣之際姦䛕之㑹黥湼之餘而能有以語失天地之和哉丁未南狩今六十年神人之憤猶有未攄是固不遑于稽古禮文之事然學士大夫因仍簡陋遂無復以鍾律為意者則已甚矣吾友建陽蔡君元定季通當此之時乃獨心好其説而力求之旁搜逺取巨細不捐積之累年乃若冥契著書兩卷凡若干言予嘗得而讀之愛其明白而淵深縝密而通暢不為牽合傅㑹之談而横斜曲直如珠之不出于盤其言雖多出于近世之所未講而實無一字不本于古人已試之成法盖若黄鍾圍徑之數則漢斛之積分可考寸以九分為法則淮南太史小司馬之説可推五聲二變之數變律半聲之例則杜氏之通典具焉變宫變徴之不得為調則孔氏之禮疏因亦可見至于先求聲氣之元而因律以生尺則尤所謂卓然者而亦班班雜見于兩漢之志蔡邕之説與夫國朝㑹要以及程子張子之言顧讀者不深考其間雖或有得于此者而又不能無失于彼是以晦蝕紛挐無復定論大抵不拘攣于熟習見聞之近即肆其胸臆妄為穿穴而無所据依季通乃能奮其獨見超然逺覽爬梳剔抉參互考尋用其平生之力以至于一旦豁然而融㑹貫通焉斯亦可謂勤矣及其著論則又能推原本根比次條理撮取機要闡究精微不為浮詞濫説以汨亂于其間亦庶幾乎得書之體者予謂國家行且平定中原以開中天之運必將審音協律以諧神人當此之時受詔典領之臣能得此書而奏之則東京郊廟之樂將不待公孫述之瞽師而後備而參摹四分之書亦無待乎後世之子雲而後知好之矣抑季通之為此書詞約理明初非難讀而讀之者往往未及終篇輙已欠伸思睡固無由了其歸趣獨以予之頑鈍不敏乃能熟復數過而僅得指意之彷彿季通以是亦許予為能知己志者故屬予以序引而予不得辭焉季通更欲均調節族被之管絃别為樂書以究其業而又以其餘力發揮武侯六十四陣之圖緒正邵氏皇極經世之厯以大備乎一家之言其用意亦健矣予雖老病倘及見之則亦豈非千古之一快也哉元豐朝㑹樂十議宋神宗元豐二年詳定所以朝會樂而有請者十其一唐元正冬至大朝㑹迎送王公用舒和開元禮以初入門舒和之樂作至位樂止盖作樂所以待王公今中書門下親王使相先于丹墀上東西立皇帝升御座乃奏樂引三品以上官未為得禮請侍從及應赴官先就立位中書門下親王使相諸司三品尚書省四品及宗室將軍以上班分東西入正安之樂作至位樂止其二今朝㑹議舉第一爵宫懸奏和安之曲第二第三第四登歌作慶雲嘉禾靈芝之曲則是合樂在前登歌在後有違古義請第一爵登歌奏和安之曲堂上之樂隨歌而發第二爵笙入奏慶雲之曲止吹笙餘樂不作第三爵堂上歌嘉禾之曲堂下笙吹瑞木成文之曲一歌一吹相間第四爵合樂奏靈芝之曲堂上下之樂交作其三定文舞武舞各為四表表距四步為酇綴各六十四舞者服進賢冠左執籥右秉翟分八佾二工執纛引前衣冠同之舞者進蹈安徐進一步則兩兩相顧揖三步三揖四步為三辭之容是為一成餘成如之自南第一表至第二表為第一成至第三表為再成至北第一表為三成覆身却行至第三表為四成至第二表為五成復至南第一表為六成而武舞入今文舞所秉翟羽則集雉尾置于髹漆之柄求之古制實無所本聶崇義圖羽舞所執類羽葆幢析羽四重以結綬系于柄此纛翳之謂也請按圖以翟羽為之其四武舞服平巾幘左執干右執戈二工執旌居前執鼗執鐸各二工金錞二四工舉二工執鐲執鐃執相在左執雅在右亦各二工夾引舞者衣冠同之分八佾于南表前先振鐸以通鼓乃撃鼓以警戒舞工聞鼓聲則各依酇綴總干正立定位堂上長歌以咏歎之于是播鼗以導舞舞者進步自南而北至最南表以見舞漸然後左右夾振鐸次擊鼓以金錞和之以金鐲節之以相而輔樂以雅而陔步舞者發揚蹈厲為猛賁趫速之狀每步一進則兩兩以戈盾相向一擊一刺為一伐四伐為一成成謂之變至第二表為一變至第三表為二變至北第一表為三變舞者覆身嚮空却行而南至第三表為四變乃擊刺而前至第二表回易行列舂雅節步分左右而跪以右膝至地左足仰起象以文止武為五變舞蹈而進為兵還振旅之狀振鐸摇鼗擊鼓和以金錞廢鐲鳴鐃復至南第一表為六變而舞畢古者人君自舞大武故服冕執干戚若用八佾而為擊刺之容則舞者執干戈説者謂武舞戰象樂六奏每一奏之中率以戈矛四擊刺戈則擊兵矛則刺兵玉戚非可施于擊刺今舞執干戚盖沿襲之誤請左執干右執戈其五古之鄉射禮三笙一和而成聲謂三人吹笙一人吹和今朝㑹作樂丹墀之上巢笙和笙各二人其數相敵非也盖鄉射乃列國大夫士之禮請増倍為八人丹墀東西各三巢一和其六今宫懸四隅雖有建鼓鞞應相傳不擊乾徳中詔四建鼓并左右鞞應合十有二依李照所奏以月建為均與鎛鐘相應鞞應在建鼓旁是亦朔鼙應鼙之類請將作樂之時先擊鼙次擊應然後擊建鼓其七今樂縣四隅設建鼓不擊别施散鼓于樂縣内代之乾徳中尹拙奏宜去散鼓詔可而樂工積習亦不能廢李照議作晉皷以為樂節請樂縣内去散鼓設晉皷以鼓金奏其八古者瞽矇眡瞭皆掌播鼗所以節一唱之終請宫縣設鼗以為樂節其九以天子禮求之凡樂事播鼗擊頌磬笙磬以鐘鼓奏九夏是在廷之樂戛擊則柷敔球則玉磬搏拊所以節樂琴瑟所以詠詩皆堂上樂也磬奏在堂下尊玉磬故進之使在上若擊石拊石則當一庭後世不原于此以春秋鄭人賂晉侯歌鐘二肆遂于堂上設歌鐘歌磬盖歌鐘則堂上歌之堂下以鐘鼓應之耳歌必金奏相和名曰歌鐘則以節歌是已豈堂上有鐘邪歌磬之名本無所出晉賀循奏置登歌簨虡采玉造小磬盖取舜廟鳴球之制後周登歌備録鐘磬隋唐迄今因襲行之皆不應禮請正至朝㑹堂上之樂不設鐘磬其十古者歌工之數大射工六人四瑟則鼓以四人歌以二人天子八人則瑟與歌皆四人矣魏晉以來登歌五人隋唐四人本朝因之是循用周制也禮登歌下管貴人聲也故儀禮瑟與歌工皆席于西階上隋唐相承庭中磬虡之下擊以偶歌琴瑟非所謂升歌貴人聲之義今堂上琴瑟比之周制不啻倍蓰而歌工止四人音高下不相權盖樂有八音所以行八風是以舞佾與鐘磬俱用八為數請罷庭中歌者堂上歌為八琴瑟之數放此其箏阮筑悉廢太常以謂堂上鐘磬去之則歌聲與宫縣逺漢唐以來宫室之制寖廣堂上益逺庭中其上下樂節茍不相應則繁亂而無序況朝㑹之禮起于西漢則後世難以純用三代之制其堂上鐘磬庭中歌工與箏筑之器從舊儀便遂如太常議楊傑大樂七失議宋元豐三年楊傑言大樂七失一曰歌不永言聲不依永律不和聲盖金聲舂容失之則重石聲温潤失之則輕土聲函胡失之則下竹聲清越失之則高絲聲纎微失之則細革聲隆大失之則洪匏聲叢聚失之則長木聲無餘失之則短惟人稟中和之氣而有中和之聲八音律吕皆以人聲為度言雖永不可以逾其聲今歌者或詠一言而濫及數律或章句已闋而樂音未終所謂歌不永言也請節其煩聲以一聲歌一言且詩言人志詠以為歌五聲隨歌是謂依詠律吕協奏是謂和聲先儒以為依人音而制樂託樂器以冩音本效人非人效樂者此也今祭祀樂章並隨月律聲不依詠以詠依聲律不和聲以聲和律非古制也二曰八音不諧鐘磬缺四清聲虞樂九成以簫為主商樂和平以磬為依周樂合奏以金為首鐘磬簫者衆樂之所宗則天子之樂用八鐘磬簫衆樂之本乃倍之為十六且十二者律之本聲而四者應聲也本聲重大為君父應聲輕清為臣子故其四聲曰輕清或曰子聲也李照議樂始不用四清聲是有本而無應八音何從而諧哉今巢笙和笙其管十九以十二管發律吕之本聲以七管為應聲用之已久而聲至和則編鍾磬簫宜用四子聲以諧八音三曰金石奪倫樂奏一聲諸器皆以其聲應既不可以不及又不可以有餘今琴瑟塤箎笛簫笙阮箏筑奏一聲則鎛鍾特磬編鍾磬擊三聲聲煩而掩衆器遂至奪倫則鎛鍾特磬編鍾編磬節奏與衆器同宜勿連擊四曰舞不象成國朝郊廟之樂先奏文舞次奏武舞而武舞容節六變一變象六師初舉二變象上黨克平所向宜北三變象維揚底定所向宜東南四變象荆湖來歸所向宜南五變象卭蜀納款所向宜西六變象兵還振旅所向宜北而南今舞者發揚蹈厲進退俯仰既不足以稱成功盛徳失其所向而文舞容節尤無法度則舞不象成也五曰樂失節奏樂之始則翕然如衆羽之合縱之純如也節奏明白皦如也往來條理繹如也然後成今樂聲不一混淆無馭則失于節奏非所謂成也六曰祭祀饗無分樂之序盖金石衆作之謂奏詠以人聲之謂歌陽律必奏陰吕必歌陰陽之合也順陰陽之合所以交神明致精意今冬至祀天不歌大吕夏至祭地不奏太蔟春饗祖廟不奏無射秋饗后廟不歌小吕而四望山川無專祠用樂之制則何以贊導宣發陰陽之氣而生成萬物哉七曰鄭聲亂雅然朱紫有色而易别雅鄭無象而難知聖人懼其難知也故定律吕中正之音以示萬世今古器尚存律吕悉備而學士大夫不講考擊奏作委之賤工則雅鄭不得不雜願審調鐘管用十二律還宫均法令上下通習則鄭聲莫能亂雅遂為十二均圖併上之用正聲廢中聲議宋徽宗大觀八年八月宣和殿大學士蔡攸言九月二日皇帝躬祀明堂合用大樂按樂書正聲得正氣則用之中聲得中氣則用之自八月二十八日已得秋分中氣大饗之日當用中聲樂今㸔詳古之神瞽考中聲以定律中聲謂黄鍾也黄鍾即中聲非别有一中氣之中聲也考閲前古初無中正兩樂若以一黄鍾為正聲又以一黄鍾為中聲則黄鍾君聲不當有二況帝指起律均法一定大吕居黄鍾之次隂吕也臣聲也今減黄鍾三分則入大吕律矣易其名為黄鍾中聲不唯紛更帝律又以陰吕臣聲僭竊黄鍾之名若依樂書正聲得正氣則用之中聲得中氣則用之是冬至祀天夏至祭地常不用正聲而用中聲也以黄鍾為正聲易大吕為中聲之黄鍾是帝律所起黄鍾常不用而大吕常用也抑陽扶陰退律進吕為害斯大無甚于此今來宗祀明堂縁八月中氣未過而用中聲樂南吕為宫則本律正聲皆不得預欲乞廢中聲之樂一遵帝律止用正聲協和天人刋正訛謬著于樂書詔可攸又乞取已頒中聲樂在天下者太正少三等八條議宋宣和元年四月攸上書奉詔製造太少二音登歌宫架用于明堂漸見就緒乞報大晟府者凡八條一太正少鐘三等舊制編鐘編磬各一十六枚應鍾之外増黄鍾大吕太蔟夾鍾四清聲今既分太少則四清聲不當兼用止以十二律正聲各為一架其二太正少琴三等舊制一三五七九絃凡五等今來討論並依律書所載止用五絃絃大者為宫而居中央君也商張右傍其餘大小相次不失其序以為太正少之制而十二律舉無遺音其一三五七九絃太少樂内更不製造其三太正少籥三等謹按周官籥章之職龢以迎寒暑王安石曰籥三孔律吕于是乎生而其器不行于世久矣近得古籥嘗以頒行今如爾雅所載製造太正少三等用為樂本設于衆管之前其四太正少篴塤箎簫各三等舊制簫一十六管如鐘磬之制有四清聲今既分太少其四清聲亦不合兼用止用十二管其五大晟匏有三色一曰七星一曰九星三曰閏餘莫見古制匏備八音不可闕數今已各分太正少三等而閏餘尤無經見唯大晟樂書稱匏造十三簧者以象閏餘十者土之成數三者木之生數木得土而能生也故獨用黄鍾一清聲黄鍾清聲無應閏之理今去閏餘一匏止用兩色仍改避七星九星之名止曰七管九管其六舊制有巢笙竽笙和笙巢笙自黄鍾而下十九管非古制度其竽笙和笙並以正律林鍾為宫三笙合奏曲用兩調和笙奏黄鍾曲則巢笙奏林鍾曲以應之宫徴相雜器本宴樂今依鐘磬法裁十二管以應十二律為太正少三等其舊笙更不用其七柷敔晉鼓鎛鐘特磬雖無太少係作止和樂合行備設其八登歌宫架有搏拊二器按虞書戛擊鳴球摶拊琴瑟王安石解曰或戛或擊或搏或拊與虞書所載乖戾今欲乞罷而不用詔悉從之崇寧之樂可變議元吴萊淵穎集曰鄉余北遊京師聞太常所用樂本大晟之遺法也自東都不守大樂氏奉其樂器北趍燕都燕都喪亂又徙汴蔡汴蔡陷没而東平嚴侯獨得其故樂部人國初有㫖徴樂東平太常徐公遂典樂向日月山奏觀乞増宫懸文武二舞令舊工教習以備大祀故今樂户子孫猶世籍河汴間僅能肄其鐘鼓鏗鏘不復能究其義矣予因考求前代議樂自和峴以下更六七鉅公而議論莫之有定前日之宿縣者本謂樂和曽未幾時倐已改鑄或云樂失之清或云樂過于濁樂工冶卒且深厭其爐鞲鼓鑄之勞則或自取其樂之協時和銅齊以濟之當軒臨試雖以老師宿儒終不能必其銅齊之輕重而徒論其銅律之清濁也迨夫崇寧之世魏漢津乃以蜀一黥卒為造大晟樂府遂頒其樂書于天下盖謂古之制樂者惟黄帝夏禹得樂之正何則聖主之稟賦上與陰陽為一體聲則為律身則為度故夫黄帝夏禹之制樂實自其身而得之臣今請以聖主中指三節三寸定黄鍾之律中指之徑圍又即據而定為度量權衡樂以是制則臣將見其合天地之正備陰陽之和而得夫金石清濁之宜矣當是時惟丞相蔡京最神其説先鑄帝鼐八鼎復造金石鍾虡雕幾刻鏤盖極後世之選矣然以崇寧之指尺既長而樂律遂高雖漢津亦自知之嘗私謂其弟子任宗堯曰樂律高北方元鼎水又溢出律高則聲過哀而國亂水溢出則國有變而境土喪没是不久矣嗚呼漢津所制豈復有加于和峴以下諸人所論之樂哉然且至今沿襲相承未聞有所改作樂殊不可以草創茍且而遽定也雖然崇寜之樂亦可變矣盖古之論樂者一曰古雅樂二曰俗部樂三曰胡部樂古雅樂更秦亂而廢漢世唯採荆楚燕代之謳稍協律吕以合八音之調不復古矣晉宋六代以降南朝之樂多用吴音北國之樂僅襲北俗及隋平江左魏三祖清商等樂存者什四世謂為華夏正聲盖俗樂也至是沛國公鄭譯復因龜兹人蘓祗婆善胡琵琶而翻七調遂以制樂故今樂家猶有大石小石大食般涉等調大石等國本在西域而般涉即是般贍華言羽聲隋人且以是為太蔟羽矣由是觀之漢世徒以俗樂定雅樂隋氏以來則以胡樂定雅樂唐至元宗胡部坐俗部立樂工肄樂坐技不通然後為立技立技不精然後使教雅樂天下後世卒不復知有古雅樂之正聲矣自唐厯宋大抵皆然當大晟樂書之行教坊色長張俁曽製大樂元機賦論七音六十律八十四調本不脱乎龜兹蘓祗婆之舊正行四十大曲常行小令四部絃管猶或尚循乎大唐五代梨園法曲之遺此非胡與俗之雜行者乎宜雅樂之未易遽復也古來律厯二事更相為用太史郭公一嘗定厯誠曠世所未有予謂宜依古法緹室葭灰隨月候氣天地之中氣既應則鍾律之中聲當無有不應者要在久而後騐樂殊不可以草創茍且而遽定也嗚呼崇寧之樂亦可變矣吾又安得夫伶倫榮猨之徒而與之共論樂哉黄鍾三寸九分不合于理議明季本律吕别説曰近日莆田李教授文利著律吕元聲專主黄鍾三寸九分之説盖本吕氏春秋仲夏適音萹其言曰黄帝令伶倫自大夏之西阮隃之陰取竹嶰谿之谷空竅厚均者斷兩節間其長三寸九分而吹之以為黄鍾之宫次制十二筒以聴鳯凰之鳴以别十二律其雄鳴為六雌鳴亦六以比黄鍾之宫而皆可以生之故曰黄鍾之宫律吕之本宋劉恕作外紀書黄帝令伶倫造律亦載此文原恕之意不過博採古書以備三皇之事耳而三寸九分之制則未暇詳求其義焉然吕氏季夏六月紀又曰黄鍾生林鍾林鍾生太蔟太蔟生南吕南吕生姑洗姑洗生應鍾應鍾生蕤賓蕤賓生大吕大吕生夷則夷則生夾鍾夾鍾生無射無射生仲吕三分所生益之一分以上生三分所生去其一分以下生黄鍾大吕太蔟夾鍾姑洗仲吕蕤賓為上林鍾夷則南吕無射應鍾為下其法固與史記漢書上下相生三分損益者同而黄鍾之宫實起九寸也吕氏之説前後不同亦自相牴牾矣夫史記漢書雖未為得古人律制之意然比之三寸九分之説猶有可推而其數亦似自然若以三寸九分為黄鍾如吕氏上下相生之法而損益之至于應鍾止長一寸八分四釐八毫八絲何以成聲耶竊意長三寸九分當為長九寸空徑三分之誤也故漢書引此語削去長三寸九分五字盖有以知其為非矣隋志亦偶未察而復述此以論和聲亦欲備古義踵其誤而不覺耳終亦以上下相生三分損益為古人易簡之法而黄鍾之為九寸者皆仍漢舊未有改也若韋昭註國語而曰黄鍾陽之變本為黄鍾而言其曰管長九寸徑三分圍九分亦言黄鍾之圍徑長短而于蕤賓則固曰管長六寸二分八釐但舉成數而曰六寸三分耳非以九寸本蕤賓之律而為黄鍾之變也豈可據三寸九分之謬説以為黄鍾之定數哉文利之意本以律吕之數往而不返非陰陽消長往來之理故以三寸九分起數循環升降自大吕以至蕤賓五陽辰皆以陽升而進九分惟黄鍾陽氣尚微故止進六分自林鍾以至黄鍾五陰辰皆以陰降而退九分惟林鍾陰氣未盛故止退六分此其差也然陽之進也氣則從微至著以漸而盈陰之退也氣則從盛反衰以漸而縮陰陽進退盈縮適均不應陽之始進以六分而後則五辰皆進九分陰之始退以六分而後則五辰皆退九分也其意雖善而數亦强排且非吕氏上生下生之本法也則亦臆説而已既以三寸九分為黄鍾因謂黄鍾之尊在于清氣上行不在數多清者數少濁者數多數少者貴數多者賤黄鍾為宫聲極清而上行至角徴羽乃下降重濁而為民事物盡斥諸儒言黄鍾長九寸之非殊不知禮有以多為貴者如獻數天子十二上公九侯伯七子男五卿大夫三士一豆數天子二十六諸公十六諸侯十二上大夫八下大夫六佾數天子八諸侯六大夫四士二之類各隨所重以别尊卑未嘗執一端以為典要也故數多管長則聲濁而為宫有持重深沈之意焉何害其為貴數少管短則聲清而為羽有飛越輕佻之意焉何害其為賤商角羽之聲亦因是而上下之此君臣民事物所以序也凡天之道體靜而用動君也者以靜制動者也自商以下皆以動而制于靜者也古人立法亦隨所用而各有意義何必務為新奇以成其臆説哉今律吕大象章既以子黄鍾為正宫丑大吕亥應鍾為宫寅太蔟戌無射為商夘夾鍾酉南吕為角辰姑洗申夷則為徴已仲吕未林鍾為羽午蕤賓為正羽以配君臣民事物之等則明以三寸九分之黄鍾以至而至于九寸之蕤賓者也其定五聲生數次第則曰宫聲五十商聲八十角聲九十徴聲七十羽聲六十商角則自宫而加多徴羽則自角而減少或加三十或加一十或減二十或減一十其參差不齊又不知其何所本耶夫宫土聲也以土當河圖之五數十乗之而為五十徴火聲也以火當河圖之七數十乗之而為七十羽水聲也以水當河圖之六數十乗之而為六十猶可説也商金聲也而以當河圖之八數十乘之而為八十則木而非金矣角木聲也而以當河圖之九數十乘之而為九十則金而非木矣其視律吕大象章所差之次又何其舛錯耶又以變宫五十變徴七十為二變以備七音是又襲七始七同之舊也故其對調旋宫之圖悉從律吕新書每均七聲之數而蔡氏相去一律則音節和相去二律則音節逺之説亦併用之然止用全聲不用半聲其數皆不因上生下生而得徒以雌雄和鳴之故陽律三為宫商角則陰吕二為徴羽陰吕三為宫商角則陽律二為徴羽其長短亦不皆一一順序也亦安在其為均哉至于六十調圖雖本律吕新書而新書之意乃以一律為五調故每律皆立五均今以其逆行而正之以從左旋而每五調之後又列一宫揑與大司樂奏歌之説相凑其雙宫對調之圖則止据奏歌二律分配而互換更番也此本不知律吕新書之意而妄意為之其勞拙亦甚矣其正五音章以喉舌齒唇牙分屬宫商角徴羽則别為一義盖喉舌齒唇牙字音也字亦有清濁半清半濁之分故借宫商角徴羽以名之如沈括所謂字則有喉唇齒舌當使字字舉皆輕圓而聲中無字又宫聲字而曲合用商聲則能轉宫為商使字中有聲則可若謂字聲即合歌聲則不可以歌聲即同字聲是又一牽扯也至引蘇祗婆七聲之説正是秦漢以來五聲二變之義但在西域其名異耳安得執此以為聲清之證哉其為此書止有以先儒不識黄鍾生成之數一節足以破往而不返之失其餘諸論今不今古不古以法象則無取以度數則不倫無一合于理者也孔子曰盖有不知而作之者其此之類也夫琴以第三絃為宫為中和議明朱載堉律吕精義曰往年與善琴者論古今雅樂高下聞其説曰冷謙之樂乃古無射調也俗呼為清商調以第二絃為宫音少者歌之則拽不出失之太下恐非中和也蔡元定之樂乃古夾鍾調也俗呼為清徴調以第四絃為宮音老者歌之則揭不起失之太高亦非中和也所謂中和者古之正調是也俗呼為清角調軒轅氏之所造以第三絃為宫音比冷謙高一調比蔡元定低一調老者歌之不掲少者歌之不拽不高不下是名為中和也時典樂尤世賢亦知音者以所帶來神樂觀笙吹其所習舊樂章譜與琴譜相校所論不虛也欽定續通典卷九十一
