body:
  text: 禮吉天子宗廟唐五代宋遼金元明唐肅宗至徳二載九月復京師十一月作九廟神主告享於長樂殿代宗廣徳元年唐書禮樂志作寳應二年祧獻祖懿祖祔𤣥宗肅宗自是之後常為九室大厯十四年遷元皇帝於夾室祔代宗於太廟禮儀使顔真卿奏議王制天子七廟三昭三穆與太祖之廟而七七廟之外去祧為壇去壇為墠厯代制迭毀之禮皆以親盡伏以太宗七代之祖髙祖萬葉所承太祖受命於天始封於唐皆在不毀之典唯代祖元皇帝地非開統親在七廟之外代宗皇帝升祔有日元皇帝神主禮合祧遷請依三昭三穆之義永為通典徳宗貞元十九年三月遷獻懿二祖神主權祔徳明興聖廟之幕殿順宗永貞元年十一月遷髙宗神主於西夾室祔徳宗神主憲宗元和元年祧中宗神主袝順宗十五年禮部奏凖貞觀故事遷廟之主藏於夾室西壁南北三間第一間代祖室第二間髙宗室第三間中宗室今睿宗皇帝理合祧遷夾室西壁三室外無置室處請於夾室北壁以西為上置睿宗神主石室從之武宗㑹昌五年八月中書門下奏東都太廟九室神主共二十六座自禄山叛後取太廟為軍營所司潛收神主見在太㣲宫内其太廟屋並在可以修崇望令尚書省集公卿及禮官學官詳議六年太常博士鄭路等奏臣與學官等詳議東都太㣲宫神主自獻祖暨孝敬哀皇后已前十二座親盡迭毀請權藏於太廟夾室未題神主十四座請告遷之日但瘞於舊太微宫空閒之地制可時太常博士段瓌等議以為廟不可修主宜藏瘞工部尚書薛元賞等議以為廟可偕立主不並設吏部郎中鄭亞等又以為廟固合修主不可瘞衆議紛紜太常博士顧徳章厯引經據嚴辨修崇之謬詳盡確實制以徳章所陳最為淺近令有司擇日修崇其事旋寢至宣宗時竟以太微神主祔太廟焉是年五月禮儀使奏敬宗文宗武宗兄弟相及已厯三朝昭穆之位與承前不同請復代宗神主於太廟代宗神主於文宗升祔時以親盡祧遷以存髙曾之親以敬宗文宗武宗同為一代於太廟東間添置兩室為九代十一室之制以全臣子恩敬之義勅下尚書省兩省御史臺等集議以聞尚書左丞鄭涯等奏伏自敬宗文宗武宗三朝嗣位皆以兄弟謹詳禮院所奏並上稽古文旁摭史氏協於通義允為得宜請依禮官所議從之僖宗光唘三年二月車駕自興元還京勅付所司修奉太廟宰相鄭延昌奏太廟大殿十一室二十三間十一架功績至大計料支費不少兼宗廟制度有素難為損益今不審依元料修奉或更有商量請下禮官詳議太常博士殷盈孫奏議言如依元料難以速成况帑藏方虚須資變禮伏聞先有詔㫖欲以少府監大㕔權充太廟其㕔五間陳設隘狹請更修建十一間以備十一室薦享之所從之梁太祖開平元年追尊皇髙祖黯廟號肅祖皇曾祖茂琳按五代㑹要作茂林今據五代史輯廟號敬祖皇祖信廟號憲祖皇考誠廟號烈祖後唐莊宗同光元年追尊皇曾祖執宜廟號懿祖皇祖國昌廟號獻祖皇考克用廟號太祖仍奉唐髙祖太宗懿宗昭宗為七廟二年太常禮院奏國家興建之初已於北都置廟今尅復天下遷都洛陽復本朝宗廟案禮無二廟之文其北都宗廟請廢從之明宗天成二年追尊皇髙祖聿廟號惠祖皇曾祖敖五代㑹要作教廟號毅祖皇祖琰廟號烈祖皇考電五代㑹要作霓廟號徳祖立廟於應州西京七廟仍同光之舊按明宗為太祖養子實奪莊宗之位故毆史以反書其仍西京七廟特縁飾耳愍帝應順元年明宗應祔廟中書門下奏今太廟見享七室髙祖太宗懿宗昭宗獻宗太祖莊宗大行升祔禮合祧遷獻祖下尚書集議從之時議者以懿祖賜姓於懿宗以支庶繫大宗例宜以懿為始祖次昭宗可也不必祖神堯而宗太宗若依漢光武則宜於代州立獻祖而下親廟其唐廟依舊禮行之可也而議諡者忘咸通之懿宗又稱懿祖父子俱懿於理可乎將朱邪三世與唐室四廟連叙昭穆非禮也議祧者不知懿祖受氏於唐而祧之今又及獻祖以禮論之始祧昭宗次祧懿宗可也而懿祖如唐景皇帝豈可祧乎功按五代史莊宗本紀咸通間朱邪赤心以從討龎勛賜姓名曰李國昌是受氏於懿宗者係獻祖而非懿祖今據通考及五代㑹要輯晉髙祖天福二年中書門下奏皇帝到京未立宗廟所司請立髙祖以下四親廟其始祖一廟未敢輕議令都省百官集議御史中丞張昭議臣讀十四代史書唯殷周二代以契稷為太祖漢魏以來皆於親廟之中以有功者為太祖無追崇始祖之例請依隋唐有國之初創立四廟推四世之中名位髙者為太祖謹議以聞勅令尚書省集議奏聞乃倣唐舊制追尊皇髙祖璟五代㑹要作景廟號靖祖皇曾祖彬五代㑹要作郴廟號肅祖皇祖昱廟號睿祖皇考紹雍廟號獻五代㑹要作憲祖四年十一月太常禮院奏請以至徳宫正殿隔為五室三分之南去地四尺以石為埳中容二主廟之南一屋三門門㦸二十有四東西一屋一門門無棨㦸帝后神主舊在青化里之寢宫祭前二日迎置新廟少帝天福七年十一月祔髙祖神主於太廟漢髙祖天福十二年時漢髙祖已即位尚仍天福之號太常博士段顒奏請立髙曾祖禰四廟更上追逺祖光武皇帝為百代不遷之廟居東向之位吏部尚書竇貞固等議古者四親廟之外祖功宗徳不拘定數今除四親廟外更請尊髙皇帝光武皇帝為世祖於是追尊皇髙祖湍廟號文祖皇曾祖昻廟號徳祖皇祖僎廟號翼祖皇考琠廟號顯祖以髙皇帝為髙祖光武皇帝為世祖皆不祧共六廟時論者以天子建國各從其所起堯自唐侯禹生大夏是也立廟皆祖其功商之契周之后稷是也髙祖起於晉陽而追嗣兩漢徒以同姓為逺祖甚非其義貞固又以四親匹庶上合髙光失之彌逺矣周太祖廣順元年有司議立四親廟因追尊皇髙祖璟廟號信祖皇曾祖諶廟號僖祖皇祖藴廟號義祖皇考簡廟號慶祖三年九月太常禮院言准洛京廟室一十五間中分為四室兩頭有夾室四神門每門屋三間㦸二十四别有齋宫神厨屋宇在國城請下有司修奉從之十二月四廟神主至自西京迎之於西郊祔於太廟世宗顯徳五年夏四月庚申祔五室神主於新廟宋太祖建隆元年有司請立宗廟太常寺奏上皇髙祖文安府君曰文獻皇帝廟號僖祖皇曾祖中丞府君曰惠元皇帝廟號順祖皇祖驍衛府君曰簡恭皇帝廟號翼祖皇考武清府君曰昭武皇帝廟號宣祖太祖御崇元殿備禮冊四親廟奉安神主行上諡之禮太宗太平興國二年正月有司言唐制長安太廟凡九廟同殿異室其制二十一間皆四柱東西夾室各一前後靣各三階東西各二側階本朝太廟四室室三間今太祖升祔共成五室請倣唐制東西留夾室外餘十間分為五室室二間從之四月己卯奉神主祔廟真宗咸平元年判太常禮院李宗納等言伏見僖祖稱曾髙祖太祖稱伯今請僖祖正稱廟號順祖而下依爾雅稱考妣王父母及世父之文事下尚書省議户部尚書張齊賢等言為人後者為之子所以尊本祖而重正統也又禮云天子絶朞安得宗廟中有伯氏之稱請自今有事於太廟太祖及諸祖室稱孝孫孝曾孫太宗室稱孝子其爾雅之文於宗廟無取詔下禮官議奏言兄弟繼統同為一代每大祭太祖太宗昭穆同位祝文宜並稱孝子詔都省復議仍主為人後者為之子之説禮官再議歴引經據無兄弟相為後之文又案太宗享祀太祖二十有二載稱曰孝弟此不易之制又安可追改乎自今合祭日太祖太宗依典禮同位異坐皇帝於太祖仍稱孝子餘並遵舊制按兄弟同昭穆此自不易之理必以一帝為一世則兄弟四人相襲為君固冇祭不及禰者矣至以伯氏之稱為無妨於義未免失之仁宗景祐二年五月詔王者奉祖宗尚功徳禋天祀地則侑神作主審諦合食則百世不遷其今禮官辨崇配之序定二祧之位禮院請以太祖為定配二宗為迭配其將來皇帝親祠請以三聖並侑上顯對越之盛申遹追之感詔恭依康定元年直祕閣趙希言奏天子七廟親廟五祧廟二倣古定制則僖順二祖有當祧之義宜毎主為一廟一寢或前立一廟以今十六間為寢更立一祧廟逐室各題廟號釦寶神御物宜銷毀之同判太常寺宋祁言鄭康成謂周制立二昭二穆與太祖文武共為七廟此一家之説未足援正自荀卿王肅皆云天子七廟諸侯五大夫三士一降殺以兩則國家七世之數不用鄭氏之説僖祖至真宗方及六世不應便立祧廟又周漢每帝各立廟晉宋以來多同殿異室國朝以七室代七廟相承已久不可輕改又周禮天府掌祖廟之守藏寳物世𫝊者皆在焉其神御法物請别為庫藏之自是室題廟號而建神御庫焉嘉祐八年仁宗將祔廟孫抃等請增為八室以備天子事七世之禮修奉太廟使蔡襄上八室圖廣廟室并夾室為十八間盧士宗司馬光以為太祖以上之主雖屬尊於太祖親盡則遷今議升祔僖祖當遷夾室孫抃等復議自唐至周廟制不同而皆七世自周以上所謂太祖非始受命之至特始封之君今僖祖雖非始封之君要為立廟之祖方廟數未過七世遂毀其廟遷其主考之三代禮未有此乃存僖祖室以備七室英宗治平三年詔遵皇太后訓立濮王園廟俾王子孫主祠事英宗濮安懿王子仁宗在位年久無嗣乃立為皇子及即位宰相韓琦等奏請下有司議濮安懿王合行典禮詔徐議之二年乃詔禮官與待制以上議翰林學士王珪等奏宜率先朝封贈期親尊屬故事中書省奏禮與今及五服年月勅出繼之子於所繼所生皆父母又漢宣帝光武皆稱父為皇考今珪等議稱濮王為皇伯於典禮未冇明據請下尚書省集三省御史臺議奏於是御史吕誨等彈奏歐陽修首建邪議韓琦曽公亮趙槩附會不正之罪固請如王珪等議既而内出太后手詔濮安懿王稱皇譙國夫人王氏襄國夫人韓氏仙遊縣君任氏並稱后英宗即日手詔曰稱親之禮謹尊恩訓追崇之典豈易克當且欲以塋為園即園立廟俾王子孫主祠事翌日誨等以所論列彈奏不見聴用力辭臺職誨等既去而濮議亦寢四年九月祧藏僖祖神主於西夾室祔英宗神主於太廟神宗熙寧五年中書門下言僖祖以上世次不可得而知則僖祖有廟與商周契稷疑無以異今毀其廟而藏主夾室替祖考之尊而下祔於子孫殆非所以順祖宗事亡如存之義請付兩制議取其當者翰林學士元絳等議自古受命之主皆以功徳享有天下必推其本統以尊事其祖當太祖受命之初建四親廟自僖祖以上世次不可知則僖祖之為始祖無疑今遷僖祖之主藏於太祖之室則是祫祭之日皆降而合食也請以僖祖之廟為始祖庶合禮意時王安石為相力主絳議六年春正月復僖祖為太廟始祖祧順祖於夾室時翰林學士韓維議曰昔先王有天下迹其基業之所起以為太祖故子夏序詩稱文武之功起於后稷後世有天下者前無所因故以創業之主為太祖本朝太祖皇帝功徳卓然為宋太祖無少議者僖祖雖為髙祖然仰跡功業未見所因上尋世系又不知所始若以所事契稷奉之恐於古無考而於今亦所未安今之廟室與古殊制古者毎廟異官今祖宗同處一室而西夾室在順祖之右考之尊卑之次似亦無嫌帝以維之説近是而安石以維言夾室右為尊為非理帝亦然之遂從絳議元豐元年詳定禮文所圖上八廟異宫之制以始祖居中分昭穆為左右自北而南僖祖為始祖翼祖太祖太宗仁宗為穆在右宣祖真宗英宗為昭在左皆南靣北上陸佃言太祖之廟百世不遷三昭三穆親盡則迭毀説者以昭常為昭穆常為穆則尊卑失序復圖上八廟昭穆之制以翼祖太祖太宗仁宗為昭在左宣祖真宗英宗為穆在右皆南靣北上何洵直圖上八廟異官引熙寧儀僖祖正東向之位順祖宣祖真宗英宗南靣為昭翼祖太祖太宗仁宗北靣為穆又以晉孫毓唐賈公彦言始祖居中三昭在左南靣西上三穆在右南靣東上為兩圖上之詔俟廟制成日取㫖八年太常寺言詔書定七世八室之制今神宗皇帝崇祔翼祖在七世之外應與簡穆皇后祧藏於兩夾室石室中十一月祔神宗神主於第八室自英宗上至宣祖以次升遷哲宗元符三年禮部太常寺言哲宗升祔宜如晉成帝故事於太廟殿增一室候祔廟日神主祔第九室詔下侍從官議皆如所言帝從之先是李清臣為禮部尚書首建增室之議至是蔡京陸佃等議以哲宗嗣神宗大統父子相承自當為世宜以神宗為昭上遷宣祖以合古三昭三穆之義㑹清臣為門下侍郎辨説甚力京佃等議遂格不行徽宗即位詔仁宗神考廟永祀不祧崇寧二年詔祧宣祖以哲宗神主祔太廟第八室三年詔復翼祖宣祖令有司議禮部尚書徐鐸言唐之獻祖中宗代宗與本朝僖祖皆嘗祧而復今存宣祖於當祧之際復翼祖於已祧之後以備九廟禮無不稱乃命鐸為修奉使增太廟殿為十室髙宗紹興五年吏部員外郎董棻言仰惟太祖受命混一區宇推原功徳所起宜於祫亨之日正東向之尊仁宗時嘗議太祖東向廷論僉同是以當時大祫上列昭穆而虗東向葢不敢以非受命之君而居之也暨熙寧之初僖祖以世次當祧適王安石用事議尊僖祖為始祖􅒊居東向士大夫皆以太祖不得東向為恨至崇寧之時宣祖當祧值蔡京用事建言請立九廟其已祧翼祖宣祖並即依舊相沿至今太祖尚居第四室遇大祫處昭穆之列今若正太祖東向之尊委合禮經太常寺丞王普又言自古羣廟迭毀而太祖不遷以太祖即廟之始祖是廟號非諡號也惟我太宗嗣服之初太祖廟號已定迨熙寧時尊僖祖為始祖百世不遷祫享東向而太祖嘗居穆位則名實舛矣如以熙寧之禮為是僖祖當稱太祖而太祖當改廟號然則太祖之名不正前日之失大矣今宜奉太祖神主居第一室永為廟之始祖祫祭則正東向之尊禘祭則迎宣祖神主而以太祖配焉帝然之於是始建太廟於臨安奉迎安置七年四月築太廟於建康以臨安府太廟為啓祖殿十二月祔徽宗於太廟十六年增建太廟從太常寺奏體倣在京廟制作祏室光宗紹熙五年時寧宗已即位吏部尚書鄭僑等奏請祧僖宣二祖正太祖東向之位尋立僖祖别廟以藏順翼宣三祖之主十二月祔孝宗於太廟按太祖東向之議熙寧時韓維等已力請南渡後董棻王普首建此議髙宗亦以太祖開創基業始受天命祫享宜居東向之位至是鄭僑等奏請遂祧僖順翼宣四祖而正太祖東向之位此自不刋之典然其時朱子熹在講筵獨入議狀條其不可者四大畧以元祐大儒程頥曾是王安石之論遂以為義理人心之所同至不憚以去就争之馬氏端臨以朱子為膠柱鼓瑟黨同伐異此可見議禮之難矣理宗寳慶元年四月寧宗祔廟御史臺言太祖為帝者太祖之廟太宗祔於太祖為一世之廟真宗仁宗神宗髙宗各有制書不祧不在三昭三穆之中則固不在九廟之數自太祖以至寧宗皇帝始為六廟合增展一室以崇升祔不當議祧於禮為合於義為安詔從之遼諸帝各有廟聖宗開泰八年建景宗廟於中京九年十二月詔中京建太祖廟制度祭器皆從古制興宗重熙二十一年七月追尊太祖之祖為簡獻皇帝廟號𤣥祖太祖之考為宣簡皇帝廟號徳祖天祚帝乾統三年十一月追尊太祖之髙祖為昭烈皇帝廟號肅祖太祖之曾祖為莊敬皇帝廟號懿祖金初無宗廟太祖天輔七年建寧神殿於上京以時薦享自是諸京皆立廟惟在京師者則曰太廟太宗天㑹三年十月詔建太祖廟於西京熙宗立之二年時仍太宗年號稱天㑹十四年定始祖景祖世祖太祖太宗廟皆不祧皇統三年初立太廟於上京八年廟成海陵貞元初增廣燕京舊廟奉遷祖宗神主於新都正隆中營建南京宗廟其廟制殿規一屋四間限其北為神室其前為通廊東西二十六楹為間二十有五每間為一室廟端各虛一間為夾室中二十三間為十一室從西三間為一室為始祖廟祔徳帝安帝獻祖昭祖景祖祧主五餘皆兩間為一室世祖室祔肅宗穆宗室祔康宗餘皆無祔世宗大定十二年議建閔宗後改廟號曰熙宗别廟禮官援晉惠懐唐中宗後唐莊宗升祔故事武靈亦合升祔初有司擬奏熙宗無嗣不稱宗以武靈為廟號今廟制為七世十一室升祔武靈請用晉唐舊制增作十二室依春秋尊尊之典武靈當在十一室禘祫合食當在太宗之下而居昭位又當稱宗然前升祔睿宗已在第十一室累遇祫亨睿宗在穆位與太宗昭位相對若更改祏室及昭穆序非有司所敢輕議宜取聖裁十九年四月禘祔閔宗遂增展太廟為十二室二十九年世宗將祔廟有司言太廟十二室自始祖至熙宗雖係八世然世宗與熙宗為兄弟不相為後用晉成帝故事止係七世若特升世宗顯宗即係九世於是遂祧獻祖昭祖升祔世宗顯宗於廟宣宗貞祐二年遷都南京廟社諸祀並委中都時謁之禮盡廢四年禮官言廟社國之大事今駐蹕陪京列聖神主已遷於此宜重修太廟社稷以奉嵗時之祭按中都廟制自始祖至章祖凡十二室今廟室止十一若增建恐難卒成擬權祔肅宗主於世祖室始祖以下諸神主隨室奉安從之元世祖中統四年初建太廟至元元年定太廟七室之制三年九月始作八室設祏室十月廟成製尊諡廟號烈祖第一室太祖第二室太宗第三室皇伯卓齊特第四室皇考察克台第五室皇考睿宗第六室定宗第七室憲宗第八室十一月泰安神主於祏室十四年八月詔建太廟於大都十五年五月太常卿還自上都議廟制據博士言同堂異室非禮以古今廟制畫圖貼説令博士齎往上都分議可否以聞其議同堂異室之制謂自後漢明帝遺詔無起寢廟但藏主於光武廟中更衣别室章帝復如之後世遂不敢加而公私之廟皆用同堂異室之制先儒朱子以謂至使太祖之位下同孫子而更僻處於一隅無以見七廟之尊羣廟之神則又上厭祖考不得自為一廟之主且如命士以上其父子婦姑猶且異處况天子貴為一人富有四海而祖宗神位數世同處一堂殊失人子事亡如存之義十八年博士李時衍等議厯代廟制不同欲尊祖宗當從都宫别殿之制欲崇儉約當從同堂異室之制尚書段諾海及太常禮官奏曰始議七廟除正殿寢殿正門東西門已建外東西六廟不湏更造餘依太常卿新圖建之遂為前廟後寢廟分七室三十一年四月成宗即位追尊皇考為皇帝廟號裕宗成宗大徳十一年五月武宗即位於上都中書右丞相等集議皇帝嗣登寳位追尊皇考為皇帝廟號順宗皇考成宗同母兄也二帝祔廟之禮依兄弟次序太祖之室居中睿宗西第一室世祖西第二室裕宗西第三室順宗東第一室成宗第二室制可按睿宗裕宗順宗未居帝位當祔食於所出之帝况成宗時順宗為臣乃依兄弟之次躋順宗於成宗之上失禮孰甚焉仁宗延祐七年議增置廟室升祔仁宗為武宗弟時以兄弟同為一代議増廟室禮官集議太廟七室皆有神主増室不及依前代典故權於廟内設幄座安奉乃結綵為殿置武宗室南權奉神主英宗至治三年建大殿十五間以世祖所建廟為寢殿中三間通為一室餘十間各為一室東西兩旁各留一間為夾室又建大次殿於宫城西北泰定帝泰定元年追尊皇考晉王為皇帝廟號顯宗四月中書省臣因博士劉致議請太祖居中南向奉睿宗祔左一室世宗祔右一室裕宗袝睿宗室之左顯宗順宗成宗兄弟也以次祔世祖室之右武宗仁宗亦兄弟也以祔裕宗室之左英宗祔成宗室之右從之五月祔顯宗英宗凡十室文宗天厯元年毀顯宗室升順宗祔右穆第二室成宗第三室英宗第四室武宗祔左昭第三室仁宗第四室至順元年三月祔明宗神主序於英宗之上順帝至元六年撤文宗廟主至正三年帝告祭太廟至寧宗室問曰朕寧宗兄也當拜否太常博士劉聞對曰寧宗雖弟其為帝時陛下為之臣於禮當拜帝乃拜按元宗廟未有定制支庶嗣統各顧其私親武宗繼體而追王順宗泰定入立而推尊顯廟又躋順宗於成宗之上序明宗於英宗之前皆干逆祀之譏不知顯順二君不當稱宗併睿裕二宗亦不當立廟揆之古制昭穆之次祧毀之宜胥無當也明太祖洪武元年命中書省集儒臣議祀典李善長等詳考古今沿革請追尊髙曾祖考四代因作四親廟於宫城東南各為一廟上皇髙祖諡曰元皇帝廟號徳祖皇曾祖諡曰恒皇帝廟號懿祖皇祖諡曰裕皇帝廟號熙祖皇考諡曰淳皇帝廟號仁祖八年改建太廟前殿後寢殿翼皆有兩廡寢殿九間奉藏神主為同堂異室之制中室奉徳祖東第一室奉懿祖西第一室奉熙祖東第二室奉仁祖皆南向惠帝即位奉太祖主祔廟正殿神座次熙祖東向寢殿神主居西第二室南向成祖遷都建廟如南京制仁宗洪熙元年太宗後改號成祖神主祔太廟奉安寢殿東第三室宣宗宣徳二年奉安仁宗神主西第三室其後俱準此孝宗即位憲宗將升祔時九廟已備議者咸謂徳懿熙仁四祖宜以次奉祧禮臣謂國家自徳祖以上莫推世次則徳祖視周后稷不可祧憲宗升祔當祧懿祖宜於太廟寢殿後别建祧廟如古夾室之制嵗暮則奉祧主合亨如古祫祭之禮帝從所議時吏部侍郎楊守陳言禮天子七廟祖有功宗有徳徳祖非契稷比宜并祧徳懿熙三祖自仁祖下為七廟異時祧盡則太祖擬契稷而祧主藏於後寢祫禮行於前殿時享尊太祖祫祭尊徳祖則功徳並崇恩義亦備帝不能用𢎞治十八年奉祧熙祖升祔孝宗世宗嘉靖二年奉祧仁祖升祔武宗四年光禄寺丞何淵請於太廟内立世室以獻皇帝與祖宗同享有㫖集廷臣議吏部尚書廖紀等皆以為不可上曰世室之建自古有之朕膺天命入紹大統皇考百世之室胡為不可乃命於太廟左隙地立廟其前殿後寢一如太廟制定名世廟云十年正月勅諭禮部以太祖髙皇帝􅒊運開基四時享祭壓於徳祖不得正南面之位命祧徳祖奉安太祖神主寢殿正中為不遷之祖太宗而下皆以次奉遷九月上諭大學士以宗廟之制父子兄弟同處一堂於禮非宜太宗以下宜皆立専廟尚書夏言以為未便議上不報十四年更建世室及昭穆羣廟於太廟之左右其制皆正殿五間寢殿三間各有門垣以次而南統於都宫太廟専奉太祖世室在左三昭之上奉太宗餘依昭穆之次用本廟號十五年廟成奉安徳懿熙仁四祖神主於祧廟太祖神主於太廟翌日奉安太宗以下神主列於羣廟十七年上太宗廟號成祖獻皇帝廟號睿宗遂奉睿宗神主祔太廟躋武宗上二十年四月九廟災燬成祖仁宗主二十二年十月以舊廟基隘命相度規制久之命復同堂異室之舊二十四年廟成禮官以太廟安神請定位次帝曰既無昭穆亦無世次只序倫理太廟居中左四序成宣憲睿右四序仁英孝武皆南向穆宗隆慶六年禮官議當祧廟室禮科陸樹徳言宣宗於穆宗僅五世請仍祔睿宗於世廟而宣宗勿祧䟽下禮部議宣宗世次尚近祧之未安請於寢殿左右各增一室則尊祖敬宗並行不悖帝命如舊勅行遂祧宣宗熹宗天啓元年七月光宗將祔廟太常卿洪文衡請無祧憲宗而祧睿宗不聴按明廟制太祖首建四親廟世宗定太祖南向之位皆得禮之正其闕而未備者建文祭享無聞景泰廟號不立神宗時禮科都給事中萬象春嘗上疏極言未獲俞允而睿皇帝以私親躋武宗之上終明之世莫之或改亦失禮之甚者矣原廟唐宋遼金元明臣等謹案原廟始於漢叔孫通漢書注原者重也先已有廟今更立之故云重也北魏明元帝永興時立太祖道武帝廟於白登山又立太祖别廟於宫中唐中宗神龍後東西二都皆立廟嵗時並享宋真宗景徳間建神御殿又奉安御容於禪院仁宗皇祐時於滁并等州遣使奉安御容倣漢郡國廟意自後遞相沿襲與太廟典禮畧同遼金元皆有神御殿明建奉先殿以奉神御皆本漢原廟之意杜典載唐以前廟制原廟本畧故無専條今詳考唐宋以後典制别為一條附載宗廟之下以資考訂云唐初建東西二都而東都無廟則天皇后僣號稱周立周七廟於東都中宗神龍元年復位遷武氏廟主於西京為崇尊廟以東都武氏故廟為唐太廟祔光皇帝以下七室由是東西二都皆有廟嵗時並享武宗㑹昌五年七月中書門下李徳裕奏孟州汜水縣虎牢闗太宗擒王竇之地闗城東峯有髙祖太宗像請如漢郡國立廟故事制可十月作昭武廟於虎牢闗宋真宗景徳四年詔西京建太祖神御殿又奉安太祖御容於應天禪院以宰臣向敏中為奉安聖容禮儀使權安於文徳殿百官班列帝行酌獻禮鹵簿導引升綵輿進發帝辭於正陽門外百官辭於瓊林苑門外遣官祭告畢羣臣稱賀大中祥符五年十二月作景靈宫按志稱聖祖臨降故為宫以奉之仁宗天聖五年詔修景靈宫之萬夀殿以奉真宗署曰奉真皇祐五年以滁州通判王靖請於滁州大慶寺殿奉安太祖名曰端命於并州崇聖寺殿奉安太宗名曰統平於澶州舊寺殿奉安真宗名曰信武既而統平殿災諫官范鎮言并州素無火災自建神御殿未幾輒焚天意若曰祖宗御容非郡國所宜奉安者近聞下并州復加崇建是徒事土木重困民力非所以答天意也先是睦親廣親二宅並建神御殿翰林學士歐陽修言神御非人臣私家之禮下兩制臺諫禮官議以為漢用春秋之義罷郡國廟今睦親宅廣親宅所建神御殿不合典禮宜悉罷詔以廣親宅置已久唯罷修睦親宅神宗熙寧二年正月奉安英宗神御於景靈宫英徳殿帝親行酌獻仍詔嵗以十月望朝享四年七月詔宗室不得祀祖宗神御諸宗室宫院祖宗神御迎藏天章閣自是臣庶之家凡有御容悉取藏禁中元豐五年作景靈宫十一殿在京宫觀寺院神御皆迎入禁中所存惟萬夀觀延聖廣愛寧華三殿而已景靈宫朝獻孟春用十一日孟夏擇日孟秋用中元日孟冬用下元日天子常服行事遇南郊先詣宫行薦享禮如太廟儀哲宗元祐元年正月立神宗原廟二年三月奉安神宗神御於景靈宫宣光殿紹聖二年奉安神宗御容於顯承殿徽宗即位宰臣請特建景靈西宫奉安神宗於顯承殿為神御之首昭示萬世尊異之意建哲宗神御殿於西以東偏為齋殿右正言陳瓘言五不可且論蔡京矯誣不從建中靖國元年名哲宗神御殿曰觀成崇寧元年更名重光髙宗建炎三年正月奉安西京㑹聖宫累朝御容於揚州夀寧寺十一月奉安累朝御容於越州天慶觀四年奉安祖宗神御於福州紹興十三年臣僚言竊見神宗始廣景靈宫以奉祖宗衣冠之遊即漢之原廟也自艱難以來原廟神遊猶寄永嘉四孟即便朝設位薦獻未副廣孝之意乞命有司倣景靈宫舊規隨宜建置迎還晬容從之十五年秋復建神御殿於崇政殿之東朔望節序帝后生辰帝親酌獻行香用家人禮遼諸帝各有原廟如凝神殿之類聖宗統和十三年奉安景宗及太后石像於延芳淀十四年又奉安於乾州開泰元年奉遷南京諸帝石像於中京觀徳殿景宗及宣獻皇后於上京五鸞殿金熙宗天眷二年立太祖原廟於慶元宫皇統四年建原廟於東京海陵天徳四年有司言燕京興建太廟復立原廟三代以前無原廟制至漢惠帝始置廟於長安渭北薦以時果其後又置於豐沛不聞享薦之禮今兩都告享宜止於燕京所建原廟行事於是名其宫曰衍慶殿曰聖武門曰崇聖世宗大定十七年正月詔以衍慶宫聖武殿西建世祖神御殿東建太宗睿宗神御殿二十一年四月奉安昭祖以下三祖三宗御容於衍慶宫行親祀禮哀宗正大元年三月奉安宣宗御容於孝嚴寺元神御殿舊稱影堂所奉祖宗御容皆紋綺局織錦為之仁宗延祐五年敕大永福寺創殿安奉順宗御容英宗至治元年作仁宗神御殿於普慶寺泰定帝泰定元年二月作顯宗影堂二年正月奉安顯宗像於永福寺給祭田百頃三年按元史志作二年建顯宗神御殿於盧師寺賜額曰大天源延聖寺按元史本紀作延夀寺文宗天厯元年立太禧院奉祖宗神御至順按元史志作天厯二年三月詔累朝神御殿之在諸寺者各製名以冠之世祖曰元夀裕宗曰明夀成宗曰廣夀順宗曰衍夀武宗曰仁夀仁宗曰文夀英宗曰宣夀明宗曰景夀順帝元統元年奉安文宗御容於大承天䕶聖寺至元六年正月立司禋監奉太祖太宗睿宗三朝御容於石佛寺二月立延徽寺以奉寧宗祀事至正十四年立寧宗影堂明太祖洪武三年冬上以太廟時亨未足以展孝思復建奉先殿於宫門内之東以太廟象外朝以奉先殿象内朝正殿五間南向前軒五間製四代帝后神位衣冠其祔祧送遷之禮如太廟寢殿儀成祖遷都北京建如制后妃廟唐五代宋金明唐昭宗大順元年將行禘祭有司請以三太后神主祔享於太廟三太后者宣宗母孝明太皇太后鄭氏敬宗母恭僖皇太后王氏文宗母貞獻皇太后韋氏當時並置别廟每年五享及三年一禘五年一裕皆於本廟行事無神主入太廟之文至是舊章散失禮官憑曲臺禮故有是請博士殷盈孫獻議列五不可且言祫合祭也合猶不入太祖之廟而况禘乎請皆禘於别廟為宜宰相孔緯是之但以禮院所奏儀注已勅下大祭日廹不可遽改且依行之遂以三太后祔合太廟後唐廢帝清泰二年追尊魯國太夫人魏氏為皇太后於京師河南府東立寢宫宋太祖建隆三年追冊㑹稽郡夫人賀氏曰孝惠皇后就陵所置祠殿奉安神主乾徳元年十二月始議為孝明皇后王氏置廟及二后先后之次太常博士和峴請共殿别室以孝明正位内朝請居上室孝惠居次室禮院又言后廟祀事一凖太廟亦當立㦸太宗太平興國二年以懿徳皇后符氏淑徳皇后尹氏祔别廟淑徳皇后太宗在周時娶及即位追冊為后并諡懿徳皇后周顯宗中歸太宗建隆間累封越國夫人後追冊並諡至道三年孝章皇后宋氏太祖繼后祔享有司言孝章正位中壼宜居上室懿徳追崇后號宜居其次詔孝章殿室居懿徳下按孝章祔享乃祔孝惠别號也其序當在懿徳前而反易之失其宜矣真宗即位追尊賢妃李氏為元徳皇太后太宗時封夫人生真宗及楚王元佐尋薨帝即位先封賢妃旋進尊諡徳按真宗即位後本紀不載封母為賢妃事其追尊元即在本年十二月恐賢妃之號太宗時冊封而史文不備今仍據本𫝊輯以誌闕疑云有司請修奉廟室為殿三間設神門齋房神厨以備為享判太常禮院李宗納等言元徳皇太后别建廟室淑徳皇后亦在别廟同是帝母請加太字遷就元徳新廟居第一室以元徳次之詔下中書集議兵部尚書張齊賢等奏宗廟神靈務乎安静况懿徳按史志作懿徳據上下文義似疑淑徳廟號不當雜出懿徳但無别本可據謹仍其舊作合之始逮事舅姑躬執婦道祔享之禮宜從後先伏請仍舊又帝母稱皇太后檢詳去嵗議狀請加淑徳太字而詔不加之者縁當時元徳皇太后未行追冊今册命已畢望依禮官所言景徳四年帝祀汾隂謁廟畢親詣元徳皇太后廟躬謝自門降輦歩入酌獻如太廟設登歌遣官分告孝惠諸后廟又詔太廟元徳皇太后廟享用犢諸后廟親享用犢攝事用羊豕仁宗明道二年八月作奉慈廟十月祔莊獻明肅太后劉氏莊懿太后李氏神主於廟帝為莊懿太后所生劉太后撫以為己子帝不知也莊懿在真宗朝為婉儀明道元年始進位宸妃二年莊獻將祔廟燕王為帝言陛下乃李宸妃所生帝感動不視朝累日追尊宸妃為皇太后於是泰寧軍節度使錢惟演請以莊懿莊獻與莊穆皇后郭氏並祔真宗室詔三省與禮院議皆以為莊穆位崇中壺已祔真宗廟室自協一帝一后之文莊獻明肅處坤元之尊莊懿感日符之貴宜崇建新廟同殿異室嵗時薦享一用太廟之儀仍别立廟名以崇世享翰林學士馮元等請以奉慈為名詔從之慶厯中改諡莊並為章二后俱祔太廟序於章穆之次至和元年正月追冊貴妃張氏為后賜諡温成七月詔立温成皇后廟樂章祭器數視皇后廟後以諫官言改為祠殿嵗時令宫臣薦以常饌神宗元豐六年詳定所言案禮夫婦一體故昏則同牢合􅈟終則同穴祭則同几同祝饌未嘗有異廟者也惟周人以姜嫄為禖神而帝嚳無廟又不可下入子孫之廟乃以别廟而祭自漢以來不祔不配者皆援姜嫄為比或以其微或以其繼而已不知始㣲終顯前娶後繼皆嫡也寘之别廟不得申同几之義則非禮意恭惟太祖孝惠皇后太宗淑徳皇后真宗章懐皇后實皆元妃而孝章則太祖繼后乃皆祭以别廟在禮未安請升祔太廟增四室以時配享七月遂自别廟升祔焉髙宗紹興十二年七月上皇后邢氏諡曰懿節髙宗居康邸聘后為婦封嘉國夫人金人至京師夫人從三宫北遷及即位遙册為皇后禮部侍郎施垌言懿節皇后神主候至卒哭擇日祔廟合依顯恭皇后禮於太廟内修建殿室以為别廟三十二年禮部太常寺言故妃郭氏追冊為皇后合依懿節皇后祭於别廟所有廟殿見安懿節皇后神主行禮狹隘乞分為二室以西為上各置户牖王普又請各置祏室並從之金世宗大定二年有司援唐典昭徳皇后合立别廟擬於太廟内垣東北起建從之後以廟制小又於太廟之東别建一位十二年八月廟成正殿三間東西各空半間以兩間為室從西一間西壁上安置祏室廟置一便門與太廟相通仍以舊殿為册寳殿二十六年勅别建昭徳皇后影廟於太廟内有司言皇后廟西有隙地廣三十四歩袤五十四歩可以興建制可仍於正南别創正門以坤儀為名仍留舊有便門遇禘祫祔享由之后烏凌噶氏世宗在濟南時海陵召后來中都后奉詔去濟南至良鄉得間自殺及世宗即位追冊為昭徳皇后後改諡明徳明孝宗即位追上母妃紀氏孝穆太后諡以不得祔廟於奉先殿右别建奉慈殿以祀一嵗五享薦新忌祭俱如太廟奉先殿儀𢎞治十七年以大學士劉健謝遷李東陽議别祀孝肅太后周氏於奉慈殿孝肅太后憲宗生母也先撫育孝宗於宫中及即位事太后至孝不祔廟世宗嘉靖元年十一月别祀孝惠太后邵氏於奉慈殿孝惠太后憲宗妃興獻帝母也世宗入繼大統上尊號曰夀安十五年帝以三太后别祀奉慈殿不若奉於陵殿為宜廷臣議古天子宗廟唯一帝一后所生母薦於寢身没而已孝宗奉慈殿之祭盖子祀生母以盡終身之孝焉耳今陛下於孝肅曾孫也孝穆孫屬也孝惠孫也禮不世祭考宋熈寧罷奉慈廟故事與今畧同宜遷主陵廟嵗時祔享如故報可遂罷奉慈殿二十六年十一月禮臣請奉安孝烈皇后方氏主於奉先殿東夾室帝曰奉先殿夾室非正也可即祔太廟按時廷臣俱以祔廟為不可世宗必欲祔廟預定位次其不經甚矣遂祧仁宗祔后於太廟第九室穆宗隆慶時移后主於𢎞孝殿神宗萬厯三年遷祔奉先殿皇太子及皇子廟唐金元明臣等謹案杜典載皇太子及皇子宗廟一門竊以宗有小大皆本子孫奉祀而言若官為致享則但當稱廟不得稱宗今續輯唐以後太子廟無立後稱宗之事謹刪削宗字以符體制云唐文宗開成三年兵部尚書王起等狀奏三代以降廟制不同伏准國初太子廟散在諸方至天寳六載勅章懐節愍惠宣等太子宜與隱太子列次同為一廟應縁祭事並合官給號為七太子廟又准大厯三年以榮王天寳中追贈静恭太子神主未祔詔祔七太子廟加一室今以懐懿太子神主祔惠昭及悼懐太子廟獻亨得宜請於惠昭太子廟添置一室擇日升祔從之金世宗大定二十五年六月有司奉依唐典故太子置廟設官屬奉祀擬於法物庫東建殿三間南垣及外垣皆一屋三門東西垣各一屋一門門設九㦸齋房神厨度地之宜又奉㫖太子廟既安神主宜别建影殿有司定擬制度於見建廟稍西中門限以磚墉内建影殿三間南面一屋三門垣周以甓無缺角神厨齋房各二屋三間十月廟成奉安宣孝太子神主及畫像元世祖至元二十二年十二月太常博士議明孝皇太子宜立别廟奉祀三十年十月祔於太廟文宗至順二年正月命繪皇太子真容奉安慶夀寺之東鹿頂殿祀之如累朝神御殿儀明世宗嘉靖二十八年帝命莊敬太子與哀冲太子並建寢園嵗時祭祀從諸陵後欽定續通典卷五十一
