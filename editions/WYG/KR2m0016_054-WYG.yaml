body:
  text: 禮吉孔子祠先儒及弟子附元明唐五代宋金唐徳宗建中三年以文宣王裔孫為兖州司馬襲文宣王後憲宗武宗並有是命周太祖廣順二年六月親幸曲阜謁孔子廟拜奠致敬既畢其所奠金花銀爐十數事留於祠所以備享祀遂幸孔林拜孔子墓以孔子裔孫前曲阜縣令孔仁玉復為曲阜縣令仍賜緋魚袋以亞聖顔淵裔孫顔渉為縣主簿仍敕修葺祠宇墓側禁樵採宋真宗大中祥符元年十一月帝幸曲阜備禮謁文宣王廟内外設黄麾仗孔氏宗屬並陪位帝服鞾袍行酌獻禮命官分奠七十二弟子及先儒初有司定儀肅揖帝特展拜以表嚴師崇儒之意復幸孔林以樹擁道降輿乗馬至墓所設奠再拜詔追諡曰𤣥聖文宣王五年以國諱改𤣥聖為至聖祝文進署祭以太牢修飾祠宇給便近十戸奉塋廟仍追封叔梁紇為齊國公二年詔追封十哲為公七十二弟子為侯先儒為伯或贈官顔回兖國公閔損琅琊公冉耕東平公冉雍下邳公宰予臨淄公端木賜黎陽公冉求彭城公仲由河内公言偃丹陽公卜商河東公曽參瑕邱侯顓孫師宛邱侯澹臺滅明金鄉侯宓不齊單父侯原憲任城侯公冶長高宻侯南宫縚龔邱侯公晳哀北海侯曽㸃萊蕪侯顔無繇曲阜侯商瞿須昌侯高柴共城侯漆雕開平輿侯公伯寮夀張侯司馬耕楚邱侯樊須益都侯公西赤鉅野侯有若平隂侯巫馬期東阿侯陳亢南頓侯梁鱣千乗侯顔辛陽穀侯冉孺臨沂侯冉季諸城侯伯䖍沐陽侯公孫龍枝江侯秦冉新息侯秦祖鄄城侯漆雕哆濮陽侯顔高雷澤侯漆雕徒父高苑侯壤駟赤上邽侯林放長山侯商澤鄒平侯石作蜀成紀侯任不齊當陽侯申棖文登侯公良孺牟平侯曹卹上蔡侯奚容蒧濟陽侯句井疆滏陽侯申黨淄川侯公祖句兹即墨侯榮旂厭次侯縣成武城侯左人郢南華侯燕伋汧源侯鄭國朐山侯秦非華亭侯施之常臨濮侯顔噲濟隂侯歩叔乗博昌侯顔之僕宛句侯蘧瑗内黄侯叔仲㑹博平侯顔何堂邑侯狄黒林慮侯邽巽高堂侯孔忠鄆城侯公西輿如臨朐侯公西蒧徐城侯琴張頓邱侯左邱明瑕邱伯公羊高臨淄伯榖梁赤龔邱伯伏勝乘氏伯高堂生萊蕪伯戴聖楚邱伯毛萇樂夀伯孔安國曲阜伯劉向彭城伯鄭衆中牟伯杜子春緱氏伯馬融扶風伯盧植良鄉伯鄭康成高宻伯服䖍滎陽伯賈逵岐陽伯何休任城伯王肅贈司空王弼偃師伯杜預贈司徒范寗新野伯親製𤣥聖文宣王贊命宰相等撰顔子以下贊天禧五年以文宣王裔孫襲封文宣公仁宗至和二年封孔子後為衍聖公神宗元豐六年封孟軻為鄒國公七年以孟子配食文宣王封荀況揚雄韓愈為伯並從祀荀況蘭陵伯揚雄成都伯韓愈昌黎伯元祐初命孔子後子孫襲封奉聖公專主祠事増賜田百頃供祭祀徽宗崇寧元年封孔鯉泗水侯孔伋沂水侯大觀二年繪子思像從祀于左邱明二十四賢之間議禮局言孔子弟子唐㑹要七十七人開元禮止七十二人又去取不一本朝議臣斷以七十二子之説取琴張等五人而去公夏首等十人今以家語史記參定公夏首杜典作守后處公肩定顔祖鄡單罕父黒秦商原亢樂欬亷潔唐㑹要開元禮亦互見之皆有伯爵載於祀典請追贈侯爵使預祭從之封公夏首鉅平侯后處膠東侯公肩定梁父侯顔祖富陽侯鄡單聊城侯罕父黒祁鄉侯秦商馮翊侯原亢樂平侯樂欬建成侯亷潔胙城侯又改封曽參武城侯顓孫師潁川侯南宫縚汝陽侯司馬耕睢陽侯琴張陽平侯左邱明中都伯榖梁赤睢陵伯戴聖考城伯以所封犯先聖諱故也政和三年詔封王安石舒王配享王雱臨川伯從祀五年從太常寺請以樂正子配享兖州鄒縣孟子廟公孫丑以下從祀並加封爵樂正子克利國侯公孫丑夀光伯萬章博興伯浩生不害東阿伯孟仲子新蔡伯陳臻蓬萊伯充虞昌樂伯屋廬連奉符伯徐辟仙源伯陳代沂水伯彭更雷澤伯公都子平隂伯咸邱䝉須城伯高子泗水伯桃應膠水伯盆成括萊陽伯季孫豐城伯子叔乗陽伯欽宗靖康元年右諌議大夫楊時言王安石學術之謬請追奪王爵毁配享之像詔降為從祀孝宗淳熙四年罷王雱從祀理宗淳祐元年以周敦頤封汝南伯張載封郿伯程顥封河南伯程頤封伊陽伯朱熹封徽國公從祀黜王安石景定二年以張栻封華陽伯吕祖謙封開封伯從祀度宗咸淳三年詔封曽參郕國公孔伋沂國公配享先聖封顓孫師陳國公升十哲位復以邵雍封新安伯司馬光從祀其位兖國公郕國公沂國公鄒國公居正位之東面西向北上為配位十哲居殿上分東西向北上為從祀東廡澹臺滅明以下五十二人並西向西廡宓不齊以下五十二人並東向按高宗紹興八年六月以衍聖公孔玠渡江隔絶林廟詔衢州於官田内撥給五頃以奉先聖祀事後玠子孫俱襲封于衢至元始罷金熙宗天眷三年以孔子裔孫襲封衍聖公奉孔子後世宗大定十六年詔立兖州學闕里廟宅子孫年十三以上入學者不限數二十年特授襲封衍聖公為曲阜令封爵如故章宗明昌六年増修曲阜宣聖廟工畢賜衍聖公以下三獻法服及登歌樂一部仍遣太常舊工往教孔氏子弟以備祭禮承安二年加封從祀諸賢舊為公者升國公侯升國侯伯皆升侯元太宗五年六月詔以孔子裔孫襲封衍聖公十二月勅修孔子廟成宗大徳十一年武宗即位詔曰葢聞先孔子而聖者非孔子無以明後孔子而聖者非孔子無以法所謂祖述堯舜憲章文武儀範百王師表萬世者也朕纂承丕緒敬仰休風循治古之良規舉追封之盛典加號為大成至聖文宣王遣使闕里祀以太牢仁宗皇慶二年以宋儒周敦頤程顥顥弟頤張載邵雍司馬光朱熹張栻吕祖謙及故中書左丞許衡從祀孔子廟庭延祐六年追封周敦頤為道國公又封蘧瑗為内黄侯從祀孔子文宗至順元年七月加封孔子父叔梁紇為啟聖王加封顔子復聖公曽子宗聖公子思述聖公孟子亞聖公程顥豫國公程頤洛國公十一月以董仲舒從祀位列七十二子之下順帝元統二年改封顔子考妣又割益都鄒縣牧地三十頃徵其歲入以給常祀至正二十二年禮部定擬楊時李侗胡安國蔡沈真徳秀封爵諡號俱贈太師從祀孔子廟庭封楊時吳國公李侗越國公胡安國楚國公蔡沈建國公真徳秀福國公又改封朱熹為齊國公明太祖洪武二年遣官降香致祭曲阜孔子廟御製祝文衍聖公襲封及授曲阜令並如前代制三年令曲阜廟庭歲官給牲幣俾衍聖公供祀事七年修曲阜廟庭設孔顔孟三氏學二十九年黜揚雄從祀進董仲舒英宗正統八年追封元吳澄為臨川郡公從祀世宗嘉靖九年更正孔廟祀典定孔子諡號曰至聖先師孔子凡及門弟子皆稱先賢餘並稱先儒盡去公侯伯爵號屏撤塑像改製木主仍擬大小尺寸著為定式穆宗隆慶五年以薛瑄從祀神宗萬厯中以羅從彦李侗從祀尋又以陳獻章胡居仁王守仁從祀太公廟唐五代宋金元明唐徳宗建中三年從禮儀使顔真卿奏武成王廟如月令春秋釋奠用諸侯之數樂奏軒縣又詔史館考定可配享者列古今名將凡六十四人圖形焉貞元二年刑部尚書闗播奏太公古稱大賢乃置亞聖配享義有未安又仲尼十哲皆當時弟子今以異時名將列之非類也請但用古今名將配享去亞聖十哲之號自是惟享武成王及留侯而諸將不復祭按杜典載唐立太公廟事至貞元四年兵部侍郎李紓奏止顔真卿闗播疏請在前俱未載入今據禮樂志補輯梁改武成王為武明王廢從祀後唐明宗長興三年太常禮院準國子博士蔡同文奏請武成王廟四壁從祀諸英賢各設籩二豆二簠簋各一爵一周世宗顯徳五年詔春秋上戊釋奠武成王廟每祭差上將軍將軍充三獻官宋太祖建隆三年詔修武成王廟與國學相對仍令檢閲唐末以來謀臣名將勲績尤著者以聞四年帝幸武成廟歴觀圖壁指白起像曰此人殺已降不武之甚何受享於此命去之真宗大中祥符元年加諡太公為昭烈武成王神宗元豐間國子司業朱服言釋奠武成王舊以武學𨽻樞宻院且學官員數少故初獻以祭酒司業而亞獻終獻及讀祝捧幣皆令三班院差使臣充今武學𨽻國子監長貳丞簿官屬已多請並以本監官充攝行事仍令太常寺修入祀儀徽宗宣和五年禮部請加武成王從祀諸人封爵自張良管仲而下凡七十二將擬孔廟七十二賢于釋奠日祀之高宗紹興十一年國子監丞林保奏竊見昭烈武成王享以酒脯不用牲牢非所以右武而勵將士乞今後上戊釋奠用牲牢從之金章宗泰和六年建昭烈武成王廟於闕庭之右麗澤門内其制一遵唐舊禮祀用春秋仲月上戊儀用中祀元制武成王廟立于樞宻院公堂之西以孫武子張良等十人從祀每歲春秋仲月上戊以羊一豕一犧尊象尊籩豆俎爵樞宻院遣官行三獻禮明太祖洪武初禮部奏請立武學如前代故事建武成王廟帝曰立武學是分文武為二輕天下無全才矣三代以上文武兼備用無不宜如太公之鷹揚而授丹書仲山甫之賦政而式古訓召虎之經營而陳文徳豈比後世武學止講韜畧不事經書專習干戈不聞俎豆拘拘於一藝偏長哉今建武學又立武成王廟是近世之陋規也太公宜從祀帝王廟其武成王廟罷之遂為制臣等謹案古之聖賢未有不知兵者孔子曰我戰則克知用兵特聖人盛徳大業中之一事未可以與太學並也自戰國時以太公為兵家之祖後遂有六韜三畧之書流𫝊於世其言頗渉淺鄙如晉乘楚檮杌之類為後人妄作無疑至唐時建武成廟以古來名將配享從祀宋因之設武學遂與太學頡頏實為數百年來非禮之祀且以太公專主武學似其所長在乎戰勝攻取疑無與于道徳性命之故者其言兵已末而所以視太公者益淺事有重之而反輕人有尊之而反卑此類是也明世罷之當矣巡狩唐五代宋遼金元明唐𤣥宗開元二十年十月如潞州命中書門下慮所過囚赦潞州給復三年賜高年粟帛十一月如北都肆赦給復如潞州尋至汾隂大赦免供頓州今歲税賜文武官階勲爵諸州侍老帛武徳以來功臣三品以上一子官民酺三日晉高祖天福二年十一月中書門下奏車駕巡幸所在州縣官人見在駕所祗承者賜㑹並同京官從之宋因唐制車駕巡幸有告至肆覲考制度之儀太祖開寳九年春幸西京賜河南府民今年田租之半真宗朝諸陵所過賜巡警及行郵治道兵卒時服錢履父老綾袍茶帛途中賜衞士緡錢命有司籍所過繫囚逋負者日引對多原釋仍採訪民間疾苦賑恤鰥寡孤獨車服度量權衡有不如法則禁之有竒材異徳政事尤異及孝子順孫義夫節婦或不守亷隅昧于正理者並條析以聞咸平中車駕每出金吾將軍率士二百人執撾周繞謂之禁圍省方増二百人加執劍親王中書樞宻宣徽行圍内餘官圍外遼太宗天顯四年西巡駐蹕涼陘赦繫囚復如南京祠木葉山聖宗統和四年冬幸南京復都民今年租賦十三年正月幸延芳淀詔諸道勸農金熙宗皇統中車駕如東京右諌議大夫程宷上言古者天子巡狩省察風俗審理寃獄問民疾苦以宣布徳澤今鑾輅省方將憲古行事願委之長貳釐整風俗或置匭篋以申寃枉或遣使郡國問民無告皆古巡狩之事也上嘉納之世宗大定元年十一月如中都詔中都都轉運使左淵曰凡宫殿張設毋得増置毋役一夫以擾百姓但謹圍禁嚴出入而已二十四年三月如上京四月次東京給復東京百里内夏秋税租一年在城隨闗年七十者補一官曲赦百里内犯徒二年以下罪元世祖中統二年二月車駕幸開平後升為上都詔減免民間差發罷守隘諸軍秦蜀行省借民錢給軍以今年税賦償之免平陽太原軍站户重科租税四年二月幸上都八月自上都還自後歲以為常成宗武宗以後俱如之明成祖永樂六年詔明年二月巡北京改定巡狩儀車駕將發奏告天地社稷太廟孝陵祭大江旗纛等神軷祭于承天門縁塗當祭者遣官祭將至北京設壇祭北京山川等神車駕至奏告天地祭境内山川宴羣臣耆老賜百官及命婦鈔所過郡縣官吏生員耆老朝見分遣廷臣考覈守令賢否即加黜陟分命給事中監察御史存問高年賜幣帛酒肉七年二月帝啟行命皇太子監國三月至北京御奉天殿受朝賀世宗嘉靖十八年帝幸承天所過望祭北嶽中嶽河瀆遣官祭濟瀆武當山至承天詣獻皇帝廟謁告越四日行告天禮奉獻皇帝配更服皮弁詣國社稷及山川壇行禮次日謁顯陵次日從駕官上表賀遂頒詔如儀回京親謝上帝皇祖皇考遣官告郊廟社稷羣神如初封禪宋明宋太宗太平興國八年兖州父老及瑕邱等七縣民詣闕請封禪上謙讓不允既而羣臣頌功徳請封禪者不可勝計雍熙元年詔以十一月有事於泰山尋以乾元文明二殿災遂詔罷之真宗大中祥符元年兖州父老及諸道貢舉人二千餘人詣闕陳請封禪宰臣王旦又率百官諸軍將校州縣官吏蕃夷僧道父老二萬四千餘人五上表請詔今年十月有事於泰山命翰林太常禮院詳定儀注帝習儀於崇徳殿十月戊子朔禁天下屠殺一月辛夘發京師帝自告廟即蔬食並禁音樂丁未次奉高宫齋於穆清殿庚戌帝服通天冠絳紗袍乗法駕至山門幄次山上置圜臺徑五丈高九尺四陛上飾以青四面如其方色一壝廣一丈圍以青繩三周燎壇在其東南高丈二尺方一丈開上南出户方六尺山下封祀壇四成十二陛如圜丘制上飾以元四面如其方色外為三壝燎壇如山上壇制社首壇八角三成八陛三壝四門如方丘制又為瘞塪于壬地外壝之内又以玉為五牒各長尺二寸廣五寸厚一寸刻字而填以金聨以金繩緘以玉匱置石䃭中正座配位用玉冊六副每簡長一尺二寸廣一寸二分厚三分簡數量文多少匱長一尺三寸檢長如匱厚二寸闊五寸纒金繩五周封以金泥印以受命寳用石䃭藏之䃭鑿中廣深足容玉匱又為石檢十以擫䃭金繩纒之石泥封之泥用石末和五色土為之改服鞾袍乘歩輦登山鹵簿儀衞列山下天門險峻人給横板二長三尺許繫綵兩端施於背膺選從卒推引而上衞士皆給釘鞵供奉馬止于中路自山趾盤道至太平頂凡兩歩一人綵繡相間樹當道者不伐止縈以繒每經陿險必降輦徒歩是夕山下罷警塲明日設昊天上帝位於圜臺奉天書於座左是年正月有黄帛曳左承天門南鴟尾上帝命羣臣拜迎於朝元殿啟封號稱天書太祖太宗並配西北側向帝服衮冕升臺奠獻悉去侍衞命官享五方帝及諸神於封祀壇上飲福酒攝中書令王旦跪稱曰天賜皇帝太一神䇿周而復始永綏兆人三獻畢封金玉匱王旦奉玉匱置於石䃭攝太尉馮拯奉金匱以降將作監領徒封䃭帝登圜臺閲視訖還御幄宰臣率從官稱賀山下𫝊呼萬歲聲動山谷壬子禪祭皇地祇于社首奉天書升壇以祖宗配癸丑御夀昌殿受朝賀大赦天下改乾封縣曰奉符縣徽宗政和六年時蔡京當國將講封禪以文太平預具金繩玉檢及他物甚備迄不能行明成祖永樂十四年祠部郎中周訥請封禪尚書吕震請如訥言帝曰今天下雖無事然水旱疾疫亦間有之豈敢自謂太平之世且聖經未嘗言封禪唐太宗亦不封禪魏徵每以堯舜望其君爾欲處朕於唐太宗之下亦異於徵之愛君矣議遂不行告禮宋元明臣等謹案告禮歴代相承唐宋以來巡狩封禪即位改元俱有告廟之文其制散見各條下今綜考宋元明告禮每代各約舉一二事彚為專條以符杜佑通典之舊云宋太宗雍熙四年詔以來年正月擇日行藉田禮所司詳定儀注大禮使李昉言前典不載告禮今請前二日告南郊太廟仁宗明道元年詔以來歲二月行藉田禮而罷冬至親郊遣官奏告天地宗廟諸陵景靈宫州郡就告嶽瀆宫廟其禮一如端拱之制端拱改元行藉田禮即雍熙四年所定而損益之徽宗時定五禮新儀凡命將出征太史擇日造廟告官清齋行事先詣僖祖神位前以次詣翼宣諸祖室俱酌獻讀祝文若凱旋祭告惟陳俘馘及軍實於南門之外其告禮並如儀寧宗慶元元年吏部員外郎李謙畧言事莫重于登極禮莫急於告廟葢即位必告廟示敬親也告廟必於歲首大其事也請來年正月躬行告廟之禮詔下禮官討論元武宗至大四年三月仁宗即位四月戊申以即位告天地於南郊戊午告於太廟明成祖永樂六年改定巡狩儀車駕將發奏告天地社稷太廟孝陵世宗嘉靖十八年南巡先期帝親奏告皇天于元極寳殿同日告聞皇祖太廟皇考睿宗廟遣官分告北郊成祖列聖羣廟大社稷帝社稷朝日夕月天神地祇用祭服太常寺備脯醢酒果翰林院撰告文歴代所尚宋宋初有司上言國家受周禪周木徳木生火則本朝運膺火徳色當尚赤臘以戌日詔從之太宗雍熙元年布衣趙垂慶上書言本朝當越五代而上承唐為金徳若梁繼唐至本朝亦為金徳國初符瑞色白者不可勝紀皆金徳之應也望改正朔易車旗服色以承天統事下尚書集議常侍徐鉉等議頃以唐末喪亂朱梁簒殺莊宗早編屬籍親雪國仇中興唐祚重新土運以梁室比羿浞王莽不為正統自後相𫝊晉以金漢以水周以木天造有宋運膺火徳況國初祀赤帝為感生帝于今二十五年豈可輕議改易且五運迭遷親承厯數豈可越數姓之上繼百年之運伏請祗守舊章以承天祐從之真宗天禧時光禄寺丞謝絳言國家當黜五代紹唐之土徳以繼聖祖猶漢之黜秦興周之火徳以繼堯大理寺丞董行父又言宋當繼唐為金徳事下兩制議謂漢雖堯之苗裔及序承正統乃越秦而繼周非用堯之行今國家或用土徳即當越唐承隋彌以非順失其五徳𫝊襲之序若越五代而紹唐則晉漢及周咸帝中夏太祖受終周室豈可弗遵𫝊繼之序續於遐邈之統雍熙中徐鉉等議之詳矣其謝絳董行父等所請難以施行詔可享司寒五代宋後唐明宗長興元年冬十月丁酉始藏冰周太祖顯徳元年詔築壇北郊以孟冬祭司寒其藏冰開冰之祭俟冰室成即行之宋太祖建隆二年始置藏冰署修其祀常以四月以黒牡祭於𤣥㝠神乃開冰以薦太廟太宗淳化三年秘書監李至言按詩七月曰四之日獻羔祭韭周之四月今之二月也月令獻羔開冰先薦寢廟詳其開冰之祭當在春分帝命正其禮仁宗天聖新令春分開冰祭司寒於冰井務卜日薦冰於太廟季冬藏冰設祭亦如之神宗元豐中詳定禮文所言熙寧祀儀孟冬選吉日祭司寒春秋左氏𫝊曰古者日在北陸而藏冰西陸朝覿而出之其藏之也黒牡秬黍以享司寒其出之也桃弧棘矢以除其災古者享司寒惟以藏冰啟冰之日孟冬非有事於冰不應祭享今請惟季冬藏冰則享司寒牲用黒牡羊榖用黒秬黍仲春開冰則但用羔又孔頴達注月令曰啟冰唯獻羔桃弧棘矢以禳除凶邪非禮神之物當依孔氏説置於凌室之户從之徽宗大觀四年議禮局言春秋左氏𫝊以少皥有四叔其二為𤣥㝠杜預鄭𤣥皆以𤣥㝠為水官故歴代祀之為司寒則𤣥㝠非天神矣今儀注享司寒禮畢燔燎是以祀天神之禮享人鬼也請罷燔燎而埋祝幣從之按元明無司寒之祭明臣邱濬曰一歲之間有春夏秋冬之時即有寒暑温凉之氣㝠㝠之間必有神以司之古者各因其時而致其祭本朝於春秋二時祭太歲及四時月將之神葢以四時之首合于太歲四時之令分於月將其即古者祭時與寒暑之遺意歟禜唐宋金元明唐𤣥宗天寳十三載秋大霖雨害稼六旬不止九月閉坊市北門葢井禁婦人入街市祭𤣥㝠大社禜明徳門代宗大厯四年四月雨至於九月閉坊市北門置土臺臺上立黄幡以祈晴宋太祖太宗時凡京師水旱稍久帝親禱者則有建隆觀大相國太平興國寺上清太乙宫甚則再幸或撤樂減膳進蔬饌遣官禱者則天齊五龍城隍佛神四廟大相國開寳報慈崇明崇夏五寺及建隆觀令開封祭九龍浚溝黄溝子張子夏信陵君段干木扁鵲張儀吳起單雄信廟至道後又于寺觀建道塲復遣常參官詣岳瀆致祠真宗咸平後祈禱又増玉清昭應景靈宫祥源觀太一宫高宗紹興後每祈水旱則迎天竺寺觀音入城或就明慶寺建道塲或遣官就天竺祈禱理宗端平三年以霖雨害稼命近臣禱于天地宗廟社稷及宫觀嶽瀆等處金世宗大定十七年夏六月京畿久雨遵祈雨儀祈晴命諸寺觀啟道塲祈禱章宗明昌四年五月以久雨禜六月丙辰以晴祭嶽鎮海瀆元時凡遇淫雨不止祈禱山川岳瀆社稷宗廟或命西僧致禱明代凡水旱災傷或躬禱或露告于宫中及奉天殿陛或遣官祭告郊廟陵寢及社稷山川無常儀英宗正統四年以京畿水災祭告天地高禖宋金明宋仁宗未有嗣景祐四年以殿中侍御史張奎請親祀高禖詔有司詳定禮官以為月令雖可據然周官闕其文漢志郊祀不及禖祠惟枚臯𫝊言皇子禖祀而已後漢至江左畧見其事而儀典委曲不可周知惟高齊禖祀最顯妃嬪參享黷而不蠲恐不足法唐明皇因舊月令特存其事開元定禮以後不著朝廷必欲行之當築壇於南郊春分日祀青帝本詩克禋以祓之義配以伏羲帝嚳以禖神從祀依東漢晉隋之舊以石為主牲用太牢樂以升歌儀視先蠶有司攝事祝版具言天子求嗣之意乃以弓矢弓韣致神前祀已與胙酒進内以禮所御使齋戒受之仍歲令有司申請俟㫖命曰特祀詔即用其年春分遣官致祭為圜壇高九尺廣二丈六尺四出陛三壝陛廣五尺壝各二十五歩青石主長三尺八寸用木生成之數形準廟社主植壇上稍北露其首三寸青玉青幣牲用牛一羊一豕一樂章祀儀並準青帝罇器神位如勾芒唯受福不飲回授中人為異寳元二年八月皇子生命輔臣報祀準春分儀惟不設弓矢弓韣著為常祀慶厯三年太常博士余靖言皇祀未廣不設弓矢弓韣非是詔仍如景祐之制嘉祐二年徙禖壇於南郊壇東神宗元豐四年禮官言高禖壇迫狹按祀儀青帝壇廣四丈高八尺今祀高禖既用青帝為主其壇高廣請如青帝之制又言祀天以高禖配今郊禖壇祀青帝以伏羲高辛配復于壇下設高禖位殊為爽誤請準古郊禖改祀上帝以高禖配改伏羲高辛位為高禖而徹壇下之位詔改壇制其典禮如舊徽宗政和時定五禮新儀春分祀高禖以簡狄姜嫄從配皇帝親祠並如祈榖儀高宗紹興元年太常少卿趙子晝請以來春復行高禖之祀從之十七年二月帝親祀高禖如政和之儀金章宗明昌六年二月尚書省臣奏行高禖時帝未有子築壇於景風門外東南端當闕之夘辰地與圜丘東西相望壇如北郊之制毎歲以春分日祀青帝伏羲氏女媧氏凡三位壇上南向西上姜嫄簡狄位於壇之第二層東向北上每位羊豕各一有司攝三獻司徒行事禮畢進胙官備弓矢弓韣以進帝命后妃嬪御皆執弓矢東向而射以次飲福享胙明初無祀高禖禮世宗嘉靖中始設木臺于皇城東永安門北震方壇上皇天上帝南向騂犢蒼璧奉獻皇帝配西向牛羊豕各一高禖在壇下西向牛羊豕各一禮三獻樂九奏舞八佾皇帝位壇下北向后妃嬪位壇南數十丈外北向用帷壇下陳弓矢弓韣如后妃嬪之數祭畢女官導后妃嬪至高禖前跪取弓矢授后妃嬪后妃嬪受而納於弓韣諸雜祠及淫祠興廢唐元五代明宋遼金臣等謹案周禮大宗伯掌建邦之天神人鬼地示之禮其不在祀典者概無致祀之文自秦漢以降神祠遞興唐宋後尤為雜揉非出於流俗之𫝊聞即本於道書之附㑹封號既無定名崇奉亦無常數杜典載雜祠淫祠析為二條今詳考唐以來諸雜祠之尤著者具於篇而其興廢亦縁以見焉又杜典載祈禳祓禊訖於宋齊皆唐以後禮志所不録今並從刪削云唐𤣥宗開元二年詔祠龍池右拾遺蔡孚獻龍池篇公卿以下撰擬共一百三十篇詔太常寺考其詞合音律者為龍池樂章十首又詔増置壇及祠堂每歲仲春將祭則奏之肅宗至徳二年道士李國正奏皇室仙系修崇靈路請於昭應縣南置天華上宫露臺天地婆父三皇道君太古天皇中古伏羲媧皇等祠堂又於縣南扶谷故湫置祠並許之昭應令梁鎮上疏謂天地婆父祀典無文言甚不經義無可取又湫者龍之窟也今湫竭已久龍安所在何必崇飾祠宇豐潔薦奠其三皇五帝則兩京及所都之處已建宫觀祠廟望並於本處依禮齋祭制可後唐明宗天成二年幸白司馬坡祭突厥神宋京城東舊有五龍池因唐禮歲以仲春祭之用中祠禮又有徳安公廟祭夷門山神崔府君廟唐滏陽令寧州普濟王廟祭要冊湫鎮戎軍靈澤廟祭朝那湫鄭州靈顯王廟俗𫝊李靖神炳靈公廟祭泰山三郎靈感廟祭泰山玉女池三水府神祭馬當采石金山杭州吳山廟祭濤神明應公廟祭潤州焦山廣濟王廟祭秦蜀守李冰劍州英顯王廟祭梓潼神張亞子梓州靈濟公廟祭唐涪州刺史陸弼䢼亭廟祭䢼亭湖中蛟神宗元豐三年詔加號江州廬山太平興國觀九天採訪使者為應元保運真君徽宗崇寧元年用方士魏漢津之説備百物之象鑄鼎九於中太一宫南為殿奉安之各周以垣上施埤堄墁如方色外築垣環之名曰九成宫中央曰帝鼐其色黄祭以土王日為大祠幣用黄樂用宫架北方曰寳鼎其色黒通考作白祭以冬至幣用皁東北曰牡鼎其色青通考作白祭以立春幣用皁東方曰蒼鼎其色碧祭以春分幣用青東南曰岡鼎其色緑祭以立夏幣用緋南方曰彤鼎其色紫祭以夏至幣用緋西南曰阜鼎其色黒祭以立秋幣用白西方曰晶通考作皛鼎其色赤祭以秋分幣用白西北曰魁鼎其色白祭以立冬幣用皁八鼎皆為中祠樂用登歌享用素饌復於帝鼐之宫立大角鼎星祠大觀三年詔以鑄鼎之地作寳成宫總屋七十一區中置殿曰神靈以祀黄帝東廡殿曰成功祀夏后氏西廡殿曰持盈祀周成王及周公旦召公奭後置堂曰昭應祀唐李良及隐士嘉成侯魏漢津又詔每歲八月二十七日舉祀事黄帝為大祠成功持盈二殿為中祠昭應堂為小祀並用素饌四年詔天下五龍神皆封王爵政和元年詔開封府毁淫祠一千三十八區仍禁軍民擅立神祠按禮志作神宗熙寧中毁淫祠若干此據本紀輯遼太宗天顯三年四月祭麃鹿神景宗保寧三年十月以黒白羊祀神七年五月祭神姑聖宗統和十六年五月祭白馬神金世宗大定時封䕶國林神嘉䕃侯七月致祭盧溝河神安平侯春秋二次加封黄河神昭應順濟聖后春秋致祭章宗明昌時封旺國崖鎮安公瑪達哈山瑞聖公章宗生於此又立貞獻郡王廟祭頁嚕古紳二人始製女直文字元世祖至元十五年正月封磁州崔府君為齊聖廣佑王七月建漢祖天師正一祠於京城仁宗延祐七年四月時英宗已即位祭遁甲神於香山泰定帝泰定二年七月遣使祀宅神於北部行幄又遣使祀龍虎武當二山文宗天厯元年加封漢前將軍闗羽為顯靈義勇武安英濟王遣官致祭順帝至元三年降香於龍虎三茅皁閣諸山明北京有真武廟洪恩靈濟宫祀徐溫子知證知諤憲宗成化十三年詔建漢夀亭侯廟神宗萬厯時加封三界伏魔大帝神威逺鎮天尊又鳳陽有顯應廟神莫知所自明初禱雨有應滁州有豐山廟柏子潭廟徐州靈源宏濟廟河平神廟平陽平水祠汾水靈澤廟稱白彪山馬跑泉之神沁州南山廟焦龍神廟龍泉神廟兖州青山廟安平鎮顯惠等廟孝宗𢎞治間改張秋為安平鎮建真武龍王天妃三廟賜額顯惠嚴州烏龍廟三月三日祀宜春仰山廟祀宜山二龍神常徳陽山廟祭山神沅山顯應廟祭明山神長沙洞庭廟祀龍四月八日祭馬湖顯應廟祀元人于法福州靈濟宫廣州天妃廟南海真武廟瓊州靈山廟祀毘耶山之神電白靈湫廟誠敬夫人祠祭馮寳妻洗氏皆終明之世有司歲時致祭不絶欽定續通典卷五十四
