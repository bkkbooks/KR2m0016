body:
  text: 明福建廣東廣西福建元置福建道宣慰使司治福州路屬江浙行中書省至正十六年正月改宣慰司為行中書省明太祖吳元年十二月平陳友定洪武二年五月仍置福建等處行中書省七年二月置福州都衛與行中書省同治八年十月改福州都衛為福建都指揮使司九年六月改行中書省為承宣布政使司領府八直𨽻州一屬縣五十七福州府元福州路屬福建道宣慰司明太祖吳元年為府領縣九閩倚侯官倚西北有懐安縣明洪武十二年移入郭内與閩侯官同治萬厯八年九月省長樂福清元福清州明洪武二年二月降為縣連江羅源古田閩清永福興化府元興化路屬福建道宣慰司明洪武元年為府領縣二莆田西北有興化縣正統十三年四月省仙遊建寧府元建寧路屬福建道宣慰司明洪武元年為府領縣八四年正月置建寧都衛於此八年十月改為福建行都指揮使司建安倚甌寧倚建陽崇安浦城松溪政和壽寧景泰六年八月以政和縣楊海村置析福安縣地益之延平府元延平路屬福建道宣慰司明洪武元年為府領縣七南平倚將樂沙尤溪順昌永安本沙縣之浮流巡檢司正統十四年置永安千戶所於此景泰三年改置縣析尤溪縣地益之大田嘉靖十五年二月以尤溪縣之大田鎮置析永安漳平徳化三縣地益之汀州府元汀州路屬福建道宣慰司明洪武元年為府領縣入長汀倚寧化上杭武平清流連城本曰蓮城明洪武十七年後改蓮曰連歸化成化七年正月以清流縣之明溪鎮置析將樂沙縣寧化三縣地益之永定成化十四年以上杭縣溪南里之田心地置析勝運等四里益之邵武府元邵武路屬福建道宣慰司明太祖吳元年為府領縣四邵武倚光澤泰寧建寧泉州府元泉州路屬福建道宣慰司明洪武元年為府領縣七晉江倚南安同安惠安安溪永春徳化漳州府元漳州路屬福建道宣慰司明洪武元年為府領縣十龍溪倚漳浦龍巖長泰南靖漳平成化六年以龍巖縣九龍鄉置析居仁等五里地益之平和正徳十四年六月以南靖縣之河頭大洋陂置析漳浦縣地益之詔安本南詔守禦千戶所𢎞治十八年置嘉靖九年十二月改為縣海澄嘉靖四十五年十二月以龍溪縣之靖海館置析漳浦縣地益之寧洋本龍巖縣之東西洋巡檢司正統十一年置嘉靖四十五年十二月改置縣又析大田永安二縣地益之福寧州元屬福州路明洪武二年八月降為縣屬福州府成化九年三月升為州直𨽻布政司領縣二寧徳明洪武二年屬福州府成化九年来屬福安明洪武二年屬福州府成化九年来屬廣東元置廣東道宣慰使司治廣州路屬江西行中書省又置海北海南道宣慰使司治雷州路屬湖廣行中書省明洪武二年三月以海北海南道屬廣西行中書省四月改廣東道為廣東等處行中書省六月以海南海北道所領并屬焉四年十一月置廣東都衛與行中書省同治八年十月改都衛為廣東都指揮使司九年六月改行中書省為承宣布政使司領府十直𨽻州一屬州七縣七十五廣州府元廣州路屬廣東道宣慰司明洪武元年為府領州一縣十五南海倚番禺倚順徳景泰三年以南海縣大良堡置析新㑹縣地益之東筦新安本東筦守禦千戶所明洪武十四年八月置萬厯元年改為縣三水嘉靖五年五月以南海縣之龍鳳岡置析髙安縣地益之増城龍門𢎞治六年以増城縣之七星岡置析博羅縣地益之香山新㑹新寧𢎞治十一年以新㑹縣徳行都之土坑蓢置析文章等五都地益之從化𢎞冶二年以番禺縣横潭村置析増城縣地益之清逺連州元桂陽州直𨽻廣東道明洪武二年三月省入連州四月連州廢地屬連山三年九月連山廢地屬陽山十四年置連川於此屬府領縣二陽山元屬桂陽州明洪武二年三月桂陽州廢屬連州四月連州廢屬韶州府十四年四月改為連州徙州於桂陽州舊治復置縣屬焉連山元連州治此直𨽻廣東道明洪武二年四月州廢屬韶州府三年九月省入陽山十三年十一月復置十四年四月屬州肇慶府元肇慶路屬廣東道明洪武元年為府領州一縣十一髙要倚髙明本髙要縣髙明鎮巡檢司成化十一年十二月改為縣析清泰等都益之四㑹新興元新州治直𨽻廣東道明洪武二年四月州廢来屬開平本恩平縣之開平屯明末改為縣析新興新㑹二縣地益之陽春元屬南恩州明洪武元年屬新州二年四月新州廢屬府陽江元南恩州治此直𨽻廣東道明洪武元年南恩州廢改屬新州二年四月新州廢屬府恩平本陽江縣之恩平巡檢司初治縣東北之恩平故縣後遷恩平堡成化十四年六月改堡為縣析新興新㑹二縣地益之廣寧嘉靖三十八年十月以四㑹縣地置徳慶州元徳慶路屬廣東道明洪武元年為府九年四月降為州以府治端溪縣省入来屬領縣二封川元封州治此直𨽻廣東道明洪武二年三月州廢改屬開建元屬封州明洪武二年三月改屬韶州府元韶州路屬廣東道宣慰司明洪武元年為府領縣六曲江倚樂昌英徳元英徳州直𨽻廣東道明洪武二年三月降為縣来屬仁化乳源翁源元屬英徳州明洪武二年三月改屬南雄府元南雄路屬廣東道宣慰司明洪武元年為府領縣二保昌倚始興惠州府元惠州路屬廣東道宣慰司明洪武元年為府領州一縣十歸善倚博羅長寧隆慶三年正月以歸善縣鴻雁洲置析韶州府英徳翁源二縣地益之永安降慶三年七月以歸善縣安民鎮置析長樂縣地益之海豐龍川元循州治此直𨽻廣東道明洪武二年四月州廢来屬長樂元屬循州明洪武二年四月来屬興寧元屬循州明洪武二年四月来屬連平州本連平縣崇禎六年以和平縣惠化都置析長寧河源二縣及韶州府翁源縣地益之尋升為州領縣二河源舊屬府崇禎六年改屬州和平正徳十三年八月以龍川縣之和平司置析河源縣地益之屬府崇禎六年改屬州潮州府元潮州路屬廣東道宣慰司明洪武二年為府領縣十一海陽倚潮陽揭陽程鄉元梅州治此直𨽻廣東道明洪武二年四月州廢来屬饒平成化十二年十月以海陽縣三饒地置治下饒惠来嘉靖三年十月以潮陽縣惠来都置析惠州海豐縣地益之鎮平本平逺縣石窟巡檢司崇禎六年改為縣析程鄉縣地益之大埔嘉靖五年以饒平縣大埔村置析􅀈洲清逺二都地益之平逺嘉靖四十一年五月以程鄉縣豪居都之林子營置析福建之武平上杭江西之安逺惠州府之興寜四縣地益之屬江西贛州府四十二年正月還三縣割地止以興寧程鄉地置縣来屬普寧嘉靖四十二年正月以潮陽縣􅚉水都置析洋烏黄坑二都地益之寄治貴山都之貴嶼萬厯十年移治黄坑以洋烏􅚉水二都還潮陽澄海本海陽縣之闢望巡檢司嘉靖四十二年正月改為縣析揭陽饒平二縣地益之高州府元高州路屬海北海南道宣慰司治電白明洪武元年為府七年十一月降為州九年四月復為府後治茂名領州一縣五茂名倚明洪武七年十一月省十四年五月復置電白信宜化州元化州路屬海北海南道明洪武元年為府七年十一月降為州以州治石龍縣省入九年四月又降為縣来屬十四年五月復為州領縣二吳川元屬化州路明洪武九年四月屬髙州府十四年五月改屬州石城元屬化州路明洪武九年四月屬髙州府十四年五月改屬州雷州府元雷州路屬海北海南道宣慰司明洪武元年為府領縣三海康倚遂溪徐聞亷州府元亷州路屬海北海南道宣慰司明洪武元年為府七年十一月降為州九年四月屬雷州府十四年五月復為府領州一縣二合浦倚明洪武七年十一月省十四年五月復置北有石康縣成化八年省欽州元欽州路屬海北海南道明洪武二年為府七年十一月降為州以州治安逺縣省入九年四月降為縣来屬十四年五月復為州領縣一靈山元屬欽州明洪武九年四月屬亷州十四年五月仍屬欽州瓊州府元乾寧軍民安撫司元統二年十月改為乾寧安撫司屬海北海南道宣慰司明洪武元年十月改為瓊州府二年降為州三年仍升為府領州三縣十瓊山倚澄邁臨高定安元至元二十九年六月置天厯二年十月升為南建州明洪武元年十月復為縣文昌㑹同元至元二十九年六月置樂㑹儋州元南寜軍海北海南道宣慰司明洪武元年十月改為儋州屬府正統四年六月以州治宜倫縣省入領縣一昌化萬州元萬安軍屬海北海南道明洪武元年十月改為萬州屬府正統四年六月以州治萬安縣省入領縣一陵水崖州元吉陽軍屬海北海南道宣慰司明洪武元年十月改為崖州屬府正統四年六月以州治寧逺縣省入領縣一感恩舊屬儋州正統五年来屬羅定州元瀧水縣屬徳慶路明洪武元年屬徳慶州萬厯五年五月升為羅定州直𨽻布政司領縣二東安萬厯五年十一月以瀧水縣東山黄姜峒置析徳慶州及高要新興二縣地益之西寧萬厯五年十一月以瀧水縣西山大峒置析徳慶州及封川縣地益之廣西元置廣西兩江道宣慰使司治靜江路屬湖廣行中書省至正末改宣慰使司為廣西等處行中書省明洪武二年三月因之六年四月置廣西都衛與行中書省同治八年十月改都衛為都指揮使司九年六月改行中書省為承宣布政使司領府十一州四十有八縣五十長官司四桂林府元靜江路明洪武元年為府五年六月改為桂林府領州二縣七臨桂倚興安靈川陽朔全州元全州路屬湖廣道明洪武元年為府九年四月降為州省州治清湘縣入焉屬湖廣永州府二十七年八月来屬領縣一灌陽永寧州元古縣明洪武十四年改為古田縣隆慶五年三月升為永寧州領縣二永福舊屬府隆慶五年三月改屬州西南有理定縣舊屬靜江路正統五年九月省義寧舊屬府隆慶五年三月改屬州平樂府元大徳五年十一月置明洪武元年因之領州一縣七平樂倚㳟城富川元屬賀州明洪武十年五月改屬潯州府後来屬賀元賀州直𨽻廣西兩江道明洪武初以州治臨賀縣省入屬潯州府十年五月降為縣来屬荔浦舊屬桂林府𢎞治四年屬修仁舊屬桂林府𢎞治四年来屬昭平萬厯四年四月析平樂富川二縣地置五年又析賀縣地益之東南有龍平縣元屬府明洪武十八年廢永安州元立山縣屬府明洪武十八年廢為立山鄉屬荔浦縣成化十三年二月置州曰永安屬桂林府𢎞治三年九月改為長官司五年復為州来屬梧州府元梧州路明洪武元年為府領州一縣九蒼梧倚藤元藤州直𨽻廣西兩江道明洪武二年九月省州治鐔津縣入焉十月来屬十年五月降為縣容元容州直𨽻廣西兩江道明洪武二年十月来屬十年五月降為縣省州治普寧縣入焉岑溪元屬藤州明洪武十年五月改屬府懷集元屬賀州明洪武初屬平樂府十年五月来屬鬱林州元直𨽻廣西兩江道明洪武二年九月以州治南流縣省入十月来屬領縣四博白北流元屬容州明洪武十年五月来屬陸川元屬容州明洪武十年五月来屬興業潯州府元潯州路明洪武元年為府領縣三桂平倚東北有武靖州成化三年置萬厯末廢平南貴元貴州直𨽻廣西兩江道明洪武二年十月降為縣来屬柳州府元柳州路明洪武元年為府領州二縣十馬平倚元為府屬明洪武元年徙府治於此洛容柳城元為府治明洪武元年徙羅城明洪武二年十月以羅城鄉置屬融州十年五月来屬懐逺元屬融州明洪武十年廢十三年十一月復置縣来屬融元融州直𨽻廣西兩江道明洪武二年十月以州治融水縣省入来屬十年五月降為縣來賓元屬象州明洪武十年五月来屬象州元直𨽻廣西兩江道明洪武二年十月来屬以州治陽奉縣省入領縣一武宣舊曰武仙宣