body:
  text: 禮嘉輦輿宋遼金元明宋太祖建隆四年翰林學士承㫖陶榖為禮儀使創意造為大輦赤質正方油畫金塗銀葉龍鳳装其上四面行龍雲氣火珠方鑑銀絲囊􅃠朱翠結條雲龍鈿窠霞子四角龍頭銜香囊頂輪施耀葉中有銀蓮花坐龍紅綾裏碧牙厭帖内設圓鑑銀絲香囊銀飾勾闌臺坐紅絲絛􅃠帉錔中施黄褥上置御坐扶几香爐錦結綬几衣輪衣絡帶並緋繡壓金銀綫長竿四銀裹鐵鋦龍頭魚鈎錦膊褥銀装畫梯拓义黄羅縁席褥帊梯杖褥朱索緋繒油帊主輦六十四人親祀南郊謁太廟還及具鸞駕黄麾仗省方還都則乗之真宗東封以舊輦太重遂命别造凡减七百餘斤後常用焉神宗已後稍更其制祀畢車駕還内若不進輅則進大輦徽宗政和之制黄質冒以黄衣紘以黄帶車箱四圍於桯之外髙二尺二寸設軾於前楹髙三尺二寸建大旂於後楹旂十二斿其長曳地其色黄繪以交龍日月中興後更製名大安輦宋輦有七中興後惟存大輦平頭逍遥而已赤質正方髙十五尺三寸方十一尺六寸四柱平槃上覆青緑錦上有天輪二層外施金塗銀博山八十一内有圓鏡金塗銀頂龍一四面行龍十六火珠四輪衣以青墜以金鈴頂有青羅十字分垂四角曰絡帶四角出龍首銜犛牛五色尾曰旒綏四面拱斗外施方鏡九柱圍以朱闌中設御坐曲几屏風錦褥下舉以長竿四攅竹筋膠丹漆之竿為龍首平槃下四圍結紅絲􅃠輦官服色武弁黄纈對鳳龍袍黄絹勒帛紫生色袒帶紫絹行縢芳亭輦黑質頂如幕屋緋羅衣裙襴絡帶皆繡雲鳳兩面朱緑牕花版外施紅絲網金銅帉錔前後垂簾下設牙牀勾闌長竿四銀龍頭銀飾梯行馬主輦一百二十人政和之制簾以紅羅繡鵝為額内設御坐長竿飾以金塗銅螭首横竿二鳳輦赤質頂輪下有二柱緋羅輪衣絡帶門簾皆繡雲鳳頂有金鳳一兩壁刻畫龜文金鳳翅前有軾匱香爐香寳結帶下有勾闌二重内設紅錦褥長竿三銀飾梯行馬主輦八十人法駕鹵簿不設逍遥輦以椶櫚為屋赤質金塗銀装朱漆扶版二雲版一長竿二飾以金塗銀龍頭常行幸所御魚鈎帉錔梅紅絛輦官十二人春夏服緋羅衫秋冬服白師子錦襖真宗東封别造辟塵逍遥輦加牕槅黄繒為裏賜名省方逍遥輦中興之制赤質金塗四柱椶屋上有走脊金龍四中起火珠凸頂四面不設襯板中有脚踏子制甚簡素祇應人員服㡌子宜男方勝纈衫平輦又名平頭輦亦曰太平輦制如逍遥輦而無屋輦官十二人服同逍遥輦東封别造升山天平輦施機闗賜名登封輦中興之制赤質正方形如一朱龍椅而加長竿二飾如逍遥輦而不施椶屋制尤簡素惟施畫雲板而已又有七寳輦孝宗隆興二年為徳夀宫製髙五十一寸闊二十七寸深三十六寸比附大輦平輦制度為之上施頂輪耀葉角龍頂龍滴子鐸子結穂毬下施梅紅絲裙網加綴七寳中設香木御座引手為轉身龍靠背為龍首靠枰子綫以紅黄藤舁以長竿二竿首為螭首金塗銀飾焉小輿赤質頂輪下施曲柄加盖緋繡輪衣絡帶制如鳳輦而小下有勾闌牙牀繡瀝水中設方牀緋繡羅衣錦褥上有小案坐牀皆繡衣踏牀緋衣前後長竿二銀飾梯行馬奉輿二十四人中興後去其輪盖方四十九寸髙三十一寸輿上周以勾闌施翟羽玉照子中為方牀三級上設御座曲几踏子曲柄緋羅繡盖輿下紅絲結五色花裙􅃠舉以長竿二竿為螭首宫殿從容所乗設鹵簿則陳之腰輿前後長竿各二金銅螭頭緋繡鳳裙襴上施錦褥别設小牀緋繡花龍衣奉輿十六人中興制赤質方形四面曲闌下結繡裙􅃠制如小輿惟無翟尾玉照子三級牀曲柄盖而上設方御牀曲几竿無螭首用亦同小輿相風烏輿上載長竿竿杪刻木為烏垂鵝毛筩紅綬帶下承以小盤周以緋裙繡烏形輿士四人行漏輿制同鐘鼓樓輿而大設刻漏如稱衡首垂銅鉢末有銅象漆匱貯水渇烏注水入鉢中長竿四輿士六十人十二神輿赤質四門旁刻十二辰神緋繡輪衣絡帶輿士十二人交龍鉦鼓輿各一皆刻木為二青龍相交下有木臺長竿一掛畫鼓一掛金鉦上皆有緋盖亦繡交龍輿士各二人鐘鼓樓輿各一皆刻木為屋中置鐘鼓下施木臺長竿如鉦鼓輿輿士各二十四人其自行漏輿以下舊禮無文皆開寳定禮所増中興後相風行漏十二神鉦鼓四輿皆不設其皇太后皇后所乗則有龍輿龍肩輿東都皇太后垂簾皆抑損逺嫌不肯乗輦止用輿而已真宗咸平中為萬安太后製輿上設行龍六乾興元年詔皇太后御坐檐子名大安輦神宗嗣位尊皇太后為太皇太后其行幸依治平元年之制而皇太后皇后常出止用副金塗銅装白藤輿覆以椶櫚屋飾以鳳輦官服同乗輿平頭輦之制於是詔太皇太后岀入所乗如大萬安太后輿上設行龍六哲宗紹聖元年議造皇太后安輦而皇太后避嫌竟不製造又哲宗嗣位尊朱貴妃為皇太妃出入乗檐子有司請用牙魚鳳為飾繖用青元祐三年太皇太后詔有司尋繹典故於是檐子飾以龍鳯繖用紅九年羣臣議改檐子為輿上設行龍五哲宗以皇太后諭㫖令太妃坐六龍輿出入進黄􅓫於是三省議皇太妃坐龍鳳輿繖紅黄兼用從皇太后出入止用紅紹興奉迎皇太后詔造龍輿其制朱質正方金塗銀飾四竿竿頭螭首赭窻紅簾上覆以椶加走龍六内設黄花羅帳裀褥朱椅踏子紅羅黄羅繡巾二龍肩輿一名椶檐子一名龍檐子舁以二竿故名檐子南渡後所製也東都皇后備厭翟車常乗則白藤輿中興以太后用龍輿后惟用檐子其制方質椶頂施走脊龍四走脊雲子六朱漆紅黄藤織白花龍為障緋門簾㸔窻簾朱漆藤坐椅踏子紅羅裀褥軟屏夹幔遼國輿有大輿柴册再生儀載神主臘儀見皇帝皇后升輿降輿祭山儀皇帝降輿祭東而其制不詳其漢輿有大鳳輦赤質頂有金鳳壁畫雲氣金翅前有軾下有勾闌絡帶皆繡雲龍銀梯主輦八十人芳亭輦黑質幕屋緋欄皆繡雲鳳朱綠夾牕花板紅􅃠兩簾四竿銀飾梯主輦百二十人逍遥輦常用之椶屋赤質金塗銀装紅絛輦官十二人春夏緋衫秋冬素錦服平頭輦常行用之制如逍遥冊承天太后儀太后乗平頭輦無屋又有大芳輦仙逰輦小輦永夀節儀皇太后乗小輦大玉輦小玉輦腰輿前後長竿各二金銀螭頭緋繡鳳襴上施錦褥别設小牀奉輿十六人小輿赤質青頂曲柄緋繡絡帶制如鳳輦而小上有御座奉輿二十四人金大輦赤質正方油畫金塗銀葉龍鳳装其上四面施行龍雲朶火珠方鑑銀絲囊􅃠珠翠結雲龍鈿窠霞子四角龍頭銜香囊頂輪施耀葉中有銀蓮花坐龍紅綾裏碧牙壓帖内設圓鑑香囊銀輪勾欄䑓坐紫絲絛􅃠帉錔中施黄褥上置御座曲几香爐錦結綬几衣輪衣絡帶並緋繡雲龍寳相花金綫壓長竿四飾以金塗銀龍頭畫梯托义行馬七寳輦制如大輦飾以玉裙􅃠七寳滴子用真珠皇后有平頭輦五華輦亭頭輦各髙一丈九尺廣丈五寸長三丈舁士各九十六人並生色緋寳相花衫銀褐抹帶大口袴元腰輿制以香木後背作山字牙嵌七寳装雲龍屏風上施金圈熖明珠兩旁引手屏風下施雕鏤雲龍牀坐前有踏牀噶達爾錦褥一噶達爾䝉古語表也坐上貂䑕縁金錦條褥綠噶達爾方坐象轎駕以象凡巡幸則御之明大馬輦髙一丈二尺五寸九分廣八尺九寸五分轅長二丈五寸有竒輦坐髙三尺四寸有竒餘同大輅輦亭髙六尺四寸有竒紅髹四柱長五尺四寸有竒檻座髙與輅同四周紅髹絛環板前左右有門髙五尺有竒廣二尺四寸有竒門旁槅各二後槅三及明栨皆紅髹抹金銅鈒花葉片装釘槅心編以黄線絛亭内制與大輅同第軟坐上不用花毯而用紅毯亭外用紅簾十二扇輦頂并圓盤髙二尺六寸有竒上下俱紅髹以青飾輦盖其銅龍蓮座寳盖黄屋及天輪輦亭悉與大輅同大常旂踏梯行馬之屬亦同大輅駕以八馬備鞍韉鞦轡鈴纓之飾小馬輦視大馬輦髙廣皆减一尺轅長一丈九尺有竒餘同大馬輦輦亭髙五尺五寸有竒紅髹四柱長五尺四寸有竒檻座紅髹四周絛環板前左右有門髙五尺廣二尺二寸有竒門旁槅各二及明栨後屏風壁板俱紅髹用抹金銅鈒花葉片装釘亭底紅髹上施紅花毯紅錦褥席外用紅簾四扇駕以四馬餘同大馬輦步輦髙一丈二尺二寸有竒廣八尺二寸有竒輦坐髙三尺二寸有竒四周雕木五彩雲渾貼花龍板十二片間以渾貼金仰覆蓮座下雕木線金五彩雲板十二片轅四紅髹中二轅長三丈五尺九寸左右二轅長二丈九尺五寸有竒俱以鍍金銅龍頭龍尾装釘輦亭髙六尺三寸有竒四柱長六尺二寸有竒檻座紅髹四周雕木沉香色描金香草板十二片抹金銅鈒花葉片装釘前左右有門髙五尺七寸有竒廣二尺四寸有竒門旁紅髹十字槅各二雕飾沉香色描金雲龍板八片下雲板如其數後紅髹屏風上雕沉香色描金雲龍五屏後雕沉香色描金雲龍板三片又雲板如其數俱用抹金銅鈒花葉片装釘餘同馬輦唯紅簾用十扇輦頂并圓盤髙二尺六寸有竒其蓮座輦盖天輪幰衣之屬俱同馬輦大凉步輦髙一丈二尺五寸有竒廣一丈二尺五寸有竒四面紅髹匡装雕木五彩雲板二十片間以貼金仰覆蓮座下紅髹如意絛環板如其數紅髹轅六中二轅長四丈三尺五寸有竒左右二轅長四丈有竒外二轅長三丈六尺五寸有竒前後俱飾以雕木貼金龍頭龍尾輦亭髙六尺五寸有竒廣八尺五寸有竒四柱紅髹前左右有門髙五尺八寸有竒廣二尺五寸有竒四周描金香草板十二片門旁槅各二後槅三及明栨皆紅髹編以黄線絛亭底上施墊氊加紅錦褥并席紅髹坐椅一四周雕木沉香色描金寳相花靠背褥裙帷幔與馬輦同内設紅髹卓二紅髹闌干香卓一闌干四柱首俱雕木貼金蹲龍鍍金銅龍盖香爐一并香匙箸瓶紅錦墩二外紅簾三輦頂髙二尺七寸有竒鍍金銅寳珠頂帶仰覆蓮座髙一尺三寸有竒垂攀頂黄線圓絛四頂用丹漆上冒紅氊四垂以黄氊為如意雲黄氊縁條四周施黄綺瀝水三層每層百三十二摺間繡五彩雲龍文或用大紅羅冒頂以黄羅為如意雲縁條瀝水亦用黄羅頂下四周以紅氊為帷黄氊縁條四角鍍金銅雲四亭内寳盖繡五龍頂以紅髹木匡冒以黄綺為黄屋頂心四周繡雲龍各一輦亭四角至輦座用攀頂黄線圓絛四并貼金木魚輦亭前左右轉角闌干二扇後一字帶轉角闌干一扇皆紅髹雕木渾貼金龍間以五彩雲板闌干内四周布席其闌干十二柱之飾及踏梯之屬俱與馬輦同其紅板轎即古肩輿遺制髙六尺九寸有竒頂紅髹近頂装圓匡蜊房窻鍍金銅火􅆋寳帶仰覆蓮座四角鍍金銅雲朶轎扛二前後以鍍金銅龍頭龍尾装釘有黄絨墜角索四周紅髹板左右門二用鍍金銅釘鉸轎内紅髹匡坐椅一福夀板一并褥椅内黄織金綺靠坐褥四周椅裙下鋪席並踏褥有黄絹轎衣油絹雨衣各一青氊衣紅氊縁條雲子宋中興以後皇后常乗龍肩輿又以征伐道路險阻詔百官乗轎名曰竹轎子亦曰竹輿元皇帝用象轎至用紅板轎則自明始也世宗嘉靖十三年謁廟帝及后妃俱乗肩輿出宫至奉天門降輿升輅穆宗隆慶四年設郊祀慶成宴帝乗板輿由歸極門出入皇極門至殿上降輿欽定續通典卷六十四
