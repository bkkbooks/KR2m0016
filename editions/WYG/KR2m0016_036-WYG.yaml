body:
  text: 職官州郡上司𨽻校尉司𨽻周官唐時已無元宗開元十七年置京都兩畿按察使二十年改曰採訪處置使天寳末又兼黜陟肅宗乾元元年改曰觀察處置使掌察所部善惡即隋以前司𨽻之職也宋沿唐制亦置觀察使又置提㸃開封府界諸縣鎮公事掌察畿内縣鎮刑獄盜賊塲務河渠之事遼南面官中京東京上京皆有觀察使司又置採訪使太宗㑹同三年命于固靈為採訪使皆非司𨽻之職其五京警巡院有警巡使警巡副使中京有巡邏使司聖宗開泰中耶律古裕為中京巡邏使即古司𨽻也金諸京置警巡院使掌平理獄訟警巡别部總判院事副一人掌警巡之事判官二人掌檢稽失簽判院事元上都有警巡院達嚕噶齊警巡使各一人副使二人判官二人屬留守司大都路兵馬都指揮使司有都指揮使二人副指揮使五人知事一人掌京城盗賊姦偽鞫捕之事世祖至元九年以刑剖尚書一人提調司事其屬有左右警巡二院置達嚕噶齊使各一人副使判官各一人又置大都警巡院達嚕噶齊使各一人副使判官二人明有巡視五城御史又置中東西南北五城兵馬指揮司各指揮一人副指揮四人吏目一人巡捕盗賊疏理街道溝渠及巡視火禁之事其不職者巡城御史糾劾之又置巡按御史北直𨽻二人南直𨽻三人所按藩服大臣府州縣官諸考察舉劾尤専大事奏裁小事立斷與漢司𨽻唐京畿採訪使職位皆同州牧刺史州牧刺史漢以後皆為監郡大臣或統領軍事其職在按治所部官吏權位綦重唐髙祖武徳以後罷郡置州改太守為刺史官名雖存職非其舊故唐之採訪處置使理於所部之大郡天寳末兼理黜陟即古之州牧刺史也互見司𨽻校尉乾元元年改曰觀察處置使其東都西都北都置牧各一人掌宣徳化嵗巡屬員觀風俗録囚恤鰥寡宋開封府河南應天府皆置牧次府亦置牧而觀察使及諸州刺史皆無定員又置提㸃刑獄公事掌察所部獄訟兼舉刺官吏之事遼南面方州官無牧有某州刺史金諸州置刺史一人其刺史紀綱一州之衆務其上京東京等處置按察司糾察貪官汚吏豪猾之人並勸農桑職與唐之採訪處置使同元至元三年定一萬五千戸之上者為上州六千戸之上為中州六千戸之下為下州二十年既平宋又定其地五萬戸之上者為上州三萬户之上者為中州不及三萬户者為下州毎州置達嚕噶齊無刺史其江南諸道行御史臺陜西諸道行御史臺及各道肅政亷訪司職掌監臨諸省統制各道憲司詳載御史臺門内亦唐採訪使之遺制也明州次於府凡州有二屬州則𨽻於府直𨽻州則視府而秩次於府無刺史之官設總督巡撫提督經略贊理巡視撫治於各省加都御史或副僉都御史銜詳載御史臺贊軍務理粮儲巡視所部舉劾其所屬官吏位崇於唐之採訪使職亞於古之持節刺史焉總論州佐别駕從治中典主簿佐功曹書佐事部郡國事郡書祭酒從中正漢時分天下為十二州州刺史之佐有别駕治中主簿功曹書佐部郡國從事史典郡書佐祭酒從事等官其中正一官始於陳勝為楚王時而晉以後廢置不一歴代互相因襲雖小更變而大抵不異至隋以州為郡無復軍府州府之吏變為郡官自後皆然故州佐之官别載於郡丞篇今舉官之擬於州刺史者臚列其佐職於左唐十五道觀察使有副使支使判官掌書記推官巡官衙推隨軍要籍進奏官各一人金按察使有副使簽事判官知事知法等官元行御史臺有經歴都事照磨架閣庫管勾承發管勾兼獄丞等官其肅政亷訪司有經歴知事照磨兼管勾等官都督總管節度團練都統等使附唐制大都督府都督一人長史一人司馬二人録事㕘軍事一人録事二人功曹㕘軍事倉曹㕘軍事戸曹㕘軍事田曹㕘軍事兵曹㕘軍事法曹㕘軍事士曹㕘軍事各一人㕘軍事五人市令一人文學一人醫學博士一人中都督府都督一人别駕一人長史一人司馬一人録事㕘軍事一人録事二人功曹㕘軍事倉曹㕘軍事戸曹㕘軍事田曹㕘軍事兵曹㕘軍事法曹㕘軍事士曹參軍事各一人參軍事四人市令一人文學一人醫學博士一人下都督府都督一人别駕一人長史一人司馬一人録事參軍事一人録事二人功曹參軍事倉曹參軍事戸曹參軍事田曹參軍事兵曹參軍事法曹參軍事士曹參軍事各一人參軍事三人文學一人醫學博士一人都督掌督諸州兵馬甲械城隍鎮戍糧廩總判府事唐初曰總管後改為都督惟朔方仍稱大總管宋大都督府有都督長史左右司馬録事參軍司戸司法司士司理文學參軍助教大都督及長史掌司牧尹與唐制畧相似南渡後以見任宰相充都督次有同都督有督視軍馬多執政為之雖名稱略同然掌總諸路軍馬督䕶諸將非舊制比也髙宗紹興二年吕頤浩以左僕射出都督江淮兩浙荆湖諸軍事置司鎮江其後趙鼎張浚湯思退皆以宰相兼之頤浩還朝孟庾始以參知政事為權同都督代後落權字趙鼎先以知樞宻院事為都督川陜荆襄諸軍事其後與浚並相並帶兼都督諸路軍馬入銜未幾浚獨被㫖江上視師置都督行府行移文字並依三省體式其召赴行在以其事分𨽻三省樞宻院思退初以左相出都督時楊存中即以太傅寜逺軍節度使同都督思退不行即以楊存中充都督非宰執而為都督自存中始後葉義問以知樞宻院事督視江淮荆襄軍馬汪徹以參知政事湖北京西路都督視軍馬執政為督視於是見焉王之望辭同都督有曰朝廷於兩淮前以二大將為招撫使後以二從臣為宣諭使憂其不相統攝則以宰相為都督欲事權歸一也此可見朝廷開府之意凡簽㕔文字並依尚書左右司樞宻院檢詳房體式設屬諮議軍事㕘謀參議並以從官充書寫機宜文字幹辦官凖備差遣前後員數不一至開禧用兵或以簽樞督視或以元樞代之或以㕘知政事督視四川軍馬然皆未有底績而罷又府州軍監有兼都總管者太原府延安府慶州渭州熙州秦州則兼經略安撫使馬步軍都總管定州真定府瀛州大名府京兆府則兼安撫使馬步軍都總管葢宋制以文武官㕘為知州軍事各相鈐制軍監則加是銜非唐之總管也遼㑹同二年置遼陽大都督府以都督和勒博等關防遼陽東都為南面官其總管北面官則有南京都總管府興宗重熙四年改為都元帥府又置南京兵馬都總管府有兵馬都總管有總領南面邊事有總領南面軍務事有總領南面戍兵等官其南面官則五京皆有都總管府又有諸軍兵馬都總管府兵馬都總管兵馬副總管又有兵馬都總管府歸聖軍兵馬都總管府五州都總管府穆宗應歴初耶律蘇色為義霸祥順聖五州都總管山後五州都管司聖宗統和四年普努寜為山後五州都管金海陵正隆六年置左右領軍大都督府三十二總管有神䇿神威神㨗神鋭神毅神翼神勇神果神略神鋒武勝武定武威武安武㨗武平武成武毅武鋭武揚武翼武震威定威信威勝威㨗威烈威毅威震威略威果威勇之號其諸總管府皆載入郡太守篇元文宗天厯二年立欽察親軍都督府後改為大都督府置大都督三人同知二人副都督三人僉事都督二人經歴二人都事二人管勾一人照磨一人其屬有左右欽察衛龍翊衛哈喇婁萬戸府官屬詳載司農卿諸屯監中其總管府則有管領齊哩克昆諸色民匠都總管府達嚕噶齊一人總管同知各一人副總管二人經歴知事提控案牘照磨管勾各一人隨路諸色人匠都總管府達嚕噶齊一人總管二人同知一人副總管二人經歴知事照磨提控案牘各一人管領大都等路打捕鷹房臙粉人戸總管府達嚕噶齊總管首領官各一人管領本投下大都等路齊哩克昆民匠總管府達嚕噶齊總管同知副總管各一人管領諸路齊哩克昆民匠都總管府達嚕噶齊總管各一人同知副總管各二人經歴知事提控案牘兼照磨各一人汴梁等路管民總管府達嚕噶齊總管同知府判各一人經歴知事提控案牘各一人江淮等處財賦都總管府達嚕噶齊總管同知各一人副總管二人經歴知事照磨兼提控案牘各一人隨路諸色民匠打捕鷹房都總管府達嚕噶齊二人都總管同知各一人副總管二人經歴知事提控案牘各一人管領保定等路阿哈探馬兒諸色人匠總管府達嚕噶齊總管同知副總管各一人知事一人管領打捕鷹房民匠達嚕噶齊總管府達嚕噶齊總管同知副總管知事各一人管領隨路諸色民匠打捕鷹房等戸總管府達嚕噶齊總管同知副總管知事各一人管領隨路打捕鷹房諸色匠齊哩克昆總管府達嚕噶齊總管同知副總管各一人經歴知事提控案牘兼照磨各一人隨路打捕鷹房諸色民匠總管府達嚕噶齊總管同知副總管知事各一人尚供總管府達嚕噶齊總管同知副總管判官一人經歴知事提控案牘各一人雲需總管府達嚕噶齊總管同知副總管判官各一人經歴知事提控案牘各一人大都路管領諸路打捕鷹房總管府達嚕噶齊總管副達嚕噶齊同知副總管各一人經歴知事各一人昭功萬戸府屬管領諸路打捕鷹房納綿等戸總管府達嚕噶齊都總管同知治中府判各一人經歴知事提控案牘各一人諸府所掌率皆帝后諸王鄂爾多位下事務及管領造作採捕諸色人匠或各屯佃戸不治兵馬與前代制度稍異其諸路總管府别載於郡太守篇明中軍左軍右軍前軍後軍五都督府互見武官上中篇毎府有左右都督都督同知都督僉事其屬有經歴都事都督掌軍旅之事各領其都司衛所以達於兵部不開府辟屬於外省非唐宋時之都督也亦無總管節度使始於唐有節度使副大使知節度事行軍司馬副使判官支使掌書記推官巡官衙推各一人同節度副使十人館驛巡官四人府院法直官要籍逐要親事各一人隨軍四人節度使封郡王則有奏記一人兼觀察使又有判官支使推官巡官衙推各一人又兼安撫使則有副使判官各一人兼支度營田招討經略使則有副使判官各一人支度使復有遣運判官巡官各一人節度使掌總軍旅顓誅殺初授具帑抹兵仗詣兵部辭見賜雙旌雙節宋初節度使無職掌無定員思數與執政同以待宗室近屬外戚國壻年勞久次者又遵唐制以節度使兼中書令侍中中書門下平章事皆謂之使相以待勲賢故老及宰相久次罷政者隨其舊職或檢校官加節度使出判大藩通謂之使相徽宗宣和末節度使五六十人議者以為濫南渡後諸將有兼兩鎮三鎮者實為希濶之典其後相承宰執從官及后妃之族拜者不一遼北面官其大郡族有某部節度使副使判官其屬國亦有某國某部節度使副使聖宗統和二十九年専置準布國扎拉部諸部别部節度使司南面官上京道懷州等十二軍東京道開州等二十一軍中京道成州等七軍南京道幽州等二軍西京道雲中等六軍皆置節度使副使同知節度使事其屬有行軍司馬軍事判官掌書記衙官金諸節鎮節度使一人掌鎮撫諸軍防刺總判本鎮兵馬之事元明皆無團練使唐肅宗乾元元年置有團練使副使判官推官巡官衙推各一人團練使以安民為上考懲姦為中考得情為下考宋團練使無定員遼各州皆置團練使副使判官又置諸軍都團練使司團練使副使判官漢軍都團練使司金不設元順帝至正十八年置奉元延安等處團練安撫勸農使司於耀州鞏昌等處團練安撫勸農使司於邠州以行省丞相托多行臺大夫鄂勒哲特穆爾領之各設㕘謀一人毎道置使二人同知副使各二人檢督六人經歴知事照磨各二人明無都統置於唐天寳之末代宗大厯八年罷宣宗大中後以康承訓討徐州以王鐸討黄巢皆為都統宋有諸軍都統制副都統制統制統領舊制出師征討諸將不相統一則㧞一人為都統制以總之未為官稱也髙宗建炎初置御營司擢王淵為都統制名官自此始其後神武五軍及川陜宣撫使都督府樞宻院皆置遼北面官北大王院有北院都統軍司南大王院有南院都統軍司北面邊防官有東京都統軍使司保州都統軍司東北路都統軍使司道宗大安六年置有掌法官南京都統軍司東路都統軍使司西南面都統軍司山西兵馬都統軍司又北面行軍官有行軍都統所有行軍都統行軍副都統先鋒都統所左右翼及中軍都統所御營都統所河南道北道東北面西北面西南面各有行軍都統所金正隆六年立三道都統制府元明皆無都䕶唐制大都䕶府大都䕶一人副大都䕶二人副都䕶二人長史司馬録事參軍事各一人録事二人功倉户兵法各曹㕘軍事各一人㕘軍事三人宋遼金皆不設元置都䕶府官屬聫掌詳諸卿大理寺明不設唯世宗幸承天以郭勲為都䕶大將軍欽定續通典卷三十六
