曹差除更改事畫黄到即報臺又改六察旬奏為季奏元符二年詔吏部守令課績最優者闗臺考察不實者重行黜責徽宗崇寧二年都省申明臺官職在繩愆糾繆自宰臣至百官三省至百司不循法守有罪當劾者皆得糾正政和七年中丞王安石奏以本臺覺察彈奏事刋為一書録本給付從之欽宗靖康元年詔宰臣不得薦舉臺官舊臺令御史上下半年分詣行省樞宻院㸃檢諸房文字輪詣尚書六曹按察奉行稽違付受差失咸得糾彈渡江後稍濶不舉髙宗紹興三年始復其舊是年殿中侍御史常同言元豐始置六察上自諸部寺監下至廩庫場務無不分𨽻近有夤緣申請乞不𨽻臺察者恐非法意宜遵舊制從之孝宗乾道二年詔自今非曽經兩任縣令不得除監察御史仁宗嘉祐中程顥權監察御史前後奏説最多要以正心窒欲求賢育才為先常言人主當防未萌之欲帝嘉納之又傅堯俞為監察御史朱晦子頴士以内降監汳口鎮而都水監復薦之堯俞言宻院既不治頴士求内降罪而都水又安知其可用而舉之上下相結迭為阿徇其盗名器将不但一汳口而已乃罷頴士權倖憚焉又張戩除監察御史争新法章數十上最後言今大惡未去横斂未除不正之司尚存無名之使方擾又詣中書争之王安石以扇掩面而笑戩曰戩之狂直當為參政所笑天下之人笑參政亦不少矣遼御史臺無監察御史金御史臺監察御史十二人掌糾察内外非違刷磨諸司察帳并監祭禮及出使之事凡選監察御史尚書省具才能者疏名進呈以聴制任滿御史臺奏其能否仍視其所察公事具書於解由以送尚書省如所察事皆無謬戾為稱則有陞擢庸常者臨期取㫖不稱者降除任未滿者不許改除至二十七年前常令六十以上者為之後臺官以年老多廢事乃勅尚書省於六品七品内取六十以下㢘幹者備選大定二十九年令臺官得自辟舉章宗明昌三年復命尚書省擬註每一缺或具三人或五人取㫖授之宣宗貞祐五年詔監察御史所彈事同列不得與聞元御史臺置監察御史三十三人司耳目之寄任刺舉之事至元五年始置十一人八年増置六人十九年又増置一十六人二十二年參用南儒二人中統時魏初拜監察御史帝宴羣臣於上都行宫有不能飲大巵者免其冠服初上疏曰臣聞尊卑之禮不可不肅昨聞錫宴大臣威儀弗謹非所以尊朝廷正上下也疏入帝欣納之仍諭侍臣曰自後母為此舉又馬祖常為監察御史彈劾不避權貴聲震一時明監察御史一百十人較前代為最多主糾察内外百司之官邪或露章面劾或封章奏劾分十三道惟河南道監察御史獨專諸内外考察其餘各道協管兩京直𨽻衙門浙江道監察御史十人協管中軍都督府在京府軍左金吾左金吾右金吾前留守中神䇿應天和陽廣洋武功中武功後茂陵十二衛牧馬千户所及直𨽻廬州府廬州六安二衛江西道監察御史十人協管前軍都督府在京府軍前燕山左龍江左龍江右龍驤豹韜天策寛河八衛及直𨽻淮安府大河邳州九江武清龍門各衛福建道監察御史七人協管户部寳鈔提舉司抄紙印鈔二局承運廣恵廣積廣盈贓罰甲乙丙丁戊字天財軍儲供用行用各庫在京金吾後武城中飛熊武功左武功右武功前獻陵景陵裕陵泰陵十衛及直𨽻常州池州二府定邊開平中屯二衛吴峪千户所四川道監察御史七人協管工部營繕所文思院御用司設神宫尚衣都知等監惜薪司兵仗銀作中帽鍼工器皿盔甲軍器寶源皮作鞍轡織染柴炭抽分竹木各局僧道録司在京府軍濟州大寜前蔚州左永清左五衛蕃牧千户所及直𨽻松江府廣徳州金山懷安懷來各衛神木千户所播州宣慰司石砫酉陽等宣撫司天全六畨招討司陜西道監察御史八人協管後軍都督府大理寺行人司在京府軍後鷹揚興武義勇右横海江隂康陵昭陵八衛敢勇報効二營韓秦慶安化四府及直𨽻和州保定左右中前四衛雲南道監察御史十一人協管順天府廣備庫在京羽林前通州二衛及直𨽻永平廣平二府通州左通州右涿鹿涿鹿左涿鹿中宻雲中宻雲後永平山海盧龍撫寜東勝左東勝右大同中屯營州五屯延慶延慶左延慶右萬全左萬金右各衛居庸闗黄花鎮寛河武定各千户所河南道監察御史十人協管禮部都察院翰林院國子監太常寺光禄寺鴻臚寺尚寳司中書舍人欽天監太醫院司禮尚膳尚寳直殿等監酒醋局鐘鼓司教坊司在京羽林左留守前留守後神武左神武前彭城六衛伊唐周鄭四府及兩淮鹽運司直𨽻揚州大名二府揚州髙郵儀真歸徳寜山潼闗神武右各衛泰州通州汝寧各千户所廣西道監察御史七人協管通政司六科在京燕山右燕山前大興左騰驤左騰驤右武驤左鎮南瀋陽左㑹州富峪忠義前忠義後十二衛及直𨽻安慶徽州保定真定四府安慶新安鎮武真定各衛紫荆闗倒馬闗廣昌各千户所廣東道監察御史七人協管刑部應天府在京虎賁左濟陽武驤右瀋陽右武功左武功右孝陵長陵八衛及直𨽻延慶州開平中屯衛山西道監察御史八人協管左軍都督府在京錦衣府軍右留守左驍騎左驍騎右龍虎龍虎左大寧中義勇前義勇後英武水軍左十二衛晉府長史司及直𨽻鎮江太平二府鎮江建陽瀋陽中屯各衛平定蒲州二千户所山東道監察御史十人協管宗人府兵部㑹同館御馬監典牧所大通闗在京羽林右永清右濟川三衛及中都留守司遼東都司直𨽻鳳陽府徐滁二州中都留守左留守中鳳陽鳳陽中鳳陽右皇陵長淮懷逺徐州滁州泗州夀州宿州武平沂州徳州徳州左保定後瀋陽中各衛洪塘千户所湖廣道監察御史八人協管右軍都督府五城兵馬司在京留守右武徳忠義右虎賁右廣武水軍右江淮永陵八衛遼梁岷吉華陽五府荆襄楚三府長史司及興都留守司直𨽻寧