body:
  text: 職官御史臺唐肅宗至徳以後諸道使府參佐皆以御史為之謂之外臺復有檢校裏行内供奉或兼或攝諸使下官亦如之武宗會昌初升大夫中丞品東都留臺有中丞一人侍御史一人殿中侍御史二人監察御史主留臺務三院御史皆不常備焉宋置御史臺其制與唐畧同有御史大夫中丞侍御史殿中侍御史監察御史等官凡遇大事則廷辨小事則奏彈凡祭祀朝會則率其屬正百官之班序真宗咸平四年以御史二人充左右巡使文官右巡主之武官左巡主之糾其違失常參班簿禄料假告皆主之祭祀則兼監祭使掌受誓戒致齋檢視糾劾又有廊下使専掌入閣監食監香使掌國忌行香皆臨時充神宗元豐正官名悉罷之遼置御史臺設大夫中丞侍御等官金制與宋畧同登聞檢院亦𨽻御史臺凡御史多有出使者元始無臺職世祖至元五年始設臺建官制與唐宋畧同惟諸道皆設行臺其品秩與内臺同凡諸道肅政㢘訪使皆𨽻於内臺明初亦置御史臺設左右御史大夫御史中丞侍御史治書侍御史殿中侍御史監察御史等官尋罷御史臺更置都察院設監察都御史八人分監察御史為浙江河南山東北平山西陜西湖廣福建江西廣東廣西四川十二道各道置御史或五人或三四人每道鑄印二一畀御史久次者掌之一藏内府有事受印以出既事納之文曰繩愆糾繆以秀才李原明為都御史吳荃等為試監察御史太祖洪武十六年都察院設左右都御史左右副都御史左右僉都御史二千三年左副都御史袁泰言各道印篆相同慮有詐偽乃更鑄監察御史印曰某道監察御史印巡按印曰巡按某處監察御史印惠帝建文元年改設都御史一人革僉都御史二年改為御史府設御史大夫改十二道為左右兩院設御史二十八人成祖永樂元年悉復舊制洪熙宣徳以後凡在外之督撫經畧等員兼銜以便行事具御史大夫篇御史之居職奉差者名數實繁具監察倚御史篇盖所以寄其察姦糾弊之權者較前代為特詳焉御史大夫唐御史大夫一人為御史長官掌以刑法典章糾正百官之善惡至徳中韋陟為御史大夫時右拾遺杜甫上表論房琯尚有大臣度真宰相器帝令陟同崔光逺顔真卿同訊之陟入奏甫所陳讜言不失諫臣體帝由是疏之崔渙為御史大夫時元載輔政與中官董秀蟠結固寵渙因進見面劾之帝黙然宣宗大中時李景讓為御史大夫甫視事即劾免御史孫玉汝等威肅當朝凡有御史彈劾必先白大夫大事以方幅小事署名而已至徳以後率有以大夫為宰臣者徳宗建中二年盧杞以御史大夫為門下侍郎兼中書門下平章事貞元五年竇參以御史大夫為中書侍郎同門下平章事憲宗元和十三年李夷簡以御史大夫為門下侍郎同中書門下平章事武宗會昌元年陳夷行以御史大夫為門下侍郎同中書門下平章事宣宗大中三年崔鉉以御史大夫守門下侍郎同中書門下平章事蓋重職也五代惟後唐明宗天成元年以李琪為御史大夫自後不復除宋初御史大夫不除正員為加官檢校官帶憲銜有至檢校御史大夫者官制行亦並除去遼南面官有御史大夫太宗會同元年以耶律呼哩為御史大夫金初置御史大夫掌糾察朝儀彈劾官邪勘鞫官府公事凡内外刑獄所屬理斷不當有陳訴者付御史臺治之元御史臺置於至元五年設御史大夫一人後又増一人掌糾察百官善惡政治得失順帝至正六年賀惟一拜御史大夫故事臺端非國姓不授因賜䝉古姓而改其名額琳沁巴勒拜御史大夫性剛正動有禮法盡選中外㢘能之官置諸風憲一時號稱得人十四年置江南行御史臺於揚州尋徙杭州又徙江州二十三年遷於建康以監臨東南諸省統置各道憲司而總諸内臺置御史大夫一人品秩與内臺等領中丞御史等官統淮東淮西湖北淛東淛西江東江西湖南八道提刑按察司十五年増江南湖北嶺南廣西福建廣東三道二十三年以淮東淮西山南三道撥𨽻内臺三十年又增海北海南一道成宗大徳元年定為江南諸道行御史臺自御史大夫以下設官九員以監江淛江西湖廣三省統江東江西淛東淛西湖南湖北廣東廣西福建海南十道是年置陜西諸道行御史臺統漢中隴北四川雲南四道置御史大夫一人其品秩悉與内臺同至元中姜衛拜行臺御史大夫奏曰陛下以臣為耳目臣以監察御史按察司為耳目倘非其人是臣之耳目先自閉塞下情何由上達帝嘉之命御史臺清其選英宗至治中桑節為行臺御史大夫時承平日久内外方以觀望為政桑節獨持風裁御史行部必勅厲而遣之時有所屬御史彈劾不實桑節奏白之及至正之末於福建更設分臺時政紛淆用人非次不足編紀明初置御史臺設左右御史大夫諭之曰國家立三大府中書總政事都督掌軍旅御史掌糾察朝廷綱紀盡繋於此而臺察之任尤清要卿等當正已以率下忠勤以事上毋委靡因循以縱姦毋假公濟私以害物時以鄧愈湯和為御史大夫洪武十五年罷御史臺置都察院設監察都御史八人十六年設左右都御史各一人權位赫然同六部尚書稱為七卿與前代之御史大夫無異矣其職掌糾劾百司辨明寃枉提督各道為天子耳目風紀之司凡大臣姦邪小人搆黨作威福亂政者劾凡百官猥茸貪冒壞官紀者劾凡學術不正上書陳言變亂成憲希進用者劾遇朝覲考察同吏部司賢否黜陟大獄重囚㑹鞫於外朝偕刑部大理讞平之其奉勅内地拊循外地各専其勅行事建文初練子寜為御史大夫時李景隆姦邪懷異志屢敗召還于寜執景隆於朝數其罪請誅之不聽憤激叩首言此賣國賊臣備員執法不能除姦請先伏誅遂罷朝英宗天順中髙明為南京都御史肅清綱紀劾罷諸貪吏軒輗為左都御史嚴毅待人時詣禮部拜表慶賀屏居一室撤燭朝服端坐寂無一言行禮畢即御肩輿歸僚儕聞輗來輒避去不樂與輗處孝宗𢎞治元年拜馬文升為左都御史是春帝耤田雜劇出狎語文升厲色曰新天子當知稼穡艱難豈宜以此凟亂宸聰即令斥去戴珊為左都御史務持風紀雖簿書之細必極精覈帝親鞫大獄諸司震悚珊從容應對時有開析天威頓霽至外省之總督提督巡撫經略總理贊理巡視撫治等官必加左右都御史銜以便行事非元之行臺也總督漕運兼提督軍務巡撫鳳陽等處兼管河道都御史一員總督薊遼保定等處軍務兼理糧餉都御史一員總督宣大山西等處軍務兼理糧餉都御史一員總督陜西三邊軍務都御史一員總督兩廣軍務兼理糧餉帶管鹽法兼巡撫廣東地方都御史一員總督四川陕西河南湖廣等處軍務都御史一員總督浙江福建江南兼制江西軍務都御史一員總督陕西山西河南湖廣四川五省軍務都御史一員總督鳳陽地方兼制河南湖廣軍務都御史一員總督保定地方軍務都御史一員總督河南湖廣軍務兼巡撫河南都御史一員總督九江地方兼制江西湖廣軍務都御史一員總理南直𨽻河南山東湖廣四川軍務都御史一員總理河漕兼提督軍務都御史一員總理糧儲提督軍務兼巡撫應天等府都御史一員巡撫浙江等處地方兼提督軍務都御史一員巡撫福建地方兼提督軍務都御史一員巡撫順天等府地方兼整飭薊州等處邊備都御史一員巡撫保定等府提督紫荆等闗兼管河道都御史一員巡撫河南等處地方兼管河道提督軍務都御史一員巡撫山西地方兼提督雁門等闗軍務都御史一員巡撫山東等處地方督理營田兼管河道提督軍務都御史一員巡撫遼東地方贊理軍務都御史一員巡撫宣府地方贊理軍務都御史一員巡撫大同地方贊理軍務都御史一員巡撫延綏等處贊理軍務都御史一員巡撫寜夏地方贊理軍務都御史一員巡撫甘肅等處贊理軍務都御史一員巡撫陜西地方贊理軍務都御史一員巡撫四川等處地方兼提督軍務都御史一員巡撫湖廣等處地方兼贊理軍務都御史一員巡撫江西地方兼理軍務都御史一員巡撫南贛汀韶等處地方提督軍務都御史一員巡撫廣東地方兼贊理軍務都御史一員巡撫廣西地方都御史一員巡撫雲南兼建昌畢節等處地方贊理軍務兼督川貴糧餉都御史一員巡撫貴州兼督理湖北川東等處地方提督軍務都御史一員巡撫天津地方贊理軍務都御史一員巡撫登萊地方贊理軍務都御史一員巡撫安廬地方贊理軍務都御史一員巡撫偏沅地方贊理軍務都御史一員巡撫宻雲地方贊理軍務都御史一員巡撫淮揚地方贊理軍務都御吏一員巡撫承天贊理軍務都御史一員撫治鄖陽等處地方兼提督軍務都御史一員贊理松潘地方軍務都御史一員其南京之都察院設右都御史一人總理糧儲加都御史銜一人中丞唐制中丞二人為御史大夫之貳東都留臺亦設中丞一人専掌糾察至徳後以御史中丞為重職裴度為御史中丞恪恭盡職作相後舉侍御史崔從為御史中丞薛存誠初為給事中時瓊林庫使奏召工徒太廣存誠以為此皆姦人竄名以避征徭不可許咸陽尉袁儋與軍鎮相競軍人無禮遂肆侵侮儋反受罰二敕繼至存誠皆執之帝聞甚悦命中使嘉勞由是選拜存誠為御史中丞開成中髙元裕為御史中丞風望整嚴上言曰御史府紀綱之地官屬選用宜得實材其不稱者臣請出之㑹昌中李回為御史中丞宣慰河北回為人嚴毅竣厲至河朔何宏敬王元逵張仲武皆具櫜鞬郊迎立於道左敬待制使自兵興以來未之有也宋設中丞一人為臺長舊兼理檢使掌糾察百官姦慝肅清朝廷綱紀凡除中丞而官未至者皆除右諌議大夫權神宗熙寧五年以知雜御史鄧綰為中丞初除諌議大夫王安石言礙近制止以綰為龍圖閣待制權御史中丞下遷諌議大夫自綰始九年鄧潤甫自正言知制誥為中丞以宰相屬官不可掌憲府於是復遷右諫議大夫權元豐五年以丞議郎徐禧為知制誥權中丞禧言中丞糾彈之任赴舍人院行詞疑若未安適官制行罷知制誥職乃以本官試中丞仁宗皇祐中帝以張昇清直可任風憲乃拜為御史中丞時富弼為相歐陽修為翰林學士論者所謂三得人也時帝以昇切指時事無所避因對廷臣嘉之曰卿孤特之操乃能如是哲宗元祐中胡宗愈為御史中丞進六事曰端本正治知難加意守法畏天疏入帝嘉納之時臺中故事有閽吏服役迨四十年以所執之梃驗中丞賢否賢則横其梃不賢則直其梃范諷為中丞一日視其梃忽直問曰爾梃竟直豈我之失耶吏曰昨日中丞召客諭庖人造食指揮者數四又教戒之數四某不自知其梃之直諷笑而頷之明日視之梃復横矣髙宗建炎中除官最多孝宗初被擢寖少淳熙十年始除黄洽十三年再除蔣繼周臺諌例不兼講讀熈寧中命吕正獻亦止命時赴講筵髙宗時万俟卨羅汝檝皆以秦檜意得兼寧宗慶元以後司諫以上無不預經筵者矣遼御史臺有御史中丞金御史臺亦設御史中丞世宗大定二十四年另鑄中丞印凡中丞之從幸上京者佩之元御史臺中丞二人仁宗皇慶中增置一人英宗至治二年定員額為二人掌貳大夫事武宗至大時中丞久闕擇人甚殷仁宗時在東宫奏薦張珪乃以珪為中丞登極後嘉珪正直引奏多所延納皇慶中郝天梃拜御史中丞入見首陳綱紀之要以獵為喻曰御史職在擊奸猶鷹揚焉禽之弱者易獲其力大者必借人力不然不惟失其前禽仍或有傷鷹之患帝嘉其言江南諸道行御史臺中丞二人陜西諸道行御史臺中丞二人伊嚕布哈拜行臺御史中丞陛辭之日帝御嘉徳殿慰勞之且賜以上尊金董士選亦為行臺中丞㢘威並著不嚴而肅凜然有大臣之風明初設御史中丞洪武元年以章溢能存