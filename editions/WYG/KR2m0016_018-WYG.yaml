body:
  text: 選舉厯代制中宋遼金元宋禮部貢舉設進士九經五經開元禮三史三禮三傳學究明經明法等科皆秋解冬集春試合格及第者列名放榜于尚書省凡進士試詩賦論各一首䇿五道帖論語十帖對春秋或禮記墨義十條九經帖書一百二十帖對墨義六十條五經帖書八十帖對墨義五十條三禮對墨義九十條三傳一百一十條開元禮三史各三百條學究毛詩對墨義五十條論語十條爾雅孝經共十條周易尚書各二十五條明法對律令四十條兼經並同毛詩之制各間經引試通六為合格仍抽卷問律本科則否皆本貫發解若鄉貫阻越得于開封府投牒奏候朝㫖諸州本判官試進士録事參軍試諸科或不曉經藝即以次官充而判官監之監官試官對考通否仍朱書通否署名其下逐埸定去留具元請解及已落見解人數並進士文卷諸科義卷帖由随解文送貢院或應解而不解不應解而解者其有殘廢篤疾並不得與解停所任受賂者以枉法論長官聴朝㫖凡應舉家狀并試巻之首署年及舉數埸第鄉貫不増損移易以仲冬收納月終而畢將臨試期知舉官先引問聯保十人或五人同保不許有大逆人緦麻以上親及諸不孝不悌隠匿工商異類僧道歸俗之徒與狀僉同而定焉凡就試禁挾書為姦進士試詞賦惟切韻玉篇不禁及口相授受者進士文理紕繆諸科不讀作否後倣此者俱循周顯徳間格殿舉初知舉官將赴貢院臺閣近臣得薦所知進士之負藝者號曰公薦太祖建隆三年有詔禁止乾徳元年詔九經一舉不第者一依諸科舉人許令再應後併詩書易學究為一科明經試帖書墨義者大概如兒童挑誦之狀故自唐以来賤其科不第者不許再應舊制禮部試貢院進士設香案于階前主司與舉人對拜所坐設位供帳甚盛至試學究則悉撤帳幕氈席之類亦無茶湯渇取硯水致黔其吻葢防氈席供應人私傳所試經義當有敗者歐陽修詩焚香禮進士撤幕待經生以為禮數重輕其實自有謂也其明年置制舉三科一賢良方正能直言極諌二經學優深可為師法三詳閑吏理逹于教化並州府解送吏部試䇿論三道限三千字以上四年召陶穀竇儀等同試賢良諸科郝益姜渉等文理䟽略賜酒遣之五年詔舉人有父兄食禄者覆試上聞陶穀不能訓子而穀子邴擢上第詔參政薛居正覆試皆合格又下是詔初遠方寒士與鄉薦欲試禮部假丐不可得則寜寄舉不試開寶二年乃詔西川山南荆湖等道所貢士並給来往公劵有挾商旅干闗節者罪之三年詔州府萬五千户舉孝悌徳行一人五千户舉孝悌徳業一人籍貢士及十五舉以上嘗終場者得司馬浦等一百六人並賜本科出身此特奏名恩例之始五年知貢舉扈䝉奏進士十一人及諸科十七人上召對講武殿始下詔制放榜六年御講武殿覆試進士宋準等御試舉人自茲始知貢舉李昉奏宋準以下十一人上黜進士武濟川三傳劉睿而濟川為昉鄉人遂有訴昉用情取舍者時又籍終場下第姓名得三百六十人皆召見擇一百九十五人并準以下各賜紙札别試詩賦上親閲之放進士二十六五經四開元禮七是嵗開寶通禮成詔鄉貢開元禮改稱鄉貢通禮並以新書試問三禮三十八三傳二十六三史三學究十八明法五皆賜及第殿試遂為常式八年覆試合格舉人以禮部所定第一人王式居第四而以王嗣宗為首自是御試與省試别為升降而省元狀元之名别矣唐時或禮部所取未當命中書門下詳覆然未嘗再試至宋藝祖太宗御殿覆試然不過審其繆濫者黜之元在前列者未嘗别定升降景徳後多别取狀元然省元亦皆置前列故事南省奏名第一人殿試唱過三名不及則越衆抗聲自陳雖在下列必得升等吳春鄉歐陽修皆由是升第一甲獨范景仁避不肯出至第十九人方及徐出拜命時服其靜退自此遂為故事葢當時殿試雖曰别命官糊名考校然賜第之時往往亦參採譽望乃定掄魁又凡貢士當賜第者考定必召其高第數人並見參擇材質可者賜第一太宗即位天下已定有意修文嘗謂治道長乆之術莫若參用文武之士太平興國二年御試合格舉人内出詩賦題以訓練將士為賦主聖臣賢為詩唐時試題不皆有所出或以意為之舉子得進問題意謂之上請宋既増殿試進士由循禮部故事景祐中始詔御藥院具試題書經史所出模印給之罷上請之制賦韻平仄間次得吕䝉正以下一百九人李參政至張僕射齊賢王參政化基皆在其間自是連放五榜通取八百一人一時名臣悉自兹出及諸科及第二百人十舉以上進士諸科一百八十餘人並賜出身賜袍笏賜宴開寶寺上自為詩賜之太宗博求俊彦科場得人之盛唐以来所無然太平興國末年孟州進士張兩光試不合格縱酒大罵于街衢言渉指斥上怒斬之同保九輩永不赴舉恩威並行如此第一第二等進士及九經授將作監丞大理評事通判諸州餘皆優等注擬五年上覆試進士並分甲乙第時顔明遠等四人以見任官舉進士上惜科第不與皆授近藩掌書記是嵗有趙國昌者求應百篇舉上出雜題二十字曰松風雪月天花竹鶴雲烟詩酒春池雨山僧道柳泉令各賦五篇篇八句逮日旰僅成數十首率無可觀上以此科乆廢特賜及第以勸来者仍詔有司後應百篇舉約此題為式八年進士諸科始試律義十道進士免帖經明年進士復帖經分三甲第一甲並知縣諸科仍試律雍熙二年以三小經附明法科准考官婣族别試先是國子監開封府所貢士與舉送官為婣戚則兩司更互試之至是始别遣官上每閲試卷累日方畢至四年宰相請如唐故事始詔嵗命官知舉應舉者不得有吏人自端拱初年有擊鼔訴校試不公者次年知貢舉固請御試至淳化三年知貢舉蘇易簡受詔後徑赴貢院以避請求後遂為例旋停舉五年至真宗咸平元年始詔禮部放榜得進士五十人高麗賔貢一人時密州發解官坐薦送非人特詔停任三年詔西京諸路所解舉人宜先訪行實或藝文可採其操履有虧匿名訕上者並加懲斷勒歸鄉縣課役罪解送所由官吏先是咸平二年令舉人應三舉者是嵗免取解四年淄青齊州及河北經蕃冦處並免取解泛解之令始此明年陳恕知貢舉所取甚少諸州舉送官被黜責者甚衆初京師多外方托籍為便進取咸平元年榜自第一人至十四人惟第九名貫河南餘皆開封貫其下亦然大抵多係寄籍後禮部貢院奏令諸色舉人各歸本貫取解不得寄應有鄉里遐遠乆住京師者許本卿命官委保附國子監取解景徳四年上嘗問輔臣天下貢舉人數王旦曰萬三千有餘約常例奏名十一而已上曰若此則當黜者不啻萬人矣典領之官必須審擇命晁逈知貢舉滕元晏封印卷首先是雍熙二年殿試糊名至是用之禮部迨明道二年而諸州無不用之矣凡封卷首及㸃檢詳試别命官始此初陳彭年舉進士以輕俊為宋白所出至是彭年與逈等更定條制闗防不復㨂擇文行雖杜絶請託然置科甲者多非人望矣時又定親試進士條制凡䇿士即殿兩廡張帟列几席標姓名其上先一日以次序掲示闕外試日拜闕下乃入就席試卷内臣收付編排官其卷首鄉貫狀别以字號第之付封彌官校勘用御書院印付考官定等畢復封彌送覆考官再定等編排官閲其同異未同者再考之如復不同即以相附近者為定合鄉貫狀字號第其姓名差次并試卷以聞學識優長詞理精純為第一才思該通文理周率為第二文理俱通為第三文理中平為第四文理踈淺為第五然後臨軒唱第上二等曰及第次出身次又次俱同出身大中祥符三年四年先後試東封路汾隂路服勤詞學經明行修科賜進士俱三十一人是二年未嘗貢舉以封禪特恩親試如後来免省到殿也五年令録諸州發解試題以聞慮廷試複出也徽宗時詔禮部藉内外試題遇試頒付考官以防複出八年始置謄録院封彌官封卷後付吏録本監以内侍二人京官校對訖復送封印院始送知舉定去取仁宗初明經嘗問䇿一道對䇿紕繆上以執經者不善為文命勿黜落又嚮用上第不數年輒貴顯天聖七年復制舉六科一賢良方正直言極諫二博逹墳典明于教化三才識兼茂明于體用四詳明吏理可使從政五識洞韜略運籌決勝六軍謀閎遠才任邊寄應舉者進䇿論十卷下兩制㸔詳優者召赴祕閣試論六合格試制第一許京朝官太常博士以卞應之又置書判㧞萃科應舉者納所録判詞三巻本銓差官看詳優者召試判十共二千字以上合格即御試景祐元年罷又置高蹈邱園沉淪草澤茂材異等科並許白衣投應仍投䇿論十巻差官看詳委有可稱封送禮部選擇召試寶元中帝以進士試詩賦䇿論先後訪李淑淑列陳唐代因革之制請先䇿次論次賦及詩次帖經墨義分試四埸通校工拙有司議稍行焉慶厯四年羣僚請改進士所試四埸先後知諌院歐陽修言凡貢舉法若二千人就試常額不過選五百人是于詩賦䇿論六千巻中毎一人三卷選五百人而日限又促考官疲心竭慮因勞致昏雖有公心而所選多濫此舊法之弊今請寛其日限先試以䇿而考之二千人可汰去五六百其留者試以論又可汰二三百其留而試詩賦者于千人而選五百少而易精矣時論以䇿論汗漫難知詩賦聲病易考乃詔一依舊除又知制誥富弼言殿試有三短考官濫取不擇一也一日試詩賦論三篇不能盡人之長二也考校不過十日不暇研精差次三也必慮恩歸有司則宜使禮部次高下以奏而引諸殿廷唱名賜第與殿試無異也遂詔罷殿試議者多言其輕上恩隳故事乃止時上書者言四年一舉士子客京師待試者六七千人一不幸有故不應詔沈滯輒十數年以此毁行冐法干進者不可勝數宜間嵗一貢舉中分舊數而薦之㑹王洙侍邇英閣講周禮至三年大比大考州里以賛鄉大夫廢興帝曰古之選士如此今率四五年一下詔故士有抑不得進者不若裁其數而屢舉乃詔間嵗貢舉進士諸科悉解舊額之半増設明經試法凡明兩經三經五經各問大義十條兩經通八三經通六五經通五為合格兼以論語孝經䇿時務三條出身與進士等而罷説書舉英宗時令禮部三嵗一貢舉天下解額取未行間嵗之前四之三為率明經諸科毋得過進士之數士得休息官亦不煩神宗初王安石請罷詩賦明經諸科而以其元數増進士額詔兩制兩省三司三舘議韓維議罷詩賦各習一大經問大義十道不必全記註䟽通七為合格蘇頌議先士行而後文藝去封彌謄録之法直史館蘇軾言自文章言之則䇿論為有用詩賦為無益自政事言之則詩賦䇿論俱為無用矣然自祖宗以来莫之廢者以為設法取士不過如是也近世文章華麗無如楊億使億尚在則忠清鯁亮之士也通經學古無如孫復石介使復介尚在則迂濶誕謾之士也矧自唐至今以詩賦為名臣者不可勝數何負于天下而必欲廢之上得軾議曰吾固疑此今釋然矣他日以問王安石安石曰不然今人材乏少以少壯時正當講求天下正理乃閉門學作詩賦及其入官世事皆所不習此乃科法敗壊人才致不如古于是卒如安石議罷明經及諸科進士罷詩賦各治易書詩周禮禮記一經兼論語孟子每試四埸初大經次兼經大義凡十道次論一首次䇿三道禮部試増二道又立新科明法以待諸科之不能改試進士者試以律令刑統大義斷案中格即取六年詔進士諸科及選人任子並令試斷案律令大義又詔進士第一人以下並試九年詔唱名盡四甲而禮部正奏名上十人未與者奏聴裁決因殿試進士初覆考官陳澤等考上一甲文卷失當贖金有差故有是命元豐元年御史黄亷言别試所解業詩者十人而取至四五書經止取一人願分經立額均收其長乃詔詩易悉占三分書二分周禮禮記通二分八年濟博棣三州諸科舉人訴于禮部言諸科舊額多歸進士又盡解新科明法今試而中無額可解于是常留諸科舊額十分之一以待不能改業者時王安石詩書周禮義學官謂之三經新義哲宗元祐初尚書省言近嵗治經者專守一家不識諸儒傳記之説左僕射司馬光亦極言新義明法之弊乃詔更科埸試法進士第一埸試本經義二語孟義各一第二埸賦及律詩各一第三埸論一四埸子史時務䇿二經義進士不兼詩賦人許増治一經詩賦人兼一經以詩禮記周禮左氏春秋為大經周易公羊穀梁儀禮為中經願習二大經者聴不得偏占兩中經八年從中書請今後御試習詩賦人用祖宗法試詩賦論䇿三題專經人且試䇿自後槩試三題明年禮部定御試三題條約旋詔進士罷詩賦專習經義仍除字説之禁神宗念字學缺廢王安石乃進其説學者習焉元祐禁勿用至是除之並罷春秋科凡試取二禮兩經占全額之半而以其半及他經徽宗崇寜三年罷州郡發解及省試法凡取士悉由學校升貢其嵗試上舍悉差知舉如禮部試時州縣悉行三舍法其免試入學者多當官子弟而在學則嵗月累試乃得應貧且老者甚病之五年詔大比嵗叅用科舉取士一次葢科舉未遽廢也大觀四年侍御史毛注請以解額之歸升貢者一二分不絶科舉遂詔更行科舉一次自崇寜以後立科造士之大指以安石新義故尊經書以司馬光通鑑故抑史學以蘇黄酬唱故廢詩賦其論似正而羣憸借以行其奸政和中猶有以禁習詩賦請者而逹官貴胄以上書獻頌令直赴廷試葢多有焉高宗建炎元年駐蹕揚州命諸路憲司選官即漕司所在州類省試率十四人取一二年定詩賦經義取士又詔下第進士年四十以上六舉經御試御試尚有黜落嘉祐二年始㮣賜出身元祐初知貢舉蘇軾孔文仲請特奏名與試者量取一二千人誠有學問即予出官其餘皆補文學長史之類不理選限遂詔定特奏名考取數進士入四等以上諸科入三等以上通在試者計之毋得取過全額之半馬端臨謂嘉祐初即免黜落今自建炎距嘉祐七十餘年豈復有曽經御試之人恐是為試入下等不理選限未出官者而設葢此曹亦曽經御試故令其再試而官之以示恩渥八舉經省試五十以上四舉經御試五舉經省試者河北河東陕西人減一舉元符以前到省兩舉者不限年一舉年五十五以上者所司以名聞令直赴廷試是秋帝親䇿試第為五等賜及第出身同出身四百五十一人川陕河北京東正奏名不赴者一百三人皆即家賜第紹興元年令有司講求舊制毎科埸年中丞給舍諌議大夫學士待制三人舉一人不拘已仕未仕先具詞業䇿論共五十篇送兩省侍從參考文理優長為上次優為中常平為下上中者並召赴閣試試以九月學士兩省官為試官御史監之試六論每首五百字以上于九經十七史七書國語荀揚管子文中子正文内出題通四以上為合格仍分五等以試巻繳奏御前拆號入四等以上召赴殿試其日上臨軒親䇿限三千字以上宰相撰題差初覆考官詳定赴試人引見賜坐殿廊兩廂差楷書官祗應内侍賜茶菓對䇿先引出處然後言事第三等為上恩數視廷試䇿第一人第四等為中視廷試第二三人皆賜制科出身第五等為下視廷試第四人賜進士出身不入等與簿尉差遣已上並謂白身者有官人進一官與陞擢三年立博學宏辭科唐有詞藻宏麗文章秀異科大觀中有詞學兼茂科宣和五年詔附省試自辛卯至戊申中選者三十六人至是工部侍郎李擢奏請改立試題十二于制誥詔表露布檄箴銘記賛頌序内雜出六題分為三塲毎塲一古一今試人先投所業三卷朝廷降付學士院考其能者召試除歸明流外入貲及嘗犯贓者皆得試每次所取不得過五人推恩比舊制加優分三等上等轉一官選人改秩無出身人賜進士及第並免詔試除舘職中等減三年磨勘與堂除無出身人賜進士出身下等減二年磨勘無出身人賜進士出身並許召試館職先是紹興二年侍御曽統請廢經義專用詞賦上意鄉之吕頣浩不可而止十三年國學初建從司業高閌言頭場試本經語孟義各一次場試詩賦各一末場試子史論時務䇿各一十五年分經義詩賦兩科于是學者競習詞賦經學寖㣲上嘗諭沈守約曰恐數年後經學遂廢二十七年詔舉人並兼兩科内大小經義共三道三十一年言者以為老成經術之士强習辭章不合音律請復分科取士仍詔經義合格人有餘許以詩賦不足之數通取不得過三分初舉人兼經義詩賦䇿論因號四科然更制後惟紹興十四年二十九年兩行之而止葢舉人所習已是為二不可復合矣熈寜四年始罷詞賦專用經義取士凡十五年至元祐元年復試賦與經義並行至紹聖元年復罷詩賦專用經義凡三十五年至建炎二年又兼用經賦然則自熈寜以来士無不習經義之日矣然元祐初始復賦欲經賦中分取人而蘇軾上䟽言自更法以来士工習詩賦者十人而七欲朝廷随經賦人數多少各自立額取人則知當時士雖不習詩賦者十五年而變法之餘一習即工且多至建炎紹興之間以經義取士者且五六十年其間兼用詩賦纔十餘年耳然共試則經拙而賦工分試則經少而賦多流傳既乆所至埸屋賦率居其三之二云御史中丞廖剛言國朝三嵗一舉每以今年大禮明年科場又明年省殿試為準故注授人先後到部不至攙併今科試明堂同在嗣嵗省司財計難以應辦一不便也近嵗初官待闕率四五年若使進士䕃人同時差注二不便也更展一年則舊制合矣乃詔紹興十年諸州應發解者改于紹興十二年正月省試三月殿試自後視此為準又諸州舊以八月選日試士舉子有就數州取解者乃詔諸道發解並以中秋日引試四川則用季春而仲秋類省孝宗即位欲令文士能射御武臣知詩書命討論殿最之法淳熙二年御試唱第後二日引按文士詹騤以下一百三十九人射藝翌日又引文士第五甲及特奏名一百五十二人其日進士具襴笏入殿起居易戎服各給箭六弓不限斗力射者莫不振厲自獻命中者以次注官餘亦賜帛四年罷同文舘試六年詔諸道試官隔一道選差又詔特奏名三名取一寘第四等以前餘並入第五等其末等納敕者舊許再試今止許一試濳藩及五路舊升甲者今但升名後並不許納敕三次帝䇿士陞黜不盡由有司十四年嘗擢進士第三王容為第一時儒生迭興辭章雅正號乾淳體焉寜宗慶元二年以諒隂不親䇿試知貢舉葉翥阿韓侂胄意上言士專習語録之説中庸大學之書以文其非又傳誦葉適進卷陳傳良待遇集毎用輒效請令太學州軍學各以月試合格前三名程文上御史臺考察其舊習不改坐學官提學司罪是舉也語渉道學者皆落至四年言者以經義一科全用套類初無本領請令有司所出經題各于本經摘出兩叚文意相類者合為一題以杜挟册售偽之計從之嘉定末祕書郎何澹言經義宜考注䟽而辨異同命有司命題斷章裂句破碎經文乃詔釐革舊習時舉子姦弊日滋其弊凡五曰傳義曰换卷曰易號曰卷子外出曰謄録滅裂理宗寶慶二年從左諌議大夫朱端常言命試院申嚴門禁入試日一切不許傳遞士人投巻時親書簿厯投匱中封彌官躬親封鐍巻匱俟舉人盡出院然後啟封分類即付謄録所明旦申逐場名數于御史臺檢核其撰號法上一字許同下二字各異以杜訛易謄録人選書手充不許代名考官容情任意者臺諌風聞彈奏初省試勅差知貢舉一同知二内差臺諌官一參詳官若干内差監察御史一俾㑹聚考校㣲示彈察寜宗初韓􅇑胄用事將鈐制士人遂于三知舉外别差一諌官為同知專董試事不復干預考校參詳官亦不差察官于是約束峻切氣燄薫灼嘉泰間更名監試製造簿履嚴立程限其失愈甚至紹定元年乃復舊制端平初御史李鳴復等又言臺諌充知舉參詳既留心考校不能檢柅姦弊乞仍舊差臺諌為監試從之二年有言蜀士嗜利多引商貨押船以致留滯闗津廷試展待乃定四月上旬廷試更不移展時場屋士子日盛卷軸如山有司廹于日限去取不能皆當葢士子本名納卷後或别易名字一人納二三卷不禁挟書又許見燭浙閩諸郡又間日引試中有一日之暇甚至次日午方出于是經義可作二三道詩賦可成五六篇幸皆中選往往以兄弟承之或轉售同族姦詐百端四年乃命諸郡于投卷初責鄉鄰覈實處偽縱容者罪之其弊稍息是年詔避親人與漕舉及待補國子生同試于别院舊制避親舉人與鏁㕔同試自紹熙分埸各試其額七人取一朝士之被差為大院考官者恐妨其親多不願差而寒士于千百取一之中得預鄉舉數千里辛勤赴省省闈差官又當相避遂有隠身匿名不認親以求免者有憤懣憂沮狼狽旅邸者故有是詔尋罷之四川類試復遣官四川類試敕差始于紹興二十九年然監試考官十員内惟大院别院監司主文各一員從朝命餘聴制司選差後權委成都帥守從近取其至是仍朝命四員餘從制司分選嘉熙元年以士子數多于禮部及臨安轉運司兩試院外紹興安吉各置一院朝命官前詣同日引試分各路士人就試焉是年已失京西諸州軍士多徙寓江陵鄂州命京湖制置司于江陵别立貢院取德安府荆門軍歸峡復三州及随郢均房京西七郡士人别差官混試用十二郡元額混取以優之淳祐元年言者以諸路漕試合國子試兩項科舉及免舉人不下千數大院既患巻冗小院又患額窄宜復撥漕舉胄舉同避親人並就别院引試三年仍令試别院者歸大院時淮南諸州郡嵗有兵禍士子不得以時赴鄉舉且漕司分差試官路梗不可徑逹乃命各附近秋試淮東州郡附鎮江府淮西州郡附建康蘄黄光三州安慶府附江州各増差試官二員别項考校照各元額取放又以場中程文多有傳寫雷同四年添差檢㸃官一員仍差監察御史一員鈐試十二年廣南分東西兩路考試廣南西路言所部二十五郡科選于春官者僅一二葢山林質樸不能與中土同工因援兩淮荆襄例别考寶祐二年監察御史陳大方言士風日薄文場多弊乞令初請舉士人從所司給帖赴省别給一厯如命官印紙之法批書發解之年及本名年貫保官姓名執赴禮部又批赴省之年長貳印署赴監試者同將来免解免省到殿亦如之如無厯則不收試至度宗朝丞相賈似道欲制東南士心令御史陳伯大請置士籍開具姓名年甲三代妻室令鄉鄰結勘于科舉條例無礙方許納卷自是嚴行天下或稍有瑕疵不敢有功名之望至似道潰師後臺中始首劾伯大焉宋承唐制科目亦以進士為貴南渡後毎科進士及第動至四五百人葢倍于唐有餘矣唐時及第者未即入仕尚待吏部試宋則登第之後即為入仕之期故其冗更數倍于唐制舉皆天子親試無常科惟召試館職及博學宏詞或起之山林或取之朝著召之州縣多至大用至五經學究特為時所輕其外則有胄試始于景德三年陞朝官嫡親許附國學鏁㕔試見任官應進士舉者天禧二年詔自今鏁㕔應舉人所在長吏先考試藝合格者聴解如至禮部不及格當停見任類試景祐四年從賈昌朝議有親戚仕本州及或為發解官及侍父祖遠宦距本州二千里宜敕轉運司選官類試由是諸路始有别頭試宗子試凡祖宗􅃝免親已命附鏁㕔試非􅃝免以外例許應國子監禮部皆别試廷試䇿問與進士同别考累舉不中年及四十以間而録用之至紹興二十九年孫道夫極論請託之弊乃敕御史一員監之經明行修試元祐初倣古制創立此科間取禮部試黜之士附寘恩科八行科以孝友睦婣任䘏中和八行全偏為三舍高下不問内外皆不試而補請託狥私其弊尤甚明法新科舊附銓試熙豐間始立紹興間又降敕差試官二員專撰刑法問題號為假案後又就諸路秋試毎五人解一名省試七人取一名皆不兼經御藥院又擬恩例分為二等第一等本科及第第二等本科出身言者以為濫十六年罷之童子科十五嵗以下能通經作詩賦州升諸朝而天子親試之其命官免舉無常格真宗時晏殊姜葢始賜出身自仁宗至大觀末賜出身者僅二十人高宗時或誦經史子集或誦御製詩文或誦兵書習歩射孝宗淳熙八年始分三等凡全誦六經孝經語孟及能文如六經義三道語孟義各一道或賦一詩一為上等與推恩誦書外能通一經為中等免解二次止誦書者下等免解一次五代時皆以軍卒為將故武舉乆廢仁宗天聖七年以西邊用兵將帥乏人復置武舉明年親試武舉十二人先閲其騎射而試之以䇿為去留弓馬為高下皇祐初復廢英宗治平元年復置神宗熙寜時樞密院修武舉試法不能答䇿者答兵書墨義王安石言武舉復試墨義則亦學究之流禦侮之用何事記誦乃悉從中書所定凡武舉于祕閣試義䇿于殿前司試武藝及殿試則試騎射及䇿于庭俱優為右班殿直武藝次優為三班奉職又次借職末等三班差使減磨勘年䇿平武藝優者除奉職次優借職又次三班差使減磨勘年武藝末等者三班差使元豐元年立大小使臣試弓馬藝業出官法第一等歩射一石矢十發三中馬射七斗馬上武藝五種孫吴義十通七䇿五道文理優長律令義十通七中五以上免短使減一任監當三事以上免短使升半年名次兩事升半年一事升一季第二等歩射八斗矢二中馬射六斗馬上武藝三種孫吴義通五䇿三道成文理律令義通五五事免短使升半年三事升半年兩事升一季一事與出身官第三等歩射六斗矢一中馬射五斗馬上武藝兩種孫吴義通三䇿三道成文理律令義通三計算錢榖文書五通三中五事升半年三事升一季兩事與出身官其歩射發兩矢馬射發三矢皆著為格先是樞密請建武學于武成王廟額選生員百人分三舍又保任者附入外舍偕上舍生發解崇寜間諸州立武學倣儒學制立考選升貢法徽宗宣和時州縣武學既罷有願𨽻京城武學者許補試欽宗靖康元年詔諸路有習武藝知兵書者州長二以禮遣送闕下毋限數高宗建炎三年詔武舉人先經兵部騐視弓馬于殿前司仍權就淮南轉運司别埸附試七書義五道兵機䇿二首孝宗乾道五年始令武舉廷試依文舉給黄牒榜首賜武舉及第餘並賜武舉出身初武臣試换文資須從官三人薦舉紹興中令敦五郎以下聴召保官二人以經義詩賦求試其後太學諸生乆不第者多去從武舉同鏁㕔之制後以林頴秀言武士舍棄弓矢更習程文襃衣大䄂專傚舉子夫科以武名不得雄健喜功之士徒啟其僥倖名爵之心于是詔罷鏁㕔换試寜宗初旋復之至其入仕授官有貢舉奏䕃攝署流外從軍五等吏部銓惟注擬州縣官舊幕職皆使府辟召宋則吏曹擬授京諸司六品以下官皆無選中書特授周朝每藩郡有闕或遣朝官權知太祖始削外權止令文臣權涖其後但以差遣為資厯皆非本職京朝官則審官院主之使臣則三班院主之少卿監以上中書主之武臣刺史副率以上内職樞密院主之後又分為四選文選曰審官東院曰流内銓武選曰審官西院曰三班院元豐定制銓注悉歸選部以審官東院為尚書左選文臣寄禄官自朝議大夫職事官自大理正以下非中書省敕授者歸之流内銓為侍郎左選自初仕至州縣幕職歸之審官西院為尚書右選武臣升朝官自皇城使職事官自金吾階衛仗司以下非樞密院宣授者歸之三班院為侍郎右選自借差監當至供奉官軍使歸之凡非登科及特㫖者年三十五方注官其大制如此建隆四年選朝士分治劇邑又詔諸州吏民不得詣京師舉留節度觀察等使刺史知州通判幕職等官開寶四年罷諸道攝官闕員處即時奏聞委有司除注又令經三聶無曠敗者不在此限時荆益交廣内附遠吏多闕是以嵗常放選而取解季集之制漸廢諸州印廢春季選人文解以遠近分限並于正月十五日前到省餘季准此其因選部闕官特詔免解非時赴集謂之放選六年復四時選應引對者每季一時引對之凡選人試判三道二道全通一道稍次文俱優為上一道全通二道稍次文稍堪為中三道全次文紕繆為下判上者職事官加一階州縣官超一資判中依資判下入同類惟黄衣人降一資至太宗太平興國元年増為四等以三道全次文翰無取為中下依舊判下格其全不通而文又紕繆為下殿一選六年詔京朝官除兩省御史臺自少卿監以下奉使從政于外受代歸者令中書舍人郭贄膳部郎中兼侍御史知雜事滕中正等考績論材以中書所下闕員擬定引對以遣謂之差遣院時庶僚引對其敷納可采者多有超擢上慮有幸冐復詔應引對遣命者中書門下考審進止端拱三年令宰相以下至御史中丞各舉朝官前代自一品以下皆曰常參官宋曰朝官祕書郎以下未常參者曰京官一人為轉運使真宗咸平初從祕書郎陳彭年請令兩省御史臺官尚書省六品以上諸司四品以上官授訖詣閤門投表讓一人自代方得入謝在外者授訖三日内具表附驛以聞至大中祥符五年詔翰林學士以下常參官嵗各舉外任京朝官三班使臣幕職州縣官各二人諸司使副承制曽任西北邉川廣銓轄親民者並同此例諸路轉運使副提㸃刑獄官知州通判結罪奏舉部内官屬不限名數仁宗初吏部奏天下幕職州縣官期滿無代者八百餘員川廣尤多未代帝曰此豈人情所樂耶其令亟代天聖六年詔審刑院舉常參官在京刑法司者為詳議官大理寺詳斷刑部詳覆法直官皆舉幕職州縣曉法令者為之自請試律者須五考有舉者乃得試律三道疏二道又斷中小獄案二道通者為中格時舉擢不常國子監闕講官嘗詔諸路轉運使舉經義通明者欲不次用人嘗詔近臣舉常參官厯通判無贓罪而才任繁劇者已之親及執政近屬毋得舉欲官諸邊要嘗詔節度使至閤門使知州軍鈐轄諸司舉殿最以上材勇使邊任者或令三司使下至大章閣待制舉奏之邊有警又或詔諸轉運使提㸃刑獄升朝官舉所部官才任將帥者三路知州通判縣令皆詔近臣舉㢘幹吏選任之至于文行之士錢榖之才刑名之學各因時所求而薦焉自天聖後進者頗多物議患其冗始戒近臣非受詔毋輒舉官英宗治平三年上語中書曰水潦為災言者云咎在不能進賢何也歐陽修曰往時入館有三路今塞其二矣宋以史館昭文館集賢院為三館皆寓崇文院其實無别舍但各以庫藏書列于廊廡間耳直館直院謂之舘職以它官兼者謂之貼職凡狀元制科一任還即試詩賦各一而入否則用大臣薦而試謂之入館自崇文院廢為祕書監建祕閣于中自監少以至正字列為職事官罷直閣直院之名而書庫仍在獨以直祕閣為貼職之首皆不試而除葢特以為恩數而已進士高科一路也大臣薦舉一路也因差遣例除一路也往年進士五人以上皆得試第一人及第有不十年即至輔相者今第一人兩任方得試而第二人以下不復試是高科路塞矣往時大臣薦舉即召試今只令上簿候缺人乃試是薦舉路塞矣惟因差遣例除者半是年勞老病之人此臣所謂薦舉路狭也上乃命宰執舉館職各五人熙寜二年罷初入兩府舉官之制故事二府初入得舉所知者三人時陳升之拜相循例為侯叔獻程顥皆與堂除又升一任帝以不考材實罷其制時御史又乞罷堂選曽公亮執不可王安石謂中書所總已多不能精擇宜歸有司自此輕重失倫無進賢退不肖之實矣明年以樞輔任重不當親有司之事乃置審官西院專領閤門祗候以上諸司後磨勘常程差遣其内外舉官之制皆罷初吏部選格其法各随所任職事以入任功狀立格以待擬注至哲宗元祐時司馬光為相請在位逹官人舉所知設十科以舉士一曰行義純固可為師表有官無官皆可舉二曰節操方正可備獻納舉有官人三曰智勇過人可備將師舉文武有官人四曰公正聰明可備監司舉知州以上資序五曰經術精通可備講讀有官無官人皆可舉六曰學問該博可備顧問同上七曰文章典麗可備著述同上八曰善聴獄訟盡公得實舉有官人九曰善治財賦公私俱便同上十曰練習法令能斷請讞同上應職事官自尚書至給舍諌議寄禄官自開府儀同三司至大中大夫職自觀文殿大學士至待制毎嵗各随所知于十科中共舉三人嵗終不舉及人數不足按劾施行或不如所舉謂舉行義純固而違犯名教之類其舉主從貢舉非其人律科罪犯正入已贓舉主減三等科罪若受賄狥私自從重法詔從之又詔大臣奏舉舘職並如制召試除授高宗建炎初選籍㪚亡乃下諸道州府軍監籍屬吏寓官之爵里年甲出身厯任功過舉主到罷月日上之時赴調者盡萃東南選法留滯乃詔京畿京東西河北河東士夫在部注授雖銓未中而年及者聴注官二年又令京官赴行在者非政和以後進書頌及直赴殿試之人乃聴參選在部諸州軍通判簽判及京朝官知縣監當權以二年為任舊以三年為任四年戒吏部長貳堂中或取部闕並須執守毋得供報言者以京黼用事有詣堂及闕者判一取字雖已注人亦奪予之甚至部有佳闕密獻以自効為寒逺患踰二十年乞下此令紹興元年詔曰亂離以来士夫流徙有徒跣而赴行在者注授牓闕姦弊日滋宜令三省議除其弊于是議立八事曰注擬藏闕申請徼幸去失艱難刷闕減裂闗㑹淹延審量疑似給付邀求保明退難令長貳機柅之二年吕頣浩言近世堂除多侵部注請倣故事外自監司郡守及舊格堂除通判内自察官省郎以上館職書局編修官外餘闕并寺監丞法寺官六員等武臣自準備將領正副將以上其部將巡尉指使以下並歸部注至二十二年復以進士及門䕃子弟不復參部自干堂除下詔申禁是年從侍郎凌景夏言令吏部七司凡换給之期限戰功之定處去取之保任書填之審實奏薦之限隔酬賞之用否凡經申請或白堂或取㫖者毎一事已郎官以次擬定而長貳書之于册永以為例舊制宗室文資與外官文臣參注窠闕武資則不得與武臣參注但注添差孝宗時始聴注釐務闕又詔宗室曽應舉得解者許參選餘並銓試其三試終場不中人聴不拘年限調官先時選人應改官必引對便殿毎五日引二人神宗令毎甲引四人元祐變法三人為甲月三引見積累至紹聖初待次者二百八十餘人乃令五日而引一甲然改官無定數紹興之季遂至百十三人孝宗患之稍嚴陞改之令淳熈六年引見改官不及七十員明年吏部請以七十員定額自是嵗改京官者僅百員遂為永制是年又以嵗舉京官數濫初無常數有其人則舉王中行時兼給事中議請六曹寺監嵗減舉員三之一諸路監司減四之一禮部國子監長貳減三之二前執政嵗減二員諸州無縣者嵗止一員嵗終不除運副而判官補發者不理為職司至寜宗慶元元年復詔判官補發副狀理為職司又詔職司狀不得用二紙用姚愈奏嘉定十二年詔侍臣兩省臺諌各舉文武可用之才二三人又命監司守臣舉十科政績所知自代露章列薦並籍記審察任滿則擢其舉數多有政績行誼者理宗紹定元年臣僚上言銓曹之患員多闕少注擬甚難自乾道以来嘗命選部職官窠闕各于元出闕年限之上與展半年用闕厯年寖久入任者多今吏部參注之籍文臣選人武臣小使臣校尉以下不下二萬七千餘員率三四人共注一闕固宜壅滯乃命吏部録參司理司法令丞監當酒官于元展限上更展半年淳祐四年以臺諌耳目之官例由親擢不許大臣薦進七年監察御史陳垓建言銓法十弊一添差數多破法耗財謂倅貳幕職參議機宜總戎鈐轄監押之類二抽差員衆州縣廢職謂監司帥守幕屬多差見任州縣他官權攝三攝屬違法蠧政害民謂監司帥守狥私差權幕職四須入不行徼幸撓法初改官者必由知縣謂之須入此謂規免作令茍圖京局躐求倅貳遂使不曽厯縣之人冐常郡寄五奏辟不應奔競日甚謂未經仕人在法不許奏辟今或以初任或以闕次遠而改辟見次者六改任巧㨗紊亂官常謂在法已援差遣人不得干求换易今既授是官復謀他職辭卑居尊棄彼就此七薦舉不公多歸請託八借補繁多官資泛濫九癏曠職守役心外求十匿過居官翫視國法謂曽經罪犯必俟赦宥今既遭劾初未經赦者經營差遣八年令未厯郡者不得為郎已為郎者更迭補外未厯縣者必令須入已作縣者須及任滿其闕次不得差改其後又詔改官班引者先赴都堂或御史臺各試書判不通者且令為丞俟再試中方與集注若夫文武䕃補之制自期親至餘親奏薦最廣太祖時定任子之法臺省六品諸司五品登朝嘗厯兩任然後得請太宗淳化改元恩文班中書舍人武班大將軍已上並許䕃補如遇轉品許更䕃一子至道二年始有聖節奏薦之例大中祥符元年始有東封禮畢推恩之令熙寜時定限年限員之法宣和中中大夫至帯職朝奉郎入官十五年諸衛大將軍至武翊大夫入官二十年内侍官武功大夫至武翊郎累奏不得二人淳熙九年更務裁抑立郊䕃補恩正數宰相十人開府儀同三司以上同執政八人侍從六人觀察使至節度使侍御史同中㪚大夫至中大夫右武大夫至通侍大夫同𢃄職朝奉郎朝儀大夫三人武翊大夫至武功大夫同致仕遺表恩澤文臣見任宰相八年曽任宰執七名見任執政六名曽任執政五名在内侍從在外待制以上或不帯職大中大夫以上二名無遺表止得致仕者侍御史中㪚中奉至中大夫朝奉郎至朝儀大夫一名武臣見任使相七名曽任使相六名見任執政太尉六名曽任執政節度使五名諸衛上將軍至承宣使四名觀察使三名通侍大夫二名正侍至右武大夫諸衛大將軍武功至武翊大夫一名大中祥符時門䕃授京官年二十五十求差使者令于國學聴習經書以二年為限仍令審官院與判監官考試以聞其初皆試律暨詩已任而無勞績舉薦及無免試恩皆試判更制以後暨試律義斷案議後又増試經義中選者皆得随銓擬注其入優等者往往特㫖賜進士出身遼太祖起自朔漠干戈倥偬未置科目至後設鄉府省三試鄉中曰鄉薦府中曰府解省中曰及第程文分兩科一詩賦一經義其試進士貢院以二寸紙書及第者姓名給之號為喜帖明日舉案而出樂作及門擊鼓十二面以法雷震殿試臨期取㫖第一人特増一官授奉直大夫翰林應奉文字第二第三人以下並授從事郎詞賦為正科法律為雜科聖宗統和六年詔開貢舉九年放進士及第祗一人十一年始放二人太平五年幸南京内果園宴求進士得七十二人命賦詩第其工拙以張昱等十四人為祕書郎餘並崇文館校書郎九年皇城進士張人紀等二十三人入朝試以詩賦皆賜及第興宗重熙五年十月幸南京御元和殿以日射三十六熊賦是秋獵黄花山獲熊三十六因以命題金時亦嘗以此題試進士幸燕詩試進士于廷賜馮立趙徽等四十九人進士第以立為右補闕徽以下皆太子中舍賜緋衣銀魚御試進士自此始又從宰臣張儉請幸禮部貢院宴賚甚渥將軍庻箴子富魯舉進士主文以國制無遼人試進士之條聞于上上以庶箴擅令子就科目鞭二百尋命富魯為牌印郎君賦詩稱㫖洊被恩禮而􅃰州王棠鄉貢禮部廷對皆第一時醫卜屠販奴𨽻及倍父母或犯者逃亡者不得舉進士道宗咸雍六年設賢良科應舉者先以所業十萬言進十年御永安殿䇿之是嵗放進士二百三十八人以馬希白詩才十吏不能給召試之天祚中禁商賈家應進士舉云太宗㑹同初選約尼氏九帳子弟可任官者聖宗初華喇部請今後詳穩止從本部選授上以諸部官惟在得人命勿以所部為限統和七年宋進士挈家来歸者十七人命有司考其中第者補國子官餘授縣主簿尉十二年詔宋俘中官吏儒生抱器能者諸道軍勇健者具以名聞授衛德升等六人官其後又以國舅及南北王府乃國之貴族賤庶不得任本部官興宗重熙十六年詔世選之官擇各部耆舊材能者任用道宗太康九年定諸令史譯史遷叙等級凡任子之令文武並得奏䕃各限員數聖宗定制其没于王事録其子孫金承遼後先後設詞賦經義䇿試律科經童諸科又有女直進士科專試女直文字初但試䇿後増試論亦謂之䇿論進士又嘗制舉宏詞科以待非常之士其詞賦經義䇿論中選者謂之進士律科經童中選者謂之舉人太宗天㑹改元急欲得漢士以撫輯新附始置科舉至明年二月八月凡再行焉五年令因南北素所習業以取號為南北選各以經義詞賦兩科取士海陵天徳二年併南北選為一明年罷䇿試科諸進士舉人由鄉至府由府至省至殿廷凡四試章宗明昌初言者以舉人四試而鄉試為虗設乃詔罷免鄉試以三月二十日府試若䇿論進士則以八月二十日試䇿間三日試詩詞賦進士則以二十五日試賦及詩間三日試䇿論經義進士又間詞賦後三日試所治經義又三日試䇿次律科次經童每埸皆間三日試㑹試則䇿論進士以正月二十日試䇿餘以次間如前御試則以三月二十日䇿論進士試䇿二十三日試詩論二十五日詞賦進士試賦詩論而經義進士亦以是日試經義二十七日乃試䇿論若試日雨雪則候晴日御試唱名後試䇿則禀奏宏詞則作二日程試舊試女直進士在試漢進士後大定末更定是制府試䇿論進士凡四處大定間令于中京上京咸平東平試後増為七處明昌初増北京西京益都兼試女直經童上京海蘭率賓呼尔哈扶餘東北招討司赴㑹寜府咸平隆州博索東京葢州懿州赴咸平府中都河北東西路赴大興府西京并西南西北二招討司赴大同府北京臨潢宗州興州全州赴大定府山東西大名南京赴東平府山東東路則就益都試詞賦經義進士及律科經童凡六處大定間令于大興大定大同開封東平京兆後増為十處明昌初増遼陽平陽益都後又増太原其中都河北赴大興府上京東京咸平等路赴遼陽府餘各試于其境初經義于易書詩禮春秋專治一經内出題天徳三年罷大定二十八年復詞賦以經傳子史出題嗣又逐年改一經以詩書易禮春秋為次注内亦許出題海陵正隆元年用五經三史正文章宗初用五經子史皆于題下注其本傳士子程文所用事得自注出處承安後令考試詞賦官各作程文一道式示舉子後以考官離筆硯久擬作不工恐起謗議乃罷此制當世宗大定時㑹試取詞賦進士不得過五百人章宗令合格則取承安二年至九百二十五人㤗和二年始令䇿論三取一詞賦經義五取一又令武舉終埸年四十五以上四舉終場年五十以上者方授恩例世宗末令五次御簾進士止以文之高下定其次而不黜落謂之恩榜明昌初令省元直就御試不中者許綴榜末府元被黜者許来舉直赴部仍一日試三題五舉者止賦詩所試文惟犯御名廟諱及不成文理始黜女直進士亦同此例承安二年令四舉該恩㤗和三年以經義㑹元與他科進士不同不得以御試被黜優附榜末然又與四舉者不同遂依府試解元免府試之例㑹試下第再舉直赴御試至宣宗時終場人年五十以上者即行該恩河北舉人中選而阻兵者免後舉府試䇿論進士專選女直人大定初擇良家子習女直文字教以古書作詩䇿十三年始令每埸試䇿一道限五百字以上免鄉府試止赴㑹試御試二十年以䇿詩試三埸䇿用女直大字詩用小字依漢進士例三年一舉時又以試䇿既久人能預備宜于五經内出題加試以論二十九年増試論題俟第三舉後通定去留以詩䇿合格為中選以論定名次承安二年定限丁習學之制凡内外官員諸局分承應人武衞軍若明安穆昆女直及諸色人户惟一丁者不許應試兩丁一人四丁二人六丁以上止許三人明年令女直進士年四十五以下者府試十日前委佐貳官善射者試射其制以六十歩立垜去射者十五歩對立兩竿相去二十歩去地二丈以繩横約之弓不限强弱不計中否以張弓巧便發箭迅正者為熟閑射十箭中兩箭出繩下至垜者為中選餘路委提刑司在都委監察體究赴㑹試御試者大興府佐貳官試騐三舉終場者免之宣宗興定元年制中都西京等路䇿論進士權于南京東平博索上京四處府試至五年賜第者僅二十八人其賢良方正能直言極諫博學宏材逹于從政等科試無常期上意欲行則告天下聴内外文武六品以下職官無公私過者從内外五品以上官薦試之若草澤之士徳行為鄉里所推者從州府薦之凡試先投所業䇿論三十道于學士院視其優者委官以羣經子史内出題一日試論三道可則廷試䇿一道通貫者優等遷擢之宏詞科試詔誥章表露布檄書皆用四六誡諭頌箴銘序記或依古今體于每舉賜第後進士及在官六品以下從在外官薦令試䇿官出題就考凡四題分二等上等遷兩官次等遷一官皆明昌初所置也四年以後郡縣所舉徳行才能之士往往賜同進士出身或賜及第焉凡府㑹試每四人則一人監檢御試䇿進士則人各一名泰和元年從省臣請依大定故事使與試者就沐浴官置衣為之更之又嘗以竹林寺憫忠寺為場屋其放第唱名天眷初嘗于析津廣陽門西一僧寺遷都後改從宣陽門律科以律令出題府試十五題每五人取一大定二十二年㑹試每場十五題三場共通三十六條以上為中選二十九年加語孟小義一道府㑹試别作一日令經義試官出題與本科通考經童凡士庶子年十三以下能誦二大經三小經又誦論語諸子及五千字以上府試十五題通十三以上㑹試每場十五題三場共通四十一以上為中選貴㓜而多誦者若年同則多誦大經者為勝大定末限以三十或四十人能擢進士第者同進士任用如中府㑹試視其次數優其等級幾舉不得薦者從本出身泰和元年定試武舉之制分上中下三等能挽一石力弓以重七錢竹箭百五十歩立貼十箭内府試中一箭省試中二箭程試中三箭又遠射二百二十歩垜三箭内一箭至者又百五十歩内每五十歩設高五寸長八寸卧鹿二能以七斗弓二大鑿頭鐵箭馳射府試則許射四反省試三反程試二反皆能中二箭者又百五十歩内每三十歩左右錯置高三尺木偶人戴五寸方板者四以槍馳刺府試則許馳四反省試二反程試一反左右各刺落一板者又依廕例問律一條又問孫吳書十條能説五者為上等凡程試一有不中者皆黜之若射貼弓八斗遠射二百一十歩射鹿弓六斗孫吳書通四為中等射貼弓七斗遠射二百五歩射鹿弓五斗孫吳書通三為下等解律刺板皆欲同前不知書者上為中中為下其中下願再試者聴三年定武舉出職遷授格上甲第一名遷忠勇校尉第二三名遷忠翊校尉中等遷修武校尉收充親軍不拘有無廕視舊格減一百月出職下等遷敦武校尉亦收充親軍減五十月出職終金之世科目得人為盛諸宫䕶衞及省臺部譚史令史通事其餘仕進皆得列正班文武選皆統于吏部自從九品至從七品職事官部擬正七品以上呈尚書省以聴制授凡文散官謂之文資官自餘皆武散官謂之右職又謂之右選文資則進士為優右職則軍功為優自舉人勞効應襲恩例之外入仕之途尚多若牌印䕶衞令史之出職則皇統時所定也檢法知法國史院書冩則海寜所置也若宗室將軍宫中諸局承應人宰相書表太子䕶衞妃䕶衞王府祗候郎君内侍及宰相之子并譯史通事省祗候郎君親軍驍騎諸格則定于世宗之時及章宗所置之太常檢討内侍寄禄官皆仕進之門户也凡外任循資官謂之常調朝官謂之随朝吏部選者謂之部選分按四季擬授尚書省選者謂之省選專理資考升遷凡銓注取仕官解由撮行績資厯之要為銓頭以定其能否其有犯公私罪贓汚者謂之犯選格雖遇恩不得除叙太宗天㑹四年始置三省法古立官海陵初河南北選人並赴中京吏部各置局銓法世宗大定初除授從八品以下令勿奏聞又随季選人如無過或有功酬者依格銓注有亷能及汚濫者約量升降呈省十年令民願留守令以下官者直赴部告呈省遣使覆實可超升之明昌三年令随季部人依舊制識字者試書判不識字者問以疑難二事優者量除示勸除朝及外路六品以上官則随長任外路正七品官升六品縣令一等除授任滿合降者免降從七品以下于各等資厯内減兩任擬注若見任縣令升中上者并掌錢榖及丁憂去者候解由到部諸局分人亦候將来出職日準上擬注明安穆昆随門户減一資泰和初以縣令丞簿員闕不相副令散官犯選格及虧永者廣威注令明威注承簿宣宗南遷時詔吏部以秋冬于南京春夏于中都置選而赴調者憚于北行遂併于南京設之至省選資考之制監察御史尚書省具才能者䟽名以聴制授任滿御史臺視其所察公事具書于解由以送尚書省稱職者升擢庸常者臨時取㫖不稱者除任其常調正七品兩任升六品六品三任升從五品從五品兩任升正五品正五品三任升刺史内外官俱以三十月為考随朝官以三十月為任升職一等自非制授尚書選在外官命左司移文勾取大定中内外三品官以五十月為任泰和元年命内外官通算合得升等而少十五月者依舊在職補足而後升除或有餘月日以後積算三年凡文資右職官應遷三品職事者五品以上厯五十月六品以下及門廕雜流職事至四品以上而散官應至三品者皆厯六十月方許告遷後又令内外四品官以四十月理考通八十月遷三品復以門廕官職事至四品者絶少令刺史有散官應至三品者即許告遷三品又令資考各減一任臨時量人材辛苦資厯年甲以次奏稟先是上嘗以選舉十事命尚書省定擬一減資考使可用者不致衰老二随朝考滿人果才能免回降三随路提刑所訪亷能官就令随宜遷注四許宰相與求仕官相見以訪才能五薦賢毋避親故如數各舉所知不舉者罪之六舉自代七内外五品以上官長于僚屬内舉才能官一人數外舉者聴八監臨諸物料内及草澤隠逸之士皆聴薦舉九親軍出職内有尤長武藝勇敢過人者令内外官舉提刑司察之十定前項各數随色嵗舉一人又嘗以太拘資厯不足以得人至宣宗時以兵興故恩命數出賤職下僚或階極品乃從言者請非親王子及職一品餘人雖散官至一品皆不許封公其已封者儀衛降從二品之制初女直進士上甲除上簿中甲下甲除中簿下簿大定二十五年上甲甲首遷四重餘各遷兩重第二三甲授随路教授三十月為一任第一任注九品三任四任注録事軍判五任下令自添試論後皆依漢格經義進士第一擬縣令第二當除察判以無闕遂擬軍判第二第三甲随各人住貫擬軍判丞簿凡進士注職上甲者初上簿軍判丞簿尉中甲下甲者中下簿軍判丞簿尉大定二年文資官不除縣尉二十三年上甲初録事防判二下令三中令中甲初中簿二上簿三下令下甲初下令二中簿三下令䇿試中者進士授章服後再試時務䇿一謂之䇿試上甲初録事防判二中令三上令中甲初上簿二下令三中令下甲初中簿二録事防判三中令二十六年上甲初録事防判二中令三四五上令中甲初中簿二下令三中令四五上令䇿試者初録事防判二三四五上令其次初上簿二中令三四五上令又次初中簿二下令三中令四五上令下甲初下簿二下令三中令四五上令狀元舊授承徳郎後改為承務郎貞祐間至奉直大夫上甲舊授儒林郎更為承事郎貞祐間仍儒林郎中甲以下舊授從仕郎更為將仕郎貞祐間授徴事郎其右職遷除自皇統八年制凡帯一命昭信校尉以上者初除主簿及諸司副使二主簿及諸司使三下令四中令五上令或通注鎮軍都指揮使及正將其官不及昭信及無官者自初至三任通注丞簿四下令五中令六上令及知城寨若門廕之例自天眷中凡一品至八品皆不限所廕之人至貞元二年定制一品至七品各限以數削八品用廕之制大定五年十月制亡宋官當廕子孫者並同亡遼官例十七年四月詔世襲明安穆昆出身者雖年未六十欲令子孫襲者聴又以明安穆昆皆國家勤勞有功之人世襲官不宜以小罪奪泰和二年更定廕叙法年六十以上退與患疾身故者雖非文武官資擬令係班除存習本業者聴廕一人止一子者不須習即廕凡諸色出身文武官一品廕子孫至曽孫及弟兄姪孫六十因門䕃則五人二品子孫至曽孫及弟兄姪五人四品五品三人因門廕則二人六品二人七品一人因門廕則六品七品皆一人凡進納官正班三品廕四人雜班三人正班武略子孫兄弟一人雜班明威一人懐遠以上二人鎮國以上三人司天太醫遷至四品换文武官者廕一人哀宗時詔有司為死節士立褒忠廟又書其子孫于御屏以備擢用雖時迫危亡為激勵人心之計要亦勸忠之典也元太祖初得中原中書令耶律楚材即請用儒術選士至九年命斷事官扎哈岱及山西東路課税所長官劉中厯諸路考試以論及經義詞賦分為三科作三日程專治一科能兼者聴但以不失文義為中選復其賦役令與各處長官同署公事尋復中止世祖中統二年命宣撫司官舉文學才職可以從政及茂材異等至元四年翰林學士承㫖王鶚等請行貢舉法命中書左三部與翰林學士議立程式十八年詔求山林隠逸名士元初用人多由薦授後雖科舉間行而以徴授官者未可一二數其辭不受職屢召不起者皆見于隠逸傳二十一年丞相和爾果斯等請以貢舉進士繼而許衡議罷詩賦重經學定為新制事卒未行至仁宗皇慶二年中書省臣言經學實修已治人之道詞賦乃摛章繪句之學自隋唐以来專尚詞賦故士習浮華臣等擬罷律賦省題詩小義而專立徳行明經科以取士乃命中書參酌古今定條制科場每三嵗一開舉人從本貫官司于諸色户内擇年及二十五以上經明行修者結罪保舉遣上路府或狥私濫舉并應舉不舉者監察御史肅政亷訪司察治凡考試䝉古色目人第一場經問五條大學論語孟子中庸内設問用朱氏章句集註第二場䇿一道以時務出題限五百字以上漢人南人第一場明經經疑二問大學論語孟子中庸内出題並用朱氏章句集註復以已意結之限三百字以上經義一道各治一經詩主朱氏尚書主蔡氏周易主程氏朱氏已上三經兼用古注䟽春秋主三傳及胡氏傳禮記用古注䟽限五百字以上不拘格律第二場古賦詔誥章表内科一道古賦詔誥用古體章表四六參用古體第三場䇿一道經史時務内出題限一千字以上䝉古色目人願試漢人南人科目中選者加一等注授䝉古色目人為左榜漢人南人為右榜第一甲第一名賜進士及第從六品第二名以下及第二甲皆正七品第三甲皆正八品流官子孫廕叙並依舊制願試中選者優升一等在官未入流品願試者聴若中選之人已有九品上資級加一等注授若無品級止依試例從優銓注其三試各定日期所在官司遲悞者論罪鄉試八月二十日第一場二十三日第二場䝉古色目漢人南人同二十六日第三場止謨人南人㑹試省部于次年二月初一日試第一場初三日第二場初五日第三場御試三月初七日前期奏委考試官二員監察御史二員讀巻官二員入殿廷考試每舉子一名集賽台一人看守漢人南人試䇿一道限一千字以上䝉古色目人等試時務䇿一道限五百字以上選考試監試等官行省與宣尉司及腹裏各路有行臺及亷訪司處與臺選官一同商議選差上都大都從省部選差在内監察御史在外亷訪司官一員監試每處差考試官同考試官各一員並于見任并在閒有徳望文學常選官内選差封彌官謄録官各一員于亷幹文資正官選充凡謄録試卷并行移文字皆用朱書省部㑹試都省選委知貢舉同知貢舉官各一員考試官四員監察御史二員封彌謄録對讀監門等官各一員其試選合格人數視都省大小有差鄉試行省十一河南陕西遼陽四川甘肅雲南嶺北征東江浙江西湖廣又河東山東二宣尉司及直𨽻省部之真定東平大都上都四路凡選合格者三百人赴㑹試于内取中選者一百人内䝉古色目漢人南人分卷考試各二十五人䝉古取七十五人大都十五上都六河東五真定等五東平等五山東四遼陽五河南五陕西五甘肅三嶺北三江浙五江西三湖廣三四川一雲南一征東一色目人取七十五人大都十上都四河東四東平等四山東五真定等五河南五四川三甘肅二陕西三嶺北二遼陽二雲南二征東一湖廣七江浙十江西六漢人取七十五人大都十上都四真定等十一東平等九山東七河東七河南九四川五雲南二甘肅二嶺北一陕西五遼陽二征東一南人取七十五人湖廣十八江浙二十八江西二十二河南七延祐二年三月始開科左右榜凡五十六人文宗天厯間至九十七人順帝元統初増名額及百人至元初從徹尔特穆尔之議詔罷科舉叅政許有壬爭之不得至六年復之仍稍變程式減䝉古色目人明經二條増本經義易漢人南人第一場四書疑一道為本經疑増第二場古賦外于詔誥章表内又科一道至二十五年兵興多阻其鄉試者惟燕南河南山東陕西河東數路而已乃倍増鄉貢之額所放進士復優其品秩焉第一甲授承直郎第二甲承務郎第三甲從仕郎元選法從七品以下屬吏部正七品以上屬中書三品以上非有司所與奪由中書取進止自六品至九品為敕授中書牒署之自一品至五品為宣授以制命之三品以下用金寶二品以上用玊寶有特㫖者有告詞凡諸王分地與所受湯沐邑得自舉其人以聞各投下總管府長官不遷外其所屬州縣長官于本投下分到城邑遷轉凡路府州縣除逹嚕噶齊外長官並選用漢人佐貳官以色目漢人並用文武散官降職事官二等䝉古色目初授散官或降職事雖不降必俟官資合轉然後升職漢人初授官不及職再授則降職授官又覃官或准實授或普減資升等或内升等或外減資或外減内不減皆謂之恩數臺官于省部選人則與省官議省官于臺憲選人則與臺官議凡選人解由到部即行照勘合得七品者呈省從七以下本部注擬其餘流外人員不拘多寡並以一月銓注一次凡遷叙随朝以三十月為滿在外以三周嵗為滿錢榖官以得代為滿出職職官轉補與職官同成宗元貞元年命中書振理選法先是至元十九年御史中丞崔彧言選用臺察官若由中書必有偏狥之弊宜聴本臺選擇至是省臣言樞密院御史臺例應奏舉官屬其餘諸司不宜奏請今皆請之非便因詔自後諸司無得奏舉官屬專令中書奏擬至大徳七年又詔諸司舉用人員並經中書省毋得擅奏又以翰林院國子學官員文翰師儒難同常調須求資格相應之人不得預保十一年武帝即位八月中書省臣言内降㫖與官者八百八十餘人已除三百未議者猶五百請自今越奏者勿與又御史臺臣言中書省樞密院御史臺宣政院得自選官具有成憲今監察御史亷訪司官非本臺公選而從諸臣所請自内降㫖非祖宗成法帝俱納之九月中書省臣言内外選法向者遵世祖成制兩宫近侍銓叙惟上所命比有應入常調者夤縁驟遷其已仕廢黜及未嘗入仕者亦復自内降㫖臣等先經奏禁而内㫖所降復有百餘整飭實難自今銓請如前制非由中書議者毋得越奏仁宗皇慶元年省臣言今春以内降㫖除官千餘人其欺偽豈能悉知且亂選法乃詔凡内降㫖勿行文宗至順二年監察御史陳思謙言入仕之門太多黜陟之法太簡州郡之任太淹朝省之除太速欲設三䇿以救四弊一至元三十年以後増設衙門冗濫不急者從實減并其外有選法者并入中書二參酌古制設辟舉之科令三品以下各舉所知得才則賞失實則罰三古者刺史入為三公郎官出宰百里葢使外職識朝廷治體内官知民間利病今後厯縣尹有能聲善政者授郎官御史厯郡守有竒才異績者任憲使尚書其餘各騐資品通選在内者不得三考連任京官在外者須兩任乃遷内職績非出類守不敗官者則循以年勞處以常調凡朝缺官員須二十月之上方許遷除帝可其奏命中書議行之至順帝元統元年命臺憲部官各舉才堪守令者一人至正八年詔京官三品以上嵗舉守令一人守令到任三月亦舉一人自代十二年詔随朝一品職事及省臺院部諸正官各舉循良才幹智勇兼全堪充守令者二人知人多者不限員數各處試用守令可兼管義兵防禦諸軍鄂囉勸農事所在上司不許擅差守令既已優升其佐貳官員比依入廣例量升二等任滿騐守令全治者與真授不治者全削二等依本等叙半治者減一等叙雜職人員其有智勇之士並依上例凡除常選官于殘破郡縣及迫近賊境之處升四等稍近賊境升二等十六年命六部諸監院正官各舉才堪守令者一人中書省斟酌用之或任内害民受贓者舉官量事輕重降職至元四年定廕叙之法凡廕諸品官止廕一人以嫡長子同母弟及其子孫曽元如無則次及旁推皆于合叙品級降一等諸九品依例遷至正三品者止于本等流轉二品以上選自特㫖五年令三品至七品廕叙人員年二十五以上者當儤使一年並不支俸滿日三品至五品子孫量材叙用六品七品子准上銓注監當差使其諸路逹嚕噶齊子弟廕充散府諸州逹嚕噶齊其散府諸州子弟充諸縣逹嚕噶齊其諸縣子弟充巡檢凡主兵官有功升擢其舊職宜别援有功者若陣亡許其子弟承襲元帥招討司子孫襲為萬户摠管子孫為千户摠把子孫為百户給元佩金銀符管其元軍陣亡者仍以本等承襲二十四年詔凡舊臣勲伐有戰功者其子弟當先試以小職果才能則大用之大徳四年定制正一品子廕正五品從一品子從五品以次而降至從五品子則從九品正六品子流官于巡檢内用雜職于省劄錢榖官内用從六品子近上錢榖官正七品子酌中錢榖官從七品子近下錢榖官諸色目人視漢人優一等逹嚕噶齊子孫與民官同傍廕依例降等至大四年令承廕子孫試一經一史通大義者免儤使不通者發還習學䝉古色目願試者聴仍量進一階欽定續通典卷十八
