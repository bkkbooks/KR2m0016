body:
  text: 職官諸卿下内侍省内侍伯内常侍局内給事局内謁者監内寺掖庭宫闈奚官局内僕局内府局臣等謹按唐六典尚書門下中書三省之後接載祕書殿中内侍三省稱為六省杜佑作通典改秘書殿中兩省為監次以内侍省並列於諸卿竊惟周官有宫正宫伯内宰宫人内小臣閽人寺人之職悉統於冡宰宫正乃總領宿衞之官宫伯副之秦之郎中令漢之光禄勲即其遺制其六寢六宫之奄寺内豎不過十九人而内小臣之得稱為上士者止四人而已漢内官猶參選明經之士如揚雄位執㦸孔安國掌御唾壺是也東京而後乃悉用奄人唐代因之預社稷之謀操軍國之柄覆踵相尋如同一轍沿至有明寵任中涓員數日增權任尤重濫觴於永樂之時燎原於神熹之代竊弄魁柄國祚遂亡伏考宦官備灑掃之職祇以給宫闈使令而累朝粃政相沿已大失成周命官之本意今是書秩品仰承聖訓釐定削去宦官而内侍省一門仍按歴代史志臚載俾覽者知所鑒戒焉唐制内侍省監二人少監二人掌内侍奉宣制令皇后親蠶則升壇執儀大駕出入為夾引宋制入内内侍省内侍省太祖建隆時有内班院太宗淳化五年改為黄門又改為内侍省入内内侍省與内侍省號為前後省而入内省尤為親近通侍禁中役服䙝近者隸入内内侍省拱侍殿中備灑掃之職役使雜品者隸内侍省入内内侍省有都都知都知副都知押班内東頭供奉官内西頭供奉官内侍殿頭内侍高品内侍高班内侍黄門内侍省有左班都知副都知右班都知副都知押班内東頭供奉官内西頭供奉官内侍殿頭内侍高品内侍高班内侍黄門其官稱又有内客省使延福宫使宣政使宣慶使昭宣使徽宗政和二年以通侍大夫易内客省使正侍大夫易延福宫使中侍大夫易景福殿使中亮大夫易宣慶使中衞大夫易宣政使拱衞大夫易昭宣使供奉官易内東頭供奉官左侍禁易内西頭供奉官右侍禁易内侍殿頭左班殿直易内侍高品右班殿直易内侍高班而黄門之名如故遼内省有内省使内省副使内藏庫提㸃内侍省有黄門令内謁者内侍省押班内侍左廂押班内侍右廂押班契丹漢兒渤海内侍都知左承宣使右承宣使金内侍省俱屬宣徽院元内廷近侍之事俱掌于侍正府詳見殿中監明置十二監司禮監内官監御用監司設監御馬監神宫監尚膳監尚寳監印綬監直殿監尚衣監都知監四司惜薪司鐘鼓司寳鈔司混堂司八局兵仗局浣衣局銀作局巾帽局鍼工局内織染局酒醋麫局司苑局其餘又有内府供用庫司鑰庫内承運庫甲字乙字丙字丁字戊字承運廣盈廣惠贓罰御酒房御藥房御茶房牲口房刻漏房更鼓房甜食房彈子房靈臺絛作盔甲厰安民厰皇城京城及内外各宫門提督東厰提督西厰提督京營文書房禮儀房中書房御前近侍等職皆設長貳其外則守備織造鎮守市舶監督倉場諸陵神宫監監軍採辦糧税礦闗等使紛不可紀諸宦官内惟司禮監位最尊而權重其寵任専者率由别監陞司禮監職批紅者權同元輔焉太祖洪武時帝嘗謂侍臣曰朕觀周禮奄寺不及百人後世至踰數千因用階亂此曹止可供洒掃給使令非别有委任毋令過多又言此曹善者千百中不一二惡者常千百若用為耳目則耳目蔽用為心腹則心腹病馭之之道在使之畏法不可使有功畏法則檢束有功則驕恣時有内侍事帝最久徴言及政事立斥之終其身不召因定制内侍毋許識字洪武十七年鑄鐡牌文曰内臣不得干預政事犯者斬置宫門中又勅諸司毋得與内官監文移往來然二十五年命聶慶童往河州勅諭茶馬中官奉使行事已自此始成祖亦嘗云朕一遵太祖訓無御寳文書即一軍一民中官不得擅調發有私役應天工匠者立命錦衣逮治顧中官四出實始永樂時元年李興等齎勅勞暹羅國王此奉使外國之始也三年命鄭和等率兵二萬行賞西洋古里滿剌諸國此將兵之始也八年勅王安等監都督譚青等軍馬靖巡視甘肅此監軍巡視之始也及仁宗洪熙元年以鄭和領下畨官軍守備南京遂相沿不改勅王安鎮守甘肅而各省鎮皆設鎮守矣宣宗宣徳四年特設文書房命大學士陳山専授小内使書而太祖不許識字讀書之制由此而廢賜王瑾金英印記則與諸宻勿大臣同賜金英范宏等免死詔則又無異勲臣之鐡劵也英之王振憲之汪直武之劉瑾熹之魏忠賢太阿倒握威福下移神宗礦税之使無一方不罹厥害其他怙勢薫灼不可勝紀而䕃弟䕃姪封伯封公則撓官制之大者莊烈帝初翦大憝中外頌聖既而鎮守出征督餉坐營等事無一不命中官為之而明亦遂亡矣内侍唐置四人掌奉宣制令遼内侍省有黄門令明司禮監提督太監一人掌印太監一人又有秉筆太監隨堂太監書籍名畫等庫掌司内書堂掌司六科廊掌司典簿無定員提督掌督理皇城内一應儀禮刑名及鈐束長隨當差聴事各役闗防門禁催督光禄供應等事掌印掌理内外章奏及御前勘合秉筆隨堂掌章奏文書照閣票批硃掌司各掌所司典簿典記奏章及諸出納號簿宦官之有權而職重者也内常侍唐置六人通判省事金有中常侍内給事唐置十人掌承㫖勞問分判省事遼有内侍省左承宣使右承宣使金有給事中内謁者監唐置十人掌儀法宣奏承􅃯令及外命婦名帳凡諸親命婦朝㑹者籍其數上内侍省遼内侍省有内謁者金亦有内謁者内寺伯唐置六人掌糾察宫内不法宋置内東門司勾當官四人掌宫禁人物出入周知其名數而譏察之掖庭局唐置令二人丞三人掌宫人簿帳女工凡宫人名籍司其除附公桑養蠶㑹其課業供奉物皆取焉宫闈局掌侍宫闈出入管鑰金置宫闈局設提㸃使副使掌宫中閤門之禁明設午門東華門西華門奉天門元武門左右順門左右紅門皇宫門坤寧門宫左右門東宫春