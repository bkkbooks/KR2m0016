左氏傳公羊傳榖梁傳各為一經兼習孝經論語老子嵗終考學官訓導殿最憲宗元和中韓愈拜國子祭酒奏儒生為學官日使㑹講生徒奔走聴聞皆相喜曰韓公來為祭酒國子監不寂寞矣又鄭覃以宰相兼判國子祭酒奏太學置五經博士各一人縁無職田請依王府官例賜禄廪從之宋初置判監事二人以兩制或帶職朝官充凡監事皆總之元豐官制行始置祭酒一人掌國子太學武學律學小學之政令凡諸生之隸於太學者分三舍始入學驗所隸州公據以試補中者充外舍齋長諭月書其行藝於籍行謂率教不戾規矩藝謂治經程文季終考於學諭次學録次學正次博士然後考於長貳嵗終校定具注於籍以俟覆試視其校定之數參驗而序進之凡私試孟月經義仲月論季月策公試初場以經義次場以論策試上舍如省試法凡内舍行藝與所試之等俱優者為上舍上等取㫖命官一優一平為中以俟殿試一優一否或俱平為下以俟省試唯國子省不預考選凡課試升黜教導之事長貳皆總焉車駕幸學則率官屬諸生班迎即行在距學百步亦如之凡釋奠於先聖先師及武成王則率官屬諸生共薦獻之禮嵗計所隸三舍生升降多寡之數以為學官之殿最賞罰宋初以崔頌判國子監建隆三年夏始㑹生徒講説帝遣中使以酒果賜之每臨幸國學召頌與語因及經史頌應答無滯及郊祀以頌攝太僕升車執綏帝問以一時典禮頌占對閒雅帝甚重之又邢昺為國子祭酒真宗景徳二年上幸國子監閱庫書問昺經版幾何昺曰國初不及四千今十餘萬斯儒者逢時之幸也上方興起道術令昺與張雍杜鎬孫奭舉經術該博德行端良者以廣學員又吕公著為祭酒所舉學官如王回吳政姜潜張載皆一世大儒王存顧臨為元祐名臣常秩吳申黄履朱臨盛僑亦顯於世遼南面上京國子監太祖置有祭酒中京亦有國子監設官與上京同金國子監亦有祭酒元至元初以許衡為集賢館大學士國子祭酒教國子與蒙古大姓四集賽人員選七品以上朝官子孫為國子生隨朝三品以上官得舉凡民之俊秀者入學為陪堂生伴讀二十四年始置監設祭酒一人屬集賢院時帝久欲開太學以許衡為資政殿大學士兼國子祭酒衡聞命喜曰此吾事也國人子太樸未散視聴専一若置之善類中涵養數年將必為國用乃請徴其弟子王梓劉季偉韓思永耶律有尚吕端善姚燧高凝白棟蘇郁姚燉孫安劉安中十二人詔驛召之來京師分處各齋以為齋長時所選弟子皆幼穉衡待之如成人愛之如子出入進退其嚴若君臣其為教因覺以明善因明以開蔽相其動息以為張弛課誦少暇即習禮或習書算少者則令習拜跪揖讓進退應對或射或投壺負者罰讀書若干遍久之諸生人人自得下至童子亦知三綱五常之道又富珠哩翀為國子祭酒帝師至京師有㫖朝臣一品以下皆乘白馬郊迎大臣俯伏進觴帝師不為動唯翀舉觴立進曰帝師釋迦之徒天下僧人師也余孔子之徒天下儒人師也請各不為禮帝師笑而起舉觴卒飲衆為之慄然又䝉古國子監祭酒一人屬䝉古翰林院仁宗延祐元年又别置回回國子監學屬翰林國史院明國子監祭酒一人掌國學諸生訓導之政令凡舉人貢生官生恩生功生例生土官外國生幼勲臣及勲戚大臣子弟之入監者奉監規而訓課之有不率者扑以夏楚不悛徙謫之其率教者有升堂積分超格叙用之法課業倣書季呈翰林院考校文册嵗終奏上毎嵗仲春秋上丁遣大臣祀先師則總其禮儀車駕幸學則執經坐講新進士釋褐則坐而受拜太祖洪武時太學初成中外嵗貢生徒日夥適選愞者掌之師生相訐教尼不行十六年以文淵閣大學士宋訥為國子監祭酒請於上嚴立學規諸生皆知敬畏帝慮功臣子弟有不服扑罰者命曹國公李文忠兼領監事由是貴胄肅然受教年八十卒於官帝自製文遣官致祭其後嵗辛未太學生有連舉大魁者帝思訥曰此宋祭酒訓迪之功也凡諸生守官稱職者多出訥門帝每舉訥為教國子者楷法又英宗正統中李時勉為祭酒嚴毅正大極意造就人材初至令坐堂一月後乃散處於廂房列格致誠正四號號房有家室者居外晨入饌堂讀書俱朔朢升堂其於四號督勵尤切夜讀務盡二更將五鼓復令膳夫提鈴循號房喚起讀書或自潜行以察勤惰無燈者令人暗記明示責罰自是燈光達旦書聲不歇學者感激競相勸勉諸生貧病者節縮餐錢力為贍給南京國子監祭酒一人時陳敬宗為南京祭酒以師道自任與北監祭酒李時勉稱南陳北李洪武八年又置中都國子學命國子學分官領之十五年改為國子監設祭酒司業監丞典簿博士助教學正學録掌饌等官二十六年罷之明初祭酒司業擇有學行者任之後皆由翰林院官遷轉司業唐置二人代宗大厯中歸崇敬為國子司業時皇太子欲以仲秋月行齒胄之禮崇敬以為國學及官名不稱請改國子監為辟雍省又以祭酒之名非學官所宜按周禮師氏掌以義詔王教國子請改為太師氏又司業者禮記云樂正司業正長也言樂官之長司主此業按周頌設業設簴則業是懸鐘磬之栒簴也今太學於義無所取請改司業一為左師一為右師詔下議者以為重難改作其事不行又陽城下遷國子司業引諸生告之曰凡學者所以學為忠與孝也諸生有久不省親者乎明日謁城還養者二十輩有三年不歸侍者斥之簡孝秀徳行升堂上酗酒不率教者皆罷之躬講經籍生徒斤斤皆有法度宋置一人髙宗紹興時高閌為國子司業時興太學閌奏宜先經術帝曰士習詩賦已久遽能使之通經乎閌曰先王設太學唯講經而已國初猶循唐制用詩賦神宗始以經術造士遂罷詩賦又慮不足以盡人材乃設詞學一科今宜以經學為主而加詩賦帝然之閌於是條具其法以六經語孟義為一場詩賦次之史論時務䇿又次之太學課試及郡國科舉皆以此為法遼國子監有司業金亦有之元置二人蒙古國子監亦置二人明置一人洪武中以吳源杜斆龔斆趙民望李祐俱召為四輔官兼太子賔客後帝以源賢復召為國子監司業又王嘉㑹為國子監右司業時宋訥為祭酒太學生常數千人嘉㑹與訥及左司業龔斆嚴立楷範三人者春秋已高鬚鬢翯如正其衣冠旦夕端坐諸生雲集階下肅然望而畏之以是士類率教多所造就帝知其勞眷待殊厚葢洪武時有左右兩司業也南京國子監司業一人丞唐置一人掌判監事每嵗七學生業成與司業祭酒莅試登第者上於禮部宋置一人遼國子監有監丞金置二人章宗明昌二年增一人兼提控女直學元置一人専領監務䝉古國子監監丞一人明置一人洪武中張顯被薦自王府教授為國子學正秩滿陞監丞莅事公勤六館皆敬重之乃條陳百務成法益備時北監初建唯司業貝泰署印教尼不行朝議以顯素諳典章乃奏改北詔報可遂兼程以往經理學舍勸懲淑慝百廢畢興輔泰所不逮泰舊嘗為南監助教顯降意下之協恭和衷嚴申學規激厲後進於是諸生數千人肅然敬服莫不以顯為能盡職又林大猷舉鄉薦遷國子學録勤於啟迪執經從遊者無慮數百輪畨聴講又約日通集太學諸生聴講謂之普講祭酒耿裕待以賔禮進監丞滿九載陞翰林院檢討仍管監丞事南京國子監監丞一人主簿唐置一人掌印勾督監事七學生不率教者舉而免之宋置一人時仁宗患縉紳奔競諭近臣曰恬退者旌擢則躁進者知耻於是宰相文彦博宋庠等言韓維好學嗜古安於静退乞加甄録以厚風俗乃除維為國子監主簿宋制國子監有書庫官以京朝官充掌經史羣書以備朝廷宣索賜予之用隆興間詔主簿兼書庫遼國子監亦有主簿金無主簿有校勘掌校勘文字書寫官掌書寫實録元置典簿一人明典簿亦一人典籍一人掌饌二人南京國子監典簿一人典籍一人掌饌一人國子博士唐置五人掌教三品以上及國公子孫從二品以上曾孫為生者五分其經以為業周禮儀禮禮記毛詩春秋左氏傳各六十人暇則習隸書國語説文字林三倉爾雅每嵗通兩經求仕者上於監秀才進士亦如之學生以長幼為序習正業之外教吉凶之禮公私有事則相儀五經博士各二人掌以其經之學教國子周易尚書毛詩左氏春秋禮記為五經論語孝經爾雅不立學官附中經遼國子監有博士武白為上京國子博士金國子博士二人分掌教授生員考藝業元國子學博士二人掌教授生徒考較儒人著述教官所業文字成宗大德間尚野為國子博士誨人先經學而後文藝每謂諸生曰學未有得徒事華藻若持錢買水所取有限能自鑿井及泉而汲之不可勝用矣䝉古國子學博士二人明國監所屬博士㕔五經博士五人洪武中趙俶除國子博士既教胄子隨扣輒應莫不樂得經師帝一日御奉天殿俶偕諸儒侍側召至前諭之曰經學必宗孔子毋以儀秦縱横語示諸生也俶頓首謝歸告誡士子屏去戰國策諸書勿讀明年詔擇諸生之聰悟能文者二十五人命俶領而顓教之且令修詞以漢司馬遷班固唐韓愈宋歐陽修蘇軾為法㝷於諸生中擢李擴黄義等入文華武英二堂説書多至大用俶自専師席旦夕誨迪不倦士多成業南京國子監博士三人世襲五經博士孔氏二人武宗正徳元年授孔子五十九世孫彦繩主衢州廟祀宋孔端友從高宗南渡家於衢州此孔氏南宗也二年授孔聞禮奉子思廟祀顔氏一人景帝景泰二年授顔子五十九世孫希惠曾氏一人世宗嘉靖十八年授曽子六十代孫質粹仲氏一人神宗萬厯十五年授子路裔孫仲吕孟氏一人景泰三年授孟子裔孫希文周氏一人景泰七年授先儒周敦頤裔孫冕程氏一人景泰六年授先儒程頤裔孫克仁莊烈帝崇禎三年授先儒程顥裔孫接道邵氏一人崇禎三年授先儒邵雍裔孫繼祖張氏一人熹宗天啟二年以先儒張載裔孫文運為博士朱氏二人景泰六年授先儒朱熹裔孫挻嘉靖二年又授墅為博士主婺源廟祀劉氏一人景泰七年授誠意伯劉基七世孫禄後革又設教授司教授學録學司孔曾顔孟四氏各一人又尼山洙泗二書院各學録一人按元代封孔子後裔為衍聖公賜三品印洪武元年以孔希學襲封衍聖公進秩二品賜以銀印正徳元年又賜世襲五經博士二人自景泰以後凡先聖先賢先儒之後皆賜以五經博士世襲葢有博士之銜號而無職掌今附載於此助教唐置五人掌佐博士分經教授宋置正録各五人遼國子學有助教金置二人女直漢人各一人教授四人元置六人學正二人學録二人蒙古國子學助教二人教授二人正録各二人明六堂助教十五人率性修道誠心正義崇志廣業學正十人學録七人南京國子監助教六人學正五人學録二人太學博士唐置六人助教六人掌教五品以上及郡縣公子孫從三品曾孫為生者五分其經以為業每經百人宋太學博士十人舊係國子監直講神宗元豐三年詔改為太學博士每經二人武學博士二人金太學博士四人衞紹王大安二年減二人助教四人元明所置博士皆不分國子學太學廣文館唐置博士四人助教二人掌領國子學生業進士者宋遼金元明皆不置四門館唐置博士六人助教六人直講四人掌教七品以上侯伯子男子為生及庶人子為俊士生者元和中韓愈再為四門博士才高數詘官又下遷乃作進學解以自喻又歸崇敬擢明經調國子直講又舉博通墳典科對第乃遷四門博士律學唐置博士三人助教一人掌教八品以下及庶人子為生者律令為顓業兼習格式法例宋置律學博士一人書學唐置博士二人助教一人掌教八品以下及庶人子為生者石經説文字林為顓業兼習餘書唐以後即無算學唐置博士二人助教一人掌教八品