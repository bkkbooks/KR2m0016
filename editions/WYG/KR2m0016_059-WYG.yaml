body:
  text: 禮嘉君臣服章制度袍附宋遼金元明宋制天子之服一曰大裘冕二曰衮冕三曰通天冠絳紗袍四曰履袍五曰衫袍六曰窄袍七曰御閲服中興後有之神宗元豐四年詳定禮文所言大裘黒羔皮為之領袖以黒繒纁裳朱紱而無章飾佩白玉元組綬革帶玉鉤䚢素帶朱裏其外上朱下緑白紗中單皂領青褾襈裾朱韈赤舄黒絇繶純其當暑奉祠之服乞降梁陸瑋議以黒繒為裘及唐輿服志以黒羔皮為縁詔重詳定光禄寺丞集賢校理陸佃言禮記云郊之日王被衮以象天又曰大裘不裼此明大裘以衮衣襲之先儒謂周禮天地皆服大裘非是於是詳定所言裘不可徒服請冬祀昊天與黒帝皆服大裘被以衮非冬祀天及夏至祭地則皆服衮哲宗元祐元年禮部言元豐所造大裘作短袍制襲於衮下未合典禮下禮部太常寺議禮部員外郎何洵直言周禮節服氏既云衮冕又云裘冕是裘與衮各有冕今裘既無冕又襲於衮中何以示裘衮之别古人雖質不應以裘為夏服盖冬用大裘當暑則以同色繒為之後詔如洵直議徽宗政和時議禮局上大裘青表纁裏黒羔皮為領褾襈朱裳被以衮服中興後無存者髙宗紹興十三年詔有司如舊制以羔造禮部言闗西羔羊天生黒色今有司涅白羔為之不中禮制不如權以繒代從之衮服初因五代之舊衣青色日月星山龍雉虎蜼七章紅裙藻火粉米黼黻五章紅蔽膝升龍二並織成間以雲朶飾以金鈒花鈿窠裝以真珠琥珀雜寳玉紅羅襦裙繡五章青褾襈裾六采綬一小綬三結玉環三素大帶朱裏青羅四神帶二繡四神盤結白羅中單青羅抺帶紅羅勒帛鹿盧玉具劒白玉雙佩金龍鳳革帶紅韈赤舄金鈒花四神玉鼻祭天地宗廟朝太清宫饗玉清昭應宫景靈宫受冊尊號元日受朝冊皇太子則服之太祖建隆元年太常禮院上衮龍服令式元衣纁裳十二章升火於衣為八章裳四章衣褾領如上為升龍皆織成山龍以下每章一行重以為等每行十二白紗中單黼領青褾襈裾蔽膝龍山火三章革帶玉鉤䚢大帶素帶朱裏玉劒佩大小綬玉環朱韈赤舄加金飾仁宗景祐二年詔冠服蠲减珍華務從簡約由是衮衣改用青羅紅羅襈繡八章間以雲疎宻視所宜去細窠及珠璣飾裳用紅羅繡四章蔽膝繡升龍二以雲補空地去細窠除帶首黄金葉用銷金英宗治平二年詔衮服悉去繪畫龍鱗紫雲白鶴蹙金絲龍裳繡服用繪神宗元豐元年詳定禮文所言古者朝祭之裳皆前三幅後四幅殊其前後不相連屬今裳以八幅考古不合請改用七幅幅廣二尺二寸兩旁各殺縫一寸腰間辟積無數裳側有綼下有裼廣各寸半羣臣祭服之裳准此政和議禮局上冕服之制衣八章裳四章如舊制而升龍於山絳紗袍以織成雲龍紅金條紗為之紅裏皂褾襈裾絳紗裙蔽膝如袍飾並皂褾襈白紗中單朱領褾襈裾白羅方心曲領白韈黒舄佩綬如衮大祭祀致齋正旦冬至五月朔大朝㑹大冊命親耕藉田皆服之孝宗乾道九年又用履袍袍以絳羅為之折上巾通犀金玉帶繫履則曰履袍服鞾則曰鞾袍履鞾皆用黒革四孟朝獻景靈宫郊祀明堂詣宫宿廟進胙上夀兩宫及端門肆赦並服之大禮畢還宫乗平輦服亦如之若乗大輦則服通天冠絳紗袍如常儀衫袍有赭黄淡黄玉裝紅束帶皂文鞾大宴則服之赭黄淡黄䙆袍紅衫袍常朝則服之窄袍便坐視事則服之皆皂紗折上巾通犀金玉環帶窄袍或御烏紗帽御閲服以金裝甲乘馬大閲則服之皇太子之服一曰衮冕二曰逺遊冠朱明衣三曰常服衮服青羅衣繡山龍雉火虎蜼五章紅羅裳繡藻粉米黼黻四章紅羅蔽膝繡山火二章白紗中單青褾襈裾革帶瑜玉雙佩四采大綬結二玉環青羅抹帶紅羅勒帛玉具劒白羅韈朱履金塗銀釦從祀則服之太宗至道元年皇太子衮服元衣纁裳赤舄加金飾謁廟加元服納妃則服之朱明服紅花金條紗衣紅紗裏皂褾襈紅紗裳紅紗蔽膝並紅紗裏白花羅中單皂褾襈白羅方心曲領羅襪黒舄革帶劒佩綬餘同衮服抹帶勒帛執桓圭受冊謁廟朝㑹則服之常服皂紗折上巾紫公服通犀金玉帶諸臣祭服九旒冕青羅衣繡山龍雉火虎蜼五章緋羅裳繡藻粉米黼黻四章緋蔽膝繡山火二章白花羅中單玉裝劍佩革帶暈錦綬二玉環緋白羅大帶緋羅韈履親王中書門下奉祀則服之其冕無額花者元衣纁裳悉畫小白綾中單師子錦綬二銀環餘同上三公奉祀則服之七旒冕衣畫虎蜼粉米三章裳畫黼黻二章銀裝佩劒革帶餘同九旒冕九卿奉祀則服之五旒冕青羅衣裳無章銅裝佩劒革帶餘同七旒冕四品五品為獻官則服之六品以下無劒佩綬紫檀衣朱通考作及裳羅為之皂大綾綬銅裝劒佩御史博士服之平冕無旒青衣纁裳無劒佩綬餘同五旒冕太祝奉禮服之朝服進賢五梁冠緋羅袍白花羅中單緋羅裙緋羅蔽膝並皂褾襈白羅大帶白羅方心曲領玉劒佩銀革帶暈錦綬二玉環白綾襪皂皮履一品二品侍祠朝㑹則服之中書門下則冠加籠巾貂蟬三梁冠無中單銀劒佩獅子錦綬銀環餘同五梁冠諸司三品御史臺四品兩省五品侍祠朝㑹則服之御史大夫中丞則冠有獬豸角衣有中單兩梁冠銅劒佩練鵲錦綬銅環餘同三梁冠四品五品侍祠朝㑹則服之六品以下無中單無劒佩綬御史則冠有獬豸角衣有中單仁宗康定三年少府監言每大禮法服庫準百官品位給朝服其諸司五品以上實有官髙品卑及品髙官卑者請諸司五品國子博士至内給事並依六品以下去劒佩綬御史則冠獬豸衣有中單其諸司使副使以下至閤門祗候如有攝事合請朝服者並同六品詔從所請袴褶紫緋緑各從本服色白綾中單白綾袴白羅方心曲領本品冠導駕則騎而服之建隆四年范質與禮官議袴褶制度先儒無説案令文武弁金飾平巾幘簪導紫褶白袴玉梁珠寳鈿帶鞾騎馬服之金飾即附蟬也詳此即是二品三品所配弁之制也又令文三品以上紫褶五品以上緋褶七品以上緑褶九品以上碧褶並白大口袴起梁帶烏皮鞾今請造袴褶如令文之制其起梁帶形制尋檢未是望以革帶代之奏可是嵗造成而未用乾徳六年郊祀始服而冠未造乃取朝服進賢冠帶韈履參用焉其公服因唐之制三品以上服紫五品以上服朱七品以上服緑九品以上服青其制曲領大袖下施横襴束以革帶幞頭烏皮鞾自王公至一命之士通服之太宗太平興國三年詔朝官出知節鎮及轉運使副衣緋緑者並借紫知防禦團練刾史州衣緑者借緋衣緋者借紫其後江淮發運使同轉運提㸃刑獄同知刺史州雍熙初郊祀慶成始許升朝官服緋緑二十年者叙賜緋紫真宗登極京朝官亦聴叙及東封西祀赦書京朝官並以十五年為限後每帝登極亦如例仁宗景祐元年詔軍使曽任通判者借緋曽任知州者借紫神宗元豐元年去青不用階官至四品服紫至六品服緋九品以上則服緑太宗太平興國七年詔以士庶車服頗有踰僭今翰林學士承㫖李昉詳定以聞昉奏近年品官緑袍及舉子白襴下皆服紫色請禁之其私第便服許紫皂衣白袍舊制庶人服白今請流外官及貢舉人庶人通許服皂從之帽衫帽以烏紗衫以皂羅為之角帶繫鞵東都士大夫交際常服之紫衫本軍校之服中興士大夫服之以便戎事髙宗紹興二十六年禁以戎服臨民自是士大夫皆服凉衫以為便服凉衫制如紫衫亦曰白衫孝宗乾道初以其似凶服禁之便服仍許用紫衫深衣用白細布圓袂方領曲裾黒縁大帶緇冠幅巾黒履士大夫家冠昏祭祀宴居交際服之襴衫亦白細布為之圓領大袖下施横襴為裳腰間有襞積進士及國子生州縣生服之臣等謹按前世服物采章各有定式夏收殷􅒐三代已不相沿是以諸史輿服志所臚雖損益隨時而禮徴從朔敦本之義固然自北魏始啟澆風變移國俗以洎遼金元之世服飾並更未㡬而國勢浸㣲淪胥洊及載稽前蹟殷鑒具存洪惟皇朝鴻業肇興列祖列宗制作隆備釐定冠服昭示來兹皇上念切紹衣訓行罔斁於序禮器圖暨評通鑑輯覽務懲輕易之弊至再至三近復以嘉禮典中叙按未能明晳諭臣等悉心訂正且申示本天本祖饗帝饗親之至論臣等跽聆心折實為發從來所未發仰見聖心所以範率由而綿景祚者依古罕有比倫臣等謹覈各代正史紀志竝各國志之文詳列改制年載仍各系按發明用誌縁起遼自太祖仲父述瀾以約尼氏裕悦之官占居潢河決壤始為桑麻組織之教王業之基實肇於此太祖帝北方太宗制中國纎麗耎毳􅀈載而至㑹同中大后北面臣僚並國服皇帝南面臣僚並漢服乾亨五年聖宗冊承天太后給三品以上法服自是大禮雖北面三品以上亦漢服興宗重熙五年尊號冊禮皇帝服龍衮北南面臣僚並朝服自是以後大禮並從漢服矣今先列國服而以漢服次於後焉遼祭山儀大祀皇帝服金文金冠白綾袍紅帶縣魚三山紅垂飾犀玉刀錯絡縫烏鞾小祀皇帝服硬帽紅克絲龜文袍臣僚服飾各從本部旗幟之色其朝服皇帝服錫魯衮冠絡縫紅袍垂飾犀玉帶錯絡縫鞾謂之國服衮冕太宗更以錦袍玉帶臣僚戴氈冠或紗冠紫窄袍䩞鞢帶以黄紅色絛裹革為之用金玉水晶靛石綴飾謂之盤紫太宗更以錦袍金帶公服皇帝紫皁幅巾紫窄袍玉束帶或衣紅襖臣僚亦幅巾紫衣常服謂之盤裹緑花窄袍中單多紅緑色貴者披貂裘以紫黒色為貴青次之又有銀鼠尤潔白賤者貂毛羊鼠沙狐裘田獵服皇帝幅巾擐甲戎裝以貂鼠或鵞項鴨頭為扞腰蕃漢諸司使以上並戎裝衣皆左衽黒緑色其漢服終遼世郊丘不建大裘其衮服元衣纁裳十二章八章在衣四章在裳衣褾領為升龍織成文各為六等龍山以下每章一行行十二白紗中單黻領青褾襈裾黻革帶大帶劒佩綬舄加金飾通天冠絳紗袍白紗中單褾領朱襈裾白裙襦絳蔽膝白假帶方心曲領革帶佩劒綬韈舄皇太子逺遊冠絳紗袍白紗中單皂領褾襈裾白裙襦白假帶方心曲領絳紗蔽膝革帶劒佩綬韈舄與上同後改為白韈黒舄親王逺遊冠絳紗單衣白紗中單皂領襈裾白裙襦革帶鉤鞢假帶曲領方心絳紗蔽膝韈舄劒佩綬二品以上同七品以上去劒佩綬八品以下同公服其公服皇帝翼善冠柘黄袍九環帶白練裙襦六合鞾皇太子逺遊冠絳紗單衣白裙襦革帶金鉤䚢假帶方心紛鞶囊白韈烏皮履一品至五品冠幘纓絳紗單衣白裙襦帶鉤鞢假帶方心紛鞶囊六品以下去紛鞶囊餘並同其常服皇帝柘黄袍衫折上頭巾九環帶六合鞾皇太子進徳冠絳紗單衣白裙襦白韈烏皮履五品以上幞頭紫袍牙笏金玉帶烏皮六合鞾六品以下幞頭緋衣木笏銀帶魚袋佩九品幞頭緑袍鍮石帶鞾並同臣等謹按宇文懋昭大金國志國主視朝服純紗幞頭窄袖赭袍玉匾帶黄滿領金史輿服志太宗即位始服赭黄是雖初變章飾而淳樸之風未盡漓也熙宗天眷三年車駕將幸燕京始製通天冠絳紗袍自是祭祀則衮服朝㑹則朝服而臣下祭服尚闕至章宗泰和元年議制羣臣祭服於是繁文彌勝而樸略之風益逺矣金熙宗天眷三年有司以車駕將幸燕京合用通天冠絳紗袍依式成造禮服袍裳方心曲領中單蔽膝革帶大帶玉具劒綬佩舄韈其衮服用青羅夾製五綵間金繪畫日一月一昇龍四山十二上下襟華蟲火各六對虎蜼各六對背面星一昇龍四山十二華蟲火各十二對虎蜼各六對中單一白羅單製羅領褾襈裳一帶褾襈紅羅八幅夾製繡藻三十二粉十六米十六黼三十二黻三十二蔽膝一帶褾襈並紅羅夾製繡昇龍二大小綬施玉環緋白大帶紅羅勒帛青羅抹帶玉佩舄重厎紅羅面白綾托裏如意頭銷金黄羅縁口玉鼻仁飾以珠凡大祭祀加尊號受冊寳則服衮冕行幸齋戒出宫或御正殿則通天冠絳紗袍皇太子衮服青衣朱裳五章在衣山龍華蟲火宗彞四章在裳藻粉米黼黻白紗中單青褾襈裾革帶蔽膝隨裳色為火山二章玉佩大綬施玉環白韈朱舄舄加金塗銀釦謁廟則服之逺遊冠朱明服紅裳白紗中單方心曲領絳紗蔽膝白韈黒舄餘同衮服受冊寳則服之臣下朝服凡導駕及行大禮文武百官皆服之梁冠佩劒緋羅大袖緋羅裙緋羅蔽膝緋白羅大帶白羅方心曲領白紗中單銀褐勒帛烏皮履白綾韈正二品以下不佩劒熙宗皇統七年太常寺言太廟成後奉安神主祫享行禮凡行禮執事助祭陪位官准古典當服衮冕虞夏殷並十二章周九章後魏帝服衮冕與祭者皆朝服開元禮一品服九章五禮新儀正一品服九旒冕衣畫降龍今汴京舊禮直官言自宣和二年以後一品祭服七旒冕大袖無龍唐雖服九章服當時司禮少常伯孫茂道已言飾龍名衮尊卑相亂尚書省乃奏用後魏故事止用燕京大冊禮時所服朝服以祭世宗大定三年八月詔遵皇統制攝官則朝服散官則公服以皇太子為亞獻服衮冕章宗泰和元年禮官言祭服朝服厯代各有分别國朝惟天子備衮冕通天冠二等之服羣臣祭服尚闕每有祀事但以朝服從事實於典禮未當請依漢唐故事祭服冕旒畫章然三公法服有龍恐涉於僭國初禮官亦嘗駁議乞叅酌古今改置祭服其冠則如朝冠而但去其貂蟬豎筆其服用青衣朱裳白韈朱履非攝事者則用朝服庶幾少有差别上曰朝祭之服固宜分也其公服大定官制文資五品以上官服紫三師三公親王宰相一品官服大獨科花羅徑不過五寸執政官服小獨科花羅徑不過三寸二品三品服散搭花羅謂無枝葉者徑不過寸半四品五品服小雜花羅謂花頭碎小者徑不過一寸六品七品服緋芝麻羅八品九品服緑無紋羅應武官皆服紫十五年制曰袍不加襴非古也遂命文資官公服皆加襴大定二年制百官趨朝赴省並須裹帶五品以上官趨朝則朝服赴省則展皂雨雪沾衣則從便凡朝叅主寳主符展紫御仙花或太平花金束帶近侍給使供御筆硯直長符寳吏紫襖子塗金束帶輪直則近侍給使並常服常服則展紫閤門六尚遇朝叅侍立則服本品服若宫中當直則服窄紫金帶學士院官修起居注補闕拾遺祕書丞郎朝叅侍立則服本品服色帶當直則窄紫金帶東宫左右衛率僕正副僕正典儀贊儀内直郎丞當直亦許服之太子太師出入宫中則展紫至東宫則展皂三少則展紫其常服四帶巾盤領衣烏皮鞾其衣色多白三品以皂窄袖盤領縫腋下為􅀈積而不缺袴其胷臆肩袖或飾以金繡其從春水之服則多鶻捕鵞襍花卉之飾其從秋山之服則以熊鹿山林為文其長中骭取便於騎也章宗明昌六年制係籍儒生止服白衫領繫背帶止以紫圓絛羅帶乾皂鞾餘人用純紫領不得用縁雜色圓板絛羅帶不得用紫鞾用黄及黒油皂蠟等臣等謹按元憲宗二年八月祭天於日月山用冕服自此始成宗大徳六年祭天於麗正門外命獻官各公服行事大禮用公服自此始然史言至元十二年大徳十一年博士皆嘗議上衮冕制度而事未果行則憲宗之所服者特稀闊一時之舉而後亦旋廢矣大徳祭天始以公服行事則前此殆皆國服與至延祐七年英宗令省臣與太常禮儀院速製法服於是中書省㑹翰林集賢太常禮儀院官講議依袐書監所藏前代帝王衮冕法服圖本命有司製如其式盖始變而公服繼變而冕服淳朴之風離而日逺而元亦於是將季矣元國服之制無可考今叙漢服之制如左元天子衮龍服制以青羅飾以生色銷金帝星一日一月一升龍四複身龍四山三十八火華蟲虎蜼各四十八裳制以緋羅其狀如裙飾以文繡凡一十六行每行藻二粉米二黼二黻二中單制以白紗絳縁黄勒帛副之蔽膝制以緋羅有褾緋絹為裏其形如襜袍上著之繡複身龍玉佩玉環綬紅羅鞾納竒實金錦也履紅綾韈皇太子衮服元衣纁裳中單蔽膝玉佩大綬朱韈赤舄臣僚祭服三獻官及司徒大禮使有青羅服紅羅裙紅羅蔽膝白紗中單白羅方心曲領赤革履白綾韈諸執事官祭服有青羅服紅綾裙紅羅蔽膝紫羅公服白紗中單白羅方心曲領皂鞾赤革履白綾韈社稷祭服有青羅袍白紗中單紅梅花羅裙紅梅花羅蔽膝革履白綾韈白羅方心曲領宣聖廟祭服有鴉青袍方心曲領紅羅裙白絹中單紅羅蔽膝革履白絹韈曲享祭服有青羅大袖夾衣紫羅公服褐羅大袖衣白羅衫白絹中單白紗中單大紅羅夾蔽膝大紅夾裳緋紅羅夾蔽膝緋紅夾裳黄羅夾裳白羅方心曲領皂鞾白羊毳韈大紅羅鞋白絹夾韈其積蘇内庭大晏則服之冬夏之服不同無定制凡勲戚大臣近侍賜則服之下至於樂工衛士皆有其服天子積蘇冬之服十有一等夏之服十有五等詳見冠冕篇百官積蘇冬之服凡九等夏之服凡十四等其百官公服制以羅大袖盤領俱右袵一品紫大獨科花徑五寸二品小獨科花徑三寸三品散搭花徑二寸四品五品小雜花徑一寸五分六品七品緋羅小雜花徑一寸八品九品緑羅無文仁宗延祐元年詔曰比年所在士民靡麗相尚尊卑混淆僭禮費財命中書省定服飾等第凡䝉古人及見當集賽諸色人等不在禁限唯不許服龍鳳文龍謂五爪二角者其職官除龍鳯文外一品二品服渾金花三品服金荅子四品五品服雲袖帶襴六品七品服六花八品九品服四花㪚官職事從一髙庶人不得服赭黄惟許服暗花紵絲紬綾羅毳帽笠不許飾用金玉鞾不得裁制花様明皇帝衮服太祖洪武十六年定制元衣黄裳十二章日月星辰山龍華蟲六章織於衣宗彞藻火粉米黼黻六章繡於裳白羅大帶紅裏蔽膝隨裳色繡龍火山文玉革帶玉佩大小綬玉環白羅中單黻領青緑襈黄韈黄金舄二十六年更定元衣纁裳素紗中單紅羅蔽膝綬佩稍易其色朱韈赤舄餘如舊制成祖永樂三年再定衮服元衣八章日月龍在肩星辰山在背火華蟲宗彞在袖皆織成本色領褾襈裾纁裳四章織藻粉米黼黻各二前三幅後四幅前後不相連屬腰有襞積本色綼裼素紗中單青領褾襈裾領織黻文十三蔽膝隨裳色四章織藻粉米黼黻各二本色縁有紃施於縫中飾以玉鈎玉佩加綬施玉環韈舄皆赤色世宗嘉靖八年諭閣臣張璁衮冕有革帶今何不用璁對曰革帶前繫黻後繫綬左右繫佩自古冕弁恒用之今惟不用革帶前後佩服皆無所繫遂附屬裳腰之間失古制矣帝曰冕服祀天地享祖宗若闕革帶非齊明盛服之意㑹典蔽膝用羅織火山龍三章并大帶縁用錦皆與今所服不合卿可并革帶繫蔽膝佩綬之式詳考繪圖以進又曰衣裳分上下而今衣恒掩裳裳制如帷而今兩幅朕意衣但當與裳要下齊而露裳之六章又曰衣有六章古以繪今當以織朕命織染局考國初冕服日月各徑五寸當從之裳六章古用繡亦當從之古色用元黄取象天地今裳用纁於義無取當從古革帶即束帶後不當用玉蔽膝繡龍火可不用山卿與内閤諸臣同考之於是楊一清等言太祖皇帝定為十二章之制司造之官仍習舛訛非制作初意伏乞聖斷不疑帝乃擇吉更定其制元衣黄裳衣裳各六章日月徑五寸裳前後連屬如帷章用繡蔽膝隨裳色繡龍火繫於革帶大帶素表朱裏上縁以朱下以緑革帶前用玉其後無玉以佩綬繫而掩之中單及圭俱如永樂間制朱韈赤舄通天冠服絳紗袍深衣製白紗中單皂領褾襈裾絳紗蔽膝白假帶方心曲領白韈赤舄其革帶佩綬與衮服同皮弁服絳紗衣蔽膝隨衣色白玉佩革帶玉鈎䚢緋白大帶白韈黒舄武弁服親征遣將服之嘉靖八年定制韎衣靺裳俱赤色佩綬革帶如常制舄如裳色皇帝常服洪武三年定烏紗折角向上巾盤領窄袖袍束帶永樂三年更定翼善冠袍黄盤領窄袖前後及兩肩各織金盤龍一帶用玉鞾以皮為之先是洪武二十四年帝㣲行至神樂觀見有結網巾者翼日命取網巾頒示十三布政使司人無貴賤皆裹網巾天子亦常服之嘉靖七年帝以燕居冠服尚沿習俗諭張璁考古帝王燕居法服之制璁乃采禮書元端深衣之文圖註以進帝為參定其制更名曰燕弁服如古元端之制色元邊緣以青兩肩繡日月前盤圓龍一後盤方龍二邊加龍文八十一領與兩袪共龍文五九袵同前後齊共龍文四九襯用深衣之制色黄袂圓袪方下齊負繩及踝十二幅素帶朱裏青表緑縁邊腰圍飾以玉龍九元履朱縁紅纓黄結白韈皇太子衮服九章元衣纁裳衣五章織山龍華蟲宗彞火裳四章織藻粉米黼黻白紗中單黻領蔽膝隨裳色織山火二章革帶金鉤䚢玉佩綬玉環白韈赤舄永樂三年更定元衣五章龍在肩山在背火華蟲宗彞在袖皆織成本色領褾襈裾纁裳四章織藻粉米黼黻各二前三幅後四幅不相屬腰有襞積本色綼裼素紗中單青領褾襈裾領織黻文十二蔽膝隨裳色四章織藻粉米黼黻本色縁有紃施於縫中上玉鉤二玉佩大帶大小綬施玉環韈舄皆赤皮弁服絳紗袍本色領褾襈裾紅裳如冕服内制不織章素紗中單如深衣制紅領褾襈裾領織黻文十一蔽膝隨裳色本色縁有紃施於縫中玉鉤玉佩大小綬大帶韈舄赤色常服翼善冠袍赤盤領窄袖前後及兩肩各金織盤龍一玉帶鞾以皮為之親王衮冕之服青衣纁裳餘皆同東宫其皮弁服常服皆與東宫同嘉靖七年酌燕弁及忠靖冠之制為保和冠服頒賜宗室自郡王世子以上服之其服青質青縁前後方龍補身用素地邊用雲襯用深衣玉色帶青表緑裏緑縁履用皂緑結白韈親王世子衮冕七章青衣三章織華蟲火宗彞纁裳四章織藻粉米黼黻素紗中單青領襈赤韍革帶佩白玉三采綬白玉環白韈赤舄永樂三年更定冕服青衣三章火在肩華蟲宗彞在兩袖皆織成本色領褾襈裾其纁裳玉佩帶綬之制俱與親王同第領織黻文减二皮弁服制如親王其圭佩帶綬韈舄如冕服内制常服亦與親王同郡王冕服青衣三章粉米在肩藻宗彞在兩袖皆織成纁裳二章織黼黻各二中單領織黻文七餘與親王世子同皮弁服常服亦與親王世子同郡王長子朝服七梁冠大紅素羅衣白素紗中單大紅素羅裳及蔽膝大紅素羅白素紗二色夾帶玉朝帶丹礬紅花錦錦雞綬玉佩象笏白絹韈皂皮雲頭履鞵公服皂縐紗幞頭大紅素紵絲衣玉革帶常服烏紗帽大紅紵絲織金獅子開䙆圓領玉束帶皂皮銅線鞾文武官朝服洪武二十六年定用梁冠赤羅衣白紗中單青飾領縁赤羅裳青縁赤羅蔽膝大帶革帶佩綬白韈黑履初洪武元年命制公服朝服以賜百官禮部言各官散官與現任職事髙下不同服色不能無異乞定其制詔省部臣定議禮部復言唐制服色皆以散官為凖元制散官職事各從其髙者國初服色依散官與唐制同乃定服色凖㪚官不計現職所賜袍帶亦如之三年禮部言厯代異尚夏黒商白周赤秦黒漢赤唐服色黄旗幟赤國家承元之後取法周漢唐宋服色所尚於赤為宜從之凡親祀郊廟社稷文武官分獻陪祀則服祭服青羅衣白紗中單俱皂領縁赤羅裳皂縁赤羅蔽膝方心曲領其冠帶佩綬等差同朝服其家用祭服三品以上去方心曲領四品以下并去佩綬嘉靖八年更定百官祭服上衣青羅皂縁下裳赤羅皂縁蔽膝綬環大帶革帶佩玉韈履俱與朝服同其視牲朝日夕月耕耤祭厯代帝王廟獨錦衣衛堂上官大紅蟒衣飛魚烏紗帽鸞帶佩繡春刀祭太廟社稷則大紅便服其公服每日早晚朝奏事及侍班謝恩見辭則服之在外文武官每日公座服之其制盤領右袵袍用紵絲或紗羅絹袖寛三尺一品至四品緋袍五品至七品青袍八品九品緑袍未入流雜職官與八品以下同花様與元制同其常服洪武三年定凡常朝視事以烏紗帽圓領衫束帶為公服六年禮官議品官見尊長用朝君公服於理未安宜别製梁冠絳衣裳革帶大帶大白韈烏舄其衣裳去縁襈三品以上佩綬三品以下不用從之二十四年又定公侯駙馬伯服繡麒麟白澤文官一品仙鶴二品錦雞三品孔雀四品雲雁五品白鷴六品鷺鷥七品􅗌􅈑八品黄鸝九品鵪鶉雜職練鵲風憲官獬廌武官一品二品獅子三品四品虎豹五品熊羆六品七品彪八品犀牛九品海馬嘉靖七年既定燕居法服之制閣臣張璁因言品官燕居之服未有明制乞更法古元端别為簡易之制昭布天下使貴賤有等帝因復製忠靜冠服在京許七品以上官及八品以上翰林院國子監行人司在外許方面官及各府堂官州縣正堂儒學教官服之武官止都督以上其餘不許濫服其服仿古元端色用深青以紵絲紗羅為之三品以上雲四品以下素縁以藍青前後飾本等花様補子深衣用玉色素帶如古大夫之帶制青表緑縁邊并裏素履青緑絛結白韈其狀元及諸進士冠服狀元冠二梁緋羅圓領白絹中單錦綬蔽膝紗帽槐木笏光銀帶蕊玉佩朝鞾氊韈皆御前頒賜上表謝恩日服之進士巾如烏紗帽頂㣲平展角濶寸餘長五寸系以垂帶皂紗為之深藍羅袍縁以青羅袖廣而不殺槐木笏革帶青鞓飾以黒角垂撻尾於後傳臚日服之釋菜禮畢易常服生員襴衫用玉色布絹為之寛袖皂縁皂絛軟巾垂帶貢舉入監者不變所服仁宗時命監生易青圓領庶人四方平定巾雜色盤領衣不許用黄不得僭用金繡錦綺紵􅁝綾羅止許紬絹素紗欽定續通典卷五十九
