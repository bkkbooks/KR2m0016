殿外立三舞襍隊於殿下駕興大樂作陞座樂止文武官入列於殿外北向拜大樂作拜畢樂止進御筵樂作進訖樂止進花樂作進訖樂止進第一爵教坊司奏炎精開運之曲樂作内外官拜畢樂止散花樂作散訖樂止第二爵奏皇風之曲樂止進湯鼓吹饗節前導至殿外鼓吹止殿上樂作羣臣湯饌成樂止武舞入教坊司請奏平定天下之舞第三爵教坊司請奏眷皇明之曲進酒如前儀樂止教坊司請奏撫安四夷之舞第四爵奏天道𫝊之曲進酒進湯如前儀樂止奏車書㑹同之舞第五爵奏振皇綱之曲進酒如前儀樂止奏百戲承應第六爵奏金陵之曲進酒進湯如前儀樂止奏八蠻獻寳承應第七爵奏長楊之曲進酒如前儀樂止奏採蓮隊子承應第八爵奏芳醴之曲進酒進湯如前儀樂止奏魚躍于淵承應第九爵奏駕六龍之曲進酒如前儀樂止收爵進湯進大膳樂作供羣臣飯食訖樂止百花隊舞承應宴成徹案羣臣出席北向拜樂作拜畢樂止駕興大樂作鳴鞭百官以次出此朝賀宴享之樂歌節奏也成祖永樂十八年北京郊廟成其合祀合享禮樂一如舊制更定宴饗樂舞初奏上萬夀之曲平定天下之舞二奏仰天恩之曲撫四夷之舞三奏感地徳之曲車書㑹同之舞四奏民樂生之曲表正萬邦之舞五奏感皇恩之曲天命有徳之舞六奏慶豐年之曲七奏集禎應之曲八奏永皇圖之曲九奏樂太平之曲嘉靖元年御史汪珊請屏絶玩好令教坊司毋得以新聲巧技進世宗嘉納之是時更定諸典禮因亦有志於樂建觀徳殿以祀獻帝召協律郎肄樂供祀事後建世廟成改殿曰崇先乃親製樂章命大學士費宏等更定曲名以别於太廟其迎神曰永和之曲初獻曰清和之曲亞獻曰康和之曲終獻曰沖和之曲徹饌曰泰和之曲送神曰寧和之曲宏等復議獻皇生長太平不尚武功其三獻皆當用文徳舞從之遂去武舞已而太常復請之乃命禮官㑹張璁議璁言樂舞以佾數為降殺不聞以武文為偏全使八佾之制用其文而去其武則兩階之容得其左而闕其右是皇上舉天子禮樂而自降殺之矣何以式四方垂萬世乃從璁議仍用二舞九年二月始祈榖於南郊帝親製樂章命太常協於音譜是年始祀先蠶下禮官議樂舞禮官言先蠶之祀周漢所同其樂舞儀節經史不載唐開元先蠶儀注大樂令設宫縣於北郊壇壝内諸女工咸列於後則祀先蠶用女樂可知唐六典宫縣之舞八佾軒縣之舞六佾則祀先蠶用八佾又可知然止言舞生冠服而不及舞女冠服陳暘樂書享先蠶圖下止有宫架登歌圖而不及舞夫有樂有舞雖祀禮之常然周漢制度既不可考宋祀先蠶代以有司又不可據惟開元略為近古而陳氏樂書考据亦明前享先農既以佾數不足降八為六則今祀先蠶止用樂歌不用樂舞亦合古制且以見少殺先農之禮帝以舞非女子事罷不用使議樂女冠服以聞禮官言北郊隂方其色尚黑同色相感事神之道漢蠶東郊魏蠶西郊色皆尚青非其色矣樂女冠服宜黑乃用樂六奏去舞其樂女皆黑冠服因定享先蠶樂章又以祀典方釐定南北郊復朝日夕月之祭命詞臣取洪武時舊樂歌一切更改禮官因請廣求博訪有如宋胡瑗李照者具以名聞授之太常考定雅樂給事中夏言乃以致仕甘肅行太僕寺丞張鶚應詔命趣召之既至授鶚太常寺丞令詣太和殿較定樂舞鶚遂上言周禮有郊祀之樂有宗祀之樂尊親分殊聲律自别臣伏聽世廟樂章律起林鍾均殊太廟臣竊異之盖世廟與太廟同禮而林鍾與黄鍾異樂函鍾主祀地祗位寓坤方星分井鬼樂奏八變以報資生之功故用林鍾起調林鍾畢調也黄鍾主祀宗廟位分子野星𨽻虛危樂奏九成以報本源之徳故用黄鍾起調黄鍾畢調也理義各有歸㫖聲數黙相感通况天地者父母之象大君者宗子之稱今以祀母之樂奏以祀子恐世廟在天之靈必不能安且享矣不知譜是樂者何所見也臣觀舊譜樂章字用黄鍾聲同太廟但審聽七聲中少一律今更補正使依奏格則祖孫一氣相為流通函黄二宫不失均調尊親之分兩得神人之心胥悦矣詔下禮官李時等覆奏以為鶚所言與臣等所聞於律吕諸書者深有所合盖黄鍾一調以黄鍾為宫太蔟為商姑洗為角㽔賔為變徵林鍾為徵南吕為羽應鍾為變宫舊樂章用合用四用一用尺用工去㽔賓之勾而越次用再生黄鍾之六此舊樂章之失也若林鍾一調則以林鍾為宫南吕為商應鍾為角大吕之半聲為變徵太蔟之半聲為徵姑洗之半聲為羽㽔賓之半聲為變宫邇者沈居敬更協樂章用尺用合用四用一用工用六夫合黄鍾也四太蔟之正聲也一姑洗之正聲也六黄鍾之子聲也以林鍾為宫而所用為角徴羽者皆非其一均之聲則謬甚矣况林鍾一調不宜用於宗廟而太廟與世廟不宜異調鶚見尤真自今宜用舊協音律惟加以蕤賓勾聲去再生黄鍾之六改用應鍾之凡以成黄鍾一均庶於感格之義深有所補乃命鶚更定廟享樂音而逮治沈居敬等鶚尋譜定帝社稷樂歌以進詔嘉其勤優禄一級陞為少卿掌教雅樂十二年五月夏言又奏古者龍見而雩命樂正習盛樂舞皇舞請依古禮定大雩之制當三獻禮成之後九奏樂止之時櫽括雲漢詩詞製為雲門一曲使文武舞士並舞而合歌之仍於神樂觀增設鼓吹數畨選教舞童百人青衣執羽繞壇周旋歌雲門之曲而舞曲凡九成藉以鼓暢陽氣敷潤下土帝可其議其所定樂章迎神中和奠帛肅和進俎咸和初獻夀和亞獻景和終獻永和徹饌凝和送神清和望燎太和十七年九月上太宗廟號成祖獻皇帝廟號睿宗遂奉睿宗神主祔太廟各撰樂章並定九廟樂章上成祖謚號樂章迎神太和舉冊寳熙和初獻夀和亞獻豫和終獻康和徹饌永和送神安和上睿宗廟號樂章曲名同詞别撰其升祔太廟樂章迎神太和初獻夀和亞獻豫和終獻寧和徹饌雍和送神安和於是二祖七宗凡九廟春特三時祫季冬大祫樂章皆更定焉孟春九廟特享樂章太祖廟迎神太和初獻夀和亞獻豫和終獻寧和徹饌豫和還宫安和成祖廟迎神太和三獻徹饌還宫俱與太祖廟同仁宗廟迎神太和初獻夀和亞獻豫和終獻寧和徹饌雍和還宫安和宣廟英廟憲廟俱與仁廟同孝廟曲名與仁廟同詞别撰武廟迎神曲詞别撰餘俱與孝廟同睿宗曲名並同詞别撰九廟時祫樂章孟夏迎神太和初獻夀和亞獻豫和終獻寧和徹饌雍和還宫安和孟秋迎神三獻徹饌還宫曲詞俱别撰孟冬迎神徹饌詞别撰三獻俱同孟秋還宫亦同惟改嘗祫為烝祫大祫樂章迎神三獻徹饌還宫並有詞無曲名定大享樂章帝欲宗祀皇考以配上帝遂定明堂大享禮時未建明堂迨季秋乃大享上帝於元極寳殿奉皇考睿宗配焉所奏樂章迎神中和奠玉帛肅和進俎凝和初獻夀和亞獻豫和終獻熙和徹饌雍和送神清和望燎時和至十月禮部言皇上肇成大享仰答嚴恩諸禮度儀物皆宜次第修舉而太常寺宗祀贊禮尤宜備官請選樂舞生以次充補並令各壇樂舞生通融執事帝曰今秋肇稱大祀制度未備諸建置釐正事宜候朕命行大常官即加考選樂舞生許通融執事十一月上皇天上帝泰號改上太祖髙皇帝髙皇后尊號各撰樂章上泰號樂章迎神中和升冊表元和奠玉帛休和進俎豫和初獻夀和奏祝景和亞獻太和終獻永和徹饌咸和送神清和奉燎熙和改上尊號樂章迎神太和舉冊寳鴻和初獻崇和亞獻豫和終獻永和徹饌彰和還宫綏和穆宗隆慶三年七月裁省協律郎及樂舞生員數時罷諸不急祀其樂亦革省協律郎十九員裁樂舞生千四十七人一切禮儀皆復祖宗之故欽定續通典卷八十六
