body:
  text: 樂歴代沿革下遼金元明遼有國樂有諸國樂有雅樂有大樂有散樂有鐃歌横吹樂祭天神地祇於木葉山用樂正月朔日夜皇帝燕飲用國樂春飛放杏堝皇帝射獲頭鵞薦廟燕飲樂工數十人執小樂器侑酒七月十三夜皇帝出行宫三十里卓帳宿十四日應從諸軍隨各部落動樂十五日中元大宴用漢樂臘日皇帝帯甲戎装五更三㸃坐朝動樂飲酒正月元㑹用大樂曲破後用散樂角觗終之朝㑹設熊羆十二案法駕有前後部鼓吹樂太宗㑹同元年十一月晉遣馮道劉煦來上尊號得晉大樂三年四月宴晉及諸國使晉使楊端王朓起進酒作歌舞大同元年正月入汴二月丁巳朔建國號大遼初號契丹至是始稱遼大赦改元用晉樂時晉開運四年也太宗入晉金吾六軍殿中省仗太常樂舞陳於庭聖宗統和元年六月上皇太后尊號用宫縣雅樂設宫縣簨虡皇太后自紫宸殿乗平頭輦童子女童隊樂引至金鑾門太后儀衛動奏太和之樂文武三品以上入奏舒和之樂皇帝入門奏雍和之樂太平元年十一月帝御昭慶殿百僚奉册加上尊號用宫縣雅樂初遼本唐用十二和豫和祀天神順和祭地祗永和享宗廟肅和登歌奠玉帛雍和入俎按神夀和酌獻飲神太和節升降舒和節出入昭和舉酒休和以飯正和皇后受册以行承和太子以行後改用十二安樂天子出入奏隆安太子行奏貞安餘十安樂名闕金太祖天輔五年伐遼詔克中京先以禮樂儀仗等津發赴闕太宗天㑹五年四月宗翰宗望以宋大樂北還熙宗皇統元年正月上尊號用宋樂有司以鐘磬刻晟字者犯太宗諱皆以黄紙封之黄佐曰宋徽宗作大晟樂八音皆以金字識之後皆沒於金主晟時定文舞曰仁豐道洽之舞武舞曰功成治定之舞貞元儀又改文舞曰保大定功之舞武舞曰萬國來同之舞世宗大定十一年加武舞曰四海㑹同之舞海陵天徳二年十月冊皇后用宫縣樂是日皇帝將升御座宫縣奏乾寧之曲降座同冊寳入門奏昌寧之曲出門同將受冊寳以冊寳入門宫縣奏肅寧之曲命婦升降同皇后出閤奏順寧之曲升降座同受冊奏坤寧之曲别日㑹羣官㑹妃主宗室等賜酒設食簪花教坊作樂四年二月冊皇太子前一日儀鸞司設御座於大安殿大樂令帥其屬展樂縣於庭其日皇帝將升御座宫縣奏乾寧之曲皆用夾鍾宫至世宗大定八年正月冊皇太子皇帝將升御座宫縣奏洪寧之曲皇太子入門奏肅寧之曲羣臣合班奏嘉寧之曲皇太子復受冊位奏和寧之曲皆用太蔟宫世宗大定三年十月增上睿宗尊諡皇帝御大安殿授太尉冊寳行事備登歌宫縣樂太尉率百官赴衍慶宫行禮用登歌樂樂奏顯寧之曲用應鍾宫七年正月御大安殿受尊號冊寳百官上夀備宫縣登歌二舞皇帝將出奏乾寧之曲冊寳入宫縣奏歸羙揚功之曲合班樂奏同冊寳進行樂奏肅寧之曲冊匣升殿樂奏同讀冊訖寳盝升殿樂奏同讀寳訖宫縣奏純誠享上之曲太尉跪賀宫縣奏肅寧之曲太尉司徒就百僚位宫縣奏同禮畢奏乾寧之曲降座入後閣百僚歸幕次以俟上夀上冊寳禮畢有司供辦御床及與宴羣官位攝太常卿與大樂令帥工人入宫縣奏乾寧之曲皇帝即座合班樂奏肅寧之曲上公由東階升宫縣奏同進爵宣答訖分班再引上公自東階升宫縣奏同跪舉酒宫縣奏景命萬年之曲飲訖降階宫縣奏肅寧之曲與宴羣官升殿宫縣奏同内侍局進御床入再進第一爵酒登歌奏聖徳昭明之曲行羣官酒宫縣奏肅寧之曲文舞入設羣官食宫縣奏保大定功之舞三成止出又進第二爵酒登歌奏天贊堯齡之曲行羣官酒宫縣奏肅寧之曲武舞入設羣官食宫縣奏萬國來同之舞三成止出又進第三爵酒登歌奏慶雲之曲行羣官酒宫縣奏肅寧之曲設羣官食宫縣奏同禮畢羣官降階宫縣奏同扇合簾降奏乾寧之曲降座入後閤七月建社稷壇於中都祭用春秋二仲月上戊日樂用登歌遣官行事祭日大樂令帥樂工入太尉詣盥洗位作太蔟宫正寧之曲詣太社壇作應鍾宫嘉寧之曲奠玉幣作太蔟宫嘉寧之曲司徒奉太社之俎大官令引太社太稷之饌入作太蔟宫正寧之曲太尉詣罍洗位詣太社壇至酒罇所酌酒訖作太蔟宫阜寧之曲太尉詣配位酌酒訖作太蔟宫昭寧之曲太祝進徹豆作應鍾宫娛寧之曲十一年十一月郊祀前一日朝享於太廟皇帝入門宫縣無射宫昌寧之曲升殿登歌夾鍾宫昌寧之曲迎神宫縣來寧之曲黄鍾三奏大吕角二奏太蔟徴二奏應鍾羽二奏皇帝盥洗宫縣無射宫昌寧之曲升階降階並同司徒奉俎宫縣無射宫豐寧之曲始祖酌獻宫縣無射宫大元之曲獻祖大昭之曲昭祖大成之曲景祖大昌之曲世祖大武之曲肅宗大明之曲穆宗大章之曲康宗大康之曲太祖大定之曲太宗大惠之曲睿宗大和之曲文舞退武舞進宫縣肅寧之曲亞終獻同皇帝飲福登歌夾鍾宫福寧之曲徹豆登歌夾鍾宫豐寧之曲送神宫縣黄鍾宫來寧之曲是年太常議樂曲之名唐以和宋以安本朝以寧顧郊祀樂曲未備皇統九年拜天用乾寧之曲今圜丘降神固可就用其皇帝入中壝奠玉幣迎俎酌獻舞出入樂曲宜皆以寧字製名遂命學士院撰焉皇帝入中壝宫縣黄鍾宫昌寧之曲凡歩武同降神宫縣乾寧之曲仁豐道洽之舞圜鍾為宫三奏黄鍾為角太蔟為徴姑洗為羽皆一奏皇帝盥洗宫縣黄鍾宫昌寧之曲升壇登歌大吕宫昌寧之曲昊天上帝奠玉幣登歌大吕宫洪寧之曲皇地祇坤寧之曲配位太祖皇帝永寧之曲司徒迎俎宫縣黄鍾宫豐寧之曲昊天上帝酌獻登歌大吕宫嘉寧之曲皇地祇泰寧之曲配位太祖皇帝燕寧之曲文舞退武舞進宫縣黄鍾宫咸寧之曲亞終獻宫縣同功成治定之舞皇帝飲福登歌大吕宫福寧之曲徹豆登歌大吕宫豐寧之曲送神宫縣圜鍾宫乾寧之曲方丘如圜丘之儀迎神鎮寧之曲林鍾宫再奏太蔟角再奏姑洗徴再奏南吕羽再奏初獻盥洗太蔟宫肅寧之曲升壇應鍾宫肅寧之曲奠玉幣太蔟宫億寜之曲司徒奉俎太蔟宫豐寧之曲正位酌獻太蔟宫溥寧之曲配位配太宗也酌獻太蔟宫保寧之曲亞終獻升壇太蔟宫咸寧之曲徹豆應鍾宫豐寧之曲送神林鍾宫鎮寧之曲詣望燎謹按燎應作瘞史誤刻也位太蔟宫肅寧之曲又詔以三年冬祫五年夏禘為常禮皇帝親享備宫縣登歌樂皇帝入門宫縣無射宫昌寧之曲出入歩武同升殿登歌夾鍾宫昌寧之曲升階及將還版位皆同盥洗宫縣無射宫昌寧之曲降階同迎神宫縣來寧之曲黄鍾宫三奏大吕角二奏太蔟徴二奏應鍾羽二奏司徒引俎宫縣無射宫豐寧之曲始祖酌獻宫縣無射宫大元之曲徳皇帝大熙之曲安皇帝大安之曲獻祖大昭之曲昭祖大成之曲景祖大昌之曲世祖大武之曲肅宗大明之曲穆宗大章之曲康宗大康之曲太祖大定之曲太宗大恵之曲熙宗大同之曲睿宗大和之曲世宗大鈞之曲顯宗大寧之曲章宗大隆之曲宣宗大慶之曲謹按金史樂志禘祫親饗諸曲均不載製造年月雅樂篇則彚叙於大定十一年朝饗之後今仍原文附載於此文舞退武舞進宫縣無射宫肅寧之曲亞終獻無射宫肅寧之曲飲福登歌夾鍾宫福寧之曲徹豆登歌夾鍾宫豐寧之曲送神宫縣黄鍾宫來寧之曲十四年大常議歴代之樂各自為名今郊廟社稷所用宋樂器犯廟諱宜皆刮去更為製名於是命禮部學士院太常寺撰名取大樂與天地同和之義名之曰大和元太宗十年十一月徴金太常遺樂宣聖五十一代孫衍聖公元措言於帝曰今禮樂散失燕京南京等處亾金太常故臣及禮册樂器多存者乞降㫖收録於是降㫖令各處管民官如有亾金知禮舊人可并其家屬徙付東平令元措領之於本路税課所給其食憲宗二年三月五日命東平萬戸嚴忠濟立局制鐘磬筍虡儀物肄習五月十三日召太常禮樂人赴日月山八月七日學士魏祥卿徐世隆郎中姚樞等以樂工李明昌許政呉徳叚楫㓂忠杜延年趙徳等五十餘人見於行宫帝問制作禮樂之始世隆對曰堯舜之世禮樂興焉時明昌等各執鐘磬笛簫箎塤巢笙於帝前奏之曲終復合奏之凡三終十一日始用登歌樂祀昊天上帝於日月山祭畢命驛送樂工還東平世祖中統元年七月用新製雅樂享祖宗於中書省三年九月東平萬戸嚴光範奏太常登歌樂器樂工已完宫縣樂文武二舞未備凡用人四百一十二請以東平漏籍戸充之合用樂器官為置備制可命中書省臣議行於是中書命左三部太常寺少府監於興禪寺置局委官楊天祐太祝郭敏董其事大樂正翟剛辦驗音律充收受樂器官丞相耶律鑄又言今製宫縣大樂内編磬十有二虡宜於諸處選石材為之太常寺以新撥宫縣樂工文武二舞四百一十二人未習其藝遣大樂令許政往東平教之至元二年閏五月大樂署言堂上下樂舞官員及樂工合用衣服冠冕鞾履等物乞行製造中書禮部移凖太常博士議定制度七月中書吏部再凖太常博士議定行下所司製造宫縣樂器既成大樂署郭敏開坐名數以上是月新樂服成樂工至自東平勅翰林院定撰八室樂章大樂署編運舞節俾肄習之十一月有事於太廟宫縣登歌文武二舞咸備其迎送神曲曰來成之曲降神文武九成黄鍾宫三成大吕角二成太蔟徴二成應鍾羽二成送神黄鍾宫一成烈祖曰開成之曲太祖曰武成之曲太宗曰文成之曲皇伯考卓沁曰弼成之曲皇伯考察罕台曰協成之曲睿宗曰明成之曲定宗曰熙成之曲憲宗曰威成之曲初獻盥洗曰肅成之曲無射宫初獻升降登歌肅成之曲夾鍾宫司徒奉俎曰嘉成之曲文舞退武舞進曰和成之曲亞終獻酌獻曰順成之曲並無射宫徹豆登歌豐成之曲夾鍾宫文舞曰武定文綏之舞武舞曰内平外成之舞武舞六成第一成象滅王罕二成破西夏三成克金四成收西域定河南五成取西蜀平南詔六成臣髙麗服交趾初清廟雅樂止有登歌詔耶律鑄製宫縣八佾之舞至元四年三月樂舞成表上之仍請賜名大成制曰可十三年三月平宋得其樂器宋主㬎舉國内附詔凡太常寺祭器樂器法服樂工鹵簿儀衛等物盡仰收拾巴延入臨安遣郎中孟祺籍宋太廟四祖殿景靈宫禮樂器暨太常寺祭器樂器等物至十七年四月以宋太常樂付太常寺十九年王積翁又請徴亡宋雅樂器至京師置於八作司與之鎛鐘二十有七編鐘七百二十有三特磬二十有二編磬二十有八鐃六單鐸䨇鐸各五鉦錞各八三十年六月初立社稷樂用登歌命大樂正許徳良運製曲譜翰林國史院撰樂章其降送神曰鎮寧之曲降神八成林鍾宫二成太蔟角二成姑洗徴二成南吕羽二成送神林鍾宫一成初獻盥洗升壇降壇望瘞位皆肅寧之曲盥洗望瘞大蔟宫升降應鍾宫正配位奠玉幣曰億寧之曲太蔟宫司徒奉俎徹豆曰豐寧之曲奉俎太蔟宫徹豆應鍾宫正配位酌獻曰保寧之曲亞終獻曰咸寧之曲並太蔟宫明年八月初祀社稷用堂上樂嵗以為常成宗大徳六年三月合祭昊天上帝皇地祗五方帝於南郊撰定樂章降神奏乾寧之曲六成圜鍾宫三成黄鍾角一成太蔟徵一成姑洗羽一成初獻盥洗奏肅寧之曲黄鍾宫初獻升降奏肅寧之曲大吕宫奠玉幣奏大吕宫迎俎奏豐寧之曲黄鍾宫酌獻奏嘉寧之曲大吕宫亞終獻奏咸寧之曲黄鍾宫徹豆奏豐寧之曲大吕宫送神奏圜鍾宫望燎奏黄鍾宫九年十一月祀昊天上帝於南郊其文舞曰崇徳之舞武舞曰定功之舞時新建郊壇既成命大樂署編運曲譜舞節翰林撰樂章十一月二十八日親祀圜丘用之皇帝入中壝黄鍾宫皇帝盥洗黄鍾宫皇帝升壇降壇大吕宫降神奏天成之曲圜鍾宫三成黄鍾角一成太蔟徴一成姑洗羽一成初獻