body:
  text: 禮凶喪制上初喪宋元明宋司馬光書儀疾病遷居正寢内外安静以俟氣絶男子不絶於婦人之手婦人不絶於男子之手既絶諸子啼兄弟親戚侍者皆哭各盡哀止哭朱子家禮疾病遷居正寢既絶乃哭明邱濬補儀節云遷居正寢戒内外書遺言加新衣屬纊廢牀寢地楔齒舉哀元制凡有疾危殆移居外帳房死則殯殮其中明品官喪屬纊以俟氣絶乃廢牀寢於地庶人喪禮同復始卒事位及奠訃告等附宋明宋政和五禮新儀品官喪位皆以服精麤為序復於正寢復者三人六品以下二人婦人視其夫皆常服以死者之上服左荷之升自前東榮當屋履危危屋棟也北面西上左執領右執腰招以左每招曰臯某復三呼而止丈夫稱字或伯仲婦人皆稱姓投衣於前授以箱升自東階入以覆尸復者降自後西榮復衣不以襲斂浴則去之設牀第於室户内之西去脚舒簟設帨施幄去裙遷尸於牀南首覆用夷衾大斂時所用之衾也黄表素裏下同去死衣疾困所加新衣即牀而奠按𦵏以前皆謂之奠其禮甚簡葢哀不能文而於新死者亦未忍遽以鬼神之禮事之也贊者以脯醢酒用吉器升自東階設於尸東當腢内喪皆内賛者行事受於户外入而設之既奠贊者降出帷堂司馬光書儀侍者一人以死者之上服左執領右執腰就寢庭之南北靣招以衣呼曰某人復凡三呼畢卷衣入覆於尸上然後行死事立喪主主婦䕶喪司書司貨易服訃告䕶喪司書為之發書訃告於親戚及僚友朱子家禮復立喪主主婦䕶喪司書司貨按邱濬補載諸器物非盡始死時所需多有用于既襲既斂之後者故不録乃易服不食治棺訃告於親戚僚友明品官喪復於正寢復者以死者之上服左荷之升自前東榮當屋履棟北面西上左執領右執腰招以左每招曰某人復三呼而止以衣投於前承之以篋升自東階入以覆尸復者降自後西榮乃立喪主主婦䕶喪司書司貨執事者設牀於室户内之西去脚舒簟設枕施幄遷尸於牀南首覆用斂衾去死衣即牀而奠奠者以酒饌升自東階設於尸東當腢既奠贊者降出帷堂大夫士弔服宋遼宋朱子家禮凡弔皆素服幞頭衫帶皆以生白絹為之黄榦儀禮弔服圖説大夫相為弔服弁絰錫衰士朋友相為服弔脤加麻緦絰帶疑衰素裳庶人弔服素委貌白布深衣婦人弔服吉笄無首素􅄣服婦與夫同遼制弔服用素服乗赭白馬三不弔議明明吕坤四禮疑曰三不弔非人情也三族五服之親是可已乎禮畏壓溺皆不弔正逺於人情父母妻族五服血屬之親寧忍於不弔乎沐浴宋明宋政和五禮新儀品官喪將沐掌事者淅稷米六品以下用粱米取潘煮之又汲為湯以俟浴以盆承潘及沐盤升自西階以授沐者以侍者四人為之六品以下二人沐者執潘及盤入主人以下皆出户外北靣西上按沐浴裸裎主人出至設明衣裳而後入人子之於父母若有所避者古命士以上父子異宫必無祼裎以見其子者死而沐浴猶此志也俱立哭丈夫在東婦人在西婦人權障以帷下同乃沐櫛束髪用組浴則四人抗衾二人浴拭用巾挋用浴衣濡濯棄於坎設牀於尸東衽下莞上簟浴者舉尸易牀設枕翦鬢斷爪盛以小囊大斂納於棺著明衣裳按此生時之齋服也陳用之云明衣以致其精明之徳以方巾覆靣仍以大斂之衾覆之主人以下入就位哭士庶人喪同惟淅粱米及浴不云四人與無抗衾二人為異耳司馬光書儀將沐浴則以帷幛臥内侍者設牀於尸所臥牀前縱置之施簀席簟枕不施氊褥遷尸於牀上南首覆之以衾侍者掘坎於屏處潔地陳襲衣裳於堂前東北藉以席西領南上幅巾一充耳二用白纊幎目一用帛方尺二寸握手用帛長尺二寸廣五寸深衣大𢃄屐又陳沐浴之具於堂前西壁下南上沐巾一浴巾二設於筐櫛置於桌子上侍者以沐浴湯入主人以下皆出立於帷外北面侍者沐髪櫛之晞之以巾撮為髻舉衾而浴拭之以二巾翦爪如平時其沐浴餘衣及巾櫛皆棄於坎遂築而實之侍者别設襲牀施薦席氊褥枕如平時先置大帯深衣袍襖汗衫袴襪勒帛裹肚之類於其上遂舉以入置浴牀之西遷尸於其上悉去病時衣及復衣易以新衣但未著幅巾深衣屐移至堂中間卑幼則各於其室中間執事者置脯醢酒於桌升自阼階祝盥手洗盞斟酒奠於尸東當腢巾之按士喪禮復者降楔齒綴足即奠脯醢醴酒於尸東開元禮五品以上如士喪禮六品以下含而後奠宋不以官品髙下沐浴正尸然後設奠於事為冝奠謂斟酒奉至桌上而不酹也主人虞祭然後親奠酹巾者以辟塵蠅凡無两階者止以階之東偏為阼階西偏為西階祝選親戚為之明邱濬家禮補有沐浴之具幃掘坎為垼盆瓶沐巾浴巾櫛組明制品官喪沐巾浴巾浴衣皆具於西序南上陳襲衣於房中掌事者為湯以俟以浴盆及沐盤升自西階以授沐者以侍者四人為之六品以下三人沐者入喪主以下皆出户外北面西上俱立哭乃沐櫛束髪用組抗衾而浴拭以巾餘水棄於坎設牀於尸東下莞上簟浴者舉尸易牀設枕翦髪斷爪盛於小囊大斂納於棺著明衣裳以方巾覆面仍以大斂之衾覆之喪主以下入就位哭庶人喪侍者以湯入喪主以下皆出幃外北面侍者沐髪櫛之晞以巾撮為髻抗衾而浴拭以巾翦爪併沐浴餘水巾櫛棄於坎而埋之含宋明宋政和禮品官喪贊者奉盤水及笲笲竹器也飯用稷含用璧升堂六品以下用粱與貝含者六品以下主人自為之盥手於户外贊者沃盥含者洗稷璧粱貝同實於笲執以入賛者從入北面徹枕奠笲於尸東含者坐於牀東西面發巾實飯含於尸口訖主人復位位在尸東庶人喪贊者舉奉盤以及笲飯用粱含用貝升堂主人出盥手於户外洗粱貝實於笲執以入徹枕奠笲於尸東主人坐於牀東西面發巾實飯含於尸口訖主人復位司馬光書儀侍者陳飯含之具於堂前西壁下南上錢三實於小箱古者飯用米貝今用錢猶古用貝也大夫以上仍有珠玉錢多既不足貴又口所不容珠玉則更為盜賊之招故但用三錢而已米二升實於􅀢古者諸侯飯用粱大夫用稷士用稻今但用卿士平日所食之米可也古升小故用四升今升大故用二升明邱濬家禮補有含具錢箱米椀匙盥盆明制品官喪贊者奉盤水及笲升堂含者六品以下喪主自為之盥手於戸外贊者沃盥含者洗飯玉實於笲執以入贊者從入北面徹枕奠笲於尸東含者坐於牀東西面發巾實飯含於尸口訖喪主復位庶人喪喪主盥手執錢箱以入侍者一人挿匙於米椀執以從置於尸西以幎巾徹枕覆面喪主就尸東由足而西牀上坐東面舉巾以匙抄米實於尸口併實以錢侍者加幅巾充耳設幎目納履乃襲深衣結大帶設握手覆以衾明史喪𦵏之制飯含五品以上飯稷含珠九品以上飯粱含小珠襲宋明宋政和五禮新儀品官喪飯含後襲者以牀升入設於尸東布枕席如初執服者陳襲衣於席遷尸於席上而衣之凡衣死者左衽不紐祝去巾加面衣設充耳著握手納履若舄覆以夷衾内外皆就位哭如初諸尊者於卑幼之喪及嫂叔兄弟娣姪婦哭朝晡之間非有事則休於别室明集禮品官喪與宋政和禮同設氷周左傳昭公四年申豐曰大夫命婦喪浴用氷禮記䟽浴時無席為漏水也設氷無席為通寒氣也人君仲春則用氷卿大夫以下三月以後得用氷既襲謂大夫也既小斂謂士也皆是死之明日若天子諸侯亦三日而設氷在襲斂之前也杜典不載今補纂設銘周宋明檀弓銘明旌也以死者為不可别已故以其旗識之愛之斯録之矣敬之斯盡其道焉耳杜典不載今𥙷纂宋政和禮品官設銘以絳廣充幅四品以下廣終幅韜杠杠銘竿也其長視絳四品以上長九尺六品以上長八尺九品以上長七尺書曰某官封之柩婦人視其夫有官封則曰某官封某人姓氏之柩未有封曰某妣或妻某氏之柩庶人設銘於西階下銘以絳廣充幅韜杠書云某人之柩明品官喪設銘旌倚於靈座之右庶人喪亦立銘旌臣等謹案銘旌制度宋政和五禮新儀注四品以上長九尺六品以上長八尺九品以上長七尺宋史禮志詔𦵏禮院例三品以上長九尺五品以上八尺六品以上七尺明制喪𦵏之制四品以上銘旌絳帛長九尺諸説不一各因時以定制耳懸重宋宋品官喪為重長八尺横者半之五品以下七尺七品以下六尺置於中庭參分庭一在南掌事者以沐之米為粥實於二鬲鬲各視其數幂用疏布繫以竹䈼垂於重覆用葦席北向屈兩端交於後兩端在上綴以竹䈼祝取銘置於重又於殯堂前楹下夾以葦席簾門以布又設葦障於庭厥明乃斂庶人喪為重置於庭厥明乃小斂始死服變宋明宋品官儀初終男子白布衣被髪徒跣婦人青縑衣被髪不徒跣女子子亦然父為長子為人後者為其本生父母皆素冠不徒跣女子子嫁者髽齊衰期以下丈夫素布巾婦人去首飾主人坐於牀東餘在其後啼踊無算士庶人喪禮初終男子易以白布衣被髪徒跣婦人青縑衣被髪不徒跣女子子亦然期親以下丈夫素巾婦人去首飾主人坐於牀東餘次之啼踊無算明品官喪禮初終男子白布衣被髪徒跣婦人青縑衣被髪不徒跣女子子亦然齊衰以下丈夫素冠婦人去首飾孝子坐於牀東餘在其後啼踊無算庻人喪男子扱上衽被髪徒跣婦人去冠被髪不徒跣諸有服者皆去華飾王廷相喪未斂服説崔氏云凡親死将三年者皆去冠而笄纚如故著十五升白布深衣扱上衽徒跣交手而哭婦人去笄而纚如故不徒跣不扱衽亦著白布深衣齊衰以下男子著素冠婦人骨笄而纚皆吉屨無絇其服皆白布深衣此未小斂時所服也小斂畢斬衰男子以麻括髪女子以麻為髽齊衰男子於主人括髪之時皆去冠纚以布為免婦人皆去笄纚以布為髽大功以下男子皆免而婦人不髽但素笄爾其服自斂畢至成服皆白布深衣不改此小斂以後成服以前之服也古今冠異冝今用其意可也其未斂也男子去冠巾婦人去假髻然喪不可無飾也仍各以白布一幅裹其首漢時裹巾帕頭之制其既小斂也男子則去布以麻繩括其髪仍帯白布巾而加環絰於其上腰絰散垂其末而加絞帶婦人亦去布以麻繩纒其髪為髽齊衰男女免而髽大功以下免而素笄皆如其制可也今之白布長衫衣與裳連古深衣之變也男子初喪至成服不改可也婦人白布衫裙不改亦可也始死禭大斂襚附漢宋臣等謹案士喪禮庶襚親者庶兄弟朋友所禭繼襲衣之下陳之而不用以襲至小斂則用之惟君禭至大歛乃用所以章君之賜也又禭之至者有先後或於室或於堂先者以共小斂後者以共大斂又有過期而至不及斂事者則衣無所用之特致彼之意而已其未𦵏者則猶殯東致命委衣而徹之以東杜典備載特總叙於此漢劉向説苑衣衾曰襚知死者贈襚所以送死也白虎通曰襚之為言遺也衣被曰襚以上杜典不載今補纂宋司馬光書儀其所賻襚者則先遣人以書致之然後往弔既弔而致之亦可也小斂宋明宋品官喪儀小斂之禮以喪之明日夙興陳斂衣九稱謂朝服公服各為一稱餘皆常服不足各随所辦下同於東房西領南上非正色不入絺綌不入饌於東堂階下隨宜設醴饌器皆以素下倣此具牀席於堂西斂者盥訖執服者以斂衣入主人以下少退西面主婦以下少退東面内外俱哭斂者斂訖覆以夷衾設牀於两楹間衽衽寝臥之席也下莞上簟設枕卒斂開帷帷堂之帷事畢則下之主人以下西面慿按喪大記君於臣撫之父母於子執之子於父母慿之婦於姑舅奉之姑舅於婦撫之妻於夫拘之夫於妻於兄弟執之此憑尸者身曲而伏之重也哭踊無算主婦以下東面慿亦如之庶人禮斂衣一稱司馬光書儀注古者死之明日小斂又明日大斂顛倒衣裳使之正方束以絞衾韜以衾冒皆所以保肌體也今世俗有襲而無大小斂所闕多矣朱子家禮厥明執事者陳小斂衣衾髙閌曰襲衣所以衣尸斂衣則包之而已此襲斂之辨也今之喪者衣衾既薄絞冒不施懼夫形體之露也遽納之於棺乃以入棺為小斂葢棺為大斂入棺既在始襲之時葢棺又在成服之日則是小斂大斂之禮皆廢矣設小斂牀布絞衾衣遂小斂明品官喪小斂之禮以喪之明日陳其斂衣於東序四品五品以下於東房饌於堂東階下設牀施薦席褥于西階鋪絞衾衣舉之升自西階置於尸南先布絞之横者三於下以備周身相結乃布縱者一於上以備掩首及足也侍者盥手舉尸男女共扶助之遷於牀上先於枕而舒絹疊衣以藉其首仍卷两端以備两肩空處又卷衣夾其两脛取其正方然後以餘衣掩尸左衽不紐裹之以衾而未結以絞未掩其面葢孝子猶欲俟其復生欲時見其面也斂畢覆以衾喪主西向憑尸哭擗主婦東向憑尸哭擗斂者舉尸男女從奉之遷於堂中哭位如室内庻人喪死之明曰厥明執事者陳小斂衣衾於堂東壮壁下設桌子於阼階東南置奠饌及盃注於其上巾之設盥盆帨巾各二於饌東設小斂牀施薦席褥於西階之西鋪絞衾衣舉之升自西階置於尸南先布絞之横者三於下乃布縱者一於上侍者盥手舉尸男女共扶助之遷於牀上先去枕而舒絹疊衣藉其首乃卷两端以補两肩空處又卷衣夾其两脛取其正方然後以餘衣掩尸左衽不紐裹之以衾而未結其絞未掩其面斂畢覆以衾喪主主婦憑尸哭擗乃遷尸牀於堂中既小斂斂髪服變宋明宋政和禮品官喪斂訖男子括髪衰巾帕頭六品以下布束婦人括髪而髽斂者舉尸男女從奉之遷於堂覆以夷衾哭位如室中踊無算庶人喪儀男子衰巾束髪婦人束髪而髽司馬光書儀小斂具括髪麻免布及髽麻古者主人素冠環絰視小斂既而男子括髪婦人髽皆有首絰腰絰始死去冠二日去笄纚括髪男子括髪以麻婦人髽帶麻髽者去纚為紒也今恐倉卒未能具冠絰故於小斂訖男子婦人皆収髪為髻先用麻繩撮髻又以布為頭􅔮斬衰者括髮紐麻為繩齊衰以下至同五世祖者皆免裂布或縫絹廣寸婦人髽亦紐麻為繩齊衰以下亦用布絹為免皆如幧頭之制自頂向前交於額上却遶髻如著幧頭也為母雖齊衰亦用麻婦人惡笄當用鏹釵或竹木骨角為簮至於環釧之類用金銀者居喪盡當去之陳祥道禮書婦人之髽猶男子之括髪免故括髪以麻則髽以麻矣免以布則髽以布矣以麻則斬衰也以布則齊衰也小斂之髽不言笄則未成服之髽無笄矣女子子適人者為其父母婦為舅姑惡笄有首以髽孔子言髽而繼之以榛笄則成服之髽有笄矣小記言齊衰惡笄以終喪則斬衰齊衰之髽皆終喪矣男子之袒免及於五世婦人之髽不及於大功者以髽不特對免而上同於括髪故也秃者不髽以疾也然則髽雖麻與布之不同其為露紒一也楊復曰小斂變服斬衰者袒括髮今人無袒括髪一莭何也縁世俗以襲為小斂故失此變服一莭在禮奔喪入門詣柩前再拜哭盡哀乃就東方去冠及上服被髪徒跣如始喪之儀詣殯東面坐哭盡哀乃就東方袒括髪又哭盡哀如小斂之儀明日後日朝夕哭猶袒括髪至第四日乃成服夫奔喪禮之變也猶謹其序而况處禮之常可欠小斂一莭又無袒括髪乎此則孝子知禮所當謹而不可忽也明品官喪斂畢喪主西向憑尸哭擗主婦東向憑尸哭踊斬衰者袒以麻繩括髪齊衰以下裂布廣寸自頂向前交於額上却繞髻如著掠頭婦人以麻撮髻而髽庶人禮斂畢喪主主婦憑尸哭擗男子袒而括髪齊衰以下袒而裂布以免婦人亦用麻繩髻小斂奠代哭附宋明宋品官喪贊者盥手奉饌至階升奠於尸東徹襲奠自西階降出下帷内外俱坐以親疎為之代哭宵為燎於庭厥明滅燎乃大斂庶人喪賛者奉饌至階升奠於尸東徹襲奠自西階降出下帷内外俱坐以親疎為之代哭宵為燎於庭厥明滅燎乃大斂明品官喪執事者盥手舉饌升自東階至靈座前祝焚香洗盞斟酒奠之喪主以下哭盡哀乃代哭不絶聲宵為燎於庭厥明滅燎乃大斂庶人禮執事者舉饌升自阼階至靈座前祝焚香洗盞斟酒奠之喪主以下哭盡哀乃代哭不絶聲棺槨制宋明宋朱子語類云二棺共槨葢古者之槨乃合衆材為之故大小隨人所為今用全木則無許大木可以為槨故合𦵏者只同穴而各用槨也明制諸王公主喪工部造棺槨其官民䘮𦵏棺槨之制品官用油杉朱漆槨用土杉士庶人喪棺用堅木油杉為上柏次之土杉松又次之用黒漆金漆不得用朱紅欽定續通典卷七十七
