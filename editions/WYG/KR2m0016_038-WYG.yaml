body:
  text: 職官文散官開府儀同三司唐制開府儀同三司秩從一品為文散官不帶職事官者朝㕘祿俸並同職事仍𨽻吏部宋開府儀同三司亦為文散官秩從一品潘美初為北院使太宗大平興國中改南院使三年加開府儀同三司又徽宗時以觀文殿大學士召范純仁純仁乞歸養疾帝許之後贈開府儀同三司御書碑額曰世濟忠貞又趙雄宇温叔孝宗時拜右丞相改知江陵府光宗将受禪召雄雄上萬言書陳修身齊家以正朝廷之道甚劉切詔授寧武軍節度使開府儀同三司又韓世忠平湖南授太尉賜帶笏仍勅樞宻以功頒示内外諸将帥髙宗建炎三年進開府儀同三司又安丙鎮蜀授開府儀同三司遣閤門舍人致錫命錫旌節金印衣帶鞍馬遼北面官南面官皆以此為散階金文階從一品上曰開府儀同三司中曰儀同三司韓時為禮部尚書在職七年是時朝廷方議禮制度或因或革故時在禮部兼領太常甚久熙宗皇統間乞致仕仍加開府儀同三司又豫王永成世宗子風姿竒偉博學善屬文世宗尤愛重之大定二十五年命留守中都判吏部尚書進開府儀同三司元文散官開府儀同三司儀同三司皆正一品明無此官特進唐制文散官正二品曰特進宋因唐制神宗元豐三年王安石復拜左僕射觀文殿大學士换特進又張浚以却敵功除特進趙葵辭右丞相以觀文殿學士判潭州湖南安撫使加特進遼無此官金從一品文散階中次曰特進下曰崇進元亦有特進崇進皆正一品明文散官正一品初授特進榮祿大夫陞授特進光祿大夫武宗正徳間楊廷和梁儲同在内閣皆特進張居正父亦由少保少師加特進劉健亦加特進光祿大夫以下唐制文散官從二品曰光祿大夫正三品曰金紫光祿大夫從三品曰銀青光祿大夫裴度平淮西策勲進金紫光禄大夫宏文館大學士晉國公宋文散官光祿大夫金紫光祿銀青光祿品秩皆與唐制同元豐官制行王珪由禮部侍郎超授銀青光禄大夫及哲宗立進金紫光祿大夫又慶元内使王徳謙建節謝深甫三疏力陳不可蹈大觀覆轍乃斥徳謙進深甫金紫光禄大夫拜右丞相累乞避位寧宗曰卿能為朕守法度惜名器不可以言去遼無此官金文散官正二品上曰金紫光禄大夫下曰銀青光祿大夫從二品上曰光祿大夫下曰榮祿大夫元文散官正一品曰金紫光祿大夫銀青榮祿大夫從一品曰光禄大夫榮祿大夫巴延進金紫光禄大夫知樞宻院事又仁宗延祐元年李孟進金紫光禄大夫又李好文為翰林學士承㫖皇太子深敬禮之屢引年乞致仕至再三遂拜光禄大夫河南省平章事仍以一品禄終其身又尚文為尚書右丞武宗仁宗之世屢延致訪以國事進階自光禄大夫轉銀青光禄大夫明文散階從一品初授榮禄大夫陞授光祿大夫太祖洪武三年大封功臣常茂馮勝李文忠鄧愈皆榮祿大夫唐制正四品上曰正議大夫下曰通議大夫皆文散官宋正四品上曰正奉大夫下曰中奉大夫遼無金正三品上曰資徳大夫中曰資政大夫下曰資善大夫皆唐宋所無從三品上曰正奉大夫中曰通奉大夫下曰中奉大夫正四品上曰正議大夫中曰通議大夫下曰嘉議大夫元正二品曰資徳大夫資政大夫資善大夫從二品曰正奉大夫通奉大夫中奉大夫正三品曰正議大夫通議大夫嘉議大夫明正二品初授資善大夫陞授資政大夫加授資徳大夫從二品初授中奉大夫陞授通奉大夫加授正奉大夫正三品初授嘉議大夫陞授通議大夫加授正議大夫唐制從四品上曰太中大夫下曰中大夫宋從四品上曰太中大夫下曰中大夫遼無金從四品上曰大中大夫中曰中大夫下曰少中大夫元從三品曰太中大夫中大夫亞中大夫舊承金制曰少中延祐時改亞明從三品初授亞中大夫陞授中大夫加授大中大夫唐制正五品上曰中散大夫下曰朝議大夫從五品上曰朝請大夫下曰朝散大夫宋正五品上曰中散大夫下曰朝奉大夫從五品上曰朝散大夫下曰朝請大夫遼無金正五品上曰中議大夫中曰中憲大夫下曰中順大夫從五品上曰朝請大夫中曰朝散大夫下曰朝列大夫舊曰奉徳大夫海陵天徳二年改曰朝列大夫元正四品曰中議大夫中憲大夫中順大夫從四品曰朝請大夫朝散大夫朝列大夫正五品曰朝正大夫奉議大夫從五品曰奉直大夫奉訓大夫明正四品初授中順大夫陞授中憲大夫加授中議大夫從四品初授朝列大夫陞授朝議大夫加授朝請大夫正五品初授奉議大夫陞授奉政大夫從五品初授奉訓大夫陞授奉直大夫唐制正六品上曰朝議郎下曰承議郎宋正六品曰朝奉郎曰承直郎從六品曰奉直郎曰通直郎遼無金正六品上曰奉政大夫下曰奉議大夫從六品上曰奉直大夫下曰奉訓大夫元正六品曰承徳郎曰承直郎從六品曰儒林郎曰承務郎明正六品初授承直郎陞授承徳郎從六品初授承務郎陞授儒林郎吏材幹授宣徳郎唐制正七品上曰朝請郎下曰宣徳郎從七品上曰朝散郎下曰宣義郎宋仍唐制改宣義郎曰宣奉郎遼無金正七品上曰承徳郎下曰承直郎從七品上曰承務郎下曰儒林郎元正七品曰文林郎承事郎從七品曰徴事郎從事郎明正七品初授承事郎陞授文林郎吏材幹授宣議郎從七品初授從仕郎陞授徴仕郎唐制正八品上曰給事郎下曰徴事郎從八品上曰承奉郎下曰承務郎宋正八品曰給事郎曰承事郎從八品曰承奉郎曰承務郎遼無金正八品上曰文林郎下曰承事郎從八品上曰徴事郎下曰從事郎元正八品曰登仕郎曰将仕郎從八品曰登仕佐郎曰将仕佐郎明正八品初授迪功郎陞授修職郎從八品初授迪功佐郎陞授修職佐郎唐制正九品上曰儒林郎下曰登仕郎從九品上曰文林郎下曰将仕郎宋與唐同遼無金正九品上曰登仕郎下曰将仕郎