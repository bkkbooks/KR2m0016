body:
  text: 兵因機設權唐長孫晟討達頭晟謂突厥飲泉易可餌毒因取諸藥毒水上流達頭人馬飲之多死大驚曰天雨惡水其亡我乎因夜遁又王忠嗣在朔方每至互市時即髙估馬價以誘之諸畨聞之競來求市輒買之故畨馬益少而漢軍益壯迄於天寳末戰馬蕃息賴其用焉又議討阿史那都支裴行儉請以立波斯王質子泥湼師為名路出二畨因權制事可不勞而成功帝遣之至西川諸畨郊迎召豪傑千餘人自隨揚言大熱宜駐軍須秋都支覘知之不設備行儉召四鎮酋長偽約畋於是子弟願從者萬人乃隂勒部伍倍道而進去都支帳十餘里先遣其親問安否外若閒暇非討襲者又使人趣召都支都支本與􅃒匐計及秋拒使者已而聞軍至倉卒不知所出率子弟五百人詣營謁遂擒之是日傳契箭召諸部首長悉來請命并執送碎葉城簡精騎約齎襲􅃒匐道獲其使者釋之使諭其主言都支已擒狀􅃒匐遂降又李光弼屯太原諸將慮兵少議修城為備光弼曰太原城周四十里賊垂至而興役是先自困也乃於城外鑿河作塹及賊攻城用以増壘賊不得入又賊為飛梯障以木幔築土山臨城光弼為地道以迎之近城輒陷又撤民屋為攂石車二百人挽之石所及輒數十人死復遣人詐與賊約刻日出降使潛穿地道於賊營中至期遣禆將將數千人出如降狀賊皆屬目俄而營中地陷賊衆驚亂乗之遂俘斬萬餘又張巡守雍丘令狐潮攻之設百樓巡柵城上束芻灌膏以焚焉賊不敢向巡伺隙擊之賊敗走後潮復來攻城中矢盡巡夜縛藁為人被以黒衣縋城下潮兵爭射之得矢數十萬後復夜縋人賊笑不設備乃以死士五百斫潮營潮軍大亂焚壘而遁又令狐潮圍雍丘城中薪水竭張巡紿潮欲引衆走請退軍二舎使我逸潮許之遂空城四出三十里撤屋發木而還為備潮怒圍復合巡徐謂潮曰君須此城歸馬三十匹我得馬且出奔請君取城以藉口潮歸馬巡悉以給驍將約曰賊至人取一將明日潮責巡答曰吾欲去將士不從奈何潮怒欲戰陣未成三十騎突出擒將十四斬百餘級收器械牛馬潮遁還陳留又張巡守睢陽賊尹子琦圍之巡欲射子琦莫能辨因剡蒿為矢中者喜謂巡矢盡走白子琦乃得其狀使南霽雲射一發中左目賊還又徳宗建中末渾瑊從徳宗幸奉天為行在都虞候與朱泚戰于城東不利賊遂乗勝奔突將入官軍與賊隔門相持自卯至午殺傷頗甚門内有草車數乗瑊乃令虞候髙固等推車塞門焚之以禦乘火力鬬賊衆遂退乂朱滔為幽州留後成徳軍李寳臣死其子惟岳謀襲滔與成徳軍節度張孝忠征之大破於束鹿滔命偏帥守之進圍深州惟岳乃統萬餘衆及田悦援兵圍束鹿敵將王武俊以騎三千方陣横進滔繪帛為狻猊象使猛士百人䝉之鼔譟奮馳敵馬驚亂隨擊大破之惟岳焚營而遁又賊朱泚遣將韓旻統領師三千疾馳奉天偽迎天子段秀實以為此係危逼之時遣人諭大吏岐靈岳竊取泚將姚令言印不獲乃倒用己之司農印追其兵旻至駱谷驛得符而還又王翃為河中少尹有悍將凌正者横暴擾軍政約至夜鼓譟斬闗以逐翃有告者翃縮夜漏數刻以差其期賊驚逺遁遂誅正軍賴以安又康承訓與賊將王宏立戰令官軍斷賊所過橋柱且勿絶乃伏兵以待之賊過橋崩伏兵發盡殪之又唐末青州王師範遣張居厚以壯士二百為輿夫伏兵輿中西馳梁軍稱師範使者聘梁因欲刼殺朱全忠居厚至華州東城華州將婁敬思疑其有異剖輿見其兵居厚遂刼殺敬思以兵攻西城不克而反又魏博羅紹威將誅牙軍乞兵於朱全忠全忠女嫁魏適死乃遣馬嗣勲以長直千人為綵輿入魏致兵器輿中聲言助葬嗣勲館銅臺夜與魏新鄉鎮兵攻石柱門入迎紹威家屬衞之乃益取魏甲兵攻牙軍牙軍不知兵從何來莫能為備殺之俱盡五代梁太祖屯軍於岐下晉軍潛襲絳州前軍不利晉軍恃勢而攻臨汾氏叔琮嚴備禦乃於軍中選壯士二人深目虬鬚貌如沙陀者令就棗陽縣牧馬於道側番冦見之不疑二人因雜其行間俄伺隙各擒一人而來晉軍大驚且疑有伏兵遂退據蒲縣又氏叔琮既夜擊晉軍敗之已而兵大疫叔琮班師令曰病不能行者焚之病者懼皆言無恙乃以精卒為殿而還至石㑹留數騎以大將旗幟立於髙岡晉兵疑其有伏乃不敢追唐符存審救河中汴人素輕蒲兵每遇遊騎挑戰必窮追襲存審初至率精甲千人内選二百處蒲人之間且壓賊壘賊出千騎結陣而追之遽見唐師大駭而走獲賊騎五十而旋自是賊軍憚戰晉髙祖時安從進蓄異志與安重榮隂相結託期為長裏天福六年安重榮反髙祖為之幸鄴鄭王重貴留守京師宰相和凝曰陛下且北從進必反何以制之髙祖曰卿意奈何凝曰臣聞兵法先人者奪人願為空名宣勅十數通授鄭王有急則命將以往從進聞髙祖北遂殺潘知麟以反鄭王以空名勅授李建崇郭金海等討之從進引兵攻鄧州不克進至湖陽遇建崇等大駭以為神速復為野火所燒遂大敗從進以數十騎奔還襄陽又周訪討賊張彦與賊隔水賊衆數倍訪自知力不能敵乃宻遣人如樵採者而出結陣鳴鼔而來大呼曰左軍至士卒皆稱萬嵗至夜軍中多布火而食賊謂官軍益至未曉而退周世宗南征以李穀為行營都部署攻自夀州始是時南唐宋齊丘為洪州莭度使李景乃召齊丘還金陵以劉彦貞為神武統軍劉仁贍為清淮軍節度使以拒周師李穀曰吾無水戰之具使淮兵斷正陽浮橋則我背腹受敵乃焚其芻糧退屯正陽是時世宗親征行至圉鎮聞穀退軍曰吾軍却唐兵必追之遣李重進急趨正陽曰唐兵且至宜急擊之劉彦貞等聞穀退軍果以為怯急追之比及正陽而重進先至軍未及食而戰彦貞等遂敗呉越王子錢傳瓘督舟師與呉彭彦章戰瓘順風揚灰呉人不能開目及船舷相接瓘復散沙於船中而散豆於呉船豆為戰血所漬呉人踐之皆僵仆因縱火焚之呉人崩潰宋潘美伐南漢南漢人教象為隊每象載十數人皆執兵仗將戰必至陣前以壯軍威美集勁弩射之象奔踶乘者皆墜反踐其軍遂大敗又軍校吕翰殺武懐節據嘉州叛曹翰及諸將奪其城諜賊約三鼔復來攻翰戒知更使緩向晨猶二鼔賊衆不集而潰因而破之又契丹犯邊李繼隆率諸將禦之太宗常授以陣圖及臨陣有不便衆以上命不可違繼隆曰事有應變安可預定設獲違詔之罪請自當之即便冝行事卒敗敵於徐河又周虎者據蕪湖縣邵青以舟船至蕪湖縣乃遣人與戰一日七敗㕘議魏曦以小舟觀戰江中既而告青曰吾知所以敗亦知所以勝矣彼以紅巾軟纒與吾之號一同故與戰則不能分彼我所以必敗宜易其號則勝矣青然之乃令其衆皆作鑚風角子俄附墨而行遇戰則去其紅巾惟見鑚風角子又用墨抹搶子眼下如伶人雜劇之戱者及口吹呌一戰而勝青遂駐於蕪湖又開禧用兵諸將皆敗唯畢再遇數有功敵常以水櫃敗我再遇夜縛藁人數十衣以甲胄持旗幟戈矛儼立成行昧爽鳴鼔敵人驚視亟放水櫃旋知其非真也甚沮乃出師攻之敵大敗遼太宗再伐晉晉主遣趙延夀族人趙行實以書來招時晉人堅壁不出延夀紿曰我陷敵乆寧無父母之邦若以軍逆我即歸晉人以為然遣杜重威率兵迎之延夀至滹沱河據中渡橋與晉軍力戰手殺其將王靖兩軍相拒太宗潛由他渡濟留延夀與耶律霜庫據橋敵不能奪屢敗之杜重威歸衆降又耶律色珍為山西路兵馬都統宋將楊繼業陷山西諸郡各以兵守自屯代州色珍至定遇賀令圖軍擊破之追至五臺斬首數萬級明日至蔚州敵不敢出色珍書帛射城上諭以招慰意隂聞宋軍來救令都監耶律達薩夜伏兵險阨俟敵至而發城守者見救至突出色珍擊其背二軍俱潰追至飛狐斬首二萬餘級遂取蔚州又遼太宗太平末大延琳叛蕭巴爾將北南院兵往討遇於蒲水南院兵少却至手山復與賊遇巴爾乃易兩院旗幟鼓勇力戰破之金宣宗興定二年宋髙太尉兵三萬駐朐山完顔霆軍乏糧采野菜麥苖雜食之宋兵柵朐山下隔湖港霆作港中暗橋遣萬户胡仲珪副統劉贇率死士由暗橋登山霆率兵四千人趨山下約以昏時舉火為期上下夾擊宋兵大敗墜澗溺水死者不可勝訃斬髙太尉彭元帥于陣餘衆潰去又元光二年夏人歩騎數十萬攻鳳翔甚急元帥持嘉喀齊喀以郭哈瑪爾總領軍事從巡城濠外一人坐胡牀以箭力不及氣貌若蔑視城守者喀齊喀指以示哈瑪爾云汝能射此人否哈瑪爾測量逺近曰可哈瑪爾平時發矢伺腋下甲不掩處射之無不中即持弓矢伺坐者舉肘一發而斃又郭哈瑪爾與鞏州元帥田瑞攻取㑹州哈瑪爾率騎兵五百皆被赭衲蔽州之南山而下夏人猝望之以為神城上有舉手於懸風版者哈瑪爾射之手與版俱貫凡射死數百人夏人震恐乃出降元師伐交趾其國主陳日照隔江列象騎步卒甚盛烏蘭哈達分軍為三隊濟江徹辰圖從下流先濟大師居中駙馬懐都與阿珠在後仍授徹辰圖方畧曰汝軍既濟勿與之戰彼必來逆我駙馬隨斷其後汝伺便奪其船蠻若潰走至江無船必為我擒矣又攻文州守將劉禄數月不下諜知城中無井乃奪其汲道率勇士梯城先登殺守陴者數十人遂抜其城又劉元振守瀘州權造金銀牌分賞將士未㡬援兵至内外合擊敗之捷聞自陳其擅造金銀牌罪帝嘉其權變賜賚甚厚又宋以巨艦載甲士數萬屯清河浮橋相距七十日水暴漲浮橋壤西岸軍多漂溺舒穆嚕安扎軍東岸急撤浮橋聚舟岸下士卒得不死明太祖以滁州乏糧欲取和陽以自固乃言於滁王曰向攻民寨得廬州路義兵號衣今選勇敢士三千令青衣佯為元兵以四駱駝載賞物使人聲言廬州兵送使者入和陽宣犒將士復命耿再成將絳衣兵為繼候青衣薄城絳衣繼至城必破矣已而絳衣兵先至與元兵戰青衣兵復繼之遂入據其城又廖永忠攻瞿塘以敵據闗口設鐡索飛橋亘江上舟不得進乃宻遣壯士數百人舁小舟衣青簑衣縁山伏草木中行渡闗人各持糗糧契水筒以禦飢渴魚貫出山石間守闗者不覺既渡險夜以小舟入江繞出敵背永忠等與約期度已入江乃率精兵出黒葉渡分兩道夜五鼔以一軍攻其陸寨一軍攻其水寨將士皆以鐡裹船頭置火鎗火器前進黎明蜀人盡鋭來攻永忠已破陸寨亡何將士舁舟者自上流俱發揚旗鼔譟而下蜀人大駭不知其兵所自來也下流舟師並進夾攻大破之焚三橋横江鐡鎻須臾鎔絶斬溺死者無算又傅友徳湯和駐兵延安以防西邊巴延特穆爾偽請和上乃陽召和還而留友徳以誘之特穆爾果入寇友徳設伏縱擊大破之又傅友徳圍成都戴夀向大亨以象載甲士出戰友徳命前鋒李徳英以弓矢火器衝之象皆中矢卻走夀等兵大敗乃籍府庫倉廪甲兵之數詣降又成祖趨宿州諜報平安馬步兵四萬來成祖曰此濵河多林木彼必疑有伏淝河地平少樹彼不疑可伏兵遂親率騎二萬持三日糧至淝河按伏勅諸軍皆束炬相屬於道戒之曰俟與敵戰則舉火一炬舉餘炬皆應但一敗其前鋒彼自奪氣乃令王真劉江各將百騎往逆之戒以縁路按伏遇敵誘入伏與戰又令王真束草寘囊中如束帛狀載馬上敵來追擲於地使敵往取亂之真等果與平安軍遇敵追至擲囊草餌之衆皆競取行伍稍亂又入伏内伏發敵衆敗走又成祖與盛庸戰于交河庸軍士擁盾自蔽矢石不能入燕軍預作木鑚長六七尺横貫鐡釘於上釘末有逆鈎令勇士直前擲之連貫其盾亟不得出動則牽連不可以蔽遂乗其空隙攻之庸軍棄盾走騎兵乘之而入遂大潰又張輔入安南城賊在城内驅象為陣輔以畫獅䝉馬當象仍以神鋭翼而前象皆股栗多中銃箭傷遂退走賊衆潰亂死者不可勝計又陶成僉事浙江時處州冦葉宗留等為亂成至金華令軍中製竹笆三百五十面笆如牌製糊以紙畫獸形可禦賊槍乃兼程進處州界時賊衆萬人出山索戰官兵分三陣奮擊賊被射死者三百餘人持槍者多為竹笆所制盖槍入竹隙急不得出多被擒獲賊大潰又仇鉞為寧夏副總兵值寘鐇反鉞在城中詐稱病隂約遊兵壯士候官兵至河上從中發為内應俄而覘知兵至鉞誘賊將何錦出城留賊周昻城守鉞復稱病亟昻入問疾鉞令蒼頭捶殺之即起披甲仗劍跨馬一呼諸遊兵壯士皆集遂奪城門擒寘鐇又楊鋭守安慶宸濠叛兵犯城於北濠為木棧與城接挾兵而進鋭詭以大將軍火銃實石被緋金鼔置城上冦望見大潰潛使卒從間道出燒棧絶俟賊懈募善泅者入賊船乗其熟睡斬首絶其䌫放之江中或於岸上舉火礟擊其營乗亂捕殺聲震數里賊遁又張岳為督撫駐師辰州因苖魁龍許保呉黒苖等倡亂岳檄石邦憲等宻遣使入寨計擒龍許保賄令聴撫又懸賞購之苗呉老􅀈等窺龍許保至龍田寨所親家弔喪誘至别寨飲酒醉而縳之預遣人報邦憲以兵取之去疏聞誅之又詢知呉黒苗以捕急故深自匿岳乃緩其令所羈執親屬盡釋令去宻督土官亷得其處遣兵劉甫等徑入其寨襲斬之又鄒文盛為都御史奉命剿除清平苗乃相賊巢險易分兵哨由隘路五處刻期進抵香爐山壁立陡絶賊皆築砦柵守禦官兵稍近則木石毒弩俱下官兵用火銃焚其寨柵隨以水沃滅之諸將仰攻不克乃以意製鐡猫爬山虎繩梯等具督令精兵昧爽附山下縁崖猿攀相引去抜其外柵賊死戰禦之復採木製揚橋戰樓髙與賊寨埓約接近可攀登者遂乗夜雷雨大作覘賊不備舁前攻具附崖先登斬闗拔柵縱火焚賊廬舍四面夾攻賊退據後山重險間乃先遣人入寨與約誘至山前招撫之使命往復故延乆賊果聚前山觀聴山後備稍弛諸將齊登衆官兵已奪險賊倉卒不能禦遂乘勝入擣崖峒擒賊首阿傍等斬獲甚衆又土司岑濬叛誅之以蠻徐五韋貴為土巡檢聴於流官蠻民常思故主有狡蠻託言濬子冒名岑金諸蠻立為小主扇召為亂而揚留者為濬腹心濬死無所歸應沈希儀募留賔州至是欲往投金希儀婉色好語曰汝第往復低聲曰聞金乃濬第九子岑氏其有後乎且呼至宻所曰金欲官非賂我萬金不可瀕行復召謂曰我㡬忘之貴五素仇汝亦仇金可善備之留詣金具如希儀言金大喜因率兵五千人之賔希儀漸以計諷金使遣其兵還巢覷金左右孤乃擒金斬之多方誤之唐柴紹為右驍衛大將軍髙祖武徳中吐谷渾與党項俱來冦邊命紹討之敵據髙臨下射紹軍中矢下如雨紹乃遣人彈琵琶二女子對舞敵異之駐弓矢而相與聚觀紹見敵陣不整宻使精騎自後擊之敵大潰斬首五百餘級又李孝恭討蕭銑破銑三鎮縱戰艦放江中曰令銑瀕江鎮戍見舳艫蔽江下必謂銑已敗不即進兵覘候往返以引救期則吾已拔江陵矣已而救兵到巴陵見船疑不進銑内外阻絶遂降又僕固懐恩為李光弼右廂兵馬使光弼守河陽命懐恩收懐州城官軍頻不利懐恩設策潛通地道取賊號詐傳號令賊軍亂遂收懐州城生擒偽刺史及軍將等送闕下又唐末晉王李克用圍李存孝于邢州將掘塹以困之存孝出兵衝擊塹不得成禆將袁奉韜使人説存孝曰公所畏者晉王耳王俟塹成且留兵去諸將非公敵也存孝以為然縱兵成塹塹成深溝髙壘不可近存孝遂窘食盡而降五代梁朱温以岐人堅壁不戰且慮師老思欲旋斾以歸河中因宻召上將數人語其事時親指揮使髙季昌獨前出抗言曰天下雄傑窺此舉者一嵗矣今岐人已困願少俟之温嘉其言因曰兵法以正合以竒勝竒者詐也乘機集事必由是乎乃命季昌宻募人入岐以紿之尋有騎士馬景堅願應命許之躍馬西走直叩岐闉詐以梁軍悉東遁為告且言列砦尚留萬餘人俟夕將遁矣宜速掩之茂貞信其言遽啟二扉悉衆來冦時諸軍已介馬待之中軍一鼓百營俱進又分遣數百騎以據其闉岐人進不能駐其趾退不能入其壘殺戮蹂踐不知其數茂貞由是喪膽但閉壘而已又梁葛從周圍兖州兖人不出從周詐揚言并人來救即引兵趨高呉夜半潛却歸砦朱瑾果出兵攻外壕我軍士突出掩殺千餘人唐將符存審因朱全忠攻蓚援兵不至思以竒計破之乃引兵扼下博橋遇梁軍樵採者殺之縱數人回曰晋王大軍至矣時全忠方攻城未及置營存審命二將各引三百騎效梁軍旗幟服色與樵芻雜行暮至縱火大噪弓矢亂發梁軍驚駭前縱者回復曰晉大軍至矣全忠夜遁又後唐明宗兵變招平盧節度符習從之監軍楊希望以兵圍習家屬將殺之指揮王公儼素為希望所信紿以習家不足慮宜分兵守城以虞外變希望信之乃悉分其兵守城公儼因擒斬之漢隠帝乾祐初王景崇盜據岐山不受代命趙暉為西南面行營都部署統兵討之時李守貞叛蒲趙思綰據雍景崇皆援之及引蜀軍出大散闗勢不可遏暉領兵數千塹而圍之屢使人挑戰賊終不出暉乃潛使千餘人於城南一舍之外擐甲執兵偽為蜀兵旗幟循南山而下詐令諸軍聲言川軍至景崇乃令數千人潰圍而出以為應援暉設伏而待一鼔而盡殪之自是景崇膽破不復敢出明年抜之宋太祖開寳中伐金陵自荆渚乗戰艦而下以黄州刺史王明領戰艦為江路巡檢南唐將朱令贇自湖口領兵十五萬連大艦沿流而下將焚采石浮梁直抵金陵為援明請益舟師以襲令贇帝曰非應急之䇿也令贇朝夕至金陵之圍解矣乃宻遣人諭明於洲浦間多立長木若帆檣之狀令贇望見果疑我師襲其後逗留不進移檄諸軍生擒令贇又張齊賢知代州契丹薄城齊賢約潘美以并師㑹戰使為契丹所執俄而美使至云師出至栢井得宻詔不許出戰已還州矣齊賢曰敵知美之來而不知美之退乃夜發兵二百人持一幟負一束芻距州西南三十里列幟燃芻契丹遥見火光中有旗幟謂并師至駭而北走齊賢預伏步卒二千於土鐙砦邀擊大敗之契丹遁去又孟珙因元兵窺江令諸軍變易旌旗服色循環往來夜則列炬照江數十里相接破砦二十有四遼太宗㑹同八年圍鎮州先遣候騎報晋兵至遣精兵斷河橋晉兵退保武強南院大王達年將軍高模翰分兵由瀛州間道以進杜重威等退保中渡寨義武軍節度使李殷以城降遂進兵夾滹沱而營去中渡寨三里分兵圍之夜則列騎環守晝則出兵抄掠復命大内特哩衮耶律碩格及趙延夀分兵圍守自將騎卒夜渡河出其後攻下欒城降騎卒數千分遣將士據其要害下令軍中預備軍食三日不得舉烟火但獲晉人即黥而縱之諸饋運見者皆棄而走於是晉兵内外隔絶食盡勢窮杜重威李守貞張彦澤等率所部二十萬衆來降金穆宗使布展守阿蘇城阿蘇在遼不敢歸遼使為阿蘇来穆宗聞之使烏林阿舒嚕濟師且戒布展令易衣服旗幟與阿蘇城中同色使遼使不可辨遼使至乃使富察部呼嚕貝勒穆遜貝勒與俱至布展軍而軍中已易衣服旗幟與阿蘇城中如一遼使果不能辨布展詭曰吾等自相攻于汝何事誰識汝之太師乃刺殺呼嚕穆遜所乗馬遼使驚怖走去遂破其城元烏蘭哈達進至烏蠻所都押赤城城際滇池三面皆水既險且堅選驍勇以砲摧其北門縱火攻之皆不克乃大震鼔鉦進而作作而止使不知所為如是者七月伺其困乏夜五鼔遣其子阿珠潛師躍入亂斫之遂大潰又張宏範攻宋主於崖山授李恒戰艦二使守北面將戰或請用砲宏範曰火起則舟散不如戰也明日四分其軍軍其東南北三面宏範自將一軍相去里許令曰聞吾樂作乃戰違者斬先麾北面軍乗潮而戰不克恒等順潮退樂作宋將以為且宴少懈宏範舟師犯其前衆繼之預構戰樓於船尾以布幔障之命將士負盾而伏令曰聞金聲起戰先金而動者死飛矢集如蝟伏盾者不動舟將接鳴金撤障弩弓火兵交作頃刻併破七舟宋師大潰又阿珠軍還宋兵邀襄樊間阿珠乃自安陽濟江留精騎三千陣牛心嶺復立虛寨設疑兵是夜敵果至斬首萬餘級明王守仁討浰頭賊破其巢餘賊奔九連山守仁以九連深險不易攻乃使精卒七百衣賊衣佯若奔潰者賊從崖上招呼與相應乆而賊覺之則師已度險賊狼狽失據大軍蹙之皆就縛又沈希儀征苗苗或走之他巢則揚聲曰某巢舎姦宜並勦他巢人驅賊走轉而之他巢則又嚇之他巢又恐驅賊走於是賊走無所跰血踵以死或餒餓崖石希儀又嘗以風雨晦冥夜察賊所止遣人衣毳㡌與草同色潛伏賊所夜發火炮以驚之賊大駭曰老沈至矣挈妻子蒲伏上山頂兒啼女咷他巢皆然於是苗人相告以為其巢皆有希儀夜來及隂詗之希儀固在㕘府未出也自此賊多易面為熟猺栁城旁雖童子牽牛行深山中無敢詗者先攻其心唐太宗謂李靖曰朕常臨陣料敵之心與己之心孰審然後彼可得而知焉察敵之氣與己之氣孰治然後已可得而知焉李靖曰攻其心者是所謂知彼者也守吾氣者是所謂知己者也又唐李抱真時僕固懐恩反上憂其結連回紇兵馬強盛召抱真問之對曰郭子儀常領朔方軍士卒至今感悦懐恩欺其下以子儀為朝恩所殺今起而用之可不戰而解也已而用子儀敗懐恩果如其䇿金耶律伊都自遼來降都統杲等言耶律瑪克展伊都烏克紳道喇等謀叛宜早圖之按金史伊都傳作耶律瑪克展告伊都烏克紳道喇等謀叛是瑪克展告謀叛之人非與謀叛之人也今據帝紀纂入與傳互異謹附訂於此太祖召伊都從容謂之曰朕得天下皆我君臣同心同徳以成大功固非汝等之力今聞汝等謀叛若誠然耶必須鞍馬甲胄器械之屬當悉付汝朕不食言若再為我擒無望免死欲留事朕無懐異志吾不汝疑伊都戰慄不敢對命杖道喇七十餘並釋之元師與王禪鏖戰於白浮之野周旋馳突戈㦸戞摩雅克特穆爾手斃七人㑹日晡對壘而宿夜二鼔遣精鋭百騎鼔譟射其營敵果驚擾互自相擊至旦始悟人馬死傷無數及王禪集散卒成列出山元師駐白浮西堅壁不動是夜又命薩敦潛軍繞其後部曲巴圖爾壓其前夾營吹銅角以震盪之敵心膽俱落不悟而亂自相撾擊三鼓後乃西遁遲明追及昌平大敗之明成祖初起兵靖難以居庸闗天險北平襟喉也必據此方可免北顧憂聞俞瑱等欲來攻吾城莫若乗其初至衆心未定取之遂令徐安等攻奪居庸闗城瑱走依宋忠於懐來所擁兵皆燕府軍欲爭居庸諸將以衆寡不敵為疑成祖曰當以智勝力非所論也遂帥馬歩精鋭八千捲甲倍道進獲諜者言宋忠激怒其將士云爾等家在北平者皆被殺無遺矣成祖命各家人張所舊用旗幟為先鋒又見父兄子弟無恙相呼應皆大喜多降者麾兵渡河擊破之山外諸州響應又王信鎮守湖廣時靖州武岡蠻乆不靖守臣議欲剿之信巡邉召諸苗面諭禍福且犒以牛酒詰其背亂之由皆曰累嵗苦麾使徵索故作亂今將軍待我如此方願為属役尚敢反耶於是諸蠻率服又項忠因鄖陽賊劉鬍子等煽惑流民作亂督兵討之謂流民逃聚山谷其始非擬為冦勢多脅從民去官府逺既陷盜中遂不能自脱耳乃遣人持榜入山招諭有能去賊自歸者禁勿殺於是民多攜老弱纍纍來歸賊勢遂不振然後縱兵擊負固不服者斬獲甚衆劉鬍子為其黨所殺又馬平猺韋扶諫兇猾甚嘗弋捕之不能得㑹有報扶諫逃隣苗三層巢者沈希儀率兵討之至巢則賊已與三層苗往刧他所乃俘三層猺之妻子以歸閉空室中善飲食之時使狼兵怒而挺刃獰猙入室作欲搶狀希儀佯執鞭痛鞭狼兵退如是者三以深徳諸婦女而潛使諸猺聞之以繫其心並使人謂婦女言幕府得扶諫即釋爾等歸巢乃縱諸猺來視其妻子則相持諸猺哭曰非沈公吾等為狼兵殺且搶已而相怨詈曰咄扶諫非汝爺娘何不縛以贖我諸猺心割而别於是曲誘扶諫卒縛以獻而贖其妻子奪敵心計唐裴矩為黄門侍郎以始畢可汗本淳易可離間但由其内多羣羌桀黠教𨗳之聞史蜀胡悉尤多奸計幸於始畢請誘殺之因遣人告胡悉曰天子出珍物今在馬邑欲共畨酋多作交闗若前來者即得好物胡悉貪而信之不告始畢率其部盡驅六畜星馳爭進冀先互市矩伏兵馬邑下誘而斬之詔報始畢曰史蜀胡悉忽領部落走來至此云背可汗請我容納突厥既是我臣彼有背叛我當共殺今已斬之故令往報五代晉馮輝鎮靈武時前官失邉鄙心大為患暉募兵千餘行至梅戍番人稍稍來謁暉顧首領一人指其佩劍曰此板橋王氏劍耶吾聞王氏劍天下利器也俯而取諸腰間若將翫之因擊殺首領其從騎十餘人皆殺之禆將藥元福曰今去靈武尚五六百里奈何暉笑曰此土畨之豪部族之所恃也吾能殺之其餘豈敢動哉已而諸族皆以兵扼道路暉以言譬諭之獨所殺首領一族求戰即與之戰而敗走諸族遂不敢動宋岳飛討楊么所部皆西北人不習水戰曰兵何常顧用之何如耳先遣使招諭之㑹張浚督軍至見之飛曰水戰我短彼長攻之所以難若因敵將用敵兵奪手足之助離腹心之託使孤立而後乗之不八日可破賊後賊平果如期浚服其神算遼聖宗統和間征髙麗破康肈軍於銅州耶律揚珠之力為多王詢乞降羣臣議皆謂冝納揚珠曰王詢始一戰而敗遽求納欵此詐耳納之恐墮其姦計待其勢窮力屈納之未晚已而詢果遁清野無所獲其衆阻險而壘攻之不下楊珠以計降之金熙宗天眷元年以鎮國上將軍昻尹東平明年宋將岳飛以兵十萬號稱百萬來攻東平東平有軍五千倉卒出禦之時桑柘方茂昻使多張旗幟於林中以為疑兵自以精兵陣於前飛不敢動相持數日而退昻勒兵襲之至清口飛衆泛舟逆水而去時霖雨晝夜不止昻乃附水屯營夜將半忽促衆北行諸將諌曰軍士逺涉泥淖飢憊未食恐難遽行昻怒不應鳴鼔督之下令曰鼔聲絶而敢後者斬遂棄營去幾二十里而止是夜宋人來刼營無所得而去諸將入賀且問其故昻曰沿流而下者走也泝流而上者誘我必追也今大雨泥淖彼舟行安我陸行勞士卒飢乏弓矢敗弱我軍居其下流勢不便利其襲我必矣衆皆稱善元納延叛諸王諾延等皆應之帝問計將安在阿穆爾巴哈對曰臣愚以為莫若先撫安諸王乃行天討叛者勢自孤矣帝曰善卿試為朕行之即北説諾延曰大王聞納延反耶曰聞之曰大王知納延已遣使自歸耶曰不知也曰聞大王等皆欲為納延外應今納延既自歸矣是獨大王與主上抗幸主上聖明亦知非大王意置之不問然二三大臣不能無惑大王何不徃見上自陳為萬全計諾延悦許之於是諸王之謀皆解又劇賊蘇仲集潰卒據鎮龍山稱王刼掠於外耕植於内秋聞大兵至則偽出降其心恃有廬柵之固禾稼之富而官軍畏暑又不敢深入故横象賔貴四州皆被其害史格至築堡於外守其土兵令官軍火其廬柵踐其禾稼仲窮蹙遂降明徐達圍常州張士誠弟士徳率衆數萬來援達奮擊破之士徳墜馬被擒太祖大喜曰張士誠謀主士徳其人智勇足備今被我擒張氏之成敗可知矣又沐春討雲南叛酋阿資謂其衆曰大兵連年不獲此冦者以彼恃其地多險阻各處土酋皆姻婭得以匿之耳今悉調土酋從征俾不能通復多置營堡制其出入彼將無所逃矣乃進兵至赤窩果獲阿資斬之諸夷讋服又田州平岑猛死安置猛子於福建議設流官沈希儀曰思恩設流官反側至今未憗若田州復然兩賊且合不聴田州蠻盧蘇果與思恩蠻王受連兵刼城希儀又曰兩冦以復故主為名故能用其衆今若返岑邦相於福建置之南寧則衆散交離兩冦坐縛矣不聴用兵無功姚鏌罷黜以王守仁代卒用儀䇿始撫定欽定續通典卷一百五
