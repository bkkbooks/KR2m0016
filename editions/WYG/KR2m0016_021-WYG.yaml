body:
  text: 選舉雜議論中宋太祖以唐末進士不第多至失職乃廣開科舉然每嵗放榜所取極少如安徳裕作魁日九人而已蓋天下未混一也至太宗朝所得率江南之秀真宗景徳二年帝謂㓂凖等曰方今文武多士豈無才識優異未升進者耶至於將帥之任尤難得人前代試以制策觀其能否用求才實亦為國之達圖也因出唐制科之目採其六用之四年中書門下言應制科之陳絳夏竦史良等三人文論稍優可預召試上謂輔臣曰比設此科欲求才識若但考文藝則積學者方能中選茍有濟時之才安得而知朕以為六經之㫖聖人用心固與子史異矣今策問宜有經義參之時務王旦曰文風丕變由陛下道化因命兩制各上策問而擇用之時魯宗道又言守令去民近而無以區别能否今除一守令雖資材低下而考任應格則左司無擯斥故天下親民者黷貨害政十常二三漢宣帝除刺史守相必親見而考察之今守佐雖未暇親見宜令大臣延之中書詢考以言察其應對以觀其施為才不肖皆得進退之吏部之擇縣令倣此庶得良守宰宣助聖化帝從其言仁宗慶厯八年翰林學士張方平言祖宗時文武官不立磨勘年嵗不為升遷次序有才用名實之人或從下位便見超擢否則有守一官十餘年不改轉者其任監當或知縣通判知州有至數任不得遷者故當時人皆自勉非有勞効知不得進自祥符後朝廷之議益循寛大故令自監當入知縣知縣入通判通判入知州皆以兩任為限又守官及三年例得磨勘行之人自知恩未見有弊及今嵗年深乆習以為常皆謂本分無賢不肖莫知所勸願陛下稍革此制其應磨勘叙遷者必有勞績可褒或特敇擇官保任者即與轉遷如無勞績不因保任更増展年考其保任之法不當一例應選擇清望有才識之人即命舉之如此則委執政之臣舉清望官委清望官舉親民官有員闕隨員數令舉又足以見聖恩急才愛民之意也英宗治平初同知知諫院司馬光請貢院逐路取人其略曰朝廷每次科場所差試官率皆兩制三館之人其所好尚即成風俗在京舉人追趨時好易知體面淵源漸染文采自工使避逺孤陋之人與之為敵混同封彌考較長短勢不侔矣孔子曰十室之邑必有忠信如某者焉言雖微陋之處必有賢材不可誣也是以古人取士以郡國户口多少為率或以徳行或以才能隨其所長各有所取近自族姻逺及夷狄無小無大不可遺也今或數路中全無一人及第則所遺多矣國家用人之法非進士及第者不得美官非善為詩賦論策者不得及第非逰學京師者不善為詩賦論策以此之故使四方學士皆棄背鄉里違去二親老於京師不復更歸其間或有身負過惡或隱憂匿服不敢於鄉里取解者往往私買監牒妄冒户貫於京師取解自間嵗開場以來逺方舉人憚於往來只於京師寄應者比舊尤多國家雖重為科禁至於不用蔭贖然冒犯之人嵗嵗滋甚所以然者蓋由每次科場及第進士大率皆是國子監開封府解送之人則人之常情誰肯去此而就彼哉夫設美官厚利進取之塗以誘人於前而以苛法空文禁之於後是猶決洪河之尾而捧土以塞之其勢必不行矣參知政事歐陽修曰國家取士之制比於前世最號至公蓋累聖留心講求曲盡以謂王者無外天下一家故不問東西南北之人盡取諸路貢士混合為一而惟才是擇又糊名謄録而考之使主司莫知為何方之人誰氏之子不得有所憎愛厚薄於其間故議者謂國家科場之制雖未復古法而便於今世其無情如造化至公如權衡祖宗以來不可易之制也傳曰無作聰明亂舊章又曰利不百者不變法今言事之臣偶見一端即議更改此臣所以區區欲為陛下守祖宗之法也臣所謂偶見一端者蓋言事之人但見每次科場東南進士得多而西北進士得少故欲改法使多取西北進士爾殊不知天下至廣四方風俗異宜而人性各有利鈍東南之俗好文故進士多而經學少西北之人尚質故進士少而經學多所以科場取士東西多取進士西北多取經學者各因其材性所長而各隨其多少取之今以進士經學合而較之則其數均若必論進士則多少不等此臣所以偏見之一端其不可者一也國家方以官濫為患取士數必難増若欲多取西北之人則却須多減東南之數今東南州軍進士取解者二三千人處只解二三十人是百人取一人蓋已痛裁抑之矣西北州軍取解至多處不過百人而解至十餘人是十人取一人比之東南十倍假借之矣若至南省又減東南而増西北則是已裁抑者又裁抑之已假借者又假借之此其不可者二也東南之士於千人中解十人其初選已精矣故至南省所試合格者多西北之士學業不及東南當於解時又十倍優假之蓋其初選已濫矣故至南省所試不合格者多今若一例以十人取一人則東南之人合格而落者多矣西北之人不合格而得者多矣至於他路理不可齊偶有一路合格人多亦限以十一落之偶有一路合格人少亦須充足十一人之數使合落者得合得者落取舍顛倒能否混淆其不可者三也且朝廷専以較藝取人而使有藝者屈落無藝者濫得不問繆濫只要諸路數停此其不可者四也且言事者本欲多取諸路土著之人若此法一行則寄應者争趨而往今開封府寄應之弊可騐矣此所謂法出而姦生其不可者五也今廣南東西路進士例各絶無舉業諸州但據數解發其人亦自知無藝只来一就省試而歸冀作攝官爾朝廷以嶺外烟瘴北人不便須籍攝官亦許其如此今若一例與諸路十人取一人此為繆濫又非西北之比此其不可者六也凡此六者乃大概耳若舊法一壊新議必行則弊濫隨生何可勝數故臣謂且遵舊制乃務擇人推朝廷至公待四方如一惟能是選人自無言此乃當今可行之法爾若謂士習浮華當先考行就如新議亦須只考程試安能必取行實之人議者又謂西北近邊士要牢籠此甚不然之論也使不逞之人不能為患則已茍可為患則何方無之前世亂賊之臣起於東南者甚衆其大者如項羽蕭銑之徒是已至如黄巢王仙芝之輩又皆起亂中州者爾不逞之人豈専西北矧貢舉所設本待賢材牢籠不逞前别有術不在科場也惟事乆不能無弊有當留意者然不須更改法制止在振舉綱條耳近年以来舉人盛行懐挾排門大譟免冠突入虧損士風傷敗善類此由舉人既多而君子小人雜聚所司力不能制雖朝廷素有禁約條制甚嚴而上下因循不復申舉惟此一事為科場大患而言事者獨不及之願下有司議革其弊此當今科場之患也論者謂光之説主於均額以息奔競之風修之説主於覈實以免繆濫之弊要之朝廷既以文藝取人則修説為是神宗從王安石議罷明經及諸科進士罷詩賦用經義哲宗元祐初司馬光極陳其弊曰取士之道當先徳行後文學就文學言之經術又當先於詞采神宗罷詩賦及諸科専用經義論䇿此乃復先王令典百世不易之法但王安石不當以一家私學欲蓋掩先儒命天下學官講解及科場程試同已者取異已者黜使聖人坦明之言轉陷於竒僻先王中正之道流入於異端若已論果是先儒果非何患學者不棄彼而從此何必以利害脅誘如此其急也至於律令敇式皆當官者所須何必置明法一科使為士者預習之夫禮之所去刑之所取為士者果能知道義自與法律㝠合若其不知但日誦徒流絞斬之書習鍛鍊文致之事為士已成刻薄從政豈有循良非所以長育人材敦厚風俗也帝乃更科場法太學博士吕大臨嘗上選舉六事曰古之長育人材者以士衆多為樂今之主選舉者以士衆多為患古之以禮聘士常恐士之不至今之以法抑士常恐士之競進為治必欲得人惟恐人才之不足不患乎衆多也治事皆任其責惟恐士之不至不憂乎競進也宜立士規以養徳厲行更學制以量才進藝立貢法以興賢歛才立試法以試用養才立辟法以興能備用立舉法以覈實得人立考法以責任考功先是仁宗朝尤以選人改京官為重蘇軾曰國家取人有制策有進士有明經有諸科有任子有府史雜流凡此者雖衆無害也其終身進退之決在乎召見改官之日此尤不可以不愛惜慎重者也今之議不過曰多其資考而責之以舉官之數且彼有勉彊而已資考既足而舉官之數亦以及格則將執文墨以取必於我雖千百為輩莫敢不盡與臣竊以為今之患正在於任文太過是以為一定之制使天下可以嵗月必得甚可惜也方今之便莫若使吏六考以上皆得以名聞於吏部吏部以其資考之逺近舉官之衆寡而次第其名然後使一二大臣雜治之參之以其材器之優劣而定其等嵗終而奏之以詔天子廢置度天下之吏每嵗以物故罪免者㡬人而増損其數以所奏之等補之及數而止使其予奪亦雜出於賢不肖之間而無有一定之制則天下之吏不敢有必得之心將自奮厲磨淬以求聞於時而向之所謂用人之大弊者將不勞而自去然而議者必曰法不一定而以才之優劣為差則是好惡之私有以啟之也臣以為不然夫法者本以存其大綱而其出入變化固將付之於人昔者唐有天下舉進士者羣至於有司之門唐之制惟有司之信也是故有司得以搜羅天下之賢俊而習知其為人至一日之試則固已不取也唐之得人於斯為盛今以名聞於吏部者毎嵗不過數十百人使一二大臣得以訪問參考其才雖有失者蓋已寡矣如必曰任法而不任人天下之人必不可信則夫一定之制臣亦未知其果不可以為姦也又曰夫天下之吏不可以人人而知也故使長吏舉之又恐其舉之以私而不得其人也故使長吏任之他日有敗事則以連坐其過惡重者其罰均且夫人之難知自堯舜病之矣今日為善而明日為惡猶不可保况於十數年之後其幼者已壯其壯者已老而猶執其一時之言使同被其罪不已過乎天下之人仕而未得志也莫不勉彊為善以求舉惟其既已改官而無憂是故蕩然無所不至方其在州縣之中長吏親見其亷謹勤幹之節則其勢不可以不舉彼又安知其終身之所為哉故曰今之法責人以所不能者謂此也一縣之長察一縣之屬一郡之長察一郡之屬職司者察其屬郡者也此三者其屬無㡬耳其貪其亷其寛猛其能與不能不可謂不知也今且有人牧牛羊者而不知其肥瘠是可復以為牧人歟夫為長而屬之不知則此固可以罷免而無足惜者今其屬官有罪而其長不即以聞他日有以告者則其長不過為失察而去官者又以不坐夫失察天下之㣲罪也職司察其屬郡郡縣各察其屬此非人之所不能而罰之甚輕亦可怪也今之世所以重發贓吏者何也夫吏之貪者其始必詐亷以求舉舉者必皆王公貴人其下者亦卿大夫之列以身任之居官莫不愛其同類等夷之人故其樹根牢固而不可動連坐者常六七人甚者至十餘人此如盗賊質刦良民以求茍免耳為法之弊至於如此亦可變矣如臣之策以職司守令之罪罪舉官以舉官之罪罪職司守令今使舉官與所舉之罪均縱又加之舉官亦無如之何終不能逆知終身之亷官而後舉特推之於幸不幸而已茍以其罪罪職司守令彼其勢誠有以督察之臣知貪吏小人無容足之地又何必於舉官焉艱之至孝宗朝朱子嘗作改官議曰一諸州教官以經明行修登第人充罷去試法如不足則令侍從兩省臺諫及諸路監司雜舉嵗無定員有闕則降指揮令舉一近制新改官人並令作縣其舉狀内只言犯入已贓甘與同罪即不言若本人改官之後任親民差遣日如有疲懦殘酷違法害民即與同罪是以舉者徇私妄舉多不擇人及至負敗又無譴責今欲乞於狀中添入此項如有違戾必罰無赦一今改官人雖有引見之法然未嘗親見玉音詢考治行所以人得妄舉而昏繆不材之人或與其間欲乞今後引見之日每十人中特宣兩人升殿詢其前任職事及民間利害如有庸繆即行退黜仍將舉主降官放罷有職名者即令落職則舉者知畏而庸妄之徒不敢僥倖求進矣一改官之人設使所舉皆當然其才亦有大小之不同而今之縣官亦有難易之别今銓部之法未嘗為官擇人而使人自擇官是以才髙者審於擇地多注優閒易辦之縣才短者昧於所向多注繁劇難辦之縣使人與官兩失其所所以縣多不治而人有遺才也欲乞將天下諸縣分其難易又以大小為次委自尚書將合注知縣之人精加考究分作四等以可任繁難大縣者為上繁難小縣者次之優閒大縣又次之小縣為下其已任繁難者後任便與注權通判其任優閒縣者後任須管再入知縣一次不得别注差遣願注縣丞者聴但亦以三年為任一累任教官不曽實歴治民之人不許薦舉改官又嘗為私議曰古者學校選舉之法始於鄉黨而達於國都教之以徳行道義而興其賢者能者盖其所以居之者無異處所以官之者無異術所以取之者無異路是以士有定志而無外慕蚤夜孜孜惟懼徳業之不修而不憂爵禄之未至夫子所謂言寡尤行寡悔禄在其中孟子所謂修其天爵而人爵從之盖謂此也若夫三代之教藝為最下然皆猶有實用而不可闕其為法度之密又足以為治心養氣之助而進於道徳之歸此古之為法所以能成人材而厚風俗濟世務而興太平也今之為法不然雖有鄉舉而其取人之額不均又設太學利誘之一途監試漕試附試詐冐之㨗徑以啟其奔趨流浪之意其所以教者既不本於徳行之實而所謂藝者又皆無用之空言至於甚弊則其所謂空言者又皆怪妄無稽而適足以敗壞學者之心志是以人材日衰風俗日薄朝廷州縣每有一事之可疑則公卿大夫官人百吏愕眙相顧而不知所出是亦可以驗其為教之得失矣而議者不知其病源之所在反以程試文字之不工為患而唱為混補之説以益其弊或者知其不可又欲斟酌舉行崇寧州縣三舍之法而使嵗貢進士於大學其説雖若賢於混補之云然果行此則士之求入乎州學者必衆而今州郡之學錢糧有限將廣其額則食不足將仍其舊則其勢之徧選之艱而途之狹又將有甚於前日之解額少而無所容也正使有以處之然使㳺其間者較計得失於旦暮錙銖之間不得寧息是又不惟無益而損莫大焉亦非計之得也盖嘗思之必欲棄時改制以漸復先王之舊而善今日之俗則必如明道先生熙寧之議然後可以大正其本而盡革其末流之弊如曰未暇則莫若且均諸州之解額以定其志立徳行之科以厚其本罷去詞賦而分諸經子史時務之年以齊其業又使治經者必守家法命題者必依章句答義者必通貫經文條舉衆説而斷以已意學校則遴選實有道徳之人使専教導以求實學之士裁減解額舍選繆濫之恩以塞利誘之塗至於制科詞科武舉之屬亦皆究其利病而頗更其制則有定志而無奔競之風有實行而無空言之弊有實學而無不可用之材矣時楊萬作選法論以進其上篇曰選法之弊在於信吏而不信官信吏而不信官故吏部之權不在官而在吏三尺之法適足以為吏取富之源而不足以為朝廷為官擇人之具所謂尚書侍郎二官者據案執筆閉目以書紙尾而已且夫吏之犯法者必治而受賄者必不赦朝廷之意豈真信吏而不信官者耶非朝廷之意也法也意則信官也法則未嘗信官也朝廷亦不自信也天子不自信則法之可否孰決之決之吏而已矣夫朝廷之立法以防吏之為姦而其用法也則取於吏以為決則是吏之言勝於法而朝廷之權輕於吏也其言至於勝法而其權至重於朝廷則吏部長貳安得而不吏之奉哉長貳非曰奉吏也曰吾奉法也然而法不決之於官而決於吏非奉吏而何夫是之為信吏而不信官今有一事於此法曰如是而可如是而不可士大夫之有求於吏部有持牒而請曰我應夫法之所可行而吏部之長貳亦曰可宜其為可無疑也退而吏出寸紙以告之曰不可既曰不可矣宜其為不可無改也未㡬而又出寸紙以告之曰可且夫可不可者有一定之法而用可不可之法者無一定之論何為其然也吏也士大夫之始至也恃法之所可亦恃吏部長貳之賢而不謁之吏故與長貳面可之退而問之吏吏曰法不可也長貳無以語則亦曰然士大夫於是不決之法不請之長貳而以市於吏吏曰可也而勿亟也伺長貳之遺忘而畫取其諾昨奪而今與朝然而夕不然長貳不知也朝廷不訶也吏部之權不歸之吏而誰歸夫其所以至此其始也有端其積也有漸而其成也植根甚固而不可動揺矣然則曷為端其病在於忽大體謹小法而已矣吏者從其所謹者而中之并與其所忽者而竊之此其為不可破也且朝廷何以思之曰吾之銓選果止於謹小法而已則一吏執筆而有餘也又焉用擇天下之賢以為尚書侍郎也哉則吾之所以任尚書侍郎殆不止於謹小法而已是故莫若畧小法而責大體使知小法之有所可否初無繫於大體之利害則吏部長貳得以出意而自决之要以不失夫銓選之大體而不害夫立法之大意而已責大體而畧小法則不決於吏而吏之權漸輕吏漸輕然後長吏之賢者得以有為而選法可漸革也其下篇曰臣聞吏部之權不異於宰相亦不異於一吏夫宰相之與一吏不待智者而知其懸絶也既曰吏部之權不異於宰相又曰不異於一吏者何也今夫進退朝廷之百官賢者得以用而不肖者得以黜此宰相之權也注擬州縣之百官下至於簿尉而上至於守貳此吏部之權也朝廷之百官自大科異等與夫進士科甲之首者未有不由於吏部也未有不由於吏部而官者今日之簿尉未必非他日之宰相而况今日宰相之所進退者臺閣之所布列者皆前日之升階揖侍郎者也故曰吏部之權不異於宰相雖然吏部之所謂注擬何也始入官者則得簿尉自簿尉来者則得令丞推而上之至於幕職由是法也又上之至於守貳由是法也其宜得者則曰應格其不宜得者則曰不應格曰應格矣雖貪者疲愞者老耋者乳臭者愚無知者庸無能者皆得之得者不之愧與者不之難也曰不應格矣雖真賢實能㢘潔守志之士皆不得也不得者莫之怨不與者莫之恤也吏部者曰彼不愧不怨吾事畢矣如募焉書其役之髙下而甲乙之按其役之逺近而勞逸之呼一吏而閲之簿盡矣此縣令之以止小民之争也吏部注擬百官而寄之以天下之民命乃亦止於止争而已矣故曰亦不異於一吏今吏部亦有所謂銓量者矣揖之使書以觀其能書乎否也召醫而視之以探其有疾與否也贊之使拜以試其視聴之明暗筋力之老壯也曰銓量者如是而已矣而賢不肖愚智何别焉昔晉用山濤為吏部尚書而中外品員多所啟拔宋以蔡廓為吏部尚書廓先使人告宰相徐羨之曰若得行吏部之職則拜不然則否羨之答曰黄散以下皆委廓猶以為失職遂不拜蓋古之吏部雖黄門散騎皆由吏部之較選是當時之為吏部者豈亦止取若今所謂應格者而為黄散耶抑將止取今所謂銓量者而為黄散耶宋史蘇紳傳上言古者自黄散而下及隋之六品唐之五品皆吏部得専去留今審官院流内銓則古之吏部三班院古之兵部不聞官職之閒劇才能之長短惟以資厯深淺為先後有司但主簿籍而已欲賢不肖有别不可得也臣願朝廷稍增重尚書之權使之得以察百官之能否而與奪之如丞簿以下官小而任輕者固未能人人而察之也至於縣宰之寄以百里之民者守貳之寄以一郡之民者豈不重哉且天下㡬州一州㡬縣一嵗之中居者待者之外到部而注擬縣宰者㡬人守貳又㡬人則亦不過三數百而已以一嵗三數百之守貳縣宰而散之於三六旬之日月則一日之注擬者絶多補寡亦無㡬爾一嵗之間而不能察三數百人之能否則其為尚書者亦偶人而已矣月計之而不粗嵗計之而不精則其州縣之得人豈不十而五六哉雖不五六豈不十而三四哉以此較彼不猶愈乎或曰尚書之權重則將得以行其私奈何是不然昔陸贄請令臺省長官各舉其屬而徳宗疑諸司所舉皆有情故或受賂者贄諫之曰陛下擇相亦不出臺省長官之中豈有為長官則不能舉一二屬吏居宰相則可擇千百具僚其要在於精擇長吏贄之説盡矣今朝廷百官執非宰相進擬者而不疑也至於吏部長貳之注擬而獨疑其私乎精擇尚書而假之以與奪之權使得精擇守貳縣宰而無専拘之以文法庶乎天下不才之吏可以汰而天下之治猶可以復起也與至寧宗嘉定中嘗命監司守臣舉十科政績所知自代江東轉運司副使真徳秀奏刺舉之法曰太平興國中嘗詔諸道轉運使司察訪部下官吏凡罷軟不勝任及黷於貨賄者俾條上其事狀其清白自守幹局不凡者亦許其明揚臣仰見祖宗盛時選用監司付以事權者蓋欲其公於刺舉責任之意不輕也自嘉泰開禧以来公道不行請囑日盛郡縣之官有罪狀彰灼為監司者甫欲按核已求要路之援以自脱甚者得以施其反噬之計於是刺之權有不行矣嵗舉之員往往奪於權貴之命孤寒無援者雖盡心職業不免陸沉之嘆膏梁庸騃茍有所挾則若執劵以取償焉於是舉之權又有所不行矣是以州縣之間賢否不分民受其病今陛下更新大政公道昭明寖還乾道淳熙之舊矣獨縉紳間新故請托之弊未能盡革臣愚欲望聖慈詔戒中外士大夫相與維持公道使將旨承命者得以展澄清之志而賢不肖有所甄别於治道豈小補哉項安世擬對學士院試策曰科舉之法此今日不可如何之法也自太平興國以来科名日重實用日輕以至於今二百餘年舉天下之人才一限於科目之内入是科者雖檮杌饕餮必官之出是科者雖周公孔子必棄之習之既久上不以為疑下不以為怨一出其外而有所取捨則上蓄縮而不安下睥睨而不服共知其弊而甘心守之不敢復議矣故曰此今日不可如何之法也不論伊傅周召如何但使諸葛亮王猛處此必當自出意度别作爐鞴以陶鎔天下之人物以收拾天下之才智以共了當時之事決不矻矻受此纒縳也自王導謝安以下隨世就事人欲於妥帖平静之中宻致分數劑量之效則必不敢變今之説取今之士矣此固無以議為也然則用王謝之術為之調度亦有道乎曰有時於尋常尺寸之中畧出神明特達之舉稍更闒茸已甚之習薄伸渾厚平直之氣則猶愈於已也蓋天下之事雖貴於法守而亦不可以一付於法法者所以抑僥倖非所以抑豪傑也夫所謂徼倖者其才不應得之之謂也一人得之衆人攀之其門一開不可復禁故上之人立法以拒之使之欲進而無隙欲求而無辭是則法之效也若夫豪傑之士其徳宜為人上其才宜為世用非所謂徼倖者此法之所求非法之所拒也人所共服莫敢與比以此為例誰敢攀之有若是者時出而用之以示天下不専以操筆弄墨取人主之官爵則亦足以補風化隆實行扶善人而愧惡子也又曰夫科目之盛自李唐起而唐之取士猶未盡出於此也有上書而得官如和逢堯員半千之類是也有隠逸而召用如陽城李渤之類是也有出於辟舉如韓愈之出於張建封董晉是也有出於延譽者如吳武陵之薦杜牧之是也至於本朝法令始宻科場條貫如縳胥吏而鄉舉里選之意纎悉無遺矣然祖宗之時猶有度外之事如張詠當為舉首而以遜其鄉人則猶有朋友之義也宋祁當為第一而令與兄則猶有兄弟之恩也延入客次先通所為文則猶有禮意也李畋張及等三人並解則猶未立額也此外又有陳乞之恩聘召之禮元祐經行之舉三舎行藝之規則其意亦知徒文之不足以盡士矣故孫復蘇洵之用猶出於常法之外而雷簡夫姚嗣宗之官或由於特達之授然意欲不安而法已一定雖或少出常度然亦千萬中之一二耳須叟之才行不足以勝二百年之科目也葉適論制科曰用科舉之常法不足以得天下之才其偶然得之者幸也自明道景祐以来能言之士有是論矣雖然原其本以至其末亦未見有偶然得之者要以為壊天下之才而使之至於舉無可用此科舉之敝法也至於制科者朝廷待之尤重選之尤難使科舉不足以得才則制科者亦庶㡬乎得之矣雖然科舉所以不得才者謂其以有常之法而律不常之人則制舉之庶乎得之者必其無法焉而制舉之法反宻於科舉今夫求天下豪傑特舉之士所以恢聖業而共治功彼區區之題目記誦明數暗數制度者胡為而責之而又於一篇之䇿天文地理人事之紀問之畧徧以為其説足以酬吾之問則亦可謂之竒才矣當制舉之盛時置學士立師以法相授浮言虗論披抉不窮號為制科習氣故科舉既不足以得之而制舉又或失之然則朝廷之求為一事也必先立為一法若夫制科之法是本無意於得才而徒立法以困天下之泛然能記誦者耳此固所謂豪傑特起者輕視而不屑就也又有甚此者葢昔以三題試進士而為制舉者以答策為至難彼其能之則猶有以取之自熙寧以䇿試進士其説蔓延而五尺之童子無不習言利害以應故事則制舉之䇿不足以為能故哲宗以為今進士之䇿有過此者而制科由此再廢矣是以八九十年其薦而不得試者其試而不見取者其幸而取者其人才凡下徃徃不逮於科舉之俊士然且三年一下詔而追復不俟科舉之嵗皆得舉之將何所為乎設之以至宻之法與之以至美之名使其得與此者為􅇥官爵計耳且天下識治知言之人不應如是之多則三嵗以䇿試進士使肆言而無所用是誠失之矣今又使制舉者自以其所謂五十篇之文泛指古今敷陳利害其言泛雜見者厭視聞者厭聴且士之猥多無甚於今世挾無以大相過之實而冐不可加之名則朝廷所以汲汲然而求之者乃為譏笑之具今宜暫息天下之多言進士無親䇿制舉無記誦無論著稍稍㤀其故歩一日天子慨然自舉之三代之英才未可驟得亦不至如近世之冗長無取非唯無益而反有害也論宏詞曰法或生於相激宏詞之廢久矣紹聖初既盡罷詞賦而患天下應用之文由此遂絶始立博學宏詞科其後又為詞學兼茂其為法尤不切事實何者朝廷詔誥典冊之文當使簡直宏大敷暢義理以風曉天下典謨訓誥諸書是也孔子録為經常之詞以教後世而百世不能易可謂重矣至两漢詔制詞意短陋不復髣髴其萬一葢當時之人所貴者武功所重者經術而文詞者雖其士人譁然自相矜尚而朝廷忽畧之大要去刀筆吏之所能無幾也然其深厚温雅猶稱雄於後世而自漢以來莫有能及者若乃四六對偶銘檄贊頌循沿漢末以及宋齊此真两漢刀筆吏能之而不作者而今世謂之竒文絶技以此取天下士而用之於朝廷何哉自詞科之興其最貴者四六之文然其文最為陋而無用士大夫以對偶親切用事精的相誇至有以一聫之工而遂擅終身之官爵者此風熾而不可遏七八十年矣前後居卿相顯人祖父子孫相望於要地者率詞科之人也其人未甞知義其學未甞知方也其才未甞中器也操紙援筆以為比偶之詞又未甞取成於心而本其源流於古人也是何所取而以卿相顯人待之相承而不能革哉且又有甚悖戾者自熙寧之以經術造士也固患天下習為詞賦之浮華而不適於實用凡王安石之與神宗徃反極論至於盡擯斥一時之文人其意曉然矣紹聖崇寜號為追述熙寧既禁其求仕者不為詞賦而反以美官誘其已任者使為宏詞是始以經義開迪之而終以文詞蔽滛之也士何所折衷故既以為宏詞則其人已自絶於道徳性命之本統而以為天下之所能者盡於區區之曲藝則其患又不特舉朝廷之髙爵厚禄輕以與之而已也反使人才䧟入於不肖而不可救且昔以罷詞賦而置詞科今詞賦經義並行久矣而詞科迄未甞有所更易是何創法於始而不能考其終使不自為背馳也葢進士制科其法猶有可議而損益之者至宏詞則直罷之而已矣理宗寶慶間漕試藪弊禮部侍郎曹彦約奏曰科舉之弊莫甚於牒試而牒試之弊莫甚於作偽葢解額之有廣狹士子之有衆寡廣而寡者固已安其分則狹而衆者必思所以為之計朝廷以承平日久士子日盛設為牒試之法寛其進取之門末節細故未暇深察於是改鄉里以就他人之貫改三族以認他人之親甚者改其祖父改其姓氏若得若失尚未可知而欺君之迹已昭昭不可掩矣今國子監牒試其弊尚少臣不知其本末未敢遽議惟是漕試之弊積習既久士大夫互相欺詐恬不為怪壊士之心術莫甚於此時舉摘一二尤者而懲戒之於事無補律以科舉之法無一可者則更改張之不可緩也好事者深知其不便求其説而不得欲増解額則難立限制欲均解額則侵及他郡欲廢漕額以益諸郡不特舊額不等極費區處而所部之親戚故舊有决不可不避者變舊法以起爭端終不可久無已則有一焉在内有職事官朝廷之所選用也在外有監司帥守朝廷之所責任也大郡之有通判小郡之有簽判轉運司之有主管文字諸路之有川廣福建又逺地之多士子處也與其詐偽避親而使之冒試孰若嚴其保任而使之牒試隨其官職分其差等若監司帥守可舉十五人則大郡可舉十人中下郡可舉七八人通判可舉五人主管文字與簽判可舉三人川廣福建不在此位者不過一二人職事官之牒門客者當如其舊以其川廣福建牒者郎官以上不得過下郡之數寺監丞以下不得過通判之數明載公牘參以法令如是行之不増發解不拂人情而解額之狹處與士子之衆處受其利如前日也但前之為法不許其保任而容其詐偽後之為法不容其詐偽而許其保任其利害相去何如哉然州縣之牒本路可以稽考而監司帥守之牒鄰路容有泛濫且如两浙路與江東福建為鄰而又與淮東為鄰湖北一路與湖南江西為鄰而又與淮西京西䕫路為鄰若止許一處則地里有不便或分之數路則渙散而無統須合與之闗防立為限制應監司帥守牒過員數並限九月三十日以前具申禮部禮部總其名數並限九月三十日具申部省備牒御史臺諌院其弊可革矣時詔見供職及在外帶職從官依元祐十科舊制嵗舉三人從右正言糜洒請也權司封郎官許應龍曰臣聞天下固有不一之才人主當無執一之見葢人才之在天下若十指然小大長短雖若不齊而皆適於用兼收並蓄人則皆有以自見而天下無不舉之事茍用一而廢一則互相傾軋必有分朋植黨之弊夫人才不同彼此異見其來非一日矣足一躡軍門視文士如仇讐首一戴儒冠輕武弁如草芥矯矯特立則以靜重為茍容處事詳審則以剛直為沽譽長於吏才則以明經術者為腐儒專於學問則以了官事者為俗吏少俊則以老成為遲鈍寛厚則以嚴明為苛刻各分黨與判乎其不相入也人主用才惟求其辦吾事濟吾治而已安可主一而廢一哉陛下建用皇極無黨無偏耆徳者召之文學者用之吏事者任之或長於將畧或精於財計或以循良稱或以讜直名莫不擢用固無一毫好惡之私然求賢之詔屢下剡薦之牘交馳而人心多私罕以實應靖退不兢者無由自達單寒寡援者未免見遺臣願陛下開衆正而達四聰使任薦舉者悉參公論舉能其官則錫以進賢之賞稱匪其人則加以謬舉之罰如此則真才實能皆為吾用何事不立惟陛下與大臣亟圖之章如愚曰前輩謂進士一科為宰相科則其人可知也當時取士兼采譽望廷唱或先審人物有以翰林學士之子而令覆試者陶穀之子翰有以宰相參政之子弟而皆罷之者李昉之子宗吕蒙正之弟䝉亨有以陞黜未公而再行考試者王曽等言有以取舍非當至擊鼓自陳者徐士庶有以賦落韻而特取之者李迪有以注䟽異説而特黜之者賈邊有以上書可用而道榜皆為通判者張齊賢有以儀狀秀偉而召見擢為第一者蔡齊國初取士之際猶不拘於法也或欲罷封彌之法范仲淹范鎮等或欲隆學校之教歐陽修或欲還田里之選趙師民或欲置經明行修之科司馬光皆欲考其素履兼采譽望如國初之制然時異事變難於卒行則亦相視太息而已又論舉主曰擇舉主於未用之先察舉人於方用之始責舉主於己用之後此祖宗之良法也咸平初上語李至曰凡所舉官多聞謬濫不若先擇舉主此擇舉主法也太平興國之詔曰九品之賤一命之㣲未甞專望於有司必須召對於便殿此察舉人法也乾徳之詔曰除授之制書舉主姓名或不知舉者並連坐之此責舉主法也擇之於其先則人知所勸責之於其後則人知所懼天子又於其中而致察焉則其權又不專在有司矣祖宗朝舉京朝官委之蘇易簡陳恕舉御史委之樂黄知陳自㣲謂其人足以堪是選也今之逹官不能皆偉人一當其任例可揀拔亷謹者舉清幹贓汙者舉貪濁比之匪人如薦賢何祖宗朝髙惠連之績用面授朝官張祥之自新授以令長此皆親得於顧問者也今之班引特為文具去黼座於數十歩之外聴唱姓名而已旅進旅退何以知人若乃連坐之法則祖宗之所嚴而今日之所寛也昔邵餘慶劾舉主邵煜舉非其人已經數宥猶至停官其法之嚴也如此雖曰改節中變許自陳首而又有不在陳首之限者今也不然罪犯已著不可芘䕶舉主乃以陳首而免連坐不罰而懼能幾何人三法皆壊而薦舉之弊有不可勝言者矣竊甞因賈黯之言而深思焉舊制薦人不限員數自張易所舉猥多乃始限之舊常參官得論薦其後常參官不許論薦舊以不在任及所統屬皆得論薦其後惟在任及統屬方許論薦是向之法疎而後之法宻矣然天聖中改官者止數十人皇祐中已六七十人至於治平則三倍其數法之疎者其數省法之宻者其數増此其故何哉大抵有勅舉有限舉勅舉者闕其人則舉不闕則不舉也限舉者毎嵗有舉雖不闕亦舉也祖宗時闕令長則詔舉令長闕幕職則詔舉幕職闕京朝官則詔舉京朝官士大夫終身所舉一二人而已故可以選可以責天子亦可以聞視自夫監官郡守嵗舉限員不問賢否但欲充數一人之身更六七任則所舉不勝其衆限舉不可行勅舉不可復善謀國者亦付之無可奈何而已矣噫薦李師錫者凡三十餘人擢之不次可也而尚與循資賈積善史用昭厯任書攷薦之者無一人終身選調可也而特以京官與之祖宗權衡固有出於是法之外者神而明之存乎其人又論堂除及資格曰國初官人之法文臣屬中書武臣屬樞宻太宗分中書之權而置審官院神宗分樞宻之權而置審官西院遂以文臣之審官為東焉於後合東西審官之權而歸之左右尚書文臣之差注吏部若得專其責矣然監司郡守及御史省郎以上皆中書主之正將副將准備將以上皆樞宻主之此堂除所以為重本也祖宗以來資格甚嚴其用某人也必曰嘗歴某資也由守而憲由憲而漕由漕而三路使而三司副使至是方除待制焉由正將而邊守州銓由邊守州鈐而邊帥路鈐由邊帥路鈐而都鈐總管官至是方選管軍馬一資一級至不輕也自熙寧大臣引用新進有邑宰資序而為監司郡守者有選人未改官而亦預俊拔者官制既行資序止於吏部朝廷所除出於臨時而文臣之資格壞矣自政和之官爵日濫而横行之任下及匪人邊郡之除無異正任官制復行武臣直博皇城使雖樞臣莫之能改而武臣之資格壊矣夫待常才以資待非常之才以望如徒以資而已則盛徳善行瑰竒偉雋之士或拘格而遲回然専捨資用望則狂繆之流矯抗之士或以虚名進矣其用望之弊當有甚於資也且祖宗之朝聞有不次而舉者有特㫖而授者畢士安以侍讀學士兩遷而正端揆宋琪以兵部員外三遷而居端揆王顯閤門使也其正西府止於兩遷王繼英客省使也其知西府止於一遷此固非純用資格者然資格終不可廢也李定以資淺入臺三舍人不奉詔武功大夫之轉横行則紹興廷臣深非之焉蓋資格嚴則入望為足貴用望者多僥倖者至斯亦不足貴也已昔范文正公為百官圖以進指其遷進遲􅄩次序曰如此則為叙遷如此則為不次噫必有范公而後可以用資㓂忠愍議擢指揮使吏以例籍進公曰用一牙官尚須檢例安用我輩噫必有㓂公而後可以用望否則資望俱失矣又久任論曰官守數易弊法也而將相之數易監司郡守之數易其弊為尤甚祖宗朝趙中令之相凡十一年王文正之相凡十二年向文簡之相亦十年皇祐用相逺者五七年次者二三年而亟用亟罷何郯已切議之良以道揆之任非百官有司比任之則勿疑疑則勿任祖宗朝郭進之守西山凡二十年李漢超之守闗南凡十七年董遵晦之守通逺凡十四年其餘或九年或十年或十餘年蓋不可悉數夫閫外之任古人所重委之也専任之也久則可以責其成效擢之未㡬而遷之隨至雖有頗牧何所用之祖宗朝宋博轉運使河東凡十一年宋璫之知秦州凡六年蔣元振之知白州凡七八年在蜀者或至三任宰相在廬者或七年不遷而知滄州未半年而更三任授發運使未數日而又遷諫議則呉申力言之夫親民之職不可屢易監司一易則擾一路郡守一易則擾一州令宰一易則擾一縣送故迎新勞擾萬狀五日京兆奸者侮之雖百龔黄何所容其技耶祖宗朝曰相曰將曰監司曰守令無一不乆其職者正為是也不寧惟是張質之在樞密五十年王貽永為樞密十五年古之以司馬為氏不過是也陳恕之在三司十二年李士衡之任筦計二十年古之以倉庫為民不過是也趙師民楊安國之在經筵或十餘年或二十七年所以養君徳者多矣司馬光劉温叟之在臺諫或五年或十二年所以格君心者乆矣張師徳九年在西掖章徳象十二年在翰林所以出納王命者當矣雖然亦視其才徳如何宋琪自外郎嵗中三遷為真相何敏中自外郎嵗中三遷為真相向敏中自外郎百餘日正西府可以速則速又不容以乆任之法拘之孫洙論資格曰三代而下選舉之法紛紛其始終一切皆失者其國家資格之制乎今賢材之佚於下者資格閡之也職業之廢於官者資格牽之也士之寡亷鮮恥者争於資格也民之困於虐政暴吏資格之人衆也萬事之所以抏弊百吏之所以廢弛法制之所以頺爛決潰而不之救者皆資格之失也惟天之生大賢大徳也非以私厚其人將使之輔生民之治者也惟人之有大材大智者非以獨樂其身將以振生民之窮者也今小人累日而取貴仕君子側身而困卑位賢者戴不肖於上而愚者役智者於下爵不考徳禄不授能故曰賢材之伏於下者資格閡之也才足以堪其任小拘嵗月而防之矣力不足以稱其位増累考級而得之矣所得非所求也所求非所任也位不度才功不索實故曰職業之廢於官者資格牽之也今夫計嵗閥而争年勞者日夜相鬭也有司躐一名差一級則攝衣而羣争愬矣其甚者或懷黄敇而置於丞相之前也其行義去市賈者亡㡬耳故曰士之寡亷鮮耻者争於資格也来而暴一邑既嵗滿矣又去而虐一州也非以贓敗至死不黜虎吏劘牙而食於民賢者鬱死於巖穴而赤子不得養其父母也故曰民之困於虐政暴吏者資格之人衆也夫資格之法起於後魏崔亮而復行之於唐之裴光庭是二子者其當世固已罪之不待後人之譏矣然而行之前世不過數十年者也後得稱職者矯而更之故其患不大今資格之弊流漫根結踵為常法方且世世而遵行之矣往者不知非来者不知矯故曰萬事抗弊百吏廢弛法制頺爛決潰而不之救也雖然不無小利也小便也利之者蠢愚而廢滯者也便之者耋老而庸昏者也而於天下國家焉則大失也大害也然而提選部者亦以是法為簡而易守也百品千羣不復銓叙人物而綜覈功實一吏在前勘簿呼名而授之矣坐廟堂者亦以是法為要而易行也大官大職列籍按氏差第日月還然而登之矣上下相冐而賢材去愈逺可為太息也為今之急誠宜大蠲弊法簡拔異能爵以功為先後用以才為序次無以積勤累勞者為髙叙無以深資乆考者為優選智愚以别善否陳前而萬事不治庶功不熙者臣愚未嘗聞也林駉曰有文學有武學養之於未用之先也有文選有武選用之於既養之後也然則科舉之法既有文學矣焉可不設武舉乎宋朝制科有六而武事居其二又外置武舉以待方略武勇之士時盖天聖七年也行之二十年而罷罷之十有五年而復是故以策論定去留以弓馬定髙下寶元制也先試大義次試時務邊防策又别試弓馬熙寧制也以此而取士則其得人當不居唐之郭子儀下而或者猶曰弓馬不過麄材策論亦為無用蘇老泉之論謂不若方畧有謀者之可用也武舉者蹶張馳射儕於卒伍稍有亷恥則焉肯為富文忠公之論謂不若威果武略之堪任將帥也是則然矣然亦嘗觀嘉祐議臣之奏乎今朝廷所聞稍有聲稱者皆由武舉而得此其所取豈得謂之無益於世者如富如蘇之論特不過謂来者猥多取者不擇而豪傑之士有不屑就焉爾如執此以議武舉君子謂之不知務李日華曰宋三年一郊官無大小皆廕子其各自轉考必蔭蔭授之官又行蔭典凡一官出身子孫弟侄以及外孫與甥惟不及壻耳兩制大臣平生有瀕死之疾遇醫得起者有恩可推亦准本官陳乞何其濫也金世宗大定初每季選人至吏部托以檢閲舊籍謂之檢卷有留滯至後季尚不得去者髙衎三為吏部知其弊及授尚書嵗餘銓事修理選人便之十九年九月命各道提刑按察司舉亷能吏加等遷叙監察御史魏初曰舊制常參官諸州刺史上任三月舉一人自代况風紀之職與常員異請自今監察御史按察使官在任一嵗各舉一人自代所不當有罰不惟砥礪風節亦可為國得人章宗明昌初上封事者乞鄉以八行貢春官及設制舉宏詞事下尚書省集百官議户部尚書鄧儼等謂成周鄉舉里選法卒不可復設科取士各隨其時八行者乃亡宋取周禮之六行孝友睦婣任恤加之以中和為八也凡人之行莫大於孝亷今已有舉孝亷之法及民有才能徳行者令縣官薦之犯十惡姦盜者不得應試亦六徳六行之遺意也夫制舉宏詞盖天子待非常之士若設此科不限進士并選人試之中選擢之臺閣則人自勉矣從之於是設賢良方正能直言極諫博學宏材逹於學政等科聴内外文武六品以下職官無公私過者從内外五品以上薦於所屬詔試之若草澤士徳行為鄉里所服者則從府州薦之三年平章政事完顔守貞言經童之科非古制也自唐諸道表薦或取五人或十人近代宋仁宗以為無補罷之本朝皇統間取及五十人因以為常天徳時或廢今復置取輒以百數恐乆積多不勝銓擬乞約取之帝曰若所誦皆及格如何守貞曰視幼最誦而不訛者精選之則數亦不多也復問參知政事胥持國對曰所誦通否易見豈容其濫帝曰限以三十或四十人若百人皆通亦可復取其精者持國曰是科盖資教之術耳夫幼習其文長玩其義使之蒞政人才出焉如中選者加之修習進士舉業則所記皆得為用臣謂可勿令遽登仕途必習舉業而後官之若能擢進士第自同進士任用如中府薦或㑹試視其次數優其等級㡬舉不得薦者從本科出身似可以激勸而得人矣時又特賜棣州孝子劉瑜錦州孝子劉慶祐絹粟旌其門閭復其身因問宰臣從来孝義之人曽官使者㡬何守貞以世宗時劉政對且言若輩多淳質不及事帝曰豈必盡然孝義之人素行已備稍可用即當用之後雖有希覬作偽者然偽為孝義猶不失為善其檢勘前後所申有可用者具以聞八月有司奏寧海州文登縣王震孝行以嘗業進士并試其文特賜同進士出身仍注教職一等職任十一月尚書省奏益都府舉王樞事親至孝兼博學善書特賜同進士出身附王澤榜宣宗貞祐四年三月監察御史完顔素蘭言臣近被命體問外路官亷幹者擬以差遣若懦弱不公者罷之具申朝廷别議擬注臣伏念彼懦弱不公之人雖令罷去不過止以待闕者代之其能否又未可知或反不及前官盖徒有選賢之虚名而無得人之實跡古語云縣令非其人百姓受其殃今若後官更劣則為患滋甚豈朝廷恤民之意哉夫守令治之本也乞命隨朝七品外路六品以上官各舉堪充司縣長官者仍明著舉官姓名他日察其能否同定賞罰庶㡬其可乃詔隨朝七品外路六品以上官二嵗舉縣令一人時御史中丞李英又言兵興以来百務皆弛其要在於激濁揚清奬進人才耳近来改定四善十七最之法徒為虗文大定間數遣使分道考察亷能當時號為得人願改前日徒設之文遵大定已試之效庶㡬人人自勵以為國家用從之興定二年賜經義進士王彪等十三人及第時謂宰臣曰從来廷試進士日晡後即遣出宫恐文思遲者不得盡其才令待至暮時及覽彪程文愛其詞藻咨嗟乆之至五年三月省試經義進士考官於常格外多放喬松等十餘人有司奏請駁放帝以旱傷和氣不許按李世弼金登科記序略曰金天㑹改元始設科舉有詞賦有經義有同進士有同三傳有同學究凡五等詞賦初以經傳子史内出題次又令逐年改一經亦許注内出題以詩書易禮春秋為次循遼舊也天眷三年於析津府試天徳三年始親試於兩京貞元二年遷都於燕自後止試於析津府正隆二年以五經三史正文内出題明昌二年改令五經子史内出題仍與本傳此詞賦之大略也經義初試於真定府所放號七十二賢榜後及蔚州析津令易書詩禮春秋専治一經内出題盖循宋舊天徳三年罷此經義之大略也天眷三年令大河以南别開舉場謂之南選貞元三年遷都遂合南北通試於燕正隆二年令每二年一開科立定程限日月更不擇日府試初分六路次九路後十路此日月路分格也天徳二年詔舉人鄉府省御四試中第明昌三年罷去御試止三試中第府試五人取一依大定例不過五百人後以舉人漸多㑹試四人取一得者常不下八九百人御試取奏㫖此場數人數格也天眷三年析津放第於廣陽門西一僧寺唱名遷都後於宣陽門唱名後為定例此唱名之格也明昌初五舉終場人直赴御試不中者别作恩榜賜同進士出身㑹元御試不中者榜末安插府元被黜者許来舉直赴部又貞祐三年終場人年五十以上者即行該恩此該恩之格也大定三年孟宗獻四元登第特授奉直大夫第二第三人授儒林郎餘皆從仕郎後不為例明昌間以及第者多第一甲取五六人狀元授十一官第二人授九官餘皆授三官此授官之格也進士第一授丞簿軍防判第二授縣令此除授之格也五朝文獻通考曰金進士之制特重而諸紀中於廷試事多闕而不書孫承澤春明夢餘録友學典惟載李世弼一序而其言與金史頗有異同未知孰是而特賜人姓氏之可見者天徳前蘇保衡以宗衡薦賜進士出身天徳中曹望之以户部郎中特賜進士及第世宗朝則有完顔匡以太孫侍讀試進士不中賜及第章宗朝則有胡光謙㳺總孔端甫魏汝翼劉震亨崔秉仁翟駒齊文乙孫可乆陳信仁董戣李天祺康晉侯時琦劉摯升傅礪趙摯田扈方張介然李貞固等並以學行舉光謙端甫汝翼介然賜進士及第餘俱賜同進士出身宣宗興定五年康琚以林州行元帥府經歴官乞赴廷試賜進士及第哀宗天興二年王輔以下十六人並以終場賜進士出身若海陵時孫梅以貴妃唐古鼎格家奴賜進士及第則濫甚矣欽定續通典卷二十一
