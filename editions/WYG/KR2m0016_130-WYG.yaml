body:
  text: 州郡遼中京道南京道西京道中京道中京大定府漢新安平縣漢末步奚居之魏武北征降者一十餘萬去之松漠其後拓跋氏乘遼建牙於此當饒樂河水之南温渝河水之北唐太宗伐高麗駐蹕於此部帥蘇支從征有功奚長可度率衆内附為置饒樂都督府懿宗咸通以後契丹始大奚族不復敢抗遼太祖建國舉族臣屬聖宗嘗過七金山土河之濵望雲氣有郛郭樓闕之狀因議建都統和二十四年五帳院進故奚王牙帳地二十五年城之實以漢户號曰中京府曰大定領州十縣九大定白霫故地以諸國俘户居之長安本漢賔從縣以諸部人居之富庶本漢新安平地遼開泰二年析京民置勸農本漢賔從縣地遼開泰二年析京民置文定遼開泰二年析京民置升平遼開泰二年析京民置歸化本漢栁城縣地神水本漢徒河縣地遼開泰二年置金源本唐青山縣地遼開泰二年析京民置恩州懷徳軍下刺史本漢新安平縣地遼太宗建州開泰中以渤海户實之初𨽻永興宫後來屬領縣一恩化遼開泰中以渤海人户置惠州惠和軍中刺史本唐歸義州地遼太祖俘漢民數百户兎麛山下創城居之置州領縣一惠和聖宗遷上京惠州民括諸宫院落帳户置高州觀察唐信州之地武后萬嵗通天元年以契丹伊斯琿部置遼開泰中聖宗伐高麗以俘户置領縣一三韓辰韓為抉餘弁韓為新羅馬韓為高麗開泰中聖宗伐高麗俘三國之遺人置武安州觀察唐沃州地遼太宗俘漢民居木葉山下因建城以遷之號杏堝新城復以遼西户益之更曰新州統和八年改今名初刺史後升領縣一沃野利州中觀察本中京阜俗縣統和二十六年置刺史州開泰元年升領縣一阜俗唐末契丹漸熾役使奚人遷居琵琶川統和四年置縣初𨽻彰愍宫更𨽻中京後置州仍𨽻焉按統和二十六年金史作十六年謹附識榆州高平軍下刺史本漢臨渝縣地後𨽻右北平驪城縣唐武后載初二年析鎮州置黎州處靺鞨部落後為奚人所據遼太宗南征横帳嘉哩以所俘鎮州民置州開泰中没入領縣二和衆本新黎縣地永和本漢昌城縣地統和二十二年置澤州廣濟軍下刺史本漢土垠縣地遼太祖俘蔚州民立寨居之開泰中置州領縣二神山灤河本漢徐無縣地屬永興宫北安州興化軍上刺史本漢女祁縣地屬上谷郡晉為馮䟦所據唐為奚王府西省地遼聖宗以漢户置州領縣一利民本漢且居縣地潭州廣潤軍下刺史本中京之龍山縣開泰中置州領縣一龍山本漢交黎縣地開泰二年以習家寨置松江州勝安軍下刺史遼開泰中置領縣一松江本漢文成縣地遼開泰二年置成州興府軍節度晉國長公主以媵户置軍曰長慶初𨽻上京後改軍名來𨽻領縣一同昌興中府本霸州彰武軍節度古孤竹國漢栁城縣地慕容皝遷都於此改為龍城縣元魏為遼西郡隋平高寳寧置營州煬帝廢州置栁城郡唐高祖武徳初改營州總管府尋為都督府後為奚所據遼太祖平奚及俘燕民將建城命韓知方擇其處乃完葺栁城號霸州彰武軍節度統和中制置建霸宜錦白川等五州尋落制置𨽻積慶宫後屬興聖宫重熙十年升興中府領州二縣四興中本漢栁城縣地太祖掠漢民居此置霸城縣重興中置府更名按遼無重興年號興字當是熙字之訛謹附識營丘析霸城置象雷遼開泰二年以麥務川置初𨽻中京後屬閭山本漢無慮縣遼開泰二年以羅家軍置𨽻中京後屬安徳州化平軍下刺史以霸州安徳縣置來屬領縣一安徳統和八年析霸城東南龍山徒河境户置𨽻乾州更屬霸州置州來屬黔州阜昌軍下刺史本漢遼西郡地遼太祖平渤海以所俘户居之𨽻黒水河提轄司安帝置州析冝霸二州漢户益之初𨽻永興宫更𨽻中京後置府來屬領縣一盛吉太祖平渤海俘興州盛吉縣民來居此因置縣宜州崇義軍上節度本遼西絫縣地興宗以定州俘户建州𨽻積慶宫領縣二𢎞政世宗以定州俘户置聞義世宗置初𨽻海北州後來屬錦州臨海軍中節度本漢遼東無慮縣慕容皝置西樂縣遼太祖以漢俘建州𨽻𢎞義宫領州一縣二永樂安昌嚴州保肅軍下刺史本漢海陽縣地遼太祖平渤海遷漢户雜居興州境聖宗於此建城𨽻𢎞義宫來屬領縣一興城川州長寧軍中節度本唐青山州地遼太祖弟明王安圖置㑹同三年詔為白川州安圖子察克以大逆誅没入省曰川州初𨽻崇徳宫統和中屬文忠王府領縣三𢎞理統和八年以諸宫提轄司户置咸康宜民統和中置建州保静軍上節度唐武徳中置昌樂縣遼太祖完葺故壘置州初屬武寧軍𨽻永興宫後屬敦睦宫領縣二永霸永康本唐昌黎縣地來州歸徳軍下節度本唐瑞州故地遼太平元年改置初刺史後升𨽻永興宫領州三縣一來賔本唐來逺縣地隰州平海軍下刺史慕容皝置集寧縣遼聖宗括帳户遷信州大雪不能進建城於此置州𨽻興聖宫來屬領縣一海陽本漢縣濵海地多鹻鹵置鹽塲於此遷州興善軍下刺史本漢陽樂縣地遼聖宗平大延琳遷歸州民置來屬領縣一遷民潤州海陽軍下刺史遼聖宗平大延琳遷寧州之民居此置州領縣一海濵本漢陽樂縣地遷潤州本東京城内渤海民户因叛移於此南京道南京析津府本幽州唐置大都督府改范陽節度使五代晉以遼有援立之功割幽州等十六州以獻遼太宗升為南京又曰燕京府曰幽都軍號盧龍開泰元年落軍額按金史志云遼㑹同元年升為南京府曰幽都仍號盧龍軍開泰元年更為永安析津府遼史未詳謹附識領州六縣十一析津本晉薊縣改薊北縣遼開泰元年更今名宛平本晉幽都縣遼開泰元年更今名志按方輿紀要唐徳宗建中元年析薊縣置幽都縣遼作晉幽都縣盖誤又開泰元年清類天文分野之書作統和二十二年未知孰是謹附識昌平本漢軍都縣後漢屬廣陽郡晉屬燕國元魏置東燕郡反昌平縣郡廢縣𨽻幽州未按續輿地考昌平五代唐改為燕平石晉復舊遼史晰謹附識良鄉燕為中都縣漢改今名舊屬涿郡北齊省入薊縣尋復置唐武后聖厯元年改固節鎮神龍元年復舊潞本漢舊縣屬漁陽郡唐武徳二年置元州貞觀元年州廢復為縣安次本漢舊縣屬漁陽郡唐武徳四年徒至東南五十里石梁城貞觀八年又徙今縣西五里常道城元宗開元二十三年又徙耿就橋行市南永清本漢益昌縣隋置通澤縣唐置武隆縣改㑹昌天寶初改今名武清漢雍奴縣屬漁陽郡唐天寶初改今名香河本武清孫村遼於新倉置𣙜鹽院居民聚集因分武清香河潞三縣户置武按遼以前未有香河縣此云析清香河等三縣置疑誤謹附識玉河本泉山地劉仁恭於大安山創宫觀司煉丹羽化之術於方士王若訥因割薊縣分置以供給之漷隂本漢泉山之霍村鎮遼每季春弋獵於延芳淀居民成邑就城故漷隂鎮後改為縣謹按金史志漷隂縣遼太平中以漷隂村置遼史未詳附識順州歸化軍中刺史本隋置唐武徳初改燕州武宗㑹昌中改歸順州唐末仍為順州初軍曰歸寧後更今名領縣一懷柔唐貞觀六年置治五栁城改順義縣開元四年置松漠府彈汗州天寶元年改歸化縣肅宗乾元元年復今名居按遼志以順州為隋置考隋書粟末靺鞨内附止云之栁城而已太平寰宇記云煬帝大業八年為置遼西郡以統之亦未有置順州之文也新唐書貞觀四年平突厥以其部落置順祐化長四州都督府於幽靈之境順州之置實在此時謹附識檀州武威軍下刺史本燕漁陽郡地漢為白檀縣元魏創密雲郡兼置安州後周改為元州隋高祖開皇十八年割燕樂密雲二縣置檀州唐天寳元年改密雲郡乾元元年復為檀州遼加今軍號領縣二密雲本漢白檀縣後漢以居斤奚元魏置密雲郡領白檀要陽密雲三縣高齊廢郡及二縣來屬行唐本定州行唐縣太祖掠定州破行唐盡驅其民北至檀州擇曠土居之凡置十寨仍名行唐縣𨽻彰愍宫涿州永泰軍上刺史漢高祖六年分燕置涿郡魏文帝改范陽郡晉為范陽國元魏復為郡隋開皇二年罷郡屬幽州大業三年以幽州為涿郡唐武徳元年郡廢為涿縣七年改范陽縣代宗大厯四年置涿州石晉以歸太祖領縣四范陽本漢涿縣唐武徳中更名固安本漢方城縣唐武徳四年屬北義州貞觀二年來屬新城本漢新昌縣唐大厯四年析固安縣置後省後唐明宗天成四年復析范陽縣置歸義本漢易縣地齊併入縣唐武徳五年置北義州州廢復置縣來屬易州高陽軍上刺史漢為易故安二縣地隋置易州隋末為上谷郡唐武徳四年復為易州天寳元年仍為上谷郡乾元元年又改易州五代𨽻定州節度使遼㑹同九年孫方簡以其地來附應厯九年為周世宗所取後屬宋統和七年攻克之升今軍領縣三易本漢縣齊顯祖天保七年省隋開皇十六年於故安城西北隅置縣容城本漢縣先屬涿郡唐武徳五年屬北義州貞觀元年還來屬聖厯三年改全忠縣天寶元年復舊淶水本漢道縣周静帝大象十八年改今名按漢書地理志涿郡有逎縣别無道縣之名遼史盖誤又按方輿紀要淶水宋初省入易縣遼復置史文未詳謹附識薊州尚武軍上刺史秦漁陽右北平二郡地隋文帝開皇中徙治元州總管府煬帝改漁陽郡唐武徳元年廢入幽州開元十八年分置領縣三漁陽本漢縣屬漁陽郡晉省復置元魏省唐屬幽州開元十八年來屬三河本漢臨朐縣地唐開元四年析潞州置按前後漢書地理志上谷涿郡無臨朐縣新唐書地理志載武徳二年析潞縣置臨朐縣貞觀元年省開元四年更置三河縣當以新唐書為是謹附識玉田本漢無終縣唐萬嵗通天元年更名屬幽州開元八年屬營州十八年來屬景州清安軍下刺史本薊州遵化縣重熙中置領縣一遵化本唐平州買馬監為縣來屬平州遼興軍上節度秦為遼西右北平二郡地漢因之隋文帝開皇中改平州大業初復為郡唐武徳初改州天寳元年仍北平郡後唐復為平州遼太祖天贊二年取之以定州俘户錯置其地領州二縣三盧龍本春秋肥如國漢晉屬遼西郡元魏為郡治兼立平州北齊屬北平郡隋開皇中省肥如入新昌十八年改今名安喜本漢令支縣地乆廢遼太祖以定州安喜縣俘户置望都本漢海陽縣乆廢遼太祖以定州望都縣俘户置灤州永安軍中刺史本古黄洛城秦為右北平漢為石城縣後名海陽縣晉以後屬遼西石晉割地在平州之境遼太祖以俘户置州領縣三義豐本黄洛故城漢屬遼西郡乆廢唐季入契丹世宗置縣馬城本盧龍縣地唐開元二十八年析置縣以通水運遼來屬石城漢置屬右北平郡乆廢唐貞觀中於此置臨渝縣萬嵗通天元年改名營州鄰海軍下刺史本秦遼西郡地漢為昌黎郡元魏立營州後周為高寳寧所據隋開皇置州大業改遼西郡唐武徳元年復為營州萬嵗通天元年始入契丹聖厯二年僑治漁陽開元五年還治栁城天寳元年改曰栁城郡後唐復為營州遼太祖以居定州俘户領縣一廣寧漢栁城縣屬遼西郡萬嵗通天元年入契丹中宗神龍元年移幽州界開元四年復舊遼改今名西京道西京大同府戰國屬趙武靈王始置雲中郡秦屬代王國後為平城縣魏屬新興郡晉仍屬雁門劉琨表封猗盧為代王都平城元魏道武於此遂建都邑孝文帝改為司州牧置代尹遷都洛邑改萬年又置恒州高齊文宣帝廢州為恒安鎮尋復恒州周復恒安鎮改朔州隋仍為鎮唐武徳四年置北恒州七年廢貞觀十四年移雲中定襄縣於此永淳元年摩多為民患移民朔州開元十八年置雲中州天寳元年改雲中郡乾元元年曰雲州五代後唐同光三年以雲州為大同軍節度使石晉代唐以契丹有援立功割山前代北地為賂初仍為大同軍節度重熙十三年升為西京府曰大同領州二縣七大同本大同川地重熙十七年西夏犯邊析雲中縣置雲中趙置沿革與京府同天成本極塞之地魏道武帝置廣牧縣唐武徳五年置定襄縣遼析雲中置長青本白登臺地遼始置縣奉義本漢陶林縣地遼析雲中置懷仁本漢沙南縣元魏廢隋開皇二年移雲内於此大業二年置大利縣屬雲州改屬定襄郡隋末陷突厥遼改今名案金史地理志載遼析雲中置與此異謹附識懷安本漢夷輿縣地厯魏至隋為突厥所據唐克頡利縣遂廢為懷荒鎮高勲鎮燕奏分歸化州文徳縣置初隸奉聖州後來屬𢎞州博寧軍下刺史東魏静帝置北靈丘縣唐初陷突厥開元中置横野軍安邊縣天寳亂廢後為襄隂村遼統和中以寰州近邊為宋將潘美所破廢之乃於此置𢎞州初軍曰永寜領縣二永寧順聖本魏安塞軍五代兵廢高勲鎮幽州奏景宗分永興縣置初𨽻奉聖州後來屬徳州下刺史唐㑹昌中以西徳店置州遼開泰八年以漢户復置領縣一宣徳本漢桐過縣地屬雲中郡後𨽻定襄郡漢末廢高齊置紫阿鎮唐㑹昌中置縣按金史地理志反山西通志並云徳州昭聖軍遼史不載軍名謹附識豐州天徳軍節度秦為上郡北境漢屬五原郡自晉懷帝永嘉之亂屬赫連勃勃後周置永豐鎮隋開皇中升為縣改豐州大業七年為五原郡恭帝義寧元年改歸順郡唐武徳元年為豐州總管府六年省貞觀四年分靈州境置豐州都督府領蕃户天寳初改九原郡乾元元年復豐州後入囘鶻㑹昌中克之後唐改天徳軍遼神冊五年攻下更名應天軍復為州兵事屬西南面招討司領縣二富民本漢臨戎縣遼改今名振武本漢定襄郡盛樂縣元魏嘗都於此唐武徳四年克突厥建雲中都督府高宗麟徳三年改單于大都督府聖厯元年又改安北都督開元七年割𨽻東受降城八年置振武軍節度使㑹昌五年為安北都䕶府後唐莊宗以兄嗣本為振武節度使遼神冊元年伐吐渾還攻之盡俘其民以東唯存鄉兵三百人防戍後更為縣雲内州開逺軍下節度本中受降城地遼初置代北雲朔招討司改雲内州道宗清寧初升兵事屬西南面招討司按方輿紀要及續輿地考等書並云遼置開逺軍清寧初改雲内州謹附識領縣二柔服寧人天徳軍本中受降城唐開元中廢横塞軍置天安軍於大同川乾元年改天徳軍遼太祖破天徳盡掠吏民以東後置招討司漸成井邑乃以國族為天徳軍節度使寧邊州鎮西軍下刺史本唐隆鎮遼置兵事屬西南面招討司奉聖州武定軍上節度本唐新州後唐置團練使總山後八軍莊宗同光二年升威塞軍石晉割獻遼太宗改升兵事屬西京都部署司領州三縣四永興本漢涿鹿縣地礬山本漢軍都縣龍門望雲本望雲川地景宗於此建潜邸後置縣𨽻彰愍宫歸化州雄武軍上刺史本漢下洛縣元魏改文徳縣唐升武州僖宗改毅州後唐太祖復武州明宗又為毅州潞王仍為武州石晉割獻遼改今名領縣一文徳本漢女祁縣地元魏置縣汗州清平軍下刺史本漢潘縣元魏置北齊置北燕郡改懷戎縣隋廢郡屬涿郡唐武徳中復置北燕州縣仍舊貞觀八年改媯州五代時奚王去諸以數千帳次媯州自别為西奚號汗州遼因之領縣一懷來本懷戎縣太祖改儒州縉陽軍中刺史唐置後唐同光二年𨽻新州遼太宗改奉聖州仍屬領縣一縉山本漢廣寗縣地唐天寳中割媯州縣置蔚州忠順軍上節度本代郡周宣帝始置蔚州隋開皇中廢唐武徳四年復置至徳二年改興唐縣乾元元年仍舊石晉獻地升忠順軍後更武安軍統和四年入宋尋復之降刺史𨽻奉聖州升觀察復忠順軍節度兵事屬西京都部署司領縣五靈仙唐置興唐縣梁改隆化縣後唐同光初復置晉改今名定安本漢東安陽縣地乆廢遼置今縣飛狐後周大象二年置廣昌縣於五龍城隋仁夀元年改今名靈丘漢置後漢省東魏復置屬靈丘郡隋開皇中罷郡來屬大業初改𨽻代州唐武徳六年仍舊廣陵本漢延陵縣隋唐為鎮州後唐同光初分興唐縣置石晉割屬遼按金史地理志廣靈亦作陵遼統和三年析靈山置與遼志異謹附識應州彰國軍上節度唐武徳中置金城縣後改應州後唐明宗州人也天成元年升彰國軍節度興唐軍寰州𨽻焉遼因之兵事屬西京都部署司領縣三金城本漢隂館縣漢末廢為隂館城大業末陷突厥唐始置金城縣渾源唐置河隂本漢隂館縣地初𨽻朔州遼清寧中來屬朔州順義軍下節度本漢馬邑縣地元魏始置朔州葛榮亂廢高齊天保六年復置周武帝置朔州總管府隋大業三年改馬邑郡唐武徳四年復朔州遼升順義軍節度兵事屬西京都部署司領州一縣三鄯陽本漢定襄縣地獻帝建安中置新興郡元魏置桑乾郡高齊置招逺縣郡仍舊隋開皇三年罷郡來𨽻大業元年改今名寧逺齊天保六年於朔州西置招逺縣唐乾元元年改今名馬邑漢置屬雁門郡唐開元五年析鄯陽縣東三十里置大同軍倚郭置今縣武州宣威軍下刺史趙惠王置武川塞魏置神武縣唐末置武州後改毅州遼重熙九年復為武州號宣威軍領縣一神武魏置晉改新城初𨽻朔州後置州併寧逺為一縣來屬東勝州武興軍下刺史隋開皇七年置勝州大業五年改榆林郡唐貞觀五年於南河地置决勝州故謂此為東勝州天寳七年又為榆林郡乾元元年復為勝州遼神冊元年破振武軍勝州之民皆趨河東州廢石晉割代北來獻復置兵事屬西南面招討司領縣二榆林河濵金肅州重熙十二年伐西夏置割燕民三百户防秋兵一千實之屬西南面招討司河清軍西夏歸遼開直路以趨上京重熙十二年建城號河清軍徙民五百户防秋兵一千人實之屬西南面招討司欽定續通典卷一百三十
