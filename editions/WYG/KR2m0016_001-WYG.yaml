body:
  text: 食貨臣等謹案杜佑作食貨典以糓為人之所仰地為糓之所生人為君之所治三者相資於政尤切故其述田制水利屯田所以經地鄉黨版籍户口所以料人而賦稅錢幣市𣙜諸條則皆所以治糓也第歴朝制度互有詳略通典文字簡質不拘尺幅其所叙述自隋以前率舉其大要而於唐制加詳又其意嘗欲推而行之卓然近於可用故其序次之間凡詔令章疏有詞㫖開明敷陳婉切者具見採録而一時通達治體曉暢時事學士大夫居恒論著之文亦間掇其要可謂勤已今悉凖其例以所引開元令天下之田五尺為步二百有四十步為畝百畝為頃凡給田之制有差按舊唐書食貨志武德七年已有此令載在六典者為㫁其自肅宗代宗而後至於明季輙以次纂輯又杜典分注三代以上文出經傳者往往詮釋意者三代以下文有繁複未可遽刪則大書旁注意存互見亦勢然也兹於注文詮釋無多而旁推詳説分注於下葢宋元以來事繁於前而文顯於昔無取疏解云第一田制上第二田制中第三田制下第四水利田第五屯田上第六屯田下第七鄉黨版籍職役附第八賦稅上第九賦稅下第十户口丁中第十一錢幣上第十二錢幣中第十三錢幣下第十四漕運鹽鐵第十五𣙜酤醋稅附雜稅𣙜茶第十六平凖均輸互市平糶常平義倉社倉附田制上唐五代宋唐代宗廣德二年勅如有浮客願編附請射逃人物業者便准式據丁口給授如二年以上種植家業成者雖本主到不在却還限任别給授大厯元年制逃户復業給復二年如百姓先賣田業盡者委本州縣取逃死户田宅量丁口充給德宗貞元中陸贄言曰古者百畝地號一夫葢一夫受田不過百畝欲使人不廢業田無曠耕今富者萬畝貧者無容足之居依託强家為其私屬終嵗服勞常患不充有田之家坐食租稅京畿田畝稅五升而私家收租畝一石官取一私取十穡者安得足食宜為占條限裁租價損有餘優不足此安富恤窮之善經不可捨也穆宗長慶元年勅節文應諸道管内百姓或因水旱兵荒流離死絶見在桑産如無親承佃委本道觀察使於官健中取無莊田有人丁者據多少給付便與公驗任充永業不得令有力職掌人妄為請射其官健仍借種糧放三年租稅懿宗咸通十一年勅諸道州府百姓承佃逃亡田地如已經五年須准承前赦文便為佃主不在論理之限仍令所司准此處分先是宣宗大中中以逃户桑田被人代納毁折遂成閒田勅許校勘送縣任人佃納五年不復佃人為主至是復有是勅後唐明宗天成四年詔曰今年夏苗委人户自供手狀具頃畝多少仍以五家為保委無隐漏攢連手狀送于本州本州具帳送省州縣不得差人檢括如或人户隐欺許令保内陳告其田並令倍長興二年勅凡置營田比召浮客若取編户實紊常規如有係税之人宜令却還本縣應三京諸道營田祗耕佃無主荒田及召浮客此後若敢違越其官吏及投名稅户當行重㫁愍帝應順元年諸處籍沒田宅並屬户部除賜功臣外禁請射晉高祖天福二年以杜簉䇿言荒田一任百姓開種三年檢照所開種頃畝多少量納一半租稅勅曰闢彼汙萊期于富庶方當開創正切施行往日雖曾指揮漸恐廢墮當在申于勸誘期共樂于豐穰宜令逐處長吏遍下管内應是荒田有主者一任本主開耕無主者一任百姓請射佃蒔三年内並不在收稅之限三年六月金部郎中張鑄奏臣聞國家以務農是本勸課為先用廣田疇乃資倉廪竊見所在鄉村浮居人户方思懇闢正切耕耘種木未滿于十年樹糓未臻于三頃似成産業㣲有生涯便被縣司繫名定作鄉村色役懼其重斂畏以嚴刑遂捨所居却思他適覩兹阻隔何以舒蘇既􅆾撫卹之門徒有招携之令伏乞皇帝陛下明示州府特降條流應所在無主空閒荒地一任百姓開耕候及五頃以上三年外即許縣司量户科徭如未及五頃以上者不在騷擾之限則致荒榛漸少賦稅增多非唯下益蒸黎寔亦上資邦國從之周太祖廣順二年勅應諸處户部營田人户租稅課利除京兆府莊宅務贍軍國外其餘並割屬州縣所徵租稅課利官中祇管户部營田舊徵課額其户部營田職員一切停廢其客户元佃係省莊田桑土舍宇便令充為永業自立户名仍具元佃動用實數陳狀縣司給與凴由仍放下户三年差遣若不願立户名許召主卸佃不得有失元額租課其車牛動用屋舍樹木亦各宣賜是年九月勅京兆府耀州莊宅三白渠使所管莊宅宜並屬州縣鎮郭下店宅外應有係官桑土屋宇園林車牛動用並賜見佃人充本業如已有莊田自来被本務或形勢影占令出課利者並勒見佃人為主依例納租條理未盡委三司區分仍差尚書刑部員外郎曹匪躬專往㸃檢割屬州縣世宗顯德二年勅逃户莊田許人請射承佃供納租稅如三周年内本户來歸業者桑土不以荒熟并莊園交還一半其承佃户自出力葢造屋舍及栽種樹木園圃並不在交還之限如五周年後歸業者莊田除本户墳塋不在交付如有荒廢桑土承佃户自來無力佃蒔祇仰交割與歸業户佃蒔其近北諸州限畨人户來歸業者五周年内三分交還二分十周年内還一半十五周年内三分還一分此外不在交還之限五年七月上將均定天下民租均田之名始見漢書王嘉傳注孟康曰自公卿以下至于吏民名曰均田皆有頃數詔曰朕以寰宇雖安烝民未泰當乙夜觀書之際校前賢阜俗之方近賢元􅍬長慶集見在同州時所上均田表較當時之利病曲盡其情俾一境之生靈咸受其賜傳于方册可得搜尋因令製素成圖直書其事庶公卿觀覽觸目警心利國便民無亂條制背經合道盡繫變通但要適宜所冀濟務繫乃勛舊共庇黎元今賜元􅍬所奏均田及圖一面至可領也十月賜諸道均田詔曰朕以干戈既弭言念地征罕臻藝極須議並行均定所議冀永適重輕卿受任方隅深窮治本必能副寡昧平分之意察鄉閭致弊之源明示條章用分寄任竚令集事允屬推公今差使臣往彼檢括餘從别勅乃命左散騎常侍艾頴等三十四人于諸州檢定民租宋太祖建隆二年遣使度民田課民種樹每縣定民籍為五等第一等種雜樹百每等減二十為差桑棗半之男女十嵗以上種韭一畦闊一步長十步乏井者鄰伍共鑿之令佐春秋巡視書其數秩滿第其課為殿最諸州各隨風土所宜其不宜種藝者不須責課遇豐嵗則諭民謹葢藏節費用以備不虞民伐桑棗為薪者罪之剥桑三工以上為首者死從者流三千里不滿三工者為首配役從者徒三年太宗端拱二年詔興置方田命知定州張永德等各兼方田都總管詔諭邊將令縁邊作方田量地里逺近列置寨栅以為戰守之備至道元年詔曰近嵗以來天災相繼民多轉徙田卒汙萊招誘雖勤逋逃未復宜申勸課之㫖更示蠲復之恩應州縣曠土並許民佃為永業仍蠲三嵗租三嵗外輸二分之一州縣官吏勸民墾田之數悉書于印紙以俟旌賞二年陳靖言逃民復業及浮客請佃者委農官勘驗以給授田土收附版籍州縣未得議其差役其田制為三品以膏沃而無水旱之患者為上品雖沃壤而有水旱之患埆瘠而無水旱之慮者為中品既埆瘠復患于水旱者為下品上田人授百畝中田百五十畝下田二百畆並五年後收其租亦只計百畝十收其三一家有三丁者請加受田如丁數五丁者從三丁之制七丁者給五丁十丁給七丁至二十三十丁者以十丁為限若寛鄉田多即委農官裁奪以賦之其室廬蔬韭及梨棗榆桞種藝之地每户十丁者給百五十畝七丁者百畝五丁者七十畝三丁者五十畝不及三丁者三十畝除桑功五年後計其租除悉蠲其課詔以靖為京西勸農使按行陳許蔡潁襄鄧唐汝等州勸農墾田以皇甫選何亮副之選亮言功難成願罷之事遂寢竇儼曰小畝步百周之制也中畝二百四十漢之制也大畝三百六十齊之制也今所用者漢之中畝真宗咸平中令閣館檢校故事申定職田之制以官莊及逺年逃亡田充悉免租稅佃户以浮客充所得課租均分如鄉原例州縣長吏給十之五自餘差給其兩京大藩府四十頃次藩鎮三十五頃防禦團練州三十頃中上刺史州二十頃下州及軍監十五頃邊逺小州上縣十頃中縣八頃下縣七頃轉運使副十頃兵馬都監押砦主釐務官録事參軍判司等比通判幕職之數而均給之二年詔請佃荒田未定賦稅無田稅者方許請射係官荒土及逺年落業荒田候及五年官中依前勅于十分内定稅二分為永額如見在莊田土窄願于側近請射及舊有莊産後來逃移已被别人請佃礙勅無路歸業者亦許請射六年静戎軍王能言于軍城東新河之北開方田廣袤相去皆五尺深七尺以限隔戎馬仍以地圖來上帝以圖示宰臣李沆等對曰縁邊所開方田專委邊臣可以為備乞與施行威虜順安軍亦宜興置從之先是三年知雄州何承矩言兵有三陣日月風雲天陣也山陵泉水地陣也兵車士卒人陣也今用地陣設險以水泉作固相髙下建陂塘縱有敵騎何懼奔衝自後河北塘治相循不廢仍領于沿邊屯田司乾興元年是時仁宗已即位制衙前將吏各免户役者除見莊業外不得更與買田土如違將所典買没官其罷任前資官元無田者許置五頃為限又勅應以田産虚立契與買于形勢户下隐庇差役者命官使臣除名公人百姓決配又准臣僚奏命官所買莊田定以三十頃為限衙前將吏合免户役者定以十五頃為限所典買田只得于一州之内如祖父遷葬别有塋地者數外許更置墳地五頃時洺州肥鄉田賦不平郭諮攝令以千步方田法四出量括遂得其數除無地之租四百家正無租之地者百家收逋賦八十萬㑹三司議均稅法知諫院歐陽修言天下不知均括之術惟諮方田法簡而易行詔諮與孫琳均蔡州與上蔡稅三司議均田租諮陳均括之法十條仁宗天聖初詔民流積十年者其田聴人耕三年而後收賦減舊額之半後又詔流民能自復者賦亦如之既而又與流民期百司復業蠲賦役五年減舊賦十之八期盡不至聽他人得耕明道二年劉平奏自邊吴淀望長城口東西不及五十里請引水植稻以開方田四面穿溝屈曲為徑路纔令通步兵引曹鮑徐河及鷄距泉分注溝中數載之後必有成績從之始置弓箭手斥塞上弃地人角力勝者給田二頃一百人以上團為一指揮即要害處為築堡使自塹其地為方田以環之塞上諸塹率以大五尺為深廣之限山險不塹者但治使峭絶而已後皆以為法時曹韋知鎮戎軍請自隴山而東循古長城鑿塹為限弓箭手給閒田蠲其稅春秋耕歛出兵䕶之慶厯中詔限職田有司始申定其數凡大藩長吏三十頃通判八頃判官五頃幕職官四頃凡節鎮長吏十五頃通判七頃判官四頃幕職官三頃五十畝凡防團以下州軍長吏十頃通判六頃判官三頃五十畝幕職官三頃其餘軍監長吏七頃判官幕官並同防團以下州軍凡縣令萬户以上六頃五千户以上五頃不滿五千户並四頃凡簿尉萬户以上三頃五千户以上二頃五十畝不滿五千户二頃録事叅軍比本判官曹官比倚郭簿尉發運制置轉運使副武臣總管比節鎮長吏發運制置判官比大藩府通判安撫都監路分都監比節鎮通判大藩府都監比本府判官黄汴河許汝石塘河都大催綱比節鎮判官節鎮以下至軍監諸路走馬承受并砦主都同巡檢提舉捉賊提㸃馬監都大巡河不得過節鎮判官在州監當及催綱撥發巡捉私茶鹽賊盜駐泊捉賊不得過簿尉皇祐中帝聞天下廢田尚多民罕土著或棄田流徙為閒民每下赦令輙以招輯流亡募人耕墾為言民被災而流者又優其蠲復緩其期招之詔諸州長吏令佐能勸民修陂池溝洫之久廢者及墾闢荒田增税二十萬以上議賞監司能督責部吏經畫賞亦如之神宗熙寧間復詔詳定職田凡知大藩府二十頃節領十五頃餘州及軍並十頃餘小軍監七頃通判藩府八頃節鎮七頃餘州六頃留守節度觀察判官藩府五頃節鎮四頃掌書記以下幕職官三頃五十畆防禦團練軍事推官軍監判官三頃令丞簿尉萬户以上縣令六頃丞四頃不滿萬户令五頃丞三頃不滿五千户令四頃丞二頃五十畆簿尉減令之半藩府節鎮録叅視本州判官餘視幕職官藩府節鎮曹官視萬户縣簿尉餘視不滿户者發運轉運使副視節鎮知州開封府尉提㸃視餘州發運轉運判官常平倉司提舉官視藩府通判同提舉視萬户縣令發運司幹當公事視節鎮通判轉運司管幹文字提刑司檢法官提舉常平倉司幹當公事視不滿萬户縣令蔡河許汝石塘河都大催綱管幹機宜文字府界提㸃司幹當公事視節鎮判官總管視節鎮知州路分鈐轄視餘州知州安撫路分都監州鈐轄視節鎮通判藩府都監視本州判官諸路正將視分都監副將視藩府都監走馬承受諸州都監都同巡都大巡河並視節鎮判官巡檢堡砦都監砦主在州監當及催綱撥發巡捉私茶鹽賊盜駐泊捉賊並視幕職官巡轄馬遞舖監堰并縣鎮砦監當並視本縣簿尉諸路州學教授京朝視本州判官選人視本州曹官又詔成都府路提㸃刑獄司以本路職田令逐州軍嵗以子利稻麥等拘斛變錢從本司以一路所收錢數又紐而為斛斗價直然後等第均給自熙寧三年始五年帝患田賦不均重修定方田法詔司農以均税條約并式頒之天下以東西南北各千步當四十一頃六十六畆一百六十步為一方嵗以九月縣以令佐分地計量隨陂原平澤而定其地因赤淤黑壚而辨其色方量畢以地及色參定肥瘠而分五等以定税若瘠鹵不毛及衆所食利山林陂塘溝路墳墓皆不立税凡田方之角立土為峰植其野之所宜木以封表之有方帳有莊帳有甲帖有户帖其分煙析産典賣割移官給契縣置簿皆以今所方之田為正令既具乃以濟州鉅野尉王曼為指教官先自京東路行之諸路倣焉六年詔土色分五等疑未盡下郡縣物其土宜多為等以期均當勿拘以五七年詔從鄧潤甫之請京東十七州選官四員各主其方分行郡縣各以三年為任又詔每方差大甲頭二人小甲頭三人同集方户令各認步畆方田官驗地色更勒甲頭方户同定諸路及開封府界秋田災傷三分以上縣權罷外餘候農隙河北西路提舉司乞通一縣災傷不及一分勿罷元豐五年開封府言方田取税之最不均縣先行即一州而定五縣嵗不過兩縣今府界十九縣准此行之十年乃定請嵗方五縣從之其後嵗稔農隙乃行而縣多山林者或行或否八年帝知官吏擾民詔罷之天下之田已方而見于籍者至是二百四十八萬四千三百四十九頃先是熙寧五年詔開方田至是遂罷哲宗時畢仲游言曰有人則有田有田則有分田有瘠薄人有衆寡以人耕田相其瘠薄衆寡而分之謂之分分定而以名自占之謂之名田無甚難行者而至今不行則其制未均而恤之太甚故也葢周井田之法一夫一婦受田百畆餘夫二十五畆以至工商士人受田亦各有等而又分之不易一易再易之差以一夫一婦而受百畆無主客之别比今二百畆矣以不易一易再易之相掩而又有餘夫則比今三百畆矣什一而征無他賦斂而又嵗用其力不過三日則比今四百畆矣而何武之制自諸侯王及于吏民皆無過三十頃以一諸侯王而財七八農夫此所謂制未均者也名田之議起于董仲舒申于何武師丹至晉泰始限王公之田以品為差而均田之制起于後魏至唐開元亦嘗立法而卒皆不行夫名田之不行非下之人不行也乃上之人不行也非賤者而不行乃貴者而不行也在上而貴者戴高位食厚禄官其子孫而賞賜狎至雖田制未均猶當行也而何師之議則革于丁傅董賢晉魏有存則名存而實去此則所謂恤之太甚者也今將議占田之數酌復除之法則周官之書漢魏隋唐之制有可行者有不可行者董仲舒以秦變井田民得買賣富者連阡陌貧者無置錐之地宜少近古限民名田以贍不足塞兼并之路其説雖正而不聞其制度何武之制太狹今日之制大無限宜約周官授田之數與唐世業口分之法參其多少而用之士大夫則因其品秩之高下與其族類之衆寡無使貴者有餘而貧者不足要之仰足以事父母俯足以畜妻子旁可以及兄弟朋友而不為兼并則善矣昔周官小司徒辨征役之施舍卿大夫國中貴者賢者能者服公事者老者疾者皆舍征秦民耕織致粟帛多與漢之孝弟力田皆復其身而丞相之子返與戌邊為踐更卒則今日之復除亦可因而為法九品者復其身七品者復其子孫五品以上乃復其家而戍邊之制可易以助今齊民之役雖丞相子必使出泉以助之則下貧之室不困于重煩而在上貴者亦不純于僥倖然田制之未均可以均也非今日之患也迫于富家大室而恤之甚者則自漢以來未有以處之今日之患也夫事稽之于古而不合驗之于今而未見其利害測之于人情未得其中若是者誠難行也今占田之數復除之法稽之于古無不合驗之于今已見其利害測之于人情得其中加之無丁傅董賢之用事而今日之議過于何武師丹則無以富家大室為難而行之天下幸甚徽宗崇寧三年宰臣蔡京等言自開阡陌使民得以田私相貿易富者恃其有餘厚立價以規利貧者迫于不足薄移税以速售而天下之賦調不平久矣神宗講究方田利害作法而推行之方為之帳而步畆高下丈尺不可隐户給之帖而升合尺寸無所遺以賣買則民不能容其巧以推收則吏不能措其姦今文籍具在可舉而行詔諸路提舉常平官選官習熟其法諭州縣官吏各以豐稔日推行自京西北兩路始政和中品官限田一品百頃以差降殺至九品為十頃限外之數並同編户差科三年河北西路提舉常平司奏所在地色極多不下百數及至均税不過十等雖出十分之税地土肥沃尚以為輕第十等只均一分多是瘠鹵出税雖少猶以為重若不入等則積多而至一頃止以柴蒿之值為錢自一百而至五百比次十等全不受税既收入等但可耕之地便有一分之税其間下色之地與柴蒿之地不相逺乃一例每畆均税一分上輕下重欲乞土色十等如故外即十等之地再分上中下三等折畆均數謂如第十等地每十畆合折第一等一畆折十等之上受税十一不改元則十等之中數及十五畆一等之下數及二十畆方比上等受一畆之税庶幾上下輕重皆均詔諸路既行其法五年福建利路茶户山園如鹽田例兌方量均税七年詔内外宫觀捨置田在京不得過五十頃在外不得過三十頃不免科差徭役支移雖奉御筆許執奏不行宣和元年臣僚言方量官憚於䟦履並不躬親行繵拍峰驗定土色一付之胥吏至御史臺受訴有二百餘畆方為二十畆者有二頃九十六畆方為一十七畆者䖍之瑞金縣是也有租税十有三錢而增至二貫二百者有租税二十七錢則増至一貫四百五十者䖍之㑹昌縣是也望詔常平使者檢察二年遂詔罷之民因方量流徙者守令招誘歸業荒閒田土召人請佃自今諸司毋得起請方田諸路已方量者賦税不以有無訴論悉如舊額輸納民逃移歸業已前逋欠税租並與除放按方田之制自崇寧三年蔡京請開五年詔罷大觀二年復詔行之四年罷其賦税依未方舊則至是遂不復行北宋田制自太祖開寶末天下墾田二百九十五萬三千三百二十頃太宗至道二年墾田三百一十二萬五千二百五十一頃景德中丁謂著㑹計録云總得一百八十六萬餘頃以是嵗七百二十三萬餘户計之是四户耕田一頃繇是而知天下隐田多矣又川陜廣南之田頃畝不備第以五賦約之至天聖中國史則云開寶末墾田二百九十五萬三千三百二十頃至道二年三百一十二萬五千二百五十一頃天禧五年五百二十四萬七千五百八十四頃而開寶之數乃倍于景德則謂之所録固未得其實皇祐治平三司皆有㑹計録而皇祐中墾田二百二十八萬餘頃治平中四百四十萬餘頃其間相去不及二十年而墾田之數增倍以治平數視天禧則猶不及而叙治平録者以謂此特計其賦租以知頃畆之數而賦租所不加者十居其七率而計之則天下墾田無慮三千餘萬頃是時累朝相承重於擾民未嘗窮按故莫得其實而廢田見於籍者猶四十八萬頃欽定續通典卷一
