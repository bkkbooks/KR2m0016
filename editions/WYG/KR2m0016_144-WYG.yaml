body:
  text: 州郡明湖廣浙江湖廣元置湖廣等處行中書省治武昌路又分置湖南道宣慰司治天臨路屬焉又以襄陽等三路屬河南江北等處行中書省又分置荆湖北道宣慰司治中興路并屬焉明太祖甲辰年二月平陳理置湖廣等處行中書省洪武三年十二月置武昌都衛與行中書省同治八年十月改都衛為湖廣都指揮使司九年六月改行中書省為承宣布政使司領府十五直𨽻州二屬州十七縣一百有八宣慰司二宣撫司四安撫司五長官司二十一蠻夷長官司五武昌府元武昌路屬湖廣行省明太祖甲辰年二月為府領州一縣九江夏倚武昌嘉魚蒲圻咸寧崇陽通城興國州元興國路屬湖廣行省明太祖甲辰年二月為府洪武九年四月降為州以州治永興縣省入來屬領縣二大冶通山漢陽府元屬湖廣行省明洪武九年四月降為州屬武昌府十三年五月復為府屬湖廣布政司尋屬河南二十四年六月還屬湖廣領縣二漢陽倚明洪武九年四月省十三年五月復置漢川元屬漢陽路明洪武九年四月改屬武昌府十三年五月還屬黄州府元黄州路屬河南江北行省明太祖甲辰年為府屬湖廣行省九年屬湖廣布政司尋改屬河南二十四年六月還屬湖廣領州一縣八黄岡倚麻城黄陂黄安嘉靖四十二年以麻城縣之姜家畈置析黄岡黄陂二縣地益之蘄水元屬蘄州路明洪武九年四月屬蘄州十一年十月改屬府羅田元屬蘄州路明洪武九年四月屬蘄州十一年十月改屬府蘄州元蘄州路屬河南江北行省明太祖甲辰年為府九年四月降為州以州治蘄春縣省入來屬領縣二廣濟黄梅承天府元安陸府屬荆湖北道宣慰司明太祖乙巳年屬湖廣行省洪武九年四月降為州直𨽻湖廣布政司二十四年六月改屬河南未幾還屬嘉靖十年升州為承天府十八年建興都留守司於此領州二縣五鍾祥倚元曰長夀縣元末廢明洪武三年復置九年四月省入州嘉靖十年八月復置更名北有松林山興獻王陵寢在焉嘉靖十年賜名純徳山置顯陵縣明末縣廢京山潛江元屬中興路明洪武十年八月來屬荆門州元治長林縣屬荆湖北道宣慰司明洪武九年四月改為縣省長林縣入焉屬荆州府十三年五月復為州仍屬荆州府嘉靖十年八月來屬領縣一當陽元屬荆門州明洪武九年改屬荆州府十年五月省入荆門縣十三年五月復置仍屬州沔陽州元沔陽府屬荆湖北道宣慰司明洪武九年四月降為州以州治玉沙縣省入直𨽻湖廣布政司尋直𨽻河南二十四年六月還直𨽻湖廣嘉靖十年十二月來屬領縣一景陵徳安府元屬荆湖北道宣慰司明洪武元年十月屬湖廣行省九年四月降為州屬黄州府十一月屬武昌府十三年五月復為府屬湖廣布政司二十四年六月改屬河南未幾還屬領州一縣五安陸倚明洪武初縣省十三年五月復置雲夢應城明洪武九年四月屬黄州府十年五月省入雲夢縣十三年五月復置孝感明洪武九年四月屬黄州府十年五月省入徳安州十三年五月復置隨州明洪武二年正月以州治隨縣省入九年四月降為縣屬黄州府十年五月省入應山縣十三年五月復升為州領縣一應山明洪武初省十三年五月復置岳州府元岳州路屬湖廣行省明太祖甲辰年為府洪武九年四月降為州直𨽻布政司十四年正月復為府領州一縣七巴陵倚明洪武九年四月省十四年復置臨湘華容平江元平江州明洪武三年降為縣澧州元澧州路屬湖廣行省明太祖甲辰年為府九年四月降為州以州治澧陽縣省入屬常徳府三十年三月來屬領縣三安鄉石門慈利元慈利州明洪武二年降為縣荆州府元中興路屬荆湖北道宣慰司明太祖甲辰年九月改為荆州府屬湖廣行省吳元年十月置湖廣分省於此尋罷九年屬湖廣布政司尋改屬河南二十四年還屬領州二縣十一江陵倚公安石首監利松滋枝江明洪武十年五月省入松滋縣十三年五月復置夷陵州元峽州路屬荆湖北道宣慰司明太祖甲辰年為府九月降為州直𨽻湖廣行省九年四月改州名夷陵以州治夷陵縣省入來屬領縣三長陽宜都逺安歸州元治秭歸縣直𨽻湖廣行省明洪武九年四月廢州入秭歸縣屬夷陵州十年二月改縣名長寧十三年五月復改縣為歸州領縣二興山明洪武九年改屬夷陵州後還屬正統九年三月省入州𢎞治三年五月復置巴東元屬歸州明洪武九年改屬夷陵州隆慶四年還屬襄陽府元襄陽路屬河南江北行省明太祖甲辰年為府屬湖廣行省九年屬湖廣布政司二十四年六月改屬河南未幾還屬湖廣領州一縣六襄陽倚宜城南漳棗陽明洪武十年五月省入宜城縣後復置榖城光化明洪武十年省入榖城縣十三年五月復置均州明洪武二年七月以州治武當縣省入鄖陽府成化十二年十二月置領縣七又置湖廣行都指揮使司於此鄖倚舊屬均州成化十二年置鄖陽府治此房元房州屬襄陽路明洪武十年五月以州治房陵縣省入又降州為縣仍屬襄陽府成化十二年十二月來屬竹山元屬房州明洪武十年五月省入房縣十三年五月復置屬襄陽府成化十二年十二月來屬竹谿本竹山縣之尹店巡檢司成化十二年十二月改置縣上津明洪武初置屬襄陽府十年五月省入鄖陽十三年五月復置仍屬襄陽府成化十二年十二月來屬鄖西成化十二年十二月以鄖縣之南門堡置保康𢎞治十年十一月以房縣之潭頭坪置長沙府元天臨路屬湖南道宣慰司明太祖甲辰年為潭州府洪武五年六月更名長沙領州一縣十一長沙倚善化倚明洪武十年五月省入長沙縣十三年五月復置湘隂元湘隂州明洪武初降為縣湘潭元湘潭州明洪武三年三月降為縣瀏陽元瀏陽州明洪武二年降為縣醴陵元醴陵州明洪武二年降為縣寧鄉益陽元益陽州明洪武初降為縣湘鄉元湘鄉州明太祖甲辰年降為縣攸元攸州明洪武三年三月降為縣安化茶陵州元直𨽻湖南道明太祖甲辰年降為縣成化十八年十月復為州常徳府元常徳路屬湖廣行省明太祖甲辰年為府領縣四武陵倚桃源元桃源州明洪武二年降為縣龍陽元龍陽州明洪武三年三月降為縣沅江元屬龍陽州明洪武三年州廢來屬十年五月省入龍陽縣十三年五月復置衡州府元衡州路屬湖南道宣慰司明太祖甲辰年為府領州一縣九衡陽倚東有新城縣元末置明洪武十年五月省衡山元屬天臨路明洪武間改屬耒陽元耒陽州直𨽻湖南道明洪武三年三月降為縣常寧元常寧州直𨽻湖南道明洪武三年三月降為縣安仁酃桂陽州元桂陽路治平陽縣屬湖南道宣慰司明洪武元年為府九年四月降為縣省平陽縣入焉十三年五月升為州領縣三臨武藍山舊屬郴州明洪武二年來屬嘉禾崇禎十二年以桂陽州之倉禾堡置析臨武縣地益之永州府元永州路屬湖南道宣慰司明洪武元年為府領州一縣七零陵倚祁陽東安道州元道州路屬湖南道宣慰司明洪武元年為府九年四月復降為州以州治營道縣省入來屬領縣四寧逺江華永明新田崇禎十二年以寧逺縣之新田堡置寳慶府元寳慶路屬湖南道宣慰司明洪武元年為府領州一縣四邵陽倚新化城步本武岡州之城步巡檢司𢎞治十七年改置縣析綏寧縣地益之武岡州元武岡路屬湖南道宣慰司明洪武元年為府九年四月降為州以州治武岡縣省入來屬領縣一新寧辰州府元辰州路屬湖廣行省明太祖甲辰年為府領州一縣六沅陵倚盧溪辰溪溆浦沅州元沅州路直𨽻湖廣行省明太祖甲辰年為府九年四月降為州以州治盧陽縣省入來屬領縣二黔陽麻陽郴州元郴州路屬湖南道宣慰司明洪武元年為府九年四月降為州以州治郴陽縣省入直𨽻布政司領縣五永興宜章興寧桂陽桂東靖州元靖州路直𨽻湖廣行省明太祖乙巳年七月為靖州軍民安撫司洪武元年降為州三年升為府九年四月復降為州以州治永平縣省入直𨽻布政司領縣四會同通道明洪武十年五月省入州十三年五月復置綏寧元屬武岡路明洪武元年屬武岡府三年來屬天柱本天柱守禦千户所明洪武二十五年五月置萬厯二十五年改為縣析綏寧㑹同二縣地益之崇禎十年東遷龍塘名龍塘縣後還舊治復故名施州衛軍民指揮使司元施州屬四川行省䕫州路明洪武初省十四年五月復置屬䕫州府六月兼置施州衛軍民指揮使司屬四川都司十二月屬湖廣都司後州廢存衛領所一宣撫司四安撫司九長官司十三蠻夷官司五大田軍民千户所明洪武二十三年閏四月以散毛宣撫司之大水田置施南宣撫司元施南道宣撫司明洪武四年十二月因之後廢十六年十二月復置屬施州衛二十七年後復廢永樂二年五月改置長官司屬大田軍民千户所四年三月升宣撫司仍屬衛領安撫司五東鄉五路安撫司元東鄉五路軍民府明洪武四年十二月改置長官司後升安撫司領長官司三蠻夷官司二搖把峒長官司元又把峒安撫司後廢明宣徳三年五月改置上愛茶峒長官司下愛茶峒長官司二長官司俱元容美洞地至大二年置懐徳府屬四川南道宣慰司至順二年正月升宣撫司至正中升軍民宣慰司明太祖甲辰年六月改軍民宣撫司後廢宣徳三年五月改置鎮逺蠻夷官司宣徳三年五月置隆奉蠻夷官司元隆奉宣撫司明洪武四年十二月改長官司後廢宣徳三年五月改置官司忠路安撫司明玉珍忠路宣撫司明洪武四年改安撫司二十三年廢永樂五年復置領長官司一劍南長官司宣徳三年五月置忠孝安撫司元置明洪武四年十二月改置長官司尋復故二十三年廢永樂五年復置金峒安撫司元置明洪武四年十二月改長官司永樂五年復故宣徳三年五月領蠻夷官司一隆慶五年正月降為峒長西坪蠻夷官司宣徳三年五月置中峒安撫司嘉靖初置散毛宣撫司元至元三十年四月置散毛洞蠻夷官三十一年五月升為府屬四川行省至正六年七月改散毛誓厓等處軍民宣慰司明玉珍改散毛宣慰使司都元帥明洪武七年五月改散毛沿邊宣慰司屬四川重慶衛二十三年廢永樂二年五月置散毛長官司屬大田軍民千户所四年三月升宣撫司屬施州衛領安撫司二龍潭安撫司元龍潭宣撫司明玉珍改長官司明洪武八年十二月改龍潭安撫司屬四川重慶衛二十三年廢永樂四年四月復置來屬大旺安撫司明玉珍大旺宣撫司明洪武八年十二月因之屬四川永樂五年改置領蠻夷官司二東流蠻夷官司明洪武八年十二月置東流安撫司屬四川後廢宣徳三年五月改置來屬臈壁峒蠻夷官司宣徳三年五月置忠建宣撫司元忠建軍民都元帥府明玉珍因之明洪武五年正月改長官司六年升宣撫司二十七年四月改安撫司尋廢永樂四年復置宣撫司屬施州衛領安撫司二忠峒安撫司元湖南鎮邊宣慰司明玉珍改沿邊溪洞宣撫司明洪武五年正月改沿邊溪洞長官司後廢永樂四年改置髙羅安撫司元髙羅宣撫司明玉珍改安撫司明洪武六年廢永樂四年三月復置領長官司一思南長官司成化後置容美宣撫司元容美等處宣撫司屬四川行省明太祖丙午年二月因之吳元年正月改黄沙靖安麻寮等處軍民宣撫司明洪武五年二月改置長官司七年十一月升宣慰司後廢永樂四年復置宣撫司屬施州衛領長官司五盤順長官司元元統二年正月置盤順府至正十五年四月升軍民安撫司明洪武五年三月改為長官司椒山瑪瑙長官司五峯石寳長官司石梁下峒長官司水盡源通塔平長官司四長官司俱明洪武七年十一月置十四年廢永樂五年復置木冊長官司元木冊安