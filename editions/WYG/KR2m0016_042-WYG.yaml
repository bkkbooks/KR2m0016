body:
  text: 職官秩品三遼金遼官品臣等謹案遼太祖神册六年詔正班爵太宗兼制中國官分南北以國制治契丹以漢制治漢人其時採用唐制三省六部臺院寺監之官稍稍増置别之曰南面朝官今考遼史及契丹國志諸書皆未載其品秩員數或修遼史時已無可考故祗載某人曽為某官以實之兹不録金官品正一品太師太𫝊太保太尉司徒司空尚書令郡王爵國公爵從一品尚書省左右丞相尚書省平章政事都元帥樞宻使大宗正府判大宗正事泰和六年避睿宗諱改大宗正府為大睦親府改判大宗正事為判大睦親事宣撫司使開府儀同三司文散儀同三司特進崇進郡王爵國公爵正二品尚書左右丞左右副元帥司農司大司農太子太師太子太𫝊太子太保金紫光禄大夫文散銀青榮禄大夫郡公爵上柱國勲從二品尚書省參知政事翰林學士承㫖御史大夫樞宻副使同判大宗正事泰和六年改為同判大睦親事三司使光禄大夫文散榮禄大夫郡公爵柱國勲正三品吏部戸部禮部兵部刑部工部尚書元帥府左右監軍簽書樞宻院事同簽大宗正事泰和六年改為同簽大睦親事宣撫司副使勸農司使三司副使翰林學士殿前都㸃檢宣徽院左右宣徽使大興府尹諸京留守司留守監察採訪使上京東京等路設按察司并安撫司使職掌同諸總管府都總管諸府尹都轉運司使統軍司使招討司使太子少師太子少傅太子少保資徳大夫文散資政大夫資善大夫龍虎衛上將軍武散金吾衛上將軍驃騎衛上將軍郡侯爵上䕶軍勲從三品元帥府左右都監御史中丞翰林侍讀學士翰林侍講學士審官院知院太常寺卿殿前左右副都㸃檢秘書監武衛軍都指揮使司都指揮使衛尉司中衛尉太子詹事太后兩宫衛尉諸節鎮節度使諸部族節度使正奉大夫文散通奉大夫中奉大夫奉國上將軍武散輔國上將軍鎮國上將軍郡侯爵䕶軍勲正四品吏部戸部禮部兵部刑部工部侍郎同簽樞宻院事司農卿簽三司事同知宣徽院事國子監祭酒太府監少府監都水監左右諫議大夫大理寺卿親王府傅駙馬都尉同知留守司事按察司副使諸府同知統軍司副統軍提控諸烏爾古正議大夫文散通議大夫嘉議大夫昭武大將軍武散昭毅大將軍昭勇大將軍郡伯爵舊曰縣伯承安二年改上輕車都尉勲從四品大宗正府丞翰林直學士同知審官院事拱衛司都指揮使知集賢院諫院左右司諫武衛軍都指揮使司副都指揮使副都衛尉司副尉少詹事親王府府尉太后兩宫副衛尉大興府同知副留守同知都總管諸防禦州防禦使都轉運使同知招討司副使諸明安諸烏爾古使大中大夫文散中大夫少中大夫安逺大將軍武散定逺大將軍懐逺大將軍郡伯爵輕車都尉勲正五品尚書省左右司郎中勸農副使司農少卿同簽三司事翰林待制太常寺少卿諸陵署提㸃山陵司天臺提㸃宫籍監提㸃器物局提㸃尚廐局提㸃鷹坊提㸃同簽宣徽院事客省使引進使東西上閤門使四方館使尚衣局提㸃儀鸞局提㸃尚食局提㸃尚藥局提㸃太醫院提㸃教坊提㸃秘書少監國子監司業太子左右諭徳簽按察使事諸總管府副都總管諸同知節度使諸州刺史都轉運使副使諸鹽使司使漕運司提舉諸總管府節鎮兵馬司都指揮使大興府少尹諸府少尹提舉譏察使中議大夫文散中憲大夫中順大夫廣威將軍武散宣威將軍明威將軍縣子爵上騎都尉勲從五品吏部户部禮部兵部刑部工部郎中樞宻院經厯侍御史左右宿直將軍宫籍監器物局使尚廐局使尚輦局使鷹坊使武器署提㸃拱衛司副都指揮使尚衣局使儀鸞局使尚食局使尚藥局使太醫院使教坊使内藏庫使司天臺監太府監少監少府監少監軍器監大理寺少卿都水少監兼漕事𢎞文院知院知登聞鼓院知登聞檢院同知集賢院衛尉司左右常侍修内司使祗應司提㸃上林署提㸃提舉南京𣙜貨司提舉提舉倉場司使太子左右衛率府親王府長史觀察使副使大興府總管判官府判留守判官都總管判官諸節鎮節度副使諸部族節度副使南京提控規運柴炭使提舉譏察副使提舉秦藍兩闗提舉㳂淮譏察使統軍司判官諸穆昆諸糺詳衮朝請大夫文散朝散大夫朝列大夫信武將軍武散顯武將軍宣武將軍縣男爵騎都尉勲正六品尚書省員外郎司農丞太常寺丞拱衛司鈐轄閤門副使秘書監丞都水監少監大理寺正同知登聞鼓院事同知登聞檢院武衛軍都指揮使司鈐轄太子左右監門僕正左右賛善同知防禦使事諸京警廵院使鹽使司副使漕運司同提舉諸總管府節鎮兵馬副都指揮使南京提控規運柴炭副使提舉秦藍兩闗同提舉提舉三門集津南北岸奉政大夫文散奉議大夫武節將軍武散武徳將軍驍騎尉勲從六品吏部戸部禮部兵部刑部工部員外郎治書侍御史三司判官翰林修撰太廟署令郊社署令武成王廟署令諸陵署令大樂署令宫籍監副監殿前都㸃檢判官器物局副使尚廐局副使尚輦局副使鷹坊副使武庫署令武器署令宣徽判官客省副使引進副使閤門簽事尚衣局副使儀鸞局副使尚食局副使尚藥局副使太醫院副使教坊副使内藏庫副使宫苑司令尚醖署令典客署令侍儀司令著作郎司天臺少監國子監丞太府監丞左右藏庫使太倉使典給署令少府監丞尚方署令圖畫署令文繡署令裁造署令織染署令文思署令軍器監少監利器署令大理寺丞同知𢎞文院事𣙜貨務使平準務使惠民司令四方館副使法物庫使萬寧宫提舉司提舉修内司副使都城所提舉祗應司令甄官署令上林署令京東西南三路檢察司使提舉南京𣙜貨司同提舉提舉倉場司副使太子掌寳典儀親王府司馬提舉衛紹王家屬提舉大興府推官留守推官上京提舉皇城司提舉按察使判