揖遜升即冠者席前跪正巾興降西階二等執二梁冠者升授賔賓右手執項左手執前進冠者席前東向立祝曰載契爾龜載加爾服爾既順序毋曰欲速自天申之申以百福乃跪冠興復位贊冠者結紘冠者興賔揖冠者適房服二梁冠服出房南靣立賔主俱興賔揖冠者即席坐贊冠者跪脱二梁冠設笄賔降主人從降賔既盥揖遜升賔即冠者席前跪正中興降西階三等執平冕者升東靣授賔賔右手執項左手執前進冠者席前東向立祝曰授時之吉迎天之休抗以高明掖其進修三加彌尊百禄是遒乃跪冠興復位贊官者結紘冠者興賔揖冠者適房服平冕服出房南靣立賔主俱興執事者徹折上巾二梁冠席於房布席靣階上南靣設酒饌如常儀贊冠者以酒注於爵賔揖冠者即席南靣立賔受爵進席前北向立祝曰㫖酒既嘉載肴斯阜既曰克家亦維繼祖孝友慈祥受天之祜冠者席西拜受爵賔答拜贊冠者薦饌冠者即座飲食訖降席再拜賔答拜易服拜父父為起入拜母母為起賔降當西序東靣立主人降當東序西靣立冠者出立於西階東南靣賔少進字之曰卜筮云吉禮儀孔明爰字爾徳嘉爾有成字曰伯某甫仲叔季惟其所當冠者曰某雖不敏敢不祗奉賔出主人請禮從者賔辭主人固請賔乃就次如别儀冠者廟見及見諸父諸兄姑姊如常儀冠訖主人釋服改席揖賔及贊冠者即席衆賔皆興執事者奉幣酬賔會訖賔主俱興主人再拜賔答拜賔出主人送於門外司馬光曰古者二十而冠將責為人子為人弟為人臣為人少者之行於其人故其禮不可不重也近世人情輕薄生子猶飲乳已加巾帽有官者或為製公服而弄之過十嵗猶總角者鮮矣彼責以四者之行豈能知之故往往自㓜至長愚騃如一由不知成人之道也古者惟稱二十而冠然世俗之敝不可猝變若敦厚好古之君子俟其子年十五以上能通孝經論語粗知禮義然後冠之斯為美矣又家禮載嫡子三加皆祝而冠又祝而酌又祝而字庶子三加既加然後酌而祝之又祝而字其即席而冠也嫡子西南庶子南靣明太祖洪武元年定品官冠禮之制始加緇布冠再加進賢冠三加爵弁其儀前期擇日主者告於家廟乃筮賔前二日戒賔及贊冠者明日設次於大門外之右南向至日夙興設洗於阼階東南東西當東霤六品以下當東榮南北以堂深罍水在洗東加勺羃篚在洗西南肆實巾一於篚加羃設席於東房西牖下陳服於席東領北上莞筵四藻席四在南側尊甒醴在服北加勺羃設坫在尊北四品以下設篚無坫饌陳於坫北設洗於東房近北罍在洗西篚在洗東北肆實以巾質明賔贊至門外掌次者引之次賔贊公服諸行事者各服其服就位冠各一笥各一人執之侍於西階之西東靣北上設主席於阼階上西靣設賔席於西階東靣冠者席於主者東北西靣主者公服立於阼階下當序西靣諸親公服立於罍西東南西靣北上尊者在别室儐者公服立於門内道東北靣冠者雙童髻空頂幘雙玉導綵摺錦紳烏皮履六品以下導不以玉立於房中南靣主者贊冠者公服立於房内户東西靣賔及贊冠者出次立於門西東靣北上儐者進受命出立門東西靣曰敢請事賔曰某子有嘉禮命某執事儐者入告主者迎賔於大門外之東西靣再拜賔答拜主者揖贊冠者報揖又揖賔賔報揖主者入賔贊次入及内門至階主者請陞賔三辭乃陞主者自阼階立於席東西向賔自西階立於席西東向賔贊冠者及庭盥於洗陞自西階入於東房立於主贊冠者之南西靣主贊冠者導冠者立於房外之西南靣賔贊冠者取纚櫛簪跪奠於筵南端退立於席北少東西靣賓揖冠者冠者進升席西向坐賔贊冠者進筵前東靣跪脱雙童髻櫛畢設纚興復位立賔降至罍洗盥訖詣西階主者立於席後西靣賔立於西階上東靣執緇布冠者升賔降一等受之右執項左執前進冠者筵前東向立祝用士禮祝詞祝畢跪冠興復位賔贊冠者進筵前東靣跪結纓興復位冠者興賔揖之適房賔主皆坐冠者衣青衣素裳出户西南靣立賔俱興賔揖冠者冠者進升席西向坐賔贊冠者跪脱緇布冠櫛畢設纚賔進進賢冠立祝如初加禮祝畢跪冠興復位賔贊冠者跪設簪結纓興復位冠者適房易絳紗服出升席賔贊冠者跪脱進賢冠櫛畢設纚賔進爵弁立祝如再加禮賔贊冠者設簪結纓如前冠者適房著爵弁之服出主贊冠者徹纚櫛簪箱及筵入於房又設筵於室户西南向冠者出房户西南靣立主贊洗觶於房酌醴出南靣立賔揖冠者就筵西南靣立受醴進冠者筵前北靣立祝畢冠者拜受觶賔復西階上答拜執饌者進饌於筵冠者左執觶右執脯祭於籩豆間贊者取胏一以授冠者奠觶於薦西以祭冠者坐取觶祭醴奠觶再拜賔答拜冠者執觶興賔主俱坐冠者升筵跪奠觶於薦東興進北靣跪取脯降自西階入見母進奠脯於席前退再拜出母不在則使人受脯於西階下初冠者入見母賔主俱興賔降當西序東靣立主者降東序西靣立冠者出立於階東南靣賔少進西字之辭同士禮冠者再拜跪曰某不敏夙夜祗承賔出主者送於内門外西向請禮從者賔就次主者入初賔出冠者東靣見諸親諸親拜之冠者答拜冠者西向拜賔贊賔贊亦答拜見諸尊於别室亦如之賔主既釋服入醴席一獻訖賔與衆賔出次立於門東西靣主者出揖賔賔報揖主者先入賔及衆賔從之至階賔立於西階上主者立於東階上衆賔立西階下主者授幣篚於賔贊復位還阼階上北靣拜送賔贊降自西階主者送賔於大門外西靣再拜而入孤子則諸父諸兄戒賔冠之日主者紒而迎賔冠於阼階下其儀亦如之明日見廟冠者朝服入廟南門中庭道西北靣再拜出庶人冠宋明臣等謹按古冠禮之存者唯士禮後世皆推而用之故杜佑作禮典縁代厯叙所載甚詳獨無庶人冠禮至宋政和始定其制有明之初詔定冠禮自天子以至於庶人纎悉備具雖時俗鮮有行之者然載之禮官存為典故亦一代之制也爰列載於左宋庶人子冠儀將冠主人諏日擇賔告於禰為位於㕔事南靣主人北靣再拜乃告曰某子某年若干矣卜以某甲子冠吉乃速賔某以始卒冠事庶幾臨之謹告前期主人戒賔曰某日將冠於子某首願吾子莅之賔許諾其日夙興張帷為房於㕔事之東陳服其中東領北上酒饌在服北帽一折上巾一陳於西階之西為賔主位如常儀為冠者席於主人東少北西向將冠者待於房主人迎賔入冠者出主人曰敢勞吾子賔揖將冠者即席坐執帽者升賔降受之進冠者席前東向立祝曰令月吉日始加首服棄爾幼志茂爾成徳俾夀而臧以介多福乃跪加帽興復位賔揖冠者適房易服出即冠席復坐賔跪脱帽執折上巾者升賔降受之進冠者席前東向立祝曰吉月令辰申加爾服欽爾威儀柔嘉維則夀考不忘以終厥徳乃跪冠興復位賔揖冠者適房執事者徹冠席為醴席於西階南向賔揖冠者即醴席西向立賔受琖進席前北向立祝曰爾酒既醑爾肴既旅拜受祭之自求多祜冠者席西多受賔答拜執事者薦饌冠者坐飲食訖再拜賔答拜冠者興離席立於東階之西南向賔少進字之曰爾服既莊爾儀既備兄弟偕止爰告爾字永保受之令徳是似冠者拜賔答拜冠者廟見如常儀拜父母諸父羣從之尊者主人饗賔賔出主人送於門外案宋政和五禮新儀庶人冠二加又考宋史輿服志附載庶人冠禮初加緇布冠深衣大帶納履再加帽子皂衫革帶繫鞵三加幞頭公服革帶納鞾則是三加也與政和禮互異或亦因時改定姑備誌之明制庶人冠禮凡男子年十五至二十皆可冠將冠筮日筮賔戒賔俱如品官儀是日夙興張幄為房於㕔事東皆盛服設盥於阼階下東南陳服於房中西牖下席二在南酒在服北次幞頭巾帽各盛以盤三人捧之立於堂下西階之西南向東上主人立於阼階下諸親立於盥東儐者立於門外以俟賔冠者雙紒袍勒帛素履待於房賔至主人出迎揖而入坐定冠者出於房執事者請行事賔之贊者取櫛總箆幧頭置於席南賔揖冠者即席西向坐贊者為之櫛合紒施總加幧頭賔降主亦降立於阼階下賔盥主人揖讓升自西階復位執事者進巾賔降一等受之詣冠者席前東向祝詞同品官祝訖跪著巾興復位冠者興賔揖之入房易服深衣大帶出就冠席賔盥如初執事者進帽賔降二等受之進祝跪冠訖興復位揖冠者入房易服襴衫要帶出就冠席賔盥如初執事者進幞頭賓降三等受之進祝跪冠訖興復位揖冠者入房易公服出執事者徹冠席設醴席於西階南向贊者酌醴出房立於冠者之南賔揖冠者即席西向立賔受醴詣席前北靣祝冠者拜受賔答拜執事者進饌冠者即席坐飲食訖再拜賔答拜冠者離席立於西階之東南向賔字之如品官詞冠者拜賔答拜冠者拜父母父母為之起拜諸父之尊者遂出見鄉先生及父之執友先生執友皆答拜賔退主人請禮賔賔辭固請乃入設酒饌賔退主人酬賔贊侑以幣禮畢主人以冠者見於祠堂再拜出女笄宋明臣等謹按杜典女笄祇載同制今考唐以後各正史及六典㑹要諸書唯宋則獨有公主筓禮此外無聞焉他如各代服飾之制有未嫁已嫁之分者與周制許嫁筓而字之意相符亦並載之宋制公主筓禮年十五雖未議下嫁亦筓筓之日設香案於殿庭設冠席於東房坐東向西設醴席於西階上坐西向東設席位於冠席南西向其裙背大袖長裙褕翟之衣各設於椸冠筓冠朶九翬四鳯冠冬置於槃䝉以帕首飾隨之陳於服椸之南執事者三人掌之櫛總置於東房内執事宫嬪盛服旁立俟樂作奏請皇帝升御座樂止提舉官奏曰公主行筓禮樂作贊者引公主入東房次行尊者為之總髻畢出即席西向坐次引掌冠者東房西向立執事奉冠筓以進掌冠者進前一歩受之進公主席前北向立樂止祝曰令月吉日始加元服棄爾幼志順爾成徳夀考綿鴻以介景福祝畢樂作東向冠之冠畢席南北向立贊冠者為之正冠施首飾畢揖公主適房樂止執事者奉裙背入服畢樂作公主就醴席掌冠者揖公主坐贊冠者執酒器執事者酌酒授於掌冠者執酒北向立樂止祝曰酒醴和㫖籩豆静嘉受爾元服兄弟具來與國同休降福孔皆祝畢樂作進酒公主飲畢贊冠者受酒器執事者奉饌食訖徹饌復引公主至冠席坐樂止贊冠者至席前贊冠者脱冠置於槃執事者徹去樂作執事者奉冠以進掌冠者進前二歩受之進公主席前北向立樂止祝曰吉日令辰乃申爾服飾以威儀淑謹爾徳眉夀永年享受遐福祝畢樂作東向冠之冠畢席南北向立贊冠者為之正冠施首飾畢揖公主適房樂止執事者奉大袖長裙入服畢樂作公主至醴席掌冠者揖公主坐贊冠者執酒器執事者酌酒授於掌冠者執酒北向立樂止祝曰賔贊既成殽核唯旅申加爾服禮儀有序允觀爾成永天之祜祝畢樂作進酒公主飲畢贊冠者受酒器執事者奉饌食訖徹畢復引公主至冠席坐樂作贊冠者至席前贊冠者脱冠置於槃執事者徹去樂作執事者奉九翬四鳯冠以進掌冠者進前三歩受之進公主席前向北而立樂止祝曰以嵗之吉以月之令三加爾服保兹永命以終厥徳受天之慶祝畢樂作東向冠之冠畢席南北向立贊冠者為之正冠施首飾畢揖公主適房樂止執事者奉褕翟之衣入服畢樂作公主至醴席掌冠者揖公主坐贊冠者執酒器執事者酌酒授於掌冠者執酒北向立樂止祝曰㫖酒嘉薦有飶其香咸加爾服眉夀無疆永承天休俾熾而昌祝畢樂作進酒公主飲畢贊冠者受酒器執事者奉饌食訖徹饌復引公主至席位立樂止掌冠詣前相對致辭曰嵗日具吉威儀孔時昭告厥字令徳攸宜表爾淑美永保受之可字曰某祝訖樂作掌冠者退引公主至君父之前樂止再拜起居謝恩再拜少俟提舉進御坐前承㫖訖公主再拜提舉乃宣訓詞曰事親以孝接下以慈和柔正順恭儉謙儀不溢不驕毋詖毋欺古訓是式爾其守之宣訖公主再拜前奏曰兒雖不敏敢不祇承歸位再拜見后母之禮如之禮畢公主復坐皇后稱賀次妃嬪稱賀次掌冠贊冠者謝恩次提舉衆内臣稱賀其餘班次稱賀並依常式禮畢樂作駕興樂止其士庶之家女子在室者止用冠子背子婦人則假髻大衣長裙明制士庶之家女子在室者作三小髻金釵珠頭􅣎窄袖背子婦人則用禮服欽定續通典卷五十五
