body:
  text: 禮嘉臣等謹案杜典述嘉禮自冠婚朝賀追尊襲爵以及鄉飲酒禮按代詳叙而于冠冕巾幘服章佩綬車旂鹵簿之制尤為該備夫采章器服因時制宜禮經所載上古唐虞迄于三代已不必其沿襲秦漢而後代有改更創制顯庸辨等威而昭上下一朝自有其法度前無待于相仿後不計其相仍惟夫祖制留遺順乎土宜而審乎時勢者實可為子孫臣民所世守遼金元輕改衣冠變易舊制尋至衰㣲與後魏之更制而國弱者前後如一轍不誠為千古之炯戒哉且夫後代定禮固有迴勝于前代者即如開元禮載冠婚之節衣冠之辨止于士而不及庶人以記有云禮不下庶人也夫禮樂不可斯須去身無禮不立上下同之所云禮不下庶人者謂升降周旋之儀寛于待庶人豈謂庶人不當定其禮哉闕而弗載是為踈舛宋始定庶人冠婚諸制至明加詳不可謂非申明禮意補前人所未備矣舉此一端則知冠婚禮之相因尚有待于補正者况夫采章器服又寧得易國制而輕言倣古哉臣等仰承聖訓自唐以後嘉禮以代遞編而於服章制度門仍闡繹加案以資考鏡以符杜典附存諸議之體前代冠婚之禮繁簡以時其有史志所不載者俱從其闕而據其所嘗舉行者用昭徵信焉天子加元服金明金皇帝加元服禮告太廟或一室或徧告原廟並一獻禮用祝幣案新唐書所載冠禮與開元禮同至徳以後無所更改宋遼元史志俱不載天子冠禮明太祖洪武三年定制先期太史院卜日工部製冕服翰林撰祝文祝辭禮部具儀注中書省承制命某官攝太師某官攝太尉既卜日遣官告天地宗廟行一獻禮前一日内使監令陳御冠席於奉天殿正中其南設冕服案及香案寶案侍儀司設太師太尉起居位於文樓南西向設拜位於丹墀内道設侍立位於殿上御席西東向設盥洗位於丹陛西其百官及諸執事位次如大朝儀是日質明鼓三嚴百官入皇帝服空頂幘雙童髻雙玉導絳紗袍御輿以出侍衛警蹕奏樂如常儀皇帝升座鳴鞭報時訖通班贊各供事太師太尉先入就拜位百官皆入贊拜樂作四拜興樂止引禮導太師先詣盥洗位搢笏盥帨訖出笏由西陛升内贊接引至御席西東向立引禮復導太尉詣盥洗位盥帨訖入立於太師南侍儀奏請加元服太尉詣皇帝前少右跪搢笏脱空頂幘以授内使内使跪受幘興置於箱太尉進櫛設纚畢出笏興退立於西太師詣御前北向立内使監令取冕立於左太師祝曰令月吉日始加元服夀考維祺以介景福内使監令捧冕跪授太師太師搢笏跪受冕加冠加簪纓訖出笏興退立於西御用監令跪奏請皇帝著衮服皇帝興著衮服訖侍儀奏請就御座内贊贊進醴樂作太師詣御前北向立光禄卿奉酒進授太師太師搢笏授酒祝曰甘醴惟厚嘉薦令芳承天之休夀考不忘祝訖跪授内使内使跪受酒捧進御前皇帝受祭少許啐酒訖以虛盞授内使樂止内使受盞降授太師太師受盞興以授光禄卿光禄卿受盞退太師出笏退復位内贊導太師太尉出殿西門樂作降自西階引禮導至丹墀拜位樂止贊拜樂作太師太尉及文武官皆四拜興樂止搢笏三舞蹈山呼出笏俯伏興樂作復四拜樂止侍儀奏禮畢皇帝興鳴鞭樂作入宫樂止百官出皇帝改服通天冠絳紗袍拜謁太后如正旦儀擇日謁太廟與時祭同明日百官公服稱賀賜宴謹身殿神宗萬厯三年正月帝擇日長髪命禮部具儀大學士張居正等言禮重冠婚皇上前在東宫已行冠禮三加彌尊執爵而酳鉅禮既成可略其細不必命部臣擬議第先期至奉先殿𢎞孝殿神霄殿以長髪告禮畢詣兩宫皇太后行五拜三叩頭禮隨御乾清宫受賀帝是之遂著為令歸有光論曰儀禮有士冠禮無天子諸侯冠禮非逸也記曰無大夫冠禮而有其昏禮古者五十而後爵何大夫冠禮之有公侯之有冠禮夏之末造也天子之元子猶士也天下無生而貴者也繼世以立諸侯象賢也明天子諸侯大夫之無冠禮也冠者將責為人子為人弟為人臣為人少之禮故冠必有主人孤子則父兄戒宿葢父兄以成人之禮責子弟也天子為元子之時以士禮冠所謂有父在則禮然也已奉宗統君臨天下將又責之為人子為人弟為人臣為人少之禮乎家語稱孔子答孟懿子之問吾取焉曰古者王世子雖幼其即位則尊為人君人君治成人之事者何冠之有曰諸侯之冠異天子歟曰君薨而世子主喪是亦冠也與人君無所殊也諸侯之有冠禮也夏之末造也此孔子之遺言也益以祝雍頌公冠之篇則誣矣公冠曰公冠自為主迎賔揖升自阼立於席既醴降自阼饗之以三獻之禮無介無樂其酬幣朱錦采四馬其慶也天子擬焉曰自為主曰賔降阼嫌尊矣非為人子為人弟為人臣為人少之禮也且禮自上達而曰天子擬冠何也此非孔氏之言也公冠又曰公冠四加元冕左傳季武子曰君冠必以祼享之禮行之以金石之樂節之以先君之祧處之玉藻曰始冠緇布冠自諸侯下達冠而敝之可也元冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也葢務為天子諸侯士庶之别而不知先王制冠禮之義所以同之於士庶者也皇太子冠皇子皇孫附宋明宋皇太子冠儀嘗行於大中祥符之八年徽宗親製冠禮沿革十一卷命禮儀局倣以編次其儀前期奏告天地宗廟社稷諸陵宫觀殿中監帥尚舍張設垂拱文徳殿門之内設香案殿下螭陛間又為房於東朶殿大晟展宫架樂於横街南太常設太子冠席東階上東宫官位於後設褥位陳服於席南東領北上逺逰冠簪導衮冕簪導同箱在服南設罍洗阼階東罍在洗東篚在洗西實巾一加勺冪光禄設醴席西階上南靣實側尊在席南又設饌於席加冪執事者並公服立罍洗酒饌之所九旒冕逺遊冠折上巾各一匴奉禮郎三人執以侍於東階之東西靣北上設典儀位於宫架東北贊者二人在南西向禮直官通事舍人太常博士引太子詣朶殿東房皇帝乗輦駐垂拱殿百官起居如月朔視朝儀左輔版奏中嚴内外符寳郎奉寳先出左輔奏外辦皇帝服通天冠絳紗袍詣文徳殿簾捲大樂正令撞黄鐘之鐘右五鐘皆應殿上鳴鞭皇帝出西閣乗輦協律郎俛伏跪舉麾興工鼓柷奏乾安之樂殿上扇合禮直官太常博士引禮儀使導皇帝出降輦即座簾捲扇開鞭鳴樂止爐烟升符寳郎奉寳陳於御座左右禮直官通事舍人太常博士引掌冠贊冠者入門肅安之樂作至位樂止典儀曰再拜在位者皆再拜左輔詣御坐前承制降東階詣掌冠者前西向稱有制典儀贊在位官再拜訖宣制曰皇太子冠命卿等行禮掌冠贊冠者再拜訖文臣侍從官武臣節度使以上升殿東西立應行禮官詣東階下立東宫官入詣太子東房次禮直官等引太子内侍二人夾侍東宫官後從欽安之樂作即席西向坐樂止引掌冠贊冠者以次詣罍洗所樂作搢笏盥帨訖出笏升樂止執折上巾者升掌冠者降一等受之右執項左執前進皇太子席前北向立祝曰咨爾元子􅒊冠於阼筮日擇賔徳成禮具於萬斯年承天之祜乃跪冠順安之樂作掌冠者興席南北靣立後準此贊冠者進席前北靣跪正冠興立於掌冠者之後太子興内侍跪進服服訖樂止掌冠者揖太子復坐禮直官等引掌冠者降詣罍洗如上儀贊冠者進席前北向跪脱折上巾置於匴興内侍跪受興置於席執逺逰冠者升掌冠者降二等受之右執項左執前進太子席前北向立祝曰爰即令辰申加元服崇學以讓三善皆得副予一人受天百福乃跪冠懿安之樂作掌冠者興贊官者進跪簪結紘興太子興内侍跪進服服訖樂止掌冠者揖太子復坐降詣罍洗及贊冠者跪脱逺逰冠並如上儀執衮冕者升掌冠者降三等受之右執項左執前進太子席前北向立祝曰三加彌尊國本以正無疆惟休有室大競懋昭厥徳保兹永命乃跪冠成安之樂作掌冠者興贊冠者如上儀跪簪結紘内侍進服服訖樂止禮直官等引太子降自東階樂作由西階升即醴席南向坐樂止又引掌冠者詣罍洗樂作盥帨訖升西階樂止贊冠者跪取爵内侍注酒掌冠者受爵跪進太子席前北向立祝曰㫖酒嘉薦有飶其香拜受祭之以定爾祥令徳夀豈日進無疆太子搢圭跪受爵正安之樂作飲訖奠爵執圭大官令設饌席前太子搢圭食訖樂止執圭興大官令徹饌爵禮直官等引自西階詣東房易朝服降立横街南北向東宫官復位西向太子初行樂作至位樂止禮直官等引掌冠贊冠者詣前西向掌冠者少退字之曰始生而名為實之賔既冠而字以益厥文永受保之承天之慶奉敕字某太常博士請再拜太子再拜訖搢笏舞蹈再拜奏聖躬萬福又再拜左輔承㫖降自東階詣太子前西向宣曰有敕太子再拜宣敕曰事親以孝接下以仁逺佞近義禄賢使能古訓是式大猷是經宣訖太子再拜訖禮直官等引太子前俯伏跪奏稱臣雖不敏敢不祗奉奏訖興復位再拜訖引出殿門樂作出門樂止侍立官並降復位典儀曰拜贊者承𫝊在位者皆再拜禮儀使奏禮畢鳴鞭大樂正令撞㽔賔之鐘左五鐘皆應乾安之樂作皇帝降坐左輔奏解嚴放仗在位官皆再拜退太子入内朝見皇后如宫中儀迺擇日謁太廟别廟宿齋於本宫質明服逺遊冠朱明衣乗金輅至廟改服衮冕執圭行禮羣臣稱賀皇帝賜酒三行其皇子冠前期擇日奉告景靈宫太常設皇子冠席文徳殿東階上稍北東向設褥席陳服於席南東領北上九旒冕服七梁進賢冠服折上巾公服七梁冠簪導九旒冕簪導同箱在服南設罍洗酒饌旒冕冠巾及執事者並如皇太子儀其日質明皇帝通天冠絳紗袍御文徳殿皇子自東房出内侍二人夾侍王府官從恭安之樂作即席南向坐樂止掌冠者進折上巾北向跪冠修安之樂作贊冠者進北向跪正冠皇子興内侍跪進服訖樂止掌冠者揖皇子復坐以爵跪進祝曰酒醴和㫖籩豆静嘉授爾元服兄弟具來永言保之降福孔皆皇子搢笏跪受爵翼安之樂作飲訖太官令進饌訖再加七梁冠進安之樂作掌冠者進爵祝曰賓贊既成肴核惟旅申加厥服禮儀有序允觀厥成承天之祜皇子跪受爵輔安之樂作太官奉饌三加九旒冕廣安之樂作掌冠者進爵祝曰㫖酒嘉栗甘薦令芳三加爾服眉夀無疆永承天休俾熾而昌皇子跪受爵賢安之樂作太官奉饌饌徹皇子降易朝服立横街南北向掌冠者字之曰嵗日云吉威儀孔時昭告厥字君子攸宜順爾成徳永受保之奉敕字某皇子再拜舞蹈又再拜奏聖躬萬福又再拜左輔宣敕戒曰好禮樂善服儒講藝蕃我王室友于兄弟不溢不驕唯以守之皇子再拜進前俯伏跪稱臣雖不敏敢不祗奉俯伏興復位再拜出殿上侍立官並降復位再拜放仗明日百僚詣東上閤門賀真宗大中祥符八年十二月戊寅承天節羣臣上夀是日皇子慶國公加冠司天言日煇珥直抱氣戊子集賢校理晏殊上皇子冠禮賦詔奬之明太祖洪武元年定皇太子冠禮前期太史監卜日工部製衮冕逺逰冠折上巾服翰林院撰祝文祝辭禮部具儀注中書省承制命某官為賔某官贊既卜日遣官祭告天地宗廟前一日内使監令陳御座香案於奉天殿設皇太子次於殿東房賔贊次於午門外質明執事官設罍洗於東階設皇太子冠席於殿上東南西向設醴席於西階上南向張帷幄於東序内設褥席於帷中又張帷於序外御用監陳服於帷内東領北上衮服九章逺逰冠絳紗袍折上巾緇纚犀簪在服南櫛又在南司尊實醴於側尊加勺羃設於醴席之南設坫於尊東置二爵進饌者實饌設於尊北諸執事者各立其所鼓三嚴文武官入皇帝服通天冠絳紗袍升座如常儀賔贊就位樂作四拜興樂止侍儀司跪承制降自東階詣賔前稱有敕賔贊及在位官皆跪宣制曰皇太子冠命卿等行禮皆俯伏興四拜文武侍從班俱就殿内位賔