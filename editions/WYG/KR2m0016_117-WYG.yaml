body:
  text: 刑赦宥唐五代宋遼金元明唐自肅宗至昭哀厯十四帝凡即位詔書必赦大辟已下常赦所不原者其他或受尊號或建儲宫或祀圜丘或平僭亂以及改元弭變之類大則罪無輕重一切原免小則死罪降從流流以下釋放肆𤯝之典不可殫記至徳乾元之間與物更始赦命尤數詔書節文惟李林甫王鉷楊國忠親屬不在免限其兩京文武官應被賊逼受偽官三司推勘未了者一切放免合得官者仍酌量注擬至上元二年并詔名在流貶者委中書門下量輕重類例奏取處分凡左降官非反逆緣坐及犯惡逆名教枉法盗贓如有親年八十已上及患在牀枕不堪扶持更無兄弟者許停官終養其流移人亦準此代宗初制自開元已來所有諸色犯累者並宜雪免左降官并諸色流人及罰鎮効配軍團人等一切放還諸色流貶者量移近處並詔東都河北應受賊脅從署偽官并偽出身悉原其罪不問得史朝義將士妻子四百餘人皆赦之僕固懷恩反免其家不緣坐徳宗即位詔寳應元年以後犯累禁錮及反逆緣坐等㮣予洗滌貞元之末十年無赦為太宗已來所僅見羣臣以微過譴逐者無復叙用及順宗即位始得量移焉憲宗元和八年刑部侍郎王播奏竊見諸處配流人逢赦悉得放還惟天徳軍五城及諸邊城配流人等均經本道奏留防邊遂令沒身終無歸日臣又見比年邊城犯流者多是胥徒小吏或是鬬打情形據罪可原在邊無益乞準依格例處分具刑制篇詔許放還自是遂為定制自穆宗已後每有赦除其左降官並諸色得罪人縱元勅云終身不齒及縱有恩赦不在免限者均得收録放還惟官典犯贓罪與十惡同科遇赦必申明不在免限之例長慶元年詔應亡官失爵及放還流人如原有莊田不經没官被人侵射其本主或子孫已歸並委州府勘還務令安業文宗太和三年滄平州李同㨗之母及妻男等特免緣坐李載義進滄鎮兩州將健生口共千餘人並减死分配邊州防秋時有張璹劉建胡伯忠造偽出身文書賣官并造偽印行用犯罪並在太和三年十一月十八日恩赦前刑部大理寺詳斷悉處極刑御史中丞宇文鼎奏準律赦前斷罪不當者若處輕為重宜改從輕處重為輕即依輕法臣以前件囚等雖抵極法悉經殊恩或自赦文全生或因起請減等緣引霈澤累陳訴詞若非得中恐未服罪昨者一與一奪事闗起請既生又死稍覺二三如臣所見伏請赦書已前犯者特許減論赦書以後所犯不得援例庶使後無僥倖令絶披陳勅張璹等三人宜準元勅處分五季䘮亂之中赦恩尤濫近則一年再降逺則每嵗無遺惟十惡五逆火光行刼持刀殺人官吏犯贓屠牛鑄錢合造毒藥不在原免之限亦略遵唐制是時詔書所及非惟宥罪抑且推恩藩方論薦動輒數百乃至藏典書吏優伶奴僕初命即至銀青階被服皆紫袍象笏晉天福中中書舍人李詳上䟽極論其失唐制徒流人到配𨽻所本管畫時申御史臺候年月滿日放還時久格不行後唐清泰間乃詔依開成格施行周太祖廣順二年赦書節文犯和姦者罪不至死先是凡和姦男子婦人並處極法至是始準律科斷並詔諸犯罪人除反逆外餘罪並不得籍没家産誅及骨肉一依晉天福元年已前條制處分數事差為得中焉宋制遇非常覃慶則常赦所不原者咸除之其次釋雜犯死罪已下皆謂之大赦雜犯死減等而餘罪釋之流已下減等杖笞釋之皆謂之徳音其恩霈所及止於京城兩京一州一路者則謂之曲赦又天子嵗自錄京師繫囚畿内則遣使往往雜犯死罪第降等杖笞釋之或徒罪亦得釋若并及諸路則命監司錄焉太祖即位大赦天下後三嵗遇郊則赦終宋之世遂為成典太宗太平興國三年將郊議赦有秦再恩者上書願勿赦引諸葛亮佐劉備數十年不赦事帝意惑趙普對曰凡郊祀肆眚聖朝彜典其仁如天堯舜之道也若劉備區區一方臣所不取帝善之遂定赦仁宗景祐中言者以為三王嵗祀圜丘未嘗輒赦自唐兵興已後事天之禮不常行因有大赦以蕩亂獄且有罪者宥之未必自新被害者抑之未必無怨不能自新將復為惡不能無怨將悔為善一赦而使民悔善長惡政教之大患也願罷三嵗一赦俾良民懷惠兇人知禁即謂未可盡廢請命有司前郊三日理罪人有過誤者引而赦之州縣須詔到倣此䟽上朝廷重其事苐詔自今罪人情重者毋得一以赦免卒亦不果行開寳八年有司言自三年至今詔所貸死罪凡四千一百八人太宗嘗親錄京師繫囚至日旰近臣或諫過勞帝曰倘惠及無告獄訟不致枉撓朕深以為適何勞之有自是祁寒盛暑或雨雪稍愆輒親錄繫囚多所原減嵗以為常真宗咸平二年詔曰如聞小民知有恩赦故為刼盜自今不在原免之限景徳二年大理寺又言郊禮在近諸州奏按多不精詳冀於覆駁延留以俟恩宥請自今事狀明白者即具情實定斷以絶僥倖詔可然自大中祥符已後崇奉天書侈言封禪肆赦之令㡬於無嵗不有矣天禧元年江南提刑范應辰上言伏覩辛亥制書常赦不原者咸除之臣今所部州郡過誤而被宥者雖多竊害而蒙釋者亦衆葢以奸兇之軰宻斷赦期狃於忿心發其夙憾單弱受辜强梁肆暴或舉家殞命罄室擄財或持刀殺人或縱火焚舍至有糾輕生之徒為强剽之盜公行戕害以奪資儲巡警之官上逼下逐設謀緝捕冐險鬬敵以茲敗獲合正典刑逢此霈恩亦蠲其罪又配為卒伍咸給衣糧是何異賞人為盜耶請自今應有知赦在近而故為罪戾及赦後彰顯情理切害者死罪已下止遞減一等赦前殺人剽財赦後雖不復為若因事捕獲決𨽻逺惡州軍其殺人放火擄財刼貨已依赦配本城者如更配逃亡飲博之類所在長吏籍其罪由若再黷憲綱不問罪之大小禁錮奏裁帝覽之頗嘉其盡心然亦不能用也仁宗在位久凡大赦二十二而曲赦徳音録繋囚之數不與焉然赦常赦所不原者惟帝即位及明道中太后不豫行之而明道所行人以為濫天聖初詔諸路按察官取乾興赦前配𨽻兵籍者列所坐罪狀以聞自是赦書下輒及之五年詔已下約束而犯刼盜及官典受贓勿復奏悉論如律初太祖將祀南郊詔兩京諸道自十月後犯强竊盜不得預赦所在長吏告諭民無冒法自後將祀必先申明此詔而法官讞獄終以㑹赦多所寛貸臣僚建言謂惠姦失詔㫖故復有是詔帝尤惡人告訐隂事時有人宻上書䟽過又數按人赦前事者翰林學士張方平御史吕誨皆以為言乃下詔曰比者中外多上章言人過失暴揚難騐之罪告按無證之辭或外託公言内緣私忿詆欺曖昧苟陷善良又赦令者所以與天下更始而有司多舉按赦前事殆非信命令重刑罰使人灑心自新之意也自今有上章告人罪言赦前事者訊之慶厯三年既䟽理天下繫囚因詔諸路配𨽻役人並皆釋放神宗大赦凡十一曲赦如之即位詔曰夫赦令國之大恩所以蕩滌瑕穢納於自新之地是以聖主重焉中外臣僚多以赦前事捃摭吏民興起獄訟苟有詿誤咸不自安甚非持心近厚之誼使吾號令不信於天下其申詔内外言事按察官司毋得依前舉劾具案取㫖否則科違制之罪按宋史刑法志載是詔亦作仁宗今從文獻通考改正知諫院司馬光上言按察之官以赦前事興獄禁之誠為大善至於言事之官本以繩按百辟糾擿姦邪之狀固非一日所為國家素尚寛仁數下赦令或一嵗之間至于再三若赦前之事皆不得言則其可言者無幾萬一有姦邪之臣朝廷不知誤加進用御史欲言則達今日之詔若其不言則陛下何從知之臣恐因此言者得以箝口偷安奸邪得以放心不懼此乃人臣之至幸非國家之長利也請追改前詔刋去言事二字光論至再帝諭以言者好以赦前事誣人光曰若言之得實誠所欲聞若其不實當罪言者帝命光送詔於中書熙寧八年編定廢免人叙格常赦則郡縣以格叙用凡三期一叙即期未滿而遇非次赦者亦如之哲宗朝大赦凡八元祐元年門下省言當官以職事曠隳雖去官不免猶可言至於赦降大恩與物更始雖刼盜殺人亦䝉寛宥豈可以一事差失負罪終身今刑部所修不以去官赦降原減條所留請更刪改從之八年因門下侍郎韓維言詔自今每近郊赦令刑部大理寺開封府並依常時決遣獄訟不減日限其情重難釋者别為一等奏斷元符三年中書省言元祐編勅惟傳習妖教託幻變之術及故盜決河隄堰不以赦降原減餘犯一再遇非次赦或兩經大禮者聽從原免元符新勅刪去遂使犯法者無由自新詔依元祐法徽宗政和五年知興仁府夏鰭言諸路奏獄有因祖父母為人所毆而子孫毆之以致死者並作情理可憫奏裁多免流配若遇赦則不復奏裁即作鬬殺情理減等流配是遇赦反為不幸詔自今雖遇赦亦令奏裁帝在位二十五年凡大赦二十六曲赦十四徳音二十七南渡已後紹興嵗至四赦刑政紊而恩益濫矣髙宗登極赦文不及河東北右僕射李綱言兩路勤王之師為朝廷堅守而恩恤獨遺後復有急何以使人帝嘉納之是年六月皇子生大赦詔特詳焉建炎三年韓世忠執苖傅劉正彦獻俘檻車幾百兩先付大理獄將盡尸諸市大理少卿王衣奏曰此曹在律當誅顧其中婦女有僱買及擄掠以從者帝矍然曰朕慮不及此即詔自傅正彦妻子外皆釋之自祖宗已來赦書節文凡官典犯枉法贓者皆在不原而積久弊生漸行弛縱紹興二十五年右正言凌哲言陛下深念比年臣僚有縁誣告不測之罪投竄遐裔無路自明廼因郊祀赦曠然與之昭雪或䟽罪籍或復原官甚盛徳也至於姦贓狼籍已經按治蹟狀顯著人所共知者亦復巧飾詞理公肆誕謾咸以違忤權臣為辭今陛下方開公正之路小人乃欲啟僥倖之門此正清議所不容也又况此曹嗜利與生俱生未易悛革倘復齒仕途益務掊克其害將有甚於前日者請特詔有司應自今陳雪過名之人並須檢㑹元犯事因如係贓罪已經勘劾者乞止依元斷條法施行詔如所請孝宗淳熙九年大理卿王尚之言近以民間詞訴官司按劾多有連及赦前事者復送有司根勘如此則與不曾經赦何異非所以示信也詔應所犯在大赦前者苟非惡逆以上並不許推究光宗紹熙二年勅赦文與令甲牴牾者飭省部逐一比照見行條法務在從寛毋引法以沮赦五年九月時寧宗已即位尚書省契勘一嵗之間三行赦放恐有兇惡累犯之人指恩作孽内曾犯徒流罪已經登極赦恩免後再犯以情理深重者别聽朝廷指揮其指揮與赦文同降但以白紙連書於黄牒前葢前所未有也開禧三年平吳曦家屬應緣坐其㓜男女妾特宥從逺徙理宗每嵗大暑必臨軒慮囚自謀殺故殺鬬殺已殺人者偽造符印㑹子放火官員犯入已贓將校軍人犯枉法自餘死罪情輕者降從流流降從徒徒從杖杖以下釋放大寒或祈晴雪亦如之有一嵗凡數䟽决者後以建康為先朝駐蹕之地罪人亦得視臨安減降之法淳祐三年臣僚奏乞今後踈決先期降㫖下臨安府三衙應犯罪在指揮前許引用恩赦如指揮後有犯雖已停決不在原減之數其合引赦人不許於停決前輕行斷遣如或違戾並從故出入人罪條制施行詔令刑部詳度上尚書省遼太祖五年皇弟埒克達喇伊徳實安圖謀反安圖妻訥黙庫知之以告得實帝不忍誅乃與諸弟登山刑牲告天地為誓而赦其罪出埒克為徳哷勒部額爾竒木封訥黙庫為晉國夫人八年于古凌部人塔勒滿執逆黨布呼雅爾堅等十七人來獻帝親鞫之辭多連宗室及有脅從者乃杖殺首惡布呼餘並原釋裕悦實魯之子華格屢蓄奸謀帝每優容之而反覆不悛召父老羣臣正其罪所鞫逆黨三百餘人獄既具帝以人命至重死不及生賜宴一日隨其平生之好使為之酒酣或歌或舞或戲射角觝各極其意明日乃以輕重論刑首惡埒克次達喇帝猶弟之不忍寘法杖而釋之以伊徳實安圖性本庸弱為埒克所使伊徳實妻尼嚕古脅從安圖妻訥黙庫嘗有忠告並免天贊三年二月徇幽薊地詔改元赦軍前殊死已下罪囚自後平渤海始即位凡兩肆大赦焉㑹同已後大赦曲赦之典不可枚舉大約嗣位改元上尊號皇子生及舉柴册再生之禮則行太宗初邊將奏破吐谷渾擒其長詔止除首惡餘並赦世宗時耶律吼有定䇿功加採訪使益以寳貨辭曰臣位已髙敢復求富臣從弟達魯諸子坐事籍没陛下哀而赦之臣受賜多矣帝曰吼舍重賞而請赦族人賢矣從之趙王喜隠應厯中謀反事覺帝臨問有狀以親釋之未幾復反下獄景宗即位聞有赦自脱其械而朝帝怒曰汝罪人何得擅離禁所詔誅守者復寘於獄及改元保寧乃宥其罪道宗在位嵗久又性溺浮屠故赦特煩數然終遼之世如天祿時之以公主額伯哩自死獄中重熙時之以樞宻使蕭孝忠薨開泰寺鑄銀佛像成皆曲行赦令尤為不經葢無取焉金太祖天輔七年二月詔安巴貝勒曰郡縣今皆撫定有逃散未降者已釋其罪更宜招諭之太宗即位大赦中外天㑹十年十月以天清節大赦熙宗而後即位改元及山陵事畢祔廟禮成則特舉大赦郊恩惟世宗朝一行之其他水旱災變亦時行曲赦焉大定二年詔前戸部尚書梁球等安撫山東百姓招諭盜賊凡避賦役在他所者並令歸業無問罪名輕重悉與原免三年詔吏犯贓罪雖㑹赦不叙五年日者孫邦榮告西京留守夀王京謀逆鞫實特免死杖之除名嵐州安置既而其兄徳州防禦使文復謀反免其緣坐仍以資産賜其兄之子約爾珠十七年詔海陵時大臣無辜被戮家屬籍沒者並釋為良章宗承安四年監察御史姬端修以妄言下吏詔赦其罪令居家俟命宣宗貞祐元年元帥右監軍珠赫果勒齊戰敗以兵殺呼沙呼於其第詣闕待罪赦之三年赦富察齊勤脅從之黨四年山東行帥府事䝉古綱言楊安兒黨内有故淄王習顯故留守摩囉等家奴不在赦原據險作亂至今未息民多歸之乞普賜恩宥帝命赦之仍贖為良興定元年伊喇瑪努勒言朶山賊魚張二等嘗屢詔免罪若悉誅之恐乖恩信且其親屬淪落宋境近在均州或相搆亂乞貸其死徙之歸徳睢陳均許間為便詔許之四年有誣宗室從坦殺人者太學生馬肩龍上書言從坦有將帥材少出其右者臣無益於用願代死帝問汝與從坦交厚乎對曰臣知有從坦從坦未嘗知臣臣以死明其寃耳遂宥從坦元光元年八月丁丑以彗星見改元大赦諭宰臣曰赦書已頒時刻之間人命所係其令將命者速往剋期而至哀宗正大二年陳和尚隨其兄色埒在軍中以事笞萬宜翁宜翁憤死語其妻必報妻以故殺訴臺省不直則積薪將自焚和尚繫獄者十有八月色埒入朝帝諭以欲赦之意尋以臺諫言復止及聞色埓卒始馳赦之且諭曰有司奏汝以私忿殺人汝兄死失吾一名將今以汝兄故曲法赦汝天下必有議我者他日汝奮發立功名始以吾為不妄赦矣和尚且泣且拜後死節於鈞州元太宗初中原甫定民多誤觸禁網而國法無赦令耶律楚材議請赦宥衆以為迂楚材獨從容為帝言詔自庚寅正月朔日前事勿治世祖混一區㝢以天下獄囚滋多至元十年勅諸路自死罪以下縱遣歸家期秋八月悉來京師聽決囚如期至帝惻然憐之盡原其罪二十一年春册上尊號議大赦天下參知政事張雄飛諫曰古人言無赦之國其刑必平赦者不平之政也聖明在上豈宜數赦帝嘉納之止降輕刑之詔時始定刑制條格開載諸疑獄在禁五年已上不能明者遇赦釋免諸盜賊聞赦故殺捕盜之人者不赦其先竊後強㑹赦惟下手殺傷事主者不赦餘仍刺而釋之諸流囚中途遭亂而逃不再犯及已老病并㑹赦者釋之若奉㫖流逺雖㑹赦非奏請不得放還諸應徒流未行及已行未至者㑹赦並釋之諸囚徒配役役所停罷者㑹赦免放元貞而後肆眚之典亦代行之其詔書節目除謀殺祖父母父母妻妾殺夫奴僕殺主謀故殺人但犯强盜印造偽鈔蠱毒魘魅犯上者不赦外其餘罪無輕重悉予原免仁宗即位興聖太后既受尊號廷臣請因肆赦翰林直學士元明善曰數赦非善人之福宥過可也英宗至治元年帝享太廟廷臣或言祀事畢宜赦天下帝諭之曰恩可常施赦不可屢下使殺人獲免則死者何辜遂命中書陳便宜行之順帝至正四年蓋苖為刑部尚書初盜殺河南省憲官延坐五百餘家已有詔除首罪外餘從原宥至是宰臣追復欲盡誅戮苖堅持不可御史趣具獄苖曰肆赦復殺在法所無御史獨宜劾苖其敢累朝廷之寛仁乎卒用苖議罷之明制凡有大慶及災異皆赦然有常赦有不赦有特赦十惡及故犯者不赦律文曰赦書臨時定罪名特免或降減從輕者不在此限十惡中不睦又在㑹赦原宥之例此則不赦者亦得原若傳㫖肆赦不别定罪名者則仍依常赦不原之律太祖置政平訟理二旛其無罪應釋者持政平旛宣徳意遣之洪武二十年左都御史詹徽言軍人有犯當杖其人當兩得罪而免宜并論前罪誅之帝曰前罪既宥復論之則不信矣命如律沅陵知縣張傑當輸作自陳母賀當元季亂離守節今年老失養帝謂可勵俗特赦之令傑終養給事中彭興民坐繫其父上表訴哀立釋之且免囚繫十七人都察院當囚死者二十四人命羣臣鞫有寃者減數人死真州民十八人謀不軌戮之而釋其母子當連坐者建文帝即位盡釋刺靣軍及囚徒還鄉里成祖永樂元年縣令以贓戍擊鼔陳狀帝為下法司其人言實受贓年老昬眊所致惟上哀憫帝以其歸誠屈法宥之二年江浦知縣周益以罪當刑妻梅訴益母老無養請代死帝憫而宥益成化十三年河東知縣徐孚坐妖言事相類故不具載五年八月録囚雜犯死罪減等流以下釋之八年二月皇太子錄囚奏貰雜犯死罪已下報可仁宗立赦條三十五皆學士楊士竒代草盡除永樂年間弊政厯代因之凡先朝不便於民者皆援遺詔或登極詔革除之凡以赦前事告言人罪者即坐以所告者罪宣宗寛詔嵗下閲囚屢放遣有至三千人者諭刑官曰吾慮其瘐死故寛貸之非常制也即位之初即特赦建文奸黨族屬還家仍以其田産給之英宗正統十一年大理卿俞士悦以鬬毆殺人之類百餘人奏聞請宥俱減死戍邊景帝景泰中陽榖主簿馬彦斌當斬其子震請代死特宥彦斌編震充邊衛軍舊例竊盜赦後三犯者絞英宗詔通叙前後不論赦具刑制雜議等篇至憲宗時都御史李秉援舊制奏革既而南京盜王阿童五犯皆遇赦免帝聞之詔仍以赦前後三犯為令至神宗朝復議奏請改遣帝自初即位勅三法司中外文武羣臣除贓罪外所犯罪名紀錄在官者悉予湔滌其後嵗以為常成化元年詔釋戍邊陳循江淵俞士悦並王文于謙子壻囘籍孝宗初立免應決死罪四十八人世宗雖屢停刑尤慎無赦嘉靖四十一年三殿成羣臣請頒赦帝曰赦乃小人之幸不允穆宗登極大學士徐階緣帝意為遺詔盡還諸逐臣優恤死亡縱釋幽繫讀詔書者無不歎息神宗萬厯四年勅雜犯死罪准徒五年者並兩犯徒律應總徒四年者各減一年其他徒流等罪皆減等笞杖放免十二年御史屠叔明請釋革除忠臣外親命自齊黄外方孝孺等連及者俱勘豁莊烈帝崇禎十三年御史魏景琦論囚西市御史髙欽舜工部郎中胡璉等十五人將斬忽中官本清銜命馳免因釋十一人熱審始於永樂二年止決遣輕罪命出獄聽候而已尋寛及徒流已下宣徳二年五六七月連諭三法司錄上繫囚罪狀凡決遣二千八百餘人七年二月親閲法司所進繫囚罪狀決遣千餘人減等輸納春審自此始六月又以炎暑命自實犯死罪外悉早發遣且馳諭中外刑獄悉如之成化時熱審始有重罪矜疑輕罪減等枷號疎放諸例嘉靖十年令每年熱審並五年審錄之期雜犯死罪准徒五年者皆減一年二十三年因刑科羅崇奎言詔五六月間笞罪應釋放徒罪應減等者亦如成化時欽恤枷號例暫與蠲免至六月終止南法司亦如之四十三年定坐贓不及百兩産絶者免監追隆慶五年令贓銀止十兩以上監久産絶或身故者熱審免追釋其家屬萬厯四年詔諸贓犯除侵盜官錢糧五十兩糧一百石以上者照舊監追如還官銀不足五十兩并入官給主百兩已上各贓監追至五年或正犯身故逮及子孫勘無家産者俱許審實具奏開豁其各處查盤坐贓追賠銀兩草束亦聽查勘具奏裁奪厯朝無寒審之制惟宣徳四年十月以皇太子千秋節減雜犯死罪已下宥笞杖枷鐐者復以天氣沍寒勅南北刑官悉錄繫囚以聞不分輕重至崇禎十年以代州知州郭正中䟽請命所司求故事尚書鄭三俊乃引祖宗數事以聞帝納其言禁屠殺贖生附唐五代宋遼金元明唐憲宗元和九年詔如聞比來京兆府每及臘日府縣捕養􅈢以充進獻深乖道理既違天性又勞人力自今已後宜並停文宗寳厯二年即位制書節文應緣田獵鷹鶵獸犬等並宜放除五坊加配諸道鷹鷂等長慶已來嘗進外宣索自今一切停進太和二年帝召對侍講學士許康佐語及取蚺蛇膽知生割腹而後得之遂命停減桂賀等州額貢四年詔曰時屬陽和命禁麛卵所以保滋懷生仁遂物性如聞京畿及闗輔近地豪家弋獵放縱鷹犬頗傷田苖長吏切加禁察違者捕繫以聞開成二年三月詔曰韶陽御辰生氣方盛思全物類以順天時内外五坊凡有籠養鷹鷂及雞鴨鳥雀􅈢等悉宜放之起今月一日至五月十三日禁京城及畿内採捕鳥獸羅網水蟲以遂生成永為定制委臺府及本司切加禁止後唐明宗長興二年詔五坊見在鷹隼之類並可就山林解放今後不許進獻三年五月勅春夏之交長育是務眷彼含靈之類方資亭育之功自此至冬初凡羅網及諸弋獵之具並宜止絕如有違犯仰隨處官吏便科違詔之罪起今後每年至於二月初便依此勅曉示中外四年囘鶻進白鶻一聨命禮賔使解緤放之山林周太祖廣順二年鳯翔言義州畨部買牛入畨多是宰殺乞止絶沿路州縣道途百姓不得殺牛貨賣與畨人從之宋真宗景徳三年詔牛羊司畜有孳乳者放牧勿殺大中祥符二年詔量留五坊鷹鶻備諸王從時展禮餘悉縱之三年禁方春射獵每嵗春夏所在長吏申明此㫖天禧四年判杭州王欽若奏以西湖為放生池禁捕魚鳥仁宗嘗夜飢思膳燒羊恐膳夫自此戕賊物命以備不時之需戒勿宣索遼太宗㑹同五年五月五日禁屠宰道宗咸雍七年罷獵禁屠殺以置佛骨於招仙浮圖故也金海陵天徳三年命大官常膳惟進魚肉舊貢鵝鴨等悉罷之並放皇統間苑中所養禽獸正隆五年禁中都河北山東河南河東京兆軍民網捕禽獸及畜養鵰隼者世宗大定五年詔曰馬者軍旅所用牛者農耕之資殺牛有禁馬亦何殊其令禁之十四年詔明安穆昆之民不許殺生祈祭二十年帝謂宰相曰女直官多謂朕食用太儉朕謂不然夫一食多費豈為美事况朕年髙不欲屠宰物命貴為天子能自節約亦不惡也二十五年帝幸上京平章政事襄奉御平山等射懷孕帝怒令杖平山三十仍召襄誡飭之遂下詔禁射十一月又詔曰豺未祭獸不許採捕冬月雪尺已上不許用網及蘇克蘇呼恐盡獸類章宗明昌三年正月以孝懿皇后小祥禁屠宰承安二年七月以夀王洪輝疾愈帝幸天長觀建普天大醮禁屠宰七日元世祖至元十二年勅輝和爾地春夏母獵孕字野獸申嚴屠牛馬之禁二十七年禁屠宰牝羊成宗元貞三年詔江南母捕天鵝大徳三年揚州淮安屬縣蝗在地者為鶖啄食飛者以翅擊死詔禁捕鶖元刑制禁令條開載每月朔望二弦凡有生之物殺者禁之諸郡縣嵗正月五月各禁宰殺其饑饉去處自朔日為始禁殺三日自十二月至來嵗正月殺牝羊者禁之諸宴㑹雖達官殺馬為禮者禁之其有老病不任鞍勒者亦必與衆騐而後殺諸私宰官馬牛為首杖一百七為從者八十七助力者減正犯二等論罪明世宗初即位令縱内苑禽獸天下母得進獻欽定續通典卷一百十七
