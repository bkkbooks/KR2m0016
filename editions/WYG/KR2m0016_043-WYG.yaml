  text: 職官秩品四元元官品正一品太師太傅太保大司徒司徒太尉中書令案元初止置太保一人至成宗武宗之世三公始無虗位至大司徒司徒太尉偶一拜職不乆即罷其中書令必以皇太子兼之然亦或置或不置中書省右左丞相案元初立尚書省置右左丞相秩品同中書武宗至大四年併尚書省入中書自後因之不易平章右左丞參政參議等官仿此故不具録開府儀同三司文散儀同三司特進崇進金紫光禄大夫銀青榮禄大夫王爵上柱國勲從一品中書省平章政事樞宻院知院御史大夫大宗正府扎爾古齊大司農司大司農翰林兼國史院承㫖䝉古翰林院銜秩同後仿此集賢院大學士宣政院院使宣徽院院使大禧宗禋院院使行中書省丞相平章行樞宻院知院不常設後同知以下秩品不具載光禄大夫文散榮禄大夫郡王爵柱國勲正二品中書省右左丞樞宻院同知大都督府大都督御史中丞大司農卿翰林學士集賢院學士宣政院同知宣徽院同知太常禮儀院院使典瑞院院使太醫院院使太史院院使奎章閣大學士將作院院使中政院院使儲政院院使按文宗天厯已前為詹事院詹事或置或罷秩從一品二年改為儲政院至順帝至正中復立詹事院員秩畧同故詹事院官屬不具載徽政院羣牧監卿内史府内史大都留守司留守上都留守司留守隨路諸色民匠打捕鷹房都總管府都總管行中書省右丞左丞資徳大夫文散資政大夫資善大夫龍虎衞上將軍武散金吾衛上將軍驃騎衛上將軍國公爵上䕶軍勲從二品中書省㕘政樞宻院副樞山東河北蒙古軍大都督府大都督侍御史大司農少卿翰林侍讀侍講學士集賢院侍讀侍講學士宣政院副使宣徽院副使奎章閣侍書學士通政院院使都䕶府大都䕶崇福司使隆祥使司使太僕寺卿宣慰使司宣慰使都元帥府宣慰使管領保定等路阿哈探馬兒諸色人匠總管府達嚕噶齊總管都總制庸田使行中書省㕘知政事正奉大夫文散通奉大夫中奉大夫奉國上將軍武散輔國上將軍鎮國上將軍郡公爵䕶軍勲正三品中書省斷事官吏部戸部禮部兵部刑部工部尚書京畿都漕運使司運使御河等處都漕運使司運使各路都轉運鹽使司使侍儀使領㑹同館事樞宻院僉院斷事官右衛左衛中衛前衛後衛都指揮使武衛親軍隆鎮衛親軍都指揮使左右衛率府率使河南淮北䝉古軍都萬戸府都萬戸右左阿蘇衛達嚕噶齊都指揮使回回砲手軍匠上萬戸府達嚕噶齊萬戸唐古衛親軍都指揮使貴徹衛親軍都指揮使忠翊侍衛親軍都指揮使西域親軍達嚕噶齊都指揮使宗仁䝉古侍衛親軍都指揮使左右翊蒙古侍衛親軍都指揮使虎賁親軍都指揮使大都督府同知右左欽察衛達嚕噶齊都指揮使龍翊侍衛親軍都指揮使治書侍御史肅政㢘訪使宣政院僉院禮店文州䝉古漢軍西畨軍民元帥府達嚕噶齊元帥吐蕃等處招討使圖沙瑪探馬軍四萬戸府萬戸宣徽院僉院光禄寺卿隆禧㑹福崇祥夀福等總管府達嚕噶齊總管太常禮儀院同知典瑞院同知太史院同知太醫院同知廣惠司卿奎章閣承制學士羣玉内司監司將作院同知諸路金玉人匠總管府達嚕噶齊總管異様局總管府達嚕噶齊通政院同知中政院同知中瑞司卿内正司卿翊正司令各管領總管府達嚕噶齊總管有秩正五品者隨路為别各萬戸府達嚕噶齊萬戸儲政院同知家令司家令延慶司使典醫監達嚕噶齊卿太監典牧監卿太監儲膳司卿典寳監卿太監掌謁司卿甄用監卿延福司令章慶使司使左右都威衛使司衛使内宰司内宰各都總管府達嚕噶齊都總管昭功萬戸都總使司都總使繕工司卿内史府中尉内史府延慶使斷事官大都留守司同知廣誼司令武備寺卿尚乘寺卿長信寺卿長秋寺卿承徽寺卿長寧寺卿長慶寺卿寧徽寺卿太府監太卿度支監卿利用監卿中尚監卿章佩監卿經正監太卿秘書監卿上都留守司同知尚供總管府達嚕噶齊總管雲需總管府達嚕噶齊總管九府元帥府達嚕噶齊元帥宣撫司達嚕噶齊宣撫使安撫司達嚕噶齊安撫使招討司達嚕噶齊招討使上萬戸府達嚕噶齊萬戸海道運糧萬戸府達嚕噶齊萬戸諸上路總管府達嚕噶齊總管屯田使司屯田打捕總管府總管黎兵萬戸府萬戸正議大夫文散通議大夫嘉議大夫昭武大將軍武散昭勇大將軍昭毅大將軍郡侯爵上輕車都尉勲從三品儀鳳司大使各隨路打捕總管府達嚕噶齊𨽻兵部總管管領隨路打捕鷹房諸色人匠怯憐口總管府達嚕噶齊總管右衛左衛中衛前衛後衛副都指揮使武衛親軍副都指揮使隆鎮衛親軍副指揮使左右翼屯田萬戸府達嚕噶齊萬戸左右衛率府副使河南淮北都萬戸府副都萬戸右左阿蘇衛副都指揮使唐古衛親軍副都指揮使貴徹衛親軍副都指揮使延安屯田打捕總管府達嚕噶齊總管忠翊侍衛親軍副都指揮使西域親軍副都指揮使宗仁䝉古侍衛副都指揮使山東河北蒙古軍大都督府同知左右翊䝉古侍衛親軍副都指揮使虎賁親軍副都指揮使大都督府副都督右左欽察衛副都指揮使龍翊侍衛親軍副都指揮使大司農丞翰林院直學士䝉古國子監祭酒集賢院直學士集賢院國子監祭酒宣政院斷事官太常禮儀院僉院典瑞院僉院太史院僉院羣玉内司司尉藝文監太監通政院副使中政院僉院儲政院僉院府正司府正昭功萬戸府都總使司同知都䕶府同知崇福司同知武備寺同判太府監太監度支監太監利用監太監中尚監太監章佩監太監經正監太監都水監秘書監太監宣慰使司同知上萬戸府副萬戸中萬戸下萬戸府達嚕噶齊萬戸洮州元帥府十八族元帥府各達嚕噶齊元帥四川茶鹽運司使海道運糧副萬戸都總制庸田副使下路總管府達嚕