body:
  text: 禮嘉后妃命婦首飾制度宋金元明宋皇太后皇后首飾花十二株小花如大花之數并兩博鬢冠飾以九龍四鳯受冊朝謁景靈宫服之妃首飾花九株小花同并兩博鬢冠飾以九暈四鳯受冊服之皇太子妃首飾花九株小花同并兩博鬢受冊朝㑹服之中興之制龍鳯花釵冠大小花二十四株應乗輿冠梁之數博鬢冠飾同皇太后皇后服之髙宗紹興九年定花釵冠大小花十八株應皇太子冠梁之數施兩博鬢去龍鳯皇太子妃服之孝宗乾道七年定命婦首服徽宗政和時議禮局上花釵冠皆施兩博鬢寳鈿飾一品花釵九株二品八株三品七株四品六株五品五株寳鈿準花數受冊從蠶服之七年臣僚言今文臣九品殊以三等之服至於命婦已釐八等之號而服制未有名稱詔有司視其夫之品秩而定其服飾送禮制局定之其儀闕焉臣等謹案遼史不載后妃命婦首飾服章惟言祭山儀皇后御絳帓絡縫紅袍懸玉魚雙結帕絡縫烏鞾命婦服飾各從本部旗幟之色餘無所見云金皇后花珠冠用盛子一青羅表青絹襯金紅羅托裏用九龍四鳯前面大龍銜穗毬一朶前後有花株各十有二及鸂􅈃孔雀雲鶴王母隊仙人浮動挿瓣等後有納言上有金蟬鑻金兩博鬢以上並用鋪翠滴粉縷金裝珍珠結製下有金圈口上用七寳鈿窠後有金鈿窠二穿紅羅鋪金欵幔帶一其命婦首飾許用明金籠金間金元仁宗延祐元年詔定服色等第凡命婦首飾一品至三品許用金珠寳玉四品五品用金玉珍珠六品以下用金惟耳環用珠玉同籍不限親疎期親雖别籍及出嫁同臣等謹案元史及元典章並不載后妃首飾服章惟命婦首飾等差略見於史者如此其詳亦不可得考云明太祖洪武三年定皇后受册謁廟朝㑹禮服其冠圓匡冒以翡翠上飾九龍四鳯大花十二樹小花數如之兩博鬢十二鈿成祖永樂三年重定飾翠龍九金鳯四中一龍銜大珠一上有翠盖下垂珠結餘皆口銜珠滴珠翠雲四十片大珠花小珠花數如舊三博鬢飾以金龍翠雲皆垂珠滴翠口圈一副上飾珠寳鈿花十二翠鈿如其數托裏金口圈一副珠翠面花五事珠排環一對皂羅額子一描金龍文用珠二十一其常服洪武三年定雙鳯翊龍冠首飾釧鐲用金玉珠寳翡翠四年更定龍鳯珠翠冠制如特髻上加龍鳯飾永樂三年又定冠用皂縠附以翠博山上飾金龍一翊以珠翠鳯二皆口銜珠滴前後珠牡丹二花八蕊翠葉三十六珠翠穰花鬢二珠翠雲二十一翠口圈一金寳鈿花九飾以珠金鳯二口銜珠結三博鬢飾以鸞鳯金寳鈿二十四邉垂珠滴金簪二珊瑚鳯冠觜一副皇妃皇嬪及内命婦冠洪武三年定皇妃受冊助祭朝㑹禮服冠飾九翬四鳯花釵九樹小花數如之兩博鬢九鈿常服鸞鳯冠首飾釧鐲用金玉珠寳翠又定山松特髻假鬢花鈿或花釵鳯冠永樂三年更定禮服九翟冠二以皂縠為之附以翠博山飾大珠翟二小珠翟三翠翟四皆口銜珠滴冠中寳珠一座翠頂雲一座其珠牡丹翠穰花鬢之屬俱如雙鳯翊龍冠制第減翠雲十又翠牡丹花穰花各二面花四梅花環四珠環各二九嬪冠服世宗嘉靖十年始定冠用九翟次皇妃之鳯内命婦冠服洪武五年定三品以上花釵四品五品山松特髻貴人視三品以皇妃燕居冠為禮服以珠翠慶雲冠為常服皇太子妃冠洪武三年定禮服與皇妃同常服犀冠刻以花鳯首飾釧鐲俱同皇妃四年定常服冠亦與皇妃同永樂三年更定禮服九翬四鳯冠漆竹絲為匡冒以翡翠上飾翠翬九金鳯四皆口銜珠滴珠翠雲四十片大珠花九樹小珠花數如之雙博鬢飾以鸞鳯皆垂珠滴翠口圈一副上飾珠寳鈿花九翠鈿如其數托裏金口圈一副珠翠面花五事珠排環一對珠皂羅額子一描金鳯文用珠二十一燕居冠以皂縠為之附以翠博山上飾寳珠一座翊以二珠翠鳯皆口銜珠滴前後珠牡丹二花八蕊翠葉三十六珠翠穰花鬢二珠翠雲十六片翠口圈一副金寳鈿花九上飾珠九金鳯一對口銜珠結雙博鬢飾以鸞鳯金寳鈿十八邉垂珠滴金簪一對珊瑚鳯冠觜一副親王妃禮服洪武三年定九翬四鳯冠永樂三年又定九翟冠制同皇妃公主與親王妃同親王世子妃亦與親王妃同惟冠用七翟郡王妃七翟冠與親王世子妃同郡主亦七翟冠惟減四珠環一對郡王長子夫人鎮國将軍夫人及縣主並珠翠五翟冠輔國将軍夫人奉國将軍淑人鎮國中尉恭人郡君並四翟冠輔國中尉宜人奉國中尉安人縣君鄉君並三翟冠其命婦冠服洪武元年定命婦一品冠花釵九樹兩博鬢九鈿二品冠花釵八樹兩博鬢八鈿三品冠花釵七樹兩博鬢七鈿四品冠花釵六樹兩博鬢六鈿五品冠花釵五樹兩博鬢五鈿六品冠花釵四樹兩博鬢四鈿七品冠花釵三樹兩博鬢三鈿四年以古天子諸侯服衮冕后與夫人亦服禕翟今羣臣既以梁冠絳袍為朝服不敢用冕則外命婦亦不當服翟衣命禮部議之奏定命婦以山松特髻假鬢花鈿為朝服以珠翠角冠金珠花釵為燕居服其首飾一品二品金玉珠翠三品四品金珠翠五品金翠六品以下金鍍銀間用珠五年更定品官命婦冠服一品禮服用山松特髻翠松五株金翟八口銜珠結正面珠翠翟一珠翠花四朶珠翠雲喜花三朶後鬢珠梭毬一珠翠飛翟一珠翠梳四金雲頭連三釵一珠簾梳一金簪二珠梭環一常服用珠翠慶雲冠珠翠翟三金翟一口銜珠結鬢邉珠翠花二小珠翠梳一雙金雲頭連三釵一金壓鬢雙頭釵二金腦梳一金簪二金脚珠翠佛面環一雙鐲釧皆金二品特髻上金翟七餘同一品常服亦與一品同三品特髻上金孔雀六正面珠翠孔雀一後鬢翠孔雀二餘同二品常服冠珠翠孔雀三金孔雀二餘同二品四品特髻上金孔雀五餘同三品常服亦與三品同五品特髻上銀鍍金鴛鴦四正面珠翠鴛鴦一小珠鋪翠雲喜花三朶後鬢翠鴛鴦二銀鍍金雲頭連三釵一小珠簾梳一鍍金銀簪二小珠梳環一餘同四品常服冠上小珠翠鴛鴦三鍍金銀鴛鴦二挑珠牌鬢邉小珠翠花二朶雲頭連三釵一梳一壓鬢雙頭釵二鍍金簪二銀脚珠翠佛面環一雙鐲釧皆用銀鍍金六品特髻上翠松三株銀鍍金練鵲四口銜珠結正面銀鍍金練鵲一小珠翠花四朶後鬢翠梭毬一翠練鵲二翠梳四銀雲頭連三釵一珠縁翠簾梳一銀簪二常服冠上鍍金練鵲三又鍍金銀練鵲二挑小珠牌鐲釧皆用銀餘同五品七品禮服常服俱同六品八品九品禮服常服俱用小珠慶雲冠銀間鍍金銀練鵲三又銀間鍍金銀練鵲二挑小珠牌銀間鍍金雲頭連三釵一銀間鍍金壓鬢雙頭釵二銀間鍍金腦梳一銀間鍍金簪二二十六年定一品冠用金事件珠翟五珠牡丹開頭二珠半開二翠雲二十四片翠牡丹葉一十八片翠口圈一副上帶金寳鈿花八金翟二口銜珠結二二品至四品冠用金事件珠翟四珠牡丹開頭二珠半開四餘同一品五品六品冠用抹金銀事件珠翟三珠牡丹開頭二珠半開五翠口圈一副上帶抹金銀寳鈿花八抹金銀翟二口銜珠結二餘同四品七品至九品冠用抹金銀事件珠翟二珠月桂開頭二珠半開六翠雲二十四片翠月桂葉一十八片餘同六品内外官親屬凡祖母及母與子孫同居親弟姪婦女禮服合以本官所居官職品級通用漆紗珠翠慶雲冠唯山松特髻子止許受封誥敕者用之品官次妻許用本品珠翠慶雲冠后妃命婦服章制度宋金明宋制后妃之服一曰褘衣二曰朱衣三曰禮衣四曰鞠衣后之褘衣深青織成翟文素質五色十二等青紗中單黼領羅縠褾襈蔽膝隨裳色以緅為領縁用翟為章三等大帶隨衣色朱裏紕其外上以朱錦下以緑錦紐約用青組革帶以青衣之白玉雙佩黒組雙大綬小綬三間施玉環三青韈舄舄加金飾受冊朝謁景靈宫服之鞠衣黄羅為之蔽膝大帶革舄隨衣色餘同褘衣唯無翟文親蠶服之其朱衣禮衣仍唐制但存其名而已妃褕翟青羅繡為揺翟之形編次於衣青質五色九等素紗中單黼領羅縠褾襈蔽膝隨裳色以緅為領縁以揺翟為章二等大帶隨衣色不朱裏紕其外餘仿皇后之制受冊服之皇太子妃褕翟青織為揺翟之形青質五色九等素紗中單黼領羅縠褾襈皆以朱色蔽膝隨裳色以緅為領縁以揺翟為章二等大帯隨衣色不朱裏紕其外上以朱錦下以緑錦紐約用青組革帶以青衣之白玉雙佩純朱雙大綬章采尺寸與皇太子同受冊朝㑹服之鞠衣黄羅為之蔽膝大帶革帶隨衣色餘與褕翟同唯無翟從蠶服之其常服后妃大袖生色領長裙霞帔玉墜子背子生色領皆用絳羅與臣下不異命婦服徽宗政和中議禮局上翟衣青羅繡為翟編次於衣及裳一品翟九等二品八等三品七等四品六等五品五等並素紗中單黼領朱褾襈通用羅縠蔽膝隨裳色以緅為領縁加文繡重雉為章二等大帶革帶青韈舄佩綬受冊從蠶服之金皇后褘衣深青羅織成翬翟之形素質十二等領褾襈並紅羅織成雲龍素青紗中單領織黼形十二褾袖襈織成雲龍並織紅縠造裳八幅深青羅織成翟文六等褾襈織成紅羅雲龍明金腰帶蔽膝深青羅織成翟文三等領縁緅色羅織成雲龍明金𢃄大綬一長五尺濶一尺黄赤白黑縹緑六彩織成小綬三色同大綬間七寳鈿窠施三玉環上碾雲龍撚金線織成大小綬頭紅羅花襯大帶青羅朱裏紕其外上以朱錦下以緑錦紐約用青組撚金線織成帶頭玉佩二朶每朶上中下璜各一半月墜子各二並玉碾縷金打鈒獸面箆鉤佩子各一水葉子珍珠穿綴青衣革帶用縷金青羅裹造上用金打鈒水地龍鵝眼䤩尾龍口攀束子共八事以玳瑁襯金釘脚抹帶二紅羅青羅各一並明金造各長一丈五寸舄以青羅製白綾裏如意頭明金黄羅準上用玉鼻仁真珠裝韈青羅表裏並綴繫帯宗室及外戚并一品命婦衣服聴用明金期親雖别籍女子出嫁並同又五品以上官母妻許披霞帔唯首飾霞帔領袖腰帶許用明金籠金間金之類其衣服止用明銀象金及金條壓繡金婦人服䄡裙多以黑紫上編繡全枝花周身六􅀈積上衣謂之團衫用黒紫或皂及紺直領左衽掖縫兩旁復為雙􅀈積前拂地後曳地尺餘帶色用紅黄前雙垂至下齊年老者以皂紗籠髻如巾狀散綴玉鈿於上謂之玉逍遥此皆遼制也金亦襲之明太祖洪武三年定皇后褘衣深青繪翟赤質五色素紗中單黻領朱羅縠褾襈裾蔽膝隨衣色以緅為領縁用翟為章三等大帶隨衣色朱裏紕以朱緑錦紐約用青組玉革帶青韈青舄以金飾成祖永樂三年重定翟衣深青織翟文十有二等間以小輪花紅領褾襈裾織黼文十三蔽膝隨衣色織翟為章三等間以小輪花四以緅為領縁織金雲龍文玉榖圭剡其上瑑榖文黄綺約其下韜以黄囊金龍文玉革帶青綺鞓描金雲龍文玉事件十金事件四大帶表裏俱青紅相半末純紅下垂織金雲龍文上朱縁下緑縁青綺副帶一綬五采黄赤白縹緑纁質間施二玉環皆織成小綬三色同大綬玉佩二各用玉珩一瑀一琚二衝牙一璜二瑀下垂玉花一玉滴二瑑飾雲龍文描金自珩而下繫組五貫以玉珠行則衝牙二滴與二璜相觸有聲上有金鉤有小綬五采以副之纁質織成青韈舄飾以描金雲龍皂純每舄首加珠五顆其常服洪武三年定諸色團衫金繡龍文帶用金玉四年更定真紅大袖衣霞帔紅羅長裙紅褙子衣用織金龍文加繡飾永樂三年又定大衫霞帔衫黄霞帔深青織金雲霞龍文或繡或鋪翠圈金飾以珠玉墜子瑑龍文四䙆襖子即褙子深青金繡團龍文鞠衣紅色前後織金雲龍文或繡或鋪翠圈金飾以珠大帶紅綫羅為之有縁餘或青或緑各隨鞠衣色縁襈襖子黄色紅領褾襈裾皆織金采色雲龍文縁襈裙紅色緑縁襈織金采色雲龍文玉帶如翟衣内制第減金