body:
  text: 州郡金上京路北京路咸平路西京路東京路中都路金之壤地封疆東極吉林蜜雅呼逹噶境北自扶餘路之北三千餘里和羅和博穆昆地為邊右旋入泰州博勒果所浚界壕而西經臨潢金山跨慶桓撫昌淨州之北出天山外包東勝接西夏逾黄河復西歴葭州及米脂寨出臨洮府㑹州積石之外與生羌地相錯復自積石諸山之南左折而東逾洮州越鹽州堡循渭至大散關北竝山入京兆絡商州南以唐鄧西南皆四十里取淮之中流為界而與宋為表裏襲遼制建五京置十四總管府是為十九路其間散府九節鎮三十六防禦郡二十二刺史郡七十三軍十有六縣六百三十二後復盡升軍為州或升城堡寨鎮為縣是以金之京府州凡百七十九縣加於舊五十一城寨堡關百二十二鎮四百八十八東極海西逾積石北過隂山南抵淮漢地方萬餘里上京路即哈爾呼之地金之舊土也國初稱為内地太宗天眷元年號上京海陵貞元二年遷都於燕削上京之號止稱㑹寧府世宗大定十三年七月復為上京府一領節鎮四防禦一縣六鎮一㑹寧府下初為㑹寧州太宗以建都升為府熙宗天眷元年置上京留守司以留守帶本府尹兼本路兵馬都總管後置上京海蘭等路提刑司領縣三㑹寧倚與府同時置曲江初名鎮東大定七年置十三年更今名宜春大定七年置肇州下防禦使舊珠赫店也太宗天㑹八年以太祖兵勝遼肇基王績於此遂建為州天眷元年十月置防禦使𨽻㑹寧府海陵時嘗為濟州支郡章宗承安三年升為節鎮軍名武興五年置漕運司以提舉兼州事後廢軍宣宗貞祐二年復升為武興軍節鎮置招討司以使兼州事領縣一始興倚與州同時置隆州下利渉軍節度使本遼黄龍府金天眷三年改為濟州置利渉軍海陵天德二年置上京路都轉運司四年改為濟州路轉運司大定二十九年嫌與山東路濟州同更今名貞祐初升為隆安府領縣一利渉倚與州同時置鎮一與縣同時置信州下彰信軍刺史本渤海懷逺軍遼聖宗開泰七年建取諸路漢民置領縣一武昌本渤海懐福縣地鎮一八千戸扶餘路國初置萬戸海陵例罷萬戸乃改置節度使承安三年設節度副使海蘭路置總管府貞元元年改總管為尹仍兼本路兵馬都總管承安三年設兵馬副總管率賔路節度使遼時為率賔府置刺史金天㑹二年以扎蘭路都貝勒所居地瘠遂遷於此以海陵例罷萬戸置節度使因名率賔路節度使大定十一年以扎蘭率賔相去千里既居率賔然不可忘本遂命名親管明安曰扎蘭明安承安三年設節度副使哈斯罕路置節度使天㑹七年徙治寧州嘗置都統司章宗明昌四年廢和囉噶路國初置萬戸海陵例罷萬戸乃改置節度使承安三年置節度副使烏克蘇喇統軍司後升為招討司與扶餘路近咸平路府一領刺郡一縣十咸平府下總管府安東軍節度使本遼咸州金初為咸州路置都統司天徳二年八月升為咸平府後為總管府置遼東路轉運司東京咸平路提刑司領縣八按元史地理志金咸平府領平郭安東新興慶雲清安歸仁六縣與金史異謹附識平郭倚舊名咸平大定七年更銅山遼同州鎮安軍遼太祖時以東平寨置因名東平軍曰鎮東金大定二十九年以與東平重故更新興遼屬銀州富國軍金熙宗皇統三年廢州更名來屬慶雲遼屬祺州祐聖軍本以所俘檀州宻雲民建州宻雲後更名清安遼肅州信陵軍金皇統三年降為縣榮安歸仁遼舊𨽻通州安逺軍本渤海强師縣遼更名玉山承安三年以穆蘇集平郭林河之間相去六百餘里之地置貞祐二年升為節鎮軍曰鎮安韓州下刺史遼置東平軍本渤海鄚頡府領縣二臨津倚未詳何年置栁河本渤海粤喜縣地遼以栁河名縣東京路府一領節鎮一刺郡四縣十七鎮五遼陽府中東京留守司本遼東京金天㑹十年改南京路平州軍帥司為東南路都統司之時嘗治於此以鎮髙麗後置兵馬都部署司天徳二年改為本路都總管府後更置留守司領縣四案元史地理志金領遼陽鶴野二縣當是遺去宜豐石城二縣謹附識鎮一遼陽倚鶴野鎮一長宜哈斯罕在其地宜豐遼舊衍州安廣軍金皇綂三年廢為縣石城宣宗興定三年九月以縣之靈巖寺為巖州名其倚郭縣曰東安置行省澄州南海軍刺史下本遼海軍天徳三年改州名領縣二鎮一臨溟鎮一新昌析木遼同州廣利軍附郭縣也金皇綂三年廢州來屬案同州遼史地理志作銅州謹附識瀋州昭徳軍刺史中本遼定理府地遼太宗時置軍曰興逺案遼史地理志逺作遼謹附識後為昭徳軍置節度案元史地理志云金為昭徳軍又更顯徳軍謹附識金明昌四年改為刺史與通貴徳澄三州皆𨽻東京領縣五樂郊遼太祖俘三河之民建三河縣於此後改今名章義遼舊廣州金皇綂三年䧏為縣來屬遼濵遼舊遼州東平軍遼太宗改為始平軍金皇綂三年廢為縣挹樓遼舊興州興中軍常安縣嘗置定理府刺史於此本挹樓故地金大定二十九年章宗更名䨇城遼䨇州保安軍也金皇綂三年䧏為縣章宗時廢貴德州刺史下遼貴德州寧逺軍金初廢軍降為刺郡領縣二貴德倚奉集遼屬集州懐逺軍與案遼史地理志作懐衆軍金史異謹附識蓋州奉國軍節度使下本髙麗蓋葛牟城遼辰州金明昌四年罷哈斯罕建辰州遼海軍節度使六年以與陳同音更取蓋葛牟為名領縣四鎮二湯池遼屬鐵州建武軍鎮一神鄉建安遼縣鎮一大寧秀巖本大寧鎮明昌四年升為縣泰和四年仍廢為鎮貞祐四年復置熊岳遼屬盧州元徳軍復州下刺史遼懐逺軍節度案遼史地理志作懐徳軍節度與金史異謹附識金明昌四年䧏為刺史領縣二鎮一永康倚舊名永寧大定七年更化成遼蘇州安復軍金皇統三年降為縣來屬貞祐四年升為金州興定二年升為防禦鎮一歸勝來逺州下舊來逺城本遼熟女直地金大定二十二年升軍後為州博索府路金初置統軍司天徳二年置總管府貞元元年與海蘭路總管並為尹兼本路兵馬都總管此路皆明安戸北京路府四領節鎮七刺郡三縣四十二鎮七寨一堡五十六大定府中北京留守司遼中京金初因之貞元元年更為北京置留守司都轉運司警廵院領縣十一鎮二大定倚遼縣舊名鎮一恩化長興案方輿紀要云契丹置長安縣今改為長興縣金史未詳謹附識富庶鎮一文安松山遼松山州勝安軍松山縣開泰中置刺史太祖天輔七年置觀察使皇統三年廢州來屬承安三年𨽻髙州泰和四年復案遼史地理志作松江州松江縣與金志異據遼志大定府注云有松山松江縣注同似當從金志為是謹附識神山遼屬澤州金承安二年嘗置惠州升孩兒館為灤陽縣以𨽻之泰和四年罷州及灤陽縣惠和皇統三年以遼惠州惠和縣置金源唐青山縣遼開泰二年置以地有金甸為名和衆遼屬榆州金皇統三年罷州來屬武平遼築城杏堝初名新州聖宗綂和間改為武安州金皇綂三年䧏為武安縣來屬大定七年更名承安三年𨽻髙州泰和四年復來屬靜封承安二年以和錫務置𨽻全州三年隸髙州泰和四年來屬三韓遼伐髙麗遷馬韓辰韓弁韓三國民為縣置髙州金天輔七年以髙州置節度使皇綂三年廢為縣承安三年復升為髙州置刺史為全州支郡分武平松山静封三縣𨽻焉泰和四年廢利州下刺史遼統和十六年置領縣二鎮一寨一阜俗遼統和四年置金因之龍山遼故潭州廣潤軍縣金皇統三年廢州來屬寨一蘭州鎮一漆河義州下崇義軍節度使遼宜州金天德三年更州名領縣三鎮一𢎞政開義遼海北州廣化軍縣金皇綂三年廢州來屬鎮一饒慶同昌遼成州興府軍縣金初𨽻川州大定六年罷川州𨽻懿州承安二年復𨽻川州泰和四年來屬錦州下臨海軍節度使舊𨽻興中府後來屬領縣三永樂本慕容皝西樂縣地安昌神水遼開泰二年置金皇統三年廢為鎮大定二十九年復升為縣瑞州下歸德軍節度使本來州天德三年更為宗州泰和六年以避睿宗諱謂本唐瑞州地故更今名領縣三鎮一瑞安舊名來賔唐來逺縣也金明昌六年更為宗安泰和六年復更今名海陽遼潤州海陽軍故縣金皇統三年廢州來屬鎮一遷民海濵本遼隰州海平軍故縣金皇統三年廢州來屬廣寧府散下鎮寧軍節度使本遼顯州奉先軍金天輔七年升為府因軍名置節度天㑹八年改軍名鎮寧天德二年𨽻咸平後廢軍𨽻東京泰和元年七月來屬領縣三舊有奉先縣天㑹八年改為鍾秀縣鎮六寨四鎮二歡城遼西廣寧舊名山東縣大定二十九年更名有遼世宗顯陵鎮寨二閭城兒窩望平大定二十九年升梁漁務置鎮一閭陽遼乾州廣徳軍奉陵縣金天㑹八年廢州更名來屬有遼景宗乾陵鎮一閭陽衡家寨二大斧山北川懿州下寧昌軍節度使遼嘗更軍名慶懿又為廣順復更今名金因之先𨽻咸平府泰和末來屬領縣二大定六年罷川州以宜民同昌二縣來屬承安二年復以二縣𨽻川州泰和四年罷川州以宜民𨽻興中同昌𨽻義州順安靈山本渤海靈峰縣地興中府散下本遼霸州彰武軍興宗重熙十一年升為府更今名金因之領縣四鎮三興中本唐栁城地鎮一黔城永德遼安徳州化平軍安德縣金大定七年更今名鎮一阜安興城遼嚴州保肅軍縣金皇統三年廢州隸錦州宜民遼川州長寧軍會同中嘗名白川州天禄五年去白字金初因之與同昌縣皆𨽻焉大定六年降為宜民縣𨽻懿州承安二年復置川州改徽川寨為徽川縣為懿州支郡泰和四年罷州及徽川縣來屬鎮一咸康遼縣也金初廢為鎮建州下保靖軍刺史遼初名軍曰武寧後更金因之領縣一永霸本唐昌黎縣地全州下盤安軍節度使承安二年置改和錫務為靖封縣案方輿紀要云尋廢靖封縣以盧川縣屬臨潢府金史不言靖封之廢謹附識黑河舖為盧川縣撥北京三韓縣拉呼等五明安以𨽻焉貞祐二年嘗僑置於薊州領縣一安豐承安元年改豐州舖為安豐縣𨽻臨潢府三年置全州盤安軍節度使治臨潢府下總管府遼為上京金初因之天眷元年改為北京天徳二年改北京為臨潢府路以北京路都轉運司為臨潢府路轉運司三年罷貞元元年以大定府為北京後但置北京臨潢路提刑司大定後罷路併入大定府路貞祐二年嘗僑置於平州領縣五堡三十七大定間二十四後增臨潢倚長泰盧川承安二年以黒河舖升𨽻全州後復來屬寧塞泰和元年置長寧遼永州永昌軍縣金天輔七年嘗置節度使皇統三年廢州來屬慶州下元寧軍刺史境内有祖州天㑹八年改為奉州皇統三年廢境内有遼懐州舊置奉陵軍天㑹八年更為奉徳軍皇統三年廢領縣一舊有孝安縣天㑹八年改為慶民縣皇統三年廢朔平有𣙜塲務言案遼史地理志慶州領元徳孝安二縣金史廢孝安而不及元德據方輿紀要云改置朔平縣廢元徳縣入焉當以方輿紀要為是謹附識興州寧朔軍節度使本遼北安州興化軍興化縣金承安五年升為興州置節度軍名寧朔改利民寨為利民縣撥宻齊顯河圖們必罕寧江蘇瑪拉三明安𨽻焉貞祐二年僑置於宻雲縣領縣二又有利民縣承安五年以利民寨升泰和四年廢興化倚遼舊縣金皇統三年䧏興化軍置𨽻大定府承安五年建興州於縣為倚郭宜興本興化縣白檀鎮泰和三年升為縣泰州昌徳軍節度使遼時本契丹二十部族牧地海陵正隆間置昌德軍𨽻上京大定二十五年罷之承安三年復置於長春縣以舊泰州為金安縣𨽻焉領縣一舊有金安縣承安三年置尋廢堡十九長春遼長春州韶陽軍金天徳二年降為縣𨽻肇州承安三年來屬西京路府二領節鎮七刺郡八縣四十鎮九大同府中西京留守司遼西京大同府金因之皇統元年以燕京路𨽻尚書省西京及山後諸部族𨽻元帥府舊置兵馬都部署司天徳二年改置本路都總管府後更置留守司置轉運司及中部西京路提刑司領縣七鎮三大同倚遼析雲中置鎮一奉義雲中晉舊縣宣寧遼徳州昭聖軍宣德縣金大定八年更名鎮一窟龍城懐安晉故縣天城遼析雲中置白登本名長清大定七年更懐仁遼析雲中置金貞祐二年升為雲州鎮一安七疃豐州下天徳軍節度使遼嘗更軍名應天尋復金因之皇統九年升為天徳總管府置西北路招討司以天徳尹兼領之大定元年降為天徳軍節度使兼豐州管内觀察使以元管部族直薩軍馬公事並𨽻西南路招討司領縣一鎮一富民晉舊名鎮一振武𢎞州下刺史遼名軍曰博寧本襄隂村統和中建金初置保寧軍後廢軍領縣二鎮二襄隂倚本名永寧大定七年改順聖本安塞軍故地遼應歴中置金因之鎮二陽門貞祐二年升為縣大羅浄州下刺史大定十八年以天山縣升為豐州支郡刺史兼權機察領縣一天山舊為𣙜場大定十八年置為倚郭桓州下威逺軍節度使軍兵𨽻西北路招討司明昌七年改置刺史領縣一清塞倚明昌四年以罷録事司置撫州下鎮寧軍節度使遼秦國大長公主建為州金明昌三年復置刺史為桓州支郡治柔逺四年置司候司承安二年陞為節鎮軍名鎮寧撥西北路招討司所管宻齊顯必喇温都必喇納琳卓果斯桑噶錫徳琿四明安以𨽻之領縣四柔遠倚大定十年置於燕子城𨽻宣德州明昌三年來屬集寧明昌三年以春市塲置豐利明昌四年以泥濼置威寧承安二年以新城鎮置德興府遼奉聖州武定軍節度金初因之大安元年升為府名德興領縣六鎮一德興倚舊名永興縣大安元年更名媯川本晉媯州遼嘗名汗州縣舊曰懐戎更名懐來金明昌六年更今名縉山遼儒州縉陽軍縣金皇統元年廢州來屬崇慶元年升為鎮州鎮案方輿紀要延慶州注云皇統初州廢崇慶初復置州旋廢縉山廢縣注云金州廢縣屬徳興府金史未晰謹附識鎮一永安望雲本望雲川地遼主嘗居號曰御莊後改為縣金因之礬山晉故縣金初𨽻𢎞州明昌三年來屬龍門晉縣金初𨽻𢎞州後來屬明昌三年割𨽻宣徳州昌州天輔七年降為建昌縣𨽻桓州明昌七年以狗濼復置𨽻撫州案方輿紀要云明昌七年復置昌州屬德興府與金史異謹附識後來屬領縣一寶山宣德州下刺史遼改晉武州為歸化州雄武軍金大定七年更為宣化州八年復更為宣德領縣二宣德舊文徳縣大定三十九年更名宣平承安二年以大新鎮置以北邉用兵嘗駐此地朔州中順義軍節度使貞祐三年七月嘗割朔州廣武縣𨽻代州領縣二鄯陽晉故縣馬邑晉故縣金貞祐二年升為固州武州邉下刺史大定前仍置宣威軍領縣一寧逺晉故縣應州下彰國軍節度使領縣三金城晉故縣山隂本名河隂大定七年以與鄭州屬縣同故更焉貞祐二年升為忠州渾源晉縣金貞祐二年升為渾源州案元史地理志云升為渾源州仍置渾源縣金史未詳謹附識蔚州下忠順軍節度使遼嘗更為武安軍尋復領縣五靈仙廣靈亦作陵遼統和三年析靈仙置靈邱晉縣金貞祐二年升為成州四年割為代州支郡定安晉縣金貞祐二年升為定安州飛狐晉縣雲内州下開逺軍節度使天㑹七年徙奚第一第三部來戍領縣二鎮一柔服鎮一寧仁舊縣也大定後廢為鎮雲川本哈逹罕後升為裕民縣皇統元年復廢為哈逹罕大定二十九年復升更今名寧邉州下刺史金初置鎮西軍貞祐三年𨽻嵐州四年二月升為防禦領縣一寧邉正隆三年置東勝州邉下刺史金初置武興軍領縣一鎮一東勝鎮一寧化中都路遼太宗會同元年為南京開泰元年號燕京金貞元元年定都以燕乃列國之名不當為京師號遂改為中都府一領節鎮三刺郡九縣四十九鎮七大興府上遼南京府曰幽都仍號盧龍軍開泰元年更為永安析津府金天㑹七年析河北為東西路時屬河北東路貞元元年更今名領縣十鎮一大興倚遼名析津貞元二年更今名鎮一廣陽宛平倚本晉幽都縣遼開泰二年改安次晉舊名漷隂遼太宗太平中以漷隂村置永清晉舊名霸案方輿紀要云永清縣宋初為州治景祐二年并入文安縣金復置金史未詳謹附識寶坻本新倉鎮大定十二年置以香河縣近民附之承安三年升置盈州為大興府支郡以香河武清𨽻焉尋廢州香河遼以武清縣之孫村置昌平武清晉縣良鄉通州下刺史天徳三年升潞縣置以三河𨽻焉興定二年升為防禦領縣二潞晉縣三河晉縣薊州中刺史遼置上武軍案遼史地理志上作尚謹附識領縣五舊有永濟縣大定二十七年以永濟務置未詳何年廢又有黎豁縣廢置皆未詳鎮二漁陽倚遵化遼景州淸安軍鎮一石門豐潤泰和間置濟案續輿地考云本玉田縣之永務金升為豐潤縣金史未詳謹附識玉田鎮一韓城平峪大定二十七年以漁陽縣大王鎮升易州下刺史遼置髙陽軍領縣二易淶水涿州中刺史遼為永泰軍領縣五鎮一范陽倚晉縣鎮一政滿固安晉縣新城定興大定六年以范陽縣黄村置割淶水易縣近民屬之奉先大定二十九年置萬寧縣以奉山陵明昌二年更今名案續輿地考云金析良鄉宛平范陽三縣地置萬寧縣金史未詳謹附識順州下刺史遼置歸化軍領縣二温陽舊名懐柔明昌六年更名宻雲遼檀州武威軍平州中興平軍節度使遼為遼興軍金天輔七年以燕西地與宋遂以平州為南京以錢帛司為三司天會四年復為平州嘗置軍帥司十年徙軍帥司治遼陽府後置轉運司貞元元年以轉運司併𨽻中都路貞祐二年置東面經略司尋罷領縣五鎮一盧龍倚撫寧本新安鎮大定二十九年置海山本漢海陽故城遼以所俘望都縣民置故名望都金大定七年更名遷安本漢令支縣故城遼以所俘安喜縣民置因名安喜金大定七年更今名鎮一建昌昌黎遼營州鄰海軍以所俘定州民置廣寧縣金皇統二年䧏州來屬太定二十九年以與廣寧府重故更名灤州中刺史本黄洛故城遼為永安軍金天輔七年因置節度使領縣四鎮二義豐倚石城鎮一榛子馬城樂亭案方輿紀要樂亭縣大定末置金史未載謹附識鎮一新橋雄州中天㑹七年置永定軍節度使賜名易陽郡𨽻河北東路貞元二年來屬領縣三歸信倚并案方輿紀要金遼涿州所領之歸義縣入歸信為雄州治金史未詳謹附識容城泰和八年割𨽻安州貞祐三年𨽻安肅州保定宋保定軍後廢為縣戎案宋史地理志本涿州新鎮地太平興國六年置平軍景徳初改保定軍宣和七年降為保定縣屬莫州方輿紀要云宋屬莫州金屬雄州金史未晰謹附識霸州下刺史遼益津郡𨽻河北東路金貞元二年來屬領縣四益津倚大定二十九年剏置文安大成信安金初因宋為信安軍大定七年降為信安縣𨽻霸州宣宗元光元年升為鎮安府保州中順天軍節度使宋舊軍事金天㑹七年置順天軍節度使𨽻河北東路貞祐二年來屬海陵賜名清苑郡領縣二清苑倚宋名保寨金大定十六年更滿城大定二十八年以清苑縣塔院村置安州下刺史宋順安軍治髙陽金天㑹七年陞為安州𨽻河北東路後置髙陽軍大定二十八年徙治葛城因升葛城為縣作倚郭泰和四年改混泥城為渥城縣來屬八年移州治於渥城以葛城為屬縣領縣三渥城倚泰和四年置葛城大定二十八年置髙陽泰和八年改𨽻莫州尋復故遂州下刺史宋廣信軍金天㑹七年改為遂州𨽻河北東路貞元二年來屬號龍山郡泰和四年廢為遂城縣𨽻保州貞祐二年復置州領縣一遂城倚安肅州下刺史宋安肅軍金天㑹七年升為徐州軍如舊𨽻河北東路貞元二年來屬天徳三年改為安肅州軍名徐郡軍大定後降為刺郡廢軍領縣一安肅按金初州郡志雄霸保安遂安肅六州皆𨽻廣寧府太宗紀載天㑹七年分河北為東西路則𨽻河北東路豈以平州為南京之後以六州𨽻廣寧也不然則州郡志誤欽定續通典卷一百三十一
