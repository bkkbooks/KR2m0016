body:
  text: 刑臣等謹按杜佑作刑典凡十有一門曰刑制曰雜議曰肉刑議曰詳讞曰決斷考訊附曰守正曰赦宥禁屠殺贖生附曰寛恕曰囚繫曰舞紊曰峻酷竊惟刑法者帝王宰世之大權舜命臯陶曰惟明克允明以言其權衡之至當允以言其施措之不撓是以罪惟天討刑歸衆棄胥視其人之自取無或畸輕畸重於其間而協巾之治成焉唐自開元已前舊典畧備徳宗而後刑制畧准開元而憲宗以流代殺爰有廢法之弊五代政刑紊亂初無典要可述宋承其敝釐正刑章㫖歸平恕而得失並存詔獄之興姦權藉手三尺下移致乖公論而傷國脉遼初法尚嚴峻厥後互有重輕金則兼修隋唐宋遼之制明昌泰和間律義頗稱詳善元代用輕典而南北異制吏得舞法行私論者以為失在縱弛信已明法簡覈過於唐寛厚不如宋若其東西厰之設廷杖之制一朝秕政流毒無窮亦前代所未有也兹續纂是書一如舊目惟考肉刑後世乆廢宜不立專門改附雜議並參馬端臨通考之例増贖刑門以昭詳備焉第一刑制上第二刑制下第三雜議一第四雜議二第五雜議三第六雜議四第七詳讞第八決斷考訊附第九守正第十贖刑第十一赦宥禁屠殺贖生附第十二寛恕囚繫第十三舞紊第十四峻酷刑制上唐五代宋遼金唐徳宗貞元八年詔凡罪至死者先決杖宜停具寛恕篇憲宗時刪天寳以後敇為開元格後敕元和八年詔兩京闗内河東河北淮南山南東西道死罪十惡殺人鑄錢造印若强盜持杖劫京兆界中及他盜贓踰三疋者論如故其餘死罪皆流天徳五城父祖子孫願隨者勿禁詔天徳軍五城及諸邉城配流人准格例滿日六年後並許放還文宗時命尚書省郎官各刪本司敇丞與侍郎覆視中書門下察其可否而奏之為太和格後敇開成三年採開元二十六年以後至於開成制敕刪其繁者為開元詳定格武宗時詔竊盜贓滿千錢者死㑹昌五年制據律已去任者公罪流以下勿論公罪之條情有輕重茍渉欺詐豈得勿論自後公罪有情狀難恕並不在勿論之限宣宗時左衛率府倉曹參軍張戣以刑律分類為門附以格敇為大中刑律統類詔頒行之又詔竊盜滿三疋者死如建中時制大中五年敕今後有官典犯贓及諸色取受能於未發覺以前陳首即准律文減等如知事發已有萌肇雖未被追捕勘問亦不在陳首之限七年敇法司斷罪每脊杖一下折法杖十下臀杖一下折笞杖五下八年敕估絹結贓天下均依上都例以一千一百九十文為陌計贓絹一疋僖宗乾符四年敕自後州縣官所犯諸罪五年之後去任勿論五年内同現任官例追收據事定例梁太祖開平四年刪定令三十巻式二十卷格一十卷律併目録十三卷律疏三十卷共一百三巻為大梁新定律令格式頒行之後唐莊宗同光二年廢梁新格行開成格三年大理寺奏凖斷獄律諸立春後秋分以前不得奏決死刑違者徒一年今寺司案牘相次若凖律文俟秋分後申奏恐刑獄遲滯詔以諸司囚徒並宜據罪詳斷輕者即時疏理重者候過立春至秋分後然後行法如事繫軍機或謀為惡逆或藴蓄姦邪或行劫殺人難於留滯不在此限明宗長興四年大理正張仁瑑奏伏見諸道州府刑殺罪人雖有骨肉尋時不容収瘞或殘害尸髪多致邀求凖獄官令諸大辟罪並官給酒食聴親故辭訣宣告犯狀日未後行刑決之經宿所司即為埋瘞若有親故亦任収𦵏又諸囚死無親戚者官給棺於官地埋瘞置銘壙内立碑塜上書姓名請依令指揮從之晉天福七年詔應大辟罪者遇大祠冬正受朝立春立夏及大雨雪並不論決漢髙祖時敕凡强盜捉獲不計􅂍物多少按騐不虚並宜處死又詔下州縣凡盜所居本家及隣保皆誅具峻酷篇周太祖廣順二年敕民有訴訟必先歴縣州及觀察使處決不真乃聴詣臺省或倩人書牒者必書所倩姓名居處若無可倩聴執素紙所訴必須已事無得挾私妄訴世宗顯徳四年以法書文義古質條目繁細前後敕格差繆重疊難於詳究令侍御史知雜事張湜等編集新格律令有難解者就文訓釋格敕有繁雜者隨事刪除有輕重未當便於古而不便於今矛盾相攻可於此而不可於彼盡宜改正編集竣日委御史臺尚書省四品以上官及兩省五品以上官參詳可否送中書門下定議五年七月書成凡二十一卷為大周刑統與律疏令式通行其刑法統類開成編敕等採掇既盡不在法司行使之限至舊有宣命指揮公事及三司臨時條法州縣見今施行不在編集之數者令本司刪集送中書門下詳議奏聞是年敕州縣自長官以下因公事行責情杖不得過臀杖十五因責情杖致死者具事由奏聞又敕諸盜經斷後仍更行盜前後三犯並曾經官司推問伏罪者不問赦前後贓多少並決殺宋太祖建隆三年定大辟詳覆法具詳讞篇詔自今竊盜贓滿五貫者死先是漢乾祐以來用法嚴急民盜一錢者死周太祖時改令竊盜贓滿三疋棄市建隆二年增為錢三千陌以八十為限至是又有是詔定折杖法凡流刑四加役流脊杖二十配役三年流三千里脊杖二十二千五百里脊杖十八二千里脊杖十七並配役一年徒刑五徒三年脊杖二十二年半脊杖十八二年脊杖十七一年半脊杖十五一年脊杖十三杖刑五杖一百臀杖二十九十臀杖十八八十臀杖十七七十臀杖十五六十臀杖十三笞刑五笞五十臀杖十下四十三十臀杖八下二十臀杖七下常行官杖如周顯徳五年制長三尺五寸大頭濶不過二寸厚及小頭徑不過九分徒流笞通用常行杖徒罪決而不役乾徳四年判太理寺竇儀上重定刑統三十卷削去令式宣敕一百九十增制敕十五又録律内餘律准此者四十四條附名例之次又别取格令宣敕之削出及續降應用者一百六條共為四巻曰新編敇詔與刑統並行參酌輕重世稱平允詔蜀郡有不省父母疾者罪之又詔士庶有閹童男者不赦開寳二年八月詔川峽諸州察民有父母在而别籍異財者論死太宗八年除其律四年十月詔偽作黄金者死又詔十月後犯强竊盜者郊赦不原太宗以國初沿五代之制罪人率配隸西北邊多亡投塞外誘羌戎為患乃詔當徙者勿復隸秦州靈武通逺軍及縁邊諸郡時江廣已平乃皆流南方太平興國元年命諸州大索知天文術數人送闕下匿者論死二年七月詔諸庫藏敢變權衡以取羨餘者死十月詔禁天文卜相等書私習者斬又禁江南諸州新小錢私鑄者死十二月試諸州所送天文術士隸司天臺無取者黥配海島三年命有司取國初以來敕條纂太平興國編敕十五卷五月詔中外臣庶有子弟素懐凶險屢戒不悛者尊長聞諸州縣錮送闕下配隸逺方如隠不以聞坐及期功以上六月詔諸職官以贓致罪者雖㑹赦不得叙五年詔配役者分𨽻鹽亭役使先是犯死罪獲貸者多配隸登州沙門島通州海島皆屯兵使者領䕶而通州島中凡兩處豪强難制者隸崇明鎮懦弱者隸東布州兩處悉官煮鹽是嵗始令分隸鹽亭役之而沙門如故又詔諸犯徒流罪並配所在牢城勿復錮送闕下六年詔長吏每五日一慮囚情得者即決之具詳讞篇詔自今繼母殺傷夫前妻子及前妻子婦者同凡人論十年五月令竊盜滿十貫者奏裁七貫決杖黥面隸本城五貫配徒三年三貫二年一貫一年他如舊制雍熙元年令諸州笞杖罪不須證逮者長吏即決之勿復付所司三年定制凡斷獄失入死刑者不得以官減贖檢法官判官皆削一任撿法仍贖銅十斤長吏停任端拱二年詔免嶺南流配荷校執役令婦人有罪至流者免配役具寛恕篇淳化元年閏二月詔京城犯蒱博者斬二年詔凡太嵗三元及上慶誕日兩京諸州不決死罪餘如故三年詔江南兩浙荆湖吏民之配嶺南者還本郡禁錮至道二年詔川峽諸州民家先藏兵器者限百日悉送官匿不以聞者斬真宗咸平中以編敇萬八千五百五十五條刪定二百八十六條為十一卷又别為儀制令一卷當時便其簡易三年以浙江荆湖廣南逺地凡强盜及持杖不死者并捕其屬至京師多殞於道詔自今止決杖黥面配所在五百里外牢城六年詔有盜主財者五貫以上杖脊黥面配牢城十貫以上奏裁勿得私黥湼景徳元年詔民間天象器物䜟候禁書並納所司焚之匿不言者死四年詔諸路提㸃刑獄司如有刑獄枉濫不能摘發官吏曠弛不能弹奏者罪之又官吏因公事受財許為曲法決遣之際仍依法科行巧避枉法之罪證左明白者以枉法論至死者加役流又杖罪械繫者枷以十五斤為凖大中祥符四年詔自今決杖令衆者舊十日減為三日半月以上勿過五日暑月免之七年增編敕三十卷一千七十四條又景徳農田敕五卷與敇並行詔諸州長吏有罪自首如實未顯露即以狀報轉運使雖格當原免亦書於律天禧二年敕命官犯贓不以輕重並劾舉之私罪杖以下勿論定制自今捕盜掌獄官不禀長吏而捶囚不甚傷而得情者以違制失公論過差而不得情挾私拷決有所規求者以違制私論又捕盜官有捕捉稽時不即聞州者以違制失論又律有被制書有所施行而違者徒二年失錯者杖一百令法官斷罪除每行條貫元敕指定違制外自餘情輕失錯者止從違制失論其公私相半而私情重者奏裁四年詔天下犯十惡劫殺謀殺故殺鬭殺放火强劫正枉法贓偽造符印厭魅咒咀造妖書妖言傳授妖術合造毒藥禁軍諸軍逃亡為盜罪至死者毎遇十一月權止區斷過天慶節即決之餘犯至死者十二月及春夏未得區遣禁錮奏裁具雜議篇仁宗天聖四年命官刪定敕令當時編敇自大中祥符七年重修後復增至六千餘條因令刪定是嵗書成共三十卷合農田敕為一書大辟之屬十有七流之屬三十有四徒之屬百有六杖之屬二百五十有八笞之屬七十有六又配隸之屬六十有三大辟而下奏聴㫖者七十有一詔下諸路閲視聴言其未便者既又詔須一年無改然後鏤版又以唐令有與本朝事異者亦命官修定取咸平儀制及制度約束之在敕者五百餘條附令後號曰附令敕六年集賢校理聶冠卿請罷覆杖笞徒以上雖不繫獄皆附奏從之又以折杖輕重無凖官吏得以任情詔毋得過十五兩改强盜法不持杖不得財徒二年得財為錢萬及傷人者死持杖而不得財流三千里得財為錢五千者死傷人者殊死不持杖得財為錢六千若持杖罪不至死者仍刺隸千里外牢城又詔告羣盜劫殺人者賞有差及十人者予錢十萬既而有司言竊盜不用威力得財為錢五千即刺為軍兵反重於强盜請竊盜罪亦苐減之至十千刺為兵詔可又詔京城持杖竊盜得財為錢四千亦刺為兵自是盜法惟京城加重餘視舊益寛又詔荆湖殺人祭鬼其首謀及加功者凌遲斬募告者以犯人家貲畀之捕殺者重賞是嵗詔京師正旦四立分至庚戌己巳日毋決大辟故事天慶等五節有司不奏大辟具獄者十日天聖初詔㐀三日餘罪一日而已開封府舊制毎嵗正旦冬至三日端午一日俱禁刑人國忌日舊亦禁刑至是詔聴決杖罪七年詔頒附令敕九年四月詔論平民五人為劫盜抵死主者雖更赦並從重罰明道元年詔頒刪定敕令二年詔凡命官犯重罪當配隸者於外州編管或隸牙校其坐死特貸者多校黥配逺州牢城經恩量移始免軍籍景祐中詔當配沙門島者苐配廣南逺惡地牢城廣南罪人乃配嶺北其後亦有配沙門島者皇祐中命配隸重者沙門島寨其次嶺表其次三千里至鄰州其次羈管其次遷鄉斷訖不以寒暑即時上道吳充建請流人冬寒被創上道多凍死自今非情理巨蠧遇冬月聴流役本處至春月遣之詔可至和初詔前代帝王後嘗仕本朝官不及七品者祖父母父母妻子罪流以下聴贖雖不仕而嘗被賜予者罪非巨蠧亦如之嘉祐五年以判刑部李綖言詔刑部類次天下所斷大辟嵗上朝廷以助觀省神宗熙寧元年以京朝官分治左右廂凡鬭訟杖六十以下情輕者得專決二年知金州張仲宣坐受贓論罪時金州金坑發仲宣檄廵檢體究無甚利土人憚興作以金八兩求仲宣不差官比校及事覺法官坐仲宣枉法贓應絞援前比貸死杖脊黥配海島知審刑院蘇頌言仲宣所犯可比恐喝條且古者刑不上大夫遂免杖黥流海外嗣是命官無杖黥法三年詔決配强盜無以全黨置之一路是年興詔獄凡因事置推己事而罷者詔獄謂之制勘院非詔獄謂之推勘院其體大者則下御史臺獄成即開封府大理寺究治按是年命尚書都官郎中沈衡鞫前知杭州祖無擇於秀州盖王安石私怨所為也嗣後詔獄繁興終熙豐之世柄國權臣多藉此以威搢紳效尤反復無所不至具詳舞紊峻酷篇是年編修中書條例所請委諸路提㸃刑獄司嵗冬夏檢舉牒州長吏勿留獄牒訖奏聞舊制毎嵗冬夏降詔卹刑既委提㸃刑獄自是不復降詔八月詔曰在京班直諸軍請糧㪷斛不足出戍之家尤甚倉吏自以在官無禄恣為侵漁非朕所以愛養將士之意於是三司始立諸倉丐取法已而中書請主典役人嵗增禄至一萬八千九百餘緡丐取不滿百錢徒一年每百錢加一等千錢流二千里每千錢加一等罪止流三千里其行貨及過制者減首罪二等徒者皆配五百里流者皆配千里滿十千為首者配沙門島自首除罪凡更定約束十條行之其後内則政府外則監司多倣此法四年六月令河北饑民為盜者與減死刺配又令盜賊囊橐停宿之家立重法凡劫盜罪當死者籍其家貲以賞告人妻子編置千里遇赦若災傷減等者配逺惡地罪當徒流者配嶺表流罪㑹降者配三千里籍家貲之半為賞妻子遞降等有差應編配者雖㑹赦不移不釋囊橐之家刼盜死罪情重者斬餘皆配逺惡地籍家貲之半為賞盜罪當徒流者配五百里籍家貲三之一為賞竊盜三犯杖配五百里或隣州雖非重法之地而囊橐重犯之人並以重法論其知縣捕盜官盜發十人以上者限内捕不獲半劾罪取㫖若復殺官吏及累殺三人焚舍屋百間或羣行州縣掠劫江海船栰者非重法之地亦從重法論按宋重法之地始于嘉祐中自開封府諸縣後稍及曹濮澶滑等州熙寧四年以開成府東明考城長垣縣凉西滑州淮南宿州河北澶州京東應天府濮齊濟單兖鄆沂州淮陽軍均立重法著為令至元豐時河北京東淮南福建等路用重法郡縣寖廣夫刑所以齊天下也法以地殊頗乖古制三代明允之訓當不謂然六年審刑院言登州沙門島寨配隸以二百人為額餘則移置海外非禁姦之意詔以三百人為額廣南轉運司言春州瘴癘之地配隸至者多死願停配罪人詔應配沙門島者許配春州餘勿配既而諸配隸除凶盜外少壯者並寘河州七月詔邊吏殺熟户以邀賞者死七年詔品官有罪按察之官並奏劾聴㫖毋得擅捕繫罷其職俸九年詔以交趾犯順應配廣南東西路罪人並權配三千里外元豐元年詔復設大理獄具詳讞篇按宋舊制大理寺讞天下奏案而不治獄神宗以廢大理獄為非是乃復命官職分左右左斷刑右治獄元祐元年以右治獄事少併左右為一司三年罷右治獄紹聖二年復設其建置沿革詳見職官典兹不備録二年新修敇令格式成分敇令格式為四凡入笞杖徒流死自例以下至斷獄十有二門麗刑名輕重者皆為敕自品官以下至斷獄三十五門約束禁止者皆為令命官庶人之等倍全分釐之給有等級髙下者皆為格表奏賑籍闗牒符檄之類有體制模楷者皆為式時有司言往時川陜絹疋為錢二千六百以此編敇估贓兩鐵錢得銅錢之一近嵗絹疋不過千三百估贓二疋乃得一疋之罪至多重法請以一錢半當銅錢一從之三年正月詔審刑院刑部斷議官自今嵗終具嘗失入徒罪五人以上或失入死罪者取㫖連名者二人當一人京朝官展磨勘年幕職州縣官展考或不與任滿指射差遣或罷本年斷絶支賜去官不免七年七月以御史黄降言令議法之官於敕令文意有疑者務須參以看詳舊卷考其意義俾法定于一無或重輕八月詔大暑大寒或雨雪稍愆並依故事停録囚決獄八年詔犯盜刺環於耳後徒流以方杖以圎三犯杖移于面徑不得過五分哲宗元祐元年刋修元豐敕令格式先是元豐中所修凡載於敕者多移于令及是以御史中丞劉摯言重命刋修取慶厯嘉祐以來新舊敕參照去取刪正成書五年令凡佃客犯主加凡人一等主犯之杖以下勿論徒以上減凡人一等謀殺盜詐及有所規求避免而犯者不減因毆致死者不刺面配鄰州情重者奏裁六年令凡諸配隸沙門島強盜殺人縱火贓滿五萬錢强姦毆傷兩犯至死累贓至二十萬錢謀殺至死者及十惡死罪造蠱已殺人者不移配强盜徒黨殺人不同謀贓滿二十五萬遇赦移配廣南溢額者配隸逺惡餘犯遇赦移配荆湖南北福建路諸州溢額者配隸廣南在沙門島滿五年遇赦不該移配與不許縱還而年及六十以上者移配廣南在島十年者依餘犯格移配篤疾或年及七十在島三年以上移配近鄉州軍犯狀應移而老病者同其永不放還者各加二年移配又凡命士死於官或去位其送徒道亡則部轄將校節級與首率衆者徒一年情輕則杖百雖自首不免七年令凡失出死罪五人比失入一人失出徒流罪三人比失入一人紹聖時詔復用熙寧元豐敕令格式舊制三年詔配沙門島人已溢額者並配瓊州萬安軍昌化珠崖軍元符中詔參用元豐元祐敕令格式條目三年詔强盜計贓應絞者贓數並増一倍贓滿不傷人而情輕者奏裁其用兵杖湯火之䫫傷人或入州縣鎮寨行劫不在奏裁之限若驅虜官吏廵防人等罪不致死仍奏裁先是曾布首建是議及布為相遂行之後布罷翰林學士徐勣言其不便仍照强盜應絞者計贓如舊法前詔勿行罷理官失出之罪徽宗崇寧元年詔復用元豐時勅令格式復類修前後所用例去其與法妨者三年令諸州築圜土以居强盗貸死者廢置具囚繫篇四年以左右司所編紹聖元符以來申明斷例頒天下刑名例頒刑部大理寺大觀元年詔計贓之律以絹論罪今絹價增貴而計絹之數猶循舊制定以一貫三百為率計價既低抵罪太重可以一貫五百定罪二年更定笞法並以小杖行決笞十為五二十為七三十為八四十為十五五十為二十不以大杖比折永為定制三年令應推强盜不究囊槖之家及所止地名者各徒二年不盡者減二等四年詔河北河東羣盜所經厯縣及十次以上知縣降一官衝替縣尉降一官勒停不及十次知縣衝替縣尉勒停政和五年詔不法官已為按察官所劾而輙論告按察官者候結勘斷罪畢再推勘如不實特於法外别行重斷七年詔停掌典解役聴從去官法初政和中勅凡掌典解役並依在官犯法去官勿論之例有犯則解役歸農幸免重罪及是罷之重和元年二月禁州縣用非法酷刑犯者以違制論四月詔肉刑廢而為杖笞折杖之數多寡不倫宜約其數自今徒二年半杖九十者折十七徒二年杖八十者折十五徒一年半杖七十者十三徒一年杖六十者十二笞五十者十笞四十者八笞三十者七笞二十者六笞十者五宣和二年令自今奏案並列其戸之髙下毋使刑及貧民而富者獲免吏有作姦者懲之又詔大理寺開封府不得輒奏獄空不許妄作斷絶獄官吏冒賞者詔令御史臺覺察彈奏又詔州縣官不親聴囚而使吏鞫訊者徒二年髙宗建炎元年令以絹計贓者按直增估以二千為準二年詔自今犯枉法自盜贓者中書籍其姓氏罪至徒者永不録用又詔贓罪至死者籍其貲三年詔遵用嘉祐條法凡擬斷刑名嘉祐與見行條法輕重不等者並從輕賞格從重四年二月詔靖康元年以前所降御筆多出法令之外自今除有出於法外者依累降指揮施行其餘減杖䘏刑之類並合遵守十年詔贓吏罪抵死情犯甚者奏取㫖十一年坐監司不按贓吏罪五月禁州縣以私意籍罪人貲産八月詔自今官吏犯贓雖未即誅戮若杖脊流配決不可貸凡贓罪至死者籍其家紹興二年詔知州兼統兵者非出師臨陣無得概用重刑時州軍有捕獲刼盜殺人者至族其家故有是詔初建炎中令以嘉祐政和敇令格式對修及是書成凡一百二十卷詳看六百四卷名紹興重修敇令格式頒行之三年詔自今犯私鹽者並依紹興敇斷私鹽一斤徒一年三百斤配本城煎煉者一兩比二兩雖遇特恩不以赦原時因紹興二年有私販不計多寡杖脊配廣南指揮殿中侍御史常同言其太重故有是詔又詔捕獲强盜雖無被主姓名贓滿己經論決者許推賞二十五年八月申嚴誣告加等法二十六年以吏部續降申明條冊有與都省批狀指揮參雜者令敕令所看詳酌刪毋與三尺混淆三十年令海賊罪不致死者刺為龍猛龍騎軍又令諸路貸死强盜少壯者為兵孝宗隆興元年以諸州斷配海賊例送廣南逺惡州軍瀕海之郡賊船嘯聚慮長姦惡令自今分隸兩淮水軍収管四年詔販牛過淮者論如興販軍須之罪乾道二年刑部侍郎方滋上乾道新編特㫖斷例七十卷四年正月令凡守令與掌行刑獄之官並依法製大小杖當官封押行用不得増添換易訊囚過數五月更定聚録之法於聚録時委長貳遣無干礙吏人先附囚口責狀一通覆視獄案無差然後依句宣讀務在詳明庶使伏辜者無憾六年乾道重修敇令格式成凡百二十二卷存留照用指揮二卷淳熙元年五月詔頒浙西提刑鄭興裔檢騐格目於諸路提刑司初興裔懲州縣檢騐之弊遂置格目每一檢騐用格目三本一申所屬一申本司一給被害之家州縣受詞差官檢官受牒起發皆注日時於上州縣不得為姦及是詔以其法行於諸路十月詔以今之有司多有執例廢法者除刑部許用乾道所修刑名斷例及司勲許用編類獲盜推賞例并乾道元年輕置修例敝事指揮内立定合引例外其餘並依成法不許用例四年復分門編類為淳熙條法事類頒之修淳熙敕令格式九年申嚴盜販解鹽法十一年五月命刑部大理寺議減刺配法十三年正月詔强盜兩次以上雖為從論死九月詔偽造㑹子凡經行用並處死十四年詔復元豐政和編配格分情重稍重情輕稍輕四等如入情重則刺面用不移不放之格其次稍重止刺額角用配及十年之格其次稍輕則與免黥刺用不刺面役滿放還之格其次最輕則降為居役别立年限縱免之格倘有從坐編管則置之本城減其放限光宗紹熙二年令凡凶惡貸死隸于流籍者分沿江諸屯及他逺惡之地毋專投海外以為凶藪又詔監司郡守互送以贓論三年刺沿邊盜萬人為諸州禁軍又令凡刺配人至本州務依年限方許放停如限内再有所犯撥八屯駐軍中重役永不復放寧宗慶元四年慶元敕令格式成初淳熙末以淳熙敕令格式尚多遺缺令刑部詳定及是書成頒之嘉泰元年正月命諸州兵士毋受饋遺及擅招軍違者寘之法三月臨安大火詔察姦民縱火者治以軍法二年詔凡殺傷人者如都保不申官州縣不差官檢覆及家屬受財私和許諸色人告首並從條䆒治其行財受和㑹之人計贓論罪四年詔頒檢騐正背人形圗於諸路提刑司令于傷損之處依様朱紅書畫遇檢騐時唱喝傷痕衆無異詞然後著押俾吏姦難行愚民易曉更定配隸法凡鄉民鬭毆殺傷及胥吏犯贓貸命流配等人止徒配本州牢城重役限滿放還為民至累犯强盜及聚衆販賣私商曽經殺傷捕獲之人並配屯駐軍限滿改刺從正軍依糧十三年詔凡在官財物不應用而用之私入己者為贓罪私饋遺者為私罪充公用者為公罪創始者為首坐以全罪循例者為從與減一等開禧元年九月詔官吏犯贓追還所受如舊法閏八月詔自配隸編管羈管外其餘悉從本條科罪不得以土著之人押出外界十一月申嚴告訐之禁二年正月詔坑戸毁錢為銅者不赦仍籍其家八月有司上開禧刑名斷例嘉定四年閏二月詔諸路帥臣監司守令格朝廷賑恤之令及盜發不即捕者重罪之六年六月詔刑部嵗終上諸州未決之獄於尚書省其最久者罪之又令自今民間凡輕虧楮幣違犯約束者止䋲以法毋得更籍其家十六年二月令凡檢驗不實或失當不得用覺舉原免理宗寳慶元年十二月詔删修敇令紹定五年五月詔齊民有罪毋得籍没其家必具聞俟命淳祐二年三月詔州縣官有罪諸帥司毋輒加杖責淳祐敕令格式成六年五月詔官吏贓狀顯露即下所屬州郡拘贓聴朝廷議罰或移為他用併籍其家十一年四月成淳祐條法事類四百三十篇寳祐五年正月禁姦民作白衣㑹監司郡縣等官失察者坐罪遼自蘇爾威汗命宗室雅里為額爾竒木以掌刑辟太祖初年庶事草創犯罪者量輕重決之其後治諸弟逆黨權宜立法親王從逆不罄諸甸人或投髙崖殺之滛亂不軌及逆父母者五車轘殺之訕詈犯上者以熟錐樁其口殺之從坐者量罪輕重杖決杖有二大者重錢五百小者三百又為梟磔生瘞射鬼箭砲擲支解之刑具峻酷篇其後制刑有四曰死曰流曰徒曰杖死刑有斬絞凌遲之屬又有籍没之法流刑量罪輕重寘邊城部族之地逺則投諸境外又逺則罰死絶域徒刑一曰終身二曰五年三曰一年半終身者決五百其次遞減百又有黥刺之法杖刑自五十至三百亦有八議八縱之法籍没始自太祖至世宗詔免之其後内外戚屬及世官之家犯反逆等罪復没入焉又有沙袋木劍大棒銕骨朶之法沙袋用熟皮合縫之長二寸廣二寸柄一尺許凡杖五十以上者以沙袋決之木劍面平背隆大臣犯罪重欲寛宥則擊之銕骨朶者有重罪將決以沙袋先於脽骨之上及四周擊之其餘非常用而無定式者不可殫紀太祖神冊六年詔大臣定治契丹及諸夷之法漢人則斷以律令仍置鐘院以達民寃太宗時治渤海人一依漢法穆宗應厯十二年國舅帳郎君蕭延之奴哈里强陵蘇拉圗哩年未及之女以法無文加之宫刑仍付圖哩為奴因著為令十六年諭有司凡行幸頓次必髙立標識以禁行者比聞楚古輩故低置其標深草中利人誤入因之取財自今有復然者以死論聖宗統和元年二月詔所在官吏軍民不得無故聚衆私語及冒禁夜行違者坐之十二月詔民間有父母别籍異居者聴隣里覺察罪之十二年七月詔契丹人犯十惡斷以漢律先是契丹及漢人相毆致死其法輕重不均至是俱一等科之二十四年詔主非犯謀反大逆及流死罪者其奴婢無得首告若奴婢犯罪至死聴送有司其主無得擅殺二十九年以舊法宰相節度使世選之家子孫犯罪徒杖如齊民惟免黥面詔自今但犯罪當黥即准法同科開泰八年定竊盜贓滿二十五貫為首者處死從者決流先是贓滿十貫為首者死其法太重故有此令又詔三犯竊盜黥額徒三年四則黥面徒五年五則處死太平六年詔貴戚以事被告並令所在官司案問具申南北院覆問得實以聞南北二院分治契丹漢人其不按輒申及受請託為奏言者以本犯人罪罪之七年七月詔中外大臣制條中有遺闕及輕重失中者其條上之議增改焉興宗重熙元年詔職事官子弟及家人受賕不知情者止坐犯人先是南京三司銷錢作器皿三斤持錢出南京十貫及盜遺火家物五貫者死至是銅逾三斤持錢及盜物二十貫以上處死二年詔犯終身徒者止刺頸奴婢犯逃若盜其主物主毋得擅黥其面刺臂及頸者聴犯竊盜者初刺右臂再刺左三刺頸之右四刺左至於五則處死五年四月頒行新定條制先是詔樞宻直學士耶律庶成樞宻副使耶律徳修纂修太祖以來法令㕘以古制凡五百四十七條至是書成上之詔有司凡朝日執之仍頒行諸道十年七月詔諸職官私取官物者以正盜論諸敢以先朝已斷事相告言者罪之諸帳郎君於禁地射鹿决杖三百不徴償小將軍決二百以下及百姓犯者罪同郎君論十一年七月詔盗易官馬者減死論道宗清寧元年十二月詔諸宫都部署凡有機宻事即可面奏餘所訴事以法施行有投誹謗之書其受及讀者棄市咸雍六年以契丹漢人風俗不同國法不可異施乃命惕隠蘇樞宻使乙辛等更定條制合於律令者具載之不合者别存之時校定官即重熙舊制更竊盗贓二十五貫處死一條增至五十貫又刪其重複者二條為五百四十五條取律一百七十三條又創増七十一條凡七百八十九條増重編者至千餘條復以律及條例參校續增三十六條其後因事續校至大安三年止又增六十七條大安五年詔復用舊法餘有司新纂條目悉除之金國舊俗輕罪笞以柳葼殺人及盗刼者擊其腦殺之没其家貲以十之四入官其六償主併以家人為奴婢其親屬欲以馬牛雜物贖者從之具贖刑篇其獄則掘地深廣數丈為之太祖天輔三年正月東京人為質者永吉等五人結衆叛誅其首惡餘皆杖百没入在行家屬貲産之半詔知東京事沃稜繼有犯者並如之五月詔自収寧江州以後同姓為婚者杖而離之太宗天㑹二年二月詔有盗發遼諸陵者罪死三年七月詔權勢之家毋買貧民為奴脅買者一人償十五人詐買者一人償二人並杖一百七年詔凡竊盗但得物徒三年十貫以上徒五年刺字充下軍三十貫以上徒終身仍以贓滿盡刺字於面五十貫以上處死徴償如舊制熙宗皇統間詔諸臣以本朝舊制參隋唐宋遼之法類以成書名曰皇統制頒行中外海陵正隆二年六月置登聞院四年正月更定私相越境法並論死五年二月遣引進使髙植刑部郎中海狗分道監視所獲盗賊並凌遲處死或鋸灼去皮截手足仍戒千户穆昆等後有獲者並處死總管府官亦决罰十二月禁朝官飲酒犯者死世宗即位制㫖多從時宜集為軍前權宜條理大定五年命有司刪定條理與前制書兼用六年詔有司每月朔望及上七日毋奏刑名先是海陵時始定上七日不奏刑名至是詔朔望亦如之七年七月禁服用金線其織買者皆抵罪八年二月制品官犯賭博法贓不滿五十貫者其法杖聴贖再犯者杖之九年以法官各執所見或觀望宰執之意詔自今制無正條者皆以律文為凖先是杖罪至百則臀背分决海陵時以脊近心腹禁之至是命復如舊法嗣謂宰臣曰罪人杖不分受恐至深重今聞民間有不欲者其令罷之制妄言邊闗兵馬者徒二年又制職官犯公罪在官已承伏者雖去官猶論十二年二月詔官長不法其僚佐不能糾正又不上言者並坐之十三年詔立春後立秋前及大祭祀月朔望上下弦二十四氣雨未晴夜未明休暇並禁屠宰日皆不聴决死刑惟强盗即决十四年三月詔明安穆昆之民自二月至八月禁絶飲燕恐妨農功雖閒月亦不許痛飲犯者抵罪十五年詔有司収竊盗贓滿八十貫者死先是竊盗贓五十貫以上死至是乃有是詔十七年以渤海舊俗男女婚娶多不以禮必先攘竊以奔詔禁絶之犯者以姦論十八年正月定殺異居周親奴婢同居卑㓜殺奴婢及妻無罪而輒毆殺者罪十九年三月制糾彈之官知有犯法而不舉者減犯人一等科之闗親者許迴避六月置局更定制條命大理卿伊喇慥總中外明法者共校正以皇統正隆之制及大定軍前權宜條理後續行條理審其輕重刪煩正失制有缺者以律文足之制律俱缺及疑不能决者取㫖畫定軍前權宜條理内有可以常行者亦為定法餘未合者别為一部存之參以近所定徒杖減半之法凡杖定千一百九十條分十二卷名大定重修制條詔頒行焉十月制知情服内成親者雖自首仍依律坐之二十年詔定踐蹂禾稼罪初帝如春水見民桑多為牧畜所踐詔親王公主及勢要家牧畜犯民桑者許所屬縣官立加懲斷至是見有踐蹂田禾者復詔自後踐民田杖六十盗人榖杖八十並償其值二十二年以附都明安户不自種悉租與民有一家百口隴無一苖者令治其罪不種者杖六十穆昆四十受租百姓無罪二十五年以婦人在囚輸作不便而杖不分决與殺無異遂命免死輸作者决杖二百臀背分受而免輸作二十八年以制條拘於舊律間有難解之詞命刪修明白使民皆曉二十九年九月時章宗已即位制盗賊聚集至十人或騎五人以上所屬移捕盗官捕之仍遞言省部三十人以上聞奏違者杖百章宗明昌元年命置詳定律令所審定律令二年四月制諸部内災傷主司應言而不言及妄言者杖七十檢視不以實者罪如之因而有傷人命者以違制論致枉有徴免者坐贓論妄告者户長坐詐不以實罪計贓重從詐匿不輸法六月禁稱本朝人及本朝言語為番違者杖之十月敕司獄與府州司縣官筵宴往還者罪之十一月禁伶人不得以歴代帝王為戲及稱萬嵗犯者以不應為事重法科十二月制投匿名文書者徒四年五年定徒二年以下者杖六十二年以上杖七十婦人犯者並决五十著於敇條承安二年制軍前受財法一貫以下徒二年以上徒三年十貫處死三年定明安穆昆身犯私鹽私酒麴及殺牛者徒一年杖數不以贖論不及徒者杖五十是嵗帝以法不適平常行杖様多不能用遂定分寸鑄銅為杖式頒之天下且曰若以笞杖太輕恐情理有難恕者訊杖可再議之五年定居祖父母喪婚娶聴離法并妻亡服内婚娶者亦聴離又定皇族収養異姓為子者徒三年姓同者減二等立嫡違法者徒一年泰和元年正月尚書省奏見行銅杖式輕細姦宄不畏遂命有司量所犯用大杖仍禁不得過五分十二月司空襄等進新定律令敕條格式五十三卷律凡十有二篇曰名例曰衛禁曰職制曰户婚曰廏庫曰擅興曰賊盗曰鬭訟曰詐偽曰雜律曰捕亡曰斷獄實唐律也惟贖銅倍之增徒四年五年為七削不宜於時者四十七條増時用之制百四十九條略有損益者二百八十有二條餘百二十六條皆從其舊又分一為二分一為四者六條凡五百六十三條為三十卷附注以明其事疏義以釋其疑名曰泰和律義自官品令職員令之下曰祠令四十八條户令六十八條學令十一條選舉令八十三條封爵令九條封贈令十條軍防令二十五條儀制令二十三條衣服令十條公式令五十八條禄令十七條倉庫令十條廏牧令十二條田令十七條賦役令二十三條闗市令十三條捕亡令二十條賞令二十五條醫疾令五條假寧令十四條獄官令百有六條雜令四十九條釋道令十條營繕令十三條河防令十一條服制令十一條附以年月之制曰律令二十卷又定制敇九十五條𣙜貨八十五條畨部三十九條曰新定敇條三卷六部格式三十卷詔以明年五月頒行之二年詔凡條格入制文内者分為别卷復詔制與律文輕重不同及律所無者各校定以聞三年三月詔隨處盗賊嘯聚三十人以上奏聞違者杖百八月詔諸按察司體訪不實輒加糾劾者從故出入人罪論仍勒停若事渉私曲各從本法五年正月復命鈎校制律付詳定所時詳定官言若依重修制文為式則條目増減罪名輕重當異於律既定復與舊同頒則使人惑而易為姦矣臣等謂用今制條參酌時宜凖律文修定歴採前代刑書宜于今者以補遺闕取刑統疏文以釋之著為常法名曰明昌律義别編𣙜貨邊部權宜等事集為敇條宰臣謂先所定令文尚有未完俟皆通定然後頒行若律科舉人則止習舊律遂以知大興府事尼龎古鑑御史中丞董師中翰林待制温屯忠孝提㸃司天臺張嗣翰林修撰完顔薩喇刑部員外郎李廷義大理丞麻安止為校定官大理卿閻公貞户部侍郎李敬義工部郎中賈鉉為覆定官重修新律焉六年六月定軍前差發受贓罪除飛蝗入境雖不損苖稼亦坐罪法七月詔禁賣馬入外境但至界欲賣而為所捕即論死七年三月定蝗蝻生發地主及隣主首而不申之罪九月更定受制忘誤及誤寫制書事重加等罪八年詔更定蝗蟲生發坐罪法宣宗貞祐三年三月禁州縣置刃杖端以决罪人七月詔宰臣自今監察官犯罪其事闗軍國利害者並笞决之八月令職官犯罪大者即施行之小者籍之事定始論其罪四年詔凡監察失糾劾者從本法論外使入國私通本國事情宿衛近侍官承應人出入親王公主宰執家災傷乏食有司檢覈不實致傷人命轉運軍儲而有私載考試舉人而防閑不嚴其罰並决在京犯至兩次者臺官減監察一等治罪論贖餘止坐專差任滿日議定升降若任内曾以漏察被决依格雖為稱職止從平常平常者從降罰六月詔凡進奉帖及申尚書省樞宻院闗應宻大事私發視者絞誤者減二等制書應宻者如之興定三年定贓吏計罪以銀為則其犯公錯過誤者止徴通寳見錢贓汚故犯者輸銀具雜議篇又制沿河戍兵逃亡罪並同征行軍人例五年尚書省言司縣官貪暴不法部民逃亡既有决罰他縣停匿亦宜定罪從之元光元年增定藏匿逃亡親軍罪及告捕賞格欽定續通典卷一百七
