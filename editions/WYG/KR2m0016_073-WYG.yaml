body:
  text: 禮軍天子諸侯大射鄉射唐宋遼金明唐制燕逰小射則服常服不陳樂懸不行㑹禮餘如大射之儀案大射儀已詳杜典宋太宗命有司定大射之禮儀注定制羣臣朝謁如元㑹酒三行有司言請賜王公以下射侍中稱制可皇帝改服武弁布七埒於殿下王公以次射開樂懸東西廂設熊虎等候陳賞物於東階以賚能者設豐爵於西階以罰否者并圗其冠冕儀式表著埻埒之位以進帝覽而嘉之謂宰臣曰俟弭兵當與卿等行之凡逰行池苑或命宗室武臣射每帝射中的從官再拜奉觴貢馬為賀苑中皆有射棚畫暈的射則用招箭班三十人服緋紫繡衣帕首分立左右以唱中否節序賜宴則宗室禁軍大校牧伯諸司使副皆令習射遂為定制外國使人朝亦令帥臣伴賜射於園苑政和宴射儀皇帝御射殿侍宴官公服繫鞵射官窄衣奏聖躬萬福再拜升殿酒三行引射官降皆執弓矢謝恩再拜三公以下在右射官在左不射者依坐次分立皇帝初射中舍人賛拜凡左右祗應臣僚除内侍外並階上下再拜行門禁衛諸班親從諸司祗應人並自賛再拜招箭班殿上躬奏訖跪進椀射官先𫝊弓箭與殿侍側立内侍接椀訖就拜起降階再拜有司進御茶牀天武引進奉馬列射垜前員僚奏聖躬萬福東上閤門官詣御前躬進班首姓名以下進酒班首以下横行立賛再拜班首奉進酒樂作飲畢殿上臣僚再拜舍人賛各賜酒羣臣俱再拜賛各就坐羣臣皆立席後引進司官臨階宣進奉出天武奉馬出樂合復賛就位飲訖揖興諸司收坐物等射官左側臨堦取弓箭侍立皇帝再射中的或雙中如上儀臣僚射中引降堦再拜訖殿下側立御箭中招箭班進椀如上儀舍人再引射中官當殿揖躬宣有勅賜窄衣金帶跪受箱過再拜過殿側服所賜訖再引當殿再拜更不射如宣再射或更賜箭令射如未退即就位再拜射訖進御茶牀諸司復陳坐物等羣臣各立席後賛就坐羣臣俱坐酒五行宣示醆宣勸如儀皆作樂宴畢内侍舉御坐牀三公以下降階再拜訖孝宗乾道二年車駕幸玉津園皇帝射訖次命皇太子次慶王次恭王次管軍臣僚等射如是者三每射四發帝前後四中的淳熙元年車駕幸玉津園命從駕文武官行宴射之禮皇太子宰執以下酒三行樂作皇帝臨軒有司進弓矢皇帝中的皇太子進酒率宰執以下再拜稱賀宣皇太子射射中賜宣預射臣僚射使相鄭藻起居舍人王卿月環衛官蕭多囉倫射中各賜襲衣金帶其鄉射之儀於鄉飲酒前一日本州於射亭東西序量地之宜設提舉學事諸監司知州通判州學教授應赴鄉飲酒官貢士幕次本州兵馬教諭備弓矢應用物設樂其日初筵提舉學事知州軍通判帥應赴鄉飲酒官貢士詣射亭執弓矢揖人射乗矢若中則守帖者舉獲唱獲執算者以算投壺畢多算勝少算射畢賛者賛揖酬酢如儀畢揖退遼制有射栁儀皇帝再射親王宰執以次各一射中栁者質誌栁者冠服不中者以冠服質之不勝者進飲於勝者然後各歸其冠服又三月三日國俗刻木為兎分朋走馬射之先中者勝負朋下馬列跪進酒勝朋馬上飲之金制凡重五日拜天地畢挿栁毬場為兩行當射者以尊卑序各以帕識其枝去地約數寸削其皮而白之先以一人馳馬前導後馳馬以無羽横鏃箭射之既斷栁又以手接而馳去者為上㫁而不能接去者次之或㫁其青處及中而不能㫁與不能中者為負每射必伐鼓以助其氣明太祖洪武三年定凡郊廟祭祀先期行大射禮工部製射侯等器其射鵠有七虎鵠五采天子用之熊鵠五采皇太子用之豹鵠五采親王用之豹鵠四采文武一品二品者用之糁鵠三采三品至五品者用之狐鵠二采六品至九品用之布鵠無采文武官子弟及士民俊秀用之凡射時置乏於鵠右乏又名容見周禮大司馬服不氏職執旗及侍獲者以蔽身設楅及韋當射時置於前以齊矢設射中五皮樹中天子大射用之閭中天子宴射用之虎中皇太子親王射用之兕中一品至五品文武官用之鹿中六品至九品及文武官子弟士民俊秀通用之其職事設司正官二掌騐射者品級尊卑人力强弱而定耦其中否則書於算兵部官職之司射二掌先以强弓射鵠誘射以鼓衆氣武職官充之司射器官二掌辦弓力强弱分為三等騐人力强弱以授工部官職之舉爵者掌以馬潼授中者飲光禄寺官職之請射者掌定耦射射畢再請某耦射侍儀司職之侍獲者掌矢納於司射器者以𨽻僕供其役執旗者六人掌於容後執五色旗如射者中的舉紅旗應之中采舉采旗應之偏西舉白旗偏東舉青旗過於鵠舉黄旗不及鵠舉黒旗軍士二人掌之引禮二掌引文武官進退侍儀司舍人職之太祖又以先王射禮久廢弧矢之事専習於武夫而文士多未解乃詔國學及郡縣生員皆令習射頒儀式於天下朔望則於公􅇬或間地習之其官府學校射儀略倣大射之式而殺其禮射位初三十歩自後累加至九十歩射四矢以二人為耦成祖永樂時有擊毬射栁之制十一年幸東苑擊毬射栁聴文武羣臣四夷朝使及在京耆老聚觀分擊毬官為兩朋自皇太孫而下諸王大臣以次擊射賜中者幣布有差天子合朔伐鼓唐宋明唐徳宗貞元三年八月日有食之有司將伐鼓帝不許太常卿董晋言伐鼓所以責隂而助陽也請聴有司依經伐鼓不報由是其禮遂廢宋太祖建隆元年司天監言日食五月朔請掩藏戈兵鎧胄事下有司有司請皇帝避正殿素服百官各守本司遣官用牲太社如故事真宗景徳四年五月朔日食上避正殿不視事仁宗至和元年四月朔日食既内降徳音改元易服避正殿减膳百官詣東上閤門拜表請御正殿復常膳三表乃臨至日遣官祀太社而隂雨以雷至申乃見食九分之餘百官稱賀仁宗嘉祐四年詔正旦日食毋拜表自十二月二十一日不御前殿減常膳宴遼使罷作樂至日仍遣官祀太社百官三表乃御正殿復膳六年六月朔日食詔禮官騐詳典故皇帝素服不御正殿不視事百官廢務守司合朔前二日郊社令及門僕守四門廵門監察鼓吹令率工人如方色執麾斿分置四門屋龍蛇鼓隨設於左東門者立北墪南面南門者立東墪西面西門者立南墪北面北門者立西墪東面隊正一人執刀率衛士五人執五兵之器立鼓外矛處東㦸處南斧鉞在西矟在北郊社令立􅗋於壇四隅縈朱􅁝繩三匝又於北設黄麾龍蛇鼓一次之弓一矢四次之諸兵鼓俱静立俟司天監告日有變工舉麾乃伐鼔祭告官行事太祝讀文其詞以責隂助陽之意司天官稱止乃罷鼓如霿晦不見即不伐鼓自是日有食之皆如其制英宗治平四年詔古者日食百官守職盖所以祗天戒而備非常今獨闕之甚非王者小心宣畏之道可令中書議舉行神宗熈寧六年四月朔日食詔易服避殿减膳如故事降天下死刑釋流以下罪政和中上合朔伐鼓儀有司陳設太社玉帛籩豆如儀社之四門及壇下近北各置鼓一並植麾斿各依其方色壇下立黄麾麾杠十尺斿八尺祭告日於時前太官令帥其屬實饌具畢光禄卿㸃視次引監察御史奉禮郎太祝太官令先入就位次引告官就位皆更拜次引御史奉禮郎太祝升就位太官令就酌尊所告官盥洗詣太社三上香奠幣玉再拜復位少頃引告官再盥洗執爵三祭酒奠爵俛伏興少立引太祝詣神位前跪讀祝文告官再拜退伐鼔其日時前太史官一員立壇下視日鼓吹令率工十人如色服分立鼓左右以俟太史稱日有變工齊伐鼔明復太史稱止乃罷鼓其日廢務而百司各守其職如舊儀明太祖洪武六年定救日食禮其日皇帝常服不御正殿中書省設香案百官朝服行禮鼓人伐鼓復圓乃止月食大都督府設香案百官常服行禮不伐鼓雨雪雲翳則免又更定禮部設香案於露臺向日設金鼓於儀門内設樂於露臺下各官拜位於露臺上至期百官朝服入班樂作四拜興樂止跪執事官奉鼓班首擊鼓三聲衆鼓齊鳴候復圓復行四拜禮月食則百官便服於都督府救䕶如儀在外諸司日食則於布政司府州縣月食則於都指揮使司衛所如儀馬政馬祭附明唐五代宋遼金元唐制太僕寺卿掌廐牧輦輿之政凡監收籍帳嵗受而㑹之乗黄令率駕士調習尚乗隨路色供馬典廐署掌飼馬良馬一丁中馬二丁駑馬三丁其諸牧監上牧監一人副監二人丞三人王簿一人南使西使丞各三人録事一人北使鹽州使丞各二人掌羣牧孳課凡馬五千為上監三千為中監不及為下監其羣有牧長有尉馬之駑良皆著籍良馬稱左駑馬稱右每嵗孟秋羣牧使以諸監之籍合為一以仲秋上送於寺送細馬則有牽夫識馬小兒獸醫等凡馬游牝以三月駒犢在牧三嵗别羣孳生過分有賞死耗亦以率除之嵗終監牧使巡按以功過相除為考課凡祭馬祖先牧馬社馬歩皆羊代宗永泰元年四月命太常復置馬祖壇依常式饗祭梁太祖開平四年頒奪馬令冒禁者罪之先是梁師攻戰得敵人之馬必納官故出令命獲者有之後唐莊宗同光三年下河南河北諸州和市戰馬官吏除一匹外匿者有罪長興中上問見管馬數樞宻使范延光奏天下近支草粟者近五萬匹見今西北諸蕃賣馬者往來如市其郵𫝊之費中估之直日四五十貫以臣計之國力十耗其七馬無所使財賦漸消朝廷甚非所利上善之敕沿邊藩鎮或有蕃部賣馬可擇其良壯者給劵具數以聞晋髙祖天福九年發使於諸道州府括取公私馬以備禦契丹宋太祖初置左右飛龍二院以左右二使領之太宗太平興國初改為天廐坊雍熈四年改為騏􅂹院左右天駟監四左右天廐坊二皆𨽻焉真宗咸平三年置羣牧使以内臣勾當制置羣牧司京朝官為判官景徳二年改諸州牧龍坊悉為監賜名鑄印以給之在外之監十有四凡廐牧之政皆出於羣牧司自騏􅂹院而下皆聴命焉太平興國四年太宗觀兵於幽州得汾晋燕薊之馬四萬二千餘匹内皂充牣分置諸州牧養其太僕卿掌廐牧之政車輅院應奉御馬仲春祝馬祖仲夏祀先牧仲秋祭馬社仲冬祭馬歩並擇日壇壝之制三壇各廣九尺髙三尺四陛一壝遼太祖懲約尼氏单弱撫諸部明賞罰不妄征討因民之利而利之羣牧蕃息上下給足及即位伐河東下代北郡縣獲牛羊駝馬十萬餘樞宻使耶律色珍獲馬二十餘萬分牧水草便地數嵗所増不可勝算自太祖及興宗垂二百年羣牧之盛如一日世宗天祚四年馬猶有數萬羣毎羣不下千匹祖宗舊制常選南征馬數萬匹牧於雄霸隙地間以備燕雲緩急復數萬給四時㳺畋餘則分地以牧法至善也至末年累與金戰番漢戰馬十損六七雖増價數倍竟無所買乃冒法買官馬從軍諸羣牧私買日多田獵亦不足用遂為金所敗後松漠以北善馬皆為達實林牙所有其北面官有尚廐使尚廐副使飛龍使飛龍副使總領内外廐馬等官南面官亦設太僕寺皆専掌馬政金太宗天㑹三年七月詔南京括官豪牧馬以等第取之分給諸軍其尚廐局副使掌御馬調習牧養元世祖中統四年設羣牧所後改為尚牧監又改為太僕院又改為衛尉院後又立太僕寺管阿克塔斯馬匹明太祖洪武四年置羣牧監随水草利便立官署専司牧養後改為太僕寺有卿少卿掌牧馬之政以聴於兵部少卿一人佐寺事一人督營馬一人督畿馬其山西等處行太僕寺掌各邊衛所營堡之馬政以聴於兵部以時督察三嵗一考比布按二司不得與有瘠損則聴兵部恭罰成祖永樂中置苑馬寺於北直𨽻等處有卿一人少卿一人掌六監二十四苑之馬政而聴於兵部凡苑視廣狹為三等上苑牧馬萬匹中苑七千下苑四千凡馬駒嵗籍其監苑之數上於兵部其御馬監以宦官掌之其祭馬祖始自洪武二年命祭馬祖先牧馬社馬歩之神築壇後湖禮官言春祭馬祖天駟星也夏祭馬牧始養馬者秋祭馬社始乗馬者冬祭馬歩乃神之災害馬者隋用周制祭以四仲之月唐宋因之今定春秋二仲月甲戊庚日遣官致祀為壇四樂用時樂行三獻禮四年蜀明昇獻良馬十其一白者長丈餘不可加韉勒太祖曰天生英物必有神司之命太常以少牢祀馬祖囊沙四百斤壓之令人騎而逰苑中乆之漸馴帝乗之以夕月於清凉山北還大悦賜名飛越峯復命太常祀馬祖五年并諸神為一壇嵗止春祭永樂十三年立北京馬神祠於蓮花池其南京馬神則以南太僕主之時儺宋遼元宋季冬宫中行儺禮民間亦行之遼制正旦以糯米飯和白羊髓為餅丸之若拳毎帳賜四十九枚戊夜各於帳内忩中擲丸於外數偶動樂數竒令巫十有二人鳴鈴執箭繞帳歌呼帳内爆鹽爐中燒地拍鼠謂之驚鬼又嵗除夕敕使及伊勒希巴率執事郎君至殿前以鹽及羊膏置爐中燎之巫及大巫以次賛祝火神訖閤門使賛皇帝面火再拜元制每嵗十二月下旬擇日於西鎮國寺墻下灑掃平地太府監供綵幣中尚監供細氊鍼線武備寺供弓箭環刀束稈草為人形一為狗一剪雜色綵叚為之腸胃選達官世家之貴重者交射之列射至糜爛以羊酒祭之祭畢帝后及太子嬪妃併射者各解所服衣俾䝉古巫覡祝讃之祝讃畢遂以與之名曰脱災欽定續通典卷七十三
