body:
  text: 食貨錢幣中南宋遼金南宋經兵革之後州縣困敝鼓鑄皆廢髙宗建炎元年工部郎李士觀言江池饒建州四監嵗鑄錢百三十三萬餘緡多未輸者請令發運司委官催督時東南小平錢甚重張夀言改當十為當三無私鑄之利請行於東南於是當三大錢始通於淮浙荆湖諸路又鑄建炎通寳錢二年罷益利夔三州鑄三年命江池饒錢監以二萬五千緡為一綱紹興初併廣寧監於䖍州併永豐監於饒州嵗鑄纔及八萬緡銅鐵鉛錫之入不及於舊而官吏稍廪工作之費仍各如故毎鑄錢一千率用本錢二千四百文工部進真篆當二小平銅鐵錢様詔下鑄錢司時張浚因婺州屯兵請樁辦合用錢而路不通舟錢重難致乃造闗子付婺州召商人入中執闗於𣙜貨務請錢願得茶鹽香引者聴於是州縣以闗子充糴本未免抑配而𣙜貨務又止以日輸三分之一償之人皆嗟怨六年詔置行在交子務造百五十萬緡充糴本先是張澄請依四川法造交子三十萬行於江淮至是遂置務臣僚言朝廷措置見錢闗子有司寖失本意改為交子官無本錢民何以信於是罷交子務令𣙜貨務儲見錢印造闗子時復歛民間銅器詔民私鑄銅器者徒二年提㸃官趙伯瑜以贑饒二監為得不償費請罷鼓鑄九年詔陜西諸路復行鐵錢十三年韓球為使復鑄新錢興廢坑冶至於發冡墓壞廬舍籍冶户姓名以膽水盛時浸銅為嵗額無銅可輸者至鎔錢為銅然所鑄亦纔及十萬緡十五年置利州紹興鑄錢監鑄錢十萬緡以救錢引二十二年復嘉之豐逺邛之惠民鑄小平錢二十三年詔利州並鑄折二錢後又鑄折三錢二十四年罷鑄錢司歸之漕司二十七年出版漕錢八萬緡為鑄本嵗權以十五萬緡為額復饒贑韶鑄錢監二十八年出御府銅器千五百事付泉司大索民間銅器得銅二百餘萬斤寺觀鐘磬鐃鈸既籍定投税外不得添鑄二十九年印公據闗子付三路總領所淮西湖廣闗子各八十萬緡淮東公據四十萬緡皆自十千至百千凡五等内闗子作三年行使公據二年許銀錢中半入納又令命官之家留見錢二萬貫民庶半之餘限二年聴轉易越數寄隐許人告以李植提㸃鑄錢公事植言嵗額内藏庫二十三萬緡右藏庫七十餘萬緡皆至道以後數也紹興以來嵗收銅二十四萬斤鉛二十萬斤錫五百斤僅可鑄錢一十萬緡諸道拘到銅器二百萬斤附以鉛錫可鑄六十萬緡然拘者不可以常唯當據坑冶所産工部權以五十萬緡為額又明年纔鑄及十萬緡今泉司嵗額增至十五萬緡小平錢一萬八千緡折二錢六萬六千緡嵗費鑄本及起綱糜費約二十六萬緡司屬之費又約二萬緡東南十一路一百一十八州之所供有坑冶課利錢木炭錢錫本錢約二十一萬緡比嵗所收不過十五六萬緡耳嵗額金一百二十八兩銀無額以七分入内庫三分歸本司銅三十九萬五千八百斤鉛三十七萬七千九百斤錫一萬九千八百七十五斤鐵二百三十二萬八千斤比嵗所𣙜十無二三毎當二錢千重四斤五兩小平錢千重四斤十三兩視舊制銅少鉛多錢愈鍥薄矣三十年錢端禮為户部侍郎被㫖造㑹子端禮委徽州創樣撩造紙五十萬續造于成都又造于臨安邉幅皆不翦裁初以分數給朝士俸而於市肆要閙處置五塲輦見錢收換毎一千别輸錢十以為吏卒用商賈入納外郡綱運悉同見錢無欠數陪償及脚乗之費公私便之三十一年始立㑹子務分一千二千三千凡三等詔𨽻都茶塲明年定偽造㑹子法初止行於兩浙後通行於淮浙湖北京百除亭户鹽本用錢其路不通舟處上供等錢許盡輸㑹子其沿流州縣許錢㑹中半民間典賣田宅馬牛舟車等如之全用㑹子者聴孝宗隆興元年詔鑄當二小平錢又令㑹子以隆興尚書户部官印㑹子之印為文更造五百及三百二百文㑹置江州㑹子務又於大軍庫儲見錢印造五百并一貫直便㑹子發赴湖廣襄郢等處大軍當見錢流轉止行於本路三年收其印板自後屢以闗子鈔引及新㑹換易至光宗紹熈初詔湖廣㑹子倣行在立界收換寧宗嘉定中以舊楮二而易其一又令以一楮半而易其一軍民便之嘉熈寳祐以後因仍行之二年㑹子印造益多實錢浸少至於十而損一帝念其弗便出内庫銀二百萬兩售於市以錢易楮焚棄之僅解一時之急洪邁容齋隨筆作三年餉臣趙沂諸添印錢引二百萬北宋時蜀交出放兩界每界一百二十餘萬後三界通行為三千七百八十餘萬至紹興末積至四千一百四十七萬餘貫時所貯鐵錢僅及七十萬貫以鹽酒等隂為稱提是以餉臣王之望亦謂添印錢引以救目前詔添印三百萬之望止添印一百萬至是又増印乾道初詔兩淮京西悉用鐵錢荆門地接襄峴亦用鐵錢二年詔别印二百三百五百一貫交子三百萬止行使於兩淮其舊㑹聴對易凡入輸買賣並以交子及錢中半如往來不便以交子㑹各二十萬付鎮江建康府𣙜貨務使淮人之過江江南人之渡淮者皆得對易循環以用尋以交子不便復詔銅錢并㑹子依舊過江行用民間交子許作見錢輸官三年詔造新交子一百三十萬付淮南漕司分給州軍行使不限以年尋以民間㑹子破損别造五百萬换給又詔損㑹貫百錢數可騐者並作上供錢入輸巨室以低償收者坐之四年以取到舊㑹毁抹付㑹子局重造三年立為一界界以一千萬貫為額隨界造新换舊凡舊㑹破損貫百字存印文可騐者即與兑換五年令行在𣙜貨務都茶塲将請筭茶鹽香􅈨鈔引權許收换第一界㑹子後每界收换如之其州縣諸色綱錢以七分收錢三分收㑹六年舒蘄黄各置監鑄折二錢令兩淮通行九年大江之西及湖廣間多毁錢夾以泥沙重鑄號尾錢詔嚴禁之淳熈二年又併贑司歸饒州三年詔第三界第四界㑹子各展限三年令都茶塲㑹子庫以第四界續印㑹子二百萬貯南庫時户部嵗入一千二百萬其半為㑹子南庫以金銀换收者四百萬流行於界外者二百萬耳五年以蜀引增至四千五百餘萬立額不令再増九年詔廣泉明秀漏泄銅錢坐其守臣舶商往來錢寳多泄因詔十年併舒州宿城監入同安監十二年詔舒蘄鑄錢以淳熈通寳為文十五年四川餉臣言大安軍及嘉川縣産鐵七十餘萬斤乞従鼓鑄光宗紹熈元年詔第七第八界㑹子各展三年臣僚言㑹子界以三年為限今展至再則為九年何以示信於是詔造第十界立定年限二年詔川引展界行使三年詔造交子二百萬付淮東造一百萬付淮西每貫准鐵錢七百七十文足以三年為界寧宗慶元元年詔㑹子界以三千萬為額三年禁銅器期兩月鬻於官復神泉監以所括銅器鑄當三大錢四年詔兩淮第二界㑹子限滿明年六月更展一界嘉泰三年罷舒蘄鼓鑄開禧三年復之時川引兩界出放凡五千三百餘萬緡通三界出放益多嘉定初川引毎緡止直鐵錢四百以下餉臣陳咸出金銀度牒一千三百萬收囘半界期以嵗終不用諸州去總所逺者千數百里期限已逼受給之際吏復為奸於是商賈不行民皆嗟怨一引之直僅售百錢制司乃諭人除易一千三百萬引三界依舊通行又檄總所取金銀就成都置塲收兑民心稍定自後引直鐵錢五百又即利州鑄當五大錢二年以三界㑹子數多稱提無䇿㑹十一界除已收換尚存一千三百六十萬餘貫十二界十三界除燒毁尚存一萬二百餘萬貫詔封樁庫撥金一百五萬兩度牒七千道官告綾紙乳香凑成三千餘添貼臨安府官局收易舊㑹品搭入輸以舊㑹之二易新㑹之一五年江北以銅錢一易鐡錢四詔禁之時銅錢之在江北者悉以鐵錢易之或以㑹子一貫易銅錢一貫乾道以後皆然其銅錢輸送行在易京西銅錢亦如兩淮例九年四川安撫制置大使司言川引每界舊例三年一易自開禧軍興以後用度不給展年收兑遂至兩界三界通使然卒以三年界滿方出令展界以致民聴惶惑今欲以十年為一界著為定令則民旅不復懷疑従之青田縣主簿陳耆卿奏言錢猶母也楮猶子也母子所以相權不可重子而輕母也夫有錢而後有楮益多則其壅滯益甚甚則稱提之説興焉厥今在朝在野日夜講畫而奉行未嘗有言及錢者楮日多錢日少禁楮之折閲者日嚴而禁錢之漏泄者日寛非果寛也寛於大而獨嚴於小則雖謂之寛可也闉堵之間有腰百金以出者吏卒已目送之積而至於數百則攟摭之鞭笞之矣髙檣巨舳出没江海有豪家窟穴其中則人不敢仰視間能捐豪末以餌邏卒則如履康莊矣若是者知㡬數百耶夫豪家之弊猶可言也富商之弊不可言也豪家泄之於近而富商泄之於逺泄於近猶在中國也泄於逺則轉及外夷而不可復返矣夫一金之鑄其為費不啻數金一金之博易其為利亦不啻數金朝廷常以數金之費而為富商謀數金之利錢既日耗則其命遂歸於楮其弊遂積於楮而上下之間遂一切併力於楮不知楮之所以難行者不獨以楮之多而亦正以錢之少也存者既少藏者愈牢故雖以重法欲散出之彼将曰吾之錢吾所自有吾所藏也彼以中國之所有而散之外夷上不之禁而何以咎我是故家可空身可辱而心不可服盍亦反其本乎故臣以為今日之務不専在於稱提楮弊又在於稱提銅錢也盖今銅錢之法大率犯者罰輕而捕者賞輕犯者罰輕則人易為奸捕者賞輕則吏不盡力臣愚欲望聖慈申飭攸司嚴漏泄之憲優掩獲之典其捕至若干者特與附類獲盜改秩以風厲之庶㡬各務罄竭以従上之令誠使錢不甚荒則楮不偏勝此稱提本務也江西提舉袁燮疏曰我孝宗皇帝頒楮幣於天下常通而不壅常重而不輕無他道焉有以收之而已自開禧用兵造幣甚廣知散而不知收故其價甚賤今日更定其法固将流通而不窮其可不法孝宗所以收之者乎盖楮之為物也多則賤少則貴收之則少矣賤則壅貴則通收之則通矣雖然朝廷收之可也州郡若何收之曰是在長吏而已長吏而賢何事不集今公清者少貪濁者衆肆為蟊賊無所忌憚尚何望其財用之積而楮幣之收乎我朝家法最為忠厚而獨於贓吏之罰甚峻深知其蠧不得不然當今之務謂宜痛懲貪濁崇奬公清盖公清之士必能正身律下而黠吏莫措其奸必能愛惜財物而冗費無所不節必能選擇官僚講理財之䇿必能寛裕民力養豐財之源薄闗市之征則商旅四集謹鉟銷之防則銅錢不耗嚴交易税契之法則泉貨頓增守錢㑹相半之制則藏鏹可出財既裕矣視時楮價其賤耶亟從而收之何憂其不貴至日月浸乆價将復賤則又收之非常收也賤而後收也此孝宗之規模也今為郡守者或拘民間米鹽並從官賣或科有餘之家强以買㑹或令民間輸納非買楮於官者不與收接甚者課吏牧豕聴其自賣而輸緡錢於官朝夕紛紛與民争利甚非治民之事也惟聖主速救之又上便民疏曰臣聞楮幣之用至今而窮立法而稱提之所以濟其窮也然今日之所謂稱提者果能有濟乎始以法令従事兑不以省陌者必罰無赦未㡬従民之便又未㡬而有三分七分之説展轉屢變而卒歸於銅錢楮幣之相半是復其舊也是猶未始稱提也經乆可行之策顧不在兹乎今議者急於豐財欲用鐵錢與銅錢並行當不足之時倐焉有餘寧不可喜而其實有不然者往時楮幣多故銅錢少而又益以鐵錢不愈少乎往時楮幣多故物價貴今又益以鐵錢不愈貴乎銅鐵之價固不相若鑄以為錢孰貴孰賤兼用之於市而實得銅錢之直得無徒費鐵錢乎兩淮虗耗甚矣運鐵錢於江南貿易而歸固将裕之也然江南之楮幣易淮甸之鐵錢厥價三倍奸巧之民争先取之此盈而彼虛矣鐵錢日以朘削銅錢禁不得往淮人將安所用哉名曰裕之其實蹙之臣不知其可也且夫鐵錢之易就非若銅錢之難成盜錢如雲而起楮之輕也滋甚譬之人方病寒又以凉劑投之祇益其病而已内不足以權楮外不足以裕淮将何便於此哉且今日楮幣之輕得非以銅錢之寡歟海舶之洩未始無法也而檢空之委得於情懇納其私賄縦其私載則連檣而去奸民相結貯錢小舟潜往海洋納諸巨舶稇載而歸此錢之所由少也獨不可申嚴其禁乎銷錢為器未始無法而獲利十倍人競趨之所在公行若當然者句容天台四明池陽臨川之所鑄者以精巧名人皆貴之此錢之所以銷也獨不可痛懲其奸乎鼓鑄之司令至嚴也毎嵗増之何可勝用自黠吏既漁其利而塲户復濟其奸憚取銅之難銷錢以輸之幸其精煉無復致詰錢安得而不耗獨不可堅明其約束乎邦有常典講若畫一人不畏法以法繩之誰敢不服若夫守法之地人皆觀瞻而先自廢法罪莫大焉銅楮相半之制其來舊矣乃創為新例輸楮於官者必令貼納是利其贏也是弛相半之法而置錢於無用之地也奸民乘之逞其私欲毁之匿之者不勝其衆是孰為之倡哉臣竊觀當今州郡大抵兼行楮幣所在填委而錢常不足間有純用銅錢不雜他幣者而錢每有餘以是知楮惟能害銅非能濟銅之所不及也加之貼納豈貨泉之利也哉朝廷深懲往事革三分七分之弊而復二者均平之法此乾道淳熈之美意也人情翕然僉曰至當守法之便昭晰如此夫法有常守則觀聴不惑而民有定志法不一定則前後相戾而人無信心守銅楮相半之法悠乆不變而異時謀利撓法之蠧蕩滌無餘尚何憂銅錢之寡而楮幣之輕乎此當今之急務也唯明主留意焉理宗寳慶元年新錢以大宋元寳為文紹定五年兩界㑹子已及三億二千九百餘萬端平元年復申嚴銅錢入海之禁二年臣僚請以兩界舊㑹付封樁庫收貯以備緩急從之嘉熈元年詔新錢當二并小平錢並以嘉熈通寳為文當三錢以嘉熈重寳為文淳祐二年宗正丞韓祥奏壞楮弊者只縁變更救楮弊者無如收減自去年至今楮價粗定不至折閲者不變更之力也今已罷諸造楮局及諸州科買楮皮更多方收減則楮價有可增之理帝善之三年臣僚言今官印之數雖損而偽造之劵愈増且以十五十六界㑹子言之其所入之數宜減於所出之數今收换之際元額既溢舉者未已若非偽造其何能致多如是大抵前之二界盡用川紙物料既精工製不茍民欲為偽尚或難之迨十七界之更印以雜用川杜之紙至十八界則全用杜紙矣紙既可以自造價且五倍於前故昔之為偽者難今之為偽者易人心循利甚於畏法况利可立致而刑未即加者乎臣愚以為抄撩之際増添紙料寛假工程務極精緻使人不能為偽者上也禁捕之法厚為之勸厲為之防使人不敢為偽者次也四年復申嚴銅錢漏泄之禁七年以十八界十七界㑹子更不立限永逺行使八年監察御史陳求魯言議者謂楮便於運轉故錢廢於蟄藏自稱提之屢更圜法為無用急於扶楮者至嗾盜賊以窺人之閫奥峻刑法以發人之窖藏然不思患在於錢之荒而不在於錢之積夫錢貴則物宜賤今物與錢俱重此一世之所共憂也蕃舶巨艘若山嶽乗風駕浪深入遐陬販於中國者皆浮靡無用之異物而泄於外地者乃國家富貴之操柄所得㡬何所失者不可勝計矣京城之銷金衢信之鍮器醴泉之樂具皆出於錢臨川隆興桂林之銅工尤多於諸郡姑以長沙一郡言之烏山銅爐之所六十有四麻潭鵞羊山銅户數百餘家錢之不壞於器物者無㡬今京邑鍮銅器用之類鬻賣公行於都市畿甸之近一繩以法由内及外觀聴聿新則鉟銷之奸知畏矣香藥象犀之類異物之珍竒可悦者本無適用之實服御之間昭示儉徳自上化下風俗丕變則漏泄之弊少息矣此端本澄源之道也詔従之十年以㑹價低復申嚴下海之禁十一年以㑹價増減課其官吏十二年申嚴鉟銷之禁及偽造漏泄之法寳祐元年詔新錢以皇宋元寳為文時賈似道當國請稱提楮幣改造金銀見錢闗子以一準十闗子之制上一黒印如西字中三紅印相連如目字兩傍各一小長黒印宛然一賈字銀闗既行物價頓踴矣四年臺臣奏川引銀㑹之弊皆因自印自用有出無收當拘印造之權歸之朝廷倣十八界㑹子造四川會子視淳祐之令作七百七十陌於四川州縣公私行使兩料川引並毁見在銀㑹姑存舊引既清新㑹有限則楮價不損物價自平公私俱便矣従之景定四年以收買逾限之田復増印㑹子一十五萬貫度宗咸淳元年復申嚴鉟銷漏禁四年以近頒見錢闗子貫作七百七十文足十八界每道作二百五十七文足三道準闗子一貫同見錢轉使公私擅減者官以贓論吏則配籍五年復申嚴闗子減落之禁復以㑹板發下成都運司掌之七年以行在紙局所造闗子紙不精命四川制使抄造輸送每嵗以二千萬作四川綱引遼太祖以土産多銅廣造錢幣遂致富强以開帝業太宗置五冶太師以總四方錢鐵石敬塘又獻沿邉所積錢以備軍實景宗乾亨中以舊錢不足於用始鑄乾亨新錢錢用流布聖宗統和十四年鑿大安山取劉守光所藏錢㪚諸五計司又出内藏錢賜南京諸軍司太平中兼鑄太平錢新舊互用興宗重熈二十二年長春州置錢帛司道宗清寧二年詔行東京所鑄錢九年令諸路不得貨銅鐵以防私鑄又定銅鐵入囘鶻法禁益嚴矣大康九年禁外官部内貸錢取息十年禁毁銅錢為器大安四年禁錢出境是時錢有四等曰咸雍大康大安夀隆皆以改元易名肉好銖數不可考後經費浩繁鼓鑄仍舊國用不給至天祚之世更鑄乾統天慶天祚帝年號二等新錢而上下窮困府庫無餘積矣金初用遼宋舊錢太宗天㑹末亦用齊劉豫國號阜昌元寳阜昌重寳錢海陵貞元二年置印造鈔引庫及交鈔庫用宋張詠交子法製鈔一貫二貫三貫五貫十貫為大鈔一百二百三百五百七百為小鈔以七年為限與錢並行尋罷七年之限令民得常用嵗乆字文磨滅許於所在官庫納舊换新毎貫取工墨錢十五文正隆二年始議鼔鑄又禁銅越境外懸罪賞格括民間銅鍮器三年中都置監二東曰寳源西曰寳豐京兆置監一曰利用鑄錢文曰正隆通寳輕重如宋小平錢而肉好字文峻整過之與舊錢通用世宗大定元年命陜西參用舊鐵錢四年以鐵錢不行詔罷之八年禁銷錢鑄鏡者十年以官錢多積恐民間不得流通令諸處貿易金銀絲帛以圖流轉時吏多抑配反害百姓帝切責之十一年禁私鑄銅舊有銅器悉送官給其直之半惟神佛像鐘磬魚袋之屬則存之十二年以銅少遣使諸路規措銅貨能指坑冶得實者賞十三年命非屯兵之州府以錢市易金帛運致京師使錢幣流通以濟民用十六年遣使分路訪察銅鑛苖脉十八年代州立監二十年命名阜通鑄錢命工部郎中張大節吏部員外郎麻珪監保徳軍鑄錢監初命李天吉知軍事髙季孫往監之而所鑄斑駁黒澁不可用詔削天吉季孫官兩階仍杖季孫八十其錢文曰大定通寳字文肉好二十年詔與舊錢並用初新錢之未行也以宋大觀錢當五用之又令官民用錢皆以八十為陌従斡魯補請也時獨民間以八十為陌為短錢官司用足陌為長錢至是遂定為制二十三年令交鈔易新不拘貫例毎張取工墨錢八文二十六年命諸路官錢非屯兵處可盡運至京師從丞相克寧請止運其半二十七年曲陽縣鑄錢别為一監名利通二十九年以代州曲陽二監嵗鑄錢十四萬餘貫而嵗所費至八十餘萬遂罷之時章宗已即位章宗明昌二年防銷錢鑄鏡減賣鏡價大定間定制民間以銅鏡申賣入官每斤三百十四文三年勑民間流轉交鈔當限其數毋令多於見錢四年令籍錢貯於庫以備緩急時陜西交鈔多於見錢民艱流轉令本路𣙜税及諸名色錢折交鈔五年令官民之家以品從物力限見錢多不過三萬貫明安穆昆以牛具為差不得過萬貫凡有餘令易諸物收貯之承安二年交鈔工墨錢令收十二文以鈔買鹽引毎貫權作一貫一百文時交鈔所出數多民間成貫例艱於流轉詔西北二京遼東路従宜給小鈔且許於官庫换錢與他路通行又鑄銀名承安寳貨一兩至十兩分五等每兩折錢二貫公私同見錢用仍定銷鑄及接受稽留罪賞格舊例銀毎鋌五十兩其直百貫民有截鑿者價亦隨低昻凡官兵俸及邉戍軍須皆以銀鈔相兼行使三年令以錢與外方人使及與交易者徒五年三斤以上死駔儈同罪捕告人官先代給賞五百貫其接引館伴等以次坐罪仍令均償時交鈔稍滯命西京北京臨潢遼東等路一貫以上俱用銀鈔寳貨一貫以下聴民便復以一貫以下交鈔許易錢用之時官民多不遵限錢法遂復減元限之數更定官民存留錢法三分為率親王公主品官許留一分餘皆半之其贏餘之數期五十日内盡易諸物違者以違制論以錢賞告者又於兩行部各置囘易務以綿絹物服易銀鈔亦許本務納鹽鈔赴𣙜塲出鹽引納鈔於山東河北河東等路従便易錢各降補官及徳號空勑三百度牒一千從兩行部指定處限四月進納補换又置四庫更造一百例小鈔以代鈔本並許官庫易錢一貫二貫例並支小鈔三貫例則支銀一兩小鈔一貫若五貫十貫例則四分支小鈔六分支銀欲得寳貨者聴有限滯及輙減價者罪之四年以銀鈔阻滯令院務諸科名錢除京師河南陜西銀鈔従便餘路並許收銀鈔各半仍於鈔四分之一許納其本路隨路所收交鈔除本路者不復支發餘通行者並循環用之𣙜貨所鬻鹽引收納寶貨與鈔相半銀每兩止折鈔兩貫許人依舊詣庫納紗隨路漕河所收除額外羡餘者亦如之所支官錢亦以銀鈔相兼銀已零截者令交鈔庫不復支若寳貨數少可復增鑄銀鈔既通則物價自平雖有禁法亦安所施因除阻滯銀鈔罪制又命在部官錢𣙜貨務鹽引並聴收寳貨附近監司貼錢數亦許帯納民間寳貨有所歸自然通行不至銷毁時復令不須印造小鈔俟其换錢既盡可罷四庫但以大鈔騐錢數支易見錢時私鑄承安寳貨者多雜以銅錫寖不能行京師閉肆五年罷承安寳貨泰和元年通州刺史盧構言銀出多入少市價不平若令諸税以錢銀鈔三分均納庶革其弊下省議宰臣謂軍興用交鈔以出多遂滯如欲均納必至偏勝至欲銀價之平宜令諸名各鋪馬軍須等錢許納銀半無者聴便二年令諸税各𢃄納三合同交鈔一分先是嘗行之後止行於民間而官不收歛朝廷慮其病民雖止係本路者亦許不限路分通納户部見徴累年鋪馬錢亦聴收其半尋廢不用至是國虚民貧其弊彌甚四年罷限錢法五年欲増鑄錢命百官議足銅之術中丞孟鑄謂銷錢作銅及盜用出境者不止宜罪其官及隣太府監梁􅚻等言鑄錢甚費率費十錢得一錢識者謂費雖多猶增一錢也乞採銅拘工以鑄宰臣謂鼓鑄未可速行其銅冶聴民煎煉官為買之凡寺觀不及十人不許畜法器民間鍮銅器期以兩月送官給價匿者以私法坐限外人告者以知而不糾坐其官寺觀許童行告者賞又定便易錢法聴人輸納於京師而於山東河北大名河東等路依數支取後鑄大錢一直十篆文曰泰和重寳與鈔參行時又令交鈔工墨錢貫止收六文六年陜西交鈔不行以見錢十萬貫為鈔本與鈔相易復以小鈔十萬貫相參用之時復許諸路各行小鈔於各路府州官庫易錢又令户部印小鈔五等附各路同見錢用七年勑在官毋得支出大鈔在民者令赴庫易小鈔及見錢院務商税及諸名錢三分須納大鈔一分惟遼東從便時貨幣屢更民多嗟怨户部尚書髙汝礪等議立鈔法條約凡民間交易典質一貫以上並用交鈔須立契者三分之一用諸物六盤山西遼河東以五分之一用鈔東鄙屯田户以六分之一用鈔不須立契者惟遼東錢鈔従便工墨錢每張止收二錢商旅賫見錢不得過十貫所司籍辨鈔人以防偽冐品官及民家存留見錢比舊減其數若舊有錢多者許送官易鈔十貫以上不得出京民間有宋㑹子亦令同見錢用十貫以上不許特行𣙜鹽許用銀絹餘市易及俸並用交鈔其竒數以小鈔足之銀絹不足應支亦給鈔隨處州府各有辦鈔庫去都逺之地設置合同换錢客旅經之皆可相易納昬鈔者受而不支積半嵗赴都易新鈔又令州縣委官於市肆要處置庫支换以出首之鈔為鈔本易錢者人不得過二貫帝従之勑捕獲偽造交鈔者皆以交鈔為賞尋復議更鈔法帝從髙汝礪言命在官大鈔更不許出聴民以五貫十貫例者赴庫易小鈔欲得錢者五貫内與一緡十貫内與兩緡惟遼東従便河南陜西山東及他行鈔諸路院務諸税及諸科名錢並以三分為率一分納十貫例二分五貫例餘並收見錢八年京師鈔滯收毁大鈔行小鈔時孫鐸言院務税諸名錢可盡收鈔秋夏税納本色外亦令收鈔不拘貫例農民知漸重鈔可以流通并請罷諸州縣鈔局以免市肆抑配買鈔令赴省庫易小鈔各限路分亦甚未便可令通行帝命亟行之又令官兵俸以十分為率軍兵給錢三分官員承應人給二分多不過十貫餘皆給鈔民間舊鈔故暗者許所在庫易新若舊限已滿當更展五十日許令變易鈔引諸物宣宗貞祐二年乃更作二十貫至百貫例交鈔又造二百貫至千貫例者時交鈔有出無入輕而不行鈔毎貫僅直一錢三年河東宣撫使胥鼎請權禁見錢令計司以軍須為名量民力徴歛則泉貨通而物價平矣自是泉貨不用富家皆至窘敗時謂之坐化商人往往舟運貿易於江淮錢多入於宋矣又詔改交鈔名為貞祐寳劵時京師榖價翔踴帝令尚書省集議開封府議謂寳劵初行民甚重之但以河北陜西諸路所支既多人遂輕之商賈争收入京以市金銀銀價昂榖亦隨之若令寳劵路各殊制則不可復入河南則河南金銀賤而榖自輕帝從其議而河北寳劵遂不復行於河南由是愈滯詔集百官議従陜西行省令史惠吉言更造劵以貞祐通寳為名惠吉言自百至三十等之為十聴各路轉運司印造仍不得過五千貫與舊券參用興定元年始詔行之凡一貫當貞祐寳劵千貫重偽造阻格罪及捕獲之賞時製鈔紙用桑皮故紙皆取於民至是鈔法屢更得紙甚艱令計價但徴寳劵通寳名曰桑皮故紙錢五年宰臣奏向者寳劵既弊乃造貞祐通寳以救之迄今五年其弊又復如寳劵之末初通寳四貫為銀一兩今八百餘貫矣宜復更造興定寳泉子母相權與通寳兼行毎貫當通寳四百貫以二貫為銀一兩隨處置庫許人以通寳易之縣官能使民流通者進官一階陞職一等其或姑息以致壅滯則亦追降的决為差州府官以所屬司縣定罪賞命監察御史及諸路行部官察之定撓法失糾舉法失舉則御史降决行部官降罰集衆妄議難行者徒二年告捕者賞錢三百貫元光元年始詔行之二年更造每貫當通寳五十又以綾印製元光珍貨同銀鈔及餘鈔行之三年寳泉㡬於不用乃定法銀一兩不得過寳泉三百貫凡物可直銀三兩以下者不許用銀以上者三分為率一分用銀二分用寳泉及珍貨重寳京師及州郡置平準務以寳銀相易哀宗正大間民間但以銀市易天興二年印天興寳㑹於蔡州自一錢至四錢四等同見銀流轉欽定續通典卷十二
