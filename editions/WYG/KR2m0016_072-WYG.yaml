body:
  text: 禮軍臣等謹案杜典述軍禮較諸禮為畧盖以軍禮自田獵大射而外其用之邦國者典不常舉儀亦最簡也夫周官因田賦以出兵而儀禮不備其文後世養兵之制多屬一時權宜儀文之畧有由來矣然大刑用甲兵而古者必裁之以禮此大易所謂以此毒天下而民從之也宋人立國本弱親征大閱諸制徒為繁縟遼金元因其國俗用兵動合機宜行師肄武因事以定為禮制簡而易行明初於田獵大閱諸制間有修舉至中葉而紀綱不振營制亦紊矣今据諸史禮志兵志營衛志之言軍禮者自親征祭告以及時儺以次類纂其散見於帝紀及續通鑑諸書者兼采以補史志所未備焉天子諸侯將出征類宜造禡並祭所過山川宋遼元明宋太宗征河東出京前一日遣右贊善大夫潘慎修出郊用少牢一祭蚩尤禡牙遣著作佐郎李巨源即北郊望氣壇用香栁枝燈油乳粥酥蜜餅果祭北方天王太平興國五年十一月太常禮儀院言車駕北征請出宫前一日遣官祭蚩尤及禡牙於地並用少牢祭北方天王於北郊迎氣壇從之仍遣内侍一人監祭咸平中詔太常禮院定禡儀所司除地為壇兩壝繞以青繩張幄帟置軍牙大纛位版版方七寸厚三分祭用剛日具饌牲用太牢以羊豕代其幣長一丈八尺軍牙以白大纛以皂都部署初獻副都部署亞獻部署三獻皆戎服清齋一宿將校陪位禮畢焚幣釁鼓以一牢又擇日祭馬祖馬社遼皇帝親征儀常以秋冬應敵制變或無時將出師必先告廟乃立三神主祭之曰先帝曰道路曰軍旅刑青牛白馬以祭天地其祭常依獨樹無獨樹即所舍而行之或皇帝服介胄祭諸先帝宫廟乃閱兵將行牝牡麃各一為􅀈祭將臨敵結馬尾祈拜天地而後入下城克敵祭天地牲以白黒羊班師以所獲牡馬牛各一祭天地出師以死囚還師以一諜者植柱縛其上於所向之方亂射之矢集如蝟謂之射鬼箭景宗乾亨二年十月辛巳將南伐祭旗鼓聖宗統和六年九月癸卯祭旗鼓元憲宗七年詔諸王出師征宋夏六月謁太祖行宫祭旗鼓明太祖洪武元年閏七月詔定軍禮中書省臣㑹儒臣言古者天子親征所以順天應人除殘去暴以安天下自黄帝習用干戈以征不享此其始也周制天子親征則類於上帝宜於大社造於祖廟禡於所征之地及祭所過山川師還則奏凱獻俘於廟社後魏有宣露布之制唐仍舊典宋亦間行焉於是厯考舊章定為親征禮奏之前期擇日祭告天地宗社皇帝服武弁乘革輅備六軍具牲幣作樂皆行三獻禮其儀與大祀同又於國南神祠行禡祭禮凡所過山川嶽鎮海瀆用太牢其次少牢又次特牲若行速止用酒脯祭器籩豆各一前期齋一日皇帝服通天冠絳紗袍省牲視滌祭之日服武弁行一獻禮其禡祭儀制皇帝及大將陪祭官皆齋一日前一日皇帝服通天冠絳紗袍省牲詣神厨視鼎鑊滌溉執事設軍牙大纛於廟中之北軍牙東大纛西籩豆十二簠簋各二鉶登俎各三設瘞坎位於神位西北設席於坎前上置酒碗五雄雞五餘陳設如常儀祭日建牙旗大纛於神位後皇帝服武弁自左南門入至廟廷南正中北向立大將及陪祭官分文武重行班於後迎神再拜奠幣行初獻禮先詣軍牙神位前再詣大纛神位前俱再拜亞獻終獻如之惟初獻讀祝詣飲福位再拜飲福受胙又再拜掌祭官徹豆贊禮唱送神復再拜執事官各以祝幣掌祭官取饌詣燎所太常奏請望燎執事殺雞刺血於酒碗中酧神燎半奏禮畢駕還若遣將則於旗纛廟壇行三獻禮大將初獻諸將亞獻成祖永樂八年二月以親征祓於承天門遣官祭太嵗旗纛之神八月丁未遣祭旗纛世宗嘉靖十八年南廵遣官祭旗纛之神用牲醴制帛三獻如常儀軷祭臣等謹按軷祭之禮起於周天子將出師大馭掌馭玊輅以祀及犯軷自是以後唯後周及隋唐用之唐以後其禮乆廢明成祖時雖嘗舉行而儀文不備茲不復續纂云天子諸侯四時田獵唐元五代明宋遼金唐徳宗貞元十一年十二月上獵苑中戒多殺止行三驅之禮勞士而還穆宗長慶二年獵於咸陽又獵於驪山㑹昌二年十一月獵於白鹿原後唐莊宗同光中屢畋於伊闕明宗天成二年畋於東郊晉高祖天福八年畋於近郊出帝開運七年畋於戚城宋太祖建隆二年始校獵於近郊先出禁軍為圍場五坊以鷙禽細犬從帝親射走兎三從官貢馬稱賀其後多以秋冬或正月田於四郊從官或賜窄袍煖鞾親王以下射中者賜焉太宗將北征因閱武獵近郊以多盜獵狐兎者命禁之有衛士奪人獐當死帝曰若殺之後世必謂我重獸而輕人特貰其罪帝嘗以臘日校獵諭從臣曰出狩以從時令緩轡從禽是非荒也四幸講武臺張樂賜羣臣飲其後獵西郊親射走兎五詔以古者蒐狩以所獲之禽薦享宗廟而其禮久廢今可復之遂為定式真宗時詔教駿所養鷹鶻以備諸王從時展禮仁宗時臣僚言校獵之制所以順時令訓戎事請修此禮於是詔樞密院奏定制度獵日五鼓帝御内東門賜從官酒三行奏鈞容樂幸瓊林苑門賜從官食遂獵於楊村宴於幄殿奏教坊樂遣使以所獲馳薦太廟既而召父老臨問賜以飲食茶絹及五坊軍士銀絹有差宰相賈昌朝等曰陛下暫幸近郊順時田獵取鮮殺而登廟爼所以昭孝慎也即高原而閱軍實所以講武事也問耆老而賜飲食所以養老也勞田夫而賜惠所以勸農也乘輿一出而四美皆具伏望宣付史館從之明年復獵於城南東韓村自玊津園去輦乘馬分騎士數千為左右翼節以鼓旗合圍塲徑十餘里部隊相應帝按轡道中親挾弓矢屢獲禽仍召父老存問欽宗靖康後不復講遼國俗以畜牧射獵為業獵無常時地無定所太祖七年次烏林觀漁九年射魚於漠北神冊中射虎於東山射龍於伊喇山陽水上天贊中獵於雅爾鼐都勒斡山觀漁於烏勒呼河天顯中障鷹於近山蒐於潢水之曲㑹同以後如射栁射鹿射鴨釣魚每歳舉行焉四時各有行在之所謂之巴納春曰鴨子河濼皇帝正月上旬起牙帳約六十日方至天鵞未至卓帳氷上鑿氷取魚氷泮乃縱鷹鶻捕鵞雁晨出暮歸從事弋獵鴨子河濼東西二十里南北三十里在長春州東北三十五里四面皆沙渦多榆栁杏林皇帝每至侍御皆服墨緑色衣各備連鎚一抦鷹食一器刺鵞錐一枝於濼周圍相去各五七歩排立皇帝冠巾衣時服繫玊束帶於上風望之有鵞之處舉旗探騎馳報逺泊鳴鼓鵞驚騰起左右圍騎皆舉幟麾之五坊擎進海東青鶻拜授皇帝放之鶻擒鵞墜勢力不加排立者舉錐刺鵞取腦以飼鶻救鶻人例賞銀絹皇帝得頭鵞薦廟羣臣各獻酒菓舉樂更相酬酢致賀語皆挿鵞毛於首以為樂賜從人酒徧散其毛弋獵網釣春盡乃還夏巴納無常所多在圖爾山道宗每歳先幸黒山拜聖宗興宗陵賞金蓮乃幸子河避暑圖爾山在黒山東北三百里近饅頭山黒山在慶州北十三里上有池池中有金蓮子河在圖爾山東北三百里懐州西有清凉殿亦為行幸避暑之所四月中旬起牙帳卜吉地為納凉所五月末旬六月上旬至居五旬與南北臣僚議國事暇日遊獵七月中旬乃去秋巴納曰伏虎林在永州西北五十里嘗有虎據林傷害居民畜牧景宗領數騎獵焉虎伏草際戰慄不敢仰視上舍之因號伏虎林毎歲車駕至皇族而下分布濼水側伺夜將半鹿飲鹽水令獵人吹角效鹿鳴既集而射之謂䑛鹻鹿又名呼鹿冬巴納曰廣平淀在永州東南三十里本名白馬淀東西二十餘里南北十餘里地甚坦夷四面皆沙磧木多榆栁其地饒沙冬月稍暖牙帳多於此坐冬與南北大臣㑹議國事時出校獵講武兼受南宋及諸國禮貢皇帝牙帳以槍為硬寨用毛繩連繫每帳下有黒傘以庇衞士風雪槍外小氊帳一層每帳五人各執兵仗為禁圍又定獵儀於十二月辰日前期一日詔司獵官選獵地其日皇帝皇后焚香拜日畢設圍命獵夫張左右翼司獵官奏成列皇帝皇后升輿車多囉倫穆騰以酒二尊盤飱奉進北南院大王以下進馬及衣皇帝降輿祭東畢乘馬入圍中皇太子親王率羣官進酒分兩翼而行皇帝始獲兎羣臣進酒上夀各賜以酒至中食之次親王大臣各進所獲及酒訖賜羣臣酒還宫其服飾皇帝幅巾擐甲戎裝以貂䑕或鵞頂鴨頭為杆腰蕃漢諸司使以上並戎裝皆左袵黒緑色金世宗大定三年十二月獵於近郊所獲薦山陵自是嵗以為常章宗明昌元年制諸王任外路者許逰獵五日過此禁之又遣諸王出獵毋越本境其從獵之服春水以鶻捕鵞雜花卉為飾秋水以熊鹿山林為文元制自御位及諸王皆有鷹人是故捕獵有戸使之致鮮食以供宗廟天庖而齒革羽毛又皆足以備用然地有禁取有時而違者則罪之春冬之交天子或親幸近郊縱鷹隼搏擊之以為遊豫之度謂之飛放故鷹房捕獵皆有司存世祖中統三年禁京畿田獵至元元年禁上都畿内捕獵七年七月命達嚕噶齊烏蘭哈達給上都扈從畋獵糧十年九月遼東饑弛獵禁戊子禁五百里内射獵己丑敕自今秋獵鹿豕先薦太廟成宗大徳元年禁民間捕鷹鷂命諸阿濟格自今出獵悉自供具毋傷民力明成祖永樂十年十月獵於城南武岡二十年五月車駕度偏嶺命將士獵於道傍山下上顧從臣曰士卒隨朕征討道中唯畋獵可以馳馬揮戈拒揚武士作其驍勇之氣宣宗宣徳四年獵於谷口英宗天順二年上校獵南苑苑在京城南二十里苑中有按鷹臺一名晾鷹臺臺旁有三海皆元之舊也大閲唐五代宋遼金元明臣等謹案杜典有出師儀制而揚兵講武附焉其書本未載出師之儀悉叙各代閱兵講武之典今考各代正史及㑹要㑹典諸書皆未特載出師儀制大約所謂儀制者即親征之禮是也今改曰大閱而以各代閱兵之禮纂序於左唐肅宗至徳二載八月大閱乾元元年正月大閱諸軍於含元殿庭上御棲鸞閣觀之寳應元年九月大閱兵馬於鳴鳯門街梁太祖開平元年冬十月講武於繁臺四年春正月講武於榆林乾化元年八月大閱於興安鞠場十月大閱於魏東郊後唐天祐十有五年八月大閱於魏東郊明宗天成二年十月御興教門觀兵晉高祖天福二年十月勅習戰講武厯代通規選士練兵其采舊制宜以每年農隙時講武乃准令式處分開運元年正月講武於澶淵二年二月大閱於戚城周世宗顯徳元年三月次澤州閲兵於北郊宋太祖征伐四方親講武事故不盡用定儀亦不常其處鑿講武池朱明門外以習水戰復築講武臺城西楊村秋九月大閱與從臣登臺觀焉真宗詔有司擇地含輝門外之東武村為廣場置臺臺上設屋搆行宫其夜三鼓殿前侍衞馬歩諸軍分出諸門詰旦帝乘馬從官並戎服賜以窄袍至行宫諸軍陣臺前左右相向歩騎交屬亘二十里諸班衞士扈從於後有司奏成列帝升臺東向御戎帳召從臣坐觀之殿前都指揮使王超執五方旗以節進退於兩陣中起候臺相望使人執旗如臺上之數以相應初舉黄旗諸軍旅拜舉赤旗則騎進舉青旗則歩進每旗動則鼓駴士譟聲震百里外皆三挑乃退次舉白旗諸軍復再拜呼萬歳有司奏陣堅而整士勇而厲欲再舉詔止之遂舉黒旗以振旅軍於左者略右陣以還由臺前出西北隅軍於右者略左陣以還由臺前出西南隅並凱旋以還乃召從臣宴教坊奏樂回御東華門閱諸軍還營鈞容奏樂於樓下復召從臣坐賜飲明日又賜近臣飲於中書諸軍將校飲於營中内職飲於軍器庫諸班衞士飲於殿門外神宗閱左藏庫副使牙斌所教牌手於崇政殿乃命殿前歩軍司擇驍健者依法教習自是營屯及更戍諸軍畿甸三路民兵皆隨伎藝召見親閱焉凡閱武禁衛戍軍民兵總率第其精粗賜以金帛而超等高者至命為吏選官其典領者優加職秩孝宗乾道二年幸候潮門外教塲次幸白石教塲應從駕