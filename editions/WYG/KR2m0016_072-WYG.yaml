於西舍人宣曰有勅降王以下再拜鞠躬舎人稱各賜某物畢又再拜稱萬歳若賜官即贊謝再拜並歸次易所賜服舍人先引降王以下至授遥郡以上當樓前北向東上立贊再拜稱萬歳又再拜次贊服冠帔婦女再拜僧尼别謝引還次贊樓上侍立官稱賀再拜禮直官舎人分引百官横行北向立贊拜訖班首稍前俛伏稱賀其詞中書隨事撰述賀訖復位在位者又再拜舞蹈三稱萬歳又再拜東上閤門官進詣樓前承㫖就班首宣曰有制贊者曰拜在位官皆再拜宣答其詞學士院隨事撰述又贊再拜三稱萬歳又再拜樓上樞密院前跪奏稱某官臣某言禮畢内侍索扇扇合簾垂帝降坐内侍贊扇開所司承㫖放仗樓下鳴鞭百官再拜退遼制下城克敵班師以所獲牡馬牛各一祭天地明太祖洪武四年蜀夏明昇降表至京師太祖命中書集議受降禮省部請如宋太祖受蜀主孟昶故事擬明昇朝見日皇帝御奉天門昇等於午門外跪進待罪表侍儀使捧表入宣表官宣讀訖承制官出𫝊制昇等皆俯伏於地侍儀舎人掖昇起其屬官皆起跪聴宣制釋罪昇等五拜三呼萬歳承制官𫝊制賜衣服冠帶侍儀舎人引昇入丹墀中四拜侍儀使𫝊㫖昇跪聴宣諭俯伏四拜三呼萬歳又四拜出百官行賀禮帝以昇年㓜事由臣下免其叩頭伏地上表請罪禮唯命昇及其官屬朝見百官朝賀其奏凱獻俘之儀凡親征師還皇帝率諸將陳凱樂俘馘於廟南門外社北門外告祭廟社行三獻禮同出師儀祭畢以俘馘付刑部協律郎導樂以退皇帝服通天冠絳紗袍升午門樓以露布詔天下百官具朝服以聴儀與開讀詔赦同大將奏凱儀先期大都督以露布聞内使監陳御坐於午門樓上前楹設奏凱樂位於樓前協律郎位於奏凱樂北司樂位於協律郎南又設獻俘位於樓前少南獻俘將校位於其北刑部尚書奏位於將校北皆北向又設刑部尚書受俘位於獻俘位西東向設露布於内道正中南向受露布位於案東承制位於案東北俱西向宣露布位於文武班南北向至日清晨先陳凱樂俘馘於廟社門外不奏歌曲俟告祭畢復陳樂於午門樓前將校引俘侍立於兵仗之外百官入侍立位皇帝常服升樓侍衛如常儀大將於樓前就位四拜諸將隨之退就侍立位贊奏凱樂協律郎執麾引樂上就位司樂跪請奏凱樂協律郎舉麾鼔吹振作徧奏樂曲樂止贊宣露布承制官以露布付受露布官引禮引詣案跪受由中道南行以授宣露布官宣訖付中書省頒示天下將校引俘至位刑部尚書跪奏曰某官某以某處所俘獻請付所司奏訖退後位其就刑者立於西廂東向以付刑官其宥罪者樓上承制官宣㫖有勅釋縛樓下承㫖釋訖贊禮贊所釋之俘謝恩皆四拜三呼將校以所釋俘退如有所賜就宣㫖賜之大將以下就拜位舞蹈山呼如常儀班前稍前跪稱賀致詞訖百官復四拜禮畢還宫後定制凡大㨗擇日以宣其日不奏事百官吉服賀即日遣官薦告郊廟中㨗以下止宣㨗不祭告慶賀成祖永樂四年定凡㨗兵部官以露布奏聞大將在軍則進露布官行禮次日行開讀禮第三日行慶賀禮餘如日儀欽定續通典卷七十二
