  text: 欽定四庫全書欽定續通典卷七
  hash: sha256:cf6826027a0b642e109618e75cc98c4de91ce0b6d672df0f10cfc64b517b6c13
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0016_WYG_007-1a, image: WYG0639/WYG0639-0096a.png}
body:
  text: 食貨鄉黨版籍職役附宋五代遼金元明臣等謹按杜典食貨立鄉黨版籍一門而所載徐偉長中論齊髙帝建元之詔皆及職役今考宋以後各史及厯朝㑹要㑹典諸書凡鄉黨里保雖代異其制而必兼職役焉故以職役附於鄉黨版籍以補杜氏之未備云周世宗顯徳五年詔諸道州府令團併鄉村大率以百户為一團每團選三大户為􅂄長凡民家之有奸盜者三大户察之田民之有耗登者三大户均之仍每及三載即一如是宋因前代之制有衙前里正户長耆長太宗太平興國七年令兩京諸州應部民有乏種及耕具人丁者許衆共推擇一人練土地之宜明種植之法者縣補為農師相視田畝及五種所宜即令鄉三老里胥與農師周勸各民於曠土種蒔俟歳熟共取其利為里農師者蠲税免其他役淳化五年令諸縣以第一等户為里正第二等為户長勿冒名以給役然自承平既久姦偽滋生命官形勢占田無限皆得復役衙前將吏得免里正户長應役之户困於繁數偽為劵售田於形勢之家假佃户之名以避徭役仁宗慶厯中委二府大臣裁減科役不均以鄉村坊郭户均差王逵為荆南轉運使率民輸錢免役得緡錢三十萬由是他路競為掊克知并州韓琦上疏曰州縣生民所苦無甚於里正衙前每鄉被差疎宻與貲力髙下不均假有一縣甲乙二鄉甲鄉第一等户十五户計貲為錢三百萬乙鄉第一等五户計貲為錢五十萬畨休遞役富者休息有餘貧者敗廢相繼豈朝廷為民父母意乎請罷里正衙前命轉運司以州軍見役人數為額令佐視五等簿通一縣計之籍皆在第一等選貲最髙者一户為鄉户衙前後差人放此即甲縣户少而役繁乙縣户多而役簡者簿未盡實聽换取他户里正主督租賦請以户長代之二年一易下其議京畿河北河東陜西京東西轉運使度利害皆以為便而知制誥韓絳蔡襄極論江南福建里正衙前之弊絳請行鄉户五則之法襄請以産錢多少定役重輕至和中命絳襄與三司參定繼遣尚書都官員外郎吴幾復趨江東殿中丞蔡禀趨江西與長吏轉運使議可否因請行五則法凡差鄉户衙前視貲産多寡置籍分為五則又第其役輕重放此於是立法下三司頒焉自罷里正衙前民稍休息至神宗熈寧時王安石為相又設保甲之法籍鄉村之民十家為保保丁皆授其弓弩教之戰陣參知政事吕惠卿及其弟曲陽縣尉和卿皆請行手寳法其法官為定立田産中價使民各以田畝多少髙下隨價自佔仍併屋宅分有無蕃息立等將造簿預具式示民令依式為狀縣受而籍之以其價列定髙下分為五等既該見一縣之民物産錢數乃參㑹通縣役錢本額而定所當輸明書其數使衆悉知之詔從其請於是司農寺乞廢户長坊正令州縣坊郭擇相鄰户三二十家排比成甲迭為甲頭督輸税賦苗役一税一替其後諸路皆言甲頭催税未便遂詔耆户長壯丁仍舊募充其保正甲頭丞帖法並罷哲宗元祐中殿中侍御史劉次莊言近制許雇耆户長須三等已上户不知三等已上户不願受雇郡縣仍用差法不若立法明差之為便繼又定制鄉差役人有應募者可以更代即罷遣之許借坊場河渡及封樁錢以為雇直耆户長壯丁召雇不得以保正保長保丁充髙宗紹興初㕘政李回言於帝曰前詔官户役錢勿減半民户役錢概增三分官給庸錢以募户長及立保甲未㡬廢保甲起推割推排之制民間纎㣲細瑣皆得籍之唯江之東西以畝頭計税不待推排保正長之立也五家相比五伍為保十大保為都保有保長有都副保正餘及三保亦置長五大保亦置都保正其不及三保五大保者或為之附厯或為之均并户則以物力之髙下為役次之久近凡差役皆當因時制宜其應免應募毋膠前制云遼聖宗統和三年樞密奏契丹諸役户多困乏請以富户代之上因閲諸部籍有二部户少而役重者併量減之興宗重熈八年北院樞密使蕭孝穆請籍天下户口以均徭役由是通括户口政賦稍平云金制以民户内有物力者為課役户無者為不課役户令民以五家為保太宗天㑹三年禁内外官及宗室毋得私役百姓權勢家不得買貧民為奴世宗大定二年詔免二稅户為民遼時以良民賜諸寺分其税一半輸官一半輸寺故謂之二税户金制又倣周禮大司徒三十一大比作通檢推排之法是時承正隆師旅之後民之貧富變更賦役不均世宗下詔曰粤自國初有司常行大比正隆時兵役並興調𤼵無度富者今貧不能自存版籍所無者今為富室而猶幸免是用遣信臣泰寧節度使張宏信等十三人分路通檢天下物力而差定之以革前弊俾元元無不均之嘆以稱朕意凡規措條理命尚書省畫一以行又命凡監户事産除官所撥賜之外餘凡置到百姓有税田宅皆在通檢之數五年有司奏諸路通檢不均詔再以户口多寡貧富輕重適中定之既而又定通檢地土等第税法十五年上以天下物力自通檢以來十餘年貧富變易賦調輕重不均遣濟南尹梁肅等二十六人分路推排後又制明安穆昆户科差之法均其貧富及量其奴婢之多寡定之詔宰臣明安穆昆多新強舊弱差役不均其令推排當自中都路始二十二年詔令集耆老推貧富騐土地牛具奴婢之數分為上中下三等以同知大興府事完顔烏林先推中都路續遣户部主事諳逹等十四人與外官同分路推排後或推排通檢之法舉行不一章宗泰和六年以舊定保伍法有司滅裂不行其令結保有匿奸細盜賊者連坐宰臣謂舊以五家為保恐人易為計搆而難覺察遂令從唐制五家為隣五隣為保以相檢察京府州縣郭下則置坊正村社則隨户衆寡為鄉置里正以按比户口催督賦役勸課農桑村社三百户以上則設主首四人二百户以上三人五十户以上二人以下一人以佐里正禁察非違置壯丁以佐主首巡警盜賊明安穆昆部村寨五十户以上設寨使一人掌同主首寺觀則設綱首凡坊正里正以其户十分内取三分富民均出雇錢募強幹有抵保者充人不得過百貫役不得過一年凡户口計帳三年一籍自正月初州縣以里正主首明安穆昆則以寨使詣編户家責手實具男女老幼姓名以實轉報縣申州再逹上司到部呈省凡漢人渤海人不得充明安穆昆户明安穆昆之奴婢免為良者止𨽻本部為正户凡籍官良人𨽻宫籍為監户籍官奴婢𨽻太府監為官户七年勅中物力户有役則多逃避有司令以次户代之事畢則復業以致大損不逃之户令省臣詳議宰臣奏舊制太輕遂命課役全户逃者徒二年賞告者錢五萬如實銷乏者内從御史臺外從按察司體究免之宣宗貞祐三年河北民遷徙河南者甚衆侍御史劉元規上言僑户宜與土民均應差役上留中而自以其意問宰臣丞相布薩端平章穆延盡忠以為便尚書左丞賈益謙曰僑户應役甚非計也河北人户避兵而來稍息即歸今旅寓倉皇之際又與地著者並應供億必騷動不能安居上甚嘉賞興定五年省言隨處土民久困徭役客户鬻販坐獲厚利官無所歛亦宜稍及客户以寛土民從之元太宗時耶律楚材條便宜事言中原之地財用所出宜存恤其民州縣非奉上命不得擅一行科差世祖至元七年令縣令所屬村疃凡五十家立一社擇髙年曉農事者為之長増至百家别設長一員不及五十家者與近村合為一社地逺人稀不能相合各自為社者聽其合為社者仍擇數村之中立社長官司長以教督農桑為事凡種田者立牌橛於田側書某社某人於其上社長以時㸃視勸誡不率教者籍其姓名以授提㸃官責之其有不敬父兄及兇惡者亦然仍大書所犯於門俟其改過自新乃毁如終嵗不改罰其代充本社夫役社中有事不能耕種者衆為合力助之一社之中多事者兩社助之凡為長者復其身郡縣官不得以社長與科差事十年令特黙齊隨處列社與編民等十三年詔民之蕩析離居及僧道漏籍諸色人不當差役者萬餘人充貴徹後又詔京師勢家等皆與民均役焉英宗至治三年詔行助役法遣使考視税籍髙下出田若干畝使應役之人更掌之收其税租以充役用官不得與時浙右苦於徭役民充坊里正者皆破家朝廷令行省召八郡集議便民之法杭州總管趙璉獻議以屬縣坊正為雇役里正用田賦以均之民稱其便泰定帝泰定二年命江南民户有田一頃之上者於所輸税外每頃量出助役之田具書於冊里正以次掌之嵗收其租以充助役之用凡寺觀田除宋舊額其餘亦騐其多寡令出田助役民賴以不困吕思誠為蓚縣令差民力為三等均其徭役又刻孔子像令社學事之印識文簿畀社長記其善惡季月報縣不孝弟不事生業者罰其輸作明太祖洪武十四年詔天下編賦役黄冊以一百十户為一里推丁糧多者十户為長餘百户為十甲甲凡十人嵗役里長一人甲首一人董一里一甲之事先後以丁糧多寡為序凡十年一週曰排年在城曰坊近城曰廂鄉都曰里里編為冊冊首總為一圖其諸不能任役者附十甲後為畸零僧道給度牒有田者編冊如民科無田者亦為畸零有司定其冊凡四一上户部其三則布政使府縣各存一焉上户部者謂之黄冊進呈送後湖東西二庫庋藏之嵗命户科給事中一人御史一人户部主事四人釐校訛舛其後黄冊祇具文有司徴税編徭則自為一冊凡户三等曰民曰軍曰匠以其業著籍人户以籍為斷禁數姓合户附籍漏口脱户許自實里設老人選年髙為衆所服者導民為善平鄉里争訟其人户避徭役者曰逃户年饑或避兵他徙者曰流民有故而僑於外者曰附籍朝廷所移民曰移徙凡逃户明初督令還本籍復業賜復一年其不能歸與不願歸者令在所著籍授田輸賦英宗正統時造逃户周知冊核其丁糧凡流民初令勘籍編甲互保屬所在甲長管轄之憲宗成化初荆襄寇亂流民百萬項忠楊璿為湖廣巡撫下令逐之祭酒周洪謨著流民説引東晉時僑置郡縣之法使近者附籍逺者設州縣以撫之都御史李賓上其説命原傑出撫招流民十二萬户給閒田置鄖陽府立上津等縣統治之凡附籍者正統時令家屬離籍千里者許收附不及千里者𤼵還景泰中令民籍者收附軍匠竈役冒民籍者𤼵還其移徙者明初户部郎中劉九臯言狹鄉之民遷于寛鄉可使地無遺利太祖採其議屢有遷徙永樂中又遷太原諸郡之民以實北平焉至明代役法洪武初造黄冊成以上中下户為三等凡應役者編第均之銀力從所便曰均徭他雜役曰雜泛二十六年定各處三等人户仍開軍民竈匠等籍除排年里甲依次充當外其大小雜泛差役各照所分上中下三等人户㸃差景泰元年令里長户下空閒人丁與甲首户下人丁皆同差成化十五年令各處差徭户分九等門分三甲凡有差派定民輸納然上供京繇主納為中官留難不易中納往復改貿其弊甚多且役民自里中正辦外如糧長解户名色甚繁因事僉編嘉靖後行一條鞭法通計一省丁糧均派一省徭役於是均徭里甲與兩稅為一小民得無擾而事亦易集然糧長里長名罷實存條鞭規制漸紊不能盡遵也明中葉以後工役日煩京營之兵悉為所役軍政皆廢弛云欽定續通典卷七
