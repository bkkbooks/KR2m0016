body:
  text: 禮嘉聖節朝賀唐五代宋遼金元明臣等謹按唐開元禮有千秋節朝賀儀前史未詳其制故杜典不載五代時間舉上壽故事宋世聖節上夀或在紫宸殿或在垂拱殿已御正衙非開元時御樓之比自金迄明元日聖誕上壽并為一儀則其禮與元正等今詳考史志别立專條附諸朝儀之後以資考信云唐元宗開元十七年八月癸亥以降誕之日大置酒張樂宴百寮於花萼樓下終宴丞相源乾曜張説率文武百官等上表請以八月五日為千秋節著之甲令播之天下咸令宴樂休假三日十八年八月丁亥帝御花萼樓設九部之樂百官袴褶陪位上公稱觴獻壽穆宗長慶元年七月庚子降誕日百寮於紫宸殿稱賀畢詣昭徳門外命婦詣光順門並進門奉賀皇太后文宗太和七年八月中書門下奏請以十月十日為慶成節著在令式是日陛下於宫中奉迎太皇太后與昆弟諸王盛陳宴樂羣臣詣延英門奉觴上千萬嵗壽開成元年十月慶成節宴於延英殿太常進雲韶樂宰臣及翰林學士赴宴又錫百寮宴於曲江晉高祖天福七年二月壬子天和節御武徳殿宰臣率文武百官上壽漢隠帝乾祐三年三月丙子嘉慶節御廣政殿文武百寮上壽酒周太祖廣順元年七月戊子永夀節御廣政殿百寮進酒上壽世宗顯徳間嵗一舉行宋眞宗至道三年十二月癸巳承天節羣臣上壽於崇政殿英宗以正月三日為壽聖節禮官奏故事聖節上壽親王樞密於長春殿宰臣百官於崇徳殿天聖諒闇皆於崇政殿於是紫宸上壽羣臣升殿間飲獻一觴而退又一日賜宴於錫慶院徽宗以十月十日為天寧節定上壽儀高宗建炎元年詔天申節百官上壽常禮可令寢罷止就佛寺啟散祝壽道場詣閤門或後殿拜表稱賀遼太宗天顯三年冬十月天授節帝御五鸞殿受羣臣及諸國使賀㑹同四年冬十一月以永寧天授二節並受賀著為令皇太后生日為永寧節金熙宗皇統三年正月乙巳萬春節受賀如正旦儀世宗大定二十八年三月丁酉萬春節御慶和殿受羣臣朝復宴於神龍殿諸王公主以次捧觴上壽帝懽甚以本國音自度曲帝自歌之皇太孫等和之極懽而罷元世祖至元八年八月己未聖誕節初立内外仗及雲和署樂位如元正儀文宗至順元年二月中書省臣言舊制正旦天夀節内外諸司各有䞇獻頃者罷之今江浙省臣言聖恩公溥覆幬無疆而臣等殊無補報凡遇慶禮進表稱賀請如舊制為宜從之明太祖洪武元年定朝賀儀凡冬至聖節朝㑹宴享皆同其聖節致詞皇太子則云兹遇父皇陛下聖誕之辰謹率諸弟某等敬祝萬萬嵗壽丞相則云兹遇皇帝陛下聖誕之辰謹率文武百僚敬祝萬萬嵗壽不傅制英宗天順五年十一月丁未以冬至萬壽節同日改致詞宣表等儀禮部言二節慶賀致詞各異又冬至𫝊制聖節不𫝊制今請通致詞曰兹遇律應黄鍾日當長至恭惟皇帝陛下萬夀聖節膺乾納祜奉天永昌臣某等誠歡誠忭敬祝萬萬嵗壽然後惟以冬至制詞𫝊答羣臣其各王府及在外文武衙門二節賀表若前後宣讀不無重複請通宣表目又通宣表文曰忻逢長至恭遇聖誕其在外文武衙門至曰行告天祝壽禮宜曰今兹冬至恭遇聖誕聖壽益増從之策命皇太子宋遼金元明宋太宗至道元年八月壬辰詔立皇太子命有司草具册禮有司言前代無太子執圭之文請如王公之制執桓圭餘如舊制九月丁夘太宗御朝元殿陳列如元㑹儀百官就位太子常服乘馬就朝元門外幄次易逺遊冠朱明衣所司贊引三師三少導從至殿庭位再拜起居畢分班立太常博士引攝中書令就西階升殿詣御坐前俯伏興奏宣制降由東階至太子位東南向稱有制太子再拜中書侍郎引册案就太子東中書令北面跪讀册畢太子冄拜受册以授右庶子門下侍郎進寳授中書令中書令授太子太子以授右庶子各置於案由黄道出太子隨案南行樂奏正安之曲至殿門樂止太尉升殿稱賀侍中宣制答如儀太子易服乘馬還宫百官賜食於朝堂中書門下樞密院師保以下詣太子參賀皆序立於宫門之外庶子版奏外備内臣搴簾太子常服出次坐中書門下樞密師保賓客而下再拜並答拜四品以下官參賀升坐受之越三日具鹵簿謁太廟常服乘馬出東華門升輅儀仗内行事官乘車者並服禮衣餘皆袴褶乘馬導從神宗未及受册禮而即位乃以册寳送天章閣遂為故事遼制前期一日設幄坐於宣慶殿設文武官幕次於朝堂并殿庭版位大樂令陳宫縣守宫設皇太子次於朝堂北西向乘黄令陳金輅於朝堂門外西向皇太子儀仗笳簫鼓吹等陳宣慶門外典儀設皇太子版位於殿横街南近東北向設文武官五品以上位於樂縣東西至日門下侍郎奉册中書侍郎奉寳綬各置於案令史二人絳服對舉案立寳案在横街北西向册案在北門下侍郎中書侍郎並立案後侍中版奏中嚴皇太子逺遊冠綘紗袍秉珪出太子舍人引入就版位北面殿立東宫官三師以下皆從立皇太子東南西向太子入門樂作至位樂止典儀贊皇太子再拜在位者皆再拜中書令立太子東北西向門下侍郎引册案中書侍郎取册進授中書令退復位𫝊宣官稱有制皇太子再拜傳宣訖再拜中書令跪讀册訖俯伏興皇太子再拜受册退授左庶子中書侍郎取寳進授中書令皇太子進受寳退授左庶子中書令以下退復位舁案者以案退典儀贊再拜皇太子拜在位者皆再拜太子舍人引皇太子退樂作出門樂止侍中奏禮畢皇太子升金輅左庶子以下夾侍儀仗鼓吹等並列宣慶門外三師三少諸宫臣於金輅前後導從還東宫文武宫臣序班稱賀禮畢金世宗大定八年正月册皇太子禮官擬奏前三日遣使奏告天地宗廟前一日宣徽院帥鸞儀司設御座於大安殿當中南向設皇太子次於門外之東西向又設文武百僚應行事官東宫官等次於門外之東西廊又設册寳幄次於殿後東廂俱南向又設受册位於殿庭横階之南工部官與監造册寳官公服自製造所導引册寳牀由宣華門入進呈畢赴幄次安置大樂令帥其屬展樂縣於庭至日質明東宫官各朝服自東宫乘馬導從至左翔龍門外通事舍人分引百官入立班東西相向次引侍中中書令門下侍郎中書侍郎及捧舁册寳官詣殿後幄次前立少頃奉册寳出幄次由大安殿東降至庭中褥位權置訖皇太子服逺遊冠朱明衣出次執圭三師三少以下導從立於門外侍中奏中嚴符寳郎奉八寳由東西偏門分入升置御座之左右侍中奏外辦皇帝出自東序即御座如常儀皇太子入門宫縣樂作至位樂止師少以下從入立於皇太子位東南西向典儀贊皇太子再拜搢圭舞蹈又再拜奏聖躬萬福又再拜引近東西向立師少以下并奉引册寳官等赴百官東班通事舍人引百官俱横班北向再拜舞蹈起居畢各還東西班典儀引皇太子復受册位侍中承㫖稱有制皇太子以下在位官皆再拜侍中宣制册某王為皇太子又再拜通事舍人太常博士引中書令詣讀册位中書侍郎引册匣置於前捧册官西向跪捧皇太子跪讀畢俯伏興再拜中書令奉册授皇太子搢圭跪受册以授右庶子中書令退復位通事舍人太常博士引侍中詣奉寶位門下侍郎引寶盝立於其右侍中奉寳授皇太子搢圭跪受以授左庶子册寳俱置於牀侍中以下退復位典儀贊再拜皇太子退左右庶子帥其屬舁册寳牀以出禮畢放仗以次出後二日皇太子拜表朝謝如儀又後二日百官奉表稱賀元制前期三日右丞相率百僚至金玉局册寳案前行禮導至中書省正位安置前期二日儀鸞司設發册案於大明殿御座西發寳案於東典寳官設册案於太子殿前階東寳案於階西又設受册案於殿内座榻之西受寳案於東右丞相率百僚朝服至中書省導册寳案至闕前中道入崇天門升大明殿置於案至朝大昕皇帝陞大明殿御座引寳引册使以下各就位禮儀使奏請發册寳捧册寳官受册寶由正門出控鶴舁案至皇太子殿庭皇太子出閤立中階香案前行再拜禮太尉前稱制遣臣等恭授皇太子册寳皇太子詣褥位跪諸執事官皆跪讀册官讀册畢納册於匣讀寳官讀寳畢納寳於盝太尉進授册寳皇太子恭受以授左右庶子奠於殿内受册寳案太尉以下皆再拜還詣大明殿御座前跪復命侍儀使左右庶子導皇太子詣大明殿謝恩畢還府右丞相祝贊進酒進表章禮物如儀駕還寢殿皇太子還府陞殿典引引羣臣拜賀進酒進箋禮物訖皇太子還閤明制册皇太子所司陳設如儀先三日齋戒遣官祭告天地宗廟至日皇帝衮冕御謹身殿皇太子冕服俟於奉天門外辦皇帝陞奉天殿引禮導皇太子入奉天東門由東階升至丹陛位百官各就丹墀位皇太子再拜興承制官由殿中門出立於門外曰有制皇太子跪宣制曰册長子某為皇太子俯伏興再拜引禮導皇太子由殿東門入内贊導至御座前内贊贊跪宣册宣畢皇太子搢圭跪受册以授内侍復贊授寳如授册儀皇太子出圭俯伏興由殿東門出執事官舉節册寳隨出皇太子復位四拜興由東階降儀仗鼓樂迎册寶至文華殿持節官持節復命禮部官奉詔書赴午門開讀百官迎詔至中書省頒行皇太子詣太廟謁告詣奉天殿謝恩入謝中宫行朝謝禮禮畢親王世子俟於文華殿稱賀次日百官進表箋慶賀内外命婦慶賀中宫如常儀宣宗宣徳二年十一月皇子生羣臣表請立太子三年二月行禮以太子尚㓜命正副使授册寳於文華門憲宗成化十一年以册立皇太子禮成文武官分五等賜綵緞有差皇太子與百官相見宋金元明臣等謹案杜典載羣臣侍坐太子後至一條又皇太子監國及㑹宫臣議一條所引晉及北齊等故事義類參錯與標目不皆比附攷宋以後史志載皇太子與百官相見儀節頗詳謹倣志文别立標題採輯大略以資援據亦庶與杜典所載互相證明云宋太宗至道元年有司言百官見皇太子自兩省五品尚書省御史臺四品諸司三品以上皆答拜餘悉受拜宫官自左右庶子以下悉用參見之儀其宴㑹位在王公上徽宗政和時所定新儀太子與師保傅相見皇太子再拜師保傅以下答拜若三少特見則三少先拜其列仗設樂位次一如開元禮儀金世宗大定二年定相見儀三師三公欄子内北向躬揖班首稍前奉候皇太子離位稍前正南立答揖宰執及一品職事官於欄子北向躬揖答揖如前二品職事官欄子外向南躬揖皇太子起揖三品職事官露階稍南躬揖皇太子坐揖四品以下職事官宫庭下躬揖跪問候皇太子坐受東宫師傅保與隨朝三師同東宫三少與隨朝二品同詹事以下並在庭下面北每品重行以東為上再拜稍前問候又再拜皇太子坐受七年定制皇太子赴朝許與親王宰執相見餘官宗室並迴避後亦許與樞密使副御史大夫判宗正及東宫三師相見元制正旦大朝㑹之明日文武羣官以常服至東宫行賀禮皇太子居偏殿南向坐羣官自丞相下以次入北面行四跪拜禮明太祖洪武元年十二月帝以東宫師傅皆勲舊大臣當待以殊禮命議三師朝賀東宫儀禮官議曰唐制羣臣朝賀東宫行四拜禮皇太子答後二拜三公朝賀前後俱答拜近代答拜之禮不行而三師之禮不可不重謹擬凡大朝賀設皇太子座於大本堂設答拜褥位於堂中設三師賔客諭徳拜位於堂前皇太子常服陞座三師賔客常服入就位北向立皇太子起立南向贊四拜皇太子答後二拜十四年給事中鄭相同請如古制百官詣皇太子止稱名惟宫臣稱臣詔下羣臣議編修吳沈等議曰東宫國之大本所以繼聖體而承天位也臣子尊敬之禮不得有二請凡啟事東宫者稱臣如故從之册命諸王侯後唐宋遼明後唐明宗天成二年以楚王馬殷為守太師尚書令封