后廟内修奉廟室為殿三間設神門齋房神厨以備薦享仁宗明道二年四月追尊母宸妃李氏為皇太后上尊諡曰莊懿哲宗即位詔尊太后高氏為太皇太后皇后向氏為皇太后尊生母徳妃朱氏為皇太妃禮部議皇太妃生日節序其冠服之屬如皇后例稱慈㫖慶賀用箋元祐三年宣仁太后詔母以子貴輿葢仗衛冠服悉侔皇后高宗既即位遥尊母韋賢妃為宣和皇后紹興十年遥上皇太后册寳於慈寧殿自後每遇誕日至朔皆遥行賀禮十二年八月自北歸至臨安入居慈寧宫遼世宗即位尊母蕭氏為皇太后世宗為太祖太子倍長子倍以太祖命守東丹後適唐遇害世宗立追尊為義宗母蕭氏太子妃尊為太后金海陵天徳二年尊嫡母圖克坦氏為皇太后尊生母大氏為皇太后章宗即位尊母圖克坦氏為皇太后顯宗之妃元武宗即位尊太母元妃達吉尼鴻吉喇特氏為皇太后至大三年上尊號曰儀天興聖慈仁昭懿壽元仁宗延祐二年加上尊號曰全徳泰寧福慶英宗即位尊為太皇太后加上尊號曰徽文崇祐明世宗即位尊祖母邵氏憲宗妃睿宗母為皇太后所生母蔣氏睿宗妃為興國太后嘉靖七年上皇太后尊號曰壽安改稱太皇太后上興國太后尊號曰慈仁十五年加上康靖貞壽神宗即位尊生母貴妃李氏為慈聖皇太后萬厯六年加上徽號曰宣文後又累加明肅貞壽端獻恭熹支庶立為天子追尊本親議宋金元明宋英宗治平三年正月皇太后下書中書門下封濮安懿王宜如前代故事王與夫人王氏韓氏任氏皇帝可稱親尊濮安懿王為皇夫人為后詔遵慈訓稱親不加尊號又以塋為園置守衛吏即園立廟俾王子孫主祠事如皇太后㫖仍令臣民避濮安懿王諱以王子宗懿為濮國公仁宗在位年久無子以濮安懿王第十三子宗實為皇子及即位宰相韓琦等奏請下有司議濮安懿王及譙國夫人王氏襄國夫人韓氏仙遊縣君任氏合行典禮詔須大祥後議之治平二年詔禮官與待制以上議翰林學士王珪等奏曰謹案儀禮喪服為人後者𫝊曰何以三年也受重者必以尊服服之又為人後者為其父母𫝊曰何以期不二斬也特重於大宗降其小宗也為人後者為其昆弟傳曰何以大功為人後者降其昆弟也先王制禮尊無二上若恭愛之心分於彼則不得專於此故也是以秦漢以來帝王有自旁支入承大統者或推尊其父母以為帝后皆見非當時取議後世臣等不敢引以為聖朝法況前代入繼者或援立之策出自臣下非如仁宗皇帝年齡未衰深惟宗廟之重簡推聖明授以大業陛下親為先帝之子然後繼體承祧光有天下臣等竊以為濮王宜準先朝封贈期親尊屬故事尊以高官大國譙國襄國並封太夫人攷之古今為宜稱於是中書奏王珪等所議未見詳定濮安懿王當稱何親名與不名珪等議濮王於仁宗為兄於皇帝宜稱皇伯而不名如楚王涇王故事中書又奏禮與令及五服年月勅出繼之子於所繼所生皆父母又漢宣帝光武皆稱父為皇考今珪等議稱濮王為皇伯於典禮未有明據請下尚書省集三省御史臺議奏方議而皇太后手詔詰責執政於是詔曰如聞集議不一權宜罷議令有司博求典故以聞禮官范鎮等又奏漢之稱皇考稱帝稱皇立寢廟序昭穆皆非陛下聖明之所法宜如前議為便自是御史吕誨等彈奏歐陽修首建邪議韓琦曽公亮趙槩附㑹不正之罪固請如王珪等議既而内出皇太后手詔曰吾聞羣臣議請皇帝封崇濮安懿王至今未見施行吾載閲前史乃知自有故事濮安懿王譙國夫人襄國夫人仙遊縣君可令皇帝稱親濮安懿王稱皇譙國襄國仙遊並稱后事方施行而英宗即日手詔曰稱親之禮謹遵慈訓追崇之典豈易克當且欲以塋為園即園立廟俾王子孫主奉祠事既而議寢神宗元豐二年詔以濮安懿王及三夫人可並稱王稱夫人云金世宗即位於東京追尊皇考豳王為皇帝諡簡肅廟號睿宗皇妣富察氏曰欽慈皇后李氏曰貞懿皇后睿宗諱宗堯太祖之子元武宗即位於上都追尊皇考曰皇帝諡曰昭聖廟號順宗尊太母元妃為皇太后順宗諱達爾瑪巴拉世祖之子泰定帝即位追尊皇考皇妣請諡於南郊皇考晉王曰光聖仁孝皇帝廟號顯宗皇妣晉王妃曰宣懿淑聖皇后顯宗諱噶瑪拉裕宗長子明世宗即位追尊父興獻王為興獻帝祖母憲宗貴妃邵氏為皇太后母妃為興獻后嘉靖元年正月從宰臣楊廷和等議稱孝宗為皇考慈壽皇太后為聖母興獻帝后為本生父母不加皇字三年四月追尊興獻帝為本生皇考恭穆獻皇帝尋定稱孝宗為皇伯考昭聖皇太后為皇伯母興獻皇帝為皇考章聖皇太后為聖母四年五月作世廟祀獻皇帝七年七月追尊孝惠皇太后為太皇太后恭穆獻皇帝為恭睿淵仁寛穆純聖獻皇帝章聖皇太后為章聖慈仁皇太后十七年九月上獻皇帝廟號睿宗神主祔太廟躋武宗上辛夘大享上帝於元極寶殿以睿宗配興獻王諱祐杭憲宗第四子母妃邵氏成化間封興王正徳十四年薨諡曰獻王薨二年武宗崩無嗣慈夀皇太后與大學士楊廷和定筞以遺詔迎興王世子於興邸入繼大統禮臣毛澄等援漢定陶宋濮王故事考孝宗改稱王為皇叔父興獻大王王妃為皇叔母帝命廷臣集議未決進士張璁上書請考興獻王帝大悦㑹母妃至自安陸止通州不入帝啟張太后欲避位歸藩奉母羣臣惶懼太后命進王為興獻帝妃為興國后璁更為大禮或問以進帝因諭輔臣楊廷和等帝后加稱皇廷和合廷臣爭之未決嘉靖元年禁中火廷臣引五行五事為廢禮之證乃輟稱皇加稱本生父母尊園曰陵黄屋監衛如制設祠署安陸享用十二籩豆樂用八佾帝心終未慊三年加稱為本生皇考恭穆獻皇帝興國太后為章聖太后又建廟奉先殿西曰觀徳殿祭如太廟七月諭去本生號九月詔稱孝宗皇伯考明年修獻皇帝實録建世廟於太廟左七年命璁等集明倫大典成加上尊諡十七年揚州同知豐坊請加尊皇考廟號稱宗以配上帝九月加上尊諡廟號睿宗祔太廟位次武宗上明堂大享奉主配天罷世廟之祭四十四年芝生世廟柱復立玉芝宫祀焉五宗宋宋吕大臨宗子議國君之嫡長為世子繼先君之正統自母弟而下皆不得宗次嫡為别子别子既不得禰先君則不可宗嗣君又不可無所統屬故為先君一族大宗之祖其生也適庶兄弟皆宗之别子之母弟雖適子與羣公子同不得謂之别子其死也子孫世世繼之為先君一族之大宗凡先君所出之子孫皆宗之雖百世不遷無後則族人以支子繼之此謂别子為祖繼别為宗羣公子雖宗别子而自為五世小宗之祖死則其子其孫為繼禰繼祖之小宗至五世以上則上遷其祖下易其宗無子孫則絶此謂繼禰者為小宗每一君有一大宗世世統其君之子孫故曰宗其繼别子之所自出者百世不遷者也别子所自出謂别子所出之先君如魯季友乃桓公之别子所自出為桓公一族之大宗公子之公為其士大夫之庶者宗其士大夫之適者則别子為先君一族大宗之祖羣公子皆宗之是謂有大宗而無小宗若君無次適可立為别子止有庶公子數人則不可無宗以統當立庶長一人為小宗使諸弟皆宗之是為有小宗而無大宗若庶長死國君復追立庶長為别子以為先君一族大宗之祖而以其子繼之此雖不經見然以義求之則一君之大宗不可以絶後也若君之正嫡外止有一公子既不可宗君又無昆弟宗已是謂無宗亦莫之宗然此公子亦為其先君一族大宗之祖没則百世相繼先君之子孫皆宗之如大宗法按宗有五大宗一小宗四孔頴達疏别子之後族人衆多或繼高祖與三從兄弟為宗或繼曾祖與再從兄弟為宗或繼祖與同堂兄弟為宗或繼禰與親兄弟為宗一身兼事四宗兼大宗為五杜典所載數條經義已晰宋以後禮家訓釋畧同吕氏議較為詳盡故備志之公子二宗宋宋朱子議宗子有公子之宗有大宗有小宗國家之衆子不繼世者若其間有適子則衆兄弟宗之為大宗若皆庶子則兄弟宗其長者為小宗此所謂公子之宗者也别子即是此宗子既没之後其適長者各自繼此别子即是大宗直下相𫝊百世不遷别子之衆子既没之後其適長子又宗之即為繼禰之小宗每易一世高祖廟毁則同此廟者是為袒免之親不復相宗矣所謂五世而遷也又謂宗子只得立適雖庶長立不得若無適子則亦立庶子所謂世子之同母弟世子是適若世子死則立世子之親弟亦是次適也是庶子不得立也本朝哲廟弟有申王次端王次簡王乃哲廟親弟當時章惇欲立簡王向太后謂諸王皆庶子莫得如此分别當以次立申王目眇不足以視天下乃立端王是為徽宗章惇殊不知禮意同母弟須皆適子方可言既皆庶子安得不依次第今臣庶家要立宗也難惟宗室與襲封孔氏柴氏當立宗今孔氏柴氏襲封兄死弟繼與今俗門長略同殊失宗法九族宋宋陳祥道禮書云書與詩序皆言九族惟周禮小宗伯儀禮士昏禮禮記仲尼燕居特言三族者三族父子孫也九族高祖至元孫也三族舉其本九族極其末舉三族則九族見矣白虎通夏侯歐陽何琦如淳之説父族四母族三妻族二為九族其説葢以詩之葛藟刺平王不親九族而言謂他人父謂他人母頍弁刺幽王不親九族而言豈伊異人兄弟甥舅角弓亦刺不親九族而言兄弟昏姻無胥逺矣則所謂九族者非特内宗而已是惡知詩人之所主者因内宗而發哉爾雅於内宗皆曰族於母妻皆曰黨又禮小功之未可以嫁娶妻之黨固無妨於嫁娶昏禮不容慮其不虞也然則九族之説當從孔安國鄭康成為正小記曰親親以三為五以五為九上殺下殺旁殺而親畢矣此九族隆殺之差也葢已上親父下親子三也以父親祖以子親孫五也以祖親曽高以孫親曽元九也然已之所親以一為三祖孫所親以五為九記不言者以父子一體而高與元曽同服故不辨異之也按九族自當以孔鄭説為正然尚書堯典以親九族蔡𫝊雖主鄭義仍包母族妻族在内殆以下文平章百姓協和萬邦推而廣之不當獨略外姻致有滲漏而小記以三為五以五為九之義自不可易鄉飲酒唐五代宋明唐李栖筠為常州刺史行鄉飲酒禮登歌降飲人人知勸後唐時左僕射李愚請頒唐六典示百司使州縣貢士行鄉飲酒禮時以其迂濶不果行宋制州軍貢士之月以禮飲酒以知州軍事為主人學事司所在以提舉學士為主人其次本州官行上舍生當貢者與州之羣老為衆賓是月也㑹凡學之士及武士習射唐貞觀所頒禮惟明州獨存太宗淳化中㑹例行之徽宗政和時禮局定飲酒登降之節與舉酒作樂器用之屬並參用辟雍宴貢士儀其有古樂處令用古樂高宗紹興十三年比部郎中林保乞修定鄉飲儀徧下郡國於是國子祭酒高閌草具其儀上之寧宗慶元中朱熹以儀禮改定主賓僎介之位其主則州以守縣以令位於東南賓以里居年高致仕者位於西北僎則州以倅縣以丞或簿位東北介以次長位西南三賓以賓之次者司正以衆所推服者相及贊以士之熟於禮儀者其日質明主人率賔以下先釋菜於先聖先師退各就次以俟肅賓介與衆賓既入主人序賓祭酒再拜詣罍洗洗觶至酒尊所酌實觶授執事者至賓席前跪以獻賓賓酬主人主人酬介介酬衆賓賓主以下各就席坐訖酒再行次沃洗贊者請司正揚觶致詞司正復位主人以下復坐主人興復至阼階楣下僎從賓介復至西階下立三賓至西階立並南向主人拜賓介以下再拜賓介與衆賓先自西趨出主人少立自東出賓以下立於庠門外之右東鄉主人立於門外之左西鄉僎從主人再拜賓介皆再拜退明太祖洪武五年詔定鄉飲酒儀令有司與學官率士大夫之老者行於學校民間里社亦行之十六年詔頒鄉飲酒圖式於天下每嵗正月十五日十月初一日於儒學行之其儀以府州縣長吏為主以鄉之致仕官有徳行者為僎擇年高有徳者為賓其次為介其次為三賓又其次為衆賓教職為司正贊禮贊引讀律皆使能者里中鄉飲略同二十二年定鄉飲禮以善惡分列三等為坐次不許混淆如有不遵序坐及有過之人不行赴飲者以違制論欽定續通典卷六十八
