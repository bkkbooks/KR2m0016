body:
  text: 職官秩品一唐臣等謹按新舊唐書所載唐代職官品秩與杜佑通典互異者甚多或開成以後有所更定故歟今悉依新唐書增入其與舊唐書舛異而杜典所未備者别為詮註以資考核且以補杜氏之闕云唐官品正一品太師太傅太保太尉杜典未載按唐制以太尉為三公太宗貞觀二十三年六月癸未以長孫無忌為太尉高宗宏道元年十二月庚午以韓王元嘉為太尉以後如宋王成器朔方節度使郭子儀及李懐光李晟皆拜太尉蓋優禮勲臣之崇秩也而杜典遺之或因有其官而不常置故歟司徒司空王爵從一品太子太師太子太傅太子太保開府儀同三司文散散按杜典載開府儀同三司於東宫三師之前考階之官雖朝參禄奉而無職事間或為勲戚宰輔之加銜非國家有職掌大臣可比今俱改列於正官之後驃騎大將軍武散嗣王郡王爵國公爵正二品尚書令杜典及舊唐書皆未載唐代拜是官者唯武德三年太宗曽為之代宗廣德二年十二月乙丑拜郭子儀為尚書令辛未以子儀固讓即罷之侍中杜典及舊唐書皆作正三品中書令杜典及舊唐書皆作正三品左右龍武軍左右神策軍等大將軍杜典未載舊唐書載在正三品内特進文散輔國大將軍武散開國郡公爵上柱國勲從二品尚書左右僕射太子少師太子少𫝊太子少保西都東都北都牧大都督大都䕶左右衛左右驍衛左右武衛左右威衛左右領軍衛左右金吾衛左右監門衛各上將軍左右衛以下杜典及舊唐書未載光祿大夫文散鎮軍大將軍武散開國縣公爵柱國勲正三品吏部户部禮部兵部刑部工部尚書門下侍郎杜典及舊唐書皆作正四品中書侍郎杜典及舊唐書皆作正四品御史大夫杜典及舊唐書皆作從三品太常卿左右衛左右驍衛左右武衛左右威衛左右領軍衛左右金吾衛左右監門衛左右千牛衛各大將軍左右羽林軍大將軍左右龍武軍左右神武軍左右神䇿軍各統軍龍武軍以下杜典及舊唐書皆未載太子詹事太子賔客中都督上都䕶金紫光禄大夫文散冠軍大將軍武散懐化大將軍懐化將軍杜典及舊唐書未載上䕶軍勲從三品秘書監光禄衛尉宗正太僕大理鴻臚司農太府卿左右散騎常侍國子祭酒殿中監少府監將作大匠諸衛羽林千牛將軍左右龍武神武神䇿各軍將軍杜典及舊唐書皆未載下都督上州刺史大都督府長史大都䕶府副都䕶親王𫝊銀青光禄大夫文散開國侯爵雲麾將軍武散歸徳大將軍歸德將軍䕶軍勲正四品尚書左丞尚書吏部侍郎太常少卿太子左庶子太子少詹事太子左右衛左右司禦左右清道左右監門率府率府率中州刺史軍器監上都䕶府副都䕶上府折衝都尉正議大夫文散開國伯爵忠武將軍武散上輕車都尉勲以前上階尚書右丞尚書諸司侍郎御史中丞杜典及舊唐書皆作正五品諫議大夫杜典及舊唐書皆作正五品太子右庶子太子左右諭德左右千牛衛左右監門衛中郎將親衛勲衛翊衛羽林中郎將下州刺史通議大夫文散壯武將軍武散懐化中郎將杜典及舊唐書未載從四品秘書少監八寺少卿殿中少監太子家令太子親勲翊衛中郎將太子左右衛司禦清道内率監門副率太子率更令太子僕内侍上都䕶府親王府長史太中大夫文散宣威將軍武散輕車都尉勲以前上階國子司業少府少監將作少匠京兆河南太原府少尹上州别駕大都督大都䕶府親王府司馬中府折衝都尉中大夫文散明威將軍武散歸德中郎將杜典及舊唐書未載正五品國子博士給事中中書舎人太子中允太子左右贊善大夫都水使者萬年長安河南洛陽太原晉陽奉先縣令親勲翊衛羽林郎將中都督上都䕶府長史親王府􅖴議叅軍親王府典軍中散大夫文散定逺將軍武散開國子爵上騎都尉勲以前上階太子中舎人尚食尚藥奉御太子親勲翊衛郎將中都督上都䕶府司馬中州别駕下府折衝都尉朝議大夫文散寧逺將軍武散懐化郎將杜典及舊唐書未載從五品尚書左右諸司郎中秘書丞著作郎太子洗馬殿中丞尚衣尚舎尚乘尚輦奉御獻陵昭陵乾陵恭陵定陵橋陵等令親王府副典軍下都督府上州長史下州别駕朝請大夫文散遊騎將軍武散開國男爵騎都尉勲以前上階大理正太常丞太史丞太子内坊局令杜典及舊唐書皆作典内元宗開元二十七年改典内曰令上牧監下都督府上州司馬駙馬都尉奉車都尉親王友宫苑總監上府果毅都尉朝散大夫文散遊撃將軍武散歸德郎將杜典及舊唐書未載正六品太學博士太子詹事丞太子司議郎太子舎人中州長史親勲翊衛校衛太子典膳藥藏郎京兆河南太原府諸縣令鎮軍兵滿二萬人以上司馬親王府椽屬武庫中尚署令諸衛左右司階中府果毅都尉朝議郎文散昭武校尉武散驍騎校勲以前上階千牛偹身備身左右太子文學下州長史中州司馬中牧監上牧副監上鎮將承議郎文散昭武副尉武散懐化司階杜典及舊唐書未載從六品起居郎起居舎人尚書諸司員外郎八寺丞大理司直國子助教城門郎符寳郎通事舎人秘書郎著作佐郎侍御醫諸衛羽林長史兩京市署令下州司馬左右監門校尉親勲翊衛旅帥親王府文學親王府主簿記室錄事參軍諸州上縣令諸帥府左右司階鎮軍兵不滿二萬人司馬奉議郎文散振武校尉武散杜典作旅威校尉舊唐書亦作振威飛騎尉勲以前上階侍御史少府將作國子監丞太公廟令太子内直典設宫門郎司農寺諸園苑監王府校尉下牧監宫苑總監副監牙市監中牧副監下府果毅都尉通直郎文散振威副尉武散杜典作旅威舊唐書亦作振威歸徳司階杜典及舊唐書未載正七品四門博士詹事司直左右千牛衛長史尚食尚藥直長太子左右衛司禦清道率府長史軍器監丞太子千牛諸州中縣令親勲翊衛隊正京兆河南太原府司錄參軍大都督大都䕶府錄事參軍中鎮將親王府諸曹參軍親衛朝請郎文散致果校尉武散雲騎尉勲以前上階尚衣尚舎尚乘尚輦直長太子通事舎人親勲翊衛副隊正杜典作正七品上階京兆河南太原府大都督大都䕶諸曹府參軍中都督上都䕶府錄事參軍諸倉諸冶司竹溫湯監諸衛左右中候上府别將長史上鎮副下鎮將下牧副監宣徳郎文散致果副尉武散懐化司候杜典及舊唐書未載從七品殿中侍御史左右補闕太常博士太學助教門下省録事尚書都事中書省主書九寺主簿太子詹事主簿左右監門直長太子左右内率監門率府長史太子侍醫太子三寺丞都水監丞諸州中下縣令親王府東西閤祭酒京縣丞下都督府上州錄事參軍中都督上都䕶府諸曹參軍中府别將長史中鎮副勲衛太子親衛朝散郎文散翊麾校尉武散武騎尉勲以前上階太史局丞御史臺少府將作國子主簿上署令郊射乘黄太樂典廐鼔吹典客太醫上林太官太倉左藏平凖常平右尚左尚典牧諸州下縣令太廟諸陵署丞司農寺諸園苑副監太子左右監門直長宫苑總監丞下都督府諸曹參軍太子内坊丞親王國令公主家令上州諸府參軍親王府旅帥下府别將長史下鎮副諸屯監諸率府左右中候鎮軍兵滿二萬人以上諸曹判司諸折衝府校尉宣議郎文散翊麾副尉武散歸德中候杜典及舊唐書未載正八品協律郎諸衛羽林錄事參軍中署令鈎盾織右藏染冶掌中州錄事參軍翊衛太子勲衛太醫署醫博士太子典膳藥藏丞軍器監主簿武庫署丞兩京市署丞上牧監丞親王府執仗執乘親事鎮軍兵不滿二萬人以上諸曹判司給事郎文散宣節校尉武散以前上階監察御史杜典及舊唐書皆作正八品上階下署令大卜珍饈廪犧良醖官掌醢校守官校武器校車府官司儀渠崇元坊䆃左中右甄河弩甲坊備身諸衛羽林諸曹參軍中州諸司參軍親王府京兆河南太原府大都督大都䕶府參軍尚藥藏局司醫京兆河南太原諸縣丞太子内直宫門局丞太公廟丞諸宫農圃監牙市監丞司竹副監司農寺諸園苑監丞靈䑓郎上戌主諸衛左右司戈徴事郎文散宣節副尉武散懐化司戈杜典及舊唐書未載從八品左右拾遺太醫署針博士四門助教左右千牛衛錄事參軍下州録事參軍諸州上縣丞中牧監丞京縣主簿太子左右衛司禦清道内率府録事參軍中都督上都䕶府參軍太子翊衛親王府行參軍京兆河南太原府大都督府博士諸倉諸冶司竹溫湯監丞保章正諸折衝府旅帥承奉郎文散禦侮校尉武散以前上階大理評事律學博士太醫署丞太子左右春坊録事左右千牛衛諸曹參軍太子備身下州諸司參軍太子諸署令都水監主簿中書門下尚書都省兵部吏部考功禮部主事上署丞上都督府上州參軍中都督下都督府上州博士諸州中縣丞親王府典籖京縣尉親王國大農公主家丞親王府隊正諸屯監丞上闗令上府兵曹上鎮倉曹兵曹參軍挈壺正中戌主上戌副諸率府左右司戈承務郎文散禦侮副尉武散歸徳司戈杜典及舊唐書未載正九品校書郎太祝太子左右内率監門率府録事參軍太子内坊典直中署丞典客署掌客親勲翊衛府羽林兵曹參軍嶽凟令諸津令下牧監丞諸州中下縣丞中州博士京兆河南太原府諸縣主簿武庫署監事儒林郎文散仁勇校尉武散以前上階正字太子校書尚食局食醫尚藥局醫佐尚輦局掌輦尚乘局奉乘司庫司廪太史局司辰典廐署主乘太子左右内率監門府率府諸曹參軍太子三寺主簿詹事府録事太子親勲翊衞府兵曹參軍諸州下縣丞諸州上縣主簿中州參軍下州博士京兆河南太原府諸縣尉上牧監主簿諸宫農圃監丞中闗令中府兵曹親王國尉上闗丞諸衞左右執㦸中鎮兵曹參軍下戌主諸折衝隊正登仕郎文散仁勇副尉武散懷化執㦸長上杜典及舊唐書未載從九品尚書御史臺秘書省殿中省主事奉禮郎律學助教太子正字𢎞文館校書太史局司厯太醫署醫助教京兆河南太原府九寺少府將作監録事都督都䕶府上州録事市令宫苑總監主簿諸州中下縣主簿中牧監主簿諸州上縣中縣尉下府兵曹監漕文林郎文散陪戎校尉武散以前上階國子監親王府録事太子左右春坊主事崇文館校書書學博士算學博士門下典儀太醫署按摩呪禁博士太卜署博士太醫署醫正大醫署針助教大卜署卜正太史局監候親王國丞太子典倉署園丞太子廐牧署典丞太子諸署丞諸監作諸監計事官太官署監膳大樂鼔吹署樂正親王府隊副大理寺獄丞下州參軍中州下州醫博士諸州中下縣尉京縣録事下牧監主簿下闗令中闗丞諸衛羽林長上公主邑寺録事諸津丞下鎮兵曹參軍諸折衝府隊副諸率府左右執㦸將仕郎文散陪戎副尉武散歸徳執㦸長上杜典及舊唐書未載右内外文武官員數及視流内流外品已詳載杜典按唐太宗省内外官定制七百三十員曰吾以此待天下賢才足矣然是時已有員外置其後又有特置同正員至於檢校兼守判知之類皆非本制又有置使之名或因事而置事已而罷或遂置而不廢其名類繁多史已莫能徧載中世以後盜起兵興又有軍功之官統計内外官萬二千五百七十六人官旣冗而職益不振甚至藩鎮得自辟僚屬府罷則又廢之由其時不能慎守祖制而狥一切苟且之政也又考翰林之名起於唐代開元以前名曰翰林供奉以後改為學士别置學士院専掌内命憲宗時又特置學士承㫖而通典未載其官史亦未序其品秩或以他官兼攝且無所𨽻屬載籍莫考故不入卷中臣等謹按内侍官秩明代旣恭奉諭㫖刪汰兹自唐以下槩不具録以符體例其厯代職守參用宦䜿者則不當以人廢官如金之宣徽院所𨽻尚食等局元之儀鸞局長信寺中尚章珮等監仍按品分載以存一代之官制若宋之通侍正侍中侍中亮中衛拱衛諸大夫之稱徽宗增置為武臣横班散階而又以易内侍内客省等使之號殊為紊亂今悉按史志載入武階注明横班以誌區别云欽定續通典卷四十
