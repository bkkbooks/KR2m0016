body:
  text: 刑寬恕唐五代宋遼金元明唐肅宗至德二年廣平王俶克復東京百官受偽署者陳希烈等三百餘人號跣待罪以上旨釋之尋勒赴西京收繫大理京兆獄帝命禮部尚書李峴兵部侍郎吕諲為詳理使與御史大夫崔器共按鞫峴以殿中侍御史李栖筠為詳理判官諲器刻深栖筠多務平恕諲器上言諸陷賊官背國從偽準律皆應處死峴以為賊陷兩京天子南巡人自逃生此屬皆陛下親戚或勳舊子孫今一概以叛法處死恐乖仁恕之道且河北未平羣臣陷賊者尚多若寬之足開自新之路若盡誅之是堅其附賊之心也書曰殱厥渠魁脅從罔治諲器守文不達大體惟陛下圖之爭之纍日帝從峴議以六等定罪重者刑于市次賜自盡次重杖一百次三等流貶初史思明髙秀巗等思自拔歸命聞達奚珣等被誅懼復叛而三司用刑連年流竄相繼帝亦悔之曰幾為崔器誤我乾元元年及上元二年肆赦乃次第寬釋焉具赦宥篇寶應元年詔曰凡制敕與一頓杖者其數止四十至到與一頓及重杖一頓痛杖一頓者皆止六十代宗性仁恕常以至德已來用刑為戒諫者每諷帝政寬故朝廷不肅帝曰艱難時無以逮下顧刑法峻急有威無恩朕不忍也即位五年府縣寺獄無重囚德宗建中三年刑部侍郎班𢎞奏其十惡中謀反大逆及叛惡逆四等請準律用刑其餘犯罪合斬絞者並請重杖一頓處死以代極法從之貞元八年敕比來斷罪俱守科條或至死刑猶先決杖處之極法更此傷殘惻隱之懷實所不忍今後罪至死者先決杖宜停憲宗英果明斷自即位數誅方鎮欲治僣叛一以法度然於用刑喜寬仁時李吉甫李絳為相吉甫言治天下必任賞罰陛下典刑未舉中外有懈怠心絳曰今天下雖未大治亦未甚亂乃古平國用中典之時自古欲治之君必先德化至暴亂之世始專任刑法吉甫之言過矣帝以為然司空于頔亦諷帝用刑以收威柄帝謂宰相曰頔懷姦謀欲朕失人心也元和八年下詔減死罪配天德五城具刑制篇刑按歐陽修曰者政之輔也政得其道仁義興行而禮讓成俗然猶不敢廢刑所以為民防也寬之而已今不隆其本顧風俗謂何而廢常刑是弛民之禁啓其姦猶積水而決其防故自元宗廢徒杖刑至是又廢死刑民不知德而徒以為幸也後唐明宗長興三年殿直張紹謙奏父靈武節度使希崇先進官馬十五匹遣軍將裴昭隱等二人進納私與進奏官范順之共隱留一匹合抵極法帝曰不可以一馬而戮三人笞而釋之周太祖家屬盡為開封尹劉銖所屠太祖入京師銖妻祼露以席自蔽與銖俱見執太祖使人讓之曰與公共事先帝獨無故人之情乎吾家屠滅雖有君命加之酷毒一何忍也今公亦有妻子獨不念之乎銖曰我為漢誅叛臣爾不知其他時太祖方欲收人心乃與羣臣議曰劉侍中墜馬傷甚而軍士逼辱殆有微生吾欲奏太后貸其家屬何如羣臣稱善乃止殺銖赦其妻子及即位賜陜州莊宅各一區宋太祖建隆三年寬竊盜贓錢法詔曰禁民為非乃設法令臨民以簡必務哀矜竊盜之生本非巨蠧近朝立制重於律文非愛人之旨也自今竊盜贓滿五貫者死開寶八年廣州言前詔竊盜贓至死者奏裁嶺南遐逺覆奏稽滯請不俟報帝覽奏惻然曰海隅習俗貪獷穿窬固其常也因詔嶺南民犯竊盜贓滿五貫至十貫者決杖黥面十貫已上乃死太宗端拱二年始令雜犯至死貸命者勿流沙門島配𨽻初制具刑制篇止𨽻諸州牢城婦人有罪至流者免執針配役淳化二年京江浙大飢強民相率持杖劫人倉廪坐強盜棄市者甚衆蔡州民張緒等二百文獻通考作三百一十八人皆當死知州張榮文獻通考作張䇿推官江嗣宗議取為首者杖脊餘悉論杖罪帝下詔褒之遣使巡撫諸道因諭之曰平民艱食強取餱糧以圖活命爾不可概從盜法科之其凶暴難制為患閭里者固便宜從事務于除惡由是全活者甚衆按宋史刑法志載為真宗時事今從文獻通考真宗咸平間曹州民蘇莊蓄兵器匿亡命豪奪民産積贓至四十萬御史臺請籍其家帝曰暴橫之民國有常典籍之斯過矣論如律御史臺嘗鞫殺人賊獄具知雜事王隨請臠剮之帝曰五刑自有常制何必為此况此賊本情已見一死足矣入內供奉官楊守珍使陜西督捕盜賊因請獲盜至死者望付臣處以凌遲用戒凶惡詔捕賊送所屬依法論決毋為慘毒之刑大中祥符六年詔審刑院大理寺三司詳定配𨽻之刑取犯茶鹽礬麴私鑄軍器市外藩香藥挾銅錢誘漢口出界主吏盜貨官物夜聚為妖比舊法咸從輕減仁宗天聖初詔免軍士妻有罪配𨽻南北作坊者聽自便婦人應配則以妻窑務或軍營致逺務卒之無家者著為法知益州薛田言蜀人配徒他路者請雖老疾勿得釋帝曰逺民無知犯法終身不得還鄉里豈朕意哉察其情可矜者許放還後復詔罪狀獷惡者勿許有司嘗奏盜劫米傷主帝曰飢劫米可哀盜傷主可疾然無知迫於食不足耳命貸之五年陜西旱因詔民劫倉廩非傷主者減死刺𨽻他州非首謀又減一等自是諸路災傷即降敕飢民為盜多蒙矜宥帝嘗御邇英閣經筵講周禮大荒大札薄征緩刑楊安國曰緩刑者乃過誤之民耳當嵗歉則赦之憫其窮也今衆持兵杖劫糧廪一切寬之恐不足以禁姦帝曰不然天下皆吾赤子也一遇飢饉州縣不能賑恤飢殍所迫遂至為盜又捕而殺之不亦甚乎按司馬光諫疏具雜議篇與安國此奏持論俱正飢民嘯聚執械劫奪富家甚至傷主情雖可矜法殊難逭若不分首從盡與減等斷放已為縱弛失刑乃或則置之不問甚且豫降敕文許其寬貸安得有此政體審如是則窮民亦何畏而不劫盜而良善富民又何辜而獨被其殘害也仁宗初政既不能藏富於民俾家給人足及飢饉薦臻又不聞曲加賑恤使一夫必獲其所而徒以姑息惠姦是亦不揣其本而齊其末耳寬強竊盜計贓論罪法具刑制篇祖宗朝重盜剝桑柘之禁枯者以尺計積四十二尺為一功三功以上抵死殿中丞于大成請得以減死論下法官議謂當如舊帝意欲寬之詔死者上請知虢州周日宣詭奏水災有司論請如上書不實法帝曰州郡多言符瑞至水旱之災或抑而不聞今守臣自陳墊溺官私廬舍意實在民何可加罪慶厯五年詔罪殊死者若祖父母父母年已八十及篤疾無期親者列所犯以聞時寧州有童子年九嵗毆殺人當棄市帝以童孺爭鬭無殺人心止命罰金入死者家開封民聚童子教之有因檟楚死者父母訟之府獄上當減死宰相以為可矜帝命杖脊捨之六年詔曰如聞百姓抵輕罪而長吏擅刺𨽻他州朕甚憫焉自今毋得於法外從事神宗元豐二年詔川陜絹匹估贓增其參之一具刑制篇時元絳知通州海門縣淮民多盜販鹽制置使建言滿二十斤者坐徒絳曰海濵之人恃鹽以為命非羣販比也笞而縱之徽宗崇寧五年詔曰民以罪麗法情有輕重則法有增損故情重法輕情輕法重舊有取旨之令今有司惟法輕情重則請加罪而法重情輕則不奏減是樂於罪人而難於用恕非所以為欽恤也自今宜遵舊法取旨使情法輕重各適其中否則以違制論大觀元年詔近時絹價增貴視舊制每匹增錢二百估算定罪具刑制篇髙宗性柔懦用法每過從寬厚即位之初治王時雍等賣國之罪洪芻余大均陳沖張卿才李彛王及之周懿文胡思文並下御史臺獄獄具刑寺論芻納景王寵姬大均納喬貴妃侍兒及之苦辱寧德皇后女弟當流沖括金銀自盜與宫人飲當絞懿文卿才彛與宫人飲卿才彛當徒懿文當杖思文於推擇張邦昌狀內添諂附之詞罰銅十斤並該赦帝閲狀大怒李綱等共解之帝亦新政重於殺士大夫乃詔芻大均沖各貸死流沙門島永不放還卿才彛及之周懿文思文並以别駕安置邦郡詔雜犯死罪有疑及情理可憫者撫諭官同提刑司酌情減降先斷後聞知常州周把擅殺人帝曰朕日親聽斷豈不能任情顧非理耳即命削把籍同知樞密院事李回嘗奏強盜之數帝曰皆吾赤子也豈可一一抵法誅其渠魁三兩人足矣後復申嚴真決贓吏法令三省取具祖宗故事有以舊法棄市事上者帝曰何至爾耶但斷遣之足矣貪吏害民雜用刑威有不得已然豈忍置縉紳於死地耶紹興二十四年詔諸路州軍有編管之人願充廂軍者聽帝復諭大臣曰朕昨在元帥府見河朔州軍將編管人穿鎖傳送旅店三五相聫乞丐於市蓋緣不給之食以至於此深可憫惻可申嚴約束行下時著作郎張九成上言我宋家法曰仁而已仁之發見尤在於刑陛下以省刑為急而理官不以恤刑為念欲詔理官活幾人者與減磨勘從之遼聖宗沖年嗣位睿智皇后稱制留心聽斷嘗勸帝宜寬法律帝壯益習國事凡更定法令十數條多合人心其用刑尤能詳慎定契丹漢人相毆致死一律科斷法具刑制篇著令叛逆之家兄弟不知情者無連坐五院部民有自壞鎧甲者其長博諾杖殺之上怒其用法太重詔奪官吏以故不敢酷興宗時有羣牧人竊易官印以馬與人者法當死帝曰一馬殺二人不亦甚乎減死論又有兄弟犯強盜當死以弟從兄且俱無子特原其弟道宗咸雍三年有司奏新城縣民楊從謀反偽署官吏帝曰小人無知此兒戲爾止流其首惡餘并釋之金熙宗天眷三年復取河南地乃詔其民約所用刑法皆從律文罷獄卒酷毒刑具以從寬恕世宗大定四年尚書省奏大興府民男子李十婦人李仙哥並以亂言當斬帝曰愚民不識典法有司亦未嘗丁寧告誡豈可遽加極刑以減死論十年議禁網捕走獸法罪或至徒帝曰以禽獸之故而抵民以徒是重禽獸而輕民命也詔自今有犯者杖十三年尚書省奏南客車俊等因推場貿易誤犯邊界帝曰本非故意可免罪發還毋令彼國知之恐復治其罪十五年寬竊盜贓滿貫論死之法具刑制篇十六年諭左丞相良弼曰海陵非理殺戮臣下甚可哀憫其博勒珠等遺骸仰逐處訪求官為收葬初帝嘗論天德問事諭良弼曰武靈時領省秉德左丞相言皆有能名然為政不務逺圖止以苛刻為事言及可喜等在會寧時一月之間杖而殺之者二十人罪皆不至死於理可乎海陵為人如虎此輩尚欲以術數要之以至賣直取死安得為能十七年諭宰臣曰故廣寧尹髙禎為政尚猛小過有杖而殺之者即罪至於死而情或可恕猶當念之况小過乎人之性命安可輕哉二十三年又諭宰臣曰帝王之政固以寬慈為德然如梁武帝専務寬慈以至綱紀大壞朕嘗思之賞罰不濫即是寬政餘復何為帝嘗幸金􅘟川始出中都親軍二蒼頭縱馬食民田詔大興尹曹王永功蒼頭各杖一百彈壓百户失覺察勒停帝次望京淀永功奏曰親軍人止一蒼頭兩彈壓服勤為日久矣臣昧死違詔量決蒼頭令彈壓待罪可使償其田直惟陛下憐察許之大懷貞為彰國軍節度使縣尉獲盜得一旗上圖亢宿詰之有謀叛狀株連幾萬人懷貞當以亂民之刑請誅其首亂者十八人餘皆釋之王庭筠判恩州軍事臨政有聲郡民鄒四者謀為不軌事覺逮捕千餘人而鄒四竄匿不能得朝廷遣大理司直王仲軻治其獄庭筠以計獲鄒四分别詿誤坐預謀者十二人而已宣宗元光元年尚書右丞圖克坦思忠以病馬輸官冒取髙價御史劾之有司以監主自盜論死帝顧惜大體降授陳州防禦使哀宗正大元年尚書左丞張行信言先帝詔國初制刑不上大夫治以亷恥丞相果勒齊所定職官犯罪的決百餘條乞改依舊制詔可元太宗七年命哈瑪爾巡撫諸路應州郭者全反脅從詿誤者五百餘人有司議盡戮之哈瑪爾止誅其為首者數人餘悉從輕典蘇克為山西大達嚕噶齊受命方出有回回六人訟事不實將抵罪遇諸塗急止監者曰姑緩其刑即返見帝曰此六人者名著西域徒以小罪盡誅之恐非所以懷逺人也願以賜臣臣得意辱之使自悔悟遷善為他日用殺之無益帝意解召六人者謂之曰生汝者蘇克也其竭力事之後有至大官者時方事征討𨽻軍籍者憚逺涉往往募人代行又軍中多逃歸者定制募代行者杖百逃歸者死斷事官博囉哈雅等按順天等路及至州縣得募代者萬一千户逃者十一人然募者聞命將下已潛遣家人易代博囉哈雅聞之歎曰募者已懼罪往易逃者因單弱思歸情皆可矜吾可不為伸理耶遂奏其狀皆得輕減有丁多産富而家人不往及未至役所而即逃者則曰此而不誅何以戒後世祖中統初順天路民王住兒因鬭誤殺人其母年七十言於朝曰妾寡且老恃此兒以為生兒死妾亦死矣中書司右掾袁裕言於執政曰因誤殺人情非故犯當矜其母乃奏免死至元五年陳思濟同知紹興路總管府事承檄讞獄桐廬有囚羸瘠將死縱遣還家囚固請曰聞公名久矣若不早決恐終不可保為閲其案而釋之六年袁裕為開封府判官洧川縣達嚕噶齊貪暴盛夏役民捕蝗禁不得飲水民不勝忿擊斃之有司當以大逆置極刑者七人連坐者五十餘人裕曰達嚕噶齊自犯衆怒而死安可悉歸罪於民議誅首惡一人餘悉論杖部使者録囚至疑其太寬裕辨之益力事上中書竟從裕議澧州細民以乏食羣聚發富家廩所司欲論以強盜安撫使張雄飛曰此盜食欲救死非強也寬其獄全活者百餘人十九年帝獵巴雅爾之地司農寺達嚕噶齊特爾格從獵人額布勒津射免誤中名駝駝死帝怒命誅之特爾格曰殺人償畜於法太重帝驚曰誤耶史官必書亟釋之庾人有盜粳米者罪當死特爾格諫曰臣鞫庾人其母病盜粳食母耳請貸之牧人有盜割駝峯者將誅特爾格曰生割駝峯誠忍人也然殺之恐乖陛下仁恕心詔皆免死二十四年大駕幸上都札爾古齊哈勒哈等言去嵗審囚官所録囚數南京濟南兩路應死者已一百九十人若總校諸路為數必多宜留札爾古齊數人分道行刑帝曰囚非羣羊豈可遽殺宜悉配𨽻淘金二十七年江淮省平章政國事沙布爾丹以倉庫官欺盜錢糧請依宋法黥面斷其腕帝曰此回回法也不允刑制條載諸犯死罪有親年七十已上無兼丁侍養者許陳情奏裁成宗時張養浩為堂邑令罷舊盜之朔望參者曰彼皆良民飢寒所迫不得已而為盜耳既加以刑猶以盜目之是絶其自新之路也衆皆感泣互相戒曰毋負張公武宗至大初旱蝗為災民多因飢為盜有司捕治論以真犯獄既具朝議互有從違右司郎中敬儼曰民迫於飢而盜非故為也且死者不可復生宜在所矜用是得減死者甚衆張升知汝寧府民有告寄束書於其家者踰三年取閲有禁書一編且記里中大家姓名於上升亟呼吏焚其書曰妄言誣民且再更赦矣勿問同列懼皆引起既而事聞廷議謂升擅脫姦宄遣使窮問卒無迹可指乃詰以焚書狀升對曰事固類姦宄然升備位郡守為民父母今斥誣訴免寃濫雖重得罪不避乃坐奪俸二月仁宗延祐二年晉寧民侯喜昆弟五人並坐法當死帝歎曰彼一家不幸而有是事其擇情輕者杖遣之俾養父母無絶其祀英宗至治元年濟陽縣有牧童持鐡連結擊野雀誤殺同牧者繫獄數嵗總管達爾瑪曰小兒誤殺實無殺人意難以定罪罰銅遣之三年著令原告逃亡百日不出則釋待對者文宗天厯二年御史臺劾前丞相拜布哈昔以贓敗天厯初因人成功遂居相位既矯制以瑪魯家資賜平章蘇蘇又與蘇蘇等潛呼日者推測聖算今奉詔已釋其罪宜竄諸海島以杜姦萌帝曰流竄海島朕所不忍其并妻子置諸集慶至順元年臺臣言陜西右丞克埓受人僮奴及鸚鵡請論如律帝曰克埒官至宰執位重祿厚猶受人生口理宜罪之但鸚鵡微物以是論贓失于太苛其從重者議罪因敕自今饋禽鳥者勿論行樞密院言雲南征戍軍士二人逃歸捕獲法當死詔曰如臨陳而逃死宜也非接戰而亦論死何視人命之易耶其杖而流之眀太祖洪武元年諭省臣鞫獄當平恕古者非大逆不道罪止及身民有犯者毋得連坐尚書夏恕嘗引漢法請著律反者夷三族帝以漢仍秦舊法太重却其奏不行二年帝諭刑部尚書周禎曰刑以輔治唐虞所不免觀舜命臯陶之辭始曰明刑終期於無刑臯陶告舜亦曰與其殺不辜寧失不經當時君臣莫不以恤刑為重而民亦自不犯所以能致雍熙之治朕嘗觀此深有所契卿當體之又嘗與侍臣論待大臣禮太史令劉基曰古者公卿有罪盤水加劍詣請室自裁未嘗輕折辱之所以存大臣之體侍讀學士詹同因取大戴禮及賈誼疏以進且曰古者刑不上大夫以勵亷恥也必如是君臣恩禮始兩盡帝深然之六年乃命工部尚書王肅以俸贖笞罪具贖刑篇十九年大理卿虞謙言誑騙之律當杖而流今梟首非詔書意命如律擬斷二十二年更定大明律書成先是九年以律條擬議未當命丞相胡惟庸汪廣洋等詳議更定視唐簡核而寬厚不如宋其惻隱之懷亦散見於各條如罪應加者必贓數滿乃坐如監守自盜贓至四十貫絞若止三十九貫九百九十九文欠一文不坐也加極於流三千里以次增重終不得至死而減至流者自死而之生無絞斬之别稱日者以百刻稱年者以三百六十日如人命辜限及各文書違限雖稍不及一時刻仍不得以所限之年日科罪未老疾犯罪而事發於老疾以老疾論幼小犯罪而事發於長大以幼小論犯死罪非常赦所不原而祖父母父母老無養者得奏聞取上裁犯徒流者餘罪得收贖存留養親同居親屬有罪得互相容隱奴婢不得首主凡告人者告人祖父不得指其子孫為證弟不證兄妻不證夫奴婢不證主文職責在奉法犯杖則不敘軍官至徒流以世功猶得擢用凡若此類或間采唐律或更立新制所謂原父子之親立君臣之義以權之者也帝覽書諭太孫曰此書首列二刑圖次列八禮圖者重禮也顧愚民無知若於本條下即著寬恤之令必易而犯法故以廣大好生之意總列名例律中善用法者會其意可也太孫請更定五條以上太祖覽而善之太孫又請曰明刑所以弼教凡與五倫相涉者宜皆屈法以伸情乃命改定七十三條復諭之曰吾治亂世刑不得不重汝治平世刑自當輕所謂刑罰世輕世重也是年以楊靖為刑部尚書諭曰愚民犯法如啖飲食設法防之犯者益衆推恕行仁或能感化自今惟犯十惡及殺人者死餘皆令輸粟北邊二十六年有陜西民坐事當戍邊妻病留中途其弟夫婦請代往監送者聽之御史責弟不當代兄并劾監送者其人訴於朝帝曰弟之代兄義也監送者聽其代亦有仁心矣命賜其弟道里費而賞監送者二十八年令法司擬罪引大誥減等是年冬焚錦衣衛具先是天下臣民有犯俱令屬法司其有重罪送至京者或令收繫錦衣衛下本衛鎮撫司推鞫用事者因而非法凌虐帝聞之怒曰訊鞫者法司事也負重罪來者或令錦衣衛審之欲先得其情耳豈令其鍛鍊耶而乃非法如是命取其刑具悉焚之帝嘗行郊壇皇太子從指道旁荆楚曰古用此為朴刑取能去風雖寒不傷也尚書開濟議法密諭之曰竭澤而漁害及鯤鮞焚林而田禍及麛鷇法太巧密民何以自全濟慙謝參政楊憲欲重法帝曰求生於重典猶索魚於釡得活難矣御史中丞陳寧曰法重則人不輕犯吏察則下無遁情帝曰不然古人制刑以防惡衛善故唐虞畫衣冠異章服以為戮而民不犯秦有鑿顛抽脅之刑參夷之誅而囹圄成市未聞用商韓之法可致堯舜之治也寧慙而退又嘗謂尚書劉惟謙曰仁義者養民之膏梁也刑罰者懲惡之藥石也舍仁義而専用刑罰是以藥石養人豈得謂善治乎建文帝繼體守文専務寬恕諭刑官曰大明律皇祖所親定命朕細閲較前代往往加重蓋刑亂國之典非百世通行之道也朕前所改定皇祖已命施行然罪可矜疑者當不止此夫律設大法禮近人情齊民以刑不若以禮其諭天下有司務崇禮教赦疑獄稱朕嘉與萬方之意元年刑部報囚減太祖時十三矣成祖用法嚴峻亦間示寬大永樂二年御史周新巡按北京時令吏民罪徒流者耕北京間田監候詳擬往復待報囚多瘐死新請從北京刑部或監察御史詳允就遣以免淹滯帝嘉納之且命畿內罪人應決者許收贖刑部尚書鄭賜等言比來軍士初犯罪者皆蒙宥免小人作過豈當全無懲戒帝曰天不以惡木廢生君子不以小人忘矜恤朕特矜其初犯耳若怙終固不宥也賜又劾廣東儋州知州陳敏同南海衛千户陳善等運糧遭風壞舟擅以官糧濟軍士請逮問之帝曰運糧所以蓄軍有急安得不與賜曰法非有命不得擅給帝曰事有權宜待報而後給無及矣汲黯所以達大體也其置勿問九年通政司言黃巖縣民告豪民持建文時士人包彛古所進楚王書藁與衆觀中有干犯語請法司治之帝曰此必與豪民有怨而欲報之朕初即位命百司凡建文中上書有干犯語言皆朕未即位已前事悉毁之有告者勿行今復行之是號令不信矣况天下之主豈當念舊惡所告勿聽都御史陳瑛性鷙刻帝頗寵任而奏讞亦不盡從中書舍人芮善弟夫婦為盜所殺心疑其所親訟于官刑部驗非盜縱之善白帝刑部故出盜帝命御史鞫治果非盜瑛因劾善妄奏當下獄帝曰兄弟同氣得賊惟恐逸之善何罪其勿論車里宣慰使刀暹答侵威逺州地執其知州刀算黨以歸帝遣使諭之刀暹答懼歸地及所執知州遣弟刀臘等貢方物謝罪瑛請先下刀臘法司且逮治刀暹答帝曰蠻獠之性稍不相得則相讐改則已今服罪而復治之何以處不服者知嘉興縣李鑑廷見謝罪帝問故瑛言鑑籍姦黨姚瑄瑄弟亨當連坐而鑑釋亨不籍宜罪鑑曰都察院文止籍瑄未有亨名帝曰院文無名而不籍不失為慎重鑑得免户部人材髙文雅言時政因及建文事詞意率直帝命議行之瑛劾文雅狂妄請置之法帝曰草野之人何知忌諱其言有可采奈何以直而廢之瑛刻薄非助朕為善者以文雅付吏部量材授官千户某灌桐油皮鞭中以決人刑部當以杖命并罷其職法司奏冒支官糧者命即戮之刑部為覆奏帝曰此朕一時之怒過矣其依律自今犯罪皆五覆奏仁宗性仁恕甫即位謂刑部尚書金純都御史劉觀曰卿等皆國大臣如朕處法失中須更執奏朕不難從善也洪熙改元二月諭觀及大理卿虞謙曰往者法司以誣陷為功人或片言及國事輒論誹謗身家破滅莫復辨理今數月問此風又萌夫治道所急者求言所患者以言為諱奈何禁誹謗哉因顧學士楊士竒等曰此事必以詔書行之於是士竒承旨載於己丑詔書云若朕一時過於嫉惡律外用籍沒及凌遲之刑者法司再三執奏三奏不允至五五奏不允同三公及大臣執奏必允乃已永為定制按士竒承旨以帝言載於詔書為異日執奏張本皆由仁宗於刑罰之道未能鑑空衡平故授臣下以執持之御批柄恭繹覽曰法令之當否詳審至於再三斯已可矣必通鑑輯令法司五奏徒滋煩冗人主詳求庶獄或覆勘以得其平或集議以衷於是自不致猶有枉縱如必待臣下執奏乃睿允亦開權勢下移之漸斷精詳得欽恤之本矣文武諸司亦毋得暴酷用鞭背等刑及擅用宫刑絶人嗣續有自宫者以不孝論除謀反及大逆者餘犯止坐本身毋一切用連坐法告誹謗者勿治在位未一年仁恩該洽矣宣宗承之益多惠政每遇奏囚色慘然御膳為廢或以手撤其牘曰説與刑官少緩之宣德二年著帝訓五十五篇其一恤刑也武進伯朱冕言比遣舍人林寬等送囚百十七人戍邊到者僅五十人餘皆道死帝怒命法司窮治之英宗已後仁宣之政衰正統初三楊當國猶恪守祖法禁內外諸司煆鍊刑獄霜降後録重囚自天順間始至成化初刑部尚書陸瑜等以請命舉行之獄上擇其情可矜疑者免死發戍自是厯代奉行孝宗仁厚厰衛無敢橫司厰者羅祥楊鵬奉職而已𢎞治元年知州劉概坐妖言罪斬以吏部尚書王恕言竟得長繫世宗嘉靖二十六年令凡經審録官奏審過重囚奉有欽依饒死者撫按官即遵照發遣不許仍報決單故行奏擾三司官如有故違欽恤敢為翻異致人於死者巡按御史指實具奏三十七年帝出手諭言司牧者未盡得人任情立威湖廣幼民楊一魁二命枉刑母又就捕情迫無控萬里叩閽以此推之寃抑者不知其幾爾等宜亟體朕心加意矜恤仍通行天下咸使諭之末年主事海瑞上書觸忤刑部當以死帝持其章不下瑞得長繫神宗中年已後礦稅使數出為害而東厰張誠孫暹陳矩皆恬靜帝亦無意刻核刑罰用稀厰衛中至生青草囚繫五代宋遼金元明後唐莊宗同光二年敕內外理刑官員毋得私事寄禁明宗天成三年諸州使數奏囚人死於獄中敕今後凡有在獄疾病者委隨處官吏當面録問令醫人看候毋致推司官吏别啓幸門晉髙祖天福二年敕內外有獄官司繫囚染患者並令逐處醫博士及軍醫看候於公廨錢內量支藥價或事輕者仍許人看候所有罪犯合據杖責仍候痊損日科決周太祖廣順三年敕諸道州府見繫囚人宜疾速斷遣仍令獄吏灑掃牢獄嘗令虛歇滌洗枷械毋令蚤蝨供給水漿毋令飢渴如有疾患令其家人看承囚人無主官差醫工診視勿致病亡世宗顯德三年敕諸道所禁罪人無家人供奉喫食者每日人給官米三升宋制官司之獄在開封有府司左右軍巡院在諸司有殿前馬步軍司及四排岸外則二京府司左右軍巡院諸州軍院司理院下至諸縣皆有獄諸獄皆置樓牖設漿鋪席特具沐浴食令溫暖寒則給薪炭衣物暑則五日一滌枷械郡縣則所職之官躬行檢視獄敝則修之使固太祖開寶二年五月上以暑氣方盛深念縲絏之苦乃下手詔兩京諸州令長吏督獄掾五日一檢視貧不能自存者給飲食病者給衣藥輕繫小罪即時決遣無得淹滯自是仲夏必申明是詔以警官吏太宗太平興國中因江西轉運副使張齊賢言令外縣五日一具罪人禁放數白州州獄别置籍長吏檢察三五日一引問疏理月具奏上刑部閲其禁多者命官即往決遣寃滯則降黜州之官吏雍熙元年令諸州十日一具囚帳及所犯罪名禁繫日數以聞俾刑部専意糾舉帝閲諸州所奏獄狀有禁繫三百人者乃令門留寄禁取保在外并邸店養疾人等並準禁囚例件析以聞其鞫獄違限及可斷不斷事小而禁繫者有司駁奏之真宗咸平元年從黃州守王禹稱之請諸路置病囚院徒流以上有疾者處之餘責保於外神宗時詔曰獄者民命之所繫也比聞有司嵗考天下之奏而多瘐死深惟獄吏並緣為姦檢視不明使吾元元橫罹其害其著令應諸州軍巡司院所禁罪人一嵗在獄病死及二人五縣已上州嵗死三人開封府司軍巡嵗死七人推吏獄卒皆杖六十增一人則加一等罪止杖一百典獄官如推獄經兩犯即坐從違制提刑司嵗終會死者之數上之中書檢察死者過多官吏雖已行罰當更黜責哲宗元祐八年中書省言昨詔內外嵗終具諸獄囚死之數初無禁繫多寡之限至元祐七年諸路所上刑部獄死之數遂以禁繫二十而死一即不具則是嵗繫二百人許以十人獄死恐州縣弛意獄事甚非欽恤之意詔刑部自今不許輒分禁繫之數徽宗崇寧三年從蔡京之請令諸州築圜土以居強盜貸死者晝則役作夜則拘之視罪之輕重以為久近之限行二年罷之至大觀元年復行四年復罷髙宗建炎初著令諸獄司並旬申禁狀品官命婦在禁别具單狀合奏案者具情狀招伏奏聞有司朱書檢坐條例推司録問檢法官吏姓名於後各州每年開收編管奴婢人及斷過編配之數各置籍各路提刑司嵗具本路州軍斷過大辟申刑部諸州申提刑司其應書禁厯而不書應申所屬而不申奏案不依式檢坐開具違令回報不圓致妨詳覆與提刑司詳覆大辟而稽留失覆大辟致罪有出入者各抵罪紹興五年尚書省言州縣治獄之吏専事慘酷待其垂斃皆托之疫患殺之未嘗依條醫治乞舉行嵗終比較計分斷罪法是年比較得宣州衢州福州無病死囚當職官各轉一官舒州病死者及一分惠州病死者二分六釐當職官各特降一官十年詔諸獄並一更三點下鎖五更五點開鎖定牢違者杖八十獄官令佐不親臨及縣令輒分輪餘官並徒一年知通監司覺察按劾著為令十三年詔禁囚無供飯者臨安日支錢二十文外路十五文二十一年詔官支病囚藥物錢寧宗嘉泰四年令於常平米內支撥囚糧遼穆宗時京師置百尺牢以處繫囚道宗咸雍三年詔諸路給囚糧金世宗大定十一年詔曰司獄舍宇須近獄安置囚禁之事常親提控其獄卒必選年深而信實者輪直二十五年詔罪人在禁有疾聽親屬入侍元世祖中統初中書司右掾袁裕建言給重囚衣糧醫藥詔著為令嗣定刑格諸獄囚必輕重異處男女異室毋或參雜司獄致其慎獄卒去其虐提牢官盡其誠諸郡縣佐二及幕官每月分畨提牢三日一親臨點視其有枉禁及淹延者即舉問月終則具囚數牒次官其在上都囚禁從留守司提之諸南北兵馬司每月分畨提牢仍令提控案牘兼掌囚禁諸鹽運司監守鹽徒每月佐二官分畨董視與有司同諸流囚居役非遇元正寒食重午等節並勿給假諸配役囚徒遇閏月通理之諸徒罪晝則帶鐐居役夜則入囚牢房其流罪發各處屯種者止令監臨關防屯種諸徒罪無配役之所者發鹽司居役諸獄訟有必聽候歸對之人召保知在如無保識有司給糧養濟勿寄養於民家諸在禁囚徒無家屬或有而貧不能供給者日給倉米一升三升之中給粟一升以食有疾者嵗十二月至於正月給羊皮為披蓋袴襪及薪草為暖匣熏炕之用凡油炭席薦之屬各以時具有病主司驗實除犯惡逆已上及強盜至死奴婢殺主者止給醫藥其餘病重者去枷鎖杻聽家人入侍職事散官五品已上聽二人入侍初病至二分申報漸增至九分為死證若以重為輕以急為緩誤傷人命者究之醫囚之司必試而後用諸孕婦有罪産後百日決遣臨産之月聽令召保既産而十日復追入禁無保及犯死罪者産時令婦人入侍凡在禁囚徒飢寒而衣糧不繼疾患而醫療不時致非理死損者坐有司罪十人已上正官笞二十七次官三十七還職首領官四十七罷職别敘記過諸路府州縣但停囚去處於鼠耗糧內支放囚糧諸流囚在路亦日給米一升有疾醫治疾愈隨時發遣各處司獄司看守囚徒夜支清油一斤諸掌刑獄輒聽囚徒在禁飲博及帶刀刃紙筆隂陽文字入禁者罪之其受財縱囚在禁疏枷飲酒者以枉法科罪除名諸主守失囚者減囚罪三等長押流囚官中路失囚者視提牢官減主守罪四等既斷還職諸禁囚因械梏不嚴致越獄者直日押獄杖九十七獄卒各七十七司獄及提牢官皆坐罪百日內全獲免坐諸部送囚徒中路所次州縣不寄囚於獄而監收旅舍以致反禁而亡者部送官笞三十七還職本處防護官笞四十七就責捕賊仍通記過名諸有司各處遞至流囚輒主意故縱者杖六十七解職降先品一等敘刑部記過明太祖洪武十五年定制獄囚貧不自給者人給米日一升二十四年革去正統二年復功臣及五品以上官禁獄者許令親人入侍成祖永樂九年刑科曹潤等言昔以天寒審釋輕囚今囚或淹一年已上且一月間瘐死者九百三十餘人獄吏之毒所不忍言帝召法司切責遂詔徒流已下三日內決放重罪當繫者恤之無令死於飢寒英宗正統二年令以贓罰敝衣分給各罪囚六年刑部郎中林厚奏言辨過重囚若俟奏允方與疏去枷杻厯日既久未免瘐死乞將合奏者暫去枷杻仍繫鎖鐐俟奏允處之各處有貪酷官員或挾怨故禁勘平人或受賕故入人死罪者除軍職及文職五品已上官奏請外其六品以下即彼逮問械京從之憲宗成化十二年令有司買藥餌送部又廣設惠民藥局療治囚人至武宗正德十四年囚犯煤油藥料皆設額銀定數世宗嘉靖六年以運炭等有力罪囚折色糴米上本部倉每年約五百石乃停收嵗冬給綿衣褲一事提牢主事驗之欽定續通典卷一百十八
