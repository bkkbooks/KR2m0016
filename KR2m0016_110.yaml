body:
  text: 刑雜議二遼金元遼興完重熙二年有司奏言元年詔曰犯重罪徒終身者加以捶楚而又黥靣是犯一罪而具三刑宜免黥其職事官及宰相節度使世選之家子孫犯姦罪至徒者未審黥否帝諭曰犯罪而悔過自新者亦有可用之人一黥其靣終身為辱朕甚憫焉遂定刺臂刺頸之制分别施之具刑制篇按遼世於刑罰未嘗專設科條其時執政大臣與司刑官屬亦鮮有建議執奏者故終遼之世别無雜議可述云金世宗大定間濟南尹梁肅上疏曰刑罰世輕世重自漢文除肉刑罪至徒者帶鐐居役嵗滿釋之家無兼丁者加杖准徒今取遼季之法徒一年者杖一百是一罪二刑也刑罰之重於斯為甚臣實痛之自今徒罪之人止宜居作更不决杖時朝廷以為今法已輕於古恐滋姦惡不從金初定法禁民不得收制書恐滋告訐之弊至是言事者乞許民藏之平章政事張汝霖言昔子産鑄刑書叔向譏之者蓋不欲使民預測其輕重也今著不刋之典使民曉然知之猶江河之易避而難犯足以輔治不禁為便帝以衆議多不欲姑令仍舊禁之按此條止據金史刑志原文録入蓋是時民間原未嘗藏制書亦未因汝霖言而弛禁而汝霖本傳則云時有司言民間收藏制文恐因而滋訟乞禁之汝霖因言不禁為便詔從之志傳所載蓋互異云章宗明昌元年命置詳定所審定律令時章宗問宰臣謂令何不專用律文張汝霖奏言前代律與令各有分其有犯令以律决之今國家制律混淆固當分也遂有是命已而詳定官言若依重修制文為式則條目增減罪名輕重當異於律新律既定復與舊同頒則使人惑而易為奸矣臣等謂用今制條參酌時宜凖律文修定歷採前代刑書宜於今者以補遺闕取刑統疏文以釋之著為常法名曰明昌律義别編𣙜貨邊部權宜等事集為敕條宰臣謂先所定令文尚有未完俟皆通定然後頒行若律科舉人則止習舊律五年尚書省奏在制名例內徒年之律無决杖之文便不用杖緣先為流刑非今所宜且代流役四年以上俱决杖而徒三年以下復不用婦人比之男子雖差輕亦當例減按金史刑志因省臣此奏遂定制徒二年以下者杖六十二年以上者杖七十婦人犯者並决五十而大定間梁肅疏請徒刑免决史又稱恐滋奸惡不從其請意大定之後中間别有變更徒不决杖至是復用舊法而杖數則視大定以前稍從輕減特史文未詳耳承安五年翰林修撰楊庭秀言州縣官往往以權勢自居喜怒自任聽訟之際鮮克加審但使譯人往來傳詞罪之輕重成於其口貨賂公行寃枉有至三二十年不能正者帝遂命立州縣官聽訟條約違者按察司紏之又命編先後條制書之於册以備將來考驗泰和二年監察御史史肅言大定條理自二十年十一月四日以前奴娶良人女為妻者並凖已娶為定若夫亡拘放從其主離夫摘買者令本主收贖依舊與夫同聚放良從良者即聽贖換如未贖換間與夫所生男女並聽為良而泰和新格復以夫亡服除凖良人例離夫摘賣及放夫為良者並聽為良若未出離再配與奴或雜姦所生男女並許為良奴此不同皆編格官妄為增減以致隨處訴訟紛擾是涉違枉敕付所司正之三年毫州醫者孫士明擅用黃紙大書敕賜神針先生等十二字紙尾年月摹作寶樣朱篆青龍二字以誑市人有司捕治欵伏值赦大理寺議宜准僞造御寶雖會赦不應原參知政事賈鉉奏天子八寶其文各異若僞造不限用泥及黃蠟今用筆描成青龍二字既非八寶文論以僞造御寶非本法意遂以赦原宣宗貞祐三年三月禁州縣置刃於杖以决罪人初左諫議大夫賈鉉上書言親民之官任情立威所用决杖分徑長短不如法式甚者以鐡刃置於杖端因而致死間者隂陽愆戾和氣不通未必不由此也願下州郡申明舊章檢量封記按察官其檢察不如法者具以名聞內廷敕斷亦依已定程式制可至是復詔禁之七月詔宰臣自今監察官犯罪其事關軍國利害者並笞决之左司諫穆延和囉羅上言曰禮義亷耻以治君子刑罰威獄以治小人此萬世不易論也近者朝廷急於求治有司奏請從權立法應贖者亦多的决夫爵祿所以馭貴也貴不免辱則卑賤者又何加焉車駕所駐非同征行而凡科徴小過皆以軍期罪之不已甚乎且百官皆朝廷遴選多由文行武功閥閲而進乃與凡庶等則享爵祿者亦不足為榮矣抑又有大可慮者為上者將曰官猶不免民復何辭則苛暴之政日行為下者將曰彼既亦然吾復何耻則陵犯之心益肆其弊可勝言哉伏願依元年赦恩刑不上大夫之文削去此法幸甚按是時宣宗欲從其言而髙琪用事固執不可因定職官犯罪决斷百餘條沿至哀宗正大元年始從右丞張行信言一切改除復行舊制乃廢琪所定之法興定三年省臣奏言向以物重錢輕犯贓者計錢論罪則太重於是以銀為則每兩為錢二貫有犯通寶之贓者直以通寶論如因軍興調發通寶及三十貫者已得死刑凖以金銀價才為錢四百有竒罪止當杖輕重懸絶如此遂命准犯時銀價論罪後參政李復享言近制犯通寶贓者並以物價折銀定罪每兩為錢二貫而法當贖銅者止納通寶見錢乞亦令輸銀既足懲惡又有補於官詔省臣議遂命犯公錯過誤者止徴通寶見錢贓汙故犯者輸銀元世祖至元八年陜西省臣伊遜岱爾言比因饑饉盜賊滋橫宜加顯戮敕中書詳議右丞相按圖以為强竊盜賊一皆處死恐非所宜罪至死者仍舊待命從之按至元十一年以多盜始詔凡盜皆殺無赦在處繫囚滿獄尋以符寶郎董文忠言殺人取貨與盜一錢者均死慘黷莫甚恐乖陛下好生之德於是敕革之二十三年詔百官集議至元鈔計贓論罪時衆欲以至元鈔二百貫贓滿者死趙孟俯曰始造鈔時以銀為本虛實相權今二十餘年間輕重相去至數十倍故改中統為至元又二十年後至元必復如中統使民計鈔抵法疑於太重古者以米絹民生所需謂之二寶銀錢與二物相權謂之二虛雖四者為直升降有時終不大相逺也以絹計贓最為適中况鈔乃宋時所創施於邊郡金人襲而用之皆出於不得已乃欲以此斷人死命似不足深取也按趙孟俯論鈔法世祖本紀及續通考皆載在二十四年本傳所載乃在二十三年時布衣趙天麟上策曰竊見方今大罪囚徒鞫訊既成司縣具詞以申於路路覆鞫之以申達於上司上司遣理官覆察既審而後刑之慎之至也或有及立春之後所在行刑此亦似失天道好生本意也方春月勾芒御辰萬象有榮滋舒暢之容而無枯瘁蕭條之理故王者順之於是乎掩骼埋胔禁止伐樹無覆巢無殺孩蟲無胎夭飛鳥走獸無焚山林凡網羅之類餧獸之藥無出九門但當安萌芽養幼少存諸孤命有司省囹圄母肆掠止獄訟可也以卉草鳥獸之微尚令被澤而况於人乎以獄訟肆掠猶禁止之而况於刑人乎及乎商風振起少皥司天鷹乃祭鳥霜飛蕭艾於是乎審斷戮罪乃所以順隂氣之嚴凝助陽律之不建也且春夏行刑則是春夏二時行秋冬之令灾殃之效具見古書非臣所能盡言也頃連年變異蔬榖不登或䧎霜不殺草而桃李開化或地震日月食而動靜不一斯皆隂陽反覆而意或有以致之也伏望陛下仰稽天意載審刑章凡有罪當死以上命省部秋冬遣理官出而執之凡罪不至死及非常之事宜速决者不在此限外依上施行庶幾休徴薦至氣候相協矣又曰竊見方今或因贓濫或陷逆流例皆籍沒其財歸諸內府散於宗室班於外家彼犯罪之家非刻剝下民則兼并於貧人以得之今而釁彰孽露干我常刑是因利以賈害也且國家不患無財貨之用右族不患有飢寒之窘豈賴夫籍沒貪穢之財以周所用乎然今未免此事者亦因循而不以為意故也伏望陛下留心細慮凡當籍沒之財别於一所明立簿記待儲積之多散於無告之人可也又曰周有八議議賢議能故賢能雖父祖子孫陷罪國家亦不連坐禁錮而棄之也竊見方今陷大罪者除本人已就極刑外其妻孥親屬有投諸逺方而不齒者有繫於場治而應役者有役於右姓而為贓獲者有配於士伍而就苦地者斯皆除惡務盡之當然竊恐有委沙遺金之餘恨也昔崇鯀之方命圯族王敦之狼顧天邑伯禹乃崇鯀之子茂𢎞乃王敦之弟虞舜殛鯀用伯禹為司空而不疑晉元罪敦知茂𢎞之忠節而不問故能奠髙山大川之地成九叙之歌以弼虞舜於無為之休懷凌霜貫日之誠剪吞沙之寇以致晉帝於中興之美蓋由父子兄弟罪不相及刑賞之施出於公也由此觀之籍沒之人不宜終身禁錮明矣伏望陛下下令昭陳凡當籍沒之家內子孫弟姪若有超然特異足學知政之人聽有司公舉録德量能而用之不在禁錮之限可也又曰赦者欲以蕩滌瑕穢與民更始以負罪者言之則為莫大之深恩以致治者言之則非太平之常事也近世以來郊天祝宗建儲立后未有不肆赦者僥幸之子逆知期會能不啓非濫之心哉且罹獄者皆人之切心側耳者也及乎啼烏夜啓驛馬霄流玉籥告靈金雞樹仗雷雨一解例皆釋之名為嘉吉之符實皆變異之徴也遂使攘劫服贓而詫異善流屏息而銜寃養稂莠於良田縱豺狼於當道獨不念害嘉榖而傷平民乎風俗駭然誠可憚也又况大赦之後奸邪未嘗衰止朝脫囹圍夕櫻縲絏其不能承化自新亦已明矣書曰文王作罰刑兹無赦志曰太宗絶赦四海安靜子顔願無赦於光皇孔明亦惜赦於蜀土故得彌天息寇闔境安生此皆前世明主賢臣已然之效也今國家哀囚徒之孽苦憫小民之庸騃頻降原赦此蓋朝廷不忍人之心形於外而不能自己也推此以及良民順天道以正生殺則周文之治不難同矣又豈唐太漢光蜀國碌碌之足言哉夫當罪而宥之當殺而生之亦猶來暄風於霜雪之辰行春令於秋冬之際如此而欲天道之成臣不知其可也事作於下者象動於上感興於人者應發於天能無懼乎易曰一隂一陽之謂道伏望陛下信賞決罰無肆赦宥使上下有紀內外絶幸則治天下可運之掌上矣且使王符之類靡得而議焉成宗初御史臺言先朝决獄隨罪輕重笞杖異施令止用杖乞如舊制不允王暉上書曰法者輔治之具一日闕則不可君操於上永作成憲吏承於下遵為定式民曉其法易避而難犯若周之三典漢之九章是也今國家有天下六十餘年小大之法尚無定議內而憲臺天子之執法外而廉司州郡之法吏是皆司理之官而無所守之法猶有醫而無藥也至平刑議斷旋施為理未免有酌量准擬之差彼此輕重之異臣愚謂宜將纍朝聖訓與中統迄今條格通行議擬參而用之與民更始如是則法無二門輕重適當吏安所守民知所避而天下法矣元貞元年詔求弭盜之䇿山東東西道廉訪陳天祥上奏曰盜賊之起各有所因除嵗凶委之天時姑且勿論他如軍旅不息工役洊興厚斂繁刑皆足致盜中間保護滋長之者赦令是也赦者小人之幸君子之不幸前人言之備矣彼强梁之徒各執兵仗殺人取貨不顧其生有司盡力以擒之朝廷加恩以釋之旦脫縲囚暮即行劫復勒有司結限追捕賊皆視為故常既不感恩又不畏罪凶殘悖逆習與性成誠非善化能移惟有嚴刑可制先是至元二十年史弼陳弭盜之䇿為首及同謀者死餘屯田淮上帝然其言詔以其事付弼賊黨耕種內地其妻孥送京師以給鷹坊人等至是以內地盜賊衆多姑用天祥之奏立為擒盜條格大德五年正月御史臺臣言官吏犯贓及盜官錢事覺避罪逃匿者宜同獄成雖經原免亦加降黜庶奸俗可革從之七月中書省臣言舊制京師州縣捕盜止從兵馬司有司不與遂致淹滯自今輕罪乞令有司决遣重者從宗正府聽斷庶不留獄且民不寃從之時鄭介夫上太平䇿曰國家立政必以刑書為先今天下所奉以行者有例可援無法可守官吏因得並緣為欺如甲乙互訟甲有力則援此之例乙有力則援彼之例甲乙之力俱到則無所可否遷調嵗月名曰撒放使天下黔首無所持循始之所犯不知終之所斷是陷之以刑也內而省部外而郡守抄竊格例至數十册遇事而難决則檢尋舊例或中無所載則旋行擬議是百官莫知所守也民間自以耳目所得之敕㫖條令雜採類編刋行成帙曰斷例條章曰仕民要覽各家收置一本以為凖繩試閲二十年間之例校之三十年前半不可用矣更以十年間之例校之二十年前又半不可用是百姓莫知所避也孔子曰刑罰不中則民無所措手足今者號令不常有同兒戲或一年二年前後不同或綸音初降隨即泯沒遂至民間有一緊二慢三休之謡京師為四方取則之地法且不行况四方之外乎如往年禁酒而私醖者比屋有之禁牛而私宰者愈多又如姦盜殺人必不可赦而每嵗放多爾瑪以此人心輕於犯法又如婚姻聘財明有官庶髙下折鈔之例而今之嫁女者重要財錢與估買軀口無異又如買賣田宅舊有先親後鄰之例而今民業多歸勢要雖親與鄰不得占執推此數端天下槩可知矣今有司每視刑名為重而㛰田錢債略不省察殊不知百姓負寃上無所訴是開官吏受贓之路也審囚决獄官每臨郡邑惟具成案行故事出斷一二便為盡職不知大辟以下刑名公事甚不少也路縣官吏未飽其欲每聞上司官至則將囚徒保候審録既畢仍復收禁此皆無法之弊也又兼衙門紛雜事不歸一十羊九牧莫之適從普天率土皆為王民豈可家自為政人自為國今正宫位下自立中政院匠人自𨽻金玉府校尉自歸拱衛司軍人自屬樞密院諸王位下自有宗正府內史府僧則宣政院道則道教所又有宣徽院徽政院都護府白雲所管戶計諸司頭目布滿天下各有管領不相統攝凡有公訟並須約㑹或事涉三四衙門動是半年虛調文移不得一㑹或指口對問則各司所管互相隱庇至一年二年事無杜絶遂至於强凌弱衆暴寡貴抑賤無法之弊莫此為甚昔先帝時嘗命修律未及成書近議大德律所任非人訛舛尤多今宜於臺閣省部內選擇通經術明治體練達時宜者酌以古今之律文參以先帝建元以來制敕命令採以南北風土之宜修為一代令典使有司有所遵守生民知所畏避國有常科吏無敢侮永為定制子孫萬世之利也諸色衙門投下頭目除管領錢糧造作外無問大小詞訟俱涉約㑹者並令有司歸問庶使政歸一體獄無久淹矣武宗初御史大夫塔思布哈言凡受贓為御史所劾者不得託言事入覲以避其罪從之至大元年正月中書省臣言近百姓艱食盜賊充斥茍不嚴治將至滋蔓宜遣使巡行遇有罪即行决遣與隨處官吏共議弭盜方略明示賞罰或匿盜不聞或期㑹不至或踰期不獲者官吏連坐仁宗延祐六年九月御史臺臣言諸犯贓罪已欵伏及當鞫而幸免者悉付原問官以竟其罪英宗至治二年臣寮言五刑者刑異五等今黥杖徒役於千里之外百無一生還者是一人身被五刑非五刑各底於一人也法當改時朝議雖是之卒不果行泰定帝泰定元年六月以災異詔百官集議中書平章政事張圭等議略曰前宰相特們德爾姦狡險深誣殺蕭楊以快私怨一令發口上下股栗稍不附已其禍立至由是羣邪並進搆成弒逆其子索諾木親與逆謀雖剖棺戮尸夷滅其家猶不足以塞責今復回給所籍家産諸子再入宿衛臣等議宜遵成憲仍籍原産逺竄其子孫以懲大姦君父之讐不共戴天特克實之黨結謀弒逆天下之人所不忍聞比奉㫖以逆黨脅從者衆不可盡誅言者其勿復舉臣等議古法弒逆凡在官者殺無赦宜盡誅額特布哈之徒以謝天下生殺天子之大權臣下何敢盜用遼王托克托位冠宗室覬幸赦恩報復讐忿殺親王妃主百餘人分其資産聞者切齒令不之罪乃復原賜遣還仍守爵土臣等議纍朝憲典聞赦殺人罪在不原宜削其爵土置之他所以彰天威刑以懲惡國有常憲武備卿濟里前太尉布哈以纍朝待遇之隆不思補報専務姦欺詐稱奉㫖令鷹師强收鄭國寶妻果哈貪其家人畜産事聞之官刑曹逮鞫服實竟原其罪輦轂之下肆行無忌逺在外郡何事不為臣等議宜以濟里布哈付刑曹治罪太廟神主祖宗之所妥靈比者盜利其金而竊之至今未獲斯乃非常之事而捕盜官兵不聞杖責臣等議庶民失盜應捕官兵猶有三限之法監守失官物亦有不行知覺之罪今失神主宜罪太常請揀其官屬免之人有寃抑必當昭雪平章政事蕭拜珠中丞楊多爾濟枉遭誣陷籍沒其家比奉明詔還給原業子孫修葺苟全復以其家財仍賜舊人止酬以直即與再罹籍沒無異臣等議宜如前詔以原業還之量其直以酬後所賜者則人無寃憤矣刑罰不立奸宄滋長比者額森特穆爾之徒遇朱太醫妻女於故省門外强拽以入姦宿館所事聞有司以扈從上都為解竟弗就鞫輦轂之下肆惡無忌京民憤駭臣等議宜遵世祖成憲以奸人命有司鞫之又天下囚繫不無寃滯方今盛夏宜命臺省選省審録結正重刑疏决輕繫疑者申聞詳讞善良死於非罪國法當為昭雪特克實弒逆之變學士布哈等皆以無罪死特們德爾專權之際御史徐元素等以言事死皆未申理臣等議宜追贈死者叙其子孫僧道出家宜以清净絶俗為心比年僧道往往畜妻子無異常人如蔡道泰班講主之徒傷人逞欲壞教干刑俾奉祠典豈不䙝天瀆神臣等議僧道之畜妻子者宜罪以舊制罷遣為民按是時下詔疏决繫囚張圭等因上此議而泰定與成逆謀特克實之徒皆其逆黨故不從其議文宗天厯元年中書省臣言近籍竒徹家其子年十六請令與其母同居仍請繼令臣僚有罪致籍沒者其妻其子他人不得陳乞亦不復為官口從之又陜西行臺御史孔思迪言人倫之中夫婦為重比見內外大臣得罪就刑者其妻妾即斷付他人似與朝廷旌表貞節之㫖不侔夫亡終制之令相反况以失節之婦配有功之人又與前賢所謂取失節者以配是身已失節之意不同今後凡負國之人籍沒奴婢財産不必罪其妻子當刑典者則拏戮之不必斷付他人庶使婦人均得守節請著為令從之至順二年河南北道廉訪副使僧嘉努言自古求忠臣於孝子之門今官於朝十年不省覲者有之非無思親之心實由朝廷無給假省親之制而有擅離官次之禁古律諸職官父母在三百里外於三年聽一給定省假二十日無父母者五年聽一給拜墓假十日以此推之父母在三百里以至萬里宜計道里逺近定立假期其應省覲匿而不省覲者坐以罪若詐冒假期規避以掩其罪與詐奔喪者同科御史臺臣以聞命中書省議行之順帝元統二年蘇天爵上疏曰自昔國家務明刑政茍或赦宥之數行必致紀綱之多紊是以先王既興禮樂以教民又嚴法制以懲惡蓋禮樂興則教化洽法制嚴則姦貪懼未嘗數赦以病民也唐太宗貞觀二年謂侍臣曰凡赦惟及不軌之輩古語有云君子不幸小人幸之一嵗再赦善人喑啞夫養稂莠者傷禾稼惠姦凶者賊良人朕有天下以來常須慎赦蓋數赦則愚人常冀僥幸惟欲犯法不復能改過矣誠哉太宗斯言也昔我世祖皇帝即位之初未嘗肆赦臨御既久聖德深仁丕冒天下是以刑政肅清禮樂修舉姦貪知懼善良獲伸故中統至元之治比隆前古欽惟聖天子承順天心子愛百姓發號施令必先至仁踐阼伊始已降寬恩然自近嵗以來赦宥太數誠恐姦人貪吏各懷僥幸大為姦利非國之福也夫以世祖皇帝在位三十五年肆赦者八近自天厯改元至元統初年六年之中赦宥者九蓋敷恩宣澤雖出於朝廷之美意然長姦惠惡誠為政所當慎伏願自今以始近法世祖皇帝之所行逺鑑唐太宗之所言使中外臣民洗心革慮守法奉公知非常之恩不可復覬不勝幸甚至元二年中書省員外郎陳思謙上言强盜但傷事主者皆得死罪而故殺從而加功之人與鬭而殺人者例杖一百七下得不死與私宰牛馬之罪無異是視人與牛馬等也法應加重因姦殺夫所姦妻妾同罪律有明文今止坐所犯似失推明遂令法曹議著為定制詳刑制篇六年蘇天爵上奏國家自太祖戡定中夏法尚寬簡世祖混一海宇肇立制度列聖相承日圖政治雖法令之未行皆因事以立法嵗月既久條例滋多英宗始命中書定為通制頒行多方官吏遵守然自延祐至今又幾二十年矣夫人情有萬狀豈一例之能拘加以一時官曹材識有髙下之異以致諸人罪狀議擬有輕重之殊繁條碎目與日俱增每罰一辜或斷一事有司引用不能通舉若不類編頒示中外誠恐逺方之民或未識而誤犯姦貪獨習知而舞文事至於斯深為未便宜從都省早為奏聞精選文臣學通經術明於治體練達民政者圜坐聽讀定擬去取續為通制刻板頒行中間或有與先行通制參差抵牾本末不應悉當㑹同講究畫一要在詳書情犯顯言法意通融不滯於一偏明白可行於久逺庶幾列聖之制度合為一代之憲章民知所避吏知所守報可欽定續通典卷一百十
