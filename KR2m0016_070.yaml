body:
  text: 禮賓天子受諸侯遣使來聘宋遼金元明臣等謹按杜佑通典所徴天子受諸侯遣使來聘皆殷周封建諸侯之制故佑自注謂三代而下並無其禮是也惟考外蕃遣使來聘之儀自唐開元禮外見於宋史禮志遼金禮志及明史禮志集禮諸書尤為詳備則昔所無而後所有者今亦不得而遽削之也苐宋與契丹約為兄弟凡信使往來如古諸侯交聘非蕃國比其通金也亦用契丹故事暨建炎南渡奉表稱臣訖於金亡未嘗一日正敵國之禮也史臣所書自多隱諱然則南北通書等於蕃國聘使豈實録哉但既無類例可歸採其儀注附見此條下差有倫脊故并著其說如右宋太祖建隆元年八月三日宴近臣於廣政殿江南吳越朝貢使皆預開寶四年十一月五日江南李煜吳越錢俶各遣子弟來朝宴於崇德殿真宗景德澶淵㑹盟之後始有契丹國信使副元正聖節朝見其入聘儀注前一日習儀於驛是日皇帝御崇德殿宰臣樞密使以下大班起居訖至員僚起居後館伴使副一班入就位東面立次接書匣閣門使升殿立次通事入不通喝拜兩拜奏聖躬萬福又喝兩拜隨呼萬歲喝祇候赴東西接引使副位舍人引契丹使副自外捧書匣入當殿前立天武官擡禮物分東西向入列於殿下以東為上舍人喝天武官起居兩拜隨呼萬嵗奏聖躬萬福喝各祇候閣門從東階降至契丹使位揖使跪進書匣閣門側身搢笏跪接舍人受之契丹使立閣門執笏捧書匣升殿當御前進呈訖授內侍都知都知拆書以授宰臣宰臣樞密進呈訖遂擡禮物出舍人與館伴使副引契丹使副至東階下閣門使下殿揖引同升立御前至國信大使𫝊國主問聖體通事𫝊譯舍人當御前鞠躬𫝊奏訖揖起北使皇帝宣閣門回問國主北使跪奏舍人當御前鞠躬奏訖遂揖北使起却引降階至辭見位面西揖躬舍人當殿通北朝國信使某官某祇候見應喏絶引當殿喝拜大起居其拜舞並依本國禮出班謝面天顔歸位喝拜舞蹈訖又出班謝沿路驛館御筵茶藥及𫝊宣撫問復歸位喝拜舞蹈訖舍人宣有敕賜窄衣一對金蹀躞子一金塗銀冠一鞾一兩衣著三百匹銀二百兩鞍轡馬一每句應喏跪受起拜舞蹈訖喝祇候應喏西出凡𫝊語并奏聖躬萬福致辭並通事𫝊譯舍人當殿鞠躬奏聞後同此次通北朝國信副使某官某祇候見其拜舞謝賜致詞並如上儀西出其敕賜衣一對腰帶一幞頭靴笏衣著二百匹銀器一百兩鞍轡馬一次通事及舍人引舍人已下分班入不通使引合班贊喝大起居拜舞如儀舍人喝有敕賜衣服束帶衣著銀器分物應喏跪授擡擔床跪起舞蹈拜訖喝各祇候分班引出次引差來通事以下從人分班入不通使引合班喝兩拜奏聖躬萬福又拜隨呼萬歲喝有敕各賜衣服腰帶衣著銀器分物應喏跪授起喝兩拜隨拜萬歲喝各祇候喝喏分班引出次行門殿直入起居訖殿上侍立文明殿樞密直學士三司使內客省使下殿舍人合班奏報閣門無事唱喏訖卷班西出客省閣門使以下東出其排立供奉官已下橫行合班宣徽使殿上喝供奉官已下各祇候分班出並如常儀皇帝降坐還內宴日契丹使副已下服所賜承受引赴長春殿門外并侍宴臣僚宰執親王樞密使以下祇候俟長春殿諸司排當有備閣門使附入內都知奏班齊皇帝坐鳴鞭宰臣親王以下並宰執分班舍人引入其契丹使綴親王班入舍人通某甲以下喝喏班首奏聖躬萬福喝各就坐兩拜隨呼萬歲喝就坐分班引上殿或皇帝撫問契丹使副舍人便引下殿喝兩拜如禮喝各就坐次舍人通事分引錫哩以下東西分班兩拜喝就坐分引赴兩廊下次舍人引差來通事從人東西分班入合班喝兩拜如禮喝就坐分引赴兩廊次喝教坊已下兩拜班首奏聖躬萬福又喝拜兩拜如禮喝各祇候次引看盞二人稍近前喝拜兩拜如禮喝上殿祇候分東西班上殿立有司進茶床內侍酹酒訖閣門使殿上御前鞠躬奏某甲以下進酒餘如常儀宴起宰臣以下降階舍人喝兩拜搢笏舞蹈喝各祇候分班出次錫哩合班喝兩拜舞蹈三拜拜謝訖喝各祇候分班出次通事從人合班喝兩拜如禮喝各祇候分班引出次喝教坊使以下兩拜如禮喝各祇候如𫝊宣賜茶酒又喝謝茶酒拜兩拜如禮喝各祇候出閣門使殿上近前側奏無事皇帝降坐鳴鞭還內辭日皇帝坐內殿起居班欲絶諸司排當有備催合侍宴臣僚東西相向班立崇德殿庭俟奏班齊舍人喝拜東西班殿侍兩拜奏聖躬萬福喝各祇候次舍人通館伴使副某甲已下常起居次通契丹使某甲常起居次通副使某甲常起居俱引赴西面立次通宰臣以下橫行通某甲以下應喏奏聖躬萬福喝各就坐應喏兩拜呼萬歲分升殿東西向立次通事舍人引契丹錫哩以下次差來通事從人俱分班入當殿兩拜奏聖躬萬福喝各就坐兩拜呼萬嵗分引赴兩廊立次通教坊使看盞及進茶床酹酒并閣門奏進酒並如長春宴日之儀酒五巡起宰臣以下降階班立兩拜搢笏舞蹈三拜喝各祇候宰臣以下並三司使文明殿學士樞密直學士升殿侍立其餘臣僚並契丹使並出次引錫哩及差來從人俱兩拜呼萬歲分班引出如𫝊宣賜茶酒更喝謝拜如前儀已上班絶舍人再引契丹使人西面揖躬舍人當殿通北朝國信使某祇候辭通訖引當殿兩拜出班致辭歸位又兩拜訖宣有敕賜跪受拜舞訖喝好去遂引出次引副使致辭受賜拜舞如前儀次引錫哩以下次引差來通事從人俱分班入舍人喝有敕賜衣服衣著銀器分物各應喏跪受候擡擔床絶就拜起又兩拜萬歲喝好去分班引出其使副各服所賜再引入當殿兩拜萬歲訖喝祇候引升殿當御前立皇帝宣閣門使授㫖𫝊語國主舍人揖國信使跪閣門使𫝊㫖通譯訖揖國信使起立閣門使御前搢笏於內侍都知處奉授書匣舍人揖國信使跪閣門使跪分付訖揖起下殿西出政和詳定五禮有紫宸殿大遼使朝見儀紫宸殿正旦宴大遼使儀紫宸殿大遼使朝辭儀崇政殿假日大遼使朝見儀崇政殿假日大遼使朝辭儀其紫宸殿赴宴遼使副位御座西諸位上將軍之南夏使副在東朵殿並西向北上髙麗交趾使副在西朵殿並東向北上遼使錫哩從人各在其南夏使從人在東廊錫哩之南諸蕃使副首領髙麗交趾從人溪峒衙內指揮使在西廊錫哩之南又至各就位有分引兩廊班首詣御坐進酒樂作贊各賜酒羣官俱再拜就坐酒五行皆作樂賜華皇帝再坐赴宴官行謝華之禮按政和五禮有紫宸殿大遼使朝見儀其陳設前期殿中監帥其屬尚舍張設紫宸垂拱殿門之內設御座於殿上當中南向尚醖設御酒尊酒器於垂拱殿御座之東尚食設御茶床於御座之西俱稍北有司設羣官酒尊酒器於垂拱殿下又設羣公座三公左輔右弼太宰少宰在御座之東稍南知樞密院事門下中書侍郎尚書左右丞同知簽書樞密院事在其東次觀文殿大學士太子三少觀文殿學士資政殿大學士六曹尚書翰林學士承㫖翰林學士資政端明殿學士閣學士左右散騎常侍又開封尹六曹侍郎直學士閣學士又在其東太子三師在樞密之南御史大夫在散騎常侍之南中丞在直學士之南並西向北上親王使相在御座之西稍南太尉在其西次節度觀察留後觀察使又在西大遼使副在節度使之南錫哩從人分位於兩廊其日尚輦陳輿輦於紫宸東西朵殿繖扇於階下尚書兵部列黃麾角仗及殿中細仗於紫宸殿其起居垂拱殿皇帝將出宫讀奏目官以下橫行立定如參儀東上閣門附內侍進班齊牌皇帝出宫行門禁衛諸班親從迎駕自贊常起居皇帝服黃袍坐鳴鞭讀奏目官以下常起居次知內侍省事以下次御前忠佐馬步軍頭以下次殿前都指揮使至諸軍副指揮使次駙馬都尉次殿前司諸軍員僚次宗室將軍以下各逐班先面西立俟班橫行起居次行門指揮使起居俟舍人南階下置身奏班絶皇帝降座鳴鞭詣紫宸殿後幄排立諸班親從迎駕自贊常起居初垂拱起居班將軍紫宸殿樞密以下大班入各就位並如望參儀舍人稱𫝊警四色官趨赴殿庭稱警東上閣門附內侍進班齊牌皇帝御紫宸殿坐鳴鞭平輦逍遙下應奉人朵殿階下迎駕自贊常起居訖升赴平輦逍遙下立舍贊執仗人四再起居次宣贊舍人揖樞密以下躬興對立舍人並北向通班起居訖再鳴鞭樞密以下分東西升殿侍立知客省事以下庭東侍立次東上閣門官引親王就位揖躬退次侍衛親軍馬步軍都指揮使至諸軍副指揮使次開府儀同三司次馬步軍員僚三公以下百官門外序班立先殿中侍御史入側宣大起居訖分班復覺察位舍人二員各立其後知客省事以下退立東階下對立舍人退立西階下宣贊舍人退近當南庭中立次舍人分引兩省官入次東上閣門官舍人詣門外引班首以下分東西入殿庭東西相向立定東上閣門官揖躬贊舍人當殿通宰臣姓名以下起居東上閣門官引班首以下橫行北向並如望參儀宣贊舍人揖左班近前自班後東階下立贊拜東上閣門官揖班首以下躬大起居東上閣門官揖宰相執政官升殿宣贊東上閣門官復侍立位引右班舍人由右班前出餘官分出殿中省押仗官復押仗位次兩省官出次殿中侍御史對揖出知客省事以下復侍立位贊宣對立舍人各復位次館伴官入側宣大起居訖接書𫝊語知客省事官升殿引國信使副自外捧書匣入舍人承受引天武舉禮物分東西入國信使副堂殿立接書知客省事官降階至國信使前舍人揖國信使稍前跪進書匣知客省事官側身搢笏跪接出笏起揖國信使復位立知客省事官執笏捧書匣升殿暫授入內省官知客省事官搢笏捧至御座前進呈退復授入內省官天武常起居入內省官發匣取書𫝊三省與樞密同進讀殿下引禮物出殿東偏門進書訖付入內省官各復侍立位舍人與館伴副使引國信使副至殿東階下𫝊語知客省事官降階揖同升殿國信使當新檻北向立舍人揖國信使稍前跪𫝊大遼國主問聖體傳事譯授舍人舍人當國信使班前躬奏訖揖起復位立知客省事官詣御座前躬承㫖近國信使班前西向立具宣問授𫝊事舍人揖國信使稍前跪𫝊事譯授訖具回奏譯授舍人舍人當班前躬奏如初揖起復位引降東階對見辭位西向立揖躬舍人側宣引當殿大起居班首出班謝面天顔履位五拜又出班謝沿路館驛茶樂御筵𫝊宣撫問復位五拜宣有敕各等第賜對衣衣著銀器鞍轡馬跪受賜起五拜西出次舍人傳事引錫哩分入當殿合班大起居宣有敕各等第賜衣服束帶衣著銀器分物跪受賜起五拜分出次舍人𫝊事引從人入當殿合班四拜起居奏聖躬萬福宣有敕各等第賜衣服腰帶衣著銀器分物跪受賜訖再拜分出次樞密直學士下殿出舍人合班躬奏閣門無事卷班西出皇帝降座鳴鞭知客省事以下排立使臣並卷班出舍人當殿承㫖𫝊四色官趨赴殿庭稱奉敕放仗押仗官再拜訖退其宴國信使以下服所賜衣帶錫哩從人垂拱殿門外階下立赴宴官鞾笏同國信使副屏門外分東西南向立諸司排當備俟內排𫝊立東上閣門附內侍奏班齊皇帝出宫鳴鞭行門禁衛諸班親從迎駕奏聖躬萬福皇帝即御座殿中監以下知客省事以下知內侍省事以下帶御器械官二人尚局應奉官祇應武功大夫以下鬪班各奏聖躬萬福次管軍目僚奏聖躬萬福各復侍立祇應位次舍人引赴宴官并國信使副依東西座位入當殿立定奏聖躬萬福訖贊各就座再拜贊就座舍人分引升殿席前相向次引錫哩次從人並分入當殿贊各就座再拜贊就座分引升座訖次教坊使以下通班四拜起居次看盞人謝升殿再拜內侍進御茶床殿侍酹酒訖東上閣門官詣御座前躬奏班首姓名以下進