於天界寺習儀擇日朝見前一日內使監陳設御座香案於奉天殿如常儀侍儀司設使者位於丹墀中道上之西北向承制官侍立位於殿內之東宣制位於使者之北百官侍立位於丹墀之北東西相向知班二人位於使者之北東西相向贊禮二人位於知班之北東西相向典儀二人位於丹陛上東西相向引使者二人位於使者之西東向引文武班四人位於文武班之北稍後東西相向侍從班位於殿上東西相向文東武西導駕官位於殿內東西相向將軍六人位於奉天門之左右將軍六人位於奉天殿門之左右將軍四人位於丹陛上之四隅將軍二人位於奉天殿內簾前之左右宿衛鎮撫二人位於丹墀東西階下東西相向護衛二十四人位於宿衛鎮撫之南稍後東西相向護衛千户八員位於殿東西門之左右拱衛司陳設儀仗於丹墀丹陛之東西鳴鞭四人於丹陛上北向拱衛司光祿寺官侍立位於殿門之左右是日侵晨擊鼓初嚴各執事陳設如儀引班催請使臣及百官各具朝服次嚴執事各入就位引班引百官使者齊班於午門外東西相向三嚴引班引百官入就侍立位引使者入立於丹墀之西導駕官入謹身殿奉迎侍儀奏外辦御用監官跪奏皇帝具通天冠綘紗袍侍從導引出宫樂作升御座樂止捲簾鳴鞭報時訖引班引使者入就位知班唱班齊贊禮唱鞠躬拜興凡四平身如禮樂止承制官前跪承制由中門出中階降至使者前稱有制贊禮唱某等跪聼使者跪承制官宣制曰皇帝制問使者來時爾某國王某安好使者答畢贊禮唱俯伏興拜興凡四平身使者如禮樂止承制官稱有後制使者跪承制官宣制曰皇帝又問爾使介逺來勤勞使者又答畢贊禮唱俯伏興樂作拜興凡四平身使者如禮樂止承制官由西階升西門入回奏訖復侍立位贊禮唱鞠躬拜興凡四平身使者皆如禮樂止侍儀奏禮畢興駕回樂作還宫樂止引班引文武百官及使者以次出蕃使進貢及參見畢禮部官奏奉聖㫖錫宴於㑹同館前期館人陳設坐次於㑹同館正㕔賔西主東中設御酒案於正中膳部主客命執事設酒案及食案於㕔之南楹教坊司陳設樂舞於酒案之左右是日禮部官陳龍亭於午門外光祿寺官取㫖捧御酒置於龍亭儀仗鼓樂前導禮部官光祿寺官乘馬後隨至館門館人入報蕃使出迎於館門之外執事者捧御酒前行引贊引奉㫖官從行由中道入至㕔上置於案使者自西階升立於西隅奉㫖官立於御酒案之東稱有制使者望闕跪聼宣制畢贊禮唱鞠躬拜興凡二平身使者如禮奉㫖官舉杯酌酒授使者飲北面同跪使者飲畢贊禮唱鞠躬拜興凡二平身如禮贊禮引使者及奉㫖官就席坐執事者舉食案進供於使者及奉㫖官之前執壺者斟酒樂作飲畢樂止酒七行湯七品上湯擊鼓行酒作細樂及陳雜戲宴畢使者送奉㫖官出至館門外奉㫖官上馬使者入擇日皇太子錫宴陳設食品禮部皆如前儀蕃使將還國禮部奏知戒蕃使某日陛辭前二日於天界寺習儀前一日內使監陳設御座香案於奉天殿侍儀司設蕃使拜位於丹墀中道稍西北向設文武官侍立位於丹墀之北東西相向承制官位於殿上之東及宣制位於丹陛上之東南設知班二人位於蕃使之北設贊禮二人位於知班之北典儀二人位於丹陛上之南俱東西相向設引蕃使舍人二人位於蕃使之西東向引文武班舍人四人位於文武班之北稍後東西相向侍從班位於殿上之東西拱衛指揮光祿寺官位於殿門前之左右內使擎執八人位於御座前之左右宿衛鎮撫位於丹陛東西階下護衛百户二十四人位於鎮撫之南稍後俱東西相向護衛千户八人位於殿東西門之左右將軍二人位於殿之左右將軍六人位於殿門之左右將軍四人位於丹陛之四隅將軍六人位於奉天門之左右俱東西相向鳴鞭四人位於丹陛上之南是日侵晨金吾衛陳設兵仗於午門外之東西拱衛司陳儀仗於丹墀丹陛之東西樂工陳樂於丹墀之內擊鼓初嚴禮部官於午門外以御酒禮物置於案執事者若干人服窄紅衫舉案捧禮物官具朝服若干人從入陳案於丹陛上東西如賜詔則設詔書案於蓋物案之北拱衛司用黃蓋遮覆執事各入就位舍人催文武官及蕃使具朝服擊鼓次嚴侍儀侍衛入迎車駕舍人引文武官齊班於午門外之東西引使者立於武官之南東向擊鼓三嚴引班引文武官入就侍立位引蕃使入立於丹墀之西南侍儀版奏外辦御用監跪奏皇帝服皮辨服御輿以出侍儀侍衛導從警蹕如常儀皇帝將出仗動樂作升御座樂止將軍捲簾鳴鞭雞唱報時訖引禮引蕃使入就位贊禮唱鞠躬拜興凡四平身蕃使皆如禮樂止承制官詣御座前跪承制由殿中門出立於宣制位稱有制贊禮唱某官跪聽蕃使皆跪承制官宣制曰皇帝制諭宣畢贊禮唱俯伏興拜興凡四平身蕃使皆如禮樂止承制官由殿西門入跪奏云承制訖復侍立位贊禮唱鞠躬拜興凡四平身蕃使皆如禮樂止贊禮唱禮畢捧禮物官捧禮物自丹墀中道降由奉天中門出如有詔則黃蓋遮覆詔書出舍人引蕃使由奉天西門出侍儀奏禮畢皇帝興樂作還宫樂止引禮引百官以序出捧禮物官捧禮物至午門付使者行每歲常朝具本品公服隨班行五拜禮蕃使辭東宫禮部官率應天府官送出國門之外至龍江驛禮部官還應天府官設宴如初至之儀宴畢應天府官還驛丞送起行穆宗隆慶五年九月復朝鮮使臣引見舊班初帝用鴻臚卿李際春言四夷貢使俱不得至御前引見至是禮科都給事張國彥等奏朝鮮屬國乃冠帶禮義之邦宜仍復舊班以示優禮從之天子遣使迎勞諸侯臣等謹按杜佑所述天子遣使迎勞諸侯乃封建舊制所謂小行人迎勞於畿大行人勞視館載於禮經後世不行久矣宋與遼金則有國使往還如古諸侯相交聘比附朝覲亦以類從耳非盡如古所云也其諸侯來朝天子遣使迎勞獨明集禮所載較詳然類敘天子受諸侯朝覲之下事無復出義屬相通故不復敘欽定續通典卷七十
